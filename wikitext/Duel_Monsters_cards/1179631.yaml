  | text                  = [[Monsters]] your opponent [[control]]s lose 300 [[ATK]]/[[DEF]] for each [[Thunder]] monster you control. You can only use each of the following effects of "Blitzclique Alternator" [[once per turn]]. You can [[shuffle]] 1 other "[[Blitzclique]]" card from your [[hand]] or [[face-up]] [[field]] into the [[Main Deck|Deck]]; [[Add a card|add]] 1 Thunder monster with a different name from your Deck to your hand. You can [[banish]] this card from your [[GY]]; add 1 "Blitzclique" [[Spell]] or "[[Hideout in the Sky, Coulomb]]" from your Deck to your hand.
  | fr_text               = Les monstres contrôlés par votre adversaire perdent 300 ATK/DEF pour chaque monstre Tonnerre que vous contrôlez. Vous ne pouvez utiliser chacun des effets suivants de "Alternateur de la Blitzclique" qu'une fois par tour. Vous pouvez mélanger 1 autre carte "Blitzclique" depuis votre main ou Terrain face recto dans le Deck ; ajoutez 1 monstre Tonnerre de nom différent depuis votre Deck à votre main. Vous pouvez bannir cette carte depuis votre Cimetière ; ajoutez 1 Magie "Blitzclique" ou 1 "Planque dans le Ciel, Coulomb" depuis votre Deck à votre main.
  | de_text               = Monster, die dein Gegner kontrolliert, verlieren für jedes Donner-Monster, das du kontrollierst, 300 ATK/DEF. Du kannst jeden der folgenden Effekte von „Blitzcliquen-Wechselstromgenerator“ nur einmal pro Spielzug verwenden. Du kannst 1 andere „Blitzclique“-Karte von deiner Hand oder offen von deiner Spielfeldseite ins Deck mischen; füge deiner Hand 1 Donner-Monster mit einem unterschiedlichen Namen von deinem Deck hinzu. Du kannst diese Karte von deinem Friedhof verbannen; füge deiner Hand 1 „Blitzclique“-Zauber oder „Versteck im Himmel, Coulomb“ von deinem Deck hinzu.
  | it_text               = I mostri controllati dal tuo avversario perdono 300 ATK/DEF per ogni mostro Tuono che controlli. Puoi utilizzare ognuno dei seguenti effetti di "Alternatore Blitzclique" una sola volta per turno. Puoi mischiare 1 altra carta "Blitzclique" dalla tua mano o Terreno scoperto nel Deck; aggiungi 1 mostro Tuono con un nome diverso dal tuo Deck alla tua mano. Puoi bandire questa carta dal tuo Cimitero; aggiungi 1 Magia "Blitzclique" o "Rifugio nel Cielo, Coulomb" dal tuo Deck alla tua mano.
  | pt_text               = Monstros que seu oponente controla perdem 300 de ATK/DEF para cada monstro Trovão que você controla. Você só pode usar cada um dos seguintes efeitos de "Alternador Blitzclique" uma vez por turno. Você pode embaralhar no Deck 1 outro card "Blitzclique" da sua mão ou do campo com a face para cima; adicione 1 monstro Trovão com um nome diferente do seu Deck à sua mão. Você pode banir este card do seu Cemitério; adicione 1 Magia "Blitzclique" ou "Esconderijo no Céu, Coulomb" do seu Deck à sua mão.
  | es_text               = Los monstruos que controla tu adversario pierden 300 ATK/DEF por cada monstruo Trueno que controles. Sólo puedes usar cada uno de los siguientes efectos de "Alternador Blitzclique" una vez por turno. Puedes barajar al Deck otra carta "Blitzclique" en tu mano o Campo boca arriba; añade a tu mano 1 monstruo Trueno con un nombre diferente en tu Deck. Puedes desterrar esta carta en tu Cementerio; añade a tu mano 1 Mágica "Blitzclique" o "Guarida en el Cielo, Coulomb" en tu Deck.
  | ja_text               = このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：相手フィールドのモンスターの攻撃力・守備力は、自分フィールドの雷族モンスターの数×３００ダウンする。②：自分の手札・フィールド（表側表示）からこのカード以外の「ブリッツクリーク」カード１枚をデッキに戻して発動できる。戻したカードとはカード名が異なる雷族モンスター１体をデッキから手札に加える。③：墓地のこのカードを除外して発動できる。デッキから「ブリッツクリーク」魔法カードか「天空城塞クーロン」１枚を手札に加える。
  | ko_text               = 이 카드명의 ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 상대 필드의 몬스터의 공격력 / 수비력은, 자신 필드의 번개족 몬스터의 수 × 300 내린다. ②: 자신의 패 / 필드(앞면 표시)에서 이 카드 이외의 "블리츠크리크" 카드 1장을 덱으로 되돌리고 발동할 수 있다. 되돌린 카드와는 카드명이 다른 번개족 몬스터 1장을 덱에서 패에 넣는다. ③: 묘지의 이 카드를 제외하고 발동할 수 있다. 덱에서 "블리츠크리크" 마법 카드나 "천공성새 쿨롱" 1장을 패에 넣는다.
  | sc_text               = 此卡名的②③效果1回合仅可各使用1次。①：对手场上怪兽的攻击力・守备力，下降自己场上的雷族怪兽数量×300的数值。②：从自己手牌・场上（表侧表示）将此卡以外的1张“雷盟”卡放回牌组可以发动。从牌组将1只卡名与放回的卡不同的雷族怪兽加入手牌。③：将墓地的此卡除外可以发动。从牌组将1张“雷盟”魔法卡或“天空城塞 库龙”加入手牌。
