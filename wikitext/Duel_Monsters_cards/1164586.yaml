  | text                  = [[Activate]] 1 of these [[effect]]s (also you cannot [[Special Summon]] from the [[Extra Deck]] for the rest of this [[turn]], except [[Synchro Monster]]s);<br />● [[Tribute]] 1 monster; Special Summon 1 monster, except the Tributed monster, from your [[hand]], [[Main Deck|Deck]], or [[GY]], that is "[[Junk Warrior]]" or "[[Stardust Dragon]]", or that [[mention]]s either of them.<br />● When your opponent activates a card or effect in [[response]] to your Synchro Monster's effect activation: [[Negate]] that effect.<br />You can only activate 1 "Junk Signal" per turn.
  | fr_text               = Activez 1 de ces effets (et aussi, vous ne pouvez pas Invoquer Spécialement, Monstres Synchro exclus, depuis l'Extra Deck le reste de ce tour) ;<br />● Sacrifiez 1 monstre ; Invoquez Spécialement 1 monstre (le monstre Sacrifié exclu) depuis votre main, Deck ou Cimetière, qui est "Robot Guerrier" ou "Dragon Poussière d'Étoile", ou qui mentionne l'un d'eux.<br />● Lorsque votre adversaire active une carte ou un effet en réponse à l'activation d'effet de votre Monstre Synchro : annulez l'effet.<br />Vous ne pouvez activer qu'1 "Signal Robot" par tour.
  | de_text               = Aktiviere 1 dieser Effekte (zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Synchromonstern);<br />● Biete 1 Monster als Tribut an; beschwöre 1 Monster, außer dem als Tribut angebotenen Monster, das „Gerümpelkrieger“ oder „Sternenstaubdrache“ ist oder einen von ihnen erwähnt, als Spezialbeschwörung von deiner Hand, deinem Deck oder deinem Friedhof.<br />● Wenn dein Gegner eine Karte oder einen Effekt als Reaktion auf die Effektaktivierung deines Synchromonsters aktiviert: Annulliere jenen Effekt.<br />Du kannst nur 1 „Gerümpelsignal“ pro Spielzug aktivieren.
  | it_text               = Attiva 1 di questi effetti (inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno, eccetto Mostri Synchro);<br />● Offri come Tributo 1 mostro; Evoca Specialmente dalla tua mano, Deck o Cimitero 1 mostro, eccetto il mostro offerto come Tributo, che è "Guerriero Rottame" o "Drago Polvere di Stelle", o che menziona qualsiasi di essi.<br />● Quando il tuo avversario attiva una carta o un effetto in risposta all'attivazione dell'effetto di un tuo Mostro Synchro: annulla quell'effetto.<br />Puoi attivare solo 1 "Segnale Rottame" per turno.
  | pt_text               = Ative 1 desses efeitos (além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno, exceto Monstros Sincro);<br />● Ofereça 1 monstro como Tributo; Invoque 1 monstro por Invocação-Especial, exceto o monstro oferecido como Tributo, da sua mão, do Deck ou do Cemitério, que seja "Guerreiro Sucata" ou "Dragão da Poeira Estelar", ou que mencione qualquer um dos dois.<br />● Quando seu oponente ativar um card ou efeito em resposta à ativação de um efeito de um Monstro Sincro seu: negue o efeito.<br />Você só pode ativar 1 "Sinal de Sucata" por turno.
  | es_text               = Activa 1 de estos efectos (además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno, excepto Monstruos de Sincronía);<br />● Sacrifica 1 monstruo; Invoca de Modo Especial 1 monstruo, excepto el monstruo Sacrificado, desde tu mano, Deck o Cementerio, que sea "Guerrero de Basura" o "Dragón de Polvo de Estrellas" o mencione a cualquiera de ellos.<br />● Cuando tu adversario activa una carta o efecto en respuesta a la activación del efecto de tu Monstruo de Sincronía: niega ese efecto.<br />Sólo puedes activar 1 "Señal de Basura" por turno.
  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。①：以下から１つを選択して発動できる。このターン、自分はＳモンスターしかＥＸデッキから特殊召喚できない。<br />●自分フィールドのモンスター１体をリリースして発動できる。そのモンスターを除く、「ジャンク・ウォリアー」「スターダスト・ドラゴン」またはそのいずれかのカード名が記されたモンスター１体を自分の手札・デッキ・墓地から特殊召喚する。<br />●自分のＳモンスターの効果の発動にチェーンして、相手が効果を発動した時に発動できる。その相手の効果を無効にする。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이하에서 1개를 선택하고 발동할 수 있다. 이 턴에, 자신은 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다.<br />●자신 필드의 몬스터 1장을 릴리스하고 발동할 수 있다. 그 몬스터가 아닌, "정크 워리어" "스타더스트 드래곤" 또는 그 어느 카드명이 쓰여진 몬스터 1장을 자신의 패 / 덱 / 묘지에서 특수 소환한다.<br />●자신의 싱크로 몬스터의 효과 발동에 체인하여, 상대가 효과를 발동했을 때에 발동할 수 있다. 그 상대의 효과를 무효로 한다.
  | sc_text               = 此卡名的卡1回合仅可发动1张。①：可从以下效果中选择1个发动。此回合，自己从额外牌组仅可特殊召唤同步怪兽。<br />●解放自己场上的1只怪兽可以发动。从自己手牌・牌组・墓地将除该怪兽以外的1只“废品战士”“星尘龙”或记载有其中的任一卡名的怪兽特殊召唤。<br />●对手连锁自己的同步怪兽的效果的发动，来发动效果时可以发动。将该对手的效果无效。
