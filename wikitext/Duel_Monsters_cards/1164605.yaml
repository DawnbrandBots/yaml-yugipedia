  | text                  = [[Pay]] 2000 [[LP]], then [[target]] 1 [[Effect Monster]] on the [[field]]; [[Special Summon]] 1 [[monster]] from your [[Extra Deck]], with the same [[Type]] and [[Attribute]] but a different [[Level]] (but [[negate]] its effects), then apply 1 of these [[effect]]s. Neither player can [[activate]] cards or effects in [[response]] to this card's [[activate|activation]].<br />● [[Fusion Summon]] 1 [[Fusion Monster]] from your Extra Deck, using the Special Summoned monster and the targeted monster.<br />● [[Send]] the Special Summoned monster to the [[GY]].<br />You can only activate 1 "Super Duper Polymerization" per [[turn]].
  | fr_text               = Payez 2000 LP, puis ciblez 1 Monstre à Effet sur le Terrain ; Invoquez Spécialement 1 monstre depuis votre Extra Deck, du même Type et Attribut mais de Niveau différent (mais annulez ses effets), puis appliquez 1 de ces effets. Aucun joueur ne peut activer ni de cartes ni d'effets en réponse à l'activation de cette carte.<br />● Invoquez par Fusion 1 Monstre Fusion depuis votre Extra Deck, en utilisant le monstre Invoqué Spécialement et le monstre ciblé.<br />● Envoyez le monstre Invoqué Spécialement au Cimetière.<br />Vous ne pouvez activer qu'1 "Super Top Polymérisation" par tour.
  | de_text               = Zahle 2000 LP und wähle dann 1 Effektmonster auf dem Spielfeld; beschwöre 1 Monster mit demselben Typ und derselben Eigenschaft, aber einer unterschiedlichen Stufe als Spezialbeschwörung von deinem Extra Deck (aber annulliere seine Effekte), dann führe 1 dieser Effekte aus. Kein Spieler kann Karten oder Effekte als Reaktion auf die Aktivierung dieser Karte aktivieren.<br />● Beschwöre 1 Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck, indem du das als Spezialbeschwörung beschworene Monster und das als Ziel gewählte Monster verwendest.<br />● Lege das als Spezialbeschwörung beschworene Monster auf den Friedhof.<br />Du kannst nur 1 „Super-Duper-Polymerisation“ pro Spielzug aktivieren.
  | it_text               = Paga 2000 LP, poi scegli come bersaglio 1 Mostro con Effetto sul Terreno; Evoca Specialmente dal tuo Extra Deck 1 mostro con lo stesso Tipo e Attributo ma con un Livello diverso (ma annulla i suoi effetti), poi applica 1 di questi effetti. Nessun giocatore può attivare carte o effetti in risposta all'attivazione di questa carta.<br />● Evoca tramite Fusione 1 Mostro Fusione dal tuo Extra Deck, utilizzando il mostro Evocato Specialmente e il mostro scelto come bersaglio.<br />● Manda il mostro Evocato Specialmente al Cimitero.<br />Puoi attivare solo 1 "Super Duper Polimerizzazione" per turno.
  | pt_text               = Pague 2000 PV e, depois, escolha 1 Monstro de Efeito no campo; Invoque por Invocação-Especial 1 monstro do seu Deck Adicional, com o mesmo Tipo e Atributo, mas um Nível diferente (mas negue seus efeitos) e, depois, aplique 1 desses efeitos. Nenhum duelista pode ativar cards ou efeitos em resposta à ativação deste card.<br />● Invoque por Invocação-Fusão 1 Monstro de Fusão do seu Deck Adicional, usando o monstro Invocado por Invocação-Especial e o monstro alvo.<br />● Envie para o Cemitério o monstro Invocado por Invocação-Especial.<br />Você só pode ativar 1 "Super Duper Polimerização" por turno.
  | es_text               = Paga 2000 LP, y después selecciona 1 Monstruo de Efecto en el Campo; Invoca de Modo Especial 1 monstruo desde tu Deck Extra, con el mismo Tipo y Atributo pero un Nivel diferente (pero niega sus efectos), y después aplica 1 de estos efectos. Ningún jugador puede activar cartas o efectos en respuesta a la activación de esta carta.<br />● Invoca por Fusión 1 Monstruo de Fusión desde tu Deck Extra, usando el monstruo Invocado de Modo Especial y el monstruo seleccionado.<br />● Manda al Cementerio el monstruo Invocado de Modo Especial.<br />Sólo puedes activar 1 "Súper Mega Polimerización" por turno.
  | ja_text               = このカード名のカードは１ターンに１枚しか発動できず、このカードの発動に対してカードの効果は発動できない。①：２０００ＬＰを払い、フィールドの効果モンスター１体を対象として発動できる。そのモンスターとはレベルが異なり、種族・属性が同じモンスター１体をＥＸデッキから効果を無効にして特殊召喚する。その後、以下の効果から１つを選んで適用する。<br />●この効果で特殊召喚したモンスターと対象のモンスターを融合素材とし、融合モンスター１体を融合召喚する。<br />●この効果で特殊召喚したモンスターを墓地へ送る。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없으며, 이 카드의 발동에 대하여 카드의 효과는 발동할 수 없다. ①: 2000 LP를 지불하고, 필드의 효과 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터와는 레벨이 다르고, 종족 / 속성이 같은 몬스터 1장을 엑스트라 덱에서 효과를 무효로 하여 특수 소환한다. 그 후, 이하의 효과에서 1개를 고르고 적용한다.<br />●이 효과로 특수 소환한 몬스터와 대상 몬스터를 융합 소재로 하고, 융합 몬스터 1장을 융합 소환한다.<br />●이 효과로 특수 소환한 몬스터를 묘지로 보낸다.
  | sc_text               = 此卡名的卡1回合仅可发动1张，应对此卡的发动，不可发动卡的效果。①：支付2000LP，以场上的1只效果怪兽为对象可以发动。从额外牌组将1只与该怪兽等级不同、种族・属性相同的怪兽的效果无效并特殊召唤。然后，从以下效果中挑选1个适用。<br />●将以此效果特殊召唤的怪兽与对象怪兽作为融合素材，将1只融合怪兽融合召唤。<br />●将以此效果特殊召唤的怪兽送至墓地。
