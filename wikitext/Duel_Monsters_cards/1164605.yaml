  | ja_text               = このカード名のカードは１ターンに１枚しか発動できず、このカードの発動に対してカードの効果は発動できない。①：２０００ＬＰを払い、フィールドの効果モンスター１体を対象として発動できる。そのモンスターとはレベルが異なり、種族・属性が同じモンスター１体をＥＸデッキから効果を無効にして特殊召喚する。その後、以下の効果から１つを選んで適用する。<br />●この効果で特殊召喚したモンスターと対象のモンスターを融合素材とし、融合モンスター１体を融合召喚する。<br />●この効果で特殊召喚したモンスターを墓地へ送る。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없으며, 이 카드의 발동에 대하여 카드의 효과는 발동할 수 없다. ①: 2000 LP를 지불하고, 필드의 효과 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터와는 레벨이 다르고, 종족 / 속성이 같은 몬스터 1장을 엑스트라 덱에서 효과를 무효로 하여 특수 소환한다. 그 후, 이하의 효과에서 1개를 고르고 적용한다.<br />●이 효과로 특수 소환한 몬스터와 대상 몬스터를 융합 소재로 하고, 융합 몬스터 1장을 융합 소환한다.<br />●이 효과로 특수 소환한 몬스터를 묘지로 보낸다.
  | sc_text               = 此卡名的卡1回合仅可发动1张，应对此卡的发动，不可发动卡的效果。①：支付2000LP，以场上的1只效果怪兽为对象可以发动。从额外牌组将1只与该怪兽等级不同、种族・属性相同的怪兽的效果无效并特殊召唤。然后，从以下效果中挑选1个适用。<br />●将以此效果特殊召唤的怪兽与对象怪兽作为融合素材，将1只融合怪兽融合召唤。<br />●将以此效果特殊召唤的怪兽送至墓地。
