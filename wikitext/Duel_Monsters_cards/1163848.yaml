  | text                  = [[Activate]] 1 of these [[effect]]s;<br />● [[Set]] 1 "[[Archfiend]]" [[Trap]] from your [[Main Deck|Deck]] or [[GY]]. It can be [[activate]]d this [[turn]].<br />● [[Ritual Summon]] 1 "Archfiend" [[Ritual Monster]] from your [[hand]] or [[face-up]] [[Extra Deck]], by Tributing monsters from your hand or [[field]] whose total [[Level]]s equal or exceed its Level.<br />You can only activate 1 "Archfiend's Usurpation" per turn.
  | fr_text               = Activez 1 de ces effets ;<br />● Posez 1 Piège "Archdémon" depuis votre Deck ou Cimetière. Il peut être activé ce tour.<br />● Invoquez Rituellement 1 Monstre Rituel "Archdémon" depuis votre main ou Extra Deck face recto, en Sacrifiant des monstres depuis votre main ou Terrain dont la somme des Niveaux est supérieure ou égale à son Niveau.<br />Vous ne pouvez activer qu'1 "Usurpation de l'Archdémon" par tour.
  | de_text               = Aktiviere 1 dieser Effekte;<br />● Setze 1 „Erzunterweltler“-Falle von deinem Deck oder Friedhof. Sie kann in diesem Spielzug aktiviert werden.<br />● Beschwöre 1 „Erzunterweltler“-Ritualmonster als Ritualbeschwörung von deiner Hand oder offen von deinem Extra Deck, indem du Monster von deiner Hand oder Spielfeldseite als Tribut anbietest, deren gemeinsame Stufe größer oder gleich seiner Stufe ist.<br />Du kannst nur 1 „Machtergreifung des Erzunterweltlers“ pro Spielzug aktivieren.
  | it_text               = Attiva 1 di questi effetti;<br />● Posiziona 1 Trappola "Arcidemone" dal tuo Deck o Cimitero. Essa può essere attivata in questo turno.<br />● Evoca tramite Rituale 1 Mostro Rituale "Arcidemone" dalla tua mano o Extra Deck scoperto, offrendo come Tributo mostri dalla tua mano o Terreno con Livello totale pari o superiore al suo Livello.<br />Puoi attivare solo 1 "Usurpazione dell'Arcidemone" per turno.
  | pt_text               = Ative 1 desses efeitos;<br />● Baixe 1 Armadilha "Arquidemônio" do seu Deck ou Cemitério. Ela pode ser ativada neste turno.<br />● Invoque por Invocação-Ritual 1 Monstro de Ritual "Arquidemônio" da sua mão ou do Deck Adicional com a face para cima, ao oferecer monstros como Tributo da sua mão ou do campo cuja soma dos Níveis seja igual ou exceda seu Nível.<br />Você só pode ativar 1 "Usurpação do Arquidemônio" por turno.
  | es_text               = Activa 1 de estos efectos;<br />● Coloca 1 Trampa "Archidemonio" desde tu Deck o Cementerio. Ésta puede ser activada este turno.<br />● Invoca por Ritual 1 Monstruo de Ritual "Archidemonio" desde tu mano o Deck Extra boca arriba, Sacrificando monstruos en tu mano o Campo cuyos Niveles totales sean iguales o superen su Nivel.<br />Sólo puedes activar 1 "Usurpación del Archidemonio" por turno.
  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。①：以下の効果から１つを選択して発動できる。<br />●自分のデッキ・墓地から「デーモン」罠カード１枚を自分フィールドにセットする。この効果でセットしたカードはセットしたターンでも発動できる。<br />●レベルの合計が儀式召喚するモンスターのレベル以上になるように、自分の手札・フィールドのモンスターをリリースし、自分の手札・ＥＸデッキ（表側）から「デーモン」儀式モンスター１体を儀式召喚する。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이하의 효과에서 1개를 선택하고 발동할 수 있다.<br />●자신의 덱 / 묘지에서 "데몬" 함정 카드 1장을 자신 필드에 세트한다. 이 효과로 세트한 카드는 세트한 턴에도 발동할 수 있다.<br />●레벨의 합계가 의식 소환할 몬스터의 레벨 이상이 되도록, 자신의 패 / 필드의 몬스터를 릴리스하고, 자신의 패 / 엑스트라 덱(앞면)에서 "데몬" 의식 몬스터 1장을 의식 소환한다.
  | sc_text               = 此卡名的卡1回合仅可发动1张。①：可从以下效果中选择1个发动。<br />●从自己牌组・墓地将1张“恶魔”陷阱卡放置在自己场上。以此效果放置的卡在放置的回合也可以发动。<br />●为使合计等级达到仪式召唤的怪兽的等级以上，解放自己手牌・场上的怪兽，从自己手牌・额外牌组（表侧）将1只“恶魔”仪式怪兽仪式召唤。
