  | text                  = (This card is always treated as a "[[Possessed]]" card.)<br />[[Banish]] any number of [[Spellcaster]] [[monsters]] and/or [[Spells]] from your [[GY]]; monsters you [[control]] gain 200 [[ATK]] x the number banished, and if they do, you gain 400 [[LP]] x the number banished. During your [[Main Phase]]: You can banish this card from your GY; [[Special Summon]] any number of Spellcaster monsters with different [[Attribute]]s from your hand. You can only use 1 "Spiritual Power Recovery Potion" effect per turn, and only once that turn.
  | fr_text               = (Cette carte est toujours traitée comme carte "Possédé".)<br />Bannissez un nombre de votre choix de monstres Magicien et/ou Magies depuis votre Cimetière ; les monstres que vous contrôlez gagnent 200 ATK x le nombre banni, et s'ils le font, vous gagnez 400 LP x le nombre banni. Durant votre Main Phase : vous pouvez bannir cette carte depuis votre Cimetière ; Invoquez Spécialement un nombre de votre choix de monstres Magicien d'Attributs différents depuis votre main. Vous ne pouvez utiliser qu'1 effet de "Potion de Récupération de Pouvoir Spirituel" par tour, et uniquement une fois le tour.
  | de_text               = (Diese Karte wird immer als „Besessen“-Karte behandelt.)<br />Verbanne eine beliebige Anzahl Hexer-Monster und/oder Zauber von deinem Friedhof; Monster, die du kontrollierst, erhalten 200 ATK x die verbannte Anzahl und falls sie dies tun, erhältst du 400 LP x die verbannte Anzahl. Während deiner Main Phase: Du kannst diese Karte von deinem Friedhof verbannen; beschwöre eine beliebige Anzahl Hexer-Monster mit unterschiedlichen Eigenschaften als Spezialbeschwörung von deiner Hand. Du kannst nur 1 Effekt von „Regenerationstrank der spirituellen Kraft“ pro Spielzug verwenden und in jenem Spielzug nur einmal.
  | it_text               = (Questa carta viene sempre considerata come una carta "Posseduto".)<br />Bandisci un qualsiasi numero di mostri Incantatore e/o Magie dal tuo Cimitero; i mostri che controlli guadagnano 200 ATK x il numero bandito e, se lo fanno, guadagni 400 LP x il numero bandito. Durante la tua Main Phase: puoi bandire questa carta dal tuo Cimitero; Evoca Specialmente un qualsiasi numero di mostri Incantatore con Attributi diversi dalla tua mano. Puoi utilizzare solo 1 effetto di "Pozione Ristorativa Potere Spirituale" per turno, e solo una volta in quel turno.
  | pt_text               = (Este card deve ser sempre considerado como um card "Possuído(a)".)<br />Bana qualquer número de monstros Mago e/ou Magias do seu Cemitério; monstros que você controla ganham 200 de ATK x o número banido e, se isso acontecer, você ganha 400 PV x o número banido. Durante sua Fase Principal: você pode banir este card do seu Cemitério; Invoque por Invocação-Especial qualquer número de monstros Mago com Atributos diferentes da sua mão. Você só pode usar 1 efeito de "Poção de Recuperação de Poder Espiritual" por turno e apenas uma vez por turno.
  | es_text               = (Esta carta se trata siempre como una carta "Poseído/a").<br />Destierra cualquier número de monstruos Lanzador de Conjuros y/o Mágicas en tu Cementerio; los monstruos que controlas ganan 200 ATK x el número de desterrados y, si lo hacen, ganas 400 LP x el número de desterrados. Durante tu Main Phase: puedes desterrar esta carta en tu Cementerio; Invoca de Modo Especial, desde tu mano, cualquier número de monstruos Lanzador de Conjuros con Atributos diferentes. Sólo puedes usar 1 efecto de "Poción de Recuperación de Poder Espiritual" por turno, y sólo una vez ese turno.
  | ja_text               = このカード名はルール上「憑依」カードとしても扱う。このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：自分の墓地の魔法使い族モンスター及び魔法カードの中から任意の数だけ除外して発動できる。自分フィールドの全てのモンスターの攻撃力は除外した数×２００アップし、自分は除外した数×４００ＬＰ回復する。②：自分メインフェイズに墓地のこのカードを除外して発動できる。手札から魔法使い族モンスターを任意の数だけ特殊召喚する（同じ属性は１体まで）。
  | ko_text               = 이 카드명은 룰상 "빙의" 카드로도 취급한다. 이 카드명의 ①②의 효과는 1턴에 1번, 어느 쪽이든 1개밖에 사용할 수 없다. ①: 자신 묘지의 마법사족 몬스터 및 마법 카드 중에서 임의의 수만큼 제외하고 발동할 수 있다. 자신 필드의 모든 몬스터의 공격력은 제외한 수 × 200 올리고, 자신은 제외한 수 × 400 LP 회복한다. ②: 자신 메인 페이즈에 묘지의 이 카드를 제외하고 발동할 수 있다. 패에서 마법사족 몬스터를 임의의 수만큼 특수 소환한다(같은 속성은 1장까지).
  | sc_text               = 此卡名在规则上也视为“凭依”卡。此卡名的①②效果1回合1次，仅可使用其中1个。①：将自己墓地任意数量的魔法师族怪兽及魔法卡除外可以发动。自己场上的所有怪兽的攻击力上升所除外数量×200的数值，自己恢复所除外数量×400LP。②：在自己的主要阶段，将墓地的此卡除外可以发动。从手牌将任意数量的魔法师族怪兽特殊召唤（相同属性最多1只）。
