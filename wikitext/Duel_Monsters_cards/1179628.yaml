  | text                  = "[[Blitzclique]]" [[monsters]] you [[control]] cannot be [[destroy]]ed by your opponent's card [[effect]]s. You can only use each of the following effects of "Blitzclique Return Stroke" [[once per turn]]. When your opponent [[activate]]s a [[Spell Card]] or [[effect]]: You can [[return]] 1 "Blitzclique" monster you control to the [[hand]]; [[negate]] that effect, and if you do, [[destroy]] that card. You can [[banish]] this card from your [[GY]], then [[target]] 1 "Blitzclique" monster in your [[field]] or GY; return it to the hand.
  | fr_text               = Les monstres "Blitzclique" que vous contrôlez ne peuvent pas être détruits par des effets de carte de votre adversaire. Vous ne pouvez utiliser chacun des effets suivants de "Décharge en Retour de la Blitzclique" qu'une fois par tour. Lorsque votre adversaire active une Carte Magie ou effet de Magie : vous pouvez renvoyer 1 monstre "Blitzclique" que vous contrôlez à la main ; annulez l'effet, et si vous le faites, détruisez la carte. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 monstre "Blitzclique" dans votre Terrain ou Cimetière ; renvoyez-le à la main.
  | de_text               = „Blitzclique“-Monster, die du kontrollierst, können nicht durch Karteneffekte deines Gegners zerstört werden. Du kannst jeden der folgenden Effekte von „Blitzcliquen-Rückblitz“ nur einmal pro Spielzug verwenden. Wenn dein Gegner eine Zauberkarte oder einen Zaubereffekt aktiviert: Du kannst 1 „Blitzclique“-Monster, das du kontrollierst, auf die Hand zurückgeben; annulliere jenen Effekt und falls du dies tust, zerstöre jene Karte. Du kannst diese Karte von deinem Friedhof verbannen und dann 1 „Blitzclique“-Monster auf deiner Spielfeldseite oder in deinem Friedhof wählen; gib es auf die Hand zurück.
  | it_text               = I mostri "Blitzclique" che controlli non possono essere distrutti dagli effetti delle carte del tuo avversario. Puoi utilizzare ognuno dei seguenti effetti di "Scarica di Ritorno Blitzclique" una sola volta per turno. Quando il tuo avversario attiva una Carta Magia o un suo effetto: puoi far ritornare 1 mostro "Blitzclique" che controlli nella mano; annulla quell'effetto e, se lo fai, distruggi quella carta. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 mostro "Blitzclique" nel tuo Terreno o Cimitero; fallo ritornare nella mano.
  | pt_text               = Monstros "Blitzclique" que você controla não podem ser destruídos pelos efeitos de card do seu oponente. Você só pode usar cada um dos seguintes efeitos de "Descarga de Retorno Blitzclique" uma vez por turno. Quando seu oponente ativar um Card de Magia ou seus efeitos: você pode devolver 1 monstro "Blitzclique" que você controla para a mão; negue esse efeito e, se isso acontecer, destrua esse card. Você pode banir este card do seu Cemitério e, depois, escolha 1 monstro "Blitzclique" no seu campo ou Cemitério; devolva-o para a mão.
  | es_text               = Los monstruos "Blitzclique" que controlas no pueden ser destruidos por efectos de cartas de tu adversario. Sólo puedes usar cada uno de los siguientes efectos de "Rayo de Retorno Blitzclique" una vez por turno. Cuando tu adversario activa una Carta Mágica o su efecto: puedes devolver a la mano 1 monstruo "Blitzclique" que controles; niega ese efecto y, si lo haces, destruye esa carta. Puedes desterrar esta carta en tu Cementerio, y después selecciona 1 monstruo "Blitzclique" en tu Campo o Cementerio; devuélvelo a la mano.
  | ja_text               = このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが魔法＆罠ゾーンに存在する限り、自分フィールドの「ブリッツクリーク」モンスターは相手の効果では破壊されない。②：相手が魔法カードの効果を発動した時、自分フィールドの「ブリッツクリーク」モンスター１体を手札に戻して発動できる。その効果を無効にし破壊する。③：墓地のこのカードを除外し、自分のフィールド・墓地の「ブリッツクリーク」モンスター１体を対象として発動できる。そのモンスターを手札に戻す。
  | ko_text               = 
  | sc_text               = 此卡名的②③效果1回合仅可各使用1次。①：只要此卡存在于魔法与陷阱区域，自己场上的“雷盟”怪兽不会因对手的效果被破坏。②：对手发动魔法卡的效果时，将自己场上的1只“雷盟”怪兽放回手牌可以发动。将该效果无效并破坏。③：将墓地的此卡除外，以自己场上・墓地的1只“雷盟”怪兽为对象可以发动。将该怪兽放回手牌。
