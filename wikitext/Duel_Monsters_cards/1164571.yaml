  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがデッキから手札に加わった時、または自分のモンスターが戦闘で破壊された時、手札のこのカードを相手に見せて発動できる。このカードを特殊召喚する。②：このカードが手札・デッキから特殊召喚した場合に発動できる。相手フィールドのモンスターを全て破壊する。このターン、自分は「ブルーアイズ」モンスターでしか直接攻撃できない。③：フィールドのこのカードを対象とする効果が発動した時、手札を１枚捨てて発動できる。その効果を無効にする。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 덱에서 패에 넣어졌을 때, 또는 자신 몬스터가 전투로 파괴되었을 때, 패의 이 카드를 상대에게 보여주고 발동할 수 있다. 이 카드를 특수 소환한다. ②: 이 카드를 패 / 덱에서 특수 소환했을 경우에 발동할 수 있다. 상대 필드의 몬스터를 전부 파괴한다. 이 턴에, 자신은 "푸른 눈" 몬스터로밖에 직접 공격할 수 없다. ③: 필드의 이 카드를 대상으로 하는 효과가 발동했을 때, 패를 1장 버리고 발동할 수 있다. 그 효과를 무효로 한다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：此卡从牌组加入手牌时，或自己的怪兽因战斗被破坏时，向对手出示手牌的此卡可以发动。将此卡特殊召唤。②：此卡从手牌・牌组特殊召唤的情况下可以发动。将对手场上的怪兽全部破坏。此回合，自己仅可用“青眼”怪兽直接攻击。③：以场上的此卡为对象的效果发动时，舍弃1张手牌可以发动。将该效果无效。
