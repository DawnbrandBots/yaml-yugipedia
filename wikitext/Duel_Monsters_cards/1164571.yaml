  | text                  = When a card or [[effect]] is [[activate]]d that [[target]]s this card on the [[field]] ([[Quick Effect]]): You can [[discard]] 1 card; [[negate]] that effect. You can only use each of the following effects of "Blue-Eyes White Dragon, the White Phantom Beast" [[once per turn]]. When this card is [[add]]ed from the [[Deck]] to your [[hand]], or your monster is [[destroy]]ed by [[battle]]: You can [[reveal]] this card in your hand; [[Special Summon]] it. If this card is Special Summoned from the hand or Deck: You can destroy all monsters your opponent controls, also you cannot attack [[Direct attack|directly]] for the rest of this [[turn]], except with "[[Blue-Eyes]]" monsters.
