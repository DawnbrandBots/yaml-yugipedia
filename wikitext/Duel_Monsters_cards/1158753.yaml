  | text                = If you [[control]] a [[Fiend]] [[Tuner]] and this card is in your [[hand]]: You can [[Special Summon]] this card. If this card is Special Summoned: You can reduce its [[Level]] by up to 2. If this card is sent to the [[GY]] as [[Synchro Material]] for "[[Red Dragon Archfiend]]" or a [[Synchro Monster]] that mentions it: You can [[target]] 1 [[Level]] 4 or lower Fiend monster in your GY; Special Summon it in [[Defense Position]]. You can only use each [[effect]] of "Fiend Piece Golem" [[once per turn]].
  | fr_text             = Si vous contrôlez un Syntoniseur Démon et que cette carte est dans votre main : vous pouvez Invoquer Spécialement cette carte. Si cette carte est Invoquée Spécialement : vous pouvez réduire son Niveau de max. 2. Si cette carte est envoyée au Cimetière comme Matériel Synchro pour "Dragon Rouge Archdémon" ou un Monstre Synchro qui le mentionne : vous pouvez cibler 1 monstre Démon de max. Niveau 4 dans votre Cimetière ; Invoquez-le Spécialement en Position de Défense. Vous ne pouvez utiliser chaque effet de "Golem Démon" qu'une fois par tour.
  | de_text             = Falls du einen Unterweltler-Empfänger kontrollierst und sich diese Karte in deiner Hand befindet: Du kannst diese Karte als Spezialbeschwörung beschwören. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst ihre Stufe um bis zu 2 verringern. Falls diese Karte als Synchromaterial für „Rotdrachen-Erzunterweltler“ oder ein Synchromonster, das ihn erwähnt, auf den Friedhof gelegt wird: Du kannst 1 Unterweltler-Monster der Stufe 4 oder niedriger in deinem Friedhof wählen; beschwöre es als Spezialbeschwörung in die Verteidigungsposition. Du kannst jeden Effekt von „Teufelsteilgolem“ nur einmal pro Spielzug verwenden.
  | it_text             = Se controlli un Tuner Demone e questa carta è nella tua mano: puoi Evocare Specialmente questa carta. Se questa carta viene Evocata Specialmente: puoi ridurre il suo Livello di fino a 2. Se questa carta viene mandata al Cimitero come Materiale Synchro per "Arcidemone Drago Rosso" o un Mostro Synchro che lo menziona: puoi scegliere come bersaglio 1 mostro Demone di Livello 4 o inferiore nel tuo Cimitero; Evocalo Specialmente in Posizione di Difesa. Puoi utilizzare ogni effetto di "Golem Pezzo Demoniaco" una sola volta per turno.
  | pt_text             = Se você controlar um Regulador Demônio e este card estiver na sua mão: você pode Invocar este card por Invocação-Especial. Se este card for Invocado por Invocação-Especial: você pode reduzir o Nível dele em até 2. Se este card for enviado para o Cemitério como Matéria Sincro para "Dragão Vermelho Arquidemônio" ou um Monstro Sincro que o mencione: você pode escolher 1 monstro Demônio de Nível 4 ou menos no seu Cemitério; Invoque-o por Invocação-Especial em Posição de Defesa. Você só pode usar cada efeito de "Golem de Fragmento Demônio" uma vez por turno.
  | es_text             = Si controlas un Cantante Demonio y esta carta está en tu mano: puedes Invocar esta carta de Modo Especial. Si esta carta es Invocada de Modo Especial: puedes reducir su Nivel hasta en 2. Si esta carta es mandada al Cementerio como Material de Sincronía para "Dragón Rojo Archidemonio" o un Monstruo de Sincronía que lo mencione: puedes seleccionar 1 monstruo Demonio de Nivel 4 o menor en tu Cementerio; Invócalo de Modo Especial en Posición de Defensa. Sólo puedes usar cada efecto de "Gólem de Partes Demoníacas" una vez por turno.
  | ja_text             = このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在し、自分フィールドに悪魔族チューナーが存在する場合に発動できる。このカードを特殊召喚する。②：このカードが特殊召喚した場合に発動できる。このカードのレベルを２つまで下げる。③：このカードが「レッド・デーモンズ・ドラゴン」またはそのカード名が記されたＳモンスターのＳ素材として墓地へ送られた場合、自分の墓地のレベル４以下の悪魔族モンスター１体を対象として発動できる。そのモンスターを守備表示で特殊召喚する。
  | ko_text             = 이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재하고, 자신 필드에 악마족 튜너가 존재할 경우에 발동할 수 있다. 이 카드를 특수 소환한다. ②: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 이 카드의 레벨을 2개까지 내린다. ③: 이 카드가 "레드 데몬즈 드래곤" 또는 그 카드명이 쓰여진 싱크로 몬스터의 싱크로 소재로서 묘지로 보내졌을 경우, 자신 묘지의 레벨 4 이하의 악마족 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 수비 표시로 특수 소환한다.
  | sc_text             = 此卡名的①②③效果1回合仅可各使用1次。①：此卡存在于手牌，且自己场上存在恶魔族协调的情况下可以发动。将此卡特殊召唤。②：此卡特殊召唤的情况下可以发动。此卡的等级下降最多2。③：此卡作为“暗红恶魔龙”或记载有该卡名的同步怪兽的同步素材被送至墓地的情况下，以自己墓地的1只等级4以下的恶魔族怪兽为对象可以发动。将该怪兽以守备表示特殊召唤。
