  | ja_pendulum_effect    = このカード名のＰ効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードをＥＸデッキに戻す。その後、自分のデッキ・ＥＸデッキ（表側）からレベル７のＰモンスター１体を手札に加える事ができる。
  | ja_text               = レベル７以上のＰモンスター＋Ｐモンスター<br />このカード名の③のモンスター効果は１ターンに２度まで使用できる。①：フィールドのこのカードは効果では破壊されない。②：このカードがモンスターゾーンに存在する限り、レベルを持たないＰモンスターを除き、相手モンスターは攻撃できない。③：自分フィールドのモンスター１体をリリースし、相手フィールドのカード１枚を対象として発動できる。そのカードを破壊し、相手に１６００ダメージを与える。④：１ターンに１度、自分メインフェイズに発動できる。このカードを自分のＰゾーンに置く。
  | ko_pendulum_effect    = 이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 이 카드를 엑스트라 덱으로 되돌린다. 그 후, 자신의 덱 / 엑스트라 덱(앞면)에서 레벨 7 의 펜듈럼 몬스터 1장을 패에 넣을 수 있다.
  | ko_text               = 레벨 7 이상의 펜듈럼 몬스터 ＋ 펜듈럼 몬스터<br />이 카드명의 ③의 몬스터 효과는 1턴에 2번까지 사용할 수 있다. ①: 필드의 이 카드는 효과로는 파괴되지 않는다. ②: 이 카드가 몬스터 존에 존재하는 한, 레벨을 가지지 않는 펜듈럼 몬스터가 아닌, 상대 몬스터는 공격할 수 없다. ③: 자신 필드의 몬스터 1장을 릴리스하고, 상대 필드의 카드 1장을 대상으로 하여 발동할 수 있다. 그 카드를 파괴하고, 상대에게 1600 데미지를 준다. ④: 1턴에 1번, 자신 메인 페이즈에 발동할 수 있다. 이 카드를 자신의 펜듈럼 존에 놓는다.
  | sc_pendulum_effect    = 此卡名的灵摆效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将此卡放回额外牌组。然后，可从自己牌组・额外牌组（表侧）将1只等级7的灵摆怪兽加入手牌。
  | sc_text               = 等级7以上的灵摆怪兽＋灵摆怪兽<br />此卡名的③怪兽效果1回合最多可使用2次。①：场上的此卡不会因效果被破坏。②：只要此卡存在于怪兽区域，除了不拥有等级的灵摆怪兽以外，对手怪兽不可攻击。③：解放自己场上的1只怪兽，以对手场上的1张卡为对象可以发动。将该卡破坏，给予对手1600伤害。④：1回合1次，在自己的主要阶段可以发动。将此卡放在自己的灵摆区域。
