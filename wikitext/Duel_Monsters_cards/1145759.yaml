  | text                = 3+ [[Level]] 4 [[monsters]]<br />Your opponent cannot [[target]] [[Rank]] 5 or higher "[[tellarknight]]" or "[[Constellar]]" [[Xyz Monster]]s you [[control]] with card [[effect]]s. [[Once per turn]]: You can [[detach]] 1 [[material]] from this card; [[Add a card|add]] 1 "tellarknight" or "Constellar" monster from your [[Main Deck|Deck]] to your [[hand]], then immediately after this effect [[resolve]]s, you can [[Normal Summon]] 1 [[LIGHT]] monster. If this card is [[sent]] to the [[GY]], except from the [[field]]: You can [[Special Summon]] 1 "tellarknight" or "Constellar" monster from your [[hand]] or [[banish]]ment.
  | fr_text             = 3+ monstres de Niveau 4<br />Votre adversaire ne peut pas cibler de Monstres Xyz "tellchevalier" ou "Constellée" de min. Rang 5 que vous contrôlez avec des effets de carte. Une fois par tour : vous pouvez détacher 1 Matériel de cette carte ; ajoutez 1 monstre "tellchevalier" ou "Constellée" depuis votre Deck à votre main, puis immédiatement après la résolution de cet effet, vous pouvez Invoquer Normalement 1 monstre LUMIÈRE. Si cette carte est envoyée au Cimetière, sauf depuis le Terrain : vous pouvez Invoquer Spécialement 1 monstre "tellchevalier" ou "Constellée" depuis votre main ou bannissement.
  | de_text             = 3+ Monster der Stufe 4<br />Dein Gegner kann „Sternritter“- und „Sternzeichen“-Xyz-Monster des Rangs 5 oder höher, die du kontrollierst, nicht als Ziel für Karteneffekte wählen. Einmal pro Spielzug: Du kannst 1 Material von dieser Karte abhängen; füge deiner Hand 1 „Sternritter“- oder „Sternzeichen“-Monster von deinem Deck hinzu, dann, sofort nachdem dieser Effekt aufgelöst wurde, kannst du 1 LICHT Monster als Normalbeschwörung beschwören. Falls diese Karte auf den Friedhof gelegt wird, außer vom Spielfeld: Du kannst 1 „Sternritter“- oder „Sternzeichen“-Monster als Spezialbeschwörung von deiner Hand oder deinen verbannten Karten beschwören.
  | it_text             = 3+ mostri di Livello 4<br />Il tuo avversario non può scegliere come bersaglio i Mostri Xyz "tellcavaliere" o "Costellazione" di Rango 5 o superiore che controlli con gli effetti delle carte. Una volta per turno: puoi staccare 1 materiale da questa carta; aggiungi 1 mostro "tellcavaliere" o "Costellazione" dal tuo Deck alla tua mano, poi immediatamente dopo che questo effetto si è risolto, puoi Evocare Normalmente 1 mostro LUCE. Se questa carta viene mandata al Cimitero, eccetto dal Terreno: puoi Evocare Specialmente 1 mostro "tellcavaliere" o "Costellazione" dalla tua mano o carte bandite.
  | pt_text             = 3+ monstros de Nível 4<br />Seu oponente não pode escolher Monstros Xyz "Cavaleirost" ou "Constelar" de Classe 5 ou mais que você controla como alvo de efeitos de card. Uma vez por turno: você pode desassociar 1 matéria deste card; adicione 1 monstro "Cavaleirost" ou "Constelar" do seu Deck à sua mão e, depois, imediatamente depois que este efeito resolver, você pode Invocar por Invocação-Normal 1 monstro de LUZ. Se este card for enviado para o Cemitério, exceto do campo: você pode Invocar por Invocação-Especial 1 monstro "Cavaleirost" ou "Constelar" da sua mão ou do banimento.
  | es_text             = 3+ monstruos de Nivel 4<br />Tu adversario no puede seleccionar Monstruos Xyz "telcaballero" o "Constelación" de Rango 5 o mayor que controles con efectos de cartas. Una vez por turno: puedes desacoplar 1 material de esta carta; añade a tu mano 1 monstruo "telcaballero" o "Constelación" en tu Deck e inmediatamente después de que se resuelva este efecto, puedes Invocar de Modo Normal 1 monstruo de LUZ. Si esta carta es mandada al Cementerio, excepto desde el Campo: puedes Invocar de Modo Especial, desde tu mano o destierro, 1 monstruo "telcaballero" o "Constelación".
  | ja_text             = レベル４モンスター×３体以上<br />①：自分フィールドのランク５以上の、「テラナイト」、「セイクリッド」Ｘモンスターを相手は効果の対象にできない。②：１ターンに１度、このカードのＸ素材を１つ取り除いて発動できる。デッキから「テラナイト」、「セイクリッド」モンスター１体を手札に加える。その後、光属性モンスター１体の召喚を行う事ができる。③：このカードがフィールド以外から墓地へ送られた場合に発動できる。自分の手札・除外状態の「テラナイト」、「セイクリッド」モンスター１体を特殊召喚する。
  | ko_text             = 레벨 4 몬스터 × 3장 이상<br />①: 자신 필드의 랭크 5 이상의, "테라나이트", "세이크리드" 엑시즈 몬스터를 상대는 효과의 대상으로 할 수 없다. ②: 1턴에 1번, 이 카드의 엑시즈 소재를 1개 제거하고 발동할 수 있다. 덱에서 "테라나이트", "세이크리드" 몬스터 1장을 패에 넣는다. 그 후, 빛 속성 몬스터 1장의 일반 소환을 실행할 수 있다. ③: 이 카드가 필드 이외에서 묘지로 보내졌을 경우에 발동할 수 있다. 자신의 패 / 제외 상태인 "테라나이트", "세이크리드" 몬스터 1장을 특수 소환한다.
  | sc_text             = 等级4怪兽×3只以上<br />①：对手不可将自己场上的阶级5以上的、“星骑士”、“星圣”超量怪兽作为效果的对象。②：1回合1次，去除此卡的1个超量素材可以发动。从牌组将1只“星骑士”、“星圣”怪兽加入手牌。然后，可进行1只光属性怪兽的召唤。③：此卡从场上以外的地方被送至墓地的情况下可以发动。将自己手牌・除外状态的1只“星骑士”、“星圣”怪兽特殊召唤。
