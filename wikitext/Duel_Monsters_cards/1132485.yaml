  | text                = [[Monster]]s in your leftmost or rightmost [[Main Monster Zone]]s cannot be [[destroy]]ed by [[card effect]]s. You can only use each of the following [[effect]]s of "Buio the Dawn's Light" [[once per turn]]. If this card is in your [[hand]]: You can [[target]] 1 [[Fiend]] [[Effect Monster]] you [[control]]; [[negate]] its effects, and if you do, [[Special Summon]] this card. If this card is [[Send|sent]] to the [[GY]]: You can [[add]] 1 "[[Mutiny in the Sky]]" from your [[Main Deck|Deck]] to your hand.
  | fr_text             = Les monstres dans vos Zones Monstre Main la plus à gauche ou la plus à droite ne peuvent pas être détruits par des effets de carte. Vous ne pouvez utiliser chacun des effets suivants de "Buio la Lumière de l'Aube" qu'une fois par tour. Si cette carte est dans votre main : vous pouvez cibler 1 Monstre à Effet Démon que vous contrôlez ; annulez ses effets, et si vous le faites, Invoquez Spécialement cette carte. Si cette carte est envoyée au Cimetière : vous pouvez ajouter 1 "Mutinerie Céleste" depuis votre Deck à votre main.
  | de_text             = Monster in deiner ganz linken und ganz rechten Main-Monsterzone können nicht durch Karteneffekte zerstört werden. Du kannst jeden der folgenden Effekte von „Buio das Dämmerungslicht“ nur einmal pro Spielzug verwenden. Falls sich diese Karte in deiner Hand befindet: Du kannst 1 Unterweltler-Effektmonster wählen, das du kontrollierst; annulliere seine Effekte und falls du dies tust, beschwöre diese Karte als Spezialbeschwörung. Falls diese Karte auf den Friedhof gelegt wird: Du kannst deiner Hand 1 „Meuterei am Himmel“ von deinem Deck hinzufügen.
  | it_text             = I mostri nelle tue Zone Mostri Main più a sinistra e più a destra non possono essere distrutti dagli effetti delle carte. Puoi utilizzare ognuno dei seguenti effetti di "Buio la Luce dell'Alba" una sola volta per turno. Se questa carta è nella tua mano: puoi scegliere come bersaglio 1 Mostro con Effetto Demone che controlli; annulla i suoi effetti e, se lo fai, Evoca Specialmente questa carta. Se questa carta viene mandata al Cimitero: puoi aggiungere 1 "Ammutinamento nel Cielo" dal tuo Deck alla tua mano.
  | pt_text             = Monstros nas suas Zonas de Monstros Principais mais à esquerda ou mais à direita não podem ser destruídos por efeitos de card. Você só pode usar cada um dos seguintes efeitos de "Buio, a Luz do Alvorecer" uma vez por turno. Se este card estiver na sua mão: você pode escolher 1 Monstro de Efeito Demônio que você controla; negue seus efeitos e, se isso acontecer, Invoque este card por Invocação-Especial. Se este card for enviado para o Cemitério: você pode adicionar 1 "Motim no Céu" do seu Deck à sua mão.
  | es_text             = Los monstruos en tus Zonas de Monstruos Principales al extremo izquierdo o al extremo derecho no pueden ser destruidos por efectos de cartas. Sólo puedes usar cada uno de los siguientes efectos de "Buio la Luz del Alba" una vez por turno. Si esta carta está en tu mano: puedes seleccionar 1 Monstruo de Efecto Demonio que controles; niega sus efectos y, si lo haces, Invoca esta carta de Modo Especial. Si esta carta es mandada al Cementerio: puedes añadir a tu mano 1 "Motín en el Cielo" en tu Deck.
  | ja_text             = このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、自分フィールドの悪魔族の効果モンスター１体を対象として発動できる。そのモンスターの効果を無効にし、このカードを特殊召喚する。②：このカードがモンスターゾーンに存在する限り、自分の左端・右端のメインモンスターゾーンのモンスターは効果では破壊されない。③：このカードが墓地へ送られた場合に発動できる。デッキから「天至る叛逆」１枚を手札に加える。
  | ko_text             = 
  | sc_text             = 此卡名的①③效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，以自己场上的1只恶魔族效果怪兽为对象可以发动。将该怪兽的效果无效，将此卡特殊召唤。②：只要此卡存在于怪兽区域，自己左端・右端的主要怪兽区域的怪兽就不会因效果被破坏。③：此卡被送至墓地的情况下可以发动。从牌组将1张“至天的叛逆”加入手牌。
