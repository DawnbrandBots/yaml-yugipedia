  | ja_text               = 攻撃力２１００以上の機械族モンスター×３<br />このカードは融合召喚でしか特殊召喚できない。このカード名の①の効果は１ターンに１度しか使用できない。①：光属性モンスターのみを素材としてこのカードが融合召喚した場合、４０００ＬＰを払って発動できる。デッキから「リミッター解除」１枚を手札に加える。②：このカードが守備表示モンスターを攻撃した場合、その守備力を攻撃力が超えた分だけ相手に戦闘ダメージを与える。③：元々の攻撃力より高い攻撃力を持つこのカードは１度のバトルフェイズ中に３回攻撃できる。
  | ko_text               = 공격력 2100 이상인 기계족 몬스터 × 3<br />이 카드는 융합 소환으로밖에 특수 소환할 수 없다. 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 빛 속성 몬스터만을 소재로서 이 카드를 융합 소환했을 경우, 4000 LP를 지불하고 발동할 수 있다. 덱에서 "리미터 해제" 1장을 패에 넣는다. ②: 이 카드가 수비 표시 몬스터를 공격했을 경우, 그 수비력을 공격력이 넘은 만큼만 상대에게 전투 데미지를 준다. ③: 원래 공격력보다 높은 공격력을 가지는 이 카드는 1번의 배틀 페이즈 중에 3회 공격할 수 있다.
  | sc_text               = 攻击力2100以上的机械族怪兽×3<br />此卡仅可以融合召唤方式特殊召唤。此卡名的①效果1回合仅可使用1次。①：仅以光属性怪兽作为素材的此卡融合召唤的情况下，支付4000LP可以发动。从牌组将1张“限制解除”加入手牌。②：此卡攻击守备表示怪兽的情况下，依攻击力超出该怪兽守备力的数值来给予对手战斗伤害。③：攻击力高于原本攻击力的此卡在1次战斗阶段中可攻击3次。
