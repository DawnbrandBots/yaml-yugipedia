  | text                  = (This card is always treated as a "[[Predap]]" card.)<br />[[Target]] 1 "[[Starving Venom Fusion Dragon]]" in your [[Monster Zone]]; it cannot [[attack]] this [[turn]], also [[destroy]] as many [[monsters]] your opponent [[control]]s as possible with less [[ATK]] than that monster, then you can [[discard]] your entire hand, and if you do, inflict damage to your opponent equal to the combined original ATK of monsters destroyed by this [[effect]].
  | fr_text               = (Cette carte est toujours traitée comme carte "Prédap".)<br />Ciblez 1 "Dragon Fusion Venin Affamé" dans votre Zone Monstre ; il ne peut pas attaquer ce tour, et aussi, détruisez autant de monstres contrôlés par votre adversaire que possible avec une ATK inférieure au monstre, puis vous pouvez défausser toute votre main, et si vous le faites, infligez des dommages à votre adversaire égaux à la somme des ATK d'origine des monstres détruits par cet effet.
  | de_text               = (Diese Karte wird immer als „Raubp“-Karte behandelt.)<br />Wähle 1 „Hungergift-Fusionsdrache“ in deiner Monsterzone; er kann in diesem Spielzug nicht angreifen, zusätzlich zerstöre so viele Monster, die dein Gegner kontrolliert und die weniger ATK als jenes Monster haben, wie möglich, dann kannst du deine gesamte Hand abwerfen und falls du dies tust, füge deinem Gegner Schaden in Höhe der kombinierten Grund-ATK der durch diesen Effekt zerstörten Monster zu.
  | it_text               = (Questa carta viene sempre considerata come una carta "Predap".)<br />Scegli come bersaglio 1 "Drago Fusione Veleno Affamato" nella tua Zona Mostri; esso non può attaccare in questo turno, inoltre distruggi tanti mostri controllati dal tuo avversario con ATK inferiore a quel mostro quanti possibile, poi puoi scartare tutta la tua mano e, se lo fai, infliggi al tuo avversario danno pari alla somma degli ATK originali dei mostri distrutti da questo effetto.
  | pt_text               = (Este card deve ser sempre considerado como um card "Predap".)<br />Escolha 1 "Dragão Fusão de Peçonha Insaciável" na sua Zona de Monstros; ele não pode atacar neste turno e, além disso, destrua tantos monstros que seu oponente controla quanto possível com ATK menor que o desse monstro e, depois, você pode descartar toda a sua mão e, se isso acontecer, cause dano ao seu oponente igual ao ATK original combinado dos monstros destruídos por este efeito.
  | es_text               = (Esta carta se trata siempre como una carta "Predap").<br />Selecciona 1 "Dragón de Fusión Hambriento Venenoso" en tu Zona de Monstruos; este turno, éste no puede atacar, y además destruye tantos monstruos que controle tu adversario con menos ATK que ese monstruo como sea posible, y después puedes descartar toda tu mano y, si lo haces, inflige daño a tu adversario igual al ATK original combinado de los monstruos destruidos por este efecto.
  | ja_text               = このカード名はルール上「プレデター」カードとしても扱う。①：自分フィールドの「スターヴ・ヴェノム・フュージョン・ドラゴン」１体を対象として発動できる。そのモンスターより低い攻撃力を持つ相手フィールドのモンスターを全て破壊する。その後、以下の効果を適用できる。このターン、対象のモンスターは攻撃できない。●自分の手札を全て捨て、この効果で破壊したモンスターの元々の攻撃力の合計分のダメージを相手に与える。
  | ko_text               = 이 카드명은 룰상 "프레데터" 카드로도 취급한다. ①: 자신 필드의 "스타브 베놈 퓨전 드래곤" 1장을 대상으로 하고 발동할 수 있다. 그 몬스터보다 낮은 공격력을 가지는 상대 필드의 몬스터를 전부 파괴한다. 그 후, 이하의 효과를 적용할 수 있다. 이 턴에, 대상 몬스터는 공격할 수 없다. ●자신의 패를 전부 버리고, 이 효과로 파괴한 몬스터의 원래 공격력의 합계만큼의 데미지를 상대에게 준다.
  | sc_text               = 此卡名在规则上也视为“捕食”卡。①：以自己场上的1只“凶饿猛毒结合龙”为对象可以发动。将攻击力低于该怪兽的对手场上的怪兽全部破坏。然后，可适用以下效果。此回合，对象怪兽不可攻击。<br />●将自己手牌全部舍弃，给予对手相当于以此效果破坏的怪兽原本攻击力合计数值的伤害。
