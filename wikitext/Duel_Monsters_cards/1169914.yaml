  | text                  = 1 [[Tuner]] + 1+ [[Synchro Monster]]s<br />The [[Level]]s of [[monsters]] your opponent [[control]]s are increased by 2. Your Tuners can make a second [[attack]] during each [[Battle Phase]]. When your opponent [[activate]]s a [[monster effect]] ([[Quick Effect]]): You can [[target]] 1 Tuner in your [[GY]] or [[banish]]ment, except a Level 10 Tuner; [[Add a card|add]] it to your [[hand]] or [[Special Summon]] it, then immediately after this effect resolves, you can [[Synchro Summon]] 1 [[Synchro Monster]]. You can only use this effect of "Kewl Tune B2B" twice per turn.
  | fr_text               = 1 Syntoniseur + 1+ Monstre Synchro<br />Le Niveau des monstres contrôlés par votre adversaire est augmenté de 2. Vos Syntoniseurs peuvent faire une seconde attaque durant chaque Battle Phase. Lorsque votre adversaire active un effet de monstre (Effet Rapide) : vous pouvez cibler 1 Syntoniseur (Syntoniseurs de Niveau 10 exclus) dans votre Cimetière ou bannissement ; ajoutez-le à votre main ou Invoquez-le Spécialement, puis immédiatement après la résolution de cet effet, vous pouvez Invoquer par Synchronisation 1 Monstre Synchro. Vous ne pouvez utiliser cet effet de "B2B du Son Kewl" que deux fois par tour.
  | de_text               = 1 Empfänger + 1+ Synchromonster<br />Die Stufen der Monster, die dein Gegner kontrolliert, werden um 2 erhöht. Deine Empfänger können während jeder Battle Phase einen zweiten Angriff durchführen. Wenn dein Gegner einen Monstereffekt aktiviert (Schnelleffekt): Du kannst 1 Empfänger in deinem Friedhof oder von deinen verbannten Karten wählen, außer einem Empfänger der Stufe 10; füge ihn deiner Hand hinzu oder beschwöre ihn als Spezialbeschwörung, dann, sofort nachdem dieser Effekt aufgelöst wurde, kannst du 1 Synchromonster als Synchrobeschwörung beschwören. Du kannst diesen Effekt von „Kewl-Empfang B2B“ nur zweimal pro Spielzug verwenden.
  | it_text               = 1 Tuner + 1+ Mostri Synchro<br />I Livelli dei mostri controllati dal tuo avversario vengono aumentati di 2. I tuoi Tuner possono effettuare un secondo attacco durante ogni Battle Phase. Quando il tuo avversario attiva l'effetto di un mostro (Effetto Rapido): puoi scegliere come bersaglio 1 Tuner nel tuo Cimitero o carte bandite, eccetto un Tuner di Livello 10; aggiungilo alla tua mano o Evocalo Specialmente, poi immediatamente dopo che questo effetto si è risolto, puoi Synchro Evocare 1 Mostro Synchro. Puoi utilizzare questo effetto di "Tune Figo B2B" solo due volte per turno.
  | pt_text               = 1 Regulador + 1+ Monstros Sincro<br />Os Níveis dos monstros que seu oponente controla aumentam em 2. Seus Reguladores podem realizar um segundo ataque durante cada Fase de Batalha. Quando seu oponente ativar um efeito de monstro (Efeito Rápido): você pode escolher 1 Regulador no seu Cemitério ou banimento, exceto um Regulador de Nível 10; adicione-o à sua mão ou Invoque-o por Invocação-Especial e, depois, imediatamente depois que este efeito resolver, você pode Invocar 1 Monstro Sincro por Invocação-Sincro. Você só pode usar este efeito de "Kewl Tune B2B" duas vezes por turno.
  | es_text               = 1 Cantante + 1+ Monstruos de Sincronía<br />Los Niveles de los monstruos que controla tu adversario aumentan en 2. Tus Cantantes pueden hacer un segundo ataque durante cada Battle Phase. Cuando tu adversario activa un efecto de monstruo (Efecto Rápido): puedes seleccionar 1 Cantante en tu Cementerio o destierro, excepto un Cantante de Nivel 10; añádelo a tu mano o Invócalo de Modo Especial, e inmediatamente después de que se resuelva este efecto, puedes Invocar por Sincronía 1 Monstruo de Sincronía. Sólo puedes usar este efecto de "Canción Kewl B2B" dos veces por turno.
  | ja_text               = チューナー＋Ｓモンスター１体以上<br />このカード名の③の効果は１ターンに２度まで使用できる。①：相手フィールドのモンスターのレベルは２つ上がる。②：自分のチューナーは１度のバトルフェイズ中に２回攻撃できる。③：相手がモンスターの効果を発動した時、レベル１０以外の自分の墓地・除外状態のチューナー１体を対象として発動できる。そのモンスターを手札に加えるか特殊召喚する。その後、Ｓモンスター１体のＳ召喚を行う事ができる。
  | ko_text               = 튜너 ＋ 싱크로 몬스터 1장 이상<br />이 카드명의 ③의 효과는 1턴에 2번까지 사용할 수 있다. ①: 상대 필드의 몬스터의 레벨은 2개 올라간다. ②: 자신의 튜너는 1번의 배틀 페이즈 중에 2회 공격할 수 있다. ③: 상대가 몬스터의 효과를 발동했을 때, 레벨 10 이외의 자신의 묘지 / 제외 상태인 튜너 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 패에 넣거나 특수 소환한다. 그 후, 싱크로 몬스터 1장의 싱크로 소환을 실행할 수 있다.
  | sc_text               = 协调＋同步怪兽1只以上<br />此卡名的③效果1回合最多可使用2次。①：对手场上的怪兽的等级上升2。②：自己的协调在1次战斗阶段中可攻击2次。③：对手发动怪兽效果时，以等级10以外的、自己墓地・除外状态的1只协调为对象可以发动。将该怪兽加入手牌或特殊召唤。然后，可进行1只同步怪兽的同步召唤。
