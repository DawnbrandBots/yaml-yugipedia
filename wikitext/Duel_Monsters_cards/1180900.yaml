  | text                  = You can [[Special Summon]] this card (from your [[hand]]) by [[return]]ing 1 or 2 [[monsters]] you [[control]] to the [[hand]]. You can only Special Summon "Astrazma Urania" [[once per turn]] this way. You can only use each of the following [[effect]]s of "Astrazma Urania" once per turn. If this card is Special Summoned: You can [[reveal]] any number of monsters in your [[hand]] with different [[Level]]s, then [[target]] that many [[face-up]] cards your opponent [[control]]s; [[negate]] their effects. If this card on the [[field]] is [[destroy]]ed by card effect and [[sent]] to the [[GY]]: You can [[Add a card|add]] this card to your hand.
  | fr_text               = Vous pouvez Invoquer Spécialement cette carte (depuis votre main) en renvoyant 1 ou 2 monstres que vous contrôlez à la main. Vous ne pouvez Invoquer Spécialement "Astrazma Urania" qu'une fois par tour de cette façon. Vous ne pouvez utiliser chacun des effets suivants de "Astrazma Urania" qu'une fois par tour. Si cette carte est Invoquée Spécialement : vous pouvez révéler un nombre de votre choix de monstres dans votre main de Niveaux différents, puis ciblez autant de cartes face recto contrôlées par votre adversaire ; annulez leurs effets. Si cette carte sur le Terrain est détruite par un effet de carte et envoyée au Cimetière : vous pouvez ajouter cette carte à votre main.
  | de_text               = Du kannst diese Karte als Spezialbeschwörung (von deiner Hand) beschwören, indem du 1 oder 2 Monster, die du kontrollierst, auf die Hand zurückgibst. Du kannst „Astrazma Urania“ nur einmal pro Spielzug auf diese Art als Spezialbeschwörung beschwören. Du kannst jeden der folgenden Effekte von „Astrazma Urania“ nur einmal pro Spielzug verwenden. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst eine beliebige Anzahl Monster mit unterschiedlichen Stufen in deiner Hand vorzeigen und dann ebenso viele offene Karten wählen, die dein Gegner kontrolliert; annulliere ihre Effekte. Falls diese Karte auf dem Spielfeld durch einen Karteneffekt zerstört und auf den Friedhof gelegt wird: Du kannst diese Karte deiner Hand hinzufügen.
  | it_text               = Puoi Evocare Specialmente questa carta (dalla tua mano) facendo ritornare 1 o 2 mostri che controlli nella mano. Puoi Evocare Specialmente "Astrazma Urania" una sola volta per turno in questo modo. Puoi utilizzare ognuno dei seguenti effetti di "Astrazma Urania" una sola volta per turno. Se questa carta viene Evocata Specialmente: puoi rivelare un qualsiasi numero di mostri nella tua mano con Livelli diversi, poi scegliere come bersaglio quel numero di carte scoperte controllate dal tuo avversario; annulla i loro effetti. Se questa carta sul Terreno viene distrutta dall'effetto di una carta e mandata al Cimitero: puoi aggiungere questa carta alla tua mano.
  | pt_text               = Você pode Invocar este card por Invocação-Especial (da sua mão) ao devolver 1 ou 2 monstros que você controla para a mão. Você só pode Invocar "Urânia Astrazma" por Invocação-Especial uma vez por turno desta forma. Você só pode usar cada um dos seguintes efeitos de "Urânia Astrazma" uma vez por turno. Se este card for Invocado por Invocação-Especial: você pode revelar qualquer número de monstros na sua mão com Níveis diferentes e, depois, escolha esse número de cards com a face para cima que seu oponente controla; negue seus efeitos. Se este card no campo for destruído por um efeito de card e enviado para o Cemitério: você pode adicionar este card à sua mão.
  | es_text               = Puedes Invocar esta carta de Modo Especial (desde tu mano) devolviendo a la mano 1 o 2 monstruos que controles. Sólo puedes Invocar de Modo Especial "Astrazma Urania" una vez por turno de esta forma. Sólo puedes usar cada uno de los siguientes efectos de "Astrazma Urania" una vez por turno. Si esta carta es Invocada de Modo Especial: puedes mostrar cualquier número de monstruos en tu mano con Niveles diferentes, y después selecciona ese número de cartas boca arriba que controle tu adversario; niega sus efectos. Si esta carta en el Campo es destruida por el efecto de una carta y mandada al Cementerio: puedes añadir esta carta a tu mano.
  | ja_text               = このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードは自分フィールドのモンスターを２体まで手札に戻し、手札から特殊召喚できる。②：このカードが特殊召喚した場合、手札のモンスターを任意の数だけ相手に見せ（同じレベルは１体まで）、その数だけ相手フィールドの表側表示カードを対象として発動できる。そのカードの効果を無効にする。③：フィールドのこのカードが効果で破壊され墓地へ送られた場合に発動できる。このカードを手札に加える。
  | ko_text               = 이 카드명의, ①의 방법에 의한 특수 소환은 1턴에 1번밖에 할 수 없으며, ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드는 자신 필드의 몬스터를 2장까지 패로 되돌리고, 패에서 특수 소환할 수 있다. ②: 이 카드를 특수 소환했을 경우, 패의 몬스터를 임의의 수만큼 상대에게 보여주고(같은 레벨은 1장까지), 그 수만큼 상대 필드의 앞면 표시 카드를 대상으로 하여 발동할 수 있다. 그 카드의 효과를 무효로 한다. ③: 필드의 이 카드가 효과로 파괴되어 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 패에 넣는다.
  | sc_text               = 此卡名以①方法的特殊召唤1回合仅可进行1次，且②③效果1回合仅可各使用1次。①：此卡可通过将自己场上的最多2只怪兽放回手牌，来从手牌特殊召唤。②：此卡特殊召唤的情况下，向对手出示任意数量的手牌的怪兽（相同等级最多1只），依其数量以对手场上的表侧表示卡为对象可以发动。将该卡的效果无效。③：场上的此卡因效果被破坏并被送至墓地的情况下可以发动。将此卡加入手牌。
