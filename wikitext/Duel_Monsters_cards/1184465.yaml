  | text                  = [[Activate]] 1 of these [[effect]]s, but you cannot [[declare]] [[attack]]s for the rest of this [[turn]], except with [[Fusion Monster]]s;<br />● [[Special Summon]] 1 "[[Aiwass, Divine Spirit of the Law]]" from your [[Main Deck|Deck]] or [[GY]].<br />● Take 1 "[[Aleister]]" [[monster]] from your Deck, and either [[send]] it to the GY or banish it.<br />● Look at 3 [[random]] face-down cards in your opponent's [[Extra Deck]], and if you do, banish 1 of them.<br />You can only activate 1 "Sacred Spirit Sword Aiwass" per turn.
  | fr_text               = Activez 1 de ces effets, mais vous ne pouvez pas déclarer d'attaques le reste de ce tour, sauf avec des Monstres Fusion ;<br />● Invoquez Spécialement 1 "Aiwass, Esprit Divin de la Loi" depuis votre Deck ou Cimetière.<br />● Prenez 1 monstre "Aleister" depuis votre Deck, et soit envoyez-le au Cimetière soit bannissez-le.<br />● Regardez 3 cartes face verso au hasard dans l'Extra Deck de votre adversaire, et si vous le faites, bannissez-en 1.<br />Vous ne pouvez activer qu'1 "Épée de l'Esprit Sacré Aiwass" par tour.
  | de_text               = Aktiviere 1 dieser Effekte, aber du kannst für den Rest dieses Spielzugs keine Angriffe deklarieren, außer mit Fusionsmonstern;<br />● Beschwöre 1 „Aiwass, göttlicher Geist des Gesetzes“ als Spezialbeschwörung von deinem Deck oder Friedhof.<br />● Nimm 1 „Aleister“-Monster von deinem Deck und lege es entweder auf den Friedhof oder verbanne es.<br />● Sieh dir 3 zufällige verdeckte Karten im Extra Deck deines Gegners an und falls du dies tust, verbanne 1 von ihnen.<br />Du kannst nur 1 „Heiliges Geisterschwert Aiwass“ pro Spielzug aktivieren.
  | it_text               = Attiva 1 di questi effetti, ma non puoi dichiarare attacchi per il resto di questo turno, eccetto con Mostri Fusione;<br />● Evoca Specialmente 1 "Aiwass, Spirito Divino della Legge" dal tuo Deck o Cimitero.<br />● Prendi 1 mostro "Aleister" dal tuo Deck, e mandalo al Cimitero oppure bandiscilo.<br />● Guarda 3 carte coperte a caso nell'Extra Deck del tuo avversario e, se lo fai, bandisci 1 di esse.<br />Puoi attivare solo 1 "Aiwass Spada Spirito Sacro" per turno.
  | pt_text               = Ative 1 desses efeitos, mas você não pode declarar ataques pelo resto deste turno, exceto com Monstros de Fusão;<br />● Invoque por Invocação-Especial 1 "Aiwass, o Espírito Divino da Lei" do seu Deck ou Cemitério.<br />● Pegue 1 monstro "Aleister" do seu Deck e envie-o para o Cemitério ou bana-o.<br />● Olhe 3 cards aleatórios com a face para baixo no Deck Adicional do seu oponente e, se isso acontecer, bana 1 deles.<br />Você só pode ativar 1 "Espada do Espírito Sagrado Aiwass" por turno.
  | es_text               = Activa 1 de estos efectos, pero no puedes declarar ataques por el resto de este turno, excepto con Monstruos de Fusión;<br />● Invoca de Modo Especial, desde tu Deck o Cementerio, 1 "Aiwass, Espíritu Divino de la Ley".<br />● Toma 1 monstruo "Aleister" en tu Deck, y ya sea mándalo al Cementerio o destiérralo.<br />● Mira 3 cartas boca abajo al azar en el Deck Extra de tu adversario y, si lo haces, destierra 1 de ellas.<br />Sólo puedes activar 1 "Espada Aiwass Espíritu Sagrado" por turno.
