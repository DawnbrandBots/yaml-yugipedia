  | ja_text               = チューナー＋チューナー以外のモンスター１体以上<br />このカード名はルール上「スピードロイド」カードとしても扱う。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合に発動できる。相手フィールドの効果モンスター１体を破壊し、その元々の攻撃力分だけこのカードの攻撃力をアップする。②：相手が効果を発動した時に発動できる。自分の手札・墓地からレベル４以下の風属性チューナー１体を効果を無効にして特殊召喚する。その後、風属性Ｓモンスター１体のＳ召喚を行う事ができる。
  | ko_text               = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />이 카드명은 룰상 "스피드로이드" 카드로도 취급한다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 상대 필드의 효과 몬스터 1장을 파괴하고, 그 원래 공격력만큼만 이 카드의 공격력을 올린다. ②: 상대가 효과를 발동했을 때에 발동할 수 있다. 자신의 패 / 묘지에서 레벨 4 이하의 바람 속성 튜너 1장을 효과를 무효로 하고 특수 소환한다. 그 후, 바람 속성 싱크로 몬스터 1장의 싱크로 소환을 실행할 수 있다.
  | sc_text               = 协调＋协调以外的怪兽1只以上<br />此卡名在规则上也视为“疾行机人”卡。此卡名的①②效果1回合仅可各使用1次。①：此卡特殊召唤的情况下可以发动。将对手场上的1只效果怪兽破坏，此卡的攻击力上升相当于其原本攻击力的数值。②：对手发动效果时可以发动。从自己手牌・墓地将1只等级4以下的风属性协调效果无效并特殊召唤。然后，可进行1只风属性同步怪兽的同步召唤。
