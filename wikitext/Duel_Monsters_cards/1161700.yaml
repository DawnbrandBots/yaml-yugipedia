  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の手札・墓地・除外状態からそれぞれ１体まで、光属性の「妖精伝姫」モンスターを特殊召喚する（同名カードは１枚まで）。このターン、自分は魔法使い族モンスターしか特殊召喚できない。②：このカードが除外された場合、またはフィールド以外から墓地へ送られた場合に発動できる。このカードを自分フィールドにセットする。この効果でセットしたこのカードは、自分フィールドに「妖精伝姫」モンスターが存在しない場合には発動できない。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신의 패 / 묘지 / 제외 상태에서 각각 1장까지, 빛 속성의 "페어리테일" 몬스터를 특수 소환한다(같은 이름의 카드는 1장까지). 이 턴에, 자신은 마법사족 몬스터밖에 특수 소환할 수 없다. ②: 이 카드가 제외되었을 경우, 또는 필드 이외에서 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 자신 필드에 세트한다. 이 효과로 세트한 이 카드는, 자신 필드에 "페어리테일" 몬스터가 존재하지 않을 경우에는 발동할 수 없다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：从自己手牌・墓地・除外状态各将最多1只光属性的“妖精传姬”怪兽特殊召唤（同名卡最多1张）。此回合，自己仅可特殊召唤魔法师族怪兽。②：此卡被除外的情况下，或从场上以外的地方被送至墓地的情况下可以发动。将此卡放置在自己场上。以此效果放置的此卡，在自己场上不存在“妖精传姬”怪兽的情况下就不可发动。
