  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：デッキ・ＥＸデッキから「獄神」モンスター１体を墓地へ送る。その後、デッキから天使族・闇属性モンスター１体を手札に加える事ができる。このターン、自分は「獄神」モンスターでしか攻撃宣言できない。②：自分の「獄神」モンスターが相手モンスターと戦闘を行うダメージステップ開始時、墓地のこのカードを除外して発動できる。その相手モンスターを裏側で除外する。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱 / 엑스트라 덱에서 "감옥신" 몬스터 1장을 묘지로 보낸다. 그 후, 덱에서 천사족 / 어둠 속성 몬스터 1장을 패에 넣을 수 있다. 이 턴에, 자신은 "감옥신" 몬스터로밖에 공격 선언할 수 없다. ②: 자신의 "감옥신" 몬스터가 상대 몬스터와 전투를 실행하는 데미지 스텝 개시시, 묘지의 이 카드를 제외하고 발동할 수 있다. 그 상대 몬스터를 뒷면으로 제외한다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：从牌组・额外牌组将1只“狱神”怪兽送至墓地。然后，可从牌组将1只天使族・暗属性怪兽加入手牌。此回合，自己仅可用“狱神”怪兽攻击宣言。②：自己的“狱神”怪兽与对手怪兽进行战斗的伤害步骤开始时，将墓地的此卡除外可以发动。将该对手怪兽以里侧除外。
