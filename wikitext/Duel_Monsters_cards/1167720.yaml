  | text                  = [[Send]] 1 "[[Power Patron]]" [[monster]] from your [[Main Deck|Deck]]/[[Extra Deck]] to the [[GY]], then you can [[Add a card|add]] 1 [[DARK]] [[Fairy]] [[monster]] from your Deck to your [[hand]], also you cannot declare [[attack]]s for the rest of this [[turn]], except with "Power Patron" monsters. At the start of the [[Damage Step]], if your "Power Patron" monster [[battle]]s an opponent's monster: You can [[banish]] this card from your GY; banish ([[face-down]]) that opponent's monster. You can only use each [[effect]] of "Prohibited Power Patron Portal - Terminus" once per [[turn]].
  | fr_text               = Envoyez 1 monstre "Mécène du Pouvoir" depuis votre Deck/Extra Deck au Cimetière, puis vous pouvez ajouter 1 monstre TÉNÈBRES Elfe depuis votre Deck à votre main, et aussi, vous ne pouvez pas déclarer d'attaques (sauf avec des monstres "Mécène du Pouvoir") le reste de ce tour. Au début de la Damage Step, si votre monstre "Mécène du Pouvoir" combat un monstre de l'adversaire : vous pouvez bannir cette carte depuis votre Cimetière ; bannissez (face verso) le monstre de l'adversaire. Vous ne pouvez utiliser chaque effet de "Portail Prohibé du Mécène du Pouvoir - Terminus" qu'une fois par tour.
  | de_text               = Lege 1 „Machtpatron“-Monster von deinem Deck / Extra Deck auf den Friedhof, dann kannst du deiner Hand 1 FINSTERNIS Fee-Monster von deinem Deck hinzufügen, zusätzlich kannst du für den Rest dieses Spielzugs keine Angriffe deklarieren, außer mit „Machtpatron“-Monstern. Am Beginn des Damage Steps, falls dein „Machtpatron“-Monster gegen ein Monster eines Gegners kämpft: Du kannst diese Karte von deinem Friedhof verbannen; verbanne jenes Monster des Gegners (verdeckt). Du kannst jeden Effekt von „Gesperrtes Machtpatron-Portal - Terminus“ nur einmal pro Spielzug verwenden.
  | it_text               = Manda 1 mostro "Patrono Potente" dal tuo Deck/Extra Deck al Cimitero, poi puoi aggiungere 1 mostro OSCURITÀ Fata dal tuo Deck alla tua mano, inoltre non puoi dichiarare attacchi per il resto di questo turno, eccetto con mostri "Patrono Potente". All'inizio del Damage Step, se un tuo mostro "Patrono Potente" combatte con un mostro dell'avversario: puoi bandire questa carta dal tuo Cimitero; bandisci (coperto) quel mostro dell'avversario. Puoi utilizzare ogni effetto di "Portale Patrono Potente Vietato - Terminus" una sola volta per turno.
  | pt_text               = Envie 1 monstro "Patrono(a) do Poder" do seu Deck/Deck Adicional para o Cemitério e, depois, você pode adicionar 1 monstro Fada de TREVAS do seu Deck à sua mão e, além disso, você não pode declarar ataques pelo resto deste turno, exceto com monstros "Patrono(a) do Poder". No começo da Etapa de Dano, se um monstro "Patrono(a) do Poder" seu batalhar um monstro do oponente: você pode banir este card do seu Cemitério; bana (com a face para baixo) esse monstro do oponente. Você só pode usar cada efeito de "Portal Interdito do Patrono do Poder - Terminus" uma vez por turno.
  | es_text               = Manda al Cementerio 1 monstruo "Modelo de Poder" en tu Deck/Deck Extra, y después puedes añadir a tu mano 1 monstruo Hada de OSCURIDAD en tu Deck, y además no puedes declarar ataques por el resto de este turno, excepto con monstruos "Modelo de Poder". Al comienzo del Damage Step, si tu monstruo "Modelo de Poder" batalla con un monstruo del adversario: puedes desterrar esta carta en tu Cementerio; destierra (boca abajo) ese monstruo del adversario. Sólo puedes usar cada efecto de "Portal de Modelo de Poder Vetado - Término" una vez por turno.
  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：デッキ・ＥＸデッキから「獄神」モンスター１体を墓地へ送る。その後、デッキから天使族・闇属性モンスター１体を手札に加える事ができる。このターン、自分は「獄神」モンスターでしか攻撃宣言できない。②：自分の「獄神」モンスターが相手モンスターと戦闘を行うダメージステップ開始時、墓地のこのカードを除外して発動できる。その相手モンスターを裏側で除外する。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱 / 엑스트라 덱에서 "감옥신" 몬스터 1장을 묘지로 보낸다. 그 후, 덱에서 천사족 / 어둠 속성 몬스터 1장을 패에 넣을 수 있다. 이 턴에, 자신은 "감옥신" 몬스터로밖에 공격 선언할 수 없다. ②: 자신의 "감옥신" 몬스터가 상대 몬스터와 전투를 실행하는 데미지 스텝 개시시, 묘지의 이 카드를 제외하고 발동할 수 있다. 그 상대 몬스터를 뒷면으로 제외한다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：从牌组・额外牌组将1只“狱神”怪兽送至墓地。然后，可从牌组将1只天使族・暗属性怪兽加入手牌。此回合，自己仅可用“狱神”怪兽攻击宣言。②：自己的“狱神”怪兽与对手怪兽进行战斗的伤害步骤开始时，将墓地的此卡除外可以发动。将该对手怪兽以里侧除外。
