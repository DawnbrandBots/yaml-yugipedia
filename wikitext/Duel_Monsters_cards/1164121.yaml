  | text                = Apply the following [[effect]], 3 times, in sequence.<br />● Each player [[reveal]]s 1 [[Monster Card|monster]] from their [[Main Deck|Deck]] that does not have ? [[ATK]]. [[Add a card|Add]] the monster with the higher ATK to the [[hand]] of the player that revealed it, also [[destroy]] the monster with the lower ATK and inflict 500 [[Effect damage|damage]] to the player that revealed it. If tied, [[shuffle]] those monsters into the Decks.<br />For the rest of this [[turn]], neither player can [[activate]] the effects of monsters with any of their revealed monsters' names. You can only activate 1 "Subspace Battle" per turn.
  | fr_text             = Appliquez l'effet suivant, 3 fois, dans l'ordre.<br />● Chaque joueur révèle 1 monstre depuis son Deck qui n'a pas ? ATK. Ajoutez le monstre avec la plus haute ATK à la main du joueur qui l'a révélé, et aussi, détruisez le monstre avec la plus faible ATK et infligez 500 points de dommages au joueur qui l'a révélé. En cas d'égalité, mélangez ces monstres dans les Decks.<br />Le reste de ce tour, aucun joueur ne peut activer les effets des monstres des noms de leurs monstres révélés. Vous ne pouvez activer qu'1 "Bataille Sous-Spatiale" par tour.
  | de_text             = Führe den folgenden Effekt 3-mal nacheinander aus.<br />● Jeder Spieler zeigt 1 Monster, das nicht ? ATK hat, von seinem Deck vor. Füge das Monster mit den höheren ATK der Hand des Spielers hinzu, der es vorgezeigt hat, zusätzlich zerstöre das Monster mit den niedrigeren ATK und füge dem Spieler, der es vorgezeigt hat, 500 Schaden zu. Bei Gleichstand mische jene Monster in die Decks.<br />Für den Rest dieses Spielzugs kann kein Spieler die Effekte von Monstern mit einem der Namen seiner vorgezeigten Monster aktivieren. Du kannst nur 1 „Kampf im Subraum“ pro Spielzug aktivieren.
  | it_text             = Applica il seguente effetto, 3 volte di fila.<br />● Ogni giocatore rivela dal suo Deck 1 mostro che non ha ? ATK. Aggiungi il mostro con l'ATK maggiore alla mano del giocatore che l'ha rivelato, inoltre distruggi il mostro con l'ATK inferiore e infliggi 500 danni al giocatore che l'ha rivelato. In caso di parità, mischia quei mostri nei Deck.<br />Per il resto di questo turno, nessun giocatore può attivare gli effetti dei mostri con qualsiasi dei nomi dei suoi mostri rivelati. Puoi attivare solo 1 "Battaglia Subspaziale" per turno.
  | pt_text             = Aplique o seguinte efeito, 3 vezes em sequência.<br />● Cada duelista revela 1 monstro do Deck dele que não tenha ATK ?. Adicione o monstro com o maior ATK à mão do duelista que o revelou e, além disso, destrua o monstro com o menor ATK e cause 500 de dano ao duelista que o revelou. Em caso de empate, embaralhe esses monstros nos Decks.<br />Pelo resto deste turno, nenhum duelista pode ativar os efeitos de monstros com qualquer um dos nomes de monstros que revelou. Você só pode ativar 1 "Batalha Subespacial" por turno.
  | es_text             = Aplica el siguiente efecto, 3 veces en secuencia.<br />● Cada jugador muestra 1 monstruo en su Deck que no tenga ? ATK. Añade el monstruo con el mayor ATK a la mano del jugador que lo mostró, y además destruye el monstruo con el menor ATK e inflige 500 puntos de daño al jugador que lo mostró. Si hay empate, baraja esos monstruos a los Decks.<br />Por el resto de este turno, ningún jugador puede activar los efectos de monstruos con cualquiera de los nombres de sus monstruos mostrados. Sólo puedes activar 1 "Batalla Subespacial" por turno.
  | ja_text             = このカード名のカードは１ターンに１枚しか発動できない。①：以下の効果を３回適用する。●お互いはそれぞれ自身のデッキから攻撃力？以外のモンスター１体を選び、お互いに確認する。攻撃力が高い方のモンスターは、それを選んだプレイヤーの手札に加わる。攻撃力が低い方のモンスターは破壊され、それを選んだプレイヤーは５００ダメージを受ける。攻撃力が同じだった場合、選んだモンスターはデッキに戻す。このターン、お互いはこの効果で自身が選んだモンスター及びその同名モンスターのモンスター効果を発動できない。
