  | ja_text               = このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手のスタンバイフェイズに発動できる。自分の墓地・除外状態の「道化の一座」カード３枚をデッキに戻す。その後、自分は１枚ドローする。②：自分がモンスターをＡ召喚した場合、そのＡ召喚のためにリリースしたモンスターの数まで、フィールドの他の魔法・罠カードを対象として発動できる。そのカードを破壊する。③：このカードがフィールド以外から墓地へ送られた場合に発動できる。このカードを自分フィールドに表側表示で置く。
  | ko_text               = 이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대의 스탠바이 페이즈에 발동할 수 있다. 자신의 묘지 / 제외 상태인 "크라운 클랜" 카드 3장을 덱으로 되돌린다. 그 후, 자신은 1장 드로우한다. ②: 자신이 몬스터를 어드밴스 소환했을 경우, 그 어드밴스 소환을 위해 릴리스한 몬스터의 수까지, 필드의 다른 마법 / 함정 카드를 대상으로 하고 발동할 수 있다. 그 카드를 파괴한다. ③: 이 카드가 필드 이외에서 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 자신 필드에 앞면 표시로 놓는다.
  | sc_text               = 此卡名的①②③效果1回合仅可各使用1次。①：在自己・对手的准备阶段可以发动。将自己墓地・除外状态的3张“小丑戏帮”卡放回牌组。然后，自己抽1张。②：自己将怪兽上级召唤的情况下，以为该上级召唤而解放的怪兽数量为上限，以场上的其他魔法・陷阱卡为对象可以发动。将该卡破坏。③：此卡从场上以外的地方被送至墓地的情况下可以发动。将此卡以表侧表示放在自己场上。
