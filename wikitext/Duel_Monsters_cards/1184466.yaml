  | text                  = [[Banish]] 1 "[[Aleister]]" [[monster]] or 1 [[Fusion Monster]] from your [[GY]]; [[Special Summon]] 1 "[[Invoked]]" monster from your [[Extra Deck]], [[ignoring its Summoning conditions]], but [[banish]] it during the [[End Phase]]. If a monster is [[banish]]ed [[face-up]], while this card is in your GY (except during the [[Damage Step]]): You can banish this card, then [[target]] 1 of your banished "Invoked" monsters; Special Summon it. You can only use each effect of "Gamma Summon" once per turn.
  | fr_text               = Bannissez 1 monstre "Aleister" ou 1 Monstre Fusion depuis votre Cimetière ; Invoquez Spécialement 1 monstre "Invokhé" depuis votre Extra Deck, en ignorant ses conditions d'Invocation, mais bannissez-le durant la End Phase. Si un monstre est banni face recto, tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez bannir cette carte, puis ciblez 1 de vos monstres "Invokhé" bannis ; Invoquez-le Spécialement. Vous ne pouvez utiliser chaque effet de "Invocation Gamma" qu'une fois par tour.
  | de_text               = Verbanne 1 „Aleister“-Monster oder 1 Fusionsmonster von deinem Friedhof; beschwöre 1 „Beschworen“-Monster als Spezialbeschwörung von deinem Extra Deck, ungeachtet seiner Beschwörungsbedingungen, aber verbanne es während der End Phase. Falls ein Monster offen verbannt wird, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte verbannen und dann 1 deiner verbannten „Beschworen“-Monster wählen; beschwöre es als Spezialbeschwörung. Du kannst jeden Effekt von „Gamma-Beschwörung“ nur einmal pro Spielzug verwenden.
  | it_text               = Bandisci 1 mostro "Aleister" o 1 Mostro Fusione dal tuo Cimitero; Evoca Specialmente 1 mostro "Invokato" dal tuo Extra Deck, ignorando le sue condizioni di Evocazione, ma bandiscilo durante la End Phase. Se un mostro viene bandito scoperto, mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi bandire questa carta, poi scegliere come bersaglio 1 dei tuoi mostri "Invokato" banditi; Evocalo Specialmente. Puoi utilizzare ogni effetto di "Evocazione Gamma" una sola volta per turno.
  | pt_text               = Bana 1 monstro "Aleister" ou 1 Monstro de Fusão do seu Cemitério; Invoque por Invocação-Especial 1 monstro "Invokado(a)" do seu Deck Adicional, ignorando suas condições de Invocação, mas bana-o durante a Fase Final. Se um monstro for banido com a face para cima, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode banir este card e, depois, escolha 1 dos seus monstros "Invokado(a)" banidos; Invoque-o por Invocação-Especial. Você só pode usar cada efeito de "Invocação Gama" uma vez por turno.
  | es_text               = Destierra 1 monstruo "Aleister" o 1 Monstruo de Fusión en tu Cementerio; Invoca de Modo Especial, desde tu Deck Extra, 1 monstruo "Invokado/a", ignorando sus condiciones de Invocación, pero destiérralo durante la End Phase. Si un monstruo es desterrado boca arriba, mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes desterrar esta carta, y después selecciona 1 de tus monstruos "Invokado/a" desterrados; Invócalo de Modo Especial. Sólo puedes usar cada efecto de "Invocación Gamma" una vez por turno.
  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の墓地から「アレイスター」モンスターか融合モンスター１体を除外して発動できる。ＥＸデッキから「召喚獣」モンスター１体を召喚条件を無視して特殊召喚する。この効果で特殊召喚したモンスターはエンドフェイズに除外される。②：このカードが墓地に存在する状態で、モンスターが表側で除外された場合、このカードを除外し、自分の除外状態の「召喚獣」モンスター１体を対象として発動できる。そのモンスターを特殊召喚する。
