  | pt_text               = 2+ monstros, incluindo um monstro "Força-S"<br />Enquanto seu oponente controlar um monstro na coluna deste card, ele não pode escolher este card como alvo de efeitos de card, nem Invocar por Invocação-Especial com um efeito de monstro ativado. (Efeito Rápido): você pode escolher 1 monstro no campo; mova-o para outra Zona de Monstros Principal no campo do seu controlador. Você só pode usar este efeito de "Força-S Mistify" uma vez por turno.
