  | text                  = If this card on the [[field]] would be used as [[Synchro Material]], 1 [[Tuner]] in your [[hand]] can be used as 1 of the other materials. You can only use each of the following effects of "Kewl Tune Rotary" [[once per turn]]. You can [[reveal]] this card and 1 Tuner in your hand; immediately after this [[effect]] [[resolve]]s, [[Normal Summon]] 1 Tuner. If this card is sent to the [[GY]] as Synchro Material: You can activate 1 of these effects;<br />● Place 1 card from your opponent's [[GY]] on the bottom of their [[Main Deck|Deck]].<br />● Look at your opponent's hand, then you can [[Add a card|add]] 1 "[[Kewl Tune]]" [[Spell]]/[[Trap]] from your [[Main Deck|Deck]] to your hand.
  | fr_text               = Si cette carte sur le Terrain va être utilisée comme Matériel Synchro, 1 Syntoniseur dans votre main peut être utilisé comme 1 des autres Matériels. Vous ne pouvez utiliser chacun des effets suivants de "Rotatif du Son Kewl" qu'une fois par tour. Vous pouvez révéler cette carte et 1 Syntoniseur dans votre main ; immédiatement après la résolution de cet effet, Invoquez Normalement 1 Syntoniseur. Si cette carte est envoyée au Cimetière comme Matériel Synchro : vous pouvez activer 1 de ces effets ;<br />● Placez 1 carte depuis le Cimetière de votre adversaire au-dessous de son Deck.<br />● Regardez la main de votre adversaire, puis vous pouvez ajouter 1 Magie/Piège "Son Kewl" depuis votre Deck à votre main.
  | de_text               = Falls diese Karte auf dem Spielfeld als Synchromaterial verwendet würde, kann 1 Empfänger in deiner Hand als 1 des anderen Materials verwendet werden. Du kannst jeden der folgenden Effekte von „Kewl-Empfang Drehregler“ nur einmal pro Spielzug verwenden. Du kannst diese Karte und 1 Empfänger in deiner Hand vorzeigen; sofort nachdem dieser Effekt aufgelöst wurde, beschwöre 1 Empfänger als Normalbeschwörung. Falls diese Karte als Synchromaterial auf den Friedhof gelegt wird: Du kannst 1 dieser Effekte aktivieren;<br />● Lege 1 Karte vom Friedhof deines Gegners unter sein Deck.<br />● Sieh dir die Hand deines Gegners an, dann kannst du deiner Hand 1 „Kewl-Empfang“-Zauber/Falle von deinem Deck hinzufügen.
  | it_text               = Se questa carta sul Terreno sta per essere utilizzata come Materiale Synchro, 1 Tuner nella tua mano può essere utilizzato come 1 degli altri materiali. Puoi utilizzare ognuno dei seguenti effetti di "Tune Figo Rotativo" una sola volta per turno. Puoi rivelare questa carta e 1 Tuner nella tua mano; immediatamente dopo che questo effetto si è risolto, Evoca Normalmente 1 Tuner. Se questa carta viene mandata al Cimitero come Materiale Synchro: puoi attivare 1 di questi effetti;<br />● Metti 1 carta dal Cimitero del tuo avversario in fondo al suo Deck.<br />● Guarda la mano del tuo avversario, poi puoi aggiungere 1 Magia/Trappola "Tune Figo" dal tuo Deck alla tua mano.
  | pt_text               = Se este card no campo seria usado como Matéria Sincro, 1 Regulador na sua mão pode ser usado como 1 das outras matérias. Você só pode usar cada um dos seguintes efeitos de "Kewl Tune Botões" uma vez por turno. Você pode revelar este card e 1 Regulador na sua mão; imediatamente depois que este efeito resolver, Invoque por Invocação-Normal 1 Regulador. Se este card for enviado para o Cemitério como Matéria Sincro: você pode ativar 1 desses efeitos;<br />● Coloque 1 card do Cemitério do seu oponente no fundo do Deck dele.<br />● Olhe a mão do seu oponente e, depois, você pode adicionar 1 Magia/Armadilha "Kewl Tune" do seu Deck à sua mão.
  | es_text               = Si esta carta en el Campo fuera a ser usada como Material de Sincronía, 1 Cantante en tu mano puede ser usado como 1 de los otros materiales. Sólo puedes usar cada uno de los siguientes efectos de "Canción Kewl Rotary" una vez por turno. Puedes mostrar esta carta y 1 Cantante en tu mano; inmediatamente después de que se resuelva este efecto, Invoca de Modo Normal 1 Cantante. Si esta carta es mandada al Cementerio como Material de Sincronía: puedes activar 1 de estos efectos;<br />● Pon en la parte inferior de su Deck 1 carta en el Cementerio de tu adversario.<br />● Mira la mano de tu adversario, y después puedes añadir a tu mano 1 Mágica/Trampa "Canción Kewl" en tu Deck.
  | ja_text               = フィールドのこのカードを素材としてＳ召喚する場合、手札のチューナー１体もＳ素材にできる。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードと手札のチューナー１体を相手に見せて発動できる。チューナー１体の召喚を行う。②：このカードがＳ素材として墓地へ送られた場合、以下の効果から１つを選択して発動できる。●相手の墓地からカード１枚をデッキの一番下に戻す。●相手の手札を全て確認する。その後、デッキから「キラーチューン」魔法・罠カード１枚を手札に加える事ができる。
  | ko_text               = 필드의 이 카드를 소재로서 싱크로 소환할 경우, 패의 튜너 1장도 싱크로 소재로 할 수 있다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드와 패의 튜너 1장을 상대에게 보여주고 발동할 수 있다. 튜너 1장의 일반 소환을 실행한다. ②: 이 카드가 싱크로 소재로서 묘지로 보내졌을 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다. ●상대 묘지에서 카드 1장을 덱 맨 아래로 되돌린다. ●상대의 패를 전부 확인한다. 그 후, 덱에서 "킬러튠" 마법 / 함정 카드 1장을 패에 넣을 수 있다.
  | sc_text               = 要以场上的此卡作为素材同步召唤的情况下，可将手牌的1只协调也作为同步素材。此卡名的①②效果1回合仅可各使用1次。①：向对手出示手牌的此卡与手牌的1只协调可以发动。进行1只协调的召唤。②：此卡作为同步素材被送至墓地的情况下，可从以下效果中选择1个发动。●从对手墓地将1张卡放回牌组最下面。●确认对手的所有手牌。然后，可从牌组将1张“杀手旋律”魔法・陷阱卡加入手牌。
