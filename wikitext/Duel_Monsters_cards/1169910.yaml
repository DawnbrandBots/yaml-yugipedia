  | ja_text               = フィールドのこのカードを素材としてＳ召喚する場合、手札のチューナー１体もＳ素材にできる。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードと手札のチューナー１体を相手に見せて発動できる。チューナー１体の召喚を行う。②：このカードがＳ素材として墓地へ送られた場合、以下の効果から１つを選択して発動できる。●相手の墓地からカード１枚をデッキの一番下に戻す。●相手の手札を全て確認する。その後、デッキから「キラーチューン」魔法・罠カード１枚を手札に加える事ができる。
  | ko_text               = 필드의 이 카드를 소재로서 싱크로 소환할 경우, 패의 튜너 1장도 싱크로 소재로 할 수 있다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드와 패의 튜너 1장을 상대에게 보여주고 발동할 수 있다. 튜너 1장의 일반 소환을 실행한다. ②: 이 카드가 싱크로 소재로서 묘지로 보내졌을 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다. ●상대 묘지에서 카드 1장을 덱 맨 아래로 되돌린다. ●상대의 패를 전부 확인한다. 그 후, 덱에서 "킬러튠" 마법 / 함정 카드 1장을 패에 넣을 수 있다.
  | sc_text               = 要以场上的此卡作为素材同步召唤的情况下，可将手牌的1只协调也作为同步素材。此卡名的①②效果1回合仅可各使用1次。①：向对手出示手牌的此卡与手牌的1只协调可以发动。进行1只协调的召唤。②：此卡作为同步素材被送至墓地的情况下，可从以下效果中选择1个发动。●从对手墓地将1张卡放回牌组最下面。●确认对手的所有手牌。然后，可从牌组将1张“杀手旋律”魔法・陷阱卡加入手牌。
