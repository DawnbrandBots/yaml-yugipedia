  | text                = During the [[turn]] in which your opponent has [[Special Summon]]ed 10 or more [[monsters]], neither player can activate cards or [[effect]]s in response to this card's activation. Apply the following [[effect]]s in sequence, based on the number of monsters your opponent Special Summoned this turn.<br />● 1+: Special Summon 1 [[DARK]] [[Synchro Monster]] from your [[GY]] or [[banish]]ment.<br />● 3+: Every "[[Red Dragon Archfiend]]" in your [[Monster Zone]] is [[unaffected]] by your opponent's activated effects, until the end of your next turn.<br />● 5+: Change all your opponent's monsters to [[face-down]] [[Defense Position]].<br />You can only [[activate]] 1 "King's Resonance" per turn.
  | fr_text             = Durant le tour où votre adversaire a Invoqué Spécialement min. 10 monstres, aucun joueur ne peut activer ni de cartes ni d'effets en réponse à l'activation de cette carte. Appliquez les effets suivants dans l'ordre, selon le nombre de monstres que votre adversaire a Invoqué Spécialement ce tour.<br />● 1+ : Invoquez Spécialement 1 Monstre Synchro TÉNÈBRES depuis votre Cimetière ou bannissement.<br />● 3+ : Jusqu'à la fin de votre prochain tour, chaque "Dragon Rouge Archdémon" dans votre Zone Monstre n'est pas affecté par les effets activés de votre adversaire.<br />● 5+ : Changez tous les monstres de votre adversaire en Position de Défense face verso.<br />Vous ne pouvez activer qu'1 "Résonance du Roi" par tour.
  | de_text             = Während des Spielzugs, in dem dein Gegner 10 oder mehr Monster als Spezialbeschwörung beschworen hat, kann kein Spieler Karten oder Effekte als Reaktion auf die Aktivierung dieser Karte aktivieren. Führe nacheinander die folgenden Effekte aus, basierend auf der Anzahl der Monster, die dein Gegner in diesem Spielzug als Spezialbeschwörung beschworen hat.<br />● 1+: Beschwöre 1 FINSTERNIS Synchromonster als Spezialbeschwörung von deinem Friedhof oder deinen verbannten Karten.<br />● 3+: Jeder „Rotdrachen-Erzunterweltler“ in deiner Monsterzone bleibt bis zum Ende deines nächsten Spielzugs von aktivierten Effekten deines Gegners unberührt.<br />● 5+: Ändere alle Monster deines Gegners in die verdeckte Verteidigungsposition.<br />Du kannst nur 1 „Kings Resonanz“ pro Spielzug aktivieren.
  | it_text             = Durante un turno in cui il tuo avversario ha Evocato Specialmente 10 o più mostri, nessun giocatore può attivare carte o effetti in risposta all'attivazione di questa carta. Applica i seguenti effetti in ordine, a seconda del numero di mostri che il tuo avversario ha Evocato Specialmente in questo turno.<br />● 1+: Evoca Specialmente 1 Mostro Synchro OSCURITÀ dal tuo Cimitero o carte bandite.<br />● 3+: Ogni "Arcidemone Drago Rosso" nella tua Zona Mostri è immune agli effetti attivati del tuo avversario, fino alla fine del tuo prossimo turno.<br />● 5+: Metti coperti in Posizione di Difesa tutti i mostri del tuo avversario.<br />Puoi attivare solo 1 "Risonanza del Re" per turno.
  | pt_text             = Durante o turno no qual seu oponente tenha Invocado 10 ou mais monstros por Invocação-Especial, nenhum duelista pode ativar cards ou efeitos em resposta à ativação deste card. Aplique os seguintes efeitos em sequência, de acordo com o número de monstros que seu oponente Invocou por Invocação-Especial neste turno.<br />● 1+: Invoque por Invocação-Especial 1 Monstro Sincro de TREVAS do seu Cemitério ou banimento.<br />● 3+: Até o final do seu próximo turno, cada "Dragão Vermelho Arquidemônio" na sua Zona de Monstros não é afetado pelos efeitos ativados do seu oponente.<br />● 5+: Coloque todos os monstros do seu oponente com a face para baixo em Posição de Defesa.<br />Você só pode ativar 1 "Ressonância do Rei" por turno.
  | es_text             = Durante el turno en el que tu adversario ha Invocado de Modo Especial 10 o más monstruos, ningún jugador puede activar cartas o efectos en respuesta a la activación de esta carta. Aplica los siguientes efectos en secuencia, basados en el número de monstruos que tu adversario Invocó de Modo Especial este turno.<br />● 1+: Invoca de Modo Especial 1 Monstruo de Sincronía de OSCURIDAD desde tu Cementerio o destierro.<br />● 3+: Cada "Dragón Rojo Archidemonio" en tu Zona de Monstruos no es afectado por los efectos activados de tu adversario, hasta el final de tu próximo turno.<br />● 5+: Cambia todos los monstruos de tu adversario a Posición de Defensa boca abajo.<br />Sólo puedes activar 1 "Resonancia del Rey" por turno.
  | ja_text             = このカード名のカードは１ターンに１枚しか発動できず、相手が１０体以上のモンスターを特殊召喚したターン、このカードの発動に対して効果は発動できない。①：このターンに相手が特殊召喚したモンスターの数によって、以下の効果をそれぞれ適用する。<br />●１体以上：自分の墓地・除外状態の闇属性Ｓモンスター１体を特殊召喚する。<br />●３体以上：次の自分ターンの終了時までの間、自分のモンスターゾーンの「レッド・デーモンズ・ドラゴン」は相手が発動した効果を受けない。<br />●５体以上：相手フィールドのモンスターを全て裏側守備表示にする。
  | ko_text             = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없으며, 상대가 10장 이상의 몬스터를 특수 소환한 턴에, 이 카드의 발동에 대하여 효과는 발동할 수 없다. ①: 이 턴에 상대가 특수 소환한 몬스터의 수에 따라, 이하의 효과를 각각 적용한다.<br />●1장 이상: 자신의 묘지 / 제외 상태인 어둠 속성 싱크로 몬스터 1장을 특수 소환한다.<br />●3장 이상: 다음 자신 턴의 종료시까지 동안, 자신 몬스터 존의 "레드 데몬즈 드래곤"은 상대가 발동한 효과를 받지 않는다.<br />●5장 이상: 상대 필드의 몬스터를 전부 뒷면 수비 표시로 한다.
  | sc_text             = 此卡名的卡1回合仅可发动1张，对手特殊召唤过10只以上怪兽的回合，应对此卡的发动不可发动效果。①：根据此回合对手特殊召唤过的怪兽数量，分别适用以下效果。<br />●1只以上：将自己墓地・除外状态的1只暗属性同步怪兽特殊召唤。<br />●3只以上：直至下个自己回合结束时为止的期间，自己的怪兽区域的“暗红恶魔龙”不受对手发动的效果影响。<br />●5只以上：将对手场上的怪兽全部改成里侧守备表示。
