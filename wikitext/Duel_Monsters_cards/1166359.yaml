  | ja_text               = 効果モンスター２体<br />このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：Ｌ召喚したこのカードが表側表示で存在する限り１度だけ、自分はレベル５以上のモンスターを召喚する場合に必要なリリースをなくす事ができる。②：自分・相手のメインフェイズに発動できる。レベル５以上の闇属性モンスター１体の召喚を行う。③：自分エンドフェイズに発動できる。手札のモンスターを任意の数だけ相手に見せ、好きな順番でデッキの下に戻す。その後、自分は戻した数だけドローする。
  | ko_text               = 효과 몬스터 2장<br />이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 링크 소환한 이 카드가 앞면 표시로 존재하는 한 1번만, 자신은 레벨 5 이상의 몬스터를 일반 소환할 경우에 필요한 릴리스를 없앨 수 있다. ②: 자신 / 상대의 메인 페이즈에 발동할 수 있다. 레벨 5 이상의 어둠 속성 몬스터 1장의 일반 소환을 실행한다. ③: 자신 엔드 페이즈에 발동할 수 있다. 패의 몬스터를 임의의 수만큼 상대에게 보여주고, 좋아하는 순서대로 덱 아래로 되돌린다. 그 후, 자신은 되돌린 수만큼 드로우한다.
  | sc_text               = 效果怪兽2只<br />此卡名的①②③效果1回合仅可各使用1次。①：只要连接召唤的此卡以表侧表示存在，仅限1次，自己要召唤等级5以上怪兽的情况下，可免除所必须的解放。②：在自己・对手的主要阶段可以发动。进行1只等级5以上的暗属性怪兽的召唤。③：在自己的结束阶段可以发动。向对手出示手牌任意数量的怪兽，并以喜欢的顺序放回牌组下面。然后，自己依放回的数量抽牌。
