  | text                  = If your opponent goes first, you can also [[activate]] this card from your [[hand]] during the [[Standby Phase]] of their first [[turn]]. Place 1 "[[Angelechy]]" [[Field Spell]] from your [[hand]], [[Main Deck|Deck]], or [[GY]], [[face-up]] on your [[field]], and if you do, [[Special Summon]] 1 [[Level]] 2 or 7 "Angelechy" [[monster]] from your [[Extra Deck]] to the [[Extra Monster Zone]], and if you do that, place 1 "Angelechy" monster from your Extra Deck in your [[Spell & Trap Zone]] as a face-up [[Continuous Spell]]. Until the end of your next turn after this card [[resolve]]s, you cannot Special Summon from the Extra Deck, except [[Synchro Monster]]s.
  | fr_text               = Si votre adversaire joue en premier, vous pouvez aussi activer cette carte depuis votre main durant la Standby Phase de son premier tour. Placez face recto 1 Magie de Terrain "Angetélité" depuis votre main, Deck ou Cimetière sur votre Terrain, et si vous le faites, Invoquez Spécialement 1 monstre "Angetélité" de Niveau 2 ou 7 depuis votre Extra Deck dans la Zone Monstre Extra, et si vous faites ça, placez 1 monstre "Angetélité" depuis votre Extra Deck dans votre Zone Magie & Piège comme Magie Continue face recto. Jusqu'à la fin de votre prochain tour après la résolution de cette carte, vous ne pouvez pas Invoquer Spécialement (Monstres Synchro exclus) depuis l'Extra Deck.
  | de_text               = Falls dein Gegner das Spiel beginnt, kannst du diese Karte auch während der Standby Phase seines ersten Spielzugs von deiner Hand aktivieren. Lege 1 „Engelechy“-Spielfeldzauber von deiner Hand, deinem Deck oder deinem Friedhof offen auf deine Spielfeldseite und falls du dies tust, beschwöre 1 „Engelechy“-Monster der Stufe 2 oder 7 als Spezialbeschwörung von deinem Extra Deck in die Extra-Monsterzone und falls du dies tust, lege 1 „Engelechy“-Monster von deinem Extra Deck als offenen Permanenten Zauber in deine Zauber- & Fallenzone. Du kannst bis zum Ende deines nächsten Spielzugs, nachdem diese Karte aufgelöst wurde, keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Synchromonstern.
  | it_text               = Se il tuo avversario inizia la partita, puoi anche attivare questa carta dalla tua mano durante la Standby Phase del suo primo turno. Metti 1 Magia Terreno "Angelechy" dalla tua mano, Deck o Cimitero, scoperta sul tuo Terreno e, se lo fai, Evoca Specialmente 1 mostro "Angelechy" di Livello 2 o 7 dal tuo Extra Deck nella Zona Mostri Extra e, se fai quello, metti 1 mostro "Angelechy" dal tuo Extra Deck nella tua Zona Magie & Trappole come una Magia Continua scoperta. Fino alla fine del tuo prossimo turno dopo che questa carta si è risolta, non puoi Evocare Specialmente dall'Extra Deck, eccetto Mostri Synchro.
  | pt_text               = Se seu oponente começar, você também pode ativar este card da sua mão durante a Fase de Apoio do primeiro turno dele. Coloque 1 Magia de Campo "Anjoléquia" da sua mão, do Deck ou do Cemitério, no seu campo com a face para cima e, se isso acontecer, Invoque por Invocação-Especial 1 monstro "Anjoléquia" de Nível 2 ou 7 do seu Deck Adicional na Zona de Monstros Adicional e, se isso acontecer, coloque 1 monstro "Anjoléquia" do seu Deck Adicional na sua Zona de Magias & Armadilhas como uma Magia Contínua com a face para cima. Até o final do seu próximo turno depois que este card resolver, você não pode Invocar por Invocação-Especial do Deck Adicional, exceto Monstros Sincro.
  | es_text               = Si tu adversario va primero, también puedes activar esta carta desde tu mano durante la Standby Phase de su primer turno. Pon boca arriba en tu Campo 1 Mágica de Campo "Angelequia" en tu mano, Deck o Cementerio y, si lo haces, Invoca de Modo Especial, desde tu Deck Extra, 1 monstruo "Angelequia" de Nivel 2 o 7 a la Zona de Monstruos Extra y, si haces eso, pon en tu Zona de Magia y Trampas como una Mágica Continua boca arriba 1 monstruo "Angelequia" en tu Deck Extra. Hasta el final de tu próximo turno después de que esta carta se resuelva, no puedes Invocar de Modo Especial desde el Deck Extra, excepto Monstruos de Sincronía.
