  | text                = You can [[reveal]] this card in your [[hand]]; [[Special Summon]] it, or if your opponent [[control]]s no [[monsters]], Special Summon it to their [[field]] in [[Defense Position]] instead. [[Once per turn]], during your [[Standby Phase]]: Take 500 [[Effect damage|damage]]. If this card is [[banish]]ed, or [[sent]] to the [[GY]] by card [[effect]]: You can [[target]] 1 [[Set]] [[Spell]]/[[Trap]] your opponent controls; [[destroy]] it. Your opponent cannot activate that card in response to this effect's activation. You can only use this effect of "Poisonous Viper" [[once per turn]].
  | fr_text             = Vous pouvez révéler cette carte dans votre main ; Invoquez-la Spécialement, ou si votre adversaire ne contrôle aucun monstre, Invoquez-la Spécialement sur son Terrain en Position de Défense à la place. Une fois par tour, durant votre Standby Phase : recevez 500 points de dommages. Si cette carte est bannie ou envoyée au Cimetière par un effet de carte : vous pouvez cibler 1 Magie/Piège Posé contrôlé par votre adversaire ; détruisez-le. Votre adversaire ne peut pas activer la carte en réponse à l'activation de cet effet. Vous ne pouvez utiliser cet effet de "La Virulente Vipère" qu'une fois par tour.
  | de_text             = Du kannst diese Karte in deiner Hand vorzeigen; beschwöre sie als Spezialbeschwörung oder falls dein Gegner keine Monster kontrolliert, beschwöre sie stattdessen als Spezialbeschwörung auf seine Spielfeldseite in die Verteidigungsposition. Einmal pro Spielzug, während deiner Standby Phase: Du erhältst 500 Schaden. Falls diese Karte durch einen Karteneffekt verbannt oder auf den Friedhof gelegt wird: Du kannst 1 gesetzte/n Zauber/Falle wählen, den oder die dein Gegner kontrolliert; zerstöre ihn oder sie. Dein Gegner kann jene Karte nicht als Reaktion auf die Aktivierung dieses Effekts aktivieren. Du kannst diesen Effekt von „Toxische Viper“ nur einmal pro Spielzug verwenden.
  | it_text             = Puoi rivelare questa carta nella tua mano; Evocala Specialmente o, se il tuo avversario non controlla nessun mostro, invece Evocala Specialmente sul suo Terreno in Posizione di Difesa. Una volta per turno, durante la tua Standby Phase: subisci 500 danni. Se questa carta viene bandita, o mandata al Cimitero dall'effetto di una carta: puoi scegliere come bersaglio 1 Magia/Trappola Posizionata controllata dal tuo avversario; distruggila. Il tuo avversario non può attivare quella carta in risposta all'attivazione di questo effetto. Puoi utilizzare questo effetto di "Vipera Tossica" una sola volta per turno.
  | pt_text             = Você pode revelar este card na sua mão; Invoque-o por Invocação-Especial, ou se seu oponente não controlar nenhum monstro, em vez disso, Invoque-o por Invocação-Especial no campo dele em Posição de Defesa. Uma vez por turno, durante sua Fase de Apoio: sofra 500 de dano. Se este card for banido, ou enviado para o Cemitério por um efeito de card: você pode escolher 1 Magia/Armadilha Baixada que seu oponente controla; destrua-a. Seu oponente não pode ativar esse card em resposta à ativação deste efeito. Você só pode usar este efeito de "Víbora Venenosa" uma vez por turno.
  | es_text             = Puedes mostrar esta carta en tu mano; Invócala de Modo Especial o, si tu adversario no controla monstruos, Invócala de Modo Especial a su Campo en Posición de Defensa en su lugar. Una vez por turno, durante tu Standby Phase: tú recibes 500 puntos de daño. Si esta carta es desterrada, o mandada al Cementerio por el efecto de una carta: puedes seleccionar 1 Mágica/Trampa Colocada que controle tu adversario; destrúyela. Tu adversario no puede activar esa carta en respuesta a la activación de este efecto. Sólo puedes usar este efecto de "Víbora Ponzoñosa" una vez por turno.
  | ja_text             = このカード名の③の効果は１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。このカードを特殊召喚する。相手フィールドにモンスターが存在しない場合、代わりに相手フィールドに守備表示で特殊召喚する。②：自分スタンバイフェイズに発動する。自分は５００ダメージを受ける。③：このカードが除外された場合、または効果で墓地へ送られた場合、相手フィールドの裏側表示の魔法・罠カード１枚を対象として発動できる（この発動に対して対象のカードを発動できない）。そのカードを破壊する。
  | ko_text             = 이 카드명의 ③의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다. 이 카드를 특수 소환한다. 상대 필드에 몬스터가 존재하지 않을 경우, 대신에 상대 필드에 수비 표시로 특수 소환한다. ②: 자신 스탠바이 페이즈에 발동한다. 자신은 500 데미지를 받는다. ③: 이 카드가 제외되었을 경우, 또는 효과로 묘지로 보내졌을 경우, 상대 필드의 뒷면 표시의 마법 / 함정 카드 1장을 대상으로 하고 발동할 수 있다(이 발동에 대하여 대상의 카드를 발동할 수 없다). 그 카드를 파괴한다.
  | sc_text             = 此卡名的③效果1回合仅可使用1次。①：向对手出示手牌的此卡可以发动。将此卡特殊召唤。对手场上不存在怪兽的情况下，作为代替以守备表示特殊召唤至对手场上。②：在自己的准备阶段发动。自己受到500伤害。③：此卡被除外的情况下，或因效果被送至墓地的情况下，以对手场上的1张里侧表示的魔法・陷阱卡为对象可以发动（应对此发动不可发动对象卡）。将该卡破坏。
