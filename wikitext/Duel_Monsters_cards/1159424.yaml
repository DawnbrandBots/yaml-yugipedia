  | ja_text             = このカード名の③の効果は１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。このカードを特殊召喚する。相手フィールドにモンスターが存在しない場合、代わりに相手フィールドに守備表示で特殊召喚する。②：自分スタンバイフェイズに発動する。自分は５００ダメージを受ける。③：このカードが除外された場合、または効果で墓地へ送られた場合、相手フィールドの裏側表示の魔法・罠カード１枚を対象として発動できる（この発動に対して対象のカードを発動できない）。そのカードを破壊する。
  | ko_text             = 이 카드명의 ③의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다. 이 카드를 특수 소환한다. 상대 필드에 몬스터가 존재하지 않을 경우, 대신에 상대 필드에 수비 표시로 특수 소환한다. ②: 자신 스탠바이 페이즈에 발동한다. 자신은 500 데미지를 받는다. ③: 이 카드가 제외되었을 경우, 또는 효과로 묘지로 보내졌을 경우, 상대 필드의 뒷면 표시의 마법 / 함정 카드 1장을 대상으로 하고 발동할 수 있다(이 발동에 대하여 대상의 카드를 발동할 수 없다). 그 카드를 파괴한다.
