  | effect_types          = Ignition-like, Condition, Continuous-like, Continuous-like
  | text                  = You can [[reveal]] 1 "[[Power Patron]]" [[monster]] in your [[Extra Deck]]; [[banish]] ([[face-down]]) 1 card from your [[hand]], then [[Add a card|add]] to your hand or [[Special Summon]], 1 monster from your [[Main Deck|Deck]] that mentions that revealed monster's name (except in its once-per-turn restriction clause). You can only use this [[effect]] of "Plundered Power Patron Plane - Vidolia" [[once per turn]]. Monsters your opponent [[control]]s lose 100 [[ATK]] for each banished card. Your opponent cannot [[activate]] the effects of cards in the [[GY]], while you control "[[Nerva the Power Patron of Creation]]", "[[Jupiter the Power Patron of Destruction]]", and "[[Junora the Power Patron of Tuning]]".
  | fr_text               = Vous pouvez révéler 1 monstre "Mécène du Pouvoir" dans votre Extra Deck ; bannissez (face verso) 1 carte depuis votre main, puis ajoutez à votre main ou Invoquez Spécialement 1 monstre depuis votre Deck qui mentionne le nom du monstre révélé (sauf dans sa clause de restriction d'une fois par tour). Vous ne pouvez utiliser cet effet de "Plan Destructeur du Mécène du Pouvoir - Vidolia" qu'une fois par tour. Les monstres contrôlés par votre adversaire perdent 100 ATK pour chaque carte bannie. Votre adversaire ne peut pas activer les effets des cartes dans le Cimetière, tant que vous contrôlez "Nerva la Mécène du Pouvoir de la Création", "Jupiter le Mécène du Pouvoir de la Destruction" et "Junora le Mécène du Pouvoir de l'Accordage".
  | de_text               = Du kannst 1 „Machtpatron“-Monster in deinem Extra Deck vorzeigen; verbanne 1 Karte von deiner Hand (verdeckt), dann füge deiner Hand 1 Monster von deinem Deck hinzu, das den Namen jenes vorgezeigten Monsters erwähnt (außer in seiner Einmal-pro-Spielzug-Einschränkung), oder beschwöre es als Spezialbeschwörung. Du kannst diesen Effekt von „Gebrandschatzte Machtpatron-Ebene - Vidolia“ nur einmal pro Spielzug verwenden. Monster, die dein Gegner kontrolliert, verlieren für jede verbannte Karte 100 ATK. Dein Gegner kann keine Effekte von Karten im Friedhof aktivieren, solange du „Nerva die Machtpatronin der Schöpfung“, „Jupiter der Machtpatron der Zerstörung“, und „Junora der Machtpatron der Abstimmung“ kontrollierst.
  | it_text               = Puoi rivelare 1 mostro "Patrono Potente" nel tuo Extra Deck; bandisci (coperta) 1 carta dalla tua mano, poi aggiungi alla tua mano o Evoca Specialmente 1 mostro dal tuo Deck che menziona il nome di quel mostro rivelato (eccetto nella sua clausola di restrizione di una volta per turno). Puoi utilizzare questo effetto di "Piano Patrono Potente Saccheggiato - Vidolia" una sola volta per turno. I mostri controllati dal tuo avversario perdono 100 ATK per ogni carta bandita. Il tuo avversario non può attivare gli effetti delle carte nel Cimitero, mentre controlli "Nerva la Patrona Potente della Creazione", "Jupiter il Patrono Potente della Distruzione" e "Junora il Patrono Potente della Sintonizzazione".
  | pt_text               = Você pode revelar 1 monstro "Patrono(a) do Poder" no seu Deck Adicional; bana (com a face para baixo) 1 card da sua mão e, depois, adicione à sua mão ou Invoque por Invocação-Especial, 1 monstro do seu Deck que mencione o nome desse monstro revelado (exceto por sua cláusula de restrição de "uma vez por turno"). Você só pode usar este efeito de "Plano Saqueado do Patrono do Poder - Vidólio" uma vez por turno. Monstros que seu oponente controla perdem 100 de ATK para cada card banido. Seu oponente não pode ativar os efeitos de cards no Cemitério, enquanto você controlar "Nerva, a Patrona do Poder da Criação", "Júpiter, o Patrono do Poder da Destruição" e "Junora, o Patrono do Poder da Afinação".
  | es_text               = Puedes mostrar 1 monstruo "Modelo de Poder" en tu Deck Extra; destierra (boca abajo) 1 carta en tu mano, y después añade a tu mano o Invoca de Modo Especial, 1 monstruo desde tu Deck que mencione el nombre de ese monstruo mostrado (excepto en su cláusula de restricción de una vez por turno). Sólo puedes usar este efecto de "Plano de Modelo de Poder Saqueado - Vidolia" una vez por turno. Los monstruos que controla tu adversario pierden 100 ATK por cada carta desterrada. Tu adversario no puede activar los efectos de cartas en el Cementerio, mientras controlas "Nerva la Modelo de Poder de Creación", "Júpiter el Modelo de Poder de Destrucción" y "Junora el Modelo de Poder de Afinación".
  | ja_text               = このカード名の①の効果は１ターンに１度しか使用できない。①：ＥＸデッキの「獄神」モンスター１体を相手に見せて発動できる。自分の手札を１枚選んで裏側で除外する。その後、見せたモンスターのカード名が記されたモンスター１体をデッキから選び、手札に加えるか特殊召喚する。②：相手フィールドのモンスターの攻撃力は、除外状態のカードの数×１００ダウンする。③：自分フィールドに「創獄神ネルヴァ」「壊獄神ユピテル」「調獄神ジュノーラ」が全て存在する限り、相手は墓地のカードの効果を発動できない。
  | ko_text               = 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 엑스트라 덱의 "감옥신" 몬스터 1장을 상대에게 보여주고 발동할 수 있다. 자신의 패를 1장 고르고 뒷면으로 제외한다. 그 후, 보여준 몬스터의 카드명이 쓰여진 몬스터 1장을 덱에서 고르고, 패에 넣거나 특수 소환한다. ②: 상대 필드의 몬스터의 공격력은, 제외 상태인 카드의 수 × 100 내린다. ③: 자신 필드에 "창감옥신 네르바" "괴감옥신 유피테르" "조감옥신 쥬노라"가 전부 존재하는 한, 상대는 묘지의 카드의 효과를 발동할 수 없다.
  | sc_text               = 此卡名的①效果1回合仅可使用1次。①：向对手出示额外牌组的1只“狱神”怪兽可以发动。挑选自己的1张手牌以里侧除外。然后，从牌组挑选1只记载有所出示的怪兽的卡名的怪兽，加入手牌或特殊召唤。②：对手场上怪兽的攻击力下降除外状态的卡的数量×100的数值。③：只要“创狱神 涅瓦”“坏狱神 朱庇特”“调狱神 朱诺拉”全部存在于自己场上，对手不可发动墓地的卡的效果。
