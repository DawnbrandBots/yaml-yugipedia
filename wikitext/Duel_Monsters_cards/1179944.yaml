  | text                  = You can [[Special Summon]] this card (from your [[hand]]) by [[Tributing]] 2 [[face-up]] monsters on either [[field]] with 2000 or more [[ATK]], including a monster you [[control]]. You can only Special Summon "Galaxy-Eyes Photon Change Dragon" [[once per turn]] this way. During the [[Main Phase]] ([[Quick Effect]]): You can [[banish]] this card you control; Special Summon 1 "[[Galaxy-Eyes Photon Dragon]]" from your [[Main Deck|Deck]] or [[GY]], then you can banish 1 monster your opponent controls that was Special Summoned from the Extra Deck until the [[End Phase]]. You can only use this effect of "Galaxy-Eyes Photon Change Dragon" once per turn.
