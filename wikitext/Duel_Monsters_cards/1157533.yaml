  | text                = Your opponent can [[reveal]] 1 "Pair Bear Scare!!" in their [[hand]] or [[Main Deck|Deck]], and if they do, each player gains 2000 [[LP]]. If they do not, you [[destroy]] 1 monster your opponent controls. If this card is sent from the [[field]] to the [[GY]]: [[Add a card|Add]] this card to your opponent's hand. You can only use this [[effect]] of "Pair Bear Scare!!" once per Duel. You can only [[activate]] 1 "Pair Bear Scare!!" per [[turn]].
  | fr_text             = Votre adversaire peut révéler 1 "Frayeur de la Paire d'Ours !!" dans sa main ou Deck, et s'il le fait, chaque joueur gagne 2000 LP. S'il ne le fait pas, vous détruisez 1 monstre contrôlé par votre adversaire. Si cette carte est envoyée depuis le Terrain au Cimetière : ajoutez cette carte à la main de votre adversaire. Vous ne pouvez utiliser cet effet de "Frayeur de la Paire d'Ours !!" qu'une fois par Duel. Vous ne pouvez activer qu'1 "Frayeur de la Paire d'Ours !!" par tour.
  | de_text             = Dein Gegner kann 1 „Bärenpaar-Schrecken!!“ in seiner Hand oder seinem Deck vorzeigen und falls er dies tut, erhält jeder Spieler 2000 LP. Falls er dies nicht tut, zerstörst du 1 Monster, das dein Gegner kontrolliert. Falls diese Karte vom Spielfeld auf den Friedhof gelegt wird: Füge diese Karte der Hand deines Gegners hinzu. Du kannst diesen Effekt von „Bärenpaar-Schrecken!!“ nur einmal pro Duell verwenden. Du kannst nur 1 „Bärenpaar-Schrecken!!“ pro Spielzug aktivieren.
  | it_text             = Il tuo avversario può rivelare 1 "Spavento Pendagli Orsetto!!" nella sua mano o Deck e, se lo fa, ogni giocatore guadagna 2000 LP. Se non lo fa, distruggi 1 mostro controllato dal tuo avversario. Se questa carta viene mandata dal Terreno al Cimitero: aggiungi questa carta alla mano del tuo avversario. Puoi utilizzare questo effetto di "Spavento Pendagli Orsetto!!" una sola volta per Duello. Puoi attivare solo 1 "Spavento Pendagli Orsetto!!" per turno.
  | pt_text             = Seu oponente pode revelar 1 "Susto do Par de Ursos!!" na mão ou no Deck dele e, se isso acontecer, cada duelista ganha 2000 PV. Se ele não o fizer, você destrói 1 monstro que seu oponente controla. Se este card for enviado do campo para o Cemitério: adicione este card à mão do seu oponente. Você só pode usar este efeito de "Susto do Par de Ursos!!" uma vez por Duelo. Você só pode ativar 1 "Susto do Par de Ursos!!" por turno.
  | es_text             = Tu adversario puede mostrar 1 "¡¡Susto de Par de Osos!!" en su mano o Deck y, si lo hace, cada jugador gana 2000 LP. Si no lo hace, destruye 1 monstruo que controle tu adversario. Si esta carta es mandada del Campo al Cementerio: añade esta carta a la mano de tu adversario. Sólo puedes usar este efecto de "¡¡Susto de Par de Osos!!" una vez por Duelo. Sólo puedes activar 1 "¡¡Susto de Par de Osos!!" por turno.
  | ja_text             = このカード名のカードは１ターンに１枚しか発動できず、このカード名の②の効果はデュエル中に１度しか使用できない。①：相手は自身の手札・デッキから「恐依のペアルックマ！！」１枚を見せる事ができる。見せた場合、お互いに２０００ＬＰ回復する。見せなかった場合、自分は相手フィールドのモンスター１体を破壊する。②：このカードがフィールドから墓地へ送られた場合に発動する。このカードを相手の手札に加える。
