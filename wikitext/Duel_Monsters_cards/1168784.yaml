  | text                  = [[Once per turn]], during the [[Standby Phase]]: Place 1 [[T Counter]] on this card. Once per turn: You can [[target]] 1 [[Pendulum Monster]] in your [[Main Monster Zone]]; for each T Counter on this card, move that Pendulum Monster to an adjacent (horizontal) Monster Zone, 1 move at a time. Then, after you have finished moving, [[destroy]] all [[Fusion Monster|Fusion]] or [[Xyz Monster]]s your opponent [[control]]s in the same (final) [[column]], with an equal or lower [[Level]]/[[Rank]] than that monster's [[Pendulum Scale]], and if you do, inflict damage to your opponent equal to their combined ATK they had on the field.
