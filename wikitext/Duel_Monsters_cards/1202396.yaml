  | fr_text               = 1 Syntoniseur + 1 non-Syntoniseur<br />Vous pouvez cibler 1 monstre de l'adversaire dans la colonne adjacente à cette carte ; bannissez-le, puis changez le contrôle de cette carte en la déplaçant dans une des Zones Monstre Main de votre adversaire dans les colonnes adjacentes à cette carte. Si le contrôleur de cette carte face recto change : renvoyez cette carte à l'Extra Deck, puis le propriétaire de cette carte Invoque Spécialement 1 monstre "Angetélité" depuis son Extra Deck. Vous ne pouvez utiliser chaque effet de "Enrôlé Angetélité" qu'une fois par tour.
  | de_text               = 1 Empfänger + 1 Nicht-Empfänger<br />Du kannst 1 Monster deines Gegners in einer benachbarten Spalte dieser Karte wählen; verbanne es, dann ändere die Kontrolle über diese Karte, indem du sie in eine der Main-Monsterzonen deines Gegners in den benachbarten Spalten dieser Karte bewegst. Falls sich der Beherrscher dieser offenen Karte ändert: Lege sie ins Extra Deck zurück, dann beschwört der Besitzer dieser Karte 1 „Engelechy“-Monster als Spezialbeschwörung von seinem Extra Deck. Du kannst jeden Effekt von „Engelechy Rekrutiert“ nur einmal pro Spielzug verwenden.
  | it_text               = 1 Tuner + 1 non-Tuner<br />Puoi scegliere come bersaglio 1 mostro dell'avversario nella colonna adiacente a questa carta; bandiscilo, poi cambia il controllo di questa carta spostandola in una delle Zone Mostri Main del tuo avversario nelle colonne adiacenti a questa carta. Se il controllo di questa carta scoperta cambia: fai ritornare questa carta nell'Extra Deck, poi il proprietario di questa carta Evoca Specialmente 1 mostro "Angelechy" dal suo Extra Deck. Puoi utilizzare ogni effetto di "Angelechy Arruolato" una sola volta per turno.
  | pt_text               = 1 Regulador + 1 não-Regulador<br />Você pode escolher 1 monstro do oponente na coluna adjacente a este card; bana-o e, depois, mude o controle deste card ao movê-lo para uma das Zonas de Monstros Principais do seu oponente nas colunas adjacentes a este card. Se o controle deste card com a face para cima mudar: devolva este card para o Deck Adicional e, depois, o dono deste card Invoca 1 monstro "Anjoléquia" por Invocação-Especial do Deck Adicional dele. Você só pode usar cada efeito de "Alistamento de Anjoléquia" uma vez por turno.
  | es_text               = 1 Cantante + 1 no Cantante<br />Puedes seleccionar 1 monstruo del adversario en la columna adyacente a la de esta carta; destiérralo, y después cambia el control de esta carta moviéndola a una de las Zonas de Monstruos Principales de tu adversario en las columnas adyacentes a esta carta. Si cambia el control de esta carta boca arriba: devuelve esta carta al Deck Extra, y después el dueño de esta carta Invoca de Modo Especial 1 monstruo "Angelequia" desde su Deck Extra. Sólo puedes usar cada efecto de "Alistado Angelequia" una vez por turno.
