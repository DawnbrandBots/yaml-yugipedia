  | text                  = If this card [[battle]]s a [[monster]], neither can be [[destroyed by that battle]]. If this card is [[Normal Summon|Normal]] or [[Special Summon]]ed: You can [[send]] 1 [[Fiend]], [[Illusion]], or [[Spellcaster]] monster from your [[Main Deck|Deck]] to the [[GY]], then you can make this card's Type become the original Type of that sent monster. If this card is in your GY: You can [[banish]] 1 [[Spell]] from your GY; Special Summon this card. You can only use this effect of "Fleeting Phantom Mask Master" once per Duel, and its previous effect only [[once per turn]].
  | fr_text               = Si cette carte combat un monstre, aucun de ces 2 monstres ne peut être détruit par ce combat. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez envoyer 1 monstre Démon, Illusion ou Magicien depuis votre Deck au Cimetière, puis vous pouvez faire devenir le Type de cette carte le Type d'origine du monstre envoyé. Si cette carte est dans votre Cimetière : vous pouvez bannir 1 Magie depuis votre Cimetière ; Invoquez Spécialement cette carte. Vous ne pouvez utiliser cet effet de "Maître des Masques Fantômes Fugaces" qu'une fois par Duel, et son effet précédent qu'une fois par tour.
  | de_text               = Falls diese Karte gegen ein Monster kämpft, können beide durch jenen Kampf nicht zerstört werden. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst 1 Unterweltler-, Illusion- oder Hexer-Monster von deinem Deck auf den Friedhof legen, dann kannst du den Typ dieser Karte gleich dem Grund-Typ jenes gelegten Monsters werden lassen. Falls sich diese Karte in deinem Friedhof befindet: Du kannst 1 Zauber von deinem Friedhof verbannen; beschwöre diese Karte als Spezialbeschwörung. Du kannst diesen Effekt von „Flüchtiges Phantom Maskenmeister“ nur einmal pro Duell und seinen vorherigen Effekt nur einmal pro Spielzug verwenden.
  | it_text               = Se questa carta combatte con un mostro, nessuno dei due può essere distrutto in quella battaglia. Se questa carta viene Evocata Normalmente o Specialmente: puoi mandare 1 mostro Demone, Illusione o Incantatore dal tuo Deck al Cimitero, poi puoi far diventare il Tipo di questa carta il Tipo originale di quel mostro mandato. Se questa carta è nel tuo Cimitero: puoi bandire 1 Magia dal tuo Cimitero; Evoca Specialmente questa carta. Puoi utilizzare questo effetto di "Spettro Effimero Maestro della Maschera" una sola volta per Duello, e il suo precedente effetto una sola volta per turno.
  | pt_text               = Se este card batalhar um monstro, nenhum dos dois pode ser destruído nessa batalha. Se este card for Invocado por Invocação-Normal ou Especial: você pode enviar 1 monstro Demônio, Ilusão ou Mago do seu Deck para o Cemitério e, depois, você pode fazer com que o Tipo deste card se torne o Tipo original desse monstro enviado. Se este card estiver no seu Cemitério: você pode banir 1 Magia do seu Cemitério; Invoque este card por Invocação-Especial. Você só pode usar este efeito de "Mestre da Máscara Fantasma Fugaz" uma vez por Duelo, e seu efeito anterior apenas uma vez por turno.
  | es_text               = Si esta carta batalla con un monstruo, ninguno puede ser destruido en esa batalla. Si esta carta es Invocada de Modo Normal o Especial: puedes mandar al Cementerio 1 monstruo Demonio, Ilusión o Lanzador de Conjuros en tu Deck, y después puedes hacer que el Tipo de esta carta se convierta en el Tipo original de ese monstruo mandado. Si esta carta está en tu Cementerio: puedes desterrar 1 Mágica en tu Cementerio; Invoca esta carta de Modo Especial. Sólo puedes usar este efecto de "Fantasma Transitorio Maestro de la Máscara" una vez por Duelo, y su efecto previo sólo una vez por turno.
  | ja_text               = このカード名の、①の効果は１ターンに１度しか使用できず、③の効果はデュエル中に１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから悪魔族・幻想魔族・魔法使い族モンスター１体を墓地へ送る。その後、このカードの種族をこの効果で墓地へ送ったモンスターの元々の種族と同じにできる。②：このカードがモンスターと戦闘を行う場合、その２体はその戦闘では破壊されない。③：このカードが墓地に存在する場合、自分の墓地から魔法カード１枚を除外して発動できる。このカードを特殊召喚する。
  | ko_text               = 이 카드명의, ①의 효과는 1턴에 1번밖에 사용할 수 없으며, ③의 효과는 듀얼 중에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 악마족 / 환상마족 / 마법사족 몬스터 1장을 묘지로 보낸다. 그 후, 이 카드의 종족을 이 효과로 묘지로 보낸 몬스터의 원래의 종족과 같게 할 수 있다. ②: 이 카드가 몬스터와 전투를 실행할 경우, 그 2장은 그 전투로는 파괴되지 않는다. ③: 이 카드가 묘지에 존재할 경우, 자신 묘지에서 마법 카드 1장을 제외하고 발동할 수 있다. 이 카드를 특수 소환한다.
  | sc_text               = 此卡名的①效果1回合仅可使用1次，③效果在决斗中仅可使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将1只恶魔族・幻想魔族・魔法师族怪兽送至墓地。然后，可将此卡的种族改成与以此效果被送至墓地的怪兽的原本种族相同。②：此卡与怪兽进行战斗的情况下，该2只不会因该战斗被破坏。③：此卡存在于墓地的情况下，从自己墓地将1张魔法卡除外可以发动。将此卡特殊召唤。
