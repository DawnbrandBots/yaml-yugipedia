  | ja_pendulum_effect    = このカード名のＰ効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードを破壊し、デッキから攻撃力１５００以下のＰモンスター１体を手札に加える。このターン自分はＰ召喚に成功しない限り、フィールドのモンスターの効果を発動できない。
  | ja_text               = このカード名の②のモンスター効果は１ターンに１度しか使用できない。①：Ｐ召喚したこのカードは以下の効果を得る。●自分のＰゾーンにカードが２枚存在する限り、そのＰスケールの差×３００だけ、このカードの攻撃力はアップする。●このカードの戦闘で発生する相手への戦闘ダメージは倍になる。②：モンスターゾーンのこのカードが戦闘・効果で破壊された場合に発動できる。このカードを手札に加える。このカードが相手によって破壊されていた場合、さらにこのカードを特殊召喚できる。
  | ko_pendulum_effect    = 이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 이 카드를 파괴하고, 덱에서 공격력 1500 이하인 펜듈럼 몬스터 1장을 패에 넣는다. 이 턴에 자신은 펜듈럼 소환에 성공하지 않는 한, 필드의 몬스터의 효과를 발동할 수 없다.
  | ko_text               = 이 카드명의 ②의 몬스터 효과는 1턴에 1번밖에 사용할 수 없다. ①: 펜듈럼 소환한 이 카드는 이하의 효과를 얻는다. ●자신의 펜듈럼 존에 카드가 2장 존재하는 한, 그 펜듈럼 스케일의 차 × 300 만큼, 이 카드의 공격력을 올린다. ●이 카드의 전투로 발생하는 상대에게로의 전투 데미지는 배가 된다. ②: 몬스터 존의 이 카드가 전투 / 효과로 파괴되었을 경우에 발동할 수 있다. 이 카드를 패에 넣는다. 이 카드가 상대에 의해 파괴되어 있었을 경우, 추가로 이 카드를 특수 소환할 수 있다.
  | sc_pendulum_effect    = 此卡名的灵摆效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将此卡破坏，从牌组将1只攻击力1500以下的灵摆怪兽加入手牌。此回合，自己只要未灵摆召唤成功，则不可发动场上怪兽的效果。
  | sc_text               = 此卡名的②怪兽效果1回合仅可使用1次。①：灵摆召唤的此卡获得以下效果。<br />●只要自己的灵摆区域存在2张卡，此卡攻击力上升其灵摆刻度的差值×300的数值。<br />●因此卡的战斗对对手造成的战斗伤害变为两倍。<br />②：怪兽区域的此卡因战斗・效果被破坏的情况下可以发动。将此卡加入手牌。此卡是被对手破坏的情况下，进而可将此卡特殊召唤。
