  | fr_text               = 2 Monstres Rituels, Fusion, Synchro, Xyz et/ou Pendule<br />Vos monstres Invoqués par Sacrifice peuvent faire une seconde attaque durant chaque Battle Phase. Si cette carte est Sacrifiée : vous pouvez activer 1 de ces effets (mais vous ne pouvez utiliser chaque effet de "Dristy de la Troupe des Clowns" qu'une fois par tour) ;<br />● Renvoyez tous les Monstres Lien depuis le Terrain et les Cimetières à l'Extra Deck.<br />● Chaque joueur avec une main mélange toute sa main dans le Deck, puis pioche le même nombre de cartes que mélangées dans le Deck.
  | de_text               = 2 Ritual-, Fusions-, Synchro-, Xyz- und/oder Pendelmonster<br />Deine als Tributbeschwörung beschworenen Monster können während jeder Battle Phase einen zweiten Angriff durchführen. Falls diese Karte als Tribut angeboten wird: Du kannst 1 dieser Effekte aktivieren (aber du kannst jeden Effekt von „Clowntrupp Dristy“ nur einmal pro Spielzug verwenden);<br />● Lege alle Linkmonster vom Spielfeld und den Friedhöfen ins Extra Deck zurück.<br />● Jeder Spieler mit einer Hand mischt seine gesamte Hand ins Deck, dann zieht er dieselbe Anzahl Karten, die er ins Deck gemischt hat.
  | it_text               = 2 Mostri Rituale, Fusione, Synchro, Xyz e/o Pendulum<br />I tuoi mostri Evocati tramite Tributo possono effettuare un secondo attacco durante ogni Battle Phase. Se questa carta viene offerta come Tributo: puoi attivare 1 di questi effetti (ma puoi utilizzare ogni effetto di "Compagnia di Clown Dristy" una sola volta per turno);<br />● Fai ritornare tutti i Mostri Link dal Terreno e dai Cimiteri nell'Extra Deck.<br />● Ogni giocatore con carte in mano mischia tutta la sua mano nel Deck, poi pesca lo stesso numero di carte che ha mischiato nel Deck.
  | pt_text               = 2 Monstros de Ritual, de Fusão, Sincro, Xyz e/ou Pêndulo<br />Seus monstros Invocados por Invocação-Tributo podem realizar um segundo ataque durante cada Fase de Batalha. Se este card for oferecido como Tributo: você pode ativar 1 desses efeitos (mas você só pode usar cada efeito de "Companhia de Palhaços Dristy" uma vez por turno);<br />● Devolva para o Deck Adicional todos os Monstros Link do campo e dos Cemitérios.<br />● Cada duelista com uma mão embaralha toda sua mão no Deck e, depois, compra o mesmo número de cards embaralhados no Deck.
  | es_text               = 2 Monstruos de Ritual, Fusión, Sincronía, Xyz y/o Péndulo<br />Tus monstruos Invocados por Sacrificio pueden hacer un segundo ataque durante cada Battle Phase. Si esta carta es Sacrificada: puedes activar 1 de estos efectos (pero sólo puedes usar cada efecto de "Dristy de la Compañía de Payasos" una vez por turno);<br />● Devuelve al Deck Extra todos los Monstruos de Enlace en el Campo y los Cementerios.<br />● Cada jugador que tenga cartas en la mano baraja su mano completa al Deck, y después roba el mismo número de cartas que barajó al Deck.
