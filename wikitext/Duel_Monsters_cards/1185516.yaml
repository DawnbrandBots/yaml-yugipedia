  | text                  = When your opponent [[activate]]s a [[monster effect]] on the [[field]], except monsters that were [[Summon]]ed this [[turn]]: [[Negate]] that activation, then you can [[banish]] ([[face-down]]) all [[face-up]] monsters your opponent [[control]]s, except monsters Summoned this turn. If this [[Set]] card in its owner's control is [[destroy]]ed by an opponent's card effect: You can Set 1 Trap from your [[Main Deck|Deck]].
  | fr_text               = Lorsque votre adversaire active un effet de monstre sur le Terrain, sauf les monstres qui ont été Invoqués ce tour : annulez l'activation, puis vous pouvez bannir (face verso) tous les monstres face recto contrôlés par votre adversaire (monstres Invoqués ce tour exclus). Si cette carte Posée contrôlée par son propriétaire est détruite par un effet de carte de l'adversaire : vous pouvez Poser 1 Piège depuis votre Deck.
  | de_text               = Wenn dein Gegner einen Monstereffekt auf dem Spielfeld aktiviert, außer von Monstern, die in diesem Spielzug beschworen wurden: Annulliere jene Aktivierung, dann kannst du alle offenen Monster, die dein Gegner kontrolliert, außer Monstern, die in diesem Spielzug beschworen wurden, (verdeckt) verbannen. Falls diese gesetzte Karte, die ihr Besitzer kontrolliert, durch einen Karteneffekt eines Gegners zerstört wird: Du kannst 1 Falle von deinem Deck setzen.
  | it_text               = Quando il tuo avversario attiva l'effetto di un mostro sul Terreno, eccetto i mostri che sono stati Evocati in questo turno: annulla quell'attivazione, poi puoi bandire (coperti) tutti i mostri scoperti controllati dal tuo avversario, eccetto i mostri Evocati in questo turno. Se questa carta Posizionata sotto il controllo del suo proprietario viene distrutta dall'effetto di una carta dell'avversario: puoi Posizionare 1 Trappola dal tuo Deck.
  | pt_text               = Quando seu oponente ativar um efeito de monstro no campo, exceto monstros que foram Invocados neste turno: negue a ativação e, depois, você pode banir (com a face para baixo) todos os monstros com a face para cima que seu oponente controla, exceto monstros Invocados neste turno. Se este card Baixado sob o controle do seu dono for destruído por um efeito de card do oponente: você pode Baixar 1 Armadilha do seu Deck.
  | es_text               = Cuando tu adversario activa el efecto de un monstruo en el Campo, excepto monstruos que fueron Invocados este turno: niega esa activación, y después puedes desterrar (boca abajo) todos los monstruos boca arriba que controle tu adversario, excepto los monstruos Invocados este turno. Si esta carta Colocada controlada por su dueño es destruida por el efecto de una carta del adversario: puedes Colocar 1 Trampa desde tu Deck.
  | ja_text               = ①：このターンに召喚・反転召喚・特殊召喚されたモンスターを除く、フィールドのモンスターの効果を相手が発動した時に発動できる。その発動を無効にする。その後、このターンに召喚・反転召喚・特殊召喚されたモンスターを除く、相手フィールドの表側表示モンスターを全て裏側で除外できる。②：セットされているこのカードが相手の効果で破壊された場合に発動できる。デッキから罠カード１枚を自分フィールドにセットする。
