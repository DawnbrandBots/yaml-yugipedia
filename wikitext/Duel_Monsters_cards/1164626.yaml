  | ja_text               = 融合モンスター＋フィールドの表側表示モンスター<br />このカード名はルール上「Ｅ・ＨＥＲＯ」カードとしても扱う。このカード名の①の効果は１ターンに１度しか使用できない。①：このカードがＥＸデッキから特殊召喚した場合に発動できる。自分の墓地からモンスター５体をデッキに戻す。その後、自分は２枚ドローし、このカードの攻撃力は１０００アップする。②：このカードが戦闘でモンスターを破壊した場合に発動する。そのモンスターの元々の攻撃力分のダメージを相手に与える。
  | ko_text               = 융합 몬스터 ＋ 필드의 앞면 표시 몬스터<br />이 카드명은 룰상 "엘리멘틀 히어로" 카드로도 취급한다. 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 엑스트라 덱에서 특수 소환했을 경우에 발동할 수 있다. 자신 묘지에서 몬스터 5장을 덱으로 되돌린다. 그 후, 자신은 2장 드로우하고, 이 카드의 공격력은 1000 올린다. ②: 이 카드가 전투로 몬스터를 파괴했을 경우에 발동한다. 그 몬스터의 원래 공격력만큼의 데미지를 상대에게 준다.
