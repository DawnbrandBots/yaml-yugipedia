  | pt_text               = Quando um efeito de monstro for ativado no campo do seu oponente, durante um turno em que seu oponente tiver Invocado por Invocação-Especial: destrua o monstro que ativou seu efeito e, depois, se seu oponente controlar um ou mais cards em suas Zonas de Monstros e/ou Zonas de Magias & Armadilhas adjacentes, destrua-os.
  | es_text               = Cuando es activado un efecto de monstruo en el Campo de tu adversario, durante un turno en el que tu adversario ha Invocado de Modo Especial: destruye el monstruo que activó su efecto y después, si tu adversario controla una o más cartas en sus Zonas de Monstruos y/o Zonas de Magia y Trampas adyacentes, destrúyelas.
