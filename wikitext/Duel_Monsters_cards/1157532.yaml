  | text                = 1 [[Tuner]] + 1+ non-Tuners<br />Cannot be [[destroyed by battle]]. Each time a card(s) is placed in your opponent's [[Spell & Trap Zone]]: [[Excavate]] the top cards of your [[Main Deck|Deck]] until you excavate a [[monster]] and [[equip]] it to this card as an [[Equip Spell]], also place the rest on the bottom of the Deck in any order. Gains [[ATK]]/[[DEF]] equal to the total Levels of the monsters equipped to it x 300. If the total Levels of monsters equipped to this card are higher than 21, [[destroy]] this card.
  | fr_text             = 1 Syntoniseur + 1+ non-Syntoniseur<br />Non destructible au combat. Chaque fois qu'une ou plusieurs cartes sont placées dans la Zone Magie & Piège de votre adversaire : dévoilez les cartes du dessus de votre Deck jusqu'à dévoiler un monstre et équipez-le à cette carte comme Magie d'Équipement, et aussi, placez les cartes restantes au-dessous du Deck dans l'ordre de votre choix. Gagne une ATK/DEF égales à la somme des Niveaux des monstres qui lui sont équipés x 300. Si la somme des Niveaux des monstres équipés à cette carte est supérieure à 21, détruisez cette carte.
  | de_text             = 1 Empfänger + 1+ Nicht-Empfänger<br />Kann nicht durch Kampf zerstört werden. Jedes Mal, wenn eine oder mehr Karten in die Zauber- & Fallenzone deines Gegners gelegt werden: Grabe die obersten Karten deines Decks aus, bis du ein Monster ausgräbst, und rüste diese Karte mit ihm als Ausrüstungszauber aus, zusätzlich lege den Rest in beliebiger Reihenfolge unters Deck. Diese Karte erhält ATK/DEF in Höhe der Summe der Stufen der Monster, mit denen sie ausgerüstet ist, x 300. Falls die Summe der Stufen der Monster, mit denen sie ausgerüstet ist, höher als 21 ist, zerstöre diese Karte.
  | it_text             = 1 Tuner + 1+ non-Tuner<br />Non può essere distrutto in battaglia. Ogni volta che una o più carte vengono messe nella Zona Magie & Trappole del tuo avversario: dissotterra carte dalla cima del tuo Deck fino a quando dissotterri un mostro ed equipaggialo a questa carta come una Magia Equipaggiamento, inoltre metti il resto in fondo al Deck in qualsiasi ordine. Guadagna ATK/DEF pari alla somma dei Livelli dei mostri equipaggiati a esso x 300. Se la somma dei Livelli dei mostri equipaggiati a questa carta è superiore a 21, distruggi questa carta.
  | pt_text             = 1 Regulador + 1+ não-Reguladores<br />Não pode ser destruído em batalha. Sempre que um ou mais cards forem colocados na Zona de Magias & Armadilhas do seu oponente: escave cards do topo do seu Deck até escavar um monstro e equipe-o a este card como uma Magia de Equipamento e, além disso, coloque o resto no fundo do Deck em qualquer ordem. Ganha ATK/DEF igual à soma dos Níveis dos monstros equipados a ele x 300. Se a soma dos Níveis dos monstros equipados a este card for maior que 21, destrua este card.
  | es_text             = 1 Cantante + 1+ no Cantantes<br />No puede ser destruido en batalla. Cada vez que una o más cartas son puestas en la Zona de Magia y Trampas de tu adversario: excava las cartas de la parte superior de tu Deck hasta que excaves un monstruo y equípalo a esta carta como una Mágica de Equipo, y además pon el resto en la parte inferior del Deck en cualquier orden. Gana ATK/DEF iguales a los Niveles totales de los monstruos equipados a él x 300. Si los Niveles totales de los monstruos equipados a esta carta son mayores que 21, destruye esta carta.
  | ja_text             = チューナー＋チューナー以外のモンスター１体以上<br />①：このカードは戦闘では破壊されない。②：相手の魔法＆罠ゾーンにカードが置かれる度に発動する。モンスターが出るまで自分のデッキの上からカードをめくり、そのモンスターを装備魔法カード扱いでこのカードに装備する。残りを好きな順番でデッキの下に戻す。③：このカードの攻撃力・守備力は、このカードが装備しているモンスターのレベルの合計×３００アップする。④：このカードが装備しているモンスターのレベルの合計が２１より大きい場合にこのカードは破壊される。
