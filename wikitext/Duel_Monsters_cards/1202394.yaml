  | text                  = 1 [[Tuner]] + 1+ non-Tuners<br />You can [[target]] 1 [[monster]] in another [[column]]; [[banish]] it. If this card is placed in the [[Spell & Trap Zone]] as a [[Continuous Spell]]: You can [[Add a card|add]] 1 "[[Angelechy]]" [[Spell]] from your [[Main Deck|Deck]] to your [[hand]]. You can only use each of the preceding [[effect]]s of "Angelechy Destrier" [[once per turn]]. While this card is treated as a Continuous Spell, each time your opponent [[activate]]s a card or effect, inflict 500 damage to your opponent when it [[resolve]]s.
  | fr_text               = 1 Syntoniseur + 1+ non-Syntoniseur<br />Vous pouvez cibler 1 monstre dans une autre colonne ; bannissez-le. Si cette carte est placée dans la Zone Magie & Piège comme Magie Continue : vous pouvez ajouter 1 Magie "Angetélité" depuis votre Deck à votre main. Vous ne pouvez utiliser chacun des effets précédents de "Destrier Angetélité" qu'une fois par tour. Tant que cette carte est traitée comme Magie Continue, chaque fois que votre adversaire active une carte ou un effet, infligez 500 points de dommages à votre adversaire lorsqu'il est résolu.
  | de_text               = 1 Empfänger + 1+ Nicht-Empfänger<br />Du kannst 1 Monster in einer anderen Spalte wählen; verbanne es. Falls diese Karte als Permanenter Zauber in die Zauber- & Fallenzone gelegt wird: Du kannst deiner Hand 1 „Engelechy“-Zauber von deinem Deck hinzufügen. Du kannst jeden der vorherigen Effekte von „Engelechy Destrier“ nur einmal pro Spielzug verwenden. Solange diese Karte als Permanenter Zauber behandelt wird, jedes Mal wenn dein Gegner eine Karte oder einen Effekt aktiviert, füge deinem Gegner 500 Schaden zu, wenn sie oder er aufgelöst wird.
  | it_text               = 1 Tuner + 1+ non-Tuner<br />Puoi scegliere come bersaglio 1 mostro in un'altra colonna; bandiscilo. Se questa carta viene messa nella Zona Magie & Trappole come una Magia Continua: puoi aggiungere 1 Magia "Angelechy" dal tuo Deck alla tua mano. Puoi utilizzare ognuno dei precedenti effetti di "Angelechy Destriero" una sola volta per turno. Mentre questa carta viene considerata come una Magia Continua, ogni volta che il tuo avversario attiva una carta o un effetto, infliggi 500 danni al tuo avversario quando si risolve.
  | pt_text               = 1 Regulador + 1+ não-Reguladores<br />Você pode escolher 1 monstro em outra coluna; bana-o. Se este card for colocado na Zona de Magias & Armadilhas como uma Magia Contínua: você pode adicionar 1 Magia "Anjoléquia" do seu Deck à sua mão. Você só pode usar cada um dos efeitos anteriores de "Destrier de Anjoléquia" uma vez por turno. Enquanto este card for considerado como uma Magia Contínua, sempre que seu oponente ativar um card ou efeito, cause 500 de dano ao seu oponente quando ele resolver.
  | es_text               = 1 Cantante + 1+ no Cantantes<br />Puedes seleccionar 1 monstruo en otra columna; destiérralo. Si esta carta es puesta en la Zona de Magia y Trampas como una Mágica Continua: puedes añadir a tu mano 1 Mágica "Angelequia" en tu Deck. Sólo puedes usar cada uno de los previos efectos de "Destrero Angelequia" una vez por turno. Mientras esta carta sea tratada como una Mágica Continua, cada vez que tu adversario active una carta o efecto, inflige 500 puntos de daño a tu adversario cuando se resuelva.
