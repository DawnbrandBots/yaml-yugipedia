  | ja_text             = このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分のフィールド・墓地・除外状態の「Ｘ－セイバー」モンスターが１０体以上である限り、自分フィールドの「Ｘ－セイバー」モンスターの攻撃力は、自身の元々の守備力分アップする。②：自分がＥＸデッキから「Ｘ－セイバー」モンスターを特殊召喚した場合に発動できる。手札・デッキから「Ｘ－セイバー」モンスター１体を特殊召喚する。③：相手モンスターの攻撃宣言時に発動できる。手札から「Ｘ－セイバー」モンスター１体を特殊召喚する。
  | ko_text             = 이 카드명의 ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신의 필드 / 묘지 / 제외 상태인 "X－세이버" 몬스터가 10장 이상인 한, 자신 필드의 "X－세이버" 몬스터의 공격력은, 자신의 원래 수비력만큼 올린다. ②: 자신이 엑스트라 덱에서 "X－세이버" 몬스터를 특수 소환했을 경우에 발동할 수 있다. 패 / 덱에서 "X－세이버" 몬스터 1장을 특수 소환한다. ③: 상대 몬스터의 공격 선언시에 발동할 수 있다. 패에서 "X－세이버" 몬스터 1장을 특수 소환한다.
  | sc_text             = 此卡名的②③效果1回合仅可各使用1次。①：只要自己场上・墓地・除外状态的“X－军刀”怪兽为10只以上，自己场上的“X－军刀”怪兽的攻击力就上升相当于自身原本守备力的数值。②：自己从额外牌组将“X－军刀”怪兽特殊召唤的情况下可以发动。从手牌・牌组将1只“X－军刀”怪兽特殊召唤。③：对手怪兽攻击宣言时可以发动。从手牌将1只“X－军刀”怪兽特殊召唤。
