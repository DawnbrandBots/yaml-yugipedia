  | ja_pendulum_effect    = このカード名のＰ効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードと自分の手札・フィールド（表側表示）の「獄神」モンスターか「ドゥームズ」モンスター１体を破壊する。その後、フィールドのカード１枚を破壊できる。
  | ja_text               = このカード名はルール上「ドゥームズ」カードとしても扱う。このカード名の①②のモンスター効果はそれぞれ１ターンに１度しか使用できない。①：デッキの上からカード３枚を裏側で除外して発動できる。このカードを破壊し、ＥＸデッキから「壊獄神ユピテル」１体をＸ召喚扱いで特殊召喚する。その後、自分の手札を１枚選んでそのＸ素材にできる。②：このカードがＥＸデッキに表側で加わった場合に発動できる。デッキから「獄神」魔法・罠カードか「ドゥームズ」魔法・罠カード１枚を手札に加える。
  | ko_pendulum_effect    = 이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 이 카드와 자신의 패 / 필드(앞면 표시)의 "감옥신" 몬스터나 "둠즈" 몬스터 1장을 파괴한다. 그 후, 필드의 카드 1장을 파괴할 수 있다.
  | ko_text               = 이 카드명은 룰상 "둠즈" 카드로도 취급한다. 이 카드명의 ①②의 몬스터 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱 위에서 카드 3장을 뒷면으로 제외하고 발동할 수 있다. 이 카드를 파괴하고, 엑스트라 덱에서 "괴감옥신 유피테르" 1장을 엑시즈 소환으로 취급하여 특수 소환한다. 그 후, 자신의 패를 1장 고르고 그 엑시즈 소재로 할 수 있다. ②: 이 카드가 엑스트라 덱에 앞면으로 넣어졌을 경우에 발동할 수 있다. 덱에서 "감옥신" 마법 / 함정 카드나 "둠즈" 마법 / 함정 카드 1장을 패에 넣는다.
  | sc_pendulum_effect    = 此卡名的灵摆效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将此卡与自己手牌・场上（表侧表示）的1只“狱神”怪兽或“终刻”怪兽破坏。然后，可将场上的1张卡破坏。
  | sc_text               = 此卡名在规则上也视为“终刻”卡。此卡名的①②怪兽效果1回合仅可各使用1次。①：从牌组上面将3张卡以里侧除外可以发动。将此卡破坏，从额外牌组将1只“坏狱神 朱庇特”视为超量召唤特殊召唤。然后，可挑选自己的1张手牌作为其超量素材。②：此卡以表侧加入额外牌组的情况下可以发动。从牌组将1张“狱神”魔法・陷阱卡或“终刻”魔法・陷阱卡加入手牌。
