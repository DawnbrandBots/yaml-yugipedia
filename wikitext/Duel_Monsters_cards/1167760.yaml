  | pendulum_effect       = During your [[Main Phase]]: You can [[destroy]] this card and 1 "[[Power Patron]]" or "[[DoomZ]]" monster in your [[hand]] or [[face-up]] [[field]], then you can destroy 1 card on the [[field]]. You can only use this [[effect]] of "Jupredo the Shademachine Power Patron" [[once per turn]].
  | text                  = (This card is always treated as a "[[DoomZ]]" card.)<br />You can [[banish]] the top 3 cards of your [[Main Deck|Deck]], [[face-down]]; [[destroy]] this card, and if you do, [[Special Summon]] 1 "[[Jupiter the Power Patron of Destruction]]" from your [[Extra Deck]] (this is treated as an [[Xyz Summon]]), then you can [[attach]] 1 card from your [[hand]] to it. If this card is added to your Extra Deck [[face-up]]: You can add 1 "[[Power Patron]]" or "DoomZ" [[Spell]]/[[Trap]] from your Deck to your hand. You can only use each [[effect]] of "Jupredo the Shademachine Power Patron" [[once per turn]].
  | fr_pendulum_effect    = Durant votre Main Phase : vous pouvez détruire cette carte et 1 monstre "Mécène du Pouvoir" ou "DoomZ" dans votre main ou Terrain face recto, puis vous pouvez détruire 1 carte sur le Terrain. Vous ne pouvez utiliser cet effet de "Jupredo le Mécène du Pouvoir de la Machine Obscure" qu'une fois par tour.
  | fr_text               = (Cette carte est toujours traitée comme carte "DoomZ".)<br />Vous pouvez bannir face verso les 3 cartes du dessus de votre Deck ; détruisez cette carte, et si vous le faites, Invoquez Spécialement 1 "Jupiter le Mécène du Pouvoir de la Destruction" depuis votre Extra Deck (ceci est traité comme Invocation Xyz), puis vous pouvez lui attacher 1 carte depuis votre main. Si cette carte est ajoutée face recto à votre Extra Deck : vous pouvez ajouter 1 Magie/Piège "Mécène du Pouvoir" ou "DoomZ" depuis votre Deck à votre main. Vous ne pouvez utiliser chaque effet de "Jupredo le Mécène du Pouvoir de la Machine Obscure" qu'une fois par tour.
  | de_pendulum_effect    = Während deiner Main Phase: Du kannst diese Karte und 1 „Machtpatron“- oder „UntergangZ“-Monster in deiner Hand oder offen auf deiner Spielfeldseite zerstören, dann kannst du 1 Karte auf dem Spielfeld zerstören. Du kannst diesen Effekt von „Jupredo der Schattenmaschinen-Machtpatron“ nur einmal pro Spielzug verwenden.
  | de_text               = (Diese Karte wird immer als „UntergangZ“-Karte behandelt.)<br />Du kannst die obersten 3 Karten deines Decks verdeckt verbannen; zerstöre diese Karte und falls du dies tust, beschwöre 1 „Jupiter der Machtpatron der Zerstörung“ als Spezialbeschwörung von deinem Extra Deck (dies wird als Xyz-Beschwörung behandelt), dann kannst du 1 Karte von deiner Hand daran anhängen. Falls diese Karte deinem Extra Deck offen hinzugefügt wird: Du kannst deiner Hand 1 „Machtpatron“- oder „UntergangZ“-Zauber/Falle von deinem Deck hinzufügen. Du kannst jeden Effekt von „Jupredo der Schattenmaschinen-Machtpatron“ nur einmal pro Spielzug verwenden.
  | it_pendulum_effect    = Durante la tua Main Phase: puoi distruggere questa carta e 1 mostro "Patrono Potente" o "DoomZ" nella tua mano o Terreno scoperto, poi puoi distruggere 1 carta sul Terreno. Puoi utilizzare questo effetto di "Jupredo l'Ombramacchina Patrono Potente" una sola volta per turno.
  | it_text               = (Questa carta viene sempre considerata come una carta "DoomZ".)<br />Puoi bandire le prime 3 carte del tuo Deck, coperte; distruggi questa carta e, se lo fai, Evoca Specialmente 1 "Jupiter il Patrono Potente della Distruzione" dal tuo Extra Deck (questa viene considerata come un'Evocazione Xyz), poi puoi attaccare 1 carta dalla tua mano a esso. Se questa carta viene aggiunta al tuo Extra Deck scoperta: puoi aggiungere 1 Magia/Trappola "Patrono Potente" o "DoomZ" dal tuo Deck alla tua mano. Puoi utilizzare ogni effetto di "Jupredo l'Ombramacchina Patrono Potente" una sola volta per turno.
  | pt_pendulum_effect    = Durante sua Fase Principal: você pode destruir este card e 1 monstro "Patrono(a) do Poder" ou "DoomZ" na sua mão ou no campo com a face para cima e, depois, você pode destruir 1 card no campo. Você só pode usar este efeito de "Jupredo, o Patrono do Poder Máquina Sombria" uma vez por turno.
  | pt_text               = (Este card deve ser sempre considerado como um card "DoomZ".)<br />Você pode banir os 3 cards do topo do seu Deck, com a face para baixo; destrua este card e, se isso acontecer, Invoque por Invocação-Especial 1 "Júpiter, o Patrono do Poder da Destruição" do seu Deck Adicional (isso é considerado uma Invocação-Xyz) e, depois, você pode associar 1 card da sua mão a ele. Se este card for adicionado ao seu Deck Adicional com a face para cima: você pode adicionar 1 Magia/Armadilha "Patrono(a) do Poder" ou "DoomZ" do seu Deck à sua mão. Você só pode usar cada efeito de "Jupredo, o Patrono do Poder Máquina Sombria" uma vez por turno.
  | es_pendulum_effect    = Durante tu Main Phase: puedes destruir esta carta y 1 monstruo "Modelo de Poder" o "DoomZ" en tu mano o Campo boca arriba, y después puedes destruir 1 carta en el Campo. Sólo puedes usar este efecto de "Jupredo la Máquina Sombra Modelo de Poder" una vez por turno.
  | es_text               = (Esta carta se trata siempre como una carta "DoomZ").<br />Puedes desterrar las 3 cartas de la parte superior de tu Deck, boca abajo; destruye esta carta y, si lo haces, Invoca de Modo Especial 1 "Júpiter el Modelo de Poder de Destrucción" desde tu Deck Extra (esto se trata como una Invocación Xyz), y después puedes acoplarle 1 carta en tu mano. Si esta carta es añadida a tu Deck Extra boca arriba: puedes añadir a tu mano 1 Mágica/Trampa "Modelo de Poder" o "DoomZ" en tu Deck. Sólo puedes usar cada efecto de "Jupredo la Máquina Sombra Modelo de Poder" una vez por turno.
  | ja_pendulum_effect    = このカード名のＰ効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードと自分の手札・フィールド（表側表示）の「獄神」モンスターか「ドゥームズ」モンスター１体を破壊する。その後、フィールドのカード１枚を破壊できる。
  | ja_text               = このカード名はルール上「ドゥームズ」カードとしても扱う。このカード名の①②のモンスター効果はそれぞれ１ターンに１度しか使用できない。①：デッキの上からカード３枚を裏側で除外して発動できる。このカードを破壊し、ＥＸデッキから「壊獄神ユピテル」１体をＸ召喚扱いで特殊召喚する。その後、自分の手札を１枚選んでそのＸ素材にできる。②：このカードがＥＸデッキに表側で加わった場合に発動できる。デッキから「獄神」魔法・罠カードか「ドゥームズ」魔法・罠カード１枚を手札に加える。
  | ko_pendulum_effect    = 이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 이 카드와 자신의 패 / 필드(앞면 표시)의 "감옥신" 몬스터나 "둠즈" 몬스터 1장을 파괴한다. 그 후, 필드의 카드 1장을 파괴할 수 있다.
  | ko_text               = 이 카드명은 룰상 "둠즈" 카드로도 취급한다. 이 카드명의 ①②의 몬스터 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱 위에서 카드 3장을 뒷면으로 제외하고 발동할 수 있다. 이 카드를 파괴하고, 엑스트라 덱에서 "괴감옥신 유피테르" 1장을 엑시즈 소환으로 취급하여 특수 소환한다. 그 후, 자신의 패를 1장 고르고 그 엑시즈 소재로 할 수 있다. ②: 이 카드가 엑스트라 덱에 앞면으로 넣어졌을 경우에 발동할 수 있다. 덱에서 "감옥신" 마법 / 함정 카드나 "둠즈" 마법 / 함정 카드 1장을 패에 넣는다.
  | sc_pendulum_effect    = 此卡名的灵摆效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将此卡与自己手牌・场上（表侧表示）的1只“狱神”怪兽或“终刻”怪兽破坏。然后，可将场上的1张卡破坏。
  | sc_text               = 此卡名在规则上也视为“终刻”卡。此卡名的①②怪兽效果1回合仅可各使用1次。①：从牌组上面将3张卡以里侧除外可以发动。将此卡破坏，从额外牌组将1只“坏狱神 朱庇特”视为超量召唤特殊召唤。然后，可挑选自己的1张手牌作为其超量素材。②：此卡以表侧加入额外牌组的情况下可以发动。从牌组将1张“狱神”魔法・陷阱卡或“终刻”魔法・陷阱卡加入手牌。
