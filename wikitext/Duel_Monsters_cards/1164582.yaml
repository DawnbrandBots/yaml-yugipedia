  | text                  = (This card is always treated as a "[[Familiar-Possessed]]" card.)<br />If this card is [[Normal Summon|Normal]] or [[Special Summon]]ed: You can [[add]] 1 "[[Possessed]]" [[Spell]]/[[Trap]] or 1 "[[Grand Spiritual Art - Ichirin]]" from your [[Deck]] to your [[hand]]. You can [[declare]] 1 [[Monster]] [[Type]] and 1 [[Attribute]]; this card becomes that Type and Attribute until the end of this [[turn]]. If this card is [[destroy]]ed by [[battle]] or [[card effect]]: You can [[Special Summon]] 1 [[Spellcaster]] monster with 1500 DEF from your Deck or [[GY]]. You can only use each effect of "Spiritual Art Familiars" [[once per turn]].
  | fr_text               = (Cette carte est toujours traitée comme carte "Familier Possédé".)<br />Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 Magie/Piège "Possédé" ou 1 "Ichirin, Grande Artiste Spirituelle" depuis votre Deck à votre main. Vous pouvez déclarer 1 Type de Monstre et 1 Attribut ; jusqu'à la fin de ce tour, cette carte devient ce Type et Attribut. Si cette carte est détruite au combat ou par un effet de carte : vous pouvez Invoquer Spécialement 1 monstre Magicien avec 1500 DEF depuis votre Deck ou Cimetière. Vous ne pouvez utiliser chaque effet de "Familiers de l'Art Spirituel" qu'une fois par tour.
  | de_text               = (Diese Karte wird immer als „Vertrauten“-Karte behandelt.)<br />Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Besessen“-Zauber/Falle oder 1 „Große Spiritistische Kunst - Ichirin“ von deinem Deck hinzufügen. Du kannst 1 Monstertyp und 1 Eigenschaft deklarieren; diese Karte wird bis zum Ende dieses Spielzugs zu jenem Typ und jener Eigenschaft. Falls diese Karte durch Kampf oder einen Karteneffekt zerstört wird: Du kannst 1 Hexer-Monster mit 1500 DEF als Spezialbeschwörung von deinem Deck oder Friedhof beschwören. Du kannst jeden Effekt von „Vertraute der spirituellen Künste“ nur einmal pro Spielzug verwenden.
  | it_text               = (Questa carta viene sempre considerata come una carta "Posseduto dal Famiglio".)<br />Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 Magia/Trappola "Posseduto" o 1 "Grandiosa Arte Spirituale - Ichirin" dal tuo Deck alla tua mano. Puoi dichiarare 1 Tipo di Mostro e 1 Attributo; questa carta diventa di quel Tipo e Attributo fino alla fine di questo turno. Se questa carta viene distrutta in battaglia o dall'effetto di una carta: puoi Evocare Specialmente 1 mostro Incantatore con 1500 DEF dal tuo Deck o Cimitero. Puoi utilizzare ogni effetto di "Famigli Arte Spirituale" una sola volta per turno.
  | pt_text               = (Este card deve ser sempre considerado como um card "Espírito-Possuído".)<br />Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 Magia/Armadilha "Possuído(a)" ou 1 "Ichirin - Arte Espiritual Maior" do seu Deck à sua mão. Você pode declarar 1 Tipo de Monstro e 1 Atributo; este card se torna desse Tipo e Atributo até o final deste turno. Se este card for destruído em batalha ou por um efeito de card: você pode Invocar por Invocação-Especial 1 monstro Mago com 1500 de DEF do seu Deck ou Cemitério. Você só pode usar cada efeito de "Familiares da Arte Espiritual" uma vez por turno.
  | es_text               = (Esta carta se trata siempre como una carta "Familiar Poseído").<br />Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 Mágica/Trampa "Poseído/a" o 1 "Gran Arte Espiritual - Ichirin" en tu Deck. Puedes declarar 1 Tipo de Monstruo y 1 Atributo; esta carta se convierte en ese Tipo y Atributo hasta el final de este turno. Si esta carta es destruida en batalla o por el efecto de una carta: puedes Invocar de Modo Especial 1 monstruo Lanzador de Conjuros con 1500 DEF desde tu Deck o Cementerio. Sólo puedes usar cada efecto de "Familiares del Arte Espiritual" una vez por turno.
  | ja_text               = このカード名はルール上「憑依装着」カードとしても扱う。このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから「憑依」魔法・罠カードか「大霊術－「一輪」」１枚を手札に加える。②：種族と属性を１つずつ宣言して発動できる。このカードはターン終了時まで宣言した種族・属性になる。③：このカードが戦闘・効果で破壊された場合に発動できる。自分のデッキ・墓地から守備力１５００の魔法使い族モンスター１体を特殊召喚する。
  | ko_text               = 이 카드명은 룰상 "빙의장착" 카드로도 취급한다. 이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "빙의" 마법 / 함정 카드나 "대령술－「일륜」" 1장을 패에 넣는다. ②: 종족과 속성을 1개씩 선언하고 발동할 수 있다. 이 카드는 턴 종료시까지 선언한 종족 / 속성이 된다. ③: 이 카드가 전투 / 효과로 파괴되었을 경우에 발동할 수 있다. 자신의 덱 / 묘지에서 수비력 1500 인 마법사족 몬스터 1장을 특수 소환한다.
  | sc_text               = 此卡名在规则上也视为“凭依装着”卡。此卡名的①②③效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将1张“凭依”魔法・陷阱卡或“大灵术－「一轮」”加入手牌。②：宣言种族与属性各1个可以发动。此卡直至回合结束时为止，变为所宣言的种族・属性。③：此卡因战斗・效果被破坏的情况下可以发动。从自己牌组・墓地将1只守备力1500魔法师族怪兽特殊召唤。
