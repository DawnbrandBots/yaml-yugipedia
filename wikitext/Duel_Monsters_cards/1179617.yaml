  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：用抽牌以外的方法将此卡加入手牌的情况下，将此卡出示给对手，以场上的1张卡为对象可以发动。将该卡破坏，从手牌将1只雷族怪兽特殊召唤。此回合，自己不可从手牌以外的地方特殊召唤效果怪兽。②：此卡存在于怪兽区域的状态下，此卡以外的卡因效果被破坏的情况下可以发动。从牌组将1张“雷盟”陷阱卡加入手牌。
