  | ja_text               = このカード名の①の効果は１ターンに３度まで使用できる。①：自分の魔法＆罠ゾーンの裏側表示カードを任意の数だけ墓地へ送って発動できる。墓地へ送った数×８００ダメージを相手に与える。この効果の発動後、ターン終了時まで悪魔族以外のモンスターの効果で相手が受ける全ての効果ダメージは０になる。②：１ターンに１度、このカードが攻撃対象に選択された時に発動できる。相手フィールドの攻撃表示モンスターの数×５００ダメージを相手に与える。その後、バトルフェイズを終了する。
  | ko_text               = 이 카드명의 ①의 효과는 1턴에 3번까지 사용할 수 있다. ①: 자신의 마법 & 함정 존의 뒷면 표시 카드를 임의의 수만큼 묘지로 보내고 발동할 수 있다. 묘지로 보낸 수 × 800 데미지를 상대에게 준다. 이 효과의 발동 후, 턴 종료시까지 악마족 이외의 몬스터의 효과로 상대가 받는 모든 효과 데미지는 0 이 된다. ②: 1턴에 1번, 이 카드가 공격 대상으로 선택되었을 때에 발동할 수 있다. 상대 필드의 공격 표시 몬스터의 수 × 500 데미지를 상대에게 준다. 그 후, 배틀 페이즈를 종료한다.
  | sc_text               = 此卡名的①效果1回合最多可使用3次。①：将自己魔法与陷阱区域任意数量的里侧表示卡送至墓地可以发动。给予对手送至了墓地的数量×800的伤害。此效果发动后，直至回合结束时为止，对手因恶魔族以外的怪兽的效果受到的所有效果伤害变为0。②：1回合1次，此卡被选择为攻击对象时可以发动。给予对手相当于对手场上的攻击表示怪兽数量×500的伤害。然后，结束战斗阶段。
