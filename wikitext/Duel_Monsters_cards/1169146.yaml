  | text                  = If this card is in your [[hand]]: You can [[Special Summon]] both it and 1 other "[[Zubaba]]", "[[Gagaga]]", "[[Gogogo]]", or "[[Dododo]]" [[monster]] from your hand or [[GY]], except "Gagaga Magician - Gagaga Magic", and if you do, immediately after this [[effect]] [[resolve]]s, [[Xyz Summon]] 1 "Zubaba", "Gagaga", "Gogogo", "Dododo", "[[Djinn]]", "[[Heroic Champion]]", "[[Number]]", "[[ZW -]]", or "[[ZS -]]" [[Xyz Monster]] using only those 2 monsters. When you do, treat the [[Level]] of 1 of the monsters the same as the other monster's. You can only use this effect of "Gagaga Magician - Gagaga Magic" [[once per turn]].
