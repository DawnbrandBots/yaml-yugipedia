  | ja_text               = このカード名の効果は１ターンに１度しか使用できない。①：このカードが手札に存在する場合に発動できる。「ガガガマジシャン－ガガガマジック」以外の自分の手札・墓地の「ズババ」、「ガガガ」、「ゴゴゴ」、「ドドド」モンスター１体と、このカードを特殊召喚し、その２体のみを素材として「ズババ」、「ガガガ」、「ゴゴゴ」、「ドドド」、「魔人」、「Ｈ－Ｃ」、「Ｎｏ．」、「ＺＷ」、「ＺＳ」Ｘモンスター１体のＸ召喚を行う。その際、Ｘ素材とするモンスター１体のレベルは、もう１体のモンスターと同じレベルとして扱う。
  | ko_text               = 이 카드명의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재할 경우에 발동할 수 있다. "가가가 매지션－가가가 매직" 이외의 자신의 패 / 묘지의 "주바바", "가가가", "고고고", "도도도" 몬스터 1장과, 이 카드를 특수 소환하고, 그 2장만을 소재로서 "주바바", "가가가", "고고고", "도도도", "마인(魔人)", "H－C(히로익 챔피언)", "No.", "ZW(제알 웨폰)", "ZS(제알 서버스)" 엑시즈 몬스터 1장의 엑시즈 소환을 실행한다. 그 시기에, 엑시즈 소재로 하는 몬스터 1장의 레벨은, 나머지 1장의 몬스터와 같은 레벨로 취급한다.
  | sc_text               = 此卡名的效果1回合仅可使用1次。①：此卡存在于手牌的情况下可以发动。将“我我我魔术师－我我我魔术”以外的、自己手牌・墓地的1只“刷拉拉”、“我我我”、“隆隆隆”、“怒怒怒”怪兽、与此卡特殊召唤，仅以该2只作为素材进行1只“刷拉拉”、“我我我”、“隆隆隆”、“怒怒怒”、“魔人”、“英豪胜利者”、“编号”、“ZEXAL兵器”、“ZEXAL从者”超量怪兽的超量召唤。在此之际，要作为超量素材的1只怪兽的等级可视为与另1只怪兽的等级相同。
