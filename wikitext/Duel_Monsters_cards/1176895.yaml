  | ja_text               = 同じ種族のモンスター２体<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＬ召喚した場合、またはこのカードのリンク先にモンスターが特殊召喚された場合、自分の手札・フィールド（表側表示）から魔法カード１枚を墓地へ送って発動できる。デッキから儀式モンスター１体を手札に加える。②：このカードのリンク先の儀式・融合・Ｓ・Ｘモンスター１体を対象として発動できる。そのモンスターとは種類（儀式・融合・Ｓ・Ｘ）が異なり、種族が同じモンスター１体を自分の墓地から特殊召喚する。
  | ko_text               = 같은 종족의 몬스터 2장<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 링크 소환했을 경우, 또는 이 카드의 링크 앞에 몬스터가 특수 소환되었을 경우, 자신의 패 / 필드(앞면 표시)에서 마법 카드 1장을 묘지로 보내고 발동할 수 있다. 덱에서 의식 몬스터 1장을 패에 넣는다. ②: 이 카드의 링크 앞의 의식 / 융합 / 싱크로 / 엑시즈 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터와는 종류(의식 / 융합 / 싱크로 / 엑시즈)가 다르고, 종족이 같은 몬스터 1장을 자신 묘지에서 특수 소환한다.
  | sc_text               = 相同种族的怪兽2只<br />此卡名的①②效果1回合仅可各使用1次。①：此卡连接召唤的情况下，或有怪兽被特殊召唤至此卡连接端的情况下，从自己手牌・场上（表侧表示）将1张魔法卡送至墓地可以发动。从牌组将1只仪式怪兽加入手牌。②：以此卡连接端的1只仪式・融合・同步・超量怪兽为对象可以发动。从自己墓地将1只与该怪兽种类（仪式・融合・同步・超量）不同、种族相同的怪兽特殊召唤。
