  | text            = 1 [[Tuner monster|Tuner]] + 1 or more non-Tuner [[Gemini monster]]s<br />[[Once per turn]], you can [[send]] 1 Gemini monster from your [[hand]] to the [[Graveyard]] to [[Target|select]] and [[destroy]] 1 [[Spell Card|Spell]] or [[Trap Card]] your opponent [[control]]s. When this card is destroyed and sent to the Graveyard, you can select 1 Gemini monster in your Graveyard and [[Special Summon]] it. The Special Summoned Gemini monster is treated as an [[Effect Monster]], and gains its effect.
  | fr_text         = 1 Syntoniseur + 1+ monstre non-Syntoniseur Gémeau<br />Une fois par tour : vous pouvez envoyer 1 monstre Gémeau depuis votre main au Cimetière, puis ciblez 1 Magie/Piège contrôlé par votre adversaire ; détruisez-le. Lorsque cette carte est détruite et envoyée au Cimetière : vous pouvez cibler 1 monstre Gémeau dans votre Cimetière ; Invoquez Spécialement la cible, et si vous le faites, elle devient un Monstre à Effet et gagne ses effets.
  | de_text         = 1 Empfänger + 1+ Nicht-Empfänger-Zwillingsmonster<br />Einmal pro Spielzug: Du kannst 1 Zwillingsmonster von deiner Hand auf den Friedhof legen und dann 1 Zauber/Falle wählen, den oder die dein Gegner kontrolliert; zerstöre ihn oder sie. Wenn diese Karte zerstört und auf den Friedhof gelegt wird: Du kannst 1 Zwillingsmonster in deinem Friedhof wählen; beschwöre jenes gewählte Ziel als Spezialbeschwörung und falls du dies tust, wird es zu einem Effektmonster und erhält seinen Effekt.
  | it_text         = 1 Tuner + 1+ mostri Gemello non-Tuner<br />Una volta per turno: puoi mandare 1 mostro Gemello dalla tua mano al Cimitero, poi scegliere come bersaglio 1 Magia/Trappola controllata dal tuo avversario; distruggila. Quando questa carta viene distrutta e mandata al Cimitero: puoi scegliere come bersaglio 1 mostro Gemello nel tuo Cimitero; Evoca Specialmente quel bersaglio e, se lo fai, esso diventa un Mostro con Effetto e guadagna il suo effetto.
  | pt_text         = 1 Regulador + 1+ monstros Gêmeos não-Reguladores<br />Uma vez por turno: você pode enviar 1 monstro Gêmeos da sua mão para o Cemitério e, depois, escolha 1 Magia/Armadilha que seu oponente controla; destrua-a. Quando este card for destruído e enviado para o Cemitério: você pode escolher 1 monstro Gêmeos no seu Cemitério; Invoque o alvo por Invocação-Especial e, se isso acontecer, ele se torna um Monstro de Efeito e ganha seus efeitos.
  | es_text         = 1 Cantante + 1+ monstruos Géminis que no sean Cantantes<br />Una vez por turno: puedes mandar al Cementerio 1 monstruo Géminis en tu mano, y después seleccionar 1 Mágica/Trampa que controle tu adversario; destrúyela. Cuando esta carta es destruida y mandada al Cementerio: puedes seleccionar 1 monstruo Géminis en tu Cementerio; Invoca ese objetivo de Modo Especial y, si lo haces, se convierte en un Monstruo de Efecto, y gana su efecto.
  | ja_text         = チューナー＋チューナー以外のデュアルモンスター１体以上<br />１ターンに１度、手札からデュアルモンスター１体を墓地へ送って発動できる。相手フィールド上の魔法・罠カード１枚を選択して破壊する。また、このカードが破壊され墓地へ送られた時、自分の墓地のデュアルモンスター１体を選択して特殊召喚できる。この効果で特殊召喚したデュアルモンスターは再度召喚された状態になる。
  | ko_text         = 튜너＋튜너 이외의 듀얼 몬스터 1장 이상<br />1턴에 1번, 패에서 듀얼 몬스터 1장을 묘지로 보내는 것으로, 상대 필드 위에 존재하는 마법 / 함정 카드 1장을 선택하고 파괴한다. 이 카드가 파괴되어 묘지로 보내졌을 때, 자신의 묘지에 존재하는 듀얼 몬스터 1장을 선택해 특수 소환할 수 있다. 이 효과로 특수 소환한 듀얼 몬스터는 재차 소환된 상태가 된다.
