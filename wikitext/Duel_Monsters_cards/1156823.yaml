  | text                = [[Reveal]] 1 "[[Shaddoll]]" card in your [[hand]]; [[Add a card|add]] 2 "Shaddoll" cards from your [[Main Deck|Deck]] to your hand, each with a different type ([[Monster]], [[Spell]], or [[Trap]]) from the revealed card and from each other, then [[discard]] 1 card. You can [[banish]] this card from your [[GY]]; add 1 "[[Infernoid]]" monster from your Deck or GY to your hand. You can only use each effect of "Void Unleashing" once per turn.
  | fr_text             = Révélez 1 carte "Marionnette de l'Ombre" dans votre main ; ajoutez 2 cartes "Marionnette de l'Ombre" depuis votre Deck à votre main, chacune de type différent (Monstre, Magie ou Piège) de la carte révélée et de l'une de l'autre, puis défaussez 1 carte. Vous pouvez bannir cette carte depuis votre Cimetière ; ajoutez 1 monstre "Infernoid" depuis votre Deck ou Cimetière à votre main. Vous ne pouvez utiliser chaque effet de "Déchaînement du Vide" qu'une fois par tour.
  | de_text             = Zeige 1 „Schattenpuppe“-Karte in deiner Hand vor; füge deiner Hand 2 „Schattenpuppe“-Karten von deinem Deck hinzu, jede mit einem unterschiedlichen Typ (Monster, Zauber oder Falle) als die vorgezeigte Karte und die andere Karte, dann wirf 1 Karte ab. Du kannst diese Karte von deinem Friedhof verbannen; füge deiner Hand 1 „Infernoid“-Monster von deinem Deck oder Friedhof hinzu. Du kannst jeden Effekt von „Entfesselung der Leere“ nur einmal pro Spielzug verwenden.
  | it_text             = Rivela 1 carta "Bambolaombra" nella tua mano; aggiungi 2 carte "Bambolaombra" dal tuo Deck alla tua mano, ognuna con un tipo diverso (Mostro, Magia o Trappola) dalla carta rivelata e l'una dall'altra, poi scarta 1 carta. Puoi bandire questa carta dal tuo Cimitero; aggiungi 1 mostro "Infernoid" dal tuo Deck o Cimitero alla tua mano. Puoi utilizzare ogni effetto di "Liberazione dal Vuoto" una sola volta per turno.
  | pt_text             = Revele 1 card "Sombraneco" na sua mão; adicione 2 cards "Sombraneco" do seu Deck à sua mão, cada um com um tipo diferente (Monstro, Magia ou Armadilha) que o do card revelado e um do outro e, depois, descarte 1 card. Você pode banir este card do seu Cemitério; adicione 1 monstro "Infernoide" do seu Deck ou Cemitério à sua mão. Você só pode usar cada efeito de "Liberação do Vácuo" uma vez por turno.
  | es_text             = Muestra 1 carta "Sombrañeca" en tu mano; añade a tu mano 2 cartas "Sombrañeca" en tu Deck, cada una de tipo diferente (Monstruo, Mágica o Trampa) al de la carta mostrada y entre sí, y después descarta 1 carta. Puedes desterrar esta carta en tu Cementerio; añade a tu mano 1 monstruo "Infiernoid" en tu Deck o Cementerio. Sólo puedes usar cada efecto de "Liberación del Vacío" una vez por turno.
  | ja_text             = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札の「シャドール」カード１枚を相手に見せて発動できる。見せたカードとは種類（モンスター・魔法・罠）が異なる「シャドール」カード２枚をデッキから手札に加える（同じ種類は１枚まで）。その後、自分の手札を１枚選んで捨てる。②：墓地のこのカードを除外して発動できる。自分のデッキ・墓地から「インフェルノイド」モンスター１体を手札に加える。
  | ko_text             = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패의 "섀도르" 카드 1장을 상대에게 보여주고 발동할 수 있다. 보여준 카드와는 종류(몬스터 / 마법 / 함정)가 다른 "섀도르" 카드 2장을 덱에서 패에 넣는다(같은 종류는 1장까지). 그 후, 자신의 패를 1장 고르고 버린다. ②: 묘지의 이 카드를 제외하고 발동할 수 있다. 자신의 덱 / 묘지에서 "인페르노이드" 몬스터 1장을 패에 넣는다.
  | sc_text             = 此卡名的①②效果1回合仅可各使用1次。①：向对手出示手牌的1张“影依”卡可以发动。从牌组将2张种类（怪兽・魔法・陷阱）与所出示的卡不同的“影依”卡加入手牌（相同种类最多1张）。然后，挑选自己的1张手牌舍弃。②：将墓地的此卡除外可以发动。从自己牌组・墓地将1只“狱炎机”怪兽加入手牌。
