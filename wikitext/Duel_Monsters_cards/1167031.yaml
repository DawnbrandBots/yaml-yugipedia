  | ja_text               = このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。手札のこのカードを含む自分の手札・フィールドのモンスターを融合素材とし、「ヘカトンケイル」融合モンスター１体を融合召喚する。②：このカードがモンスターと戦闘を行う場合、その２体はその戦闘では破壊されない。③：このカードが墓地に存在する状態で、幻想魔族の融合モンスターが自分の墓地へ送られた場合に発動できる。このカードを手札に加える。
  | ko_text               = 이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다. 패의 이 카드를 포함하는 자신의 패 / 필드의 몬스터를 융합 소재로 하고, "헤카톤케일" 융합 몬스터 1장을 융합 소환한다. ②: 이 카드가 몬스터와 전투를 실행할 경우, 그 2장은 그 전투로는 파괴되지 않는다. ③: 이 카드가 묘지에 존재하는 상태에서, 환상마족 융합 몬스터가 자신 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 패에 넣는다.
  | sc_text               = 此卡名的①③效果1回合仅可各使用1次。①：向对手出示手牌的此卡可以发动。将包含手牌的此卡在内的、自己手牌・场上的怪兽作为融合素材，将1只“百臂无形”融合怪兽融合召唤。②：此卡与怪兽进行战斗的情况下，该2只不会因该战斗被破坏。③：此卡存在于墓地的状态下，幻想魔族的融合怪兽被送至自己墓地的情况下可以发动。将此卡加入手牌。
