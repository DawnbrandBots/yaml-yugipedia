  | text                  = 4 [[Tuner]]s + 1+ non-Tuner [[Synchro Monster]]s<br />Must first be [[Synchro Summon]]ed with the above [[material]]s. Gains 500 [[ATK]] for each Tuner in your [[GY]]. Your opponent cannot [[target]] this card with [[card effect]]s, also it cannot be [[destroy]]ed by your opponent's card effects. [[Once per turn]] ([[Quick Effect]]): You can [[banish]] this card, also banish as many cards in your opponent's [[field]] and GY as possible, then you can [[Special Summon]] 1 "[[Red Nova Dragon]]" from your [[Extra Deck]] (this is treated as a Synchro Summon).
  | fr_text               = 4 Syntoniseurs + 1+ Monstre Synchro non-Syntoniseur<br />Doit d'abord être Invoquée par Synchronisation avec les Matériels ci-dessus. Gagne 500 ATK pour chaque Syntoniseur dans votre Cimetière. Votre adversaire ne peut pas cibler cette carte avec des effets de carte, et aussi, elle ne peut pas être détruite par des effets de carte de votre adversaire. Une fois par tour (Effet Rapide) : vous pouvez bannir cette carte, et aussi, bannissez autant de cartes dans le Terrain et Cimetière de votre adversaire que possible, puis vous pouvez Invoquer Spécialement 1 "Dragon Nova Rouge" depuis votre Extra Deck (ceci est traité comme Invocation Synchro).
  | de_text               = 4 Empfänger + 1+ Nicht-Empfänger-Synchromonster<br />Muss erst mit dem oben erwähnten Material als Synchrobeschwörung beschworen werden. Erhält für jeden Empfänger in deinem Friedhof 500 ATK. Dein Gegner kann diese Karte nicht als Ziel für Karteneffekte wählen, zusätzlich kann sie nicht durch Karteneffekte deines Gegners zerstört werden. Einmal pro Spielzug (Schnelleffekt): Du kannst diese Karte verbannen, zusätzlich verbanne so viele Karten von der Spielfeldseite und dem Friedhof deines Gegners wie möglich, dann kannst du 1 „Roter Nova-Drache“ als Spezialbeschwörung von deinem Extra Deck beschwören (dies wird als Synchrobeschwörung behandelt).
  | it_text               = 4 Tuner + 1+ Mostri Synchro non-Tuner<br />Deve prima essere Synchro Evocato con i materiali sopra indicati. Guadagna 500 ATK per ogni Tuner nel tuo Cimitero. Il tuo avversario non può scegliere questa carta come bersaglio con gli effetti delle carte, inoltre essa non può essere distrutta dagli effetti delle carte del tuo avversario. Una volta per turno (Effetto Rapido): puoi bandire questa carta, inoltre bandire tante carte nel Terreno e Cimitero del tuo avversario quante possibile, poi puoi Evocare Specialmente 1 "Drago Nova Rossa" dal tuo Extra Deck (questa viene considerata come una Synchro Evocazione).
  | pt_text               = 4 Reguladores + 1+ Monstros Sincro não-Reguladores<br />Primeiro deve ser Invocado por Invocação-Sincro com as matérias acima. Ganha 500 de ATK para cada Regulador no seu Cemitério. Seu oponente não pode escolher este card como alvo de efeitos de card e, além disso, ele não pode ser destruído pelos efeitos de card do seu oponente. Uma vez por turno (Efeito Rápido): você pode banir este card e, além disso, bana tantos cards no campo e Cemitério do seu oponente quanto possível e, depois, você pode Invocar por Invocação-Especial 1 "Dragão Vermelho Nova" do seu Deck Adicional (isso é considerado uma Invocação-Sincro).
  | es_text               = 4 Cantantes + 1+ Monstruos de Sincronía que no sean Cantantes<br />Debe ser primero Invocado por Sincronía con los materiales listados arriba. Gana 500 ATK por cada Cantante en tu Cementerio. Tu adversario no puede seleccionar esta carta con efectos de cartas, y además no puede ser destruida por efectos de cartas de tu adversario. Una vez por turno (Efecto Rápido): puedes desterrar esta carta, y además destierra tantas cartas en el Campo y Cementerio de tu adversario como sea posible, y después puedes Invocar de Modo Especial 1 "Dragón de Nova Roja" desde tu Deck Extra (esto se trata como una Invocación por Sincronía).
  | ja_text               = チューナー４体＋チューナー以外のＳモンスター１体以上<br />このカードは上記のカードをＳ素材にしたＳ召喚でのみＥＸデッキから特殊召喚できる。①：このカードの攻撃力は、自分の墓地のチューナーの数×５００アップする。②：フィールドのこのカードは相手の効果では破壊されず、相手はフィールドのこのカードを効果の対象にできない。③：自分・相手ターンに１度、発動できる。このカード及び相手のフィールド・墓地のカードを全て除外する。その後、ＥＸデッキから「スカーレッド・ノヴァ・ドラゴン」１体をＳ召喚扱いで特殊召喚できる。
  | ko_text               = 튜너 4장 ＋ 튜너 이외의 싱크로 몬스터 1장 이상<br />이 카드는 상기 카드를 싱크로 소재로 한 싱크로 소환으로만 엑스트라 덱에서 특수 소환할 수 있다. ①: 이 카드의 공격력은, 자신 묘지의 튜너의 수 × 500 올린다. ②: 필드의 이 카드는 상대 효과로는 파괴되지 않으며, 상대는 필드의 이 카드를 효과의 대상으로 할 수 없다. ③: 자신 / 상대 턴에 1번, 발동할 수 있다. 이 카드 및 상대의 필드 / 묘지의 카드를 전부 제외한다. 그 후, 엑스트라 덱에서 "스카레드 노바 드래곤" 1장을 싱크로 소환으로 취급하고 특수 소환할 수 있다.
  | sc_text               = 协调4只＋协调以外的同步怪兽1只以上<br />此卡从额外牌组仅可通过以上述卡作为同步素材的同步召唤来特殊召唤。①：此卡的攻击力上升自己墓地的协调数量×500的数值。②：场上的此卡不会因对手效果被破坏，对手不可将场上的此卡作为效果的对象。③：在每个自己・对手回合中1次，可以发动。将此卡及对手场上・墓地的卡全部除外。然后，可从额外牌组将1只“绯暗红新星龙”视为同步召唤特殊召唤。
