  | pendulum_effect       = If a [[Pendulum Monster]](s) you [[control]] would be [[destroy]]ed by an opponent's card [[effect]], you can destroy this card instead of 1 of those Pendulum Monsters. You can only use this [[effect]] of "Twilight Specter Rayrage" [[once per turn]].
  | text                  = If this card is in your [[hand]]: You can [[target]] 1 [[Pendulum Monster]] you [[control]]; place that Pendulum Monster in your [[Pendulum Zone]] (neither player can [[activate]] its [[Pendulum Effect]]s this [[turn]]), and if you do, [[Special Summon]] this card. ([[Quick Effect]]): You can [[Tribute]] this card, then target 1 card in your Pendulum Zone; it cannot be destroyed by your opponent's card [[effect]]s this turn. You can only use each effect of "Twilight Specter Rayrage" [[once per turn]].
  | fr_pendulum_effect    = Si un ou plusieurs Monstres Pendule que vous contrôlez vont être détruits par un effet de carte de l'adversaire, vous pouvez détruire cette carte au lieu d'1 de ces Monstres Pendule. Vous ne pouvez utiliser cet effet de "Crépuscule Spectral Rayrage" qu'une fois par tour.
  | fr_text               = Si cette carte est dans votre main : vous pouvez cibler 1 Monstre Pendule que vous contrôlez ; placez le Monstre Pendule dans votre Zone Pendule (aucun joueur ne peut activer ses Effets Pendule ce tour), et si vous le faites, Invoquez Spécialement cette carte. (Effet Rapide) : vous pouvez Sacrifier cette carte, puis ciblez 1 carte dans votre Zone Pendule ; ce tour, elle ne peut pas être détruite par des effets de carte de votre adversaire. Vous ne pouvez utiliser chaque effet de "Crépuscule Spectral Rayrage" qu'une fois par tour.
  | de_pendulum_effect    = Falls ein oder mehr Pendelmonster, die du kontrollierst, durch einen Karteneffekt eines Gegners zerstört würden, kannst du statt 1 jener Pendelmonster diese Karte zerstören. Du kannst diesen Effekt von „Zwielichtgespenst Raylussion“ nur einmal pro Spielzug verwenden.
  | de_text               = Falls sich diese Karte in deiner Hand befindet: Du kannst 1 Pendelmonster wählen, das du kontrollierst; lege jenes Pendelmonster in deine Pendelzone (kein Spieler kann in diesem Spielzug seine Pendeleffekte aktivieren) und falls du dies tust, beschwöre diese Karte als Spezialbeschwörung. (Schnelleffekt): Du kannst diese Karte als Tribut anbieten und dann 1 Karte in deiner Pendelzone wählen; sie kann in diesem Spielzug nicht durch Karteneffekte deines Gegners zerstört werden. Du kannst jeden Effekt von „Zwielichtgespenst Raylussion“ nur einmal pro Spielzug verwenden.
  | it_pendulum_effect    = Se uno o più Mostri Pendulum che controlli stanno per essere distrutti dall'effetto di una carta dell'avversario, puoi distruggere questa carta invece di 1 di quei Mostri Pendulum. Puoi utilizzare questo effetto di "Rayrage Spettro del Crepuscolo" una sola volta per turno.
  | it_text               = Se questa carta è nella tua mano: puoi scegliere come bersaglio 1 Mostro Pendulum che controlli; metti quel Mostro Pendulum nella tua Zona Pendulum (nessun giocatore può attivare i suoi Effetti Pendulum in questo turno) e, se lo fai, Evoca Specialmente questa carta. (Effetto Rapido): puoi offrire come Tributo questa carta, poi scegliere come bersaglio 1 carta nella tua Zona Pendulum; essa non può essere distrutta dagli effetti delle carte del tuo avversario in questo turno. Puoi utilizzare ogni effetto di "Rayrage Spettro del Crepuscolo" una sola volta per turno.
  | pt_pendulum_effect    = Se um ou mais Monstros Pêndulo que você controla seriam destruídos por um efeito de card do oponente, você pode destruir este card em vez de 1 desses Monstros Pêndulo. Você só pode usar este efeito de "Espectro do Crepúsculo Rayragem" uma vez por turno.
  | pt_text               = Se este card estiver na sua mão: você pode escolher 1 Monstro Pêndulo que você controla; coloque esse Monstro Pêndulo na sua Zona de Pêndulo (nenhum duelista pode ativar seus Efeitos de Pêndulo neste turno) e, se isso acontecer, Invoque este card por Invocação-Especial. (Efeito Rápido): você pode oferecer este card como Tributo e, depois, escolha 1 card na sua Zona de Pêndulo; ele não pode ser destruído pelos efeitos de card do seu oponente neste turno. Você só pode usar cada efeito de "Espectro do Crepúsculo Rayragem" uma vez por turno.
  | es_pendulum_effect    = Si uno o más Monstruos de Péndulo que controlas fueran a ser destruidos por el efecto de una carta del adversario, puedes destruir esta carta en lugar de 1 de esos Monstruos de Péndulo. Sólo puedes usar este efecto de "Raypejismo Espectro del Crepúsculo" una vez por turno.
  | es_text               = Si esta carta está en tu mano: puedes seleccionar 1 Monstruo de Péndulo que controles; pon ese Monstruo de Péndulo en tu Zona de Péndulo (ningún jugador puede activar sus Efectos de Péndulo este turno) y, si lo haces, Invoca esta carta de Modo Especial. (Efecto Rápido): puedes Sacrificar esta carta, y después selecciona 1 carta en tu Zona de Péndulo; ésta no puede ser destruida por efectos de cartas de tu adversario este turno. Sólo puedes usar cada efecto de "Raypejismo Espectro del Crepúsculo" una vez por turno.
  | ja_pendulum_effect    = このカード名のＰ効果は１ターンに１度しか使用できない。①：自分フィールドのＰモンスターが相手の効果で破壊される場合、その破壊されるＰモンスター１体の代わりにこのカードを破壊できる。
  | ja_text               = このカード名の①②のモンスター効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、自分フィールドのＰモンスター１体を対象として発動できる。そのＰモンスターを自分のＰゾーンに置き、このカードを特殊召喚する。この効果でＰゾーンに置いたカードのＰ効果はこのターン発動できない。②：自分・相手ターンに、このカードをリリースし、自分のＰゾーンのカード１枚を対象として発動できる。このターン、そのカードは相手の効果では破壊されない。
  | ko_pendulum_effect    = 
