  | sc_pendulum_effect    = 此卡名的灵摆效果1回合仅可使用1次。①：自己场上的灵摆怪兽将被对手的效果破坏的情况下，作为该1只将被破坏的灵摆怪兽的代替，可将此卡破坏。
  | sc_text               = 此卡名的①②怪兽效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，以自己场上的1只灵摆怪兽为对象可以发动。将该灵摆怪兽放在自己的灵摆区域，将此卡特殊召唤。以此效果所放在灵摆区域的卡的灵摆效果此回合不可发动。②：在自己・对手回合中，解放此卡，以自己灵摆区域的1张卡为对象可以发动。此回合，该卡不会因对手的效果被破坏。
