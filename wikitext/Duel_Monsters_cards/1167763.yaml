  | ja_text               = このカードは通常召喚できない。融合・Ｓ・Ｘモンスターを１体ずつ、自分のフィールド（表側表示）・墓地からＥＸデッキに戻した場合のみＥＸデッキ・墓地から特殊召喚できる。このカード名の①のモンスター効果は１ターンに１度しか使用できない。①：このカードがＥＸデッキに表側で加わった場合に発動できる。デッキから「獄神」カード１枚を手札に加える。②：このカードが特殊召喚した場合に発動する。お互いの墓地のカードを全て裏側で除外する。③：フィールドのこのカードは「獄神」モンスター以外のモンスターの効果を受けない。
  | ko_pendulum_effect    = 이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이하의 효과에서 1개를 선택하고 발동할 수 있다. ●이 카드를 파괴하고, 자신의 패 / 묘지에서 "감옥신" 몬스터 1장을 특수 소환한다. ●이 카드를 파괴한다. 이 턴 중에, 자신 필드의 원래의 레벨이 12 인 "감옥신" 몬스터의 공격력은 5000 올린다.
  | ko_text               = 이 카드는 통상 소환할 수 없다. 융합 / 싱크로 / 엑시즈 몬스터를 1장씩, 자신의 필드(앞면 표시) / 묘지에서 엑스트라 덱으로 되돌렸을 경우에만 엑스트라 덱 / 묘지에서 특수 소환할 수 있다. 이 카드명의 ①의 몬스터 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 엑스트라 덱에 앞면으로 넣어졌을 경우에 발동할 수 있다. 덱에서 "감옥신" 카드 1장을 패에 넣는다. ②: 이 카드를 특수 소환했을 경우에 발동한다. 서로의 묘지의 카드를 전부 뒷면으로 제외한다. ③: 필드의 이 카드는 "감옥신" 몬스터 이외의 몬스터의 효과를 받지 않는다.
