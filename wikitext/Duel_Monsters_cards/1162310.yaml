  | text                  = If you [[control]] "[[Regulus, the Prince of Endymion]]": [[Activate]] 1 of these [[effect]]s;<br />● [[Destroy]] 1 [[monster]] your opponent controls that [[battle]]d this [[turn]].<br />● When a [[Normal Spell Card|Normal]] or [[Quick-Play Spell Card]] is activated: [[Negate]] that effect.<br />During your [[Main Phase]]: You can [[banish]] this card from your [[GY]], then [[target]] 1 "Regulus, the Prince of Endymion" or 1 monster that mentions it in your GY; [[Special Summon]] it. You can only use each effect of "Arrow of Regulus" [[once per turn]].
  | fr_text               = Si vous contrôlez "Regulus, le Prince d'Endymion" : activez 1 de ces effets ;<br />● Détruisez 1 monstre contrôlé par votre adversaire qui a combattu ce tour.<br />● Lorsqu'une Carte Magie Normale ou Jeu-Rapide est activée : annulez l'effet.<br />Durant votre Main Phase : vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 "Regulus, le Prince d'Endymion" ou 1 monstre qui le mentionne dans votre Cimetière ; Invoquez-le Spécialement. Vous ne pouvez utiliser chaque effet de "Flèche de Regulus" qu'une fois par tour.
  | de_text               = Falls du „Regulus, der Prinz von Endymion“ kontrollierst: Aktiviere 1 dieser Effekte;<br />● Zerstöre 1 Monster, das dein Gegner kontrolliert und das in diesem Spielzug gekämpft hat.<br />● Wenn eine Normale oder Schnellzauberkarte aktiviert wird: Annulliere jenen Effekt.<br />Während deiner Main Phase: Du kannst diese Karte von deinem Friedhof verbannen und dann 1 „Regulus, der Prinz von Endymion“ oder 1 Monster, das ihn erwähnt, in deinem Friedhof wählen; beschwöre ihn oder es als Spezialbeschwörung. Du kannst jeden Effekt von „Pfeil von Regulus“ nur einmal pro Spielzug verwenden.
  | it_text               = Se controlli "Regulus, il Principe di Endymion": attiva 1 di questi effetti;<br />● Distruggi 1 mostro controllato dal tuo avversario che ha combattuto in questo turno.<br />● Quando viene attivata una Carta Magia Normale o Rapida: annulla quell'effetto.<br />Durante la tua Main Phase: puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 "Regulus, il Principe di Endymion" o 1 mostro che lo menziona nel tuo Cimitero; Evocalo Specialmente. Puoi utilizzare ogni effetto di "Freccia di Regulus" una sola volta per turno.
  | pt_text               = Se você controlar "Regulus, o Príncipe de Endymion": ative 1 desses efeitos;<br />● Destrua 1 monstro que seu oponente controla que batalhou neste turno.<br />● Quando um Card de Magia Normal ou Rápida for ativado: negue o efeito.<br />Durante sua Fase Principal: você pode banir este card do seu Cemitério e, depois, escolha 1 "Regulus, o Príncipe de Endymion" ou 1 monstro que o mencione no seu Cemitério; Invoque-o por Invocação-Especial. Você só pode usar cada efeito de "Flecha de Regulus" uma vez por turno.
  | es_text               = Si controlas "Regulus, el Príncipe de Endimión": activa 1 de estos efectos;<br />● Destruye 1 monstruo que controle tu adversario que haya batallado este turno.<br />● Cuando es activada una Carta Mágica Normal o de Juego Rápido: niega ese efecto.<br />Durante tu Main Phase: puedes desterrar esta carta en tu Cementerio, y después seleccionar 1 "Regulus, el Príncipe de Endimión" o 1 monstruo que lo mencione en tu Cementerio; Invócalo de Modo Especial. Sólo puedes usar cada efecto de "Flecha de Regulus" una vez por turno.
  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドに「聖月の皇太子レグルス」が存在する場合、以下の効果から１つを選択して発動できる。<br />●このターンに戦闘を行った相手フィールドのモンスター１体を破壊する。<br />●通常・速攻魔法カードが発動した時に発動できる。その効果を無効にする。<br />②：自分メインフェイズに墓地のこのカードを除外し、自分の墓地の「聖月の皇太子レグルス」またはそのカード名が記されたモンスター１体を対象として発動できる。そのモンスターを特殊召喚する。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드에 "프린스 오브 엔디미온 레굴루스"가 존재할 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다.<br />●이 턴에 전투를 실행한 상대 필드의 몬스터 1장을 파괴한다.<br />●일반 / 속공 마법 카드가 발동했을 때에 발동할 수 있다. 그 효과를 무효로 한다.<br />②: 자신 메인 페이즈에 묘지의 이 카드를 제외하고, 자신 묘지의 "프린스 오브 엔디미온 레굴루스" 또는 그 카드명이 쓰여진 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터를 특수 소환한다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：自己场上存在“恩底弥翁之圣月皇太子 雷格鲁斯”的情况下，可从以下效果中选择1个发动。<br />●将在此回合进行过战斗的对手场上的1只怪兽破坏。<br />●通常・速攻魔法卡发动时可以发动。将该效果无效。<br />②：在自己的主要阶段将墓地的此卡除外，以自己墓地的1只“恩底弥翁之圣月皇太子 雷格鲁斯”或记载有该卡名的怪兽为对象可以发动。将该怪兽特殊召唤。
