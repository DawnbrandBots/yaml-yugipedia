  | sc_text               = 发动此卡的回合中，自己仅可特殊召唤“梅尔菲”怪兽。此卡名的②效果1回合仅可使用1次。①：从牌组将最多4只“梅尔菲”怪兽加入手牌（同名卡最多1张）。然后，直接变为此回合的结束阶段。②：将墓地的此卡除外，以“梅尔菲摔倒倒”以外的、自己墓地的2张“梅尔菲”卡为对象可以发动。将其中1张加入手牌，另1张放回牌组最下面。
