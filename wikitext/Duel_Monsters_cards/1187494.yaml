  | text                  = [[Add]] up to 4 "[[Melffy]]" [[monster]]s with different names from your [[Main Deck|Deck]] to your [[hand]], then it becomes the [[End Phase]] of this [[turn]]. You can [[banish]] this card from your [[GY]], then [[target]] 2 "Melffy" cards in your GY, except "Melffy Footsteps"; add 1 of them to your hand, and if you do, place the other on the bottom of your Deck. You can only use this [[effect]] of "Melffy Footsteps" [[once per turn]]. You cannot [[Special Summon]] the turn you [[activate]] this card, except "Melffy" monsters.
  | fr_text               = Ajoutez max. 4 monstres "Melffy" de noms différents depuis votre Deck à votre main, puis passez à la End Phase de ce tour. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 2 cartes "Melffy" ("Un, Deux, Trois, Melffy" exclu) dans votre Cimetière ; ajoutez-en 1 à votre main, et si vous le faites, placez l'autre au-dessous de votre Deck. Vous ne pouvez utiliser cet effet de "Un, Deux, Trois, Melffy" qu'une fois par tour. Vous ne pouvez pas Invoquer Spécialement (monstres "Melffy" exclus) le tour où vous activez cette carte.
  | de_text               = Füge deiner Hand bis zu 4 „Melffy“-Monster mit unterschiedlichen Namen von deinem Deck hinzu, dann beginnt die End Phase dieses Spielzugs. Du kannst diese Karte von deinem Friedhof verbannen und dann 2 „Melffy“-Karten in deinem Friedhof wählen, außer „Melffy am Berg“; füge 1 von ihnen deiner Hand hinzu und falls du dies tust, lege die andere unter dein Deck. Du kannst diesen Effekt von „Melffy am Berg“ nur einmal pro Spielzug verwenden. Du kannst in dem Spielzug, in dem du diese Karte aktivierst, keine Spezialbeschwörungen durchführen, außer von „Melffy“-Monstern.
  | it_text               = Aggiungi fino a 4 mostri "Melffy" con nomi diversi dal tuo Deck alla tua mano, poi passa alla End Phase di questo turno. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 2 carte "Melffy" nel tuo Cimitero, eccetto "Passi Melffy"; aggiungi 1 di esse alla tua mano e, se lo fai, metti l'altra in fondo al tuo Deck. Puoi utilizzare questo effetto di "Passi Melffy" una sola volta per turno. Non puoi Evocare Specialmente nel turno in cui attivi questa carta, eccetto mostri "Melffy".
  | pt_text               = Adicione até 4 monstros "Melffy" com nomes diferentes do seu Deck à sua mão e, depois, essa se torna a Fase Final deste turno. Você pode banir este card do seu Cemitério e, depois, escolha 2 cards "Melffy" no seu Cemitério, exceto "Estátua Melffy"; adicione 1 deles à sua mão e, se isso acontecer, coloque o outro no fundo do seu Deck. Você só pode usar este efeito de "Estátua Melffy" uma vez por turno. Você não pode Invocar por Invocação-Especial no turno em que ativar este card, exceto monstros "Melffy".
  | es_text               = Añade a tu mano hasta 4 monstruos "Melffy" con nombres diferentes en tu Deck, y después pasa a la End Phase de este turno. Puedes desterrar esta carta en tu Cementerio, y después selecciona 2 cartas "Melffy" en tu Cementerio, excepto "Pasitos Melffy"; añade 1 de ellas a tu mano y, si lo haces, pon la otra en la parte inferior de tu Deck. Sólo puedes usar este efecto de "Pasitos Melffy" una vez por turno. No puedes Invocar de Modo Especial el turno en el que activas esta carta, excepto monstruos "Melffy".
  | ja_text               = このカードを発動するターン、自分は「メルフィー」モンスターしか特殊召喚できない。このカード名の②の効果は１ターンに１度しか使用できない。①：デッキから「メルフィー」モンスターを４体まで手札に加える（同名カードは１枚まで）。その後、このターンのエンドフェイズになる。②：墓地のこのカードを除外し、「メルフィーがころんだ」以外の自分の墓地の「メルフィー」カード２枚を対象として発動できる。その内の１枚を手札に加え、もう１枚をデッキの一番下に戻す。
