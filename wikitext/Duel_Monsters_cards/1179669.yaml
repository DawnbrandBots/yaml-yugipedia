  | text                  = 2 [[Level]] 3 [[DARK]] [[monsters]]<br />You can [[detach]] 1 [[material]] from this card; [[Special Summon]] 1 "[[The Phantom Knights]]" [[monster]] from your [[Main Deck|Deck]]. If you [[Xyz Summon]] an "[[Xyz Dragon]]" monster, while this card is in your [[Monster Zone]] (except during the [[Damage Step]]): You can [[Add a card|add]] 1 "[[Rank-Up-Magic]]" [[Spell]] from your Deck to your [[hand]]. If this card is [[destroy]]ed: You can add 1 of your banished "The Phantom Knights" cards to your hand, except [[Xyz Monster]]s. You can only use each [[effect]] of "The Phantom Knights of Malevolent Scythe" [[once per turn]].
  | fr_text               = 2 monstres TÉNÈBRES de Niveau 3<br />Vous pouvez détacher 1 Matériel de cette carte ; Invoquez Spécialement 1 monstre "Les Chevaliers Fantômes" depuis votre Deck. Si vous Invoquez par Xyz un monstre "Dragon Xyz", tant que cette carte est dans votre Zone Monstre (sauf durant la Damage Step) : vous pouvez ajouter 1 Magie "Magie-Rang-Plus" depuis votre Deck à votre main. Si cette carte est détruite : vous pouvez ajouter 1 de vos cartes "Les Chevaliers Fantômes" bannies (Monstres Xyz exclus) à votre main. Vous ne pouvez utiliser chaque effet de "Les Chevaliers Fantômes de la Faux Malveillante" qu'une fois par tour.
  | de_text               = 2 FINSTERNIS Monster der Stufe 3<br />Du kannst 1 Material von dieser Karte abhängen; beschwöre 1 „Die Phantomritter“-Monster als Spezialbeschwörung von deinem Deck. Falls du ein „Xyz-Drache“-Monster als Xyz-Beschwörung beschwörst, solange diese Karte in deiner Monsterzone liegt (außer während des Damage Steps): Du kannst deiner Hand 1 „Rangsteigerungszauber“-Zauber von deinem Deck hinzufügen. Falls diese Karte zerstört wird: Du kannst deiner Hand 1 deiner verbannten „Die Phantomritter“-Karten hinzufügen, außer Xyz-Monstern. Du kannst jeden Effekt von „Die Phantomritter der Heimtückischen Sense“ nur einmal pro Spielzug verwenden.
  | it_text               = 2 mostri OSCURITÀ di Livello 3<br />Puoi staccare 1 materiale da questa carta; Evoca Specialmente 1 mostro "I Cavalieri Fantasma" dal tuo Deck. Se Evochi Xyz un mostro "Drago Xyz", mentre questa carta è nella tua Zona Mostri (eccetto durante il Damage Step): puoi aggiungere 1 Magia "Alza-Rango-Magico" dal tuo Deck alla tua mano. Se questa carta viene distrutta: puoi aggiungere 1 delle tue carte "I Cavalieri Fantasma" bandite alla tua mano, eccetto Mostri Xyz. Puoi utilizzare ogni effetto di "I Cavalieri Fantasma della Falce Malevolente" una sola volta per turno.
  | pt_text               = 2 monstros de TREVAS de Nível 3<br />Você pode desassociar 1 matéria deste card; Invoque por Invocação-Especial 1 monstro "Os Cavaleiros Fantasmas" do seu Deck. Se você Invocar um monstro "Dragão Xyz" por Invocação-Xyz, enquanto este card estiver na sua Zona de Monstros (exceto durante a Etapa de Dano): você pode adicionar 1 Magia "Magia de Aumento de Classe" do seu Deck à sua mão. Se este card for destruído: você pode adicionar à sua mão 1 dos seus cards "Os Cavaleiros Fantasmas" banidos, exceto Monstros Xyz. Você só pode usar cada efeito de "Os Cavaleiros Fantasmas da Foice Malévola" uma vez por turno.
  | es_text               = 2 monstruos de OSCURIDAD de Nivel 3<br />Puedes desacoplar 1 material de esta carta; Invoca de Modo Especial, desde tu Deck, 1 monstruo "Los Caballeros Fantasma". Si Invocas Xyz un monstruo "Dragón Xyz", mientras esta carta está en tu Zona de Monstruos (excepto durante el Damage Step): puedes añadir a tu mano 1 Mágica "Magia de Subida de Rango" en tu Deck. Si esta carta es destruida: puedes añadir a tu mano 1 de tus cartas "Los Caballeros Fantasma" desterradas, excepto Monstruos Xyz. Sólo puedes usar cada efecto de "Los Caballeros Fantasma de la Guadaña Malévola" una vez por turno.
  | ja_text               = 闇属性レベル３モンスター×２<br />このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードのＸ素材を１つ取り除いて発動できる。デッキから「幻影騎士団」モンスター１体を特殊召喚する。②：このカードがモンスターゾーンに存在する状態で、自分が「エクシーズ・ドラゴン」モンスターをＸ召喚した場合に発動できる。デッキから「ＲＵＭ」魔法カード１枚を手札に加える。③：このカードが破壊された場合に発動できる。Ｘモンスター以外の自分の除外状態の「幻影騎士団」カード１枚を手札に加える。
