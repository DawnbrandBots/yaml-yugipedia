  | sc_text               = 暗属性等级3怪兽×2<br />此卡名的①②③效果1回合仅可各使用1次。①：去除此卡的1个超量素材可以发动。从牌组将1只“魅影骑士团”怪兽特殊召唤。②：此卡存在于怪兽区域的状态下，自己将“超量龙”怪兽超量召唤的情况下可以发动。从牌组将1张“升阶魔法”魔法卡加入手牌。③：此卡被破坏的情况下可以发动。将超量怪兽以外的、自己除外状态的1张“魅影骑士团”卡加入手牌。
