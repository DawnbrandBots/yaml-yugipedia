  | text                  = The monster in your center [[Main Monster Zone]] cannot be banished by your opponent's card [[effect]]s. You can [[send]] 1 other [[Spell]]/[[Trap]] from your [[hand]] or [[field]] to the [[GY]], then [[declare]] a [[Level]] from 1 to 4; [[Special Summon]] 1 "[[Elfnote Seraphim Token]]" ([[Plant]]/[[Tuner]]/[[FIRE]]/[[ATK]] 0/[[DEF]] 0) with the declared [[Level]]. While that Token is in the [[Monster Zone]], the player who Summoned it cannot Special Summon from the [[Extra Deck]], except "[[Elfnote]]" monsters. You can only use this effect of "Elfnotes: Quatrain of Succession" [[once per turn]].
  | fr_text               = Le monstre dans votre Zone Monstre Main centrale ne peut pas être banni par des effets de carte de votre adversaire. Vous pouvez envoyer 1 autre Magie/Piège depuis votre main ou Terrain au Cimetière, puis déclarez un Niveau de 1 à 4 ; Invoquez Spécialement 1 "Jeton Séraphin des Notes Elfiques" (Plante/Syntoniseur/FEU/ATK 0/DEF 0) du Niveau déclaré. Tant que le Jeton est dans la Zone Monstre, le joueur qui l'a Invoqué ne peut pas Invoquer Spécialement (monstres "Notes Elfiques" exclus) depuis l'Extra Deck. Vous ne pouvez utiliser cet effet de "Notes Elfiques : Quatrain de Succession" qu'une fois par tour.
  | de_text               = Das Monster in deiner mittleren Main-Monsterzone kann nicht durch Karteneffekte deines Gegners verbannt werden. Du kannst 1 andere/n Zauber/Falle von deiner Hand oder Spielfeldseite auf den Friedhof legen und dann eine Stufe von 1 bis 4 deklarieren; beschwöre 1 „Elfnote-Seraph-Spielmarke“ (Pflanze/Empfänger/FEUER/ATK 0/DEF 0) mit der deklarierten Stufe als Spezialbeschwörung. Solange jene Spielmarke in der Monsterzone liegt, kann der Spieler, der sie beschworen hat, keine Spezialbeschwörungen vom Extra Deck durchführen, außer von „Elfnote“-Monstern. Du kannst diesen Effekt von „Elfnoten: Vierzeiler der Abfolge“ nur einmal pro Spielzug verwenden.
  | it_text               = Il mostro nella tua Zona Mostri Main centrale non può essere bandito dagli effetti delle carte del tuo avversario. Puoi mandare 1 altra Magia/Trappola dalla tua mano o Terreno al Cimitero, poi dichiarare un Livello tra 1 e 4; Evoca Specialmente 1 "Segna-Elfnote Serafino" (Pianta/Tuner/FUOCO/ATK 0/DEF 0) con il Livello dichiarato. Mentre quel Segna-Mostro è nella Zona Mostri, il giocatore che l'ha Evocato non può Evocare Specialmente dall'Extra Deck, eccetto mostri "Elfnote". Puoi utilizzare questo effetto di "Elfnote: Quartina della Successione" una sola volta per turno.
  | pt_text               = O monstro na sua Zona de Monstros Principal central não pode ser banido pelos efeitos de card do seu oponente. Você pode enviar 1 outra Magia/Armadilha da sua mão ou do campo para o Cemitério e, depois, declare um Nível de 1 a 4; Invoque por Invocação-Especial 1 "Ficha de Serafim Elfnota" (Planta/Regulador/FOGO/ATK 0/DEF 0) com o Nível declarado. Enquanto essa Ficha estiver na Zona de Monstros, o duelista que a Invocou não pode Invocar por Invocação-Especial do Deck Adicional, exceto monstros "Elfnota". Você só pode usar este efeito de "Elfnotas: Quarteto de Sucessão" uma vez por turno.
  | es_text               = El monstruo en tu Zona de Monstruos Principal central no puede ser desterrado por efectos de cartas de tu adversario. Puedes mandar al Cementerio otra Mágica/Trampa en tu mano o Campo, y después declara un Nivel de 1 a 4; Invoca de Modo Especial 1 "Ficha Elfnota Serafín" (Planta/Cantante/FUEGO/ATK 0/DEF 0) con el Nivel declarado. Mientras esa Ficha está en la Zona de Monstruos, el jugador que la Invocó no puede Invocar de Modo Especial desde el Deck Extra, excepto monstruos "Elfnota". Sólo puedes usar este efecto de "Elfnotas: Cuarteto de Sucesión" una vez por turno.
  | ja_text               = このカード名の②の効果は１ターンに１度しか使用できない。①：自分の中央のメインモンスターゾーンのモンスターは相手の効果では除外できない。②：自分の手札・フィールドからこのカード以外の魔法・罠カード１枚を墓地へ送り、１～４までの任意のレベルを宣言して発動できる。宣言したレベルを持つ「極花の大耀聖トークン」（植物族・チューナー・炎・攻／守０）１体を自分フィールドに特殊召喚する。この効果で特殊召喚したトークンが存在する限り、自分は「エルフェンノーツ」モンスターしかＥＸデッキから特殊召喚できない。
  | ko_text               = 
  | sc_text               = 此卡名的②效果1回合仅可使用1次。①：自己中央的主要怪兽区域的怪兽不可因对手的效果除外。②：从自己手牌・场上将此卡以外的1张魔法・陷阱卡送至墓地，宣言1～4的任意等级可以发动。将1只拥有所宣言等级的“极花之大耀圣衍生物”（植物族・协调・炎・攻/守0）特殊召唤至自己场上。只要以此效果特殊召唤的衍生物存在，自己从额外牌组仅可特殊召唤“耀圣”怪兽。
