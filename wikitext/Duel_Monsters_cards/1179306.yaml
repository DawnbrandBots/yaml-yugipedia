  | text                  = 3 [[Level]] 10 [[monsters]] that cannot be [[Normal Summon]]ed/[[Set]]<br />Must be either [[Fusion Summon]]ed, or [[Special Summon]]ed (from your [[Extra Deck]]) by [[send]]ing the above cards you [[control]] to the [[GY]]. You can only Special Summon "The Chaotic Phantasmal Sacred Beasts" [[once per turn]] this way, no matter which method you use. The first two times this card on the [[field]] would be destroyed by card [[effect]] each [[turn]], it is not [[destroy]]ed. Once per [[Chain]], up to thrice per turn ([[Quick Effect]]): You can [[target]] 1 [[face-up]] monster your opponent controls; [[negate]] its effects (until the end of this turn), then you can gain [[LP]] equal to half that monster's [[ATK]].
  | fr_text               = 3 monstres de Niveau 10 qui ne peuvent pas être Invoqués/Posés Normalement<br />Uniquement soit Invocable par Fusion soit Invocable Spécialement (depuis votre Extra Deck) en envoyant les cartes ci-dessus que vous contrôlez au Cimetière. Vous ne pouvez Invoquer Spécialement "Les Bêtes Sacrées du Spectre Chaotique" qu'une fois par tour de cette façon, peu importe la méthode que vous utilisez. Les deux premières fois que cette carte sur le Terrain va être détruite par un effet de carte chaque tour, elle n'est pas détruite. Une fois par Chaîne, max. trois fois par tour (Effet Rapide) : vous pouvez cibler 1 monstre face recto contrôlé par votre adversaire ; annulez ses effets (jusqu'à la fin de ce tour), puis vous pouvez gagner des LP égaux à la moitié de l'ATK du monstre.
  | de_text               = 3 Monster der Stufe 10, die nicht als Normalbeschwörung beschworen/gesetzt werden können<br />Muss entweder als Fusionsbeschwörung beschworen werden oder als Spezialbeschwörung (von deinem Extra Deck) beschworen werden, indem du die oben erwähnten Karten, die du kontrollierst, auf den Friedhof legst. Du kannst „Die chaotischen phantasmalen heiligen Ungeheuer“ nur einmal pro Spielzug auf diese Art als Spezialbeschwörung beschwören, egal welche Methode du verwendest. Die ersten beiden Male in jedem Spielzug, dass diese Karte auf dem Spielfeld durch einen Karteneffekt zerstört würde, wird sie nicht zerstört. Einmal pro Kette, bis zu dreimal pro Spielzug (Schnelleffekt): Du kannst 1 offenes Monster wählen, das dein Gegner kontrolliert; annulliere (bis zum Ende dieses Spielzugs) seine Effekte, dann kannst du LP in Höhe der Hälfte der ATK jenes Monsters erhalten.
  | it_text               = 3 mostri di Livello 10 che non possono essere Evocati Normalmente/Posizionati<br />Deve essere Evocato tramite Fusione, oppure Evocato Specialmente (dal tuo Extra Deck) mandando le carte sopra indicate che controlli al Cimitero. Puoi Evocare Specialmente "Le Caotiche Bestie Sacre Fantasma" una sola volta per turno in questo modo, indipendentemente da quale metodo utilizzi. Le prime due volte che questa carta sul Terreno sta per essere distrutta dall'effetto di una carta ogni turno, non viene distrutta. Una volta per Catena, fino a tre volte per turno (Effetto Rapido): puoi scegliere come bersaglio 1 mostro scoperto controllato dal tuo avversario; annulla i suoi effetti (fino alla fine di questo turno), poi puoi guadagnare LP pari alla metà dell'ATK di quel mostro.
  | pt_text               = 3 monstros de Nível 10 que não podem ser Invocados por Invocação-Normal/Baixados<br />Deve ser Invocado por Invocação-Fusão, ou por Invocação-Especial (do seu Deck Adicional) ao enviar os cards acima que você controla para o Cemitério. Você só pode Invocar "As Bestas Sagradas Caóticas Fantasmas" por Invocação-Especial uma vez por turno desta forma, não importa o método que usar. Nas primeiras duas vezes que este card no campo seria destruído por um efeito de card a cada turno, ele não é destruído. Uma vez por Corrente, até três vezes por turno (Efeito Rápido): você pode escolher 1 monstro com a face para cima que seu oponente controla; negue seus efeitos (até o final deste turno) e, depois, você pode ganhar PV igual à metade do ATK desse monstro.
  | es_text               = 3 monstruos de Nivel 10 que no puedan ser Invocados de Modo Normal/Colocados<br />Debe ser ya sea Invocado por Fusión, o Invocado de Modo Especial (desde tu Deck Extra) mandando al Cementerio las cartas mencionadas arriba que controlas. Sólo puedes Invocar de Modo Especial "Las Caóticas Bestias Sagradas Fantasma" una vez por turno de esta forma, sin importar el método que uses. Las primeras dos veces que esta carta en el Campo fuera a ser destruida por el efecto de una carta cada turno, no es destruida. Una vez por Cadena, hasta tres veces por turno (Efecto Rápido): puedes seleccionar 1 monstruo boca arriba que controle tu adversario; niega sus efectos (hasta el final de este turno), y después puedes ganar LP iguales a la mitad del ATK de ese monstruo.
  | ja_text               = 通常召喚できないレベル１０モンスター×３<br />「混沌の三幻魔」は１ターンに１度、融合召喚及び以下の方法でのみ特殊召喚できる。●自分フィールドの上記のカードを墓地へ送った場合にＥＸデッキから特殊召喚できる。①：フィールドのこのカードは１ターンに２度まで効果では破壊されない。②：自分・相手ターンに３度まで、相手フィールドの表側表示モンスター１体を対象として発動できる（同一チェーン上では１度まで）。そのモンスターの効果をターン終了時まで無効にする。その後、その攻撃力の半分だけ自分のＬＰを回復できる。
  | ko_text               = 
  | sc_text               = 不可通常召唤的等级10怪兽×3<br />“混沌三幻魔”1回合1次，仅可通过融合召唤及以下方法特殊召唤。●将自己场上的上述卡送至墓地的情况下可从额外牌组特殊召唤。①：场上的此卡1回合最多2次不会因效果被破坏。②：在每个自己・对手回合中最多3次，以对手场上的1只表侧表示怪兽为对象可以发动（同一连锁上最多1次）。将该怪兽的效果直至回合结束时为止无效。然后，可依其攻击力的一半的数值恢复自己的LP。
