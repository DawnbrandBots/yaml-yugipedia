  | text                  = [[Reveal]] 1 [[Ritual Spell]] from your [[hand]] or [[Main Deck|Deck]], and if you do, [[Add a card|add]] 1 [[monster]] from your Deck to your hand that mentions that Spell's name. If a [[face-up]] [[Ritual Monster]](s) you [[control]] [[leaves the field]] by card [[effect]] while this card is in your [[GY]], and you do not control any [[face-up]] monsters, other than Ritual Monsters (except during the [[Damage Step]]): You can add this card from your GY to your hand. You can only use each effect of "Ragged Records of Rites" once per turn.
  | fr_text               = Révélez 1 Magie Rituelle depuis votre main ou Deck, et si vous le faites, ajoutez 1 monstre depuis votre Deck à votre main qui mentionne le nom de la Magie. Si un ou plusieurs Monstres Rituels face recto que vous contrôlez quittent le Terrain par un effet de carte tant que cette carte est dans votre Cimetière, et que vous ne contrôlez aucun monstre face recto (Monstres Rituels exclus) (sauf durant la Damage Step) : vous pouvez ajouter cette carte depuis votre Cimetière à votre main. Vous ne pouvez utiliser chaque effet de "Archives Décrépites de Rites" qu'une fois par tour.
  | de_text               = Zeige 1 Ritualzauber von deiner Hand oder deinem Deck vor und falls du dies tust, füge deiner Hand 1 Monster, das den Namen jenes Zaubers erwähnt, von deinem Deck hinzu. Falls ein oder mehr offene Ritualmonster, die du kontrollierst, das Spielfeld durch einen Karteneffekt verlassen, solange sich diese Karte in deinem Friedhof befindet, und du keine offenen Monster kontrollierst, außer Ritualmonstern (außer während des Damage Steps): Du kannst diese Karte von deinem Friedhof deiner Hand hinzufügen. Du kannst jeden Effekt von „Zerrissene Aufzeichnungen der Riten“ nur einmal pro Spielzug verwenden.
  | it_text               = Rivela 1 Magia Rituale dalla tua mano o Deck e, se lo fai, aggiungi dal tuo Deck alla tua mano 1 mostro che menziona il nome di quella Magia. Se uno o più Mostri Rituale scoperti che controlli lasciano il Terreno per l'effetto di una carta mentre questa carta è nel tuo Cimitero, e tu non controlli nessun mostro scoperto, a parte Mostri Rituale (eccetto durante il Damage Step): puoi aggiungere questa carta dal tuo Cimitero alla tua mano. Puoi utilizzare ogni effetto di "Registri Logori dei Riti" una sola volta per turno.
  | pt_text               = Revele 1 Magia de Ritual da sua mão ou do Deck e, se isso acontecer, adicione 1 monstro do seu Deck à sua mão que mencione o nome dessa Magia. Se um ou mais Monstros de Ritual com a face para cima que você controla deixarem o campo devido a um efeito de card enquanto este card estiver no seu Cemitério e você não controlar nenhum monstro com a face para cima, que não sejam Monstros de Ritual (exceto durante a Etapa de Dano): você pode adicionar este card do seu Cemitério à sua mão. Você só pode usar cada efeito de "Registros Destroçados de Ritos" uma vez por turno.
  | es_text               = Muestra 1 Mágica de Ritual en tu mano o Deck y, si lo haces, añade a tu mano 1 monstruo en tu Deck que mencione el nombre de esa Mágica. Si uno o más Monstruos de Ritual boca arriba que controlas dejan el Campo por el efecto de una carta mientras esta carta está en tu Cementerio, y no controlas ningún monstruo boca arriba que no sea Monstruo de Ritual (excepto durante el Damage Step): puedes añadir a tu mano esta carta en tu Cementerio. Sólo puedes usar cada efecto de "Registros de Rituales Desgarrados" una vez por turno.
  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札・デッキから儀式魔法カード１枚を相手に見せ、そのカード名が記されたモンスター１体をデッキから手札に加える。②：このカードが墓地に存在する状態で、自分フィールドの表側表示の儀式モンスターが効果でフィールドから離れた場合、自分フィールドに儀式モンスター以外の表側表示モンスターが存在しなければ発動できる。このカードを手札に加える。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패 / 덱에서 의식 마법 카드 1장을 상대에게 보여주고, 그 카드명이 쓰여진 몬스터 1장을 덱에서 패에 넣는다. ②: 이 카드가 묘지에 존재하는 상태에서, 자신 필드의 앞면 표시의 의식 몬스터가 효과로 필드에서 벗어났을 경우, 자신 필드에 의식 몬스터 이외의 앞면 표시 몬스터가 존재하지 않으면 발동할 수 있다. 이 카드를 패에 넣는다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：从手牌・牌组将1张仪式魔法卡出示给对手，从牌组将1只记载有该卡名的怪兽加入手牌。②：此卡存在于墓地的状态下，自己场上有表侧表示的仪式怪兽因效果从场上离开的情况下，如果自己场上不存在仪式怪兽以外的表侧表示怪兽则可以发动。将此卡加入手牌。
