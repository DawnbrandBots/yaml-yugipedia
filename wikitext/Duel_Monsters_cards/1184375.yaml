  | text                  = 1 [[Tuner]] + 1 non-Tuner [[Spellcaster]] monster<br />While this card is in the center [[Main Monster Zone]], neither player can [[declare]] [[attack]]s, except with monsters in their center Main Monster Zones. During the [[Main Phase]], if this card is in the center Main Monster Zone ([[Quick Effect]]): You can [[return]] this card to the [[Extra Deck]], and if you do, [[Special Summon]] up to 1 "[[Elfnote]]" monster each from your [[hand]], [[Main Deck|Deck]], and [[GY]]. You can only use this effect of "Elfnote June Pride" [[once per turn]].
  | fr_text               = 1 Syntoniseur + 1 monstre non-Syntoniseur Magicien<br />Tant que cette carte est dans la Zone Monstre Main centrale, aucun joueur ne peut déclarer d'attaques, sauf avec des monstres dans leurs Zones Monstre Main centrales. Durant la Main Phase, si cette carte est dans la Zone Monstre Main centrale (Effet Rapide) : vous pouvez renvoyer cette carte à l'Extra Deck, et si vous le faites, Invoquez Spécialement max. 1 monstre "Notes Elfiques" depuis votre main, max. 1 monstre "Notes Elfiques" depuis votre Deck et max. 1 monstre "Notes Elfiques" depuis votre Cimetière. Vous ne pouvez utiliser cet effet de "Fierté de Juin des Notes Elfiques" qu'une fois par tour.
  | de_text               = 1 Empfänger + 1 Hexer-Nicht-Empfänger-Monster<br />Solange diese Karte in der mittleren Main-Monsterzone liegt, kann kein Spieler Angriffe deklarieren, außer mit dem Monster in seiner mittleren Main-Monsterzone. Während der Main Phase, falls diese Karte in der mittleren Main-Monsterzone liegt (Schnelleffekt): Du kannst diese Karte ins Extra Deck zurücklegen und falls du dies tust, beschwöre bis zu je 1 „Elfnote“-Monster als Spezialbeschwörung von deiner Hand, deinem Deck und deinem Friedhof. Du kannst diesen Effekt von „Elfnote Junistolz“ nur einmal pro Spielzug verwenden.
  | it_text               = 1 Tuner + 1 mostro Incantatore non-Tuner<br />Mentre questa carta è nella Zona Mostri Main centrale, nessun giocatore può dichiarare attacchi, eccetto con mostri nella sua Zona Mostri Main centrale. Durante la Main Phase, se questa carta è nella Zona Mostri Main centrale (Effetto Rapido): puoi far ritornare questa carta nell'Extra Deck e, se lo fai, Evoca Specialmente fino a 1 mostro "Elfnote" ciascuno dalla tua mano, Deck e Cimitero. Puoi utilizzare questo effetto di "Elfnote Orgoglio di Giugno" una sola volta per turno.
  | pt_text               = 1 Regulador + 1 monstro Mago não-Regulador<br />Enquanto este card estiver na Zona de Monstros Principal central, nenhum duelista pode declarar ataques, exceto com monstros em suas Zonas de Monstros Principais centrais. Durante a Fase Principal, se este card estiver na Zona de Monstros Principal central (Efeito Rápido): você pode devolver este card para o Deck Adicional e, se isso acontecer, Invoque por Invocação-Especial até 1 monstro "Elfnota" cada da sua mão, do Deck e do Cemitério. Você só pode usar este efeito de "Orgulho de Junho de Elfnota" uma vez por turno.
  | es_text               = 1 Cantante + 1 monstruo Lanzador de Conjuros no Cantante<br />Mientras esta carta está en la Zona de Monstruos Principal central, ningún jugador puede declarar ataques, excepto con monstruos en sus Zonas de Monstruos Principales centrales. Durante la Main Phase, si esta carta está en la Zona de Monstruos Principal central (Efecto Rápido): puedes devolver esta carta al Deck Extra y, si lo haces, Invoca de Modo Especial hasta 1 monstruo "Elfnota" cada uno desde tu mano, Deck y Cementerio. Sólo puedes usar este efecto de "Elfnota Orgullosa de Junio" una vez por turno.
  | ja_text               = チューナー＋チューナー以外の魔法使い族モンスター１体<br />このカード名の②の効果は１ターンに１度しか使用できない。①：このカードが中央のメインモンスターゾーンに存在する限り、お互いは中央のメインモンスターゾーンのモンスターでしか攻撃宣言できない。②：このカードが中央のメインモンスターゾーンに存在する場合、自分・相手のメインフェイズに発動できる。このカードをＥＸデッキに戻し、自分の手札・デッキ・墓地からそれぞれ１体まで、「エルフェンノーツ」モンスターを特殊召喚する。
  | ko_text               = 튜너 ＋ 튜너 이외의 마법사족 몬스터 1장<br />이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 중앙 메인 몬스터 존에 존재하는 한, 양쪽 플레이어는 중앙 메인 몬스터 존의 몬스터로밖에 공격 선언할 수 없다. ②: 이 카드가 중앙 메인 몬스터 존에 존재할 경우, 자신 / 상대의 메인 페이즈에 발동할 수 있다. 이 카드를 엑스트라 덱으로 되돌리고, 자신의 패 / 덱 / 묘지에서 각각 1장까지, "엘펜노츠" 몬스터를 특수 소환한다.
  | sc_text               = 协调＋协调以外的魔法师族怪兽1只<br />此卡名的②效果1回合仅可使用1次。①：只要此卡存在于中央的主要怪兽区域，双方仅可用中央的主要怪兽区域的怪兽攻击宣言。②：此卡存在于中央的主要怪兽区域的情况下，在自己・对手的主要阶段可以发动。将此卡放回额外牌组，从自己手牌・牌组・墓地各将最多1只“耀圣”怪兽特殊召唤。
