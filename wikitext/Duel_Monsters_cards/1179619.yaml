  | text                  = [[Activate]] 1 of these [[effect]]s;<br />● Place 1 "[[Blitzclique]]" [[Continuous Trap]] from your [[Main Deck|Deck]], [[face-up]] on your [[field]].<br />● [[Return]] 1 [[Thunder]] [[monster]] you [[control]] to the [[hand]], then [[target]] 1 card on the field; [[destroy]] it.<br />If a card(s) is destroyed by your "Blitzclique" card's effect, while this card is in your [[GY]] (except during the [[Damage Step]]): You can [[Add a card|add]] this card to your hand. You can only use each effect of "Blitzclique - Breakaway" once per turn.
  | fr_text               = Activez 1 de ces effets ;<br />● Placez face recto 1 Piège Continu "Blitzclique" depuis votre Deck sur votre Terrain.<br />● Renvoyez 1 monstre Tonnerre que vous contrôlez à la main, puis ciblez 1 carte sur le Terrain ; détruisez-la.<br />Si une ou plusieurs cartes sont détruites par un effet de votre carte "Blitzclique", tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez ajouter cette carte à votre main. Vous ne pouvez utiliser chaque effet de "Blitzclique - Rupture" qu'une fois par tour.
  | de_text               = Aktiviere 1 dieser Effekte;<br />● Lege 1 Permanente „Blitzclique“-Falle von deinem Deck offen auf deine Spielfeldseite.<br />● Gib 1 Donner-Monster, das du kontrollierst, auf die Hand zurück und wähle dann 1 Karte auf dem Spielfeld; zerstöre sie.<br />Falls eine oder mehr Karten durch einen Effekt deiner „Blitzclique“-Karte zerstört werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte deiner Hand hinzufügen. Du kannst jeden Effekt von „Blitzclique - Zerschmettern“ nur einmal pro Spielzug verwenden.
  | it_text               = Attiva 1 di questi effetti;<br />● Metti 1 Trappola Continua "Blitzclique" dal tuo Deck, scoperta sul tuo Terreno.<br />● Fai ritornare 1 mostro Tuono che controlli nella mano, poi scegli come bersaglio 1 carta sul Terreno; distruggila.<br />Se una o più carte vengono distrutte dall'effetto di una tua carta "Blitzclique", mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi aggiungere questa carta alla tua mano. Puoi utilizzare ogni effetto di "Blitzclique - Rottura" una sola volta per turno.
  | pt_text               = Ative 1 desses efeitos;<br />● Coloque 1 Armadilha Contínua "Blitzclique" do seu Deck, com a face para cima no seu campo.<br />● Devolva 1 monstro Trovão que você controla para a mão e, depois, escolha 1 card no campo; destrua-o.<br />Se um ou mais cards forem destruídos por um efeito de card "Blitzclique" seu, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode adicionar este card à sua mão. Você só pode usar cada efeito de "Blitzclique - Destruição" uma vez por turno.
  | es_text               = Activa 1 de estos efectos;<br />● Pon boca arriba en tu Campo 1 Trampa Continua "Blitzclique" en tu Deck.<br />● Devuelve a la mano 1 monstruo Trueno que controles, y después selecciona 1 carta en el Campo; destrúyela.<br />Si una o más cartas son destruidas por el efecto de tu carta "Blitzclique", mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes añadir esta carta a tu mano. Sólo puedes usar cada efecto de "Blitzclique - Fragmentación" una vez por turno.
  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：以下の効果から１つを選択して発動できる。<br />●デッキから「ブリッツクリーク」永続罠カード１枚を自分フィールドに表側表示で置く。<br />●自分フィールドの雷族モンスター１体を手札に戻し、フィールドのカード１枚を対象として発動できる。そのカードを破壊する。<br />②：このカードが墓地に存在する状態で、自分の「ブリッツクリーク」カードの効果でカードを破壊した場合に発動できる。このカードを手札に加える。
