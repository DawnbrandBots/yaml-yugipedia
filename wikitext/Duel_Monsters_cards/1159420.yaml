  | text                = [[Activate]] 1 of these [[effect]]s;<br />● During your opponent's [[Battle Phase]]: Your opponent gains 1000 [[LP]], then end the [[Battle Phase]].<br />● When your opponent [[activate]]s a [[monster effect]], while they [[control]] more cards than you do: [[Special Summon]] 1 "[[Red Dragon Archfiend]]" or "[[Hot Red Dragon Archfiend]]" from your [[Extra Deck]] or [[GY]], and if you do, negate that effect, and if you do that, [[destroy]] that card.<br />You can only [[activate]] 1 "Champion's Pulse" per turn.
  | fr_text             = Activez 1 de ces effets ;<br />● Durant la Battle Phase de votre adversaire : votre adversaire gagne 1000 LP, puis terminez la Battle Phase.<br />● Lorsque votre adversaire active un effet de monstre, tant qu'il contrôle plus de cartes que vous : Invoquez Spécialement 1 "Dragon Rouge Archdémon" ou "Bouillant Dragon Rouge Archdémon" depuis votre Extra Deck ou Cimetière, et si vous le faites, annulez l'effet, et si vous faites ça, détruisez la carte.<br />Vous ne pouvez activer qu'1 "Pulsations de Champion" par tour.
  | de_text             = Aktiviere 1 dieser Effekte;<br />● Während der Battle Phase deines Gegners: Dein Gegner erhält 1000 LP, dann beende die Battle Phase.<br />● Wenn dein Gegner einen Monstereffekt aktiviert, solange er mehr Karten kontrolliert als du: Beschwöre 1 „Rotdrachen-Erzunterweltler“ oder „Glühender Rotdrachen-Erzunterweltler“ als Spezialbeschwörung von deinem Extra Deck oder Friedhof und falls du dies tust, annulliere jenen Effekt und falls du dies tust, zerstöre jene Karte.<br />Du kannst nur 1 „Puls des Champions“ pro Spielzug aktivieren.
  | it_text             = Attiva 1 di questi effetti;<br />● Durante la Battle Phase del tuo avversario: il tuo avversario guadagna 1000 LP, poi termina la Battle Phase.<br />● Quando il tuo avversario attiva l'effetto di un mostro, mentre controlla più carte di te: Evoca Specialmente 1 "Arcidemone Drago Rosso" o "Arcidemone Drago Rosso Rovente" dal tuo Extra Deck o Cimitero e, se lo fai, annulla quell'effetto e, se fai quello, distruggi quella carta.<br />Puoi attivare solo 1 "Pulsazione del Campione" per turno.
  | pt_text             = Ative 1 desses efeitos;<br />● Durante a Fase de Batalha do seu oponente: seu oponente ganha 1000 PV e, depois, encerre a Fase de Batalha.<br />● Quando seu oponente ativar um efeito de monstro, enquanto ele controlar mais cards que você: Invoque por Invocação-Especial 1 "Dragão Vermelho Arquidemônio" ou "Abrasador Dragão Vermelho Arquidemônio" do seu Deck Adicional ou Cemitério e, se isso acontecer, negue esse efeito e, se isso acontecer, destrua esse card.<br />Você só pode ativar 1 "Pulso do Campeão" por turno.
  | es_text             = Activa 1 de estos efectos;<br />● Durante la Battle Phase de tu adversario: tu adversario gana 1000 LP, y después termina la Battle Phase.<br />● Cuando tu adversario activa el efecto de un monstruo, mientras controle más cartas que tú: Invoca de Modo Especial, desde tu Deck Extra o Cementerio, 1 "Dragón Rojo Archidemonio" o "Ardiente Dragón Rojo Archidemonio" y, si lo haces, niega ese efecto y, si haces eso, destruye esa carta.<br />Sólo puedes activar 1 "Pulso del Campeón" por turno.
  | ja_text             = このカード名のカードは１ターンに１枚しか発動できない。①：以下の効果から１つを選択して発動できる。<br />●相手バトルフェイズに発動できる。相手は１０００ＬＰ回復する。その後、バトルフェイズを終了する。<br />●相手フィールドのカードの数が自分フィールドのカードより多く、相手がモンスターの効果を発動した時に発動できる。自分のＥＸデッキ・墓地から「レッド・デーモンズ・ドラゴン」か「琰魔竜 レッド・デーモン」１体を特殊召喚し、その発動した効果を無効にし破壊する。
  | ko_text             = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이하의 효과에서 1개를 선택하고 발동할 수 있다.<br />●상대 배틀 페이즈에 발동할 수 있다. 상대는 1000 LP 회복한다. 그 후, 배틀 페이즈를 종료한다.<br />●상대 필드의 카드의 수가 자신 필드의 카드보다 많고, 상대가 몬스터의 효과를 발동했을 때에 발동할 수 있다. 자신의 엑스트라 덱 / 묘지에서 "레드 데몬즈 드래곤"이나 "염마룡 레드 데몬" 1장을 특수 소환하고, 그 발동한 효과를 무효로 하여 파괴한다.
  | sc_text             = 此卡名的卡1回合仅可发动1张。①：可从以下效果中选择1个发动。<br />●在对手的战斗阶段可以发动。对手恢复1000LP。然后，结束战斗阶段。<br />●对手场上的卡的数量多于自己场上的卡，且对手发动怪兽的效果时可以发动。从自己额外牌组・墓地将1只“暗红恶魔龙”或“琰魔龙 暗红恶魔”特殊召唤，将该发动的效果无效并破坏。
