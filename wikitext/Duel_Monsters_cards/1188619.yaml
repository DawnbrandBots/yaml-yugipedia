  | sc_pendulum_effect    = 此卡名的②灵摆效果1回合仅可使用1次。①：自己仅可灵摆召唤灵摆怪兽。此效果不会被无效化。②：攻击力1000以下的怪兽被特殊召唤的情况下可以发动。将此卡放回手牌。
  | sc_text               = 此卡名的①②怪兽效果1回合仅可各使用1次。①：此卡存在于手牌，且自己的灵摆区域有卡存在的情况下可以发动。将此卡特殊召唤。②：支付1000LP可以发动。将自己手牌・场上（表侧表示）的1张灵摆怪兽卡破坏。然后，可从牌组将1只灵摆怪兽以表侧加入额外牌组。
