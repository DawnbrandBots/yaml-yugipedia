  | pendulum_effect       = You cannot [[Pendulum Summon]], except [[Pendulum Monster]]s (this [[effect]] cannot be [[negate]]d). If a [[monster]](s) with 1000 [[ATK]] or less is [[Special Summon]]ed (except during the [[Damage Step]]): You can [[return]] this card to the [[hand]]. You can only use this effect of "Shade the Obscure" [[once per turn]].
  | text                  = If you have a card in your [[Pendulum Zone]] and this card is in your [[hand]]: You can [[Special Summon]] this card. You can [[pay]] 1000 [[LP]]; [[destroy]] 1 [[Pendulum Monster Card]] in your hand or [[face-up]] [[field]], then you can [[Add a card|add]] 1 Pendulum Monster from your [[Main Deck|Deck]] to your face-up [[Extra Deck]]. You can only use each effect of "Shade the Obscure" [[once per turn]].
  | fr_pendulum_effect    = Vous ne pouvez pas Invoquer par Pendulation (Monstres Pendule exclus) (cet effet ne peut pas être annulé). Si un ou plusieurs monstres avec max. 1000 ATK sont Invoqués Spécialement (sauf durant la Damage Step) : vous pouvez renvoyer cette carte à la main. Vous ne pouvez utiliser cet effet de "Ombre l'Obscur" qu'une fois par tour.
  | fr_text               = Si vous avez une carte dans votre Zone Pendule et que cette carte est dans votre main : vous pouvez Invoquer Spécialement cette carte. Vous pouvez payer 1000 LP ; détruisez 1 Carte Monstre Pendule dans votre main ou Terrain face recto, puis vous pouvez ajouter 1 Monstre Pendule depuis votre Deck à votre Extra Deck face recto. Vous ne pouvez utiliser chaque effet de "Ombre l'Obscur" qu'une fois par tour.
  | de_pendulum_effect    = Du kannst keine Pendelbeschwörungen durchführen, außer von Pendelmonstern (dieser Effekt kann nicht annulliert werden). Falls ein oder mehr Monster mit 1000 oder weniger ATK als Spezialbeschwörung beschworen werden (außer während des Damage Steps): Du kannst diese Karte auf die Hand zurückgeben. Du kannst diesen Effekt von „Schatten der Unberühmte“ nur einmal pro Spielzug verwenden.
  | de_text               = Falls du eine Karte in deiner Pendelzone hast und sich diese Karte in deiner Hand befindet: Du kannst diese Karte als Spezialbeschwörung beschwören. Du kannst 1000 LP zahlen; zerstöre 1 Pendelmonsterkarte in deiner Hand oder offen auf deiner Spielfeldseite, dann kannst du deinem Extra Deck 1 Pendelmonster von deinem Deck offen hinzufügen. Du kannst jeden Effekt von „Schatten der Unberühmte“ nur einmal pro Spielzug verwenden.
  | it_pendulum_effect    = Non puoi Evocare Pendulum, eccetto Mostri Pendulum (questo effetto non può essere annullato). Se uno o più mostri con 1000 ATK o inferiore vengono Evocati Specialmente (eccetto durante il Damage Step): puoi far ritornare questa carta nella mano. Puoi utilizzare questo effetto di "Shade l'Oscuro" una sola volta per turno.
  | it_text               = Se hai una carta nella tua Zona Pendulum e questa carta è nella tua mano: puoi Evocare Specialmente questa carta. Puoi pagare 1000 LP; distruggi 1 Carta Mostro Pendulum nella tua mano o Terreno scoperto, poi puoi aggiungere 1 Mostro Pendulum dal tuo Deck al tuo Extra Deck scoperto. Puoi utilizzare ogni effetto di "Shade l'Oscuro" una sola volta per turno.
  | pt_pendulum_effect    = Você não pode Invocar por Invocação-Pêndulo, exceto Monstros Pêndulo (este efeito não pode ser negado). Se um ou mais monstros com 1000 ou menos de ATK forem Invocados por Invocação-Especial (exceto durante a Etapa de Dano): você pode devolver este card para a mão. Você só pode usar este efeito de "Sombra, o Obscuro" uma vez por turno.
  | pt_text               = Se você tiver um card na sua Zona de Pêndulo e este card estiver na sua mão: você pode Invocar este card por Invocação-Especial. Você pode pagar 1000 PV; destrua 1 Card de Monstro Pêndulo na sua mão ou no campo com a face para cima e, depois, você pode adicionar 1 Monstro Pêndulo do seu Deck ao seu Deck Adicional com a face para cima. Você só pode usar cada efeito de "Sombra, o Obscuro" uma vez por turno.
  | es_pendulum_effect    = No puedes Invocar por Péndulo, excepto Monstruos de Péndulo (este efecto no puede ser negado). Si uno o más monstruos con 1000 ATK o menos son Invocados de Modo Especial (excepto durante el Damage Step): puedes devolver esta carta a la mano. Sólo puedes usar este efecto de "Sombra el Oscuro" una vez por turno.
  | es_text               = Si tienes una carta en tu Zona de Péndulo y esta carta está en tu mano: puedes Invocar esta carta de Modo Especial. Puedes pagar 1000 LP; destruye 1 Carta de Monstruo de Péndulo en tu mano o Campo boca arriba, y después puedes añadir a tu Deck Extra boca arriba 1 Monstruo de Péndulo en tu Deck. Sólo puedes usar cada efecto de "Sombra el Oscuro" una vez por turno.
  | ja_pendulum_effect    = このカード名の②のＰ効果は１ターンに１度しか使用できない。①：自分はＰモンスターしかＰ召喚できない。この効果は無効化されない。②：攻撃力１０００以下のモンスターが特殊召喚された場合に発動できる。このカードを手札に戻す。
  | ja_text               = このカード名の①②のモンスター効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在し、自分のＰゾーンにカードが存在する場合に発動できる。このカードを特殊召喚する。②：１０００ＬＰを払って発動できる。自分の手札・フィールド（表側表示）のＰモンスターカード１枚を破壊する。その後、デッキからＰモンスター１体をＥＸデッキに表側で加える事ができる。
