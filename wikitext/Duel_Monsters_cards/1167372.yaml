  | text                  = Each time a [[monster]](s) is Normal or [[Special Summon]]ed, place 1 [[Summon Counter]] on this card (max. 4). If the 4th Summon Counter is placed on this card: Remove all Summon Counters from this card, and if you do, [[send]] all monsters on the [[field]] to the [[GY]].
  | fr_text               = Chaque fois qu'un ou plusieurs monstres sont Invoqués Normalement ou Spécialement, placez 1 Compteur Invocation sur cette carte (max. 4). Si le 4e Compteur Invocation est placé sur cette carte : retirez tous les Compteurs Invocation de cette carte, et si vous le faites, envoyez tous les monstres sur le Terrain au Cimetière.
  | de_text               = Jedes Mal, wenn ein oder mehr Monster als Normal- oder Spezialbeschwörung beschworen werden, lege 1 Beschwörungs-Zählmarke (max. 4) auf diese Karte. Falls die 4. Beschwörungs-Zählmarke auf diese Karte gelegt wird: Entferne alle Beschwörungs-Zählmarken von dieser Karte und falls du dies tust, lege alle Monster vom Spielfeld auf den Friedhof.
  | it_text               = Ogni volta che uno o più mostri vengono Evocati Normalmente o Specialmente, metti 1 Segnalino Evocazione su questa carta (massimo 4). Se il 4º Segnalino Evocazione viene messo su questa carta: rimuovi tutti i Segnalini Evocazione da questa carta e, se lo fai, manda al Cimitero tutti i mostri sul Terreno.
  | pt_text               = Sempre que um ou mais monstros forem Invocados por Invocação-Normal ou Especial, coloque 1 Marcador de Invocação neste card (máx. 4). Se o 4º Marcador de Invocação for colocado neste card: remova todos os Marcadores de Invocação deste card e, se isso acontecer, envie para o Cemitério todos os monstros no campo.
  | es_text               = Cada vez que uno o más monstruos son Invocados de Modo Normal o Especial, pon 1 Contador de Invocación en esta carta (máx. 4). Si el 4º Contador de Invocación es puesto en esta carta: retira todos los Contadores de Invocación de esta carta y, si lo haces, manda al Cementerio todos los monstruos en el Campo.
  | ja_text               = ①：モンスターが召喚・特殊召喚される度に、このカードにサモンカウンターを１つ置く（最大４つまで）。②：このカードにサモンカウンターが置かれ、そのサモンカウンターの数が４つになった場合に発動する。このカードのサモンカウンターを全て取り除き、フィールドのモンスターを全て墓地へ送る。
  | ko_text               = ①: 몬스터가 일반 소환 / 특수 소환될 때마다, 이 카드에 서몬 카운터를 1개 놓는다(최대 4개까지). ②: 이 카드에 서몬 카운터가 놓여지고, 그 서몬 카운터의 수가 4개가 되었을 경우에 발동한다. 이 카드의 서몬 카운터를 전부 제거하고, 필드의 몬스터를 전부 묘지로 보낸다.
  | sc_text               = ①：每当有怪兽被召唤・特殊召唤，就在此卡上放1个召唤计数物（最多4个）。②：召唤计数物被放在此卡上，使得该召唤计数物的数量变为4的情况下发动。去除此卡的全部召唤计数物，将场上的怪兽全部送至墓地。
