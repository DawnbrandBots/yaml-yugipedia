  | text                  = You can [[Ritual Summon]] this card with "[[Light and Darkness Ritual]]". [[Unaffected]] by your opponent's [[activate]]d effects, unless they [[target]] this card, also cannot be [[destroyed by battle]]. You can only use each of the following [[effect]]s of "Black Luster Soldier - Soldier of Light and Darkness" [[once per turn]]. If this card is [[Special Summon]]ed: You can target 1 card your opponent [[control]]s; [[banish]] it. When this card destroys an opponent's monster by battle: You can make this card gain 1500 [[ATK]], and if you do, it can make a second attack in a row.
  | fr_text               = Vous pouvez Invoquer Rituellement cette carte avec "Rituel de la Lumière et des Ténèbres". Non affectée par les effets activés de votre adversaire, sauf s'ils ciblent cette carte, et aussi, non destructible au combat. Vous ne pouvez utiliser chacun des effets suivants de "Soldat du Lustre Noir - Soldat de la Lumière et des Ténèbres" qu'une fois par tour. Si cette carte est Invoquée Spécialement : vous pouvez cibler 1 carte contrôlée par votre adversaire ; bannissez-la. Lorsque cette carte détruit un monstre de l'adversaire au combat : vous pouvez faire gagner 1500 ATK à cette carte, et si vous le faites, elle peut faire une seconde attaque à la suite.
  | de_text               = Du kannst diese Karte mit „Ritual von Licht und Finsternis“ als Ritualbeschwörung beschwören. Bleibt von aktivierten Effekten deines Gegners unberührt, es sei denn, sie wählen diese Karte als Ziel, kann zusätzlich nicht durch Kampf zerstört werden. Du kannst jeden der folgenden Effekte von „Schwarz Glänzender Soldat - Soldat des Lichts und der Finsternis“ nur einmal pro Spielzug verwenden. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst 1 Karte wählen, die dein Gegner kontrolliert; verbanne sie. Wenn diese Karte ein Monster eines Gegners durch Kampf zerstört: Du kannst diese Karte 1500 ATK erhalten lassen und falls du dies tust, kann sie sofort einen zweiten Angriff durchführen.
  | it_text               = Puoi Evocare tramite Rituale questa carta con "Rituale di Luce e Oscurità". Immune agli effetti attivati del tuo avversario, a meno che essi scelgano come bersaglio questa carta, inoltre non può essere distrutto in battaglia. Puoi utilizzare ognuno dei seguenti effetti di "Glorioso Soldato Nero - Soldato di Luce e Oscurità" una sola volta per turno. Se questa carta viene Evocata Specialmente: puoi scegliere come bersaglio 1 carta controllata dal tuo avversario; bandiscila. Quando questa carta distrugge un mostro dell'avversario in battaglia: puoi far guadagnare a questa carta 1500 ATK e, se lo fai, essa può effettuare un secondo attacco di seguito.
  | pt_text               = Você pode Invocar este card por Invocação-Ritual com "Ritual da Luz e das Trevas". Não é afetado pelos efeitos ativados do seu oponente, a não ser que eles escolham este card como alvo e, além disso, não pode ser destruído em batalha. Você só pode usar cada um dos seguintes efeitos de "Soldado do Lustro Negro - Soldado da Luz e das Trevas" uma vez por turno. Se este card for Invocado por Invocação-Especial: você pode escolher 1 card que seu oponente controla; bana-o. Quando este card destruir um monstro do oponente em batalha: você pode fazer com que este card ganhe 1500 de ATK e, se isso acontecer, ele pode realizar um segundo ataque em seguida.
  | es_text               = Puedes Invocar esta carta por Ritual con "Ritual de la Luz y la Oscuridad". No es afectada por los efectos activados de tu adversario, a menos que seleccionen esta carta, y además no puede ser destruida en batalla. Sólo puedes usar cada uno de los siguientes efectos de "Soldado del Brillo Negro - Soldado de la Luz y la Oscuridad" una vez por turno. Si esta carta es Invocada de Modo Especial: puedes seleccionar 1 carta que controle tu adversario; destiérrala. Cuando esta carta destruye un monstruo del adversario en batalla: puedes hacer que esta carta gane 1500 ATK y, si lo haces, ésta puede hacer un segundo ataque inmediatamente después.
  | ja_text               = 「光と闇の儀式」により降臨<br />このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合、相手フィールドのカード１枚を対象として発動できる。そのカードを除外する。②：このカードはモンスターゾーンに存在する限り、戦闘では破壊されず、このカードを対象とする効果以外の相手が発動した効果を受けない。③：このカードが戦闘で相手モンスターを破壊した時に発動できる。このカードの攻撃力は１５００アップし、もう１度だけ続けて攻撃できる。
  | ko_text               = "빛과 어둠의 의식"에 의해 의식 소환<br /> 이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 특수 소환했을 경우, 상대 필드의 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 제외한다. ②: 이 카드는 몬스터 존에 존재하는 한, 전투로는 파괴되지 않으며, 이 카드를 대상으로 하는 효과 이외의 상대가 발동한 효과를 받지 않는다. ③: 이 카드가 전투로 상대 몬스터를 파괴했을 때에 발동할 수 있다. 이 카드의 공격력은 1500 올리고, 1번만 더 이어서 공격할 수 있다.
  | sc_text               = 以“光与暗的仪式”降临<br />此卡名的①③效果1回合仅可各使用1次。①：此卡特殊召唤的情况下，以对手场上的1张卡为对象可以发动。将该卡除外。②：此卡只要存在于怪兽区域，就不会因战斗被破坏，也不受对手发动的效果影响，除非是以此卡为对象的效果。③：此卡战斗破坏对手怪兽时可以发动。此卡的攻击力上升1500，可继续再攻击仅1次。
