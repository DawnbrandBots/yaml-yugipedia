  | text                  = 2 "[[Hecahands]]" [[monsters]]<br />You can [[target]] 1 monster your opponent [[control]]s; take control of it. You can only use this [[effect]] of "Hecahands Dandalos" [[once per turn]]. If this card [[battle]]s a monster, neither can be destroyed by that battle. Your "Hecahands" [[Fusion Monster]]s, and monsters you control that are owned by your opponent, can attack directly.
  | fr_text               = 2 monstres "Hécamains"<br />Vous pouvez cibler 1 monstre contrôlé par votre adversaire ; prenez-en le contrôle. Vous ne pouvez utiliser cet effet de "Hécamains Dandalos" qu'une fois par tour. Si cette carte combat un monstre, aucun de ces 2 monstres ne peut être détruit par ce combat. Vos Monstres Fusion "Hécamains" et les monstres que vous contrôlez dont le propriétaire est votre adversaire peuvent attaquer directement.
  | de_text               = 2 „Hekahände“-Monster<br />Du kannst 1 Monster wählen, das dein Gegner kontrolliert; übernimm die Kontrolle darüber. Du kannst diesen Effekt von „Hekahände Dandalos“ nur einmal pro Spielzug verwenden. Falls diese Karte gegen ein Monster kämpft, können beide durch jenen Kampf nicht zerstört werden. Deine „Hekahände“-Fusionsmonster und Monster, die du kontrolliert und die dein Gegner besitzt, können direkt angreifen.
  | it_text               = 2 mostri "Hecamani"<br />Puoi scegliere come bersaglio 1 mostro controllato dal tuo avversario; prendine il controllo. Puoi utilizzare questo effetto di "Hecamani Dandalos" una sola volta per turno. Se questa carta combatte con un mostro, nessuno dei due può essere distrutto in quella battaglia. I tuoi Mostri Fusione "Hecamani", e i mostri che controlli di proprietà del tuo avversario, possono attaccare direttamente.
  | pt_text               = 2 monstros "Hecamãos"<br />Você pode escolher 1 monstro que seu oponente controla; tome o controle dele. Você só pode usar este efeito de "Hecamãos Dandalos" uma vez por turno. Se este card batalhar um monstro, nenhum dos dois pode ser destruído nessa batalha. Seus Monstros de Fusão "Hecamãos" e os monstros que você controla dos quais seu oponente seja dono podem atacar diretamente.
  | es_text               = 2 monstruos "Hecamanos"<br />Puedes seleccionar 1 monstruo que controle tu adversario; toma su control. Sólo puedes usar este efecto de "Hecamanos Dándalos" una vez por turno. Si esta carta batalla con un monstruo, ninguno puede ser destruido en esa batalla. Tus Monstruos de Fusión "Hecamanos", y los monstruos que controlas que sean propiedad de tu adversario, pueden atacar directamente.
  | ja_text               = 「ヘカトンケイル」モンスター×２<br />このカード名の①の効果は１ターンに１度しか使用できない。①：相手フィールドのモンスター１体を対象として発動できる。そのモンスターのコントロールを得る。②：このカードがモンスターゾーンに存在する限り、自分の「ヘカトンケイル」融合モンスター及び元々の持ち主が相手である自分のモンスターは直接攻撃できる。③：このカードがモンスターと戦闘を行う場合、その２体はその戦闘では破壊されない。　
  | ko_text               = "헤카톤케일" 몬스터 × 2<br />이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 상대 필드의 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 컨트롤을 얻는다. ②: 이 카드가 몬스터 존에 존재하는 한, 자신의 "헤카톤케일" 융합 몬스터 및 원래의 주인이 상대인 자신 몬스터는 직접 공격할 수 있다. ③: 이 카드가 몬스터와 전투를 실행할 경우, 그 2장은 그 전투로는 파괴되지 않는다.
  | sc_text               = “百臂无形”怪兽×2<br />此卡名的①效果1回合仅可使用1次。①：以对手场上的1只怪兽为对象可以发动。获得该怪兽的控制权。②：只要此卡存在于怪兽区域，自己的“百臂无形”融合怪兽及原本持有者为对手的自己怪兽可直接攻击。③：此卡与怪兽进行战斗的情况下，该2只不会因该战斗被破坏。
