  | text                  = [[Send]] 1 "[[Predap]]" card from your [[Main Deck|Deck]] to the [[GY]], except "Predaprimitive"; [[add]] 1 "[[Polymerization (archetype)|Polymerization]]" [[Spell]] or "[[Fusion (archetype)|Fusion]]" Spell from your Deck to your [[hand]], also you cannot [[Special Summon]] for the rest of this [[turn]] after this card [[resolve]]s, except [[Plant]] or [[Dragon]] monsters. If a monster(s) is Special Summoned to your opponent's field (except during the [[Damage Step]]): You can [[banish]] this card from your GY, then [[target]] 1 [[Fusion Monster]] you [[control]]; [[destroy]] it. You can only [[activate]] 1 "Predaprimitive" [[once per turn|per turn]].
  | fr_text               = Envoyez 1 carte "Prédap" ("Prédaprimitive" exclu) depuis votre Deck au Cimetière ; ajoutez 1 Magie "Polymérisation" ou Magie "Fusion" depuis votre Deck à votre main, et aussi, vous ne pouvez pas Invoquer Spécialement (monstres Plante ou Dragon exclus) le reste de ce tour après la résolution de cette carte. Si un ou plusieurs monstres sont Invoqués Spécialement sur le Terrain de votre adversaire (sauf durant la Damage Step) : vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 Monstre Fusion que vous contrôlez ; détruisez-le. Vous ne pouvez activer qu'1 "Prédaprimitive" par tour.
  | de_text               = Lege 1 „Raubp“-Karte von deinem Deck auf den Friedhof, außer „Raubprimitiv“; füge deiner Hand 1 „Polymerisation“-Zauber oder „Fusion“-Zauber von deinem Deck hinzu, zusätzlich kannst du für den Rest dieses Spielzugs, nachdem diese Karte aufgelöst wurde, keine Spezialbeschwörungen durchführen, außer von Pflanze- oder Drache-Monstern. Falls ein oder mehr Monster als Spezialbeschwörung auf die Spielfeldseite deines Gegners beschworen werden (außer während des Damage Steps): Du kannst diese Karte von deinem Friedhof verbannen und dann 1 Fusionsmonster wählen, das du kontrollierst; zerstöre es. Du kannst nur 1 „Raubprimitiv“ pro Spielzug aktivieren.
  | it_text               = Manda 1 carta "Predap" dal tuo Deck al Cimitero, eccetto "Predaprimitivo"; aggiungi 1 Magia "Polimerizzazione" o Magia "Fusione" dal tuo Deck alla tua mano, inoltre non puoi Evocare Specialmente per il resto di questo turno dopo che questa carta si è risolta, eccetto mostri Pianta o Drago. Se uno o più mostri vengono Evocati Specialmente sul Terreno del tuo avversario (eccetto durante il Damage Step): puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 Mostro Fusione che controlli; distruggilo. Puoi attivare solo 1 "Predaprimitivo" per turno.
  | pt_text               = Envie 1 card "Predap" do seu Deck para o Cemitério, exceto "Predaprimitivo"; adicione 1 Magia "Polimerização" ou Magia "Fusão" do seu Deck à sua mão e, além disso, você não pode Invocar por Invocação-Especial pelo resto deste turno depois que este card resolver, exceto monstros Planta ou Dragão. Se um ou mais monstros forem Invocados por Invocação-Especial no campo do seu oponente (exceto durante a Etapa de Dano): você pode banir este card do seu Cemitério e, depois, escolha 1 Monstro de Fusão que você controla; destrua-o. Você só pode ativar 1 "Predaprimitivo" por turno.
  | es_text               = Manda al Cementerio 1 carta "Predap" en tu Deck, excepto "Predaprimitiva"; añade a tu mano 1 Mágica "Polimerización" o Mágica "Fusión" en tu Deck, y además no puedes Invocar de Modo Especial por el resto de este turno después de que esta carta se resuelva, excepto monstruos Planta o Dragón. Si uno o más monstruos son Invocados de Modo Especial al Campo de tu adversario (excepto durante el Damage Step): puedes desterrar esta carta en tu Cementerio, y después selecciona 1 Monstruo de Fusión que controles; destrúyelo. Sólo puedes activar 1 "Predaprimitiva" por turno.
  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。①：デッキから「捕食原生」以外の「プレデター」カード１枚を墓地へ送って発動できる。デッキから「融合」魔法カードか「フュージョン」魔法カード１枚を手札に加える。このカードの発動後、ターン終了時まで自分はドラゴン族・植物族モンスターしか特殊召喚できない。②：相手フィールドにモンスターが特殊召喚された場合、墓地のこのカードを除外し、自分フィールドの融合モンスター１体を対象として発動できる。そのモンスターを破壊する。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 덱에서 "프레데터 프리미티브" 이외의 "프레데터" 카드 1장을 묘지로 보내고 발동할 수 있다. 덱에서 "융합" 마법 카드나 "퓨전" 마법 카드 1장을 패에 넣는다. 이 카드의 발동 후, 턴 종료시까지 자신은 드래곤족 / 식물족 몬스터밖에 특수 소환할 수 없다. ②: 상대 필드에 몬스터가 특수 소환되었을 경우, 묘지의 이 카드를 제외하고, 자신 필드의 융합 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터를 파괴한다.
  | sc_text               = 此卡名的卡1回合仅可发动1张。①：从牌组将“捕食原生”以外的1张“捕食”卡送至墓地可以发动。从牌组将1张“融合”魔法卡或“结合”魔法卡加入手牌。此卡发动后，直至回合结束时为止自己仅可特殊召唤龙族・植物族怪兽。②：怪兽被特殊召唤至对手场上的情况下，将墓地的此卡除外，以自己场上的1只融合怪兽为对象可以发动。将该怪兽破坏。
