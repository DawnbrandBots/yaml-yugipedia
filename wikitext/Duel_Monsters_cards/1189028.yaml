  | fr_text               = 2 monstres de Niveau 6<br />Durant la Main Phase (Effet Rapide) : vous pouvez détacher 1 Matériel de cette carte, puis ciblez 1 monstre Zombie dans votre Cimetière ; Invoquez-le Spécialement, puis vous pouvez annuler les effets d'1 monstre contrôlé par votre adversaire avec une ATK inférieure ou égale au monstre. Si cette carte est envoyée au Cimetière : vous pouvez cibler 1 monstre dans l'un des Cimetières ; mélangez-le dans le Deck. Vous ne pouvez utiliser chaque effet de "Samuel l'Officiante de la Mort" qu'une fois par tour.
  | de_text               = 2 Monster der Stufe 6<br />Während der Main Phase (Schnelleffekt): Du kannst 1 Material von dieser Karte abhängen und dann 1 Zombie-Monster in deinem Friedhof wählen; beschwöre es als Spezialbeschwörung, dann kannst du die Effekte von 1 Monster annullieren, das dein Gegner kontrolliert und dessen ATK kleiner oder gleich denen jenes Monsters sind. Falls diese Karte auf den Friedhof gelegt wird: Du kannst 1 Monster in einem beliebigen Friedhof wählen; mische es ins Deck. Du kannst jeden Effekt von „Zeremonienleiterin des Verderbens Samuel“ nur einmal pro Spielzug verwenden.
  | it_text               = 2 mostri di Livello 6<br />Durante la Main Phase (Effetto Rapido): puoi staccare 1 materiale da questa carta, poi scegliere come bersaglio 1 mostro Zombie nel tuo Cimitero; Evocalo Specialmente, poi puoi annullare gli effetti di 1 mostro controllato dal tuo avversario con ATK pari o inferiore a quel mostro. Se questa carta viene mandata al Cimitero: puoi scegliere come bersaglio 1 mostro in qualsiasi Cimitero; mischialo nel Deck. Puoi utilizzare ogni effetto di "Samuel l'Officiante del Destino" una sola volta per turno.
  | pt_text               = 2 monstros de Nível 6<br />Durante a Fase Principal (Efeito Rápido): você pode desassociar 1 matéria deste card e, depois, escolha 1 monstro Zumbi no seu Cemitério; Invoque-o por Invocação-Especial e, depois, você pode negar os efeitos de 1 monstro que seu oponente controla com ATK igual ou menor que o desse monstro. Se este card for enviado para o Cemitério: você pode escolher 1 monstro em qualquer Cemitério; embaralhe-o no Deck. Você só pode usar cada efeito de "Oficial da Perdição Samuel" uma vez por turno.
  | es_text               = 2 monstruos de Nivel 6<br />Durante la Main Phase (Efecto Rápido): puedes desacoplar 1 material de esta carta, y después selecciona 1 monstruo Zombi en tu Cementerio; Invócalo de Modo Especial, y después puedes negar los efectos de 1 monstruo que controle tu adversario con ATK igual o menor que el de ese monstruo. Si esta carta es mandada al Cementerio: puedes seleccionar 1 monstruo en cualquier Cementerio; barájalo al Deck. Sólo puedes usar cada efecto de "Oficiante de la Perdición Samuel" una vez por turno.
