  | text                  = [[Once per turn]]: You can [[discard]] 1 [[Spell]]/[[Trap]]; [[Special Summon]] 1 [[Level]] 2 "[[Angelechy]]" [[monster]] from your [[Extra Deck]], and if you do, place 1 "Angelechy" monster from your Extra Deck to your [[Spell & Trap Zone]] as a [[face-up]] [[Continuous Spell]]. If a face-up "Angelechy" Monster Card(s) you control is [[destroyed by battle]] or card [[effect]]: You can [[return]] 1 "Angelechy" Monster Card you own from your Spell & Trap Zone to the Extra Deck, then you can Special Summon it.
  | fr_text               = Une fois par tour : vous pouvez défausser 1 Magie/Piège ; Invoquez Spécialement 1 monstre "Angetélité" de Niveau 2 depuis votre Extra Deck, et si vous le faites, placez 1 monstre "Angetélité" depuis votre Extra Deck dans votre Zone Magie & Piège comme Magie Continue face recto. Si une ou plusieurs Cartes Monstre "Angetélité" face recto que vous contrôlez sont détruites au combat ou par un effet de carte : vous pouvez renvoyer 1 Carte Monstre "Angetélité" que vous possédez depuis votre Zone Magie & Piège à l'Extra Deck, puis vous pouvez l'Invoquer Spécialement.
  | de_text               = Einmal pro Spielzug: Du kannst 1 Zauber/Falle abwerfen; beschwöre 1 „Engelechy“-Monster der Stufe 2 als Spezialbeschwörung von deinem Extra Deck und falls du dies tust, lege 1 „Engelechy“-Monster von deinem Extra Deck als offenen Permanenten Zauber in deine Zauber- & Fallenzone. Falls eine oder mehr offene „Engelechy“-Monsterkarten, die du kontrollierst, durch Kampf oder einen Karteneffekt zerstört werden: Du kannst 1 „Engelechy“-Monsterkarte, die du besitzt, von deiner Zauber- & Fallenzone ins Extra Deck zurücklegen, dann kannst du sie als Spezialbeschwörung beschwören.
  | it_text               = Una volta per turno: puoi scartare 1 Magia/Trappola; Evoca Specialmente 1 mostro "Angelechy" di Livello 2 dal tuo Extra Deck e, se lo fai, metti 1 mostro "Angelechy" dal tuo Extra Deck nella tua Zona Magie & Trappole come una Magia Continua scoperta. Se una o più Carte Mostro "Angelechy" scoperte che controlli vengono distrutte in battaglia o dall'effetto di una carta: puoi far ritornare 1 Carta Mostro "Angelechy" che possiedi dalla tua Zona Magie & Trappole nell'Extra Deck, poi puoi Evocarla Specialmente.
  | pt_text               = Uma vez por turno: você pode descartar 1 Magia/Armadilha; Invoque por Invocação-Especial 1 monstro "Anjoléquia" de Nível 2 do seu Deck Adicional e, se isso acontecer, coloque 1 monstro "Anjoléquia" do seu Deck Adicional na sua Zona de Magias & Armadilhas como uma Magia Contínua com a face para cima. Se um ou mais Cards de Monstro "Anjoléquia" com a face para cima que você controla forem destruídos em batalha ou por um efeito de card: você pode devolver 1 Card de Monstro "Anjoléquia", do qual você é dono, da sua Zona de Magias & Armadilhas para o Deck Adicional e, depois, você pode Invocá-lo por Invocação-Especial.
  | es_text               = Una vez por turno: puedes descartar 1 Mágica/Trampa; Invoca de Modo Especial, desde tu Deck Extra, 1 monstruo "Angelequia" de Nivel 2 y, si lo haces, pon en tu Zona de Magia y Trampas como una Mágica Continua boca arriba 1 monstruo "Angelequia" en tu Deck Extra. Si una o más Cartas de Monstruo "Angelequia" boca arriba que controlas son destruidas en batalla o por el efecto de una carta: puedes devolver al Deck Extra 1 Carta de Monstruo "Angelequia" que poseas en tu Zona de Magia y Trampas, y después puedes Invocarla de Modo Especial.
