  | pendulum_effect       = You can [[negate]] a [[monster effect]] [[activate]]d by your opponent in response to the activation of a "[[Power Patron]]" or "[[Artmage]]" monster effect, then [[destroy]] this card. You can only use this [[effect]] of "Nervedo the Shadebeast Power Patron" [[once per turn]].
  | text                  = (This card is always treated as an "[[Artmage]]" card.)<br />You can [[banish]] the top 3 cards of your [[Main Deck|Deck]], [[face-down]]; [[destroy]] this card, and if you do, [[Special Summon]] 1 "[[Nerva the Power Patron of Creation]]" from your [[Extra Deck]] (this is treated as a [[Fusion Summon]]). If this card is added to your Extra Deck [[face-up]]: You can Special Summon 1 "[[Power Patron]]" or "Artmage" [[monster]] from your Deck or face-up Extra Deck, except "Nervedo the Shadebeast Power Patron". You can only use each [[effect]] of "Nervedo the Shadebeast Power Patron" [[once per turn]].
  | fr_pendulum_effect    = Vous pouvez annuler un effet de monstre activé par votre adversaire en réponse à l'activation d'un effet de monstre "Mécène du Pouvoir" ou "Artmage", puis détruisez cette carte. Vous ne pouvez utiliser cet effet de "Nervedo le Mécène du Pouvoir de la Bête Obscure" qu'une fois par tour.
  | fr_text               = (Cette carte est toujours traitée comme carte "Artmage".)<br />Vous pouvez bannir face verso les 3 cartes du dessus de votre Deck ; détruisez cette carte, et si vous le faites, Invoquez Spécialement 1 "Nerva la Mécène du Pouvoir de la Création" depuis votre Extra Deck (ceci est traité comme Invocation Fusion). Si cette carte est ajoutée face recto à votre Extra Deck : vous pouvez Invoquer Spécialement 1 monstre "Mécène du Pouvoir" ("Nervedo le Mécène du Pouvoir de la Bête Obscure" exclu) ou "Artmage" depuis votre Deck ou Extra Deck face recto. Vous ne pouvez utiliser chaque effet de "Nervedo le Mécène du Pouvoir de la Bête Obscure" qu'une fois par tour.
  | de_pendulum_effect    = Du kannst einen Monstereffekt annullieren, der von deinem Gegner als Reaktion auf die Aktivierung eines „Machtpatron“- oder „Kunstmagus“-Monstereffekts aktiviert wurde, dann zerstöre diese Karte. Du kannst diesen Effekt von „Nervedo der Schattenungeheuer-Machtpatron“ nur einmal pro Spielzug verwenden.
  | de_text               = (Diese Karte wird immer als „Kunstmagus“-Karte behandelt.)<br />Du kannst die obersten 3 Karten deines Decks verdeckt verbannen; zerstöre diese Karte und falls du dies tust, beschwöre 1 „Nerva die Machtpatronin der Schöpfung“ als Spezialbeschwörung von deinem Extra Deck (dies wird als Fusionsbeschwörung behandelt). Falls diese Karte deinem Extra Deck offen hinzugefügt wird: Du kannst 1 „Machtpatron“- oder „Kunstmagus“-Monster als Spezialbeschwörung von deinem Deck oder offen von deinem Extra Deck beschwören, außer „Nervedo der Schattenungeheuer-Machtpatron“. Du kannst jeden Effekt von „Nervedo der Schattenungeheuer-Machtpatron“ nur einmal pro Spielzug verwenden.
  | it_pendulum_effect    = Puoi annullare l'effetto di un mostro attivato dal tuo avversario in risposta all'attivazione dell'effetto di un mostro "Patrono Potente" o "Artmage", poi distruggere questa carta. Puoi utilizzare questo effetto di "Nervedo l'Ombrabestia Patrono Potente" una sola volta per turno.
  | it_text               = (Questa carta viene sempre considerata come una carta "Artmage".)<br />Puoi bandire le prime 3 carte del tuo Deck, coperte; distruggi questa carta e, se lo fai, Evoca Specialmente 1 "Nerva la Patrona Potente della Creazione" dal tuo Extra Deck (questa viene considerata come un'Evocazione tramite Fusione). Se questa carta viene aggiunta al tuo Extra Deck scoperta: puoi Evocare Specialmente 1 mostro "Patrono Potente" o "Artmage" dal tuo Deck o Extra Deck scoperto, eccetto "Nervedo l'Ombrabestia Patrono Potente". Puoi utilizzare ogni effetto di "Nervedo l'Ombrabestia Patrono Potente" una sola volta per turno.
  | pt_pendulum_effect    = Você pode negar um efeito de monstro ativado pelo seu oponente em resposta à ativação de um efeito de monstro "Patrono(a) do Poder" ou "Artmage" e, depois, destrua este card. Você só pode usar este efeito de "Nervedo, o Patrono do Poder Besta Sombria" uma vez por turno.
  | pt_text               = (Este card deve ser sempre considerado como um card "Artmage".)<br />Você pode banir os 3 cards do topo do seu Deck, com a face para baixo; destrua este card e, se isso acontecer, Invoque por Invocação-Especial 1 "Nerva, a Patrona do Poder da Criação" do seu Deck Adicional (isso é considerado uma Invocação-Fusão). Se este card for adicionado ao seu Deck Adicional com a face para cima: você pode Invocar por Invocação-Especial 1 monstro "Patrono(a) do Poder" ou "Artmage" do seu Deck ou Deck Adicional com a face para cima, exceto "Nervedo, o Patrono do Poder Besta Sombria". Você só pode usar cada efeito de "Nervedo, o Patrono do Poder Besta Sombria" uma vez por turno.
  | es_pendulum_effect    = Puedes negar un efecto de monstruo activado por tu adversario en respuesta a la activación de un efecto de monstruo "Modelo de Poder" o "Artmagia", y después destruye esta carta. Sólo puedes usar este efecto de "Nervedo la Bestia Sombra Modelo de Poder" una vez por turno.
  | es_text               = (Esta carta se trata siempre como una carta "Artmagia").<br />Puedes desterrar las 3 cartas de la parte superior de tu Deck, boca abajo; destruye esta carta y, si lo haces, Invoca de Modo Especial 1 "Nerva la Modelo de Poder de Creación" desde tu Deck Extra (esto se trata como una Invocación por Fusión). Si esta carta es añadida a tu Deck Extra boca arriba: puedes Invocar de Modo Especial 1 monstruo "Modelo de Poder" o "Artmagia" desde tu Deck o Deck Extra boca arriba, excepto "Nervedo la Bestia Sombra Modelo de Poder". Sólo puedes usar cada efecto de "Nervedo la Bestia Sombra Modelo de Poder" una vez por turno.
  | ja_pendulum_effect    = このカード名のＰ効果は１ターンに１度しか使用できない。①：「獄神」モンスターか「アルトメギア」モンスターの効果の発動にチェーンして相手が発動したモンスターの効果の処理時に、その効果を無効にできる。その後、このカードを破壊する。
  | ja_text               = このカード名はルール上「アルトメギア」カードとしても扱う。このカード名の①②のモンスター効果はそれぞれ１ターンに１度しか使用できない。①：デッキの上からカード３枚を裏側で除外して発動できる。このカードを破壊し、ＥＸデッキから「創獄神ネルヴァ」１体を融合召喚扱いで特殊召喚する。②：このカードがＥＸデッキに表側で加わった場合に発動できる。「獄神影獣－ネルヴェド」を除く、「獄神」モンスターか「アルトメギア」モンスター１体を自分のデッキ・ＥＸデッキ（表側）から特殊召喚する。
  | ko_pendulum_effect    = 이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: "감옥신" 몬스터나 "아르토메기아" 몬스터의 효과 발동에 체인하여 상대가 발동한 몬스터의 효과 처리시에, 그 효과를 무효로 할 수 있다. 그 후, 이 카드를 파괴한다.
  | ko_text               = 이 카드명은 룰상 "아르토메기아" 카드로도 취급한다. 이 카드명의 ①②의 몬스터 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱 위에서 카드 3장을 뒷면으로 제외하고 발동할 수 있다. 이 카드를 파괴하고, 엑스트라 덱에서 "창감옥신 네르바" 1장을 융합 소환으로 취급하여 특수 소환한다. ②: 이 카드가 엑스트라 덱에 앞면으로 넣어졌을 경우에 발동할 수 있다. "감옥신영수－네르베도"가 아닌, "감옥신" 몬스터나 "아르토메기아" 몬스터 1장을 자신의 덱 / 엑스트라 덱(앞면)에서 특수 소환한다.
  | sc_pendulum_effect    = 此卡名的灵摆效果1回合仅可使用1次。①：连锁“狱神”怪兽或“神艺”怪兽的效果的发动，对手发动怪兽的效果的处理时，可将该效果无效。然后，将此卡破坏。
  | sc_text               = 此卡名在规则上也视为“神艺”卡。此卡名的①②怪兽效果1回合仅可各使用1次。①：从牌组上面将3张卡以里侧除外可以发动。将此卡破坏，从额外牌组将1只“创狱神 涅瓦”视为融合召唤特殊召唤。②：此卡以表侧加入额外牌组的情况下可以发动。从自己牌组・额外牌组（表侧）将除“狱神影兽－涅尔绯多”以外的1只“狱神”怪兽或“神艺”怪兽特殊召唤。
