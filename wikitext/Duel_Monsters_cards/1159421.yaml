  | text                = If you [[control]] a [[Tuner]]: [[Special Summon]] 1 Tuner from your [[hand]], [[Main Deck|Deck]], or [[GY]], also you cannot Special Summon from the [[Extra Deck]] for the rest of this [[turn]] after this card [[resolve]]s, except [[Synchro Monster]]s. You can only [[activate]] 1 "Over Tuning" per turn.
  | fr_text             = Si vous contrôlez un Syntoniseur : Invoquez Spécialement 1 Syntoniseur depuis votre main, Deck ou Cimetière, et aussi, vous ne pouvez pas Invoquer Spécialement (Monstres Synchro exclus) depuis l'Extra Deck le reste de ce tour après la résolution de cette carte. Vous ne pouvez activer qu'1 "Surréglage" par tour.
  | de_text             = Falls du einen Empfänger kontrollierst: Beschwöre 1 Empfänger als Spezialbeschwörung von deiner Hand, deinem Deck oder deinem Friedhof, zusätzlich kannst du für den Rest dieses Spielzugs, nachdem diese Karte aufgelöst wurde, keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Synchromonstern. Du kannst nur 1 „Überstimmung“ pro Spielzug aktivieren.
  | it_text             = Se controlli un Tuner: Evoca Specialmente 1 Tuner dalla tua mano, Deck o Cimitero, inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno dopo che questa carta si è risolta, eccetto Mostri Synchro. Puoi attivare solo 1 "Sovra Sintonizzazione" per turno.
  | pt_text             = Se você controlar um Regulador: Invoque por Invocação-Especial 1 Regulador da sua mão, do Deck ou do Cemitério e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno depois que este card resolver, exceto Monstros Sincro. Você só pode ativar 1 "Afinação Excessiva" por turno.
  | es_text             = Si controlas un Cantante: Invoca de Modo Especial 1 Cantante desde tu mano, Deck o Cementerio, y además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno después de que esta carta se resuelva, excepto Monstruos de Sincronía. Sólo puedes activar 1 "Afinación Extrema" por turno.
  | ja_text             = このカード名のカードは１ターンに１枚しか発動できない。①：自分フィールドにチューナーが存在する場合に発動できる。自分の手札・デッキ・墓地からチューナー１体を特殊召喚する。このカードの発動後、ターン終了時まで自分はＳモンスターしかＥＸデッキから特殊召喚できない。
  | ko_text             = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 자신 필드에 튜너가 존재할 경우에 발동할 수 있다. 자신의 패 / 덱 / 묘지에서 튜너 1장을 특수 소환한다. 이 카드의 발동 후, 턴 종료시까지 자신은 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다.
  | sc_text             = 此卡名的卡1回合仅可发动1张。①：自己场上存在协调的情况下可以发动。从自己手牌・牌组・墓地将1只协调特殊召唤。此卡发动后，直至回合结束时为止，自己从额外牌组仅可特殊召唤同步怪兽。
