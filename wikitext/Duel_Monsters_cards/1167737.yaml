  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。自分フィールドに「アルトメギア」モンスターが存在する場合、このカードはセットしたターンでも発動できる。①：相手がモンスターの効果を発動した時に発動できる。自分フィールドの融合モンスター１体をエンドフェイズまで除外し、その発動を無効にし破壊する。その後、自分フィールドのモンスターの種族が３種類以上の場合、相手フィールドの魔法・罠カードを全て手札に戻す事ができる。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. 자신 필드에 "아르토메기아" 몬스터가 존재할 경우, 이 카드는 세트한 턴에도 발동할 수 있다. ①: 상대가 몬스터의 효과를 발동했을 때에 발동할 수 있다. 자신 필드의 융합 몬스터 1장을 엔드 페이즈까지 제외하고, 그 발동을 무효로 하여 파괴한다. 그 후, 자신 필드의 몬스터의 종족이 3종류 이상일 경우, 상대 필드의 마법 / 함정 카드를 전부 패로 되돌릴 수 있다.
  | sc_text               = 此卡名的卡1回合仅可发动1张。自己场上存在“神艺”怪兽的情况下，此卡在放置的回合也可以发动。①：对手发动怪兽的效果时可以发动。将自己场上的1只融合怪兽直至结束阶段为止除外，将该发动无效并破坏。然后，自己场上怪兽的种族为3种以上的情况下，可将对手场上的魔法・陷阱卡全部放回手牌。
