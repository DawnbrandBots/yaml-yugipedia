  | text                  = If you [[control]] an "[[Artmage]]" [[monster]], you can [[activate]] this card the turn it was [[Set]]. When your opponent activates a [[monster effect]]: You can [[banish]] 1 [[Fusion Monster]] you control (until the [[End Phase]]), and if you do, [[negate]] the activation, and if you do that, [[destroy]] that monster, then if you have 3 or more different [[Type|Monster Types]] on your [[field]], you can [[return]] all [[Spells]]/[[Traps]] your opponent controls to the [[hand]]. You can only activate 1 "Artmage Impasto -Recapture-" per turn.
  | fr_text               = Si vous contrôlez un monstre "Artmage", vous pouvez activer cette carte le tour où elle a été Posée. Lorsque votre adversaire active un effet de monstre : vous pouvez bannir 1 Monstre Fusion que vous contrôlez (jusqu'à la End Phase), et si vous le faites, annulez l'activation, et si vous faites ça, détruisez le monstre, puis si vous avez min. 3 Types de Monstre différents sur votre Terrain, vous pouvez renvoyer tous les Magies/Pièges contrôlés par votre adversaire à la main. Vous ne pouvez activer qu'1 "Impasto Artmage -Recapture-" par tour.
  | de_text               = Falls du ein „Kunstmagus“-Monster kontrollierst, kannst du diese Karte in dem Spielzug aktivieren, in dem sie gesetzt wurde. Wenn dein Gegner einen Monstereffekt aktiviert: Du kannst (bis zur End Phase) 1 Fusionsmonster verbannen, das du kontrollierst, und falls du dies tust, annulliere die Aktivierung und falls du dies tust, zerstöre jenes Monster, dann, falls du 3 oder mehr unterschiedliche Monstertypen auf deiner Spielfeldseite hast, kannst du alle Zauber/Fallen, die dein Gegner kontrolliert, auf die Hand zurückgeben. Du kannst nur 1 „Kunstmagus-Farbauftrag -Befreiung-“ pro Spielzug aktivieren.
  | it_text               = Se controlli un mostro "Artmage", puoi attivare questa carta nel turno in cui è stata Posizionata. Quando il tuo avversario attiva l'effetto di un mostro: puoi bandire 1 Mostro Fusione che controlli (fino alla End Phase) e, se lo fai, annulla l'attivazione e, se fai quello, distruggi quel mostro, poi se hai 3 o più Tipi di Mostro diversi sul tuo Terreno, puoi far ritornare tutte le Magie/Trappole controllate dal tuo avversario nella mano. Puoi attivare solo 1 "Impasto Artmage -Ricattura-" per turno.
  | pt_text               = Se você controlar um monstro "Artmage", você pode ativar este card no turno em que foi Baixado. Quando seu oponente ativar um efeito de monstro: você pode banir 1 Monstro de Fusão que você controla (até a Fase Final) e, se isso acontecer, negue a ativação e, se isso acontecer, destrua esse monstro e, depois, se você tiver 3 ou mais Tipos de Monstro diferentes no seu campo, você pode devolver todas as Magias/Armadilhas que seu oponente controla para a mão. Você só pode ativar 1 "Impasto de Artmage -Recaptura-" por turno.
  | es_text               = Si controlas un monstruo "Artmagia", puedes activar esta carta en el turno en el que fue Colocada. Cuando tu adversario activa un efecto de monstruo: puedes desterrar 1 Monstruo de Fusión que controles (hasta la End Phase) y, si lo haces, niega la activación y, si haces eso, destruye ese monstruo y después, si tienes 3 o más Tipos de Monstruo diferentes en tu Campo, puedes devolver a la mano todas las Mágicas/Trampas que controle tu adversario. Sólo puedes activar 1 "Impasto Artmagia -Recaptura-" por turno.
  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。自分フィールドに「アルトメギア」モンスターが存在する場合、このカードはセットしたターンでも発動できる。①：相手がモンスターの効果を発動した時に発動できる。自分フィールドの融合モンスター１体をエンドフェイズまで除外し、その発動を無効にし破壊する。その後、自分フィールドのモンスターの種族が３種類以上の場合、相手フィールドの魔法・罠カードを全て手札に戻す事ができる。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. 자신 필드에 "아르토메기아" 몬스터가 존재할 경우, 이 카드는 세트한 턴에도 발동할 수 있다. ①: 상대가 몬스터의 효과를 발동했을 때에 발동할 수 있다. 자신 필드의 융합 몬스터 1장을 엔드 페이즈까지 제외하고, 그 발동을 무효로 하여 파괴한다. 그 후, 자신 필드의 몬스터의 종족이 3종류 이상일 경우, 상대 필드의 마법 / 함정 카드를 전부 패로 되돌릴 수 있다.
  | sc_text               = 此卡名的卡1回合仅可发动1张。自己场上存在“神艺”怪兽的情况下，此卡在放置的回合也可以发动。①：对手发动怪兽的效果时可以发动。将自己场上的1只融合怪兽直至结束阶段为止除外，将该发动无效并破坏。然后，自己场上怪兽的种族为3种以上的情况下，可将对手场上的魔法・陷阱卡全部放回手牌。
