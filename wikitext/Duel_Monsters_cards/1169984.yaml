  | text                  = 1 [[Spellcaster]] [[monster]] + 1 [[WIND]] monster<br />(This card is always treated as a "[[Familiar-Possessed]]" card.)<br />If this card is [[Fusion Summon]]ed: You can place 1 WIND monster from your [[GY]] on the bottom of the [[Deck]], then [[target]] 1 monster your opponent [[control]]s; take control of that monster. During your opponent's [[turn]] ([[Quick Effect]]): You can target 2 cards on the [[field]], including a WIND monster you control; place them on the bottom of the Deck in any order. You can only use 1 "Possessed Destiny - Wynn" [[effect]] per turn, and only [[Once per turn|once that turn]].
  | fr_text               = 1 monstre Magicien + 1 monstre VENT<br />(Cette carte est toujours traitée comme carte "Familier Possédé".)<br />Si cette carte est Invoquée par Fusion : vous pouvez placer 1 monstre VENT depuis votre Cimetière au-dessous du Deck, puis ciblez 1 monstre contrôlé par votre adversaire ; prenez le contrôle du monstre. Durant le tour de votre adversaire (Effet Rapide) : vous pouvez cibler 2 cartes (un monstre VENT que vous contrôlez inclus) sur le Terrain ; placez-les au-dessous du Deck dans l'ordre de votre choix. Vous ne pouvez utiliser qu'1 effet de "Destinée Possédée - Wynn" par tour, et uniquement une fois le tour.
  | de_text               = 1 Hexer-Monster + 1 WIND Monster<br />(Diese Karte wird immer als „Vertrauten“-Karte behandelt.)<br />Falls diese Karte als Fusionsbeschwörung beschworen wird: Du kannst 1 WIND Monster von deinem Friedhof unters Deck legen und dann 1 Monster wählen, das dein Gegner kontrolliert; übernimm die Kontrolle über jenes Monster. Während des Spielzugs deines Gegners (Schnelleffekt): Du kannst 2 Karten auf dem Spielfeld wählen, darunter ein WIND Monster, das du kontrollierst; lege sie in beliebiger Reihenfolge unters Deck. Du kannst nur 1 Effekt von „Besessenes Schicksal - Wynn“ pro Spielzug verwenden und in jenem Spielzug nur einmal.
  | it_text               = 1 mostro Incantatore + 1 mostro VENTO<br />(Questa carta viene sempre considerata come una carta "Posseduto dal Famiglio".)<br />Se questa carta viene Evocata tramite Fusione: puoi mettere 1 mostro VENTO dal tuo Cimitero in fondo al Deck, poi scegliere come bersaglio 1 mostro controllato dal tuo avversario; prendi il controllo di quel mostro. Durante il turno del tuo avversario (Effetto Rapido): puoi scegliere come bersaglio 2 carte sul Terreno, compreso un mostro VENTO che controlli; mettile in fondo al Deck in qualsiasi ordine. Puoi utilizzare solo 1 effetto di "Destino Posseduto - Wynn" per turno, e solo una volta in quel turno.
  | pt_text               = 1 monstro Mago + 1 monstro de VENTO<br />(Este card deve ser sempre considerado como um card "Espírito-Possuído".)<br />Se este card for Invocado por Invocação-Fusão: você pode colocar 1 monstro de VENTO do seu Cemitério no fundo do Deck e, depois, escolha 1 monstro que seu oponente controla; tome o controle desse monstro. Durante o turno do seu oponente (Efeito Rápido): você pode escolher 2 cards no campo, incluindo um monstro de VENTO que você controla; coloque-os no fundo do Deck em qualquer ordem. Você só pode usar 1 efeito de "Destino Possuído - Wynn" por turno e apenas uma vez por turno.
  | es_text               = 1 monstruo Lanzador de Conjuros + 1 monstruo de VIENTO<br />(Esta carta se trata siempre como una carta "Familiar Poseído").<br />Si esta carta es Invocada por Fusión: puedes poner en la parte inferior del Deck 1 monstruo de VIENTO en tu Cementerio, y después selecciona 1 monstruo que controle tu adversario; toma el control de ese monstruo. Durante el turno de tu adversario (Efecto Rápido): puedes seleccionar 2 cartas en el Campo, incluyendo un monstruo de VIENTO que controles; ponlos en la parte inferior del Deck en cualquier orden. Sólo puedes usar 1 efecto de "Destino del Poseído - Wynn" por turno, y sólo una vez ese turno.
  | ja_text               = 魔法使い族モンスター＋風属性モンスター<br />このカード名はルール上「憑依装着」カードとしても扱う。このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：このカードが融合召喚した場合、自分の墓地から風属性モンスター１体をデッキの一番下に戻し、相手フィールドのモンスター１体を対象として発動できる。そのモンスターのコントロールを得る。②：相手ターンに、自分フィールドの風属性モンスターを含むフィールドのカード２枚を対象として発動できる。そのカードを好きな順番でデッキの下に戻す。
