  | text                = [[Target]] 1 "[[HERO]]" [[monster]] you [[control]]; [[send]] it to the [[GY]], also, after that, if it [[Leaves the field|left the field]] by this [[effect]], [[Special Summon]] 1 "[[Masked HERO]]" monster from your [[Extra Deck]] with the same [[Attribute]] that the sent monster had when it was on the [[field]] (its original Attribute, if [[face-down]]).
  | fr_text             = Ciblez 1 monstre "HГүROS" que vous contrГҙlez ; envoyez-le au CimetiГЁre, et aussi, aprГЁs Г§a, s'il a quittГ© le Terrain par cet effet, Invoquez SpГ©cialement 1 monstre "HГүROS MasquГ©" du mГӘme Attribut que le monstre envoyГ© avait lorsqu'il Г©tait sur le Terrain (son Attribut d'origine, si face verso) depuis votre Extra Deck.
  | de_text             = WГӨhle 1 вҖһHELDвҖң-Monster, das du kontrollierst; lege es auf den Friedhof, zusГӨtzlich danach, falls es das Spielfeld durch diesen Effekt verlassen hat, beschwГ¶re 1 вҖһMaskierter HELDвҖң-Monster mit derselben Eigenschaft, die das gelegte Monster hatte, als es auf dem Spielfeld lag (seiner Grund-Eigenschaft, falls es verdeckt lag), als SpezialbeschwГ¶rung von deinem Extra Deck.
  | it_text             = Scegli come bersaglio 1 mostro "EROE" che controlli; mandalo al Cimitero, inoltre, dopo averlo fatto, se ha lasciato il Terreno a causa di questo effetto, Evoca Specialmente dal tuo Extra Deck 1 mostro "EROE Mascherato" con lo stesso Attributo che il mostro mandato aveva quando era sul Terreno (il suo Attributo originale, se coperto).
  | pt_text             = Escolha 1 monstro "HERГ“I" que vocГӘ controla; envie-o para o CemitГ©rio e, alГ©m disso, depois, se ele deixou o campo por este efeito, Invoque por InvocaГ§ГЈo-Especial do seu Deck Adicional, 1 monstro "HERГ“I Mascarado" com o mesmo Atributo que o monstro enviado tinha quando estava no campo (o Atributo original dele, se ele estava com a face para baixo).
  | es_text             = Selecciona 1 monstruo "HГүROE" que controles; mГЎndalo al Cementerio y ademГЎs, despuГ©s de eso, si dejГі el Campo por este efecto, Invoca de Modo Especial, desde tu Deck Extra, 1 monstruo "HГүROE Enmascarado" con el mismo Atributo que tenГӯa el monstruo mandado cuando estaba en el Campo (si estaba boca abajo, su Atributo original).
  | ja_text             = в‘ пјҡиҮӘеҲҶгғ•гӮЈгғјгғ«гғүгҒ®гҖҢпјЁпјҘпјІпјҜгҖҚгғўгғігӮ№гӮҝгғјпј‘дҪ“гӮ’еҜҫиұЎгҒЁгҒ—гҒҰзҷәеӢ•гҒ§гҒҚгӮӢгҖӮгҒқгҒ®гғўгғігӮ№гӮҝгғјгҒ®еұһжҖ§гӮ’зўәиӘҚгҒ—гҖҒеў“ең°гҒёйҖҒгӮӢгҖӮгҒ“гҒ®еҠ№жһңгҒ§гҒқгҒ®гғўгғігӮ№гӮҝгғјгҒҢгғ•гӮЈгғјгғ«гғүгҒӢгӮүйӣўгӮҢгҒҹе ҙеҗҲгҖҒгҒ•гӮүгҒ«еҗҢгҒҳеұһжҖ§гӮ’жҢҒгҒӨгҖҢпјӯгғ»пјЁпјҘпјІпјҜгҖҚгғўгғігӮ№гӮҝгғјпј‘дҪ“гӮ’пјҘпјёгғҮгғғгӮӯгҒӢгӮүзү№ж®ҠеҸ¬е–ҡгҒҷгӮӢгҖӮ
