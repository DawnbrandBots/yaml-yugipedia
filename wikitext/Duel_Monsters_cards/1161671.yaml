  | ja_text               = 魔法使い族レベル４モンスター×２<br />このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドの元々の属性が光属性の「妖精伝姫」モンスターは相手が発動した効果を受けない。②：このカードのＸ素材を２つまで取り除いて発動できる。取り除いた数だけデッキから「妖精伝姫」カードを墓地へ送る。③：自分・相手ターンに、このカードが墓地に存在する場合、自分フィールドの元々の属性が光属性の「妖精伝姫」モンスター１体を対象として発動できる。このカードを特殊召喚し、対象のモンスターを墓地へ送る。
  | ko_text               = 마법사족 레벨 4 몬스터 × 2<br />이 카드명의 ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드의 원래의 속성이 빛 속성인 "페어리테일" 몬스터는 상대가 발동한 효과를 받지 않는다. ②: 이 카드의 엑시즈 소재를 2개까지 제거하고 발동할 수 있다. 제거한 수만큼 덱에서 "페어리테일" 카드를 묘지로 보낸다. ③: 자신 / 상대 턴에, 이 카드가 묘지에 존재할 경우, 자신 필드의 원래 속성이 빛 속성인 "페어리테일" 몬스터 1장을 대상으로 하고 발동할 수 있다. 이 카드를 특수 소환하고, 대상의 몬스터를 묘지로 보낸다.
  | sc_text               = 魔法师族等级4怪兽×2<br />此卡名的②③效果1回合仅可各使用1次。①：自己场上的原本属性为光属性的“妖精传姬”怪兽不受对手发动的效果影响。②：去除此卡的最多2个超量素材可以发动。依去除的数量，从牌组将“妖精传姬”卡送至墓地。③：在自己・对手回合中，此卡存在于墓地的情况下，以自己场上的1只原本属性为光属性的“妖精传姬”怪兽为对象可以发动。将此卡特殊召唤，将对象怪兽送至墓地。
