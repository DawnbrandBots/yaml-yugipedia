  | ja_text               = チューナー＋チューナー以外のモンスター１体以上<br />①：自分のモンスターのＡ召喚成功時に相手は魔法・罠・モンスターの効果を発動できない。②：このカードがリリースされた場合、以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。●お互いのフィールド・墓地のＳモンスターを全てＥＸデッキに戻す。●「道化の一座　メテオ」以外の自分の墓地の「道化の一座」カード１枚を対象として発動できる。そのカードを手札に加える。
