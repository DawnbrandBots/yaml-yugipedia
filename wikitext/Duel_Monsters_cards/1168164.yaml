  | fr_text               = 1 Syntoniseur + 1+ non-Syntoniseur<br />Votre adversaire ne peut activer ni de cartes ni d'effets lorsque vous Invoquez par Sacrifice un monstre. Si cette carte est Sacrifiée : vous pouvez activer 1 de ces effets (mais vous ne pouvez utiliser chaque effet de "Meteor, Troupe des Clowns" qu'une fois par tour) ;<br />● Renvoyez tous les Monstres Synchro depuis le Terrain et les Cimetières à l'Extra Deck.<br />● Vous pouvez cibler 1 carte "Troupe des Clowns" ("Meteor, Troupe des Clowns" exclu) dans votre Cimetière ; ajoutez-la à votre main. 
  | de_text               = 1 Empfänger + 1+ Nicht-Empfänger<br />Dein Gegner kann weder Karten noch Effekte aktivieren, wenn du ein Monster als Tributbeschwörung beschwörst. Falls diese Karte als Tribut angeboten wird: Du kannst 1 dieser Effekte aktivieren (aber du kannst jeden Effekt von „Clowntrupp Meteor“ nur einmal pro Spielzug verwenden);<br />● Lege alle Synchromonster vom Spielfeld und den Friedhöfen ins Extra Deck zurück.<br />● Du kannst 1 „Clowntrupp“-Karte in deinem Friedhof wählen, außer „Clowntrupp Meteor“; füge sie deiner Hand hinzu.
  | it_text               = 1 Tuner + 1+ non-Tuner<br />Il tuo avversario non può attivare carte o effetti quando Evochi tramite Tributo un mostro. Se questa carta viene offerta come Tributo: puoi attivare 1 di questi effetti (ma puoi utilizzare ogni effetto di "Compagnia di Clown Meteor" una sola volta per turno);<br />● Fai ritornare tutti i Mostri Synchro dal Terreno e dai Cimiteri nell'Extra Deck.<br />● Puoi scegliere come bersaglio 1 carta "Compagnia di Clown" nel tuo Cimitero, eccetto "Compagnia di Clown Meteor"; aggiungila alla tua mano.
  | pt_text               = 1 Regulador + 1+ não-Reguladores<br />Seu oponente não pode ativar cards ou efeitos quando você Invocar um monstro por Invocação-Tributo. Se este card for oferecido como Tributo: você pode ativar 1 desses efeitos (mas você só pode usar cada efeito de "Companhia de Palhaços Meteor" uma vez por turno);<br />● Devolva para o Deck Adicional todos os Monstros Sincro do campo e dos Cemitérios.<br />● Você pode escolher 1 card "Companhia de Palhaços" no seu Cemitério, exceto "Companhia de Palhaços Meteor"; adicione-o à sua mão.
  | es_text               = 1 Cantante + 1+ no Cantantes<br />Tu adversario no puede activar cartas o efectos cuando Invocas un monstruo por Sacrificio. Si esta carta es Sacrificada: puedes activar 1 de estos efectos (pero sólo puedes usar cada efecto de "Meteor de la Compañía de Payasos" una vez por turno);<br />● Devuelve al Deck Extra todos los Monstruos de Sincronía en el Campo y los Cementerios.<br />● Puedes seleccionar 1 carta "Compañía de Payasos" en tu Cementerio, excepto "Meteor de la Compañía de Payasos"; añádela a tu mano.
  | ja_text               = チューナー＋チューナー以外のモンスター１体以上<br />①：自分のモンスターのＡ召喚成功時に相手は魔法・罠・モンスターの効果を発動できない。②：このカードがリリースされた場合、以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。●お互いのフィールド・墓地のＳモンスターを全てＥＸデッキに戻す。●「道化の一座　メテオ」以外の自分の墓地の「道化の一座」カード１枚を対象として発動できる。そのカードを手札に加える。
  | ko_text               = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />①: 자신 몬스터의 어드밴스 소환 성공시에 상대는 마법 / 함정 / 몬스터의 효과를 발동할 수 없다. ②: 이 카드가 릴리스되었을 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다(이 카드명의 이하의 효과는 각각 1턴에 1번밖에 선택할 수 없다). ●서로의 필드 / 묘지의 싱크로 몬스터를 전부 엑스트라 덱으로 되돌린다. ●"크라운 클랜 메테오" 이외의 자신 묘지의 "크라운 클랜" 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 패에 넣는다.
  | sc_text               = 协调＋协调以外的怪兽1只以上<br />①：自己怪兽的上级召唤成功时，对手不可发动魔法・陷阱・怪兽的效果。②：此卡被解放的情况下，可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。●将双方场上・墓地的同步怪兽全部放回额外牌组。●以“小丑戏帮 梅特欧”以外的、自己墓地的1张“小丑戏帮”卡为对象可以发动。将该卡加入手牌。
