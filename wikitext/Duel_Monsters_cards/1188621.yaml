  | text                  = You can [[Tribute]] additional [[monsters]] when you [[Tribute Summon]] this card [[face-up]]. If this card is Tribute Summoned: You can place [[VIP Counter]]s on this card equal to the number of monsters Tributed for its Tribute Summon. When your opponent activates a card or [[effect]] ([[Quick Effect]]): You can remove 1 VIP Counter from this card; toss a coin and call it. If you call it right, [[negate]] that effect. If you call it wrong, this card's [[original ATK]] becomes halved until the end of this [[turn]].
  | fr_text               = Vous pouvez Sacrifier des monstres supplémentaires lorsque vous Invoquez par Sacrifice face recto cette carte. Si cette carte est Invoquée par Sacrifice : vous pouvez placer un nombre de Compteurs VIP sur cette carte, égal au nombre de monstres Sacrifiés pour son Invocation Sacrifice. Lorsque votre adversaire active une carte ou un effet (Effet Rapide) : vous pouvez retirer 1 Compteur VIP de cette carte ; jouez à pile ou face. Si vous gagnez, annulez l'effet. Si vous perdez, l'ATK d'origine de cette carte sera divisée par deux jusqu'à la fin de ce tour.
  | de_text               = Du kannst zusätzliche Monster als Tribut anbieten, wenn du diese Karte offen als Tributbeschwörung beschwörst. Falls diese Karte als Tributbeschwörung beschworen wird: Du kannst VIP-Zählmarken in Höhe der Anzahl der Monster, die als Tribut für ihre Tributbeschwörung angeboten wurden, auf diese Karte legen. Wenn dein Gegner eine Karte oder einen Effekt aktiviert (Schnelleffekt): Du kannst 1 VIP-Zählmarke von dieser Karte entfernen; wirf eine Münze und sage das Ergebnis voraus. Falls du richtig vorausgesagt hast, annulliere jenen Effekt. Falls du falsch vorausgesagt hast, werden die Grund-ATK dieser Karte bis zum Ende dieses Spielzugs halbiert.
  | it_text               = Puoi offrire come Tributo mostri addizionali quando Evochi tramite Tributo questa carta scoperta. Se questa carta viene Evocata tramite Tributo: puoi mettere Segnalini VIP su questa carta pari al numero di mostri offerti come Tributo per la sua Evocazione tramite Tributo. Quando il tuo avversario attiva una carta o un effetto (Effetto Rapido): puoi rimuovere 1 Segnalino VIP da questa carta; lancia una moneta e scegli testa o croce. Se indovini, annulla quell'effetto. Se sbagli, l'ATK originale di questa carta viene dimezzato fino alla fine di questo turno.
  | pt_text               = Você pode oferecer como Tributo monstros adicionais quando Invocar este card por Invocação-Tributo com a face para cima. Se este card for Invocado por Invocação-Tributo: você pode colocar Marcadores VIP neste card igual ao número de monstros oferecidos como Tributo para sua Invocação-Tributo. Quando seu oponente ativar um card ou efeito (Efeito Rápido): você pode remover 1 Marcador VIP deste card; lance uma moeda e escolha cara ou coroa. Se você ganhar, negue o efeito. Se você perder, o ATK original deste card é diminuído pela metade até o final deste turno.
  | es_text               = Puedes Sacrificar monstruos adicionales cuando Invocas boca arriba por Sacrificio esta carta. Si esta carta es Invocada por Sacrificio: puedes poner Contadores VIP en esta carta iguales al número de monstruos Sacrificados para su Invocación por Sacrificio. Cuando tu adversario activa una carta o efecto (Efecto Rápido): puedes retirar 1 Contador VIP de esta carta; lanza una moneda y elige Cara o Cruz. Si aciertas, niega ese efecto. Si fallas, el ATK original de esta carta se divide a la mitad hasta el final de este turno.
  | ja_text               = ①：このカードはモンスターを任意の数だけリリースして表側表示でＡ召喚できる。②：このカードがＡ召喚した場合に発動できる。このカードのＡ召喚のためにリリースしたモンスターの数だけ、このカードにＶＩＰカウンターを置く。③：相手が魔法・罠・モンスターの効果を発動した時、このカードのＶＩＰカウンターを１つ取り除いて発動できる。コイントスを１回行い、裏表を当てる。当たった場合、その効果を無効にする。ハズレの場合、このカードの元々の攻撃力はターン終了時まで半分になる。
  | ko_text               = 
  | sc_text               = ①：此卡可通过解放任意数量的怪兽来以表侧表示上级召唤。②：此卡上级召唤的情况下可以发动。依为上级召唤此卡而解放的怪兽的数量，在此卡上放VIP计数物。③：对手发动魔法・陷阱・怪兽的效果时，去除此卡的1个VIP计数物可以发动。掷1次硬币，猜正反。猜中的情况下，将该效果无效。猜错的情况下，此卡原本的攻击力直至回合结束时为止变为一半。
