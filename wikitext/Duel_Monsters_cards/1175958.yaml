  | text                  = ([[Quick Effect]]): You can [[discard]] this card, then [[activate]] 1 of these [[effect]]s;<br />● The next [[battle damage|battle]] or [[effect damage]] you take this [[turn]] will become 0.<br />● [[Set]] 1 [[Quick-Play Spell]] or [[Trap]] that mentions "[[Light and Darkness Ritual]]" from your [[Main Deck|Deck]]. It can be activated this [[turn]].<br />You can only use this effect of "Griffoh" [[once per turn]]. If you Ritual Summon exactly 1 [[Level]] 8 Ritual Monster with a card effect that requires use of monsters, this card can be used as the entire Tribute.
  | fr_text               = (Effet Rapide) : vous pouvez défausser cette carte, puis activez 1 de ces effets ;<br />● Les prochains dommages de combat ou d'effet que vous recevez ce tour vont devenir 0.<br />● Posez 1 Magie Jeu-Rapide ou Piège qui mentionne "Rituel de la Lumière et des Ténèbres" depuis votre Deck. Il peut être activé ce tour.<br />Vous ne pouvez utiliser cet effet de "Griffoh" qu'une fois par tour. Si vous Invoquez Rituellement exactement 1 Monstre Rituel de Niveau 8 avec un effet de carte qui nécessite l'utilisation de monstres, cette carte peut être utilisée pour l'ensemble du Sacrifice.
  | de_text               = (Schnelleffekt): Du kannst diese Karte abwerfen und dann 1 dieser Effekte aktivieren;<br />● Der nächste Kampf- oder Effektschaden, den du in diesem Spielzug erhältst, wird zu 0.<br />● Setze 1 Schnellzauber oder Falle, der oder die „Ritual von Licht und Finsternis“ erwähnt, von deinem Deck. Er oder sie kann in diesem Spielzug aktiviert werden.<br />Du kannst diesen Effekt von „Griffoh“ nur einmal pro Spielzug verwenden. Falls du genau 1 Ritualmonster der Stufe 8 durch einen Karteneffekt, der die Verwendung von Monstern erfordert, als Ritualbeschwörung beschwörst, kann diese Karte als der gesamte Tribut verwendet werden.
  | it_text               = (Effetto Rapido): puoi scartare questa carta, poi attivare 1 di questi effetti;<br />● Il prossimo danno da combattimento o da effetto che subisci in questo turno diventa 0.<br />● Posiziona 1 Magia Rapida o Trappola che menziona "Rituale di Luce e Oscurità" dal tuo Deck. Essa può essere attivata in questo turno.<br />Puoi utilizzare questo effetto di "Griffoh" una sola volta per turno. Se Evochi tramite Rituale esattamente 1 Mostro Rituale di Livello 8 con l'effetto di una carta che richiede l'uso di mostri, questa carta può essere utilizzata come l'intero Tributo.
  | pt_text               = (Efeito Rápido): você pode descartar este card e, depois, ative 1 desses efeitos;<br />● O próximo dano de batalha ou de efeito que você sofrer neste turno se torna 0.<br />● Baixe 1 Magia Rápida ou Armadilha que mencione "Ritual da Luz e das Trevas" do seu Deck. Ela pode ser ativada neste turno.<br />Você só pode usar este efeito de "Griffoh" uma vez por turno. Se você Invocar por Invocação-Ritual exatamente 1 Monstro de Ritual de Nível 8 com um efeito de card que requer o uso de monstros, este card pode ser usado como todo o Tributo.
  | es_text               = (Efecto Rápido): puedes descartar esta carta, y después activa 1 de estos efectos;<br />● El próximo daño de batalla o efecto que recibas este turno se convertirá en 0.<br />● Coloca, desde tu Deck, 1 Mágica de Juego Rápido o Trampa que mencione "Ritual de la Luz y la Oscuridad". Ésta puede ser activada este turno.<br />Sólo puedes usar este efecto de "Griffoh" una vez por turno. Si Invocas por Ritual exactamente 1 Monstruo de Ritual de Nivel 8 con un efecto de carta que requiere el uso de monstruos, esta carta puede ser usada como todo el Sacrificio.
  | ja_text               = このカード名の①の効果は１ターンに１度しか使用できない。①：自分・相手ターンに、このカードを手札から捨て、以下の効果から１つを選択して発動できる。●このターン、自分が受ける戦闘・効果ダメージは１度だけ０になる。●デッキから「光と闇の儀式」のカード名が記された速攻魔法・罠カード１枚を自分フィールドにセットする。この効果でセットしたカードはセットしたターンでも発動できる。②：レベル８儀式モンスター１体を儀式召喚する場合、このカード１枚で儀式召喚に必要な分のリリースとして使用できる。
  | ko_text               = 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대 턴에, 이 카드를 패에서 버리고, 이하의 효과에서 1개를 선택하여 발동할 수 있다. ●이 턴에, 자신이 받는 전투 / 효과 데미지는 1번만 0 이 된다. ●덱에서 "빛과 어둠의 의식"의 카드명이 쓰여진 속공 마법 / 함정 카드 1장을 자신 필드에 세트한다. 이 효과로 세트한 카드는 세트한 턴에도 발동할 수 있다. ②: 레벨 8 의식 몬스터 1장을 의식 소환할 경우, 이 카드 1장으로 의식 소환에 필요한 만큼의 릴리스로서 사용할 수 있다.
  | sc_text               = 此卡名的①效果1回合仅可使用1次。①：在自己・对手回合中，从手牌将此卡舍弃，可从以下效果中选择1个发动。●此回合，自己受到的战斗・效果伤害仅1次变为0。●从牌组将1张记载有“光与暗的仪式”卡名的速攻魔法・陷阱卡放置在自己场上。以此效果放置的卡在放置的回合也可以发动。②：要仪式召唤1只等级8仪式怪兽的情况下，使用1张此卡即可作为仪式召唤所必需的解放。
