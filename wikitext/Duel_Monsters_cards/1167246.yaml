  | ja_text             = ①：モンスター１体と罠カード２枚をデッキから相手に見せ、相手はその中からランダムに１枚選ぶ。自分は残りのカードを確認し、その内の罠カード１枚を除外する。その後、相手は以下から１つを選び、自分はその効果を適用する。<br />●相手が選んだカードをお互いに確認し、モンスターだった場合、手札に加えるか特殊召喚する。違った場合、除外する。残りをデッキに戻す。<br />●相手が選ばなかったカードの内、除外しなかったカードをお互いに確認し、モンスターだった場合、手札に加える。違った場合、除外する。残りをデッキに戻す。
  | ko_text             = ①: 몬스터 1장과 함정 카드 2장을 덱에서 상대에게 보여주고, 상대는 그 중에서 무작위로 1장 고른다. 자신은 남은 카드를 확인하고, 그 중의 함정 카드 1장을 제외한다. 그 후, 상대는 이하에서 1개를 고르고, 자신은 그 효과를 적용한다.<br />●상대가 고른 카드를 서로 확인하고, 몬스터였을 경우, 패에 넣거나 특수 소환한다. 다를 경우, 제외한다. 나머지를 덱으로 되돌린다.<br />●상대가 고르지 않은 카드 중, 제외하지 않은 카드를 서로 확인하고, 몬스터였을 경우, 패에 넣는다. 다를 경우, 제외한다. 나머지를 덱으로 되돌린다.
  | sc_text             = ①：从牌组将1只怪兽与2张陷阱卡出示给对手，对手从其中随机挑选1张。自己确认剩余的卡，将其中的1张陷阱卡除外。然后，对手从以下挑选1个，自己适用该效果。<br />●对手将所挑选的卡给双方确认，是怪兽的情况下，将其加入手牌或特殊召唤。不是的情况下，将其除外。将剩余的放回牌组。<br />●对手将未挑选的卡中未除外的卡给双方确认，是怪兽的情况下，将其加入手牌。不是的情况下，将其除外。将剩余的放回牌组。
