  | text                = Take 1 [[monster]] and 2 [[Traps]] from your [[Main Deck|Deck]] and [[reveal]] them, your opponent randomly picks 1 and you look at the remaining 2 to [[banish]] 1 Trap from it, then your opponent chooses 1 of these effects for you to apply.<br />● Reveal the card picked by your opponent, and if it was a monster, [[Add a card|add]] it to your [[hand]] or [[Special Summon]] it, or if it wasn't, banish it, also shuffle the rest into the Deck.<br />● Reveal the card that was not picked by your opponent nor banished by you, and if it was a monster, add it to your hand, or if it wasn't, banish it, also shuffle the rest into the Deck.
