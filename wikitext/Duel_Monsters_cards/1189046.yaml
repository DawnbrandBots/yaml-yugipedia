  | text                  = 2 [[monsters]] with the same [[Type]] and [[Attribute]], but different [[Level]]s<br />Your opponent cannot [[target]] [[Fusion Monster]]s you [[control]] with card [[effect]]s. If this card is [[sent]] to the [[GY]] as [[material]] for a [[Fusion Summon]]: You can [[Special Summon]] 1 Fusion Monster from your [[Extra Deck]] in [[Defense Position]] (but [[negate]] its [[effect]]s, also [[return]] it to the Extra Deck during the [[End Phase]]), also for the rest of this [[turn]], you cannot Special Summon from the Extra Deck, except Fusion Monsters. You can only use this effect of "Fata Dragna" once per turn.
  | fr_text               = 2 monstres du même Type et Attribut, mais de Niveaux différents<br />Votre adversaire ne peut pas cibler de Monstres Fusion que vous contrôlez avec des effets de carte. Si cette carte est envoyée au Cimetière comme Matériel pour une Invocation Fusion : vous pouvez Invoquer Spécialement 1 Monstre Fusion depuis votre Extra Deck en Position de Défense (mais annulez ses effets, et aussi, renvoyez-le à l'Extra Deck durant la End Phase), et aussi, vous ne pouvez pas Invoquer Spécialement (Monstres Fusion exclus) depuis l'Extra Deck le reste de ce tour. Vous ne pouvez utiliser cet effet de "Fata Dragna" qu'une fois par tour.
  | de_text               = 2 Monster mit demselben Typ und derselben Eigenschaft, aber unterschiedlichen Stufen<br />Dein Gegner kann Fusionsmonster, die du kontrollierst, nicht als Ziel für Karteneffekte wählen. Falls diese Karte als Material für eine Fusionsbeschwörung auf den Friedhof gelegt wird: Du kannst 1 Fusionsmonster als Spezialbeschwörung von deinem Extra Deck in die Verteidigungsposition beschwören (aber annulliere seine Effekte, zusätzlich lege es während der End Phase ins Extra Deck zurück), zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Fusionsmonstern. Du kannst diesen Effekt von „Fata Dragna“ nur einmal pro Spielzug verwenden.
  | it_text               = 2 mostri con lo stesso Tipo e Attributo, ma Livelli diversi<br />Il tuo avversario non può scegliere come bersaglio i Mostri Fusione che controlli con gli effetti delle carte. Se questa carta viene mandata al Cimitero come materiale per un'Evocazione tramite Fusione: puoi Evocare Specialmente 1 Mostro Fusione dal tuo Extra Deck in Posizione di Difesa (ma annulla i suoi effetti, inoltre fallo ritornare nell'Extra Deck durante la End Phase), inoltre per il resto di questo turno, non puoi Evocare Specialmente dall'Extra Deck, eccetto Mostri Fusione. Puoi utilizzare questo effetto di "Fata Dragna" una sola volta per turno.
  | pt_text               = 2 monstros com o mesmo Tipo e Atributo, mas Níveis diferentes<br />Seu oponente não pode escolher Monstros de Fusão que você controla como alvo de efeitos de card. Se este card for enviado para o Cemitério como matéria para uma Invocação-Fusão: você pode Invocar por Invocação-Especial 1 Monstro de Fusão do seu Deck Adicional em Posição de Defesa (mas negue seus efeitos e, além disso, devolva-o para o Deck Adicional durante a Fase Final) e, além disso, pelo resto deste turno, você não pode Invocar por Invocação-Especial do Deck Adicional, exceto Monstros de Fusão. Você só pode usar este efeito de "Fata Dragna" uma vez por turno.
  | es_text               = 2 monstruos con el mismo Tipo y Atributo, pero Niveles diferentes<br />Tu adversario no puede seleccionar con efectos de cartas Monstruos de Fusión que controles. Si esta carta es mandada al Cementerio como material para una Invocación por Fusión: puedes Invocar de Modo Especial 1 Monstruo de Fusión desde tu Deck Extra en Posición de Defensa (pero niega sus efectos, y además devuélvelo al Deck Extra durante la End Phase) y además, por el resto de este turno, no puedes Invocar de Modo Especial desde el Deck Extra, excepto Monstruos de Fusión. Sólo puedes usar este efecto de "Fata Dragna" una vez por turno.
