  | sc_text             = 此卡名的①②效果1回合仅可各使用1次。①：以任意数量的场上的表侧表示怪兽为对象，宣言1个种族或属性可以发动。将该怪兽改成宣言的种族或属性。②：此卡存在于怪兽区域的状态下，有怪兽被特殊召唤至对手场上的情况下，以自己及对手场上的、种族和属性相同的怪兽各1只为对象可以发动。将该怪兽放回手牌。
