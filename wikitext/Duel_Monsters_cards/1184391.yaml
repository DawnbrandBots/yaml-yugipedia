  | sc_text               = 此卡名的卡1回合仅可发动1张。①：根据发动回合可以发动以下效果。<br />●自己回合：从牌组挑选1只雷族・岩石族怪兽放在牌组最上面。自己场上或墓地存在雷族・岩石族怪兽中的任一的情况下，进而可将场上的1张卡破坏。<br />●对手回合：将自己场上・墓地・除外状态的1只雷族・岩石族怪兽加入手牌。此回合有怪兽因战斗・效果被破坏的情况下，也可从牌组挑选要加入手牌的怪兽。
