  | text                  = [[Activate]] the following [[effect]] depending on whose [[turn]] it is;<br />● Yours: Place 1 [[Thunder]] or [[Rock]] [[monster]] from your [[Main Deck|Deck]] on top of your Deck, then if you have a Thunder or Rock monster in your [[field]] or GY, you can [[destroy]] 1 card on the field.<br />● Opponent's: [[Add a card|Add]] 1 Thunder or Rock monster from your field, GY or [[banish]]ment to your hand, or if a monster(s) was [[destroyed by battle]] or card effect this turn, you can add 1 such monster from your Deck instead.<br />You can only activate 1 "Superconductive Plasma Blast" per turn.
  | fr_text               = Activez l'effet suivant selon le tour ;<br />● Le vôtre : Placez 1 monstre Tonnerre ou Rocher depuis votre Deck au-dessus de votre Deck, puis si vous avez un monstre Tonnerre ou Rocher dans votre Terrain ou Cimetière, vous pouvez détruire 1 carte sur le Terrain.<br />● Celui de l'adversaire : Ajoutez 1 monstre Tonnerre ou Rocher depuis votre Terrain, Cimetière ou bannissement à votre main, ou si un ou plusieurs monstres ont été détruits au combat ou par un effet de carte ce tour, vous pouvez ajouter 1 tel monstre depuis votre Deck à la place.<br />Vous ne pouvez activer qu'1 "Choc Plasma Supraconducteur" par tour.
  | de_text               = Aktiviere den folgenden Effekt, abhängig davon, wessen Spielzug es ist;<br />● Dein: Lege 1 Donner- oder Fels-Monster von deinem Deck auf dein Deck, dann, falls du ein Donner- oder Fels-Monster auf deiner Spielfeldseite oder in deinem Friedhof hast, kannst du 1 Karte auf dem Spielfeld zerstören.<br />● Gegners: Füge deiner Hand 1 Donner- oder Fels-Monster von deiner Spielfeldseite, deinem Friedhof oder deinen verbannten Karten hinzu oder falls in diesem Spielzug ein oder mehr Monster durch Kampf oder einen Karteneffekt zerstört wurden, kannst du stattdessen 1 solches Monster von deinem Deck hinzufügen.<br />Du kannst nur 1 „Superleitender Plasmaknall“ pro Spielzug aktivieren.
  | it_text               = Attiva il seguente effetto a seconda di che turno si sta giocando;<br />● Tuo: Metti 1 mostro Tuono o Roccia dal tuo Deck in cima al tuo Deck, poi se hai un mostro Tuono o Roccia nel tuo Terreno o Cimitero, puoi distruggere 1 carta sul Terreno.<br />● Avversario: Aggiungi 1 mostro Tuono o Roccia dal tuo Terreno, Cimitero o carte bandite alla tua mano o, se uno o più mostri sono stati distrutti in battaglia o dall'effetto di una carta in questo turno, puoi invece aggiungere 1 tale mostro dal tuo Deck.<br />Puoi attivare solo 1 "Esplosione di Plasma Superconduttivo" per turno.
  | pt_text               = Ative o seguinte efeito dependendo de quem é o turno;<br />● Seu: Coloque 1 monstro Trovão ou Rocha do seu Deck no topo do seu Deck e, depois, se você tiver um monstro Trovão ou Rocha no seu campo ou Cemitério, você pode destruir 1 card no campo.<br />● Oponente: Adicione 1 monstro Trovão ou Rocha do seu campo, Cemitério ou banimento à sua mão, ou se um ou mais monstros foram destruídos em batalha ou por um efeito de card neste turno, em vez disso, você pode adicionar 1 desses monstros do seu Deck.<br />Você só pode ativar 1 "Explosão de Plasma Supercondutor" por turno.
  | es_text               = Activa el siguiente efecto dependiendo de quién sea el turno;<br />● Tuyo: Pon en la parte superior de tu Deck 1 monstruo Trueno o Roca en tu Deck y después, si tienes un monstruo Trueno o Roca en tu Campo o Cementerio, puedes destruir 1 carta en el Campo.<br />● De tu adversario: Añade a tu mano 1 monstruo Trueno o Roca en tu Campo, Cementerio o destierro o, si uno o más monstruos fueron destruidos en batalla o por el efecto de una carta este turno, puedes añadir 1 monstruo de ésos en tu Deck en su lugar.<br />Sólo puedes activar 1 "Estallido de Plasma Superconductivo" por turno.
  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。①：発動ターンによって以下の効果を発動できる。<br />●自分ターン：デッキから雷族・岩石族モンスター１体を選んでデッキの一番上に置く。自分のフィールドか墓地に雷族・岩石族モンスターのいずれかが存在する場合、さらにフィールドのカード１枚を破壊できる。<br />●相手ターン：自分のフィールド・墓地・除外状態の雷族・岩石族モンスター１体を手札に加える。このターンにモンスターが戦闘・効果で破壊されている場合、手札に加えるモンスターをデッキから選ぶ事もできる。
  | translated_text       = Activate the following effect depending on whose turn it is;<br />● Yours: Place 1 Thunder or Rock monster from your Deck on top of your Deck, then if you have a Thunder or Rock monster in your field or GY, you can destroy 1 card on the field.<br />● Opponent's: Add 1 Thunder or Rock monster from your field, GY or banishment to '''the''' hand, or if a monster(s) was destroyed by battle or card effect this turn, you can add 1 such monster from your Deck instead.<br />You can only activate 1 "Superconductive Plasma Blast" per turn.
