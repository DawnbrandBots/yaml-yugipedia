  | text                  = 1 "[[Aleister]]" [[monster]] + 1 [[DARK]] or [[WATER]] monster<br />While this card is in the [[Main Monster Zone]], your opponent's monsters cannot [[target]] monsters for [[attack]]s, except this one. While this card is in the [[Extra Monster Zone]], any monster sent to your opponent's [[GY]] is [[banish]]ed instead. You can banish this card from your GY, then target 1 [[Fusion Monster]] you [[control]]; it can [[attack directly]] this [[turn]]. You can only use this effect of "Invoked Oceanus" [[once per turn]].
  | fr_text               = 1 monstre "Aleister" + 1 monstre TÉNÈBRES ou EAU<br />Tant que cette carte est dans la Zone Monstre Main, les monstres de votre adversaire ne peuvent pas cibler de monstres (celui-ci exclu) avec une attaque. Tant que cette carte est dans la Zone Monstre Extra, les monstres envoyés au Cimetière de votre adversaire sont bannis à la place. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 Monstre Fusion que vous contrôlez ; ce tour, il peut attaquer directement. Vous ne pouvez utiliser cet effet de "Océanos l'Invokhé" qu'une fois par tour.
  | de_text               = 1 „Aleister“-Monster + 1 FINSTERNIS oder WASSER Monster<br />Solange diese Karte in der Main-Monsterzone liegt, können Monster deines Gegners keine Monster als Angriffsziel wählen, außer diesem. Solange diese Karte in der Extra-Monsterzone liegt, wird jedes Monster, das auf den Friedhof deines Gegners gelegt wird, stattdessen verbannt. Du kannst diese Karte von deinem Friedhof verbannen und dann 1 Fusionsmonster wählen, das du kontrollierst; es kann in diesem Spielzug direkt angreifen. Du kannst diesen Effekt von „Beschworener Okeanos“ nur einmal pro Spielzug verwenden.
  | it_text               = 1 mostro "Aleister" + 1 mostro OSCURITÀ o ACQUA<br />Mentre questa carta è nella Zona Mostri Main, i mostri del tuo avversario non possono scegliere come bersaglio mostri per gli attacchi, eccetto questo. Mentre questa carta è nella Zona Mostri Extra, qualsiasi mostro mandato al Cimitero del tuo avversario viene invece bandito. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 Mostro Fusione che controlli; esso può attaccare direttamente in questo turno. Puoi utilizzare questo effetto di "Oceanus Invokato" una sola volta per turno.
  | pt_text               = 1 monstro "Aleister" + 1 monstro de TREVAS ou de ÁGUA<br />Enquanto este card estiver na Zona de Monstros Principal, os monstros do seu oponente não podem escolher monstros como alvo de ataques, exceto este. Enquanto este card estiver na Zona de Monstros Adicional, qualquer monstro enviado para o Cemitério do seu oponente, em vez disso, é banido. Você pode banir este card do seu Cemitério e, depois, escolha 1 Monstro de Fusão que você controla; ele pode atacar diretamente neste turno. Você só pode usar este efeito de "Oceanus, o Invokado" uma vez por turno.
  | es_text               = 1 monstruo "Aleister" + 1 monstruo de OSCURIDAD o AGUA<br />Mientras esta carta está en la Zona de Monstruos Principal, los monstruos de tu adversario no pueden seleccionar monstruos para ataques, excepto éste. Mientras esta carta está en la Zona de Monstruos Extra, cualquier monstruo mandado al Cementerio de tu adversario es desterrado en su lugar. Puedes desterrar esta carta en tu Cementerio, y después selecciona 1 Monstruo de Fusión que controles; éste puede atacar directamente este turno. Sólo puedes usar este efecto de "Océano Invokado" una vez por turno.
  | ja_text               = 「アレイスター」モンスター＋闇・水属性モンスター<br />このカード名の③の効果は１ターンに１度しか使用できない。①：このカードがメインモンスターゾーンに存在する限り、相手モンスターは他のモンスターを攻撃対象に選択できない。②：このカードがＥＸモンスターゾーンに存在する限り、相手の墓地へ送られるモンスターは墓地へは行かず除外される。③：墓地のこのカードを除外し、自分フィールドの融合モンスター１体を対象として発動できる。このターン、そのモンスターは直接攻撃できる。
  | ko_text               = "알레이스터" 몬스터 ＋ 어둠 / 물 속성 몬스터<br />이 카드명의 ③의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 메인 몬스터 존에 존재하는 한, 상대 몬스터는 다른 몬스터를 공격 대상으로 선택할 수 없다. ②: 이 카드가 엑스트라 몬스터 존에 존재하는 한, 상대 묘지로 보내지는 몬스터는 묘지로는 가지 않으며 제외된다. ③: 묘지의 이 카드를 제외하고, 자신 필드의 융합 몬스터 1장을 대상으로 하여 발동할 수 있다. 이 턴에, 그 몬스터는 직접 공격할 수 있다.
  | sc_text               = “阿莱斯特”怪兽＋暗・水属性怪兽<br />此卡名的③效果1回合仅可使用1次。①：只要此卡存在于主要怪兽区域，对手怪兽不可将其他怪兽选择为攻击对象。②：只要此卡存在于额外怪兽区域，被送往对手墓地的怪兽不去墓地而直接被除外。③：将墓地的此卡除外，以自己场上的1只融合怪兽为对象可以发动。此回合，该怪兽可直接攻击。
