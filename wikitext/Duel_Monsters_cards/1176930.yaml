  | ja_pendulum_effect    = このカード名のＰ効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードを破壊し、手札・デッキから「星霜の魔術師－アストログラフ・マジシャン」以外のＰスケールが１のＰモンスター１体を自分のＰゾーンに置く。この効果で置いたカードのＰ効果はこのターン発動できない。
  | ja_text               = このカード名の①②のモンスター効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドの表側表示のモンスターカードが戦闘・効果で破壊された場合に発動できる。このカードを手札から特殊召喚する。その後、その破壊されたモンスターの内１体を自分のＥＸデッキ（表側）・墓地から特殊召喚できる。②：自分・相手のメインフェイズに発動できる。このカードをリリースする。その後、自分のＥＸデッキ（表側）・フィールドのモンスターを融合素材としてデッキに戻し、ドラゴン族の融合モンスター１体を融合召喚できる。
  | ko_pendulum_effect    = 이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 이 카드를 파괴하고, 패 / 덱에서 "성상의 마술사－아스트로그래프 매지션" 이외의 펜듈럼 스케일이 1 인 펜듈럼 몬스터 1장을 자신의 펜듈럼 존에 놓는다. 이 효과로 놓은 카드의 펜듈럼 효과는 이 턴에 발동할 수 없다.
  | ko_text               = 이 카드명의 ①②의 몬스터 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드의 앞면 표시 몬스터 카드가 전투 / 효과로 파괴되었을 경우에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 그 후, 그 파괴된 몬스터 중 1장을 자신의 엑스트라 덱(앞면) / 묘지에서 특수 소환할 수 있다. ②: 자신 / 상대의 메인 페이즈에 발동할 수 있다. 이 카드를 릴리스한다. 그 후, 자신의 엑스트라 덱(앞면) / 필드의 몬스터를 융합 소재로서 덱으로 되돌리고, 드래곤족인 융합 몬스터 1장을 융합 소환할 수 있다.
  | sc_pendulum_effect    = 此卡名的灵摆效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将此卡破坏，从手牌・牌组将“星霜的魔术师－宙读阵魔术士”以外的、1只灵摆刻度为1的灵摆怪兽放在自己的灵摆区域。以此效果所放的卡的灵摆效果此回合不可发动。
  | sc_text               = 此卡名的①②怪兽效果1回合仅可各使用1次。①：自己场上的表侧表示怪兽卡因战斗・效果被破坏的情况下可以发动。从手牌将此卡特殊召唤。然后，可从自己额外牌组（表侧）・墓地将该被破坏的怪兽中的1只特殊召唤。②：在自己・对手的主要阶段可以发动。解放此卡。然后，可将自己额外牌组（表侧）・场上的怪兽作为融合素材放回牌组，将1只龙族融合怪兽融合召唤。
