  | text                  = If a [[face-up]] [[Monster Card]](s) you [[control]] is [[destroyed by battle]] or card [[effect]]: You can [[Special Summon]] this card from your [[hand]], then you can Special Summon 1 of those destroyed monsters from your [[GY]] or face-up [[Extra Deck]]. During the [[Main Phase]] ([[Quick Effect]]): You can [[Tribute]] this card, then you can [[Fusion Summon]] 1 [[Dragon]] [[Fusion Monster]] from your Extra Deck, by shuffling its materials from your [[field]] and/or face-up Extra Deck into the [[Main Deck|Deck]]. You can only use each effect of "Astrograph Sorcerer, the Starfrost Magician" once per turn.
