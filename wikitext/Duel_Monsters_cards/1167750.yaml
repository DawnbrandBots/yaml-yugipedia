  | pendulum_effect       = If a "[[Power Patron]]" or "[[Elfnote]]" [[monster]](s) is [[Special Summon]]ed to your [[field]], while this card is in your [[Pendulum Zone]] (except during the [[Damage Step]]): You can [[destroy]] this card, and if you do, [[Draw a card|draw]] 2 cards, then [[discard]] 1 card. You can only use this [[effect]] of "Junoldo the Shadespirit Power Patron" [[once per turn]].
  | text                  = (This card is always treated as an "[[Elfnote]]" card.)<br />You can [[banish]] the top 3 cards of your [[Main Deck|Deck]], [[face-down]]; [[destroy]] this card, and if you do, [[Special Summon]] 1 "[[Junora the Power Patron of Tuning]]" from your [[Extra Deck]] (this is treated as a [[Synchro Summon]]). If this card is added to your Extra Deck [[face-up]]: You can add 1 "[[Power Patron]]" or "Elfnote" card from your face-up Extra Deck or [[GY]] to your [[hand]], except "Junoldo the Shadespirit Power Patron". You can only use each [[effect]] of "Junoldo the Shadespirit Power Patron" [[once per turn]].
  | fr_pendulum_effect    = Si un ou plusieurs monstres "Mécène du Pouvoir" ou "Notes Elfiques" sont Invoqués Spécialement sur votre Terrain, tant que cette carte est dans votre Zone Pendule (sauf durant la Damage Step) : vous pouvez détruire cette carte, et si vous le faites, piochez 2 cartes, puis défaussez 1 carte. Vous ne pouvez utiliser cet effet de "Junoldo le Mécène du Pouvoir de l'Esprit Obscur" qu'une fois par tour.
  | fr_text               = (Cette carte est toujours traitée comme carte "Notes Elfiques".)<br />Vous pouvez bannir face verso les 3 cartes du dessus de votre Deck ; détruisez cette carte, et si vous le faites, Invoquez Spécialement 1 "Junora le Mécène du Pouvoir de l'Accordage" depuis votre Extra Deck (ceci est traité comme Invocation Synchro). Si cette carte est ajoutée face recto à votre Extra Deck : vous pouvez ajouter 1 carte "Mécène du Pouvoir" ("Junoldo le Mécène du Pouvoir de l'Esprit Obscur" exclu) ou "Notes Elfiques" depuis votre Extra Deck face recto ou Cimetière à votre main. Vous ne pouvez utiliser chaque effet de "Junoldo le Mécène du Pouvoir de l'Esprit Obscur" qu'une fois par tour.
  | de_pendulum_effect    = Falls ein oder mehr „Machtpatron“- oder „Elfnote“-Monster als Spezialbeschwörung auf deine Spielfeldseite beschworen werden, solange diese Karte in deiner Pendelzone liegt (außer während des Damage Steps): Du kannst diese Karte zerstören und falls du dies tust, ziehe 2 Karten, dann wirf 1 Karte ab. Du kannst diesen Effekt von „Junoldo der Schattengeist-Machtpatron“ nur einmal pro Spielzug verwenden.
  | de_text               = (Diese Karte wird immer als „Elfnote“-Karte behandelt.)<br />Du kannst die obersten 3 Karten deines Decks verdeckt verbannen; zerstöre diese Karte und falls du dies tust, beschwöre 1 „Junora der Machtpatron der Abstimmung“ als Spezialbeschwörung von deinem Extra Deck (dies wird als Synchrobeschwörung behandelt). Falls diese Karte deinem Extra Deck offen hinzugefügt wird: Du kannst deiner Hand 1 „Machtpatron“- oder „Elfnote“-Karte offen von deinem Extra Deck oder von deinem Friedhof hinzufügen, außer „Junoldo der Schattengeist-Machtpatron“. Du kannst jeden Effekt von „Junoldo der Schattengeist-Machtpatron“ nur einmal pro Spielzug verwenden.
  | it_pendulum_effect    = Se uno o più mostri "Patrono Potente" o "Elfnote" vengono Evocati Specialmente sul tuo Terreno, mentre questa carta è nella tua Zona Pendulum (eccetto durante il Damage Step): puoi distruggere questa carta e, se lo fai, pesca 2 carte, poi scarta 1 carta. Puoi utilizzare questo effetto di "Junoldo l'Ombraspirito Patrono Potente" una sola volta per turno.
  | it_text               = (Questa carta viene sempre considerata come una carta "Elfnote".)<br />Puoi bandire le prime 3 carte del tuo Deck, coperte; distruggi questa carta e, se lo fai, Evoca Specialmente 1 "Junora il Patrono Potente della Sintonizzazione" dal tuo Extra Deck (questa viene considerata come una Synchro Evocazione). Se questa carta viene aggiunta al tuo Extra Deck scoperta: puoi aggiungere 1 carta "Patrono Potente" o "Elfnote" dal tuo Extra Deck scoperto o Cimitero alla tua mano, eccetto "Junoldo l'Ombraspirito Patrono Potente". Puoi utilizzare ogni effetto di "Junoldo l'Ombraspirito Patrono Potente" una sola volta per turno.
  | pt_pendulum_effect    = Se um ou mais monstros "Patrono(a) do Poder" ou "Elfnota" forem Invocados por Invocação-Especial no seu campo, enquanto este card estiver na sua Zona de Pêndulo (exceto durante a Etapa de Dano): você pode destruir este card e, se isso acontecer, compre 2 cards e, depois, descarte 1 card. Você só pode usar este efeito de "Junoldo, o Patrono do Poder Espírito Sombrio" uma vez por turno.
  | pt_text               = (Este card deve ser sempre considerado como um card "Elfnota".)<br />Você pode banir os 3 cards do topo do seu Deck, com a face para baixo; destrua este card e, se isso acontecer, Invoque por Invocação-Especial 1 "Junora, o Patrono do Poder da Afinação" do seu Deck Adicional (isso é considerado uma Invocação-Sincro). Se este card for adicionado ao seu Deck Adicional com a face para cima: você pode adicionar 1 card "Patrono(a) do Poder" ou "Elfnota" do seu Deck Adicional com a face para cima ou Cemitério à sua mão, exceto "Junoldo, o Patrono do Poder Espírito Sombrio". Você só pode usar cada efeito de "Junoldo, o Patrono do Poder Espírito Sombrio" uma vez por turno.
  | es_pendulum_effect    = Si uno o más monstruos "Modelo de Poder" o "Elfnota" son Invocados de Modo Especial a tu Campo, mientras esta carta está en tu Zona de Péndulo (excepto durante el Damage Step): puedes destruir esta carta y, si lo haces, roba 2 cartas, y después descarta 1 carta. Sólo puedes usar este efecto de "Junoldo el Espíritu Sombra Modelo de Poder" una vez por turno.
  | es_text               = (Esta carta se trata siempre como una carta "Elfnota").<br />Puedes desterrar las 3 cartas de la parte superior de tu Deck, boca abajo; destruye esta carta y, si lo haces, Invoca de Modo Especial 1 "Junora el Modelo de Poder de Afinación" desde tu Deck Extra (esto se trata como una Invocación por Sincronía). Si esta carta es añadida a tu Deck Extra boca arriba: puedes añadir a tu mano 1 carta "Modelo de Poder" o "Elfnota" en tu Deck Extra boca arriba o Cementerio, excepto "Junoldo el Espíritu Sombra Modelo de Poder". Sólo puedes usar cada efecto de "Junoldo el Espíritu Sombra Modelo de Poder" una vez por turno.
  | ja_pendulum_effect    = このカード名のＰ効果は１ターンに１度しか使用できない。①：このカードがＰゾーンに存在する状態で、自分フィールドに「獄神」モンスターか「エルフェンノーツ」モンスターが特殊召喚された場合に発動できる。このカードを破壊し、自分は２枚ドローする。その後、自分の手札を１枚選んで捨てる。
  | ja_text               = このカード名はルール上「エルフェンノーツ」カードとしても扱う。このカード名の①②のモンスター効果はそれぞれ１ターンに１度しか使用できない。①：デッキの上からカード３枚を裏側で除外して発動できる。このカードを破壊し、ＥＸデッキから「調獄神ジュノーラ」１体をＳ召喚扱いで特殊召喚する。②：このカードがＥＸデッキに表側で加わった場合に発動できる。「獄神影精－ジュノルド」を除く、「獄神」カードか「エルフェンノーツ」カード１枚を自分のＥＸデッキ（表側）・墓地から手札に加える。
  | ko_pendulum_effect    = 이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 펜듈럼 존에 존재하는 상태에서, 자신 필드에 "감옥신" 몬스터나 "엘펜노츠" 몬스터가 특수 소환되었을 경우에 발동할 수 있다. 이 카드를 파괴하고, 자신은 2장 드로우한다. 그 후, 자신의 패를 1장 고르고 버린다.
  | ko_text               = 이 카드명은 룰상 "엘펜노츠" 카드로도 취급한다. 이 카드명의 ①②의 몬스터 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱 위에서 카드 3장을 뒷면으로 제외하고 발동할 수 있다. 이 카드를 파괴하고, 엑스트라 덱에서 "조감옥신 쥬노라" 1장을 싱크로 소환으로 취급하여 특수 소환한다. ②: 이 카드가 엑스트라 덱에 앞면으로 넣어졌을 경우에 발동할 수 있다. "감옥신영정－쥬노르도"가 아닌, "감옥신" 카드나 "엘펜노츠" 카드 1장을 자신의 엑스트라 덱(앞면) / 묘지에서 패에 넣는다.
  | sc_pendulum_effect    = 此卡名的灵摆效果1回合仅可使用1次。①：此卡存在于灵摆区域的状态下，有“狱神”怪兽或“耀圣”怪兽被特殊召唤至自己场上的情况下可以发动。将此卡破坏，自己抽2张。然后，挑选自己的1张手牌舍弃。
  | sc_text               = 此卡名在规则上也视为“耀圣”卡。此卡名的①②怪兽效果1回合仅可各使用1次。①：从牌组上面将3张卡以里侧除外可以发动。将此卡破坏，从额外牌组将1只“调狱神 朱诺拉”视为同步召唤特殊召唤。②：此卡以表侧加入额外牌组的情况下可以发动。从自己额外牌组（表侧）・墓地将除“狱神影精－朱诺璐多”以外的1张“狱神”卡或“耀圣”卡加入手牌。
