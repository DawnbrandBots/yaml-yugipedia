  | text                  = When this card is [[activate]]d: You can [[Add a card|add]] 1 "[[Fairy Tail]]" [[monster]] or 1 "[[Fairy Tale Tails]]" from your [[Main Deck|Deck]] or [[banish]]ment to your [[hand]]. Your "Fairy Tail" monsters can attack directly. [[Once per turn]], if your opponent [[Special Summon]]s a monster(s) and you [[control]] a "Fairy Tail" monster (except during the [[Damage Step]]): You can [[target]] 1 [[Effect Monster]] your opponent controls; [[negate]] its effects, also its name becomes "[[Prince of Fairies]]". You can only activate 1 "Fairy Tail Ball" per turn.
  | fr_text               = Lorsque cette carte est activée : vous pouvez ajouter 1 monstre "Animal Féérique" ou 1 "Conte de Fées des Animaux" depuis votre Deck ou bannissement à votre main. Vos monstres "Animal Féérique" peuvent attaquer directement. Une fois par tour, si votre adversaire Invoque Spécialement un ou plusieurs monstres et que vous contrôlez un monstre "Animal Féérique" (sauf durant la Damage Step) : vous pouvez cibler 1 Monstre à Effet contrôlé par votre adversaire ; annulez ses effets, et aussi, son nom devient "Prince des Fées". Vous ne pouvez activer qu'1 "Bal de l'Animal Féérique" par tour.
  | de_text               = Wenn diese Karte aktiviert wird: Du kannst deiner Hand 1 „Märchenschweif“-Monster oder 1 „Märchen-Schweife“ von deinem Deck oder deinen verbannten Karten hinzufügen. Deine „Märchenschweif“-Monster können direkt angreifen. Einmal pro Spielzug, falls dein Gegner ein oder mehr Monster als Spezialbeschwörung beschwört und du ein „Märchenschweif“-Monster kontrollierst (außer während des Damage Steps): Du kannst 1 Effektmonster wählen, das dein Gegner kontrolliert; annulliere seine Effekte, zusätzlich wird sein Name zu „Prinz der Feen“. Du kannst nur 1 „Märchenschweif-Ball“ pro Spielzug aktivieren.
  | it_text               = Quando questa carta viene attivata: puoi aggiungere 1 mostro "Codafavola" o 1 "Code Favola" dal tuo Deck o carte bandite alla tua mano. I tuoi mostri "Codafavola" possono attaccare direttamente. Una volta per turno, se il tuo avversario Evoca Specialmente uno o più mostri e tu controlli un mostro "Codafavola" (eccetto durante il Damage Step): puoi scegliere come bersaglio 1 Mostro con Effetto controllato dal tuo avversario; annulla i suoi effetti, inoltre il suo nome diventa "Principe delle Fate". Puoi attivare solo 1 "Ballo Codafavola" per turno.
  | pt_text               = Quando este card for ativado: você pode adicionar 1 monstro "Cauda de Fadas" ou 1 "Conto de Fadas de Caudas" do seu Deck ou banimento à sua mão. Seus monstros "Cauda de Fadas" podem atacar diretamente. Uma vez por turno, se seu oponente Invocar um ou mais monstros por Invocação-Especial e você controlar um monstro "Cauda de Fadas" (exceto durante a Etapa de Dano): você pode escolher 1 Monstro de Efeito que seu oponente controla; negue seus efeitos e, além disso, o nome dele se torna "Príncipe das Fadas". Você só pode ativar 1 "Baile da Cauda de Fadas" por turno.
  | es_text               = Cuando esta carta es activada: puedes añadir a tu mano 1 monstruo "Colacuento" o 1 "Cuentos con Cola" en tu Deck o destierro. Tus monstruos "Colacuento" pueden atacar directamente. Una vez por turno, si tu adversario Invoca de Modo Especial uno o más monstruos y tú controlas un monstruo "Colacuento" (excepto durante el Damage Step): puedes seleccionar 1 Monstruo de Efecto que controle tu adversario; niega sus efectos, y además su nombre se convierte en "Príncipe de las Hadas". Sólo puedes activar 1 "Baile Colacuento" por turno.
  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。①：このカードの発動時の効果処理として、自分のデッキ・除外状態の「妖精伝姫」モンスター１体か「妖精の伝姫」１枚を手札に加える事ができる。②：自分の「妖精伝姫」モンスターは直接攻撃できる。③：１ターンに１度、相手がモンスターを特殊召喚した場合、自分フィールドに「妖精伝姫」モンスターが存在していれば、相手フィールドの効果モンスター１体を対象として発動できる。そのモンスターの効果は無効化され、カード名を「妖精の王子様」として扱う。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이 카드의 발동시의 효과 처리로서, 자신의 덱 / 제외 상태인 "페어리테일" 몬스터 1장이나 "페어리 테일" 1장을 패에 넣을 수 있다. ②: 자신의 "페어리테일" 몬스터는 직접 공격할 수 있다. ③: 1턴에 1번, 상대가 몬스터를 특수 소환했을 경우, 자신 필드에 "페어리테일" 몬스터가 존재하고 있으면, 상대 필드의 효과 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 효과는 무효화되고, 카드명을 "요정의 왕자님"으로 취급한다.
  | sc_text               = 此卡名的卡1回合仅可发动1张。①：作为此卡发动时的效果处理，可将自己牌组・除外状态的1只“妖精传姬”怪兽或1张“妖精之传姬”加入手牌。②：自己的“妖精传姬”怪兽可直接攻击。③：1回合1次，对手将怪兽特殊召唤的情况下，如果自己场上存在“妖精传姬”怪兽，则以对手场上的1只效果怪兽为对象可以发动。将该怪兽的效果无效化，卡名视为“妖精的王子大人”。
