  | text                  = [[FLIP]]: If it is the [[Main Phase]]: Apply these [[effect]]s in sequence.<br />● Your opponent can [[Add a card|add]] 1 [[Flip monster]] or 1 "[[Mimighoul]]" card from their [[Main Deck|Deck]] to their [[hand]].<br />● Give [[control]] of this card to your opponent.<br />During your Main Phase: You can [[Special Summon]] this card from your hand to your opponent's [[field]] in [[face-down]] [[Defense Position]], or if a face-down monster is on the field, you can Special Summon this card [[face-up]] on your field. You can only use each effect of "Mimighoul Flower" once per turn.
  | fr_text               = FLIP : Si c'est la Main Phase : appliquez ces effets dans l'ordre.<br />● Votre adversaire peut ajouter 1 monstre Flip ou 1 carte "Mimigoule" depuis son Deck à sa main.<br />● Donnez le contrôle de cette carte à votre adversaire.<br />Durant votre Main Phase : vous pouvez Invoquer Spécialement cette carte depuis votre main sur le Terrain de votre adversaire en Position de Défense face verso, ou si un monstre face verso est sur le Terrain, vous pouvez Invoquer Spécialement face recto cette carte sur votre Terrain. Vous ne pouvez utiliser chaque effet de "Fleur Mimigoule" qu'une fois par tour.
  | de_text               = FLIPP: Falls es die Main Phase ist: Führe nacheinander diese Effekte aus.<br />● Dein Gegner kann seiner Hand 1 Flippmonster oder 1 „Mimighul“-Karte von seinem Deck hinzufügen.<br />● Übergib die Kontrolle über diese Karte an deinen Gegner.<br />Während deiner Main Phase: Du kannst diese Karte als Spezialbeschwörung von deiner Hand auf die Spielfeldseite deines Gegners in die verdeckte Verteidigungsposition beschwören oder falls ein verdecktes Monster auf dem Spielfeld liegt, kannst du diese Karte als Spezialbeschwörung offen auf deine Spielfeldseite beschwören. Du kannst jeden Effekt von „Mimighul Blume“ nur einmal pro Spielzug verwenden.
  | it_text               = SCOPRI: Se è la Main Phase: applica questi effetti in ordine.<br />● Il tuo avversario può aggiungere 1 mostro Scoperta o 1 carta "Mimighoul" dal suo Deck alla sua mano.<br />● Dai il controllo di questa carta al tuo avversario.<br />Durante la tua Main Phase: puoi Evocare Specialmente questa carta dalla tua mano sul Terreno del tuo avversario coperta in Posizione di Difesa o, se un mostro coperto è sul Terreno, puoi Evocare Specialmente questa carta scoperta sul tuo Terreno. Puoi utilizzare ogni effetto di "Mimighoul Fiore" una sola volta per turno.
  | pt_text               = VIRE: Se for a Fase Principal: aplique esses efeitos em sequência.<br />● Seu oponente pode adicionar 1 monstro de Virar ou 1 card "Mimicarniçal" do Deck dele à mão dele.<br />● Conceda o controle deste card ao seu oponente.<br />Durante sua Fase Principal: você pode Invocar este card por Invocação-Especial da sua mão no campo do seu oponente com a face para baixo em Posição de Defesa, ou se um monstro com a face para baixo estiver no campo, você pode Invocar este card por Invocação-Especial com a face para cima no seu campo. Você só pode usar cada efeito de "Flor Mimicarniçal" uma vez por turno.
  | es_text               = VOLTEO: Si es la Main Phase: aplica estos efectos en secuencia.<br />● Tu adversario puede añadir a su mano 1 monstruo de Volteo o 1 carta "Mimighoul" en su Deck.<br />● Da el control de esta carta a tu adversario.<br />Durante tu Main Phase: puedes Invocar esta carta de Modo Especial desde tu mano al Campo de tu adversario en Posición de Defensa boca abajo o, si hay un monstruo boca abajo en el Campo, puedes Invocar esta carta de Modo Especial boca arriba a tu Campo. Sólo puedes usar cada efecto de "Flor Mimighoul" una vez por turno.
  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードを手札から相手フィールドに裏側守備表示で特殊召喚する。フィールドに裏側表示モンスターが存在する場合、代わりに自分フィールドに表側表示で特殊召喚する事もできる。②：このカードがメインフェイズにリバースした場合に発動する。以下の効果をそれぞれ適用する。●相手は自身のデッキからリバースモンスター１体か「ミミグル」カード１枚を手札に加える事ができる。●このカードのコントロールを相手に移す。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 이 카드를 패에서 상대 필드에 뒷면 수비 표시로 특수 소환한다. 필드에 뒷면 표시 몬스터가 존재할 경우, 대신에 자신 필드에 앞면 표시로 특수 소환할 수도 있다. ②: 이 카드가 메인 페이즈에 리버스했을 경우에 발동한다. 이하의 효과를 각각 적용한다. ●상대는 자신의 덱에서 리버스 몬스터 1장이나 "미미구르" 카드 1장을 패에 넣을 수 있다. ●이 카드의 컨트롤을 상대에게 옮긴다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：在自己的主要阶段可以发动。从手牌将此卡以里侧守备表示特殊召唤至对手场上。场上存在里侧表示怪兽的情况下，作为代替也可以表侧表示特殊召唤至自己场上。②：此卡在主要阶段反转的情况下发动。分别适用以下效果。<br />●对手可从自身牌组将1只反转怪兽或1张“迷拟宝箱鬼”卡加入手牌。<br />●将此卡的控制权转移给对手。
