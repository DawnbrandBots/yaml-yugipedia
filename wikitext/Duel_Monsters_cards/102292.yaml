  | text                = Cannot be [[Normal Summon]]ed/[[Normal Set|Set]]. Must be [[Special Summon]]ed (from your [[hand]]) by [[control]]ling 2 or more "[[X-Saber]]" [[Monster Card|monsters]]. [[Once per turn]]: You can [[target]] 1 [[Level]] 4 or lower "X-Saber" monster in your [[GY]]; Special Summon it.
  | fr_text             = Ni Invocable Normalement ni Posable Normalement. Uniquement Invocable Spécialement (depuis votre main) en contrôlant min. 2 monstres "Sabre X". Une fois par tour : vous pouvez cibler 1 monstre "Sabre X" de max. Niveau 4 dans votre Cimetière ; Invoquez-le Spécialement.
  | de_text             = Kann nicht als Normalbeschwörung beschworen/gesetzt werden. Muss als Spezialbeschwörung (von deiner Hand) beschworen werden, indem du 2 oder mehr „X-Säbel“-Monster kontrollierst. Einmal pro Spielzug: Du kannst 1 „X-Säbel“-Monster der Stufe 4 oder niedriger in deinem Friedhof wählen; beschwöre es als Spezialbeschwörung.
  | it_text             = Non può essere Evocato Normalmente/Posizionato. Deve essere Evocato Specialmente (dalla tua mano) controllando 2 o più mostri "Sciabola-X". Una volta per turno: puoi scegliere come bersaglio 1 mostro "Sciabola-X" di Livello 4 o inferiore nel tuo Cimitero; Evocalo Specialmente.
  | pt_text             = Não pode ser Invocado por Invocação-Normal/Baixado. Deve ser Invocado por Invocação-Especial (da sua mão) ao controlar 2 ou mais monstros "Sabre-X". Uma vez por turno: você pode escolher 1 monstro "Sabre-X" de Nível 4 ou menos no seu Cemitério; Invoque-o por Invocação-Especial.
  | es_text             = No puede ser Invocado de Modo Normal/Colocado. Debe ser Invocado de Modo Especial (desde tu mano) controlando 2 o más monstruos "Sable-X". Una vez por turno: puedes seleccionar 1 monstruo "Sable-X" de Nivel 4 o menor en tu Cementerio; Invócalo de Modo Especial.
  | ja_text             = このカードは通常召喚できない。自分フィールドに「Ｘ－セイバー」モンスターが２体以上存在する場合のみ特殊召喚できる。①：１ターンに１度、自分の墓地のレベル４以下の「Ｘ－セイバー」モンスター１体を対象として発動できる。そのモンスターを特殊召喚する。
  | ko_text             = 이 카드는 통상 소환할 수 없다. 자신 필드에 "X－세이버" 몬스터가 2장 이상 존재할 경우에만 특수 소환할 수 있다. ①: 1턴에 1번, 자신 묘지의 레벨 4 이하의 "X－세이버" 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 특수 소환한다.
  | sc_text             = 此卡不可通常召唤。仅可在自己场上存在2只以上“X－军刀”怪兽的情况下特殊召唤。①：1回合1次，以自己墓地的1只等级4以下的“X－军刀”怪兽为对象可以发动。将该怪兽特殊召唤。
