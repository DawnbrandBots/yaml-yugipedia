  | text                  = 2 [[Level]] 4 [[Machine]] [[monsters]]<br />If this card is [[Special Summon]]ed: You can change all monsters your opponent [[control]]s to [[Attack Position]]. If your opponent has a monster in their [[field]] or [[GY]]: You can [[detach]] 1 [[material]] from this card; [[send]] 1 Machine monster from your [[Main Deck|Deck]]/[[Extra Deck]] to the GY, then you can apply this [[effect]].<br />● Choose 1 Machine [[Xyz Monster]] in your GY, and this card's name becomes that monster's name until the [[End Phase]].<br />You can only use this effect of "Gaming Gamer GG" once per turn.
  | fr_text               = 2 monstres Machine de Niveau 4<br />Si cette carte est Invoquée Spécialement : vous pouvez changer tous les monstres contrôlés par votre adversaire en Position d'Attaque. Si votre adversaire a un monstre dans son Terrain ou Cimetière : vous pouvez détacher 1 Matériel de cette carte ; envoyez 1 monstre Machine depuis votre Deck/Extra Deck au Cimetière, puis vous pouvez appliquer cet effet.<br />● Choisissez 1 Monstre Xyz Machine dans votre Cimetière, et le nom de cette carte devient le nom du monstre jusqu'à la End Phase.<br />Vous ne pouvez utiliser cet effet de "Joueur de Jeux GG" qu'une fois par tour.
  | de_text               = 2 Maschine-Monster der Stufe 4<br />Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst alle Monster, die dein Gegner kontrolliert, in die Angriffsposition ändern. Falls dein Gegner ein Monster auf seiner Spielfeldseite oder in seinem Friedhof hat: Du kannst 1 Material von dieser Karte abhängen; lege 1 Maschine-Monster von deinem Deck / Extra Deck auf den Friedhof, dann kannst du diesen Effekt ausführen.<br />● Bestimme 1 Maschine-Xyz-Monster in deinem Friedhof und der Name dieser Karte wird bis zur End Phase derselbe wie der Name jenes Monsters.<br />Du kannst diesen Effekt von „Spielender Spieler GG“ nur einmal pro Spielzug verwenden.
  | it_text               = 2 mostri Macchina di Livello 4<br />Se questa carta viene Evocata Specialmente: puoi mettere in Posizione di Attacco tutti i mostri controllati dal tuo avversario. Se il tuo avversario ha un mostro nel suo Terreno o Cimitero: puoi staccare 1 materiale da questa carta; manda 1 mostro Macchina dal tuo Deck/Extra Deck al Cimitero, poi puoi applicare questo effetto.<br />● Seleziona 1 Mostro Xyz Macchina nel tuo Cimitero e il nome di questa carta diventa il nome di quel mostro fino alla End Phase.<br />Puoi utilizzare questo effetto di "Giocatore Giocante GG" una sola volta per turno.
  | pt_text               = 2 monstros Máquina de Nível 4<br />Se este card for Invocado por Invocação-Especial: você pode colocar todos os monstros que seu oponente controla em Posição de Ataque. Se seu oponente tiver um monstro no campo ou Cemitério dele: você pode desassociar 1 matéria deste card; envie para o Cemitério 1 monstro Máquina do seu Deck/Deck Adicional e, depois, você pode aplicar este efeito.<br />● Selecione 1 Monstro Xyz Máquina no seu Cemitério e o nome deste card se torna o nome desse monstro até a Fase Final.<br />Você só pode usar este efeito de "Jogador de Jogos GG" uma vez por turno.
  | es_text               = 2 monstruos Máquina de Nivel 4<br />Si esta carta es Invocada de Modo Especial: puedes cambiar todos los monstruos que controla tu adversario a Posición de Ataque. Si tu adversario tiene un monstruo en su Campo o Cementerio: puedes desacoplar 1 material de esta carta; manda al Cementerio 1 monstruo Máquina en tu Deck/Deck Extra, y después puedes aplicar este efecto.<br />● Elige 1 Monstruo Xyz Máquina en tu Cementerio, y el nombre de esta carta se convierte en el nombre de ese monstruo hasta la End Phase.<br />Sólo puedes usar este efecto de "Gaming Gestionado GG" una vez por turno.
