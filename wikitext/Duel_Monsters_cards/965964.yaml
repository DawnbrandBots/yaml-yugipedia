  | sc_text               = “梅尔菲”怪兽＋兽族怪兽<br />此卡名的①②效果1回合仅可各使用1次。①：此卡融合召唤的情况下，以相同数量的、自己场上的“梅尔菲”卡及对手场上的卡为对象可以发动。将该卡放回手牌。②：对手将怪兽召唤・特殊召唤的情况下，或此卡被选择为对手怪兽的攻击对象的情况下，以自己墓地的1只兽族怪兽为对象可以发动。此卡的等级下降2，将对象怪兽特殊召唤。
