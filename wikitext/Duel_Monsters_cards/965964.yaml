  | text                  = 1 "[[Melffy]]" [[monster]] + 1 [[Beast]] monster<br />If this card is [[Fusion Summon]]ed: You can [[target]] an equal number of "Melffy" cards you [[control]] and cards your opponent controls; [[return]] them to the [[hand]]. If your opponent [[Normal Summon|Normal]] or [[Special Summon]]s a monster(s) (except during the [[Damage Step]]), or if an opponent's monster [[target]]s this card for an [[attack]]: You can target 1 Beast monster in your [[GY]]; reduce this card's [[Level]] by exactly 2, and if you do, Special Summon that target. You can only use each [[effect]] of "Melffys' Joyful Surprise" [[once per turn]].
  | fr_text               = 1 monstre "Melffy" + 1 monstre Bête<br />Si cette carte est Invoquée par Fusion : vous pouvez cibler un nombre égal de cartes "Melffy" que vous contrôlez et de cartes contrôlées par votre adversaire ; renvoyez-les à la main. Si votre adversaire Invoque Normalement ou Spécialement un ou plusieurs monstres (sauf durant la Damage Step), ou si un monstre de l'adversaire cible cette carte avec une attaque : vous pouvez cibler 1 monstre Bête dans votre Cimetière ; réduisez le Niveau de cette carte d'exactement 2, et si vous le faites, Invoquez Spécialement la cible. Vous ne pouvez utiliser chaque effet de "Joyeuse Surprise des Melffys" qu'une fois par tour.
  | de_text               = 1 „Melffy“-Monster + 1 Ungeheuer-Monster<br />Falls diese Karte als Fusionsbeschwörung beschworen wird: Du kannst dieselbe Anzahl „Melffy“-Karten, die du kontrollierst, und Karten, die dein Gegner kontrolliert, wählen; gib sie auf die Hand zurück. Falls dein Gegner ein oder mehr Monster als Normal- oder Spezialbeschwörung beschwört (außer während des Damage Steps) oder falls ein Monster eines Gegners diese Karte als Angriffsziel wählt: Du kannst 1 Ungeheuer-Monster in deinem Friedhof wählen; verringere die Stufe dieser Karte um genau 2 und falls du dies tust, beschwöre jenes gewählte Ziel als Spezialbeschwörung. Du kannst jeden Effekt von „Freudige Überraschung der Melffys“ nur einmal pro Spielzug verwenden.
  | it_text               = 1 mostro "Melffy" + 1 mostro Bestia<br />Se questa carta viene Evocata tramite Fusione: puoi scegliere come bersaglio un pari numero di carte "Melffy" che controlli e carte controllate dal tuo avversario; falle ritornare nella mano. Se il tuo avversario Evoca Normalmente o Specialmente uno o più mostri (eccetto durante il Damage Step), o se un mostro dell'avversario sceglie questa carta come bersaglio per un attacco: puoi scegliere come bersaglio 1 mostro Bestia nel tuo Cimitero; riduci il Livello di questa carta esattamente di 2 e, se lo fai, Evoca Specialmente quel bersaglio. Puoi utilizzare ogni effetto di "Sorpresa Gioiosa dei Melffy" una sola volta per turno.
  | pt_text               = 1 monstro "Melffy" + 1 monstro Besta<br />Se este card for Invocado por Invocação-Fusão: você pode escolher um mesmo número de cards "Melffy" que você controla e cards que seu oponente controla; devolva-os para a mão. Se seu oponente Invocar um ou mais monstros por Invocação-Normal ou Especial (exceto durante a Etapa de Dano), ou se um monstro do oponente escolher este card como alvo de um ataque: você pode escolher 1 monstro Besta no seu Cemitério; reduza o Nível deste card em exatamente 2 e, se isso acontecer, Invoque o alvo por Invocação-Especial. Você só pode usar cada efeito de "Surpresa Alegre dos Melffys" uma vez por turno.
  | es_text               = 1 monstruo "Melffy" + 1 monstruo Bestia<br />Si esta carta es Invocada por Fusión: puedes seleccionar el mismo número de cartas "Melffy" que controles y cartas que controle tu adversario; devuélvelas a la mano. Si tu adversario Invoca de Modo Normal o Especial uno o más monstruos (excepto durante el Damage Step), o si un monstruo del adversario selecciona esta carta para un ataque: puedes seleccionar 1 monstruo Bestia en tu Cementerio; reduce el Nivel de esta carta exactamente en 2 y, si lo haces, Invoca ese objetivo de Modo Especial. Sólo puedes usar cada efecto de "Sorpresa Feliz de Melffys" una vez por turno.
  | ja_text               = 「メルフィー」モンスター＋獣族モンスター<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが融合召喚した場合、自分フィールドの「メルフィー」カードと相手フィールドのカードをそれぞれ同じ数だけ対象として発動できる。そのカードを手札に戻す。②：相手がモンスターを召喚・特殊召喚した場合、またはこのカードが相手モンスターの攻撃対象に選択された場合、自分の墓地の獣族モンスター１体を対象として発動できる。このカードのレベルを２つ下げ、対象のモンスターを特殊召喚する。
  | translated_text       = 1 "Melffy" monster + 1 Beast monster<br />If this card is Fusion Summoned: You can target an equal number of "Melffy" cards you control and cards your opponent controls; return them to the hand. If your opponent Normal or Special Summons a monster(s) (except during the Damage Step), or if an opponent's monster targets this card for an attack: You can target 1 Beast monster in your GY; reduce this card's Level by exactly 2, and if you do, Special Summon that '''monster'''. You can only use each effect of "Melffys' Joyful Surprise" once per turn.
