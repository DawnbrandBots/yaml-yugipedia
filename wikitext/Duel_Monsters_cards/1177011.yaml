  | text                  = If your opponent [[Special Summon]]s a [[monster]](s) from the [[Extra Deck]] (except during the [[Damage Step]]): You can [[target]] 1 [[face-up]] monster you [[control]]; [[Special Summon]] this card from your [[hand]], then immediately after this [[effect]] [[resolve]]s, [[Xyz Summon]] using only this card and the targeted monster. When you do, treat this card's [[Level]] as the same as the targeted monster's. If this card is [[detach]]ed from an [[Xyz Monster]] to [[activate]] that monster's effect: You can change the [[ATK]] of 1 face-up monster your opponent controls to 0. You can only use each effect of "Gagaga Girl - Cell Phone Subtraction" [[once per turn]].
