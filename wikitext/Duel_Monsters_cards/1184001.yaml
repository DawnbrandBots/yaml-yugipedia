  | effect_types          = Continuous-like, Quick-like, Condition
  | text                  = While you [[control]] 5 cards in your [[Spell & Trap Zone]], any [[battle damage]] a player takes is halved, also [[once per turn]], you can [[activate]] 1 [[Continuous Trap Card]] the [[turn]] it was [[Set]]. During the [[Standby Phase]]: You can [[reveal]] 5 Continuous Traps from your [[Main Deck|Deck]] with different names, your opponent randomly picks 1 for you to [[Set]], and [[shuffle]] the rest into the Deck. You can only use this [[effect]] of "Garden of Talistones" [[once per turn]].
  | fr_text               = Tant que vous contrôlez 5 cartes dans votre Zone Magie & Piège, les dommages de combat reçus par un joueur sont divisés par deux, et aussi, une fois par tour, vous pouvez activer 1 Carte Piège Continu le tour où elle a été Posée. Durant la Standby Phase : vous pouvez révéler 5 Pièges Continus depuis votre Deck de noms différents, votre adversaire en prend 1 au hasard pour vous à Poser, et mélangez les cartes restantes dans le Deck. Vous ne pouvez utiliser cet effet de "Jardin des Talispierres" qu'une fois par tour.
  | de_text               = Solange du 5 Karten in deiner Zauber- & Fallenzone kontrollierst, wird Kampfschaden halbiert, den ein Spieler erhält, zusätzlich kannst du einmal pro Spielzug 1 Permanente Fallenkarte in dem Spielzug aktivieren, in dem sie gesetzt wurde. Während der Standby Phase: Du kannst 5 Permanente Fallen mit unterschiedlichen Namen von deinem Deck vorzeigen, dein Gegner bestimmt zufällig 1 von ihnen, die du setzt, und mische den Rest ins Deck. Du kannst diesen Effekt von „Garten der Talisteine“ nur einmal pro Spielzug verwenden.
  | it_text               = Mentre controlli 5 carte nella tua Zona Magie & Trappole, qualsiasi danno da combattimento che un giocatore subisce viene dimezzato, inoltre una volta per turno, puoi attivare 1 Carta Trappola Continua nel turno in cui è stata Posizionata. Durante la Standby Phase: puoi rivelare dal tuo Deck 5 Trappole Continue con nomi diversi, il tuo avversario ne prende 1 a caso da farti Posizionare, e mischia il resto nel Deck. Puoi utilizzare questo effetto di "Giardino delle Talipietre" una sola volta per turno.
  | pt_text               = Enquanto você controlar 5 cards na sua Zona de Magias & Armadilhas, qualquer dano de batalha que um duelista sofrer é diminuído pela metade e, além disso, uma vez por turno, você pode ativar 1 Card de Armadilha Contínua no turno em que foi Baixado. Durante a Fase de Apoio: você pode revelar 5 Armadilhas Contínuas do seu Deck com nomes diferentes, seu oponente elege 1 aleatoriamente para que você Baixe e embaralhe o resto no Deck. Você só pode usar este efeito de "Jardim das Pedrastalis" uma vez por turno.
  | es_text               = Mientras controlas 5 cartas en tu Zona de Magia y Trampas, cualquier daño de batalla que reciba un jugador se divide a la mitad y además, una vez por turno, puedes activar 1 Carta de Trampa Continua el turno en el que fue Colocada. Durante la Standby Phase: puedes mostrar 5 Trampas Continuas en tu Deck con nombres diferentes, tu adversario elige 1 al azar para que la Coloques, y baraja el resto al Deck. Sólo puedes usar este efecto de "Jardín de Talispiedras" una vez por turno.
  | ja_text               = このカード名の②の効果は１ターンに１度しか使用できない。①：自分の魔法＆罠ゾーンにカードが５枚存在する限り、お互いが受ける戦闘ダメージは半分になり、１ターンに１度、自分は永続罠カード１枚をセットしたターンに発動できる。②：自分・相手のスタンバイフェイズに発動できる。カード名が異なる永続罠カード５枚をデッキから相手に見せ、相手はその中からランダムに１枚選ぶ。自分はその１枚を自分フィールドにセットし、残りをデッキに戻す。
  | ko_text               = 
  | sc_text               = 此卡名的②效果1回合仅可使用1次。①：只要自己的魔法与陷阱区域存在5张卡，双方受到的战斗伤害变为一半，1回合1次，自己可以将1张永续陷阱卡在放置的回合发动。②：在自己・对手的准备阶段可以发动。从牌组将卡名不同的5张永续陷阱卡出示给对手，对手从其中随机挑选1张。自己将该1张放置在自己场上，剩余的放回牌组。
