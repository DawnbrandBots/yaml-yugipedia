  | text                  = 1 "[[Aleister]]" [[monster]] + 1 [[FIRE]] or [[WIND]] monster<br />During the [[Main Phase]] ([[Quick Effect]]): You can [[target]] 1 [[Level]] 6 or lower monster in either [[GY]]; [[Special Summon]] it to your [[field]] in [[Defense Position]], but [[negate]] its [[effect]]s. If this card is in your GY: You can [[Fusion Summon]] 1 "[[Invoked]]" [[Fusion Monster]] from your [[Extra Deck]], by [[banish]]ing this card from your GY and monsters from your field or GY as [[material]]. You can only use each effect of "Invoked Sorath" [[once per turn]].
  | fr_text               = 1 monstre "Aleister" + 1 monstre FEU ou VENT<br />Durant la Main Phase (Effet Rapide) : vous pouvez cibler 1 monstre de max. Niveau 6 dans l'un des Cimetières ; Invoquez-le Spécialement sur votre Terrain en Position de Défense, mais annulez ses effets. Si cette carte est dans votre Cimetière : vous pouvez Invoquer par Fusion 1 Monstre Fusion "Invokhé" depuis votre Extra Deck, en bannissant cette carte depuis votre Cimetière et des monstres depuis votre Terrain ou Cimetière comme Matériel. Vous ne pouvez utiliser chaque effet de "Sorath l'Invokhé" qu'une fois par tour.
  | de_text               = 1 „Aleister“-Monster + 1 FEUER oder WIND Monster<br />Während der Main Phase (Schnelleffekt): Du kannst 1 Monster der Stufe 6 oder niedriger in einem beliebigen Friedhof wählen; beschwöre es als Spezialbeschwörung auf deine Spielfeldseite in die Verteidigungsposition, aber annulliere seine Effekte. Falls sich diese Karte in deinem Friedhof befindet: Du kannst 1 „Beschworen“-Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck beschwören, indem du diese Karte von deinem Friedhof und Monster von deiner Spielfeldseite oder deinem Friedhof als Material verbannst. Du kannst jeden Effekt von „Beschworener Sorath“ nur einmal pro Spielzug verwenden.
  | it_text               = 1 mostro "Aleister" + 1 mostro FUOCO o VENTO<br />Durante la Main Phase (Effetto Rapido): puoi scegliere come bersaglio 1 mostro di Livello 6 o inferiore in qualsiasi Cimitero; Evocalo Specialmente sul tuo Terreno in Posizione di Difesa, ma annulla i suoi effetti. Se questa carta è nel tuo Cimitero: puoi Evocare tramite Fusione 1 Mostro Fusione "Invokato" dal tuo Extra Deck, bandendo questa carta dal tuo Cimitero e mostri dal tuo Terreno o Cimitero come materiale. Puoi utilizzare ogni effetto di "Sorath Invokato" una sola volta per turno.
  | pt_text               = 1 monstro "Aleister" + 1 monstro de FOGO ou de VENTO<br />Durante a Fase Principal (Efeito Rápido): você pode escolher 1 monstro de Nível 6 ou menos em qualquer Cemitério; Invoque-o por Invocação-Especial no seu campo em Posição de Defesa, mas negue seus efeitos. Se este card estiver no seu Cemitério: você pode Invocar por Invocação-Fusão 1 Monstro de Fusão "Invokado(a)" do seu Deck Adicional, ao banir este card do seu Cemitério e monstros do seu campo ou Cemitério como matéria. Você só pode usar cada efeito de "Sorath, o Invokado" uma vez por turno.
  | es_text               = 1 monstruo "Aleister" + 1 monstruo de FUEGO o VIENTO<br />Durante la Main Phase (Efecto Rápido): puedes seleccionar 1 monstruo de Nivel 6 o menor en cualquier Cementerio; Invócalo de Modo Especial a tu Campo en Posición de Defensa, pero niega sus efectos. Si esta carta está en tu Cementerio: puedes Invocar por Fusión 1 Monstruo de Fusión "Invokado/a" desde tu Deck Extra, desterrando esta carta en tu Cementerio y monstruos en tu Campo o Cementerio como material. Sólo puedes usar cada efecto de "Sorath Invokado" una vez por turno.
  | ja_text               = 「アレイスター」モンスター＋炎・風属性モンスター<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手のメインフェイズに、自分か相手の墓地のレベル６以下のモンスター１体を対象として発動できる。そのモンスターを自分フィールドに守備表示で特殊召喚する。この効果で特殊召喚したモンスターの効果は無効化される。②：このカードが墓地に存在する場合に発動できる。墓地のこのカードを含む自分のフィールド・墓地のモンスターを融合素材として除外し、「召喚獣」融合モンスター１体を融合召喚する。
  | ko_text               = "알레이스터" 몬스터 ＋ 화염 / 바람 속성 몬스터<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대의 메인 페이즈에, 자신이나 상대 묘지의 레벨 6 이하의 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 자신 필드에 수비 표시로 특수 소환한다. 이 효과로 특수 소환한 몬스터의 효과는 무효화된다. ②: 이 카드가 묘지에 존재할 경우에 발동할 수 있다. 묘지의 이 카드를 포함하는 자신의 필드 / 묘지의 몬스터를 융합 소재로서 제외하고, "소환수" 융합 몬스터 1장을 융합 소환한다.
  | sc_text               = “阿莱斯特”怪兽＋炎・风属性怪兽<br />此卡名的①②效果1回合仅可各使用1次。①：在自己・对手的主要阶段，以自己或对手墓地的1只等级6以下的怪兽为对象可以发动。将该怪兽以守备表示特殊召唤至自己场上。以此效果特殊召唤的怪兽的效果无效化。②：此卡存在于墓地的情况下可以发动。将包含墓地的此卡在内的、自己场上・墓地的怪兽作为融合素材除外，将1只“召唤兽”融合怪兽融合召唤。
