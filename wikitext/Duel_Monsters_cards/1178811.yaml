  | text                  = You can [[reveal]] this card in your [[hand]]; immediately after this [[effect]] [[resolve]]s, [[Normal Summon]] 1 "[[Dark Tuner (archetype)|Dark Tuner]]" [[monster]]. You can only use this effect of "Dark Tuner Nightmare Hand" [[once per turn]]. If this card is Normal Summoned: You can [[Special Summon]] 1 [[Level]] 2 or lower monster from your hand. Once per turn, if you [[control]] this Normal Summoned/[[Set]] card: You can [[Tribute]] both this face-up card and 1 face-up non-Tuner with a lower Level, and if you do, Special Summon 1 [[Synchro Monster]] from your [[Extra Deck]] with a [[Level]] equal to the difference in Levels of those monsters (this is treated as a [[Synchro Summon]]).
