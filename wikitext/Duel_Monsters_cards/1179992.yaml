  | ja_text               = チューナー２体＋チューナー以外のモンスター１体<br />このカードはＳ召喚及び以下の方法でのみ特殊召喚できる。●自分の墓地からチューナー２体と「レッド・デーモンズ・ドラゴン」１体を除外した場合にＥＸデッキから特殊召喚できる。このカード名の①の効果は自分が「レッド・デーモンズ・ドラゴン」をＳ召喚したデュエル中に１度だけ使用できる。①：このカードが特殊召喚した場合に発動できる。自分の墓地からカード１枚を手札に加え、このカードの攻撃力は２０００アップする。②：フィールドのこのカードは効果では破壊されない。
  | ko_text               = 튜너 2장 ＋ 튜너 이외의 몬스터 1장<br />이 카드는 싱크로 소환 및 이하의 방법으로만 특수 소환할 수 있다. ●자신 묘지에서 튜너 2장과 "레드 데몬즈 드래곤" 1장을 제외했을 경우에 엑스트라 덱에서 특수 소환할 수 있다. 이 카드명의 ①의 효과는 자신이 "레드 데몬즈 드래곤"을 싱크로 소환한 듀얼 중에 1번만 사용할 수 있다. ①: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 자신 묘지에서 카드 1장을 패에 넣고, 이 카드의 공격력은 2000 올린다. ②: 필드의 이 카드는 효과로는 파괴되지 않는다.
  | sc_text               = 协调2只＋协调以外的怪兽1只<br />此卡仅可通过同步召唤及以下方法特殊召唤。●从自己墓地将2只协调和1只“暗红恶魔龙”除外的情况下，可从额外牌组特殊召唤。此卡名的①效果在决斗中仅可使用1次，且仅可在自己同步召唤过“暗红恶魔龙”的决斗中使用。①：此卡特殊召唤的情况下可以发动。从自己墓地将1张卡加入手牌，此卡的攻击力上升2000。②：场上的此卡不会因效果被破坏。
