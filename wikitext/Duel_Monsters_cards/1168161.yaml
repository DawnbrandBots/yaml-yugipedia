  | text                  = You can [[Tribute Summon]] this card [[face-up]] by Tributing 1 [[Ritual Monster|Ritual]], [[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], [[Xyz Monster|Xyz]], [[Pendulum Monster|Pendulum]], or [[Link Monster]]. If this card is Tribute Summoned: You can [[activate]] 1 of these effects (but you can only use each [[effect]] of "Clown Crew Biancaviso" [[once per turn]]);<br />● [[Draw a card|Draw]] cards equal to the number of monsters Tributed.<br />● [[Negate]] the effects of face-up cards your opponent controls, equal to the number of monsters Tributed.<br />Once per turn, during your opponent's [[Main Phase]], you can ([[Quick Effect]]): Immediately after this effect [[resolve]]s, Tribute Summon 1 monster.
  | fr_text               = Vous pouvez Invoquer par Sacrifice face recto cette carte en Sacrifiant 1 Monstre Rituel, Fusion, Synchro, Xyz, Pendule ou Lien. Si cette carte est Invoquée par Sacrifice : vous pouvez activer 1 de ces effets (mais vous ne pouvez utiliser chaque effet de "Biancaviso, Troupe des Clowns" qu'une fois par tour) ;<br />● Piochez un nombre de cartes égal au nombre de monstres Sacrifiés.<br />● Annulez un nombre d'effets de cartes face recto contrôlées par votre adversaire, égal au nombre de monstres Sacrifiés.<br />Une fois par tour, durant la Main Phase de votre adversaire, vous pouvez (Effet Rapide) : immédiatement après la résolution de cet effet, Invoquez par Sacrifice 1 monstre.
  | de_text               = Du kannst diese Karte offen als Tributbeschwörung beschwören, indem du 1 Ritual-, Fusions-, Synchro-, Xyz-, Pendel- oder Linkmonster als Tribut anbietest. Falls diese Karte als Tributbeschwörung beschworen wird: Du kannst 1 dieser Effekte aktivieren (aber du kannst jeden Effekt von „Clowntrupp Biancaviso“ nur einmal pro Spielzug verwenden);<br />● Ziehe Karten in Höhe der Anzahl der als Tribut angebotenen Monster.<br />● Annulliere die Effekte von offenen Karten, die dein Gegner kontrolliert, in Höhe der Anzahl der als Tribut angebotenen Monster.<br />Einmal pro Spielzug, während der Main Phase deines Gegners, kannst du (Schnelleffekt): Sofort nachdem dieser Effekt aufgelöst wurde, beschwöre 1 Monster als Tributbeschwörung.
  | it_text               = Puoi Evocare tramite Tributo questa carta scoperta offrendo come Tributo 1 Mostro Rituale, Fusione, Synchro, Xyz, Pendulum o Link. Se questa carta viene Evocata tramite Tributo: puoi attivare 1 di questi effetti (ma puoi utilizzare ogni effetto di "Compagnia di Clown Biancaviso" una sola volta per turno);<br />● Pesca carte pari al numero di mostri offerti come Tributo.<br />● Annulla gli effetti di carte scoperte controllate dal tuo avversario, pari al numero di mostri offerti come Tributo.<br />Una volta per turno, durante la Main Phase del tuo avversario, puoi (Effetto Rapido): immediatamente dopo che questo effetto si è risolto, Evoca tramite Tributo 1 mostro.
  | pt_text               = Você pode Invocar este card por Invocação-Tributo com a face para cima ao oferecer como Tributo 1 Monstro de Ritual, de Fusão, Sincro, Xyz, Pêndulo ou Link. Se este card for Invocado por Invocação-Tributo: você pode ativar 1 desses efeitos (mas você só pode usar cada efeito de "Companhia de Palhaços Biancaviso" uma vez por turno);<br />● Compre cards igual ao número de monstros oferecidos como Tributo.<br />● Negue os efeitos de cards com a face para cima que seu oponente controla, igual ao número de monstros oferecidos como Tributo.<br />Uma vez por turno, durante a Fase Principal do seu oponente, você pode (Efeito Rápido): imediatamente depois que este efeito resolver, Invocar 1 monstro por Invocação-Tributo.
  | es_text               = Puedes Invocar boca arriba por Sacrificio esta carta Sacrificando 1 Monstruo de Ritual, Fusión, Sincronía, Xyz, Péndulo o Enlace. Si esta carta es Invocada por Sacrificio: puedes activar 1 de estos efectos (pero sólo puedes usar cada efecto de "Biancaviso de la Compañía de Payasos" una vez por turno);<br />● Roba cartas igual al número de monstruos Sacrificados.<br />● Niega los efectos de cartas boca arriba que controle tu adversario, igual al número de monstruos Sacrificados.<br />Una vez por turno, durante la Main Phase de tu adversario, puedes (Efecto Rápido): inmediatamente después de que se resuelva este efecto, Invocar por Sacrificio 1 monstruo.
  | ja_text               = このカードは儀式・融合・Ｓ・Ｘ・Ｐ・Ｌモンスター１体をリリースして表側表示でＡ召喚できる。①：このカードがＡ召喚した場合、以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。●このカードのＡ召喚のためにリリースしたモンスターの数だけ、自分はドローする。●このカードのＡ召喚のためにリリースしたモンスターの数だけ、相手フィールドの表側表示カードの効果を無効にする。②：１ターンに１度、相手メインフェイズに発動できる。モンスター１体のＡ召喚を行う。
  | ko_text               = 이 카드는 의식 / 융합 / 싱크로 / 엑시즈 / 펜듈럼 / 링크 몬스터 1장을 릴리스하고 앞면 표시로 어드밴스 소환할 수 있다. ①: 이 카드를 어드밴스 소환했을 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다(이 카드명의 이하의 효과는 각각 1턴에 1번밖에 선택할 수 없다). ●이 카드의 어드밴스 소환을 위해 릴리스한 몬스터의 수만큼, 자신은 드로우한다. ●이 카드의 어드밴스 소환을 위해 릴리스한 몬스터의 수만큼, 상대 필드의 앞면 표시 카드의 효과를 무효로 한다. ②: 1턴에 1번, 상대 메인 페이즈에 발동할 수 있다. 몬스터 1장의 어드밴스 소환을 실행한다.
  | sc_text               = 此卡可通过解放1只仪式・融合・同步・超量・灵摆・连接怪兽来以表侧表示上级召唤。①：此卡上级召唤的情况下，可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。●依为上级召唤此卡而解放的怪兽的数量，自己抽牌。●依为上级召唤此卡而解放的怪兽的数量，将对手场上的表侧表示卡的效果无效。②：1回合1次，在对手的主要阶段可以发动。进行1只怪兽的上级召唤。
