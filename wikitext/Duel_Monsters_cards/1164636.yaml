  | ja_text               = 効果モンスター２体以上<br />このカード名の②の効果は１ターンに１度しか使用できない。①：このカードがＥＸモンスターゾーンに存在する限り、このカードの攻撃力はこのカード以外のお互いのフィールド・墓地のＬモンスターの数×５００アップし、相手はこのカードを効果の対象にできない。②：自分・相手ターンに、このカードのリンク先の自分のモンスター１体をリリースして発動できる。ＥＸデッキからサイバース族モンスター１体を墓地へ送る。このターン、このカードは１度のバトルフェイズ中に２回までモンスターに攻撃できる。
  | ko_text               = 효과 몬스터 2장 이상<br />이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 엑스트라 몬스터 존에 존재하는 한, 이 카드의 공격력은 이 카드 이외의 서로의 필드 / 묘지의 링크 몬스터의 수 × 500 올리고, 상대는 이 카드를 효과의 대상으로 할 수 없다. ②: 자신 / 상대 턴에, 이 카드의 링크 앞의 자신 몬스터 1장을 릴리스하고 발동할 수 있다. 엑스트라 덱에서 사이버스족 몬스터 1장을 묘지로 보낸다. 이 턴에, 이 카드는 1번의 배틀 페이즈 중에 2회까지 몬스터에 공격할 수 있다.
  | sc_text               = 效果怪兽2只以上<br />此卡名的②效果1回合仅可使用1次。①：只要此卡存在于额外怪兽区域，此卡的攻击力上升相当于此卡以外的、双方场上・墓地的连接怪兽的数量×500的数值，对手不可将此卡作为效果的对象。②：在自己・对手回合中，解放此卡连接端的1只自己的怪兽可以发动。从额外牌组将1只电子界族怪兽送至墓地。此回合，此卡在1次战斗阶段中最多可攻击怪兽2次。
