  | text                  = You can [[Ritual Summon]] this card with "[[Light and Darkness Ritual]]". [[Unaffected]] by your opponent's [[activate]]d effects, unless they [[target]] this card, also [[Spells]]/[[Traps]] you [[control]] cannot be [[destroy]]ed, or [[banish]]ed, by your opponent's card [[effect]]s. You can only use each of the following [[effect]]s of "Magician of Dark Chaos - Black Chaos" [[once per turn]]. If this card is [[Special Summon]]ed: You can [[Add a card|add]] 1 [[Spell]] from your [[GY]] to your [[hand]]. You can target 1 card your opponent [[control]]s; [[banish]] it [[face-down]].
  | fr_text               = Vous pouvez Invoquer Rituellement cette carte avec "Rituel de la Lumière et des Ténèbres". Non affectée par les effets activés de votre adversaire, sauf s'ils ciblent cette carte, et aussi, les Magies/Pièges que vous contrôlez ne peuvent être ni détruits ni bannis par des effets de carte de votre adversaire. Vous ne pouvez utiliser chacun des effets suivants de "Magicien du Chaos des Ténèbres - Chaos Sombre" qu'une fois par tour. Si cette carte est Invoquée Spécialement : vous pouvez ajouter 1 Magie depuis votre Cimetière à votre main. Vous pouvez cibler 1 carte contrôlée par votre adversaire ; bannissez-la face verso.
  | de_text               = Du kannst diese Karte mit „Ritual von Licht und Finsternis“ als Ritualbeschwörung beschwören. Bleibt von aktivierten Effekten deines Gegners unberührt, es sei denn, sie wählen diese Karte als Ziel, zusätzlich können Zauber/Fallen, die du kontrollierst, durch Karteneffekte deines Gegners weder zerstört noch verbannt werden. Du kannst jeden der folgenden Effekte von „Magier des dunklen Chaos - Schwarzes Chaos“ nur einmal pro Spielzug verwenden. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 Zauber von deinem Friedhof hinzufügen. Du kannst 1 Karte wählen, die dein Gegner kontrolliert; verbanne sie verdeckt.
  | it_text               = Puoi Evocare tramite Rituale questa carta con "Rituale di Luce e Oscurità". Immune agli effetti attivati del tuo avversario, a meno che essi scelgano come bersaglio questa carta, inoltre le Magie/Trappole che controlli non possono essere distrutte, o bandite, dagli effetti delle carte del tuo avversario. Puoi utilizzare ognuno dei seguenti effetti di "Mago del Chaos Nero - Chaos Oscuro" una sola volta per turno. Se questa carta viene Evocata Specialmente: puoi aggiungere 1 Magia dal tuo Cimitero alla tua mano. Puoi scegliere come bersaglio 1 carta controllata dal tuo avversario; bandiscila coperta.
  | pt_text               = Você pode Invocar este card por Invocação-Ritual com "Ritual da Luz e das Trevas". Não é afetado pelos efeitos ativados do seu oponente, a não ser que eles escolham este card como alvo e, além disso, Magias/Armadilhas que você controla não podem ser destruídas, ou banidas, pelos efeitos de card do seu oponente. Você só pode usar cada um dos seguintes efeitos de "Mago do Caos Negro - Caos das Trevas" uma vez por turno. Se este card for Invocado por Invocação-Especial: você pode adicionar 1 Magia do seu Cemitério à sua mão. Você pode escolher 1 card que seu oponente controla; bana-o com a face para baixo.
  | es_text               = Puedes Invocar esta carta por Ritual con "Ritual de la Luz y la Oscuridad". No es afectada por los efectos activados de tu adversario, a menos que seleccionen esta carta, y además las Mágicas/Trampas que controlas no pueden ser destruidas, o desterradas, por efectos de cartas de tu adversario. Sólo puedes usar cada uno de los siguientes efectos de "Mago del Caos Oscuro - Caos Negro" una vez por turno. Si esta carta es Invocada de Modo Especial: puedes añadir a tu mano 1 Mágica en tu Cementerio. Puedes seleccionar 1 carta que controle tu adversario; destiérrala boca abajo.
  | ja_text               = 「光と闇の儀式」により降臨<br />このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合に発動できる。自分の墓地から魔法カード１枚を手札に加える。②：このカードがモンスターゾーンに存在する限り、自分フィールドの魔法・罠カードは相手の効果では破壊されず、相手の効果では除外できず、このカードはこのカードを対象とする効果以外の相手が発動した効果を受けない。③：相手フィールドのカード１枚を対象として発動できる。そのカードを裏側で除外する。
  | ko_text               = "빛과 어둠의 의식"에 의해 의식 소환<br />이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 자신 묘지에서 마법 카드 1장을 패에 넣는다. ②: 이 카드가 몬스터 존에 존재하는 한, 자신 필드의 마법 / 함정 카드는 상대 효과로는 파괴되지 않고, 상대 효과로는 제외할 수 없으며, 이 카드는 이 카드를 대상으로 하는 효과 이외의 상대가 발동한 효과를 받지 않는다. ③: 상대 필드의 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 뒷면으로 제외한다.
  | sc_text               = 以“光与暗的仪式”降临<br />此卡名的①③效果1回合仅可各使用1次。①：此卡特殊召唤的情况下可以发动。从自己墓地将1张魔法卡加入手牌。②：只要此卡存在于怪兽区域，自己场上的魔法・陷阱卡就不会因对手的效果被破坏、不可因对手的效果除外，此卡不受对手发动的效果影响，除非是以此卡为对象的效果。③：以对手场上的1张卡为对象可以发动。将该卡以里侧除外。
