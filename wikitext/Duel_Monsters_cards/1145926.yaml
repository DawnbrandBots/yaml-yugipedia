  | ko_text             = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우, 이 카드를 묘지로 보내고 발동할 수 있다. 덱에서 "X－세이버 펠리나" 이외의 "X－세이버" 몬스터 2장을 특수 소환한다. 이 효과로 특수 소환한 몬스터는 엔드 페이즈에 파괴된다. ②: 이 카드가 "X－세이버" 싱크로 몬스터의 싱크로 소재로서 묘지로 보내졌을 경우에 발동할 수 있다. 이하에서 1개를 고르고 적용한다. ●그 몬스터는 1번의 배틀 페이즈 중에 2회 공격할 수 있다. ●그 몬스터는 직접 공격할 수 있다.
  | sc_text             = 此卡名的①②效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下，将此卡送至墓地可以发动。从牌组将“X－军刀 佩利那”以外的2只“X－军刀”怪兽特殊召唤。以此效果特殊召唤的怪兽将在结束阶段被破坏。②：此卡作为“X－军刀”同步怪兽的同步素材被送至墓地的情况下可以发动。从以下效果中挑选1个适用。●该怪兽在1次战斗阶段中可攻击2次。●该怪兽可直接攻击。
