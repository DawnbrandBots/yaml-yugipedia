  | text                = 2+ [[monsters]], including a [[Tuner]]<br />While this card is equipped with a "[[Dragunity]]" card, your opponent cannot [[activate]] the [[effect]]s of monsters in the [[GY]]. You can only use each of the following effects of "Dragunity Lord - Georgius" once per turn. If this card is [[Link Summon]]ed, or your opponent [[Special Summon]]s a monster(s): You can Special Summon 1 [[Level]] 5 or higher "Dragunity" monster from your [[Extra Deck]] or GY. When your opponent activates a [[Spell]]/[[Trap Card]] or effect ([[Quick Effect]]): You can [[send]] 1 [[Equip Card]] you [[control]] to the GY; [[negate]] that effect.
  | fr_text             = 2+ monstres (un Syntoniseur inclus)<br />Tant que cette carte est équipée avec une carte "Dragunité", votre adversaire ne peut pas activer les effets des monstres dans le Cimetière. Vous ne pouvez utiliser chacun des effets suivants de "Seigneur Dragunité - Georgius" qu'une fois par tour. Si cette carte est Invoquée par Lien, ou votre adversaire Invoque Spécialement un ou plusieurs monstres : vous pouvez Invoquer Spécialement 1 monstre "Dragunité" de min. Niveau 5 depuis votre Extra Deck ou Cimetière. Lorsque votre adversaire active une Carte Magie/Piège ou effet de Magie/Piège (Effet Rapide) : vous pouvez envoyer 1 Carte d'Équipement que vous contrôlez au Cimetière ; annulez l'effet.
  | de_text             = 2+ Monster, darunter ein Empfänger<br />Solange diese Karte mit einer „Dracheneinheit“-Karte ausgerüstet ist, kann dein Gegner keine Effekte von Monstern im Friedhof aktivieren. Du kannst jeden der folgenden Effekte von „Dracheneinheit-Lord - Georgius“ nur einmal pro Spielzug verwenden. Falls diese Karte als Linkbeschwörung beschworen wird oder dein Gegner ein oder mehr Monster als Spezialbeschwörung beschwört: Du kannst 1 „Dracheneinheit“-Monster der Stufe 5 oder höher als Spezialbeschwörung von deinem Extra Deck oder Friedhof beschwören. Wenn dein Gegner eine Zauber-/Fallenkarte oder einen Zauber-/Falleneffekt aktiviert (Schnelleffekt): Du kannst 1 Ausrüstungskarte, die du kontrollierst, auf den Friedhof legen; annulliere jenen Effekt.
  | it_text             = 2+ mostri, compreso un Tuner<br />Mentre questa carta è equipaggiata con una carta "Dragunità", il tuo avversario non può attivare gli effetti dei mostri nel Cimitero. Puoi utilizzare ognuno dei seguenti effetti di "Signore Dragunità - Georgius" una sola volta per turno. Se questa carta viene Evocata Link, o il tuo avversario Evoca Specialmente uno o più mostri: puoi Evocare Specialmente 1 mostro "Dragunità" di Livello 5 o superiore dal tuo Extra Deck o Cimitero. Quando il tuo avversario attiva una Carta Magia/Trappola o un suo effetto (Effetto Rapido): puoi mandare 1 Carta Equipaggiamento che controlli al Cimitero; annulla quell'effetto.
  | pt_text             = 2+ monstros, incluindo um Regulador<br />Enquanto este card estiver equipado com um card "Dragunidade", seu oponente não pode ativar os efeitos de monstros no Cemitério. Você só pode usar cada um dos seguintes efeitos de "Senhor Dragunidade - Georgius" uma vez por turno. Se este card for Invocado por Invocação-Link, ou seu oponente Invocar um ou mais monstros por Invocação-Especial: você pode Invocar por Invocação-Especial 1 monstro "Dragunidade" de Nível 5 ou mais do seu Deck Adicional ou Cemitério. Quando seu oponente ativar um Card de Magia/Armadilha ou seus efeitos (Efeito Rápido): você pode enviar 1 Card de Equipamento que você controla para o Cemitério; negue o efeito.
  | es_text             = 2+ monstruos, incluyendo un Cantante<br />Mientras esta carta esté equipada con una carta "Dracounidad", tu adversario no puede activar los efectos de monstruos en el Cementerio. Sólo puedes usar cada uno de los siguientes efectos de "Señor Dracounidad - Georgius" una vez por turno. Si esta carta es Invocada por Enlace, o tu adversario Invoca uno o más monstruos de Modo Especial: puedes Invocar de Modo Especial, desde tu Deck Extra o Cementerio, 1 monstruo "Dracounidad" de Nivel 5 o mayor. Cuando tu adversario activa una Carta Mágica/de Trampa o su efecto (Efecto Rápido): puedes mandar al Cementerio 1 Carta de Equipo que controles; niega ese efecto.
  | ja_text             = チューナーを含むモンスター２体以上<br />このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＬ召喚した場合、または相手がモンスターを特殊召喚した場合に発動できる。自分のＥＸデッキ・墓地からレベル５以上の「ドラグニティ」モンスター１体を特殊召喚する。②：このカードが「ドラグニティ」カードを装備している限り、相手は墓地のモンスターの効果を発動できない。③：相手が魔法・罠カードの効果を発動した時、自分フィールドの装備カード１枚を墓地へ送って発動できる。その効果を無効にする。
  | ko_text             = 튜너를 포함하는 몬스터 2장 이상<br />이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 링크 소환했을 경우, 또는 상대가 몬스터를 특수 소환했을 경우에 발동할 수 있다. 자신의 엑스트라 덱 / 묘지에서 레벨 5 이상의 "드래그니티" 몬스터 1장을 특수 소환한다. ②: 이 카드가 "드래그니티" 카드를 장착하고 있는 한, 상대는 묘지의 몬스터의 효과를 발동할 수 없다. ③: 상대가 마법 / 함정 카드의 효과를 발동했을 때, 자신 필드의 장착 카드 1장을 묘지로 보내고 발동할 수 있다. 그 효과를 무효로 한다.
  | sc_text             = 包含协调在内的怪兽2只以上<br />此卡名的①③效果1回合仅可各使用1次。①：此卡连接召唤的情况下，或对手将怪兽特殊召唤的情况下可以发动。从自己额外牌组・墓地将1只等级5以上的“龙骑兵团”怪兽特殊召唤。②：只要此卡装备有“龙骑兵团”卡，对手不可发动墓地的怪兽的效果。③：对手发动魔法・陷阱卡的效果时，将自己场上的1张装备卡送至墓地可以发动。将该效果无效。
