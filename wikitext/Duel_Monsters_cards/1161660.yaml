  | ja_text               = このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：フィールドに元々の攻撃力が１８５０の魔法使い族モンスターが存在する場合に発動できる。このカードを手札・墓地から特殊召喚する。このターン、自分は魔法使い族モンスターしか特殊召喚できない。②：このカードが召喚・特殊召喚した場合に発動できる。デッキから「妖精伝姫」魔法・罠カードか「妖精の伝姫」１枚を手札に加える。③：５００ＬＰを払って発動できる。相手フィールドの効果モンスター１体のカード名を「妖精の王子様」として扱う。
  | ko_text               = 이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 필드에 원래의 공격력이 1850 인 마법사족 몬스터가 존재할 경우에 발동할 수 있다. 이 카드를 패 / 묘지에서 특수 소환한다. 이 턴에, 자신은 마법사족 몬스터밖에 특수 소환할 수 없다. ②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "페어리테일" 마법 / 함정 카드나 "페어리 테일" 1장을 패에 넣는다. ③: 500 LP를 지불하고 발동할 수 있다. 상대 필드의 효과 몬스터 1장의 카드명을 "요정의 왕자님"으로 취급한다.
  | sc_text               = 此卡名的①②③效果1回合仅可各使用1次。①：场上存在原本攻击力为1850的魔法师族怪兽的情况下可以发动。从手牌・墓地将此卡特殊召唤。此回合，自己仅可特殊召唤魔法师族怪兽。②：此卡召唤・特殊召唤的情况下可以发动。从牌组将1张“妖精传姬”魔法・陷阱卡或“妖精之传姬”加入手牌。③：支付500LP可以发动。将对手场上1只效果怪兽的卡名视为“妖精的王子大人”。
