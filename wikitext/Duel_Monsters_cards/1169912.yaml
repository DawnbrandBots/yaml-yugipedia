  | text                  = "[[Kewl Tune Clip]]" + 1+ [[Tuners]]<br />If this card is [[Synchro Summon]]ed: You can look at your opponent's [[Extra Deck]], and if you do, [[banish]] (face-up) 1 card from it (until the [[End Phase]]), then you can make this card gain [[ATK]] equal to that monster's ATK. If this Synchro Summoned card is sent to the [[GY]]: You can [[Special Summon]] this card, then you can apply this [[effect]].<br />● Look at your opponent's Extra Deck and banish (face-up) 2 cards from it until the End Phase.<br />You can only use each effect of "Kewl Tune Crackle" once per turn.
  | fr_text               = "Clip du Son Kewl" + 1+ Syntoniseur<br />Si cette carte est Invoquée par Synchronisation : vous pouvez regarder l'Extra Deck de votre adversaire, et si vous le faites, bannissez-en (face recto) 1 carte (jusqu'à la End Phase), puis vous pouvez faire gagner à cette carte une ATK égale à l'ATK du monstre. Si cette carte Invoquée par Synchronisation est envoyée au Cimetière : vous pouvez Invoquer Spécialement cette carte, puis vous pouvez appliquer cet effet.<br />● Regardez l'Extra Deck de votre adversaire et bannissez-en (face recto) 2 cartes jusqu'à la End Phase.<br />Vous ne pouvez utiliser chaque effet de "Crépitement du Son Kewl" qu'une fois par tour.
  | de_text               = „Kewl-Empfang Übersteuer“ + 1+ Empfänger<br />Falls diese Karte als Synchrobeschwörung beschworen wird: Du kannst dir das Extra Deck deines Gegners ansehen und falls du dies tust, verbanne 1 Karte davon (offen bis zur End Phase), dann kannst du diese Karte ATK in Höhe der ATK jenes Monsters erhalten lassen. Falls diese als Synchrobeschwörung beschworene Karte auf den Friedhof gelegt wird: Du kannst diese Karte als Spezialbeschwörung beschwören, dann kannst du diesen Effekt ausführen.<br />● Sieh dir das Extra Deck deines Gegners an und verbanne 2 Karten davon (offen) bis zur End Phase.<br />Du kannst jeden Effekt von „Kewl-Empfang Knistern“ nur einmal pro Spielzug verwenden.
  | it_text               = "Tune Figo Clip" + 1+ Tuner<br />Se questa carta viene Synchro Evocata: puoi guardare l'Extra Deck del tuo avversario e, se lo fai, bandisci (scoperta) 1 carta da esso (fino alla End Phase), poi puoi far guadagnare a questa carta ATK pari all'ATK di quel mostro. Se questa carta Synchro Evocata viene mandata al Cimitero: puoi Evocare Specialmente questa carta, poi puoi applicare questo effetto.<br />● Guarda l'Extra Deck del tuo avversario e bandisci (scoperte) 2 carte da esso fino alla End Phase.<br />Puoi utilizzare ogni effetto di "Tune Figo Crepitio" una sola volta per turno.
  | pt_text               = "Kewl Tune Clip" + 1+ Reguladores<br />Se este card for Invocado por Invocação-Sincro: você pode olhar o Deck Adicional do seu oponente e, se isso acontecer, bana (com a face para cima) 1 card dali (até a Fase Final) e, depois, você pode fazer com que este card ganhe ATK igual ao ATK desse monstro. Se este card Invocado por Invocação-Sincro for enviado para o Cemitério: você pode Invocar este card por Invocação-Especial e, depois, você pode aplicar este efeito.<br />● Olhe o Deck Adicional do seu oponente e bana (com a face para cima) 2 cards dali até a Fase Final.<br />Você só pode usar cada efeito de "Kewl Tune Estalos" uma vez por turno.
  | es_text               = "Canción Kewl Corte" + 1+ Cantantes<br />Si esta carta es Invocada por Sincronía: puedes mirar el Deck Extra de tu adversario y, si lo haces, destierra (boca arriba) 1 carta de él (hasta la End Phase), y después puedes hacer que esta carta gane ATK igual al ATK de ese monstruo. Si esta carta Invocada por Sincronía es mandada al Cementerio: puedes Invocar esta carta de Modo Especial, y después puedes aplicar este efecto.<br />● Mira el Deck Extra de tu adversario y destierra (boca arriba) 2 cartas de él hasta la End Phase.<br />Sólo puedes usar cada efecto de "Canción Kewl Crujido" una vez por turno.
  | ja_text               = 「キラーチューン・クリップ」＋チューナー１体以上<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＳ召喚した場合に発動できる。相手のＥＸデッキを確認し、その内の１枚をエンドフェイズまで表側で除外する。その後、このカードの攻撃力を除外したモンスターの攻撃力分アップできる。②：Ｓ召喚したこのカードが墓地へ送られた場合に発動できる。このカードを特殊召喚する。その後、以下の効果を適用できる。●相手のＥＸデッキを確認し、その内の２枚をエンドフェイズまで表側で除外する。
  | ko_text               = "킬러튠 클립" ＋ 튜너 1장 이상<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 상대의 엑스트라 덱을 확인하고, 그 중의 1장을 엔드 페이즈까지 앞면으로 제외한다. 그 후, 이 카드의 공격력을 제외한 몬스터의 공격력만큼 올릴 수 있다. ②: 싱크로 소환한 이 카드가 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 특수 소환한다. 그 후, 이하의 효과를 적용할 수 있다. ●상대의 엑스트라 덱을 확인하고, 그 중의 2장을 엔드 페이즈까지 앞면으로 제외한다.
  | sc_text               = “杀手旋律・酷莉普”＋协调1只以上<br />此卡名的①②效果1回合仅可各使用1次。①：此卡同步召唤的情况下可以发动。确认对手的额外牌组，将其中1张直至结束阶段为止以表侧除外。然后，此卡的攻击力可上升相当于所除外怪兽的攻击力的数值。②：同步召唤的此卡被送至墓地的情况下可以发动。将此卡特殊召唤。然后，可适用以下效果。●确认对手的额外牌组，将其中2张直至结束阶段为止以表侧除外。
