  | text                = (This card is always treated as a "[[Witchcrafter]]" card.)<br />If you [[control]] a [[Spellcaster]] [[monster]] and this card is in your [[hand]]: You can [[Special Summon]] this card. During the [[Main Phase]] ([[Quick Effect]]): You can [[target]] 1 Spellcaster monster you control; [[banish]] it, and if you do, Special Summon 1 "[[Witchcrafter]]" monster from your [[Main Deck|Deck]], except "Genni, the Maid of Endymion". You can only use each effect of "Genni, the Maid of Endymion" [[once per turn]].
  | fr_text             = (Cette carte est toujours traitée comme carte "Artisanesorcière".)<br />Si vous contrôlez un monstre Magicien et que cette carte est dans votre main : vous pouvez Invoquer Spécialement cette carte. Durant la Main Phase (Effet Rapide) : vous pouvez cibler 1 monstre Magicien que vous contrôlez ; bannissez-le, et si vous le faites, Invoquez Spécialement 1 monstre "Artisanesorcière" ("Genni, la Domestique d'Endymion" exclu) depuis votre Deck. Vous ne pouvez utiliser chaque effet de "Genni, la Domestique d'Endymion" qu'une fois par tour.
  | de_text             = (Diese Karte wird immer als „Hexwerker“-Karte behandelt.)<br />Falls du ein Hexer-Monster kontrollierst und diese Karte sich in deiner Hand befindet: Du kannst diese Karte als Spezialbeschwörung beschwören. Während der Main Phase (Schnelleffekt): Du kannst 1 Hexer-Monster wählen, das du kontrollierst; verbanne es und falls du dies tust, beschwöre 1 „Hexwerker“-Monster als Spezialbeschwörung von deinem Deck, außer „Genni, die Maid von Endymion“. Du kannst jeden Effekt von „Genni, die Maid von Endymion“ nur einmal pro Spielzug verwenden.
  | it_text             = (Questa carta viene sempre considerata come una carta "Stregartigiana".)<br />Se controlli un mostro Incantatore e questa carta è nella tua mano: puoi Evocare Specialmente questa carta. Durante la Main Phase (Effetto Rapido): puoi scegliere come bersaglio 1 mostro Incantatore che controlli; bandiscilo e, se lo fai, Evoca Specialmente 1 mostro "Stregartigiana" dal tuo Deck, eccetto "Genni, la Domestica di Endymion". Puoi utilizzare ogni effetto di "Genni, la Domestica di Endymion" una sola volta per turno.
  | pt_text             = (Este card deve ser sempre considerado como um card "Fazticeira".)<br />Se você controlar um monstro Mago e este card estiver na sua mão: você pode Invocar este card por Invocação-Especial. Durante a Fase Principal (Efeito Rápido): você pode escolher 1 monstro Mago que você controla; bana-o e, se isso acontecer, Invoque por Invocação-Especial 1 monstro "Fazticeira" do seu Deck, exceto "Genni, a Empregada de Endymion". Você só pode usar cada efeito de "Genni, a Empregada de Endymion" uma vez por turno.
  | es_text             = (Esta carta se trata siempre como una carta "Artibruja").<br />Si controlas un monstruo Lanzador de Conjuros y esta carta está en tu mano: puedes Invocar esta carta de Modo Especial. Durante la Main Phase (Efecto Rápido): puedes seleccionar 1 monstruo Lanzador de Conjuros que controles; destiérralo y, si lo haces, Invoca de Modo Especial, desde tu Deck, 1 monstruo "Artibruja", excepto "Genni, la Criada de Endimión". Sólo puedes usar cada efecto de "Genni, la Criada de Endimión" una vez por turno.
  | ja_text             = このカード名はルール上「ウィッチクラフト」カードとしても扱う。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在し、自分フィールドに魔法使い族モンスターが存在する場合に発動できる。このカードを特殊召喚する。②：自分・相手のメインフェイズに、自分フィールドの魔法使い族モンスター１体を対象として発動できる。そのモンスターを除外し、デッキから「エンディミオンの侍女ジェニー」以外の「ウィッチクラフト」モンスター１体を特殊召喚する。
  | ko_text             = 이 카드명은 룰상 "위치크래프트" 카드로도 취급한다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재하고, 자신 필드에 마법사족 몬스터가 존재할 경우에 발동할 수 있다. 이 카드를 특수 소환한다. ②: 자신 / 상대의 메인 페이즈에, 자신 필드의 마법사족 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 제외하고, 덱에서 "엔디미온의 시녀 제니" 이외의 "위치크래프트" 몬스터 1장을 특수 소환한다.
  | sc_text             = 此卡名在规则上也视为“魔女工艺”卡。此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌，且自己场上存在魔法师族怪兽的情况下可以发动。将此卡特殊召唤。②：在自己・对手的主要阶段，以自己场上的1只魔法师族怪兽为对象可以发动。将该怪兽除外，从牌组将“恩底弥翁的侍女 杰妮”以外的1只“魔女工艺”怪兽特殊召唤。
