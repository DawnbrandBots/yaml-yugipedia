  | de_text             = (Diese Karte wird immer als „Finsterlord“-Karte behandelt.)<br />Lege 1 Fee-Monster von deiner Hand oder offen von deiner Spielfeldseite auf den Friedhof; beschwöre 1 „Finsterlord“-Monster als Spezialbeschwörung von deiner Hand, deinem Deck oder deinen verbannten Karten, ungeachtet seiner Beschwörungsbedingungen. Du kannst nur 1 „Gefallener Engel in Dunkelheit“ pro Spielzug aktivieren.
  | it_text             = (Questa carta viene sempre considerata come una carta "Signore Oscuro".)<br />Manda 1 mostro Fata dalla tua mano o Terreno scoperto al Cimitero; Evoca Specialmente 1 mostro "Signore Oscuro" dalla tua mano, Deck o carte bandite, ignorando le sue condizioni di Evocazione. Puoi attivare solo 1 "Angelo Caduto nell'Oscurità" per turno.
