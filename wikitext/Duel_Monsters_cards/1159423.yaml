  | es_text             = (Esta carta se trata siempre como una carta "Señoroscuro/a").<br />Manda al Cementerio 1 monstruo Hada en tu mano o Campo boca arriba; Invoca de Modo Especial, desde tu mano, Deck o destierro, 1 monstruo "Señoroscuro/a", ignorando sus condiciones de Invocación. Sólo puedes activar 1 "Ángel Caído en la Oscuridad" por turno.
