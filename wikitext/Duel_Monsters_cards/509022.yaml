  | fr_text             = Une fois par tour, si un monstre "HÉROS de la Destinée" que vous contrôlez (exceptée cette carte) est détruit au combat et envoyé au Cimetière, vous pouvez faire l'Invocation Spéciale de ce 1 monstre durant votre prochaine Standby Phase.
  | de_text             = Einmal pro Spielzug, während deiner Standby Phase: Du kannst 1 „Schicksals-HELD“-Monster in deinem Friedhof wählen, das seit deiner letzten Standby Phase durch Kampf zerstört wurde, falls du diese offene Karte kontrolliert hast, als das gewählte Ziel zerstört wurde; beschwöre das gewählte Ziel als Spezialbeschwörung.
  | it_text             = Una volta per turno, durante la tua Standby Phase: puoi scegliere come bersaglio nel tuo Cimitero 1 mostro "EROE del Destino" che è stato distrutto in battaglia dalla tua ultima Standby Phase, se tu controllavi questa carta scoperta quando quel bersaglio è stato distrutto; Evoca Specialmente quel bersaglio.
  | pt_text             = 
  | es_text             = Una vez por turno, mientras esta carta esté boca arriba en tu Campo, si un monstruo en tu Campo que incluya "HÉROE del Destino" en su nombre (exceptuando esta carta) es destruido como resultado de una batalla y mandado al Cementerio, puedes Invocar mediante una Invocación Especial ese monstruo a tu Campo durante tu próxima Standby Phase.
  | ja_text             = ①：このカードがモンスターゾーンに存在する状態で、他の自分の「Ｄ－ＨＥＲＯ」モンスターが戦闘で破壊され墓地へ送られた場合、次の自分スタンバイフェイズにその内の１体を対象として発動できる。そのモンスターを自分フィールドに特殊召喚する。
  | ko_text             = 이 카드가 자신 필드 위에 앞면 표시로 존재할 때, 이 카드 이외의 자신 필드 위의 "데스티니 히어로"라는 이름이 붙은 몬스터가 전투에 의해서 파괴되어 묘지로 보내졌을 경우, 그 몬스터 1장을 다음 자신의 스텐바이 페이즈시에 자신 필드 위에 특수 소환할 수 있다. 이 효과는 1턴에 1번밖에 사용할 수 없다.
