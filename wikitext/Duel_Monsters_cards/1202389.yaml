  | text                  = 1 [[Tuner]] + 1+ non-Tuners<br />You can [[target]] 1 [[monster]] your opponent [[control]]s; [[banish]] it. If this card is placed in the [[Spell & Trap Zone]] as a [[Continuous Spell]]: You can [[Add a card|add]] 1 "[[Angelechy]]" [[Trap]] from your [[Main Deck|Deck]] or [[GY]] to your [[hand]]. You can only use each of the preceding effects of "Angelechy Shatranga" [[once per turn]]. While this card is treated as a Continuous Spell, your opponent can only attempt to [[activate]] up to 5 [[monster effect]]s per turn.
  | fr_text               = 1 Syntoniseur + 1+ non-Syntoniseur<br />Vous pouvez cibler 1 monstre contrôlé par votre adversaire ; bannissez-le. Si cette carte est placée dans la Zone Magie & Piège comme Magie Continue : vous pouvez ajouter 1 Piège "Angetélité" depuis votre Deck ou Cimetière à votre main. Vous ne pouvez utiliser chacun des effets précédents de "Shatranga Angetélité" qu'une fois par tour. Tant que cette carte est traitée comme Magie Continue, votre adversaire ne peut tenter d'activer que max. 5 effets de monstre par tour.
  | de_text               = 1 Empfänger + 1+ Nicht-Empfänger<br />Du kannst 1 Monster wählen, das dein Gegner kontrolliert; verbanne es. Falls diese Karte als Permanenter Zauber in die Zauber- & Fallenzone gelegt wird: Du kannst deiner Hand 1 „Engelechy“-Falle von deinem Deck oder Friedhof hinzufügen. Du kannst jeden der vorherigen Effekte von „Engelechy Shatranga“ nur einmal pro Spielzug verwenden. Solange diese Karte als Permanenter Zauber behandelt wird, kann dein Gegner nur versuchen, bis zu 5 Monstereffekte pro Spielzug zu aktivieren.
  | it_text               = 1 Tuner + 1+ non-Tuner<br />Puoi scegliere come bersaglio 1 mostro controllato dal tuo avversario; bandiscilo. Se questa carta viene messa nella Zona Magie & Trappole come una Magia Continua: puoi aggiungere 1 Trappola "Angelechy" dal tuo Deck o Cimitero alla tua mano. Puoi utilizzare ognuno dei precedenti effetti di "Angelechy Shatranga" una sola volta per turno. Mentre questa carta viene considerata come una Magia Continua, il tuo avversario può tentare di attivare solo fino a 5 effetti di mostri per turno.
  | pt_text               = 1 Regulador + 1+ não-Reguladores<br />Você pode escolher 1 monstro que seu oponente controla; bana-o. Se este card for colocado na Zona de Magias & Armadilhas como uma Magia Contínua: você pode adicionar 1 Armadilha "Anjoléquia" do seu Deck ou Cemitério à sua mão. Você só pode usar cada um dos efeitos anteriores de "Shatranga de Anjoléquia" uma vez por turno. Enquanto este card for considerado como uma Magia Contínua, seu oponente só pode tentar ativar até 5 efeitos de monstro por turno.
  | es_text               = 1 Cantante + 1+ no Cantantes<br />Puedes seleccionar 1 monstruo que controle tu adversario; destiérralo. Si esta carta es puesta en la Zona de Magia y Trampas como una Mágica Continua: puedes añadir a tu mano 1 Trampa "Angelequia" en tu Deck o Cementerio. Sólo puedes usar cada uno de los previos efectos de "Angelequia Shatranga" una vez por turno. Mientras esta carta sea tratada como una Mágica Continua, tu adversario sólo puede intentar activar hasta 5 efectos de monstruos por turno.
