  | text                 = 1 "[[Shaddoll]]" [[monster]] + 1 [[WIND]] monster<br />Must first be [[Fusion Summon]]ed. ([[Quick Effect]]): You can change any number of [[face-down]] monsters on the [[field]] to [[face-up]] [[Defense Position]], then, you can count the number of [[Flip monster]]s among them, and change up to that many face-up monsters on the field (except those flipped monsters) to face-down Defense Position. You can only use this effect of "Reeshaddoll Wendikuruhu" [[once per turn]]. If this card is sent to the [[GY]]: You can [[target]] 1 "Shaddoll" card in your GY; [[Add a card|add]] it to your [[hand]].
  | fr_text              = 1 monstre "Marionnette de l'Ombre" + 1 monstre VENT<br />Doit d'abord être Invoquée par Fusion. (Effet Rapide) : vous pouvez changer un nombre de votre choix de monstres face verso sur le Terrain en Position de Défense face recto, puis, vous pouvez compter le nombre de monstres Flip parmi eux, et changez max. autant de monstres face recto sur le Terrain (les monstres changés exclus) en Position de Défense face verso. Vous ne pouvez utiliser cet effet de "Wendikuruhu Marionnette de l'Ombre Ree" qu'une fois par tour. Si cette carte est envoyée au Cimetière : vous pouvez cibler 1 carte "Marionnette de l'Ombre" dans votre Cimetière ; ajoutez-la à votre main.
  | de_text              = 1 „Schattenpuppe“-Monster + 1 WIND Monster<br />Muss erst als Fusionsbeschwörung beschworen werden. (Schnelleffekt): Du kannst eine beliebige Anzahl verdeckter Monster auf dem Spielfeld in die offene Verteidigungsposition ändern, dann kannst du die Flippmonster unter ihnen zählen und bis zu ebenso viele offene Monster auf dem Spielfeld (außer jenen geänderten Monstern) in die verdeckte Verteidigungsposition ändern. Du kannst diesen Effekt von „Reeschattenpuppe Wendikuruhu“ nur einmal pro Spielzug verwenden. Falls diese Karte auf den Friedhof gelegt wird: Du kannst 1 „Schattenpuppe“-Karte in deinem Friedhof wählen; füge sie deiner Hand hinzu.
  | it_text              = 1 mostro "Bambolaombra" + 1 mostro VENTO<br />Deve prima essere Evocato tramite Fusione. (Effetto Rapido): puoi mettere scoperti in Posizione di Difesa un qualsiasi numero di mostri coperti sul Terreno, poi, puoi contare il numero di mostri Scoperta tra di essi e mettere coperti in Posizione di Difesa mostri scoperti sul Terreno fino a quel numero (eccetto quei mostri che sono stati scoperti). Puoi utilizzare questo effetto di "Reebambolaombra Wendikuruhu" una sola volta per turno. Se questa carta viene mandata al Cimitero: puoi scegliere come bersaglio 1 carta "Bambolaombra" nel tuo Cimitero; aggiungila alla tua mano.
  | pt_text              = 1 monstro "Sombraneco" + 1 monstro de VENTO<br />Primeiro deve ser Invocado por Invocação-Fusão. (Efeito Rápido): você pode colocar qualquer número de monstros que estiverem com a face para baixo no campo, com a face para cima em Posição de Defesa e, depois, você pode contar o número de monstros de Virar entre eles e colocar até esse número de monstros com a face para cima no campo (exceto aqueles monstros que foram virados), com a face para baixo em Posição de Defesa. Você só pode usar este efeito de "Wendikuruhu Reesombraneco" uma vez por turno. Se este card for enviado para o Cemitério: você pode escolher 1 card "Sombraneco" no seu Cemitério; adicione-o à sua mão.
  | es_text              = 1 monstruo "Sombrañeca" + 1 monstruo de VIENTO<br />Debe ser primero Invocado por Fusión. (Efecto Rápido): puedes cambiar cualquier número de monstruos boca abajo en el Campo a Posición de Defensa boca arriba, y después puedes contar el número de monstruos de Volteo entre ellos, y cambiar hasta ese número de monstruos boca arriba en el Campo (excepto esos monstruos volteados), a Posición de Defensa boca abajo. Sólo puedes usar este efecto de "Wendikuruhu Reesombrañeca" una vez por turno. Si esta carta es mandada al Cementerio: puedes seleccionar 1 carta "Sombrañeca" en tu Cementerio; añádela a tu mano.
  | ja_text              = 「シャドール」モンスター＋風属性モンスター<br />このカードは融合召喚でのみＥＸデッキから特殊召喚できる。このカード名の①の効果は１ターンに１度しか使用できない。①：自分・相手ターンに発動できる。フィールドの裏側表示モンスターを任意の数だけ表側守備表示にする。その後、その内のリバースモンスターの数まで、表側守備表示にしたモンスター以外の表側表示モンスターを裏側守備表示にできる。②：このカードが墓地へ送られた場合、自分の墓地の「シャドール」カード１枚を対象として発動できる。そのカードを手札に加える。
  | ko_text              = "섀도르" 몬스터 ＋ 바람 속성 몬스터<br />이 카드는 융합 소환으로만 엑스트라 덱에서 특수 소환할 수 있다. 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대 턴에 발동할 수 있다. 필드의 뒷면 표시 몬스터를 임의의 수만큼 앞면 수비 표시로 한다. 그 후, 그 중의 리버스 몬스터의 수까지, 앞면 수비 표시로 한 몬스터 이외의 앞면 표시 몬스터를 뒷면 수비 표시로 할 수 있다. ②: 이 카드가 묘지로 보내졌을 경우, 자신 묘지의 "섀도르" 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 패에 넣는다.
  | sc_text              = “影依”怪兽＋风属性怪兽<br />此卡从额外牌组仅可通过融合召唤来特殊召唤。此卡名的①效果1回合仅可使用1次。①：在自己・对手回合中可以发动。将场上任意数量的里侧表示怪兽改成表侧守备表示。然后，以其中反转怪兽的数量为上限，可将改成了表侧守备表示的怪兽以外的、表侧表示怪兽改成里侧守备表示。②：此卡被送至墓地的情况下，以自己墓地的1张“影依”卡为对象可以发动。将该卡加入手牌。
