  | text                = [[Once per turn]], when an [[attack]] is [[declare]]d involving your [[monster]]: You can roll a six-sided die and apply this [[effect]] to your monster based on the result, until the end of this [[turn]]. If both monsters were in the same [[column]] when this effect was activated, choose the effect instead of rolling.<br />● 1 or 4: The first time it would be [[destroyed by battle]] or card effect, it is not destroyed.<br />● 2 or 5: It loses 500 [[ATK]], also it is [[unaffected]] by activated Spell/Trap effects, except "First Striker Advantage".<br />● 3 or 6: It gains 1000 ATK, also it can make up to 2 attacks on monsters during each Battle Phase.
  | fr_text             = Une fois par tour, lorsqu'une attaque est déclarée impliquant votre monstre : vous pouvez lancer un dé à six faces, et appliquez cet effet à votre monstre selon le résultat jusqu'à la fin de ce tour. Si les deux monstres étaient dans la même colonne lorsque cet effet a été activé, choisissez l'effet au lieu de lancer.<br />● 1 ou 4 : La première fois qu'il va être détruit au combat ou par un effet de carte, il n'est pas détruit.<br />● 2 ou 5 : Il perd 500 ATK, et aussi, il n'est pas affecté par des effets de Magie/Piège activés ("Avantage de l'Initiative" exclu).<br />● 3 ou 6 : Il gagne 1000 ATK, et aussi, il peut faire max. 2 attaques sur des monstres durant chaque Battle Phase.
  | de_text             = Einmal pro Spielzug, wenn ein Angriff deklariert wird, an dem dein Monster beteiligt ist: Du kannst einen sechsseitigen Würfel werfen und diesen Effekt bis zum Ende dieses Spielzugs auf dein Monster anwenden, basierend auf dem Ergebnis. Falls beide Monster in derselben Spalte lagen, als dieser Effekt aktiviert wurde, bestimme den Effekt, anstatt einen Würfel zu werfen.<br />● 1 oder 4: Das erste Mal, dass es durch Kampf oder einen Karteneffekt zerstört würde, wird es nicht zerstört.<br />● 2 oder 5: Es verliert 500 ATK, zusätzlich bleibt es von aktivierten Zauber-/Falleneffekten unberührt, außer von „Vorteil des Erstschlags“.<br />● 3 oder 6: Es erhält 1000 ATK, zusätzlich kann es während jeder Battle Phase bis zu 2 Angriffe gegen Monster durchführen.
  | it_text             = Una volta per turno, quando viene dichiarato un attacco che coinvolge un tuo mostro: puoi tirare un dado a sei facce e applicare questo effetto al tuo mostro a seconda del risultato, fino alla fine di questo turno. Se entrambi i mostri erano nella stessa colonna quando questo effetto è stato attivato, seleziona l'effetto invece di tirare.<br />● 1 o 4: La prima volta che sta per essere distrutto in battaglia o dall'effetto di una carta, non viene distrutto.<br />● 2 o 5: Esso perde 500 ATK, inoltre è immune agli effetti attivati delle Magie/Trappole, eccetto "Vantaggio del Primo Colpo".<br />● 3 o 6: Esso guadagna 1000 ATK, inoltre esso può effettuare fino a 2 attacchi su mostri durante ogni Battle Phase.
  | pt_text             = Uma vez por turno, quando um ataque for declarado envolvendo um monstro seu: você pode lançar um dado de seis faces e aplicar este efeito ao seu monstro de acordo com o resultado, até o final deste turno. Se os dois monstros estavam na mesma coluna quando este efeito foi ativado, selecione o efeito em vez de lançar o dado.<br />● 1 ou 4: Na primeira vez que ele seria destruído em batalha ou por um efeito de card, ele não é destruído.<br />● 2 ou 5: Ele perde 500 de ATK e, além disso, ele não é afetado por efeitos ativados de Magias/Armadilhas, exceto "Vantagem do Primeiro Atacante".<br />● 3 ou 6: Ele ganha 1000 de ATK e, além disso, ele pode realizar até 2 ataques contra monstros durante cada Fase de Batalha.
  | es_text             = Una vez por turno, cuando es declarado un ataque que involucra tu monstruo: puedes lanzar un dado de seis caras y aplicar este efecto a tu monstruo basándote en el resultado, hasta el final de este turno. Si ambos monstruos estaban en la misma columna cuando este efecto fue activado, elige el efecto en lugar de lanzar.<br />● 1 o 4: La primera vez que el monstruo fuera a ser destruido en batalla o por el efecto de una carta, no es destruido.<br />● 2 o 5: El monstruo pierde 500 ATK, y además no es afectado por efectos activados de Mágicas/Trampas, excepto "Ventaja de Quien Golpea Primero".<br />● 3 o 6: El monstruo gana 1000 ATK, y además puede hacer hasta 2 ataques a monstruos durante cada Battle Phase.
  | ja_text             = ①：１ターンに１度、自分のモンスターが戦闘を行う攻撃宣言時に発動できる。サイコロを１回振り、出た目によって以下の効果をその自分のモンスターにターン終了時まで適用する。同じ縦列のモンスター同士が戦闘を行う攻撃宣言時に発動した場合、サイコロを振らず以下の効果から１つを選ぶ。<br />●１・４：１度だけ戦闘・効果では破壊されない。●２・５：攻撃力が５００ダウンし、「先手必掌」以外の魔法・罠カードが発動した効果を受けない。●３・６：攻撃力が１０００アップし、１度のバトルフェイズ中に２回までモンスターに攻撃できる。
