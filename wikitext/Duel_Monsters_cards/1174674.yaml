  | text                = 1 [[Tuner]] + 1+ non-Tuners<br />If this card is [[Synchro Summon]]ed using a "[[Blackwing]]" [[monster]] as [[material]], it is treated as a [[Tuner]] while [[face-up]] on the [[field]]. After this card is Synchro Summoned, for the rest of this [[turn]], it gains [[ATK]] equal to the total [[original ATK]] of the [[Synchro Monster]]s used as its material. Can [[attack]] all your opponent's monsters, once each. If this card attacks a [[Defense Position]] monster, inflict [[piercing]] [[battle damage]] to your opponent.
