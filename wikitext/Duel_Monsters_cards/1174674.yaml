  | ja_text             = チューナー＋チューナー以外のモンスター１体以上<br />①：「ＢＦ」モンスターを素材としてＳ召喚したこのカードはチューナーとして扱う。②：このカードがＳ召喚した時に適用する。このカードの攻撃力はターン終了時まで、そのＳ素材としたＳモンスターの元々の攻撃力の合計分アップする。③：このカードは相手モンスター全てに１回ずつ攻撃でき、守備表示モンスターを攻撃した場合、その守備力を攻撃力が超えた分だけ相手に戦闘ダメージを与える。
  | ko_text             = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />①: "BF(블랙 페더)" 몬스터를 소재로서 싱크로 소환한 이 카드는 튜너로 취급한다. ②: 이 카드를 싱크로 소환했을 때에 적용한다. 이 카드의 공격력은 턴 종료시까지, 그 싱크로 소재로 한 싱크로 몬스터의 원래 공격력의 합계만큼 올린다. ③: 이 카드는 상대 몬스터 전부에 1회씩 공격할 수 있고, 수비 표시 몬스터를 공격했을 경우, 그 수비력을 공격력이 넘은 만큼만 상대에게 전투 데미지를 준다.
  | sc_text             = 协调＋协调以外的怪兽1只以上<br />①：以“黑羽”怪兽作为素材同步召唤的此卡视为协调。②：此卡同步召唤时适用。此卡的攻击力直至回合结束时为止，上升相当于作为其同步素材的同步怪兽的原本攻击力的合计数值。③：此卡可攻击所有对手怪兽各1次，攻击守备表示怪兽的情况下，依攻击力超出该怪兽守备力的数值来给予对手战斗伤害。
