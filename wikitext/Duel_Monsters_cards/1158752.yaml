  | text                  = A "[[Red Dragon Archfiend]]" that was [[Synchro Summon]]ed using this card as [[material]] cannot be [[destroyed by battle]]. You can only use each of the following [[effect]]s of "Power Vice Dragon" [[once per turn]]. If you [[control]] no [[monsters]], or all monsters you control are [[DARK]] [[Synchro Monster]]s: You can [[Special Summon]] this card from your [[hand]]. If this card is Special Summoned: You can [[Add a card|add]] 1 "[[Resonator]]" monster from your [[Main Deck|Deck]] to your hand, also you cannot Special Summon from the [[Extra Deck]] for the rest of this turn, except DARK Synchro Monsters.
  | fr_text               = "Dragon Rouge Archdémon" qui a été Invoqué par Synchronisation en utilisant cette carte comme Matériel ne peut pas être détruit au combat. Vous ne pouvez utiliser chacun des effets suivants de "Dragon Cruel Puissant" qu'une fois par tour. Si vous ne contrôlez aucun monstre, ou si tous les monstres que vous contrôlez sont des Monstres Synchro TÉNÈBRES : vous pouvez Invoquer Spécialement cette carte depuis votre main. Si cette carte est Invoquée Spécialement : vous pouvez ajouter 1 monstre "Diapason" depuis votre Deck à votre main, et aussi, vous ne pouvez pas Invoquer Spécialement (Monstres Synchro TÉNÈBRES exclus) depuis l'Extra Deck le reste de ce tour.
  | de_text               = Ein „Rotdrachen-Erzunterweltler“, der als Synchrobeschwörung beschworen wurde, indem diese Karte als Material verwendet wurde, kann nicht durch Kampf zerstört werden. Du kannst jeden der folgenden Effekte von „Macht-Vizedrache“ nur einmal pro Spielzug verwenden. Falls du keine Monster kontrollierst oder alle Monster, die du kontrollierst, FINSTERNIS Synchromonster sind: Du kannst diese Karte als Spezialbeschwörung von deiner Hand beschwören. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Resonator“-Monster von deinem Deck hinzufügen, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von FINSTERNIS Synchromonstern.
  | it_text               = Un "Arcidemone Drago Rosso" che è stato Synchro Evocato utilizzando questa carta come materiale non può essere distrutto in battaglia. Puoi utilizzare ognuno dei seguenti effetti di "Drago del Vizio Potente" una sola volta per turno. Se non controlli nessun mostro, o tutti i mostri che controlli sono Mostri Synchro OSCURITÀ: puoi Evocare Specialmente questa carta dalla tua mano. Se questa carta viene Evocata Specialmente: puoi aggiungere 1 mostro "Diapason" dal tuo Deck alla tua mano, inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno, eccetto Mostri Synchro OSCURITÀ.
  | pt_text               = Um "Dragão Vermelho Arquidemônio" que foi Invocado por Invocação-Sincro usando este card como matéria não pode ser destruído em batalha. Você só pode usar cada um dos seguintes efeitos de "Poderoso Vice-Dragão" uma vez por turno. Se você não controlar nenhum monstro, ou todos os monstros que você controla forem Monstros Sincro de TREVAS: você pode Invocar este card por Invocação-Especial da sua mão. Se este card for Invocado por Invocação-Especial: você pode adicionar 1 monstro "Ressonador" do seu Deck à sua mão e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno, exceto Monstros Sincro de TREVAS.
  | es_text               = Un "Dragón Rojo Archidemonio" que fue Invocado por Sincronía usando esta carta como material no puede ser destruido en batalla. Sólo puedes usar cada uno de los siguientes efectos de "Vice Dragón de Poder" una vez por turno. Si no controlas monstruos, o todos los monstruos que controlas son Monstruos de Sincronía de OSCURIDAD: puedes Invocar esta carta de Modo Especial desde tu mano. Si esta carta es Invocada de Modo Especial: puedes añadir a tu mano 1 monstruo "Resonador" en tu Deck, y además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno, excepto Monstruos de Sincronía de OSCURIDAD.
  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドのモンスターが、存在しない場合または闇属性Ｓモンスターのみの場合に発動できる。このカードを手札から特殊召喚する。②：このカードが特殊召喚した場合に発動できる。デッキから「リゾネーター」モンスター１体を手札に加える。このターン、自分は闇属性ＳモンスターしかＥＸデッキから特殊召喚できない。③：このカードをＳ素材として「レッド・デーモンズ・ドラゴン」をＳ召喚した場合、そのモンスターは戦闘では破壊されない。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드의 몬스터가, 존재하지 않을 경우 또는 어둠 속성 싱크로 몬스터뿐일 경우에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 덱에서 "레조네이터" 몬스터 1장을 패에 넣는다. 이 턴에, 자신은 어둠 속성 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다. ③: 이 카드를 싱크로 소재로서 "레드 데몬즈 드래곤"을 싱크로 소환했을 경우, 그 몬스터는 전투로는 파괴되지 않는다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：自己场上的怪兽，不存在的情况下或均为暗属性同步怪兽的情况下可以发动。从手牌将此卡特殊召唤。②：此卡特殊召唤的情况下可以发动。从牌组将1只“共鸣者”怪兽加入手牌。此回合，自己从额外牌组仅可特殊召唤暗属性同步怪兽。③：以此卡作为同步素材将“暗红恶魔龙”同步召唤的情况下，该怪兽不会因战斗被破坏。
