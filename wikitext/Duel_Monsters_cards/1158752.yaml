  | text                  = A "[[Red Dragon Archfiend]]" that was [[Synchro Summon]]ed using this card as [[material]] cannot be [[destroyed by battle]]. You can only use each of the following [[effect]]s of "Power Vice Dragon" [[once per turn]]. If you [[control]] no [[monsters]], or all monsters you control are [[DARK]] [[Synchro Monster]]s: You can [[Special Summon]] this card from your [[hand]]. If this card is Special Summoned: You can [[Add a card|add]] 1 "[[Resonator]]" monster from your [[Main Deck|Deck]] to your hand, also you cannot Special Summon from the [[Extra Deck]] for the rest of this turn, except DARK Synchro Monsters.
