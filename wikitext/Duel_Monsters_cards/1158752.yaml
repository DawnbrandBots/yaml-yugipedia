  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドのモンスターが、存在しない場合または闇属性Ｓモンスターのみの場合に発動できる。このカードを手札から特殊召喚する。②：このカードが特殊召喚した場合に発動できる。デッキから「リゾネーター」モンスター１体を手札に加える。このターン、自分は闇属性ＳモンスターしかＥＸデッキから特殊召喚できない。③：このカードをＳ素材として「レッド・デーモンズ・ドラゴン」をＳ召喚した場合、そのモンスターは戦闘では破壊されない。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드의 몬스터가, 존재하지 않을 경우 또는 어둠 속성 싱크로 몬스터뿐일 경우에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 덱에서 "레조네이터" 몬스터 1장을 패에 넣는다. 이 턴에, 자신은 어둠 속성 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다. ③: 이 카드를 싱크로 소재로서 "레드 데몬즈 드래곤"을 싱크로 소환했을 경우, 그 몬스터는 전투로는 파괴되지 않는다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：自己场上的怪兽，不存在的情况下或均为暗属性同步怪兽的情况下可以发动。从手牌将此卡特殊召唤。②：此卡特殊召唤的情况下可以发动。从牌组将1只“共鸣者”怪兽加入手牌。此回合，自己从额外牌组仅可特殊召唤暗属性同步怪兽。③：以此卡作为同步素材将“暗红恶魔龙”同步召唤的情况下，该怪兽不会因战斗被破坏。
