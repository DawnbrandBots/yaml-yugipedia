  | text                  = If you [[control]] no [[monsters]], you can [[Special Summon]] this card (from your [[hand]]). You can only Special Summon "The Phantom Knights of Doomed Soleret" [[once per turn]] this way. You can only use each of the following [[effect]]s of "The Phantom Knights of Doomed Soleret" once per turn. If this card is [[Normal Summon|Normal]] or Special Summoned: You can [[Set]] 1 "[[The Phantom Knights]]" [[Spell]]/[[Trap]] from your [[Main Deck|Deck]]. You can [[banish]] this card from your [[GY]], then [[target]] up to 2 [[Level]]/[[Rank]] 3 [[DARK]] monsters you control; increase their Levels/Ranks by 1.
  | fr_text               = Si vous ne contrôlez aucun monstre, vous pouvez Invoquer Spécialement cette carte (depuis votre main). Vous ne pouvez Invoquer Spécialement "Les Chevaliers Fantômes du Soleret Condamné" qu'une fois par tour de cette façon. Vous ne pouvez utiliser chacun des effets suivants de "Les Chevaliers Fantômes du Soleret Condamné" qu'une fois par tour. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez Poser 1 Magie/Piège "Les Chevaliers Fantômes" depuis votre Deck. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez max. 2 monstres TÉNÈBRES de Niveau/Rang 3 que vous contrôlez ; augmentez leur Niveau/Rang de 1.
  | de_text               = Falls du keine Monster kontrollierst, kannst du diese Karte als Spezialbeschwörung (von deiner Hand) beschwören. Du kannst „Die Phantomritter des Verhängnisvollen Eisenschuhs“ nur einmal pro Spielzug auf diese Art als Spezialbeschwörung beschwören. Du kannst jeden der folgenden Effekte von „Die Phantomritter des Verhängnisvollen Eisenschuhs“ nur einmal pro Spielzug verwenden. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst 1 „Die Phantomritter“-Zauber/Falle von deinem Deck setzen. Du kannst diese Karte von deinem Friedhof verbannen und dann bis zu 2 FINSTERNIS Monster der Stufe / des Rangs 3 wählen, die du kontrollierst; erhöhe ihre Stufen/Ränge um 1.
  | it_text               = Se non controlli nessun mostro, puoi Evocare Specialmente questa carta (dalla tua mano). Puoi Evocare Specialmente "I Cavalieri Fantasma dei Soleret Dannati" una sola volta per turno in questo modo. Puoi utilizzare ognuno dei seguenti effetti di "I Cavalieri Fantasma dei Soleret Dannati" una sola volta per turno. Se questa carta viene Evocata Normalmente o Specialmente: puoi Posizionare 1 Magia/Trappola "I Cavalieri Fantasma" dal tuo Deck. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio fino a 2 mostri OSCURITÀ di Livello/Rango 3 che controlli; aumenta i loro Livelli/Ranghi di 1.
  | pt_text               = Se você não controlar nenhum monstro, você pode Invocar este card por Invocação-Especial (da sua mão). Você só pode Invocar "Os Cavaleiros Fantasmas de Soleret Condenado" por Invocação-Especial uma vez por turno desta forma. Você só pode usar cada um dos seguintes efeitos de "Os Cavaleiros Fantasmas de Soleret Condenado" uma vez por turno. Se este card for Invocado por Invocação-Normal ou Especial: você pode Baixar 1 Magia/Armadilha "Os Cavaleiros Fantasmas" do seu Deck. Você pode banir este card do seu Cemitério e, depois, escolha até 2 monstros de TREVAS de Nível/Classe 3 que você controla; aumente o Nível/Classe deles em 1.
  | es_text               = Si no controlas monstruos, puedes Invocar esta carta de Modo Especial (desde tu mano). Sólo puedes Invocar de Modo Especial "Los Caballeros Fantasma del Escarpe Condenado" una vez por turno de esta forma. Sólo puedes usar cada uno de los siguientes efectos de "Los Caballeros Fantasma del Escarpe Condenado" una vez por turno. Si esta carta es Invocada de Modo Normal o Especial: puedes Colocar 1 Mágica/Trampa "Los Caballeros Fantasma" desde tu Deck. Puedes desterrar esta carta en tu Cementerio, y después selecciona hasta 2 monstruos de OSCURIDAD de Nivel/Rango 3 que controles; aumenta sus Niveles/Rangos en 1.
  | ja_text               = このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドにモンスターが存在しない場合、このカードは手札から特殊召喚できる。②：このカードが召喚・特殊召喚した場合に発動できる。デッキから「幻影騎士団」魔法・罠カード１枚を自分フィールドにセットする。③：墓地のこのカードを除外し、自分フィールドのレベル３・ランク３の闇属性モンスターを２体まで対象として発動できる。そのモンスターのレベル・ランクを１つ上げる。
  | ko_text               = 
  | sc_text               = 此卡名以①方法的特殊召唤1回合仅可进行1次，且②③效果1回合仅可各使用1次。①：自己场上不存在怪兽的情况下，此卡可从手牌特殊召唤。②：此卡召唤・特殊召唤的情况下可以发动。从牌组将1张“魅影骑士团”魔法・陷阱卡放置在自己场上。③：将墓地的此卡除外，以自己场上的最多2只等级3・阶级3的暗属性怪兽为对象可以发动。该怪兽的等级・阶级上升1。
