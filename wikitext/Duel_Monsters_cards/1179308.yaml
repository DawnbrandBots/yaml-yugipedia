  | text                  = Up to thrice per [[turn]], during your [[Main Phase]]: You can [[send]] 3 other cards of the same type ([[Monster]], [[Spell]], or [[Trap]]) from your [[hand]] and/or [[face-up]] [[field]] to the [[GY]], then you can [[Special Summon]] 1 "[[Sacred Beast (archetype)|Sacred Beast]]" monster from your hand, [[Main Deck|Deck]], GY, or [[banish]]ment, and if you do, it is [[unaffected]] by your opponent's [[activate]]d Spell/Trap [[effect]]s. If you [[control]] a "Sacred Beast" monster whose original [[Level]] is 10: You can [[Draw a card|draw]] 2 cards. You can only use this [[effect]] of "Fallen Paradise of the Sacred Beasts" once per turn.
  | fr_text               = Max. trois fois par tour, durant votre Main Phase : vous pouvez envoyer 3 autres cartes du même type (Monstre, Magie ou Piège) depuis votre main et/ou Terrain face recto au Cimetière, puis vous pouvez Invoquer Spécialement 1 monstre "Bêtes Sacrées" depuis votre main, Deck, Cimetière ou bannissement, et si vous le faites, il n'est pas affecté par les effets de Magie/Piège activés de votre adversaire. Si vous contrôlez un monstre "Bêtes Sacrées" dont le Niveau d'origine est 10 : vous pouvez piocher 2 cartes. Vous ne pouvez utiliser cet effet de "Paradis Perdu des Bêtes Sacrées" qu'une fois par tour.
  | de_text               = Bis zu dreimal pro Spielzug, während deiner Main Phase: Du kannst 3 andere Karten desselben Typs (Monster, Zauber oder Falle) von deiner Hand und/oder offen von deiner Spielfeldseite auf den Friedhof legen, dann kannst du 1 „Heiligen Ungeheuer“-Monster als Spezialbeschwörung von deiner Hand, deinem Deck, deinem Friedhof oder deinen verbannten Karten beschwören und falls du dies tust, bleibt es von aktivierten Zauber-/Falleneffekten deines Gegners unberührt. Falls du ein „Heiligen Ungeheuer“-Monster kontrollierst, dessen Grund-Stufe 10 ist: Du kannst 2 Karten ziehen. Du kannst diesen Effekt von „Verlorenes Paradies der heiligen Ungeheuer“ nur einmal pro Spielzug verwenden.
  | it_text               = Fino a tre volte per turno, durante la tua Main Phase: puoi mandare altre 3 carte dello stesso tipo (Mostro, Magia o Trappola) dalla tua mano e/o Terreno scoperto al Cimitero, poi puoi Evocare Specialmente 1 mostro "Bestia Sacra" dalla tua mano, Deck, Cimitero o carte bandite e, se lo fai, esso è immune agli effetti attivati delle Magie/Trappole del tuo avversario. Se controlli un mostro "Bestia Sacra" il cui Livello originale è 10: puoi pescare 2 carte. Puoi utilizzare questo effetto di "Paradiso Perduto delle Bestie Sacre" una sola volta per turno.
  | pt_text               = Até três vezes por turno, durante sua Fase Principal: você pode enviar 3 outros cards do mesmo tipo (Monstro, Magia ou Armadilha) da sua mão e/ou do campo com a face para cima para o Cemitério e, depois, você pode Invocar por Invocação-Especial 1 monstro "Bestas Sagradas" da sua mão, do Deck, do Cemitério ou do banimento e, se isso acontecer, ele não é afetado pelos efeitos ativados de Magias/Armadilhas do seu oponente. Se você controlar um monstro "Bestas Sagradas" cujo Nível original seja 10: você pode comprar 2 cards. Você só pode usar este efeito de "Paraíso Caído das Bestas Sagradas" uma vez por turno.
  | es_text               = Hasta tres veces por turno, durante tu Main Phase: puedes mandar al Cementerio otras 3 cartas del mismo tipo (Monstruo, Mágica o Trampa) en tu mano y/o Campo boca arriba, y después puedes Invocar de Modo Especial 1 monstruo "Bestias Sagradas" desde tu mano, Deck, Cementerio o destierro y, si lo haces, no es afectado por los efectos activados de Mágicas/Trampas de tu adversario. Si controlas un monstruo "Bestias Sagradas" cuyo Nivel original sea 10: puedes robar 2 cartas. Sólo puedes usar este efecto de "Paraíso Perdido de las Bestias Sagradas" una vez por turno.
  | ja_text               = このカード名の②の効果は１ターンに１度しか使用できない。①：１ターンに３度まで、自分メインフェイズに発動できる。このカード以外の自分の手札・フィールド（表側表示）の同じ種類（モンスター・魔法・罠）のカード３枚を墓地へ送る。その後、自分の手札・デッキ・墓地・除外状態の「三幻魔」モンスター１体を特殊召喚できる。この効果で特殊召喚したモンスターは、相手が発動した魔法・罠カードの効果を受けない。②：自分フィールドに元々のレベルが１０の「三幻魔」モンスターが存在する場合に発動できる。自分は２枚ドローする。
  | ko_text               = 이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 1턴에 3번까지, 자신 메인 페이즈에 발동할 수 있다. 이 카드 이외의 자신의 패 / 필드(앞면 표시)의 같은 종류(몬스터 / 마법 / 함정)의 카드 3장을 묘지로 보낸다. 그 후, 자신의 패 / 덱 / 묘지 / 제외 상태인 "삼환마" 몬스터 1장을 특수 소환할 수 있다. 이 효과로 특수 소환한 몬스터는, 상대가 발동한 마법 / 함정 카드의 효과를 받지 않는다. ②: 자신 필드에 원래의 레벨이 10 인 "삼환마" 몬스터가 존재할 경우에 발동할 수 있다. 자신은 2장 드로우한다.
  | sc_text               = 此卡名的②效果1回合仅可使用1次。①：1回合最多3次，在自己的主要阶段可以发动。将此卡以外的自己手牌・场上（表侧表示）的3张种类（怪兽・魔法・陷阱）相同的卡送至墓地。然后，可将自己手牌・牌组・墓地・除外状态的1只“三幻魔”怪兽特殊召唤。以此效果特殊召唤的怪兽，不受对手发动的魔法・陷阱卡效果影响。②：自己场上存在原本等级为10的“三幻魔”怪兽的情况下可以发动。自己抽2张。
