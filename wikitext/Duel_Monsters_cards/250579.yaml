  | fr_text               = 1 Syntoniseur + 1 monstre non-Syntoniseur ou plus<br />Une fois par tour, lorsque vous recevez des dommages : vous pouvez envoyer max. 5 cartes du dessus de votre Deck au Cimetière, puis si un ou plusieurs monstres ont été envoyés au Cimetière par cet effet, cette carte gagne 400 ATK.
  | de_text               = 1 Empfänger- + 1 oder mehr Nicht-Empfänger-Monster<br />Einmal pro Spielzug, wenn du Schaden erhältst: Du kannst die bis zu 5 obersten Karten deines Decks auf den Friedhof legen, dann, falls durch diesen Effekt Monster auf den Friedhof gelegt wurden, erhält diese Karte 400 ATK.
  | it_text               = 1 Tuner + 1 o più mostri non-Tuner<br />Una volta per turno, quando subisci danno: puoi mandare fino a 5 carte dalla cima del tuo Deck al Cimitero, poi se un qualsiasi mostro è stato mandato al Cimitero da questo effetto, questa carta guadagna 400 ATK.
  | pt_text               = 1 Regulador + 1 ou mais monstros não-Reguladores<br />Uma vez por turno, quando você sofrer dano: você pode enviar até 5 cards do topo do seu Deck para o Cemitério e, depois, se algum monstro foi enviado para o Cemitério por este efeito, este card ganha 400 de ATK.
  | es_text               = 1 Cantante + 1 o más monstruos que no sean Cantantes<br />Una vez por turno, cuando recibes daño: puedes mandar al Cementerio hasta 5 cartas de la parte superior de tu Deck y después, si algún monstruo fue mandado al Cementerio por este efecto, esta carta gana 400 ATK.
  | ja_text               = チューナー＋チューナー以外のモンスター１体以上<br />１ターンに１度、戦闘またはカードの効果によって自分がダメージを受けた時に発動できる。自分のデッキの上からカードを５枚まで墓地へ送る。この効果で墓地へ送ったカードの中にモンスターカードがあった場合、このカードの攻撃力は４００ポイントアップする。
  | ko_text               = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />①: 1턴에 1번, 자신이 전투 / 효과로 데미지를 받았을 때에 발동할 수 있다. 자신의 덱 위에서 카드를 5장까지 묘지로 보낸다. 이 효과로 몬스터가 묘지로 보내졌을 경우, 이 카드의 공격력은 400 올린다.
