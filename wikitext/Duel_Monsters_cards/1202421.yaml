  | fr_text               = 2+ monstres de Niveau 8<br />Si un ou plusieurs monstres sont envoyés au Cimetière de votre adversaire (sauf durant la Damage Step) : vous pouvez en cibler 1 ; attachez-le à cette carte. Vous ne pouvez utiliser cet effet de "Mortilux Heruvur" qu'une fois par tour. Cette carte gagne des effets selon le nombre de Matériels qui lui sont attachés.<br />● 2+ : Non destructible ni au combat ni par des effets de carte.<br />● 3+ : Votre adversaire ne peut pas cibler de cartes dans les Cimetières avec des effets de carte.<br />● 4+ : Vous pouvez détacher 3 Matériels de cette carte ; envoyez 1 monstre sur le Terrain au Cimetière.
  | de_text               = 2+ Monster der Stufe 8<br />Falls ein oder mehr Monster auf den Friedhof deines Gegners gelegt werden (außer während des Damage Steps): Du kannst 1 von ihnen wählen; hänge es an diese Karte an. Du kannst diesen Effekt von „Mortilux Heruvur“ nur einmal pro Spielzug verwenden. Diese Karte erhält Effekte basierend auf der Anzahl des an sie angehängten Materials.<br />● 2+: Kann weder durch Kampf noch durch Karteneffekte zerstört werden.<br />● 3+: Dein Gegner kann Karten in den Friedhöfen nicht als Ziel für Karteneffekte wählen.<br />● 4+: Du kannst 3 Material von dieser Karte abhängen; lege 1 Monster vom Spielfeld auf den Friedhof.
  | it_text               = 2+ mostri di Livello 8<br />Se uno o più mostri vengono mandati al Cimitero del tuo avversario (eccetto durante il Damage Step): puoi scegliere 1 di essi come bersaglio; attaccalo a questa carta. Puoi utilizzare questo effetto di "Mortilux Heruvur" una sola volta per turno. Questa carta guadagna effetti a seconda del numero di materiali attaccati a essa.<br />● 2+: Non può essere distrutta in battaglia o dagli effetti delle carte.<br />● 3+: Il tuo avversario non può scegliere come bersaglio le carte nei Cimiteri con gli effetti delle carte.<br />● 4+: Puoi staccare 3 materiali da questa carta; manda al Cimitero 1 mostro sul Terreno.
  | pt_text               = 2+ monstros de Nível 8<br />Se um ou mais monstros forem enviados para o Cemitério do seu oponente (exceto durante a Etapa de Dano): você pode escolher 1 deles; associe-o a este card. Você só pode usar este efeito de "Mortilux Heruvur" uma vez por turno. Este card ganha efeitos de acordo com o número de matérias associadas a ele.<br />● 2+: Não pode ser destruído em batalha ou por efeitos de card.<br />● 3+: Seu oponente não pode escolher cards nos Cemitérios como alvo de efeitos de card.<br />● 4+: Você pode desassociar 3 matérias deste card; envie 1 monstro no campo para o Cemitério.
  | es_text               = 2+ monstruos de Nivel 8<br />Si uno o más monstruos son mandados al Cementerio de tu adversario (excepto durante el Damage Step): puedes seleccionar 1 de ellos; acóplalo a esta carta. Sólo puedes usar este efecto de "Mortilux Heruvur" una vez por turno. Esta carta gana efectos basados en el número de materiales que tenga acoplados.<br />● 2+: No puede ser destruida en batalla o por efectos de cartas.<br />● 3+: Tu adversario no puede seleccionar cartas en los Cementerios con efectos de cartas.<br />● 4+: Puedes desacoplar 3 materiales de esta carta; manda al Cementerio 1 monstruo en el Campo.
