  | ja_text               = 効果モンスター３体以上<br />自分は「ヴァレルロード・Ｌ・ドラゴン」を１ターンに１度しか特殊召喚できない。①：１ターンに１度、自分・相手のバトルフェイズに発動できる（この発動に対して相手はカードの効果を発動できない）。相手フィールドのモンスター１体をこのカードのリンク先に置いてコントロールを得る。②：自分・相手ターンに、このカードが墓地に存在する場合、自分フィールドのモンスター１体を対象として発動できる（同一チェーン上では１度まで）。そのモンスターを破壊し、このカードを特殊召喚する。
  | ko_text               = 효과 몬스터 3장 이상<br />자신은 "바렐로드 L(리버레이터) 드래곤"을 1턴에 1번밖에 특수 소환할 수 없다. ①: 1턴에 1번, 자신 / 상대의 배틀 페이즈에 발동할 수 있다(이 발동에 대하여 상대는 카드의 효과를 발동할 수 없다). 상대 필드의 몬스터 1장을 이 카드의 링크 앞에 놓고 컨트롤을 얻는다. ②: 자신 / 상대 턴에, 이 카드가 묘지에 존재할 경우, 자신 필드의 몬스터 1장을 대상으로 하고 발동할 수 있다(동일한 체인 위에서는 1번까지). 그 몬스터를 파괴하고, 이 카드를 특수 소환한다.
  | sc_text               = 效果怪兽3只以上<br />自己1回合仅可特殊召唤1次“枪管上膛戒放龙”。①：1回合1次，在自己・对手的战斗阶段可以发动（应对此发动，对手不可发动卡的效果）。将对手场上的1只怪兽放在此卡连接端并获得其控制权。②：在自己・对手回合中，此卡存在于墓地的情况下，以自己场上的1只怪兽为对象可以发动（同一连锁上最多1次）。将该怪兽破坏，将此卡特殊召唤。
