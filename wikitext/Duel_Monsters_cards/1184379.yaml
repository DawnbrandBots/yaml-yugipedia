  | text                  = [[Special Summon]] 1 "[[Power Patron]]" monster from your [[hand]], [[face-up]] [[Extra Deck]], or [[GY]], then you can apply these [[effect]]s in sequence, based on the number of different card types ([[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], or [[Xyz Monster|Xyz]]) you [[control]].<br />● 1+: [[Banish]] ([[face-down]]) 3 cards from the top of your opponent's [[Main Deck|Deck]].<br />● 2+: Banish (face-down) 1 card your opponent controls.<br />● 3: Banish (face-down) 1 random card from your opponent's hand.<br />You can only activate 1 "Power Patron Shade of the Final Hour" per turn.
  | fr_text               = Invoquez Spécialement 1 monstre "Mécène du Pouvoir" depuis votre main, Extra Deck face recto ou Cimetière, puis vous pouvez appliquer ces effets dans l'ordre, selon le nombre de types de carte différents (Fusion, Synchro ou Xyz) que vous contrôlez.<br />● 1+ : Bannissez (face verso) 3 cartes du dessus du Deck de votre adversaire.<br />● 2+ : Bannissez (face verso) 1 carte contrôlée par votre adversaire.<br />● 3 : Bannissez (face verso) 1 carte au hasard depuis la main de votre adversaire.<br />Vous ne pouvez activer qu'1 "Mécène du Pouvoir de l'Obscurité de la Dernière Heure" par tour.
  | de_text               = Beschwöre 1 „Machtpatron“-Monster als Spezialbeschwörung von deiner Hand, offen von deinem Extra Deck oder von deinem Friedhof, dann kannst du nacheinander diese Effekte ausführen, basierend auf der Anzahl der unterschiedlichen Kartentypen (Fusion, Synchro oder Xyz), die du kontrollierst.<br />● 1+: Verbanne die obersten 3 Karten vom Deck deines Gegners (verdeckt).<br />● 2+: Verbanne 1 Karte, die dein Gegner kontrolliert (verdeckt).<br />● 3: Verbanne 1 zufällige Karte von der Hand deines Gegners (verdeckt).<br />Du kannst nur 1 „Machtpatron-Schatten der letzten Stunde“ pro Spielzug aktivieren.
  | it_text               = Evoca Specialmente 1 mostro "Patrono Potente" dalla tua mano, Extra Deck scoperto o Cimitero, poi puoi applicare questi effetti in ordine, a seconda del numero di tipi di carta diversi (Fusione, Synchro o Xyz) che controlli.<br />● 1+: Bandisci (coperte) 3 carte dalla cima del Deck del tuo avversario.<br />● 2+: Bandisci (coperta) 1 carta controllata dal tuo avversario.<br />● 3: Bandisci (coperta) 1 carta a caso dalla mano del tuo avversario.<br />Puoi attivare solo 1 "Patrono Potente Ombra dell'Ultima Ora" per turno.
  | pt_text               = Invoque por Invocação-Especial 1 monstro "Patrono(a) do Poder" da sua mão, do Deck Adicional com a face para cima ou do Cemitério e, depois, você pode aplicar esses efeitos em sequência, de acordo com o número de tipos de card diferentes (Fusão, Sincro ou Xyz) que você controla.<br />● 1+: Bana (com a face para baixo) 3 cards do topo do Deck do seu oponente.<br />● 2+: Bana (com a face para baixo) 1 card que seu oponente controla.<br />● 3: Bana (com a face para baixo) 1 card aleatório da mão do seu oponente.<br />Você só pode ativar 1 "Sombra do Patrono do Poder da Hora Final" por turno.
  | es_text               = Invoca de Modo Especial 1 monstruo "Modelo de Poder" desde tu mano, Deck Extra boca arriba o Cementerio, y después puedes aplicar estos efectos en secuencia, basados en el número de tipos de carta diferentes (Fusión, Sincronía o Xyz) que controlas.<br />● 1+: Destierra (boca abajo) 3 cartas de la parte superior del Deck de tu adversario.<br />● 2+: Destierra (boca abajo) 1 carta que controle tu adversario.<br />● 3: Destierra (boca abajo) 1 carta al azar en la mano de tu adversario.<br />Sólo puedes activar 1 "Sombra de la Hora Final Modelo de Poder" por turno.
  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。①：自分の手札・ＥＸデッキ（表側）・墓地から「獄神」モンスター１体を特殊召喚する。その後、自分フィールドのモンスターの種類（融合・Ｓ・Ｘ）の数によって、以下の効果をそれぞれ適用できる。<br />●１種類以上：相手のデッキの上からカード３枚を裏側で除外する。<br />●２種類以上：相手フィールドのカード１枚を裏側で除外する。<br />●３種類：相手の手札をランダムに１枚裏側で除外する。
  | translated_text       = Special Summon 1 "Power Patron" monster from your hand, face-up Extra Deck, or GY, then you can apply '''any of''' these effects in sequence, based on the number of different card types (Fusion, Synchro, or Xyz) you control.<br />● 1+: Banish (face-down) 3 cards from the top of your opponent's Deck.<br />● 2+: Banish (face-down) 1 card your opponent controls.<br />● 3: Banish (face-down) 1 random card from your opponent's hand.<br />You can only activate 1 "Power Patron Shade of the Final Hour" per turn.
  | ko_text               = 
  | sc_text               = 此卡名的卡1回合仅可发动1张。①：从自己手牌・额外牌组（表侧）・墓地将1只“狱神”怪兽特殊召唤。然后，根据自己场上的怪兽种类（融合・同步・超量）数量，可分别适用以下效果。<br />●1种以上：从对手牌组上面将3张卡以里侧除外。<br />●2种以上：将对手场上的1张卡以里侧除外。<br />●3种：随机将对手的1张手牌以里侧除外。
