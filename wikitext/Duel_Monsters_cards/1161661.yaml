  | text                  = 1 "[[Fairy Tail]]" [[monster]] + 1 [[Spellcaster]] monster<br />All "Prince of Fairies" on the [[field]] become Spellcaster monsters. During your [[Main Phase]]: You can [[Special Summon]] 1 "Fairy Tail" monster from your [[Main Deck|Deck]] or [[banish]]ment. You can only use this effect of "Weaver of Fairy Tails" [[once per turn]]. If you [[Normal Summon|Normal]] or Special Summon a non-[[EARTH]] "Fairy Tail" monster, while this card is in your Monster Zone (except during the [[Damage Step]]): You can [[target]] 1 [[Effect Monster]] your opponent [[control]]s; [[negate]] its effects, also its name becomes "[[Prince of Fairies]]".
  | fr_text               = 1 monstre "Animal Féérique" + 1 monstre Magicien<br />Tous les "Prince des Fées" sur le Terrain deviennent des monstres Magicien. Durant votre Main Phase : vous pouvez Invoquer Spécialement 1 monstre "Animal Féérique" depuis votre Deck ou bannissement. Vous ne pouvez utiliser cet effet de "Tisserande de l'Animal Féérique" qu'une fois par tour. Si vous Invoquez Normalement ou Spécialement un monstre "Animal Féérique" non-TERRE, tant que cette carte est dans votre Zone Monstre (sauf durant la Damage Step) : vous pouvez cibler 1 Monstre à Effet contrôlé par votre adversaire ; annulez ses effets, et aussi, son nom devient "Prince des Fées".
  | de_text               = 1 „Märchenschweif“-Monster + 1 Hexer-Monster<br />Alle „Prinz der Feen“ auf dem Spielfeld werden zu Hexer-Monstern. Während deiner Main Phase: Du kannst 1 „Märchenschweif“-Monster als Spezialbeschwörung von deinem Deck oder deinen verbannten Karten beschwören. Du kannst diesen Effekt von „Weberin der Märchenschweife“ nur einmal pro Spielzug verwenden. Falls du ein Nicht-ERDE „Märchenschweif“-Monster als Normal- oder Spezialbeschwörung beschwörst, solange diese Karte in deiner Monsterzone liegt (außer während des Damage Steps): Du kannst 1 Effektmonster wählen, das dein Gegner kontrolliert; annulliere seine Effekte, zusätzlich wird sein Name zu „Prinz der Feen“.
  | it_text               = 1 mostro "Codafavola" + 1 mostro Incantatore<br />Tutti i "Principe delle Fate" sul Terreno diventano mostri Incantatore. Durante la tua Main Phase: puoi Evocare Specialmente 1 mostro "Codafavola" dal tuo Deck o carte bandite. Puoi utilizzare questo effetto di "Tessitrice di Codafavola" una sola volta per turno. Se Evochi Normalmente o Specialmente un mostro "Codafavola" non-TERRA, mentre questa carta è nella tua Zona Mostri (eccetto durante il Damage Step): puoi scegliere come bersaglio 1 Mostro con Effetto controllato dal tuo avversario; annulla i suoi effetti, inoltre il suo nome diventa "Principe delle Fate".
  | pt_text               = 1 monstro "Cauda de Fadas" + 1 monstro Mago<br />Todos os "Príncipe das Fadas" no campo se tornam monstros Mago. Durante sua Fase Principal: você pode Invocar por Invocação-Especial 1 monstro "Cauda de Fadas" do seu Deck ou banimento. Você só pode usar este efeito de "Tecedora de Cauda de Fadas" uma vez por turno. Se você Invocar um monstro "Cauda de Fadas" que não seja de TERRA por Invocação-Normal ou Especial, enquanto este card estiver na sua Zona de Monstros (exceto durante a Etapa de Dano): você pode escolher 1 Monstro de Efeito que seu oponente controla; negue seus efeitos e, além disso, seu nome se torna "Príncipe das Fadas".
  | es_text               = 1 monstruo "Colacuento" + 1 monstruo Lanzador de Conjuros<br />Todos los "Príncipe de las Hadas" en el Campo se convierten en monstruos Lanzador de Conjuros. Durante tu Main Phase: puedes Invocar de Modo Especial 1 monstruo "Colacuento" desde tu Deck o destierro. Sólo puedes usar este efecto de "Tejedora de Colacuentos" una vez por turno. Si Invocas de Modo Normal o Especial un monstruo "Colacuento" que no sea de TIERRA, mientras esta carta está en tu Zona de Monstruos (excepto durante el Damage Step): puedes seleccionar 1 Monstruo de Efecto que controle tu adversario; niega sus efectos, y además su nombre se convierte en "Príncipe de las Hadas".
  | ja_text               = 「妖精伝姫」モンスター＋魔法使い族モンスター<br />このカード名の①の効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。自分のデッキ・除外状態の「妖精伝姫」モンスター１体を特殊召喚する。②：このカードがモンスターゾーンに存在する状態で、自分が地属性以外の「妖精伝姫」モンスターを召喚・特殊召喚した場合、相手フィールドの効果モンスター１体を対象として発動できる。そのモンスターの効果は無効化され、カード名を「妖精の王子様」として扱う。③：フィールドの「妖精の王子様」は魔法使い族になる。
  | ko_text               = "페어리테일" 몬스터 ＋ 마법사족 몬스터<br />이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 자신의 덱 / 제외 상태인 "페어리테일" 몬스터 1장을 특수 소환한다. ②: 이 카드가 몬스터 존에 존재하는 상태에서, 자신이 땅 속성 이외의 "페어리테일" 몬스터를 일반 소환 / 특수 소환했을 경우, 상대 필드의 효과 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 효과는 무효화되고, 카드명을 "요정의 왕자님"으로 취급한다. ③: 필드의 "요정의 왕자님"은 마법사족이 된다.
  | sc_text               = “妖精传姬”怪兽＋魔法师族怪兽<br />此卡名的①效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将自己牌组・除外状态的1只“妖精传姬”怪兽特殊召唤。②：此卡存在于怪兽区域的状态下，自己将地属性以外的“妖精传姬”怪兽召唤・特殊召唤的情况下，以对手场上的1只效果怪兽为对象可以发动。将该怪兽的效果无效化，卡名视为“妖精的王子大人”。③：场上的“妖精的王子大人”变为魔法师族。
