  | text                  = If this card is in your [[hand]]: You can [[banish]] [[Machine]] [[Link Monster]]s from your [[Extra Deck]] whose combined [[Link Rating]]s equal exactly 5; [[Special Summon]] this card. You can [[target]] 1 card you [[control]] and 1 card your opponent controls; [[return]] them to the hand. This is a [[Quick Effect]] if this card is [[linked]] to a Link-3 or higher Machine Link Monster. You can only use each effect of "Rustin Mammoth" once per turn.
  | fr_text               = Si cette carte est dans votre main : vous pouvez bannir un nombre de Monstres Lien Machine depuis votre Extra Deck dont la somme des Classifications Lien est égale à exactement 5 ; Invoquez Spécialement cette carte. Vous pouvez cibler 1 carte que vous contrôlez et 1 carte contrôlée par votre adversaire ; renvoyez-les à la main. Ceci est un Effet Rapide si cette carte est liée à un Monstre Lien Machine de min. Link-3. Vous ne pouvez utiliser chaque effet de "Mammouth Rouilletainrable" qu'une fois par tour.
  | de_text               = Falls sich diese Karte in deiner Hand befindet: Du kannst Maschine-Linkmonster, deren kombinierte Linkzahlen genau 5 entsprechen, von deinem Extra Deck verbannen; beschwöre diese Karte als Spezialbeschwörung. Du kannst 1 Karte, die du kontrollierst, und 1 Karte, die dein Gegner kontrolliert, wählen; gib sie auf die Hand zurück. Dies ist ein Schnelleffekt, falls diese Karte mit einem Maschine-Linkmonster mit Link-3 oder höher verlinkt ist. Du kannst jeden Effekt von „Rostendes Mammut“ nur einmal pro Spielzug verwenden.
  | it_text               = Se questa carta è nella tua mano: puoi bandire dal tuo Extra Deck Mostri Link Macchina la cui somma delle Classificazioni Link è esattamente pari a 5; Evoca Specialmente questa carta. Puoi scegliere come bersaglio 1 carta che controlli e 1 carta controllata dal tuo avversario; falle ritornare nella mano. Questo è un Effetto Rapido se questa carta è linkata a un Mostro Link Macchina Link-3 o superiore. Puoi utilizzare ogni effetto di "Mammut Arrugginito" una sola volta per turno.
  | pt_text               = Se este card estiver na sua mão: você pode banir Monstros Link Máquina do seu Deck Adicional cuja soma dos Valores Link seja exatamente igual a 5; Invoque este card por Invocação-Especial. Você pode escolher 1 card que você controla e 1 card que seu oponente controla; devolva-os para a mão. Este é um Efeito Rápido se este card estiver linkado a um Monstro Link Máquina de Link-3 ou mais. Você só pode usar cada efeito de "Mamute Ferrugem" uma vez por turno.
  | es_text               = Si esta carta está en tu mano: puedes desterrar Monstruos de Enlace Máquina en tu Deck Extra cuyos Ratings de Enlace combinados sean exactamente iguales a 5; Invoca esta carta de Modo Especial. Puedes seleccionar 1 carta que controles y 1 carta que controle tu adversario; devuélvelas a la mano. Esto es un Efecto Rápido si esta carta está enlazada a un Monstruo de Enlace Máquina Link-3 o mayor. Sólo puedes usar cada efecto de "Mamut Oxidado" una vez por turno.
