  | text                  = 1 [[Tuner]] + 1+ non-Tuners<br />If this card is [[Synchro Summon]]ed: You can [[Add a card|add]] 1 [[Level]] 8 or higher [[monster]] with 0 [[ATK]] from your [[Main Deck|Deck]] to your [[hand]]. You can [[target]] 1 monster with 0 ATK in your [[GY]]; [[Special Summon]] it, but [[negate]] its [[effect]]s, also it cannot be used as [[material]] for a [[Fusion Summon|Fusion]], [[Synchro Summon|Synchro]], [[Xyz Summon|Xyz]], or [[Link Summon]]. You can only use each effect of "Glitch Clutch Nullgainer" [[once per turn]].
  | fr_text               = 1 Syntoniseur + 1+ non-Syntoniseur<br />Si cette carte est Invoquée par Synchronisation : vous pouvez ajouter 1 monstre de min. Niveau 8 avec 0 ATK depuis votre Deck à votre main. Vous pouvez cibler 1 monstre avec 0 ATK dans votre Cimetière ; Invoquez-le Spécialement, mais annulez ses effets, et aussi, il ne peut pas être utilisé comme Matériel pour une Invocation Fusion, Synchro, Xyz ou Lien. Vous ne pouvez utiliser chaque effet de "Captezéro la Poigne de l'Anomalie" qu'une fois par tour.
  | de_text               = 1 Empfänger + 1+ Nicht-Empfänger<br />Falls diese Karte als Synchrobeschwörung beschworen wird: Du kannst deiner Hand 1 Monster der Stufe 8 oder höher mit 0 ATK von deinem Deck hinzufügen. Du kannst 1 Monster mit 0 ATK in deinem Friedhof wählen; beschwöre es als Spezialbeschwörung, aber annulliere seine Effekte, zusätzlich kann es nicht als Material für eine Fusions-, Synchro-, Xyz- oder Linkbeschwörung verwendet werden. Du kannst jeden Effekt von „Glitchgriff-Nullgainer“ nur einmal pro Spielzug verwenden.
  | it_text               = 1 Tuner + 1+ non-Tuner<br />Se questa carta viene Synchro Evocata: puoi aggiungere 1 mostro di Livello 8 o superiore con 0 ATK dal tuo Deck alla tua mano. Puoi scegliere come bersaglio 1 mostro con ATK 0 nel tuo Cimitero; Evocalo Specialmente, ma annulla i suoi effetti, inoltre esso non può essere utilizzato come materiale per un'Evocazione tramite Fusione, Synchro, Xyz o Link. Puoi utilizzare ogni effetto di "Nullgainer Afferra Glitch" una sola volta per turno.
  | pt_text               = 1 Regulador + 1+ não-Reguladores<br />Se este card for Invocado por Invocação-Sincro: você pode adicionar 1 monstro de Nível 8 ou mais com 0 de ATK do seu Deck à sua mão. Você pode escolher 1 monstro com 0 de ATK no seu Cemitério; Invoque-o por Invocação-Especial, mas negue seus efeitos e, além disso, ele não pode ser usado como matéria para uma Invocação-Fusão, Sincro, Xyz ou Link. Você só pode usar cada efeito de "Agarra-Glitch do Ganho-Nulo" uma vez por turno.
  | es_text               = 1 Cantante + 1+ no Cantantes<br />Si esta carta es Invocada por Sincronía: puedes añadir a tu mano 1 monstruo de Nivel 8 o mayor con 0 ATK en tu Deck. Puedes seleccionar 1 monstruo con 0 ATK en tu Cementerio; Invócalo de Modo Especial, pero niega sus efectos, y además no puede ser usado como material para una Invocación por Fusión, Sincronía, Xyz o Enlace. Sólo puedes usar cada efecto de "Nulobtenedor Aferrado a Glitch" una vez por turno.
  | ja_text               = チューナー＋チューナー以外のモンスター１体以上<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＳ召喚した場合に発動できる。デッキからレベル８以上で攻撃力０のモンスター１体を手札に加える。②：自分の墓地の攻撃力０のモンスター１体を対象として発動できる。そのモンスターを特殊召喚する。この効果で特殊召喚したモンスターの効果は無効化され、融合・Ｓ・Ｘ・Ｌ召喚の素材にできない。
  | ko_text               = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 덱에서 레벨 8 이상이고 공격력 0 인 몬스터 1장을 패에 넣는다. ②: 자신 묘지의 공격력 0 인 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 특수 소환한다. 이 효과로 특수 소환한 몬스터의 효과는 무효화되고, 융합 / 싱크로 / 엑시즈 / 링크 소환의 소재로 할 수 없다.
  | sc_text               = 协调＋协调以外的怪兽1只以上<br />此卡名的①②效果1回合仅可各使用1次。①：此卡同步召唤的情况下可以发动。从牌组将1只等级8以上且攻击力0的怪兽加入手牌。②：以自己墓地的1只攻击力0的怪兽为对象可以发动。将该怪兽特殊召唤。以此效果特殊召唤的怪兽效果无效化，不可作为融合・同步・超量・连接召唤的素材。
