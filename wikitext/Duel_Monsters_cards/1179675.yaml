  | text                  = [[Target]] 1 "[[The Phantom Knights]]" or "[[Xyz Dragon]]" [[monster]] in your [[GY]] or [[banish]]ment; [[Special Summon]] it, but [[negate]] its [[effect]]s, then apply the following effect.<br />● Choose 1 [[DARK]] Xyz Monster you [[control]], and Special Summon from your [[Extra Deck]], 1 "The Phantom Knights" or "Xyz Dragon" [[Xyz Monster]] that is 1 Rank higher than that monster, by using it as [[material]] (this is treated as an [[Xyz Summon]], [[transfer]] its materials).<br />You can only [[activate]] 1 "The Phantom Knights' Rank-Up-Magic Requiem" per turn.
  | fr_text               = Ciblez 1 monstre "Les Chevaliers Fantômes" ou "Dragon Xyz" dans votre Cimetière ou bannissement ; Invoquez-le Spécialement, mais annulez ses effets, puis appliquez l'effet suivant.<br />● Choisissez 1 Monstre Xyz TÉNÈBRES que vous contrôlez, et Invoquez Spécialement depuis votre Extra Deck 1 Monstre Xyz "Les Chevaliers Fantômes" ou "Dragon Xyz" qui a 1 Rang de plus que le monstre, en l'utilisant comme Matériel (ceci est traité comme Invocation Xyz, transférez ses Matériels).<br />Vous ne pouvez activer qu'1 "Les Chevaliers Fantômes du Requiem Magie-Rang-Plus" par tour.
  | de_text               = Wähle 1 „Die Phantomritter“- oder „Xyz-Drache“-Monster in deinem Friedhof oder von deinen verbannten Karten; beschwöre es als Spezialbeschwörung, aber annulliere seine Effekte, dann führe den folgenden Effekt aus.<br />● Bestimme 1 FINSTERNIS Xyz-Monster, das du kontrollierst, und beschwöre 1 „Die Phantomritter“- oder „Xyz-Drache“-Xyz-Monster, dessen Rang 1 höher ist als der jenes Monsters, als Spezialbeschwörung von deinem Extra Deck, indem du es als Material verwendest (dies wird als Xyz-Beschwörung behandelt, transferiere sein Material).<br />Du kannst nur 1 „Rangsteigerungszauber-Requiem für die Phantomritter“ pro Spielzug aktivieren.
  | it_text               = Scegli come bersaglio 1 mostro "I Cavalieri Fantasma" o "Drago Xyz" nel tuo Cimitero o carte bandite; Evocalo Specialmente, ma annulla i suoi effetti, poi applica il seguente effetto.<br />● Seleziona 1 Mostro Xyz OSCURITÀ che controlli, ed Evoca Specialmente dal tuo Extra Deck, 1 Mostro Xyz "I Cavalieri Fantasma" o "Drago Xyz" che è di 1 Rango superiore a quel mostro, utilizzandolo come materiale (questa viene considerata come un'Evocazione Xyz, trasferisci i suoi materiali).<br />Puoi attivare solo 1 "Requiem Alza-Rango-Magico dei Cavalieri Fantasma" per turno.
  | pt_text               = Escolha 1 monstro "Os Cavaleiros Fantasmas" ou "Dragão Xyz" no seu Cemitério ou banimento; Invoque-o por Invocação-Especial, mas negue seus efeitos e, depois, aplique o seguinte efeito.<br />● Selecione 1 Monstro Xyz de TREVAS que você controla e Invoque por Invocação-Especial do seu Deck Adicional, 1 Monstro Xyz "Os Cavaleiros Fantasmas" ou "Dragão Xyz" que seja 1 Classe maior que a desse monstro, usando-o como matéria (isso é considerado uma Invocação-Xyz, transfira as matérias dele).<br />Você só pode ativar 1 "Magia de Aumento de Classe Réquiem de Os Cavaleiros Fantasmas" por turno.
  | es_text               = Selecciona 1 monstruo "Los Caballeros Fantasma" o "Dragón Xyz" en tu Cementerio o destierro; Invócalo de Modo Especial, pero niega sus efectos, y después aplica el siguiente efecto.<br />● Elige 1 Monstruo Xyz de OSCURIDAD que controles, e Invoca de Modo Especial, desde tu Deck Extra, 1 Monstruo Xyz "Los Caballeros Fantasma" o "Dragón Xyz" que sea 1 Rango mayor que ese monstruo, usándolo como material (esto se trata como una Invocación Xyz, transfiere sus materiales).<br />Sólo puedes activar 1 "Réquiem de la Magia de Subida de Rango de Los Caballeros Fantasma" por turno.
  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。①：自分の墓地・除外状態の「幻影騎士団」モンスターか「エクシーズ・ドラゴン」モンスター１体を対象として発動できる。そのモンスターを効果を無効にして特殊召喚する。その後、以下の効果を適用する。●自分フィールドの闇属性Ｘモンスター１体を選び、そのモンスターよりランクが１つ高い、「幻影騎士団」Ｘモンスターか「エクシーズ・ドラゴン」Ｘモンスター１体を、選んだモンスターの上に重ねてＸ召喚扱いでＥＸデッキから特殊召喚する。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 자신의 묘지 / 제외 상태인 "팬텀 나이츠" 몬스터나 "엑시즈 드래곤" 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 효과를 무효로 하고 특수 소환한다. 그 후, 이하의 효과를 적용한다. ●자신 필드의 어둠 속성 엑시즈 몬스터 1장을 고르고, 그 몬스터보다 랭크가 1개 높은, "팬텀 나이츠" 엑시즈 몬스터나 "엑시즈 드래곤" 엑시즈 몬스터 1장을, 고른 몬스터 위에 겹쳐 엑시즈 소환으로 취급하고 엑스트라 덱에서 특수 소환한다.
  | sc_text               = 此卡名的卡1回合仅可发动1张。①：以自己墓地・除外状态的1只“魅影骑士团”怪兽或“超量龙”怪兽为对象可以发动。将该怪兽的效果无效并特殊召唤。然后，适用以下效果。<br />●挑选自己场上的1只暗属性超量怪兽，从额外牌组将1只阶级比该怪兽高1的“魅影骑士团”超量怪兽或“超量龙”超量怪兽重叠在所挑选的怪兽上面，视为超量召唤特殊召唤。
