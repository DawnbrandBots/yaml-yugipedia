  | text            = ''The ultimate fate of the [[Dragon Horn Hunter|huntress]] who [[Dragon Core Hexer|continued to spread the dragontaint]]. Now she has become the source of the plague, a fortress of swirling dark, wicked thoughts, and ironically is now the target of others' revenge. She has no way of knowing that the strike team standing before her are the survivors of a village that was once decimated by a [[dragon]]...''
  | fr_text         = ''C'est le destin tragique de la chasseuse qui finit par répandre la souillure du dragon. Désormais l'origine de ce fléau, elle est devenue une forteresse où tourbillonnent pensées sombres et malveillantes. Et ironie du sort, elle est maintenant la cible de vengeance. Elle ne se doute aucunement que l'escouade se tenant devant elle est composée des survivants d'un village autrefois décimé par un dragon...
  ''
  | de_text         = ''Das endgültige Schicksal der Jägerin, die weiterhin den Drachenfluch verbreitete. Sie ist jetzt zur Quelle der Plage geworden, zu einer Festung wirbelnder dunkler, böser Gedanken, und ironischerweise ist sie nun selbst das Ziel der Rache anderer. Sie kann nicht wissen, dass die Spezialeinheit, die vor ihr steht, aus Überlebenden eines Dorfes besteht, das einst von einem Drachen zerstört wurde ...
  ''
  | it_text         = ''Il destino finale della cacciatrice che continuava a diffondere la dragocontaminazione. Ora è diventata la fonte della piaga, una fortezza di oscurità vorticante, pensieri malvagi, e ironicamente è ora il bersaglio della vendetta degli altri. Non ha modo di sapere che la squadra d'assalto che ha davanti sono i sopravvissuti di un villaggio che fu un tempo decimato da un drago...
  ''
  | pt_text         = ''O destino final da caçadora que continuou a espalhar a mácula do dragão. Agora ela se tornou a fonte da praga, uma fortaleza de pensamentos sombrios e perversos e, ironicamente, agora é alvo da vingança de outros. Ela não tem como saber que a equipe de ataque à sua frente é formada pelos sobreviventes de uma vila que no passado foi dizimada por um dragão...
  ''
  | es_text         = ''El destino final de la cazadora que siguió propagando la maldición del dragón. Ahora se ha convertido en la fuente de la plaga, una fortaleza de oscuridad arremolinada, pensamientos perversos y que, irónicamente, es ahora el blanco de la venganza de otros. No hay forma de que ella sepa que el equipo de asalto que tiene frente a sí son los supervivientes de una aldea que una vez fue exterminada por un dragón...
  ''
  | ja_text         = 絶え間なくドラゴンの呪いを吐き続ける女戦士の末路。疫病の元凶となった今、その姿は邪念が渦巻く楼閣と化し、人々の復讐の対象となっていた。目の前に立ち塞がる討伐隊が、かつてドラゴンに滅ぼされた村の生き残りであることなど、今の彼女には知る由もない・・・。
  | ko_text         = 끊임없이 드래곤의 저주를 토해내는 여전사의 말로. 역병의 원흉이 된 지금, 그 모습은 사념이 소용돌이치는 누각으로 변해, 사람들의 복수의 대상이 되어버렸다. 눈앞을 가로막고 선 토벌대가, 과거 드래곤에 의해 멸망당한 마을의 생존자들이라는 사실조차, 지금의 그녀에게는 알 길이 없었다….
  | sc_text         = 不断吐出龙之诅咒的女战士的末路。如今，她已成为瘟疫的根源，其身影化作邪念涌动的楼阁，成为人们复仇的对象。阻挡在眼前的讨伐队，是曾被龙毁灭的村庄的幸存者。对此，她如今已无从知晓……
