  | fr_text        = Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez Poser 1 Piège depuis votre Deck avec un effet qui s'équipe comme Carte d'Équipement. Si cette carte est envoyée depuis le Terrain au Cimetière : vous pouvez piocher 1 carte. Vous ne pouvez utiliser chaque effet de "Elfe Étudiante" qu'une fois par tour.
  | de_text        = Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst 1 Falle mit einem Effekt, der mit ihr selbst als Ausrüstungskarte ausrüstet, von deinem Deck setzen. Falls diese Karte vom Spielfeld auf den Friedhof gelegt wird: Du kannst 1 Karte ziehen. Du kannst jeden Effekt von „Lernende Elfe“ nur einmal pro Spielzug verwenden.
  | it_text        = Se questa carta viene Evocata Normalmente o Specialmente: puoi Posizionare dal tuo Deck 1 Trappola con un effetto che equipaggia se stessa come una Carta Equipaggiamento. Se questa carta viene mandata dal Terreno al Cimitero: puoi pescare 1 carta. Puoi utilizzare ogni effetto di "Elfa Studiosa" una sola volta per turno.
  | pt_text        = Se este card for Invocado por Invocação-Normal ou Especial: você pode Baixar 1 Armadilha do seu Deck com um efeito que equipe a si mesma como um Card de Equipamento. Se este card for enviado do campo para o Cemitério: você pode comprar 1 card. Você só pode usar cada efeito de "Elfa Estudiosa" uma vez por turno.
  | es_text        = Si esta carta es Invocada de Modo Normal o Especial: puedes Colocar 1 Trampa desde tu Deck con un efecto que la equipe como una Carta de Equipo. Si esta carta es mandada del Campo al Cementerio: puedes robar 1 carta. Sólo puedes usar cada efecto de "Elfa Estudiosa" una vez por turno.
  | ja_text        = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。自身を装備カード扱いで装備する効果を持つ罠カード１枚をデッキから自分フィールドにセットする。②：このカードがフィールドから墓地へ送られた場合に発動できる。自分は１枚ドローする。
  | ko_text        = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 자신을 장착 카드로 취급하여 장착하는 효과를 가지는 함정 카드 1장을 덱에서 자신 필드에 세트한다. ②: 이 카드가 필드에서 묘지로 보내졌을 경우에 발동할 수 있다. 자신은 1장 드로우한다.
  | sc_text        = 此卡名的①②效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将1张拥有将自身视为装备卡装备的效果的陷阱卡放置在自己场上。②：此卡从场上被送至墓地的情况下可以发动。自己抽1张。
