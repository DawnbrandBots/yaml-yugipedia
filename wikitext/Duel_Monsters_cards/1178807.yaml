  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の手札・デッキ・フィールド（表側表示）から攻撃力２４００以上で守備力１０００のモンスター４体を墓地へ送って発動できる。このカードを手札から特殊召喚する。②：自分及び相手フィールドの魔法・罠カードを１枚ずつ対象として発動できる。そのカードを破壊する。その後、お互いのフィールドに「ホムンクルストークン」（天使族・光・星２・攻／守８００）を１体ずつ守備表示で特殊召喚し、このカードの攻撃力は１６００アップする。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신의 패 / 덱 / 필드(앞면 표시)에서 공격력 2400 이상이고 수비력 1000 인 몬스터 4장을 묘지로 보내고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 자신 및 상대 필드의 마법 / 함정 카드를 1장씩 대상으로 하고 발동할 수 있다. 그 카드를 파괴한다. 그 후, 서로의 필드에 "호문쿨루스 토큰"(천사족 / 빛 / 레벨 2 / 공 800 / 수 800)을 1장씩 수비 표시로 특수 소환하고, 이 카드의 공격력은 1600 올린다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：从自己手牌・牌组・场上（表侧表示）将4只攻击力2400以上且守备力1000的怪兽送至墓地可以发动。从手牌将此卡特殊召唤。②：以自己及对手场上的各1张魔法・陷阱卡为对象可以发动。将该卡破坏。然后，各将1只“人工生命体衍生物”（天使族・光・星2・攻/守800）以守备表示特殊召唤至双方场上，此卡的攻击力上升1600。
