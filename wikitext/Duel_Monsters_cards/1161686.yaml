  | ja_text               = このカード名の③の効果は１ターンに１度しか使用できない。①：装備モンスターの攻撃力は１０００アップする。②：１ターンに１度、自分メインフェイズに発動できる。自分の手札・フィールドのモンスターを融合素材とし、魔法使い族の融合モンスター１体を融合召喚する。その際、相手フィールドの「妖精の王子様」も融合素材とする事ができる。③：このカードが墓地に存在する場合に発動できる。このカードをフィールドの「妖精伝姫」モンスター１体に装備する。その後、攻撃力１８５０の魔法使い族モンスター１体の召喚を行う事ができる。
  | ko_text               = 이 카드명의 ③의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 장착 몬스터의 공격력은 1000 올린다. ②: 1턴에 1번, 자신 메인 페이즈에 발동할 수 있다. 자신의 패 / 필드의 몬스터를 융합 소재로 하고, 마법사족 융합 몬스터 1장을 융합 소환한다. 그 시기에, 상대 필드의 "요정의 왕자님"도 융합 소재로 할 수 있다. ③: 이 카드가 묘지에 존재할 경우에 발동할 수 있다. 이 카드를 필드의 "페어리테일" 몬스터 1장에 장착한다. 그 후, 공격력 1850 인 마법사족 몬스터 1장의 일반 소환을 실행할 수 있다.
  | sc_text               = 此卡名的③效果1回合仅可使用1次。①：装备怪兽的攻击力上升1000。②：1回合1次，在自己的主要阶段可以发动。将自己手牌・场上的怪兽作为融合素材，将1只魔法师族的融合怪兽融合召唤。在此之际，也可将对手场上的“妖精的王子大人”作为融合素材。③：此卡存在于墓地的情况下可以发动。将此卡装备于场上的1只“妖精传姬”怪兽。然后，可进行1只攻击力1850的魔法师族怪兽的召唤。
