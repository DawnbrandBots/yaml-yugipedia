  | text                = [[Once per turn]]: You can place [[Season Counter]]s on this card equal to the number of your opponent's unused [[Main Monster Zone]]s. Once per turn, when your [[monster]] [[declare]]s an [[attack]]: You can inflict [[Effect damage|damage]] to your opponent equal to the total number of Season Counters on this card and "[[Spring]]" in your [[GY]] x 400. Once per turn, during your opponent's [[End Phase]]: You can take 1 [[Field Spell]] from your [[hand]] or [[Main Deck|Deck]] that you can place a Season Counter on, and place it [[face-up]] on your field (but neither player can activate its [[effect]]s this [[turn]]), and if you do, place all Season Counters on this card on that card.
  | fr_text               = Une fois par tour : vous pouvez placer un nombre de Compteurs Saison sur cette carte, égal au nombre de Zones Monstre Main inutilisées de votre adversaire. Une fois par tour, lorsque votre monstre déclare une attaque : vous pouvez infliger des dommages à votre adversaire égaux au nombre total de Compteurs Saison sur cette carte et de "Printemps" dans votre Cimetière x 400. Une fois par tour, durant la End Phase de votre adversaire : vous pouvez prendre 1 Magie de Terrain depuis votre main ou Deck sur laquelle vous pouvez placer un Compteur Saison, et placez-la face recto sur votre Terrain (mais aucun joueur ne peut activer ses effets ce tour), et si vous le faites, placez tous les Compteurs Saison sur cette carte sur la carte.
  | de_text               = Einmal pro Spielzug: Du kannst Jahreszeit-Zählmarken in Höhe der Anzahl der nicht verwendeten Main-Monsterzonen deines Gegners auf diese Karte legen. Einmal pro Spielzug, wenn dein Monster einen Angriff deklariert: Du kannst deinem Gegner Schaden in Höhe der Gesamtanzahl der Jahreszeit-Zählmarken auf dieser Karte und „Frühling“ in deinem Friedhof x 400 zufügen. Einmal pro Spielzug, während der End Phase deines Gegners: Du kannst 1 Spielfeldzauber, auf den du eine Jahreszeit-Zählmarke legen kannst, von deiner Hand oder deinem Deck nehmen und offen auf deine Spielfeldseite legen (aber kein Spieler kann in diesem Spielzug seine Effekte aktivieren) und falls du dies tust, lege alle Jahreszeit-Zählmarken von dieser Karte auf jene Karte.
  | it_text               = Una volta per turno: puoi mettere Segnalini Stagione su questa carta pari al numero di Zone Mostri Main inutilizzate del tuo avversario. Una volta per turno, quando un tuo mostro dichiara un attacco: puoi infliggere al tuo avversario danno pari al numero totale di Segnalini Stagione su questa carta e "Primavera" nel tuo Cimitero x 400. Una volta per turno, durante la End Phase del tuo avversario: puoi prendere dalla tua mano o Deck 1 Magia Terreno su cui puoi mettere un Segnalino Stagione e metterla scoperta sul tuo Terreno (ma nessun giocatore può attivare i suoi effetti in questo turno) e, se lo fai, metti su quella carta tutti i Segnalini Stagione su questa carta.
  | pt_text               = Uma vez por turno: você pode colocar Marcadores de Estações neste card igual ao número de Zonas de Monstros Principais não utilizadas do seu oponente. Uma vez por turno, quando um monstro seu declarar um ataque: você pode causar dano ao seu oponente igual ao número total de Marcadores de Estações neste card e "Primavera" no seu Cemitério x 400. Uma vez por turno, durante a Fase Final do seu oponente: você pode pegar 1 Magia de Campo da sua mão ou do Deck sobre a qual você possa colocar um Marcador de Estações, e colocá-la no seu campo com a face para cima (mas nenhum duelista pode ativar seus efeitos neste turno) e, se isso acontecer, coloque nesse card todos os Marcadores de Estações deste card.
  | es_text               = Una vez por turno: puedes poner Contadores Estación en esta carta iguales al número de las Zonas de Monstruos Principales de tu adversario sin usar. Una vez por turno, cuando tu monstruo declara un ataque: puedes infligir daño a tu adversario igual al número total de Contadores Estación en esta carta y "Primavera" en tu Cementerio x 400. Una vez por turno, durante la End Phase de tu adversario: puedes tomar 1 Mágica de Campo en tu mano o Deck a la que le puedas poner un Contador Estación, y ponla boca arriba en tu Campo (pero ningún jugador puede activar sus efectos este turno) y, si lo haces, pon todos los Contadores Estación de esta carta en esa carta.
  | ja_text               = ①：１ターンに１度、発動できる。使用していない相手のメインモンスターゾーンの数だけこのカードにシキカウンターを置く。②：１ターンに１度、自分のモンスターの攻撃宣言時に発動できる。このカードのシキカウンターの数及び自分の墓地の「春」の数×４００ダメージを相手に与える。③：相手エンドフェイズに発動できる。シキカウンターを置く事ができるフィールド魔法カード１枚を手札・デッキから自分フィールドに表側表示で置く（このカードのシキカウンターをそのカードに移す）。そのカードの効果はこのターン発動できない。
  | ko_text               = ①: 1턴에 1번, 발동할 수 있다. 사용하고 있지 않은 상대의 메인 몬스터 존의 수만큼 이 카드에 사계 카운터를 놓는다. ②: 1턴에 1번, 자신 몬스터의 공격 선언시에 발동할 수 있다. 이 카드의 사계 카운터의 수 및 자신 묘지의 "봄"의 수 × 400 데미지를 상대에게 준다. ③: 상대 엔드 페이즈에 발동할 수 있다. 사계 카운터를 놓을 수 있는 필드 마법 카드 1장을 패 / 덱에서 자신 필드에 앞면 표시로 놓는다(이 카드의 사계 카운터를 그 카드로 옮긴다). 그 카드의 효과는 이 턴에 발동할 수 없다.
  | sc_text               = ①：1回合1次，可以发动。依未使用的、对手的主要怪兽区域的数量，在此卡上放四季计数物。②：1回合1次，自己怪兽的攻击宣言时可以发动。给予对手此卡的四季计数物数量及自己墓地的“春”的数量×400的伤害。③：在对手的结束阶段可以发动。从手牌・牌组将1张可放四季计数物的场地魔法卡以表侧表示放在自己场上（此卡的四季计数物移至该卡）。该卡的效果此回合不可发动。
