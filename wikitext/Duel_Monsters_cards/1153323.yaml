  | text                = (This card is always treated as an "[[Xyz (archetype)|Xyz]]" card.)<br />When this card is [[activate]]d: You can [[Special Summon]] 1 "[[Number 39: Utopia]]" from your [[GY]], and if you do, it gains [[ATK]] equal to the combined ATK of all [[LIGHT]] "[[Utopia (archetype)|Utopia]]" and "[[Utopic]]" [[Xyz Monster]]s in your GY. When your attacking "Utopia" or "Utopic" Xyz Monster whose original [[Attribute]] is LIGHT destroys an opponent's monster by battle: You can make your monster lose exactly 1000 [[ATK]], and if you do, it can attack again in a row. You can only [[activate]] 1 "Endless Bond" per turn.
  | fr_text             = (Cette carte est toujours traitée comme carte "Xyz".)<br />Lorsque cette carte est activée : vous pouvez Invoquer Spécialement 1 "Numéro 39 : Utopie" depuis votre Cimetière, et si vous le faites, il gagne une ATK égale à la somme des ATK de tous les Monstres Xyz "Utopie" et "Utopique" LUMIÈRE dans votre Cimetière. Lorsque votre Monstre Xyz "Utopie" ou "Utopique" attaquant dont l'Attribut d'origine est LUMIÈRE détruit un monstre de l'adversaire au combat : vous pouvez faire perdre exactement 1000 ATK à votre monstre, et si vous le faites, il peut attaquer une nouvelle fois à la suite. Vous ne pouvez activer qu'1 "Lien Immuable" par tour.
  | de_text             = (Diese Karte wird immer als „Xyz“-Karte behandelt.)<br />Wenn diese Karte aktiviert wird: Du kannst 1 „Nummer 39: Utopia“ als Spezialbeschwörung von deinem Friedhof beschwören und falls du dies tust, erhält sie ATK in Höhe der kombinierten ATK aller LICHT „Utopia“- und „Utopisch“-Xyz-Monster in deinem Friedhof. Wenn dein angreifendes „Utopia“- oder „Utopisch“-Xyz-Monster, dessen Grund-Eigenschaft LICHT ist, ein Monster eines Gegners durch Kampf zerstört: Du kannst dein Monster genau 1000 ATK verlieren lassen und falls du dies tust, kann es sofort noch einmal angreifen. Du kannst nur 1 „Endlose Verbindung“ pro Spielzug aktivieren.
  | it_text             = (Questa carta viene sempre considerata come una carta "Xyz".)<br />Quando questa carta viene attivata: puoi Evocare Specialmente 1 "Numero 39: Utopia" dal tuo Cimitero e, se lo fai, esso guadagna ATK pari alla somma degli ATK di tutti i Mostri Xyz "Utopia" e "Utopico" LUCE nel tuo Cimitero. Quando un tuo Mostro Xyz "Utopia" o "Utopico" attaccante con Attributo originale LUCE distrugge un mostro dell'avversario in battaglia: puoi far perdere al tuo mostro esattamente 1000 ATK e, se lo fai, esso può attaccare ancora di seguito. Puoi attivare solo 1 "Legame Infinito" per turno.
  | pt_text             = (Este card deve ser sempre considerado como um card "Xyz".)<br />Quando este card for ativado: você pode Invocar por Invocação-Especial 1 "Número 39: Utopia" do seu Cemitério e, se isso acontecer, ele ganha ATK igual ao ATK combinado de todos os Monstros Xyz "Utopia" e "Utópico" de LUZ no seu Cemitério. Quando um Monstro Xyz "Utopia" ou "Utópico" atacante seu cujo Atributo original seja LUZ destruir um monstro do oponente em batalha: você pode fazer com que seu monstro perca exatamente 1000 de ATK e, se isso acontecer, ele pode atacar novamente em seguida. Você só pode ativar 1 "Elo Sem Fim" por turno.
  | es_text             = (Esta carta se trata siempre como una carta "Xyz").<br />Cuando esta carta es activada: puedes Invocar de Modo Especial, desde tu Cementerio, 1 "Número 39: Utopía" y, si lo haces, éste gana ATK igual al ATK combinado de todos los Monstruos Xyz "Utopía" y "Utópico/a" de LUZ en tu Cementerio. Cuando tu Monstruo Xyz "Utopía" o "Utópico/a" atacante cuyo Atributo original es LUZ destruye un monstruo del adversario en batalla: puedes hacer que tu monstruo pierda exactamente 1000 ATK y, si lo haces, éste puede atacar de nuevo inmediatamente después. Sólo puedes activar 1 "Unión Sin Fin" por turno.
  | ja_text             = このカード名はルール上「エクシーズ」カードとしても扱う。このカード名のカードは１ターンに１枚しか発動できない。①：このカードの発動時の効果処理として、自分の墓地から「Ｎｏ．３９ 希望皇ホープ」１体を特殊召喚できる。そのモンスターの攻撃力は、自分の墓地の光属性の「ホープ」Ｘモンスターの攻撃力の合計分アップする。②：元々の属性が光属性の自分の「ホープ」Ｘモンスターの攻撃で相手モンスターを破壊した時に発動できる。その自分のモンスターの攻撃力を１０００ダウンし、そのモンスターは続けて攻撃できる。
  | ko_text             = 이 카드명은 룰상 "엑시즈" 카드로도 취급한다. 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이 카드의 발동시의 효과 처리로서, 자신 묘지에서 "No.39 유토피아" 1장을 특수 소환할 수 있다. 그 몬스터의 공격력은, 자신 묘지의 빛 속성의 "유토피아"나 "호프" 엑시즈 몬스터의 공격력의 합계만큼 올린다. ②: 원래의 속성이 빛 속성인 자신의 "유토피아"나 "호프" 엑시즈 몬스터의 공격으로 상대 몬스터를 파괴했을 때에 발동할 수 있다. 그 자신 몬스터의 공격력을 1000 내리고, 그 몬스터는 계속해서 공격할 수 있다.
  | sc_text             = 此卡名在规则上也视为“超量”卡。此卡名的卡1回合仅可发动1张。①：作为此卡发动时的效果处理，可从自己墓地将1只“编号39 希望皇霍普”特殊召唤。该怪兽的攻击力上升相当于自己墓地光属性的“霍普”超量怪兽的攻击力合计的数值。②：以原本的属性为光属性的、自己的“霍普”超量怪兽的攻击破坏对手怪兽时可以发动。该自己的怪兽的攻击力下降1000，该怪兽可继续攻击。
