  | text                = (This card is always treated as an "[[Xyz (archetype)|Xyz]]" card.)<br />When this card is [[activate]]d: You can [[Special Summon]] 1 "[[Number 39: Utopia]]" from your [[GY]], and if you do, it gains [[ATK]] equal to the total ATK of all [[LIGHT]] "[[Utopia (archetype)|Utopia]]" and "[[Utopic]]" [[Xyz Monster]]s in your GY. When your attacking "Utopia" or "Utopic" Xyz Monster whose original [[Attribute]] is LIGHT destroys an opponent's monster by battle: You can make that monster you control lose 1000 [[ATK]], and if you do, it can attack again in a row. You can only [[activate]] 1 "Endless Bond" per turn.
