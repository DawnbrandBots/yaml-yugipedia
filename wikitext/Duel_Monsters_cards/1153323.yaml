  | ja_text             = このカード名はルール上「エクシーズ」カードとしても扱う。このカード名のカードは１ターンに１枚しか発動できない。①：このカードの発動時の効果処理として、自分の墓地から「Ｎｏ．３９ 希望皇ホープ」１体を特殊召喚できる。そのモンスターの攻撃力は、自分の墓地の光属性の「ホープ」Ｘモンスターの攻撃力の合計分アップする。②：元々の属性が光属性の自分の「ホープ」Ｘモンスターの攻撃で相手モンスターを破壊した時に発動できる。その自分のモンスターの攻撃力を１０００ダウンし、そのモンスターは続けて攻撃できる。
  | ko_text             = 이 카드명은 룰상 "엑시즈" 카드로도 취급한다. 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이 카드의 발동시의 효과 처리로서, 자신 묘지에서 "No.39 유토피아" 1장을 특수 소환할 수 있다. 그 몬스터의 공격력은, 자신 묘지의 빛 속성의 "유토피아"나 "호프" 엑시즈 몬스터의 공격력의 합계만큼 올린다. ②: 원래의 속성이 빛 속성인 자신의 "유토피아"나 "호프" 엑시즈 몬스터의 공격으로 상대 몬스터를 파괴했을 때에 발동할 수 있다. 그 자신 몬스터의 공격력을 1000 내리고, 그 몬스터는 계속해서 공격할 수 있다.
  | sc_text             = 此卡名在规则上也视为“超量”卡。此卡名的卡1回合仅可发动1张。①：作为此卡发动时的效果处理，可从自己墓地将1只“编号39 希望皇霍普”特殊召唤。该怪兽的攻击力上升相当于自己墓地光属性的“霍普”超量怪兽的攻击力合计的数值。②：以原本的属性为光属性的、自己的“霍普”超量怪兽的攻击破坏对手怪兽时可以发动。该自己的怪兽的攻击力下降1000，该怪兽可继续攻击。
