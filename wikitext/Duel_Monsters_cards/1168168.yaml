  | text                  = [[Special Summon]] up to 2 "[[Clown Crew]]" [[monsters]] from your [[Main Deck|Deck]] and/or [[Extra Deck]], [[ignoring their Summoning conditions]], also until the end of the next [[turn]] after this card [[resolve]]s, you cannot [[activate]] the [[effect]]s of monsters Special Summoned from the Deck or Extra Deck. During your [[Main Phase]], if this card is in your [[GY]], except the turn it was sent there: You can [[banish]] this card and [[Tribute]] 1 monster from your [[hand]] or [[field]], then [[target]] 1 card on the field; [[return]] it to the hand. You can only use each effect of "Clown Crew Malabarisme" once per turn.
  | fr_text               = Invoquez Spécialement max. 2 monstres "Troupe des Clowns" depuis votre Deck et/ou Extra Deck, en ignorant leurs conditions d'Invocation, et aussi, jusqu'à la fin du prochain tour après la résolution de cette carte, vous ne pouvez pas activer les effets des monstres Invoqués Spécialement depuis le Deck ou Extra Deck. Durant votre Main Phase, si cette carte est dans votre Cimetière, sauf le tour où elle y a été envoyée : vous pouvez bannir cette carte, et Sacrifiez 1 monstre depuis votre main ou Terrain, puis ciblez 1 carte sur le Terrain ; renvoyez-la à la main. Vous ne pouvez utiliser chaque effet de "Malabarisme de la Troupe des Clowns" qu'une fois par tour. 
  | de_text               = Beschwöre bis zu 2 „Clowntrupp“-Monster als Spezialbeschwörung von deinem Deck und/oder Extra Deck, ungeachtet ihrer Beschwörungsbedingungen, zusätzlich kannst du bis zum Ende des nächsten Spielzugs, nachdem diese Karte aufgelöst wurde, keine Effekte von Monstern aktivieren, die als Spezialbeschwörung vom Deck oder Extra Deck beschworen wurden. Während deiner Main Phase, falls sich diese Karte in deinem Friedhof befindet, außer in dem Spielzug, in dem sie dorthin gelegt wurde: Du kannst diese Karte verbannen und 1 Monster von deiner Hand oder Spielfeldseite als Tribut anbieten und dann 1 Karte auf dem Spielfeld wählen; gib sie auf die Hand zurück. Du kannst jeden Effekt von „Clowntrupp-Jonglage“ nur einmal pro Spielzug verwenden.
  | it_text               = Evoca Specialmente fino a 2 mostri "Compagnia di Clown" dal tuo Deck e/o Extra Deck, ignorando le loro condizioni di Evocazione, inoltre fino alla fine del prossimo turno dopo che questa carta si è risolta, non puoi attivare gli effetti dei mostri Evocati Specialmente dal Deck o Extra Deck. Durante la tua Main Phase, se questa carta è nel tuo Cimitero, eccetto nel turno in cui è stata mandata lì: puoi bandire questa carta e offrire come Tributo 1 mostro dalla tua mano o Terreno, poi scegliere come bersaglio 1 carta sul Terreno; falla ritornare nella mano. Puoi utilizzare ogni effetto di "Malabarisme Compagnia di Clown" una sola volta per turno.
  | pt_text               = Invoque por Invocação-Especial até 2 monstros "Companhia de Palhaços" do seu Deck e/ou Deck Adicional, ignorando suas condições de Invocação e, além disso, até o final do próximo turno depois que este card resolver, você não pode ativar os efeitos de monstros Invocados por Invocação-Especial do Deck ou Deck Adicional. Durante sua Fase Principal, se este card estiver no seu Cemitério, exceto no turno em que foi enviado para lá: você pode banir este card e oferecer como Tributo 1 monstro da sua mão ou do campo e, depois, escolha 1 card no campo; devolva-o para a mão. Você só pode usar cada efeito de "Malabarismo da Companhia de Palhaços" uma vez por turno.
  | es_text               = Invoca de Modo Especial hasta 2 monstruos "Compañía de Payasos" desde tu Deck y/o Deck Extra, ignorando sus condiciones de Invocación y además, hasta el final del próximo turno después de que esta carta se resuelva, no puedes activar los efectos de los monstruos Invocados de Modo Especial desde el Deck o Deck Extra. Durante tu Main Phase, si esta carta está en tu Cementerio, excepto en el turno en el que ésta fue mandada allí: puedes desterrar esta carta y Sacrificar 1 monstruo en tu mano o Campo, y después selecciona 1 carta en el Campo; devuélvela a la mano. Sólo puedes usar cada efecto de "Malabarismos de la Compañía de Payasos" una vez por turno.
  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：デッキ・ＥＸデッキから「道化の一座」モンスターを２体まで召喚条件を無視して特殊召喚する。このカードの発動後、次のターンの終了時まで自分はデッキ・ＥＸデッキから特殊召喚されたモンスターの効果を発動できない。②：自分メインフェイズに、このターンに墓地へ送られていないこのカードを墓地から除外し、自分の手札・フィールドのモンスター１体をリリースし、フィールドのカード１枚を対象として発動できる。そのカードを手札に戻す。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱 / 엑스트라 덱에서 "크라운 클랜" 몬스터를 2장까지 소환 조건을 무시하고 특수 소환한다. 이 카드의 발동 후, 다음 턴의 종료시까지 자신은 덱 / 엑스트라 덱에서 특수 소환된 몬스터의 효과를 발동할 수 없다. ②: 자신 메인 페이즈에, 이 턴에 묘지로 보내져 있지 않은 이 카드를 묘지에서 제외하고, 자신의 패 / 필드의 몬스터 1장을 릴리스하고, 필드의 카드 1장을 대상으로 하여 발동할 수 있다. 그 카드를 패로 되돌린다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：从牌组・额外牌组将最多2只“小丑戏帮”怪兽无视召唤条件特殊召唤。此卡发动后，直至下个回合结束时为止，自己不可发动被从牌组・额外牌组特殊召唤的怪兽的效果。②：在自己的主要阶段，从墓地将不是在此回合被送至墓地的此卡除外，解放自己手牌・场上的1只怪兽，以场上的1张卡为对象可以发动。将该卡放回手牌。
