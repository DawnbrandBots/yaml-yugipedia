  | fr_text               = 1 monstre "Aleister" + 1 monstre LUMIÈRE ou TERRE<br />Si cette carte est Invoquée Spécialement : vous pouvez ajouter 1 "Virakam, l'Esprit Divin de l'Artifice" ou 1 "Invocation Gamma" depuis votre Deck à votre main, puis vous pouvez bannir 1 monstre depuis l'un des Cimetières. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 Monstre Fusion que vous contrôlez ; jusqu'à la fin de ce tour, les monstres actuellement contrôlés par votre adversaire perdent une ATK égale à l'ATK du monstre ciblé. Vous ne pouvez utiliser chaque effet de "Baybarron l'Invokhée" qu'une fois par tour.
  | de_text               = 1 „Aleister“-Monster + 1 LICHT oder ERDE Monster<br />Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Virakam, der göttliche Geist der Kunstfertigkeit“ oder 1 „Gamma-Beschwörung“ von deinem Deck hinzufügen, dann kannst du 1 Monster von einem beliebigen Friedhof verbannen. Du kannst diese Karte von deinem Friedhof verbannen und dann 1 Fusionsmonster wählen, das du kontrollierst; Monster, die dein Gegner derzeit kontrolliert, verlieren bis zum Ende dieses Spielzugs ATK in Höhe der ATK des als Ziel gewählten Monsters. Du kannst jeden Effekt von „Beschworene Baybaron“ nur einmal pro Spielzug verwenden.
  | it_text               = 1 mostro "Aleister" + 1 mostro LUCE o TERRA<br />Se questa carta viene Evocata Specialmente: puoi aggiungere 1 "Virakam, lo Spirito Divino dell'Artificio" o 1 "Evocazione Gamma" dal tuo Deck alla tua mano, poi puoi bandire 1 mostro da qualsiasi Cimitero. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 Mostro Fusione che controlli; i mostri attualmente controllati dal tuo avversario perdono ATK pari all'ATK del mostro scelto come bersaglio, fino alla fine di questo turno. Puoi utilizzare ogni effetto di "Baybarron Invokata" una sola volta per turno.
  | pt_text               = 1 monstro "Aleister" + 1 monstro de LUZ ou de TERRA<br />Se este card for Invocado por Invocação-Especial: você pode adicionar 1 "Virakam, o Espírito Divino do Artifício" ou 1 "Invocação Gama" do seu Deck à sua mão e, depois, você pode banir 1 monstro de qualquer Cemitério. Você pode banir este card do seu Cemitério e, depois, escolha 1 Monstro de Fusão que você controla; até o final deste turno, monstros que seu oponente controla atualmente perdem ATK igual ao ATK do monstro alvo. Você só pode usar cada efeito de "Baybarron, a Invokada" uma vez por turno.
  | es_text               = 1 monstruo "Aleister" + 1 monstruo de LUZ o TIERRA<br />Si esta carta es Invocada de Modo Especial: puedes añadir a tu mano 1 "Virakam, el Espíritu Divino de Artificio" o 1 "Invocación Gamma" en tu Deck, y después puedes desterrar 1 monstruo en cualquier Cementerio. Puedes desterrar esta carta en tu Cementerio, y después selecciona 1 Monstruo de Fusión que controles; los monstruos que controla tu adversario en este momento pierden ATK igual al ATK del monstruo seleccionado, hasta el final de este turno. Sólo puedes usar cada efecto de "Baybarron Invokada" una vez por turno.
  | ja_text               = 「アレイスター」モンスター＋光・地属性モンスター<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合に発動できる。デッキから「人工神霊ヴィラカム」１体か「魔法名－「新しき世界の始まり」」１枚を手札に加える。その後、自分か相手の墓地からモンスター１体を除外できる。②：墓地のこのカードを除外し、自分フィールドの融合モンスター１体を対象として発動できる。相手フィールドの全てのモンスターの攻撃力はターン終了時まで対象のモンスターの攻撃力分ダウンする。
