  | text                  = If you have a [[Synchro Monster]] in your [[field]] or [[GY]]: You can [[Special Summon]] this card from your [[hand]]. If this card is Special Summoned: You can place up to 3 [[Synchro Monster]]s with different names from your [[Extra Deck]] and/or GY in your [[Spell & Trap Zone]] as [[face-up]] [[Continuous Spell]]s, and Special Summon 1 "[[Arc Token]]" ([[Machine]]/[[LIGHT]]/[[ATK]] 0/[[DEF]] 0) with a [[Level]] equal to the number placed, also for the rest of this [[turn]], you cannot Special Summon from the Extra Deck, except Synchro Monsters. You can only use each effect of "Witness of the Ancient" once per turn.
  | fr_text               = Si vous avez un Monstre Synchro dans votre Terrain ou Cimetière : vous pouvez Invoquer Spécialement cette carte depuis votre main. Si cette carte est Invoquée Spécialement : vous pouvez placer max. 3 Monstres Synchro de noms différents depuis votre Extra Deck et/ou Cimetière dans votre Zone Magie & Piège comme Magies Continues face recto, et Invoquez Spécialement 1 "Jeton Arc" (Machine/LUMIÈRE/ATK 0/DEF 0) de Niveau égal au nombre placé, et aussi, vous ne pouvez pas Invoquer Spécialement (Monstres Synchro exclus) depuis l'Extra Deck le reste de ce tour. Vous ne pouvez utiliser chaque effet de "Témoin de l'Ancien" qu'une fois par tour.
  | de_text               = Falls du ein Synchromonster auf deiner Spielfeldseite oder in deinem Friedhof hast: Du kannst diese Karte als Spezialbeschwörung von deiner Hand beschwören. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst bis zu 3 Synchromonster mit unterschiedlichen Namen von deinem Extra Deck und/oder Friedhof als offene Permanente Zauber in deine Zauber- & Fallenzone legen und 1 „Arch-Spielmarke“ (Maschine/LICHT/ATK 0/DEF 0) mit einer Stufe in Höhe der gelegten Anzahl als Spezialbeschwörung beschwören, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Synchromonstern. Du kannst jeden Effekt von „Zeuge der Uralten“ nur einmal pro Spielzug verwenden.
  | it_text               = Se hai un Mostro Synchro nel tuo Terreno o Cimitero: puoi Evocare Specialmente questa carta dalla tua mano. Se questa carta viene Evocata Specialmente: puoi mettere fino a 3 Mostri Synchro con nomi diversi dal tuo Extra Deck e/o Cimitero nella tua Zona Magie & Trappole come Magie Continue scoperte ed Evocare Specialmente 1 "Segna-Arca" (Macchina/LUCE/ATK 0/DEF 0) con un Livello pari al numero messo, inoltre per il resto di questo turno, non puoi Evocare Specialmente dall'Extra Deck, eccetto Mostri Synchro. Puoi utilizzare ogni effetto di "Testimone dell'Antico" una sola volta per turno.
  | pt_text               = Se você tiver um Monstro Sincro no seu campo ou Cemitério: você pode Invocar este card por Invocação-Especial da sua mão. Se este card for Invocado por Invocação-Especial: você pode colocar até 3 Monstros Sincro com nomes diferentes do seu Deck Adicional e/ou Cemitério na sua Zona de Magias & Armadilhas, como Magias Contínuas com a face para cima e Invoque por Invocação-Especial 1 "Ficha de Arca" (Máquina/LUZ/ATK 0/DEF 0) com um Nível igual ao número colocado e, além disso, pelo resto deste turno, você não pode Invocar por Invocação-Especial do Deck Adicional, exceto Monstros Sincro. Você só pode usar cada efeito de "Testemunha dos Antigos" uma vez por turno.
  | es_text               = Si tienes un Monstruo de Sincronía en tu Campo o Cementerio: puedes Invocar esta carta de Modo Especial desde tu mano. Si esta carta es Invocada de Modo Especial: puedes poner en tu Zona de Magia y Trampas, como Mágicas Continuas boca arriba, hasta 3 Monstruos de Sincronía con nombres diferentes en tu Deck Extra y/o Cementerio, e Invoca de Modo Especial 1 "Ficha Arka" (Máquina/LUZ/ATK 0/DEF 0) con un Nivel igual al número de puestas y además, por el resto de este turno, no puedes Invocar de Modo Especial desde el Deck Extra, excepto Monstruos de Sincronía. Sólo puedes usar cada efecto de "Testigo de los Ancestros" una vez por turno.
