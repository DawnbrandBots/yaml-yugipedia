  | ja_text               = このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手ターンに、自分のフィールド（表側表示）・墓地から炎属性モンスター１体を除外して発動できる。このカードを手札から特殊召喚する。②：このカードが特殊召喚した場合、フィールドの表側表示カード１枚を対象として発動できる。そのカードの効果をターン終了時まで無効にする。③：このカードがＬ素材として墓地へ送られた場合に発動できる。このターンに自分の墓地へ送られた速攻魔法・通常罠カード１枚を墓地から自分フィールドにセットする。
  | ko_text               = 이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대 턴에, 자신의 필드(앞면 표시) / 묘지에서 화염 속성 몬스터 1장을 제외하고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 이 카드를 특수 소환했을 경우, 필드의 앞면 표시 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드의 효과를 턴 종료시까지 무효로 한다. ③: 이 카드가 링크 소재로서 묘지로 보내졌을 경우에 발동할 수 있다. 이 턴에 자신 묘지로 보내진 속공 마법 / 일반 함정 카드 1장을 묘지에서 자신 필드에 세트한다.
  | sc_text               = 此卡名的①②③效果1回合仅可各使用1次。①：在自己・对手回合中，从自己场上（表侧表示）・墓地将1只炎属性怪兽除外可以发动。从手牌将此卡特殊召唤。②：此卡特殊召唤的情况下，以场上表侧表示的1张卡为对象可以发动。将该卡的效果直至回合结束时为止无效。③：此卡作为连接素材被送至墓地的情况下可以发动。从墓地将1张在此回合中被送至自己墓地的速攻魔法・通常陷阱卡放置在自己场上。
