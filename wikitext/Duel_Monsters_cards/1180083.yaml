  | ja_text               = このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドにモンスターが存在しない場合、このカードは手札から特殊召喚できる。②：このカードが特殊召喚した場合、相手フィールドの表側表示モンスター１体を対象として発動できる。そのモンスターの効果をターン終了時まで無効にする。③：自分メインフェイズに発動できる。フィールドのこのカードを含む自分の手札・フィールドのモンスターを融合素材とし、機械族の融合モンスター１体を融合召喚する。
  | ko_text               = 이 카드명의 ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드에 몬스터가 존재하지 않을 경우, 이 카드는 패에서 특수 소환할 수 있다. ②: 이 카드를 특수 소환했을 경우, 상대 필드의 앞면 표시 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 효과를 턴 종료시까지 무효로 한다. ③: 자신 메인 페이즈에 발동할 수 있다. 필드의 이 카드를 포함하는 자신의 패 / 필드의 몬스터를 융합 소재로 하고, 기계족인 융합 몬스터 1장을 융합 소환한다.
  | sc_text               = 此卡名的②③效果1回合仅可各使用1次。①：自己场上不存在怪兽的情况下，此卡可从手牌特殊召唤。②：此卡特殊召唤的情况下，以对手场上的1只表侧表示怪兽为对象可以发动。将该怪兽的效果直至回合结束时为止无效。③：在自己的主要阶段可以发动。将包含场上的此卡在内的、自己手牌・场上的怪兽作为融合素材，将1只机械族的融合怪兽融合召唤。
