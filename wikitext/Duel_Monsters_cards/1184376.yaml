  | text                  = 2 non-[[Link Monster]]s<br />If this card is [[Link Summon]]ed, and you have a "[[Power Patron]]" [[monster]] in your [[GY]]: You can [[Add a card|add]] 1 "[[Theorealize (archetype)|Theorealize]]" card from your [[Main Deck|Deck]] to your [[hand]]. During the [[Main Phase]], if you [[control]] another [[DARK]] [[Fairy]] monster, you can ([[Quick Effect]]): Immediately after this [[effect]] [[resolve]]s, [[Link Summon]] 1 Link Monster using materials you control, including this card. You can only use each effect of "Purification Power Patron" [[once per turn]].
  | fr_text               = 2 Monstres non-Lien<br />Si cette carte est Invoquée par Lien, et que vous avez un monstre "Mécène du Pouvoir" dans votre Cimetière : vous pouvez ajouter 1 carte "Théoréalisation" depuis votre Deck à votre main. Durant la Main Phase, si vous contrôlez un autre monstre TÉNÈBRES Elfe, vous pouvez (Effet Rapide) : immédiatement après la résolution de cet effet, Invoquez par Lien 1 Monstre Lien en utilisant des Matériels que vous contrôlez (cette carte incluse). Vous ne pouvez utiliser chaque effet de "Mécène du Pouvoir de la Purification" qu'une fois par tour.
  | de_text               = 2 Nichtlink-Monster<br />Falls diese Karte als Linkbeschwörung beschworen wird und du ein „Machtpatron“-Monster in deinem Friedhof hast: Du kannst deiner Hand 1 „Theorealisier“-Karte von deinem Deck hinzufügen. Während der Main Phase, falls du ein anderes FINSTERNIS Fee-Monster kontrollierst, kannst du (Schnelleffekt): Sofort nachdem dieser Effekt aufgelöst wurde, beschwöre 1 Linkmonster als Linkbeschwörung, indem du Material verwendest, das du kontrollierst, darunter diese Karte. Du kannst jeden Effekt von „Reinigungs-Machtpatron“ nur einmal pro Spielzug verwenden.
  | it_text               = 2 Mostri non-Link<br />Se questa carta viene Evocata Link, e tu hai un mostro "Patrono Potente" nel tuo Cimitero: puoi aggiungere 1 carta "Teorealizzare" dal tuo Deck alla tua mano. Durante la Main Phase, se controlli un altro mostro OSCURITÀ Fata, puoi (Effetto Rapido): immediatamente dopo che questo effetto si è risolto, Evoca Link 1 Mostro Link utilizzando materiali che controlli, compresa questa carta. Puoi utilizzare ogni effetto di "Patrono Potente Purificazione" una sola volta per turno.
  | pt_text               = 2 Monstros que não sejam Link<br />Se este card for Invocado por Invocação-Link e você tiver um monstro "Patrono(a) do Poder" no seu Cemitério: você pode adicionar 1 card "Teorealizar" do seu Deck à sua mão. Durante a Fase Principal, se você controlar outro monstro Fada de TREVAS, você pode (Efeito Rápido): imediatamente depois que este efeito resolver, Invoque 1 Monstro Link por Invocação-Link usando matérias que você controla, incluindo este card. Você só pode usar cada efeito de "Patrono do Poder da Purificação" uma vez por turno.
  | es_text               = 2 Monstruos no de Enlace<br />Si esta carta es Invocada por Enlace y tienes un monstruo "Modelo de Poder" en tu Cementerio: puedes añadir a tu mano 1 carta "Teoresaber" en tu Deck. Durante la Main Phase, si controlas otro monstruo Hada de OSCURIDAD, puedes (Efecto Rápido): inmediatamente después de que se resuelva este efecto, Invocar por Enlace 1 Monstruo de Enlace usando materiales que controlas, incluyendo esta carta. Sólo puedes usar cada efecto de "Purificación Modelo de Poder" una vez por turno.
  | ja_text               = Ｌモンスター以外のモンスター２体<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＬ召喚した場合、自分の墓地に「獄神」モンスターが存在していれば発動できる。デッキから「テオリアライズ」カード１枚を手札に加える。②：自分・相手のメインフェイズに、自分フィールドに他の天使族・闇属性モンスターが存在する場合に発動できる。このカードを含む自分フィールドのモンスターを素材としてＬ召喚を行う。
  | ko_text               = 
  | sc_text               = 连接怪兽以外的怪兽2只<br />此卡名的①②效果1回合仅可各使用1次。①：此卡连接召唤的情况下，如果自己墓地存在“狱神”怪兽则可以发动。从牌组将1张“预幻”卡加入手牌。②：在自己・对手的主要阶段，自己场上存在其他天使族・暗属性怪兽的情况下可以发动。将包含此卡在内的、自己场上的怪兽作为素材进行连接召唤。
