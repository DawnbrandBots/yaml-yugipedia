  | text                  = If this card is in your [[hand]]: You can [[discard]] 1 other card; [[Special Summon]] this card. If an [[Xyz Monster]](s) is [[sent]] to the [[GY]], while this card is in your GY (except during the [[Damage Step]]): You can [[banish]] this card; Special Summon 1 [[Zombie]] [[monster]] from your GY. During the [[Standby Phase]] of the next turn after this card was banished: You can [[target]] 1 Zombie Xyz Monster you [[control]]; [[attach]] this banished card to it. You can only use each effect of "Officiating Reverie" [[once per turn]].
  | fr_text               = Si cette carte est dans votre main : vous pouvez défausser 1 autre carte ; Invoquez Spécialement cette carte. Si un ou plusieurs Monstres Xyz sont envoyés au Cimetière, tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez bannir cette carte ; Invoquez Spécialement 1 monstre Zombie depuis votre Cimetière. Durant la Standby Phase du prochain tour après que cette carte a été bannie : vous pouvez cibler 1 Monstre Xyz Zombie que vous contrôlez ; attachez-lui cette carte bannie. Vous ne pouvez utiliser chaque effet de "Reverie l'Officiante" qu'une fois par tour.
  | de_text               = Falls sich diese Karte in deiner Hand befindet: Du kannst 1 andere Karte abwerfen; beschwöre diese Karte als Spezialbeschwörung. Falls ein oder mehr Xyz-Monster auf den Friedhof gelegt werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte verbannen; beschwöre 1 Zombie-Monster als Spezialbeschwörung von deinem Friedhof. Während der Standby Phase des nächsten Spielzugs, nachdem diese Karte verbannt wurde: Du kannst 1 Zombie-Xyz-Monster wählen, das du kontrollierst; hänge diese verbannte Karte daran an. Du kannst jeden Effekt von „Zeremonienleitende Reverie“ nur einmal pro Spielzug verwenden.
  | it_text               = Se questa carta è nella tua mano: puoi scartare 1 altra carta; Evoca Specialmente questa carta. Se uno o più Mostri Xyz vengono mandati al Cimitero, mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi bandire questa carta; Evoca Specialmente 1 mostro Zombie dal tuo Cimitero. Durante la Standby Phase del prossimo turno dopo che questa carta è stata bandita: puoi scegliere come bersaglio 1 Mostro Xyz Zombie che controlli; attacca questa carta bandita a esso. Puoi utilizzare ogni effetto di "Reverie Officiante" una sola volta per turno.
  | pt_text               = Se este card estiver na sua mão: você pode descartar 1 outro card; Invoque este card por Invocação-Especial. Se um ou mais Monstros Xyz forem enviados para o Cemitério, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode banir este card; Invoque por Invocação-Especial 1 monstro Zumbi do seu Cemitério. Durante a Fase de Apoio do próximo turno depois que este card foi banido: você pode escolher 1 Monstro Xyz Zumbi que você controla; associe este card banido a ele. Você só pode usar cada efeito de "Oficiante Reverie" uma vez por turno.
  | es_text               = Si esta carta está en tu mano: puedes descartar otra carta; Invoca esta carta de Modo Especial. Si uno o más Monstruos Xyz son mandados al Cementerio, mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes desterrar esta carta; Invoca de Modo Especial 1 monstruo Zombi desde tu Cementerio. Durante la Standby Phase del próximo turno después de que esta carta fuera desterrada: puedes seleccionar 1 Monstruo Xyz Zombi que controles; acóplale esta carta desterrada. Sólo puedes usar cada efecto de "Reverie Oficiando" una vez por turno.
