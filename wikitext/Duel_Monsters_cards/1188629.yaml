  | fr_text               = 1 monstre "GMX" + 2+ monstres Dinosaure<br />Gagne ces effets selon le nombre de monstres Dinosaure utilisés comme Matériel Fusion pour cette carte.<br />● 3+ : Votre adversaire ne peut pas cibler cette carte avec des effets de carte.<br />● 4+ : Peut faire max. 3 attaques durant chaque Battle Phase.<br />● 5+ : Chaque fois que votre adversaire Invoque Normalement ou Spécialement un ou plusieurs monstres, il perd 800 LP.<br />Une fois par tour, si vous dévoilez une ou plusieurs cartes par un effet de carte "GMX" : vous pouvez détruire tous les autres monstres sur le Terrain.
  | de_text               = 1 „GMX“-Monster + 2+ Dinosaurier-Monster<br />Erhält diese Effekte, basierend auf der Anzahl der Dinosaurier-Monster, die als Fusionsmaterial für diese Karte verwendet wurden.<br />● 3+: Dein Gegner kann diese Karte nicht als Ziel für Karteneffekte wählen.<br />● 4+: Kann während jeder Battle Phase bis zu 3 Angriffe durchführen.<br />● 5+: Jedes Mal, wenn dein Gegner ein oder mehr Monster als Normal- oder Spezialbeschwörung beschwört, verliert er 800 LP.<br />Einmal pro Spielzug, falls du eine oder mehr Karten durch einen „GMX“-Karteneffekt ausgräbst: Du kannst alle anderen Monster auf dem Spielfeld zerstören.
  | it_text               = 1 mostro "GMX" + 2+ mostri Dinosauro<br />Guadagna questi effetti a seconda del numero di mostri Dinosauro utilizzati come Materiale da Fusione per questa carta.<br />● 3+: Il tuo avversario non può scegliere questa carta come bersaglio con gli effetti delle carte.<br />● 4+: Può effettuare fino a 3 attacchi durante ogni Battle Phase.<br />● 5+: Ogni volta che il tuo avversario Evoca Normalmente o Specialmente uno o più mostri, lui perde 800 LP.<br />Una volta per turno, se dissotterri una o più carte con l'effetto di una carta "GMX": puoi distruggere tutti gli altri mostri sul Terreno.
  | pt_text               = 1 monstro "GMX" + 2+ monstros Dinossauro<br />Ganha esses efeitos de acordo com o número de monstros Dinossauro usados como Matéria de Fusão para este card.<br />● 3+: Seu oponente não pode escolher este card como alvo de efeitos de card.<br />● 4+: Pode realizar até 3 ataques durante cada Fase de Batalha.<br />● 5+: Sempre que seu oponente Invocar um ou mais monstros por Invocação-Normal ou Especial, ele perde 800 PV.<br />Uma vez por turno, se você escavar um ou mais cards devido a um efeito de card "GMX": você pode destruir todos os outros monstros no campo.
