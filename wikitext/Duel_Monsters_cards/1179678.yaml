  | text                  = If you have a "[[The Phantom Knights]]" [[monster]] in your [[field]] or [[GY]], you can [[activate]] this card the [[turn]] it was [[Set]]. [[Special Summon]] this card in [[Defense Position]] as a [[Normal Monster]] ([[Warrior]]/[[DARK]]/[[Level]] 3/[[ATK]] 0/[[DEF]] 300) (this card is NOT treated as a [[Trap]]), then you can change 1 [[Attack Position]] monster your opponent [[control]]s to [[Defense Position]]. You can [[banish]] this card from your GY; immediately after this [[effect]] [[resolve]]s, [[Xyz Summon]] 1 DARK [[Xyz Monster]]. You can only use each effect of "The Phantom Knights of Umbrage Veil" [[once per turn]].
  | fr_text               = Si vous avez un monstre "Les Chevaliers Fantômes" dans votre Terrain ou Cimetière, vous pouvez activer cette carte le tour où elle a été Posée. Invoquez Spécialement cette carte en Position de Défense comme Monstre Normal (Guerrier/TÉNÈBRES/Niveau 3/ATK 0/DEF 300) (cette carte N'EST PAS traitée comme Piège), puis vous pouvez changer 1 monstre en Position d'Attaque contrôlé par votre adversaire en Position de Défense. Vous pouvez bannir cette carte depuis votre Cimetière ; immédiatement après la résolution de cet effet, Invoquez par Xyz 1 Monstre Xyz TÉNÈBRES. Vous ne pouvez utiliser chaque effet de "Les Chevaliers Fantômes du Voile de l'Ombrage" qu'une fois par tour.
  | de_text               = Falls du ein „Die Phantomritter“-Monster auf deiner Spielfeldseite oder in deinem Friedhof hast, kannst du diese Karte in dem Spielzug aktivieren, in dem sie gesetzt wurde. Beschwöre diese Karte als Spezialbeschwörung als Normales Monster (Krieger/FINSTERNIS/Stufe 3/ATK 0/DEF 300) in die Verteidigungsposition (diese Karte wird NICHT als Falle behandelt), dann kannst du 1 Monster in Angriffsposition, das dein Gegner kontrolliert, in die Verteidigungsposition ändern. Du kannst diese Karte von deinem Friedhof verbannen; sofort nachdem dieser Effekt aufgelöst wurde, beschwöre 1 FINSTERNIS Xyz-Monster als Xyz-Beschwörung. Du kannst jeden Effekt von „Die Phantomritter des Anstößigen Schleiers“ nur einmal pro Spielzug verwenden.
  | it_text               = Se hai un mostro "I Cavalieri Fantasma" nel tuo Terreno o Cimitero, puoi attivare questa carta nel turno in cui è stata Posizionata. Evoca Specialmente questa carta in Posizione di Difesa come Mostro Normale (Guerriero/OSCURITÀ/Livello 3/ATK 0/DEF 300) (questa carta NON viene considerata come una Trappola), poi puoi mettere in Posizione di Difesa 1 mostro in Posizione di Attacco controllato dal tuo avversario. Puoi bandire questa carta dal tuo Cimitero; immediatamente dopo che questo effetto si è risolto, Evoca Xyz 1 Mostro Xyz OSCURITÀ. Puoi utilizzare ogni effetto di "I Cavalieri Fantasma del Velo dell'Offesa" una sola volta per turno.
  | pt_text               = Se você tiver um monstro "Os Cavaleiros Fantasmas" no seu campo ou Cemitério, você pode ativar este card no turno em que foi Baixado. Invoque este card por Invocação-Especial em Posição de Defesa como um Monstro Normal (Guerreiro/TREVAS/Nível 3/ATK 0/DEF 300) (este card NÃO é considerado como uma Armadilha) e, depois, você pode colocar em Posição de Defesa 1 monstro em Posição de Ataque que seu oponente controla. Você pode banir este card do seu Cemitério; imediatamente depois que este efeito resolver, Invoque por Invocação-Xyz 1 Monstro Xyz de TREVAS. Você só pode usar cada efeito de "Os Cavaleiros Fantasmas do Véu da Ira" uma vez por turno.
  | es_text               = Si tienes un monstruo "Los Caballeros Fantasma" en tu Campo o Cementerio, puedes activar esta carta en el turno en el que fue Colocada. Invoca esta carta de Modo Especial en Posición de Defensa como un Monstruo Normal (Guerrero/OSCURIDAD/Nivel 3/ATK 0/DEF 300) (esta carta NO se trata como una Trampa), y después puedes cambiar 1 monstruo en Posición de Ataque que controle tu adversario a Posición de Defensa. Puedes desterrar esta carta en tu Cementerio; inmediatamente después de que se resuelva este efecto, Invoca Xyz 1 Monstruo Xyz de OSCURIDAD. Sólo puedes usar cada efecto de "Los Caballeros Fantasma del Velo del Resentimiento" una vez por turno.
  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。自分のフィールドか墓地に「幻影騎士団」モンスターが存在する場合、このカードはセットしたターンでも発動できる。①：このカードは発動後、通常モンスター（戦士族・闇・星３・攻０／守３００）となり、モンスターゾーンに守備表示で特殊召喚する（罠カードとしては扱わない）。その後、相手フィールドの攻撃表示モンスター１体を守備表示にできる。②：墓地のこのカードを除外して発動できる。闇属性Ｘモンスター１体のＸ召喚を行う。
  | ko_text               = 
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。自己场上或墓地存在“魅影骑士团”怪兽的情况下，此卡在放置的回合也可以发动。①：此卡发动后，变为通常怪兽（战士族・暗・星3・攻0/守300），以守备表示特殊召唤至怪兽区域（不视为陷阱卡）。然后，可将对手场上的1只攻击表示怪兽改成守备表示。②：将墓地的此卡除外可以发动。进行1只暗属性超量怪兽的超量召唤。
