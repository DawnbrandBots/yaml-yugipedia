  | ja_text               = このカード名の②③の効果は１ターンに１度、いずれか１つしか使用できない。①：このカードのカード名は、フィールド・墓地に存在する限り「ブラック・マジシャン」として扱う。②：このカードが手札に存在する場合、手札の魔法カード１枚を相手に見せて発動できる。このカードを特殊召喚する。その後、デッキから「ブラック・マジシャン」のカード名が記された魔法・罠カード１枚を自分フィールドにセットできる。③：自分・相手ターンに、手札から魔法カード１枚を捨てて発動できる。相手フィールドの魔法・罠カードを全て破壊する。
  | ko_text               = 이 카드명의 ②③의 효과는 1턴에 1번, 어느 쪽이든 1개밖에 사용할 수 없다. ①: 이 카드의 카드명은, 필드 / 묘지에 존재하는 한 "블랙 매지션"으로 취급한다. ②: 이 카드가 패에 존재할 경우, 패의 마법 카드 1장을 상대에게 보여주고 발동할 수 있다. 이 카드를 특수 소환한다. 그 후, 덱에서 "블랙 매지션"의 카드명이 쓰여진 마법 / 함정 카드 1장을 자신 필드에 세트할 수 있다. ③: 자신 / 상대 턴에, 패에서 마법 카드 1장을 버리고 발동할 수 있다. 상대 필드의 마법 / 함정 카드를 전부 파괴한다.
  | sc_text               = 此卡名的②③效果1回合1次，仅可使用其中1个。①：此卡只要存在于场上・墓地，卡名视为“黑魔导”。②：此卡存在于手牌的情况下，向对手出示手牌的1张魔法卡可以发动。将此卡特殊召唤。然后，可从牌组将1张记载有“黑魔导”卡名的魔法・陷阱卡放置在自己场上。③：在自己・对手回合中，从手牌将1张魔法卡舍弃可以发动。将对手场上的魔法・陷阱卡全部破坏。
