  | text                  = [[Activate]] only if you [[control]] a "[[GMX]]" [[monster]]. [[Once per turn]], when your opponent activates a [[monster effect]] on the [[field]] (except during the [[Damage Step]]): You can [[excavate]] the top 5 cards of your [[Main Deck|Deck]], then if you excavated a "GMX" card(s), [[negate]] that activated effect, also place all the excavated cards on the top or bottom of the Deck in any order.
  | fr_text               = Activez uniquement si vous contrôlez un monstre "GMX". Une fois par tour, lorsque votre adversaire active un effet de monstre sur le Terrain (sauf durant la Damage Step) : vous pouvez dévoiler les 5 cartes du dessus de votre Deck, puis si vous avez dévoilé une ou plusieurs cartes "GMX", annulez l'effet activé, et aussi, placez toutes les cartes dévoilées au-dessus ou au-dessous du Deck dans l'ordre de votre choix.
  | de_text               = Aktiviere diese Karte nur, falls du ein „GMX“-Monster kontrollierst. Einmal pro Spielzug, wenn dein Gegner einen Monstereffekt auf dem Spielfeld aktiviert (außer während des Damage Steps): Du kannst die obersten 5 Karten deines Decks ausgraben, dann, falls du eine oder mehr „GMX“-Karten ausgegraben hast, annulliere jenen aktivierten Effekt, zusätzlich lege alle ausgegrabenen Karten in beliebiger Reihenfolge aufs oder unters Deck.
  | it_text               = Attiva solo se controlli un mostro "GMX". Una volta per turno, quando il tuo avversario attiva l'effetto di un mostro sul Terreno (eccetto durante il Damage Step): puoi dissotterrare le prime 5 carte del tuo Deck, poi se hai dissotterrato una o più carte "GMX", annulla quell'effetto attivato, inoltre metti tutte le carte dissotterrate in cima o in fondo al Deck in qualsiasi ordine.
  | pt_text               = Ative apenas se você controlar um monstro "GMX". Uma vez por turno, quando seu oponente ativar um efeito de monstro no campo (exceto durante a Etapa de Dano): você pode escavar os 5 cards do topo do seu Deck e, depois, se você escavou um ou mais cards "GMX", negue esse efeito ativado e, além disso, coloque todos os cards escavados no topo ou no fundo do Deck em qualquer ordem.
  | es_text               = Activa esta carta sólo si controlas un monstruo "GMX". Una vez por turno, cuando tu adversario activa el efecto de un monstruo en el Campo (excepto durante el Damage Step): puedes excavar las 5 cartas de la parte superior de tu Deck y después, si excavaste una o más cartas "GMX", niega ese efecto activado, y además pon todas las cartas excavadas en la parte superior o inferior del Deck en cualquier orden.
  | ja_text               = 自分フィールドに「ＧＭＸ」モンスターが存在する場合にこのカードを発動できる。①：１ターンに１度、相手がフィールドのモンスターの効果を発動した時に発動できる。自分のデッキの上からカードを５枚めくり、その中に「ＧＭＸ」カードがあった場合、その発動した効果を無効にする。めくったカードをデッキの上か下に好きな順番で戻す。
  | ko_text               = 
  | sc_text               = 自己场上存在“GMX”怪兽的情况下可以发动此卡。①：1回合1次，对手发动场上的怪兽的效果时可以发动。从自己牌组上面翻开5张卡，其中有“GMX”卡的情况下，将该发动的效果无效。将所翻开的卡以喜欢的顺序放回牌组上面或下面。
