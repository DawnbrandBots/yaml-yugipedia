  | ja_text               = ①：以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。●自分の墓地からドラゴン族モンスター１体をデッキに戻す。その後、戻したモンスターとはカード名が異なる「ヴァレット」モンスター１体をデッキから特殊召喚できる。●自分の墓地からドラゴン族モンスター２体をデッキに戻す。その後、自分の墓地からフィールド魔法カード１枚を手札に加える。●自分の墓地からドラゴン族モンスター３体をデッキに戻す。その後、相手の墓地からモンスターを３体までデッキに戻す。
  | ko_text               = ①: 이하의 효과에서 1개를 선택하고 발동할 수 있다(이 카드명의 이하의 효과는 각각 1턴에 1번밖에 선택할 수 없다). ●자신 묘지에서 드래곤족 몬스터 1장을 덱으로 되돌린다. 그 후, 되돌린 몬스터와는 카드명이 다른 "바렛" 몬스터 1장을 덱에서 특수 소환할 수 있다. ●자신 묘지에서 드래곤족 몬스터 2장을 덱으로 되돌린다. 그 후, 자신 묘지에서 필드 마법 카드 1장을 패에 넣는다. ●자신 묘지에서 드래곤족 몬스터 3장을 덱으로 되돌린다. 그 후, 상대 묘지에서 몬스터를 3장까지 덱으로 되돌린다.
  | sc_text               = ①：可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。<br />●从自己墓地将1只龙族怪兽放回牌组。然后，可从牌组将1只卡名与所放回的怪兽不同的“枪弹”怪兽特殊召唤。<br />●从自己墓地将2只龙族怪兽放回牌组。然后，从自己墓地将1张场地魔法卡加入手牌。<br />●从自己墓地将3只龙族怪兽放回牌组。然后，从对手墓地将最多3只怪兽放回牌组。
