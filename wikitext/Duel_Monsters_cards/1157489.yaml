  | text                = (This card is always treated as an "[[Elemental HERO]]" card.)<br />If this card is in your [[hand]]: You can [[send]] 1 "[[Neo-Spacian]]" [[monster]] from your [[Main Deck|Deck]] to the [[GY]]; [[Special Summon]] this card. If this card is [[Normal Summon|Normal]] or [[Special Summon]]ed: You can [[add]] 1 [[Spell]]/[[Trap]] that [[mention]]s an "Elemental HERO" monster's card name from your Deck to your hand. If this card is sent to the GY: You can [[target]] 1 card in your opponent's GY; [[banish]] it. You can only use each [[effect]] of "Miracle Ejector" [[once per turn]].
  | fr_text             = (Cette carte est toujours traitée comme carte "HÉROS Élémentaire".)<br />Si cette carte est dans votre main : vous pouvez envoyer 1 monstre "Néo-Spacien" depuis votre Deck au Cimetière ; Invoquez Spécialement cette carte. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 Magie/Piège qui mentionne un nom de carte de monstre "HÉROS Élémentaire" depuis votre Deck à votre main. Si cette carte est envoyée au Cimetière : vous pouvez cibler 1 carte dans le Cimetière de votre adversaire ; bannissez-la. Vous ne pouvez utiliser chaque effet de "Éjecte Miracle" qu'une fois par tour.
  | de_text             = (Diese Karte wird immer als „Elementar-HELD“-Karte behandelt.)<br />Falls sich diese Karte in deiner Hand befindet: Du kannst 1 „Neo-Weltraum“-Monster von deinem Deck auf den Friedhof legen; beschwöre diese Karte als Spezialbeschwörung. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 Zauber/Falle, der oder die den Kartennamen eines „Elementar-HELD“-Monsters erwähnt, von deinem Deck hinzufügen. Falls diese Karte auf den Friedhof gelegt wird: Du kannst 1 Karte im Friedhof deines Gegners wählen; verbanne sie. Du kannst jeden Effekt von „Wunderauswerferin“ nur einmal pro Spielzug verwenden.
  | it_text             = (Questa carta viene sempre considerata come una carta "EROE Elementale".)<br />Se questa carta è nella tua mano: puoi mandare 1 mostro "Neo-Spaziale" dal tuo Deck al Cimitero; Evoca Specialmente questa carta. Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 Magia/Trappola che menziona il nome della carta di un mostro "EROE Elementale" dal tuo Deck alla tua mano. Se questa carta viene mandata al Cimitero: puoi scegliere come bersaglio 1 carta nel Cimitero del tuo avversario; bandiscila. Puoi utilizzare ogni effetto di "Espulsore Miracolo" una sola volta per turno.
  | pt_text             = (Este card deve ser sempre considerado como um card "HERÓI do Elemento".)<br />Se este card estiver na sua mão: você pode enviar 1 monstro "Neoespacial" do seu Deck para o Cemitério; Invoque este card por Invocação-Especial. Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 Magia/Armadilha que mencione um nome de card de monstro "HERÓI do Elemento" do seu Deck à sua mão. Se este card for enviado para o Cemitério: você pode escolher 1 card no Cemitério do seu oponente; bana-o. Você só pode usar cada efeito de "Ejetor Milagroso" uma vez por turno.
  | es_text             = (Esta carta se trata siempre como una carta "HÉROE Elemental").<br />Si esta carta está en tu mano: puedes mandar al Cementerio 1 monstruo "Neo Espacial" en tu Deck; Invoca esta carta de Modo Especial. Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 Mágica/Trampa en tu Deck que mencione un nombre de carta de monstruo "HÉROE Elemental". Si esta carta es mandada al Cementerio: puedes seleccionar 1 carta en el Cementerio de tu adversario; destiérrala. Sólo puedes usar cada efecto de "Excluyemilagro" una vez por turno.
  | ja_text             = このカード名はルール上「Ｅ・ＨＥＲＯ」カードとしても扱う。このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、デッキから「Ｎ」モンスター１体を墓地へ送って発動できる。このカードを特殊召喚する。②：このカードが召喚・特殊召喚した場合に発動できる。デッキから「Ｅ・ＨＥＲＯ」モンスターのカード名が記された魔法・罠カード１枚を手札に加える。③：このカードが墓地へ送られた場合、相手の墓地のカード１枚を対象として発動できる。そのカードを除外する。
  | ko_text             = 이 카드명은 룰상 "엘리멘틀 히어로" 카드로도 취급한다. 이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재할 경우, 덱에서 "네오 스페이시언" 몬스터 1장을 묘지로 보내고 발동할 수 있다. 이 카드를 특수 소환한다. ②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "엘리멘틀 히어로" 몬스터의 카드명이 쓰여진 마법 / 함정 카드 1장을 패에 넣는다. ③: 이 카드가 묘지로 보내졌을 경우, 상대 묘지의 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 제외한다.
