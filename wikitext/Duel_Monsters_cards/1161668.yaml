  | text                  = 1 [[LIGHT]] "[[Fairy Tail]]" [[monster]] + 1 [[Spellcaster]] monster<br />Your "Fairy Tail" monsters cannot be [[destroyed by battle]]. You can only use each of the following effects of "Chronicler of Fairy Tail Tales" [[once per turn]]. If this card is [[Fusion Summon]]ed using "[[Fairy Prince]]" as [[material]]: You can [[destroy]] as many cards your opponent [[control]]s as possible, and if you do, inflict 500 damage to your opponent for each card destroyed. When your opponent [[activate]]s a card or effect ([[Quick Effect]]): You can [[banish]] 1 "Fairy Tail" card from your [[hand]] or [[GY]], except "[[Fairy Tail Tales]]"; [[negate]] the activation, and if you do, destroy that card.
