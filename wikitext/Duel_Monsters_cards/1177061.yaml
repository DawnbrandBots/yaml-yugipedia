  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。相手フィールドにのみモンスターが存在する場合、このカードの発動は手札からもできる。①：手札からモンスター１体を効果を無効にして特殊召喚する。ＥＸデッキから特殊召喚されたモンスターが相手フィールドに存在する場合、さらにデッキから「シンクロン」モンスター１体を特殊召喚できる。このカードの発動後、次のターンの終了時まで自分はＳモンスターしかＥＸデッキから特殊召喚できない。②：墓地のこのカードを除外して発動できる。Ｓモンスター１体のＳ召喚を行う。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. 상대 필드에만 몬스터가 존재할 경우, 이 카드의 발동은 패에서도 할 수 있다. ①: 패에서 몬스터 1장을 효과를 무효로 하고 특수 소환한다. 엑스트라 덱에서 특수 소환된 몬스터가 상대 필드에 존재할 경우, 추가로 덱에서 "싱크론" 몬스터 1장을 특수 소환할 수 있다. 이 카드의 발동 후, 다음 턴의 종료시까지 자신은 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다. ②: 묘지의 이 카드를 제외하고 발동할 수 있다. 싱크로 몬스터 1장의 싱크로 소환을 실행한다.
  | sc_text               = 此卡名的卡1回合仅可发动1张。仅有对手场上才存在怪兽的情况下，此卡也可从手牌发动。①：从手牌将1只怪兽的效果无效并特殊召唤。对手场上存在被从额外牌组特殊召唤的怪兽的情况下，进而可从牌组特殊召唤1只“同步士”怪兽。此卡发动后，直至下个回合结束时为止，自己从额外牌组仅可特殊召唤同步怪兽。②：将墓地的此卡除外可以发动。进行1只同步怪兽的同步召唤。
