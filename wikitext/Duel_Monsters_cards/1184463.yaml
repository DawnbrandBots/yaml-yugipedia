  | fr_text               = 2+ Monstres Fusion d'Attributs différents<br />Si cette carte est Invoquée par Fusion : vous pouvez bannir un nombre de cartes depuis le Terrain et/ou Cimetières, inférieur ou égal au nombre de monstres utilisés comme Matériel, puis si vous avez utilisé min. 3 Matériels, vous pouvez regarder l'Extra Deck de votre adversaire, et bannissez-en max. 3 cartes. (Effet Rapide) : vous pouvez déclarer 1 Attribut ; jusqu'à la fin de ce tour, tous les autres monstres sur le Terrain deviennent cet Attribut. Vous ne pouvez utiliser qu'1 effet de "Éon l'Hyperinvokhé" par tour, et uniquement une fois le tour.
  | de_text               = 2+ Fusionsmonster mit unterschiedlichen Eigenschaften<br />Falls diese Karte als Fusionsbeschwörung beschworen wird: Du kannst Karten bis zur Anzahl der als Material verwendeten Monster vom Spielfeld und/oder den Friedhöfen verbannen, dann, falls du 3 oder mehr Material verwendet hast, kannst du dir das Extra Deck deines Gegners ansehen und bis zu 3 Karten davon verbannen. (Schnelleffekt): Du kannst 1 Eigenschaft deklarieren; alle anderen Monster auf dem Spielfeld werden bis zum Ende dieses Spielzugs zu jener Eigenschaft. Du kannst nur 1 Effekt von „Hyperbeschworener Äon“ pro Spielzug verwenden und in jenem Spielzug nur einmal.
  | it_text               = 2+ Mostri Fusione con Attributi diversi<br />Se questa carta viene Evocata tramite Fusione: puoi bandire carte dal Terreno e/o Cimiteri, fino al numero di mostri utilizzati come materiale, poi se hai utilizzato 3 o più materiali, puoi guardare l'Extra Deck del tuo avversario e bandire fino a 3 carte da esso. (Effetto Rapido): puoi dichiarare 1 Attributo; tutti gli altri mostri sul Terreno diventano di quell'Attributo fino alla fine di questo turno. Puoi utilizzare solo 1 effetto di "Eone Iperinvokato" per turno, e solo una volta in quel turno.
  | pt_text               = 2+ Monstros de Fusão com Atributos diferentes<br />Se este card for Invocado por Invocação-Fusão: você pode banir cards do campo e/ou dos Cemitérios, até o número de monstros usados como matéria e, depois, se você usou 3 ou mais matérias, você pode olhar o Deck Adicional do seu oponente e banir até 3 cards dali. (Efeito Rápido): você pode declarar 1 Atributo; todos os outros monstros no campo se tornam desse Atributo até o final deste turno. Você só pode usar 1 efeito de "Éon, o Hiperinvokado" por turno e apenas uma vez por turno.
  | es_text               = 2+ Monstruos de Fusión con Atributos diferentes<br />Si esta carta es Invocada por Fusión: puedes desterrar cartas en el Campo y/o Cementerios, hasta el número de monstruos usados como material y después, si usaste 3 materiales o más, puedes mirar el Deck Extra de tu adversario y desterrar hasta 3 cartas de él. (Efecto Rápido): puedes declarar 1 Atributo; todos los demás monstruos en el Campo se convierten en ese Atributo hasta el final de este turno. Sólo puedes usar 1 efecto de "Aión Hiperinvokado" por turno, y sólo una vez ese turno.
  | ja_text               = 属性が異なる融合モンスター×２体以上<br />このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：このカードが融合召喚した場合に発動できる。その融合素材としたモンスターの数まで、自分・相手の、フィールド・墓地のカードを除外する。３体以上を素材とした場合、さらに相手のＥＸデッキを確認してその中から３枚まで除外できる。②：自分・相手ターンに、属性を１つ宣言して発動できる。このカード以外のフィールドの全てのモンスターはターン終了時まで宣言した属性になる。
