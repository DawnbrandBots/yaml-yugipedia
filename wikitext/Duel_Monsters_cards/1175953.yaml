  | text                  = Cannot be [[Normal Summon]]ed/[[Set]]. Must be [[Special Summon]]ed (from your [[hand]]) by [[shuffling]] 1 [[Spellcaster]] or [[Warrior]] [[Ritual Monster]] from your hand or [[GY]] into the [[Main Deck|Deck]]. You can only Special Summon "Black Chaos" once per turn this way. You can [[discard]] this card; place 1 [[Continuous Trap]] that mentions "[[Light and Darkness Ritual]]" from your Deck or GY, [[face-up]] on your [[field]]. While you have a [[Ritual Spell]] in your GY, this card is [[unaffected]] by your opponent's activated effects. Once per turn, during your [[Main Phase]]: You can [[banish]] 2 cards your opponent [[control]]s.
  | fr_text               = Ni Invocable Normalement ni Posable Normalement. Uniquement Invocable Spécialement (depuis votre main) en mélangeant 1 Monstre Rituel Magicien ou Guerrier depuis votre main ou Cimetière dans le Deck. Vous ne pouvez Invoquer Spécialement "Chaos Sombre" qu'une fois par tour de cette façon. Vous pouvez défausser cette carte ; placez face recto 1 Piège Continu qui mentionne "Rituel de la Lumière et des Ténèbres" depuis votre Deck ou Cimetière sur votre Terrain. Tant que vous avez une Magie Rituelle dans votre Cimetière, cette carte n'est pas affectée par les effets activés de votre adversaire. Une fois par tour, durant votre Main Phase : vous pouvez bannir 2 cartes contrôlées par votre adversaire.
  | de_text               = Kann nicht als Normalbeschwörung beschworen/gesetzt werden. Muss als Spezialbeschwörung (von deiner Hand) beschworen werden, indem du 1 Hexer- oder Krieger-Ritualmonster von deiner Hand oder deinem Friedhof ins Deck mischst. Du kannst „Schwarzes Chaos“ nur einmal pro Spielzug auf diese Art als Spezialbeschwörung beschwören. Du kannst diese Karte abwerfen; lege 1 Permanente Falle, die „Ritual von Licht und Finsternis“ erwähnt, von deinem Deck oder Friedhof offen auf deine Spielfeldseite. Solange du einen Ritualzauber in deinem Friedhof hast, bleibt diese Karte von aktivierten Effekten deines Gegners unberührt. Einmal pro Spielzug, während deiner Main Phase: Du kannst 2 Karten verbannen, die dein Gegner kontrolliert.
  | it_text               = Non può essere Evocato Normalmente/Posizionato. Deve essere Evocato Specialmente (dalla tua mano) mischiando 1 Mostro Rituale Incantatore o Guerriero dalla tua mano o Cimitero nel Deck. Puoi Evocare Specialmente "Chaos Oscuro" una sola volta per turno in questo modo. Puoi scartare questa carta; metti 1 Trappola Continua che menziona "Rituale di Luce e Oscurità" dal tuo Deck o Cimitero, scoperta sul tuo Terreno. Mentre hai una Magia Rituale nel tuo Cimitero, questa carta è immune agli effetti attivati del tuo avversario. Una volta per turno, durante la tua Main Phase: puoi bandire 2 carte controllate dal tuo avversario.
  | pt_text               = Não pode ser Invocado por Invocação-Normal/Baixado. Deve ser Invocado por Invocação-Especial (da sua mão) ao embaralhar no Deck 1 Monstro de Ritual Mago ou Guerreiro da sua mão ou do Cemitério. Você só pode Invocar "Caos das Trevas" por Invocação-Especial uma vez por turno desta forma. Você pode descartar este card; coloque 1 Armadilha Contínua que mencione "Ritual da Luz e das Trevas" do seu Deck ou Cemitério, com a face para cima no seu campo. Enquanto você tiver uma Magia de Ritual no seu Cemitério, este card não é afetado pelos efeitos ativados do seu oponente. Uma vez por turno, durante sua Fase Principal: você pode banir 2 cards que seu oponente controla.
  | es_text               = No puede ser Invocado de Modo Normal/Colocado. Debe ser Invocado de Modo Especial (desde tu mano) barajando al Deck 1 Monstruo de Ritual Lanzador de Conjuros o Guerrero en tu mano o Cementerio. Sólo puedes Invocar de Modo Especial "Caos Negro" una vez por turno de esta forma. Puedes descartar esta carta; pon boca arriba en tu Campo 1 Trampa Continua que mencione "Ritual de la Luz y la Oscuridad" en tu Deck o Cementerio. Mientras tengas una Mágica de Ritual en tu Cementerio, esta carta no es afectada por los efectos activados de tu adversario. Una vez por turno, durante tu Main Phase: puedes desterrar 2 cartas que controle tu adversario.
  | ja_text               = このカードは通常召喚できない。「超魔剣士ブラック・カオス」は１ターンに１度、自分の手札・墓地から魔法使い族・戦士族の儀式モンスター１体をデッキに戻した場合のみ特殊召喚できる。①：このカードを手札から捨てて発動できる。自分のデッキ・墓地から「光と闇の儀式」のカード名が記された永続罠カード１枚を自分フィールドに表側表示で置く。②：自分の墓地に儀式魔法カードが存在する限り、このカードは相手が発動した効果を受けない。③：１ターンに１度、自分メインフェイズに発動できる。相手フィールドのカード２枚を除外する。
  | ko_text               = 
  | sc_text               = 此卡不可通常召唤。“超魔剑士 黑暗混沌”1回合1次，仅可在从自己手牌・墓地将1只魔法师族・战士族的仪式怪兽放回牌组的情况下特殊召唤。①：从手牌将此卡舍弃可以发动。从自己牌组・墓地将1张记载有“光与暗的仪式”卡名的永续陷阱卡以表侧表示放在自己场上。②：只要自己墓地存在仪式魔法卡，此卡不受对手发动的效果影响。③：1回合1次，在自己的主要阶段可以发动。将对手场上的2张卡除外。
