  | fr_text               = "Daneen le Dino Revenu" + 1 monstre Dinosaure<br />Si cette carte est Invoquée Spécialement : vous pouvez ajouter 1 carte "GMX" depuis votre Deck à votre main. Vous ne pouvez utiliser cet effet de "Daneen Évolué" qu'une fois par tour. Si vous dévoilez une ou plusieurs cartes par un effet de carte "GMX" : vous pouvez activer l'effet suivant, selon où cette carte est à l'activation (mais vous ne pouvez utiliser chaque effet de "Daneen Évolué" qu'une fois par tour) ;<br />● Terrain : Gagnez 1500 LP.<br />● Cimetière : Invoquez Spécialement cette carte.
  | de_text               = „Wiedergekehrter Dino Daneen“ + 1 Dinosaurier-Monster<br />Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „GMX“-Karte von deinem Deck hinzufügen. Du kannst diesen Effekt von „Entwickelter Daneen“ nur einmal pro Spielzug verwenden. Falls du eine oder mehr Karten durch einen „GMX“-Karteneffekt ausgräbst: Du kannst den folgenden Effekt aktivieren, basierend darauf, wo sich diese Karte bei der Aktivierung befindet (aber du kannst jeden Effekt von „Entwickelter Daneen“ nur einmal pro Spielzug verwenden);<br />● Spielfeld: Du erhältst 1500 LP.<br />● Friedhof: Beschwöre diese Karte als Spezialbeschwörung.
  | it_text               = "Daneen Dino Ritornato" + 1 mostro Dinosauro<br />Se questa carta viene Evocata Specialmente: puoi aggiungere 1 carta "GMX" dal tuo Deck alla tua mano. Puoi utilizzare questo effetto di "Daneen Evoluto" una sola volta per turno. Se dissotterri una o più carte con l'effetto di una carta "GMX": puoi attivare il seguente effetto, a seconda di dov'è questa carta all'attivazione (ma puoi utilizzare ogni effetto di "Daneen Evoluto" una sola volta per turno);<br />● Terreno: Guadagni 1500 LP.<br />● Cimitero: Evoca Specialmente questa carta.
  | pt_text               = "Daneen, o Dino Retornado" + 1 monstro Dinossauro<br />Se este card for Invocado por Invocação-Especial: você pode adicionar 1 card "GMX" do seu Deck à sua mão. Você só pode usar este efeito de "Daneen, o Evoluído" uma vez por turno. Se você escavar um ou mais cards devido a um efeito de card "GMX": você pode ativar o seguinte efeito, de acordo com onde este card estava na ativação (mas você só pode usar cada efeito de "Daneen, o Evoluído" uma vez por turno);<br />● Campo: Ganhe 1500 PV.<br />● Cemitério: Invoque este card por Invocação-Especial.
  | es_text               = "Daneen Dino de Regreso" + 1 monstruo Dinosaurio<br />Si esta carta es Invocada de Modo Especial: puedes añadir a tu mano 1 carta "GMX" en tu Deck. Sólo puedes usar este efecto de "Daneen Evolucionado" una vez por turno. Si excavas una o más cartas por el efecto de una carta "GMX": puedes activar el siguiente efecto, basado en dónde está esta carta en la activación (pero sólo puedes usar cada efecto de "Daneen Evolucionado" una vez por turno);<br />● Campo: Gana 1500 LP.<br />● Cementerio: Invoca esta carta de Modo Especial.
