  | text                = 1 [[Tuner]] + 1+ non-Tuners<br />Your opponent cannot [[target]] this card with card [[effect]]s. You can only use each of the following effects of "Storm-Bane Dragon Destorbim" [[once per turn]]. You can [[banish]] any number of [[DARK]] [[monsters]] from your [[GY]] that cannot be [[Normal Summon]]ed/[[Set]]; banish that many cards your opponent [[control]]s. This is a [[Quick Effect]] if your opponent controls more cards than you do. If this card is [[sent]] to the GY: You can [[Special Summon]] 1 of your banished [[Dragon]] monsters.
  | fr_text             = 1 Syntoniseur + 1+ non-Syntoniseur<br />Votre adversaire ne peut pas cibler cette carte avec des effets de carte. Vous ne pouvez utiliser chacun des effets suivants de "Destorbim le Dragon du Fléau des Tempêtes" qu'une fois par tour. Vous pouvez bannir un nombre de votre choix de monstres TÉNÈBRES depuis votre Cimetière qui ne peuvent pas être Invoqués/Posés Normalement ; bannissez autant de cartes contrôlées par votre adversaire. Ceci est un Effet Rapide si votre adversaire contrôle plus de cartes que vous. Si cette carte est envoyée au Cimetière : vous pouvez Invoquer Spécialement 1 de vos monstres Dragon bannis.
  | de_text             = 1 Empfänger + 1+ Nicht-Empfänger<br />Dein Gegner kann diese Karte nicht als Ziel für Karteneffekte wählen. Du kannst jeden der folgenden Effekte von „Sturmbann-Drache Destorbim“ nur einmal pro Spielzug verwenden. Du kannst eine beliebige Anzahl FINSTERNIS Monster, die nicht als Normalbeschwörung beschworen/gesetzt werden können, von deinem Friedhof verbannen; verbanne ebenso viele Karten, die dein Gegner kontrolliert. Dies ist ein Schnelleffekt, falls dein Gegner mehr Karten kontrolliert als du. Falls diese Karte auf den Friedhof gelegt wird: Du kannst 1 deiner verbannten Drache-Monster als Spezialbeschwörung beschwören.
  | it_text             = 1 Tuner + 1+ non-Tuner<br />Il tuo avversario non può scegliere questa carta come bersaglio con gli effetti delle carte. Puoi utilizzare ognuno dei seguenti effetti di "Destorbim Drago Tempesta-Rovina" una sola volta per turno. Puoi bandire dal tuo Cimitero un qualsiasi numero di mostri OSCURITÀ che non possono essere Evocati Normalmente/Posizionati; bandisci quel numero di carte controllate dal tuo avversario. Questo è un Effetto Rapido se il tuo avversario controlla più carte di te. Se questa carta viene mandata al Cimitero: puoi Evocare Specialmente 1 dei tuoi mostri Drago banditi.
  | pt_text             = 1 Regulador + 1+ não-Reguladores<br />Seu oponente não pode escolher este card como alvo de efeitos de card. Você só pode usar cada um dos seguintes efeitos de "Dragão Destruidor de Tempestades Destorbim" uma vez por turno. Você pode banir qualquer número de monstros de TREVAS do seu Cemitério que não possam ser Invocados por Invocação-Normal/Baixados; bana esse número de cards que seu oponente controla. Este é um Efeito Rápido se seu oponente controlar mais cards que você. Se este card for enviado para o Cemitério: você pode Invocar por Invocação-Especial 1 dos seus monstros Dragão banidos.
  | es_text             = 1 Cantante + 1+ no Cantantes<br />Tu adversario no puede seleccionar esta carta con efectos de cartas. Sólo puedes usar cada uno de los siguientes efectos de "Dragón Azote de la Tormenta Destorbim" una vez por turno. Puedes desterrar cualquier número de monstruos de OSCURIDAD en tu Cementerio que no puedan ser Invocados de Modo Normal/Colocados; destierra ese número de cartas que controle tu adversario. Esto es un Efecto Rápido si tu adversario controla más cartas que tú. Si esta carta es mandada al Cementerio: puedes Invocar de Modo Especial 1 de tus monstruos Dragón desterrados.
  | ja_text             = チューナー＋チューナー以外のモンスター１体以上<br />このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：相手はフィールドのこのカードを効果の対象にできない。②：通常召喚できない闇属性モンスターを任意の数だけ自分の墓地から除外して発動できる（相手フィールドのカードの数が自分フィールドのカードより多い場合、この効果は相手ターンでも発動できる）。除外した数だけ相手フィールドのカードを除外する。③：このカードが墓地へ送られた場合に発動できる。自分の除外状態のドラゴン族モンスター１体を特殊召喚する。
  | ko_text             = 
  | sc_text             = 协调＋协调以外的怪兽1只以上<br />此卡名的②③效果1回合仅可各使用1次。①：对手不可将场上的此卡作为效果的对象。②：从自己墓地将任意数量的、不可通常召唤的暗属性怪兽除外可以发动（对手场上的卡的数量多于自己场上的卡的情况下，此效果在对手回合中也可以发动）。依所除外的数量，将对手场上的卡除外。③：此卡被送至墓地的情况下可以发动。将自己除外状态的1只龙族怪兽特殊召唤。
