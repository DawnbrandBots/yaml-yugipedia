  | text                  = 3 [[Level]] 5 [[monsters]]<br />[[Once per turn]], you can also [[Xyz Summon]] "DoomZ XIII Over - Graflareio" by using 1 "[[DoomZ]]" [[Xyz Monster]] you [[control]] ([[transfer]] its [[material]]s). You can only use each of the following effects of "DoomZ XIII Over - Graflareio" [[once per turn]]. You can [[detach]] 1 material from this card; [[Add a card|add]] 1 "DoomZ" [[Spell]]/[[Trap]] from your [[Main Deck|Deck]] to your [[hand]], then you can [[destroy]] 1 card on the [[field]]. If this card is [[destroy]]ed by card [[effect]]: You can [[Special Summon]] 1 non-Xyz "DoomZ" monster from your Deck or [[GY]].
  | fr_text               = 3 monstres de Niveau 5<br />Une fois par tour, vous pouvez aussi Invoquer par Xyz "DoomZ XIII Dépassement - Graflareio" en utilisant 1 Monstre Xyz "DoomZ" que vous contrôlez (transférez ses Matériels). Vous ne pouvez utiliser chacun des effets suivants de "DoomZ XIII Dépassement - Graflareio" qu'une fois par tour. Vous pouvez détacher 1 Matériel de cette carte ; ajoutez 1 Magie/Piège "DoomZ" depuis votre Deck à votre main, puis vous pouvez détruire 1 carte sur le Terrain. Si cette carte est détruite par un effet de carte : vous pouvez Invoquer Spécialement 1 monstre non-Xyz "DoomZ" depuis votre Deck ou Cimetière.
  | de_text               = 3 Monster der Stufe 5<br />Einmal pro Spielzug kannst du „UntergangZ XIII Über - Graflareio“ auch als Xyz-Beschwörung beschwören, indem du 1 „UntergangZ“-Xyz-Monster verwendest, das du kontrollierst (transferiere sein Material). Du kannst jeden der folgenden Effekte von „UntergangZ XIII Über - Graflareio“ nur einmal pro Spielzug verwenden. Du kannst 1 Material von dieser Karte abhängen; füge deiner Hand 1 „UntergangZ“-Zauber/Falle von deinem Deck hinzu, dann kannst du 1 Karte auf dem Spielfeld zerstören. Falls diese Karte durch einen Karteneffekt zerstört wird: Du kannst 1 „UntergangZ“-Nicht-Xyz-Monster als Spezialbeschwörung von deinem Deck oder Friedhof beschwören.
  | it_text               = 3 mostri di Livello 5<br />Una volta per turno, puoi anche Evocare Xyz "DoomZ XIII Oltre - Graflareio" utilizzando 1 Mostro Xyz "DoomZ" che controlli (trasferisci i suoi materiali). Puoi utilizzare ognuno dei seguenti effetti di "DoomZ XIII Oltre - Graflareio" una sola volta per turno. Puoi staccare 1 materiale da questa carta; aggiungi 1 Magia/Trappola "DoomZ" dal tuo Deck alla tua mano, poi puoi distruggere 1 carta sul Terreno. Se questa carta viene distrutta dall'effetto di una carta: puoi Evocare Specialmente 1 mostro "DoomZ" non-Xyz dal tuo Deck o Cimitero.
  | pt_text               = 3 monstros de Nível 5<br />Uma vez por turno, você também pode Invocar por Invocação-Xyz "Sobre DoomZ XIII - Graflareio" ao usar 1 Monstro Xyz "DoomZ" que você controla (transfira as matérias dele). Você só pode usar cada um dos seguintes efeitos de "Sobre DoomZ XIII - Graflareio" uma vez por turno. Você pode desassociar 1 matéria deste card; adicione 1 Magia/Armadilha "DoomZ" do seu Deck à sua mão e, depois, você pode destruir 1 card no campo. Se este card for destruído por um efeito de card: você pode Invocar por Invocação-Especial 1 monstro "DoomZ" que não seja Xyz do seu Deck ou Cemitério.
  | es_text               = 3 monstruos de Nivel 5<br />Una vez por turno, también puedes Invocar Xyz "DoomZ XIII Supremo - Graflareio" usando 1 Monstruo Xyz "DoomZ" que controles (transfiere sus materiales). Sólo puedes usar cada uno de los siguientes efectos de "DoomZ XIII Supremo - Graflareio" una vez por turno. Puedes desacoplar 1 material de esta carta; añade a tu mano 1 Mágica/Trampa "DoomZ" en tu Deck, y después puedes destruir 1 carta en el Campo. Si esta carta es destruida por el efecto de una carta: puedes Invocar de Modo Especial 1 monstruo "DoomZ" que no sea Xyz desde tu Deck o Cementerio.
  | ja_text               = レベル５モンスター×３<br />「終刻竜機ⅩⅢ－グラフレイオ」は１ターンに１度、自分フィールドの「ドゥームズ」Ｘモンスターの上に重ねてＸ召喚する事もできる。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードのＸ素材を１つ取り除いて発動できる。デッキから「ドゥームズ」魔法・罠カード１枚を手札に加える。その後、フィールドのカード１枚を破壊できる。②：このカードが効果で破壊された場合に発動できる。自分のデッキ・墓地からＸモンスター以外の「ドゥームズ」モンスター１体を特殊召喚する。
  | ko_text               = 레벨 5 몬스터 × 3<br />"둠즈ⅩⅢ(오버)－그라플레이오"는 1턴에 1번, 자신 필드의 "둠즈" 엑시즈 몬스터 위에 겹쳐 엑시즈 소환할 수도 있다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드의 엑시즈 소재를 1개 제거하고 발동할 수 있다. 덱에서 "둠즈" 마법 / 함정 카드 1장을 패에 넣는다. 그 후, 필드의 카드 1장을 파괴할 수 있다. ②: 이 카드가 효과로 파괴되었을 경우에 발동할 수 있다. 자신의 덱 / 묘지에서 엑시즈 몬스터 이외의 "둠즈" 몬스터 1장을 특수 소환한다.
  | sc_text               = 等级5怪兽×3<br />“终刻龙机ⅩⅢ－格拉弗雷欧”1回合1次，也可重叠在自己场上的“终刻”超量怪兽上面来超量召唤。此卡名的①②效果1回合仅可各使用1次。①：去除此卡的1个超量素材可以发动。从牌组将1张“终刻”魔法・陷阱卡加入手牌。然后，可将场上的1张卡破坏。②：此卡因效果被破坏的情况下可以发动。从自己牌组・墓地将超量怪兽以外的1只“终刻”怪兽特殊召唤。
