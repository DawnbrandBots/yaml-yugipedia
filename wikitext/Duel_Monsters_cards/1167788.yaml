  | ja_text               = レベル５モンスター×３<br />「終刻竜機ⅩⅢ－グラフレイオ」は１ターンに１度、自分フィールドの「ドゥームズ」Ｘモンスターの上に重ねてＸ召喚する事もできる。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードのＸ素材を１つ取り除いて発動できる。デッキから「ドゥームズ」魔法・罠カード１枚を手札に加える。その後、フィールドのカード１枚を破壊できる。②：このカードが効果で破壊された場合に発動できる。自分のデッキ・墓地からＸモンスター以外の「ドゥームズ」モンスター１体を特殊召喚する。
  | ko_text               = 레벨 5 몬스터 × 3<br />"둠즈ⅩⅢ(오버)－그라플레이오"는 1턴에 1번, 자신 필드의 "둠즈" 엑시즈 몬스터 위에 겹쳐 엑시즈 소환할 수도 있다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드의 엑시즈 소재를 1개 제거하고 발동할 수 있다. 덱에서 "둠즈" 마법 / 함정 카드 1장을 패에 넣는다. 그 후, 필드의 카드 1장을 파괴할 수 있다. ②: 이 카드가 효과로 파괴되었을 경우에 발동할 수 있다. 자신의 덱 / 묘지에서 엑시즈 몬스터 이외의 "둠즈" 몬스터 1장을 특수 소환한다.
  | sc_text               = 等级5怪兽×3<br />“终刻龙机ⅩⅢ－格拉弗雷欧”1回合1次，也可重叠在自己场上的“终刻”超量怪兽上面来超量召唤。此卡名的①②效果1回合仅可各使用1次。①：去除此卡的1个超量素材可以发动。从牌组将1张“终刻”魔法・陷阱卡加入手牌。然后，可将场上的1张卡破坏。②：此卡因效果被破坏的情况下可以发动。从自己牌组・墓地将超量怪兽以外的1只“终刻”怪兽特殊召唤。
