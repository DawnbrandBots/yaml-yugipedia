  | text                  = 3 [[Level]] 5 [[monsters]]<br />[[Once per turn]], you can also [[Xyz Summon]] "DoomZ XIII Over - Graflario" by using 1 "[[DoomZ]]" [[Xyz Monster]] you [[control]] ([[transfer]] its [[material]]s). You can [[detach]] 1 material from this card; [[Add a card|add]] 1 "DoomZ" [[Spell]]/[[Trap]] from your [[Main Deck|Deck]] to your [[hand]], then you can [[destroy]] 1 card on the [[field]]. If this card is [[destroy]]ed by card [[effect]]: You can [[Special Summon]] 1 non-Xyz "DoomZ" monster from your Deck or [[GY]]. You can only use each effect of "DoomZ XIII Over - Graflario" [[once per turn]].
