  | text                  = Your opponent cannot [[activate]] cards or [[effect]]s when you [[Normal Summon|Normal]] or [[Special Summon]] a "[[GMX]]" [[monster]](s). During your [[Main Phase]]: You can [[Set]] 1 "GMX" [[Spell]]/[[Trap]] from your [[Main Deck|Deck]], except "GMX Lab #5", then place 1 card from your [[hand]] on top of the Deck. You can only use this effect of "GMX Lab #5" once per turn.
  | fr_text               = Votre adversaire ne peut activer ni de cartes ni d'effets lorsque vous Invoquez Normalement ou Spécialement un ou plusieurs monstres "GMX". Durant votre Main Phase : vous pouvez Poser 1 Magie/Piège "GMX" ("Laboratoire #5 GMX" exclu) depuis votre Deck, puis placez 1 carte depuis votre main au-dessus du Deck. Vous ne pouvez utiliser cet effet de "Laboratoire #5 GMX" qu'une fois par tour.
  | de_text               = Dein Gegner kann weder Karten noch Effekte aktivieren, wenn du ein oder mehr „GMX“-Monster als Normal- oder Spezialbeschwörung beschwörst. Während deiner Main Phase: Du kannst 1 „GMX“-Zauber/Falle von deinem Deck setzen, außer „GMX-Labor Nr. 5“, dann lege 1 Karte von deiner Hand aufs Deck. Du kannst diesen Effekt von „GMX-Labor Nr. 5“ nur einmal pro Spielzug verwenden.
  | it_text               = Il tuo avversario non può attivare carte o effetti quando Evochi Normalmente o Specialmente uno o più mostri "GMX". Durante la tua Main Phase: puoi Posizionare 1 Magia/Trappola "GMX" dal tuo Deck, eccetto "GMX Laboratorio #5", poi mettere 1 carta dalla tua mano in cima al Deck. Puoi utilizzare questo effetto di "GMX Laboratorio #5" una sola volta per turno.
  | pt_text               = Seu oponente não pode ativar cards ou efeitos quando você Invocar um ou mais monstros "GMX" por Invocação-Normal ou Especial. Durante sua Fase Principal: você pode Baixar 1 Magia/Armadilha "GMX" do seu Deck, exceto "Laboratório GMX nº 5" e, depois, coloque 1 card da sua mão no topo do Deck. Você só pode usar este efeito de "Laboratório GMX nº 5" uma vez por turno.
  | es_text               = Tu adversario no puede activar cartas o efectos cuando Invocas de Modo Normal o Especial uno o más monstruos "GMX". Durante tu Main Phase: puedes Colocar 1 Mágica/Trampa "GMX" desde tu Deck, excepto "Laboratorio #5 de GMX", y después pon en la parte superior del Deck 1 carta en tu mano. Sólo puedes usar este efecto de "Laboratorio #5 de GMX" una vez por turno.
