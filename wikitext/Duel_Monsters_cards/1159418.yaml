  | text                = When your opponent [[activate]]s a [[monster effect]], while you [[control]] a "[[Gagaga]]" [[monster]]: [[Negate]] the activation, then you can [[discard]] 1 card, and if you do, [[Special Summon]] 1 "Gagaga" monster from your [[Main Deck|Deck]]. You can [[banish]] this card from your [[GY]]; change as many "Gagaga" monsters you control as possible to [[Defense Position]], and if you do, for the rest of this [[turn]], "Gagaga" monsters you control cannot be [[destroyed by battle]] or card effects. You can only use each effect of "Gagaga Escape" [[once per turn]].
  | fr_text             = Lorsque votre adversaire active un effet de monstre, tant que vous contrôlez un monstre "Gagaga" : annulez l'activation, puis vous pouvez défausser 1 carte, et si vous le faites, Invoquez Spécialement 1 monstre "Gagaga" depuis votre Deck. Vous pouvez bannir cette carte depuis votre Cimetière ; changez autant de monstres "Gagaga" que vous contrôlez que possible en Position de Défense, et si vous le faites, les monstres "Gagaga" que vous contrôlez ne peuvent être détruits ni au combat ni par des effets de carte le reste de ce tour. Vous ne pouvez utiliser chaque effet de "Évasion Gagaga" qu'une fois par tour.
  | de_text             = Wenn dein Gegner einen Monstereffekt aktiviert, solange du ein „Gagaga“-Monster kontrollierst: Annulliere die Aktivierung, dann kannst du 1 Karte abwerfen und falls du dies tust, beschwöre 1 „Gagaga“-Monster als Spezialbeschwörung von deinem Deck. Du kannst diese Karte von deinem Friedhof verbannen; ändere so viele „Gagaga“-Monster, die du kontrollierst, wie möglich in die Verteidigungsposition und falls du dies tust, können „Gagaga“-Monster, die du kontrollierst, für den Rest dieses Spielzugs weder durch Kampf noch durch Karteneffekte zerstört werden. Du kannst jeden Effekt von „Gagaga-Flucht“ nur einmal pro Spielzug verwenden.
  | it_text             = Quando il tuo avversario attiva l'effetto di un mostro, mentre tu controlli un mostro "Gagaga": annulla l'attivazione, poi puoi scartare 1 carta e, se lo fai, Evoca Specialmente 1 mostro "Gagaga" dal tuo Deck. Puoi bandire questa carta dal tuo Cimitero; metti in Posizione di Difesa tanti mostri "Gagaga" che controlli quanti possibile e, se lo fai, per il resto di questo turno, i mostri "Gagaga" che controlli non possono essere distrutti in battaglia o dagli effetti delle carte. Puoi utilizzare ogni effetto di "Fuga Gagaga" una sola volta per turno.
  | pt_text             = Quando seu oponente ativar um efeito de monstro, enquanto você controlar um monstro "Gagaga": negue a ativação e, depois, você pode descartar 1 card e, se isso acontecer, Invoque por Invocação-Especial 1 monstro "Gagaga" do seu Deck. Você pode banir este card do seu Cemitério; coloque tantos monstros "Gagaga" que você controla quanto possível em Posição de Defesa e, se isso acontecer, pelo resto deste turno, monstros "Gagaga" que você controla não podem ser destruídos em batalha ou por efeitos de card. Você só pode usar cada efeito de "Fuga Gagaga" uma vez por turno.
  | es_text             = Cuando tu adversario activa un efecto de monstruo, mientras controles un monstruo "Gagaga": niega la activación, y después puedes descartar 1 carta y, si lo haces, Invoca de Modo Especial, desde tu Deck, 1 monstruo "Gagaga". Puedes desterrar esta carta en tu Cementerio; cambia tantos monstruos "Gagaga" que controles como sea posible a Posición de Defensa y, si lo haces, por el resto de este turno los monstruos "Gagaga" que controles no pueden ser destruidos en batalla o por efectos de cartas. Sólo puedes usar cada efecto de "Escape Gagaga" una vez por turno.
  | ja_text             = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドに「ガガガ」モンスターが存在し、相手がモンスターの効果を発動した時に発動できる。その発動を無効にする。その後、以下の効果を適用できる。●自分の手札を１枚選んで捨て、デッキから「ガガガ」モンスター１体を特殊召喚する。②：墓地のこのカードを除外して発動できる。自分フィールドの「ガガガ」モンスターを全て守備表示にし、このターン中、自分フィールドの「ガガガ」モンスターは戦闘・効果では破壊されない。
  | ko_text             = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드에 "가가가" 몬스터가 존재하고, 상대가 몬스터의 효과를 발동했을 때에 발동할 수 있다. 그 발동을 무효로 한다. 그 후, 이하의 효과를 적용할 수 있다. ●자신의 패를 1장 골라 버리고, 덱에서 "가가가" 몬스터 1장을 특수 소환한다. ②: 묘지의 이 카드를 제외하고 발동할 수 있다. 자신 필드의 "가가가" 몬스터를 전부 수비 표시로 하고, 이 턴 중에, 자신 필드의 "가가가" 몬스터는 전투 / 효과로는 파괴되지 않는다.
  | sc_text             = 此卡名的①②效果1回合仅可各使用1次。①：自己场上存在“我我我”怪兽，且对手发动怪兽的效果时可以发动。将该发动无效。然后，可适用以下效果。<br />●挑选自己的1张手牌舍弃，从牌组将1只“我我我”怪兽特殊召唤。<br />②：将墓地的此卡除外可以发动。将自己场上的“我我我”怪兽全部改成守备表示，此回合中，自己场上的“我我我”怪兽不会因战斗・效果被破坏。
