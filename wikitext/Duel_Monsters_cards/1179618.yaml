  | text                  = [[Monsters]] you [[control]] that were [[Normal Summon|Normal]] or [[Special Summon]]ed from the [[hand]] gain 500 [[ATK]]/[[DEF]]. You can only use each of the following [[effect]]s of "Hideout in the Sky, Coulomb" [[once per turn]]. During your [[Main Phase]]: You can Special Summon 1 "[[Mech Beast Token]]" ([[Machine]]/[[EARTH]]/[[Level]] 6/[[ATK]] 2000/[[DEF]] 2000) to your opponent's field, and if you do, [[Add a card|add]] 1 "[[Blitzclique]]" monster from your [[Main Deck|Deck]] to your hand. If a card(s) is [[destroy]]ed by your "Blitzclique" card's effect, while this card is in your GY (except during the [[Damage Step]]): You can add this card to your hand.
  | fr_text               = Les monstres que vous contrôlez qui ont été Invoqués Normalement ou Spécialement depuis la main gagnent 500 ATK/DEF. Vous ne pouvez utiliser chacun des effets suivants de "Planque dans le Ciel, Coulomb" qu'une fois par tour. Durant votre Main Phase : vous pouvez Invoquer Spécialement 1 "Jeton Bête Méca" (Machine/TERRE/Niveau 6/ATK 2000/DEF 2000) sur le Terrain de votre adversaire, et si vous le faites, ajoutez 1 monstre "Blitzclique" depuis votre Deck à votre main. Si une ou plusieurs cartes sont détruites par un effet de votre carte "Blitzclique", tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez ajouter cette carte à votre main.
  | de_text               = Monster, die du kontrollierst und die als Normal- oder Spezialbeschwörung von der Hand beschworen wurden, erhalten 500 ATK/DEF. Du kannst jeden der folgenden Effekte von „Versteck im Himmel, Coulomb“ nur einmal pro Spielzug verwenden. Während deiner Main Phase: Du kannst 1 „Mech-Ungeheuer-Spielmarke“ (Maschine/ERDE/Stufe 6/ATK 2000/DEF 2000) als Spezialbeschwörung auf die Spielfeldseite deines Gegners beschwören und falls du dies tust, füge deiner Hand 1 „Blitzclique“-Monster von deinem Deck hinzu. Falls eine oder mehr Karten durch einen Effekt deiner „Blitzclique“-Karte zerstört werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte deiner Hand hinzufügen.
  | it_text               = I mostri che controlli che sono stati Evocati Normalmente o Specialmente dalla mano guadagnano 500 ATK/DEF. Puoi utilizzare ognuno dei seguenti effetti di "Rifugio nel Cielo, Coulomb" una sola volta per turno. Durante la tua Main Phase: puoi Evocare Specialmente 1 "Segna-Bestia Mech" (Macchina/TERRA/Livello 6/ATK 2000/DEF 2000) sul Terreno del tuo avversario e, se lo fai, aggiungi 1 mostro "Blitzclique" dal tuo Deck alla tua mano. Se una o più carte vengono distrutte dall'effetto di una tua carta "Blitzclique", mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi aggiungere questa carta alla tua mano.
  | pt_text               = Monstros que você controla que foram Invocados por Invocação-Normal ou Especial da mão ganham 500 de ATK/DEF. Você só pode usar cada um dos seguintes efeitos de "Esconderijo no Céu, Coulomb" uma vez por turno. Durante sua Fase Principal: você pode Invocar por Invocação-Especial 1 "Ficha de Besta Mech" (Máquina/TERRA/Nível 6/ATK 2000/DEF 2000) no campo do seu oponente e, se isso acontecer, adicione 1 monstro "Blitzclique" do seu Deck à sua mão. Se um ou mais cards forem destruídos por um efeito de card "Blitzclique" seu, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode adicionar este card à sua mão.
  | es_text               = Los monstruos que controlas que fueron Invocados de Modo Normal o Especial desde la mano ganan 500 ATK/DEF. Sólo puedes usar cada uno de los siguientes efectos de "Guarida en el Cielo, Coulomb" una vez por turno. Durante tu Main Phase: puedes Invocar de Modo Especial 1 "Ficha Mecha Bestia" (Máquina/TIERRA/Nivel 6/ATK 2000/DEF 2000) al Campo de tu adversario y, si lo haces, añade a tu mano 1 monstruo "Blitzclique" en tu Deck. Si una o más cartas son destruidas por el efecto de tu carta "Blitzclique", mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes añadir esta carta a tu mano.
  | ja_text               = このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：手札から召喚・特殊召喚された自分フィールドのモンスターの攻撃力・守備力は５００アップする。②：自分メインフェイズに発動できる。相手フィールドに「機獣トークン」（機械族・地・星６・攻／守２０００）１体を特殊召喚し、デッキから「ブリッツクリーク」モンスター１体を手札に加える。③：このカードが墓地に存在する状態で、自分の「ブリッツクリーク」カードの効果でカードを破壊した場合に発動できる。このカードを手札に加える。
  | ko_text               = 
  | sc_text               = 此卡名的②③效果1回合仅可各使用1次。①：被从手牌召唤・特殊召唤的自己场上的怪兽的攻击力・守备力上升500。②：在自己的主要阶段可以发动。将1只“机兽衍生物”（机械族・地・星6・攻/守2000）特殊召唤至对手场上，从牌组将1只“雷盟”怪兽加入手牌。③：此卡存在于墓地的状态下，以自己的“雷盟”卡的效果破坏了卡的情况下可以发动。将此卡加入手牌。
