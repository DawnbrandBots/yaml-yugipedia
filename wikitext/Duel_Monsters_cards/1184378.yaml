  | text                  = If you [[control]] an "[[Artmage]]", "[[DoomZ]]", or "[[Elfnote]]" card: You can [[Special Summon]] 1 "[[Medius the Pure]]" from your [[hand]] or [[Main Deck|Deck]]. Your opponent cannot activate cards or [[effect]]s when that monster is Special Summoned. You can [[banish]] this card from your [[GY]], then [[target]] 1 [[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], or [[Xyz Monster]] in your GY; Special Summon it to your zone a [[Link Monster]] [[points to]]. You can only use 1 "Theorealize Past Lull" effect per turn, and only once that turn.
  | fr_text               = Si vous contrôlez une carte "Artmage", "DoomZ" ou "Notes Elfiques" : vous pouvez Invoquer Spécialement 1 "Medius le Pur" depuis votre main ou Deck. Votre adversaire ne peut activer ni de cartes ni d'effets lorsque le monstre est Invoqué Spécialement. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 Monstre Fusion, Synchro ou Xyz dans votre Cimetière ; Invoquez-le Spécialement dans votre zone pointée par un Monstre Lien. Vous ne pouvez utiliser qu'1 effet de "Théoréalisation Après l'Accalmie" par tour, et uniquement une fois le tour.
  | de_text               = Falls du eine „Kunstmagus“-, „UntergangZ“- oder „Elfnote“-Karte kontrollierst: Du kannst 1 „Medius der Reine“ als Spezialbeschwörung von deiner Hand oder deinem Deck beschwören. Dein Gegner kann weder Karten noch Effekte aktivieren, wenn jenes Monster als Spezialbeschwörung beschworen wird. Du kannst diese Karte von deinem Friedhof verbannen und dann 1 Fusions-, Synchro- oder Xyz-Monster in deinem Friedhof wählen; beschwöre es als Spezialbeschwörung in deine Zone, auf die ein Linkmonster zeigt. Du kannst nur 1 Effekt von „Theorealisieren der vergangenen Ruhe“ pro Spielzug verwenden und in jenem Spielzug nur einmal.
  | it_text               = Se controlli una carta "Artmage", "DoomZ" o "Elfnote": puoi Evocare Specialmente 1 "Medius il Puro" dalla tua mano o Deck. Il tuo avversario non può attivare carte o effetti quando quel mostro viene Evocato Specialmente. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 Mostro Fusione, Synchro o Xyz nel tuo Cimitero; Evocalo Specialmente in una tua zona puntata da un Mostro Link. Puoi utilizzare solo 1 effetto di "Teorealizzare Quiete Passata" per turno, e solo una volta in quel turno.
  | pt_text               = Se você controlar um card "Artmage", "DoomZ" ou "Elfnota": você pode Invocar por Invocação-Especial 1 "Medius, o Puro" da sua mão ou do Deck. Seu oponente não pode ativar cards ou efeitos quando esse monstro for Invocado por Invocação-Especial. Você pode banir este card do seu Cemitério e, depois, escolha 1 Monstro de Fusão, Sincro ou Xyz no seu Cemitério; Invoque-o por Invocação-Especial em uma zona sua para a qual um Monstro Link apontar. Você só pode usar 1 efeito de "Teorealizar a Calmaria Passada" por turno e apenas uma vez por turno.
  | es_text               = Si controlas una carta "Artmagia", "DoomZ" o "Elfnota": puedes Invocar de Modo Especial, desde tu mano o Deck, 1 "Medius el Puro". Tu adversario no puede activar cartas o efectos cuando ese monstruo es Invocado de Modo Especial. Puedes desterrar esta carta en tu Cementerio, y después selecciona 1 Monstruo de Fusión, Sincronía o Xyz en tu Cementerio; Invócalo de Modo Especial a tu zona a la que apunte un Monstruo de Enlace. Sólo puedes usar 1 efecto de "Teoresaber Calma Antigua" por turno, y sólo una vez ese turno.
  | ja_text               = このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：自分フィールドに「アルトメギア」、「ドゥームズ」、「エルフェンノーツ」カードのいずれかが存在する場合に発動できる。手札・デッキから「無垢なる者 メディウス」１体を特殊召喚する。その特殊召喚成功時に相手はカードの効果を発動できない。②：墓地のこのカードを除外し、自分の墓地の融合・Ｓ・Ｘモンスター１体を対象として発動できる。そのモンスターをＬモンスターのリンク先となる自分フィールドに特殊召喚する。
  | ko_text               = 이 카드명의 ①②의 효과는 1턴에 1번, 어느 쪽이든 1개밖에 사용할 수 없다. ①: 자신 필드에 "아르토메기아", "둠즈", "엘펜노츠" 카드 중 어느 것이 존재할 경우에 발동할 수 있다. 패 / 덱에서 "무구한 자 메디우스" 1장을 특수 소환한다. 그 특수 소환 성공시에 상대는 카드의 효과를 발동할 수 없다. ②: 묘지의 이 카드를 제외하고, 자신 묘지의 융합 / 싱크로 / 엑시즈 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터를 링크 몬스터의 링크 앞이 되는 자신 필드에 특수 소환한다.
  | sc_text               = 此卡名的①②效果1回合1次，仅可使用其中1个。①：自己场上存在“神艺”、“终刻”、“耀圣”卡中的任一的情况下可以发动。从手牌・牌组将1只“无垢者 墨迪乌斯”特殊召唤。该特殊召唤成功时对手不可发动卡的效果。②：将墓地的此卡除外，以自己墓地的1只融合・同步・超量怪兽为对象可以发动。将该怪兽特殊召唤至连接怪兽连接端的自己场上。
