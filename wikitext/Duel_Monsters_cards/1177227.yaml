  | ja_text               = このカード名のカードは１ターンに１枚しか発動できない。①：お互いはそれぞれ自身の手札・デッキから魔法使い族・闇属性モンスター１体を特殊召喚できる。この効果で自分が特殊召喚したモンスターの元々のカード名が「ブラック・マジシャン」か「ブラック・マジシャン・ガール」の場合、さらに自分は「黒魔導のカーテン」を除く、「ブラック・マジシャン」のカード名が記された魔法・罠カード１枚をデッキから手札に加える事ができる。このターン、この効果で特殊召喚したモンスターの効果は発動できない。
  | ko_text               = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 양쪽 플레이어는 각각 자신의 패 / 덱에서 마법사족 / 어둠 속성 몬스터 1장을 특수 소환할 수 있다. 이 효과로 자신이 특수 소환한 몬스터의 원래의 카드명이 "블랙 매지션"이나 "블랙 매지션 걸"일 경우, 추가로 자신은 "흑마도의 커튼"이 아닌, "블랙 매지션"의 카드명이 쓰여진 마법 / 함정 카드 1장을 덱에서 패에 넣을 수 있다. 이 턴에, 이 효과로 특수 소환한 몬스터의 효과는 발동할 수 없다.
  | sc_text               = 此卡名的卡1回合仅可发动1张。①：双方可各自从自身手牌・牌组将1只魔法师族・暗属性怪兽特殊召唤。自己以此效果特殊召唤的怪兽原本卡名为“黑魔导”或“黑魔导女孩”的情况下，自己进而可从牌组将除“黑之魔导的帘布”以外的、1张记载有“黑魔导”卡名的魔法・陷阱卡加入手牌。此回合，以此效果特殊召唤的怪兽的效果不可发动。
