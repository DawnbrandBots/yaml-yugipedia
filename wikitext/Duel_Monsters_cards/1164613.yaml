  | ja_text               = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから「捕食植物ロンギネフィラ」以外の「プレデター」カード１枚を手札に加える。②：墓地のこのカードを除外し、以下の効果から１つを選択して発動できる。●フィールドの表側表示モンスター１体に捕食カウンターを１つ置く。捕食カウンターが置かれたレベル２以上のモンスターのレベルは１になる。●自分の墓地・除外状態の「融合」１枚を自分フィールドにセットする。
  | ko_text               = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "프레데터 플랜츠 롱기네필라" 이외의 "프레데터" 카드 1장을 패에 넣는다. ②: 묘지의 이 카드를 제외하고, 이하의 효과에서 1개를 선택하여 발동할 수 있다. ●필드의 앞면 표시 몬스터 1장에 포식 카운터를 1개 놓는다. 포식 카운터가 놓여진 레벨 2 이상의 몬스터의 레벨은 1 이 된다. ●자신의 묘지 / 제외 상태인 "융합" 1장을 자신 필드에 세트한다.
  | sc_text               = 此卡名的①②效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将“捕食植物 长叶狸藻新妇蛛”以外的1张“捕食”卡加入手牌。②：将墓地的此卡除外，可从以下效果中选择1个发动。<br />●在场上的1只表侧表示怪兽上放1个捕食计数物。放有捕食计数物的等级2以上怪兽的等级变为1。<br />●将自己墓地・除外状态的1张“融合”放置在自己场上。
