title: Dragunity Divine Wind (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | card_type          = Spell
  | property           = Field
  | text               = During your Main Phase: You can apply 1 of these effects, or if "Dragon Ravine" is in your GY, you can apply any of them, in sequence;<br />●Add 1 Dragon or Winged Beast monster from your GY to your hand.<br />●Special Summon 1 "Dragunity" monster from your hand, then you can equip 1 Dragon "Dragunity" monster from your Deck to it as an Equip Spell.<br />You can only use this effect of "Dragunity Divine Wind" once per turn.

  | fr_name            = Vent Divin Dragunité
  | fr_text            = Durant votre Main Phase : vous pouvez appliquer 1 de ces effets, ou si "Ravin des Dragons" est dans votre Cimetière, vous pouvez appliquer n'importe lesquels, dans l'ordre ;<br />●Ajoutez 1 monstre Dragon ou Bête Ailée depuis votre Cimetière à votre main.<br />●Invoquez Spécialement 1 monstre "Dragunité" depuis votre main, puis vous pouvez lui équiper 1 monstre "Dragunité" Dragon depuis votre Deck comme Magie d'Équipement.<br />Vous ne pouvez utiliser cet effet de "Vent Divin Dragunité" qu'une fois par tour.
  | de_name            = Göttlicher Dracheneinheit-Wind
  | de_text            = Während deiner Main Phase: Du kannst 1 dieser Effekte ausführen oder falls sich „Drachenschlucht“ in deinem Friedhof befindet, kannst du beliebig viele von ihnen nacheinander ausführen;<br />●Füge deiner Hand 1 Drache- oder Geflügeltes Ungeheuer-Monster von deinem Friedhof hinzu.<br />●Beschwöre 1 „Dracheneinheit“-Monster als Spezialbeschwörung von deiner Hand, dann kannst du es mit 1 „Dracheneinheit“-Drache-Monster von deinem Deck als Ausrüstungszauber ausrüsten.<br />Du kannst diesen Effekt von „Göttlicher Dracheneinheit-Wind“ nur einmal pro Spielzug verwenden.
  | it_name            = Vento Divino Dragunità
  | it_text            = Durante la tua Main Phase: puoi applicare 1 di questi effetti o, se "Gola Drago" è nel tuo Cimitero, puoi applicare qualsiasi di essi, in ordine;<br />●Aggiungi 1 mostro Drago o Bestia Alata dal tuo Cimitero alla tua mano.<br />●Evoca Specialmente 1 mostro "Dragunità" dalla tua mano, poi puoi equipaggiare 1 mostro "Dragunità" Drago dal tuo Deck a esso come una Magia Equipaggiamento.<br />Puoi utilizzare questo effetto di "Vento Divino Dragunità" una sola volta per turno.
  | pt_name            = Vento Divino da Dragunidade
  | pt_text            = Durante sua Fase Principal: você pode aplicar 1 desses efeitos, ou se "Ravina de Dragões" estiver no seu Cemitério, você pode aplicar quaisquer deles, em sequência;<br />●Adicione 1 monstro Dragão ou Besta Alada do seu Cemitério à sua mão.<br />●Invoque por Invocação-Especial 1 monstro "Dragunidade" da sua mão e, depois, você pode equipar 1 monstro Dragão "Dragunidade" do seu Deck a ele como uma Magia de Equipamento.<br />Você só pode usar este efeito de "Vento Divino da Dragunidade" uma vez por turno.
  | es_name            = Viento Divino Dracounidad
  | es_text            = Durante tu Main Phase: puedes aplicar 1 de estos efectos o, si "Barranco del Dragón" está en tu Cementerio, puedes aplicar cualquiera de ellos, en secuencia;<br />●Añade a tu mano 1 monstruo Dragón o Bestia Alada en tu Cementerio.<br />●Invoca de Modo Especial, desde tu mano, 1 monstruo "Dracounidad", y después puedes equiparle 1 monstruo "Dracounidad" Dragón en tu Deck como una Mágica de Equipo.<br />Sólo puedes usar este efecto de "Viento Divino Dracounidad" una vez por turno.
  | ja_text            = このカード名の①の効果は１ターンに１度しか使用できない。<br />①：自分メインフェイズに発動できる。自分の墓地に「竜の渓谷」が存在する場合、以下の効果をそれぞれ適用できる。存在しない場合、以下の効果から１つを選んで適用する。<br />●自分の墓地からドラゴン族・鳥獣族モンスター１体を手札に加える。<br />●手札から「ドラグニティ」モンスター１体を特殊召喚する。その後、デッキからドラゴン族の「ドラグニティ」モンスター１体を装備魔法カード扱いで、この効果で特殊召喚したモンスターに装備できる。
  | ko_name            = 신풍의 드래그니티
  | ko_text            = 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 메인 페이즈에 발동할 수 있다. 자신 묘지에 "용의 계곡"이 존재할 경우, 이하의 효과를 각각 적용할 수 있다. 존재하지 않을 경우, 이하의 효과에서 1개를 고르고 적용한다.<br />●자신 묘지에서 드래곤족 / 비행야수족 몬스터 1장을 패에 넣는다.<br />●패에서 "드래그니티" 몬스터 1장을 특수 소환한다. 그 후, 덱에서 드래곤족인 "드래그니티" 몬스터 1장을 장착 마법 카드로 취급하고, 이 효과로 특수 소환한 몬스터에 장착할 수 있다.
  | tc_name            = 神風之龍盟
  | tc_text            = 此卡名的①效果1回合僅可使用1次。<br />①：在自己的主要階段可以發動。自己墓地存在「龍之溪谷」的情況下，可分別適用以下效果。不存在的情況下，從以下效果中挑選1個適用。<br />●從自己墓地將1隻龍族・鳥獸族怪獸加入手牌。<br />●從手牌將1隻「龍盟」怪獸特殊召喚。然後，可從牌組將1隻龍族的「龍盟」怪獸視為裝備魔法卡，裝備於以此效果特殊召喚的怪獸。
  | sc_name            = 神风之龙骑兵团
  | sc_text            = 此卡名的①效果1回合仅可使用1次。<br />①：在自己的主要阶段可以发动。自己墓地存在“龙之溪谷”的情况下，可分别适用以下效果。不存在的情况下，从以下效果中挑选1个适用。<br />●从自己墓地将1只龙族・鸟兽族怪兽加入手牌。<br />●从手牌将1只“龙骑兵团”怪兽特殊召唤。然后，可从牌组将1只龙族的“龙骑兵团”怪兽视为装备魔法卡，装备于以此效果特殊召唤的怪兽。
  }}
