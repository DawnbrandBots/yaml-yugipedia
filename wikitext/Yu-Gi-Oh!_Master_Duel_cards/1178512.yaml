  | text               = You can reveal this card and 1 "Gouki" monster in your hand; Special Summon both monsters, but for each one, as long as it remains face-up in your Monster Zone, you cannot Special Summon, except "Gouki" monsters. If this card is sent from the field to the GY: You can add 1 "Gouki" card from your Deck to your hand, except "Gouki Machine Suprex". You can only use each effect of "Gouki Machine Suprex" once per turn.

  | fr_name            = Machine Suprex Gouki
  | fr_text            = Vous pouvez révéler cette carte et 1 monstre "Gouki" dans votre main ; Invoquez Spécialement les deux monstres, mais pour chacun d'eux, tant qu'il reste face recto dans votre Zone Monstre, vous ne pouvez pas Invoquer Spécialement (monstres "Gouki" exclus). Si cette carte est envoyée depuis le Terrain au Cimetière : vous pouvez ajouter 1 carte "Gouki" ("Machine Suprex Gouki" exclu) depuis votre Deck à votre main. Vous ne pouvez utiliser chaque effet de "Machine Suprex Gouki" qu'une fois par tour.
  | de_name            = Gouki Maschine Suprex
  | de_text            = Du kannst diese Karte und 1 „Gouki“-Monster in deiner Hand vorzeigen; beschwöre beide Monster als Spezialbeschwörung, aber für jedes, solange es offen in deiner Monsterzone verbleibt, kannst du keine Spezialbeschwörungen durchführen, außer von „Gouki“-Monstern. Falls diese Karte vom Spielfeld auf den Friedhof gelegt wird: Du kannst deiner Hand 1 „Gouki“-Karte von deinem Deck hinzufügen, außer „Gouki Maschine Suprex“. Du kannst jeden Effekt von „Gouki Maschine Suprex“ nur einmal pro Spielzug verwenden.
  | it_name            = Gouki Suprex Macchina
  | it_text            = Puoi rivelare questa carta e 1 mostro "Gouki" nella tua mano; Evoca Specialmente entrambi i mostri, ma per ognuno, fino a quando rimane scoperto nella tua Zona Mostri, non puoi Evocare Specialmente, eccetto mostri "Gouki". Se questa carta viene mandata dal Terreno al Cimitero: puoi aggiungere 1 carta "Gouki" dal tuo Deck alla tua mano, eccetto "Gouki Suprex Macchina". Puoi utilizzare ogni effetto di "Gouki Suprex Macchina" una sola volta per turno.
  | pt_name            = Gouki Máquina Suprex
  | pt_text            = Você pode revelar este card e 1 monstro "Gouki" na sua mão; Invoque os dois monstros por Invocação-Especial, mas, para cada um, enquanto ele permanecer com a face para cima na sua Zona de Monstros, você não pode Invocar por Invocação-Especial, exceto monstros "Gouki". Se este card for enviado do campo para o Cemitério: você pode adicionar 1 card "Gouki" do seu Deck à sua mão, exceto "Gouki Máquina Suprex". Você só pode usar cada efeito de "Gouki Máquina Suprex" uma vez por turno.
  | es_name            = Gouki Suprex Máquina
  | es_text            = Puedes mostrar esta carta y 1 monstruo "Gouki" en tu mano; Invoca ambos monstruos de Modo Especial, pero por cada uno, mientras permanezca boca arriba en tu Zona de Monstruos, no puedes Invocar de Modo Especial, excepto monstruos "Gouki". Si esta carta es mandada del Campo al Cementerio: puedes añadir a tu mano 1 carta "Gouki" en tu Deck, excepto "Gouki Suprex Máquina". Sólo puedes usar cada efecto de "Gouki Suprex Máquina" una vez por turno.
  | ja_text            = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：手札のこのカードと手札の「剛鬼」モンスター１体を相手に見せて発動できる。その２体を特殊召喚する。この効果で特殊召喚したモンスターが自分フィールドに表側表示で存在する限り、自分は「剛鬼」モンスターしか特殊召喚できない。<br />②：このカードがフィールドから墓地へ送られた場合に発動できる。デッキから「剛鬼マシン・スープレックス」以外の「剛鬼」カード１枚を手札に加える。
  | ko_name            = 강귀 머신 스플렉스
  | ko_text            = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 패의 이 카드와 패의 "강귀" 몬스터 1장을 상대에게 보여주고 발동할 수 있다. 그 2장을 특수 소환한다. 이 효과로 특수 소환한 몬스터가 자신 필드에 앞면 표시로 존재하는 한, 자신은 "강귀" 몬스터밖에 특수 소환할 수 없다.<br />②: 이 카드가 필드에서 묘지로 보내졌을 경우에 발동할 수 있다. 덱에서 "강귀 머신 스플렉스" 이외의 "강귀" 카드 1장을 패에 넣는다.
  | tc_name            = 剛鬼 魔神・過肩摔霸王龍
  | tc_text            = 此卡名的①②效果1回合僅可各使用1次。<br />①：向對手出示手牌的此卡與手牌的1隻「剛鬼」怪獸可以發動。將該2隻特殊召喚。只要以此效果特殊召喚的怪獸以表側表示存在於自己場上，自己僅可特殊召喚「剛鬼」怪獸。<br />②：此卡從場上被送至墓地的情況下可以發動。從牌組將「剛鬼 魔神・過肩摔霸王龍」以外的1張「剛鬼」卡加入手牌。
  | sc_name            = 刚鬼 魔神・过肩摔霸王龙
  | sc_text            = 此卡名的①②效果1回合仅可各使用1次。<br />①：向对手出示手牌的此卡与手牌的1只“刚鬼”怪兽可以发动。将该2只特殊召唤。只要以此效果特殊召唤的怪兽以表侧表示存在于自己场上，自己仅可特殊召唤“刚鬼”怪兽。<br />②：此卡从场上被送至墓地的情况下可以发动。从牌组将“刚鬼 魔神・过肩摔霸王龙”以外的1张“刚鬼”卡加入手牌。
  }}
