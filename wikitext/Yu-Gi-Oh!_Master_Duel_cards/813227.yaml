  | es_name   = Agujero del Sable
  | es_text   = Cuando uno o más monstruos fueran a ser Invocados, mientras controles un monstruo "Sable-X": niega la Invocación y, si lo haces, destruye ese o esos monstruos.
  | ja_text   = ①：自分フィールドに「Ｘ－セイバー」モンスターが存在し、自分か相手がモンスターを召喚・反転召喚・特殊召喚する際に発動できる。それを無効にし、そのモンスターを破壊する。
  | ko_name   = 세이버 홀
