  | tc_name   = 軍刀空洞
  | tc_text   = ①：可在我方場上存在「X－軍刀」怪獸，我方或對方召喚・反轉召喚・特殊召喚怪獸時發動。將其變為無效，破壞該怪獸。
  | sc_name   = 军刀空洞
  | sc_text   = ①：我方场上存在有“拾－军刀”怪兽，且我方或对手召唤、反转召唤、特殊召唤怪兽时可发动。使该召唤无效，并破坏该怪兽。
