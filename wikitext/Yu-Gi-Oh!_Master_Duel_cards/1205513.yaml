  | text               = If you have 2 or more WIND monsters in your GY and this card is in your hand: You can Special Summon this card, and if you do, shuffle 1 WIND monster from your GY into the Deck. If this card is Normal or Special Summoned: You can reveal the top card of your opponent's Deck, and apply the appropriate effect based on its card type.<br />●Monster: Place it in your opponent's Spell & Trap Zone as a face-up Continuous Spell.<br />●Spell/Trap: Banish it.<br />You can only use each effect of "Silk Bomb Moth" once per turn.

  | fr_name            = Papillon à Bombe de Soie
  | fr_text            = Si vous avez min. 2 monstres VENT dans votre Cimetière et que cette carte est dans votre main : vous pouvez Invoquer Spécialement cette carte, et si vous le faites, mélangez 1 monstre VENT depuis votre Cimetière dans le Deck. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez révéler la carte du dessus du Deck de votre adversaire, et appliquez l'effet approprié selon son type de carte.<br />●Monstre : Placez-la dans la Zone Magie & Piège de votre adversaire comme Magie Continue face recto.<br />●Magie/Piège : Bannissez-la.<br />Vous ne pouvez utiliser chaque effet de "Papillon à Bombe de Soie" qu'une fois par tour.
  | de_name            = Seidenbomben-Motte
  | de_text            = Falls du 2 oder mehr WIND Monster in deinem Friedhof hast und sich diese Karte in deiner Hand befindet: Du kannst diese Karte als Spezialbeschwörung beschwören und falls du dies tust, mische 1 WIND Monster von deinem Friedhof ins Deck. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst die oberste Karte des Decks deines Gegners vorzeigen und den entsprechenden Effekt ausführen, basierend auf ihrem Kartentyp.<br />●Monster: Lege sie als offenen Permanenten Zauber in die Zauber- & Fallenzone deines Gegners.<br />●Zauber/Falle: Verbanne sie.<br />Du kannst jeden Effekt von „Seidenbomben-Motte“ nur einmal pro Spielzug verwenden.
  | it_name            = Falena Bomba Seta
  | it_text            = Se hai 2 o più mostri VENTO nel tuo Cimitero e questa carta è nella tua mano: puoi Evocare Specialmente questa carta e, se lo fai, mischia 1 mostro VENTO dal tuo Cimitero nel Deck. Se questa carta viene Evocata Normalmente o Specialmente: puoi rivelare la prima carta del Deck del tuo avversario, e applicare l'effetto appropriato a seconda del suo tipo di carta.<br />●Mostro: Mettilo nella Zona Magie & Trappole del tuo avversario come una Magia Continua scoperta.<br />●Magia/Trappola: Bandiscilo.<br />Puoi utilizzare ogni effetto di "Falena Bomba Seta" una sola volta per turno.
  | pt_name            = Mariposa Bomba de Seda
  | pt_text            = Se você tiver 2 ou mais monstros de VENTO no seu Cemitério e este card estiver na sua mão: você pode Invocar este card por Invocação-Especial e, se isso acontecer, embaralhe 1 monstro de VENTO do seu Cemitério no Deck. Se este card for Invocado por Invocação-Normal ou Especial: você pode revelar o card do topo do Deck do seu oponente e aplicar o efeito apropriado de acordo com seu tipo de card.<br />●Monstro: Coloque-o na Zona de Magias & Armadilhas do seu oponente como uma Magia Contínua com a face para cima.<br />●Magia/Armadilha: Bana-a.<br />Você só pode usar cada efeito de "Mariposa Bomba de Seda" uma vez por turno.
  | es_name            = Polilla Bomba de Seda
  | es_text            = Si tienes 2 o más monstruos de VIENTO en tu Cementerio y esta carta está en tu mano: puedes Invocar esta carta de Modo Especial y, si lo haces, baraja al Deck 1 monstruo de VIENTO en tu Cementerio. Si esta carta es Invocada de Modo Normal o Especial: puedes mostrar la carta de la parte superior del Deck de tu adversario y aplica el efecto apropiado basado en su tipo de carta.<br />●Monstruo: Ponla en la Zona de Magia y Trampas de tu adversario como una Mágica Continua boca arriba.<br />●Mágica/Trampa: Destiérrala.<br />Sólo puedes usar cada efecto de "Polilla Bomba de Seda" una vez por turno.
  | ja_text            = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードが手札に存在し、自分の墓地に風属性モンスターが２体以上存在する場合に発動できる。このカードを特殊召喚し、自分の墓地から風属性モンスター１体をデッキに戻す。<br />②：このカードが召喚・特殊召喚した場合に発動できる。相手のデッキの一番上のカードをお互いに確認し、その種類によって以下の効果を適用する。<br />●モンスター：確認したカードを永続魔法カード扱いで相手の魔法＆罠ゾーンに表側表示で置く。<br />●魔法・罠：確認したカードを除外する。
  | ko_name            = 실크봄모스
  | ko_text            = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드가 패에 존재하고, 자신 묘지에 바람 속성 몬스터가 2장 이상 존재할 경우에 발동할 수 있다. 이 카드를 특수 소환하고, 자신 묘지에서 바람 속성 몬스터 1장을 덱으로 되돌린다.<br />②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 상대의 덱 맨 위의 카드를 서로 확인하고, 그 종류에 따라 이하의 효과를 적용한다.<br />●몬스터: 확인한 카드를 지속 마법 카드로 취급하고 상대의 마법 & 함정 존에 앞면 표시로 놓는다.<br />●마법 / 함정: 확인한 카드를 제외한다.
  | tc_name            = 絲綢炸彈蛾
  | tc_text            = 此卡名的①②效果1回合僅可各使用1次。<br />①：此卡存在於手牌，且自己墓地存在2隻以上的風屬性怪獸的情況下可以發動。將此卡特殊召喚，從自己墓地將1隻風屬性怪獸放回牌組。<br />②：此卡召喚・特殊召喚的情況下可以發動。將對手牌組最上面的卡給雙方確認，根據其種類適用以下效果。<br />●怪獸：將所確認的卡視為永續魔法卡以表側表示放在對手的魔法與陷阱區域。<br />●魔法・陷阱：將所確認的卡除外。
  | sc_name            = 丝绸炸弹蛾
  | sc_text            = 此卡名的①②效果1回合仅可各使用1次。<br />①：此卡存在于手牌，且自己墓地存在2只以上的风属性怪兽的情况下可以发动。将此卡特殊召唤，从自己墓地将1只风属性怪兽放回牌组。<br />②：此卡召唤・特殊召唤的情况下可以发动。将对手牌组最上面的卡给双方确认，根据其种类适用以下效果。<br />●怪兽：将所确认的卡视为永续魔法卡以表侧表示放在对手的魔法与陷阱区域。<br />●魔法・陷阱：将所确认的卡除外。
