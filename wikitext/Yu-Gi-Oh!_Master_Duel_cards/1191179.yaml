title: Dragunity Falchion (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = SR
  | attribute          = WIND
  | types              = Dragon / Tuner / Effect
  | level              = 2
  | atk                = 1300
  | def                = 1200
  | text               = You can banish this card from your hand or GY, then target 1 "Dragunity" monster you control; equip 1 Dragon "Dragunity" monster from your Deck or GY to it as an Equip Spell. While this card is equipped to a "Dragunity" monster: You can send this card to the GY, then target 1 face-up card your opponent controls; banish it. You can only use each effect of "Dragunity Falchion" once per turn.

  | fr_name            = Fauchon Dragunité
  | fr_text            = Vous pouvez bannir cette carte depuis votre main ou Cimetière, puis ciblez 1 monstre "Dragunité" que vous contrôlez ; équipez-lui 1 monstre "Dragunité" Dragon depuis votre Deck ou Cimetière comme Magie d'Équipement. Tant que cette carte est équipée à un monstre "Dragunité" : vous pouvez envoyer cette carte au Cimetière, puis ciblez 1 carte face recto contrôlée par votre adversaire ; bannissez-la. Vous ne pouvez utiliser chaque effet de "Fauchon Dragunité" qu'une fois par tour.
  | de_name            = Dracheneinheit Falchion
  | de_text            = Du kannst diese Karte von deiner Hand oder deinem Friedhof verbannen und dann 1 „Dracheneinheit“-Monster wählen, das du kontrollierst; rüste es mit 1 „Dracheneinheit“-Drache-Monster von deinem Deck oder Friedhof als Ausrüstungszauber aus. Solange diese Karte ein „Dracheneinheit“-Monster ausrüstet: Du kannst diese Karte auf den Friedhof legen und dann 1 offene Karte wählen, die dein Gegner kontrolliert; verbanne sie. Du kannst jeden Effekt von „Dracheneinheit Falchion“ nur einmal pro Spielzug verwenden.
  | it_name            = Falcione Dragunità
  | it_text            = Puoi bandire questa carta dalla tua mano o Cimitero, poi scegliere come bersaglio 1 mostro "Dragunità" che controlli; equipaggia 1 mostro "Dragunità" Drago dal tuo Deck o Cimitero a esso come una Magia Equipaggiamento. Mentre questa carta è equipaggiata a un mostro "Dragunità": puoi mandare questa carta al Cimitero, poi scegliere come bersaglio 1 carta scoperta controllata dal tuo avversario; bandiscila. Puoi utilizzare ogni effetto di "Falcione Dragunità" una sola volta per turno.
  | pt_name            = Alfanje Dragunidade
  | pt_text            = Você pode banir este card da sua mão ou do Cemitério e, depois, escolha 1 monstro "Dragunidade" que você controla; equipe 1 monstro Dragão "Dragunidade" do seu Deck ou Cemitério a ele como uma Magia de Equipamento. Enquanto este card estiver equipado a um monstro "Dragunidade": você pode enviar este card para o Cemitério e, depois, escolha 1 card com a face para cima que seu oponente controla; bana-o. Você só pode usar cada efeito de "Alfanje Dragunidade" uma vez por turno.
  | es_name            = Dracounidad Falchion
  | es_text            = Puedes desterrar esta carta en tu mano o Cementerio, y después seleccionar 1 monstruo "Dracounidad" que controles; equípale 1 monstruo "Dracounidad" Dragón en tu Deck o Cementerio como una Mágica de Equipo. Mientras esta carta esté equipada a un monstruo "Dracounidad": puedes mandar al Cementerio esta carta, y después seleccionar 1 carta boca arriba que controle tu adversario; destiérrala. Sólo puedes usar cada efecto de "Dracounidad Falchion" una vez por turno.
  | ja_text            = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：手札・墓地のこのカードを除外し、自分フィールドの「ドラグニティ」モンスター１体を対象として発動できる。自分のデッキ・墓地からドラゴン族の「ドラグニティ」モンスター１体を装備魔法カード扱いで対象のモンスターに装備する。<br />②：「ドラグニティ」モンスターに装備されているこのカードを墓地へ送り、相手フィールドの表側表示カード１枚を対象として発動できる。そのカードを除外する。
  | ko_name            = 드래그니티－파르시온
  | ko_text            = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 패 / 묘지의 이 카드를 제외하고, 자신 필드의 "드래그니티" 몬스터 1장을 대상으로 하여 발동할 수 있다. 자신의 덱 / 묘지에서 드래곤족인 "드래그니티" 몬스터 1장을 장착 마법 카드로 취급하고 대상 몬스터에 장착한다.<br />②: "드래그니티" 몬스터에 장착되어 있는 이 카드를 묘지로 보내고, 상대 필드의 앞면 표시 카드 1장을 대상으로 하여 발동할 수 있다. 그 카드를 제외한다.
  | tc_name            = 龍盟－彎刃大刀
  | tc_text            = 此卡名的①②效果1回合僅可各使用1次。<br />①：將手牌・墓地的此卡除外，以自己場上的1隻「龍盟」怪獸為對象可以發動。從自己牌組・墓地將1隻龍族的「龍盟」怪獸視為裝備魔法卡，裝備於對象怪獸。<br />②：將被裝備於「龍盟」怪獸的此卡送至墓地，以對手場上的1張表側表示卡為對象可以發動。將該卡除外。
  | sc_name            = 龙骑兵团－弯刃大刀
  | sc_text            = 此卡名的①②效果1回合仅可各使用1次。<br />①：将手牌・墓地的此卡除外，以自己场上的1只“龙骑兵团”怪兽为对象可以发动。从自己牌组・墓地将1只龙族的“龙骑兵团”怪兽视为装备魔法卡，装备于对象怪兽。<br />②：将被装备于“龙骑兵团”怪兽的此卡送至墓地，以对手场上的1张表侧表示卡为对象可以发动。将该卡除外。
  }}
