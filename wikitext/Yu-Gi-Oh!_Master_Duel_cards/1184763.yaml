  | fr_name            = Sacrifice à Cordes d'Acier
  | fr_text            = Si cette carte est dans votre main ou Cimetière : vous pouvez révéler 1 monstre de min. Niveau 5 dans votre main, puis activez 1 de ces effets (mais vous ne pouvez utiliser chaque effet de "Sacrifice à Cordes d'Acier" qu'une fois par tour) ; durant la End Phase de ce tour, perdez 1000 LP si vous n'avez pas Invoqué Normalement le monstre révélé ou un monstre du même nom d'origine, après avoir activé cet effet.<br />●Invoquez Spécialement cette carte depuis votre main.<br />●Ajoutez cette carte depuis votre Cimetière à votre main.<br />●Bannissez cette carte depuis votre Cimetière, et si vous le faites, ajoutez 1 monstre de min. Niveau 5 depuis votre Cimetière à votre main.
  | de_name            = Stahlsaiten-Opfer
  | de_text            = Falls sich diese Karte in deiner Hand oder deinem Friedhof befindet: Du kannst 1 Monster der Stufe 5 oder höher in deiner Hand vorzeigen und dann 1 dieser Effekte aktivieren (aber du kannst jeden Effekt von „Stahlsaiten-Opfer“ nur einmal pro Spielzug verwenden); während der End Phase dieses Spielzugs verlierst du 1000 LP, falls du nicht das vorgezeigte Monster oder ein Monster mit demselben Grund-Namen als Normalbeschwörung beschworen hast, nachdem du diesen Effekt aktiviert hast.<br />●Beschwöre diese Karte als Spezialbeschwörung von deiner Hand.<br />●Füge diese Karte deiner Hand von deinem Friedhof hinzu.<br />●Verbanne diese Karte von deinem Friedhof und falls du dies tust, füge deiner Hand 1 Monster der Stufe 5 oder höher von deinem Friedhof hinzu.
  | it_name            = Sacrificio Corde d'Acciaio
  | it_text            = Se questa carta è nella tua mano o Cimitero: puoi rivelare 1 mostro di Livello 5 o superiore nella tua mano, poi attivare 1 di questi effetti (ma puoi utilizzare ogni effetto di "Sacrificio Corde d'Acciaio" una sola volta per turno); durante la End Phase di questo turno, perdi 1000 LP se non hai Evocato Normalmente il mostro rivelato, o un mostro con lo stesso nome originale, dopo avere attivato questo effetto.<br />●Evoca Specialmente questa carta dalla tua mano.<br />●Aggiungi questa carta dal tuo Cimitero alla tua mano.<br />●Bandisci questa carta dal tuo Cimitero e, se lo fai, aggiungi 1 mostro di Livello 5 o superiore dal tuo Cimitero alla tua mano.
  | pt_name            = Sacrifício com Cordas de Aço
  | pt_text            = Se este card estiver na sua mão ou no Cemitério: você pode revelar 1 monstro de Nível 5 ou mais na sua mão e, depois, ative 1 desses efeitos (mas você só pode usar cada efeito de "Sacrifício com Cordas de Aço" uma vez por turno); durante a Fase Final deste turno, perca 1000 PV se você não Invocou por Invocação-Normal o monstro revelado, ou um monstro com o mesmo nome original, depois de ativar este efeito.<br />●Invoque este card por Invocação-Especial da sua mão.<br />●Adicione este card do seu Cemitério à sua mão.<br />●Bana este card do seu Cemitério e, se isso acontecer, adicione 1 monstro de Nível 5 ou mais do seu Cemitério à sua mão.
  | es_name            = Sacrificio Cuerdas de Acero
  | es_text            = Si esta carta está en tu mano o Cementerio: puedes mostrar 1 monstruo de Nivel 5 o mayor en tu mano, y después activa 1 de estos efectos (pero sólo puedes usar cada efecto de "Sacrificio Cuerdas de Acero" una vez por turno); durante la End Phase de este turno, pierdes 1000 LP si no Invocaste de Modo Normal el monstruo mostrado, o un monstruo con el mismo nombre original, después de activar este efecto.<br />●Invoca esta carta de Modo Especial desde tu mano.<br />●Añade a tu mano esta carta en tu Cementerio.<br />●Destierra esta carta en tu Cementerio y, si lo haces, añade a tu mano 1 monstruo de Nivel 5 o mayor en tu Cementerio.
  | ja_text            = ①：手札のレベル５以上のモンスター１体を相手に見せ、以下から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。この効果の発動後、このターン中に自分が、見せたモンスターまたはそのモンスターと元々のカード名が同じモンスターの召喚に成功しない限り、このターンのエンドフェイズに自分は１０００ＬＰを失う。<br />●このカードを手札から特殊召喚する。<br />●墓地のこのカードを手札に加える。<br />●墓地のこのカードを除外し、自分の墓地からレベル５以上のモンスター１体を手札に加える。
  | ko_name            = 철현의 기다맨
  | ko_text            = ①: 패의 레벨 5 이상의 몬스터 1장을 상대에게 보여주고, 이하의 효과에서 1개를 선택하여 발동할 수 있다(이 카드명의 이하의 효과는 각각 1턴에 1번밖에 선택할 수 없다). 이 효과의 발동 후, 이 턴 중에 자신이, 보여준 몬스터 또는 그 몬스터와 원래의 카드명이 같은 몬스터의 일반 소환에 성공하지 않는 한, 이 턴의 엔드 페이즈에 자신은 1000 LP를 상실한다.<br />●이 카드를 패에서 특수 소환한다.<br />●묘지의 이 카드를 패에 넣는다.<br />●묘지의 이 카드를 제외하고, 자신 묘지에서 레벨 5 이상의 몬스터 1장을 패에 넣는다.
  | tc_name            = 鐵絃之犧打工匠
  | tc_text            = ①：將手牌的1隻等級5以上的怪獸出示給對手，可從以下效果中選擇１個發動（此卡名的以下效果1回合僅可各選擇1次）。此效果發動後，只要此回合中自己未成功召喚所出示的怪獸或與該怪獸原本卡名相同的怪獸，自己將在此回合的結束階段失去1000LP。<br />●從手牌將此卡特殊召喚。<br />●將墓地的此卡加入手牌。<br />●將墓地的此卡除外，從自己墓地將1隻等級5以上的怪獸加入手牌。
  | sc_name            = 铁弦之牺打工匠
  | sc_text            = ①：将手牌的1只等级5以上的怪兽出示给对手，可从以下效果中选择１个发动（此卡名的以下效果1回合仅可各选择1次）。此效果发动后，只要此回合中自己未成功召唤所出示的怪兽或与该怪兽原本卡名相同的怪兽，自己将在此回合的结束阶段失去1000LP。<br />●从手牌将此卡特殊召唤。<br />●将墓地的此卡加入手牌。<br />●将墓地的此卡除外，从自己墓地将1只等级5以上的怪兽加入手牌。
  }}
