title: Apocavities (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | card_type          = Spell
  | property           = Continuous
  | text               = When this card is activated: Place C Counters on this card, equal to the number of cards your opponent controls. You can target 1 face-up monster your opponent controls and remove up to 4 C Counters from your field; apply this effect to that monster, based on the number removed.<br />●1: It loses 500 ATK.<br />●2: Its ATK becomes 0.<br />●3: Its effects are negated.<br />●4: Destroy it.<br />You can only activate 1 "Apocavities" per turn.
  | releases           = 
  Legacy Pack; May 7, 2026

  | fr_name            = Apocaries
  | fr_text            = Lorsque cette carte est activée : placez un nombre de Compteurs C sur cette carte, égal au nombre de cartes contrôlées par votre adversaire. Vous pouvez cibler 1 monstre face recto contrôlé par votre adversaire, et retirez max. 4 Compteurs C depuis votre Terrain ; appliquez cet effet au monstre, selon le nombre retiré.<br />●1 : Il perd 500 ATK.<br />●2 : Son ATK devient 0.<br />●3 : Ses effets sont annulés.<br />●4 : Détruisez-le.<br />Vous ne pouvez activer qu'1 "Apocaries" par tour.
  | de_name            = Apokalöcher
  | de_text            = Wenn diese Karte aktiviert wird: Lege C-Zählmarken in Höhe der Anzahl der Karten, die dein Gegner kontrolliert, auf diese Karte. Du kannst 1 offenes Monster wählen, das dein Gegner kontrolliert, und bis zu 4 C-Zählmarken von deiner Spielfeldseite entfernen; wende diesen Effekt auf jenes Monster an, basierend auf der entfernten Anzahl.<br />●1: Es verliert 500 ATK.<br />●2: Seine ATK werden zu 0.<br />●3: Seine Effekte werden annulliert.<br />●4: Zerstöre es.<br />Du kannst nur 1 „Apokalöcher“ pro Spielzug aktivieren.
  | it_name            = Apocavità
  | it_text            = Quando questa carta viene attivata: metti Segnalini C su questa carta, pari al numero di carte controllate dal tuo avversario. Puoi scegliere come bersaglio 1 mostro scoperto controllato dal tuo avversario e rimuovere fino a 4 Segnalini C dal tuo Terreno; applica questo effetto a quel mostro, a seconda del numero rimosso.<br />●1: Esso perde 500 ATK.<br />●2: Il suo ATK diventa 0.<br />●3: I suoi effetti sono annullati.<br />●4: Distruggilo.<br />Puoi attivare solo 1 "Apocavità" per turno.
  | pt_name            = Apocavidades
  | pt_text            = Quando este card for ativado: coloque Marcadores C neste card, igual ao número de cards que seu oponente controla. Você pode escolher 1 monstro com a face para cima que seu oponente controla e remover até 4 Marcadores C do seu campo; aplique este efeito a esse monstro, de acordo com o número removido.<br />●1: Ele perde 500 de ATK.<br />●2: O ATK dele se torna 0.<br />●3: Seus efeitos são negados.<br />●4: Destrua-o.<br />Você só pode ativar 1 "Apocavidades" por turno.
  | es_name            = Apocavidades
  | es_text            = Cuando esta carta es activada: pon Contadores C en esta carta igual al número de cartas que controla tu adversario. Puedes seleccionar 1 monstruo boca arriba que controle tu adversario y retira hasta 4 Contadores C en tu Campo; aplica este efecto a ese monstruo, basado en el número de retirados.<br />●1: Pierde 500 ATK.<br />●2: Su ATK se convierte en 0.<br />●3: Sus efectos son negados.<br />●4: Destrúyelo.<br />Sólo puedes activar 1 "Apocavidades" por turno.
  | ja_text            = このカード名のカードは１ターンに１枚しか発動できない。<br />①：このカードの発動時の効果処理として、相手フィールドのカードの数だけこのカードにＣカウンターを置く。<br />②：相手フィールドの表側表示モンスター１体を対象とし、自分フィールドのＣカウンターを４つまで取り除いて発動できる。取り除いたカウンターの数によって以下の効果をそのモンスターに適用する。<br />●１つ：攻撃力を５００ダウンする。<br />●２つ：攻撃力を０にする。<br />●３つ：効果を無効にする。<br />●４つ：破壊する。
  | ko_name            = 아포칼리에스
  | ko_text            = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다.<br />①: 이 카드의 발동시의 효과 처리로서, 상대 필드의 카드의 수만큼 이 카드에 C(칼리에스) 카운터를 놓는다.<br />②: 상대 필드의 앞면 표시 몬스터 1장을 대상으로 하고, 자신 필드의 C(칼리에스) 카운터를 4개까지 제거하고 발동할 수 있다. 제거한 카운터의 수에 따라 이하의 효과를 그 몬스터에 적용한다.<br />●1개: 공격력을 500 내린다.<br />●2개: 공격력을 0 으로 한다.<br />●3개: 효과를 무효로 한다.<br />●4개: 파괴한다.
  | tc_name            = 默齒錄
  | tc_text            = 此卡名的卡1回合僅可發動1張。<br />①：作為此卡發動時的效果處理，依對手場上卡的數量在此卡上放C計數物。<br />②：以對手場上的1隻表側表示怪獸為對象，去除自己場上的最多4個C計數物可以發動。根據去除的計數物的數量對該怪獸適用以下效果。<br />●1個：攻擊力下降500。<br />●2個：將攻擊力改成0。<br />●3個：將效果無效。<br />●4個：破壞。
  | sc_name            = 默齿录
  | sc_text            = 此卡名的卡1回合仅可发动1张。<br />①：作为此卡发动时的效果处理，依对手场上卡的数量在此卡上放C计数物。<br />②：以对手场上的1只表侧表示怪兽为对象，去除自己场上的最多4个C计数物可以发动。根据去除的计数物的数量对该怪兽适用以下效果。<br />●1个：攻击力下降500。<br />●2个：将攻击力改成0。<br />●3个：将效果无效。<br />●4个：破坏。
  }}
