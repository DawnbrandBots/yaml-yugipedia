  | text               = 2+ Level 4 "Springans" monsters<br />If this card is Xyz Summoned, or sent to the GY: You can Special Summon 1 "Springans Captain Sargas" from your Deck or GY. You can detach 2 materials from this card; add to your hand or Special Summon 1 of the following monsters from your Deck.<br />●"Springans" monster<br />●"Therion" monster<br />●"Fallen of Albaz" or 1 monster that mentions it<br />You can only use 1 "Gung-Ho! Springans!" effect per turn, and only once that turn.

  | fr_name            = À Fond Springans !
  | fr_text            = 2+ monstres "Springans" de Niveau 4<br />Si cette carte est Invoquée par Xyz ou envoyée au Cimetière : vous pouvez Invoquer Spécialement 1 "Capitaine Sargas Springans" depuis votre Deck ou Cimetière. Vous pouvez détacher 2 Matériels de cette carte ; ajoutez à votre main ou Invoquez Spécialement 1 des monstres suivants depuis votre Deck.<br />●Monstre "Springans"<br />●Monstre "Therion"<br />●"Albaz le Déchu" ou 1 monstre qui le mentionne<br />Vous ne pouvez utiliser qu'1 effet de "À Fond Springans !" par tour, et uniquement une fois le tour.
  | de_name            = Drauf los, Springans!
  | de_text            = 2+ „Springans“-Monster der Stufe 4<br />Falls diese Karte als Xyz-Beschwörung beschworen oder auf den Friedhof gelegt wird: Du kannst 1 „Springans-Kapitän Sargas“ als Spezialbeschwörung von deinem Deck oder Friedhof beschwören. Du kannst 2 Material von dieser Karte abhängen; füge deiner Hand 1 der folgenden Monster von deinem Deck hinzu oder beschwöre es als Spezialbeschwörung.<br />●„Springans“-Monster<br />●„Therion“-Monster<br />●„Gefallener von Albaz“ oder 1 Monster, das ihn erwähnt<br />Du kannst nur 1 Effekt von „Drauf los, Springans!“ pro Spielzug verwenden und in jenem Spielzug nur einmal.
  | it_name            = Gung-Ho! Springans!
  | it_text            = 2+ mostri "Springans" di Livello 4<br />Se questa carta viene Evocata Xyz, o mandata al Cimitero: puoi Evocare Specialmente 1 "Springans Capitano Sargas" dal tuo Deck o Cimitero. Puoi staccare 2 materiali da questa carta; aggiungi alla tua mano o Evoca Specialmente 1 dei seguenti mostri dal tuo Deck.<br />●Mostro "Springans"<br />●Mostro "Therion"<br />●"Caduto di Albaz" o 1 mostro che lo menziona<br />Puoi utilizzare solo 1 effetto di "Gung-Ho! Springans!" per turno, e solo una volta in quel turno.
  | pt_name            = Vamos Nessa, Springans!
  | pt_text            = 2+ monstros "Springans" de Nível 4<br />Se este card for Invocado por Invocação-Xyz ou enviado para o Cemitério: você pode Invocar por Invocação-Especial 1 "Springans Capitão Sargas" do seu Deck ou Cemitério. Você pode desassociar 2 matérias deste card; adicione à sua mão ou Invoque por Invocação-Especial 1 dos seguintes monstros do seu Deck.<br />●Monstro "Springans"<br />●Monstro "Therion"<br />●"Caído de Arbaz" ou 1 monstro que o mencione<br />Você só pode usar 1 efeito de "Vamos Nessa, Springans!" por turno e apenas uma vez por turno.
  | es_name            = ¡Springans! ¡A Todo!
  | es_text            = 2+ monstruos "Springans" de Nivel 4<br />Si esta carta es Invocada Xyz o mandada al Cementerio: puedes Invocar de Modo Especial 1 "Springans Capitán Sargas" desde tu Deck o Cementerio. Puedes desacoplar 2 materiales de esta carta; añade a tu mano o Invoca de Modo Especial 1 de los siguientes monstruos desde tu Deck.<br />●Monstruo "Springans"<br />●Monstruo "Therion"<br />●"Caído de Albaz" o 1 monstruo que lo mencione<br />Sólo puedes usar 1 efecto de "¡Springans! ¡A Todo!" por turno, y sólo una vez ese turno.
  | ja_text            = レベル４「スプリガンズ」モンスター×２体以上<br />このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。<br />①：このカードがＸ召喚した場合または墓地へ送られた場合に発動できる。自分のデッキ・墓地から「スプリガンズ・キャプテン　サルガス」１体を特殊召喚する。<br />②：このカードのＸ素材を２つ取り除いて発動できる。デッキから以下のモンスターの内１体を選び、手札に加えるか特殊召喚する。<br />●「スプリガンズ」モンスター<br />●「セリオンズ」モンスター<br />●「アルバスの落胤」またはそのカード名が記されたモンスター
  | ko_name            = 겅호! 스프리건즈!
  | ko_text            = 레벨 4 "스프리건즈" 몬스터 × 2장 이상<br />이 카드명의 ①②의 효과는 1턴에 1번, 어느 쪽이든 1개밖에 사용할 수 없다.<br />①: 이 카드를 엑시즈 소환했을 경우 또는 묘지로 보내졌을 경우에 발동할 수 있다. 자신의 덱 / 묘지에서 "스프리건즈 캡틴 사르가스" 1장을 특수 소환한다.<br />②: 이 카드의 엑시즈 소재를 2개 제거하고 발동할 수 있다. 덱에서 이하의 몬스터 중 1장을 고르고, 패에 넣거나 특수 소환한다.<br />●"스프리건즈" 몬스터<br />●"세리온즈" 몬스터<br />●"알버스의 낙윤" 또는 그 카드명이 쓰여진 몬스터
  | tc_name            = 共好！守寶團！
  | tc_text            = 等級4「守寶團」怪獸×2隻以上<br />此卡名的①②效果1回合1次，僅可使用其中1個。<br />①：此卡超量召喚的情況下，或被送至墓地的情況下可以發動。從自己牌組・墓地將1隻「守寶團・艦長 颯嘉斯」特殊召喚。<br />②：去除此卡的2個超量素材可以發動。從牌組挑選以下怪獸中的1隻，加入手牌或特殊召喚。<br />●「守寶團」怪獸<br />●「獸帶鬥士」怪獸<br />●「阿爾白斯之落胤」或記載有該卡名的怪獸
  | sc_name            = 共好！守宝团！
  | sc_text            = 等级4“守宝团”怪兽×2只以上<br />此卡名的①②效果1回合1次，仅可使用其中1个。<br />①：此卡超量召唤的情况下，或被送至墓地的情况下可以发动。从自己牌组・墓地将1只“守宝团・舰长 飒嘉斯”特殊召唤。<br />②：去除此卡的2个超量素材可以发动。从牌组挑选以下怪兽中的1只，加入手牌或特殊召唤。<br />●“守宝团”怪兽<br />●“兽带斗士”怪兽<br />●“阿尔白斯之落胤”或记载有该卡名的怪兽
