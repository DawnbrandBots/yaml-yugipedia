  | types              = Spellcaster / Synchro / Effect
  | level              = 8
  | atk                = 2500
  | def                = 2500
  | text               = 1 Level 4 Tuner + 1+ non-Tuners<br />If this card is Synchro Summoned: You can add 1 Level 4 or 8 Spellcaster monster whose ATK equals its own DEF from your Deck or GY to your hand. You can target 1 face-up card on the field; negate its effects, then if an "Ecclesia" monster or "Fallen of Albaz" is in your GY, you can destroy that card. You can only use each effect of "The Three Champions of Swordsoul" once per turn.

  | fr_name            = Les Trois Champions d'Âmépées
  | fr_text            = 1 Syntoniseur de Niveau 4 + 1+ non-Syntoniseur<br />Si cette carte est Invoquée par Synchronisation : vous pouvez ajouter 1 monstre Magicien de Niveau 4 ou 8 dont l'ATK est égale à sa propre DEF depuis votre Deck ou Cimetière à votre main. Vous pouvez cibler 1 carte face recto sur le Terrain ; annulez ses effets, puis si "Albaz le Déchu" ou un monstre "Ecclésia" est dans votre Cimetière, vous pouvez détruire la carte. Vous ne pouvez utiliser chaque effet de "Les Trois Champions d'Âmépées" qu'une fois par tour.
  | de_name            = Die drei Schwertseelen
  | de_text            = 1 Empfänger der Stufe 4 + 1+ Nicht-Empfänger<br />Falls diese Karte als Synchrobeschwörung beschworen wird: Du kannst deiner Hand 1 Hexer-Monster der Stufe 4 oder 8, dessen ATK seinen eigenen DEF entsprechen, von deinem Deck oder Friedhof hinzufügen. Du kannst 1 offene Karte auf dem Spielfeld wählen; annulliere ihre Effekte, dann, falls sich ein „Ecclesia“-Monster oder „Gefallener von Albaz“ in deinem Friedhof befindet, kannst du jene Karte zerstören. Du kannst jeden Effekt von „Die drei Schwertseelen“ nur einmal pro Spielzug verwenden.
  | it_name            = I Tre Campioni della Spadanima
  | it_text            = 1 Tuner di Livello 4 + 1+ non-Tuner<br />Se questa carta viene Synchro Evocata: puoi aggiungere 1 mostro Incantatore di Livello 4 o 8 con ATK pari al suo stesso DEF dal tuo Deck o Cimitero alla tua mano. Puoi scegliere come bersaglio 1 carta scoperta sul Terreno; annulla i suoi effetti, poi se un mostro "Ecclesia" o "Caduto di Albaz" è nel tuo Cimitero, puoi distruggere quella carta. Puoi utilizzare ogni effetto di "I Tre Campioni della Spadanima" una sola volta per turno.
  | pt_name            = Os Três Campeões de Espadalmas
  | pt_text            = 1 Regulador de Nível 4 + 1+ não-Reguladores<br />Se este card for Invocado por Invocação-Sincro: você pode adicionar 1 monstro Mago de Nível 4 ou 8 cujo ATK seja igual à sua própria DEF do seu Deck ou Cemitério à sua mão. Você pode escolher 1 card com a face para cima no campo; negue seus efeitos e, depois, se um monstro "Ecclesia" ou "Caído de Arbaz" estiver no seu Cemitério, você pode destruir esse card. Você só pode usar cada efeito de "Os Três Campeões de Espadalmas" uma vez por turno.
  | es_name            = Los Tres Campeones de Almaespada
  | es_text            = 1 Cantante de Nivel 4 + 1+ no Cantantes<br />Si esta carta es Invocada por Sincronía: puedes añadir a tu mano 1 monstruo Lanzador de Conjuros de Nivel 4 u 8 cuyo ATK sea igual a su propia DEF en tu Deck o Cementerio. Puedes seleccionar 1 carta boca arriba en el Campo; niega sus efectos y después, si un monstruo "Ecclesia" o "Caído de Albaz" está en tu Cementerio, puedes destruir esa carta. Sólo puedes usar cada efecto de "Los Tres Campeones de Almaespada" una vez por turno.
  | ja_text            = レベル４チューナー＋チューナー以外のモンスター１体以上<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードがＳ召喚した場合に発動できる。攻撃力と守備力の数値が同じレベル４・８の魔法使い族モンスター１体を自分のデッキ・墓地から手札に加える。<br />②：フィールドの表側表示カード１枚を対象として発動できる。そのカードの効果を無効にする。自分の墓地に「エクレシア」モンスターか「アルバスの落胤」が存在する場合、さらに対象のカードを破壊できる。
  | ko_name            = 삼영의 상검사
  | ko_text            = 레벨 4 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 공격력과 수비력의 수치가 같은 레벨 4 / 8 의 마법사족 몬스터 1장을 자신의 덱 / 묘지에서 패에 넣는다.<br />②: 필드의 앞면 표시 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드의 효과를 무효로 한다. 자신 묘지에 "에클레시아" 몬스터나 "알버스의 낙윤"이 존재할 경우, 추가로 대상의 카드를 파괴할 수 있다.
  | tc_name            = 三英的相劍師
  | tc_text            = 等級4協調＋協調以外的怪獸1隻以上<br />此卡名的①②效果1回合僅可各使用1次。<br />①：此卡同步召喚的情況下可以發動。從自己牌組・墓地將1隻攻擊力和守備力數值相同的、等級4・8的魔法使族怪獸加入手牌。<br />②：以場上的1張表側表示卡為對象可以發動。將該卡的效果無效。自己墓地存在「艾克利西亞」怪獸或「阿爾白斯之落胤」的情況下，進而可將對象卡破壞。
  | sc_name            = 三英的相剑师
  | sc_text            = 等级4协调＋协调以外的怪兽1只以上<br />此卡名的①②效果1回合仅可各使用1次。<br />①：此卡同步召唤的情况下可以发动。从自己牌组・墓地将1只攻击力和守备力数值相同的、等级4・8的魔法师族怪兽加入手牌。<br />②：以场上的1张表侧表示卡为对象可以发动。将该卡的效果无效。自己墓地存在“艾克利西亚”怪兽或“阿尔白斯之落胤”的情况下，进而可将对象卡破坏。
  }}
