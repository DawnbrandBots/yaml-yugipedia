  | text      = 2 Level 5 monsters<br />This card's effects can only be applied/resolved while it has material. Cannot be destroyed by card effects. At the end of the Battle Phase, if this card battled: Target 1 card your opponent controls; destroy that target. Once per turn, during your End Phase: Detach 1 material from this card.

  | fr_name   = Tiras, Gardien de la Genèse
  | fr_text   = 2 monstres de Niveau 5<br />(Cette carte n'est pas traitée comme carte "Gardien".)<br />Les effets de cette carte peuvent uniquement être appliqués/résolus tant qu'elle a du Matériel. Non destructible par des effets de carte. À la fin de la Battle Phase, si cette carte a combattu : ciblez 1 carte contrôlée par votre adversaire ; détruisez la cible. Une fois par tour, durant votre End Phase : détachez 1 Matériel de cette carte.
  | de_name   = Tiras, Hüter der Schöpfung
  | de_text   = 2 Monster der Stufe 5<br />Die Effekte dieser Karte können nur angewendet/aufgelöst werden, solange sie Material hat. Kann nicht durch Karteneffekte zerstört werden. Am Ende der Battle Phase, falls diese Karte gekämpft hat: Wähle 1 Karte, die dein Gegner kontrolliert; zerstöre jenes gewählte Ziel. Einmal pro Spielzug, während deiner End Phase: Hänge 1 Material von dieser Karte ab.
  | it_name   = Tiras, Custode della Genesi
  | it_text   = 2 mostri di Livello 5<br />Gli effetti di questa carta possono essere applicati/risolti solo mentre ha materiale. Non può essere distrutta dagli effetti delle carte. Alla fine della Battle Phase, se questa carta ha combattuto: scegli come bersaglio 1 carta controllata dal tuo avversario; distruggi quel bersaglio. Una volta per turno, durante la tua End Phase: stacca 1 materiale da questa carta.
  | pt_name   = Tiras, Protetor da Gênesis
  | pt_text   = 2 monstros de Nível 5<br />Os efeitos deste card só podem ser aplicados/resolvidos enquanto ele tiver matéria. Não pode ser destruído por efeitos de card. No final da Fase de Batalha, se este card batalhou: escolha 1 card que seu oponente controla; destrua o alvo. Uma vez por turno, durante sua Fase Final: desassocie 1 matéria deste card.
  | es_name   = Tiras, Cuidador de Génesis
  | es_text   = 2 monstruos de Nivel 5<br />Los efectos de esta carta sólo pueden aplicarse/resolverse mientras tenga material. No puede ser destruida por efectos de cartas. Al final de la Battle Phase, si esta carta batalló: selecciona 1 carta que controle tu adversario; destruye ese objetivo. Una vez por turno, durante tu End Phase: desacopla 1 material de esta carta.
  | ja_text   = レベル５モンスター×２<br />このカードの効果はこのカードがＸ素材を持っている場合のみ適用される。<br />①：フィールドのこのカードは効果では破壊されない。<br />②：このカードが戦闘を行ったバトルフェイズ終了時、相手フィールドのカード１枚を対象として発動する。その相手のカードを破壊する。<br />③：自分エンドフェイズに発動する。このカードのＸ素材を１つ取り除く。
  | ko_name   = 시조의 수호자 티라스
  | ko_text   = 레벨 5 몬스터 × 2<br />이 카드의 효과는 이 카드의 엑시즈 소재가 없으면 적용되지 않는다. 이 카드는 카드의 효과로는 파괴되지 않는다. 이 카드가 전투를 실행한 배틀 페이즈 종료시, 상대 필드 위에 존재하는 카드 1장을 선택하고 파괴한다. 자신의 엔드 페이즈마다 이 카드의 엑시즈 소재를 1개 제거한다.
  | tc_name   = 始祖保衛者提拉斯
  | tc_text   = 等級５怪獸×２<br />若此卡沒有超量素材，就不適用此卡的效果。場上的此卡不會因卡的效果被破壞。此卡進行戰鬥的戰鬥階段結束時，選擇對方場上的１張卡破壞。每次我方的結束階段，去除此卡的１個超量素材。
  | sc_name   = 始祖保卫者提拉斯
  | sc_text   = 等级5怪兽×2<br />如果此卡没有超量素材，则不会适用此卡的效果。<br />①：场上的此卡不会因效果被破坏。<br />②：此卡进行了战斗的战斗阶段结束时，可以1张对手场上的卡为对象发动。破坏该张对手的卡。<br />③：在自己的结束阶段发动。去除此卡的1个超量素材。
  }}
