  | text               = 2+ Level 7 monsters<br />Gains 700 ATK for each material attached to it. Once per Chain, when a Normal or Quick-Play Spell Card is activated (Quick Effect): You can attach that card on the field to this face-up card, and if you do, this card is unaffected by that activated card. During the End Phase: You can Set 1 Spell Card that is attached to this card. You can only use this effect of "Kerzebs, the Gaoled Glutton" once per turn.

  | fr_name            = Kerzebs, le Gourmand Geôlé
  | fr_text            = 2+ monstres de Niveau 7<br />Gagne 700 ATK pour chaque Matériel qui lui est attaché. Une fois par Chaîne, lorsqu'une Carte Magie Normale ou Jeu-Rapide est activée (Effet Rapide) : vous pouvez attacher la carte sur le Terrain à cette carte face recto, et si vous le faites, cette carte n'est pas affectée par la carte activée. Durant la End Phase : vous pouvez Poser 1 Carte Magie qui est attachée à cette carte. Vous ne pouvez utiliser cet effet de "Kerzebs, le Gourmand Geôlé" qu'une fois par tour.
  | de_name            = Kerzebs, der eingesperrte Nimmersatt
  | de_text            = 2+ Monster der Stufe 7<br />Diese Karte erhält für jedes an sie angehängte Material 700 ATK. Einmal pro Kette, wenn eine Normale oder Schnellzauberkarte aktiviert wird (Schnelleffekt): Du kannst jene Karte vom Spielfeld an diese offene Karte anhängen und falls du dies tust, bleibt diese Karte von jener aktivierten Karte unberührt. Während der End Phase: Du kannst 1 Zauberkarte setzen, die an diese Karte angehängt ist. Du kannst diesen Effekt von „Kerzebs, der eingesperrte Nimmersatt“ nur einmal pro Spielzug verwenden.
  | it_name            = Kerzebs, il Ghiottone Gabbiato
  | it_text            = 2+ mostri di Livello 7<br />Guadagna 700 ATK per ogni materiale attaccato a essa. Una volta per Catena, quando viene attivata una Carta Magia Normale o Rapida (Effetto Rapido): puoi attaccare quella carta sul Terreno a questa carta scoperta e, se lo fai, questa carta è immune a quella carta attivata. Durante la End Phase: puoi Posizionare 1 Carta Magia che è attaccata a questa carta. Puoi utilizzare questo effetto di "Kerzebs, il Ghiottone Gabbiato" una sola volta per turno.
  | pt_name            = Kerzebs, o Glutão Guardado
  | pt_text            = 2+ monstros de Nível 7<br />Ganha 700 de ATK para cada matéria associada a ele. Uma vez por Corrente, quando um Card de Magia Normal ou Rápida for ativado (Efeito Rápido): você pode associar esse card no campo a este card com a face para cima e, se isso acontecer, este card não é afetado por esse card ativado. Durante a Fase Final: você pode Baixar 1 Card de Magia que estiver associado a este card. Você só pode usar este efeito de "Kerzebs, o Glutão Guardado" uma vez por turno.
  | es_name            = Cerbelbú, el Glotón Grilletado
  | es_text            = 2+ monstruos de Nivel 7<br />Gana 700 ATK por cada material acoplado a él. Una vez por Cadena, cuando es activada una Carta Mágica Normal o de Juego Rápido (Efecto Rápido): puedes acoplar esa carta en el Campo a esta carta boca arriba y, si lo haces, esta carta no es afectada por esa carta activada. Durante la End Phase: puedes Colocar 1 Carta Mágica que esté acoplada a esta carta. Sólo puedes usar este efecto de "Cerbelbú, el Glotón Grilletado" una vez por turno.
  | ja_text            = レベル７モンスター×２体以上<br />このカード名の③の効果は１ターンに１度しか使用できない。<br />①：このカードの攻撃力は、このカードのＸ素材の数×７００アップする。<br />②：通常・速攻魔法カードが発動した時に発動できる（同一チェーン上では１度まで）。フィールドのそのカードを表側表示のこのカードのＸ素材にし、このカードはその発動した効果を受けない。<br />③：自分・相手のエンドフェイズに発動できる。このカードがＸ素材としている魔法カード１枚を自分フィールドにセットする。
  | ko_name            = 칠곡의 레마르기아 케르제부스
  | ko_text            = 레벨 7 몬스터 × 2장 이상<br />이 카드명의 ③의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드의 공격력은, 이 카드의 엑시즈 소재의 수 × 700 올린다.<br />②: 일반 / 속공 마법 카드가 발동했을 때에 발동할 수 있다(동일한 체인 위에서는 1번까지). 필드의 그 카드를 앞면 표시인 이 카드의 엑시즈 소재로 하고, 이 카드는 그 발동한 효과를 받지 않는다.<br />③: 자신 / 상대의 엔드 페이즈에 발동할 수 있다. 이 카드가 엑시즈 소재로 하고 있는 마법 카드 1장을 자신 필드에 세트한다.
  | tc_name            = 漆梏之喰獸 凱爾澤布斯
  | tc_text            = 等級7怪獸×2隻以上<br />此卡名的③效果1回合僅可使用1次。<br />①：此卡的攻擊力上升此卡的超量素材數量×700的數值。<br />②：通常・速攻魔法卡發動時可以發動（同一連鎖上最多1次）。將場上的該卡作為表側表示的此卡的超量素材，此卡不受該發動的效果影響。<br />③：在自己・對手的結束階段可以發動。將此卡所持有的超量素材中的1張魔法卡放置在自己場上。
  | sc_name            = 漆梏之喰兽 凯尔泽布斯
  | sc_text            = 等级7怪兽×2只以上<br />此卡名的③效果1回合仅可使用1次。<br />①：此卡的攻击力上升此卡的超量素材数量×700的数值。<br />②：通常・速攻魔法卡发动时可以发动（同一连锁上最多1次）。将场上的该卡作为表侧表示的此卡的超量素材，此卡不受该发动的效果影响。<br />③：在自己・对手的结束阶段可以发动。将此卡所持有的超量素材中的1张魔法卡放置在自己场上。
