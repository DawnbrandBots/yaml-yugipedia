title: Dogmatika Lawbringer (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | attribute          = LIGHT
  | types              = Spellcaster / Effect
  | level              = 8
  | atk                = 2000
  | def                = 2000
  | text               = If a monster Special Summoned from the Extra Deck is on the field and this card is in your hand: You can Special Summon this card. If this card is Special Summoned from the hand: You can have each player send 1 monster from their Extra Deck to the GY. If this card is sent to the GY: You can target 1 "Dogmatika" card in your GY, except "Dogmatika Lawbringer"; add it to your hand. You can only use each effect of "Dogmatika Lawbringer" once per turn.

  | fr_name            = Porte-Loi Dogmatika
  | fr_text            = Si un monstre Invoqué Spécialement depuis l'Extra Deck est sur le Terrain et que cette carte est dans votre main : vous pouvez Invoquer Spécialement cette carte. Si cette carte est Invoquée Spécialement depuis la main : vous pouvez faire envoyer à chaque joueur 1 monstre depuis son Extra Deck au Cimetière. Si cette carte est envoyée au Cimetière : vous pouvez cibler 1 carte "Dogmatika" ("Porte-Loi Dogmatika" exclu) dans votre Cimetière ; ajoutez-la à votre main. Vous ne pouvez utiliser chaque effet de "Porte-Loi Dogmatika" qu'une fois par tour.
  | de_name            = Dogmatika Gesetzesbringer
  | de_text            = Falls ein als Spezialbeschwörung vom Extra Deck beschworenes Monster auf dem Spielfeld liegt und sich diese Karte in deiner Hand befindet: Du kannst diese Karte als Spezialbeschwörung beschwören. Falls diese Karte als Spezialbeschwörung von der Hand beschworen wird: Du kannst jeden Spieler 1 Monster von seinem Extra Deck auf den Friedhof legen lassen. Falls diese Karte auf den Friedhof gelegt wird: Du kannst 1 „Dogmatika“-Karte in deinem Friedhof wählen, außer „Dogmatika Gesetzesbringer“; füge sie deiner Hand hinzu. Du kannst jeden Effekt von „Dogmatika Gesetzesbringer“ nur einmal pro Spielzug verwenden.
  | it_name            = Dogmatika Giustiziere
  | it_text            = Se un mostro Evocato Specialmente dall'Extra Deck è sul Terreno e questa carta è nella tua mano: puoi Evocare Specialmente questa carta. Se questa carta viene Evocata Specialmente dalla mano: puoi far mandare a ogni giocatore 1 mostro dal suo Extra Deck al Cimitero. Se questa carta viene mandata al Cimitero: puoi scegliere come bersaglio 1 carta "Dogmatika" nel tuo Cimitero, eccetto "Dogmatika Giustiziere"; aggiungila alla tua mano. Puoi utilizzare ogni effetto di "Dogmatika Giustiziere" una sola volta per turno.
  | pt_name            = Portador da Lei Dogmatika
  | pt_text            = Se um monstro Invocado por Invocação-Especial do Deck Adicional estiver no campo e este card estiver na sua mão: você pode Invocar este card por Invocação-Especial. Se este card for Invocado por Invocação-Especial da mão: você pode fazer com que cada duelista envie 1 monstro do Deck Adicional dele para o Cemitério. Se este card for enviado para o Cemitério: você pode escolher 1 card "Dogmatika" no seu Cemitério, exceto "Portador da Lei Dogmatika"; adicione-o à sua mão. Você só pode usar cada efeito de "Portador da Lei Dogmatika" uma vez por turno.
  | es_name            = Portador de Ley Dogmátik
  | es_text            = Si un monstruo Invocado de Modo Especial desde el Deck Extra está en el Campo y esta carta está en tu mano: puedes Invocar esta carta de Modo Especial. Si esta carta es Invocada de Modo Especial desde la mano: puedes hacer que cada jugador mande al Cementerio 1 monstruo en su Deck Extra. Si esta carta es mandada al Cementerio: puedes seleccionar 1 carta "Dogmátik" en tu Cementerio, excepto "Portador de Ley Dogmátik"; añádela a tu mano. Sólo puedes usar cada efecto de "Portador de Ley Dogmátik" una vez por turno.
  | ja_text            = このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードが手札に存在し、ＥＸデッキから特殊召喚されたモンスターがフィールドに存在する場合に発動できる。このカードを特殊召喚する。<br />②：このカードが手札から特殊召喚した場合に発動できる。お互いはそれぞれ自身のＥＸデッキからモンスター１体を墓地へ送る。<br />③：このカードが墓地へ送られた場合、「教導の死徒」以外の自分の墓地の「ドラグマ」カード１枚を対象として発動できる。そのカードを手札に加える。
  | ko_name            = 채플린 드래그마
  | ko_text            = 이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드가 패에 존재하고, 엑스트라 덱에서 특수 소환된 몬스터가 필드에 존재할 경우에 발동할 수 있다. 이 카드를 특수 소환한다.<br />②: 이 카드를 패에서 특수 소환했을 경우에 발동할 수 있다. 양쪽 플레이어는 각각 자신의 엑스트라 덱에서 몬스터 1장을 묘지로 보낸다.<br />③: 이 카드가 묘지로 보내졌을 경우, "채플린 드래그마" 이외의 자신 묘지의 "드래그마" 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 패에 넣는다.
  | tc_name            = 教導之死徒
  | tc_text            = 此卡名的①②③效果1回合僅可各使用1次。<br />①：此卡存在於手牌，且場上存在被從額外牌組特殊召喚的怪獸的情況下可以發動。將此卡特殊召喚。<br />②：此卡從手牌特殊召喚的情況下可以發動。雙方各從自身的額外牌組將1隻怪獸送至墓地。<br />③：此卡被送至墓地的情況下，以「教導之死徒」以外的、自己墓地的1張「教導」卡為對象可以發動。將該卡加入手牌。
  | sc_name            = 教导之死徒
  | sc_text            = 此卡名的①②③效果1回合仅可各使用1次。<br />①：此卡存在于手牌，且场上存在被从额外牌组特殊召唤的怪兽的情况下可以发动。将此卡特殊召唤。<br />②：此卡从手牌特殊召唤的情况下可以发动。双方各从自身的额外牌组将1只怪兽送至墓地。<br />③：此卡被送至墓地的情况下，以“教导之死徒”以外的、自己墓地的1张“教导”卡为对象可以发动。将该卡加入手牌。
  }}
