  | it_name   = Pashuul Sciabola-X
  | it_text   = Non può essere distrutto in battaglia. Una volta per turno, durante la Standby Phase del tuo avversario: tu subisci 1000 danni. Questa carta deve essere scoperta in Posizione di Difesa per attivare e risolvere questo effetto.
  | pt_name   = Sabre-X Pashuul
  | pt_text   = Não pode ser destruído em batalha. Uma vez por turno, durante a Fase de Apoio do seu oponente: você sofre 1000 de dano. Este card deve estar com a face para cima em Posição de Defesa para ativar e resolver este efeito.
  | es_name   = Sable-X Pashuul
  | es_text   = No puede ser destruido en batalla. Una vez por turno, durante la Standby Phase de tu adversario: tú recibes 1000 puntos de daño. Esta carta debe estar en Posición de Defensa boca arriba para activar y resolver este efecto.
  | ja_text   = ①：このカードは戦闘では破壊されない。<br />②：相手スタンバイフェイズに発動する（この効果はこのカードがモンスターゾーンに表側守備表示で存在する場合に発動と処理を行う）。自分は１０００ダメージを受ける。
  | ko_name   = X－세이버 파시울
  | ko_text   = ①: 이 카드는 전투로는 파괴되지 않는다.<br />②: 상대 스탠바이 페이즈에 발동한다. 자신은 1000 데미지를 받는다. 이 효과는 이 카드가 몬스터 존에 앞면 수비 표시로 존재할 경우에 발동과 처리를 실행한다.
  | tc_name   = X－軍刀 帕修爾
  | tc_text   = ①：此卡不會因戰鬥被破壞。<br />②：在對方準備階段發動。我方受到１０００傷害。此效果可在此卡以正面守備表示存在於怪獸區的狀況下發動及處理。
  | sc_name   = 拾－军刀 帕修尔
  | sc_text   = ①：此卡不会因战斗被破坏。<br />②：在对手的准备阶段发动。自己受到１０００点伤害。此卡以表侧守备表示存在于怪兽区域的场合，此效果才能进行发动与处理。
