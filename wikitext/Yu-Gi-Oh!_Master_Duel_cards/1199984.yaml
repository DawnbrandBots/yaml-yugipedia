title: Shipping Archfiend (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | attribute          = WIND
  | types              = Fiend / Tuner / Effect
  | level              = 3
  | atk                = 0
  | def                = 0
  | text               = You can target any number of face-up monsters on the field, and declare 1 Type or Attribute; they become that Type or Attribute. If a monster(s) is Special Summoned to your opponent's field, while this card is in your Monster Zone (except during the Damage Step): You can target 1 monster on each field with the same Type and Attribute from each other; return them to the hand. You can only use each effect of "Shipping Archfiend" once per turn.

  | fr_name            = Archdémon de la Romance
  | fr_text            = Vous pouvez cibler un nombre de votre choix de monstres face recto sur le Terrain, et déclarez 1 Type ou Attribut ; ils deviennent ce Type ou Attribut. Si un ou plusieurs monstres sont Invoqués Spécialement sur le Terrain de votre adversaire, tant que cette carte est dans votre Zone Monstre (sauf durant la Damage Step) : vous pouvez cibler 1 monstre sur chaque Terrain qui ont chacun le même Type et Attribut ; renvoyez-les à la main. Vous ne pouvez utiliser chaque effet de "Archdémon de la Romance" qu'une fois par tour.
  | de_name            = Shipping-Erzunterweltlerin
  | de_text            = Du kannst eine beliebige Anzahl offene Monster auf dem Spielfeld wählen und 1 Typ oder Eigenschaft deklarieren; sie werden zu jenem Typ oder jener Eigenschaft. Falls ein oder mehr Monster als Spezialbeschwörung auf die Spielfeldseite deines Gegners beschworen werden, solange diese Karte in deiner Monsterzone liegt (außer während des Damage Steps): Du kannst 1 Monster auf jeder Spielfeldseite wählen, die beide denselben Typ und dieselbe Eigenschaft haben; gib sie auf die Hand zurück. Du kannst jeden Effekt von „Shipping-Erzunterweltlerin“ nur einmal pro Spielzug verwenden.
  | it_name            = Arcidemone Shipper
  | it_text            = Puoi scegliere come bersaglio un qualsiasi numero di mostri scoperti sul Terreno, e dichiarare 1 Tipo o Attributo; essi diventano di quel Tipo o Attributo. Se uno o più mostri vengono Evocati Specialmente sul Terreno del tuo avversario, mentre questa carta è nella tua Zona Mostri (eccetto durante il Damage Step): puoi scegliere come bersaglio 1 mostro su ogni Terreno con lo stesso Tipo e Attributo l'uno dell'altro; falli ritornare nella mano. Puoi utilizzare ogni effetto di "Arcidemone Shipper" una sola volta per turno.
  | pt_name            = Arquidemônio Shippador
  | pt_text            = Você pode escolher qualquer número de monstros com a face para cima no campo e declarar 1 Tipo ou Atributo; eles se tornam desse Tipo ou Atributo. Se um ou mais monstros forem Invocados por Invocação-Especial no campo do seu oponente, enquanto este card estiver na sua Zona de Monstros (exceto durante a Etapa de Dano): você pode escolher 1 monstro em cada campo com o mesmo Tipo e Atributo um do outro; devolva-os para a mão. Você só pode usar cada efeito de "Arquidemônio Shippador" uma vez por turno.
  | es_name            = Archidemonio de Emparejamientos
  | es_text            = Puedes seleccionar cualquier número de monstruos boca arriba en el Campo, y declarar 1 Tipo o Atributo; se convierten en ese Tipo o Atributo. Si uno o más monstruos son Invocados de Modo Especial al Campo de tu adversario, mientras esta carta está en tu Zona de Monstruos (excepto durante el Damage Step): puedes seleccionar 1 monstruo en cada Campo con el mismo Tipo y Atributo entre sí; devuélvelos a la mano. Sólo puedes usar cada efecto de "Archidemonio de Emparejamientos" una vez por turno.
  | ja_text            = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：フィールドの表側表示モンスターを任意の数だけ対象とし、種族か属性を１つ宣言して発動できる。そのモンスターを宣言した種族か属性にする。<br />②：このカードがモンスターゾーンに存在する状態で、相手フィールドにモンスターが特殊召喚された場合、自分及び相手フィールドの種族と属性が同じモンスターを１体ずつ対象として発動できる。そのモンスターを手札に戻す。
  | ko_name            = 커플링 데몬
  | ko_text            = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 필드의 앞면 표시 몬스터를 임의의 수만큼 대상으로 하고, 종족이나 속성을 1개 선언하여 발동할 수 있다. 그 몬스터를 선언한 종족이나 속성으로 한다.<br />②: 이 카드가 몬스터 존에 존재하는 상태에서, 상대 필드에 몬스터가 특수 소환되었을 경우, 자신 및 상대 필드의 종족과 속성이 같은 몬스터를 1장씩 대상으로 하고 발동할 수 있다. 그 몬스터를 패로 되돌린다.
  | tc_name            = 配對惡魔
  | tc_text            = 此卡名的①②效果1回合僅可各使用1次。<br />①：以任意數量的場上的表側表示怪獸為對象，宣言1個種族或屬性可以發動。將該怪獸改成宣言的種族或種族。<br />②：此卡存在於怪獸區域的狀態下，有怪獸被特殊召喚至對手場上的情況下，以自己及對手場上的、種族和屬性相同的怪獸各1隻為對象可以發動。將該怪獸放回手牌。
  | sc_name            = 配对恶魔
  | sc_text            = 此卡名的①②效果1回合仅可各使用1次。<br />①：以任意数量的场上的表侧表示怪兽为对象，宣言1个种族或属性可以发动。将该怪兽改成宣言的种族或属性。<br />②：此卡存在于怪兽区域的状态下，有怪兽被特殊召唤至对手场上的情况下，以自己及对手场上的、种族和属性相同的怪兽各1只为对象可以发动。将该怪兽放回手牌。
  }}
