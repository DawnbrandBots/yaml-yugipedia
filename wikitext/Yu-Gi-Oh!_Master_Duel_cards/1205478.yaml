title: Teller of Fairy Tails (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = UR
  | attribute          = EARTH
  | types              = Spellcaster / Fusion / Effect
  | level              = 4
  | atk                = 1850
  | def                = 1000
  | text               = 1 LIGHT "Fairy Tail" monster + 1 Spellcaster monster<br />"Fairy Tail" monsters you control cannot be destroyed by battle. You can only use each of the following effects of "Teller of Fairy Tails" once per turn. If this card is Fusion Summoned using "Prince of Fairies" as material: You can destroy as many cards your opponent controls as possible, and if you do, inflict 500 damage to your opponent for each card destroyed. When your opponent activates a card or effect (Quick Effect): You can banish 1 "Fairy Tail" card from your hand or GY; negate the activation, and if you do, destroy that card.

  | fr_name            = Conteuse de l'Animal Féérique
  | fr_text            = 1 monstre "Animal Féérique" LUMIÈRE + 1 monstre Magicien<br />Les monstres "Animal Féérique" que vous contrôlez ne peuvent pas être détruits au combat. Vous ne pouvez utiliser chacun des effets suivants de "Conteuse de l'Animal Féérique" qu'une fois par tour. Si cette carte est Invoquée par Fusion en utilisant "Prince des Fées" comme Matériel : vous pouvez détruire autant de cartes contrôlées par votre adversaire que possible, et si vous le faites, infligez 500 points de dommages à votre adversaire pour chaque carte détruite. Lorsque votre adversaire active une carte ou un effet (Effet Rapide) : vous pouvez bannir 1 carte "Animal Féérique" depuis votre main ou Cimetière ; annulez l'activation, et si vous le faites, détruisez la carte.
  | de_name            = Erzählerin der Märchenschweife
  | de_text            = 1 LICHT „Märchenschweif“-Monster + 1 Hexer-Monster<br />„Märchenschweif“-Monster, die du kontrollierst, können nicht durch Kampf zerstört werden. Du kannst jeden der folgenden Effekte von „Erzählerin der Märchenschweife“ nur einmal pro Spielzug verwenden. Falls diese Karte als Fusionsbeschwörung beschworen wird, indem „Prinz der Feen“ als Material verwendet wird: Du kannst so viele Karten, die dein Gegner kontrolliert, wie möglich zerstören und falls du dies tust, füge deinem Gegner für jede zerstörte Karte 500 Schaden zu. Wenn dein Gegner eine Karte oder einen Effekt aktiviert (Schnelleffekt): Du kannst 1 „Märchenschweif“-Karte von deiner Hand oder deinem Friedhof verbannen; annulliere die Aktivierung und falls du dies tust, zerstöre jene Karte.
  | it_name            = Narratrice di Codafavola
  | it_text            = 1 mostro LUCE "Codafavola" + 1 mostro Incantatore<br />I mostri "Codafavola" che controlli non possono essere distrutti in battaglia. Puoi utilizzare ognuno dei seguenti effetti di "Narratrice di Codafavola" una sola volta per turno. Se questa carta viene Evocata tramite Fusione utilizzando "Principe delle Fate" come materiale: puoi distruggere tante carte controllate dal tuo avversario quante possibile e, se lo fai, infliggi 500 danni al tuo avversario per ogni carta distrutta. Quando il tuo avversario attiva una carta o un effetto (Effetto Rapido): puoi bandire 1 carta "Codafavola" dalla tua mano o Cimitero; annulla l'attivazione e, se lo fai, distruggi quella carta.
  | pt_name            = Contadora de Cauda de Fadas
  | pt_text            = 1 monstro "Cauda de Fadas" de LUZ + 1 monstro Mago<br />Monstros "Cauda de Fadas" que você controla não podem ser destruídos em batalha. Você só pode usar cada um dos seguintes efeitos de "Contadora de Cauda de Fadas" uma vez por turno. Se este card for Invocado por Invocação-Fusão usando "Príncipe das Fadas" como matéria: você pode destruir tantos cards que seu oponente controla quanto possível e, se isso acontecer, cause 500 de dano ao seu oponente para cada card destruído. Quando seu oponente ativar um card ou efeito (Efeito Rápido): você pode banir 1 card "Cauda de Fadas" da sua mão ou do Cemitério; negue a ativação e, se isso acontecer, destrua esse card.
  | es_name            = Cuentacuentos de Colacuentos
  | es_text            = 1 monstruo "Colacuento" de LUZ + 1 monstruo Lanzador de Conjuros<br />Los monstruos "Colacuento" que controlas no pueden ser destruidos en batalla. Sólo puedes usar cada uno de los siguientes efectos de "Cuentacuentos de Colacuentos" una vez por turno. Si esta carta es Invocada por Fusión usando "Príncipe de las Hadas" como material: puedes destruir tantas cartas que controle tu adversario como sea posible y, si lo haces, inflige 500 puntos de daño a tu adversario por cada carta destruida. Cuando tu adversario activa una carta o efecto (Efecto Rápido): puedes desterrar 1 carta "Colacuento" en tu mano o Cementerio; niega la activación y, si lo haces, destruye esa carta.
  | ja_text            = 光属性の「妖精伝姫」モンスター＋魔法使い族モンスター<br />このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードが「妖精の王子様」を素材として融合召喚した場合に発動できる。相手フィールドのカードを全て破壊し、破壊した数×５００ダメージを相手に与える。<br />②：自分の「妖精伝姫」モンスターは戦闘では破壊されない。<br />③：相手が魔法・罠・モンスターの効果を発動した時、自分の手札・墓地から「妖精伝姫」カード１枚を除外して発動できる。その発動を無効にし破壊する。
  | ko_name            = 페어리테일을 이야기하는 자
  | ko_text            = 빛 속성의 "페어리테일" 몬스터 ＋ 마법사족 몬스터<br />이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 "요정의 왕자님"을 소재로서 융합 소환했을 경우에 발동할 수 있다. 상대 필드의 카드를 전부 파괴하고, 파괴한 수 × 500 데미지를 상대에게 준다.<br />②: 자신의 "페어리테일" 몬스터는 전투로는 파괴되지 않는다.<br />③: 상대가 마법 / 함정 / 몬스터의 효과를 발동했을 때, 자신의 패 / 묘지에서 "페어리테일" 카드 1장을 제외하고 발동할 수 있다. 그 발동을 무효로 하고 파괴한다.
  | tc_name            = 講述妖精傳姬之人
  | tc_text            = 光屬性「妖精傳姬」怪獸＋魔法使族怪獸<br />此卡名的①③效果1回合僅可各使用1次。<br />①：此卡以「妖精的王子大人」作為素材融合召喚的情況下可以發動。將對手場上的卡全部破壞，給予對手所破壞的數量×500的傷害。<br />②：自己的「妖精傳姬」怪獸不會因戰鬥被破壞。<br />③：對手發動魔法・陷阱・怪獸的效果時，從自己手牌・墓地將1張「妖精傳姬」卡除外可以發動。將該發動無效並破壞。
  | sc_name            = 讲述妖精传姬之人
  | sc_text            = 光属性“妖精传姬”怪兽＋魔法师族怪兽<br />此卡名的①③效果1回合仅可各使用1次。<br />①：此卡以“妖精的王子大人”作为素材融合召唤的情况下可以发动。将对手场上的卡全部破坏，给予对手所破坏的数量×500的伤害。<br />②：自己的“妖精传姬”怪兽不会因战斗被破坏。<br />③：对手发动魔法・陷阱・怪兽的效果时，从自己手牌・墓地将1张“妖精传姬”卡除外可以发动。将该发动无效并破坏。
  }}
