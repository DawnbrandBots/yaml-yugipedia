title: R.B. Stage Landing (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = SR
  | card_type          = Spell
  | property           = Normal
  | text               = Special Summon 1 "R.B." monster from your Deck/Extra Deck with a different name than the cards you control. If an "R.B." monster(s) you control would be destroyed by battle or card effect, you can banish this card from your GY instead. You cannot Special Summon from the Extra Deck the turn you activate this card, except Machine monsters with 1500 or less original ATK.

  | fr_name            = Débarquement sur Scène R.B.
  | fr_text            = Invoquez Spécialement 1 monstre "R.B." depuis votre Deck/Extra Deck de nom différent des cartes que vous contrôlez. Si un ou plusieurs monstres "R.B." que vous contrôlez vont être détruits au combat ou par un effet de carte, vous pouvez bannir cette carte depuis votre Cimetière à la place. Vous ne pouvez pas Invoquer Spécialement (monstres Machine avec max. 1500 ATK d'origine exclus) depuis l'Extra Deck le tour où vous activez cette carte.
  | de_name            = R.B.-Bühnenlandung
  | de_text            = Beschwöre 1 „R.B.“-Monster mit einem unterschiedlichen Namen als die Karten, die du kontrollierst, als Spezialbeschwörung von deinem Deck / Extra Deck. Falls ein oder mehr „R.B.“-Monster, die du kontrollierst, durch Kampf oder einen Karteneffekt zerstört würden, kannst du stattdessen diese Karte von deinem Friedhof verbannen. Du kannst in dem Spielzug, in dem du diese Karte aktivierst, keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Maschine-Monstern mit 1500 oder weniger Grund-ATK.
  | it_name            = Atterraggio sulla Scena R.B.
  | it_text            = Evoca Specialmente dal tuo Deck/Extra Deck 1 mostro "R.B." con un nome diverso dalle carte che controlli. Se uno o più mostri "R.B." che controlli stanno per essere distrutti in battaglia o dall'effetto di una carta, puoi invece bandire questa carta dal tuo Cimitero. Non puoi Evocare Specialmente dall'Extra Deck nel turno in cui attivi questa carta, eccetto mostri Macchina con ATK originale 1500 o inferiore.
  | pt_name            = Plataforma de Aterrissagem R.B.
  | pt_text            = Invoque por Invocação-Especial 1 monstro "R.B." do seu Deck/Deck Adicional com um nome diferente que o dos cards que você controla. Se um ou mais monstros "R.B." que você controla seriam destruídos em batalha ou por um efeito de card, em vez disso, você pode banir este card do seu Cemitério. Você não pode Invocar por Invocação-Especial do Deck Adicional no turno em que ativar este card, exceto monstros Máquina com 1500 ou menos de ATK original.
  | es_name            = R.B. Aterrizaje en Escena
  | es_text            = Invoca de Modo Especial, desde tu Deck/Deck Extra, 1 monstruo "R.B." con un nombre diferente al de las cartas que controlas. Si uno o más monstruos "R.B." que controlas fueran a ser destruidos en batalla o por el efecto de una carta, puedes desterrar esta carta en tu Cementerio en su lugar. No puedes Invocar de Modo Especial desde el Deck Extra el turno en el que activas esta carta, excepto monstruos Máquina con 1500 ATK original o menos.
  | ja_text            = このカードを発動するターン、自分は元々の攻撃力が１５００以下の機械族モンスターしかＥＸデッキから特殊召喚できない。<br />①：同名カードが自分フィールドに存在しない「Ｒ．Ｂ．」モンスター１体をデッキ・ＥＸデッキから特殊召喚する。<br />②：自分フィールドの「Ｒ．Ｂ．」モンスターが戦闘・効果で破壊される場合、代わりに墓地のこのカードを除外できる。
  | ko_name            = R.B.점프 넘버
  | ko_text            = 이 카드를 발동하는 턴에, 자신은 원래 공격력이 1500 이하의 기계족 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다.<br />①: 같은 이름의 카드가 자신 필드에 존재하지 않는 "R.B.(리볼봇)" 몬스터 1장을 덱 / 엑스트라 덱에서 특수 소환한다.<br />②: 자신 필드의 "R.B.(리볼봇)" 몬스터가 전투 / 효과로 파괴될 경우, 대신에 묘지의 이 카드를 제외할 수 있다.
  | tc_name            = R.B.跳躍數字
  | tc_text            = 發動此卡的回合中，自己從額外牌組僅可特殊召喚攻擊力1500以下的機械族怪獸。<br />①：從牌組・額外牌組將自己場上不存在同名卡的1隻「R.B.」怪獸特殊召喚。<br />②：自己場上的「R.B.」怪獸將被戰鬥・效果破壞的情況下，作為代替可將墓地的此卡除外。
  | sc_name            = R.B.跳跃数字
  | sc_text            = 发动此卡的回合中，自己从额外牌组仅可特殊召唤攻击力1500以下的机械族怪兽。<br />①：从牌组・额外牌组将自己场上不存在同名卡的1只“R.B.”怪兽特殊召唤。<br />②：自己场上的“R.B.”怪兽将被战斗・效果破坏的情况下，作为代替可将墓地的此卡除外。
  }}
