title: Superdreadnought Rail Cannon Gustav Rocket (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = UR
  | attribute          = EARTH
  | types              = Machine / Xyz / Effect
  | rank               = 10
  | atk                = 5000
  | def                = 3000
  | text               = 3 Level 10 monsters<br />Once per turn, you can also Xyz Summon "Superdreadnought Rail Cannon Gustav Rocket" by discarding 1 card and using 1 "Superdreadnought Rail Cannon Gustav Max" you control (transfer its materials). When your opponent activates a monster effect, while this card has material (Quick Effect): You can negate that effect, and if you do, destroy that card, then inflict 1000 damage to your opponent. You can only use this effect of "Superdreadnought Rail Cannon Gustav Rocket" once per turn. Once per turn, during your End Phase: Detach 1 material from this card or destroy this card.

  | fr_name            = Super Cuirassé Canon Ferroviaire Roquette
  | fr_text            = 3 monstres de Niveau 10<br />Une fois par tour, vous pouvez aussi Invoquer par Xyz "Super Cuirassé Canon Ferroviaire Roquette" en défaussant 1 carte et en utilisant 1 "Super Cuirassé Canon Ferroviaire" que vous contrôlez (transférez ses Matériels). Lorsque votre adversaire active un effet de monstre, tant que cette carte a du Matériel (Effet Rapide) : vous pouvez annuler l'effet, et si vous le faites, détruisez la carte, puis infligez 1000 points de dommages à votre adversaire. Vous ne pouvez utiliser cet effet de "Super Cuirassé Canon Ferroviaire Roquette" qu'une fois par tour. Une fois par tour, durant votre End Phase : détachez 1 Matériel de cette carte ou détruisez cette carte.
  | de_name            = Superkanonen-Panzerzug Rakete
  | de_text            = 3 Monster der Stufe 10<br />Einmal pro Spielzug kannst du „Superkanonen-Panzerzug Rakete“ auch als Xyz-Beschwörung beschwören, indem du 1 Karte abwirfst und 1 „Superkanonen-Panzerzug“ verwendest, den du kontrollierst (transferiere sein Material). Wenn dein Gegner einen Monstereffekt aktiviert, solange diese Karte Material hat (Schnelleffekt): Du kannst jenen Effekt annullieren und falls du dies tust, zerstöre jene Karte, dann füge deinem Gegner 1000 Schaden zu. Du kannst diesen Effekt von „Superkanonen-Panzerzug Rakete“ nur einmal pro Spielzug verwenden. Einmal pro Spielzug, während deiner End Phase: Hänge 1 Material von dieser Karte ab oder zerstöre diese Karte.
  | it_name            = Cannone Ferroviario Supercorazzato Razzo
  | it_text            = 3 mostri di Livello 10<br />Una volta per turno, puoi anche Evocare Xyz "Cannone Ferroviario Supercorazzato Razzo" scartando 1 carta e utilizzando 1 "Cannone Ferroviario Supercorazzato" che controlli (trasferisci i suoi materiali). Quando il tuo avversario attiva l'effetto di un mostro, mentre questa carta ha materiale (Effetto Rapido): puoi annullare quell'effetto e, se lo fai, distruggi quella carta, poi infliggi 1000 danni al tuo avversario. Puoi utilizzare questo effetto di "Cannone Ferroviario Supercorazzato Razzo" una sola volta per turno. Una volta per turno, durante la tua End Phase: stacca 1 materiale da questa carta o distruggi questa carta.
  | pt_name            = Supercouraçado Canhão de Trilho Foguete
  | pt_text            = 3 monstros de Nível 10<br />Uma vez por turno, você também pode Invocar por Invocação-Xyz "Supercouraçado Canhão de Trilho Foguete" ao descartar 1 card e usar 1 "Supercouraçado Canhão de Trilho" que você controla (transfira as matérias dele). Quando seu oponente ativar um efeito de monstro, enquanto este card tiver matéria (Efeito Rápido): você pode negar esse efeito e, se isso acontecer, destrua esse card e, depois, cause 1000 de dano ao seu oponente. Você só pode usar este efeito de "Supercouraçado Canhão de Trilho Foguete" uma vez por turno. Uma vez por turno, durante sua Fase Final: desassocie 1 matéria deste card ou destrua este card.
  | es_name            = Supercañón de Rieles Acorazado Cohete
  | es_text            = 3 monstruos de Nivel 10<br />Una vez por turno, también puedes Invocar Xyz "Supercañón de Rieles Acorazado Cohete" descartando 1 carta y usando 1 "Supercañón de Rieles Acorazado" que controles (transfiere sus materiales). Cuando tu adversario activa un efecto de monstruo, mientras esta carta tiene material (Efecto Rápido): puedes negar ese efecto y, si lo haces, destruye esa carta, y después inflige 1000 puntos de daño a tu adversario. Sólo puedes usar este efecto de "Supercañón de Rieles Acorazado Cohete" una vez por turno. Una vez por turno, durante tu End Phase: desacopla 1 material de esta carta o destruye esta carta.
  | ja_text            = レベル１０モンスター×３<br />「超弩級砲塔列車グスタフ・ロケット」は１ターンに１度、手札を１枚捨て、自分フィールドの「超弩級砲塔列車グスタフ・マックス」の上に重ねてＸ召喚する事もできる。<br />このカード名の①の効果は１ターンに１度しか使用できない。<br />①：このカードがＸ素材を持ち、相手がモンスターの効果を発動した時に発動できる。その効果を無効にし破壊する。その後、相手に１０００ダメージを与える。<br />②：自分エンドフェイズに発動する。このカードのＸ素材を１つ取り除くか、このカードを破壊する。
  | ko_name            = 초노급포탑열차 구스타프 로켓
  | ko_text            = 레벨 10 몬스터 × 3<br />"초노급포탑열차 구스타프 로켓"은 1턴에 1번, 패를 1장 버리고, 자신 필드의 "초노급포탑열차 구스타프 맥스" 위에 겹쳐 엑시즈 소환할 수도 있다.<br />이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드가 엑시즈 소재를 가지고, 상대가 몬스터의 효과를 발동했을 때에 발동할 수 있다. 그 효과를 무효로 하고 파괴한다. 그 후, 상대에게 1000 데미지를 준다.<br />②: 자신 엔드 페이즈에 발동한다. 이 카드의 엑시즈 소재를 1개 제거하거나, 이 카드를 파괴한다.
  | tc_name            = 超重型砲塔列車 古斯塔夫火箭砲
  | tc_text            = 等級10怪獸×3<br />「超重型砲塔列車 古斯塔夫火箭砲」1回合1次，也可透過捨棄1張手牌，重疊在自己場上的「超重型砲塔列車 古斯塔夫超大砲」上面來超量召喚。<br />此卡名的①效果1回合僅可使用1次。<br />①：此卡持有超量素材，且對手發動怪獸的效果時可以發動。將該效果無效並破壞。然後，給予對手1000傷害。<br />②：在自己的結束階段發動。去除此卡的1個超量素材，或破壞此卡。
  | sc_name            = 超重型炮塔列车 古斯塔夫火箭炮
  | sc_text            = 等级10怪兽×3<br />“超重型炮塔列车 古斯塔夫火箭炮”1回合1次，也可通过舍弃1张手牌，重叠在自己场上的“超重型炮塔列车 古斯塔夫超大炮”上面来超量召唤。<br />此卡名的①效果1回合仅可使用1次。<br />①：此卡持有超量素材，且对手发动怪兽的效果时可以发动。将该效果无效并破坏。然后，给予对手1000伤害。<br />②：在自己的结束阶段发动。去除此卡的1个超量素材，或破坏此卡。
