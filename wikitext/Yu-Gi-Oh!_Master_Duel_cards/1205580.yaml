title: Baneshade (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | card_type          = Trap
  | property           = Normal
  | text               = Target 1 face-up card your opponent controls; apply this effect based on the number of cards in their GY with that face-up card's name.<br />●1: Destroy it.<br />●2: Banish it.<br />●3+: Banish it, also all cards with that name from your opponent's field and GY (face-down).
  | releases           = 
  Legacy Pack; July 9, 2026

  | fr_name            = Ombre du Fléau
  | fr_text            = Ciblez 1 carte face recto contrôlée par votre adversaire ; appliquez cet effet, selon le nombre de cartes dans son Cimetière du nom de la carte face recto.<br />●1 : Détruisez-la.<br />●2 : Bannissez-la.<br />●3+ : Bannissez-la (face verso) ainsi que toutes les cartes de ce nom depuis le Terrain et Cimetière de votre adversaire.
  | de_name            = Schattenbann
  | de_text            = Wähle 1 offene Karte, die dein Gegner kontrolliert; führe diesen Effekt aus, basierend auf der Anzahl der Karten mit dem Namen jener offenen Karte in seinem Friedhof.<br />●1: Zerstöre sie.<br />●2: Verbanne sie.<br />●3+: Verbanne sie, zusätzlich alle Karten mit jenem Namen von der Spielfeldseite und dem Friedhof deines Gegners (verdeckt).
  | it_name            = Ombrarovina
  | it_text            = Scegli come bersaglio 1 carta scoperta controllata dal tuo avversario; applica questo effetto a seconda del numero di carte nel suo Cimitero con il nome di quella carta scoperta.<br />●1: Distruggila.<br />●2: Bandiscila.<br />●3+: Bandiscila, inoltre bandisci tutte le carte con quel nome dal Terreno e Cimitero del tuo avversario (coperte).
  | pt_name            = Sombra Maldita
  | pt_text            = Escolha 1 card com a face para cima que seu oponente controla; aplique este efeito de acordo com o número de cards no Cemitério dele com o nome desse card com a face para cima.<br />●1: Destrua-o.<br />●2: Bana-o.<br />●3+: Bana-o, além de todos os cards com esse nome do campo e Cemitério do seu oponente (com a face para baixo).
  | es_name            = Sombrición
  | es_text            = Selecciona 1 carta boca arriba que controle tu adversario; aplica este efecto basado en el número de cartas en su Cementerio con el nombre de esa carta boca arriba.<br />●1: Destrúyela.<br />●2: Destiérrala.<br />●3+: Destiérrala, y además todas las cartas con ese nombre en el Campo y Cementerio de tu adversario (boca abajo).
  | ja_text            = ①：相手フィールドの表側表示カード１枚を対象として発動できる。カード名がそのカードと同じ相手の墓地のカードの数によって以下の効果を適用する。<br />●１枚：対象のカードを破壊する。<br />●２枚：対象のカードを除外する。<br />●３枚以上：対象のカード及びその同名カードを相手のフィールド・墓地から全て裏側で除外する。
  | ko_name            = 그림자의 재앙
  | ko_text            = ①: 상대 필드의 앞면 표시 카드 1장을 대상으로 하고 발동할 수 있다. 카드명이 그 카드와 같은 상대 묘지의 카드의 수에 따라 이하의 효과를 적용한다.<br />●1장: 대상의 카드를 파괴한다.<br />●2장: 대상의 카드를 제외한다.<br />●3장 이상: 대상의 카드 및 그와 같은 이름의 카드를 상대의 필드 / 묘지에서 전부 뒷면으로 제외한다.
  | tc_name            = 影之災禍
  | tc_text            = ①：以對手場上的1張表側表示卡為對象可以發動。根據卡名與該卡相同的對手墓地的卡的數量適用以下效果。<br />●1張：將對象卡破壞。<br />●2張：將對象卡除外。<br />●3張：從對手場上・墓地將對象卡及其同名卡全部以裡側除外。
  | sc_name            = 影之灾祸
  | sc_text            = ①：以对手场上的1张表侧表示卡为对象可以发动。根据卡名与该卡相同的对手墓地的卡的数量适用以下效果。<br />●1张：将对象卡破坏。<br />●2张：将对象卡除外。<br />●3张：从对手场上・墓地将对象卡及其同名卡全部以里侧除外。
  }}
