title: Stellarknight Triverr (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity    = UR
  | attribute = LIGHT
  | types     = Warrior / Xyz / Effect
  | rank      = 4
  | atk       = 2100
  | def       = 2500
  | text      = 3 Level 4 "tellarknight" monsters<br />During the turn you Xyz Summon this card, you cannot Special Summon, except "tellarknight" monsters. If this card is Xyz Summoned: Return all other cards on the field to the hand. Once per turn: You can detach 1 material from this card; send 1 random card from your opponent's hand to the GY. If this card with material is sent to the GY: You can target 1 "tellarknight" monster in your GY; Special Summon it.

  | fr_name   = Stellchevalier Triwinter
  | fr_text   = 3 monstres "tellchevalier" de Niveau 4<br />Durant le tour où vous Invoquez par Xyz cette carte, vous ne pouvez pas Invoquer Spécialement (monstres "tellchevalier" exclus). Si cette carte est Invoquée par Xyz : renvoyez toutes les autres cartes sur le Terrain à la main. Une fois par tour : vous pouvez détacher 1 Matériel de cette carte ; envoyez 1 carte au hasard depuis la main de votre adversaire au Cimetière. Si cette carte avec du Matériel est envoyée au Cimetière : vous pouvez cibler 1 monstre "tellchevalier" dans votre Cimetière ; Invoquez-le Spécialement.
  | de_name   = Wandelsternritter Triverr
  | de_text   = 3 „Sternritter“-Monster der Stufe 4<br />Während des Spielzugs, in dem du diese Karte als Xyz-Beschwörung beschwörst, kannst du keine Spezialbeschwörungen durchführen, außer von „Sternritter“-Monstern. Falls diese Karte als Xyz-Beschwörung beschworen wird: Gib alle anderen Karten vom Spielfeld auf die Hand zurück. Einmal pro Spielzug: Du kannst 1 Material von dieser Karte abhängen; lege 1 zufällige Karte von der Hand deines Gegners auf den Friedhof. Falls diese Karte mit Material auf den Friedhof gelegt wird: Du kannst 1 „Sternritter“-Monster in deinem Friedhof wählen; beschwöre es als Spezialbeschwörung.
  | it_name   = Stellcavaliere Triverr
  | it_text   = 3 mostri "tellcavaliere" di Livello 4<br />Durante il turno in cui Evochi Xyz questa carta, non puoi Evocare Specialmente, eccetto mostri "tellcavaliere". Se questa carta viene Evocata Xyz: fai ritornare nella mano tutte le altre carte sul Terreno. Una volta per turno: puoi staccare 1 materiale da questa carta; manda al Cimitero 1 carta a caso dalla mano del tuo avversario. Se questa carta con materiale viene mandata al Cimitero: puoi scegliere come bersaglio 1 mostro "tellcavaliere" nel tuo Cimitero; Evocalo Specialmente.
  | pt_name   = Cavaleirostelar Triverr
  | pt_text   = 3 monstros "Cavaleirost" de Nível 4<br />Durante o turno em que você Invocou este card por Invocação-Xyz, você não pode Invocar por Invocação-Especial, exceto monstros "Cavaleirost". Se este card for Invocado por Invocação-Xyz: devolva todos os outros cards no campo para a mão. Uma vez por turno: você pode desassociar 1 matéria deste card; envie 1 card aleatório da mão do seu oponente para o Cemitério. Se este card com matéria for enviado para o Cemitério: você pode escolher 1 monstro "Cavaleirost" no seu Cemitério; Invoque-o por Invocação-Especial.
  | es_name   = Estelcaballero Triverno
  | es_text   = 3 monstruos "telcaballero" de Nivel 4<br />Durante el turno en el que Invocas Xyz esta carta no puedes Invocar de Modo Especial, excepto monstruos "telcaballero". Si esta carta es Invocada Xyz: devuelve a la mano todas las demás cartas en el Campo. Una vez por turno: puedes desacoplar 1 material de esta carta; manda al Cementerio 1 carta al azar en la mano de tu adversario. Si esta carta con material es mandada al Cementerio: puedes seleccionar 1 monstruo "telcaballero" en tu Cementerio; Invócalo de Modo Especial.
  | ja_text   = レベル４「テラナイト」モンスター×３<br />このカードをＸ召喚するターン、自分は「テラナイト」モンスターしか特殊召喚できない。<br />①：このカードがＸ召喚した場合に発動する。フィールドの他のカードを全て手札に戻す。<br />②：１ターンに１度、このカードのＸ素材を１つ取り除いて発動できる。相手の手札をランダムに１枚墓地へ送る。<br />③：Ｘ素材を持っているこのカードが墓地へ送られた場合、自分の墓地の「テラナイト」モンスター１体を対象として発動できる。そのモンスターを特殊召喚する。
  | ko_name   = 스테라나이트 트라이베르
  | ko_text   = 레벨 4 "테라나이트" 몬스터 × 3<br />이 카드를 엑시즈 소환하는 턴에, 자신은 "테라나이트" 몬스터밖에 특수 소환할 수 없다.<br />①: 이 카드를 엑시즈 소환했을 경우에 발동한다. 필드의 다른 카드를 전부 패로 되돌린다.<br />②: 1턴에 1번, 이 카드의 엑시즈 소재를 1개 제거하고 발동할 수 있다. 상대의 패를 무작위로 1장 묘지로 보낸다.<br />③: 엑시즈 소재를 가지고 있는 이 카드가 묘지로 보내졌을 경우, 자신 묘지의 "테라나이트" 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 특수 소환한다.
  | tc_name   = 輝星騎士 冬三角
  | tc_text   = 等級４「星騎士」怪獸×３<br />超量召喚此卡的回合，我方可特殊召喚的怪獸僅限「星騎士」怪獸。<br />①：在此卡超量召喚成功的狀況下發動。將場上的此卡以外的所有卡全部送回持有者的手牌。<br />②：１回合１次，可去除此卡的１個超量素材發動。隨機選擇對方的１張手牌送至墓地。<br />③：在擁有超量素材的此卡被送至墓地的狀況下，可將我方墓地的１隻「星騎士」怪獸做為對象發動。特殊召喚該怪獸。
  | sc_name   = 辉星骑士 特莱维尔
  | sc_text   = 等级４“星骑士”怪兽×３<br />将此卡超量召唤的回合中，自己仅可特殊召唤“星骑士”怪兽。<br />①：此卡超量召唤成功的情况下发动。将场上此卡以外的卡全部放回持有者的手牌。<br />②：１回合１次，去除此卡的１个超量素材可以发动。随机挑选１张对手的手牌送至墓地。<br />③：拥有超量素材的此卡被送至墓地的情况下，以自己墓地的１只“星骑士”怪兽为对象可以发动。将该怪兽特殊召唤。
  }}
