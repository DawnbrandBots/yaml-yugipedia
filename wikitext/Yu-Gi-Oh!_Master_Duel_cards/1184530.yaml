title: R.B. Ga10 Driller (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | attribute          = EARTH
  | types              = Machine / Effect
  | level              = 3
  | atk                = 500
  | def                = 500
  | text               = If you control no face-up monsters, or the only face-up monsters you control are "R.B." monsters, you can Special Summon this card (from your hand). You can only Special Summon "R.B. Ga10 Driller" once per turn this way. During the Main Phase, if this card is linked to an "R.B." Link Monster (Quick Effect): You can pay 500 LP, then target 1 monster your opponent controls; destroy both that monster and this card. You can only use this effect of "R.B. Ga10 Driller" once per turn.

  | fr_name            = Foreuse Ga10 R.B.
  | fr_text            = Si vous ne contrôlez aucun monstre face recto, ou que les seuls monstres face recto que vous contrôlez sont des monstres "R.B.", vous pouvez Invoquer Spécialement cette carte (depuis votre main). Vous ne pouvez Invoquer Spécialement "Foreuse Ga10 R.B." qu'une fois par tour de cette façon. Durant la Main Phase, si cette carte est liée à un Monstre Lien "R.B." (Effet Rapide) : vous pouvez payer 500 LP, puis ciblez 1 monstre contrôlé par votre adversaire ; détruisez le monstre ainsi que cette carte. Vous ne pouvez utiliser cet effet de "Foreuse Ga10 R.B." qu'une fois par tour.
  | de_name            = R.B. Ga10 Bohrer
  | de_text            = Falls du keine offenen Monster kontrollierst oder die einzigen offenen Monster, die du kontrollierst, „R.B.“-Monster sind, kannst du diese Karte als Spezialbeschwörung (von deiner Hand) beschwören. Du kannst „R.B. Ga10 Bohrer“ nur einmal pro Spielzug auf diese Art als Spezialbeschwörung beschwören. Während der Main Phase, falls diese Karte mit einem „R.B.“-Linkmonster verlinkt ist (Schnelleffekt): Du kannst 500 LP zahlen und dann 1 Monster wählen, das dein Gegner kontrolliert; zerstöre sowohl jenes Monster als auch diese Karte. Du kannst diesen Effekt von „R.B. Ga10 Bohrer“ nur einmal pro Spielzug verwenden.
  | it_name            = R.B. Ga10 Perforatore
  | it_text            = Se non controlli nessun mostro scoperto, o gli unici mostri scoperti che controlli sono mostri "R.B.", puoi Evocare Specialmente questa carta (dalla tua mano). Puoi Evocare Specialmente "R.B. Ga10 Perforatore" una sola volta per turno in questo modo. Durante la Main Phase, se questa carta è linkata a un Mostro Link "R.B." (Effetto Rapido): puoi pagare 500 LP, poi scegliere come bersaglio 1 mostro controllato dal tuo avversario; distruggi sia quel mostro che questa carta. Puoi utilizzare questo effetto di "R.B. Ga10 Perforatore" una sola volta per turno.
  | pt_name            = Perfurador R.B. Ga10
  | pt_text            = Se você não controlar nenhum monstro com a face para cima, ou os únicos monstros com a face para cima que você controla forem monstros "R.B.", você pode Invocar este card por Invocação-Especial (da sua mão). Você só pode Invocar "Perfurador R.B. Ga10" por Invocação-Especial uma vez por turno desta forma. Durante a Fase Principal, se este card estiver linkado a um Monstro Link "R.B." (Efeito Rápido): você pode pagar 500 PV e, depois, escolha 1 monstro que seu oponente controla; destrua tanto esse monstro quanto este card. Você só pode usar este efeito de "Perfurador R.B. Ga10" uma vez por turno.
  | es_name            = R.B. Ga10 Perforador
  | es_text            = Si no controlas monstruos boca arriba, o los únicos monstruos boca arriba que controlas son monstruos "R.B.", puedes Invocar esta carta de Modo Especial (desde tu mano). Sólo puedes Invocar de Modo Especial "R.B. Ga10 Perforador" una vez por turno de esta forma. Durante la Main Phase, si esta carta está enlazada a un Monstruo de Enlace "R.B." (Efecto Rápido): puedes pagar 500 LP, y después selecciona 1 monstruo que controle tu adversario; destruye ambos, ese monstruo y esta carta. Sólo puedes usar este efecto de "R.B. Ga10 Perforador" una vez por turno.
  | ja_text            = このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②の効果は１ターンに１度しか使用できない。<br />①：自分フィールドの表側表示モンスターが、存在しない場合または「Ｒ．Ｂ．」モンスターのみの場合、このカードは手札から特殊召喚できる。<br />②：自分・相手のメインフェイズに、このカードが「Ｒ．Ｂ．」Ｌモンスターとリンク状態の場合、５００ＬＰを払い、相手フィールドのモンスター１体を対象として発動できる。そのモンスターとこのカードを破壊する。
  | ko_name            = R.B.GA10 드릴러
  | ko_text            = 이 카드명의, ①의 방법에 의한 특수 소환은 1턴에 1번밖에 할 수 없으며, ②의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 필드의 앞면 표시 몬스터가, 존재하지 않을 경우 또는 "R.B.(리볼봇)" 몬스터뿐일 경우, 이 카드는 패에서 특수 소환할 수 있다.<br />②: 자신 / 상대의 메인 페이즈에, 이 카드가 "R.B.(리볼봇)" 링크 몬스터와 링크 상태일 경우, 500 LP를 지불하고, 상대 필드의 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터와 이 카드를 파괴한다.
  | tc_name            = R.B.GA10 鑽機
  | tc_text            = 此卡名以①方法的特殊召喚1回合僅可進行1次，且②效果1回合僅可使用1次。<br />①：自己場上的表側表示怪獸，不存在的情況下或僅有「R.B.」怪獸的情況下，此卡可從手牌特殊召喚。<br />②：在自己・對手的主要階段，此卡與「R.B.」連結怪獸為連結狀態的情況下，支付500LP，以對手場上的1隻怪獸為對象可以發動。將該怪獸和此卡破壞。
  | sc_name            = R.B.GA10 钻机
  | sc_text            = 此卡名以①方法的特殊召唤1回合仅可进行1次，且②效果1回合仅可使用1次。<br />①：自己场上的表侧表示怪兽，不存在的情况下或仅有“R.B.”怪兽的情况下，此卡可从手牌特殊召唤。<br />②：在自己・对手的主要阶段，此卡与“R.B.”连接怪兽为连接状态的情况下，支付500LP，以对手场上的1只怪兽为对象可以发动。将该怪兽和此卡破坏。
  }}
