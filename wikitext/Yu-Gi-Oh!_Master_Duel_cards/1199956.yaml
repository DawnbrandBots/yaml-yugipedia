  | text               = 1 Tuner + 1+ non-Tuners<br />During the Main Phase (Quick Effect): You can banish this card (until the End Phase), and if you do, Special Summon 1 "Fallen of Albaz" or 1 Level 4 or lower monster that mentions it from your Deck or GY. If this card is in your GY: You can target 1 Level 8 Fusion Monster in your GY or banishment and 1 card on the field; shuffle both of those cards and this card into the Deck. You can only use each effect of "Ecclesia and the Dark Dragon" once per turn.

  | fr_name            = Ecclésia et le Dragon des Ténèbres
  | fr_text            = 1 Syntoniseur + 1+ non-Syntoniseur<br />Durant la Main Phase (Effet Rapide) : vous pouvez bannir cette carte (jusqu'à la End Phase), et si vous le faites, Invoquez Spécialement 1 "Albaz le Déchu" ou 1 monstre de max. Niveau 4 qui le mentionne depuis votre Deck ou Cimetière. Si cette carte est dans votre Cimetière : vous pouvez cibler 1 Monstre Fusion de Niveau 8 dans votre Cimetière ou bannissement et 1 carte sur le Terrain ; mélangez ces deux cartes et cette carte dans le Deck. Vous ne pouvez utiliser chaque effet de "Ecclésia et le Dragon des Ténèbres" qu'une fois par tour.
  | de_name            = Ecclesia und der dunkle Drache
  | de_text            = 1 Empfänger + 1+ Nicht-Empfänger<br />Während der Main Phase (Schnelleffekt): Du kannst diese Karte (bis zur End Phase) verbannen und falls du dies tust, beschwöre 1 „Gefallener von Albaz“ oder 1 Monster der Stufe 4 oder niedriger, das ihn erwähnt, als Spezialbeschwörung von deinem Deck oder Friedhof. Falls sich diese Karte in deinem Friedhof befindet: Du kannst 1 Fusionsmonster der Stufe 8 in deinem Friedhof oder von deinen verbannten Karten und 1 Karte auf dem Spielfeld wählen; mische beide jene Karten und diese Karte ins Deck. Du kannst jeden Effekt von „Ecclesia und der dunkle Drache“ nur einmal pro Spielzug verwenden.
  | it_name            = Ecclesia e il Drago Nero
  | it_text            = 1 Tuner + 1+ non-Tuner<br />Durante la Main Phase (Effetto Rapido): puoi bandire questa carta (fino alla End Phase) e, se lo fai, Evoca Specialmente 1 "Caduto di Albaz" o 1 mostro di Livello 4 o inferiore che lo menziona dal tuo Deck o Cimitero. Se questa carta è nel tuo Cimitero: puoi scegliere come bersaglio 1 Mostro Fusione di Livello 8 nel tuo Cimitero o carte bandite e 1 carta sul Terreno; mischia entrambe quelle carte e questa carta nel Deck. Puoi utilizzare ogni effetto di "Ecclesia e il Drago Nero" una sola volta per turno.
  | pt_name            = Ecclesia e o Dragão Negro
  | pt_text            = 1 Regulador + 1+ não-Reguladores<br />Durante a Fase Principal (Efeito Rápido): você pode banir este card (até a Fase Final) e, se isso acontecer, Invoque por Invocação-Especial 1 "Caído de Arbaz" ou 1 monstro de Nível 4 ou menos que o mencione do seu Deck ou Cemitério. Se este card estiver no seu Cemitério: você pode escolher 1 Monstro de Fusão de Nível 8 no seu Cemitério ou banimento e 1 card no campo; embaralhe esses dois cards e este card no Deck. Você só pode usar cada efeito de "Ecclesia e o Dragão Negro" uma vez por turno.
  | es_name            = Ecclesia y el Dragón Oscuro
  | es_text            = 1 Cantante + 1+ no Cantantes<br />Durante la Main Phase (Efecto Rápido): puedes desterrar esta carta (hasta la End Phase) y, si lo haces, Invoca de Modo Especial, desde tu Deck o Cementerio, 1 "Caído de Albaz" o 1 monstruo que lo mencione de Nivel 4 o menor. Si esta carta está en tu Cementerio: puedes seleccionar 1 Monstruo de Fusión de Nivel 8 en tu Cementerio o destierro y 1 carta en el Campo; baraja al Deck esas 2 cartas y esta carta. Sólo puedes usar cada efecto de "Ecclesia y el Dragón Oscuro" una vez por turno.
  | ja_text            = チューナー＋チューナー以外のモンスター１体以上<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：自分・相手のメインフェイズに発動できる。このカードをエンドフェイズまで除外し、自分のデッキ・墓地から「アルバスの落胤」またはそのカード名が記されたレベル４以下のモンスター１体を特殊召喚する。<br />②：このカードが墓地に存在する場合、自分の墓地・除外状態のレベル８融合モンスター１体とフィールドのカード１枚を対象として発動できる。そのカード２枚とこのカードをデッキに戻す。
  | ko_name            = 검은 용의 에클레시아
  | ko_text            = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 / 상대의 메인 페이즈에 발동할 수 있다. 이 카드를 엔드 페이즈까지 제외하고, 자신의 덱 / 묘지에서 "알버스의 낙윤" 또는 그 카드명이 쓰여진 레벨 4 이하의 몬스터 1장을 특수 소환한다.<br />②: 이 카드가 묘지에 존재할 경우, 자신의 묘지 / 제외 상태인 레벨 8 융합 몬스터 1장과 필드의 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드 2장과 이 카드를 덱으로 되돌린다.
  | tc_name            = 黑衣龍之艾克利西亞
  | tc_text            = 協調＋協調以外的怪獸1隻以上<br />此卡名的①②效果1回合僅可各使用1次。<br />①：在自己・對手的主要階段可以發動。將此卡直至結束階段為止除外，從自己牌組・墓地將1隻「阿爾白斯之落胤」或記載有該卡名的等級4以下的怪獸特殊召喚。<br />②：此卡存在於墓地的情況下，以自己墓地・除外狀態的1隻等級8融合怪獸和場上的1張卡為對象可以發動。將該2張卡和此卡放回牌組。
  | sc_name            = 黑衣龙之艾克利西亚
  | sc_text            = 协调＋协调以外的怪兽1只以上<br />此卡名的①②效果1回合仅可各使用1次。<br />①：在自己・对手的主要阶段可以发动。将此卡直至结束阶段为止除外，从自己牌组・墓地将1只“阿尔白斯之落胤”或记载有该卡名的等级4以下的怪兽特殊召唤。<br />②：此卡存在于墓地的情况下，以自己墓地・除外状态的1只等级8融合怪兽和场上的1张卡为对象可以发动。将该2张卡和此卡放回牌组。
