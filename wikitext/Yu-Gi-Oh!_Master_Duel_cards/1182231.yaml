  | text               = 1 Level 5 or higher EARTH monster + 1 Rock monster<br />If this card is Fusion Summoned: You can Special Summon 1 Rock monster from your hand or GY, except "Flux Ochsenfeld". (Quick Effect): You can target 1 EARTH monster you control and 1 card your opponent controls; return them to the hand. You can only use each effect of "Flux Ochsenfeld" once per turn, and cannot activate more than 1 in the same Chain.

  | fr_name            = Flux Ochsenfeld
  | fr_text            = 1 monstre TERRE de min. Niveau 5 + 1 monstre Rocher<br />Si cette carte est Invoquée par Fusion : vous pouvez Invoquer Spécialement 1 monstre Rocher ("Flux Ochsenfeld" exclu) depuis votre main ou Cimetière. (Effet Rapide) : vous pouvez cibler 1 monstre TERRE que vous contrôlez et 1 carte contrôlée par votre adversaire ; renvoyez-les à la main. Vous ne pouvez utiliser chaque effet de "Flux Ochsenfeld" qu'une fois par tour, et ne pouvez en activer que max. 1 dans la même Chaîne.
  | de_name            = Flux-Ochsenfeld
  | de_text            = 1 ERDE Monster der Stufe 5 oder höher + 1 Fels-Monster<br />Falls diese Karte als Fusionsbeschwörung beschworen wird: Du kannst 1 Fels-Monster als Spezialbeschwörung von deiner Hand oder deinem Friedhof beschwören, außer „Flux-Ochsenfeld“. (Schnelleffekt): Du kannst 1 ERDE Monster, das du kontrollierst, und 1 Karte, die dein Gegner kontrolliert, wählen; gib sie auf die Hand zurück. Du kannst jeden Effekt von „Flux-Ochsenfeld“ nur einmal pro Spielzug verwenden und du kannst nicht mehr als 1 in derselben Kette aktivieren.
  | it_name            = Flusso Ochsenfeld
  | it_text            = 1 mostro TERRA di Livello 5 o superiore + 1 mostro Roccia<br />Se questa carta viene Evocata tramite Fusione: puoi Evocare Specialmente 1 mostro Roccia dalla tua mano o Cimitero, eccetto "Flusso Ochsenfeld". (Effetto Rapido): puoi scegliere come bersaglio 1 mostro TERRA che controlli e 1 carta controllata dal tuo avversario; falli ritornare nella mano. Puoi utilizzare ogni effetto di "Flusso Ochsenfeld" una sola volta per turno, e non puoi attivarne più di 1 nella stessa Catena.
  | pt_name            = Fluxo de Ochsenfeld
  | pt_text            = 1 monstro de TERRA de Nível 5 ou mais + 1 monstro Rocha<br />Se este card for Invocado por Invocação-Fusão: você pode Invocar por Invocação-Especial 1 monstro Rocha da sua mão ou do Cemitério, exceto "Fluxo de Ochsenfeld". (Efeito Rápido): você pode escolher 1 monstro de TERRA que você controla e 1 card que seu oponente controla; devolva-os para a mão. Você só pode usar cada efeito de "Fluxo de Ochsenfeld" uma vez por turno e não pode ativar mais que 1 na mesma Corrente.
  | es_name            = Flujo Ochsenfeld
  | es_text            = 1 monstruo de TIERRA de Nivel 5 o mayor + 1 monstruo Roca<br />Si esta carta es Invocada por Fusión: puedes Invocar de Modo Especial 1 monstruo Roca desde tu mano o Cementerio, excepto "Flujo Ochsenfeld". (Efecto Rápido): puedes seleccionar 1 monstruo de TIERRA que controles y 1 carta que controle tu adversario; devuélvelos a la mano. Sólo puedes usar cada efecto de "Flujo Ochsenfeld" una vez por turno, y no puedes activar más de 1 en la misma Cadena.
  | ja_text            = レベル５以上の地属性モンスター＋岩石族モンスター<br />このカード名の①②の効果は、それぞれ１ターンに１度しか使用できず、同一チェーン上では発動できない。<br />①：このカードが融合召喚した場合に発動できる。自分の手札・墓地から「フラックス・オクセンフェルト」以外の岩石族モンスター１体を特殊召喚する。<br />②：自分・相手ターンに、自分フィールドの地属性モンスター１体と相手フィールドのカード１枚を対象として発動できる。そのカードを手札に戻す。
  | ko_name            = 플럭스 옥센펠트
  | ko_text            = 레벨 5 이상의 땅 속성 몬스터 ＋ 암석족 몬스터<br />이 카드명의 ①②의 효과는, 각각 1턴에 1번밖에 사용할 수 없으며, 동일한 체인 위에서는 발동할 수 없다.<br />①: 이 카드를 융합 소환했을 경우에 발동할 수 있다. 자신의 패 / 묘지에서 "플럭스 옥센펠트" 이외의 암석족 몬스터 1장을 특수 소환한다.<br />②: 자신 / 상대 턴에, 자신 필드의 땅 속성 몬스터 1장과 상대 필드의 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 패로 되돌린다.
  | tc_name            = 奧森菲爾德流體
  | tc_text            = 等級5以上的地屬性怪獸＋岩石族怪獸<br />此卡名的①②效果1回合僅可各使用1次，不可在同一連鎖上發動。<br />①：此卡融合召喚的情況下可以發動。從自己手牌・墓地將「奧森菲爾德流體」以外的1隻岩石族怪獸特殊召喚。<br />②：在自己・對手回合中，以自己場上的1隻地屬性怪獸和對手場上的1張卡為對象可以發動。將該卡放回手牌。
  | sc_name            = 奥森菲尔德流体
  | sc_text            = 等级5以上的地属性怪兽＋岩石族怪兽<br />此卡名的①②效果1回合仅可各使用1次，不可在同一连锁上发动。<br />①：此卡融合召唤的情况下可以发动。从自己手牌・墓地将“奥森菲尔德流体”以外的1只岩石族怪兽特殊召唤。<br />②：在自己・对手回合中，以自己场上的1只地属性怪兽和对手场上的1张卡为对象可以发动。将该卡放回手牌。
