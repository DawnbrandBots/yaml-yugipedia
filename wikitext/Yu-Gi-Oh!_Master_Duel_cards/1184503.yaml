title: R.B. VALCan Booster (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = UR
  | attribute          = FIRE
  | types              = Machine / Link / Effect
  | link_arrows        = Bottom-Center, Top-Center
  | atk                = 500
  | text               = 2 Machine monsters<br />If this card is Link Summoned: You can add 1 "R.B." Spell from your Deck to your hand. If this card is in the Extra Monster Zone: You can Special Summon 1 "R.B." monster from your hand or GY in Defense Position, then you can move this card you control to another of your Main Monster Zones, also you cannot Special Summon from the Extra Deck for the rest of this turn, except Machine monsters with 1500 or less ATK. You can only use each effect of "R.B. VALCan Booster" once per turn.

  | fr_name            = Propulseur VALCan R.B.
  | fr_text            = 2 monstres Machine<br />Si cette carte est Invoquée par Lien : vous pouvez ajouter 1 Magie "R.B." depuis votre Deck à votre main. Si cette carte est dans la Zone Monstre Extra : vous pouvez Invoquer Spécialement 1 monstre "R.B." depuis votre main ou Cimetière en Position de Défense, puis vous pouvez déplacer cette carte que vous contrôlez dans une autre de vos Zones Monstre Main, et aussi, vous ne pouvez pas Invoquer Spécialement (monstres Machine avec max. 1500 ATK exclus) depuis l'Extra Deck le reste de ce tour. Vous ne pouvez utiliser chaque effet de "Propulseur VALCan R.B." qu'une fois par tour.
  | de_name            = R.B. VALCan Booster
  | de_text            = 2 Maschine-Monster<br />Falls diese Karte als Linkbeschwörung beschworen wird: Du kannst deiner Hand 1 „R.B.“-Zauber von deinem Deck hinzufügen. Falls diese Karte in der Extra-Monsterzone liegt: Du kannst 1 „R.B.“-Monster als Spezialbeschwörung von deiner Hand oder deinem Friedhof in die Verteidigungsposition beschwören, dann kannst du diese Karte, die du kontrollierst, in eine andere deiner Main-Monsterzonen bewegen, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Maschine-Monstern mit 1500 oder weniger ATK. Du kannst jeden Effekt von „R.B. VALCan Booster“ nur einmal pro Spielzug verwenden.
  | it_name            = R.B. VALCan Vettore
  | it_text            = 2 mostri Macchina<br />Se questa carta viene Evocata Link: puoi aggiungere 1 Magia "R.B." dal tuo Deck alla tua mano. Se questa carta è nella Zona Mostri Extra: puoi Evocare Specialmente 1 mostro "R.B." dalla tua mano o Cimitero in Posizione di Difesa, poi puoi spostare questa carta che controlli in un'altra delle tue Zone Mostri Main, inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno, eccetto mostri Macchina con ATK 1500 o inferiore. Puoi utilizzare ogni effetto di "R.B. VALCan Vettore" una sola volta per turno.
  | pt_name            = Impulsionador R.B. VALCan
  | pt_text            = 2 monstros Máquina<br />Se este card for Invocado por Invocação-Link: você pode adicionar 1 Magia "R.B." do seu Deck à sua mão. Se este card estiver na Zona de Monstros Adicional: você pode Invocar por Invocação-Especial 1 monstro "R.B." da sua mão ou do Cemitério em Posição de Defesa e, depois, você pode mover este card que você controla para outra das suas Zonas de Monstros Principais e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno, exceto monstros Máquina com 1500 ou menos de ATK. Você só pode usar cada efeito de "Impulsionador R.B. VALCan" uma vez por turno.
  | es_name            = R.B. Acelerador VALCan
  | es_text            = 2 monstruos Máquina<br />Si esta carta es Invocada por Enlace: puedes añadir a tu mano 1 Mágica "R.B." en tu Deck. Si esta carta está en la Zona de Monstruos Extra: puedes Invocar de Modo Especial 1 monstruo "R.B." desde tu mano o Cementerio en Posición de Defensa, y después puedes mover esta carta que controlas a otra de tus Zonas de Monstruos Principales, y además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno, excepto monstruos Máquina con 1500 ATK o menos. Sólo puedes usar cada efecto de "R.B. Acelerador VALCan" una vez por turno.
  | ja_text            = 機械族モンスター２体<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードがＬ召喚した場合に発動できる。デッキから「Ｒ．Ｂ．」魔法カード１枚を手札に加える。<br />②：このカードがＥＸモンスターゾーンに存在する場合に発動できる。自分の手札・墓地から「Ｒ．Ｂ．」モンスター１体を守備表示で特殊召喚する。その後、自分フィールドのこのカードを他の自分のメインモンスターゾーンに移動できる。このターン、自分は攻撃力１５００以下の機械族モンスターしかＥＸデッキから特殊召喚できない。
  | ko_name            = R.B.발칸부스터
  | ko_text            = 기계족 몬스터 2장<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 링크 소환했을 경우에 발동할 수 있다. 덱에서 "R.B.(리볼봇)" 마법 카드 1장을 패에 넣는다.<br />②: 이 카드가 엑스트라 몬스터 존에 존재할 경우에 발동할 수 있다. 자신의 패 / 묘지에서 "R.B.(리볼봇)" 몬스터 1장을 수비 표시로 특수 소환한다. 그 후, 자신 필드의 이 카드를 다른 자신 메인 몬스터 존으로 이동할 수 있다. 이 턴에, 자신은 공격력 1500 이하의 기계족 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다.
  | tc_name            = R.B.火神推進器
  | tc_text            = 機械族怪獸2隻<br />此卡名的①②效果1回合僅可各使用1次。<br />①：此卡連結召喚的情況下可以發動。從牌組將1張「R.B.」魔法卡加入手牌。<br />②：此卡存在於額外怪獸區域的情況下可以發動。從自己手牌・墓地將1隻「R.B.」怪獸以守備表示特殊召喚。然後，可將自己場上的此卡移動至其他自己的主要怪獸區域。此回合，自己從額外牌組僅可特殊召喚攻擊力1500以下的機械族怪獸。
  | sc_name            = R.B.火神推进器
  | sc_text            = 机械族怪兽2只<br />此卡名的①②效果1回合仅可各使用1次。<br />①：此卡连接召唤的情况下可以发动。从牌组将1张“R.B.”魔法卡加入手牌。<br />②：此卡存在于额外怪兽区域的情况下可以发动。从自己手牌・墓地将1只“R.B.”怪兽以守备表示特殊召唤。然后，可将自己场上的此卡移动至其他自己的主要怪兽区域。此回合，自己从额外牌组仅可特殊召唤攻击力1500以下的机械族怪兽。
  }}
