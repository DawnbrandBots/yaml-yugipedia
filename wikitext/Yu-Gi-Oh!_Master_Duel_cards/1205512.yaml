title: VARefar, the Judge of Ball (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = N
  | attribute          = EARTH
  | types              = Fiend / Effect
  | level              = 11
  | atk                = 2100
  | def                = 800
  | text               = When your opponent activates a monster effect on their field that targets a monster(s) you control, or their monster targets one for an attack (Quick Effect): You can Special Summon this card from your hand, then you can choose 1 of those opponent's monsters and reveal 1 card in your hand, then apply the following effect to that monster based on the revealed card type.<br />●Monster: Change it to Defense Position.<br />●Spell: Double its ATK.<br />●Trap: Banish it.<br />You can only use this effect of "VARefar, the Judge of Ball" once per turn.

  | fr_name            = VARbaëtre, le Juge du Ballon
  | fr_text            = Lorsque votre adversaire active un effet de monstre sur son Terrain qui cible un ou plusieurs monstres que vous contrôlez, ou son monstre en cible un avec une attaque (Effet Rapide) : vous pouvez Invoquer Spécialement cette carte depuis votre main, puis vous pouvez choisir 1 de ces monstres de l'adversaire, et révélez 1 carte dans votre main, puis appliquez l'effet suivant au monstre selon le type de carte révélé.<br />●Monstre : Changez-le en Position de Défense.<br />●Magie : Doublez son ATK.<br />●Piège : Bannissez-le.<br />Vous ne pouvez utiliser cet effet de "VARbaëtre, le Juge du Ballon" qu'une fois par tour.
  | de_name            = VARefar, der Ballschiedsrichter
  | de_text            = Wenn dein Gegner einen Monstereffekt auf seiner Spielfeldseite aktiviert, der ein oder mehr Monster, die du kontrollierst, als Ziel wählt, oder sein Monster eins als Angriffsziel wählt (Schnelleffekt): Du kannst diese Karte als Spezialbeschwörung von deiner Hand beschwören, dann kannst du 1 jener Monster des Gegners bestimmen und 1 Karte in deiner Hand vorzeigen, dann wende den folgenden Effekt auf jenes Monster an, basierend auf dem vorgezeigten Kartentyp.<br />●Monster: Ändere es in die Verteidigungsposition.<br />●Zauber: Verdopple seine ATK.<br />●Falle: Verbanne es.<br />Du kannst diesen Effekt von „VARefar, der Ballschiedsrichter“ nur einmal pro Spielzug verwenden.
  | it_name            = VARefar, il Giudice della Palla
  | it_text            = Quando il tuo avversario attiva l'effetto di un mostro sul suo Terreno che sceglie come bersaglio uno o più mostri che controlli, o un suo mostro ne sceglie come bersaglio uno per un attacco (Effetto Rapido): puoi Evocare Specialmente questa carta dalla tua mano, poi puoi selezionare 1 di quei mostri dell'avversario e rivelare 1 carta nella tua mano, poi applicare il seguente effetto a quel mostro a seconda del tipo della carta rivelata.<br />●Mostro: Mettilo in Posizione di Difesa.<br />●Magia: Raddoppia il suo ATK.<br />●Trappola: Bandiscilo.<br />Puoi utilizzare questo effetto di "VARefar, il Giudice della Palla" una sola volta per turno.
  | pt_name            = VARbitro, o Juiz da Bola
  | pt_text            = Quando seu oponente ativar um efeito de monstro no campo dele que escolha como alvo um ou mais monstros que você controla, ou um monstro dele escolher um deles como alvo de um ataque (Efeito Rápido): você pode Invocar este card por Invocação-Especial da sua mão e, depois, você pode selecionar 1 desses monstros do oponente e revelar 1 card na sua mão e, depois, aplique o seguinte efeito a esse monstro de acordo com o tipo de card revelado.<br />●Monstro: Coloque-o em Posição de Defesa.<br />●Magia: Dobre seu ATK.<br />●Armadilha: Bana-o.<br />Você só pode usar este efeito de "VARbitro, o Juiz da Bola" uma vez por turno.
  | es_name            = VARefar, el Juez de la Pelota
  | es_text            = Cuando tu adversario activa un efecto de monstruo en su Campo que selecciona uno o más monstruos que controlas, o su monstruo selecciona uno para un ataque (Efecto Rápido): puedes Invocar esta carta de Modo Especial desde tu mano, y después puedes elegir 1 de esos monstruos del adversario y mostrar 1 carta en tu mano, y después aplica los siguientes efectos a ese monstruo basados en el tipo de carta mostrada.<br />●Monstruo: Cámbialo a Posición de Defensa.<br />●Mágica: Duplica su ATK.<br />●Trampa: Destiérralo.<br />Sólo puedes usar este efecto de "VARefar, el Juez de la Pelota" una vez por turno.
  | ja_text            = このカード名の効果は１ターンに１度しか使用できない。<br />①：自分フィールドのモンスターが相手フィールドのモンスターの効果の対象になった時、または相手モンスターの攻撃対象に選択された時に発動できる。このカードを手札から特殊召喚する。その後、その相手モンスター１体を選んで手札を１枚相手に見せる事ができる。その場合、さらに見せたカードの種類によって以下の効果を選んだモンスターに適用する。<br />●モンスター：守備表示にする。<br />●魔法：攻撃力を倍にする。<br />●罠：除外する。
  | ko_name            = 축신－VARefar
  | ko_text            = 이 카드명의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 필드의 몬스터가 상대 필드의 몬스터 효과의 대상이 되었을 때, 또는 상대 몬스터의 공격 대상으로 선택되었을 때에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 그 후, 그 상대 몬스터 1장을 고르고 패를 1장 상대에게 보여줄 수 있다. 그 경우, 추가로 보여준 카드의 종류에 따라 이하의 효과를 고른 몬스터에 적용한다.<br />●몬스터: 수비 표시로 한다.<br />●마법: 공격력을 배로 한다.<br />●함정: 제외한다.
  | tc_name            = 蹴神－VARefar
  | tc_text            = 此卡名的效果1回合僅可使用1次。<br />①：自己場上的怪獸成為對手場上的怪獸的效果對象時，或被選擇為對手怪獸的攻擊對象時可以發動。從手牌將此卡特殊召喚。然後，可挑選該1隻對手怪獸並向對手出示1張手牌。該情況下，進而根據所出示的卡的種類，對挑選的怪獸適用以下效果。<br />●怪獸：改成守備表示。<br />●魔法：攻擊力改成兩倍。<br />●陷阱：除外。
  | sc_name            = 蹴神－VARefar
  | sc_text            = 此卡名的效果1回合仅可使用1次。<br />①：自己场上的怪兽成为对手场上的怪兽的效果对象时，或被选择为对手怪兽的攻击对象时可以发动。从手牌将此卡特殊召唤。然后，可挑选该1只对手怪兽并向对手出示1张手牌。该情况下，进而根据所出示的卡的种类，对挑选的怪兽适用以下效果。<br />●怪兽：改成守备表示。<br />●魔法：攻击力改成两倍。<br />●陷阱：除外。
  }}
