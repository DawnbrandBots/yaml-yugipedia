  | ja_text   = レベル６モンスター×２<br />このカード名の②の効果は１ターンに１度しか使用できない。<br />①：このカードの攻撃力・守備力は、お互いの墓地の闇属性モンスターの数×２００アップする。<br />②：このカードのＸ素材を１つ取り除いて発動できる。お互いのデッキの上からカードを５枚墓地へ送る。
