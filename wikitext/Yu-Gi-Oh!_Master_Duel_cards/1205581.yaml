  | fr_name            = Bazoo le Dévoreur d'Âmes
  | fr_text            = 3 monstres de Niveau 4<br />Les Matériels Xyz détachés d'un monstre sont bannis au lieu d'aller au Cimetière. Une fois par Chaîne, si une ou plusieurs Cartes Monstre sont envoyées au Cimetière (sauf durant la Damage Step) : vous pouvez détacher 1 Matériel de cette carte. Si le ou les derniers Matériels sont détachés de cette carte (sauf durant la Damage Step) : vous pouvez cibler 3 cartes dans les Cimetières ; attachez-les à cette carte.
  | de_name            = Basu, der Seelenverschlinger
  | de_text            = 3 Monster der Stufe 4<br />Xyz-Material, das von einem Monster abgehängt wird, wird verbannt, anstatt auf den Friedhof gelegt zu werden. Einmal pro Kette, falls eine oder mehr Monsterkarten auf den Friedhof gelegt werden (außer während des Damage Steps): Du kannst 1 Material von dieser Karte abhängen. Falls das letzte Material von dieser Karte abgehängt wird (außer während des Damage Steps): Du kannst 3 Karten in den Friedhöfen wählen; hänge sie an diese Karte an.
  | it_name            = Bazoo il Divora-Anima
  | it_text            = 3 mostri di Livello 4<br />Qualsiasi Materiale Xyz staccato da un mostro viene bandito invece di andare al Cimitero. Una volta per Catena, se una o più Carte Mostro vengono mandate al Cimitero (eccetto durante il Damage Step): puoi staccare 1 materiale da questa carta. Se l'ultimo materiale viene staccato da questa carta (eccetto durante il Damage Step): puoi scegliere come bersaglio 3 carte in uno o più Cimiteri; attaccale a questa carta.
  | pt_name            = Bazoo, o Devorador de Almas
  | pt_text            = 3 monstros de Nível 4<br />Qualquer Matéria Xyz desassociada de um monstro é banida em vez de ir para o Cemitério. Uma vez por Corrente, se um ou mais Cards de Monstro forem enviados para o Cemitério (exceto durante a Etapa de Dano): você pode desassociar 1 matéria deste card. Se a(s) última(s) matéria(s) for(em) desassociada(s) deste card (exceto durante a Etapa de Dano): você pode escolher 3 cards no(s) Cemitério(s); associe-os a este card.
  | es_name            = Bazoo el Devora Almas
  | es_text            = 3 monstruos de Nivel 4<br />Cualquier Material Xyz desacoplado de un monstruo es desterrado en vez de ir al Cementerio. Una vez por Cadena, si una o más Cartas de Monstruo son mandadas al Cementerio (excepto durante el Damage Step): puedes desacoplar 1 material de esta carta. Si es desacoplado el último o últimos materiales de esta carta (excepto durante el Damage Step): puedes seleccionar 3 cartas en el o los Cementerios; acóplalas a esta carta.
  | ja_text            = レベル４モンスター×３<br />①：このカードがモンスターゾーンに存在する限り、モンスターから取り除かれたＸ素材は墓地へは行かず除外される。<br />②：モンスターカードが墓地へ送られた場合に発動できる（同一チェーン上では１度まで）。このカードのＸ素材を１つ取り除く。<br />③：このカードのＸ素材が全て取り除かれた場合、自分・相手の墓地のカードを合計３枚対象として発動できる。そのカードをこのカードのＸ素材にする。
  | ko_name            = 혼식마수 바즈
  | ko_text            = 레벨 4 몬스터 × 3<br />①: 이 카드가 몬스터 존에 존재하는 한, 몬스터에서 제거된 엑시즈 소재는 묘지로는 가지 않으며 제외된다.<br />②: 몬스터 카드가 묘지로 보내졌을 경우에 발동할 수 있다(동일한 체인 위에서는 1번까지). 이 카드의 엑시즈 소재를 1개 제거한다.<br />③: 이 카드의 엑시즈 소재가 전부 제거되었을 경우, 자신 / 상대의 묘지의 카드를 합계 3장 대상으로 하고 발동할 수 있다. 그 카드를 이 카드의 엑시즈 소재로 한다.
  | tc_name            = 魂喰魔獸 巴祖
  | tc_text            = 等級4怪獸×3<br />①：只要此卡存在於怪獸區域，從怪獸被去除的超量素材不去墓地而直接被除外。<br />②：怪獸卡被送至墓地的情況下可以發動（同一連鎖上最多1次）。去除此卡的１個超量素材。<br />③：此卡的超量素材全部被去除的情況下，以自己・對手墓地的合計3張卡為對象可以發動。將該卡作為此卡的超量素材。
  | sc_name            = 魂喰魔兽 巴祖
  | sc_text            = 等级4怪兽×3<br />①：只要此卡存在于怪兽区域，从怪兽被去除的超量素材不去墓地而直接被除外。<br />②：怪兽卡被送至墓地的情况下可以发动（同一连锁上最多1次）。去除此卡的１个超量素材。<br />③：此卡的超量素材全部被去除的情况下，以自己・对手墓地的合计3张卡为对象可以发动。将该卡作为此卡的超量素材。
  }}
