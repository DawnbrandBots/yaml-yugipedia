  | text               = 3 Level 4 monsters<br />Any Xyz Material detached from a monster is banished instead of going to the GY. Once per Chain, if a Monster Card(s) is sent to the GY (except during the Damage Step): You can detach 1 material from this card. If the last material(s) is detached from this card (except during the Damage Step): You can target 3 cards in the GY(s); attach them to this card.
