  | text               = 2 DARK monsters on the field<br />(This card is always treated as a "Predaplant" card.)<br />If this card is Special Summoned: You can target 1 other face-up monster on the field; change its ATK to 0, negate its effects, also it becomes DARK. When your opponent activates a card or effect (Quick Effect): You can Fusion Summon 1 DARK Fusion Monster from your Extra Deck using DARK monsters on either field, including this card. You can only use each effect of "Starving Venom Fusion Dragon, Four Heavenly Dragons" once per turn.

  | fr_name            = Dragon Fusion Venin Affamé, Quatre Dragons Divins
  | fr_text            = 2 monstres TÉNÈBRES sur le Terrain<br />(Cette carte est toujours traitée comme carte "Prédaplante".)<br />Si cette carte est Invoquée Spécialement : vous pouvez cibler 1 autre monstre face recto sur le Terrain ; changez son ATK à 0, annulez ses effets, et aussi, il devient TÉNÈBRES. Lorsque votre adversaire active une carte ou un effet (Effet Rapide) : vous pouvez Invoquer par Fusion 1 Monstre Fusion TÉNÈBRES depuis votre Extra Deck, en utilisant des monstres TÉNÈBRES (cette carte incluse) sur au moins l'un des Terrains. Vous ne pouvez utiliser chaque effet de "Dragon Fusion Venin Affamé, Quatre Dragons Divins" qu'une fois par tour.
  | de_name            = Hungergift-Fusionsdrache, vier himmlische Drachen
  | de_text            = 2 FINSTERNIS Monster auf dem Spielfeld<br />(Diese Karte wird immer als „Raubpflanze“-Karte behandelt.)<br />Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst 1 anderes offenes Monster auf dem Spielfeld wählen; ändere seine ATK zu 0, annulliere seine Effekte, zusätzlich wird es zu FINSTERNIS. Wenn dein Gegner eine Karte oder einen Effekt aktiviert (Schnelleffekt): Du kannst 1 FINSTERNIS Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck beschwören, indem du FINSTERNIS Monster von beliebigen Spielfeldseiten verwendest, darunter diese Karte. Du kannst jeden Effekt von „Hungergift-Fusionsdrache, vier himmlische Drachen“ nur einmal pro Spielzug verwenden.
  | it_name            = Drago Fusione Veleno Affamato, Quattro Draghi Celestiali
  | it_text            = 2 mostri OSCURITÀ sul Terreno<br />(Questa carta viene sempre considerata come una carta "Predapianta".)<br />Se questa carta viene Evocata Specialmente: puoi scegliere come bersaglio 1 altro mostro scoperto sul Terreno; cambia il suo ATK a 0, annulla i suoi effetti, inoltre esso diventa OSCURITÀ. Quando il tuo avversario attiva una carta o un effetto (Effetto Rapido): puoi Evocare tramite Fusione 1 Mostro Fusione OSCURITÀ dal tuo Extra Deck utilizzando mostri OSCURITÀ su qualsiasi Terreno, compresa questa carta. Puoi utilizzare ogni effetto di "Drago Fusione Veleno Affamato, Quattro Draghi Celestiali" una sola volta per turno.
  | pt_name            = Dragão Fusão de Peçonha Insaciável, os Quatro Dragões Celestiais
  | pt_text            = 2 monstros de TREVAS no campo<br />(Este card deve ser sempre considerado como um card "Predaplanta".)<br />Se este card for Invocado por Invocação-Especial: você pode escolher 1 outro monstro com a face para cima no campo; mude o ATK dele para 0, negue seus efeitos e, além disso, ele se torna de TREVAS. Quando seu oponente ativar um card ou efeito (Efeito Rápido): você pode Invocar por Invocação-Fusão 1 Monstro de Fusão de TREVAS do seu Deck Adicional usando monstros de TREVAS em qualquer campo, incluindo este card. Você só pode usar cada efeito de "Dragão Fusão de Peçonha Insaciável, os Quatro Dragões Celestiais" uma vez por turno.
  | es_name            = Dragón de Fusión Hambriento Venenoso, Cuatro Dragones Celestiales
  | es_text            = 2 monstruos de OSCURIDAD en el Campo<br />(Esta carta se trata siempre como una carta "Predaplanta").<br />Si esta carta es Invocada de Modo Especial: puedes seleccionar otro monstruo boca arriba en el Campo; cambia su ATK a 0, niega sus efectos, y además se convierte en de OSCURIDAD. Cuando tu adversario activa una carta o efecto (Efecto Rápido): puedes Invocar por Fusión 1 Monstruo de Fusión de OSCURIDAD desde tu Deck Extra usando monstruos de OSCURIDAD en cualquier Campo, incluyendo esta carta. Sólo puedes usar cada efecto de "Dragón de Fusión Hambriento Venenoso, Cuatro Dragones Celestiales" una vez por turno.
  | ja_text            = フィールドの闇属性モンスター×２<br />このカード名はルール上「捕食植物」カードとしても扱う。<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードが特殊召喚した場合、フィールドの他の表側表示モンスター１体を対象として発動できる。そのモンスターの攻撃力は０になり、効果は無効化され、闇属性になる。<br />②：相手が効果を発動した時に発動できる。このカードを含む自分・相手フィールドの闇属性モンスターを融合素材とし、闇属性の融合モンスター１体を融合召喚する。
  | ko_name            = 사천의 용 스타브 베놈 퓨전 드래곤
  | ko_text            = 필드의 어둠 속성 몬스터 × 2<br />이 카드명은 룰상 "프레데터 플랜츠" 카드로도 취급한다.<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 특수 소환했을 경우, 필드의 다른 앞면 표시 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 공격력은 0 이 되고, 효과는 무효화되며, 어둠 속성이 된다.<br />②: 상대가 효과를 발동했을 때에 발동할 수 있다. 이 카드를 포함하는 자신 / 상대 필드의 어둠 속성 몬스터를 융합 소재로 하고, 어둠 속성인 융합 몬스터 1장을 융합 소환한다.
  | tc_name            = 四天之龍 凶餓猛毒結合龍
  | tc_text            = 場上的闇屬性怪獸×2<br />此卡名在規則上也視為「捕食植物」卡。<br />此卡名的①②效果1回合僅可各使用1次。<br />①：此卡特殊召喚的情況下，以場上的1隻其他的表側表示怪獸為對象可以發動。該怪獸的攻擊力變為0，效果無效化，變為闇屬性。<br />②：對手發動效果時可以發動。將包含此卡在內的、自己・對手場上的闇屬性怪獸作為融合素材，將1隻闇屬性的融合怪獸融合召喚。
  | sc_name            = 四天之龙 凶饿猛毒结合龙
  | sc_text            = 场上的暗属性怪兽×2<br />此卡名在规则上也视为“捕食植物”卡。<br />此卡名的①②效果1回合仅可各使用1次。<br />①：此卡特殊召唤的情况下，以场上的1只其他的表侧表示怪兽为对象可以发动。该怪兽的攻击力变为0，效果无效化，变为暗属性。<br />②：对手发动效果时可以发动。将包含此卡在内的、自己・对手场上的暗属性怪兽作为融合素材，将1只暗属性的融合怪兽融合召唤。
