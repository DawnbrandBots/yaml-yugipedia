  | text               = 2 Level 10 monsters<br />During your Main Phase, you can Normal Summon 1 Machine monster, in addition to your Normal Summon/Set (you can only gain this effect once per turn). You can only use each of the following effects of "Superdreadnought Rail Cannon Flying Launcher" once per turn. If this card is Xyz Summoned: You can add 1 EARTH Machine monster or 1 "Barrage Blast" from your Deck to your hand. You can detach any number of materials from this card, then target that many Spells/Traps on the field; destroy them.

  | fr_name            = Super Cuirassé Canon Ferroviaire Lanceur Volant
  | fr_text            = 2 monstres de Niveau 10<br />Durant votre Main Phase, vous pouvez Invoquer Normalement 1 monstre Machine, en plus de votre Invocation/Pose Normale (vous ne pouvez gagner cet effet qu'une fois par tour). Vous ne pouvez utiliser chacun des effets suivants de "Super Cuirassé Canon Ferroviaire Lanceur Volant" qu'une fois par tour. Si cette carte est Invoquée par Xyz : vous pouvez ajouter 1 monstre TERRE Machine ou 1 "Tir de Barrage" depuis votre Deck à votre main. Vous pouvez détacher un nombre de votre choix de Matériels de cette carte, puis ciblez autant de Magies/Pièges sur le Terrain ; détruisez-les.
  | de_name            = Superkanonen-Panzerzug Schwebwerfer
  | de_text            = 2 Monster der Stufe 10<br />Während deiner Main Phase kannst du zusätzlich zu deiner Normalbeschwörung / deinem Setzen 1 Maschine-Monster als Normalbeschwörung beschwören (du kannst diesen Effekt nur einmal pro Spielzug erhalten). Du kannst jeden der folgenden Effekte von „Superkanonen-Panzerzug Schwebwerfer“ nur einmal pro Spielzug verwenden. Falls diese Karte als Xyz-Beschwörung beschworen wird: Du kannst deiner Hand 1 ERDE Maschine-Monster oder 1 „Sperrfeuer-Bombardierung“ von deinem Deck hinzufügen. Du kannst eine beliebige Anzahl Material von dieser Karte abhängen und dann ebenso viele Zauber/Fallen auf dem Spielfeld wählen; zerstöre sie.
  | it_name            = Cannone Ferroviario Supercorazzato Lanciamissili Volante
  | it_text            = 2 mostri di Livello 10<br />Durante la tua Main Phase, puoi Evocare Normalmente 1 mostro Macchina, in aggiunta alla tua Evocazione Normale/Posizionamento (puoi guadagnare questo effetto una sola volta per turno). Puoi utilizzare ognuno dei seguenti effetti di "Cannone Ferroviario Supercorazzato Lanciamissili Volante" una sola volta per turno. Se questa carta viene Evocata Xyz: puoi aggiungere 1 mostro TERRA Macchina o 1 "Scarica di Colpi" dal tuo Deck alla tua mano. Puoi staccare un qualsiasi numero di materiali da questa carta, poi scegliere come bersaglio quel numero di Magie/Trappole sul Terreno; distruggile.
  | pt_name            = Supercouraçado Canhão de Trilho Lançador Voador
  | pt_text            = 2 monstros de Nível 10<br />Durante sua Fase Principal, você pode Invocar por Invocação-Normal 1 monstro Máquina, em adição à sua Invocação-Normal/Baixar (padrão) (você só pode se aproveitar deste efeito uma vez por turno). Você só pode usar cada um dos seguintes efeitos de "Supercouraçado Canhão de Trilho Lançador Voador" uma vez por turno. Se este card for Invocado por Invocação-Xyz: você pode adicionar 1 monstro Máquina de TERRA ou 1 "Barragem Explosiva" do seu Deck à sua mão. Você pode desassociar qualquer número de matérias deste card e, depois, escolha esse número de Magias/Armadilhas no campo; destrua-as.
  | es_name            = Supercañón de Rieles Acorazado Cañón Volador
  | es_text            = 2 monstruos de Nivel 10<br />Durante tu Main Phase, puedes Invocar de Modo Normal 1 monstruo Máquina, además de tu Invocación Normal/Colocación (sólo puedes ganar este efecto una vez por turno). Sólo puedes usar cada uno de los siguientes efectos de "Supercañón de Rieles Acorazado Cañón Volador" una vez por turno. Si esta carta es Invocada Xyz: puedes añadir a tu mano 1 monstruo Máquina de TIERRA o 1 "Explosión del Bombardeo" en tu Deck. Puedes desacoplar cualquier número de materiales de esta carta, y después selecciona ese número de Mágicas/Trampas en el Campo; destrúyelas.
  | ja_text            = レベル１０モンスター×２<br />このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードがＸ召喚した場合に発動できる。デッキから機械族・地属性モンスター１体か「掃射特攻」１枚を手札に加える。<br />②：このカードがモンスターゾーンに存在する限り、自分は通常召喚に加えて１度だけ、自分メインフェイズに機械族モンスター１体を召喚できる。<br />③：このカードのＸ素材を任意の数だけ取り除き、その数だけフィールドの魔法・罠カードを対象として発動できる。そのカードを破壊する。
  | ko_name            = 초노급포탑열차 플라잉 런처
  | ko_text            = 레벨 10 몬스터 × 2<br />이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 엑시즈 소환했을 경우에 발동할 수 있다. 덱에서 기계족 / 땅 속성 몬스터 1장이나 "소사특공" 1장을 패에 넣는다.<br />②: 이 카드가 몬스터 존에 존재하는 한, 자신은 통상 소환 외에도 1번만, 자신 메인 페이즈에 기계족 몬스터 1장을 일반 소환할 수 있다.<br />③: 이 카드의 엑시즈 소재를 임의의 수만큼 제거하고, 그 수만큼 필드의 마법 / 함정 카드를 대상으로 하여 발동할 수 있다. 그 카드를 파괴한다.
  | tc_name            = 超重型砲塔列車 飛行發射器
  | tc_text            = 等級10怪獸×2<br />此卡名的①③效果1回合僅可各使用1次。<br />①：此卡超量召喚的情況下可以發動。從牌組將1隻機械族・地屬性怪獸或1張「掃射特攻」加入手牌。<br />②：只要此卡存在於怪獸區域，自己在通常召喚之外，可在自己的主要階段追加1次召喚1隻機械族怪獸。<br />③：去除此卡的任意數量的超量素材，依其數量以場上的魔法・陷阱卡為對象可以發動。將該卡破壞。
  | sc_name            = 超重型炮塔列车 飞行发射器
  | sc_text            = 等级10怪兽×2<br />此卡名的①③效果1回合仅可各使用1次。<br />①：此卡超量召唤的情况下可以发动。从牌组将1只机械族・地属性怪兽或1张“扫射特攻”加入手牌。<br />②：只要此卡存在于怪兽区域，自己在通常召唤之外，可在自己的主要阶段追加1次召唤1只机械族怪兽。<br />③：去除此卡的任意数量的超量素材，依其数量以场上的魔法・陷阱卡为对象可以发动。将该卡破坏。
