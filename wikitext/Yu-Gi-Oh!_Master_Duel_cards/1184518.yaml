title: R.B. VALCan Rocket (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = SR
  | attribute          = FIRE
  | types              = Machine / Effect
  | level              = 5
  | atk                = 1000
  | def                = 1000
  | text               = If you control no face-up monsters, or the only face-up monsters you control are "R.B." monsters, you can Special Summon this card (from your hand). You can only Special Summon "R.B. VALCan Rocket" once per turn this way. If this card is linked to an "R.B." Link Monster: You can pay 1000 LP, then target up to 2 cards your opponent controls; destroy them, also this card, and if you do, inflict 500 damage to your opponent for each card destroyed. You can only use this effect of "R.B. VALCan Rocket" once per turn.

  | fr_name            = Fusée VALCan R.B.
  | fr_text            = Si vous ne contrôlez aucun monstre face recto, ou que les seuls monstres face recto que vous contrôlez sont des monstres "R.B.", vous pouvez Invoquer Spécialement cette carte (depuis votre main). Vous ne pouvez Invoquer Spécialement "Fusée VALCan R.B." qu'une fois par tour de cette façon. Si cette carte est liée à un Monstre Lien "R.B." : vous pouvez payer 1000 LP, puis ciblez max. 2 cartes contrôlées par votre adversaire ; détruisez-les et aussi cette carte, et si vous le faites, infligez 500 points de dommages à votre adversaire pour chaque carte détruite. Vous ne pouvez utiliser cet effet de "Fusée VALCan R.B." qu'une fois par tour.
  | de_name            = R.B. VALCan Rakete
  | de_text            = Falls du keine offenen Monster kontrollierst oder die einzigen offenen Monster, die du kontrollierst, „R.B.“-Monster sind, kannst du diese Karte als Spezialbeschwörung (von deiner Hand) beschwören. Du kannst „R.B. VALCan Rakete“ nur einmal pro Spielzug auf diese Art als Spezialbeschwörung beschwören. Falls diese Karte mit einem „R.B.“-Linkmonster verlinkt ist: Du kannst 1000 LP zahlen und dann bis zu 2 Karten wählen, die dein Gegner kontrolliert; zerstöre sie, zusätzlich diese Karte und falls du dies tust, füge deinem Gegner für jede zerstörte Karte 500 Schaden zu. Du kannst diesen Effekt von „R.B. VALCan Rakete“ nur einmal pro Spielzug verwenden.
  | it_name            = R.B. VALCan Razzo
  | it_text            = Se non controlli nessun mostro scoperto, o gli unici mostri scoperti che controlli sono mostri "R.B.", puoi Evocare Specialmente questa carta (dalla tua mano). Puoi Evocare Specialmente "R.B. VALCan Razzo" una sola volta per turno in questo modo. Se questa carta è linkata a un Mostro Link "R.B.": puoi pagare 1000 LP, poi scegliere come bersaglio fino a 2 carte controllate dal tuo avversario; distruggile, inoltre distruggi questa carta e, se lo fai, infliggi 500 danni al tuo avversario per ogni carta distrutta. Puoi utilizzare questo effetto di "R.B. VALCan Razzo" una sola volta per turno.
  | pt_name            = Foguete R.B. VALCan
  | pt_text            = Se você não controlar nenhum monstro com a face para cima, ou os únicos monstros com a face para cima que você controla forem monstros "R.B.", você pode Invocar este card por Invocação-Especial (da sua mão). Você só pode Invocar "Foguete R.B. VALCan" por Invocação-Especial uma vez por turno desta forma. Se este card estiver linkado a um Monstro Link "R.B.": você pode pagar 1000 PV e, depois, escolha até 2 cards que seu oponente controla; destrua-os, e também este card e, se isso acontecer, cause 500 de dano ao seu oponente para cada card destruído. Você só pode usar este efeito de "Foguete R.B. VALCan" uma vez por turno.
  | es_name            = R.B. Cohete VALCan
  | es_text            = Si no controlas monstruos boca arriba, o los únicos monstruos boca arriba que controlas son monstruos "R.B.", puedes Invocar esta carta de Modo Especial (desde tu mano). Sólo puedes Invocar de Modo Especial "R.B. Cohete VALCan" una vez por turno de esta forma. Si esta carta está enlazada a un Monstruo de Enlace "R.B.": puedes pagar 1000 LP, y después selecciona hasta 2 cartas que controle tu adversario; destrúyelas, y además esta carta y, si lo haces, inflige 500 puntos de daño a tu adversario por cada carta destruida. Sólo puedes usar este efecto de "R.B. Cohete VALCan" una vez por turno.
  | ja_text            = このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②の効果は１ターンに１度しか使用できない。<br />①：自分フィールドの表側表示モンスターが、存在しない場合または「Ｒ．Ｂ．」モンスターのみの場合、このカードは手札から特殊召喚できる。<br />②：このカードが「Ｒ．Ｂ．」Ｌモンスターとリンク状態の場合、１０００ＬＰを払い、相手フィールドのカードを２枚まで対象として発動できる。そのカード及びこのカードを破壊し、破壊した数×５００ダメージを相手に与える。
  | ko_name            = R.B.발칸로켓
  | ko_text            = 이 카드명의, ①의 방법에 의한 특수 소환은 1턴에 1번밖에 할 수 없으며, ②의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 필드의 앞면 표시 몬스터가, 존재하지 않을 경우 또는 "R.B.(리볼봇)" 몬스터뿐일 경우, 이 카드는 패에서 특수 소환할 수 있다.<br />②: 이 카드가 "R.B.(리볼봇)" 링크 몬스터와 링크 상태일 경우, 1000 LP를 지불하고, 상대 필드의 카드를 2장까지 대상으로 하여 발동할 수 있다. 그 카드 및 이 카드를 파괴하고, 파괴한 수 × 500 데미지를 상대에게 준다.
  | tc_name            = R.B.火神火箭
  | tc_text            = 此卡名以①方法的特殊召喚1回合僅可進行1次，且②效果1回合僅可使用1次。<br />①：自己場上的表側表示怪獸，不存在的情況下或僅有「R.B.」怪獸的情況下，此卡可從手牌特殊召喚。<br />②：此卡與「R.B.」連結怪獸為連結狀態的情況下，支付1000LP，以對手場上的最多2張卡為對象可以發動。將該卡和此卡破壞，給予對手所破壞的數量×500的傷害。
  | sc_name            = R.B.火神火箭
  | sc_text            = 此卡名以①方法的特殊召唤1回合仅可进行1次，且②效果1回合仅可使用1次。<br />①：自己场上的表侧表示怪兽，不存在的情况下或仅有“R.B.”怪兽的情况下，此卡可从手牌特殊召唤。<br />②：此卡与“R.B.”连接怪兽为连接状态的情况下，支付1000LP，以对手场上的最多2张卡为对象可以发动。将该卡和此卡破坏，给予对手所破坏的数量×500的伤害。
  }}
