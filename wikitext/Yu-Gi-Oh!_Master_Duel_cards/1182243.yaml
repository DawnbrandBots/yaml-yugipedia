  | text               = You can reveal this card in your hand; Special Summon 1 "HERO" monster from your hand in Defense Position. If this card is sent to the GY by card effect, or to activate a card effect: You can Set 1 "Mask Change" from your Deck or GY. You can only use each effect of "Masked HERO Fountain" once per turn.

  | fr_name            = Fountain, HÉROS Masqué
  | fr_text            = Vous pouvez révéler cette carte dans votre main ; Invoquez Spécialement 1 monstre "HÉROS" depuis votre main en Position de Défense. Si cette carte est envoyée au Cimetière par un effet de carte ou pour activer un effet de carte : vous pouvez Poser 1 "Changement de Masque" depuis votre Deck ou Cimetière. Vous ne pouvez utiliser chaque effet de "Fountain, HÉROS Masqué" qu'une fois par tour.
  | de_name            = Maskierter HELD Fountain
  | de_text            = Du kannst diese Karte in deiner Hand vorzeigen; beschwöre 1 „HELD“-Monster als Spezialbeschwörung von deiner Hand in die Verteidigungsposition. Falls diese Karte durch einen Karteneffekt oder um einen Karteneffekt zu aktivieren auf den Friedhof gelegt wird: Du kannst 1 „Maskenwechsel“ von deinem Deck oder Friedhof setzen. Du kannst jeden Effekt von „Maskierter HELD Fountain“ nur einmal pro Spielzug verwenden.
  | it_name            = Fountain EROE Mascherato
  | it_text            = Puoi rivelare questa carta nella tua mano; Evoca Specialmente 1 mostro "EROE" dalla tua mano in Posizione di Difesa. Se questa carta viene mandata al Cimitero dall'effetto di una carta, o per attivare l'effetto di una carta: puoi Posizionare 1 "Cambio di Maschera" dal tuo Deck o Cimitero. Puoi utilizzare ogni effetto di "Fountain EROE Mascherato" una sola volta per turno.
  | pt_name            = Fountain, o HERÓI Mascarado
  | pt_text            = Você pode revelar este card na sua mão; Invoque por Invocação-Especial 1 monstro "HERÓI" da sua mão em Posição de Defesa. Se este card for enviado para o Cemitério por um efeito de card, ou para ativar um efeito de card: você pode Baixar 1 "Mudar a Máscara" do seu Deck ou Cemitério. Você só pode usar cada efeito de "Fountain, o HERÓI Mascarado" uma vez por turno.
  | es_name            = HÉROE Enmascarado Fountain
  | es_text            = Puedes mostrar esta carta en tu mano; Invoca de Modo Especial 1 monstruo "HÉROE" desde tu mano en Posición de Defensa. Si esta carta es mandada al Cementerio por el efecto de una carta, o para activar un efecto de carta: puedes Colocar 1 "Cambio de Máscara" desde tu Deck o Cementerio. Sólo puedes usar cada efecto de "HÉROE Enmascarado Fountain" una vez por turno.
  | ja_text            = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：手札のこのカードを相手に見せて発動できる。手札から「ＨＥＲＯ」モンスター１体を守備表示で特殊召喚する。<br />②：このカードがカードの効果を発動するために墓地へ送られた場合、または効果で墓地へ送られた場合に発動できる。自分のデッキ・墓地から「マスク・チェンジ」１枚を自分フィールドにセットする。
  | ko_name            = 마스크드 히어로 파운틴
  | ko_text            = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다. 패에서 "히어로" 몬스터 1장을 수비 표시로 특수 소환한다.<br />②: 이 카드가 카드의 효과를 발동하기 위해 묘지로 보내졌을 경우, 또는 효과로 묘지로 보내졌을 경우에 발동할 수 있다. 자신의 덱 / 묘지에서 "마스크 체인지" 1장을 자신 필드에 세트한다.
  | tc_name            = 假面－英雄 噴泉
  | tc_text            = 此卡名的①②效果1回合僅可各使用1次。<br />①：向對手出示手牌的此卡可以發動。從手牌將1隻「－英雄」怪獸以守備表示特殊召喚。<br />②：此卡為發動卡的效果被送至墓地的情況下，或因效果被送至墓地的情況下可以發動。從自己牌組・墓地將1張「假面變換」放置在自己場上。
  | sc_name            = 假面－英雄 喷泉
  | sc_text            = 此卡名的①②效果1回合仅可各使用1次。<br />①：向对手出示手牌的此卡可以发动。从手牌将1只“－英雄”怪兽以守备表示特殊召唤。<br />②：此卡为发动卡的效果被送至墓地的情况下，或因效果被送至墓地的情况下可以发动。从自己牌组・墓地将1张“假面变换”放置在自己场上。
  }}
