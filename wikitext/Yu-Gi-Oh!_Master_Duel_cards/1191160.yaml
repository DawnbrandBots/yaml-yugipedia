  | text               = 1 Tuner + 1+ non-Tuners<br />This card's original ATK becomes 3000, while in the center Main Monster Zone. During the Main Phase (Quick Effect): You can Special Summon 1 Level 6 or lower "Elfnote" monster from your hand or GY, then you can reduce the Levels of all Level 4 or higher monsters on the field by 3 until the end of this turn, also you cannot Special Summon from the Extra Deck for the rest of this turn, except Synchro Monsters. You can only use this effect of "Elfnote Seraphim Strelitzia" once per turn.

  | fr_name            = Strelitzia, Séraphin des Notes Elfiques
  | fr_text            = 1 Syntoniseur + 1+ non-Syntoniseur<br />L'ATK d'origine de cette carte devient 3000, tant qu'elle est dans la Zone Monstre Main centrale. Durant la Main Phase (Effet Rapide) : vous pouvez Invoquer Spécialement 1 monstre "Notes Elfiques" de max. Niveau 6 depuis votre main ou Cimetière, puis vous pouvez réduire le Niveau de tous les monstres de min. Niveau 4 sur le Terrain de 3 jusqu'à la fin de ce tour, et aussi, vous ne pouvez pas Invoquer Spécialement (Monstres Synchro exclus) depuis l'Extra Deck le reste de ce tour. Vous ne pouvez utiliser cet effet de "Strelitzia, Séraphin des Notes Elfiques" qu'une fois par tour.
  | de_name            = Elfnote Seraphim Strelitzia
  | de_text            = 1 Empfänger + 1+ Nicht-Empfänger<br />Die Grund-ATK dieser Karte werden zu 3000, solange sie in der mittleren Main-Monsterzone liegt. Während der Main Phase (Schnelleffekt): Du kannst 1 „Elfnote“-Monster der Stufe 6 oder niedriger als Spezialbeschwörung von deiner Hand oder deinem Friedhof beschwören, dann kannst du die Stufen aller Monster der Stufe 4 oder höher auf dem Spielfeld bis zum Ende dieses Spielzugs um 3 verringern, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Synchromonstern. Du kannst diesen Effekt von „Elfnote Seraphim Strelitzia“ nur einmal pro Spielzug verwenden.
  | it_name            = Elfnote Serafina Strelitzia
  | it_text            = 1 Tuner + 1+ non-Tuner<br />L'ATK originale di questa carta diventa 3000, mentre è nella Zona Mostri Main centrale. Durante la Main Phase (Effetto Rapido): puoi Evocare Specialmente 1 mostro "Elfnote" di Livello 6 o inferiore dalla tua mano o Cimitero, poi puoi ridurre i Livelli di tutti i mostri di Livello 4 o superiore sul Terreno di 3 fino alla fine di questo turno, inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno, eccetto Mostri Synchro. Puoi utilizzare questo effetto di "Elfnote Serafina Strelitzia" una sola volta per turno.
  | pt_name            = Serafim Strelitzia de Elfnota
  | pt_text            = 1 Regulador + 1+ não-Reguladores<br />O ATK original deste card se torna 3000 enquanto ele estiver na Zona de Monstros Principal central. Durante a Fase Principal (Efeito Rápido): você pode Invocar por Invocação-Especial 1 monstro "Elfnota" de Nível 6 ou menos da sua mão ou do Cemitério e, depois, você pode reduzir em 3 os Níveis de todos os monstros de Nível 4 ou mais no campo, até o final deste turno e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno, exceto Monstros Sincro. Você só pode usar este efeito de "Serafim Strelitzia de Elfnota" uma vez por turno.
  | es_name            = Elfnota Serafín Strelitzia
  | es_text            = 1 Cantante + 1+ no Cantantes<br />El ATK original de esta carta se convierte en 3000, mientras esté en la Zona de Monstruos Principal central. Durante la Main Phase (Efecto Rápido): puedes Invocar de Modo Especial, desde tu mano o Cementerio, 1 monstruo "Elfnota" de Nivel 6 o menor, y después puedes reducir en 3 los Niveles de todos los monstruos de Nivel 4 o mayor en el Campo hasta el final de este turno, y además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno, excepto Monstruos de Sincronía. Sólo puedes usar este efecto de "Elfnota Serafín Strelitzia" una vez por turno.
  | ja_text            = チューナー＋チューナー以外のモンスター１体以上<br />このカード名の②の効果は１ターンに１度しか使用できない。<br />①：このカードは中央のメインモンスターゾーンに存在する限り、元々の攻撃力が３０００になる。<br />②：自分・相手のメインフェイズに発動できる。自分の手札・墓地からレベル６以下の「エルフェンノーツ」モンスター１体を特殊召喚する。その後、フィールドの全てのレベル４以上のモンスターのレベルをターン終了時まで３つ下げる事ができる。このターン、自分はＳモンスターしかＥＸデッキから特殊召喚できない。
  | ko_name            = 엘펜노츠 세라핌 스트리치아
  | ko_text            = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드는 중앙 메인 몬스터 존에 존재하는 한, 원래 공격력이 3000 이 된다.<br />②: 자신 / 상대의 메인 페이즈에 발동할 수 있다. 자신의 패 / 묘지에서 레벨 6 이하의 "엘펜노츠" 몬스터 1장을 특수 소환한다. 그 후, 필드의 모든 레벨 4 이상의 몬스터의 레벨을 턴 종료시까지 3개 내릴 수 있다. 이 턴에, 자신은 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다.
  | tc_name            = 獄花之大煌耀聖 斯特莉西亞
  | tc_text            = 協調＋協調以外的怪獸1隻以上<br />此卡名的②效果1回合僅可使用1次。<br />①：只要此卡存在於中央的主要怪獸區域，原本攻擊力變為3000。<br />②：在自己・對手的主要階段可以發動。從自己手牌・墓地將1隻等級6以下的「耀聖」怪獸特殊召喚。然後，可將場上的所有等級4以上的怪獸的等級直至回合結束時為止下降3。此回合，自己從額外牌組僅可特殊召喚同步怪獸。
  | sc_name            = 狱花之大煌耀圣 斯特莉西亚
  | sc_text            = 协调＋协调以外的怪兽1只以上<br />此卡名的②效果1回合仅可使用1次。<br />①：只要此卡存在于中央的主要怪兽区域，原本攻击力变为3000。<br />②：在自己・对手的主要阶段可以发动。从自己手牌・墓地将1只等级6以下的“耀圣”怪兽特殊召唤。然后，可将场上的所有等级4以上的怪兽的等级直至回合结束时为止下降3。此回合，自己从额外牌组仅可特殊召唤同步怪兽。
