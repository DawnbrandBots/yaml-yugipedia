  | text               = 1 Tuner + 1+ non-Tuners<br />(This card is always treated as a "Speedroid" card.)<br />If this card is Special Summoned: You can destroy 1 Effect Monster your opponent controls, and if you do, this card gains ATK equal to that monster's original ATK. When your opponent activates a card or effect (Quick Effect): You can Special Summon 1 Level 4 or lower WIND Tuner from your hand or GY (but negate its effects), then immediately after this effect resolves, you can Synchro Summon 1 WIND Synchro Monster. You can only use each effect of "Clear Wing Synchro Dragon, Four Heavenly Dragons" once per turn.

  | fr_name            = Dragon Synchro de l'Aile Claire, Quatre Dragons Divins
  | fr_text            = 1 Syntoniseur + 1+ non-Syntoniseur<br />(Cette carte est toujours traitée comme carte "Vitesseroid".)<br />Si cette carte est Invoquée Spécialement : vous pouvez détruire 1 Monstre à Effet contrôlé par votre adversaire, et si vous le faites, cette carte gagne une ATK égale à l'ATK d'origine du monstre. Lorsque votre adversaire active une carte ou un effet (Effet Rapide) : vous pouvez Invoquer Spécialement 1 Syntoniseur VENT de max. Niveau 4 depuis votre main ou Cimetière (mais annulez ses effets), puis immédiatement après la résolution de cet effet, vous pouvez Invoquer par Synchronisation 1 Monstre Synchro VENT. Vous ne pouvez utiliser chaque effet de "Dragon Synchro de l'Aile Claire, Quatre Dragons Divins" qu'une fois par tour.
  | de_name            = Glasflügel-Synchrodrache, vier himmlische Drachen
  | de_text            = 1 Empfänger + 1+ Nicht-Empfänger<br />(Diese Karte wird immer als „Geschwindigkeitsroid“-Karte behandelt.)<br />Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst 1 Effektmonster zerstören, das dein Gegner kontrolliert, und falls du dies tust, erhält diese Karte ATK in Höhe der Grund-ATK jenes Monsters. Wenn dein Gegner eine Karte oder einen Effekt aktiviert (Schnelleffekt): Du kannst 1 WIND Empfänger der Stufe 4 oder niedriger als Spezialbeschwörung von deiner Hand oder deinem Friedhof beschwören (aber annulliere seine Effekte), dann, sofort nachdem dieser Effekt aufgelöst wurde, kannst du 1 WIND Synchromonster als Synchrobeschwörung beschwören. Du kannst jeden Effekt von „Glasflügel-Synchrodrache, vier himmlische Drachen“ nur einmal pro Spielzug verwenden.
  | it_name            = Drago Synchro Ala Chiara, Quattro Draghi Celestiali
  | it_text            = 1 Tuner + 1+ non-Tuner<br />(Questa carta viene sempre considerata come una carta "Velociroid".)<br />Se questa carta viene Evocata Specialmente: puoi distruggere 1 Mostro con Effetto controllato dal tuo avversario e, se lo fai, questa carta guadagna ATK pari all'ATK originale di quel mostro. Quando il tuo avversario attiva una carta o un effetto (Effetto Rapido): puoi Evocare Specialmente 1 Tuner VENTO di Livello 4 o inferiore dalla tua mano o Cimitero (ma annulla i suoi effetti), poi immediatamente dopo che questo effetto si è risolto, puoi Synchro Evocare 1 Mostro Synchro VENTO. Puoi utilizzare ogni effetto di "Drago Synchro Ala Chiara, Quattro Draghi Celestiali" una sola volta per turno.
  | pt_name            = Dragão Sincro de Asas Transparentes, os Quatro Dragões Celestiais
  | pt_text            = 1 Regulador + 1+ não-Reguladores<br />(Este card deve ser sempre considerado como um card "Velocidaroide".)<br />Se este card for Invocado por Invocação-Especial: você pode destruir 1 Monstro de Efeito que seu oponente controla e, se isso acontecer, este card ganha ATK igual ao ATK original desse monstro. Quando seu oponente ativar um card ou efeito (Efeito Rápido): você pode Invocar por Invocação-Especial 1 Regulador de VENTO de Nível 4 ou menos da sua mão ou do Cemitério (mas negue seus efeitos) e, depois, imediatamente depois que este efeito resolver, você pode Invocar por Invocação-Sincro 1 Monstro Sincro de VENTO. Você só pode usar cada efeito de "Dragão Sincro de Asas Transparentes, os Quatro Dragões Celestiais" uma vez por turno.
  | es_name            = Dragón Sincro Ala Transparente, Cuatro Dragones Celestiales
  | es_text            = 1 Cantante + 1+ no Cantantes<br />(Esta carta se trata siempre como una carta "Velociroid").<br />Si esta carta es Invocada de Modo Especial: puedes destruir 1 Monstruo de Efecto que controle tu adversario y, si lo haces, esta carta gana ATK igual al ATK original de ese monstruo. Cuando tu adversario activa una carta o efecto (Efecto Rápido): puedes Invocar de Modo Especial 1 Cantante de VIENTO de Nivel 4 o menor desde tu mano o Cementerio (pero niega sus efectos) e inmediatamente después de que se resuelva este efecto, puedes Invocar por Sincronía 1 Monstruo de Sincronía de VIENTO. Sólo puedes usar cada efecto de "Dragón Sincro Ala Transparente, Cuatro Dragones Celestiales" una vez por turno.
  | ja_text            = チューナー＋チューナー以外のモンスター１体以上<br />このカード名はルール上「スピードロイド」カードとしても扱う。<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードが特殊召喚した場合に発動できる。相手フィールドの効果モンスター１体を破壊し、その元々の攻撃力分だけこのカードの攻撃力をアップする。<br />②：相手が効果を発動した時に発動できる。自分の手札・墓地からレベル４以下の風属性チューナー１体を効果を無効にして特殊召喚する。その後、風属性Ｓモンスター１体のＳ召喚を行う事ができる。
  | ko_name            = 사천의 용 클리어윙 싱크로 드래곤
  | ko_text            = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />이 카드명은 룰상 "스피드로이드" 카드로도 취급한다.<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 상대 필드의 효과 몬스터 1장을 파괴하고, 그 원래 공격력만큼만 이 카드의 공격력을 올린다.<br />②: 상대가 효과를 발동했을 때에 발동할 수 있다. 자신의 패 / 묘지에서 레벨 4 이하의 바람 속성 튜너 1장을 효과를 무효로 하고 특수 소환한다. 그 후, 바람 속성 싱크로 몬스터 1장의 싱크로 소환을 실행할 수 있다.
  | tc_name            = 四天之龍 清透翼同步龍
  | tc_text            = 協調＋協調以外的怪獸1隻以上<br />此卡名在規則上也視為「疾行機人」卡。<br />此卡名的①②效果1回合僅可各使用1次。<br />①：此卡特殊召喚的情況下可以發動。將對手場上的1隻效果怪獸破壞，此卡的攻擊力上升相當於其原本攻擊力的數值。<br />②：對手發動效果時可以發動。從自己手牌・墓地將1隻等級4以下的風屬性協調效果無效並特殊召喚。然後，可進行1隻風屬性同步怪獸的同步召喚。
  | sc_name            = 四天之龙 清透翼同步龙
  | sc_text            = 协调＋协调以外的怪兽1只以上<br />此卡名在规则上也视为“疾行机人”卡。<br />此卡名的①②效果1回合仅可各使用1次。<br />①：此卡特殊召唤的情况下可以发动。将对手场上的1只效果怪兽破坏，此卡的攻击力上升相当于其原本攻击力的数值。<br />②：对手发动效果时可以发动。从自己手牌・墓地将1只等级4以下的风属性协调效果无效并特殊召唤。然后，可进行1只风属性同步怪兽的同步召唤。
