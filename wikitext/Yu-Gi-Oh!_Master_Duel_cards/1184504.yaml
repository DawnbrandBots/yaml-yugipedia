  | attribute          = WIND
  | types              = Machine / Link / Effect
  | link_arrows        = Bottom-Left, Bottom-Center, Bottom-Right
  | atk                = 1500
  | text               = 2+ Machine monsters<br />Gains the following effects while this card points to an "R.B." monster.<br />●Gains ATK equal to the total original ATK of "R.B." monsters it points to.<br />●Can make a second attack during each Battle Phase.<br />●Cannot be destroyed by battle or card effects.<br />During your Main Phase: You can add 1 "R.B." card from your Deck to your hand. You can only use this effect of "R.B. The Brute Blues" once per turn.

  | fr_name            = La Brute du Blues R.B.
  | fr_text            = 2+ monstres Machine<br />Gagne les effets suivants tant que cette carte pointe un monstre "R.B.".<br />●Gagne une ATK égale à la somme des ATK d'origine des monstres "R.B." qu'elle pointe.<br />●Peut faire une seconde attaque durant chaque Battle Phase.<br />●Non destructible ni au combat ni par des effets de carte.<br />Durant votre Main Phase : vous pouvez ajouter 1 carte "R.B." depuis votre Deck à votre main. Vous ne pouvez utiliser cet effet de "La Brute du Blues R.B." qu'une fois par tour.
  | de_name            = R.B. Der brutale Blues
  | de_text            = 2+ Maschine-Monster<br />Diese Karte erhält die folgenden Effekte, solange sie auf ein „R.B.“-Monster zeigt.<br />●Diese Karte erhält ATK in Höhe der Summe der Grund-ATK der „R.B.“-Monster, auf die sie zeigt.<br />●Kann während jeder Battle Phase einen zweiten Angriff durchführen.<br />●Kann weder durch Kampf noch durch Karteneffekte zerstört werden.<br />Während deiner Main Phase: Du kannst deiner Hand 1 „R.B.“-Karte von deinem Deck hinzufügen. Du kannst diesen Effekt von „R.B. Der brutale Blues“ nur einmal pro Spielzug verwenden.
  | it_name            = R.B. Il Blues Bruto
  | it_text            = 2+ mostri Macchina<br />Guadagna i seguenti effetti mentre questa carta punta un mostro "R.B.".<br />●Guadagna ATK pari alla somma degli ATK originali dei mostri "R.B." a cui punta.<br />●Può effettuare un secondo attacco durante ogni Battle Phase.<br />●Non può essere distrutto in battaglia o dagli effetti delle carte.<br />Durante la tua Main Phase: puoi aggiungere 1 carta "R.B." dal tuo Deck alla tua mano. Puoi utilizzare questo effetto di "R.B. Il Blues Bruto" una sola volta per turno.
  | pt_name            = R.B. O Bruto do Blues
  | pt_text            = 2+ monstros Máquina<br />Ganha os seguintes efeitos enquanto este card apontar para um monstro "R.B.".<br />●Ganha ATK igual à soma do ATK original dos monstros "R.B." para os quais apontar.<br />●Pode realizar um segundo ataque durante cada Fase de Batalha.<br />●Não pode ser destruído em batalha ou por efeitos de card.<br />Durante sua Fase Principal: você pode adicionar 1 card "R.B." do seu Deck à sua mão. Você só pode usar este efeito de "R.B. O Bruto do Blues" uma vez por turno.
  | es_name            = R.B. El Bruto Blues
  | es_text            = 2+ monstruos Máquina<br />Gana los siguientes efectos mientras esta carta apunte a un monstruo "R.B.".<br />●Gana ATK igual al ATK original total de los monstruos "R.B." a los que apunta.<br />●Puede hacer un segundo ataque durante cada Battle Phase.<br />●No puede ser destruida en batalla o por efectos de cartas.<br />Durante tu Main Phase: puedes añadir a tu mano 1 carta "R.B." en tu Deck. Sólo puedes usar este efecto de "R.B. El Bruto Blues" una vez por turno.
  | ja_text            = 機械族モンスター２体以上<br />このカード名の②の効果は１ターンに１度しか使用できない。<br />①：このカードのリンク先に「Ｒ．Ｂ．」モンスターが存在する限り、このカードは以下の効果を得る。<br />●このカードの攻撃力は、このカードのリンク先の「Ｒ．Ｂ．」モンスターの元々の攻撃力分アップする。<br />●このカードは１度のバトルフェイズ中に２回攻撃できる。<br />●このカードは戦闘・効果では破壊されない。<br />②：自分メインフェイズに発動できる。デッキから「Ｒ．Ｂ．」カード１枚を手札に加える。
  | ko_name            = R.B.브루트 블루스
  | ko_text            = 기계족 몬스터 2장<br />이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드의 링크 앞에 "R.B.(리볼봇)" 몬스터가 존재하는 한, 이 카드는 이하의 효과를 얻는다.<br />●이 카드의 공격력은, 이 카드의 링크 앞의 "R.B.(리볼봇)" 몬스터의 원래 공격력만큼 올린다.<br />●이 카드는 1번의 배틀 페이즈 중에 2회 공격할 수 있다.<br />●이 카드는 전투 / 효과로는 파괴되지 않는다.<br />②: 자신 메인 페이즈에 발동할 수 있다. 덱에서 "R.B.(리볼봇)" 카드 1장을 패에 넣는다.
  | tc_name            = R.B.布魯特・布魯斯
  | tc_text            = 機械族怪獸2隻以上<br />此卡名的②效果1回合僅可使用1次。<br />①：只要此卡的連結端存在「R.B.」怪獸，此卡獲得以下效果。<br />●此卡的攻擊力上升相當於此卡連結端的「R.B.」怪獸的原本攻擊力的數值。<br />●此卡在1次戰鬥階段中可攻擊2次。<br />●此卡不會因戰鬥・效果被破壞。<br />②：在自己的主要階段可以發動。從牌組將1張「R.B.」卡加入手牌。
  | sc_name            = R.B.布鲁特・布鲁斯
  | sc_text            = 机械族怪兽2只以上<br />此卡名的②效果1回合仅可使用1次。<br />①：只要此卡的连接端存在“R.B.”怪兽，此卡获得以下效果。<br />●此卡的攻击力上升相当于此卡连接端的“R.B.”怪兽的原本攻击力的数值。<br />●此卡在1次战斗阶段中可攻击2次。<br />●此卡不会因战斗・效果被破坏。<br />②：在自己的主要阶段可以发动。从牌组将1张“R.B.”卡加入手牌。
  }}
