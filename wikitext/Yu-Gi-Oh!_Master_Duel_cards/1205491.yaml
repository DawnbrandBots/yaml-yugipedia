title: X-Saber Bruno (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = SR
  | attribute          = EARTH
  | types              = Psychic / Tuner / Effect
  | level              = 3
  | atk                = 1200
  | def                = 1100
  | text               = Once per turn, during your opponent's Main or Battle Phase, you can (Quick Effect): Immediately after this effect resolves, Synchro Summon using only EARTH monsters you control, including this card. You can only use each of the following effects of "X-Saber Bruno" once per turn. If this card is in your hand: You can banish 1 other EARTH monster from your hand, face-up field, or GY; Special Summon this card. If this card is Normal or Special Summoned: You can add 1 "Saber" Spell/Trap from your Deck or GY to your hand.

  | fr_name            = Bruno, Sabre X
  | fr_text            = Une fois par tour, durant la Main ou Battle Phase de votre adversaire, vous pouvez (Effet Rapide) : immédiatement après la résolution de cet effet, Invoquez par Synchronisation en utilisant uniquement des monstres TERRE que vous contrôlez (cette carte incluse). Vous ne pouvez utiliser chacun des effets suivants de "Bruno, Sabre X" qu'une fois par tour. Si cette carte est dans votre main : vous pouvez bannir 1 autre monstre TERRE depuis votre main, Terrain face recto ou Cimetière ; Invoquez Spécialement cette carte. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 Magie/Piège "Sabre" depuis votre Deck ou Cimetière à votre main.
  | de_name            = X-Säbel Bruno
  | de_text            = Einmal pro Spielzug, während der Main oder Battle Phase deines Gegners, kannst du (Schnelleffekt): Sofort nachdem dieser Effekt aufgelöst wurde, führe eine Synchrobeschwörung durch, indem du nur ERDE Monster verwendest, die du kontrollierst, darunter diese Karte. Du kannst jeden der folgenden Effekte von „X-Säbel Bruno“ nur einmal pro Spielzug verwenden. Falls sich diese Karte in deiner Hand befindet: Du kannst 1 anderes ERDE Monster von deiner Hand, offen von deiner Spielfeldseite oder von deinem Friedhof verbannen; beschwöre diese Karte als Spezialbeschwörung. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Säbel“-Zauber/Falle von deinem Deck oder Friedhof hinzufügen.
  | it_name            = Sciabola-X Bruno
  | it_text            = Una volta per turno, durante la Main o Battle Phase del tuo avversario, puoi (Effetto Rapido): immediatamente dopo che questo effetto si è risolto, Synchro Evoca utilizzando solo mostri TERRA che controlli, compresa questa carta. Puoi utilizzare ognuno dei seguenti effetti di "Sciabola-X Bruno" una sola volta per turno. Se questa carta è nella tua mano: puoi bandire 1 altro mostro TERRA dalla tua mano, Terreno scoperto o Cimitero; Evoca Specialmente questa carta. Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 Magia/Trappola "Sciabola" dal tuo Deck o Cimitero alla tua mano.
  | pt_name            = Sabre-X Bruno
  | pt_text            = Uma vez por turno, durante a Fase Principal ou de Batalha do seu oponente, você pode (Efeito Rápido): imediatamente depois que este efeito resolver, Invoque por Invocação-Sincro usando apenas monstros de TERRA que você controla, incluindo este card. Você só pode usar cada um dos seguintes efeitos de "Sabre-X Bruno" uma vez por turno. Se este card estiver na sua mão: você pode banir 1 outro monstro de TERRA da sua mão, do campo com a face para cima ou do Cemitério; Invoque este card por Invocação-Especial. Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 Magia/Armadilha "Sabre" do seu Deck ou Cemitério à sua mão.
  | es_name            = Sable-X Bruno
  | es_text            = Una vez por turno, durante la Main o Battle Phase de tu adversario, puedes (Efecto Rápido): inmediatamente después de que se resuelva este efecto, Invoca por Sincronía usando sólo monstruos de TIERRA que controles, incluyendo esta carta. Sólo puedes usar cada uno de los siguientes efectos de "Sable-X Bruno" una vez por turno. Si esta carta está en tu mano: puedes desterrar otro monstruo de TIERRA en tu mano, Campo boca arriba o Cementerio; Invoca esta carta de Modo Especial. Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 Mágica/Trampa "Sable" en tu Deck o Cementerio.
  | ja_text            = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードが手札に存在する場合、自分の手札・フィールド（表側表示）・墓地からこのカード以外の地属性モンスター１体を除外して発動できる。このカードを特殊召喚する。<br />②：このカードが召喚・特殊召喚した場合に発動できる。自分のデッキ・墓地から「セイバー」魔法・罠カード１枚を手札に加える。<br />③：１ターンに１度、相手のメインフェイズ及びバトルフェイズに発動できる。このカードを含む自分フィールドの地属性モンスターのみを素材としてＳ召喚を行う。
  | ko_name            = X－세이버 브루노
  | ko_text            = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드가 패에 존재할 경우, 자신의 패 / 필드(앞면 표시) / 묘지에서 이 카드 이외의 땅 속성 몬스터 1장을 제외하고 발동할 수 있다. 이 카드를 특수 소환한다.<br />②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 자신의 덱 / 묘지에서 "세이버" 마법 / 함정 카드 1장을 패에 넣는다.<br />③: 1턴에 1번, 상대의 메인 페이즈 및 배틀 페이즈에 발동할 수 있다. 이 카드를 포함하는 자신 필드의 땅 속성 몬스터만을 소재로서 싱크로 소환을 실행한다.
  | tc_name            = X－軍刀 布魯諾
  | tc_text            = 此卡名的①②效果1回合僅可各使用1次。<br />①：此卡存在於手牌的情況下，從自己手牌・場上（表側表示）・墓地將此卡以外的1隻地屬性怪獸除外可以發動。將此卡特殊召喚。<br />②：此卡召喚・特殊召喚的情況下可以發動。從自己牌組・墓地將1張「軍刀」魔法・陷阱卡加入手牌。<br />③：1回合1次，在對手的主要階段及戰鬥階段可以發動。將包含此卡在內的、僅以自己場上的地屬性怪獸作為素材進行同步召喚。
  | sc_name            = X－军刀 布鲁诺
  | sc_text            = 此卡名的①②效果1回合仅可各使用1次。<br />①：此卡存在于手牌的情况下，从自己手牌・场上（表侧表示）・墓地将此卡以外的1只地属性怪兽除外可以发动。将此卡特殊召唤。<br />②：此卡召唤・特殊召唤的情况下可以发动。从自己牌组・墓地将1张“军刀”魔法・陷阱卡加入手牌。<br />③：1回合1次，在对手的主要阶段及战斗阶段可以发动。将包含此卡在内的、仅以自己场上的地属性怪兽作为素材进行同步召唤。
  }}
