title: Surprise Fusion (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | card_type          = Spell
  | property           = Normal
  | text               = Target 1 face-up monster you control, then declare 1 Monster Type and 1 Attribute; that monster becomes that Type and Attribute, then you can Fusion Summon 1 Fusion Monster from your Extra Deck, using monsters you control, including that monster. You can banish this card from your GY; Tribute 1 Fusion Monster, and if you do, Special Summon 2 "Surprise Tokens" (Spellcaster/DARK/ATK 0/DEF 0) with the same Level as the Tributed monster had on the field. You can only use this effect of "Surprise Fusion" once per turn.

  | fr_name            = Fusion Surprise
  | fr_text            = Ciblez 1 monstre face recto que vous contrôlez, puis déclarez 1 Type de Monstre et 1 Attribut ; le monstre devient ce Type et Attribut, puis vous pouvez Invoquer par Fusion 1 Monstre Fusion depuis votre Extra Deck, en utilisant des monstres que vous contrôlez (le monstre inclus). Vous pouvez bannir cette carte depuis votre Cimetière ; Sacrifiez 1 Monstre Fusion, et si vous le faites, Invoquez Spécialement 2 "Jeton Surprise" (Magicien/TÉNÈBRES/ATK 0/DEF 0) du même Niveau que le monstre Sacrifié avait sur le Terrain. Vous ne pouvez utiliser cet effet de "Fusion Surprise" qu'une fois par tour.
  | de_name            = Überraschungsfusion
  | de_text            = Wähle 1 offenes Monster, das du kontrollierst, und deklariere dann 1 Monstertyp und 1 Eigenschaft; jenes Monster wird zu jenem Typ und jener Eigenschaft, dann kannst du 1 Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck beschwören, indem du Monster verwendest, die du kontrollierst, darunter jenes Monster. Du kannst diese Karte von deinem Friedhof verbannen; biete 1 Fusionsmonster als Tribut an und falls du dies tust, beschwöre 2 „Überraschungs-Spielmarken“ (Hexer/FINSTERNIS/ATK 0/DEF 0) mit derselben Stufe, die das als Tribut angebotene Monster auf dem Spielfeld hatte, als Spezialbeschwörung. Du kannst diesen Effekt von „Überraschungsfusion“ nur einmal pro Spielzug verwenden.
  | it_name            = Fusione Sorpresa
  | it_text            = Scegli come bersaglio 1 mostro scoperto che controlli, poi dichiara 1 Tipo di Mostro e 1 Attributo; quel mostro diventa di quel Tipo e Attributo, poi puoi Evocare tramite Fusione 1 Mostro Fusione dal tuo Extra Deck, utilizzando mostri che controlli, compreso quel mostro. Puoi bandire questa carta dal tuo Cimitero; offri come Tributo 1 Mostro Fusione e, se lo fai, Evoca Specialmente 2 "Segna-Sorpresa" (Incantatore/OSCURITÀ/ATK 0/DEF 0) con lo stesso Livello che il mostro offerto come Tributo aveva sul Terreno. Puoi utilizzare questo effetto di "Fusione Sorpresa" una sola volta per turno.
  | pt_name            = Fusão Surpresa
  | pt_text            = Escolha 1 monstro com a face para cima que você controla e, depois, declare 1 Tipo de Monstro e 1 Atributo; esse monstro se torna desse Tipo e Atributo e, depois, você pode Invocar por Invocação-Fusão 1 Monstro de Fusão do seu Deck Adicional, usando monstros que você controla, incluindo esse monstro. Você pode banir este card do seu Cemitério; ofereça como Tributo 1 Monstro de Fusão e, se isso acontecer, Invoque por Invocação-Especial 2 "Ficha de Surpresa" (Mago/TREVAS/ATK 0/DEF 0) com o mesmo Nível que o monstro oferecido como Tributo tinha no campo. Você só pode usar este efeito de "Fusão Surpresa" uma vez por turno.
  | es_name            = Fusión Sorpresa
  | es_text            = Selecciona 1 monstruo boca arriba que controles, y después declara 1 Tipo de Monstruo y 1 Atributo; ese monstruo se convierte en ese Tipo y con ese Atributo, y después puedes Invocar por Fusión 1 Monstruo de Fusión desde tu Deck Extra, usando monstruos que controles, incluyendo ese monstruo. Puedes desterrar esta carta en tu Cementerio; Sacrifica 1 Monstruo de Fusión y, si lo haces, Invoca de Modo Especial 2 "Ficha Sorpresa" (Lanzador de Conjuros/OSCURIDAD/ATK 0/DEF 0) con el mismo Nivel que el monstruo Sacrificado tenía en el Campo. Sólo puedes usar este efecto de "Fusión Sorpresa" una vez por turno.
  | ja_text            = このカード名の②の効果は１ターンに１度しか使用できない。<br />①：自分フィールドの表側表示モンスター１体を対象とし、種族と属性を１つずつ宣言して発動できる。そのモンスターは宣言した種族・属性になる。その後、そのモンスターを含む自分フィールドのモンスターを融合素材とし、融合モンスター１体を融合召喚できる。<br />②：墓地のこのカードを除外して発動できる。自分フィールドの融合モンスター１体をリリースし、そのレベルと同じレベルを持つ「サプライズトークン」（魔法使い族・闇・攻／守０）２体を自分フィールドに特殊召喚する。
  | ko_name            = 서프라이즈 퓨전
  | ko_text            = 이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 필드의 앞면 표시 몬스터 1장을 대상으로 하고, 종족과 속성을 1개씩 선언하여 발동할 수 있다. 그 몬스터는 선언한 종족 / 속성이 된다. 그 후, 그 몬스터를 포함하는 자신 필드의 몬스터를 융합 소재로 하고, 융합 몬스터 1장을 융합 소환할 수 있다.<br />②: 묘지의 이 카드를 제외하고 발동할 수 있다. 자신 필드의 융합 몬스터 1장을 릴리스하고, 그 레벨과 같은 레벨을 가지는 "서프라이즈 토큰"(마법사족 / 어둠 / 공 0 / 수 0) 2장을 자신 필드에 특수 소환한다.
  | tc_name            = 驚喜結合
  | tc_text            = 此卡名的②效果1回合僅可使用1次。<br />①：以自己場上的1隻表側表示怪獸為對象，宣言種族和屬性各1個可以發動。該怪獸變為宣言的種族・屬性。然後，可將包含該怪獸在內的、自己場上的怪獸作為融合素材，將1隻融合怪獸融合召喚。<br />②：將墓地的此卡除外可以發動。解放自己場上的1隻融合怪獸，將2隻等級與其等級相同的「驚喜衍生物」（魔法使族・闇・攻/守0）特殊召喚至自己場上。
  | sc_name            = 惊喜结合
  | sc_text            = 此卡名的②效果1回合仅可使用1次。<br />①：以自己场上的1只表侧表示怪兽为对象，宣言种族和属性各1个可以发动。该怪兽变为宣言的种族・属性。然后，可将包含该怪兽在内的、自己场上的怪兽作为融合素材，将1只融合怪兽融合召唤。<br />②：将墓地的此卡除外可以发动。解放自己场上的1只融合怪兽，将2只等级与其等级相同的“惊喜衍生物”（魔法师族・暗・攻/守0）特殊召唤至自己场上。
  }}
