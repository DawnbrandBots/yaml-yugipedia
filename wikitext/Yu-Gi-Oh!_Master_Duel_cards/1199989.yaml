title: Enneacraft Reset (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | card_type          = Spell
  | property           = Normal
  | text               = Place 1 "Enneapolis" from your Deck or GY, face-up in your Field Zone, or if you control "Enneapolis", you can negate the effects of face-up cards your opponent controls, up to the number of cards in your Pendulum Zones, instead. If your opponent activates a card or effect, while this card is in your GY (except during the Damage Step): You can banish this card; change "Enneacraft" monsters you control to face-down Defense Position, up to the number of cards in your Pendulum Zones. You can only activate 1 "Enneacraft Reset" per turn.

  | fr_name            = Réinitialisation Ennéacrimaisseau
  | fr_text            = Placez face recto 1 "Ennéapolis" depuis votre Deck ou Cimetière dans votre Zone Terrain, ou si vous contrôlez "Ennéapolis", vous pouvez annuler un nombre d'effets de cartes face recto contrôlées par votre adversaire, inférieur ou égal au nombre de cartes dans vos Zones Pendule, à la place. Si votre adversaire active une carte ou un effet, tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez bannir cette carte ; changez un nombre de monstres "Ennéacrimaisseau" que vous contrôlez en Position de Défense face verso, inférieur ou égal au nombre de cartes dans vos Zones Pendule. Vous ne pouvez activer qu'1 "Réinitialisation Ennéacrimaisseau" par tour.
  | de_name            = Enneawerk-Wiederaufbau
  | de_text            = Lege 1 „Enneapolis“ von deinem Deck oder Friedhof offen in deine Spielfeldzone oder falls du „Enneapolis“ kontrollierst, kannst du stattdessen die Effekte von offenen Karten, die dein Gegner kontrolliert, bis zur Anzahl der Karten in deinen Pendelzonen annullieren. Falls dein Gegner eine Karte oder einen Effekt aktiviert, solange diese Karte in deinem Friedhof liegt (außer während des Damage Steps): Du kannst diese Karte verbannen; ändere „Enneawerk“-Monster, die du kontrollierst, bis zur Anzahl der Karten in deinen Pendelzonen in die verdeckte Verteidigungsposition. Du kannst nur 1 „Enneawerk-Wiederaufbau“ pro Spielzug aktivieren.
  | it_name            = Reset Enneamezzo
  | it_text            = Metti 1 "Enneapoli" dal tuo Deck o Cimitero, scoperta nella tua Zona Terreno o, se controlli "Enneapoli", puoi invece annullare gli effetti delle carte scoperte controllate dal tuo avversario, fino al numero di carte nelle tue Zone Pendulum. Se il tuo avversario attiva una carta o un effetto, mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi bandire questa carta; metti coperti in Posizione di Difesa mostri "Enneamezzo" che controlli, fino al numero di carte nelle tue Zone Pendulum. Puoi attivare solo 1 "Reset Enneamezzo" per turno.
  | pt_name            = Reinício da Eneanave
  | pt_text            = Coloque 1 "Eneápolis" do seu Deck ou Cemitério, com a face para cima na sua Zona do Campo ou, em vez disso, se você controlar "Eneápolis", você pode negar os efeitos de cards com a face para cima que seu oponente controla, até o número de cards nas suas Zonas de Pêndulo. Se seu oponente ativar um card ou efeito, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode banir este card; coloque os monstros "Eneanave" que você controla com a face para baixo em Posição de Defesa, até o número de cards nas suas Zonas de Pêndulo. Você só pode ativar 1 "Reinício da Eneanave" por turno.
  | es_name            = Reset Eneagranave
  | es_text            = Pon boca arriba en tu Zona del Campo 1 "Eneagrapolis" en tu Deck o Cementerio o, si controlas "Eneagrapolis", puedes negar los efectos de las cartas boca arriba que controle tu adversario, hasta el número de cartas en tus Zonas de Péndulo, en su lugar. Si tu adversario activa una carta o efecto, mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes desterrar esta carta; cambia los monstruos "Eneagranave" que controlas a Posición de Defensa boca abajo, hasta el número de cartas en tus Zonas de Péndulo. Sólo puedes activar 1 "Reset Eneagranave" por turno.
  | ja_text            = このカード名のカードは１ターンに１枚しか発動できない。<br />①：自分のデッキ・墓地から「糾罪都市－エニアポリス」１枚を自分のフィールドゾーンに表側表示で置く。自分フィールドに「糾罪都市－エニアポリス」が存在する場合、代わりに自分のＰゾーンのカードの数まで相手フィールドの表側表示カードの効果を無効にできる。<br />②：このカードが墓地に存在する状態で、相手がカードの効果を発動した場合、このカードを除外して発動できる。自分のＰゾーンのカードの数まで、自分フィールドの「糾罪巧」モンスターを裏側守備表示にする。
  | ko_name            = 에니아크래프트－리셋
  | ko_text            = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다.<br />①: 자신의 덱 / 묘지에서 "규죄도시－에니아폴리스" 1장을 자신의 필드 존에 앞면 표시로 놓는다. 자신 필드에 "규죄도시－에니아폴리스"가 존재할 경우, 대신에 자신의 펜듈럼 존의 카드의 수까지 상대 필드의 앞면 표시 카드의 효과를 무효로 할 수 있다.<br />②: 이 카드가 묘지에 존재하는 상태에서, 상대가 카드의 효과를 발동했을 경우, 이 카드를 제외하고 발동할 수 있다. 자신의 펜듈럼 존의 카드의 수까지, 자신 필드의 "에니아크래프트" 몬스터를 뒷면 수비 표시로 한다.
  | tc_name            = 糾罪巧－重置再巧
  | tc_text            = 此卡名的卡1回合僅可發動1張。<br />①：從自己牌組・墓地將1張「糾罪都市」以表側表示放在自己的場地區域。自己場上存在「糾罪都市」的情況下，作為代替可以自己鐘擺區域的卡的數量為上限，將對手場上的表側表示卡的效果無效。<br />②：此卡存在於墓地的狀態下，對手將卡的效果發動的情況下，將此卡除外可以發動。以自己鐘擺區域的卡的數量為上限，將自己場上的「糾罪巧」怪獸改成裡側守備表示。
  | sc_name            = 纠罪巧－重置再巧
  | sc_text            = 此卡名的卡1回合仅可发动1张。<br />①：从自己牌组・墓地将1张“纠罪都市”以表侧表示放在自己的场地区域。自己场上存在“纠罪都市”的情况下，作为代替可以自己灵摆区域的卡的数量为上限，将对手场上的表侧表示卡的效果无效。<br />②：此卡存在于墓地的状态下，对手将卡的效果发动的情况下，将此卡除外可以发动。以自己灵摆区域的卡的数量为上限，将自己场上的“纠罪巧”怪兽改成里侧守备表示。
  }}
