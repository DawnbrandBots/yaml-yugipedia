  | de_name   = Angriffskonter
  | de_text   = Wenn eine Zauber-/Fallenkarte oder ein Monstereffekt aktiviert wird, solange du ein „/Angriffsmodus“-Monster kontrollierst: Annulliere die Aktivierung und falls du dies tust, zerstöre jene Karte.
  | it_name   = Contromossa d'Assalto
  | it_text   = (Questa carta viene sempre considerata come una carta "Contra".)<br />Quando viene attivata una Carta Magia/Trappola, o l'effetto di un mostro, mentre controlli un mostro "/Assalto": annulla l'attivazione e, se lo fai, distruggi quella carta.
  | pt_name   = Contra Ataque
  | pt_text   = Quando um Card de Magia/Armadilha ou efeito de monstro for ativado enquanto você controlar um monstro "/Modo de Ataque": negue a ativação e, se isso acontecer, destrua esse card.
  | es_name   = Contra Ataque
  | es_text   = Cuando es activada una Carta Mágica/de Trampa, o efecto de monstruo, mientras controlas un monstruo "/Modo de Ataque": niega la activación y, si lo haces, destruye esa carta.
  | ja_text   = ①：自分フィールドに「／バスター」モンスターが存在し、モンスターの効果・魔法・罠カードが発動した時に発動できる。その発動を無効にし破壊する。
  | ko_name   = 버스터 카운터
  | ko_text   = ①: 자신 필드에 "/ 버스터" 몬스터가 존재하고, 몬스터의 효과 / 마법 / 함정 카드가 발동했을 때에 발동할 수 있다. 그 발동을 무효로 하고 파괴한다.
  | tc_name   = 爆裂反制
  | tc_text   = 在我方場上存在冠有「／爆裂」之名的怪獸，怪獸的效果・魔法・陷阱卡發動時可發動。將該發動變為無效進行破壞。
  | sc_name   = 袭击反制
  | sc_text   = 我方场上存在有冠有“／爆裂”之名的怪兽，且怪兽的效果、魔法、陷阱卡发动时可发动。使该发动无效并破坏。
