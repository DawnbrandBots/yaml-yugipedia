title: Junora the Power Patron of Tuning (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = UR
  | attribute          = FIRE
  | types              = Fiend / Synchro / Effect
  | level              = 10
  | atk                = 3100
  | def                = 3800
  | text               = 1 Tuner + 2 non-Tuners<br />For this card's Synchro Summon, you can treat 1 monster in your center Main Monster Zone as a Tuner. If this card is Synchro Summoned: You can negate the effects of all face-up cards your opponent controls. (Quick Effect): You can activate this effect; monsters your opponent controls in the same column as the "Elfnote" monster(s) you control cannot be used as material for a Fusion, Synchro, Xyz, or Link Summon, until the end of this turn. You can only use this effect of "Junora the Power Patron of Tuning" once per turn.

  | fr_name            = Junora le Mécène du Pouvoir de l'Accordage
  | fr_text            = 1 Syntoniseur + 2 non-Syntoniseurs<br />Pour l'Invocation Synchro de cette carte, vous pouvez traiter 1 monstre dans votre Zone Monstre Main centrale comme Syntoniseur. Si cette carte est Invoquée par Synchronisation : vous pouvez annuler les effets de toutes les cartes face recto contrôlées par votre adversaire. (Effet Rapide) : vous pouvez activer cet effet ; jusqu'à la fin de ce tour, les monstres contrôlés par votre adversaire dans la même colonne que les monstres "Notes Elfiques" que vous contrôlez ne peuvent pas être utilisés comme Matériel pour une Invocation Fusion, Synchro, Xyz ou Lien. Vous ne pouvez utiliser cet effet de "Junora le Mécène du Pouvoir de l'Accordage" qu'une fois par tour.
  | de_name            = Junora der Machtpatron der Abstimmung
  | de_text            = 1 Empfänger + 2 Nicht-Empfänger<br />Für die Synchrobeschwörung dieser Karte kannst du 1 Monster in deiner mittleren Main-Monsterzone als Empfänger behandeln. Falls diese Karte als Synchrobeschwörung beschworen wird: Du kannst die Effekte aller offenen Karten annullieren, die dein Gegner kontrolliert. (Schnelleffekt): Du kannst diesen Effekt aktivieren; Monster, die dein Gegner kontrolliert und die in derselben Spalte liegen wie die „Elfnote“-Monster, die du kontrollierst, können bis zum Ende dieses Spielzugs nicht als Material für eine Fusions-, Synchro-, Xyz- oder Linkbeschwörung verwendet werden. Du kannst diesen Effekt von „Junora der Machtpatron der Abstimmung“ nur einmal pro Spielzug verwenden.
  | it_name            = Junora il Patrono Potente della Sintonizzazione
  | it_text            = 1 Tuner + 2 non-Tuner<br />Per la Synchro Evocazione di questa carta, puoi considerare 1 mostro nella tua Zona Mostri Main centrale come un Tuner. Se questa carta viene Synchro Evocata: puoi annullare gli effetti di tutte le carte scoperte controllate dal tuo avversario. (Effetto Rapido): puoi attivare questo effetto; i mostri controllati dal tuo avversario nella stessa colonna di uno o più mostri "Elfnote" che controlli non possono essere utilizzati come materiale per un'Evocazione tramite Fusione, Synchro, Xyz o Link, fino alla fine di questo turno. Puoi utilizzare questo effetto di "Junora il Patrono Potente della Sintonizzazione" una sola volta per turno.
  | pt_name            = Junora, o Patrono do Poder da Afinação
  | pt_text            = 1 Regulador + 2 não-Reguladores<br />Para a Invocação-Sincro deste card, você pode considerar 1 monstro na sua Zona de Monstros Principal central como um Regulador. Se este card for Invocado por Invocação-Sincro: você pode negar os efeitos de todos os cards com a face para cima que seu oponente controla. (Efeito Rápido): você pode ativar este efeito; monstros que seu oponente controla na mesma coluna que um ou mais monstros "Elfnota" que você controla não podem ser usados como matéria para uma Invocação-Fusão, Sincro, Xyz ou Link, até o final deste turno. Você só pode usar este efeito de "Junora, o Patrono do Poder da Afinação" uma vez por turno.
  | es_name            = Junora el Modelo de Poder de Afinación
  | es_text            = 1 Cantante + 2 no Cantantes<br />Para la Invocación por Sincronía de esta carta, puedes tratar 1 monstruo en tu Zona de Monstruos Principal central como un Cantante. Si esta carta es Invocada por Sincronía: puedes negar los efectos de todas las cartas boca arriba que controle tu adversario. (Efecto Rápido): puedes activar este efecto; los monstruos que controla tu adversario en la misma columna que el monstruo o monstruos "Elfnota" que tú controlas no pueden ser usados como material para una Invocación por Fusión, Sincronía, Xyz o Enlace, hasta el final de este turno. Sólo puedes usar este efecto de "Junora el Modelo de Poder de Afinación" una vez por turno.
  | ja_text            = チューナー＋チューナー以外のモンスター２体<br />このカードをＳ召喚する場合、自分の中央のメインモンスターゾーンのモンスター１体をチューナーとして扱う事ができる。<br />このカード名の②の効果は１ターンに１度しか使用できない。<br />①：このカードがＳ召喚した場合に発動できる。相手フィールドの全ての表側表示カードの効果は無効化される。<br />②：自分・相手ターンに発動できる。自分フィールドの「エルフェンノーツ」モンスターと同じ縦列の、相手フィールドの全てのモンスターはターン終了時まで、融合・Ｓ・Ｘ・Ｌ召喚の素材にできない。
  | ko_name            = 조감옥신 쥬노라
  | ko_text            = 튜너 ＋ 튜너 이외의 몬스터 2장<br />이 카드를 싱크로 소환할 경우, 자신의 중앙 메인 몬스터 존의 몬스터 1장을 튜너로 취급할 수 있다.<br />이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 상대 필드의 모든 앞면 표시 카드의 효과는 무효화된다.<br />②: 자신 / 상대 턴에 발동할 수 있다. 자신 필드의 "엘펜노츠" 몬스터와 같은 세로열의, 상대 필드의 모든 몬스터는 턴 종료시까지, 융합 / 싱크로 / 엑시즈 / 링크 소환의 소재로 할 수 없다.
  | tc_name            = 調獄神 朱諾拉
  | tc_text            = 協調＋協調以外的怪獸2隻<br />此卡同步召喚的情況下，可將自己中央的主要怪獸區域的1隻怪獸視為協調。<br />此卡名的②效果1回合僅可使用1次。<br />①：此卡同步召喚的情況下可以發動。對手場上的所有表側表示卡的效果無效化。<br />②：在自己・對手回合中可以發動。與自己場上的「耀聖」怪獸同一縱列的、對手場上的所有怪獸直至回合結束時為止，不可作為融合・同步・超量・連結召喚的素材。
  | sc_name            = 调狱神 朱诺拉
  | sc_text            = 协调＋协调以外的怪兽2只<br />此卡同步召唤的情况下，可将自己中央的主要怪兽区域的1只怪兽视为协调。<br />此卡名的②效果1回合仅可使用1次。<br />①：此卡同步召唤的情况下可以发动。对手场上的所有表侧表示卡的效果无效化。<br />②：在自己・对手回合中可以发动。与自己场上的“耀圣”怪兽同一纵列的、对手场上的所有怪兽直至回合结束时为止，不可作为融合・同步・超量・连接召唤的素材。
  }}
