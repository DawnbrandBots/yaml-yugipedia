title: Hecahands Tartaros (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = N
  | card_type          = Spell
  | property           = Quick-Play
  | text               = Activate 1 of these effects (but you can only use each effect of "Hecahands Tartaros" once per turn);<br />●If you control a "Hecahands" monster: You can target 1 Spell/Trap your opponent controls; return it to the hand.<br />●Fusion Summon 1 "Hecahands" Fusion Monster from your Extra Deck, by banishing its materials from your field and/or GY. If you use a face-up monster you control that is owned by your opponent as material, you can treat it as a "Hecahands" monster.

  | fr_name            = Hécamains Tartaros
  | fr_text            = Activez 1 de ces effets (mais vous ne pouvez utiliser chaque effet de "Hécamains Tartaros" qu'une fois par tour) ;<br />●Si vous contrôlez un monstre "Hécamains" : vous pouvez cibler 1 Magie/Piège contrôlé par votre adversaire ; renvoyez-le à la main.<br />●Invoquez par Fusion 1 Monstre Fusion "Hécamains" depuis votre Extra Deck, en bannissant ses Matériels depuis votre Terrain et/ou Cimetière. Si vous utilisez un monstre face recto que vous contrôlez dont le propriétaire est votre adversaire comme Matériel, vous pouvez le traiter comme monstre "Hécamains".
  | de_name            = Hekahände-Tartaros
  | de_text            = Aktiviere 1 dieser Effekte (aber du kannst jeden Effekt von „Hekahände-Tartaros“ nur einmal pro Spielzug verwenden);<br />●Falls du ein „Hekahände“-Monster kontrollierst: Du kannst 1 Zauber/Falle wählen, den oder die dein Gegner kontrolliert; gib ihn oder sie auf die Hand zurück.<br />●Beschwöre 1 „Hekahände“-Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck, indem du sein Material von deiner Spielfeldseite und/oder deinem Friedhof verbannst. Falls du ein offenes Monster, das du kontrollierst und das dein Gegner besitzt, als Material verwendest, kannst du es als „Hekahände“-Monster behandeln.
  | it_name            = Tartaros Hecamani
  | it_text            = Attiva 1 di questi effetti (ma puoi utilizzare ogni effetto di "Tartaros Hecamani" una sola volta per turno);<br />●Se controlli un mostro "Hecamani": puoi scegliere come bersaglio 1 Magia/Trappola controllata dal tuo avversario; falla ritornare nella mano.<br />●Evoca tramite Fusione 1 Mostro Fusione "Hecamani" dal tuo Extra Deck, bandendo i suoi materiali dal tuo Terreno e/o Cimitero. Se utilizzi un mostro scoperto che controlli di proprietà del tuo avversario come materiale, puoi considerarlo come un mostro "Hecamani".
  | pt_name            = Hecamãos Tartaros
  | pt_text            = Ative 1 desses efeitos (mas você só pode usar cada efeito de "Hecamãos Tartaros" uma vez por turno);<br />●Se você controlar um monstro "Hecamãos": você pode escolher 1 Magia/Armadilha que seu oponente controla; devolva-a para a mão.<br />●Invoque por Invocação-Fusão 1 Monstro de Fusão "Hecamãos" do seu Deck Adicional, ao banir suas matérias do seu campo e/ou Cemitério. Se você usar um monstro com a face para cima que você controla do qual seu oponente seja dono como matéria, você pode considerá-lo como um monstro "Hecamãos".
  | es_name            = Hecamanos Tártaros
  | es_text            = Activa 1 de estos efectos (pero sólo puedes usar cada efecto de "Hecamanos Tártaros" una vez por turno);<br />●Si controlas un monstruo "Hecamanos": puedes seleccionar 1 Mágica/Trampa que controle tu adversario; devuélvela a la mano.<br />●Invoca por Fusión 1 Monstruo de Fusión "Hecamanos" desde tu Deck Extra, desterrando sus materiales en tu Campo y/o Cementerio. Si usas un monstruo boca arriba que controlas y que es propiedad de tu adversario como material, puedes tratarlo como un monstruo "Hecamanos".
  | ja_text            = ①：以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。<br />●自分フィールドに「ヘカトンケイル」モンスターが存在する場合、相手フィールドの魔法・罠カード１枚を対象として発動できる。そのカードを手札に戻す。<br />●自分のフィールド・墓地のモンスターを融合素材として除外し、「ヘカトンケイル」融合モンスター１体を融合召喚する。元々の持ち主が相手である自分フィールドの表側表示モンスターを融合素材とする場合、「ヘカトンケイル」モンスターとして扱う事ができる。
  | ko_name            = 헤카톤케일 타르타로스
  | ko_text            = ①: 이하의 효과에서 1개를 선택하고 발동할 수 있다(이 카드명의 이하의 효과는 각각 1턴에 1번밖에 선택할 수 없다).<br />●자신 필드에 "헤카톤케일" 몬스터가 존재할 경우, 상대 필드의 마법 / 함정 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 패로 되돌린다.<br />●자신의 필드 / 묘지의 몬스터를 융합 소재로서 제외하고, "헤카톤케일" 융합 몬스터 1장을 융합 소환한다. 원래의 주인이 상대인 자신 필드의 앞면 표시 몬스터를 융합 소재로 할 경우, "헤카톤케일" 몬스터로 취급할 수 있다.
  | tc_name            = 百臂無形幽獄 塔爾塔洛撕
  | tc_text            = ①：可從以下效果中選擇1個發動（此卡名的以下效果1回合僅可各選擇1次）。<br />●自己場上有「百臂無形」怪獸存在的情況下，以對手場上的1張魔法・陷阱卡為對象可以發動。將該卡放回手牌。<br />●將自己場上・墓地的怪獸作為融合素材除外，將1隻「百臂無形」融合怪獸融合召喚。要將原本持有者為對手的、自己場上的表側表示怪獸作為融合素材的情況下，可將其視為「百臂無形」怪獸。
  | sc_name            = 百臂无形幽狱 塔尔塔洛撕
  | sc_text            = ①：可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。<br />●自己场上有“百臂无形”怪兽存在的情况下，以对手场上的1张魔法・陷阱卡为对象可以发动。将该卡放回手牌。<br />●将自己场上・墓地的怪兽作为融合素材除外，将1只“百臂无形”融合怪兽融合召唤。要将原本持有者为对手的、自己场上的表侧表示怪兽作为融合素材的情况下，可将其视为“百臂无形”怪兽。
  }}
