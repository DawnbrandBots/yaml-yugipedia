title: Bot Herder (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | card_type          = Spell
  | property           = Normal
  | text               = Target 1 monster your opponent controls, that is a face-up monster you own or a face-down Defense Position monster; if that monster is no longer on the field, or is a monster you own (if face-down, reveal it briefly to check), apply these effects in sequence.<br />●Inflict 200 damage to your opponent.<br />●Take control of all monsters your opponent controls, except that monster.
  | releases           = 
  Legacy Pack; March 5, 2026

  | fr_name            = Contrôleur de Bots
  | fr_text            = Ciblez 1 monstre contrôlé par votre adversaire, qui est un monstre face recto que vous possédez ou un monstre en Position de Défense face verso ; si le monstre n'est plus sur le Terrain, ou est un monstre que vous possédez (s'il est face verso, révélez-le brièvement pour vérifier), appliquez ces effets dans l'ordre.<br />●Infligez 200 points de dommages à votre adversaire.<br />●Prenez le contrôle de tous les monstres contrôlés par votre adversaire (le monstre exclu).
  | de_name            = Bot-Hirte
  | de_text            = Wähle 1 Monster, das dein Gegner kontrolliert und das ein offenes Monster, das du besitzt, oder ein Monster in verdeckter Verteidigungsposition ist; falls jenes Monster nicht mehr auf dem Spielfeld liegt oder ein Monster ist, das du besitzt (falls verdeckt, zeige es zum Überprüfen kurz vor), führe nacheinander diese Effekte aus.<br />●Füge deinem Gegner 200 Schaden zu.<br />●Übernimm die Kontrolle über alle Monster, die dein Gegner kontrolliert, außer jenem Monster.
  | it_name            = Bot Herder
  | it_text            = Scegli come bersaglio 1 mostro controllato dal tuo avversario, che è un mostro scoperto di tua proprietà o un mostro coperto in Posizione di Difesa; se quel mostro non è più sul Terreno o se è un mostro di tua proprietà (se è coperto, rivelalo brevemente per controllare), applica questi effetti in ordine.<br />●Infliggi 200 danni al tuo avversario.<br />●Prendi il controllo di tutti i mostri controllati dal tuo avversario, eccetto quel mostro.
  | pt_name            = Controlador de Bots
  | pt_text            = Escolha 1 monstro que seu oponente controla, que seja um monstro com a face para cima do qual você seja dono ou um monstro com a face para baixo em Posição de Defesa; se esse monstro não estiver mais no campo, ou for um monstro do qual você seja dono (se estiver com a face para baixo, revele-o brevemente para verificar), aplique esses efeitos em sequência.<br />●Cause 200 de dano ao seu oponente.<br />●Tome o controle de todos os monstros que seu oponente controla, exceto esse monstro.
  | es_name            = Bot Herder
  | es_text            = Selecciona 1 monstruo que controle tu adversario, que sea un monstruo boca arriba que tú posees o un monstruo en Posición de Defensa boca abajo; si ese monstruo ya no está en el Campo, o es un monstruo que tú posees (si está boca abajo, muéstralo brevemente para comprobarlo), aplica estos efectos en secuencia.<br />●Inflige 200 puntos de daño a tu adversario.<br />●Toma el control de todos los monstruos que controle tu adversario, excepto el de ese monstruo.
  | ja_text            = ①：相手フィールドの、裏側守備表示モンスターまたは元々の持ち主が自分である表側表示モンスター１体を対象として発動できる。対象のモンスターが存在しない場合、または対象のモンスターの元々の持ち主が自分の場合（裏側表示カードはめくって確認する）、以下の効果をそれぞれ適用する。<br />●相手に２００ダメージを与える。<br />●対象のモンスターを除く、相手フィールドの全てのモンスターのコントロールを得る。
  | ko_name            = 봇 허더
  | ko_text            = ①: 상대 필드의, 뒷면 수비 표시 몬스터 또는 원래의 주인이 자신인 앞면 표시 몬스터 1장을 대상으로 하고 발동할 수 있다. 대상 몬스터가 존재하지 않을 경우, 또는 대상 몬스터의 원래의 주인이 자신일 경우(뒷면 표시 카드는 넘겨서 확인한다), 이하의 효과를 각각 적용한다.<br />●상대에게 200 데미지를 준다.<br />●대상 몬스터가 아닌, 상대 필드의 모든 몬스터의 컨트롤을 얻는다.
  | tc_name            = 機器牧者
  | tc_text            = ①：以對手場上的1隻裡側守備表示怪獸或原本的持有者為自己的表側表示怪獸為對象可以發動。對象怪獸不存在的情況下，或對象怪獸的原本的持有者為自己的情況下（裡側表示卡翻開確認），分別適用以下效果。<br />●給予對手200傷害。<br />●獲得除對象怪獸外的、對手場上的所有怪獸的控制權。
  | sc_name            = 机器牧者
  | sc_text            = ①：以对手场上的1只里侧守备表示怪兽或原本的持有者为自己的表侧表示怪兽为对象可以发动。对象怪兽不存在的情况下，或对象怪兽的原本的持有者为自己的情况下（里侧表示卡翻开确认），分别适用以下效果。<br />●给予对手200伤害。<br />●获得除对象怪兽外的、对手场上的所有怪兽的控制权。
  }}
