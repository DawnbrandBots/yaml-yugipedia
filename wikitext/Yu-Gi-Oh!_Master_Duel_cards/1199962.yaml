  | text               = If you control a "Tri-Brigade" or "Springans" monster, except "Tri-Brigade Springans Kitt": You can Special Summon this card from your hand. If this card is sent to the GY: You can Special Summon 1 of the following monsters from your GY in Defense Position, except "Tri-Brigade Springans Kitt".<br />●"Tri-Brigade" monster<br />●"Springans" monster<br />●"Fallen of Albaz" or 1 monster that mentions it<br />You can only use each effect of "Tri-Brigade Springans Kitt" once per turn.

  | fr_name            = Kitt Springans Tri-Brigade
  | fr_text            = Si vous contrôlez un monstre "Tri-Brigade" ou "Springans" ("Kitt Springans Tri-Brigade" exclu) : vous pouvez Invoquer Spécialement cette carte depuis votre main. Si cette carte est envoyée au Cimetière : vous pouvez Invoquer Spécialement 1 des monstres suivants ("Kitt Springans Tri-Brigade" exclu) depuis votre Cimetière en Position de Défense.<br />●Monstre "Tri-Brigade"<br />●Monstre "Springans"<br />●"Albaz le Déchu" ou 1 monstre qui le mentionne<br />Vous ne pouvez utiliser chaque effet de "Kitt Springans Tri-Brigade" qu'une fois par tour.
  | de_name            = Sta-Brigade Springans Kitt
  | de_text            = Falls du ein „Sta-Brigade“- oder „Springans“-Monster kontrollierst, außer „Sta-Brigade Springans Kitt“: Du kannst diese Karte als Spezialbeschwörung von deiner Hand beschwören. Falls diese Karte auf den Friedhof gelegt wird: Du kannst 1 der folgenden Monster als Spezialbeschwörung von deinem Friedhof in die Verteidigungsposition beschwören, außer „Sta-Brigade Springans Kitt“.<br />●„Sta-Brigade“-Monster<br />●„Springans“-Monster<br />●„Gefallener von Albaz“ oder 1 Monster, das ihn erwähnt<br />Du kannst jeden Effekt von „Sta-Brigade Springans Kitt“ nur einmal pro Spielzug verwenden.
  | it_name            = Tri-Brigata Springans Kitt
  | it_text            = Se controlli un mostro "Tri-Brigata" o "Springans", eccetto "Tri-Brigata Springans Kitt": puoi Evocare Specialmente questa carta dalla tua mano. Se questa carta viene mandata al Cimitero: puoi Evocare Specialmente 1 dei seguenti mostri dal tuo Cimitero in Posizione di Difesa, eccetto "Tri-Brigata Springans Kitt".<br />●Mostro "Tri-Brigata"<br />●Mostro "Springans"<br />●"Caduto di Albaz" o 1 mostro che lo menziona<br />Puoi utilizzare ogni effetto di "Tri-Brigata Springans Kitt" una sola volta per turno.
  | pt_name            = Springans Kitt da Tri-Brigada
  | pt_text            = Se você controlar um monstro "Tri-Brigada" ou "Springans", exceto "Springans Kitt da Tri-Brigada": você pode Invocar este card por Invocação-Especial da sua mão. Se este card for enviado para o Cemitério: você pode Invocar por Invocação-Especial 1 dos seguintes monstros do seu Cemitério em Posição de Defesa, exceto "Springans Kitt da Tri-Brigada".<br />●Monstro "Tri-Brigada"<br />●Monstro "Springans"<br />●"Caído de Arbaz" ou 1 monstro que o mencione<br />Você só pode usar cada efeito de "Springans Kitt da Tri-Brigada" uma vez por turno.
  | es_name            = Tri-Brigada Springans Kitt
  | es_text            = Si controlas un monstruo "Tri-Brigada" o "Springans", excepto "Tri-Brigada Springans Kitt": puedes Invocar esta carta de Modo Especial desde tu mano. Si esta carta es mandada al Cementerio: puedes Invocar de Modo Especial 1 de los siguientes monstruos desde tu Cementerio en Posición de Defensa, excepto "Tri-Brigada Springans Kitt".<br />●Monstruo "Tri-Brigada"<br />●Monstruo "Springans"<br />●"Caído de Albaz" o 1 monstruo que lo mencione<br />Sólo puedes usar cada efecto de "Tri-Brigada Springans Kitt" una vez por turno.
  | ja_text            = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：自分フィールドに「鉄獣の炎工　キット」以外の、「トライブリゲード」モンスターか「スプリガンズ」モンスターが存在する場合に発動できる。このカードを手札から特殊召喚する。<br />②：このカードが墓地へ送られた場合に発動できる。「鉄獣の炎工　キット」を除く、以下のモンスターの内１体を自分の墓地から守備表示で特殊召喚する。<br />●「トライブリゲード」モンスター<br />●「スプリガンズ」モンスター<br />●「アルバスの落胤」またはそのカード名が記されたモンスター
  | ko_name            = 트라이브리게이드 스프리건즈 키트
  | ko_text            = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 필드에 "트라이브리게이드 스프리건즈 키트" 이외의, "트라이브리게이드" 몬스터나 "스프리건즈" 몬스터가 존재할 경우에 발동할 수 있다. 이 카드를 패에서 특수 소환한다.<br />②: 이 카드가 묘지로 보내졌을 경우에 발동할 수 있다. "트라이브리게이드 스프리건즈 키트"가 아닌, 이하의 몬스터 중 1장을 자신 묘지에서 수비 표시로 특수 소환한다.<br />●"트라이브리게이드" 몬스터<br />●"스프리건즈" 몬스터<br />●"알버스의 낙윤" 또는 그 카드명이 쓰여진 몬스터
  | tc_name            = 鐵獸守寶團 炎工之姬特
  | tc_text            = 此卡名的①②效果1回合僅可各使用1次。<br />①：自己場上存在「鐵獸守寶團 炎工之姬特」以外的「鐵獸」怪獸或「守寶團」怪獸的情況下可以發動。從手牌將此卡特殊召喚。<br />②：此卡被送至墓地的情況下可以發動。從自己墓地將除「鐵獸守寶團 炎工之姬特」以外的以下怪獸中的1隻以守備表示特殊召喚。<br />●「鐵獸」怪獸<br />●「守寶團」怪獸<br />●「阿爾白斯之落胤」或記載有該卡名的怪獸
  | sc_name            = 铁兽守宝团 炎工之姬特
  | sc_text            = 此卡名的①②效果1回合仅可各使用1次。<br />①：自己场上存在“铁兽守宝团 炎工之姬特”以外的“铁兽”怪兽或“守宝团”怪兽的情况下可以发动。从手牌将此卡特殊召唤。<br />②：此卡被送至墓地的情况下可以发动。从自己墓地将除“铁兽守宝团 炎工之姬特”以外的以下怪兽中的1只以守备表示特殊召唤。<br />●“铁兽”怪兽<br />●“守宝团”怪兽<br />●“阿尔白斯之落胤”或记载有该卡名的怪兽
  }}
