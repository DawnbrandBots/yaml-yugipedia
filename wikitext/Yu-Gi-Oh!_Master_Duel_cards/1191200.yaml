title: Hecahands Bait (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = N
  | card_type          = Trap
  | property           = Continuous
  | text               = You can Tribute 1 "Hecahands" monster, or 1 monster you control that is owned by your opponent; take control of 1 monster your opponent controls. You can only use this effect of "Hecahands Bait" once per turn. Once per turn, during your End Phase: Send 1 card you control to the GY.

  | fr_name            = Appât d'Hécamains
  | fr_text            = Vous pouvez Sacrifier 1 monstre "Hécamains", ou 1 monstre que vous contrôlez dont le propriétaire est votre adversaire ; prenez le contrôle d'1 monstre contrôlé par votre adversaire. Vous ne pouvez utiliser cet effet de "Appât d'Hécamains" qu'une fois par tour. Une fois par tour, durant votre End Phase : envoyez 1 carte que vous contrôlez au Cimetière.
  | de_name            = Hekahände-Köder
  | de_text            = Du kannst 1 „Hekahände“-Monster oder 1 Monster, das du kontrollierst und das dein Gegner besitzt, als Tribut anbieten; übernimm die Kontrolle über 1 Monster, das dein Gegner kontrolliert. Du kannst diesen Effekt von „Hekahände-Köder“ nur einmal pro Spielzug verwenden. Einmal pro Spielzug, während deiner End Phase: Lege 1 Karte, die du kontrollierst, auf den Friedhof.
  | it_name            = Esca Hecamani
  | it_text            = Puoi offrire come Tributo 1 mostro "Hecamani", o 1 mostro che controlli di proprietà del tuo avversario; prendi il controllo di 1 mostro controllato dal tuo avversario. Puoi utilizzare questo effetto di "Esca Hecamani" una sola volta per turno. Una volta per turno, durante la tua End Phase: manda 1 carta che controlli al Cimitero.
  | pt_name            = Isca de Hecamãos
  | pt_text            = Você pode oferecer como Tributo 1 monstro "Hecamãos", ou 1 monstro que você controla do qual seu oponente seja dono; tome o controle de 1 monstro que seu oponente controla. Você só pode usar este efeito de "Isca de Hecamãos" uma vez por turno. Uma vez por turno, durante sua Fase Final: envie 1 card que você controla para o Cemitério.
  | es_name            = Cebo Hecamanos
  | es_text            = Puedes Sacrificar 1 monstruo "Hecamanos" o 1 monstruo que controles que sea propiedad de tu adversario; toma el control de 1 monstruo que controle tu adversario. Sólo puedes usar este efecto de "Cebo Hecamanos" una vez por turno. Una vez por turno, durante tu End Phase: manda al Cementerio 1 carta que controles.
  | ja_text            = このカード名の①の効果は１ターンに１度しか使用できない。<br />①：自分フィールドの、「ヘカトンケイル」モンスターまたは元々の持ち主が相手であるモンスター１体をリリースして発動できる。相手フィールドのモンスター１体のコントロールを得る。<br />②：自分エンドフェイズに発動する。自分フィールドのカード１枚を墓地へ送る。
  | ko_name            = 바이트 알 헤카톤케일
  | ko_text            = 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 필드의, "헤카톤케일" 몬스터 또는 원래의 주인이 상대인 몬스터 1장을 릴리스하고 발동할 수 있다. 상대 필드의 몬스터 1장의 컨트롤을 얻는다.<br />②: 자신 엔드 페이즈에 발동한다. 자신 필드의 카드 1장을 묘지로 보낸다.
  | tc_name            = 百臂無形引導手
  | tc_text            = 此卡名的①效果1回合僅可使用1次。<br />①：解放自己場上的1隻「百臂無形」怪獸或原本持有者為對手的怪獸可以發動。獲得對手場上的1隻怪獸的控制權。<br />②：在自己的結束階段發動。將自己場上的1張卡送至墓地。
  | sc_name            = 百臂无形引导手
  | sc_text            = 此卡名的①效果1回合仅可使用1次。<br />①：解放自己场上的1只“百臂无形”怪兽或原本持有者为对手的怪兽可以发动。获得对手场上的1只怪兽的控制权。<br />②：在自己的结束阶段发动。将自己场上的1张卡送至墓地。
  }}
