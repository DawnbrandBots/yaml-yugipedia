title: Sandwich Day (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = UR
  | card_type          = Spell
  | property           = Normal
  | text               = If you have a monster in your GY: Pay 200 LP; draw 1 card and reveal it, then, if it is a monster, apply this effect based on its Attribute.<br />●An Attribute not in your GY: Draw 1 card.<br />●An Attribute in your GY: Discard 1 card.<br />You can only activate 1 "Sandwich Day" per turn.

  | fr_name            = Journée du Sandwich
  | fr_text            = Si vous avez un monstre dans votre Cimetière : payez 200 LP ; piochez 1 carte et révélez-la, puis, si c'est un monstre, appliquez cet effet selon son Attribut.<br />●Un Attribut non dans votre Cimetière : Piochez 1 carte.<br />●Un Attribut dans votre Cimetière : Défaussez 1 carte.<br />Vous ne pouvez activer qu'1 "Journée du Sandwich" par tour.
  | de_name            = Sandwich-Tag
  | de_text            = Falls du ein Monster in deinem Friedhof hast: Zahle 200 LP; ziehe 1 Karte und zeige sie vor, dann, falls es ein Monster ist, führe diesen Effekt aus, basierend auf seiner Eigenschaft.<br />●Eine Eigenschaft nicht in deinem Friedhof: Ziehe 1 Karte.<br />●Eine Eigenschaft in deinem Friedhof: Wirf 1 Karte ab.<br />Du kannst nur 1 „Sandwich-Tag“ pro Spielzug aktivieren.
  | it_name            = Giorno del Panino
  | it_text            = Se hai un mostro nel tuo Cimitero: paga 200 LP; pesca 1 carta e rivelala, poi, se è un mostro, applica questo effetto a seconda del suo Attributo.<br />●Un Attributo non nel tuo Cimitero: Pesca 1 carta.<br />●Un Attributo nel tuo Cimitero: Scarta 1 carta.<br />Puoi attivare solo 1 "Giorno del Panino" per turno.
  | pt_name            = Dia do Sanduíche
  | pt_text            = Se você tiver um monstro no seu Cemitério: pague 200 PV; compre 1 card e revele-o e, depois, se for um monstro, aplique este efeito de acordo com o Atributo dele.<br />●Um Atributo que não estiver no seu Cemitério: Compre 1 card.<br />●Um Atributo no seu Cemitério: Descarte 1 card.<br />Você só pode ativar 1 "Dia do Sanduíche" por turno.
  | es_name            = Día de Sándwich
  | es_text            = Si tienes un monstruo en tu Cementerio: paga 200 LP; roba 1 carta y muéstrala y después, si es un monstruo, aplica este efecto basado en su Atributo.<br />●Un Atributo que no está en tu Cementerio: Roba 1 carta.<br />●Un Atributo que está en tu Cementerio: Descarta 1 carta.<br />Sólo puedes activar 1 "Día de Sándwich" por turno.
  | ja_text            = このカード名のカードは１ターンに１枚しか発動できない。<br />①：自分の墓地にモンスターが存在する場合、２００ＬＰを払って発動できる。自分は１枚ドローし、お互いに確認する。それがモンスターだった場合、さらにその属性によって以下の効果を適用する。<br />●自分の墓地に存在しない属性：自分は１枚ドローする。<br />●自分の墓地に存在する属性：自分の手札を１枚選んで捨てる。
  | ko_name            = 드로우빵
  | ko_text            = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다.<br />①: 자신 묘지에 몬스터가 존재할 경우, 200 LP를 지불하고 발동할 수 있다. 자신은 1장 드로우하고, 서로 확인한다. 그것이 몬스터였을 경우, 추가로 그 속성에 따라 이하의 효과를 적용한다.<br />●자신 묘지에 존재하지 않는 속성: 자신은 1장 드로우한다.<br />●자신 묘지에 존재하는 속성: 자신의 패를 1장 고르고 버린다.
  | tc_name            = 抽牌麵包
  | tc_text            = 此卡名的卡1回合僅可發動1張。<br />①：自己墓地存在怪獸的情況下，支付200LP可以發動。自己抽1張，給雙方確認。其為怪獸的情況下，進而根據其屬性適用以下效果。<br />●自己墓地中不存在的屬性：自己抽1張。<br />●自己墓地中存在的屬性：挑選自己的1張手牌捨棄。
  | sc_name            = 抽牌面包
  | sc_text            = 此卡名的卡1回合仅可发动1张。<br />①：自己墓地存在怪兽的情况下，支付200LP可以发动。自己抽1张，给双方确认。其为怪兽的情况下，进而根据其属性适用以下效果。<br />●自己墓地中不存在的属性：自己抽1张。<br />●自己墓地中存在的属性：挑选自己的1张手牌舍弃。
  }}
