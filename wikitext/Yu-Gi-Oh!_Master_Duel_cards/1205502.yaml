title: Lycoris Lilyreaper (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | attribute          = DARK
  | types              = Plant / Synchro / Effect
  | level              = 5
  | atk                = 800
  | def                = 2400
  | text               = 1 Tuner + 1+ non-Tuner monsters<br />If a monster(s) is sent from the field to your opponent's GY, while this card is in your Monster Zone, even during the Damage Step: You can gain LP equal to 1 of those monsters' ATK in their GY. If your opponent takes effect damage, while this card is in your GY (except during the Damage Step): You can banish this card; send 1 monster from the field to the GY with ATK less than or equal to the difference in your LP and your opponent's. You can only use each effect of "Lycoris Lilyreaper" once per turn.

  | fr_name            = Lilyfaucheuse Lycoris
  | fr_text            = 1 Syntoniseur + 1+ monstre non-Syntoniseur<br />Si un ou plusieurs monstres sont envoyés depuis le Terrain au Cimetière de votre adversaire, tant que cette carte est dans votre Zone Monstre, même durant la Damage Step : vous pouvez gagner des LP égaux à l'ATK d'1 de ces monstres dans son Cimetière. Si votre adversaire reçoit des dommages d'effet, tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez bannir cette carte ; envoyez 1 monstre depuis le Terrain au Cimetière avec une ATK inférieure ou égale à la différence de vos LP et ceux de votre adversaire. Vous ne pouvez utiliser chaque effet de "Lilyfaucheuse Lycoris" qu'une fois par tour.
  | de_name            = Spinnenlilien-Sensenmann
  | de_text            = 1 Empfänger + 1+ Nicht-Empfänger-Monster<br />Falls ein oder mehr Monster vom Spielfeld auf den Friedhof deines Gegners gelegt werden, solange sich diese Karte in deiner Monsterzone befindet, selbst während des Damage Steps: Du kannst LP in Höhe der ATK von 1 jener Monster in seinem Friedhof erhalten. Falls dein Gegner Effektschaden erhält, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte verbannen; lege 1 Monster, dessen ATK kleiner oder gleich der Differenz deiner LP und der deines Gegners sind, vom Spielfeld auf den Friedhof. Du kannst jeden Effekt von „Spinnenlilien-Sensenmann“ nur einmal pro Spielzug verwenden.
  | it_name            = Lycoris Gigliomietitore
  | it_text            = 1 Tuner + 1+ mostri non-Tuner<br />Se uno o più mostri vengono mandati dal Terreno al Cimitero del tuo avversario, mentre questa carta è nella tua Zona Mostri, anche durante il Damage Step: puoi guadagnare LP pari all'ATK di 1 di quei mostri nel suo Cimitero. Se il tuo avversario subisce danno da effetto, mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi bandire questa carta; manda dal Terreno al Cimitero 1 mostro con ATK pari o inferiore alla differenza tra i tuoi LP e quelli del tuo avversario. Puoi utilizzare ogni effetto di "Lycoris Gigliomietitore" una sola volta per turno.
  | pt_name            = Lycoris Lírioceifadora
  | pt_text            = 1 Regulador + 1+ monstros não-Reguladores<br />Se um ou mais monstros forem enviados do campo para o Cemitério do seu oponente, enquanto este card estiver na sua Zona de Monstros, mesmo durante a Etapa de Dano: você pode ganhar PV igual ao ATK de 1 desses monstros no Cemitério dele. Se seu oponente sofrer dano de efeito, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode banir este card; envie 1 monstro do campo para o Cemitério com ATK igual ou menor que a diferença entre seus PV e os do seu oponente. Você só pode usar cada efeito de "Lycoris Lírioceifadora" uma vez por turno.
  | es_name            = Lycoris LiriParca
  | es_text            = 1 Cantante + 1+ monstruos que no sean Cantantes<br />Si uno o más monstruos son mandados del Campo al Cementerio de tu adversario, mientras esta carta está en tu Zona de Monstruos, incluso durante el Damage Step: puedes ganar LP iguales al ATK de 1 de esos monstruos en su Cementerio. Si tu adversario recibe daño de efecto, mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes desterrar esta carta; manda al Cementerio 1 monstruo en el Campo con ATK menor o igual a la diferencia entre tus LP y los de tu adversario. Sólo puedes usar cada efecto de "Lycoris LiriParca" una vez por turno.
  | ja_text            = チューナー＋チューナー以外のモンスター１体以上<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードがモンスターゾーンに存在する状態で、他のモンスターがフィールドから相手の墓地へ送られた場合に発動できる（ダメージステップでも発動可能）。その内の１体の攻撃力分だけ自分のＬＰを回復する。<br />②：このカードが墓地に存在する状態で、相手が効果ダメージを受けた場合、このカードを除外して発動できる。お互いのＬＰの差の数値以下の攻撃力を持つフィールドのモンスター１体を墓地へ送る。
  | ko_name            = 리코리스 릴리퍼
  | ko_text            = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드가 몬스터 존에 존재하는 상태에서, 다른 몬스터가 필드에서 상대 묘지로 보내졌을 경우에 발동할 수 있다(데미지 스텝에도 발동 가능). 그 중의 1장의 공격력만큼만 자신의 LP를 회복한다.<br />②: 이 카드가 묘지에 존재하는 상태에서, 상대가 효과 데미지를 받았을 경우, 이 카드를 제외하고 발동할 수 있다. 서로의 LP의 차의 수치 이하의 공격력을 가지는 필드의 몬스터 1장을 묘지로 보낸다.
  | tc_name            = 紅鐮華
  | tc_text            = 協調＋協調以外的怪獸1隻以上<br />此卡名的①②效果1回合僅可各使用1次。<br />①：此卡存在於怪獸區域的狀態下，其他怪獸從場上被送至對手墓地的情況下可以發動（傷害步驟也可以發動）。依其中1隻的攻擊力的數值回復自己的LP。<br />②：此卡存在於墓地的狀態下，對手受到效果傷害的情況下，將此卡除外可以發動。將場上的1隻攻擊力在雙方LP的數值之差以下的怪獸送至墓地。
  | sc_name            = 红镰华
  | sc_text            = 协调＋协调以外的怪兽1只以上<br />此卡名的①②效果1回合仅可各使用1次。<br />①：此卡存在于怪兽区域的状态下，其他怪兽从场上被送至对手墓地的情况下可以发动（伤害步骤也可以发动）。依其中1只的攻击力的数值恢复自己的LP。<br />②：此卡存在于墓地的状态下，对手受到效果伤害的情况下，将此卡除外可以发动。将场上的1只攻击力在双方LP的数值之差以下的怪兽送至墓地。
  }}
