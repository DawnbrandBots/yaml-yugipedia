title: Shiina, Twin Tempests of Celestial Thunder (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = UR
  | attribute          = WIND
  | types              = Dragon / Effect
  | level              = 9
  | atk                = 2900
  | def                = 1500
  | text               = The first time this card would be destroyed by battle each turn, it is not destroyed. When your opponent activates a card or effect, while you control a WIND monster (Quick Effect): You can Special Summon this card from your hand, then apply the following effect based on what was activated.<br />●Monster: Return all face-up monsters on the field to the hand, except "Shiina, Twin Tempests of Celestial Thunder".<br />●Spell/Trap: Return all Spells/Traps on the field to the hand.<br />You can only use this effect of "Shiina, Twin Tempests of Celestial Thunder" once per turn.

  | fr_name            = Shiina, Double Tempête du Tonnerre Céleste
  | fr_text            = La première fois que cette carte va être détruite au combat chaque tour, elle n'est pas détruite. Lorsque votre adversaire active une carte ou un effet, tant que vous contrôlez un monstre VENT (Effet Rapide) : vous pouvez Invoquer Spécialement cette carte depuis votre main, puis appliquez l'effet suivant selon ce qui a été activé.<br />●Monstre : Renvoyez tous les monstres face recto ("Shiina, Double Tempête du Tonnerre Céleste" exclu) sur le Terrain à la main.<br />●Magie/Piège : Renvoyez toutes les Magies et tous les Pièges sur le Terrain à la main.<br />Vous ne pouvez utiliser cet effet de "Shiina, Double Tempête du Tonnerre Céleste" qu'une fois par tour.
  | de_name            = Shiina, Zwillingsstürme des himmlischen Donners
  | de_text            = Das erste Mal in jedem Spielzug, dass diese Karte durch Kampf zerstört würde, wird sie nicht zerstört. Wenn dein Gegner eine Karte oder einen Effekt aktiviert, solange du ein WIND Monster kontrollierst (Schnelleffekt): Du kannst diese Karte als Spezialbeschwörung von deiner Hand beschwören, dann führe den folgenden Effekt aus, basierend darauf, was aktiviert wurde.<br />●Monster: Gib alle offenen Monster vom Spielfeld auf die Hand zurück, außer „Shiina, Zwillingsstürme des himmlischen Donners“.<br />●Zauber/Falle: Gib alle Zauber/Fallen vom Spielfeld auf die Hand zurück.<br />Du kannst diesen Effekt von „Shiina, Zwillingsstürme des himmlischen Donners“ nur einmal pro Spielzug verwenden.
  | it_name            = Shiina, Tempeste Gemelle del Tuono Celestiale
  | it_text            = La prima volta che questa carta sta per essere distrutta in battaglia ogni turno, essa non viene distrutta. Quando il tuo avversario attiva una carta o un effetto, mentre controlli un mostro VENTO (Effetto Rapido): puoi Evocare Specialmente questa carta dalla tua mano, poi applicare il seguente effetto a seconda di cosa è stato attivato.<br />●Mostro: Fai ritornare nella mano tutti i mostri scoperti sul Terreno, eccetto "Shiina, Tempeste Gemelle del Tuono Celestiale".<br />●Magia/Trappola: Fai ritornare nella mano tutte le Magie/Trappole sul Terreno.<br />Puoi utilizzare questo effetto di "Shiina, Tempeste Gemelle del Tuono Celestiale" una sola volta per turno.
  | pt_name            = Shiina, Tempestades Gêmeas do Trovão Celestial
  | pt_text            = Na primeira vez que este card seria destruído em batalha a cada turno, ele não é destruído. Quando seu oponente ativar um card ou efeito, enquanto você controlar um monstro de VENTO (Efeito Rápido): você pode Invocar este card por Invocação-Especial da sua mão e, depois, aplique o seguinte efeito de acordo com o que foi ativado.<br />●Monstro: Devolva para a mão todos os monstros com a face para cima no campo, exceto "Shiina, Tempestades Gêmeas do Trovão Celestial".<br />●Magia/Armadilha: Devolva para a mão todas as Magias/Armadilhas no campo.<br />Você só pode usar este efeito de "Shiina, Tempestades Gêmeas do Trovão Celestial" uma vez por turno.
  | es_name            = Shiina, Tormentas Gemelas del Trueno Celestial
  | es_text            = La primera vez que esta carta fuera a ser destruida en batalla cada turno, no es destruida. Cuando tu adversario activa una carta o efecto, mientras controlas un monstruo de VIENTO (Efecto Rápido): puedes Invocar esta carta de Modo Especial desde tu mano, y después aplica el siguiente efecto basado en qué fue activado.<br />●Monstruo: Devuelve a la mano todos los monstruos boca arriba en el Campo, excepto "Shiina, Tormentas Gemelas del Trueno Celestial".<br />●Mágica/Trampa: Devuelve a la mano todas las Mágicas/Trampas en el Campo.<br />Sólo puedes usar este efecto de "Shiina, Tormentas Gemelas del Trueno Celestial" una vez por turno.
  | ja_text            = このカード名の①の効果は１ターンに１度しか使用できない。<br />①：自分フィールドに風属性モンスターが存在し、相手が魔法・罠・モンスターの効果を発動した時に発動できる。このカードを手札から特殊召喚する。その後、その相手の効果の種類によって以下の効果を適用する。<br />●モンスター：「天雷ノ双風神　シーナ」以外のフィールドの表側表示モンスターを全て手札に戻す。<br />●魔法・罠：フィールドの魔法・罠カードを全て手札に戻す。<br />②：このカードは１ターンに１度だけ戦闘では破壊されない。
  | ko_name            = 천뢰의 쌍풍신 시이나
  | ko_text            = 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 필드에 바람 속성 몬스터가 존재하고, 상대가 마법 / 함정 / 몬스터의 효과를 발동했을 때에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 그 후, 그 상대 효과의 종류에 따라 이하의 효과를 적용한다.<br />●몬스터: "천뢰의 쌍풍신 시이나" 이외의 필드의 앞면 표시 몬스터를 전부 패로 되돌린다.<br />●마법 / 함정: 필드의 마법 / 함정 카드를 전부 패로 되돌린다.<br />②: 이 카드는 1턴에 1번만 전투로는 파괴되지 않는다.
  | tc_name            = 天雷之雙風神 息那
  | tc_text            = 此卡名的①效果1回合僅可使用1次。<br />①：自己場上存在風屬性怪獸，且對手發動魔法・陷阱・怪獸的效果時可以發動。從手牌將此卡特殊召喚。然後，根據該對手的效果的種類，適用以下效果。<br />●怪獸：將「天雷之雙風神 息那」以外的場上的表側表示怪獸全部放回手牌。<br />●魔法・陷阱：將場上的魔法・陷阱卡全部放回手牌。<br />②：此卡1回合僅1次，不會因戰鬥被破壞。
  | sc_name            = 天雷之双风神 息那
  | sc_text            = 此卡名的①效果1回合仅可使用1次。<br />①：自己场上存在风属性怪兽，且对手发动魔法・陷阱・怪兽的效果时可以发动。从手牌将此卡特殊召唤。然后，根据该对手的效果的种类，适用以下效果。<br />●怪兽：将“天雷之双风神 息那”以外的场上的表侧表示怪兽全部放回手牌。<br />●魔法・陷阱：将场上的魔法・陷阱卡全部放回手牌。<br />②：此卡1回合仅1次，不会因战斗被破坏。
  }}
