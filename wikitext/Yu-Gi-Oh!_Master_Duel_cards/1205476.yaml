  | text               = 1 Tuner + 1+ EARTH monsters<br />If this card is Synchro Summoned: You can add 1 "Saber" or "Gottoms" Spell/Trap from your Deck to your hand. When this card inflicts battle damage to your opponent: You can discard 1 random card from their hand. When your "X-Saber" monster is targeted for an attack while this card is in your GY: You can Special Summon this card, then change the attack target to this card. You can only use each effect of "X-Saber Gottoms" once per turn.

  | fr_name            = Gottoms, Sabre X
  | fr_text            = 1 Syntoniseur + 1+ monstre TERRE<br />Si cette carte est Invoquée par Synchronisation : vous pouvez ajouter 1 Magie/Piège "Sabre" ou "Gottoms" depuis votre Deck à votre main. Lorsque cette carte inflige des dommages de combat à votre adversaire : vous pouvez lui défausser 1 carte au hasard. Lorsque votre monstre "Sabre X" est ciblé par une attaque tant que cette carte est dans votre Cimetière : vous pouvez Invoquer Spécialement cette carte, puis transférez la cible de l'attaque sur cette carte. Vous ne pouvez utiliser chaque effet de "Gottoms, Sabre X" qu'une fois par tour.
  | de_name            = X-Säbel Gottoms
  | de_text            = 1 Empfänger + 1+ ERDE Monster<br />Falls diese Karte als Synchrobeschwörung beschworen wird: Du kannst deiner Hand 1 „Säbel“- oder „Gottoms“-Zauber/Falle von deinem Deck hinzufügen. Wenn diese Karte deinem Gegner Kampfschaden zufügt: Du kannst 1 zufällige Karte von seiner Hand abwerfen. Wenn dein „X-Säbel“-Monster als Angriffsziel gewählt wird, solange sich diese Karte in deinem Friedhof befindet: Du kannst diese Karte als Spezialbeschwörung beschwören, dann ändere das Angriffsziel auf diese Karte. Du kannst jeden Effekt von „X-Säbel Gottoms“ nur einmal pro Spielzug verwenden.
  | it_name            = Sciabola-X Gottoms
  | it_text            = 1 Tuner + 1+ mostri TERRA<br />Se questa carta viene Synchro Evocata: puoi aggiungere 1 Magia/Trappola "Sciabola" o "Gottoms" dal tuo Deck alla tua mano. Quando questa carta infligge danno da combattimento al tuo avversario: puoi scartare 1 carta a caso dalla sua mano. Quando un tuo mostro "Sciabola-X" viene scelto come bersaglio per un attacco mentre questa carta è nel tuo Cimitero: puoi Evocare Specialmente questa carta, poi cambiare il bersaglio dell'attacco su questa carta. Puoi utilizzare ogni effetto di "Sciabola-X Gottoms" una sola volta per turno.
  | pt_name            = Sabre-X Gottoms
  | pt_text            = 1 Regulador + 1+ monstros de TERRA<br />Se este card for Invocado por Invocação-Sincro: você pode adicionar 1 Magia/Armadilha "Sabre" ou "Gottoms" do seu Deck à sua mão. Quando este card causar dano de batalha ao seu oponente: você pode descartar 1 card aleatório da mão dele. Quando um monstro "Sabre-X" seu for escolhido como alvo de um ataque enquanto este card estiver no seu Cemitério: você pode Invocar este card por Invocação-Especial e, depois, mude o alvo do ataque para este card. Você só pode usar cada efeito de "Sabre-X Gottoms" uma vez por turno.
  | es_name            = Sable-X Gottoms
  | es_text            = 1 Cantante + 1+ monstruos de TIERRA<br />Si esta carta es Invocada por Sincronía: puedes añadir a tu mano 1 Mágica/Trampa "Sable" o "Gottom" en tu Deck. Cuando esta carta inflige daño de batalla a tu adversario: puedes descartar 1 carta al azar en su mano. Cuando tu monstruo "Sable-X" es seleccionado para un ataque mientras esta carta esté en tu Cementerio: puedes Invocar esta carta de Modo Especial, y después cambiar el objetivo del ataque a esta carta. Sólo puedes usar cada efecto de "Sable-X Gottoms" una vez por turno.
  | ja_text            = チューナー＋地属性モンスター１体以上<br />このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードがＳ召喚した場合に発動できる。デッキから「セイバー」魔法・罠カードか「ガトムズ」魔法・罠カード１枚を手札に加える。<br />②：このカードが相手に戦闘ダメージを与えた時に発動できる。相手の手札をランダムに１枚捨てる。<br />③：このカードが墓地に存在する状態で、自分の「Ｘ－セイバー」モンスターが攻撃対象に選択された時に発動できる。このカードを特殊召喚する。その後、攻撃対象をこのカードに移し替える。
  | ko_name            = X－세이버 가톰즈
  | ko_text            = 튜너 ＋ 땅 속성 몬스터 1장 이상<br />이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 덱에서 "세이버" 마법 / 함정 카드나 "가톰즈" 마법 / 함정 카드 1장을 패에 넣는다.<br />②: 이 카드가 상대에게 전투 데미지를 주었을 때에 발동할 수 있다. 상대의 패를 무작위로 1장 버린다.<br />③: 이 카드가 묘지에 존재하는 상태에서, 자신의 "X－세이버" 몬스터가 공격 대상으로 선택되었을 때에 발동할 수 있다. 이 카드를 특수 소환한다. 그 후, 공격 대상을 이 카드로 옮긴다.
  | tc_name            = X－軍刀 加特姆士
  | tc_text            = 協調＋地屬性怪獸1隻以上<br />此卡名的①②③效果1回合僅可各使用1次。<br />①：此卡同步召喚的情況下可以發動。從牌組將1張「軍刀」魔法・陷阱卡或「加特姆士」魔法・陷阱卡加入手牌。<br />②：此卡給予對手戰鬥傷害時可以發動。隨機捨棄對手的1張手牌。<br />③：此卡存在於墓地的狀態下，自己的「X－軍刀」怪獸被選擇為攻擊對象時可以發動。將此卡特殊召喚。然後，將攻擊對象移換為此卡。
  | sc_name            = X－军刀 加特姆士
  | sc_text            = 协调＋地属性怪兽1只以上<br />此卡名的①②③效果1回合仅可各使用1次。<br />①：此卡同步召唤的情况下可以发动。从牌组将1张“军刀”魔法・陷阱卡或“加特姆士”魔法・陷阱卡加入手牌。<br />②：此卡给予对手战斗伤害时可以发动。随机舍弃对手的1张手牌。<br />③：此卡存在于墓地的状态下，自己的“X－军刀”怪兽被选择为攻击对象时可以发动。将此卡特殊召唤。然后，将攻击对象移换为此卡。
  }}
