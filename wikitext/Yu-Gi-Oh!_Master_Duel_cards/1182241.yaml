  | text               = If this card is in your GY, except the turn it was sent there: You can pay 1000 LP, then target 1 other Zombie monster in your GY; Special Summon both it and this card, but their effects are negated, also banish them when they leave the field. You can only use this effect of "Nurikabe" once per turn.

  | fr_name            = Nurikabe
  | fr_text            = Si cette carte est dans votre Cimetière, sauf le tour où elle y a été envoyée : vous pouvez payer 1000 LP, puis ciblez 1 autre monstre Zombie dans votre Cimetière ; Invoquez-le Spécialement ainsi que cette carte, mais leurs effets sont annulés, et aussi, bannissez-les lorsqu'ils quittent le Terrain. Vous ne pouvez utiliser cet effet de "Nurikabe" qu'une fois par tour.
  | de_name            = Nurikabe
  | de_text            = Falls sich diese Karte in deinem Friedhof befindet, außer in dem Spielzug, in dem sie dorthin gelegt wurde: Du kannst 1000 LP zahlen und dann 1 anderes Zombie-Monster in deinem Friedhof wählen; beschwöre sowohl es als auch diese Karte als Spezialbeschwörung, aber ihre Effekte werden annulliert, zusätzlich verbanne sie, wenn sie das Spielfeld verlassen. Du kannst diesen Effekt von „Nurikabe“ nur einmal pro Spielzug verwenden.
  | it_name            = Nurikabe
  | it_text            = Se questa carta è nel tuo Cimitero, eccetto nel turno in cui è stata mandata lì: puoi pagare 1000 LP, poi scegliere come bersaglio 1 altro mostro Zombie nel tuo Cimitero; Evoca Specialmente sia quella che questa carta, ma i loro effetti sono annullati, inoltre bandiscile quando lasciano il Terreno. Puoi utilizzare questo effetto di "Nurikabe" una sola volta per turno.
  | pt_name            = Nurikabe
  | pt_text            = Se este card estiver no seu Cemitério, exceto no turno em que foi enviado para lá: você pode pagar 1000 PV e, depois, escolha 1 outro monstro Zumbi no seu Cemitério; Invoque por Invocação-Especial tanto ele como este card, mas seus efeitos são negados e, além disso, bana-os quando eles deixarem o campo. Você só pode usar este efeito de "Nurikabe" uma vez por turno.
  | es_name            = Nurikabe
  | es_text            = Si esta carta está en tu Cementerio, excepto en el turno en el que ésta fue mandada allí: puedes pagar 1000 LP, y después selecciona otro monstruo Zombi en tu Cementerio; Invoca ambos de Modo Especial, ése y esta carta, pero sus efectos son negados, y además destiérralos cuando dejen el Campo. Sólo puedes usar este efecto de "Nurikabe" una vez por turno.
  | ja_text            = このカード名の効果は１ターンに１度しか使用できない。<br />①：このターンに墓地へ送られていないこのカードが墓地に存在する場合、１０００ＬＰを払い、自分の墓地の他のアンデット族モンスター１体を対象として発動できる。そのモンスターとこのカードを特殊召喚する。この効果で特殊召喚したモンスターの効果は無効化され、フィールドから離れた場合に除外される。
  | ko_name            = 요마 누리카베
  | ko_text            = 이 카드명의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 이 턴에 묘지로 보내져 있지 않은 이 카드가 묘지에 존재할 경우, 1000 LP를 지불하고, 자신 묘지의 다른 언데드족 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터와 이 카드를 특수 소환한다. 이 효과로 특수 소환한 몬스터의 효과는 무효화되고, 필드에서 벗어났을 경우에 제외된다.
  | tc_name            = 妖魔 塗壁
  | tc_text            = 此卡名的效果1回合僅可使用1次。<br />①：不是在此回合被送至墓地的此卡存在於墓地的情況下，支付1000LP，以自己墓地的1隻其他不死族怪獸為對象可以發動。將該怪獸和此卡特殊召喚。以此效果特殊召喚的怪獸的效果無效化，從場上離開的情況下，將其除外。
  | sc_name            = 妖魔 涂壁
  | sc_text            = 此卡名的效果1回合仅可使用1次。<br />①：不是在此回合被送至墓地的此卡存在于墓地的情况下，支付1000LP，以自己墓地的1只其他不死族怪兽为对象可以发动。将该怪兽和此卡特殊召唤。以此效果特殊召唤的怪兽的效果无效化，从场上离开的情况下，将其除外。
  }}
