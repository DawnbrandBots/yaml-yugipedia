title: Maiden in Love (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = N
  | attribute          = LIGHT
  | types              = Spellcaster / Effect
  | level              = 2
  | atk                = 400
  | def                = 300
  | text               = Monsters your opponent controls that can attack must attack this card. Cannot be destroyed by battle. At the end of the Damage Step, if this card battled an opponent's monster: You can activate 1 of these effects;<br />●Place 1 Maiden Counter on 1 face-up monster your opponent controls.<br />●Take control of 1 monster your opponent controls with a Maiden Counter.

  | fr_name            = Jeune Fille Amoureuse
  | fr_text            = Les monstres contrôlés par votre adversaire qui peuvent attaquer doivent attaquer cette carte. Non destructible au combat. À la fin de la Damage Step, si cette carte a combattu un monstre de l'adversaire : vous pouvez activer 1 de ces effets ;<br />●Placez 1 Compteur Jeune Fille sur 1 monstre face recto contrôlé par votre adversaire.<br />●Prenez le contrôle d'1 monstre contrôlé par votre adversaire avec un Compteur Jeune Fille.
  | de_name            = Verliebte Jungfer
  | de_text            = Monster, die dein Gegner kontrolliert und die angreifen können, müssen diese Karte angreifen. Kann nicht durch Kampf zerstört werden. Am Ende des Damage Steps, falls diese Karte gegen ein Monster eines Gegners gekämpft hat: Du kannst 1 dieser Effekte aktivieren;<br />●Lege 1 Jungfer-Zählmarke auf 1 offenes Monster, das dein Gegner kontrolliert.<br />●Übernimm die Kontrolle über 1 Monster mit einer Jungfer-Zählmarke, das dein Gegner kontrolliert.
  | it_name            = Fanciulla Innamorata
  | it_text            = I mostri controllati dal tuo avversario che possono attaccare devono attaccare questa carta. Non può essere distrutto in battaglia. Alla fine del Damage Step, se questa carta ha combattuto con un mostro dell'avversario: puoi attivare 1 di questi effetti;<br />●Metti 1 Segnalino Fanciulla su 1 mostro scoperto controllato dal tuo avversario.<br />●Prendi il controllo di 1 mostro controllato dal tuo avversario con un Segnalino Fanciulla.
  | pt_name            = Donzela Apaixonada
  | pt_text            = Monstros que seu oponente controla que podem atacar devem atacar este card. Não pode ser destruído em batalha. No final da Etapa de Dano, se este card batalhou um monstro do oponente: você pode ativar 1 desses efeitos;<br />●Coloque 1 Marcador de Donzela em 1 monstro com a face para cima que seu oponente controla.<br />●Tome o controle de 1 monstro que seu oponente controla com um Marcador de Donzela.
  | es_name            = Doncella Enamorada
  | es_text            = Los monstruos que controla tu adversario que puedan atacar deben atacar a esta carta. No puede ser destruida en batalla. Al final del Damage Step, si esta carta batalló con un monstruo del adversario: puedes activar 1 de estos efectos;<br />●Pon 1 Contador Doncella en 1 monstruo boca arriba que controle tu adversario.<br />●Toma el control de 1 monstruo que controle tu adversario con un Contador Doncella.
  | ja_text            = ①：このカードがモンスターゾーンに存在する限り、攻撃可能な相手モンスターはこのカードを攻撃しなければならない。<br />②：このカードは戦闘では破壊されない。<br />③：このカードが相手モンスターと戦闘を行ったダメージステップ終了時、以下の効果から１つを選択して発動できる。<br />●相手フィールドの表側表示モンスター１体に乙女カウンターを１つ置く。<br />●乙女カウンターが置かれている相手モンスター１体のコントロールを得る。
  | ko_name            = 사랑에 빠진 소녀
  | ko_text            = ①: 이 카드가 몬스터 존에 존재하는 한, 공격 가능한 상대 몬스터는 이 카드를 공격해야 한다.<br />②: 이 카드는 전투로는 파괴되지 않는다.<br />③: 이 카드가 상대 몬스터와 전투를 실행한 데미지 스텝 종료시, 이하의 효과에서 1개를 선택하고 발동할 수 있다.<br />●상대 필드의 앞면 표시 몬스터 1장에 소녀 카운터를 1개 놓는다.<br />●소녀 카운터가 놓여 있는 상대 몬스터 1장의 컨트롤을 얻는다.
  | tc_name            = 戀愛少女
  | tc_text            = ①：只要此卡存在於怪獸區域，可攻擊的對手怪獸必須攻擊此卡。<br />②：此卡不會因戰鬥被破壞。<br />③：此卡與對手怪獸進行戰鬥的傷害步驟結束時，可從以下效果中選擇1個發動。<br />●在對手場上的1隻表側表示怪獸上放1個少女計數物。<br />●獲得1隻放有少女計數物的對手怪獸的控制權。
  | sc_name            = 恋爱少女
  | sc_text            = ①：只要此卡存在于怪兽区域，可攻击的对手怪兽必须攻击此卡。<br />②：此卡不会因战斗被破坏。<br />③：此卡与对手怪兽进行战斗的伤害步骤结束时，可从以下效果中选择1个发动。<br />●在对手场上的1只表侧表示怪兽上放1个少女计数物。<br />●获得1只放有少女计数物的对手怪兽的控制权。
  }}
