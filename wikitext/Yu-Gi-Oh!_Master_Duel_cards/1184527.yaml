title: Rage Rose Witch (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | attribute          = DARK
  | types              = Plant / Synchro / Effect
  | level              = 6
  | atk                = 1600
  | def                = 2400
  | text               = 1 Tuner + 1+ non-Tuner monsters<br />Plant monsters you control cannot be destroyed by card effects. You can only use each of the following effects of "Rage Rose Witch" once per turn. If this card is Synchro Summoned: You can send up to 1 Plant monster each from your Deck and Extra Deck to the GY, also you cannot Special Summon from the Extra Deck for the rest of this turn, except Synchro Monsters. If a card(s) on the field is destroyed by card effect while this card is in your GY (except during the Damage Step): You can Special Summon this card.

  | fr_name            = Sorcière de la Rose Rageuse
  | fr_text            = 1 Syntoniseur + 1+ monstre non-Syntoniseur<br />Les monstres Plante que vous contrôlez ne peuvent pas être détruits par des effets de carte. Vous ne pouvez utiliser chacun des effets suivants de "Sorcière de la Rose Rageuse" qu'une fois par tour. Si cette carte est Invoquée par Synchronisation : vous pouvez envoyer max. 1 monstre Plante depuis votre Deck et max. 1 monstre Plante depuis votre Extra Deck au Cimetière, et aussi, vous ne pouvez pas Invoquer Spécialement (Monstres Synchro exclus) depuis l'Extra Deck le reste de ce tour. Si une ou plusieurs cartes sur le Terrain sont détruites par un effet de carte tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez Invoquer Spécialement cette carte.
  | de_name            = Wutrosen-Hexe
  | de_text            = 1 Empfänger + 1+ Nicht-Empfänger-Monster<br />Pflanze-Monster, die du kontrollierst, können nicht durch Karteneffekte zerstört werden. Du kannst jeden der folgenden Effekte von „Wutrosen-Hexe“ nur einmal pro Spielzug verwenden. Falls diese Karte als Synchrobeschwörung beschworen wird: Du kannst je bis zu 1 Pflanze-Monster von deinem Deck und Extra Deck auf den Friedhof legen, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Synchromonstern. Falls eine oder mehr Karten auf dem Spielfeld durch einen Karteneffekt zerstört werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte als Spezialbeschwörung beschwören.
  | it_name            = Strega Rosa Rabbia
  | it_text            = 1 Tuner + 1+ mostri non-Tuner<br />I mostri Pianta che controlli non possono essere distrutti dagli effetti delle carte. Puoi utilizzare ognuno dei seguenti effetti di "Strega Rosa Rabbia" una sola volta per turno. Se questa carta viene Synchro Evocata: puoi mandare fino a 1 mostro Pianta ciascuno dal tuo Deck ed Extra Deck al Cimitero, inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno, eccetto Mostri Synchro. Se una o più carte sul Terreno vengono distrutte dall'effetto di una carta mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi Evocare Specialmente questa carta.
  | pt_name            = Bruxa da Rosa Raivosa
  | pt_text            = 1 Regulador + 1+ monstros não-Reguladores<br />Monstros Planta que você controla não podem ser destruídos por efeitos de card. Você só pode usar cada um dos seguintes efeitos de "Bruxa da Rosa Raivosa" uma vez por turno. Se este card for Invocado por Invocação-Sincro: você pode enviar até 1 monstro Planta cada do seu Deck e Deck Adicional para o Cemitério e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno, exceto Monstros Sincro. Se um ou mais cards no campo forem destruídos por um efeito de card enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode Invocar este card por Invocação-Especial.
  | es_name            = Bruja de la Rosa Iracunda
  | es_text            = 1 Cantante + 1+ monstruos que no sean Cantantes<br />Los monstruos Planta que controlas no pueden ser destruidos por efectos de cartas. Sólo puedes usar cada uno de los siguientes efectos de "Bruja de la Rosa Iracunda" una vez por turno. Si esta carta es Invocada por Sincronía: puedes mandar al Cementerio hasta 1 monstruo Planta en tu Deck y hasta 1 en tu Deck Extra, y además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno, excepto Monstruos de Sincronía. Si una o más cartas en el Campo son destruidas por el efecto de una carta mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes Invocar esta carta de Modo Especial.
  | ja_text            = チューナー＋チューナー以外のモンスター１体以上<br />このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードがＳ召喚した場合に発動できる。デッキ・ＥＸデッキからそれぞれ１体まで、植物族モンスターを墓地へ送る。この効果の発動後、ターン終了時まで自分はＳモンスターしかＥＸデッキから特殊召喚できない。<br />②：自分フィールドの植物族モンスターは効果では破壊されない。<br />③：このカードが墓地に存在する状態で、フィールドのカードが効果で破壊された場合に発動できる。このカードを特殊召喚する。
  | ko_name            = 헤이트 로즈 위치
  | ko_text            = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 덱 / 엑스트라 덱에서 각각 1장까지, 식물족 몬스터를 묘지로 보낸다. 이 효과의 발동 후, 턴 종료시까지 자신은 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다.<br />②: 자신 필드의 식물족 몬스터는 효과로는 파괴되지 않는다.<br />③: 이 카드가 묘지에 존재하는 상태에서, 필드의 카드가 효과로 파괴되었을 경우에 발동할 수 있다. 이 카드를 특수 소환한다.
  | tc_name            = 黑薔薇與荊棘之魔女
  | tc_text            = 協調＋協調以外的怪獸1隻以上<br />此卡名的①③效果1回合僅可各使用1次。<br />①：此卡同步召喚的情況下可以發動。從牌組・額外牌組各將最多1隻植物族怪獸送至墓地。此效果發動後，直至回合結束時為止，自己從額外牌組僅可特殊召喚同步怪獸。<br />②：自己場上的植物族怪獸不會因效果被破壞。<br />③：此卡存在於墓地的狀態下，場上的卡因效果被破壞的情況下可以發動。將此卡特殊召喚。
  | sc_name            = 黑蔷薇与荆棘之魔女
  | sc_text            = 协调＋协调以外的怪兽1只以上<br />此卡名的①③效果1回合仅可各使用1次。<br />①：此卡同步召唤的情况下可以发动。从牌组・额外牌组各将最多1只植物族怪兽送至墓地。此效果发动后，直至回合结束时为止，自己从额外牌组仅可特殊召唤同步怪兽。<br />②：自己场上的植物族怪兽不会因效果被破坏。<br />③：此卡存在于墓地的状态下，场上的卡因效果被破坏的情况下可以发动。将此卡特殊召唤。
  }}
