title: Radiant Typhoon Vision (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = UR
  | card_type          = Spell
  | property           = Quick-Play
  | text               = If this card is destroyed by the effect of "Mystical Space Typhoon": You can Set this card. Activate 1 of these effects (but you can only use each of these effects of "Radiant Typhoon Vision" once per turn);<br />●Draw 2 cards, then if you have a "Radiant Typhoon" card or a Quick-Play Spell in your hand, discard 1 of them, or your entire hand if you don't.<br />●Add 1 "Mystical Space Typhoon" from your Deck or GY to your hand.

  | fr_name            = Vision du Typhon Radieux
  | fr_text            = Si cette carte est détruite par l'effet de "Typhon d'Espace Mystique" : vous pouvez Poser cette carte. Activez 1 de ces effets (mais vous ne pouvez utiliser chacun de ces effets de "Vision du Typhon Radieux" qu'une fois par tour) ;<br />●Piochez 2 cartes, puis si vous avez une carte "Typhon Radieux" ou une Magie Jeu-Rapide dans votre main, défaussez-en 1, ou toute votre main si vous n'en avez pas.<br />●Ajoutez 1 "Typhon d'Espace Mystique" depuis votre Deck ou Cimetière à votre main.
  | de_name            = Glanztaifun-Vision
  | de_text            = Falls diese Karte durch den Effekt von „Mystischer Raum-Taifun“ zerstört wird: Du kannst diese Karte setzen. Aktiviere 1 dieser Effekte (aber du kannst jeden dieser Effekte von „Glanztaifun-Vision“ nur einmal pro Spielzug verwenden);<br />●Ziehe 2 Karten, dann, falls du eine „Glanztaifun“-Karte oder einen Schnellzauber in deiner Hand hast, wirf 1 von ihnen ab oder deine gesamte Hand, falls nicht.<br />●Füge deiner Hand 1 „Mystischer Raum-Taifun“ von deinem Deck oder Friedhof hinzu.
  | it_name            = Visione Tifone Radiante
  | it_text            = Se questa carta viene distrutta dall'effetto di "Tifone Spaziale Mistico": puoi Posizionare questa carta. Attiva 1 di questi effetti (ma puoi utilizzare ognuno di questi effetti di "Visione Tifone Radiante" una sola volta per turno);<br />●Pesca 2 carte, poi se hai una carta "Tifone Radiante" o una Magia Rapida nella tua mano, scarta 1 di esse, o tutta la tua mano se non le hai.<br />●Aggiungi 1 "Tifone Spaziale Mistico" dal tuo Deck o Cimitero alla tua mano.
  | pt_name            = Visão do Tufão Radiante
  | pt_text            = Se este card for destruído pelo efeito de "Tufão Espacial Místico": você pode Baixar este card. Ative 1 desses efeitos (mas você só pode usar cada um desses efeitos de "Visão do Tufão Radiante" uma vez por turno);<br />●Compre 2 cards e, depois, se você tiver um card "Tufão Radiante" ou uma Magia Rápida na sua mão, descarte 1 deles, ou, se não tiver, descarte toda a sua mão.<br />●Adicione 1 "Tufão Espacial Místico" do seu Deck ou Cemitério à sua mão.
  | es_name            = Visión Tifón Radiante
  | es_text            = Si esta carta es destruida por el efecto de "Tifón del Espacio Místico": puedes Colocar esta carta. Activa 1 de estos efectos (pero sólo puedes usar cada uno de estos efectos de "Visión Tifón Radiante" una vez por turno);<br />●Roba 2 cartas y después, si tienes una carta "Tifón Radiante" o una Mágica de Juego Rápido en tu mano, descarta 1 de ellas, o toda tu mano si no es así.<br />●Añade a tu mano 1 "Tifón del Espacio Místico" en tu Deck o Cementerio.
  | ja_text            = ①：以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。<br />●自分は２枚ドローする。その後、手札に「絢嵐」カードか速攻魔法カードが存在する場合、その内の１枚を選んで捨てる。存在しない場合、自分の手札を全て捨てる。<br />●自分のデッキ・墓地から「サイクロン」１枚を手札に加える。<br />②：このカードが「サイクロン」の効果で破壊された場合に発動できる。このカードを自分の魔法＆罠ゾーンにセットする。
  | ko_name            = 현람한 견신
  | ko_text            = ①: 이하의 효과에서 1개를 선택하고 발동할 수 있다(이 카드명의 이하의 효과는 각각 1턴에 1번밖에 선택할 수 없다).<br />●자신은 2장 드로우한다. 그 후, 패에 "현람" 카드나 속공 마법 카드가 존재할 경우, 그 중의 1장을 고르고 버린다. 존재하지 않을 경우, 자신의 패를 전부 버린다.<br />●자신의 덱 / 묘지에서 "싸이크론" 1장을 패에 넣는다.<br />②: 이 카드가 "싸이크론"의 효과로 파괴되었을 경우에 발동할 수 있다. 이 카드를 자신의 마법 & 함정 존에 세트한다.
  | tc_name            = 絢嵐之見神
  | tc_text            = ①：可從以下效果中選擇1個發動（此卡名的以下效果1回合僅可各選擇1次）。<br />●自己抽2張。然後，手牌存在「絢嵐」卡或速攻魔法卡的情況下，挑選其中1張捨棄。不存在的情況下，將自己的手牌全部捨棄。<br />●從自己牌組・墓地將1張「氣旋」加入手牌。<br />②：此卡因「氣旋」的效果被破壞的情況下可以發動。將此卡放置在自己的魔法與陷阱區域。
  | sc_name            = 绚岚之见神
  | sc_text            = ①：可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。<br />●自己抽2张。然后，手牌存在“绚岚”卡或速攻魔法卡的情况下，挑选其中1张舍弃。不存在的情况下，将自己的手牌全部舍弃。<br />●从自己牌组・墓地将1张“气旋”加入手牌。<br />②：此卡因“气旋”的效果被破坏的情况下可以发动。将此卡放置在自己的魔法与陷阱区域。
  }}
