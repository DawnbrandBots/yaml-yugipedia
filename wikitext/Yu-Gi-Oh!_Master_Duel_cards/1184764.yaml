  | fr_name            = Gallugallud l'Énigme Sans Fin
  | fr_text            = Cet esprit sinistre aux flammes chancelantes peut se métamorphoser à sa guise. Au fil de ses métamorphoses d'oiseau à humain, et d'humain à oiseau, il a fini par en oublier sa véritable nature.
  | de_name            = Gallugallud das ewige Rätsel
  | de_text            = Dieser unheimliche Geist aus flackernden Flammen kann sich in jedes beliebige Wesen transformieren. Er verwandelt sich vom Vogel zum Menschen und vom Menschen zurück zum Vogel und hat dabei sein wahres Selbst vergessen.
  | it_name            = Gallugallud l'Enigma Infinito
  | it_text            = Questo spirito sinistro di fiamme tremolanti può trasformarsi in qualsiasi essere. Continuando a trasformarsi da uccello in umano, e da umano in uccello, ha dimenticato la sua vera essenza.
  | pt_name            = Gallugallud, o Enigma Sem Fim
  | pt_text            = Este espírito sinistro de chamas ondulantes pode se transformar em qualquer ser. À medida que mudava de pássaro para humano, e de humano para pássaro, ele foi se esquecendo de seu verdadeiro eu.
  | es_name            = Gallugallud el Enigma Infinito
  | es_text            = Este espíritu siniestro de llamas vacilantes puede transformarse en cualquier ser. Cambiando de pájaro a humano y de humano a pájaro, ha olvidado su verdadera forma.
  | ja_text            = 揺蕩う炎を身にまとい、あらゆる者に姿を変える鳥魔人。鳥から人へ、人から鳥へと変化するうちに、本来の自分を忘れてしまった。
  | ko_name            = 가르가르도의 시련마
  | ko_text            = 일렁이는 화염을 몸에 두르고, 온갖 존재로 모습을 바꾸는 조마인. 새에서 사람으로, 사람에서 새로 변화하는 사이에, 본래의 자신을 잊어버리고 말았다.
  | tc_name            = 加爾加爾德煉屍魔
  | tc_text            = 身披搖曳火焰的鳥魔人，能化作萬象之姿。在由鳥化人、由人化鳥的輪回之中，早已遺忘自己原本的模樣。
  | sc_name            = 加尔加尔德炼尸魔
  | sc_text            = 身披摇曳火焰的鸟魔人，能化作万象之姿。在由鸟化人、由人化鸟的轮回之中，早已遗忘自己原本的模样。
