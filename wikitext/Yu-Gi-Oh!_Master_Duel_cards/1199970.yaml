  | text               = "Fallen of Albaz" + 1 LIGHT or DARK monster + 1 Effect Monster<br />While an "Ecclesia" monster is on the field or in either GY, this card gains 500 ATK, also it is unaffected by other cards' effects. You can only use each of the following effects of "The Dragon that Devours the Dogma" once per turn. If this card is Special Summoned: You can shuffle up to 2 cards from any GY(s) and/or banishment into the Deck. During the End Phase, if this card is in the GY because it was sent there this turn: You can add 1 "Dogmatika" or "Tri-Brigade" card from your Deck to your hand.

  | fr_name            = Le Dragon qui Dévore le Dogma
  | fr_text            = "Albaz le Déchu" + 1 monstre LUMIÈRE ou TÉNÈBRES + 1 Monstre à Effet<br />Tant qu'un monstre "Ecclésia" est sur le Terrain ou dans l'un des Cimetières, cette carte gagne 500 ATK, et aussi, elle n'est pas affectée par les effets d'autres cartes. Vous ne pouvez utiliser chacun des effets suivants de "Le Dragon qui Dévore le Dogma" qu'une fois par tour. Si cette carte est Invoquée Spécialement : vous pouvez mélanger max. 2 cartes depuis les Cimetières et/ou bannissement dans le Deck. Durant la End Phase, si cette carte est dans le Cimetière parce qu'elle y a été envoyée ce tour : vous pouvez ajouter 1 carte "Dogmatika" ou "Tri-Brigade" depuis votre Deck à votre main.
  | de_name            = Der Drache, der das Dogma verschlingt
  | de_text            = „Gefallener von Albaz“ + 1 LICHT oder FINSTERNIS Monster + 1 Effektmonster<br />Solange sich ein „Ecclesia“-Monster auf dem Spielfeld oder in einem beliebigen Friedhof befindet, erhält diese Karte 500 ATK, zusätzlich bleibt sie von den Effekten anderer Karten unberührt. Du kannst jeden der folgenden Effekte von „Der Drache, der das Dogma verschlingt“ nur einmal pro Spielzug verwenden. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst bis zu 2 Karten von beliebigen Friedhöfen und/oder verbannten Karten ins Deck mischen. Während der End Phase, falls sich diese Karte im Friedhof befindet, weil sie in diesem Spielzug dorthin gelegt wurde: Du kannst deiner Hand 1 „Dogmatika“- oder „Sta-Brigade“-Karte von deinem Deck hinzufügen.
  | it_name            = Il Drago che Divora il Dogma
  | it_text            = "Caduto di Albaz" + 1 mostro LUCE o OSCURITÀ + 1 Mostro con Effetto<br />Mentre un mostro "Ecclesia" è sul Terreno o in qualsiasi Cimitero, questa carta guadagna 500 ATK, inoltre è immune agli effetti delle altre carte. Puoi utilizzare ognuno dei seguenti effetti di "Il Drago che Divora il Dogma" una sola volta per turno. Se questa carta viene Evocata Specialmente: puoi mischiare fino a 2 carte da uno o più Cimiteri e/o carte bandite nel Deck. Durante la End Phase, se questa carta è nel Cimitero perché è stata mandata lì in questo turno: puoi aggiungere 1 carta "Dogmatika" o "Tri-Brigata" dal tuo Deck alla tua mano.
  | pt_name            = O Dragão que Devora o Dogma
  | pt_text            = "Caído de Arbaz" + 1 monstro de LUZ ou de TREVAS + 1 Monstro de Efeito<br />Enquanto um monstro "Ecclesia" estiver no campo ou em qualquer Cemitério, este card ganha 500 de ATK e, além disso, ele não é afetado por outros efeitos de cards. Você só pode usar cada um dos seguintes efeitos de "O Dragão que Devora o Dogma" uma vez por turno. Se este card for Invocado por Invocação-Especial: você pode embaralhar no Deck até 2 cards de quaisquer Cemitérios e/ou banimento. Durante a Fase Final, se este card estiver no Cemitério porque foi enviado para lá neste turno: você pode adicionar 1 card "Dogmatika" ou "Tri-Brigada" do seu Deck à sua mão.
  | es_name            = El Dragón que Devora el Dogma
  | es_text            = "Caído de Albaz" + 1 monstruo de LUZ u OSCURIDAD + 1 Monstruo de Efecto<br />Mientras un monstruo "Ecclesia" esté en el Campo o cualquier Cementerio, esta carta gana 500 ATK, y además no es afectada por los efectos de otras cartas. Sólo puedes usar cada uno de los siguientes efectos de "El Dragón que Devora el Dogma" una vez por turno. Si esta carta es Invocada de Modo Especial: puedes barajar al Deck hasta 2 cartas en cualquier Cementerio y/o destierro. Durante la End Phase, si esta carta está en el Cementerio porque fue mandada allí este turno: puedes añadir a tu mano 1 carta "Dogmátik" o "Tri-Brigada" en tu Deck.
  | ja_text            = 「アルバスの落胤」＋光・闇属性モンスター＋効果モンスター<br />このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードが特殊召喚した場合に発動できる。自分・相手の墓地・除外状態のカードを合計２枚までデッキに戻す。<br />②：自分か相手のフィールドか墓地に「エクレシア」モンスターが存在する限り、このカードは攻撃力が５００アップし、このカード以外の効果を受けない。<br />③：このカードが墓地へ送られたターンのエンドフェイズに発動できる。デッキから「ドラグマ」、「トライブリゲード」カード１枚を手札に加える。
  | ko_name            = 성흔을 먹는 용
  | ko_text            = "알버스의 낙윤" ＋ 빛 / 어둠 속성 몬스터 ＋ 효과 몬스터<br />이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 자신 / 상대의 묘지 / 제외 상태인 카드를 합계 2장까지 덱으로 되돌린다.<br />②: 자신이나 상대의 필드나 묘지에 "에클레시아" 몬스터가 존재하는 한, 이 카드는 공격력을 500 올리고, 이 카드 이외의 효과를 받지 않는다.<br />③: 이 카드가 묘지로 보내진 턴의 엔드 페이즈에 발동할 수 있다. 덱에서 "드래그마", "트라이브리게이드" 카드 1장을 패에 넣는다.
  | tc_name            = 吞喰聖痕之龍
  | tc_text            = 「阿爾白斯之落胤」＋光・闇屬性怪獸＋效果怪獸<br />此卡名的①③效果1回合僅可各使用1次。<br />①：此卡特殊召喚的情況下可以發動。將自己・對手的、墓地・除外狀態的合計最多2張卡放回牌組。<br />②：只要自己或對手的、場上或墓地存在「艾克利西亞」怪獸，此卡的攻擊力上升500，不受此卡以外的效果影響。<br />③：在此卡被送至墓地的回合的結束階段可以發動。從牌組將1張「教導」卡或「鐵獸」卡加入手牌。
  | sc_name            = 吞喰圣痕之龙
  | sc_text            = “阿尔白斯之落胤”＋光・暗属性怪兽＋效果怪兽<br />此卡名的①③效果1回合仅可各使用1次。<br />①：此卡特殊召唤的情况下可以发动。将自己・对手的、墓地・除外状态的合计最多2张卡放回牌组。<br />②：只要自己或对手的、场上或墓地存在“艾克利西亚”怪兽，此卡的攻击力上升500，不受此卡以外的效果影响。<br />③：在此卡被送至墓地的回合的结束阶段可以发动。从牌组将1张“教导”卡或“铁兽”卡加入手牌。
  }}
