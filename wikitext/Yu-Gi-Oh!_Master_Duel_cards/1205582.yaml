  | fr_name            = Festiballon
  | fr_text            = Si cette carte combat un monstre, aucun de ces 2 monstres ne peut être détruit par ce combat. Chaque fois qu'un monstre déclare une attaque, cette carte gagne 1000 ATK. Durant votre Main Phase : vous pouvez faire perdre exactement 5000 ATK à cette carte, et si vous le faites, détruisez toutes les autres cartes sur le Terrain. Vous ne pouvez utiliser cet effet de "Festiballon" qu'une fois par tour.
  | de_name            = Festiballon
  | de_text            = Falls diese Karte gegen ein Monster kämpft, können beide durch jenen Kampf nicht zerstört werden. Jedes Mal, wenn ein Monster einen Angriff deklariert, erhält diese Karte 1000 ATK. Während deiner Main Phase: Du kannst diese Karte genau 5000 ATK verlieren lassen und falls du dies tust, zerstöre alle anderen Karten auf dem Spielfeld. Du kannst diesen Effekt von „Festiballon“ nur einmal pro Spielzug verwenden.
  | it_name            = Festipalloncino
  | it_text            = Se questa carta combatte con un mostro, nessuno dei due può essere distrutto in quella battaglia. Ogni volta che un mostro dichiara un attacco, questa carta guadagna 1000 ATK. Durante la tua Main Phase: puoi far perdere a questa carta esattamente 5000 ATK e, se lo fai, distruggi tutte le altre carte sul Terreno. Puoi utilizzare questo effetto di "Festipalloncino" una sola volta per turno.
  | pt_name            = Festibalão
  | pt_text            = Se este card batalhar um monstro, nenhum dos dois pode ser destruído nessa batalha. Sempre que um monstro declarar um ataque, este card ganha 1000 de ATK. Durante sua Fase Principal: você pode fazer com que este card perca exatamente 5000 de ATK e, se isso acontecer, destrua todos os outros cards no campo. Você só pode usar este efeito de "Festibalão" uma vez por turno.
  | es_name            = Globofestival
  | es_text            = Si esta carta batalla con un monstruo, ninguno puede ser destruido en esa batalla. Cada vez que un monstruo declare un ataque, esta carta gana 1000 ATK. Durante tu Main Phase: puedes hacer que esta carta pierda exactamente 5000 ATK y, si lo haces, destruye todas las demás cartas en el Campo. Sólo puedes usar este efecto de "Globofestival" una vez por turno.
  | ja_text            = このカード名の③の効果は１ターンに１度しか使用できない。<br />①：このカードがモンスターと戦闘を行う場合、その２体はその戦闘では破壊されない。<br />②：このカードがモンスターゾーンに存在する限り、自分か相手のモンスターが攻撃宣言する度に、このカードの攻撃力は１０００アップする。<br />③：自分メインフェイズに発動できる。このカードの攻撃力を５０００ダウンし、フィールドの他のカードを全て破壊する。
  | ko_name            = 페스티벌룬
  | ko_text            = 이 카드명의 ③의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드가 몬스터와 전투를 실행할 경우, 그 2장은 그 전투로는 파괴되지 않는다.<br />②: 이 카드가 몬스터 존에 존재하는 한, 자신이나 상대의 몬스터가 공격 선언할 때마다, 이 카드의 공격력은 1000 올린다.<br />③: 자신 메인 페이즈에 발동할 수 있다. 이 카드의 공격력을 5000 내리고, 필드의 다른 카드를 전부 파괴한다.
  | tc_name            = 慶典氣球
  | tc_text            = 此卡名的③效果1回合僅可使用1次。<br />①：此卡與怪獸進行戰鬥的情況下，該２隻不會因該戰鬥被破壞。<br />②：只要此卡存在於怪獸區域，每當自己或對手的怪獸攻擊宣言，此卡的攻擊力就上升1000。<br />③：在自己的主要階段可以發動。此卡的攻擊力下降5000，將場上的其他卡全部破壞。
  | sc_name            = 庆典气球
  | sc_text            = 此卡名的③效果1回合仅可使用1次。<br />①：此卡与怪兽进行战斗的情况下，该２只不会因该战斗被破坏。<br />②：只要此卡存在于怪兽区域，每当自己或对手的怪兽攻击宣言，此卡的攻击力就上升1000。<br />③：在自己的主要阶段可以发动。此卡的攻击力下降5000，将场上的其他卡全部破坏。
  }}
