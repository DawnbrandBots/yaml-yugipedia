  | text               = 1 Tuner + 1+ non-Tuner monsters<br />If this card is Synchro Summoned: You can add 1 "Gouki" Spell from your Deck to your hand. If this card is sent to the GY: You can target 1 EARTH monster you control; while you control that face-up monster, your opponent's monsters can only target it for attacks, also add 1 "Gouki" monster with less ATK than that monster from your GY to your hand. You can only use each effect of "Gouki Dragon Ogre" once per turn.

  | fr_name            = Ogre Dragon Gouki
  | fr_text            = 1 Syntoniseur + 1+ monstre non-Syntoniseur<br />Si cette carte est Invoquée par Synchronisation : vous pouvez ajouter 1 Magie "Gouki" depuis votre Deck à votre main. Si cette carte est envoyée au Cimetière : vous pouvez cibler 1 monstre TERRE que vous contrôlez ; tant que vous contrôlez le monstre face recto, les monstres de votre adversaire ne peuvent cibler que le monstre avec une attaque, et aussi, ajoutez 1 monstre "Gouki" avec une ATK inférieure au monstre depuis votre Cimetière à votre main. Vous ne pouvez utiliser chaque effet de "Ogre Dragon Gouki" qu'une fois par tour.
  | de_name            = Gouki Drachenoger
  | de_text            = 1 Empfänger + 1+ Nicht-Empfänger-Monster<br />Falls diese Karte als Synchrobeschwörung beschworen wird: Du kannst deiner Hand 1 „Gouki“-Zauber von deinem Deck hinzufügen. Falls diese Karte auf den Friedhof gelegt wird: Du kannst 1 ERDE Monster wählen, das du kontrollierst; solange du jenes offene Monster kontrollierst, können Monster deines Gegners nur es als Angriffsziel wählen, zusätzlich füge deiner Hand 1 „Gouki“-Monster mit weniger ATK als jenes Monster von deinem Friedhof hinzu. Du kannst jeden Effekt von „Gouki Drachenoger“ nur einmal pro Spielzug verwenden.
  | it_name            = Gouki Drago Orco
  | it_text            = 1 Tuner + 1+ mostri non-Tuner<br />Se questa carta viene Synchro Evocata: puoi aggiungere 1 Magia "Gouki" dal tuo Deck alla tua mano. Se questa carta viene mandata al Cimitero: puoi scegliere come bersaglio 1 mostro TERRA che controlli; mentre controlli quel mostro scoperto, i mostri del tuo avversario possono scegliere solo quello come bersaglio per gli attacchi, inoltre aggiungi 1 mostro "Gouki" con ATK inferiore a quel mostro dal tuo Cimitero alla tua mano. Puoi utilizzare ogni effetto di "Gouki Drago Orco" una sola volta per turno.
  | pt_name            = Gouki Ogro Dragão
  | pt_text            = 1 Regulador + 1+ monstros não-Reguladores<br />Se este card for Invocado por Invocação-Sincro: você pode adicionar 1 Magia "Gouki" do seu Deck à sua mão. Se este card for enviado para o Cemitério: você pode escolher 1 monstro de TERRA que você controla; enquanto você controlar esse monstro com a face para cima, os monstros do seu oponente só podem escolhê-lo como alvo de ataques e, além disso, adicione 1 monstro "Gouki" com menos ATK que o desse monstro do seu Cemitério à sua mão. Você só pode usar cada efeito de "Gouki Ogro Dragão" uma vez por turno.
  | es_name            = Gouki Ogro Dragón
  | es_text            = 1 Cantante + 1+ monstruos que no sean Cantantes<br />Si esta carta es Invocada por Sincronía: puedes añadir a tu mano 1 Mágica "Gouki" en tu Deck. Si esta carta es mandada al Cementerio: puedes seleccionar 1 monstruo de TIERRA que controles; mientras controles ese monstruo boca arriba, los monstruos de tu adversario sólo pueden seleccionar ese para ataques, y además añade a tu mano 1 monstruo "Gouki" con menos ATK que ese monstruo en tu Cementerio. Sólo puedes usar cada efecto de "Gouki Ogro Dragón" una vez por turno.
  | ja_text            = チューナー＋チューナー以外のモンスター１体以上<br />このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。<br />①：このカードがＳ召喚した場合に発動できる。デッキから「剛鬼」魔法カード１枚を手札に加える。<br />②：このカードが墓地へ送られた場合、自分フィールドの地属性モンスター１体を対象として発動できる。そのモンスターより攻撃力が低い「剛鬼」モンスター１体を自分の墓地から手札に加える。対象のモンスターが自分フィールドに表側表示で存在する限り、相手モンスターは対象のモンスターしか攻撃対象に選択できない。
  | ko_name            = 강귀 드래곤 오우거
  | ko_text            = 튜너 ＋ 튜너 이외의 몬스터 1장 이상<br />이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 덱에서 "강귀" 마법 카드 1장을 패에 넣는다.<br />②: 이 카드가 묘지로 보내졌을 경우, 자신 필드의 땅 속성 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터보다 공격력이 낮은 "강귀" 몬스터 1장을 자신 묘지에서 패에 넣는다. 대상 몬스터가 자신 필드에 앞면 표시로 존재하는 한, 상대 몬스터는 대상 몬스터밖에 공격 대상으로 선택할 수 없다.
  | tc_name            = 剛鬼 龍食人魔
  | tc_text            = 協調＋協調以外的怪獸1隻以上<br />此卡名的①②效果1回合僅可各使用1次。<br />①：此卡同步召喚的情況下可以發動。從牌組將1張「剛鬼」魔法卡加入手牌。<br />②：此卡被送至墓地的情況下，以自己場上的1隻地屬性怪獸為對象可以發動。從自己墓地將1隻攻擊力低於該怪獸的「剛鬼」怪獸加入手牌。只要對象怪獸以表側表示存在於自己場上，對手怪獸僅可將對象怪獸選擇為攻擊對象。
  | sc_name            = 刚鬼 龙食人魔
  | sc_text            = 协调＋协调以外的怪兽1只以上<br />此卡名的①②效果1回合仅可各使用1次。<br />①：此卡同步召唤的情况下可以发动。从牌组将1张“刚鬼”魔法卡加入手牌。<br />②：此卡被送至墓地的情况下，以自己场上的1只地属性怪兽为对象可以发动。从自己墓地将1只攻击力低于该怪兽的“刚鬼”怪兽加入手牌。只要对象怪兽以表侧表示存在于自己场上，对手怪兽仅可将对象怪兽选择为攻击对象。
  }}
