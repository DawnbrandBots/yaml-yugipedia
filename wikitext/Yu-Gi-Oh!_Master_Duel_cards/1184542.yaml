title: R.B. Next Phase (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = N
  | card_type          = Trap
  | property           = Counter
  | text               = When your opponent activates a monster effect, while you control an "R.B." monster: Destroy 1 monster you control, and if you do, negate the activation, and if you do that, destroy that card, then gain 2000 LP. You can only activate 1 "R.B. Next Phase" per turn.

  | fr_name            = Prochaine Phase R.B.
  | fr_text            = Lorsque votre adversaire active un effet de monstre, tant que vous contrôlez un monstre "R.B." : détruisez 1 monstre que vous contrôlez, et si vous le faites, annulez l'activation, et si vous faites ça, détruisez la carte, puis gagnez 2000 LP. Vous ne pouvez activer qu'1 "Prochaine Phase R.B." par tour.
  | de_name            = Nächste R.B.-Phase
  | de_text            = Wenn dein Gegner einen Monstereffekt aktiviert, solange du ein „R.B.“-Monster kontrollierst: Zerstöre 1 Monster, das du kontrollierst, und falls du dies tust, annulliere die Aktivierung und falls du dies tust, zerstöre jene Karte, dann erhältst du 2000 LP. Du kannst nur 1 „Nächste R.B.-Phase“ pro Spielzug aktivieren.
  | it_name            = Prossima Fase R.B.
  | it_text            = Quando il tuo avversario attiva l'effetto di un mostro, mentre controlli un mostro "R.B.": distruggi 1 mostro che controlli e, se lo fai, annulla l'attivazione e, se fai quello, distruggi quella carta, poi guadagni 2000 LP. Puoi attivare solo 1 "Prossima Fase R.B." per turno.
  | pt_name            = Próxima Fase R.B.
  | pt_text            = Quando seu oponente ativar um efeito de monstro, enquanto você controlar um monstro "R.B.": destrua 1 monstro que você controla e, se isso acontecer, negue a ativação e, se isso acontecer, destrua esse card e, depois, ganhe 2000 PV. Você só pode ativar 1 "Próxima Fase R.B." por turno.
  | es_name            = R.B. Siguiente Fase
  | es_text            = Cuando tu adversario activa un efecto de monstruo, mientras controlas un monstruo "R.B.": destruye 1 monstruo que controles y, si lo haces, niega la activación y, si haces eso, destruye esa carta, y después ganas 2000 LP. Sólo puedes activar 1 "R.B. Siguiente Fase" por turno.
  | ja_text            = このカード名のカードは１ターンに１枚しか発動できない。<br />①：自分フィールドに「Ｒ．Ｂ．」モンスターが存在し、相手がモンスターの効果を発動した時に発動できる。自分フィールドのモンスター１体を破壊し、その発動を無効にし破壊する。その後、自分は２０００ＬＰ回復する。
  | ko_name            = R.B.넥스트 페이즈
  | ko_text            = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다.<br />①: 자신 필드에 "R.B.(리볼봇)" 몬스터가 존재하고, 상대가 몬스터의 효과를 발동했을 때에 발동할 수 있다. 자신 필드의 몬스터 1장을 파괴하고, 그 발동을 무효로 하여 파괴한다. 그 후, 자신은 2000 LP 회복한다.
  | tc_name            = R.B.後續屏障
  | tc_text            = 此卡名的卡1回合僅可發動1張。<br />①：自己場上存在「R.B.」怪獸，且對手發動怪獸的效果時可以發動。將自己場上的1隻怪獸破壞，將該發動無效並破壞。然後自己回復2000LP。
  | sc_name            = R.B.后续屏障
  | sc_text            = 此卡名的卡1回合仅可发动1张。<br />①：自己场上存在“R.B.”怪兽，且对手发动怪兽的效果时可以发动。将自己场上的1只怪兽破坏，将该发动无效并破坏。然后自己恢复2000LP。
  }}
