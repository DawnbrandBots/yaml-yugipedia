title: Constellar Castor (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = SR
  | attribute          = LIGHT
  | types              = Fairy / Effect
  | level              = 4
  | atk                = 1700
  | def                = 600
  | text               = If this card is Summoned: You can Special Summon 1 "Constellar" monster from your Deck, except "Constellar Castor", also you cannot Special Summon from the Extra Deck for the rest of this turn, except LIGHT or DARK monsters. You can only use this effect of "Constellar Castor" once per turn. A "Constellar" Xyz Monster that has this card as material gains this effect.<br />●Once per turn, when your opponent activates a Spell Card or effect (Quick Effect): You can detach 2 materials from a monster(s) you control, and if you do, negate that effect, and if you do that, destroy that card.

  | fr_name            = Castor de la Constellée
  | fr_text            = Si cette carte est Invoquée : vous pouvez Invoquer Spécialement 1 monstre "Constellée" ("Castor de la Constellée" exclu) depuis votre Deck, et aussi, vous ne pouvez pas Invoquer Spécialement (monstres LUMIÈRE ou TÉNÈBRES exclus) depuis l'Extra Deck le reste de ce tour. Vous ne pouvez utiliser cet effet de "Castor de la Constellée" qu'une fois par tour. Un Monstre Xyz "Constellée" qui a cette carte comme Matériel gagne cet effet.<br />●Une fois par tour, lorsque votre adversaire active une Carte Magie ou effet de Magie (Effet Rapide) : vous pouvez détacher 2 Matériels d'un ou plusieurs monstres que vous contrôlez, et si vous le faites, annulez l'effet, et si vous faites ça, détruisez la carte.
  | de_name            = Sternzeichen-Kundler Castor
  | de_text            = Falls diese Karte beschworen wird: Du kannst 1 „Sternzeichen“-Monster als Spezialbeschwörung von deinem Deck beschwören, außer „Sternzeichen-Kundler Castor“, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von LICHT oder FINSTERNIS Monstern. Du kannst diesen Effekt von „Sternzeichen-Kundler Castor“ nur einmal pro Spielzug verwenden. Ein „Sternzeichen“-Xyz-Monster, das diese Karte als Material hat, erhält diesen Effekt.<br />●Einmal pro Spielzug, wenn dein Gegner eine Zauberkarte oder einen Zaubereffekt aktiviert (Schnelleffekt): Du kannst 2 Material von einem oder mehr Monstern abhängen, die du kontrollierst, und falls du dies tust, annulliere jenen Effekt und falls du dies tust, zerstöre jene Karte.
  | it_name            = Costellazione Castor
  | it_text            = Se questa carta viene Evocata: puoi Evocare Specialmente 1 mostro "Costellazione" dal tuo Deck, eccetto "Costellazione Castor", inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno, eccetto mostri LUCE o OSCURITÀ. Puoi utilizzare questo effetto di "Costellazione Castor" una sola volta per turno. Un Mostro Xyz "Costellazione" che ha questa carta come materiale guadagna questo effetto.<br />●Una volta per turno, quando il tuo avversario attiva una Carta Magia o un suo effetto (Effetto Rapido): puoi staccare 2 materiali da uno o più mostri che controlli e, se lo fai, annulla quell'effetto e, se fai quello, distruggi quella carta.
  | pt_name            = Constelar Castor
  | pt_text            = Se este card for Invocado: você pode Invocar por Invocação-Especial 1 monstro "Constelar" do seu Deck, exceto "Constelar Castor" e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno, exceto monstros de LUZ ou de TREVAS. Você só pode usar este efeito de "Constelar Castor" uma vez por turno. Um Monstro Xyz "Constelar" que tenha este card como matéria ganha este efeito.<br />●Uma vez por turno, quando seu oponente ativar um Card de Magia ou seus efeitos (Efeito Rápido): você pode desassociar 2 matérias de um ou mais monstros que você controla e, se isso acontecer, negue esse efeito e, se isso acontecer, destrua esse card.
  | es_name            = Constelación Cástor
  | es_text            = Si esta carta es Invocada: puedes Invocar de Modo Especial, desde tu Deck, 1 monstruo "Constelación", excepto "Constelación Cástor", y además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno, excepto monstruos de LUZ u OSCURIDAD. Sólo puedes usar este efecto de "Constelación Cástor" una vez por turno. Un Monstruo Xyz "Constelación" que tenga esta carta como material gana este efecto.<br />●Una vez por turno, cuando tu adversario activa una Carta Mágica o su efecto (Efecto Rápido): puedes desacoplar 2 materiales de uno o más monstruos que controles y, si lo haces, niega ese efecto y, si haces eso, destruye esa carta.
  | ja_text            = このカード名の①の効果は１ターンに１度しか使用できない。<br />①：このカードが召喚・反転召喚・特殊召喚した場合に発動できる。デッキから「セイクリッド・カストル」以外の「セイクリッド」モンスター１体を特殊召喚する。このターン、自分は光・闇属性モンスターしかＥＸデッキから特殊召喚できない。<br />②：このカードをＸ素材としている「セイクリッド」Ｘモンスターは以下の効果を得る。<br />●１ターンに１度、相手が魔法カードの効果を発動した時に発動できる。自分フィールドのＸ素材を２つ取り除き、その効果を無効にし破壊する。
  | ko_name            = 세이크리드 카스토르
  | ko_text            = 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 일반 소환 / 반전 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "세이크리드 카스토르" 이외의 "세이크리드" 몬스터 1장을 특수 소환한다. 이 턴에, 자신은 빛 / 어둠 속성 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다.<br />②: 이 카드를 엑시즈 소재로 하고 있는 "세이크리드" 엑시즈 몬스터는 이하의 효과를 얻는다.<br />●1턴에 1번, 상대가 마법 카드의 효과를 발동했을 때에 발동할 수 있다. 자신 필드의 엑시즈 소재를 2개 제거하고, 그 효과를 무효로 하여 파괴한다.
  | tc_name            = 星聖 雙子卡斯托爾
  | tc_text            = 此卡名的①效果1回合僅可使用1次。<br />①：此卡召喚・反轉召喚・特殊召喚的情況下可以發動。從牌組將「星聖 雙子卡斯托爾」以外的1隻「星聖」怪獸特殊召喚。此回合，自己從額外牌組僅可特殊召喚光・闇屬性怪獸。<br />②：持有此卡作為超量素材的「星聖」超量怪獸獲得以下效果。<br />●1回合1次，對手發動魔法卡的效果時可以發動。去除自己場上的2個超量素材，將該效果無效並破壞。
  | sc_name            = 星圣 双子卡斯托尔
  | sc_text            = 此卡名的①效果1回合仅可使用1次。<br />①：此卡召唤・反转召唤・特殊召唤的情况下可以发动。从牌组将“星圣 双子卡斯托尔”以外的1只“星圣”怪兽特殊召唤。此回合，自己从额外牌组仅可特殊召唤光・暗属性怪兽。<br />②：持有此卡作为超量素材的“星圣”超量怪兽获得以下效果。<br />●1回合1次，对手发动魔法卡的效果时可以发动。去除自己场上的2个超量素材，将该效果无效并破坏。
  }}
