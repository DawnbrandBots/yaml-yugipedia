  | text               = 2 Level 4 Spellcaster monsters<br />Each "Fairy Tail" monster you control whose original Attribute is LIGHT, is unaffected by your opponent's activated effects. You can only use each of the following effects of "Fairy Tail - Wiccat" once per turn. You can detach up to 2 materials from this card; send "Fairy Tail" cards from your Deck to the GY, equal to the number detached. If this card is in your GY (Quick Effect): You can target 1 "Fairy Tail" monster you control whose original Attribute is LIGHT; Special Summon this card, and if you do, send that monster to the GY.

  | fr_name            = Animal Féérique - Sorcichat
  | fr_text            = 2 monstres Magicien de Niveau 4<br />Chaque monstre "Animal Féérique" que vous contrôlez dont l'Attribut d'origine est LUMIÈRE n'est pas affecté par les effets activés de votre adversaire. Vous ne pouvez utiliser chacun des effets suivants de "Animal Féérique - Sorcichat" qu'une fois par tour. Vous pouvez détacher max. 2 Matériels de cette carte ; envoyez un nombre de cartes "Animal Féérique" depuis votre Deck au Cimetière, égal au nombre détaché. Si cette carte est dans votre Cimetière (Effet Rapide) : vous pouvez cibler 1 monstre "Animal Féérique" que vous contrôlez dont l'Attribut d'origine est LUMIÈRE ; Invoquez Spécialement cette carte, et si vous le faites, envoyez le monstre au Cimetière.
  | de_name            = Märchenschweif - Hexkatze
  | de_text            = 2 Hexer-Monster der Stufe 4<br />Jedes „Märchenschweif“-Monster, das du kontrollierst und dessen Grund-Eigenschaft LICHT ist, bleibt von aktivierten Effekten deines Gegners unberührt. Du kannst jeden der folgenden Effekte von „Märchenschweif - Hexkatze“ nur einmal pro Spielzug verwenden. Du kannst bis zu 2 Material von dieser Karte abhängen; lege „Märchenschweif“-Karten in Höhe der abgehängten Anzahl von deinem Deck auf den Friedhof. Falls sich diese Karte in deinem Friedhof befindet (Schnelleffekt): Du kannst 1 „Märchenschweif“-Monster wählen, das du kontrollierst und dessen Grund-Eigenschaft LICHT ist; beschwöre diese Karte als Spezialbeschwörung und falls du dies tust, lege jenes Monster auf den Friedhof.
  | it_name            = Codafavola - Stregatta
  | it_text            = 2 mostri Incantatore di Livello 4<br />Ogni mostro "Codafavola" che controlli il cui Attributo originale è LUCE è immune agli effetti attivati del tuo avversario. Puoi utilizzare ognuno dei seguenti effetti di "Codafavola - Stregatta" una sola volta per turno. Puoi staccare fino a 2 materiali da questa carta; manda carte "Codafavola" dal tuo Deck al Cimitero, pari al numero staccato. Se questa carta è nel tuo Cimitero (Effetto Rapido): puoi scegliere come bersaglio 1 mostro "Codafavola" che controlli con Attributo originale LUCE; Evoca Specialmente questa carta e, se lo fai, manda quel mostro al Cimitero.
  | pt_name            = Cauda de Fadas - Brugata
  | pt_text            = 2 monstros Mago de Nível 4<br />Cada monstro "Cauda de Fadas" que você controla cujo Atributo original seja LUZ não é afetado pelos efeitos ativados do seu oponente. Você só pode usar cada um dos seguintes efeitos de "Cauda de Fadas - Brugata" uma vez por turno. Você pode desassociar até 2 matérias deste card; envie cards "Cauda de Fadas" do seu Deck para o Cemitério, igual ao número desassociado. Se este card estiver no seu Cemitério (Efeito Rápido): você pode escolher 1 monstro "Cauda de Fadas" que você controla cujo Atributo original seja LUZ; Invoque este card por Invocação-Especial e, se isso acontecer, envie esse monstro para o Cemitério.
  | es_name            = Colacuento - Brujigata
  | es_text            = 2 monstruos Lanzador de Conjuros de Nivel 4<br />Cada monstruo "Colacuento" que controlas cuyo Atributo original sea LUZ no es afectado por los efectos activados de tu adversario. Sólo puedes usar cada uno de los siguientes efectos de "Colacuento - Brujigata" una vez por turno. Puedes desacoplar hasta 2 materiales de esta carta; manda al Cementerio cartas "Colacuento" en tu Deck, igual al número de desacoplados. Si esta carta está en tu Cementerio (Efecto Rápido): puedes seleccionar 1 monstruo "Colacuento" que controles cuyo Atributo original sea LUZ; Invoca esta carta de Modo Especial y, si lo haces, manda ese monstruo al Cementerio.
  | ja_text            = 魔法使い族レベル４モンスター×２<br />このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：自分フィールドの元々の属性が光属性の「妖精伝姫」モンスターは相手が発動した効果を受けない。<br />②：このカードのＸ素材を２つまで取り除いて発動できる。取り除いた数だけデッキから「妖精伝姫」カードを墓地へ送る。<br />③：自分・相手ターンに、このカードが墓地に存在する場合、自分フィールドの元々の属性が光属性の「妖精伝姫」モンスター１体を対象として発動できる。このカードを特殊召喚し、対象のモンスターを墓地へ送る。
  | ko_name            = 페어리테일－위캣
  | ko_text            = 마법사족 레벨 4 몬스터 × 2<br />이 카드명의 ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다.<br />①: 자신 필드의 원래의 속성이 빛 속성인 "페어리테일" 몬스터는 상대가 발동한 효과를 받지 않는다.<br />②: 이 카드의 엑시즈 소재를 2개까지 제거하고 발동할 수 있다. 제거한 수만큼 덱에서 "페어리테일" 카드를 묘지로 보낸다.<br />③: 자신 / 상대 턴에, 이 카드가 묘지에 존재할 경우, 자신 필드의 원래 속성이 빛 속성인 "페어리테일" 몬스터 1장을 대상으로 하고 발동할 수 있다. 이 카드를 특수 소환하고, 대상의 몬스터를 묘지로 보낸다.
  | tc_name            = 妖精傳姬－貓巫婆
  | tc_text            = 魔法使族等級4怪獸×2<br />此卡名的②③效果1回合僅可各使用1次。<br />①：自己場上的原本屬性為光屬性的「妖精傳姬」怪獸不受對手發動的效果影響。<br />②：去除此卡的最多2個超量素材可以發動。依去除的數量，從牌組將「妖精傳姬」卡送至墓地。<br />③：在自己・對手回合中，此卡存在於墓地的情況下，以自己場上的1隻原本屬性為光屬性的「妖精傳姬」怪獸為對象可以發動。將此卡特殊召喚，將對象怪獸送至墓地。
  | sc_name            = 妖精传姬－猫巫婆
  | sc_text            = 魔法师族等级4怪兽×2<br />此卡名的②③效果1回合仅可各使用1次。<br />①：自己场上的原本属性为光属性的“妖精传姬”怪兽不受对手发动的效果影响。<br />②：去除此卡的最多2个超量素材可以发动。依去除的数量，从牌组将“妖精传姬”卡送至墓地。<br />③：在自己・对手回合中，此卡存在于墓地的情况下，以自己场上的1只原本属性为光属性的“妖精传姬”怪兽为对象可以发动。将此卡特殊召唤，将对象怪兽送至墓地。
