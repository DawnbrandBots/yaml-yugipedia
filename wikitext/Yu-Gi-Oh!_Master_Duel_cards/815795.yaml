  | ja_text   = このカードは通常召喚できない。<br />自分フィールドに「Ｘ－セイバー」モンスターが２体以上存在する場合のみ特殊召喚できる。<br />①：１ターンに１度、自分の墓地のレベル４以下の「Ｘ－セイバー」モンスター１体を対象として発動できる。そのモンスターを特殊召喚する。
  | ko_name   = XX－세이버 폴트롤
  | ko_text   = 이 카드는 통상 소환할 수 없다.<br />자신 필드에 "X－세이버" 몬스터가 2장 이상 존재할 경우에만 특수 소환할 수 있다.<br />①: 1턴에 1번, 자신 묘지의 레벨 4 이하의 "X－세이버" 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 특수 소환한다.
  | tc_name   = XX－軍刀 佛洛托爾
  | tc_text   = 此卡無法通常召喚。<br />僅可在我方場上存在２隻以上的「X－軍刀」怪獸的狀況下特殊召喚。<br />①：１回合１次，可將我方墓地的１隻等級４以下的「X－軍刀」怪獸做為對象發動。特殊召喚該怪獸。
  | sc_name   = 拾拾－军刀 佛洛托尔
