title: Predaplant Daredevil (Master Duel)
wikitext: |-
  {{Master Duel card
  | rarity             = R
  | attribute          = DARK
  | types              = Plant / Fusion / Effect
  | level              = 6
  | atk                = 2200
  | def                = 1500
  | text               = 1 "Predaplant" monster + 1 Level 1 monster<br />Must first be either Fusion Summoned, or Special Summoned (from your Extra Deck) by Tributing 1 monster on either field with a Predator Counter and 1 "Predaplant" monster you control. During the Main Phase, if this card was Special Summoned this turn (Quick Effect): You can target Spells/Traps on the field, up to the number of monsters with a Predator Counter; destroy them. You can only use this effect of "Predaplant Daredevil" once per turn.

  | fr_name            = Diable Imprudent Prédaplante
  | fr_text            = 1 monstre "Prédaplante" + 1 monstre de Niveau 1<br />Doit d'abord être soit Invoquée par Fusion, soit Invoquée Spécialement (depuis votre Extra Deck) en Sacrifiant 1 monstre sur l'un des Terrains avec un Compteur Prédateur et 1 monstre "Prédaplante" que vous contrôlez. Durant la Main Phase, si cette carte a été Invoquée Spécialement ce tour (Effet Rapide) : vous pouvez cibler un nombre de Magies/Pièges sur le Terrain, inférieur ou égal au nombre de monstres avec un Compteur Prédateur ; détruisez-les. Vous ne pouvez utiliser cet effet de "Diable Imprudent Prédaplante" qu'une fois par tour.
  | de_name            = Raubpflanze Kühner Teufel
  | de_text            = 1 „Raubpflanze“-Monster + 1 Monster der Stufe 1<br />Muss erst entweder als Fusionsbeschwörung beschworen werden oder als Spezialbeschwörung (von deinem Extra Deck) beschworen werden, indem du 1 Monster mit einer Raubtier-Zählmarke von einer beliebigen Spielfeldseite und 1 „Raubpflanze“-Monster, das du kontrollierst, als Tribut anbietest. Während der Main Phase, falls diese Karte in diesem Spielzug als Spezialbeschwörung beschworen wurde (Schnelleffekt): Du kannst Zauber/Fallen auf dem Spielfeld bis zur Anzahl der Monster mit einer Raubtier-Zählmarke wählen; zerstöre sie. Du kannst diesen Effekt von „Raubpflanze Kühner Teufel“ nur einmal pro Spielzug verwenden.
  | it_name            = Predapianta Spericoldiavolo
  | it_text            = 1 mostro "Predapianta" + 1 mostro di Livello 1<br />Deve prima essere Evocato tramite Fusione, oppure Evocato Specialmente (dal tuo Extra Deck) offrendo come Tributo 1 mostro su qualsiasi Terreno con un Segnalino Predatore e 1 mostro "Predapianta" che controlli. Durante la Main Phase, se questa carta è stata Evocata Specialmente in questo turno (Effetto Rapido): puoi scegliere come bersaglio Magie/Trappole sul Terreno, fino al numero di mostri con un Segnalino Predatore; distruggile. Puoi utilizzare questo effetto di "Predapianta Spericoldiavolo" una sola volta per turno.
  | pt_name            = Predaplanta Diabousada
  | pt_text            = 1 monstro "Predaplanta" + 1 monstro de Nível 1<br />Primeiro deve ser Invocado por Invocação-Fusão, ou por Invocação-Especial (do seu Deck Adicional) ao oferecer como Tributo 1 monstro em qualquer campo com um Marcador de Predador e 1 monstro "Predaplanta" que você controla. Durante a Fase Principal, se este card foi Invocado por Invocação-Especial neste turno (Efeito Rápido): você pode escolher Magias/Armadilhas no campo, até o número de monstros com um Marcador de Predador; destrua-as. Você só pode usar este efeito de "Predaplanta Diabousada" uma vez por turno.
  | es_name            = Predaplanta Temeradiablo
  | es_text            = 1 monstruo "Predaplanta" + 1 monstruo de Nivel 1<br />Debe ser primero Invocado por Fusión, o Invocado de Modo Especial (desde tu Deck Extra) Sacrificando 1 monstruo en cualquier Campo con un Contador de Predador y 1 monstruo "Predaplanta" que controles. Durante la Main Phase, si esta carta fue Invocada de Modo Especial este turno (Efecto Rápido): puedes seleccionar hasta tantas Mágicas/Trampas en el Campo como el número de monstruos con un Contador de Predador; destrúyelas. Sólo puedes usar este efecto de "Predaplanta Temeradiablo" una vez por turno.
  | ja_text            = 「捕食植物」モンスター＋レベル１モンスター<br />このカードは融合召喚及び以下の方法でのみＥＸデッキから特殊召喚できる。<br />●自分フィールドの「捕食植物」モンスター１体と自分か相手のフィールドの捕食カウンターが置かれているモンスター１体をリリースした場合に特殊召喚できる。<br />このカード名の効果は１ターンに１度しか使用できない。<br />①：このカードが特殊召喚した自分・相手ターンのメインフェイズに、捕食カウンターが置かれているモンスターの数まで、フィールドの魔法・罠カードを対象として発動できる。そのカードを破壊する。
  | ko_name            = 프레데터 플랜츠 데아데블
  | ko_text            = "프레데터 플랜츠" 몬스터 ＋ 레벨 1 몬스터<br />이 카드는 융합 소환 및 이하의 방법으로만 엑스트라 덱에서 특수 소환할 수 있다.<br />●자신 필드의 "프레데터 플랜츠" 몬스터 1장과 자신이나 상대의 필드의 포식 카운터가 놓여 있는 몬스터 1장을 릴리스했을 경우에 특수 소환할 수 있다.<br />이 카드명의 효과는 1턴에 1번밖에 사용할 수 없다.<br />①: 이 카드를 특수 소환한 자신 / 상대 턴의 메인 페이즈에, 포식 카운터가 놓여 있는 몬스터의 수까지, 필드의 마법 / 함정 카드를 대상으로 하고 발동할 수 있다. 그 카드를 파괴한다.
  | tc_name            = 捕食植物 無畏魔鬼樹
  | tc_text            = 「捕食植物」怪獸＋等級1怪獸<br />此卡從額外牌組僅可透過融合召喚及以下方法特殊召喚。<br />●解放自己場上的1隻「捕食植物」怪獸和自己或對手場上放有捕食計數物的1隻怪獸的情況下可以特殊召喚。<br />此卡名的效果1回合僅可使用1次。<br />①：在此卡特殊召喚的自己・對手回合的主要階段，以放有捕食計數物的怪獸數量為上限，以場上的魔法・陷阱卡為對象可以發動。將該卡破壞。
  | sc_name            = 捕食植物 无畏魔鬼树
  | sc_text            = “捕食植物”怪兽＋等级1怪兽<br />此卡从额外牌组仅可通过融合召唤及以下方法特殊召唤。<br />●解放自己场上的1只“捕食植物”怪兽和自己或对手场上放有捕食计数物的1只怪兽的情况下可以特殊召唤。<br />此卡名的效果1回合仅可使用1次。<br />①：在此卡特殊召唤的自己・对手回合的主要阶段，以放有捕食计数物的怪兽数量为上限，以场上的魔法・陷阱卡为对象可以发动。将该卡破坏。
  }}
