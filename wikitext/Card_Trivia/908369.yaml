title: Card Trivia:Dragunity Knight - Gormfaobhar
wikitext: |-
  {{Navigation}}

  * This card is an older [[counterpart]] of "[[Dragunity Guisarme]]".
  * This card is the first "[[Dragunity]]" [[Synchro Monster]] to not be named after a pole weapon, but rather after a ruler, like "[[Dragunity Knight - Romulus]]".
  * ''Gorm Faobhar'' is Irish Gaelic for "blue blade." It may be a reference to Gorm-Glas (lit. "blue-green")—the sword of [[wikipedia:Conchobar mac Nessa|Conchobar mac Nessa]], one of the main characters in the [[wikipedia:Ulster Cycle|Ulster Cycle]] of Irish mythology.
