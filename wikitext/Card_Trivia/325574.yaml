title: Card Trivia:Deskbot 001
wikitext: |-
  {{Navigation}}

  * This monster's background and weaponry tie in with its name - they are items one would expect to find on a desk.
  ** Its sword appears to be a mechanical pencil, its gun refills for that pencil, its helmet has pen nibs, and it has a pencil sharpener on its torso armor.
  ** In the background, you can also see scissors, a compass, and a pen.
  * The number 001 can be seen on this monster's helmet.
  * This monster appears in the artwork of "[[Deskbot Jet]]", piloting the jet from the cockpit.
  * This is the only "[[Deskbot]]" [[Monster Card|monster]] that does not support the [[archetype]].
