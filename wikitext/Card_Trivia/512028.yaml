title: Card Trivia:Armed Dragon LV10
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Duelist Pack: Chazz Princeton]]''.
  * This monster appears in the artwork of "[[Level Down!?]]".
  * "[[Armed Dragon LV3]]" → "[[Armed Dragon LV5]]" → "[[Armed Dragon LV7]]" → "Armed Dragon LV10"
  ** This monster is an [[Card evolutions|upgraded]] form of "Armed Dragon LV7".
  ** This is the only "[[LV]]" monster to be 3 [[Level]]s higher than its previous form.
  * This monster has two [[retrained]] counterparts: "[[Armed Dragon LV10 White]]" and "[[Armed Dragon Thunder LV10]]".
  * This is the [[signature card]] of [[Chazz Princeton]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card has the same [[ATK]] (3000) as the signature cards of the rivals from the other ''[[Master Duel]]'' anime series: [[Seto Kaiba]]'s "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]", [[Jack Atlas]]'s "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]", [[Kite Tenjo]]'s "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]", [[Declan Akaba]]'s "[[D/D/D Doom King Armageddon (anime)|D/D/D Doom King Armageddon]]", and [[Roken Kogami|Varis]]'s "[[Borreload Dragon (anime)|Borreload Dragon]]".
