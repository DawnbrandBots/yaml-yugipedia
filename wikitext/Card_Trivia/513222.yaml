title: Card Trivia:Cyberdark Impact!
wikitext: |-
  {{Navigation}}

  * This card's artwork features "[[Cyberdark Horn]]", "[[Cyberdark Keel]]", and "[[Cyberdark Edge]]" fusing into "[[Cyberdark Dragon]]". The artwork's background looks very similar to "[[Degenerate Circuit]]".
  ** All of these cards debuted in the set with almost the same name as this card, "[[Cyberdark Impact]]"; however, this card itself was not released in that set.
  * This is the only card that [[Fusion Summon]]s to specify by name all of the [[Fusion Material]]s it uses.
  * This is the first card in the ''OCG''/''TCG'' that can Fusion Summon a [[Fusion Monster]] by returning the Fusion Materials to the Deck.
