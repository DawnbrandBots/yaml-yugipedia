title: Card Trivia:Acid Slime
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Multiple copies of this monster appear in the artwork of "[[Last Machine Acid Virus]]".
  * This monster's effect to inflict 800 damage to the opponent after being [[destroyed by battle]] is based on the corrosive properties of [[wikipedia:Acid|acid]], which causes chemical burns upon physical contact.
