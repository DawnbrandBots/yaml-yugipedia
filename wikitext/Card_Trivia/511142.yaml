title: Card Trivia:The Legendary Gambler
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The man featured in this card's artwork resembles the younger version of [[Solomon Muto]], who uses this card in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** Fittingly, this card's name and [[die roll]] effect references how Solomon was a "gaming master" and a gambler in his younger days.
