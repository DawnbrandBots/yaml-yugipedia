title: Card Trivia:Bokoichi the Freightening Car
wikitext: |-
  {{Navigation}}

  * "[[Dekoichi the Battlechanted Locomotive]]" appears in the background of this card's artwork.
  ** This card's artwork is a different angle of the artwork of "Dekoichi".
  * The [[Eye of Wdjat]] appears in this card's artwork as the rear bumpers.
  * "Freightening" in this card's English name is a portmanteau of "freight" and "frightening", reflecting the frightening expression on this monster's face.
  * The code on this monster's side, "BO-51", can be read as ''Bo-ko-ichi'' ('''5''' = ''ko'', '''1''' = ''ichi''), which is this card's name.
  * At least one Spanish print of this card has errors: its text says "pero la mayor'''i'''a de la mercanc'''i'''a llega rota" instead of "pero la mayor'''í'''a de la mercanc'''í'''a llega rota" (''but most cargo arrives broken'') and its name is "Bokoichi el Coche '''Q'''ue Asusta" instead of "Bokoichi''',''' el Coche '''q'''ue Asusta".
