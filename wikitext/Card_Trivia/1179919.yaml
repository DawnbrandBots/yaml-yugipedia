title: Card Trivia:Funny Dark Rabbit
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Dark Rabbit]]".
  ** This monster's appearance is based on [[Funny Bunny]], the favorite cartoon character of [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], whose appearance includes his pinkish color scheme, goggles, boots, and shovel.
  ** This monster's effect to be treated as a [[Toon monster]] while "[[Toon World]]" is on the [[field]] references how Pegasus's monsters were affected by the effect of "[[Toon World (manga)|Toon World]]" in the ''Yu-Gi-Oh!'' manga and anime, whereas in both mediums, when Pegasus [[activate]]d "Toon World", it transformed "Dark Rabbit" into a Toon monster.
