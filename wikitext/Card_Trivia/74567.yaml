title: Card Trivia:T.A.D.P.O.L.E.
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Rain of Frogs]]", "[[Sealing Ceremony of Suiton]]", and "[[Underworld Egg Clutch]]".
  ** This monster's back patterns appear as musical notes in the artwork of "[[Des Croaking]]".
  * This monster is the tadpole version of "[[Beelze Frog]]".
  * This monster's Japanese name is a pun, as the characters 悪 / 魂 / 邪 / 苦 / 止 (pronounced ''o'' / ''tama'' / ''ja'' / ''ku'' / ''shi'' respectively) individually mean "evil" / "soul" / "vice" / "pain" / "stop", but the syllables can also form the single word "''otamajakushi''" or "tadpole". This monster's ''[[TCG]]'' name is an attempt at transferring the spirit of the pun.
