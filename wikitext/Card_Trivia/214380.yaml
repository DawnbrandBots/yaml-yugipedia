title: Card Trivia:Cattycorn
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Monstrous Revenge]]''.
  * This monster's Japanese name ({{name|Cattycorn|ja}}, ''{{romanized name|Cattycorn|ja}}'') is a portmanteau of the words "cat" (ネコ, ''neko'') and "corn" (コーン, ''kōn'').
  ** This monster's English name is likely a pun on the term "catty-corner", which means to arrange something in a diagonal configuration.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|011|ref}}, specifically from the panel showing [[Cattycorn (manga)|this monster]] being Summoned.
