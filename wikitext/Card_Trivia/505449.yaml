title: Card Trivia:Crystal Beast Ruby Carbuncle
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Edition Volume 1]]'', ''[[Precious Pack Volume 2]]'', and ''[[Duelist Pack: Jesse Anderson]]''.
  * This monster appears in the artworks of "[[Crystal Bond]]", "[[Crystal Boon]]", "[[Crystal Conclave]]", "[[Crystal Flash]]", "[[Golden Rule]]", "[[Jesse Anderson - Bonder with the Crystal Beasts]]", "[[Rainbow Bridge of the Heart]]", "[[Rainbow Path]]", "[[Trap Strap]]", and "[[Jesse and Ruby - Unleashing the Legend]]".
  ** This monster's crystal form appears in the artworks of "[[Counter Gem]]", "[[Crystal Abundance]]", "[[Crystal Beast Token]]", "[[Crystal Keeper]]", "[[Crystal Master]]", "[[Crystal Miracle]]", "[[Crystal Promise]]", "[[Crystal Release]]", and "[[Ultimate Crystal Magic]]".
  * This monster is based on the gemstone [[wikipedia:Carbuncle (gemstone)|carbuncle]], as well as the [[wikipedia:Carbuncle (legendary animal)|carbuncle]] from South American folklore that is associated with the gemstones.
  ** This monster's name is based on a [[wikipedia:Ruby|ruby]], one of two variations of [[wikipedia:Corundum|corundum]] mineral, the other being sapphire.
  ** Additionally, in the ''[[wikipedia:Final Fantasy|Final Fantasy]]'' video game series, a carbuncle is also known by its ruby.
  * This monster has an "[[Advanced Crystal Beast]]" [[counterpart]]: "[[Advanced Crystal Beast Ruby Carbuncle]]".
  * This is the only "[[Crystal Beast]]" monster that does not speak in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * In ''[[Yu-Gi-Oh! GX Tag Force 2]]'', this monster can be seen jumping on the lower right-hand corner of the loading screen.
  * This monster is the only "[[Crystal Beast]]" whose eyes are not human like.
