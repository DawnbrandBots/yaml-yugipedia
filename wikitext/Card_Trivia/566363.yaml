title: Card Trivia:Token Collector
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Escapegoat]]".
  * Several "[[Sheep Token]]s", as well as some of the unknown Tokens from the artworks of the [[Token Celebration]] cards, appear in this card's artwork.
  ** This monster seems to be a child [[goblin]] and is probably related to the goblins from the rest of the Token Celebration cards.
