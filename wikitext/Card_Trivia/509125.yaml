title: Card Trivia:Banisher of the Light
wikitext: |-
  {{Navigation}}

  * This card shares its effect, Level, Type and Attribute with "[[Banisher of the Radiance]]".  Its ATK/DEF stats, however, are opposite; while "[[Banisher of the Light]]" has lower ATK and higher DEF, "[[Banisher of the Radiance]]" has higher ATK and lower DEF.
