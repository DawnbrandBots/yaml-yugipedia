title: Card Trivia:Goblin Calligrapher
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Attention!]]", "[[Fake Trap]]", "[[Onikuji]]", "[[Kingyo Sukui]]", and "[[Trickstar Treat]]".
  ** Fittingly, the word 「スカ」(''suka'', lit. "Fail") in this monster's Japanese name also appears on the scroll in the Japanese artwork of "Fake Trap". This monster's [[flavor text]] also states that he "devotes himself to mastering perfect calligraphy of the word 'False'", further reflecting the connection between both cards.
  *** Although all ''[[TCG]]'' versions of "Fake Trap" use the English artwork featuring the word "FALSE", the flavor text in each language uses its own translation of the word (e.g. French "Faux"). Meanwhile, the Korean text uses the English word even though the Korean name is a direct translation of the Japanese one.
  ** Interestingly, this monster's horn, tongue, and ears are retained in this card's ''TCG'' artwork despite being censored in that of "Fake Trap".
  * This monster has a [[retrained]] "[[Memento]]" [[counterpart]]: "[[Mementotlan Goblin]]".
