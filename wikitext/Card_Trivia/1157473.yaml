title: Card Trivia:Ame no Habakiri no Mitsurugi
wikitext: |-
  {{Navigation}}

  * This monster is named after the ''[[wikipedia:Totsuka-no-Tsurugi|Ame no Habakiri no Tsurugi]]'', the sword used by the god [[wikipedia:Susanoo-no-Mikoto|Susanoo]] to kill the eight-headed dragon/serpent [[wikipedia:Yamata no Orochi|Yamata no Orochi]] before it was damaged after he struck the tail, which stored the ''[[wikipedia:Kusanagi no Tsurugi|Ame-no-Murakumo-no-Tsurugi]]''.
