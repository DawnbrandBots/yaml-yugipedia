title: Card Trivia:Alluring Mirror Split
wikitext: |-
  {{Navigation}}

  * "[[Cyber Harpie Lady]]", "[[Harpie Channeler]]", "[[Harpie Dancer]]", "[[Harpie Perfumer]]", "[[Harpie Queen]]", and a silhouette of "[[Harpie's Pet Dragon]]" appear in this card's artwork.
  ** The first five monsters appear the represent the eras in which the "[[Harpie]]" archetype received support in the ''[[OCG]]''/''[[TCG]]'' ("Cyber Lady" for ''[[Yu-Gi-Oh! (anime)|DM]]'', "Queen" for ''[[Yu-Gi-Oh! GX|GX]]'', "Channeler" for ''[[Yu-Gi-Oh! ZEXAL|ZEXAL]]'', "Dancer" for ''[[Yu-Gi-Oh! ARC-V|ARC-V]]'', and "Perfumer" for ''[[Yu-Gi-Oh! VRAINS|VRAINS]]''). The ''[[Yu-Gi-Oh! 5D's|5D's]]'' era is not represented as no "Harpie" monsters were released during it.
