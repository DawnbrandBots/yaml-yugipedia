title: Card Trivia:Pegasus Wing
wikitext: |-
  {{Navigation}}

  * This card's name is based on a [[wikipedia:Pegasus|Pegasus]], a winged horse in [[wikipedia:Greek mythology|Greek mythology]].
  ** Despite this, this card's artwork does not depict a Pegasus, since it does not appear in [[wikipedia:Norse mythology|Norse mythology]]. Instead, it depicts one of the white steeds rode by the "[[Valkyrie]]" monsters gaining a pair of wings, which is demonstrated in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
