title: Card Trivia:Smashing Horn
wikitext: |-
  {{Navigation}}

  * "[[Black Horn of Heaven]]", "[[Horn of Heaven]]", and the arm of "[[Manticore of Darkness]]" appear in this card's artwork.
  ** Both cards can negate [[Summon]]s, and thus meet the conditions to activate this card in response.
  * This card's name and artwork are based on "[[Smashing Ground]]".
