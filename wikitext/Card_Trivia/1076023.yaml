title: Card Trivia:Evil HERO Darkest Knight
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] to "[[Evil HERO Dark Gaia]]".
  ** Both share the same [[Attribute]] ([[EARTH]]), [[Level]] (8), and [[DEF]] (0).
  ** Both require a [[Fiend]] and a monster of a different specific [[Type]] as their [[Fusion Material]]s.
  ** Both have an effect that depends on the combined [[original ATK]] of their materials.
  ** Both share a similar naming convention, though this monster's ''[[TCG]]'' name signifies the phrase "darkest night", likely in terms of either literal darkness or the gruesomeness of the events occurring therein.
  *** The term "darkest night" can also be considered an inverse of "[[Elemental HERO Sunrise]]" in terms of the time or quality of day and the "[[HERO]]" sub-archetype they each represent.
  ** This monster shares the same [[original ATK]] (1600) and a similar effect to make a second attack as "[[Evil HERO Infernal Gainer]]", one of the [[material]]s used to [[Fusion Summon]] "[[Evil Hero Dark Gaia (anime)|Evil Hero Dark Gaia]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** This monster shares design elements and aesthetics with "Evil HERO Infernal Gainer", including a helmet that features multiple eyes and a pair of large demonic horns.
  * This is one of the only two "HERO" Fusion Monsters (the other being "Evil HERO Dark Gaia") that does not mention a "HERO" monster as Fusion Material, besides "[[Masked HERO]]" monsters (which can only be [[Special Summon]]ed from the [[Extra Deck]] with "[[Mask Change]]").
