title: Card Trivia:Mariamne, the True Dracophoenix
wikitext: |-
  {{Navigation}}

  * A close-up of this monster's face appears in the background of the artwork of "[[True Draco Heritage]]".
  * This monster's Simplified Chinese name, "慈育圣母" (pinyin: cí yù shèng mǔ, lit. "merciful and nurturing holy mother"), is a variation of the Chinese translation of [[wikipedia:Virgin of Mercy|Virgin of Mercy]], "慈悲圣母" (pinyin: cí bēi shèng mǔ, lit. "merciful and benevolent holy mother").
  * Unlike the non-[[WIND]] "[[True Draco#True King|True King]]" monsters, who are depicted as destructive figures, this monster is depicted with a benevolent design. This is reinforced by the fact that this monster shares a similar design with "[[Master Peace, the True Dracoslaying King]]", and this monster's crown matches the design on "Master Peace's" shield.
