title: Card Trivia:Gravekeeper's Oracle
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legacy of the Valiant: Deluxe Edition]]''.
  * This monster appears in the artwork of "[[Gravekeeper's Inscription]]".
  * Engravings of "[[Slifer the Sky Dragon]]", "[[The Winged Dragon of Ra]]", and "[[Obelisk the Tormentor]]" appear on the tablet behind this monster in this card's artwork, each glowing in their respective colors.
  ** This card's effects are a reference to the signature effects of the [[Egyptian God]]s.
  *** Gaining [[ATK]] equal to the combined [[Level]]s that all monsters [[Tribute]]d for its [[Tribute Summon]] had on the [[field]] x 100: the anime effect of "[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]" to gain ATK equal to the combined ATK of all Tributed monsters.
  *** [[Destroy]]ing all [[Set]] monsters the opponent [[control]]s: the effect of "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]" to destroy all monsters the opponent controls.
  *** Making all monsters the opponent currently controls lose 2000 ATK/[[DEF]]: the effect of "Slifer the Sky Dragon" to reduces the ATK/DEF of any monster the opponent Summons by 2000.
  ** This card also has the same Level (10) as the Egyptian Gods.
  * The kanji ''Saniwa'' ({{Ruby|審神者|さにわ}}) in this card's Japanese name roughly translates to "one who hears the gods".
  ** This may suggest that this monster is the [[wikipedia:Oracle|oracle]] of the Egyptian Gods, whom they speak to the rest of the "[[Gravekeeper's]]" monsters through.
  * This monster is an [[Card evolutions|older]] form of "[[Gravekeeper's Descendant]]".
  ** Both monsters have the same orange pupils, yellow hair, wristguards, and ring on their left thumbs.
  ** This monster seems to have taken over the role of "[[Gravekeeper's Visionary]]".
  *** Both monsters have the same chair and scepter and wear similar shoulder pads.
  *** Both cards also have the same [[ATK]] (2000).
