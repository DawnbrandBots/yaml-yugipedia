title: Card Trivia:Cyber Search Dragon
wikitext: |-
  {{Navigation}}

  * This monster is similar to "[[Cyber Assault Dragon]]" and "[[Cyber Stealth Dragon]]".
  ** These monsters share the same [[Level]] (8), [[Summoning condition]], and require "[[Cyber Dragon (Rush Duel)|Cyber Dragon]]" in the [[Graveyard]] to use their effects.
