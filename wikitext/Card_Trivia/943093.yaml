title: Card Trivia:Salamangreat of Fire
wikitext: |-
  {{Navigation}}

  [[File:Burning Draw.png|thumb|250px|[[Soulburner]] using his [[Skill]], [[Burning Draw (anime Skill)|Burning Draw]].]]

  * Visually, this monster resembles "[[Achichi @Ignister]]" wearing the armor of "[[Salamangreat Heatleo]]".
  ** This monster also shares the same [[Level]] (2), [[Type]] ([[Cyberse]]), [[original ATK and DEF]] (800/800) and effects as "Achichi @Ignister".
  ** This monster's pose is based on [[Soulburner]]'s pose when while performing a [[Burning Draw (anime Skill)|Burning Draw]] in {{episode|Yu-Gi-Oh! VRAINS|49|ref}}.
  ** This monster has a device on its wrist that is based on Soulburner's [[Duel Disk]].
  * This monster features a red, flame-like, circular marking in its midsection, similar to the red marking found on the [[FIRE]] [[Ignis]], [[Flame]].
  ** Fittingly, Flame's partner, Soulburner, uses the "[[Salamangreat]]" [[Deck]] and, after his termination, later serves as the inspiration for "Achichi @Ignister".
  * This is the only "Salamangreat" monster that does not feature the archetype's base kanji (転生炎獣) in its name.
