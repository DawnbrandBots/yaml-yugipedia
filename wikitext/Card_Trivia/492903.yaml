title: Card Trivia:Parry Knights
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on "パーリー" (''Pārī''), a Japanese slang for "party", reflecting the monsters' flashy attires, as well as a pun of "party night".
  ** Also, to ''parry'' means to fend of an attack (as in [[wikipedia:Fencing|fencing]]) as this card can [[Special Summon]] itself (and another monster) after taking [[battle damage]] to defend against another possible attack that turn.
