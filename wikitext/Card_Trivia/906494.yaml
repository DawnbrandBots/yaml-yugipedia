title: Card Trivia:The Phantom Knights of Break Sword
wikitext: |-
  {{Navigation}}

  * This monster appears in the second artwork of "[[Phantom Knights' Fog Blade]]".
  * This monster is likely based on the [[wikipedia:Dullahan|Dullahan]], a mythological spirit of a headless knight riding a black horse who often carries its severed head.
  * This monster has a possible [[Card evolutions|upgraded]] form: "[[Raider's Knight]]".
  ** Both are "[[The Phantom Knights]]" [[Xyz Monster]]s with 2000 [[ATK]], and both have effects that [[destroy]] cards and [[Xyz Summon]] another Xyz Monster.
