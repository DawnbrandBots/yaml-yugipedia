title: Card Trivia:Overburst Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Tactical Exchanger]]".
  * This monster shares its [[Attribute]], [[Type]], and general appearance with the "[[rokket]]" archetype.
  * This monster is a counterpart of "[[Proxy Dragon]]", just as how "[[Booster Dragon]]" is a counterpart of "[[Security Dragon]]".
  ** Both are [[Link-2]] [[Link Monster]]s with the same position of position of [[Link Arrow]]s.
  ** Both are the "prototype" form of their respective [[Link-4]] counterpart: this monster is a prototype of "[[Borreload Dragon]]", while "Proxy Dragon" is a prototype of "[[Firewall Dragon]]".
