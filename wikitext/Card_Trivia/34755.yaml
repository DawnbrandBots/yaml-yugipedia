title: Card Trivia:Mirror of Yata
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Yata no Kagami|Yata no Kagami]], one of the three [[wikipedia:Imperial Regalia of Japan|Imperial Regalia of Japan]]. The other two are "[[Sword of Kusanagi]]" and "[[Orb of Yasaka]]".
  ** This is the only Imperial Regalia card that does not appear in another card's artwork.
  ** This card's effect is likely based on the fact that in Japanese mythology, [[wikipedia:Amaterasu|Amaterasu]] once sealed herself inside [[wikipedia:Amano-Iwato|a cave]], and once she was baited into looking out, she became entranced with her reflection in the Yata no Kagami.
  * The Spanish lore of this card uses the word "''regresar''" instead of "''devolver''" for the term "''return''".
