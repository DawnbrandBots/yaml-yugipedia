title: Card Trivia:Fusion Substitute
wikitext: |-
  {{Navigation}}

  * This card's artwork is an homage to the two original artworks of "[[Polymerization]]". The scene is almost an exact replica of the [[Polymerization (alternate password)|alternate-password version]] (the "Fiend" and "Dragon" monsters spiraling into a [[Spell Card]]), but with the figures replaced with those from the more common "Polymerization", featuring the abstract Fusion Material Monsters both centering in on a copy of "Polymerization" with those two figures missing from its artwork.
  * In the ''[[TCG]]'' and Korean ''OCG'', the card name of the "Polymerization" in this card's artwork is in English, regardless of the card's language.
