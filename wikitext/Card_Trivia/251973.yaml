title: Card Trivia:Attack the Moon!
wikitext: |-
  {{Navigation}}

  [[File:Attack the Moon!.png|thumb|250px|"[[Giant Soldier of Stone (manga)|Giant Soldier of Stone]]" destroys "[[Mystical moon (manga)|Mystical moon]]".]]

  * "[[Giant Soldier of Steel]]" and "[[Mystical Moon]]" appear in this card's artwork.
  * This card's name and effect reference a moment during [[Dark Yugi and Ryota Kajiki's Duel (manga)|Dark Yugi and Ryota Kajiki's Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (and its [[Yami Yugi and Mako Tsunami's Duel|anime counterpart]]) where [[Dark Yugi (manga)|Dark Yugi]] switches his "[[Giant Soldier of Stone (manga)|Giant Soldier of Stone]]" to [[Attack Position]] then attacked his own "[[Mystical moon (manga)|Mystical Moon]]" card with it, causing the [[Ocean|tide]] to go out and beach [[Ryota Kajiki (manga)|Ryota Kajiki's]] sea monsters.

