title: Card Trivia:Tenyi Spirit - Mula Adhara
wikitext: |-
  {{Navigation}}

  * This monster is the combined upgraded form of "[[Monk of the Tenyi]]" and "[[Tenyi Spirit - Adhara]]".
  ** "Monk of the Tenyi" is seen transforming into this monster in "[[Tenyinfinity]]".
  * This monster is a counterpart to "[[Draco Berserker of the Tenyi]]".
  ** Both are Level 8 "[[Tenyi]]" Wyrm Synchro Monsters with 3000 ATK and 0 DEF, but are of opposing Attributes.
  ** "Monk of the Tenyi" gains draconic features upon being enhanced by "Adhara" in the same way "[[Berserker of the Tenyi]]" does when enhanced by "[[Tenyi Spirit - Vishuda]]", such as dragon horns and arms.
  ** "Mula Adhara" gains bonuses when paired with a non-Effect Monster, while "Draco Berserker" gains bonuses for destroying an Effect Monster by battle.
