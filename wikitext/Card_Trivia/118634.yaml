title: Card Trivia:Gem-Knight Aquamarine
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the artworks of "[[Gem-Knight Master Diamond]]" and "[[Scatter Fusion]]".
  * This card is named after [[wikipedia:Aquamarine (gemstone)|aquamarine]], a blue variation of beryl mineral.
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gem-Knight Sapphire]]" and either "[[Gem-Knight Tourmaline]]".
  ** The thunderbolt mark on its chest-plate, the yellow trim on its armor, and its couter armor are based on "Tourmaline".
  * This monster's bladed shield is a reference to this card's effect of change to [[Defense Position]] at the end of the [[Battle Phase]], if it attacks.
  * This card and "Gem-Knight Sapphire" are the first [[EARTH]] [[Aqua]] monsters.
  * This card has the highest [[DEF]] of all the "[[Gem-Knight]]" monsters.
