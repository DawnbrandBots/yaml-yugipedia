title: Card Trivia:Fabled Raven
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Jurrac Impact]]", "[[Mind Pollutant]]", and "[[Stairway to a Fabled Realm]]".
  * This monster is slightly similar to [[wikia:c:castlevania:Malphas|Malphas]] from ''[[wikipedia:Castlevania|Castlevania]]'' by [[Konami]].
  * This is the only "[[Fabled]]" monster to appear in ''[[Yu-Gi-Oh! GX Tag Force 3]]'' (as "Fiend Roar Deity Raven").
