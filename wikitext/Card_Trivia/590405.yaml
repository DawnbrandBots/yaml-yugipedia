title: Card Trivia:Time Thief Redoer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[S-Force Bridgehead]]", "[[S-Force Showdown]]", "[[Time Thief Double Barrel]]", "[[Time Thief Flyback]]", and "[[Time Thief Retrograde]]".
  * This is one of the [[cover card]]s of ''[[Extra Pack 2019]]''.
  * His clothes style and color are similiar to those of Zero from the anime ''[https://en.wikipedia.org/wiki/Code_Geass Code Geass]''.
  ** In earlier designs, Zero also had white hair.
