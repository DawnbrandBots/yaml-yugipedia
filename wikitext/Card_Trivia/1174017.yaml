title: Card Trivia:Black Rose Dragon/Assault Mode
wikitext: |-
  {{Navigation}}

  * This monster is the [[Card evolutions|upgraded]] "[[/Assault Mode]]" form of "[[Black Rose Dragon]]".
  ** The green gem on this monster's neck is a reference to the medallion worn by [[Akiza Izinski]], who uses "[[Black Rose Dragon (anime)|Black Rose Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime. The purple gems on this monster's head and armor are likewise based on the purple gems on Akiza's [[Duel Disk]].
