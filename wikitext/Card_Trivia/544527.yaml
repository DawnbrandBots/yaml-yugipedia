title: Card Trivia:Mermail Abyssalacia
wikitext: |-
  {{Navigation}}

  * "[[Abyss-sting Triaina]]" appears in this card's artwork, wielded by this monster.
  * This is the first [[Extra Deck]] monster that lists monsters of multiple specific [[Type]]s as [[material]]s.
  ** It is also the first [[Sea Serpent]] [[Link Monster]].
  * This monster is a human counterpart of "[[Mermail Abysstrite]]".
  ** Both have the same ATK and Type, similar appearance, and carry the same scepter.
  ** According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], "Abysstrite" made a great sacrifice in order to gain legs to be able to walk of the surfaced "[[Lemuria, the Forgotten City]]".
  * This monster is named after the Roman goddess [[wikipedia:Salacia (mythology)|Salacia]], Neptune's wife. Her Greek counterpart is Amphitrite.
