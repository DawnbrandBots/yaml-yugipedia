title: Card Trivia:Trickstar Reincarnation
wikitext: |-
  {{Navigation}}

  * "[[Trickstar Holly Angel]]" appears in this card's artwork.
  * This card's name and artwork are puns on the word "reincarnation" (which reflects its effect to [[Special Summon]] a "[[Trickstar]]" [[Link Monster]] from the [[Graveyard]]), and "[[wikipedia:Dianthus caryophyllus|carnation]]" (a species of flower, which appears in this card's artwork).
