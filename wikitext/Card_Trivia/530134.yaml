title: Card Trivia:F.A. Hang On Mach
wikitext: |-
  {{Navigation}}

  * "[[U.A. Perfect Ace]]" is the driver in this card's artwork.
  * This monster appears in the artworks of "[[F.A. Circuit Grand Prix]]" and "[[F.A. Winners]]".
  * "Hang on" (referred to as "hang-off" in North America) is the Japanese term used for a motorcycle cornering technique where the rider moves their body off the [[wikipedia:Motorcycle seat|saddle]] toward the inside of the turn they're currently cornering, in order to counter the [[wikipedia:Centrifugal force|centrifugal force]] that attempts to keep the motorcycle moving in a straight direction. As a result, this technique usually allows the rider to maintain their speed throughout a turn with minimal deceleration.
