title: Card Trivia:Hamburger Recipe
wikitext: |-
  {{Navigation}}

  * According to [[The Valuable Book EX 4 card storylines#No. 08: A Fiendish Menu|''The Valuable Book EX 4'' card storylines]], the monster in this card's artwork was the first head chef of the restaurant from the "[[Nouvelles]]" lore.
  * In ''[[Yu-Gi-Oh! The Sacred Cards]]'', this card requires "[[Bio Plant]]" as one of the [[Tribute]]s to [[Ritual Summon]] "[[Hungry Burger]]".
  * In ''[[Yu-Gi-Oh! Duelist of the Roses]]'',  this card requires "[[Battle Steer]]", "Bio Plant", and "[[Griggle]]" as Tributes for the Ritual Summon of "Hungry Burger".
  ** This is likely based on the required ingredients for a hamburger, which includes beef ("Battle Steer") and vegetables ("Bio Plant" and "Griggle").
