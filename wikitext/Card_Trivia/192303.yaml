title: Card Trivia:Photon Lizard
wikitext: |-
  {{Navigation}}

  * This card resembles "[[Thunder Dragon]]" since both of them are [[LIGHT]]-[[Attribute]] monsters that add cards from your Deck to your hand and can fuse another of its copy to form a [[Fusion Monster]]. Also, since Kite resembles Kaiba, Kite uses "[[Photon Lizard]]" while Kaiba uses Thunder Dragon.
  * This card is similar to "[[Cyber Dragon]]", in that, in the Anime, this card could be used to [[Fusion Summon]] "[[Twin Photon Lizard]]" using 2 '''Photon Lizard''',  and 2 "[[Cyber Dragon]]" to [[Fusion Summon]] "[[Cyber Twin Dragon]]".
  * Despite its cards name it is a dragon, when usually lizard means [[Reptile]], it shares this trait with [[Lizard Soldier]] although the latter's description adds some insight as to why. There is a vice versa of this instance as well, the other being [[Evil Dragon Ananta]] which despite its name is a reptile not a [[Dragon]].
  ** Another similarity to "Cyber Dragon", in which it has ''dragon'' in its name but is actually a [[Machine]].
