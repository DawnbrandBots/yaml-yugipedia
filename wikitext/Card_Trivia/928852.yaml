title: Card Trivia:Stunning Stacking Stones
wikitext: |-
  {{Navigation|mode=nongame}}

  * The balancing stones in this card's artowrk appear in the artwork of "[[Fossilized Star Aldebalance]]".
  * The Japanese pronunciation of "Pyroxene Tool" (輝石器 ''Kiseki'') is a portmanteau of "pyroxene" (輝石 ''Kiseki'') and "stone tool" (石器 ''Sekki'').
