title: Card Trivia:Appliancer Test
wikitext: |-
  {{Navigation}}

  * "[[Robotic Knight]]" and four torsos of "[[Appliancer Laundry Dragon]]" appear in this card's artwork.
  ** The specific appearance of "Robotic Knight" in this card's artwork references [[Nezbitt]], a character in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime who claimed that while he was in charge of [[Kaiba Corporation]]'s military factories, people called him the Drill Sergeant of the factories. In the complementary flashback scene in {{episode|Yu-Gi-Oh!|106|ref}} where he made that claim, he was shown with a clipboard, similar to "Robotic Knight" in this card's artwork.
  *** This reference is supported by the fact that Nezbitt used "[[Robotic Knight (anime)|Robotic Knight]]" as his [[Deck Master]]. In contrast with the artwork of "Robotic Knight", this Spell Card's artwork depicts "Robotic Knight" with two hands (instead of one hand and a [[wikipedia:Gatling gun|Gatling gun]] serving as his other forearm/hand), which was the same as Nezbitt's appearance as "Robotic Knight".
