title: Card Trivia:Megalith Ophiel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Megalith Portal]]".
  * This monster is based on [[wikipedia:Olympian spirits|Ophiel]], one of the seven [[wikipedia:Olympian spirits|Olympian spirits]].
  * This monster has a [[Card evolutions|transformed]] version: "[[Megalith Phaleg]]".
  ** "Megalith Phaleg" is emerging from the bottom of the base of this monster.
