title: Card Trivia:Apprentice Knight
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[wikipedia:Joan of Arc|Joan of Arc]], a prominent figure in the [[wikipedia:Hundred Years' War|Hundred Years' War]] where she fought as a member of the French army disguised in a soldier's armor.
  ** Despite this, this card's [[flavor text]] references the tale of  [[wikipedia:Hua Mulan|Hua Mulan]], a legendary Chinese folk heroine who took her aging father's place in the army disguised as a male soldier.
