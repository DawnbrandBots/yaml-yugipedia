title: Card Trivia:Gravekeeper's Priestess
wikitext: |-
  {{Navigation}}

  * This monster is a younger version of "[[Gravekeeper's Shaman]]".
  * This monster is wielding the same scepter as "[[Gravekeeper's Chief]]", "[[Gravekeeper's Descendant]]", "[[Gravekeeper's Oracle]]", and "[[Gravekeeper's Visionary]]".
  * This is one of several "[[Gravekeeper's]] monsters released in the ''[[Yu-Gi-Oh! 5D's]]'' era whose designs are based on the [[Ishtar]] family. In this monster's case, it bears resemblance to [[Ishizu Ishtar]] wearing a blindfold.
  * This monster and "[[Maiden of the Aqua]]" are the only two monsters that can [[Treats field as Field Spell Card|treat the field as a Field Spell Card]].
  ** Coincidentally, both monsters feature the word "priestess" (巫女 ''Miko'') in their Japanese names.
  * The Spanish print of this card's name features a typo: it is printed as "'''Sacedortisa''' del Cuidador de Tumbas" when it should be "'''Sacerdotisa''' del Cuidador de Tumbas".
