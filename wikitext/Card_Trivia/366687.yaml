title: Card Trivia:Limit Overdrive
wikitext: |-
  {{Navigation}}

  * "[[Shooting Quasar Dragon]]" and [[Yusei Fudo]] riding his [[Duel Runner]], ''[[Yusei Go]]'' appear in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|5D's|150|ref}} where Yusei, while riding his ''Yusei Go'' outfitted with red flying wings, enters the state of [[Over Top Clear Mind]], allowing him to [[Limit Over Accel Synchro Summon]] "[[Shooting Quasar Dragon (anime)|Shooting Quasar Dragon]]".
  ** Ironically, despite the depicted scene, this card's effect does not allow the player to perform a [[Synchro Summon]].

