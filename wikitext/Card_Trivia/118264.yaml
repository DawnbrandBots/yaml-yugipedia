title: Card Trivia:The Portrait's Secret
wikitext: |-
  {{Navigation}}

  * This monster is likely a reference to ''[[wikipedia:The Picture of Dorian Gray|The Picture of Dorian Gray]]'', a philosophical novella written by [[wikipedia:Oscar Wilde|Oscar Wilde]], in which the titular main character sells his soul to maintain his beauty and age and pursue amoral experiences while the portrait becomes aged and corrupted with every sin.
  ** Based on the portrait in this card's artwork, the man's clothing and tied cravat inside the portrait likely indicates that it was created (and accursed) in the early 19th century in western Europe, possibly the United Kingdom. The man's beard, however, resembles the style sported by emperor William I and many other Germans during the era of the foundation of the second German Empire around 1870.
  * "[[Dark Spirit of Malice]]" is a combination of this monster, "[[Dark Spirit of the Silent]]", and "[[Earthbound Spirit]]".
  * This is the first monster [[Summon]]ed by [[Dark Bakura (manga)|Dark Bakura]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * This monster's pose in its ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|204|ref}} showing [[The Portrait's Secret (manga)|this monster]] being Summoned.
