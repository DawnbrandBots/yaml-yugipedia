title: Card Trivia:Hyper Blaze
wikitext: |-
  {{Navigation}}

  * "[[Uria, Lord of Searing Flames]]" appears in this card's artwork.
  * This card's name is based on the [[Attack and effect names|attack name]] of "Uria, Lord of Searing Flames" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's first effect references the [[Summoning condition]] of "Uria, Lord of Searing Flames" in the anime, as it also allowed [[Set]] [[Trap Card]]s to be used for its [[Special Summon]].
  ** This card's last effect references the last anime effect of "Uria, Lord of Searing Flames", which can be [[Special Summon]]ed from the [[Graveyard]] by [[send]]ing a Trap from the player's [[hand]] to the Graveyard.
