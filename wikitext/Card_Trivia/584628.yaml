title: Card Trivia:Evil Eye of Selene
wikitext: |-
  {{Navigation}}

  * This card's name is likely named after [[wikipedia:Selene|Selene]], ancient Greek Goddess of the Moon. This is fitting, as several cards in the "[[Evil Eye]]" archetype feature a full moon in the sky in their artwork.
  * The eye in this card's artwork appears in the artworks of "[[Zerrziel, Ruler of the Evil Eyed]]", "[[Serziel, Watcher of the Evil Eye]]", "[[Evil Eye Awakening]]", "[[Evil Eye Defeat]]", "[[Evil Eye Mesmerism]]", "[[Evil Eye Reemergence]]", "[[Evil Eye Repose]]", "[[Evil Eyes Unleashed]]", and "[[Evil Eye Retribution]]".
  ** The head of "Serziel, Watcher of the Evil Eye" appears in this card's artwork.
