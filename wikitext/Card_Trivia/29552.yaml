title: Card Trivia:Dark-Eyes Illusionist
wikitext: |-
  {{Navigation}}

  * The [[Eye of Wdjat]] appears in this card's artwork.
  * This card has a [[retrained]] counterpart: "[[Millennium-Eyes Illusionist]]".
  * In ''[[Yu-Gi-Oh! The Sacred Cards]]'' and the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card's [[DEF]] is 0, while in the ''[[OCG]]''/''[[TCG]]'', its DEF is 1400.
  * In ''[[Yu-Gi-Oh! Dark Duel Stories]]'' and ''Yu-Gi-Oh! The Sacred Cards'', this card is required for the [[Ritual Summon]]ing of "[[Relinquished]]", referencing how this card was used to Ritual Summon "Relinquished" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and anime.
