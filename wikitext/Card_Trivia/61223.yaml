title: Card Trivia:Chamberlain of the Six Samurai
wikitext: |-
  {{Navigation}}

  * The two extra swords wielded by "[[Legendary Six Samurai - Kageki]]" with its mechanical arms appear in this card's artwork.
  * This monster is an older form of "[[Legendary Six Samurai - Kageki]]".
  ** Both have the same [[Level]], [[ATK]], and [[DEF]].
  ** This monster has the same mechanical arms as "Kageki".
  * This card is the only "[[Six Samurai]]" [[Normal Monster]].
