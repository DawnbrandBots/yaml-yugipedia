  * "[[Number C102: Archfiend Seraph]]" and "[[Number C103: Ragnafinity]]" appear in this card's artwork.
  ** This references how the above-mentioned cards' owners, [[Dumon]] and [[Marin]] worked together in their Duel against [[Vector]], as the effects of their two cards compliment one another.
