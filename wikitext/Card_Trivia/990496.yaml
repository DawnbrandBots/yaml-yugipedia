title: Card Trivia:Beautiful Bird Star-Striped Eagle
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artworks of "[[Beautiful Bird Burst]]" and "[[Beautiful Bird Defense Change]]".
  * This monster features multiple motifs of the [[wikipedia:United States of America|United States of America]]:
  ** Its name, "Star-Striped", references the nickname of the [[wikipedia:Flag of the United States|flag of the United States]], "the Stars and Stripes", which is present in this monster's design. Additionally, its red, white, and blue color scheme reference the same colors on the same flag.
  ** Its name, "Eagle", references the [[wikipedia:Bald eagle|bald eagle]], the national bird of the United States, while this monster's large, feather-like scarf resembles the wings of a bald eagle.
  ** Its appearance resembles that of an [[wikipedia:American football|American football player]]. Additionally, this monster is depicted wielding a ball resembling a [[wikipedia:Ball (gridiron football)|football]].
