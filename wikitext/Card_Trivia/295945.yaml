title: Card Trivia:BIG Win!?
wikitext: |-
  {{Navigation}}

  * "[[Sand Gambler]]", the cards "[[Left Leg of the Forbidden One]]", "[[Right Leg of the Forbidden One]]", "[[Left Arm of the Forbidden One]]", "[[Right Arm of the Forbidden One]]", "[[Skull Servant]]", "[[King of the Skull Servants]]", "[[The Lady in Wight]]", and "[[Wightmare]]", and the hands appearing in the artwork of "[[Ante]]" appear in this card's artwork.
  ** This card's artwork seems to depict a comeback victory for "Sand Gambler", who controls the "[[Forbidden One]]" [[Normal Monster]]s, about to [[flip]] his [[Set]] card over. His unseen opponent, who is grabbing the gold coins, appear to be unaware of "Sand Gambler's" Set card, which is likely "[[Exodia the Forbidden One]]".
  * The coins in this card's artwork are embossed with [[Level]] Stars, referencing this card's Level-changing effect.
