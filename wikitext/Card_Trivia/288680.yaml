title: Card Trivia:Doggy Diver
wikitext: |-
  {{Navigation}}

  * The first portion of this monster's Japanese name, "Troubull Diver" (トラブル・ダイバー, ''Toraburu Daibā'') is a portmanteau of the words "tiger" (トラ, ''tora'') and "bull" (short for "[[wikipedia:Bulldog|bulldog]]"), which collectively sound like the word "trouble".
  ** Fittingly, this pun is reflected by this monster's design, as it is a bulldog wearing a diving suit with a tiger-striped pattern.
