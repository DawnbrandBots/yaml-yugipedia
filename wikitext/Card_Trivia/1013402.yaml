title: Card Trivia:Toon Rollback
wikitext: |-
  {{Navigation}}

  * This card's name and artwork are based on on the act of rewinding, the action of "rolling back" a [[wikipedia:Film reel|film reel]], which in turn is associated with [[wikipedia:Golden age of American animation|early animated cartoons]].
  ** This is further indicated by [[Toon Rollback (anime)|this card's anime effect]], which allowed its user to "rewind time" and conduct a second [[Battle Phase]] during the same turn.
