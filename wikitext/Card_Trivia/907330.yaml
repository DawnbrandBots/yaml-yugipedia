title: Card Trivia:Double Dust Tornado Twins
wikitext: |-
  {{Navigation}}

  * This card's effect is based on the effects of "[[Hey, Trunade!]]" and "[[Dust Tornado]]". "Hey, Trunade!" [[return]]s [[Set]] Spell/Trap Cards to the [[hand]], while "Dust Tornado" allows Spell/Trap Cards to be Set from the hand after its primary effect successfully resolves.
  ** This card's name directly references "Dust Tornado".
  * The farm from the artworks of "Hey, Trunade!" and "[[Localized Tornado]]" appears in this card's artwork.
  ** This card's artwork appears to depict a follow-up to the artwork 1of "Hey, Trunade!", which in turn is continued from the events of the artwork of "Localized Tornado" - this is indicated by the worsened ramshackle condition of the farm, including the farm buildings being located in different spots from before.
  ** The different locations of the buildings are likely a reference to this card's effect, since it returns Set Spell/Trap Cards to the hand and allows them to be Set again on the field in any Spell & Trap Zone.
