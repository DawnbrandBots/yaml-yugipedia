title: Card Trivia:Crusadia Draco
wikitext: |-
  {{Navigation}}

  * "[[World Chalice Guardragon]]" → "[[Imduk the World Chalice Dragon]]" → "Crusadia Draco" → "[[Guardragon Andrake]]" → "[[World Chalice Guardragon Almarduke]]" / "[[World Legacy Guardragon Mardark]]"
  ** This monster has a corrupted counterpart: "Guardragon Andrake". This is reinforced by the fact that they have the same [[Level]], [[Attribute]] and [[Type]], as well as having mirrored [[ATK]]/[[DEF]].
  * This monster appears in the artworks of "[[World Legacy's Mind Meld]]", "[[Crusadia Revival]]", "[[Crusadia Vanguard]]", "[[Orcustrated Einsatz]]", "[[Guardragon Shield]]" and "[[World Legacy Guardragon]]".
