title: Card Trivia:World of Prophecy
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * The sword of "[[Charioteer of Prophecy]]", one of the staves of "[[Stoic of Prophecy]]", the axe of "[[Strength of Prophecy]]", and the bow of "[[Amores of Prophecy]]" appear in this card's artwork.
  ** This card's artwork is a reference to the artwork of the Tarot card, which features four creatures that represent the [[wikipedia:Classical Element|four elements]] of the natural world. The four elements are Earth, Water, Air, and Fire, which are represented in this card's artwork by the weapons of "Amores", "Stoic", "Charioteer", and "Strength", respectively.
  * This monster is "[[Reaper of Prophecy]]" after being "purified" in the artwork of "[[Spellbook of Judgment]]" and "[[Spellbook of Miracles]]". This monster also has the crest of "Spellbook of Judgment" on its belt, as well as its six wings forming the crest's shape.
  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The World (Tarot card)|The World]], the twenty-first of the [[wikipedia:Major Arcana|Major Arcana]]. Based on the story of the Tarot cards, this card represents the culmination of the journey of "[[Fool of Prophecy]]".
  ** The Tarot cards depict the story of the Fool on his journey through life with each of the Major Arcana representing his experiences along the way. The Fool is representative of the beginning of a journey (hence being numbered 0), while the World is representative of the end of said journey (hence being numbered XXI (the last of the Major Arcana)). This card shows the culmination of the Fool's journey, and all the experiences gained from this journey.
  * Like several "[[Prophecy]]" monsters having identical [[ATK]] and [[DEF]] as [[Yugi Muto]]'s [[signature card]]s, this card has the same ATK/DEF as "[[Dark Paladin]]".
