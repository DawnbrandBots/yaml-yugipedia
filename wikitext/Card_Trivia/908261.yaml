title: Card Trivia:Aluber the Jester of Despia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Aluber the Dogmatic]]", "[[Branded in Red]]", "[[Branded Disciple]]", "[[Branded Lost]]", and the third artwork of "[[Fallen of Albaz]]".
  ** This monster possesses the wings of "[[Masquerade the Blazing Dragon]]" in all of its appearances in the artworks of [[Spell Card]]s.
  ** This monster's mask appears in the artwork of "[[The Black Goat Laughs]]".
  * This monster's name is a portmanteau of "Albaz" and "''ruber''" (the Latin word for "red").
  * This monster is a "[[Despia]]" [[counterpart]] of "[[Fallen of Albaz]]".
  ** Both have the same [[Level]], [[ATK]], and [[DEF]].
  ** Both have a similar effect focused on [[Fusion Summon]]ing, and they have opposite associated [[Spell Card]]s that can Summon their [[Albaz Dragon|draconic]] [[Fusion Monster|Fusion]] forms: "Branded in Red" for this card and "[[Branded in White]]" for "Albaz".
  ** Unlike most of the other "Despia" counterparts, which are corrupted versions of other monsters, this monster is not a form of "Fallen of Albaz".
  ** The [[flavor text]] of "[[Aluber the Dogmatic]]" implies that "Albaz" may possibly be the other half of this monster, as it describes this monster as ''a thing separated by the Abyss''.
  *** This monster's hair color (red with white streaks) is also the opposite of that of "Albaz" (white with red streaks).
  *** The kanji ''Rakuin'' (落胤, lit. "illegitimate child") in the Japanese name of "Fallen of Albaz" may refer to how he is the abandoned half of this monster.
  * This monster has multiple [[Card evolutions|empowered]] draconic forms:
  ** "[[Despia]]"-oriented [[Fiend]] form: "[[Masquerade the Blazing Dragon]]"
  ** "[[Fallen of Albaz]]"-oriented [[Dragon]] form(s): "[[Lubellion the Searing Dragon]]" → "[[Alba-Lenatus the Abyss Dragon]]" (combined with "[[Mirrorjade the Iceblade Dragon]]")
  ** "[[Bystial]]" Dragon form: "[[The Bystial Lubellion]]" ("Alba-Lenatus" after absorbing power from "[[The Bystial Alba Los]]")
  *** "The Bystial Alba Los" is piloted by "The Bystial Lubellion".
  ** "Bystial" [[retrained]] form: "[[The Bystial Aluber]]". 
  * The multi-eyed, mask-like feature on this monster's face (present in its alternate artwork) was likely inspired by the similar feature on the face of [[wikipedia:Ryomen Sukuna|Ryomen Sukuna]], the main antagonist in ''[[wikipedia:Jujutsu Kaisen|Jujutsu Kaisen]]'', a popular manga at the time of the debut of this card's alternate artwork.
  * In the European prints of this card's initial appearance in ''[[Dawn of Majesty]]'', it erroneously stated that the player can add a "'''Despia'''" Spell/Trap to the [[hand]], rather than a "[[Branded]]" Spell/Trap. The only card that this would have been able to affect at the time of this release was "[[Despia, Theater of the Branded]]"; this error wasn't present in North American prints, and was corrected by [[Card Errata:Aluber the Jester of Despia|erratum]] in European prints in ''[[Ghosts From the Past: The 2nd Haunting]]''.
