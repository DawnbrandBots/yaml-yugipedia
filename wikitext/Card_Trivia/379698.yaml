title: Card Trivia:Performapal Barracuda
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Dimensional Guardians]]''.
  * This monster's Japanese name is a portmanteau of the words "rose" (バラ, ''bara'') and "barracuda" (バラクーダ, ''barakūda'').
  ** This monster shares its naming scheme with "[[Performapal Ballad]]", whose shares the same [[Attribute]] ([[EARTH]]), [[Level]] (3), [[Type]] ([[Plant]]), [[original ATK and DEF]] (500/1100), and similar rose motif.
