title: Card Trivia:Dark Scorpion - Cliff the Trap Remover
wikitext: |-
  {{Navigation}}

  * This monsters appears in the artworks of "[[Dark Scorpion Burglars]]", "[[Dark Scorpion Combination]]", "[[Mustering of the Dark Scorpions]]", and "[[Trap Dustshoot]]".
  * This monster's title, "Trap Remover", is a reference to its [[Spell]]/[[Trap Card]] [[destroy|destruction]] effect.
  * This is one of the few cards that has had its ''[[TCG]]'' name changed; this is because its Japanese name made it a "[[Dark Scorpion]]" monster, while its original ''TCG'' release simply referred to it as "Cliff the Trap Remover", since there was no "Dark Scorpion" [[support]] at the time.
