title: Card Trivia:Apprentice Magician
wikitext: |-
  {{Navigation}}

  * Three [[Spell Counter]]s appear in this card's artwork.
  * This monster's Japanese name appears on the staff of "[[Magician of Faith]]" written in a distorted version of the Latin alphabet.
  ** Incidentally, "Magician of Faith" is a viable target for this monster's [[Special Summon]]ing effect.
