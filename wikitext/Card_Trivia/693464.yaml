title: Card Trivia:Sky Striker Ace - Zeke
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Overload]]''.
  * This monster is named after "Zeke", the [[wikipedia:World War II Allied names for Japanese aircraft|Allied reporting name]] of the [[wikipedia:Mitsubishi A6M Zero|Mitsubishi A6M "Zero"]], an Imperial Japanese fighter aircraft,.
  ** This monster's name is also likely based on the phonetic script of "sieg" (/ziːk/), the German word for "victory".
  * This monster is an [[Card evolutions|empowered]] [[Link Monster|Link]] form of "[[Sky Striker Ace - Roze]]", which appears within this monster's torso.
  ** Fittingly, "Sky Striker Ace - Roze" is also named after the Mitsubishi A6M "Zero", as her name is an anagram of "zero" (ゼロ ''Zero'' → ロゼ ''Roze'').
  * This card's artwork was adapted into a panel in {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|11|ref}}, where [[Roze (manga)|Roze]] engages with her mecha "Zeke" before her battle against [[Raye (manga)|Raye]].
