title: Card Trivia:Dice Key Kuu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dice Key Nel]]".
  * This monster is based on the ''[[wikipedia:Baku (mythology)|baku]]'', a monster in Japanese mythology that highly resembles the [[wikipedia:tapir|tapir]], known for devouring dreams.
  ** This monster's Japanese name (クゥ, ''Kwu'') is a pun on the name of the ''baku'' ({{Ruby|獏|ばく}}, ''Baku''). It is also a pun on the onomatopoeia "sigh" (くう, ''Kuu''), which is associated with the sound of deep breathing that occurs while sleeping.

