title: Card Trivia:Cannon Soldier MK-2
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Transmodify]]" and "[[Xyz Wrath]]".
  * This monster is the [[Card evolutions|upgraded]] form of "[[Cannon Soldier]]".
  ** The artwork of "Transmodify" reveals that this monster is piloted by "Cannon Soldier".
  ** This monster's title, "MK-2", further reflects how its [[Level]], [[original ATK]], and fixed effect damage amount are higher than "Cannon Soldier", as well as its effect requiring the player to [[Tribute]] two monsters to inflict effect damage to the opponent.
