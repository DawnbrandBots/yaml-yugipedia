title: Card Trivia:Chronomaly Crystal Bones
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chronomaly Resonance]]".
  * This monster is likely based on "The Crystal Maiden", the skeleton of a teenage boy (formerly believed to be a girl) found in the cave of [[wikipedia:Actun Tunichil Muknal|Actun Tunichil Muknal]] in [[wikipedia:Belize|Belize]]. The skeleton is likely the remains of a sacrificial victim, whose bones have been calcified, giving it a sparkling, crystallized appearance.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster's effect could [[Special Summon]] "[[Chronomaly Crystal Skull (anime)|Chronomaly Crystal Skull]]", likely referencing how the two monsters can make up for one body
  ** "[[Chronomaly Crystal Chrononaut]]" is likely the enhanced and combined form of the two aforementioned monsters due to its namesake and appearance. This is more evident when the two monsters were used to first [[Xyz Summon]] "Crystal Chrononaut" in the ''Yu-Gi-Oh! ZEXAL'' anime.
