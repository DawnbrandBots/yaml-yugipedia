title: 'Card Trivia:Number 84: Pain Gainer'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is the first and currently only [[Rank 11]] "[[Number]]" monster.
  * This monster has the highest [[Rank]] (11) of all [[Insect]] monsters.
  * Like the other "[[Number]]" monsters associated with [[Kyoji Yagumo]], this monster is related to one of the [[wikipedia:Seven deadly sins|seven deadly sins]], specifically, the [[wikipedia:Sloth (deadly sin)|deadly sin of sloth]].
  ** This is reflected in this monster's [[DEF]]-increasing effect and its damaging effect, which [[activate]]s when the opponent activates a [[Spell]]/[[Trap Card]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|044|ref}}, specifically from the panel showing [[No. 84: Pain Gainer (manga)|this monster]] standing alongside "[[No. 35: Ravenous Tarantula (manga)|No. 35: Ravenous Tarantula]]" while Yagumo explains the latter monster's effects, albeit mirrored.
