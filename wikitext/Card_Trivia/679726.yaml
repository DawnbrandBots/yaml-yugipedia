  [[File:Dark_Magician_repels_Kul_Elna_spirits.png|thumb|right|250px|[[Mahado (manga)|Dark Magician]] repels the evil spirits of [[Kul Elna]].]]

  * "[[Dark Magician]]" appears in this card's artwork.
  * This card's artwork is a reference to {{chapter|Yu-Gi-Oh!|314|ref}}, where [[Mahado (manga)|Dark Magician]] repelled the evil spirits of [[Kul Elna]].
  * This card's first effect may be a reference to [[Yami Yugi]]'s ability to "influence fate" by willpower in the ''Yu-Gi-Oh!'' anime, enabling him to [[Draw a card|draw]] the cards he visualized during his ceremonial [[Duel]] with [[Yugi Muto]].

