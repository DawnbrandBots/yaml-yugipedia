title: Card Trivia:Puppet Shark
wikitext: |-
  {{Navigation}}

  * "[[Gimmick Puppet Fantasix Machinix]]" and "[[Number 32: Shark Drake]]" appear in this card's artwork.
  ** This card's artwork and effect to [[excavate]] the top four cards of the player's [[Deck]] reference how [[Quattro]] (who is represented by "Fantastix Machinix") manipulated [[Reginald Kastle|Reginald "Shark" Kastle]] (who uses "Shark Drake") into looking at four cards from his Deck ("[[Gravekeeper's Descendant (anime)|Gravekeeper's Descendant]]", "[[Necrovalley (anime)|Necrovalley]]", "[[Mirror Force (later anime)|Mirror Force]]", and "[[Skill Drain (anime)|Skill Drain]]") prior to their match at the [[National Duel Circuit]], which got him disqualified in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  *** This card's effect to [[Set]] an excavated [[Trap Card]] if chosen may be a reference to the fact that prior to Shark's disqualification, Quattro had just Set a card and ended his turn, which Shark suspected to be the "Mirror Force" (a Trap Card) he had seen earlier.
