title: Card Trivia:Link Bound
wikitext: |-
  {{Navigation}}

  * "[[Linkslayer]]", "[[Bitron]]", and "[[Backup Secretary]]" appear in this card's artwork.
  * This card's artwork is a reference to the original Link Summoning animation from the [[Yu-Gi-Oh! VRAINS]] anime series, except instead of the monsters entering the arrows, they are coming out of them.
