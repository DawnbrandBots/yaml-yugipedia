title: Card Trivia:Aroma Jar
wikitext: |-
  {{Navigation}}

  * The color schemes of the four candles, the wisps of fragrance, and the decoration of the warmer in this card's artwork each symbolize the four "[[Aromage]]" monsters released alongside this card in ''[[Clash of Rebellions]]''.
  ** The white color scheme represents "[[Aromage Jasmine]]"; the yellow color scheme represents "[[Aromage Cananga]]"; the blue color scheme represents "[[Aromage Rosemary]]"; and the red color scheme represents "[[Aromage Bergamot]]". Also, each of the flowers of the aforementioned monsters' namesakes are also seen on the table around the warmer.
  * This is the first [[Flip monster]] to not feature the word "FLIP:" in its [[card effect]].
