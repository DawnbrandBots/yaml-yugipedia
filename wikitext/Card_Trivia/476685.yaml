title: Card Trivia:Performapal U Go Golem
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "U-Golem" (ユーゴーレム, ''Yūgōremu'') is a portmanteau of the Japanese words for "[[Fusion]]" (ユーゴ, ''Yūgō'') and "Golem" (ゴーレム, ''Gōremu'').
  ** This monster's name can also be translated as "U Golem", reflecting this monster's appearance, which resembles a golem shaped like the English letter "U".
  ** This monster's ''[[TCG]]'' name, "U Go Golem", is a pun on this monster's appearance and Japanese name, with "U Go" read as the Japanese word "''Yūgō''".
  * This monster's ''[[OCG]]''/''TCG'' effect to perform a [[Fusion Summon]] using this monster and [[Dragon]] monsters the player [[control]]s as [[Fusion Material]] is an alteration of its effect in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, which can perform a Fusion Summon using it and other monsters the player controls. In {{episode|ARC-V|128|ref}}, this monster used its effect to Fusion Summon "[[Performapal Gatlinghoul]]" using it and "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]".
