title: Card Trivia:Tribute Carnival
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Caius the Shadow Monarch]]", "[[Delg the Dark Monarch]]", "[[Granmarg the Rock Monarch]]", "[[Kuraz the Light Monarch]]", "[[Mobius the Frost Monarch]]", "[[Raiza the Storm Monarch]]", "[[Thestalos the Firestorm Monarch]]", and "[[Zaborg the Thunder Monarch]]" appear in this card's artwork.
  * This card's Japanese name, "Advance Carnival", references how [[Tribute Summon]]s are called "Advance Summons" in Japanese.
