title: Card Trivia:Arms of Genex Return Zero
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Terminal World (set)|Terminal World]]''.
  * This monster is a combined "[[Genex]]" form of "[[Ally of Justice Decisive Armor]]" and "[[Ally of Justice Field Marshal]]".
  ** This monster's [[original ATK and DEF]] (3100/2950) are half the sums of those of "Decisive Armor" (3300/3300) and "Field Marshal" (2900/2600).
  ** According to the [[The Valuable Book EX 4 card storylines#No. 13: "Duel Terminal" World Side Story, Program "Return 0;"|''The Valuable Book EX 4'' card storylines]], this monster's control unit is "[[Repair Genex Controller]]", a form of "[[Genex Controller]]" (the control unit of "Decisive Armor") modified with parts from "[[Genex Spare]]" (the control unit of "Field Marshal").
  * This monster's name, "Return Zero", and [[Level]] (10) reference "[[Worm Zero]]", the strongest "[[Worm]]" that the "[[Ally of Justice]]" monsters were designed to defeat.
  ** This monster's name is based on the [[wikipedia:Return statement|return statement]] <code>return 0;</code> used in [[wikipedia:C (programming language)|C]] and [[wikipedia:C++|C++]] programming language. A value of 0 indicates that the program was executed successfully without any errors. This refers to the successful activation of a special program (named after said return statement) embedded into the "[[Genex]]" that activates upon the revival of "[[Sophia, Goddess of Rebirth]]".
  * In the ''[[Yu-Gi-Oh! OCG Structures]]'' manga, this monster's [[Attack and effect names in Yu-Gi-Oh! OCG Structures|attack and effect names]] use the English letters used as the acronym for its Japanese name: "Thunder Ace" (サンダー・{{ruby|Ａ|エース}}), "Beam Over" (ビーム・{{ruby|Ｏ|オーバー}}), and "Cannon Great" (キャノン・{{ruby|Ｇ|グレイト}}).
