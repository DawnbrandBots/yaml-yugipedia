title: Card Trivia:Metamorphortress
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name is a portmanteau of the words "metamorphosis" and "fortress".
  ** Fittingly, in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'', when this [[Trap Monster]] is [[Special Summon]]ed in [[Defense Position]], it is depicted as a large fortress. When it is switched to [[Attack Position]], it undergoes a "metamorphosis" into the golem-like monster depicted in this card's artwork.
  * The Spanish printed version of this card features the term "''also''" translated as "''también''" instead of "''y además''".
