  * This monster is "[[Chamberlain of the Six Samurai]]" as a young man.
  ** Both cards have the same [[ATK]], [[DEF]] and [[Level]].
  ** The same armor and mechanical arms appear in the artwork of both cards.
  * This monster appears in the artwork of "[[Six Strike - Thunder Blast]]".
