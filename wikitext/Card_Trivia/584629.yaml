title: Card Trivia:Serziel, Watcher of the Evil Eye
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Evil Eye Awakening]]", "[[Evil Eye Defeat]]", "[[Evil Eye of Selene]]", "[[Evil Eye Mesmerism]]", "[[Evil Eye Reemergence]]", "[[Evil Eye Repose]]", "[[Evil Eyes Unleashed]]", and "[[Imprudent Intrusion]]".
  * "Evil Eye of Selene" appears in this card's artwork.
  * This card's name is based on the angel [[wikipedia:Sariel|Sariel]], one of the ''[[wikipedia:Watcher (angel)|Grigori]]'' (also known as the "watchers", a group of fallen angels that taught humanity forbidden knowledge). The watcher Sariel taught men the course of the moon, and his name is said to provide protection against the [[wikipedia:Evil eye|evil eye]].
  * This monster has a [[Card evolutions|transformed]] [[Link Monster|Link]] version, "[[Zerrziel, Ruler of the Evil Eyed]]".
  ** The artwork of "Evil Eye Awakening" depicts this monster transforming into "Zerrziel".
  * In ''[[Yu-Gi-Oh! Duel Links]]'', the monster sprite for "[[Familiar of the Evil Eye Token (Duel Links)|Familiar of the Evil Eye Token]]" is represented by the yellow eye on this monster's shoulder.
