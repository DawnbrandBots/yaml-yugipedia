title: Card Trivia:Curse of the Circle
wikitext: |-
  {{Navigation}}

  * A [[Synchro Summon]]ing ring appears in this card's artworks.
  * "[[Dark Magical Circle]]" appears in this card's Japanese artwork, while "[[Spellbinding Circle]]" appears in this card's international artworks.
  ** Fittingly, both cards can be seen as counterparts of each other, as the Japanese name of "Spellbinding Circle" is "Curse of Hexagram", while this card's Japanese name is "Curse of Pentagram". Likewise, both cards' artworks depicts a hexagram and a pentagram respectively in their otherwise-similar artworks.
  *** The international artworks of both cards are also similar, with this card's artwork featuring a modified version of the "Spellbinding Circle" symbol lacking an inner circle, similar to how this card's Japanese artwork reduced the number of points in the star symbol.
  * This card could be a reference to the [[wikipedia:Lesser ritual of the pentagram|lesser ritual of the pentagram]].
