title: Card Trivia:Raidraptor - Sharp Lanius
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Raidraptor - Arsenal Falcon]]".
  * This card's ''[[OCG]]'' name, "Raidraptor - Impale Lanius", is a reference to the behavior of birds in the ''[[wikipedia:Lanius|Lanius]]'' genus, which are known for their habit of catching insects and small vertebrates and impaling their bodies on thorns, the spikes on barbed-wire fences, or any available sharp point.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this card and "[[Raidraptor - Tribute Lanius]]" had their [[Ignition Effect]]s that were activated during [[Main Phase 2]] changed into [[Trigger Effect]]s that activate at the end of the [[Battle Phase]] due to the Main Phase 2 not being present in the game's [[Speed Duel]] format. These are the first two cards in ''Yu-Gi-Oh! Duel Links'' to have an effect modified to suit the format for reasons unrelated to [[effect damage]] ("[[Crystal Beast Emerald Tortoise]]", which also has an Ignition Effect only usable in Main Phase 2, had its Ignition Effect removed instead).
