title: Card Trivia:Level Up!
wikitext: |-
  {{Navigation}}

  * "[[Horus the Black Flame Dragon LV6]]" appears in this card's artwork, transforming into "[[Horus the Black Flame Dragon LV8]]".
  * Because of how [[Only once per turn]] conditions are worded in the ''[[TCG]]'', certain "[[LV]]" monsters can Special Summon another copy of themselves with this card's effect, since they list their own name in their [[card text]]. This is not possible in the ''[[OCG]]'', due to differing card grammar. Some monsters can also Special Summon a lower level monster, as in the case of "[[Armed Dragon LV10]]".
