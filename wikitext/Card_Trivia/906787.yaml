title: Card Trivia:Fabled Andwraith
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of ''[[wikipedia:List of demons in the Ars Goetia|Andras]]'', a demon from the ''[[wikipedia:The Lesser Key of Solomon|Ars Goetia]]'', and "wraith".
  * This monster appears in the artwork of "[[Fabled Treason]]".
  * Limbo and Lust (the imps of "[[The Fabled Peggulsus]]" and "[[The Fabled Kokkator]]") appear in this card's artwork.
