title: Card Trivia:Jupiter the Power Patron of Destruction
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Prohibited Power Patron Portal - Terminus]]".
  * This monster is named after [[wikipedia:Jupiter (god)|Jupiter]], the king of the gods in [[wikipedia:Roman mythology|Roman mythology]].
  * "[[Power Patron DoomZ]]" is an incomplete mass-produced version of this monster.
