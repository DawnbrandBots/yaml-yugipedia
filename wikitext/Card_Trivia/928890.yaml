title: Card Trivia:Dahut, Dark Ruler of the Chair
wikitext: |-
  {{Navigation}}

  * This monster has a counterpart: "[[Dahut Abyss, Dark Mirror Ruler of the Chair]]".
  * This monster's name is based on [[wikipedia:Dahut|Dahut]], the princess of the mythical city of [[wikipedia:Ys|Ys]] on the coast of [[wikipedia:Brittany|Brittany]].
  ** The Japanese pronunciation of the word "chair" (イス, ''Isu'') shares a similar pronunciation with Ys.
