title: Card Trivia:Beetrooper Fly & Sting
wikitext: |-
  {{Navigation}}

  * "[[Beetrooper Sting Lancer]]" and "[[Beetrooper Scale Bomber]]" appear in this card's artwork.
  * This card is a reference to a famous quote by [[wikipedia:Muhammad Ali|Muhammad Ali]]: ''"Float like a butterfly, sting like a bee."''.
