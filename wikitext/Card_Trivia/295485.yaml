title: Card Trivia:Planckton
wikitext: |-
  {{Navigation}}

  * The translucent creature in this card's artwork is a comically enlarged [[wikipedia:Plankton|plankton]] of the genus ''[[wikipedia:Daphnia|Daphnia]]''.
  ** This is likely a reference to the perception of [[wikipedia:Water flea|water fleas]] (closely associated with ''Daphnia'') in Japanese culture, where they are perceived as an example of a small, insignificant, pitiful existence.
  * This card's English name is a pun on "[[wikipedia:Planck scale|Planck scale]]" – a quantum energy scale used to measure to the effects of gravity compared to other forces – and "plankton". The Japanese name directly translates to "Planck Scale".
  ** This card's effect may be based on a paradox in the Planck scale, where mathematical interpretations of gravity break down at subatomic levels – similarly, smaller Xyz Monsters become unaffected by the "normal gravity" that prevents [[Rank]] 4 and higher monsters from attacking.
  ** The word ''Puranku'' in this card's Japanese name is a pun on ''Ranku'' ("Rank").
