title: Card Trivia:Speed Spell - Acceleration Limiter
wikitext: |-
  {{Navigation}}

  * The odometer in this card's artwork resembles the one appearing in the artwork of "[[Limiter Removal]]".
  * This is the only [[Speed Spell Card]] from the video games to not require a specific amount of [[Speed Counter]]s for its activation.
  ** Including the anime, "[[Speed Spell - Overboost (anime)|Speed Spell - Overboost]]" also has no requirement.
  * The game's application of the effect causes some confusion- it prevents your opponent from placing Speed Counters during your next turn as well as their next two turns.  Either the text was not written correctly or the game was programmed incorrectly.
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', this card was a [[Normal Spell Card]]; however, in ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'', it is a [[Quick-Play Spell Card]].
