title: Card Trivia:Performapal Card Canard
wikitext: |-
  {{Navigation}}

  * "Canard" in this card's English name is based on "canard", the French word for "duck", a species of waterfowl.
  ** Despite this, this monster likely resembles a [[wikipedia:Goose|goose]], a member of the [[wikipedia:Anatidae|Anatidae]] family of waterfowl birds, which also includes ducks.
