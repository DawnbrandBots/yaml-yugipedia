title: Card Trivia:Gladiator Beast's Battle Manica
wikitext: |-
  {{Navigation}}

  * A [[wikipedia:Manica (armguard)|manica]] was a type of iron or bronze arm guard worn by Roman gladiators.
  * The monster that appears in this card's artwork also appears in the artworks of "[[Gladiator Beast's Battle Gladius]]" and "[[Gladiator Beast's Battle Halberd]]".
  * This manica appears in the artwork of "[[Gladiator Beast Equeste]]".
