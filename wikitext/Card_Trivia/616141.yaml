title: Card Trivia:Predaplant Triphyoverutum
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Predaplanning]]".
  * This monster's name is a portmanteau of the "''[[wikipedia:Triphyophyllum|Triphyophyllum]]''" plant and "[[wikipedia:Vertumnus|Vertumnus]]", the god of plant growth in [[wikipedia:Roman mythology|Roman mythology]].
  * This monster is an [[Card evolutions|upgraded]] form of [[Predaplant Dragostapelia]]".
  ** Visually, this monster is a [[Fusion Monster|Fusion]] of "Predaplant Dragostapelia" and "[[Predaplant Drosophyllum Hydra]]".
