title: Card Trivia:Speed Spell – Acceleration (TDGP)
wikitext: |-
  {{Navigation}}

  * This Skill can used by selecting the [[Yusei Go]] during a [[Turbo Duel Grand Prix]] event in ''[[Yu-Gi-Oh! Duel Links]]''.
  * This Skill's third effect references the effect of "[[Speed Spell - Angel Baton (anime)|Speed Spell - Angel Baton]]", which allows the player to [[draw]] two cards and then [[send]] one card from the player's [[hand]] to the [[Graveyard]].
  * This Skill's third effect references the effect of "[[Tuning]]", which allows the player to [[add]] a "[[Synchron]]" monster from the [[Deck]] to the [[hand]] and send the top card from the Deck to the Graveyard.
