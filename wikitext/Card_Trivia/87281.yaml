title: Card Trivia:Strikeroid
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is the second “[[roid]]” monster to be based on a fighter aircraft, the first being "[[Jetroid]]".
  ** Either this monster or "Jetroid" appear in the artworks of "[[March of the Roids]]" and "[[Roid Reinforcements]]".
