title: Card Trivia:Salamangreat Violet Chimera
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Salamangreat Kernel]]" and "[[Salamangreat Roar]]".
  * This monster is based on a [[wikipedia:Chimera (mythology)|chimera]], a creature in [[wikipedia:Greek mythology|Greek mythology]] whose body consists of parts of different creatures and is known for breathing fire.
  * This monster's violet color scheme references how [[Fusion Monster]] [[Monster Card|Card]]s feature a violet-colored card border.
