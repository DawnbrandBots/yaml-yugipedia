title: Card Trivia:Gogiga Gagagigo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Pack Volume 1]]''.
  * This monster appears in the artwork of "[[Memory of an Adversary]]" and "[[Oath of Companionship]]".
  * "[[Gigobyte]]" > "[[Jigabyte]]" > "[[Gagagigo]]" > "[[Giga Gagagigo]]" > "'''Gogiga Gagagigo'''" > "[[Gagagigo the Risen]]".
  ** This monster is the penultimate form of the [[Gigo]] [[series]] and the [[Card evolutions|upgraded]] form of "Giga Gagagigo".
  ** This monster is tied with "Gagagigo the Risen" for the highest [[original ATK and DEF]] (2950/2800) of all members of the Gigo series.
  * This monster's written Japanese name (ゴギガ・ガガギゴ) is a palindrome.
  * This monster has the highest [[Level]] (8) and original [[ATK]] (2950) of all [[Reptile]] [[Normal Monster]]s.
