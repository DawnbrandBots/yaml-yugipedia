title: Card Trivia:Fossil Warrior Skull Knight
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Mesozoic Fossil Knight Skullknight", references the [[wikipedia:Mesozoic|Mesozoic Era]], the second of Earth's three defined Geologic periods. This period is contained between two of Earth's most deadly extinction events: the [[wikipedia:Permian–Triassic extinction event|Permian-Triassic extinction event]] and the [[wikipedia:Cretaceous-Paleogene extinction event|Cretaceous–Paleogene extinction event]]. Furthermore, the period is subdivided into only three periods: the Triassic, Jurassic, and Cretaceous periods, known collectively as the time of the [[dinosaur]]s.
  * This monster's name, "Skull Knight", shares a chess theme with its fellow "Fossil Warrior" monsters: "[[Fossil Warrior Skull Bone]]" and [[Fossil Warrior Skull King]]".
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster was Summoned by [[Tribute|Tributing]] "[[Fossil Warrior Skull Bone (anime)|Fossil Warrior Skull Bone]]" (whose Japanese name is "Cenozoic Fossil Knight Skullpawn") using "[[Time Stream (anime)|Time Stream]]", referencing how a pawn can be promoted into a knight in chess, as well as how knights are stronger when supported by other pieces, such as pawns.
  ** This monster's ''[[OCG]]''/''[[TCG]]'' effect to allow it to attack twice references the knight's ability to move two spaces forward in chess.
