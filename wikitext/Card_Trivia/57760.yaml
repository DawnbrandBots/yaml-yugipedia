title: Card Trivia:Naturia Leodrake
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Synchro Creed]]" and "[[Cross-Sheep]]" (as a stuffed animal).
  * "Gao" in this card's Japanese name is an onomatopoeia of the lion's roar.
  * This card has an advanced [[counterpart]], "[[Leo, the Keeper of the Sacred Tree]]" and two advanced [[fusion]] counterparts, "[[Naturia Gaiastrio]]" and "[[Ritual Beast Ulti-Gaiapelio]]".
