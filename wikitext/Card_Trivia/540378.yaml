title: Card Trivia:Ride of the Valkyries
wikitext: |-
  {{Navigation}}

  * "[[Valkyrie Erste]]", "[[Valkyrie Zweite]]", and "[[Valkyrie Dritte]]" appear in this card's artwork.
  * '''[[wikipedia:Ride of the Valkyries|Ride of the Valkyries]]''' is the popular term for the beginning of Act III of [[wikipedia:Die Walküre|Die Walküre]] by [[wikipedia:Richard Wagner|Richard Wagner]].
  ** In Norse mythology, the valkyries are [[wikipedia:Dís|dísir]], minor female deities, who served [[wikipedia:Odin|Odin]].
  * This card's Japanese name, "'''Walkuren Ritt'''", is German for "'''Ride of the Valkyries'''". However, the proper German spelling would be "'''Walkürenritt'''". The German name, "Ritt der Walküre", is a more direct translation of "Ride of the Valkyries".
  ** This is the only card to have full German in its Japanese card name.
