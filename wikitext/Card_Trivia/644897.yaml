title: Card Trivia:Mimikuril
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of "mimicry" and "Kuril":
  ** "Mimicry" is likely a reference to this monster's effect, which [[Special Summon]]s a monster from the top of the [[Deck]], in exchange for placing itself on the bottom of the Deck, effectively "mimicking" the [[excavate]]d monster.
  *** In addition, the "Mi" of this card's name could be a shortened version of "mittsu" (三), the Japanese word for "three". This could possibly a reference to this monster's [[Level]].
  ** "Kuril" is short for ''[[wikipedia:Kurilian Bobtail|Kurilian Bobtail]],'' a breed of cat.
