title: Card Trivia:Gladiator Beast Darius
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Darius the Great of Persia|Darius]] is the father of Shahenshah (King of Kings) Xerxes I of the Persian Empire.
  * The Persian origin of the name could be related to Darius being a Laquerarii (a type of gladiator that wields a lasso), such gladiator type was inspired in the fighting style of an ancient Persian tribe, the Sagartians.
  * Guardian Beast Darius has the appearance of a humanoid [[wikipedia:Horse|horse]].
  * This card appears in the artwork of "[[Double Tag Team]]" and "[[Gladiator Lash]]".
  * This monster is holding "Gladiator Lash".
