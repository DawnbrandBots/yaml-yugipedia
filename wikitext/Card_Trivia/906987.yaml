title: Card Trivia:Arcana Triumph Joker
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[King's Court]]'' and ''[[World Premiere Pack 2021]]''.
  * This monster appears in the artwork of "[[Double Wild]]" (as an illustrated design).
  * This monster is based on the [[wikipedia:Joker (playing card)|Joker]], a [[wikipedia:Playing card|playing card]] which represents the addition to the four [[wikipedia:Standard playing card suit|standard playing card suits]].
  * This monster is an [[Card evolutions|upgraded]] [[Effect Monster|Effect]] form of "[[Queen's Knight]]", combined with "[[Jack's Knight]]" and "[[King's Knight]]".
  ** This monster is a [[counterpart]] of "[[Arcana Knight Joker]]" (the upgraded [[Fusion Monster]] form of "Jack's Knight") and "[[Arcana Extra Joker]]" (the upgraded [[Link Monster]] form of "King's Knight").
  * This monster shares similarities with "[[Slifer the Sky Dragon]]".
  ** Both monsters feature a red color scheme and share the same [[Level]] (10).
  ** Both monsters share close synergy with the [[Three Musketeers of Face Cards]].
  ** Both monsters feature an effect that gains [[ATK]] equal to the number of cards in the [[hand]] and can [[destroy]] cards on the [[field]].
