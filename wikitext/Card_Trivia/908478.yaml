title: Card Trivia:Gravekeeper's Inscription
wikitext: |-
  {{Navigation}}

  [[File:Marik'sBack.jpg|thumb|right|250|The [[Seal of Memories]] on the back of [[Marik Ishtar]], in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.]]

  * "[[Gravekeeper's Nobleman]]" and "[[Gravekeeper's Oracle]]" appear in this card's artwork.
  ** Engravings of "[[Slifer the Sky Dragon]]", "[[The Winged Dragon of Ra]]", "[[Obelisk the Tormentor]]", and the ankh from the original artwork of "[[Monster Reborn]]" also appear in this card's artwork.
  *** This card is based on the [[Seal of Memories]], which were engravings cut into the back of the [[Tomb Keeper]]s, in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].

