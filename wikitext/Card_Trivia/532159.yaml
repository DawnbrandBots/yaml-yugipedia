title: Card Trivia:Grappler Angler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Double Hooking]]".
  * "[[Terrorking Salmon]]" appears in this card's artwork.
  * This card's Japanese name, "Angrappler" (アングラップラー ''Angurappurā''), is a portmanteau of "[[wikipedia:Angling|angler]]" (アングラー, ''angurā'') and "[[wikipedia:Grappling|grappler]]" (グラップラー,  ''gurappurā'').
