title: Card Trivia:Ghostrick Yuki-onna
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Break]]", "[[Ghostrick Festival]]", "[[Ghostrick Mansion]]", "[[Ghostrick Night]]", "[[Ghostrick Parade]]", "[[Ghostrick Renovation]]", "[[Ghostrick Shot]]", and the ''[[Advanced Tournament Pack 2013 Vol.4]]'' print of "[[Duel Checker]]".
  * The doll this monster is holding appears in also held by "[[Ghostrick Yeti]]", and it can be seen on this monster's head in the artwork of "Ghostrick Mansion".
  * This monster is based on the [[wikipedia:Yuki-onna|Yuki-onna]], a female spirit who appears in snowy regions in Japanese folklore.
