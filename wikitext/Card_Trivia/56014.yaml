title: Card Trivia:Turret Warrior
wikitext: |-
  {{Navigation}}

  * In architecture, a turret (from Italian: "torretta", little tower; Latin: "turris", tower) is a small tower that projects vertically from the wall of a building such as a medieval castle. Turrets were used to provide a projecting defensive position, allowing covering fire to the adjacent wall in the days of military fortification. As their military use faded, turrets were adopted for decorative purposes.
  * This card's effect is similar to "[[Strong Wind Dragon]]'s". "Turret Warrior" is used by [[Yusei Fudo]] and "Strong Wind Dragon" is used by [[Jack Atlas]], Yusei's rival in 5D's, which could possibly reference the fact that Yusei's first on screen synchro summon is of "[[Junk Warrior]]", while Jack's was of "[[Red Dragon Archfiend]]".
  * This card is reminiscent of "[[Multiple Piece Golem]]".
