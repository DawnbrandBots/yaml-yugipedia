title: Card Trivia:Raidraptor - Roost
wikitext: |-
  {{Navigation}}

  * "[[Raidraptor - Mimicry Lanius]]" appears in this card's artwork.
  * This card shares similarities with "[[Raidraptor - Nest]]".
  ** Both are [[Continuous Spell Card]]s whose artwork depicts a nest among ruins.
  ** Both cards share an effect to [[add a card|add]] a "[[Raidraptor]]" card from the [[Deck]] to the [[hand]].
