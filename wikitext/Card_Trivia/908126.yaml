title: Card Trivia:Shizuka the Heavenly Dancer
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[wikipedia:Shizuka Gozen|Shizuka Gozen]], one of the most famous women in Japanese history and the mistress of [[wikipedia:Minamoto no Yoshitsune|Minamoto no Yoshitsune]], keeping in relation with [[Orlando]]'s ''[[wikipedia:Kanjinchō|Kanjinchō]]''-themed Deck.
  ** This monster's title of "Heavenly Dancer" is likely based on Shizuka's status as a ''[[wikipedia:Shirabyōshi|shirabyōshi]]'', the term for a Japanese female singer and dancer in the [[wikipedia:Heian period|Heian]] and [[wikipedia:Kamakura period|Kamakura period]]s.
