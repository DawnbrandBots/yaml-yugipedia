title: Card Trivia:Ritual Beast Ulti-Apelio
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: Tribe Force]]''/''[[The Secret Forces]]''.
  * This monster is the [[Fusion Monster|Fusion]] between "[[Ritual Beast Tamer Lara]]" and "[[Spiritual Beast Apelio]]".
  * This monster appears in the artwork of "[[Ritual Beast Steeds]]" and "[[Ritual Beast Ambush]]".
  * The sum of ATK & DEF of all 3 "[[Ritual Beast Ulti]]" Fusion Monsters is 3000. For this card ATK is 2600 and DEF is 400.
