title: Card Trivia:Scrap Chimera
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Scrap Rage]]".
  * Although this card's called a chimera, it is not truly a [[wikipedia:Chimera (mythology)|chimera]], it has the head of a lion, the body of a Pegasus, and a snake for a tail. Mythological chimeras have a lion's body and head, a snake's tail, and a goat's head on its back.
  * Though to be noted this is based off the Alchemical Chimera, rather then the one in mythology.
