title: Card Trivia:Royal Penguins Garden
wikitext: |-
  {{Navigation}}

  * The initials of this card's name spell out "RPG", a reference to [[wikipedia:Role-playing game|role-playing games]].
  ** Fittingly, the "[[Penguin]]" cards released along with this card in ''[[Burst of Destiny]]'' are all based on typical classes/jobs from classic RPGs.
