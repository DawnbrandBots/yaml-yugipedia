title: Card Trivia:Wyrm Excavator the Heavy Cavalry Draco
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bucket Wheel Force]]" in [[Maximum Mode]] (together with "[[Wyrm Excavator the Heavy Cavalry Draco (L)|Wyrm Excavator the Heavy Cavalry Draco [L]]]" and "[[Wyrm Excavator the Heavy Cavalry Draco (R)|Wyrm Excavator the Heavy Cavalry Draco [R]]]").
  * This monster and its pieces are based on a [[wikipedia:Bucket-wheel excavator|bucket-wheel excavator]].
  * This monster (together with "Wyrm Excavator the Heavy Cavalry Draco [L]" and "Wyrm Excavator the Heavy Cavalry Draco [R]") has a [[retrain]]ed counterpart combined with "[[Constructor Wyrm Buildragon]]": "[[Infinite Heavy Cavalry Buildragoon]]".
  * This monster is the [[signature card]] of [[Asana Mutsuba]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
