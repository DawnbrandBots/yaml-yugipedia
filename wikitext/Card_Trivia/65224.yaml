title: Card Trivia:Yellow Gadget
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[All-Out Attacks]]", "[[Boot-Up Order - Gear Charge]]", "[[Boot-Up Order - Gear Force]]", "[[Boot-Up Pulverize - Gear Crusher]]", "[[Maximum Gadget the Moving Fortress (L)|Maximum Gadget the Moving Fortress [L]]]", "[[Mobile Deployment Gear Start]]", and "[[Stronghold the Moving Fortress]]".
  * This monster has a combined [[retrain]]ed counterpart with "[[Green Gadget]]" and "[[Red Gadget]]": "[[Gadget Trio]]".
  * The red "mist" surrounding this monster references how it can be [[add]]ed from the player's [[Deck]] to the [[hand]] by the effect of "[[Red Gadget]]", while the green gears in the background of this card's artwork, as well as the green coloration of this monster's irises is a reference to how it can add "[[Green Gadget]]" from the player's Deck to the hand.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|339|ref}}, specifically from the panel showing [[Yellow Gadget (manga)|this monster]] being [[Summon]]ed.
