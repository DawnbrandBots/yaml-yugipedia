title: Card Trivia:Great Poseidon Beetle
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea in [[wikipedia:Greek mythology|Greek mythology]].
  ** This monster is also likely based on the ''[[wikipedia:Dynastes neptunus|Dynastes neptunus]]'', a species of large [[wikipedia:Beetle|beetle]] also known as the "Neptune beetle", named after the [[wikipedia:Neptune|Roman god of the sea]] who is equivocated with Poseidon.
  ** In the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, this monster was used by [[Sect Ijuin]] during his second [[Duel]] with [[Yusei Fudo (manga)|Yusei Fudo]] alongside "[[Archfiend Uber Dragon Beelzeus (manga)|Beelzeus of the Diabolic Dragons]]" and "[[Giant Hades Stag Beetle]]". This is a reference to [[wikipedia:Zeus|Zeus]] and his two brothers, Poseidon and [[wikipedia:Hades|Hades]], who each received the sky, the sea, and the underworld after defeating the [[wikipedia:Titans|Titans]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|001|ref}}, specifically from the panel showing [[Great Poseidon Beetle (manga)|this monster]] attacking "[[Junk Blader (manga)|Junk Blader]]".
