title: Card Trivia:Constellar Acubens
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Alpha Cancri|Acubens]], the brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Cancer (constellation)|Cancer]]. appears in the background of this card's artwork.
  ** The constellation and the astrological symbol for [[wikipedia:Cancer (astrology)|Cancer]] (♋︎︎) also appears in the background of this card's artwork, with the location of Acubens denoted by the encircled star in the constellation.
  ** This monster's armor features crab-like claws and antennae on its shoulder pauldrons resembling a crab's eye stalks, referencing how Cancer is also known as the "crab" constellation.
