title: Card Trivia:Envoy of Chaos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Beginning of Heaven and Earth]]" and "[[Super Soldier Synthesis]]".
  * This monster appears to be a [[wikipedia:Chibi (term)|chibi]] version of "[[Black Luster Soldier - Super Soldier]]".
  ** Oddly enough, this monster's hair was made light blue, as opposed to "Super Soldier's" hair being red like "[[Beginning Knight]]'s".
