title: Card Trivia:Aiwass, the Magistus Spell Spirit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magistus Invocation]]".
  ** The appearance of the staff of "[[Aleister the Invoker]]" seems to be based on this monster's appearance.
  * This monster is based on [[wikipedia:Aiwass|Aiwass]], the name of the voice belonging to a non-corporeal being heard by [[wikipedia:Aleister Crowley|Aleister Crowley]], to whom Aiwass dictated ''[[wikipedia:The Book of the Law|The Book of the Law]]'', the sacred text of the [[wikipedia:Thelema|Thelemic religion]].
  * This monster has a more "[[Aleister]]"-focused [[counterpart]]: "[[Aiwass the Spirit of the Law]]".
