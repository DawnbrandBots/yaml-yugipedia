title: Card Trivia:Zeradias, Herald of Heaven
wikitext: |-
  {{Navigation}}

  * "[[The Sanctuary in the Sky]]" appears in the background of this card's artwork.
  * "[[Warrior of Zera]]" → "'''Zeradias, Herald of Heaven'''" → "[[Archlord Zerato]]"
  ** This monster is "[[Warrior of Zera]]" after he journeyed to "[[The Sanctuary in the Sky]]" and was promoted to a "herald".
  *** "[[Angel of Zera]]" and "[[Darklord Zerato]]" may also be related to this path in "Zera's" storyline, although their role is unknown.
