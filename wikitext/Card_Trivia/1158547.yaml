title: Card Trivia:Super-Dimensional Lord British Space Fighter
wikitext: |-
  {{Navigation}}

  * This monster is a retrained ''[[Rush Duel]]'' counterpart of "[[Lord British Space Fighter]]".
  * This monster's effect to change its name to "[[Gradius (Rush Duel)|Gradius]]" references its role in its debut game, ''[[wikipedia:Gradius|Gradius]]'' spinoff ''[[wikipedia:Salamander (video game)|Salamander]]'', where it was the ship piloted by Player 2 while the Vic Viper ("Gradius") was piloted by Player 1; as such, both ships played identically.
  ** This is further enforced by this monster's artwork, which visually mimics the artwork of "Gradius".
