title: Card Trivia:Qliphort Shell
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "[[wikipedia:Shell (computing)|shell]]", a computer term used for a [[wikipedia:User interface|user interface]] used to access an [[wikipedia:Operating system|operating system's]] services, as well as a pun on its appearance of an actual [[wikipedia:Gastropod shell|gastropod shell]].
  ** This monster's Japanese name, ({{name|Qliphort Shell|ja}}, ''{{romanized name|Qliphort Shell|ja}}'') is a pun on "Sheriruth" (シェリダー ''Sheridā'', lit. "rejection"), the third [[wikipedia:Qliphoth|Qliphoth]] emanation which is associated with the [[wikipedia:Devil|Devil]] [[wikipedia:Lucifuge Rofocale|Lucifuge Rofocale]].
