title: Card Trivia:Snake-Eye Ash
wikitext: |-
  {{Navigation}}

  * The destroyed remains of this monster appear in the artwork of "[[Sinful Spoils of Doom - Rciela]]".
  * This monster is named after the ''[[wikipedia:Fraxinus excelsior|Fraxinus excelsior]]'', a species of tall deciduous tree known as the "common ash" or "European ash".
