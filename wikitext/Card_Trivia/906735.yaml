title: Card Trivia:Dinomight Powerload, the Dracoslayer
wikitext: |-
  {{Navigation}}

  * This monster has a "[[True Draco]]" form: "[[Dinomight Knight, the True Dracofighter]]".
  * The "Powerload" in this monster's name is taken from "[[Dinomic Powerload]]".
  * The crest on this monster's chest and gauntlets is the same symbol as the crown on "[[Mariamne, the True Dracophoenix]]".
