title: Card Trivia:Mother's Storm
wikitext: |-
  {{Navigation}}

  * The child and mother in this card's artwork heavily resemble [[Yosh Imimi|Yosh]] and [[Mimi Imimi]], respectively.
  * This card's name and artwork are based on "[[Acid Rain]]", which destroys all [[Machine]] monsters on the field, while this card has an advantageous effect when destroying a Machine.
  ** The child's pose in this card's artwork mirrors the pose of the machine in the artwork of "Acid Rain".
  ** The Japanese pronunciation of this card's name ("''Okāsan no Arashi''") is derived from the Japanese name of "Acid Rain" ("''San no Arashi''").
