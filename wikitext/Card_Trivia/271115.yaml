title: Card Trivia:Rasetsu
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Rakshasa|Rakshasa]], an humanoid spirit in Hindu/Buddhist mythology; they are said to be maneaters (and in some cases, graverobbers and sorcerers), though some texts states that they can be good or evil.
  * This card has an opposite [[Attribute]], [[ATK]] and [[DEF]] to "[[Yaksha]]". Furthermore, while "Yaksha" returns a Spell/Trap Card, this card returns a Monster Card.
