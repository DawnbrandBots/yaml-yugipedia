  {{Navigation}}
  [[File:Black_Luster_soldier_summoned.png|thumb|right|250px|"[[Black Luster Soldier (manga)|Black Luster Soldier]]" emerging from the gateway to chaos.]]

  * This is the [[cover card]] of ''[[Battle of Chaos]]''.
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Dark Magician]]" and "[[Black Luster Soldier]]", both of which serve as its [[Fusion Material]]s.
  ** Both were used by [[Yami Yugi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's [[Level]] (8) and [[original ATK and DEF]] (3000/2500) are the same as those of "Black Luster Soldier".
  * This monster's pose strongly resembles the pose of "[[Black Luster Soldier (manga)|Black Luster Soldier]]" in {{chapter|Yu-Gi-Oh!|118|ref}}, specifically in the panel depicting that monster's successful [[Ritual Summon]]; the monster in this card artwork is flipped horizontally relative to that pose, although it still wields its sword and shield in the same hands.
  ** Interestingly, this monster is depicted with a front waistcloth that is strikingly similar to the back waistcloth of "Black Luster Soldier" (which can be seen in the next manga panel), despite "Black Luster Soldier" not wearing any front waistcloth.

