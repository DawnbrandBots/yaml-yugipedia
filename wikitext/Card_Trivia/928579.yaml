title: Card Trivia:Vanquish Soul Trinity Burst
wikitext: |-
  {{Navigation}}

  * "[[Vanquish Soul Dr. Mad Love]]", "[[Vanquish Soul Heavy Borger]]", and "[[Vanquish Soul Razen]]" appear in this card's artwork.
  * This card is a reference to Team Super mechanics in tag fighting games: its [[Special Summon]]ing effect allows the player to call the 2 assist characters onto the field to use the supers of all 3 characters at the same time (represented by the bouncing of all cards in their columns).
