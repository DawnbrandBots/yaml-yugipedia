title: Card Trivia:Performapal Elephammer
wikitext: |-
  {{Navigation}}

  * A colored outline of this monster appears in the artwork of "[[Performapal Duelist Extraordinaire]]".
  * Despite this card's Japanese name, "Hammer Mammo", this monster is more similar to a normal elephant than a mammoth.
  * This card has the highest [[ATK]] (2600) of all [[Main Deck]] "[[Performapal]]" monsters.
  ** This card has the highest ATK of all [[Level 6]] [[Effect Monster]]s that do not feature any [[Summoning condition]]s.
  ** In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, [[Yuya Sakaki]] referred to this card as the leader of the "Performapal" monsters due to its high ATK.
