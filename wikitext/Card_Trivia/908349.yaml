title: Card Trivia:Black Luster Soldier (Normal)
wikitext: |-
  {{Navigation}}

  * This is the [[Normal Monster]] version of "[[Black Luster Soldier]]".
  ** This was the first release of "Black Luster Soldier" before it was printed as a [[Ritual Monster]].
  ** This is the first legal card with the same name as a mechanically-different one.
  * This card's [[flavor text]] states that this monster is on the same tier of power as "[[Blue-Eyes White Dragon]]"; this references how the two cards share the same [[Level]] (8) and [[original ATK and DEF]] (3000/2500).
  ** This makes this the only other Normal Monster with an original ATK of 3000.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, [[Yami Yugi]] and [[Seto Kaiba]] also used both "[[Black Luster Soldier (anime)|Black Luster Soldier]]" and "[[Blue-Eyes Ultimate Dragon (anime)|Blue-Eyes Ultimate Dragon]]" as [[Fusion Material]]s to [[Fusion Summon]] "[[Dragon Master Knight (anime)|Dragon Master Knight]]".
  * This flavor text is used in video games where "Black Luster Soldier" is portrayed as a Normal Monster.
  ** The use of "B.W.D." (more precisely, "Ｂ・Ｗ・Ｄ") to identify "Blue-Eyes White Dragon" in this monster's flavor text derives from the latter's first Asian-English print, where the compound word "Blue-Eyes" was written as "Blue eyes", without the second capital letter (nor the hyphen), thus making the "E" be missing from its acronymized name.
  * This is the only card released in the ''[[TCG]]'' with the [[Series 1]] [[Card Layout|card layout]] as well as the only one in Japanese.
