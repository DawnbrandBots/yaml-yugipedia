title: Card Trivia:Jointech Burst Dragon
wikitext: |-
  {{Navigation}}

  * Visually, this monster is "[[Jointech Rex]]" with the design elements based on "[[Blue-Fang Burst Dragon]]".
  ** In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, this monster represented the sibling bond of [[Yuhi]] and [[Yuamu Ohdo]], the respective owners of the aforementioned monsters.
  * This monster has a [[LIGHT]] non-[[Jointech]] [[counterpart]]: "[[Bluetech Burst Rex]]".
