title: Card Trivia:Desertapir
wikitext: |-
  {{Navigation}}

  * "Desertapir" is a portmanteau of the words "[[wikipedia:Desert|Desert]]" and "[[wikipedia:Tapir|Tapir]]". In the artwork, the creatures are depicted as tapirs living in the desert. This is probably due to the untranslatable pun in its Japanese name 砂バク (Sabaku), which means "Desert", but is written with the Kanji for "Sand", 砂 (Sa), and the Katakana for "Tapir", バク (Baku).
  * This monster has a [[counterpart]]: "[[Dark Desertapir]]".
  * This monster appears in the artwork of "[[Beastborg Fusioner]]".
