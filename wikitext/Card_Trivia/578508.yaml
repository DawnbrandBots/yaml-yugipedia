title: Card Trivia:Danger!? Tsuchinoko?
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Tsuchinoko|tsuchinoko]] from Japanese folklore.
  * Unlike the other "[[Danger!]]" monsters, this card and "[[Danger!? Jackalope?]]" have question marks after each word in their names, likely to represent its danger level being called into question.
  * The molted snakeskin of this monster appears in the artwork of "[[Danger! Response Team]]".
