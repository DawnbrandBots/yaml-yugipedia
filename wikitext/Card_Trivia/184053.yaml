title: Card Trivia:Inzektor Sword - Zektkaliber
wikitext: |-
  {{Navigation}}

  * "[[Inzektor Exa-Beetle]]" appears in this card's artwork.
  ** "Exa-Beetle" may also be holding "[[Inzektor Axe - Zektahawk]]" in its other hand outside of this artwork's view.
  * This card is named for [[wikipedia:Excalibur|Excalibur]], the legendary sword of King Arthur.
  * The sword in this card's artwork resembles [[wikipedia:Kamen Rider Gatack|Gatack's]] Double Calibur from ''[[wikipedia:Kamen Rider Kabuto|Kamen Rider Kabuto]]''; the color and design of the sword also closely resemble those of Kabuto's Perfect Zector and [[wikipedia:Kamen Rider W|W's]] Prism Bicker.
