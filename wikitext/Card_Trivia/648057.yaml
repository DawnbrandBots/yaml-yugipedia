title: Card Trivia:Laundry Dragonmaid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragonmaid Downtime]]", "[[Dragonmaid Hospitality]]", "[[Dragonmaid Send-Off]]", "[[Dragonmaid Tidying]]", and "[[Laundry Trap]]".
  * This monster is the maid form of "[[Dragonmaid Nudyarl]]".
  ** This monster is based on a laundry maid, a maid who cleans and prepares the house's laundry.
  * Unlike the other maiden "Dragonmaid" monsters, who wear conventional [[wikipedia:French maid|French maid]] uniform, this monster is dressed in a Japanese-styled French maid dress uniform.
  ** This likely correlates to how "[[Dragonmaid Nudyarl]]" also has a different design compared to the other dragon form "Dragonmaid" monsters, as it resembles [[wikipedia:Chinese dragon|Eastern dragons]] more than Western dragons.
