title: Card Trivia:Worm Illidan
wikitext: |-
  {{Navigation}}

  * This monster is likely an [[Card evolutions|upgraded]] form of "[[Worm Hope]]".
  ** This is supported by the fact that both monsters' designs are similar, while the English letter "I" (which this monster's name begins with) comes after the English letter "H".
  * This card's Spanish print features an error, as the lore reads "''cada vez que '''esta''' carta es colocada en tu Campo''", which means "each time THIS card is [[Set]] on the [[field]]".
