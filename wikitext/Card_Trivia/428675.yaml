title: Card Trivia:Legacy of the Duelist
wikitext: |-
  {{Navigation}}

  * The silhouettes of "[[Blue-Eyes White Dragon]]" and "[[Dark Magician]]" appear in this card's artwork.
  * This card's Japanese name, "Passionate Duelists", references the [[Passionate Duelists|musical piece]] from the original Japanese version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, while its ''[[TCG]]'' name references the video game, ''[[Yu-Gi-Oh! Legacy of the Duelist]]''.
  * This card's effects reference different elements from the [[Yu-Gi-Oh! (anime)|original series]].
  ** This card's first effect to [[negate]] the player's monster’s attack and [[destroy]] an opponent's [[Spell]]/[[Trap Card]] references the "[[Duel Monsters#Expert|Expert]]" rules of ''[[Duel Monsters]]'', which allowed the player's monsters to attack and destroy the opponent's [[face-down]] cards, which included Spell/Trap Cards.
  ** This card's second effect to [[Set]] only one Spell/Trap card references the "[[Battle City Rules|Super Expert]]" rules of ''Duel Monsters'' used during the [[Battle City]] tournament, which restricted players from placing more than one Spell and Trap Card from their [[hand]]s [[once per turn]], as well as preventing [[Fusion Monster]]s from attacking during the same turn they were [[Fusion Summon]]ed.
  ** This card's third effect to [[add]] a monster from the player's [[Graveyard]] to the hand instead of conducting their [[normal draw]] during the [[Draw Phase]] references how [[Seto Kaiba (manga)|Seto Kaiba]] "draws" "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]" from a literal grave during his Duel against [[Aigami]] in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]''.
