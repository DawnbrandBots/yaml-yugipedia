title: 'Card Trivia:Number 3: Cicada King'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * This monster appears in the artwork of "[[Cicada Illusion]]".
  * Like many "[[Number]]" monsters with numbers below 10, this card's number matches its [[Rank]].
  * This monster is based on the winged stage of a [[wikipedia:cicada|cicada's life-cycle]], after molting from a [[wikipedia:nymph (biology)|nymph]].
  * This card is the first [[Barian Number]] to be released in the ''[[OCG]]''/''[[TCG]]''.
