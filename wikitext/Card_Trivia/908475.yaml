title: Card Trivia:Ghoti of the Deep Beyond
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2023]]''.
  * This monster appears in the artwork of "[[Ghoti Cosmos]]".
  * This card and "[[Crystron Quariongandrax]]" are the only Synchro Monsters that can be Synchro Summoned which do not require a specific number of Tuner monsters for the Synchro Summon.
