title: Card Trivia:Lindorm the Dragon Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Perseverance of the Monarchs]]".
  * This monster's name is derived from "[[wikipedia:Lindworm|lindworm]]", a serpentine dragon-like creature in [[wikipedia:European folklore|European folklore]].
  * This monster has an [[Counterpart|upgraded]] Mega Monarch form: "[[Lindorm the Mega Monarch]]".
  * This monster has a Vassal counterpart: "[[Drache the Dragon Vassal]]".
