title: Card Trivia:Triumph of the Monarchs
wikitext: |-
  {{Navigation}}

  * "[[Delg the Dark Monarch]]" and "[[Kuraz the Light Monarch]]" appear in this card's artwork.
  ** This card implements aspects of both monsters' [[effect]]s. It allows the [[Duelist|player]] to [[Draw a card|draw]] cards like "Kuraz" and removes cards from the opponent's [[Graveyard]] like "Delg" (but by instead [[Shuffle|shuffling]] them into the [[Main Deck|Deck]] as that's the substitute for [[banish]]ment in ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'').
