title: Card Trivia:Hydrogeddon
wikitext: |-
  {{Navigation}}

  * This card (with its original anime artwork) appears in the original anime artwork of "[[Montage Dragon]]".
  * This monster's name and [[WATER]] [[Attribute]] are based on [[wikipedia:Hydrogen|hydrogen]], the first chemical element in the periodic table which, when [[Bonding - H2O|bonded]] with [[Oxygeddon|oxygen]], can create [[Water Dragon|water]].
  ** This monster's effect to [[Special Summon]] another copy of itself from the [[Deck]] references how hydrogen is the most abundant chemical substance in the universe.
