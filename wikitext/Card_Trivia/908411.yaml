title: Card Trivia:Amazoness Augusta
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Amazoness Empress]]".
  ** This monster's Japanese name, "Kaiserin" is the German word for "empress" and the female equivalent of "[[wikipedia:Kaiser|kaiser]]" ("emperor").
  ** This monster's ''[[TCG]]'' name, "Augusta", references [[Wikipedia:Augustus Caesar|Gaius Octavius]], known as "Augustus", the first Emperor of the Roman Empire. After his death, "Augustus" would become a title passed from Emperor to Emperor, denoting their status, while the feminine form "Augusta" would be used for the Empress and other female members of the imperial family.
  * This monster has the highest [[Level]] (10) and [[original ATK]] (3200) of all "[[Amazoness]]" monsters.
  ** This monster is tied with "[[Amazoness Pet Liger King]]" for the highest [[original DEF]] (2800) of all "Amazoness" monsters.
