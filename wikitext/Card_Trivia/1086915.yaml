title: Card Trivia:Evasive Chaos Ninsect Rosary Cicada
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Evasive Chaos Ninjitsu Art of Furious Insect Barrage]]".
  * The first portion of this monster's Japanese name "念珠" (''Nenju'') is named after the type of [[wikipedia:Prayer beads|prayer beads]] worn by Buddhist monks, which this monster's design is based on.
