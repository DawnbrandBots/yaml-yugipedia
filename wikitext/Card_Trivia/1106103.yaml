title: Card Trivia:Diabellstar Vengeance
wikitext: |-
  {{Navigation}}

  * This monster is the upgraded "[[Sinful Spoils]]" form of "[[Diabellstar the Black Witch]]".
  * This monster has an opposing [[counterpart]]: "[[Diabellze the White Witch]]".
  ** Both share the same [[original ATK and DEF]] (2500/2100).
  ** Both have opposite [[Attributes]] ([[DARK]] and [[LIGHT]]).
  ** Both have mirrored poses.
  ** Both are upgraded archetypal forms of an original pair of counterparts: "[[Diabellstar the Black Witch]]" and "[[Diabellze the Original Sinkeeper]]".
  *** Their Japanese names follow the same naming scheme as their opposite counterpart's original form:
  **** "Diabellstar the Sin Adjudicator‎" and "Diabellze the Original Sinner"
  **** "Diabellze the White Witch" and "Diabellstar the Black Witch"
