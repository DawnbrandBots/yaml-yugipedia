title: Card Trivia:Neo Kaiser Glider
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Kaiser Glider]]".
  * This card's artwork was drawn by [[Kazuki Takahashi]].
  * This monster's effects reference [[Dark Yugi (manga)|Dark Yugi]] and [[Seto Kaiba (manga)|Seto Kaiba's]] Duel against [[Mask of Darkness (manga)|Mask of Darkness]] and [[Mask of Light (manga)|Mask of Light]] in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'' manga]], where the original "[[Kaiser Glider (manga)|Kaiser Glider]]" made its debut.
  ** This monster's first effect references {{chapter|Yu-Gi-Oh!|186|ref}}, where Kaiba [[discard]]s "Kaiser Glider" and "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" with the effect of Dark Yugi's "[[Card Destruction (manga)|Card Destruction]]", then [[Special Summon]]s "Blue-Eyes White Dragon" (a [[Dragon]] [[Normal Monster]]) from the [[Graveyard]] with "[[Monster Reborn (manga)|Monster Reborn]]". 
  ** This monster's second effect references how the effect of Dark Yugi's "[[Archfiend of Gilfer (manga)|Archfiend of Gilfer]]" causes Mask of Darkness' "[[The Masked Beast (manga)|The Masked Beast]]" to lose 500 [[ATK]] after "Gilfer" is sent to the Graveyard with "Card Destruction".
