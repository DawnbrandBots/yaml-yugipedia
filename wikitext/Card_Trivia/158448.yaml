title: Card Trivia:Tradetoad
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Replace Toad" (サシカエル, ''sashikaeru''), is a pun on the Japanese term 「差し替える」 meaning "to replace", reflecting its effect to "replace" an [[Aqua]] monster with a "[[Frog]]" monster from the [[Graveyard]].
  ** This monster's English name is a combination of the words "trade" and "toad", which also reflects its effect to "replace" an Aqua monster with a "Frog" monster from the Graveyard.
  * This monster appears to be a younger, watered-down version of the banned "Frog" support card, "[[Substitoad]]". Oddly enough, this monster's [[original ATK and DEF]] (100/2000) is the same as "Substitoad".
  ** This monster's Japanese name and design is a reference to it serving as a "replacement" of "Subsitoad" since its banning in the ''[[OCG]]''.
  ** Both monsters features swapped designs featuring both sides of their bodies being pink and black, with each side featuring either an angel wing or a devil wing respectively. Also, this monster features an arrow design on its pink half while "Substitoad" features gear-like designs on its pink half.
  ** Both monsters feature effects that [[Special Summon]] a "Frog" monster by [[Tribute|Tributing]] one monster; however, this monster requires an Aqua monster to Special Summon a "Frog" monster from the Graveyard, while "Substitoad" does not require a specific monster to Special Summon a "Frog" monster from the [[Deck]].
