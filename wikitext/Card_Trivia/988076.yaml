title: Card Trivia:Earthbound Prisoner Line Walker
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * This monster's name references the purported theory of how the [[wikipedia:Nazca Lines|Nazca Lines]] were used as a marching line for religious ceremonies or pilgrimages.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect, [[add]]ing "[[Earthbound Prison]]" or "[[Harmonic Synchro Fusion]]" to the [[hand]], is based on how it was first used along with the other aforementioned cards in {{episode|ARC-V|092|ref}}.
