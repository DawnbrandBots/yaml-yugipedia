title: Card Trivia:Constellar Hyades
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Sacred Star Knights!!]]''.
  * This monster's name is based on [[wikipedia:Hyades (star cluster)|Hyades]], a star cluster located in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Taurus (constellation)|Taurus]], which appears in the background of this card's artwork.
  ** This monster's armor features bull-like horns on its helmet, referencing how Taurus is also known as the "bull" constellation.
