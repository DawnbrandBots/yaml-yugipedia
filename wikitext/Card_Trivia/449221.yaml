title: Card Trivia:Linkbelt Wall Dragon
wikitext: |-
  {{Navigation}}

  * This monster is named after, and has a body in the shape of, an [[wikipedia:Belt (firearms)|ammunition belt]].
  ** Also, its name is possibly a pun of the [[wikipedia:Berlin Wall|Berlin Wall]].
  * In the anime, this monster's [[Wall Counter]]s are represented by the red orbs on its forehead lighting up (there are only four, representing the maximum number of Wall Counters it could have in the anime).
  * In the dub, the "bullets" that make up this card's body shine and glow, slightly obscuring them.
