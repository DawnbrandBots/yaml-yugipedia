title: Card Trivia:Flower Wolf
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cattle Call]]" and "[[Elimigate]]"
  ** A stuffed animal version of this monster appears in the artwork of "[[Cross-Sheep]]".
  * This card appears in the artwork of "[[Banquet of Millions]]".
  * This is the only [[Fusion Monster]] to have the word "FUSION:" written on the card before the [[Fusion Material]]s prior to its removal in its [[Card Errata:Flower Wolf|first erratum]].
  * Until the release of "[[Magikey Beast - Ansyalabolas]]", this was the [[Beast]] Fusion Monster with the highest [[ATK]]/[[DEF]] in the game.
  * This monster's size varies between media. In ''[[Yu-Gi-Oh! Capsule Monsters]]'', this monster is similar in size to real life wolves. In {{chapter|Yu-Gi-Oh! OCG Stories|Magistus|7|ref}}, this monster is larger than the average human.
