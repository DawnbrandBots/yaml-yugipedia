title: Card Trivia:Hexa Knight
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name and [[Level]] (6) are based on the [[wikipedia:Hexagon|hexagon]], a geometrical polygon with six sides.
  ** This monster's shield and the shape in the background of this card's artwork both feature a hexagonal shape.
  ** This card's [[original ATK and DEF]] (1800/1200) are each multiples of six multiplied by 300 and 200, respectively.
