title: Card Trivia:Phantasos, the Dream Mirror Foe
wikitext: |-
  {{Navigation}}

  * The back of "Phantasos, the Dream Mirror Friend" appear in the mirror in this card's artwork.
  * This monster is named after [[wikipedia:Phantasos|Phantasos]], one of the thousand sons of [[wikipedia:Somnus|Somnus]], the personification of sleep from [[wikipedia:Roman mythology|Roman mythology]], from [[wikipedia:Ovid|Ovid]]'s ''[[wikipedia:Metamorphoses|Metamorphoses]]''.
  * This monster has a [[LIGHT]] [[counterpart]]: "[[Phantasos, the Dream Mirror Friend]]".
  ** Both have the same [[Level]] (4) and [[Type]] ([[Beast-Warrior]]), but opposite [[Attribute]]s and [[ATK]]/[[DEF]].
