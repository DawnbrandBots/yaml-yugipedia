title: Card Trivia:Noble Knight Joan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Pennant of Revolution]]".
  * This monster is based on [[wikipedia:Joan of Arc|Joan of Arc]], a prominent figure in the [[wikipedia:Hundred Years' War|Hundred Years' War]] where she fought as a member of the French army disguised in a soldier's armor, who was captured, tried, and burned at the stake; she would later be canonized as a saint.
  ** Fittingly, images of the [[wikipedia:Fleur-de-lis|Fleur-de-lis]] appear in this card's artwork, which are a reference to Joan of Arc's French nationality, as well as the nationality of this monster's owner, [[Sherry LeBlanc]], in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's [[original ATK]] (1900) may be a reference to how Joan of Arc was burned at the stake at the age of 19.
  * This was the first "[[Noble Knight]]" monster to be released in the ''[[OCG]]'' (in 2010), despite being thematically unrelated to the "Noble Knight" [[archetype]].
