title: Card Trivia:Volcanic Queen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Volcanic Emission]]".
  * This card has a male [[counterpart]]: "[[Volcanic Doomfire]]".
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, [[Volcanic Queen (anime)|this monster]] represented [[Axel Brodie]]'s mother, while "[[Volcanic Doomfire (anime)|Volcanic Doomfire]]" represented Axel's father, [[Mr. Brodie]]. [[Trueman]] used this card and "[[The Unchosen One (anime)|The Unchosen One]]" to exploit Axel's darkness from a childhood incident, when he and his parents were involved in a car accident that was set on fire and he had to choose between saving his father or his mother, which had been averted and resulted in their survival. When Trueman played this card, the woman in flames that appears in this card's artwork transformed into Axel's mother, which represented her fate had Axel chose to save his father.
