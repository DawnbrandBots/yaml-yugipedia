title: Card Trivia:Ancient Lamp
wikitext: |-
  {{Navigation}}

  * This card appears in the international artwork of "[[Trap Sluzer]]".
  * This monster is based on a magic lamp, a mystical item primarily featured in a few stories in ''[[wikipedia:One Thousand and One Nights|One Thousand and One Nights]]'', which takes the form of an ordinary [[wikipedia:Oil lamp|oil lamp]] containing a [[wikipedia:Genie|genie]] inside. Fittingly, this monster's effect can [[Special Summon]] "[[La Jinn the Mystical Genie of the Lamp]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect [[activate|activation]] after being flipped [[face-up]] when attacked by an opponent's monster is a reference to how in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], it was initially a [[Continuous Trap Card]]. Additionally, its ''OCG''/''TCG'' effect to change the opponent's monster's attack target to another of the opponent's monsters is a reference to its original [[flavor text]] in the manga and anime, which states that it reflect any attack.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|101|ref}}, specifically from the panel showing [[Ancient Lamp (manga)|this lamp]] manifesting itself.
