title: Card Trivia:Howling Insect
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Verdant Sanctuary]]".
  * This monster is conceptually similar to "[[Resonance Insect]]". Both are [[wikipedia:Cricket (insect)|cricket]]-based monsters named with auditory themes; they have the same [[Attribute]] and [[Type]], as well as [[Toolbox]] effects that can be used when they leave the [[field]] in a certain manner.
