title: Card Trivia:Emblem of Dragon Destroyer
wikitext: |-
  {{Navigation}}

  * The emblem pictured in this card's artwork bears some similarities to the sword hilt of "[[Buster Blader]]".
  * This emblem appears in the artworks of "[[Beacon of Dragon Destroyer]]" and "[[Witness of Dragon Destroyer]]".
  * The dragon image in the blue bead bears resemblance to the head of a "[[Tyrant Dragon]]".
