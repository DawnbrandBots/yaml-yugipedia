title: Card Trivia:Dragunity Glow
wikitext: |-
  {{Navigation}}

  * "[[Gungnir, Dragon of the Ice Barrier]]" and "[[Dragunity Arma Gram]]" appear in this card's artwork.
  * The event in this card's artwork probably happened around the same time with, and in close proximity to, the event depicted in "[[Ice Dragon's Prison]]".
  ** If assumed so, then it is implied that stronger "Dragunity" dragons appeared in order to stop the rampage of uncontrolled "Ice Barrier" dragons before [[Void Trap Hole|they were sealed by a certain figure]].
