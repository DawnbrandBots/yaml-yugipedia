title: Card Trivia:Humanoid Worm Drake
wikitext: |-
  {{Navigation}}

  * This monster's [[original ATK]] (2200) is the sum of its two [[Fusion Material]]s' [[ATK]], while its [[original DEF]] (2000) is equal to the [[DEF]] of "[[Humanoid Slime]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Duelist|112|ref}}, specifically from the panel showing [[Humanoid Worm Drake (manga)|this monster]] being [[Fusion Summon]]ed.
