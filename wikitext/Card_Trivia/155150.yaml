title: Card Trivia:Clock Resonator
wikitext: |-
  {{Navigation}}

  * This monster's design features certain positions on the clock reflecting its stats.
  ** The small hand on the clock is pointing at the number "3", reflecting this monster's [[Level]] (3).
  ** The big hand on the clock is pointing at the number "12", reflecting this monster's [[original ATK]] (1200).
  ** This monster is positioned at the bottom of the clock where the number "6" is located, reflecting this monster's [[original DEF]] (600).
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster's [[Type]] was a [[Machine]] before it was changed to a [[Fiend]] monster in the ''[[OCG]]''/''[[TCG]]''.
  ** As such, this is the only "[[Resonator]]" monster in the anime that is not a Fiend monster.
