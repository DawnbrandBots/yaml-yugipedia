title: Card Trivia:Code Igniter
wikitext: |-
  {{Navigation}}

  * This monster references the two [[archetype]]s associated with [[Ai]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime: "[[Code Talker (archetype)|Code Talker]]" and "[[@Ignister]]".
  ** This monster's design is based on "[[Decode Talker]]", a member of the "Code Talker" archetype, which mostly features humanoid monsters with electronic lines on their bodies and stylized armor.
  ** The second portion of this monster's name references how the "@Ignister" archetype is based on the [[Ignis]], which is [[support]]ed by the "[[A.I.]]" archetype. The Ignis were named after the Latin word for "fire", similar to how this monster is depicted with fire igniting from its gauntlets.
