title: Card Trivia:Change of Heart
wikitext: |-
  {{Navigation}}

  * This card has several downgraded [[counterparts]]: "[[Brain Control]]", "[[Mind Control]]", and "[[Mind Pollutant]]".
  ** This card also has a [[Rush Duel]] monster counterpart: "[[Change of Dessert]]".
  * This card is one of the [[Forbidden]] cards whose effect is simulated by "[[Triple Tactics Talent]]", but its functionality is modified from the original counterpart, as it does not target. Furthermore, it is the only card referenced which has since been made legal for competitive play (with the release of the [[May 2022 Lists (TCG)|May 2022 Forbidden and Limited List]] for the TCG format).
  * In the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this was [[Bakura Ryou]]'s favorite card.
  ** This card also reflects Bakura and his darker alter-ego, [[Yami Bakura]], who often took control of Bakura's body via the [[Millennium Ring]].
