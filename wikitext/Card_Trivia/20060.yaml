title: Card Trivia:Lady Ninja Yae
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Armor Ninjitsu Art of Revival]]", "[[Ninjitsu Art of Transformation]]", and "[[Flattery]]".
  * This monster is based on Yae, a female ninja character from the Konami video game series, ''[[wikipedia:Ganbare Goemon|Ganbare Goemon]]''.
  * This monster's design features pauldrons with the same symbol as that depicted in the design of "[[Armed Ninja]]".
