title: Card Trivia:Sylvan Snapdrassinagon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sylvan Waterslide]]".
  * This card's name, "Snapdrassinagon", is a portmanteau of "Snapdragon" and "Assassin".
  * This monster may be based on a tobacco plant.
  * The skulls in this card's artwork are a reference to the snapdragon plant, which creates skull-shaped buds when it dies.
