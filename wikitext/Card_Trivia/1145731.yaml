title: Card Trivia:Reverse Jar
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Lottery machine|lottery ball machine]], as indicated by the circular handle on its side to rotate it, the stand that supports it from underneath, and the exit hole serving as its eye.
  * The contrasting designs of this monster (futuristic versus ancient) likely reference the visual designs of "[[Cyber Jar]]" and "[[Ancient Jar]]", as further reinforced by their similar faces and their "Jar" theme.
