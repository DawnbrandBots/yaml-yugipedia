title: Card Trivia:Light Barrier
wikitext: |-
  {{Navigation}}

  * "[[Arcana Force XXI - The World]]" appears in this card's artwork.
  * This card is a likely reference to the "''ultraviolet'' light barrier" in [[wikipedia:H.P. Lovecraft|H.P. Lovecraft's]] short story, ''[[wikipedia:From Beyond (short story)|From Beyond]]'', in which the scientist Crawford Tillinghast constructs a machine which stimulates the subject's pineal gland, allowing them to illuminate the sixth sense of the human mind, which in this case, is ultraviolet and beings from another dimension that fall into the ultraviolet spectrum.
  ** In the 1986 film adaptation of ''[[wikipedia:From Beyond (film)|From Beyond]]'', the scientist Edward Pretorius creates the machine that allows anyone in range to see beyond perceptible reality, as well as gain the power of telekinesis and will his own physical destiny while the machine is in operation.
  *** This is reflected in this card's owner, [[Sartorius]], a fortuneteller in the ''[[Yu-Gi-Oh! GX]]'' anime who, on top of his ability to see into the future, gains the ability of telekinesis and to will his own physical destiny while under the possession of [[The Light of Destruction]], an evil entity who was released from a [[wikipedia:White hole|white hole]]. Also, Sartorius' [[Deck]] consists of [[LIGHT]] monsters that are based on Lovecraft's cosmic entities, which further references this card's connection with Lovecraft and the creatures from the ultraviolet spectrum in ''From Beyond''.
