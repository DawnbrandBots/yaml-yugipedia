title: Card Trivia:Junk Warrior/Assault Mode
wikitext: |-
  {{Navigation}}

  * This monster is the [[Card evolutions|upgraded]] "[[/Assault Mode]]" form of "[[Junk Warrior]]".
  * This monster has the highest [[Level]] (7) of all [[Main Deck]] "[[Junk]]" monsters, as well as the lowest Level of all "/Assault Mode" monsters.
  * This is the only "/Assault Mode" monster that, when [[destroy]]ed, returns its base form to the [[Extra Deck]] before [[Special Summon]]ing it, likely to activate the effect of "Junk Warrior" afterward.
