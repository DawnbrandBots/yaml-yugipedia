title: Card Trivia:Junora the Power Patron of Tuning
wikitext: |-
  {{Navigation}}

  * The outline of this monster appears in the artwork of "[[Prohibited Power Patron Portal - Terminus]]".
  * This monster is based on [[wikipedia:Juno (mythology)|Juno]], the queen of the gods in [[wikipedia:Roman mythology|Roman mythology]].
  ** This monster can be [[Synchro Summon]]ed with "[[Elfnote Power Patron]]", whose design is based on a peacock, the sacred animal of Juno.
