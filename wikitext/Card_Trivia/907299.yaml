title: Card Trivia:Materiactor Annulus
wikitext: |-
  {{Navigation}}

  * "[[Materiactor Gigaboros]]" and "[[Materiactor Gigadra]]" appear in this card's artwork.
  * This card is the first OCG/TCG card that returns Xyz Material from the Xyz Monster to the field.
  ** The first ever is [[New Order 12: Etheric Maahes]].
