title: Card Trivia:Mind Trust
wikitext: |-
  {{Navigation}}

  * "[[Dark Resonator]]" and "[[Dark Ruler Ha Des]]" appear in this card's artwork.
  ** This card's artwork depicts "Dark Ruler Ha Des" (a [[Level 6]] monster) being [[Tribute]]d to [[return]] "Dark Resonator" (a [[Level 3]] monster) from the [[Graveyard]] to the [[hand]].
  ** This is one of the few cards depicting "Dark Ruler Ha Des" in its artwork that was not censored in the international versions to remove its horns; other cards include "[[Flash Effect]]", "[[Leading Question]]", and "[[Victim Barrier]]".
