title: Card Trivia:Tour of Doom
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Death (tarot card)|Death]].
  * The monster in this card's artwork is based on [[wikipedia:Hastur|Hastur]], an entity in the [[wikipedia:Cthulhu Mythos|Cthulhu Mythos]] who takes the form of a hooded man wearing a yellow cloak, keeping in relation with the [[wikipedia:H.P. Lovecraft|Lovecraftian]] theme and design of the "[[Arcana Force]]" [[archetype]].
