title: Card Trivia:Metal Molephosis
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is a portmanteau of the words "metal", "metamorphosis", and "mole".
  ** This monster's effect reflects this wordplay, as it allows all [[Normal Monster]]s the player [[control]]s to undergo "metamorphosis" by changing their [[Attribute]] and [[Type]] to the ones the player declares.
