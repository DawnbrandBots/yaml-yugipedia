title: Card Trivia:Pestilence
wikitext: |-
  {{Navigation}}

  * "[[Marauding Captain]]" appears in this card's artwork.
  * The aura of pestilence in this card's artwork appears in the artwork of "[[Nomadic Force]]".
  * This card is named after a pestilence, a fatal, infectious disease or plague that slowly kills its host and devastates communities.
  ** This card also references the pestilences that often ravaged [[wikipedia:Middle Ages|Medieval Europe]], including the infamous [[wikipedia:Black Death|Black Death]], which slowly killed fifty million people across Europe in the 14th century. The [[Type]]-specific requirements are possibly a reference to the humanoids who were affected by the plague during that era, when there was a widespread belief in witches ([[Spellcaster]]) and when the [[wikipedia:Crusades|Crusades]] took place ([[Warrior]]/[[Beast-Warrior]]). 
  * In [[February 2021 Lists|February 2021]], this card was [[Forbidden]] as a symbolic response to the [[COVID-19 pandemic]], and was confirmed to be unbanned for [[April 2021 Lists|April]] later that year.<ref>{{cite web | url = https://beyondtheduel.com/emergency-ban-pestilence/ | archive-url = https://web.archive.org/web/20210215125458/https://beyondtheduel.com/emergency-ban-pestilence/ | title = Emergency Ban - Pestilence | author = DSummon | website = Beyond the Duel | date = February 15, 2021 | archive-date = February 15, 2021 | accessdate = May 21, 2024}}</ref> This is the first instance where a Forbidden card's limitation status would be confirmed.

