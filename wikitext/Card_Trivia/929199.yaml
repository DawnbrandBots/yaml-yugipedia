title: Card Trivia:Bendorbreak the Conqueror
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Illusion Strike Mirage Impact!!]]''.
  * This monster's Japanese name (獣翼剛王セイス, ''Jūyokugōō Seisu'') is a play on the Japanese proverb, "soft and fair goes far" (柔よく剛を制す, ''Jūyokugōwoseisu'').
