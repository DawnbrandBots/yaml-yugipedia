title: Card Trivia:Jurrac Ptera
wikitext: |-
  {{Navigation}}

  * This card is based on the pterosaur [[wikipedia:Pteranodon|Pteranodon]] (Toothless wing), and thus is the only "[[Jurrac]]" monster that is not a true dinosaur, besides "[[Jurrac Meteor]]".
  * This card is one of two dinosaur monsters that returns a monster to the hand, the other being "[[Hyper Hammerhead]]".
