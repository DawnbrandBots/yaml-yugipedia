title: Card Trivia:Ice Princess Zereort
wikitext: |-
  {{Navigation}}

  * The first portion of this monster's Japanese name, "Ljod Harpyia" (リオート・ハルピュイア, ''Riōto Harupyuia''), is the Russian word for "ice" (лёд).
  ** The Japanese pronunciation of "Ljod" (リオート, ''Riōto'') uses the katakana 「リオ」 (''Rio''), which is also the katakana for the Japanese name of [[Rio Kastle]], who used [[Ice Princess Zereort (anime)|this monster]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  *** The second portion of this monster's Japanese name, "Harpyia", also references the [[wikipedia:Harpy|harpy]], a creature from [[wikipedia:Greek mythology|Greek mythology]] who is depicted as half-woman, half-bird.
  ** This monster's ''[[TCG]]'' name, "Zereort", is similar to "zero", referencing [[wikipedia:Absolute zero|absolute zero]], the lowest value that temperature can reach at 0 [[wikipedia:Kelvin|kelvin]] or [[wikipedia:Rankine scale|Rankine]], where an atom's movement stops, and any known matter becomes solid. This is also reflected in this monster's effect to make the [[ATK]] of an opponent's monster become 0.
  * This monster has a [[Card evolutions|downgraded]] [[Main Deck]] form: "[[Migratory Zereort]]".
