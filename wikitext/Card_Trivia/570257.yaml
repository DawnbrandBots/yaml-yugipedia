title: Card Trivia:Return of the Zombies
wikitext: |-
  {{Navigation}}

  * In the order from top to bottom and from left to right, "[[Tour Bus From the Underworld]]", "[[Soul-Absorbing Bone Tower]]", "[[Plague Wolf]]", "[[Dragon Zombie]]", "[[Zoma the Spirit]]"; "[[Shadow Ghoul]]", "[[Sea Monster of Theseus]]", "[[Despair from the Dark]]"; "[[Zombie Mammoth]]", "[[Berserk Dragon]]"; "[[Dark Assailant]]", "[[Zombie Master]]", "[[Reborn Zombie]]", "[[Temple of Skulls]]", "[[Plaguespreader Zombie]]", "[[Doomkaiser Dragon]]", "[[Dark Spirit of the Silent]]"; the back of "[[Uni-Zombie]]", "[[Goblin Zombie]]", the arm and shovel from "[[Foolish Burial]]", "[[Bone Mouse]]", the skull of the front-most mummy from the artwork of "[[Call of the Mummy]]", the skull of "[[Zombie Tiger]]", "[[Glow-Up Bloom]]"; and "[[Violet Crystal]]" appear in this card's artwork.
  ** [[Red-Eyes Zombie Necro Dragon]]—whose head and neck is above where Zoma head is—also appear in this card's artwork.
  ** "[[Zombie World]]" features the right-side perspective of this card's artwork.
  * This card's name is possibly a reference to "[[Return of the Red-Eyes]]". Fittingly, this card was released alongside "[[Red-Eyes Zombie Necro Dragon]]" in ''[[Structure Deck R: Undead World]]''/''[[Structure Deck: Zombie Horde]]''.
