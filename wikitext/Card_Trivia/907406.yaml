title: Card Trivia:Drytron Alpha Thuban
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Drytron Asterism]]", "[[Drytron Eclipse]]", "[[Drytron Fafnir]]", "[[Ursarctic Drytron]]", and "[[Ultimate Flagship Ursatron]]".
  * This monster is based on [[wikipedia:Thuban|Thuban]], the binary star system located in the northern constellation of [[wikipedia:Draco (constellation)|Draco]], which is also designated as "Alpha Draconis".
  * "[[Ultimate Bright Knight Ursatron Alpha]]" is this monster with traits of "[[Ursarctic Septentrion]]".
