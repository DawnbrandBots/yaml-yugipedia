title: Card Trivia:Extra Fusion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Blazing Bombardment Beast]]" and "[[Ignition Beast Volcannon]]" appear in this card's artwork.
  * This card's name is based on its effect to [[Fusion Summon]] by using [[Fusion Monster]]s in the [[Extra Deck]] (as they are placed there before being Fusion Summoned) as [[Fusion Material]]s.
