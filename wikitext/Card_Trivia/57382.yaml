title: Card Trivia:Blizzard Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Battle of the Elements]]".
  * This monster is related to the "[[Ice Barrier]]" monsters, along with "[[Reese the Ice Mistress]]".
  ** This is supported by it bearing the symbol of the "Ice Barrier", as well as wearing the same mask-like visage as "[[Royal Knight of the Ice Barrier]]".
