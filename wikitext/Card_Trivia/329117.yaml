title: Card Trivia:Machina Sniper
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Machina Armored Unit]]" and "[[Unauthorized Reactivation]]".
  * This monster has a [[DARK]] counterpart: "[[Machina Unclaspare]]".
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this was [[Blister]] and his partner [[Aero]]'s favorite card.
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|R|006|ref}} showing [[Machina Sniper (manga)|this monster]] standing alongside "[[Machina Defender (manga)|Machina Defender]]" and "[[Machina Soldier (manga)|Machina Soldier]]".
