title: Card Trivia:Mad Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Resonator Command]]" and "[[Spell Summon Stopper]]".
  * The background of this card's artwork depicts a skull being shattered. Fittingly, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster attacks, it uses its toothed torso to chew the skull into splinters before shooting those splinters at the opponent's monster.
  * This monster has a [[retrain]]ed counterpart: "[[Bone Archfiend]]".
