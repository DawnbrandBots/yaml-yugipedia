title: Card Trivia:Realm of Danger!
wikitext: |-
  {{Navigation}}

  * This island appears in the artworks of "[[Danger! Disturbance! Disorder!]]", "[[Danger! Excitement! Mystery!]]", and "[[Second Expedition into Danger!]]".
  ** A map of this island appears in the artwork of "[[Danger! Response Team]]".
  * This card's Japanese, "Umaria" (ユーマリア ''Yūmaria''), is a portmanteau of "[[wikipedia:Eurasia|Eurasia]]" (ユーラシア ''Yūrashia'') and "[[wiktionary:UMA|UMA]]" ({{Ruby|ＵＭＡ|ユーマ}} ''Yūma'').
  ** "UMA" is a ''[[wikipedia:Wasei-eigo|wasei-eigo]]'' acronym that stands for "Unidentified Mysterious Animal". It is commonly used in Japanese to refer to [[wikipedia:List of cryptids|cryptids]] and other creatures of urban legends.
