title: Card Trivia:Electrode Beast Anion
wikitext: |-
  {{Navigation}}

  * This monster is based on an "[[wikipedia:anion|anion]]", a molecule with a negative charge.
  ** Fittingly, this monster's design feature a negative expression; also, it is depicted with a blue color scheme in the ''[[OCG]]''/''[[TCG]]'', which is a known negative color.
  ** This monster can be Summoned by the effect of "[[Electrode Beast Cation]]", referencing how positively-charged cations can attract negatively-charged anions due to their opposite charges.
  * This monster's ''OCG''/''TCG'' effects are based on its appearance in {{chapter|ZEXAL|014|ref}}.
  ** This monster's effect to become a [[Level 4]] monster is designed to allow it to be used for the first effect of "[[Spirit Converter]]". In the manga, this monster was [[Tribute]]d by the effect of "[[Spirit Converter (manga)|Spirit Converter]]" to [[attach]] an [[Xyz Material]] to an [[Xyz Monster]]; in the ''OCG''/''TCG'', "Spirit Converter" directly attaches a monster to an Xyz Monster, but requires that the monster be a Level 4 [[LIGHT]] monster. Its effect to search "Spirit Converter" is likewise based on the fact that it used for that card's effect in the manga.
  ** This monster's [[draw]]ing effect is based on its manga effect to allow the player to draw a card when it [[leaves the field]] at the same time as "Electrode Beast Cation". In the chapter, [[Thunder Spark]] used "Spirit Converter" to Tribute both this monster and "Cation" to attach an Xyz Material to an Xyz Monster, which triggered the effect of "Anion" due to both cards being sent to the Graveyard at the same time. In the ''OCG''/''TCG'', "Spirit Converter" attaches a monster directly from the [[field]] to the Xyz Monster (without Tributing any cards), and can only be used once per turn. Thus, this monster's drawing effect sending itself and another card to the Graveyard is designed to mimic its manga counterpart's drawing effect being triggered by the cost of "Spirit Converter" (although if used this way it does not attach an Xyz Material, unlike in the manga).
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter in the ''Yu-Gi-Oh! ZEXAL'' manga, specifically from the panel showing [[Electrode Beast Anion (manga)|this monster]] being Summoned.
