title: Card Trivia:Multiplying Kuriboh!
wikitext: |-
  {{Navigation}}

  * The card "[[Multiply]]" appears in this card's artwork.
  * This monster is the [[signature move]] [[counterpart]] of "[[Kuriboh]]".
  ** This monster is based on the appearance of "Kuriboh" in combination with "Multiply" to create an indestructible wall of "Kuribohs" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  *** This monster's name is based on the Japanese title of {{episode|Yu-Gi-Oh!|024|ref}}: "Multiplying Kuribo! The Astonishing Conclusion", in which [[Yami Yugi]] first used the above-mentioned combination.
  *** This monster's second effect implements "Kuriboh" multiplying itself by adding or [[Special Summon]]ing another monster with 300 [[ATK]]/200 [[DEF]], which many "Kuriboh" monsters possess.
  ** Both of its [[Quick Effect]] requirement depending on the action of the opponent's monster is a reference to the Duels during the Duelist Kingdom arc in the ''Yu-Gi-Oh!'' manga and anime, in which [[Dark Yugi (manga)|Dark Yugi]] used the above-mentioned combination. 
  *** An opponent's monster [[activate]]s an effect (on the [[field]] for its second effect): In {{chapter|Yu-Gi-Oh!|131|ref}} (and its [[Yu-Gi-Oh! - Episode 039|anime adaptation]]), [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus's]] "[[Thousand-Eyes Restrict (manga)|Thousand-Eyes Restrict]]" attempts to use its effect to absorb Dark Yugi's "[[Magician of Black Chaos (manga)|Magician of Black Chaos]]", but Dark Yugi uses the above-mentioned combination to make "Thousand-Eyes Restrict" absorb the multiplying "Kuribohs" instead, gaining ATK equal to the 300 ATK of "[[Kuriboh (manga)|Kuriboh]]", but they self-destruct upon making contact, causing the ATK of "Thousand-Eyes Restrict" to become 0 and its effects to be negated.
  **** This scene can be replicated by using this monster's final Quick Effect to Special Summon "[[Detonating Kuriboh]]", changing the opponent's monster's [[ATK]] to 0 in response to a monster activating an effect, then using the Quick Effect of "Detonating Kuriboh" to [[equip]] itself to an opponent's monster in response to their effect and [[negate]] that opponent's monster's effects.
  **** This monster's second effect to allow the player to [[add]] to the [[hand]] or Special Summon "[[Dark Magician]]" is a reference to Dark Yugi controlling a "[[Dark Magician (manga)|Dark Magician]]", evolved as "Magician of Black Chaos", when this combination is used.
  *** An opponent's monster [[declare]]s an attack (during damage calculation for its second effect): In {{chapter|Yu-Gi-Oh!|104|ref}} (and its anime adaptation), [[Seto Kaiba (manga)|Seto Kaiba's]] "[[Blue-Eyes Ultimate Dragon (manga)|Blue-Eyes Ultimate Dragon]]" attacks Dark Yugi's wall of "Kuribohs".
