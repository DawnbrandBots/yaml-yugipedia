title: Card Trivia:Parlor Dragonmaid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragonmaid Hospitality]]", "[[Dragonmaid Downtime]]", "[[Dragonmaid Send-Off]]", "[[Dragonmaid Tidying]]", and "[[Sweet Roommaid]]".
  * This monster is the maid form of "[[Dragonmaid Lorpar]]".
  ** This monster is based on a parlor maid, a maid who attends the [[wikipedia:Parlour|parlor]], or the reception room, of the house.
