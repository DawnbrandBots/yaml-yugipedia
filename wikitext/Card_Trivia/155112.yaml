title: Card Trivia:Triangle O
wikitext: |-
  {{Navigation}}

  * "[[Ashoka Pillar]]", "[[Cabrera Stone]]", and "[[Crystal Skull]]" appear in this card's artwork.
  ** The "O" in this card's name likely references how the above monsters are based on "OOPArts", short for "[[wikipedia:out-of-place artifacts|out-of-place artifacts]]", an artifact found in a very unusual or apparently impossible archaeological context which would challenge conventional historiography and chronology if authentic.
  ** This card's artwork depicts the aforementioned monsters glowing orange, green, and purple, while the streams of light forming a triangular formation around the monsters are colored the same way. This reflects the different [[card type]]s on the field destroyed by this card's effect, including [[Monster Card|Monsters]], [[Spell Card|Spells]], and [[Trap Card|Traps]].
  *** The same colored glowing around the monsters and in the streaks of light are also the same colors used in the background of their cards' respective artworks.
