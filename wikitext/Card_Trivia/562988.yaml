title: Card Trivia:Super Strident Blaze
wikitext: |-
  {{Navigation}}

  * "[[Cyber End Dragon]]" appears in this card's artwork.
  ** This card's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Cyber End Dragon (anime)|Cyber End Dragon]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's artwork is based on a scene from {{episode|GX|148|ref}} where [[Zane Truesdale]]'s "Cyber End Dragon" prepares to attack [[Jesse Anderson]]'s "[[Rainbow Dark Dragon (anime)|Rainbow Dark Dragon]]", as indicated by the light‑purple background matching the otherworldly setting of their Duel. The depicted moment represents what would have happened if the attack had successfully connected, which does not occur.
