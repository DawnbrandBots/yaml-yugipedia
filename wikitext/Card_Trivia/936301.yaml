title: Card Trivia:Pendulum Evolution (card)
wikitext: |-
  {{Navigation}}

  * [[Yuya's pendant]] and the arc used in the animation for [[Pendulum Summon]]s in the ''[[Yu-Gi-Oh! ARC-V]]'' anime appear in this card's artwork.
  ** The four multicolored versions of Yuya's pendant each reference the [[Four Dimensions]], including the [[Standard Dimension]] (the orange pendant), the [[Xyz Dimension]] (the blue pendant), the [[Synchro Dimension]] (the green pendant), and the [[Fusion Dimension]] (the purple pendant).
  *** The order of the colored pendants, from left to right, is based on the first appearance of [[Z-ARC]]'s [[Yuya Sakaki|four]] [[Yuto|different]] [[Yugo|dimensional]] [[Yuri|counterparts]] in the anime.
  * This card's name and effects reference ''[[Structure Deck: Pendulum Evolution]]''/''[[Pendulum Evolution]]'', which featured the first support for "[[Supreme King Z-ARC]]" in the ''[[OCG]]''/''[[TCG]]''.
