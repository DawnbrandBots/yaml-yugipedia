title: Card Trivia:Speedroid Block-n-Roll
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Guitar controller|guitar controller]], a video game controller designed to simulate playing an [[wikipedia:Electric guitar|electric guitar]].
  * This card's artwork is taken from {{chapter|ARC-V|040|ref}}, specifically from the panel showing [[Speedroid Block-n-Roll (manga)|this monster]] being Summoned.
