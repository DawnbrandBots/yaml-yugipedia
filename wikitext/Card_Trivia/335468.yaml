title: Card Trivia:That Six
wikitext: |-
  {{Navigation}}

  * "[[Terrorking Archfiend]]", "[[Snipe Hunter]]", and "[[Dangerous Machine Type-6]]" appear in this card's artwork.
  ** This is fitting, since all of these cards have undesirable results if their die roll-related effects yield a result of 1 or 6 (as this card's effect enforces).
  * This card's Japanese name is a pun on 出たら ''detara'', which can be used to say "you get a..." (refering to the outcome), and 出鱈目 ''detarame'', meaning "ridiculous" or "nonsense".
  * This card's English name could be a pun on the phrase "that sucks", which reflects an undesirable result, as this card's effect usually does for the dice-roller.
