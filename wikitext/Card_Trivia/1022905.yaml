title: Card Trivia:Aromalilith Rosalina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Aroma Blend]]".
  * This monster is named after the ''[[wikipedia:Melaleuca ericifolia|Melaleuca ericifolia]]'' (also known as the rosalina), a tall, dense shrub with pale white or brown papery bark and leaves that produces essential oils used in aromatherapy and perfumes.
  * This monster has a [[LIGHT]] counterpart: "[[Aromaseraphy Angelica]]".
