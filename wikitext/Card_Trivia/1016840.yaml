title: Card Trivia:Property Flood
wikitext: |-
  {{Navigation|mode=nongame}}

  * "Property" is synonymous to the word "[[Attribute]]", which in turn is commonly used to describe the "elemental" groups of [[Monster Card]]s.
  * This card's artwork depicts a cluster of bubbles, which are colored after the corresponding Attributes: [[EARTH]] (represented by the orange bubble), [[WIND]] (represented by the green bubble), [[FIRE]] (represented by the red bubble), [[WATER]] (represented by the blue bubble), [[LIGHT]] (represented by the yellow bubble), and [[DARK]] (represented by the purple bubble).
