title: Card Trivia:Drake Shark
wikitext: |-
  {{Navigation}}

  * This monster is a [[Main Deck]] form of "[[Number 32: Shark Drake]]".
  ** This monster's name and appearance are based on "Shark Drake".
  ** This monster's [[Level]] (4) matches the [[Rank]] (4) of "Shark Drake". 
  ** This monster's [[original ATK and DEF]] (1400/1050) are half of those of "Shark Drake" (2800/2100).
  * This is the first ''[[OCG]]''/''[[TCG]]'' card to have an effect that allows it to be [[Treated as multiple Xyz Materials|treated]] as multiple [[Xyz Material]]s for an [[Xyz Summon]].
  ** This effect was common among cards used in the ''[[Yu-Gi-Oh! ZEXAL]]'' and ''[[Yu-Gi-Oh! ARC-V]]'' anime; however, many of them had their effects changed to instead [[Summon]] other monsters when they were released in the ''OCG''/''TCG''.
