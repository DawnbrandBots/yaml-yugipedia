title: Card Trivia:Blue-Fang Burst Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Requiem of Destruction!!]]''.
  * This monster appears in the artworks of "[[Blue-Fang Reconnect]]", "[[Burst Boost]]", "[[Downloadragon]]", "[[Drago Tracking]]", "[[Dragons Burst Fusion]]", "[[Dragonic Gacharge]]", and "[[Flash Memory Fusion]]", as well as in both artworks of "[[Hybridrive Back Fusion]]".
  ** A lance shaped like this monster's head appears in the artwork of "[[Riskrack Burst Lance]]".
  * This is the [[signature card]] of [[Yuamu Ohdo]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  ** This is one of the two signature cards of a female lead to be a [[Dragon]] monster, the other being [[Akiza Izinski]]'s "[[Black Rose Dragon (anime)|Black Rose Dragon]]".
  * This monster is a [[High Tech Dragon]] [[counterpart]] of "[[Blue-Eyes White Dragon (Rush Duel)|Blue-Eyes White Dragon]]", named after [[wikipedia:Bluetooth|Bluetooth]], a short-range wireless communication technology standard.
  ** The [[signature move]] of this monster ({{Ruby|滅|ほろ}}びのバーストストリーミング ''Horobi no Bāsuto Sutorīmingu'') is a play on "[[Burst Stream of Destruction (Rush Duel)|Burst Stream of Destruction]]" ({{Ruby|滅|ほろ}}びの{{Ruby|爆裂疾風弾|バーストストリーム}} ''Horobi no Bāsuto Sutorīmu'') and "[[wikipedia:Streaming media|streaming]]" (ストリーミング ''sutorīmingu'').
  ** This monster has a [[DARK]] counterpart, "[[Red-Boot Boost Dragon]]", who is a High Tech Dragon counterpart of "[[Red-Eyes Black Dragon]]", referencing the rivalry between "Blue-Eyes" and "Red-Eyes" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  * This monster has 4 [[Fusion Monster|Fusion]] forms.
  ** An [[counterpart|upgraded]] form with "[[Booster Wyvern]]" from standard Fusion: "[[Blue-Fang Enhanced Burst Dragon]]".
  ** A [[Contact Fusion]] form with "Booster Wyvern": "[[Blue-Fang Concurrent Burst Dragon]]".
  ** A Fusion form with "[[Jointech Rex]]": "[[Bluetech Burst Rex]]".
  ** A Fusion with "Red Boot Burst Dragon": "[[Violet-Scale Enhanced Blast Dragon]]"
  * "[[Jointech Burst Dragon]]" is "[[Jointech Rex]]" with design elements based on this monster.
  * "[[Tamabot Burst Dragon]]" is "[[Tamabot]]" with design elements based on this monster.
