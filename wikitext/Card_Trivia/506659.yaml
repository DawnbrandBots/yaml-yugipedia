title: Card Trivia:Cassimolar
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[wikipedia:Glasya-Labolas|Glasya-Labolas]] (also known as Caassimolar), a demon described in ''[[wikipedia:Ars Goetia|Ars Goetia]]'' (a book within the [[wikipedia:grimoire|grimoire]] ''[[wikipedia:The Lesser Key of Solomon|The Lesser Key of Solomon]]''). Glasya-Labolas is a President of Hell, said to command 36 legions of demons.
  ** Glasya-Labolas is described as a dog with the wings of a [[wikipedia:griffin|griffin]]; in contrast, this monster has a dog-like appearance of a dog with bat wings.
