title: Card Trivia:Jester Puppet Acrobat
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on an [[Wikipedia:Acrobat|acrobat]], a performer who specializes in spectacular gymnastic feats, which is often used as a circus skill.
  ** This monster's Japanese name, "Akrobat", is based on the German spelling of the English word "acrobat", with the letter "k" replacing the letter "c".
  *** This monster shares its Japanese naming scheme with its fellow "[[Jester Puppet]]" monster, "[[Jester Puppet Trick Rider]]", whose name was based on the German term for "artist rider" ("Kunst Reiter") before the localized release of {{chapter|5D's|043|ref}}.
