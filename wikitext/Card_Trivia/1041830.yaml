title: Card Trivia:Tantrum Toddler
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|怒|お}}{{Ruby|小|こ}}{{Ruby|児|さ}}{{Ruby|様|ま}}, ''Okosama'') features multiple convoluted puns:
  ** ''O-ko-sama'' (お子様) is an honorific way to address someone else's child.
  ** ''Oko'' (おこ) is derived from the verb meaning "to get angry" (怒る, ''okoru'') and was a slang term among Japanese ''[[wikipedia:Gyaru|gals]]'' to express anger.
  ** The kanji spelling incorporates the kanji from the aforementioned verb (怒) and the word "child" (小児), which is properly read as ''shōni'' but the kanji "小" can also be read as ''ko''.
  * This is the first [[Rank 1]] [[FIRE]] [[Xyz Monster]].
