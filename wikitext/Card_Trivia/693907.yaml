title: Card Trivia:Prediction Princess Arrowsylph
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "[[wikipedia:Sylph|sylph]]" (the invisible elemental of air in [[wikipedia:Alchemy|alchemy]]) and "[[wikipedia:Belomancy|belomancy]]" (the usage of arrows in [[wikipedia:Divination|divination]]).
