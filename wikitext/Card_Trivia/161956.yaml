title: Card Trivia:Rescueroid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Emergeroid Call]]".
  * This monster is based on a [[wikipedia:Rescue vehicle|rescue vehicle]], a vehicle used in a technical rescue, which reflects its effect to "rescue" a "[[roid]]" monster destroyed by battle from the [[Graveyard]] back into the [[hand]].
  ** This monster's [[FIRE]] [[Attribute]] references how rescue vehicles are primarily used during firefighting operations, a fact that is also referenced by its [[Fusion Monster|Fusion]] form: "[[Ambulance Rescueroid]]".
