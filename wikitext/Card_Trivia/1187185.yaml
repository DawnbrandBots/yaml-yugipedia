title: Card Trivia:Hysteric Eyes
wikitext: |-
  {{Navigation}}

  * "[[Harpie Lady Feather Duster]]" appears in this card's artwork.
  * This card is a [[Rush Duel]] [[retrain]]ed counterpart of "[[Shadow of Eyes]]".
  ** The card's effect that changes the battle position of your opponent's monsters if your opponent sets a monster from their hand is a reference to the actual effect of "Shadow of Eyes".
  ** The Anti-Ritual Monster effect of the card is a nod to {{episode|Yu-Gi-Oh!|30|ref}} where [[Mai Valentine]], the [[Harpie]]'s Duelist, was defeated by [[Yami Yugi]] by bringing "[[Black Luster Soldier (anime)|Black Luster Soldier]]" into the Duel, a [[Ritual Monster]] with no Effect.
