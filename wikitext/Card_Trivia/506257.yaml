title: Card Trivia:Breaker the Magical Warrior
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Champion of Black Magic]]'', ''[[Deck Custom Pack 01]]'', and ''[[Starter Pack Volume 3]]''.
  * This monster appears in the artwork of "[[Defense Seal Wall]]", "[[Magical Mid-Breaker Field]]", "[[Prideful Roar]]", and "[[Spell Vanishing]]".
  * Multiple [[Spell Counter]] symbols appear in this card's artwork, including in the background and in this monster's armor, sword, and shield.
  ** There are nine Spell Counters in this monster's armor and weapons; seven of them are visible in this card's artwork, while the other two can be seen in the artwork of "Spell Vanishing".
  * This monster has a defensive [[counterpart]]: "[[Defender, the Magical Knight]]".
  * This monster has a [[retrained]] counterpart: "[[Breaker the Dark Magical Warrior]]".
  * This monster has an [[Card evolutions|upgraded]] [[Link Monster|Link]] form: "[[Day-Breaker the Shining Magical Warrior]]".
  * This is the only card that can be [[add]]ed to the player's [[hand]] with the "[[Creator (Skill)|Creator]]" [[Skill]] that can be acquired in other ways in ''[[Yu-Gi-Oh! Duel Links]]''.
