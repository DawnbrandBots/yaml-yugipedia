title: Card Trivia:Chronomaly Moai
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chronomaly Esperanza Glyph]]".
  * This monster is based on a [[wikipedia:Moai|Moai]], a series of monolithic stone human figures carved by the [[wikipedia:Rapa Nui people|Rapa Nui people]] on the island of Rapa Nui, also known as [[wikipedia:Easter Island|Easter Island]].
  ** This monster's appearance is based on how the Moai are often seen with their heads and their upper arms above the surface of the ground, while the rest of the body is buried underneath the Earth.
