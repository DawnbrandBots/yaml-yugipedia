title: Card Trivia:Old Mind
wikitext: |-
  {{Navigation}}

  * The cards "[[King of the Skull Servants]]", "[[The Lady in Wight]]", two copies each of the cards "[[Tri-Wight]]", "[[White Hole]]", "[[Wightmare]]", "[[Wightprincess]]", and "[[White Hole]]", and the hand from the artwork of "[[Ante]]" appear in this card's artwork.
  ** The inclusion of "White Hole" in this card's artwork is based on how it shares the same Japanese word「ワイト」 (''Waito'') in the names of the aforementioned [[Wight]] cards.
  ** The arms in this card's artwork belong to the people depicted in the artwork of "[[BIG Win!?]]", specifically "[[Sand Gambler]]" and the person whose hand is depicted in the artwork of "Ante".
  * This card's name is a reference to [[wikipedia:Old Maid (card game)|Old Maid]], a card game where players try to match pairs of cards while avoiding being left with the "Old Maid" card, which is reflected in this card's effect to try to "match" a pair of each player's [[card type]] in their [[hand]] with the same type as the one in their opponent's [[hand]].
