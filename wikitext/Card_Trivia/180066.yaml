title: Card Trivia:Playmaker (card)
wikitext: |-
  {{Navigation|mode=otherGame|Playmaker}}

  [[File:Playmaker-JP-Anime-ZX-NC-Back.png|thumb|right|250|The back of "Playmaker", showing its uniform number 10]]

  * This monster is based on a [[wikipedia:Forward (association football)|forward]], an outfield position in the sport of [[wikipedia:Association football|soccer]] where the striker's primary role is to score goals on behalf of their team.
  ** This monster's Japanese name, "Fantasista Dieci", is the Italian word for "Striker Ten", reflecting its name origin and [[wikipedia:uniform number|uniform number]] seen in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's English name is based on the [[wikipedia:Playmaker|playmaker]], a soccer player who controls the flow of the team's play, often involved in creating plays and leading to goals through their skills and planning.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[detach]]es an [[Xyz Material]] to [[activate]] its effect, it is absorbed into its left leg.
  * This monster's video game effect to change all [[face-down]] [[Defense Position]] monsters to [[face-up]] [[Attack Position]] when [[Special Summon]]ed is based on the effect of "[[Stadium of Dreams]]", a [[Field Spell Card]] that was used alongside this monster in {{episode|ZEXAL|027|ref}}.
