title: Card Trivia:Kaiser Sea Horse
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck: Kaiba Evolution]]'', and is also one of the cover cards of ''[[Structure Deck: Kaiba]]'' and the box of ''[[Duelist Legacy Volume.4]]''.
  * This monster appears in the artwork of "[[Convert Contact]]".
  * The word "Kaiser" in this monster's name is the German word for "emperor".
  * This monster is based on the [[wikipedia:Seahorse|seahorse]], a small fish with segmented bony armor.
  ** One of the Japanese names for seahorses is "''kaiba''", (海馬), referencing [[Seto Kaiba]], who used [[Kaiser Sea Horse (anime)|this monster]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]].
  *** Another Japanese name for the seahorse is "''tatsu-no-otoshigo''" (竜の落とし子), which translates to "dragon's illegitimate child" due to their resemblance to the [[wikipedia:Japanese dragon|Japanese dragon]]. This reflects how Seto Kaiba is the adopted son of [[Gozaburo Kaiba]], as well as how the former often used this monster as two [[Tribute]]s to [[Tribute Summon]] "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" in the anime.
  *** This monster's [[Chinese]] names ([[Traditional Chinese|Traditional]]: 帝王海馬 / [[Simplified Chinese|Simplified]]: 帝王海马) are both a pun on ''Hai Ma'', the Chinese pronunciation of Kaiba's name, as well as "emperor seahorse" and "imperial seahorse", respectively.
  * This monster has three [[counterpart]]s.
  ** A visual counterpart: "[[Sea Serpent Warrior of Darkness]]"
  ** A [[DARK]] [[Zombie]] counterpart: "[[Double Coston]]", which has the same [[original ATK and DEF]] (1700/1650).
  ** A "[[Blue-Eyes]]"-themed retrained counterpart: "[[Neo Kaiser Sea Horse]]"
  * This is the first [[LIGHT]] [[Sea Serpent]] monster in the ''[[OCG]]''/''[[TCG]]''.
  * This is the first [[Double Tributer]] to be released in ''OCG''/''TCG''.
