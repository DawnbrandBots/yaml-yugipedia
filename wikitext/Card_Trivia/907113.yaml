title: Card Trivia:Intruder Alarm - Yellow Alert
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect to prevent opponents' monsters from attacking other monsters except for the [[Special Summon]]ed monster is based on its appearance in {{chapter|R|006|ref}} where [[Kirk Dixon]] used [[Intruder Alarm - Yellow Alert (manga)|this card]] to Special Summon "[[Caterpillar Tank]]", causing the attack of [[Dark Yugi (manga)|Dark Yugi's]] "[[Dark Magician Girl (manga)|Dark Magician Girl]]" to be redirected to "Caterpillar Tank".
  ** This effect, combined with the ''OCG''/''TCG'' effect of "[[Powered Crawler]]" (the English name of "Caterpillar Tank") to force opponents' monsters to attack if able, ensures that if "Powered Crawler" is Special Summoned during the an opponent's monster attacks, that monster is forced to attack "Powered Crawler". 
  *** In the ''OCG''/''TCG'', without these effects, Special Summoning a monster during the [[Battle Step]] while an opponent's monster is attacking would cause a [[replay]], during which the attacking monster could [[target]] a different monster (if not for this card's effect) or choose to stop attacking (if not for the effect of "Powered Crawler").
