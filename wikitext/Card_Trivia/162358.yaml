title: Card Trivia:Tribe-Shocking Virus
wikitext: |-
  {{Navigation}}

  * This card shares a similar name with, and has the same Attribute and DEF as "[[Tribe-Infecting Virus]]".
  * This card is one of only five monsters to be both [[Thunder]]-Type and [[WATER]]-Attribute, and the only one that is an [[Effect Monster]].
