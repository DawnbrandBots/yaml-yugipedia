title: Card Trivia:Nekroz of Metaltron
wikitext: |-
  {{Navigation}}

  * This monster is "[[Nekroz of Sophia]]" ("[[Dance Princess of the Nekroz]]") wearing armor based on "[[Zefra Metaltron]]".
  ** This is the first "Nekroz" Ritual Monster to be a different [[Type]] from the wearer ([[Wyrm]] instead of [[Spellcaster]]).
  * This is the first "Nekroz" Ritual Monster to not have a self-discard effect, likely because of being a [[Pendulum Monster]], where it has a [[Pendulum Effect]] instead.
  ** It is the first Pendulum Monster to be a part of a [[Duel Terminal]] theme that is neither a "[[Qli]]" monster nor a "[[Zefra]]" monster. As a Ritual Monster, it is also the first hybrid Pendulum Monster to be a part of the Duel Terminal lore.
  * This is the first Wyrm [[Ritual Monster]].
