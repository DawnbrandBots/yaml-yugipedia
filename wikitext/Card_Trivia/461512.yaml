title: Card Trivia:Abyss Actor - Leading Lady
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abyss Actor's Injury]]", "[[Abyss Actors Back Stage]]", "[[Abyss Actors' Curtain Call]]", "[[Abyss Actors' Dress Rehearsal]]", "[[Abyss Improv]]", "[[Abyss Playhouse - Fantastic Theater]]", "[[Abyss Script - Romantic Terror]]", "[[Set Rotation]]", and "[[Stand In]]".
  * The doll form of "[[Abyss Actor - Evil Heel]]" appears in the background of this card's artwork.
  * This card's name is based on the [[wikipedia:Leading lady|leading lady]], a term used in [[wikipedia:acting|acting]] to describe the [[wikipedia:leading actor|leading actress]], either as the [[wikipedia:protagonist|protagonist]] or as the love interest of the leading actor.
  * This card has the longest single [[Pendulum Effect]] of any [[Pendulum Monster]] in the English ''[[TCG]]'', with 65 words. By character count, however, it is tied with "[[D/D/D Oblivion King Abyss Ragnarok]]" for longest Pendulum Effect, with 353 each.
