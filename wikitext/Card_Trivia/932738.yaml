title: Card Trivia:Emperor Charles the Great
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Charlemagne#Cultural_impact|Charlemagne]], the legendary knight and emperor from the [[wikipedia:Matter of France|Matter of France]].
  ** This is supported by the fact that this card requires "[[Infernoble Knight Emperor Charles]]" who is also based on Charlemange as a material.
  * This card currently has the highest [[ATK]] (3000) of all [[Link 1 Monster Cards]].
