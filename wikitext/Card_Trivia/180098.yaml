title: Card Trivia:Wind-Up Carrier Zenmaity
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Wind-Up Arsenal Zenmaioh]]" (forming the hips and legs) and "[[Ghost Salvage]]".
  * Two "[[Wind-Up Bat]]s" and a "[[Wind-Up Snail]]" appear in this card's artwork.
  * This card's effect of [[Special Summon]]ing "[[Wind-Up]]" monsters from the [[hand]] or [[Deck]] is a reference to how [[wikipedia:Jet aircraft|jets]] take off on [[wikipedia:Aircraft carrier|aircraft carriers]]. This is also reflected by the two carriers on each side of this monster.
  * This monster's appearance is similar to "[[Dark Flattop]]", as they are both aircraft carriers.
  * This card's name is a pun on "Zenmai", the Japanese name of the "Wind-Up" [[archetype]], and "mighty".
  ** This card's ''[[OCG]]'' name "Zenmaighty", was changed into "Zenmaity" for the ''[[TCG]]'' release, regardless of existing wordplay, in a reference to [[wikipedia:Piracy|pirates]].
  * This monster is a [[wikipedia:Naval warfare|naval war]] [[wikipedia:Vehicle|vehicle]], an aircraft carrier. This mirrors the other "Wind-Up" [[Xyz Monster]]s "[[Wind-Up Zenmaister]]" and "[[Wind-Up Zenmaines|Zenmaines]]", which are an [[wikipedia:Aerial warfare|aerial war]] vehicle and [[wikipedia:Ground warfare|land war]] vehicle, respectively. The boss monster, "[[Wind-Up Arsenal Zenmaioh]]", can be viewed as the general instead.
  * This monster resembles "[[Submersible Carrier Aero Shark]]" in a [[wikipedia:Toy|toy]] form. This card also has the same [[Rank]] and [[Attribute]] as "Aero Shark".
  * This card was the first Xyz Monster to become [[Limited]], and eventually [[Forbidden]].
  ** It is also the first Xyz Monster to be on the Forbidden & Limited Lists.
  ** It is also the first "Wind-Up" monster to become Forbidden, and one of the two "Wind-Up" monsters to become Limited, the other being "[[Wind-Up Magician]]".
