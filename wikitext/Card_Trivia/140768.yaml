title: Card Trivia:Dark Magic Curtain
wikitext: |-
  {{Navigation}}

  * This card's Japanese artwork depicts an inverted pentagram, a symbol used by dark magic practitioners that can attract demons and evil, which reflects this card's effect to [[Special Summon]] "[[Dark Magician]]" from the [[Deck]].
  * This card's Japanese name, "Black Magic Curtain" (黒魔術のカーテン, ''Kuromajutsu no Kāten''), is similar to the Japanese name of "[[Curtain of the Dark Ones]]" (黒魔族のカーテン, ''Kuromazoku no Kāten''), with only one different kanji.
  * This card has a ''[[Rush Duel]]'' [[counterpart]]: "[[Magic Curtain]]".
  ** This card also has a ''Rush Duel'' [[Monster Card]] counterpart: "[[Dark Magician's Curtain]]".
  * This card has a [[retrained]] counterpart: "[[Dark Magical Curtain]]".
