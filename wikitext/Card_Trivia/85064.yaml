title: Card Trivia:Appropriate
wikitext: |-
  {{Navigation}}

  * This card's activation requirement and effect are the inverse of those of "[[Forced Requisition]]".
  ** Both cards are [[Continuous Trap Card]]s that debuted in the same product, ''[[Pharaoh's Servant]]'' (''[[Curse of Anubis (set)|Curse of Anubis]]'' in Japan).
  * The men in this card's artwork also appear in the artwork of "[[Michizure]]".
  * In context of this card's Japanese name (translated as "Taking Advantage"), this card's ''[[TCG]]'' name is likely the verb form of the word "appropriate," meaning "to take (something) for one's own use, typically without the owner's permission."
