title: Card Trivia:NEYMAR JR (Normal)
wikitext: |-
  {{Navigation}}

  * In the full trailer for the "Yu-Gi-Oh! × eFootball™" collaboration campaign, this monster is depicted as a fusion of "[[Dark Magician]]" and [[wikipedia:Neymar|Neymar Jr]], with the latter having activated "[[Polymerization]]" to fuse them together.[https://www.youtube.com/watch?v=E6t2NgFsYw0]
  * Visually, this monster's outfit is based on a combination of those of "[[Black Luster Soldier]]", "[[Dark Magician]]", and "[[Gaia The Fierce Knight]]", which are all monsters are used by [[Yami Yugi]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]] and [[Yu-Gi-Oh! (manga)|manga]].
  ** For "Dark Magician": This monster has the same design of layered shoulder pads as "Dark Magician" does, and its [[flavor text]] is based on that of "Dark Magician".
  *** Additionally, in the full trailer for the "Yu-Gi-Oh! × eFootball™" collaboration campaign, Neymar Jr is shown holding the rod of "Dark Magician" (colored blue-and-yellow, with an eFootball™-themed soccer ball as its orb), and attacks by having the rod fly above him and drop the enlarged soccer ball at his feet for him to kick.
  ** For "Gaia The Fierce Knight": This monster has the same red-colored metal prongs on his shoulders and at his elbows that "Gaia The Fierce Knight" does.
  ** For "Black Luster Soldier": This monster has the same blue-and-yellow color scheme as "Black Luster Soldier" does, as well as the same pyramid-like projection on the front of his chest.
