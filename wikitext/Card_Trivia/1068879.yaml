title: Card Trivia:Azamina Mu Rcielago
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Azamina Debtors]]" and "[[Guilt of the Sinful Spoils]]".
  ** A silhouette of this monster appears in the artwork of "[[Deception of the Sinful Spoils]]".
  * This monster's name is based on ''murciélago'', the Spanish word for "bat".
  * This monster is an [[Card evolutions|upgraded]] "[[Azamina]]" form of "[[Rucia of the White Forest]]".
  * This monster has two [[counterpart]]s:
  ** "[[White Forest]]" [[Synchro Monster|Synchro]]: "[[Rciela, Sinister Soul of the White Forest]]".
  *** Both are depicted with mirrored poses.
  *** Both have opposite [[Attribute]]s ([[DARK]] and [[LIGHT]]).
  *** Both share the same [[Level]] (6).
  *** Both share the same [[original ATK]] (2000).
  ** "[[Sinful Spoils]]" [[Spell Card]]: "[[Sinful Spoils of Doom - Rciela]]".
  *** Both cards have the kanji ''shi'' (死, lit. "death") in their Japanese names.
  * This monster has the same [[original DEF]] of "[[Silvera, Wolf Tamer of the White Forest]]".
  ** Conversely, "[[Azamina Ilia Silvia]]" has the same original DEF of "Rciela, Sinister Soul of the White Forest".
