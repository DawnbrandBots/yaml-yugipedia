title: Card Trivia:Attribute Gravity
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Command Knight]]", "[[Hiita the Fire Charmer]]", and the orb from the artwork of "[[Gravity Bind]]" appear in this card's artwork.
  ** This card's artwork reflects its effect to force monsters of the same [[Attribute]] to battle each other, as "Command Knight" and "Hiita" are both [[FIRE]] monsters and are depicted being pulled towards the gravitational orb.
  ** This is the only card unrelated to the "[[Charmer]]" [[archetype]] to feature a member of that archetype in its artwork.
