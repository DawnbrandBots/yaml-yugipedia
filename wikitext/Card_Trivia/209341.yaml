title: Card Trivia:Queen Dragun Djinn
wikitext: |-
  {{Navigation}}

  * This monster is a [[Card evolutions|merged]] form of "[[Lady of D.]]" with "[[Divine Dragon Apocralyph]]".
  ** This card is the female [[Xyz Monster|Xyz]] [[counterpart]] of "[[King Dragun]]".
  *** Both cards have the kanji ''Ryūmajin'' (竜魔人) in their Japanese names.
  *** Both have mirrored poses in their card artworks.
  *** The [[Fusion Material]]s of "King Dragun" ("[[Lord of D.]]" + "[[Divine Dragon Ragnarok]]") are both [[Level]] 4 monsters, so they can also be used as [[Xyz Material]]s to [[Xyz Summon]] this card.
  *** This card can prevent [[Dragon]] monsters from being [[destroy]]ed by battle and Special Summons Level 5 or higher Dragon monsters from the [[Graveyard]], while "King Dragun" can prevent Dragon monsters from being [[target]]ed by the opponent's card effects and Special Summons 1 Dragon monster from the [[hand]].
  *** Both cards were also initially released as [[Super Rare]]s in the ''[[TCG]]''; however, this card was instead printed as a [[Rare]] in ''Galactic Overlord'' in the ''[[OCG]]'', while "King Dragun" was printed as an [[Ultimate Rare]].
