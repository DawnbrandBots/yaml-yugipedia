title: Card Trivia:Gust
wikitext: |-
  {{Navigation}}

  * The [[Rush Duel]] version of this card appears in the artwork of the Rush Duel version of "[[Card Destruction]]".
  * This card has a [[counterpart]] with the same effect that works when [[Trap Card|Traps]], rather than [[Spells]] are destroyed: "[[Driving Snow]]".
  ** Coincidentally, both cards were used by [[Crump]] in the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
