title: Card Trivia:Reverse Trap
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Amanojaku's Curse", refers to the [[wikipedia:Amanojaku|amanojaku]], a demon in Japanese folklore which appears in this card's artwork.
  ** This card's effect to reverse the addition or subtractions to a monster's [[ATK]]/[[DEF]] references the lore of amanojaku, where it can provoke a person's darkest desires and will constantly lie or claim the opposite.
  * The smile of the amanojaku in this card's artwork is depicted on the book in the artwork of "[[Abyss Script - Shadow Spirit]]".
  ** In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, after "Abyss Script - Shadow Spirit" was activated, "[[Abyss Actor - Superstar (anime)|Abyss Actor - Superstar]]" took on the appearance of the same amanojaku.
