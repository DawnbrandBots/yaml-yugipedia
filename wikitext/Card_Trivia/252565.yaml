title: Card Trivia:Oopsword
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name, "Otto! Ri Gatana" is a double pun. It can be literally translated to "Oops! A Sword!". However, reading everything together, it forms "Ottorigatana", which means "a sudden action". Also, "Otori" means "decoy", hence, "Otori Gatana" = "Decoy Sword", which fits the card's effect - a [[Warrior]] (represented by a "sword") who serves as a decoy for an opponent's effect.
