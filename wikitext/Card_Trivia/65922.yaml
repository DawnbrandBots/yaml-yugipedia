title: Card Trivia:Advanced Dark
wikitext: |-
  {{Navigation}}

  * "[[Rainbow Dark Dragon]]" appears in this card's artwork.
  ** "[[Advanced Crystal Beast Amber Mammoth]]", "[[Advanced Crystal Beast Amethyst Cat]]", "[[Advanced Crystal Beast Cobalt Eagle]]", "[[Advanced Crystal Beast Emerald Tortoise]]", "[[Advanced Crystal Beast Ruby Carbuncle]]", "[[Advanced Crystal Beast Sapphire Pegasus]]", and "[[Advanced Crystal Beast Topaz Tiger]]" appear in this card's ''[[OCG]]''/''[[TCG]]'' artwork.
  * This card has a [[Skill Card]] counterpart: "[[Consumed By Darkness]]".
  * This card's first ''OCG''/''TCG'' effect to change the [[Attribute]]s of the "[[Crystal Beast]]" monsters on the [[field]] to [[DARK]] is an alteration of this card's anime effect to switch a "Crystal Beast" monster on the [[field]] with an "[[Advanced Crystal Beast]]" monster with the same name. In the ''[[Yu-Gi-Oh! GX]]'' anime, the "Advanced Crystal Beast" monsters are the darker counterparts of the "Crystal Beast" monsters, who were used to Summon "Rainbow Dark Dragon". 
  ** This card's ''OCG''/''TCG'' Attribute-changing effect also applies to the "Crystal Beast" monsters in the [[Graveyard]]. This was designed to fulfill the [[Summoning condition]] of "Rainbow Dark Dragon", which requires it to [[banish]] seven DARK monsters from the Graveyard, the same original number of monsters in the "Crystal Beast" and "Advanced Crystal Beast" [[archetype]]s.
  * After being featured in ''Yu-Gi-Oh! GX'', this card and "[[Miracle Contact]]" were released to the ''OCG''/''TCG'' two generations later (after ''[[Yu-Gi-Oh! 5D's]]'' and during ''[[Yu-Gi-Oh! ZEXAL]]'').
