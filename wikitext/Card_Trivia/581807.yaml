title: Card Trivia:Double Headed Anger Knuckle
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on the "[[wikipedia:FM H-10-44|FM H-10-44]]", a [[wikipedia:Switcher|yard switcher]] locomotive designed to assemble and/or disassemble trains by moving individual railcars.
  ** The above-mentioned fact reflects this monster's effect, which "disassembles" a monster from the [[hand]] or [[field]] to the [[Graveyard]] in order to "assemble" a new [[Train]] monster from the Graveyard.
  * This monster's name references the railroad terms "[[wikipedia:Double heading|double heading]]" (the use of two locomotives at the front of a train) and "[[wikipedia:Railway coupling|knuckle coupling]]" (a mechanism used to connect railway vehicles to form a locomotive).
  ** "Double Headed" reflects the two [[Machine]] monsters required as [[Link Material]], while "Anger Knuckle" reflects its "angry" appearance and [[Special Summon]]ing effects.
  *** The first syllables in the Japanese name of "Anger Knuckle" ('''ア'''ンガー・'''ナ'''ックル, '''''A'''ngā '''Na'''kkuru'') spells out the name "Anna" (アナ), referencing [[Anna Kaboom]], who uses a [[Train]] [[Deck]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
