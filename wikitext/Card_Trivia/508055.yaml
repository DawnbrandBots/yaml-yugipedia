title: Card Trivia:Gold Sarcophagus
wikitext: |-
  {{Navigation}}

  * The box in this card's artwork is the same box that contained the [[Millennium Puzzle]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  ** The box in this card's artwork is also similar to the [[wikipedia:Ark of the Covenant|Ark of the Covenant]], a sacred religious artifact depicted as a golden chest with an ornamental lid featuring two winged figures facing each other at its ends. According to Jewish lore, the Ark of the Covenant is purported to contain the [[wikipedia:Ten Commandments|Ten Commandments]].
  * This card has a [[retrained]] counterpart: "[[Shining Sarcophagus]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Gold Sarcophagus]]".
  * The design of the ''[[2019 Gold Sarcophagus Tin]]'' is based on this card.
  * This is the only reprinted [[Secret Rare]] card in ''[[Hidden Summoners]]''.
  * In ''[[Yu-Gi-Oh! Master Duel]]'', when this card is [[activate]]d, it features a special animation where it will appear onscreen and the lid opens up.
  * This card's Spanish name, "Cofre de Oro Sellado" (meaning "Sealed Gold Chest") is a translation of its Japanese name "''Fūin no Ōgonhitsu''" (封印の黄金櫃), probably due to a translation of this card in different video games.
