title: Card Trivia:Sky Galloping Gaia the Dragon Champion
wikitext: |-
  {{Navigation}}

  * This monster is a [[Card evolutions|retrained]] [[counterpart]] of "[[Gaia the Dragon Champion]]".
  ** Visually, this monster is a retrained counterpart of "[[Gaia The Fierce Knight]]" riding "[[Curse of Dragonfire]]".
  ** This monster's name may be a reference to "[[Charging Gaia the Fierce Knight]]", whose Japanese name is "Galloping Gaia the Fierce Knight" and is identical in appearance to "Gaia the Fierce Knight".
  * The German version of this card refers to a monster called "Gaia, Ritter des Dunklen <u>Waldes</u>" ("Gaia, Knight of the Dark Forest") which does not exist. The actual German name of "[[Swift Gaia the Fierce Knight]]" is "Gaia, zorniger Ritter des Dunklen <u>Windes</u>".
