title: Card Trivia:Backup Warrior
wikitext: |-
  {{Navigation}}

  * This monster resemble's appearance is based on a soldier from the [[wikipedia:United States Army|United States Army]].
  * This is the only card released ''[[Battle Pack: Epic Dawn]]'' that does not appear in any other set ("[[Gem-Knight Pearl]]" was the only other card that also first appeared in that set, but it was also later released in ''[[Hidden Arsenal 6: Omega Xyz]]'').
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to restrict the player from [[Synchro Summon]]ing the turn it was [[Special Summon]]ed is based on its appearance in {{episode|5D's|073|ref}} where [[Yusei Fudo]] does not perform a Synchro Summon during the same turn he Special Summoned this monster via its effect.
