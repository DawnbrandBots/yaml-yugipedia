title: Card Trivia:Applizard
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Accoundra Burns Rage]]" and "[[Site Preview]]" (as a silhouette).
  * This monster is named after an [[wikipedia:Application software|application]], a computer software that helps users complete tasks for personal, educational, or business purposes.
  ** Fittingly, this monster is depicted and described in its [[flavor text]] using [[wikipedia:Tablet computer|tablet computers]] as swords and shields, which makes extensive usage of applications.
