title: Card Trivia:Satellarknight Capella
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Capella|Capella]], which is the brightest star in the constellation [[wikipedia:Auriga|Auriga]].
  ** The constellation Auriga appears in the artwork of this card, with Capella's location in said constellation denoted by an encircled star.
  ** [[wikipedia:Rigel|Rigel]], [[wikipedia:Aldebaran|Aldebaran]], Capella, [[wikipedia:Pollux|Pollux]], [[wikipedia:Procyon|Procyon]] and [[wikipedia:Sirius|Sirius]] collectively form the [[wikipedia:Asterism (astronomy)|asterism]] known as the [[wikipedia:Winter Hexagon|Winter Hexagon]].
