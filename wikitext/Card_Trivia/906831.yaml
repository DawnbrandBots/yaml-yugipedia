title: Card Trivia:Steel Strike Dragon Metagias
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Fierce Thunder Storm!!]]''.
  * This monster appears in the artwork of "[[Steel Force]]".
  * The background of this card's artwork features seven stars, and this monster features seven blue orbs on its body, including both of its eyes, referencing this card's [[Level]] and the title of its debut series ''[[Yu-Gi-Oh! SEVENS]]''.
  ** These features are shared with its counterparts, "[[Multistrike Dragon Dragias]]" and "[[Illusion Strike Dragon Miragias]]", both of which also debuted in the ''Yu-Gi-Oh! SEVENS'' anime.
