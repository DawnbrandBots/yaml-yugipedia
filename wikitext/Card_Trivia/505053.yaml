title: Card Trivia:The Law of the Normal
wikitext: |-
  {{Navigation}}

  * "[[Gigobyte]]", "[[Haniwa]]", "[[Mokey Mokey]]", "[[Mushroom Man]]", and "[[Petit Dragon]]" appear in this card's artwork.
  ** The events depicted in this card's artwork are likely continued in the artwork of "[[The Revenge of the Normal]]", "[[The Return to the Normal]]", and "[[The Toil of the Normal]]".
  * This card's Japanese name is a pun on 「{{Ruby|弱|じゃく}}{{Ruby|肉|にく}}{{Ruby|強|きょう}}{{Ruby|食|しょく}}」 (''Jakuniku Kyoushoku''), the Japanese expression for "survival of the fittest". 
  ** This card's English name is a pun on "[[wikipedia:Law of the jungle|the law of the jungle]]", a ruthless system where only the strongest survives.
