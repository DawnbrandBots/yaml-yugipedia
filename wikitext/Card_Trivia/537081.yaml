title: Card Trivia:Rose Spectre of Dunn
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is based on [[4Kids]] co-producer Michele Dunn, who helped bring the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime to North America.
  * This monster has a [[recolored counterpart|recolored]] [[Normal Monster]] [[counterpart]]: "[[Arlownay]]".
  * Unusually, this monster uses the British English spelling of the word "Spectre", whereas most cards in the ''TCG'' (including "[[Shadow Specter]]" and the "[[Majespecter]]" [[archetype]]) are translated into American English.
  * This monster has the longest [[List of cards with the longest OCG to TCG import times|''OCG'' to ''TCG'' import time]] of all [[Extra Deck]] monsters, debuting in the ''TCG'' more than 17 years and 11 months after its first ''[[OCG]]'' debut on September 9, 1999. This is also the last of the fourty-three early arbitrary [[Fusion Monster]]s to become available in the ''TCG''.
