title: Card Trivia:Carrotman
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster, "[[Onionman]]" and "[[Potatoman]]" each make a shape with their gloved hands, resembling the shapes used in the game of [[rock-paper-scissors]]; in this monster's case, it is making the scissors shape.
  ** The members of the "[[Geargiano (archetype)|Geargiano]]" [[archetype]] also use the same shapes in their respective artworks, with the scissors shape being used by "[[Geargiano Mk-II]]".
