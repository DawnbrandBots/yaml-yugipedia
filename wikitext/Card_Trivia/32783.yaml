title: Card Trivia:Dharc the Dark Charmer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Panic Shuffle]]".
  * "[[Meda Bat]]" appears in this card's artwork, serving as this monster's familiar.
  * This monster's name, "Dharc" (ダルク, ''Daruku''), is derived from of the word "dark" (ダーク, ''Dāku'').
  * This monster has two [[Card evolutions|upgraded]] forms:
  ** A "[[Familiar-Possessed]]" form: "[[Familiar-Possessed - Dharc]]".
  ** A [[Link Monster|Link]] [[counterpart]]: "[[Dharc the Dark Charmer, Gloomy]]".
  * This monster and "[[Lyna the Light Charmer]]" are the only "[[Charmer]]" monsters to have handcuffs on their left wrists, suggesting a relationship between them.
  ** This monster was released in ''[[The Duelist Genesis]]'' (the first set of [[Series 6]]), while "Lyna" was released in ''[[The Shining Darkness]]'' (the last set of Series 6).
  ** "Familiar-Possessed - Dharc" can also [[add]] [[LIGHT]] monsters like "Lyna" to the [[hand]], while "[[Familiar-Possessed - Lyna]]" can add [[Spellcaster]] monsters with 1500 [[DEF]] such as "Dharc" to the hand.
  * This is the only male "Charmer" monster, and is referred to with male pronouns in the Japanese version of ''[[Yu-Gi-Oh! 5D's Tag Force 4]]''.
  ** Fittingly, this is the only "Charmer" monster whose design does not feature a pom-pom hanging from their hip, which is consistently present in the designs of the female "Charmer" monsters.
  ** While this card's German, Italian, and Spanish ''[[TCG]]'' prints have correctly translated the word "Charmer" in its name (as "Zauberer", "Ammaliatore", and "Encantador" instead of "Zaubererin", "Ammaliatrice", and "Encantadora", respectively), its French ''TCG'' prints retains the word "Charmeuse", the female-gendered name of the "Charmer" [[archetype]].
