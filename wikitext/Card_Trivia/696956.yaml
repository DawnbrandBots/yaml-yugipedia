title: Card Trivia:Invoked Augoeides
wikitext: |-
  {{Navigation}}

  * This monster appears to be "[[Aleister the Invoker]]" or "[[Crowley, the First Propheseer]]" merged with "[[The Grand Spellbook Tower]]".
  ** This monster’s head is in the shape of the “[[Spellbook]]” crest, and a projection of the crest appears behind it.
  ** The "[[Spellbook]]" letters appear inside this monster's body.
  * This card is named after [[wikipedia:Augoeides|Augoeides]], an obscure term coined by [[wikipedia:Aleister Crowley|Aleister Crowley]] meaning "luminous body" and thought to refer to the planets.
