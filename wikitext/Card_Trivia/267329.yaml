title: Card Trivia:King of the Feral Imps
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Xyz Trip]]".
  * This monster is an upgraded version of "[[Des Feral Imp]]"; both have the same Attribute, Type, Level/Rank, and their Japanese names include "gremlin". "Des Feral Imp" itself is an upgraded version of "[[Feral Imp]]".
  * This monster's Japanese name, "Kingremlin", is a portmanteau of the words "king" and "gremlin". It could also be interpreted as a portmanteau of "kin" (the Japanese word for "gold" or a synonym for "children") and "gremlin", since it is surrounded by tiny, gold-colored gremlins, a significant portion of its body is the color gold, and there are pieces of raw gold in the background.
  * This monster's design is based on the gremlins from the 1984 horror-comedy film, ''[[wikipedia:Gremlins|Gremlins]]'', mostly being a nod to Stripes, the main antagonist of the movie, namely due to its appearance, in which it is the first gremlin to receive the white mane.
  ** This monster's effect to [[add]] a [[Reptile]] monster from the [[Deck]] to the [[hand]] may also be a reference to the ability of the gremlins depicted in the titular film, in which they will multiply when they get wet.
