title: Card Trivia:Sonic Tracker
wikitext: |-
  {{Navigation}}

  * The goggles and a picture of "[[Sonic Bird]]", as well as blueprints of the jetpack of "[[Transonic Bird]]", appear in this card's artwork.
  * According to ''[[The Valuable Book EX 2 card storylines#One who Exists Beyond the Speed of Sound|The Valuable Book EX 2 card storylines]]'', the ring added to the jetpack in the newer version of the blueprints was inspired by "[[Simorgh]]".
