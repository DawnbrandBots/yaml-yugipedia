title: Card Trivia:Frightfur Daredevil
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Frightfur Change of Memory]]".
  * This monster is named after a "daredevil", a person who enjoys doing dangerous things and takes risks. Its design is also a pun on its name, as its appearance features the physical traits associated with the [[wikipedia:Devil|Devil]], including horns, bat-like wings, a pitchfork, and a red-and-black color scheme.
  ** This monster's name reflects how in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, its owner, [[Sora Shiunin (manga)| Sora Shiunin]], rigged his first [[Action Duel]] against [[Yuya Sakaki (manga)|Yuya Sakaki]] to inflict three times the normal amount of pain.
  * This is the [[signature card]] of Sora Shiunin in the ''Yu-Gi-Oh! ARC-V'' manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|009|ref}}, specifically from the panel showing [[Frightfur Daredevil (manga)|this monster]] being Summoned, albeit holding a pitchfork.
