title: Card Trivia:Neo Galaxy-Eyes Photon Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Galactic Overlord]]''.
  * This monster appears in the artwork of "[[Galaxy Dragon Maelstrom]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Galaxy-Eyes Photon Dragon]]".
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card was created with the power of the [[Barian World]].
  *** Fittingly, unlike most "[[Photon]]" monsters, this monster's body has a red color-scheme.
  *** This monster's [[wikipedia:bident|bident]]-like sealed form is also similar to the [[Barian Emblem]].
  * This card is the [[Barian World]] [[counterpart]] of "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]".
  * This card has 3 counterparts.
  ** A "[[Tachyon Dragon]]" counterpart: "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]".
  ** A "[[Cipher]]" counterpart: "[[Neo Galaxy-Eyes Cipher Dragon]]".
  ** A [[signature move]] counterpart: "[[Neo Galaxy-Eyes Photon Dragon - Photon Howling]]".
  * This card is the "[[Galaxy-Eyes]]" counterpart of "[[Blue-Eyes Ultimate Dragon]]".
  ** Both have the same [[Attribute]], [[Type]], and [[ATK]].
  ** Both require 3 [[Level]] 8 monsters as [[material]]s for their [[Summon]].
  ** Both are three-headed upgraded forms of the [[ace monster]]s of the rivals in the anime: [[Kite Tenjo]]'s "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]" for this card and [[Seto Kaiba]]'s "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" for "Blue-Eyes Ultimate Dragon".
  ** This card's [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack name]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime was "Ultimate Photon Stream", while the Japanese [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Blue-Eyes Ultimate Dragon" was "Ultimate Burst".
  * This card has the highest ATK of all "[[Photon]]" monsters.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this card was the first [[Xyz Monster]] used by Kite Tenjo to not be a "[[Number]]" monster.
  * In the anime, this card's [[Xyz Summon]] portal was unique and resembled a [[wikipedia:Black hole|black hole]], instead of a red spiral or a [[wikipedia:Galaxy|galaxy]].
  * In the anime, [[Mizar]] referred to this card as a "Number Killer", likely due to its anime effect of negating the the effects of the "Number" monsters, including their effect to prevent themselves from being [[destroyed by battle]] except with a "Number" monster, although this was not mentioned in the English version of the ''Yu-Gi-Oh! ZEXAL'' anime.
