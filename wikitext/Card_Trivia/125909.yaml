title: Card Trivia:Saber Vault
wikitext: |-
  {{Navigation}}

  * Although there are some differences, this card's artwork shows what seems to be the "[[Sword of Sparkles]]" sword used by "[[Commander Gottoms, Swordmaster]]" on a church-like altar.
  * This is the first [[TCG]]-exclusive non-[[monster]] "[[X-Saber]]"-related card to be released.
  * This is the second [[TCG Exclusive]] [[Field Spell Card]], the first being "[[Pseudo Space]]".
