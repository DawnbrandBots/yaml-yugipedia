title: Card Trivia:Genex Power Planner
wikitext: |-
  {{Navigation}}

  * This monster is the [[LIGHT]] [[counterpart]] of "[[R-Genex Oracle]]".
  ** Both monsters are [[Level 1]] [[Spellcaster]] monsters with 300 [[ATK]].
  ** Both monsters' designs feature a spherical head, who are held in place to a large load on their backs.
