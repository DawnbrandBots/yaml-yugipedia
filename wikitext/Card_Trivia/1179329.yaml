title: Card Trivia:Uria, Lord of Searing Flames - Sacred Beast of Cataclysmic 
  Fire
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] counterpart of "[[Uria, Lord of Searing Flames]]".
  ** This monster's pose is based on the pose assumed by "[[Uria, Lord of Searing Flames (Duel Links)|Uria, Lord of Searing Flames]]" during its Summoning cutscene in ''[[Yu-Gi-Oh! Duel Links]]''.
  ** This monster's effect to gain 1000 [[ATK]]/[[DEF]] for each [[Trap Card]] in the [[Graveyard]]s is based on the effect of "[[Uria, Lord of Searing Flames (anime)|Uria, Lord of Searing Flames]]" in the ''[[Yu-Gi-Oh! GX]]'' anime, which gains 1000 ATK/DEF for each Trap Card in the player's Graveyard.
