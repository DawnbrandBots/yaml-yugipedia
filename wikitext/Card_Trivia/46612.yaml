title: Card Trivia:Van'Dalgyon the Dark Dragon Lord
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! R]]'' special chapter "[[Summon The Dark Ruler!!]]", this card is the rival of "[[Tualatin]]".
  ** This is evidenced by the fact that both cards are [[Level 8]] [[Effect Monster]]s with 2800 [[ATK]] and 2500 [[DEF]], but they also have opposing [[Attribute]]s, with this card being a [[DARK]] monster and "Tualatin" being a [[LIGHT]] monster. Lastly, both cards' [[effect]]s allow them to [[Special Summon]] themselves in certain conditions.
  * This card is similar to "[[Voltanis the Adjudicator]]", as both have 2800 ATK, feature effects that Special Summon themselves when a [[Counter Trap Card]] is successfully activated (though this card's effect is only activated when Counter Trap Cards negate the activation of an opponent's card), and both have an additional effect once Summoned to the [[field]] in this way.
