title: Card Trivia:Invoked Sorath
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Invocation "Sword"]]".
  * This monster is based on Sorath, the evil spirit of the [[wikipedia:Sun|Sun]], whose name in [[wikipedia:Thelema|Thelemic]] numerology adds up to 666, the [[wikipedia:Number of the beast|number of the beast]], alongside the Hebrew spelling of [[wikipedia:Aleister Crowley|Aleister Crowley's]] name.
