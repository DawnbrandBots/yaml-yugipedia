title: Card Trivia:Danger! Feets of Strength!
wikitext: |-
  {{Navigation}}

  * "[[Danger! Bigfoot!]]" appears in this card's artwork.
  * This card's name is a pun on the [[wikipedia:Homophone|homophones]] "[[wikipedia:Foot|feet]]" (plural of "foot" and a reference to "Bigfoot" in the card artwork) and "[[wiktionary:feat|feat]]" (meaning "a difficult accomplishment").
