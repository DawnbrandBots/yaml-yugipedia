title: Card Trivia:Waking the Dragon
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" and "[[Sinister Serpent]]" appear in this card's artwork.
  ** The same backyard that appears in the artwork of "[[That Grass Looks Greener]]" also appears in this card's artwork.
  * This card's Japanese name, "Stirring Up The Snake's Nest" (やぶ{{Ruby|蛇|へび}}, ''Yabuhebi''), is based on the saying "stirring up the hornet's nest", which means to create, provoke, or trigger a dangerous, troublesome, or complicated situation, which is reflected in this card's effect to [[Special Summon]] a monster from the [[Deck]] or [[Extra Deck]] when this [[Set]]  card in its [[owner]]'s [[control]] has left the [[field]] because of an opponent's effect.
