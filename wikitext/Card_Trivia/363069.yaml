title: Card Trivia:Sacrifice Level-Up
wikitext: |-
  {{Navigation}}

  * The crest featured on [[Kyoji Yagumo]]'s clothing (this card's owner in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga) appears in this card's artwork.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect preventing the [[Special Summon]]ed [[Xyz Monster]] from attacking this turn is based on a scene in {{chapter|ZEXAL|044|ref}} where Kyoji Yagumo used this card to Special Summon "[[No. 84: Pain Gainer (manga)|No. 84: Pain Gainer]]" on the first turn of the Duel, which prevents the turn player from attacking with monsters.
