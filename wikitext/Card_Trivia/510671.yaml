title: Card Trivia:Dark Eradicator Warlock
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Spellcaster's Judgment]]''.
  * This monster appears in the artwork of "[[Magical Blast]]".
  * This card is a counterpart of "[[Dark Magician]]".
  ** This monster has a [[retrain]]ed ''[[Rush Duel]]'' counterpart: "[[Dark Eradicator Sorcerer]]".
  * Oddly enough, this card includes the Kanji "執行官" which can be translated to "executor", but also the furigana "エクスキューショナー" which is a transcription for "executioner".
