title: Card Trivia:Gagagarevenge
wikitext: |-
  {{Navigation}}

  * This card is the "[[Gagaga]]" version of "[[Premature Burial]]".
  * "[[Gagaga Magician]]" appears to be emerging from a coffin in the artwork of this card.
  ** This artwork resembled "[[Dark Renewal]]".
  * In the anime, when "Gagagarevenge" is activated, it shows itself as a wand (with similar looks as "[[Bound Wand]]" or "[[Wonder Wand]]") being grabbed by a "Gagaga" monster as that monster pulls itself out of the Graveyard. However, this card's artwork does not seems to show any wand at all.
  ** The ATK-increasing effect of "Gagagarevenge" in the anime also involves the use of the wand.
