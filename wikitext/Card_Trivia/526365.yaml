title: Card Trivia:Gergonne's End
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Gergonne point|Gergonne point]], the term used to describe the three touch points of a circle within a triangle where the vertexes created by those touch points intersect within the same circle.
  ** Fittingly, this card's artwork depicts a circular black hole within the golden triangle. Also, in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, this card was used in conjunction with "[[Tindangle Acute Cerberus (anime)|Tindangle Acute Cerberus]]", whose name and [[Link Arrow]] positioning are based on an [[wikipedia:Acute triangle|acute triangle]].
