title: Card Trivia:Danger! Nessie!
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Loch Ness Monster|Loch Ness Monster]].
  * This monster appears in the artworks of "[[Danger! Zone]]", "[[Second Expedition into Danger!]]", and "[[Danger! Disturbance! Disorder!]]".
  ** A sketch of this monster appears in the artwork of "[[Danger! Response Team]]".
