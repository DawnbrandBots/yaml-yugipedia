title: Card Trivia:Seahorse Carrier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hydration]]".
  * This monster is a ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] to "[[Tatsunootoshigo]]", whose translated name is "Sea Horse".
  ** This monster's Japanese name, アッシーホース ''Asshīhōsu'' is a portmanteau of the Japanese words アッシー and "sea horse" (シーホース ''shīhōsu''). An アッシー君 (''asshī-kun'', from 足 "foot/leg")) is a man who offers free rides to a woman he likes, in contrast to a [[Seahorse Server|メッシー君]] (''messhī-kun'') who offers free meals.
