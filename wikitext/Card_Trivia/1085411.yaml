title: Card Trivia:Materiactor Critical
wikitext: |-
  {{Navigation}}

  * "[[Materiactor Exagard]]" appears in this card's artwork.
  * This card's name and artwork are based on [[wikipedia:Critical mass|critical mass]], the minimum mass for a fissile material to start a [[wikipedia:Nuclear chain reaction|nuclear chain reaction]].
  ** This card depicts a blue light emitting from "Exagard's" mouth, resembling the [[wikipedia:Cherenkov radiation|Cherenkov radiation]] caused by a criticality event.
  ** In addition, this card may also references the [[wikipedia:Demon Core|Demon Core]] criticality accident, in which the Canadian-American physicist [[wikipedia:Louis Slotin|Louis Slotin]] compared the experiment which would ultimately killed him as "tickling the dragon's tail". "Exagard's" mouth is holding the glowing blue energy ball, resembling the two neutron reflectors enclosing the plutonium core involved in the experiment.
