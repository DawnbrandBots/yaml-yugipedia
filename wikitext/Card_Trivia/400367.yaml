title: Card Trivia:Amorphage Lysis
wikitext: |-
  {{Navigation}}

  * "[[Amorphage Wrath]]" and "[[Amorphage Pride]]" appear in this card's artwork.
  * The suffix ''-lysis'' refers to the breakdown of [[wikipedia:cell membrane|cell membranes]], which can occur as a result of a [[wikipedia:virus|virus]] - hence this card's name, as the above monsters appear to be dissolving at the cellular level.
