title: Card Trivia:Performapal Curtain Call
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Performapal Cheermole]]", "[[Performapal Hip Hippo]]", [[Performapal Kaleidoscorp]]", "[[Performapal Sword Fish]]", "[[Performapal Turn Toad]]", and "[[Performapal Whip Snake]]" appear in this card's artwork.
  * This card's Japanese name, "End Roll" (エンドロール ''Endorōru''), is the ''[[wikipedia:Wasei-eigo|waseigo]]'' word "endroll", referring to the [[wikipedia:Closing credits|ending credits roll]] of a television show or film.
