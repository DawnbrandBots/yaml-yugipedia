title: Card Trivia:Dogmatika Ecclesia, the Virtuous
wikitext: |-
  {{Navigation}}
  [[File:DogmatikaEcclesiatheVirtuous-ConceptArt.png|thumb|right|250|Concept art.]]
  * This monster appears in the artworks of "[[Brigrand the Glory Dragon]]", "[[Dogmatika Encounter]]", "[[Dogmatikacism]]", "[[Nadir Servant]]", "[[The Fallen & The Virtuous]]", "[[The Dragon that Devours the Dogma]]", "[[The Virtuous Vestals]]", "[[Tri-Brigade Stand-Off]]", "[[Tri-Brigade Revolt]]", and "[[Tri-Brigade Oath]]".
  ** "[[Dogmatika Nation]]" appears in this card's second artwork.
  * This monster is named after [[wikipedia:Christian Church|ecclesia]] (Greek: ἐκκλησία, ''ekklēsia''), the Greek and Latin name of the Christian Church.
  * According to its first concept art, this monster is noted to eat a lot of meals.
  * According to the concept art of "[[The Iris Swordsoul]]", this monster idolizes "[[Dogmatika Fleurdelis, the Knighted]]" and served as her squire for ten years before the events of the "Abyss" storyline.
  * According to the "Abyss" storyline, this monster becomes "[[Incredible Ecclesia, the Virtuous]]" after defecting from the "[[Dogmatika Nation]]".
  ** According to the storyline, "[[White Relic of Dogmatika]]" becomes this monster's successor as the "saint" of the "Dogmatika Nation", which is depicted in the artwork of "[[Dogmatika Genesis]]".
  ** Also, in the storyline, after the death of "[[The Iris Swordsoul]]" (who is "Dogmatika Fleurdelis" without her armor on), this monster is corrupted into "[[Blazing Cartesia, the Virtuous]]", which is depicted in the artwork of "[[Branded in Central Dogmatika]]".
  * This card's alternate artwork is taken from {{episode|CARD GAME THE CHRONICLES|3|ref}}, specifically from the scene where [[Ecclesia]] recalls the promise she made with [[Fleurdelis]].
