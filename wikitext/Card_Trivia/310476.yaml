title: Card Trivia:Oasis of Dragon Souls
wikitext: |-
  {{Navigation}}

  * This card is similar to "[[Call of the Haunted]]", but it Special Summons a monster in face-up Defense Position, treats it as a [[Wyrm]]-[[Type]], and is destroyed when the target leaves the field any way possible, not exclusively destruction.
  * This card has a similar name to "[[Castle of Dragon Souls]]" and "[[Waterfall of Dragon Souls]]".
