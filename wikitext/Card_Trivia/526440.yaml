title: Card Trivia:Dark Magician the Dragon Knight
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Legendary Dragon Decks]]''.
  * This monster is a [[Fusion Monster|Fusion]] of "[[Dark Magician]]" and "[[The Eye of Timaeus]]".
  * This monster has another "Dark Magician"-based [[counterpart]]: "[[Amulet Dragon]]".
  * This monster has a "[[Dark Magician Girl]]"-based counterpart: "[[Dark Magician Girl the Dragon Knight]]"
  * This monster has the highest [[original ATK and DEF]] (3000/2500) of the "[[Dark Magician (archetype)|Dark Magician]]" [[archetype]].
  * This is the first "The Eye of Timaeus"-based Fusion Monster that does not feature a [[Nomi]] [[Summoning condition]].
  ** This is also the first "Dark Magician" [[Special Summon monster]] that is not classified as Nomi.
