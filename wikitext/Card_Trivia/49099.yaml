title: Card Trivia:Descending Lost Star
wikitext: |-
  {{Navigation}}

  * "[[Ally of Justice Catastor]]" appears in this card's artwork.
  * This card's name, "Descending Lost Star", reflects the fact that the [[Synchro Monster]] [[Special Summon]]ed by this card's effect loses 1 [[Level]], which is represented by a Level Star.
  * This card's effect in the [[Unlimited Edition]] of ''[[Crimson Crisis]]'' and ''[[Duelist Pack: Yusei 2]]'' print contains a grammatical error: the text states "and '''it's''' DEF becomes 0.", while it should state "and '''its''' DEF becomes 0.".
