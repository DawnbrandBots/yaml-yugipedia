title: Card Trivia:Garmr of the Nordic Beasts
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Garmr|Garmr]], a blood-stained dog associated with [[wikipedia:Ragnarök|Ragnarök]] in [[wikipedia:Norse mythology|Norse mythology]].
  * This monster shares the following distinctions with the "[[Nordic Beast]]" [[archetype]].
  ** This is the only "Nordic Beast" monster not based on a hoofed animal.
  ** This is the only "Nordic Beasts" monster whose effect has nothing to do with [[Special Summon]]ing.
