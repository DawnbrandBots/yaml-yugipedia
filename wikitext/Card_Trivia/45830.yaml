title: Card Trivia:Tyrant Wing
wikitext: |-
  {{Navigation}}

  * "[[Tyrant Burst Dragon]]" appears in this card's artwork.
  * This card is based on "[[Tyrant Dragon]]", in terms of name, appearance, and effect.
  * This is the only card used as [[Fusion Material]] for a "[[Legendary Dragon]]" [[Fusion Monster]] in the [[Yu-Gi-Oh! (anime)|anime]] to be released in the ''[[OCG]]''/''[[TCG]]'' at the same time as its corresponding Fusion Monster.
