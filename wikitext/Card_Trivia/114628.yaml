title: Card Trivia:Planet Alignment
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card references the astronomical phenomenon of [[wikipedia:Syzygy (astronomy)|syzygy]], where at least three planets are in mutual conjunction or opposition, and as displayed are in conjunction.  A curiosity in astronomical terms, conjunctions are considered in astrology to be the most powerful aspect and a significant intensifier of the planetary characteristics affected, while an opposition is the second most powerful and represents conflict and confrontation between the planetary characteristics affected.
