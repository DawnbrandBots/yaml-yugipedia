title: Card Trivia:Armed Dragon Catapult Cannon
wikitext: |-
  {{Navigation}}

  * This monster is a [[Fusion Monster|Fusion]] of "[[Armed Dragon LV7]]" and "[[VWXYZ-Dragon Catapult Cannon]]", the two [[signature card]]s used by [[Chazz Princeton]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This monster has arguably the longest process for [[Fusion Summon]]ing: one of its [[Fusion Material]]s is a Fusion Monster that requires two other Fusion Monsters Summoned with a total of five monsters, while the other Fusion Material is a [[Nomi]] "[[LV]]" monster (although one can Summon "[[Armed Dragon Thunder LV7]]" to fulfill the latter's requirement as long as it is not [[Special Summon]]ed [[face-down]] as its only Summoning in the Duel.)
