title: Card Trivia:Striker Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the box of ''[[Premium Pack Vol.14 2nd Wave]]''.
  * This card is named after a ''striker'', a type of [[wikipedia:Firing pin|firing pin]].
  ** Fittingly, a striker is present on the end of this monster's tail.
  * The curved pieces of metal on this monster's head and shoulders are based on [[wikipedia:Hammer (firearms)|gun hammers]], specifically ones from [[wikipedia:Revolver|revolvers]].
