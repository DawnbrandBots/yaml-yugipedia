title: Card Trivia:Berserk Scales
wikitext: |-
  {{Navigation}}

  * This card's effect is likely a downgraded version of "[[Ego Boost]]".
  ** Both cards are [[Quick-Play Spell Card]]s that feature a smaller-sized being (e.g. this card, a small white butterfly, and "Ego Boost", a chibi hero) that "transforms" into something larger and much more daunting.
