title: Card Trivia:Morphtronic Vacuumen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[MDT - Morphtronic Double Team]]".
  * This monster is based on a vacuum cleaner.
  ** This card is the first "[[Morphtronic]]" monster to not have its [[Defense Position]] form depicted in the background of its card artwork.
  *** However, in {{episode|5D's|078|ref}}, this monster was summoned in its Defense Position form.
  ** This card's Defense Position effect of equipping an opponent's [[Attack Position]] monster is a reference to how a real-life vacuum cleaner works, which can suck up dirt from surfaces.
  * This card, along with "[[Drill Synchron]]", "[[Drill Warrior]]", "[[Splendid Rose]]", "[[Chaos King Archfiend]]", and "[[Bird of Roses]]" were made into anime cards as a result of the ''[[Yu-Gi-Oh! 5D's]]'' Draw Contest, as seen in the previews of [[Yu-Gi-Oh! 5D's - Episode 074|episode 74]], [[Yu-Gi-Oh! 5D's - Episode 075|episode 75]], [[Yu-Gi-Oh! 5D's - Episode 076|episode 76]], [[Yu-Gi-Oh! 5D's - Episode 077|episode 77]] and [[Yu-Gi-Oh! 5D's - Episode 078|episode 78]] of the  anime.
