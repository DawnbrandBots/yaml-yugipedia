title: Card Trivia:Red-Eyes Burn
wikitext: |-
  {{Navigation}}

  * "[[Red-Eyes Black Dragon]]" appears on this card's artwork.
  * This card is similar to "[[Cosmic Blast]]". Both cards inflict damage equal to the ATK of either "Red Eyes Black Dragon's" or any Dragon-Type Synchro monster when that monster is destroyed or leaves the field.
  ** It is also similar to the effect of "[[Inferno Fire Blast]]", as both cards inflict damage equal to the [[original ATK]] of a "[[Red-Eyes]]" monster.
  *** Both cards are also used by [[Atticus Rhodes]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
