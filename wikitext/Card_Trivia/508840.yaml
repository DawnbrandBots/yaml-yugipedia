title: Card Trivia:Brron, Mad King of Dark World
wikitext: |-
  {{Navigation|other=[[Brron, Mad King of Dark World (character)|Character]]}}

  * This monster appears in the artworks of "[[Charge Into a Dark World]]" and "[[The Gates of Dark World]]".
  * This monster's name is the "[[Dark World]]" color pun for the color [[wikipedia:Bronze|bronze]].
  ** In [[wikipedia:Sino-Xenic pronunciation|Sino-Xenic]] vocabulary, bronze is called "blue copper" (青铜/青銅/靑銅), which explains this monster's bluish appearance.
  ** Additionally, this monster's Chinese name, 青銅隆, is a combination of 青銅 ("bronze"; literally "blue copper") and 隆 ''lóng'' ([[wikipedia:Transcription into Chinese characters|a transcription]] of ロン ''ron'' as in its Japanese name ブ'''ロン''' ''Bu'''ron''''').
  * While the flavor text of "[[Zure, Knight of Dark World]]" hints that the "Dark World" monsters are not intended to be evil, this monster may be the exception due to his psychotic nature, hence its title as "Mad King". This is supported by his [[Brron, Mad King of Dark World (character)|role]] in the ''[[Yu-Gi-Oh! GX]]'' anime as an antagonist.
  ** Also, in the anime, "Brron" is portrayed as the sole ruler of the Dark World, with "[[Goldd, Wu-Lord of Dark World|Goldd]]" and "[[Sillva, Warlord of Dark World|Sillva]]" serving as his subordinates; however, [[Master Guide 2 card storylines|Master Guide 2]] indicates that "Brron" is subordinate to "Goldd" and "[[Reign-Beaux, Overlord of Dark World|Reign-Beaux]]"; who himself is lesser than "[[Grapha, Dragon Lord of Dark World|Grapha]]" in the hierarchy, per ''[[Yu-Gi-Oh! Master Duel]]''.
  *** This is supported by the colors of the monsters' names: Bronze ("Brron") < Silver ("Sillva") < Gold ("Goldd") < Platinum ("Latinum") < All colors/Rainbow ("Reign-Beaux") < Black/Grey ("Grapha").
