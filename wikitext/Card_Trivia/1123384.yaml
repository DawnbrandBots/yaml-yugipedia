title: Card Trivia:Light Water Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster is a younger form of "[[Water Dragon]]".
  ** This monster's [[Level]] (4) and [[original ATK and DEF]] (1400/1300) are half those of "Water Dragon".
  ** This monster is named after [[wikipedia:Deuterium-depleted water|light water]], a variation of water with a lower concentration of naturally abundant [[wikipedia:Deuterium|deuterium]], a stable isotope of [[wikipedia:Hydrogen|hydrogen]] with approximately twice the mass than the usual isotope.
