title: Card Trivia:Jerry Beans Man
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Card Rotator]]", "[[Defenders Intersect]]", "[[Scrum Force]]", and "[[Mamemaki]]".
  * This monster is a [[wikipedia:Jelly bean|jelly bean]]. Its name contains a pun on the name "Jerry" and the word "jelly". In Japanese, the two words have the same pronunciation.
  ** The card is named after a Konami manager, called Jerry.<ref>{{cite web|url=https://www.pojo.biz/board/showpost.php?p=17841235&postcount=5|title= Card name mistranslations that irritate you; post #5|author=[[Kevin Tewart]]|publisher=pojo.biz|date=May 10, 2010}}</ref><ref>{{cite web|url=https://www.pojo.biz/board/showpost.php?p=17841418&postcount=19|title= Card name mistranslations that irritate you; post #19|author=[[Kevin Tewart]]|publisher=pojo.biz|date=May 10, 2010}}</ref><ref>{{cite web|url=http://duelistgroundz.com/index.php?showtopic=151736&p=3443964|title=At konami headquarters now. Any questions for the employees?|publisher=DuelistGroundz|author=Knight of the Abyss|date=March 31, 2013}}</ref>
  * This monster has the highest [[ATK]] of all [[Level]] 3 [[Normal Monster]]s.
  * Despite holding a shield, this card has 0 [[DEF]].

