title: Card Trivia:Destiny HERO - Drawhand
wikitext: |-
  {{Navigation}}

  * This monster's name and [[wikipedia:Finger gun|finger gun]] hand gesture are based on a [[wikipedia:Pistol duel|pistol duel]], a competitive shooting sports using [[wikipedia:Duelling pistol|duelling pistols]] that was prominently featured in late 18th and 19th century England, keeping in relation with the European theme of the "[[Destiny HERO]]" [[archetype]].
  ** In a pistol duel, after a given signal, both participants were to draw their weapons and fire a single shot at their opponent. This monster's effect reflects this, as the given signal is this monster's [[Special Summon]]ing, and each player [[draw]]s a card instead of a pistol.
