title: Card Trivia:Metamorphosis
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to [[wikipedia:Metamorphosis|metamorphosis]], a change of the form or nature of a thing or person into a completely different one, by natural or supernatural means.
  * This card's effect is similar to a [[Transformation Summon]], specifically, it resembles "[[Mask Change]]" or "[[Form Change]]", a [[Quick-Play Spell Card]]s with a similar requirement, but that [[Special Summon]] a "[[Masked HERO]]" Fusion Monsters.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Metamorphosis]]".
  * This card has a counterpart in "[[Mutamorphosis]]".
  ** Both cards feature similar artwork. Additionally, the card's Japanese name, "Mutamorphosis", references the artwork of "Metamorphosis."
  ** The effect of "Mutamorphosis" is an inversion of "Metamorphosis" in terms of the [[Tributes for Special Summon|Tributed monster for cost]] and [[Special Summons from your Extra Deck|resulting Special Summon]], with an added detail in that its effect allows use of [[Synchro Monster|Synchro Monsters]] as well as Fusion Monsters.
  * This is the second card to go from [[Semi-Limited]] to [[Forbidden]], after "[[Makyura the Destructor]]" in [[March 2005 Lists|March 2005]].
