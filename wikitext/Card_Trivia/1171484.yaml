title: Card Trivia:Hungry Special Coupon
wikitext: |-
  {{Navigation}}

  * This card is an [[Card evolutions|upgraded]] counterpart of "[[Hungry Coupon]]".
  ** The black-bun hamburger depicted on the ticket in this card's artwork is a reference to the [[wikipedia:Kuro Burger|Kuro Burger]], a type of hamburger made with black ingredients due to its preparation recipe, which is only available at [[wikipedia:Burger King|Burger King]] fast food restaurants in Japan. This, in turn, is a reference to the alternate artwork of "[[Hungreed Burger]]", which is based on the Kuro Burger itself.
