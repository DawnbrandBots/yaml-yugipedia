title: 'Card Trivia:Number C73: Abyss Supra Splash'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Collectors Pack: Duelist of Legend Version]]''.
  * This monster is an [[Card evolutions|upgraded]] "[[Number C]]" form of "[[Number 73: Abyss Splash]]".
  ** "Supra" is based on the Latin for "above", reflecting how this monster is a more powerful version of "Abyss Splash" in terms of [[ATK]] and effect surpassing an opponent's monster's ATK.
  ** This monster's appearance (specifically its purple color scheme) represents [[Nash]]'s rebirth from a human king into a [[Barian Emperor]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** Unlike "Abyss Splash", which requires [[WATER]] monsters as [[Xyz Material]]s, this monster requires generic materials for its normal [[Xyz Summon]].
  * This monster is tied with "[[Number 39: Utopia Beyond]]" for the highest [[original ATK]] (3000) of all [[Rank 6]] [[Xyz Monster]]s.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this monster and "[[Number C39: Utopia Ray V (anime)|Number C39: Utopia Ray V]]" are the only [[Ranked-Up]] "[[Number C]]" monsters that feature no effect related to their base "[[Number]]", and the only Ranked-Up "Number C" monsters that do not gain an effect when [[Xyz Summon]]ed by Ranking-Up said "Numbers".
  * This monster and "[[Number C5: Chaos Chimera Dragon]]" are the first "Number C" monsters to be released in the ''[[TCG]]'' before being released in the ''[[OCG]]''.
  ** Both monsters also debuted in {{episode|ZEXAL|137|ref}} where they [[battle]]d each other.
