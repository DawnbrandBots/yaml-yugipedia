title: 'Card Trivia:Number 94: Crystalzero'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * This is one of the [[cover card]]s of ''[[Duelist Pack: Kastle Siblings]]''.
  * The number "94" appears on the left side of this monster's dress.
  * This card has a "[[Full Armor]]" form, [[equip]]ped with "[[Black Ray Lancer]]": "[[Full Armored Crystalzero Lancer]]".
  * This card has a "[[Shark (archetype)|Shark]]" [[counterpart]]: "[[Crystal Shark]]".
  * "[[Number]]" monsters often take the form reflecting their owners and/or their original desires. In this case, this [[Mythyrian Number]] represents this card's original owner, [[Rio Kastle|Marin]].
  ** This card's Japanese name, "Princess of Polar Ice", reflects how Marin served as the princess of the [[United Lands of the Poseidon Ocean]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This card is a [[counterpart]] to "[[Number 73: Abyss Splash]]", a fellow Mythyrian Number belonging to Marin's brother, [[Reginald Kastle|Nash]].
  *** Both cards share the same [[Attribute]] ([[WATER]]), [[Rank]] (5), and [[Type]] ([[Warrior]]).
  *** Both cards' [[ATK]]-based effects are complete opposites of each other; in this card's case, it halves another monster's ATK.
  **** In {{episode|ZEXAL|109|ref}}, [[Number 94: Crystalzero (anime)|this card]] used its effect to repeatedly halve the ATK of "[[Number 73: Abyss Splash (anime)|Number 73: Abyss Splash]]" and destroy it in battle. This reflects how [[Number 94: Crystalzero (character)|Crystalzero]] was Summoned to counter [[Abyss (character)|Abyss's]] attack on the [[United Lands of the Poseidon Ocean]] while under [[Vector]]'s control.
  * This monster's sealed form resembles a [[wikipedia:Snowflake|snowflake]], reflecting its ice theme.
