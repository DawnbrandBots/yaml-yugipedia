title: Card Trivia:Blazing Chestnut
wikitext: |-
  {{Navigation}}

  * This card's name is based on the idiom "[[wiktionary:tirer les marrons du feu|pull someone’s chestnuts out of the fire]]", which means "to do someone else's difficult work". This idiom originates from the fable [[wikipedia:The Monkey and the Cat|The Monkey and the Cat]] by [[wikipedia:Jean de La Fontaine|Jean de La Fontaine]].
