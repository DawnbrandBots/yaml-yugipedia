title: Card Trivia:Junk Destroyer
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck 2010]]''/''[[Starter Deck: Duelist Toolbox]]''.
  * This monster appears in the artwork of "[[Synchro Emergency]]".
  * This monster's name reflects its effect to [[destroy]] a number of cards based on the number of non-[[Tuner monster]]s used as [[Synchro Material]].
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster [[activate]]s its destruction effect, it charges energy from the blue orbs on its torso, and then releases the energy out of the red orb in the center of its torso.
  * This is the only [[Synchro Monster]] [[target]]ed by the effect of a "[[Meklord]]" monster, but never be [[equip]]ped to it in the anime.
