title: Card Trivia:Cloudian - Sheep Cloud
wikitext: |-
  {{Navigation}}

  * "[[Cloudian Token]]s" appear in this card's artwork.
  * This monster is based on the [[wikipedia:Cumulus cloud|cumulus clouds]], a low-altitude cloud formation which is often described as fluffy in appearance.
  ** This monster's name and anime effect to [[Special Summon]] "[[Sheep Cloud Token]]s" reflects this, as the cumulus clouds are often described sharing resemblance with sheep.
  ** Coincidentally, in the ''[[Yu-Gi-Oh! GX]]'' anime, [[Adrian Gecko]] [[Tribute]]d four of this monster's "Sheep Cloud Tokens" to [[Tribute Summon]] "[[Cloudian - Nimbusman]]", a monster based on the [[wikipedia:Cumulonimbus cloud|cumulonimbus clouds]]. This is a reference to how cumulonimbus clouds and other clouds are often formed when copious amounts of cumulus clouds band together.
  * This monster shares similarities with "[[Scapegoat]]", as both cards are named after domesticated livestock animals that Special Summon sheep-themed [[Token]]s (with the original Japanese name of the "Cloudian Token" being "[[Sheep Cloud Token]]").
