title: Card Trivia:Destiny HERO - Dreadmaster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[D - Tactics]]" and "[[Over Destiny]]".
  * This monster has a retrained [[Fusion Monster|Fusion]] [[counterpart]]: "[[Destiny HERO - Dreadnought]]".
  * This monster is based on the [[wikipedia:Man in the Iron Mask|Man in the Iron Mask]], an unidentified prisoner who was arrested in the late 17th century and held in various French prisons, keeping in relation with the European theme of the "[[Destiny HERO]]" archetype.
  ** This reflects this card's relationship with "[[Clock Tower Prison]]", with its [[Special Summon]]ing effect reflecting how it can "release" the Man in the Iron Mask from its bonds in prison when [[destroy]]ed.
  ** The above-mentioned facts and this monster's [[ATK]]-gaining effects likely reference [[wikipedia:Quasimodo|Quasimodo]], the deformed main character of ''[[wikipedia:The Hunchback of Notre-Dame|Hunchback of Notre Dame]]'' known for his superhuman strength, who is kept hidden away in the [[wikipedia:Notre-Dame de Paris|Notre Dame]] bell tower.
  * This is the first and currently only "[[HERO]]" monster with both [[? ATK Monster Cards|? ATK]] and [[? DEF Monster Cards|? DEF]].
