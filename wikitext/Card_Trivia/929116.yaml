title: Card Trivia:Hieratic Sky Dragon Overlord of Heliopolis
wikitext: |-
  {{Navigation}}

  * This card's Japanese name comes from the theme of the "[[Hieratic]]" archetype, the [[wikipedia:Ennead|Ennead]], while its English name comes from the Ancient Egyptian city of [[wikipedia:Heliopolis (Ancient Egypt)|Heliopolis]].
  ** It shares this with "[[Hieratic Sun Dragon Overlord of Heliopolis]]", as well as its [[Rank]], [[ATK]], and [[DEF]].
  * This is one of the [[cover card]]s of ''[[Selection 10]]''.
