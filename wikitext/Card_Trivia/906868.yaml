title: Card Trivia:Kimeruler the Dark Raider
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Character Pack - Gavin/Roa/Romin]]''.
  * This monster appears in the artworks of "[[Confronting the Black Dragon]]", "[[Resolve (card)|Resolve]]", "[[Ruler's Current]]", and "[[The Three Dark Rulers]]".
  * This monster's name is a play on "Kimeru" (決める), which means "to decide/choose."
  ** This expression likely refers to "decide" the outcome of a match, reflecting this monster's effect that allows it to possibly deliver a finishing blow.
  ** This monster's international title, "Dark Raider", reflects its effect to "raid" the opponent's [[Life Point]]s by attacking them directly.
