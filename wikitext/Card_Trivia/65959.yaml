title: Card Trivia:Elemental HERO Bladedge
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Deck 2006]]''.
  * This monster appears in the artwork of "[[Edge Hammer]]".
  * This card (with its original anime artwork) appears in the original anime artwork of "[[Montage Dragon (anime)|Montage Dragon]]".
  * This monster is likely based on the [[wikipedia:Marvel Comics|Marvel Comics]] superhero [[wikipedia:Iron Man|Iron Man]].
  * This monster may be the partner of "[[Elemental HERO Neos]]", like "[[Buster Blader]]" is the partner of "[[Dark Magician]]".
  ** Both this card and "Buster Blader" are [[EARTH]] [[Warrior]] monsters with 2600 [[ATK]], while "Elemental HERO Neos" and "Dark Magician" are [[Level]] 7 [[Normal Monster]]s with 2500 ATK.
  * This monster has two [[Fusion Monster|Fusion]] forms.
  ** With "[[Elemental HERO Wildheart]]": "[[Elemental HERO Wildedge]]".
  ** With "[[Elemental HERO Sparkman]]": "[[Elemental HERO Plasma Vice]]".
  * This card has an "[[Evil HERO]]" [[counterpart]]: "[[Evil HERO Malicious Edge]]".
  ** Both have the same [[Attribute]] (EARTH), Level (7), ATK (2600), and [[DEF]] (1800).
  ** Both can inflict [[piercing]] [[battle damage]] to the opponent if they [[attack]] a [[Defense Position]] monster.
  * This card has the highest ATK (2600) of all [[Main Deck]] "[[Elemental HERO]]" monsters.
