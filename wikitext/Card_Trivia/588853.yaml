title: Card Trivia:Mordschlag
wikitext: |-
  {{Navigation}}

  * The soldier in this card's artwork also appears in the artwork of "[[Bashing Shield]]".
  * This card's name and artwork reference [[wikipedia:Mordhau (weaponry)|Mordhau]], a sword-fighting technique which involves holding the sword inverted with the hands gripped on the blade and striking the opponent with the hilt or the pommel.
