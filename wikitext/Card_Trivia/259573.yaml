title: Card Trivia:Night Papilloperative
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s for ''[[Collectors Pack: ZEXAL Version]]''/''[[Number Hunters]]''.
  * This card's ''[[TCG]]'' name, "Night Papilloperative", is a portmanteau of [[wikipedia:Butterfly|"papillon"]] (the French word for "butterfly"), and "[[wikipedia:Espionage|operative]]" (a secret agent who carries out espionage missions).
  * This card is the first [[Xyz Monster]] Summoned by [[Dextra]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime that is not a "[[Photon]]" monster.
