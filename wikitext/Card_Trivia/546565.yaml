title: Card Trivia:Altergeist Kidolga
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Durga|Durga]]" and "[[wikipedia:Keystroke logging|keylogger]]".
  ** Durga is the [[wikipedia:Hinduism|Hindu]] goddess of war and justice, and one of the alternate names of the Hindu mother goddess [[wikipedia:Parvati|Parvati]].
  ** A keystroke logger (or "keylogger") is a computer program specifically designed to record every keystroke made by a computer user to gain illegal access to passwords.
