title: Card Trivia:Skyscraper
wikitext: |-
  {{Navigation}}

  * This city appears in "[[Cross-Dimensional Duel]]", "[[Destruction Chant of the Sacred Beast]]", "[[Dimension Explosion]]", "[[Elemental HERO Captain Gold]]", "[[Elemental HERO Flame Wingman - Infernal Rage]]", "[[Elemental HERO Thunder Giant - Voltic Thunder]]", "[[Favorite HERO Shining Flare Wingman]]", "[[Feather Shot]]", "[[Hero Descent]]", "[[Hero Signal]]", "[[Skydive Scorcher]]", "[[Worm Call]]", and "[[Worm Zero]]".
  ** A color-inverted version of this city appears in the artwork of "[[Pseudo Space]]".
  * This card has an [[Card evolutions|upgraded]] form: "[[Skyscraper 2 - Hero City]]".
  * This card has a "[[Destiny Hero]]" [[counterpart]]: "[[Dark City]]".
  * This city is similar to [[wikipedia:New York City|New York City]], a recurring setting for [[wikipedia:Marvel Comics|Marvel]] comics, keeping in relation with the Western comics design of the "[[Elemental HERO]]" [[archetype]].
  * The five beams of light that appears in this card's artwork are a reference to the original five [[Main Deck]] "Elemental HERO" monsters: "[[Elemental HERO Avian|Avian]]", "[[Elemental HERO Burstinatrix|Burstinatrix]]", "[[Elemental HERO Bubbleman|Bubbleman]]", "[[Elemental HERO Clayman|Clayman]]", and "[[Elemental HERO Sparkman|Sparkman]]".
