title: Card Trivia:B.E.S. Tetran
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Speed Spell - Final Attack]]".
  * This monster is based on the {{wikia|gradius|Tetran}}, a recurring boss from [[Konami|Konami's]] shoot-em-up video game series, ''[[wikipedia:Gradius|Gradius]]'', which first appeared in ''[[wikipedia:Slamander (video game)|Salamander]]''.
