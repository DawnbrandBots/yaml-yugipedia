title: Card Trivia:Performapal Pendulum Art & Clean
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Performapal Gongato]]", "[[Performapal Guitartle]]", "[[Performapal Life Swordsman]]", "[[Performapal Rain Goat]]", "[[Performapal Shieldrummer]]" and "[[Performapal Trump Witch]]" appear in this card's artwork.
  ** Ironically, "Performapal Life Swordsman" and "Performapal Rain Goat" are not valid [[target]]s for this card's effect, as despite their shared [[Level]]s (1), they are not [[Pendulum Monster]]s.
