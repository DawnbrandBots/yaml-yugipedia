title: Card Trivia:Majestic Absorption
wikitext: |-
  {{Navigation}}

  * "[[Majestic Star Dragon]]" and "[[Meklord Emperor Wisel]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|5D's|066|ref}} where [[Yusei Fudo]] uses "[[Majestic Star Dragon (anime)|Majestic Star Dragon]]" against "[[Meklord Emperor Wisel (anime)|Meklord Emperor Wisel]]".
  * All three of this card's bulleted effects are based on effects that "Majestic Star Dragon" copied from an opponent's monster in the anime.
  ** The first effect to [[equip]] an opponent's monsters is based on the effect of "Meklord Emperor Wisel", which equipped itself with Yusei's "[[Stardust Dragon (anime)|Stardust Dragon]]" in the aforementioned episode. Unlike the following two effects, "Majestic Star Dragon" technically didn't copy this exact effect, since "Meklord Emperor Wisel" consists of 5 monsters in the anime and the effect copied was that of "[[Wisel Guard 3 (anime)|Wisel Guard 3]]".
  ** This card's second effect to [[Direct attack|attack directly]] is a reference to the same effect shared by "[[Earthbound Immortal]]" monsters. "Majestic Star Dragon" copied the effects of both "[[Earthbound Immortal Ccapac Apu (anime)|Earthbound Immortal Ccapac Apu]]" and "[[Earthbound Immortal Wiraqocha Rasca (anime)|Earthbound Immortal Wiraqocha Rasca]]" in {{episode|5D's|055|ref}} and {{episode|5D's|064|ref}} respectively.
  ** This card's final effect to inflict [[Effect damage|damage]] to the opponent equal to the destroyed monster's [[original ATK]] is based on "Ccapac Apu's" second effect.

