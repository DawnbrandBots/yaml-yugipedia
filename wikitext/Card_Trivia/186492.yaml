title: Card Trivia:Sunken Kingdom
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on the fictional sunken island of [[wikipedia:Atlantis|Atlantis]], which was introduced in [[wikipedia:Plato|Plato]]'s allegory on the hubris of nations in his works ''[[wikipedia:Timaeus|Timaeus]]'' and ''[[wikipedia:Critias|Critias]]''.
