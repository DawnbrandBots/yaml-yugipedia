title: Card Trivia:Ally of Justice Quarantine
wikitext: |-
  {{Navigation}}

  * The letters "ＡＯＪ" (which is the Japanese abbreviation for "[[Ally of Justice]]") can be seen on the head of the unit closest to the viewer in this card's artwork.
  * In the [[Duel Terminal]] storyline, this monster was one of the later-produced tools created by the "Allies of Justice" to predict where the "[[Worm]]s" would appear in preparation for a final battle; one of these units was able to detect the arrival of "[[Worm Zero]]".
