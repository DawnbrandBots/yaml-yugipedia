title: Card Trivia:Darklord Asmodeus
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Asmodeus|Asmodeus]] is the name of a powerful demon bound to the deserts of Egypt by the archangel Raphael in the [[wikipedia:Book of Tobit|Book of Tobit]], and is sometimes claimed to be the general of the Devil's armies. In demonology, Asmodeus is the demon of lust, one of the seven deadly sins.
  * The combined [[Level]]s and [[original ATK and DEF]] of both the "[[Asmo Token]]" and "[[Deus Token]]" are equal to those of this card.
  ** The names of the Tokens summoned combine into "Asmodeus".
  * This monster appears in the artwork of "[[Darklord Descent]]".
  ** This is ironic, as this card cannot be summoned via "Darklord Descent"
