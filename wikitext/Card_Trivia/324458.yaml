title: Card Trivia:D/D Lilith
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Lilith|Lilith]] is a Jewish mythological figure who was later considered to be [[wikipedia:Adam|Adam]]'s first wife, abandoning him for [[wikipedia:demon|demons]] and becoming a demoness herself, seducing men in a way akin to that of [[wikipedia:succubus|succubi]].
  ** Unlike "[[Infernoid Devyaty]]" and "[[El Shaddoll Anoyatyllis]]", two other cards based on Lilith which were changed to remove her name from their ''[[TCG]]'' names, this card kept its Japanese name in the TCG.
  ** "D/D Lilith" also retains her name in the English dub of the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * In the ''Yu-Gi-Oh! ARC-V'' anime, this is the first monster to be used as [[Fusion Material]], [[Synchro Material]] and [[Xyz Material]].
