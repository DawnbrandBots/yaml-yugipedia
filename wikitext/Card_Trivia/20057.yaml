title: Card Trivia:Ninja Grandmaster Sasuke
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ninjitsu Art of Decoy]]".
  * This monster is based on Sasuke, the robot ninja from the Konami video game series, ''[[wikipedia:Ganbare Goemon|Ganbare Goemon]]''.
  * This monster has a [[counterpart]]: "[[Ninja Grandmaster Hanzo]]".
  ** The have the same naming scheme: "Ninja Grandmaster" (忍者マスター, ''Ninja Masutā'') followed by a proper name made of English alphabetical characters also in Japanese.
  ** They have the same [[original ATK and DEF]] (1800/1000).
  ** They have opposing [[Attribute]]s ([[LIGHT]] and [[DARK]] respectively).
