title: Card Trivia:Master Hyperion
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Lost Sanctuary]]''/''[[Lost Sanctuary Structure Deck]]''.
  * The [[wikipedia:Solar System|Solar System]] appears in this card's artwork (although only the six planets known in antiquity are depicted).
  * This monster is based on the [[wikipedia:Sun|Sun]] and [[wikipedia:Hyperion (Titan)|Hyperion]], the titan of light in [[wikipedia:Greek mythology|Greek mythology]].
  ** In Greek mythology, Hyperion is the father of [[wikipedia:Helios|Helios]], the god of the Sun. In [[wikipedia:Homer|Homer]]'s ''[[wikipedia:Iliad|Iliad]]'', the sun god is referred to as Hyperion, although otherwise the two are always distinguished.
  ** Hyperion was also referenced as an Astrology student in ''[[Yu-Gi-Oh! GX]]''.{{citation needed}}
  * This card has a [[DARK]] [[counterpart]]: "[[Majesty Hyperion]]".
  ** Both cards have opposite [[ATK]] and [[DEF]]: this card has 2700 ATK and 2100 DEF, while "Majesty Hyperion" has 2100 ATK and 2700 DEF.
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form, combined with "Majesty Hyperion": "[[Masterflare Hyperion]]".
