title: 'Card Trivia:Number 33: Chronomaly Machu Mech'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * "[[Number 36: Chronomaly Chateau Huyuk]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Number 6: Chronomaly Atlandis]]".
  * The number "33" appears on the bottom pillar connecting with the city.
  * This monster is based on [[wikipedia:Machu Picchu|Machu Picchu]], an ancient Incan citadel located in [[wikipedia:Peru|Peru]].
  ** This monster is a floating city, while Machu Picchu was built high up in the [[wikipedia:mountain|mountains]] above [[wikipedia:sea level|sea level]] (ironically, the uppermost city part of this monster does '''not''' look like Machu Picchu to any extent, instead it looks more akin to a Spanish city itself).
  ** This monster features a symbol of the [[wikipedia:Antikythera mechanism|Antikythera mechanism]] or the [[wikipedia:Sun cross|solar cross]] etched into its facade.
  * The background in this card's artwork looks similar to "[[Photon World]]" as seen in ''[[Yu-Gi-Oh! ZEXAL]]'' episodes [[Yu-Gi-Oh! ZEXAL - Episode 042|42]] and [[Yu-Gi-Oh! ZEXAL - Episode 043|43]], where the former episode features the first appearance of this monster.
  * This is the first "[[Number]]" monster that did not feature a sealed form in the anime.
  * This is the only "Number" owned by the Arclight siblings that never achieved a "[[Number C]]" form in the anime.
  * In the anime, when this monster [[detach]]es an [[Xyz Material]], it absorbs it with its uppermost pillar, and then several cannons appear around its ring.
  * In the anime, this monster, "[[Number 15: Gimmick Puppet Giant Grinder (anime)|Number 15: Gimmick Puppet Giant Grinder]]" and "[[Number 40: Gimmick Puppet of Strings (anime)|Number 40: Gimmick Puppet of Strings]]", were the first "Number" monsters that [[Astral]] or [[Kite Tenjo]] did not obtain despite defeating [[Trey|their]] [[Quattro|owners]] in a [[Duel]], due to the power of their owners' [[crest]]s.
  * In the English dubbed version of the anime, this monster shares its [[attack name]] with "[[Elemental HERO Magma Neos]]": "Meteor Meltdown".
