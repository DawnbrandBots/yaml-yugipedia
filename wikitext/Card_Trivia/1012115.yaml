title: Card Trivia:Prayers of the Voiceless Voice
wikitext: |-
  {{Navigation}}

  * "[[Lo, the Prayers of the Voiceless Voice]]" and "[[Saffira, Dragon Queen of the Voiceless Voice]]" appear in this card's artwork.
  * This card's artwork references the famous ''"Are you my Master?"'' scene from ''[[wikipedia:Fate/stay night|Fate/Stay Night]]'' where the main protagonist, Shirou Emiya, first encounters Saber after he accidentally summons her.
  * This is the first [[Ritual Spell Card]] that lists three [[Ritual Monster]]s in its text.
