title: Card Trivia:Black-Winged Assault Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Darkwing Blast]]''.
  * This monster appears in the artwork of "[[Black Feather Whirlwind]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Black-Winged Dragon]]".
  ** This monster's orange-tinted hair and feathers are a reference to the hair color of [[Crow Hogan]], the [[Signer]] who used "[[Black-Winged Dragon (anime)|Black-Winged Dragon]]" in the ''Yu-Gi-Oh! 5D's'' anime.
  ** "Assault" likely refers to the "[[Assault Blackwing]]" [[archetype]], which was used by [[Crow Hogan (ARC-V)|Crow Hogan]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster parallels the upgraded form of [[Yusei Fudo]]'s "[[Stardust Dragon]]", "[[Shooting Star Dragon]]", since both share the same [[Level]] (10) and require the use of [[Tuner Synchro Monster]]s for its [[Synchro Summon]]; however, this monster is not an [[Accel Synchro Monster]] due to it not necessarily requiring a non-Tuner Synchro Monster for its Synchro Summon.
  * This is the first [[Synchro Monster]] that can be [[Special Summon]]ed from the [[Extra Deck]] with both a Synchro Summon and an alternate [[Summoning condition]].
