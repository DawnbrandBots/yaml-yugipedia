title: Card Trivia:Fool of Prophecy
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Fool (Tarot card)|The Fool]], of the [[wikipedia:Major Arcana|Major Arcana]] and is numbered 0, 22, or unnumbered depending on the Tarot deck.
  ** This card's Japanese, Korean, and Chinese names are taken from the French name for "The Fool": ''Le Mat''.
  * According to the [[Master Guide 4 card storylines#File No. 04: The Wisdom of the Latest Magical Research, and the Fate of One Boy|''Master Guide 4'' card storylines]], this monster becomes corrupted by the power of "[[Spellbook of the Master]]", and transforms into "[[Reaper of Prophecy]]".
  * This monster is wielding a [[wikipedia:Khakkhara|khakkhara]], a staff typically carried by Buddhist monks.
