title: Card Trivia:Gouki Suprex
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gouki Re-Match]]" and "[[Gouki Roar]]".
  * This monster is named after the [[wikipedia:suplex|suplex]], a technique in [[wikipedia:Professional wrestling|professional wrestling]] which involves lifting an opponent and throwing them on their back.
  ** This monster's Japanese name (スープレックス, ''Sūpurekkusu'') is a wordplay on "suplex" and "rex" (レックス, ''Rekkusu''), which is commonly used for the name of the ''[[wikipedia:Tyrannosaurus|Tyrannosaurus rex]]'', which this monster's design is based on.
  * This monster has a [[retrained]] [[Tuner monster|Tuner]] counterpart: "[[Gouki Machine Suprex]]".
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this monster's projection is missing part of its tail between its legs.
