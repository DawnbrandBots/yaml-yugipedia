title: Card Trivia:Royal Straight Slasher
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Animation Chronicle 2022]]''.
  * This monster is based on a [[wikipedia:List of poker hands|royal straight flush]], a type of straight flush (a poker hand containing five cards of sequential rank, all of the same suit) in the order of an ace, a King, a Queen, a Jack, and a ten, with ace being the highest rank.
  ** This monster's [[Summoning condition]] requiring "[[Royal Straight]]" and its own effect's [[cost]] ([[send]]ing monsters from the [[hand]] and/or [[Deck]] to the [[Graveyard]] with consecutive [[Level]]s from 1 to 5) reference the "steel wheel", a five-high straight flush in the order of a five, a four, a three, a two, and an ace. Furthermore, this monster's [[original ATK and DEF]] features the numbers 1-5 in a "steel wheel" ('''24'''00/'''135'''0).
  * This is the last monster used by [[Yami Yugi]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime to be released in the ''[[OCG]]''/''[[TCG]]''.
