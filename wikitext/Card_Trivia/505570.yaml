title: Card Trivia:Labyrinth Wall
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Labyrinth|Labyrinth]], an elaborate maze-like structure in [[wikipedia:Greek mythology|Greek mythology]] which was constructed by [[wikipedia:Minos|King Minos of Crete]] and designed by the architect [[wikipedia:Daedalus|Daedalus]] to contain the [[wikipedia:Minotaur|Minotaur]].
  * This monster has a [[retrained]] counterpart: "[[Labyrinth Wall Shadow]]".
  * This monster is tied with "[[Legendary Dueling Field]]" and "[[Millennium Shield]]" for the highest [[original DEF]] (3000) of all [[Level 5]] monsters.
