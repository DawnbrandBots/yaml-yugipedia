title: Card Trivia:Doom Virus Dragon
wikitext: |-
  {{Navigation}}

  * This monster's effect is based on that of "[[Crush Card Virus]]" before its [[erratum]].
  * This is the first "[[The Fang of Critias]]" [[Fusion Monster]], as well as the first overall "[[Legendary Dragon]]" Fusion Monster, to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** It is also the only "The Fang of Critias" Fusion Monster whose [[Level]] is not 8.
