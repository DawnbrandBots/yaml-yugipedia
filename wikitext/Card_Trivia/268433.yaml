title: Card Trivia:Baby Raccoon Tantan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Raccoon Reversal]]".
  * This monster references the [[wikipedia:Japanese mythology|Japanese legend]] of the ''[[wikipedia:Tanuki-bayashi|tanuki-bayashi]]'', in which the sound of [[wikipedia:Drum|drum]]s can be heard out of nowhere in the middle of the night. Some variations on the legend purport that the ''[[wikipedia:Bake-danuki|bake-danuki]]'' was the source of the sound.
  ** This monster's name references the sound effect made when beating a ''[[Wikipedia:Taiko|taiko]]'' (a large Japanese drum, which is used by this monster), and the sound a ''[[wikipedia:Japanese raccoon dog|tanuki]]'' makes by beating on their belly for a drum (''tan tan'').
  * The leafy designs in the background of this card's artwork references the legend of the ''bake-danuki'', in which they use leaves to shapeshift.
