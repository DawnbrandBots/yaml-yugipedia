title: Card Trivia:Pandora's Jewelry Box
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Pandora's box|Pandora's box]].
  * The blue and red jewels the monster has its tongue wrapped around represent [[Pendulum Scale]]s.
  * The box that the monster is hiding within somewhat resembles the box pictured in "[[Dark Mimic LV3]]", another card with an effect of letting its controller draw an extra card under certain circumstances.
