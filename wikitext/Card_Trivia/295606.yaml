title: Card Trivia:Humpty Grumpty
wikitext: |-
  {{Navigation}}

  * This monster is based on the classic nursery rhyme character [[wikipedia:Humpty Dumpty|Humpty Dumpty]], a character typically represented as an anthropomorphic egg who falls from a wall and shatters (hence why it has 0 defense). This monster's [[Zombie]]-[[Type]] implies that it may be a resurrected Humpty Dumpty after his fall.
  * This monster is very similar to the "[[Ghostrick]]" monsters; specifically, it is a [[Level]] 3 [[DARK]] Zombie-Type monster that has the same effect to flip itself face-down [[Defense Position]] once per turn. All "Ghostrick" monsters are DARK, and all "Ghostrick" Zombie-Type monsters have the archetype characteristic of being [[Level]] 3 (the exception being "[[Ghostrick Alucard]]", as it is [[Rank]] 3 instead).
  * This monster slightly resembles "[[Ojama King]]," having a similar round white body and exaggerated, garish facial features.
