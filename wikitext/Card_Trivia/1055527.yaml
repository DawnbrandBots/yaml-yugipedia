title: Card Trivia:Dicemite Girl Chirori
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dice Kiss]]" and "[[Paradice Summon]]".
  * This monster's Japanese name (チロリ, ''Chirori'') is short for the Japanese name of [[wikipedia:Cee-lo|Cee-lo]] (チンチロリン, ''Chinchirorin''), a gambling game played with three six-sided dice.
  ** Fittingly, this monster's bulleted effects are based on the winning and losing results in the game of craps; rolling a 1 or 2 is a losing throw, rolling a 3 or 4 is an intermediate throw, and rolling a 5 or 6 is a winning throw.
