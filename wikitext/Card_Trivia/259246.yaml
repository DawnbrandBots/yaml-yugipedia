title: Card Trivia:Unsinkable Titanica
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster is based on the ''[[wikipedia:RMS Titanic|Titanic]]'', the name of the British passenger liner ship that previously had a reputation for being an "unsinkable ship", until it [[wikipedia:Sinking of the Titanic|sank on its maiden voyage]] on 15 April, 1912 after striking an iceberg.
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster was paired with the effect of the "[[Iceberg Ocean]]" [[Field Spell Card]], a deliberate contrast to the reference of the iceberg that sunk the ''Titanic''.
  ** Also, in the ''Yu-Gi-Oh! ZEXAL'' anime, this monster was paired with "[[Indestructible Airship Hindenkraft]]", a monster based on the ''[[wikipedia:LZ 129 Hindenburg|Hindenburg]]'', a passenger-carrying airship which became famous for [[wikipedia:Hindenburg disaster|having been destroyed in an accident]].
  *** Both monsters' adjective titles reflects the irony of the real-life passenger-carrying transporters that were destroyed in an infamous disaster.
  * This monster's video game [[Special Summon]]ing effect is based on its first appearance in {{episode|ZEXAL|092|ref}}, when it was Summoned by [[Tribute|Tributing]] two "[[Raft Token]]s".
