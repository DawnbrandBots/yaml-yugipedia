title: Card Trivia:Elfnote Seraphim Strelitzia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Artmage Impasto -Recapture-]]", and "[[Elfnotes: Rhapsodia of Madness]]".
  * This monster is the corrupted [[Synchro Monster|Synchro]] version of "[[Elfnote Lucina]]" after merging with the Grand Spirit which had taken on the power of "[[Elfnote Power Patron]]".
  * This monster is named after the ''[[wikipedia:Strelitzia|Strelitzia]]'', a genus of perennial plants. The genus is also known by the common name "bird of paradise" due to their flowers' resemblance to [[wikipedia:Bird-of-paradise|birds-of-paradise]].
