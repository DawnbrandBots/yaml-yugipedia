title: Card Trivia:T.G. Close
wikitext: |-
  {{Navigation}}

  [[File:Halberd_Cannon_presses_Shooting_Star.png|thumb|250px|"[[T.G. Halberd Cannon (anime)|T.G. Halberd Cannon]]" presses "[[Shooting Star Dragon (anime)|Shooting Star Dragon]]" against the ground.]]

  * "[[Shooting Star Dragon]]" and "[[T.G. Halberd Cannon]]" appear in this card's artwork.
  ** This card's name references the effect name of "[[T.G. Halberd Cannon (anime)|T.G. Halberd Cannon]]", "Close Summon", which negates the effect of an effect that removes an opponent's monster from the [[field]] and reduces its [[ATK]] by 800.
  ** This card's artwork is based on a scene in {{episode|5D's|145|ref}} where "T.G. Halberd Cannon" attacks "[[Shooting Star Dragon (anime)|Shooting Star Dragon]]", to which [[Yusei]] uses the effect of "Shooting Star Dragon" to [[banish]] itself until the [[End Phase]] to [[negate]] the attack. In response, [[Antinomy]] activates the effect of "Halberd Cannon" to negate that activation and reduce "Shooting Star Dragon's" [[ATK]] by 800 and presses it into the ground.

