title: Card Trivia:Propa Gandake
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Tengu|tengu]]'', a type of legendary creature found in [[wikipedia:Japanese folklore|Japanese folklore]], and the [[wikipedia:Amanita pantherina|false blusher]] mushroom, known as 「テングタケ」 (''tengu-take'', "tengu-mushroom") in Japan.
  ** This card's name, "Propa Gandake" (プロパ・ガンダケ ''Puropa Gandake''), is a portmanteau of "[[wikipedia:Propaganda|propaganda]]" (プロパガンダ, ''puropaganda'') and ''gandake'' (ガンダケ), the Japanese name of the [[wikipedia:Blusher|blusher]] mushroom.
