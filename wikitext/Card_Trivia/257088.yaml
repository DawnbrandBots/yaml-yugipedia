title: Card Trivia:Mecha Phantom Beast Dracossack
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Antonov An-225 Mriya|Antonov An-225 Mriya]] also known by the NATO codename "Cossack" and the [[wikipedia:Dragon|dragon]].
  * This monster appears in the artwork of "[[Xyz Override]]".
  * "[[Mecha Phantom Beast Warbluran]]" appears in this card's artwork.
  ** This is a reference to the relationship between the Antonov AN-225 Mriya (Cossack) and the [[wikipedia:Buran (spacecraft)|Buran spacecraft]], of which the former was initially built as a mid-air launch platform of the latter.
