title: Card Trivia:Skull Knight 2
wikitext: |-
  {{Navigation|Skull Knight #2}}

  * Despite its ''[[TCG]]'' name, this monster is not a counterpart of "[[Skull Knight]]".
  ** This monster's Japanese name is "Skull Knight" (スカル・ナイト ''Sukaru Naito''), while the Japanese name of "Skull Knight" is "Skull Bishop" (スカルビショップ ''Sukaru Bishoppu''); both also have different [[Type]]s, [[ATK]], and [[DEF]].
