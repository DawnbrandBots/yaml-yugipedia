title: Card Trivia:Masterking Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Link Short]]".
  * This monster is a [[Card evolutions|retrained]] version of "[[Terrorking Archfiend]]".
  ** This monster's name references the [[wikipedia:perpetual check|perpetual check]], a chess game state where the checking player cannot checkmate and the other one cannot escape the check, thus locking the game indefinitely and forcing a draw.
