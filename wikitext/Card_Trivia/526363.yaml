title: Card Trivia:Morley's Shield
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is named after the [[wikipedia:Morley centers|Morley centers]].
  ** Notably, the green triangle in the center is the Morley triangle of the purple triangle, while the blue lines extending from the corners of the purple triangle to the corners of the green triangle are the angle trisectors of the purple triangle, which are used to determine the Morley triangle of the purple triangle.
