title: Card Trivia:Scarred Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Counterstrike Molt]]" and "[[Synchro Alliance]]".
  * This card's name and appearance reflects its effect to prevent the opponent from targeting other [[Warrior]] monsters you control for an attack, forcing it to endure more battles and "gain" more scars.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|005|ref}}, specifically from the panel showing [[Underworld Dragon Dragonecro (manga)|this monster]] being Summoned.
