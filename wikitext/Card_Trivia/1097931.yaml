title: Card Trivia:Kurikurinku @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located on this monster's tail.
  * This monster is an "@Ignister" [[Effect Monster]] [[counterpart]] of "[[Linkuriboh]]" and "[[Linguriboh]]".
  ** This monster's Japanese name is based on the sound that "Linkuriboh" made in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  *** Its Japanese name (クリクリンク, ''Kurikurinku'') is likely a portmanteau of the words "click" (クリック, ''kurikku'') and "[[Link Monster|Link]]" (リンク, ''Rinku''). 
  ** All three monsters share effects that allow them to [[Special Summon]] themselves from the [[Graveyard]] during the opponent's turn by [[Tribute|Tributing]] a specific monster the player [[control]]s and Tribute themselves to counter the opponent's move.
