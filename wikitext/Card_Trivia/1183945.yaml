title: Card Trivia:Freshberry Collaboration
wikitext: |-
  {{Navigation}}

  * "[[Change of Dessert]]", "[[Frenzied Panda Cotta]]", and "[[Freshberry Happiness]]" appear in this card's artwork.
  ** The events in this card's artwork are the continuation of those depicted in the artwork of "[[Bye-Bye Strawberries]]": "Change of Dessert" and "Frenzied Panda Cotta" decide to take away "Freshberry Happiness" from [[Freshberry Garden|its home]].
  ** This card's name and artwork emphasize that it is a collaboration between monsters belonging to two different [[series]]: "[[Freshberry]]" and "[[Bubble Era]]".
  *** This monster's [[Level]] is the combination of the Levels of the three monsters that appear in the card's artwork: "Change of Dessert" (1), "Frenzied Panda Cotta" (3), and "Freshberry Happiness" (1).
