title: Card Trivia:Dinomorphia Kentregina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dinomorphia Brute]]", "[[Dinomorphia Domain]]", "[[Dinomorphia Frenzy]]", and "[[Dinomorphia Reversion]]".
  * This card's name is a portmanteau of ''[[wikipedia:Kentrosaurus|Kentrosaurus]]'' and ''regina'' ("queen" in Latin).
  * This card has the highest [[ATK]] of all:
  ** [[Dinosaur]] [[monster]]s
  ** [[Level]] 8 or lower [[Fusion Monster]]s
  ** Level 6 or lower monsters
