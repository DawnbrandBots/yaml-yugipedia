title: Card Trivia:Tellarknight Altairan
wikitext: |-
  {{Navigation}}

  * This monster is a retrained counterpart of "[[Satellarknight Altair]]".
  * This card is named after [[wikipedia:Altair|Altair]], the brightest star in the constellation [[wikipedia:Aquila (constellation)|Aquila]].
  * This monster has two upgraded [[Xyz Monster|Xyz]] forms combined with other monsters:
  ** "[[Constellar Caduceus]]" and "[[Tellarknight Lyran]]": "[[Tellarknight Constellar Caduceus]]"
  ** "[[Tellarknight Cygnian]]" and "Tellarknight Lyran": "[[Tellarknight Constellar Delteros]]"
