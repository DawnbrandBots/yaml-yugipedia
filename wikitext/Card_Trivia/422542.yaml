title: Card Trivia:Shiranui Style Swallow's Slash
wikitext: |-
  {{Navigation}}

  * "[[Shiranui Shogunsaga]]" and "[[Shiranui Spectralsword]]" appear in this card's artwork.
  * This card's name is based on the [[wikipedia:Sasaki Kojirō|Swallow Cut]], a sword-cutting technique pioneered by Sasaki Kojiro. It resembles a swallow's tail in flight and is so fast it has been said to fell a bird mid-flight.
  * This card's effect resolution (to [[banish]] 1 "[[Shiranui]]" monster from the [[Deck]]) was probably created to make this card less generic, which would make it splashable in any [[Zombie]]-reliant Deck and obviously overpowered.
  * This card's Spanish name should be "''Corte de la Golondrina Estilo Shiranui''", as it suffers from a mistranslation of the word "''swallow''", having been translated as in the "''to ingest''" verb.
