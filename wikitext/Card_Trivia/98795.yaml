title: Card Trivia:Ground Breaking
wikitext: |-
  {{Navigation|mode=nongame}}

  * In Eastern culture, a "jichinsai" ({{Ruby|地|じ}}{{Ruby|鎮|ちん}}{{Ruby|祭|さい}} ''Groundbreaking ceremony'') is a Shinto ritual performed to appease the earth Gods following the commencement of building construction. It is thought that without this ceremony, the construction will anger the Gods and lead to the destruction of the building.
