title: Card Trivia:Ascator, Dawnwalker
wikitext: |-
  {{Navigation}}

  * "[[Fire Ant Ascator]]" and the sun faces of "[[Sun Dragon Inti]]" appear in this card's artwork.
  ** Fittingly, this monster's effect can [[Special Summon]] "Fire Ant Ascator", which is required to [[Synchro Summon]] "Sun Dragon Inti".
  * This monster is based on [[wikipedia:Manco Cápac|Manco Cápac]], the first governor and founder of the Incan civilization in [[wikipedia:Cusco|Cusco]], [[wikipedia:Peru|Peru]] in the 13th century.
  ** The sun-like faces appearing in this monster's design reference the Inca sun god [[wikipedia:Inti|Inti]]. According to [[wikipedia:Inca mythology|Inca mythology]], Manco Cápac is the son of Inti and the moon goddess, [[wikipedia:Mama Killa|Mama Quilla]].
  *** This monster's origin is shared with "Sun Dragon Inti" (based on Inti) and "[[Moon Dragon Quilla]]" (based on Mama Quilla), both of which can be Synchro Summoned using this monster as [[Synchro Material]]. This is further emphasized with its Moon [[counterpart]], "[[Supay, Duskwalker]]", a monster based on Manco Cápac's older sister and wife, [[wikipedia:Mama Ocllo|Mama Ocllo]] whose effects can be used to quickly Synchro Summon the aforementioned [[Dragon]] monsters.
  ** The golden staff wielded by this monster references the ''tapac-yauri'', a golden staff carried by Manco Cápac after he and his siblings were sent to the earth by Inti and emerged from the cave of [[wikipedia:Paqariq Tampu|Paqariq Tampu]] along with his siblings. Inti instructed Manco Cápac to use the ''tapac-yauri'' to locate a spot in the earth where it sank, where he would built a temple to the sun.
  * This card was first revealed on [https://twitter.com/YuGiOh_OCG_INFO/status/1131303721768542208 Twitter] at 6 AM Japan Standard Time, on the same day as its counterpart. This is a common estimate for the time the sun rises, referencing the sun theme of "[[Oracle of the Sun]]" and "Sun Dragon Inti".
