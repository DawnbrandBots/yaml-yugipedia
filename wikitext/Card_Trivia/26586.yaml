title: Card Trivia:Tethys, Goddess of Light
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Tethys (mythology)|Tethys]], the Titan daughter of [[Wikipedia:Uranus (mythology)|Uranus]] and [[Wikipedia:Gaia|Gaia]] in [[Wikipedia:Greek mythology|Greek mythology]].
  ** This monster's appearance is based on an ancient mosaic of Tethys, in which she is depicted with a pair of wings sprouting from her forehead.
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|GX|022|ref}} showing [[Tethys, Goddess of Light (manga)|this monster]] being Summon, albeit with her palms facing upwards.
