title: Card Trivia:Wizard @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located on the center of this monster's hat.
  * This monster is an "@Ignister" [[counterpart]] of "[[Cyberse Wizard]]".
  ** Both monsters feature an effect that allows them to change the [[battle position]] of an opponent's monster.
  ** Both monsters have a [[Set Number]] ending in "001" in the [[Core Booster]] packs they were introduced in.
  ** This monster's design features elements of "[[The Arrival Cyberse @Ignister]]", referencing how in {{episode|VRAINS|120|ref}}, "[[Cyberse Wizard (anime)|Cyberse Wizard]]" was one of the [[Link Material]]s for "[[Accesscode Talker]]," which defeated "The Arrival Cyberse" in a mutual clash.
