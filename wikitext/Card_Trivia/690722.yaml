title: Card Trivia:Resh Shaddoll Incarnation
wikitext: |-
  {{Navigation}}

  * "[[Qadshaddoll Keios]]" appears in this card's artwork.
  ** This card's artwork is similar to those of "[[Constellar Star Chart]]" and "[[Stellarnova Alpha]]".
  * The kanji 「影光の聖選士」 (''Eikō no Seisenshi'') in this card's Japanese name roughly translates to "The Chosen Holy Warrior of Shadow Light".
  ** The kanji 「聖選士」 (''Seisenshi'', lit. "Holy Chosen-Warrior") is a homophone of 「聖戦士」 (''Seisenshi'', lit. "Holy Warrior"), with the kanji 「選」 (''Sen'', "Select") being a homophone of 「戦」 (''Sen'', "Battle").
  ** The kanji 「聖選士」 (''Seisenshi'', "Holy Chosen-Warrior") in this card's Japanese name is also featured in the name of "[[Chosen of Zefra]]".
