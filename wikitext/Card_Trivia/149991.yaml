title: Card Trivia:Gjallarhorn
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Gjallarhorn|Gjallarhorn]], a golden horn belonging to the Nordic gatekeeper god, [[wikipedia:Heimdall|Heimdall]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** The man appearing in this card's artwork is likely Heimdall, who is depicted blowing into Gjallarhorn to herald the beginning of Ragnarök.
  ** In Norse mythology, Ragnarök is the great battle where Heimdall and the Æsir are killed, causing a series of natural disasters that ultimately leads to the end of the world. This card's effects are based on this myth, as the "[[Aesir]]" disappear and "bring the end of the world" by inflicting potentially devastating [[effect damage]] to the opponent.
  * The three orange crystals embedded in the horn this card's artwork is a reference to the three [[End Phase]]s required to activate this card's banishing and damaging effects.
