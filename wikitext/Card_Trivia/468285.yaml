title: Card Trivia:Performage Trapeze Witch
wikitext: |-
  {{Navigation}}

  * This is the first and currently only "[[Performage]]" [[Fusion Monster]].
  * This monster is based on a [[Wikipedia:Trapeze|trapeze artist]], a circus performer who performs acrobatic and aerialist stunts with a trapeze, a short horizontal bar hung by ropes from a ceiling support.
  * This monster and "[[Performage Trapeze Magician]]" (and by extension, "[[Performage Trapeze High Magician]]") follow the trend started with "[[Dark Magician]]" and "[[Dark Magician Girl]]" but have some peculiarities compared to other similar pairs.
  ** In terms of similarities, "Performage Trapeze Magician" has the same [[original ATK and DEF]] (2500/2000) as most of "Dark Magician's" [[counterpart]]s, while this monster has 100 more [[DEF]] (1800, rather than 1700) than "Dark Magician Girl" and 100 more [[ATK]] (2400, rather than 2000+300=2300) than the latter when there is a single "Dark Magician" in the player's [[Graveyard]].
  ** In terms of differencies, this monster is the first and currently only female member to have a higher [[Level]]/[[Rank]] (7) than its male member.
  *** This reflects [[Dennis McField]], who used the "[[Performage]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, both in his anticonformism and his contraposition to [[Yusho Sakaki]] (and by extension, [[Yuya Sakaki]], the latter's son) in terms of [[Dueltaining]] style.
  **** Fittingly, "Performage Trapeze Magician" and "Performage Trapeze High Magician's" Ranks (4 and 5 respectively) mirror the Levels of "[[Xiangsheng Magician]]" and "[[Performapal Sky Magician Girl]]" respectively, both paired with a Level 7 [[Spellcaster]] monster used by either Yuya and Yusho.
