title: Card Trivia:Bujinfidel
wikitext: |-
  {{Navigation}}

  * According to the [[Gagaga Academy Tospedia card storylines#"Bujin" Edition|Gagaga Academy Tospedia card storylines]], this card's artwork depicts "[[Bujintei Susanowo]]" being banished from Takama-ga-hara, losing his power and becoming "[[Bujin Yamato]]" as a result.
  * "[[Bujingi Quilin]]", "[[Bujingi Turtle]]", "[[Bujingi Wolf]]", "[[Bujingi Crane]]" and "[[Bujingi Ophidian]]" appear in their armament forms in this card's artwork.
