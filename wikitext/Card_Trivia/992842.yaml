title: Card Trivia:Wattsychic Fighter
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Wattsychic Fighting Porter]]".
  * Visually, this monster seems to be "[[PSY-Frame Driver]]" with different colored energy waves, a modified jacket, and a different color scheme.
  ** Given the lower [[Level]] and having being released before "PSY-Frame Driver", it is likely for this monster to be a younger form of the latter.
