title: Card Trivia:Brotherhood of the Fire Fist - Bear
wikitext: |-
  {{Navigation}}

  * In the OCG, this card is named after ''[[wikipedia:Yang Zhi (Water Margin)|Yang Zhi]]'' (read in Japanese as Yō Shi) and "bear" (yū).
  ** ''Yang Zhi'' ranks 17th of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "Blue Faced Beast".
  * This monster appears in the artwork of "[[Fire Formation - Tensu]]".
  * This card has the same stats as [[Coach Soldier Wolfbark]] in terms of [[ATK]], [[DEF]], [[Level]], [[Type]] and [[Attribute]].
