title: Card Trivia:Ancient Gear Megaton Golem
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded [[Fusion Monster|Fusion]] form of "[[Ancient Gear Golem]]".
  ** Its appearance with three pairs of arms and legs reflects how this monster requires three [[Fusion Material]]s and gains the ability to attack a number of times during the [[Battle Phase]] up to the number of copies of "Ancient Gear Golem" and/or "[[Ancient Gear Golem - Ultimate Pound]]" used as Fusion Material.
  * This monster is a [[counterpart]] of "[[Ultimate Ancient Gear Golem]]".
  ** Both are upgraded forms of "Golem" that require exactly 3 [[Fusion Material]]s to be summoned.
  ** Both have an effect related to [[Battle|battling]]: this monster can [[Multiple attacker|attack multiple times]], while "Ultimate Golem" inflicts [[piercing]] damage.
  ** Both can [[float]] into another form of "Golem" when they leave the field.
  ** This monster's [[ATK]] is 3/4 of that of "Ultimate Golem", while its [[DEF]] is exactly 100 less than that of "Ultimate Golem".
