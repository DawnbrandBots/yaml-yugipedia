title: Card Trivia:Dark-Eyes Illusionist Faceless Mage
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Mind Scan (card)|Mind Scan]]".
  * Visually, this monster is a combination of "[[Dark-Eyes Illusionist]]" and "[[Illusionist Faceless Mage]]".
  ** This monster's [[Illusion]] [[Type]] is a reference to how the above-mentioned monsters used by [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] were originally Illusion monsters in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
