title: Card Trivia:Rising HERO Argent R
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[counterpart]] of "[[Rising HERO Argent]]".
  ** The "R" in the monster's name could stand for "Retrain", since this monster is a retrain of "Rising HERO Argent", or "Rookie", which means a new or inexperienced member.
  *** This last point could be a reference to the fact that, in the Lore, "Argent" started as a rookie and became the captain of the [[Rising HERO]]es.
