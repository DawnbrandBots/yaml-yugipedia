title: Card Trivia:Goyo Guardian
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Deep Dark Trap Hole]]", "[[Extra Net]]" and "[[Summon Gate]]".
  * This monster is based on a ''[[wikipedia:Kabuki|kabuki]]'' actor, as well as a [[wikipedia:Yoriki|Yoriki]] and/or [[wikipedia:Edo period police|Doshin]], which are both types of [[wikipedia:Edo period police|Edo period policemen]].
  * This monster's Japanese kanji (御用, ''Goyou'') can be read literally as "imperial use" or "patronage"; it also has a secondary meaning of "arrest", "apprehension" or "capture".
  ** This monster's effect to [[Special Summon]] an opponent's monster(s) that it destroys by battle effectively "arrests" or "captures" them by [[Summon]]ing them to the other player's field.
  ** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster is used by [[Tetsu Trudge]], a [[Sector Security]] officer.
  *** ''[[Yu-Gi-Oh! Duel Links]]'' further emphasizes this connection through [[Skill]]s exclusive to [[Officer Tetsu Trudge (Duel Links)|Trudge]] that are designed to work well with [[Goyo Guardian (Duel Links)|this monster]], such as "[[You're Under Arrest!]]" and "[[Parole!]]".
  * This card's artwork depicts the monster wielding a tassled ''[[wikipedia:Jitte|jutte]]'' (十手、commonly read as "Jitte"), a hybrid weapon that combines a baton and sword-breaker and was commonly used by the Edo period police forces.
  ** In the ''Yu-Gi-Oh! 5D's'' anime, Trudge first [[Synchro Summon]]s [[Goyo Guardian (anime)|this monster]] by Tuning one of his "[[Gate Blocker (anime)|Gate Blockers]]" with the aptly-named "[[Jutte Fighter (anime)|Jutte Fighter]]".
  * This monster is tied with "[[Goyo King]]" for the highest [[original ATK]] (2800) of any [[EARTH]] [[Warrior]] [[Synchro Monster]].
  ** This monster has the highest original ATK (2800) of all [[Level 6]] Synchro Monsters.
  * This is the [[signature card]] of Tetsu Trudge in the ''Yu-Gi-Oh! 5D's'' anime.
  * This monster is the first card to have its [[Synchro Material|Synchro Materials]] changed by a major [[errata]].
