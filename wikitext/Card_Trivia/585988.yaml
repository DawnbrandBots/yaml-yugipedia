title: Card Trivia:Dice It
wikitext: |-
  {{Navigation}}

  * "[[Terrorking Archfiend]]" and "[[Snipe Hunter]]" appear in this card's artwork.
  * This card's Japanese name is a contraction of "Dice Roulette".
  * In this card's artwork, "Snipe Hunter" is shooting on a spinning roulette with the result areas illustrated as following: 1. Push-up, 2. Shortcake, 3. Juice, 4. Bed, 5. Lollipop and 6. Sit-up.
  ** It is implied that "Snipe Hunter" is playing a game in which the next action he is going to do is depend on the roulette shooting result. Since "Snipe Hunter" effect failed when the die hit 1 or 6, the area for 1 and 6 are illustrated as punishment of the game which is exercise instead of resting/food.
  ** While there are 6 possible results for the roulette, the areas are not divided equally, in which the areas for 1 and 6 are actually twice bigger as 2-5 and made up one half of the roulette, which made the game is 50/50% chance of success.
