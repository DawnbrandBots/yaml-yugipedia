title: Card Trivia:Kaien the Emissary of Darkness
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is the token generated by "[[Gorz the Emissary of Darkness]]". The token's original Japanese name is translated to "[[Emissary of Darkness Token|Kaien the Emissary of Darkness Token]]". It is used represent the token in most video games that include "Gorz", while in the manga, it was an actual monster Summoned alongside "Gorz" using "[[Stairway to the Underworld]]" (both it and "Gorz" itself had no known effects).
