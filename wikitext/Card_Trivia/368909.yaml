title: Card Trivia:Frightfur Factory
wikitext: |-
  {{Navigation}}

  * "[[Edge Imp Sabres]]", "[[Fluffal Bear]]", "[[Fluffal Owl]]", "[[Frightfur Bear]]", and "[[Frightfur Wolf]]" appear in this card's artwork.
  ** This card's artwork depicts the transformation of the "[[Fluffal]]" monsters into the "[[Frightfur]]" monsters.
  * This was the first "Frightfur" [[Spell Card]] to be revealed.
