title: Card Trivia:Silent Paladin
wikitext: |-
  {{Navigation}}

  * This monster is aesthetically similar to both "[[Silent Magician]]" and "[[Silent Swordsman]]".
  ** This monster's young age and general appearance hint at some sort of kinship with both monsters, possibly their child. Fittingly, in role-playing games, a [[wikipedia:Paladin (Dungeons & Dragons)|paladin]] is a character class depicted as a swordfighter and a spellcaster.
  ** Another indication of this is from its first effect to [[add]] either "[[Silent Swordsman LV3]]" or "[[Silent Magician LV4]]" from the [[Deck]] to the [[hand]].
