  [[File:Prime_Photon_vs_Neo_Tachyon.png|thumb|right|200|"[[Number C107: Neo Galaxy-Eyes Tachyon Dragon (anime)|Number C107: Neo Galaxy-Eyes Tachyon Dragon]]" and "[[Number 62: Galaxy-Eyes Prime Photon Dragon (anime)|Number 62: Galaxy-Eyes Prime Photon Dragon]]" battle.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * [[Kite Tenjo]], [[Mizar]], the tablets of the [[Legend of the Dragons of Light and Time]], "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]", and "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]" appear in this card's artwork.
  ** This card's artwork is a reference to a scene of {{episode|ZEXAL|135|ref}}, where Kite [[attack]]ed and [[destroy]]ed Mizar's "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon (anime)|Number C107: Neo Galaxy-Eyes Tachyon Dragon]]" with "[[Number 62: Galaxy-Eyes Prime Photon Dragon (anime)|Number 62: Galaxy-Eyes Prime Photon Dragon]]", and won the [[Duel]] against him.
  ** This card's effect to double the [[ATK]] of a [[Dragon]] monster the player [[control]]s is also a reference to the aforementioned Duel, specifically to the scene where Kite [[Special Summon]]ed "Galaxy-Eyes Prime Photon Dragon" from the [[Graveyard]] with its last effect, doubling its ATK.

