title: Card Trivia:Dark Horus
wikitext: |-
  {{Navigation}}

  * This card is the [[Dark counterpart]] counterpart of "[[Horus the Black Flame Dragon LV8]]"
  * This is one of the only two [[Dark counterpart]]s of a "LV" monster, the other being "[[Dark Armed Dragon]]".
  * Just as the "[[Horus]]" and "[[Armed Dragon]]" archetypes came in the same set, ''[[Soul of the Duelist]]'', their DARK forms came together in the same set of ''[[Phantom Darkness]]''.
  * In Egyptian mythology, Horus was the god of the sky, and so the sun would often be used to represent it. In the background of this card, there is a solar eclipse to represent the card's dark nature.
  * This card appears in the artwork of "[[Ninjitsu Art of Super-Transformation]]".
