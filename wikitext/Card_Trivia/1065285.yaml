title: Card Trivia:Sevens Fear Magician
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Sevens Road Magician]]".
  * This card's artwork features seven cross-shaped symbols, referencing the "7" motif of the [[Sevens Road]] [[series]].
  ** This symbol is exclusive to this monster, and has a design diagonally oriented in the shape of an "X", unlike the symbols that appear in each other Sevens Road monster's artwork.
