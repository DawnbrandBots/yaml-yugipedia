title: Card Trivia:Scarechair Code
wikitext: |-
  {{Navigation}}

  * The symbol on the top left of this card's artwork is the same as the one on the seat of the chair.
  * This monster is based on a PC [[wikipedia:Gaming chair|gaming chair]] and its name is based on [[wikipedia:Source code|source code]], befitting its effect being able to retrieve [[Cyberse]] [[Type]] [[Maximum Monster]]s from the [[Graveyard]].
  ** This effect is likely a reference to {{Episode|SEVENS|83|ref}}, where [[Seatbastian]] used "[[Yggdrago the Sky Emperor]]" (a Cyberse Maximum Monster) against [[Nail Saionji]].
