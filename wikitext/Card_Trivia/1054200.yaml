title: Card Trivia:Cosmo Queen the Queen of Prayers
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed counterpart of "[[Cosmo Queen]]".
  ** This monster's title is based on "[[Cosmo Queen's Prayer]]", a [[Ritual Spell Card]] used to [[Ritual Summon]] "[[Cosmo Queen (DM2)|Cosmo Queen]]" in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video games.
  ** This monster's effects of manipulating either player's [[Field Spell Card]] while letting the controller add another one from the Deck to the hand is possibly a reference to the effect of "[[Cosmo Queen (DOR)|Cosmo Queen]]" in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', in which it could change the [[terrain]] around it when flipped face-up.
