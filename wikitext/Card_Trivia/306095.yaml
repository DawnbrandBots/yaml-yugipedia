title: Card Trivia:Outer Entity Nyarla
wikitext: |-
  {{Navigation}}

  * This card's artwork appears as a photograph in the artwork of "[[Dark Contract with the Entities]]".
  * This monster is based on the Outer God [[wikipedia:Nyarlathotep|Nyarlathotep]], a fictional deity created by [[wikipedia:H.P. Lovecraft|H.P. Lovecraft]].
  ** This monster's effects allows it to change its [[Attribute]], [[Rank]], and [[Type]], referencing Nyarlathotep's nature as a being of many forms, earning him the title of "God of a Thousand Forms".
