title: Card Trivia:Marshmallon Glasses
wikitext: |-
  {{Navigation}}

  * "[[Marshmallon]]" appears in this card's artwork, depicted on each of the eyeglasses' lenses.
  ** In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' and [[Yu-Gi-Oh! (anime)|anime]], when this card is [[activate]]d, the pair of eyeglasses is placed on an opponent's monster and makes them believe they can only see "Marshmallon" instead of its friends.
  * The eyeglasses in this card's artwork appears in the artwork of "[[Moremarshmallon]]".
