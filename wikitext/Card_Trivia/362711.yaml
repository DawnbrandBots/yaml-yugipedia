title: Card Trivia:Amazing Pendulum
wikitext: |-
  {{Navigation}}

  * "[[Timegazer Magician]]" and "[[Stargazer Magician]]" appear in this card's artwork.
  ** Also, the pendulum swinging in this card's artwork looks identical to [[Yuya's pendant]], making this yet another one of several cards in the franchise to directly refer to the protagonist playing the card.
