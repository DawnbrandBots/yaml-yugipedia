title: Card Trivia:Liberty at Last!
wikitext: |-
  {{Navigation}}

  * This card's name and artwork both reference the [[wikipedia:Siege of Orléans|Siege of Orléans]], an event that occurred during the [[wikipedia:Hundred Years' War|Hundred Years' War]], when the French peasant [[wikipedia:Joan of Arc|Joan of Arc]] led a French force in relieving the city, besieged by the English at the time.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[shuffle]] two monsters from the [[field]] into the [[Deck]] is an alteration of its anime effect returns all monsters on the field and into the players' Decks. In {{episode|5D's|072|ref}} when [[Yusei Fudo]] destroyed [[Sherry LeBlanc]]'s "[[Sacred Knight's Shield-Bearer (anime)|Sacred Knight's Shield-Bearer]]" by battle while he [[control]]led both "[[Junk Warrior (anime)|Junk Warrior]]" and "[[Drill Synchron (anime)|Drill Synchron]]", this card's effect returned both monsters into his Deck.
