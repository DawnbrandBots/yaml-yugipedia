title: Card Trivia:Batteryman Charger
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Portable Battery Pack]]" and "[[Quick Charger]]".
  * This monster has the infinity sign on its lower chest.
  * This monster's artwork design is based on the [[wikipedia:Nine-volt battery|nine-volt battery]].
  * The kanji in this monster's name is a play on words; the first two kanji mean "Charge", and from the second to the last character is the kanji name of the [[Batteryman]] [[Archetype]].
