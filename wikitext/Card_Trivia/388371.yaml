title: Card Trivia:Performapal Gumgumouton
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Acrobatic Tower]]".
  * This card's Japanese name is a portmanteau of the Japanese word for "rubber" (ゴムゴム ''Gomugomu'') and the Japanese pronunciation of "mouton" (ムートン ''mūton'').
  ** ''Gomu'' is a Japanese word borrowed from the Dutch word ''gom'', meaning "gum", reflecting this card's ''[[TCG]]'' name, "Gumgumouton".
  ** "Mouton" is used to describe [[wikipedia:Sheepskin|sheepskin]], which has been processed to resemble seal fur or beaver fur. In this context, this monster's sheepskin is made of rubber.
  * This card is the first [[Pendulum Monster]] whose [[Pendulum Effect|Pendulum]] and [[monster effect]]s are exactly the same.
