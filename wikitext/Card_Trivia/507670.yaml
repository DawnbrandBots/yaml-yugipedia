title: Card Trivia:Assault on GHQ
wikitext: |-
  {{Navigation}}

  * "[[Goblin Attack Force]]", "[[Marauding Captain]]", and "[[Emergency Provisions]]" appear in this card's artwork.
  * The "GHQ" in this card's ''[[TCG]]'' name is an acronym for '''G'''oblin '''H'''ead'''q'''uarters.
  * This card is likely a follow-up to "[[Prepare to Strike Back]]", which depicts "Marauding Captain" charging towards the encampment of "Goblin Attack Force", where they are hastily arming themselves for battle.
