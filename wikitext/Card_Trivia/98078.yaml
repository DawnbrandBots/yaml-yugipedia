title: Card Trivia:Black Whirlwind
wikitext: |-
  {{Navigation}}

  * The feathers in this card's artwork resemble the feathers from "[[Blackwing - Bora the Spear]]" (orange and yellow feathers), "[[Blackwing - Sirocco the Dawn]]" (long black feather), "[[Blackwing - Blizzard the Far North]]" (a little white feather), "[[Blackwing - Shura the Blue Flame]]" (long blue feather) and "[[Blackwing - Gale the Whirlwind]]" (a little green feather).
  * This card is based on a [[wikipedia:slipstream|slip stream]], a region being a moving object in the wake of fluid or air that provides less [[wikipedia:drag (physics)|wind resistance]].
  ** This is reflected in this card's effect to [[add]] a "[[Blackwing]]" from the [[Deck]] to the [[hand]] with less [[ATK]] than the [[Normal Summon]]ed "Blackwing" monster.
  * In the Spanish version of ''[[Raging Battle]]'', this card's name was "Torbillino Oscuro", which translates to "Black Whirlwind". In later subsequent printings, this card's Spanish name was change to "Remolino Oscuro", which translates to "Black Swirl".
  ** Also, in the Spanish version of ''Raging Battle'', this card's print featured an error, as this card's effect stated that a monster could be added ''desde tu Cementerio'' (''from your Graveyard'') instead of ''desde tu Deck'' (''from your Deck''). This was later corrected in subsequent printings.
