title: Card Trivia:Sakuretsu Force
wikitext: |-
  {{Navigation}}

  * "[[Warrior Dai Grepher]]" appears in this card's artwork.
  ** This references "[[Dark Lucius LV4]]" appearing in the artwork of "[[Sakuretsu Armor (Rush Duel)|Sakuretsu Armor]]", whom "Warrior Dai Grepher" turns into in the artwork of "[[Falling Down]]".
  * This card's name and artwork is based on "[[Mirror Force (Rush Duel)|Mirror Force]]".
