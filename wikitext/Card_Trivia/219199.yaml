title: Card Trivia:Evilswarm Coppelia
wikitext: |-
  {{Navigation}}

  * This card is the "[[lswarm]]" counterpart of "[[Locomotion R-Genex]]". Also, "[[Genex Controller]]" is seen using "[[Genex Spare]]" to pilot the monster.
  ** This monster has 50 less [[ATK]] and 50 more [[DEF]], and has a similar effect which [[Changes control|takes control of another monster]]. Also, it's Level (6) is equal to "Locomotion's" (9) minus "Controller's" (3).
  * This card is the strongest non-[[Xyz Monster|Xyz]] "lswarm" monster (ATK-wise).
  * This card is the second "lswarm" monster whose Level or Rank isn't 4; the first is "[[Evilswarm Golem]]".
  * This card's artwork and name refers to a play called ''The [[wikipedia:Coppélia|Coppélia]]'', which involves a robotic puppet.
