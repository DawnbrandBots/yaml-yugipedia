title: 'Card Trivia:Number C104: Umbral Horror Masquerade'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Chaos Caller]]" and "[[Chaos Hundred Universe]]".
  * The number "104" is located on the left side of this monster's mask.
  * This monster is the [[Card evolutions|upgraded]] "[[Number C10X]]" form of "[[Number 104: Masquerade]]".
  ** This monster's name references [[Vector]]'s role in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, where he "masqueraded" as "Ray Shadows", an ally of [[Yuma Tsukumo]] in order to achieve his goals.
  *** The Japanese name of "Masquerade" ("Masquerade Magician - Shining") makes it a member of the "[[Shining]]" [[archetype]], consisting of [[LIGHT]] monsters used by Vector while disguising himself as Ray Shadows.
  *** This monster is a member of the "[[Umbral Horror]]" archetype, a series of [[DARK]] monsters used by Vector, which he Summons after revealing himself as the true identity of Ray Shadows.
  * This is the first "[[Number C]]" monster with a different [[Attribute]] than its base form.
  ** In the anime, this is also the first "Number C" monster to belong to a different archetype from its base form.
  * This monster's sealed form resembles a [[wikipedia:Bat|bat]].
  * Strangely, in its debut appearance in {{episode|ZEXAL|098|ref}}, this monster's number was not shown using the same "misty" effect that the other "Number C" monsters use when they are Summoned. This was corrected in {{episode|ZEXAL|136|ref}}.
  * This is the only "Number C10X" monster that was not Summoned via the effect of "[[Rank-Up-Magic - The Seventh One]]" in the anime.
  * This is the only "Umbral Horror" monster not to be [[Fiend]].
