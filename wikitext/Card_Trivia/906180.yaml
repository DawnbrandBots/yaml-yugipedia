title: Card Trivia:Guardian Slime
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on "[[Humanoid Slime]]" taking on the form of [[wikipedia:Set (deity)|Set]], the Egyptian deity depicted with the head of a [[wikipedia:Set animal|unknown animal.]]
  ** According to Egyptian mythology, Set serves as one of the protectors of [[wikipedia:Ra|Ra]] during his nightly journey through the underworld, which reflects how this monster is a member of the "[[Guardian]]" [[archetype]], and how its effect [[add]]s a [[Spell]]/[[Trap Card]] from the [[Deck]] to the [[hand]] that supports "[[The Winged Dragon of Ra]]".
