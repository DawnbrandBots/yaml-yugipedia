title: Card Trivia:Explossum
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duelist Pack: Yuma 2: Gogogo & Dododo]]''.
  * This monster is based on the [[wikipedia:Baku (spirit)|Baku]], a tapir-like creature from Japanese and Chinese myth, known for eating dreams.
  ** Its ''OCG'' name is also a pun for the Japanese word "Bakudan", which means "bomb" in Japanese, referring to its effect of destroying the monster it is equipped to.
  * This monster's ''TCG'' name is a combination of "explode" and "[[wikipedia:opossum|opposum]]". Despite this, it does not resemble an opossum at all.
  ** However, the Spanish name preserves the Japanese pun with "Tapirplosión".
