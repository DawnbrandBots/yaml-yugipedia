title: Card Trivia:Mystic Piper
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Pied Piper of Hamelin|Pied Piper of Hamelin]], the titular character from German legend who used his magic pipe to lure rats away.
  ** This is reflected in this card's effect of [[draw]]ing a [[Level 1]] [[Monster Card]], followed with drawing another card if successful.
