title: Card Trivia:Magician's Left Hand
wikitext: |-
  {{Navigation}}

  * This card has a [[counterpart]] that [[negate]]s [[Spell Card]]s: "[[Magician's Right Hand]]".
  * Fitting with the theme of [[Yusho Sakaki]]'s cards being based on those of [[Yami Yugi]]'s, this card is a reference to "[[Glory of the King's Opposite Hand]]", where its Japanese name is "The Honor of the King's Left Hand".
