title: Card Trivia:Triple Tactics Talent
wikitext: |-
  {{Navigation}}

  * The samurai in this card's artwork also appears in the artwork of "[[Triple Tactics Thrust]]".
  * This card's Japanese name is a reference to the story "The Talents for Three Boats" from the Japanese historic tale, ''[[wikipedia:Ōkagami|Ōkagami]]''.
  * The word ''Tenchijin'' (天地人) is visible on the [[wikipedia:Gunbai|gunbai fan]] in this card's artwork. ''Tenchijin'' is the concept of life on the earth having three constituent parts – the heavens, the earth, and humankind itself.
  * This card's effects are based on the effect of 3 [[Spell Card]]s that were [[Forbidden]] at the time of this card's printing: "[[Pot of Greed]]", "[[Change of Heart]]", and "[[The Forceful Sentry]]".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card has a special animation when activated: the gunbai fan in this card's artwork appears onscreen and is thrust downward.
