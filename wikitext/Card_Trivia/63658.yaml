title: Card Trivia:Stone Armadiller
wikitext: |-
  {{Navigation}}

  * Despite its name, this monster bears closer resemblance to a type of [[wikipedia:Pangolin|pangolin]].
  * This monster has a [[recolored counterpart]]: "[[Ancient Lizard Warrior]]".
  * This monster shares the same [[Attribute]] ([[EARTH]]), [[Level]] (3), [[Type]] ([[Rock]]), [[original ATK and DEF]] (800/1200), and [[Normal Monster]] card type as "[[Rock Ogre Grotto 1|Rock Ogre Grotto #1]]".
  * This card is one of eight of [[Joey Wheeler]]'s [[Normal Monster]]s introduced to the ''[[TCG]]'' in ''[[Legendary Collection 4: Joey's World Mega Pack]]'' that have their English [[flavor text]]s written in his [[wikipedia:Brooklyn|Brooklyn]] accent. The other seven are"[[Anthrosaurus]]", "[[Hero of the East]]", "[[Kageningen]]", "[[Little D]]", "[[Meotoko]]", "[[Skull Stalker]]", and "[[Wolf]]". ("[[Alligator's Sword]]", which is included in ''Legendary Collection 4: Joey's World Mega Pack'' but debuted in the ''TCG'' previously, also has this kind of English flavor text.)
  ** All of these cards are seen in Joey's very first [[Deck]], except for "Hero of the East" (which is only seen when Joey has a dream of himself with his inexperienced Deck) and "Little D" (which has not appeared in the anime).
  ** In Italian, Portuguese and Spanish, these cards' flavor texts are also written in [[wikipedia:Eye dialect|eye dialect]] for the sake of humor. Apart from the French text which is translated more directly from the Japanese text in a little more serious way, texts in other ''TCG'' languages appear to be translated from the English text.
