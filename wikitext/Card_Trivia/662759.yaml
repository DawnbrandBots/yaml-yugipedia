title: Card Trivia:Doshin @Ignister
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[CompromA.I.se]]".
  * The "[[@Ignister]]" logo is located on this monster's forehead.
  * This monster and "[[Earth Golem @Ignister]]" represent [[Earth (character)|Earth]], the [[EARTH]] [[Ignis]].
  ** This monster's name is based on "''doshin''", the Japanese onomatopoeia for a "thud", which is commonly associated with something heavy, including a stone.
  ** This monster's block-like body is based on that of Earth's overall blocky design.
  ** This monster's effect is designed to facilitate the [[Fusion Summon]]ing of "Earth Golem", which can be Summoned via "[[A.I. Love Fusion]]", which this monster can [[add]] from the [[Deck]] to the [[hand]].
