title: Card Trivia:Therion "Lily" Borea
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:39 Arietis|Lilii Borea]], a star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Aries (constellation)|Aries]].
  ** This monster's design features ram-like horns, referencing how Aries is also known as the "ram" constellation.
  ** This monster's apostrophized name, design, and [[Plant]] [[Type]] is a pun on a [[wikipedia:Lilium|lily]], a genus of herbaceous flowering plants.
  ** An additional pun in the design is the drill-like lower half, deriving from the "bore" in "Borea".
  * This monster is likely based on the [[wikipedia:Vegetable Lamb of Tartary|Barometz]], a mythological plant believed to have grown sheep as its fruit.
