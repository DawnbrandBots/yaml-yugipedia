title: Card Trivia:Crusadia Maximus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Crusadia Revival]]", "[[Crusadia Testament]]", "[[Crusadia Power]]", "[[Crusadia Vanguard]]", "[[Guardragon Shield]]", "[[Orcustrated Attack]]", "[[World Legacy Guardragon]]", and "[[World Legacy's Mind Meld]]".
  * "[[Chosen by the World Chalice]]" → "[[Auram the World Chalice Blademaster]]" → "[[Mekk-Knight Avram]]" → "Crusadia Maximus" → "[[Crusadia Equimax]]" → "[[Mekk-Knight Crusadia Avramax]]" → "[[Avida, Rebuilder of Worlds]]"
  ** This monster is an older version of "Mekk-Knight Avram", after he and "[[Ningirsu the World Chalice Warrior]]" took [[Crusadia|different]] [[Orcust|paths]] following the death of "[[Ib the World Chalice Priestess]]".
  ** This card's Japanese name, "Palladion of the Vast Sky"({{Ruby|天|てん}}{{Ruby|穹|きゅう}}のパラディオン ''Tenkyū no Paradion''), is based on the name of "[[Mekk-Knight Blue Sky]]".
  ** This monster has a [[Link Monster|Link]] form, [[Card evolutions|empowered]] by "[[World Legacy - "World Crown"]]": "Crusadia Equimax".
