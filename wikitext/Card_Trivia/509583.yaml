title: Card Trivia:Nekogal 1
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Night Before the Big March]]" and "[[The Big March of Animals]]".
  * "Neko" means "cat" in Japanese, and is often used to refer to a Japanese trend in anime for human-esque characters who have vague feline features (e.g. ears, tail, etc.).
  * This monster has a [[recolored counterpart]]: "[[Nekogal 2|Nekogal #2]]".
