title: Card Trivia:Virtual World Gate - Qinglong
wikitext: |-
  {{Navigation}}

  * "[[Virtual World Roshi - Laolao]]", "[[Virtual World Dragon - Longlong]]", and "[[Virtual World Hime - Nyannyan]]" appear in this card's artwork.
  * 青龍 / 青龙 (''Qīnglóng'') means [[wikipedia:Azure Dragon|Azure Dragon]], one of the [[wikipedia:Four Symbols|Four Symbols]] (zh: 四象 ''sìxiàng'') of the Chinese constellations.
  ** Fittingly, "Virtual World Dragon - Longlong" is also based on the Azure Dragon.
