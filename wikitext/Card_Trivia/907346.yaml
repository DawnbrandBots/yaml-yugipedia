title: Card Trivia:Music Princess's Whirling Wind
wikitext: |-
  {{Navigation}}

  * "[[Nuncharinet the Music Princess]]" and two "[[Constructor Warrior Shovelon]]" appear in this card's artwork.
  ** The artwork depicting a "[[Music Princess]]" monster attacking "[[Constructor]]" monsters reference the rivalry of their respective users in the ''[[Yu-Gi-Oh! SEVENS]]'' anime, [[Tiadosia Kallister|Tiadosia "Tiger" Kallister]] and [[Asana Mutsuba]].
