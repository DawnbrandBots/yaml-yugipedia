title: Card Trivia:Call of the Forgotten
wikitext: |-
  {{Navigation}}

  * This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|090|ref}} depicting one of the visions that [[Dark Yugi (manga)|Dark Yugi]] had when he used the power of the [[Millennium Puzzle (manga)|Millennium Puzzle]] to locate [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] (who was Dueling [[Ghost Kozuka (manga)|Ghost Kozuka]] at the time).

