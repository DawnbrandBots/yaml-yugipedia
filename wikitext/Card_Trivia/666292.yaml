title: Card Trivia:Ancient Warriors - Masterful Sun Mou
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ancient Warriors Saga - Sun-Liu Alliance]]".
  * This monster is based on [[wikipedia:Sun Quan|Sun Quan]] ([[wikipedia:Courtesy name|courtesy name]]: '''Zhongmou'''), from the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', founder and emperor of the [[wikipedia:Eastern Wu|Wu]] state during the Three Kingdoms Period, having enjoyed the longest reign among all the founders of the Three Kingdoms ([[wikipedia:Liu Bei|Liu Bei]] and [[wikipedia:Cao Cao|Cao Cao]]).
  ** This monster's turtle and snake motif might be referencing the [[wikipedia:Black Tortoise|Black Warrior]], one of the [[wikipedia:Four Symbols|Four Symbols]] that corresponds to the Water Element (The Southland's Attribute). Moreover, the turtle and the snake symbolize longevity.
  ** Incidentally, this card's first effect to [[add]] an "[[Ancient Warriors]]" monster to the [[hand]] may be a reference to Sun Quan's portrayal in the novel as a "man who correctly values his subordinates and is wise in choosing them", elevating capable (even if initially unpopular) officials such as [[wikipedia:Lu Su|Lu Su]], [[wikipedia:Lü Meng|Lü Meng]], and [[wikipedia:Lu Xu|Lu Xu]].
