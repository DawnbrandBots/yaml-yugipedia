title: Card Trivia:Divine Dragon Knight Felgrand
wikitext: |-
  {{Navigation}}

  * This monster appears to be an advanced form of "[[Paladin of Felgrand]]", based on several visual similarities, such as both having blonde hair and having armor-exposed inner arms.
  ** Fittingly, the silhouette of "[[Felgrand Dragon]]" appears in this card's artwork, and this monster's armor also resembles the aforementioned monster.
  * This monster has the same weapon [[wikipedia:Hilt|pommel]] (as well as the same engraved "+" markings on its weapon) as "[[Guardian of Felgrand]]" and "Paladin of Felgrand".
  ** These pommels are likely based on the circular ornament present on the backs of "[[The Creator]]" and "[[The Creator Incarnate]]", due to the fact that those two monsters appeared in the ''[[Rise of the Dragon Lords Structure Deck]]'', in which "[[Herald of Creation]]" also debuted.
  *** This is significant since "Herald of Creation" has the same symbol on the tip of its staff as those aforementioned monsters' weapons have for their pommels, and also has clothing based on the appearance of "Felgrand Dragon".
  ** "[[Dragon Knight of Creation]]" also has the same symbol (serving as its sword's crossguard) as those weapon pommels.
  * This monster's sword has 8 stars along the back of the blade, which is equal to its [[Rank]].
