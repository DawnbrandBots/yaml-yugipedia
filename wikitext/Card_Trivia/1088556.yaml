title: Card Trivia:Rank-Up-Magic Magical Force
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to use a [[target]]ed [[Rank 4]] [[Spellcaster]] [[Xyz Monster]] in the player's [[Graveyard]] to [[Xyz Summon]] a [[Rank 5]] Spellcaster Xyz Monster is an alteration of its effect in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, which can use any Xyz Monster in the player's Graveyard that was [[destroyed by battle]] to Xyz Summon a Spellcaster Xyz Monster that is one [[Rank]] higher. In {{episode|ARC-V|144|ref}}, this card was used to target the Rank 4 "[[Performage Trapeze Magician (anime)|Performage Trapeze Magician]]" to Xyz Summon the Rank 5 "[[Performage Trapeze High Magician (anime)|Performage Trapeze High Magician]]".
