title: Card Trivia:Master of the Sevens Road
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Genesis Master Road!!]]''.
  * The rings floating in the air around this monster each correspond to one of the seven main [[Sevens Road]] monsters ("[[Sevens Road Magician|Magician]]", "[[Sevens Road Witch|Witch]]", "[[Sevens Road Warlock|Warlock]]", "[[Sevens Road Sorcerer|Sorcerer]]", "[[Sevens Road Enchanter|Enchanter]]", "[[Sevens Road Mage|Mage]]", and "[[Sevens Road Wiz|Wiz]]"); each ring also contains that monster's corresponding symbol on the Sevens Road crest, and is overlaid by the cross-shaped symbol that appears in the background of that monster's artwork.
  ** The chain of seven colored rings hanging off of this monster's belt also matches the colors of the seven main Sevens Road monsters, in descending order by Level. A similar chain appears in the artworks of "[[Majesty of the Sevens Road]]" and "[[Sevens Road Ultima Witch]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Sevens Road Magician]]".
  * This monster has a [[Celeb Rose]] [[counterpart]]: "[[Celeb Rose Fabulous Magician]]".
  ** Both cards feature the same [[Level]] (9), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (3000/2100).
  * This is the first Fusion Monster with a [[Continuous Effect]] in ''[[Yu-Gi-Oh! Rush Duel]]''.
  * This is the last Fusion Monster to be [[Fusion Summon]]ed, as well as the last monster [[Special Summoned]] from the [[Extra Deck]], in the ''[[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!]]'' and ''[[Yu-Gi-Oh! Rush Duel LP]]'' manga.
