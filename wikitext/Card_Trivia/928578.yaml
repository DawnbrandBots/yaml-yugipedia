title: Card Trivia:Vanquish Soul - Continue?
wikitext: |-
  {{Navigation}}

  * "[[Vanquish Soul Pluton HG]]" appears in this card's artwork.
  * This card's name, artwork, and effect are based on the "Game Over/Continue" screen in video games, especially arcade fighting games where the player character is seen defeated or in a similar unpleasant or compromising situation.
  ** The LP cost to either add the targeted "[[Vanquish Soul]]" monster to the hand or Special Summon it references the player inserting an additional credit(s) into an arcade cabinet to continue playing.
