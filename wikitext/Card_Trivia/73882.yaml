title: Card Trivia:Victory Viper XX03
wikitext: |-
  {{Navigation}}

  * This monster is based on a prototype space fighter mentioned in "The History of "Vic Viper"" booklet, the Japanese pre-order bonus of ''Gradius V'', a game in [[Konami]]'s shoot'em up video game series, ''[[wikipedia:Gradius|Gradius]]''.
  ** This monster is depicted as an upgraded version of "[[Gradius]]" with its "[[Gradius' Option|Option]]" and powerup effects built-in. This reflects its first two optional effects, which [[activate]]s when it [[destroy]]s a monster by battle, allowing the player to destroy any number of an opponent's cards at once.
  ** Its effects are designed to replicate the [[Gradius' Option|special powers]], various [[Cyclon Laser|weapons]], and [[Power Capsule|power-ups]] used by the different ships in the series.
  ** Additionally, this monster's effect to [[Special Summon]] an "[[Option Token]]" after destroying a monster by battle is based on Vic Viper's Option in the ''Gradius'' series, which can create up to four additional weapons by destroying the enemy ships, giving the player additional firepower.
