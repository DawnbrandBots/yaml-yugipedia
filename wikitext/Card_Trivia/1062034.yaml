title: Card Trivia:Montage Fusion
wikitext: |-
  {{Navigation}}

  * The silhouettes of the creatures from the artwork of "[[Polymerization]]" appear in this card's artwork.
  * The camera in this card's artwork is based on a [[Wikipedia:View camera|view camera]], a large-format camera developed in the 19th century comprised of a flexible [[Wikipedia:Bellows (photography)|bellows]] that form a light-tight seal between the front standard (which holds the lens) and the rear standard (which holds the film and ground glass).
