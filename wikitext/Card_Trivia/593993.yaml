title: Card Trivia:Ancient Gear Wyvern
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Wyvern|wyvern]], a dragon without arms in [[wikipedia:European mythology|European mythology]], where they are often associated with destruction and pestilence.
  * This card's effect of the restriction of [[Set]]ting cards was likely implemented because of "[[Ancient Gear Drill]]", a card that can be searched by this card's effect.
  * This monster's design is very similar to that of "[[Scrap Wyvern]]", both are based after [[wikipedia:Wyvern|wyverns]], and are [[EARTH]] monsters with [[ATK]] 1700. Both monsters are also depicted in similar poses in their artwork.
