title: Card Trivia:Trickstar Candina
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Star Pack VRAINS]]''.
  * This monster appears in the artworks of "[[Trickstar Light Stage]]", "[[Trickstar Treat]]", and "[[Trickstar Vision]]".
  ** This monster's shadow can be seen cast upon the stage in the artwork of "[[Trickstar Light Arena]]".
  * This monster's name is based on the ''[[wikipedia:Brugmansia|Brugmansia candida]]'', a genus of toxic flowering plants that is commonly called the "angel's trumpet", which appears as the symbols on the corners of this card's artwork.
