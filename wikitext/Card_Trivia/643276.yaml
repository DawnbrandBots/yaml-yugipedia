title: Card Trivia:World Legacy - "World Key"
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[The World Legacy]]" and "[[Lib the World Key Blademaster]]".
  * This monster implies a connection between the staff of "[[Ib the World Chalice Priestess]]" (also called a "key", as seen in the artwork of "[[World Legacy Key]]"), and "[[Avida, Rebuilder of Worlds]]" (whose overall design is very similar to this, and who appears in the artwork of "[[World Reassembly]]", a card that can summon this monster).
