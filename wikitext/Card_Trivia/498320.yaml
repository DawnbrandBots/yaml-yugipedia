title: Card Trivia:Cyberdark Inferno
wikitext: |-
  {{Navigation}}

  * "[[Cyberdark Cannon]]", "[[Cyberdark Claw]]", and "[[Cyberdark Dragon]]" appear in this card's artwork.
  ** This card's artwork seems to depict "Cyberdark Dragon" turning into "[[Cyberdarkness Dragon]]", by combining with "[[Cyberdark Claw]]" and "[[Cyberdark Cannon]]".
  * This card's effect to add a "[[Polymerization (archetype)|Polymerization]]" [[Spell]] or "[[Fusion (archetype)|Fusion]]" Spell from the [[Deck]] to the [[hand]] is a reference to how [[Zane Truesdale]] often used "[[Polymerization (anime)|Polymerization]]" and "[[Flash Fusion (anime)|Flash Fusion]]" to [[Fusion Summon]] "[[Cyberdark Dragon (anime)|Cyberdark Dragon]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Ironically, this card cannot add from the Deck to the hand "[[Cyberdark Impact!]]", the "[[Cyberdark]]" Spell Card that can Fusion Summon "Cyberdark Dragon".
