title: Card Trivia:Dark Factory of More Production
wikitext: |-
  {{Navigation}}

  * This card's artwork appears to take place in the same factory seen in the artwork of "[[Dark Factory of Mass Production]]".
  ** Similar to the mentioned card, "[[Goblin of Greed]]" appears in this card's artwork.
  ** The several copies of "[[Mokey Mokey]]" being assembled in "Dark Factory of Mass Production" are now becoming their enraged versions, the same one seen in the artwork of "[[Mokey Mokey Smackdown]]".
