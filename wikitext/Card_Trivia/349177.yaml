title: Card Trivia:Cards of the Red Stone
wikitext: |-
  {{Navigation}}

  * "[[The Black Stone of Legend]]" appears in this card's artwork.
  * This card can be considered a [[counterpart]] of "[[Trade-In]]".
  ** Both are [[Normal Spell]]s that make the player [[draw]] 2 cards by [[send]]ing a monster with a specified [[Level]] from the [[hand]] to the [[Graveyard]].
  ** "Trade-In" has been historically important in "[[Blue-Eyes]]" [[Deck]]s, while this card specifically supports "[[Red-Eyes]]" monsters.
