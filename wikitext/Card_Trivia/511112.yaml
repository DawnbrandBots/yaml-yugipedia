title: Card Trivia:Black Luster Soldier - Envoy of the Beginning
wikitext: |-
  {{Navigation}}

  [[File:Black_Luster_Soldier_Duel_118_color.png|thumb|right|250|"[[Black Luster Soldier (manga)|Black Luster Soldier]]" after destroying "[[Harpies' Pet Dragon (manga)|Harpies' Pet Dragon]]".]]

  * This is one of the [[cover card]]s of ''[[Expert Edition Volume.2]]''/''[[Dark Revelation Volume 2]]'' and ''[[Controller of Chaos]]''.
  * This monster appears in the artwork of "[[Super Soldier Rebirth]]", transforming into "[[Black Luster Soldier - Super Soldier]]".
  ** This monster's silhouetted form appears in the artwork of "[[Primal Seed]]".
  * This card appears in the artwork of "[[E☆HERO Pit Boss]]".
  * This monster is a [[retrained]] [[counterpart]] of "[[Black Luster Soldier]]".
  ** Since this monster is key to the classic [[Chaos Dragon]] Deck, and has been Forbidden for several consecutive years, the [[List_of_unofficial_terms#Card_and_theme_names|unofficial]] acronym [[BLS]] usually refers specifically to this monster.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster was used by [[Dimitri]] to imitate [[Yugi Muto]], who used "[[Black Luster Soldier (anime)|Black Luster Soldier]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** In the anime, despite this monster being so rare it was thought not to exist (as stated during Dimitri's Duel with [[Jaden Yuki]]), in {{episode|Yu-Gi-Oh! GX|049|ref}} it was seen in what appeared to be the [[Kame Game Store]], being viewed by two kids when [[Kagemaru]] began to absorb [[Duel Monster Spirit]]s.
  * This monster is the opposite counterpart of "[[Chaos Emperor Dragon - Envoy of the End]]".
  ** This monster's [[Attribute]] is [[LIGHT]], while "Chaos Emperor Dragon - Envoy of the End's" Attribute is [[DARK]].
  ** The color of the circle in the background of this card's artwork background is also the opposite of that in the artwork of "Chaos Emperor Dragon".
  ** Its opposite counterpart also received a long-term tenure at the Forbidden list, is another key card of the aforementioned classic Deck, and also goes under an acronym: "CED".
  * This monster has four counterparts:
  ** A "[[Toon]]" counterpart: "[[Toon Black Luster Soldier]]".
  ** A DARK counterpart: "[[Black Luster Soldier - Envoy of the Evening Twilight]]".
  ** A younger counterpart: "[[Beginning Knight]]".
  ** A combination with "Chaos Emperor Dragon - Envoy of the End": "[[Chaos End Ruler - Ruler of the Beginning and the End]]".
  ** A [[Sky Scourge]] counterpart: "[[Sky Scourge Enrise]]".
  *** The effect of "[[Ruin, Queen of Oblivion]]" is also based on this card's effect.
  * This monster has a ''[[Rush Duel]]'' [[Jersey]] parody: "[[Black Luster Soljersey - Envoy of the Drying]]".
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|118|ref}}, specifically from the panel showing [[Dark Yugi (manga)|Dark Yugi]] with "[[Black Luster Soldier (manga)|Black Luster Soldier]]" (albeit with the lower body also visible), after the latter [[destroy]]ed "[[Harpies' Pet Dragon (manga)|Harpies' Pet Dragon]]" by battle.

