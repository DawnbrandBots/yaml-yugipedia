title: Card Trivia:Lightning Tricorn
wikitext: |-
  {{Navigation}}

  * This is the third of the three [[Unicorn]] monsters ("[[Thunder Unicorn]]" > "[[Voltic Bicorn]]" < '''"Lightning Tricorn"''').
  ** This monster features two horns and 600 [[ATK]] more than "Thunder Unicorn", and one horn and 300 ATK more than "Voltic Bicorn".
  ** Unlike "Thunder Unicorn" and "Voltic Bicorn", who appear as actual horses, this monster features a metallic and robotic appearance.
  * This monster features the highest [[original ATK]] (2800) out of the Unicorn [[Synchro Monster]]s and its effect can [[Special Summon]] "Thunder Unicorn" and "Voltic Bicorn". This reflects its owner, [[Jean]], the leader of [[Team Unicorn]] who appreciates teamwork and unity with his fellow team members, [[Andre]] and [[Breo]].
