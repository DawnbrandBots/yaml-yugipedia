title: Card Trivia:Mecha Phantom Beast Raiten
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Mitsubishi J2M|Mitsubishi J2M]], nicknamed "Raiden" (thunderbolt), which was used by the [[wikipedia:Imperial Japanese Navy Air Service|Imperial Japanese Navy Air Service]] from 1942 to 1945.
  ** This card's name is a portmanteau of the above and the [[wikipedia:Japanese marten|Japanese marten]].
