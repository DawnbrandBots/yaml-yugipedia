title: Card Trivia:Constellar Rasalhague
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Constellar Star Cradle]]", "[[Focused Aquamirror]]", and "[[Upshift]]".
  ** This monster's staff appears in the artwork of "[[Curse of the Shadow Prison]]".
  * This monster's name is based on [[wikipedia:Alpha Ophiuchi|Rasalhague]], the brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Ophiuchus|Ophiuchus]].
  ** This monster's Japanese name, "Hawwa", is based on the original Arabic reading of Rasalhauge (رأس الحواء ''ra's al-ḥawwā{{'}}'').
  ** The constellation and the astrological symbol for Ophiuchus (⛎︎) appears in the background of this card's artwork, with the location of Rasalhague denoted by the encircled star in the constellation.
  *** In astrology, Ophiuchus has sometimes been used in sidereal astrology as a thirteenth sign in addition to the twelve signs of the tropical Zodiac constellations.
  ** This monster is depicted with a staff entwined with the golden image of a serpent, referencing how Ophiuchus is also known as the "serpent-bearer" constellation.
  *** The above-mentioned fact also references the legend of [[wikipedia:Asclepius|Asclepius]], the god of medicine and healing in [[wikipedia:Greek mythology|Greek mythology]], who is depicted wielding a rod entwined with a single serpent. After he was smote for resurrecting souls of the dead, [[wikipedia:Zeus|Zeus]], the king of the Olympian Gods, placed his body among the stars as the constellation, Ophiuchus.
  * According to the [[Duel Terminal Master Guide card storylines]], this monster used the power of the "[[Gishki Aquamirror]]" to fuse itself with the three corrupted "[[Ice Barrier]]" dragons to become "[[Evilswarm Kerykeion]]" and defeat "[[Sophia, Goddess of Rebirth]]" together with "[[Constellar Sombre]]". This means it is not a true "[[lswarm]]" monster, and is also not completely corrupted, compared to the other Duel Terminal monsters infected by the "lswarm" virus.
  ** Afterwards, "Evilswarm Kerykeion" likely transforms into its upgraded "Constellar" form, "[[Constellar Caduceus]]". This is based on how both monsters highly resemble each other, how they are named after [[wikipedia:Caduceus|the staff entwined with two serpents]], and how the upper portion of the staff wielded by "Constellar Caduceus" highly resembles the logo of the "lswarm" [[archetype]].
