title: Card Trivia:Secret Six Samurai - Genba
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Six Shinobi]]".
  * This monster is likely based on [[wikipedia:Karasawa Genba|Karasawa Genba]], a figure from the [[wikipedia:Sengoku period|Sengoku period]] that is described as a samurai or a ninja in different sources.
  ** Genba is noted for being proficient with using gunpowder weapons; fittingly, this monster is depicted with such weapon in its card artwork.
