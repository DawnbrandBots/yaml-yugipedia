title: Card Trivia:Unformed Void
wikitext: |-
  {{Navigation}}

  * This monster's design features forty-seven visible eyes.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster [[detach]]es an [[Xyz Material]] to [[activate]] its effect, it absorbs it into the void-like space in the center of its body, causing it to project bright lights that cause the opponent's [[Xyz Monster]]s to glow and absorb dark particles representing their [[ATK]]. The particles then converge into the space and causes a red-colored explosion similar to how the [[Overlay Network]] explodes during an [[Xyz Summon]].
  ** In the anime, when this monster's effect is activated, the eyes on its body open up, glow red, and extend outwards before using the dark particles to create shadow copies of the opponent's Xyz Monsters while also copying their combined ATK. It also creates another copy of the same monster it uses its effect against more than once, which was seen in {{episode|ZEXAL|089|ref}} when this monster created a shadow copy of "[[Number 6: Chronomaly Atlandis (anime)|Number 6: Chronomaly Atlandis]]" and two copies of "[[Number 61: Volcasaurus (anime)|Number 61: Volcasaurus]]".
