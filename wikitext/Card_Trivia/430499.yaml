title: Card Trivia:Hebo, Lord of the River
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Hebo|Hebo]], the god of [[wikipedia:Yellow River|Yellow River]] in [[wikipedia:Chinese mythology|Chinese mythology]].
  ** This monster's appearance is based on a ''[[wikipedia:Kappa (folklore)|kappa]]'', a river creature in Japanese folklore who is depicted with a humanoid reptilian body with a dish on its head. This monster is depicted holding a ''shirikodama'', a mythical ball said to contain the soul of the human victim of a ''kappa''.
  * This is the first [[Aqua]] [[Spirit monster]].
