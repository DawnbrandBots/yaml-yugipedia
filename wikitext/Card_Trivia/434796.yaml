title: Card Trivia:Odd-Eyes Persona Dragon
wikitext: |-
  {{Navigation}}

  * This monster's tail resembles that of "[[Dark Rebellion Xyz Dragon]]", the ace monster of [[Yuto (manga)|Yuto]], one of [[Yuya Sakaki (manga)|Yuya Sakaki's]] alternate ''persona''.
  * This monster shares the same [[Attribute]] ([[DARK]]), [[Level]] (5), [[original ATK and DEF]] (1200/2400) and  [[Pendulum Scale]] (1) with "[[Stargazer Magician]]".
  ** Fittingly, this monster, along with "[[Odd-Eyes Mirage Dragon]]", are the first two [[Pendulum Monster]]s to be used by [[Yuya Sakaki]] in his anime and manga incarnations.
  * The colors of the three "[[Odd-Eyes]]" [[Dragon]] monsters that debuted in the manga represent the three colors the [[wikipedia:human eye|human eye]] perceives light: Red for this monster, blue for "[[Odd-Eyes Phantom Dragon]]", and green for "Odd-Eyes Mirage Dragon".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|003|ref}}, specifically from the panel showing [[Odd-Eyes Persona Dragon (manga)|this monster]] manifesting via the effect of "[[Odd-Eyes Phantom Dragon (manga)|Odd-Eyes Phantom Dragon]]".
