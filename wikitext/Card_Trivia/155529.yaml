title: Card Trivia:Asceticism of the Six Samurai
wikitext: |-
  {{Navigation}}

  * [[wikipedia:asceticism|Asceticism]] is defined as extreme self-denial and austerity, especially befitting of the "[[Six Samurai]]" theme.
  ** It often allows the summon of the older and more mature "Six Samurai" via their younger counterparts, such as the "[[Grandmaster of the Six Samurai|Grandmaster]]" from "[[Legendary Six Samurai - Kizan|Kizan]]" while his effect is active, and the "[[Hand of the Six Samurai|Hand]]" from "[[Legendary Six Samurai - Mizuho|Mizuho]]".
  *** Asceticism can also imply doing a normally avoided task for the betterment of the community, which can be applied to the "Six Samurai" clan and their [[Great Shogun Shien|shogun]] "allowing" newer members in order to gain their assistance.
  * "[[Legendary Six Samurai - Mizuho]]" appears in this card's artwork.
  ** A smaller version of "Mizuho" can be seen under the larger image of herself, standing underneath a waterfall, referring to a popular form of asceiticism. Training underneath a waterfall to temper one's mind and body is a common training method in Asian cultures.
  ** "Mizuho" bears the "[[Shien]]" symbol on her forehead.
