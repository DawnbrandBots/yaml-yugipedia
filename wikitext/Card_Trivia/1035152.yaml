title: Card Trivia:Weiss, Lightsworn Archfiend
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Lightsworn]]" counterpart of "[[Snoww, Unlight of Dark World]]".
  ** This monster's name is based on the English word "vice" and the German word for "white", ''Weiss'', similar to how "Snoww's" name is based on the color white.
  ** This monster's [[original ATK and DEF]] (0/1700) are the inverse of those of "Snoww" (1700/0).
  * This monster's German, Portuguese, and Spanish ''[[TCG]]'' names explicitly state that it is a demoness, with the Portuguese and Spanish names ungrammatically pairing the masculine words for "demon" and the feminine adjectives for "luminous."
