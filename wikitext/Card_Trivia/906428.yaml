title: Card Trivia:World Legacy Token
wikitext: |-
  {{Navigation|mode=token}}

  * This Token represents the soul of "[[Galatea, the Orcust Automaton]]", revived by "[[Avida, Rebuilder of Worlds]]".
  * This Token appears in the artworks of "[[Girsu, the Orcust Mekk-Knight]]" and "[[Vesper Girsu]]".
  ** Conversely, the hand of "Girsu, the Orcust Mekk-Knight" appears in this Token's artwork.
  * The [[List of Yu-Gi-Oh! Master Duel accessories/Mate|mate]] version of this Token in ''[[Yu-Gi-Oh! Master Duel]]'' is named "A New Life - Galatea".
