title: Card Trivia:Gunkan Suship Shirauo-class Carrier
wikitext: |-
  {{Navigation}}

  * "[[Gunkan Sushipyard Seaside Supper Spot]]" appears in this card's artwork.
  * This monster is a [[Card evolutions|combined]] [[Xyz Monster|Xyz]] form of "[[Gunkan Suship Shari]]" and "[[Gunkan Suship Shirauo]]".
  ** This monster is based on an [[wikipedia:Aircraft carrier|aircraft carrier]] and [[wikipedia:Sushi|sushi]] rice (しゃり ''Shari'') adorned with [[wikipedia:Salangidae|Japanese icefish]] (しらうお ''Shirauo'').
  ** The word 「しらうお」 (''Shirauo'') appears on the front of this monster.
  ** This card's [[ATK]]/[[DEF]] are equal to the combined ATK/DEF of "Shari" and "Shirauo".
  ** Fittingly, this card's effects can be applied if it is [[Xyz Summon]]ed using both "Shari" and "Shirauo" as [[Xyz Material]]s.
