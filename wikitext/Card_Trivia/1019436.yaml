title: Card Trivia:Pendulum Witch
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of "[[Performapal Pendulum Sorcerer]]".
  * This monster's scepter has a ''[[wikipedia:Cleyera japonica|sakaki]]'' branch wrapped around it. This references the last name of [[Yuya Sakaki]], who uses a [[Pendulum Monster]] Deck in ''[[Yu-Gi-Oh! ARC-V]]''.
