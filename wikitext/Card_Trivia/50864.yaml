title: Card Trivia:Dark Driceratops
wikitext: |-
  {{Navigation}}

  * Although they cannot be seen in the card's artwork, in the [[World Championship]] video games and the [[Yu-Gi-Oh! GX|GX]] series "Dark Driceratops" has wings, leading to the belief that the card was based on [[Wikipedia:Griffin|Griffins]], mythical winged creatures that have the head and wings of an eagle and the body and legs of a lion.
  * Curiously enough, the "Griffin" link was also made in real life. The Protoceratops was thought to be the remains the mythical Griffin for countless centuries by Mongolian natives until famed Paleontologist Roy Chapman Andrews discovered the species during his exploration of the Gobi Desert in the 1900's.
  * The [[Plant|trees]] in this card's artwork bears a slight resemblance to "[[Yashinoki]]".
  * The card's name comes from the dinosaur [[Wikipedia:Triceratops|Triceratops]].  The "Dri" part of the name could come from Drei, the German number for "three".
  * This card appears to be an omnivore because it is eating a plant by ripping it off its roots, but closer examination also shows it has sharp teeth at the ends of its mouth.
