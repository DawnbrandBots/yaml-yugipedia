title: Card Trivia:Orbital 7 (card)
wikitext: |-
  {{Navigation}}

  * This is the [[Monster Card]] version of [[Orbital 7]], a character from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]].
  ** This monster's effect [[support]]ing the "[[Photon]]" and "[[Galaxy]]" [[archetype]]s relates to the relationship between the character and the archetypes' user, [[Kite Tenjo]]. Also, the [[You Got It Boss! Counter]] is based on how Orbital 7 replies to Kite's orders in the anime.
  ** The background of this card's artwork depicts its fighting form, which Orbital 7 uses to attack [[Reginald Kastle|Reginald "Shark" Kastle]] after stealing the [[Emperor's Key]], and [[Yuma Tsukumo]] when he infiltrated Kite's laboratory. This form is also referenced in this monster's effect to change its [[ATK]] to 2000 by removing all You Got It Boss! Counters from it.
  *** The part of this monster's effect that prevents it from attacking directly after increasing its ATK and being sent to the [[Graveyard]] later may reflect the fact that Orbital 7 tends to be a clumsy fighter in the anime, often getting his weapons jammed when he tries.
  **** In fact, in the Japanese version of the anime, when he attacked Yuma, he called it a "direct attack", which completely failed despite Yuma not having moved an inch.
  ** This monster is supported by the "[[Super Defense Robot]]" archetype, referring to how the character uses the archetype in the anime.
  * This monster has a "Photon" [[counterpart]]: "[[Photon Orbital]]".
  * This monster has an [[Card evolutions|upgraded]] counterpart: "[[Galaxy Defense Robot Orbital 7]]".
