title: Card Trivia:Sonic Boom
wikitext: |-
  {{Navigation}}

  * "[[Mecha Phantom Beast Concoruda]]" appears in this card's artwork.
  ** This is appropriate, as "Concoruda" is based off the Concorde aircraft, which is a supersonic passenger aircraft.
  * A [[wikipedia:Sonic boom|sonic boom]] is the sound associated with the shock waves created by an object traveling through the air faster than the speed of sound.
  * This card has the following references/relations to/with "[[Limiter Removal]]":
  ** Both have an effect that doubles a [[Machine]] monster's [[ATK]] (albeit this card is more specific) and destroys the affected monsters during the [[End Phase]].
  ** Both card's artworks depicts references of high speed ("Limiter"'s shows a maxed out [[wikipedia:speedometer|speedometer]] and this card shows a titular sonic boom, which as mentioned above is a loud sound associated with the distortion of air wrought by an object that travels at a speed that breaks the sound barrier.)
  * This card appears in the artwork of "[[Reverse Breaker]]".
