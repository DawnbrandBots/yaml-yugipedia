title: Card Trivia:Constellar Pleiades
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Sacred Star Knights!!]]''.
  * This monster appears in the artworks of "[[Constellar Star Chart]]" and "[[Xyz Battle Chain]]".
  * This monster's name is based on [[wikipedia:Pleiades|Pleiades]], a star cluster located in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Taurus (constellation)|Taurus]], which appears in the background of this card's artwork.
  ** This monster's appearance features a cape with seven pointed ends, referencing how the Pleiades is also known as the "Seven Sisters".
