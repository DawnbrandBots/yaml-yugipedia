title: Card Trivia:Gouki Gameface
wikitext: |-
  {{Navigation}}

  * "[[Dinowrestler Chimera T Wrextle]]" and "[[Gouki The Great Ogre]]" appear this card's artwork.
  ** "[[Gouki The Tyrant Ogre]]" appears to be the end result of this card's artwork, where "Great Ogre" was victorious and cannibalized the defeated "T Wrextle". 
  * This card's Japanese name, "Strong Oni Fighting Spirit", references the Japanese name of [[George Gore]]/The Gore's first [[Skill]], "[[Pain and Gain]]", "Fighting Spirit", which allows him to [[Special Summon]] all "[[Gouki]]" monsters that were [[destroyed by battle]] that turn from the [[Graveyard]].
  * This card's effect [[support]]ing the "[[Dinowrestler]]" and "[[G Golem]]" [[archetype]]s is based on how The Gore used the "Dinowrestler" archetype while working as a bounty hunter for [[SOL Technologies]], and later used "[[G Golem Crystal Heart (anime)|G Golem Crystal Heart]]" while implanted with [[Earth (character)|Earth's]] [[A.I. Dueling Chip]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
