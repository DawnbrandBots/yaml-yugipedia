title: Card Trivia:Reactan, Dragon Ruler of Pebbles
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragoncarnation]]" (being the yellow light coming from the mountains).
  * This card is named after a [[wikipedia:Reagent|reagent]].
  * This monster is a younger form of "[[Redox, Dragon Ruler of Boulders]]".
  ** This monster has 2 horns, while those of "Redox" were somehow cut off.
  ** Additionally, pebbles are the smaller versions of boulders.
  ** Fittingly, "Redox" is named after [[wikipedia:Redox|redox]], a type of chemical reaction, and this card is named after a reactan, which are the initial substance in a chemical reaction.
  * This monster is similar to an ''[[wikipedia:Ankylosaurus|Ankylosaurus]]''.
  * This card is the only younger form of the [[Dragon Ruler]] monsters to have higher [[ATK]] than its older form.
