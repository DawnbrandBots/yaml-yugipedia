title: Card Trivia:Dragonecro Nethersoul Dragon
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Underworld Dragon Dragonecro" is based on [[wikipedia:Hell|Hell]], an afterlife realm in the Christian Catholic religion inhabited by the Devil, demons, and the departed souls of sinners.
  ** This monster shares a common theme with "[[Ascension Sky Dragon]]" and "[[Void Ogre Dragon]]", as the three of them are each associated with an afterlife realm in the in the Christian Catholic religion. This monster is associated with Hell, "Void Ogre Dragon" is associated with [[wikipedia:Purgatory|Purgatory]], and "Ascension Sky Dragon" is associated with [[wikipedia:Heaven|Heaven]].
  * This monster has an [[Card evolutions|upgraded]] form: "[[Dragocytos Corrupted Nethersoul Dragon]]".
  * This is the only [[Duel Dragon]] that is not a [[Synchro Monster]], being a [[Fusion Monster]] instead.
  ** This is also the first Fusion Monster to appear in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This monster can be considered the [[DARK]] [[counterpart]] to "Ascension Sky Dragon".
  ** Both monsters have opposite [[Attribute]]s; this monster's Attribute is DARK, while the Attribute of "Ascension Sky Dragon" is [[LIGHT]].
  ** Both monsters' [[original ATK and DEF]] are opposite of each other; this monster has 3000 [[ATK]] and 0 [[DEF]], while "Ascension" has ? ATK (0 by default) and 3000 DEF.
  ** Both monsters are the Duel Dragons of the Goodwin brothers in the [[Yu-Gi-Oh! 5D's (manga)|manga]], referencing their opposite plans.
  *** Ironically, despite this monster being associated with Hell, its owner, [[Skeleton Knight|Roman Goodwin]], wanted to free his brother [[Rex Goodwin (manga)|Rex]] from the [[Ultimate God]]'s dark miasma and save him, while Rex, "Ascension Sky Dragon's" [[Duel Priest]], wanted to resurrect and control the wicked entity.
  * This is the second monster to feature an effect that prevents it from destroying other monsters by battle, after "[[Blackwing - Abrolhos the Megaquake]]". They are also the only two monsters with this property whose [[Type]]s are not [[Illusion]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|003|ref}}, specifically from the panel showing [[Underworld Dragon Dragonecro (manga)|this monster]] being Summoned.
