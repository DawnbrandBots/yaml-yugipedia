title: Card Trivia:Trap Reactor・Y FI
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Delta Reactor]]".
  * This monster's suffixed letters spell out the second of the three-part naming scheme of "[[Flying Fortress SKY FIRE]]".
  * The red-colored explosion in the background of this card's artwork references how [[Trap Card]]s features a red-colored card border.
  ** The red-colored explosion appears in the artwork of "Flying Fortress SKY FIRE".
