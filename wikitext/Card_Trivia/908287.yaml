title: Card Trivia:Ancient Warriors - Savage Don Ying
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ancient Warriors Saga - Deception and Betrayal]]".
  * This monster is based on [[wikipedia:Dong Zhuo|Dong Zhuo]] ([[wikipedia:Courtesy name|courtesy name]]: Zhongying), from the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]''. Dong Zhuo was depicted as a cruel tyrant who exploited the people, which is reflected in this card forcing the opponent to pay LP.
  * Like the other "[[Ancient Warriors]]" monsters, this monster's armor is based on a beast, in this case a boar.
