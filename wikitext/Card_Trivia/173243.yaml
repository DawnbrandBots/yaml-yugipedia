title: Card Trivia:Leviair the Sea Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Leviathan|Leviathan]]" (a mythical sea serpent depicted in the [[Wikipedia:Hebrew Bible|Hebrew Bible]]) and "air" (reflecting its [[WIND]] [[Attribute]]).
  * This monster's Japanese title ({{Ruby|虚|こ}}{{Ruby|空|くう}}, ''Kokūkairyū'') features the kanji ''Kokū'' ({{Ruby|虚|こ}}{{Ruby|空|くう}}), which means "void" or "empty space", reflecting its effect to [[Special Summon]] a [[Level 4]] or lower monster from [[banish]]ment.
