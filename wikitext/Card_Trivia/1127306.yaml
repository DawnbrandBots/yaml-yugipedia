title: Card Trivia:D/D/D Zero Doom Queen Machinex
wikitext: |-
  {{Navigation}}

  * This monster's Japanese title, "Zero Death King" ({{Ruby|零|れい}}{{Ruby|死|じ}}{{Ruby|王|おう}}, ''Reijiō''), is likely a play on the Japanese name of [[Declan Akaba]],  Reiji Akaba, who used the "[[D/D]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime and [[Yu-Gi-Oh! ARC-V (manga)|manga]].
  * This monster's design is based on [[Henrietta Akaba]], the mother of Declan Akaba and the wife of [[Leo Akaba]], who also got a card rendition in ''[[Doom of Dimensions]]''.
  * This monster is a [[counterpart]] of "[[D/D/D Deviser King Deus Machinex]]".
  ** Interestingly, while "D/D/D Deviser King Deus Machinex" follows the Japanese naming scheme based on office roles of the "[[D/D/D]]" monsters in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster's name follows the motif around the number "0" in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
  * This is the second "D/D/D" monster not to have the word "King" in its English name, although it has the word "Queen". Unlike the first such "D/D/D" monster, "[[D/D/D/D Super-Dimensional Sovereign Emperor Zero Paradox]]", this monster does have the kanji for "King" (王) in its Japanese name; this change was likely to distinguish it from the similarly-named "[[Doom King]]" archetype, which is named 「{{Ruby|死|し}}{{Ruby|偉|い}}{{Ruby|王|おう}}」 (''Shi'i'ō'', "Death Great King") in Japanese.
