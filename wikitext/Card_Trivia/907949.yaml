title: Card Trivia:Star Cat Destronya
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Nyanderful Rush]]".
  * "Destronya" is a portmanteau of "destroyer" and "''nya''" (the Japanese onomatopoeia for a cat's meow).
  * This is the first [[Fusion Monster]] to be [[Fusion Summon]]ed, as well as the first monster [[Special Summoned]] from the [[Extra Deck]], in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
