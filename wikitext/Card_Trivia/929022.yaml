title: Card Trivia:Ursarctic Megatanus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ursarctic Departure]]".
  * The [[wikipedia:Big Dipper|Big Dipper]] [[wikipedia:Asterism|asterism]] appears on this monster's leg.
  * This monster's name is a portmanteau of "mega" and "''Ursus thibetanus''", the Latin name of the [[wikipedia:Asian black bear|Asian black bear]].
