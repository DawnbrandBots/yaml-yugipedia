title: Card Trivia:CXyz Battleship Cherry Blossom
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Furious-Flower Battleship Taoyame" is based on the similarly-named cultivar of [[wikipedia:Japanese cherry|Japanese cherry trees]].
  ** This is supported by this monster's ''[[TCG]]'' name, "Battleship Cherry Blossom", which is the biggest cultivar of the ''[[wikipedia:Prunus|Prunus]]'' genus of which the the taoyame is derived from.
  * This monster is the "[[CXyz]]" [[Card evolutions|evolution]] of "[[Battlecruiser Dianthus]]".
