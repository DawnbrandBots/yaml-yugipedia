title: Card Trivia:Zefra Metaltron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Metaltronus]]".
  * This monster is named after the Judaic archangel, [[wikipedia:Metatron|Metatron]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Metatron is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Keter|Keter]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, this monster's design features ten different-colored spheres positioned similarly to the sefirots in the Tree of Life.
  *** This monster's design also features a silver sphere on its chest plate, with its positioning representing the eleventh sefirot [[wikipedia:Da'at|Da'at]]. Likewise, it is the only card in ''[[Duel Terminal]]'' lore to depict the sefirot Da'at in its artwork.
  * This is the first "[[Zefra]]" [[Extra Deck]] monster and the first "Zefra" non-[[Pendulum Monster]].
  * This monster has a "[[Nekroz]]" counterpart: "[[Nekroz of Metaltron]]".
  * This monster appears to be a "Zefra" counterpart of "[[Metaltron XII, the True Dracombatant]]", sharing the same naming scheme, [[Attribute]] ([[LIGHT]]), [[Type]] ([[Wyrm]]), color scheme, pose, and theme of combining the elements of other monsters into itself.
  ** This monster's staff is similar to that of "[[Ritual Beast Tamer Zefrawendi]]".
  ** The armor plate on this monster's right shoulder is similar to that of "[[Shaddoll Zefracore]]".
  ** The protectors between this monster's shoulders and chest are similar to those of "[[Satellarknight Zefrathuban]]".
  ** The spikes on this monster's upper leg's armor are similar to those of "[[Shaddoll Zefranaga]]".
  ** The sword attached to this monster's left arm and sword whip hanging below it are similar to those of "[[Zefrasaber, Swordmaster of the Nekroz]]".
