title: Card Trivia:Sangen Kaimen
wikitext: |-
  {{Navigation}}

  * "[[Tenpai Dragon Chundra]]" appears in this card's artwork.
  * This card's name is based on "''kaimen''" ({{Ruby|開|カイ}}{{Ruby|門|メン}}), a term used in [[wikipedia:Japanese mahjong|Japanese mahjong]] which refers to breaking the wall of tiles after the die roll to determine where players draw the tiles for their starting hands and therefore marks the beginning of a new hand (much like this card may be used to start a combo play).
