title: Card Trivia:Swords of Burning Light
wikitext: |-
  {{Navigation}}

  * This card's name, artwork, and effect are similar to those of "[[Swords of Revealing Light]]" and "[[Swords of Concealing Light]]".
  ** This is also the only card of the three that is not destroyed during a specific [[Duel]] phase.
  ** This is also the only card of the three that does not have three swords on its artwork.
  *** Like how the three swords on the artwork of "Swords of Revealing Light" represent the number of turns it lasts, the five swords on this card's artwork represents the number of cards the opponent needs to have in hand to destroy this card (also potentially equivalent to five of the activator's turns, if used when the opponent has no cards in their hand and only uses their [[normal draw]] to refill it).
