title: Card Trivia:Chain Destruction
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Curse of Anubis (set)|Curse of Anubis]]'' and the box of ''[[Duelist Legacy Volume.1]]''.
  * This card has a [[banish]]ing counterpart, "[[Chain Disappearance]]", which requires a weaker monster to activate.
  ** "[[Chain Dispel]]" and "[[Chain Hole]]" are also counterparts of this card.
