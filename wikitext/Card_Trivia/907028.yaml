title: Card Trivia:Ancient Warriors Saga - Chivalrous Path
wikitext: |-
  {{Navigation}}

  * This card is based on the events at the end of the [[wikipedia:Battle of Red Cliffs|Battle of Red Cliffs]], where after his defeat (and successive ambushes), Cao Cao is  [[wikipedia:List of fictitious stories in Romance of the Three Kingdoms|intercepted but spared by Guan Yu]] thanks to [[wikipedia:List of fictitious stories in Romance of the Three Kingdoms|Cao's previous sparing of Guan Yu]] and Guan Yu's feeling of kinship and pity for [[wikipedia:Battle of Xiapi|his former comrades]].
  * Fittingly, "[[Ancient Warriors - Loyal Guan Yun]]", "[[Ancient Warriors - Ambitious Cao De]]" and the Red Horse (based on the [[wikipedia:Red Hare|Red Hare]] which would be under Guan Yu's possession at this point) that appears in "[[Ancient Warriors - Rebellious Lu Feng]]" appear in this card's artwork.
