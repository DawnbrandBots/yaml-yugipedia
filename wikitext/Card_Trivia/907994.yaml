title: Card Trivia:Worldsea Dragon Zealantis
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Mega Pack 08]]''.
  * This monster's name is a portmanteau of the names of two sunken continents: [[wikipedia:Zealandia|Zealandia]] (a real-life continent) and [[wikipedia:Atlantis|Atlantis]] (a fictional continent).
  * This is the first non-[[Link 1 Monster Cards|Link 1]] [[Link Monster]] that can be [[Link Summon]]ed using just one monster.
  ** It was the only such monster until the release of "[[Perfectron Hydradrive Dragon]]".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card's summoning animation depicts this monster as walking on all fours, implying that this monster is so large that it can walk on the ocean floor with its feet.
