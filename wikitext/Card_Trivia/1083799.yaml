title: Card Trivia:Fiendsmith's Rextremende
wikitext: |-
  {{Navigation}}

  * This monster is named after "Rex tremendae" ("tremendous king" in Latin), a line in the eighth verse of ''[[wikipedia:Dies irae|Dies irae]]'' and the third part of the [[wikipedia:Sequentia (musical form)|sequentia]] in [[wikipedia:Wolfgang Amadeus Mozart|Wolfgang Amadeus Mozart's]] [[wikipedia:Requiem (Mozart)|Requiem]].
