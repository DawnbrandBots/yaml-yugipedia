title: Card Trivia:Elemental HERO Heliosphere
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Heliosphere|heliosphere]], the region surrounding the [[wikipedia:Sun|Sun]] and the [[wikipedia:Solar System|Solar System]] encompassed by an electromagnetic field and solar wind.
  ** This monster's [[Fusion Material]]s reference the elements that make up the heliosphere: the Sun (represented by the [[FIRE]] [[Attribute]] "[[Elemental HERO Burstinatrix (Rush Duel)|Elemental HERO Burstinatrix]]"), solar wind (represented by the [[WIND]] Attribute "[[Elemental HERO Avian (Rush Duel)|Elemental HERO Avian]]"), and electromagnetic fields (represented by the [[LIGHT]] Attribute "[[Elemental HERO Sparkman (Rush Duel)|Elemental HERO Sparkman]]").
  * This monster is a ''[[Rush Duel]]'' counterpart to "[[Elemental HERO Tempest]]".
