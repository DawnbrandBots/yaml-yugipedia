title: Card Trivia:Dark Unity
wikitext: |-
  {{Navigation}}

  * This card's first effect likely references {{episode|GX|140|ref}}, where [[The Supreme King]] used "[[Super Polymerization]]" to [[Special Summon]] "[[Evil HERO Dark Gaia]]", despite it only being able to be Special Summoned by the effect of "[[Dark Fusion]]". This similarity in effect is shared by the card "[[Supreme King's Castle]]".
  ** Fittingly enough, the second effect to change the [[Type]] of the opponent's Special Summoned monster to [[Rock]] in order to "steal" said monster and facilitate the use of "Super Polymerization" reflects how The Supreme King used that same [[Spell]] to fuse both his "[[Evil HERO Infernal Gainer]]" and [[Jim Crocodile Cook]]'s own "[[Gaia Plate the Earth Giant]]" into "Dark Gaia" in that same episode.
