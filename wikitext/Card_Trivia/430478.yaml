title: Card Trivia:Full Force Virus
wikitext: |-
  {{Navigation}}

  * This card has several Counterparts: "[[Crush Card Virus]]", "[[Deck Devastation Virus]]", "[[Eradicator Epidemic Virus]]", and "[[Grinning Grave Virus]]".
  ** Of the "[[Virus]]" [[Trap]]s, this card represents the letter "F" in the alphabetical alliteration pattern.
  * This card's Japanese name begins with the name of the anime-only card "[[Deck Destruction Virus]]", as well as the Japanese name of "[[Crush Card Virus]]" ("Deck Destruction Virus of Death").
  * The kanji "影" on the viruses in this card's artwork means "shadow".
  * The Japanese name of "[[Duke Shade, the Sinister Shadow Lord]]" refers to this card.
