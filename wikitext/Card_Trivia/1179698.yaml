title: Card Trivia:The Phantom Knights of Doomed Solleret
wikitext: |-
  {{Navigation}}

  * This monster is a retrained counterpart of "[[The Phantom Knights of Silent Boots]]".
  ** This monster is based on the [[wikipedia:Sabaton|solleret]], a piece of medieval plate armor designed to protect the foot.
  * This monster can be seen as a "[[The Phantom Knights]]" counterpart of "[[Speedroid Terrortop]]", as both are [[Level 3]] monsters with an effect that [[Special Summon]]s themselves from the [[hand]] if the player [[control]]s no monsters, enable the Summoning of another Level 3 monster, and are associated with the [[Four Dimensional Dragons]] and [[Z-ARC]]'s incarnations.
