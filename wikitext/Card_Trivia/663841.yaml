title: Card Trivia:Infernoble Knight - Roland
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Horn of Olifant]]".
  ** A chibi version of this monster appears in the artwork of "[[The Continuing Epic of Charles]]".
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form: "[[Infernoble Knight Captain Roland]]".
  ** This monster and "Infernoble Knight Captain Roland" are based on [[wikipedia:Roland|Roland]] from ''[[wikipedia:The Song of Roland|The Song of Roland]]'', a poem based on the [[wikipedia:Battle of Roncevaux Pass|Battle of Roncevaux Pass]] in 778, during the reign of [[wikipedia:Charlemagne|Charlemagne]].
  ** A flaming version of "[["Infernoble Arms - Durendal"]]" appears in this card's artwork. This is fitting, as [[wikipedia:Durendal|Durendal]] was Roland's sword.
