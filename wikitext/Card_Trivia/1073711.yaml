title: Card Trivia:Fake Neos
wikitext: |-
  {{Navigation}}

  * A helmet based on the head of "[[Elemental HERO Neos (Rush Duel)|Elemental HERO Neos]]" appears in this card's artwork.
  * This is the [[Monster Card]] version of the man appearing in the artwork of "[[Fake Hero]]".
  ** Fittingly, this monster's effect to treat its name as "Elemental HERO Neos" is based on how "[[Fake Hero (anime)|Fake Hero]]" was used to [[Special Summon]] "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" multiple times in the ''[[Yu-Gi-Oh! GX]]'' anime.

