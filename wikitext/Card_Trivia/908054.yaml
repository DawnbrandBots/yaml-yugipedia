title: Card Trivia:Labyrinth Wall Shadow
wikitext: |-
  {{Navigation}}

  [[File:D-034_Wall_Shadow_moving.png|thumb|right|200px|"[[Wall Shadow (manga)|Wall Shadow]]" moving along the Labyrinth]]

  * This is one of the [[cover card]]s of ''[[Maze of Memories]]''.
  * "[[Labyrinth Wall]]" and "[[Wall Shadow]]" appear in this card's artwork.
  ** This is the [[Field Spell Card]] [[counterpart]] of "Labyrinth Wall".
  * This card's effects are based on the [[Labyrinth Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], in which "[[Labyrinth Wall (manga)|Labyrinth Wall]]" was used as the [[terrain]].
  ** This card's effect to prevent non-high level monsters from attacking is based on the rules of the Labyrinth Duel, in which monsters could advance through as many squares in the labyrinth equal to the value of their Level, and could only battle monsters adjacent to them. The monsters used by the [[Paradox Brothers]] were [[Level 5]] or higher, and the only monsters that attacked were Level 5 or higher monsters.
  ** This card's effect to destroy a monster with less than 1600 [[ATK]] at the start of the [[Battle Phase]] references the 1600 ATK "[[Wall Shadow (manga)|Wall Shadow]]", which had the ability to move freely around the labyrinth walls and launch a preemptive strike on any monster entering the labyrinth, destroying [[Yami Yugi]]'s weaker monsters.
  ** This card's effect to place "[[Sanga of the Thunder]]", "[[Kazejin]]", and "[[Suijin]]" in the [[Spell & Trap Zone]] as [[Continuous Spell]]s references how the [[Paradox Brothers]] placed the aforementioned monsters on their field, all of which were sealed inside caskets and did not count as monsters. This enabled the Paradox Brothers to easily [[Summon]] "[[Gate Guardian]]".
  * This card's artwork is based on a panel from {{chapter|Yu-Gi-Oh!|093|ref}} showing "Wall Shadow" moving along the labyrinth walls.

