title: Card Trivia:Super Quantal Mech Sword - Magnaslayer
wikitext: |-
  {{Navigation}}

  * "[[Super Quantal Mech King Great Magnus]]" appears in this card's artwork.
  * Like all "[[Super Quant]]" cards, this card's artwork is a homage to some series of ''[[wikipedia:Super Sentai|Super Sentai]]''/''[[wikipedia:Power Rangers|Power Rangers]]''. Specifically, the ability to make three attacks using a single weapon comes from the first finisher attack of [[W:c:powerrangers:Storm Megazord|Storm Megazord]]/[[W:c:powerrangers:Karakuri Giant Senpuujin|Karakuri Giant Senpuujin]], a mecha from ''[[wikipedia:Power Rangers Ninja Storm|Power Rangers Ninja Storm]]''/''[[wikipedia:Ninpuu Sentai Hurricaneger|Ninpuu Sentai Hurricaneger]]''.
  * This card also reinforces the theme of colours in [[Super Quant|this archetype]]. The Super Quant monsters are Red, Green, and Blue, referencing RGB in computer graphics, and a monitor shows a color by overlapping the lights in different intensities.
