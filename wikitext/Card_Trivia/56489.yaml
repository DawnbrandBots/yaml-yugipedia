title: Card Trivia:Commander Gottoms, Swordmaster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gottoms' Emergency Call]]".
  ** This monster's sword appears in the artwork of "[[Saber Vault]]".
  * This monster has 2 upgraded [[Synchro Monsters|Synchro]] forms: "[[X-Saber Gottoms]]" and "[[XX-Saber Gottoms]]".
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', this card kept its translated Japanese name.
  * This is the only non-"[[Saber]]" monster that supports all "Saber" monsters.
