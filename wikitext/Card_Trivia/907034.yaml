title: Card Trivia:Spright Sprind
wikitext: |-
  {{Navigation}}

  * "[[Springans Kitt]]" appears in this card's artwork.
  * This monster appears to be the [[Spright]]s (namely "[[Spright Blue|Blue]] and "[[Spright Red|Red]]" as evidenced by the color of the visible sparks) trapped inside "Springans Kitt"'s armor.
  ** This is reflected in this monster being named after "[[Sprind the Irondash Dragon]]", as "[[Tri-Brigade Kitt]]" used pieces of "Sprind" to build her "Springans" armor during the events of "[[Tribe Drive]]".
