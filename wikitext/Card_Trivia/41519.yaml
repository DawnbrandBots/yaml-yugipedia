title: Card Trivia:Magic Cylinder
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Custom Pack 01]]''.
  * The two cylinders in this card's artwork also appear in the artworks of "[[Amazement Administrator Arlekino]]" (with one hidden behind its wing) and "[[Magicians' Combination]]".
  ** Bullets based on these cylinders appear in the artwork of "[[Magical Cylinders]]".
  * This card was [[Limited]] for 15 formats (all of them prior to September 2010) before the [[September 2010 Lists]] [[Semi-Limited]], the longest of any card on that list.
