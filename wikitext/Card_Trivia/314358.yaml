title: Card Trivia:Lancephorhynchus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Supersoaring]]".
  * This card's name is a portmanteau of "lance" (reflecting this card's [[Pierce|piercing]] [[Pendulum Effect]]), and ''[[wikipedia:Rhamphorhynchus|Rhamphorhynchus]]'' (a genus of pterosaur).
  * This card is the first [[Dinosaur]] [[Pendulum Monster]].
  * This monster has an [[upgrade]]d [[Transcendosaurus]] [[Xyz Monster|Xyz]] form: "[[Transcendosaurus Drillygnathus]]".
