title: Card Trivia:Toon Dark Magician Girl
wikitext: |-
  {{Navigation}}

  * "[[Toon World]]" appears in this card's artwork.
  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Dark Magician Girl]]", as well as the "[[Dark Magician Girl (archetype)|Dark Magician Girl]]" counterpart of "[[Toon Dark Magician]]".
  * This monster appears in the credits of ''[[Yu-Gi-Oh! The Dawn of Destiny]]'', but it cannot be obtained in the game (even by cheating).
  * In the English version of ''[[Yu-Gi-Oh! World Championship 2007]]'', the [[wikipedia:Hexagram|hexagram]] on this monster's chest was not removed.
  * Theoretically, this monster can attain a maximum of 12,800 ATK by its own effect, if each player has three copies of "[[Dark Magician]]", "[[Magician of Black Chaos]]", "[[Dark Magician the Dragon Knight]]", "[[Magician of Chaos]]", "[[Dark Magician of Destruction]]", and "[[Dark Magician, the Pharaoh's Servant]]" in their Graveyards. This is because the latter 4 monsters have their names become "Dark Magician" while they are in the Graveyard.
