title: Card Trivia:S-Force Retroactive
wikitext: |-
  {{Navigation}}

  * The "[[S-Force]]" crest (white coloration) appears on this card's artwork, located above "Retroactive's" helmet visor, partly cut off.
  * Curiously, this is the only main deck "[[S-Force]]" monster so far that doesn't have a column related effect.
