title: Card Trivia:Virakam the Artificial Spirit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magical Name - "Rosa Mundi"]]".
  * The [[beast tamer]] claiming to be Aleister, from {{episode|CARD GAME THE CHRONICLES|13|ref}}, appears in this card's artwork.
  * This monster is named after Soror Virakam, the alternate name of Mary d'Este Sturges, the lover of [[wikipedia:Aleister Crowley|Aleister Crowley]], whom Aleister believed to be one of his "Scarlet Women", the earthly incarnations of the goddess [[wikipedia:Babalon|Babalon]].
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Invoked Babalon]]".
