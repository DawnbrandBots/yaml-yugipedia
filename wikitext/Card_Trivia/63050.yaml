title: Card Trivia:Mask of Darkness
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Future Destruction]]" and "[[Vain Betrayer]]".
  * This card is the [[Trap]] [[counterpart]] of "[[Magician of Faith]]".
  * This card shares the same name as [[Umbra]]'s Japanese name (Mask of Darkness).
