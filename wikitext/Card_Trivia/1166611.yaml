title: Card Trivia:Diabrocken the Ominous Specter
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "Diablo" (the Spanish word for "demon") and "Brocken" (short for "[[wikipedia:Brocken spectre|Brocken spectre]]", the magnified shadow of a person cast onto clouds or mist from a height, often appearing as a ghostly figure surrounded by colorful halos of light when the sun is behind that person).
  ** This monster's Japanese title, "Ghost Light", is based on an [[wikipedia:Atmospheric ghost lights|atmospheric ghost light]], a fiery light that appears in the atmosphere without explanation, which is associated with ghostly objects from different folklore such as the [[wikipedia:Will-o'-the-wisp|will-o'-the-wisp]].
