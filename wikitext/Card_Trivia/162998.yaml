title: Card Trivia:Tiras, Keeper of Genesis
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dimension Slice]]", "[[Overlay Break]]", "[[Overlay Flash]]", "[[Xyz Double Back]]", and "[[Xyz Import]]".
  * "[[The Sanctuary in the Sky]]" appears in this card's artwork.
  * This card was the first Rank 5 [[Xyz Monster]].
  * This card is the [[LIGHT]] counterpart of "[[Adreus, Keeper of Armageddon]]".
  * This was the first Xyz Monster that doesn't require to detach its [[Xyz Material]]s to activate its main effect.
  * According to [[wikipedia:Bible|Bible]], in the [[wikipedia:Book of Genesis|book of Genesis]], [[wikipedia:Tiras|Tiras]] is the last-named son of [[wikipedia:Japhet|Japheth]].
