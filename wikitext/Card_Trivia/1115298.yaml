title: Card Trivia:K9-17 Izuna
wikitext: |-
  {{Navigation}}

  * "[["A Case for K9"]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[K9-LC Release Restraint]]".
  * This monster is named after ''[[wiktionary:飯綱|īzuna]]'', the Japanese word for a [[wikipedia:Least weasel|least weasel]].
  * This monster has an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form: "[[K9-17 "Ripper"]]".
