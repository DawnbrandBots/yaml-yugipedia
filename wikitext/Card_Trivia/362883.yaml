title: Card Trivia:Mischief of the Gnomes
wikitext: |-
  {{Navigation}}

  * This card's artwork is a reference to the fairy tale, ''[[wikipedia:Snow White|Snow White]]'', with the woman in this card's artwork being based on the titular character.
  ** The woman is holding a blackened apple, referencing the poisoned apple that Snow White's stepmother, the [[wikipedia:Evil Queen|Evil Queen]], tricks her into eating.
  ** The seven gnomes in this card's artwork corresponds with the seven dwarves appearing in the fairy tale. Each of the gnomes has a [[Level]] star on their cap, referencing this card's Level-manipulation effect.
