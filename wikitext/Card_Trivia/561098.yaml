  [[File:Blackbird flies into the sunset.png|thumb|right|250|''[[Blackbird]]'' flies into the sunset.]]
  * This card's artwork is based on a scene from {{episode|5D's|030|ref}} where [[Crow Hogan]] escaped [[Sector Security]] on his [[Duel Runner]], the ''[[Blackbird]]'', by activating its flight mode and flies towards the setting sun.

