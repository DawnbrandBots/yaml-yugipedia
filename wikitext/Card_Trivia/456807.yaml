title: Card Trivia:Clear Wing Fast Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.12]]''.
  * This monster is the [[Yu-Gi-Oh! ARC-V (manga)|manga]] [[counterpart]] of "[[Clear Wing Synchro Dragon]]".
  ** This monster may be a [[Card evolutions|transformed]] [[Pendulum Monster|Pendulum]] version of "Clear Wing Synchro Dragon", as in the ''Yu-Gi-Oh! ARC-V'' manga, [[Yugo (manga)|Yugo]] called it an "evolved card".
  *** Additionally, [[Yuto (manga)|Yuto]]'s "[[Dark Rebellion Xyz Dragon (manga)|Dark Rebellion Xyz Dragon]]" also appeared to have been permanently transformed into "[[Dark Anthelion Dragon (manga)|Dark Anthelion Dragon]]".
  * This is the first [[Synchro Pendulum Monster]] to be revealed in the manga.
  * This is the [[signature card]] of Yugo in the ''Yu-Gi-Oh! ARC-V'' manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|012|ref}}, specifically from the panel showing [[Clearwing Fast Dragon (manga)|this monster]] being Summoned.
