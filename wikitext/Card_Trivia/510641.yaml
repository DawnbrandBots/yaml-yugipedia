title: Card Trivia:Reaper on the Nightmare
wikitext: |-
  {{Navigation}}

  * This monster is a [[Fusion Monster|Fusion]] of "[[Nightmare Horse]]" and "[[Spirit Reaper]]".
  ** This monster's [[Level]] (5) and [[original ATK and DEF]] (800/600) is a combination of those of "Nightmare Horse" (Level 2/[[ATK]] 500/[[DEF]] 400) and "Spirit Reaper" (Level 3/ATK 300/DEF 200). Additionally, this monster's effects are a combination of those of the aforementioned monsters.
  * This monster is based on [[wikipedia:Personifications of death|Death]], the fourth of the [[wikipedia:Four Horsemen of the Apocalypse|Four Horsemen of the Apocalypse]] who is depicted as a skeletal figure who wields a scythe and rides a pale horse.
  * This is the first [[Zombie]] Fusion [[Effect Monster]].
