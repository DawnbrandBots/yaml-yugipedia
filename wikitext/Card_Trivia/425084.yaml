title: Card Trivia:PSY-Framelord Omega
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[PSY-Frame Accelerator]]".
  * This monster is "[[PSY-Framelord Zeta]]" wearing the gloves of "[[PSY-Framegear Delta]]" while the rest of "Delta" arcs overhead, and the scooter they ride is formed with "[[PSY-Framegear Gamma]]" as the handlebar and "[[PSY-Framegear Epsilon]]" as the rest of the scooter.
