title: Card Trivia:Dark Tuner Spider Cocoon
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This is the first [[Dark Tuner monster]]:
  ** Whose [[Type]] is not [[Fiend]], being an [[Insect]] monster.
  ** To require only one [[Tribute]] for its [[Tribute Summon]], being a [[Level 5]] monster.
  ** With an effect to [[Special Summon]] itself.
  ** Without a visible dark sphere that implodes into white orbs when used as [[Synchro Material]] for a [[Dark Synchro Summon]], since it was wrapped up in a cocoon of spider silk as depicted in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
