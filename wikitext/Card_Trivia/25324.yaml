title: Card Trivia:Parallel World Fusion
wikitext: |-
  {{Navigation}}

  * The figures in this card's artwork are similar to the ones in the artwork of "[[Miracle Fusion]]". This is fitting, since this card benefits from the monsters banished by the effect of "Miracle Fusion".
  * In the background, there are 2 planets, referring to the "Parallel World" in this card's name.
