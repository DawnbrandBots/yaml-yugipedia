title: Card Trivia:Sky Striker Mecha - Adil Saber
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2026]]''.
  * A transformed version of this monster appears in the artwork of "[[Combined Maneuver - Engage Zero!]]".
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|16|ref}}, specifically from the panel where Adil Saber joins [[Raye (manga)|Raye]] in fighting [[Camellia]].
