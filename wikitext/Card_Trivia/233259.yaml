title: Card Trivia:Noble Arms - Gallatin
wikitext: |-
  {{Navigation}}

  * This card is named after the sword used by [[wikipedia:Gawain|Gawain]] in Arthurian lore.
  ** As such, it appears in the artwork of "[[Noble Knight Gawayn]]".
  ** In Arthurian lore, the knight Gawain was said to grow stronger as the day went on then get weaker and weaker after noon, reflected in this card by the continual loss of [[ATK]] points.
