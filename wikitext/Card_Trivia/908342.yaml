title: Card Trivia:Chronicle Magician
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023]]''.
  * This monster is similar to "[[Dark Magician]]" and "[[Blue-Eyes White Dragon]]".
  ** It shares the same [[Attribute]] ([[DARK]]), [[Level]] (7), [[Type]] ([[Spellcaster]]), and [[ATK]] (2500) as "Dark Magician".
  ** It  shares the same [[DEF]] (2500) as "Blue-Eyes White Dragon".
  ** Its robe is based on that of "Dark Magician".
  ** Its blue eyes and white color-scheme are based on those of "Blue-Eyes White Dragon".
  * This monster has a female [[counterpart]]: "[[Chronicle Sorceress]]".
  * This monster was created in commemoration of the 25th anniversary of ''[[Yu-Gi-Oh!]]''.
  ** It has an [[equal ATK and DEF|equal]] [[original ATK and DEF]] of 2500.
  ** It can [[Special Summon]] itself from the player's [[hand]] if a monster with an original ATK and/or DEF of 2500 is [[Normal Summon]]ed or Special Summoned to the player's [[field]].
  ** Its effect also allows the player to [[target]] a "Dark Magician" or "Blue-Eyes White Dragon" they [[control]] and make it gain 2500 ATK/DEF until the end of the turn.
