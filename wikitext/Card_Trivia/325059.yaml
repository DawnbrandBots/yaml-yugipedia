title: Card Trivia:Keldo
wikitext: |-
  {{Navigation}}

  * This card has a [[retrained]] [[counterpart]]: "[[Keldo the Sacred Protector]]".
  * The Spanish print of this card in ''[[Dark Revelation Volume 1]]'' had a minor typo in its [[card text]], as the term "add them" ("añ'''á'''delas") appears without a diacritical mark ("añ'''a'''delas").
  ** The Spanish translation of this card's effect in the ''[[Yu-Gi-Oh! Destiny Board Traveler]]'' videogame also has the aforementioned typo.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|225|ref}}, specifically from the panel showing [[Amazoness Fighter (manga)|this monster]] being Summoned.
  * In the Japanese version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, [[Ishizu Ishtar]] and [[Seto Kaiba]] pronounce this monster's name "Keldoo" (ケルデュ, ''Kerudyu'') rather than its name (ケルドウ, ''Kerudou'').
