title: Card Trivia:Blaze Fiend Overlords Beelucitaroth
wikitext: |-
  {{Navigation}}

  * This monster and its components are based on the trio of major demons making up the "unholy trinity" written in John Milton's epic poem, ''[[wikipedia:Paradise Lost|Paradise Lost]]''. This component in particular is based on [[wikipedia:Lucifer|Lucifer]].
  ** This monster's appearance is based on how Lucifer is often depicted as a fallen angel, who is often depicted with black wings.
  ** This monster's status as the central component references how Lucifer is often depicted with the highest rank of all demons and fallen angels, higher than both [[wikipedia:Beelzebub|Beelzebub]] and [[wikipedia:Astaroth|Astaroth]].
  * This is the first central component of a [[Maximum Monster]] to have an [[Original Level and Rank|original Level]] other than 10.
  * This monster currently has the lowest [[MAXIMUM ATK]] (3000) of all Maximum Monsters.
  * This monster has a retrained [[counterpart]]: "[[Blaze Fiend Overlord Luciless]]".
