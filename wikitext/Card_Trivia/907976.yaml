title: Card Trivia:Solfachord Formal
wikitext: |-
  {{Navigation}}

  * "[[SolSolfachord Gracia]]", "[[MiSolfachord Eliteia]]" and "[[TiSolfachord Beautia]]" appear in this card's artwork.
  * This is one of the few [[Counter Trap Card]]s that don't negate a Summon or the activation of a card or effect. Other examples include "[[Negate Attack]]", "[[Drastic Drop Off]]", "[[Parthian Shot]]" and "[[Crimson Fire]]".
