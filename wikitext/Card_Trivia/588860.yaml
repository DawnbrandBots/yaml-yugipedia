  * "[[World Chalice Guardragon Almarduke]]", "[[Ib the World Chalice Justiciar]]", "[[Crusadia Reclusia]]", "[[Crusadia Leonis]]", "[[Crusadia Maximus]]", "[[Crusadia Arboria]]", and the spirit of "[[Mekk-Knight Blue Sky]]" appear in this card's artwork.
