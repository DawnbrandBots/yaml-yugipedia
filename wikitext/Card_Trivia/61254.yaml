title: Card Trivia:Deuce
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name, artwork, and activation requirement are a reference to a [[wikipedia:Glossary of tennis terms|deuce]], a term in tennis where both players are tied at the score of 40-40.
  ** This card's effects are slightly different from an actual tennis deuce, where the player must score two points more than their opponent to win, while this card only requires the player to score two points in a row to win.
  * This is the second Spell Card to have an [[Victory condition|automatic victory]] condition, the first being "[[Final Countdown]]".
  ** This is also the first [[Duel winner]] to be an [[Anime-only|anime-exclusive]] card.
