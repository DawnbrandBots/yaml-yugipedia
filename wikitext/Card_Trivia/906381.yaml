title: Card Trivia:Curse of Aramatir
wikitext: |-
  {{Navigation}}

  * "[[Illegal Knight]]" appears in this card's artwork.
  * The word "Aramatir" in this card's name is "Ritmara" (リタマラ ''Ritamara'') spelled backwards, a Japanese term derived from "retire marathon", which denotes the process of retiring repeatedly until the player encountered the desired items/monsters in randomly designed quests/battle.
