title: Card Trivia:Fairy Knight Ingunar
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Ingunar-Freyr|Ingunar-Freyr]], a form of the Norse god Freyr.
  * This card could have a relationship to "[[Fairy King Truesdale]]", since they are both members of the [[Fairy (archetype)|"Fairy" archetype]] with medieval titles, they have the same [[Type]], [[ATK]], and Ingunar's [[Rank]] is the same as Truesdale's [[Level]], but "Ingunar" has double the [[DEF]].
