title: Card Trivia:Vampire Hunter
wikitext: |-
  {{Navigation}}

  * This hunter is a reference to the [[wikia:w:c:castlevania:Belmont Clan|Belmont Clan]] of vampire killers from the [[wikipedia:Konami|Konami]] game series ''[[wikipedia:Castlevania|Castlevania]]'', and to the whip they use to kill [[wikia:w:c:castlevania:vampire|vampires]] (also named [[wikia:w:c:castlevania:Vampire Killer Whip|Vampire Killer]]). Vampire Killer is also the title of the iconic level 1 theme, appearing in many games of the franchise. This hunter is also similar to [[wikipedia:Abraham Van Helsing|Abraham Van Helsing]], the man who killed [[wikipedia:Count Dracula|Dracula]], a [[wikipedia:vampire|vampire]].
  ** [[wikia:w:c:castlevania:Dracula%27s Castle|Castlevania]] - the castle of [[wikia:w:c:castlevania:Dracula|Dracula]] - is featured in this card's artwork. It was also referenced in the card "[[Infernalvania]]".
  ** This card is similar to "[[Getsu Fuhma]]": they are both Level 4 [[DARK]] Warrior monsters that destroy ''evil'' monsters by effect (this card destroys DARK monsters, while "Getsu Fuhma" destroys Zombies and Fiends) and are based on Konami game characters.
  *** The characters these cards are based off of also fight demons and the undead in their respective games. More specifically, however, the clan is bound by divine legacy to fight Dracula specifically, and has done so throughout their entire history. (It seems more of a curse on their family than anything else; it turned out very badly for the one member who tried to defy it.)
  *** Ironically, the depiction of "Vampire Hunter" is most similar to that of [[wikia:w:c:castlevania:Soma Cruz|Soma Cruz]], the protagonist in the modern day set series of ''[[wikipedia:Castlevania: Aria of Sorrow|Aria of Sorrow]]'' and ''[[wikipedia:Castlevania: Dawn of Sorrow|Dawn of Sorrow]]'', who is the reincarnation of Dracula post a final battle in the year 1999.
  * On the day in which Simon Belmont and Richter Belmont were confirmed as playable characters in ''[[wikipedia:Super Smash Bros. Ultimate|Super Smash Bros. Ultimate]]'', this card was gifted to all players who had an account in the video game ''[[Yu-Gi-Oh! Duel Generation]]''.<ref>[https://www.facebook.com/yugiohduelgeneration/photos/a.1530245653893234.1073741832.1464760070441793/2149733808611079/?type=3&theater facebook.com] Duel Generation</ref>
  * This card is the only "[[Vampire]]" monster whose [[Type]] is not [[Zombie]].
  * Ironically, despite this card's anti-[[DARK]] effect, it is a DARK monster itself.

