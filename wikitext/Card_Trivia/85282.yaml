title: Card Trivia:Lord of D.
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Grief Tablet]]", "[[The Flute of Guiding Dragon]]", and "[[The Melody of Awakening Dragon]]".
  * The "D." in this monster's English name stands for "Dragon".
  * This monster has three [[retrained]] counterparts: "[[The King of D.]]", "[[Dictator of D.]]", and "[[Absolute Lord of D.]]".
  * This monster has a female counterpart: "[[Lady of D.]]".
  ** Both have the same [[Attribute]] ([[DARK]]), [[Level]] (4), [[Type]] ([[Spellcaster]]), and [[DEF]] (1100).
  ** This monster prevents [[Dragon]] monsters from being [[target]]ed by effects, while "Lady of D." prevents Dragon monsters from being [[destroy]]ed by battle.
  * This monster has a [[Fusion Monster|Fusion]] form with "[[Divine Dragon Ragnarok]]": "[[King Dragun]]".
  * This monster has a [[Fiend]] ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Rogue of Archfiend]]".
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster was named "Lord of Dark(ness)".
