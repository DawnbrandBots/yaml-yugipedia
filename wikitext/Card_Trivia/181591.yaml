title: Card Trivia:Xyz Colosseum
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on the [[wikipedia:Colosseum|Colosseum]], an elliptical amphitheater where gladiator matches took place in [[wikipedia:Ancient Rome|Ancient Rome]].
  ** This card's effect, which prevents non-[[Xyz Monster]]s from attacking, references the gladiatorial battles, where the Xyz Monsters replace the roles of the gladiators.
  * This card is similar to "[[Xyz Territory]]", as they are both [[Field Spell Card]]s that feature effects that increase an Xyz Monster's [[ATK]] by a value of 200 and limits players to attacking with Xyz Monsters.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this card was used by [[Quattro]], the grassy field featured multiple gravestones that represent the opponents he defeated. This was demonstrated in {{episode|ZEXAL|033|ref}} when [[Bronk Stone]] and [[Caswell Francis]] were defeated by Quattro, where two gravestones arouse from the ground with the etchings of their faces.
