title: Card Trivia:Voidvelg Cataphract
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Cataphract|cataphract]], a heavy armored cavalryman originating in Persia who was fielded in ancient warfare throughout Eurasia and Northern Africa.
  ** This monster's name derives from the English for the Greek word for cataphract (κατάφρακτος ''kataphraktos''), literally meaning "armored" or "completely enclosed".
