title: Card Trivia:X-Saber Urbellum
wikitext: |-
  {{Navigation}}

  * This card's name, [[Level]], and effect are a combination of those of "[[X-Saber Uruz]]" and "[[X-Saber Airbellum]]".
  ** Fittingly, this monster can be [[Synchro Summon]]ed using those two monsters.
  * ''Bellum'' is Latin for war, symbolizing the battle-related effect of this monster.
  * Of all the "[[X-Saber]]" monsters, this monster was the first non-"XX-Saber" monster to wear a red cape.
