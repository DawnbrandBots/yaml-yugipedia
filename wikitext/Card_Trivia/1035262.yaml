title: Card Trivia:Machine Inspector
wikitext: |-
  {{Navigation}}

  * "[[Jinzo - Returner (Rush Duel)|Jinzo - Returner]]" appears in this card's artwork.
  ** This card's name, artwork, and effect reference the effect of "[[Jinzo (manga)|Jinzo]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]: "[[Attack and effect names in Yu-Gi-Oh!|Trap Search]]", which [[negate]]d the effects of all [[Trap Card]]s on the [[field]] and [[destroy]]ed them, including [[face-down]] ones. When its effect was activated, "Jinzo" destroyed Trap Cards by shooting lasers from its eyes at them.
