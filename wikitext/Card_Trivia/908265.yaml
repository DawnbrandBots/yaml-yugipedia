title: Card Trivia:Fairyant the Circular Sorcerer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Circle of the Fairies]]".
  * This monster is named after "[[wikipedia:Fairy Ring|fairy ring]]", a naturally occurring arrangement of mushrooms in a ring or an arc, which is commonly associated with witchcraft or fairies in Western European folklore.
