title: Card Trivia:Good Goblin Housekeeping
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" (using the pen, the book, and "[[Fatal Abacus]]" featured in the artwork of "[[Spell Economics]]") appears in this card artwork.
  * This card has two counterparts: "[[Numinous Healer]]" and "[[Attack and Receive]]".
  * The Spanish FET print of this card had a typo in its lore, as the word "''devu'''é'''lvela''" ("return it") had no diacritical mark.
