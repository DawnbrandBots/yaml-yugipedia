title: Card Trivia:Metalflame Swordsman
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[2025 Mega-Pack Tin]]''.
  * This monster appears in the artwork of "[[Flame Coating Metalmorph]]".
  * This monster is the [[Metalmorph (archetype)|Metal]] [[counterpart]] of "[[Flame Swordsman]]".
  ** This monster's [[original ATK]] (2500) is the same as that of "Flame Swordsman" (1800) [[equip]]ped with "[[Salamandra]]", which increases its [[ATK]] by 700.
  *** This is a reference to the combo used during [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] and [[Keith Howard (manga)|Bandit Keith Howard's]] [[Duelist Kingdom (manga arc)|Duelist Kingdom]] Duel in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (and its [[Joey Wheeler and Bandit Keith's Duel|anime counterpart]]) where [[Keith Howard (manga)|Bandit Keith Howard]] [[activate]]d "[[Metalmorph (manga)|Metalmorph]]" ("[[Magic Metal Force]]" in the [[Yu-Gi-Oh! (anime)|anime]]) to counter the attack of Katsuya Jonouchi's "[[Flame Swordsman (manga)|Flame Swordsman]]" equipped with "[[Salamandra (manga)|Salamandra]]".
  * This monster's sword is inscribed with the kanji 「鋼炎」 (''Gōen'', "steel flame"). 
  ** This is also a reference to "Flame Swordsman", as its sword is inscribed with the kanji 「炎」 (''Hōno'', "flame").
