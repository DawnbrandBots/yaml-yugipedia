title: Card Trivia:Magikey Maftea
wikitext: |-
  {{Navigation}}

  * "Mafteah" comes from "Mafteah Shelomoh", the Hebrew name for the ''[[wikipedia:Key of Solomon|Key of Solomon]]''.
  * This pistol appears in the artworks of "[[Magikey Duo]]", "[[Maginificent Magikey Mafteal]]", "[[Magikey Battle]]", "[[Magikey Beast - Ansyalabolas]]", "[[Magikey Dragon - Andrabime]]", "[[Magikey Locking]]", "[[Magikey Unlocking]]", and "[[Magikey World]]".
  ** Fittingly, "Maginificent Magikey Mafteal" is the unsealed monster counterpart to this card.
