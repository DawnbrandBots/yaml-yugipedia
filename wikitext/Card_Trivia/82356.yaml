title: Card Trivia:Chimaera, the Master of Beasts
wikitext: |-
  {{Navigation}}

  * This card's name and appearance is based on [[wikipedia:Chimera (mythology)|Chimaera]], a monstrous fire-breathing female creature with the body of a lioness, the head of a goat, and a snake for a tail.
  * This card is more accurate to the Greek mythos instead of "[[Chimera the Flying Mythical Beast]]" which is male.
