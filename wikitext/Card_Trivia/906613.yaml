title: Card Trivia:The Abyss Dragon Swordsoul
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Icejade Manifestation]]".
  ** This monster's frozen remains appear in the artwork of "[[Icejade Ran Aegirine]]" and "[[Million-Century Ice Prison]]".
  * This monster is the combined form of "[[Swordsoul Sinister Sovereign - Qixing Longyuan]]" and "[[Supreme Sovereign Serpent of Golgonda]]".
  ** This card's [[ATK]] is equal to that of "Golgonda" while "[[Great Sand Sea - Gold Golgonda]]" is on the [[field]], and its [[DEF]] is equal to the ATK of "Qixing Longyuan".
