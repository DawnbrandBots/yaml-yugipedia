title: Card Trivia:Wizard Buster Destruction Sword
wikitext: |-
  {{Navigation}}

  * "[[Buster Whelp of the Destruction Swordsman]]" and two [[Spell Counter]]s appear in this card's artwork.
  * Unlike "[[Dragon Buster Destruction Sword]]" and "[[Robot Buster Destruction Sword]]", this monster is depicted holding two swords instead of one.
  * This card's [[Level]] (3) and [[original ATK and DEF]] (1200/900) are three times that of "Buster Whelp" and "Dragon Buster Destruction Sword".
