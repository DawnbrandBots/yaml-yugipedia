title: Card Trivia:Igknight Templar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ignition Phoenix]]".
  * This card's Japanese name is derived from the [[wikipedia:Dragunov sniper rifle|Dragunov sniper rifle]], a semi-automatic sniper and [[wikipedia:Designated marksman rifle|designated marksman rifle]] developed in the Soviet Union.
  * This card's flavor text uses the fact that a rifle, (like the Dragunov) is a shoulder firearms that have helical groove or pattern of grooves (rifling) which was design to spin (therefore, twisted) the bullets as they traveling down the barrel.
