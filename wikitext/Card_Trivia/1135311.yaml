title: Card Trivia:Power Patron DoomZ
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Artmage Peripeteia -Turmoil-]]", "[[DoomZ Change]]", "[[DoomZ XII Zero - Drastea]]", and "[[Elfnotes: Welcome Home]]".
  * This monster has multiple "[[Power Patron]]" counterparts from other [[archetype]]s.
  ** "[[Artmage]]": "[[Artmage Power Patron]]".
  ** "[[Elfnote]]": "[[Elfnote Power Patron]]".
  * This monster was [https://ygorganization.com/doom-z-lore-intro/ introduced] by "[[Jupiter the Power Patron of Destruction]]", in order to find and empower a battlefield champion. There are many mass-produced, but incomplete versions of this monster that are seen and wielded throughout various related cards' artwork; they can be visually told apart by "Jupiter's" creation using green energy and lightning and the incomplete, mass-produced ones using red energy and lightning.
  ** This card's artwork depicts the originally introduced, green energy/lighting-wielding "Power Patron Machine Doom-Z" in the center foreground, and two of the mass-produced, red energy/lightning-wielding ones in the upper-left and upper-right background. 
  ** "[[DoomZ Break - Diactorus]]" is "[[Medius the Pure]]" having taken power from one of the mass-produced, red energy/lightning versions of this monster.
