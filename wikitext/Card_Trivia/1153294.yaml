title: Card Trivia:Masked HERO Fountain
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2026]]''.
  * This monster is based on the archetypal blue Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[WATER]], which is represented by a blue-colored circle.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|055|ref}}, specifically from the panel showing [[Masked Hero Fountain|this monster]] being Summoned.
