title: Card Trivia:Fiend Reflection 2
wikitext: |-
  {{Navigation|Fiend Reflection #2}}

  * This monster appears in the artwork of "[[Beastly Mirror Calling]]".
  * This monster has a [[recolored counterpart]]: "[[Fiend Reflection 1|Fiend Reflection #1]]".
  * This monster has a [[retrain]]ed ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Fiend's Mirage]]".
  * In the Spanish edition of ''[[Legend of Blue Eyes White Dragon]]'', this card's [[Winged Beast]] [[Type]] is incorrectly printed as "''Bestia Allada''" instead of "''Bestia Alada''", and its [[flavor text]] states "''invocar refuerzos''" when it should be "''invoca refuerzos''".
