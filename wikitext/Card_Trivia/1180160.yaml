title: Card Trivia:The Flute of Guiding Dragon
wikitext: |-
  {{Navigation}}

  * "[[Lord of D.]]", "[[The Flute of Summoning Dragon]]", and three copies of "[[Blue-Eyes White Dragon]]" appear in this card's artwork.
  ** This card's artwork is a reference to a scene during [[Dark Yugi and Seto Kaiba's Battle City Duel (manga)|Dark Yugi and Seto Kaiba's Battle City Duel]] (and its [[Yu-Gi-Oh! (anime)|anime]] [[Yami Yugi and Seto Kaiba's Battle City Duel|adaptation]]) where [[Seto Kaiba (manga)|Seto Kaiba]] (and his [[Seto Kaiba|anime counterpart]]) uses the effect of "[[The Flute of Summoning Dragon (manga)|The Flute of Summoning Dragon]]" (and its [[The Flute of Summoning Dragon (anime)|anime counterpart]]) in combination with his "[[Lord of D. (manga)|Lord of D.]]" (and its [[Lord of D. (anime)|anime counterpart]]) to [[Special Summon]] two of his three copies of "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" (and its [[Blue-Eyes White Dragon (anime)|anime counterpart]]) from his [[hand]] while he [[control]]led a third copy of "Blue-Eyes White Dragon".
  * This card's effect requiring a [[Spellcaster]] to be on the [[field]] is a reference to the effect of "The Flute of Summoning Dragon", which requires the player to control "Lord of D." (a Spellcaster monster) to [[activate]]; however, since the requirement does not specify that the player must control a Spellcaster monster for this requirement, it is also probably a reference to how in the above-mentioned scene, [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in the anime) used the effect of "The Flute of Summoning Dragon" while Kaiba controlled "Lord of D."
  ** This card's effect to allow the player to [[Special Summon]] a [[Level 5]] or higher [[Dragon]] monster from their [[Deck]] while a Spellcaster monster is present on the field, as well as allowing to Special Summon a second copy of the same Dragon monster if the opponent controls two or more monsters from the Deck, is a reference to how Kaiba uses the combination of "Lord of D." and "The Flute of Summoning Dragon" to Special Summon two copies of "Blue-Eyes White Dragon" (a Level 8 Dragon monster) from his [[hand]], while Yugi controlled "[[Dark Magician (manga)|Dark Magician]]" (and its [[Dark Magician (anime)|anime counterpart]]) with "[[Beta the Magnet Warrior (manga)|Beta the Magnet Warrior]]" (and its [[Beta The Magnet Warrior (anime)|anime counterpart]]).
  ** This card's second effect to [[banish]] this card from the [[Graveyard]] and allow the player to [[draw]] a card during the [[Main Phase 2]] it was sent there is a reference to a scene in {{chapter|Yu-Gi-Oh!|261|ref}} where Seto Kaiba, after battling Dark Yugi's monsters, draws a card due to "The Flute of Summoning Dragon" being sent to the Graveyard.
