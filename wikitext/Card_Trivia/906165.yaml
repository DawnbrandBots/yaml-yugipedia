title: Card Trivia:Eldlich the Golden Lord
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Tactical-Try Deck: Eldlich the Conqueror]]'', and is also one of the cover cards of ''[[Deck-Build Pack: Secret Slayers]]''/''[[Secret Slayers]]'' and ''[[2-Player Starter Set]]''.
  * This monster appears in the artworks of "[[Fallen Angel of the Golden Land]]", "[[Eldlixir of the Glorious Golden Land]]", "[[El Dorado Adelantado]]", "[[Golden Land Forever!]]", the 2nd artwork of "[[Pot of Extravagance]]", and "[[Seven Cities of the Golden Land]]".
  ** This monster's philosopher's stone appears in the artworks of "[[Eldlixir of Black Awakening]]", "[[Eldlixir of Scarlet Sanguine]]", and "[[Eldlixir of White Destiny]]".
  * This monster's name is a portmanteau of "[[wikipedia:El Dorado|El Dorado]]" (the legendary city of gold in Southern American mythology) and "[[wikipedia:Lich|lich]]" (a type of undead creature, reflecting its [[Zombie]] [[Type]]). Its powers over gold are references to the "[[wikipedia:Philosopher's stone|philosopher's stone]]" (with the helix on its chest being identified as such) and "[[wikipedia:Midas|Midas]]".
  * The item on this monster's chest is based on the [[wikipedia:Golden spiral|golden spiral]]. In geometry, a golden spiral is a logarithmic spiral whose growth factor is φ, the golden ratio (i.e., a golden spiral gets wider by a factor of φ for every quarter turn it makes). This is fitting, given this monster's name as "the Golden Lord".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Eldlich the Mad Golden Lord]]".
  ** This monster is depicted transforming into "Eldlich the Mad Golden Lord" in the artwork of "Seven Cities of the Golden Land".
  * This monster has a [[Trap Monster]] counterpart: "Eldlixir of the Glorious Golden Land".
  * According to the [[Master Duel card storylines]], this monster used to be an unnamed mercenary who fought his way through the creatures inhabiting the "[[Cursed Eldland]]" and found the philosopher's stone within it. He absorbed its power, along with the thousands of souls it held, transforming into this monster.
