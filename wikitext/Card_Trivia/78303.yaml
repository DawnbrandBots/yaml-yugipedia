title: Card Trivia:Dark Crusader
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Reaction Summon]]".
  * This monster may be based on the character Guts from the manga ''Berserk''. The appearance of his sword bears a strong resemblance to the "Dragonslayer" that the character wields, and his appearance resembles the berserker armor, an armor that Guts uses in the manga.
