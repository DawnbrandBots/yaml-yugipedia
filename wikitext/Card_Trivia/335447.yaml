title: Card Trivia:Escher the Frost Vassal
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Advance]]".
  * This is the only "[[Vassal]]" monster whose effect does not disable the player to [[Special Summon]] from the [[Extra Deck]] the turn it was activated.
  ** On the other hand, this is the only "Vassal" monster who does not have an additional effect that activates after being [[Tribute]]d for a [[Tribute Summon]].
  ** This is also the only "Vassal" monster whose Special Summon is a built-in Special Summon.
  * This monster's name is based on that of [[wikipedia:M. C. Escher|M. C. Escher]], a graphic artist well-known for his surreal artwork that portrayed [[wikipedia:impossible object|impossible objects]].
  * This monster is thematically related to "[[Mobius the Frost Monarch]]", with which it shares several qualities; both monsters are [[WATER]]/[[Aqua]] monsters with 1000 DEF, and have names derived from impossible structures (the [[wikipedia:Möbius strip|Möbius strip]] is a so-called "impossible" three-dimensional object with one side). This monster's Japanese name even explicitly identifies this monster as the "Vassal of the Ice Monarch".
  ** The two monsters even have complementary effects; the [[Summoning condition]] of "Escher" requires your opponent to control 2 Spell/Trap Cards, while "Mobius" destroys 2 Spell/Trap cards when it is Tribute Summoned.
  ** By extension, this monster is also similar to "[[Ice Knight]]"; both are Level 4 WATER/Aqua monsters designed as support cards for "Mobius" Decks, and have similar color schemes and designs.
