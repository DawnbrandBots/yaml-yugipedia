title: Card Trivia:Achichi @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located on this monster's back center horn.
  * This monster and "[[Fire Phoenix @Ignister]]" represent [[Flame (character)|Flame]], the [[FIRE]] [[Ignis]].
  ** This monster's name is based on "''achacha''", the Japanese onomatopoeia for "hot", used to describe an expression of pain after touching something hot or being burned. 
  ** This monster's design is based on the symmetrical cone shape of a flame.
  ** This monster's effect to [[banish]] itself from the [[Graveyard]] and [[destroy]] the player's monster is designed to work in conjunction with the effects of "Fire Phoenix", which is [[activate]]d when it is destroyed by an effect.
  * This monster has a "[[Salamangreat]]" counterpart: "[[Salamangreat of Fire]]".
