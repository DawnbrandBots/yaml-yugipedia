title: Card Trivia:World Gears of Theurlogical Demiurgy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[World Legacy Cliffhanger]]" and "[[World Legacy Collapse]]".
  * This monster is named after the [[wikipedia:demiurge|demiurge]], a divine being responsible for the creation of the physical world in pre-Christian religion, but is depicted as malicious in [[wikipedia:Gnosticism|Gnosticism]] for being linked to the material world.
  * This monster is depicted with six small energy spheres, which are colored after the corresponding [[Attribute]]s: [[EARTH]] (represented by the black sphere with the yellow glow), [[WIND]] (represented by the green sphere), [[FIRE]] (represented by the red sphere), [[WATER]] (represented by the blue sphere), [[LIGHT]] (represented by the yellow sphere), and [[DARK]] (represented by the purple sphere).
  * This monster is tied with "[[Avida, Rebuilder of Worlds]]" and "[[Firewall Dragon Singularity]]" for the highest [[original ATK]] (3500) of all [[Cyberse]] monsters.
