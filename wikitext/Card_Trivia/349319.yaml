title: Card Trivia:Ignister Prominence, the Blasting Dracoslayer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Theme Pack: Dragon Sword Trail]]''.
  * This monster appear in the artwork of "[[Ignition Phoenix]]".
  * This card's Japanese name has "Prominence" written as a "P" with the Furigana "Purominensu", just like how "Pendulum" is written as a "P" with the Furigana "Pendyuramu" in Japanese.
  * This card seems to be "[[Luster Pendulum, the Dracoslayer]]" wearing the armor of "[[Igknight Margrave]]".
  * This was the first [[Synchro Monster]] to list a [[Pendulum Monster]] as [[Synchro Material]].
