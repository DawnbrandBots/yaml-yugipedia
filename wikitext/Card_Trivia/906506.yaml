title: Card Trivia:Endless Engine Argyro System
wikitext: |-
  {{Navigation}}

  * This engine appears in the artworks of "[[Spright Starter]]" and "[[Therion Discolosseum]]".
  * "Therion Discolosseum" appears in the bottom of this card's artwork.
  ** This indicates that this engine is located above "Therion Discolosseum".
  * Every member of the "[[Spright]]" archetype is a piece of "Endless Engine Argyro System".
  * This card's name, "Argyro", is based on "Argyros", which is Latin for "[[wikipedia:Silver|silver]]" or "[[wikipedia:Mercury (element)|mercury]]".
  * This engine is based on a perpetual machine, which is a hypothetical machine that can do work infinitely through a [[wikipedia:Perpetual motion|perpetual motion]], without the need of an external energy source, but it is actually impossible to build, as it would violate the [[wikipedia:Laws of thermodynamics|laws of thermodynamics]], specifically either the [[wikipedia:First law of thermodynamics|first]] or [[wikipedia:Second law of thermodynamics|second]].
