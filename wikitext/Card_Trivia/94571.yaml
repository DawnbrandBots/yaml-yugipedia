title: Card Trivia:Battle Waltz
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts [[wikipedia:Shiva|Shiva]], the god of destruction in [[wikipedia:Hindu mythology|Hindu mythology]], based on how he is depicted with blue skin and carries his trident weapon, the ''[[wikipedia:Trishula|trishula]]''. 
  ** This card's artwork is supported by the fact that this card is named after a [[wikipedia:Waltz|waltz]], a type of dance, whereas one of Shiva's titles is "The Cosmic Dancer".
