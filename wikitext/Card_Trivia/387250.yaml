title: Card Trivia:Master Peace, the True Dracoslayer
wikitext: |-
  {{Navigation}}

  * "[[Luster Pendulum, the Dracoslayer]]" → "[[Master Pendulum, the Dracoslayer]]" → "Master Peace, the True Dracoslayer" → "[[Master Peace, the True Dracoslaying King]]"
  * This card is the "[[Dracoslayer]]" [[counterpart]] of "[[Amorphactor Pain, the Imagination Dracoverlord]]".
  ** Both monsters have 2950 [[ATK]], require monsters to be [[Tribute]]d in order to be [[Special Summon]]ed, and can negate the effects of cards, though this card can negate cards beyond [[Monster Effect]]s, unlike "Amorphactor Pain".
  ** It is possible that this monster is a combined form of "Master Pendulum" and "Amorphactor Pain" or "[[Lector Pendulum, the Dracoverlord]]", and is the result of the clash that happens in "[[Forge of the True Dracos]]". This monster subtly resembles "[[Amorphage]]" monsters (small eye-like gouges throughout the body), has a dual coloured dragon crest on its chest plate (gold from "Master Pendulum" & violet from "Lector Pendulum"), a pair of gold wings (the wings of Master Pendulum), and a pair of violet wings (the wings of Lector Pendulum), a dual coloured sword, and has blond & white hair. Furthermore, the [[Summoning conditions]] for this monster (1 "Dracoslayer" & 1 "[[Dracoverlord]]" monster) hint at this fusion possibility as well.
  * This monster appears in the artworks of "[[Crystolic Potential]]", "[[Dragonic Diagram]]", "[[Heritage of the Light]]", "[[Metamorformation]]", and "[[Zodiac Sign]]".
  * This card's name is a play on the word "masterpiece".
