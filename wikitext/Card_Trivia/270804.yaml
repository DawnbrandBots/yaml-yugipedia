title: 'Card Trivia:Number 47: Nightmare Shark'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster shares similarities with "[[Number 32: Shark Drake]]".
  ** Both are the signature cards of [[Reginald Kastle|Reginald "Shark" Kastle]].
  ** Both share the same [[Attribute]] ([[WATER]]) and [[Type]] ([[Sea Serpent]]).
  ** Both are the second "[[Number]]" monsters that Shark receives from another character after defeating them in a Duel.
  * In each of this monster's appearances in the ''Yu-Gi-Oh! ZEXAL'' manga, it was always [[Special Summon]]ed by the effect of  "[[Bahamut Shark (manga)|Bahamut Shark]]", who then used this monster's effect to [[attach]] "[[Killer Frilled Shark (manga)|Killer Frilled Shark]]" from [[Ryoga Kamishiro (manga)|Ryoga Kamishiro's]] [[hand]] to "Bahamut Shark".
  * Despite this monster's debut in {{chapter|ZEXAL|020|ref}}, all information about it was revealed in the ''[[OCG]]'' when it was released as the [[Yu-Gi-Oh! ZEXAL Volume 4 promotional card|promotional card]] for the [[Yu-Gi-Oh! ZEXAL - Volume 004|fourth volume]] of the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  * This card's artwork is taken from {{chapter|ZEXAL|029|ref}}, specifically from the panel showing [[No. 47: Nightmare Shark (manga)|this monster]] being Summoned.
