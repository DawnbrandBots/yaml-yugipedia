title: Card Trivia:Minerva, the Athenian Lightsworn
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Lightsworn Aegis]]".
  * This monster is an upgraded [[Synchro Monster]] [[counterpart]] of "[[Minerva, Lightsworn Maiden]]" and "[[Minerva, the Exalted Lightsworn]]".
  ** This monster's name is based on [[wikipedia:Athena|Athena]], the Greek goddess of wisdom and counterpart to the Roman goddess [[wikipedia:Minerva|Minerva]], whom this monster and its younger counterparts are named after.
