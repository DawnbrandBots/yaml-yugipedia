title: Card Trivia:Galaxy-Eyes Cipher X Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Selection 10]]''.
  * "Galaxy-Eyes Cipher Dragon" appears in this card's artwork.
  * The "X" in this monster's name stands for "Extreme".
  * This monster is a [[Ranked-Up]] form of "[[Galaxy-Eyes Cipher Dragon]]".
  * This monster is a "[[Cipher]]" [[counterpart]] of "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]".
  ** Both are [[LIGHT]] [[Dragon]] [[Xyz Monster]]s with 4000 [[ATK]] and 3000 [[DEF]].
  * This is the first "[[Galaxy-Eyes]]" monster:
  ** To be [[Rank 10]].
  ** To be Summoned with [[Rank-Up#Double Rank-Up|Double Rank-Up]].
  ** To have 4 wings.
