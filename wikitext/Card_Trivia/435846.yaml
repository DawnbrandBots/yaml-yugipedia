title: Card Trivia:Ghost Beef
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on "roast beef". Incidentally, it is serving parts of itself.
  * This card and "[[Mild Turkey]]" are complementary to each other, both being "haunted foods" whose effects modify their Pendulum Scales by rolling a six-sided die. Their Levels and Scales are also inverted.
