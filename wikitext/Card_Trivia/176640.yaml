title: Card Trivia:Photon Sabre Tiger
wikitext: |-
  {{Navigation}}

  * This is the first ''[[TCG]]''-exclusive "[[Photon]]" monster.
  * This is one of the few "Photon" monsters not used by [[Kite Tenjo|Kite]].
  * This is one of two "Photon" monsters that do not have armor of some sort, the other being "[[Photon Wyvern]]".
  * This card shares the highest [[ATK]] for [[Level 3 Monster Cards|Level 3 monsters]] with "[[Arsenal Bug]]" and "[[Flower Cardian Cherry Blossom with Curtain]]".
  ** With the exception of Flower Cardian Cherry Blossom with Curtain, they also have similar drawbacks, needing another card to prevent their ATK/[[DEF]] from dropping.
  * This card resembles "[[Soul Tiger]]".
  * This card resembles, in both name and appearance, the Sabre Tiger Shadow from ''[[wikipedia:Blue Dragon|Blue Dragon]]''.
