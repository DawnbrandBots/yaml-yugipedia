title: Card Trivia:Exstellarknight Constellar Ptolemy Ω7
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Terminal World 3]]''.
  * This monster is a combination of "[[Stellarknight Constellar Diamond]]", "[[Constellar Pleiades]]", and "[[Vylon Omega]]".
  ** This monster is also equipped with "[[Vylon Component]]", "[[Vylon Material]]", and "[[Vylon Segment]]".
  ** This monster is named after the astronomer [[wikipedia:Ptolemy|Ptolemy]], whose [[wikipedia:Geocentric model|geocentric model]] of the universe appears in the background of this card's artwork.
  ** This monster's name is also based on "[[Constellar Ptolemy M7]]" (the original divine dragon before "Constellar Diamond"), the Greek letter Ω (the eponym of "Vylon Omega"), and the asterism [[wikipedia:Pleiades|Seven Sisters]] (also known as Pleiades, the eponym of "Constellar Pleiades").
