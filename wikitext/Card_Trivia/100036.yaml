title: Card Trivia:Command Silencer
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on the [[wikipedia:Totem pole|totem poles]], a series of monumental sculptures carved from trees by a number of Indigenous cultures along the Pacific Northwest coast of [[wikipedia:North America|North America]].
  ** This card's name and artwork are similar to those of "[[Totem Pole]]", another card that features a totem pole in its artwork and features an effect that [[negate]]s attacks.
