title: Card Trivia:Musical Sumo Dice Games
wikitext: |-
  {{Navigation}}

  * The effect of this monster to move clockwise around the field to different [[Main Monster Zone]]s mimics the game of [[wikipedia:Musical chairs|musical chairs]]: in each round, players must walk around chairs (or a [[wikipedia:Futon|futon]], as in this card's artwork) in a single direction while music plays. As soon as the music stops, players must find a chair to sit in, and those without a seat are eliminated; a chair is then removed so that there is always one player eliminated each round, and the last player remaining is declared the winner.
  ** This is also the basis for this monster's effect to attach the monster occupying a Main Monster Zone (or "seat") to itself as [[Xyz Material]], as well as the effect that sends this monster to the Graveyard if that monster cannot be attached.
  * This monster's Japanese name (席取－六双丸 ''Sekitori - Musōmaru'') has several puns:
  ** ''Sekitori'' (席取) is a homophone of ''[[wikipedia:Sekitori|sekitori]]'' (関取), a [[wikipedia:Sumo|sumo]] wrestler rank. It is also made up of the kanji 「席」 (''seki'', "seat") and 「取」 (''tori'', "take"), which is another reference to the game of musical chairs, known in Japanese as 「椅子取りゲーム」 (''isu tori gēmu'', "chair-taking game").
  *** The monsters in this card's artwork are depicted as sumo wrestlers and playing musical chairs in a ''[[wikipedia:dohyō|dohyō]]'', or sumo wrestling ring.
  ** The ''Musō'' (六双) in ''Musōmaru'' (六双丸) is a homophone of ''musō'' (「無双」, "unparalleled"); it is also ''[[wikipedia:Sugoroku|Sugoroku]]'' (「双六」, a type of Japanese dice game) written backwards. The suffix ''-maru'' (丸) also roughly translates to "circle", referencing this card's effect that moves it in a clockwise "circle" around the field.
  *** The monsters in this card's artwork are shown going in a circle around the futon within the circular ''dohyō'', while wearing robes with dice patterns on them.
  *** This monster's [[victory condition]] that triggers if the amount of attached [[Xyz Material]] becomes more than six via its effect is derived from ''Ban-sugoroku'', which is a dice game played in a similar way to Western tabletop games such as [[wikipedia:Backgammon|backgammon]]. A player can win ''Ban-sugoroku'' by either moving all of their own pieces so that they occupy the last six spaces of the board, or by "closing out" via surrounding one or more of their opponent's pieces with six of their own; similarly, this monster's victory condition is fulfilled by "surrounding" itself with more than six Xyz Material.
