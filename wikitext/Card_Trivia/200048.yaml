title: Card Trivia:Trial and Tribulation
wikitext: |-
  {{Navigation}}

  * This card's artwork is based on the [[Duel Terminal]] storyline of "[[Revealer of the Ice Barrier]]" allying with the "[[lswarm]]" and bringing back the "[[Steelswarm]]" in order to survive.
  ** "Revealer of the Ice Barrier" is mourning the sacrifice of her comrades such as "[[Judge of the Ice Barrier]]" (who becomes the [[Spirit]] "[[Gishki Natalia]]"), while "[[Steelswarm Hercules]]" is revived as "[[Gishki Zielgigas]]", and prepares to complete the transformation of "Revealer" into "[[Gishki Psychelone]]".
  * This card's name is based on the [http://idioms.thefreedictionary.com/trials+and+tribulations idiom of the same name].
  * This card shares similarities with "[[Advance Zone]]".
  ** Both are [[Spell Card]]s with three-bulleted effects that are dependent on the number of monsters [[Tribute]]d by the player, include [[draw]]ing 1 card and resolve in the [[End Phase]].
  ** Both were first released as [[Secret Rare]] ''TCG'' exclusive cards.
