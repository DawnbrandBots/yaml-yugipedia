title: Card Trivia:Decoy
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Decoy Ohtani|Decoy Ohtani]], the pet dog of baseball player [[wikipedia:Shohei Ohtani|Shohei Ohtani]].
  ** This monster is depicted wearing a [[wikipedia:Los Angeles Dodgers|Los Angeles Dodgers]] jersey with the number "17", both referencing Ohtani's team and number.
  ** This monster's [[original ATK and DEF]] (50/50) reference Ohtani's 2024 season, where he became the first player to collect 50 home runs and 50 stolen bases in the same season.
  ** Its [[password]], 20240828, represents the date in which Decoy threw the ceremonial first pitch, August 28, 2024.
  * This monster is similar to "[[Tyler the Great Warrior]]", as both are one-of-a-kind monsters dedicated to a specific person, and they are not listed in the [[Lists_of_cards_by_Konami_index_number|Database ID]].
