title: Card Trivia:Petit Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Home of the Charmers]]", "[[Spiritual Art Familiars]]", "[[Storming Wynn]]", "[[The Law of the Normal]]", "[[The Return to the Normal]]", "[[The Revenge of the Normal]]", "[[The Toil of the Normal]], "[[Wynn the Wind Channeler]]", and "[[Wynn the Wind Charmer]]".
  * This card appears in the original anime artwork of "[[Montage Dragon]]".
  * The "Petit" in this card's name is the French word for "little".
  * This card has two advanced counterparts: "[[Ranryu]]" and "[[Awakening of the Possessed - Rasenryu]]".
  * This card has a [[recolored counterpart]]: "[[Fairy Dragon]]".
  * This monster has a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Familiar of the Wind Spiritualist]]".
