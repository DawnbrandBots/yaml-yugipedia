title: Card Trivia:Superheavy Samurai Swordmaster Musashi
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Miyamoto Musashi|Miyamoto Musashi]], a legendary Japanese swordsman known for his undefeated streak of sixty-two duels.
  * This monster and "[[Superheavy Samurai Wagon]]" are the first [[Effect Monster]]s to be released in ''[[Yu-Gi-Oh! Duel Links]]'' that were already available in the ''[[OCG]]'' but not the ''[[TCG]]''. Both were later released in the ''TCG'' version of ''[[Eternity Code]]''.
