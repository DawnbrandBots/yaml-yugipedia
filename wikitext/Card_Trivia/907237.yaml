title: Card Trivia:Dark Femtron
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the ''[[wikipedia:Femto-|Femto-]]'', a [[wikipedia:Metric prefix|metric prefix]] meaning 10^-15.
  * This card is the [[DARK]] [[counterpart]] of "[[Femtron]]".
  ** This card's flavor text tacitly foreshadows and references "[[Space Yggdrago]]" and its related theme of cards. Those cards were used by [[Zaion]] from the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, who is the counterpart to this card's user in the ''[[Yu-Gi-Oh! SEVENS]]'' anime, [[Nail Saionji]]. Fittingly, Zaion used or is associated with DARK counterparts of a number of the cards Nail used.
  * Similar to the other "[[Tron (series)|Tron]]" monsters used by Nail Saionji, the number of leaves on this monster's head is the same as its [[Level]].
