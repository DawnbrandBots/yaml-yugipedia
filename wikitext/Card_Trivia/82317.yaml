title: Card Trivia:Crystal Abundance
wikitext: |-
  {{Navigation}}

  * "[[Rainbow Dragon]]" and the crystal forms of "[[Crystal Beast Amber Mammoth]]", "[[Crystal Beast Amethyst Cat]]", "[[Crystal Beast Cobalt Eagle]]", "[[Crystal Beast Emerald Tortoise]]", "[[Crystal Beast Ruby Carbuncle]]", "[[Crystal Beast Sapphire Pegasus]]", and "[[Crystal Beast Topaz Tiger]]" appear in this card's artwork.
  ** This card's artwork depicts the seven "[[Crystal Beast]]s" in their crystal forms uniting to create "Rainbow Dragon".
