title: Card Trivia:Block Lock
wikitext: |-
  {{Navigation|mode=nongame}}

  * The monsters featured on this card are "[[Morphtronic Boarden]]" and "[[Morphtronic Celfon]]".
  * The blocks in the artwork are probably a reference to "[[wikipedia:Lego|LEGO]]" blocks.
  ** This card's artwork is similar to the background of "[[Blockman]]" and "[[Block Golem]]".
