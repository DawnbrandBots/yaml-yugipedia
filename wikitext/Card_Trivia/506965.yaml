title: Card Trivia:Full Salvo
wikitext: |-
  {{Navigation}}

  * A '''[[wikipedia:salvo|salvo]]''' is the simultaneous firing or launching of [[wikipedia:missile|missiles]], either to hit a [[wikipedia:aiming point|target]] or to perform a [[wikipedia:salute|salute]], such as during a [[wikipedia:ceremony|ceremonial]] event. This depicts the former.
  ** The "Full" part of this card's name is being a reference to the effect of sending your entire hand.
  * The missile being fired in this card's International artwork resemble a [[wikipedia:List of recurring Mario franchise enemies|Bullet Bill]] from the ''[[wikipedia:Mario (franchise)|Mario]]'' series.
