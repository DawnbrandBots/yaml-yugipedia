  {{Navigation}}

  * The knight in this card's artwork also appears in the artwork of "[[Giant Trap Hole]]".
  * The ''[[Rush Duel]]'' version of this card appears in the artwork of the ''Rush Duel'' version of "[[Exchange (anime Rush Duel)|Exchange]]".
  * This card has two ''Rush Duel'' parodies: "[[Acetic Acid Trap Hole]]" and "[[Jewelry Trap Hole]]".
