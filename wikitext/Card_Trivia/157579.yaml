title: Card Trivia:Empress's Staff
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The High Priestess|The High Priestess]].
  ** This card's English name is based on the scepter wielded by the empress in the [[wikipedia:The Empress (Tarot card)|The Empress]] Major Arcana Tarot card.
  *** This card's renaming is likely due to avoid religious connotations with its English name. As such, this card's renaming scheme is shared with another Tarot-themed [[Trap Card]], "[[Emperor's Staff]]", which is based on [[wikipedia:The Hierophant|The Hierophant]] rather than [[wikipedia:The Emperor (Tarot card)|The Emperor]].
