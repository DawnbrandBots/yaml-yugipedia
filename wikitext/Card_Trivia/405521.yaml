title: Card Trivia:Black Luster Soldier - Sacred Soldier
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[counterpart]] of "[[Black Luster Soldier]]".
  ** This monster is the [[LIGHT]] counterpart of "[[Black Luster Soldier - Envoy of the Evening Twilight]]".
  *** This monster's armor is a completely-white version of the armor worn by "Black Luster Soldier - Envoy of the Evening Twilight".
  * This is the only "[[Black Luster Soldier (archetype)|Black Luster Soldier]]" monster that can be [[Normal Summon]]ed.
