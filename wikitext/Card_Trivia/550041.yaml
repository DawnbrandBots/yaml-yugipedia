title: Card Trivia:Yoko-Zuna Sumo Spirit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bownty]]", "[[Edge of the Ring]]", and "[[Don't Slip, the Dogs of War]]".
  * This card is based on a [[wikipedia:Yokozuna|yokozuna]], the highest rank in [[wikipedia:Sumo|sumo wrestling]].
  * This card and "[[Kuro-Obi Karate Spirit]]" are the first [[Pendulum Monster|Pendulum]] [[Spirit monster]]s.
