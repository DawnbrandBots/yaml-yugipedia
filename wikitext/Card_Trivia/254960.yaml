title: Card Trivia:Damaging Hand
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The cards "[[Exodia the Forbidden One]]", "[[Left Arm of the Forbidden One]]", "[[Right Leg of the Forbidden One]]", "[[One Day of Peace]]" and "[[Jar of Greed]]" appear in this card's artwork.
  ** This could indicate that the hand is ruining a duelist's Exodia Deck as all of these cards support that type of Deck.
