title: Card Trivia:Wind Effigy
wikitext: |-
  {{Navigation}}

  * This card has [[DARK]], [[LIGHT]], and [[EARTH]] counterparts: "[[Dark Effigy]]", "[[Light Effigy]]", and "[[Earth Effigy]]".
  * "[[Leonardo's Silver Skyship]]" and "[[Simorgh, Bird of Ancestry]]" are the only valid monsters that can make use of this card's effect, but the former monster is [[Illegal]] and the latter monster is only applicable because its effect treats itself as a [[Normal Monster]] while in the hand.
  ** At the time of this card's release, there were no cards capable of making use of its effect, as "Simorgh, Bird of Ancestry" was released in [[Light of Destruction|the following set]].
