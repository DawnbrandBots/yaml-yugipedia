title: Card Trivia:Frozen Soul
wikitext: |-
  {{Navigation}}

  * The skull in this card's artwork is vaguely similar to "[[Maryokutai]]".
  * This is one of the few cards that depict blood or violence that did not get edited in its International release.
  ** Oddly, another card in its [[TCG]] release also has a skull with unedited blood: "[[Temple of Skulls]]".
