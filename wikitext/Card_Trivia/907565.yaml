title: Card Trivia:Gate Guardian of Wind and Water
wikitext: |-
  {{Navigation}}

  * This monster's [[ATK]] and [[DEF]] are each equal to half the combined [[original ATK and DEF]] of its [[Fusion Material]]s.
  * This monster's [[Quick Effect]] to [[negate]] the effect of an opponent's [[Spell]]/[[Trap Card]] is based on the effect of "[[Kazejin]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which reflected the effect of [[Yami Yugi]]'s "[[Mirror Force]]" and protected "[[Gate Guardian]]" from being [[destroy]]ed.
  * This is the only "Gate Guardian" monster to use "Kazejin" as the "head".
