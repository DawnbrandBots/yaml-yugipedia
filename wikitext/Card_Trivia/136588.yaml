title: Card Trivia:Vierroid
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is based on "''vier''", the German word for the number "4", which is reflected in its [[Level]].
  * In the English publication of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this card was confused with "[[Dreiroid]]", and mistakenly shown with that monster's name and Level (3).
