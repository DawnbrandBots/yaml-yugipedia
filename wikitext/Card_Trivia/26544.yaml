title: Card Trivia:Burial from a Different Dimension
wikitext: |-
  {{Navigation}}

  * This card's background artwork is very similar to that of "[[D.D.R. - Different Dimension Reincarnation]]".
  * This card's name, artwork, and effect are parodied by "[[Farm Delivery]]", which shuffles up to 3 of the player's banished cards into the Deck.
  * Older Spanish prints of this card used the word "''regresar''" instead of "''devolver''" for the term "''return''".
