title: Card Trivia:Masked Beast Des Gardius
wikitext: |-
  {{Navigation}}

  * The center mask of this monster (with its right eye missing) appears in the logo of ''[[Spell of Mask]]''.
  * This monster's masks appear to be of [[wikipedia:West African Vodun|voodoo]] nature. In voodoo culture, for spirits to manifest in the physical world, a number of them have to unite under the guidance of one spirit. This monster's appearance features three masks, which makes it possible that this may refer to the spirits this monster is composed of, which is reflected in its [[Summoning condition]] of [[Tribute]] the mask-themed "[[Grand Tiki Elder]]" and "[[Melchid the Four-Face Beast]]".
  ** The Japanese name of "Grand Tiki Elder", one of the monsters needed to [[Tribute]] to [[Special Summon]] this card, is "Masked Witch Doctor Cursed Gyura". Both the terms "[[wikipedia:Witch doctor|witch doctor]]" and "[[wikipedia:curse|curse]]" both reference [[wikipedia:Black magic|black magic]], which is applied to voodoo culture.
  * This monster has a ''[[Rush Duel]]'' [[Noodle Mask]] parody: "[[Masked Feast Tsuke Mendius]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|188|ref}}, specifically from the panel showing [[Masked Beast of Guardius|this monster]] being Summoned; however, this monster's left arm is raised, whereas it is lowered in its manga appearance, which is reflected in this card's anime artwork.
  * This is the [[signature card]] of [[Lumis and Umbra]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
