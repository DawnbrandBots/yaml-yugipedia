title: Card Trivia:Metaphys Armed Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Metaphys Factor]]" and "[[Primal Howling]]".
  * This monster is the "[[Metaphys]]" [[counterpart]] of "[[Dark Armed Dragon]]".
  ** The artwork of "Dracocension" depicts the transformation of "Dark Armed Dragon" into this monster.
  * This is the first [[Wyrm]] [[Normal Monster]] to be released.
  * This monster has the highest [[original ATK]] (2800) of all [[Level 7]] or lower Normal Monsters, with the exception of the [[Match Winner]] [[Pendulum Monster]] "[[Sakyo, Swordmaster of the Far East]]".
