title: Card Trivia:Performapal Kaleidoscorp
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Performapal Curtain Call]]" and "[[Performapal Reborn Force]]".
  * This card's name is a portmanteau of the words "[[wikipedia:Kaleidoscope|kaleidoscope]]" and "scorpion".
  ** Although the portmanteau in this card's Japanese name is translated as "Kaleidoscorpion" in English, this was truncated for the ''[[TCG]]'', likely to maintain the pronunciation similarity to "kaleidoscope".
