title: Card Trivia:Soul Crossing
wikitext: |-
  {{Navigation}}

  [[File:Soul Crossing.png|thumb|right|250px|[[Seto Kaiba (manga)|Seto Kaiba]] using "[[Soul Exchange (manga)|Soul Exchange]]" to [[Tribute]] [[Ishizu Ishtar (manga)|Ishizu Ishtar]]'s "[[Kelbek (manga)|Kelbek]]", "[[Agido (manga)|Agido]]", and "[[Zolga (manga)|Zolga]]" and [[Tribute Summon]] "[[The God of the Obelisk]]".]]

  * "[[Agido]]", "[[Kelbek]]", "[[Obelisk the Tormentor]]", and "[[Zolga]]" appear in this card's artwork.
  ** This card's artwork is based on the scene during [[Seto Kaiba and Ishizu Ishtar's Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]] where [[Seto Kaiba]] [[Tribute]]d [[Ishizu Ishtar]]'s "[[Agido (anime)|Agido]]", "[[Kelbek (anime)|Kelbek]]", and "[[Zorga (anime)|Zorga]]" in order to [[Tribute Summon]] "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]" via the effect of "[[Soul Exchange (anime)|Soul Exchange]]".
  *** This card's effect to Tribute Summon a [[Divine-Beast]] monster using monsters the opponent [[control]]s is derived from the aforementioned scene.
  *** This card's name is also similar to the Japanese name of "Soul Exchange": "Cross Soul" (クロス・ソウル ''Kurosu Sōru'').

