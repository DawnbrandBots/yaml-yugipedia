title: Card Trivia:Driven Daredevil
wikitext: |-
  {{Navigation}}

  * The Japanese pronunciation in this card's name, "''Futai no Aramusha''" features "''aramusha''", the Japanese word for "rough warrior", a warrior who has fallen from grace and has no masters.
  ** This naming scheme references the ''[[wikipedia:Rōnin|rōnin]]'', a term used for [[wikipedia:Samurai|samurai]] without masters, or have lost them following their death. This reflects this card's user, [[Elsworth]], who served [[Dr. LeBlanc]] and [[Mrs. LeBlanc|his wife]] before their deaths in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster is possibly a reference to the ''[[wikipedia:Ronin Warriors|Yoroiden Samurai Troopers]]'' anime.
