title: Card Trivia:Tokusano Shinkyojin
wikitext: |-
  {{Navigation}}

  * This card's name is based on the ''Tokusanokantakara'', a collection of ten divine treasures from the ''[[wikipedia:Kujiki|Sendai Kuji Hongi]]'', one of the earliest collected histories of Japan.
  ** Fittingly, this card's artwork depicts ten symbols in a formation within a magic circle, and this card's effect also [[support]]s [[Level 10]] monsters.
  * This card has 4 [[Level]]-based [[counterpart]]s.
  ** For [[Level 6]] monsters: "[[Celestial Observatory]]".
  ** For [[Level 7]] monsters: "[[Sacred Sword of Seven Stars]]".
  ** For [[Level 8]] monsters: "[[Trade-In]]".
  ** For [[Level 9]] monsters: "[[Kuji-Kiri Curse]]".
