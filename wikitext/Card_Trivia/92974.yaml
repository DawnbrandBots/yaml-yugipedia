title: Card Trivia:Supervise
wikitext: |-
  {{Navigation}}

  * "[[Phoenix Gearfried]]" appears in this card artwork.
  * The background's whirlwind of flaming feathers is iconic of "[[Sacred Phoenix of Nephthys]]", especially "[[A Feather of the Phoenix]]" (which has a "revival" effect similar to this card).
  * This card's Japanese name is a pun on "superb" ("v" also makes a "b") combined with the French "vite" (quickly).
