title: Card Trivia:Performapal Five-Rainbow Magician
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|五|ご}}{{Ruby|虹|こう}}の{{Ruby|魔|ま}}{{Ruby|術|じゅつ}}{{Ruby|師|し}}, ''Gokō no Majutsushi'') features the kana「ごこう」(''gokou''), which can be translated to "halo", an optical phenomenon produced by natural light interacting with ice crystals suspended in the atmosphere, which takes the form of bright colorful rings in the sky.
  ** Fittingly, a colorful halo appears behind this monster in the background of this card's artwork. Furthermore, a halo takes the shape of an arc in the sky, whereas in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, the process of [[Pendulum Summon]]ing is commonly preceded by a circular arc in the sky.
  * This monster's name also reflects its anime [[ATK]]-doubling effects, which can be [[activate]]d if the player controls '''5''' cards of a certain [[card type|type]] somewhere on their [[field]]: Its [[Pendulum Effect]] activates if the player has '''5''' [[Set]] [[Spell]]/[[Trap Card]]s in their [[Spell & Trap Zone]], while its Monster Effect activates if the player has '''5''' [[Pendulum Monster]]s in their [[Monster Zone]].
  ** Fittingly, when this card was released in its ''[[OCG]]''/''[[TCG]]'' debut [[Booster Pack]]s (''[[Collectors Pack 2017]]'' and ''[[Battles of Legend: Light's Revenge]]'' respectively), its printed [[card number]] was "00'''5'''".
  ** When this monster was released in the ''OCG''/''TCG'', its Pendulum Effect was altered so that its ATK-doubling effect would activate the player controls '''4''' or more Set cards in their Spell & Trap Zone; however, due to the [[New Master Rule]] implemented in 2017, the [[Pendulum Zone]]s are moved into the Spell & Trap Zones, forcing the player to either Pendulum Summon with this monster, or use its Pendulum Effect, but not both. 
  * This is the first monster to be both a "[[Performapal]]" and "[[Magician]]" monster in the ''OCG''/''TCG''.
  * This is the first Pendulum Monster to have a [[Pendulum Effect]] that can be used by either players.
  * This monster's ''OCG''/''TCG'' Pendulum Effect restricts the player from Pendulum Summoning, except from the [[Extra Deck]], referencing how in {{episode|ARC-V|148|ref}}, this monster was used to Pendulum Summon Pendulum Monsters from [[Yuya Sakaki]]'s Extra Deck, and it was used to Pendulum Summon only once.
