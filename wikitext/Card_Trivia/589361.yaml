title: Card Trivia:Infinitrack River Stormer
wikitext: |-
  {{Navigation}}

  * This monster is based on the [https://historygarage.com/powerful-fire-engine-world-big-wind/ "Big Wind" fire engine], a fire-fighting machine equipped with several water nozzles on top of two repurposed jet engines.
  * This monster appears in the artwork of "[[Heavy Forward]]".
