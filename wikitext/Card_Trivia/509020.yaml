title: Card Trivia:Dark Blade the Dragon Knight
wikitext: |-
  {{Navigation}}

  * This monster appears to be related to "[[Paladin of White Dragon]]", judging from the relationship between "[[Metalsilver Armor]]" and "[[Raregold Armor]]".
  * This monster's [[ATK]] is the same as the ATK of "[[Dark Blade]]" when equipped with "[[Pitch-Dark Dragon]]" with its [[Union]] effect.
