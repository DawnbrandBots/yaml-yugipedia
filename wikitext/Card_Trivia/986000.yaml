title: Card Trivia:Rising Light Angel Essel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Judgment of the Rising Light]]", as well as in both artworks of "[[Curse of the Rising Light]]".
  ** A necklace in the shape of this monster's staff appears in the artworks of "[[Garmr the Lone Wolf]]", "[[Heavenly Bliss]]", "[[Heavenly Gift]]", "[[Heavenly Invitation]]", "[[Heavenly Revelation]]", and "[[Heavenly Selection]]".
  *** "Esser" is the Hebrew word for the number "10", reflecting how the necklace, shaped like this monster's staff, appears in the artwork of the [[Heavenly]] [[series]], which supports Level 10 monsters.

  == See also ==
  * [[List of monsters that appeared in another card's artwork before their own debut]]
