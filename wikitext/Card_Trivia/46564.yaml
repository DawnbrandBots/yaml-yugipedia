title: Card Trivia:Raigeki Break
wikitext: |-
  {{Navigation}}

  * The hand of "[[Dark Ruler Ha Des]]" appears in this card's artwork.
  * This card's Japanese name and artwork are based on the Great Mazinger, the robot featured in the [[wikipedia:Great Mazinger|titular manga and anime series]] by [[wikipedia:Go Nagai|Go Nagai]]. Its Japanese name, "Thunder Break", is the name of Great Mazinger's strongest attack. The positioning of the fingers is also a direct reference to Great Mazinger, as it strikes a pose in a similar way when delivering this attack.
  ** This card's Japanese name uses English words ("Sandā Bureiku" is basically saying "Thunder Break" using the more limited Japanese alphabet). Ironically, its English name uses a Japanese word ("Raigeki" means "Thunder Strike").
  * This card has several counterparts:
  ** A "[[Crystal Beast]]" counterpart, "[[Crystal Raigeki]]".
  ** An "[[Infernity]]" counterpart, "[[Infernity Break]]".
  ** A [[Spell Card]] counterpart for monsters, "[[Tribute to The Doomed]]".
  ** A "[[Fire Formation]]" counterpart, "[[Fire Formation - Yoko]]".
  * In {{episode|ARC-V|020|ref}}, this card appears in the Action Field Spell, "[[Quiz Quest]]" as a possible question: "How many fingers are held up in the card's artwork?" The answer to the question is "one".
