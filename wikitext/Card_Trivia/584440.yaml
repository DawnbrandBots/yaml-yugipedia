title: Card Trivia:Super Quantum White Layer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Layer 19 "Sudden Incursion! Super Quantum Black!!"]]" and "[[Super Quantal Alphancall Appeal]]".
  * This monster is based on the archetypal Sixth/Extra Ranger featured in the ''[[wikipedia:Super Sentai|Super Sentai]]'' and ''[[wikipedia:Mighty Morphin Power Rangers|Power Rangers]]'' franchises. Fittingly, this monster's [[Attribute]] is [[LIGHT]], which is represented by a bright-colored circle.
  * This monster has a [[DARK]] [[Zombie]] [[counterpart]]: "[[Super Quantum Black Layer]]".
  ** Both share have the same [[Level]] (7) and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (2400/2400).
  ** Both feature an effect to [[Special Summon]] themselves from the [[hand]] by [[send]]ing a card from the [[hand]] to the [[Graveyard]], an effect to aid in the Summoning of "[[Super Quantal Mech Beast]]" monsters, and an effect to search a "[[Super Quant]]" card when [[sent]] to the Graveyard.
  * This monster is possibly a transformed "[[Super Quantal Fairy Alphan]]" given their similar design elements:
  ** Both have a white color scheme with black spikes on their backs.
  ** As depicted in the artwork of "Super Quantal Alphancall Appeal", this monster also bears the same crest on its gloves as the crest on the right hand of "Fairy Alphan".
  ** This monster has three drones orbiting it similar to the three orbs that orbit around "Fairy Alphan".
  ** Both monsters feature effects that allow them to copy the Level of other "Super Quant" monsters.
  ** This monster's effect to [[add]] "Fairy Alphan" to the player's hand upon being sent to the Graveyard is similar to the ''[[wikipedia:Super Sentai|Super Sentai]]''/''[[wikipedia:Power Rangers|Power Rangers]]'' trope to "Power Down" after taking too much damage.
  ** "Black Layer" have 3 modules that forms a circle, while "White Layer" have 3 modules that forms a triangle.
  *** "Alphan" have 3 orbs that turns circularly, while "Zetan" have 3 orbs that turns sharply.
