title: Card Trivia:Adhesion Trap Hole
wikitext: |-
  {{Navigation}}

  * The goblin that appears in the artwork of this card also appears in the artwork of "[[Bottomless Trap Hole]]", "[[D.D. Trap Hole]]", "[[Giant Trap Hole]]", and "[[Treacherous Trap Hole]]".
  * This is the first "[[Trap Hole (archetype)|Trap Hole]]" card that does not [[destroy]] or [[banish]] monsters.
