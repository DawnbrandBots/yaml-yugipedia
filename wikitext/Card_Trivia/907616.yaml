title: Card Trivia:Noh-P.U.N.K. Ze Amin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[P.U.N.K. JAM Dragon Drive]]", "[[P.U.N.K. JAM FEVER!]]", and "[[Noh-P.U.N.K. Rising Scale]]".
  * This card is named after [[wikipedia:Noh|Noh]], a major form of classical Japanese dance-drama that has been performed since the 14th century.
  ** This monster is based on [[wikipedia:Zeami Motokiyo|Zeami Motokiyo]], one of the creators of Noh.
  * This monster has two [[Card evolutions|alternate]] forms with different masks and costumes: "[[Noh-P.U.N.K. Foxy Tune]]" and "[[Noh-P.U.N.K. Ogre Dance]]".
  ** According to ''[[Yu-Gi-Oh! Card Game Art Works]]'', "[[Noh-P.U.N.K. Deer Note]]" is this monster's twin sibling rather than another of their costumes.
