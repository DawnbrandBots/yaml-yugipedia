title: Card Trivia:Chronomaly Tula Guardian
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Atlantean figures|Atlantean figures]] located at the [[wikipedia:Mesoamerican|Mesoamerican]] archeological site of [[wikipedia:Tula (Mesoamerican site)|Tula]], located in the Mexican city of  [[wikipedia:Tula de Allende|Tula de Allende]]. The Atlantean figures are four carved columns representing a warrior of the [[wikipedia:Toltec|Toltec]] civilization, used to support the roof of the temple of the [[wikipedia:Aztec|Aztec deity]], [[wikipedia:Tlahuizcalpantecuhtli|Tlahuizcalpantecuhtli]].
