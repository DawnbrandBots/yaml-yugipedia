title: Card Trivia:Kairyu-Shin's Dark Reef
wikitext: |-
  {{Navigation}}

  [[File:Mako's_monsters_stranded.png|thumb|right|200|"[[Kairyu-Shin (anime)|Kairyu-Shin]]", "[[Great White Terror]]", and "[[Fiend Kraken (anime)|Fiend Kraken]]" stranded after the [[Ocean]] receded.]]

  * "[[Fiend Kraken]]", "[[Great White Terror]]", and "[[Kairyu-Shin]]" appear in this card's artwork.
  ** This card is based on a scene during [[Dark Yugi and Ryota Kajiki's Duel (manga)|Dark Yugi (Yami Yugi) and Ryota Kaiki's (Mako Tsunami's) Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]] where the above-mentioned monsters were forced onto land after "[[Giant Soldier of Stone (anime)|Giant Soldier of Stone]]" destroyed "[[Full Moon]]" and caused the [[Ocean]] to recede.
  ** Unlike the scene it is based on, this card's artwork does not depict the monsters being immobilized by the lack of water. This is reflected in this card's effect, which can swarm the field with the "beached" monsters.

