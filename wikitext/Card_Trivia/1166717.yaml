title: Card Trivia:Northern Crossfire
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Northern Cross (asterism)|Northern Cross]], a four-star asterism in the [[wikipedia:Northern Sky|Northern Sky]].
  ** This card has a counterpart based on the [[wikipedia:Crux|Southern Cross]]: "[[Southern Stars]]".
  * This card's artwork depicts ten stars in a cross-shaped arrangement, similar to the Northern Cross. This, along with this card's effect [[support]]ing [[Level 10]] monsters, is a reference to how the [[wikipedia:kanji|kanji]] for the number 10 is shaped like a cross (十).
