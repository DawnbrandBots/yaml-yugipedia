title: Card Trivia:Malefic Paradox Gear
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[Paradox]], who uses the "[[Malefic]]" [[archetype]] in the ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' movie.
  * This monster is a non-Tuner [[retrained]] [[counterpart]] of "[[Malefic Parallel Gear]]".
  ** The background of both cards' artworks depict superimposed images of gears shaped like the gears in both monsters' design.
  ** This monster's effects are designed to facilitate the [[Synchro Summon]]ing of "[[Malefic Paradox Dragon]]" by Special Summoning "Malefic Parallel Gear" and [[add]]ing a "[[Malefic]]" monster from the [[Deck]] to the hand, where the effect of "Malefic Parallel Gear" uses a "Malefic" monster in the hand as [[Synchro Material]].
  * This is the first ''[[OCG]]''/''[[TCG]]''-original "Malefic" monster to be revealed.
