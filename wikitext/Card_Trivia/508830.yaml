title: Card Trivia:Reign-Beaux, Overlord of Dark World
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Common Sacrifice]]" and "[[Dark World Dealings]]".
  * This monster's name is the "[[Dark World]]" color pun for the word [[wikipedia:rainbow|rainbow]], which is reflected in its [[Level]] (7), as there are seven different colors in the rainbow.
  ** This monster's name also references how this monster is the political and religious head of the Dark World, according to [[Master Guide 2 card storylines|Master Guide 2]], with "[[Goldd, Wu-Lord of Dark World|Goldd]]" and "[[Sillva, Warlord of Dark World]]" serving as commanders of the military.
  ** This monster's Chinese name, 彩蓮恩, is a combination of 彩蓮 (literally "colored lotus") and 恩 ''ēn'' ([[wikipedia:Transcription into Chinese characters|a transcription]] of the [[wikipedia:Phoneme|phoneme]] sequence /ɪ̯n/ as in ''ra'''in'''''/''re'''in'''''/''re'''ign''''').
  * This monster has an upgraded counterpart: "[[Reign-Beaux, Overking of Dark World]]".
  ** It also has a [[Fusion Monster|Fusion]] counterpart: "[[Clorless, Chaos King of Dark World]]".
  * This is the only "Dark World" monster whose effect only [[activate]]s when discarded by an opponent's card effect.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, during [[Jaden Yuki]]'s Duel with [[Brron, Mad King of Dark World (character)|Brron, Mad King of Dark World]], this monster represents the sacrifices that Bronn makes using Jaden's friends, [[Chazz Princeton]], [[Alexis Rhodes]], [[Atticus Rhodes]] and [[Tyranno Hassleberry]]. Jaden subsequently becomes determined to destroy this monster over and over again as a result.
  ** In the English dubbed version of the anime, Brron mistakenly refers to this monster as a [[Fusion Monster]]. Despite this fact, Brron was able to [[return]] it to his [[hand]] without it returning to his [[Extra Deck]] instead.
