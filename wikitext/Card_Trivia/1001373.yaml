title: Card Trivia:Abysskite Karen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abysskite Deep Shield]]", "[[Abysskite Kaleido-Dress]]", "[[Abysskite Miracle Girls]]", and "[[Abysskite Protection]]", as well as in both artworks of "[[Abysskite Party]]".
  * The character [[Karen Choha]] from ''[[Yu-Gi-Oh! GO RUSH!!]]'' is based on this monster.
  ** In {{episode|GO RUSH!!|86|ref}}, it is mentioned that in-universe, the resemblance is coincidental, but that she did change her hairstyle to enhance it.
  * This monster has an upgraded [[counterpart]]: "[[Abysskite Kaleido-Karen]]".

