title: Card Trivia:Lumina, Lightsworn Summoner
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]''.
  * This monster appears in the artwork of "[[Glorious Illusion]]".
  * This monster's name is derived from "''lumina''", the Latin word for "light".
  * This monster has a [[DARK]] [[counterpart]]: "[[Lumina, Twilightsworn Shaman]]".
  * This is the first "[[Lightsworn]]" monster to be placed in the [[Forbidden]]/[[Limited]] Lists.
