title: Card Trivia:Mezuki
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Ox-Head and Horse-Face|Horse-Face]], the horse-headed humanoid guardian of the [[wikipedia:Diyu|underworld]] in [[wikipedia:Chinese mythology|Chinese mythology]], who is also known as "Mezu" in [[wikipedia:Japanese mythology|Japanese mythology]].
  ** This monster shares its [[Level]] (4), [[Type]] ([[Zombie]]) and [[original ATK and DEF]] (1700/800) with "[[Gozuki]]", a monster based on Ox-Head, who is depicted alongside Horse-Face as guardians of the underworld in Chinese mythology.
