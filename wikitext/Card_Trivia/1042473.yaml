title: Card Trivia:Dark Magician the Magician of Black Magic
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Magic Mirror Force]]".
  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster is a [[Shining Sarcophagus (series)|Shining Sarcophagus]] [[counterpart]] of "[[Dark Magician]]".
  ** This is the first monster in the Shining Sarcophagus [[series]] that can be [[Special Summon]]ed while either player [[control]]s "[[Shining Sarcophagus]]".
  *** This is a reference to how, during the [[Rite of the Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (the [[Battle Ritual]] in the [[Yu-Gi-Oh! (anime)|anime]]), [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in anime) controlled "[[Dark Magician (manga)|Dark Magician]]" (and its [[Dark Magician (anime)|anime counterpart]]) while [[Yugi Mutou (manga)|Yugi Mutou]] (and his [[Yugi Muto|anime counterpart]]) controlled "[[Gold Sarcophagus (manga)|Gold Sarcophagus]]" (and its [[Gold Sarcophagus (anime)|anime counterpart]]).
  * This monster is a counterpart to "[[Blue-Eyes White Dragon, the White Phantom Beast]]". Each of their names is a combination of the original card they are based on ("Dark Magician" and "[[Blue-Eyes White Dragon]]") and the term used for their respective ''[[ka]]'' in the hieroglyphs on the [[Tablet of Lost Memories]] ("Magician of Black Magic" and "White Phantom Beast").
  ** The terms are first mentioned in {{chapter|Yu-Gi-Oh!|146|ref}}, which is later adapted in the ''[[Yu-Gi-Oh! Forbidden Memories]]'' manual and {{episode|Yu-Gi-Oh!|52|ref}}.
  ** "Magician of Black" (黒き魔術師) is localized in English as "Black Magician" in the manga and ''Forbidden Memories'' manual. No equivalent term is used in the English anime.
