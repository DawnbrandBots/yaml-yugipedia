title: Card Trivia:Yasha, the Skeletal Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Yaksha|yaksha]], a type of spirit in Buddhism and Hinduism.
  ** This is fitting, as this monster is depicted as a Buddhist monk, holding [[wikipedia:Buddhist prayer beads|Buddhist prayer beads]].
  * This monster has a Synchro counterpart: "[[Gashadokuro, the Skeletal Mayakashi]]".
