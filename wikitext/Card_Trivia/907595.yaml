title: Card Trivia:Starving Venom Predapower Fusion Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] "[[Predaplant]]" form of "[[Starving Venom Fusion Dragon]]".
  ** This monster is also a "Predaplant" [[counterpart]] of "[[Greedy Venom Fusion Dragon]]".
  * Until the release of "[[Starving Venom Fusion Dragon of the Four Heavenly Dragons]]", this monster was the only "Predaplant" monster to not be [[Plant]], being [[Dragon]] instead and was the only "Predaplant" monster to have an [[archetype condition]].
