title: Card Trivia:Forbidden Substance
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on [[wikipedia:Anabolic staeroid|anabolic steroids]], a performance-enhancing substance used by athletes which was banned by most major sporting bodies.
  * This card's effect is incorporated into the ''[[OCG]]''/''[[TCG]]'' release of "[[The Tripper Mercury]]", which this card was used with in the {{chapter|GX|057|ref}}.
