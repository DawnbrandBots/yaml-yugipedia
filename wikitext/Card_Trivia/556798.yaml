title: Card Trivia:Sky Striker Ace - Hayate
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sky Striker Maneuver - Vector Blast]]".
  ** Its railgun also appears in the 3rd artwork of "[[Reinforcement of the Army]]".
  * "[[Sky Striker Ace - Roze]]" wearing one of the wings of "[[Sky Striker Ace - Kagari]]", as well as drones made out of parts of "[[Sky Striker Ace - Hayate]]", appear in this card's alternate artwork.
  * This monster's name is based on the Imperial Japanese fighter aircraft, the [[wikipedia:Nakajima Ki-84|Nakajima Ki-84 Hayate]].
  ** This monster's name is also based on ''hayate'', the Japanese word for "gale", reflecting its [[WIND]] [[Attribute]].
