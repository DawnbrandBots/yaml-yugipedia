title: Card Trivia:Yaminabe Party
wikitext: |-
  {{Navigation}}

  * The young goblins from the artwork of "[[Gift Exchange]]" appear in this card's artwork, with the unlucky goblin wearing the "[[Scrap Kong]]" shirt from that artwork.
  * This card is based on ''yaminabe'' (闇鍋, lit. "dark pot"), a Japanese hotpot dish used in a game in which several people bring ingredients unknown to anyone but themselves and cook and eat them in the darkness. This card's Japanese name is humorously spelled 「闇味鍋」 meaning "dark-flavored pot".
  ** This card's artwork depicts a scene during ''yaminabe'', in which, after the goblin woman turns the light on, the understandably disappointed goblin boy finds out he got broccoli from one of his cheering friends.
