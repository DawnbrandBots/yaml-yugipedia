title: Card Trivia:Ultimate Earthbound Immortal
wikitext: |-
  {{Navigation}}

  * "[[Earthbound Immortal Wiraqocha Rasca]]" appears in this card's artwork.
  ** This card's artwork is based on scenes during {{episode|5D's|63|ref}} and {{episode|5D's|64|ref}} where "[[Earthbound Immortal Wiraqocha Rasca (anime)|Wiraqocha Rasca]]" uses its effect to reduces the opponent's [[Life Point]]s to 1, in which it breathes glowing purple fire at the opponent.
  ** This card's name references the [[Summon chants in Yu-Gi-Oh! 5D's#Rex Goodwin|Summon chant]] of "Wiraqocha Rasca" in the Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime: ''Bring forth the ultimate destruction! The '''ultimate [[Earthbound Immortal]]!'''''.
