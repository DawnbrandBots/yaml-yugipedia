title: Card Trivia:Hydralander Orbit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Orbital Hydralander]]".
  ** This monster shares the same [[original DEF]] (1500) as "Orbital Hydralander".
  * The word "Hydralander" is a portmanteau of "[[wikipedia:Lernaean Hydra|Hydra]]" (a many-headed serpentine creature in [[wikipedia:Greek mythology|Greek mythology]]) and "[[wikipedia:Lander (spacecraft)|lander]]" (a type of [[wikipedia:Spacecraft|spacecraft]]).
  ** This monster's name and its effect requiring no monsters with the same name in the [[Graveyard]] reference the 1986 film ''[[wikipedia:Highlander (film)|Highlander]]'' and its iconic tagline,  "There can be only one". The term "highlander" refers to effects that require no more than one copy of a given card in order to [[activate]] or [[resolve]], as well as [[Deck]]s that only use one copy of each card.
