title: Card Trivia:Earthbound Servant Geo Gremlin
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Gremlin|gremlin]], a mischievous humanoid creature in folklore who is known for being responsible for an unexplained problem in machinery or electronics.
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Fusion Summon]]ing [[Quick Effect]] is based on "[[Earthbound Fusion]]", a [[Quick-Play Spell Card]] that was used with this monster during the [[Battle Phase]] by [[Sergey Volkov]] in {{episode|ARC-V|094|ref}}.
