title: Card Trivia:Battlewasp - Hama the Conquering Bow
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collection Pack: Duelist of Revolution Version]]''/''[[Battles of Legend: Hero's Revenge]]''.
  * This monster is named after the ''[[wikipedia:Hama yumi|hama yumi]]'', a sacred bow used in 12th century Japan, which is considered to be one of Japan's oldest and most sacred weapons. According to legend, the bow was used by the archer [[wikipedia:Minamoto no Yorimasa|Minamoto no Yorimasa]] to dispel the [[wikipedia:Nue|Nue]], an evil chimera-like demon, from the Imperial Palace.
  * This monster's helmet resembles the masked helmets worn by the eponymous heroes of the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, most of the heroes from the franchise all wear costumes that feature an insect motif.
