title: Card Trivia:Gogogo Giant
wikitext: |-
  {{Navigation}}

  * In the anime, its eye is yellow while it is in [[Attack Position]] and blue while its in [[Defense Position]].
  ** This may be an allusion or tribute to the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  *** The monsters then would be in their true colors in Attack mode and would don a bluish color scheme when in Defense mode.
  * This card resembles a [[wikipedia:Rook (chess)|rook]] [[wikipedia:Chess|Chess]] piece.
