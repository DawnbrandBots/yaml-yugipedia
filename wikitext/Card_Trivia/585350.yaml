title: Card Trivia:Performapal Barokuriboh
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[Kuriboh]]" and "[[wikipedia:Baroque music|Baroque]]", a prominent style of [[wikipedia:Classical music|Western classical music]] in the 17th and 18th century
  ** This monster's appearance is based on the appearance of the male population of European countries in the 18th century where they wore wigs with curls and [[wikipedia:Justacorps|justacorps]] coats.
  * This monster has the highest [[Level]] (8) and [[DEF]] (3000) of all "[[Kuriboh (archetype)|Kuriboh]]" monsters.
