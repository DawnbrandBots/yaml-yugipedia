title: Card Trivia:Rallis the Star Bird
wikitext: |-
  {{Navigation}}

  * During the "Today's Strongest Card" segment at the end of {{episode|Yu-Gi-Oh! GX|080|ref}}, this card was revealed to be a [[Fan-Made Cards|Fan-Made Card]], whose anime card artwork was based on an illustration by Kaori Kimura (木村香央里), submitted for a Japanese card illustration contest held while the ''[[Yu-Gi-Oh! GX]]'' anime was airing.
  * This monster has a [[counterpart]]: "[[Gallis the Star Beast]]".
  ** Both cards feature similar names, ''[[OCG]]''/''[[TCG]]'' artworks, and an effect that involves a monster's [[Level]] being multiplied by 200.
  ** Both of these cards were owned and used by [[Jaden Yuki]] in the ''Yu-Gi-Oh! GX'' anime.
