title: Card Trivia:Unshaven Angler
wikitext: |-
  {{Navigation}}

  * This monster is based on an [[wikipedia:Anglerfish|anglerfish]].
  ** The smaller anglerfish-like creature that appears in the lower-right corner of this card's artwork is a reference to [[wikipedia:Anglerfish|some species]] of anglerfish in which the male of the species is far smaller than the female.
  * This monster has a [[WIND]] counterpart, "[[Whirlwind Prodigy]]", and a [[FIRE]] counterpart, "[[Flame Ruler]]".
  ** All share the same [[Level]] (4) and [[original ATK and DEF]] (1500/1600).
  ** All share an effect that allows them to be [[treated as multiple Tributes]] for the [[Tribute Summon]] of a monster with the same [[Attribute]].
