title: Card Trivia:Nouvelles Recipe Book "Recettes de Nouvellez"
wikitext: |-
  {{Navigation}}

  * An illustration of "[[Confiras de Nouvelles]]" appears in this card's artwork.
  * This card's effect to make the opponent pay 850 [[Life Points]] each time a monster(s) is [[Tribute]]d by a [[Ritual Monster]]'s effect represents serving said monster to a restaurant customer and having them pay a bill for each course.
