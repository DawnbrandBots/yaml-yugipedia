title: Card Trivia:Arcana Force XII - The Hangman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Spiritual Lord]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Hanged Man (tarot card)|The Hanged Man]].
  ** This monster's number "XII" and [[original ATK and DEF]] (2200) reference how The Hanged Man is the twelfth trump card of the Majora Arcana Tarot.
  * This monster and "[[Arcana Force 0 - The Fool]]" are the only "[[Arcana Force]]" monsters to feature a [[coin toss]] effect with negative results for heads and positive results for tails.
  ** This is likely because The Hanged Man is often depicted hanging upside down in [[wikipedia:Tarot reading|Tarot reading]]s, which in turn references the reversal of the results.
  * This monster's appearance is based on the "Thousand Young" of the Lovecraftian deity [[wikipedia:Shub-Niggurath|Shub-Niggurath]], a species of treelike extraterrestrials with tentacles over their heads, keeping in relation with the extraterrestrial theme of the "Arcana Force" [[archetype]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Quick Effect]] to [[reveal]] itself from the player's [[hand]] and [[Special Summon]] an "Arcana Force" monster from the hand in response to the [[activate|activation]] of a card or effect is likely a reference to a scene in {{episode|GX|061|ref}} where this monster was revealed and Special Summoned via the effect of "[[Selection of Fate]]".
