title: Card Trivia:Evil HERO Neos Lord
wikitext: |-
  {{Navigation}}

  [[File:TheSupremeKing.png|thumb|300px|The Supreme King]]

  * This is the [[cover card]] of ''[[Supreme Darkness]]''.
  * This monster appears in the artwork of "[[Dark Supremacy]]".
  ** This monster's [[Fusion Summon]] is possibly depicted in the artwork of "[[Dark Contact]]".
  * This monster is an [[Card evolutions|upgraded]] "[[Evil HERO]]" [[Fusion Monster|Fusion]] form of "[[Elemental HERO Neos]]".
  ** This monster's armor is based on that of the [[The Supreme King|Supreme King]], the past incarnation of [[Jaden Yuki]], who used "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** The pattern on the torso of this monster's armor resembles the letter "S", which stands for the Supreme King.
  *** This monster's first effect, preventing it from being [[destroyed by battle]] and card effects, likely reference how the Supreme King stands unflinching whilst either taking [[battle damage]] or otherwise facing opposition.
  *** This monster's effect to take [[control]] of the opponent's monsters can reflect how the Supreme King had an [[The Supreme King's Army|army of monsters]] serving him as his soldiers.
  *** Additionally, in {{episode|GX|141|ref}}, a member of the [[Goblin Elite Attack Force (character)|Goblin Elite Attack Force]] revealed that he brought the Supreme King's [[Duel Disk]] to its owner at one point, with the "Elemental Hero Neos" card tainted with darkness falling to the floor in the process.
  * This is the first "[[Neos]]" monster to be an "Evil HERO" monster.
  ** Consequently, it is also the first "Neos" monster to be part of a "[[HERO]]" sub-[[archetype]] other than "[[Elemental HERO]]".
