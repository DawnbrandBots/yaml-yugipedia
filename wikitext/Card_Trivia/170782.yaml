title: Card Trivia:Cross Attack
wikitext: |-
  {{Navigation}}

  * The purple warrior in this card's artwork also appears in the artworks of "[[Battle Rush]]", "[[Comeback]]", "[[Courageous Heart]]", "[[Dimension Gate]]", "[[Double Tension]]", "[[Fiery Fervor]]", "[[Full-Force Strike]]", and "[[Heartfelt Appeal]]", all of which are used by [[Yuma Tsukumo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** The female warrior in this card's artwork also appears in the artworks of "Comeback" (her arm only) and "[[Vector Change]]".
