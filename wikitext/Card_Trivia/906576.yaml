title: Card Trivia:Voidvelg Hecatoncheir
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Void Dust Fusion]]", "[[Void Intercept]]", "[[Void Reactive Nova]]", and "[[Void Wall]]".
  * This monster is named after the three [[wikipedia:Hecatoncheires|Hecatoncheires]], hundred-handed giants in Greek mythology.
