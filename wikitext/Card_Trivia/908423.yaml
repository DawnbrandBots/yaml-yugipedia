title: Card Trivia:ZS - Ouroboros Sage
wikitext: |-
  {{Navigation}}

  * This monster's name and design are based on the [[wikipedia:Ouroboros|ouroboros]], the ancient Greek symbol depicting a serpent swallowing its own tail which is often shown as an infinity (∞) symbol.
  ** The ouroboros, while swallowing its own tail, is used as an example of an eternal cycle of life, death, and rebirth. This is reflected by this monster's first effect to [[Special Summon]] a non-[[LIGHT]] "[[Number]]" monster from the [[Graveyard]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect can [[equip]] it and a "[[Utopia (archetype)|Utopia]]" monster to the "Number" monster Special Summoned by its first effect and increase its [[ATK]] by '''1700''' for each [[Equip Card]], giving it a combined total of '''3400''' ATK.
  ** This is based on this monster's appearance in {{episode|ZEXAL|140|ref}}, when it and "[[Number C39: Utopia Ray Victory (anime)|Chaos Number 39: Utopia Ray Victory]]" were both equipped to "[[Number 101: Silent Honor ARK (anime)|Number 101: Silent Honor ARK]]" and increased its ATK by the combined total of both monsters' ATK ('''600''' + '''2800''', respectively), which adds up to '''3400'''.
