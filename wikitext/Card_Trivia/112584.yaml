title: Card Trivia:Blast Asmodian
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Power Throw]]".
  ** One of this monster's bombs is being held by "[[Dark King of the Abyss]]" in the artwork of "[[Hate Buster]]".
  * This monster appears to be related to "[[Fire Cracker]]".
  ** Both monsters are [[FIRE]] [[Fiend]] who feature effects that inflict [[effect damage]].
  ** Both monsters' designs feature two antennae on their heads and have the same pair of wings.
