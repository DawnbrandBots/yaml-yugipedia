title: Card Trivia:Magemageddon
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is a play on the words "''mage''" ("topknot", referring to the traditional Japanese topknot haircut worn by men), "[[wikipedia:Armageddon|Armageddon]]", and "-don" (the suffix often used in the names of dinosaurs).
