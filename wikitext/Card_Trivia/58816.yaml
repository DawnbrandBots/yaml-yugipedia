title: Card Trivia:Skill Successor
wikitext: |-
  {{Navigation}}

  * "[[Lava Battleguard]]" and "[[Swamp Battleguard]]" appear in this card's artwork.
  ** Fittingly, their effects involve increasing their [[ATK]] if the player controls both monsters, while this card also increases a monster's ATK.
  ** Furthermore, this card's artwork likely references the friendship between [[Tristan Taylor]] and [[Joey Wheeler]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, since they each owned one of the aforementioned monsters. In {{episode|Yu-Gi-Oh!|011|ref}}, Tristan gave Joey "[[Lava Battleguard (anime)|Lava Battleguard]]" before his Duel with [[Rex Raptor]].
  * This is the first [[Trap Card]] that could [[activate]] its effect by [[banish]]ing itself from the [[Graveyard]].
