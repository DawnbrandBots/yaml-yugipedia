title: Card Trivia:Regenesis Lord
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Regenesis Cycle]]".
  * This monster's Japanese name is based on ''Deuteronómion'' (Δευτερονόμιον, "second law"), the Greek name for the [[wikipedia:Book of Deuteronomy|Book of Deuteronomy]], the fifth book in the [[wikipedia:Torah|Torah]].
  ** Fittingly, this monster was listed as the fifth "[[Regenesis]]" monster to be released in ''[[Alliance Insight]]''.
  ** Of the five "Regenesis" monsters named after books of the Torah, this monster is the only one whose name is not derived from its respective book's Hebrew name.
  ** This monster's ''[[TCG]]'' name is derived from the use of "the Lord" to refer to [[wikipedia:Yahweh|the Abrahamic God]].
  * This card appears to be related to "[[Lord of the Missing Barrows]]".
