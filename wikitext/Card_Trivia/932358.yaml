title: Card Trivia:Chimera the Illusion Beast
wikitext: |-
  {{Navigation}}
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Big-Winged Berfomet]]", "[[Cornfield Coatl]]", "[[Gazelle the King of Mythical Claws]]", and "[[Mirror Swordknight]]".
  ** This monster has two downgraded forms based on a specific pair of visual [[Fusion Material]]s:
  *** "[[Chimera the King of Phantom Beasts]]" ("Big-Winged Berfomet" + "Gazelle the King of Mythical Claws")
  *** "[[Berfomet the Mythical King of Phantom Beasts]]" ("Big-Winged Berfomet" + "Mirror Swordknight")
  * This is the first [[Illusion]] [[Fusion Monster]], as well as the first [[DARK]] Illusion monster.
