title: Card Trivia:Santa Claws
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Krampus|Krampus]], a demonic companion of [[wikipedia:Saint Nicholas|Saint Nicholas]] in some interpretations that punishes naughty children.
  ** This card's Japanese name, "Satan Claus" (サタンクロース ''Satan Kurōsu''), is a play on "[[wikipedia:Satan|Satan]]" (サタン ''Satan'') and "[[wikipedia:Santa Claus|Santa Claus]]" (サンタクロース ''Santa Kurōsu'').
  ** This card's ''[[TCG]]'' name, "Santa Claws", is a pun on "Santa Claus" and "Claws".
  ** This card's [[ATK]]/[[DEF]] (1200/2500) are a reference to the date of [[wikipedia:Christmas|Christmas]] (December 25, 12/25).
  ** This card's effect to allow the player to [[draw]] a card during the [[End Phase]] is a reference to the tradition of gift-giving at Christmas.
  ** Fittingly, this monster's horns are also based on those of a [[wikipedia:Reindeer|reindeer]].
