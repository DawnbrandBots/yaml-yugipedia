title: Card Trivia:Scouting Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears to be based on a [[wikipedia:Ninja|ninja]], while its design is inspired by common visual elements of the characters featured in the ''[[wikipedia:Naruto|Naruto]]'' franchise, including its [[fandom:w:c:naruto:forehead protector|forehead protector]]; its [[fandom:w:c:naruto:flak jacket|flak jacket]] (outfitted with what appear to be [[wikipedia:Kunai|kunai]]); its bandaged, exposed lower legs; and the metal plates present on its knees and the back of its hands.
  ** One of the well-known functions of a ninja is [[wikipedia:Reconnaissance|reconnaissance]], a military operation where military scouts explore an enemy region before their troops to obtain information about enemy forces or terrain, which reflects this monster's effect to be [[Special Summon]]ed when it is [[add]]ed from the player's [[Deck]] to their [[hand]].
