title: Card Trivia:Spell Card "Soul Exchange"
wikitext: |-
  {{Navigation}}

  * "[[Blue-Eyes White Dragon]]" appears in this card's artwork.
  ** This card's name and artwork reference the specific combination used by [[Seto Kaiba]] in {{episode|Yu-Gi-Oh!|167|ref}} where he uses "[[Soul Exchange (anime)|Soul Exchange]]" to [[Tribute Summon]] "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]". 
  * This card is a [[retrained]] counterpart of "[[Soul Exchange]]".
  ** This card's effects reference the effect of "[[Soul Exchange (manga)|Soul Exchange]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, where it gave both its user and their opponent the ability [[Tribute]] monsters currently on the other player's side of the [[field]] at the same time, although, in practice, the opponent never Tributed monsters by this effect. This card's restriction that the monster it Tribute Summons cannot be Tributed that turn is likely a reference to the fact that the Tributes were meant to happen at the same time; this means that the monster Tribute Summoned by this card's effect would not have been on the field at the moment that the opponent would have been Tribute Summoning their own monster.
