title: Card Trivia:Power of Kaishin
wikitext: |-
  {{Navigation}}

  * This card is a reference to the [[wikipedia:Trident of Poseidon|trident of Poseidon]], which is supported by the fact that its Japanese name translates to "Power of Poseidon".
  * This card's TCG name "Kaishin" is the Japanese romanization of 「海神」, which means "Ocean God".
  * This card is tied with other cards as the first [[Spell Card]] in the ''[[OCG]]''/''[[TCG]]''.
  ** In the ''OCG''/''TCG'', it is also tied as the first:
  ** [[Equip Spell Card]]
  ** [[Aqua]] support card.
