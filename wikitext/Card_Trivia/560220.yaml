title: Card Trivia:Photon Change
wikitext: |-
  {{Navigation}}

  * "[[Numeral Hunter]]" appears in this card's artwork.
  ** This card is based on [[Photon Transformation]], an ability used by [[Kite Tenjo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime (also known as "Photon Change" in the original Japanese version), which allowed him to transform his clothing before a [[Duel]].
  ** This card's effect to [[send]] itself to the [[Graveyard]] during the second [[Standby Phase]] after [[activate|activation]] is a reference to how, in the anime, Kite could not sustain the transformation for prolonged periods of time.

