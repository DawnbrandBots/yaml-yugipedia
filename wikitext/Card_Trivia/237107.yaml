title: Card Trivia:Heraldic Beast Unicorn
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Unicorn|unicorn]] used as a [[wikipedia:Heraldry|heraldry]] [[wikipedia:Charge (heraldry)|charge]], which is depicted in heraldry as a horse with the beard and cloven hooves of a goat, the tail of a lion, and a slender, spiral horn on its forehead.
