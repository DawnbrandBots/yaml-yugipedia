title: Card Trivia:D/D/D Destiny King Zero Laplace
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Pierre-Simon Laplace|Pierre-Simon Laplace]], an influential French scholar whose work was important to the development of mathematics, statistics, physics and astronomy.
  ** This monster's title, "Destiny King", and [[Fiend]] [[Type]] both reference "[[wikipedia:Laplace's demon|Laplace's demon]]", an imaginary creature created by Laplace to explain casual determinism. According to Laplace, if someone (like the demon) knows the precise location and momentum of every atom in the universe, their past and future values for any given time are determined.
  * This monster resembles the head of [[wikipedia:Baphomet|Baphomet]], a winged demon who is depicted with the body of a human and the head of a goat.
  * This is the first [[Pendulum Monster]] with an [[original ATK]] of [[?]].
  * This card's artwork is taken from {{chapter|ARC-V|017|ref}}, specifically from the panel showing [[D/D/D Destiny King Zero Laplace (manga)|this monster]] being Summoned.
