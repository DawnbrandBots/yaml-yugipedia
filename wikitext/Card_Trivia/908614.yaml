title: Card Trivia:Springans Kitt
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded in High Spirits]]", "[[Rindbrumm the Striking Dragon]]", "[[Spright Smashers]]" and "[[Spright Sprind]]".
  * "[[Springans Branga]]", "[[Springans Pedor]]", and "[[Springans Rockey]]" appear in this card's artwork.
  ** The mechanical shrike in this card's artwork appears to be modified from the one in the artwork of "[[Tri-Brigade Kitt]]". It also appears in the artwork of "[[Branded in High Spirits]]".
  * This monster is a "[[Springans]]" [[counterpart]] of "[[Tri-Brigade Kitt]]".
  ** This monster's gauntlet is based on that of "[[Tri-Brigade Bearbrumm the Rampant Rampager]]".
  *** The artwork of "[[Tribe Drive]]" may depict "Kitt" building her armor, possibly using the pieces of "[[Sprind the Irondash Dragon]]" and/or "Bearbrumm".
  * This is the first "Springans" monster whose [[Type]] is not [[Machine]], being [[Beast]] instead, like "Tri-Brigade Kitt".
  * This monster's right weapon seems to be empowered by the "Hole", as indicated by the small purple rhomboidal chain inside of it.
