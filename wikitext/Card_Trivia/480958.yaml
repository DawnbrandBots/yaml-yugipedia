title: Card Trivia:Dragonic Diagram
wikitext: |-
  {{Navigation}}

  * "[[Crystron Quan]]", "[[Mariamne, the True Dracophoenix]]", "[[Master Peace, the True Dracoslayer]]", "[[Metalfoes Steelen]]", and "[[Zoodiac Ratpier]]" appear in this card's artwork.
  ** This card's artwork shows the transformation of "Master Peace" into "[[Master Peace, the True Dracoslaying King]]".
  * While this card is the third Field Spell to be [[Forbidden]], it is the only one that was Forbidden in the ''[[OCG]]''.
  * Like the other Field Spells of archetypes related to the "[[Dracoslayer]]" storyline ("[[Ignition Phoenix]]", "[[Dinomic Powerload]]", "[[Majesty's Pegasus]]", "[[Amorphous Persona]]", "[[Crystolic Potential]]", "[[Metamorformation]]", and "[[Zodiac Sign]]"):
  ** They are Field Spells that feature a member of the "Dracoslayer" archetype in its artwork.
  ** They support their respective archetype, but are not part of the archetype themselves (they do not have the archetype in their name).
  ** Their Japanese names each have a word abbreviated with an English letter with Furigana. In this card's case, "Diagram" is written as a "D".
