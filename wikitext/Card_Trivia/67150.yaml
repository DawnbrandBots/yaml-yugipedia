title: Card Trivia:Evil HERO Infernal Gainer
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of a pack of ''[[Battle Pack 3: Monster League]]'', as well as one of the cover cards of ''[[Duelist Pack: Jaden Yuki 3]]'' and ''[[Duelist Pack Collection Tin: Jaden Yuki]]''.
  * This monster appears in the artwork of "[[Evil Assault]]".
  * This monster's name reflects its effect to allow [[Fiend]] monsters to "gain" an extra attack.
  * This monster's armor bears a strong resemblance to that of the "[[Archfiend]]" monsters, such as "[[Archfiend General]]".
