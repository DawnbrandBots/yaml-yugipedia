title: Card Trivia:Destiny HERO - Dogma
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cyclone Blade]]", "[[D - Burst]]", "[[D-Pressure]]", and "[[Fusion Destiny]]".
  * This monster has a retrained [[counterpart]]: "[[Destiny HERO - Death Dogma]]".
  * This monster's name is derived from [[wikipedia:Dogma|dogma]], a principle, or a set of principles, laid down by an authority as incontrovertibly true.
  * This monster has the highest [[original ATK]] (3400) of all "[[Destiny HERO]]" monsters.
  * This is the first monster to feature an effect that halves the opponent's [[Life Points]].
