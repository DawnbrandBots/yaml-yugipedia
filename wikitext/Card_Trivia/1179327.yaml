title: Card Trivia:The Orchestrator of the Sacred Beasts
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] [[counterpart]] of "[[The Creator]]".
  ** This is based on how [[Kagemaru]]'s Deck contained "[[The Creator (anime)|The Creator]]", as seen when it was [[discard]]ed to [[activate]] "[[Phantasmal Martyrs (anime)|Phantasmal Martyrs]]" in {{episode|GX|049|ref}}.
  ** This monster's design features three gemstones on its wings and forehead colored red, blue, and yellow, while also depicted conjuring three energy orbs of the same colors, which correspond with the color schemes of "[[Uria, Lord of Searing Flames]]", "[[Hamon, Lord of Striking Thunder]]", "[[Raviel, Lord of Phantasms]]", and/or their "Sacred Beast" archetype counterparts. 
  *** This, along with this monster's pose, references "[[Reshef the Dark Being]]", who is depicted with three orbs of the same colors. In ''[[Yu-Gi-Oh! Reshef of Destruction]]'', the [[Reshef the Dark Being (Reshef of Destruction)|titular antagonist]] absorbs the three [[Egyptian God]]s, who are represented by those three orbs.
  ** This monster was released in ''[[Chaos Origins]]'', the first [[Core Booster]] to have [[Yami Yugi]] on the cover since ''[[Rise of Destiny]]'', on which "The Creator" was the [[cover card]].
