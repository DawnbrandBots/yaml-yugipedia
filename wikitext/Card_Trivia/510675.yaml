title: Card Trivia:Elemental HERO Sparkman
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Deck 2006]]''.
  * This monster appears in the artworks of "[[Change of Hero - Reflector Ray]]", "[[Elemental Mirage]]", "[[Fifth Hope]]", "[[H.E.R.O. Flash!]]", "[[HERO's Bond]]", "[[Hero Blast]]", "[[Hero Counterattack]]", "[[Hero Shield]]", "[[Soul Union]]", and "[[Spark Blaster]]".
  * This card appears in the artwork of "[[Fusion Tag]]" and in the original anime artwork of "[[Montage Dragon]]".
  * When this card was re-released in ''[[Dark Revelation Volume 3]]'', the [[attack name]] in its [[flavor text]], "Shining Surge Flash", was changed to the [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] used in the international dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime: "Static Shockwave".
