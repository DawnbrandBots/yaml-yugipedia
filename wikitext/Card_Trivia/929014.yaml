title: Card Trivia:Matsugumi the Ruler's Squad
wikitext: |-
  {{Navigation}}

  * This card's name, along with the names of "[[Takegumi the Ruler's Squad]]" and "[[Umegumi the Ruler's Squad]]", references [[wikipedia:Three Friends of Winter|Three Friends of Winter]], an art motif that comprises the pine (松 ''matsu''), bamboo (竹 ''take''), and plum (梅 ''ume'').
