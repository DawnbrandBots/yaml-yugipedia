title: Card Trivia:Mecha Phantom Beast Tetherwolf
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Scramble!! Scramble!!]]".
  * This monster is based off of the [[wikipedia:Boeing AH-64 Apache|Boeing AH-64 Apache]] gunship and the wolf.
  * This card is a possible reference to the TV show ''[[wikipedia:Airwolf|Airwolf]]''.
