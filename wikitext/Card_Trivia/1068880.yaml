title: Card Trivia:Azamina Sol Erysichthon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Goblin Biker Grand Crisis]]".
  ** The axe of this monster appears in the artwork of "[[Goblin Bikers Gone Bonkers]]".
  * This monster is named after [[wikipedia:Erysichthon of Thessaly|Erysichthon]], the king of [[wikipedia:Thessaly|Thessaly]] in [[Wikipedia:Greek mythology|Greek mythology]]. 
  ** According to mythology, after Erysichthon chopped down a sacred tree, he was cursed by the Greek goddess [[Wikipedia:Demeter|Demeter]] to suffer hunger for the rest of his life, never feeling full no matter how much he ate. This monster's tree-like appearance reflects the sacred tree Erysichthon cut down, while its base Japanese name, "Starvation Saint Erysichthon" (йӘұжё‡иЃ–ең’г‚ЁгѓҒгѓӨг‚·г‚Үгѓ€гѓәгѓі ''Kikatsuseito EryushikutЕҚn''), references how he was cursed to suffer from hunger.
  * The "Sinful Spoils Aithon" (зҢҒе®қг‚ұг‚¤гѓ€гѓәгѓі) that had been swallowed by "[[Goblin's Crazy Beast]]" according to [[The Valuable Book EX 4 card storylines|''The Valuable Book EX 4'' card storylines]] is the "[[Sinful Spoils]]" [[counterpart]] of this monster.
  ** Erysichthon of Thessaly is also known by the name ''[[wikipedia:Aethon|AithГөn]]'' ("burning") due to the 'burning' hunger he was cursed with.
  ** This monster shares the same [[original ATK and DEF]] (2700/0) as "Crazy Beast".
  ** "Crazy Beast" is a [[Fiend]] monster that can be used as [[Fusion Material]] to [[Fusion Summon]] this monster.
  ** The kanji ''kikatsu'' (йӘұжё‡, "starvation") in this monster's Japanese name and the kanji ''tЕҚ'' (йӨ•, "ravenous") in the Japanese name of "Crazy Beast" are both related to hunger.
