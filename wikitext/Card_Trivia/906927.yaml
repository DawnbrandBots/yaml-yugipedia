title: Card Trivia:Romic n' Roller
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dream Live]]", "[[Major Audition]]", "[[Raging Rock]]", "[[Stardom Light]]", and "[[Vi-FRND]]", as well as in both artworks of "[[Back Beat]]".
  * This monster's name is a portmanteau of the words "rock n' roll" and "mic(rophone)".
