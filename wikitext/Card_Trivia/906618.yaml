title: Card Trivia:Millennium Eye (Skill Card)
wikitext: |-
  {{Navigation}}

  * This card is named after the [[Millennium Eye]], which had the [[Mind Scan|ability]] to read the minds of the user's opponents.
  ** In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], [[Maximillion Pegasus]] used this ability to see which cards and strategies his opponents planned on using.
