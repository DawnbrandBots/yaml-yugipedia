title: Card Trivia:Yowie
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Whowie|whowie]], a creature from [[wikipedia:Australian Aboriginal religion and mythology|Australian Aboriginal mythology]] depicted with the body and head of a lizard, the tail of a snake, and the legs of a cockroach.
  ** Despite this, this card's name is derived from a different Australian creature, the [[wikipedia:Yowie|yowie]], a large hairy ape-like creature with large feet whose tracks are inconsistent with size and toe number.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect allowing the player to [[Special Summon]] only once after activating its [[Draw Phase]]-skipping effect is based on this card's appearance in {{episode|Yu-Gi-Oh!|100|ref}}; during the turn [[Gansley]] Normal Summoned this card, he Special Summoned only one monster, which was "[[Ipiria (anime)|Ipiria]]" via the effect of "[[Premature Burial (anime)|Premature Burial]]".
  * This card has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any card that was originally an [[Effect Monster]], released over 19 years after its first appearance in the original [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'' anime]] on March 26, 2002.
  ** The Effect Monsters with longer import times were either not ''[[Duel Monsters]]'' cards in the anime or manga ("[[Thunder Ball]]"), or else made their debut as [[Normal Monster]]s prior to being released as Effect Monsters in the ''OCG'' ("[[Flying Elephant]]", "[[Light Law Medium]]", "[[Soul Scissors]]").
