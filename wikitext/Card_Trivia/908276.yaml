title: Card Trivia:Book of Lunar Eclipse
wikitext: |-
  {{Navigation}}

  * This card can be considered a counterpart of "[[Book of Moon]]" (having a moon themed name and sharing a similar, but stronger, effect with "Book of Moon") and "[[Book of Eclipse]]" (as this card's Japanese name is based off a lunar eclipse in contrast to the Japanese name of "Book of Eclipse" being based off a solar eclipse).
