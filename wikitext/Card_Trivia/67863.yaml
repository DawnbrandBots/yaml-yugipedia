title: Card Trivia:Shield & Sword
wikitext: |-
  {{Navigation}}

  * This card has a [[Continuous Spell Card]] counterpart: "[[Weapon Change]]".
  ** Both cards' artworks depict a knight with an artistic gestalt of a sword and a shield (each representing [[ATK]] and [[DEF]] respectively) taking each other's places.
  * This is the first [[Legend Card|Legend]] [[Spell Card]] released in ''[[Yu-Gi-Oh! Rush Duel]]''.
  ** This card has a ''Rush Duel'' [[Trap Card]] [[counterpart]], "[[Sword & Shield]]", which depicts the front side of the knight in this card's artwork.
  ** The shield and sword in this card's artwork have ''Rush Duel'' [[Monster Card]] versions of them: "[[Shield in the Right Hand]]" and "[[Sword in the Left Hand]]".
