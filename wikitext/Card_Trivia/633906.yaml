title: Card Trivia:Geomathmech Magma
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Mathmech Billionblade Nayuta]]".
  * This monster is based on a [[wikipedia:Magma (algebra)|magma]], which in [[wikipedia:Mathematics|mathematics]], specifically in [[wikipedia:Abstract algebra|abstract algebra]], is a basic kind of [[wikipedia:Algebraic structure|algebraic structure]], consisting of a [[wikipedia:Set (mathematics)|set]] equipped with a single [[wikipedia:Binary operation|binary operation]].
  ** Fittingly, the cross-guard on this monster's sword is shaped like the magma operator "''M''".
  ** This card's [[FIRE]] [[Attribute]] is also a reference to volcanic [[wikipedia:Magma|magma]].
  * This monster is a [[Card evolutions|combined]] form of "[[Mathmech Sigma]]", "[[Mathmech Addition]]", and "[[Mathmech Subtraction]]".
