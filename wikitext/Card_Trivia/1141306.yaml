title: Card Trivia:JJ "Kewl Tune"
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Juke joint|juke joint]], the African-American vernacular term for an informal establishment with music and dancing, primarily operated by African Americans in the southeastern United States.
  ** This card's artwork depicts the entrance into the juke joint, with the doorway designed after the 1946 Wurlitzer Model 1015, a notable [[wikipedia:Jukebox|jukebox]] known for its illuminated bubble tubes and revolving color columns.
