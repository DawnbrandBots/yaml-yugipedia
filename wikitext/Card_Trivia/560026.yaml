title: Card Trivia:Dinowrestler Capaptera
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dino Domain]]".
  * This monster's name is a portmanteau of "[[wikipedia:Kapap|Kapap]]" and "[[wikipedia:Pterosaur|pterosaur]]".
  * This is the first and currently only "[[Dinowrestler]]" monster whose [[Attribute]] is not  [[EARTH]].
  * The [[Set number]]s for this card and "[[Dinowrestler Capoeiraptor]]" in the ''[[TCG]]'' 1st Edition print of ''[[Soul Fusion]]'' were swapped.
