title: Card Trivia:Thought Ruler Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Psychic Overload]]" and "[[Telekinetic Charging Cell]]".
  * This monster's Japanese name, "Mental Sphere Daemon", is based on the term "mental sphere", which refers to the realm of thought, imagination, and cognitive activity.
  * This monster has two [[upgrade]]d forms: "[[Ultimate Axon Kicker]]" and "[[Overmind Archfiend]]".
  * This monster has a retrained counterpart: "[[Crossmind Archfiend]]".
