title: Card Trivia:Glory of the King's Hand
wikitext: |-
  {{Navigation}}

  * This card is one of five invitational cards to the [[Duelist Kingdom]] tournament in the [[Yu-Gi-Oh! (manga)|Yu-Gi-Oh! manga]] and [[Yu-Gi-Oh! (anime)|anime]]. In the finals, the contestant could claim the $3,000,000 prize money, but nothing else. As compensation for this limitation, the loser's soul would not be on the line in the case of "[[Glory of the King's Opposite Hand]]". Without either card, a contestant could not participate in the finals and would be disqualified.
