title: Card Trivia:Seahorse Server
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hydration]]".
  * This monster is a ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] to "[[Tatsunootoshigo]]", whose translated name is "Sea Horse".
  ** This monster's Japanese name, メッシーホース ''messhīhōsu'' is a portmanteau of the Japanese words メッシー and "sea horse" (シーホース ''shīhōsu''). A メッシー君 (''messhī-kun'', from 飯 "rice/rice or non-rice meal") is a man who offers free meals to a woman he likes, in contrast to a [[Seahorse Carrier|アッシー君]] (''asshī-kun'') who offers free rides.
