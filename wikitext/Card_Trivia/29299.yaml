title: Card Trivia:Arcana Force XIV - Temperance
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Temperance (tarot card)|Temperance]].
  ** This monster's number "XIV" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (2400) reference how Temperance is the fourteenth trump card of the Majora Arcana Tarot.
  * This monster's design is based on the Lovecraftian depiction of the Egyptian goddess [[wikipedia:Elder God (Cthulhu Mythos)#Bast|Bastet]], who features a female humanoid body with a cat-like head, keeping in relation with the extraterrestrial theme of the "[[Arcana Force]]" [[archetype]].
  * This is the only "Arcana Force" monster to not feature the word "The" in its name.
  ** "[[Arcana Force VIII - The Strength]]", which only appears in the anime and video games, also does not include "The" in its Japanese name.
