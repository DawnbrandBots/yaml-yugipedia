title: Card Trivia:Grass
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cheering Grass]]".
  * This card's Japanese name (草, ''kusa'') and [[flavor text]] ("w") are based on the [https://selftaughtjapanese.com/2020/01/08/why-is-grass-草-used-in-japanese-to-mean-something-is-funny/ Japanese slang symbols] for "laughing".
  ** Fittingly, this card's artwork depicts blades of grass forming a "w", with this monster's shadows taking the form of ninjas with a laughing smile on their faces.
  ** This card's English flavor text ("^^") is an [[wikipedia:emoticon|emoticon]] associated with joyfulness, that when flipped upside down resembles the blades of grass in this card's artwork..
  * This card was [https://twitter.com/YuGiOh_RUSHDUEL/status/1377561375002791937 revealed] on April Fool's Day 2021.
