title: Card Trivia:Armed Neos
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Monstrous Revenge]]''.
  * Visually, this monster is a [[Fusion Monster|fusion]] of "[[Elemental HERO Neos]]" and "[[Armed Dragon Thunder LV10]]".
  ** This monster's pose with one arm pointing towards the sky references Chazz's signature pose in the ''Yu-Gi-Oh! GX'' anime, where he points one arm towards the sky.
  ** This is supported by the following visual similarities with "LV10":
  *** Various, identical lightning-shaped elements on both monsters' torsos, knees, and faces.
  *** Horn-like features on both monsters' shoulders and faces.
  *** Identical wing [[wikipedia:Phalanx bone|phalanges]].
  *** Clawed weapons on both monsters' wrists.
