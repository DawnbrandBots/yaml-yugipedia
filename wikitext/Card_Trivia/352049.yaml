title: Card Trivia:Aromage Jasmine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Aroma Gardening]]" and "[[Humid Winds]]".
  * This monster is named after ''[[wikipedia:Jasminum officinale|Jasminum officinale]]'' (known as the common jasmine), a species of flowering plants with sharply pointed pinnate leaves and clusters of starry, pure white flowers, which are used in aromatherapy, tea, and ceremonial rituals around the world.
  * This monster has an upgraded [[Link Monster|Link]] form: "[[Aromaseraphy Jasmine]]".
