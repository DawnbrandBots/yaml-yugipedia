title: Card Trivia:Luster Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Star Blast]]".
  ** An illustration of this monster appears in "[[Ichiroku's Ledger Book]]".
  * Despite their ''[[TCG]]'' naming, this card was released after "[[Luster Dragon 2|Luster Dragon #2]]", which was originally released as "Luster Dragon". "Luster Dragon #2" had its name changed shortly after this card's release.
  ** The likely reason both cards' names were initially translated to "Luster Dragon" was because their Japanese names contain gemstones in their names, i.e. "Sapphire" and "Emerald" respectively.
  * This card has an [[anime-only]] counterpart: "[[Ruby Dragon]]".
  * This card has a [[Rush Duel]] counterpart based on this card's ''[[OCG]]'' name: "[[The Fire Dragon]]".
  * [[Luster Dragon (Rush Duel)|This card]], "[[Vorse Raider (Rush Duel)|Vorse Raider]]", "[[Alien Shocktrooper (Rush Duel)|Alien Shocktrooper]]", and "[[Archfiend Soldier (Rush Duel)|Archfiend Soldier]]" have the highest [[ATK]] (1900) of all [[Level]] 4 or lower monsters in ''[[Yu-Gi-Oh! Rush Duel]]''.
  ** Due to the normal 1500 ATK [[Level 4 ATK and DEF conventions]] in ''Yu-Gi-Oh! Rush Duel'', all four cards are also [[Legend Card]]s.
  * In ''[[Yu-Gi-Oh! World Championship Tournament 2004]]'', "Luster Dragon #2" is named "Luster Dragon".
