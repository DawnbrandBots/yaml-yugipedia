title: Card Trivia:Ancient Gear Gadget
wikitext: |-
  {{Navigation}}

  * The green, yellow, and red gears on this monster's torso reference "[[Green Gadget]]", "[[Yellow Gadget]]", and "[[Red Gadget]]", each of whom this monster can change its own name to via its effect.  
  * This monster has the same [[Attribute]] ([[EARTH]]), [[Level]] (4), and [[original ATK and DEF]] (500/2000) as another "[[Ancient Gear]]" monster: "[[Ancient Gear Box]]".
