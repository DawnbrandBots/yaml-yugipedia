title: Card Trivia:CXyz Gimmick Puppet Fanatix Machinix
wikitext: |-
  {{Navigation}}

  * This monster is a "[[CXyz]]" [[Ranked-Up]] form of "[[Gimmick Puppet Fantasix Machinix]]".
  ** This monster's face resembles the mask worn by [[Vetrix]], the father of [[Quattro]], who uses the "[[Gimmick Puppet]]" [[archetype]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's name is a portmanteau of "fanatic" and ''deus ex machina'', the Latin phrase for "god from the machine".
  *** This monster represents the sadistic and cold demeanor Quattro shows when he [[Duel]]s and makes his opponents suffer as part of his "fanservice", as seen in {{episode|ZEXAL|033|ref}}.
  *** This monster's color scheme and chest gears resemble those of "[[Number 15: Gimmick Puppet Giant Grinder]]", which was the monster Quattro used to torture and defeat [[Bronk Stone]] and [[Caswell Francis]] in the aforementioned episode, in which he revealed his true sadistic nature.
  ** This monster's [[original ATK and DEF]] (3100/1500) references Quattro's Japanese codename, IV: its 3100 [[ATK]] has the numbers 3 and 1, which can be added up to 4; its 1500 [[DEF]] has the numbers 1 (I in Roman numbers) and 5 (V in Roman numbers).
  *** Also, this monster has a little clock affixed to its stomach area, where the hands appear to point to the time 4:04.
  * This monster is a non-"[[Number C]]" [[counterpart]] of "[[Number C15: Gimmick Puppet Giant Hunter]]".
  ** Both have opposite ATK/DEF of their respective base forms.
  * This is the first ''[[OCG]]''/''[[TCG]]''-original "CXyz" monster to not have a [[Summoning condition]] that uses its base form as an [[Xyz Material]].
  ** Thus, it is also the first ''OCG''-original "CXyz" monster designed to be Summoned by the effect of a "[[Rank-Up-Magic]]" card.
  * This is the first [[DARK]] "CXyz" monster to have the same [[Attribute]] as its base form.
  * This monster has the highest ATK increase compared to its base form (1600) of all "CXyz" monsters.
  ** It is also the only "CXyz" monster to have less DEF than its base form.
  * The first portion of this monster's name and the first portion of the name of "[[Service Puppet Play]]" (released in ''[[The Infinite Forbidden]]'' as well) make up the word "fanservice" (ファンサービ ''Fansābisu''), the trademark slogan used by Quattro in the original Japanese version of the ''Yu-Gi-Oh! ZEXAL'' anime.
