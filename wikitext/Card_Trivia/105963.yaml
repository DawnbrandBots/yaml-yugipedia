title: Card Trivia:Pseudo Space
wikitext: |-
  {{Navigation}}

  * This card's artwork is a color-inverted version of "[[Skyscraper]]".
  * This card's name is based on "''pseudo''", the Greek word for "false", which reflects this card's effect to replace this card's name and effect with those of the [[banish]]ed [[Field Spell Card]].
