title: 'Card Trivia:Number 54: Lion Heart'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Collectors Pack: ZEXAL Version]]''/''[[Number Hunters]]''.
  * This monster appears in the artwork of "[[Battlin' Boxing Cross Counter]]" and "[[Emperor's Armor]]".
  * "[[Number]]" monsters often take the form reflecting their owners and/or their original desires. In this case, this [[Mythyrian Number]] represents its original owner, [[Alito]].
  ** This monster's name reflects its design, as it features a large amount of hair resembling a lion's mane, as well as the multiple heart-shaped ornaments on its chest, belt, and shoulder pads.
  *** Fittingly, this monster's neutral form resembles a [[wikipedia:Human heart|human heart]] with two root-like arteries coming out of it.
  *** Also, in ''[[Yu-Gi-Oh! ZEXAL]]'', when this monster's anime effect restores the player's [[Life Point]]s to 100, it discharges an electrical shock at the player to resuscitate them like an [[wikipedia:Automated external defibrillator|automated external defibrillator]], emphasized with a heartbeat sound effect.
  ** This monster's [[Warrior]] [[Type]] reflects Alito's past life as a gladiator, a warrior who, instead of using swords, used his bare fists to fight. One of the more common uses of Alito's bare-knuckle boxing was using "cross counters", which is symbolized by this monster's effect to redirect [[battle damage]] to the opponent, as well as Alito's "[[Battlin' Boxer]]" [[Deck]] and usage of [[Counter Trap Card]]s.
  * In {{episode|ZEXAL|104|ref}}, [[Nistro]] was about to [[Rank-Up]] this monster into a "[[Number C]]" monster, but [[Yuma Tsukumo]] prevented him from activating "[[Rank-Up-Magic Barian's Force (anime)|Rank-Up-Magic Barian's Force]]", thus "Number C54" was [[List of unseen cards|never seen]].
