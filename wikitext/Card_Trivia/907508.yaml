title: Card Trivia:Zeptron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Absurd Burst]]" and "[[Transmigration of Curiosity]]".
  * This monster's name is based on the ''[[wikipedia:Zepto-|Zepto-]]'', a [[wikipedia:Metric prefix|metric prefix]] meaning 10^-21.
  * Similar to the other "[[Tron (series)|tron]]" monsters used by [[Nail Saionji]], the number of leaves on this monster's head is the same as its [[Level]].
