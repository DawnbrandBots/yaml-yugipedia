title: Card Trivia:Gladiator Beast Retiari
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gladiator Beast United]]" and "[[Gladiator Naumachia]]".
  * This monster is named after the ''[[wikipedia:Retiarius|retiarius]]'', a type of gladiator who battled with a trident and a net in [[wikipedia:Ancient Rome|Ancient Rome]].
