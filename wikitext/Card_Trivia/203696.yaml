title: Card Trivia:Cyber Tutu
wikitext: |-
  {{Navigation}}

  * This monster is based on a ''[[wikipedia:Ballet dancer|ballerina]]'', a person who practices the art of [[wikipedia:Classical ballet|classical ballet]], in which the female dancers often wear [[wikipedia:Tutu (clothing)|tutus]], consisting of a [[wikipedia:bodice|bodice]] and an attached [[wikipedia:skirt|skirt]] incorporating numerous layers of fabric.
  * This monster has an [[Card evolutions|upgraded]] [[counterpart]]: "[[Cyber Tutubon]]".
