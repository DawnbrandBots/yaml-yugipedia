title: Card Trivia:Vector Scare Archfiend
wikitext: |-
  {{Navigation}}

  * This card is the first "[[Archfiend]]" [[Link Monster]].
  ** It is also the first [[Cyberse]] "Archfiend" monster.
  * This card's name may be a reference to [[wikipedia:Vector space model|vector space models]], algebraic models for representing text documents (and any objects, in general) as vectors of identifiers (such as index terms).
  * This is the only card [[Yusaku Fujiki|Yusaku]] obtained from a [[Data Storm]] on-screen in the anime that was not used more than once.
