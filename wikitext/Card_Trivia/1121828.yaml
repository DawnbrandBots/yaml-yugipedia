title: Card Trivia:Artmage Power Patron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Artmage Masterwork -Succession-]]", "[[Artmage Pact -Awakening-]]", "[[Artmage Peripeteia -Turmoil-]]", "[[Artmage Vandalism -Assault-]]", and "[[Elfnotes: Welcome Home]]".
  * This monster is based on the [[wikipedia:Owl of Athena|Owl of Minerva]], a little owl that accompanies the Roman goddess [[wikipedia:Minerva|Minerva]].
  ** Fittingly, this monster can [[Fusion Summon]] "[[Nerva the Power Patron of Creation]]", who is based on Minerva, the Roman goddess of wisdom who is also a sponsor of the arts, which reflects its association with the art-themed "[[Artmage]]" [[archetype]].
  * This monster has multiple "[[Power Patron]]" counterparts from other archetypes.
  ** "[[DoomZ]]": "[[Power Patron DoomZ]]".
  ** "[[Elfnote]]": "[[Elfnote Power Patron]]".
