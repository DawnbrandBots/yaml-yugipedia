title: Card Trivia:Blast Held by a Tribute
wikitext: |-
  {{Navigation}}

  * The bomb in this card's artwork also appears in the artwork of "[[Zolga the Prophet]]".
  ** It also resembles the energy ball that appears in the artwork of "[[Trap of Darkness]]".
  *** Fittingly, this card can be used with the effect of "Trap of Darkness", as it is a [[Normal Trap Card]].
  * This card has a [[retrained]] [[counterpart]]: "[[Blast Held by Destiny]]".
