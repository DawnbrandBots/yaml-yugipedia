title: Card Trivia:Castel, the Skyblaster Musketeer
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from [[wikipedia:Charles de Batz de Castelmore d'Artagnan|Charles de Batz de Castelmore d'Artagnan]], a captain of the [[wikipedia:Musketeers of the Guard|Musketeers of the Guard]] who was popularized by [[wikipedia:Alexandre Dumas|Alexandre Dumas']] 19th century novel, ''[[wikipedia:The Three Musketeers|The Three Musketeers]]''.
  * This monster's ''[[TCG]]'' name contains both the Japanese and international name of the "[[Skyblaster]]" [[archetype]].
