title: Card Trivia:Magikey Fiend - Transfurlmine
wikitext: |-
  {{Navigation}}

  * This monster appears to be a transformed "[[Clavkiys, the Magikey Skyblaster]]".
  ** The artwork of "[[Magikey Locking]]" appears to show "Clavis" transforming back into his original form.
  * This monster's name is possibly a portmanteau of "transforming" and ''[[wikipedia:Furfur|Furfur]]'', one of the Demon Earls of Hell from the ''[[wikipedia:The Lesser Key of Solomon|Ars Goetia]]''.
  * This is the first [[FIRE]]-[[Attribute]] [[Thunder]]-[[Type]] monster in the ''[[OCG]]''/''[[TCG]]''.
