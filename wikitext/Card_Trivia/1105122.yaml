title: Card Trivia:Juraishin, the Cursed Thunder God
wikitext: |-
  {{Navigation}}

  * This monster appears to be thematically tied to "[[Lightning Storm]]", which also features bulleted effects that can either [[destroy]] all [[face-up]] monsters or all [[Spell]]/[[Trap Card]]s on the opponent's [[field]].
  * This monster is tied with "[[Hyper Psychic Blaster/Assault Mode]]", "[[Absolute Axon Kicker]]" and "[[Psychic End Punisher]]" for having the highest [[Level]] (11) of all [[Psychic]] monsters.
  * While not directly related to its [[P.U.N.K.|corresponding theme]], this monster, "[[NT8000 - SIRIUS]]", and "[[Filia Regis]]" were announced one after the other<ref>{{cite web | url = https://x.com/YuGiOh_OCG_INFO/status/1872975794768621630 | title = вӢ…вӢҶвӢ„вң§рқҳјрқҷҮрқҷҮрқҷ„рқҳјрқҷүрқҳҫрқҷҖ рқҷ„рқҷүрқҷҺрқҷ„рқҷӮрқҷғрқҷҸ рқҹҗрқҹҺрқҹҗрқҹ“.рқҹҸ.рқҹҗрқҹ“ рқҗ’рқҗҡрқҗӯ вң§вӢ„вӢҶвӢ… в—ҶеҸҺйҢІгӮ«гғјгғүе…¬й–Ӣв—Ҷ в—ӨNTпјҳпјҗпјҗпјҗпјҚSIRIUSв—ў еҸҺйҢІвқ—пёҸ | publisher = е…¬ејҸгҖ‘йҒҠжҲҜзҺӢOCG (X) {{icon|jp}} | accessdate = December 31, 2024 | date = December 28, 2024 }}</ref><ref>{{cite web | url = https://x.com/YuGiOh_OCG_INFO/status/1873338178897326276 | title = вӢ…вӢҶвӢ„вң§рқҳјрқҷҮрқҷҮрқҷ„рқҳјрқҷүрқҳҫрқҷҖ рқҷ„рқҷүрқҷҺрқҷ„рқҷӮрқҷғрқҷҸ рқҹҗрқҹҺрқҹҗрқҹ“.рқҹҸ.рқҹҗрқҹ“ рқҗ’рқҗҡрқҗӯ вң§вӢ„вӢҶвӢ… вңҰеҸҺйҢІгӮ«гғјгғүе…¬й–ӢвңҰ в—ӨеҰ–з«ңгҒ®зҰҒе§«в—ў еҸҺйҢІвқ—пёҸ | publisher = е…¬ејҸгҖ‘йҒҠжҲҜзҺӢOCG (X) {{icon|jp}} | accessdate = December 31, 2024 | date = December 29, 2024 }}</ref><ref>{{cite web | url = https://x.com/YuGiOh_OCG_INFO/status/1874002560853364808 | title = вӢ…вӢҶвӢ„вң§рқҳјрқҷҮрқҷҮрқҷ„рқҳјрқҷүрқҳҫрқҷҖ рқҷ„рқҷүрқҷҺрқҷ„рқҷӮрқҷғрқҷҸ рқҹҗрқҹҺрқҹҗрқҹ“.рқҹҸ.рқҹҗрқҹ“ рқҗ’рқҗҡрқҗӯ вң§вӢ„вӢҶвӢ… вңҰеҸҺйҢІгӮ«гғјгғүе…¬й–ӢвңҰ в—Өе‘Әйӣ·зҘһгӮёгғҘгғ©в—ў еҸҺйҢІвқ—пёҸ | publisher = е…¬ејҸгҖ‘йҒҠжҲҜзҺӢOCG (X) {{icon|jp}} | accessdate = December 31, 2024 | date = December 31, 2024 }}</ref> and support the Types and strategies featured in the ''[[Quarter Century Trinity Box]]''.
  ** This monster was revealed on December 31, 2024 in Japan. Coincidentally, it also has 3100 [[original ATK and DEF]].

