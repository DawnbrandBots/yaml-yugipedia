title: Card Trivia:Voidvelg Theogonia
wikitext: |-
  {{Navigation}}

  * This monster is named after the ''[[wikipedia:Theogony|Theogony]]'', a poem written by [[wikipedia:Hesiod|Hesiod]] describing the birth of the Greek gods.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Voidvelg Chrysaor]]".
