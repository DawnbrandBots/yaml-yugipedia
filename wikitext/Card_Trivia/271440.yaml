title: Card Trivia:Grisaille Prison
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Grisaille|Grisaille]] is a technique for [[wikipedia:painting|painting]] in [[wikipedia:grayscale|greyscale]], referencing this card's relation to [[Synchro Monster|Synchro]] and [[Xyz Monster]]s ([[wikipedia:black|black]] + [[wikipedia:white|white]] = [[wikipedia:grey|grey]]).
  * "[[Brotherhood of the Fire Fist - Horse Prince]]" (Synchro Monster) and "[[Brotherhood of the Fire Fist - Lion Emperor]]" (Xyz Monster) appear in this card's artwork, entrapped in the painting.
