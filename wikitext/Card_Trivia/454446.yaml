title: Card Trivia:Super Anti-Kaiju War Machine Mecha-Dogoran
wikitext: |-
  {{Navigation}}

  * This monster appears to be a robotic duplicate of "[[Dogoran, the Mad Flame Kaiju]]", as indicated in the artwork of "[[The Kaiju Files]]". This in turn is most likely a reference to the second and third versions of [[wikipedia:Mechagodzilla|Mechagodzilla]] from the [[wikipedia:Godzilla (franchise)|Godzilla]] franchise, which are robots built by humans to defeat the original Godzilla.
  ** Specifically, this monster is a clear homage to the Mechagodzilla from [//wikizilla.org/wiki/Godzilla_vs._Mechagodzilla_II Godzilla vs. Mechagodzilla II].
  ** Its effect to equip 1 "Kaiju" monster from the player's [[hand]] or [[Graveyard]] to itself by removing 2 Kaiju Counters from the field and gain [[ATK]] equal to the combined [[original ATK]] of the "Kaiju" monsters equipped to it is an homage to [//wikizilla.org/wiki/Kiryu Kiryu] from [//wikizilla.org/wiki/Godzilla_vs._Mechagodzilla Godzilla vs. Mechagodzilla], who was built over the bones of the original Godzilla.
  ** This monster's design is also reminiscent of [//wikizilla.org/wiki/Gigan Gigan]'s design in [https://wikizilla.org/wiki/Godzilla_Final_Wars Godzilla Final Wars], namely in its right hand, which resembles that of Gigan during his last fight against Godzilla and Mothra.
