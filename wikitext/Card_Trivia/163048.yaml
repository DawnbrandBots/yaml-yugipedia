title: Card Trivia:Icebergdon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's Japanese name, "Menchi Icebergdon" (メンチ・アイスバーグドン, ''Menchi Aisubāgudon'') and appearance are based on the [[wikipedia:Mamenchisaurus|Mamenchisaurus]], a genus of [[wikipedia:Saurpod|saurpod]] dinosaurs with remarkably long necks.
  ** The name could also originate from the Kansai dialect "''menchi o kiru''" ([https://en.wiktionary.org/wiki/%E3%83%A1%E3%83%B3%E3%83%81%E3%82%92%E5%88%87%E3%82%8B メンチを切る]), which means "to glare in challenge".
