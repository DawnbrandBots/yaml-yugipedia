title: Card Trivia:Ragnaraika Selene Snapper
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Black Turtle-Snake|Black Turtle-Snake]], one of the [[wikipedia:Four Symbols|Four Symbols]] in Chinese astrology that is often depicted as a turtle intertwined with a snake, and [[wikipedia:Selene|Selene]], the Greek goddess personifying the moon.
  * This monster's Japanese name,「{{Ruby|蕾禍|ライカ}}ノ{{Ruby|玄神憑月|クロカミツキ}}」(''Raika no Kurokamitsuki''), features multiple instances of wordplay:
  ** Its pronunciation is a portmanteau of「{{Ruby|黒|くろ}}」(''kuro'', "black") and「{{Ruby|噛|か}}み{{Ruby|付|つ}}き{{Ruby|亀|がめ}}」(''kamitsukigame'', "[[wikipedia:Common snapping turtle|common snapping turtle]]").
  ** Its spelling includes the kanji「玄」(lit. "mysterious"), the first kanji in「{{Ruby|玄武|げんぶ}}」(''genbu'', "Black Tortoise"), and「月」(''tsuki'', "moon"), befitting the crescent moon motif on this monster's armor.
