title: Card Trivia:Couplet the Melodious Songstress
wikitext: |-
  {{Navigation}}

  * This monster's name is based on a [[wikipedia:Couplet|couplet]], a pair of successive lines of verse, especially a pair that rhyme and are of the same length.
  ** In music, a couplet is connected to each other through a chorus or a refrain, which reflects this monster's relationship with its fellow "[[Melodious]]" [[Pendulum Monster]], "[[Refrain the Melodious Songstress]]".
  * This monster is wearing a double-banded bracelet, referencing [[Zuzu's bracelet|the bracelet]] worn by [[Zuzu Boyle]], who used the "[[Melodious]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
