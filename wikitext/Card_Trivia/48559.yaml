title: Card Trivia:Wandering Mummy
wikitext: |-
  {{Navigation}}

  * The mummies in this card's artwork look akin to the one on "[[Call of the Mummy]]".
  * This card's effect to manipulate which [[Monster Zone]]s that monsters in [[face-down]] [[Defense Position]] occupy is similar to the effect of "[[Shifting Shadows]]".
  ** Additionally, both cards have an [[wikipedia:Culture of Egypt|Egyptian]] motif, with this card featuring a pair of [[wikipedia:mummy|mummies]] and "Shifting Shadows" featuring "[[Guardian Statue]]" sentries at a Egyptian-esque structure.
