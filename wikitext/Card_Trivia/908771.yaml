title: Card Trivia:Mad Mauler
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Mad Murder" (マッドマーダー, ''Maddo Mādā''), is likely a reference to "[[Crass Clown]]", whose Japanese name is "Murder Circus" (マーダーサーカス, ''Mādā Sākasu'').
  * This monsters shares many similarities with "[[Plaguespreader Zombie]]" and "[[Pain Painter]]":
  ** They have the same [[Attribute]] ([[DARK]]), [[Level]] (2), [[Type]] ([[Zombie]]/[[Tuner monster|Tuner]]) and [[original ATK and DEF]] (400/200).
  ** Both this monster and "Pain Painter" feature effects that allows them to treat their names as "Plaguespreader Zombie".
