title: Card Trivia:Chimeratech Fortress Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cyber Network]]" and "[[Cyber Repair Plant]]".
  * This monster has a [[retrained]] counterpart: "[[Chimeratech Megafleet Dragon]]".
  * This card has a similar counterpart: "[[Chimeratech Overdragon]]".
  ** Both this monster and "Chimeratech Overdragon" are based on the [[wikipedia:Chimera (mythology)|Chimaera]], a [[wikipedia:Legendary creature|mythical beast]] who had three heads; that of a [[wikipedia:dragon|dragon]], [[wikipedia:lion|lion]], and [[wikipedia:goat|goat]]. More recently, 'chimaera' refers to the idea of combining things that occur naturally, much like both monsters are [[Fusion Summon]]ed by using various [[Machine]] monsters.
  * This monster's body appears to be made of nine portals. Each portal seems to produce the head of a "[[Cyber Dragon]]", likely referencing the fact it gains 1000 [[ATK]] per monster used for its Fusion Summon. Including the mouth, this monster can have a maximum of ten heads, likely referencing the number of monsters that can be on both sides of the field at once (until the introduction of [[Extra Monster Zone]]s in [[Master Rule#New Master Rule|New Master Rules]]).
  * The maximum original ATK this card can reach with its effect is 13000. This is achievable with "[[Clockwork Night]]" or "[[DNA Surgery]]" set to Machine, twelve monsters, and a "Cyber Dragon" in the [[Spell & Trap Zone]] (such as being an [[Equip Card]] for "[[Relinquished]]" or a similar monster, or placing "Cyber Dragon" in the Spell & Trap Zone by the effects of cards such as "[[Snake-Eyes Flamberge Dragon]]" or "[[Enigmaster Packbit]]").
  * This is the first [[Fusion Monster]] Special Summoned by [[Contact Fusion]] whose Fusion Materials do not have to originate from the side of the field of the player conducting the Contact Fusion.
