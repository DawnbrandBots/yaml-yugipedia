title: 'Card Trivia:Number 71: Rebarian Shark'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster is a [[counterpart]] to "[[Number 17: Leviathan Dragon]]":
  ** This monster's number, 71, is the reverse of 17.
  ** This monster's [[Rank]], [[Type]], [[Attribute]] and [[Xyz Material]]s are the same of "Leviathan Dragon".
  ** This monster's [[ATK]] and [[DEF]] are the same as that of "Number 17" swapped.
  ** [[Shark]], who is a [[Barian]], was the original owner of "Number 17", and this monster looks similar to a combination of "Leviathan Dragon" and the [[Barian Emblem]] as well as having "Shark" in its name.
  ** "Rebarian" in this card's name ('''リバリアン''' ''Ribarian'') is a portmanteau of "Leviathan" ('''リバ'''イス ''Ribaisu'', "Levice") and "Barian" (バ'''リアン''', ''Varian''). It is also a pun on the word "Revive" ('''リバ'''イブ  ''Ribaibu''), referencing this monster's effect.
  * This card's artwork strongly resembles that of "[[Rank-Up-Magic - The Seventh One]]", with the Barian Emblem in this monster's body and the same star formation (the [[wikipedia:Big Dipper|Big Dipper]]) appearing in the background.
  ** This monster's number (71) also corresponds to that card's name: "Rank-Up-Magic - The '''Seven'''th '''One'''".
  ** This card's last effect to take a "[[Rank-Up-Magic]]" [[Spell Card]] and place it on top of the [[Deck]] is a reference to [[Chaos Draw]], which was used by the [[Seven Barian Emperors]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime to [[Draw]] "Rank-Up-Magic - The Seventh One". As mentioned on the related [[Card Tips:Number 71: Rebarian Shark|Tips]] page, this card is useful for pulling off the activation condition of "The Seventh One".
