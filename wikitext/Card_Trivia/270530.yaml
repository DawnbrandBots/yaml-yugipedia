title: Card Trivia:Archfiend Heiress
wikitext: |-
  {{Navigation}}

  * This monster appears to be a younger version of "[[Archfiend Eccentrick]]", "[[Highness Archfiend]]", and "[[Archfiend Empress]]".
  ** The name of "Archfiend Eccentrick" is a pun on this monster's Japanese name, "{{Translated name|Archfiend Heiress|ja}}".
  ** This monster's ''[[TCG]]'' name, "Heiress", implies that it might be the child of "Empress" instead, although it could also simply refer to this form predating her coronation; the latter is supported by how this monster's ''[[OCG]]'' artwork depicts her making an energy ball identical to the one held by "Empress".
