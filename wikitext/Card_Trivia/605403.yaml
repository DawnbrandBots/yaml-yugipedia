title: Card Trivia:Avida, Rebuilder of Worlds
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[World Reassembly]]".
  * Multiple "[[Qli]]" cores appears in this card's artwork (along the lower body, left arm, and on the head).
  * "[[Chosen by the World Chalice]]" → "[[Auram the World Chalice Blademaster]]" → "[[Mekk-Knight Avram]]" → "[[Crusadia Maximus]]" → "[[Crusadia Equimax]]" → "[[Mekk-Knight Crusadia Avramax]]" → "Avida, Rebuilder of Worlds"
  ** This monster is "Mekk-Knight Crusadia Avramax" merged with "[[World Gears of Theurlogical Demiurgy]]". Fittingly, this monster has the same [[Type]] ([[Cyberse]]) and [[ATK]] (3500) as "World Gears", and requires [[banish]]ing [[Link Monster]]s in order to be Summoned.
  ** This monster has the same blue-gem of "[[Mekk-Knight Blue Sky]]" (which "Mekk-Knight Avram" [[World Legacy Succession|inherited]]) on its chest.
  * This monster is similar to "[[Sophia, Goddess of Rebirth]]" and "[[Tierra, Source of Destruction]]"; this implies a connection between the [[Duel Terminal]] and "[[World Legacy]]" lores.
  ** This monster is named after [[wikipedia:Avida (software)|Avida]], an artificial life simulation based on [[wikipedia:Tierra (computer simulation)|Tierra]], which is the origin of the name of "Tierra, Source of Destruction".
  ** The three share the same [[Level]] (11) and similar effects; this monster's [[original ATK and DEF]] (3500/3500) also have a difference of exactly 100 points from the ATK and [[DEF]] of "Sophia" and "Tierra".
  ** The kanji ''Sōseishin'' (双星神, "Twin Star God") in this monster's Japanese name is a homophone of the kanji ''Sōseishin'' (創星神, "Star-Creator God") in the Japanese names of "Sophia, Goddess of Rebirth" and "Tierra, Source of Destruction".
  *** The kanji 「双」 (''Sō'', "Twin") in this monster's Japanese name is also the same as in the Japanese name of "Mekk-Knight Crusadia Avramax".
  * This monster is tied with "World Gears of Theurlogical Demiurgy" and "[[Firewall Dragon Singularity]]" for having the highest original ATK (3500) of all Cyberse monsters.
  ** This monster also has the highest original DEF (3500) of all Cyberse monsters.
