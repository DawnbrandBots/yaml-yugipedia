title: Card Trivia:Cyber Angel Idaten
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Incarnated Machine Angel]]".
  * This monster is based on '''[[wikipedia:Skanda (Buddhism)|Idaten]]''', a devoted guardian and an honored [[wikipedia:Bodhisattva|Bodhisattva]] of [[wikipedia:Vihara|Buddhist monasteries]] who guards the [[wikipedia:Dharma|Dharma]] and the objects of the Dharma. Idaten is the General-in-Chief of the thirty-two heavenly generals who serve under the [[wikipedia:Four Heavenly Kings|Four Heavenly Kings]].
