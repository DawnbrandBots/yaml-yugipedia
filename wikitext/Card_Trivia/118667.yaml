title: Card Trivia:Genex Ally Birdman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Trance Archfiend]]".
  * "[[Mist Condor]]" and "[[Divine Wind of Mist Valley]]" appear in this card's second artwork.
  * According to the [[Duel Terminal Master Guide card storylines|Duel Terminal Master Guide card storylines]], this monster is modeled after the "[[Mist Valley]]" [[archetype]].
  ** This monster's appearance, [[Level]], and [[Tuner monster]] [[card type]] reference how the [[Level 4]] or lower "Mist Valley" [[Winged Beast]] monsters are Tuner monsters.
  ** This monster's [[Special Summon]]ing effect references how the "Mist Valley" archetype features a playstyle revolving around [[return]]ing the player's monster to the hand.
  * In the first Spanish print of ''[[Hidden Arsenal 4: Trishula's Triumph]]'', this card uses the word "''regresar''" instead of "''devolver''" for the term "''return''".
