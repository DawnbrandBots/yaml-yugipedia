title: Card Trivia:Road Warrior
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the ''[[Starter Deck 2009]]''/''[[Starter Deck: Yu-Gi-Oh! 5D's 2009]]''.
  * This monster appears in the artworks of "[[Dimension Voyage]]" and "[[Synchro Emergency]]".
  * The part of this monster's armor that resembles wings is actually a piece of road that it uses to activate its special effect.
  * This card's name was mistakenly printed as "Lord Warrior" in a ''TCG'' preview of the card.
  * This is the first "[[Warrior (archetype)|Warrior]]" monsters to not have a 1000 difference between its [[ATK]] and [[DEF]].
  * This card's ATK is twice that of its DEF, much like "[[Road Synchron]]".
  * This monster's name is "Road Fighter" in the English dub, most likely to avoid copyright issues with the film ''[[wikipedia:Mad Max 2|The Road Warrior]]''.
