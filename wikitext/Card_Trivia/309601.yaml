title: Card Trivia:Rune-Eyes Pendulum Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Secrets of Eternity]]''.
  ** This is the first [[Fusion Monster]] to be a [[Booster Pack]]'s cover card since "[[Dragon Knight Draco-Equiste]]" of ''[[Duelist Revolution]]''.
  ** This is the first cover card not to have a second-rarity variant (e.g. [[Secret Rare]] or [[Ultimate Rare]]) in its Booster pack.
  * This card appears in the artwork of "[[Dueltain Ultimate Party]]".
  * This monster's appearance looks like a combination of "[[Odd-Eyes Pendulum Dragon]]" and "[[Stargazer Magician]]", which is fitting as these were the monsters [[Yuya Sakaki]] used to [[Fusion Summon]] it the first time.
  * This card is the first Fusion Monster to require a [[Pendulum Monster]] as a [[Fusion Material]].
  * This card is the only "[[Pendulum Dragon]]" Fusion Monster to specifically list "Odd-Eyes Pendulum Dragon" as one of its Fusion Materials.
  * Each "Pendulum Dragon" Fusion Monster is Summoned utilizing a [[Type]] of monster Yuya Sakaki used in his Deck, with this card using [[Spellcaster]] monsters.
  ** Ironically, despite being called "Pendulum Dragon", this card is not a Pendulum Monster, but a Fusion Monster made up of "Odd-Eyes Pendulum Dragon" and a Spellcaster monster. This makes this card (and its counterparts) differ from the other 'normal' evolutions of the [[Four Dimensional Dragons]], as all of them are of the [[card type]] featured in their name.
  * This card has two counterparts:
  ** A [[Beast]]-based counterpart: "[[Beast-Eyes Pendulum Dragon]]".
  ** A [[Warrior]]-based counterpart: "[[Brave-Eyes Pendulum Dragon]]".
  * This card is similar to the "[[Number C]]" monsters from ''[[Yu-Gi-Oh! ZEXAL]]'' as, initially, it did not exist within the owner's [[Extra Deck]], but it is created during a Duel when it is Summoned for the first time.
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster's cry is similar to the [[Crimson Dragon]]'s cry.
  * Apparently, this monster has the ability to fly, as shown in its debut in {{episode|ARC-V|023|ref}}. However, in {{episode|ARC-V|026|ref}}, it instead jumped over a fissure to help Yuya grab an [[Action Card]].
