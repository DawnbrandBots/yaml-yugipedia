title: Card Trivia:The Selection
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Noah's Ark|Noah's Ark]], a massive ship built by [[wikipedia:Noah|Noah]] upon instructions from [[wikipedia:God in Abrahamic religions|God]] to save himself, his family, and the world's animals from the [[wikipedia:Genesis flood narrative|Biblical flood]].
  * In ''[[Yu-Gi-Oh! Ultimate Masters: World Championship 2006]]'', ''[[Yu-Gi-Oh! GX Card Almanac]]'', ''[[Yu-Gi-Oh! GX Spirit Caller]]'', ''[[Yu-Gi-Oh! World Championship 2007]]'', and ''[[Yu-Gi-Oh! GX Tag Force]]'' (PS2), this card had the following inaccurate card text: "By paying 1000 [[Life Points]] you can [[destroy]] all [[Monster Cards]] in face-up position on the Field and prevent any cards of the same [[Type]] from being Summoned, Flip Summoned, or Special Summoned". The in-game effect of the card, is correct, however.
