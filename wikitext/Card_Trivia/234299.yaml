title: Card Trivia:Smash Ace
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The woman in this card's artwork also appears in the artwork of "[[Receive Ace]]".
  * This card is a reference to an [[wikipedia:Ace (tennis)|ace]], a term used in tennis where the serve isn't touched by the receiver and wins the server the point.
  ** This card's name is also a reference to a [[wikipedia:Smash (tennis)|smash]], an overhead shot that can be used with enough force to end the point. This is reflected in this card's artwork and effect of sending a [[Monster Card]] from the top of the player's [[Deck]] to the [[Graveyard]] to inflict 1000 damage to the opponent to end the point.
