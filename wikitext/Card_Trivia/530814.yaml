title: Card Trivia:Draconnet
wikitext: |-
  {{Navigation}}

  * This card's name is possibly a portmanteau of the terms "dragonet" (a small dragon) and "[[wikipedia:Piconet|piconet]]" (an [[wikipedia:Ad hoc network|ad hoc network]] that links a wireless user group of devices using [[wikipedia:Bluetooth|Bluetooth]] technology protocols).
  * A [[wikipedia:WiFi|WiFi]] symbol appears on this monster's tail.
