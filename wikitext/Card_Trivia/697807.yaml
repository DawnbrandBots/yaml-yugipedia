title: Card Trivia:Ogre of the Scarlet Sorrow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Resonator Command]]".
  * This monster likely references "The Red Ogre Who Cried" (泣いた赤鬼, ''Naita Akaoni''), a Japanese children's tale about a kindly red ogre who sacrifices his friendship with a blue ogre to befriend a village of humans.
