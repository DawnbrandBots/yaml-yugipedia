title: Card Trivia:Samurai of the Wooden Sword
wikitext: |-
  {{Navigation}}

  * Visually, this monster is "[[Masaki the Legendary Samurai]]" wielding "[[Centennial Wooden Blade]]" as one of its weapons.
  ** Fittingly, both monsters appear in the artworks of "[[Climax Clash]]" and "[[Engage and Strike!]]", both of which this monster supports.
