title: Card Trivia:Interplanetarypurplythorny Dragon
wikitext: |-
  {{Navigation}}

  * This card has a [[counterpart]] with inverted [[ATK]] and [[DEF]]: "[[Interplanetarypurplythorny Beast]]". It also has a similar effect to Summon itself when a monster you control is destroyed and sent to the Graveyard.
  ** Unlike "Dragon", which can Summon itself from the hand and can do so if the monster is destroyed by battle or card effect, "Beast" can only Summon itself from the Graveyard, and requires the monster to be destroyed by battle.
