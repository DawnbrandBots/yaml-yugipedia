title: Card Trivia:Light Law Medium
wikitext: |-
  {{Navigation}}

  * This monster originally debuted as a constructed card in ''[[Yu-Gi-Oh! Dark Duel Stories]]'', and is also one of five constructible cards to be released in the ''[[OCG]]''/''[[TCG]]''. It is a [[List of significant constructed cards#Standard combinations|matched constructed card]] using the 69th upper and lower body [[card part]]s, "[[Light Law]]" and "[[Medium]]".
  ** This is also one of [[List of significant constructed cards#Became regular cards|seven originally constructible cards]] to appear as a regular card in the game's sequel, ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'', as well one of three to be released in the ''OCG''/''TCG''.
  * When this card was released, it had the [[List of cards with the longest OCG import times|longest ''OCG'' import time]], being released over 21 years after its first video game appearance. It was eventually succeeded by "[[Dragon Nails]]" (released June 2022), which was released over 23 years after its first appearance.
  ** This is the only card not originating in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] to ever hold the record of the longest ''OCG'' import time.
