title: Card Trivia:EN Wave
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Mariner]]" and "[[Neo-Spacian Glow Moss]]" appear in this card's artwork.
  ** This card's artwork references a scene from {{episode|GX|130|ref}}, where [[Jaden Yuki]] [[activate]]d "[[EN Shuffle (anime)|EN Shuffle]]" to [[return]] "[[Elemental Hero Mariner (anime)|Elemental Hero Mariner]]" to the [[Extra Deck]] and [[Special Summon]] "[[Neo-Spacian Glow Moss (anime)|Neo-Spacian Glow Moss]]", during his [[Tag Team Duel]] with [[Jesse Anderson]] against [[Marcel Bonaparte]].
  * The initials "EN" in this card's name references both the "[[Elemental HERO]]" and "[[Neo-Spacian]]" [[archetype]]s.
