title: Card Trivia:Terror of Trishula
wikitext: |-
  {{Navigation}}

  * "[[Trishula, Dragon of the Ice Barrier]]", "[[Dewloren, Tiger King of the Ice Barrier]]", and "[[Ally of Justice Unknown Crusher]]" (between "Trishula" and "Dewloren") appear in this card's artwork.
  ** Fittingly, this card's three applied effects are based on the effect of "Trishula" that activates when it is Synchro Summoned.
  * This card is named after ''[[Duel Terminal - Pulse of the Trishula!!]]'', the set in which "Trishula, Dragon of the Ice Barrier" debuted.
