title: Card Trivia:Pon, The Forest Merchant
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the ''[[wikipedia:Bake-danuki|bake-danuki]]'', a mythical [[wikipedia:Japanese raccoon dog|Japanese raccoon dog]] (or ''tanuki'') ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore capable of using shape-shifting powers by using leaves placed on their heads.
  ** This monster's name references the sound effect made when beating a ''[[Wikipedia:Tsuzumi|tsuzumi]]'' (a small Japanese drum), and the sound a ''tanuki'' makes by beating on their belly for a drum (''pon pon'').
