title: Card Trivia:Night Train Blue Traveler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Revolving Switchyard]]".
  ** The aforementioned card was released on November 2014 in ''[[Secrets of Eternity]]'', 11 years before this card's eventual release in ''[[Blazing Dominion]]''
  * This monster is based on Japan's [[wikipedia:Blue Train (Japan)|Blue Train]], a now-defunct long-distance sleeper train, nicknamed as such for the color of its train cars.

