title: Card Trivia:Nirvana High Paladin
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[The Dark Illusion]]''.
  * This is the first [[Synchro Pendulum Monster]] to be revealed in both the ''[[Yu-Gi-Oh! ARC-V]]'' anime and the ''[[OCG]]''/''[[TCG]]''
  ** Both this card and the first [[Xyz Pendulum Monster]], "[[Odd-Eyes Rebellion Dragon (anime)|Odd-Eyes Rebellion Dragon]]", were used by [[Yuya Sakaki]].
  ** Both were Summoned via Yuya treating one of the monsters to become a viable [[Material]] for its respective Summoning procedure either by its own effect or another.
  *** In this monster's case, this card treated "[[Enlightenment Paladin (anime)|Enlightenment Paladin]]" as a [[Tuner monster|Tuner]] (even though the anime effect-based requirement for it doesn't technically needs one to be treated as a Tuner), while the effects of "[[Xiangke Magician (anime)|Xiangke Magician]]" and "[[Xiangsheng Magician (anime)|Xiangsheng Magician]]" treated "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]" as a [[Level]] 7 monster just like "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]".
  *** It is also worth noting that both [[Extra Deck]] [[Pendulum Monster]]s were Summoned by using 1 Pendulum Monster and 1 Extra Deck monster with the same [[card type]].
  * This monster is an [[Card evolutions|upgraded]] Synchro Pendulum form of "[[Enlightenment Paladin]]".
  ** Also, to somehow symbolize even further this fact, the first time Yuya used "Enlightment Paladin" was during episode '''[[Yu-Gi-Oh! ARC-V - Episode 079|79]]''' of the anime, while this card debuted in episode '''[[Yu-Gi-Oh! ARC-V - Episode 097|97]]'''.
  * This card and "[[Shooting Star Dragon]]" have several similarities:
  ** Both have the same [[ATK]], [[DEF]], and Level.
  ** They are both Synchro Monsters that require its non-Tuner [[Synchro Material]] monsters to be a Synchro Monster themselves.
  ** They are both evolutions of 2 monsters with the same ATK, DEF and Level ("Enlightenment Paladin" and "[[Stardust Dragon]]").
  ** They are both used by a protagonist (Yuya Sakaki and [[Yusei Fudo]]) to fight against an upgraded version of [[Jack Atlas (ARC-V)|Jack]] [[Jack Atlas|Atlas]]' [[Tyrant Red Dragon Archfiend|signature]] [[Red Nova Dragon|monster]].
  ** Their effects are upgraded versions of their base form's ones.
  * In [[wikipedia:Buddhism|Buddhism]], [[wikipedia:Nirvana (Buddhism)|Nirvana]] is a "place" where one who achieved "Enlightenment" goes to after death, a reference to [[Clear Mind]].
