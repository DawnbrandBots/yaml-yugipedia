title: Card Trivia:100-Year Awakening
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on ''[[wikipedia:Sleeping Beauty|Sleeping Beauty]]'', specifically [[wikipedia:Charles Perrault|Charles Perrault's]] version of the fairy tale.
  ** This card's effect to [[Tribute]] "[[Curse of Thorns]]" and [[Special Summon]] "[[Thorn Princess]]" references how the sleeping princess was awakened one hundred years after the beginning of her cursed slumber by a prince, who braves the forest of thorns and brambles surrounding the princess' castle.
