title: Card Trivia:Zombyra the Dark
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[A Hero Emerges]]".
  * This monster is based on [[Zombire]], an American comic book superhero featured in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'']] manga, who in turn was based on real-world American comic book superhero [[wikipedia:Spawn (comics)|Spawn]].
  ** This monster's effect to decrease its [[ATK]] by 200 when it destroys a monster by battle references Zombire's backstory, in which he is slowly losing his life.
  ** The monster is one of the many fictional characters in the ''Yu-Gi-Oh!'' manga that did not debut as a card in that media, but was eventually introduced in the ''[[OCG]]''/''[[TCG]]'', the other being "[[Dark Master - Zorc]]".
  * This monster could be considered a precursor to the "[[HERO]]" [[archetype]].
  ** This monster is based on an existing superhero, similar to the "HERO" monsters.
  ** Additionally, this monster appears in the artwork of "A Hero Emerges", a [[Trap Card]] used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime, who uses the "[[Elemental HERO]]" [[archetype]].
