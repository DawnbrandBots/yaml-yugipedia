title: Card Trivia:Gishki Avance
wikitext: |-
  {{Navigation}}

  * According to the ''[[Duel Terminal Master Guide card storylines|Duel Terminal Master Guide]]'', this monster is the son of "[[Gishki Natalia]]", and "[[Evigishki Levianima]]" is him after being corrupted by "[[Gishki Photomirror]]" while attempting to revive "[[Gishki Emilia]]" and accidentally merging with her soul instead. He is also a younger version of "[[Avance, Swordsman of the Nekroz]]", "[[Great Sorcerer of the Nekroz]]", and "[[Zefrasaber, Swordmaster of the Nekroz]]".
  * This monster appears in the artworks of "[[Aquamirror Cycle]]", "[[Focused Aquamirror]]", "[[Spell Wall]]", and "[[Sacred Serpent's Wake]]". He also appears as a child in "[[Winds Over the Ice Barrier]]" and "[[After the Storm]]".
  * "[[Gishki Aquamirror]]" appears on the hilt of this monster's sword, which appears to be the same as that of "Noellia", implying that "Avance" inherited it from his mother after her death. He is still carrying it into his old age as seen in the artwork of his "Nekroz" counterparts.
