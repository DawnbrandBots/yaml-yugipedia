title: Card Trivia:Hydra Viper
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Lernaean Hydra|Hydra]], a multi-headed serpentine lake monster in [[wikipedia:Greek mythology|Greek mythology]] who had the ability to reproduce two heads when one was cut off.
  * This monster's three heads represent the same number of attacks it can perform with its effect.
