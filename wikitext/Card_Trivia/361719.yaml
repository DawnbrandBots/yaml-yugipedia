title: Card Trivia:Painful Escape
wikitext: |-
  {{Navigation}}

  * "[[Ojama Black]]" and "[[Ojama Yellow]]" appear in this card's artwork.
  * This card's artwork appears to be based on the Greek story of the Minotaur, in which King Minos imprisons the Minotaur in the Labyrinth and uses the perilous structure to feed it humans.
