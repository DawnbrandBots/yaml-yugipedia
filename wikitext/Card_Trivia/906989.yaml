title: Card Trivia:Raider's Wing
wikitext: |-
  {{Navigation}}

  * This monster's name references ''[[Wing Raiders]]'', a [[Booster Pack]] that introduced some of the earliest support for the "[[Raidraptor]]" and "[[The Phantom Knights]]" [[archetype]]s.
  ** This naming convention is likely shared by the card "[[Evil Assault]]", given the "[[Evil HERO]]" archetype was introduced in ''[[Gladiator's Assault]]'' alongside the eponymous "[[Gladiator Beast]]" (whom also receives support in "Evil Assault's" Booster Pack, ''[[Supreme Darkness]]'').
  * This is the only "The Phantom Knights" monster to not be a [[Warrior]] monster, being [[Winged Beast]] instead.
  ** This mirrors "[[Raider's Knight]]", which is the only "Raidraptor" monster to not be a Winged Beast monster, being Warrior instead.
