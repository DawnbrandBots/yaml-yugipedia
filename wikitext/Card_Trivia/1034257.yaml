title: Card Trivia:Tenpai Dragon Paidra
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''báibǎn'' tile (白板), a blank slate [[wikipedia:Mahjong|mahjong]] tile that is also known as the "white dragon" tile.
  ** This monster's Japanese name, "Paidora" (パイドラ, ''Paidora''), is a portmanteau of the word used for the ''bái'' tile (パイパン, ''paipan'') and the shortened word for "dragon" ('''ドラ'''ゴン, '''''dora'''gon'').
  ** ''Pai'' also happens to work under the rules of Mandarin Wades-Giles phonetic spelling, where P is pronounced as a B sound (eg. Peking -> Beijing, 北京 ''Běijīng'').
  * This monster has two combined "[[Sangen]]" [[Synchro Monster]] forms:
  ** "[[Sangenpai Bident Dragion]]" (combined with "[[Tenpai Dragon Chundra]]")
  ** "[[Sangenpai Transcendent Dragion]]" (combined with "Chundra" and "[[Tenpai Dragon Fadra]]")
