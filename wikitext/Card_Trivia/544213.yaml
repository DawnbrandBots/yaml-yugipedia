title: Card Trivia:Dark Contract with Exclusivity
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Each of the contracts in this card's artwork has a symbol on them that represents a different Summoning method, starting from the top-left (and proceeding clockwise): [[Fusion Summon]] (a spiraling portal), [[Pendulum Summon]] (a swinging pendulum), [[Synchro Summon]] (a beam of light passing through a series of Synchro rings), and [[Xyz Summon]] (two Xyz Materials spiraling around each other).
  * This card is the first "[[Dark Contract]]" card that doesn't have an effect that inflicts damage to its controller.
