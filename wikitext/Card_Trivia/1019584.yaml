title: Card Trivia:Goblin's Crazy Beast
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Goblin Bikers Gone Wild]]", "[[Goblin Biker Grand Stampede]]", "[[Goblin Bikers Gone Bonkers]]", "[[Filia Diabell]]", and "[[Sinful Spoils Struggle]]".
  * This monster's name is a reference to "[[D.D. Crazy Beast]]", a monster that would eventually become the steed of "[[D.D. Trainer]]" (which is also known as "[[Coach Goblin]]"/"[[Second Goblin]]"), further referencing this monster's association with the "[[Goblin Biker]]" monsters.
  * According to [[The Valuable Book EX 4 card storylines|''The Valuable Book EX 4'' card storylines]], this monster swallowed the "Sinful Spoils Aithon" (罪宝アイトーン) that "[[Goblin Biker Big Gabonga]]" had acquired.
  ** ''[[wikipedia:Aethon|Aithôn]]'' is a Greek word meaning "burning" or "blazing". The word is also used as a name or epithet to refer to various characters, especially horses. [[wikipedia:Erysichthon of Thessaly|Erysichthon]], the king of [[wikipedia:Ancient Thessaly|Thessaly]], was also known as ''Aithôn'' due to the 'burning' hunger he was cursed with.
  *** Fittingly, "[[Azamina Sol Erysichthon]]" is the "[[Azamina]]" [[counterpart]] of "Sinful Spoils Aithon".
  **** This monster shares the same [[original ATK and DEF]] (2700/0) as "Sol Erysichthon".
  **** This is also a [[Fiend]] monster that can be used as [[Fusion Material]] to [[Fusion Summon]] "Sol Erysichthon".
  **** The kanji ''tō'' (饕, "ravenous") in this monster's Japanese name and the kanji ''kikatsu'' (飢渇, "starvation") in the Japanese name of "Sol Erysichthon" are both related to hunger.
