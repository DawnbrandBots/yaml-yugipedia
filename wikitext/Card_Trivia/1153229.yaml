title: Card Trivia:Super B.E.S. Metal Slave
wikitext: |-
  {{Navigation}}

  * This monster is based on {{wikia|gradius|Metal Slave}}, one of the final bosses from the 1987 MSX port of ''[[wikipedia:Salamander (video game)|Salamander]]'', a sequel to ''[[wikipedia:Gradius (series)|Gradius]]''.
  ** It [[effect]] that sends up to five [[B.E.S]] [[monsters]] can be considered as a reference to Metal Slave having five cores.
