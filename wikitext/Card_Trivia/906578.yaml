title: Card Trivia:Koa'ki Meiru Supplier
wikitext: |-
  {{Navigation}}

  * The container that this monster is carrying contains several parts from other "[[Koa'ki Meiru]]"-related cards: 2 "[[Iron Core of Koa'ki Meiru]]", "[[Automatic Laser]]", "[[Koa'ki Ring]]", "[[Nega-Ton Corepanel]]", "[[Koa'ki Meiru Shield]]", and the red cables of "[[Koa'ki Meiru Prototype]]" (at the very top).
