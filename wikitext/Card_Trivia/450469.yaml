title: Card Trivia:Pandemic Dragon
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Pandemic|pandemic]], a  [[wikipedia:Disease|disease]] that is widespread across large areas.
  ** Fittingly, this monster's wings resemble a [[wikipedia:Biological hazard|biological hazard]] [[wikipedia:Hazard symbol|symbol]]; also, its effect to reduce the [[ATK]] of monsters on the [[field]] and [[destroy]] one of them [[once per turn]] alludes to how catching a disease will cause the patient to weaken even to the point of death.
  * This monster is based on the [[wikipedia:Guivre|guivre]], a serpentine dragon from European folklore who is known for spreading diseases.
  * In the anime, this monster's roar sounds similar to the sound of an [[wikipedia:Elephant|elephant]] trumpeting instead of the standard roaring sound effects of other [[Dragon]] monsters.
