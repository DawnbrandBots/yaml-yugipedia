title: 'Card Trivia:New Order 8: Etheric Sebek'
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artworks of "[[Ascension Spiral]]" and "[[Rank Domination]]" (as a silhouette).
  * This monster is based on [[wikipedia:Sobek|Sobek]], the Egyptian deity of fertility, who is often depicted with the head of a crocodile.
  ** This monster's name reflects its [[Rank]], which is also reflected in the '''eight''' glowing gems in this monster's glyphs.
