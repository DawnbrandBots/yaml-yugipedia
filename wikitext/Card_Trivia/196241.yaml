title: Card Trivia:Poseidra, the Atlantean Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Roar of the Sea Emperor]]''/''[[Realm of the Sea Emperor Structure Deck]]''.
  * This monster appears in the artworks of "[[Call of the Atlanteans]]", "[[High Tide on Fire Island]]", "[[Phantasm Spiral Assault]]", and "[[Phantasm Spiral Crash]]".
  ** This monster's neck bracelet appears in the artwork of "[[Abyss-squall]]", and as an armband in the artwork of "[[Mermail Abyssgaios]]".
  * The tower appearing in the artwork of "[[A Legendary Ocean]]" appears in this card's artwork, slightly visible in the upper left corner.
  ** Fittingly, the above-mentioned card's Japanese name is "Atlantis, the Legendary City", which likely serves as the home of the "[[Atlantean]]" monsters.
  * This monster is named after [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea who is often depicted wielding his signature weapon, the [[wikipedia:Trident|trident]].
  ** Fittingly, this monster's three-pronged tail resembles the image of Poseidon's trident, a three-pronged spear used for spear fishing or as a polearm.
  * This monster has 3 forms.
  ** A baby form: "[[Legendary Atlantean Tridon]]".
  ** A [[retrained]] counterpart: "[[Poseidra, the Storming Atlantean]]".
  ** An [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form: "[[Poseidra Abyss, the Atlantean Dragon Lord]]".
  * According to the [[Master Guide 4 card storylines|''Master Guide 4'' card storylines]], "Mermail Abyssgaios" took over this monster with the magic of the armband that appears in the artwork of in "[[Abyss-squall]]".
  ** The bottom of the body of "Abyssgaios" resembles this monster, and both also share the same [[Attribute]] ([[WATER]]), [[original ATK and DEF]] (2800/1600), and the [[Rank]] of "Abyssgaios" corresponds to this monster's [[Level]] (7).
  * This monster's [[ATK]] (2800) is the sum of the ATK of "[[Atlantean Attack Squad]]" and "[[Atlantean Marksman]]" (both 1400), while its [[DEF]] (1600) is based on the 1600 DEF of "[[Atlantean Heavy Infantry]]".
  ** The 3 are valid monsters to [[Tribute]] for this card's [[Special Summon]].
  ** Fittingly, this card and the last two mentioned monsters debuted in ''Structure Deck: Roar of the Sea Emperor''/''Realm of the Sea Emperor Structure Deck'', while "Attack Squad" was released as a teaser in ''[[Return of the Duelist]]'' two months prior.
