title: Card Trivia:Spright Blue
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spright Gamma Burst]]".
  * The symbol for the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Libra (constellation)|Libra]] (♎︎︎) appears on this monster's outfit.
  * This monster is named after blue jets, a type of [[wikipedia:Upper-atmospheric lightning|transient luminous event]].
