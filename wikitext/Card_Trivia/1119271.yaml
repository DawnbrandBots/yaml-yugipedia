title: Card Trivia:Corktrooper
wikitext: |-
  {{Navigation}}

  * In addition to the variety of different [[wikipedia:Stopper (plug)|cork stoppers]], this monster's design is made up of the following objects: two [[wikipedia:Hex key|hex keys]], at least four [[wikipedia:List of screw drives#Phillips|Phillips-head]] screws (with two of them having round heads, and the other two having countersunk heads), a basic [[wikipedia:Corkscrew|corkscrew]], two [[wikipedia:Screwdriver#Phillips|Phillips screwdrivers]], two [[wikipedia:Multi-tool|multi-tools]] (each with an unfolded [[wikipedia:Bottle opener|bottle opener]]), [[wikipedia:Gooseneck (fixture)|gooseneck tubing]], and at least one [[wikipedia:List of screw drives#Slot|slotted]] screw.
