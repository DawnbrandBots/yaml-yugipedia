  {{Navigation}}

  * "[[Artmage Finmel]]", "[[Medius the Pure]]", and the mechanical claw-arm of "[[DoomZ V Five - Amalthe]]" appear in this card's artwork.
  *  This card's name and artwork are a reference to [[wikipedia:Varnish|varnish]] , which is a protective coating applied on painting and wood that also saturates or darkens its color.
