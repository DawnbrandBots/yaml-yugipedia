title: Card Trivia:Cipher Interference
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Interference (wave propagation)|constructive wave interference]], the process in which two waves superpose to form a resulting wave of variable amplitude.
  ** In this card's case, its effect to double a battling "[[Cipher]]" monster's [[ATK]] during battle references how the constructive wave interference can form a greater amplitude intensity.
