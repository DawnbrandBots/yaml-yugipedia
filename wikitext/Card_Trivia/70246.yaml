title: Card Trivia:The Fang of Critias
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Dragons of Legend: The Complete Series]]''.
  * This card is named after ''[[wikipedia:Critias (dialogue)|Critias]]'' the second part of [[wikipedia:Plato|Plato]]'s trilogy of dialogues, which serve as the source of myths pertaining to the lost city of [[wikipedia:Atlantis|Atlantis]].
  ** This card is based on the dragon form of [[Critias]], one of the three legendary knights of [[Atlantis]] who were weakened and transformed into dragons by [[Dartz]] during the Battle of Atlantis, and sealed away in crystal by sticking them with magic swords. In this case, Critias was sealed away with a sword sticking in its fang.
  * This is the only "[[Legendary Dragon]]" card:
  ** Whose associated [[Fusion Monster]]s do not use other monsters as [[material]] to be [[Special Summon]]ed.
  ** That was never used by [[Yami Yugi]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime (while he is the chosen Duelist for the "[[The Eye of Timaeus (anime)|Eye of Timaeus]]", he also used the "[[Claw of Hermos]]" on [[Joey Wheeler]]'s behalf after the latter lost his soul to "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]"), although it did fuse with his "[[Mirror Force (anime)|Mirror Force]]" when [[Seto Kaiba]] summoned "[[Mirror Force Dragon (anime)|Mirror Force Dragon]]" during their [[Tag-Team Duel]] against Dartz.
  ** To not have an associated Fusion Monster who appeared in more than one episode of the ''Yu-Gi-Oh!'' anime (The "Eye of Timaeus" has "[[Dark Magician Girl the Dragon Knight (anime)|Dark Magician Girl the Dragon Knight]]" with four episodes and the "Claw of Hermos" has "[[Red-Eyes Black Dragon Sword (anime)|Red-Eyes Black Dragon Sword]]" with two episodes).
  ** To not have an associated Fusion Monster with its chosen Duelist's [[signature card]] in the ''Yu-Gi-Oh!'' anime (Joey Wheeler fused the "Claw of Hermos" with his "[[Red-Eyes B. Dragon (anime)|Red-Eyes B. Dragon]]" to form "Red-Eyes Black Dragon Sword" and [[Yami Yugi]] fused the "Eye of Timaeus" with his "[[Dark Magician (anime)|Dark Magician]]" to form "[[Amulet Dragon (anime)|Amulet Dragon]]"), although Seto Kaiba did fuse "[[Tyrant Burst Dragon (anime)|Tyrant Burst Dragon]]" with his "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" to form "[[Blue-Eyes Tyrant Dragon (anime)|Blue-Eyes Tyrant Dragon]]".
  ** To not receive a redrawn artwork change upon its release in the ''[[OCG]]''/''[[TCG]]'', instead receiving a more detailed rendering of its anime artwork.
  ** To not have an associated Fusion Monster whose name includes their own name ("The Claw of Hermos" has "[[Rocket Hermos Cannon|Rocket '''Hermos''' Cannon]]" and "The Eye of Timaeus" has "[[Timaeus the United Magical Dragon|'''Timaeus''' the United Magidragon]]").
  * This card's German name, "Kralle des Critias", is translated to "Claw of Critias". A more accurate translation of this card's name would be "Der Reißzahn von Critias".
