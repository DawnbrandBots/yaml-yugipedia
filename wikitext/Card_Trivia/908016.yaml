title: Card Trivia:Byroad Sacrifice
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] "[[Cyber Ogre]]" from the player's [[hand]] is an alteration of its effect in the ''[[Yu-Gi-Oh! GX]]'' anime, which can Special Summon a monster from the player's hand if their monster is [[destroyed by battle]]. In {{episode|GX|083|ref}}, [[Chancellor Sheppard]] uses this card to Special Summon "[[Cyber Ogre (anime)|Cyber Ogre]]" after his "[[Cyber Shadow Gardna (anime)|Cyber Shadow Gardna]]" was destroyed by battle.
