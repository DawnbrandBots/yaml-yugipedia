title: Card Trivia:Kuriboo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Brothers of Legend]]''.
  * This monster appears in the artwork of "[[Five Star Twilight]]".
  * This monster's effect is named "Kuriball" (クリボール), similar to the Japanese name of "[[Sphere Kuriboh]]".
