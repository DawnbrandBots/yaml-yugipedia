title: Card Trivia:Amabear Lilith
wikitext: |-
  {{Navigation}}

  * The Japanese pronunciation of this monster's name (アくま・リリス ''Akuma Ririsu'') is a portmanteau of "[[wikipedia:Akuma (folklore)|akuma]]" (悪魔, "devil") and "[[Ama Lilith]]" (アマ・リリス ''Ama Ririsu''), reflecting this monster's appearance of "Ama Lilith" wearing an outfit with devilish wings.
  ** "Akuma" is also a portmanteau of the Japanese words "akuma" and ''kuma'' (熊, "bear"), reflecting this monster's outfit featuring bear-like gloves and hair styled to resemble the ears of a bear.
  *** The spelling of "Akuma" ({{Ruby|Ａ|ア}}'''くま''' ''Akuma'') is a play on the Japanese name of this card's [[Fusion Material]] "[[Ice Pop Bear]]" ({{Ruby|Ａ|エー}}{{Ruby|Ｉ|アイ}}'''くま'''キャン ''Ē Ai Kuma Kyan''). The former uses the short vowel pronunciation of A (ア ''a''), whereas the latter uses the long vowel pronunciation of A (エー ''ē'').
  * This monster is a [[DARK]] counterpart to "[[CAN:D ALL]]".
  ** Both monsters share the same [[Level]] (4), [[Type]] ([[Psychic]]), [[ATK]] (2000) and [[DEF]] (1500).
  ** Both monsters are [[Fusion Monster]]s that use "Ice Pop Bear" as Fusion Material.
  ** Both monsters' artwork feature the same background (with different colors).
