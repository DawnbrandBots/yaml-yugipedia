title: Card Trivia:Betrayer of Peace
wikitext: |-
  {{Navigation}}

  * This monster is related to "[[Messenger of Peace]]", as indicated by the following:
  ** Both cards feature a similar naming scheme.
  ** Both cards' artworks depict the same halo in the background.
  ** Both cards feature an image of a dove in their artwork, reflecting the fact that doves are considered a symbol of peace.
  * This monster shares similarities with "[[Nandes the Fire Awakener]]".
  ** Both monsters share the same [[Level]] (4), [[Type]] ([[Warrior]]), and [[original ATK and DEF]] (1200/1000).
  ** Both monsters feature an effect that can change a Warrior-Type monster's [[battle position]] into a specific position.
