title: Card Trivia:Kewl Tune Clip
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Clipping (audio)|clipping]], a term used in audio which describes when an output is driven past an amplifier's capability, resulting in the wave being cut off or "clipped" at the end, resulting in distortion in the audio.
  ** The monster's design is a pun on the word "clip", as it is depicted wearing multiple paper clips on its hood.
  ** When clipping is done unintentionally, especially by a DJ during a live mix, it is seen as a major faux pas that might upset the crowd or even damage the club's equipment, which is reflected in this monster's irritated facial expression.
