title: Card Trivia:Change Slime - Dragon Champion Mode
wikitext: |-
  {{Navigation}}

  * The arm and the lance of "[[Gaia The Fierce Knight (Rush Duel)|Gaia The Fierce Knight]]" and the wing of "[[Curse of Dragon (Rush Duel)|Curse of Dragon]]" appear in this card's artwork.
  * This monster is a [[Gaia (series)|Gaia]] ''[[Rush Duel]]'' [[counterpart]] of "[[Change Slime]]".
  ** This monster's effect to [[Fusion Summon]] by using a [[Level 7]] [[Warrior]] monster and a [[Level 5]] [[Dragon]] monster as [[Fusion Material]]s references how "[[Change Slime (DM1)|Change Slime]]" can be used as a "catalyst monster" in order to create "[[Gaia the Dragon Ch (DM1)|Gaia the Dragon Champion]]" in the ''[[Yu-Gi-Oh! Duel Monsters (video game)|Yu-Gi-Oh! Duel Monsters]]'' video game.
