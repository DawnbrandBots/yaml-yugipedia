title: Card Trivia:Gouki Diver
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's Japanese name is a reference to the ''[[wikipedia:Professional wrestling aerial techniques|suicida]]'', the Spanish term for "suicide" used in [[wikipedia:Professional wrestling|professional wrestling]] that involves any technique that occurs outside the ring.
  ** This monster's international name is based on a dive, a technique used in professional wrestling which involves jumping off the wrestling ring's ropes to attack the opponent. 
  *** This, along with this monster's Japanese name, references the suicide dive (or the ''topé suicida''), a technique used which involves making a dive at an opponent outside the ring by using the ropes to jump from.
