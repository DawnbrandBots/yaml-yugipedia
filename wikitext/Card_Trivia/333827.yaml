title: Card Trivia:Chimeratech Rampage Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the alternate artwork of "[[Lightning Storm]]".
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Cyber Dragon]]", "[[Cyber Dragon Zwei]]" and "[[Cyber Dragon Drei]]".
  ** This monster shares the same [[Level]] (5), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (2100/1600) as "Cyber Dragon".
  ** This monster is likely considered an alternate version of "[[Cyber End Dragon]]", as the above-mentioned monsters are either "Cyber Dragon" or monsters that can be treated as "Cyber Dragon".
  * This is the first "[[Chimeratech]]" monster to be released after the ''[[Yu-Gi-Oh GX]]'' anime.
  * This monster has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Chimeratech Crush Dragon]]".
