  * This monster appears in the artwork of "[[Shark Spark]]".
  * This monster is related to "[[Golden Flying Fish]]" and "[[Royal Swamp Eel]]", as they are all [[Level 4]] [[Fish]] monsters who originally debuted as ''[[TCG]]''-[[TCG exclusive|exclusive]] [[Super Rare]] cards in different [[Core Booster|Core Booster packs]] with the same [[set number]], that being "????-EN086".
