title: Card Trivia:Gift Exchange
wikitext: |-
  {{Navigation}}

  * Toy versions of "[[Geargiaccelerator]]", "[[Gem-Knight Lazuli]]", "[[Madolche Baaple]]", and "[[Wattjustment]]", as well as an image of "[[Scrap Kong]]" appear in this card's artwork.
  ** The appearance of "Scrap Kong" and the reaction of the goblin child receiving the shirt depicting the aforementioned monster is a reference to the 2chan meme of how useless it is on its own.
  *** The goblin kid may also be annoyed that everyone else got a new toy, while all he got was a shirt; this is a possible reference to the "[http://tvtropes.org/pmwiki/pmwiki.php/Main/AndAllIGotWasThisLousyTShirt And All I Got Was This Lousy T-Shirt]" joke.
  * The goblin children in this card's artwork, including the goblin child with the "Scrap Kong" shirt, appear in the artworks of "[[Bunny Ear Enthusiast]]", "[[Fukubiki]]", "[[Kingyo Sukui]]", "[[Mamemaki]]", "[[Matching Outfits]]", "[[Shateki]]", and "[[Yaminabe Party]]".
  ** With the exception of the young goblin with the shirt, they also appear in the artwork of "[[Hatsugai]]".
  * The scene in this card's artwork depicts younger versions of the goblins from the artwork of "[[Oh Tokenbaum!]]" (or, presumably, their children) on Christmas morning; the previous card presumably takes place the night before on Christmas Eve or later in the day.
  ** This card was released on December 20, 2014 in Japan, to celebrate the upcoming Christmas that year.
