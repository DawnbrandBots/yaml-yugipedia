title: Card Trivia:Turn Silence
wikitext: |-
  {{Navigation}}

  * The older version of "[[Silent Swordsman Zero]]" and the spirit form of "[[Zoma the Spirit]]" appear in this card's artwork.
  * This card's name, artwork, and effect are based on a scene during [[Yugi Mutou (manga)|Yugi Mutou]] and [[Dark Bakura (manga)|Dark Bakura]]'s Duel and its anime adaptation in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], where Yugi [[activate]]s "[[Turn Jump (manga)|Turn Jump]]" (and its [[Turn Jump|anime counterpart]]) to avoid the damaging effect of Bakura's "[[Death Spirit Zoma (manga)|Death Spirit Zoma]]" (and its [[Zoma the Spirit (anime)|anime counterpart]]) after "[[Silent Swordsman LV1 (manga)|Silent Swordsman LV1]]" (and its [[Silent Swordsman LV1|anime counterpart]]) attacks and destroys it, which allows Yugi to skip three turns to the next [[Battle Phase]] and transforms "Silent Swordsman LV1" into "[[Silent Swordsman LV4 (manga)|Silent Swordsman LV4]]" (and its [[Silent Swordsman LV4|anime counterpart]]), increasing its [[ATK]] to 3000.
  ** Ironically, this card would not be able to negate the damaging effect of "Zoma the Spirit", as it would activate during the [[Damage Step]], at which point this card cannot be activated, as it only negates effects, ''not'' effect activations. Additionally, "Zoma the Spirit" would be treated as a [[Trap Card]] in the [[Graveyard]], making its damaging effect a Trap effect, whereas this card can only negate monster effects.

