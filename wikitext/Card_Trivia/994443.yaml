title: Card Trivia:Cornful Charity
wikitext: |-
  {{Navigation}}

  * This card is a [[Bubble Actress]] [[counterpart]] of "[[Graceful Charity (Rush Duel)|Graceful Charity]]".
  ** This card's Japanese name, "Angel's Sorghum" ({{Ruby|天|てん}}{{Ruby|使|し}}のもろこし, ''Tenshi no Morokoshi'') is a pun on the Japanese name of "Graceful Charity": "Angel's Charity" ({{Ruby|天|てん}}{{Ruby|使|し}}の{{Ruby|施|ほどこ}}し, ''Tenshi no Hodokoshi'').
  *** ''[[wikipedia:Sorghum|Sorghum]]'' is a genus of flowering plants in the grass family that is more commonly known as "broomcorn", where its species are used in consumption as cereal or as fodder for animals in pastures.
