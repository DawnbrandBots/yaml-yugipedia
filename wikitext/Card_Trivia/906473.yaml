title: Card Trivia:Sakitama
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''saki-mitama'', the happy and loving side of the ''[[wikipedia:Mitama|mitama]]'', a whole, complete spirit in the [[wikipedia:Shinto|Shinto religion]].
  * This monster is related to "[[Aratama]]" and "[[Nikitama]]", as they are also based on the different aspects of the ''mitama'', in addition to featuring effects involving [[add]]ing cards to the [[hand]].
