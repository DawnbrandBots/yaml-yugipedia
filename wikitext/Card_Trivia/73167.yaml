title: Card Trivia:Kaibaman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Meteor Stream]]".
  * This monster has a [[retrained]] [[counterpart]]: "[[Kaibaman the Legend]]".
  * This monster is based on [[Seto Kaiba]].
  ** This monster's helmet is based on the head of "[[Blue-Eyes White Dragon]]", the [[signature card]] of Seto Kaiba, which this monster can [[Special Summon]].
  ** In {{episode|GX|034|ref}}, [[Kaibaman (character)|Kaibaman]] is wearing a [[Kaiba brothers' pendant|card necklace]] just like the ones worn by Seto Kaiba and his younger brother, [[Mokuba Kaiba|Mokuba]].
  *** Also, in the same episode, [[Chazz Princeton]] points out that Kaibaman's [[Deck]] is the exact same as Seto Kaiba's Deck. In the English dubbed version of the episode, Chazz notes that this monster was created by Seto Kaiba himself.
  * This monster's effect is also similar to "[[Black Dragon's Chick]]", as they can Special Summon "Blue-Eyes White Dragon" and "[[Red-Eyes Black Dragon]]", respectively.
  * In the ''[[Yu-Gi-Oh! Reshef of Destruction]]'' video game, there is a "Kaibaman show" held in [[Kaiba Land]].
