title: Card Trivia:Neptabyss, the Atlantean Prince
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Abyss-sting Triaina]]".
  ** "Abyss-sting Triaina" appears in this card's artwork, wielded by this monster.
  * According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], this monster is "[[Mermail Abyssgaios]]" after having lost most of its power when separated from "[[Poseidra, the Atlantean Dragon]]".
  * This monster is named after [[wikipedia:Neptune (mythology)|Neptune]], the Roman god of freshwater and the sea who is often depicted wielding his signature weapon, the [[wikipedia:Trident|trident]].
  * This monster has an [[Card evolutions|upgraded]] [[Link Monster|Link]] form: "[[Mermail King - Neptabyss]]".
