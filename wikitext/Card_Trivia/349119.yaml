title: Card Trivia:Igknight Margrave
wikitext: |-
  {{Navigation}}

  * This card's name is derived from the [[wikipedia:Riot gun|riot gun]], a type of firearm designed to fire "non-lethal" ammunition for the purpose of suppressing riots.
  * This monster appears in the artwork of "[[Igknight Reload]]".
  * A [[wikipedia:Margrave|margrave]] is the medieval title for a military commander whose job was to maintain the defense of the border provinces of a kingdom. As it pertains to this card, Igknight Margrave's DEF is the higher of its two stats, and in its card text, it is mentioned to be a high-ranking "[[Igknight]]" warrior.
  * This monster's armor is worn by "[[Ignister Prominence, the Blasting Dracoslayer]]".
  * When this card was first printed in Spanish, its lore featured several errors which were corrected in a subsequent printing.
