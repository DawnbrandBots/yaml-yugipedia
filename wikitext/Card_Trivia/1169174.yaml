title: Card Trivia:Gagaga Magician - Gagaga Magic
wikitext: |-
  {{Navigation}}

  * This monster is the [[signature move]] [[counterpart]] of "[[Gagaga Magician]]".
  * This monster's effect to [[Xyz Summon]] an [[Xyz Monster]] belonging to the listed "[[Onomat]]" [[archetype]]s ("[[Zubaba]]", "[[Gagaga]]", "[[Gogogo]]",  and "[[Dododo]]"), as well as the "[[Djinn]]", "[[Heroic Champion]]", "[[Number]]", "[[ZW -]]", and "[[ZS -]]" archetypes, are based on those primarily used by [[Yuma Tsukumo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** At the time of this monster's release, this effect allows the [[Xyz Summon]]ing of a "Gogogo" Xyz Monster, despite the fact that the only "Gogogo" [[Xyz Monster]] in existence is also a "Number" monster ("[[Number 55: Gogogo Goliath]]").
  ** At the time of this monster's release, this effect to allow the Xyz Summoning of a "Dododo" or a "Heroic Champion" Xyz Monster is invalid, since there are currently no "Dododo" Xyz Monsters, and all "Heroic Champion" Xyz Monsters require [[Warrior]] monsters as [[material]].
  * This card lists the largest number of distinct archetypes of any card, at 9 different archetypes listed.
