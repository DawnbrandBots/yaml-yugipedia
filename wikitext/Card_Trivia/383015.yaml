title: Card Trivia:Bloom Prima the Melodious Choir
wikitext: |-
  {{Navigation}}
  * This card shares many characteristics of a main protagonists' Ace Monster:
  ** It is Level 7 like every other non-[[Xyz Monster|Xyz]] and [[Link Monster|Link]] Ace Monster in every series except "[[Stardust Dragon]]".
  ** Under normal circumstances and if [[Fusion Summon]]ed properly, this monster always has a minimum of 2500 ATK and 2000 DEF.
  *** All Ace Monsters, from every protagonist in every series, have 2500 ATK and 2000 DEF, with the exception of [[Yugi Muto]]'s "[[Dark Magician]]" having 2100 DEF.
  * This card may be based on Belle from Beauty and the Beast due to her yellow dress and connection with music.
  ** In the anime, this monster's dance with "[[Frightfur Chimera]]" due to the effect of "[[Fusion Fright Waltz]]" likely drew inspiration from the infamous ballroom scene in the movie.
