title: Card Trivia:The Furious Sea King
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart]]: "[[Night Lizard]]".
  * This is one of the first cards seen on-screen in the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'']] anime, the others being "[[Claw Reacher (anime)|Claw Reacher]]", "[[Kageningen (anime)|Kageningen]]", and "[[Skull Stalker (anime)|Skull Stalker]]".
  ** This is also one of the first [[WATER]] monsters to appear in the anime.
  ** This is also the first [[Aqua]] monster to appear in the anime.
