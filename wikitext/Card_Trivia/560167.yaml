title: Card Trivia:Cyber Pharos
wikitext: |-
  {{Navigation}}

  * "Pharos" is Greek for "lighthouse", and is sometimes used for referring specifically to [[wikipedia:Lighthouse of Alexandria|the famous one lighthouse in ancient Alexandria]].
  ** This monster's name and appearance likely references the lighthouse in the ''[[Yu-Gi-Oh! GX]]'' anime, where [[Zane Truesdale]] and [[Alexis Rhodes]] would occasionally meet during the first season.
