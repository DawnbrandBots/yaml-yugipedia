title: Card Trivia:Subterror Fiendess
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Subterror Behemoth Phospheroglacier]]", "[[Subterror Behemoth Speleogeist]]", and "[[Subterror Final Battle]]".
  * This monster is the humanoid form of "[[Subterror Behemoth Fiendess]]", as indicated by their similar wings, hair color, glowing green symbols on their bodies, and their shared individual name in both English ("Fiendess") and Japanese ({{Ruby|妖|よう}}{{Ruby|魔|ま}} ''Yōma'', "Apparition").
