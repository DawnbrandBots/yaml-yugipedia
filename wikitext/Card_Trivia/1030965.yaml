title: Card Trivia:Abysskite Miracle Girls
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[High-Grade Collection]]''.
  * "[[Abysskite Ange]]", "[[Abysskite Karen]]", and "[[Abysskite Liem]]" appear in this card's artwork, with their outfits modified to include elements of the black suits worn by their character counterparts ([[Ange Kicho]], [[Karen Choha]], and [[Liem Kokai]]) in ''[[Yu-Gi-Oh! GO RUSH!!]]''.
  ** This monster's name reference those characters' collective nickname ("Super [[Maximum Monster|Maximum]] [[Tremolo Ryugu|Tremolo]] Girls") and the first part of the summon chant of "[[Shinesteel Ultra Dragon Devastar Okeabyss]]" ("A miracle. It's a miracle I even met you."), which, in the anime, was initially made up of cards that Karen, Ange, and Liem were transformed into.
