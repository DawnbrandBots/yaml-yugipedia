title: Card Trivia:Violet Crystal
wikitext: |-
  {{Navigation}}

  * The crystal in this card's artwork appears in the artwork of "[[Return of the Zombies]]".
  * This card's Japanese name and the crystal in its artwork are based on the [[wikipedia:Amethyst|amethyst]], a violet-colored variety of [[wikipedia:Quartz|quartz]].
  ** This card's effect to [[support]] [[Zombie]] monsters is likely an allusion to the color purple being associated with mourning in various cultures, as well as the use of amethysts in crystal healing to help with the pain and grief of loss.
  * This card is tied with several other cards as the first [[Spell Card]] in the ''[[OCG]]''/''[[TCG]]''.
  ** In the ''OCG''/''TCG'', it is also tied as the first [[Equip Spell Card]] and the first Zombie support card.
