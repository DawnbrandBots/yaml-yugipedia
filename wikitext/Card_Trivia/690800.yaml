title: Card Trivia:Decode Talker Heatsoul
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a combination of "[[Decode Talker]]" and "[[Salamangreat Heatleo]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! VRAINS|attack name]] of "[[Salamangreat Heatleo (anime)|Salamangreat Heatleo]]" in the Japanese version of the ''[[Yu-Gi-Oh! VRAINS]]'' anime: "Heat Soul" (ヒート・ソウル ''Hīto Souru'').
  ** This monster's effects are based on the [[Skill]]s used by [[Yusaku Fujiki|Playmaker]] and [[Theodore Hamilton|Soulburner]] in the ''Yu-Gi-Oh! VRAINS'' anime.
  *** This monster's effect to allow the player to pay 1000 [[Life Point]]s to [[draw]] a card references Soulburner's Skill, "[[Burning Draw (anime Skill)|Burning Draw]]", which allows him to pay 1000 Life Points and draw a card for each multiple of 1000.
  *** This monster's additional effect to [[banish]] this monster and [[Special Summon]] a [[Link-3]] [[Cyberse]] monster from the [[Extra Deck]] if the player has 2000 or less Life Points reference Playmaker's Skill, "[[Storm Access (anime)|Storm Access]]" which allows him to access a Cyberse Link Monster at random from a nearby [[Data Storm]] and add it to their Extra Deck.
  * This monster has a [[Card evolutions|downgraded]] [[Effect Monster]] form: "[[Code of Soul]]".
