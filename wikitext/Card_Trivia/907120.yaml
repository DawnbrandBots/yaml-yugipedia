title: Card Trivia:Baked Bean Soldier
wikitext: |-
  {{Navigation}}

  * This monster is a [[FIRE]] [[Rush Duel]] [[counterpart]] of "[[Bean Soldier]]".
  ** Its flavor text is nearly the same as the Japanese flavor text of "Bean Soldier", but replaces "surprisingly strong" with "surprisingly hot".
  * The kanji (焼) on this monster's sword translates to "baked/toasted/burned".
