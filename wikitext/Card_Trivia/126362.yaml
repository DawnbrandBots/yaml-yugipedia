title: Card Trivia:Destruction Cyclone
wikitext: |-
  {{Navigation}}

  * This card's [[Earth]], [[Water]], [[Dark]], [[Fire]], and [[Light]] counterparts are [[Raging Earth]], [[Silent Abyss]], [[Umbral Soul]], [[Firestorm Prominence]] and [[Radiant Spirit]], respectively. Their effects apply to their respective attributes.
  * The reptile it's based off of is a Frilled Lizard.
  ** Which makes it extremely similar to [[Razor Lizard]].
