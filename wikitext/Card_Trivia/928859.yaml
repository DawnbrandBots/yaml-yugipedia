title: Card Trivia:Embracing the Rain
wikitext: |-
  {{Navigation}}

  * "[[Dian Keto the Cure Prodigy]]" appears in this card's artwork.
  * This card's Japanese name (雨に打たれれば, ''Ame ni Utarereba'') references the Japanese title of the 1952 American musical film, ''[[wikipedia:Singin' in the Rain|Singin' in the Rain]]'' (雨に唄えば, ''Ame ni Utaeba'').
