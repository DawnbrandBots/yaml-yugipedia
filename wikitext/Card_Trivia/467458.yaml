title: Card Trivia:Ancient Gear Reactor Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Machine Dragon Re-Volt]]''/''[[Machine Reactor Structure Deck]]''.
  * This monster's chest device is based on a [[wikipedia:Nuclear reactor|nuclear reactor]].
  ** Fittingly, the kanji 「古代の機械熱核竜」 in this card's Japanese name translates to "Ancient Machine Thermonuclear Dragon".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Ancient Gear Gadjiltron Dragon]]".
  ** Both monsters have a similar positioning of their multiple wings and the pair of massive spiked gears in their pelvic regions, bladed attachments on the various tips on their wing membranes, segmented necks and tails (with wiring in the segmented gaps and dorsal tips on the segments), and chest regions with a ribcage beneath them (with this monster missing a chunk in lieu of the energy source placed there).
  ** Both cards are [[EARTH]] [[Machine]] monsters with 3000 [[ATK]] and/or [[DEF]]; this card is also 1 [[Level]] higher (9) than "Gadjiltron Dragon" (8).
  ** Both cards also gain effects if they are [[Tribute Summon]]ed by [[Tributing]] "[[Gadget]]" monsters.
