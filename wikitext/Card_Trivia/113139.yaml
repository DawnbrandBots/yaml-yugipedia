title: Card Trivia:Magnet Warrior Sigma Minus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Magnet Bonding]]" and "[[Magnet Reborn]]".
  * This monster's name is based on [[wikipedia:Sigma|sigma]] (Σ), the eighteenth letter of the [[wikipedia:Greek alphabet|Greek alphabet]].
  * This monster has a [[counterpart]]: "[[Magnet Warrior Sigma Plus]]"
  ** Both have an inverted [[original ATK and DEF]], with this monster featuring 1500 [[ATK]] and 1800 [[DEF]].
  ** Both monsters' Japanese naming schemes are puns on the kanji for "warrior" (士) featured in the base Japanese name for the "[[Magnet Warrior]]" [[archetype]] (戦士), which resembles a plus sign (+) written over the minus sign (-).
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[negate]] the attack between two [[EARTH]] monsters references the gameplay mechanic of [[Bastion Misawa]]'s Earth Deck, which involves manipulating attack targets with [[Plus monster|Plus]] and [[Minus monster|Minus]] sub-types, characterized by negating any battle between monsters that share the same sub-type, in turn referencing the repulsion between magnets with the same polarity. In {{episode|GX|082|ref}}, this effect was used against the [[Beetron (series)|Beetron]] [[series]], which primarily consists of EARTH monsters.
