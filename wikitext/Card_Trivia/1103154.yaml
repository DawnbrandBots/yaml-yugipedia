title: Card Trivia:Paranormal Future Control
wikitext: |-
  {{Navigation}}

  * The artworks of "[[Paranormal Activity]]", "[[Paranormal Advent]]", and "[[Paranormal Deal]]" appear in this card's artwork.
  * The top monster in this card's artwork appears in the artworks of "Paranormal Advent", "[[Paranormal Call]]", and "[[Paranormal Draw]]", while the bottom one appears in the artworks of "Paranormal Activity" and "Paranormal Deal".
