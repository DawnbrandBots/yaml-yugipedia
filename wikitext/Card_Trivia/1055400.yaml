title: Card Trivia:Pyrite Knight
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Pyrite|pyrite]], a  iron disulfide mineral that is commonly known as "fool's gold", which typically appears as a shiny yellow metal with intersecting occurring cubic crystals.
  ** The name of pyrite is derived from the Greek "πυρίτης λίθος" (''pyritēs lithos''), which means "stone or mineral which strikes fire". This reflects this monster's effect [[support]]ing [[EARTH]] and [[FIRE]] [[Warrior]] monsters.
  ** In ancient Roman times, the term "pyrite" is applied to several types of stone that would create sparks when struck against steel, similar to how this monster is depicted striking its sword and creating sparks in the process.
