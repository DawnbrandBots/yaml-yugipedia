title: Card Trivia:Zektrike Kou-ou
wikitext: |-
  {{Navigation}}

  * "[[Inzektor Dragonfly]]" and "[[Inzektor Hornet]]" appear in this card's artwork.
  ** These two monsters were famously part of a powerful combo in 2011-2012, leading to their eventual Limited status in the ''OCG'' and ''TCG'', which would last for 4 years in the ''OCG'', and 7 in the TCG.
  ** This is possibly a reference to a scene in episode 46 of ''[[wikipedia:Kamen Rider 555|Kamen Rider 555]]'', near the end of the episode, where [[fandom:w:c:kamenrider:Kamen Rider Faiz|Kamen Rider Faiz]] (a red-trimmed Kamen Rider) is seen driving the [[fandom:w:c:kamenrider:SB-913V Side Basshar|SB-913V Side Basshar]], with [[fandom:w:c:kamenrider:Kamen Rider Kaixa|Kamen Rider Kaixa]] (a yellow-trimmed Kamen Rider) wielding his weapon in the motorcycle's sidecar.
  ** This card's name, "Zektrike Kou-ou", is a reference to the colors of the two "Inzektor" monsters depicted in this card's artwork ("Dragonfly": Red, 紅 ''Kou''; "Hornet": Yellow, 黄 ''Ou'').
