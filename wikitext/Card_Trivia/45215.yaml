title: Card Trivia:Elemental HERO Thunder Giant
wikitext: |-
  {{Navigation}}

  * This monster is the [[Fusion Monster|Fusion]] form of "[[Elemental HERO Sparkman]]" and "[[Elemental HERO Clayman]]".
  * This monster has a [[signature move]] [[counterpart]]: "[[Elemental HERO Thunder Giant - Voltic Thunder]]".
  * This monster has an "[[Evil HERO]]" counterpart: "[[Evil HERO Lightning Golem]]".
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Level]] (6), [[original ATK and DEF]] (2400/1600), and an effect that [[destroy]]s an opponent's monster.
