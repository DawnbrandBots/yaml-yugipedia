title: Card Trivia:High Tide Gyojin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ice Fire Egg]]".
  * This monster's Japanese name is based on a [[wikipedia:Merman|merman]], the male equivalent of a [[wikipedia:Mermaid|mermaid]], a legendary half-human half-fish creature.
  ** This monster's ''[[TCG]]'' name, ''Gyojin'' is a portmanteau of the Japanese words for "fish" (''gyo'') and "man/person" (''jin''), reflecting its Japanese name and appearance.
  * This monster has a [[recolored counterpart]]:: "[[Root Water]]".
