title: Card Trivia:Cerulean Skyfire
wikitext: |-
  {{Navigation}}

  * "[[Hamon, Lord of Striking Thunder]]" appears in this card's artwork.
  * This card's name is based on the [[Attack and effect names|attack name]] of "Hamon, Lord of Striking Thunder" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's first effect references the [[Summoning condition]] of "Hamon, Lord of Striking Thunder" in the anime, as it also allowed [[Set]] [[Spell Card]]s to be used for its [[Special Summon]].
  ** This card's last effect references the last anime effect of "Hamon, Lord of Striking Thunder", which prevents the player from taking damage when it was [[destroy]]ed in [[Defense Position]].
