title: Card Trivia:Shadow Clone Zone
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card may be a reference to the anime and manga series ''"[[wikipedia:Naruto|Naruto]]"'', where there is a ninja technique called "Technique of Shadow Clone" ("''Kage Bunshin no Jutsu''"), which creates clones of the user, just like this card does with the equipped monster.
