title: Card Trivia:Iron Blacksmith Kotetsu
wikitext: |-
  {{Navigation}}

  * "[[Legendary Sword]]" appears in this card's artwork.
  * This monster is based on [[wikipedia:Nagasone Kotetsu|Nagasone Kotetsu]], an [[wikipedia:Edo period|Edo period]] Japanese swordsmith.
  ** Fittingly, the kanji 「匠」 (''Takumi'') on this monster's hat means "artisan" or "craftsman".
  * This card has a ''[[Rush Duel]]'' counterpart: "[[Master Craftsman Kotetsu]]".
  * This card is the first (and currently only) [[Beast-Warrior]] [[Flip monster]].
