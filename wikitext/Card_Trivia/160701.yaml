title: Card Trivia:Shien's Advisor
wikitext: |-
  {{Navigation}}

  * This monster is the younger version of "[[Elder of the Six Samurai]]", as confirmed by the [[Master Guide 3 card storylines#Those Who Serve Shi En|Master Guide 3 card storylines]].
  ** This is also supported by the fact that both monsters have the same red glasses and the same cup with the symbol of "[[Great Shogun Shien|Shien]]".
  * Including the symbol on the cup in this card's artwork, four symbols of Shien appear in this card's artwork: One on the wall, one on the forehead and one on the monster's vest.
  * The fiery glow around this monster is similar to that around "[[Great Shogun Shien]]", as is the glow around "[[Hand of the Six Samurai]]" and "[[Enishi, Shien's Chancellor]]". This, coupled with the red eyes and 'Shien' glyphs on these monster's foreheads, suggests that "[[Shien]]" has some kind of magical influence over them.
