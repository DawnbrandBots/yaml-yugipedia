title: Card Trivia:Hermit of Prophecy
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * This monster appears in the artwork of "[[Spellbook of Fate]]".
  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Hermit (Tarot card)|The Hermit]], the ninth of the  [[wikipedia:Major Arcana|Major Arcana]].
  ** This card's Japanese name, エアミット ''Eamitto'', is from the French name for The Hermit, ''L'Hermite'', where the "h" is silent and it is pronounced similar to "airmeet."
  ** This card's effect reflect this as it can slowly grow overtime by itself, gaining ATK and level like the Hermit who upside effect reflect the ability to grow and heal overtime.
