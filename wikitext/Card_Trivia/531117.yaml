title: Card Trivia:Vendread Chimera
wikitext: |-
  {{Navigation}}

  * The artwork of "[[Vendread Reunion]]" depicts several "[[Vendread]]" monsters merging with each other to form this monster.
  ** Several copies of this monster also appear in the artwork of "[[Vendread Charge]]".
  * This monster's appearance is reminiscent of the organism in John Carpenter's [http://thething.wikia.com/wiki/The_Thing_(organism) The Thing], an extremely hostile and highly infectious creature capable of absorbing other organisms and shape-shift into a variety of strange and horrific forms that resembles previously assimilated anatomy such as tentacles, insect-like limbs, mouths, eyes, claws, even entire faces, eventually re-arranging its cellular structure to mimic its desired shape.
