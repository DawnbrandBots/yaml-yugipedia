title: Card Trivia:Blackwing - Etesian of Two Swords
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Etesian|etesian]], the strong and dry northern winds of [[wikipedia:Aegean Sea|Aegean Sea]] that blow from mid-May to mid-September.
  ** This monster's Japanese title is based on the [[wikipedia:Tachi|tachi]], a type of Japanese sword used by the samurai class of Feudal Japan, which are wielded by this monster.
  * This is the only non-[[Synchro]] "[[Blackwing]]" monster whose ''[[TCG]]'' name does not contain the word "the".
