title: Card Trivia:Spaceship Barrier
wikitext: |-
  {{Navigation|mode=nongame}}

  * The name and lore of this card read "Space Ship" instead of "Starship". This was probably a mistake, as it was activated when "[[Number 42: Starship Galaxy Tomahawk]]", a "[[Starship]]" [[Monster Card|monster]], was [[attack]]ed.
