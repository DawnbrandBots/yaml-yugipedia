title: Card Trivia:Single Purchase
wikitext: |-
  {{Navigation}}

  * "[[7 Colored Fish]]", "[[Goblin of Greed]]", "[[Pot of Duality]]", and "[[Pot of Greed]]" appear in this card's artwork.
  ** The appearance of "7 Colored Fish" is based on its [[flavor text]] that suggests it is a prized commodity, as depicted in the artwork of "[[Fish and Swaps]]".
  *** The other two goblins in the upper-right corner of this card's artwork appear to be discussing the possible purchase of a golden dragon statue similar to the one in the artwork of "[[Trade-In]]", which the artwork of "Fish and Swaps" is based on.
  ** "Goblin of Greed" appears to be trading in a damaged "Pot of Greed" in return for a "Pot of Duality" and a few gold coins.
  *** This is supported by the fact that he later returns to the same seller in an attempt to get a refund (as depicted in the artwork of "[[Recall]]").
