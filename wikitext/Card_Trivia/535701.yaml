title: Card Trivia:Charm of Shabti
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Ushabti|shabti]], a funerary figurine in the religion of Ancient Egypt, usually in the form of a mummy; the shabti would serve as a dead person's deputy in order to do labor for them, mostly agricultural labor, in the afterlife.
  ** In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, the shabti were used by [[Shadi]] in the third volume for his [[Shadow Game]], [[Trial of the Mind]].
