title: Card Trivia:Clear Wing Synchro Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Crossed Souls]]'', as well as one of the cover cards of the Japanese edition of ''[[Dimension Box Limited Edition]]''.
  ** This is also the first [[Synchro Monster]] to be the cover card of a [[Core Booster]] since "[[Junk Berserker]]" in ''[[Extreme Victory]]''.
  * This monster's silhouette appears in the artworks of "[[Hi-Speedroid Clear Wing Rider]]", "[[Speedroid Clear Wing Wonder]]", and "[[Supreme Rage]]".
  * This is the [[signature card]] of [[Yugo]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster represents [[Z-ARC]]'s anger and hatred of humanity, which is reflected by Yugo's short temper and hatred against [[Yuri]].
  ** The word "Clear" ("transparent" or "obvious") in this monster's name is a reference to Yugo's straightforwardly impulsive personality, whereas "Wing" is a reference to freedom and speed; both of which are important aspects of [[Turbo Duel]]s.
  ** The striped design of Yugo's [[Duel Runner]], the ''[[TK2000PS]]'', is also based on this monster.
  * This monster is the [[Synchro Dimension]] [[counterpart]] of "[[Odd-Eyes Pendulum Dragon]]", "[[Dark Rebellion Xyz Dragon]]", and "[[Starving Venom Fusion Dragon]]".
  * This monster has multiple forms:
  ** A [[Z-ARC Magician]] form: "[[White Wing Magician]]".
  ** A [[Yu-Gi-Oh! ARC-V (manga)|manga]] [[counterpart]]: "[[Clear Wing Fast Dragon]]".
  ** A "[[Supreme King Dragon]]" counterpart: "[[Supreme King Dragon Clear Wing]]".
  ** 3 upgraded forms: "[[Crystal Wing Synchro Dragon]]", "[[Crystal Clear Wing Synchro Dragon]]", and "[[Crystal Clear Wing Over Synchro Dragon]]".
  ** A [[Synchro Pendulum Monster|Synchro Pendulum]] upgraded form with "Odd-Eyes Pendulum Dragon: "[[Odd-Eyes Wing Dragon]]".
  ** A retrained counterpart: "[[Clear Wing Synchro Dragon of the Four Heavenly Dragons]]".
  * This monster is similar to "[[Stardust Dragon]]".
  ** Both are [[WIND]] [[Dragon]] Synchro Monsters with 2500 [[ATK]] and 2000 [[DEF]].
  ** Both have white scales and emit a sparkle when they fly in the anime.
  ** Both were used by major characters in the anime who also had Duel Runners: Yugo for this monster and [[Yusei Fudo]] for "[[Stardust Dragon (anime)|Stardust Dragon]]".
  ** Both can [[negate]] the activation of a card or effect: this monster can negate the activation of the effects of a [[Level]] 5 or higher monster on the [[field]] or a [[monster effect]] that [[target]]s 1 Level 5 or higher monster on the field (and no other cards), and [[destroy]] that card, while "Stardust Dragon" can [[Tribute]] itself to negate a card or effect that would destroy a card on the field.
  ** The word "Clear" in this monster's name may also be a reference to [[Clear Mind]], a state of mind that was necessary to perform an [[Accel Synchro Summon]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster has the following distinctions from the other [[Four Dimensional Dragons]]:
  ** Its design does not feature glass-like spheres embedded in its body; instead, it has glass-like wings.
  ** Its design does not feature legs.
  ** Its [[Attribute]] is not [[DARK]].
  ** It can be Summoned with more than two monsters.
  ** It is the only one that can be Summoned from the [[Extra Deck]] by using [[Token Monster]]s as [[material]]s.
  * In the ''Yu-Gi-Oh! ARC-V'' anime, when this monster [[attack]]ed or [[activate]]d its effect, a glowing circuit board-like pattern appeared on its wings.
  * This monster's roar in the anime is the same as that of "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]".
