title: 'Card Trivia:Number 38: Hope Harbinger Dragon Titanic Galaxy'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.11]]''.
  * The number "38" is located on this monster's left shoulder pad.
  * This monster is a transformed version of "[[Number 28: Titanic Moth]]".
  ** In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, this monster was molded by [[Kaito Tenjo (manga)|Kaito Tenjo]] from "[[No. 28: Titanic Moth (manga)|No. 28: Titanic Moth]]", which was molded by [[Haruto Tenjo (manga)|Haruto Tenjo]] after [[Kyoji Yagumo]] turned it [[Blank card|blank]] again.
  ** "Titanic" is derived from the name of "Number 28: Titanic Moth".
  ** "Hope Harbinger" reflects how this monster's number precedes the number of "[[Number 39: Utopia]]", whose Japanese name is "King of Wishes, Hope".
  * This monster has a "[[Number S]]" [[Card evolutions|upgraded form]]: "[[Number S38: Titanic Galaxy]]".
  * This monster shares the same [[Attribute]] ([[LIGHT]]), [[Rank]]/[[Level]] (8), [[Type]] ([[Dragon]]), and [[original ATK and DEF]] (3000/2500) as "[[Galaxy-Eyes Photon Dragon]]", Kaito's [[signature card]] in both the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|051|ref}}, specifically from the panel showing [[No. 38: Hope Harbinger Dragon Titanic Galaxy (manga)|this monster]] being transformed into a "Number S" monster before being used to [[Xyz Summon]].
