title: Card Trivia:Galactica Singularity
wikitext: |-
  {{Navigation|mode=nongame}}

  * The three orbs in this card's artwork reflect its additional effect, which requires a [[Monster Card]] (represented by the yellow orb), a [[Spell Card]] (represented by the green orb), and a [[Trap Card]] (represented by the magenta orb) to be [[sent]] to the [[Graveyard]].
