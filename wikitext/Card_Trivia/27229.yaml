title: Card Trivia:Neo-Parshath, the Sky Paladin
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Surge of Radiance]]''.
  * This monster is the upgraded form of "[[Airknight Parshath]]".
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster]] form: "[[Avenging Knight Parshath]]".
  * This monster has an upgraded [[Counter Fairy]] form: "[[Sacred Arch-Airknight Parshath]]".
  * This monster's design is similar to that of "[[Meltiel, Sage of the Sky]]".
  ** Specifically, this monster appears to be the merged form of "Ariknight Parshath" and "Meltiel".
  ** Because of this, this monster bears the least resemblance to the other "[[Parshath]]" monsters, having replaced its horse-like lower body with feathers, changing the orientation of its armor to where it is attached to the large halo in the background, and losing its human-like face for something more simplistic, almost robotic.
