title: Card Trivia:Beautiful Bird Dancer Pavane
wikitext: |-
  {{Navigation|mode=nongame}}

  * Unlike other "[[Beautiful Bird]]" monsters, this monster is not directly named after a species of bird; rather, it is based on the ''[[wikipedia:Pavane|pavane]]'', a type of dance common in 16th century Europe, where the name was debated to have originated from "''pavón''", the Spanish word for "[[wikipedia:Peafowl|peacock]]".
