title: Card Trivia:Raigeki
wikitext: |-
  {{Navigation}}

  * "[[Slifer the Sky Dragon]]" appears in this card's alternate artwork.
  ** This card's artwork depicts "Slifer the Sky Dragon" attacking with its "[[Thunderforce Attack]]", in which it shoots lightning from its main mouth as depicted in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which relates to this Japanese card's name, "Thunder Bolt".
  ** Both this card and "Slifer the Sky Dragon" share an effect that [[destroy]]s multiple monsters the opponent [[control]]s; this card destroys all of the opponent's monsters, while "Slifer the Sky Dragon" destroys any number of monsters the opponent controls whose [[ATK]] drops to 0 as a result of its effect.
  * This card appears in the ''[[TCG]]'' artwork of "[[Exchange]]".
  * This card's ''TCG'' name, "Raigeki", is the Japanese word for "Lightning Strike".
  * Since it obtained its [[Forbidden]] status, this card has continued to receive homage through later [[counterpart]]s, such as "[[Flash of the Forbidden Spell]]", "[[Lightning Vortex]]", "[[Raigeki Bottle]]", "[[Raigeki Break]]", and "[[Lightning Storm]]", many of which imitate its effect in more balanced manners, or with more contextual purposes.
  ** This card has a [[Spell]]/[[Trap Card]]s-destroying equivalent: "[[Harpie's Feather Duster]]".
  ** This card has an equivalent specifically for "[[Blue-Eyes]]" [[Deck]]s: "[[Burst Stream of Destruction]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Raigeki]]".
  * This is one of the four Forbidden cards to have its effect featured in "[[Fuh-Rin-Ka-Zan]]" and "[[Pot of The Forbidden]]".
  * The [[Summon]]-[[trigger]]ed effect of "[[Phosphorage the Elemental Lord]]" is based on this card.
  * This is one of four cards to feature a card(s) that were designed to counter this card specifically in its effects, the other three being "[[Dark Hole]]", "Harpie's Feather Duster", and "[[Monster Reborn]]"; in this card's case, it is "[[Anti Raigeki]]".
  * The artwork of "[[Raimei]]" might be the aftermath of the events depicted in this card's artwork, as [[wikipedia:Thunder|thunder]] comes after [[wikipedia:Lightning|lightning]].
  * This card was both one of the first cards to be [[Limited]] in [[May 2002 Lists|May 2002]], and one of the first cards to be Forbidden in [[August 2004 Lists|August 2004]]. It did not come off the list until [[October 2014 Lists (TCG)|October 2014]] in the ''[[TCG]]'', ten years later.
  ** However, this card once again became Limited in [[April 2019 Lists (OCG)|April 2019]] in the ''[[OCG]]'', approximately fifteen years after becoming Forbidden.
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card has a special animation when [[activate]]d: the lightning bolt from this card's artwork drops down on the opponent's [[field]], destroying their monsters.
