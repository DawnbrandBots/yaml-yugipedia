title: Card Trivia:Ectoplasmic Fortification
wikitext: |-
  {{Navigation}}

  [[File:Ectoplasmic Fortification.png|thumb|200px|"[[Pumpking the King of Ghosts (manga)|Pumpking the King of Ghosts]]" increasing the [[ATK]] of the other [[Zombie]] monsters.]]

  * This card appears in the artwork of "[[Dark Time Wizard]]".
  * "[[Armored Zombie]]", "[[Clown Zombie]]", "[[Dragon Zombie]]", and "[[Pumpking the King of Ghosts]]" appear in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|91|ref}} showing "[[Pumpking the King of Ghosts (manga)|Pumpking the King of Ghosts]]" using its effect to power up "[[Armored Zombie (manga)|Armored Zombie]]", "[[Clown Zombie (manga)|Clown Zombie]]", and "[[Dragon Zombie (manga)|Dragon Zombie]]".
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh!|effect name]] of "[[Pumpking the King of Ghosts (anime)|Pumpking the King of Ghosts]]" in the English dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime. 
  ** This card's second effect to increase the [[ATK]] of the player's Zombie monsters references the other effect of "[[Call of the Haunted]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which [[Special Summon]]ed the player's Zombie monsters from their [[Graveyard]] and increased their ATK by 10% each time they were [[destroyed by battle]].

