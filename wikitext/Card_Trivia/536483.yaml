title: Card Trivia:Alien Shocktrooper
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Barrier Wave]]", "[[Full-Force Strike]]", "[[Spirit Battle]]", and "[[Strike Slash]]".
  * This monster appears to be a transformed version of "[[Alien Hunter]]".
  ** This is supported by both monsters having the same armor for their chests, tails, and heads.
  * This monster has a [[Link Monster]] counterpart: "[[Alien Shocktrooper M-Frame]]".
  * This is one of three "[[Alien]]" monsters whose orbs do not match its [[Attribute]], the other two being "[[Alien Dog]]" and "[[Alien Kid]]".
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'', this monster, along with "[[Alien Shocktrooper]]", feature a bug where it does not count as an "[[Alien]]" monster for the purposes of using [[A-Counter]]s.
