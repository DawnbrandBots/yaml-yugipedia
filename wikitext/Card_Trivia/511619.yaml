title: Card Trivia:Fake Trap
wikitext: |-
  {{Navigation}}

  * "[[Goblin Calligrapher]]" appears in this card's artwork.
  ** Fittingly, the [[flavor text]] of "Goblin Calligrapher" states that he "devotes himself to mastering perfect calligraphy of the word 'False'."
  *** However, a more accurate translation of the word 「スカ」(''suka'') in this card's Japanese artwork would be "Fail".
  * This card appears in the artwork of "[[Fifty Fifty?]]".
