title: Card Trivia:Dracotail Mululu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dracotail Sting]]".
  * This monster is based on the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Scorpius|Scorpius]].
  ** The [[Wikipedia:Astrological sign|astrological sign]] for [[wikipedia:Scorpius (astrology)|Scorpius]] appears on this monster's golden wrist cuffs, while the constellation of Scorpius appears in the background of this card's artwork.
  ** This monster's design features pincer-like claws and a stinging tail, which resembles those of a scorpion's, referencing how Scorpius is also known as the "scorpion" constellation.
  *** This monster is named after "MUL.GIR.TAB", the name of Scorpius in [[wikipedia:Babylonian astronomy|Babylonian astronomy]], which is also known as "The Scorpion".
