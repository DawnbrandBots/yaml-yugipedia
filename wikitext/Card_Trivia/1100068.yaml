title: Card Trivia:Ice Doll Mirror
wikitext: |-
  {{Navigation}}

  * "[[Ice Doll]]" appears in this card's artwork.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect is an alteration of its effect in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, which allows "[[Ice Doll (manga)|Ice Doll]]" to transform into a monster on the player's [[field]], thus creating a double of that monster. In the ''OCG''/''TCG'', this card's effect can [[send]] a [[WATER]] monster from the player's [[hand]] or field to the [[Graveyard]] to [[Special Summon]] a WATER monster the player controls with the same name from the hand or [[Deck]].
