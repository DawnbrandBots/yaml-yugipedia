title: Card Trivia:Tellarknight Cygnian
wikitext: |-
  {{Navigation}}

  * This monster is a retrained counterpart of "[[Satellarknight Deneb]]".
  * This monster is named after the constellation [[wikipedia:Cygnus (constellation)|Cygnus]].
  * This monster has a combined [[Xyz Monster|Xyz]] form with "[[Tellarknight Altairan]]" and "[[Tellarknight Lyran]]": "[[Tellarknight Constellar Delteros]]".
