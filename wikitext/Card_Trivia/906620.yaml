title: Card Trivia:Jesse Anderson - Bonder with the Crystal Beasts
wikitext: |-
  {{Navigation}}

  * "[[Crystal Beast Amber Mammoth]]", "[[Crystal Beast Amethyst Cat]]", "[[Crystal Beast Cobalt Eagle]]", "[[Crystal Beast Emerald Tortoise]]", "[[Crystal Beast Ruby Carbuncle]]", "[[Crystal Beast Sapphire Pegasus]]", "[[Crystal Beast Topaz Tiger]]", and [[Jesse Anderson]] appear in this card's artwork.
  ** The green background of this card's artwork is the same design as the one used for ''[[Duelist Pack: Jesse Anderson]]''.
  ** This card's Japanese [[flavor text]] references a scene in {{episode|GX|116|ref}}, where Jesse Anderson declared to [[Trapper]]: ''The [[Duel Monster Spirit|spirits]] gave me my reason for [[Duel]]ing! My goal, to be a bridge between spirits and humans... I have awakened to that mission!!''.
