title: Card Trivia:Cornfield Coatl
wikitext: |-
  {{Navigation}}

  * This is the first [[WIND]] [[Illusion]] monster.
  * This monster originally debuted as a constructed card in ''[[Yu-Gi-Oh! Dark Duel Stories]]'', and is also one of five constructible cards to be released in the ''[[OCG]]''/''[[TCG]]''. It is a [[List of significant constructed cards#Standard combinations|matched constructed card]] using the 2nd upper and lower body [[card part]]s, "[[Cornfield]]" and "[[Koator]]".
  ** This monster's ''OCG''/''TCG'' Illusion [[Type]] references how in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' and ''[[Yu-Gi-Oh! True Duel Monsters]]'' video game series, it belonged to the [[Dreams]] [[Alignment]], which is known in the Japanese version as "Illusion Magic" (げんそうま, Gensōma) or "Illusion" (げん{{Ruby|想|そう}}, ''Gensō'').
