title: Card Trivia:Eternal Favorite
wikitext: |-
  {{Navigation}}

  {{Double image||Yubel silhouette.png|250|GX155 - Yubel hugs Jaden.png|250|The first image shows Yubel's reentry to Earth, while the second image shows Yubel embracing Jaden before "Super Polymerization" fuses their souls together.}}
  * "[[Yubel]]" and [[Jaden Yuki]] appear in this card's artwork.
  ** The pose of "Yubel" references a scene from {{episode|GX|153|ref}}, where [[Yubel (character)|Yubel]] briefly assumes a similar pose as their capsule returns to Earth. 
  ** The other details of this card's artwork and its and second effect reference a scene from {{episode|GX|155|ref}}, where [[Yubel (character)|Yubel]] embraces Jaden and vows to protect him forever, just before the two of them fuse after Jaden used "[[Spiritual Fusion]]" to choose both of them as [[Fusion Material]]s for "[[Super Polymerization (anime)|Super Polymerization]]". Right before the two disappear, they are bathed in a golden light. 
  * Unlike prior "[[Favorite]]" cards that reference "[[Elemental HERO Flame Wingman]]" and "[[Elemental HERO Neos]]" as Jaden's favorite monsters, this card references how "Yubel" was Jaden's favorite monster during his childhood and after the two reconciled at the end of the [[Dimension World]] arc in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This card's name may be inspired by Yubel's claims to being Jaden's eternal lover.

