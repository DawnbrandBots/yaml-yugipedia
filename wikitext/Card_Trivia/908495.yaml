title: Card Trivia:Sacred Scrolls of the Gizmek Legend
wikitext: |-
  {{Navigation}}

  * This card's name has 2 separate references:
  ** '''Kamitsukawashime''' means "Gods' messengers", a reference to a believed connection between a shrine and the animals closely related to it, said to be messengers of the enshrined deity.
  ** '''Kiki''' is a term used to refer to both the ''[[wikipedia:Kojiki|Kojiki]]'' and ''[[wikipedia:Nihon Shoki|Nihon Shoki]]'', the two oldest books on classical Japanese history and folklore.
  * "[[Gizmek Taniguku, the Immobile Intellect]]", "[[Gizmek Kaku, the Supreme Shining Sky Stag]]", and "[[Gizmek Inaba, the Hopping Hare of Hakuto]]" appear in this card's artwork.
