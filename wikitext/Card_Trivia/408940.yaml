title: Card Trivia:Shelga, the Tri-Warlord
wikitext: |-
  {{Navigation}}

  * This monster's name including the prefix "Tri-", its [[WATER]] [[Attribute]], and the triangle in the background of this card's artwork likely reference to the [[wikipedia:Bermuda Triangle|Bermuda Triangle]], a loosely defined region in the [[wikipedia:Atlantic Ocean|Atlantic Ocean]] with one of its corners generally accepted to be [[wikipedia:Miami|Miami]], [[wikipedia:Florida|Florida]].
  ** The triangle's resemblance to "[[Dimensional Fissure]]" and this monster's [[flavor text]] both reference the urban legend of the Bermuda Triangle, where many aircraft, ships, and people disappeared under mysterious circumstances, which were sometimes attributed to distortions in reality or time warps.
  ** This monster, along with its accompanying [[Match winner]], "[[Juno, the Celestial Goddess]]", both share a Florida theme, referencing how they were released as [[Yu-Gi-Oh! World Championship 2016 prize cards|prize cards]] at the 2016 ''Yu-Gi-Oh!'' World Championship, which was held in [[wikipedia:Orlando, Florida|Orlando]], Florida.
  * This is the first WATER [[Match winner]], as well as the first [[Psychic]] Match winner.
