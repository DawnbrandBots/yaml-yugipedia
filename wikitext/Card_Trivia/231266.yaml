title: Card Trivia:Reaper of Prophecy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spellbook of Judgment]]" and "[[Spellbook of Miracles]]".
  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Death (Tarot card)|Death]], the thirteenth of the [[wikipedia:Major Arcana|Major Arcana]].
  ** This card's OCG name is from the French name for "Death", ''La Mort''.
  * According to the [[Gagaga Academy Tospedia card storylines#"The Fool's Bizarre Adventure" Edition|Gagaga Academy Tospedia card storylines]], this monster is "[[Fool of Prophecy]]" after being corrupted and transformed by the black magic of the "[[Spellbook of the Master]]", after he decided to choose a random "[[Spellbook]]" from "[[The Grand Spellbook Tower]]".
  ** The third effect of this card is similar to the effect of "Fool" that [[Special Summon]]s a [[Level]] 5 or higher [[DARK]] [[Spellcaster]]-[[Type]] monster from the [[Main Deck|Deck]] and both needing 5 or more "Spellbook" Spell Cards in the [[Graveyard]] to activate their effects.
