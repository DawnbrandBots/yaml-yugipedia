title: Card Trivia:Symphonic Warrior Miccs
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Concentrating Current]]", "[[Generalprobe]]", "[[Symph Amplifire]]", and "[[Symphonic Warrior Rockks]]".
  ** In the artwork of "Symph Amplifire", this monster is facing backwards, most likely to hide its full appearance since it had not yet been released at that time.
  * This monster is based on a [[wikipedia:Microphone|microphone]] (also called "mic").

