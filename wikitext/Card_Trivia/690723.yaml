title: Card Trivia:Reeshaddoll Wendi
wikitext: |-
  {{Navigation}}

  * This card is a "[[Shaddoll]]" counterpart of "[[Ritual Beast Tamer Wen]]". They have the same [[Attribute]], [[Type]], [[Level]], [[ATK]], and [[DEF]].
  * This monster appears in the artwork of "[[Void Apocalypse]]".
  * The kanji in this card's Japanese name roughly translates as "wings of shadow spirit".
  ** The 影霊 part of this card's Japanese name shares the same kanji as the Japanese name of "[[Ritual Beast Tamer Zefrawendi]]" (影霊獣使, ''eireijūtsukai'' ) which translates as 'shadow spirit beast tamer'.
  ** "Reeshaddoll Wendi" is the form of "[[Ritual Beast Tamer Wen]]" after [[Ritual Beast Tamer Zefrawendi|her Zefra power]] was transfered to [[Shaddoll Zefracore]], in order for him to become [[Zefraath]].
  * The name "Reeshaddoll" appears to be a portmanteau of "Shaddoll" and "rīša" (Arabic: ريشة, "feather").
