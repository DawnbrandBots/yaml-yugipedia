title: Card Trivia:Red-Eyes Zombie Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Undead World]]''/''[[Zombie World Structure Deck]]''.
  * This monster is the [[Zombie counterpart]] of "[[Red-Eyes Darkness Dragon]]".
  ** This likely references the first two [[Structure Deck]]s not themed after a character, ''[[Structure Deck: Dragon's Roar|Dragon's Roar]]'' and ''[[Structure Deck: Zombie Madness|Zombie Madness]]'', both of which were released simultaneously, with "Red-Eyes Darkness Dragon" being the cover card of the former.
  ** Despite having the same [[ATK]]/[[DEF]] (2400/2000) as "Red-Eyes Darkness Dragon", this monster has the same [[Level]] (7) as "[[Red-Eyes Black Dragon]]".
  * This monster might also be based on a scene of {{episode|Yu-Gi-Oh!|018|ref}}, where [[Joey Wheeler]] used "[[Red-Eyes B. Dragon (anime)|Red-Eyes Black Dragon]]" against [[Bonz]], who were using "[[Call of the Haunted (anime)|Call of the Haunted]]", which had a different effect in the early ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime that [[Special Summon]]ed all the player's monsters [[destroyed by battle]] from the [[Graveyard]] and turned them into [[Zombie]] monsters. Despite "Red-Eyes Black Dragon" itself not being revived by the aforementioned card, it destroyed one of Bonz's monsters and was later destroyed by his "[[Dragon Zombie (anime)|Dragon Zombie]]".
  ** This monster is also two Levels lower than its base counterpart, like the Zombie counterparts associated to "Call of the Haunted".
  * According to the [[Master Guide 6 card storylines#File No. 06: The World of the Immortal Undead Is in the Midst of a Constant Struggle for Supremacy...|''Master Guide 6'' card storylines]], this monster's missing right eye was stolen by "[[Doomking Balerdroch]]", who added it to its staff.
  * This monster has a [[retrained]] [[Synchro Monster|Synchro]] counterpart: "[[Red-Eyes Zombie Necro Dragon]]".
  ** According to ''Master Guide 6'', this monster evolved into "Red-Eyes Zombie Necro Dragon" by absorbing the miasma that fills the air of "[[Zombie World]]", in order to counterattack against "Balerdroch".
  * This monster has an [[Card evolutions|upgraded]] Synchro form: "[[Red-Eyes Zombie Dragon Lord]]".
  ** This monster became "Red-Eyes Zombie Dragon Lord" after defeating "Balerdroch".
