title: Card Trivia:Hundred Eyes Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Infernity Paranoia]]".
  * Despite this monster's name and artwork featuring approximately 80 visible eyes, the actual number of eyes is more than 100.
  * This monster is the counterpart to "[[Infernity Doom Dragon]]" and the  [[Yu-Gi-Oh! 5D's|anime]] counterpart to "[[Void Ogre Dragon]]".
  ** All three are [[Kalin Kessler]]'s [[signature card]]s in the ''Yu-Gi-Oh! 5D's'' anime and [[Yu-Gi-Oh! 5D's (manga)|manga]].
  ** All three monsters require a [[DARK]] [[Tuner monster]], feature demonic motifs, and share an [[original ATK]] of 3000.
  * This is the first [[Synchro Monster]] to be released in ''[[Shonen Jump]]''.
  ** This card's ''Shonen Jump'' promotion in the United States contains a hyphen ("-") in its name, "Hundred-Eyes Dragon", but was later removed from its second release in the United States, likely to ensure that players would not mistake it as a member of the "[[Red-Eyes]]" [[archetype]].
  *** Also, this card's ''Shonen Jump'' promotion in the United States contains a typo in its [[card text]] where it states "[[Banishing|removing from play]]", which was misspelled as "removing '''fom''' play".
  * In the English version of ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'', this card's name features a text error, where it will be displayed as it's original Japanese name, "One-Hundred Eye Dragon".
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to banish a [[Level 6]] or lower DARK monster is an alteration of its effect in the ''Yu-Gi-Oh! 5D's'' anime, which gains the effects of all DARK monsters in the [[Graveyard]]. This monster gained the abilities of "[[Infernity Beast (anime)|Infernity Beast]]", "[[Infernity Dwarf (anime)|Infernity Dwarf]]", "[[Infernity Destroyer (anime)|Infernity Destroyer]]", "[[Infernity Guardian (anime)|Infernity Guardian]]" and "[[Infernity Necromancer (anime)|Infernity Necromancer]]", all Level 6 or lower DARK monsters.
  ** This monster's ''OCG''/''TCG'' effect to [[add]] an "[[Earthbound Immortal]]" monster from the player's [[Deck]] to the [[hand]] after it is [[destroy]]ed and sent to the Graveyard is based on its appearances in the ''Yu-Gi-Oh! 5D's'' anime, where Kalin uses its effect to add a card from his Deck to his hand after it was destroyed by battle. In all its appearances, the card added each time was "[[Earthbound Immortal Ccapac Apu (anime)|Earthbound Immortal Ccapac Apu]]".
