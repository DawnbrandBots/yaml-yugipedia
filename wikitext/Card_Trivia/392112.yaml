title: Card Trivia:Lord Gaia the Fierce Knight
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] version of "[[Gaia The Fierce Knight]]".
  ** This monster is similar to "[[Swift Gaia the Fierce Knight]]", as both monsters can Summon themselves without [[Tribute]]s, and may be a retrained version of that specific monster.
  * In ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'', the dragon in this card's artwork only appears when its [[Trigger Effect]] is [[activate]]d.
