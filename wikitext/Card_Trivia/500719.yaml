title: Card Trivia:Missus Radiant
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Link Monster]] [[counterpart]] to "[[Milus Radiant]]".
  * This card is the first [[Beast]] Link Monster.
  * This monster's name and appearance are likely a reference to the Japanese name of "Milus Radiant", which is an anagram of "Lady Millicent" in Japanese.
  ** Visual example, with changes outlined in brackets, as well as the fact that セ (se) and ス (su) sound similar to each other:
  *** "'''[レディ]'''・'''{ミリセ}'''ント" (Lady Millicent)
  *** "'''{ミリス}'''・'''[レディ]'''エント" (Milus Radiant).
  * This monster appears in the artworks of "[[Link Party]]" and "[[Love Gravity]]".
