title: Card Trivia:Amazoness Archers
wikitext: |-
  {{Navigation}}

  * The unnamed green-haired, yellow-haired, and straight black-haired "[[Amazoness]]es" in this card's artwork appears in the artwork of "[[Amazoness Hot Spring]]".
  ** Also, the yellow-haired "Amazoness" appears in the artwork of "[[Half Counter]]" while the straight black-haired "Amazoness" appears in the artwork of "[[Amazoness Hall]]".
  * This card's French name, "Archère Amazonesse", formerly belongs to "[[Amazoness Archer]]".
