title: Card Trivia:Malefic Stardust Dragon
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Malefic]]" [[counterpart]] of "[[Stardust Dragon]]".
  ** This monster's pose mirrors that of "Stardust Dragon", referencing how its artwork was mirrored and darkened after it was captured by [[Paradox]].
  *** In addition, the background of this card's artwork is an inversion to that of "Stardust Dragon": the latter card's background features a green color scheme to reflect its [[WIND]] [[Attribute]], while the background of this card's artwork features a purple color scheme to reflect its [[DARK]] Attribute.
  * This is the only form of "Stardust Dragon" whose Attribute is DARK.
  * This is the only "Malefic" counterpart to feature an additional ''[[OCG]]''/''[[TCG]]'' effect besides the usual limitations used by the other "Malefic" monsters in the ''OCG''/''TCG'': this monster's effect can prevent [[Field Spell Card]]s from being [[destroy]]ed.
  * This is the only "Malefic" monster to feature torso and knee armor, in addition to the mask and wing armor.
  * This is the first "Malefic" monster to be released as a [[Shonen Jump promotional cards|promotional card]] for the ''[[Shonen Jump]]'' magazine.
  * According to this card's written text in ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' movie, it doesn't specify that it can be [[Special Summon]]ed by its own effect, other than by sending "Stardust Dragon" from the [[Extra Deck]] to the [[Graveyard]] to Special Summon itself from hand. This means that even if the card text states that it can Special Summon itself at the [[End Phase]] after Tributing itself, it won't be able to do so due to its own [[Summoning condition]].
