title: Card Trivia:F.A. Pit Stop
wikitext: |-
  {{Navigation}}

  * "[[F.A. Sonic Meister]]", and "[[U.A. Rival Rebounder]]" (replacing one of the rear tires), appear in this card's artwork.
  ** "[[U.A. Mighty Slugger]]" possibly appears in this card's artwork as well, wearing a lanyard while studying a clipboard (possibly identified by his hair).
  ** In this context, "[[U.A. Goalkeeper]]" possibly appears in this card's artwork as well (carrying a tire away), as identified by his big stature and his chinstrap. This is because all other "[[U.A.]]" monsters are already identified as drivers of various "[[F.A.]]" monsters.
