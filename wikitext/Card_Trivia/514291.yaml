title: Card Trivia:Mask of Dispel
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Spell of Mask]]'' and the box of ''[[Duelist Legacy Volume.3]]''.
  * This card appears in the artwork of "[[Vain Betrayer]]".
  * This card's Japanese anime text is identical to its Japanese ''[[OCG]]'' text, barring two instances in which 「フィールド」 ''Fīrudo'' ([[field]]) is misspelled 「フィルド」 ''Firudo''.
