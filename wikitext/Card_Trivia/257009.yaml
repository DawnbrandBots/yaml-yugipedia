title: Card Trivia:Ghostrick Jiangshi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Festival]]", "[[Ghostrick Mansion]]", "[[Ghostrick Museum]]", "[[Ghostrick Parade]]", "[[Ghostrick Renovation]]", and "[[Ghostrick Shot]]".
  * This monster is based on a [[wikipedia:Jiangshi|jiangshi]], a reanimated corpse in Chinese folklore who moves around by hopping with its arms outstretched and absorb's their victims' life force at night.
