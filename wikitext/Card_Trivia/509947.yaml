title: Card Trivia:Right Leg of the Forbidden One
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[BIG Win!?]]", "[[Damaging Hand]]", and the 2nd Japanese/''[[TCG]]'' artwork of "[[Exchange]]".
  ** A stone tablet of this monster appears in the artwork of "[[Wedju Temple]]".
  * Part of the ''TCG'' version of "[[Spellbinding Circle]]" appears in this card's ''TCG'' artwork.
  * In the English dubbed version of the ''[[Yu-Gi-Oh GX]]'' anime, this card and the other "[[Forbidden One]]" monsters had their ''[[OCG]]'' artwork instead.
