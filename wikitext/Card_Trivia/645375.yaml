  * "[[Frodi, Generaider Boss of Swords]]" appears in this card's artwork.
  * The symbol from "[[Generaider Boss Stage]]" appears in this card's artwork, albeit the upper middle circle is highlight light yellow. This circle represents [[wikipedia:Álfheimr|Álfheimr]], home of the [[wikipedia:Dökkálfar and Ljósálfar|light elves]].
