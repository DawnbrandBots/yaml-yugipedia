title: Card Trivia:Gouki Octostretch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gouki Roar]]" and "[[Gouki Unity]]".
  * This monster is named after the [[wikipedia:Professional wrestling holds#Octopus hold|octopus stretch]], a technique in [[wikipedia:Professional wrestling|professional wrestling]] which involves wrapping a leg around the opponent's neck while using the free arms and legs to trap the opponent's arms and legs. Fittingly, this monster's design is based on an [[wikipedia:Octopus|octopus]].
