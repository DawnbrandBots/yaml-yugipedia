title: Card Trivia:Daruma Dropper
wikitext: |-
  {{Navigation}}

  * This card is based on the monk [[wikipedia:Bodhidharma|Bodhidharma]], known in Japan as Daruma.
  ** Also, this card's Japanese name and artwork are based on the children's game Daruma Otoshi: It is played with a daruma doll in five pieces. The players use a small hammer to hit each of the colored pieces, from bottom to the top, without letting the pieces fall during the game.
