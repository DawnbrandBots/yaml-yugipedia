title: Card Trivia:Dual Avatar - Empowered Kon-Gyo
wikitext: |-
  {{Navigation}}

  * This monster is based on '''Misshaku Kongō''', one of the two [[wikipedia:Nio|Kongōrikishi]], wrathful and muscular guardians of the Buddha, standing at the entrance of many Buddhist temples.
  ** "Kongou" is also the Japanese word for a [[wikipedia:Vajra|vajra]], a type of club with a ribbed spherical head that is wielded by Misshaku Kongō.
  * This monster appears in the artwork of "[[Dual Avatar Defeating Evil]]".
