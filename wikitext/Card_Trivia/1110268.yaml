title: Card Trivia:Dracotail Gulamel
wikitext: |-
  {{Navigation}}

  * This monster is the combined [[Fusion Monster|Fusion]] form of "[[Dracotail Faimena]]" and "[[Dracotail Urgula]]". 
  ** The [[Wikipedia:Astrological sign|astrological signs]] of the aforementioned monsters, [[wikipedia:Aquarius (astrology)|Aquarius]] and [[wikipedia:Leo (astrology)|Leo]] respectively, are opposing signs in the [[Wikipedia:Astrological sign#Western zodiac signs|Western Zodiac]]. Fittingly, the aforementioned monsters also have opposite [[Attribute]]s, [[WATER]] and [[FIRE]] respectively.
