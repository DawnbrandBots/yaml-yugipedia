title: Card Trivia:Great White Terror
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Kairyu-Shin's Dark Reef]]".
  * This card is based on a [[wikipedia:Megalodon|megalodon]], an extinct species of giant shark, traditionally believed to be similar to the [[wikipedia:Great white shark|great white shark]] except for its notably larger size.
  * This card's artwork resembles the theater poster for the film ''[[wikipedia:Jaws (film)|Jaws]]''.
  ** This card's English anime artwork appears to be based on its manga artwork, in contrast to its Japanese anime artwork.
