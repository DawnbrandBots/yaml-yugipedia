title: Card Trivia:Voltic Kong
wikitext: |-
  {{Navigation}}

  * In some English ''Yu-Gi-Oh!'' video games, this card is called "Vortex Kong".
  * This monster appears in "[[Berserking]]".
  * This card may be a reference to the Toho rendition of [[wikipedia:King Kong (Toho)|King Kong]], who had the ability to absorb electrical currents and use them to release surges of electricity from his hands.
