title: Card Trivia:Instant Contact
wikitext: |-
  {{Navigation}}

  [[File:Neos_Contact_in_Teardrop.png|thumb|right|250|"[[Elemental Hero Neos (anime)|Elemental HERO Neos]]" and the six [[Contact Fusion]] monsters as seen in "[[Teardrop]]".]]

  * "[[Elemental HERO Air Neos]]", "[[Elemental HERO Aqua Neos]]", "[[Elemental HERO Dark Neos]]", "[[Elemental HERO Flare Neos]]", "[[Elemental HERO Glow Neos]]", "[[Elemental HERO Grand Neos]]", and "[[Elemental HERO Neos]]" appear in this card's artwork.
  ** This card's artwork is based on a scene in ''[[Teardrop]]'', the third Japanese opening theme of the ''[[Yu-Gi-Oh! GX]]'' anime; the scene was also featured in the third version of "[[Get Your Game On! (song)|Get Your Game On!]]", the English opening theme.
  *** However, "Air Neos" is depicted more obscured in this card's artwork, being right behind "Neos", and with its wings colored white instead of pink.
  * This card is a "[[Contact (series)|Contact]]" [[counterpart]] of "[[Instant Fusion]]".
  ** Both cards share an effect to make the player pay 1000 [[LP]] to [[Special Summon]] a [[Fusion Monster]] from the [[Extra Deck]].
  ** Both cards share an effect prevent the Special Summoned Fusion Monsters from attacking.
  ** Both cards share an effect that [[activate]]s during the [[End Phase]], making the Special Summoned Fusion Monster leave the [[field]].
  *** The last two above-mentioned effects can be prevented while "Neos" is on the player's field or in their [[Graveyard]].

