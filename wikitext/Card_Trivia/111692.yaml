  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] counterpart of "[[Robolady]]".
  * This monster has a male counterpart: "[[Super Roboyarou]]".
  ** Fittingly, both require "Robolady" and "[[Roboyarou]]" as [[Fusion Material]]s, with the former being listed first.
