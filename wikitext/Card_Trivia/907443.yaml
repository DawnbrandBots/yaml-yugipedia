title: Card Trivia:S-Force Bridgehead
wikitext: |-
  {{Navigation}}

  * "[[S-Force Justify]]" and "[[Gravity Controller]]" appear in this card’s artwork. In addition to this, several monsters’ card artworks appear in the background of "Bridgehead" within circular hologram, with many of them even having their pursuit targets/rivals profiles assigned to them.
  ** "[[S-Force Orrafist]]" is assigned to "[[Time Thief Redoer]]" (clash depicted in "[[S-Force Showdown]]"), as well as two unknown targets.
  ** "[[S-Force Professor DiGamma]]’s" profile is linked to "[[PSY-Frame Driver]]" (one of the confrontations depicted in "[[S-Force Specimen]]") as well as currently one unknown target.
  ** "[[S-Force Pla-Tina]]" has currently two unknown targets.
  ** "[[S-Force Rappa Chiyomaru]]" has no pursuit target depicted here. However, it is implied in "[[S-Force Chase]]" and later revealed in ''[[The Valuable Book EX promotional cards|the Valuable Book EX]]'' that her target is "[[I:P Masquerena]]".
  ** Lastly, "[[PSY-Frame Multi-Threader]]" has no S-Force member assigned to them. Though, it is likely implied through the artwork that Justify is recruiting "Gravity Controller" (who is confirmed to become "[[S-Force Gravitino]]" in VBEX concept art) and assigning “Gravitino” to “Multi-Threader”.
  * The S-Force crest appears in this card's artwork, located on the floor in front of the center terminal where "S-Force Justify" and "Gravity Controller" stand.
