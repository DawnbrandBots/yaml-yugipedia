title: Card Trivia:Con, the Forest Schemer
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the ''[[wikipedia:Kitsune|kitsune]]'', a fox ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore capable of shapeshifting, bewitching, and tricking people. 
  ** This monster's name references the Japanese sound effect a fox makes when yipping (''kon kon'').
