  * A statue of "[[Crimson Dragon (card)|Crimson Dragon]]" and the [[Dragon Star]] appear in this card's artwork.
  ** This card's artwork references the artwork of "[[Scrap-Iron Statue]]", which depicts a [[Stardust Dragon statue|statue]] of "[[Stardust Dragon]]" along with a [[Stardust Dragon (character)|blue star]].
