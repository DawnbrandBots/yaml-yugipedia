title: Card Trivia:The Man with the Mark
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]'' and ''[[World Premiere Pack 2025]]''.
  * Either "[[Temple of the Kings]]" or "[[Treasures of the Kings]]" appears in this card's artwork.
  * Visually, this monster is based on [[Odion]], who uses "Temple of the Kings" and "[[Embodiment of Apophis]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** The word "mark" in this monster's name references the set of hieroglyphics that Odion carved into his face with a knife (or tattooed in the international dubbed version of the ''Yu-Gi-Oh!'' anime) as proof of his loyalty to Marik. This mark later becomes critical to sealing away the true darkness of [[Yami Marik|Marik's other personality]] that becomes seeded in Marik during the ritual.
  * Despite design similarities with the "[[Gravekeeper's]]" [[archetype]] (in which "[[Gravekeeper's Heretic]]", "[[Gravekeeper's Priestess]]", and "[[Gravekeeper's Recruiter]]" are each based on [[Marik Ishtar]], [[Ishizu Ishtar]], and Odion, respectively), this monster is not a member of the archetype. This likely references how the [[Ishtar forefather]] (whom "[[Gravekeeper's Visionary]]" is based on) refused to consider Odion a member of the clan and never considered him a son.
