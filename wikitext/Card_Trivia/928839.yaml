title: Card Trivia:D - Force
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect to prevent the opponent from [[target]]ing cards on the player's [[field]] with card effects is based on the anime effect of "[[Destiny Hero - Plasma (anime)|Destiny HERO - Plasma]]", which [[negate]]s the [[activate|activation]] and [[destroy]]s the opponent's [[Spell]]/[[Trap Card]]s that target cards on the player's field while this card is [[face-up]] on top of their [[Deck]].
  ** This card's ''OCG''/''TCG'' effect to have "[[Destiny HERO - Plasma]]" gain 100 [[ATK]] for each monster in the [[Graveyard]]s likely references the supernatural power of "Plasma" while tainted by [[The Light of Destruction]] in the ''[[Yu-Gi-Oh! GX]]'' anime, which absorbed the souls of Duelists that [[The D]] defeated while the card was in his possession.
  *** Also, this effect, allowing "Destiny HERO - Plasma" to make a second attack during each [[Battle Phase]] references the different moments in the ''Yu-Gi-Oh! GX'' anime where "Plasma" was allowed to make more than one attack in a single turn, via the effects of "[[D - Acceleration]]", "[[D - Burst (anime)|D - Burst]]", and "[[Unfair Judge]]", separately.
