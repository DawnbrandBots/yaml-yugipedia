title: Card Trivia:Powered Tuner
wikitext: |-
  {{Navigation}}

  * Contrary to its name, this monster is not a Tuner monster; instead, it is a monster that is "powered" by Tuners.
  * The maximum ATK this card can gain with its own effect is 6000 ATK. This occurs when all monsters on the field are Tuner monsters, including "Powered Tuner" itself being treated as a Tuner monster (e.g. via the effect of "[[Torque Tune Gear]]").
