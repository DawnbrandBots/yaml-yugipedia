title: Card Trivia:Malefic Blue-Eyes White Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Yu-Gi-Oh! 3D Bonds Beyond Time Movie Pack]]''.
  * This monster is the "[[Malefic]]" [[counterpart]] of "[[Blue-Eyes White Dragon]]".
  ** In the advertisements for ''[[Duelist Pack: Kaiba]]'', this monster was mentioned as a "[[Blue-Eyes]]" [[Effect Monster]]. Ironically, Seto Kaiba never used this monster in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime; instead, his "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" was stolen from him by [[Paradox]] and transformed into this monster.
  * This is the first [[DARK]] "Blue-Eyes" monster.
  * This is the first "Malefic" monster to be released in the ''[[TCG]]''.
  * This monster and "[[Malefic Red-Eyes Black Dragon]]" are the only "Malefic" counterparts whose right eye is not covered by their masks (this cannot be seen in the artwork of "Malefic Red-Eyes Black Dragon", but rather in its appearance in the ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' movie).
