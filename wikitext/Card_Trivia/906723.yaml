title: Card Trivia:Black Luster Soldier - Legendary Swordsman
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * This monsteris a [[retrained]] [[counterpart]] of "[[Black Luster Soldier]]".
  ** This monster's name is composed of "[[Black Luster Soldier (manga)|Black Luster Soldier]]" or "Chaos Soldier" (カオス・ソルジャー ''Kaosu Sorujā''), the original card it is based upon, and "Legendary Swordsman" ({{Ruby|伝|でん}}{{Ruby|説|せつ}}の{{Ruby|剣|けん}}{{Ruby|闘|とう}}{{Ruby|士|し}} ''Densetsu no Kentōshi''), an informal name used by [[Dark Yugi (manga)|Dark Yugi]] to refer to "Black Luster Soldier" in {{chapter|Yu-Gi-Oh!|117|ref}}; the informal name is used again in the title of {{chapter|Yu-Gi-Oh!|118|ref}}, where [[Dark Yugi (manga)|Dark Yugi]] [[Ritual Summon]]s "Black Luster Soldier" for the first time, during his [[Duel]] against [[Mai Kujaku (manga)|Mai Kujaku]].
  *** This monster's effect that [[activate]]s if it was Ritual Summoned using a [[Normal Monster]] is based on the Ritual Summon of "Black Luster Soldier" in that chapter of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, where Dark Yugi uses "[[Griffore (anime)|Griffore]]" and "[[Gaia The Fierce Knight (anime)|Gaia The Fierce Knight]]" as [[Tribute]]s.
  *** This monster's effect to [[shuffle]] all cards the opponent [[control]]s into the [[Deck]] when this attacking monster [[destroy]]s an opponent's monster by battle is a reference to the outcome of the Duel in that chapter of the manga and {{episode|Yu-Gi-Oh!|030|ref}}: after Dark Yugi's "Black Luster Soldier" destroyed "[[Harpie's Pet Dragon (anime)|Harpie's Pet Dragon]]", Mai [[surrender]]ed the Duel, "[[return]]ing" her "[[Harpie]]" monsters to her Deck because she did not want to see them harmed.
  * This is the first [[Ritual Monster]] to specifically list two [[Ritual Spell Card]]s in its [[card text]] ("[[Chaos Form]]" or "[[Super Soldier Ritual]]").
