title: Card Trivia:Soul of the Supreme King
wikitext: |-
  {{Navigation}}

  [[File:Z-ARC_Destroyed.png|thumb|right|250|The 4 "[[Supreme King Dragon]]" monsters split from "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]", in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * "[[Supreme King Dragon Clear Wing]]",  "[[Supreme King Dragon Dark Rebellion]]", "[[Supreme King Dragon Odd-Eyes]]", "[[Supreme King Dragon Starving Venom]]", and "[[Supreme King Z-ARC]]" appear in this card's artwork.
  ** This card's artwork and second effect are based on a scene from {{episode|ARC-V|140|ref}}, where the [[Four Dimensional Dragons]] (in their "[[Supreme King Dragon]]" corrupted forms) split from "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]" after [[Riley Akaba]] [[activate]]d the [[Continuous Spell Card]] "[[En Flowers]]" during her [[Duel]] against [[Z-ARC]].

