title: Card Trivia:Glass Slippers
wikitext: |-
  {{Navigation}}

  * This card is based on Cinderella's glass slippers from the fairy tale, ''[[wikipedia:Cinderella|Cinderella]]''.
  ** This card's ''[[OCG]]''/''[[TCG]]'' effect [[support]]ing a [[Fairy]] monster is based on "[[Prinzessin|Prinzessin's]]" Fairy [[Type]], who also known as "Cinderella" in the Japanese version.
  ** This card's effect making a non-Fairy monster lose 1000 [[ATK]] and prevent them from attacking reference how Cinderella loses one of her slippers while escaping the royal ball, where the prince later has the other women in the other women in the kingdom try on the slipper to see if it would fit, but was unsuccessful.
  ** This card's effect [[equip]]ping itself to "Prinzessin" after the equipped monster is destroyed and making it gain 1000 ATK reference how the prince successfully finds Cinderella after she fit her foot in the glass slipper and later marries her.
