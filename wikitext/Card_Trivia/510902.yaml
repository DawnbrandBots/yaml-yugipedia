title: Card Trivia:Elemental HERO Necroshade
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck: Jaden Yuki]]''.
  * This monster appears in the artworks of "[[Necro Illusion]]" and "[[Wake Up Your Elemental HERO]]".
  * The energy bolts that appears in the background of this card's artwork also appear in the background of the card "[[Get Your Game On! (card)|Get Your Game On!]]".
  * This monster has an "[[Evil HERO]]" [[counterpart]]: "[[Evil HERO Sinister Necrom]]".
  ** Both share the same [[Attribute]] ([[DARK]]), [[Level]] (5), and [[original ATK and DEF]] (1600/1800).
  ** Both share the word "Necro" in their names, which relates to their effects to Summon a "[[HERO]]" monster from their respective sub-archetypes while in the [[Graveyard]].
  * This monster is similar to "[[Necro Gardna]]":
  ** Both share the same Attribute (DARK) and [[Type]] ([[Warrior]]).
  ** Both share the word "Necro" in their names, which relates to their effects that [[activate]]s in the Graveyard.
  ** Both monsters are used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This monster has a [[Fusion Monster|Fusion]] with "[[Elemental HERO Wildheart]]", "[[Elemental HERO Necroid Shaman]]"; and a Fusion with "[[Elemental HERO Sparkman]]", "[[Elemental HERO Darkbright]]".
