title: Card Trivia:Primite Scream
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the transformation of "[[Primite Dragon Ether Beryl]]" into "[[Primite Dragon Nether Berzelius]]".
  ** This is indicated by the molten appearance of "Ether Beryl", including the development of molten glass-like horns that resemble the extra pair of horns featured on "Nether Berzelius".
