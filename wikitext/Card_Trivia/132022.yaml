title: Card Trivia:Alligator's Sword
wikitext: |-
  {{Navigation}}

  * This monster has an [[Card evolutions|upgraded]] version: "[[Cyber-Tech Alligator]]".
  ** This is supported by the fact that both monsters' Japanese names feature the word "Wyvern" and their English names feature the word "Alligator".
  * This is one of [[Joey Wheeler]]'s [[Normal Monster]]s introduced to the ''[[TCG]]'' to have its English [[flavor text]] written in his [[wikipedia:Brooklyn|Brooklyn]] accent.
  ** This monster, along with "[[Anthrosaurus]]", "[[Hero of the East]]", "[[Kageningen]]", "[[Little D]]", "[[Meotoko]]", "[[Skull Stalker]]", "[[Stone Armadiller]]", and "[[Wolf]]", were included ''[[Legendary Collection 4: Joey's World Mega Pack]]'' and written in this kind of English flavor text.
  ** All of these monsters are seen in Joey's very first [[Deck]], except for "Hero of the East" (which is only seen when Joey has a dream of himself with his inexperienced Deck) and "Little D" (which has not appeared in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime).
