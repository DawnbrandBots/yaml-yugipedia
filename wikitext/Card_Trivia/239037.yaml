title: Card Trivia:Moon Magician
wikitext: |-
  {{Navigation}}

  * This monster's design references the [[wikipedia:Moon rabbit|Moon rabbit]], a mythical figure in Eastern Asian and Indigenous American folklore based on the interpretations of the dark markings on the Moon resembling a rabbit.
  * This card's artwork is taken from {{chapter|ZEXAL|019|ref}}, specifically from the panel showing [[Moon Magician (manga)|this monster]] being Summoned, albeit with its left arm holding its staff raised upwards.
