title: Card Trivia:Tri-Edge Levia
wikitext: |-
  {{Navigation}}

  * This monster's design appears to be a combination of "[[Black Ray Lancer]]" and "[[Number 17: Leviathan Dragon]]", both of which were used by [[Reginald Kastle]] (and his [[Ryoga Kamishiro (manga)|manga counterpart]]) in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]].
  * The prefix "Tri" is the Latin word for the number "three", referencing its [[Rank]] (3) and its requirement of '''three''' [[Level 3|Level '''3''']] monsters as [[Xyz Material]]s.
  ** The word "Levia" is short for "leviathan", named after the eponymous [[wikipedia:Leviathan|mythical sea creature]], which also references its [[WATER]] [[Attribute]] and [[Sea Serpent]]-[[Type]].
  * This is the second card that was revealed exclusively in the ''[[Yu-Gi-Oh! D Team ZEXAL]]'' manga, the first being "[[Zubaba General]]" and the third being "[[CXyz Zubaba Saikyo General]]".
  * This card's artwork is taken from {{chapter|D Team ZEXAL|012|ref}}, specifically from the panel showing [[Tri-Edge Levia (D Team)|this monster]] being Summoned.
