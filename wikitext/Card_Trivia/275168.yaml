title: Card Trivia:Sacred Sword of Seven Stars
wikitext: |-
  {{Navigation}}

  * This sword appears in the artworks of "[[Seven Stars Slash - Army Annihilator Hagun]]" and "[[Treasure Dragon]]".
  * This card is based on the ''Shichiseiken'', a sword owned by [[wikipedia:Prince Shōtoku|Prince Shōtoku]], etched with the pattern of the [[wikipedia:Big Dipper|Big Dipper]] constellation, which appears on the engraving of this sword and in the background of this card's artwork.
  ** The Big Dipper constellation is known for its formation of seven stars. This is reflected in this card's effect [[support]]ing [[Level 7]] monsters (which are represented by seven [[Level]] stars).
  * This card has different Level-based counterparts:
  ** "[[Celestial Observatory]]" (for [[Level 6]] monsters)
  ** "[[Trade-In]]" (for [[Level 8]] monsters)
  ** "[[Kuji-Kiri Curse]]" (for [[Level 9]] monsters)
  ** "[[Tokusano Shinkyojin]]" (for [[Level 10]] monsters)
  * This card has a [[Rush Duel]] counterpart: "[[Ship of Seven Treasures]]"
