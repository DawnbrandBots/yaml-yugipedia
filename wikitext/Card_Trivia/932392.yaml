title: Card Trivia:Celeb Rose Witch
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's first artwork.
  ** "[[Celeb Rose Magician]]" appears in this card's second artwork.
  * This monster appears in the artworks of "[[Can You Celeb Blade]]", "[[Celeb Rose Luxury Magicians]]", and "[[Rose Chain Salvage]]", as well as in the second artworks of "Celeb Rose Magician" and "[[The Secret of Manifestation]]".
  * This monster is a [[Celeb Rose]] [[counterpart]] of "[[Sevens Road Witch]]".
  ** Both monsters share the same [[Level]] (6), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (1600/1000).
