title: Card Trivia:Deskbot Jet
wikitext: |-
  {{Navigation}}

  * The "[[Deskbot]]" monsters "[[Deskbot 001|001]]", "[[Deskbot 002|002]]", "[[Deskbot 003|003]]", "[[Deskbot 004|004]]", "[[Deskbot 005|005]]" and "[[Deskbot 006|006]]" appears in this card's artwork.
  ** "001" is inside the cockpit, "002" is operating a panel to the right of "005", "003" and "004" are on the lower platform while "005" and "006" are near the frontal exhausts.
  * Keeping with the "Deskbot" theme of office supplies, this monster appears to be a pencil box, fitting seeing how it seems to be a carrier for the "Deskbots".
  * This monster appears in the artwork of "[[Deskbot Base]]".
