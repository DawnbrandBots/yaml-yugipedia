title: Card Trivia:Invoked Elysium
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Elysium|Elysium]], a place in [[wikipedia:Greek mythology|Greek mythology]] and the conception of the [[wikipedia:afterlife|afterlife]] that developed over time and was maintained by some Greek religious and philosophical sects and cults. Initially separate from the realm of [[wikipedia:Hades|Hades]], admission was reserved for mortals related to the gods and other heroes.
