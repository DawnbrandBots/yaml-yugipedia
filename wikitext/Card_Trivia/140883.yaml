title: Card Trivia:Super Rush Recklessly
wikitext: |-
  {{Navigation}}

  * This card's artwork features the boar from "[[Rush Recklessly]]" rushing into "[[Raiza the Storm Monarch]]", pushing him off a cliff.
  ** This is ironic, given that Raiza's effect also involves shuffling a monster into the Deck.
  * Like "[[Dark Desertapir]]", this card was first released in the '' [[TCG]]'' and is based on an older card that did not support [[Beast]]-Type monsters.
