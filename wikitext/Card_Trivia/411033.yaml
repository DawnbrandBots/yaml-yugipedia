title: Card Trivia:Vector Pendulum, the Dracoverlord
wikitext: |-
  {{Navigation}}

  * This card's name and lore indicates that it's related to the "[[Dracoslayer]]" archetype.
  ** This card has the same [[Level]], [[ATK]], [[DEF]], and [[Type]] as "[[Luster Pendulum, the Dracoslayer]]".
  ** This monster is also associated with the "[[Amorphage]]" archetype, as the jewel on this monster's staff is seen on the bodies of the "Amorphage" monsters.
  * This monster has an enhanced form, "[[Lector Pendulum, the Dracoverlord]]".
  * This monster appears in the artworks of "[[Draco Face-Off]]" and "[[Draco Awakening]]".
  * In virology and molecular biology, a [[wikipedia:Viral vector|vector]] is a tool used to deliver genetic material into cells.
  * The Simplified Chinese name of this card contains the word 主载, a homophonous variation of the word 主宰 (pinyin: zhǔ zǎi, lit. "dominator"), substituting 宰 (lit. "govern") with 载 (lit. "load").
