title: Card Trivia:Artifact Sanctum
wikitext: |-
  {{Navigation}}

  * The artifacts seen on this card's artwork from left to right are "[[Artifact Achilleshield]]", "[[Artifact Labrys]]", "[[Artifact Beagalltach]]", "[[Artifact Moralltach]]", "[[Artifact Failnaught]]", "[[Artifact Caduceus]]" and "[[Artifact Aegis]]".
  * This artwork's theme and background strike a very strong resemblance to the [[W:c:typemoon:Reality Marble|Reality Marble]] "[[W:c:typemoon:Unlimited Blade Works|Unlimited Blade Works]]" from the ''[[wikipedia:Fate/stay night|Fate/stay night]]'' series.
