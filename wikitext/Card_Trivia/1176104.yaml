title: Card Trivia:Black Luster Soldier - Soldier of Light and Darkness
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mind Shuffle]]".
  ** This monster's sword appears in the artwork of "[[Ritual of Light and Darkness]]".
  * This monster is a [[retrained]] counterpart of "[[Black Luster Soldier]]".
  ** This monster's title is a reference to the [[Summon chant]] of "Black Luster Soldier" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which mentions the phrase "[[light]] and [[dark]]ness" (光と闇, ''Hikari to yami'').
  ** This monster's effects to [[banish]] an opponent's card they [[control]], and to make a second attack when it [[destroys]] an opponent's monster by battle are based on those of "[[Black Luster Soldier - Envoy of the Beginning]]", another retrained counterpart of "Black Luster Soldier".
  ** This monster's effect to gain 1500 [[ATK]] when it destroys an opponent's monster by battle is based on a similar effect of "[[Black Luster Soldier - Soldier of Chaos]]", another retrained counterpart of "Black Luster Soldier" whose other effects are also based on those of "Black Luster Soldier - Envoy of the Beginning".
