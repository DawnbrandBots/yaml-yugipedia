title: Card Trivia:Disciple of the Forbidden Spell
wikitext: |-
  {{Navigation}}

  * The forbidden Spell in question must be "[[Raigeki]]", since the opponent's monster would be immediately destroyed and "[[Flash of the Forbidden Spell]]" is considered to be the legal version of "Raigeki".
  * Based on the artwork and its Japanese name, "Disciple of the Forbidden Spell" might be the unnamed brother of "[[Getsu Fuhma]]", as referenced in the 1987 [[Konami]]'s [[wikipedia:Nintendo Entertainment System|Famicom]] game, ''[[wikipedia:Getsu Fūma Den|Getsu Fūma Den]]''. He is seen holding two of the three ancient swords handed down to him, while the other one is wielded by "Getsu Fuhma".
