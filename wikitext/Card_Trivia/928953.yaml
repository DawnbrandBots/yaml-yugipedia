title: Card Trivia:Heavy Interlock
wikitext: |-
  {{Navigation}}

  * "[[Borreload Riot Dragon]]" appears in this card's artwork.
  * This card has a [[Fusion Summon|Fusion]] [[counterpart]]: "[[Rapid Trigger]]".
  ** This is also supported by the fact that both [[Spell]]s use the word "trigger" in their Japanese card names.
  * This is the first card that can [[Ritual Summon]] a [[Ritual Monster]] by [[destroy]]ing monsters as the requirement, instead of [[Tribute|Tributing]] them.
