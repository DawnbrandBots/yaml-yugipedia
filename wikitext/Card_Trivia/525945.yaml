title: Card Trivia:Millennium-Eyes Restrict
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Legend Duelist 2]]''/''[[Legendary Duelists: Ancient Millennium]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Thousand-Eyes Restrict]]".
  * Multiple [[Millennium Eye]]s appear on this monster.
  ** This is a reference to [[Maximillion Pegasus]], the owner of the Millennium Eye in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], who also used "Thousand-Eyes Restrict".
