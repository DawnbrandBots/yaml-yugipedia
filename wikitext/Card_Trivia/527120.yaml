title: Card Trivia:Exchange of the Mirror World
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's artwork is based on a [[wikipedia:Rubin vase|Rubin vase]].
  * This card is a [[Pendulum Monster|Pendulum]] counterpart of "[[Exchange of the Spirit]]".
  ** This card's effect to shuffle all Pendulum Monsters from the [[Extra Deck]] into the [[Deck]] is similar to the effect of "Exchange of the Spirit" to swap all cards from the [[Graveyard]] with the cards in the Deck.
