title: Card Trivia:Lemuria, the Forgotten City
wikitext: |-
  {{Navigation}}

  * This city appears in the artwork of "[[Mermail King - Neptabyss]]".
  * This city is based on [[wikipedia:Lemuria (continent)|Lemuria]], a theoretical lost continent variously located in the Indian and Pacific Oceans.
  * According to the ''[[Gagaga Academy Tospedia card storylines#"The Mermails and Atlanteans" Edition|Gagaga Academy Tospedia]]'' and [[Master Guide 4 card storylines#File No. 01: The Great Battle Raging between Fire and Water in the South Seas|''Master Guide 4'' card storylines]], this city is the domain of the "[[Mermail]]" tribe.
