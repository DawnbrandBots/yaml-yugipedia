title: Card Trivia:Hyperstrike Dragon Dragiastar F
wikitext: |-
  {{Navigation}}

  * There are nine stars in the background of this card's art, and this monster has nine purple orbs on its body, including its four eyes, referencing this card's [[Level]].
  ** These features are shared with the other [[Strike Dragon]] monsters, "[[Multistrike Dragon Dragias]]", "[[Illusion Strike Dragon Miragias]]", and "[[Steel Strike Dragon Metagias]]", although each has only seven stars and orbs to match their Level of 7.
  * This is the first [[High Dragon]] [[Type]] monster.
  * This monster is used as the icon for the High Dragon Type in ''[[Yu-Gi-Oh! Duel Links]]''.
  * This monster has 2 [[counterpart]]s:
  ** An upgraded counterpart: "[[Hyperstrike Dragon Dragiastar IF]]".
  ** [[The]] Counterpart: "[[The Dragiastar]]".
