title: Card Trivia:Revendread Origin
wikitext: |-
  {{Navigation}}

  * The man in this card's artwork is transforming into "[[Revendread Slayer]]".
  ** The locket also appears on the neck of said monster.
  ** According to [[Master Duel card storylines]], the woman on the locket's image is the deceased wife of "Revendread Slayer" who was killed by the "Vendread" horde. Upon seeing the locket, the man, who was also transformed into a "Vendread", is consumed by the desire to avenge his wife, thus regaining his consciousness and became "Revendread Slayer".
  * This card's name is a reference to an "origin story", the tale of how a person becomes a superhero or supervillain.
  * This is the first [[Ritual Spell Card]] that does not Ritual Summon a specific named Ritual Monster to include the name of a specific Ritual Monster in its text.
  ** Therefore, it is the first [[Nonspecific Ritual Spell Card]] that can be searched by "[[Pre-Preparation of Rites]]".
