title: Card Trivia:Garunix Eternity, Hyang of the Fire Kings
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Onslaught of the Fire Kings Second Coming of the Eternal Flames' Ruler Pack]]''.
  * This monster appears in the artworks of "[[Fire King Sky Burn]]" and "[[Firestorms Over Atlantis]]".
  * This monster is named after a [[wikipedia:Hyang|Hyang]], a term used in various indigenous Indonesian religions (typically in Javanese and Balinese beliefs) referring to the avatar of the religion's supreme being. Depending on the religion, a Hyang can either be divine or ancestral.
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Sacred Fire King Garunix]]".
  ** This monster is also the "[[Fire King]]" [[counterpart]] of "[[Poseidra Abyss, the Atlantean Dragon Lord]]".
  * Along with yellow (the color usually associated with "Garunix"), this monster's body also contains flames with colors based on other "[[Fire King]]" monsters: green ("[[Fire King High Avatar Kirin|Kirin]]"), blue ("[[Fire King Avatar Barong|Barong]]"), purple ("[[Fire King Avatar Arvata|Arvata]]"), and pink ("[[Fire King Avatar Rangbali|Rangbali]]").
  ** Curiously, among the "Fire King" monsters released with or prior to this monster, the only one whose flame color is not present in this monster's body is "[[Fire King Avatar Yaksha]]" (colored red).
