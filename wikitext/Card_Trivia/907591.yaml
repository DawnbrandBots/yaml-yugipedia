title: Card Trivia:Galactica Jamaisvu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Galactica Cycle]]".
  * This card is named after [[wikipedia:Jamais vu|jamais vu]], the feeling of having never experienced something before despite already being familiar with it, the opposite of [[wikipedia:Déjà vu|déjà vu]].
