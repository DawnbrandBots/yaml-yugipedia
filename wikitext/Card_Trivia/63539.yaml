title: Card Trivia:Magician's Selection
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Dark Magician]]" appears in this card's artwork.
  * In the [[Yu-Gi-Oh! (manga)|manga]], [[Dark Yugi]] used "[[Magic Cylinder (manga)|Magic Cylinder]]" in place of this card, where it served the same purpose in redirecting attacks.
  * The circle in this card's background artwork is loosely based on "[[Dark Magical Circle]]", as the two share several symbols in common.
