title: Card Trivia:Reversal Quiz
wikitext: |-
  {{Navigation}}

  * The man reaching for the button in this card's artwork also appears in the artworks of "[[Final Question]]" and "[[Question]]".
  ** The hat he is wearing is likely based on the Ultra Hat (ウルトラハット), an accessory commonly worn by contestants in later quiz segments of the Japanese game show, ''[[wikipedia:ja:アメリカ横断ウルトラクイズ|Trans-America Ultra Quiz]]'' (アメリカ横断ウルトラクイズ).
  * This card's artwork was likely inspired by the Japanese game show, ''[[wikipedia:ja:アップダウンクイズ|Up-Down Quiz]]'' (アップダウンクイズ), as indicated by the colorful man's platform being underneath other opponents' platforms, with a score of 0.
  ** However, it is possible that the game show was only an indirect inspiration, since numerous parodies of its quiz format have appeared in Japanese culture.
  * This card was the first card that directly swapped players' [[LP]].
