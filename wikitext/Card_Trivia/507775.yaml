  * "[[Aitsu]]", "[[Doitsu]]", "[[Koitsu]]", and "[[Soitsu]]", united as "[[A-Team: Trap Disposal Unit]]", and a fossilized version of "[[Hyper Hammerhead]]" appear in this card's artwork.
