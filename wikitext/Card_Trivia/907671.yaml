title: Card Trivia:Bubbleburst Shock!
wikitext: |-
  {{Navigation}}

  * "[[Bubbly Elf]]", "[[Kanan the Sword Diva]]", and "[[LaMoon the Party Princess]]" appear in this card's artwork.
  * This card is based on the collapse of the [[wikipedia:Japanese asset price bubble|Japanese asset price bubble]], an economic bubble in Japan that burst in 1992 and caused the Japanese economy to stagnate.
  ** This card's Japanese name, "Bubblehman Shock!" (バブリーマン・ショック！''Baburīman Shokku!''), references the "[[wikipedia:Bankruptcy of Lehman Brothers|Lehman shock]]" (リーマン・ショック ''Rīman Shokku''), the bankruptcy of the [[wikipedia:Lehman Brothers|Lehman Brothers]] global financial services which caused a sudden, one-day drop in the [[wikipedia:Dow Jones Industrial Average|Dow Jones]] stock market.
