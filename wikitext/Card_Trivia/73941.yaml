title: Card Trivia:Ultra Evolution Pill
wikitext: |-
  {{Navigation}}

  * This card has an [[Card evolutions|upgraded]] form: "[[Big Evolution Pill]]".
  * This card has two [[counterpart]]s: "[[Double Evolution Pill]]" and "[[New Ultra Evolution]]".
  * This card's effect of [[Tributing]] a [[Reptile]] monster to [[Special Summon]] a [[Dinosaur]] monster from the player's [[hand]] is based on the theory that [[wikipedia:Dinosaur|dinosaurs]] evolved from reptiles, arising from the [https://en.wikipedia.org/wiki/Archosauromorpha archosaurimorphs]. The card's artwork depicts a crocodilian creature, with crocodiles believed to be the closest living reptile to ancestral dinosaurs.
  * In the English dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card is referred to as [[Ultra Evolution Pill (anime)|"Ultra Evolution"]]. At the time that this card appeared in the anime, FCC regulations prohibited the depiction of drugs; also, the pill that appears in this card's artwork was also digitally removed.
