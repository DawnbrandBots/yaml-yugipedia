title: Card Trivia:Tricorn the Cacophonous Concert
wikitext: |-
  {{Navigation}}

  * This monster seems to be the thematic antithesis of the "[[Melodious]]" [[archetype]].
  ** This monster follows a similar naming convention as the "Melodious" monsters.
  ** This monster's [[Attribute]]/[[Type]] are [[DARK]]/[[Fiend]], while the "Melodious" monsters' Attribute/Type are [[LIGHT]]/[[Fairy]].
  ** A "cacophony" is defined as a disharmonious combination of sounds, whereas a "melody" is defined as a harmonious combination of sounds.
  ** This card first released in the ''[[TCG]]'' in ''[[Phantom Nightmare]]'', shortly after the new "Melodious" monsters and [[support]] were released in the ''[[OCG]]'' in ''[[Legacy of Destruction]]''.
