title: Card Trivia:Elemental HERO Stratos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hero Pressure]]".
  * This monster's ''[[TCG]]'' name is derived from the [[wikipedia:Stratosphere|Stratosphere]], the second major layer of the [[wikipedia:Earth's atmosphere|Earth's atmosphere]], which also reflects its [[WIND]] [[Attribute]].
  ** Also, "stratos" (στρατός) is the Greek word for "army", referencing this monster's effect to [[support]] "[[HERO]]" monsters.
  * This monster's ''[[OCG]]''/''TCG'' bulleted effects are based on the two [[Spell Card]]s that support the "[[Elemental HERO]]" [[archetype]]: "[[E - Emergency Call]]" and "[[R - Righteous Justice]]".
  ** In the case of the former, this monster's ''TCG'' name has become a fanmade umbrella term for archetypal monsters who search other monsters of their archetype upon being Summoned.
  * This is the first "Elemental HERO" monster to be [[Limited]], and later, [[Forbidden]] (in the ''TCG'' only).
  * This is the first "Elemental HERO" monster to be released from the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga in America, and the second in Japan. 
  ** In Japan, the first "Elemental HERO" monster to be released from the manga was "[[Elemental HERO Ocean]]" in ''[[Weekly Jump]]'', followed by this monster in ''[[V-Jump]]''.
  * This card's French and Spanish names (and in some video games in the latter) are the translation of its Japanese name, "Elemental HERO Airman".
