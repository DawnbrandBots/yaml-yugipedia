title: Card Trivia:Sunavalon Dryas
wikitext: |-
  {{Navigation}}

  * "[[Sunseed Genius Loci]]" → "'''Sunavalon Dryas'''" → "[[Sunavalon Dryades]]" → "[[Sunavalon Dryanome]]" → "[[Sunavalon Dryatrentiay]]"
  * This card is named after [[wikipedia:Dryas (mythology)|Dryas]], the son of King Lycurgus of the Edoni in Thrace from [[wikipedia:Greek mythology|Greek mythology]], who was killed by Lycurgus when he went insane and mistook him for a trunk of ivy, a plant holy to the god Dionysus, whose cult Lycurgus was attempting to extirpate.
  * In the ''[[Yu-Gi-Oh! VRAINS]]'' anime, this was the first monster to not transform into energy beam when used as a [[Link Material]], instead using its root as such. It's also the first monster to be shown [[Card evolutions|evolving]] into the monster of higher [[Link Rating]].
