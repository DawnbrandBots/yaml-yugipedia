title: Card Trivia:Crystron Smiger
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Smoky quartz|smoky quartz]], a light to dark gray variation of quartz, sometimes with a brownish hue.
  ** This card's English name is a portmanteau of the words "smoky" and "tiger".
  * "[[Crystron Quandax]]" is the evolved version of this monster after merging with "[[Crystron Quan]]", as depicted by the artwork of "[[Crystron Entry]]".
  * While this monster's effect allows it to [[add]] any "[[Crystron]]" [[Spell]]/[[Trap Card]], there were no "Crystron" Spells at the time of its release. The first of its kind, "[[Crystron Inclusion]]", would only debut over 8 years later.
