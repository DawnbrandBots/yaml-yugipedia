title: Card Trivia:Summoned Skull
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Limited Edition 3: Yugi Pack]]''.
  * This monster appears in the artworks of "[[Archfiend's Revival]]", "[[Archfiend's Thunder Bolt]]", "[[Makourai, the Lightning Strike]]", and "[[Offering to the Archfiend]]".
  ** Either this monster or "[[Skull Archfiend of Lightning]]" appears in the artworks of "[[Level Tax]]", "[[Ring of Fiendish Power]]" and/or "[[Spell Summon Stopper]]".
  * This monster has multiple [[counterpart]]s:
  ** Two retrained counterparts: "[[Skull Archfiend of Lightning]]" and "[[Archfiend Commander]]"
  ** A "[[Chaos]]" counterpart: "[[Skull Archfiend of Chaos]]".
  ** A [[Toon monster|Toon]] counterpart: "[[Toon Summoned Skull]]"
  ** A "[[Red-Eyes]]" counterpart: "[[Red-Eyes Archfiend of Lightning]]"
  ** A [[Zombie counterpart]]: "[[Archfiend Zombie-Skull]]"
  ** A [[Shining Sarcophagus (series)|Shining Sarcophagus]] counterpart: "[[Archfiend's Advent]]"
  ** A [[Ritual Monster|Ritual]] counterpart: "[[Archfiend's Awakening]]"
  ** A [[Fusion Monster|Fusion]] counterpart: "[[Archfiend's Manifestation]]"
  ** A [[Synchro Monster|Synchro]] counterpart: "[[Archfiend's Call]]"
  ** A [[Xyz Monster|Xyz]] counterpart: "[[Archfiend's Ascent]]"
  ** Two ''[[Rush Duel]]'' counterparts: "[[Showdown Skull Archfiend]]" and "[[Skull Archfiend of Confusion]]"
  * This is the initial [[signature card]] of [[Yugi Mutou (manga)|Yugi Mutou]] before he received [[Sugoroku Mutou (manga)|his grandfather's]] [[Deck]] containing "[[Dark Magician (manga)|Dark Magician]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * This monster, "[[Giant Soldier of Stone (manga)|Giant Soldier of Stone]]", and "[[Hell-Bound (manga)|Shadow Specter]]" are among the first cards to appear in the ''Yu-Gi-Oh!'' manga.
  * As its [[flavor text]] implies, this monster has the second highest [[original ATK]] (2500) of all [[Fiend]] [[Normal Monsters]], the highest being "[[Zoa]]".
  * The [[Summoned Skull (Bandai)|Bandai]] version of this card has 1800 [[DEF]], and this monster is colored violet, while the Konami version of this card has 1200 DEF and this monster is typically colored white.
  ** When this card was released in the ''[[Anniversary Pack]]'', this monster was given a new design similar to its Bandai version; it is depicted with red skin, no eyes, larger un-horned wings, five-fingered claws (as opposed to its three-clawed hands featured in the anime and the artwork of "Skull Archfiend of Lightning"), bony feet, a tail, and a weapon not featured in previous artworks that may be a scythe or a redrawn "[[Axe of Despair]]".
  * According to ''Master Guide 1'', this card's third Japanese artwork, released at the Asia Championship 2001 in Japan, qualifies as the rarest card ever released, as well as the other alternate artwork [[Asia Championship 2001 prize cards|promotional cards]] released at that same conference.<ref>{{cite book |author=''[[V Jump]]'' editorial department |title=遊・戯・王　オフィシャルカードゲーム　デュエルモンスターズ　マスターガイド |trans-title=Yu-Gi-Oh! Official Card Game: Duel Monsters Master Guide |date=October 3, 2004 |publisher=[[Shueisha]] |language=Japanese |isbn=4-08-782089-0}}</ref>
  * In this card's [[:File:SummonedSkull-JP-Manga-DM-Demon.png|original manga artwork]], this monster is nearly identical to the design of the ''[[wikipedia:Magic: the Gathering|Magic: the Gathering]]'' card "[http://gatherer.wizards.com/Pages/Card/Details.aspx?printed=true&multiverseid=70 Lord of the Pit]". 
  ** Both are extremely rare and powerful demonic monsters, and this monster's [[Level]] in the manga (7) is similar to how the Mana Value of "Lord of the Pit" (7).
  ** This monster's Japanese name, "Summoned Demon", is similar to the printed type line of "Summon Demon" on "Lord of the Pit". Given the strong similarities between ''Magic: the Gathering'' and the early form of ''[[Duel Monsters]]'' (then called ''Magic and Wizards''), this was likely intentional on [[Kazuki Takahashi]]'s part.
  * This monster's pose in its first ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from  {{chapter|Yu-Gi-Oh!|068|ref}} showing [[Summoned Skull (manga)|this monster]] being Summoned.
  ** This monster's pose in its second ''OCG'' artwork and its fifth ''OCG'' [[extended art]]work is taken from a panel from {{chapter|Yu-Gi-Oh!|115|ref}} showing this monster being Summoned, albeit with the second ''OCG'' artwork flipped horizontally.
  ** This monster's pose in its Bandai artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|096|ref}} showing this monster attacking. This pose would later serve as the basis for the design of "Skull Archfiend of Lightning". 
  * In the Brazilian Portuguese dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card has been called "Rei Caveira", meaning "Skull King".

