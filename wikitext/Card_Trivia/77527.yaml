title: Card Trivia:Doom Dozer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Buster Trap]]".
  * This monster has a weaker version: "[[Aztekipede, the Worm Warrior]]".
  * This monster's design features an Aztec-style pattern design on its back with protruding pointed duds, similar to those of "[[Anteatereatingant]]", "Aztekipede, the Worm Warrior", "[[Chainsaw Insect]]", and "[[Saber Beetle]]".
