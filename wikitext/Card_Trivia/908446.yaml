title: Card Trivia:Ocean Dragon Lord - Kairyu-Shin
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[Effect Monster|Effect]] counterpart of "[[Kairyu-Shin]]".
  ** This monster has 200 more [[ATK]] and [[DEF]] than "Kairyu-Shin". This is a reference to the effect of "[[Umi]]" (which increases [[Sea Serpent]] monsters' ATK/DEF by that amount), which is also a common trend for the retrained counterparts of [[Mako Tsunami]]'s monsters in ''[[Duelist Pack: Duelists of the Abyss]]''/''[[Legendary Duelists: Duels From the Deep]]''.
  ** This monster's effect to allow the control of only one non-[[WATER]] monster on each player's [[field]] references "Kairyu-Shin's" appearance during [[Dark Yugi and Ryota Kajiki's Duel (manga)|Dark Yugi (Yami Yugi) and Ryota Kaiki's (Mako Tsunami's) Duel]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]]. Due to the effect of "[[Full Moon]]", the attack of "[[Leviathan (manga)|Leviathan]]" ("[[Kairyu-Shin (anime)|Kairyu-Shin]]" in the anime) flooded [[Yami Yugi]]'s field until only one [[Monster Zone]] remained for land-based monsters to stand on.
  * This monster's Japanese name is the kanji from the Japanese name of "[[Kairyu-Shin]]" (海竜神) with its natural reading, followed by the furigana from the Japanese name of "Kairyu-Shin" (リバイアサン).
  ** The kanji portion of this monster's name is the same title as "[[Ocean Dragon Lord - Neo-Daedalus]]".
