title: Card Trivia:Slifer the Sky Dragon
wikitext: |-
  {{Navigation|other=[[Slifer the Sky Dragon (original)|Original]] - [[Slifer the Sky Dragon (DDM)|Dungeon Dice Monsters]]}}

  * This is the [[cover card]] of ''[[Quarter Century Anniversary Selection]]'', and is also one of the cover cards of ''[[2016 Mega-Tins]]'', ''[[Battle Pack 2: War of the Giants]]'', ''[[Millennium Box Gold Edition]]'', ''[[Speed Duel: Battle City Box]]'', ''[[Legendary Collection: 25th Anniversary Edition]]'', and ''[[Speed Duel: Streets of Battle City]]''.
  * This monster appears in the artworks of "[[Quiz Panel - Slifer 10]]", "[[Quiz Panel - Slifer 20]]", "[[Quiz Panel - Slifer 30]]", "[[Thunderforce Attack]]", "[[The Revived Sky God]]", "[[Ultimate Divine-Beast]]", and the second artwork of "[[Raigeki]]".
  ** An engraving of this monster appears in the artworks of "[[Gravekeeper's Inscription]]" and "[[Gravekeeper's Oracle]]".
  * This monster's Japanese name, "The Sky Dragon of Osiris" (オシリスの{{Ruby|天|てん}}{{Ruby|空|くう}}{{Ruby|竜|りゅう}} ''Oshirisu no Tenkūryū''), is derived from [[wikipedia:Osiris|Osiris]], the god of life, death, and fertility in [[wikipedia:Ancient Egyptian religion|ancient Egyptian religion]].
  * This monster's ''[[TCG]]'' name, "Slifer the Sky Dragon", is derived from [[wikipedia:Roger Slifer|Roger Slifer]], an employee of [[4Kids Entertainment]]. The name was chosen by 4Kids employee Sam Murakami without consulting with Slifer himself.<ref>{{cite web |url=https://alonefancryinginthewilderness.blogspot.com/2012/02/meet-roger-slifer.html |title=Meet Roger Slifer |first=Mark |last=Morgan |date=February 15, 2012 |publisher=A Lone Fan Crying In The Wilderness |archive-url=https://web.archive.org/web/20141225010629/http://alonefancryinginthewilderness.blogspot.com/2012/02/meet-roger-slifer.html |archive-date=December 25, 2014 |url-status=live}}</ref>
  ** This is the only [[Egyptian God]] to have its name changed in the ''TCG''.
  * This monster has a [[Wicked God]] counterpart: "[[The Wicked Eraser]]".
  * This monster has a [[Sacred Beast]] counterpart: "[[Uria, Lord of Searing Flames]]".
  * This card's [[Illegal]] version is the only card to have a red frame.
  ** It is also the only [[Monster Card]] to have X000 [[ATK]] and [[DEF]].
  * In the Japanese version of the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], this card's original name was written in English, while still having their Japanese names.
  ** In the original Japanese version of the anime and manga, the word "Defense" was also misspelled as "Deffence".
  * This monster and [[Dark Yugi (manga)|Dark Yugi]] appear in page 12 of chapter 104 of the ''[[wikipedia:Bobobo-bo Bo-bobo|Bobobo-bo Bo-bobo]]'' manga, by [[wikipedia:Yoshio Sawai|Yoshio Sawai]].
  ** In the corresponding episode of the ''Bobobo-bo Bo-bobo'' anime, it used a different gag, as [[Toei Animation]], who produced the ''Bobobo-bo Bo-bobo'' anime, no longer had the rights to ''[[Yu-Gi-Oh!]]''.
  * In the ''Yu-Gi-Oh!'' manga, this monster was also known as "The Dragon King of the Sky" ({{Ruby|天|てん}}{{Ruby|空|くう}}の{{Ruby|竜|りゅう}}{{Ruby|王|おう}} ''Tenkū no Ryūō'').
  * This is the only Egyptian God not to have a visible difference in its appearance, comparing the Memory World and present-day events in the ''Yu-Gi-Oh!'' manga and anime.
  ** It is also the only Egyptian God not to have a different card form appearance in both Japanese and dubbed versions of the anime, in terms of text, icons and statuses, unlike "Obelisk" or "Ra".
  * This monster shares similarities with "[[Arcana Triumph Joker]]".
  ** Both feature a red color scheme and share the same [[Level]] (10).
  ** Both share close synergy with the [[Three Musketeers of Face Cards]].
  ** Both feature an effect that allows them to gain [[ATK]] equal to the number of cards in the [[hand]] and can [[destroy]] cards on the [[field]].
  * The background of this card's artwork was used in the ''[[Yu-Gi-Oh! Forbidden Memories]]'' video game as one of the [[Forbidden Ruins]]' wall designs.
  ** The international version of ''Forbidden Memories'' replaces the hexagrams in the background with hexagons; the ''TCG'' release does not alter this detail.
  * The card's Illegal and first ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|172|ref}}, specifically from the panel showing [[Slifer the Sky Dragon (manga)|this monster]] being Summoned.
  ** This card's second alternative artwork is based on this monster's pose in a flashback in the ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'' movie.

