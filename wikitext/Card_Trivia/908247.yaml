title: Card Trivia:Thunderbeetle Snare
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Thunderbeetle Boost]]", "[[Thunderbeetle Gift]]", and "[[Thunderbeetle Storm]]".
  * This monster's name is based on a [[wikipedia:Snare drum|snare drum]], a small drum that is commonly beat with drumsticks, which appear on the back of this monster.
