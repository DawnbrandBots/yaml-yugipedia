title: Card Trivia:Behemoth the King of All Animals
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cross Counter]]", "[[Duck Dummy]]", "[[Night Before the Big March]]", "[[Bunch of Beast Bodies]]", "[[Lucky Punch]]", "[[Setuppercut]]", "[[Super Rush Headlong]]", "[[The Big Cattle Drive]]", "[[The Big March of Animals]]", "[[Threatening Roar]]", and "[[Underdog]]".
  ** Despite its title, many of these card artworks depict this monster in humiliating positions, being either scared or defeated by monsters that have a lower [[ATK]].
  * "[[Mad Dog of Darkness]]" appears in this card's artwork.
  * This monster has a [[retrained]] counterpart: "[[Behemoth the King of a Hundred Battles]]".
