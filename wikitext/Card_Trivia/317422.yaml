title: 'Card Trivia:Number 1: Infection Buzzking'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * This monster's Japanese name, "Infection Baal Zebul" is based on the original name for [[wikipedia:Beelzebub|Beelzebub]], the patron deity of the [[wikipedia:Philistines|Philistine]] city of [[wikipedia:Ekron|Ekron]] who was later adopted into [[wikipedia:Christian theology|Christian theology]] as a major demon.
  ** This monster's appearance references how Beelzebub is also commonly known as the "Lord of the Flies" in the ''[[wikipedia:Dictionnaire Infernal|Dictionnaire Infernal]]''.
  * This is the first and final [[Barian Number]] to appear and be used in ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This is also the last "[[Number]]" monster from the ''Yu-Gi-Oh! ZEXAL'' anime to be released in the ''[[OCG]]''/''[[TCG]]''.
  * Unlike the other [[Barian Number]]s given to [[Mr. Heartland]] and his [[Fearsome Four of the Dark Dueling World|associates]], this monster's [[Rank]] does not match its "[[Number]]"; however, this monster was [[Xyz Summon]]ed with three copies of "[[Infection Fly]]", a [[Level 1]] monster.
  * This monster's ''OCG''/''TCG'' effect to inflict [[Effect damage|damage]] to the opponent equal to half the [[ATK]] of a [[face-up]] [[destroyed]] monster is based on a scene in {{episode|ZEXAL|122|ref}} where [[Mr. Heartland]] activates [[Number 1: Infection Buzz King (anime)|this monster's]] effect to destroy [[Kite Tenjo]]'s "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]" and inflict its ATK (which was 4500 at the time due to its own effect) as damage to Kite, but Kite activates "[[Prevent and Draw]]" to halve the effect damage he takes.
