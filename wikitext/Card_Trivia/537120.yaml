title: Card Trivia:Burning Algae
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Watch Cat]]" and in the Japanese artwork of "[[Watch Dog]]".
  * Despite its name, this monster resembles a tree rather than algae.
  * This monster shares similarities with "[[Skull-Mark Ladybug]]":
  ** Both monsters share the same [[original ATK and DEF]] (500/1500).
  ** Both monsters feature an effect increases a player's [[Life Point]]s by 1000.
  ** Both monsters debuted in the ''[[TCG]]'' in the same [[Core Booster]] pack, ''[[Invasion of Chaos]]''.
  * This monster has a retrained [[counterpart]]: "[[Cooling Embers]]".
  ** Both "Burning Algae" and "Cooling Embers" have Japanese names with the same starting and ending syllables (''mo'' for "Burning Algae").
