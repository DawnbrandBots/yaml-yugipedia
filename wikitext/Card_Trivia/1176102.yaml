title: Card Trivia:Black Chaos the Dark Chaos Magician
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Chaos Origins]]''.
  * This monster appears in the artworks of "[[Mind Shuffle]]" and "[[Mystic Box of Chaos]]".
  ** This monster's staff appears in the artwork of "[[Ritual of Light and Darkness]]".
  ** The designs of the four hats in the artwork of "[[Chaos Hats]]" are based on this monster's design.
  * This monster is a [[retrained]] counterpart of "[[Magician of Black Chaos]]".
  ** This monster's title is a reference to the [[Summon chant]]s of "Magician of Black Chaos" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], which mentions the phrase "[[spellcaster]] of pitch-black disorder" (黒き混沌の魔術師  ''Kuroki konton no majutsushi'').
  ** This monster's effect to [[add]] a [[Spell Card]] from the player's [[Graveyard]] to the [[hand]] when it is [[Special Summon]]ed is based on that of "[[Dark Magician of Chaos]]", another retrained counterpart of "Magician of Black Chaos".
  ** This monster's effect to [[banish]] an opponent's card face-down is based on the effect of "[[Chaos Scepter Blast]]", which depicts "Magician of Black Chaos" using its [[signature move]].
