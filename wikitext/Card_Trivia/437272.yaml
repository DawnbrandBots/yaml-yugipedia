title: Card Trivia:Wisdom-Eye Magician
wikitext: |-
  {{Navigation}}

  * The object chained to the end of this monster's flail is a [[wikipedia:Prayer wheel|prayer wheel]], a device upon which [[wikipedia:Mantra|mantras]] are inscribed, used for spreading spiritual blessings and well-being. According to the [[wikipedia:Tibetan Buddhism|Tibetan Buddhist]] tradition regarding prayer wheels, spinning such a wheel will have much the same meritorious effect as orally reciting the prayers written upon it.
  ** This monster's paired counterpart, "[[Dharma-Eye Magician]]", also wields a giant prayer wheel as a weapon.
