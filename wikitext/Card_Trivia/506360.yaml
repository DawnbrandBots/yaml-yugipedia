title: Card Trivia:The Legendary Fisherman
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Speed Duel: Streets of Battle City]]''.
  * This monster appears in the artwork of "[[Sea Stealth Attack]]" and "[[Sharkify]]".
  * This monster has two [[Card evolutions|upgraded]] forms: "[[The Legendary Fisherman II]]" and "[[The Legendary Fisherman III]]".
  * This monster has a [[retrained]] counterpart: "[[Fisherman, Legend of the Sea]]".
  * This is the [[signature card]] of [[Ryota Kajiki (manga)|Ryota Kajiki]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ([[Mako Tsunami]] in the [[Yu-Gi-Oh! (anime)|anime]]).
  ** In the ''Yu-Gi-Oh!'' manga and anime, this monster was supposedly the embodiment of [[Kajiki's father (manga)|Ryota Kajiki's father]], indicating it looks similar to him.
  * This monster's effect to prevent it from being affected by [[Spell Card]]s and being [[target]]ed by attacks while "[[Umi]]" is on the [[field]] is likely a reference to Ryota's strategy of having his monsters hide underwater in the [[Ocean]].
