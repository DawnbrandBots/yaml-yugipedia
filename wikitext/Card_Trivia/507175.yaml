title: Card Trivia:Mask of Shine & Dark
wikitext: |-
  {{Navigation||mode=otherGame|other=}}

  * In the video game ''[[Yu-Gi-Oh! The Sacred Cards]]'', this card's [[Attribute]] is [[DIVINE]], which is neither superior nor inferior to other Attributes.
  * This card's name is similar to the names of [[Lumis]] ([[Mask of Light (manga)|Mask of Light]]) and [[Umbra]] ([[Mask of Darkness (manga)|Mask of Darkness]]). While it may seem to be inspired by them, it actually debuted before them.
  ** In ''[[Yu-Gi-Oh! Reshef of Destruction]]'', Lumis and Umbra use this monster.
