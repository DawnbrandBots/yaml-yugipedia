title: Card Trivia:Brotherhood of the Fire Fist - Kirin
wikitext: |-
  {{Navigation}}

  * In the OCG, this card is named after ''[[wikipedia:Lu Junyi|Lu Junyi]]'' (read in Japanese as Ro Shingi) and "qilin" (kirin).
  ** ''Lu Junyi'' ranks 2nd of the 36 Heavenly Spirits of the 108 [[wikipedia:Water Margin|Liangshan heroes]] and is nicknamed "Jade Unicorn" ("unicorn" can refer to the "qilin".)
  * This monster is accompanied by a [[wikipedia:Qilin|Qilin]], which is said to appear with the imminent arrival or passing of a wise sage or an illustrious ruler.
  ** Furthermore, Qilins were said to have what looked like flames all over its body, which makes sense since this monster - and the [[Fire Fist]] archetype as a whole - are [[FIRE]] attribute.
  * This monster appears in the artwork of "[[Fire Formation - Domei]]".
