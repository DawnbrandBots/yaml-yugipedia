title: Card Trivia:Darkness Bramble
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Bramble|bramble]], a prickled shrub known for growing aggregate fruit, including blackberries, raspberries, and dewberries.
  ** Fittingly, this monster's cluster of eyeballs resemble the [[wikipedia:Drupe|drupelets]] that form the shapes of the above-mentioned fruit grown on a bramble shrub.
  * This monster is likely the "grown" form of "[[Darkness Seed]]", which was used to [[Tribute Summon]] this monster in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Both share similar effects preventing it from being [[destroyed by battle]] and can increase the player's [[Life Point]]s to 4000.
  * This monster seemingly evolves into "[[Darkness Neosphere]]"
  ** Both share anime effects that allow their owner to look at their [[Set]] cards, ignoring the effect of "[[Darkness]]", and to increase their Life Points to 4000 during the End Phase.
  ** "Darkness Neosphere's"  ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] is based on how was it Special Summoned via the effect of "[[Darkness Raincrow]]" by [[send]]ing it from the [[hand]] and this monster from the [[field]] to the [[Graveyard]] in {{episode|GX|178|ref}}.
  *** Despite this, "Darkness Bramble" is a [[Plant]] monster rather than a [[Fiend]], making "Darkness Neosphere's" Summon condition inaccurate to how it was used in the anime in relation to this monster.
