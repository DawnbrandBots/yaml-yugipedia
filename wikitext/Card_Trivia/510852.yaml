title: Card Trivia:Cyber Angel Benten
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Incarnated Machine Angel]]".
  * This monster is based on [[wikipedia:Benzaiten|Benten]], one of the [[wikipedia:Seven Lucky Gods|Seven Lucky Gods]] in Japanese mythology, who is known as the goddess of arts and wisdom.
  * This is the Ritual [[signature card]] of [[Alexis Rhodes]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * The Spanish printed lore of this card does not follow the ''[[TCG]]'' branch's translation stylizing, as the word "''monster''" in "''[[LIGHT]] [[Fairy]]-[[Type]] monster''" has an M capital letter.
