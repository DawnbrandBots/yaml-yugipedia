title: Card Trivia:Flower Cardian Zebra Grass
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Flower Gathering]]", "[[Fraud Check]]", "[[Fraud Freeze]]", "[[Recardination]]", and "[[Super All In!]]".
  * The head of "[[Naturia Cosmobeet]]" (albeit with a different body texture) appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Zebra Grass" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (8) references how the "Zebra Grass" suit falls under the month of August, the eighth month of the year.
  ** This monster's [[original ATK and DEF]] (100/100) references how the "Zebra Grass" card is a ''kasu'' card, which is worth one point.
