title: Card Trivia:Super Conductor Tyranno
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Dinosaur's Rage]]''.
  * This monster has a [[retrained]] [[counterpart]], combined with "[[Ultimate Tyranno]]": "[[Ultimate Conductor Tyranno]]".
  * This is one of the few [[legal]] monsters to completely break the unwritten [[Conventions of 3000 ATK and DEF|convention of 3000 ATK]]: this card has over 3000 [[ATK]], can be [[Normal Summon]]ed without any restrictions, and has no negative [[effect]]s.
