title: Card Trivia:Paces, Light of the Ghoti
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Psiics, Moonlight of the Ghoti]]".
  * This card's name is an anagram of "Pesca", the Portuguese word for "[[Wikipedia:Fishing|fishing]]", as well as "[[Wikipedia:Outer space|space]]", which reference the design of the "[[Ghoti]]" [[archetype]].
  * This monster’s design is based on the [[Wikipedia:Grimpoteuthis|dumbo octopus]].
