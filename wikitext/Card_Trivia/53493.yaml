title: Card Trivia:Reinforcements
wikitext: |-
  {{Navigation}}

  * This card's artwork, Japanese name and theme are reminisced in those of "[[Reinforcement of the Army]]".
  ** This card's ''[[TCG]]'' name is "Reinforcements" while its Japanese name is "Reinforcement of the Army; the ''TCG'' card "Reinforcement of the Army" features the Japanese name of "Reinforcement".
  * This card has an [[DEF]]-increasing [[counterpart]], "[[Castle Walls]]", and a DEF-decreasing counterpart, "[[Snake Fang]]".
  ** This card also has a stronger [[ATK]]-increasing counterpart, "[[Inspiration]]" and a weaker ATK-increasing counterpart, "[[Shield Spear]]".
