title: Card Trivia:Lunalight Leo Dancer
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded form of "[[Lunalight Panther Dancer]]".
  ** This monster also has an upgraded form: "[[Lunalight Liger Dancer]]".
  * This is the only Fusion Monster that requires three [[Fusion Summon]]s for it to be Fusion Summoned traditionally; this monster must be Fusion Summoned using "Lunalight Panther Dancer", which must be Fusion Summoned using "[[Lunalight Cat Dancer]]", which must be Fusion Summoned using two "Lunalight" monsters.
  ** However, "[[Lunalight Kaleido Chick]]" can [[send]] "Panther Dancer" to the [[Graveyard]] to be used as [[Fusion Material]] via "[[Lunalight Wolf]]'s" effect alongside two "Lunalight" monsters, thereby circumventing the above requirement.
