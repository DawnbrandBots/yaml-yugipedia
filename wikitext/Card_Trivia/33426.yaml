title: Card Trivia:Batteryman AA
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Recycling Batteries]]", "[[Battery Charger]]", "[[Super-Electromagnetic Voltech Dragon]]", "[[Electromagnetic Shield]]", "[[Universal Adapter]]" and "[[Broken Line]]".
  * The number shown on the chest of the first 3 "[[Batteryman|Batterymen]]" corresponds with their Level (in this case, Level 3), which also corresponds to the name for the battery type in Japanese (in this case, 単3形).
