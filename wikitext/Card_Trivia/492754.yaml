title: Card Trivia:Delta The Magnet Warrior
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Delta|delta]] (δ), the fourth letter of the [[wikipedia:Greek alphabet|Greek alphabet]].
  * This monster and "[[Epsilon The Magnet Warrior]]" are currently the only "[[Magnet Warrior]]" monsters to not have an "Electromagnet Warrior" [[counterpart]].
