title: Card Trivia:Ghostrick Mummy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Festival]]", "[[Ghostrick Museum]]", "[[Ghostrick Parade]]", "[[Ghostrick Renovation]]", and "[[Ghostrick Shot]]".
  * This monster is based on a [[wikipedia:Mummy|mummy]], a reanimated corpse wrapped up in bandages who rise from their coffins if their rest is disturbed.
