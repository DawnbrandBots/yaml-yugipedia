title: Card Trivia:Cookpal Cluckwheat
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artworks of "[[Canning Cuisine]]" and "[[Food Cemetery]]".
  * This monster's Japanese name, "Chickwheat" (ヒヨコムギ ''Hiyokomugi'') is a portmanteau of the Japanese words for "chick" (雛 ''hiyoko'') and "wheat" (小麦 ''komugi'').
  ** This monster's English name is a portmanteau of the words "cluck" and "[[wikipedia:Buckwheat|buckwheat]]".
