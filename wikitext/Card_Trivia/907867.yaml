title: Card Trivia:Yggdrago the Sky Emperor
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Nail - Maximum Haven]]'', as well as one of the cover cards of ''[[Maximum Ultra Enhancement Pack]]''.
  * This monster appears in the artworks of "[[Mighty Gaze of the Sky Emperor]]" and "[[Transmigration of Curiosity]]" in [[Maximum Mode]] (together with "[[Yggdrago the Sky Emperor (L)|Yggdrago the Sky Emperor [L]]]" and "[[Yggdrago the Sky Emperor (R)|Yggdrago the Sky Emperor [R]]]").
  * Along with "Yggdrago [L]" and "Yggdrago [R]", this monster is based on [[wikipedia:Yggdrasil|Yggdrasil]], the immense tree that connects the [[wikipedia:Norse cosmology|Nine Worlds]] in [[wikipedia:Norse mythology|Norse mythology]].
  * This is the [[signature card]] of [[Nail Saionji]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
  * This is the first [[Level 10 Monster Cards|Level 10]] monster in ''[[Yu-Gi-Oh! Rush Duel]]''.
  * Along with "Yggdrago [L]" and "Yggdrago [R]", this is the first [[Maximum Monster]] to be [[Maximum Summon]]ed in the ''Yu-Gi-Oh! SEVENS'' anime.
  ** This is also one of the first Maximum Monsters to be printed in ''Rush Duel''.
  * This monster has 2 non-Maximum [[counterpart]]s: "[[Deep Space Yggdrago]]" and "[[Space Yggdrago]]".
