title: Card Trivia:Sparkle the Super Assistant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chemicalize Bloom]]".
  * This monster's Japanese name, "Biri", is based on the Japanese onomatopoeia for crackling electricity.
  * This monster has an [[Counterpart|upgraded]] form: "[[Sparkle the Hyper Assistant]]".
