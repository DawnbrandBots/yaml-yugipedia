title: Card Trivia:Darklord Morningstar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Darklord Rebellion]]" and "[[Darklord Uprising]]".
  ** The artwork of "Darklord Rebellion" depicts this monster before he became a "[[Darklord]]", due to the angelic wings.
  * This monster is based on [[wikipedia:Lucifer|Lucifer]], a fallen angel who is often interpreted as the Devil and is often associated with the [[wikipedia:Seven deadly sins|deadly sin]] of [[Wikipedia:Pride|pride]].
  ** This monster's English name is based on the Hebrew meaning of Lucifer's name, which means "Morning Star" or "Bringer of Dawn".
  ** This monster's effect to [[Special Summon]] other "[[Darklord]]" monsters is derived from Lucifer's role in being the first to fall from grace, with other angels following him down the same path as he leads the rebellion in Heaven.
  * This monster has 2 [[Fusion Monster|Fusion]] upgraded forms: "[[The First Darklord]]" and "[[Darklord Eveningstar]]".
  * This monster, "[[Subterror Behemoth Speleogeist]]" and "[[Flower Cardian Willow]]" are currently the only [[Level 11]] [[Normal Summon Monster]]s.
