  * This monster is named after ''[[wikipedia:Tutankham|Tutankham]]'', an arcade game by [[Konami]].
  ** Both this monster and the game reference [[wikipedia:Tutankhamun|Tutankhamun]], a Pharaoh from the Eighteenth Dynasty of Egypt.
