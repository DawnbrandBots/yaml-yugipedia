title: Card Trivia:Card of Last Will
wikitext: |-
  {{Navigation}}

  * The cards "[[Bowganian]]", "[[Gil Garth]]", "[[Lava Golem]]", "[[Magical Stone Excavation]]", and "[[Metal Reflect Slime]]" appear in this card's artwork.
  ** These cards all belong to [[Yami Marik]], the only user of this card in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]. There are five cards, to represent the maximum number of cards that can be drawn by this card's effect.
  * This is the first [[Trap Card]] to be [[Illegal]].
  * Despite this card's ''[[TCG]]'' name and drawing effect, this is not a "[[Treasure Card]]".
  * The official Card Database mistakenly displays this card's ''[[OCG]]'' artwork even on the English version of the database, despite the fact that this card was released in the ''TCG'' first (thus providing viewers with the ''OCG'' artwork of this card before its ''OCG'' release was revealed).<ref>{{cite web | url = http://www.db.yugioh-card.com/yugiohdb/card_search.action?ope=2&cid=5297 | title = <nowiki>Card of Last Will | Card Details | Yu-Gi-Oh! TRADING CARD GAME - CARD DATABASE</nowiki> | publisher = Konami | accessdate = January 26, 2017}}</ref>
  ** For several months after this card was released, the official Card Database did not mention that this card was illegal, unlike all other illegal cards in the database.
  * This is the first Illegal ''TCG'' card to be publicly released after the original [[Egyptian God]]s.

