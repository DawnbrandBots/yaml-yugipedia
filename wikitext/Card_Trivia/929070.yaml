  * This monster appears in the artwork of "[[Ruler's Platoon of the Dark Forest - Z]]".
  * The kanji for "Takegumi" (жӯҰзө„) is a pun on the kanji for "bamboo" (з«№ ''take''). This monster is depicted standing in a bamboo forest, holding a ''[[wikipedia:Shinai|shinai]]'' (з«№еҲҖ), a Japanese bamboo sword.
  * This card's name, along with the names of "[[Matsugumi the Ruler's Squad]]" and "[[Umegumi the Ruler's Squad]]", references [[wikipedia:Three Friends of Winter|Three Friends of Winter]], an art motif that comprises the pine (жқҫ ''matsu''), bamboo (з«№ ''take''), and plum (жў… ''ume'').
