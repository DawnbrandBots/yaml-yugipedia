title: Card Trivia:Dyna Tank
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Animation Chronicle 2022]]''.
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Dyna Base]]" and "[[Ultimate Tyranno]]".
  ** This monster has the same [[original DEF]] (2100) as "Dyna Base".
  * This monster's name and appearance are likely based on [https://ultra.fandom.com/wiki/Dinosaur_Tank Dinosaur Tank], a ''kaiju'' appearing in the 1967 ''[[wikipedia:Tokusatsu|tokusatsu]]'' series, ''[[wikipedia:Ultraseven|Ultraseven]]'', who is also nicknamed "Dino-Tank". The ''kaiju'' is depicted as a giant carnivorous dinosaur-like creature merged with a tank to serve as its legs, which allows it move.
