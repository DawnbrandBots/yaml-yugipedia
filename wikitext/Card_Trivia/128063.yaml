title: Card Trivia:Z-ONE
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to [[Z-one]], the main antagonist of the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * In the anime, this is the only non-[[Field Spell Card]] that could be placed in the [[Field Zone]].
  * In {{episode|Yu-Gi-Oh! 5D's|093|ref}}, this card was scanned into a device similar to that of a [[Duel Terminal]].
