title: Card Trivia:Lady Debug
wikitext: |-
  {{Navigation}}

  * This card's name is a combination of "[[wikipedia:Coccinellidae|ladybug]]" (as suggested by its artwork) and "[[wikipedia:Debugger|debugger]]", a computer program used to test and debug other programs.
  ** Fittingly, this monster visually resembles "[[Cross Debug]]" whose name is also based on a "debugger" (as indicated by its Japanese name).
