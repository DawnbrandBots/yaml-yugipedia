  [[File:Illusionist Faceless Magician.png|thumb|250px|"[[Illusionist Faceless Mage (manga)|Illusionist Faceless Mage]]" combined with "[[Eye of Deception]]".]]

  * "[[Eye of Illusion]]" appears in this card's artwork.
  * This monster is a [[counterpart|retrain]]ed version of "[[Illusionist Faceless Mage]]".
  ** This monster's appearance is based on a scene during [[Dark Yugi and Maximillion J. Pegasus' TV Duel (manga)|Dark Yugi and Maximillion J. Pegasus' TV Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (and its [[Yami Yugi and Maximillion Pegasus' TV Duel|counterpart]] in the [[Yu-Gi-Oh! (anime)|anime]]) where Pegasus used "Illusionist Faceless Mage" with "Eye of Illusion" for a combination attack.

