title: Card Trivia:Side Effects?
wikitext: |-
  {{Navigation}}

  * 2 "[[Horn Imp]]s" and several "[[Stim-Pack]]s" appear in this card's artwork.
  ** This card's artwork likely displays the aftermath of the artwork of "Stim-Pack", with the imp suffering from its side effects.
  * Except for the question mark, both this card and "[[Bad Reaction to Simochi]]" have the same French name ("Effets Secondaires").
