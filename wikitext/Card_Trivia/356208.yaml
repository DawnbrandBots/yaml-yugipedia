title: Card Trivia:Speed World Neo
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The [[New Domino City (ARC-V)|New Domino City]] [[Turbo Duel]]ing lanes from the ''[[Yu-Gi-Oh! ARC-V]]'' anime appear in this card's artwork.
  * This card is the upgraded ''Yu-Gi-Oh! ARC-V'' version of "[[Speed World]]".
  ** This is also the first upgraded of "Speed World" to appear outside of the ''[[Yu-Gi-Oh! 5D's]]'' anime, as well as the first one to ignore the concept of [[Speed Counter]]s and [[Speed Spell Card]]s.
