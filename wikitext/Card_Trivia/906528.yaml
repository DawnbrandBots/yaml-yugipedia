title: Card Trivia:Tearlaments Reinoheart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Tearlaments Sulliek]]" and "[[Kashtira Preparations]]".
  * "[[wikipedia:es:Reino (entidad política)|Reino]]" in this monster's name is the Spanish word for "realm".
  ** This monster's name, "Reinoheart", is a reference to "[[Primeval Planet Perlereino]]".
  * This monster has 3 [[Heart]] [[counterpart]]s:
  ** [[DARK]] "[[Scareclaw]]": "[[Scareclaw Reichheart]]"
  ** [[FIRE]] "[[Kashtira]]": "[[Kashtira Riseheart]]"
  ** [[LIGHT]] "[[Mannadium]]": "[[Mannadium Riumheart]]"
  ** This monster also has a [[LIGHT]] non-Heart counterpart: "[[Visas Starfrost]]"
  *** This card's [[ATK]]/[[DEF]] (1500/2100) are the opposite of the ATK/DEF (2100/1500) of "Visas Starfrost".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Tearlaments Kaleido-Heart]]".
