title: Card Trivia:Alsei, the Sylvan High Protector
wikitext: |-
  {{Navigation}}

  * This card is named after the ''[[wikipedia:Alseis|alseis]]'', a genus of plants.
  * This monster is based on ''[[wikipedia:White Tiger (China)|Byakko]]'', the guardian of the West, and one of the Four Symbols of the Chinese constellations.
  * This card has the highest [[DEF]] of all [[Plant]]-[[Type]] monsters.
