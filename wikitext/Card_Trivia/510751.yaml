title: Card Trivia:Buster Blader
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Curse of Anubis (set)|Curse of Anubis]]'' and the box of ''[[Duelist Legacy Volume.1]]''.
  * This monster appears in the artworks of "[[Aura Buster]]", "[[Fusion Buster]]", and "[[Miracle Locus]]".
  ** A vague outline of this monster appears in the artwork of "[[Miracle Restoring]]".
  * This card appears in the artwork of "[[Brave Attack]]".
  * In this card's ''[[Anniversary Pack]]'' artwork, a faint shadow of a dragon's jaws can be seen in the bottom right of the image.
  * This monster has 4 [[counterpart]]s:
  ** A retrained counterpart: "[[Buster Blader, the Destruction Swordmaster]]".
  ** A [[Toon]] counterpart: "[[Toon Buster Blader]]".
  ** An upgraded [[Fusion]] counterpart: "[[Buster Blader, the Dragon Destroyer Swordsman]]".
  ** 2 retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterparts: "[[Legendary Swordsman - Buster Blader]]" and "[[The Swordsman Who Doles Out Victory]]".
  * This monster can be seen as a physical counterpart and partner to "[[Dark Magician]]".
  ** Both monsters are used as [[Fusion Material]] for "[[Dark Paladin]]".
  ** Both monsters are [[support]]ed by "Miracle Restoring".
  ** Both monsters are supported by the parallel members of the [[Skilled Magician]] [[series]]: "[[Skilled White Magician]]" (which supports this monster) and "[[Skilled Dark Magician]]" (which supports "Dark Magician").
  * This monster's effect causes it to directly counter "[[Blue-Eyes White Dragon]]". Assuming no other [[ATK]] changing effects, if the opponent controls a "Blue-Eyes White Dragon" (and has no other [[Dragon]] monsters on their field or in the Graveyard) this monster's [[ATK]] increases to 3100, narrowly exceeding the 3000 ATK of "Blue-Eyes".
  ** If the opponent controls a "[[Blue-Eyes Ultimate Dragon]]" Fusion Summoned normally (so that there are three "Blue-Eyes White Dragons" in the opponent's Graveyard), this monster's ATK increases to 4600, again narrowly exceeding "Blue-Eyes Ultimate Dragon's" 4500 ATK.
  ** If the opponent controls a "[[Dragon Master Knight]]" Fusion Summoned normally (with three "Blue-Eyes White Dragons" and one "Blue-Eyes Ultimate Dragon" in the [[Graveyard]]), this monster's ATK becomes 5100, again narrowly exceeding "Dragon Master Knight's" 5000 ATK. Even when considering the effect of "Dragon Master Knight", which increases its ATK by 500 for every other Dragon monster they control, "Buster Blader's" effect also increases its own ATK by 500 for each of those Dragon monsters.
