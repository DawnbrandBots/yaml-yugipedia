title: Card Trivia:Great Long Nose
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Tengu|tengu]], a legendary creature in [[wikipedia:Japanese mythology|Japanese mythology]] who takes on avian-like appearances, sometimes depicted with a red face with a long nose, and wields a magic fan that can generate powerful winds.
  * This is the first and currently only [[Beast-Warrior]] [[Spirit monster]].
