  * This monster is holding a [[wikipedia:Bagua|Bagua]] mirror (typically associated with [[wikipedia:Feng shui|feng shui]]) in front of her face.
  ** This is fitting, since feng shui is also known as Chinese [[wikipedia:Geomancy|geomancy]].
