title: Card Trivia:Destruction Chant of the Sacred Beast
wikitext: |-
  {{Navigation}}


  * This card is a "[[Sacred Beast (archetype)|Sacred Beast]]" counterpart to "[[Dimension Fusion Destruction]]"—with both cards sharing the last two kanji in their Japanese names as well.

  * "[[Elemental HERO Tempest]]", "[[Skyscraper]]", and "[[Uria, Lord of Searing Flames]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|048|ref}} where "[[Uria, Lord of Searing Flames (anime)|Uria, Lord of Searing Flames]]" attacks "[[Elemental Hero Tempest (anime)|Elemental Hero Tempest]]" while the [[Field Spell Card]] "[[Skyscraper (anime)|Skyscraper]]" is active.
