title: Card Trivia:Harpie Lady
wikitext: |-
  {{Navigation}}

  * "[[Harpie Lady 1 (Rush Duel)|Harpie Lady 1]]", "[[Harpie Lady 2 (Rush Duel)|Harpie Lady 2]]", and "[[Harpie Lady 3 (Rush Duel)|Harpie Lady 3]]" appear in this card's second ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' artwork.
  * This monster appears in the artworks of "[[Atrium's Wind]]", "[[Elegant Egotist]]", and "[[Summoning Clock]]".
  * This card is based on the [[wikipedia:Harpy|harpies]], creatures from [[wikipedia:Greek mythology|Greek mythology]], also known as Sirens, deadly winged creatures that lured mariners to death by their singing.
  * This monster has a younger [[counterpart]]: "[[Harpie Girl]]".
  * This monster has a [[Toon]] counterpart: "[[Toon Harpie Lady]]".
  * This monster has a [[Card evolutions|retrained]] counterpart: "[[Harpie Lady 1]]"
  * This monster has an upgraded counterpart equipped with "[[Cyber Shield]]" and "[[Rose Whip]]": "[[Cyber Harpie Lady]]".
  * Interestingly, unlike the ''Yu-Gi-Oh!'' anime, this monster's appearance was censored even in the Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This card's first ''[[TCG]]'' printing was uncensored, just like the Japanese artwork. This was fixed in later ''TCG'' reprints.
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|069|ref}}, specifically from the panel where [[Harpy Lady (manga)|this monster]] is Summoned.
