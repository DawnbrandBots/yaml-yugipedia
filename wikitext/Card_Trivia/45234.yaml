title: Card Trivia:Synchro Spirits
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Junk Warrior]]", "[[Junk Synchron]]" and "[[White Magician Pikeru]]" appear in this card's artwork.
  ** This is one of two cards that feature both "Junk Synchron" and "Junk Warrior" in its artwork but not feature "[[Speed Warrior]]", the other being "[[Give and Take]]".
  * The combined [[Level]]s of both "Junk Synchron" and "White Magician Pikeru" are 5, which is the Level of "Junk Warrior". This suggests those were the monsters in the [[Graveyard]] that was used to [[Synchro Summon]] the [[banish]]ed "Junk Warrior".
  * Despite appearing in several episodes in the ''[[Yu-Gi-Oh! 5D's]]'' anime, this is one of the most featured cards to not be released in the ''[[OCG]]''/''[[TCG]]''. This is likely due to its effect to [[Special Summon]] the [[Synchro Material]]s without too consequential a cost (besides banishing the [[Synchro Monster]], but this cost can be bypassed).
