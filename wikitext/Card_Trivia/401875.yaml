title: Card Trivia:Lunar Eclipse
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Lunar eclipse|lunar eclipse]], an astronomical event where the Sun, the Earth, and the Moon are closely aligned in syzygy, causing it to be enveloped in the Earth's shadow.
  ** This is reflected in this card's effect to "eclipse" a "[[Lunalight]]" monster in darkness, causing them to be unaffected by the opponent's [[Spell]]/[[Trap Card]] effects.
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, when this card is [[activate]]d, it envelops the player's [[field]] in darkness, causing the opponent to lost sight of them. In {{episode|ARC-V|048|ref}}, when [[Celina]] used this card outside of a normal [[Duel]], she used the darkness to easily escape from [[Sora Perse]].
