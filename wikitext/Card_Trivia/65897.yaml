title: Card Trivia:Battle x 2
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Two "[[Penguin Soldier]]s" appear in this card's artwork.
  * This card made its debut in [[Yu-Gi-Oh! GX - Episode 080|episode 80]] of the ''[[Yu-Gi-Oh! GX]]'' anime. Coincidentally, its next and final appearance was in [[Yu-Gi-Oh! GX - Episode 160|episode 160]] which is doubled the number of its debut episode (80 x 2 = 160).
