title: Card Trivia:Hecahands Mankibuel
wikitext: |-
  {{Navigation}}

  * The face of "[[Hecahands Jauzah]]" appears in this card's artwork.
  * This monster's name is derived from "''mankib''" (منكب), the Arabic word for "shoulder".
  * Visually, this monster is a combination of "[[Hecahands Ibtel]]" and "[[Hecahands Yadel]]".
  ** This monster shares the same [[Attribute]] ([[LIGHT]]) and [[Level]] (6) with "Ibtel" and Yadel", as well as the average [[original ATK and DEF]] as both monsters.
