title: Card Trivia:Sparkhearts Girl
wikitext: |-
  {{Navigation}}

  * "[[Sparkhearts Hat]]" appears in this card's artwork.
  * This monster appears in the artworks of "[[Curtain of Sparks]]", "[[I Need Holy Water to Ward Off Evil Spirits!]]", "[[I'm Having Trouble with My Fields Being Destroyed!]]", and "[[Leave it to the Sparkhearts!]]".
  * This monster has an [[Counterpart|upgraded]] [[Ritual Monster|Ritual]] form: "[[Sparkhearts Passion Girl]]".

