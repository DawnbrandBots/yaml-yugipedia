title: Card Trivia:Elzette of the White Forest
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Susurrus of the Sinful Spoils]]", and as a silhouette in the artworks of "[[Scourge of the White Forest]]", "[[Sinful Spoils of the White Forest]]", and "[[Tales of the White Forest]]".
  * This monster is the younger "[[White Forest]]" form of "[[Diabellze the Original Sinkeeper]]".
  * This monster has a corrupted "[[Azamina]]" form: "[[Elzette, Azamina of the White Forest]]".
