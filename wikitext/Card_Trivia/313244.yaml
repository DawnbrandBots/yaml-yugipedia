  * This card seems to be polar opposites of "[[Apprentice Magician]]" (which can search out and summon this card): This card is LIGHT while "[[Apprentice Magician]]" is DARK, they have reversed ATK and DEF of each other, and this card gives itself a Spell Counter when summoned while "[[Apprentice Magician]]" gives other cards a Spell Counter when summoned.
