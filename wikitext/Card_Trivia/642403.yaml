title: Card Trivia:Luna the Dark Spirit
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Luna (goddess)|Luna]], the [[wikipedia:Ancient Rome|Ancient Roman]] divine embodiment of the [[wikipedia:Moon|Moon]].
  * This card is the [[DARK]] [[counterpart]] of "[[Diana the Light Spirit]]": both monsters have the same [[Level]]s, opposite [[Attribute]]s, opposite effects, mirrored poses, and are named after the same Roman goddess of the moon.
  ** This card also has 4 other [[Attribute Spirit]] [[counterpart]]s:
  *** [[WATER]]: "[[Aqua Spirit]]"
  *** [[FIRE]]: "[[Spirit of Flames]]"
  *** [[EARTH]]: "[[The Rock Spirit]]"
  *** [[WIND]]: "[[Garuda the Wind Spirit]]"
