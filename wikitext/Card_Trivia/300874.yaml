title: Card Trivia:Ghostrick Warwolf
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Festival]]", "[[Ghostrick or Treat]]", "[[Ghostrick Parade]]", and "[[Ghostrick Renovation]]".
  * This monster is based on a [[wikipedia:Werewolf|werewolf]], a human with the ability to transform into a wolf-like creature on the night of a full moon.
