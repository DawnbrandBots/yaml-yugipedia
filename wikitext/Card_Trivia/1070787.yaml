title: Card Trivia:Necroquip Prism
wikitext: |-
  {{Navigation}}

  * "[[Necroquip Princess]]" appears in this card's artwork.
  ** With this card being first released in ''[[Eternity Code]]'', the appearance of "Necroquip Princess" in this card's artwork predates its release as a card in ''[[The Infinite Forbidden]]'' by 4 years, 2 months, and 18 days.

