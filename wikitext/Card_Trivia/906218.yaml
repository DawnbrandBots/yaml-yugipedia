title: Card Trivia:Reactor Slime
wikitext: |-
  {{Navigation}}

  * Two "[[Slime Token]]s" appear in this card's artwork.
  * This monster's appearance is a combination of "[[Humanoid Slime]]", "[[Jam Breeding Machine]]", and "[[Metal Reflect Slime]]".
  ** This monster's name is based on the Japanese name of "Jam Breeding Machine": "Slime Breeder Reactor".
