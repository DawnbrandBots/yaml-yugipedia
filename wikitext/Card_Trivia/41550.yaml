title: Card Trivia:Flame Cerebrus
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Cerberus|Cerberus]], the three-headed dog in [[wikipedia:Greek mythology|Greek mythology]] who guards the gates to the [[wikipedia:Greek underworld|Underworld]] and serves as the watchdog for [[wikipedia:Hades|Hades]].
  ** This monster's English name is misspelled as '''Cer''eb''rus''' rather than '''Cer''be''rus'''.
  * This monster has a "[[Hazy Flame]]" [[counterpart]], "[[Hazy Flame Cerbereus]]".
  * This is one of the first [[FIRE]] monsters to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, the other being "[[Launcher Spider]]".
  ** This is also the first [[Pyro]] monster to appear in the anime.
