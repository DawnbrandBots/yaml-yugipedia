title: Card Trivia:Eternal Rest
wikitext: |-
  {{Navigation}}

  * This card has a [[Trap Card]] counterpart: "[[Really Eternal Rest]]".
  * The artwork of this card, in combination with its Japanese name ("Enter Nirvana") imply that the figure at the foreground is a priest or monk, banishing the souls of the dead to a state of liberation.
  ** This is fitting with the cards original effect of destroying Zombie monsters, which it had in some video games. e.g. [[Eternal Rest (DM2)|"Eternal Rest" (Duel Monsters 2)]].
  * The man in this card's artwork resembles "[[Kycoo the Ghost Destroyer]]".
