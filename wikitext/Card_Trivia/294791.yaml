title: Card Trivia:Elimigate
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Akihiron]]", "[[Ansatsu]]", "[[Armaill]]", and "[[Flower Wolf]]" appear in this card's artwork.
  ** "Ansatsu" being in this card's artwork is fitting, as its Japanese name is "Assassin", which allows it to bypass this card's restriction effect.
  * This card's international name, "Elimigate", is a portmanteau of "eliminate" and "gate", where the former is reflected in this card's effect of "eliminating" an attacking non-"Assassin" monster.
