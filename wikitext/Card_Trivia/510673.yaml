title: Card Trivia:Ojama Trio
wikitext: |-
  {{Navigation}}

  * "[[Ojama Black]]", "[[Ojama Green]]", and "[[Ojama Yellow]]" appear in this card's artwork.
  * This card appears in the artwork of "[[Trap Request]]".
  * This card has a similar counterpart, "[[Ojama Duo]]", which features "[[Ojama Red]]" and "[[Ojama Blue]]" in its artwork and has an additional effect.
  * This card has a similar effect to "[[Nightmare Archfiends]]", as both cards are [[Trap Card]]s with the ability to [[Special Summon]] [[Token]]s that can damage the opponent when they are destroyed.
  ** Both cards were also used in the anime by the rivals of the protagonist in a specific series ([[Ojama Trio (anime)|this card]] was used by [[Chazz Princeton]], who was [[Jaden Yuki]]'s rival in ''[[Yu-Gi-Oh! GX]]'', whereas "[[Nightmare Archfiends (anime)|Nightmare Archfiends]]" is used by [[Jack Atlas]], who was [[Yusei Fudo]]'s rival in ''[[Yu-Gi-Oh! 5D's]]''.)
  * In ''[[Yu-Gi-Oh! Duel Links]]'', in Duel World (GX), tapping on the trash can on the Card Studio screen causes a random one of the "Ojama Trio" to appear from inside it.
