title: Card Trivia:Amazoness Archer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Amazoness Call]]".
  * This was the only "[[Amazoness]]" card not to have "Amazoness" in its card name until the third reprint of this card in [[Gold Series 3]].
  ** This card's French name had "Archère" ("Archer") changed to "Chasseresse" ("Huntress"), because this card's former name, "Archère Amazonesse", already belonged to "[[Amazoness Archers]]".
