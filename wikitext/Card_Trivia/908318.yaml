title: Card Trivia:Lubellion the Searing Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Alba Strike]]''/''[[Structure Deck: Albaz Strike]]''.
  * This monster appears in the artwork of "[[Branded Fusion]]".
  * This monster is an empowered form of "[[Aluber the Jester of Despia]]", after stealing the Dragon Alchemy from "[[Fallen of Albaz]]" in the artwork of "[[Branded Lost]]". This is further explained in the "Branded Fusion" wallpaper in ''[[Yu-Gi-Oh! Master Duel]]''.
  ** Fittingly, this monster lists "Fallen of Albaz" as the second [[Fusion Material]], unlike the other [[Albaz Dragon]]s which list it as the first material, and "Aluber" can fittingly be used as the [[DARK]] material for this monster's [[Fusion Summon]]. Also, this monster's [[Attribute]] is [[LIGHT]] while the other Albaz Dragons' Attributes are all [[DARK]].
  * "Lubellion" is a portmanteau of the words "''[[wiktionary:ruber|ruber]]''" (Latin for "red"), "Albion", and "[[wiktionary:rebellion|rebellion]]".
  ** The kanji ''Shin'en'' (神炎, lit. "god flame") in this monster's Japanese name is homophonic of the kanji ''Shin'en'' ([[wiktionary:深淵|深淵]], lit. "Abyss"), referencing the "abyss" mentioned in the [[flavor text]] of "[[Aluber the Dogmatic]]".
  * This monster's metallic appearance is very similar to that of "[[Titaniklad the Ash Dragon]]".
  ** The kanji in their Japanese names are directly related to fire, with ''Shin'en'' (神炎, lit. "god flame") in this card's name being a stark contrast to ''Kaijin'' (灰燼, lit. "ash") in "Titaniklad's" name.
  *** ''Kaijin'' can also be interpreted as "worthless", as in the phrase ''Kaijin-tokasu'' (灰燼と化す, "turn to ashes"), an expression for effort that is rendered worthless due to ruin or failure. This may reflect how "Albaz" is the "abandoned" half of "Aluber", similar to how ash is the "worthless" remnant of fire.
  * This monster has a "[[Bystial]]" counterpart: "[[The Bystial Lubellion]]".
  ** Both monsters share the same Attribute (LIGHT), [[Level]] ([[Level 8 Monster Cards|8]]), [[Type]] ([[Dragon]]), and [[original ATK and DEF]] ([[2500 ATK Monster Cards|2500]]/[[3000 DEF Monster Cards|3000]]).
  * This card is the opposite counterpart of "[[Mirrorjade the Iceblade Dragon]]".
  ** Both monsters are depicted fighting in the artwork of "Branded Fusion".
  ** Both monsters are depicted with mirrored poses in their card artworks.
  ** Both monsters are the empowered forms of their base counterparts: This monster is an empowered form of "[[Aluber the Jester of Despia]]", while "Mirrorjade" is an empowered form of "[[Fallen of Albaz]]".
  *** Both monsters also have an empowered form when combined: "[[Alba-Lenatus the Abyss Dragon]]"
  ** Both monsters are related to their respective [[archetype]]s that feature opposing elemental themes: This monster features a "fire" theme, while "Mirrorjade" features an "ice" theme.
  ** Both monsters feature opposite Attributes and [[ATK]]/[[DEF]]: This monster's Attribute is LIGHT and features 2500 ATK/3000 DEF, while "Mirrorjade's" Attribute is DARK and features [[3000 ATK Monster Cards|3000 ATK]]/[[2500 DEF Monster Cards|2500 DEF]].
  ** Both monsters feature higher ATK/DEF than the previous draconic forms: This monster has 1000 more DEF than "[[Masquerade the Blazing Dragon]]", while "Mirrorjade" has 500 more ATK/DEF than the other Albaz Dragons.
