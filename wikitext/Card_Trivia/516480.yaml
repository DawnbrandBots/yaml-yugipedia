title: Card Trivia:Superheavy Samurai Blue Brawler
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Waka-O2" (ワカ－Ｏ２, ''Waka-Oni'') is a reference to how [[wikipedia:Benkei|Benkei]] is said to have been nicknamed "Oniwaka" in his youth.
  ** Fittingly, this monster was used to [[Tribute Summon]] "[[Superheavy Samurai Big Benkei (anime)|Superheavy Samurai Big Benkei]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster and "[[Superheavy Samurai Swordsman]]" are the first monsters to be introduced in the ''Yu-Gi-Oh! ARC-V'' anime.
  ** They are also the first monsters in the ''Yu-Gi-Oh! ARC-V'' anime to be [[Tribute]]d for a Tribute Summon.
