title: Card Trivia:Cloak and Dagger
wikitext: |-
  {{Navigation}}

  * An early, leaked edit for the card's ''[[TCG]]'' design had the crosshairs left in, but targeting a red balloon instead of the head of the man in the picture. It is believed that this change, as well as the decision to remove the crosshairs altogether in the final design, were done in light of recent sniper incidents in the United States of America.
