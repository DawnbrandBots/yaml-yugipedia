title: Card Trivia:Speedroid Horse Stilts
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on a [[wikipedia:Hobby horse (toy)|hobby horse]], a child's toy that features a crafted model of a horse's head at the end of a straight stick.
  ** This monster's Japanese name and design featuring are a pun on the ''takeuma'' (竹馬, lit. "bamboo horse"), a pair of stilts made of bamboo chutes used as a traditional Japanese toy.
