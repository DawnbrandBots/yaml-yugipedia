title: 'Card Trivia:Number 82: Heartlandraco'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster's name is a portmanteau of "[[Heartland]]" and "draco".
  ** "Heartland" is based on [[Heartland City]] and this monster's owner in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, [[Mr. Heartland (manga)|Mr. Heartland]].
  ** "Drago" is based on the Latin word for "dragon", reflecting this monster's appearance and [[Type]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are an alteration of the effects of "[[Land Power]]", a [[Field Spell Card]] that was used in conjunction with in the ''Yu-Gi-Oh! ZEXAL'' manga.
  ** In the manga, the effect of "Land Power" prevented the opponent from attacking "[[Heart Monster]]s", including this monster, and allowed them attack directly. In the ''OCG''/''TCG'', this monster's effects prevents the opponent from attacking it while the player controls a face-up [[Spell Card]] and allows it attack directly, but other monsters the player controls cannot attack.
  *** In this sense, this is the only "[[Number]]" monster to have its Japanese name changed before its release. In the ''Yu-Gi-Oh! ZEXAL'' manga, it was named "Heart Monster Heartlandraco", while in the ''OCG''/''TCG'', it is simply named "Heartlandraco". This change is likely due to the fact that the "Heart Monsters" were not released.
  * This card's artwork is taken from {{chapter|ZEXAL|033|ref}}, specifically from the panel showing [[No. 82: Heart Monster Heartlandraco (manga)|this monster]] being Summoned.
