title: Card Trivia:The Sanctuary in the Sky
wikitext: |-
  {{Navigation}}

  * This sanctuary appears in the artworks of "[[Angel of Zera]]", "[[Archlord Zerato]]", "[[Beckoning Light]]", "[[Divine Punishment]]", "[[Fallen Sanctuary]]", "[[Light of Judgment]]", "[[The Sanctum of Parshath]]", and "[[Zeradias, Herald of Heaven]]".
  ** This sanctuary's tower also appears in the artworks of "[[Cards from the Sky]]" and "[[The Sacred Waters in the Sky]]".
  ** This sanctuary's ruins also possibly appears in the artwork of "[[Darklord Zerato]]".
  * This card shares its same name with the ''[[OCG]]'' [[booster pack]] it was released in: ''[[The Sanctuary in the Sky (set)|The Sanctuary in the Sky]]''.
