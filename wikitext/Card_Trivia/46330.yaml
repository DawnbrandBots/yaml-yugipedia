title: Card Trivia:XZ-Tank Cannon
wikitext: |-
  {{Navigation}}

  [[File:XYZ-DragonCannon_reappears.png|thumb|right|250|"[[XYZ-Dragon Cannon (manga)|XYZ-Dragon Cannon]]" reappears after being teleported by "[[Interdimensional Matter Transporter (manga)|Interdimensional Matter Transporter]]".]]

  * This is the only "[[A-to-Z]]" monster that doesn't use contiguous letters in its name.
  * This monster's [[original ATK and DEF]] (2400/2100) is based on the original [[ATK]] and [[DEF]] of "[[X-Head Cannon]]" (1800/1500) after gaining 600 ATK/DEF when [[equip]]ped with "[[Z-Metal Tank]]".
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh! Duelist|196|ref}}, specifically from the panel where "[[XYZ-Dragon Cannon (manga)|XYZ-Dragon Cannon]]" reappears after being teleported by "[[Interdimensional Matter Transporter (manga)|Interdimensional Matter Transporter]]", albeit with "[[Y-Dragon Head]]" excluded and other minor detailing changes.
  * This card's Portuguese name was incorrectly translated as "XZ - '''Dragão Canhão'''" (which means "XZ-'''Dragon Cannon'''") instead of "XZ - '''Tanque Canhão'''" (which means "XY-'''Tank Cannon'''").

