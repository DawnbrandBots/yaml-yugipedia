title: Card Trivia:Belial - Marquis of Darkness
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Belial|Belial]], a demon described in ''[[wikipedia:The Lesser Key of Solomon|The Lesser Key of Solomon]]'', which itself was derived from a term used in the [[wikipedia:Hebrew Bible|Hebrew Bible]]. In ''The Lesser Key of Solomon'', Belial is described as a king who appears in the form of two angels riding a chariot of fire.
  * Unlike many other cards, this monster's halo was not removed from its artwork in the ''[[TCG]]''.
