title: Card Trivia:Bujin Yamato
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * This monster appears in the artworks of "[[Bujincarnation]]", "[[Bujinfidel]]", "[[Bujintei Susanowo]]", and "[[Damage Reactor]]".
  ** The artwork of "Bujincarnation" depicts this monster transforming into "Bujintei Susanowo".
  * This monster is named after [[wikipedia:Yamato Takeru|Yamato Takeru]], a prince of the Yamato dynasty in Japan.
  * The [[Main Deck]] "[[Bujin]]" [[Beast-Warrior]] monsters resemble characters that appear in the ''[[Yu-Gi-Oh! GX]]'' anime through their head shapes and color schemes. In this case, this monster resembles [[Jaden Yuki]], while its red color scheme is a reference to how Jaden wore a red uniform belonging to the [[Slifer Red]] dorm.
  ** The position of this monster's hand is a reference to the gesture that Jaden makes at the end of a [[Duel]] when saying his catchphrase ("Gotcha! That was a fun Duel" in the Japanese version, and "That's game" in the English version).
