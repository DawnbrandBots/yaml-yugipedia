title: Card Trivia:OuTerverSe Sylphy Seyfert
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[OuTerverSe Diversity Scream]]".
  * This monster is an [[OuTerverSe (series)|OuTerverSe]] [[counterpart]] of "[[Silver Seyfert]]".
  ** This monster shares its [[Level]] (6) and [[original ATK and DEF]] (2000/800) with "Silver Seyfert".
  ** In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, when this monster's [[Type]] becomes [[Galaxy]], it takes on the color scheme of "Silver Seyfert".
  * This monster is based on the parallel universe observed by [[Yudias Velgear]] through [[Kuaidul Velgear]] in {{episode|GO RUSH!!|135|ref}}, in which Yudias is praised for his sharp glamour, which pierces everyone around him like blades.
