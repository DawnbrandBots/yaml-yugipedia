title: Card Trivia:Indigo-Eyes Silver Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Blue-Eyes White Dragon]]".
  ** Fittingly, this monster requires a [[Normal Monster]] as [[material]] to [[attack directly]].
  ** This monster's appearance is based on that of "Blue-Eyes White Dragon" from its 8th ''[[OCG]]''/7th ''[[TCG]]'' artwork, as evidenced by the extra, unarticulated "finger" on each of this monster's wing.
  * This monster is an Xyz counterpart of "[[Azure-Eyes Silver Dragon]]".
  ** This monster's pose is almost identical to that of "Azure-Eyes'" in the artwork of "[[Silver's Cry]]"; also, the background is the same as that depicted in the artwork of "Silver's Cry".
  ** Both are related to the "[[Blue-Eyes]]" [[archetype]] without being members of it.
  ** Both generically support Normal Monsters, rather than "Blue-Eyes" monsters or "Blue-Eyes White Dragon" specifically.
