title: Card Trivia:Double Hero Attack
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Magma Neos]]" and "[[Elemental HERO Shining Flare Wingman]]" appear in this card's artwork.
  ** Both monsters are depicted in poses similar to how they are depicted in their respective card artworks.
  ** Both monsters are the two final "[[HERO]]" [[Fusion Monster]]s that were [[Special Summon]]ed during the final turn of {{episode|GX|180|ref}}.
