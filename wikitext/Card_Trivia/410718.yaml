title: Card Trivia:Traptrix Rafflesia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Traptantalizing Tune]]".
  * "[[Traptrix Atrax]]", "[[Traptrix Dionaea]]", "[[Traptrix Myrmeleo]]", and "[[Traptrix Nepenthes]]" appear in this card's artwork.
  * This card is based on the ''[[wikipedia:Rafflesia|Rafflesia]]'', a genus of parasitic plant belonging to the family [[wikipedia:Rafflesiaceae|Rafflesiaceae]] which resembles a five-petalled red flower. The ''Rafflesia'' is a large plant that produces an odor similar to rotting flesh, which can attract insects, including carrion flies.
