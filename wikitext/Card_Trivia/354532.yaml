title: Card Trivia:Toy Parade
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Blockman]]", "[[Cursed Twin Dolls]]", "[[Princess Cologne (card)|Princess Cologne]]", "[[Toy Emperor]]", two "[[Bickuribox]]es" (one of them in front of "Blockman"), three "[[Tomato in Tomato]]s", a number of "[[Fluffal Bear]]s", "[[Fluffal Leo]]", "[[Toy Knight]]s", and "[[Toy Soldier (anime)|Toy Soldier]]s" (including their "[[Fife and Drum Corps]]"), and a number of the angels from the artwork of "[[Graceful Dice]]" appear in this card's artwork.
  ** All of the above-mentioned monsters are toy-related monsters that debuted in the previous manga or anime (although "Princess Cologne's" [[Cologne|character]] only appeared in the [[Yu-Gi-Oh! ZEXAL (manga)|manga]], not a card).
  ** "Bickuribox" is depicted with its [[Card Gallery:Bickuribox#Anime - Japanese|color scheme]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, rather than its color scheme in the ''[[OCG]]''/''[[TCG]]''.
