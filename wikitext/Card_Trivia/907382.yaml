title: Card Trivia:The Fire Dragon
wikitext: |-
  {{Navigation}}

  * This card references "[[Luster Dragon]]".
  ** Its Japanese name is practically identical to the Japanese name of "Luster Dragon" (which is translated as "Sapphire Dragon"), except for the addition of an [[wikipedia:Interpunct|interpunct]], which causes its name to be read/translated with the first syllable, "Za" (ザ, ''The''), emphasized.
  ** Its lore is identical to that of "Luster Dragon", with "sapphire" replaced with "fire".
  ** Its design is visually very similar to that of "Luster Dragon".
  ** Both are [[Level 4 Monster Cards|Level 4]] [[Dragon]] [[Normal Monster]]s with high ATK.
  * A similar counterpart to "Luster Dragon" named "[[Ruby Dragon]]" previously appeared in the anime.
