title: Card Trivia:Proxy Dragon
wikitext: |-
  {{Navigation}}

  * This card resembles a prototype of "[[Firewall Dragon]]". Also fitting the computer theme-naming, it appears to be named after [[wikipedia:Proxy server|proxy servers]], likely in reference to how this card redirects damage, like how a proxy redirects information that could be used to track a user.
  ** When added to the [[ATK]] and [[Link Rating]] of "[[Security Dragon]]", this card's ATK and Link Rating equal those of "Firewall Dragon".
  * This card performs a similar function to another one of [[Yusaku Fujiki|Yusaku]]'s monsters; "[[Honeybot]]". Both are [[Link 2 Monster Cards|Link-2]] [[Cyberse]] monsters with [[Left Link Arrow Monster Cards|left]] and [[Right Link Arrow Monster Cards|right]] [[Link Arrow]]s whose effects protect the user's other monsters from destruction.
