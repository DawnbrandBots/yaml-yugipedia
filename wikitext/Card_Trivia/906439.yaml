title: Card Trivia:Submareed Tour Ride
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Leedsichthys|Leedsichthys]]''.
  * This monster's first effect was translated differently in ''[[TCG]]'' from the literal meaning of its original ''[[OCG]]'' text. While mistranslations or mechanics changes between formats are not rare, this card's effect was almost completely rewritten:
  ** In the ''OCG'', it only protects [[Normal Monster]]s from being destroyed by battle by an [[Effect Monster]].
  ** In the ''TCG'', it protects Normal Monsters from battle (against ''any'' monster) or card effect. This change is arguably stronger, though as the protection is mandatory, it could hinder a player's self-destruction strategy.
