title: Card Trivia:Evilswarm Bahamut
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duel Terminal - Sacred Star Knights!!]]''.
  * This is the "[[lswarm]]" counterpart of "[[Brionac, Dragon of the Ice Barrier]]".
  ** The ATK of this card is 50 more than "Brionac", and the DEF is 50 less.
  * This monster appears in the artwork of "[[Dragunity Divine Wind]]".
  * [[wikipedia:Bahamut|Bahamut]] is the name of the gigantic fish that supports the earth in Arabian Mythology.
  * Like "Brionac", "Bahamut" has counterparts to its cousins, "[[Evilswarm Ophion]]" and "[[Evilswarm Ouroboros]]".
  * Unlike its Counterpart, this card is a Dragon, not a Sea Serpent.
  ** Ironically, it also dropped the 'dragon' moniker in the process, despite being more appropriate here.
