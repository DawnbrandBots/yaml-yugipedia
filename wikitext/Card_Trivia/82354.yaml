title: Card Trivia:Molten Zombie
wikitext: |-
  {{Navigation}}

  * Despite its name and appearance, this monster's [[Type]] is [[Pyro]] rather than [[Zombie]].
  ** However, this monster's effect [[activate]]s when it is [[Special Summoned]] from the [[Graveyard]], which is commonly associated with Zombie monsters.
  * This monster shares the same [[original ATK and DEF]] (1600/400) and [[draw]]ing effect as "[[Sacred Crane]]".
  ** The only difference is that this monster must be Special Summoned from the Graveyard in order to activate its drawing effect.
