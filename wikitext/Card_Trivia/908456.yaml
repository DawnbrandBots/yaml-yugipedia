  [[File:CestusofDagla-JP-Anime-DM-NC.png|thumb|right|250|"Mudora" equipped with "Sword of Dogra" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.]]

  * This monster's weapons are a pair of [[wikipedia:Wind and fire wheels|wind-and-fire wheels]].
  * This monster is a [[retrained]] [[counterpart]] of "[[Mudora]]".
  ** This monster's pose in its artwork is based on a scene from {{episode|Yu-Gi-Oh!|093|ref}} where "[[Mudora (anime)|Mudora]]" is [[equip]]ped with "[[Sword of Dogra (anime)|Sword of Dogra]]".

