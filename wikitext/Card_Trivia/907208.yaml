title: Card Trivia:LaSolfachord Angelia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Solfachord Elegance]]".
  ** This monster's chibi avatar appears in the artworks of "[[Solfachord Harmonia]]" and "[[Solfachord Symphony]]".
  * This monster is based on "''La''", the sixth syllable of the [[wikipedia:Solfège|solfège]], which reflects its [[Level]] (6).
  ** "Angela" starts with the English letter "A", which is based on the [[wikipedia:A (musical note)|sixth musical note]] of the [[wikipedia:C major|C major scale]] in the fixed solfège.
