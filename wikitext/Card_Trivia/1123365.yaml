title: Card Trivia:Dawn Angel Kambi
wikitext: |-
  {{Navigation}}

  * This monster is likely based on [[wikipedia:Gullinkambi|Gullinkambi]], a rooster in [[wikipedia:Norse mythology|Norse mythology]] who lives in [[wikipedia:Valhalla|Valhalla]] and is one of three whose crowing signifies the beginning of ''[[wikipedia:Ragnarök|Ragnarök]]''.
