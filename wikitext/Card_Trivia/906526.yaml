title: Card Trivia:Monster Assortment
wikitext: |-
  {{Navigation}}

  * Small, cookie versions of "[[Cybernetic Cyclopean]]", "[[Hitotsu-Me Giant]]", "[[Manga Ryu-Ran]]", "[[Ryu-Ran]]", "[[Zombina]]", and "[[Zombino]]" appear in this card's artwork.
  ** All of these are pairs of monsters that can be revealed for this card's effect.
  * This food item appears in the artwork of "[[Evil★Twin's Trouble Sunny]]" in the upper-right corner, featured on a pair of billboards that separately display "Zombina" and "Zombino".
