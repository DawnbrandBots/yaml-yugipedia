title: Card Trivia:Testament of the Arcane Lords
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Objet of the Magical Gods" ({{Ruby|魔|ま}}{{Ruby|導|どう}}{{Ruby|神|しん}}のオブジェ, ''Madōshin no Obuje''), refers to the French word "objet", which is the shortened version of "objet d'art", meaning "piece of art" or "artwork".
  ** While this monster has not been released in the ''[[OCG]]'', its official Japanese name was first revealed in ''[[The Valuable Book 9]]'', and later confirmed with its release in the ''[[Yu-Gi-Oh! GX Card Almanac]]'' video game.
  * This monster has a [[counterpart]]: "[[Armament of the Lethal Lords]]".
  * According to a [https://www.pojo.biz/board/showthread.php?p=4691663#post4691663 Pojo post] by [[Kevin Tewart]], this monster earned its name for being "a golden statue in a renaissance style, moving triumphantly with light billowing behind it".
