title: Card Trivia:Tellarknight Constellar Caduceus
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Tellarknight]]" [[Xyz Monster|Xyz]] form of "[[Constellar Caduceus]]" combined with "[[Tellarknight Altairan]]" and "[[Tellarknight Lyran]]".
  ** The artwork of "[[Constellar Tellarknights]]" appears to depict the transformation of this monster.
  * This monster is based on an unnamed [[wikipedia:Asterism (astronomy)|asterism]] in the form of an equilateral triangle consisting of [[wikipedia:Altair|Altair (α Aquilae)]], [[wikipedia:Alpha Ophiuchi|Rasalhague (α Ophiuchi)]], and [[wikipedia:Vega|Vega (α Lyrae)]]. This asterism is often overshadowed by the similar [[wikipedia:Summer Triangle|Summer Triangle]], replacing Rasalhague with the brighter star [[wikipedia:Deneb|Deneb (α Cygni)]].
