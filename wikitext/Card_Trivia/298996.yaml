title: Card Trivia:Archfiend Giant
wikitext: |-
  {{Navigation}}

  * This monster appears to be a different version of "[[Imprisoned Queen Archfiend]]".
  ** This is supported by characteristics they have in common, such as their red hair and their legs.
  * "[[Archfiend Palabyrinth]]" appears in this card's artwork (seen next to this monster's extended claw).
