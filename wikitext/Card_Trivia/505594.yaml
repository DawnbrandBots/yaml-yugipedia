title: Card Trivia:Z-Metal Tank
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Advent of Union]]''.
  * This monster appears in the artworks of "[[Union Hangar]]", "[[Union Scramble]]", and "[[XYZ Combine]]".
  * This monster's Japanese name, "Z-Metal Caterpillar", is a reference to the [[wikipedia:Continuous track|caterpillar tracks]] on continuous track vehicles, including tanks.
  * This monster has a [[retrain]]ed counterpart: "[[Z-Zillion Tank]]".
  * In the French release of ''[[Duelist Pack: Chazz Princeton]]'', this card is missing the name of the [[equip]]ped monster in its effect.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|254|ref}}, specifically from the panel showing [[Z-Metal Tank (manga)|this monster]] being Summoned.
