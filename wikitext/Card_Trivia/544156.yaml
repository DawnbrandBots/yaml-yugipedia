title: Card Trivia:Gladiator Beast's Medusa Shield
wikitext: |-
  {{Navigation|mode=nongame}}

  * In Greek mythology, [[wikipedia:Medusa|Medusa]] was a female monster with hair made out of snakes; anyone who met her gaze was turned to stone. She was killed by the Greek hero [[wikipedia:Perseus|Perseus]], who gave her head to [[wikipedia:Athena|Athena]] to be mounted on her shield, Aegis, hence this card's artwork.
