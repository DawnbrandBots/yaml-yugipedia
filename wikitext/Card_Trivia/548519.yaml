title: Card Trivia:Protron
wikitext: |-
  {{Navigation}}

  * This monster appears to be the precursor to "[[Bitron]]" and "[[Digitron]]".
  ** "Protron" alludes to the subatomic particle [[wikipedia:proton|proton]], which, with [[wikipedia:neutron|neutron]], forms an atomic core.
  * This monster appears in the artwork of "[[Return Risk Reservoir]]".
