title: Card Trivia:Dragosite
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Accoundra Burns Rage]]" and "[[Site Preview]]".
  * This monster is named after a [[wikipedia:Website|website]], a collection of web pages under a domain name and published on a web server.
  ** Fittingly, this monster's designs features three copies of the English letter "W" on its heads and wings, referencing the acronym for [[wikipedia:World Wide Web|World Wide Web]], "WWW", which is commonly used to access any webpage on the Internet.
