title: Card Trivia:White Magician's Shining Shield
wikitext: |-
  {{Navigation}}

  * This Skill references the "White Magic Shining Shield" ability used by [[Bakura (MW)|White Wizard Bakura]] in the ''[[Monster World]]'' tabletop RPG to protect the party from [[Dark Master Zorc]]'s attack. Its effect to prevent monsters with a Level equal to or higher than the dice result from attacking reflects the mechanics of ''Monster World'', where rolling lower numbers yields better results.
