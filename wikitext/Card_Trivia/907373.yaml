title: Card Trivia:Cyber Energy Shock
wikitext: |-
  {{Navigation}}

  * "[[Jinzo]]" appears in this card's artwork
  ** This card's name is based on the [[signature move]] of "Jinzo" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  * This card appears in the artwork of "[[Dark Time Wizard]]".
  * This card's effect to increase the [[ATK]] of "Jinzo" by 800 is based on the effect of "[[Amplifier (manga)|Amplifier]]" in the ''Yu-Gi-Oh!'' manga and anime, which could increase the ATK of "Jinzo" by 500 upon activation and increase its ATK by 300 during each of the controller's next turns.
  ** During [[Katsuya Jonouchi and Esper Roba's Duel (manga)|Katsuya Jonouchi and Esper Roba's Duel]] in the manga (and its anime counterpart), [[Esper Roba (manga)|Esper Roba]] used this card to increase the ATK of "[[Jinzo (manga)|Jinzo]]" by '''500'''. During his next turn, this card's effect further increases "Jinzo's" ATK by '''300''' and it was only used once before the end of the Duel, thereby making "Jinzo" gain a total of '''800''' ATK.
