title: Card Trivia:Paleozoic Hallucigenia
wikitext: |-
  {{Navigation}}

  * This card derives its name from [[wikipedia:Hallucigenia|Hallucigenia]], a genus of extinct [[wikipedia:Cambrian|Cambrian]] animal found as fossils in the [[wikipedia:Burgess Shale|Burgess Shale Formation]] in the Canadian Rockies of British Columbia, Canada.
  * The art of this card is based in the older, now outdated, reconstruction of the cambian animal, that depicted it with tentacles in the back and rigid legs. Up to day reconstructions show the animal upside down, with squized legs and spikes in the back.
