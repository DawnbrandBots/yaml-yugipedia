title: Card Trivia:Power Pro Knight Sisters
wikitext: |-
  {{Navigation}}

  * This card is a parody of "[[Noble Knight Brothers]]" featuring characters from ''[[wikipedia:Power Pros|Power Pros]]'', a Japanese baseball video game series created by [[Konami]].
  ** The last line in this card's Japanese [[flavor text]], 『彼女達に導かれるかの如く踏み入れた球場の中、ついに運命にたどり着く。そして球児達は大きな一歩を踏み出すのだ。――これは全ての始まりであり、大いなる球史である。』 ("''As if guided by the girls, they entered the stadium and finally faced their destiny. Thus, the young players took one big step forward. —― This was the beginning of it all, the great history of baseball.''"), is a parody of the Japanese flavor text of "[[Noble Knight Artorigus]]": 『導かれるかの如く分け入った森の中、ついに運命にたどり着く。そして青年は大きな一歩を踏み出すのだ。――これは全ての始まりであり、大いなる叙事詩である。』 ("''As if guided, he pushed through the woods and finally faced his destiny. Thus, the young man took one big step forward. ―― This was the beginning of it all, the Great Epic.''")
  * This card currently has the highest [[DEF]] of all Level 4 or lower monsters that can be [[Normal Summon]]ed/[[Normal Set|Set]] without some sort of drawback.
