title: Card Trivia:Prophecy Phrase the Colors of the Wind
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Looter Force]]" and "[[Psyquip da Capo]]", as well as in both artworks of "[[Nobody Phantom Thief]]" and the second artwork of "[[Traditional Tax]]".
  ** A figure of this monster appears in the artwork of "[[Condurglar the Assisting Anthem]]".
  * [[Powloon Castle]] appears in this card's second artwork.
  * This monster's name likely references [[Rovian Kassidy]]'s tendency to speak in cryptic poems.
  * This monster is a [[Shaman Bandit]] [[counterpart]] of "[[Prima Guitarna the Shining Superstar]]".
  ** Both share the same [[Level]] (7), [[Type]] ([[Psychic]]), [[original ATK and DEF]] (2200/0), and [[effect]] [[Activation condition|requiring]] the [[pay]]ment of 1000 [[Life Point]]s to be [[activate]]d.
