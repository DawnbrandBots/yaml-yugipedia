title: Card Trivia:Baxia, Brightness of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:zh:𧈢𧏡|Baxia]] (𧈢𧏡 ''Bāxià''), one of the [[wikipedia:Nine sons of the dragon|nine sons]] of the [[wikipedia:Dragon King|Dragon King]] in Chinese mythology.
  ** The Hanzì for "Baxia" are rarely seen and were only implemented in Unicode Extension B, making them invisible without an appropriate font installed. Ergo, it is more commonly written as 「蚣蝮」 (''Gōngfù''), as in the [[Simplified Chinese]] version of this card. 
  * This was the first [[Wyrm]] [[Synchro Monster]] to be released, and the first Synchro Monster released in the ''[[Yu-Gi-Oh! ARC-V]]'' era.
  * This monster seems to be a [[Card evolutions|combined]] form of "[[Bi'an, Earth of the Yang Zing]]", "[[Suanni, Fire of the Yang Zing]]", and "[[Chiwen, Light of the Yang Zing]]".
  ** Its stripes, mane, and tail resemble those of the above monsters, respectively.
  ** The three monsters can be used to [[Synchro Summon]] this monster, as the sum of their [[Level]]s match this card's Level.
  *** This monster's [[Synchro Summon]] using the above monsters is depicted in the artwork of "[[Yang Zing Unleashed]]".
  * The icon for Wyrm monsters in the ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'' video game is based on this monster.
