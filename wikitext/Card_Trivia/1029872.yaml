title: Card Trivia:Toy Tank
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] a [[Level 6]] or lower monster from the player's [[hand]] is based on a scene in {{chapter|R|023|ref}}, where [[Yugi Mutou (manga)|Yugi Mutou]] [[Tribute]]s [[Toy Tank (manga)|this monster]] to [[Tribute Summon]] "[[Dark Red Enchanter (manga)|Dark Red Enchanter]]".
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! R]]'' manga, specifically from the panel showing this monster being released from "[[Toy Box (manga)|Toy Box]]".
