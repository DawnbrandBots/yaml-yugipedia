title: Card Trivia:Ukiyoe-P.U.N.K. Rising Carp
wikitext: |-
  {{Navigation}}

  * "[[Ukiyoe-P.U.N.K. Sharakusai]]" appears in this card's artwork.
  * This card is named after [[wikipedia:Ukiyo-e|ukiyo-e]], a genre of Japanese art which flourished from the 17th through 19th centuries.
  * This monster is based on [[wikipedia:Longmen (mythology)|The Dragon Gate]], a Chinese myth that states that if a carp can swim upstream against a river's strong current up a certain mountain and leap off the waterfall, that carp will be transformed into a powerful dragon.
  * This card is the first [[Fish]] [[Fusion Monster]] to be an [[Effect Monster]].
