title: 'Card Trivia:Number 56: Gold Rat'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * The number 56 appears on the circular plate above this monster's head.
  * This is the first [[Beast]] [[Xyz Monster]], as well as the first Beast "[[Number]]" monster.
  * This monster's [[ATK]]/[[DEF]] (500/600) match the first and the second digit of this monster's number, respectively.
  * "Number" monsters often take the form of their owners and/or their original desires. In the case of this monster's [[Number 56's holder|original owner]], its appearance as a rat with gold bars as its armor plating reflects the owner's desire for money and criminal status, as rats are thought to be pests by many.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster replaces the role of "[[No. 20: Giga-Brilliant (manga)|Number 20: Giga-Brilliant]]" in the [[Yu-Gi-Oh! ZEXAL (manga)|manga]] as the first "Number" monster taken on-screen by [[Kaito Tenjo (manga)|Kaito Tenjo]] from an [[Number 20's holder|unnamed criminal]], who was rampaging through the [[Heartland Shopping Mall]].
