title: Card Trivia:Ritual Beast Tamer Wen
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from the "''wen''", the [[wikipedia:Ainu language|Ainu]] word for "bad".
  ** This is reflected by this monster's transformation into "[[El Shaddoll Wendigo]]".
  ** This monster has a [[counterpart]] with reversed [[ATK]] and [[DEF]], "[[Pilica, Descendant of Gusto]]", whose name is derived from "''pirika''", the Ainu word for "good".
  * This monster has a "[[Shaddoll]]" [[counterpart]]: "[[Reeshaddoll Wendi]]".
  * This monster has a "[[Zefra]]" counterpart: "[[Ritual Beast Tamer Zefrawendi]]".
  ** The transformation of this monster into "Zefrawendi" is depicted in the artwork of "[[Zefra Path]]".
  * "[[Ritual Beast Ulti-Pettlephin]]" is the [[Fusion Monster|Fusion]] between this monster and "[[Spiritual Beast Pettlephin]]".
