title: Card Trivia:Yubel - The Loving Defender Forever
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Phantom Nightmare]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Yubel]]".
  ** This monster's design features the wings, horns, and the dragon head of "[[Yubel - Terror Incarnate]]" and/or "[[Yubel - The Ultimate Nightmare]]", the two upgraded [[Main Deck]] forms of "Yubel".
  ** This monster also shares similarities with the anime version of "[[Neos Wiseman (anime)|Neos Wiseman]]", another Fusion Monster that lists a "[[Yubel (archetype)|Yubel]]" monster as a [[Fusion Material]].
  ** This monster's Fusion Materials requiring "Yubel" and any number of [[Effect Monster]]s on the [[field]], along with various support around "[[Super Polymerization]]", references "[[Super Fusion God]]", an [[List of unseen cards|unseen]] monster that [[Yubel (character)|Yubel]] attempted to Summon by fusing themself with other Effect Monsters with different [[Level]]s by using "[[Super Polymerization (anime)|Super Polymerization]]" in {{episode|GX|155|ref}}.
  * This monster's design references the design of "[[Elemental HERO Flame Wingman]]", a winged humanoid with a dragon head in place of a right hand.
  ** Both monsters can deal damage equal to an opponent's monster [[ATK]] after [[battle]].
  ** Both monsters are used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** "Yubel's" resemblance to "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" is befitting of their character in the anime, as they would take the guise of a being close to Jaden in order to gain his attention and appeal (albeit this monster bearing resemblance to "Flame Wingman", who serves as Jaden's  "favorite hero", or the possession of his close friend, [[Jesse Anderson]], as seen during the [[Dimension World]] arc).
  * This monster's Japanese name, "Das Ewig Liebe Wächter", is German for "The Eternal Love Guardian". This references Yubel's love for Jaden in the ''Yu-Gi-Oh! GX'' anime.
  ** The German title in this monster's Japanese name is similar to the German titles in the Japanese names of "[[Yubel - Terror Incarnate]]" ("Das Abscheulich Ritter", lit. "The Detestable Knight") and "Yubel - The Ultimate Nightmare" ("Das Extremer Traurig Drachen", lit. "The Extremely Sorrowful Dragon").
  ** The German present in this monster's Japanese name is grammatically incorrect. The correct translation would be "Der ewige Liebeswächter".
