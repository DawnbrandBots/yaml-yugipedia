title: Card Trivia:Converging Wishes
wikitext: |-
  {{Navigation}}

  * This card's name is based on the beginning of [[Yusei Fudo]]'s [[Synchro Summon]]ing [[Summon chants in Yu-Gi-Oh! 5D's|chant]]s for "[[Stardust Dragon]]" and "[[Formula Synchron]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime, as well as the title of {{episode|5D's|151|ref}}, in which this card debuted.
  ** The six falling stars in this card's artwork represent the [[Signer Dragons]], which all appeared in the same episode and were color-coded as followed (including as part of this card's effect):
  *** Red: "[[Red Dragon Archfiend]]"
  *** Green: "[[Ancient Fairy Dragon]]"
  *** Yellow: "[[Life Stream Dragon]]"
  *** Orange: "[[Black-Winged Dragon]]"
  *** Blue: "[[Stardust Dragon]]"
  *** Violet: "[[Black Rose Dragon]]"
  * The woman in this card's artwork has a [[Monster Card]] counterpart, "[[Stardust Trail]]", with its horns, chest plate, and boots redesigned to resemble "Stardust Dragon".
  ** The six falling stars in this card's artwork also appear in the artwork of "Stardust Trail".
  * This card is an anime counterpart of "[[Gathering Light]]", a card used by [[Yusei Fudo (manga)|Yusei Fudo]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  ** Both cards are named after the beginning of Yusei Fudo's Synchro Summoning chants in the anime.
  ** Both cards are related to a specific series of [[Dragon]] [[Synchro Monster]]s in the ''Yu-Gi-Oh! 5D's'' era; this card is related to the [[Signer Dragon]] series in the anime, while "Gathering Light" is related to the [[Duel Dragon]] series in the manga.
  ** Both cards are used during the Duel between Yusei Fudo and a final antagonist which result in the former's victory; this card is used against [[Z-one]] in the anime, while "Gathering Light" is used against [[Rex Goodwin (manga)|Rex Goodwin]] in the manga.
