title: Card Trivia:V Undine
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card appears in the anime artwork of "[[Vain Betrayer]]".
  * This monster is based on an [[wikipedia:Undine|undine]], a mythological spirit representing the elemental spirit of water that was introduced by the 16th-century alchemist [[wikipedia:Paracelsus|Paracelsus]].
  * This is one of very few [[Effect Monster]]s in the anime, along with "[[Camouflage Gardna]]", "[[Smile Angel]]", "[[V Gnome]]" and "[[V Sylph]]", that has its effect never activated or even mentioned at all.
