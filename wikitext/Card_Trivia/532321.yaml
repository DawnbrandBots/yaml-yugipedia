title: Card Trivia:Hey, Trunade!
wikitext: |-
  {{Navigation}}

  * This card is a weaker, [[retrained]] [[counterpart]] of "[[Giant Trunade]]".
  ** This card's artwork and Japanese name ({{Ruby|局|きょく}}{{Ruby|所|しょ}}{{Ruby|的|てき}}ハリケーン ''Kyokushoteki Harikēn'', "Localized Hurricane") are a reference to "[[Localized Tornado]]" and the Japanese name of "Giant Trunade".
  ** The face in the hurricane from the artwork of "Giant Trunade" and the farm from the artwork of "Localized Tornado" appear in this card's artwork.
  ** This card's ''[[TCG]]'' name, "Hey, Trunade!", is a reference to the old television commercials for [[wikipedia:Kool-Aid|Kool-Aid]].
