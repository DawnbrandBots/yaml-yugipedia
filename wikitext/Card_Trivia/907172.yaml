title: Card Trivia:Cyber Assault Dragon
wikitext: |-
  {{Navigation}}

  * The artwork of "[[Multiple Adapter Unit]]" depicts "[[Cyber Dragon (Rush Duel)|Cyber Dragon]]" being transformed into this monster.
  * This monster is a ''[[Rush Duel]]'' counterpart of "[[Cyber Laser Dragon]]".
  ** This monster shares the same [[original ATK and DEF]] (2400/1800) and effect with "Cyber Laser Dragon".
  * This monster has a defensive counterpart: "[[Cyber Stealth Dragon]]".
  ** Both monsters share the same [[Level]] (8), [[Summoning condition]], and requires "[[Cyber Dragon (Rush Duel)|Cyber Dragon]]" in the [[Graveyard]] to use their effect.
  *** Both monsters are also similar to "[[Cyber Search Dragon]]", sharing the Level (8), Summoning condition, and effect requiring "Cyber Dragon" in the Graveyard to use its effect.
  ** Both monsters are the ''Rush Duel'' counterparts of "Cyber Laser Dragon" and "[[Cyber Barrier Dragon]]", which is referenced by the artwork and effect of "Multiple Adapter Unit".
