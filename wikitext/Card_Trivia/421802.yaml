title: Card Trivia:Kumongous, the Sticky String Kaiju
wikitext: |-
  {{Navigation}}

  * This card name is a portmanteau of "Kumo" ("spider" in Japanese) and "humongous".
  * This card's name may refer to [//wikizilla.org/wiki/Kumonga Kumonga], a giant spider [[wikipedia:kaiju|kaiju]] in the ''[[wikipedia:Godzilla (franchise)|Godzilla]]'' franchise.
  * An image of this monster appears in the artwork of "[[The Kaiju Files]]".
  * The tower from the artwork of "[[Kyoutou Waterfront]]" also appears in this card's artwork (in the upper-left corner).
