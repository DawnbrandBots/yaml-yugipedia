title: Card Trivia:Gamushara
wikitext: |-
  {{Navigation}}

  * This is one of very few cards in the TCG which literally keeps the OCG name as its TCG name.
  * This card's artwork is the opposite of that of "[[Gamusharush]]".
  ** The runner and some of the monsters in this card's artwork also appear in the artwork of "[[Overtraining]]".
