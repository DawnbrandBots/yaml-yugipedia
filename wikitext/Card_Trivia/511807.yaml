title: Card Trivia:Despair from the Dark
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Back-Up Rider]]", "[[Battle Route]]", "[[Certain Death Promotion]]", "[[Expendable Dai]]", "[[Return of the Zombies]]", "[[Riot's Reason]]", "[[Staunch Defender]]", and "[[Zombie World]]".
  * This monster has a downgraded form: "[[Fear from the Dark]]".
  ** Either this monster or "Fear from the Dark" appears in the artwork of "[[Slip Summon]]".
  * This monster's silhouette and color scheme bear a striking resemblance to "[[The End of Anubis]]".
  * The demonic creature from the artwork of "[[Fiendsmith's Sequence]]" resembles this monster.
  * In its artwork and the ''[[Yu-Gi-Oh! VRAINS]]'' anime, this monster is depicted without legs, with only its torso visible. The artworks of "Expendable Dai" and "Staunch Defender" give it a set of muscular legs. In all cases, this monster is depicted towering over humans.
  * In ''Yu-Gi-Oh! VRAINS'', this monster was used to torment [[Theodore Hamilton]] when he was locked up in the Lost Incident as a child, which became his major trauma in his adolescence, until he overcame it with [[Flame (character)|Flame]]'s help.
