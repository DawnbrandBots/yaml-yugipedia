title: Card Trivia:Shining Star Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a downgraded [[Tuner monster|Tuner]] [[counterpart]] of "[[Crimson Dragon (card)|Crimson Dragon]]".
  ** This monster's [[Level]] (4) and effect allow it to [[Special Summon]] a [[Level 8]] [[Signer Dragon]] and use it as [[Synchro Material]] (except for the [[Tuner Synchro Monster|Tuner Synchro]] "[[Life Stream Dragon]]") to [[Synchro Summon]] "Crimson Dragon".
  * The background of this card's artwork is a combination of the backgrounds of the visions the [[Signer]]s receive in the ''[[Yu-Gi-Oh! 5D's]]'' anime: The starry night sky is based on that when the Signers receive their vision at the [[Stairway to the Dragon Star]]; the clouds and daylight are based on those seen during the scene where [[Rex Goodwin]] explains the origin of the Signers; and the shooting stars are seen in the visions that the Signers receive from inside the Crimson Dragon.

