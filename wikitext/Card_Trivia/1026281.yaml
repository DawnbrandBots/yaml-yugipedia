title: Card Trivia:Gadget Trio
wikitext: |-
  {{Navigation}}

  * This monster is the combined [[Shining Sarcophagus (series)|Shining Sarcophagus]] [[counterpart]] of "[[Green Gadget]]", "[[Red Gadget]]", and "[[Yellow Gadget]]".
  ** The positioning of the "[[Gadget]]" monsters in this card's artwork is based on a panel in {{chapter|Yu-Gi-Oh!|339|ref}} where "[[Red Gadget (manga)|Red Gadget]]" and "[[Yellow Gadget (manga)|Yellow Gadget]]" have been Summoned by the effect of "[[Ties of the Brethren (manga)|Ties of the Brethren]]", and are shown in front of and below "[[Green Gadget (manga)|Green Gadget]]".
  ** This monster's [[original ATK and DEF]] (1300/1100) is the average of the aforementioned monsters' original ATK and DEFs (3900/3300).
  * This card's artwork has gold and silver swirls in the background, referencing "[[Gold Gadget]]" and "[[Silver Gadget]]."
  ** Like "Gold Gadget" and "Silver Gadget", this monster's first effect activates when it's [[Normal Summon|Normal]] or [[Special Summon]]ed, while its second effect activates when it's [[destroy|destroyed]] by battle or an effect.
