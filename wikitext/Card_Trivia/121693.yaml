title: Card Trivia:Celebration of Creation
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The newborn baby represents the monster that was [[Special Summoned]], which also reflects this card's [[activation condition]].
  **It could be a reference to Nativity
  * In the Japanese version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card could end the turn if the monster was Special Summoned by any card effect; however, in the English-dubbed version, it was described as being activated when the monster was Special Summoned by a [[Spell]]/[[Trap Card]] effect instead.
