title: Card Trivia:Evolsaur Cerato
wikitext: |-
  {{Navigation}}

  * This card is based on the dinosaur ''[[wikipedia:Ceratosaurus|Ceratosaurus]]''.
  * This card's effect is a mix-of-effects of "[[Elemental HERO Stratos]]" and "[[Blackwing - Shura the Blue Flame]]".
  * This card appears in the artwork of "[[Evo-Miracle]]".
  * This card's tail has a double-helix within it.
