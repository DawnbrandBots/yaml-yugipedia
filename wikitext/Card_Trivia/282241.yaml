title: Card Trivia:Pilica, Descendant of Gusto
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[El Shaddoll Fusion]]", "[[Ritual Beast Ambush]]", and "[[Zefra Path]]".
  * This monster's name is derived from "''pirka''", the [[wikipedia:Ainu language|Ainu]] word for "good" or "beautiful".
  ** This explains about this monster's eventual connection with the "[[Ritual Beast Tamer]]s", the "[[Gusto]]" [[archetype]]'s successor, since most of the "[[Ritual Beast]]" monsters' names are based on the Ainu language.
  ** This monster has a [[counterpart]] with reversed [[ATK]] and [[DEF]], "[[Ritual Beast Tamer Wen]]", whose name is derived from "''wen''", the Ainu word for "bad".
  * This monster has a "[[Daigusto]]" [[Synchro]] [[counterpart]]: "[[Daigusto Laplampilica]]".
  * This monster has a "[[Zefra]]"/"[[Ritual Beast Tamer]]" counterpart: "[[Ritual Beast Tamer Zeframpilica]]".
  * This monster is the daughter of "[[Kamui, Hope of Gusto]]" and "[[Reeze, Whirlwind of Gusto]]".
  ** This monster is also one of two odd-[[Level]]ed non-Synchro [[Psychic]] "Gusto" monsters (being Level 3), while "Reeze" is Level 5.
  ** This monster's hair color is similar to that of "Reeze".
  ** This monster's effect is seemingly designed intentionally to make [[Synchro Summon]]ing "[[Daigusto Sphreez]]" easier, which supports this theory further.
  * This monster's staff is the same as the one previously owned by "Kamui, Hope of Gusto", with a wooden statue of "[[Gusto Falco]]" on top of it.
  * This is currently the only non-Synchro Psychic "Gusto" monster with no male counterpart.
  ** This is also the only non-Synchro Psychic "Gusto" monster whose familiar (the green penguin in this card's artwork) hasn't been released as a "Gusto" card. It was instead released as its grown-up version, "[[Spiritual Beast Rampengu]]", both of whom appear in the artwork of "Ritual Beast Tamer Zeframpilica".
  * This monster's hairband is a seashell, representing her friendship with "[[Gishki Emilia]]", who also has a seashell in her artwork. According to the [[Master Guide 4 card storylines]], this monster's hairband was given to her by her best friend from the Gishki, and is seen as a symbol of peace between the previously-warring Gusto and [[Gishki]] tribes. The same seashell is still present in Emilia's adult form, "[[Dance Princess of the Nekroz]]".
