title: Card Trivia:Vision HERO Trinity
wikitext: |-
  {{Navigation}}

  * This monster name is derived from "trinity", a group of three people or things combined into one, which is reflected in this monster's [[Summoning condition]] requiring '''three''' "[[HERO]]" monsters as [[Fusion Material]] and its effect allowing it to make '''three''' attacks per turn.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|053|ref}}, specifically from the panel showing [[Vision Hero Trinity (manga)|this monster]] being Summoned.
