title: Card Trivia:Xyz Double Back
wikitext: |-
  {{Navigation}}

  * "[[Adreus, Keeper of Armageddon]]" and "[[Tiras, Keeper of Genesis]]" appear in this card's artwork.
  * This card appears in the artwork of "[[Overtake Summon]]" and "[[Lightning Quick]]".
  * Similar to how both [[Jaden Yuki]] and [[Zane Truesdale]] used "[[Battle Fusion]]" during Zane's [[Yu-Gi-Oh! GX - Episode 052|graduation match]], [[Yuma Tsukumo|Yuma]] and [[Kite Tenjo|Kite]] use "Xyz Double Back" on the last turn of their rematch.
  * This is one of the selected few cards that features a [[TCG exclusive]] card in an anime, namely "Adreus, Keeper of Armageddon".
