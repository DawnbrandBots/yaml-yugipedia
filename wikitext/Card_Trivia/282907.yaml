title: Card Trivia:Dragocytos Corrupted Nethersoul Dragon
wikitext: |-
  {{Navigation}}

  * "Dragocytos" is a portmanteau of "Dragon" and [[wikipedia:Cocytus|Cocytus]], one of the five rivers of the [[wikipedia:Greek underworld|underworld]] in [[wikipedia:Greek mythology|Greek mythology]].
  ** In the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, this monster was used alongside "[[Spectral Ice Floe]]". According to ''[[wikipedia:Inferno (Dante)|Inferno]]'', the first ''cantica'' of [[wikipedia:Dante Alighieri|Dante Aligheri]]'s ''[[wikipedia:Divine Comedy|Divine Comedy]]'', Cocytus is the ninth and lowest circle of [[wikipedia:Hell|Hell]] where the condemned souls of traitors are sent to a frozen lake and buried in ice in a varying degree, depending on the types of traitorous deeds they committed in life.
  * This monster is the evolved form of "[[Dragonecro Nethersoul Dragon]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|049|ref}}, specifically from the panel showing [[Underworld Flood Dragon Dragocutos (manga)|this monster]] being Summoned.
