title: Card Trivia:Shining Sly
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "sly", a word describing a cunning and deceitful nature.
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster is Summoned, an evil-looking imp appears from its robes. This, and the above-mentioned fact represent the true nature of its owner, [[Vector|Ray Shadows]], whose bright and happy demeanor is a "sly" façade for his darker and duplicitous nature.
