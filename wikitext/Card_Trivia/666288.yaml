title: Card Trivia:Ancient Warriors Saga - Three Visits
wikitext: |-
  {{Navigation}}

  * This card's name and artwork references the [[wikipedia:List of fictitious stories in Romance of the Three Kingdoms|three visits]], an important and iconic event in ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]''. During this event, [[wikipedia:Zhang Fei|Zhang Fei]], [[wikipedia:Liu Bei|Liu Bei]], and [[wikipedia:Guan Yu|Guan Yu]] travel thrice to the thatched cottage of [[wikipedia:Zhuge Liang|Zhuge Liang]] in Longzhong in order to recruit him as a strategist.
  ** Fittingly, "[[Ancient Warriors - Valiant Zhang De]]", "[[Ancient Warriors - Virtuous Liu Xuan]]", and "[[Ancient Warriors - Loyal Guan Yun]]" (who are based on Zhang Fei, Liu Bei, and Guan Yu, respectively) appear in this card's artwork. Moreover, "[[Ancient Warriors - Ingenious Zhuge Kong]]" (who is based on Zhuge Liang) can be easily Special Summoned after adding it to the hand with this card's effect.
