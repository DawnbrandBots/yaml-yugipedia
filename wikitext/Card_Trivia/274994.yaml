title: Card Trivia:Brotherhood of the Fire Fist - Rhino
wikitext: |-
  {{Navigation}}

  * In the ''OCG'', this monster is named after ''[[wikipedia:Suo Chao|Suo Chao]]'' (read in Japanese as Saku Chō) and "rhinoceros" (sai).
  ** ''Suo Chao'' ranks 19th of the 36 Heavenly Spirits of the 108 [[wikipedia:Water Margin|Liangshan heroes]] and is nicknamed "Impatient Vanguard".
  * The kanji 空 on the rhino in this card's artwork means "void/sky".
  * This monster appears in the artwork of "[[Fire Formation - Kaiyo]]".
