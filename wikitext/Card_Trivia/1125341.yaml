title: Card Trivia:Link Devotee
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] to "[[Link Disciple]]":
  ** Both are [[Link-1]] [[Cyberse]] monsters that require a [[Level 4]] or lower Cyberse monster to [[Link Summon]].
  ** Both share a similar naming pattern, which starts with the word "Link", followed by another word synonymous with a strong believer in a particular religion.
  ** Both monsters feature opposite [[Link Arrow]]s, allowing them to use their effects in tandem: this monster requires being [[Tribute]]d while [[co-linked]], while "Link Disciple" requires Tributing a monster it points to.
  *** This was demonstrated in their debut episode, {{episode|VRAINS|035|ref}}, when [[Yusaku Fujiki|Playmaker]] Tributed this monster to [[activate]] the effect of "Link Disciple".
