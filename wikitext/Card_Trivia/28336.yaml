title: Card Trivia:Paladin of the Cursed Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[Zombie counterpart]] of "[[Paladin of White Dragon]]".
  ** Despite its Japanese name being "Black Knight of Dark Dragon", the knight in this card's artwork retains the white and gold armor and [[LIGHT]] [[Attribute]] of "Paladin of White Dragon".
