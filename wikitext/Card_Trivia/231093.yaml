title: Card Trivia:Miracle Sword
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is one of the few and rare instances in which it allows a Spell Card other than a Quick-Play Spell to be activated during a phase (Battle Phase in this case) in which it is normally not allowed. The other instance is "[[Intervention of Fate]]". Another is "[[Spell Sanctuary]]", except this one allows Spell Cards to be activated in a trap-like manner.
