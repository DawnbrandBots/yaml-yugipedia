title: Card Trivia:Naglfar, Generaider Boss of Fire
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Generaider Boss Fight]]".
  * The symbol from the artwork of "[[Generaider Boss Stage]]" appears in this card's artwork (although the lower left circle is highlighted yellow).
  * This monster is based on [[wikipedia:Naglfar|Naglfar]], a boat of Muspelheim made entirely from the fingernails and toenails of the dead from [[wikipedia:Norse mythology|Norse mythology]]. It is said that at the time of [[wikipedia:Ragnarök|Ragnarök]], [[wikipedia:Loki|Loki]] will take the helm of Naglfar to lead the army of Muspelheim against the gods.
  ** The symbol from the artwork of "Generaider Boss Stage" that appears in this card's artwork is based on [[wikipedia:Muspelheim|Muspelheim]], which is home to the fire giants.
  ** This monster's appearance may also be a reference to the realm's ruler, the fire giant [[wikipedia:Surtr|Surtr]].
