title: Card Trivia:Chaos Archfiend
wikitext: |-
  {{Navigation}}

  * "[[Dark Beast Token]]" and "[[Light Beast Token]]" appear in this card's artwork.
  * This monster is a counterpart of "[[Chaos Goddess]]".
  ** Both share the same [[Level]] (8) and [[original ATK and DEF]] (2500/1800).
  ** This monster's [[Attribute]] ([[DARK]]) and [[Type]] ([[Fiend]]) is the opposite of the Attribute ([[LIGHT]]) and Type ([[Fairy]]) of "Chaos Goddess".
  ** Both monsters' designs feature one white wing and one black wing, a similarly-shaped staff and an inverted color scheme.
