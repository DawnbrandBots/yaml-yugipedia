title: Card Trivia:Samurai Sword Baron
wikitext: |-
  {{Navigation}}

  * This card seems to be a [[counterpart]] of "[[Jutte Fighter]]".
  ** Both cards are used by [[Tetsu Trudge]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, and have effects to change the [[battle position]] of an opponent's monster that each target a different battle position
  ** Coincidentally, you can use both cards to [[Synchro Summon]] "[[Goyo Guardian]]", another card used by Trudge in the in the ''Yu-Gi-Oh! 5D's'' anime.
