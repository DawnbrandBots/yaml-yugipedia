title: Card Trivia:Zenna-no-Tsuinagihime
wikitext: |-
  {{Navigation}}

  * This monster's name features multiple layers of wordplay:
  ** "Zenna" (ぜんな) refers to [[wikipedia:Dhyana in Buddhism|meditation in Buddhism]].
  ** "Tsuinagi" (ついなぎ) is a compound wordplay combining the Japanese words "追儺" (''Tsuina''), a New Year ritual to drive away demons and misfortune; "繋ぎ" (''Tsunagi''), linking or binding; and "儺戯" (''Nagi''), the Japanese term for [[wikipedia:Nuo theatre|Nuo theater]], a form of ritual performance.
  ** Overall, this monster's name suggests an ancient ceremony in which young girls (''Hime'', lit. "princesses") are controlled and used like ritual puppets, which aligns with both its design and effects:
  *** The monster's [[Type]] is [[Machine]], and is depicted as five young girls connected by strings, strongly implying that they are controlled like puppets.
  *** Despite being a [[Link 5 Monster Cards|Link 5]] monster, it has 0 [[ATK]] (the lowest among all Link-5 monsters), has no protection effects, and functions mainly as an extender to build into a stronger board.
  *** This design reflects the idea that, in ancient rituals, sacrifices are made for the greater good, echoing the ethical concept of [[wikipedia:Tyāga|Tyāga]] in Buddhism.
