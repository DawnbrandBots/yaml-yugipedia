title: Card Trivia:D.D. Patrol Plane
wikitext: |-
  {{Navigation}}

  * This card shares similarities with "[[D.D. Scout Plane]]":
  ** They have the same [[Attribute]] and [[Type]].
  ** They have opposite [[ATK]] and [[DEF]] to each other.
  ** They both have a similar effect.
  *** Fittingly, the main body of "D.D. Scout Plane" can be seen on the underside of this monster.
