title: Card Trivia:Swordsoul of Mo Ye
wikitext: |-
  {{Navigation}}

  * This card is named after the myth of [[wikipedia:Chinese swords|Gan Jiang and Mo Ye]]. The swords they smithed is said to represent love.
  * This monster has an evolved "[[Icejade]]" version: "[[Icejade Creation Aegirocassis]]".
  * This monster appears in the artwork of "[[Swordsoul Emergence]]".
  ** Her sword appears being held by "[[Swordsoul Strategist Longyuan]]" in the artwork of "[[Icejade Erosion]]".
  * This monster's sword guard is modeled after [[wikipedia:Strongylodon macrobotrys|jade vines]], according to her concept art.
