title: Card Trivia:Armatos Legio Segmentata
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is named after the ''[[wikipedia:Lorica segmentata|lorica segmentata]]'', a type of [[wikipedia:Personal armour|personal armour]] used by soldiers of the [[wikipedia:Roman Empire|Roman Empire]], consisting of metal strips fastened to internal leather straps.
