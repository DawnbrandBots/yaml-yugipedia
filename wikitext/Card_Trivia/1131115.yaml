title: Card Trivia:Radiant Typhoon Mandate
wikitext: |-
  {{Navigation}}

  * "[[Radiant Typhoon Varuroon, the Vibrant Vortex]]" and several "[[Mystical Space Typhoon]]" appear in this card's artwork.
  * This card's "once per [[Chain]]" effect likely references the popular "MST [[negate]]s" joke,  where novice players believe that using "[[Mystical Space Typhoon]]" to [[destroy]] a [[Spell]]/[[Trap Card]] on the [[field]] also negates its effects.
