title: Card Trivia:Astrograph Sorcerer
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Pendulum Evolution]]'' and ''[[Creation Pack 02]]'', and is also one of the cover cards of ''[[Pendulum Evolution]]'' and ''[[2025 Mega-Pack Tin]]''.
  * This monster appears in the artwork of "[[Star Pendulumgraph]]".
  * This monster is named after an [[wikipedia:Astrograph|astrograph]], a [[wikipedia:Telescope|telescope]] designed for projecting altitude curves of the [[wikipedia:Star|stars]] and [[wikipedia:Planet|planets]] onto [[wikipedia:Star chart|charts]] or plotting sheets.
  * This monster is the combined form of "[[Stargazer Magician]]" and "[[Timegazer Magician]]", as shown in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's name and appearance both reference "Stargazer Magician".
  *** This monster's robe and the background of this card's artwork feature a cosmic-like pattern, further referencing outer space and "Stargazer Magician".
  ** This monster has two counterparts, which are also combined forms of the two "[[Magician]]s" as well:
  *** "[[Chronograph Sorcerer]]" (referencing "Timegazer Magician")
  *** "[[Timestar Magician]]" (referencing both "Stargazer Magician" and "Timegazer Magician")
  * This monster has 2 [[retrained]] counterparts: "[[Supreme King Gate Magician]]" and "[[Astrograph Sorcerer, the Star Magician]]".
  * In the ''Yu-Gi-Oh! ARC-V'' anime, [[Astrograph Magician (anime)|this card]] was an [[Effect Monster]] due to it already existing before the creation of [[Pendulum Summon]]ing. Since its [[Stargazer Magician (anime)|two]] [[Timegazer Magician (anime)|parts]] were transformed into [[Pendulum Monster]]s, it is more fitting for this card to be a Pendulum Monster as well after its "reformation", in the ''[[OCG]]''/''[[TCG]]''.
