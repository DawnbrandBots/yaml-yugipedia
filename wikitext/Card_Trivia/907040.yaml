title: Card Trivia:Dolphin Counterattack
wikitext: |-
  {{Navigation}}

  * "[[Battle Shark Samegalon]]" and "[[Dolphin King Iruqua]]" appear in this card's artwork.
  * This card's Japanese name, "Dolphin Counter" (イルカウンター ''Irukauntā'') is a portmanteau of the Japanese word for "dolphin" (イルカ, ''iruka'') and "counter" (カウンター ''kauntā'').
