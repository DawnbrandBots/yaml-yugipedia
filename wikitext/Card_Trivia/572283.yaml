title: Card Trivia:Dakki, the Graceful Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Mayakashi Return]]" and "[[Ghost Meets Girl - A Shiranui's Story]]".
  * "[[Yoko, the Graceful Mayakashi]]" is the Synchro counterpart of this card.
  * This monster could be based on [[wikipedia:Daji|Daji]], who was the favorite consort of [[wikipedia:King Zhou of Shang|King Zhou of Shang]], the last king of the [[wikipedia:Shang dynasty|Shang dynasty]] of ancient China. In Chinese mythology, Daji is usually portrayed as a malevolent [[wikipedia:Huli jing|Fox spirit]].
