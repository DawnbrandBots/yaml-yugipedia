title: Card Trivia:Deep Diver
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Escape Lure]]".
  * This monster's [[WATER]] [[Attribute]] and design are based on a [[wikipedia:Scuba diving|scuba diver]], with this monster's outfit based on the [[wikipedia:Standard diving dress|Rouquayrol-Denayrouze standard diving dress]], one of the earliest known Scuba diving gear.
  ** This monster's WATER Attribute and [[Aqua]] [[Type]] reference its owner, [[Adrian Gecko]], who used the "[[Cloudian]]" [[archetype]], which consists of mostly WATER monsters based on clouds, the aerosol form of evaporated water.
