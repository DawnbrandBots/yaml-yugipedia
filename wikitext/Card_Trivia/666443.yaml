title: Card Trivia:Oneiros, the Dream Mirror Erlking
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dream Mirror Phantasms]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Neiroy, the Dream Mirror Disciple]]".
  ** This monster is named after an [[wikipedia:Oneiros|Oneiros]], the personification of a dream in [[wikipedia:Greek mythology|Greek mythology]].
  ** It is also named after an [[wikipedia:Erlking|Erlking]], a spirit or "king of the fairies" in [[wikipedia:German Romanticism|German Romanticism]].
  * This monster has a [[DARK]] [[counterpart]]: "[[Oneiros, the Dream Mirror Tormentor]]".
  ** Both have the same [[Level]] (10) and [[ATK]]/[[DEF]] (3000/3000), but opposite original [[Attribute]]s and opposite [[Type]]s ([[Fairy]] and [[Fiend]]).
