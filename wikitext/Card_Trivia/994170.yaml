title: Card Trivia:Hydro Sword Tanegashima Tuna
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (タネガシマグロ, ''Tanegashimaguro'') is a portmanteau of ''[[wikipedia:Tanegashima (gun)|tanegashima]]'' and the Japanese word for "tuna" (マグロ, ''maguro'').
  ** Fittingly, this monster is wielding a ''tanegashima'', a matchlock-configured firearm used by the samurai and their foot soldiers during the [[wikipedia:Sengoku period|Sengoku]] and [[wikipedia:Edo perido|Edo periods]] of Japan.
