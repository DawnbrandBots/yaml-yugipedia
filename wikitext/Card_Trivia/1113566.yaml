title: Card Trivia:Defense of the Temple
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * "[[Cup of Sealed Soul]]" appears in this card's artwork.
  ** This card's artwork is based on a scene during [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] and [[Rishid (manga)|Rishid's]] [[Katsuya Jonouchi and Rishid's Duel (manga)|Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (and its [[Joey Wheeler and Odion's Duel|counterpart]] in the [[Yu-Gi-Oh! (anime)|anime]]), where the "Cup of Sealed Soul" billows out purple smoke while the two glowing orbs representing the eyes of "[[Mystical Beast of Serket]]" manifest inside that smoke.
  ** This card's name and effect to [[Fusion Summon]] an [[EARTH]] [[Fusion Monster]] references the effect of "Cup of Sealed Soul" in the manga and anime, which allows the player to [[Special Summon]] "Mystical Beast of Serket" (an EARTH monster in the ''[[OCG]]''/''[[TCG]]''), which is considered to be the guardian of the treasure inside "[[Temple of the Kings]]".
  *** This is also based on a trend from the ''Yu-Gi-Oh!'' manga where certain monsters (i.e. [[Ritual Monster]]s) were not physical cards before their release in the ''OCG''/''TCG'', but could be [[Special Summon]]ed using the required [[Spell Card]]s.
  * This card's effect [[search]]es "[[Dangers of the Divine]]", which allows the player to [[Tribute]] a monster and [[Special Summon]] "[[The Winged Dragon of Ra]]" if they [[control]] "Temple of the Kings". This references the how "Mystical Beast of Serket" was Tributed to Summon "Ra" via the final effect of "Temple of the Kings" in the ''Yu-Gi-Oh!'' manga and anime, whereas "[[Divine Scorpion Beast of Serket]]" (the upgraded Fusion form of "Mystical Beast of Serket") can be Summoned via this card's effect and be used to Summon "Ra".

