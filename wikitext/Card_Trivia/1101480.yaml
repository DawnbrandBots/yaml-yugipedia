title: Card Trivia:Comeback
wikitext: |-
  {{Navigation|mode=nongame}}

  * The purple warrior in this card's artwork also appears in the artworks of "[[Battle Rush]]", "[[Cross Attack]]", "[[Courageous Heart]]", "[[Dimension Gate]]", "[[Double Tension]]", "[[Fiery Fervor]]", "[[Full-Force Strike]]", and "[[Heartfelt Appeal]]", all of which are used by [[Yuma Tsukumo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** The female warrior in this card's artwork (visible by her arm only) also appears in the artworks of "[[Cross Attack]]" and "[[Vector Change]]".
  * While this card's effect reflects its name (a monster "comes back" to its owner), in the ''Yu-Gi-Oh! ZEXAL'' anime, [[Yuma Tsukumo]] has always used it to make a "comeback" by regaining control of "[[Number 39: Utopia (anime)|Number 39: Utopia]]" from his opponent before using it to [[Xyz Summon]] "[[Number C39: Utopia Ray (anime)|Chaos Number 39: Utopia Ray]]" and win his Duels.
