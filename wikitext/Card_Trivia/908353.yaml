title: Card Trivia:Fallen of Argyros
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Blink Out]]".
  * This monster is the result of the energy of every "[[Spright]]" from the battle of Golgonda possessing the remains of "[[The Bystial Alba Los]]".
  ** This monster is wearing the cloak of "[[Spright Sprind]]" and holding the necklace of "[[Springans Captain Sargas]]".
  * The card's name is a reference to "[[Endless Engine Argyro System]]" and "[[Fallen of Albaz]]".
