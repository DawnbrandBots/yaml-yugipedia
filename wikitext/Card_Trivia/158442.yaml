  * This card refers to a tag team match in wrestling where partners tag in and out of the ring.
  * The wrestler at ringside trying to be tagged in has a strong resemblense to WWE superstar [[wikipedia:Rey Mysterio, Jr.|Rey Mysterio]] the other wrestler who is trying to tag the other wrestler looks like [[wikipedia:William Regal|William Regal]]
