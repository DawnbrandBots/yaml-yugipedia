title: Card Trivia:Give and Take
wikitext: |-
  {{Navigation}}

  * "[[Junk Synchron]]", "[[Junk Warrior]]", and a [[Duelist]] appear in this card's artwork.
  ** This is one of two cards that feature both "Junk Synchron" and "Junk Warrior" in its artwork but not feature "[[Speed Warrior]]", the other being "[[Synchro Spirits]]".
  * This card has a ''[[Rush Duel]]'' [[counterpart]]: "[[Gig and Take]]".
