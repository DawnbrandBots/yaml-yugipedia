title: Card Trivia:Flash Fusion
wikitext: |-
  {{Navigation}}

  * This card appears in the international anime artwork of "[[Convert Contact]]".
  * This card is the [[Fusion Summon]] [[counterpart]] of "[[Urgent Tuning]]", "[[Urgent Link]]", and "[[Wonder Xyz]]".
  * This card's ''[[TCG]]'' name is different from its Japanese name ("Instantaneous Fusion") due to "[[Instant Fusion]]" being released before this card.
