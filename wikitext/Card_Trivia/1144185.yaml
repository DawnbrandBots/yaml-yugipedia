title: Card Trivia:One-Way Synchro
wikitext: |-
  {{Navigation}}

  [[File:Yusei drives upwards.png|thumb|right|250|[[Yusei]] drives ''[[Yusei Go]]'' upwards.]]
  * [[Yusei Fudo]] riding his [[Duel Runner]], ''[[Yusei Go]]'', appear in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|5D's|154|ref}}, where Yusei drives the ''Yusei Go'' upwards along a crane during the beginning of his final turn in the Duel against [[Jack Atlas]].
  * This card's name is a pun on "[[wikipedia:Runway|runway]]" (an leveled strip of smooth ground designed for the takeoff and landing of aircraft) or "one-way" (referring to either a [[wikipedia:One-way traffic|one-way street]] where traffic moves towards one direction), which reflects its effect to either add a [[Level 1]] [[Tuner monster]] to the player's [[hand]] (landing) or [[Special Summon]] it from their Deck or Graveyard to the [[field]] (takeoff).
  ** This card's name is also a reference to the fifth Japanese opening of the ''[[Yu-Gi-Oh! 5D's]]'' anime, ''[[Road to Tomorrow ~Going My Way!!~]]'', which plays during the scene mentioned above, where Yusei uses the crane as a makeshift runway and takes off into the air before declaring an attack with "[[Junk Warrior (anime)|Junk Warrior]]".
  ** This card's name is also a reference to the lyrics from the insert song ''[[Clear Mind (song)|Clear Mind]]'', which also plays during the same episode: ''Drive on, it's a one way road where you can't turn back''.

