title: Card Trivia:Gladiator Beast Tamer Editor
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of an [[wikipedia:Tame animal|animal tamer]], (a person who trains wild animals into tolerating the human presence) and an ''[[wikipedia:List of Roman gladiator types#Editor|editor]]'' (a sponsor who financed gladiatorial spectacles in [[wikipedia:Ancient Rome|Ancient Rome]]).
  ** This naming scheme reflects the roles of [[Sanders]], who uses this monster in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  *** This monster's title as "tamer" reflects Sanders' role as the trainer of [[Battle Beast]], who uses the "[[Gladiator Beast]]" [[archetype]]. In the anime, this monster is [[Fusion Summon]]ed using "[[Test Ape (anime)|Test Ape]]" and "[[Test Tiger (anime)|Test Tiger]]" as [[Fusion Material]], and uses its whip when its [[Special Summon]]ing and damaging effects are [[activate]]d, reflecting Sanders' absolute authority over Battle Beast by using intimidation to control his sheer hostility.
  *** This monster being named after an ''editor'' reflects how Sanders oversees the [[Survival Duel (ARC-V)|Survival Duel]] at [[Duel Academy (ARC-V)|Duel Academy]] where he pits his students and Battle Beast against the [[Lancers]] in an indoor arena, similar to how the gladiator matches (the basis of the "Gladiator Beast" archetype) took place in the [[wikipedia:Colosseum|Colosseum]] in Ancient Rome.
  * This monster has the highest [[original DEF]] (3000) of all "Gladiator Beast" monsters.
