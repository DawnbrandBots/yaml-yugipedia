title: Card Trivia:Swift Birdman Joe
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Icarus Attack]]".
  * This monster appears to be connected to the "[[Harpie]]" [[archetype]].
  ** It debuted alongside "[[Harpie's Pet Baby Dragon]]" in the [[Core Booster|Core Booster pack]], ''[[Enemy of Justice]]''.
  ** Its design shares similarities with "[[Harpie Lady 1]]", "[[Harpie Lady 2]]", and "[[Harpie Lady 3]]", including being humanoid monsters with [[wikipedia:Bird of prey|raptor]]-like claws (for its hands and feet), pointed ears, wings, and [[wikipedia:Stirrup pants|stirrup leggings]]. Also, the background of this card's artwork features twinkling lights, similar to those seen in the background of the artworks of the three aforementioned "Harpie" monsters.
  ** The word "Birdman" may be a reference to "[[Sky Scout|Harpie's Brother]]", whose Japanese name is "Birdman" (albeit translated differently). That monster has since been renamed to "Sky Scout" in the ''[[TCG]]'', since it is not technically a "Harpie" monster.
  *** This reference to "Harpie's Brother" is likely intentional, since the ''TCG'' name gaffe was also referenced when that monster was reprinted in ''[[Advanced Tournament Pack 2013 Vol.1]]'' (a Japanese product), alongside "[[Harpie's Pet Dragon]]" and "[[Hysteric Party]]", to accommodate the new "Harpie" [[support]] in the upcoming Core Booster pack at the time, ''[[Lord of the Tachyon Galaxy]]'', even though it wasn't technically a "Harpie" monster.
