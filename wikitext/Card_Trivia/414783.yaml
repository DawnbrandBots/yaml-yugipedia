  * This card is based on the flying broomstick from ''[[wikipedia:The Wizard of Oz|The Wizard of Oz]]'' and the [[wikia:w:c:starwars:Scimitar|Scimitar Sith Infiltrator]] from ''[[wikipedia:Star Wars|Star Wars]]''.
  * This is the first "[[Kozmo]]" card to become [[Limited]].
