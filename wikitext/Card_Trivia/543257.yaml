title: Card Trivia:The Door of Destiny
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Overlay Universe Emperor's Door Pack]]''.
  * This door appears in the artwork of "[[The Deal of Destiny]]".
  * This card is the embodiment of [[The Door]], a diabolical gateway from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]].
  ** In {{episode|ZEXAL|146|ref}}, The Door spoke to [[Yuma Tsukumo]] through this card after it was [[Special Summon]]ed as a monster.
