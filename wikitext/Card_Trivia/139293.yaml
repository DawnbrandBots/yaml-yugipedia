title: Card Trivia:Double Attack (Team Strike)
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Masked Hero Dusk Crow]]" and "[[Masked Hero Inferno]]" appear in this card's artwork.
  ** This card's name and artwork reference the double attacks used together by Kamen Rider Ichigo and Kamen Ride Nigo in the [[Wikipedia:Kamen Rider|titular franchise]].
