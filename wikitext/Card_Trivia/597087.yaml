title: Card Trivia:Tesseract Hydradrive Monarch
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is named after a [[wikipedia:Tesseract|tesseract]], a four-dimensional analogue of a cube in geometry.
  ** This concept is reflected in this monster's [[Link Rating]] (4), its [[Summoning condition]] requiring four "[[Hydradrive]]" [[Link Monster]]s as [[material]], its effect surrounding four different [[Attribute]]s.
