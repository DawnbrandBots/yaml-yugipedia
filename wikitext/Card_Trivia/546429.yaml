title: Card Trivia:Formud Skipper
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "[[wikipedia:Format|format]]" and "[[wikipedia:mudskipper|mudskipper]]".
  ** A mudskipper is a species of amphibious fish with eyes raised on the bumps on its head that inhabit coastal mangroves or mudflats.
  ** Formatting in computing is a defined structure for the processing, storage, or display of data, which reflects its effect to change the "format" of its name, [[Type]], and [[Attribute]] as the [[reveal]]ed [[Link Monster]] in the [[Extra Deck]].
  * This monster has a [[DARK]] [[counterpart]]: "[[Template Skipper]]".
  ** Both share the same [[Level]] (1), Type ([[Cyberse]]), and [[original ATK and DEF]] (0/0).
  ** Both have an effect that allows them to be treated with a different name when used as [[Link Material]]: This monster copies the name of a [[Link Monster]] in the [[Extra Deck]], while "Template Skipper" copies the name of a Cyberse monster in the [[hand]] or [[Graveyard]].
