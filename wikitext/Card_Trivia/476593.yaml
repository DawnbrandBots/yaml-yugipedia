title: Card Trivia:Performapal Gatlinghoul
wikitext: |-
  {{Navigation}}

  * This monster resembles [[wikipedia:Dr. Jekyll and Mr. Hyde (character)|Mr. Hyde]], a character from [[wikipedia:Robert Louis Stevenson|Robert Louis Stevenson]]'s novel, ''[[wikipedia:Strange Case of Dr Jekyll and Mr Hyde|Dr. Jekyll and Mr. Hyde]]'', who serves the evil alter ego of Dr. Jekyll, the central character of the story.
  ** Mr. Hyde represents Dr. Jekyll's inner evil, who appears as a monster resembling a [[wikipedia:ghoul|ghoul]]. This reflects how [[Yuya Sakaki]], the central character of the ''[[Yu-Gi-Oh! ARC-V]]'' anime, first Summons this monster while [[Z-ARC]], the central antagonist of the anime, was [[Awakened|awakening]] from within Yuya's body.
  * This monster's weapon is based on a [[wikipedia:Gatling gun|Gatling gun]], a rapid-firing, multi-barrel firearm invented by [[wikipedia:Richard Jordan Gatling|Richard Jordan Gatling]]. The Gatling gun's power is reflected in this monster's effect to [[destroy]] an opponent's monster and inflict damage to the opponent equal to that destroyed monster's [[ATK]].
  * This monster and "[[Performapal Nightmare Knight]]" are the only "[[Performapal]]" monsters to be portrayed as "evil" monsters.
  ** Fittingly, both monsters were used by Yuya Sakaki while Z-ARC was awakening from within his body in the ''Yu-Gi-Oh! ARC-V'' anime.
  * This is the first [[Extra Deck]] "Performapal" monster in the ''Yu-Gi-Oh! ARC-V'' anime, as well as the first [[Fusion Monster]] used by Yuya Sakaki to not be related to "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]".
  ** In the anime, however, this monster was [[Fusion Summon]]ed using "Odd-Eyes Pendulum Dragon" as [[Fusion Material]].
