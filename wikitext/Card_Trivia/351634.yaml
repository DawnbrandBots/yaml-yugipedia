title: Card Trivia:Risebell the Summoner
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Wavering Eyes]]".
  * "[[Hypnosister]]", "[[Saambell the Summoner]]" and "[[Trancefamiliar]]" appear in this card's artwork.
  ** This card's artwork depicts "Hypnosister" hiding in the bushes behind "Trancefamiliar", similar to how the former appears behind the latter in its respective card artwork.
  * This monster has two corrupted counterparts: "[[Risebell the Star Adjuster]]" and "[[Risebell the Star Psycher]]".
  ** The artwork of "Wavering Eyes" depicts this monster's transformation into "Risebell the Star Adjuster" by "Hypnosister".
  * This is the first [[Psychic]] [[Normal Monster]].
