title: Card Trivia:Quiz Action - Trivia for 300
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's question is based on a pun: in Japanese, ''Nuki'' in "Tanuki" (the Japanese raccoon dog) can also mean "to leave out", and "treasure" is written as ''Ta'''kara'''''; ''Kara'' means "empty". The correct answer is therefore "nothing".
