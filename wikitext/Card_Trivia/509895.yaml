title: Card Trivia:Destiny HERO - Defender
wikitext: |-
  {{Navigation}}

  * This monster has two "[[Elemental HERO]]" counterpart: "[[Elemental HERO Clayman]]" and "[[Elemental HERO Clay Guardian]]".
  ** The three monsters' appearances feature a rock-like appearance, where [[Rock]] monsters are commonly associated with high [[DEF]].
  ** The three monsters' [[original ATK and DEF]] add up to the sum of 2800.
  ** Both "Defender" and "Clay Guardian" feature helmets resembling protective sport-gear in their designs.
  * This monster has the highest original DEF (2700) of all [[Level 4]] monsters that can be [[Normal Summon]]ed.
