title: Card Trivia:Prepare to Strike Back
wikitext: |-
  {{Navigation}}

  * "[[Goblin Attack Force]]" and "[[Marauding Captain]]" appear in this card's artwork.
  ** The events of this card's artwork are followed by that of "[[Assault on GHQ]]".
  * This card's artwork and effect may be a reference to the portrayal of "[[Goblin Attack Force (anime)|Goblin Attack Force]]" in the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, where they are depicted as falling asleep after their effect to switch themselves to Defense Position activates following an attack.
