title: Card Trivia:Hidden Passage
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Dark Scorpion - Chick the Yellow]]" appear's in this card's artwork.
  * This card's video game effect to allow the player's [[Level 2]] or lower [[Spellcaster]] monster to attack the opponent directly is an altertion of its effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which allows Level 2 or lower monsters to attack directly. In {{episode|5D's|114|ref}}, [[Lazar]] [[activate]]s this card while he [[control]]led "[[Jester Queen (anime)|Jester Queen]]", a Level 2 Spellcaster monster.
