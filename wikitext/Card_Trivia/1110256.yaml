title: Card Trivia:Dracotail Arthalion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Justice Hunters]]''/''[[Justice Hunters]]''.
  * This monster is the combined [[Fusion Monster|Fusion]] form of "[[Dracotail Lukias]]" and "[[Dracotail Pan]]". 
  ** The [[Wikipedia:Astrological sign|astrological signs]] of the aforementioned monsters, [[wikipedia:Cancer (astrology)|Cancer]] and [[wikipedia:Capricorn (astrology)|Capricorn]] respectively, are opposing signs in the [[Wikipedia:Astrological sign#Western zodiac signs|Western Zodiac]]. Fittingly, the aforementioned monsters also have opposite [[Attribute]]s, [[EARTH]] and [[WIND]] respectively.
