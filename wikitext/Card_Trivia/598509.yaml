title: 'Card Trivia:Number 97: Draglubion'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster is a counterpart to "[[Number 46: Dragluon]]", with same [[Rank]], [[Type]], [[ATK]], [[DEF]], similar overall design, and an effect that supports [[Dragon]]s.
  ** This card's Japanese name contains "龍影神" (''Ryūeishin''), whereas the name of its counterpart "Dragluon" contains "神影龍" (''Shin'eiryū''). These are palindromes of each other.
  * This card is the 97th member of the original 100 "[[Number]]s" to be revealed.
  * This card's Japanese name is a combination of "dragon" and the "[[wikipedia:Graviton|graviton]]", a hypothetical [[wikipedia:elementary particle|elementary particle]]. This card's ''TCG'' names are instead a combination of "dragon", the prefix "bi-" (meaning "two") and "[[wikipedia:Gluon|gluon]]", another elementary particle.
  ** The name of its counterpart "Dragluon" is also based on the gluon.
  ** This is fitting, as the "[[Galaxy-Eyes]]" monsters are also based on particles.
  * This card resembles a [[wikipedia:Chinese dragon|Chinese dragon]].
  * This monster is one of the [[cover card]]s of ''[[Collection Pack: Duelist of Revolution Version]]''/''[[Battles of Legend: Hero's Revenge]]''.
