title: Card Trivia:Dark Soul Token
wikitext: |-
  {{Navigation}}

  * This [[Token Monster|Token]] is based on the "Dark Soul", the stolen soul of a monster that battled with "[[Underworld Dragon Dragonecro (manga)|Underworld Dragon Dragonecro]]" (known as "[[Dragonecro Nethersoul Dragon]]" in the ''[[TCG]]'') in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This card's ''[[OCG]]''/''TCG'' artwork (which depicts this Token as a shadowy "[[Mighty Warrior]]") is taken from {{chapter|5D's|003|ref}}, specifically from the panel showing the "Dark Soul" being created by "Underworld Dragon Dragonecro" after stealing the soul of "[[Mighty Warrior (manga)|Mighty Warrior]]".
  ** In video games prior to the ''OCG'' release of the Token Card, such as ''[[Yu-Gi-Oh! Duel Arena]]'' and ''[[Yu-Gi-Oh! Duel Links]]'', this Token just has the same artwork as "Dragonecro" instead.
  *** After the release of the "Dark Soul Token" card in the ''OCG'', its artwork in ''Yu-Gi-Oh! Duel Links'' was updated to use the Token's artwork.
