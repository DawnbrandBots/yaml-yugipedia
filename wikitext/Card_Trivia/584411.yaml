  [[File:Aster with this Destiny HERO monsters.png|thumb|right|300px|[[Aster Phoenix]] with his "[[Destiny HERO]]" monsters.]]
  * "[[Clock Tower Prison]]", "[[Destiny HERO - Captain Tenacious]]", "[[Destiny HERO - Diamond Dude]]", "[[Destiny HERO - Doom Lord]]", and "[[Destiny HERO - Dreadmaster]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|059|ref}} where [[Aster Phoenix]] is seen [[control]]ling the aforementioned cards during his Duel against [[Jaden Yuki]]; however, "[[Clock Tower Prison (anime)|Clock Tower Prison]]" had been [[destroy]]ed prior to the scene.

