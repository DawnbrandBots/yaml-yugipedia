title: Card Trivia:Phoenix Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragon's Return]]" and "[[Dragonic Advanced Return]]".
  * This monster has an evolved form, "[[Phoenix Dragoon]]", whose [[Level]] (4) and [[original ATK and DEF]] (1000/1000) are twice those of this monster's.
  * This monster has a [[counterpart]] combined with "[[Mystic Dealer]]": "[[Phoenix Dealer]]".
