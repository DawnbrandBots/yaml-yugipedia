title: Card Trivia:Abyss-scale of Cetus
wikitext: |-
  {{Navigation}}

  * This armor appears in the artwork of "[[Mermail King - Neptabyss]]".
  * This card's name is based on [[wikipedia:Cetus (mythology)|Cetus]] (κῆτος), a large whale-like sea monster from Greek mythology.
  * This armor's violet color scheme and this card's effects reference how [[Trap Card]]s feature a violet card border.
