title: Card Trivia:Laval Magma Cannoneer
wikitext: |-
  {{Navigation}}
  * Each cannon on its shoulders represents its effect of shooting 500 damage '''twice''' per turn.
  * This card has a similar appearance to "[[Genex Ally Bellflame]]".
  * This is the first "[[Laval]]" monster to be released in the TCG (and legal for tournament play).
