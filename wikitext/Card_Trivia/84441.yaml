title: Card Trivia:Akashic Record
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is derived from the "[[wikipedia:Akashic records|Akashic records]]", a compendium of universal events, thoughts, emotions, and intents of all entities and life forms that are believed to be encoded into the non-physical [[wikipedia:mental plane|mental plane]].
  ** "[[wikipedia:Akasha|Akasha]]" is also a Vedantic Hinduism philosophy whose name represents the "space" or "aether" that serves as the basis and essence of all things in the material world within Indian cosmology; this is reflected in this card's effect to [[banish]] one or both of the two cards [[draw]]n by its effect if they have been played during the [[Duel]].
