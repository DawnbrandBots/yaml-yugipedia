title: Card Trivia:Super-Nimble Mega Hamster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bunch of Beast Bodies]]", "[[Setuppercut]]" and "[[Underdog]]".
  * This card received its international name by Jerome McHale shouting "Super-Nimble Mega Hamster" repeatedly until everyone agreed on the name, as stated in a [http://www.pojo.biz/board/showpost.php?p=16425271&postcount=79 Pojo post] of his.
