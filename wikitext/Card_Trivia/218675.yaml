title: Card Trivia:Doll Monster Rob Robot
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Box of Friends]]".
  * This monster's Japanese name, "Robo-chin", features the honorific "-chin", which is used to describe pets or objects, in the same cases the "it" is used in English.
  * This monster has a [[Card evolutions|customized]] form: "[[Doll Monster Rob Robot, Customized]]".
