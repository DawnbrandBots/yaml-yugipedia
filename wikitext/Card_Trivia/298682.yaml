  {{Navigation}}

  * This monster has a ground-based counterpart: "[[Giganticastle]]".
  * This monster's French name "Château dans le Ciel", which translates to "Castle in the Sky", is likely a reference to the [[wikipedia:Castle in the Sky|similarly-named movie]] produced by [[wikipedia:Studio Ghibli|Studio Ghibli]].
