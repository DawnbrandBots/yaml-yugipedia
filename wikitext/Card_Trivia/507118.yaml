title: Card Trivia:Gyakutenno Megami
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Aegis of Gaia]]".
  * This card's ''[[TCG]]'' name, "Gyakutenno Megami" ({{Ruby|逆|ぎゃく}}{{Ruby|転|てん}}の{{Ruby|女|め}}{{Ruby|神|がみ}} ''Gyakuten no Megami''), is Japanese for "Goddess of Reversal".
  ** Fittingly, in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and in the Japanese [[Yu-Gi-Oh! (anime)|anime]], [[Seto Kaiba]] used this card to jam [[Kemo]]'s gun and snatch it away.
  * This monster has a [[Fusion Monster]] [[recolored counterpart]]: "[[Empress Judge]]"
  * This monster has a [[retrained]] [[counterpart]]: "[[Goddess of Sweet Revenge]]".
  * This monster has a ''[[Rush Duel]]'' [[Card evolutions|upgraded]] form: "[[Daigyakutenno Megami]]".
  * This card's print in ''[[Anniversary Pack]]'' has its [[flavor text]] not written in the usual italicized form.
