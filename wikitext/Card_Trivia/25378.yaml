title: Card Trivia:Ceruli, Guru of Dark World
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Infection Medium]]".
  * This card's name is derived from the color [[wikipedia:Cerulean|cerulean]].
  ** Its Chinese name, 藍爾利, is a combination of 藍 ("blue"), 爾 ''ěr'' ([[wikipedia:Transcription into Chinese characters|a transcription]] of [[wikipedia:Syllable|coda]] [[wikipedia:Liquid consonant|liquid consonants]] such as /r/ and /l/ in other languages, which is similar to the Japanese ル ''ru'') and 利 ''lì'' (a transcription of リ ''ri'' as in its Japanese name セル'''リ''' ''Seru'''ri''''').
  * This was the first anime-original card to be released in a [[Structure Deck]] after more than a year from its debut.
