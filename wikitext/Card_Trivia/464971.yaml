title: Card Trivia:Sauravis, the Ancient and Ascended
wikitext: |-
  {{Navigation}}

  * The silhouette of this monster appears in the artwork of "[[Radiance of the Voiceless Voice]]".
  * This monster's name likely references the ''[[wikipedia:Sauravus|sauravus]]'', the genus of [[wikipedia:Scincosauridae|scincosauridae]], an extinct family of four-legged creatures resembling long-tailed nest or aquatic salamanders.
  ** This monster's name is a portmanteau of the Greek word for "lizard" ("saur") and the Latin word for "bird" (''avis''), both of which are closely connected to dinosaurs.
  * This monster has a "[[Voiceless Voice]]" human form: "[[Sauravis, Dragon Sage of the Voiceless Voice]]".
