title: Card Trivia:Numbers Eveil
wikitext: |-
  {{Navigation}}

  * 28 [[blank]] "[[Number]]" cards appear in this card's artwork.
  * This card's name is based on "éveil", the French word for "awakening".
  * This card's ''[[OCG]]''/''[[TCG]]'' effect requiring the use of exactly 4 "Number" Xyz Monsters with different [[Rank]]s is based on [[Numbers Evaille (manga)|this card]]'s usage in  {{chapter|ZEXAL|053|ref}}, where [[Astral (manga)|Astral]] uses this card to [[Xyz Summon]] "[[No. 93: Utopia Kaiser (manga)|Number 93: Utopia Kaiser]]" by using "[[No. 48: Shadow Lich (manga)|Number 48: Shadow Lich]]" ([[Rank 3]]), "[[No. 10: Illumiknight (manga)|Number 10: Illumiknight]]" ([[Rank 4]]), "[[No. 14: Greedy Sarameya (manga)|Number 14: Greedy Sarameya]]" ([[Rank 5]]), and "[[No. 21: Frozen Lady Justice (manga)|Number 21: Frozen Lady Justice]]" ([[Rank 6]]).
  * Currently, "[[Number 5: Doom Chimera Dragon]]" is the "Number" monster with the lowest "Number" that can be [[Special Summon]]ed via this card's effect, by using "[[Number S0: Utopic ZEXAL]]" or any [[Number F|Number F0]] monster ([[Rank 1]]), "[[Number 1: Infection Buzzking]]" ([[Rank 8]]), "[[Number C1: Numeron Chaos Gate Sunya]]" ([[Rank 2]]), and "[[Number 3: Cicada King]]" (Rank 3).
