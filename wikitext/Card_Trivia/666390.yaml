title: Card Trivia:Megalith Och
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Megalith Anastasis]]", "[[Megalith Emergence]]", and "[[Megalith Portal]]".
  * This monster is based on [[wikipedia:Olympian spirits|Och]], one of the seven [[wikipedia:Olympian spirits|Olympian spirits]].
  * This monster has two [[Card evolutions|transformed]] versions: "[[Megalith Aratron]]" and "[[Megalith Phuloch]]".
  ** "Aratron" is emerging from the bottom of the base of this monster.
  ** The artwork of "Megalith Emergence" depicts this monster transforming into "Aratron".
  ** The artwork of "Megalith Anastasis" depicts this monster transforming into "Phuloch", with the fragments of "[[Megalith Phul]]" embedding themselves into it.
