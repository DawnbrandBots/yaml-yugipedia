title: Card Trivia:Elemental HERO Neos Alius
wikitext: |-
  {{Navigation}}

  * This monster appears to be a younger [[Gemini monster|Gemini]] form of "[[Elemental HERO Neos]]".
  ** ''Alius'' is the Latin word for "another", while ''Neos'' is Greek for "new", so this monster's name means "Another New".
  *** "Alius" is also a pun on "[[wikipedia:Pseudonym|alias]]", a word used for an assumed identity, reflecting this monster's effect to treat its name as "Elemental HERO Neos".
  ** Due to its etymology, this monster might actually be a different character, possibly a child or apprentice of "Elemental HERO Neos", which would fit the comics theme of the "[[HERO]]" [[archetype]].
  * This monster has a female [[counterpart]]: "[[Neo Space Connector]]".
  * This is the first Gemini monster to be part of an archetype.
  ** This is also currently the only Gemini monster to be part of more than one archetype ("[[Elemental HERO]]", "HERO", and "[[Neos]]").
  * This monster's design is based on ''[[wikipedia:Bio Booster Armor Guyver|Guyver]]'' and other characters from the ''[[wikipedia:Ultra Series|Ultra Series]]''
  * This is the only "[[Elemental HERO]]" monster that debuted in a spin-off anime or manga series other than ''[[Yu-Gi-Oh! GX]]'', specifically the ''[[Yu-Gi-Oh! D Team ZEXAL]]'' manga.
