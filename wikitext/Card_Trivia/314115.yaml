title: Card Trivia:Virgil, Rock Star of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Terminus of the Burning Abyss]]".
  * This monster is based on the real-world ancient Roman poet [[wikipedia:Virgil|Virgil]], whose true name was Publius Vergilius Maro.
  ** He is known for three major works of Latin literature, the ''[[wikipedia:Eclogues|Eclogues]]'' (or ''Bucolics''), the ''[[wikipedia:Georgics|Georgics]]'', and the epic ''[[wikipedia:Aeneid|Aeneid]]''. A number of minor poems, collected in the ''[[wikipedia:Appendix Vergiliana|Appendix Vergiliana]]'', are sometimes attributed to him. In the ''[[wikipedia:Divine Comedy|Divine Comedy]]'' written by the Italian poet [[wikipedia:Dante Alighieri|Dante Alighieri]], Virgil was made into Dante's guide through [[wikipedia:Hell|Hell]] and a great part of [[wikipedia:Purgatory|Purgatory]].
  * This card's Portuguese name is a mistranslation: the phrase "Rock Star" in its name was literally translated with "rock" meaning "stone", resulting in the nonsensical phrase "''Estrela de Pedra''" ("Stone Star") rather than the correct "''Estrela do Rock''".
