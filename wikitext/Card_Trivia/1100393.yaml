  * "[[Endymion, the Crescent Magistus]]" and three copies of "[[Flying Kamakiri 2|Flying Kamakiri #2]]" appear in this card's artwork.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Magistus|7|ref}}, specifically from the panel showing [[Endymion (character)|Endymion]] using this attack against the "Flying Kamakiri".
