title: Card Trivia:Ambulanceroid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Emergeroid Call]]".
  * This monster is based on an [[wikipedia:Ambulance|ambulance]], an emergency vehicle used to transport patients to treatment facilities, which reflects its effect to "transport" a "[[roid]]" monster to the [[field]] after it was [[add]]ed from the [[Graveyard]] to the [[hand]].
  ** This monster's Japanese name, "''Kyūkyūroid''", is based on the Japanese word for "ambulance" (救急車, ''kyūkyūsha'').
