title: Card Trivia:Infernoid Sjette
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Void Liberation]]".
  * One of this monster's canisters appears in the artwork of "[[Shaddoll Construct]]".
  * This monster is based on [[wikipedia:Belphegor|Belphegor]], one of the seven princes of Hell.
  * ''Sjette'' translates as ''sixth'' in Norwegian and Danish, referring to this monster's Level.
