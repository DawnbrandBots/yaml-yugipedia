title: Card Trivia:Archfiend Zombie-Skull
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Reanimation Wave]]".
  ** Based on the artwork of "Reanimation Wave", this monster is resurrected by "[[Revived King Ha Des]]" and becomes its servant.
  * "[[Zombie World]]" appears in the background of this card's artwork.
  * This monster is the [[Zombie counterpart]] of "[[Summoned Skull]]" and/or "[[Skull Archfiend of Lightning]]".
  ** This monster's color scheme is an inverse of the above monsters, featuring red claws and a blue-colored body, instead of the usual blue claws and red-tinted body.
  * This is the first [[Level 6]] [[Synchro Monster]] to require 2 or more non-Tuner monsters as [[material]].
