title: Card Trivia:Destiny Draw
wikitext: |-
  {{Navigation}}

  * An [[Academy Duel Disk]] with the card "[[Destiny HERO - Blade Master]]" being sent to the [[Graveyard]] appears in this card's artwork.
  * The person in this card's artwork wears an outfit similar to that of [[Aster Phoenix]], albeit blue instead of gray.
  * '''[[Destiny Draw (rule)|Destiny Draw]]''' is the name of an event in ''[[Yu-Gi-Oh! The Duelists of the Roses]]''. It sometimes occurs while [[Duel]]ing, when a player is in a poor situation regarding cards and [[LP|Life Points]]. They are then given a powerful card that is not included in their [[Deck]]. A similar event occurs in ''[[Yu-Gi-Oh! GX Tag Force 2]]'' and future games in [[Yu-Gi-Oh! Tag Force|that series]]. While a Duelist is in a pinch, he/she can select between normal [[Draw a card|draw]] or Destiny Draw. Selecting destiny draw will pick a card from the Deck that has been selected as a destiny card while building the Deck. This can only be done once per Duel.
  ** ''[[Yu-Gi-Oh! Duel Links]]'' reintroduced Destiny Draw as a Skill for [[Yami Yugi (Duel Links)|Yami Yugi]]. After losing a certain amount of LP, the user can draw a card of their choice at the start of their [[Draw Phase]].
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Destiny Draw]]".
