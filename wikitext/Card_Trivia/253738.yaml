  * This is one of several cards that allows cards to be [[face-up]] in the [[Main Deck]], the others being "[[Convulsion of Nature]]", "[[Grave Lure]]", "[[Parasite Paracide]]", "[[Symmetry Rorschach]]", and the anime effect of "[[Wiretap (anime)|Wiretap]]".
