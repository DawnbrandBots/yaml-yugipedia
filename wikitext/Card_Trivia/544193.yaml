title: Card Trivia:The Phantom Knights' Possession
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Battlin' Boxer Cheat Commissioner]]" and "[[The Phantom Knights of Ragged Gloves]]" appear in this card's artwork.
  ** This likely is a reference to how [[Alito]], the user of the "[[Battlin' Boxer]]" archetype, had his personality negatively influenced by an outside force: [[Don Thousand]] to [[Yuya Sakaki|Yuya]]/[[Yuto]]'s [[Z-ARC]].
  * This card's effect is virtually a combined form of "[[Xiangke Magician (anime)|Xiangke Magician]]" and "[[Xiangsheng Magician (anime)|Xiangsheng Magician]]", and was used for nearly the same purpose, turning "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]" into a [[Level]] 7 monster to [[Xyz Summon]] with "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]".
