title: Card Trivia:Fiendsmith Engraver
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fiendsmith's Tract]]", "[[Fiendsmith Kyrie]]", and "[[Fiendsmith's Agnumday]]".
  * "[[Fiendsmith's Requiem]]" appears in this card's artwork, slung over this monster's back.
  * This monster's ''[[TCG]]'' name is a double-layered pun: "engrave" means "to cut or carve upon a surface", which reminds to this monster's Japanese name "Demon-Carving Demonsmith" (魔を刻むデモンスミス ''Ma o Kizamu Demonsumisu''), but it can also be interpreted as one who puts others in graves.
  ** Fittingly, "Fiendsmith's Requiem" resembles a coffin and the artwork of "Fiendsmith's Tract" depicts this monster forcing an unsuspecting [[Fiend]] into the mouth of an awakening "Requiem".
