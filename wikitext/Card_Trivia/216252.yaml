title: Card Trivia:Elemental HERO Flare Neos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ancient Gear Duel]]" and "[[Instant Contact]]".
  * This monster is a [[Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Flare Scarab]]".
  * This monster has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Elemental HERO Heat Neos]]".
  * This monster was used the most among [[Jaden Yuki]]'s "[[Neos]]" [[Fusion Monster]]s in the ''[[Yu-Gi-Oh! GX]]'' anime, for a total of seven times.
  ** This monster was first [[Fusion Summon]]ed in {{episode|GX|068|ref}} and was last Summoned in {{episode|GX|168|ref}}, exactly 100 episodes later.
