title: Card Trivia:Double Tool C&D
wikitext: |-
  {{Navigation}}

  * Based on this card's name translated to other languages, "C&D" can stand for either "Chainsaw and Drill" or "Cut and Drill".
  * Despite this card saying it can be equipped to Level 4 or '''higher''' "[[Morphtronic]]" monster, it wasn't until 13 years after this card's first printing that a [[Level]] 5 or higher "Morphtronic" monster was created: "[[Morphtronic Scannen]]".
  * This card is similar to "[[Thorn of Malice]]" in that it can only be equipped to a specific [[Signer Dragon]] or a certain type of monster, in this case "[[Power Tool Dragon]]" or [[Machine]]-Type monsters.
