  * This monster appears in the artwork of "[[World Legacy in Shadow]]".
  * This card is named after the [[wikipedia:Receptor (biochemistry)|receptors]], [[wikipedia:protein|proteins]] that receive chemical signals from outside a [[wikipedia:Cell (biology)|cell]], such as [[wikipedia:neurotransmitter|neurotransmitters]] delivered by [[wikipedia:neuron|neurons]].
