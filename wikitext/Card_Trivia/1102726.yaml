title: Card Trivia:Heraldic Beast Stad Whale
wikitext: |-
  {{Navigation}}

  * This monster is based on the whale used as a [[wikipedia:Heraldry|heraldry]] [[wikipedia:Charge (heraldry)|charge]], specifically the ones featured on the [[wikipedia:Coat of arms of Zaanstad|coat of arms of Zannstad]], which this monster is named after. 
  * This monster is likely a reference to [[Reginald Kastle|Reginald "Shark" Kastle]], who is known for using [[WATER]] [[Fish]] monsters and was brainwashed by [[Vetrix]] into being his pawn during the [[World Duel Carnival]] finals in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
