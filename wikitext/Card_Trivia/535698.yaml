  * [[wikipedia:Toyotama-hime|Otohime]], also known as ''Toyotama-hime'' (Japanese for "luminous jewel"), is a goddess in [[wikipedia:Japanese mythology|Japanese mythology]], and the daughter of [[wikipedia:Ryujin|Ryūjin]], the god of the sea. She married the hunter [[wikipedia:Hoori|Hoori]] and gave birth to a son, who in turn produced [[wikipedia:Emperor Jimmu|Emperor Jimmu]], the first [[wikipedia:Emperor of Japan|Emperor of Japan]]. After giving birth, she turned into a dragon and flew away.
