title: Card Trivia:Dark Artist
wikitext: |-
  {{Navigation}}

  * This is one of the few [[Effect Monster]]s whose effect is solely negative and provides no intrinsic benefit to its user.
  * This monster has the longest [[List of cards with the longest OCG to TCG import times|''OCG'' to ''TCG'' import time]] of all Effect Monsters, debuting in the ''[[TCG]]'' more than 14 years after its first ''[[OCG]]'' debut on July 5, 1999.
