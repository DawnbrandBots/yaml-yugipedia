title: Card Trivia:Abysslayer Maxivaruna
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is a mix of "[[Maximum Monster|Maximum]]" and "[[wikipedia:Varuna|Varuna]]".
  ** Varuna is the Hindu god associated with the sky, oceans, and water, depicted as a blue-skinned humanoid with four arms, which reflects this monster's appearance.
