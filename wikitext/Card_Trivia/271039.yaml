title: Card Trivia:Archfiend Commander
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[counterpart]] of "[[Summoned Skull]]".
  ** Both have the same [[Level]], [[Type]], [[Attribute]], and [[ATK]]/[[DEF]].
  ** "Summoned Skull" is a valid [[target]] for this monster's last effect.
  ** This monster's pose in its card artwork is identical to the pose of "Summoned Skull" in its 3rd ''[[OCG]]''/''[[TCG]]'' artwork.
