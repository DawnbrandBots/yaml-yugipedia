title: Card Trivia:Infernalqueen Salmon
wikitext: |-
  {{Navigation}}

  * This card is a combination of "[[Infernalqueen Archfiend]]" and "[[Terrorking Salmon]]".
  ** Specifically, it is a reference to the fact that "Terrorking Salmon" and "[[Terrorking Archfiend]]" share the same title, "Terrorking" (ジェノサイドキング "Genocide King"). Likewise, the "[[Vilepawn Salmon Token]]s" it Summons are a reference to "[[Vilepawn Archfiend]]".
  * This monster appears in the artwork of "[[Double Hooking]]".
