title: Card Trivia:Gouki Iron Claw
wikitext: |-
  {{Navigation}}

  * This monster is named after the "[[wikipedia:Professional wrestling holds#Clawhold|iron claw]]", a technique in [[wikipedia:Professional wrestling|professional wrestling]] which involves gripping the top of the head of the opponent with one hand and squeezing the tips of their fingers into the opponent's skull. Fittingly, this monster's design features a clawed glove made of iron.
