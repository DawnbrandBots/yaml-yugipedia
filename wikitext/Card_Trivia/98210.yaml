title: Card Trivia:Saber Slash
wikitext: |-
  {{Navigation}}

  * "[[XX-Saber Faultroll]]" and the landmine from the Japanese artwork of "[[Widespread Ruin]]" (or "[[Widespread Dud]]") appears in this card's artwork.
  ** However, this card's artwork could also likely depict the landmine from the artwork of "[[Chain Burst]]", which can be [[destroy]]ed by this card's effect because it is a [[Continuous Trap Card]] and must remain [[face-up]] on the [[field]], while "Widespread Ruin" is a [[Normal Trap Card]], and "Widespread Dud" (another Continuous Trap Card) would destroy the player's [[Attack Position]] "[[X-Saber]]" monsters if it is destroyed.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Saber Slash]]".
