title: Card Trivia:Martyr of the Sacred Beasts
wikitext: |-
  {{Navigation}}

  * "[[Raviel, Lord of Phantasms]]" appears in this card's artwork.
  * This monster is the "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] [[counterpart]] of "[[Phantasmal Martyr Token]]".
  ** The appearance of "Raviel, Lord of Phantasms" in the background of this card's artwork references how, in {{episode|GX|049|ref}}, the "[[Phantasmal Martyr Token (anime)|Phantasmal Martyr Token]]s" were [[Tribute]]d to Summon "[[Raviel, Lord of Phantasms (anime)|Raviel, Lord of Phantasms]]".
  ** This monster's effect to [[Special Summon]] multiple copies of itself if the player [[control]]s another "Sacred Beast" monster is a reference to "[[Phantasmal Martyrs]]", a [[Spell Card]] that allows the player to Special Summon three "Phantasmal Martyr Tokens" if they control "[[Uria, Lord of Searing Flames]]" or "[[Hamon, Lord of Striking Thunder]]".
