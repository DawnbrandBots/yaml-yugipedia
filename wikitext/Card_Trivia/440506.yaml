title: Card Trivia:Palladium Oracle Mahad
wikitext: |-
  {{Navigation}}

  * This monster is based on [[Mahad]], one of the [[High Priests]] featured in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** [[wikipedia:Palladium (protective image)|Palladium]] is described as an image of a nation's safeguard or source of protection.
  *** In this case, it could possibly refer to Mahad himself, and his willingness to sacrifice his own life in order to ensure the safety of [[Pharaoh Atem]].
  ** The needle-like jewelry on this monster's belt resemble the pointers found on the [[Millennium Ring]], possibly as a reference to Mahad being the user of the Millennium Ring while he was alive.
  ** This monster's effect to [[Special Summon]] "[[Dark Magician]]" after being [[destroy]]ed references how Mahad merges his spirit with his [[ka]] ([[Magus of Illusion]] in the manga, [[Illusion Magician]] in the anime) to become "Dark Magician" after his death. Fittingly, this monster shares the same [[Level]], [[Type]], and [[original ATK and DEF]] as "Dark Magician".
  ** Comparatively, "[[Maiden with Eyes of Blue]]" is based on [[Kisara]], the carrier of "[[Blue-Eyes White Dragon]]", and "[[Palladium Oracle Mana]]" is based on [[Mana]], the carrier of "[[Dark Magician Girl]]". Similarly, all three of these cards are able to [[Summon]] their respective monster from the [[hand]], [[Deck]], or [[Graveyard]].
  * This monster can be considered a rival to "[[Blue-Eyes Chaos MAX Dragon]]".
  ** Both monsters debuted in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]''.
  ** Both monsters are the retrained counterparts of "Blue-Eyes White Dragon" and "Dark Magician", both of which are rival monsters in the ''Yu-Gi-Oh!'' manga.
  ** Both monsters feature opposite [[Attribute]]s of each other, which are the opposite Attributes of their original counterparts; this monster is a [[LIGHT]] monster while "Dark Magician" is a [[DARK]] monster, while "Blue-Eyes Chaos MAX Dragon" is a DARK monster and "Blue-Eyes White Dragon" is a LIGHT monster.
  ** Both monsters are depicted in mirrored poses; this monster is depicted facing left at a downwards angle, while "Blue-Eyes Chaos MAX Dragon" is depicted facing right at an upwards angle.
