title: Card Trivia:Zoroa, the Magistus Verethragna
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2025]]''.
  * This monster is an [[Card evolutions|evolved]] [[Fusion Monster|Fusion]] form of "[[Zoroa, the Magistus of Flame]]".
  ** This monster's title, "[[Wikipedia:Verethranga|Verethranga]]", is based on the [[Wikipedia:Zoroastrianism|Zoroastrian]] deity of victory, strength, and war, associated with triumph in battle and protection of good against evil.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Magistus|6|ref}}, specifically from the panel showing [[Zoroa]] after absorbing [[Vahram]].
