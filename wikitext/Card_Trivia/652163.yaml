title: Card Trivia:G Golem Dignified Trilithon
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Trilithon|trilithon]], a structure consisting of two large vertical stones (posts) supporting a third stone set horizontally across the top (lintel).
  * This monster is an [[Card evolutions|upgraded]] form of "[[G Golem Invalid Dolmen]]".
  ** This monster is also the ultimate upgraded form of "[[G Golem Stubborn Menhir]]".
