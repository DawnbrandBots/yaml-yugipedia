title: Card Trivia:Ragnaraika Wicked Butterfly
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name,「{{Ruby|蕾禍|ライカ}}ノ{{Ruby|姫邪眼|ヒメジャノメ}}」(''Raika-no Himejanome''), is derived from「蛇の目蝶」(''janomechō''), the butterfly species ''[[wikipedia:Minois dryas|Minois dryas]]'' with bullseye spots on its wings. The kanji「蛇の目」(''janome'', "bull's eye", lit. "snake's eye") is creatively spelled here as「邪眼」(literally "evil eye") to fit the sinister eye patterns in this monster's design.
