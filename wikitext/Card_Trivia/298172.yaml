title: 'Card Trivia:Number 55: Gogogo Goliath'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This card is the first "[[Gogogo]]" [[Xyz Monster]], as well as the only "Gogogo" monster to be a "[[Number]]" monster.
  * This card is an [[retrain|upgraded]] "Number" version of "[[Gogogo Golem]]".
  * This card name refers to [[wikipedia:Goliath|Goliath]].
  * This card's name refers to the Japanese word for 5, "gō", which relates to the "[[Gogogo]]" archetype.
