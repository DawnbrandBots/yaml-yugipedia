title: Card Trivia:Melffy Rabby
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Excited Melffys]]", "[[Joyous Melffys]]", "[[Melffy Hide-and-Seek]]", "[[Melffy of the Forest]]", "[[Melffy Playhouse]]", "[[Melffy Staring Contest]]", "[[Melffy Statues Game]]", "[[Melffy Tag]]", and "[[Merry Melffys]]".
  ** This monster also appears as a toy in the artwork of "[[Amazement Family Faces]]".
