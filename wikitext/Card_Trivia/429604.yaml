title: Card Trivia:Paleozoic Anomalocaris
wikitext: |-
  {{Navigation}}

  * This card derives its name from ''[[wikipedia:Anomalocaris|Anomalocaris]]'', a [[wikipedia:genus|genus]] of extinct [[wikipedia:Cambrian|Cambrian]] animal found as [[wikipedia:fossil|fossils]] in the [[wikipedia:Burgess Shale|Burgess Shale Formation]] in the [[wikipedia:Canadian Rockies|Canadian Rockies]] of [[wikipedia:British Columbia|British Columbia]], [[wikipedia:Canada|Canada]].
  ** Anomalocaris was originally thought to be 3 separate creatures, which is likely the basis for this card's 3 material requirement.
  * This card has the highest [[original ATK]] (2400) of all [[Rank]] 2 [[Xyz Monster]]s.
  * This is a [[cover card]] of ''[[Extra Pack 2016]]''.
