  * This monster's [[effect]] requiring it to be [[Fusion Summon]]ed using "[[Voidvelg Requiem]]" and "[[Abysslayer Leviaknight]]" as [[material]] to [[attack]] multiple times is based on how it was [[Summon]]ed using those specific monsters in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
