title: Card Trivia:Extra Net
wikitext: |-
  {{Navigation}}

  * "[[Goyo Guardian]]" and "[[Thousand-Eyes Restrict]]" appear in this card's artwork.
  ** Both cards were [[Forbidden]] in the ''[[OCG]]'' at the time of this card's release.
  ** This card's artwork depicts both monsters getting captured; ironically, both cards have an effect of "capturing" an opponent's monster: "Goyo Guardian" can [[Special Summon]] a monster it [[destroy]]ed in battle to its controller's [[field]], while "Thousand-Eyes Restrict" can target a monster the opponent controls and [[equip]] it to itself.
  ** The events in this card's artwork are continued in the artwork of "[[Summon Gate]]".
  * This is the only [[Summon Restriction]] card to not be a [[Continuous Card]].
