title: Card Trivia:Heart of Clear Water
wikitext: |-
  {{Navigation}}

  * The red object in this card's artwork somewhat resembles the Behelit from the manga/anime ''[[wikipedia:Berserk (manga)|Berserk]]''; it is a drop of primed water from the Abyss that resembles a weeping face and can grant its holders demonic powers. It also resembles the [http://devilmaycry.wikia.com/wiki/Orbs Orbs] from the video game series ''Devil May Cry''.
