title: Card Trivia:Kasha
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Kasha (folklore)|kasha]]'', a type of ''[[wikipedia:Yōkai|yōkai]]'' taking the form of a fiery chariot who carts the corpses of sinners to Hell.
  * In the English version of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this monster is named "[[Fire Wagon]]", which is the literal translation of its Japanese name.
  ** In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', this monster is named "Hot Ride" monster before its release into the ''[[TCG]]'' during the same year in 2009.
  * This card's ''[[Legendary Collection 2: The Duel Academy Years Mega Pack]]'' was written incorrectly, [[return]]ing all other monsters on the [[field]] into the [[Deck]] is a cost. This was corrected in the [[Duelist League 16 participation cards|''Duelist League 16'' participation cards]] reprint.
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|GX|028|ref}}, specifically from the panel showing this monster being Summoned.
