title: Card Trivia:XX-Saber Gottoms
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gottoms' Second Call]]" and "[[XX-clusion]]".
  ** This monster's hand appears in the artwork of "[[Sword of Sparkles]]", which also appears in this card's artwork.
  * This is the upgraded "[[XX-Saber]]" form of "[[Commander Gottoms, Swordmaster]]".
  ** This monster has a younger form: "[[X-Saber Gottoms]]".
  * This is the first card belonging to a ''[[Duel Terminal]]'' [[archetype]] to be released in a [[Booster Pack]].
  * This is the first [[Beast-Warrior]] Synchro Monster to be released.
  * This is the first Synchro Monster that can be Summoned [[Does not require non-Tuner Synchro Materials|without using any non-Tuner monsters]] as [[Synchro Material]].
  * The details of [[Jack Atlas]]' [[Collectible tin]] for ''[[Collectible Tins Exclusive 2009]]'' describe this monster as being the leader of the "[[X-Saber]]" army.
