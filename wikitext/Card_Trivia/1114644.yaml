title: Card Trivia:Invoked Magistus Omega
wikitext: |-
  {{Navigation}}

  * The second artwork of "[[Invocation]]" depicts "[[Aleister the Invoker]]" transforming into this monster.
  **  [[Aleister Crowley]] transforms into this monster in {{chapter|Yu-Gi-Oh! OCG Stories|Magistus|13|ref}} after [[Endymion (character)|Endymion]] and [[Rilliona]] provide him with all the mana they have during their battle against [[Zoroa]].
  ** This card's OCG name is a reference to [https://en.wikipedia.org/wiki/Therion_(Thelema) Master Therion], a moniker that the real life Aleister Crowley called himself by. The name "Therion" was in reference to The Great Beast from the Book of Revelation, which Crowley believed himself to be some form of physical embodiment of.
  *** The choice to use "Omega" rather than "Therion" in this card's TCG name is not only consistent with "[[Omega Summon]]", but prevents this card from needing an [[archetype-exclusion condition]] for "[[Therion]]".
