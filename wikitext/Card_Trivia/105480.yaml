title: Card Trivia:Jirai Gumo
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from the ''[[wikipedia:Jorōgumo|jorōgumo]]'', a type of ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore that is depicted with the body of a giant spider.
  * This monster has a [[Trap Monster]] [[counterpart]]: "[[Prey of the Jirai Gumo]]".
  * In ''[[Yu-Gi-Oh! Forbidden Memories]]'', this monster can be equipped with "[[Metalmorph (DOR)|Metalmorph]]" to [[Special Summon]] "[[Launcher Spider (DOR)|Launcher Spider]]".
  * In  ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's effect to cancel power increases/decreases is based on its appearance in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], in which it could remove all [[Equip Card]]s from the monster it attacked.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|094|ref}}, specifically from the panel showing the frontal view of [[Jirai Gumo (manga)|this monster]] attacking and destroying "[[Axe Raider (manga)|Axe Raider]]".
