title: Card Trivia:The Six Samurai - Zanji
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Six Samurai United]]" and "[[Swift Samurai Storm!]]".
  * All the original "[[Six Samurai]]" monsters hold weapons that somehow represent their unique effects: this monster holds a [[Wikipedia:Naginata|naginata]].
  * This monster seems to be based on the famous warrior [[wikipedia:Gochin no Tajima|Gochin no Tajima]], who was renowed in the Tale of Heike for his skill with the halberd (or naginata).
