title: Card Trivia:Prey of the Jirai Gumo
wikitext: |-
  {{Navigation}}

  * This card is a [[Trap Monster]] [[counterpart]] of "[[Jirai Gumo]]".
  * This card is based on the appearance of "[[Jirai Gumo (manga)|Jirai Gumo]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, where it was a Trap Monster that attacked a monster that stepped on the square it was Set in.
  ** This card's name is taken from the written text of "Jirai Gumo" in the Japanese versions of the manga and [[Yu-Gi-Oh! (anime)|anime]], which reads "Enemies who set foot on a certain location become '''prey of the Landmine Spider'''".
  ** This card's [[Level]] (5), [[ATK]] (2100), [[DEF]] (100), and status as a Trap Monster are the same as "Jirai Gumo" in the manga.
  ** This card's effect to [[Special Summon]] itself and destroy a monster in the same [[column]] is based on the manga effect of "Jirai Gumo", which caused "Jirai Gumo" to attack a monster that stepped on the square it was [[Set]] in.
  *** In the ''Yu-Gi-Oh!'' manga and anime, when [[Joey Wheeler]]'s "[[Axe Raider (anime)|Axe Raider]]" stepped onto the space that "Jirai Gumo" was Set in, "Jirai Gumo" was automatically [[Summon]]ed and attacked it. Due to the manga effect of "Jirai Gumo" removing the effects of [[Equip Card]]s, it was able to destroy "Axe Raider" despite it being equipped with "[[Kunai with Chain (anime)|Kunai with Chain]]".
