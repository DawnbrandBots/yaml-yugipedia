title: Card Trivia:Megamorph
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Chaos Return]]".
  * This is the first [[Spell Card]] used in the ''[[Yu-Gi-Oh!]]'' manga.
  ** This is one of several cards in different media to use percentages in its effect.
  ** In the VIZ Media translation of the ''Yu-Gi-Oh!'' manga, this card's international name was changed to "[[Giant's Might]]", due to having a different effect in the ''[[OCG]]''/''[[TCG]]''.
