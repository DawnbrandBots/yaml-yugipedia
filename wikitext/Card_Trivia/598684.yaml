title: Card Trivia:Berserker of the Tenyi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Vessel for the Dragon Cycle]]" and "[[Fists of the Unrivaled Tenyi]]".
  * This card's name and appearance are based on an [[wikipedia:Asura (Buddhism)|asura]], a mythological giant from [[wikipedia:Buddhism|Buddhism]].
  * "[[Tenyi Spirit - Vishuda]]" is the source of this monster's corruption.
  ** "[[Draco Berserker of the Tenyi]]" is an even more corrupted form of this monster.
