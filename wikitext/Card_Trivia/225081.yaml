title: Card Trivia:Pumpkin Carriage
wikitext: |-
  {{Navigation}}

  * This card is based on the pumpkin carriage from the fairy tale, ''[[wikipedia:Cinderella|Cinderella]]'' where the [[wikipedia:fairy godmother|fairy godmother]] transforms an ordinary pumpkin into a carriage and the mice into six horses.
  ** This card's effect allowing "[[Prinzessin]]" to attack directly references how the pumpkin carriage is used to carry Cinderella to the prince's castle where the royal ball is held.
  ** This card's ''[[OCG]]''/''[[TCG]]'' effect protecting "[[Golden Castle of Stromberg]]" from card effects likely references the prince's castle where the royal ball is held. Also, this effect is based on this card's appearance in {{episode|Yu-Gi-Oh!|197|ref}} when this card and the listed cards in its text was played while the "[[Golden Castle of Stromberg (anime)|Golden Castle of Stromberg]]" is in play, where its anime effect prevents it from being destroyed by card effects.
