  * "[[The Bystial Alba Los]]" appears in this card's artwork.
  ** This card is a continuation of the artwork of "[[Tally-ho! Springans]]", where one of the beams is fired by "[[Gigantic "Champion" Sargas]]". The other beam appears to be fired by "[[Tri-Brigade Arms Bucephalus II]]".
