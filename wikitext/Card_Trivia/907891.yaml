title: Card Trivia:Tri-Brigade Kitt
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Springans Booty]]", "[[Springans Call!]]", "[[New Frontier]]", "[[Therion Discolosseum]]", "[[Therion Stand Up!]]", "[[Tribe Drive]]", "[[Tri-Brigade (card)|Tri-Brigade]]", "[[Tri-Brigade Bearbrumm the Rampant Rampager]]", and "[[Tri-Brigade Rendezvous]]".
  * "[[Springans Rockey]]" and the mast of "[[Springans Ship - Exblowrer]]" appear in this card's artwork.
  ** The mechanical shrike in this card's artwork also appears in the artworks of "[[Springans Booty]]", "[[Tribe Drive]]", and "[[Tri-Brigade Rendezvous]]". A modified version of it appears in the artworks of "[[Branded in High Spirits]]" and "[[Springans Kitt]]".
  * This card has a "[[Springans]]" [[counterpart]]: "[[Springans Kitt]]".
  * This monster's concept art notes the following:
  ** She is the younger sister of "[[Tri-Brigade Ferrijit the Barren Blossom]]" and works as a mechanic.
  ** She wears fingerless gloves to help with precision work.
  ** She owns two mechanical shrikes, one large, and one small. The small one, "[[Tri-Brigade Mercourier]]", was formerly in the possession of "[[Tri-Brigade Shuraig the Ominous Omen]]", before being given to "[[Incredible Ecclesia, the Virtuous]]" and "[[Fallen of Albaz]]".
  ** While wearing her thick-soled boots, she is as tall as "[[Dogmatika Ecclesia, the Virtuous]]", including ears.
  ** This monster has two artwork drafts:
  *** Draft A features her basking in the sunlight with a "Springans" monster inside the ship.
  *** Draft B features her sitting on top of "Springans Ship - Exblowrer", which was used for the final draft, albeit flipped horizontally.
