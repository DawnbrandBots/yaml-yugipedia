title: Card Trivia:Baronne de Fleur
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Memories]]''.
  * This card's ''[[TCG]]'' name, "Baronne de Fleur", is French for "Flower Baroness".
  ** This card's Japanese name, "Fleur de Baroness" (フルール・ド・バロネス ''Furūru Do Baronesu''), is French for "Flower of the Baroness", using the English word for "Baroness".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Chevalier de Fleur]]".
