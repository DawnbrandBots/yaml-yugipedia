title: Card Trivia:Blackwing - Jetstream the Blue Sky
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Jet stream|jet stream]], a fast-flowing narrow air current in the Earth's atmosphere.
  ** This monster's title is derived from the [[wikipedia:Daytime|daytime]] [[wikipedia:Sky|sky]], which appears blue due to the air molecules scattering shorter wavelengths of sunlight more than longer ones, which creates redder light.
