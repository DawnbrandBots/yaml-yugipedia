title: 'Card Trivia:Number 10: Dark Illumiknight'
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is the [[Barian Number]] [[counterpart]] of "[[Number 10: Illumiknight]]".
  ** It has the same [[Rank]] (4), [[Type]] ([[Warrior]]), [[ATK]]/[[DEF]] (2400/2400), [[Xyz Material]]s (3 [[Level 4]] monsters) and effect.
  *** However, this monster is [[DARK]], while "Illumiknight" is [[LIGHT]]. Fittingly, this monster's Japanese title, "Black-Light Knight" is opposed to the Japanese title of "Illumiknight", "White-Light Knight", which also reflects both monsters' opposite color schemes.
  ** In the English dubbed version of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster was replaced with "Illumiknight".
  * This monster's number (10) is equal to the sum of the numbers of all the other known Barian Numbers ([[Number 1: Infection Buzz King|1]] + [[Number 2: Ninja Shadow Mosquito|2]] + [[Number 3: Cicada King|3]] + [[Number 4: Stealth Kragen|4]]). 
  * This is the only Barian Number that has not been released in the ''[[OCG]]''/''[[TCG]]'' yet.
