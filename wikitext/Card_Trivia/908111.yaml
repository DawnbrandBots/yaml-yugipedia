title: Card Trivia:Boss Drone Dekaizo
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is a portmanteau of the Japanese words for "huge" (でかい, ''dekai'') and "remodeling" (改造, ''kaizo'').
  ** This monster's name and design are based on its owner, [[Kaizo (manga)|Kaizo]] in the ''[[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!]]'' manga.
