title: Card Trivia:R-Genex Oracle
wikitext: |-
  {{Navigation}}

  * This monster's name is based on an [[wikipedia:Oracle|oracle]], a priest(ess) serving as a medium for the advice and messages sought from the gods.
  * This monster is the [[DARK]] [[counterpart]] of "[[Genex Power Planner]]".
  ** Both monsters are [[Level 1]] [[Spellcaster]] monsters with 300 [[ATK]].
  ** Both monsters' designs feature a spherical head, who are held in place to a large load on their backs.
  ** Both monsters' effects work in synergy with each other; "Power Planner" can [[add]] this monster from the [[Deck]] to the [[hand]], which will allow its effect to [[Special Summon]] itself.
  * This monster has a [[retrain]]ed counterpart: "[[R-Genex Turing]]".
  * In the Spanish edition of ''[[Hidden Arsenal 3]]'', this card's print features the word "''utilizar''" ("''no puede ser utilizada''") instead of "''usar''" ("''usada''") for "''use''" ("''cannot be used''").
