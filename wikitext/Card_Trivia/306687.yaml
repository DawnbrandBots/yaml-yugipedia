title: Card Trivia:Leo, the Keeper of the Sacred Tree
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[El Shaddoll Fusion]]" and "[[Naturia Blessing]]".
  * "[[Naturia Sacred Tree]]" appears in this card's artwork.
  * This card has the highest [[ATK]] of any [[Beast]] [[Synchro Monster]].
  * This card is an [[Card evolutions|upgraded]] form of "[[Naturia Leodrake]]". It is one [[Level]] higher and has 100 more ATK and [[DEF]].
  ** This monster is wearing the remnants of "[[Evilswarm Ouroboros]]".
  ** This card has an upgraded form as well: "[[Naturia Gaiastrio]]", which can be [[Fusion Summon]]ed using both this card and "Leodrake".
  * This card's vulnerability during [[Main Phase 2]] is a reference to the ''[[Duel Terminal]]'', which omits the Main Phase 2.
  ** Both "Naturia Leodrake" and "Evilswarm Ouroboros" are also featured in the ''Duel Terminal''.
