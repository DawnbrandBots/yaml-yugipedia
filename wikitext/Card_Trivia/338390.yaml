title: Card Trivia:Nefarious Archfiend Eater of Nefariousness
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Familiar-Possessed - Aussa]]" and "[[Unpossessed]]", although with a slightly different design.
  * This monster is an evolution of "[[Archfiend Marmot of Nefariousness]]", and itself has a further powered-up form: "[[Awakening of the Possessed - Nefariouser Archfiend]]".
  * The skull this monster can be seen gnawing on appears to belong to "[[Archfiend Soldier]]".
