title: Card Trivia:Echelon of the Fire Kings
wikitext: |-
  {{Navigation}}

  * Fire forms of "[[Fire King Avatar Barong]]", "[[Fire King High Avatar Garunix]]", and "[[Fire King Avatar Kirin]]" appear in this card's artwork.
  ** This is likely a reference to the fact these were the three "[[Fire King]]" monsters that debuted the archetype in ''[[Structure Deck: Onslaught of the Fire Kings]]''.
