title: Card Trivia:Witchcrafter Vice-Madame
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Magnificent Mavens]]''.
  * "[[Witchcrafter Edel]]" and "[[Witchcrafter Genni]]" appear in this card's artwork.
  * This monster is the [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Witchcrafter Haine]]".
  ** This monster's first option is based on the monster [[destroy|destruction]] effect of "Haine".
  ** According to the artwork of "[[Witchcrafter Confusion Confession]]" and [[The Valuable Book EX 2 card storylines]], "Haine" was put in charge of the "[[Witchcrafter]]" guild after  "[[Witchcrafter Madame Verre]]" left.
  *** According to The Valuable Book EX 2 card storylines, "Haine" was put in charge because "Madame Verre" left before a major client was supposed to visit the "Witchcrafter" guild.
  *** This monster is depicted with a trembling hand, implying that "Haine" is uncomfortable in her role as the new headmaster of the "Witchcrafters". This is supported by her shocked reaction in the artwork of "Witchcrafter Confusion Confession".
