title: Card Trivia:Nobleman-Eater Bug
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] [[counterpart]] of "[[Man-Eater Bug]]", with twice the [[ATK]] and [[DEF]] of "Man-Eater Bug" and a similar [[Flip effect]] that destroys 2 monsters on the field.
  ** This card's Japanese name, "Shitokui Mushi" (使徒食い虫), is a pun on the Japanese name of the original "Man-Eater Bug", "Hitokui Mushi" (人食い虫).
  *** "Shitokui Mushi" translates as "Apostle-Eating Bug"; the first two base characters of this card's Japanese name (使徒 ''shito'', "apostle") also occur in the Japanese card names of "[[Nobleman of Crossout]]" and "[[Nobleman of Extermination]]" ("Apostle of Obliteration" and "Apostle of Extermination", respectively). This pun is carried over almost perfectly into this card's English name, where ''shito'' is translated to "Nobleman".
  * This monster bears some resemblance to a few species of monstrous insects known as Blues, which originate in the anime ''[[wikipedia:Blue Gender|Blue Gender]]''.
