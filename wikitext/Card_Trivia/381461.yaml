title: Card Trivia:D/D/D Marksman King Tell
wikitext: |-
  {{Navigation}}

  * This monster is based on the folk hero [[wikipedia:William Tell|William Tell]].
  ** This monster's chest resembles an apple with a chunk taken out of it. In addition to the arrows fixed in its chest and the crossbow this monster wields, this is likely a reference to the [[wikipedia:Shooting an apple off one's child's head|legend of William Tell]] shooting an apple off his son's head with a crossbow (in a single shot).
  ** This monster also has a similarity to the 14th demon of the Ars Goetia, Leraje. With both of them being marksmen clad in green and the monster's effect replicating the gangrene effect of the demon's arrows.
