title: Card Trivia:Disturbance Strategy
wikitext: |-
  {{Navigation}}

  * This card's effect is similar to "[[Mind Wipe]]", but this card doesn't have a 3 or fewer hand size restriction.
  * This card has a [[Spell Card]] [[Counterpart]] meant for the owner's hand: "[[Reload]]".
  ** It also has an [[Effect Monster]] counterpart, "[[Photon Leo]]".
