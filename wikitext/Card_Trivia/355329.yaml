  [[File:AncientGearGolem-JP-Anime-GX-NC-Toon.png|thumb|200px|"Ancient Gear Golem" equipped with "Comic Hand", as seem in the anime.]]

  * This is one of the [[cover card]]s of the box of ''[[Legendary Duelists: Season 1]]''.
  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Ancient Gear Golem]]".
  ** This monster's appearance is based on "[[Ancient Gear Golem (anime)|Ancient Gear Golem]]" while [[equip]]ped with "[[Comic Hand (anime)|Comic Hand]]" and treated as a "Toon" monster in {{episode|GX|092|ref}}; however, this monster can be [[Special Summon]]ed, while "Ancient Gear Golem" cannot.

