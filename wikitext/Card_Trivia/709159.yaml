title: Card Trivia:Kaiser Colosseum
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Colosseum|Colosseum]], an elliptical amphitheater where gladiator matches took place in [[wikipedia:Ancient Rome|Ancient Rome]].
  ** This card's name is based on "''[[wikipedia:Kaiser|kaiser]]''", the German title for "[[wikipedia:Emperor|emperor]]". The word is derived from the root word "[[wikipedia:Caesar (title)|Caesar]]", the title used for an imperial character in the [[wikipedia:Roman Empire|Roman Empire]], who oversaw the gladiator matches in the Colosseum.
  ** This card's effect, which limits the opponent from placing more monsters on the [[field]] than the number of monsters [[control]]led by the player, references the gladiator battles, where the monsters replace the roles of the gladiators.
