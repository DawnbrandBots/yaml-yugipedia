title: Card Trivia:Nitwit Outwit
wikitext: |-
  {{Navigation}}

  * "[[Chamberlain of the Six Samurai]]", "[[Great Shogun Shien]]", "[[Hand of the Six Samurai]]", "[[Legendary Ebon Steed]]", "[[Ojama Black]]", "[[Ojama Blue]]", "[[Ojama Red]]", "[[Ojama Yellow]]", "[[The Six Samurai - Irou]]", and two "[[Shien's Footsoldier]]s" appear in this card's artwork.
  ** This is the first card in the game to feature "Ojama Yellow" and "Ojama Black" in the same artwork without "[[Ojama Green]]", the second being "[[Painful Escape]]".
