title: Card Trivia:Extra-Foolish Burial
wikitext: |-
  {{Navigation}}

  * The blue arm from the artwork of "[[Foolish Burial Goods]]" (clutching flowers and jewelry) and the green arm from the artworks of "[[Called by the Grave]]" and "[[Gravedigger's Trap Hole]]" appear in this card's artwork.
  ** The latter's appearance is supported by the fact that it has ridges, pointed fingernails, and earth built up around it (in the artwork of "Called by the Grave"), just like the arm from the artwork of "Foolish Burial Goods" does as depicted in its own artwork.
  * The artwork of "[[Psychic Burial]]" is based on that of this card.
