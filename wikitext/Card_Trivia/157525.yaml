title: Card Trivia:Salvage Warrior
wikitext: |-
  {{Navigation}}

  * This card is one of many monsters to have a variation of "[[Junk Synchron]]'s" '''''[[Special Summon]] 1 Monster which meets certain requirements from your [[Graveyard]]''''' effect.
  ** However, this card's effect is unique for two reasons: it must be [[Tribute Summon]]ed, and it can summon a monster from the [[Hand]] as well.
  ** It is worth mentioning, because few people realize it: Since it can also summon from the Hand, this card`s effect doesn`t target, which can be very useful and makes it harder for your opponent to counter your play.
  * This card's name and effect is similar to "[[Salvage]]".
  * This card bears resemblance to Yangus from [[wikipedia:Dragon Quest VIII|Dragon Quest VIII]].
  * On the [[1st Edition]] of this [[Rare]] card, the attribute stated "Aqua" instead of [[Water]].
