title: Card Trivia:Crafter Drone
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hybridrive Restruct]]".
  * This card is a member of a series of monsters in ''[[Yu-Gi-Oh! Rush Duel]]'' who share the same [[Level]] (3), [[original ATK and DEF]] (1000/0), and effect to [[draw]] a card by [[send]]ing a monster with its same [[Type]] from the [[hand]] to the [[Graveyard]]. Other cards in this series include:
  ** "[[Cobalt Cobolt]]" for [[Fiend]]
  ** "[[Dramoth Caterpillar]]" for [[Insect]]
  ** "[[Mech Therizinoraptor]]" for [[Dinosaur]]
  ** "[[Mystic Dealer]]" for [[Spellcaster]]
