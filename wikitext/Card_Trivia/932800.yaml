title: Card Trivia:Battlin' Boxer King Dempsey
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Jack Dempsey|Jack Dempsey]], an American professional boxer who competed from 1914-1927 until his retirement.
  ** This monster is also likely based on John Edward Kelly, an Irish-American boxing champion who is also known as [[wikipedia:Nonpareil Dempsey|Nonpareil Jack Dempsey]].
  ** This monster is depicted performing the "Dempsey Roll", the boxing technique created by Jack Dempsey that is described as a roll of dodging shots swinging from left to right and using the thrust of the boxer's legs to spring on their opponent. This technique was widely used in the Japanese boxing manga ''[[wikipedia:Hajime no Ippo|Hajime no Ippo]]'' where it is depicted as violently moving the boxer's body to the left and right, which is seen in this card's artwork.
  * This monster's appearance may be a reference to [[Alito]]'s [[Barian Battlemorph]] form
