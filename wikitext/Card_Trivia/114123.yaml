title: Card Trivia:Castle Walls
wikitext: |-
  {{Navigation}}

  * This card has a stronger Quick-Play Spell Card counterpart, "[[The Reliable Guardian]]".
  * This card is effectively the [[DEF|defensive]] counterpart to "[[Reinforcements]]", and has the opposite effect of "[[Snake Fang]]".
  * The first generation Spanish editions of this card had "''Aumenta el DEF''" instead of "''Aumenta la DEF''" ("''Increase the DEF''") on the lore.
