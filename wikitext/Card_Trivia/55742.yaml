title: Card Trivia:Blackwing Armor Master
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[25th Anniversary Tin: Dueling Heroes]]''.
  * This monster appears in the artworks of "[[Black Wing]]", "[[Blackwing - Delta Union]]", and "[[Synchro Mirage Attack]]".
  * This is the first [[Winged Beast]] [[Synchro Monster]].
  * This is the first Synchro Monster to feature an effect that can place [[counter]]s in the anime.
  ** In the ''[[OCG]]''/''[[TCG]]'', this monster and "[[Cosmic Fortress Gol'gar]]" are the first Synchro Monsters to feature an effect that can place counters.
  * This monster has an upgraded [[counterpart]]: "[[Blackwing Full Armor Master]]".
  * This is the [[signature card]] of [[Crow Hogan]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, along with "[[Black-Winged Dragon]]".
