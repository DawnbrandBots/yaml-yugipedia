title: Card Trivia:Pianissimo
wikitext: |-
  {{Navigation}}

  * Pianissimo is a [[wikipedia:Dynamics (music)|musical dynamic]] that indicates a rather low level of volume.
  ** Appropriately in the anime, [[Zuzu Boyle]] first used this card to lower the ATK of her own "[[Bloom Diva the Melodious Choir]]", which attacks by singing.
