title: Card Trivia:Juno, the Celestial Goddess
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:NASA|NASA]] [[wikipedia:Space probe|space probe]], [[wikipedia:Juno (spacecraft)|Juno]], which was launched from [[wikipedia:Cape Canaveral Air Force Station|Cape Canaveral Air Force Station]] located in [[wikipedia:Florida|Florida]].
  ** This monster is also based on [[wikipedia:Juno (mythology)|Juno]], the queen of the gods in [[wikipedia:Roman mythology|Roman mythology]], which reflects its [[Fairy]] [[Type]] and the title of "Celestial Goddess".
  ** This monster, along with its accompanying [[Match winner]], "[[Shelga, the Tri-Warlord]]", both share a Florida theme, referencing how they were released as [[Yu-Gi-Oh! World Championship 2016 prize cards|prize cards]] at the 2016 ''Yu-Gi-Oh!'' World Championship, which was held in [[wikipedia:Orlando, Florida|Orlando]], Florida.
