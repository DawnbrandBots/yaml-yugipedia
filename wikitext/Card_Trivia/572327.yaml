title: Card Trivia:Harpie Perfumer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Alluring Mirror Split]]".
  * This is one of the [[cover card]]s for ''[[Duelist Pack: Legend Duelist 4]]''/''[[Legendary Duelists: Sisters of the Rose]]'', along with "[[Harpie Oracle]]".
  * This monster and "Harpie Oracle" are references to [[Aroma Tactics]], a technique used by [[Mai Valentine]] to predict the cards she would draw by applying different types of perfumes to each of them.
