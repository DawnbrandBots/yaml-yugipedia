title: Card Trivia:Xeno Meteorus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ground Xeno]]".
  * This monster has an [[Card evolutions|upgraded]] [[Transcendosaurus]] [[Special Summon Monster|Special Summon]] form: "[[Transcendosaurus Meteorus]]".
  * This monster's effect that lists [[Dinosaur]], [[Sea Serpent]], and [[Wyrm]] monsters is a reference to how the Japanese names of those [[Type]]s all contain the kanji 「{{Ruby|竜|りゅう}}」 (''Ryū'', lit. "Dragon").
