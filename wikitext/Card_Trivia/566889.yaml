title: Card Trivia:Avendread Savior
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Extra Pack 2018]]''.
  * This monster appears in the artwork of "[[Ravenous Vendread]]".
  * This monster is based on [[wikia:w:c:spawn:Spawn|Spawn]] from [[wikipedia:Image Comics|Image Comics]].
  * This card is the only "[[Vendread]]" [[Link Monster]].
  * According to the [[Master Duel card storylines]], this monster is "[[Revendread Executor]]" revived after his death in the artwork of "[[Vendread Daybreak]]".
