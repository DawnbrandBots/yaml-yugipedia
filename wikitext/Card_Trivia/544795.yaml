title: Card Trivia:Crowley, the First Propheseer
wikitext: |-
  {{Navigation}}

  * The name of this monster refers to [[wikipedia:Aleister Crowley|Aleister Crowley]].
  ** Fittingly, this monster is an older "[[Aleister the Invoker]]", kept in the depths of "[[The Grand Spellbook Tower]]", according to the [[Master Guide 6 card storylines]]. He retains the horns he had as "[[Invoked Caliga]]", suggesting that he partially reverted to his human form just before his imprisonment.
  ** This card may also be a reference to [https://toarumajutsunoindex.fandom.com/wiki/Aleister_Crowley Aleister Crowley] from [[wikipedia:Toaru Majutsu no Index|Toaru Majutsu no Index]], as both are based on the same person and are in stasis tubes.
  * This monster is inside the central capsule seen in "[[Spellbook Star Hall]]".
  * This monster being the "creator" of the "[[Prophecy]]" monsters shows that they're based on the [[wikipedia:Thoth tarot deck|Thoth tarot deck]].
