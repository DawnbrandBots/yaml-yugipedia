  * This monster appears in the artworks of "[[Shaman of the Tenyi]]" and "[[Fists of the Unrivaled Tenyi]]".
  * This card's name is based on the [[wikipedia:Chakra|Chakra]] [[wikipedia:Chakra|Anahata]], which is associated with air, hence this card's [[Attribute]] of [[WIND]].
