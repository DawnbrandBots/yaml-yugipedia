title: Card Trivia:Humongous Hive Hegemon - Zexstagger
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023 2nd Wave]]''.
  * The design of this monster is based of multiple different types of insects.
  ** Head: [[wikipedia:Stag beetle|Stag beetle]]
  ** Shoulders: [[wikipedia:Coccinellidae|Ladybird beetle]]
  ** Body: [[wikipedia:Longhorn beetle|Longhorn beetle]]
  ** Left arm: [[wikipedia:Bee|Bee]]
  ** Left leg: [[wikipedia:Moth|Moth]]
  ** Right leg: [[wikipedia:Butterfly|Butterfly]]
