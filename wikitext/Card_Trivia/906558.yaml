title: Card Trivia:Banquet of Millions
wikitext: |-
  {{Navigation}}

  * The cards "[[Flower Wolf]]", "[[Diamond Dire Wolf]]", "[[Celestial Wolf Lord, Blue Sirius]]" and "[[Prank-Kids Bow-Wow-Bark]]" appear in this card's artwork.
  ** This card's [[OCG]] name "Feed Pack" served as a pun, as the aforementioned cards were all canine-based monsters.
  * The monster in this card's artwork seems to be an older "[[Eater of Millions]]" that has grown bigger after "eating" many cards.
