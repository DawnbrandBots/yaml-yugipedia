title: Card Trivia:D/D/D Flame High King Genghis
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[D/D/D Flame King Genghis]]".
  ** Unlike its base form, this monster does not have an effect related to "[[Dark Contract]]" cards. Ironically, this card now has a [[Spell Card|Spell]]/[[Trap Card]] [[negation]] effect.
  * This is the only "[[D/D/D Gust High King Alexander|High]] [[D/D/D Wave High King Caesar|King]]" "[[D/D/D]]" monster without an [[ATK]] boosting effect.
