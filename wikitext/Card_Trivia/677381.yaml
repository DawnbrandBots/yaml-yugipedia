title: Card Trivia:Naelshaddoll Ariel
wikitext: |-
  {{Navigation}}

  * This card is the "[[Shaddoll]]" [[counterpart]] of "[[Gishki Ariel]]", before her transformation into "[[Ariel, Priestess of the Nekroz]]".
  * The prefix "Nael" (Japanese: ノェル) appears to refer to the Hebrew נָעַל (''na'ál'') meaning "to lock".
