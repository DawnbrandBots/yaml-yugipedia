title: Card Trivia:Synchro Control
wikitext: |-
  {{Navigation}}

  * "[[Brionac, Dragon of the Ice Barrier]]", three ''[[Yu-Gi-Oh! 5D's]]'' versions of the [[Synchro Summon]]ing rings, and three [[Level]] stars appear in this card's artwork.
  ** The ''5D's'' version of the Synchro Summoning ring also appears in the artworks of "[[Intercept Wave]]", "[[Miracle Synchro Fusion]]", "[[Natural Tune]]", and "[[Synchro Ejection]]".
