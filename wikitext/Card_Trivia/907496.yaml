title: Card Trivia:Duelist's Glove
wikitext: |-
  {{Navigation}}

  * This card is one of five invitational cards to the [[Duelist Kingdom]] tournament in the [[Yu-Gi-Oh! (manga)|Yu-Gi-Oh! manga]] and [[Yu-Gi-Oh! (anime)|anime]]. Any contestant who participated in the tournament will receive a [[Dueling Glove]] and two [[Star Chip]]s.
