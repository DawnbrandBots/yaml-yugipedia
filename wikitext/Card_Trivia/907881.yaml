title: Card Trivia:Contact "C"
wikitext: |-
  {{Navigation}}

  * The events in this card's artwork are the continuation of those depicted in the artwork of "[[Confronting the "C"]]" - the roaches have climbed onto the Crockpot lid the man was holding, and one of them has made "contact" with him by scurrying up his arm.
  ** This card's effect reflects the fact that [[wikipedia:Smokybrown cockroach|smokybrown roaches]] (which the "[["C"]]" monsters are based on) are stubborn pests: it can [[Special Summon]] itself from the [[hand]] to the opponent's [[field]] in [[Defense Position]] and prevent them from Special Summoning [[Extra Deck]] monsters, unless they use this card as [[material]].
