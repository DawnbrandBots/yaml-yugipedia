title: Card Trivia:Super Fusion God
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is referred to as "Super Fusion God" by [[Yubel (character)|Yubel]], which is a reference to "[[Super Polymerization]]", known as "Super Fusion" in Japanese.
  ** It was revealed by [[Masahiro Hikokubo]] that this monster was intentionally not given a proper name to prevent people from becoming curious about it, though this failed in retrospect. Questioned about it, he settled on the card being a [[Level]] 0 [[DARK]] [[Fiend]] monster with 0 [[ATK]]/[[DEF]] called "'''Gottheit Yubel - Das Liebe Singularitater'''" (lit. "Divine Yubel - The One Standing at the Singularity of Love").<ref name="GX Complete Guide">''[[Yu-Gi-Oh! Duel Monsters GX Animation Complete Guide Academia Duel Log]]''</ref>
  * This is one of the only two [[Fusion Monster]]s that specifically require "[[Super Polymerization]]" for their [[Fusion Summon]], the other being "[[Clorless, Chaos King of Dark World]]". Both were only mentioned in the ''[[Yu-Gi-Oh! GX]]'' anime and [[List of unseen cards|never appeared on-screen]].
  * This monster has the most required [[Fusion Material]]s, at 12. This is a reference to Yubel's goal during the [[Dimension World]] arc to merge the twelve dimensions together under their rule. This is further emphasized by this monster's true name.

