title: Card Trivia:Dark Magician of Chaos
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Invader of Darkness (set)|Invader of Darkness]]'', ''[[Invasion of Chaos]]'', and ''[[Starter Deck 2021]]'', as well as one of the cover cards of ''[[Dark Revelation Volume 2]]''/''[[Expert Edition Volume.2]]'' and ''[[Battle Pack: Epic Dawn]]''.
  ** Both this card and "[[Junk Berserker]]" are notable for being the only two cover cards to have a separate, censored ''[[TCG]]'' artwork, while their original Japanese artworks were used for their cover card appearance in the ''TCG'' booster packs they debuted in.
  * This monster appears in the artwork of "[[Dedication through Light and Darkness]]".
  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster is a [[retrained]] [[counterpart]] of "[[Magician of Black Chaos]]".
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster was used by [[Dimitri]] to imitate [[Yugi Muto]], who used "[[Magician of Black Chaos (anime)|Magician of Black Chaos]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This monster's pose is taken from the omake page of {{chapter|Yu-Gi-Oh!|131|ref}} showing "[[Magician of Black Chaos (manga)|Magician of Black Chaos]]", albeit flipped horizontally.

