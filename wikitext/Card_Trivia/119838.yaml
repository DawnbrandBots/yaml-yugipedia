title: Card Trivia:Skull Conductor
wikitext: |-
  {{Navigation}}

  * The spirits in this card's artwork are similar to the spirits appearing in the artworks of "[[Dark Spirit of the Silent]]" and "[[Spiritualism]]".
  * This monster's name and appearance are both puns on the word "conductor"; this monster is dressed as a train "conductor" while holding a music "conductor's" baton.
  ** This monster's self-destruction effect references the latter aforementioned above meaning of "conductor", as the end of the [[Battle Phase]] could represent the end of this monster's performance.
