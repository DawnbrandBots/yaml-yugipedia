  * The man in this card's artwork appears in the artwork of "[[Standoff]]".
  ** The man and the weapons featured in this card's artwork is likely based on [[wikipedia:Miyamoto Musashi|Miyamoto Musashi]], a Japanese swordsman who used both a short sword and a long sword in combat.
