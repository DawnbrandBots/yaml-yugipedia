title: Card Trivia:D/D/D Vice King Requiem
wikitext: |-
  {{Navigation}}

  * This monster's Japanese title, "Eulogy King" ({{Ruby|死|し}}{{Ruby|謳|おう}}{{Ruby|王|おう}}, ''Shiōō'') is a homophone of "[[wikipedia:Chief operating officer|COO]]" ("Chief Operating Officer").
  ** "Vice Requiem" is also a reference to how a COO is usually the second-in-command of the organization, following the [[wikipedia:Chief executive officer|CEO]].
  * This is the first [[Pendulum Monster]] to mention [[Link Summon]], and by extension, anything related to the [[Link]] mechanic.
