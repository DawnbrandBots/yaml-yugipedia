title: Card Trivia:Numbers Last Hope
wikitext: |-
  {{Navigation}}

  * "[[Galaxy-Eyes Photon Dragon]]" appears in this card's artwork, in the process of transforming into "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]".
  * This card's name references the [[Xyz Summon]]ing sequence of "[[Number 62: Galaxy-Eyes Prime Photon Dragon (anime)|Number 62: Galaxy-Eyes Prime Photon Dragon]]" in {{episode|ZEXAL|134|ref}} where [[Kite Tenjo]] embeds the sealed sword-like form of "Galaxy-Eyes Prime Photon Dragon" into the [[Moon]] and declares that it is his "last hope" right before it is Summoned.
