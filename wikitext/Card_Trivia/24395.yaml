title: Card Trivia:Ashoka Pillar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Triangle O]]".
  * This monster is named after the [[wikipedia:Pillars of Ashoka|pillars of Ashoka]], a series of monolithic columns dispersed throughout the northern Indian subcontinent and erected by the [[wikipedia:Maurya Empire|Mauryan king]], [[wikipedia:Ashoka the Great|Ashoka the Great]] during his reign in the 3rd century BCE.
  ** However, this monster's appearance is based on the [[wikipedia:Iron pillar of Delhi|iron pillar of Delhi]], a metallic monolithic column created by [[Wikipedia:Chandragupta II|Chandragupta II]] of the [[Wikipedia:Gupta Empire|Gupta Empire]], which is sometimes described as anachronistic due to its rustproof metals and durability, which is reflected in this monster's high [[original DEF]] (2200).
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[add]] an [[Equip Spell Card]] from the [[Deck]] to the [[hand]] after it is Summoned is based on its appearances in the ''[[Yu-Gi-Oh! 5D's]]'' anime, where "[[Spirit Mask]]" and "[[Stonehenge (anime)|Stonehenge]]", respectively, were [[activate]]d after it was [[Normal Summon]]ed.
  ** Also, this monster's ''OCG''/''TCG'' effect to switch itself from [[Attack Position]] to [[Defense Position]] is based on how this monster was Normal Summoned in Defense Position in the anime.
