title: Card Trivia:Call of the Atlanteans
wikitext: |-
  {{Navigation}}

  * "[[Atlantean Dragoons]]", "[[Poseidra, the Atlantean Dragon]]", and the shadows of multiple "[[Atlantean]]" monsters appear in this card's artwork.
  ** Ironically, neither aforementioned monsters can be [[Special Summon]]ed by this card's effect.
  * This card's Japanese name, "Roar of the Sea Emperor" (海皇の咆哮 ''Kaiō no Hōkō''), is based on ''[[Structure Deck: Roar of the Sea Emperor]]'', the name of the ''[[OCG]]'' [[Structure Deck]] it was released in.
