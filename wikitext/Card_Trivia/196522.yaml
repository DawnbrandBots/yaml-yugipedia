title: Card Trivia:Infestation Pandemic
wikitext: |-
  {{Navigation}}

  * The Lswarm Infection is seen in this card; it is also seen in "[[Infestation Infection]]" and "[[Creeping Darkness]]".
  * This artwork shows several [[Duel Terminal]] archetypes being infected by the "lswarm", including the three Ice Barrier Dragons.
  ** The arm of "[[Locomotion R-Genex]]" can be seen in the lower left corner.
