title: Card Trivia:Black Tyranno
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Extinction on Schedule]]", "[[Piranha Army]]", "[[Survival of the Fittest]]", and "[[Tail Swipe]]".
  * This monster is based on the ''[[wikipedia:Tyrannosaurus|Tyrannosaurus]]'', a species of large and bipedal predatory dinosaur from the [[wikipedia:Late Cretaceous|Late Cretaceous]] period.
  * This monster has a previously [[Anime-only|anime-exclusive]] counterpart: "[[Dark Tyranno]]".
