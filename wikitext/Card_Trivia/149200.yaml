title: Card Trivia:Blackwing - Kogarashi the Wanderer
wikitext: |-
  {{Navigation}}

  * This monster is named after "kogarashi", the Japanese term for the cold winter wind in Japan.
  * This monster has the highest [[Level]] (6) and [[original ATK]] (2300) of all non-[[Synchro]] "[[Blackwing]]" [[Tuner monster]]s.
  ** However, this monster is tied with "[[Blackwing - Boreastorm the Wicked Wind]]" for the highest Level of all "Blackwing" Tuner monsters.
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this is the first Tuner monster that the opponent can use as [[Synchro Material]].
