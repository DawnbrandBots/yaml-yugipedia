title: Card Trivia:Origami Goddess
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Occasional Folding Paper God" (折々の紙神 ''Oriori no Kamigami'') and appearance features several puns:
  ** "Oriori" features the base kanji "''ori''" (折), the Japanese word for "folding". When adding the similar-sounding kanji (々), it forms "''oriori''" (折々), the Japanese word for "occasionally".
  ** "Kamigami" uses the kana "''kami''" (かみ), the Japanese word for "paper". The kana has a similar writing and pronunciation with "''gami''" (がみ), the Japanese word for "god".
  *** When combined, they form the word "[[wikipedia:Origami|origami]]", the Japanese art of folding paper into smaller figurines, which literally translate "folding paper". This card's name can also be translated to "folding paper god".
  **** Fittingly, this monster resembles the origami figurine of [[wikipedia:Themis|Themis]], the Greek goddess of justice. This is enforced by this monster's scales, sword, and its obscured eyes, and the Greek temple in the background of this card's artwork.
  * The origami crescent moon in the background of this card's artwork references the myth of origami, where it is believed that [https://www.youtube.com/watch?v=e0cPOk5ry8M folding a piece of paper enough times would allow it to reach the Moon].
  ** The effect of "keep tossing coin and doubling the card attack and drawing cards for every 2 heads" is a reference to the infinite possibility of origami folding in theory, but not very practical in real life.
