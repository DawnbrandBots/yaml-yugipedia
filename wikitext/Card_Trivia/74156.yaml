title: Card Trivia:Robbin' Zombie
wikitext: |-
  {{Navigation}}

  * This card is the [[Zombie counterpart]] of "[[Robbin' Goblin]]".
  * The zombie featured in this card's artwork appears in "[[Hard-sellin' Zombie]]", which has the opposite effect (sending a card from the opponent's [[Graveyard]] to the bottom of their [[Deck]]).
