title: Card Trivia:Behemoth the King of a Hundred Battles
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Behemoth the King of All Animals]]".
  ** This monster seems to depict an "evolved" form of "Behemoth" after the battle with "[[Manticore of Darkness]]" in the artwork of "[[Bunch of Beast Bodies]]", which is evident by its broken left horn.
