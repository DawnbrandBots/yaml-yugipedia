title: Card Trivia:Dark Matter Emperor Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Dark Matter of Phantoms]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Contact Fusion]] form of "[[Dark Matter Dragon]]".
  ** This monster also has 2 upgraded Contact Fusion forms: "[[Dark Matter Galaxy Dragon]]" and "[[Dark Matter Transcend Dragon]]".
  * This is the first [[Fusion Monster]] to be [[Summon]]ed by Contact Fusion in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  ** This is also one of the first Fusion Monsters that can be Summoned by Contact Fusion to be printed in ''[[Yu-Gi-Oh! Rush Duel]]''.
