title: Card Trivia:Evo-Instant
wikitext: |-
  {{Navigation}}

  * "[[Evoltile Odonto]]" and "[[Evolsaur Pelta]]" are featured on this card.
  * This is an "[[Evol]]" trap equivalent to "[[Ultra Evolution Pill]]".
  * This card is similar to "[[Evo-Branch]]", where a [[Reptile]]-[[Type]] monster is [[Tribute]]d to [[Summon]] an Evol monster, except that card Summons an "[[Evoltile]]" monster, while this card "skips" right to an "[[Evolsaur]]" monster.
  * This might mean that "Evolsaur Pelta" is the evolved form of "Evoltile Odonto".
