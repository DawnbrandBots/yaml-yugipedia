title: Card Trivia:Xyz Force
wikitext: |-
  {{Navigation}}

  * "[[Number S39: Utopia Prime]]" appears in this card's artwork.
  * This card is a reference to the card "[[Generation Force (card)|Generation Force]]".
  ** This card's naming scheme is similar to that of "Generation Force".
  ** This card's artwork depicts "Number S39: Utopia Prime" surrounded by a bright golden aura, similar to how the artwork of "Generation Force" depicts "[[Number 39: Utopia]]" being surrounded by a bright blue aura.
  *** This card's name and artwork reference the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|effect name]] of "Number S39: Utopia Prime" in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, "Pandora's Force", which depicts "Utopia Prime" glowing brightly before using its [[banish]]ing and damaging effects.
  ** Both cards' effects can [[search]] for an "[[Xyz (archetype)|Xyz]]" card, although this card's effect can [[send]] that card from the [[Deck]] to the [[Graveyard]] unless they control an [[Xyz Monster]]. Also, this card's effect involves Xyz Monsters that use other Xyz Monsters as material, which reflects the alternate [[Summoning condition]] of "Number S39: Utopia Prime" featured in this card's artwork.
