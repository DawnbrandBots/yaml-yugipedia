  * "[[Pitch-Black Power Stone]]" and two other markings of [[Spell Counter]]s (one in the palm of this monster's hand and the other on this monster's tome) appear in this card's artwork.
  * This monster appears in the artworks of "[[Endymion's Lab]]", "[[Quick Booster]]", and "[[That Wacky Alchemy!]]".
