title: Card Trivia:Evil HERO Malicious Edge
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Evil HERO]]" [[counterpart]] of "[[Elemental HERO Bladedge]]".
  ** Both share the same [[Attribute]] ([[EARTH]]), [[Level]] (7), and [[original ATK and DEF]] (2600/1800).
  ** Both can inflict [[piercing]] [[battle damage]] to the opponent if they [[attack]] a [[Defense Position]] monster.
  ** This is the first "Evil HERO" counterpart of an "[[Elemental HERO]]" monster to not be a [[Fusion Monster]].
  * This monster has two Fusion forms: 
  ** A Super Fusion form with "[[Evil Token]]": "[[Evil HERO Malicious Fiend]]".
  ** A Fusion form with "[[Evil HERO Infernal Gainer]]": "[[Evil HERO Malicious Bane]]"
  * This monster has the highest original ATK and DEF of all [[Main Deck]] "Evil HERO" monsters.
