title: Card Trivia:Prime Material Dragon
wikitext: |-
  {{Navigation}}

  * This monster is named after the "[[wikipedia:Prima materia|prima materia]]", a formless primeval substance that is regarded as the original material of the universe.
  * This monster has a [[Winged Beast]] [[counterpart]]: "[[Prime Material Falcon]]".
  * This card's Spanish prints feature a typo: the word "instead" is translated as "''en vez''" in the lore, instead of "''en su lugar''".
