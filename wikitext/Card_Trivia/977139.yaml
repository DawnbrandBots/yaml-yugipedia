title: Card Trivia:Steam Knight - Hamburk
wikitext: |-
  {{Navigation}}

  * This monster is based on the [https://www.cocos-jpn.co.jp/menu/grand/hamburg/ wrapped beef stew hamburg steak], a menu item offered the Japanese branch of [[Wikipedia:ja:ココスジャパン|Coco's Bakery]].
  ** This monster's name is a portmanteau of "hamburg steak".
  ** This monster's design features a cape resembling wrinkled tinfoil and steam emitting from its body, referencing how the hamburg steak is wrapped in tinfoil and steamed, befitting its title, "Steam Knight". Also, it wields a pair of gauntlets with a knife on its right arm and a fork on its left, the dining utensils required to eat the hamburg steak.
  ** The [[flavor text]] mentions this monster's "BFS Armor", which is an acronym for the "beef stew" poured into the steak. The "Foil-Packer" mechanism further alludes to the tinfoil that "packs" in the hamburg steak, while the highly analytical "Coc-OS" is a pun on the name of Coco's Bakery. Also, name of the goddess "Madera" references the [[Wikipedia:Madeira wine|Madeira wine]], which Coco's uses to accent the flavor of their beef stew.
