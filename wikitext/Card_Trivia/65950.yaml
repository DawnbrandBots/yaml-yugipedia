title: Card Trivia:Penguin Knight
wikitext: |-
  {{Navigation}}

  * This monster and/or "Penguin Soldier" appear in the artworks of "[[Battle x 2]]", "[[Diamond Dust]]", "[[Drop Exchange]]", "[[Penguin Sword]]", "[[Soul Connection]]".
  * This monster has a [[recolored counterpart]]: "[[Penguin Soldier]]".
  * This is the only card to use the word "unite".
  ** "[[Fiber Jar]]" and "[[Monster Recovery]]" used to have that word before being reprinted with [[Problem-Solving Card Text]].
  * This monster's Japanese name, 「ペンギン・ナイト」 (''Pengin Naito''), is contained in the Japanese name of "[[Penguin Nightmare]]" (ペンギン・ナイトメア ''Pengin Naitomea'').
