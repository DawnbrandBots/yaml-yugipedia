  [[File:Catapult_Turtle_fires_Gaia.png|thumb|right|250px|"[[Catapult Turtle (manga)|Catapult Turtle]]" fires "[[Gaia the Dragon Champion (manga)|Gaia the Dragon Champion]]" at "[[Castle of Dark Illusions (manga)|Castle of Dark Illusions]]".]]

  * "[[Artillery Catapult Turtle]]" and "[[Gaia the Magical Knight of Dragons]]" appear in this card's artwork.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|083|ref}} and {{episode|Yu-Gi-Oh!|015|ref}}, specifically from the panel showing "[[Catapult Turtle (manga)|Catapult Turtle]]" firing "[[Gaia the Dragon Champion]]" at the "[[Castle of Dark Illusions (manga)|Castle of Dark Illusions]]" to destroy its flotation ring.

