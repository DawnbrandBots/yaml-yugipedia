title: Card Trivia:Monster Rebirth
wikitext: |-
  {{Navigation}}
  [[File:Spell_Card_"Monster_Reborn".png|thumb|right|250px|[[Dark Yugi (manga)|Dark Yugi]] using "[[Monster Reborn (manga)|Monster Reborn]]" to revive "[[Dark Magician (manga)|Dark Magician]]".]]

  * The card "[[Monster Reborn]]" appears in this card's artwork.
  * This card references [[Dark Yugi and Pandora's Duel (manga)|Dark Yugi and Pandora's Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, due to the following:
  ** [[Dark Yugi (manga)|Dark Yugi]] [[activate]]d "[[Monster Reborn (manga)|Monster Reborn]]" during the same turn his "[[Dark Magician (manga)|Dark Magician]]" was destroyed by battle, to [[Special Summon]] that same monster (during [[Pandora (manga)|Pandora]]'s turn), which are the same conditions needed to activate this card.
  *** This was arguably an iconic scene in the manga, as Dark Yugi and Pandora had spent several turns beforehand in a tense stalemate between their "Dark Magicians", before engaging in a back-and-forth battle of [[Spell]] and [[Trap Card]]s in a single turn. Ultimately, both copies of "Dark Magician" were [[destroy]]ed by battling each other, whereupon Dark Yugi and Pandora activated their single copies of "Monster Reborn" simultaneously to revive them.
  ** The "Monster Reborn" card in this card's artwork has a circular-like motion effect, similar to most of the Spell/Trap Cards used in that Duel (including "Monster Reborn").
  * This card treating the Special Summon as a Special Summon by the effect of "Monster Reborn" is only relevant for two card effects: "[[Millennium Revelation]]" (which allows "[[The Winged Dragon of Ra]]" to be Special Summoned by the effect of "Monster Reborn" only) and "[[Call of Darkness]]" (which sends all monsters that were Special Summoned by the effect of "Monster Reborn" to the Graveyard).

