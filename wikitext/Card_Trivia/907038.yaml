title: Card Trivia:Weighbridge
wikitext: |-
  {{Navigation}}

  * "[[Supply]]" appears in this card's artwork.
  ** Additionally, "[[Horn of Light]]", a broken "[[Fairy's Hand Mirror]]", one of the "[[Magical Hats]]", the dice from the artworks of "[[Graceful Dice]]" and "[[Skull Dice]]", and the spiked ceiling trap from the artwork of "[[Needle Ceiling]]" appear inside the cart being weighed in this card's artwork.
  ** Given the above items' appearance, this card's artwork seems to chronologically follow that of "[[Fusion Recycling Plant]]", as "Supply" is seen scavenging those items in its artwork.
