title: Card Trivia:Fish and Swaps
wikitext: |-
  {{Navigation}}

  * "[[7 Colored Fish]]" appears in this card's artwork.
  * This card's artwork and effect are based on those of "[[Trade-In]]".
  * This card is similar to "[[Fish and Kicks]]".
  ** Their artworks both depict multiple copies of "7 Colored Fish".
  ** Both cards' names are puns on "[[wikipedia:Fish and chips|fish and chips]]", an English dish consisting of fried fish and French fries.
  ** Both are [[Spell Card]]s that support [[banish]]ed [[Fish]], [[Sea Serpent]], and [[Aqua]] monsters, and were released in ''[[Generation Force]]''.
