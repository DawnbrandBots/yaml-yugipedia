title: Card Trivia:Cyberdark Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Cyberdark Impact]]'', ''[[Duelist Pack: Zane Truesdale]]'', ''[[Precious Pack Volume 1]]'', and ''[[Duelist Edition Volume 1]]''.
  * This monster appears in the artworks of "[[Cyberdark Impact!]]", "[[Cyberdark Inferno]]", "[[Cyberdark Invasion]]", "[[Cybernetic Horizon (card)|Cybernetic Horizon]]", and "[[Cyber Network]]".
  * "[[Degenerate Circuit]]" appears in the background of this card's artwork.
  * Visually, this monster is a Fusion of "[[Cyberdark Keel]]", "[[Cyberdark Edge]]" and "[[Cyberdark Horn]]", which makes up its wings, head, and body, respectively.
  * This monster has an [[Card evolutions|upgraded]] form: "[[Cyberdarkness Dragon]]".
  * This monster has a [[Fusion Monster|Fusion]] with "[[Cyber End Dragon]]": "[[Cyberdark End Dragon]]".
  * This monster has an opposite counterpart: "[[Cyberdark Chimera]]", which is a re-arranged combination of the [[Fusion Material]]s used for this monster.
