title: Card Trivia:Lost Pride
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's artwork depicts a boxer fighting with brass knuckles concealed inside of his boxing glove. This, and this card's name, represents [[Zane Truesdale]]'s fall from grace in the ''[[Yu-Gi-Oh! GX]]'' anime, where his loss to [[Aster Phoenix]] causes him to "lose" his "pride" as a Duelist and develop a perpetual losing streak; however, following his "Underground Duel" against [[Mad Dog]], he is unwillingly transformed into a crueler and sadistic Duelist whose goal is to win at all costs.
