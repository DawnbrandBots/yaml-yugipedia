title: Card Trivia:Neo Flamvell Garuda
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Garuda|Garuda]], a large mythical bird or bird-like creature that appears in both [[wikipedia:Buddhist mythology|Buddhist]] and [[wikipedia:Hindu mythology|Hindu mythology]].
  * This is one of four "[[Flamvell]]" monsters with more than 200 DEF, the other three being "[[Flamvell Fiend]]", "[[Flamvell Guard]]", and "[[Flamvell Uruquizas]]"
