title: Card Trivia:Ancient Sunshine
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Ancient Fairy Dragon]]" and "[[Regulus]]" appear in this card's artwork.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "Ancient Fairy Dragon" in the ''[[Yu-Gi-Oh! 5D's]]'' anime, "Eternal Sunshine", while its fixed damage amount of 2100 is based on the [[original ATK]] of the aforementioned monster.
