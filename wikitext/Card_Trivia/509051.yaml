title: Card Trivia:Spell Economics
wikitext: |-
  {{Navigation}}

  * "[[Fatal Abacus]]" appears in this card's artwork.
  * The book in this card's artwork appears in the artworks of "[[Fruits of Kozaky's Studies]]" and "[[Good Goblin Housekeeping]]".
  ** The pen and notes in this card's artwork also appears in the artwork of "Good Goblin Housekeeping".
  * The design of the book cover features of the currency symbols for the [[wikipedia:Dollar|dollar]] ([[wikipedia:Dollar sign|$]]) and the [[wikipedia:Japanese yen|Japanese yen]] ([[wikipedia:Yen and yuan sign|¥]]).
  * According to the [[Master Guide 2 card storylines]], the book contains an infinite number of pages, and the pen moves on its own according to the thoughts of its owner.
