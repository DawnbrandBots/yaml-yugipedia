title: Card Trivia:Arcana Force VII - The Chariot
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Arcana Call]]" and "[[The Material Lord]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Chariot (tarot card)|The Chariot]].
  ** This monster's number "VII" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (1700) reference how The Chariot is the seventh trump card of the Majora Arcana Tarot.
  * This monster's visual design features a weak similarity with H.P. Lovecraft's [[wikipedia:Great Race of Yith|Great Race of Yith]], keeping in relation with the extraterrestrial theme of the "[[Arcana Force]]" archetype.
