title: Card Trivia:Darkness Phantomite
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "phantom" and "[[wikipedia:Dynamite|dynamite]]".
  ** "Phantom" is based on the Japanese term for the [[Wyrm]] [[Type]], "Phantom Dragon" (幻竜 ''Genryū''), in which the monsters highly resemble [[Dragon]] monsters.
  ** The tip of this monster's staff features three sticks of dynamite; this, along with being the required [[Fusion Material]] for "[[Demolition Meltdown Dragon Darkness Blasthamut]]", reference how dynamite is used as an explosive for demolition operations.
  * This monster has a [[Praime]] [[counterpart]]: "[[Praime Phantomite]]".
