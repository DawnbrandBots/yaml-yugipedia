title: Card Trivia:Veda Kalarcanum
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded [[Pendulum Monster|Pendulum]] form of "[[Veda Kalanta]]".
  * This monster is named after the [[wikipedia:Vedas|Vedas]], the philosophical-religious texts of Hinduism written during the [[wikipedia:Vedic period|Vedic period]].
  ** This monster's Japanese name is a reference to the [[wikipedia:Upanishads|Upanishads]], the Sanskrit texts of the late Vedic and post-Vedic periods that "document the transition from the archaic ritualism of the Veda into new religious ideas and institutions".
