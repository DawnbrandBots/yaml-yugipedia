title: Card Trivia:Reese the Ice Mistress
wikitext: |-
  {{Navigation}}

  * This monster is related to the "[[Ice Barrier]]" archetype, along with "[[Blizzard Warrior]]". This is supported by the fact that both wear the symbol of the "Ice Barrier" on their bodies.
  * Even though this card is a [[Sea Serpent]]-[[Type]] monster, it appears to be fully human.
