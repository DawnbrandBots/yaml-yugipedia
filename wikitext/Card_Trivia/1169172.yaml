title: Card Trivia:Winged Kuriboh Sabatiel LV10
wikitext: |-
  {{Navigation}}

  * The Emerald Tablet [[Shadow Charm]] appears in this card's artwork.
  * This monster is a [[retrained]] counterpart of "[[Winged Kuriboh LV10]]".
  ** This monster's name and effects to [[reveal]] itself from the [[hand]] and [[add]] "[[Polymerization]]" or a "[[Fusion (archetype)|Fusion]]" [[Spell Card]] from the [[Deck]] to the hand is based on the effect of the ''[[OCG]]''/''[[TCG]]'' version of "[[Sabatiel - The Philosopher's Stone]]", which requires a "[[Winged Kuriboh (archetype)|Winged Kuriboh]]" monster to be in the [[Graveyard]] to [[activate]] it. The second part of this effect where this monster [[shuffle]]s itself into the Deck after adding the aforementioned cards is based on the [[Sabatiel - The Philosopher's Stone (anime)|anime]] and ''[[Yu-Gi-Oh! Tag Force]]'' versions of "Sabatiel - The Philosopher's Stone" (except ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'', which functions the same as the ''OCG''/''TCG'' version).
  ** This monster's [[Quick Effect]], requiring the player to have 1000 or less [[Life Points]] before [[Special Summon]]ing itself from the [[hand]] during the opponent's turn, references multiple instances in the ''[[Yu-Gi-Oh! GX]]'' anime when [[Jaden Yuki]] (whose Life Points were exactly 1000 or less) Special Summons "[[Winged Kuriboh LV10 (anime)|Winged Kuriboh LV10]]" via the effect of "[[Transcendent Wings (anime)|Transcendent Wings]]" during his opponent's turn.
