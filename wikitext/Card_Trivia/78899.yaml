title: Card Trivia:Masked Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Big Volcano]]" and "[[Revenge Rally]]".
  * This card appears in the artwork of "[[Vain Betrayer]]".
  * This monster has an unmasked, [[Wyrm]] [[counterpart]]: "[[Unmasked Dragon]]".
  ** The artwork of "Revenge Rally" appears to depict this monster's transformation to "Unmasked Dragon".
