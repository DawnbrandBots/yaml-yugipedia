title: Card Trivia:Crystal Master
wikitext: |-
  {{Navigation}}

  * The crystal forms of "[[Advanced Crystal Beast Amber Mammoth]]", "[[Advanced Crystal Beast Amethyst Cat]]", "[[Advanced Crystal Beast Cobalt Eagle]]", "[[Advanced Crystal Beast Emerald Tortoise]]", "[[Advanced Crystal Beast Ruby Carbuncle]]", "[[Advanced Crystal Beast Sapphire Pegasus]]", and "[[Advanced Crystal Beast Topaz Tiger]]" appear in this card's artwork, as noted by their dark shades.
  ** This is the first ''[[OCG]]''/''[[TCG]]'' card to depict the crystal forms of the "[[Advanced Crystal Beast]]s", long before their cards were printed for the game.
  * This monster's [[DARK]] [[Attribute]] and appearance are based on [[Jesse Anderson]], who used the "Advanced Crystal Beast" Deck in the ''[[Yu-Gi-Oh! GX]]'' anime while he was possessed by [[Yubel (character)|Yubel]].
