title: Card Trivia:Solidarity
wikitext: |-
  {{Navigation}}

  * This is a [[Cover card]] of ''[[Deck Custom Pack 01]]''.
  * "[[Ojama Green]]", "[[Ojama Black]]", "[[Ojama Blue]]", "[[Ojama Yellow]]", and "[[Ojama Red]]" are featured in this card's artwork.
  ** Similar to the effect, in the picture, the five [[Ojamas]] are sticking together after many of their fellows have died. The skeletons appear to be the other "Ojamas" in "[[Ojama Country]]".
  ** The "Ojamas" are eligible for this card's effect, as they are all [[Beast]]-type.
  * This is the first card whose effect depends on the ''original'' Type of a monster, and the first that takes into account any original aspect of a monster other than ATK/DEF.
  ** This was likely meant to prevent players from abusing card effects that change Types, such as "[[Zombie World]]".
