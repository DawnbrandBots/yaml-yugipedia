title: Card Trivia:Tutan Mask
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Vain Betrayer]]".
  * The name "Tutan" possibly came from the name of the ancient [[wikipedia:Pharaoh|Egyptian pharaoh]] [[wikipedia:Tutankhamun|Tutankhamun]]. If so, this could be symbolizing his [[wikipedia:death mask|death mask]].
  ** This is further evidenced by the Japanese pronunciation of the name, "Tsutan Kamen", seeing that ''kamen'' is Japanese for ''mask.''
  * This card (except for not being able to [[negate]] [[Effect Monster]] [[Card effect|effects]]) is a [[Zombie]]-[[Type]] version of "[[Dark Illusion]]".
