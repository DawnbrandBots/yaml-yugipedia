title: Card Trivia:Chaos Summoning Beast
wikitext: |-
  {{Navigation}}

  * This monster is a physical amalgam of the three "[[Sacred Beast]]s", including the tail of "[[Uria, Lord of Searing Flames]]", the torso, arms, and wings of "[[Hamon, Lord of Striking Thunder]]", the head and the hands  of "[[Raviel, Lord of Phantasms]]".
