title: Card Trivia:Kewl Tune Mix
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Audio mixing (recorded music)|audio mixing]], a term used in audio where a producer or DJ will adjust the levels of tracks, as well as adjust or even completely cut individual frequencies of sounds, to make all the tracks sound ideal with each other in the final mix.
  ** The monster's design includes pigtails resembling [[wikipedia:Phone connector (audio)|TRS connectors]], a hole in her pant leg resembling an audio jack (both of which are ubiquitous in audio equipment), and a pair of disc-shaped hair accessories resembling [[wikipedia:Phonograph record|phonograph records]].
