title: Card Trivia:Bringer of Lies
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the [[Wikipedia:Antichrist|Antichrist]], an entity depicted in the [[wikipedia:Bible|Bible]] as a figure who opposes [[wikipedia:Jesus|Jesus Christ]] and falsely substitute themselves as a savior in Christ's place before the [[wikipedia:Second Coming|Second Coming]].
  ** This monster's design is based on the depiction of Jesus Christ wearing the [[Wikipedia:Crown of thorns|crown of thorns]] worn during his [[Wikipedia:Crucifixion of Jesus|crucifixion]], while the background of this card's artwork features rays of light shining behind it; however, given its name and [[Fiend]] [[Type]], this monster's design further references how it is based on the "false image" of Jesus Christ, similar to the Antichrist.
