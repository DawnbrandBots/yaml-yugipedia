title: Card Trivia:Searchlightman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Junk Sleep]]".
  * This is the first card to prevent the opponent from [[Set]]ting their cards.
  * A searchlight is used to find people that could be hidden within the shroud of night.
  ** This is fitting due to this card's effect of preventing any other cards from being [[Set]] for the rest of the turn it was [[flip]]ped [[face-up]].
