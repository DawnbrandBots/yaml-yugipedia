title: Card Trivia:Human-Wave Tactics
wikitext: |-
  {{Navigation}}

  * Multiple "[[Mokey Mokey]]s" appear in this card's artwork.
  * This card appears in the Japanese artwork of "[[Trap Sluzer]]".
  * This card's name is based on the [[Wikipedia:Human wave attack|human wave attack]], a military tactic involving the use of sheer numbers of troops, usually poorly supported, to overwhelm the enemy, as opposed to a much smaller, well-armed squad.
  ** This is reflected in this card's effect to overwhelm the opponent by continuously [[Special Summon]] a number of [[Level 2]] or lower [[Normal Monsters]] (the weakest monsters in the game) equal to the number of Level 2 or lower Normal Monsters [[destroy]]ed by battle.
