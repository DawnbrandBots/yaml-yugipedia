  * "[[Goldenhair, the Newest Plunder Patroll]]" and "[[Blackbeard, the Plunder Patroll Captain]]" appear in this card's artwork.
  * The telescope emblem also appears in the artworks of "Blackbeard, the Plunder Patroll Captain", "[[Whitebeard, the Plunder Patroll Helm]]", "[[Redbeard, the Plunder Patroll Matey]]", "[[Bluebeard, the Plunder Patroll Shipwright]]", "[[Plunder Patroll Booty]]", "[[Plunder Patroll Shipyarrrd]]", and "[[Pride of the Plunder Patroll]]".
