title: Card Trivia:Lev Shaddoll Fusion
wikitext: |-
  {{Navigation}}

  * A form of "[[El Shaddoll Apkallone]]" resembling "[[Evigishki Neremanas]]" appears in this card's artwork.
  ** This form possesses the same "[[Gishki Nekromirror]]" on its chest as "Neremanas".
  * The word "Lev" is derived from the Hebrew word for "heart".
