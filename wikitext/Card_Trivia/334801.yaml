title: Card Trivia:Terratiger, the Empowered Warrior
wikitext: |-
  {{Navigation}}
  * This monster's Japanese name "Teraigā" (テライガー) is a portmanteau of "tera" (terra) and "taigā" (tiger).
  * This monster is based on the [[wikipedia:White Tiger (China)|White Tiger]], one of the [[wikipedia:Four Symbols (China)|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]].
  * This monster appears in the artwork of "[[White Tiger Summoner]]".
