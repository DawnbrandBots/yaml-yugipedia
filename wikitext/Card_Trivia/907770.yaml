title: Card Trivia:Couple of Aces
wikitext: |-
  {{Navigation}}

  * Two "[[Cup of Ace]]s" appear in this card's artwork.
  ** This card's name is a pun on "Cup of Ace", which features a similar [[draw]]ing effect based on the result of the [[coin toss]].
  ** This card's artwork features two [[wikipedia:Ace|ace playing cards]], while the monsters resemble the letter "A" used to represent the aces.
