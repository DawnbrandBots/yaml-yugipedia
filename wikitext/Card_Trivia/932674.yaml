title: Card Trivia:Evolzar Lars
wikitext: |-
  {{Navigation}}

  * Based on its Simplified Chinese translation, this card's Japanese name is a wordplay of "Wrath" and "[[wikipedia:Meuse|Meuse]]", a river that the [[wikipedia:Mosasaur|Mosasaur]] is named after. “Lars” is also the name of a Mosasaur specimen.
  * This card is the first "[[Evolzar]]" monster that does not require [[Dinosaur]] monsters as [[Xyz Material]]s to be [[Xyz Summon]]ed.
