title: Card Trivia:Dizzy Angel
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card appears in the original anime artwork of "[[Montage Dragon]]", although it is erroneously depicted as a [[Normal Monster]].
  * In this card's original Japanese artwork, the bottle held by this monster depicts [https://en.wikipedia.org/wiki/Sake sake], an alcoholic beverage made from fermented rice. In the international artwork, it was changed to hot sauce to avoid themes of alcoholism.
  * This card's original Japanese name, "Drunken Angel", is a reference to the Kurosawa [[wikipedia:Drunken Angel|film of the same name]].
