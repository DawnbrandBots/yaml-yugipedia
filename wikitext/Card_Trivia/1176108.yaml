title: Card Trivia:Mystical Celtic Sage
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Mind Scan (card)|Mind Scan]]".
  * This monster is a [[retrained]] [[counterpart]] of "[[Celtic Guardian]]".
  * This monster's 1400 [[ATK]] and 2000 [[DEF]] are a reference to the ATK of "Celtic Guardian" and the DEF of "[[Mystical Elf]]", respectively.
  ** Both feature the word "Elf" in their Japanese names ("Elf Swordsman" and "Holy Elf", respectively) and were used by [[Yugi Mutou (manga)|Yugi Mutou]]/[[Dark Yugi (manga)|Dark Yugi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ([[Yugi Muto]]/[[Yami Yugi]] in the [[Yu-Gi-Oh! (anime)|anime]]).
  * This monster's effect to allow the player to [[draw]] three cards and [[discard]] two might be based on the effect of "[[Graceful Charity]]".
  ** "Graceful Charity" was never actually played by Dark Yugi in the manga, but it was used by Yami Yugi in the anime; however, it was included in ''[[Structure Deck: Yugi]]''.
