title: Card Trivia:Radiant Typhoon Fonix, the Great Flame
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Radiant Typhoon Manifestation]]".
  * This monster's Japanese name (絢嵐豪火, ''Kenrangōka'') is a pun on 「絢爛豪華」(''Kenrangōka''), a [[wikipedia:Yojijukugo|four-character idiom]] that combines the two idioms that express beautiful appearance (絢爛, ''Kenran'' and 豪華, ''Gōka'')
