title: Card Trivia:Stars Align Above the Shrine
wikitext: |-
  {{Navigation}}

  * The shrine in "[[Breath of Acclamation]]" appears in this card's artwork.
  * This card is based on a ''[[wikipedia:Himorogi|himorogi]]'', a sacred space or alter in [[wikipedia:Shinto|Shinto religion]] where it is marked off and purified to make it a space for the Kami to inhabit.
  * This card, along with "[[Shinobaron Shade Peacock]]" and "[[Shinobaroness Shade Peacock]]", was [https://yu-gi-oh.jp/news_detail.php?page=details&id=1663 revealed] on July 7, 2023, during the traditional Japanese celebration of [[wikipedia:Tanabata|Tanabata]], on which the [[Shinobird]] series is themed.
