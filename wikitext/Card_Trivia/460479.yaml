title: Card Trivia:Meteor Dragon Red-Eyes Impact
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Red-Eyes]]" [[Gemini]] retrained [[counterpart]] of "[[Meteor Dragon]]".
  ** This monster's name and design reference the process of [[wikipedia:atmospheric entry|atmospheric entry]], in which an object from outer space (i.e., meteors) passes through the atmosphere of a celestial body and burns upon entry before it impacts the surface.
  * This monster has a combined [[Fusion Monster|Fusion]] form with "[[Red-Eyes Black Flare Dragon]]": "[[Meteor Black Comet Dragon]]".
  ** This monster's head and wings can be seen on the latter's chest, and it is a valid [[Fusion Material]] for its [[Fusion Summon]].
