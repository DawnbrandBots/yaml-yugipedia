title: Card Trivia:Blue Flame Swordsman
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Legendary Collection 4: Joey's World Mega Pack]]''.
  * This monster's sword is inscribed with the kanji for "blue flame" (蒼炎 ''Sōen''), referencing this card's name.
  ** The inscribing on the sword also references "[[Flame Swordsman]]", whose sword is inscribed with the kanji for "flame" (炎).
  * This monster's name and appearance are based on blue flames, which is known for having a higher temperature than the conventional red/orange flames. When blue flames are cooled, they will revert to the red/orange state, reflecting its anime effect to [[Special Summon]] "[[Flame Swordsman (anime)|Flame Swordsman]]" from the [[Deck]] or [[Graveyard]] when it is [[destroy]]ed.
  ** This monster's first effect references the [[Deck Master ability]] of "Flame Swordsman" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, which allowed [[Joey Wheeler]] to decrease the [[ATK]] of "Flame Swordsman" in order to increase the ATK of another monster by the same amount. In the ''[[OCG]]''/''[[TCG]]'', this monster's effect specifically [[target]]s [[Warrior]] monsters, which is the same Type of monsters affected by the Deck Master ability of "Flame Swordsman".
