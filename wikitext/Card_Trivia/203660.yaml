title: Card Trivia:Solemn Wishes
wikitext: |-
  {{Navigation}}

  * This card is related to "[[Solemn Judgment]]" and "[[Solemn Warning]]" because they all have "God" ("Kami") in their Japanese names.
  ** This provides support for the theory that the woman in this card's artwork could be one of the women behind the old man in the artwork of "Solemn Judgment".
  ** Consider the fact that the Japanese name for this card is translated to "God's Blessings", the woman could simply be the old man's ("God's") subject while the other women in the other cards are clearly his followers.
  ** This is the only "Solemn" card without the old man in the card artwork.
