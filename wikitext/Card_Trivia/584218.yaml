title: Card Trivia:Dinowrestler Terra Parkourio
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Parkour|parkour]] and the ''[[wikipedia:Lourinhanosaurus|Lourinhanosaurus]]''.
  * The usage of the word "Terra" (from the Latin for "Earth") in this monster's name, could be an allusion to how when this monster debuted in the anime, it was used in conjunction with "[[G Golem Crystal Heart]]", the [[Signature card]] of the [[Earth (character)|Earth Ignis]].
