title: Card Trivia:Reckless Greed
wikitext: |-
  {{Navigation}}

  * This card represents the consequences of being recklessly greedy. The gold allures the man in the picture whilst; at the same time it hides a snake, and is set on a trapdoor. Should the man take the gold, he would be attacked by the snake hidden underneath it or fall through the trapdoor; similarly, should the player activate this card and [[Draw a card|draw]], they would lose the right to conduct their [[Draw Phase]] for two whole turns, which could easily impair their game.
