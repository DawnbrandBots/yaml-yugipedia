title: Card Trivia:Lava Dragon
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on the [[wikipedia:Salamander|salamander]], a reptilian creature related to the dragon which is often associated with the classic element of fire in alchemy.
  * This monster is a juvenile version of "[[Magma Dragon]]". Fittingly,  both monsters share the same [[Attribute]] ([[FIRE]]), [[Level]] (4), and [[original ATK and DEF]] (1600/1200).
