title: Card Trivia:Red Mask
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears to be based on a stereotypical [http://powerrangers.wikia.com/wiki/Super_Sentai Super Sentai] or [http://powerrangers.wikia.com/wiki/Power_Rangers Power Rangers] character.
  ** Specifically, "Red Mask" is a nod to the '''Rookie Red Ranger''' trope from these series– the protagonist (often the Red-color-coded member) is the newest member of the team of heroes. The Red Ranger serves as a viewer surrogate who helps the audience relate more closely to the story, learning things at the same time they do.
  ** There is an actual Super Sentai character known as [http://powerrangers.wikia.com/wiki/Takeru_(Maskman) Red Mask].
