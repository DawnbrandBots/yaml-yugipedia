title: Card Trivia:Celeb Rose Luxury Magicians
wikitext: |-
  {{Navigation}}

  * "[[Celeb Rose Magician]]" and "[[Celeb Rose Witch]]" appear in this card's artwork, wearing more elaborately-decorated dresses.
  ** The artwork of "[[Charis Magic - Elegant Change]]" seems to depict the former changing into her appearance as this monster.
  * This monster is based on "[[The Dark Magicians]]".
