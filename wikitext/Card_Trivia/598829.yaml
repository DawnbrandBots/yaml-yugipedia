title: Card Trivia:The Return to the Normal
wikitext: |-
  {{Navigation}}

  * "[[Gigobyte]]", "[[Haniwa]]", "[[Mokey Mokey]]", "[[Mushroom Man]]", "[[Petit Dragon]]", and the foot of "[[Manticore of Darkness]]" appear in this card's artwork.
  ** The events depicted in this card's artwork are a continuation of the events in the artworks of "[[The Law of the Normal]]" and "[[The Revenge of the Normal]]", and are likely continued in the artwork of "[[The Toil of the Normal]]".
