title: Card Trivia:SPYRAL GEAR - Last Resort
wikitext: |-
  {{Navigation}}

  * "[[SPYRAL Super Agent]]" and "[[SPYRAL Sleeper]]" appear in this card's artwork.
  * This equipment appears in the artwork of "[[SPYRAL MISSION - Rescue]]".
  * This card is based on the [[fandom:w:c:metalgear:Metal Gear (weapon)|Metal Gear]] series of weapons from the eponymous series of games.
  ** Its effect to allow the equipped monster to attack directly may be a reference to the weapons' ability to launch a nuclear attack from anywhere on the planet; most famously said to be the undetectable Metal Gear REX, which was also the [[fandom:w:c:metalgear:Metal Gear REX|only playable Metal Gear in the series, used by Old Snake]].
  ** This card also draws on some design elements of the [[fandom:w:c:dexterslab:Dexo-Transformer|Dexo-Transformer]] from ''[[wikipedia:Dexter's Laboratory|Dexter's Laboratory]]''.
