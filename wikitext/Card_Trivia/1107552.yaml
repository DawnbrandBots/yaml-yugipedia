title: Card Trivia:Evasive Chaos Ninsect Crimson Blade Nanahoshi
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|天|てん}}{{Ruby|刀|とう}}のナナホシ, ''Tentō no Nanahoshi'') is a double-layered pun: "Tentō" is the Japanese word for "ladybug", while "Nanahoshi" is the Japanese name for the [[wikipedia:Coccinella septempunctata|seven-spotted ladybug]].
  ** In addition, this monster's Japanese name is a pun on the name of its owner, [[Tenten Nanahoshi]].
