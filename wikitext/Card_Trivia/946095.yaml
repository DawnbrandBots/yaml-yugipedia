title: Card Trivia:Lengard
wikitext: |-
  {{Navigation}}

  * The [[Eye of Wdjat]] appears on this monster.
  * This monster's Japanese name (レンガード, ''Rengādo'') is a portmanteau of the Japanese word for "brick" (レンガ, ''renga'') and "guard" (ガード, ''gādo'').
  ** Both words reflect this monster's brick-like appearance and its effect to "guard" the player's [[Life Point]]s by [[destroy]]ing itself.
