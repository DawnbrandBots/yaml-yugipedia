title: Card Trivia:Grace Kamioki
wikitext: |-
  {{Navigation}}

  * "[[Grace Princess Hina]]", "[[Grace Princess Kana]]", "[[Grace Princess Kaori]]", and "[[Grace Princess Mai]]" appear in this card's artwork.
  * This card is based on ''kamioki'',  a traditional Japanese ceremony that is part of the larger ''[[wikipedia:Shichi-Go-San|Shichi-Go-San]]'' celebration, in which children who reach the age of three are allowed to let their hair grow out, symbolizing a step towards adulthood and healthy growth.
