title: Card Trivia:Miracle Fusion
wikitext: |-
  {{Navigation}}

  * The "H" insignia in this card's artwork can also be seen in the artwork of "[[Hero Signal]]".
  * This card's artwork is similar to that of "[[D-Fusion]]".
  * This card has an "[[Evil HERO]]" [[counterpart]]: "[[Dark Calling]]".
  ** This card can [[banish]] [[Fusion Material]]s from the [[field]] and/or [[Graveyard]], while "Dark Calling" banishes them from the [[hand]] and/or Graveyard.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Miracle Fusion]]".
