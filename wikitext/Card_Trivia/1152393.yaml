title: Card Trivia:Dragunity Falchion
wikitext: |-
  {{Navigation}}

  * This monster is a degraded [[Tuner monster|Tuner]] form of "[[Dragunity Knight - Ascalon]]" ("[[Dragunity Divine Lance]]").
  * This monster has a [[Synchro Monster|Synchro]] form combined with "[[Dragunity Remus]]" and mounted by "[[Dragunity Quirinus]]": "[[Dragunity Knight - Areus]]".
  * This monster is named after the [[wikipedia:Falchion|falchion]], a type of single-edged sword.
