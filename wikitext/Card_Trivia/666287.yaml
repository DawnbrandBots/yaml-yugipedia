title: Card Trivia:Ancient Warriors Saga - Sun-Liu Alliance
wikitext: |-
  {{Navigation}}

  * This card's artwork is a reference to a moment in the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', when [[wikipedia:Sun Quan|Sun Quan]] and [[wikipedia:Liu Bei|Liu Bei]] form an alliance against their common foe, [[wikipedia:Cao Cao|Cao Cao]], previous to [[wikipedia:Battle of Red Cliffs|Battle of Red Cliffs]].
  * "[[Ancient Warriors - Graceful Zhou Gong]]", "[[Ancient Warriors - Masterful Sun Mou]]", and "[[Ancient Warriors - Ingenious Zhuge Kong]]" appear in this card's artwork.
  * This card has the longest effect of any [[Spell Card]] in the English ''[[TCG]]'', with 112 words and 679 characters.
