title: Card Trivia:Code Change
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The card "[[Amazoness Swords Woman]]" appears in this card's artwork, depicted having its [[Warrior]] [[Type]] changed to [[Spellcaster]] via this card's effect.
  ** This depiction seems contrary to its effect, which states it can only change a Type written in a card's "effect text", but "Amazoness Swords Woman" mentions no Type in its text.
