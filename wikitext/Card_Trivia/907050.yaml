title: Card Trivia:Fukubiki
wikitext: |-
  {{Navigation}}

  * The goblins from "[[Gift Exchange]]" (including the recurring unlucky goblin boy wearing the "[[Scrap Kong]]" t-shirt), the map of "[[Amazement Precious Park]]", and the ticket from "[[Amazing Time Ticket]]" appear in this card's artwork.
  * This card's Japanese name is a play on「福引」(''fukubiki'', "lottery"), applying its reading to the kanji characters「福悲喜」with「悲喜」(''hiki'') meaning "sadness and joy".
