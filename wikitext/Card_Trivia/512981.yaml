title: Card Trivia:Terrible Deal
wikitext: |-
  {{Navigation}}

  * "[[Skull Servant]]" or "[[King of the Skull Servants]]" appears in this card's artwork.
  * The knight in this card's artwork also appears in the artworks of "[[Confiscation]]", "[[Toll]]", "[[Toll Hike]]", and "[[Judgment Roll]]".
  * This card's name, effect and artwork are a parody of "[[Dark Deal]]".
