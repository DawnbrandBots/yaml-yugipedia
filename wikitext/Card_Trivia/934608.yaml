title: Card Trivia:Gatchiri @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located in the orbs on this monster's shield and head.
  * This monster's name is based on "''gatchiri''", the Japanese onomatopoeia for "protect", reflecting this monster's shield and protective effects.
  * While its in-universe inspiration is unknown, it may be based on [[Bohman]], [[Harlin]], and their "[[Hydradrive]]" monsters.
  ** This monster features a short but stocky design, which may be a combination Harlin's short height and Bohman's muscular physique.
  ** This monster's shield resembles a dragon's head, which corresponds to the "Hydradrive" monsters, who feature reptilian and/or draconic designs.
  ** This monster's effects reference the effects of various "Hydradrive" [[Link Monster]]s:
  *** The [[negate|negation]] effect references how most [[Link-2]] and above "Hydradrive" Link Monsters could negate monster effects if they shared the same [[Attribute]].
  *** The protection effect references "[[Perfectron Hydradrive Dragon]]'s" effect to protect itself from being [[destroy]]ed by removing a [[Hydradrive Counter]].
  *** The effect to make one of the player's monsters unaffected by the opponent's card effects is likely based on that of "[[Paradox Hydradrive Atlas]]" who could also become unaffected by the opponent's card effects if there was a monster with the same Attribute on the [[field]].
  ** This monster's protective effects reflect how Bohman and his predecessors were meant to be vessels that the Ignis could fuse into in order to become a singular unstoppable AI.
