title: Card Trivia:Drilling Tractiger
wikitext: |-
  {{Navigation}}

  * "Tractiger" is a a portmanteau of "tractor" and "tiger", reflecting how this monster is a mixture of a tractor and a robotic tiger.
  * This monster is the ''[[Yu-Gi-Oh! GO RUSH!!]]'' [[counterpart]] of "[[Drilling Mandrill]]".
  ** This monster has a [[Praime]] counterpart: "[[Praime Tractiger]]".
  ** This monster has a younger counterpart: "[[Drill Tiger]]".
  ** This monster has an upgraded counterpart: "[[Perfect Tractiger]]".
