title: Card Trivia:The Ultimate Blue-Eyed Legend
wikitext: |-
  {{Navigation}}

  * "[[Blue-Eyes Ultimate Dragon (Rush Duel)|Blue-Eyes Ultimate Dragon]]" appears in both of this card's artworks.
  ** This card's artwork is based on a scene from {{episode||023|ref}}, where "[[Blue-Eyes Ultimate Dragon (anime)|Blue-Eyes Ultimate Dragon]]" was [[Summon]]ed for the first time.
  * This card's name is the same as the Structure Deck in which it debuted, ''[[Structure Deck: The Ultimate Blue-Eyed Legend]]''.

