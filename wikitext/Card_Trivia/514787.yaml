title: Card Trivia:The Fabled Kudabbi
wikitext: |-
  {{Navigation}}

  * This card's name is based on the mythological "[[wikipedia:Kudan (yōkai)|Kudan]]", a Japanese Yokai that has a human face with a calf's body. The Kudan is said to predict calamities and dies within 3 days of being born. This card's [[Card effect|effect]] references that by [[destroy]]ing itself when its controller has 3 or more cards in the [[hand]].
  * "Kuda" is also an Indonesian name for "Horse".
  * The imp-like creature in this card's artwork also appears in that of "[[The Fabled Unicore]]'s".
  ** The white color of the creature seems to refer to this card's status as a [[Synchro Monster]], all of which have white card backgrounds.
  ** This creature's name is Gree as pointed out in the [[Duel Terminal]] Master Guide
  * This monster is currently the weakest "[[Fabled]]" Synchro Monster.
