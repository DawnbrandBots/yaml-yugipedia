title: Card Trivia:Maxx "C"
wikitext: |-
  {{Navigation}}

  * According to [[Kevin Tewart]], this card was specifically designed to counter the "[[Legendary Six Samurai]]" archetype, and to a lesser extent, the "[[X-Saber]]" archetype.{{Citation needed}}
  * This monster is based on the [[wikipedia:Smokybrown cockroach|smokybrown cockroach]], a common pest in [[wikipedia:Japan|Japan]] and other areas, as implied by the living arrangements in the artworks of this card and other "[["C"]]" monsters. Smokybrown cockroaches have [[Shiny Black "C"|shiny, black bodies]] and are [[Flying "C"|adept flyers]].
  ** 19 cockroaches are visible in this card's artwork.
  ** This card's artwork and Japanese name, "Multiplying G", allude to the tendency of the smokybrown cockroach to rapidly infest homes, and its effect to draw a card each time the opponent [[Special Summon]]s after its resolution is also based on this tendency.
  * The [[wikipedia:DVD player|DVD player]] in this card's artwork sports a logo similar to the [[wikipedia:Blu-ray|Blu-ray]] brand with the B capitalized.
