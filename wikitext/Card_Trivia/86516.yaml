title: Card Trivia:Red Ogre
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Half Straight]]" and in the manga artwork of "[[Enma's Judgment (manga)|Enma's Judgment]]".
  * This monster is based on an ''[[wikipedia:Oni|oni]]'', an ogre-like ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore who is depicted as a muscular humanoid with red skin, a horned head, and wields a ''[[wikipedia:Kanabō|kanabō]]'', a spiked two-handed war club.
  * This is the [[signature card]] of [[Bastion Misawa (manga)|Bastion Misawa]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga. 
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|023|ref}}, specifically from the panel showing [[Red Ogre (manga)|this monster]] being Summoned.
