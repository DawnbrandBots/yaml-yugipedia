title: Card Trivia:Morphtronic Slingen
wikitext: |-
  {{Navigation}}

  * "[[Morphtronic Datatron]]" appears in this card's artwork.
  ** This is the first and only "[[Morphtronic]]" monster whose card artwork depicts two different "Morphtronic" monsters.
  * Like all "[[Morphtronic]]" monsters, this monster is based off a common household object; in this case, a slingshot.
  * This monster's Japanese name is derived from ''pachinko'', the Japanese word for slingshot, as well as a popular parlor game similar to pinball.
