title: Card Trivia:Arrivalrivals
wikitext: |-
  {{Navigation}}

  * "[[Akashic Magician]]", "[[Alchemic Magician]]" and "[[Slacker Magician]]" appear in this card's artwork.
  ** Having "Akashic Magician" show up as a third rival may be a reference to the newer rules, as a player would need a [[Link Monster]] in play to control two [[Xyz Monster]]s at once. However, its [[Link Arrow]]s would not actually allow this, and as a Link Monster it cannot be [[Normal Summon]]ed by this card's effects (or any other way).
  * The scene in this card's artwork is a continuation of "[[Xyz Tribalrivals]]", and is continued in "[[Staring Contest]]".
