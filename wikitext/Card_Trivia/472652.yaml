title: Card Trivia:Union Hangar
wikitext: |-
  {{Navigation}}

  * "[[W-Wing Catapult]]", "[[X-Head Cannon]]", "[[Y-Dragon Head]]", and "[[Z-Metal Tank]]" appears in this card's artwork.
  ** Despite appearing in this card's artwork, "X-Head Cannon" cannot be used for its effects, as it is not a [[Union Monster]].
  * The metal containers in this card's artwork also appear in the artwork of "[[Union Activation]]" and "[[Union Carrier]]".
