title: Card Trivia:Rodenut
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Acorn Squirrel" (ドングリス '' Dongurisu'') is a portmanteau of the Japanese words for "acorn" (ドングリ ''donguri'') and "squirrel" (リス ''risu'').
  ** This card's English name is a portmanteau of the words "rodent" and "nut," both of which are broader terms than the words used in the Japanese name.
