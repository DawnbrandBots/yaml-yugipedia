title: Card Trivia:Albion the Shrouded Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Bond]]", "[[Branded Disciple]]", "[[Branded in High Spirits]]", "[[Branded Lost]]", "[[Ecclesia and the Dark Dragon]]", "[[Icejade Cenote Enion Cradle]]", "[[Incredible Ecclesia, the Virtuous]]", "[[Swordsoul Assessment]]", and "[[Swordsoul Sacred Summit]]".
  * The kanji 「黒衣」 (''[[wikipedia:Kuroko|Kurogo]]'', lit. "Black-Shrouded") in this card's Japanese name is a term that refers to stagehands in traditional Japanese theater who dress all in black. The black clothing represents invisibility and conveys that the stagehands are not meant to be acknowledged.
  ** The theatrical theme of the word may be an nod to the "[[Despia]]" archetype.
  ** This card's name [[wikipedia:Albion|Albion]] is an alternative poetic name for [[wikipedia:Great Britain|Great Britain]] derived from ''Albus'' (Latin for "white"), which is itself the Japanese name of "[[Fallen of Albaz]]" (アルバスの{{Ruby|落|らく}}{{Ruby|胤|いん}} ''Arubasu no Rakuin'', "Fallen Child of Albus").
  * This monster is a depowered version of "[[Albion the Branded Dragon]]". Both monsters have the same appearance, and the artwork of "Branded Bond" depicts "Branded Dragon" transforming into this monster.
  ** This monster appears to be the 'normal' dragon form of "Fallen of Albaz", as it has the same color scheme, carries a similar necklace of fangs, treats itself as it, and is his only dragon form to reside in the [[Main Deck]].
  ** This monster in turn transforms into "[[Mirrorjade the Iceblade Dragon]]" after absorbing the powers of "[[Icejade Kosmochlor]]" and "[[Swordsoul Supreme Sovereign - Chengying]]".
