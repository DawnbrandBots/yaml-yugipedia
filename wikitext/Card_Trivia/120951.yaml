title: Card Trivia:Vision HERO Multiply Guy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Apparition]]".
  * This monster name shares the suffix "Guy" with the Japanese name of the "[[Destiny HERO]]" [[archetype]], which, along with the "[[Vision HERO]]" archetype, were used by Aster Phoenix's [[Aster Phoenix|anime]] and [[Aster Phoenix (manga)|manga]] incarnations, respectively.
