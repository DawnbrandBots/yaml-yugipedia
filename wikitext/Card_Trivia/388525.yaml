title: Card Trivia:Frightfur Kraken
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Kraken|kraken]], a mythical sea monster that is often portrayed as a giant octopus.
  ** This card's Japanese name, "Piton Kraken", is based on a [[wikipedia:Piton|piton]], metal wedge used in [[wikipedia:Mountaineering|mountain climbing]] to be driven into the cracks of the mountainside surface by a hammer and serve as an anchor.
