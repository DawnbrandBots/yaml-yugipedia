title: Card Trivia:Infernal Strike Fighter
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed counterpart of "[[Dark Strike Fighter]]".
  ** This monster's brown and bronze color scheme is based on those of the jacket worn by [[Greiger]], who uses "[[Dark Strike Fighter (anime)|Dark Strike Fighter]]" in the ''[[Yu-Gi-Oh! 5Ds]]'' anime, while its helmet resembles the shape of Greiger's [[Turbo Duel]]ing helmet.
  ** This monster is based on how "Dark Strike Fighter" was [[Forbidden]] from 2009 to 2014 due to its easy ability to inflict effect damage, not limited by any [[once per turn]] clause until an [[errata]] that made it only usable once per [[Main Phase 1]].
  *** Its first effect, being restricted to [[Main Phase 2]] and capable of [[destroy]]ing itself, also references how "Dark Strike Fighter" often [[Tribute]]d itself after attacking to deal supplementary damage to finish off a weakened opponent.
