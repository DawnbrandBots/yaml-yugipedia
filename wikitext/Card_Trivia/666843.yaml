title: Card Trivia:Ghost Meets Girl - A Mayakashi's Manuscript
wikitext: |-
  {{Navigation}}

  * "[[Shiranui Skillsaga Supremacy]]", "[[Yoko, the Graceful Mayakashi]]" and "[[Yuki-Onna, the Ice Mayakashi]]" appear in this card's artwork.
  ** This card and "[[Ghost Meets Girl - A Shiranui's Story]]" have the same naming structure and depict events from the same storyline. Specifically, this card appears to show "Yuki-Onna" intervening in the battle between "Skillsaga Supremacy" and "Yoko" (as shown in "[[Fateful Hour]]"), before transforming in "[[Yuki-Onna, the Absolute Zero Mayakashi]]".
