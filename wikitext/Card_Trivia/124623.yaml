title: Card Trivia:Dragunity Angusticlavii
wikitext: |-
  {{Navigation}}

  * This card's name refers to the to "''[[wikipedia:Tribunus angusticlavius|Tribunus angusticlavius]]"'' under the [[wikipedia:Military tribune|military tribune]] of a Roman army. An angusticlavius is an administrative officer who manages tasks between a [[wikipedia:Primus pilus|primus pilus]] and a [[wikipedia:Dux|dux]].
  * Among the [[Winged Beast]] "[[Dragunity]]" members, this monster is the only one whose face is uncovered.
