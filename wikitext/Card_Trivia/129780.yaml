title: Card Trivia:Gem-Knight Fusion
wikitext: |-
  {{Navigation}}

  * "[[Gem-Knight Lazuli]]" and "[[Gem-Knight Master Diamond]]" appear in this card's second artwork.
  ** According to the [[Duel Terminal Master Guide card storylines#"Lazuli" and "Virgo" Inherit the Fusion Power of "Gem-Knight Master Diamond"|''Duel Terminal Master Guide'' card storylines]], "Master Diamond" entrusted his longsword to "Lazuli" after the damage to his crystal core became excessive.
  * This card (with its first artwork) appears in the artwork of "[[Fusion Destruction]]".
  * The artwork of "[[Shaddoll Fusion]]" is based on this card's first artwork.
