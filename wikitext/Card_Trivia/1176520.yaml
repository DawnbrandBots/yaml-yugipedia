title: Card Trivia:Hiita the Fire Spiritualist
wikitext: |-
  {{Navigation}}

  * "[[Familiar of the Fire Spiritualist]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Spiritual Coven]]".
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Hiita the Fire Charmer (Rush Duel)|Hiita the Fire Charmer]]".
  ** This monster's name and effect reference "[[Spiritual Fire Art - Kurenai]]", a [[Spiritual Art]] [[Trap Card]] that allows the player to inflict damage to their opponent.
