title: Card Trivia:S-Force Professor DiGamma
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[S-Force Bridgehead]]" and "[[S-Force Specimen]]".
  * The "[[S-Force]]" crest (black coloration) appears on this card's artwork, located on "Digamma's" left shoulder (partially obscured by his hand).
  * This monster is named after the archaic Greek letter [[wikipedia:Digamma|Digamma]].
  * Like other "[[S-Force]]" with a rival, this card's effect is very effective at stopping "[[PSY-Frame Driver]]" : Changing the 0 DEF "[[PSY-Frame Driver]]" to defense position and preventing it from changing back.
