title: Card Trivia:Awakening of the Possessed - Gagigobyte
wikitext: |-
  {{Navigation}}

  * "[[Familiar-Possessed - Eria]]" appears in this card's artwork.
  * This monster is the [[Card evolutions|upgraded]] "[[Familiar-Possessed]]" form of "[[Jigabyte]]".
  ** This monster's name is a portmanteau of the names of two other members of the [[Gigo]] [[series]]: "[[Gagagigo]]" and "[[Gigobyte]]".
