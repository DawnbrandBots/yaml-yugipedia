  * This monster is the "[[Evil HERO]]" [[counterpart]] of "[[Elemental HERO Wild Wingman]]".
  ** Both share the same [[Attribute]] ([[EARTH]]), [[Level]] (8), [[original ATK and DEF]] (1900/2300), and effect to destroy [[Spell]]/[[Trap Card]]s.
