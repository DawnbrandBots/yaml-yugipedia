title: Card Trivia:Dark City
wikitext: |-
  {{Navigation}}

  * This card appears in the artworks of "[[D-Fusion]]", "[[D - Spirit]]" and "[[Destiny Signal]]".
  * This card is the "[[Destiny HERO]]" [[counterpart]] of the "[[Elemental HERO]]" support card, "[[Skyscraper]]".
  * This card has a retrained counterpart combined with "[[Clock Tower Prison]]": "[[Clock Tower Prison City - Dark City]]".
  * The buildings on this card appear to be "flat" or props, as they have no dimension, also the lights from the windows have nothing within them and do not appear to be real. This might be an homage to the movie ''[[wikipedia:Dark City (1998 film)|Dark City]]'' in which the city changed at a specific time every day into something else.
