title: Card Trivia:Blackwing - Ghibli the Searing Wind
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "ghibli", the Libyan name for the [[wikipedia:Sirocco|Sirocco]], a hot wind from the Sahara Desert that is blown across the Mediterranean Sea and Southern Europe at hurricane speeds.
  ** This monster's name is referenced in the names of two other "[[Blackwing]]" monsters: "[[Blackwing - Sirocco the Dawn]]" and "[[Blackwing - Calima the Haze]]" (the sibling wind of the sirocco).
  * This monster's design is similar to the designs of "[[Black-Winged Dragon]]"; both monsters' wings feature the same black-and-red color scheme and are extended out in the same fashion, and their tail feathers are similar in design too.
  * In the Japanese release of ''[[Duelist Pack: Crow]]'', this card is misprinted as a [[Level 4]] monster instead of a [[Level 3]] monster.
  ** This, while unintentional, mimics the error in {{episode|5D's|085|ref}} when this monster was Summoned for the first time, which was listed as a Level 4 monster, but was listed as a Level 3 monster when used as [[Synchro Material]].
