title: Card Trivia:Sillva, Warlord of Dark World
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Scheme]]" and "[[Mokusatsu]]".
  * This monster's name is the "[[Dark World]]" color pun for the word [[wikipedia:silver (color)|silver]].
  ** This monster's Chinese name, 銀魯巴, is a combination of 銀 ("silver") and 魯巴 ''lǔbā'' ([[wikipedia:Transcription into Chinese characters|a transcription]]/transliteration of ルバ ''ruba'' as in its Japanese name シ'''ルバ''' ''Shi'''ruba''''').
  * In alchemy and economics, silver is considered valuable, though inferior to gold. It is interesting to note that this monster has similar stats to "[[Goldd, Wu-Lord of Dark World]]" and a similar, though arguably slightly inferior, effect. Their titles, "Wu-Lord" and "Warlord", also sound similar. To further this hierarchy, this monster is only a common in the ''[[Gold Series]]'', while the coincidentally named "Goldd" is a Gold Ultra Rare.
  ** This could be an explanation for the design of this monster and "Goldd": The head of this monster consist of two skull faces. The first can be viewed normal and the second on his forehead (rotated by 180° and using the same eyes). In contrast to "Goldd, Wu-Lord of Dark World" whose head has three skull faces (one big and two small faces rotated by 180° on the sides). The same applies to the orbs on the chest on both monsters ("Sillva" has two and "Goldd" has three).
  * This monster and "Goldd, Wu-Lord of Dark World" are based on the two antagonists featured in the Japanese TV series, [[wikipedia:Monkey (TV series)|Monkey Magic]], called Kin-Koku and Gin-Koku (whose names are translated to "Silver Horn" and "Gold Horn" respectively), who served as Kings of the Underworld.
  ** Their names might also be based on two pieces in [[wikipedia:shogi|shogi]]: the Gold and Silver Generals.
  * According to the ''[[Master Guide 2 card storylines|Master Guide 2]]'' card storylines, "Goldd" and "Sillva" are the heads of the Dark World's military and serve beneath "[[Reign-Beaux, Overlord of Dark World|Reign-Beaux]]," the political and religious authority, and "Goldd" is in fact the junior partner of the two. The two are in turn immediate superiors to "[[Brron, Mad King of Dark World|Brron]]," though this was portrayed in the exact opposite way in the ''[[Yu-Gi-Oh! GX]]'' anime.
