title: Card Trivia:Vylon Epsilon
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duel Terminal - Vylon Descends!!]]''.
  * [[wikipedia:Epsilon|Epsilon]] is the fifth letter of the Greek alphabet.
  ** The Roman numerals engraved on its chest (V) indicates this order.
  * This monster's body also resembles an uppercase Epsilon "Ε" if viewed from the side, while the golden rings around its upper arms are shaped like a lowercase Epsilon "ε".
