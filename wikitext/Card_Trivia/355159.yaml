title: Card Trivia:Mekanikal Arkfiend
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Devil Ark Makina" ({{Ruby|魔|マ}}{{Ruby|神|シン}}アーク・マキナ, ''Mashin Āku Makina'') features multiple puns.
  ** The first portion of this monster's Japanese name is a pun on the word "''mashin''", which can be read as the Japanese word for "machine" (マシン) and "devil" (魔神), which reflects this monster's appearance as a mechanical demon, as well as its [[Fiend]] [[Type]].
  ** The second portion of this monster's Japanese name, "Ark Makina" (アーク・マキナ, ''Āku Makina'') is a pun on the word for "demon" (悪魔, ''Akuma''), further alluding to its appearance and Type.
  ** This monster's ''[[TCG]]'' name is a pun on the name of the "[[Archfiend]]" [[archetype]], replacing the hardened letters "c" and "ch" with the letter "k".
