title: Card Trivia:Gunkan Suship Shari Red
wikitext: |-
  {{Navigation}}

  * The ''Kaisen'' (かいせん) nameplate from "[[Gunkan Sushipyard Seaside Supper Spot]]" appears in this card's artwork.
  * This monster is a retrained [[counterpart]] of "[[Gunkan Suship Shari]]".
  ** This monster is based on [[wikipedia:Sushi|sushi]] rice (しゃり ''shari'') seasoned with [[wikipedia:Rice vinegar|red vinegar]] (赤酢 ''akazu''). Fittingly, this monster has a reddish color.
  *** The [[flavor text]] of "Gunkan Suship Shari" mentions an EDO-FRONT red vinegar that would be introduced in the near future, hinting this card's later release in ''[[Power of the Elements]]''.
  ** The two monsters are depicted from mirrored angles in their card artworks, and have opposite [[ATK]]/[[DEF]]: this monster has 0 [[ATK]] and 2000 [[DEF]], while "Shari" has 2000 ATK and 0 DEF.
  ** This card's effect also treats its name as "Gunkan Suship Shari".
  * This is the first monster to have an ''effect'' that [[Changes own name|changes its own name]] in the [[Deck]], rather than a [[name condition]].
