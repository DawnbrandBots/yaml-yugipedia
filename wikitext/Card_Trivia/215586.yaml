title: Card Trivia:Illusory Snatcher
wikitext: |-
  {{Navigation}}

  * This monster is depicted taking the form of "[[Caius the Shadow Monarch]]". Fittingly, this monster shares the same [[original ATK and DEF]] (2400/1000) with the members of the [[Monarch (series)|Monarch]] [[series]], which relies on [[Tribute Summon]]ing and would trigger this monster's [[Special Summon]]ing effect.
  * Similar to "[[Rebirth Judgment]]", this monster likely references ''[[wikipedia:Snatcher (video game)|Snatcher]]'', a video game produced by [[Konami]] where humanoid robots kill humans and then take the form of their victims.
