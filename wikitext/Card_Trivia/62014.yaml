title: Card Trivia:Thorn Princess
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[wikipedia:Charles Perrault|Charles Perrault's]] version of the fairy tale, ''[[wikipedia:Sleeping Beauty|Sleeping Beauty]]''.
  ** This monster's name references how the sleeping princess's castle was enclosed in a forest of brambles and thorns.
  ** This monster's [[Summoning condition]] requiring "[[100-Year Awakening]]" references how the sleeping princess was awakened one hundred years later by the kiss of a handsome prince.
