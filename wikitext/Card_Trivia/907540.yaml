title: Card Trivia:Mikanko Dance - Mayowashidori
wikitext: |-
  {{Navigation}}

  * "[[Hu-Li the Jewel Mikanko]]" appears in the artwork of this card.
  ** The nine tails of "Hu-Li" are based on the ''[[wikipedia:Nine-tailed fox|kyūbiko]]'', a mythological nine-tailed fox that originated from Chinese folklore.
  *** This card is named after ''mayowashidori'' (迷わし鳥, "fascinating bird"), another name for the ''[[wikipedia:Fox spirit|yōko]]'' ("fox spirit").
  ** The rooster-shaped aura surrounding "Hu-Li" is based on the ''[[wikipedia:ja:天岩戸#古事記|Tokoyo-no-naganakidori]]'', a mythical breed of [[wikipedia:Long-crowing chicken|long-crowing chickens]] associated as divine messengers of the Japanese sun goddess ''[[wikipedia:Amaterasu|Amaterasu]]''.
