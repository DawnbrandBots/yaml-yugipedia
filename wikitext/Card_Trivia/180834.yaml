title: Card Trivia:Constellar Aldebaran
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Aldebaran|Aldebaran]], the brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Taurus (constellation)|Taurus]].
  ** The constellation and the astrological symbol for [[wikipedia:Taurus (astrology)|Taurus]] (♉︎︎) appears in the background of this card's artwork, with the location of Aldebaran denoted by the encircled star in the constellation.
  ** This monster's armor features bull-like horns on its helmet, referencing how Taurus is also known as the "bull" constellation.
  ** This monster is depicted wielding a [[wikipedia:Chakram|chakram]] ring, which resembles the circle depicted in the astrological sign for Taurus.
