title: Card Trivia:The Golden Apples
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Golden apple|golden apples]], a mythical object that appears in the mythologies of various cultures.
  ** This card's Japanese name, "Apple of Frigg" (フリッグのリンゴ ''Furiggu no Ringo''), is derived from [[wikipedia:Frigg|Frigg]], Nordic goddess and wife of [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]]; however, Frigg is largely unrelated to the youth-restoring golden apples, and it is the goddess [[wikipedia:Iðunn|Idunn]] who acts as their keeper.
  * This card's effect to [[Special Summon]] a "[[Malus Token]]" is a reference to "Malus", the Latin species name for "[[wikipedia:Apple|apple]]" which also means "evil".
