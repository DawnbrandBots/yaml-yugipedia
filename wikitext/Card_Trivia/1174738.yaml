title: Card Trivia:Pumpking the King of Grave Ghosts
wikitext: |-
  {{Navigation}}

  [[File:PumpkingtheKingofGhosts-JP-Manga-DM-NC.png|thumb|250px|"[[Pumpking the King of Ghosts (manga)|Pumpking the King of Ghosts]]" is Summoned.]]
  * This monster is a [[retrained]] version of "[[Pumpking the King of Ghosts]]".
  ** This monster's design is taken from a panel from {{chapter|Yu-Gi-Oh!|090|ref}} showing "[[Pumpking the King of Ghosts (manga)|Pumpking the King of Ghosts]]" being Summoned.
  ** This monster's [[original ATK and DEF]] (1950/2600) is based on a scene from the aforementioned chapter of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga where "Pumpking the King of Ghosts" is Summoned to the [[Graveyard (terrain)|Graveyard terrain]], which increases its 1500/2000 [[ATK]]/[[DEF]] by 30% to 1950/2600.

