title: Card Trivia:War Rock Orpis
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[War Rock Ordeal]]".
  * This monster's name is possibly a corrupted version of the Greek word "[[wikipedia:Ophis|ophis]]," which means snake.
  ** This is supported by the following characteristics of this monster:
  *** Scaled leg-coverings
  *** A snake tattoo
  *** Two visible fangs from its closed mouth
  *** Coiled objects around its limbs
  *** A weapon with a poison-like substance dripping from its point
