title: Card Trivia:Freed the Matchless General
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Struggle of Chaos]]'' and the box of ''[[Duelist Legacy Volume.5]]''.
  * This monster appears in the artworks of "[[A Feint Plan]]", "[[Baneshade]]", "[[Baton of the Hero]]", "[[Back to the Front]]", "[[Back-Up Rider]]", "[[First-Aid Squad]]", "[[Marmiting Captain]]", "[[Memory of an Adversary]]", "[[Order to Charge]]", and "[[Warrior's Devotion]]".
  * This monster is an older version of "[[Freed the Brave Wanderer]]".
  * This monster has a [[Dark counterpart]]: "[[Dark General Freed]]".
  * This card's second effect is the same as that of "[[Reinforcement of the Army]]", a Spell Card that debuted in the same set as this card: ''[[Struggle of Chaos]]''.
  * The monster sprite for this card (debuting in ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', and used in later video games) uses the legs of "[[Destiny HERO - Dread Servant]]" as the model for this monster's legs.
  ** Additionally, "[[Divine Sword - Phoenix Blade]]" is incorporated into this card's monster sprite.
