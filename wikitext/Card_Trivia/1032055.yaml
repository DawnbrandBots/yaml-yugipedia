title: Card Trivia:Clock Knight No. 12
wikitext: |-
  {{Navigation}}

  * This monster's name, appearance, and [[original ATK and DEF]] (1200/1200) represent the number "12" read on a [[wikipedia:12-hour clock|12-hour clock face]].
  ** This monster also represents the hour of 12:00 on a clock face; however, its [[coin toss]] effect allows it to gain 1200 [[ATK]] when it lands on "heads" and increase its 1200 ATK to 2400, referencing how 12:00 midnight can be read as 2400 in a [[wikipedia:24-hour clock|24-hour clock system]].
