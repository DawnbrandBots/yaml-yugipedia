title: Card Trivia:Solitaire Magician
wikitext: |-
  {{Navigation}}

  * This card has an older "[[Fortune Lady]]" [[counterpart]]: "[[Fortune Lady Every]]".
  ** This card is the only [[monster]] related to the "Fortune Lady" [[archetype]] that is not a member of the archetype, though it shares many of their physical features, including the clothing style, black bat wings and a jeweled staff; the monster in this card's artwork also somewhat resembles the "[[Fortune Fairy]]" monsters.
