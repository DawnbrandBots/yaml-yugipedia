title: Card Trivia:Flux Ochsenfeld
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from the [[wikipedia:Meissner effect|Ochsenfeld effect]], a physics term derived from German physicist [[wikipedia:Robert Ochsenfeld|Robert Ochsenfeld]], which describes the expulsion of a magnetic field from a superconductor as it transitions into the superconducting state.
