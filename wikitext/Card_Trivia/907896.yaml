title: Card Trivia:Transcendosaurus Glaciasaurus
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Transcendosaurus]] [[Synchro Monster|Synchro]] form of "[[Frostosaurus]]".
  * This is the first [[Level 12]] [[WATER]] monster.
  * This monster is tied with "[[Transcendosaurus Gigantozowler]]" and "[[Transcendosaurus Meteorus]]" for the highest [[Level]] (12) of all [[Dinosaur]] monsters.
