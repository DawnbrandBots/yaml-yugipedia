title: Card Trivia:D.3.S. Frog
wikitext: |-
  {{Navigation}}

  * Three copies of "[[Des Frog]]" and three copies of "[[Treeborn Frog]]" appear in this card's artwork.
  * This monster's Japanese name, "Frog 3-Death" (ガエル・サンデス, ''gaeru sandesu'') is a pun on the three "Des Frogs" used as [[Fusion Material]], which can be read as "3 Death Frogs" in Japanese.
  ** This monster's Japanese name can also be read as ''"Gaeru-san desu"'', or "I'm Mr. Frog".
  ** This monster's English name is derived from "Des Frog", with "Des" spelled in [[wikipedia:Leet|leetspeak]] by replacing the letter "e" with the number "3", which also references the three "Des Frogs" used as Fusion Material.
  * This monster features a tattoo of the Chinese character for "ultimate" (極), which references the fact that this card has the highest [[original ATK]] (2500) of all "[[Frog]]" monsters.
