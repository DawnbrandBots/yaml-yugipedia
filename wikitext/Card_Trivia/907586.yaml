title: Card Trivia:Exosisters Magnifica
wikitext: |-
  {{Navigation}}

  * "[[Exosister Kaspitell]]" and "[[Exosister Mikailis]]" appear in this card's artwork.
  ** These two monsters also appear together in the artwork of "[[Exosister Returnia]]".
  ** Fittingly, both are valid [[Xyz Material]]s for this card's [[Xyz Summon]].
  * This card is the first "[[Exosister]]" [[Xyz Monster]] to not have a [[Main Deck]] counterpart.
  ** However, it can be said that this monster is an [[Card evolutions|upgraded]] Xyz form of "[[Exosister Stella]]" and "[[Exosister Elis]]", since it is a duo consisting of the Xyz forms of the two aforementioned monsters.
  * This is the first Xyz Monster to specifically require 2 monsters with a different [[Level]]/[[Rank]] from its own as Xyz Materials.
  * The card being Rank 8 comes from the fact that it requires two Xyz Monsters of a specific rank, in this case 4.
  ** In all other cases, the card's Rank matches the Rank seen on the anime / manga because the Summoning condition has changed, or are Rank 0 indicating that the card is Xyz summoned using Monsters with no Level.
