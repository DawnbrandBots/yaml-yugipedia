title: Card Trivia:Supreme Machine Magnum Overlord (R)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maximum Ultra Enhancement Pack]]''.
  * This monster appears in the artwork of "[[Cranked to Ten!!]]" in [[Maximum Mode]] (together with "[[Supreme Machine Magnum Overlord (L)|Supreme Machine Magnum Overlord [L]]]" and "[[Supreme Machine Magnum Overlord]]").
  * This monster has three [[counterpart]]s: "[[Supreme Beasteam Magnum Overlord (R)|Supreme Beasteam Magnum Overlord [R]]]", "[[Supreme Railartillery Magnum Overlord (R)|Supreme Railartillery Magnum Overlord [R]]]", and "[[Supreme Skystream Magnum Overlord (R)|Supreme Skystream Magnum Overlord [R]]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (3), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (500/0) with the above-mentioned monsters.
