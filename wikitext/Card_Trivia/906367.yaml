title: Card Trivia:Hu-Li the Jewel Mikanko
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mikanko Dance - Mayowashidori]]" and "[[Mikanko Spiritwalk]]".
  ** A younger version of this monster appears in the artwork of "[[The Great Mikanko Ceremony]]".
  * This monster is named after ''[[wikipedia:Hoori|Hoori-no-Mikoto]]'' (火遠理命), a legendary figure in Japanese mythology who is a descendant of the goddess ''[[wikipedia:Amaterasu|Amaterasu]]'' and an ancestor of the [[wikipedia:Emperor of Japan|Japanese imperial lineage]].
  * The fox motif of this monster is based on the ''[[wikipedia:Fox spirit|yōko]]'', a fox spirit that originated from Chinese folklore.
  * The green jewels of this monster are based on the ''[[wikipedia:Magatama#Yasakani no Magatama|Yasakani-no-Magatama]]'', a ceremonial jewel and one of the three [[wikipedia:Imperial Regalia of Japan|Imperial Regalia of Japan]].
  ** According to ''[[The Valuable Book EX 3 card storylines#No. 07: Mikanko|The Valuable Book EX 3 card storylines]]'', this monster is from the 'Mitama' branch family, named after the ''Yasakani-no-Magatama''.
  * This monster (possessed by "[[Ohime the Manifested Mikanko]]") has an upgraded [[Ritual Monster|Ritual]] form: "[[Arahime the Manifested Mikanko]]".
