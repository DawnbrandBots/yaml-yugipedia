title: Card Trivia:Neutron Blast
wikitext: |-
  {{Navigation}}
  [[File:Neutron_Blast_Duel_262.png|thumb|right|250px|"[[Blue-Eyes Ultimate Dragon (manga)|Blue-Eyes Ultimate Dragon]]" attacks "[[Dark Paladin (manga)|Dark Paladin]]".]]

  * "[[Blue-Eyes Ultimate Dragon]]" appears in this card's artwork.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Blue-Eyes Ultimate Dragon" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  ** This card's effect is based on how in the ''Yu-Gi-Oh!'' manga, "[[Blue-Eyes Ultimate Dragon (manga)|Blue-Eyes Ultimate Dragon]]" can make up to three attacks on monsters.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|262|ref}} showing "[[Blue-Eyes Ultimate Dragon (manga)|Blue-Eyes Ultimate Dragon]]" attacking "[[Dark Paladin (manga)|Dark Paladin]]".

