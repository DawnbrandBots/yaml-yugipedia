title: Card Trivia:A Cat of Ill Omen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cat Meeting]]".
  * This monster has a [[Field Spell Card]] counterpart: "[[An Owl of Luck]]".
  ** Both are [[Flip monster]]s whose [[Flip effect]]s can involve "[[Necrovalley]]".
  ** Both are based on superstitions centered around certain animals and luck; in this monster's case, the black cat [[wikipedia:Black cat|is commonly associated with evil omens]] in Western cultures.
