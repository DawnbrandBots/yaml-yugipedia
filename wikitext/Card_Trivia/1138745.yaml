title: Card Trivia:The Swordsman Who Doles Out Victory
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart of "[[Buster Blader (Rush Duel)|Buster Blader]]".
  ** This monster's pose is taken from a panel from {{chapter|Yu-Gi-Oh!|261|ref}} showing "[[Buster Blader (manga)|Buster Blader]]" being [[Special Summon]]ed with "[[Monster Reborn (manga)|Monster Reborn]]" through "[[Double Spell (manga)|Double Spell]]".
