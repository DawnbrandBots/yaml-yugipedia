title: Card Trivia:Block Attack
wikitext: |-
  {{Navigation}}

  * This card has a counterpart: "[[Stop Defense]]".
  * This is one of the first [[Spell Card]]s seen on-screen in the [[Yu-Gi-Oh! (anime)|Yu-Gi-Oh! anime]], along with "[[Mooyan Curry]]", "[[Polymerization]]", "[[Red Medicine]]", and "[[Remove Trap]]".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this card is a [[Trap Card]].
