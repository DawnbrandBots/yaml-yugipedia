title: Card Trivia:Rising HERO Argent
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Rising Equip]]" and "[[Rising Search]]".
  * This monster's name is short for ''argentum'', the Latin word for the metal [[wikipedia:Silver|silver]].
  * This monster has a retrained [[counterpart]]: "[[Rising HERO Argent R]]".
  * This monster has an upgraded [[Fusion Monster|Fusion]] form: "[[Rising HERO Argent O]]".
