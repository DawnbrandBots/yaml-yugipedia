title: Card Trivia:Brain Hazard
wikitext: |-
  {{Navigation}}

  * The brain of "[[Mind Master]]" and the scientists from the artwork of "[[Brain Research Lab]]" appears in this card's artwork.
  ** This card's artwork is a continuation of the events depicted in the artwork of "Brain Research Lab".
  * This card has multiple [[counterparts]]:
  ** [[DARK]]: "[[Escape from the Dark Dimension]]"
  ** [[Fairy]]: "[[Miraculous Descent]]"
  ** [[Rock]]: "[[Release from Stone]]"
  * This is the first [[Psychic]] [[support]] card to not feature the color green in its artwork.
