title: Card Trivia:A Legendary Ocean
wikitext: |-
  {{Navigation}}

  * This city appears in the artworks of "[[Edict of Atlantis]]", "[[Legendary Atlantean Tridon]]", "[[Plate Salvage]]", "[[Poseidra, the Atlantean Dragon]]" and "[[Warrior of Atlantis]]".
  * This card is based on the fictional sunken island of [[wikipedia:Atlantis|Atlantis]], which was introduced in [[wikipedia:Plato|Plato]]'s allegory on the hubris of nations in his works ''[[wikipedia:Timaeus|Timaeus]]'' and ''[[wikipedia:Critias|Critias]]''.
  * This card is an upgraded form of "[[Umi]]".
  ** "[[Lemuria, the Forgotten City]]" is also similar to this card, in terms of being treated as "Umi" and manipulating the [[Level]]s of [[WATER]] monsters.
