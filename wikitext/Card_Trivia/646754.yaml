title: Card Trivia:House Dragonmaid
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Mystic Fighters]]''/''[[Mystic Fighters]]'' and ''[[Selection 5]]''.
  * This monster appears in the artworks of "[[Dragonmaid Changeover]]", "[[Dragonmaid Hospitality]]", "[[Dragonmaid Send-Off]]" and "[[Dragonmaid Welcome]]".
  * "[[Chamber Dragonmaid]]" appears in this card's alternate artwork.
  * This monster is the maid form of "[[Dragonmaid Sheou]]".
  ** This monster's name is based on a [[wikipedia:Housekeeper (domestic worker)|housekeeper]], an individual responsible for overseeing the house's cleaning staff, which reflects how this monster has the highest [[Level]] (9) and [[original ATK]] (3000) of all maiden "[[Dragonmaid]]" monsters.
