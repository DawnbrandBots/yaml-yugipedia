title: Card Trivia:Speed Spell - Chain Strike
wikitext: |-
  {{Navigation}}

  * This card is the "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]] of "[[Chain Strike]]".

  * In the videogames this card is featured in, it has text errors in multiple languages.
  ** The French text says it can only be activated as Chain Link 3 or higher.
  ** The German text only has its Speed Counter activation cost and one of its activation conditions.
  ** The Japanese text does not mention it can only be activated as Chain Link 2 or higher.
