title: Card Trivia:Numbers Protection
wikitext: |-
  {{Navigation}}

  * The "[[Number]]s" pillars, the interior of the [[Different Dimension Airship]], and the "[[Number]]" symbols from "0" to "9" appear in this card's artwork.
  ** This card's artwork is a reference to the "Number" pillars, which keeps under control such cards in the Different Dimension Airship, as shown in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
