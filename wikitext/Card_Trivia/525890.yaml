title: Card Trivia:BM-4 Blast Spider
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of "[[Launcher Spider]]", whose Japanese name is "TM-1 Launcher Spider"; its [[DEF]] is also equal to the [[ATK]] of "Launcher Spider".
  * Several "[[Blast Sphere]]s" can be seen in this card's artwork, serving as the bombs launched by this monster.
  ** This monster's ATK is equal to the ATK of "Blast Sphere".
