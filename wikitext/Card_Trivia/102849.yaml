title: Card Trivia:Brain Research Lab
wikitext: |-
  {{Navigation}}

  * The brain of "[[Mind Master]]" and the scientists from the artwork of "[[Brain Hazard]]" appears in this card's artwork.
  ** The events depicted in this card's artwork continue in the artwork of "Brain Hazard".
  * The laboratory in this card's artwork appears in the artwork of "[[Teleport Fusion]]".
