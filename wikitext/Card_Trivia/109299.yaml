title: Card Trivia:Reload
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Future Destruction]]".
  * This card's artwork features a gun with Egyptian motifs, seemingly held by a "[[Gravekeeper's]]" monster, which has just been reloaded.
  ** This is reflected in this card's effect, as it allows the player to "reload" their [[hand]] by [[shuffling]] all the cards in their hand and [[Draw a card|drawing]] new cards.
  * This card has a [[Normal Spell Card]] [[counterpart]]: "[[Magical Mallet]]".
  * This card has a [[Trap Card]] counterpart intended for the opponent: "[[Disturbance Strategy]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Reload]]".
  * Several Spanish prints of this card misspell the word for "''shuffle''", as they show it as "''bar'''a'''jalo''" instead of "''bar'''á'''jalo''".
