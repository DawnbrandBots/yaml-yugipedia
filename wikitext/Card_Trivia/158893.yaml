title: Card Trivia:Closed Forest
wikitext: |-
  {{Navigation}}

  * This card's artwork is similar to that of "[[Thorn of Malice]]".
  ** Incidentally, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, both cards are used by the [[Signer]]s (this card by [[Devack]], who is a [[Dark Signer]] and "Thorn of Malice" by [[Akiza Izinski]], who is a regular Signer.) Moreover coincidentally, both cards' artworks have antipodal color schemes in respect to both types of Signers, with "Thorn of Malice" having mostly ''lighter'' colors, whereas this card has mostly ''darker'' colors.)
