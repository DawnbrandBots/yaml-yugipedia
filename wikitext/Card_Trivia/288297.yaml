title: Card Trivia:Prima Light
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * "[[Cyber Prima]]" appears in this card's artwork.
  * This card's effects are based on its appearance in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's first bulleted effect to [[Tribute]] an [[EARTH]] [[Warrior]] monster to [[Special Summon]] a [[LIGHT]] Warrior monster is an alteration of its anime effect, which allowed the player to Tribute "[[Cyber Tutu (anime)|Cyber Tutu]]" (an EARTH Warrior monster) to Summon "[[Cyber Prima (anime)|Cyber Prima]]" (a LIGHT Warrior monster).
  ** This card's second bulleted effect to [[Normal Summon]] a Warrior monster references the ''[[OCG]]''/''[[TCG]]'' version of "[[Cyber Prima]]", which can only activate its effect when it is [[Tribute Summon]]ed, while in the anime, it could be activated when it was Summoned.
