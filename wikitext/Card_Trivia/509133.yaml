title: Card Trivia:Gust Fan
wikitext: |-
  {{Navigation}}

  * This fan appears in the artwork of "[[Goblin Out of the Frying Pan]]".
  * This card has five [[Attribute]] counterparts: "[[Burning Spear]]" (for [[FIRE]] monsters), "[[Elf's Light]]" (for [[LIGHT]] monsters), "[[Invigoration]]" (for [[EARTH]] monsters), "[[Steel Shell]]" (for [[WATER]] monsters), and "[[Sword of Dark Destruction]]" (for [[DARK]] monsters).
