title: Card Trivia:Shadowpriestess of Ohm
wikitext: |-
  {{Navigation}}

  * This monster's hearwear resembles those worn by the [[Doriado (series)|Doriado]] monsters.
  * "Ohm" is an alternative spelling of "Om," a mantra and sacred syllable of several Indian religions.
  * This monster is wielding two [[wikipedia:urumi|urumi]], which are whip-like swords.
