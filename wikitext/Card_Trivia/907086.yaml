title: Card Trivia:Dual Avatar Feet - Armored Un-Gyo
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]'' name is a combination of "Gai" (Japanese word for "armor") and "Un", the second half of ''"[[wikipedia:A-un|A-un]]''". The term is used in Shinto and Buddhist architecture to describe the paired statues common in Japanese religious settings, most notably the [[wikipedia:Niō|Niō]] and the ''[[wikipedia:Komainu|komainu]]''.
  ** This monster's ''[[TCG]]'' name is based on ''ungyō'', the generic name for ''[[wikipedia:Komainu|Komainu]]'' statues with a closed mouth.
  * This monster appears in the artwork of "[[Perfect Sync - A-Un]]".
  ** This monster's animal spirit appears in the artworks of "[[Dual Avatar Compact]]" and "[[Dual Avatar Invitation]]".
