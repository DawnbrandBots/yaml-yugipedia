title: Card Trivia:Mask of Perplexity
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Unlike most of the [[Mask]] cards, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card was used by [[Leichter]], rather than [[Lumis and Umbra]].
  * This card and "[[Mask of Impregnability]]" are currently the only Mask cards to not be released in the ''[[OCG]]''/''[[TCG]]''.
