title: Card Trivia:Destroyersaurus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Lost World]]" and "[[Survival's End]]".
  * "[[Jurassic World]]" appears in the background of this card's artwork.
  * This card's name is a reference to this monster's threatening and 'destructive' appearance.
  * The ''[[Force of the Breaker]]'' Spanish print of this card uses the word "''agregar''" instead of "''añadir''", which is the official translation for the term "''add''".
