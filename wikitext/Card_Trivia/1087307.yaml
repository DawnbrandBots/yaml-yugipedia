title: Card Trivia:Gem-Knight Hollowcore
wikitext: |-
  {{Navigation}}

  * This monster is the corrupted counterpart of "[[Gem-Knight Crystal]]" and the dark half of "[[Shaddoll Zefracore]]".
  ** This monster's [[original ATK and DEF]] (1950/2450) is an inverse of those "Gem-Knight Crystal" (2450/1950).
  * This is the only DARK "Gem-Knight" monster.
