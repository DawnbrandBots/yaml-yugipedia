title: Card Trivia:Lyra the Giver
wikitext: |-
  {{Navigation}}

  * This monster's name is possibly derived from the constellation [[wikipedia:Lyra|Lyra]], as indicated by the [[wikipedia:Outer space|outer space]] theme of [[Depre Scott]]'s Deck, who used this monster in the ''[[Yu-Gi-Oh! R]]'' manga.
  ** The word "Giver" in this monster's name reflects its effect to "give" its [[Life Star Counter]]s to another monster.
