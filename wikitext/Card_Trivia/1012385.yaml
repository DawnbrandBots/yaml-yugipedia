title: Card Trivia:Darkness Paparazzi
wikitext: |-
  {{Navigation}}

  * This monster is named after the ''[[wikipedia:Paparazzi|paparazzi]]'', an independent photographer who takes pictures of high-profile people, including actors.
  ** Fittingly, this monster's design features [[wikipedia:Camera lens|camera lenses]] on its hands and robe, while the tip of its staff resembles a [[wikipedia:Camera|camera]].
  ** Also, this monster is listed as [[Fusion Material]] for "[[Celeb Rose Gossip Magician]]" and "[[Celeb Rose Gossip Witch]]", referencing how the ''paparazzi'' can sell their photographs to media outlets focusing on tabloid journalism and sensationalism, including gossip magazines.
