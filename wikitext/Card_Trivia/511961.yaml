title: Card Trivia:Zaborg the Thunder Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Domain of the True Monarchs]]", "[[Fake Explosion]]", "[[Icy Crevasse]]", "[[Lightning Crash]]", "[[March of the Monarchs]]", "[[The Monarchs Masterplan]]", and "[[Tribute Carnival]]".
  * This monster's head is based on a [[wikipedia:Plasma globe|plasma globe]], a clear glass container filled with noble gases and a high-voltage electrode in the center that produces plasma when voltage is applied.
  * This monster has a [[Match winner]] counterpart: "[[Emperor of Lightning]]".
  * This monster has an Mega Monarch form: "[[Zaborg the Mega Monarch]]".
  * This monster has a [[Vassal]] counterpart: "[[Mithra the Thunder Vassal]]".
  * This is the first [[Monarch]] monster to be released in the ''[[OCG]]''/''[[TCG]]'', as well as the only [[Level 5]] Monarch monster.
