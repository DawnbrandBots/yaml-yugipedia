title: Card Trivia:Blackwing - Gladius the Midnight Sun
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from [[wikipedia:Gladius|gladius]], a type of sword used by [[wikipedia:Ancient Rome|ancient Roman]] foot soldiers, where the word itself is the Latin word for "sword".
  ** This monster's title is derived from the [[wikipedia:Midnight sun|midnight sun]], an astronomical phenomenon where the sun remains visible during the local midnight in the north or southmost regions of Earth, which appears in the background in this card's artwork.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|027|ref}}, specifically from the panel showing [[Blackwing - Gladius the Midnight Sun (manga)|this monster]] being Summoned.
