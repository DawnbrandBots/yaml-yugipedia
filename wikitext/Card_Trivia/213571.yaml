title: Card Trivia:Three of a Kind
wikitext: |-
  {{Navigation}}

  * The cards "[[Cyber Dragon]]", "[[Cyber Dragon Zwei]]", "[[Power Bond]]", "[[Proto-Cyber Dragon]]", "[[Rescue Cat]]", and two copies each of "[[X-Saber Airbellum]]" and "[[Summoner Monk]]" (the second one being almost completely covered by the first one) appear in this card's artwork.
  ** The [[Duel]] scene in this card's artwork appears to be depicting the following:
  *** The opponent has used the effect of "Summoner Monk" to Summon "Rescue Cat", and then used the effect of "Rescue Cat" to [[Special Summon]] the two copies of "X-Saber Airbellum".
  *** The player controls "Cyber Dragon", "Proto-Cyber Dragon", and "Cyber Dragon Zwei". The effect of "Proto-Cyber Dragon" allows it to treat its name as "Cyber Dragon" while on the [[field]], while the effect of "Cyber Dragon Zwei" allows it to be treated as "Cyber Dragon" by [[reveal]]ing a [[Spell]] in the player's [[hand]], which is "Power Bond".
  *** The opponent begins to sweat because the player can now activate "Power Bond" to [[Fusion Summon]] "[[Cyber End Dragon]]" for a potential [[OTK]].
  ** The Duel scene features a contradiction, as "Cyber Dragon Zwei" can only activate its effect during its controller's turn, but by that time, the two copies of "X-Saber Airbellum" Summoned by "Rescue Cat" would have been destroyed, unless they are protected otherwise.
  * This card's ''[[TCG]]'' name is a reference to the poker hand [[wikipedia:List of poker hands|three of a kind]], which is formed by having three cards of the same value. This is reflected in this card's artwork depicting three copies of "Cyber Dragon" and its activation requiring the player to control at least three monsters with the same name.
  * This is one of a few cards to depict a Duel scene, the others including "[[Chain Material]]" and "[[Defense Draw]]".
  * The setting depicted in card's artwork is very similar to that of "[[Fifty Fifty?]]".
