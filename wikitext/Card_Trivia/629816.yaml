title: Card Trivia:Lunalight Tiger
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Lunalight Masquerade]]".
  * This card and "[[Lunalight Wolf]]" have the following differences from the other "[[Lunalight]]" monsters:
  ** They are the only members that are [[Pendulum Monster]]s.
  ** They are the only members that are not [[DARK]] [[Attribute]].
