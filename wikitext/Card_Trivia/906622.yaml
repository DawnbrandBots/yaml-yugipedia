title: Card Trivia:Jesse and Ruby - Unleashing the Legend
wikitext: |-
  {{Navigation}}

  * [[Jesse Anderson]] and "[[Crystal Beast Ruby Carbuncle]]" appear in this card's artwork.
  ** This card's artwork is a reference to a scene of {{episode|GX|106|ref}}, where Jesse Anderson first introduced the [[Duel Monster Spirit]] of [[Crystal Beast Ruby Carbuncle (character)|Crystal Beast Ruby Carbuncle]] to [[Jaden Yuki]].
  *** This card's name is also a reference to how Jesse told Jaden that Ruby Carbuncle was a legendary creature.
  ** "Ruby Happiness" (ルビー・ハピネス ''Rubī Hapinesu'') in this card's [[flavor text]] is also the [[Attack and effect names in Yu-Gi-Oh! GX|effect name]] of "[[Crystal Beast Ruby Carbuncle (anime)|Crystal Beast Ruby Carbuncle]]" in the Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime.
