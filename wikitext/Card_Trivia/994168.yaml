title: Card Trivia:Surging-Wave Swordsman Yoshimitsu Shark
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "Gokotai-Yoshimitsu" and the Japanese word for "[[wikipedia:Goblin shark|goblin shark]]" (ミツクリザメ ''Mitsukurizame'').
  ** Fittingly, this monster wields the "Gokotai-Yoshimitsu", a [[wikipedia:Tantō|tantō]] sword named by the shōgun [[wikipedia:Ashikaga Yoshimitsu|Ashikaga Yoshimitsu]] during the [[wikipedia:Muromachi period|Muromachi period]] of Japan after one of his envoys told him how he used the weapon to chase away five wild tigers while on his way to [[wikipedia:Tenryū-ji|Tenryū-ji]].
