title: Card Trivia:Zexal Entrust
wikitext: |-
  {{Navigation}}

  * "[[Number 39: Utopia]]" and the [[Different Dimension Airship]] appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|038|ref}} where [[Number 39: Utopia (character)|Number 39: Utopia]] is shown flying out of the airship on his own so that [[Yuma Tsukumo]] can Summon it.
  ** This card's name further references this scene, where [[Astral]] "entrusts" Utopia to help Yuma, despite the fact that Astral was trapped by [[Number 96]].

