title: Card Trivia:Top Scorer
wikitext: |-
  {{Navigation}}

  [[File:TopScorer-JP-Anime-ZX-NC-Back.png|thumb|right|250|The back of "Top Scorer", showing its uniform number 11]]

  * This monster is based on a [[wikipedia:Forward (association football)|striker]], an outfield player in the sport of [[wikipedia:Association football|soccer]] whose primary role is to score goals for their team.
  * This monster's [[wikipedia:uniform number|uniform number]] is "11", as shown in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
