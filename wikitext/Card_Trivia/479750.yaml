title: Card Trivia:Firewall Dragon
wikitext: |-
  {{Navigation}}

  [[File:FirewallDragon-JP-Anime-VR-NC-2.png|thumb|right|250|"[[Firewall Dragon]]" about to attack]]

  * This is the [[cover card]] of ''[[Code of the Duelist]]'', and is also one of the cover cards of ''[[Ghosts From the Past (set)|Ghosts From the Past]]'', ''[[LINK VRAINS Box]]'', ''[[Mega Pack 01]]'', ''[[Prismatic Art Collection]]'', and ''[[25th Anniversary Tin: Dueling Heroes]]''.
  * This monster appears in the artwork of "[[Cynet Circuit]]".
  * This card's second artwork is based on its appearance in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, specifically from scenes depicting it about to attack, where it changes color from blue to red.
  * This monster is named after a [[wikipedia:Firewall (computing)|firewall]], a network security system in computing that monitors and controls the incoming and outgoing network traffic based on predetermined security rules.
  ** This monster reflects Playmaker's actions of protecting [[LINK VRAINS]] against any threat, especially the [[Knights of Hanoi]].
  * This monster has five forms:
  ** [[Card evolutions|Upgraded]] [[Link-5]]: "[[Firewall Dragon Darkfluid]]" (and "[[Firewall Dragon Darkfluid - Neo Tempest Terahertz]]")
  ** Upgraded [[Link-6]]: "[[Firewall Dragon Singularity]]".
  ** [[Xyz Monster|Xyz]]: "[[Firewall eXceed Dragon]]".
  ** [[Synchro Monster|Synchro]]: "[[Firewall Saber Dragon]]".
  * This is the primary [[signature card]] of [[Yusaku Fujiki]]/Playmaker in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** This monster has the same [[ATK]] (2500) as the signature cards of the other anime protagonists (with the exception of [[Yuga Ohdo]]'s "[[Sevens Road Magician (anime)|Sevens Road Magician]]"): [[Yugi Muto]]'s "[[Dark Magician (anime)|Dark Magician]]", [[Jaden Yuki]]'s "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]", [[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]", [[Yuma Tsukumo]]'s "[[Number 39: Utopia (anime)|Number 39: Utopia]]", [[Yuya Sakaki]]'s "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]", and [[Yudias Velgear]]'s "[[Galactica Oblivion (anime)|Galactica Oblivion]]".
  ** Although this monster was Yusaku's signature card, it was used sparingly in the anime: it was only Summoned five times before it became [[Forbidden]] in the ''[[OCG]]''/''[[TCG]]'' before now becoming Unlimited again.
  * This monster and "[[Decode Talker]]" are the first ace monsters of a spin-off anime protagonist to not be either [[Dragon]] or [[Warrior]].
  ** Despite this, this monster has a dragon-like appearance, and "Decode Talker" has a warrior-like appearance.
  ** Both are also the first time ace monsters of a spin-off anime protagonist to have a new [[Type]], in which case, is [[Cyberse]].
  * This monster is similar to "[[Stardust Dragon]]".
  ** This monster focuses on returning other cards from the field to the hand and [[Special Summon]]ing monsters after one is sent to the [[Graveyard]], while "Stardust Dragon" prevents any harmful effect from destroying other cards from on the field by [[Tribute|Tributing]] itself and later Special Summoning itself.
  ** This card's first artwork also depicts this monster in a pose similar to that of "Stardust Dragon".
  * This monster is the rival counterpart of "[[Borreload Dragon]]".
  ** Both have mirrored poses in their card artworks.
  ** Both have opposite color schemes.
  ** Both have opposite effects: this monster focuses on Special Summoning monsters from the hand after one is sent from the field to the Graveyard, while "Borreload" allows the player to take [[control]] of the opponent's monsters and then [[send]]s them to the Graveyard.
  ** This monster's [[Attribute]] is [[LIGHT]], while the Attribute of "Borreload Dragon" is [[DARK]].
  * This is the first Link-4 monster to be released.
  * This is the first signature card of an anime protagonist, as well as the first Cyberse monster, to become Forbidden.
  ** It was the first signature card of an anime protagonist to be listed on the Forbidden/[[Limited]] Lists as well.
  ** It was also the first Link Monster, as well as the first Cyberse monster, to be Limited as well as be on the Lists.
  ** This is the first signature card of an anime protagonist to have its effect changed after becoming [[Unlimited]] again.
  * This is the only member of the "[[Firewall]]" [[archetype]] whose Attribute is not DARK, instead being LIGHT.
  * This monster's [[Attack and effect names in Yu-Gi-Oh! VRAINS|attack name]] in the ''Yu-Gi-Oh! VRAINS'' anime, "Tempest Terahertz" ("Tempest Attack" in the Japanese version), is based on Transient Electromagnetic Pulse Emanation Standard (TEMPEST) attacks, which work on the principle of intercepting electromagnetic radiation emissions from electronic devices such as monitors, hard disk and PC memory from a remote location, and allow the replay of the information captured.
