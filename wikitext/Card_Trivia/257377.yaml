title: Card Trivia:Jungle Field
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card and "[[Magma Field]]" are the only [[Field Spell Card]]s in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime where their effects were never successfully [[activate]]d.
  ** The difference between both aforementioned cards is that the effect of "Magma Field" was activated but never [[resolve]]d, while this card's effect was never activated.
