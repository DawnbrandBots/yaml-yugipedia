title: Card Trivia:Gem-Knight Master Diamond Dispersion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Terminal World 2]]''.
  * This monster appears in the artwork of "[[Gem-Knight Dispersion]]".
  * This monster is a [[retrained]] counterpart of "[[Gem-Knight Master Diamond]]".
  ** This monster's name is based on diamond dispersion, an optical phenomenon occurring in certain gemstones, like diamonds, where white light is separated into its component colors as it passes through the material, creating fiery or colorful sparkles.
  *** This monster's name is also based on dispersion, the action of distributing (or to divide or spread out) across a wide area, which reflects its effect to "disperse" or "distribute" up to three non-[[Rock]] "[[Gem-Knight]]" monsters from the player's [[Extra Deck]] or [[Graveyard]] to their [[field]].
