title: Card Trivia:Happy Lover
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sprite's Blessing]]" and both artworks of "[[Lyna the Light Charmer]]".
  ** An advanced form of this monster appears in both artworks of "[[Familiar-Possessed - Lyna]]" (being fused with "Lyna" in the second artwork).
  * This monster is based on a [[wikipedia:Cherub|cherub]], an angel typically depicted with two pairs of wings, which is further indicated by its English and Italian [[flavor text]]s.
  * This monster has a [[recolored counterpart]]: "[[Tenderness]]".
  * This is the first [[Fairy]] monster to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
