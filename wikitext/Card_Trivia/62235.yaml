title: Card Trivia:Dupe Frog
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Demon Wisdom Frog" (魔知ガエル, ''Machigaeru''), is a pun on 「間違える」 (''machigaeru'', lit. "to make a mistake"), reflecting this monster's effect to prevent the opponent's monsters from [[target]]ing other monsters for attacks, except this monster, as it will allow the opponent's monster to make a "mistake" by attacking it.
  ** This monster's English name is also a pun on its effect, as it can "dupe" the opponent's monsters into attacking it. This name is also short for "duplicate", referencing this monster's effect to make its name become "[[Des Frog]]" while on the [[field]].
