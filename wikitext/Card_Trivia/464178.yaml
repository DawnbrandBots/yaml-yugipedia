title: Card Trivia:Aleister the Invoker
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * This monster appears in the artworks of "[[Invocation]]", "[[Magical Meltdown]]", and "[[Magical Name - "Rosa Mundi"]]".
  * "[[The Book of the Law]]" appears in this card's artwork, held by this monster.
  * The crest that appears in the artwork of "[[Spellbook of Judgment]]" also appears in this card's second artwork.
  * This monster is named after [[wikipedia:Aleister Crowley|Aleister Crowley]], an English [[wikipedia:Occult|occultist]] who founded the religion of [[wikipedia:Thelema|Thelema]].
  * This monster's title of "Invoker" references the "[[Invoked]]" [[archetype]], which consists of [[Fusion Monster]]s that require this monster as [[Fusion Material]]. According to the archetype's lore, this monster summoned them by partially merging his soul with them, but at the cost of losing himself more and more.
  * This monster has multiple forms:
  ** Two [[Link Monster]]s: "[[Aleister the Invoker of Madness]]" and "[[Crowley, the First Propheseer]]"
  ** Two Fusion Monsters: "[[Invoked Magistus Omega]]" and "[[Invoked Caliga]]"
  ** Two younger forms: "[[Crowley, the Magistus of Grimoires]]" and "[[Crowley, the Gifted Magistus]]"
  ** A possible older form: "[[Aleister the Reminiscent]]"
