title: Card Trivia:Gladiator Beast Gaiodiaz
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is translated as "Gladial Beast Geordias". [[wikipedia:Gordias|Gordias]] is the founder of the city Gordium, where Alexander the Macedon cut the Gordian Knot.
  * The card text "except Gladiator Beast Spartacus." is actually unnecessary, since "Gladiator Beast Spartacus" can only be Special Summoned by the effect of "[[Gladiator Beast Hoplomus]]".
