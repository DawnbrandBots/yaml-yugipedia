title: Card Trivia:Marincess Blue Slug
wikitext: |-
  {{Navigation}}

  * This monster's design is based on the [[wikipedia:Hypselodoris festiva|Hypselodoris festiva]], a species of sea slug that is commonly known as the "festive sea slug".
  * Despite the design, this card's name is a reference to the [[wikipedia:Glaucus atlanticus|Glaucus atlanticus]], a species of sea slug that is commonly known as the "blue sea slug".
  * This monster appears in the artworks of "[[Marincess Current]]" and "[[Marincess Cascade]]".
