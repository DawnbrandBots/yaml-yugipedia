title: Card Trivia:Maiden of Blue Tears
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This card is based on the ''[[Blue Angel (book)|Blue Angel]]'' book that appears in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** This card's name is a reference to [[Skye Zaizen]], who changed her [[LINK VRAINS]] avatar and name to "Blue Maiden" during the second season of the anime.
  ** Unlike the original ''Blue Angel'' book, this version features an aquatic theme on the cover, referencing the "[[Marincess]]" [[archetype]] used by Blue Maiden, although this card is designed to support the "[[Trickstar]]" archetype.
  * This card is the [[Trap Card]] counterpart of "[[Angel of Blue Tears]]".
