title: Card Trivia:Chaos Distill
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This card is based on an [[wikipedia:Athanor|athanor]], a special furnace used in alchemy for the process of [[wikipedia:Digestion (alchemy)|alchemical digestion]], in which constant gentle heat is applied to a substance over a period of several weeks.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[banish]] itself [[face-up]] from the [[Spell & Trap Zone]] while "[[Macro Cosmos]]" is on the [[field]] is based on the [[activation condition]] of "[[Macro Cosmos (anime)|Macro Cosmos]]" in the ''[[Yu-Gi-Oh! GX]]'' anime, which requires the player to banish this card to [[activate]] it.
