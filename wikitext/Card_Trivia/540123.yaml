title: Card Trivia:Zoa
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Immortal Class]]".
  * This monster has a [[Metal counterpart]]: "[[Metalzoa]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|120|ref}}, specifically [[Card Artworks:Zoa|from the panel in which this monster is Summoned.]]
  * This is one of few cards whose flavor text makes direct reference to another card.
  * This card has the highest [[ATK]] and [[Level]] of all [[Fiend]]-[[Type]] [[Normal Monsters]].
  * This monster has a [[retrained]] counterpart: "[[Zoa the Fiendish Beast]]".
