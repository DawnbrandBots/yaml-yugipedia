title: Card Trivia:Cup Ramen Lard
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Menlard" (メンラード ''Menrādo'') is  an anagram of "[[wikipedia:Ramen|ramen]]" (ラメン ''Rāmen''), followed by a long vowel mark (ー) and the syllable ''do'' (ド).
  ** This monster's name and appearance are likely based on [[wikipedia:Tonkotsu ramen|tonkotsu ramen]], a ramen dish with soup made from pork bones and topped with pork back fat (or "lard").
