title: Card Trivia:Rokket Barrage
wikitext: |-
  {{Navigation}}

  * "[[Anesthrokket Dragon]]", "[[Autorokket Dragon]]", "[[Magnarokket Dragon]]", and "[[Shelrokket Dragon]]" appear in this card's artwork.
  ** These (along with "[[Metalrokket Dragon]]") were the first "[[Rokket]]" monsters to be released in the ''[[OCG]]''/''[[TCG]]'', being printed in ''[[Circuit Break]]'' and ''[[Extreme Force]]''.
