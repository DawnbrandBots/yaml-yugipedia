title: Card Trivia:Marshalling Field
wikitext: |-
  {{Navigation}}

  * The [[crest]]s used by [[Vetrix]], [[Trey]], [[Quattro]], and [[Quinton]], and the two unknown crests from the artwork of "[[Augmented Heraldry]]" appear in this card's artwork.
  * This card is named after marshalling, the process in [[wikipedia:Heraldry|heraldry]] where different [[wikipedia:Coat of arms|coats of arms]] are combined to indicate marriage, descent, or the bearing of office. This references the [[Vetrix Family]]'s ability to use their crests, as well as Vetrix's usage of the "[[Heraldic Beast]]" and "[[Heraldry]]" [[archetype]]s in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This is the first card to search a specific "[[Rank-Up-Magic]]" card.
  ** This is also the first card released in the ''[[OCG]]''/''[[TCG]]'' that can search a "Rank-Up-Magic" card.
  * This card's first effect to restrict the player to [[Special Summon]] [[Machine]] monsters references the Decks used by Trey, Quattro, and Quinton, which are spearheaded by Machine "[[Number]]" monsters.
  ** This card's second effect to change a [[Level 5]] or higher Machine monster's [[Level]] from 5 through 9 references how the Machine "Number" monsters used by Trey, Quattro, and Quinton in the ''Yu-Gi-Oh! ZEXAL'' anime range in [[Rank]]s from 5 to 9.
  ** This card's final effect to [[search]] for "[[Rank-Up-Magic Argent Chaos Force]]" references how Trey, Quattro, and Quinton use the [[Rank-Up-Magic Argent Chaos Force (anime)|aforementioned card]] during their final Duels in the ''Yu-Gi-Oh! ZEXAL'' anime.
