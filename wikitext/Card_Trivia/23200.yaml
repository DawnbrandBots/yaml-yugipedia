title: Card Trivia:Dungeon Worm
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Worm Bait]]".
  * This monster appears to be based on [[wikipedia:Mongolian death worm|Mongolian death worm]].
  * The head portion of this monster in its ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! Duelist|36|ref}}, specifically from the panel where [[Dungeon Worm (manga)|this monster]] emerges from the ground to eat "[[Celtic Guardian (manga)|Celtic Guardian]]".
