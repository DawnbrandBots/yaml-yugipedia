title: Card Trivia:Machina Air Raider
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Machina Redeployment]]".
  * This card, "[[Machina Megaform]]", "[[Machina Irradiator]]" and "[[Machina Fortress]]" all have a total combined stat of 4100.
  ** This reference the story as this monster was created as a support unit using the same parts as "[[Machina Fortress]]" as depicted in "Machina Redeployment".
