title: Card Trivia:Yokotuner
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bownty]]", "[[Edge of the Ring]]", and "[[Don't Slip, the Dogs of War]]".
  * This card's name is a portmanteau of the words ''[[wikipedia:Yokozuna|yokozuna]]'' (the highest rank in [[wikipedia:Sumo|sumo wrestling]]) and [[Tuner monster|Tuner]], both of which are fittingly reflected in this monster's appearance and status (respectively).
