title: Card Trivia:Royal Rebel's King's Return
wikitext: |-
  {{Navigation}}

  * "[[Royal Rebel's Fanatic]]" and "[[Royal Rebel's Heavy Metal]]" appear in this card's artwork.
  * This card's name is a reference to {{episode|Yu-Gi-Oh! SEVENS|085|ref}}, titled "The Return of the King" in the Japanese version. The episode featured the second Duel between [[Roa Kassidy]] and [[Yuga Ohdo]], in which Roa used the Field Spell "[[King's Style]]", a card with a similar Level-reducing effect as this card.
