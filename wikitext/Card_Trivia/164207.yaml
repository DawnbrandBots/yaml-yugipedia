title: Card Trivia:Plasma Warrior Eitom
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Plasma Blast]]".
  * This monster's title and [[Thunder]] [[Type]] are based on [[wikipedia:Plasma (physics)|plasma]], a state of matter formed from superheated, ionized gas that serves as a medium for the flow of electrical currents.
  * "[[Conduction Warrior Plasma Magnum]]" visibly appears to be a [[Fusion Monster|Fusion]] of this monster and "[[Conduction Warrior Linear Magnum Plus Minus]]", likely in reference to how in {{episode|GX|082|ref}}, this monster was [[Special Summon]]ed by [[Tribute|Tributing]] "[[Conduction Warrior Linear Magnum ± (anime)|Conduction Warrior Linear Magnum ±]]"; however, this monster cannot be used as [[Fusion Material]] for "Plasma Magnum" due to being a [[LIGHT]] Thunder monster, while the required Fusion Materials for "Plasma Magnum" are two [[EARTH]] [[Rock]] monsters.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect [[support]]ing the "[[Magnet Warrior]]" and "[[Magna Warrior]]" [[archetype]]s is a reference to [[Bastion Misawa|Bastion Misawa's]] usage of this monster and the aforementioned archetypes in the above-mentioned episode of the ''[[Yu-Gi-Oh! GX]]'' anime.
