title: Card Trivia:Tilted Try
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" and "[[Jackpot 7]]" appear in this card's artwork.
  ** "Jackpot 7" is depicting with its full face without missing its shard. This implies that "Goblin of Greed" broke the machine after this card's events.
  * The Japanese pronunciation of this card's name (ツッパリーチ ''Tsupparīchi'') is a portmanteau of the Japanese words "''tsupparu''" and "''rīchi''".
  ** "''Tsupparu''" is the Japanese term for gambling recklessly, while "''rīchi''" in a mahjong term describing being one step away from victory.
  ** This card's English name is based on the poker term, "[[wikipedia:Tilt (poker)|tilt]]", which refers to players becoming frustrated or angry due to bad luck, which leads to them making bad or overly-aggressive plays. This concept can be extended to other competitive or luck-based games, including slots.
