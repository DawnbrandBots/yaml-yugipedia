title: Card Trivia:Arcana Extra Joker
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 20]]''.
  * This monster is based on the [[wikipedia:Joker (playing card)|Joker]], a [[wikipedia:Playing card|playing card]] which represents the addition to the four [[wikipedia:Standard playing card suit|standard playing card suits]].
  * This monster is an [[Card evolutions|upgraded]] [[Link Monster|Link]] form of "[[King's Knight]]", combined with "[[Queen's Knight]]" and "[[Jack's Knight]]".
  ** This monster is a [[counterpart]] of "[[Arcana Knight Joker]]" (the [[Fusion Monster]] form of "Jack's Knight") and "[[Arcana Triumph Joker]]" (the upgraded [[Effect Monster]] form of "Queen's Knight").
  ** This monster's [[Link Material]]s (three [[Warrior]] monsters with different names) also reference the [[Three Musketeers of Face Cards]].
  *** Fittingly, if it is [[destroy]]ed, this card can [[Special Summon]] a [[Level 4]] monster, which includes "Queen's Knight" and "King's Knight".
