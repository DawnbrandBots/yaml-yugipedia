title: Card Trivia:Double Attack! Wind and Thunder!!
wikitext: |-
  {{Navigation}}

  [[File:Fusion_Attack!_Demon_Wind_and_Thunder!!.png|thumb|right|304|The "Double Attack! Demon Wind and Thunder!!" scene in the manga]]

  * "[[Gate Guardian of Thunder and Wind]]" appears in this card's artwork.
  ** This card is based on the appearance of "[[Gate Guardian]]" after "[[Suijin]]" had been [[destroy]]ed in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]. "[[Sanga of the Thunder]]" and "[[Kazejin]]" both combined their attacks, which was referred to as "Double Attack! Demon Wind and Thunder!!" in the English manga and "Demon Wind Shockwave" ({{Ruby|魔|ま}}{{Ruby|風|ふう}}{{Ruby|衝|しょう}}{{Ruby|撃|げき}}{{Ruby|波|は}} ''Mafū Shōgekiha'') in the Japanese manga and anime.
  * This card's artwork is based on a scene from {{chapter|Yu-Gi-Oh!|097|ref}}, specifically from the panel showing "[[Gate Guardian (manga)|Gate Guardian]]" (with the "[[Suijin (manga)|Suijin]]" component missing) attacking "[[Dark Magician (manga)|Dark Magician]]".

