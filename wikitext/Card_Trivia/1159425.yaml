title: Card Trivia:Junk Meister
wikitext: |-
  {{Navigation}}

  * The word "Meister" in this monster's name is the German word for "master".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|056|ref}}, specifically from the panel where [[Junk Meister (manga)|this monster]] switches from [[Defense Mode]] to [[Attack Mode]] via the effect of "[[Insect-Luring Light]]".
