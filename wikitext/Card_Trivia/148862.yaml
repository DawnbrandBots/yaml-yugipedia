title: Card Trivia:Steelswarm Moth
wikitext: |-
  {{Navigation}}

  * Following the trend of "[[Steelswarm]]" monsters that need at least one [[Tribute]], this monster has 200 more [[ATK]] and 1 more [[Level]] than the previous one.
  * Coincidentally, this card has the same [[Level]] and [[ATK]] as the "[[Monarch (series)|Monarchs]]".
  * This card appears in the artwork of "[[Infestation Wave]]".
