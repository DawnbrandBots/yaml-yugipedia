title: Card Trivia:Heosvarog the Mechanical Dawn
wikitext: |-
  {{Navigation}}

  * This monster shares similarities with "[[Cyber Twin Dragon]]".
  ** Both are two-headed draconic [[LIGHT]] [[Machine]] [[Fusion Monster]]s.
  ** Both use two LIGHT Machine monsters as [[Fusion Material]]s: this monster requires any two such monsters, while "Cyber Twin Dragon" specifically requires two copies of "[[Cyber Dragon]]".
  ** This monster's [[original DEF]] (2800) is the same as the [[original ATK]] of "Cyber Twin Dragon".
  * While not directly related to its [[Cyber Dragon (archetype)|corresponding theme]], this monster, "[[Flying Mary, the Wandering Ghost Ship]]", and "[[L Magi Mergy]]" were all announced at the same time<ref>{{cite web | url = https://yu-gi-oh.jp/news_detail.php?page=details&id=1990 | title = Vジャンプ9月特大号掲載記事：第3回　『RAGE OF THE ABYSS（レイジ・オブ・ジ・アビス）』の収録カードを公開！② | publisher = YU-GI-OH.jp {{icon|jp}} | accessdate = July 10, 2024 | archive-url = https://web.archive.org/web/20240709040836/https://yu-gi-oh.jp/news_detail.php?page=details&id=1990 | archive-date = July 9, 2024}}</ref> and support the [[Type]]s and strategies featured in the first three [[Tactical-Try Deck]]s.
  * This card is likely named after [[Wikipedia:Eos|Eos]], the Greek goddess of the dawn, and [[Wikipedia:Svarog|Svarog]], an obscure Slavic deity variably interpreted as a god of blacksmithing and/or the sky.

