title: Card Trivia:Nordic Relic Draupnir
wikitext: |-
  {{Navigation}}

  * In Norse mythology, [[wikipedia:Draupnir|Draupnir]] is a gold ring possessed by Odin with the ability to multiply itself.
  ** Additionally, the hand of "[[Odin, Father of the Aesir]]" is shown producing another armor in this card's artwork.
  ** This explains the card's effect of producing another relic from your deck.
  * This is the first "[[Nordic Relic]]" [[Spell Card]], with a near 11 year gap before the second one.
