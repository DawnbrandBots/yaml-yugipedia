title: Card Trivia:Destruction Swordsman Fusion
wikitext: |-
  {{Navigation}}

  * "[[Buster Blader, the Destruction Swordmaster]]", "[[Buster Dragon]]" (in its original white color scheme), and the sword of "[[Dragon Buster Destruction Sword]]" appear in this card's artwork.
  ** This card's artworks is a continuation of the events depicted in the artwork of "[[Destruction Sword Memories]]" where "Buster Blader" is [[Fusion Monster|fusing]] the dead body of "Buster Dragon" into his armor, becoming "[[Buster Blader, the Dragon Destroyer Swordsman]]".
