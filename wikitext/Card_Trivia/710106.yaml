title: Card Trivia:Hugin the Runick Wings
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Runick Destruction]]" and "[[Runick Freezing Curses]]".
  * This monster has a [[counterpart]]: "[[Munin the Runick Wings]]".
  ** This monster and "Munin the Runick Wings" are based on [[wikipedia:Huginn and Muninn|Huginn and Muninn]], the two ravens who serve as the informants for the god [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]].
