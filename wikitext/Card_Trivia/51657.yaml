title: Card Trivia:Blackwing - Kalut the Moon Shadow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Against the Wind]]".
  * This monster is named after [[wikipedia:Qalat (fortress)|Qal'at]] or "Kalat", a type of fortress found in the Middle East.
  ** "Qal'at" or "Kalat" is also the Persian word for "fortress" and "fortification", which reflects this monster's effect to "fortify" a "[[Blackwing]]" monster's [[ATK]] by an additional 1400.
  * This is the first "Blackwing" monster to be [[Semi-Limited]].
  ** This is the second "Blackwing" monster to be [[Limited]], the first being "[[Blackwing - Gale the Whirlwind]]".
