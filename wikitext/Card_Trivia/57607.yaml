title: Card Trivia:Genex Recycled
wikitext: |-
  {{Navigation}}

  * This monster's design resembles "[[Genex Controller]]" and "[[Genex Spare]]".
  ** Fittingly, this monster's effect can "recycle" the name of "Genex Controller", another [[Tuner monster]], for the [[Synchro Summon]] of monsters that use "Genex Controller".
