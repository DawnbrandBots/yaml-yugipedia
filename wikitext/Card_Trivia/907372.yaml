title: Card Trivia:The Origin Stone of Legend
wikitext: |-
  {{Navigation}}

  * This monster is a ''[[Rush Duel]]'' counterpart to "[[The White Stone of Legend]]" and "[[The Black Stone of Legend]]".
  * This monster has a "hatched" form: "[[Node of Legend]]".
  * This is the first card, as well as the first [[Monster Card]], to mention [[Legend Card]]s in its effects.
