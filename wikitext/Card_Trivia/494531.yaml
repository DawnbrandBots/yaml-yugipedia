title: Card Trivia:White Aura Dolphin
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Indo-Pacific humpback dolphin|Indo-Pacific humpback dolphin]], which is also known as the "Chinese white dolphin" because of their white complexion.
  * This monster and "[[White Aura Whale]]" are the first [[Fish]] [[Synchro Monsters]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|011|ref}}, specifically from the panel showing [[White Aura Dolphin (manga)|this monster]] being Summoned.
