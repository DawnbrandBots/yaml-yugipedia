title: Card Trivia:Dotedotengu
wikitext: |-
  {{Navigation}}

  [[File:ZXx076_Drawing_Contest_Winner_Dotedotengu.jpg|thumb|right|300|]]

  * This monster is based on a [[wikipedia:tengu|tengu]], a legendary creature in Japanese mythology who takes on the appearance of a long-nosed man and wields a magic fan that can generate powerful winds.
  * The kanji 狗 (''gǒu'') appears on this monster's outfit.
  * This is one of three [[Fan-Made Cards]] that won the ''Yu-Gi-Oh! ZEXAL Draw Contest'', the other two being "[[Bachibachibachi]]" and "[[Tatakawa Knight]]".
  ** Out of the three cards, however, this is the only one whose designer name was not officially made known.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card's effect returns a card [[Yuma Tsukumo]] controlled to his [[hand]], but is instead used on an opponent's monster, which is retained in this card's ''[[OCG]]''/''[[TCG]]'' effect.
