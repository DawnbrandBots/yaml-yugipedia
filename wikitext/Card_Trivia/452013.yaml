title: Card Trivia:Mirror Imagine Secondary 9
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name, "Mirror Imagine" (ミラーイマジン ''Mirā Imajin''), seems to be a play on "Future Demon" (未来魔神 ''Mirai Majin'').
  ** This also reflects its owner, [[Isaac]], being [[Reiji Akaba (manga)|Reiji]]'s opponent - Reiji's Deck consisting of "[[D/D/D|Different Dimension Demons]]".
