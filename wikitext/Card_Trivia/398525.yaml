title: Card Trivia:Amorphous Persona
wikitext: |-
  {{Navigation}}

  * "[[Lector Pendulum, the Dracoverlord]]" and "[[Master Pendulum, the Dracoslayer]]" are in the foreground while a defeated "[[Amorphage Lechery]]" and "[[Amorphage Wrath]]" appears in the background this card's artwork.
  ** This card's artwork continues the events of "[[Draco Face-Off]]", and then continues in the artwork of "[[Forge of the True Dracos]]".
  * This is the first non-[[Ritual Spell Card]] that can [[Ritual Summon]] a [[Ritual Monster]].
  * The draconic insignias in both the chest plates "Lector Pendulum" and "Master Pendulum" can be seen coming to life in this card's artwork. Both insignias have a very similar design and can be also be seen in the artwork of "Forge of the True Dracos" .
  ** Additionally, since the helmet of "Master Pendulum" has broken off in this artwork, it can also be seen that he has a very similar marking on his forehead to "Lector Pendulum".
  * Like the other Field Spells of archetypes related to the "[[Dracoslayer]]" storyline ("[[Ignition Phoenix]]", "[[Dinomic Powerload]]", "[[Majesty's Pegasus]]", "[[Crystolic Potential]]", "[[Metamorformation]]", "[[Zodiac Sign]]", and "[[Dragonic Diagram]]"):
  ** They are Field Spells that feature a member of the "Dracoslayer" archetype in its artwork.
  ** They support their respective archetype, but are not part of the archetype themselves (they do not have the archetype in their name).
  ** Their Japanese names each have a word abbreviated with an English letter with Furigana. In this card's case, "Persona" is written as a "P" with the Furigana "Perusona", similar to how "Pendulum" is written as a "P" with the Furigana "Pendyuramu" in Japanese.
