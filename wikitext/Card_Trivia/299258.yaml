title: Card Trivia:Dododo Swordsman
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Yuma 2: Gogogo & Dododo]]''.
  * This monster's Japanese name, "Dododogassa," is a portmanteau of "Dododo" and "''[[wikipedia:Kasa (hat)|sandogasa]]''", a bowl-shaped hat worn by this monster, which was common among foot soldiers and [[wikipedia:samurai|samurai]] in [[wikipedia:History of Japan|Feudal Japan]].
  ** Fittingly, this monster was used against [[Ponta]], a tanuki who served as the body double for Kiraku, the past life of [[Girag]] who was a revered military general during the [[wikipedia:Sengoku period|Sengoku period]] of Feudal Japan in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster has the highest [[Level]] (8) and [[original DEF]] (3000) of all "[[Dododo]]" monsters.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this monster was a [[Fiend]] [[Flip monster]]; however, in the ''[[OCG]]''/''[[TCG]]'', this monster's [[Type]] was changed to [[Warrior]] and is not a Flip monster, but it still retained its effect that activates after being [[Flip Summon]]ed.
  * This monster's ''OCG''/''TCG'' effect to gain 3500 [[ATK]] after being Flip Summoned, is an alteration of its effect in the ''Yu-Gi-Oh! ZEXAL'' anime, which allows it to gain ATK equal to the difference between both players' [[Life Point]]s. In {{episode|ZEXAL|107|ref}}, this monster gained 3500 ATK, equal to the difference between [[Yuma Tsukumo]]'s '''500''' Life Points and Ponta's '''4000''' [[Life Point]]s (while possessing Girag's body).
