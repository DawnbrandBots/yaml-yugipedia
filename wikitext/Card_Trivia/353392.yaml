title: Card Trivia:Yazi, Evil of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster is based on ''[[wikipedia:zh:睚眦|Yazi]]'' (zh: 睚眦 ''yázì''), one of the [[wikipedia:nine sons of the dragon|9 sons of the dragon]]. "Gaizā" is a portmanteau of "Gaisai" (Japanese reading for "Yazi") and "Kaizā" (Kaiser).
  ** 睚眦 ''yázì'' itself can mean to "stare in anger/indignance", and is featured in the Chéngyǔ "睚眦必报 yázìbìbào", meaning "to seek revenge over an angry look". 
  * This monster appears in the artwork of "[[Yang Zing Brutality]]" and "[[Ritual Beast Ambush]]".
  * Just like "[[Baxia, Brightness of the Yang Zing]]", this monster is the merged form of "[[Yang Zing]]" monsters, which is fitting due to its Level; in this case, "[[Taotie, Shadow of the Yang Zing]]" and "[[Jiaotu, Darkness of the Yang Zing]]".
  ** This monster's creation is shown in "Yang Zing Brutality".
  ** This monster is wearing the armor of "[[Shaddoll Squamata]]" (formerly belonging to "[[Satellarknight Unukalhai]]") and the darkened ring of "Unukalhai", all of which was inherited from "Jiaotu".
  ** The golden snake like object/entity formerly coiled around "Squamata" and "Jiaotu" is also present, coiled around this monster's tail.
