title: Card Trivia:Grief Tablet
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * "[[Lord of D.]]" appears in this card's artwork.
  ** This card's artwork depicts "Lord of D." being sealed inside the stone tablet, similar to how ''[[ka]]'' are sealed inside the stone tablets with the power of the [[High Priests]]' [[Millennium Rod]] in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'']] manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** Fittingly, "Lord of D." was the monster [[equip]]ped with this card in {{episode|Yu-Gi-Oh!|200|ref}}.
