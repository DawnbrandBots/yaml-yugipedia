title: Card Trivia:Block Spider
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on the word "block", as its design is made up of [[wikipedia:Construction set|construction blocks]] and it features an effect to "block" an opponent's attack on [[Insect]] monsters.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] another copy of itself from the player's [[Deck]] is based on a scene from {{episode|ARC-V|004|ref}} where [[Yuya Sakaki]] used the effect of "[[Mimiclay (anime)|Mimiclay]]" to create another copy of [[Block Spider (anime)|this monster]] to prevent [[Sylvio Sawatari]] from attacking him.
