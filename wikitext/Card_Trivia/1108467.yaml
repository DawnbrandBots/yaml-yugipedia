title: Card Trivia:Bomber Place
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "Bomber" and "[[wikipedia:Sudoku|Number Place]]"; the original name of "Sudoku".
  * This monster's [[original ATK and DEF]] (1350/2400) along with its [[Level]] (6) contain the digits from 1 to 6, which reflects its first bulleted effect requiring a player to control monsters of each Level of the aforementioned numbers.
