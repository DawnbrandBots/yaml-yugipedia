title: Card Trivia:Dice Key Lilith
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Lilith|Lilith]], the primordial female demon appearing in [[wikipedia:Jewish mythology|Jewish]] and [[wikipedia:Mesopotamian myths|Mesopotamian mythology]], which reflects this monster's demonic appearance.
  ** This monster's Japanese name (リリス, ''Ririsu'') is also a pun on the word "release" (リリース, ''Rirīsu''), the original term for [[Tribute]], which reflects its first bulleted effect to be treated as two Tributes for the [[Tribute Summon]] of a [[Fairy]] [[Type]] monster.
