title: Card Trivia:The Snake Hair
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Metal Plus]]".
  * This monster has a [[retrained]] counterpart: "[[Stare of the Snake Hair]]".
  * This monster is based on [[wikipedia:Medusa|Medusa]], a half-human half-snake female monster in [[wikipedia:Greek mythology|Greek mythology]] who is known for having sharp fangs, venomous snakes for hair, and her petrifying gaze, which turns her victims to stone.
  ** Certain incarnations of this monster reference the Medusa's petrifying gaze, such as its [[The Snake Hair (DOR)|''The Duelists of the Roses'' incarnation]] eternally spellbinding the monster that destroyed it by battle, and "Stare of the Snake Hair" preventing a monster from attacking, using its effects, and being used as [[material]] for a [[Fusion Summon|Fusion]], [[Synchro Summon|Synchro]], [[Xyz Summon|Xyz]], or [[Link Summon]].
  * In certain ''[[Yu-Gi-Oh!]]'' video games, this monster's sprite is depicted with the lower body of a snake, despite its humanoid appearance in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * In the ''[[Yu-Gi-Oh! Forbidden Memories]]'' video game, despite being female, this monster cannot be used to [[Fusion Summon]] other female monsters.
