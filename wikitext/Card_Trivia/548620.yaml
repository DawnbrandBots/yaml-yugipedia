title: Card Trivia:Mekk-Knight Avram
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[World Legacy Awakens]]", "[[World Legacy's Sorrow]]", and "[[World Legacy Struggle]]".
  * "[[Chosen by the World Chalice]]" → "[[Auram the World Chalice Blademaster]]" → "Mekk-Knight Avram" → "[[Crusadia Maximus]]" → "[[Crusadia Equimax]]" → "[[Mekk-Knight Crusadia Avramax]]" → "[[Avida, Rebuilder of Worlds]]"
  ** This monster is "Auram the World Chalice Blademaster" donning the armor and swords of "[[Mekk-Knight Blue Sky]]", after the latter passed on his power and gem to "Auram" (as depicted in the artwork of "[[World Legacy Succession]]") during the rampage of "[[Knightmare Corruptor Iblee]]", who took the other six gems wielded by the "[[Mekk-Knight]]" monsters.
