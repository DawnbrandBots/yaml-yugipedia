title: Card Trivia:Fire King Avatar Kirin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[High Tide on Fire Island]]".
  ** A fiery form of this monster appears in the artwork of "[[Echelon of the Fire Kings]]".
  * This monster is based on the ''[[wikipedia:Qilin|kirin]]'', a mythological Eastern Asian creature with the head and the body of a dragon, and the hooves and horn of a [[wikipedia:Unicorn|unicorn]].
  * This monster has an evolved counterpart: "[[Fire King High Avatar Kirin]]".
