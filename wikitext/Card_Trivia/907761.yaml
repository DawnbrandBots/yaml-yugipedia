title: Card Trivia:Drytron Fafnir
wikitext: |-
  {{Navigation}}

  * "[[Drytron Mu Beta Fafnir]]", four "[[Drytron Zeta Aldhibah]]s" (in purple), three "[[Drytron Alpha Thuban]]s" (in blue), and two "[[Drytron Gamma Eltanin]]s" (in green) appear in this card's artwork.
  * This card is named after [[wikipedia:Fafnir|Fafnir]], a dwarf in [[wikipedia:Norse mythology|Norse mythology]] who was cursed to become a dragon.
  ** This card is also named after [[wikipedia:42 Draconis|Fafnir]], a giant star in the northern constellation of [[wikipedia:Draco (constellation)|Draco]], which is also designated as "42 Draconis".
