title: Card Trivia:Ambitious Gofer
wikitext: |-
  {{Navigation}}

  * This monster is based on Gofer, the final boss of ''[[wikipedia:Gradius II|Gradius II: The Ambitions of Gofer]]''.
  ** Gofer itself is actually a completely separate entity from the true threat, Bacterion, though he admits to being "but a small part of the empire".
  ** The starship that appears in this card's artwork is based on the Vixen, the Vic Viper's successor from the MSX game ''Gofer's Ambition: Episode II'' (or ''Nemesis III''). More specifically, it is based on the "Type A" Vixen configuration, which contained the classic default ''Gradius'' weaponry.
