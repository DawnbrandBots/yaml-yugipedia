title: Card Trivia:Fairy Box
wikitext: |-
  {{Navigation}}

  * This card is based on ''[[wikipedia:Whac-A-Mole|Whac-A-Mole]]'', a cabinet arcade game where the player uses a large, soft mallet to whack the small, plastic, cartoonish moles that pop out of the holes at random.
  ** In the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], this card replicates the game of ''Whac-A-Mole'', where the player's monster(s) is concealed inside the box and protected from the opponent's attacking monster. The player's monster then pops its head in and out rapidly out of the holes at random, giving the opponent's attacking monster a chance of either hitting or missing its [[attack target]].
  * This card has a [[retrained]] [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart: "[[Reversal Box]]".
