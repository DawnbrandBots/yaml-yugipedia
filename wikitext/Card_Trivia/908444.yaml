title: Card Trivia:The Iris Swordsoul
wikitext: |-
  {{Navigation}}

  {{Multiple image|align=right|direction=vertical|width=250|image1=TheIrisSwordsoul-ConceptArt.png|caption1=This monster's concept art in ''[[Yu-Gi-Oh! Card Game Art Works]]''.|image2=DogmatikaFleurdelistheKnighted-ConceptArt.png|caption2=Concept art of "[[Dogmatika Fleurdelis, the Knighted]]" in ''Card Game Art Works''. The three out-of-armor drawings on the right were originally shown as part of this monster's.}}

  * This monster appears in the artworks of "[[Branded Banishment]]", "[[Branded in Central Dogmatika]]", "[[Branded Retribution]]", "[[Dogmatikamacabre]]", "[[Dogmatikaturgy]]", "[[Springans Interluder]]", and "[[The Three Brave Swordsouls]]".
  * This card's artwork appears in one of the bubbles in the artwork of "[[Icejade Tremora]]".
  * This monster's concept art notes the following:
  ** She is "[[Dogmatika Fleurdelis, the Knighted]]" without her armor.
  *** Appropriately, the kanji 「妖眼」 (''ayame'', lit. "bewitched eye") in this card's Japanese name is a homophone of 「菖蒲」, the Japanese word for "iris flower", which is called "fleurdelis" in French. It is also a reference to her left eye getting corrupted (as seen in her appearance as "[[Dogmatika Fleurdelis, the Thunderbolt]]", which serves as a bridge between the two forms); the piece of paper covering it is an ''[[wikipedia:Ofuda|ofuda]]'' talisman, and presumably serves to stop the corruption.
  *** Both also have the same [[Attribute]], [[Type]], [[Level]], [[ATK]], and [[DEF]].
  ** Her swords can cast electric blasts, and give off sparks when she swings them.
  ** She left the "[[Dogmatika Nation]]" with "[[Dogmatika Adin, the Enlightened]]" and "[[Dogmatika Theo, the Iron Punch]]".
  *** Both eventually received a shared "[[Swordsoul]]" counterpart of their own in "[[The Golden Swordsoul]]", which itself makes up "[[The Three Brave Swordsouls]]" together with this monster.
  ** "[[Dogmatika Ecclesia, the Virtuous]]" has been very close to her for more than 10 years, seemingly having used to be her squire. Ecclesia idolizes Fleurdelis because of it. This part of the concept art was moved to that of "the Knighted" in ''[[Yu-Gi-Oh! Card Game Art Works]]'', and replaced with a doodle of "Iris" attempting (apparently with difficulty) to groom Ecclesia's hair.
  ** She let her hair grow out since she left the "Dogmatika Nation".
  ** She has sealed away her stigmata, due to which she can no longer fly.
  ** Two drafts of the artwork featuring her in different poses were proposed, with the second one getting chosen. This part was dropped altogether in ''Card Game Art Works'' ([https://ms.yugipedia.com//archive/e/e2/20251125163138%21TheIrisSwordsoul-ConceptArt.png archive image]).
