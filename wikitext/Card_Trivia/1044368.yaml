title: Card Trivia:Bomb Token
wikitext: |-
  {{Navigation|mode=token}}

  * This [[Token]] appears in be artwork of "[[Volcanic Mine]]".
  ** Objects resembling this Token also appear in the artworks of "[[Volcanic Emission]]" and "[[Volcanic Slicer]]".
  * This Token may be based on [[wikipedia:volcanic bomb|volcanic bomb]]s, blobs of lava that are sometimes ejected out of erupting volcanoes and partially solidify in mid-air, effectively turning them into projectiles that can cause serious damage to anything they land on, hence the name.
