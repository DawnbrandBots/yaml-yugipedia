title: Card Trivia:Jointech Tinosaurus
wikitext: |-
  {{Navigation}}

  * The Japanese pronunciation of card's name (ジョインテック・ブリキノサウルス ''Jointekku Burikinosaurusu'') is a portmanteau of "buriki" (the Japanese word for [[wikipedia:Tinplate|tinplate]]) and "[[wikipedia:Brachiosaurus|Brachiosaurus]]".
  * This monster appears in the artworks of "[[Jointech Back Hustle]]" and "[[Jointech Merry-Go-Round]]".
