title: Card Trivia:Oxygeddon
wikitext: |-
  {{Navigation}}

  * This card (with its original anime artwork) appears in the original anime artwork of "[[Montage Dragon]]".
  * This monster's name and [[WIND]] [[Attribute]] are based on [[wikipedia:oxygen|oxygen]], the eighth chemical element in the periodic table which is mostly an invisible vapor.
  ** This monster's effect to damage both players when [[destroyed by battle]] by a [[Pyro]] monster (a [[FIRE]] monster in the ''[[Yu-Gi-Oh! GX]]'' anime) references the process of [[wikipedia:combustion|combustion]], which mostly requires oxygen to fuel fires.
