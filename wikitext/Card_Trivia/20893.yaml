title: Card Trivia:Dark Hole
wikitext: |-
  {{Navigation}}

  * The black hole in this card's artwork also appears in the artworks of "[[Dark Hole Device]]", "[[Dark Hole Dragon]]", "[[Dark Hole Paradox]]", and "[[Non-Spellcasting Area]]".
  * This card's name in every language, except for English and Spanish, translates to "[[wikipedia:Black hole|Black Hole]]", an invisible mass in astronomy that sucks in every form of matter, including light, that comes too close.
  ** This is reflected in the black hole in this card's artwork, as well as this card's effect of destroying all monsters on the field.
  * This card is tied with other cards as the first [[Spell Card]] in the ''[[OCG]]''/''[[TCG]]''.
  ** In the ''OCG''/''TCG'', it is also tied as the first [[Normal Spell Card]], and the first card with a monster-destruction effect.
  * This card has a Spell/Trap-destroying counterpart: "[[Heavy Storm]]".
  * This is one of four cards to feature a card(s) that were designed to counter this card specifically in its effects, the other three being "[[Harpie's Feather Duster]]", "[[Monster Reborn]]", and "[[Raigeki]]"; in this card's case, it is "[[White Hole]]".
  * This card was [[Forbidden]] for nine formats before becoming [[Limited]] once more, which was the most of any card before "[[Black Luster Soldier - Envoy of the Beginning]]", "[[Tsukuyomi]]", "[[Magician of Faith]]" (in the ''[[TCG]]'') and "[[Cyber-Stein]]" (in the ''[[OCG]]'') surpassed it with twelve, thirteen, and sixteen, respectively.
