title: Card Trivia:Melffy Fenny
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Exciting Melffy Time‎]]", "[[Joyous Melffys]]", "[[Merry Melffys]]", "[[Melffy Hide-and-Seek]]", "[[Melffy of the Forest]]", "[[Melffy Playhouse]]", and "[[Melffy Tag]]".
  * This monster is based on a [[wikipedia:Fennec fox|fennec fox]], a species of small fox known for their unusually large ears.
