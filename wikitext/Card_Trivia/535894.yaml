title: Card Trivia:Dark Flare Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fusion Armament]]", "[[Fusion Weapon]]", "[[Mirage Target]]", and "[[Speed Spell - Speed Fusion]]".
  * This monster has a retrained [[Main Deck]] [[counterpart]]: "[[Dark Flare Swordsman]]".
  * This is one of the few [[Fusion Monster]]s to have a lower [[ATK]] and [[DEF]] than either of its [[Fusion Materials]]: it has lower ATK and DEF than "[[Dark Magician]]", and less DEF than "[[Flame Swordsman]]". This is understandable, as "[[Mirage Knight]]" is stronger than all 3 monsters.
  * In the ''Yu-Gi-Oh! Dueling Legends Handbook'', this card's artwork was mixed up with that of "[[Dark Magician Knight]]".
