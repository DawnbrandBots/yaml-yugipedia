title: Card Trivia:Magician of Chaos
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[2025 Mega-Pack Tin]]''.
  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster is a [[Ritual]] [[counterpart]] of "[[Dark Magician]]" and a downgraded form of "[[Magician of Black Chaos]]".
  ** This monster is also the "[[Dark Magician (archetype)|Dark Magician]]"-related counterpart of "[[Blue-Eyes Chaos Dragon]]".
