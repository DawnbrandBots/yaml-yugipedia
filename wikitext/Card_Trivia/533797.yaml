title: Card Trivia:Gouki Serpent Splash
wikitext: |-
  {{Navigation}}

  * "[[Battlin' Boxer Glassjaw]]" and "[[Gouki Thunder Ogre]]" appear in this card's artwork.
  * This card is a reference to the [[wikipedia:Professional wrestling aerial techniques|diving splash]], a maneuver in professional wrestling involving a wrestler jumping forward from a raised platform, landing stomach first horizontally across an opponent lying on the ground below.
