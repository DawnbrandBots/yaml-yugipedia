title: Card Trivia:Kuriboh
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * This monster appears in the artworks of "[[Detonate]]", "[[Five Star Twilight]]", "[[Gift of the Weak]]", "[[Super Soldier Ritual]]", and "[[The Flute of Summoning Kuriboh]]".
  ** A balloon version of this monster appears in the artworks of "[[Amazement Administrator Arlekino]]", "[[Amazement Ambassador Bufo]]", "[[Amazement Precious Park]]", and "[[Amazement Special Show]]".
  * This monster's name roughly translates to "chestnut person" in Japanese. It is also the Japanese name for the ''[[wikipedia:Super Mario Bros.|Super Mario Bros.]]'' enemy known as "[[wikipedia:Goomba|Goomba]]" in the international version.
  * This monster has many [[counterpart]]s.
  ** Four brother counterparts: "[[Kuribah]]", "[[Kuribee]]", "[[Kuribeh]]", and "[[Kuriboo]]"
  ** "[[Rainbow Kuriboh]]"
  ** "[[Clear Kuriboh]]"
  ** "[[Kuribohrn]]"
  ** Two [[Link Monster]] counterparts: "[[Linkuriboh]]" and "[[Linguriboh]]"
  ** Three ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterparts: "[[Dark-Guiding Kuriboh]]", "[[Kuribot]]", "[[Kuribotorero]]"
  ** Five "[[Winged Kuriboh (archetype)|Winged Kuriboh]]" counterparts: "[[Winged Kuriboh]]", "[[Winged Kuriboh LV6]] ", "[[Winged Kuriboh LV9]]", "[[Winged Kuriboh LV10]]" and "[[Winged Kuriboh Sabatiel LV10]]"
  ** Three "[[Performapal]]" counterparts: "[[Performapal Kuribohble]]", "[[Performapal Barokuriboh]]", and "[[Performapal Classikuriboh]]"
  ** A "[[Galaxy]]" counterpart: "[[Galactikuriboh]]
  ** A "[[Junk]]" counterpart: "[[Junkuriboh]]"
  ** A "[[Photon]]" counterpart: "[[Kuriphoton]]"
  ** A "[[Dark Magician]]"-based counterpart: "[[Magikuriboh]]"
  ** A "[[Monster Reborn]]"-based counterpart: "[[Ankuriboh]]"
  ** A "[[Relinquished]]"-based counterpart: "[[Relinkuriboh]]"
  ** A "[[The Winged Dragon of Ra - Sphere Mode]]"-based counterpart: "[[Sphere Kuriboh]]"
  ** A [[Normal Monster]] [[recolored counterpart]]: "[[Wretched Ghost of the Attic]]", which itself has a "[[Memento]]" counterpart "[[Mementotlan Ghattic]]"
  ** Two [[signature move]] counterparts: "[[Detonating Kuriboh]]" and "[[Multiplying Kuriboh!]]".
  ** A [[LIGHT]] [[Fairy]] counterpart: "[[Hanewata]]"
  *** This monster prevents the player from taking [[battle damage]], while "Hanewata" prevents the player from taking [[effect damage]].
  *** Both share the same [[Level]] (1) and feature and inverted [[original ATK and DEF]].
  * "[[Sangan]]" may also be related to this monster.
  ** Its Japanese name is "Critter" (クリッター '''''Kuri'''ttā'').
  ** The pose of "[[Sangan (manga)|Sangan]]" in its manga artwork is the same as that of this monster in its manga artwork.
  *** Both of their manga artworks also have the same background.
  * This monster or one of its counterparts appeared in nearly every ''[[Yu-Gi-Oh!]]'' series.
  ** [[Yugi Mutou (manga)|Yugi Mutou]]/[[Dark Yugi (manga)|Dark Yugi]] ([[Yugi Muto]]/[[Yami Yugi]] in anime) used this monster in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]]. In the ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'' movie, he also used "[[Clear Kuriboh (anime)|Clear Kuriboh]]".
  ** [[Jaden Yuki]] (and his [[Jaden Yuki (manga)|manga counterpart]]) used "[[Winged Kuriboh (anime)|Winged Kuriboh]]" (and its [[Winged Kuriboh (manga)|manga counterpart]]) in the ''Yu-Gi-Oh! GX'' [[Yu-Gi-Oh! GX|anime]] and [[Yu-Gi-Oh! GX (manga)|manga]].
  ** [[Yusei Fudo (manga)|Yusei Fudo]] used "[[Junkuriboh (manga)|Junkuriboh]]" in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  ** [[Yuma Tsukumo]] used "[[Kurivolt (anime)|Kurivolt]]" and "[[Rainbow Kuriboh (anime)|Rainbow Kuriboh]]", while [[Kite Tenjo]] used "[[Kuriphoton (anime)|Kuriphoton]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. In the [[Yu-Gi-Oh! ZEXAL (manga)|manga]], Yuma's [[Yuma Tsukumo (manga)|manga counterpart]] only used "[[Rainbow Kuriboh (manga)|Rainbow Kuriboh]]".
  ** [[Yuya Sakaki (manga)|Yuya Sakaki]] used "[[Performapal Kuriborder (manga)|Performapal Kuribohble]]", "[[EnterMate ClassiKuriboh (manga)|EnterMate ClassiKuriboh]]", and "[[EnterMate BaroKuriboh]]" in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
  ** [[Yusaku Fujiki]] used three copies of "[[Sphere Kuriboh (anime)|Sphere Kuriboh]]" (as shields during his infiltration of [[SOL Technologies]]' data bank) and "[[Linkuriboh (anime)|Linkuriboh]]", while [[Ai]] used "[[Linguriboh (anime)|Linguriboh]]", in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** [[Shoma Yusa]] used "[[Linkuriboh (OS)|Linkuriboh]]" in the ''[[Yu-Gi-Oh! OCG Structures]]'' manga.
  ** [[Yuga Ohdo]] used three copies of "[[Kuribot (anime)|Kuribot]]" in the ''[[Yu-Gi-Oh! SEVENS]]'' anime. Yuga's [[Yuga Ohdo (manga)|manga counterpart]] used one "[[Kuribot (manga)|Kuribot]]" in the ''[[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!]]'' manga
  ** [[Yudias Velgear]] is currently the only protagonist to not use any counterpart of this monster.
  * In the ''Yu-Gi-Oh!'' manga and anime, this monster self-destructed on contact with the enemy.
  ** The effect of "Detonate" to [[destroy]] as many copies of this card and "[[Kuriboh Token]]s" the player [[control]]s references this, which works best after using "[[Multiply]]", another card that specifically [[support]]s this monster.
  * In the anime, this monster seemed to be different from other monsters, as it was almost sentient.
  ** In {{episode|Yu-Gi-Oh!|068|ref}}, this monster (of its own accord) looked at "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]" in awe as it absorbed the power of [[Seto Kaiba]]'s two other monsters that were on the [[field]].
  ** In {{episode|Yu-Gi-Oh!|099|ref}}, this monster itself chose to be Yugi Muto/[[Yami Yugi]]'s first [[Deck Master]] in the [[Virtual World (arc)|Virtual World arc]], much to their surprise.
  * In the manga and anime, Kaiba called this monster one of the weakest in the game, due to its low stats.
  ** However, this monster often prevented Yugi Mutou/Dark Yugi (Yugi Muto/Yami Yugi in anime) from taking battle damage that would have caused them to lose the [[Duel]].
  ** In the manga and anime, this monster's apparent weakness was such that in {{chapter|Yu-Gi-Oh!|131|ref}} (and its [[Yu-Gi-Oh! - Episode 039|anime counterpart]]), [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] (and his [[Maximillion Pegasus|anime counterpart]]) was shocked that anyone would use it in their [[Deck]].
  * In the ''[[Yu-Gi-Oh! OCG Stories]]'' manga, [[Raye (manga)|Raye]] owns a doll of this monster and "Winged Kuriboh".
  * In an interview in the [[Shonen Jump (Swedish)|Swedish Shonen Jump]] magazine in 2005, [[Kazuki Takahashi]] referred to this card as his third favorite monster. In his commentary, he also said (freely translated): ''What does that look actually mean?''
  * This card's third ''[[OCG]]''/second ''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|104|ref}}, specifically from the panel showing this monster and Dark Yugi (directly before Dark Yugi activated "[[Multiply (manga)|Multiply]]").
