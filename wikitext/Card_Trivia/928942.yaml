title: Card Trivia:Gunkan Sushipyard Seaside Supper Spot
wikitext: |-
  {{Navigation}}

  * This shipyard appears in the artwork of "[[Gunkan Suship Shirauo-class Carrier]]" and "[[Sour Scheduling - Red Vinegar Vamoose]]".
  ** The ''Kaisen'' (かいせん) nameplate that appears in this card's artwork also appears in the artwork of "[[Gunkan Suship Shari Red]]".
  * Several "[[Gunkan Suship Ikura-class Dreadnought]]s" (in various stages of assembly) appear in this card's artwork.
  * The kanji ''Kaisen'' (海せん) in card's Japanese name is a homophone of ''kaisen'' (海戦, "naval warfare") and ''kaisen'' (海鮮, "seafood").
  * This card's effect to force the opponent to pay [[LP]] exactly equal to the [[DEF]] of a "[[Gunkan]]" monster [[Special Summon]]ed from the [[Extra Deck]] that was [[sent]] to the [[GY]] by an opponent's card represents the forced payment for the sushi they spoiled.
  ** Additionally, the prices listed on the specials board that appears in the artwork of "[[Gunkan Suship Daily Special]]" are also a reference to the DEF of the "Gunkan" monsters.
