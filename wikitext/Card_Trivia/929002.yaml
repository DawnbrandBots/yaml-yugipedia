title: Card Trivia:Darkness Seed
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:seed|seed]], a ripened ovule of a flowering plant capable of growing into a new [[plant]].
  ** This monster's effect to [[Special Summon]] itself from the [[Graveyard]] references how a seed can sprout after a certain period of time after being planted into the ground.
  * This monster is likely the weaker "seed" form of "[[Darkness Bramble]]", which this card is used to [[Tribute Summon]] it in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Both monsters share similar effects preventing it from being [[destroyed by battle]] and can increase the player's [[Life Point]]s to 4000.
