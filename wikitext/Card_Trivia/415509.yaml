title: Card Trivia:Des Mosquito
wikitext: |-
  {{Navigation}}

  * The two counters placed on this card by its own effect are most likely references to the other two copies of this monster in its artwork.
  ** This is supported by the fact that this card gains 500 [[ATK]] for each counter on it (an amount that is equal to its own original ATK).
  ** This card was released as part of the ''[[Yu-Gi-Oh! GX Card Almanac promotional cards]]'' alongside "[[Metal Shooter]]", a monster that shares very similar effects.
