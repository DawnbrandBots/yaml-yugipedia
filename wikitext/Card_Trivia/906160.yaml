title: Card Trivia:Detonation Code
wikitext: |-
  {{Navigation}}

  * "[[Topologic Trisbaena]]" appears in this card's artwork.
  ** This card's effect to [[Special Summon]] a [[Dragon]], [[Machine]] or [[Cyberse]] monster reference the three [[Type]]s of monsters used by [[Ryoken Kogami|Varis]], the owner of "[[Topologic Trisbaena (anime)|Topologic Trisbaena]]" in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  * This card's name is a pun on [[wikipedia:Detonating cord|detonating cord]], a thin, flexible plastic tube usually filled with explosives, used to transmit a detonation wave.
