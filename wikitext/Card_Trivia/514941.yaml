title: Card Trivia:Dragonic Tactics
wikitext: |-
  {{Navigation}}

  * This card's chess-themed artwork and effect reference a common tactic in the game of [[wikipedia:Chess|chess]], where the player can sacrifice two of their pawns in order to move their stronger pieces into a more advantageous position, which reflects its effect to [[Tribute]] two [[Dragon]] monsters to [[Special Summon]] a [[Level 8]] Dragon monster.
