title: Card Trivia:Icarus Attack
wikitext: |-
  {{Navigation}}

  * "[[Swift Birdman Joe]]" appears in this card's artwork.
  * This card's name is based on [[wikipedia:Icarus|Icarus]], a character from [[wikipedia:Greek mythology|Greek mythology]] who, along with his father [[wikipedia:Daedalus|Daedalus]], created wings using wax and pillow feathers and used them to escape [[wikipedia:Crete|Crete]] by flying. Icarus, however, flew too close to the sun and the wax melted, causing him to fall from the sky into the sea where he drowned.
