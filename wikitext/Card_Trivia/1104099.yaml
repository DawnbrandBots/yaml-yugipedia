title: Card Trivia:World of Spirits
wikitext: |-
  {{Navigation}}

  * "[[Ancient Fairy Dragon]]", "[[Key Mace]]", "[[Kuribon]]", "[[Sunny Pixie]]", and "[[Watapon]]" appear in this card's artwork.
  ** This card's artwork is based on the [[Duel Monsters Spirit World]] from the ''[[Yu-Gi-Oh! 5D's]]'' anime where [[Luna]]'s mind lived and played with the aforementioned monsters while under the protection of the [[Ancient Fairy Dragon (character)|Ancient Fairy Dragon]] when she was younger.

