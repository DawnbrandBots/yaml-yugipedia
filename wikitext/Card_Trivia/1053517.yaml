title: Card Trivia:Silvera, Wolf Tamer of the White Forest
wikitext: |-
  {{Navigation}}

  * A monstrous caricature of this monster appears in the artwork of "[[Woes of the White Forest]]".
  * This monster has a downgraded form: "[[Silvy of the White Forest]]".
  * This monster has two [[counterpart]]s:
  ** "[[Azamina]]" [[Fusion Monster|Fusion]]: "[[Azamina Ilia Silvia]]".
  *** Both share the same [[ATK]] (1900).
  *** Both share the same [[Level]] (6).
  *** Both have opposite [[Attribute]]s ([[LIGHT]] and [[DARK]]).
  *** Their artworks have mirrored poses.
  ** "[[Sinful Spoils]]" [[Trap Card]]: "[[Sinful Spoils of Betrayal - Silvera]]".
