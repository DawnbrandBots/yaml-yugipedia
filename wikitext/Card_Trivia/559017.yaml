title: Card Trivia:Timelord Progenitor Vorpgate
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is derived from the [[wikipedia:Vulgate|Vulgate]], the late 4th century Latin translation of the [[wikipedia:Bible|Bible]].
  ** This is the only "[[Timelord]]" monster that is not based on a deity in [[wikipedia:Judeo-Christian|Judeo-Christianity]], as the [[Main Deck]] "Timelord" monsters are based on the [[wikipedia:Archangel|archangels]] of the [[wikipedia:Sefirot|Sefirot]], while "[[Sephylon, the Ultimate Timelord]]" is based on [[wikipedia:God|God]].
  ** This monster's ''[[TCG]]'' name is a corrupted combination of "Vulgate" and "warp", with the latter word representing the concept of [[wikipedia:Teleportation|teleportation]], which is a method of instantly traveling between two distant locations without physical space in between them. In this monster's case, teleportation is often associated with [[wikipedia:Time travel|time travel]], whereas this monster can "warp" the opponent's monsters into the future by [[banish]]ing them after battling and then [[Special Summon]]ing them during the [[End Phase]].
  * This is the first and currently only [[DARK]] "Timelord" monster.
  * This is the first and currently only "Timelord" [[Synchro Monster]].
  ** In the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, this monster was referred to as a "legendary Synchro Monster". Ironically, [[Z-one]], who used the "Timelord" [[archetype]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, despised Synchro Monsters as they led to the [[Meklord Emperor Genocide|destruction of the world]] in his future.
  * This is the first and currently only "Timelord" monster in the ''[[OCG]]''/''[[TCG]]'' whose unique effect [[activate]]s at the end of the [[Damage Step]].
  * This monster' ''OCG''/''TCG'' pose is taken from a panel from {{chapter|ARC-V|033|ref}} showing [[Timelord Progenitor Vorpgate (manga)|this monster]] being Summoned.
