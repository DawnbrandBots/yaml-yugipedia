title: Card Trivia:Appliancer Vacculephant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Appliancer Coating]]" and "[[Appliancer Conversion]]".
  * This monster's Japanese name, "Vacuuneshia", is based on [[wikipedia:Ganesha|Ganesha]], the [[wikipedia:Hindu|Hindu]] god of fortune, who is commonly depicted with an elephant head with one broken tusk.
  ** This monster's name and design are based on a [[wikipedia:Vaccuum cleaner|vaccuum cleaner]], a device designed to create a suction that removes dirt from floors and other surfaces, which commonly feature a long hose and a nozzle.
