title: Card Trivia:Legendary Knight Hermos
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Dragons of Legend: The Complete Series]]''.
  * This monster is the "[[Legendary Knight]]" [[counterpart]] of "[[The Claw of Hermos]]".
  ** This monster bears a resemblance to [[Joey Wheeler]], who used "[[Claw of Hermos|The Claw of Hermos]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime. Fittingly, this monster's voice actor is the same as Joey's.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[banish]] a [[Spell]]/[[Trap Card]] upon being Summoned is a reference to the final anime effect of "[[Legend of Heart (anime)|Legend of Heart]]" to [[destroy]] "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]" after Summoning the Legendary Knights. In the ''OCG''/''TCG'', this banishing effect is designed to effectively [[remove]] "[[The Seal of Orichalcos]]" from the [[field]], since its effect prevents it from being destroyed by card effects [[once per turn]].
  * In the Spanish ''TCG'', this card keeps its name from the American Spanish dubbed version of the ''Yu-Gi-Oh!'' anime.
