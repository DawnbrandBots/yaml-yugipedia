title: Card Trivia:D/D Dog
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Contract with the Zero King]]".
  * In the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, when this monster is treated as a "[[Go-D/D]]" monster via the effect of "[[Go-D/D World]]", it is named "Go-D/D Dog", thus forming a palindrome with its name.
  * This card's artwork is taken from {{chapter|ARC-V|040|ref}}, specifically from the panel showing [[D/D Dog (manga)|this monster]] being Summoned.
