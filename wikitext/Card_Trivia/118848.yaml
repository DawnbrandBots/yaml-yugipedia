title: Card Trivia:Goblin Dancers
wikitext: |-
  {{Navigation|mode=nonGame}}

  * These monsters appear to be "[[Goblin Attack Force]]" taking a vacation, which is reflected in their [[original ATK]] (2000) being 300 less than that of "Goblin Attack Force".
  ** These monsters are depicted wearing [[wikipedia:Lei (garland)|leis]], a garland common in the state of [[wikipedia:Hawaii|Hawaii]], which are often presented as gifts to visiting dignitaries or departing loved ones.
  *** Fittingly, in the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's owner, [[Elroy Prescot]], is based on [[wikipedia:Elvis Presley|Elvis Presley]], referencing Elvis' famous 1973 concert, ''[[wikipedia:Aloha from Hawaii via Satellite|Aloha from Hawaii via Satellite]]'', which took place in Honolulu, Hawaii.
