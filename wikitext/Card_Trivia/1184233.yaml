title: Card Trivia:Springans Brothers
wikitext: |-
  {{Navigation}}

  * This monster is visually comprised of recolored versions of the "[[Springans]]" released in [[Blazing Vortex|the prior set]], with "[[Springans Branga]]" being red instead of green, "[[Springans Rockey]]" being blue instead of red, and "[[Springans Pedor]]" being grey instead of blue.
