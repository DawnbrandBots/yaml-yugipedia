title: Card Trivia:Super Polymerization
wikitext: |-
  {{Navigation}}

  * The artwork of "[[Mature Chronicle]]" depicts a symbol based on this card's artwork.
  * This card is the upgraded [[Quick-Play Spell]] version of "[[Polymerization]]".
  * This is the first card that allows the player to [[Fusion Summon]] using an opponent's monster.
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, ''[[Yu-Gi-Oh! Duel Links]]'', and ''[[Yu-Gi-Oh! Master Duel]]'', this card generates a special Fusion Summoning background.
