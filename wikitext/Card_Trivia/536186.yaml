title: Card Trivia:Karate Man
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Weed Out]]".
  ** The artwork of "Weed Out" reveals that this monster's afro is a wig to cover its bald spot.
  * This monster appears to be based on the character Williams from the Bruce Lee film, ''[[wikipedia:Enter the Dragon|Enter the Dragon]]'', played by [[wikipedia:Jim Kelly (martial artist)|Jim Kelly]].
  * The Japanese text featured in this card's artwork is「花鳥風月」 (''Kachōfūgetsu'' Beautiful of Nature) - the Japanese concept of discovering yourself when experiencing nature.
