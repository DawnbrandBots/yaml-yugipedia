title: Card Trivia:Theinen the Great Sphinx
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Premium Pack 7]]'' and the ''[[Exclusive Pack]]''.
  * This monster's Japanese name, "Sphinx Androgynous", is based on the term used to describe a person's appearance that features both masculine and feminine physical traits, similar to how this monster is a composite of "[[Andro Sphinx]]" and "[[Sphinx Teleia]]", with the top half being male and the bottom half being female.
  ** In the ''[[Yu-Gi-Oh! The Movie: Pyramid of Light]]'', the head of "Sphinx Teleia" is visible on the back, and the head of "Andro Sphinx" is at the front.
  * In the English dubbed version of ''Yu-Gi-Oh! The Movie: Pyramid of Light'', this monster's name was mispronounced as "Thenien".
  * This card's text uses a semicolon, one of the few to do so before its widespread use in [[Problem-Solving Card Text]] to denote costs.
