title: Card Trivia:Yosen Training Grounds
wikitext: |-
  {{Navigation}}

  * From left to right, "[[Yosenju Shinchu L]]", "[[Yosenju Kama 2]]", "[[Yosenju Kama 1]]", "[[Yosenju Kama 3]]" and "[[Yosenju Shinchu R]]" appear in this card's artwork.
  * The structure in this card's artwork appears in the artworks of "[[Dizzying Winds of Yosen Village]]" and "[[Yosenju Wind Worship]]".
  * In the anime, "Yosen Counters" appear as lit candles.
  * This card's effects are very similar to those of "[[Gateway of the Six]]".
