title: Card Trivia:Chaos Hunter
wikitext: |-
  {{Navigation}}

  * This card was specifically designed to counter [[Chaos]] Decks, which focus heavily on [[banish]]ing cards.
  * This card and "[[G.B. Hunter]]" are both female monsters with "Hunter" in their names, whose main functions are countering certain Decks, Chaos and [[Gladiator Beast]], respectively.
  ** "[[Vampire Hunter]]" is very similar to both cards in terms of name and function, the only difference being that "Vampire Hunter" is a male.
  *** This card and "Vampire Hunter" also use whips as their weapons.
