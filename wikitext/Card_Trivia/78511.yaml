title: Card Trivia:Treeborn Frog
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[D.3.S. Frog]]", "[[Froggy Forcefield]]", and "[[Two Toads with One Sting]]".
  * This monster's Japanese name, "Yomi Frog" ({{Ruby|黄|よ}}{{Ruby|泉|み}}ガエル, ''Yomigaeru'') is a portmanteau on the Japanese words "''yomigaeru''" (蘇る, lit. "return to life"), "''yomi''" (陰府, lit. "underworld"), and "''maeru''" (かえる, lit. "frog").
  ** This monster's English name is a portmanteau of "tree" and "reborn".
  ** This monster's naming Japanese and English naming schemes reflect its effect to [[Special Summon]] itself from the [[Graveyard]]. 
  * This monster's design features a bandage under its chin, possibly implying that it was caught on a [[wikipedia:fish hook|fishing hook]], which led to it sporting angelic wings and a halo.
  * This monster is likely the antithesis of "[[Swap Frog]]", as both monsters' designs are based on the denizens of [[wikipedia:Heaven|Heaven]] and [[wikipedia:Hell|Hell]]. This monster's design features a halo and wings, which are associated with angels, while the red devil horns and Japanese name of "Swap Frog" is associated with demons.
  ** Also, both monsters feature opposing effects, as this monster can be Special Summoned from the Graveyard, while "Swap Frog" can [[send]] an [[Aqua]] monster to the Graveyard when Summoned.
  * The ''[[TCG]]'' [http://www.yugioh-card.com/ygo_cms/ygo/all/uploads/Updated-Card-Names-French.pdf Mise à jour des textes de cartes] document, [http://www.yugioh-card.com/ygo_cms/ygo/all/uploads/Updated-Card-Names-Italian.pdf Aggiornamenti testo carte - Italian] document, and [http://www.yugioh-card.com/ygo_cms/ygo/all/uploads/Updated-Card-Names-Spanish.pdf Textos de Carta Actualizados] document each did not add this monster until May 9, 2017; however, the respective French, Italian, and Spanish lores they provide are adapted from the ''[[Battle Pack 2: War of the Giants]]'' lore in those languages rather than their then-most recent lores from ''[[Duelist Saga]]'' (released March 30, 2017).
