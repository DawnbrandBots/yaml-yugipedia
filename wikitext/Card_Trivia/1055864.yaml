  * The Simplified Chinese name was likely mistakenly altered by replacing Chinese characters with pinyin. Its ''[[Master Duel]]'' name is rendered properly as "涂鸦本 - 挡道".<ref>[https://nga.178.com/read.php?tid=38962705&rand=132]</ref> Unlikely for the "[[Doodle Beast]]," only the archetype name was maintained for this card.

