title: Card Trivia:Melffy Pinny
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Excited Melffys]]" and "[[Merry Melffys]]".
  * This monster's Japanese name (ラッシィ, ''Rasshī''), is derived from the Japanese word for "seal" (アザラシ, ''azarashi'').
  ** This monster's English name is derived from ''[[wikipedia:Pinniped|Pinnipedia]]'', the natural group that seals belong to.
