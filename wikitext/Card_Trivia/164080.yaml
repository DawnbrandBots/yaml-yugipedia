title: Card Trivia:Orient Dragon
wikitext: |-
  {{Navigation}}

  * This monster is probably based on a Chinese dragon called the "Ying Long" (應龍 or 应龙) which does have wings. Its head resembles Barong, a myth creature from Balinese lore.
  * This card was the first [[Synchro Monster]] released in the [[TCG]] during the ''[[Yu-Gi-Oh! ZEXAL|ZEXAL]]'' era.
