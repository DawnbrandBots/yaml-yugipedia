title: Card Trivia:Mathmech Superfactorial
wikitext: |-
  {{Navigation}}

  * "[[Mathmech Division]]", "[[Mathmech Multiplication|Multiplication]]", and "[[Mathmech Nabla|Nabla]]" appear in this card's artwork.
  ** This card's artwork shows the creation of "[[Primathmech Laplacian]]", whose appearance is a combination of the three aforementioned monsters.
  * In [[wikipedia:Mathematics|mathematics]], a [[wikipedia:Factorial|superfactorial]] is the [[wikipedia:Product (mathematics)|product]] of the first n [[wikipedia:Factorial|factorials]].
  ** This is a reference to this card's effect, allowing the player to [[Special Summon]] up to 3 "[[Mathmech]]" monsters and then combine them into a "Mathmech" [[Synchro Monster|Synchro]] or [[Xyz Monster]].
