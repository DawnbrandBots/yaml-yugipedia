title: Card Trivia:Elemental HERO Wild Wingman
wikitext: |-
  {{Navigation}}

  * This card has an "[[Evil HERO]]" [[counterpart]]: "[[Evil HERO Wild Cyclone]]".
  ** Both have the same [[Attribute]], [[Level]], [[ATK]], and [[DEF]].
  ** Both have the word "Wild" in their name.
  ** Both require "[[Elemental HERO Avian]]" and "[[Elemental HERO Wildheart]]" as [[Fusion Material]]s.
  *** This card lists "Wildheart" as its first material and "Avian" as its second material, while "Evil HERO Wild Cyclone" lists them in the opposite order.
  ** Both have an effect to destroy [[Spell]]/[[Trap Card]]s; "Wild Cyclone" can also prevent the opponent from activating them.
