title: Card Trivia:Potatoman
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster, "[[Carrotman]]" and "[[Onionman]]" each make a shape with their gloved hands, resembling the shapes used in the game of [[rock-paper-scissors]]; in this monster's case, it is making the rock shape.
  ** The members of the "[[Geargiano (archetype)|Geargiano]]" [[archetype]] also use the same shapes in their respective artworks, with the paper shape being used by "[[Geargiano]]".
