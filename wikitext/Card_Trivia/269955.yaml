title: Card Trivia:Shapesister
wikitext: |-
  {{Navigation}}

  * This is the first [[Level]] 2 [[Trap Monster]], as well as the first Trap Monster that is also a [[Tuner monster]]. It is also the only Trap Monster that can be [[activate]]d only once per turn.
  * This card's name is a portmanteau of "shape shifter" and "sister", referencing this card's feminine, amorphous appearance.
