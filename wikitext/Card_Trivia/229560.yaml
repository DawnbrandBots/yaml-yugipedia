title: Card Trivia:Double Shark
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Aqua Mirage]]".
  * This monster's design appears to be two different sharks fused together at their bellies.
  ** This monster is similar to "[[Double Fin Shark]]" in terms of naming schemes and the appearance of two separate sharks fused together into one.
  * This card has a counterpart: "[[Spear Shark]]".
  ** Both monsters are depicted with mirrored poses in their card artworks.
  ** Both cards' ''[[OCG]]''/''[[TCG]]'' [[Level]]-manipulation effects are the exact opposite of each other; in this card's case, it decreases Levels.
