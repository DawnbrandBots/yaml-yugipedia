title: Card Trivia:Cyberdark Invasion
wikitext: |-
  {{Navigation}}

  * "[[Cyberdark Dragon]]" and "[[Red-Eyes Black Dragon]]" appear in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|GX|089|ref}} where [[Zane Truesdale]] [[equip]]ped his "[[Cyberdark Dragon (anime)|Cyberdark Dragon]]" with "[[Red-Eyes B. Dragon (later anime)|Red-Eyes Black Dragon]]" from [[Atticus Rhodes]]' [[Graveyard]].
  ** This card's effect also references how the "[[Cyberdark]]" monsters were able to equip monsters to themselves from either [[Graveyard]] in the anime.
