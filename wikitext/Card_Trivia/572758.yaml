title: Card Trivia:Predaplant Spider Orchid
wikitext: |-
  {{Navigation}}

  * This monster is a combination of the [[wikipedia:Dracula (plant)|Dracula orchid]] and the [[wikipedia:Spider|spider]].
  ** This monster also resembles the [[Wikipedia:Facehugger|Xenomorph Facehugger]] from the ''[[Wikipedia:Alien (franchise)|Alien]]'' franchise, as both are yellow, have eight legs, a mouth-like organ in the centre of their body, and a tail-like appendage.
  * This is the first "[[Predaplant]]" [[Pendulum Monster]].
