title: Card Trivia:Light Leading the Valiant
wikitext: |-
  {{Navigation}}

  * This monster's name and design is a reference to ''[[wikipedia:Liberty Leading the People|Liberty Leading the People]]'', a painting by the French artist [[wikipedia:Eugène Delacroix|Eugène Delacroix]], referencing how the [[Yu-Gi-Oh! World Championship 2025|''Yu-Gi-Oh!'' World Championship 2025]] was held in [[wikipedia:Paris|Paris]], [[wikipedia:France|France]].
