title: Card Trivia:Legacy of Yata-Garasu
wikitext: |-
  {{Navigation}}

  * "[[Yata-Garasu]]" and "[[Orb of Yasaka]]" appear in this card's artwork.
  * This card's ''OCG'' name "Corpse of Yata-Garasu" is a reference to how this card was first released in the ''[[Premium Pack 6]]'' on March 11, 2004, just 10 days after "Yata-Garasu" became [[Forbidden]] in the ''OCG'' on March 1.
  * In German video games this card is called "Leiche von Yata-Garasu", while it is called "Vermächtnis von Yata-Garasu" when released in ''[[Premium Pack (TCG)|Premium Pack]]''. "Leiche" means "corpse" and "Vermächtnis" means "legacy".
