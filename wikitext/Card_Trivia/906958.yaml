title: Card Trivia:Prediction Princess Tarotreith
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Underworld Ritual of Prediction]]".
  * This monster's name is a portmanteau of "[[wikipedia:Tarot|tarot]]" (the type of card used in [[wikipedia:Divination|divination]]), the Japanese word for "spirit" (霊, ''rei''), and "[[wikipedia:Wraith|wraith]]" (an alternate traditional term for "ghost" or "spirit").
  * This monster has a [[LIGHT]] counterpart: "[[Prediction Princess Tarotrei]]".
  ** This monster's [[original ATK and DEF]] (2700/1200) is an inverse of the original [[ATK]] and [[DEF]] (1200/2700) of "Tarotreith".
  * This is the first [[Flip Monster|Flip]] [[Ritual Monster]].
