title: Card Trivia:Legendary Six Samurai - Shinai
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Six Strike - Double Assault]]".
  * This monster is wielding two ''[[wikipedia:Kanabō|kanabō]]''.
  * This monster is the younger form of "[[Spirit of the Six Samurai]]", as said by [[Master Guide 3 card storylines#Legendary Six Samurai - Shinai|Master Guide 3 card storylines]].
  ** Both monsters also have the same armor, [[Type]], [[Level]], and [[ATK]]/[[DEF]] that differ of 1000.
  * This monster's name, "Shinai", can be read as "Doesn't die", with Shi as 'death' and Nai as 'not', which could either refer to his persisting on after death as [[Spirit of the Six Samurai]] or intended to be read ironically, as he is dead by the time of the main Six Samurai.
  * This monster is the husband of "[[Legendary Six Samurai - Mizuho]]".
  ** Both cards' artworks depict two halves of the symbol of the "[[Six Samurai]]" monsters that complement each other.
  ** Their effects can work in conjunction with each other.
  ** Both wear the same necklace, with the string of each corresponding to the color of their spouse's armor.
  *** Both "[[Shadow of the Six Samurai - Shien]]" and "[[Secret Six Samurai - Hatsume]]" wear a necklace identical to this monster's one, hinting at some relation between all three of them.
