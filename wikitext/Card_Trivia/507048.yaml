title: Card Trivia:Bacchus the Dizzy Deity
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Bacchus Banquet]]".
  * This monster is based on [[wikipedia:Bacchus|Bacchus]], the god of wine in Roman mythology.
  * This monster's effect, which allows itself to gain 300 [[ATK]] during the player's [[Standby Phase]]s, is a reference to how wine becomes better over time.
