title: Card Trivia:Spright Carrot
wikitext: |-
  {{Navigation}}

  * The symbol for the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Gemini (constellation)|Gemini]] (♊︎︎) appears on this monster's outfit.
  * This monster is named after [[wikipedia:Sprite (lightning)|carrot sprites]], a column sprite with long tendrils.
