title: Card Trivia:Sonic Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Fellowship]]".
  * This monster has three [[counterpart]]s, whose names are synonymous to the word "speed": "[[Dash Warrior]]", "[[Rapid Warrior]]", and "[[Speed Warrior]]".
  * This monster has a retrained counterpart: "[[Assault Sonic Warrior]]"
  * This is the last non-[[Tuner monster]] to be used as [[Synchro Material]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
