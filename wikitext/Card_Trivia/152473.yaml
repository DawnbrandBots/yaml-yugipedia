title: Card Trivia:Fenrir the Nordic Wolf
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Fenrir|Fenrir]], the monstrous wolf son of [[wikipedia:Loki|Loki]] and [[wikipedia:Angrboða|Angrboða]] in [[wikipedia:Norse mythology|Norse mythology]] who was prophesied to kill the chief Norse god Odin during Ragnarök. The other gods considered Fenrir too dangerous to roam free, and so bound him with Gleipnir, an unbreakable chain forged by the dwarves.
  ** This monster's effect to [[Special Summon]] itself to the opponent's field in [[Defense Position]] is based on the use of Gleipnir to bind and pacify Fenrir. Its effect that changes all the controller's Defense Position monsters they control to face-up [[Attack Position]] is a reference to Fenrir breaking free of Gleipnir and killing Odin, which heralds the coming of Ragnarök.
  ** This monster's appearance in the ''[[Yu-Gi-Oh! 5D's]]'' anime further references this folklore:
  *** During [[Yusei Fudo]]'s [[Turbo Duel]] against [[Halldor]] in [[Yu-Gi-Oh! 5D's - Episode 129|episode 129]], Halldor adds [[Fenrir the Nordic Wolf (anime)|this card]] from his [[Deck]] to his [[hand]] using "[[Gleipnir, the Fetters of Fenrir (anime)|Gleipnir, the Fetters of Fenrir]]", then Special Summons both this monster and "[[Jormungardr the Nordic Serpent (anime)|Jormungardr the Nordic Serpent]]" to Yusei's field, intending to use the effect of this card that switches all monsters on Yusei's field to Attack Position to inflict 3000 damage through the effect of "Jormungardr".
  *** Ironically, in the same episode, Yusei turns the tables by using "[[Speed Spell - Star Force (anime)|Speed Spell - Star Force]]" to [[Tribute]] this card, increase the [[ATK]] of "[[Shooting Star Dragon (anime)|Shooting Star Dragon]]" to 4300, and use the effect of "Shooting Star Dragon" to make an extra attack for each [[Tuner monster]] [[excavate]]d. "Shooting Star Dragon" gains three attacks from this effect, and attacks and destroys all three of Halldor's "[[Aesir]]" monsters: "[[Odin, Father of the Aesir (anime)|Odin, Father of the Aesir]]", "[[Thor, Lord of the Aesir (anime)|Thor, Lord of the Aesir]]" and "[[Loki, Lord of the Aesir (anime)|Loki, Lord of the Aesir]]".
  * This monster has the highest [[original DEF]] (4000) of all [[Beast]] monsters, and the highest original ATK and DEF (4000) of all "[[Nordic]]" monsters.
  * This card's Portuguese name has the word "Wolf" mistranslated as "Lo'''g'''o", instead of the correct word "Lo'''b'''o".
