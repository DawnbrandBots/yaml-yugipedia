title: Card Trivia:Borrelsword Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]'' and ''[[Mega Pack 02]]''.
  * This monster appears in the artworks of "[[Bayonet Punisher]]", "[[Borrel Half Replace]]", and "[[Triple Borrel Launch]]".
  * This monster has two [[counterparts]]: "[[Borreload Dragon]]" and "[[Borrelguard Dragon]]".
