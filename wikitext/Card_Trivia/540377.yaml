title: Card Trivia:Valkyrie Brunhilde
wikitext: |-
  {{Navigation}}

  * In Norse mythology, [[wikipedia:Brunhild|Brunhild]] was a [[wikipedia:Shield-maiden|shield-maiden]] and a [[wikipedia:Valkyrie|valkyrie]] who appears in the ''[[wikipedia:Nibelungenlied|Nibelungenlied]]'' under the name Brünnhilde. She also appears in [[wikipedia:Richard Wagner|Richard Wagner]]'s opera cycle ''[[wikipedia:Der Ring des Nibelungen|Der Ring des Nibelungen]]'', which is partly based on the ''Nibelungenlied''.
  * This card is one of the [[cover card]]s of ''[[Shadows in Valhalla]]''.
