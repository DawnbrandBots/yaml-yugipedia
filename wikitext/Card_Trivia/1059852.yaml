title: Card Trivia:Transamvelg Linac
wikitext: |-
  {{Navigation}}

  * The black hole from the artwork of "[[Voidvelg Requiem]]" appears in this card's artwork.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Transam Linac]]", fused with "Voidvelg Requiem".
  ** This monster represents the bond between [[Yudias Velgear]] and [[Zuwijo Zwil Velgear]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * This monster's pose is similar to that of "[[Black Luster Soldier]]".
  ** Fittingly, this monster is a Fusion of a [[LIGHT]] [[Attribute]] monster and a [[DARK]] Attribute monster, similar to how "Black Luster Soldier" is a "[[Chaos (archetype)|Chaos]]" monster, whereas the [[archetype]] is centered around LIGHT and DARK monsters.
