title: Card Trivia:Mikazukinoyaiba
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is the Japanese word for "Blade of the Crescent Moon" (三日月の刃 ''Mikazuki no Yaiba'').
  ** This monster's name is based on the trend established near the beginning of the card release of ''[[Yu-Gi-Oh!]]'', where cards that had English (katakana) names in the ''[[OCG]]'' ("Crescent Dragon") were given Japanese translated names in the ''TCG'' ("Mikazukinoyaiba").
  * This monster has a [[retrained]] counterpart: "[[Mikazukinoyaiba, the Moon Fang Dragon]]".
