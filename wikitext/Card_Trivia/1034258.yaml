title: Card Trivia:Tenpai Dragon Fadra
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''fācái'' tile (發財 / 发财), a [[wikipedia:Mahjong|mahjong]] tile written with the characters meaning "to find wealth" or "to get rich". It is also known as the "green dragon" tile.
  ** This monster's Japanese name, "Fadora" (ファドラ, ''Fadora''), is a portmanteau of the words used for the ''fā'' tile (ファ, ''fa'') and the shortened word for "dragon" ('''ドラ'''ゴン, '''''dora'''gon'').
  * This monster has an upgraded "[[Sangen]]" [[Synchro Monster]] form combined with "[[Tenpai Dragon Chundra]]" and "[[Tenpai Dragon Paidra]]": "[[Sangenpai Transcendent Dragion]]".
