title: Card Trivia:Chronomaly Acambaro Figures
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Acámbaro figures|Acámbaro figures]], a series of 33,000 small ceramic figurines allegedly found by Waldemar Julsrud in July 1944, in the Mexican city of [[wikipedia:Acámbaro|Acámbaro]], [[wikipedia:Guanajuato|Guanajuato]]. The figurines are said by some to resemble dinosaurs and are sometimes cited as anachronisms.
