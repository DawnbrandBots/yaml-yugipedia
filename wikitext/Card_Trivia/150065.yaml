title: Card Trivia:Meklord Army of Wisel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Meklord Astro the Eradicator]]".
  * This monster is the "[[Meklord Army]]" [[counterpart]] of "[[Meklord Emperor Wisel]]".
  ** This monster's effect references the effect of "[[Wisel Attack 3]]" and "[[Wisel Attack 5]]", both of which features an effect that inflicts [[piercing]] [[battle damage]].
  * This monster's left arm is very similar to that of "[[Meklord Astro Mekanikle]]".
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster attacks, its beam saber makes the same noise as a lightsaber from the ''Star Wars'' series.
  * Similar to its "[[Meklord Army of Granel|Granel]]" and "[[Meklord Army of Skiel|Skiel]]" counterparts, this monster's ''[[TCG]]'' name indicates a plural, similar to that of "[[Royal Firestorm Guards]]"; however, this card's artwork and the ''Yu-Gi-Oh! 5D's'' anime depicts only one monster.
