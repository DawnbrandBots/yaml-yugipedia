title: Card Trivia:Metalfoes Steelen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragonic Diagram]]" and "[[Metalfoes Counter]]".
  * This monster's name is based on [[wikipedia:Steel|steel]], an alloy of [[wikipedia:Iron|iron]] and [[wikipedia:Carbon|carbon]] which features improved strength and fracture resistance compared to other forms of iron.
  * This monster has a [[Fusion Monster|Fusion]] [[counterpart]]: "[[Metalfoes Adamante]]".
  * This is the first and currently only [[Normal Monster]] whose [[flavor text]] is a [[Summon chant]].
