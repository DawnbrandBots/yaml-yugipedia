title: Card Trivia:Blackwing - Twin Shadow
wikitext: |-
  {{Navigation}}

  * "[[Blackwing - Bora the Spear]]" and "[[Blackwing - Kochi the Daybreak]]" appear in this card's artwork.
  ** This card's artwork and effect are based on a scene from ''Yu-Gi-Oh! 5D's'' - Episode 094: "[[Yu-Gi-Oh! 5D's - Episode 094|Keeping a Promise, Part 1]]", where [[Crow Hogan]] uses "[[Blackwing - Bora the Spear (anime)|Blackwing - Bora the Spear]]" and "[[Blackwing - Kochi the Daybreak (anime)|Blackwing - Kochi the Daybreak]]" to [[Synchro Summon]] "[[Black-Winged Dragon]]".
