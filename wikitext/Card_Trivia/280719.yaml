title: Card Trivia:Ghostrick Yeti
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Break]]", "[[Ghostrick Festival]]", "[[Ghostrick Renovation]]", "[[Ghostrick Shot]]", and "[[Link Hole]]".
  * The doll this monster is holding appears in also held by "[[Ghostrick Yuki-onna]]".
  * This monster is based on the [[wikipedia:Yeti|Yeti]], a mythological ape-like creature who inhabits the [[wikipedia:Himalayas|Himalayan mountain range]].
