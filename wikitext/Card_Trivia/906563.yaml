title: Card Trivia:Elemental HERO Solid Soldier
wikitext: |-
  {{Navigation}}

  * This monster has a [[WATER]] counterpart: "[[Elemental HERO Liquid Soldier]]".
  ** Both monsters are named after two of the three [[wikipedia:State of matter|states of matter]], with this monster being based on solids, and "Liquid Soldier" being based on liquid.
  ** Both monsters share the effect to [[Special Summon]] a [[Level 4]] or lower "[[HERO]]" monster when they are [[Normal Summon]]ed.
