title: Card Trivia:Echeclus the Star Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Evil Star Beacon]]".
  ** The text of "[[Nessus the Star Knight]]" mentions that "Echeclus" is his mentor; the artwork of "Beacon" depicts "Nessus" following "Echeclus".
  * This monster is named after Echeclus, a [[wikipedia:Centaur|centaur]] in Greek mythology.
