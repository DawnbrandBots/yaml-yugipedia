title: Card Trivia:Attack Pheromones
wikitext: |-
  {{Navigation}}

  * "[[Vennominaga the Deity of Poisonous Snakes]]" and "[[Warrior Dai Grepher]]" appear in this card's artwork.
  * This card's effect and artwork likely reference the manga and anime effect of "[[Shadow of Eyes]]", as it switched monsters of the "male sex" into [[Attack Position]] and compelled them to attack that turn, if able. Fittingly, "Dai Grepher", a masculine warrior, is under the effect of this card and "Venominaga", a feminine-esque monster is volleying the titular "attack pheromones" to entice "Dai Grepher" to attack it.
