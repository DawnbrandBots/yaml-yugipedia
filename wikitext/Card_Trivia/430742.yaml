title: Card Trivia:Flower Cardian Lightflare
wikitext: |-
  {{Navigation}}

  * This monster is based on ''Gokō'', a card combination in the ''[[wikipedia:Hanafuda|hanafuda]]'' card game, ''[[wikipedia:Koi-Koi|Koi-Koi]]'', that uses all five ''hikari'' cards: "Cherry Blossom with Curtain", "Paulownia with Chinese phoenix", "Pine with Crane", "Willow with [[wikipedia:Ono no Michikaze|Ono no Michikaze]]", and "Zebra Grass with Full Moon".
  ** Images associated with the ''hikari'' cards (clockwise from top left: the willow suit, full moon, Chinese phoenix, cherry blossoms and curtain, and pine suit) appear in the background of this card's artwork.
  ** Fittingly, in {{episode|ARC-V|069|ref}}, this monster was [[Synchro Summon]]ed using "[[Flower Cardian Cherry Blossom with Curtain (anime)|Flower Cardian Cherry Blossom with Curtain]]", "[[Flower Cardian Paulownia with Phoenix (anime)|Flower Cardian Paulownia with Phoenix]]", "[[Flower Cardian Pine with Crane (anime)|Flower Cardian Pine with Crane]]", [[Flower Cardian Willow with Calligrapher (anime)|Flower Cardian Willow with Calligrapher]]", and "[[Flower Cardian Zebra Grass with Moon (anime)|Flower Cardian Zebra Grass with Moon]]" as [[Synchro Material]]s, each representing one of the five ''hikari'' cards.
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  * This is the first Synchro Monster to require exactly 4 non-[[Tuner monster]]s for its Synchro Summon, and as such, the first Synchro Monster to specifically require 5 Synchro Materials.
