title: Card Trivia:Evigishki Tetrogre
wikitext: |-
  {{Navigation}}

  * Visually, this [[monster]] resembles a combination of "[[Vylon Tetra]]" and "[[Gishki Noellia]]".
  ** In the [[Master Guide 3 card storylines#Those Who Were Given Power|Master Guide 3 card storylines]], "Noellia" merges with "Tetra" and forms this monster in order to fight the "[[Steelswarm]]".
  ** This card is a [[Level 6 Monster Cards|Level 6]] monster, and the combined [[Level]]s of "Gishki Noellia" and "Vylon Tetra" are 6; their combined [[ATK]] is 2600, the same as the [[original ATK]] of this card.
  ** The head of "Vylon Tetra" can be seen on the chest armor of "Evigishki Tetrogre", and the hair of "Gishki Noellia" can be seen on its head.
  * The crest of "[[Gishki Aquamirror]]" can be seen in the background of this card's artwork.
  * This card has the highest [[ATK]] of all Level 6 or lower [[Ritual Monster]]s, as well as being tied for the second-highest ATK of any Level 6 monster.
  * This is the only "[[Evigishki]]" monster that has the effect of sending cards to the [[Graveyard]]; the others focus on shuffling cards into the [[Deck]], or looking at the opponent's hand.
