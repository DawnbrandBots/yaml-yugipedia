title: 'Card Trivia:Number C103: Ragnafinity'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Chaos Hundred Universe]]" and "[[Duo of the Seven Emperors]]".
  * This monster is the [[Ranked-Up]] "[[Number C10X]]" form of "[[Number 103: Ragnazero]]".
  ** Similar to "Ragnazero", this monster's name is a portmanteau of "[[wikipedia:Ragnarok|Ragnarok]]" and "infinity".
  *** Ragnarok is a foretold series of impending events in [[wikipedia:Norse mythology|Norse mythology]], including a great battle in which numerous great Norse mythological figures will perish. This reflects how. in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, Marin sacrificed herself to summon the ocean goddess [[Number 94: Crystalzero (character)|Crystalzero]] to purify the rampaging ocean deity [[Abyss (character)|Abyss]] from [[Vector]]'s control.
  **** This monster's Japanese title, "Funerary Sub-Zero Maiden" (神葬零嬢 ''Shinsōreijō''), is both a reference to Ragnarok and a play on the Japanese phrase "''shinsō no reijō''", a term used for a woman born into a high-ranking family and raised with great care. This references Marin's past life as the princess of the [[United Lands of the Poseidon Ocean]].
  *** Infinity is the opposite of zero, which is often used to describe [[wikipedia:Absolute zero|absolute zero]], the lowest theoretical temperature where an atom's movements stops and matter solidifies at 0 [[wikipedia:Kelvin|kelvin]].
  * This is the first [[Fairy]] "[[Number C]]" monster.
  * This monster is related to "[[Number C101: Silent Honor DARK]]".
  ** Both are used by Marin and [[Reginald Kastle|Nash]], who are fraternal twins in the anime.
  ** Both share the same [[Attribute]] ([[WATER]]), [[Rank]] (5), [[original ATK]] (2800), and effects to [[Special Summon]] itself from the [[Graveyard]].
  ** Both share the same anime effect to Special Summon their base "[[Number 10X]]" forms from the Graveyard.
