title: Card Trivia:Performapal Ignition Eagle
wikitext: |-
  {{Navigation}}

  * This is one of the final [[Pendulum Monster]]s to be [[Pendulum Summon]]ed in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, along with "[[Odd-Eyes Venom Dragon]]", "[[Odd-Eyes Wing Dragon]]" and "[[Performapal Odd-Eyes Seer]]".
  ** This is also the final Pendulum Monster to be [[Set]] in a [[Pendulum Zone]], as well as the final Pendulum Monster to have its [[Pendulum Effect]] [[activate]]d in the anime.
