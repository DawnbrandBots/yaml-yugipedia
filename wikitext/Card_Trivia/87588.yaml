title: Card Trivia:Aztekipede, the Worm Warrior
wikitext: |-
  {{Navigation}}

  * This monster is a weaker version of "[[Doom Dozer]]".
  * This monster's design features an Aztec-style pattern design on its back with protruding pointed duds, similar to those of "[[Anteatereatingant]]", "[[Chainsaw Insect]]", "Doom Dozer", and "[[Saber Beetle]]".
