title: Card Trivia:Cairngorgon, Antiluminescent Knight
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the artwork of "[[Shaddoll Core]]".
  * The jewel in this monster's chest appears in the artwork of "[[El Shaddoll Winda]]", in the staff of the puppet version of "[[Winda, Priestess of Gusto]]", and on the backplate of "[[Shaddoll Squamata]]".
  * The yellow mist emerging from this monster's head appears to be a larval form of "[[Shaddoll Core]]".
  ** This monster has a transformed version, turned by the mist: "[[El Shaddoll Grysta]]".
  * This card is named after [[wikipedia:Smoky quartz|cairngorm]], a variety of smoky quartz crystal found in the [[wikipedia:Cairn Gorm|Cairn Gorm]] Mountains of Scotland.
  ** The mist emerging from this monster's head may also be based on the "smoky quartz" as well.
  * This monster is a corrupted form of "[[Gem-Knight Crystal]]", whose fusion powers went into overdrive and was later corrupted.
  ** This card has the same [[ATK]]/[[DEF]] as those of "Gem-Knight Crystal".
  ** The design of "Cairngorgon" is an amalgamation of "Gem-Knight Crystal", "[[Gem-Knight Master Diamond]]", and "[[Gem-Knight Zirconia]]".
  *** The helmet belongs to "Crystal" with the left horn of "Master Diamond" grafted on it; the right eye of "[[Gem-Knight Prismaura]]" is visible behind the damaged faceplate.
  *** The breastplate is an amalgam of the breastplates of "Crystal" and "Master Diamond", while the cape is a tattered amalgam of the capes of "Master Diamond" and "Zirconia"; the faulds are a combination of the faulds of "Master Diamond" and "Zirconia".
  *** The right arm belongs to "Zirconia" with the vambrace of "Crystal" grafted on it; the right pauldron belongs to "Crystal".
  *** The left arm and left pauldron belong to "Master Diamond".
  *** The right leg belongs to "Crystal"; the right tassets belong to "Master Diamond" with a tasset of "Crystal" grafted on it.
  *** The left leg belongs to "Master Diamond" with the tassets of "Zirconia" grafted on it; the left tasset belongs to "Crystal".
