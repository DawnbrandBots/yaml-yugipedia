title: Card Trivia:Lord British Space Fighter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[B.E.F. Zelos]]".
  * This monster has a retrained ''[[Rush Duel]]'' counterpart: "[[Super-Dimensional Lord British Space Fighter]]".
  * This monster, along with "[[Falchionβ]]", "[[Jade Knight]]", and "[[Victory Viper XX03]]" are based on the playable ships in [[Konami]]'s shoot'em up video game series, ''[[wikipedia:Gradius|Gradius]]''. These monsters' effects are designed to replicate the [[Gradius' Option|special powers]], various [[Cyclon Laser|weapons]], and [[Power Capsule|power-ups]] used by the different ships in those games.
  ** This monster is depicted using its primary weapon, the Ripple Laser, an expanding laser that hits multiple enemy targets at a wide range at once. This reflects its first two optional effects, which [[activate]]s it [[destroy]]s a monster by battle, allowing the player to destroy any number of an opponent's cards at once.
  ** Additionally, this monster's effect to [[Special Summon]] "[[Multi Token]]s" after destroying a monster by battle is based on Lord British's Option in the ''Gradius'' series, which can create up to four additional weapons by destroying the enemy ships, giving the player additional firepower.
  *** Unlike "Victory Viper XX03", whose "[[Option Token]]s" are destroyed when it leaves the [[field]], this monster's effect allows the "Multi Tokens" to remain on the field, likely referencing the gameplay mechanic of Lord British's debut in the ''Gradius'' spin-off game, ''[[wikipedia:Salamander (video game)|Salamander]]'', which allows the player to use one of the options to respawn after being destroyed by the enemy ships.
