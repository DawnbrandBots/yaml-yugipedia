title: Card Trivia:Crane Crane
wikitext: |-
  {{Navigation}}

  * This card's name and appearance are a pun based on the word "crane", which can both refer to [[wikipedia:Crane (bird)|a type of bird]] and [[wikipedia:Crane (machine)|a kind of machine]].
  ** Its effect also simulates a mechanical crane, "lifting" out a [[Level 3]] [[monster]] from the [[Summon]]ing player's [[Graveyard]].
  * This monster is depicted in the illustration that appears on the body of "[[Flower Cardian Pine with Crane]]".
