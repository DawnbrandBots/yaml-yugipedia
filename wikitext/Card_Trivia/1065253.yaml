title: Card Trivia:Performapal Sky Magician Girl
wikitext: |-
  {{Navigation}}

  * This monster is the female [[counterpart]] of "[[Performapal Sky Magician]]".
  * This monster's clothing features all four symbols of the standard playing card suits ([[Wikipedia:Clubs (suit)|Clubs]], [[Wikipedia:Diamonds (suit)|Diamonds]], [[Wikipedia:Hearts (suit)|Hearts]], and [[Wikipedia:Spades (suit)|Spades]]) in its design.
