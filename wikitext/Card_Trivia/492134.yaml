title: Card Trivia:Subterror Behemoth Voltelluric
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Subterror Cave Clash]]".
  * "[[Subterror Nemesis Archer]]", "[[Subterror Nemesis Defender]]", and "[[Subterror Nemesis Warrior]]" appear in this card's artwork.
  * This monster's English name is a portmanteau of the words "[[wikipedia:Volt|volt]]" (the unit of measurement for electricity) and "telluric" (short for "[[wikipedia:Telluric current|telluric current]]", an electrical current that flows underground).
  ** This monster's Japanese name, "Subterror Malice Voltinia", is portmanteau of "Volt" and "Sardinia" (referencing the [[wikipedia:Sea of Sardinia|Sea of Sardinia]], keeping with the [[wikipedia:Mediterranean Sea|Mediterranean Sea]] theme of the Japanese names of the "[[Subterror Behemoth]]" monsters.
  * This monster has the highest [[original DEF]] (3000) of all [[Flip monster]]s, tied with "[[Pot of The Forbidden]]".
