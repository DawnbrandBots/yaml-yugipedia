title: Card Trivia:Gingerbread House
wikitext: |-
  {{Navigation}}

  * This card is based on the gingerbread house from the fairy tale, ''[[wikipedia:Hansel and Gretel|Hansel and Gretel]]'', where the titular characters are abandoned in the woods by their parents. They come across a gingerbread house inhabited by and old witch, who wants to fatten, cook, and eat the children, but Gretel tricks her into sticking herself in the oven and locks her inside.
  ** This card's effect reflects the witch's role in the fairy tale, which is also depicted in the ''[[Yu-Gi-Oh!]]'' anime; this card can "fatten" up an opponent's monster by 600 [[ATK]], and will continue to increase is ATK until it becomes nice and plump enough after reaching at least 2500 ATK. This card's final effect can "consume" every monster that exceeds the minimum 2500 ATK amount and increases the player's [[Life Point]]s by 500 for each monster "consumed".
