title: Card Trivia:Red Zone
wikitext: |-
  {{Navigation}}

  * A burning geoglyph of "[[Red Nova Dragon]]" appears in this card's artwork.
  * This card's Japanese name, "Scar-Red Zone", is based on [[Red Nova]], a demon also known as "Scar-Red Nova" in the ''[[Yu-Gi-Oh! 5D's]]'' anime whose power is used to create "Red Nova Dragon".
  ** This card's artwork is a reference to how Red Nova is the strongest "[[Earthbound Immortal]]", who are represented by the [[Nazca Lines]] in the anime.
  ** This card's name is based on the lyrics featured in the song "[[Clear Mind (song)|Clear Mind]]", which also references the [[Blazing Soul]] power used to seal away Red Nova: ''Punch it into the Red Zone''.
