title: Card Trivia:Materiactor Meltthrough
wikitext: |-
  {{Navigation}}

  * "[[Materiactor Gigaboros]]" and "[[Prima Materiactor]]" appear in this card's artwork.
  ** This card's artwork depicts "Gigaboros" emerging from the mouth of "Prima". Fittingly, this reflects its effect to use a Level 3 [[Normal Monster]] (such as "Prima") as material to Xyz Summon a Rank 3 [[Xyz Monster]] (such as "Gigaboros").
  * This card is named after a meltthrough, a worst-case scenario in a [[wikipedia:Nuclear meltdown|nuclear meltdown]] where the [[wikipedia:Nuclear reactor core|nuclear reactor core]] melts through all the protective components.
