  * This monster appears in the artwork of "[[Penguin Brave]]".
  * The design of the characters that comprise "Penguin Brave", including this monster, appears to be based on the classes/jobs from the [[wikipedia:Dragon Quest|Dragon Quest]] games.
  * Based on concept art for "Penguin Brave", this monster is a [[wikipedia:African penguin|cape penguin]].
