title: Card Trivia:In Papa's Footsteps
wikitext: |-
  {{Navigation}}

  * The monsters in this card's artwork also appear in the artwork of "[[Let's Go Together]]".
  ** The monsters in this card's artwork are based on ''yukinko'' (雪ん子, "snow child"), a Japanese ''[[wikipedia:Yōkai|yōkai]]'' that usually resembles a small child wearing a straw coat.
  * This card's Japanese name ({{Ruby|雪|ゆき}}{{Ruby|沓|ぐつ}}の {{Ruby|跡|あと}}{{Ruby|追|お}}うひとつ またひとつ, ''Yukigutsu no Ato Ou Hitotsu Mata Hitotsu'') is in the form of ''[[wikipedia:Haiku|haiku]]'', a type of Japanese short form poetry which consists of three phrases, each containing five, seven, and five phonetic units in order.
  ** This card's effect reflects the formula of a ''haiku''; the player must [[banish]] up to '''five''' cards from their [[Graveyard]], and if the player has '''seven''' or more cards banished, then the opponent must a maximum of '''five''' cards from their Graveyard as well.
  ** This card's effect reflects the story depicted in the card name and card artwork; the opponent must "follow" in banishing their own cards after the player banishes first.
  ** The use of the word 「雪沓」 (''Yukigutsu'') acts as a ''[[wikipedia:Kigo|kigo]]'' in the ''haiku'' poem.
  ** This card's English name contains five syllables, reflecting the first phrase of a ''haiku''.
  ** This card's Korean and Simplified Chinese names are also written with five, seven, and five phonetic units in order, mirroring the structure of ''haiku''.
