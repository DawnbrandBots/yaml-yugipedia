title: Card Trivia:Flelf
wikitext: |-
  {{Navigation}}

  * This card's name is a palindrome.
  * This could be related to "[[Celtic Guardian]]" ("Elf Swordsman" in ''[[OCG]]'') in the way that "[[Gagaga Magician]]" relates to "[[Dark Magician]]", possibly referencing that [[Yuma Tsukumo]] is a successor of [[Yugi Muto]].
  * This monster is very similar in appearance to "[[Shining Elf]]".
  ** This is supported by the fact this is a Level 2 monster and "Shining Elf" is a [[Rank 2 Monster Cards|Rank 2]] [[Xyz Monster]], which makes usable for that Xyz Monster.
