title: Card Trivia:Thermal Genex
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Thermal energy|thermal energy]], the natural energy produced by heat, which causes atoms and molecules to move faster and collide with each other.
  ** Fittingly, this monster is the [[Card evolutions|upgraded]] [[Synchro Monster]] version of "[[Genex Furnace]]", whose name is based on the appliance used to circulate heat throughout a household.
  ** This monster's effect, inflicting 200 damage to the opponent for each "[[Genex]]" monster in the player's [[Graveyard]], references the harmful effects of the radiation produced by thermal energy.
  * This monster has a [[WATER]] [[counterpart]]: "[[Hydro Genex]]".
  ** Both monsters feature [[Life Point]]-manipulation effects which [[activate]] when they destroy an opponent's monster by battle.
  *** This monster inflicts damage to the opponent, while "Hydro Genex" increases the player's Life Points.
