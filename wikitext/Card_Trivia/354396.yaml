title: Card Trivia:Draghig, Malebranche of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * The Malebranche were demonic characters in Dante's The Divine Comedy who guard the fifth Bolgia of Malbolge, the Eighth Circle of Hell. They are known for their ruthless cruelty, and are responsible for the punishment of corrupt politicians by holding them under a boiling lake of pitch.
  ** Of the 12 named Malebranche, this card specifically represents the demon "[[wikipedia:Malebranche (Divine Comedy)|Draghignazzo]]", the "Big Nasty Dragon".
  ** He also appears under the name [http://castlevania.wikia.com/wiki/Draghignazzo Draghignazzo] in [[Konami]]'s Castlevania games.
