title: Card Trivia:Avenging Knight Parshath
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Shining Rebirth]]."
  * This monster is the [[Card evolutions|upgraded]] [[Synchro Monster]] form of "[[Airknight Parshath]]" and "[[Neo-Parshath, the Sky Paladin]]".
  * This is the only "[[Parshath]]" monster to not feature a [[draw]]ing effect.
  * This is the first Synchro Monster to be printed as a [[Secret Rare]].
  * When this card was released as a [[The Duelist Genesis Sneak Peek Participation Card|participation card]] for the sneak peek event of ''[[The Duelist Genesis]]'' and in the first edition of the same pack, the word "[[LIGHT]]" used to indicate its [[Attribute]] was outlined in black.
