title: Card Trivia:Forbidden Trapezohedron
wikitext: |-
  {{Navigation}}

  * This card is based on the Shining Trapezohedron, an artifact featured in [[wikipedia:H. P. Lovecraft|H. P. Lovecraft's]] short story, ''[[wikipedia:The Haunter of the Dark|The Haunter of the Dark]]'' and in [[wikipedia:Robert Bloch|Robert Bloch's]] sequel, "The Shadow from the Steeple", which is used to summon the Outer God [[wikipedia:Nyarlathotep|Nyarlathotep]].
