title: Card Trivia:Cyber Shield
wikitext: |-
  {{Navigation}}

  * The armor in this card's artwork appears in the artwork of "[[Cyber Harpie Lady]]", which is basically a "[[Harpie Lady]]" equipped with this card.
  * This card has a ''[[Rush Duel]]'' counterpart: "[[Harpie's Electro Shield]]".
  * This card's ''[[TCG]]'' release, in the ''[[Storm of Ragnarok]]'' [[booster pack]] was over eleven years later than its ''[[OCG]]'' release, as a video game promo.
