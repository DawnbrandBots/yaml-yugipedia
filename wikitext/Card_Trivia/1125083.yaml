title: Card Trivia:THE Star Ham
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on "hamster".
  * This monster resembles members of the [[Rush Duel]] "[[The]]" series, in both name and design, but is not a [[Dragon]] unlike the series' proper members.
  * This monster has a [[Fusion Monster|Fusion]] counterpart, "[[Master of Ham]]". Both are based on hamsters, with pun-filled names centered around the word "ham", and they share the [[Beast]] [[Type]].
  ** Both have effects that allows the player [[Special Summon]] a monster when they are Summoned: "Master of Ham" Summons a [[Flip monster]] from the [[hand]] or [[Deck]], while this monster Summons a [[Synchro material]] from the [[Graveyard]] and treats it as a [[Tuner monster]].
  ** Both have effects that allow them to Special Summon themselves from the Graveyard that require a two-card [[cost]]: "Master of Ham" by [[banish]]ing two Flip monsters from the [[field]] or Graveyard, and this monster by [[discard]]ing two cards from the hand. In both cases, if they are Special Summoned this way, they are banished when they leave the field.
