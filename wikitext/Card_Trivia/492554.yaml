title: Card Trivia:Treasure Panda
wikitext: |-
  {{Navigation}}

  * "[[Ojama Yellow]]" and "[[Haniwa]]" appear in this card's artwork.
  * This card's name is a play on the words "[[wikipedia:Treasure hunting|treasure hunter]]" and "[[wikipedia:Giant panda|panda]]".
  ** This is supported by the fact that the Japanese words for "hunter" and "panda" look similar to each other, as well as sounding vaguely similar:
  *** "'''ハ'''ン'''タ'''ー" (''hantā'')
  *** "'''パ'''ン'''ダ'''" (''panda'')
  * This monster is a parody of [[wikipedia:Indiana Jones (franchise)|Indiana Jones]], as its card artwork references the boulder scene from the beginning of the film ''[[wikipedia:Raiders of the Lost Ark|Raiders of the Lost Ark]]'', which also had Indiana Jones recover a golden idol.
