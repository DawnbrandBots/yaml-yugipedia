title: Card Trivia:Dark Matter Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[signature card]] of [[Yuamu Ohdo]] as the Dark Meister in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  ** This monster is essentially a [[Dark Matter]] [[counterpart]] of "[[Blue-Fang Burst Dragon]]".
  *** Both shares the same [[Level]] (7) and [[original ATK]] (2500).
  *** Both share an effect, which requires the player to [[send]] the top card of their [[Deck]] to the [[Graveyard]] and [[destroy]] an opponent's monster with a specific stat.
  * This monster has three [[Card evolutions|upgraded]] [[Contact Fusion]] forms: 
  ** With "[[Contact Dark Matter Wyvern]]": "[[Dark Matter Emperor Dragon]]"
  ** "Dark Matter Emperor Dragon" + "Contact Dark Matter Wyvern": "[[Dark Matter Galaxy Dragon]]"
  ** With "Contact Dark Matter Wyvern" and a [[Normal Monster]] (visually "[[Transam Linac]]"): "[[Dark Matter Transcend Dragon]]".
