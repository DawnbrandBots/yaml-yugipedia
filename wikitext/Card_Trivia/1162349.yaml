title: Card Trivia:Endymion Empire
wikitext: |-
  {{Navigation}}

  * This card is based on [[Endymion Castle]], a location featured in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Great Magic War|1|ref}}, specifically from the panel where Regulus looks at Endymion Castle after escaping from it.
  * This card's effect to prevent a card from being [[destroy]]ed by destroying "[[Regulus, the Prince of Endymion]]" instead is a reference to how [[Endymion (character)|Endymion]] planned to sacrifice Regulus for the sake of the Endymion Empire.
