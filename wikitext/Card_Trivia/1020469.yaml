title: Card Trivia:Keaf, Murk of the Ghoti
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Psiics, Moonlight of the Ghoti]]".
  * "Psiics, Moonlight of the Ghoti" appears in this card's artwork.
  * This monster's English name is an anagram for "[[wiktionary:fake|fake]]", in reference to it being the lure of "Psiics" and so making it a 'fake' "[[Ghoti]]" monster.
  * This monster can be considered a [[counterpart]] of "[[Paces, Light of the Ghoti]]".
  ** Both are [[Level 2]] monsters, but "Paces" is a [[Tuner monster]], while "Keaf" is not.
  ** "Paces" is titled after [[wiktionary:light|light]] while this monster is titled after [[wiktionary:murk|murk]] (which is a synonymous of [[wiktionary:dark|dark]]).
  ** This monster is [[Card Trivia:Psiics, Moonlight of the Ghoti|used by "Psiics"]] to lure "Paces", which is paradoxical considering [[Wikipedia:Anglerfish|anglerfish]] (which "Psiics" is based on) uses light to lure preys in the dark rather than the opposite.
