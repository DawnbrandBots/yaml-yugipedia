title: Card Trivia:Arkbrave Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] version of "[[Darkblaze Dragon]]".
  ** This is supported by the fact that the name "Arkbrave" is derived from the name "Darkblaze".
  ** Its [[original ATK and DEF]] (2400/2000) is equal to the [[ATK]] and [[DEF]] of "Darkblaze Dragon" via its effect when it is [[Special Summon]]ed from the [[Graveyard]].
  ** Furthermore, this monster's appearance is similar to "Darkblaze Dragon", except for a different color scheme and the extended antenna/horn on its head.
  * The tassels on the head in this artwork also appear in the artwork of "[[Divine Dragon Lord Felgrand]]".
