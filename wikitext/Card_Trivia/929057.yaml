title: Card Trivia:Sevens Road Wiz
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sevens Road Protection]]".
  * This card's artwork features seven cross-shaped symbols, referencing the "7" motif of the [[Sevens Road]] [[series]].
  ** This symbol also appears in the artwork of artworks of "[[Majesty of the Sevens Road]]" and "[[Master of the Sevens Road]]".
  *** The ordering of the symbols in the artwork of "Master of the Sevens Road" suggests that this monster corresponds to the top symbol in the Sevens Road crest (though this monster's own symbol is not visible). When "[[Master of the Sevens Road (anime)|Master of the Sevens Road]]" appears in the anime, the order of the symbols is reversed, so it instead appears to correspond to the upper left symbol.
  * This monster has a [[Celeb Rose]] [[counterpart]]: "[[Celeb Rose Wiz]]".
  ** Both monsters share the same [[Level]] (1), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (1000/0).
