title: Card Trivia:Golden Homunculus
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Homunculus|homunculus]], a humanoid being created in alchemy.
  ** This monster's name and appearance is another reference to alchemy, which is focused on the transmutation of lesser metals into gold.
  ** "Homunculus" is the Latin word for "little man", which is reflected in this monster's [[Warrior]] [[Type]] and low [[original ATK and DEF]] (1500/1500) for a [[Level 6]] monster.
