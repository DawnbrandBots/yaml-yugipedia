title: Card Trivia:Xiangsheng Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Extra Pendulum]]".
  * This monster's Japanese name, "Synthesis Magician", is based on the process of combining different parts or ideas to create a new, unified whole that is more than the sum of its parts.
  ** This monster's ''[[TCG]]'' name is derived from the ''xiāngshēng'' (相生), the creation cycle in [[wikipedia:Wuxing (Chinese philosophy)|Wuxing]], a fivefold conceptual scheme in [[wikipedia:Chinese philosophy|Chinese philosophy]] that describes how each of the five elements ([[wikipedia:Wood (wuxing)|wood]], [[wikipedia:Earth (wuxing)|earth]], [[wikipedia:Water (wuxing)|water]], [[wikipedia:Fire (wuxing)|fire]], and [[wikipedia:Metal (wuxing)|metal]]) interact with each other; in the ''xiāngshēng'', one of those elements is generated or created from the other.
  ** The above-mentioned facts reflect its [[Pendulum Effect]] to "unify" the [[Level]] of the player's monster with the Level of another monster on the [[field]]. 
  *** The above-mentioned also reflect the fact that this monster's visible eye is similar to that of [[Zuzu Boyle]] and her [[dimensional counterparts]]; this, in turn, is a reference to Zuzu's original incarnation, [[Ray Akaba]], who created the [[Four Dimensions]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster has a [[counterpart]]: "[[Xiangke Magician]]".
  * This is the first [[LIGHT]] "[[Magician]]" [[Pendulum Monster]].
  * This monster's ''[[OCG]]''/''TCG'' Pendulum Effect to make the player's [[Xyz Monster]]'s [[Rank]] become equal to the Level of their [[Level 5]] or higher monster they [[control]] is an alteration of its Pendulum Effect in the ''Yu-Gi-Oh! ARC-V'' anime, which changes the Level of a monster to the Level of another monster on the field. In the ''Yu-Gi-Oh! ARC-V'' anime, this monster's Pendulum Effect was constantly used by [[Yuya Sakaki]] to make the Level of "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]" (whose Rank is treated as a Level via the Pendulum Effect of "[[Xiangke Magician (anime)|Xiangke Magician]]") equal to that of his [[Level 7]] "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]".
