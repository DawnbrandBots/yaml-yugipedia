title: Card Trivia:Token (Joey and Red-Eyes Black Dragon)
wikitext: |-
  {{Navigation}}

  * The design of [[Joey Wheeler]] in this card's second artwork is taken from ''[[Duelist Pack: Legend Duelist]]'', while the design of "[[Red-Eyes Black Dragon]]" is taken from its third ''[[OCG]]''/second ''[[TCG]]'' artwork.
  ** The design of Joey Wheeler in this card's third artwork is taken from his Summoning cut-in/victory pose in ''Yu-Gi-Oh! Duel Links'' from the ''Dark Side of Dimensions'' world, while the design of "Red-Eyes Black Dragon" is taken from its sixth ''OCG''/fifth ''TCG'' artwork.
