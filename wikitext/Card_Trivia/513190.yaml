title: Card Trivia:Mask of Restrict
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Labyrinth of Nightmare]]'', as well as one of the cover cards of ''[[Spell of Mask]]'' and the box of ''[[Duelist Legacy Volume.3]]''.
  * The kanji (生贄封) on this mask translates to "sacrifice sealing".
