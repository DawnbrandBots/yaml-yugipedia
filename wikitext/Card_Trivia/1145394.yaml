title: Card Trivia:Highness Archfiend
wikitext: |-
  {{Navigation}}

  * A baby version of this monster appears in the artworks of "[[Archfiend Playtime]]" and "[[Archfiend Strategy]]".
  * This monster appears to be an older version of "[[Archfiend Heiress]]" and "[[Archfiend Eccentrick]]", as well as a younger one of "[[Archfiend Empress]]".
  ** Its name is phonentically similar to the English one of "Heiress", and shares the same [[Level]] (3) and [[ATK]] (1000).
  ** It additionally shares the same [[Attribute]] ([[LIGHT]]) as "Eccentrick", but has swapped ATK and [[DEF]] (1000/800 instead of 800/1000).
