title: Card Trivia:Celeb Charity
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Celeb Rose Magician]]" appears in this card's artwork.
  * This card is a [[Celeb Rose]] [[counterpart]] of "[[Graceful Charity (Rush Duel)|Graceful Charity]]", a card used by [[Yuga Ohdo]], whom this card's user, [[Yuna Goha]] is infatuated with.
  ** This is reflected in both the cadence of this card's effect ([[Draw a card|drawing cards]] and sending a card(s) from the hand to the [[Graveyard]] so the number of cards in hand are the same after activating the card as before) and in its artwork ("Celeb Rose Magician" in the same pose with the glowing card as the "Graceful Charity" Angel).
