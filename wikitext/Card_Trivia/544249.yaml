title: Card Trivia:Magical Musketeer Caspar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magical Musket - Fiendish Deal]]".
  * This monster is based on "Caspar", ''an assistant forester'', one of the main villains in the German [[wikipedia:Opera|opera]] ''[[wikipedia:Der Freischütz|Der Freischütz]]''.
  * This monster has an upgraded [[Link Monster|Link]] form: "[[Magical Musket Mastermind Caspar]]".
  * This monster's right hand is identical to that of "[[Magical Musket Mastermind Zakiel]]".
