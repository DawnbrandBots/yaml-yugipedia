title: Card Trivia:Prank-Kids Battle Butler
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Hidden Summoners]]''/''[[Hidden Summoners]]''.
  * An early, even-tempered version of this monster appears in the artworks of "[[Prank-Kids Pandemonium]]", "[[Prank-Kids Place]]", and "[[Prank-Kids Pranks]]".
  * "[[Prank-Kids Dropsies]]", "[[Prank-Kids Fansies]]", and "[[Prank-Kids Lampsies]]" appear in this card's artwork.
  * This card has the highest [[Level]] of all [[Thunder]] monsters (tied with "[[Hamon, Lord of Striking Thunder]]" and "[[Thunder Dragon Titan]]").
