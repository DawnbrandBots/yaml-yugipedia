title: Card Trivia:Offering to the Archfiend
wikitext: |-
  {{Navigation}}

  * "[[Soul Knight]]" and "[[Summoned Skull (Rush Duel)|Summoned Skull]]" appear in this card's artwork.
  ** This card's artwork and effect might be based on '''Soul Control''', a popular strategy dating back in the earlier ''[[OCG]]''/''[[TCG]]'' that involves using "[[Soul Exchange]]" (in which "Soul Knight" appears in its artwork) to get rid of an opponent's monster while easily [[Tribute Summon]]ing "[[Summoned Skull]]" (the strongest [[Level 6]] monster at the time).
  *** Soul Control Decks are still considered the most favorite strategy in the [[Yugi Muto|Yugi]]/[[Seto Kaiba|Kaiba]] Retro Format, with both characters known for using "Summoned Skull" and "Soul Exchange", respectively.
