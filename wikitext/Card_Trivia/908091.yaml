title: Card Trivia:Scareclaw Light-Heart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Scareclaw Defanging]]", "[[Scareclaw Straddle]]", "[[Tearlaments Grief]]", "[[Tearlaments Heartbeat]]", and "[[Tearlaments Metanoise]]".
  ** This monster possibly appears as a weapon in the artworks of "[[Pressured Planet Wraitsoth]]", "[[Scareclaw Decline]]", "[[Scareclaw Twinsaw]]", "[[Tearlaments Cryme]]", and "[[Tearlaments Sulliek]]".
  ** This monster likely appears in the artwork of "[[Primeval Planet Perlereino]]", as the blue meteor in the background.
  ** This card's artwork appears in the artwork of "[[Loka Samsara]]".
  * "[[Visas Starfrost]]" appears in the bottom-left corner of this card's artwork.
  * This monster is a [[Card evolutions|downgraded]] [[Link Monster|Link]] form of "[[Scareclaw Reichheart]]".
  ** "[[wiktionary:licht|Licht]]" in this card's name is the German word for "light".
  *** This could be a reference to how "[[Scareclaw Tri-Heart]]" may have been transformed into this monster by "Visas Starfrost" (which is a [[LIGHT]] monster), as the artwork of "[[Scareclaw Sclash]]" seems to depict it being dealt a decisive blow by "Visas", thereby purging the evil within its heart to form this monster as a result.
  **** Fittingly, "Visas Starfrost" can be used as a [[Link Material]] to [[Link Summon]] this card.
  *** "Licht" (ライト ''Raito'') in this card's name is also an anagram of "Tri" (トライ ''Torai'') in the name of "Scareclaw Tri-Heart".
  ** This card's name is also likely a pun on [[wikipedia:light-hearted|light-hearted]], referencing this card being a "purified" "[[Scareclaw]]" monsters, all of which are based on fears and phobias.
