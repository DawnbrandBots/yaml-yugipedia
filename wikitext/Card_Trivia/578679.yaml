title: Card Trivia:Property Flash
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The silhouette of "[[Rousing Hydradrive Monarch]]" appears in this card's artwork.
  * "Property" is a word synonymous with "[[Attribute]]", which in turn is commonly used to describe the "elemental" groups of [[Monster Card]]s.
  * This card's artwork depicts a group of four bubbles, which are colored after the corresponding Attributes: [[EARTH]] (represented by the orange bubble), [[WIND]] (represented by the green bubble), [[FIRE]] (represented by the red bubble), and [[WATER]] (represented by the blue bubble).
