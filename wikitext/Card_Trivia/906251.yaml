title: Card Trivia:Embryonic Dark Ruler
wikitext: |-
  {{Navigation}}

  * This monster is the upgraded ''[[Rush Duel]]'' counterpart of "[[Embryonic Beast]]".
  ** This card supporting [[Legend Card|Legend]] [[Fiend]] monsters references the original ''[[Yu-Gi-Oh! Duel Monsters]]'' video game, where "Embryonic Beast" can be fused with "[[Time Wizard]]" to summon "[[Summoned Skull]]", which is featured as a Legend card in ''Yu-Gi-Oh! Rush Duel''.
