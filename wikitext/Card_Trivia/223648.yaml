title: Card Trivia:Justice of Prophecy
wikitext: |-
  {{Navigation}}

  * This monster is featured in the artwork of "[[Spellbook of Fate]]".
  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Justice (Tarot card)|Justice]], the eighth or eleventh of the [[wikipedia:Major Arcana|Major Arcana]] cards depending on the deck.
  ** This monster is holding a sword in her right hand and a staff shaped like a scale in her left hand, similar to the Tarot card.
