title: Card Trivia:Dododo Warrior
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Yuma]]'' and the ''[[Zexal Collection Tin]]''.
  * This monster appears in the artworks of "[[Dodododraw]]", "[[Guard Go!]]", and "[[Onomatopia]]".
  * This monster has a ''[[Rush Duel]]'' [[Baseball]] parody: "[[Dododo Second]]".
  * This monster has a retrained [[counterpart]]: "[[Dodododo Warrior]]".
