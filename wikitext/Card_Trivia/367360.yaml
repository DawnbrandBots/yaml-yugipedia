title: Card Trivia:Mighty Angel Virch
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is based on the Virtues, a ranking of angels in the Second Order of the [[wikipedia:Christian angelic hierarchy|Christian angelic hierarchy]] who are known for their dominion over the elements and nature, as well as assisting in miracles and encouraging humans to strengthen their faith in [[wikipedia:God|God]].
