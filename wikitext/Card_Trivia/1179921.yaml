title: Card Trivia:Blue-Eyes Toon Ultimate Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Revolution Booster: Toon / Witchcrafter / Unchained]]''.
  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Blue-Eyes Ultimate Dragon]]".
  * This is the first [[Extra Deck]] monster to have an [[ability]] (being a Toon monster).
  * This monster has the highest [[Level]] (12) and [[original ATK and DEF]] (4500/3800) of all Toon monsters.
  * This monster's effect to [[banish]] a Toon monster in response to an attack is a reference to how in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], Toon monsters could retreat inside "[[Toon World (manga)|Toon World]]" to dodge the attacks of non-Toon monsters.
  ** The effect being activated during [[damage calculation]] also means it will not cause a [[replay]] despite the number of monsters on the field changing, effectively negating the attack.
