title: Card Trivia:Geargiano Mk-II
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Geargia Rampage Structure Deck]]''.
  * "Mk-II" means "mark two", meaning an upgraded version.
  ** This makes sense, as this monster appears to be an upgraded "[[Geargiano]]" with its pose mirrored and its [[ATK]] and [[DEF]] reversed.
  * This monster appears in the artworks of "[[Geargiarmor]]", "[[Geargiarsenal]]", "[[Gear Gigant X]]", "[[Geargiagear]]" "[[Geargiagear Gigant XG]]", and "[[Transmission Gear]]".
  * Each of the "[[Geargiano (archetype)|Geargiano]]" monsters makes one of the [[rock-paper-scissors]] shapes with a fist; this one makes a scissors shape.
  ** In addition, this monster is holding up 2 fingers, which could be a reference to it being the second incarnation of the monster.
