title: Card Trivia:Abyss Actor - Comic Relief
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Abyss Actors' Curtain Call]]".
  * This card's name is based on a [[wikipedia:Comic relief|comic relief]], a term used in [[wikipedia:acting|acting]] to describe a humorous character who releases emotional or other tension in the midst of serious elements in a performance.
