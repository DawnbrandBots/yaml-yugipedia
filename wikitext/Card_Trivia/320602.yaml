title: Card Trivia:Spiritual Beast Apelio
wikitext: |-
  {{Navigation}}

  * This card's name appears to be derived from アペ ''ape'' (the [[wikipedia:Ainu language|Ainu]] word for "fire") and "lion".
  * "[[Ritual Beast Ulti-Apelio]]" is the [[Fusion Monster|Fusion]] between this monster and "[[Ritual Beast Tamer Lara]]".
  * This monster appears in the artwork of "[[Ritual Beast's Bond]]".
