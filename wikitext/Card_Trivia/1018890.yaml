title: Card Trivia:Heavy Armored Train Ironwolf
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''Wolf'' locomotive of the [[wikipedia:South Devon Railway Eagle class|South Devon Railway ''Eagle'' class]] of locomotives operated in the railways of England.
  ** Fittingly, this monster's design features the image of a wolf at the nose, while the sides near the cowcatcher resemble those of a wolf's claws.
