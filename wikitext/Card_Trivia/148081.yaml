title: Card Trivia:Overmind Archfiend
wikitext: |-
  {{Navigation}}

  * This monster is an [[upgrade]]d form of "[[Thought Ruler Archfiend]]".
  ** This monster's Japanese name, "Mental Over Demon", is based on "Mental Sphere Demon", the Japanese name of "Thought Ruler Archfiend".
  ** This monster can be considered the [[DARK]] evolution of "Thought Ruler Archfiend" and the DARK counterpart of "[[Ultimate Axon Kicker]]".
