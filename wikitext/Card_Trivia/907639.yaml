title: Card Trivia:Clockwork Night
wikitext: |-
  {{Navigation}}

  * This card has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any [[Continuous Spell Card]], released over 20 years after its first appearance in the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'' anime]] on May 14, 2002.
  * This card's German name features a mistranslation; it is named "Uhrwerk-Ritter", meaning "Clockwork Knight", with the latter word having a similar pronunciation to the word "night". The correct translation of this card's name would be "Uhrwerk-Nacht".
  ** This mistake is especially confusing because there's another card with that name based on a combination of this card and "[[Robotic Knight]]", "[[Clockwork Knight]]".
