title: Card Trivia:Photon Hand (card)
wikitext: |-
  {{Navigation}}

  * "[[Numeral Hunter]]" appears in this card's artwork.
  ** This card is based on the [[Photon Hand]], a method used by [[Kite Tenjo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime to take "[[Number]]" monsters from their [[Number holder|owners]], along with their souls.
  ** This card's effect is also based on Kite's "Number" hunt, taking control of an opponent's monster. Furthermore, the effect being restricted to [[Xyz Monster]]s only if the player does not control "[[Galaxy-Eyes Photon Dragon]]" is a reference to the fact that all "Number" monsters are Xyz Monsters.

