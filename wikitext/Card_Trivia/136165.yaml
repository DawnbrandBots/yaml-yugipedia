title: Card Trivia:Steelswarm Caucastag
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[First Step Towards Infestation]]".
  * This monster is the [[cover card]] for ''[[Hidden Arsenal 5: Steelswarm Invasion]]'' and ''[[Duel Terminal - Raid of the Inverz!!]]''.
  ** This is the first non-[[Synchro Monster]] to be the cover card of a [[Hidden Arsenal|''Hidden Arsenal'']] [[booster pack]].
  * Following the evolution of each "[[Steelswarm]]" monster that at least need one [[Tribute]], "Caucastag" has 200 more [[ATK]] and 1 more [[Level]] than the previous one.
  * This card's English and Japanese name are derived from [[wikipedia:Caucasus|Caucasus]] (Kōkasasu), which is home for a species of stag beetle.
