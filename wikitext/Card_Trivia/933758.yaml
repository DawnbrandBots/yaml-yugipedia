title: Card Trivia:Battlin' Boxer Chief Second
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Cornerman|cornerman]], the personal coach and assistant (also known as a "second") who assist their fighter during a match in combat sports.
  ** This monster is depicted carrying a stool, a water bottle, a towel around its neck, and a roll of gauze tape and scissors on its sash. These are the items and tools used to treat the fighters and their injuries in between rounds of a match.
  ** This monster's effects further reference the cornerman's role in combat sports: The cornerman will enter the arena along with their fighter ([[Normal Summon]]ing a "[[Battlin' Boxer]]"), and will enter the ring at the end of a round ([[Special Summon]]ing itself and [[negate]] an opponent's monster's attack) to assist their fighter until the next round ([[banish]]ing a monster until the [[End Phase]]).
