title: Card Trivia:Earthbound Prisoner Stone Sweeper
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * This monster's name references the natural creation of [[wikipedia:Geoglyph|geoglyphs]], in which rocks and earth that cover the desert are oxidized and weathered to a deep rust color, causing a light-colored, high-contrasting sand to be exposed, creating a "negative image" design similar to a [[wikipedia:Petroglyph|petroglyph]].
  ** Fittingly, this monster is a member of the "[[Earthbound]]" [[archetype]], which consists of monsters whose designs feature dark bodies and brightly-colored high-contrasting patterns.
