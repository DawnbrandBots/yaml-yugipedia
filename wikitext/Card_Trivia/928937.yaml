title: Card Trivia:Redbeard, the Plunder Patroll Matey
wikitext: |-
  {{Navigation}}

  * This monster is possibly named after [[wikipedia:Hayreddin Barbarossa|Hayreddin Barbarossa]]. Barbarossa (Italian for "Red Beard") was an Ottoman corsair, who later became an admiral of the Ottoman Navy.
  * This monster appears in the artworks of "[[Plunder Patroll Booty]]", "[[Plunder Patroll Shipyarrrd]]", "[[Pride of the Plunder Patroll]]", and "[[Plunder Patroll Parrrty]]".
  ** The telescope emblem from "[[Emblem of the Plunder Patroll]]" appears in this card's artwork.
