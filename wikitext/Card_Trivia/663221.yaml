title: Card Trivia:Kuji-Kiri Curse
wikitext: |-
  {{Navigation}}

  * This card's name is based on ''[[wikipedia:Kuji-in|kuji-in]]'', the practice of using hand gestures used in several Japanese religions. More specifically, its name and artwork are based on the ''[[wikipedia:Kuji-in#Kuji-kiri (cutting the nine syllables)|kuji-kiri]]'', the related practice of making nine cuts, five horizontal and four vertical.
  ** The ''kuji-in'' and all of its related practices are centered around the number "9", which is reflected in the number of flames in a circle in this card's artwork, as well as its effect [[support]]ing [[Level 9]] monsters.
  * This card has different [[Level]]-based counterparts:
  ** "[[Celestial Observatory]]" (for [[Level 6]] monsters)
  ** "[[Sacred Sword of Seven Stars]]" (for [[Level 7]] monsters)
  ** "[[Trade-In]]" (for [[Level 8]] monsters)
  ** "[[Tokusano Shinkyojin]]" (for [[Level 10]] monsters)
  * This card was first revealed on the official ''[[OCG]]'' Twitter page on 09/09/2019, at 9pm [[wikipedia:Japan Standard Time|JST]]<ref>https://twitter.com/YuGiOh_OCG_INFO/status/1171030492440928257</ref>.

