title: Card Trivia:Rokket Recharger
wikitext: |-
  {{Navigation}}

  * This monster's name and design are based on a [[wikipedia:Moon clip|full moon clip]], a metal ring or plate that holds a full cylinder of ammunition together for a revolver and is used to unload and reload [[wikipedia:Revolver|revolvers]] faster than removing and loading each bullet individually, which reflects this monster's effect to [[Special Summon]] a [[DARK]] monster [[Special Summon]]ed from the [[Extra Deck]] (i.e. a "[[Borrel]]" monster) from the player's [[Graveyard]].
  ** This monster's name may also be a reference to [[wikipedia:Stripper clip|stripper clips]], also known as "charger clips" or "chargers", a type of clip designed for reloading [[Wikipedia:Magazine (firearms)|firearm magazines]]. Based on this, this monster's name may be a portmanteau of the words "revolver" or "reload" and "charger".
  * This monster appears in the artwork of "[[Borreload Liberator Dragon]]".
