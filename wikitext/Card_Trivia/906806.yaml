title: Card Trivia:Gem-Knight Lady Rose Diamond
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the artwork of "[[Scatter Fusion]]".
  * This monster's name is based on the [[wikipedia:Diamond cut|rose cut]] of a [[wikipedia:Diamond|diamond]].
  * This monster is a [[Card evolutions|downgraded]] form of "[[Gem-Knight Lady Brilliant Diamond]]".
  ** Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gem-Knight Quartz]]" and "[[Brilliant Rose]]", both of which can be used as [[Fusion Material]].
