title: Card Trivia:Maximum Six
wikitext: |-
  {{Navigation}}

  * This card's name, design, and effects are based on the number six.
  ** In the ''TCG'', it has the Roman numeral VI (6) on its chest.
  *** In the ''OCG'', it instead has the Roman number XI (11) on its chest.
  ** It has six arms.
  ** It is a [[Level 6]] monster.
  ** In the OCG, this card was first printed in [[The Valuable Book 6 promotional cards|The Valuable Book 6]].
  ** Six is the "maximum" number that can be rolled on a six-sided die, which is rolled for this card's effect.
