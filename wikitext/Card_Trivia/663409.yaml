title: Card Trivia:Exslayer
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is a [[Link Monster]] version of "[[Linkslayer]]".
  ** This monster's name features the word "Ex", which sounds similar to the English letter "X", which likely stands for "Xyz"; this reflects this monster's final effect, which [[activate]]s when an [[Xyz Monster]] is [[Xyz Summon]]ed to a zone it points to.
