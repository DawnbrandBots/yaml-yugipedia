title: Card Trivia:Thunderbeetle Highhat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Thunderbeetle Boost]]", "[[Thunderbeetle Gift]]", and "[[Thunderbeetle Storm]]".
  * This monster's name is based on a [[wikipedia:Hi-hat|hi-hat]], a pair of two foot-operated [[wikipedia:Cymbals|cymbals]] mounted on a pole, which appears on this monster's back.
