title: Card Trivia:Shien's Squire
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Brutal Beast Battle]]", "[[Dances with Beasts]]", "[[Debunk]]", "[[Hidden Springs of the Far East]]", "[[Shadow Six Samurai - Kizaru]]", and "[[The Six Shinobi]]".
  * This card is a counterpart of "[[Shien's Footsoldier]]".
  * The Japanese word '寄子'(yoriko) referred to a imitative father & son relationship between warlord & underling in ancient Japan.
