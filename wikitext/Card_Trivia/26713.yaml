title: Card Trivia:Doom Shaman
wikitext: |-
  {{Navigation}}

  * This card's effect is similar to "[[Gigaplant]]" and "[[Il Blud]]", both of which are [[Gemini monster]]s that can [[Special Summon]] monsters of a certain [[Type]] from the [[hand]] or [[Graveyard]].
  ** Unlike "Gigaplant", this card and "Il Blud" can destroy all monsters with a certain Type if they leave the [[field]].
  *** Unlike both cards, however, this card is a [[Spellcaster]] that can Special Summon [[Fiend]] monsters, while "Gigaplant" card can only Special Summon [[Plant]] and [[Insect]] monsters from the player's hand or Graveyard, and "Il Blud" can only Special Summon its fellow [[Zombie]] monsters.
