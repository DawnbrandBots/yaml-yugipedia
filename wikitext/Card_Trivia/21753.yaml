title: Card Trivia:The Big March of Animals
wikitext: |-
  {{Navigation}}

  * "[[3-Hump Lacooda]]", "[[Archfiend Marmot of Nefariousness]]", "[[Bazoo the Soul-Eater]]", "[[Behemoth the King of All Animals]]", "[[Burglar]]", "[[Dark Gray]]", "[[Des Koala]]", "[[Dig Beak]]", "[[Fusionist]]", "[[Giant Rat]]", "[[Great Bill]]", "[[Lisark]]", "[[Mystical Sheep 2|Mystical Sheep #2]]", "[[Nekogal 1|Nekogal #1]]", "[[Nimble Momonga]]", "[[Ojama King]]", "[[Rescue Cat]]", "[[Sleeping Lion]]", "[[Synchar]]", "[[Wilmee]]" and four unidentified silhouetted monsters appear in this card's artwork. The card artwork depicts the relative size between each of the featured monsters.
  ** Many of the monsters depicted also appear in the card artwork of "[[Night Before the Big March]]", which depicts the events that occur the night before the events in this card's artwork.
  ** "Synchar" and "Lisark" are the only two monsters in this card's artwork that are not yet released in the ''[[TCG]]''.
  * This card's lore continues in "[[The Big Cattle Drive]]" and "[[Cattle Call]]"
