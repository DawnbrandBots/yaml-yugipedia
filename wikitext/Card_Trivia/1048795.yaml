title: Card Trivia:Trickstar Band Drumatis
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster's name is a portmanteau of "drummer" and the "''[[wikipedia:Clematis|Clematis]]''" plant.
  ** The ''Clematis'' is a genus of multiple flower species within the buttercup family, [[wikipedia:Ranunculaceae|Ranunculaceae]], which also appears as the symbols on the corners of this card's artwork.
