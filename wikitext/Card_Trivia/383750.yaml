title: Card Trivia:U.A. Blockbacker
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Linebacker|linebacker]] in [[wikipedia:Gridiron football|North American football]], who plays an important role in their team's defensive strategy.
  ** "Blockbacker" in this card's name is a portmanteau of the terms "linebacker" and "[[wikipedia:Blocking (American football)|blocking]]", the latter term referring to legal movements a player can make to block another player's path with their body.
  ** This monster's effect reflects the [[wikipedia:Blitz (gridiron football)|blitz]] tactic in North American football, in which linebackers can be called upon to [[wikipedia:Quarterback sack|tackle]] the [[wikipedia:Quarterback|quarterback]] (reflecting the change in battle position and effect negation).
  * This monster appears in the artworks of "[[Defense Zone]]" and "[[Loss Time]]".
