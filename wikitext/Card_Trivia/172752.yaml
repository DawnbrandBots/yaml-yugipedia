title: Card Trivia:Gusto Falco
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Kamui, Hope of Gusto]]" as his familiar.
  ** An evolved form of "Gusto Falco" also appears in the artwork of "[[Daigusto Falcos]]", ridden by "Kamui".
  ** "[[Ritual Beast Ulti-Kimunfalcos]]" is another evolved form of this monster, as the new steed of "[[Spiritual Beast Tamer Winda]]".
  * This card has a [[DARK]] counterpart in the form of "[[Shaddoll Falco]]".
  * According to Master Guide 4, Gusto Falco died protecting Kamui in battle. As a token to his fallen friend, Kamui later carved the image of Falco in his staff and gave it to his daughter, [[Pilica, Descendant of Gusto]].
  * This monster appears in the artwork of "[[Ritual Beast Return]]".
