title: Card Trivia:The Big Saturn
wikitext: |-
  {{Navigation}}

  * This monster's arms appear in the artwork of "[[Replacement Parts]]".
  * This monster is based on the [[wikipedia:Saturn|Saturn]], the sixth planet in the [[wikipedia:Solar System|Solar System]].
  ** This monster's name is derived from "big", an adjective used to describe something of large size, referencing how Saturn is the second-biggest planet in the Solar System.
  ** This monster's design features a spherical main body and a ring around it, referencing how Saturn is known for having many rings orbiting around the planet.
  *** This monster's ring is also likely a reference to "[[Ring of Destruction]]", which also features an effect that inflicts damage equal to this monster's [[ATK]].
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the other [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * This is the only Legendary Planet card that has not been printed as an [[Ultra Rare|Ultra]]/[[Secret Rare]] in the ''[[TCG]]''.
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|GX|016|ref}}, specifically from the panel showing [[The Big Saturn (manga)|this monster]] attacking [[Syrus Truesdale (manga)|Syrus Truesdale]] directly, albeit with changes made to its arms.
