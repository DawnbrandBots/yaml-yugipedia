title: Card Trivia:Elemental HERO Shining Phoenix Enforcer
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Enemy of Justice]]'' and ''[[Duelist Pack: Aster Phoenix]]'', as well as one of the cover cards for ''[[Expert Edition Volume 4]]''/''[[Dark Revelation Volume 4]]''.
  * This monster is the [[Card evolutions|upgraded]] version of "[[Elemental HERO Phoenix Enforcer]]".
  * This monster is the [[FIRE]] [[counterpart]] of "[[Elemental HERO Shining Flare Wingman]]".
  ** Both share the same [[Level]] (8), [[Type]] ([[Warrior]]), and [[original ATK and DEF]] (2500/2100).
  ** Both share similar [[Fusion Material]]s, which requires "[[Elemental HERO Sparkman]]" and a specific [[Fusion Monster]] that uses "[[Elemental HERO Avian]]" and "[[Elemental HERO Burstinatrix]]" as [[material]].
  ** Both feature an effect that allows them to gain 300 [[ATK]] for each "Elemental HERO" monster in the [[Graveyard]]. 
  * This monster has a "[[Destiny HERO]]" [[counterpart]]: "[[Destiny HERO - Destroyer Phoenix Enforcer]]".
  ** Both share the same Level (8), Type (Warrior), and original ATK and DEF (2500/2100).
  ** Both can manipulate ATK based on the number of "[[HERO]]" monsters in the Graveyard: This monster gains 300 ATK for each "Elemental HERO" monster, while "Destroyer Phoenix Enforcer" decreases the opponent's monsters' ATK by 200 for each "HERO" monster.
  ** Both feature an effect that allows them to remain on the field: This monster cannot be [[destroyed by battle]], while "Destroyer Phoenix Enforcer" [[Special Summon]]s itself from the Graveyard during the next [[Standby Phase]].
