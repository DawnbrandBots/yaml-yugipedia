title: Card Trivia:Darkness Dwarf
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Dwarf star|dwarf star]], a star of relatively small size and low luminosity.
  ** This monster's name, appearance, and [[DARK]] [[Attribute]] are likely based on a [[wikipedia:Black dwarf|black dwarf]], a theoretical cooled white dwarf star which cannot emit heat or light, and thus appears black.
  * This monster has a [[Praime]] [[counterpart]]: "[[Praime Dwarf]]".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Darkness Doom Giant]]".
