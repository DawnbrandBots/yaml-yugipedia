title: Card Trivia:Rainbow Bridge of Salvation
wikitext: |-
  {{Navigation}}

  [[File:Series130.jpg|thumb|right|200|"[[Chaos Phantasm Armityle]]" and "[[Rainbow Dragon (anime)|Rainbow Dragon]]" battle.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]''.
  * "[[Armityle the Chaos Phantasm]]", "[[Rainbow Dragon]]", and "[[House of Sand]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|130|ref}}, where the attacks of "[[Rainbow Dragon (anime)|Rainbow Dragon]]" and "[[Chaos Phantasm Armityle]]" collided, creating a portal that returned [[Duel Academy]] to [[Earth (planet)|Earth]], during [[Jaden Yuki]] and [[Jesse Anderson]]'s [[Duel]] against [[Yubel (character)|Yubel]].
  *** This card's effect requirement of having at least two [[Level 10]] or higher monsters of different [[Type]]s to be on the [[field]] is also based on this scene, as "Rainbow Dragon" is a Level 10 [[Dragon]] monster, while "Armityle" is a [[Level 12]] [[Fiend]] monster.
  ** This card's name references how Jesse Anderson often said that his goal was to be a bridge between [[Duel Monster Spirit]]s and humans in the ''[[Yu-Gi-Oh! GX]]'' anime.

