title: Card Trivia:Infinitrack Road Roller
wikitext: |-
  {{Navigation}}

  * This card's overall design is a reference to [https://jojowiki.com/Dio_Brando Dio Brando] from ''[[wikipedia:JoJo's Bizarre Adventure|JoJo's Bizarre Adventure]]'' manga and anime series. Or more specifically, the famous scene where Dio attempted to crush [https://jojowiki.com/Kujo_Jotaro Kujo Jotaro] by throwing a steamroller from the air. Evident by this monster sporting the yellow-and-green color scheme, similar to Dio's.
  ** In addition, this card's 2100 [[ATK]]/[[DEF]] may be a reference to Dio's stand, "[https://jojowiki.com/The_World The World]", which is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The World (Tarot card)|The World]], the 21st trump card of the Major Arcana Tarot. This card's Level is also a reference to The World's power, which allows Dio to stop time for 5 seconds.
