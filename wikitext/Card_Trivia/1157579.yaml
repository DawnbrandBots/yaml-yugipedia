title: Card Trivia:Early Palm Gets the Win
wikitext: |-
  {{Navigation}}

  * This card's name and effect are based on 「先手必勝」(''sentehisshō'', meaning "victory goes to the one who makes the first move"), a ''[[wikipedia:Yojijukugo|yojijukugo]]'' originating from [[wikipedia:Go (game)|Go]] and [[wikipedia:Shogi|shogi]]—games in which the player going first is usually in an advantageous position and more likely to win the game.
