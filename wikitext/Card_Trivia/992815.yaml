title: Card Trivia:Altergeist Emulatelf
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of "[[wikipedia:Emulator|emulator]]" and "[[wikipedia:Elf|elf]]".
  ** An "emulator" is a hardware or software program that enables one computer system to behave like another computer system, reflecting this monster's status as a [[Trap Monster]].
  ** An "elf" is a supernatural being in [[wikipedia:Norse mythology|Norse mythology]] who is often depicted as a humanoid creature with pointed ears.
