title: Card Trivia:Bujingi Boar
wikitext: |-
  {{Navigation}}

  * This monster serves as the extra armor for "[[Bujintei Kagutsuchi]]", located on its chest, legs, and shoulders.
  * This monster is based on the ''Ikutama'', one of the ten treasures housed in Isonokami shrine. It is known as the ''Life giving Jewel'', and it is said to raise the dead.
