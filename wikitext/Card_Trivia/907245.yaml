title: Card Trivia:Wicked Acolyte Chilam Sabak
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of "[[wikipedia:Chilam Balam|Chilam]]" (a type of priest who gives prophecies in [[wikipedia:Maya civilization|Ancient Mayan civilizations]]) and "[http://www.mayavase.com/sabak/sabak.html Sabak]" (a kind of ink used for wiritings in Ancient Mayan civilizations).
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|059|ref}}, specifically from the panel showing [[Wicked Priest Chilam Sabak (manga)|this monster]] being Summoned.
