title: Card Trivia:Kashtira Shangri-Ira
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Scareclaw Decline]]".
  * "[[Primitive Planet Reichphobia]]" and "[[Pressured Planet Wraitsoth]]" appear in this card's artwork, the latter being encased within this monster.
  * This card's name is a portmanteau of "[[wikipedia:Shangri-La|Shangri-La]]", the paradise described in the 1933 novel ''[[wikipedia:Lost Horizon|Lost Horizon]]''; and "Ira", the Latin word for "wrath".
