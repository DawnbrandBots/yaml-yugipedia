title: Card Trivia:D/D/D Wise King Solomon
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Solomon|Solomon]], the king of great wisdom featured in the [[wikipedia:Old Testament|Old Testament]].
  ** The book wielded by this monster is based on the [[wikipedia:Book of Wisdom|Book of Wisdom]] written by Solomon, which covers wisdom, justice, and the nature of God.
