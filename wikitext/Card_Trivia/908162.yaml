title: Card Trivia:Defending Sweeper
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Goalkeeper (association football)|goalkeeper]], a defensive player in the sport of [[wikipedia:Association football|soccer]] whose primary role is to block the opposing team from scoring goals.
  ** This monster's name is also derived from a [[wikipedia:Sweeper (association football)|sweeper]] (also known as a ''libero''), a defensive soccer player whose primary role is to "sweep up" the ball if an opponent breaches the defensive line.
