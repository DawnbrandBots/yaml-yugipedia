title: Card Trivia:Nephthys, the Sacred Flame
wikitext: |-
  {{Navigation}}

  * This monster is a [[Card evolutions|retrained]] version of "[[Sacred Phoenix of Nephthys]]".
  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Hidden Summoners]]''/''[[Hidden Summoners]]'' and ''[[Nature Pack: Blazing Heroes]]''.
  * This monster appears in the artwork of "[[Awakening of Nephthys]]".
  * This was the first [[Link Monster]] to list a [[Ritual Monster]] as [[Link Material]].
