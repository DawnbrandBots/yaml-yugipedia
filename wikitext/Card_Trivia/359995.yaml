title: Card Trivia:Nekroz Cycle
wikitext: |-
  {{Navigation}}

  {{See also|Master Guide 5 card storylines#Cycle of the Pyroxene}}

  * "[[Dance Princess of the Nekroz]]" and the face of "[[Tohushaddoll Grysta]]" ("[[El Shaddoll Grysta]]") appear in this card's artwork.
  ** According to the lore, "Dance Princess" is trying to resurrect "[[Gem-Knight Master Diamond]]" from the remains of "Grysta".
  * This is the first [[Ritual Spell Card]] to allow a [[Ritual Summon]] from the [[Graveyard]].
