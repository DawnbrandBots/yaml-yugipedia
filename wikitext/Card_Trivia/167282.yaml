title: Card Trivia:Friller Rabca
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Frilled shark|frilled shark]], a species of shark considered to be a living fossil.
  ** The first portion of this monster's ''TCG'' name "Friller", is a portmanteau of the words "frilled" and "killer", while the second portion of the name, "Rabca", is based on the Japanese name for the frilled shark (ラブカ, ''Rabuka'').
