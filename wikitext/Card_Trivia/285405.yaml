title: Card Trivia:Winning Formula
wikitext: |-
  {{Navigation}}

  * [[ZEXAL II]] and a copy of this card appear in this card's artwork.
  * This card's name and effect requiring the player to [[declare]] "The Winning Formula is complete!" is based on [[Astral]]'s catchphrase in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This is the first [[Spell Card]] to be [[illegal]].
