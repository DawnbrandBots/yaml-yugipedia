  * This monster appears in the artwork of "[[Abysskite Ray Monochrome]]" in [[Maximum Mode]] (together with "[[Shinesteel Ultra Dragon Devastar Okeabyss (L)|Shinesteel Ultra Dragon Devastar Okeabyss [L]]]" and "[[Shinesteel Ultra Dragon Devastar Okeabyss (R)|Shinesteel Ultra Dragon Devastar Okeabyss [R]]]").
