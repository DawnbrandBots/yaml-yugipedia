title: Card Trivia:Mirage Swordsman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Flame Swordsdance]]".
  * This monster is a [[Flame Swordsman (series)|Flame Swordsman]] [[retrained]] [[counterpart]] of "[[Mirage Knight]]".
  ** The armor of "Mirage Knight" is worn by "[[Dark Magician]]", while this monster's armor is worn by "[[Flame Swordsman]]".
  ** The sword in this monster's right hand is inscribed with the kanji 「幻」 (''Gen'', "illusion"), referencing the Japanese name of "Mirage Knight", "Knight of Illusions" (幻影の騎士, ''Gen'ei no Kishi'').
  ** The sword in this monster's left hand is inscribed with the kanji 「炎」 (''Honō'', "flame"), which is also inscribed on the sword of "Flame Swordsman".
