title: Card Trivia:Magnetic Storm
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Unicycular]]", "[[Green Gadget]]", "[[Second Booster]]" and "[[Scrap-Iron Scarecrow]]" appear in this card's artwork.
  ** This card was used against Yusei, and out of those 4 cards in this card's artwork, 3 of them have been used by him.
  * A [[wikipedia:Geomagnetic storm|magnetic storm]] is a temporary disturbance in the Earth's magnetosphere caused by a solar wind shockwave and/or cloud of magnetic field that interferes with the Earth's magnetic field.
