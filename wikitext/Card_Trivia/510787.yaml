title: Card Trivia:Grandmaster of the Six Samurai
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cunning of the Six Samurai]]", "[[Evenly Matched]]", "[[Gozen Match]]", and "[[Six Scrolls of the Samurai]]".
  * This monster is an older version of "[[Legendary Six Samurai - Kizan]]", as confirmed by the [[Master Guide 3 card storylines#Legendary Six Samurai - Kizan|Master Guide 3 card storylines]].
