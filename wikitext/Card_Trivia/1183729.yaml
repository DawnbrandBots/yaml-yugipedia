title: Card Trivia:Gray Layer
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Jade Knight]]".
  ** This monster is based on the Gray Layer, the alternate name for {{wikia|gradius|Jade Knight}}, one of the main playable spaceships from [[Konami|Konami's]] shoot-em-up video game series, ''[[wikipedia:Gradius|Gradius]]'', as it appeared in the spin-off game, ''Salamander III''.
