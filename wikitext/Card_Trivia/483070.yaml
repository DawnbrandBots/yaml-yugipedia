title: Card Trivia:Supreme King Dragon Odd-Eyes
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Soul of the Supreme King]]".
  * This monster is the "[[Supreme King Dragon]]" corrupted [[counterpart]] of "[[Odd-Eyes Pendulum Dragon]]".
  ** However, the spines on this monster's back are more similar to the ones of "[[Odd-Eyes Dragon]]".
  *** This may be due to how, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, [[Z-ARC]] (and therefore [[Yuya Sakaki]]) originally owned "[[Odd-Eyes Dragon (anime)|Odd-Eyes Dragon]]", before it was transformed into "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]".
