title: Card Trivia:Brotherhood of the Fire Fist - Tiger King
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[2014 Mega-Tins]]'' and ''[[Nature Pack: Blazing Heroes]]''.
  * This monster appears in the artworks of "[[Ultimate Fire Formation - Seito]]" and "[[Ultimate Fire Formation - Sinto]]".
  * This monster's Japanese name, "Leading Flame Star King - Song Hu" ({{Ruby|魁|かい}}{{Ruby|炎|えん}}{{Ruby|星|せい}}{{Ruby|王|おう}}－ソウコ, ''Kaienseiō - Sōko'') is based on [[wikipedia:Song Jiang|Song Jiang]], one of the [[wikipedia:108 Heroes|108 Heroes]] from the Chinese classic novel, ''[[wikipedia:Water Margin|Water Margin]]'', whose name can be read in Japanese as "So Ko".
  ** The kanji 「魁」on this monster's breastplate and the tiger in this card's artwork means "charging ahead of others". This and this monster's Japanese title, "Leading Flame Star King", reference how Song Jiang ranks first of the 36 Heavenly Stars and is designated as the leader of the 108 Heroes.
  ** This monster is accompanied by a tiger made of white flames. During the [[wikipedia:Han dynasty|Han dynasty]], it was believed that the tiger was the king of all beasts, which ties into this monster's Japanese namesake, and its ''[[TCG]]'' name, "Tiger King".
  * This monster and "[[Brotherhood of the Fire Fist - Lion Emperor]]" are the only "[[Fire Fist]]" monsters who are depicted with white flames, which are known for being the hottest and most focused flames.
  ** Fittingly, both are "Fire Fist" [[Xyz Monster]]s who appear in the artwork of "Ultimate Fire Formation - Seito", the most powerful [[Trap Card]] related to the "Fire Fist" [[archetype]].
