title: Card Trivia:Harpie Oracle
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s for ''[[Duelist Pack: Legend Duelist 4]]''/''[[Legendary Duelists: Sisters of the Rose]]'', along with "[[Harpie Perfumer]]".
  * This monster and "Harpie Perfumer" are references to [[Aroma Tactics]], a technique used by [[Mai Valentine]] to predict the cards she would draw by applying different types of perfumes to each of them.
  * The artwork of "[[Harpies' Hunting Ground]]" can be seen in the crystal ball held by this monster.
