title: Card Trivia:Flame Swordsrealm
wikitext: |-
  {{Navigation}}

  * "[[Flame Swordsman]]" and "[[Salamandra, the Flying Flame Dragon]]" appear in this card's artwork.
  * This card's effects are based on the appearance of "[[Flame Swordsman (anime)|Flame Swordsman]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** This card's effect to [[Special Summon]] "[[Flame Swordsman]]" from the [[Extra Deck]] references how "Flame Swordsman" was a [[Normal Monster]] in the anime before it was released as a [[Fusion Monster]] in the ''[[OCG]]''/''[[TCG]]''.
  *** Additionally, this effect can be [[activate]]d by [[send]]ing a monster to the [[Graveyard]] before Special Summoning "Flame Swordsman", referencing how in the anime, "Flame Swordsman" is a [[Level]] 5 monster, which requires a monster to be [[Tribute]]d to [[Tribute Summon]] it.
  ** This card's [[ATK]]-increasing effect references the [[Deck Master ability]] of "Flame Swordsman" in the anime, which allowed [[Joey Wheeler]] to decrease the [[ATK]] of "Flame Swordsman" in order to increase the ATK of another monster by the same amount, all of which were [[Warrior]] monsters.
  *** This card's fixed amount of 1000 ATK is based on the usage of the Deck Master ability of "Flame Swordsman" in {{episode|Yu-Gi-Oh!|111|ref}}, where [[Joey Wheeler]] decreased the ATK of "Flame Swordsman" by 1000 in order to increase the ATK of "[[Rocket Warrior (anime)|Rocket Warrior]]" by the same amount.
