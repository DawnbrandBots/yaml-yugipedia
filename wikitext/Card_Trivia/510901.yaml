title: Card Trivia:Mad Dog of Darkness
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Behemoth the King of All Animals]]".
  * This monster is the "corrupted" [[counterpart]] of "[[Outstanding Dog Marron]]".
  ** The "mecha" counterpart of "Dog Marron", "[[Mecha-Dog Marron]]", is depicted in a similar pose in its card artwork.
