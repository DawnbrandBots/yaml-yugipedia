title: Card Trivia:Dragon Knight Draco-Equiste
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Duelist Revolution]]'', as well as one of the cover cards for ''[[Collectible Tins 2010 Wave 1]]''.
  ** Although tangentially related to them, this is the first cover card in the ''[[Yu-Gi-Oh! 5D's]]'' era to have no relation to the [[Signer Dragon]]s.
  *** This is also the second [[Ghost Rare]] cover card to not be related to any [[archetype]], with the first being "[[Honest]]".
  *** It is also only the second Ghost Rare cover card during the ''Yu-Gi-Oh! 5D's'' era to not be a [[Synchro Monster]], with the first being "[[Red Dragon Archfiend/Assault Mode]]".
  * This monster's name, "Draco-Equiste", is derived from two Latin words: "draco" is the Latin word for "dragon", while "equiste" is the plural form of "eques", the Latin word for "knight", making a possible translation of this monster's full name, "Dragon Knight Dragon Knights". 
  ** Combining both words would also reflect this monster's design as a dragon-themed knight, its status as a [[Fusion Monster]], and its required [[Fusion Material]]s ("1 [[Dragon]] [[Synchro Monster]] + 1 [[Warrior]] monster").
  * This is one of the few Fusion Monsters to appear in the ''Yu-Gi-Oh! 5D's'' anime, with the others being "[[Centaur Mina]]", "[[Multiple Piece Golem]]" and "[[Rare Fish]]".
  * This is the first and only Fusion Monster played by [[Yusei Fudo]] in the ''Yu-Gi-Oh! 5D's'' anime.
  ** Interestingly, in the anime, [[Dragon Knight Draco-Equiste (anime)|this monster]] was [[Fusion Summon]]ed using two of Yusei's [[signature card|ace monsters]], "[[Stardust Dragon (anime)|Stardust Dragon]]" and "[[Junk Warrior (anime)|Junk Warrior]]".
  *** This monster's design appears closer to a Fusion of "Stardust Dragon" and "[[Gaia Knight, the Force of Earth]]" (which has a similar art style to "Junk Warrior" and other monsters used by Yusei), while its pose is similar to "Stardust Dragon" in its card artwork.
  *** Its first effect to treat itself as "Stardust Dragon" and gain its effects, and its second effect to redirect effect damage to the opponent while in [[Attack Position]], both reflect Yusei's overall defensive gameplay.
  * While intended as a counter against the "[[Meklord Emperor]]s", Yusei never uses this card against [[Iliaster]] in the ''Yu-Gi-Oh! 5D's'' anime. This is likely due to Yusei mastering the [[Accel Synchro Summon]] and [[Clear Mind]], acquiring a more powerful counter in "[[Shooting Star Dragon (anime)|Shooting Star Dragon]]" afterwards.
