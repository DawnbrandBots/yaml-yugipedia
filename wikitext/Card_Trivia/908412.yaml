title: Card Trivia:Tri-Brigade Bearbrumm the Rampant Rampager
wikitext: |-
  {{Navigation}}

  * "[[Tri-Brigade Kitt]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Branded in High Spirits]]".
  ** Pieces of this monster appear in the artwork of "[[Tribe Drive]]".
  * "[[Springans Kitt]]" is wearing a gauntlet based on this monster's one, possibly suggesting that she used this monster's pieces to build her "[[Springans]]" armor, as the artwork of "Tribe Drive" may depict.
  * This monster has a combined form with "[[Sprind the Irondash Dragon]]": "[[Rindbrumm the Striking Dragon]]".
