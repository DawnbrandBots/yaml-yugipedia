title: Card Trivia:Six Strike - Sextuple Barrage
wikitext: |-
  {{Navigation}}

  * "[[Legendary Lord Six Samurai - Shi En]]" appears in this card's artwork.
  * This card's Japanese name ({{Ruby|六|ろく}}{{Ruby|武|ぶ}}{{Ruby|式|しき}}{{Ruby|真|しん}}{{Ruby|伝|でん}}{{Ruby|天|てん}}{{Ruby|魔|ま}}{{Ruby|六|ろく}}{{Ruby|段|だん}}{{Ruby|衝|しょう}}) features the characters for "''tenma''" ({{Ruby|天|てん}}{{Ruby|魔|ま}}), which references the Demon King of the Sixth Heaven ({{Ruby|大|だい}}{{Ruby|六|ろく}}{{Ruby|天|てん}}{{Ruby|魔|ま}}{{Ruby|王|おう}}, ''dairokuten maō'') in [[wikipedia:Buddhist mythology|Buddhist mythology]]; it was also a title attributed to the ''daimyo'' [[wikipedia:Oda Nobunaga|Oda Nobunaga]] (whom "Shi En" is based on) after the [[wikipedia:Siege of Mount Hiei|Siege of Mount Hiei]], in which he is said to have killed every man, woman, and child in the Buddhist temple complex.
  * This card is a remake of "[[Six Strike - Triple Impact]]".
  ** Both cards feature a similar naming scheme.
  ** Both cards' artworks depict "[[Legendary Six Samurai - Shi En]]", with this card depicting the aforementioned monster's retrained counterpart.
  ** Both cards' share a similar [[activation condition]], requiring the player to [[control]] three or more [[face-up]] "[[Six Samurai]]" monsters to [[activate]]d and effect to [[destroy]] multiple cards the opponent controls.
