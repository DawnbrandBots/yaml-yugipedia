title: Card Trivia:Anti Raigeki
wikitext: |-
  {{Navigation}}

  * The lightning rod in this card's artwork appears in the artwork of "[[Twister]]".
  * This card appears in the artwork of "[[Jelly Hole]]".
  * This card has a [[Monster Card|monster]] [[counterpart]]: "[[Lightning Rod Lord]]".
  ** Both cards' Japanese names are pronounced very similarly to each other.
  * This card is one of several cards that were created to counter one specific card, each of which have been [[Limited]] or [[Forbidden]] at some point. The others are "[[Gryphon Wing]]", "[[White Hole]]", "[[Jar Robber]]", "[[Call of the Grave]]" and "[[Call of Darkness]]".
