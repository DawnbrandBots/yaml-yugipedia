title: Card Trivia:Ultimate Tyranno
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Speed Duel GX: Midterm Destruction]]''.
  * This monster appears in the artworks of "[[Battle of Sleeping Spirits]]", "[[Dyna Tank]]", and "[[Survival of the Fittest]]".
  * This monster is based on the ''[[wikipedia:Tyrannosaurus|tyrannosaurus rex]]''.
  * This monster has a [[Fusion]] with "[[Dyna Base]]": "[[Dyna Tank]]".
  * This monster has a [[Zombie counterpart]]: "[[Skelesaurus]]".
  * This monster has a retrained version shared with "[[Super Conductor Tyranno]]": "[[Ultimate Conductor Tyranno]]".
  * This monster is the [[signature card]] of [[Tyranno Hassleberry]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
