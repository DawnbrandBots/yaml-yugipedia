title: Card Trivia:Trap Tracks
wikitext: |-
  {{Navigation}}

  * This card's artwork appears to depict the aftermath of "[[Trap Trick]]", which shares a similar effect with this card's, revealing that the knight in the artwork of "Trap Trick" and some of the "[[Trap Hole (archetype)|Trap Hole]]" cards perished after being lured in by the "[[Traptrix]]" monsters.
  ** It also shows the sticky goo from "[[Traptrix Pinguicula]]" and the webs of "[[Traptrix Atypus]]".
