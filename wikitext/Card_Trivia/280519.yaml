title: 'Card Trivia:Number 2: Ninja Shadow Mosquito'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Ninjitsu Art of Mosquito Combustion]]" and "[[Ninjitsu Art of Mosquito Repellent]]".
  * The number "02" appears on this monster's right missile launcher.
  * This monster's Japanese name, "Mosquitology Ninja - Shadow Mosquito" (蚊学忍者シャドー・モスキート, ''Kagaku Ninja Shadō Mosukīto'') features the word 「文学」(''bungaku''), the Japanese word for "literature", with the first kanji 「文」 replaced with the kanji 「蚊」 meaning "mosquito".
  ** The word ''kagaku'' (蚊学) shares the same pronunciation with the Japanese word for "chemistry" (化学).
  ** This naming scheme is a reference to the 1972 anime series, ''[[wikipedia:Science Ninja Team Gatchaman|Science Ninja Team Gatchaman]]'', with "Shadow Mosquito" likely referencing a line in the show's opening theme song: "''A shadow dancing beyond the sky''".
  * Like many "[[Number]]" monsters with numbers below 10, this monster's number matches its [[Rank]].
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster is depicted as being so small that all that can be seen of it is a tiny, green speck. Additionally, this is also the smallest monster to be depicted in the anime.
  ** Ironically, [[Scritch]] played this monster against [[Quinton]]'s "[[Number 9: Dyson Sphere (anime)|Number 9: Dyson Sphere]]", which is one of the biggest, if not the biggest, monsters in the anime.
  * This monster's neutral form resembles the pupa stage of a mosquito larva, keeping in relation with its mosquito theme.
  * This monster's effect to use [[Hallucination Counter]]s to damage the opponent's monsters references how some mosquitoes transmit diseases when they bite.
