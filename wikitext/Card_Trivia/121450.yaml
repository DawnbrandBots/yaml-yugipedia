  * "[[Crystal Beast Amber Mammoth]]'s", "[[Crystal Beast Ruby Carbuncle]]'s", "[[Crystal Beast Emerald Tortoise]]'s" and "[[Crystal Beast Cobalt Eagle]]'s" crystallized forms appear in this card's artwork.
