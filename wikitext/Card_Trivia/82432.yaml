title: Card Trivia:The Melody of Awakening Dragon
wikitext: |-
  {{Navigation}}

  * "[[Lord of D.]]" appears in this card's artwork.
  ** The design of the electric guitar that "Lord of D." is depicted playing is based on "[[Blue-Eyes White Dragon]]". Fittingly, this card's ''[[OCG]]''/''[[TCG]]'' effect to [[add]] up to two [[Dragon]] monsters with a minimum [[ATK]] of 3000 and a maximum [[DEF]] of 2500 from the player's [[Deck]] to the [[hand]] are based on the [[original ATK and DEF]] of "Blue-Eyes White Dragon" (3000/2500).
  *** This card's ''OCG''/''TCG'' effect requiring the player to add up to two Dragon monsters with those minimum ATK and maximum DEF amounts is an alteration of its effect in the ''[[Yu-Gi-Oh! R]]'' manga, which allows the player to add two Dragon monsters from their Deck to their hand. In {{chapter|R|029|ref}}, this card's effect was used to add two copies of "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" from [[Seto Kaiba (manga)|Seto Kaiba's]] Deck to his hand.
  * This card is a [[counterpart]] of "[[The Flute of Summoning Dragon]]".
