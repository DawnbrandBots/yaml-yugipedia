title: Card Trivia:Genex Ally Bellflame
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battle Pack 3: Monster League]]''.
  * According to the [[Duel Terminal Master Guide card storylines|Duel Terminal Master Guide card storylines]], this monster is modeled after the "[[Flamvell]]" [[archetype]].
  ** This monster's name is a play on the name of the "Flamvell" archetype; both halves of the name are switched, with the word "flam" adding an extra character to create the word "flame".
  ** This monster's [[banish]]ing effect references how the "[[Neo Flamvell]]" archetype features a playstyle revolving around banishing cards from the opponent's [[Graveyard]].
