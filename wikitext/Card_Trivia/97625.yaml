title: Card Trivia:Dark Magician
wikitext: |-
  {{Navigation|other=[[Dark Magician (DDM)|Dungeon Dice Monsters]] - [[Dark Magician (Arkana)]] - [[Dark Magician (character)|Character]]}}

  * This is the [[cover card]] of ''[[Starter Deck: Yugi]]'' and ''[[Structure Deck: Illusion of the Dark Magicians]]'', and the ''[[TCG]]'' version of ''[[Structure Deck: Yugi Muto]]'', and is also one of the cover cards of ''[[EX-R Starter Box]]'', the ''[[Promotional Pack]]'', ''[[Retro Pack]]'', ''[[Starter Deck: Yugi Reloaded]]'', ''[[Beginner's Edition 1 (2011)]]'', ''[[Premium Pack 4]]'', the ''[[OCG]]'' version of ''Structure Deck: Yugi Muto'', ''[[Duelist Saga]]'', ''[[Duel Power]]'', ''[[Speed Duel: Streets of Battle City]]'', ''[[25th Anniversary Tin: Dueling Heroes]]'' and ''[[High-Grade Collection]]''.
  * This monster appears in the artworks of "[[Bond Between Teacher and Student]]", "[[Card of Fate]]", "[[Dark Burning Magic]]", "[[Dark Magical Circle]]" (alternate artwork), "[[Dark Magic Attack]]", "[[Dark Magic Expanded]]", "[[Dark Magic Inheritance]]", "[[Dark Magic Twin Burst]]", "[[Dark Resonance Burst]]", [[Dark Spiral Force]]", "[[Destined Rivals]]", "[[Dimension Explosion]]", "[[Draw of Fate]]", "[[Eternal Soul]]" (as an engraving), "[[Illusion Magic]]", "[[Legacy of the Duelist]]", "[[Magicians' Combination]]", "[[Magician Navigation]]", "[[Magician's Salvation]]", "[[Magician's Selection]]", "[[Magician's Sense]]", "[[Soul Servant]]", "[[Speed Spell - Speed Fusion]]", "[[Spell Card "Monster Reborn"]]", and "[[The Dark Magicians]]" (in slightly different robes).
  ** This monster's spectral form appears in the artwork of "[[Magician's Robe]]", "[[Magician's Rod]]", and "[[Magicians' Souls]]".
  *** "Magician's Robe" serves as the monster version of this monster's robe, while "Magician's Rod" serves as the monster version of this monster's staff.
  ** This monster's staff appears in the artworks of "[[Black Illusion]]".
  * This card appears in the artworks of "[[Exchange]]" (in two of its artworks) and "[[E☆HERO Pit Boss]]".
  * "[[Dark Magical Circle]]" appears in several of this card's artworks.
  * This card has several counterparts.
  ** Two [[retrained]] counterparts: "[[Magician of Dark Illusion]]" and "[[Dark Magician, the Pharaoh's Servant]]"
  ** An alternate counterpart: "[[Dark Magician (Arkana)]]"
  ** Two advanced counterparts: "[[Dark Eradicator Warlock]]" and "[[Sorcerer of Dark Magic]]"
  ** A [[List of female cards|female]] counterpart: "[[Dark Magician Girl]]"
  ** A [[Ritual Monster|Ritual]] counterpart: "[[Magician of Chaos]]"
  *** Two upgraded Ritual counterparts: "[[Magician of Black Chaos]]" and "[[Magician of Black Chaos MAX]]"
  ** A "[[Gagaga]]" counterpart: "[[Gagaga Magician]]"
  ** A "[[Chaos]]" counterpart: "[[Dark Magician of Chaos]]"
  ** A "[[Kuriboh (archetype)|Kuriboh]]" counterpart: "[[Magikuriboh]]"
  ** A "[[Statue]]" counterpart: "[[Statue Dark Magician]]"
  ** A "[[Toon]]" counterpart: "[[Toon Dark Magician]]"
  ** A [[Warrior]] counterpart: "[[Dark Magician Knight]]"
  ** An [[aged counterpart]]: "[[Dark Sage]]"
  ** Nine [[Fusion Monster|Fusion]] counterpart: "[[Dark Flare Knight]]", "[[Dark Paladin]]", "[[Amulet Dragon]]", "[[Dark Magician the Dragon Knight]]", "[[Dark Cavalry]]", "[[Dark Magician the Knight of Dragon Magic]]", "[[The Dark Magicians]]", "[[Master of Chaos]]", "[[Red-Eyes Dark Dragoon]]"
  ** Two [[Xyz Monster|Xyz]] counterparts: "[[Ebon High Magician]]" and "[[Ebon Illusion Magician]]"
  *** A [[Match winner]] Xyz counterpart: "[[Legendary Magician of Dark]]"
  ** A [[Match winner]] Effect counterpart: "[[Masterful Magician, Servant of the Sanctuary]]"
  ** A "[[Palladium]]" counterpart: "[[Palladium Oracle Mahad]]"
  ** An [[Illusion]] counterpart: "[[Nightmare Magician]]"
  ** Two 25th anniversary counterparts.
  *** [[Yu-Gi-Oh! (manga)|Manga]] anniversary: "[[Chronicle Magician]]" (with "[[Blue-Eyes White Dragon]]")
  *** ''[[Yu-Gi-Oh! Official Card Game|OCG]]'' anniversary: "[[Magicians of Bonds and Unity]]" (with "Dark Magician Girl")
  ** A [[Shining Sarcophagus (series)|Shining Sarcophagus]] counterpart: "[[Dark Magician the Magician of Black Magic]]"
  * "[[Donpen & Donko]]" are dressed as this monster and "[[Dark Magician Girl]]" respectively.
  * "[[Miracle Flipper]]" is an expy of this monster. This is supported by "[[Card Ejector]]" being an expy of "Dark Magicial Girl", as well as both "Miracle Flipper" and "Card Ejector" being used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Furthermore, "Card Ejector" was later remade as "[[Miracle Ejector]]", with its name reinforcing its relationship with "Miracle Flipper".
  * This card, along with "[[Blue-Eyes White Dragon]]" and "[[Red-Eyes B. Dragon]]", have the most [[alternate artwork]]s.
  ** After "[[Token]]", this card has the most alternate artworks in the ''OCG''/''[[TCG]]'' with eight in total, tied with "Blue-Eyes White Dragon". This excludes "[[Dark Magician Girl]]", who technically has the most artworks, due to small censoring differences between the Japanese and international versions.
  * This card is both the [[signature card]] of [[Dark Yugi (manga)|Dark Yugi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (and his [[Yu-Gi-Oh! (anime)|anime]] [[Yami Yugi|counterpart]]) and the favorite card of [[Yugi Muto]] in the [[Yu-Gi-Oh! (anime)|anime]]; as such, in the Duel between [[Yami Yugi]] and [[Yami Bakura]], Yugi's soul was infused with that of this card.
  * This card is arguably one of the most iconic monsters in the game, along with "Blue-Eyes White Dragon", mainly because they were the [[signature card]]s of the the main characters of the first TV series anime.
  * This card's [[ATK]] of 2500 established the ATK value of the other ''Yu-Gi-Oh!'' series' protagonists' ace cards (with the exception of "[[Sevens Road Magician (anime)|Sevens Road Magician]]"), including "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" from ''[[Yu-Gi-Oh! GX]]'', "[[Stardust Dragon (anime)|Stardust Dragon]]" from ''[[Yu-Gi-Oh! 5D's]]'', "[[Number 39: Utopia (anime)|Number 39: Utopia]]" from ''[[Yu-Gi-Oh! ZEXAL]]'', "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]" from ''[[Yu-Gi-Oh! ARC-V]] '', "[[Firewall Dragon (anime)|Firewall Dragon]]" from ''[[Yu-Gi-Oh! VRAINS]]'' and "[[Galactica Oblivion (anime)|Galactica Oblivion]]" from ''[[Yu-Gi-Oh! GO RUSH!!]]''.
  ** This card has the same [[ATK]] of 2500 as the signature cards of other manga main protagonists, which are [[Jaden Yuki (manga)|Jaden Yuki]]'s "[[Elemental Hero Terra Firma (manga)|Elemental Hero Terra Firma]]", [[Yusei Fudo (manga)|Yusei Fudo]]'s "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]", [[Yuma Tsukumo (manga)|Yuma Tsukumo]]'s "[[No. 39: Utopia (manga)|No. 39: Utopia]]", [[Yuya Sakaki (manga)|Yuya Sakaki]]'s "[[Odd-Eyes Phantom Dragon (manga)|Odd-Eyes Phantom Dragon]]", [[Tatsuhisa Kamijo (manga)|Tatsuhisa Kamijo]]'s "[[Multistrike Dragon Dragias (manga)|Multistrike Dragon Dragias]]" and [[Yudias Velgear (manga)|Yudias Velgear]]'s "[[Galactica Oblivion (manga)|Galactica Oblivion]]".
  ** All of the aforementioned signature monsters (excluding the ''Rush Duel'' exclusives) have 2000 [[DEF]] as well (except for "Firewall Dragon"). Even though this card has 2100 DEF, the [[Dark Magician (Bandai)|Bandai version]] of this card has 2000 DEF.
  ** "[[Elemental HERO Shining Flare Wingman]]" has the same [[original ATK and DEF]] (2500/2100) as "Dark Magician", implying that it was Jaden's signature card before "Elemental HERO Neos", who did not debut until the second season.
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'', this monster features blue-colored skin, white hair, and a dark blue rod and robe. In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster features pink-colored skin, purple hair, a purple-and-blue robe, and a green rod, based on the color scheme used in its early appearances in the full-colored version of the manga.
  * This is most likely the single most supported card of all, with over 60 cards specifically stating "Dark Magician" as part of their effect, in addition to the "Magician" theme its design has inspired.
  * This card can be seen as a magical counterpart and partner to "[[Buster Blader]]".
  ** Both cards are used as [[Fusion Material]] for "[[Dark Paladin]]".
  ** Both cards are supported by "[[Miracle Restoring]]".
  ** Both cards are supported by the parallel members of the [[Skilled Magician]] [[series]]: "[[Skilled Dark Magician]]" (which supports this card) and "[[Skilled White Magician]]" (which supports "Buster Blader").
  * On multiple occasions, this card has been mistakenly referred to as "Dark Spellian" in official media, presumably due to a naive use of find-and-replace to rename Magic Cards to [[Spell Card]]s. [[File:Dark spellian Master Duel.png|thumb|SP Deck Challenge description mentioning "Dark spellian" in ''Yu-Gi-Oh! Master Duel'']]
  ** In ''[[Yu-Gi-Oh! World Championship Tournament 2004]]'', "[[Dark Magician Girl (World Championship 2004)|Dark Magician Girl]]'s" text mentions "Dark Spellian" and "[[Magician of Black Chaos|Spellian of Black Chaos]]". The game was released shortly after Magic Cards were renamed to Spell Cards.
  ** In ''[[Yu-Gi-Oh! Master Duel]]'', an [[SP Deck Challenge]] referred to "Dark Magician" as "Dark spellian" in its description.
  * In the [[Yu-Gi-Oh! (Toei anime)|first TV series anime]], this card's name is "Dark Wizard".
  * As the [[flavor text]] implies, this monster has the highest ATK and DEF total combined sum for a [[Normal Monster]] "wizard" (male [[Spellcaster]]); however, "[[Cosmo Queen]]" is a Normal Spellcaster with higher combined ATK and DEF, but as a female, she is not a "wizard".
  ** The flavor text may not refer to its ATK and DEF, but to its high amount of Spell and Trap Cards it has access to. Many of its support cards give "Dark Magician" high offensive power and defensive power, if they may not alter this cards stats.
  * The alternate-art "red" "Dark Magician" used by Arkana in the ''Yu-Gi-Oh!'' anime and manga may be seen [[Dark Magician (Arkana)|here]]. Despite having the same name, he is not the same card as the "purple" "Dark Magician" always used by Yugi Mutou, as it features a different eight-digit passcode.
  ** Three of the artworks of "Dark Magician" ([[LOB]]/[[SYE]], [[SDY]] and Arkana version) depicts its staff green, whereas in one version ([[SD6]]/[[Yu-Gi-Oh! Power of Chaos: Yugi the Destiny promotional cards|PCY]]) and on "[[Dark Magic Attack]]", his staff is red and blue.
  ** The artwork in the ''[[Weekly Shōnen Jump promotional cards|Weekly Jump Magazine Promo]]'' version looks similar to that of a ''[[wikipedia:Final Fantasy|Final Fantasy]]'' character, in particular {{wikia|finalfantasy|Cecil Harvey|Cecil}} from ''[[wikipedia:Final Fantasy IV|Final Fantasy IV]]''. This artwork was drawn by [[Kazuki Takahashi]].
  ** In some Gameboy Advance and Nintendo DS ''Yu-Gi-Oh!'' games, it is possible to have six copies of "Dark Magician" in the same Deck, as the games do not recognize alternate artwork cards as being the same.
  * On the French ''[[Champion Pack: Game Five]]'' print of "[[Thousand Knives]]" (and in the French dub of the anime), this card is called "Magicien des Ténèbres". All French ''TCG'' prints of "Dark Magician" and all other French prints of "Thousand Knives" call it "Magicien Sombre".
  * This card along with "Blue-Eyes White Dragon" are the only 2 cards to have had an official Chinese print before the release of ''[[Duel Starter Deck]]'' standardized Chinese as an ''OCG'' language. Its Chinese version originated in Japan, therefore its Chinese name includes the character "黒" (black) which is an exclusive one to Japanese, compared to the Chinese counterpart, "黑".
  * This card's first ''OCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|62|ref}}, specifically from the panel where [[Dark Yugi (manga)|Dark Yugi]] declares an attack on "[[Koumori Dragon (manga)|Koumori Dragon]]" with [[Dark Magician (manga)|this monster]].
  ** This card's second ''OCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|94|ref}}, specifically from the panel showing this monster being Summoned, albeit with minor changes in detail.
  ** This card's third ''OCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|162|ref}}. However, it is derived from 2 separate panels showing [[Pandora (manga)|Pandora's]] copy of "Dark Magician". The first panel is where the 2 "Dark Magicians" are shown together with their displayed ATK values, after Pandora Summons his copy of "Dark Magician" for the first time. The second panel is on the same page, showing the same "Dark Magician".
  *** For this artwork, the upper body of Pandora's "Dark Magician" from the first panel (barring his head) is flipped horizontally, while the head from the second panel is used as is, barring minor details.
  ** This card's fourth ''OCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|161|ref}}, specifically from the panel showing this monster being Summoned.
  ** This card's sixth ''OCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|341|ref}}, specifically from the panel showing this monster being Summoned.
  * In {{episode|Yu-Gi-Oh! GX|005|ref}}, as [[Syrus Truesdale]] is telling a scary story to his friends, he appears to indicate that "Dark Magician" is the card that he wants most, as he is depicted seeing the card in a body of water said to show the card that its viewer wants most.
