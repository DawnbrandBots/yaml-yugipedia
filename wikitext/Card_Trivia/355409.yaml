title: Card Trivia:Aromage Cananga
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Aroma Gardening]]" and "[[Dried Winds]]".
  * This monster is named after the ''[[wikipedia:Cananga odorata|Cananga odorata]]'', a tropical tree that grows fragrant yellow flowers, which produces essential oils used for aromatherapy, perfumes, and aphrodisiacs for newlywed couples.
