title: Card Trivia:Blue-Eyes Alternative White Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Ghosts From the Past (set)|Ghosts From the Past]]''.
  * This monster appears in the artwork of "[[Majesty of the White Dragons]]".
  * This monster is a [[retrained]] [[counterpart]] of "[[Blue-Eyes White Dragon]]".
  * This monster has three [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] forms: "[[Blue-Eyes Twin Burst Dragon]]", "[[Neo Blue-Eyes Ultimate Dragon]]", and "[[Blue-Eyes Alternative Ultimate Dragon]]".
  * This monster has a "[[Red-Eyes]]" counterpart: "[[Red-Eyes Alternative Black Dragon]]".
  * This monster's effect to [[destroy]] a monster is based on the effect of "[[Burst Stream of Destruction]]", which destroys a monster while the player [[control]]s "Blue-Eyes White Dragon", but prevents it from attacking for the rest of the turn.
  * This monster's ''[[Yu-Gi-Oh! Duel Links]]'' Summoning cutscene features an Egyptian tomb-like setting, referencing the [[Duel]] between [[Seto Kaiba]] and [[Aigami]] that took place at the [[Shrine of the Millennium Stone]] at [[Kul Elna]] in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'', in which this card debuted.
