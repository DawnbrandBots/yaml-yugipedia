title: Card Trivia:Gem-Knight Obsidian
wikitext: |-
  {{Navigation}}

  * This card's name comes from [[wikipedia:Obsidian|obsidian]], a shiny black stone usually found in volcanic regions.
  ** This is interesting to note as the "[[Laval]]s" are known to have a volcanic homeland, and "[[Lavalval Ignis]]" bears a strong resemblance to this card, with this card being a possible [[Xyz Material]] for "Ignis".
  * The giant bead "necklace" around this monster seems to be that of an ''[[wikipedia:Itako|itako]]'', a type of traditional Japanese shaman said to be able to communicate with the dead.
  ** However, ''itako'' are traditionally blind and female, while this monster appears to be male.
