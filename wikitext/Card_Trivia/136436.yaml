title: Card Trivia:Lancer Archfiend
wikitext: |-
  {{Navigation}}

  * This monster is a counterpart of "[[Needle Soldier]]".
  ** Both are depicted in a similar stance in their respective artwork.
  ** Both are named after piercing objects, which reflect their effect to make a monster inflict [[piercing]] [[battle damage]].
  ** Both are used by the main rivals of the ''[[Yu-Gi-Oh! 5D's]]'' anime (this monster was used by [[Jack Atlas]], while "Needle Soldier" was used by [[Yusei Fudo]]).
