title: Card Trivia:Jester Puppet Circus
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is the first and only [[Ritual Spell Card]] to appear in the ''[[Yu-Gi-Oh! 5D's]]'' media.
  ** Before the airing of {{episode|ZEXAL|122|ref}}, this was also the first Ritual Spell Card to appear in the ''Yu-Gi-Oh!'' media since the end of the ''[[Yu-Gi-Oh! GX]]'' anime. The last time a Ritual Monster appeared in the media was in {{episode|GX|162|ref}} with the appearance of "[[Machine Angel Ritual (anime)|Machine Angel Ritual]]", which aired nearly five years and three months before the release of {{chapter|5D's|043|ref}}, in which this card debuted.
