title: Card Trivia:Gishki Reliever
wikitext: |-
  {{Navigation}}

  * This is one of three "[[Gishki]]" monsters whose design does not feature "[[Gishki Aquamirror]]", the other two being "[[Gishki Mollusk]]" and "[[Gishki Reliever]]"; however, the symbol of "Gishki Aquamirror" is tattooed on this monster's belly.
