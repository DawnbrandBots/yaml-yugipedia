title: Card Trivia:Royal Swamp Eel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Deep Sea Artisan]]" and "[[Giant Pairfish]]".
  * Despite this monster's name, its design is based on a [[wikipedia:Giant oarfish|giant oarfish]] rather than an [[wikipedia:Eel|eel]].
  * This is the first [[Fish]] [[Tuner monster]].
  * This monster is related to "[[Golden Flying Fish]]" and "[[Metabo-Shark]]", as they are all [[Level 4]] Fish monsters who originally debuted as ''[[TCG]]''-[[TCG exclusive|exclusive]] [[Super Rare]] cards in different [[Core Booster|Core Booster packs]] with the same [[set number]], that being "????-EN086".
