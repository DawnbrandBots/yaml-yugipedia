title: Card Trivia:Canon the Melodious Diva
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from the musical term '''[[wikipedia:Canon (music)|Canon]]''', which refers to a compositional technique where an initial [[wikipedia:melody|melody]] is imitated by followers over the course of the song.
  ** This reference may have inspired this monster's effect: "Canon" Special Summons herself by "following" an existing "[[Melodious]]" monster's melody.
  * When this card is Summoned in the Anime, several Musical Notes are depicted surrounding it in a similar fashion of [[Xyz Material]]s.
