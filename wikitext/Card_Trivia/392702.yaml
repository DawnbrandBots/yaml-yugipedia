title: Card Trivia:Slime Toad
wikitext: |-
  {{Navigation}}

  * This monster's former English name was "Frog the Jam". It was later changed upon being reprinted in ''[[OTS Tournament Pack 3]]'' since its Japanese name did not contain the character 「ガエル」 (''Gaeru''), and was thus not a member of the "[[Frog]]" [[archetype]]. There are still members and support for the archetype that have yet to be [[errata|errata'd]] which explicitly state that they do not interact with "Frog the Jam".
