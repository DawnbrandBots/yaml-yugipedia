title: Card Trivia:Gladiator Proving Ground
wikitext: |-
  {{Navigation}}

  * "[[Gladiator Beast Andal]]" and "[[Colosseum - Cage of the Gladiator Beasts]]" appear in this card's artwork.
  ** The reason "Gladiator Beast Andal" is in this card's artwork may be because he is the only "[[Gladiator Beast]]" [[Normal Monster]], thus he has to "prove" himself by going through battles to be like the other "Gladiator Beasts", as the rest of them are either [[Effect Monster]]s or [[Fusion Monster]]s.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Gladiator Proving Ground]]".
