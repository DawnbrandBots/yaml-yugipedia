title: Card Trivia:Infernoid Tierra
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Purushaddoll Aeon]]", "[[Ultimate Providence]]", "[[Void Imagination]]", and "[[Void Feast]]".
  * ''Tierra'' is Spanish for "earth".
  ** [[wikipedia:Tierra (computer simulation)|Tierra]] is also the name of an artificial life simulation designed to study the evolution of digital organisms.
  * This card is the first [[Level]] 11 [[Fusion Monster]], as well as the first Level 11 [[FIRE]] monster.
  ** This card also has the highest [[original DEF]] of all FIRE monsters.
  * This card is the first Fusion Monster to have a variable number of [[Fusion Material]]s while requiring a minimum of 3 Fusion Materials to be used to [[Fusion Summon]] it.
  * This monster has an [[Card evolutions|upgraded]] form: "[[Tierra, Source of Destruction]]".
  * The name of this monster is mentioned in the [[flavor text]] of "[[Qliphort Scout]]".
  ** This refers to the original role of "Tierra" as the executive of the '[[Qli]]photh' system.
