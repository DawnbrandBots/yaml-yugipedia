title: Card Trivia:Thunder Pot
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is possibly based on the [[wikipedia:Baghdad Battery|Baghdad Battery]], the name given to a set of three artifacts discovered together in [[wikipedia:Baghdad|Baghdad]], [[wikipedia:Iraq|Iraq]] that is believed to be an ancient form of a battery, consisting of a ceramic pot, a tube of copper, and a rod of iron. 
  ** This card is possibly a pun on the idiom "catching lightning in a bottle", which means to accomplish something extraordinary difficult or achieve rare success, as this card's artwork depicts lightning being caught in a ceramic bottle-like pot.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this card is [[activate]]d, the pot in this card's artwork materializes, and a dragon made out of lightning emerges to stop the attack.
