title: Card Trivia:Batteryman AAA
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Universal Adapter]]".
  ** The purple monster in this card's artwork also appears in the artwork of "[[Broken Line]]".
  * This is the only "[[Batteryman]]" monster to have 2 monsters on its artwork, this probably has to do with how AAA batteries are smaller than AA.
  * Just like the first 3 "Batteryman" monsters, in the chest of the monsters you can see a number that's equal to the monster's Level (in this case, Level 4), which also corresponds to the name for the battery type in Japanese (In this case, 単4形).
  * The two monsters on the artwork has the "recycle sign" on their forehead which is linked to the "recycling" effect this card has.
