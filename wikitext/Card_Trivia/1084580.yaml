title: Card Trivia:Phalaenop Sisters
wikitext: |-
  {{Navigation}}

  * This monster's name and design are based on ''[[wikipedia:Phalaenopsis|Phalaenopsis]]'', a genus of plants in the [[wikipedia:Orchid|Orchidaceae]] family that are also known as "moth orchids".
  * This monster is based on the [https://wikizilla.org/wiki/Shobijin Shobijin], the tiny twin priestesses of [[wikipedia:Mothra|Mothra]], as denoted by its [[Fairy]] [[Type]], sharing the wings of "[[Gadarla, the Mystery Dust Kaiju]]" (the "[[Kaiju]]" counterpart to Mothra), its effect being able to search it, and the 2700 damage being equivalent to "Gadarla's" [[ATK]].
  * Despite having "Sisters" in its card name, the artwork depicts only one fairy.
