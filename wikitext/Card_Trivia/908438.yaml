title: Card Trivia:Tiramisu Dark Witch
wikitext: |-
  {{Navigation}}

  * This monster is a ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] of "[[Dunames Dark Witch]]".
  ** This monster's Japanese and English names are puns on the Japanese name of "Dunames Dark Witch" (デュナミス・ヴァルキリア ''Dyunamisu Varukiria'') that replaces the kanji for "Dunames" (デュナミス ''Dyunamisu'') with the similar-sounding kanji for "[[wikipedia:Tiramisu|tiramisu]]" (ティラミス ''Tiramisu'').
