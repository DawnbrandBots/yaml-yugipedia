title: Card Trivia:Red Nova Dragon - Burning Soul
wikitext: |-
  {{Navigation}}

  * This monster is the [[signature move]] counterpart of "[[Red Nova Dragon]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "[[Red Nova Dragon (anime)|Red Nova Dragon]]" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime: "Burning Soul".
  *** This monster's effect to [[add]] a card from the [[Graveyard]] to the [[hand]] references the effect of the card "[[Burning Soul (manga)|Burning Soul]]", used by [[Jack Atlas (manga)|Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  *** This monster's name also references [[Blazing Soul]], a power used by [[Jack Atlas]] and the [[Legendary Signer]] in the anime (also known as "Burning Soul" in the original Japanese version), with which Jack sealed away the demon [[Red Nova]] and transformed "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" into "Red Nova Dragon".
  ** This monster's effect to gain 2000 [[ATK]] after adding a card from the Graveyard to the hand is a reference to a scene in {{episode|5D's|113|ref}}, the debut episode of "Red Nova Dragon", where it gained 500 ATK for each [[Tuner monster]] in Jack Atlas' Graveyard. In that scene, there were four Tuner monsters in Jack's Graveyard, so "Red Nova Dragon" gained 2000 ATK.
