title: Card Trivia:Il Blud
wikitext: |-
  {{Navigation}}

  * This monster's English name, "Il Blud", is a homonym for its Japanese name, "Ill Blood".
  ** This monster's French name is "Sang Putride, le Gardien des Limbes", which means "Putrid Blood, Guardian of Limbs" or "Putrid Blood, Hellgate's Keeper".
