title: Card Trivia:Seven Cities of the Golden Land
wikitext: |-
  {{Navigation}}

  * "[[Eldlich the Golden Lord]]" appears in this card's artwork, transforming into "[[Eldlich the Mad Golden Lord]]".
  * This card's name is a reference to the [[wikipedia:Seven Cities of Gold|Seven Cities of Gold]].
  * This is the only "[[Golden Land]]" card that does not mention the "[[Eldlich]]" archetype.
