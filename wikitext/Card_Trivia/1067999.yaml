title: Card Trivia:Infinite Heavy Cavalry Buildragoon
wikitext: |-
  {{Navigation}}

  * This [[monster]] is an [[Retrain|upgrad]]ed form of "[[Constructor Wyrm Buildragon]]" combined with "[[Wyrm Excavator the Heavy Cavalry Draco]]" (together with "[[Wyrm Excavator the Heavy Cavalry Draco (L)|Wyrm Excavator the Heavy Cavalry Draco [L]]]" and "[[Wyrm Excavator the Heavy Cavalry Draco (R)|Wyrm Excavator the Heavy Cavalry Draco [R]]]").
  ** Both this monster and "Wyrm Excavator the Heavy Cavalry Draco" are [[Level]] [[Level 10|10]] [[Effect Monsters]] with equal [[ATK]]/[[DEF]] ([[2500 ATK Monster Cards|2500]]/[[0 DEF Monster Cards|0]]), and have "Heavy Cavalry" in their names. 
  ** As "Wyrm Excavator the Heavy Cavalry Draco" is a [[Maximum Monster]], it is a suitable [[Tribute]] to fulfil the [[Summoning condition|condition]] for this monster's [[Summon|Summoning]] [[effect]].
