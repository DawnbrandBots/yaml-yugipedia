title: Card Trivia:Element Soldier
wikitext: |-
  {{Navigation}}

  * This is the only monster in the [[Element]] series to share its type with another member of the series, "[[Element Doom]]".
  * The members of the [[Element]] series always depict the monsters' color scheme and respective card artworks to correspond with the [[Attribute]]s they gain their effects from; in this case of this monster, it is [[WATER]] and [[EARTH]].
  ** This monster's color scheme features a blue-colored cape (WATER), and brown-colored armor (EARTH).
  ** This card's artwork depicts water flowing from this monster's spear (WATER) and a solid ground (EARTH).
