title: Card Trivia:Eldlixir of White Destiny
wikitext: |-
  {{Navigation}}

  * The item embedded in the chest of "[[Eldlich the Golden Lord]]" appears in this card's artwork.
  * This is one of three "[[Eldlixir]]" cards that represents the three stages of the ''[[wikipedia:Magnum opus (alchemy)|Magnum opus]]'' process. ("[[Eldlixir of Black Awakening]]" → "'''Eldlixir of White Destiny'''" → "[[Eldlixir of Scarlet Sanguine]]")
  ** This card is based on [[wikipedia:Albedo|albedo]] (or '''whiteness'''), the second step of the process representing purification and refinement.
  *** In alchemy, the process of whiteness is the second step in the pathway to the [[wikipedia:Philosopher's stone|philosopher's stone]] following the chaotic process of nigredo, which can wash away the impurities via ''[[wikipedia:Aqua vitae|aqua vitae]]''. Fittingly, this card's artwork depicts the spiral item's color being white, which was transformed from its blackened state and would later transform into its red state in the aforementioned cards' artworks.
