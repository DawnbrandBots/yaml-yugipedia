title: Card Trivia:Old Entity Cthugua
wikitext: |-
  {{Navigation}}

  * This card's name and art is a reference to [[wikipedia:Cthugha|Cthugha]], a fictional deity from the works of American horror writer [[wikipedia:H. P. Lovecraft|H. P. Lovecraft]] (though he was actually created by writer [[wikipedia:August Derleth|August Derleth]]). He is said to resemble a giant ball of fire and is served by the Flame Creatures of Cthugha.
