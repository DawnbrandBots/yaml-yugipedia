title: Card Trivia:Tyr, the Vanquishing Warlord
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Týr|Týr]], the god of war in [[wikipedia:Norse mythology|Norse mythology]] whose right hand was bitten off by the wolf creature, [[wikipedia:Fenrir|Fenrir]]. Ironically, this monster is depicted wielding its sword in its ''right'' hand.
  ** This monster, along with its accompanying [[Match winner]], "[[Lorelei, the Symphonic Arsenal]]", both share a German theme, referencing how they were released as [[Yu-Gi-Oh! World Championship 2008 prize cards|prize cards]] at the 2008 ''Yu-Gi-Oh!'' World Championship, which was held in [[wikipedia:Germany|Germany]].
