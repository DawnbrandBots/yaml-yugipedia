title: Card Trivia:Danmari @Ignister
wikitext: |-
  {{Navigation}}

  [[File:Ai_vicious.png|thumb|right|250|Ai attempts to devour [[Roken Kogami|Varis]].]]

  * The "[[@Ignister]]" logo is located in the center of this monster's head, serving as the eye.
  * This monster represents [[Ai]], the [[DARK]] [[Ignis]].
  ** This monster's name is similar to "'damare'", the Japanese onomatopoeia for "silence", which is what [[Yusaku Fujiki]] would often say to Ai to silence him in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** This monster's appearance is based on the form Ai takes when he attempts to devour someone in the ''Yu-Gi-Oh! VRAINS'' anime.

