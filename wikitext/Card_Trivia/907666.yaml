title: Card Trivia:Cheering Grass
wikitext: |-
  {{Navigation}}

  * Two "[[Grass]]es" (one of which is a younger version) appear in this card's artwork.
  * This card's name is a play on the [https://en.wiktionary.org/wiki/草生える Japanese internet slang term] meaning "hilarious" (草生える ''kusa haeru'').
