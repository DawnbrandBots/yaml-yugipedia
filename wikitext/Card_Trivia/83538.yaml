title: Card Trivia:Unifrog
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Penetrate Frog" (貫ガエル, ''kangaeru'') is a pun on the Japanese term 「考える」 meaning "to think about". 
  ** The character 「貫」 is short for the Japanese term for "piercing" (貫通, ''kantsuu''), which reflects this monster's effect to "pierce" through the opponent's defenses and attack them directly.
  ** This monster's English name is a pun on "[[wikipedia:Unicorn|unicorn]]", a mythological horse depicted with a single horn on its head, similar to the horn on this monster's head.
