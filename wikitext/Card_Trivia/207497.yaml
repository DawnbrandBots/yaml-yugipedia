title: Card Trivia:Final Prophecy
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's artwork depicts the disembodied hand striking a lightning bolt through a card depicting an image of the [[Earth (planet)|Earth]].
  ** Fittingly, in the the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this card was [[activate]]d, it opened a gateway to [[Barian World]] and threatened to destroy the Earth.
  * This card's Japanese name, "Angolmore", references "''angolmois''", a mysterious word mentioned in a famous prophecy by [[wikipedia:Nostradamus|Nostradamus]], which detailed a tyrant coming to power in the Middle East who could start a war that would affect the entire world in July of 1999; however, the date passed without incident, leaving the prophecy to be incorrect or misinterpreted.
