title: Card Trivia:Judgment Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]''.
  * This monster appears in the artworks of "[[Lightsworn Judgment]]", "[[Michael, the Arch-Lightsworn]]", and "[[Twilight Twin Dragons]]".
  * This monster has a [[DARK]] and a [[Synchro Monster]] [[counterpart]]: "[[Punishment Dragon]]" and "[[Judgment, the Dragon of Heaven]]", respectively. They share the same [[Type]], [[ATK]], and [[DEF]], and also have similar effects.
  * This monster has a younger counterpart: "[[Lightsworn Dragonling]]".
  * "[[Realm of Light]]" can be seen in the background of this card's artwork. It is partially destroyed, so it is likely after the effects of "[[Light of Destruction (card)|Light of Destruction]]", or possibly it was the destructive force of this card's own effect.
  * This monster resembles the Luck Dragon, [[wikipedia:List of The Neverending Story characters|Falkor]], from ''[[wikipedia:The Neverending Story|The Neverending Story]]''.
  ** This monster also resembles a hybrid between a European [[wikipedia:Griffin|gryphon]] and a [[wikipedia:Chinese dragon|Chinese dragon]].
  * This monster's inclusion in ''[[Turbo Pack: Booster One]]'' was the first instance a card was printed in the ''[[TCG]]'' as an [[Ultimate Rare]] without an [[Ultra Rare]], [[Super Rare]] or [[Rare]] counterpart and the first to have a [[Secret Rare]] counterpart that isn't a tin promo.
  * This monster's effect may refer to the concept of [[wikipedia:Last Judgment|Judgment Day]]. In said concept, the world is destroyed by some sort of deity, while "Judgment Dragon" destroys all cards on the field except for itself. The presence of the word "Judgment" in this card's name further reinforces this connection.
