title: Card Trivia:Vaylantz World - Konig Wissen
wikitext: |-
  {{Navigation}}

  * A [[New Master Rule]] [[playmat]] appears in this card's artwork.
  * This card's name, "Konig Wissen", is German for "king" and "to be aware of", respectively.
  * This card is a [[counterpart]] of "[[Vaylantz World - Shinra Bansho]]".
  ** Both are "[[Vaylantz]]" [[Field Spell Card]]s.
  ** This card's artwork depicts a highly futuristic city with a left diagonal view, while the artwork of "Shinrabansho" depicts a traditional Japanese landscape, with a right diagonal view.
  * This card is the only card that can place an arbitrary monster you own in your opponent's Spell/Trap Zone as a Continuous Spell/Trap.
