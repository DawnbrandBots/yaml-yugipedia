title: Card Trivia:Circle of the Fire Kings
wikitext: |-
  {{Navigation}}

  * "[[Legendary Fire King Ponix]]" and the corpse of "[[Fire King High Avatar Garunix]]" appear in this card's artwork.
  ** The former appears to have just been born from the latter, a reference to the rebirth ability of the [[wikipedia:phoenix (mythology)|phoenix]].
  ** While it appears in this card's artwork, "Ponix" would only be released as its own card over 10 years later.

