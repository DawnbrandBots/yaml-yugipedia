title: Card Trivia:Red Arrows
wikitext: |-
  {{Navigation}}

  * "[[Sky Striker Ace - Roze]]" appears in this card's artwork.
  ** This card was revealed on October 12, 2022, exactly three years after the release of "Roze" in the Japanese release of ''[[Ignition Assault]]''.
  ** [[Roze]] is shown using this attack in the ''[[Yu-Gi-Oh! Master Duel]]'' [[Solo Mode]] gate ''[[The Sky Striker's Burden]]''.
  *** In {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|15|ref}}, both [[Azalea]] and [[Camellia]], who are clones of [[Roze (manga)|Roze]], also perform a similar attack called "Crimson Flash Red Arrows" ({{Ruby|閃|せん}}{{Ruby|紅|こう}}のレッドアローズ ''Senkō no Reddo Arōzu'').
  * This card may be named after the [[wikipedia:Red Arrows|Red Arrows]] aerobatics team of the [[wikipedia:Royal Air Force|Royal Air Force]].
