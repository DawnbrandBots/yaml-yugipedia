title: Card Trivia:Trickstar Lilybell
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Trickstar Light Stage]]", "[[Trickstar Temptation]]", and "[[Trickstar Treat]]".
  ** This monster's shadow can be seen cast upon the stage in the artwork of "[[Trickstar Light Arena]]".
  * This monster's name is based on the [[wikipedia:Lily of the valley|lily of the valley]], a species which of toxic woodland flowering plant, which appears as the symbols on the corners of this card's artwork.
  ** This monster's name is also a pun on its appearance, as it is depicted holding a large bell, as the lily of the valley is known for producing bell-shaped flowers.
