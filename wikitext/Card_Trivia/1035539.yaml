title: Card Trivia:Spell Card "Monster Reborn"
wikitext: |-
  {{Navigation}}

  [[File:Spell Card "Monster Reborn".png|thumb|right|200px|[[Dark Yugi (manga)|Dark Yugi]] using "[[Monster Reborn (manga)|Monster Reborn]]" to revive "[[Dark Magician (manga)|Dark Magician]]".]]

  * "[[Dark Magician]]" and the card "[[Monster Reborn]]" appear in this card's artwork.
  ** This card's artwork is based on a panel from {{chapter|Yu-Gi-Oh!|162|ref}} where [[Dark Yugi (manga)|Dark Yugi]] [[Special Summon]]s his "[[Dark Magician (manga)|Dark Magician]]" from his [[Graveyard]] with "[[Monster Reborn (manga)|Monster Reborn]]".
  *** This card's [[Quick-Play Spell Card]] property references the "[[Battle City Rules|Super Expert]]" rules during the [[Battle City (manga)|Battle City]] tournament in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where a player can [[activate]] a [[Set]] non-Quick-Play Spell during the opponent's turn. During the aforementioned scene, Dark Yugi activated "Monster Reborn" during the same turn his "Dark Magician" was destroyed by battle, to [[Special Summon]] that same monster during [[Pandora (manga)|Pandora]]'s turn.
  *** This card's effect preventing the Special Summoned monster from attacking or activating effects during the same time is based on the moment from the aforementioned scene where both Dark Yugi and Pandora Special Summoned their "Dark Magicians" (a [[Normal Monster]]) with "Monster Reborn" at the end of Pandora's [[Battle Phase]] after they destroyed each other by battle.
  *** This effect also resembles the concept of "Summoning Sickness" from other trading card games like Magic: the Gathering which was implemented in the manga "Super Expert" rules. Preventing the Summoned monster from activating effects also resembles how in the manga, some effects are also treated as attacks, which means if they cannot attack, they cannot activate their effects that are treated as an attack either.

