title: Card Trivia:Melffy Statues Game
wikitext: |-
  {{Navigation}}

  * "[[Melffy Pony]]", "[[Melffy Puppy]]", "[[Melffy Rabby]]", and two unnamed "[[Melffy]]" monsters (a penguin and a chinchilla) appear in this card's artwork.
  * This card's name is based on [[wikipedia:Statues (game)|"Statues/Red Light, Green Light"]], a game where players alternate between standing still (acting as statues, or "red light") and moving towards a player at the end of the play area (coming to life, or "green light") without being spotted in the act of moving.
  ** This card's activation effect reflects the above, with the searched "[[Melffy]]" monsters being added to hand signifying "red light", and the forced [[End Phase]] where "Melffy" monsters' effect to [[Special Summon]] themselves from hand can activate signifying "green light".
  ** "Melffy Rabby" appears to be pointing at "Melffy Puppy" falling over, which suggests that it has been caught moving and fell over out of exasperation. It may also be a literal depiction of this card's Japanese name, "A Melffy has Fallen Over", which references the Japanese name for Statues, "Daruma-san ga koronda" (達磨さんが転んだ; lit. "The Daruma Fell Over"), in that "Puppy" has literally fallen over.
