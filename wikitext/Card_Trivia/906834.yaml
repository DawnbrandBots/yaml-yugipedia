title: Card Trivia:Illegal Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Curse of Aramatir]]".
  * This monster is based on the concept of the betrayer, a common [[wikipedia:Role-playing game|role-playing game]] character archetype that switches sides for their own advantage. Fittingly, this monster's [[Attribute]]/[[Type]] is [[DARK]]/[[Fiend]] and features an effect to give the opponent [[control]] of itself.
