title: Card Trivia:Vanquish Soul Pluton HG
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vanquish Soul - Continue?]]".
  * This monster resembles the "stance" archetype of characters in fighting games (e.g. Gen and Vega from ''Street Fighter'', Ivy from ''Soul Calibur'', etc.). Gameplay-wise, like the name suggests, these characters have the ability to alternate between two different fighting stances to fit the opponent or situation at best.
  ** This monster's effect perfectly reflects this, as it can either gain 3000 [[ATK]] or 3000 [[DEF]] based on the cards [[reveal]]ed, with said stats being only useful in [[Attack Position|Attack]] and [[Defense Position]] respectively.
