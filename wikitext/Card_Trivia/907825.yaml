title: Card Trivia:Great Sand Sea - Gold Golgonda
wikitext: |-
  {{Navigation}}

  * "[[Springans Ship - Exblowrer]]" appears in this card's artwork.
  * This card is possibly named after the Indian city of [[wikipedia:Golconda Fort|Golkonda]].
  ** It is possible that this desert is named after "[[Supreme Sovereign Serpent of Golgonda]]", which appears to be its "ruler".
  ** This card's name may also be derived from [[wikipedia:Golgonooza|Golgonooza]], the great city built by [[wikipedia:Los (Blake)|Los]] in [[wikipedia:William Blake's mythology|William Blake's mythology]], which [[The_Valuable_Book_EX_3_card_storylines#The_Foreword_to_a_New_Disturbance...:_The_Opened_Land|The Valuable Book EX 3]] describes as a "city once ruled by iron and arts", possibly related to the technology the [[Springans]] salvage.
