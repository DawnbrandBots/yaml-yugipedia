title: Card Trivia:Obliterate!!!
wikitext: |-
  {{Navigation}}
  [[File:Exodia_attacks_Akenaden's_army.png|thumb|right|250|[[Exodia the Forbidden One (manga character)|Exodia the Forbidden One]] attacks [[Akhenaden (manga)|Akhenaden's]] army of the undead.]]

  * "[[The Legendary Exodia Incarnate]]" appears in this card's artwork.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|330|ref}}, specifically from the panel where [[Exodia the Forbidden One (manga character)|Exodia the Forbidden One]] launches his attack on [[Akhenaden (manga)|Akhenaden's]] army of the undead.
  ** This card's Japanese name, "Exodo Flame", is the [[attack name]] of the ''[[Ka]]'' "Exodia the Forbidden One", as used when performing that attack in the Japanese version of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' and [[Yu-Gi-Oh! (anime)|anime]].
  ** This card's ''[[TCG]]'' name is based on the moment during the English dubbed version of {{episode|Yu-Gi-Oh!|001|ref}} when [[Yami Yugi]] first Summons "Exodia" during his Duel against [[Seto Kaiba]]. Instead of naming the attack, Yugi commands "Exodia" to "obliterate" Kaiba's three "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragons]]".

