title: Card Trivia:Lappis Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ryu-Ge Realm - Sea Spires]]".
  * This monster's Japanese name, "Brilliant Treasure Dragon" ({{Ruby|彩|さい}}{{Ruby|宝|ほう}}{{Ruby|龍|りゅう}} ''Saihōryū''), is a pun on "Rainbow Treasure Dragon" (彩宝龍) and "Catch-and-Release" (再放流), which are both pronounced ''Saihōryū''.
