title: Card Trivia:Breachborrel Dragon
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Breechloader|breechloaders]], a type of firearm that is loaded from the breech (or the rear) of the barrel.
  ** Visually, the back of this monster's head appears to be based on [[wikipedia:Break action|break action]] firearms, specifically, the [[wikipedia:Revolver#Top-break cylinder|top-break revolver]].
