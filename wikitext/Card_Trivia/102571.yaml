title: Card Trivia:Snowman Eater
wikitext: |-
  {{Navigation}}

  * This monster and the snowman that it hides under appears in the card artwork of "[[Snowman Creator]]" and "[[Snowman Effect]]".
  * This card's name is a portmanteau of "[[wikipedia:Snowman|snowman]]" and "man-eater".
  ** This card's artwork depicts the monster hiding under a Japanese two-section snowman, called "Yukidaruma" (Japanese: 雪だるま) for its resemblance to a [[wikipedia:Daruma doll|Daruma doll]].
  ** This card's name and effect are based on "[[Man-Eater Bug]]", which can [[destroy]] a [[monster]] when [[flip]]ped [[face-up]].
