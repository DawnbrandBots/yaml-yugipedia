title: Card Trivia:De-Fusion
wikitext: |-
  {{Navigation}}

  * This card is the opposite [[counterpart]] of "[[Polymerization]]".
  ** This card's name and effect are the opposite of "Polymerization" ("Fusion" in the ''[[OCG]]''), as it can "de-fuse" a [[Fusion Monster]] by separating it into its original forms. This card's artwork further reflect this, as it depicts the monster and the dragon from the artwork of "Polymerization" being forced apart from their combined form and separated into their original forms.
  * This card has multiple counterparts:
  ** Two Fusion-based counterparts: "[[Fusion Buster]]" and "[[Fusion Dispersal]]".
  ** A [[Contact (series)|Contact]] counterpart: "[[Contact Out]]".
  ** Two [[Synchro Monster|Synchro]]-based counterparts: "[[De-Synchro]]" and "[[Discord Counter]]".
  ** An [[Xyz Monster|Xyz]]-based counterpart: "[[Xyz Encore]]".
  ** Two [[Link Monster|Link]]-based counterparts: "[[Blink Out]]" and "[[Link Cancel]]".
  ** A ''[[Rush Duel]]'' counterpart: "[[Fusion Cancel]]".
  ** [[The]] Counterpart: "[[The Cancel]]".
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], and in the ''[[Yu-Gi-Oh! GX]]'' anime, when the [[Point-to-Point Transfer]] effect of "[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]" was used and the [[control]]ler "fused" with "Ra", this card separated both by giving the [[ATK]] of "Ra" to the controller as [[Life Points]] (regardless of where the points came from) and leaving "Ra" with 0 ATK.
