title: Card Trivia:Reprinter
wikitext: |-
  {{Navigation}}

  * Six "[[Printing Presser]]s" appear in this card's artwork.
  * This card's Japanese name, "Duplicate Newspaper" (シンブンシン, ''Shinbunshin'') is a portmanteau of the Japanese words for "newspaper" (シンブン, ''shinbun'') and "duplicate" (ブンシン, ''bunshin''), which also forms a syllabic palindrome.
