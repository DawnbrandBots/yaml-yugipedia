title: Card Trivia:Cupid Kiss
wikitext: |-
  {{Navigation}}

  * This card is a reference to [[wikipedia:Cupid|Cupid]], the Greek god of love who is often depicted as a young, chubby seraph.
  ** In Greek mythology, Cupid's role is to strike anyone with his signature bow and arrow so they would be attracted to the person they would fall in love with. This is reflected in this card's effect to "attract" an opponent's monster with a [[Maiden Counter]] placed on them by the effect "[[Maiden in Love]]", which allows the player [[control]]ling both cards to take control of the opponent's monster.
  * This card's effect is incorporated into the ''[[OCG]]''/''[[TCG]]'' release of "Maiden in Love", which this card was used on in {{episode|GX|020|ref}}.
