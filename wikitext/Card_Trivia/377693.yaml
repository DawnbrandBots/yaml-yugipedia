title: Card Trivia:Curse of Dragonfire
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sky Galloping Gaia the Dragon Champion]]" (as the steed). 
  * This monster is a [[retrained]] counterpart of "[[Curse of Dragon]]".
  ** This monster's [[Field Spell]]-destruction effect is based on a scene during [[Dark Yugi and Insector Haga's Duel (manga)|Dark Yugi and Insector Haga's Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (and its [[Yu-Gi-Oh! (anime)|anime]] [[Yami Yugi and Weevil Underwood's Duelist Kingdom Duel|adaptation]]) where [[Dark Yugi (manga)|Dark Yugi]] uses "[[Curse of Dragon (manga)|Curse of Dragon]]" in combination with "[[Burning Land (manga)|Burning Land]]" to [[destroy]] the [[Forest (terrain)|Forest]] [[terrain]].
