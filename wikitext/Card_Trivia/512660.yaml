title: Card Trivia:D.D. Borderline
wikitext: |-
  {{Navigation}}

  * "[[Freed the Brave Wanderer]]" and "[[Gagagigo]]" appear in this card's artwork.
  ** The events depicted in this card's artwork take place after those depicted in the artworks of "[[Dimensional Prison]]" and "[[Dimensional Fissure]]".
  * This card appears in the Japanese anime artwork of "[[Battle Constant]]".
