title: Card Trivia:Archlord Zerato
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Ancient Sanctuary]]'' and ''[[The Sanctuary in the Sky (set)|The Sanctuary in the Sky]]''.
  * This monster appears in the artwork of "[[Advance Draw]]".
  * "[[The Sanctuary in the Sky]]" appears in the background of this card's artwork.
  * This monster is "[[Warrior of Zera]]" on the path of discovering "The Sanctuary in the Sky" and obtaining the power of the "Archlords", only to be later corrupted by it and fall into the darkness.
  ** "[[Warrior of Zera]]" → "[[The Sanctuary in the Sky]]" → "[[Zeradias, Herald of Heaven]]" → "[[Angel of Zera]]" → "'''Archlord Zerato'''" → "[[Darklord Zerato]]"
  * This monster is based on the archangel [[wikipedia:Zerachiel|Zerachiel]], an angel known for carrying souls into judgment.
  ** This monster's effects reflects this, as it allows the player to [[send]] the "soul" of a [[LIGHT]] monster to the [[Graveyard]] and bestow "judgment" on the opponent by [[destroy]]ing their monsters.
  * This monster has three [[counterpart]]s:
  ** A [[DARK]] [[Fiend]] counterpart: "[[Mazera DeVille]]"
  ** A [[Dark counterpart]]: "[[Darklord Zerato]]"
  ** A ''[[Rush Duel]]'' [[Ritual Monster|Ritual]] counterpart: "[[Zerato, Angel of the Sanctuary]]".
