title: Card Trivia:Majesty's Pegasus
wikitext: |-
  {{Navigation}}

  * "[[Majespecter Cat - Nekomata]]", "[[Majespecter Crow - Yata]]", "[[Majespecter Fox - Kyubi]]", "[[Majespecter Raccoon - Bunbuku]]", "[[Majespecter Unicorn - Kirin]]", and "[[Majester Paladin, the Ascending Dracoslayer]]" appear in this card's artwork.
  ** This card's artwork appears to depicts the transformation of "Majespecter Unicorn" into the steed of "[[Majester Paladin, the Ascending Dracoslayer]]", which first hints the relationship between the "[[Majespecter]]" and "[[Dracoslayer]]" [[archetype]]s.
  * Like the other Field Spells of archetypes related to the "[[Dracoslayer]]" storyline ("[[Ignition Phoenix]]", "[[Dinomic Powerload]]", "[[Amorphous Persona]]", "[[Crystolic Potential]]", "[[Metamorformation]]", "[[Zodiac Sign]]", and "[[Dragonic Diagram]]"):
  ** They are Field Spells that feature a member of the "Dracoslayer" archetype in its artwork.
  ** They support their respective archetype, but are not part of the archetype themselves (they do not have the archetype in their name).
  ** Their Japanese names each have a word abbreviated with an English letter with Furigana. In this card's case, "Pegasus" is written as a "P" with the Furigana "Pegasasu", similar to how "Pendulum" is written as a "P" with the Furigana "Pendyuramu" in Japanese.
