title: Card Trivia:Ghost Wyvern, the Underworld Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spectral Ice Floe]]".
  * Ironically, despite being named after the two-legged [[wikipedia:Wyvern|wyvern]], this monster's design features forearms.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|003|ref}}, specifically from the panel showing [[Hellfire Dragon, Ghost Wyvern (manga)|this monster]] materializing on the [[Skeleton Knight]]'s [[field]] via the effect of "[[Ghost Fusion (manga)|Ghost Fusion]]".
