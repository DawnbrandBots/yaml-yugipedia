title: Card Trivia:Battlewasp - Grand Partisan the Revolution
wikitext: |-
  {{Navigation}}

  * "[[Battlewasp - Arbalest the Rapidfire]]", "[[Battlewasp - Sting the Poison]]", and "[[Battlewasp - Twinbow the Attacker]]" appear in this card's artwork.
  * This monster is named after the [[wikipedia:Partisan (weapon)|partisan]], a polearm used in Europe consisting of a protruding spearhead mounted on a long wooden shaft. Fittingly, the ends of this monster's legs are designed to resemble the protruding spearheads of the partisan weapon.
  ** This monster is also named after a [[wikipedia:Partisan (military)|partisan]], a member of a domestic irregular military force (often called the Resistance) who opposes the occupation of an area by a foreign military power via insurgent movements. This reflects how [[Shinji Weber]], who used the "[[Battlewasp]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, encouraged the [[Commons (ARC-V)|Commons]] to rise up against the oppressive [[Topsiders]].
  * This monster is tied with "[[Battlewasp - Ballista the Armageddon]]" for the highest [[Level]] (12) of all [[Insect]] monsters.
