title: Card Trivia:Bellcat Fighter
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of "bell" and the "[[wikipedia:Grumman F6F Hellcat|Hellcat]]", a [[wikipedia:World War II|World War II]] fighter aircraft. This monster's appearance is also based on the "Hellcat" with stereotypical cat features, including whiskers and a [[wikipedia:Cat bell|cat bell]].
  * This monster appears in the artwork of "[[Stall Turn]]".
