title: Card Trivia:Photon Stream of Destruction
wikitext: |-
  {{Navigation}}

  * This card's name is the attack name of "[[Galaxy-Eyes Photon Dragon]]".
  ** This card is part of the [[signature move]] series, a group of cards named after the attacks or effects of main anime characters' [[Signature card|signature monsters]], that usually require that monster to be on the field.
  ** Its name is a reference to "[[Burst Stream of Destruction]]", the signature move for "[[Blue-Eyes White Dragon]]", which itself was the inspiration for "Galaxy-Eyes".
  ** Despite having the same translated "Destruction" word in their names, the Japanese kanji for "[[Burst Stream of Destruction]]" is "'''滅び'''", whilst this card's is "'''破滅'''".
  ** This card's Italian name does not match with the Italian attack name of "Galaxy-Eyes". In the anime, the attack is called "Fascio Fotonico Distruttivo" ("Destructive Photon Stream"), whereas this card is called "Soffio Fotonico di Distruzione" ("Photon Breath of Destruction"), which is closer to the Italian name of "Burst Stream of Destruction" ("Soffio Esplosivo di Distruzione", which means "Burst Breath of Destruction").
