title: Card Trivia:Little Red Riding Hood
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[wikipedia:Little Red Riding Hood|Little Red Riding Hood]], the protagonist of the titular fairy tale who travels through the woods alone to visit her sick grandmother's cottage. When she arrives at the cottage and sees the Big Bad Wolf disguised as her grandmother he devoured earlier, he proceeds to devour her until she is rescued by a nearby hunter.
  ** This card's effect [[Special Summon]]ing a [[Level 4]] [[Warrior]] monster from the [[Deck]] when it is [[destroyed by battle]] references how Little Red Riding Hood, after being devoured by the Big Bad Wolf, is rescued by the hunter.
  *** Fittingly, in {{episode||196|ref}}, this card's effect Special Summoned "[[Forest Hunter]]", a Warrior monster that is also based on the hunter from ''Little Red Riding Hood''.
