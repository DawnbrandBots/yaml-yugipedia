title: Card Trivia:Full House
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Full house (poker)|full house]], a [[wikipedia:List of poker hands|poker hand]] containing a pair of one rank and three-of-a-kind of a different rank.
  ** This corresponds to this card's effect, though the face-down cards must serve as three-of-a-kind.
  ** This card's art and theme are similar to "[[Straight Flush]]" and "[[Three of a Kind]]".
