title: Card Trivia:Protector of The Agents - Moon
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Moon|Moon]], the natural satellite orbiting around the planet [[wikipedia:Earth|Earth]], both of which appear in this card's artwork
  ** Fittingly, this monster's effect can [[add]] "[[The Agent of Mystery - Earth]]" from the player's [[Deck]] or [[Graveyard]] to their [[hand]].
  * The base kanji of "Protector" (近衛 ''Konoe'') features a pun on the kanji (衛 ''Mamoru''), which is pronounced similar to the Japanese word for "protect" (まもる ''Mamoru''). The same kanji also makes up the Japanese written kanji for "satellite" (衛星 ''eisei''), which literally means "defending star".
