title: Card Trivia:Umegumi the Ruler's Squad
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ruler's Platoon of the Dark Forest - Z]]".
  * This card's name, along with the names of "[[Matsugumi the Ruler's Squad]]" and "[[Takegumi the Ruler's Squad]]", references [[wikipedia:Three Friends of Winter|Three Friends of Winter]], an art motif that comprises the pine (松 ''matsu''), bamboo (竹 ''take''), and plum (梅 ''ume'').
