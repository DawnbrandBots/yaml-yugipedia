title: Card Trivia:Demand Man
wikitext: |-
  {{Navigation}}

  * This monster's name reflects its effect to "demand" an opponent's [[Defense Position]] monster to switch to [[Attack Position]].
  * In the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime, this card's [[Attribute]] is [[DARK]]; however, in the English dubbed version, its Attribute is changed to [[WIND]].
