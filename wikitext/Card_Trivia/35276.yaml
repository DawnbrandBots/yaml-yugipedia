title: Card Trivia:Andro Sphinx
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Sphinx|androsphinx]], one of the many depictions of the sphinx in Egyptian architecture, in which it is depicted as a lion with the head or face of a man.
  ** The word "Andro-" is the Greek root for "man" or "masculine", referencing how it is the the male counterpart to the female "[[Sphinx Teleia]]".
