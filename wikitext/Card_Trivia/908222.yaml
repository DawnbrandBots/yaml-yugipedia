title: Card Trivia:Virtual World Phoenix - Fanfan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Virtual World Gate - Chuche]]".
  * This monster is based on the [[wikipedia:Fenghuang|Fenghuang]] (zh: 凤凰 ''fènghuáng''), mythological birds found in East Asian mythology that reign over all other birds.
  * This card's Japanese ''kanji'' name is a [[wikipedia:reduplication|reduplication]] of the Chinese character ''huáng'' (凰; "huáng"), the feminine component of the Fènghuáng's name. However, strangely, the ''huáng'' is applied with the reading ''fan'', which is based on the Mandarin Chinese reading of ''fèng'' (鳳/凤) in ''fènghuáng'', the masculine component of the name.
