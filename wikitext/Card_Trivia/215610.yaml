title: Card Trivia:Turnabout
wikitext: |-
  {{Navigation}}

  * The scene on this card seems to illustrate the final fate of the [[Royal|emperor]], suggesting that he is being punished by a higher authority for his previous tyrannical outbursts as well as the successful revolution shown in "[[Royal Surrender]]".
  * The emperor from this card appears in the artwork of "[[The Emperor's Holiday]]", "[[Tyrant's Temper]]", "[[Tyrant's Tirade]]", "[[Tyrant's Tantrum]]", "[[Tyrant's Tummyache]]", "[[Tyrant's Throes]]", "[[Double Payback]]", "[[The Huge Revolution is Over]]", "[[Asleep at the Switch]]", "[[Retort]]" and "[[Clear Robe]]".
