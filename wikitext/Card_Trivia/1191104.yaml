title: Card Trivia:Swift Panther Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sleeping Scapegoats]]".
  * This monster is a [[retrained]] [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart of "[[Panther Warrior]]".
  ** This monster's pose is based on the pose of "Panther Warrior" from an omake of {{chapter|Yu-Gi-Oh!|179|ref}}, albeit with a few added details.
  ** This monster's Japanese title, "Gale-Swift", is a reference to the [[flavor text]] of "Panther Warrior" in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video games, which states that "Panther Warrior" can attack faster than the wind.
