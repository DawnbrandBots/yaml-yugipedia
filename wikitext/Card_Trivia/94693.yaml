title: Card Trivia:Fortress Whale
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sea Stealth II]]".
  * This monster is based on the [[wikipedia:narwhal|narwhal]], a species of toothed whale known for their single tusk protruding from their face.
  * This monster has two [[retrained]] counterparts: "[[Citadel Whale]]" and "[[Mega Fortress Whale]]".
  * This is the first [[Fish]] [[Ritual Monster]].
  * This is the only prize card [[Joey Wheeler]] owns that he never uses in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, most likely due to the fact that he did not acquire its corresponding [[Ritual Spell Card]], "[[Fortress Whale's Oath (anime)|Fortress Whale's Oath]]".
  * This is one of the few cards to appear in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga that debuted in other media. This card first appeared in ''[[Yu-Gi-Oh! Duel Monsters II: Dark Duel Stories]]'', which preceded its manga appearance by over a year.
