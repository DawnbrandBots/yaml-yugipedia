title: Card Trivia:Crimson Gaia
wikitext: |-
  {{Navigation}}

  [[File:Crimson Gaia.png|thumb|right|200|[[Jack Atlas (ARC-V)|Jack Atlas]] with "[[Scarlight Red Dragon Archfiend (anime)|Scarlight Red Dragon Archfiend]]", as seen in ''[[UNLEASH]]''.]]

  * "[[Red Dragon Archfiend]]" appears in this card's artwork.
  ** This card's artwork references a scene from the third opening of the ''[[Yu-Gi-Oh! ARC-V]]'' anime, ''[[UNLEASH]]'', where a silhouette of "[[Scarlight Red Dragon Archfiend (anime)|Scarlight Red Dragon Archfiend]]" is seen behind flames after being Summoned by [[Jack Atlas (ARC-V)|Jack Atlas]].
  * This card's Japanese name, "Crimson Hellgaia", sounds similar to the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "[[Jeweled Red Dragon Archfiend (manga)|Hot Red Dragon Archfiend]]" in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga: "Crimson Hellfire".

