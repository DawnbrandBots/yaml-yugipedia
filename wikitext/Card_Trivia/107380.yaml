title: Card Trivia:Power Break
wikitext: |-
  {{Navigation}}

  * The monster "[[Power Tool Dragon]]" and the cards "[[Axe of Despair]]", "[[Double Tool C&D]]", "[[Big Bang Shot]]" and "[[United We Stand]]" appear in this card's artwork.
  ** "Double Tool C&D" is shown as being equipped to "Power Tool Dragon".
  ** The '''''4''''' Equip Spell Cards present in this card's artwork seems to contradict this card's effect, however this is because the artwork accounts for this card's anime effect, which does not possess the "up to 3 Equip Spells" limitation.
