title: Card Trivia:Abare Ushioni
wikitext: |-
  {{Navigation}}

  * "[[The Kick Man]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[The Big Cattle Drive]]".
  * This monster is based on the ''[[wikipedia:Ushi-oni|ushi-oni]]'', a type of ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore that is depicted with a horned bovine head.
  * This monster shares the same [[Attribute]] ([[EARTH]]), [[Level]] (4), [[original ATK and DEF]] (1200/1200), and effect with "[[Gamble Angel Bunny]]".
  ** In ''GX Duel Memorial Album #06'', printed in ''V Jump'' March 2026, [[Masahiro Hikokubo]] explained that this wasn't a coincidence, as this monsters was supposed to be used by [[Pierre]] in {{episode|GX|043|ref}}; however, its visual image was too far away or inconsistent with the character and aesthetics of Pierre, so they decided to swap out the monster.
