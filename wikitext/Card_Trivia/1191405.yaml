title: Card Trivia:Clock Tower Prison City - Dark City
wikitext: |-
  {{Navigation}}

  * "[[Destiny HERO - Doom Liege]]" appears in this card's artwork.
  * This card is a combined [[counterpart]] of "[[Clock Tower Prison]]" and "[[Dark City]]".
  * This card's artwork is based on a scene from {{episode|GX|58|ref}}, where  "[[Destiny HERO - Doom Lord]]" is summoned and stands menacingly in front of the moon while "Clock Tower Prison" is in play.
