title: Card Trivia:Cash Back
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]", "[[Jar of Greed]]", and the shopkeeper from the artworks of "[[Fine]]" and "[[Jar Robber]]" appear in this card's artwork.
  * This card is a parody [[counterpart]] of "[[Forced Back]]".
  ** Both are [[Counter Trap Card]]s: this card can [[negate]] a [[Spell]]/[[Trap Card]] or [[monster effect]], while "Forced Back" can negate a [[Normal Summon|Normal]] or [[Flip Summon]].
  *** Both can [[return]] the negated card: to the [[Deck]] for this card and to the [[hand]] for "Forced Back".
  ** Their artworks depict a monster and a shattered item being blown back by a white explosion. The pose of "Goblin of Greed" in this card's artwork and "[[Nanobreaker]]" in the artwork of "Forced Back" is also similar.
