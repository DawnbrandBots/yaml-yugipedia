title: Card Trivia:Ninja Master Shogun
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's title is derived from a "[[wikipedia:Shogun|shogun]]", the title for a military commander-in-chief of Japan from the 12th century to the 19th century. The shogun is ranked higher than ninjas, which reflects this monster's effect to [[Special Summon]] two "[[Ninja]]" monsters (a "[[Ninja Commander]]" monster and a "[[Ninja Soldier]]" monster) from the [[Deck]].
