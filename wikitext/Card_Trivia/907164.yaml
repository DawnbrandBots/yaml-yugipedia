title: Card Trivia:Joruri-P.U.N.K. Madame Spider
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[P.U.N.K. JAM Extreme Session]]" and "[[P.U.N.K. JAM FEVER!]]".
  ** This monster also appears in the artworks of [[Joruri-P.U.N.K. Dangerous Gabu]]" (with a slightly different head) and "[[Joruri-P.U.N.K. Nashiwari Surprise]]" (in slightly different colors).
  * ''[[wikipedia:Jōruri (music)|Jōruri]]'' is a form of traditional Japanese narrative music, and ''[[wikipedia:Bunraku|Ningyō jōruri]]'' is a form of traditional Japanese puppet theatre.
  ** This monster is based on ''Tonight Spider Thread'', a ''jōruri'' play.
