title: Card Trivia:Elemental HERO Grand Neos
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectible Tins 2007 Wave 1]]''.
  * This monster appears in the artwork of "[[Instant Contact]]".
  * This monster is a [[Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Grand Mole]]".
  * This card's Spanish printed effect has a minor errata, as it says "de '''m'''odo Especial" instead of "de '''M'''odo Especial" (relating to its [[Special Summon]]).
