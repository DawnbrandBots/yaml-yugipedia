title: Card Trivia:Dracotail Lukias
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ketu Dracotail]]".
  * This monster is based on the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Cancer (constellation)|Cancer]].
  ** The [[Wikipedia:Astrological sign|astrological sign]] for [[wikipedia:Cancer (astrology)|Cancer]] appears on this monster's chest and in the centers of the zodiac wheels in its hands.
  * "[[Dracotail Arthalion]]" is a combined [[Fusion Monster|Fusion]] form of this monster and "[[Dracotail Pan]]".
