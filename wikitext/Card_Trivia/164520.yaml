title: Card Trivia:Infernity Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Void Cauldron]]".
  * This is the only "[[Infernity]]" monster that does not have an effect that [[activate]]s or applies when the player has no cards in their [[hand]].
  * In the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, this monster is named "Purgatory Knight" by [[Kalin Kessler (manga)|Kalin Kessler]], despite being listed as "Infernity Knight".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|017|ref}}, specifically from the panel showing [[Infernity Knight (manga)|this monster]] being Summoned via its effect.
