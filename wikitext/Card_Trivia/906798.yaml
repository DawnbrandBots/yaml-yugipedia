title: Card Trivia:Shinonome the Vaylantz Priestess
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mamonaka the Vaylantz United]]", "[[Vaylantz Wakening - Solo Activation]]", and "[[Vaylantz Wave - Master Phase]]".
  ** A chibi minifigure of this monster appears in the artwork of "[[Vaylantz Wars - The Place of Beginning]]" and "Vaylantz Awakening - Solo Activation".
  * Shinonome (東雲) means Dawn in Japanese.
