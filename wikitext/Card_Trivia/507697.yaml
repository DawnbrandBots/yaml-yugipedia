title: Card Trivia:D.D. Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Brain Reboot]]", "[[D/D Recruits]]", "[[D/D/D Headhunt]]", "[[Dimension Fusion]]", "[[Dimension Reversion]]", and "[[Return from the Different Dimension]]".
  * This was one of the first cards able to [[banish]] other cards.
  * This monster has a possible older, [[DARK]] [[Synchro Monster|Synchro]] version: "[[Dark Dimension Soldier]]".
