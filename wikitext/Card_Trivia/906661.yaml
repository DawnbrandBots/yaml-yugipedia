title: Card Trivia:S-Force Orrafist
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[S-Force Bridgehead]]" and "[[S-Force Showdown]]".
  * The "[[S-Force]]" crest (white coloration) appears on this card's artwork, located on "Orrafist's" left shoulder though partially concealed by his collar.
  * Like other "[[S-Force]]" with a rival, this card's effect is very effective at stoping "[[Time Thief Redoer]]" : destroying it before it could use it's effect.
