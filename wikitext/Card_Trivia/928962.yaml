title: Card Trivia:Gunkan Suship Uni-class Super-Dreadnought
wikitext: |-
  {{Navigation}}

  * Several copies of this monster appear in the artwork of "[[Gunkan Sushipyard Seaside Supper Spot]]".
  ** This card's artwork appears in the artwork of "[[Gunkan Suship Catch-of-the-Day]]".
  * This monster is a [[Card evolutions|combined]] [[Xyz Monster|Xyz]] form of "[[Gunkan Suship Shari]]" and "[[Gunkan Suship Uni]]".
  ** This monster is based on a [[wikipedia:Dreadnought|super-dreadnought]] and [[wikipedia:Sushi|sushi]] rice (しゃり ''Shari'') adorned with [[wikipedia:Sea urchin|sea urchin roe]] (うに ''Uni'').
  ** The word 「うに」 (''Uni'') appears on the front of this monster.
  ** This card's [[ATK]]/[[DEF]] are equal to the combined ATK/DEF of "Shari" and "Uni".
  ** Fittingly, this card's effects can be applied if it is [[Xyz Summon]]ed using both "Shari" and "Uni" as [[Xyz Material]]s.
  ** This monster's cannon's are based on soy sauce packets; this monster also has lemon slices, cucumber slices, and [[wikipedia:Wasabi|wasabi]].
