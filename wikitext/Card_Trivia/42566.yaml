title: Card Trivia:Tricky Spell 4
wikitext: |-
  {{Navigation}}

  * This card's name is based on its usage in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where [[Atem]] used this card to [[Special Summon]] four "[[Tricky Token]]s", one for each monster [[Yugi Muto]] controlled at the time, during their [[Duel]].
  * This is the first [[Common]] card to be released among the previously ''[[OCG]]''-exclusive cards in the new [[Booster Pack]]s in the ''[[TCG]]''.
