title: Card Trivia:Vala, Seidhr of the Generaider Bosses
wikitext: |-
  {{Navigation}}

  * This card is named after ''[[wikipedia:Seeress (Germanic)|vǫlva]]'' (lit. "staff bearer", sometimes anglicized as "vala"), a female seer in Norse religion and a recurring motif in [[wikipedia:Norse mythology|Norse mythology]]. In the ''[[wikipedia:Völuspá|Vǫluspá]]'', a ''vǫlva'' prophesized the events of [[wikipedia:Ragnarök|Ragnarök]].
  ** "Seidhr" refers to ''[[wikipedia:Seiðr|seiðr]]'', a form of Norse sorcery related to divination and the shaping of the future. The practice of seiðr is considered feminine, although practitioners can be both male and female.
  * This monster is the younger form of "[[Hela, Generaider Boss of Doom]]".
  ** This monster appears to be sitting on a younger version of "[[Jormungandr, Generaider Boss of Eternity]]".
  *** In Norse mythology, [[wikipedia:Hel (mythological being)|Hel]] and [[wikipedia:Jörmungandr|Jörmungandr]] are siblings.
