title: Card Trivia:Gravity Blaster
wikitext: |-
  {{Navigation}}

  * "[[Number 9: Dyson Sphere]]" appears in this card's artwork.
  ** Fittingly, "Dyson Sphere" was the monster [[equip]]ped with this card in {{episode|ZEXAL|056|ref}}. Also, its ''[[OCG]]''/''[[TCG]]'' effect to be specifically equipped to a [[Machine]] monster is based on how "Dyson Sphere" is a Machine monster.
  * This is the first (and so far only) [[Equip Spell Card]] in the ''OCG''/''TCG'' that gives a permanent [[ATK]] boost, regardless of what happens to the Equip Spell Card.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when a monster equipped with this card attacks, it can shoot red lasers with sound effects identical to the lasers used by [[wikipedia:TIE Fighter|TIE Fighters]] in the ''[[wikipedia:Star Wars|Star Wars]]'' franchise.
