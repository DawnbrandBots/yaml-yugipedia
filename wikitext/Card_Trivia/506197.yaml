title: Card Trivia:Double-Edged Sword Technique
wikitext: |-
  {{Navigation}}

  * "[[The Six Samurai - Kamon]]" and "[[The Six Samurai - Yariza]]" appear in this card's artwork.
  * This card's name is based on "double-edged sword", a situation that has both positive and negative consequences, or advantages and disadvantages, occurring simultaneously. This relates to this card's effect to [[Special Summon]] two "[[Six Samurai]]" monsters from the [[Graveyard]] with the advantage of using their effects, but also having the disadvantage of [[destroy]]ing at the [[End Phase]] and taking damage equal to their combined [[ATK]].
  * This card's artwork is similar to those of "[[Order to Smash]]" and "[[Queen's Pawn]]".
