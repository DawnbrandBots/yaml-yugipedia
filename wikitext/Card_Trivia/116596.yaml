title: Card Trivia:The Fabled Unicore
wikitext: |-
  {{Navigation}}

  * This card is based on the mythical [[wikipedia:Unicorn|unicorn]].
  * The imp-like creature in this card's artwork also appears in that of "[[The Fabled Kudabbi]]"'s.
  ** The white colour of the creature seems to refer to this card's status as a [[Synchro Monster]], all of which have white card backgrounds.
  ** This creature's name is Gree as pointed out in [[Duel Terminal Master Guide]].
  * This card has a "[[lswarm]]" counterpart, "[[Evilswarm Thanatos]]".
  ** In "Thanatos'" artwork, "[[Fabled Ragin]]" is mounted on this card.
  * This card has a "[[Nekroz]]" counterpart, "[[Nekroz of Unicore]]".
  * As this card's negation effect is [[Continuous]], this is one of the very few cards that can actually negate "[[Super Polymerization]]" or other similar cards that prevent the activation of effects in response.
