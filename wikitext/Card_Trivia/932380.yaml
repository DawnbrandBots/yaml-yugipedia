title: Card Trivia:Tamarolling
wikitext: |-
  {{Navigation|mode=nongame}}

  * Three copies of "[[Tamabot]]" appear in this card's artwork.
  * This card's name is a portmanteau of "Tamabot" and "[[wikipedia:Egg rolling|egg rolling]]", a game traditionally played during [[wikipedia:Easter|Easter]] that involves rolling eggs.
