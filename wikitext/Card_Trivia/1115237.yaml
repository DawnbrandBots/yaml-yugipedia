title: Card Trivia:Wish of OuTerverSe the World-Shattering Emperor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[OuTerverSe Maximum Mode Out]]".
  * This monster is an [[OuTerverSe (series)|OuTerverSe]] [[counterpart]] of "[[Super Galaxy King Lord of Galactica]]" and "[[Supreme Machine Magnum Overlord]]".
  ** In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, when this monster and its components' [[Type]] becomes [[Galaxy]], they take on the color scheme of "Lord of Galactica".
  * This monster's Japanese name (破界王帝ウィッシュ・オブ・アウターバース, ''Hakaiōtei Wisshu Obu Autābāsu'') contains "''Ōtei Wisshu''" (王帝ウィッシュ), which is a pun on the alternate alias of [[Otes]] in the Sengoku period, "Usu Otei" (翁丁臼, ''Ōtei Usu'').
  * This is the first [[Maximum Monster]] to be [[Maximum Summon]]ed using components that treat themselves as the required components in the [[hand]] in ''Yu-Gi-Oh! GO RUSH!!'' anime.
  * This monster has a [[Spellcaster]] [[Ritual Monster|Ritual]] [[counterpart]], "[[Majesty of OuTerverSe]]", as noted by their similar, red-armored robotic designs and allusions to one of Otes's two true designs. Of the two, this monster's aged and bulky appearance references Otes's design as Usu Otei.
