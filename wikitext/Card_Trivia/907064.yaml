title: Card Trivia:Libromancer Fire
wikitext: |-
  {{Navigation}}

  * "[[Libromancer Geek Boy]]" appears in this card's artwork.
  ** In the universe that the "[[Libromancer]]" archetype is set in, this monster is a comic book character named "[https://web.archive.org/web/20220202212747/https://pbs.twimg.com/media/FKm1G98XwAkw8XS.jpg:large Firestarter]" that came to life.
  ** This card's artwork depicts "Libromancer Geek Boy" having bought clothes for "Firestarter" so that he can fit in better while in the real world as "Fire".
  * This monster appears in the artwork of "[[Libromancer Origin Story]]".
