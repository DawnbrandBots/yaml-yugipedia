title: Card Trivia:Great White
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Squirt Squid]]".
  * This monster is based on the [[wikipedia:Great white shark|great white shark]].
  ** This monster also features a [[wikipedia:Remora|remora]], a type of fish who spends their lives clinging to larger sea life, including sharks.
  * This card has a [[Fusion Monster]] [[recolored counterpart]]: "[[Man-eating Black Shark]]".
  * The icon for [[Fish]]-Type monsters in ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'' is based on this monster.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|061|ref}}, specifically from the panel where this monster is Summoned.
