title: Card Trivia:Forbidden Lance
wikitext: |-
  {{Navigation}}

  * Similarly to the other "[[Forbidden (archetype)|Forbidden]]" [[Spell Card]]s, this lance is based on a holy relic, the [[wikipedia:Holy Lance|Holy Lance]], which was used to pierce the side of [[wikipedia:Jesus|Jesus]] as he hung on the cross during his crucifixion.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Forbidden Lance]]".
