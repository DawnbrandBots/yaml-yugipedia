title: Card Trivia:Rank-Up-Magic Dark Force
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The sealed form of "[[Number 39: Utopia]]" appears in this card's artwork.
  * This is the second of two "[[Rank-Up-Magic]]" cards to Special Summon 2 Xyz Monsters simultaneously; the first being "[[Double-Rank-Up-Magic Utopia Force]]".
