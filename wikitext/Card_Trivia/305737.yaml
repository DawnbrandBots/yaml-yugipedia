title: Card Trivia:Satellarknight Altair
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Altair|Altair]], the brightest star in the [[wikipedia:Aquila (constellation)|Aquila constellation]].
  ** The constellation Aquila appears in the artwork of this card, with Altair's location in said constellation denoted by an encircled star.
  ** [[wikipedia:Vega|Vega]], Altair and [[wikipedia:Deneb|Deneb]] are the three stars of the [[wikipedia:Asterism (astronomy)|asterism]] known as the [[wikipedia:Summer Triangle|Summer Triangle]].
