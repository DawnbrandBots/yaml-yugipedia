title: Card Trivia:Mount Sylvania
wikitext: |-
  {{Navigation}}

  * "Sylvania" is a Latin word the means "forest land".
  ** This card's artwork and English name may be based on the U.S. state of [[wikipedia:Pennsylvania|Pennsylvania]], which has a deciduous forest [[wikipedia:Biome|biome]] and the [[wikipedia:Appalachian Mountains|Appalachian Mountains]] running through most of its center, resulting in landscape similar to the one depicted in this artwork. It may also refer to the real-world [[wikipedia:Mount Sylvania|Mount Sylvania]], an extinct volcano which is part of the [[wikipedia:Boring Lava Field|Boring Lava Field]] on the outskirts of [[wikipedia:Portland, Oregon|Portland, Oregon]].
  * This mountain appears in the artworks of "[[Orea, the Sylvan High Arbiter]]", "[[Sylvan Bladefender]]", and "[[Sylvan Waterslide]]".
  * "[[Sylvan Hermitree]]", "[[Sylvan Sagequoia]]", and the glow from the artwork of "[[Sylvan Blessing]]" appear in this card's artwork.
