title: Card Trivia:Baggy Pants Lavasaurus
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is named after [[wikipedia:Wide leg jeans|baggy pants]], a type of leg wear which are at least twenty inches in circumference at the hem, which this monster's legs resembles.
  ** In Japanese modern culture, this type of leg wear is also known as "''bontan''" and it is stereotypically associated with juvenile delinquents and gang members. This reflects this monster's owner, [[Scorch]], who serves as one of the leaders of his gang along with [[Chills]].
