title: Card Trivia:Amaze Attraction Cyclo-Coaster
wikitext: |-
  {{Navigation}}

  * "[[Amazement Administrator Arlekino]]" appears in this card's artwork, riding on the roller coaster.
  ** This card's bulleted effect and roller coaster's design are based on the effect and visual design of "[[Sacred Phoenix of Nephthys]]".
  * This [[wikipedia:Roller coaster|roller coaster]] appears in the artwork of "[[Amazement Precious Park]]".
  ** The event of this card is mentioned on the artwork of "[[Amazing Time Ticket]]".
