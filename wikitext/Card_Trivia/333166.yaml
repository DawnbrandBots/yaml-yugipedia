title: Card Trivia:Spy-C-Spy
wikitext: |-
  {{Navigation}}

  * "[[Mooyan Curry]]" appears in this card's artwork, albeit a simpler design for the handle.
  * "Spy-C" featured in this card's English and Japanese names is a pun on "spicy", which is the term to describe the flavor of curry.
  ** The word "spicy" is also as regarded as the slang word for the term meaning "sexually attractive", which is reflected in this monster's appearance.
  ** "Splendid" (華麗 ''karei'') in this card's Japanese name, "Splendid Spy - C" (華麗なる密偵－Ｃ ''Kareinaru Supai - Shī'') has an almost identical pronunciation to the English pronunciation of ''karē'' (カレー) "curry".
  * This card is based on [[wikipedia:Amy Elizabeth Thorpe|Amy Elizabeth Thorpe]], an American World War II spy codenamed "Cynthia", who obtained intelligence by entering romantic relationships with foreign diplomats.
