  * This card replaces the place of "[[Ten Thousand Dragon]]" in the ''[[TCG]]'' release of ''[[Ignition Assault]]'', as at the time, the number of cards released in that format had not surpassed 10,000 until the release of ''[[Battles of Legend: Armageddon]]''.
