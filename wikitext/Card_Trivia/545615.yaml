title: Card Trivia:Madolche Fresh Sistart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Madolche Promenade]]".
  * This monster's name is a portmanteau of "[[Wikipedia:Nun|sister]]" and "[[Wikipedia:Tart|tart]]".
  ** A tart is a baked dessert dish that consists of a pastry base filled with custard and topped with "fresh" fruit. Fittingly, this monster's jigsaw puzzle-piece platform is based on a tart.
  ** A sister is commonly used to address a nun, a woman who vows to dedicate her life to religious service and contemplation, often associated with [[Wikipedia:Christianity|Christianity]]. Fittingly, this monster's dress is based on a Christian nun, while the stained glass pattern on the top of the tart and the windows in the background of this card's artwork are based on the tall stained glass windows found in Christian churches.
