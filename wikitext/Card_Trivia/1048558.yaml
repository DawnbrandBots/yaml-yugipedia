title: Card Trivia:Heretical Phobos Covos
wikitext: |-
  {{Navigation}}

  * This monster is named after "''phobos''", the Ancient Greek word meaning "fear" and the root of the English word "phobia". The word also serves as the name of [[wikipedia:Phobos (mythology)|Phobos]], the god of fear in [[wikipedia:Greek mythology|Greek mythology]].
  * This is the first [[Illusion]] [[Xyz Monster]].
