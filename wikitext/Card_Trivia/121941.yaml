  * This monster's 3D model in the video-game ''[[Yu-Gi-Oh! Forbidden Memories]]'' is a mask with a soul like body and floating hands. However, its 3D model in the video-game ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' is a magician with a mask.
