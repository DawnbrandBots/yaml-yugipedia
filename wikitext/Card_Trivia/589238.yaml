title: Card Trivia:Magician of Black Chaos MAX
wikitext: |-
  {{Navigation}}

  * This card's artwork was drawn by [[Kazuki Takahashi]].
  * This monster is the [[retrained]] counterpart of "[[Magician of Black Chaos]]".
  * This monster's last effect to add a [[Spell Card]] from the [[Graveyard]] to the [[hand]] is a reference to the first effect of "[[Dark Magician of Chaos]]".
