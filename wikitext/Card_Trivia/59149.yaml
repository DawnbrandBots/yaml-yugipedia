title: Card Trivia:Self-Destruct Button
wikitext: |-
  {{Navigation}}

  * This is another view of "[[Kozaky's Self-Destruct Button]]".
  * This card's effect is comparable to that of "[[Life Equalizer]]", which also forces both players' [[Life Points]] to the same value and requires a high difference between the players' LP to activate.
  * This was the first ''OCG''/''TCG'' card that [[Changes your Life Points|changes your LP]] to a set number regardless of what you originally had.
