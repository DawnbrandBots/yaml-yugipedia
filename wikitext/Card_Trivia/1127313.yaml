title: Card Trivia:D/D/D Sky King Zeus Ragnarok
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Zeus|Zeus]], the god of the sky and the king of the gods in [[wikipedia:Greek mythology|Greek mythology]], and [[wikipedia:Ragnarök|Ragnarok]], an apocalyptic series of future events in [[wikipedia:Norse mythology|Norse mythology]].
  * This monster is a [[Link Monster|Link]] counterpart of "[[D/D/D Oblivion King Abyss Ragnarok]]".
