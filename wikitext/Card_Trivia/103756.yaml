title: Card Trivia:Tiger Dragon
wikitext: |-
  {{Navigation}}

  * This card is a combination of a [[wikipedia:Tiger (zodiac)|Tiger (虎)]] and a [[wikipedia:Dragon (zodiac)|Dragon (龍)]], which are animals of the [[wikipedia:Chinese Zodiac|Chinese Zodiac]]. Both are presented in various Chinese art and martial art as equal rivals that represent matter and spirit, respectively.
  * "[[Baby Tiragon]]" may be the younger version of this monster.
