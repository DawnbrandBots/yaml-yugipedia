title: Card Trivia:D.D. Unicorn Knight
wikitext: |-
  {{Navigation}}

  * This monster's appearance resembles its owner, [[Andre]], while wearing his [[Turbo Duel]]ing uniform worn by [[Team Unicorn]].
  ** This monster's name and effect to [[Special Summon]] a [[Level 3]] or lower [[banish]]ed non-[[Tuner monster]] references how Andre's Dueling strategy revolves around banishing cards in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
