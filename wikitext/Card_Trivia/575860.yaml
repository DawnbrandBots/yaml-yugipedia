  * This monster appears in the artwork of "[[T.G. All Clear]]".
  * Visually, this monster resembles [[Bruno|Antimony]], who uses the "[[T.G.]]" [[archetype]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's shield resembles [[Delta Eagle]], the name of Antimony's [[Duel Runner]] in the anime.
