title: Card Trivia:Noble Arms of Destiny
wikitext: |-
  {{Navigation}}

  * These weapons appear in the artwork of "[[Noble Knight Gwalchavad]]".
  * This card's artwork is a possible reference as to how [[Noble Knight Gwalchavad|Galahad]] obtained his first sword.
  * This card is the first "[[Noble Arms]]" card that depicts a different weapon in its artwork besides a sword.
  ** It is also the first in the same archetype to contain the word "of" instead of a dash in its card name.
