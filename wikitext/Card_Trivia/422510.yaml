title: Card Trivia:Zany Zebra
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a portmanteau of "Wicked" (ヨコシマ ''yokoshima'') and "[[wikipedia:Zebra|Zebra]]" (シマウマ ''shimauma''). It can also be interpreted as "Horizontally"  (ヨコ ''yoko'')  "Striped" (シマ ''shima'') and "[[wikipedia:Horse|Horse]]" (ウマ ''uma'').
  * This monster appears in the artwork of "[[Pendulum Hole]]".
