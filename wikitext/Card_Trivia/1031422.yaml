title: Card Trivia:Blaze Fiend Overlord Luciless
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[High-Grade Collection]]''.
  * This monster is a retrained [[counterpart]] of "[[Blaze Fiend Overlords Beelucitaroth]]".
  * This is the first [[Level 10 Monster Cards|Level 10]] monster in ''[[Yu-Gi-Oh! Rush Duel]]'' that is neither a [[Maximum Monster]] or a [[Fusion Monster]].
  ** This monster's [[Level]] (10) is equal to the level of "Blaze Fiend Overlords Beeluciroth" while in Maximum Mode, due to its [[effect]] [[This card gains Levels|increasing its Level]] ([[Level 4 Monster Cards|4]]) by [[Level 6 Monster Cards|6]] while in Maximum Mode.
