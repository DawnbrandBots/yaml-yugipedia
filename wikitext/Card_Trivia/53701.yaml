title: Card Trivia:Aurkus, Lightsworn Druid
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Druid (Dungeons & Dragons)|druid]], a character class in role-playing games with the ability to shapeshift into a beast, which reflects its [[Beast-Warrior]] [[Type]] instead of a [[Warrior]] or [[Spellcaster]] Type, despite its human-like appearance.
  * This is one of the few monsters (if not the only monster) to feature an effect that prevents the [[target]]ing of monsters ''anywhere'', including monsters that are in the [[Graveyard]] and/or are [[banish]]ed.
