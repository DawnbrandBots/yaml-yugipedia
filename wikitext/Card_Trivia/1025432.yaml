title: Card Trivia:Ritual Beast Inheritance
wikitext: |-
  {{Navigation}}

  * "[[Ritual Beast Tamer Lara]]", "[[Ritual Beast Tamer Zeframpilica]]", "[[Ritual Beast Tamer Zefrawendi]]", and the remains of "[[Ritual Beast Ulti-Gaiapelio]]" appear in this card's artwork.
  ** A spirit resembling a younger version of "[[Spiritual Beast Apelio]]" is emerging from the remnant flames of "Gaiapelio", presumably fusing with "Lara" to become "[[Spiritual Beast Tamer Lara]]".
