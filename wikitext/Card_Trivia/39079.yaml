title: Card Trivia:Bamboo Scrap
wikitext: |-
  {{Navigation}}

  * "[[Griggle]]" appears in this card's artwork.

  * This card's Japanese name {{Ruby|竹|ちく}}{{Ruby|頭|とう}}{{Ruby|木|ぼく}}{{Ruby|屑|せつ}} ("Bamboo Head Wood Chips") is an idiom from the story of [[wikipedia:Tao Kan|Tao Kan]] - a general from the Jin dynasty who collects the seemingly useless throwaway bamboo chips scrap and sawdust from shipbuilding, only to find them very useful later on. The idiom is later used with meaning: "Don't overlook anything. Even the tiniest thing that seems useless in the first glance would have its own value if used correctly."
  ** This is reference by the effect of this card, as at first glance [[Tribute|Tributing]] your own monster and giving your opponent 2 Tokens only gives your opponent advantage.
