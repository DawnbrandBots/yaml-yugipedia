title: Card Trivia:Aluber the Dogmatic
wikitext: |-
  {{Navigation}}

  * "[[Aluber the Jester of Despia]]" appears in this card's artwork.
  ** This card's Japanese name, "Aluber the Wicked Dogmatic" ({{Ruby|凶|きょう}}{{Ruby|導|どう}}{{Ruby|者|しゃ}}アルベル '' Kyōdōsha Aruberu'') name is a reference to the real wicked nature of the "[[Dogmatika]]" Church, who turned out to be a facade for the "[[Despia]]" monsters.
  *** The kanji ''Kyōdō'' ({{Ruby|凶|きょう}}{{Ruby|導|どう}}, lit. "heretical") in this card's Japanese name is the same as the kanji in the names of the "Dogmatika" [[Ritual Monster]]s and [[Ritual Spell]]s, and is a homophone of ''Kyōdō'' ({{Ruby|教|きょう}}{{Ruby|導|どう}}, lit. "dogmatic") in the names of the other "Dogmatika" cards.
  ** This card's artwork depicts "Aluber" unmasked, revealing that he is identical to "[[Fallen of Albaz]]".
  *** This card's [[flavor text]] also implies that "Albaz" may be the other half of "Aluber", as it describes the latter as ''a thing separated by the Abyss''.
  **** The hair color of "Aluber" (red with white streaks) is also the opposite of that of "Albaz" (white with red streaks).
  * This card has a [[counterpart]]: "[[Albaz the Shrouded]]".
  ** Both monsters also have mirrored poses in their card artworks.
