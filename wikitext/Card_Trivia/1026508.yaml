title: Card Trivia:Performage Stilts Launcher
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Stilts#Entertainment|stilt walker]], a circus performer who walks around with a pair of stilts, a pair of poles with foot support designed for someone to stand above the ground.
  ** This monster is depicted using the two magical staffs as stilts, using the base of those staffs for foot support. Ironically, this monster is also holding onto the two staffs in a typical fashion for a pair of stilts, whereas stilt walkers use their stilts without ever holding on to the poles.
  * This monster has the highest [[Level]] (6) and [[original ATK]] (2200) of all [[Main Deck]] "[[Performage]]" monsters.
