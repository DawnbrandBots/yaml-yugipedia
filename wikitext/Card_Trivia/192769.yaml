title: Card Trivia:M-X-Saber Invoker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Xyz Imprisonment]]".
  * This is the first and only "[[X-Saber]]" [[Xyz Monster]], as well as the only "X-Saber" monster whose name does not begin with "X".
  ** This is also the first Xyz Monster from a [[Duel Terminal]] [[archetype]] to be released, before ''[[Duel Terminal - Vylon Descends!!]]''.
