title: Card Trivia:Token (Kaiba and Blue-Eyes White Dragon)
wikitext: |-
  {{Navigation}}

  * This card's quote "Yugi... it's finally time for our true conclusion... !!" (遊戯・・・いよいよ真の決着をつける時が来たな・・・！！) is taken from {{chapter|Yu-Gi-Oh! Duelist|192|ref}}, just before [[Seto Kaiba (manga)|Seto Kaiba]] and [[Dark Yugi (manga)|Dark Yugi]] begin [[Dark Yugi and Seto Kaiba's Battle City Duel (manga)|their Duel]].
  ** It is also used in {{episode|Yu-Gi-Oh!|129|ref}}, the episode based on this chapter.
