title: Card Trivia:Doll Monster Miss Mädchen, Re-Customized
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Girl-chan", features the honorific "-chan", which is used to describe affection and intimacy towards girls.
  ** This monster's international name, "Mädchen", is the German word for "girl".
  * This monster is a [[Card evolutions|re-customized]] form of "[[Doll Monster Miss Mädchen, Customized]]".
  ** Visually, this monster is "Doll Monster Miss Mädchen" with the wing and tail of "[[Doll Monster Mr. Dragon]]" sewn into its head and torso, respectively, and the eye of "[[Doll Monster Rob Robot]]" attached to its right eye.
