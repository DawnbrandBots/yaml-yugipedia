title: Card Trivia:Domain of the True Monarchs
wikitext: |-
  {{Navigation}}

  * "[[Caius the Shadow Monarch]]", "[[Erebus the Underworld Monarch]]", "[[Granmarg the Rock Monarch]]", "[[Mobius the Frost Monarch]]", "[[Raiza the Storm Monarch]]", "[[Thestalos the Firestorm Monarch]]", and "[[Zaborg the Thunder Monarch]]" appear in this card's artwork.
  ** This card's artwork depicts the Monarchs in the foreground kneeling before "Erebus", implying that they are subservient to the latter.
