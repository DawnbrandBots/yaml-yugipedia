  * This is one of the [[cover card]]s of ''[[Expert Edition Volume.2]]''/''[[Dark Revelation Volume 2]]''.
  * This monster is based on [[wikipedia:Anubis|Anubis]], the god of mummification and the underworld in Ancient Egyptian mythology, who is depicted with the head of a jackal.
