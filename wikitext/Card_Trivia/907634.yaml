title: Card Trivia:Masquerade the Blazing Dragon
wikitext: |-
  {{Navigation}}

  * "[[Aluber the Jester of Despia]]" possessing the wings of this monster appears in the artworks of "[[Branded in Red]]", "[[Branded Disciple]]", and "[[Branded Lost]]".
  ** "[[The Bystial Aluber]]" possessing the wings of this monster appears in the artwork of "[[Etude of the Branded]]".
  * This monster is a "[[Despia]]"-oriented [[Card evolutions|empowered]] form of "Aluber the Jester of Despia".
  ** The kanji ''Kaku'' ({{Ruby|赫|かく}}, lit. "bright") in this card's Japanese name is the same as ''Aka'' ({{Ruby|赫|あか}}, lit. "red") in the name of "Branded in Red", a [[Spell Card]] that can [[Fusion Summon]] this card.
  ** This monster's name ("Masquerade") and appearance are a reference to the theatrical masks worn by "Aluber" and the "Despia" monsters. This monster also has the same red hair color as "Aluber".
  ** This card is also a [[Fiend]] monster, like the "Despia" [[Fusion Monster]]s.
  * This card is the "Despia" [[counterpart]] of "[[Albion the Branded Dragon]]".
  ** Both are [[Albaz Dragon|draconic]] forms of "[[Fallen of Albaz]]"/"Aluber the Jester of Despia".
  ** Both have similar "[[Branded]]" Spell Cards that can Fusion Summon them: "Branded in Red" for this card and "[[Branded in White|in White]]" for "Albion".
