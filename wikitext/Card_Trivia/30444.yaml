title: Card Trivia:Miraculous Rebirth
wikitext: |-
  {{Navigation}}

  * The [[Graveyard]] shown in the card art may be the same as the one shown in "[[Soul Reversal]]".
  * The effect is a Chain-based upgraded version of "[[Monster Reborn]]".
  ** Like "[[Accumulated Fortune]]", this card replicates the effect of a [[Forbidden]] card, but requires a Chain Link of 4 or higher to activate.
