title: Card Trivia:Bujingi Ophidian
wikitext: |-
  {{Navigation}}

  * This monster appears in its armament form in the artworks of "[[Bujincarnation]]", "[[Bujinfidel]]", and "[[Bujintei Susanowo]]".
  * [[wikipedia:Ophidia|Ophidian]] is a name given to any member of the [[wikipedia:Clade|clade]] Ophidia, a group of [[wikipedia:Squamata|squamate]] reptiles that includes modern snakes and all reptiles more closely related to snakes than to other living groups of lizards.
  * This monster is based on the Orochi-no-Hire (Snake[-repelling] Scarf), which is another of the Tokusa-no-Kandakara. This item either repels snakes, or helps heal wounds inflicted by snakes. It is also said to give the bearer qualities of a snake.
