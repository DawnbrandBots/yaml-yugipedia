title: Card Trivia:Shien's Castle of Mist
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a [[wikipedia:Japanese castle|shiro]], or Japanese castle.
  ** This shiro appears in the artwork of "[[Temple of the Six]]".
  * This is one of only three [[Field Spell Card]]s that weaken opposing monsters while not altering the [[ATK]] or [[DEF]] of monsters from the supported [[archetype]]. The others are "[[Otherworld - The "A" Zone]]" for "[[Alien]]" monsters, and "[[Wattcastle]]" for "[[Watt]]" monsters.
