title: Card Trivia:Magnet Warrior Sigma Plus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Magnet Bonding]]" and "[[Magnet Conductor Plus]]".
  * This monster's name is based on [[wikipedia:Sigma|sigma]] (Σ), the eighteenth letter of the [[wikipedia:Greek alphabet|Greek alphabet]].
  * This monster has a [[counterpart]]: "[[Magnet Warrior Sigma Minus]]"
  ** Both have an inverted [[original ATK and DEF]], with this monster featuring 1800 [[ATK]] and 1500 [[DEF]].
  ** Both monsters' Japanese naming schemes are puns on the kanji for "warrior" (士) featured in the base Japanese name for the "[[Magnet Warrior]]" [[archetype]] (戦士), which resembles a plus sign (+) written over the minus sign (-).
  * This monster's ''[[OCG]]''/''[[TCG]]'' effects to force the opponent's monsters to attack and allowing the player to choose the attack targets of the opponent's [[EARTH]] monsters reference the strategy of [[Bastion Misawa]]'s Earth Deck, which involves manipulating attack targets with [[Plus monster|Plus]] and [[Minus monster|Minus]] sub-types, where monsters of either sub-type must attack monsters with the opposite sub-type, which in turn references the attraction between magnets with different polarities. In {{episode|GX|036|ref}}, this effect was used against the "[[Amazoness]]" [[archetype]], which primarily consist of EARTH monsters.
