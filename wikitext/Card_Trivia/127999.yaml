title: Card Trivia:Dawn of the Herald
wikitext: |-
  {{Navigation}}

  * A statue of "[[Herald of Perfection]]" appears in this card's artwork.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Dawn of the Herald]]".
  * This is the third [[Ritual Spell Card]] with an effect besides the [[Ritual Summon]] of a monster (after "[[Ritual of Grace]]" and "[[Ritual of Destruction]]"); however, it is the first to feature an effect only works on a specific monster.
  * This is the first and only Ritual Spell Card that Ritual Summons only one specific [[Ritual Monster]] ("Herald of Perfection" in this case) and requires the total [[Level]](s) of the Tribute(s) to equal the exact Level of the Ritual Monster.
