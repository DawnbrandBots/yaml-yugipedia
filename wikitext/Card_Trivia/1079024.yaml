title: Card Trivia:Elttaes, the MASTER of DUELS
wikitext: |-
  {{Navigation}}

  * The artworks of "[[Ash Blossom & Joyous Spring]]", "[[Blue-Eyes Alternative White Dragon]]", "[[Diabellstar the Black Witch]]", "[[Divine Arsenal AA-ZEUS - Sky Thunder]]", "[[Evilswarm Exciton Knight]]", "[[Mirror Force]]", "[[Nibiru, the Primal Being]]", "[[Solemn Judgment]]", "[[Super Rejuvenation]]", "[[Super Starslayer TY-PHON - Sky Crisis]]", and "[[The Bystial Lubellion]]" appear in this card's artwork.
  * This monster's name is the city of [[wikipedia:Seattle|Seattle]] spelled backwards, which is the location where the [[Yu-Gi-Oh! World Championship 2024|''Yu-Gi-Oh!'' World Championship 2024]] was held.
  ** This monster's [[Cyberse]] Type and technological design likely references how Seattle features one of the world's largest [[wikipedia:List of technology centers|technology center clusters]].
  ** This monster's title, "MASTER of DUELS" references the title of ''[[Yu-Gi-Oh! Master Duel]]''.
  * This is the first [[Level 6]] monster that requires three [[Tribute]]s to be [[Tribute Summon]]ed, as well as the first Level 6 monster to require more than one Tribute to be Tribute Summoned.
  * This card and "[[Dragon of Illumination, Sanctuary's Shield]]" are the first ''[[Yu-Gi-Oh! Rush Duel]]'' cards to be printed in English.
  ** This card and "Dragon of Illumination, Sanctuary's Shield" are also the first [[Match winner]]s to be released in ''Yu-Gi-Oh! Rush Duel''.
  *** Furthermore, this is the first time a ''[[Yu-Gi-Oh! World Championship]]'' prize card matches one released in a different year rather than the one it was paired with.
