title: Card Trivia:Silver Spirit Ukyo
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Mirror Bind]]" and "[[Mirror Call]]".
  * This monster is likely a reference to [[wikipedia:Ukyo-ku, Kyoto|Ukyo-ku]], the western ward in the city of [[wikipedia:Kyoto|Kyoto]] posed on the right side of the [[wikipedia:Kyoto Imperial Palace|Kyoto Imperial Palace]].
  ** "Ukyo-ku" means "the ward on the Emperor's right"; this monster's right arm is covered in drill-shaped bandages.
  ** While residing in the Kyoto Imperial Palace, the emperor would sit facing south, thus making it appear that the west was facing right, while the eastward [[wikipedia:Sakyo-ku, Kyoto|Sakyo-Ku]] would be facing left; this reflects this monster's mirror relationship with "[[Silver Spirit Sakyo]]".
