title: Card Trivia:Zoroa, the Magistus of Flame
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Zoroaster|Zoroaster]], founder of [[wikipedia:Zoroastrianism|Zoroastrianism]].
  * This monster appears in the artworks of "[[Magistus Theurgy]]" and "[[Magistus Vritra]]".
  * This card has a [[Fusion Monster]] counterpart: "[[Zoroa, the Magistus Verethragna]]".
  * Visually, "[[Zoroa, the Magistus Conflagrant Calamity]]" is this monster combined with "[[Vahram, the Magistus Divinity Dragon]]".
  ** "Zoroa, the Magistus Conflagrant Calamity" also has the same [[DEF]] and [[Type]] as this card.
