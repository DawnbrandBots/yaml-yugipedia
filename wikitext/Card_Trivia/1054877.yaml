title: Card Trivia:Veidos the Dragon of Endless Darkness
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2024]]''.
  * This monster appears in the artworks of "[[Ashened to Endlessness]]" and "[[Rekindling the Ashened]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Veidos the Eruption Dragon of Extinction]]".
  * This is the first Fusion Monster to require a variable number of [[Fusion Material]]s that does not have an effect dependent on the number of Fusion Materials used for its [[Fusion Summon]].
  ** However, a related card that can be used to Fusion Summon it, "[[Ashened to Endlessness]]", does have an effect based on the number of Fusion Materials used when Fusion Summoning with its effect; specifically, it makes the Summoned monster gain 500 [[ATK]] for each material used.
