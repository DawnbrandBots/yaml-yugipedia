title: Card Trivia:Kuraz the Light Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Tribute Carnival]]" and "[[Triumph of the Monarchs]]".
  * This monster's Japanese name, "''Kuraisu''" is derived from "''Kuraisuto''", an affected phonetic translation of "[[wikipedia:Christ|Christ]]".
  * This monster can be considered a [[LIGHT]] [[counterpart]] of "[[Delg the Dark Monarch]]":
  ** Both feature opposite [[Attributes]] and naming schemes.
  ** Both feature effects that involves removing up to two [[target]]ed cards and an additional effect involving depleting the top cards of the player's Deck equal to the number of cards removed.
  ** Both are the only members of the [[Monarch (series)|Monarch]] [[series]] to not have an effect that [[activate]]s only when they are [[Tribute Summon]]ed, as well as the only members of the series to feature an attack restriction.
