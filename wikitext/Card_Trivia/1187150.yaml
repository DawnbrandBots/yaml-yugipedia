title: Card Trivia:Galactica Fusion Space
wikitext: |-
  {{Navigation}}

  * This card's effect of Fusion Summons a [[LIGHT]] or [[DARK]] Attribute Galaxy Type monster by the effect of "[[Fusion]]" with the hand is based on the Duel that occurred in {{episode|GO RUSH!!|98|ref}}, where [[Yudias Velgear]] and [[Zuwijo Zwil Velgear]] used "Fusion" with this Field Spell activated for Fusion Summon "[[Eternal Galactica Oblivion]]" and "[[Voidvelg Apocalypse]]" respectively.
