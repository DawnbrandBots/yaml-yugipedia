title: Card Trivia:Cyber Prima
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Prima Light]]".
  * This monster is based on the ''prima ballerina'', the highest ranked dancer in a ballet or a ballet company.
  ** Fittingly, in the ''[[Yu-Gi-Oh! GX]]'' anime, this monster can be Summoned via the effect of "[[Prima Light (anime)|Prima Light]]" by [[send]]ing "[[Cyber Tutu (anime)|Cyber Tutu]]" from the player's [[field]] to the [[Graveyard]], likely in reference to how a ''ballerina'' is promoted to the rank of ''prima ballerina''.
  * This is the first and currently only member of the [[Cyber Girl]] [[series]] whose [[Attribute]] is not [[EARTH]].
  * This monster has the highest [[original ATK]] (2300) of all members of the Cyber Girl series.
