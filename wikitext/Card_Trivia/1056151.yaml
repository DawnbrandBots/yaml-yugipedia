title: Card Trivia:Depresspard
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|五月豹|ゴガツビョウ}}, ''Gogatsubyō'') is a portmanteau of the words for "May's Blues" (五月病, ''Gogatsubyō'') and "leopard" ({{Ruby|豹|ヒョウ}}, ''Hyō'', rendered as the [[wikipedia:Rendaku|voiced]] ''Byō'').
  ** This monster's name is a wordplay on the "May Blues" (''Gogatsubyō''), a Japanese malaise that affects people in the month of May where they fall under depression or anxiety when starting a new life.
  *** This monster's appearance reflects this, as it is depicted as a depressed leopard who is afflicted with "May Blues". Furthermore, its effect to inflict its controller with the [[battle damage]] it would inflict on the opponent instead reflects the effect of the "May Blues" it has over people.
  *** The month of May (written in Japanese as "''Gogatsu''" (五月)) is commonly known as the fifth month of the year. This is reflected in this monster's effect, allowing its [[ATK]] to become 2500 (which is based on the number "25", the number "5" squared) or 5000.
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "depression" and "leopard".
