title: Card Trivia:The Transmigration Prophecy
wikitext: |-
  {{Navigation}}

  * "[[Transmigration Break]]" continues the event shown in this card's artwork.
  * This card appears in the artwork of "[[Volcanic Cyclone]]".
  * "[[Hidden Spellbook]]" is a strictly worse version of this card, except for the fact that it can be revealed to activate "[[Spellbook of the Master]]", and this card cannot.
  * "[[Pot of Benevolence]]" is the Spell Card version of this card, except its controller can only activate 1 per turn, and it banishes itself afterwards.
