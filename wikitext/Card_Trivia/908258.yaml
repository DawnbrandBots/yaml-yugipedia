title: Card Trivia:Superheavy Samurai Prodigy Wakaushi
wikitext: |-
  {{Navigation}}

  * This monster's name references Ushiwakamaru, the childhood name of the famous military commander, [[wikipedia:Minamoto no Yoshitsune|Minamoto no Yoshitsune]] whose loyal vassal [[wikipedia:Benkei|Benkei]] served him until his death.
  * Visually, this monster is based on [[Yuya Sakaki]], the best friend of [[Gong Strong]], who uses the "[[Superheavy Samurai]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** The background of this card's artwork is based from the scene in {{episode|ARC-V|001|ref}} where Yuya first appears during his Duel with Gong, taking place on an [[Action Field]] featuring a full moon.
  * This monster has an [[counterpart|upgraded]] [[Synchro Monster|Synchro]] form: "[[Superheavy Samurai Commander Shanawo]]".
  ** Both monsters share the same [[Attribute]] ([[DARK]]), being two non-[[EARTH]] "Superheavy Samurai" monsters. Also, this monster has half the [[Level]] (4) and 1000 less [[ATK]]/[[DEF]] than "Shanawo".
  ** Both monsters feature a similar design, which includes a mainly green torso with identical legs, a similar sword (indicated by its hilt), and feature a similar head with heterochromic eyes.
  ** Both monsters are each based on the man who defeated Benkei in different ways, which parallels how Yuya defeated Gong in {{episode|ARC-V|026|ref}}.
