title: Card Trivia:Ritual of the Matador
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * "[[Matador Archfiend]]" appears in this card's artwork.
  * This card's Japanese name, "{{translated name|Ritual of the Matador|ja}}", is based on the "''paseo''" (a.k.a. "''paseíllo''"), the Spanish word for "promenade", the opening parade marking the beginning of a bullfight in which the bullfighters, picadors, and other participants enter the arena.
