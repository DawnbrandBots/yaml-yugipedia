title: Card Trivia:Air Fortress Ziggurat
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Sky Union]]".
  * This monster is named after a [[wikipedia:Ziggurat|ziggurat]], a stepped pyramidal structure built in ancient [[wikipedia:Mesopotamia|Mesopotamia]] which is believed to be the dwelling place of each Mesopotamian city's patron deity.
  * This monster's bow features a design that resembles the mask of the "[[Robot Token]]s" that it can [[Special Summon]]. This, along with the "Robot Token", are based on [[Dyna Dude]], an action figure that belonged to [[Alister]]'s younger brother, [[Mikey]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
