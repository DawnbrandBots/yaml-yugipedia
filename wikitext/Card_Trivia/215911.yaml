title: 'Card Trivia:Number 88: Gimmick Puppet of Leo'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * The number 88 appears on this monster's right pauldron.
  * This monster's appearance based on a lion sitting on a throne reflects how it is the "king" of the "[[Gimmick Puppet]]" monsters, similar to how the lion is said to be the "king of the jungle".
  * This monster has a [[Ranked-Up]] "[[Number C]]" form: "[[Number C88: Gimmick Puppet Disaster Leo]]".
  * "[[Number]]" monsters often take the form of their owners and/or their original desires; in this monster's case, it represents the personality of [[Quattro]].
  ** Lions are known to have a calm, majestic appearance while at rest, but can be ruthless and bloodthirsty when hunting; this reflects how Quattro disguised himself as a well-mannered man who interacts with people with a noble and polite demeanor when not [[Duel]]ing, but became sadistic and cold when he does Duel especially against anyone who stood in his way.
  ** This monster's effect and appearance are the opposite of those of "[[Number 15: Gimmick Puppet Giant Grinder]]" and "[[Number 40: Gimmick Puppet of Strings]]": while most "Gimmick Puppet" monsters have a disturbing and grotesque appearance, this monster looks more righteous and benevolent.
  *** Also, unlike "Giant Grinder" and "Gimmick Puppet of Strings", this card's effect does not [[destroy]]s monsters or inflicts [[damage]] to the opponent; rather, it focuses on winning through peaceful [[Alternate win conditions|alternative methods]], reflecting Quattro's true kind and noble personality beneath his sadism.
  ** This monster's alternate [[victory condition]] and how it was attempted against [[Shark]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime is a reference to Quattro and Shark's first [[Duel]], where Quattro won against Shark by alternate means by getting him disqualified, as he purposefully left his Deck so that Shark could look at it prior to the match.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[detach]]ed an [[Xyz Material]], it absorbed it in the gem on its sword.
  * This monster is similar to "[[King Landia the Goldfang]]".
  ** Both are based on kings with a lion-like design.
  ** Both are [[Rank]] 8 [[Xyz Monster]]s that require 3 [[Level]] 8 monsters as [[Xyz Material]]s to be [[Xyz Summon]]ed.
  ** This monster is a [[Duel winner]], while "Landia" is a [[Match winner]].
