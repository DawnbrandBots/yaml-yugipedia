title: Card Trivia:Break! Draw!
wikitext: |-
  {{Navigation}}

  * "[[Levia-Dragon - Daedalus]]" appears in this card's artwork.
  * The card's name reflects its effect, which [[activate]]s when the [[equip]]ped monster [[destroy]]s (or "breaks") a monster by battle, allowing the player to "[[draw]]" a card.
  ** This card's ''[[TCG]]'' names are likely a reference to ''[[wikipedia:Kiai|kiai]]'', the practice of shouting when making an attack (usually consisting of a monosyllable exclamation), as indicated by the two separate exclamation marks.
  * This card's ''[[OCG]]''/''TCG'' [[condition]], allowing it to be equipped to a [[Machine]] monster is based on its appearances in the ''[[Yu-Gi-Oh! 5D's]]'' anime, in which it was equipped to "[[Power Tool Dragon (anime)|Power Tool Dragon]]", a Machine monster.
