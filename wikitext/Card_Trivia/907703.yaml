title: Card Trivia:Drytron Beta Rastaban
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Drytron Nova]]" and "[[Drytron Asterism]]".
  * This monster's name is based on the [[wikipedia:Beta Draconis|Rastaban]], the binary star system located in the northern constellation of [[wikipedia:Draco (constellation)|Draco]], which is also designated as "Beta Draconis".
