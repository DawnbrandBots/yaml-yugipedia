title: Card Trivia:Phantasm Emperor Trilojig
wikitext: |-
  {{Navigation}}

  * This monster references the three [[Sacred Beast]]s ({{Ruby|三|さん}}{{Ruby|幻|げん}}{{Ruby|魔|ま}}, ''Sangenma''), used by [[Kagemaru]] and [[Yubel (character)|Yubel]], antagonists from the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This monster's name is a corruption of the word "[[wikipedia:Trilogy|trilogy]]", which is a set of three distinct works that are often connected to each other.
  *** Fittingly, in the ''[[OCG]]''/''[[TCG]]'', this monster requires '''three'''  [[Level 10]] monsters as [[Fusion Material]], and the '''three''' original Sacred Beasts are eligible for this monster's [[Fusion Summon]].
  *** In {{chapter|ARC-V|033|ref}}, this monster was Fusion Summoned using the '''three''' "Mystic Factors" "[[Mystic Factor Balthazar|Balthazar]]", "[[Mystic Factor Caspar|Caspar]]", and "[[Mystic Factor Melchior|Melchior]]" as [[Fusion Material]]. All three "Mystic Factors" are Level 10 monsters, which serve as the basis of this monster's required Fusion Material in the ''OCG''/''TCG''.
  * This monster's ''OCG''/''TCG'' pose is taken from a panel from the above-mentioned chapter of the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga showing [[Phantasm Emperor Trilojig (manga)|this monster]] attacking [[Yuya Sakaki (manga)|Yuya Sakaki]] directly.
