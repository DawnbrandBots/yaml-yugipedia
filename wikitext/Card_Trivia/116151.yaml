title: Card Trivia:Cyber Laser Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cyber Network]]".
  * This monster is named after the Laser power-up from the [[Konami]] video game series, ''[[wikipedia:Contra (video game)|Contra]]''.
  ** In ''Contra'', the Laser is known for its incredible destructive power, which is reflected in this monster's effect to [[destroy]] one monster with a higher [[ATK]] or [[DEF]].
  * This monster has a defensive counterpart: "[[Cyber Barrier Dragon]]".
  ** Both monsters are named after power-ups from the ''Contra'' video game series.
  ** Both monsters can be [[Special Summon]]ed using a specific [[Spell]]/[[Trap Card]] that requires a "[[Cyber Dragon]](s)" to be [[Tribute]]d.
  * This card has a [[retrained]] ''[[Rush Duel]]'' counterpart: "[[Cyber Assault Dragon]]".
