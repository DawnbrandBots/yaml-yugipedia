title: Card Trivia:Battlin' Boxing Cross Counter
wikitext: |-
  {{Navigation}}

  [[File:CestusandLionHeartBrawl3.png|thumb|250px|"[[Number 54: Lion Heart (anime)|Number 54: Lion Heart]]" and "[[Number C105: Battlin' Boxer Comet Cestus (anime)|Number C105: Battlin' Boxer Comet Cestus]]" hit each other.]]

  * "[[Number 54: Lion Heart]]" and "[[Number C105: Battlin' Boxer Comet Cestus]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|130|ref}} where "[[Number 54: Lion Heart (anime)|Number 54: Lion Heart]]" and "[[Number C105: Battlin' Boxer Comet Cestus (anime)|Number C105: Battlin' Boxer Comet Cestus]]" battle each other using their fists.
  * This card's name is based on the [[wikipedia:Cross-counter|cross-counter]], a boxing technique where a punch is thrown immediately after an opponent's jab to exploit the opening in their position.
  ** This card's Japanese name, "Burning Knuckle Cross Counter", is based on the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack name]] of "Number 54: Lion Heart" in the original Japanese version of the ''Yu-Gi-Oh! ZEXAL'' anime: "Burning Cross Counter".

