title: Card Trivia:Red-Eyes Black Dragon Sword
wikitext: |-
  {{Navigation}}

  * The silhouette of "[[Red-Eyes Black Dragon]]" (from its first ''[[OCG]]''/''[[TCG]]'' artwork) appears in this card's artwork.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster was created by fusing "Red-Eyes Black Dragon" with "[[The Claw of Hermos]]".
  *** Fittingly, this monster shares the same [[Attribute]] ([[DARK]]), [[Level]] (7), [[Type]] ([[Dragon]]), and [[original ATK and DEF]] (2400/2000) as "Red-Eyes Black Dragon".
  * This is the last "The Claw of Hermos" [[Fusion Monster]] to be used by [[Joey Wheeler]] in the ''Yu-Gi-Oh!'' anime.
  * In the ''OCG''/''TCG'', this is the only "The Claw of Hermos" Fusion Monster whose Attribute is not [[LIGHT]].
