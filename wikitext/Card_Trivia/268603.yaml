title: Card Trivia:Risebell the Star Adjuster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Unending Nightmare]]".
  * This card's name, "Star Adjuster", is a reference to its effect of changing [[Level]]s, which supports [[Synchro Summon|Synchro]] and [[Xyz Summon]]s.
  * This monster is "[[Risebell the Summoner]]" transformed by "[[Hypnosister]]", as depicted in the artwork of "[[Wavering Eyes]]".
  ** Later, this monster returns to being "Risebell the Summoner", as depicted in the artwork of "[[Unwavering Bond]]".
  * This monster has an [[Card evolutions|enhanced]] form: "[[Risebell the Star Psycher]]".
