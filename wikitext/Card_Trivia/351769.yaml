title: Card Trivia:Dragonox, the Empowered Warrior
wikitext: |-
  {{Navigation}}

  * This card has a [[LIGHT]] counterpart: "[[Dragodies, the Empowered Warrior]]".
  ** Both "Dragodies" and this monster are two alternative forms of "[[Ventdra, the Empowered Warrior]]".
  * This card's name is a [[wiktionary:portmanteau|portmanteau]] of "[[wiktionary:dragon|dragon]]" and the Latin word "nox" meaning "night".
  ** This fits with this card's [[Attribute]] and further strengthens the connection to [[Dragodies, the Empowered Warrior|its counterpart]], who incorporates the Latin word for "day" in its name.
