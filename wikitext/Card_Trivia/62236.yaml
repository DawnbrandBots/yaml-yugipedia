title: Card Trivia:Reptilianne Gorgon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Reptilianne Poison]]" and "[[Reptilianne Spawn]]".
  * This monster is based on the [[wikipedia:Gorgon|Gorgon]], a half-human, half-snake female monster in [[wikipedia:Greek mythology|Greek mythology]] who is known for having sharp fangs and venomous snakes for hair. 
  ** This monster's effect to reduce the opponent's monster's [[ATK]] to 0 and preventing them from changing [[battle position]] is a reference to the Gorgons' power to turn people who look upon it to stone with their gaze, which is reflected in the eyes in the background of this card's artwork. In the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster used its effect, the monster it battled was turned to stone.
  *** This monster shares this effect with another Gorgon-themed "[[Reptilianne]]" monster: "[[Reptilianne Medusa]]".
