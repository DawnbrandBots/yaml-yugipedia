title: Card Trivia:Joe the Pixie
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Small Resistance]]".
  * This monster's name, "Joe", is derived from "[[wikipedia:G.I.|G.I. Joe]]", the slang term for a male soldier in the [[wikipedia:United States Armed Forces|United States Armed Forces]].
  ** This monster's Japanese name (妖精ジョー, ''Yōsei Jō'') is a pun on "Yo, Joe!", the catchphrase featured in the ''[[wikipedia:G.I. Joe|G.I. Joe]]'' franchise.
