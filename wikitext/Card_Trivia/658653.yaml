title: Card Trivia:Shooting Riser Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a younger, [[Tuner Synchro Monster]] form of "[[Shooting Star Dragon]]".
  * This card can be considered a [[counterpart]] of "[[Red Rising Dragon]]". Strangely, while this card is based on [[Yusei Fudo]]'s [[Cosmic Synchro Monster]], "Shooting Star Dragon", "Red Rising Dragon" is related to [[Jack Atlas]]' base [[ace monster]], "[[Red Dragon Archfiend]]", instead.
