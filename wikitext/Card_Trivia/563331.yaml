title: Card Trivia:Shootingcode Talker
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Master Link]]''.
  * This monster appears in the artwork of "[[Cynet Codec]]".
  * This monster's name is based on [[wikipedia:Troubleshooting|troubleshooting]], the process of identifying and fixing the source of a problem in machines and computer programs. The name is also a visual pun, as this monster is depicted getting ready to "shoot" using its bow and arrow.
  * This monster has five "[[Code Talker (archetype)|Code Talker]]" [[counterpart]]s:
  ** [[DARK]]: "[[Decode Talker]]"
  ** [[LIGHT]]: "[[Encode Talker]]"
  ** [[WIND]]: "[[Excode Talker]]"
  ** [[FIRE]]: "[[Powercode Talker]]"
  ** [[EARTH]]: "[[Transcode Talker]]"
