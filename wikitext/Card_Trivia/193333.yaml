title: Card Trivia:ZW - Unicorn Spear
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Unicorn|unicorn]], a mythological horse creature with a single horn on its head, while its weapon form is based on a [[wikipedia:Spear|spear]], a polearm consisting of a long shaft and a pointed head used primarily for thrusting or throwing.
  ** Despite its name, this monster's design is more based on an [[wikipedia:Alicorn|alicorn]], a mythological horse creature with a wings and a horn on its forehead. This is similar to how "[[Crystal Beast Sapphire Pegasus]]" is also based on an alicorn but is named after a [[wikipedia:Pegasus|Pegasus]] instead.
  * This is the first "[[ZW -]]" monster.
  * This is the last card in alphabetical order in the ''[[TCG]]''.
