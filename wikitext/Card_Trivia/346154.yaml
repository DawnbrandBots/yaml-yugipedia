title: Card Trivia:Pot of The Forbidden
wikitext: |-
  {{Navigation}}

  * This monster's name and bulleted effects reference the four [[Spell Card]]s that were [[Forbidden]] in the ''[[OCG]]'' at the time of its release: "[[Pot of Greed]]", "[[Giant Trunade]]", "[[Raigeki]]", and "[[The Forceful Sentry]]", respectively.
  ** Out of the four listed cards, "Raigeki" was [[Limited]] in the ''[[TCG]]'' at the time of this card's release, and would later become Limited in the ''OCG'' as well.
  * This monster, "[[Deus X-Krawler]]", and "[[Subterror Behemoth Voltelluric]]" have the highest [[original DEF]] (3000) of all [[Flip monster]]s.
