title: Card Trivia:Performapal Classikuriboh
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of "[[Kuriboh]]" and "[[wikipedia:Classical music|classical]]", a style of art music written in the Western world.
  ** This monster's appearance is based on the appearance of a [[wikipedia:Conducting|music conductor]], who interprets the score and uses a baton to keep track of the tempo with the musicians.
  * This monster's jacket features the design of a [[wikipedia:Clef|bass clef]], while this monster's baton features an [[wikipedia:Eighth note|eighth note]].
