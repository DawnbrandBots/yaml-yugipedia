title: Card Trivia:Decoyroid
wikitext: |-
  {{navigation}}

  * This monster is based on a [[wikipedia:Radio-controlled car|radio-controlled car]], a miniature version of a vehicle that can be controlled via radio.
  ** This monster's name is based on the fact that radio-controlled cars are generally used as decoys to distract characters in different media, which reflects its effect to act as a "decoy" to force the opponent's monster to attack it instead of any other [[face-up]] monster on the [[field]].
  * This is the first [[Machine]] "[[roid]]" monster whose design does not feature cartoon-like physical features.
