title: Card Trivia:Eternum Voidvelg Requiem
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Overforce of the Abyss]]''.
  * This monster is an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form of "[[Voidvelg Requiem]]".
  * This monster is the rival [[Voidvelg]] counterpart of "[[Eternal Galactica Oblivion]]".
  ** Both require generic Fusion Material of their respective Monster Types ([[LIGHT]] [[Attribute]] [[Galaxy (Type)|Galaxy]] [[Type]] monsters for "Eternal Galactica Oblivion" and [[DARK]] Attribute Galaxy Type monsters for this monster).
  ** Both have the same [[Level]] (9) and [[original ATK and DEF]] (3500/2500).
  ** The term "Eternum" in this monster's name comes from the Latin word "aeternus", meaning eternal. The word is also used in Latin phrases related to Christianity such as "Deus est aeternus" and "Vita aeterna".
  ** "Eternal Galactica Oblivion" is a more offensive form of "[[Galactica Oblivion]]", while this monster is a more defensive form of "Voidvelg Requiem".
