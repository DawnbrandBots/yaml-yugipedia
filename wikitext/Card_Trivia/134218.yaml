title: Card Trivia:Chain Dog
wikitext: |-
  {{Navigation}}

  * This monster's breed is based on a [[wikipedia:Bull Terrier|Bull Terrier]].
  * This monster's name, design, and effects are synergetic with "[[Key Mouse]]" and "[[Lock Cat]]", both of which make up a lock and key combination.
  ** After the effects of the above-mentioned monsters Summon each other, this monster's effect can [[Special Summon]] itself from the [[Graveyard]], creating a key, lock, and chain connection.
  ** Using this synergy with the above-mentioned monsters, the only [[Beast]] [[Synchro Monster]] that can be [[Synchro Summon]]ed using all three monsters as [[material]] is the [[Level 8]] "[[Lightning Tricorn]]".
