title: Card Trivia:Chronomaly Golden Jet
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chronomaly Esperanza Glyph]]" and "[[Chronomaly Pyramid Eye Tablet]]".
  * This monster is based on the [[wikipedia:Quimbaya#Quimbaya airplanes conspiracy theory|Quimbaya airplanes]], a series of golden artifacts styled into the shape of an airplane by the [[wikipedia:Quimbaya|Quimbaya]] tribe between 1000 and 1500 AD. Some archaeologists believe that they are simply stylized insects, while some ancient astronaut theorists believe this is a clear depiction of a space craft from extraterrestrial visitors.
