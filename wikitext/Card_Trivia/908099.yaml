title: Card Trivia:Mikanko Reflection Rondo
wikitext: |-
  {{Navigation}}

  * "[[Ni-Ni the Mirror Mikanko]]" appears in this card's artwork.
  * This card is named after [[wikipedia:Rondo|rondo]], a [[wikipedia:Musical form|musical form]] that emerged in the [[wikipedia:Baroque period|Baroque period]]. The rondo form is employed by composers in a wide range of media, including [[wikipedia:Ballet|ballet]].
