title: Card Trivia:Galatea-I, the Orcust Automaton
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Nature Pack: Courageous Zoodiacs]]''.
  * This monster is a rebuilt "[[Galatea, the Orcust Automaton]]".
  ** Both monsters have a bottom-left [[Link Arrow]].
  ** This monster is likely intended to be [[Link Summon]]ed using either that monster or "[[World Legacy Token]]" (which is the soul of "Galatea" reborn after the events of the "[[World Legacy]]" storyline) as [[Link Material]].
  * This monster's body includes transparent blue features in its torso and left leg, likely suggesting a connection to "[[Guardragon Justicia]]", who had revived "Galatea's" basis, [[Crowned by the World Chalice|Ib]], as "[[Ib the World Chalice Justiciar]]".
  ** Ib herself would then become "[[Lib the World Key Blademaster]]" following the [[World Legacy Bestowal|climax]] [[Avida, Rebuilder of Worlds|of]] [[World Reassembly|the]] ''[[World Legacy]]'' [[The World Legacy|storyline]], similar to her brother [[Beckoned by the World Chalice|Girsu]] becoming "[[Girsu, the Orcust Mekk-Knight]]" (whom bears the "World Legacy Token") following those same events.
