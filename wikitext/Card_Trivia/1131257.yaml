title: Card Trivia:Gimmick Puppet Shadow Feeler
wikitext: |-
  {{Navigation}}

  * This monster is possibly based on ''[[wikipedia:The Human Centipede (First Sequence)|The Human Centipede]]'', a Dutch independent body horror film, in which a psychotic surgeon stitches three human victims together into a so-called "human centipede", forcing them to move around by crawling.
  ** The word "feeler" in this monster's name may allude to the many legs of a centipede, possibly being mistaken for [[wikipedia:Antenna (zoology)|feelers]].
