title: Card Trivia:Coach Goblin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Continuous Destruction Punch]]", "[[D.D. Crazy Beast]]", "[[D.D. Trainer]]", "[[Lane Restriction]]", "[[Second Goblin]]", "[[Speed Spell - Zero Rebirth]]", and "[[Tardy Orc]]".
  ** Either this monster or "Second Goblin" appears in the artwork of "[[Premature Return]]".
  * "[[Ojama Black]]" wears an outfit similar to this monster's in the artwork of "[[Ojamatch]]".
