title: Card Trivia:S-Force Dog Tag
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[S-Force Chase]]".
  * The "[[S-Force]]" crest (black coloration) appears on this card's artwork, directly on "Dog Tag's" chest. This is much more evident in "Dog Tag's" concept art, as it is largely obscured by his head.
  * Like other "[[S-Force]]" with a rival, this card's effect is very effective at stoping "[[I:P Masquerena]]" : Being able to special summon itself when "[[I:P Masquerena]]" is summon and negate it's quick effect during your turn.
