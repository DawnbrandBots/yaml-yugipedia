title: Card Trivia:Mementoal Tecuhtlica - Combined Creation
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Valiant Smashers]]''/''[[Valiant Smashers]]''.
  * This monster appears in the artwork of "[[Mementotlan Cranium Burst]]".
  * This monster is named after [[wikipedia:Mictlāntēcutli|Mictlāntēcutli]], the god of the dead and the king of [[wikipedia:Mictlan|Mictlan]], the lowest section of the underworld in [[wikipedia:Aztec mythology|Aztec mythology]].
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) and [[original DEF]] (5000, tied with [[5000 DEF Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  ** This monster is the first to have 5000 ATK/DEF that is not a [[Level]]/[[Rank]] 12.
