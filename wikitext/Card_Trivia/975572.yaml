title: Card Trivia:Liberated Rear Warrior
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Mononofu of the Liberated Heel" ({{Ruby|放|ほう}}{{Ruby|踵|しょう}}の{{Ruby|武士|もののふ}}, ''Hōshō no Mononofu''), features the base kanji for "Mononofu" (武士), which can also be written as ''bushi'', a word synonymous to "samurai".
