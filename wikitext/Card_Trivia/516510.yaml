title: Card Trivia:Performapal Whip Snake
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Command Performance]]", "[[Performapal Curtain Call]]","[[Performapal Popperup]]", "[[Performapal Reborn Force]]", and "[[Team Performapal's Bonds]]".
  ** A coloured outline of this monster appears in the artwork of "[[Performapal Duelist Extraordinaire]]".
  * Despite not appearing to be similar to a [[wikipedia:Whip|whip]], this monster has a whip handle near the end of its tail.
  ** However, despite this card's Japanese name ({{Ruby|ＥＭ|エンタメイト}}ウィップ・バイパー ''Entameito Wippu Baipā'', "Entermate Whip Viper"), this monster is more similar to a [[wikipedia:King cobra|king cobra]] rather than a [[wikipedia:Viperidae|viper]].
  * This card was one of the first monsters to be [[Pendulum Summon]]ed in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, along with "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]" and "[[Performapal Sword Fish (anime)|Performapal Sword Fish]]".
