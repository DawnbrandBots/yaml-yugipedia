title: Card Trivia:Heraldic Beast Berners Falcon
wikitext: |-
  {{Navigation}}

  * This monsters appears in the artwork of "[[Advanced Heraldry Art]]".
  * This monster is based on the falcon used as a [[wikipedia:Heraldry|heraldry]] [[wikipedia:Charge (heraldry)|charge]].
  ** This monster's name and appearance reference [[wikipedia:Juliana Berners|Juliana Berners]], a 15th century English writer who wrote the ''[[wikipedia:Book of Saint Albans|Book of Saint Albans]]'', which features essays on heraldry, hunting, and [[wikipedia:Falconry|hawking]], the latter word also known as "falconry".
