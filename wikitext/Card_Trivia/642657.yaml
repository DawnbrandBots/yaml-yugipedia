title: Card Trivia:Aromage Marjoram
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Aroma Blend]]" and "[[Aroma Gardening]]".
  * This monster is named after [[wikipedia:Marjoram|marjoram]], a cold-sensitive perennial herb with sweet pine and citrus flavors, where the leaves are used for aromatherapy, flavoring agents, and essential oils.
  * This monster has an "Aromaseraphy" version: "[[Aromaseraphy Sweet Marjoram]]".
