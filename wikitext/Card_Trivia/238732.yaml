title: Card Trivia:Ice Beast Zerofyne
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Sub-Zero Bird Beast Sylphine", is a portmanteau of "[[wikipedia:Sylph|sylph]]" and "[[wikipedia:Undine|undine]]", both of them mythological elemental beings.
  ** Its feminine appearance and [[WATER]] [[Attribute]] are based on how the undine is the nymph of water that takes the form of a woman.
  ** Its [[Winged Beast]] [[Type]] reflects how the sylph are the invisible spirits of wind, whereas the [[WIND]] Attribute is commonly associated with bird-themed monsters.
  ** Its ''[[TCG]]'' name, "Zerofyne", is a portmanteau of "zero" and "undine", referencing [[wikipedia:Absolute zero|absolute zero]], the lowest value that temperature can reach at 0 [[wikipedia:Kelvin|kelvin]] or [[wikipedia:Rankine scale|Rankine]], where an atom's movement stops, and any known matter becomes solid. This value is commonly measured at −273.15° [[wikipedia:Celsius|Celsius]] or -459.67° [[wikipedia:Fahrenheit|Fahrenheit]].
  * This is the first Winged Beast [[Xyz Monster]].
  * This is the [[signature card]] of [[Rio Kastle]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
