title: Card Trivia:Cupid Pitch
wikitext: |-
  {{Navigation}}

  * This monster's name and design reference the sport of [[wikipedia:Softball|softball]], with this monster's outfit being based on that worn by softball players, and the [[wikipedia:Softball#ball|titular ball]] being used as the tip of this monster's arrow.
  ** This monster's Japanese name, "Softball Cupit" (ルイ・キューピット, ''Rui Kyūpitto''), is a pun on the Japanese name of "softball" (塁球, ''Rui-kyū'').
  ** This monster's ''[[TCG]]'' name is based on the [[wikipedia:Pitch (baseball)|pitch]], the act of throwing the softball towards home plate to start a play.
