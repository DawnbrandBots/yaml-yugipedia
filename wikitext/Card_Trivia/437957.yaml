title: Card Trivia:Galaxy-Eyes Cipher Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Collectors Pack: Duelist of Flash Version]]'', as well as one of the cover cards of ''[[Duelist Pack: Dimensional Guardians]]''.
  * This monster appears in the artworks of "[[Double Cipher]]" and "[[Galaxy-Eyes Cipher X Dragon]]".
  ** The red lightning in this card's artwork also appear in the artwork of "[[Cipher Wing]]".
  * This is the [[signature card]] of [[Kite Tenjo (ARC-V)|Kite Tenjo]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This card's effect to take control of an opponent's monster could be a reference to how Kite lost his family and thus wants revenge.
  * This monster is a "[[Cipher]]" [[counterpart]] of "[[Galaxy-Eyes Photon Dragon]]".
  ** "Cipher" in this monster's name refers to how the word is used as a symbol for the [[wikipedia:Number|number]] [[wikipedia:0|0]], which in turn could reference either the "[[Number]]" archetype from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime or [[Kite Tenjo]]'s role as a [[Number Hunter]] in said series.
  ** The kanji 「光波」 (''Kōha'', "Lightwave") in this monster's name refers to how the [[wikipedia:Photon|photon]] is the quantum of the [[wikipedia:Electromagnetic field|electromagnetic field]], which includes electromagnetic radiation such as [[wikipedia:Light|light]].
  * This monster has 3 [[Ranked-Up]] forms.
  ** [[Rank 9]]: "[[Neo Galaxy-Eyes Cipher Dragon]]" and "[[Galaxy-Eyes Cipher Blade Dragon]]".
  ** [[Rank 10]]: "[[Galaxy-Eyes Cipher X Dragon]]".
  * This monster's shoulder plates and wing bases resemble those of "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]".
  ** This is a reference to Kite's final Duel with [[Mizar]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, where the former used "[[Number 62: Galaxy-Eyes Prime Photon Dragon (anime)|Number 62: Galaxy-Eyes Prime Photon Dragon]]" to defeat "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon (anime)|Number C107: Neo Galaxy-Eyes Tachyon Dragon]]".
  ** This monster's Japanese [[Attack and effect names in Yu-Gi-Oh! ARC-V|attack name]], "Cipher Stream of Annihilation" (殲滅のサイファー・ストリーム ''Senmetsu no Saifā Sutorīmu'') is also based on the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack names]] of both "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]", "[[Photon Stream of Destruction]]" (破滅のフォトン・ストリーム ''Hametsu no Foton Sutorīmu'') and "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]", "[[Tachyon Spiral of Destruction]]" (殲滅のタキオン・スパイラル ''Senmetsu no Takion Supairaru'').
  * This is the first "[[Galaxy-Eyes]]" monster to not appear in a sealed form when Summoned in the anime.
  * In the anime, like "Galaxy-Eyes Photon Dragon", this monster's roar is the same as that of "[[Stardust Dragon (anime)|Stardust Dragon]]".
