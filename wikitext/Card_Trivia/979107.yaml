title: Card Trivia:Golondrinas Roar
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Sky Fossil Anomalocaris]]" appears in this card's artwork.
  * This card, along with "[[Golondrinas Prison]]", are named after the [[wikipedia:Cave of Swallows|Cave of Swallows]], a huge vertical drop cave in Mexico known as the ''Sótano de las Golondrinas'', which is the first known location of the supposed cryptid, the [[wikipedia:Rod (optical phenomenon)|skyfish]].
