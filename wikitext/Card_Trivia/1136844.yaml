title: Card Trivia:OuTerverSe Toxic Blob
wikitext: |-
  {{Navigation}}

  * This monster is an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form of "[[OuTerverSe Acid Blob]]".
  ** As with "Acid Blob", this monster is based on the parallel universe observed by [[Yudias Velgear]] through [[Kuaidul Velgear]] in {{episode|GO RUSH!!|135|ref}}, in which civilization resided in the stomach of a massive life form.
