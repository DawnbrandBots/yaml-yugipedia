title: Card Trivia:Dream Mirror of Terror
wikitext: |-
  {{Navigation}}

  * The buildings in this card's artwork appear in the artwork of "[[Dream Mirror of Chaos]]".
  * The border of this card's artwork is based on the mirrors of the [[DARK]] "[[Dream Mirror]]" monsters.
  * This card has a [[LIGHT]] [[counterpart]]: "[[Dream Mirror of Joy]]".
  ** Both card artworks have opposite light/dark color schemes.
  ** This card's effect requires a DARK "Dream Mirror" monster, while "Dream Mirror of Joy" requires a LIGHT "Dream Mirror" monster.
  ** This card represents [[wikipedia:Nightmare|nightmares]], as the "Dream Mirror" [[archetype]] is based on [[wikipedia:Dream|dreams]].
