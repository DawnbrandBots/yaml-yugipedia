title: Card Trivia:ZW - Tornado Bringer
wikitext: |-
  {{Navigation}}

  * This monster's equip form appears in the background of this card's artwork.
  * This monster is based on the [[wikipedia:Chinese dragon|Chinese Dragon]], a legendary creature in Chinese mythology that is commonly depicted as a four-legged serpentine creature.
  ** This is one of three [[Main Deck]] "[[ZW -]]" monsters whose ''[[TCG]]'' name does not include the name of the animal it depicts, a trait shared only by the other two Main Deck "ZW -" monsters that debuted in ''[[Cosmo Blazer]]'': "[[ZW - Lightning Blade|Lightning Blade]]" and "[[ZW - Ultimate Shield|Ultimate Shield]]".
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster's [[Type]] was [[Warrior]]; however, in the ''[[OCG]]''/''TCG'', its Type was changed to [[Dragon]].
  * This is the only "ZW -" monster to make a reappearance in a Duel outside of the Duel that it debuted in the ''Yu-Gi-Oh! ZEXAL'' anime.
