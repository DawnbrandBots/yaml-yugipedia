title: Card Trivia:Noh-P.U.N.K. Deer Note
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[P.U.N.K. JAM Dragon Drive]]" and "[[Noh-P.U.N.K. Rising Scale]]".
  * This card is named after [[wikipedia:Noh|Noh]], a major form of classical Japanese dance-drama that has been performed since the 14th century.
  ** This monster is based on ''One-Horned Immortal'' (一角仙人), a ''[[wikipedia:Nōgaku|nōgaku]]'' play.
  *** "Deer" in this card's name is a reference to how a female deer gave birth to the titular main character of ''One-Horned Immortal''.
  * According to ''[[Yu-Gi-Oh! Card Game Art Works]]'', this monster is the twin sibling of "[[Noh-P.U.N.K. Ze Amin]]" rather than one of their costumes like "[[Noh-P.U.N.K. Foxy Tune]]" and "[[Noh-P.U.N.K. Ogre Dance]]".
