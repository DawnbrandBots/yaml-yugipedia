title: Card Trivia:Super Princess of the Flock - Max Mutton (R)
wikitext: |-
  {{Navigation}}

  * "[[Wooly Wonderland Aqua Sheep]]", "[[Wooly Wonderland Planewe]]", "[[Wooly Wonderland Pyro Wool]]", and "[[Wooly Wonderland Thunder Rambda]]" appear in this card's artwork.
  ** The four monsters make up the four stars in [[wikipedia:Aries (constellation)|Aries]], the ram constellation, whose appearance is based on its [https://en.wikipedia.org/wiki/File:Sidney_Hall_-_Urania%27s_Mirror_-_Aries_and_Musca_Borealis.jpg illustrated depiction] in the 1825 ''[[wikipedia:Urania's Mirror|Urania's Mirror]]'' star charts.
