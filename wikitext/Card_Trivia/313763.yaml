title: Card Trivia:Infernoid Attondel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Void Seer]]".
  ** Parts of this monster appear in the artwork of "[[Void Blaze-Up]]".
  * This monster is a reference to the [[wikipedia:Adramelech|Adramelech]].
  * ''Attondel'' translates as ''eighth'' in Swedish, referring to this monster's Level.
