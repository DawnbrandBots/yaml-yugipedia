  * "[[Fallen of Albaz]]", "[[Incredible Ecclesia, the Virtuous]]", "[[Springans Branga]]", "[[Springans Captain Sargas]]", "[[Springans Rockey]]", "[[Tri-Brigade Kitt]]", "[[Tri-Brigade Mercourier]]", and the mechanical shrike from the artwork of "Tri-Brigade Kitt" appear in this card's artwork.
