title: Card Trivia:Cyber-Stein
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster Chronicle]]''.
  * This monster appears in the artwork of "[[Tour Bus To Forbidden Realms]]".
  * This monster is based on [[wikipedia:Frankenstein's monster|Frankenstein's monster]], a humanoid creature created by the mad scientist [[wikipedia:Victor Frankenstein|Victor Frankenstein]], who is composed of body parts from multiple corpses and brought to life with electricity.
  ** This monster's Japanese name, "Devil Franken", may be inspired by a scene in [[wikipedia:Mary Shelley|Mary Shelley's]] ''[[wikipedia:Frankenstein|Frankenstein]]'', where Frankenstein's monster reads the epic poem ''[[wikipedia:Paradise Lost|Paradise Lost]]'' and identifies with the protagonist, [[wikipedia:Satan|Satan]].
  ** This monster shares a similar naming convention with another monster based on Frankenstein's monster, "[[Number 22: Zombiestein]]". Their Japanese names contain the prefix "Franken", while in the ''[[TCG]]'', their names contain the suffix "Stein".
  * This monster has a ''[[Rush Duel]]'' [[counterpart]]: "[[Cyber-Stein Frankenshrine]]".
  * This monster shares similarities with "[[Magical Scientist]]":
  ** Both appear in the artwork of "Tour Bus to Forbidden Realms".
  ** Both are associated with the "[[wikipedia:Mad scientist|mad scientist]]" stock character. 
  ** Both feature effects that allows the player to [[Special Summon]] a [[Fusion Monster]] from the [[Extra Deck]] by paying Life Points in multiples of 1000, which led to the creation of an [[Cyber-Stein OTK|OTK]]/[[Magical Scientist Deck|FTK]] [[Deck]] in the past, as well as leading them to become [[Forbidden]].
  * This card has the largest static [[Life Point]] cost (5000) of any card.
  * Before [[Upperdeck Day]], only 18 copies of the [[SJC-EN001]] print of this card existed in the world. $20,000 USD was bid for a "Cyber-Stein" SJC-EN001 card on [[wikipedia:eBay|eBay]], but the bidder didn't pay. The card was eventually resold for approximately $7,000 USD. Since then, a few copies have surfaced on card single websites for as low as $400 USD.
  * In the ''[[OCG]]'', this card was Forbidden for sixteen formats before being [[Limited]] in the [[February 2014 Lists]], then becoming Forbidden again in the [[July 2023 Lists]]. This is the second most of any card behind "[[Raigeki]]", which was Forbidden for 24 ''TCG'' formats before becoming Limited in the [[October 2014 Lists (TCG)|October 2014 Lists]].
  * This is one of only two ''[[Shonen Jump Championship]]'' Prize Cards to be banned, with the other being "[[Crush Card Virus]]".
  ** Both were printed as a [[Rare]] card in ''[[Dark Beginning 2]]'' and ''[[Turbo Pack: Booster One]]'' respectively; this was the lowest [[rarity]] a ''Shonen Jump Championship'' prize card was reprinted at before "[[Shrink]]" was reprinted as a [[Common]].
