title: Card Trivia:D/D Savant Newton
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] is based on [[wikipedia:Isaac Newton|Isaac Newton]].
  ** A [[wikipedia:Newton's cradle|Newton's cradle]] is attached to this monster's left arm. The device is named after Newton as it demonstrates his [[wikipedia:Newton's laws|second law]], the [[wikipedia:conservation|conservation]] of [[wikipedia:momentum|momentum]] and [[wikipedia:conservation of energy|energy]], via a series of swinging spheres.
  ** Mounted into the torso of this monster is a [[wikipedia:Newtonian telescope|Newtonian telescope]], a type of [[wikipedia:Reflecting telescope|reflecting telescope]]. In particular, Newton constructed the world's first functional reflecting telescope, known as [[wikipedia:Newton's reflector|Newton's reflector]], which would become the prototype of the Newtonian telescope.
  ** The arcs of metal seen in the spaces between the red segments of this monster may be a reference to [[wikipedia:Sextant|sextants]] and [[wikipedia:Octant (instrument)|octants]], [[wikipedia:Reflecting instrument|reflecting instruments]] used primarily in [[wikipedia:navigation|navigation]]. While the invention of these instruments is commonly attributed to [[wikipedia:John Hadley|John Hadley]] and [[wikipedia:Thomas Godfrey (inventor)|Thomas Godfrey]], detailed descriptions of their principles were also found in Newton's unpublished writings.
