title: Card Trivia:Dragon's Light and Darkness
wikitext: |-
  {{Navigation}}

  * "[[Light and Darkness Dragonlord]]" appears in this card's artwork.
  ** This card's artwork is based on the artworks of "[[Duality]]" and "[[Guidance of Light and Dark]]".
  *** Both "[[Duality (manga)|Duality]]" and "Guidance of Light and Dark" are [[Spell Card]]s used by [[Chazz Princeton (manga)|Chazz Princeton]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga. Chazz is also the owner of "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]", which "Light and Darkness Dragonlord" is a [[retrained]] [[counterpart]] of.
  * This card's Japanese name ({{Ruby|竜|りゅう}}の{{Ruby|影|えい}}{{Ruby|光|こう}}, ''Ryū no Eikō'') features the word ''Eikō'' ({{Ruby|影|えい}}{{Ruby|光|こう}}), which is homophonic of the words "shadow and light" and "glory".
