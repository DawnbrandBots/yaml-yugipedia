title: Card Trivia:Unicycular
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magnetic Storm]]".
  * As with the other [[cular]] monsters, this monster's [[Level]] (1) and [[Equal ATK and DEF|equal]] [[original ATK and DEF]] (100/100) reference the number of wheels it has.
  * This is the only [[Normal Monster]] used by [[Yusei Fudo]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
