title: 'Card Trivia:Number 61: Volcasaurus'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of the ''[[Zexal Collection Tin]]''.
  * This monster appears in the artworks of "[[Number Fortification]]" and "[[Number Karma]]".
  * The number "61" appears on this monster's left chest spike.
  * This is the first [[FIRE]] "[[Number]]" monster, as well as the first [[Dinosaur]] "Number" monster.
  * "Number" monsters often take the form of their owners and/or their original desires. In this case, this "Number" represents its original owner, [[Scorch]].
  ** This monster's name, FIRE [[Attribute]], and Dinosaur [[Type]] reflects Scorch's FIRE Dinosaur [[Deck]].
  ** This monster's effect to [[destroy]] the opponent's monster and inflicting damage to the opponent reflects Scorch's [[Burn]]/[[Beatdown]] gameplay.
  ** This monster's number (61) is the number "19" turned upside down, the same number as Scorch's [[Tag Team]] partner, [[Chills|Chills']] "Number" card, "[[Number 19: Freezadon]]". This, along with both monsters' inverted [[original ATK and DEF]] reflect Scorch and Chills' synergy as Tag-Team partners, despite their opposing "fire and ice" themes and offensive/defensive gameplay.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster [[detach]]es an [[Xyz Material]], it devours it, then the two spikes on its chest open and shoot flames, which destroys an opponent's monster and inflicts damage to the opponent.
