title: Card Trivia:Uni-Zombie
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[counterpart]] of "[[Three-Legged Zombies]]".
  * This monster (or "Three-Legged Zombies") appears in the artworks of "[[Return of the Zombies]]", "[[Surprising Zomvictory]]", and "[[Uni-Song Tuning]]".
  * This card's name is possibly a multi-layered pun: "Uni-" could refer to the fact that the two [[zombie]]s in this card's artwork work as a single unit to move around, as seen in the artwork of "Three-Legged Zombies".
  ** More clearly, this card's Japanese name is a pun between "Uni-Zombie" ('''ユニゾン'''ビ ''Yunizombi'') and "unison" (ユニゾン ''Yunizon''). This is reflected by the fact that the 2 zombies depicted in this card's artwork are attempting to sing together.
