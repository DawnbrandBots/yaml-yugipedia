title: Card Trivia:Gagaku-P.U.N.K. Wa Gon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gagaku-P.U.N.K. Crash Beat]]", "[[Gagaku-P.U.N.K. Wild Picking]]", "[[P.U.N.K. JAM Extreme Session]]", and "[[P.U.N.K. JAM FEVER!]]".
  * ''[[wikipedia:Gagaku|Gagaku]]'' is a type of Japanese classical music.
  ** This card is named after a ''[[wikipedia:Yamatogoto|yamatogoto]]'' (also called a "wagon"), a six- or seven-stringed plucked [[wikipedia:Zither|zither]]. It is said to be one of the few stringed instruments truly native to Japan, and it was traditionally considered the most prestigious instrument in ''gagaku'' music.
  *** This card's artwork depicts a variety of different instruments traditionally used in ''gagaku'' music: the ''[[wikipedia:Tsuri-daiko|tsuri-daiko]]'', the ''[[wikipedia:Shō (instrument)|shō]]'', the ''[[wikipedia:Koto (instrument)|koto]]'', the ''[[wikipedia:Kakko (instrument)|kakko]]'', the ''[[wikipedia:Biwa|biwa]]'', and several other instruments.
