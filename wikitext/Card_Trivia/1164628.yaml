title: Card Trivia:Decode Talker Integration
wikitext: |-
  {{Navigation}}

  * This monster is the [[signature move]] counterpart of "[[Decode Talker]]".
  ** This monster's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! VRAINS|effect name]] of "[[Decode Talker (anime)|Decode Talker]]" in the ''[[Yu-Gi-Oh! VRAINS]]'' anime: "Power Integration".
  * The sword of "[[Dark Templar @Ignister]]" appears in this monster's left hand, albeit with a color scheme matching that of "Decode Talker's" sword.
