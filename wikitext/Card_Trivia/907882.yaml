title: Card Trivia:"Infernoble Arms - Joyeuse"
wikitext: |-
  {{Navigation}}

  * This sword appears in the artworks of "[[The Continuing Epic of Charles]]" and "[[Noble Arms Museum]]".
  ** A flaming version of this sword appears in the artwork of "[[Infernoble Knight Emperor Charles]]".
  * This card is based on [[wikipedia:Joyeuse|Joyeuse]], the legendary sword belonging to [[wikipedia:Charlemagne|Charlemagne]].
  ** Fittingly, this sword is owned by "Infernoble Knight Emperor Charles", who is also known as Charles the Great, who was crowned as the Emperor of the Romans.
