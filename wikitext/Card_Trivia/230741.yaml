title: Card Trivia:Diamond Dire Wolf
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cattle Call]]" and "[[Dances with Beasts]]" (as a silhouette).
  ** A stuffed animal of this monster appears in "[[Cross-Sheep]]".
  * This card appears in the artwork of "[[Banquet of Millions]]".
  * This monster's Japanese name (ダイヤウルフ, ''Daiyaurufu'') is a pun on "[[wikipedia:Dire wolf|dire wolf]]", an extinct species of canine, and "[[wikipedia:Diamond|diamond]]", which this monster's blades and nearly its entire body is made of.
