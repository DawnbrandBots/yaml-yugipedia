title: Card Trivia:TiSolfachord Beautia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Solfachord Formal]]".
  ** This monster's chibi avatar appears in the artworks of "[[Solfachord Harmonia]]" and "[[Solfachord Symphony]]".

  * This monster is based on "''Ti''", the seventh syllable of the [[wikipedia:Solfège|solfège]], which reflects its [[Level]] (7).
  ** "Beautia" starts with the English letter "B", which is based on the [[wikipedia:B (musical note)|seventh musical note]] of the [[wikipedia:C major|C major scale]] in the fixed solfège.
  ** This monster's Japanese, Korean, French, German, Italian, Portuguese, and Spanish names use the original name of the syllable, "si", while the English name uses "ti", the name more commonly used for the syllable in Anglophone countries.
