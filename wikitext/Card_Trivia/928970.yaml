title: Card Trivia:Creepy Coney
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Death Rabbit" (デス・ウサギ ''Desu Usagi''), shares a similar naming scheme with "[[Des Koala]]", another [[Level 3]] [[Beast]] [[Flip monster]] whose effect inflicts damage to the opponent multiplied by the number of cards in a certain location.
  ** This monster's ''[[TCG]]'' name is based on a coney, another name for the [[wikipedia:European rabbit|European rabbit]], a widespread invasive species of rabbit native to the Iberian Peninsula that was introduced to areas on every non-Antarctic continent.
