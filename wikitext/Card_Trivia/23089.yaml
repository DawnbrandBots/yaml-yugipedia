title: Card Trivia:Morphtronic Cameran
wikitext: |-
  {{Navigation}}

  * This monster is based on a camera, which appears in the background of this card's artwork.
  ** This card's [[Attack Position]] effect to [[Special Summon]] a "[[Morphtronic]]" monster from the [[Graveyard]] except itself is a reference to how a real camera functions, as it take a picture of anything, except for itself.
