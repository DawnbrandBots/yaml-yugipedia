title: Card Trivia:The Six Samurai - Irou
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Backs to the Wall]]", "[[Swift Samurai Storm!]]", "[[Six Samurai United]]", "[[Swallow Flip]]", and "[[Nitwit Outwit]]".
  * This monster is likely based on the Japanese swordsman [[wikipedia:Sasaki Kojirō|Sasaki Kojirō]], known for his "Swallow Reversal / Return" sword technique and his ill-fated duel with Musashi Miyamoto (the likely basis of "[[The Six Samurai - Nisashi]]").
  ** Their names are similar: Kojirō and Irō (alternatively, Kojirou and Irou).
  ** The name and artwork of "[[Swallow Flip]]" (featuring this monster) reinforce the concept of the "Swallow Reversal / Return" sword technique, especially since this card and the sword technique share the same name in Japanese.
  ** This monster is wielding an ''[[wikipedia:Ōdachi|ōdachi]]'', which Sasaki Kojirō was known for.
