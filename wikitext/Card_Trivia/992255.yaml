title: Card Trivia:Berfomet the Mythical King of Phantom Beasts
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Big-Winged Berfomet]]" and "[[Mirror Swordknight]]".
  ** This monster has an upgraded [[Illusion]] form combined with "[[Cornfield Coatl]]" and "[[Gazelle the King of Mythical Claws]]": "[[Chimera the Illusion Beast]]".
