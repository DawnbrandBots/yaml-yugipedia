title: Card Trivia:Jurrac Brachis
wikitext: |-
  {{Navigation}}

  * This card is based on the dinosaur [[wikipedia:Brachiosaurus|Brachiosaurus]] (Arm lizard).
  * "Jurrac" is a reference to the Jurassic Period, but "Jurrac Brachis" (Brachiosaurus) alongside [[Jurrac Aeolo]](Allosaurus) and [[Jurrac Monoloph]] (Monolophosaurs) are the three Jurracs that are actually based on dinosaurs that lived during the Jurassic Period.
  * Jurrac Brachis is one of three Jurrac monsters that are based on herbivorous dinosaurs. The other two are [[Jurrac Iguanon]] and  [[Jurrac Protops]]. The other Jurracs are carnivores (excluding  [[Jurrac Meteor]] and [[Jurrac Gallim]], based on Gallimimus, which was an omnivore).
