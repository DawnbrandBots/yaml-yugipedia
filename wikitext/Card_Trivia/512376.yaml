title: Card Trivia:Warrior Lady of the Wasteland
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Baton of the Hero]]", "[[Chaos Form (GX)|Chaos Form]]", "[[Codebreak Bind]]", "[[Karma Cut]]", "[[Resonance Device]]", and "[[Simultaneous Loss]]".
  * This card has a [[Card evolutions|younger]] counterpart: "[[Rookie Warrior Lady]]".
  * This card has an older [[D.D.]] counterpart: "[[D.D. Warrior Lady]]".
  * This monster seems to be a recurring rival to "[[Warrior Dai Grepher]]", as the two are depicted fighting in the artworks of "Simultaneous Loss", "[[Dimension Wall]]", and "[[Different Dimension Ground]]" (where "Dai Grepher" has become "[[Dark Lucius LV4]]").
