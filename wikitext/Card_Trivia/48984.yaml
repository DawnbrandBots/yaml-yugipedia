title: Card Trivia:Jade Knight
wikitext: |-
  {{Navigation}}

  * This monster is based on the {{wikia|gradius|Jade Knight}}, one of the main playable spaceships from [[Konami|Konami's]] shoot-em-up video game series, ''[[wikipedia:Gradius|Gradius]]'', which first appeared in ''[[wikipedia:Gradius Gaiden|Gradius Gaiden]]''.
  ** This monster is depicted using its primary weapon, the Round Laser, a circular laser that attacks all surrounding enemies from all directions at once, which reflects its effects to prevent [[Machine]] monsters with 1200 or less [[ATK]] from being [[destroy]]ed by [[Trap Card]]s.
  * This monster has a [[retrained]] counterpart: "[[Gray Layer]]".
