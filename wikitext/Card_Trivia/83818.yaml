title: Card Trivia:Lucky Chance
wikitext: |-
  {{Navigation}}

  * "[[Winged Kuriboh]]", an iconic monster used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime and manga, is embossed on the coin in this card's artwork. There are a few possible reasons for its appearance here:
  ** This Trap Card debuted in ''[[Light of Destruction]]'', the last [[Core Booster]] of the ''Yu-Gi-Oh! GX'' era.
  ** This Trap Card was released alongside the "[[Arcana Force]]" monsters, with an effect that support those monsters' coin-tossing effects. [[Sartorius Kumar]] used an "Arcana Force" Deck in the ''Yu-Gi-Oh! GX'' anime, serving as a major antagonist to Jaden Yuki and his friends.
  ** In {{episode|Yu-Gi-Oh! GX|001|ref}}, [[Yugi Muto]] gave Jaden Yuki a "[[Winged Kuriboh (anime)|Winged Kuriboh]]" card, calling it a "'''lucky''' card".
  *** Jaden also affirmed this in {{episode|Yu-Gi-Oh! GX|002|ref}}, after seeing "Winged Kuriboh" in his starting hand in his Duel against [[Chazz Princeton]], calling the card "lucky".
