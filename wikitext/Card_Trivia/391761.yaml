title: Card Trivia:Mooyan Curry
wikitext: |-
  {{Navigation}}

  * This curry appears in the artwork of "[[Spy-C-Spy]]".
  * This card is a reference to Moyan Curry, a Japanese curry restaurant franchise with several shops in East Shinjuku and Ikebukuro.[http://yugioh-wiki.net/index.php?%A1%D4%A5%E2%A5%A6%A5%E4%A5%F3%A4%CE%A5%AB%A5%EC%A1%BC%A1%D5=]
  ** On the 10th anniversary since this card was created, the Moyan Curry blog made a humorous post stating that this card "still exists", is "super rare" and that "something good will probably happen to the person who brings this card (to their shop)".[http://ameblo.jp/moyanmoyan/entry-10338178205.html]
  * This is one of the first [[Spell Card]]s seen on-screen in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]], along with "[[Block Attack]]", "[[Polymerization]]", "[[Red Medicine]]", and "[[Remove Trap]]".
