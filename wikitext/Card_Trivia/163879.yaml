title: Card Trivia:Resurrection of Chakra
wikitext: |-
  {{Navigation}}

  * This card's name may be based on the [[wikipedia:Sudarshana Chakra|Sudarshana Chakra]], a disc-like weapon used by the Hindu god [[wikipedia:Vishnu|Vishnu]] in Hindu mythology.
  ** [[wikipedia:Chakra|Chakra]] is also a term used in Hindu metaphysical tradition and other belief systems, referring to parts of the human body that are centres of life forces or vital energy.
