title: Card Trivia:Peacock
wikitext: |-
  {{Navigation}}

  * This monster is based on a peacock, the given name for the male [[wikipedia:Peafowl|peafowl]], a species of bird known for their extravagant plumage with the eye-shaped tail feathers.
  * This monster, along with "[[Metal Fish]]", "[[Jellyfish]]" and "[[Wolf]]", are the only [[Normal Monster]]s whose ''[[TCG]]'' [[card text]]s have their exact names written within them; all of them except "Metal Fish" are also real-life animals.
