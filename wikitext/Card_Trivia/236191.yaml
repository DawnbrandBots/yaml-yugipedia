title: Card Trivia:Kuriphoton
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Kite]]''.
  * This monster is a "[[Photon]]" [[counterpart]] of "[[Kuriboh]]".
  * This is the first "[[Kuriboh (archetype)|Kuriboh]]"-related monster used by a rival in the anime.
  ** This monster's green spikes resemble the horned spikes of [[Kite Tenjo]]'s hairstyle, who used this card in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
