title: Card Trivia:Pumpking the King of Ghosts
wikitext: |-
  {{Navigation}}
  * This monster is based on a [[wikipedia:Jack-o'-lantern|jack-o'-lantern]], a hollowed-out carved pumpkin associated with the holiday of [[wikipedia:Halloween|Halloween]].
  * This monsters has multiple counterparts:
  ** Retrained counterpart: "[[Pumpking the King of Grave Ghosts]]".
  ** Evolved Xyz counterpart: "[[Pumpking the Great Ghost King]]".
  * This monster appears in the artworks of "[[Ectoplasmic Fortification]]" and "[[Jack-o-Bolan]]" (as part of its torso).
  * This monster is likely the father of "[[Pumprincess the Princess of Ghosts]]".
  ** This monster also has twice the [[Level]] (3) and [[original ATK and DEF]] (1800/2000) of "Pumprincess".
  * This monster's manga and anime effect to increase the [[ATK]] of other [[Zombie]] monsters the player [[control]]s by 10% the turn it is Summoned and at the start of each of the player's turns is similar to the ''[[OCG]]''/''[[TCG]]'' effect of "[[Castle of Dark Illusions]]".
  ** This monster's effect continuing until the player's fourth turn could be a reference to how this monster's effect was used for four turns in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster has a stronger effect, as it increases every Zombie monster's ATK /DEF by 100 every turn with no limit at all.
  ** It is unknown why this monster needs "Castle of Dark Illusions" for its effect, as they were each used by different Duelists in the ''Yu-Gi-Oh!'' manga and anime; [[Ghost Kozuka (manga)|Ghost Kozuka]] ([[Bonz]] in the anime) and the [[Player Killer of Darkness (manga)|Player Killer of Darkness]] ([[PaniK]] in the anime) respectively.
  * This monster's Summoning cutscene in the ''[[Yu-Gi-Oh! Duel Links]]'' video game features an underground setting filled with skeletons and candles. This is a reference to the [[Graveyard (terrain)|Graveyard terrain]] where [[Katsuya Jonouchi and Ghost Kozuka's Duel (manga)|Katsuya Jonouchi and Ghost Kozuka's Duel]] (and its [[Joey Wheeler and Bonz's Duel|anime counterpart]]) takes place in the ''Yu-Gi-Oh!'' manga and anime.
