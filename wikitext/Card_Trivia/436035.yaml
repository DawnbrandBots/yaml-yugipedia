title: Card Trivia:Zoodiac Boarbow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zoodiac Barrage]]" and "[[Zoodiac Combo]]".
  * This monster is based on the [[wikipedia:Chinese zodiac|Chinese zodiac]] sign of the [[wikipedia:Pig (zodiac)|Pig]].
  ** This monster's effect to [[send]] all cards from the opponent's [[hand]] and [[field]] to the [[Graveyard]] if it inflicts [[battle damage]] with at least 12 [[Xyz Material]]s [[attach]]ed references to the fact that the Pig is the twelfth sign of the Chinese zodiac, marking the end of the old cycle and the beginning of the new one.
  * This monster's Japanese name, "Wildbow", is a portmanteau of "wild boar" and "bow".
  * This monster's bow is wielded by "[[Metaltron XII, the True Dracombatant]]".
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018597882051166213 Bilibili] and [https://weibo.com/7406309913/5119214040384956 Weibo] at 10:00 PM (China Standard Time) on January 4, 2025, which was the fourth quarter of the Hai hour in the traditional Chinese timekeeping system.
