title: Card Trivia:Rainbow Dark Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Advanced Dark]]", "[[Rainbow Gravity]]", and "[[Ultimate Crystal Magic]]".
  * This monster is the [[dark counterpart]] of "[[Rainbow Dragon]]".
  * In the ''[[Phantom Darkness]]'' advertisement page of ''[[Shonen Jump]]'' Vol. 6, Issue #3, this card, "[[Dark Armed Dragon]]", and "[[Yubel - The Ultimate Nightmare]]" each have their [[Type]] incorrectly listed as [[Beast]].
