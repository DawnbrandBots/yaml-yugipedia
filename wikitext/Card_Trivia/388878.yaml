title: Card Trivia:Fujin the Breakstorm Star
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Fūjin|Fūjin]], the [[wikipedia:Shinto|Shinto]] god of the wind who is often depicted as a green humanoid entity.
  ** Fittingly, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster appears alongside "[[Raijin the Breakbolt Star]]", a monster based on the [[wikipedia:Raijin|Shinto god of thunder and storms]] who is often depicted alongside Fūjin  in [[wikipedia:Japanese mythology|Japanese mythology]].
