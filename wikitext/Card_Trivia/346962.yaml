title: Card Trivia:Noble Knight Eachtar
wikitext: |-
  {{Navigation}}

  * This knight is based on [[wikipedia:Hector de Maris|Sir Hector de Maris]], half-brother of [[wikipedia:Lancelot|Lancelot]] and [[wikipedia:Round Table|Knight of the Round Table]].
  * The ghost of "[[Ignoble Knight of Black Laundsallyn]]" or "[[Ignoble Knight of High Laundsallyn]]" appears in this card's artwork, referencing the above relation.
  * This knight's reflection appears in the artwork of "[[Last Chapter of the Noble Knights]]". This is supported by "Laundsallyn" in this card's artwork visibly influencing this knight, as a means of revenge for its death.
  * This knight appears in the artwork of "[[Noble Knights of the Round Table]]".
  * This card's [[Special Summon]] effect is nearly identical to that of the [[Level]] 7 "[[Dragon Ruler]]s", being able to Special Summon itself from the hand or Graveyard by [[banish]]ing two related cards from the Graveyard.
