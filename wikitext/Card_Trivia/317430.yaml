title: Card Trivia:Paladin of Photon Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Luminous Dragon Ritual]]".
  * This monster has 4 [[Paladins of Dragons]] [[counterpart]]s.
  ** "[[Blue-Eyes]]": "[[Paladin of White Dragon]]".
  ** "[[Red-Eyes]]": "[[Paladin of Dark Dragon]]".
  ** "[[Armed Dragon]]": "[[Knight of Armor Dragon]]".
  ** "[[Firewall (archetype)|Firewall]]": "[[Paladin of Storm Dragon]]".
  ** This is the first Paladin of Dragon to not be a [[Dragon]] monster, being a [[Warrior]] instead. It also is the only one with 800 [[DEF]].
  * This is the first [[Ritual Monster]] to be Summoned in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, as well as the first Ritual Monster to appear in the anime since ''[[Yu-Gi-Oh! GX]]''.
