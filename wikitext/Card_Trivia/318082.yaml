title: Card Trivia:Geargiagear Gigant XG
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Duelist Set: Version Machine-Gear Troopers]]''/''[[Geargia Rampage Structure Deck]]''.
  * "[[Geargiano]]", "[[Geargiano Mk-II]]" and "[[Geargiano Mk-III]]" are on the chest of this [[Monster Card|monster]]. They are all [[Level]] 3 monsters which could be used to [[Xyz Summon]] this card.
  * The suit is combination of "[[Gear Gigant X]]" and the carrier shown in "[[Geargiagear]]".
  * This card has 200 more [[ATK]] but 200 less [[DEF]] than its counterpart "Gear Gigant X".
  * The "[[Geargia]]" lore<ref>[http://www.ygorganization.com/geargia-lightsworn-lore/ YGOrganization] - [OCG] Lore on the Geargias and Lightsworn!</ref> has the following information about "Geargiagear Gigant XG":
  ** Height: 14 Meters
  ** Weight: 50 Tons
  ** Composed of Geartite Alloy
  ** Its finishing move is the "Giga Cross Spin"
  ** Its shield is called "Big Gear Shield"
  ** Its gun is the "Gigant Rifle"
  ** Its red gears at its hips are the "Gear Boomerangs"
  * This monster appears in the artwork of "[[Geargia Change]]".

