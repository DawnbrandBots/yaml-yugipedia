title: Card Trivia:Spenta, the Magistus Sealer
wikitext: |-
  {{Navigation}}

  * This is the [[Monster Card]] version of [[Spenta]], a character from the [[Magistus (arc)|Magistus]] arc of the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This monster's name is likely derived from one of the following names used in [[wikipedia:Zoroastrianism|Zoroastrianism]], reinforcing the fact that the manga character Spenta was friends with [[Zoroa]], whose name is based on [[wikipedia:Zoroaster|Zoroaster]].
  *** [[wikipedia:Amesha Spenta|Amesha Spenta]], a name that usually refers to a class of seven divine deities "emanating" from [[wikipedia:Ahura Mazda|Ahura Mazda]], the supreme divinity in Zoroastrianism.
  *** [[wikipedia:Spenta Armaiti|Spenta Armaiti]], the name of one of the Amesha Spenta deities, who is commonly described as being like a daughter to Ahura Mazda, as well as his wife in some narratives.
  *** Spenta Mainyu, the name of another Amesha Spenta deity that is the "Holy Spirit" that Ahura Mazda uses to interact with the world, often depicted as being in opposition to [[wikipedia:Ahriman|Angra Mainyu]], the "Evil Spirit".
