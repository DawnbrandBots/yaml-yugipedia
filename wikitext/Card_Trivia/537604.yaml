title: Card Trivia:Archfiend Marmot of Nefariousness
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Aussa the Earth Channeler]]", "[[Aussa the Earth Charmer]]", "[[Avalanching Aussa]]", "[[Home of the Charmers]]", "[[Night Before the Big March]]" (as a silhouette), "[[Return from the Different Dimension]]", "[[Spiritual Art Familiars]]", "[[Spiritual Refinement]]", and "[[The Big March of Animals]]" (as a silhouette).
  * This monster has five [[counterpart]]s:
  ** A [[recolored counterpart]]: "[[Obese Marmot of Nefariousness]]".
  ** Two [[Card evolutions|advanced]] forms: "[[Nefarious Archfiend Eater of Nefariousness]]" and "[[Awakening of the Possessed - Nefariouser Archfiend]]".
  ** A ''[[Rush Duel]]'' [[Yakiniku]] counterpart: "[[Archfiend Marmot of Deliciousness]]".
  ** A retrained ''Rush Duel'' counterpart: "[[Familiar of the Earth Spiritualist]]".
  * This is one of the two first "[[Archfiend]]" cards released for the ''[[OCG]]''.
  ** Only "[[Summoned Skull]]" and its upgraded [[Fusion Monster|Fusion]] form, "[[Black Skull Dragon]]", predate this monster by first appearance in any media.
  ** All three first appeared in the first [[Yu-Gi-Oh! Duel Monsters (video game)|''Yu-Gi-Oh! Duel Monsters'']] video game, which predates the ''OCG''.
  * In early ''Yu-Gi-Oh!'' video games, this monster's name was "Air Marmot of Nefariousness", but it was still an "Archfiend" monster because of its Japanese name, "Daemon Beaver". It was renamed to show inclusion of this [[archetype]] from the first (and only) ''[[TCG]]'' release.
  ** The last appearance of this monster's former name was in ''[[Yu-Gi-Oh! Destiny Board Traveler]]'' released in North American on October 26, 2004, while the first ''TCG'' release of its new name was on June 1, 2005. This change was reflected on subsequent video game appearances starting from ''[[Yu-Gi-Oh! Ultimate Masters: World Championship Tournament 2006]]''.
