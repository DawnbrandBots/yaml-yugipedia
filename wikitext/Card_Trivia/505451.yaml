title: Card Trivia:Gryphon Wing
wikitext: |-
  {{Navigation}}

  * "[[Phantom Gryphon]]" appears in this card's artwork.
  ** The fact that this card specifically counters "[[Harpie's Feather Duster]]" refers to a rivalry between "Phantom Gryphon" and "[[Harpie]]" monsters, as mentioned in the flavor text of "Phantom Gryphon".
  *** Because of this specific counter, "[[Gryphon's Feather Duster]]" is a parody of "Harpie's Feather Duster".
  ** This card marks the first appearance of "Phantom Gryphon" nearly 15 years before its release in ''[[Crossed Souls]]''.
  * This is one of several cards that were created to counter one specific card, each of which have been [[Limited]] or [[Forbidden]] at some point. The others are "[[Anti Raigeki]]", "[[White Hole]]", "[[Jar Robber]]", "[[Call of the Grave]]" and "[[Call of Darkness]]".

