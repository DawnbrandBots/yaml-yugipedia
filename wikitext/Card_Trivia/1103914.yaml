title: Card Trivia:Mitsurugi no Mikoto, Kusanagi
wikitext: |-
  {{Navigation}}

  * An illustration of this monster appears in the artwork of "[[Mitsurugi Prayers]]".
  * This monster is named after ''[[wikipedia:Kusanagi no Tsurugi|Kusanagi-no-Tsurugi]]'', a legendary sword wielded by the mythological deity Susano-o in Japanese folklore.
