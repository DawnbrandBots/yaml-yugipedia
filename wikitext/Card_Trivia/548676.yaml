title: Card Trivia:Trickstar Delfiendium
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the  ''[[wikipedia:Delphinium|Delphinium]]'', a genus of toxic annual and perennial flowering plants, which appears as the symbols of the forms of this card's artwork.
  ** This monster's Japanese name is a portmanteau of the words "''Delphinium''" and [[wikipedia:Devil|devil]], the personification of evil in various cultures and religious traditions. This monster's ''[[TCG]]'' name replaces the word "devil" with "[[fiend]]".
