title: Card Trivia:Masked HERO Dark Law
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: HERO's Strike]]''/''[[HERO Strike Structure Deck]]''.
  * This monster's armor appears in the artwork of "[[Form Change]]".
  * This monster is based on the archetypal black Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[DARK]], which is represented by a dark-colored circle.
  * This monster's Japanese name (ダーク・ロウ, ''Dāku Rō'') is a pun on the word "wolf" (狼, ''rō''), which this monster's armor is based on.
  ** This monster also shares a similar naming convention to "[[Masked HERO Dusk Crow]]", as their Japanese names contain the characters 「クロウ」 (''kurou''), which sound similar to the Japanese word for the color black (黒, ''kuro''), relating to their DARK Attribute and color scheme.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|056|ref}}, specifically from the panel showing [[Masked Hero Dark Law (manga)|this monster]] being Summoned.
  ** This card's alternate artwork references the ''"Rider Kick"'', a signature finishing move among various protagonists in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' series.
