title: Card Trivia:Colossal Fighter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Discord Counter]]", "[[Synchro Blast]]", "[[Synchro Change]]", "[[Synchro Destructor]]", and "[[Turf]]".
  * This monster's Japanese name, "Gigantech", is a pun on the word "gigantic" and "technology", referencing its futuristic design.
  * This monster has an [[Card evolutions|upgraded]] "[[/Assault Mode]]" form: "[[Colossal Fighter/Assault Mode]]".
