title: Card Trivia:Helixx Dreadrat
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's skeleton appears in the artwork of "[[Graveyard Incubation]]".
  * This monster is based on a [[wikipedia:Laboratory rat|laboratory rat]], a subspecies of rat bred and kept for the purpose of scientific research, including gene splicing, keeping in relation with the [[wikipedia:genetics|genetics]] theme of the "[[Helixx]]" [[archetype]].
