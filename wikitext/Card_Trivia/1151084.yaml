title: Card Trivia:Forbidden Crown
wikitext: |-
  {{Navigation}}

  * "[[Condemned Darklord]]" and "[[Darklord Eveningstar]]" appear in this card's artwork.
  * According to Valuable Book EX 6, this card depicts "Condemned Darklord" gifting the "Forbidden Crown" to "[[Darklord Morningstar]]", transforming him into "Eveningstar" to aid him in defeating [[Solemn|God]].
