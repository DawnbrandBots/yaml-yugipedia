title: Card Trivia:Inari Fire
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Familiar-Possessed - Hiita]]" and "[[Unpossessed]]", although with a slightly different design.
  * This monster is named after [[wikipedia:Inari Ōkami|Inari]], the god of foxes in [[wikipedia:Japanese mythology|Japanese mythology]].
  * This monster is an evolution of "[[Fox Fire]]", and itself has a further powered-up form: "[[Awakening of the Possessed - Greater Inari Fire]]".
