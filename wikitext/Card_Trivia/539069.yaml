title: Card Trivia:Trap Dustshoot
wikitext: |-
  {{Navigation}}

  * "[[Dark Scorpion - Cliff the Trap Remover]]" appears in this card's artwork.
  * This card appears in the artwork of "[[Card Chute]]", as a reference to that card's name.
  * This card's English name is mistranslated from the original Japanese, which describes the trap depicted as a "dust chute".
