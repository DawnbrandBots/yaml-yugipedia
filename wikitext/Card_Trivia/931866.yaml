title: Card Trivia:Click & Echo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ryu-Ge Realm - Sea Spires]]".
  * "[[Squirt Squid]]" appears in this card's artwork.
  * This monster's has the same design as "[[Imairuka]]" and "[[Minairuka]]", which are both based on [[wikipedia:Dolphin|dolphins]].
  * This monster's name and artwork reference the dolphin's ability to perceive its environment via [[wikipedia:Animal echolocation|echolocation]], by making "click" noises and listening to the resulting "echoes".
  ** This is reflected by this monster's effect to force the player to keep their [[hand]] revealed if this card [[Special Summon]]ed by its effect is in the [[Monster Zone]].
  * This is the first card where the character "＆" (fullwidth ampersand) is printed with the font formerly mainly reserved for Latin letters and Arabic numerals. All older instances of said character are printed with a different font.
