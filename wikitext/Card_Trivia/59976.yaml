title: Card Trivia:Underground Arachnid
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Underground Arachne", is based on [[wikipedia:Arachne|Arachne]], a woman in [[wikipedia:Greek mythology|Greek mythology]] that was transformed into a spider.
  * This is the first [[Insect]] [[Synchro Monster]] released in the ''[[OCG]]''/''[[TCG]]''.
  ** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this is a [[Dark Synchro Monster]]; the first Insect Synchro monster to appear in the anime was "[[T.G. Recipro Dragonfly]]".
  * This monster and "[[XX-Saber Emmersblade]]" are the first two Insect monsters to be released in the ''OCG''/''TCG'' as [[Secret Rare]]s in a [[Booster Pack]] (''[[Absolute Powerforce]]'').
