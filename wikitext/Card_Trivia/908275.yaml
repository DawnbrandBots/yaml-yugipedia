title: Card Trivia:Lord of the Heavenly Prison
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Mega Pack 06]]''.
  * The kanji 「{{Ruby|天|てん}}{{Ruby|獄|ごく}}」 (''Tengoku'') in this card's name is a portmanteau of the Japanese words for "heaven" ({{Ruby|天|てん}}{{Ruby|国|ごく}} ''Tengoku''), "hell" ({{Ruby|地|じ}}{{Ruby|獄|ごく}} ''Jigoku'') and "prison" ({{Ruby|獄|ごく}} ''Goku'').
