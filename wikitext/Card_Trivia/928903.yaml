title: Card Trivia:Tri-Brigade Rugal the Silver Sheller
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Opening]]", "[[New Frontier]]", "[[Tri-Brigade (card)|Tri-Brigade]]", "[[Tri-Brigade Hammer]]", "[[Tri-Brigade Revolt]]", "[[Tri-Brigade Showdown]]", "[[Tri-Brigade Stand-Off]]", and "[[Triple Tactics Thrust]]" (2nd artwork).
  * This monster is named after the [[wikipedia:Rougarou|rugaru]], a werewolf-like creature in French mythology.
  ** This monster's title and usage of pistol-shaped axes are based on the [[wikipedia:Silver bullet|silver bullet]], a weapon that is effective against a werewolf.
