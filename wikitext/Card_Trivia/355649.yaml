title: Card Trivia:Hippo Carnival
wikitext: |-
  {{Navigation}}

  * The "[[Hippo Token]]s" depicted in this card's artwork are dressed to resemble stereotypical [[wikipedia:Showgirl|Las Vegas Showgirls]].
  * The "Hippo Tokens" in this card's artwork resemble "[[Performapal Hip Hippo]]"; incidentally both these cards were used by [[Yuya Sakaki]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** Ironically, Yuya played this card first in a separate Duel before he first [[Summon]]ed "Hip Hippo" in his first fully-seen [[Duel]]; this is remarkable given the fact that the protagonists in each of the previous series have traditionally played a [[Monster Card]] in their first on-screen Duel.
  * This card has an [[Card evolutions|upgraded]] form: "[[Super Hippo Carnival]]".
