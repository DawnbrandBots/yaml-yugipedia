title: Card Trivia:Vortex Trooper
wikitext: |-
  {{Navigation}}

  * This monster's [[WIND]] [[Attribute]] and design are based on a [[wikipedia:Fan (machine)|mechanical fan]], a machine designed to create an airflow.
  ** This monster's Japanese name, "Air Circulator", references the mechanical fan's function to circulate the air, while its ''[[TCG]]'' name references the vortexes of air that mechanical fans create.
  *** This monster's Japanese name reflects its effect to "circulate" the player's [[hand]] by [[shuffle|shuffling]] two cards into the [[Deck]] and [[draw]]ing two cards.
  ** This monster's WIND Attribute and [[Aqua]] [[Type]] reference its owner, [[Adrian Gecko]], who used the "[[Cloudian]]" [[archetype]], which consists of monsters based on clouds, the aerosol form of evaporated water.
