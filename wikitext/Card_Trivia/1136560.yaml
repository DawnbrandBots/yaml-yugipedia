title: Card Trivia:Black Rose Garden
wikitext: |-
  {{Navigation}}

  * A statue of "[[Black Rose Dragon]]" appears in this card's artwork.
  ** The statue resembles the petrified form of "Black Rose Dragon" after its [[ATK]] becomes 0 via the effect of "[[Reptilianne Gorgon (anime)|Reptilianne Gorgon]]" in {{episode|5D's|038|ref}}.
  * This card is a [[retrain]]ed counterpart of "[[Black Garden]]".
  ** This card's [[Continuous Spell]] [[Card type|type]] and effect to change the [[Type]]s of all [[face-up]] monsters on the [[field]] to [[Plant]] is a reference to "[[Ivy Shackles (anime)|Ivy Shackles]]", a Continuous Spell Card used by [[Akiza Izinski]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which was released as a [[Continuous Trap Card]] in the ''[[OCG]]''/''[[TCG]]''.
