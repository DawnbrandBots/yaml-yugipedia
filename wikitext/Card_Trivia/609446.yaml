title: Card Trivia:Gnomaterial
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the words "[[wikipedia:Gnome|gnome]]" (with its appearance based on a [[wikipedia:Garden gnome|garden gnome]]) and "[[material]]".
  ** This card's name can be read as "no material", a reference to this card's effect to prevent a monster from being [[tribute]]d or used as material for a summon from the [[Extra Deck]].
