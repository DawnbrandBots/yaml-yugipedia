title: Card Trivia:Hi-Speedroid Puzzle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Speedroid Dupligate]]".
  * This monster's Japanese name, "Sharp Sword Spy Zule" ({{Ruby|快|かい}}{{Ruby|刀|とう}}{{Ruby|乱|らっ}}{{Ruby|破|ぱ}}ズール, ''Kaitōrappa Zūru''), is a pun on "puzzle" (パズル, ''pazuru'') and the idiom "''kaitōranma wo tatsu''" (快刀乱麻を断つ), which basically means "cutting the [[wikipedia:Gordian Knot|Gordian Knot]]" or, in other words, "to solve a difficult problem through a simple direct answer".
  ** Fittingly, at the start of the [[Damage Step]], this monster can make its [[ATK]] become double its current ATK until the end of the Damage Step if it [[battle]]s a [[Special Summon]]ed monster.
