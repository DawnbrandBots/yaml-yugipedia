title: Card Trivia:Sevens Road Ultima Witch
wikitext: |-
  {{Navigation}}

  * There are seven cross-shaped symbols in this card's artwork, referencing the seven motif of the [[Sevens Road]] series.
  ** This symbol is the same as the symbol from the artwork of "[[Sevens Road Witch]]" (colored purple instead of red).
  * The chain of seven colored rings hanging off of this monster's pauldron matches the colors of the seven main Sevens Road monsters, in descending order by Level ("[[Sevens Road Magician|Magician]]", "[[Sevens Road Witch|Witch]]", "[[Sevens Road Warlock|Warlock]]", "[[Sevens Road Sorcerer|Sorcerer]]", "[[Sevens Road Enchanter|Enchanter]]", "[[Sevens Road Mage|Mage]]", and "[[Sevens Road Wiz|Wiz]]"). This chain is similar to the one that appears in the artwork of "[[Master of the Sevens Road]]".
  ** The colors of the spheres surrounding this monster's staff also represent the seven main Sevens Road monsters, with the larger orb in the center representing "Witch".

  * The concentric rings inside and surrounding this monster's staff also appear in the artwork of "[[Sevens Road Mage]]".

  * This monster is an older version of "[[Sevens Road Witch]]".

  * This is the first [[Fusion Monster]] in ''[[Yu-Gi-Oh! Rush Duel]]'' that specifically requires another Fusion Monster as [[Fusion Material]], as well as the first card to have both an alternate [[artwork]] and an [[Over Rush Rare]] variant in its debut set.
