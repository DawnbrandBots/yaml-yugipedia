title: Card Trivia:Summon Gate
wikitext: |-
  {{Navigation}}

  * "[[Elder Entity Norden]]", "[[Goyo Guardian]]", "[[Number 16: Shock Master]]", "[[Performage Plushfire]]", and "[[Thousand-Eyes Restrict]]", as well as the blue officer from the artwork of "[[Mistaken Arrest]]", appear in this card's artwork.
  ** The monsters in the cell represent each of the different [[card type]]s that could be [[Special Summon]]ed from the [[Extra Deck]] at the time of this card's release ([[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], [[Xyz Monster|Xyz]], and [[Pendulum Monster|Pendulum]]).
  ** This card's artwork is a reference to "Thousand-Eyes Restrict" ceasing to be [[Forbidden]] on the [[April 2016 Lists (OCG)|April 2016 Forbidden/Limited list]] of the ''[[OCG]]'', which went into effect three months before this card's release.
  ** The other monsters behind the barrier in this card's artwork were all Forbidden in the ''OCG'' at the time of this card's release.
  ** The monsters in the cell seems to be dissatisfied with "Thousand-Eyes Restrict's" release, with an exception of "Goyo Guardian" who bids a tearful farewell to "Thousand-Eyes". This may be a reference to their similar effect of taking control of an opponent's monster.
  *** Coincidentally, "Goyo Guardian" was later released from the Forbidden list after receiving an [[errata]].
  ** The events in this card's artwork are the continuation of the events in the artwork of "[[Extra Net]]".
