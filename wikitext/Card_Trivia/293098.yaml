title: 'Card Trivia:Number 62: Galaxy-Eyes Prime Photon Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is the [[cover card]] of ''[[Primal Origin]]'', as well as one of the cover cards of ''[[Primal Origin: Deluxe Edition]]''.
  * This monster appears in the artworks of "[[Eternal Galaxy]]" and "[[Saga of the Dragon Emperor]]".
  ** In addition, the artwork of "[[Numbers Last Hope]]" depicts "Galaxy-Eyes Photon Dragon" in the process of transforming into this monster.
  * This monster is an [[Card evolutions|upgraded]] "[[Number]]" form of "[[Galaxy-Eyes Photon Dragon]]".
  ** This monster is the true form of "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]", as stated by [[Kite Tenjo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  *** This is also confirmed by the [[Legend of the Dragons of Light and Time]], where this monster appears instead of "Galaxy-Eyes Photon Dragon".
  ** This monster is the true rival of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]".
  * This monster can be considered the [[Astral World]] [[counterpart]] of "[[Neo Galaxy-Eyes Photon Dragon]]", which was created with the power of the [[Barian World]] instead.
  ** In addition, when using "[[Neo Galaxy-Eyes Photon Dragon (anime)|Neo Galaxy-Eyes Photon Dragon]]" in the anime, Kite glowed red with energy from the Barian World, but when he used [[Number 62: Galaxy-Eyes Prime Photon Dragon (anime)|this monster]], he glowed blue with energy from the Astral World instead.
  * This monster has an upgraded "[[Number C]]" form: "[[Number C62: Neo Galaxy-Eyes Prime Photon Dragon]]".
  * This is the first "[[Photon]]" monster to also be a "Number" monster.
  * This is the first "[[Galaxy-Eyes]]" to break the naming pattern of "(...) Galaxy-Eyes (Elementary Particle) Dragon".
  * This was the last "Number" Summoned in the ''Yu-Gi-Oh! ZEXAL'' anime to have a [[neutral form]].
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when Kite Summoned this monster, he called it the "Galactic Ultimate Dragon"(銀河究極龍, ''Ginga kyūkyoku ryū'').
