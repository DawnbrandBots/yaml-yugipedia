title: Card Trivia:White Relic of Dogmatika
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Banishment]]", "[[Branded in Central Dogmatika]]", and "[[Quadogmatika Beast]]".
  * This monster seems to be the girl that appears in the artwork of "[[Dogmatika Genesis]]". She also seems to be the successor of "[[Dogmatika Ecclesia, the Virtuous]]" as the 'saint' of the "[[Dogmatika Nation]]".
  ** Fittingly, both have the same [[Level]] (4).
  ** This monster has a "Hole" pattern in her design, like the "[[Despia]]" monsters, which is a reference to how she was granted her powers by "[[Dogmatika Maximus]]" ("[[Dramaturge of Despia]]"). "Ecclesia" also had the same pattern on her [[wikipedia:Stole (vestment)|stole]].
  * This monster may be based on the [[wikipedia:Catacomb saints|catacomb saints]], the corpses of Christians that were exhumed from the [[wikipedia:Catacombs of Rome|catacombs of Rome]] to be lavishly decorated and worshipped as the relics of famous saints.
  ** According to the [[The Valuable Book EX 2 card storylines]], this monster is possessed by the soul of "Quem", the very first saint of the "Dogmatika Nation".
  *** This suggests that this monster only qualifies as a saint due to housing the soul of a real saint.
  *** The name "Quem" is also based on the Latin phrase ''[[wikipedia:Quem quaeritis?|Quem quaeritis?]]'', like "[[Despian Quaeritis]]", a monster that seems to be this monster's partner.
  ** The kanji 「聖骸」 (''seigai'', "holy corpse") in this card's Japanese name monster is a reference to the [[wikipedia:Shroud of Turin|Shroud of Turin]] (聖骸布 ''Seigaifu'', "Holy Corpse Shroud").
  ** Additionally, the kanji 「葬列」 (''sōretsu'', "funeral line") in the Japanese name of this card's [[Ritual Spell Card]], "[[Dogmatikamacabre]]", can be translated to "funeral procession": fittingly, an escort of skeletal worshippers appears around this monster in this card's artwork, as if they were participating in a funeral procession.
  * This card is a [[counterpart]] of "[[White Knight of Dogmatika]]".
  ** Both are [[LIGHT]] [[Spellcaster]] [[Ritual Monster]]s with 500 [[ATK]] and 2500 [[DEF]].
  ** Both have an [[effect]] to [[send]] monsters from the opponent's [[Extra Deck]] to the [[Graveyard]].
  ** Both list the name of a "[[Dogmatika]]" Ritual Spell Card in their text: "[[Dogmatikamacabre]]" for this card and "[[Dogmatikalamity]]" for "White Knight of Dogmatika".
  ** Along with their Ritual Spells, they have the kanji 「{{Ruby|凶|きょう}}{{Ruby|導|どう}}」 (''Kyōdō'' "Heretical") in their Japanese names, unlike the rest of the "Dogmatika" monsters, which use 「{{Ruby|教|きょう}}{{Ruby|導|どう}}」 (''Kyōdō'' "Dogmatic") instead, in reference to the real [[Despia|wicked nature]] of the "Dogmatika" Church.
  ** Both are based on the original paladins of the "Dogmatika Nation": this monster is the successor of "Dogmatika Ecclesia, the Virtuous", while "White Knight" is a half-corrupted form of "[[Dogmatika Fleurdelis, the Knighted]]".
  ** Both monsters have a "Hole" pattern.
