title: 'Card Trivia:Barian Battlemorph: Number Over One Hundred'
wikitext: |-
  {{Navigation}}

  * This Skill's name references the [[Barian Battlemorph]] ability used by the [[Seven Barian Emperors]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, where each member can transform from their human form and into their [[Barian]] form.
  ** This Skill's effect further reflects this, as the transformation of certain Barian Emperors into their Barian form is usually followed by their usage of "[[Rank-Up-Magic Barian's Force]]" to transform their "[[Number 10X|Over Hundred Number]]" into an "[[Number C10X|Over Hundred Chaos Number]]".
