title: Card Trivia:Cycroid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Training Wheels]]".
  ** Fittingly, this monster's [[flavor text]] references "Training Wheels": ''"It can arm itself with training wheels!"''
  * This monster is based on a [[wikipedia:Bicycle|bicycle]], a pedal-driven single-track vehicle with two wheels attached to a frame, one in front of the other.
  ** The prefix "Cyc-" is a pun on this monster's design, which resembles a one-eyed (or '''cyc'''lopean) bi'''cyc'''le.
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Pair Cycroid]]".
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, two copies of this monster were required as [[material]] for the [[Fusion Summon]] of "[[Pair Cycroid (anime)|Pair Cycroid]]".
  * This is the first and currently only "[[roid]]" [[Normal Monster]].
