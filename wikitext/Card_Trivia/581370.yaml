title: Card Trivia:Battle Shogun of the Six Samurai
wikitext: |-
  {{Navigation}}

  * This monster appears to be an older version of "[[Shien's Daredevil]]".
  ** This is supported by the fact that "Shien's Daredevil" is the only monster that can be [[add]]ed to the [[hand]] by this monster's effect.
  * This monster is depicted wielding a ''[[wikipedia:saihai|saihai]]'' in his left hand, which is a [[wikipedia:Baton (military)|military baton]] used in ancient Japan as a signaling device, as well as a symbol of this monster's status as an army commander.
