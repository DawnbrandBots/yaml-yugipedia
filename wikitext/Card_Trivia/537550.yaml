title: Card Trivia:Moai Interceptor Cannons
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Moai|Moai]], monolithic human figures made of rock in the [[wikipedia:Easter Island|Easter Island]].
  ** This monster is also based on the [[wikipedia:Moai|Moai]] statues which are frequent enemies in [[Konami]]'s ''[[wikipedia:Gradius|Gradius]]'' video game franchise. They attack by spitting out rings toward the player.
