title: Card Trivia:D/D Scale Surveyor
wikitext: |-
  {{Navigation}}

  * This monster's design is based on a [[wikipedia:Scale ruler|scale ruler]], a tool for measuring lengths and transferring measurements at a fixed length ratio.
  ** This monster's name and design are puns on the [[Pendulum Scale]], which reflects its [[Pendulum Effect]] to make Pendulum Scales of two cards in the [[Pendulum Zone]] become 0.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|016|ref}}, specifically from the panel showing [[D/D Scale Surveyor (manga)|this monster]] materializing before [[activate|activating]] its [[Pendulum Effect]].
