title: Card Trivia:Sevens Road Enchanter
wikitext: |-
  {{Navigation}}

  * This card's artwork features seven cross-shaped symbols, referencing the "7" motif of the [[Sevens Road]] [[series]].
  ** This symbol also appears in the artwork of artworks of "[[Majesty of the Sevens Road]]" and "[[Master of the Sevens Road]]".
  *** The artwork of "Master of the Sevens Road" shows that this monster corresponds to the lower right symbol in the Sevens Road crest. When "[[Master of the Sevens Road (anime)|Master of the Sevens Road]]" appears in the anime, the order of the symbols is reversed, so it instead appears to correspond to the bottom symbol.
  * This monster's gun-like device is likely based on the [[wikipedia:Ultra Hand|Ultra Hand]], a toy which utilizes the concept of the "lazy tongs" [[wikipedia:pantograph|pantograph]] principle to grab things.
  * This monster has a [[Celeb Rose]] [[counterpart]]: "[[Celeb Rose Enchanter]]".
  ** Both monsters share the same [[Level]] (3), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (1200/100).
  * This is the first ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' card to receive a major [[Card Errata|erratum]].
