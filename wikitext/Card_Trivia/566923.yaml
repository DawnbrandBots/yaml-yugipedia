title: Card Trivia:Matriarch of Nephthys
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Nephthys, the Sacred Preserver]]", "[[Rebirth of Nephthys]]", and "[[Last Hope of Nephthys]]".
  * Visually, this monster appears to be an older version of "[[Hand of Nephthys]]", as they both have the same clothing (to a certain extent) and same-colored hair.
  ** They also have the same headress, although this monster has hers by her waist.
