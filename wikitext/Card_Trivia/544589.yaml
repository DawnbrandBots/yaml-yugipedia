title: Card Trivia:Heavy Metal Raiders
wikitext: |-
  {{Navigation}}

  * "[[Blast Sphere]]", "[[Launcher Spider]]", "[[Metalzoa]]", "[[Pendulum Machine]]", "[[Slot Machine]]" (equipped with 3 copies of "[[7 Completed]]"), and "[[Space Megatron (manga)|Space Megatron]]" appear in this card's artwork.
  ** "Launcher Spider" is a [[FIRE]] monster, and is therefore not compatible with this card's effect to [[support]] [[DARK]] [[Machine]] monsters; however, its [[retrained]] counterpart "[[BM-4 Blast Spider]]" (which was released alongside this card in ''[[Duelist Pack: Legend Duelist 2]]'') is compatible with this effect.
  * This card's name is based on {{chapter|Yu-Gi-Oh!|120|ref}}, which marks the beginning of [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] and [[Keith Howard (manga)|Bandit Keith Howard's]] [[Duelist Kingdom (manga arc)|Duelist Kingdom]] Duel in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, in which the latter used the depicted monsters.
  * This card has a [[Skill Card]] counterpart: "[[Heavy Metal Raiders (Skill Card)|Heavy Metal Raiders]]".
