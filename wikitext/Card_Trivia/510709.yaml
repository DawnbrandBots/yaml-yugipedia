title: Card Trivia:Dark Scorpion - Gorg the Strong
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dark Scorpion Burglars]]", "[[Dark Scorpion Combination]]", and "[[Mustering of the Dark Scorpions]]".
  * According to the ''"Master Guide"'', this monster seems to have a crush on "[[Dark Scorpion - Meanae the Thorn]]" but can't express his feelings due to his stone-face nature and lack of emotions.
