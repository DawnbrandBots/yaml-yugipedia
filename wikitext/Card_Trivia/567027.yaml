title: Card Trivia:Oboro-Guruma, the Wheeled Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mayakashi Mayhem]]" and "[[Mayakashi Metamorphosis]]".
  * This monster is based on the [[wikipedia:Oboroguruma|Oboroguruma]], a ''[[wikipedia:Yōkai|yōkai]]'' in [[wikipedia:Japanese folklore|Japanese folklore]] that takes the form of a ghostly oxcart with a face on it.
  * This monster is an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form of "[[Shafu, the Wheeled Mayakashi]]".
