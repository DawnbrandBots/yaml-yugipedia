title: Card Trivia:Flower Cardian Peony with Butterfly
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Recardination]]" and "[[Super All In!]]".
  * Two "[[Blazewing Butterfly|Blazewing Butterflies]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Peony with Butterfly", one of the special cards in the "Peony" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (6) references how the "Peony with Butterfly" card falls under the month of June, the sixth month of the year.
  ** This monster's [[original ATK and DEF]] (1000/1000) references how the "Peony with Butterfly" card is a ''tane'' card, which is worth ten points.
