title: Card Trivia:Performapal Turn Toad
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Command Performance]]", "[[Performapal Curtain Call]]", "[[Performapal Reborn Force]]", and "[[Performapal Revival]]".
  ** A coloured outline of this monster appears in the artwork of "[[Performapal Duelist Extraordinaire]]".
  * This monster's Japanese name (ヒックリカエル, ''Hikkurikaeru'') is a portmanteau of the Japanese words "''hikkurikaeru''" (引繰り返る, lit. "to be reversed") and "''kaeru''" (frog).
  ** This is reflected in this monster's effect to change its [[battle position]], and switch one monster's current [[ATK]] and [[DEF]] until the end of the turn.
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this is the first [[Pendulum Monster]] that [[Yuya Sakaki]] [[activate]]d in the [[Pendulum Zone]] for a successful [[Pendulum Summon]] that was not "[[Stargazer Magician (anime)|Stargazer Magician]]" or "[[Timegazer Magician (anime)|Timegazer Magician]]".
