title: Card Trivia:Mother Grizzly
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Howl of the Wild]]".
  * This card's [[WATER]] [[Attribute]] is likely a reference to the fact that [[wikipedia:Grizzly bear|grizzly bears]] regularly hunt for fish.
  * This card has five counterparts, each one for a different Attribute: "[[Giant Rat]]" for [[EARTH]], "[[Flying Kamakiri 1|Flying Kamakiri #1]]" for [[WIND]], "[[UFO Turtle]]" for [[FIRE]], "[[Mystic Tomato]]" for [[DARK]], and "[[Shining Angel]]" for [[LIGHT]].
