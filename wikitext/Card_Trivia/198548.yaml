title: Card Trivia:Infinity (card)
wikitext: |-
  {{Navigation|mode=nonGame|Infinity}}

  * This card's artwork features a galaxy similar to the [[wikipedia:Milky Way|Milky Way]], where the [[wikipedia:Solar System|Solar System]] is located.
  ** The galaxy also appears to be the same one that is depicted when "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" performs [[Contact Fusion]] in the ''[[Yu-Gi-Oh! GX]]'' anime. As such, the galaxy in this card's artwork also appears in the anime artwork of "[[Miracle Contact (anime)|Miracle Contact]]".
  * This card's name is based on how [[Yusuke Fujiwara]] (while possessed by [[Nightshroud]]) described the [[World of Darkness]] as an "infinite" world in {{episode|GX|175|ref}}.
  ** In the same episode, Fujiwara also described the World of Darkness as "zero". In later episodes, this description is referenced and reinforced by this card and "[[Zero]]", both of which share a relationship with "[[Darkness]]" and the "[[Darkness (archetype)|Darkness]]" [[Continuous Trap Card]]s.
