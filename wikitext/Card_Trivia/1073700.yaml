title: Card Trivia:Transam Assault Linac
wikitext: |-
  {{Navigation}}

  * This monster's weapon appears in the artwork of "[[Transam Buster Linac]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Transam Linac]]".
  ** Visually, this monster is a Fusion of "Transam Linac" and "[[Transam Lika]]", which [[Yudias Velgear]] first used to [[Fusion Summon]] this card in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * This monster has a [[counterpart]]: "[[Transam Power Linac]]".
  ** Both are [[Level 7]] [[Transam]] Fusion Monsters with 2600 [[ATK]] and 1600 [[DEF]].
  ** Both require "Transam Linac" and another [[Galaxy (Type)|Galaxy]] [[Type]] monster as [[Fusion Material]]s.
  ** Both have a [[Activation condition|requirement]] of [[Shuffle|shuffling]] two monsters from the [[Graveyard]] into the [[Deck]] to [[activate]] their effects. They also have an additional effect if their intended second Fusion Material is shuffled to meet the requirement.
  ** In the anime, Yudias [[Summon chants in Yu-Gi-Oh! GO RUSH!!#Yudias Velgear|refers]] to [[Transam Assault Linac|this monster]] as the ''Galactic south wind'', while he calls "[[Transam Power Linac (anime)|Transam Power Linac]]" the ''Galactic north wind''.
  ** Both also have a combined form: "[[Transam Buster Linac]]".
