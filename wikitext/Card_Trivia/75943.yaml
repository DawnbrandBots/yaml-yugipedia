title: Card Trivia:Kelbek
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Exchange of Despair and Hope]]" and "[[Soul Crossing]]".
  * The [[Eye of Wdjat]] appears on this monster's head.
  * This monster has a [[retrained]] [[counterpart]]: "[[Kelbek the Ancient Vanguard]]".
  * This monster's pose in its ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh! Duelist|168|ref}} showing [[Kelbek (manga)|this monster]] being Summoned.
