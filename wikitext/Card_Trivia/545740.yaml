title: Card Trivia:Mekk-Knight Blue Sky
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[World Legacy Key]]", "[[World Legacy's Corruption]]", and "[[World Legacy Succession]]".
  ** The spirit of this monster appears in the artwork of "[[Crusadia Testament]]".
  * This monster's swords are wielded by "[[Mekk-Knight Avram]]", after the events of "World Legacy Succession". One of them was taken by "[[Beckoned by the World Chalice]]" and modified into the scythe wielded by "[[Galatea, the Orcust Automaton]]".
