title: Card Trivia:Blackwing - Auster the South Wind
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Anemoi|Auster]], a member of the Anemoi, the Greek gods of the wind who rule over the cardinal directions from where the winds come from, whereas Auster is the god of the [[wikipedia:South wind|south wind]].
  * This monster, "[[Blackwing - Abrolhos the Megaquake]]", and "[[Blackwing - Blizzard the Far North]]" are the only "[[Blackwing]]" monsters that cannot be [[Special Summon]]ed.
