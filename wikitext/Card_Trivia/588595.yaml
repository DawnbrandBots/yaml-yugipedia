title: Card Trivia:World Legacy Guardragon Mardark
wikitext: |-
  {{Navigation}}

  * "[[World Chalice Guardragon]]" → "[[Imduk the World Chalice Dragon]]" → "[[Crusadia Draco]]" → "[[Guardragon Andrake]]" → "[[World Chalice Guardragon Almarduke]]" / "World Legacy Guardragon Mardark"
  ** This card has the same [[Type]], [[Level]], and [[Attribute]] as "World Chalice Guardragon Almarduke", but their [[ATK]] and [[DEF]] are opposite to each other.
  *** Both monsters seem to be the two halves of "Guardragon Andrake" split apart. "Mardark" seems to represent the 'evil' side of "Andrake".
  * This card's name might be a reference to ''[[wikipedia:Marduk-apla-iddina II|Marduk-apla-iddina II]]'', a Babylonian king also called ''Merodach-Baladan'' in the Bible.
  * This is the only "[[World Legacy]]" monster that is not a [[DARK]] [[Machine]].
