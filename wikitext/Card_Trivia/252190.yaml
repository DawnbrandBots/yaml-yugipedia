title: Card Trivia:Spellbook Star Hall
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * This card is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Star (tarot card)|The Star]].
  ** This card's Japanese name, "Spellbook Hall Étoile", is based on the French word for "star".
  * This card, "[[Spellbook Library of the Crescent]]", and "[[Spellbook Library of the Heliosphere]]" are all rooms located inside "[[The Grand Spellbook Tower]]".
