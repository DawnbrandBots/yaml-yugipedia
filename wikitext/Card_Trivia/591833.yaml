title: Card Trivia:Hajun, the Winged Mayakashi
wikitext: |-
  {{Navigation}}

  * ''Hajun'' (波旬) refers to ''Dairokuten Maō Hajun'' (第六天魔王波旬, lit. "Hajun, Demon King of the Sixth Heaven"), a demon in Buddhism who seeks to destroy the teachings of Buddha. It is known to disguise itself as a monk.
  * This monster is dressed as a [[wikipedia:Yamabushi|Yamabushi]].
  ** Yamabushi are a type of ascetic hermit who can be identified by their garb and tools. Such as the [[wikipedia:Khakkhara|khakkhara]], the [[wikipedia:Horagai|Horagai]], the [[wikipedia:Tokin (headwear)|Tokin]], and the [[wikipedia:Yamabushi|Yuigesa]].
  * This card has a [[Synchro Monster|Synchro]] [[counterpart]]: "[[Tengu, the Winged Mayakashi]]"
  ** [[wikipedia:Tengu|Tengu]] were associated with and frequently depicted wearing the garb of a Yamabushi
