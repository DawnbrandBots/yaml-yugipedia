title: Card Trivia:El Shaddoll Winda
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]'' and ''[[Structure Deck: Rebirth of Shaddoll]]''/''[[Structure Deck: Shaddoll Showdown]]''.
  * This monster appears in the artworks of "[[El Shaddoll Construct]]", "[[El Shaddoll Fusion]]", "[[Nephe Shaddoll Fusion]]", "[[Shaddoll Core]]", and "[[El Shaddoll Grysta]]".
  ** The corrupted "Pulao" also appears in the artwork of "[[Sinister Shadow Games]]".
  ** The jewel in this monster's staff resembles the 'Antiluminescent Stone' in the chest of "[[Cairngorgon, Antiluminescent Knight]]".
  * This monster is the corrupted "[[Shaddoll]]" form of "[[Winda, Priestess of Gusto]]" (mounted on a corrupted "[[Pulao, Wind of the Yang Zing]]").
  ** This monster is the "Shaddoll" counterpart to "[[Daigusto Gulldos]]".
  *** Both depict "Winda" on a flying mount.
  *** Both share the same [[Level]], [[ATK]], and [[DEF]].
  * This card's Japanese name references [[wikipedia:Midrash|Midrash]], which in [[wikipedia:Judaism|Judaism]] is the body of [[wikipedia:Homiletics|homiletic]] stories told by [[wikipedia:Rabbi|rabbinic]] sages to explain passages in the canon of the [[wikipedia:Hebrew Bible|Hebrew Bible]].
  * This monster has an upgraded form: "[[El Shaddoll Meshahrail]]".
  * This monster has a purified "[[Ritual Beast]]" form: "[[Spiritual Beast Tamer Winda]]".
  * On [[October 2014 Lists|October 1, 2014]] in the ''[[OCG]]'', this card and "El Shaddoll Construct" became the first [[Fusion Monster]]s to be [[Limited]] since "[[Thousand-Eyes Restrict]]" in [[September 2005 Lists|September 2005]].
  ** They were also the first "[[Shaddoll]]" monsters to be Limited.
