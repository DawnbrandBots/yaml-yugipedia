title: Card Trivia:Forest of Lost Flowers
wikitext: |-
  {{Navigation}}

  * This card is based on ''Mayoi no Mori'' ({{Ruby|迷|まよ}}いの{{Ruby|森|もり}}), a common name for a mysterious forest in [[wikipedia:Role-playing game|Japanese role-playing games]]; it is often localized differently in English due to the numerous meanings of ''mayoi'' (including "getting lost", "illusions", "mental/spiritual confusion", etc.).
