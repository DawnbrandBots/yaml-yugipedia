title: Card Trivia:Ally of Justice Light Gazer
wikitext: |-
  {{Navigation}}

  * This monster has a similar appearance to "[[Metal Shooter]]". Both monsters also have the same [[ATK]] (if "Metal Shooter" has two [[Counter]]s on it).
  * The head-like formation on its chest is "[[Ally Mind]]", which can be found on most other "[[Ally of Justice]]" monsters as well.
  * This card is similar to "[[Thermal Genex]]"
  ** Both have 2400 [[ATK]]
  ** Both are [[Level]] 8
  ** Both are [[Synchro Monster]]s
  ** Both have an effect to increase their ATK, based on monsters in the [[Graveyard]]
