title: Card Trivia:Sangenpai Bident Dragion
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|燦|さん}}{{Ruby|幻|げん}}{{Ruby|昇|しょう}}{{Ruby|龍|りゅう}}, ''Sangenshōryū'') is a play on ''shōsangen'' (小三元), a ''[[wikipedia:Yaku|yaku]]'' in [[wikipedia:Japanese mahjong|Japanese mahjong]], which is often translated as "little three fundamentals".
  ** This monster's design is a two-headed dragon, reflecting how the ''shōsangen'' requires two triplets of dragon tiles, with the last dragon tile being a pair instead. Fittingly, this monster is the combined "[[Sangen]]" [[Synchro Monster]] form of "[[Tenpai Dragon Chundra]]" and "[[Tenpai Dragon Paidra]]".
  * This monster has an upgraded form combined with "[[Tenpai Dragon Fadra]]": "[[Sangenpai Transcendent Dragion]]".
  * This monster has the highest [[original ATK]] (2600) of all [[Level 7]] [[Tuner monster]]s.
