title: Card Trivia:Dragon Master Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Strength in Unity]]".
  * This monster has two [[counterpart]]s: 
  ** A retrained counterpart: "[[Dragon Master Magia]]" 
  ** An [[Xyz Monster|Xyz]] counterpart: "[[Dragon Master Lords]]".
  * This is the first [[Fusion Monster]] to require a Fusion Monster and a [[Ritual Monster]] as [[Fusion Material]]s.
  * This monster represents the ultimate bond between [[Yami Yugi]] and [[Seto Kaiba]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) and [[original DEF]] (5000, tied with [[5000 DEF Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  * In the ''Yu-Gi-Oh!'' anime, as well as in a few video games (such as ''[[Yu-Gi-Oh! GX Duel Academy]]''), this monster is called "Master of Dragon Soldier".
