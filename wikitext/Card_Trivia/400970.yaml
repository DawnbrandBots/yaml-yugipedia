title: Card Trivia:Ghost Reaper & Winter Cherries
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * This monster's Japanese name (浮幽さくら, ''Fuyu Sakura'') is a pun on the Japanese name for the winter-flowering cherry blossoms (フユザクラ, ''Fuyuzakura'') where the kana for "winter" (ふゆ, ''fuyu'') is replaced with the base kanji for "floating ghost" (浮幽, ''fuyu'').
