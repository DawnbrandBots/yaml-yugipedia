title: Card Trivia:Ally of Justice Field Marshal
wikitext: |-
  {{Navigation}}

  * This monster's remains appear in the artworks of "[[Stairway to a Fabled Realm]]" and "[[Final Gesture]]".
  ** According to the ''[[Duel Terminal Master Guide card storylines]]'', this monster was created using "[[Genex Spare]]" as its Central Control Core, as the "[[Ally of Justice|Allies of Justice]]" lacked the technology needed to create a control system for it. After a fierce battle against many "[[Worm]]s", this monster was severely damaged beyond repair and was abandoned.
  * "[[Ally Mind]]" appears within the head and body of this monster.
  * This card's name has a dual meaning. A 'field marshal' (with one "l") is a military rank, which the monster pictured on the card presumably holds. A 'field marshall' (with two "l") was a British farm tractor used in the early Twentieth Century. This card is thus given its name because it is a [[Machine]] monster, like a field marshall, and holds the rank of field marshal.
  * This monster has a combined "[[Genex]]" form with "[[Ally of Justice Decisive Armor]]": "[[Arms of Genex Return Zero]]".
