title: Card Trivia:Blue-Eyes White Dragon's 3-Body Connection
wikitext: |-
  {{Navigation}}

  * This monster shares the same [[original ATK]] (4500) as "[[Blue-Eyes Ultimate Dragon]]", another monster that is the combination of three "[[Blue-Eyes White Dragon]]s".
  ** This monster's [[original DEF]] (3000) is the same as "Blue-Eyes Ultimate Dragon" when it was released in ''[[Gold Series]]''. Prior to the set's release and in its later release in ''[[Retro Pack]]'' onwards, its original DEF is 3800.
  *** This monster's original [[ATK]] are equal to those of three "[[Blue-Eyes White Dragon]]s" added up and then divided in half. While its [[DEF]] are equal to "Blue-Eyes White Dragon" original ATK.
  * Due to this card's printed Special Rule, this is the only monster that can attack eight times in a row.
