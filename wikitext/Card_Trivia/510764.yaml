title: Card Trivia:Imperial Order
wikitext: |-
  {{Navigation}}

  * The king in this card's artwork also appears in the artworks of "[[Contract Laundering]]", "[[Imperial Custom]]", "[[Imperial Manners]]", "[[Imperial Register]]", "[[Late Penalty]]", and "[[Spell-Stopping Statute]]".
  * This card appears in the artwork of "[[Trap Stun]]".
  * This is the only [[Forbidden]] card that received a [[Errata#Major mechanical changes|major functional erratum]], only to become Forbidden again under that erratum (as of [[February 2022 Lists|February 2022]] and [[April 2022 Lists (OCG)|April 2022]] for the ''[[TCG]]'' and ''[[OCG]]'', respectively).
