title: Card Trivia:Synkron Resonator
wikitext: |-
  {{Navigation}}

  * A [[wikipedia:Suit (cards)|spade]] appears on the front of the sash of this monster's garments.
  * This monster's Japanese name, "Synclone Resonator" (シンクローン・リゾネーター, ''Shinkurōn Rizonētā''), is a portmanteau of the words "[[Synchro]]" (シンクロ, ''Shinkurō'') and "clone" (クローン, ''Kurōn'').
  ** This monster's Japanese name is also a corruption of the name of the "[[Synchron]]" (シンクロン, ''Shinkuron'') [[archetype]]. Fittingly, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, the archetype was used by [[Yusei Fudo]], the main rival of [[Jack Atlas]], who uses this monster in the anime.
