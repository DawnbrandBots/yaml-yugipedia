  * This monster is based on the [[wikipedia:Yale (mythical creature)|yale]], a creature in [[wikipedia:European mythology|European mythology]] who is depicted as a large goat-like creature with tusks and large horns and is often used as a [[wikipedia:Heraldry|heraldry]] [[wikipedia:Charge (heraldry)|charge]].
