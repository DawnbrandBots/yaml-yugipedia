title: Card Trivia:Last Chapter of the Noble Knights
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Noble Knights of the Round Table Box Set]]''.
  * "[[Lady of the Lake]]", "[[Noble Arms - Excaliburn]]" and "[[Noble Knight Bedwyr]]" appear in this card's artwork, along with the reflections of "[[Noble Knight Eachtar]]" and the red version of "[[Noble Arms - Arfeudutyr]]" (as seen in the artwork of "[[Ignoble Knight of High Laundsallyn]]").
  ** Eachtar is currently manipulated by the ghost of Laundsallyn, as seen in the artwork of "Noble Knight Eachtar".
  ** This reflects [[Merlin]]'s prediction of Bedwyr's death, as told in [https://yugiohblog.konami.com/articles/?p=6791 the Konami article].
  * Based on this card's name and the characters present, it seems likely that this card is meant to represent [[wikipedia:Bedivere|Bedivere]] returning [[wikipedia:Excalibur|Excalibur]] to the [[wikipedia:Lady of the Lake|Lady of the Lake]], so that [[Noble Knight Artorigus|Arthur]] may go to [[Avalon]].
  * In other ''[[TCG]]'' languages, the names can be translated as follows:
  ** French and Spanish: "Last Chapter of the Noble Knight"
  ** German: "Noble Knight: The Last Chapter"
  ** Italian: "The Last Chapter of the Noble Knights"
  ** Portuguese: "'''Lost''' Chapter of the Noble Knights"
  : 
  : As seen above with the exception of the Italian and Portuguese names, no plural form of the phrase "Noble Knight" is used, and in the case of the Portuguese name, no [[wikipedia:Agreement (linguistics)|agreement]] is applied, to not exclude this card from the "[[Noble Knight]]" archetype. Also see ''[[Noble Knight#Naming in the TCG]]''. Also note that the Portuguese name suffers a mistranslation.
