title: Card Trivia:Ancient Rules
wikitext: |-
  {{Navigation}}

  * A depiction of "[[Wattaildragon]]" appears in this card's artwork.
  ** As this card predates the release of "Wattaildragon" by nearly six years, it is likely that it is the inspiration for the later card.
  *** This is supported by the [[flavor text]] of "Wattaildragon" stating that capturing it "is forbidden by the Ancient Rules".
  ** In the bottom-right corner of this card's artwork, there is a monster drawn in a box, crossed off by an "X". This represents the [[Special Summon]]ing effect of this card.
  * The ''[[Rush Duel]]'' [[Ancient Rules (Rush Duel)|version]] of this card appears in the artwork of the ''Rush Duel'' version of "[[Exchange (anime Rush Duel)|Exchange]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Ancient Rules]]".
  * This card's name and effect to [[Special Summon]] a [[Level 6]] or lower monster from the [[hand]] reference the rules of ''[[Yu-Gi-Oh! Forbidden Memories]]'', which mainly took place in Ancient Egypt and did not require [[Tribute]]s to [[Normal Summon]] [[Level]] 5 or higher monsters. Its effect specifying [[Normal Monster]]s to be Special Summoned is based on the fact that [[Effect Monster]]s were also not present in ''Forbidden Memories''.
