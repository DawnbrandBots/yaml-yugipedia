title: Card Trivia:Memory Snatcher
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The winged skeleton monster in this card's artwork is depicted wearing a mask resembling the head of the ''[[wikipedia:Baku (mythology)|baku]]'', a monster in Japanese mythology that highly resembles the [[wikipedia:tapir|tapir]], known for devouring dreams.
  * This card reflects it's owner [[Yusuke Fujiwara]]'s beliefs that the bond between friends were meaningless and brought suffering, so making people forget their bonds will relieve their suffering
  ** Fittingly, in {{episode|GX|173|ref}}, this card was used by Yusuke to counter the effect of [[Atticus Rhodes]]' "[[Swing of Memories]]" card to [[Special Summon]] his "[[Red-Eyes B. Dragon (later anime)|Red-Eyes Black Dragon]]", which the latter shares a bond with in the ''[[Yu-Gi-Oh! GX]]'' anime.
