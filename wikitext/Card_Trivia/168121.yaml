title: Card Trivia:Beelze of the Diabolic Dragons
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.9]]''.
  * This card's name is based on [[wikipedia:Beelzebub|Beelzebub]], one of the seven princess of [[wikipedia:Hell|Hell]] in Christian religion who is also known as the "Lord of Flies".
  ** This monster's central body resembles the head of a fly, which is used as a typical representation of the head of Beelzebub. In the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, this card was played by [[Sect Ijuin]], who uses an [[Insect]] Deck.
  * This monster features a female humanoid torso atop the central body between its two dragon heads.
  * This monster has an [[Card Evolutions|evolved]] form: "[[Beelzeus of the Diabolic Dragons]]".
  ** This is the first [[Duel Dragon]] to have an upgrade.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|020|ref}}, specifically from the panel showing [[Archfiend Dragon Beelze (manga)|this monster]] attacking "[[Celestial Wolf Lord, Blue Sirius (manga)|Celestial Wolf Lord, Blue Sirius]]".
