title: Card Trivia:Daigusto Phoenix
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duel Terminal - Xyz Startup!!]]''.
  * This card is the first:
  ** [[WIND]] [[Pyro]]-[[Type]] [[Monster Card|Monster]], .
  ** Pyro-Type [[Xyz Monster]].
  ** "[[Gusto]]" Xyz Monster.
  *** This card is also the only "Gusto" Pyro-Type Monster.
  * This card appears to be a "[[Daigusto]]" Xyz [[retrain]] of "[[Laval Coatl]]", likely created by the alliance that included the Gusto and Laval, during their fight against the "[[Steelswarm]]" corrupted [[Vylon]]" in the [[Duel Terminal Master Guide card storylines|Duel Terminal storyline]].
  ** Both monsters have strong visual similarities.
  ** Both monsters are Pyro-Type. 
  ** Laval Coatl ([[Level 2]]) can be used as [[Xyz Material|material]] for the [[Xyz Summon]] of this monster ([[Rank 2]]).
