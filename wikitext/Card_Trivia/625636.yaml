  [[File:EarthboundImmortalWiraqochaRasca-JP-Anime-5D-NC.jpg|thumb|right|300|The condor geoglyph, next to "[[Earthbound Immortal Wiraqocha Rasca (anime)|Earthbound Immortal Wiraqocha Rasca]]".]]

  * This card is based on the [[wikipedia:Geoglyph|geoglyph]] of the [[Nazca Lines]] appearing when a [[Dark Signer]] [[Duel]]s in the ''[[Yu-Gi-Oh! 5D's]]'' anime, representing their "[[Earthbound Immortal]]" monster.
  ** In this case, this card is based on the condor geoglyph wielded by [[Rex Goodwin]], which represents his "Earthbound Immortal" monster, "[[Earthbound Immortal Wiraqocha Rasca|Wiraqocha Rasca]]".
