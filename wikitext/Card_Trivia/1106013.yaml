title: Card Trivia:Regenesis Archfiend
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is based on ''Bemidar'', the Jewish name for the [[wikipedia:Book of Numbers|Book of Numbers]], the fourth book in the [[wikipedia:Torah|Torah]] which translates to "In the Desert".
  ** Fittingly, this monster was listed as the fourth "[[Regenesis]]" monster to be released in ''[[Alliance Insight]]''.
