title: Card Trivia:Chain Burst
wikitext: |-
  {{Navigation}}

  * Multiple "glaymores" from the variant artwork of "[[Widespread Ruin]]" appear in this card's artwork.
  * This card appears in the artwork of "[[Chain Close]]".
  * This card's effect is the same as that of "[[Curse of Darkness]]", except it applies for Trap Cards.
