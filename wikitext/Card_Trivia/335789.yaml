title: Card Trivia:Ventdra, the Empowered Warrior
wikitext: |-
  {{Navigation}}

  * "Vent" (transcribed into Japanese to "ヴァン" ''van'') is French for "wind".
  * This monster is based on the [[wikipedia:Azure Dragon|Azure Dragon]], one of the [[wikipedia:Four Symbols (China)|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]].
  * This monster appears in the artworks of "[[Blue Dragon Summoner]]" and "[[Empowerment]]".
  * This monster has two alternative forms, namely "[[Dragodies, the Empowered Warrior]]" and "[[Dragonox, the Empowered Warrior]]", and both the latter are also based from a dragon.
