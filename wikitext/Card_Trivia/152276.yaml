title: Card Trivia:Blackwing - Jin the Rain Shadow
wikitext: |-
  {{Navigation}}

  * This monster's name is likely derived from "jindachi-zukuri," a style where a Japanese longsword, the [[wikipedia:Tachi|tachi]], is worn suspended from cords on a belt, edge down, which is wielded by this monster.
  ** This monster's title is derived from a [[wikipedia:Rain shadow|rain shadow]], an area of reduced rainfall on a mountainous region facing away from the prevailing winds on the downwind side.
  * This is one of the few "[[Blackwing]]" monsters released during the ''[[Yu-Gi-Oh! 5D's]]'' era (excluding the manga), along with "[[Blackwing - Breeze the Zephyr]]" and "[[Blackwing - Gust the Backblast]]" to not be played in the anime.
