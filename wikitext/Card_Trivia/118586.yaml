title: Card Trivia:X-Saber Palomuro
wikitext: |-
  {{Navigation}}

  * This is the first and only [[Reptile]]-[[Type]] "[[X-Saber]]" released.
  * The "X" on this staff refers to it being a "X-Saber".
  * This monster originates from [[wikipedia:Palamedes (Arthurian legend)|Lord Palomides]], who is a [[wikipedia:Round Table|Knight of the Round Table]] in the [[wikipedia:King Arthur|Arthurian legend]].
