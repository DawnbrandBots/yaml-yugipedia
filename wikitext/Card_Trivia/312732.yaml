title: Card Trivia:Saffira, Queen of Dragons
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Radiance of the Voiceless Voice]]" (as a silhouette).
  * This monster's name is derived from "[[wikipedia:sapphire|sapphire]]", a [[wikipedia:gemstone|gemstone]] typically noted for its blue color.
  * This monster is a draconic [[Ritual Monster|Ritual]] form of "[[Saffira, Dragon Queen of the Voiceless Voice]]".
  * This monster has a retrained "[[Voiceless Voice]]" [[counterpart]]: "[[Saffira, Divine Dragon of the Voiceless Voice]]".
