title: Card Trivia:Wyrm Excavator the Heavy Cavalry Draco (R)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bucket Wheel Force]]" in [[Maximum Mode]] (together with "[[Wyrm Excavator the Heavy Cavalry Draco (L)|Wyrm Excavator the Heavy Cavalry Draco [L]]]" and "[[Wyrm Excavator the Heavy Cavalry Draco]]").
  * This monster has a combined [[Retrain|form]] (along with "[[Wyrm Excavator the Heavy Cavalry Draco (L)|Wyrm Excavator the Heavy Cavalry Draco [L]]]" and "[[Wyrm Excavator the Heavy Cavalry Draco]]") with "[[Constructor Wyrm Buildragon]]": "[[Infinite Heavy Cavalry Buildragoon]]".
  * "Wyrm Excavator the Heavy Cavalry Draco" and its pieces are based on a [[wikipedia:Bucket-wheel excavator|bucket-wheel excavator]].
  * The combined [[Level]]s of this card and "Wyrm Excavator the Heavy Cavalry Draco [L]" add up to 6; their user in the anime, [[Asana Mutsuba]], attends [[Goha 6th Elementary]].
