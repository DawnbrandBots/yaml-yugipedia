title: Card Trivia:Blazing Cartesia, the Virtuous
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Branded Regained]]", "[[Granguignol the Dusk Dragon]]", "[[Branded Befallen]]", "[[Light of the Branded]]", the second artwork of "[[Fusion Deployment]]", and the third artwork of "[[Incredible Ecclesia, the Virtuous]]".
  ** This monster possesses the wings of "Granguignol" in its alternate artwork and the artwork of "Branded Befallen".
  * This monster is a corrupted form of "[[Incredible Ecclesia, the Virtuous]]" ("[[Dogmatika Ecclesia, the Virtuous]]").
  ** The clothing of this monster matches the style of the "[[Despia]]" monsters, who are also corrupted forms of "[[Dogmatika]]" monsters.
  ** The event prior to the corruption of "Ecclesia" is depicted in "[[Branded in Central Dogmatika]]".
  * This monster and "[[Granguignol the Dusk Dragon]]" are the combined form of the Virtuous Vestals: "[[Incredible Ecclesia, the Virtuous]]" (Ecclesia), "[[The Iris Swordsoul]]" (Fleurdelis), "[[White Relic of Dogmatika]]" (Quem) and "[[Despian Quaeritis]]" (the other 663 vestals).
  ** "[[Despian Luluwalilith]]" is this monster after "Ecclesia" has been freed from it and "Fleurdelis" is in control.
  ** "[[Guiding Quem, the Virtuous]]" is this monster after "Ecclesia" has been freed from it and "Quem" has taken control.
  * This card is the first [[Tuner monster]] in the ''[[OCG]]''/''[[TCG]]'' to be mentioned as [[Fusion Material]].
