title: Card Trivia:Sword & Shield
wikitext: |-
  {{Navigation}}

  * This card is the ''[[Rush Duel]]'' [[Trap Card]] [[counterpart]] of "[[Shield & Sword]]", which depicts the backside of the knight in this card's artwork.
  * The shield and sword in this card's artwork have Monster Card versions of them: "[[Shield in the Right Hand]]" and "[[Sword in the Left Hand]]".
