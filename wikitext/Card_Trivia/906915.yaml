title: Card Trivia:Sneezing Greedizauls
wikitext: |-
  {{Navigation}}

  * This card is the ''[[Rush Duel]]'' [[Nouveau Riche Dinosaur]] counterpart of "[[Kabazauls]]".
  ** This card's Japanese name, "Zenigebasaurus" (ゼニゲバザウルス ''Zenigebazaurusu'') is a portmanteau of "Zenigeba" (the Japanese term for a money-crazed person) and the Japanese romaji for "Kabazauls" (''Kabazaurusu'').
  *** "Zenigeba" is also a portmanteau of "zeni" (the Japanese word for "money") and "geba" (which references "die Gewalt", the German term for "the power"), both of which translates into the term meaning "the power of money".
  *** [[Tracker]], who owns this card in the ''[[Yu-Gi-Oh! SEVENS]]'' anime, can excavate with his powerful sneezes and later becomes inherently greedy, reflecting his use of this card.
