title: Card Trivia:Gateway of the Six
wikitext: |-
  {{Navigation}}

  * This card is a [[The Six Samurai|Six Samurai]] version of "[[The World Tree]]".
  * This card works in a similar way to "[[Black Whirlwind]]".
  * This card appears as the front entrance of "[[Temple of the Six]]" and its widescale view "[[Shien's Dojo]]".
  * This card was the first [[The Six Samurai|Six Samurai]] support card to be limited. It would later be followed by [[Shien's Smoke Signal]] in September 2011.
