title: Card Trivia:Merlin
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Noble Knights of the Round Table Box Set]]''.
  * This card gets its name from the legendary Arthurian wizard [[wikipedia:Merlin|Merlin]]. Merlin's traditional biography casts him as a [[wikipedia:cambion|cambion]]: born of a mortal woman, sired by an [[wikipedia:incubus|incubus]], the non-human from whom he inherits his supernatural powers and abilities.
  ** This above would explain his [[DARK]] Attribute.
  * This is the only card that allows a non-effect [[Xyz Summon]] performed during your opponent's turn.
