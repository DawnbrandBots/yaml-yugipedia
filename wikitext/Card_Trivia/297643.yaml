title: Card Trivia:Beautunaful Princess
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Subsurface Stage Divers]]".
  * The fish in the bottom of this card's artwork also appears in the artwork of "[[Nimble Manta]]".
  * This card's Japanese name, "Burinsess" ({{Ruby|鰤っ子姫|ブリンセス}}, ''Burinsesu'') is a pun on ''Buri'' (鰤, lit. "[[wikipedia:Japanese amberjack|Japanese amberjack]]", ''Purinsesu'' (プリンセス, "Princess"), ''Burikko'' (鰤っ子, lit. "a girl or woman who acts cute and helpless"), and ''Hime'' (姫, "Princess").
  ** This card's English name, "Beautunaful Princess", is a portmanteau of "Beautiful" and "[[wikipedia:Tuna|Tuna]]".
