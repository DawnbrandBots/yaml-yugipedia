title: Card Trivia:Sphere Kuriboh
wikitext: |-
  {{Navigation}}

  * This monster appears to be based on the appearance of "[[The Winged Dragon of Ra - Sphere Mode]]".
  ** Both monsters feature spherical bodies with linework designs and their card artworks feature light rays extended from their bodies.
  * This card's Japanese name, クリボール ''Kuriball'', is the same as the [[Attack and effect names in Yu-Gi-Oh!|effect name]] of "[[Kuriboo]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This card and "[[Relinkuriboh]]" appear to have their effects swapped in development, since the latter features an effect to support "[[The Winged Dragon of Ra]]" but references "[[Relinquished]]", while this card features an effect to support [[Ritual Monster]]s, but references "The Winged Dragon of Ra - Sphere Mode" (which is not a Ritual Monster) .
