title: Card Trivia:Quadcropter GA84
wikitext: |-
  {{Navigation}}

  * The last character in the vehicle type of this monster's Japanese name「タ」("ta") can be affixed at the beginning of its stated model「ＧＡ８４」(with Ｇ and Ａ being read together as「ガ」("ga")) to form a ''[[goroawase]]'' that reads「タガヤシ」("Tagayashi"), which means "to plow". This is also referenced in this card's flavor text, which stated that this monster is commonly known by the nickname "Mr. Plow".
