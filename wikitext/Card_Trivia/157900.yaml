title: Card Trivia:Majioshaleon
wikitext: |-
  {{Navigation}}

  * This card appears to be an adult form of "[[Oshaleon]]".
  * The five white stars on this card's body resemble its level.
  * This card and Oshaleon have  opposite effects. While this card cannot be selected as an attack target if your opponent controls a [[spell]]/[[trap]] card, Oshaleon makes itself the attack target when an opponent's monster attacks.
