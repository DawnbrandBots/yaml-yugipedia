title: Card Trivia:Galaxy Hundred
wikitext: |-
  {{Navigation}}

  * "[[Galaxy-Eyes Photon Dragon]]", "[[Number 39: Utopia]]" (using [[Light Wing Shield]]), and the [[Different Dimension Airship]] appear in this card's artwork.
  ** This card's artwork is a reference to the [[Duel]] between [[Astral]] and [[Kite Tenjo]] inside the [[Emperor's Key]] on top of the Different Dimension Airship in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This card's effect to look at the opponent's [[Extra Deck]] and [[Special Summon]] a "[[Number]]" monster from it is a reference to Kite's [[Number Hunter|Number Hunting]] in the ''Yu-Gi-Oh! ZEXAL'' anime, for which Kite uses his [[Photon Hand]] to take a [[Number holder|"Number" holder's]] "Number" card, along with their soul.

