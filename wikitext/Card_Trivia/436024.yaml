title: Card Trivia:Zoodiac Tigermortar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zoodiac Gathering]]".
  * This monster is based on the [[wikipedia:Chinese zodiac|Chinese zodiac]] sign of the [[wikipedia:Tiger (zodiac)|Tiger]].
  * This monster's cannon is wielded by "[[Metaltron XII, the True Dracombatant]]".
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018319568184016900 Bilibili] and [https://weibo.com/7406309913/5118942248697999 Weibo] at 4:00 AM (China Standard Time) on January 4, 2025, which was the fourth quarter of the Yin hour in the traditional Chinese timekeeping system.
