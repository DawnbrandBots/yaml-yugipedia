title: Card Trivia:Zoa the Fiendish Beast
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Zoa]]".
  ** This monster's effect to [[Normal Summon]] itself without [[Tribute|Tributing]] is based on the appearance of "[[Zoa (manga)|Zoa]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where it was Normal Summoned under the "[[Duel Monsters#Basic|Basic]]" rules of ''[[Duel Monsters]]'' that allow players to Normal Summon any monster from their [[hand]].
  ** This monster's effect to [[Special Summon]] itself in [[Defense Position]] is based on the first appearance of "Zoa" in {{chapter|Yu-Gi-Oh!|120|ref}} where [[Keith Howard (manga)|Bandit Keith Howard]] Summons it in [[face-up]] [[Defense Position]].
  ** This monster's final effect to [[Set]] a "[[Metalmorph (archetype)|Metalmorph]]" [[Trap]] is based on how in the same chapter, Keith Set "[[Metalmorph (manga)|Metalmorph]]" ("[[Magic Metal Force]]" in the [[Yu-Gi-Oh! (anime)|anime]] [[Yu-Gi-Oh! - Episode 031|adaptation]]) and lured [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] into attacking "Zoa".
