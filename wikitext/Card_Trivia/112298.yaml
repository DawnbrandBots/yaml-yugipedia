title: Card Trivia:Bubble Shuffle
wikitext: |-
  {{Navigation}}

  * This card is one of four [[Spell Cards]] that support "[[Elemental HERO Bubbleman]]", the other three being "[[Bubble Blaster]]", "[[Bubble Rod]]" (both [[Equip Spell Card]]s), and "[[Bubble Illusion]]" (a [[Quick-Play Spell Card]]).
