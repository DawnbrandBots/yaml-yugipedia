title: Card Trivia:Superheavy Samurai Swordsman
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Sword-999" (ソード－９９９, ''Sōdo-Kyūkyūkyū'') is a reference to how [[wikipedia:Benkei|Benkei]] is said to have collected 999 [[wikipedia:sword|swords]] by dueling people who passed by him.
  ** Fittingly, this monster was used to [[Tribute Summon]] "[[Superheavy Samurai Big Benkei (anime)|Superheavy Samurai Big Benkei]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster and "[[Superheavy Samurai Blue Brawler]]" are the first monsters to be introduced in the ''Yu-Gi-Oh! ARC-V'' anime.
  ** They are also the first monsters in the ''Yu-Gi-Oh! ARC-V'' anime to be [[Tribute]]d for a Tribute Summon.
