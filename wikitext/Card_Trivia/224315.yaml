title: Card Trivia:Pursuit Chaser
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster's effect can inflict 500 damage to the opponent when it destroys their [[Defense Position]] monster by battle; however, in the ''[[OCG]]''/''[[TCG]]'', this monster's effect is changed so that it can inflict 500 damage to the opponent if any of the player's other monsters destroy an opponent's Defense Position monster by battle.
