title: Card Trivia:Speedroid Rubberband Plane
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "5-6-Plane" ({{Ruby|５|ファイブ}}{{Ruby|６|シックス}}プレーン, ''Faibu Shikkusu Purēn'') features the numbers "5" and "6", which can be read in Japanese as "go-mu", meaning "rubber". 
  ** Fittingly, this monster's appearance is based on a [[wikipedia:Rubber band|rubber band]] toy version of the [[wikipedia:Northrop XP-56 Black Bullet|Northrop XP-'''56''' Black Bullet]].
  ** The numbers in this monster's Japanese name also reflect how this monster's [[Level]] is '''5''' and its effect makes the [[target]]ed monster lose '''6'''00 [[ATK]].
