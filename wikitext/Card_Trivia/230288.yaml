title: Card Trivia:Jurrac Impact
wikitext: |-
  {{Navigation}}

  * "[[Fabled Urustos]]", "[[Fabled Raven]]", "[[Fabled Miztoji]]", "[[Jurrac Meteor]]", "[[Jurrac Monoloph]]", "[[Jurrac Stauriko]]", "[[The Fabled Nozoochee]]", and "[[The Fabled Peggulsus]]" appear in this card's artwork.
  ** The city that appears in the artwork of "[[Worm Zero]]" also appears in the the background of this card's artwork. The remains of "Worm Zero" can also be seen in this card's artwork, as "Jurrac Meteor" is razing the land of the "[[Fabled]]" monsters.
  ** This card has a similar effect to "Jurrac Meteor", which can fulfill this card's [[activation requirement]].
