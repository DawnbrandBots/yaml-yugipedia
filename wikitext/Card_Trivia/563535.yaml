title: Card Trivia:Trickstar Birdhelm
wikitext: |-
  {{Navigation|mode=NonGame}}

  * This monster's name is based on the ''[[wikipedia:Aconitum|Aconitum]]'', a genus of toxic flowering plants also known as "bird helmet" in Japan, which appears as the symbols on the corners of this card's artwork.
  ** This monster's name is also a pun on its appearance, as it is depicted wearing a helmet that features the physical trains of a bird, including wings on the side, and a nose guard that resembles a beak.
