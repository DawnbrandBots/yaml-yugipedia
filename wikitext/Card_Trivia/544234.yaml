title: Card Trivia:Restraining Sword of Impact
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is the first [[illegal]] card to be revealed in the anime since "[[Infernalvania]]" back in ''[[Yu-Gi-Oh! GX]]'', as well as the first illegal card to result in the Duel immediately being cancelled.
  ** It is also the first illegal [[Trap Card]].
  * This card is a retrained form of "[[Swords of Revealing Light]]," fitting with [[Yusho Sakaki]]'s cards being themed after the cards of [[Yami Yugi]].
