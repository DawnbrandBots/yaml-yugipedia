title: Card Trivia:Amusi Performer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amusi Cheer]]", "[[Ego Rhythm]]", "[[Major Audition]]", "[[Rhythmical Performer]]", and "[[Speedy Performer]]", as well as in the second artwork of "[[Back Beat]]".
  ** "Rhythmical Performer" and "Speedy Performer" appear in this card's artwork, whom this monster serves as a member of the trio.
  * This monster's name is based on [[wikipedia:Amusia|amusia]], a musical disorder that is also known as being "tone deaf", in which someone is unable to recognize or produce musical tones.
  ** Fittingly, this monster's concept art indicates that she is tone deaf, as evidenced by the broken musical notes and the reactions of "Rhythmical Performer" and "Speedy Performer" to her singing in this card's artwork.
  * This card's effect is referenced by its [[ATK]]/[[DEF]]: both its cost and its ATK are 800, and both its amount of effect damage dealt and its DEF are 300.
