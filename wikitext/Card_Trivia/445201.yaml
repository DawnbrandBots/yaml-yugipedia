title: Card Trivia:Anesthrokket Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Boot Sector Launch]]", "[[Borrel Regenerator]]", "[[Rokket Barrage]]", and "[[Squib Draw]]".
  * This monster's name and the design of its head are based on the [[wikipedia:Anesthetic|anesthetic]] darts fired by a [[wikipedia:Dart gun|tranquillizer gun]], which injects the target with a drug capable of causing loss of feeling or awareness, which reflects its effect to prevent the opponent's monster from attacking and [[activating]] its effect.
