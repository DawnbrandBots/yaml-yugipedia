title: Card Trivia:Black Luster Ritual
wikitext: |-
  {{Navigation}}

  * Two copies of the object in the artwork of "[[Chaos Ceremonial Object]]" appear in this card's artwork.
  * This was the first [[Ritual Spell Card]] released in the ''[[Yu-Gi-Oh! Official Card Game|OCG]]''/''[[Yu-Gi-Oh! Trading Card Game|TCG]]''.
  ** This was also the first Ritual Spell Card to appear in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This card has a [[Jersey]] ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Black Luster Jersitual]]".
