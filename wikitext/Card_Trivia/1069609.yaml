title: Card Trivia:Sosei Ryu-Ge Mistva
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Crossover Breakers]]''/''[[Crossover Breakers]]''.
  * This monster appears in the artwork of "[[Ryu-Ge Rising]]".
  * This monster is a [[Card evolutions|combined]] [[Ritual Pendulum Monster|Ritual Pendulum]] form of "[[Genro Ryu-Ge Hakva]]", "[[Kyoro Ryu-Ge Kaiva]]", and "[[Kairo Ryu-Ge Emva]]".
  ** It has the head, upper body and wings of "Hakva".
  ** It has the lower body and arms of "Kaiva".
  ** It has the central body and tail of "Emva".
  * This is the first [[Ritual Monster]] that can be [[Ritual Summon]]ed from the [[Extra Deck]].
  ** It is also the first Ritual Monster that mentions itself in its [[Summoning condition]].
