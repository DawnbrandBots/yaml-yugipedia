title: Card Trivia:XYZ-Dragon Cannon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Kaiba Volume 2]]''.
  * This monster appears in the artworks of "[[Interdimensional Matter Forwarder]]" and "[[Synchro Deflector]]".
  * This monster has a stronger [[retrain]]ed counterpart: "[[XYZ-Hyper Dragon Cannon]]".
  * This monster's [[original ATK]] (2800) is equal to the [[ATK]] of "[[X-Head Cannon]]" (1800) after applying the ATK-increasing effects of "[[Y-Dragon Head]]" (400) and "[[Z-Metal Tank]]" (600) [[equip]]ped to it.
  * This is the first monster that could be [[Special Summon]]ed via [[Contact Fusion]] (even though that Special Summoning term didn't exist at the time).
  * This is the only promotional card in the "[[Monster Figure Collection Volume 3 promotional cards|Monster Figure Collection 3]]" (and in the three sets) that is not a [[Dragon]] monster.
  * In the North American ''[[TCG]]'', when this monster was released in ''[[Collectible Tins 2003]]'', it was impossible to Summon because its [[Fusion Material]]s had not been printed until the release of ''[[Magician's Force]]'' one month later.
  * This card's first and third ''[[OCG]]''/''TCG'' artworks are taken from {{chapter|Yu-Gi-Oh!|254|ref}}, the first from the panel showing [[XYZ-Dragon Cannon (manga)|this monster]] being Summoned, and the third from the panel where this monster is shown attacking "[[Big Shield Guardna (manga)|Big Shield Guardna]]".
  ** This card's second ''OCG''/''TCG'' artwork is taken from two separate scenes in the manga: the "X-Head Cannon" portion is taken from the same chapter, specifically from the panel showing "[[XY-Dragon Cannon (manga)|XY-Dragon Cannon]]" being Summoned, while the combined "Y-Dragon Head" and "Z-Metal Tank" portion is taken from {{chapter|Yu-Gi-Oh!|255|ref}}, specifically from the panel showing "[[Interdimensional Matter Transporter (manga)|Interdimensional Matter Transporter]]" teleporting this monster (albeit with minor changes in detail for this second portion).
