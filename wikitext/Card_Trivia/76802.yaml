title: Card Trivia:Embodiment of Apophis
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Apep|Apophis]], the demonic personification of chaos in [[wikipedia:Egyptian mythology|Egyptian mythology]] who is often depicted as a massive serpent. According to Etyptian mythology, Apophis battled [[wikipedia:Ra|Ra]], the Egyptian god of the sun, at the end of each day before the latter returned to the east.
  * This card has two [[retrained]] [[counterpart]]s: "[[Apophis the Swamp Deity]]" and "[[Apophis the Serpent]]".
  ** This card has an upgraded [[Fusion Monster]] form combined with "Apophis the Serpent": "[[Divine Serpent Apophis]]".
  * This is the [[signature card]] of [[Odion]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This is the first [[Trap Monster]] to be revealed, as well as the first Trap Monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This card's ''OCG''/''TCG'' artwork is taken from the last page of {{chapter|Yu-Gi-Oh!|211|ref}}.
