title: Card Trivia:Ukanomitsune-no-Onari
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Ukanomitama|Ukanomitama]]" (the goddess of food and agriculture in [[Wikipedia:Japanese mythology|Japanese mythology]]), "''[[Wikipedia:Kitsune|kitsune]]''" (a fox spirit in Japanese mythology), and "''Onari''" (the honorific term used to refer to royalty or nobles going out). 
  ** ''Onari'' is also a play on ''Ō-Inari'', also known as [[wikipedia:Inari Ōkami|Inari Ōkami]], the Japanese ''kami'' of foxes and rice associated with Ukanomitama, whereas this monster is an anthropomorphic fox, while the background depicts raining rice grains and a field of rice plants.
  * This monster is an [[Counterpart|upgraded]] [[Link Monster|Link]] counterpart of "[[Ukanomitsune-no-Tamayura]]".
