title: Card Trivia:Prototype Sky Striker Ace - Amatsu
wikitext: |-
  {{Navigation}}

  * This monster is an [[Counterpart|empowered]] [[Link Monster|Link]] form of "[[Sky Striker Ace - Raye]]", who appears within this monster's torso.
  * This monster carries equipment very similar to all four "Raye"-based Link monsters, presumably to perform early versions of the "Maneuver" special techniques. It probably was split into four armors instead to maximize efficiency of each specific role.
  ** Its left shoulder has a field generator similar to [[Sky Striker Ace - Shizuku|Shizuku]]'s, which should allow it to perform the [[Sky Striker Maneuver - Jamming Waves!|Jamming Waves]] maneuver.
  ** Its right shoulder has a large cannon, probably used to fire an experimental version of [[Sky Striker Ace - Hayate|Hayate]]'s [[Sky Striker Maneuver - Vector Blast|Vector Blast]].
  ** Its left arm has a giant claw reminiscent of [[Sky Striker Ace - Kaina|Kaina]]'s, which should let it perform the [[Sky Striker Maneuver - Scissors Cross|Scissors Cross]] technique.
  ** The right arm carries a giant sword similar to [[Sky Striker Ace - Kagari|Kagari]]'s, quite likely intended for the [[Sky Striker Maneuver - Afterburners!|Afterburners]] attack.
