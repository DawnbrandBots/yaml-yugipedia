title: Card Trivia:Sylvan Sagequoia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "Mount Sylvania", "[[Sylvan Bladefender]]", "[[Sylvan Charity]]", "[[Sylvan Lotuswain]]", and "[[Sylvan Waterslide]]".
  * "[[Mount Sylvania]]" and "[[Orea, the Sylvan High Arbiter]]" appear in this card's artwork.
  * This card's name, "Sagequoia", is a portmanteau of "Sage" and ''[[wikipedia:Sequoia (genus)|Sequoia]]'', a genus of [[wikipedia:Sequoioideae|redwood]] tree.
  ** This card's Japanese name, "Sherman", is probably a portmanteau of "[[wikipedia:Shamanism|Shaman]]" and ''Sherman'', which is the popular name of a specific Sequoia tree, the [[wikipedia:General Sherman (tree)|General Sherman]].
