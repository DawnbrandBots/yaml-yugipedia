title: Card Trivia:Double Cyclone
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to the Japanese name of "[[Mystical Space Typhoon]]", "Cyclone", and its effect to allow the player to [[destroy]] a [[Spell]]/[[Trap Card]] on the [[field]], whereas this card's effect destroys '''two''' Spell/Trap Cards, one on each player's field.
  * This card's name is the [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Pair Cycroid (anime)|Pair Cycroid]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
