title: Card Trivia:Steelswarm Origin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Constellar Meteor]]", "[[Creeping Darkness]]", "[[Dark Sacrifice]]", and "[[Infestation Infection]]".
  * This monster and "[[Evilswarm Exciton Knight]]" are the only "[[lswarm]]" monsters whose [[Attribute]]s are not [[DARK]].
  * This monster's face is similar to that of "[[Fabled Gammajin]]". According to ''[[The Valuable Book EX 5 card storylines#No. 14: "Duel Terminal" World Side Story - The Fomenting Schemes of the Fabled|The Valuable Book EX 5]]'', this monster is an entity created by his cursed mask absorbing his power to summon the souls of those who died in sin after his own death.
  ** This monster shares the same Attribute ([[LIGHT]]) and [[Type]] ([[Fiend]]) with some of the "Fabled" monsters.
