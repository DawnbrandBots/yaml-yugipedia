title: Card Trivia:Cyberdark Chimera
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a combination of "[[Cyberdark Keel]]", "[[Cyberdark Edge]]" and "[[Cyberdark Horn]]", which make up its head, wings and tail, respectively.
  ** This monster's name likely alludes to the "[[Chimeratech]]" monsters, with whom both "[[Cyber Dragon (archetype)|Cyber Dragon]]" and "[[Cyberdark]]" are closely related, especially given its effect to search "[[Power Bond]]" which can Summon said "Chimeratech" monsters.
  ** This monster is the opposite [[counterpart]] of "[[Cyberdark Dragon]]", which is a [[Fusion Monster|Fusion]] of the three aforementioned monsters, but with "Keel" as its tail, "Horn" as its head, and the wings of "Edge" being in the reversed position.
