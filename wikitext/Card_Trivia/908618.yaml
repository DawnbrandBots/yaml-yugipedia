title: Card Trivia:Performapal Gentrude
wikitext: |-
  {{Navigation}}

  * This card and "[[Performapal Ladyange]]" reference [[Yuya Sakaki]]'s catchphrase in the ''[[Yu-Gi-Oh! ARC-V]]'' anime: ''Ladies and Gentlemen!'' (レディース＆アンドジェントルメン！ ''Redīsu ando Jentorumen!'')
  ** Fittingly, this card's [[Pendulum Effect]] mentions "Ladyange", and "Ladyange's" [[monster effect]] mentions this card.
  ** Visually, this monster bears resemblance to Yuya's draconic form while possessed by [[Z-ARC]], which features yellow eye and dragon-like wings.
