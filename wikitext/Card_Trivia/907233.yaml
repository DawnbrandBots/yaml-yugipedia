title: Card Trivia:Swordsoul Assessment
wikitext: |-
  {{Navigation}}

  * "[[Albion the Shrouded Dragon]]", "[[Incredible Ecclesia, the Virtuous]]", "[[Springans Rockey]]" (in its soot form, on top of "Ecclesia's" hammer's handle), "[[Swordsoul Auspice Chunjun]]", and "[[Swordsoul Supreme Sovereign - Chengying]]" appear in this card's artwork.
  * This card's Japanese name, "Auspicious Aspect Sword Assessment" (瑞相剣究, ''Zuisōkenkyū''), is a pun on ''Kenkyū'' (研究, "research").
