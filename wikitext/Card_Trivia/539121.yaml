title: Card Trivia:Cyber Dinosaur
wikitext: |-
  {{Navigation}}

  * This card, "[[Dragonic Knight]]", "[[Zeta Reticulant]]", and "[[Puppet King]]" are the [[cover card]]s of ''[[Limited Edition 9: Ultimate Seven Pack]]''.
  * This monster seems to be the result of "[[Cybernetic Hidden Technology]]", where "[[Cyber Dragon]]" and "[[Tyranno Infinity]]" are seen in a boiling pot together.
  ** The process depicted may also have created "[[Super Conductor Tyranno]]".
  * This card is similar to "[[Trifortressops]]"; both are [[Machine]]-type Monsters based on a [[Dinosaur]], can be Special Summoned from the hand when the opponent Special Summons and the sum of their ATK/DEF is 4400.
  * This card is one of several [[Machine]]-type Monsters based on a [[Dinosaur]], the others being "[[Cyber Saurus]]", "[[Trifortressops]]" and "[[Storagepod]]".
  * In the manga, this monster has a similar stance in its artworks to "[[Black Tyranno]]", except its right arm is raised.
  * Despite this card being a Machine-type monster in the [[OCG]]/[[TCG]], its manga counterpart is Dinosaur-type. Also its effect is a different one than in the manga version.
  * This card bears a mild resemblance to the alternate mode of [[wikipedia:Grimlock|Grimlock]], a character from the [[wikipedia:Transformers|Transformers]] franchise that can transform into a robotic T-Rex.
