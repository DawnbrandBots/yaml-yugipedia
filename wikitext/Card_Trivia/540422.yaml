title: Card Trivia:Amphibious Bugroth MK-3
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Heartless Drop Off]]", "[[Orca Mega-Fortress of Darkness]]", and "[[Salvage]]".
  * This monster's name references to the fact that it was first released in [[Series 3]], just like "[[Amphibious Bugroth MK-11]]" was first released in [[Series 11]].
  * This monster is an evolved counterpart of "[[Amphibious Bugroth]]" and a [[WATER]] counterpart of "[[Ground Attacker Bugroth]]".
  ** This monster has the same [[original ATK]], [[Level]] and [[Type]] as "Ground Attacker Bugroth".
  ** This monster has the same [[original DEF]] as "Amphibious Bugroth".
