title: Card Trivia:Alchemy Beast - Ekenas the Mercury
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is named after [[wikipedia:Mercury (element)|mercury]], one of the seven planetary metals used in alchemy.
  ** In alchemy, mercury is also known for melting from its solidified state into a liquid at room temperature, reflecting this monster's [[WATER]] [[Attribute]].
  * This monster is based on an ''[[wikipedia:Echeneis (fish)|echeneis]]'', which represents magnetic attraction in alchemy, similar to how the ''echeneis'' can attach itself to the hull of a ships.
