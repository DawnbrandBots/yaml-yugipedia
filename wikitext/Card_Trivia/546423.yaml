title: Card Trivia:Trickstar Foxglove Witch
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the ''[[wikipedia:Digitalis|Digitalis]]'', a genus of toxic perennial plants which are known as "foxgloves" or "witch's glove", which appear as the symbols on the corners of this card's artwork.
  * This is the first "[[Trickstar]]" [[Link Monster]] to not specifically require "Trickstar" monsters as materials.
  * Unlike most of the "Trickstar" monsters' background that includes heart-shaped pattern, this card's artwork presents star-shaped pattern instead.
  ** Although, upon closer inspection, a heart-shaped ornament is featured in the design of this monster's wand.
