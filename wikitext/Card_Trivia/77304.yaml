title: Card Trivia:Honest
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Light of Destruction]]''.
  * This monster has a [[Dark counterpart]]: "[[Dark Honest]]".
  * This monster has a [[Card evolutions|combined]] form with "[[Elemental HERO Neos]]": "[[Elemental HERO Honest Neos]]".
  * This is the only [[Ghost Rare]] card with a [[Level]] lower than 7.
  * This is the only [[Prismatic Secret Rare]] card printed in a [[Series 11]] [[+1 Bonus Pack]] to not be related to the main anime theme supported in the corresponding [[Core Booster]]; in this case, it is the "[[Utopia (archetype)|Utopia]]" [[archetype]] in ''[[Lightning Overdrive]]''.
  ** However, this monster is based on the concept of Hope, a character from the story of [[wikipedia:Pandora's box|Pandora's box]] in [[wikipedia:Greek mythology|Greek mythology]], who remained inside the box when [[wikipedia:Pandora|Pandora]] opened it and released the evils of humanity in the world. 
  *** Fittingly, the story of the "[[Number]]s" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime parallels the story of Pandora's box, where [[Yuma Tsukumo]] opened [[The Door]] and unleashed the "Numbers" into [[Earth (planet)|Earth]] and the "Number" that remained with him was "[[Number 39: Utopia]]", whose Japanese name is "King of Wishes, Hope".
  * Due to a printing error in ''[[Light of Destruction: Special Edition]]'', it was possible to pull two copies of this card in one [[Special Edition]].
  * In the Spanish ''[[TCG]]'', this card initially featured a typo in its [[card text]], as it used the word "''regresar''" instead of "''devolver''", which is the official term for "[[return]]". This was later corrected in the Spanish print of ''[[Saga of Blue-Eyes White Dragon Structure Deck]]''.
  * This is the [[signature card]] and [[Duel Monster Spirit]] of [[Yusuke Fujiwara]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
