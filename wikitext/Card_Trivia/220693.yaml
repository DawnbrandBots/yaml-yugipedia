title: Card Trivia:Electrode Beast Cation
wikitext: |-
  {{Navigation}}

  * This monster is based on a "[[wikipedia:cation|cation]]", a molecule with a positive charge.
  ** Fittingly, this monster's design feature a positive expression; also, it is depicted with a yellow color scheme in the ''[[OCG]]''/''[[TCG]]'', which is a known positive color.
  ** This monster's effect to Summon "[[Electrode Beast Anion]]" is based on how positively-charged cations can attract negatively-charged anions due to their opposite charges.
  * This monster's ''OCG''/''TCG'' effects are based on its appearance in {{chapter|ZEXAL|014|ref}}.
  ** This monster's ''OCG''/''TCG'' effect to [[add]] "Electrode Beast Anion" to the hand and then [[Normal Summon]] a [[Level 4]] or lower [[Thunder]] monster is based on its manga effect to [[Special Summon]] "Electrode Beast Anion" from the [[Deck]]. This effect is designed so that the added "Anion" can be immediately Normal Summoned after being added to the hand. The effect was changed to Normal Summon instead of Special Summon so that the effect of "Anion" that activates upon be Normal Summoned can be activated when Summoned by this monster's effect. (In the manga, "Anion" lacked any effect that activated upon being Summoned.) Similarly, this monster being able to Normal Summon any Level 4 or lower Thunder monster works in conjunction with the Normal Summoning gameplay of the "[[hunder]]" [[archetype]] in the ''OCG''/''TCG'', the archetype used by [[Thunder Spark]] in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  *** This effect preventing the Special Summon of monsters from the [[Extra Deck]] other than [[LIGHT]] [[Xyz Monster]]s for the rest of the turn is based on the fact that the only Xyz Monster that this card's owner Thunder Spark used was "[[No. 91: Thunder Spark Dragon (manga)|No. 91: Thunder Spark Dragon]]", a LIGHT Xyz Monster.
  ** This monster's effect to copy another Thunder monster's Level is designed to allow it to be used for the first effect of "[[Spirit Converter]]". In the manga, this monster was [[Tribute]]d by "[[Spirit Converter (manga)|Spirit Converter]]" to [[attach]] an [[Xyz Material]] to an Xyz Monster; in the ''OCG''/''TCG'', "Spirit Converter" directly attaches a monster to an Xyz Monster, but requires that the monster be a Level 4 LIGHT monster. Since "Electrode Beast Anion" has an effect to change its Level to 4, this effect allows it to copy the Level of "Anion" to become Level 4, and thus allows it to be attached to an Xyz Monster by the effect of "Spirit Converter".
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''Yu-Gi-Oh! ZEXAL'' manga, specifically from the panel showing [[Electrode Beast Cation (manga)|this monster]] being Summoned.
