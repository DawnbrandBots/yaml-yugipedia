title: Card Trivia:The Bystial Alba Los
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Decisive Battle of Golgonda]]" and "[[Gigantic Thundercross]]".
  * "[[The Bystial Lubellion]]" appears in this card's artwork as the one controlling this monster.
  * This monster is named after [[wikipedia:Los (Blake)|Los]], the fallen form of the [[wikipedia:Albion (Blake)|Zoa]] [[wikipedia:Urthona|Urthona]] (the divine aspect of imagination according to the [[wikipedia:William Blake's mythology|mythology]] of [[wikipedia:William Blake|William Blake]]'s prophetic books).
  ** Aditionally, this monster, along with "[[Dogmatika Alba Zoa]]", are the only monsters with the word "Alba" in their names that is not directly related to "[[Fallen of Albaz]]".
  * "[[Dogmatika Nexus]]" ("[[Despian Proskenion]]") was created by "[[Dogmatika Maximus]]" based on this monster.
  ** Prior to the release of ''[[The Valuable Book EX 3 card storylines|The Valuable Book EX 3]]'' card storylines, this monster was believed to be a further transformation of "Dogmatika Nexus", which in turn was believed to be the "relic from a long lost civilization" described in the original lore of the "[[Dogmatika]]" archetype.
  * "[[Fallen of Argyros]]" is the remains of this monster under the possession of the energy of every "[[Spright]]" from the battle of Golgonda.
