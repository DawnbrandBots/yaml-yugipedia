title: Card Trivia:Wicked-Breaking Flamberge - Baou
wikitext: |-
  {{Navigation}}

  * This sword appears in the artworks of "[[Fairy of the Spring]]", "[[Guardian Baou]]", "[[Morale Boost]]", "[[Power of the Guardians]]", and "[[Really Eternal Rest]]".
  * In one of the Master Guide 2 card storylines, it is revealed that this sword is the actual body of "[[Guardian Baou]]". If "[[Warrior Dai Grepher]]" chooses the dark road shown in "[[The Paths of Destiny]]", he will encounter and defeat "Baou's" [[Guardian Baou|false body]]. He will then claim this sword as his new weapon, not realizing the horrible truth about it.
  ** In that same storyline, "Warrior Dai Grepher" transforms into the "[[Dark Lucius]]" cards, which forbids the opponent's Monster's effects from activating when they are destroyed by battle. This card gives the equipped Monster the same effect, strongly implying that "Baou" is possessing them.
  * The altar beneath the weapon and the light descending above is similar to other "[[Guardian]]" related weapons:
  ** "[[Butterfly Dagger - Elma]]"
  ** "[[Gravity Axe - Grarl]]"
  ** "[[Twin Swords of Flashing Light - Tryce]]"
  ** "[[Rod of Silence - Kay'est]]"
  ** "[[Shooting Star Bow - Ceal]]"
