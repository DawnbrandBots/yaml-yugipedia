title: Card Trivia:Fossil Warrior Skull Bone
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Cenozoic Fossil Knight Skullpawn", references the [[wikipedia:Cenozoic|Cenozoic Era]], the third and most recent geological period in Earth's history. This era is also known as the "Era of Mammals" for the enormous proliferation of mammalian life on Earth, including humankind. This era is so recent it has only been subdivided into three periods: the [[wikipedia:Neogene|Neogene]], [[wikipedia:Paleogene|Paleogene]], and the current age, the[[wikipedia:Quaternary|Quaternary Period]].
  * This monster's Japanese name, "Skullpawn", shares a chess theme with the other "Fossil Warrior" monsters: [[Fossil Warrior Skull King]]" and "[[Fossil Warrior Skull Knight]].
  ** This monster's Japanese name and [[Level]] (4) reference how pawns are generally the weakest pieces in chess. Its ''[[OCG]]''/''[[TCG]]'' [[Fusion Material]] also references this, as well as how pawns in chess and [[Level 4]] or lower monsters in ''[[Yu-Gi-Oh!]]'' are commonly used in their respective games.
  ** This monster's ''OCG''/''TCG'' effect allowing it to attack twice on monsters references the pawn's ability to move two spaces in chess.
