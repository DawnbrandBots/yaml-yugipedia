title: Card Trivia:Frightfur Cruel Whale
wikitext: |-
  {{Navigation}}

  * "[[Edge Imp Scythe]]" appears in this card's artwork, on the end of this monster's tail.
  * Visually, this monster is a [[Fusion]] of "[[Fluffal Dolphin]]" and "Edge Imp Scythe".
  * This card is based on the [[wikipedia:Killer whale|killer whale]].
