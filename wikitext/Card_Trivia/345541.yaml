title: Card Trivia:Mimiclay
wikitext: |-
  {{Navigation}}

  * This card's Japanese name (モノマネンド, ''Monomanendo'') is a portmanteau of the words "mimicry" (モノマネ, ''monomane'') and "clay" (マネンド, ''nendo'').
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] a monster with the same name as a [[Level 2]] or lower [[Defense Position]] monster from the [[Deck]] if the opponent [[control]]s a monster is an alteration of its effect in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, which can switch the player's [[Level 3]] or lower [[Attack Position]] monster to Defense Position and then Special Summon this card as a [[Spell Monster]] with the same name and stats as that monster. In {{episode|ARC-V|004|ref}}, [[Yuya Sakaki]] used this card on "[[Block Spider (anime)|Block Spider]]" (a [[Level 1]] monster) while [[Sylvio Sawatari]] controlled his "[[Dart]]" monsters.
  * In the Korean dubbed version of the ''Yu-Gi-Oh! ARC-V'' anime, this card's name was "흉내쟁이 점토" (''Hyungnaejaeng-i Jeomto'') instead of "모노마넨도" (''Monomanendo''), which still translates to "Mimiclay".
