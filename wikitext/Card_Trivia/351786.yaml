title: Card Trivia:Magical Abductor
wikitext: |-
  {{Navigation}}

  * This monster is the [[Pendulum Monster]] [[Card evolutions|version]] of "[[Magical Exemplar]]".
  ** This monster has a further advanced form: "[[Magical Something]]".
  * This monster has three [[Spell Counter]]s present in its artwork: one on her staff, one on her belt, and one on her cloak. This likely references the number of Spell Counters that have to be removed to activate any of this card's effects.
  * This is the first Pendulum Monster that can have counters be placed on it while it is in the [[Pendulum Zone]].
