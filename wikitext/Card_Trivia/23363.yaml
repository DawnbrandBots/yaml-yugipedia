title: Card Trivia:Batteryman C
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Broken Line]]", "[[Recycling Batteries]]", "[[Super-Electromagnetic Voltech Dragon]]", and "[[Universal Adapter]]".
  * This monster is based on a [[wikipedia:C battery|C battery]], a standardized size of a cylindrical [[wikipedia:Dry cell|dry cell battery]] used in medium-drain applications.
  ** The number "2" on this monster's chest reflects its [[Level]] (2), which also corresponds with the Japanese name for the C battery (単二形, ''Tan'nigata'').
  * As the "[[Batteryman]]" monsters' [[Type]] is [[Thunder]], this monster provides no support to its own [[archetype]]; however, if used with a card that features an effect which can change their Types to [[Machine]] (i.e. "[[DNA Surgery]]" and "[[Clockwork Night]]"), they will receive the [[ATK]]/[[DEF]] boost it provides.
  ** This effect may have implied that the "Batteryman" archetype was originally intended to support Machine monsters, fitting the concept of batteries, but this idea has since been dropped.
