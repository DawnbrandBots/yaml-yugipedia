  * The card "[[Rank-Up-Magic Argent Chaos Force]]" appears in this card's artwork.
  ** Fittingly, "[[Rank-Up-Magic Argent Chaos Force (anime)|Rank-Up-Magic Argent Chaos Force]]" was the card targeted by this card's effect in {{episode|ZEXAL|128|ref}}.
  ** This card's effect is incorporated into the ''[[OCG]]''/''[[TCG]]'' card effect of "Rank-Up-Magic Argent Chaos Force".
