title: Card Trivia:Loptr, Shadow of the Generaider Bosses
wikitext: |-
  {{Navigation}}

  * This monster (masked) appears in the artwork of "[[Runick Allure]]".
  * The symbol from the artwork of "[[Generaider Boss Stage]]" appears on the tablet in the background of this card's artwork.
  * This monster is based on [[wikipedia:Loki|Loki]] (also known as Loptr), a god in [[wikipedia:Norse mythology|Norse mythology]].
  ** This card's [[FIRE]] [[Attribute]] is a reference to how Loki is sometimes interpreted as a god of fire.
  *** It may also be a reference to how Loki competed against [[wikipedia:Logi (mythology)|Logi]], the living embodiment of wildfire, in an eating contest.
  * This monster has an upgraded form: "[[Laevatein, Generaider Boss of Shadows]]".
