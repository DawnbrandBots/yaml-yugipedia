title: Card Trivia:Rise Rank-Up-Magic Raidraptor's Force
wikitext: |-
  {{Navigation}}

  * The design of the "[[Raidraptor]]" crest in this card's artwork is based on "[[Raidraptor - Rising Rebellion Falcon]]".
  * This card's Japanese name has the English initials for "Rise-Rank" with the first initial flipped backwards (ЯR) to make it resemble the "Raidraptor" crest.
  * This card's effect to [[Special Summon]] a "Raidraptor" [[Xyz Monster]] whose [[Rank]] equals the combined Ranks of the [[target]]ed "Raidraptor" Xyz Monsters on the player's [[field]] could be an homage to [[Synchro Summon]]ing. This in turn could be based on the relationship between [[Shay Obsidian]] and [[Crow Hogan (ARC-V)|Crow Hogan]], both of whom are characters in the ''[[Yu-Gi-Oh! ARC-V]]'' anime who featured a defiant personality and used an [[archetype]] of [[DARK]] [[Winged Beast]] monsters that revolves around Special Summoning monsters from the [[Extra Deck]], with Shay using the "Raidraptor" archetype (which revolves around [[Xyz Summon]]ing) and Crow using the "[[Blackwing]]" archetype (which revolves around Synchro Summoning).
