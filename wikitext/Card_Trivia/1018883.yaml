title: Card Trivia:Insurrection Dragon
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Leather-Life Dragon" (レザーライフ・ドラゴン) is a pun on the Japanese word for "revolution" (革命, ''kakumei''), with the first kanji meaning "leather" (革 ''kaku'') and the second kanji for "life" (命 ''mei'').
