title: Card Trivia:Zoodiac Gathering
wikitext: |-
  {{Navigation}}

  * "[[Zoodiac Chakanine]]", "[[Zoodiac Drident]]", "[[Zoodiac Hammerkong]]", "[[Zoodiac Kataroost]]", and "[[Zoodiac Tigermortar]]" appear in this card's artwork.
  ** This card's artwork depicts "Chakanine" angrily scolding "Hammerkong" and "Kataroost". This may be a reference to [[wikipedia:Chinese zodiac|The Great Race]], where the Monkey ("Hammerkong"), the Rooster ("Kataroost"), and the Goat ("[[Zoodiac Ramram]]", though he is absent in this card's artwork) collaborated together to cross a river using a raft, finishing before the Dog ("Chakanine") who spent its time to play in the water.
  *** Coincidentally, the aforementioned monsters (except "Ramram") were released after the first wave of "[[Zoodiac]]" monsters, with "Kataroost" released in ''[[Raging Tempest Special Edition]]'', while "Hammerkong" and "Chakanine" were released in ''[[Maximum Crisis]]''.
  ** The background of this card's artwork depicts "Drident" being startled by "Tigermortar". This is a reference to a Japanese cultural belief that regarded the Tiger ("Tigermortar") and the Dragon ("Drident") as rivals.
