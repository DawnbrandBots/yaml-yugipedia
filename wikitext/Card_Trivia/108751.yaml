  * This monster is based on [[Wikipedia:Kuṇḍali|Gundari]], one of the five major [[wikipedia:Wisdom King|Wisdom Kings]] in [[wikipedia:Buddhist mythology|Buddhist mythology]] who is sometimes depicted with a fiery aura, which reflects its [[Attribute]] ([[FIRE]]) and [[Type]] ([[Pyro]]).
