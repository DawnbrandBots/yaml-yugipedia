title: Card Trivia:Sangenpai Transcendent Dragion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sangen Kaiho]]".
  * This monster's Japanese name, ({{Ruby|燦|さん}}{{Ruby|幻|げん}}{{Ruby|超|ちょう}}{{Ruby|龍|りゅう}}, ''Sangenchōryū''), is a play on ''chōsangen'' ([https://riichi.wiki/Local_yaku#Chousangen 超三元]), a ''[[wikipedia:Yaku|yaku]]'' in [[wikipedia:Japanese mahjong|Japanese mahjong]], which is often translated as "superior three fundamentals".
  ** This monster is depicted as a three-headed dragon, referencing how the ''chōsangen'' requires quadruple sets of the three dragon tiles. Fittingly, this monster is the combined "[[Sangen]]" [[Synchro Monster]] form of "[[Tenpai Dragon Chundra]]", "[[Tenpai Dragon Fadra]]", and "[[Tenpai Dragon Paidra]]".
  ** ''Chōsangen'' has origins in Chinese Mahjong, where it's written as 大三元 (''dà sānyuán'') in Mandarin Chinese, meaning "Big Fundamental Tiles" instead. The hand is worth 88 points in National Standard Mahjong (国标麻将 ''guóbiāo májiàng'').
  * This monster is a "Sangen" counterpart of "[[Trident Dragion]]".
  * This monster has a downgraded form based on "Chundra" and "Paidra": "[[Sangenpai Bident Dragion]]".
