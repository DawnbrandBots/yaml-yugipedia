title: Card Trivia:Gift of The Mystical Elf
wikitext: |-
  {{Navigation}}

  * "[[Mystical Elf]]" appears in this card's artwork.
  * This is the first card that depicts "Mystical Elf" with her eyes open.
  ** If counting the later cards "[[Bubbly Elf]]" and this card's ''[[Rush Duel]]'' counterpart, "[[Wipe of the Spritzical Elf]]", they are both respectively the second and third cards to depict the "Mystical Elf" with its eyes open.
  * This card has a damaging counterpart: "[[Just Desserts]]".
