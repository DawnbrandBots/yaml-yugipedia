title: Card Trivia:World Carrotweight Champion
wikitext: |-
  {{Navigation}}

  * This card's Japanese name にん人 ''ninjin'' ("carrot human") is a pun on 人参 ''ninjin'' ("carrot"). Both are pronounced identically.
  * This card's English name may be a parody of the [[wikipedia:WWE World Heavyweight Championship|World Heavyweight Championship]], the primary championship of the [[wikipedia:WWE|WWE]].
