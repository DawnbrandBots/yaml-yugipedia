title: Card Trivia:Fabled Topi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Stairway to a Fabled Realm]]".
  ** The remains of "[[Ally of Justice Field Marshal]]" are also in that artwork. According to the Duel Terminal Master Guide, "Field Marshal" was created using "[[Genex Spare]]" as its controller and after defeating many "[[Worm]]s", it sacrificed itself, and [[Final Gesture|couldn't be repaired]]. This may explain why this monster is holding the head of "Genex Spare", that later appeared on "[[Evilswarm Coppelia]]".
