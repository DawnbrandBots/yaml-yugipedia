title: Card Trivia:Scareclaw Reichheart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Primitive Planet Reichphobia]]", "[[Scareclaw Arrival]]", and "[[Ages of Stars and Frost]]".
  * "[[wikipedia:Reich|Reich]]" in this card's name is the German word for "realm".
  ** This card's name, "Reichheart", is a reference to "Primitive Planet Reichphobia".
  * This card has 3 [[Heart]] [[counterpart]]s:
  ** [[WATER]] "[[Tearlaments]]": "[[Tearlaments Reinoheart]]"
  ** [[FIRE]] "[[Kashtira]]": "[[Kashtira Riseheart]]"
  ** [[LIGHT]] "[[Mannadium]]": "[[Mannadium Riumheart]]"
  ** This card also has a LIGHT non-Heart counterpart: "[[Visas Starfrost]]"
  *** This card's [[ATK]]/[[DEF]] (1500/2100) are the opposite of those of "Visas Starfrost" (2100/1500).
  * This monster has an [[Card evolutions|upgraded]] [[Link Monster|Link]] form: "[[Scareclaw Tri-Heart]]".
  ** This monster also has a downgraded Link form: "[[Scareclaw Light-Heart]]".
