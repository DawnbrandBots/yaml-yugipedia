title: Card Trivia:Cost Down
wikitext: |-
  {{Navigation}}

  * The card "[[Hitotsu-Me Giant]]" appears in this card's artwork.
  ** The two swords in this card's artwork are depicted striking through the card's [[Level]] stars, representing the Levels that the monster loses.
  *** Ironically, "Hitotsu-Me Giant" can be [[Normal Summon]]ed without Tributing, since it is a [[Level 4]] monster.
  ** In this card's international artwork, the hiragana "ち" in the [[Attribute]] symbol was not changed to "[[EARTH]]".
  ** The Level stars are not depicted the same way as all of the points are visible, whereas three of the points are blurred on Monster Cards in the ''[[OCG]]''/''[[TCG]]'', but they are blurred in this card's anime artwork.
  * This card's name comes from the fact that, if used on a [[Level 5]]-[[Level 8]] monster that can be [[Tribute Summon]]ed, it will reduce the [[Tribute]]s ("cost") needed by 1.
  * The Spanish print of this card in ''[[Duelist Pack: Kaiba]]'' features an error, as its lore says "''e'''s''' tu mano''" ("''[it] is your hand''") instead of "''e'''n''' tu mano''" ("''in your hand"'').
