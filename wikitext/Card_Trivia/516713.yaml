title: Card Trivia:Artifact Scythe
wikitext: |-
  {{Navigation}}

  * This is the first ''[[TCG]]''-exclusive "[[Artifact]]" monster.
  * This monster is based off a [[wikipedia:Scythe|Scythe]], a farm tool used to harvest [[wikipedia:Agriculture|crops]].
  ** The Scythe is also usually wielded by the [[wikipedia:Death (personification)|Grim Reaper]], fitting its full title as the Reaper of Souls.
