title: Card Trivia:Aegis of the Ocean Dragon Lord
wikitext: |-
  {{Navigation}}

  * "[[Ocean Dragon Lord - Neo-Daedalus]]" appears in this card's artwork.
  * This card is named after the [[wikipedia:Aegis|Aegis]], a shield used by the Greek goddess [[wikipedia:Athena|Athena]], with the bronzed head of the [[wikipedia:Gorgons|Gorgon]] [[wikipedia:Medusa|Medusa]] adorned in the middle. It is a large collar or cape worn in ancient times to display the protection provided by a high religious authority, which is reflected in this card's effect to prevent [[face-up]] [[Level 3]] or lower [[WATER]] monsters from being [[destroy]]ed by battle or by card effects.
