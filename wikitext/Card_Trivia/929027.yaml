title: Card Trivia:Constructor Resurrection
wikitext: |-
  {{Navigation}}

  * "[[Constructor Wyrm Buildragon]]" appears in this card's artwork.
  * The scene depicted in this card's artwork is related to that seen in the artwork of "[[Constructor Art - Buildestruction]]".
  ** Both artworks depict the same destroyed wreckage and scattered pink shards of light. Also, "Return" and "Buildestruction" depict two monsters that are counterparts to each-other ("Buildragon" and "[[Constructor Demolisher Wyrm Drake Crush]]").
