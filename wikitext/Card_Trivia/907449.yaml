title: Card Trivia:Alba-Lenatus the Abyss Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Branded Expulsion]]".
  ** The artwork of "[[Branded Loss]]" depicts the formation of this monster, showing the fiery mass of energy this monster emerged from.
  * This monster is an [[Card evolutions|empowered]] form of "[[Lubellion the Searing Dragon]]" ("[[Aluber the Jester of Despia]]") [[Fusion Monster|fused]] with "[[Mirrorjade the Iceblade Dragon]]" ("[[Fallen of Albaz]]").
  ** The kanji ''Shin'en'' (深淵, "Abyss") in this card's Japanese name is a homophone of the kanji ''Shin'en'' (神炎, "Divine Flame") in the Japanese name of "Lubellion", and it is also a reference to the 'abyss' mentioned in the flavor text of "[[Aluber the Dogmatic]]".
  ** This monster shares the same red [[Branded|stigmata]] on its hands and chest as "Aluber", while the flaming crest from the artwork of "[[Branded in White]]" appears over the stigma on its chest.
  ** The incarnadine transition from "Lubellion" to "Alba-Lenatus" is a reversal of the transition from "[[Albion the Branded Dragon]]" to "[[Albion the Shrouded Dragon]]".
  ** This card shares several similarities with the other [[Albaz Dragon]]s that are not possessed by "Lubellion".
  *** This card lists "Fallen of Albaz" as the first [[Fusion Material]].
  *** The [[Attribute]] of this card is [[DARK]].
  *** This card's effect, which can [[add]] a "[[Polymerization (archetype)|Polymerization]]" or "[[Fusion (archetype)|Fusion]]" [[Normal Spell]] from the [[Deck]] to the [[hand]] during the [[End Phase]] of the turn that it was sent to the [[Graveyard]], is similar to the Albaz Dragons' effects of adding or [[Special Summon]]ing a card of their supported archetype or "Fallen of Albaz" from the Deck during the End Phase of the turn they were sent to the Graveyard.
  * "Lenatus" in this card's name is derived from ''renātus'' (Latin for "reborn" or "baptized").
