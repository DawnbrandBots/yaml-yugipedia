title: Card Trivia:Tri-Brigade Stand-Off
wikitext: |-
  {{Navigation}}

  * "[[Tri-Brigade Nervall]]", "[[Tri-Brigade Rugal the Silver Sheller]]" "[[Tri-Brigade Ferrijit the Barren Blossom]]", "[[Tri-Brigade Fraktall]]", "[[Fallen of Albaz]]", "[[Dogmatika Ecclesia, the Virtuous]]", and "[[Dogmatika Ashiyan]]" appear in this card's artwork.
  ** The events in this card's artwork continue those of "[[Dogmatika Encounter]]": "Ecclesia" is hesitating in executing "Albaz", while the "[[Tri-Brigade]]" has arrived in the "[[Dogmatika Nation]]". The "Ashiyans" are standing against the "Tri-Brigade", and "Ecclesia" is trying to prevent the battle.
  * This card's artwork appears in one of the bubbles in the artwork of "[[Icejade Tremora]]".
