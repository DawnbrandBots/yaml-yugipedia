title: Card Trivia:Arcana Force EX - The Dark Ruler
wikitext: |-
  {{Navigation}}

  * This monster and "[[Arcana Force EX - The Light Ruler]]" are the only "[[Arcana Force]]" monsters that are not based on tarot cards.
  ** These monsters' names feature the English letters "EX", which stand for "Extra", referencing how both monsters are "extra" additions to the "Arcana Force" archetype.
  ** These are also the only "Arcana Force" monsters that have a positive effect regardless of the result of the [[coin toss]].
  ** Despite not being based on a real tarot card, this monster represents how its owner, [[Sartorius]], descended into [[World of Darkness|Darkness]] from his desire to gain power in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * Despite being a darker counterpart of "Arcana Force EX - The Light Ruler" and its [[Attribute]] being [[DARK]] in the ''Yu-Gi-Oh! GX'' anime, this monster was released as a [[LIGHT]] monster in the ''[[OCG]]''/''[[TCG]]'' instead.
  * This monster is tied with "Arcana Force EX - The Light Ruler", "[[Odin, Father of the Aesir]]", "[[Sandaion, the Timelord]]", and "[[Sephylon, the Ultimate Timelord]]" for the highest [[original DEF]] (4000) of all Fairy monsters.
