title: Card Trivia:Patchwork Fluffal
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Frightfur Change of Memory]]".
  * In the English version of the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, this monster was given the same name as "[[Fluffal Bear]]". This was likely an oversight by the translator, who was likely unaware that a card with that name already existed.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|008|ref}}, specifically from the panel showing [[Fluffal Bear (manga)|this monster]] alongside [[Sora Shiunin (manga)|Sora Shiunin]] as he explains its effect.
