title: Card Trivia:Dark Contract with Patent License
wikitext: |-
  {{Navigation}}

  * The tallest pile of papers that appears in this card's artwork is shaped like the main building of [[Leo Corporation]], whose CEO, [[Declan Akaba]], used the "[[D/D]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This, along with the release of "[[D/D/D Deviser King Deus Machinex]]" (which is based on a "company president") and "[[D/D/D Headhunt]]" (which is based on the recruitment strategy in business) in ''Battle of Chaos'' further reference the role of Declan Akaba as the CEO of Leo Corporation in the ''Yu-Gi-Oh! ARC-V'' anime, where he succeeded [[Leo Akaba|his father]] after his resignation and disappearance.
  * The Japanese term for "Patent License" (特許権, ''Tokkyoken'') is a pun on the Japanese name for the [[Wikipedia:Tokyo|Tokyo Prefecture]] (東京県, ''Tōkyō-ken''), which is a reference to the bureaucratic aspect of the city.
  * This card's effect to damage the opponent for [[Special Summon]]ing monsters from the [[Extra Deck]] with same [[card type]]s as a "[[D/D/D]]" monster the player [[control]]s and preventing them from Summoning a monster with the same card type refers to how its effect "punishes" the opponent for infringing on one of the "patented" Summoning methods of the "D/D/D" [[archetype]].
  * This is the only "Dark Contract" card in the ''[[OCG]]''/''[[TCG]]'':
  ** To be a [[Field Spell Card]] instead of being a [[Continuous Spell Card|Continuous Spell]]/[[Continuous Trap Card|Trap Card]].
  ** To not have an effect that makes its controller take damage during their Standby Phase.
