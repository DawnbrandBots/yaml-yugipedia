title: Card Trivia:Metaion, the Timelord
wikitext: |-
  {{Navigation}}

  * This monster is named after the Judaic archangel, [[wikipedia:Metatron|Metatron]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Metatron is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Keter|Keter]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Keter is the first of the ten Sefira of the Tree of Life, and this was the first "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This is the first "Timelord" monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * In the ''Yu-Gi-Oh! 5D's'' anime, this is the only "Timelord" monster whose unique effect activates at the end of the [[Battle Phase]], rather than at the end of the [[Damage Step]].
  ** Likewise, this monster's effects are a combination of the effect of "[[Time Angel (anime)|Time Angel]]" (which [[return]]s the opponent's monsters to the [[hand]]), "[[Foolish Decision]]" (which reduces the controller's battle damage to 0), and "[[Magician's Adage]]" (which inflicts 300 damage to the opponent for each monster returned to the hand), all of which are used by Z-one in a combo immediately before its debut in {{episode|5D's|146|ref}}.
  * Likely due to the timespan between this monster's release and the other "Timelord" monsters (including their inclusion in ''[[Yu-Gi-Oh! 5D's Tag Force 6]]''), this is the only "Timelord" monster, ignoring "[[Sephylon, the Ultimate Timelord]]", whose ''OCG''/''TCG'' effect only prevents [[battle damage]] while in [[Attack Position]]. The other nine "Timelords" prevent battle damage regardless of their [[battle position]].
