title: Card Trivia:Voidvelg Protostar
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Voidvelg Globule]]".
  ** This monster is named after a [[wikipedia:Protstar|protostar]], a very young star developed from the formation of gas and dust in outer space.
  ** This monster's [[Fusion Material]]s and effect supporting "[[Dark Hole (Rush Duel)|Dark Hole]]" is based on the scientific hypothesis of how protostars and star clusters are formed from the [[wikipedia:Bok globule|Bok globules]] (which "Voidvelg Globule" is based on) following the gravitational collapse of a star.
