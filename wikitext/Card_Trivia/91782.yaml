title: Card Trivia:Toy Emperor
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster appears in the artworks of "[[Toy Parade]]" and "[[Unequal Treaty]]".
  * This monster is based on [[wikipedia:Napoleon Bonaparte|Napoleon Bonaparte]], a prominent French military leader during the [[wikipedia:French Revolution|French Revolution]].
  ** Coincidentally, this monster's [[Jean-Louis Bonaparte|owner]] is named after the Napoleon Bonaparte, as his first name and surname are each the individual given names of the character in the Japanese and English versions of the ''[[Yu-Gi-Oh! GX]]'' anime.
