title: Card Trivia:Kewl Tune RS
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Phantom Revengers]]''/''[[Phantom Revenge]]''.
  * This monster appears in the artwork of "[[Kewl Tune Synchro]]".
  * This monster's name may be a reference to the classical music label [[wikipedia:RCA Red Seal Records|RCA Red Seal Records]].
  * This monster's design might be a reference to [[wikipedia:Scratching|scratching]], a technique used by [[wikipedia:Disc jockey|DJs]] where they move a vinyl record on a turntable back and forth to produce distinctive sounds and rhythms.
