title: Card Trivia:Cyber-Tech Alligator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Battle Return]]", "[[Storm Sonic]]", and "[[Summoner's Art]]".
  * This card appears in the artwork of "[[Card Destruction]]" and the first Japanese artwork of "[[Exchange]]".
  * This monster is an [[Card evolutions|upgraded]] version of "[[Alligator's Sword]]".
  ** This is supported by the fact that both monsters' Japanese names feature the word "Wyvern" and their English names feature the word "Alligator".
  *** This is further supported by this card's ''[[TCG]]'' [[flavor text]] referring to this monster as a pterodactyl, while its ''OCG'' flavor text refers it as a winged dragon.
  * This monster is tied with "[[Mandragon]]" for the highest [[original ATK]] (2500) of all [[Level 5]] [[Normal Monster]]s.
