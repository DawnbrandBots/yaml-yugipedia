title: Card Trivia:Axon Kicker Oracle
wikitext: |-
  {{Navigation}}

  * Visually, this monster is an [[upgrade]]d [[Fusion Monster|Fusion]] form of "[[Silent Psychic Magician]]" combined with "[[Hyper Psychic Blaster/Assault Mode]]".
  ** This monster's name is based on "[[Ultimate Axon Kicker]]", another [[Level]] 10 [[Psychic]] Fusion Monster. Fittingly, both monsters can be used as [[Fusion Material]]s with "Silent Psychic Magician" for this monster's [[Fusion Summon]].
