title: Card Trivia:Wheel Synchron
wikitext: |-
  {{Navigation}}

  [[File:YuseiD-Wheel.jpg|thumb|right|300|''[[Yusei Go]]'', [[Yusei Fudo]]'s [[Duel Runner]].]]

  * This monster appears in the artwork of "[[Synchro World]]".
  * This monster is based on [[Yusei Fudo]]'s [[Duel Runner]], ''[[Yusei Go]]'', as well as his helmet.
  ** This monster's name is also likely based on the Japanese name of the Duel Runner, the "D-Wheel".
  ** This monster's [[Level]] (5) also references the ''Yusei Go'', as "''go''" (五) is the Japanese word for the number "5".
  * This monster is the "[[Synchron]]" [[counterpart]] of "[[Signal Warrior]]", another monster based on ''Yusei Go''.
  ** This monster has the same [[original ATK and DEF]] (800/1000) as the [[Vassal]] monsters, while "Signal Warrior" has the same original ATK and DEF (2400/1000) as the [[Monarch]] monsters.
