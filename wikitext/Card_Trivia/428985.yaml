title: Card Trivia:Pendulum Fusion
wikitext: |-
  {{Navigation}}

  * The two [[Fusion Material]]s featured in the artwork of "[[Polymerization]]" appear in this card's artwork as [[Pendulum Monster]]s.
  ** Furthermore, the background of this card's artwork features the pattern present when a [[Pendulum Summon]] was performed in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
