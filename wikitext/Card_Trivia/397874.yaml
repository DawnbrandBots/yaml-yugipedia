title: Card Trivia:Performage Plushfire
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Summon Gate]]".
  * This monster's Japanese name, "Higurumi" (ヒグルミ ''Higurumi''), is a portmanteau of the Japanese words for "fire" (火, ''hi'') and "plush toy" (ぬいぐるみ, ''nuigurumi'').
  ** Fittingly, this monster appears to be a plush toy resembling a wisp of flame, with stitches visible on its side.
  * This is the first [[Pendulum Monster]] to become [[Forbidden]].
  ** It is also one of the first of two "[[Performage]]" monsters to become Forbidden, the other being "[[Performage Damage Juggler]]".
