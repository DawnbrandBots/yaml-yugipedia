title: Card Trivia:Revolution Cyber Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Cyber Dragon]]".
  ** This monster's Japanese title, "Mechlight Dragon" (機光竜, ''Kikōryū''), is derived from ''[[Structure Deck: Blitzkrieg of the Mechlight Dragons]]'' (ストラクチャーデッキ －機光竜襲雷－, ''Sutorakuchā Dekki -Kikōryū Shūrai-''), which is centered around "Cyber Dragon".
  *** This monster's effect to [[target]] an opponent's monster and [[negate]] its effects is based on "[[Infinite Impermanence]]", a [[Trap Card]] that depicts "[[Cyber Dragon Infinity]]".
