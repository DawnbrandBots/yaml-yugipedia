title: Card Trivia:Neo-Spacian Grand Mole
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Contact Gate]]", "[[Contact Out]]", "[[Hope for the Future]]", "[[NEX]]", and "[[NEXT]]".
  * This monster has a "[[Chrysalis]]" form: "[[Chrysalis Mole]]".
  * This monster has a [[Contact Fusion]] with "[[Elemental HERO Neos]]": "[[Elemental HERO Grand Neos]]".
  ** This monster has two [[Triple Contact Fusion]]s with "Neos":
  *** With "[[Neo-Spacian Flare Scarab]]": "[[Elemental HERO Magma Neos]]".
  *** With "[[Neo-Spacian Dark Panther]]": "[[Elemental HERO Nebula Neos]]".
  ** This monster has an [[Contact Fusion#Ultimate Contact Fusion|Ultimate Contact Fusion]] with "Neos" and all the other "[[Neo-Spacian]]" monsters: "[[Elemental HERO Divine Neos]]".
