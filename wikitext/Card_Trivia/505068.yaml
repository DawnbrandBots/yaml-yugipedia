title: Card Trivia:Elemental HERO Clayman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Clay Charge]]", "[[Clay Wrap]]", "[[Fifth Hope]]", "[[Generation Next]]", "[[H.E.R.O. Flash!]]", "[[Hero's Backup]]", "[[HERO's Bond]]", "[[Mud Max]]", "[[Relationship]]", and "[[Tag Request]]".
  * This card appears in the original anime artwork of "[[Montage Dragon]]".
  * This monster has a "[[Destiny HERO]]" counterpart: "[[Destiny HERO - Defender]]".
  ** This is supported by the fact that the sum of both monsters' [[ATK]] and [[DEF]] adds up to 2800.
  * This monster is tied with "[[Mystical Elf (Rush Duel)|Mystical Elf]]" for the highest [[original DEF]] (2000) of any [[Level 4]] or lower monster in ''[[Yu-Gi-Oh! Rush Duel]]''.
  ** This monster also has the highest original DEF of any non-[[Legend]] [[Level 4]] or lower monster.
