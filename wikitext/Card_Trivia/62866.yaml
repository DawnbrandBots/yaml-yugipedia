title: Card Trivia:Darklord Superbia
wikitext: |-
  {{Navigation}}

  * This monster is named after "''superbia''", the Latin word for "pride", one of the [[wikipedia:Seven deadly sins|Seven deadly sins]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|036|ref}}, specifically from the panel showing [[Darklord Superbia (manga)|this monster]] being Summoned, albeit with its wings more detailed.
