title: Card Trivia:Autorokket Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Boot Sector Launch]]", "[[Borrel Cooling]]", "[[Borrel Regenerator]]", "[[Double Interlock]]", "[[Rapid Trigger]]", and "[[Rokket Barrage]]".
  * This monster's name and the design of its head are based on the bullets fired by an [[wikipedia:Automatic firearm|automatic firearm]], a self-loading firearm that continuously fires rounds as long as the trigger is held down and there is ammunition available.
