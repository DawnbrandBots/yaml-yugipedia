title: Card Trivia:Gem-Knight Prismaura
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Pyroxene Fusion]]".
  ** This monster's head appears in the artworks of "[[Gem-Knight Master Diamond]]" and "[[Scatter Fusion]]".
  * This card is named after a [[wikipedia:Prism|prism]].
  ** This card is the first "[[Gem-Knight]]" monster to not be named after a gemstone.
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gem-Knight Crystal]]" and "[[Vylon Prism]]".
  ** The head of "Vylon Prism" appears in the center of this monster's shield.
