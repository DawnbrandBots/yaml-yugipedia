title: Card Trivia:Straynge Magician
wikitext: |-
  {{Navigation}}

  * The pronunciation of this monster's Japanese name, "Stray Familiar Magician" (はぐれつかいマジシャン ''Hagure Tsukai Majishan'') is a portmanteau of the pronunciation of the Japanese name of "[[Straynge Cat]]", "Stray Familiar" (はぐれつかいま ''Hagure Tsukaima'') and "magician" (マジシャン ''Majishan'').
