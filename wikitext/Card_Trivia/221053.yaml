title: Card Trivia:Infestation Terminus
wikitext: |-
  {{Navigation}}

  * "[[Constellar Ptolemy M7]]" and "[[Evilswarm Ouroboros]]" appear in this card's artwork.
  ** It is similar to the artwork of "[[Ice Dragon's Prison]]", where a "Trishula" dragon battles "[[Dragunity Knight - Ascalon]]".
  ** The artwork shows the two fighting in "[[Divine Wind of Mist Valley]]", above "[[Shrine of Mist Valley]]". It is contrasted to the artwork of "Ice Dragon's Prison", which instead depicts the battle during the blizzard, above a snowy mountain.
  ** This card's name reflects that this is the final battle with the "[[Evilswarm]]".
