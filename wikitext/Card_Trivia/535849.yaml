title: Card Trivia:Aqua Dragon
wikitext: |-
  {{Navigation}}

  * This card and "[[Man-eating Black Shark]]" were the first [[Fusion Monster]]s with more than two [[Fusion Material]]s.
  ** Both cards also list "[[Amazon of the Seas]]" as material, and were released in ''[[Booster 4]]'' in the ''[[OCG]]''.
  ** This card was released in the ''[[TCG]]'' before "Amazon of the Seas" and "[[Fairy Dragon]]", making it impossible to [[Fusion Summon]] with those exact materials until then.
  *** In ''[[Yu-Gi-Oh! World Championship 2007]]'', "Aqua Dragon" can be obtained despite none of its Fusion Materials being available in-game.
  * This card is the first [[Sea Serpent]] Fusion Monster.
  ** It is also one of the few Fusion Monsters to not share a type with at least one of its Fusion Materials.
