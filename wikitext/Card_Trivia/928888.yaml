title: Card Trivia:S-Force Showdown
wikitext: |-
  {{Navigation}}

  * "[[S-Force Orrafist]]" and "[[Time Thief Redoer]]" appear in this card's artwork.
  ** This appearance may imply that the "[[Time Thief]]" [[archetype]] is in some way connected to the ''[[Duel Terminal Master Guide card storylines|Duel Terminal]]'' storyline, if one is to consider the "[[PSY-Frame]]" monsters (whose "[[PSY-Frame Driver|Driver]]" appears in the artwork of "[[S-Force Specimen]]" and its [[flavor text]] mentioning "S(ecurity)-Force" by name) the same as - or at the very least based on - the "[[Vylon]]" monsters.
