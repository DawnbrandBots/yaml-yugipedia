title: Card Trivia:Labyrinth Heavy Tank
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Memories]]''.
  * "[[Labyrinth Wall]]" appears in this card's artwork.
  * This monster is a [[retrained]] [[Labyrinth Wall (archetype)|Labyrinth Wall]] [[support]] [[Main Deck]] [[Effect Monster|Effect]] counterpart of "[[Labyrinth Tank]]".
  ** This monster's name is likely a reference to the [[flavor text]] of "[[Labyrinth Tank (Bandai)|Labyrinth Tank]]" in [[Yu-Gi-Oh! Bandai's Official Card Game]]: "The labyrinth is protected, an invincible <b>heavy tank</b>!"
  ** This monster's effect to [[Normal Summon]] itself without [[Tribute|Tributing]] is based on the appearance of "[[Labyrinth Tank (manga)|Labyrinth Tank]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where it is a Main Deck monster and was a Normal Summoned under the "[[Duel Monsters#Basic|Basic]]" rules of ''[[Duel Monsters]]'' that allow players to Normal Summon any monster from their [[hand]].
  ** This monster's effect to place "[[Sanga of the Thunder]]", "[[Kazejin]]", and "[[Suijin]]" in the [[Spell & Trap Zone]] as [[Continuous Spell]]s references how the [[Paradox Brothers]] [[Set]] the aforementioned monsters on their field, all of which were sealed inside caskets and didn't count as monsters. This enabled the Paradox Brothers to easily [[Summon]] "[[Gate Guardian]]".
