title: Card Trivia:Orichalcum Chain
wikitext: |-
  {{Navigation|mode=nonGame}}

  * [[wikipedia:Orichalcum|Orichalcum]] was a metal with magical properties, that existed in the lost city of [[wikipedia:Atlantis|Atlantis]].
  * This is the first card to reduce the number of [[Xyz Material]]s required to [[Xyz Summon]] an [[Xyz Monster]].
