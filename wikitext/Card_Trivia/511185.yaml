title: Card Trivia:Neo-Spacian Aqua Dolphin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Contact Out]]", "[[Cross Change]]", "[[EN Shuffle]]", "[[Hope for the Future]]", "[[NEX]]", "[[NEXT]]", "[[Neos Fusion]]", and "[[Neospace Wave]]".
  * This monster has a "[[Chrysalis]]" form: "[[Chrysalis Dolphin]]".
  ** This is the only "[[Neo-Spacian]]" monster to have a different [[Type]] than its "Chrysalis" form: this card is a [[Warrior]] monster, while "Chrysalis Dolphin" is a [[Fish]] monster.
  * This monster has an [[NEX|extended]] [[Fusion Monster|Fusion]] form: "[[Neo-Spacian Marine Dolphin]]".
  * This monster has 2 [[Contact Fusion]]s with "[[Elemental HERO Neos]]": "[[Elemental HERO Aqua Neos]]" in the ''[[OCG]]''/''[[TCG]]'', and "[[Elemental HERO Pulse Neos]]" in ''[[Rush Duel]]''.
  ** This monster has a [[Triple Contact Fusion]] with "Neos" and "[[Neo-Spacian Air Hummingbird]]": "[[Elemental HERO Storm Neos]]".
  ** This monster has an [[Contact Fusion#Ultimate Contact Fusion|Ultimate Contact Fusion]] with "Neos" and all the other "Neo-Spacian" monsters: "[[Elemental HERO Divine Neos]]".
  * This card was the first "Neo-Spacian" monster to appear in the ''[[Yu-Gi-Oh! GX]]'' anime, as well as the first "Neo-Spacian" monster to be released in the ''[[TCG]]''/''[[OCG]]''.
  ** "Chrysalis Dolphin" was also the first "Chrysalis" monster to be released.
  ** "Neo-Spacian Marine Dolphin" also was the first [[Card evolutions|upgraded]] "Neo-Spacian" monster to be released.
