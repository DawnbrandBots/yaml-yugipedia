title: Card Trivia:Carboneddon
wikitext: |-
  {{Navigation}}

  * This monster's name and [[EARTH]] [[Attribute]] are based on [[wikipedia:Carbon|carbon]], the sixth chemical element of the periodic table which solidifies into different earthly substances.
  ** This monster's ''[[OCG]]''/''[[TCG]]'' [[FIRE]] [[anti-support]] effect references how carbon is often used as one of the chemicals for [[wikipedia:Flame retardant|flame retardant]], designed to overpower the source of the ignition.
  ** This monster's ''OCG''/''TCG'' effect to [[Special Summon]] a [[Level 7]] or lower [[Dragon]] [[Normal Monster]] is an alteration of its anime effect, which can Special Summon "[[Hyozanryu (anime)|Hyozanryu]]", a Level 7 Dragon Normal Monster.
  *** Also, this monster's anime effect to Special Summon "Hyozanryu" after ten or more cards are on top of it in the [[Graveyard]] references how diamonds are formed as a result of buried carbon deposits being subjected to high temperatures and pressure, whereas the Japanese name of "Hyozanryu" is "Diamond Dragon".
