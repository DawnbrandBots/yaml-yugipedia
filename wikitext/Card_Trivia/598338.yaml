title: Card Trivia:Borreload eXcharge Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Rising Rampage]]''.
  * This monster is an [[Xyz Monster|Xyz]] [[counterpart]] of "[[Borreload Dragon]]".
  ** The "X" in this monster's Japanese name and its black color scheme further reference its Xyz Monster [[card type]].
  * This monster is the rival counterpart of "[[Firewall eXceed Dragon]]".
  ** Both are Xyz counterparts of [[Yusaku Fujiki]] and [[Ryoken Kogami|Varis]]' [[signature card]]s.
  ** Both monsters' wings are very similar and are shaped like an "X", referencing their card type.
  ** Both have a common naming scheme where the "X" in their Japanese names stands for another word.
  ** Both have a [[Continuous Effect]] that applies only while they are [[Xyz Summon]]ed.
  ** Both have an effect to revive their [[Link Monster|Link]] counterparts while preventing the player from Special Summoning or [[Direct attack|attacking directly]] for the rest of the turn.
  * This is the only non-[[Cyberse]] Xyz Monster to be [[Xyz Summon]]ed in ''[[Yu-Gi-Oh! VRAINS]]''.
