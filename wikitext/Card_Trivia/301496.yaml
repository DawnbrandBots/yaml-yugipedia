title: Card Trivia:Kagemusha Raccoon Token
wikitext: |-
  {{Navigation|mode=Token}}

  * This monster appears in the artwork of "[[Number 64: Ronin Raccoon Sandayu]]".
  * In the anime, when this token copies the [[ATK]] of a monster, it transforms into a silver-and-blue duplicate of said monster, as seen when it copies "Number 64: Ronin Raccoon Sandayu" and "[[Number C106: Giant Red Hand]]."
