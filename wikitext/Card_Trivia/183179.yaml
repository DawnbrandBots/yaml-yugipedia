title: Card Trivia:The Judgement Hand
wikitext: |-
  {{Navigation}}

  * "Judgement" is the proper spelling of the word in British English and in all other dialects of English apart from Simplified English, where the word is spelled "Judgment". However, this card's English international release uses "Judgement" instead.
  * In the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, this monster is revealed to be the arm of a [[warrior]].
  ** Curiously, the monster's model/sprite shows that it is the warrior's right arm, whereas the card's artwork depicts it as a left arm.
