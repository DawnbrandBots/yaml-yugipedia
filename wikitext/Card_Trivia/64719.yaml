title: Card Trivia:Darklord Nurse Reficule
wikitext: |-
  {{Navigation}}

  * This monster's name and romanization is the inverted writing and pronunciation of "[[wikipedia:Lucifer|Lucifer]]", the name of the [[wikipedia:Fallen angel|fallen angel]] in Biblical lore, who would later become another name for the [[wikipedia:Devil|Devil]].
  ** The "Nurse" in this monster's name references its owner, [[Fonda Fontaine]], who worked as the nurse for [[Duel Academy]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** This monster's full original name, "Nurse Reficule the Fallen One", and its damaging effect reference how Fonda Fontaine was transformed into a [[Duel Ghoul]] who focused on harming [[Jaden Yuki]] instead of healing him.
