title: Card Trivia:Danger!? Jackalope?
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Jackalope|Jackalope]].
  * Unlike the other "[[Danger!]]" monsters, this card, along with "[[Danger!? Tsuchinoko?]]", has question marks after each word in its name, likely to represent its danger level being called into question.
  * This is one of the [[cover card]]s of ''[[Extra Pack 2019]]''.
