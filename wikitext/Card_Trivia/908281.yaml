title: Card Trivia:Xtra HERO Infernal Devicer
wikitext: |-
  {{Navigation}}

  * Among the "[[Xtra HERO]]" [[Link Monster]]s, this monster represents the "[[Evil HERO]]" sub-[[archetype]].
  ** This card has a similar hell-related naming scheme, and like almost every "Evil HERO" monster, it is a [[Fiend]] rather than a [[Warrior]], in contrast to the other "Xtra HERO" monsters.
