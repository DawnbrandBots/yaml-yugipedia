title: Card Trivia:Dragon Ravine
wikitext: |-
  {{Navigation}}

  * This location appears in the artworks of "[[Dragunity Knight - Ascalon]]", "[[Dragunity Legion]]", "[[Dragunity Knight - Areadbhair]]", "[[Dragunity Arma Gram]]", and "[[Dragunity Whirlwind]]".
  * A trio of "[[Dragunity Aklys]]" can be seen in the sky in this card's artwork. They can be seen in more detail in this card's Field Spell animation from ''[[Yu-Gi-Oh! 5D's Tag Force 5|Tag Force 5]]'' and ''[[Yu-Gi-Oh! 5D's Tag Force 6|Tag Force 6]]''.
