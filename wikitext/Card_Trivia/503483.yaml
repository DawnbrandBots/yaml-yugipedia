title: Card Trivia:Vijam the Cubic Seed
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cubic Ascension]]".
  * This monster is based on [[wikipedia:Vishnu|Vishnu]], one of the principal deities in [[wikipedia:Hindusim|Hindusim]] who preserves the universe.
  * In ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'', when this monster moves to the [[Spell & Trap Zone]], [[Aigami|Diva]] refers to this as it moving to another dimension.
