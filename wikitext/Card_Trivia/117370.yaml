title: Card Trivia:Koa'ki Meiru Maximus
wikitext: |-
  {{Navigation}}

  * This monster is similar to the [[wikipedia:Xenomorph|Xenomorph]] from the ''[[wikipedia:Alien (franchise)|Alien]]'' franchise.
  * This monster is similar to to "[[Blue-Eyes White Dragon]]".
  ** It also has the same [[Level]] (8), [[Type]] ([[Dragon]]), [[ATK]] (3000), and [[DEF]] (2500).
  * This is the only "[[Koa'ki Meiru]]" [[Special Summon-only monster]].
  ** It is the only one that can Special Summon itself and the only one with a [[maintenance cost]] that can include discarding a "Koa'ki Meiru" monster.
  * This monster has the highest [[DEF]] (2500) of all "Koa'ki Meiru" monsters.
  ** This monster also has the highest [[ATK]] (3000) of all "Koa'ki Meiru" monsters (tied with "[[Koa'ki Meiru Valafar]]").
  * This monster was captured using the "[[Nega-Ton Corepanel]]".
