title: Card Trivia:Big-Winged Berfomet
wikitext: |-
  {{Navigation}}

  * This monster is the [[retrained]] counterpart of "[[Berfomet]]".
  ** The first portion of this monster's name, "Big-Winged", references the [[flavor text]] of "[[Berfomet (DM4)|Berfomet]]" in ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'': "''Its big wings are said to be able to repel any wind.''"
  * This monster has an upgraded "[[Phantom Beast]]" [[Fusion Monster|Fusion]] form combined with "[[Mirror Swordknight]]": "[[Berfomet the Mythical King of Phantom Beasts]]".
