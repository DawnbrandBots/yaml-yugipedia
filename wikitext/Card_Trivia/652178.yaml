title: Card Trivia:Armatos Legio Magnus Dux
wikitext: |-
  {{Navigation|mode=nongame}}

  * "Magnus dux" is Latin for "[[wikipedia:Grand duke|grand duke]]".
  * This monster is likely a reference to [[wikipedia:Roman war elephants|Roman war elephants]].
  * This monster's [[Link Rating]], [[Link Arrow]]s, and first effect are all similar to that of "[[Firewall Dragon (anime)|Firewall Dragon]]", whose [[own]]er, [[Yusaku Fujiki|Playmaker]], opposed [[Lightning]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, and are both the primary protagonist and antagonists respectively.
  * Despite this card having a second effect, it was never used throughout the anime, because when this monster was first [[Link Summon]]ed against [[Spectre]], Spectre did not have a [[Link Monster]] to use against it. Then, when it was Summoned for a second appearance against [[Ryoken Kogami|Varis]], it could neither be activated in [[Chain]] with "[[Borreload Dragon (anime)|Borreload Dragon]]" nor "[[Borreload eXcharge Dragon (anime)|Borreload eXcharge Dragon]]" as Lightning could not [[activate]] [[card effect]]s against the former, while the latter was an [[Xyz Monster]].
