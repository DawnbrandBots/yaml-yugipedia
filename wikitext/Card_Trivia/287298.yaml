title: Card Trivia:Junk Dragonlet
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Dragonsent" (ドラゴンセント ''Doragonsento''), is a portmanteau of the words "dragon" (ドラゴン, ''Doragon'') and "''konsento''" (コンセント), which is derived from the English word "concentric plug".
  ** This monster's international name, "Dragonlet", is a portmanteau of the words "dragon" and "outlet"; this was a mistake on [[Masashi Satō]]'s behalf, which was pointed out by [[Masahiro Hikokubo]]. He intended to name the card based on its appearance, but confused "plug" and "outlet".<ref>''Yu-Gi-Oh! 5D's'' [[Yu-Gi-Oh! 5D's - Volume 004|Volume 4]]; page 78: ''5D's Tracks'' The 27th</ref>
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|028|ref}}, specifically from the panel showing [[Junk Dragonlet (manga)|this monster]] materializing while using its [[banish]]ing effect.

