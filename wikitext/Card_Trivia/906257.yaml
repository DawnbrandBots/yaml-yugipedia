title: Card Trivia:Fierce Tiger Monghu
wikitext: |-
  {{Navigation}}

  * This monster has a counterpart: "[[King Tiger Wanghu]]".
  ** Both monsters share the same [[Attribute]] ([[EARTH]]), [[Level]] (4), [[Type]] ([[Beast]]), [[original ATK and DEF]] (1700/1000), as well as effects that destroy monsters with lower ATK.
  ** Both monsters also have names that are base on the same phrase in English and Chinese: "Monghu" is based on the Chinese for "fierce tiger" (猛虎, ''Měnghǔ''). Unlike "Wanghu", however, it is not toneless Hanyu Pinyin, as the final uses a different vowel.
