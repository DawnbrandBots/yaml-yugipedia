title: Card Trivia:Cyber Angel Natasha
wikitext: |-
  {{Navigation}}

  * This monster is based on "[[wikipedia:Nasadiya Sukta|Nasadiya]]", also known as "The Hymn of Creation" in the [[wikipedia:Rigveda|Rigveda]], the ancient Vedic hymns of [[wikipedia:Hinduism|Hinduism]], in which it deals with the origins of the universe, serving as the basis of this monster's Japanese name, "Nasateiya".
  ** In the ''[[TCG]]'', however, this monster's name was changed in the release to "Natasha" in order to avoid religious connotation.
  * This is the last [[Ritual Monster]] to be [[Ritual Summon]]ed in ''[[Yu-Gi-Oh! ARC-V]]''.
