title: Card Trivia:Ghostrick Siren
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ghostrick Festival]]".
  * This monster is based on both a [[wikipedia:Siren (mythology)|siren]] and [[wikipedia:Mermaid|mermaid]], an aquatic half-woman and half-fish creature in folklore whose beautiful voices lures sailors to their deaths.
