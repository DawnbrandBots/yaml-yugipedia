title: Card Trivia:Evil Box
wikitext: |-
  {{Navigation}}
  [[File:Bickuribox-JP-Anime-DM-NC.png|thumb|"Bickuribox" in the anime]]
  * This monster is a [[retrained]] counterpart of "[[Bickuribox]]".
  ** This monster's name is based on the Japanese name of "Bickuribox", "Devil Box".
  ** This monster's [[Level]] (6) is based on the Level of "[[Bickuribox (manga)|Bickuribox]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]], while its property as a [[Main Deck]] monster references how "Bickuribox" was originally used in the Main Deck in the manga before it was released as a [[Fusion Monster]] in the ''[[OCG]]''/''[[TCG]]''.
  *** This monster's effect to [[Special Summon]] itself from the [[hand]] if the player [[control]]s "[[Toon World]]" not only references the Standard rules of ''[[Duel Monsters]]'' during the [[Duelist Kingdom (manga arc)|Duelist Kingdom]] arc in the ''Yu-Gi-Oh!'' manga and [[Yu-Gi-Oh! (anime)|anime]] (which allowed players to [[Normal Summon]] high-[[Level]] monsters without [[Tribute|Tributing]] monsters), but also how Pegasus Normal Summoned this card while "Toon World" was active.
  ** This monster's effect that treats itself as a [[Toon monster]] (while "[[Toon World]]" is on the [[field]]) references how [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus's]] monsters were affected by the effect of "[[Toon World (manga)|Toon World]]" in the ''Yu-Gi-Oh!'' manga and anime.
  ** This monster's effect that places a card in either [[Graveyard]] on the bottom of the Deck is a reference to the fact that in both the manga and anime, [[Seto Kaiba]] had no cards left in his [[Deck]] by the time "Bickuribox" was Summoned, resulting in his loss by [[Deck out]] during his next turn.
  ** This monster's color scheme is based on the color scheme of "[[Bickuribox (anime)|Bickuribox]]" in the ''Yu-Gi-Oh!'' anime, while its pose is based on a scene from {{episode|Yu-Gi-Oh!|027|ref}} where "Bickuribox" is retreating back into its box after destroying Saggi the Dark Clown with its scythe.
