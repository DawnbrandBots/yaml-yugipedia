title: Card Trivia:Silver Spirit Sakyo
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Mirror Bind]]" and "[[Mirror Call]]".
  * This monster is likely a reference to [[wikipedia:Sakyo-ku, Kyoto|Sakyo-Ku]], the eastern ward in the city of [[wikipedia:Kyoto|Kyoto]] posed on the left side of the [[wikipedia:Kyoto Imperial Palace|Kyoto Imperial Palace]].
  ** "Sakyo-ku" means "the ward on the Emperor's left"; this monster's left arm is covered in drill-shaped bandages.
  ** While residing in the Kyoto Imperial Palace, the emperor would sit facing south, thus making it appear that the east was facing left, while the westward [[wikipedia:Ukyo-ku, Kyoto|Ukyo-Ku]] would be facing right; this reflects this monster's mirror relationship with "[[Silver Spirit Ukyo]]".
