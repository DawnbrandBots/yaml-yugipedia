title: Card Trivia:Kaiser Eagle, the Heavens' Mandate
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Kaiser|Kaiser]], the German word for the title of "emperor."
  ** This monster's appearance is based on the [[wikipedia:Coat of arms of Germany|German coat of arms]], which depicts a black eagle on a golden emblazoned field.
  ** This card and "[[Skyfaring Castle of the Black Forest]]" have a common German theme, and were first released at the [[World Championship 2019]] in [[wikipedia:Berlin|Berlin]], [[wikipedia:Germany|Germany]].
