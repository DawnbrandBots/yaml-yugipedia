title: Card Trivia:Gladiator Beast Dimacari
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Defensive Tactics]]", "[[Gladiator Beast's Valor]]", and "[[Parry]]".
  * This monster is named after the ''[[wikipedia:Dimachaerus |dimachaeris]]'', a type of gladiator who battled while dual-wielding swords in [[wikipedia:Ancient Rome|Ancient Rome]], which reflects its effect to attack twice when [[Special Summon]]ed.
