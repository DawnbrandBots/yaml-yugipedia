title: 'Card Trivia:Player 99: Grand Slam Dragon'
wikitext: |-
  {{Navigation}}

  * A bobble-head version of the plushie on the end of this monster's tail appears in the artwork of "[[Bobbleheader]]".
  * This monster is a ''[[Rush Duel]]'' [[Baseball]] parody of "[[Number 99: Utopic Dragon]]".
  ** This monster's name is a parody of the Japanese name of "Utopic Dragon": "Hope Dragoon".
  ** This card's [[Type]] ([[Dragon]]) and [[original DEF]] (2000) is the same as "Utopic Dragon"; its [[original ATK]] (2000) is half of that of "Utopic Dragon", though this monster will have the same [[ATK]] as "Utopic Dragon" after activating its effect.
  ** This monster's effect to [[Special Summon]] "[[Player 39: Home Run Hitter|Player #39: Home Run Hitter]]" from the [[Graveyard]] is a reference to the effect of "Utopic Dragon" to Special Summon a "[[Number]]" monster from the Graveyard.
