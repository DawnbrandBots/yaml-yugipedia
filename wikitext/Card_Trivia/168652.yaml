title: Card Trivia:Pain Painter
wikitext: |-
  {{Navigation}}

  * This monster's name may be a reference to the [[wikipedia:Pan Painter|Pan Painter]], an important vase-painter in [[wikipedia:Ancient Greece|Ancient Greece]].
  * This monster shares many similarities with "[[Plaguespreader Zombie]]" and "[[Mad Mauler]]":
  ** They have the same [[Attribute]] ([[DARK]]), [[Level]] (2), [[Type]] ([[Zombie]]/[[Tuner monster|Tuner]]) and [[original ATK and DEF]] (400/200).
  ** Both this monster and "Mad Mauler" feature effects that allows them to treat their names as "Plaguespreader Zombie". 
  * This monster was likely created to facilitate the [[Synchro Summon]] of the Zombie [[Synchro Monster]]s that require "Plaguespreader Zombie" as [[material]] during the time that card was [[Limited]].
