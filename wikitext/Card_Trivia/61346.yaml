title: Card Trivia:Ojamarking
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card appears to be "[[Ojama Yellow]]" in Geisha make up.
  * This card shares several effect similarities with "[[Ojamagic]]"– both cards cannot be activated on their own like normal Spell or Trap cards, and both deal with [[Special Summon]]ing "[[Ojama]]" monsters.
