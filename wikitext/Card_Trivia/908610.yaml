title: Card Trivia:Ogdoadic Water Lily
wikitext: |-
  {{Navigation}}

  * "[[Nunu, the Ogdoadic Remnant]]" appears in this card's artwork.
  * The water lily depicted in this card's artwork is likely the [[wikipedia:Nymphaea nouchali var. caerulea|Egyptian Water-lily]]; according to [https://www.ucl.ac.uk/museums-static/digitalegypt/religion/deitiescreation.html some] [[wikipedia:Ancient Egyptian creation myths|Ancient Egyptian creation myths]], this lily emerged from the ''[[wikipedia:Nu|Nu]]'', or primordial waters of creation and either bloomed into a [[wikipedia:Solar deity|sun god]] ([[wikipedia:Ra|Ra]], [[wikipedia:Horus|Horus]] or [[wikipedia:Atum|Atum]]) or a similar creator deity like [[wikipedia:Nefertem|Nefertem]].
