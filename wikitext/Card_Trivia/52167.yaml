title: Card Trivia:Orgoth the Relentless
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectors Pack 2018]]''/''[[Battles of Legend: Relentless Revenge]]''.
  * This monster appears in the artwork of "[[Dimension Dice]]".
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, this monster was created as a ''[[Dungeon Dice Monsters]]'' piece, and was exclusive to that game before it was released as a card in the ''[[OCG]]''/''[[TCG]]''.
  ** In the ''OCG''/''TCG'', this monster's [[original ATK and DEF]] is 2500/2450, referencing how in the ''Yu-Gi-Oh!'' manga, this monster's [[ATK]] and [[DEF]] were 500/450 while at [[Level 4]].
  ** This monster's gain ATK references its ''Dungeon Dice Monsters'' effect, which requires the player to remove three [[Magic Crest]]s to increase its ATK to 2000.
  * This monster's effects reference the gameplay of ''[[Dungeon Dice Monsters]]''.
  ** This monster's effect to roll a [[dice]] three times per turn references how in ''Dungeon Dice Monsters'', a turn begins by rolling three dice.
  ** Its effects that apply when two of the results are the same reference how in ''Dungeon Dice Monsters'', the player can Summon monsters by rolling two [[Summon Crest]]s.
  *** Its effect of applying all of its effects if all three of the results are the same is based on how, in the ''Yu-Gi-Oh!'' manga, rolling three Summon Crests upgraded the Level and effects of a monster. In particular, "Orgoth" was Summoned this way in the manga.
  ** This monster's three optional effects reference the Crests in ''Dungeon Dice Monsters'':
  *** Attacking directly this turn: [[Attack Crest]].
  *** Allowing the player to [[draw]] 2 cards: Magic Crest and [[Trap Crest]].
  *** Being unable to be [[destroyed by battle]] or [[card effect]]s until the end of the opponent's turn: [[Defense Crest]].
  * This is the [[signature card]] of [[Duke Devlin]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
