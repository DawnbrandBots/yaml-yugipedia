title: Card Trivia:Don Zaloog
wikitext: |-
  {{Navigation|other=[[Shadow Riders#Don Zaloog|Character]]}}

  * This monster appears in the artworks of "[[Dark Scorpion Burglars]]", "[[Dark Scorpion Combination]]", [[Mustering of the Dark Scorpions]]", "[[Needle Wall]]", and "[[Zero Hole (GX)|Zero Hole]]".
  * This monster's name features the title "Don", which is typically given to the boss of a criminal organization, whereas this monster serves as the boss of the "[[Dark Scorpion]]" monsters.
  ** Despite being depicted as the boss of the "Dark Scorpion" monsters, it is not an actual member of the "Dark Scorpion" [[archetype]] due to lacking the archetype's naming in its ''[[OCG]]''/''[[TCG]]'' names.
  * When this monster appears as an opponent in ''[[Yu-Gi-Oh! World Championship 2007]]'', its card artwork is the one from ''[[Yu-Gi-Oh! GX Spirit Caller]]'' (which depicts its [[Don Zaloog (character)|character form]] from the ''[[Yu-Gi-Oh! GX]]'' anime), rather than its ''OCG''/''TCG'' artwork.
