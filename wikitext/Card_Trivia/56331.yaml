title: Card Trivia:Geo Genex
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Geothermal energy|geothermal energy]], the natural energy within the Earth's crust, used as a source for heat and/or electrical power.
  ** Fittingly, this monster is the [[Card evolutions|upgraded]] [[Synchro Monster]] version of "[[Genex Gaia]]", whose name is based on the Greek goddess of the Earth.
  ** This monster is also depicted leaking what appears to be [[wikipedia:Magma|magma]], which can be used as a source for geothermal energy from underneath the Earth's rust.
