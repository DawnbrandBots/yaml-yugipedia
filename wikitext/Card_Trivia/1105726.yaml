title: Card Trivia:Crimson Firewing Pegasus
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[counterpart]] of "[[Firewing Pegasus]]".
  ** This monster's Japanese name, "{{translated name|Crimson Firewing Pegasus|ja}}", references the [[flavor text]] of "Firewing Pegasus": "''A '''heavenly stallion''' soaring through the skies on '''crimson''' wings.''"
