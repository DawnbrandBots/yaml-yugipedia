  * "[[Super Quantal Fairy Alphan]]", "[[Super Quantal Mech Beast Aeroboros]]", "[[Super Quantal Mech Beast Grampulse]]", "[[Super Quantal Mech Beast Magnaliger]]", and "[[Super Quantal Mech King Great Magnus]]" appear in this card's artwork.
