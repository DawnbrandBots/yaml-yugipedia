  * "[[Libromancer Mystigirl]]", "[[Libromancer Geek Boy]]", a realized "[https://web.archive.org/web/20220202212747/https://pbs.twimg.com/media/FKm1G98XwAkw8XS.jpg:large Firestarter]" and "[[Libromancer Doombroker]]" appear in this card's artwork.
  * Based on "Firestarter's" clothing and appearance, this card likely takes place before the events of "[[Libromancer Bonded]]" and the formation of "[[Libromancer Fireburst]]"
  ** Following this logic, it likely takes place after "[[Libromancer Realized]]" as "Firestarter's" artstyle has changed from their original comic book aesthetic.
