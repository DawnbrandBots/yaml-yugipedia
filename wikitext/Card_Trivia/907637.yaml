title: Card Trivia:Speedroid CarTurbo
wikitext: |-
  {{Navigation}}

  * This monster is based on a ''[[wikipedia:Karuta|karuta]]'', a Japanese playing card.
  ** This monster's Japanese name (カールターボ, ''Kārutābo'') is a portmanteau of the words "''karuta''" (かるた), "car" (カール, ''Kāru''), and "turbo" (ターボ, ''Tābo''). Fittingly, the katakana 「カ」 (''Ka'') appears on the top right corner of this monster.
  * This card's artwork is taken from {{chapter|ARC-V|040|ref}}, specifically from the panel showing [[Speedroid CarTurbo (manga)|this monster]] being Summoned.
