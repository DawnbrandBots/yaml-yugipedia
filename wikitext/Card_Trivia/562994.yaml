  [[File:DMx001_Triple_Blue-Eyes.png|thumb|right|250|Yami Yugi facing Seto Kaiba's three "Blue-Eyes White Dragons".]]

  * Three "[[Blue-Eyes White Dragon]]s" appear in this card's artwork.
  ** This card's artwork and effect to [[Special Summon]] three copies of "Blue-Eyes White Dragon" are a reference to {{episode|Yu-Gi-Oh!|001|ref}} and {{chapter|Yu-Gi-Oh!|038|ref}}, specifically to the scene where [[Yami Yugi]] was standing against [[Seto Kaiba]]'s three "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragons]]", during their first [[Duel]] (their second Duel in the manga).

