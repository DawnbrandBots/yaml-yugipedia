title: Card Trivia:Sheep Token
wikitext: |-
  {{Navigation}}

  * This [[Token Monster|Token]], with its differently colored versions, appears in the artworks of "[[Escapegoat]]", "[[Oh Tokenbaum!]]" (as decorations and as roasted food), "[[Rebound]]", "[[Scapegoat]]", "[[Sealing Ceremony of Mokuton]]", "[[Token Support]]", "[[Token Collector]]", "[[Token Feastevil]]", "[[Token Stampede]]", "[[Token Sundae]]", "[[Token Thanksgiving]]", and "[[Twin Twisters]]".
  ** This Token is also depicted as an icon on the ticket in the artwork of "[[One-Time Passcode]]".
  ** A pink version of this Token appears as an illustration on the slot in the artworks of "[[7]]" and "[[Jackpot 7]]", and as a stuffed toy in the artwork of "[[Parasomnia Pillow]]".
  ** A yellow version of this Token is worn as a hat by "[[White Magician Pikeru]]".
  ** A balloon version of this Token appears in the artworks of "[[Amazement Administrator Arlekino]]", "[[Amazement Ambassador Bufo]]", "[[Amazement Precious Park]]", and "[[Amazement Special Show]]".
