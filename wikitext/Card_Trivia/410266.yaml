title: Card Trivia:Majespecter Fox - Kyubi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Majespecter Cyclone]]" and "[[Majesty's Pegasus]]".
  * This card is based on the ''[[wikipedia:Kitsune|kyūbi no kitsune]]'', a nine-tailed fox ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore.
