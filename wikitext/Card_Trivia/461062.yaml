title: Card Trivia:The Phantom Knights' Rank-Up-Magic Launch
wikitext: |-
  {{Navigation}}

  * The "[[The Phantom Knights]]" crest appears in this card's artwork.
  * This is the first "[[Rank-Up-Magic]]" card to have its [[card type]] changed from the anime to the ''[[OCG]]''/''[[TCG]]''.
  ** In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this card was a [[Normal Spell]], while in the ''OCG''/''TCG'' it is a [[Quick-Play Spell]].
  * This is the first "Rank-Up-Magic" card revealed in the ''Yu-Gi-Oh! ARC-V'' anime that does not have the word "Force" in its name.
  ** It is also the first "Rank-Up-Magic" card from the ''Yu-Gi-Oh! ARC-V'' anime not used by [[Shay Obsidian]].
  * This is the first "The Phantom Knights" [[Spell Card]], as well as the first "The Phantom Knights" Spell/[[Trap Card]] that does not [[Special Summon]] itself as a monster.
  * This is the first "Rank-Up-Magic" card to not have a ''TCG'' name starting with "Rank".
  * Despite this card's effect to [[transfer]] the [[material]]s of the [[target]]ed monster to the [[Summon]]ed monster, this card cannot target an [[Xyz Monster]] with [[Xyz Material]]s.
  ** However, the targeted monster may gain Xyz Materials after this card is activated, but before it [[resolve]]s.
