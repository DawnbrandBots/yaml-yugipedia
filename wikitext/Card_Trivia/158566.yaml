title: Card Trivia:T.G. Wonder Magician
wikitext: |-
  {{Navigation}}

  * The letters "SC" in this monster's Japanese anime name (SCX-1000) references its [[Spellcaster]] [[Type]], while the letter "X" is a reference to its [[Synchro Monster]] [[card type]].
  * This is the first [[Synchro Tuner Monster]].
  * This is the first card to receive an [[archetype-exclusion condition]].
  * This monster is the mascot character for ''[[Yu-Gi-Oh! 5D's Tag Force 6]]''. When the game is loading, this monster appears in several different poses, including some without her hat.
