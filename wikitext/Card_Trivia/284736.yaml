title: Card Trivia:Dynatherium
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Swift Hippo Baluchiterium", is based on the ''[[wikipedia:Paraceratherium|Baluchitherium]]'', a prehistoric relative to the modern horses and rhinoceros. Despite the Japanese name, the ''Baluchitherium'' is not a prehistoric mammal related to the modern hippos.
  ** This monster's ''[[TCG]]'' name is derived from ''[[wikipedia:Deinotherium|Deinotherium]]'', a prehistoric relative of modern elephants.
  * This card's artwork is taken from {{chapter|ZEXAL|31|ref}}, specifically from the panel showing [[Swift Hippo Dynatherium (manga)|this monster]] being Summoned, albeit with its right arm visible.
