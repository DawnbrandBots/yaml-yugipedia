title: Card Trivia:Des Frog
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[D.3.S. Frog]]", "[[Des Croaking]]", "[[Hero's Backup]]", and "[[Rain of Frogs]]".
  * This monster's Japanese name, "Death Frog" (デスガエル, ''Desugaeru''), is a pun on the Japanese word「ですがえる」, meaning "to come across".
  * When this card was first printed in the ''[[OCG]]'', its card text did not include a final punctuation mark.
