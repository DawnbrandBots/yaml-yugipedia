title: Card Trivia:Superheavy Samurai Stealth Ninja
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Shinobi-AC" (シノビ－Ａ・Ｃ, ''Shinobi-A Shī'') is a pun on the ''[http://www.ninjaencyclopedia.com/techniques/ninjawalk.html shinobi-ashi]'' (忍び足), a training method that teaches how to move quietly and stealthily for ninjas.
