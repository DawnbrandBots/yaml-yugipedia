title: Card Trivia:Crowley, the Gifted Magistus
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2025]]'' and ''[[Nature Pack: Courageous Zoodiacs]]''.
  * "[[Magistus Chorozo]]" appears in this card's artwork.
  * This monster is a retrained [[counterpart]] of "[[Crowley, the Magistus of Grimoires]]".
  ** This is also the [[Monster Card]] counterpart of [[Aleister Crowley]], the main character of the "[[Magistus]]" story of the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
