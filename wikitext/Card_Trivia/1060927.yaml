title: Card Trivia:Dice Key Ichika
wikitext: |-
  {{Navigation}}

  * This monster's name, along with the name of "[[Dice Key Bachika]]", make up the Japanese idiom「一か八か」(''Ichikabachika''), the literal translation of which is "(a) one-in-eight (stake)", but is used as the English equivalent to "do-or-die" or "high stakes".
