title: Card Trivia:Seal of Wickedness
wikitext: |-
  {{Navigation}}

  * The card "[[Darkness Destroyer]]" appears in this card's artwork, which is an [[Effect Monster]] and thus, a valid [[target]] for this card.
  ** This is also fitting since this card negates a card's effects during ''your opponent's'' turn--"Darkness Destroyer" would ideally be negated on such a turn as its effects primarily involve the [[Battle Phase]].
  ** Unlike most other cards, the International version of this card retains the Japanese text in "Darkness Destroyer".
