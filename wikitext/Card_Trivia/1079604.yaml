title: Card Trivia:Jurrac Astero
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Terminal World 2]]''.
  * This monster shares similarities with "[[Jurrac Meteor]]".
  ** Both are [[Level 10]] "[[Jurrac]]" [[Synchro Monster]]s.
  ** Both are named after astronomical objects: an [[wikipedia:Asteroid|asteroid]] for this card and a [[wikipedia:Meteor|meteor]] for "Meteor".
  ** This monster has exactly 300 less [[ATK]] and more [[DEF]] than "Jurrac Meteor".
  ** This monster's last effect [[Special Summon]]s "Jurrac Meteor".
  ** This monster's first effect [[Set]]s a "Jurrac" [[Spell]]/[[Trap Card]], with only one of each currently existing: "[[Jurrac Volcano]]", a [[Field Spell Card]] which also Special Summons "Jurrac Meteor", and "[[Jurrac Impact]]", a Trap Card which depicts "Jurrac Meteor" in its artwork and has an effect similar to said monster.
