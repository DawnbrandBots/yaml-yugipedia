title: Card Trivia:Man-eating Black Shark
wikitext: |-
  {{Navigation}}

  [[File:Great_White_battling_Oscillo_Hero_2.png|thumb|right|250|"[[Great White (manga)|Great White]]" battling "[[Oscillo Hero 2 (manga)|Oscillo Hero #2]]".]]

  * This monster features a [[wikipedia:Remora|remora]], a type of fish who spends their lives clinging to larger sea life, including sharks.
  * This card is a [[Fusion Monster]] [[recolored counterpart]] of "[[Great White]]".
  * This card and "[[Aqua Dragon]]" are the first Fusion Monsters with more than two [[Fusion Material]]s.
  ** Both also list "[[Amazon of the Seas]]" as Fusion Material, and were released in ''[[Booster 4]]'' in the ''[[OCG]]''.
  * This card's ''OCG''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|061|ref}}, specifically from the panel showing "[[Great White (manga)|Great White]]", this card's [[counterpart]], battling "[[Oscillo Hero 2 (manga)|Oscillo Hero #2]]", albeit mirrored.

