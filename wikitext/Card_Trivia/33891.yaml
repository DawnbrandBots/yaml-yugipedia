title: Card Trivia:Royal Oppression
wikitext: |-
  {{Navigation}}

  * This card appears in the artworks of "[[Trap Stun]]" and "[[Trap Pause]]" (albeit in the form of a stone tablet).
  * Two of the men that appears in this card's artwork also appears in the artwork of "[[Retort]]".
  * The people in this card's artwork are depicted in the same style as "[[Exiled Force]]".
  * The events in this card's artwork are continued in the artwork of "[[Royal Prison]]", which depicts the same group of people that appears in this card's artwork being imprisoned.
  ** "Royal Prison" also prevents [[Special Summon]]s, albeit only from the [[Graveyard]], unlike this card, which only allows any player to [[pay]] 800 [[LP]] to [[negate]] the Special Summon of a monster, and/or an effect that Special Summons a monster, and [[destroy]] those cards.
