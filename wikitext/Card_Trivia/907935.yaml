title: Card Trivia:Springans Call!
wikitext: |-
  {{Navigation}}

  * "[[Tri-Brigade Kitt]]", "[[Fallen of Albaz]]", "[[Ecclesia the Exiled]]", multiple "[[Springans Rockey]]s", and "[[Springans Pedor]]" appear in this card's artwork.
  ** A dark "Hole" mark also appears, opening from the ground. It likely is where "[[Supreme Sovereign Serpent of Golgonda]]" comes out from.
  * When the ''[[The Fallen & The Virtuous (disambiguation)|The Fallen & The Virtuous]]'' story was adapted for ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'', the scene depicted in this card's artwork was completely omitted.
