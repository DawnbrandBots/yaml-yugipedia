title: Card Trivia:Genesis Omega Dragon (card)
wikitext: |-
  {{Navigation}}

  * This monster is the embodiment of [[Genesis Omega Dragon]], the final antagonist of the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
  * This monster's name is a play on the English word "[[wikipedia:God|God]]", to emphasize its immeasurable power and ability to influence people and events.
  ** In the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, this card was described as a "god card" that is said to "have the power to decide the fate of the world". This is surprisingly similar to the [[Numeron Code]] from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster is the originator of the power of the [[G.O.D. (series)|G.O.D.]] cards, and thus represents the manipulation of both time and space.
  ** This monster can immediately end the current turn when targeted by an [[attack]] or [[card effect]], by placing a card in the [[Pendulum Zone]], and gains 1000 [[ATK]] at the beginning of every turn, referencing the manipulation of time. It can also [[destroy]] cards on the [[field]] equal to the number of cards in the [[control]]ler's Pendulum Zones, referencing the manipulation of space.
  ** This monster bears some resemblance to "[[Odd-Eyes Phantom Dragon]]", [[Yuya Sakaki (manga)|Yuya Sakaki's]] [[ace monster]] in the manga. This is fitting, as "Phantom Dragon's" ultimate form is "[[All-Eyes Phantom Dragon]]" ("God-Eyes Phantom Dragon" in Japanese), which represents the manipulation of time.
  *** On the other side, "[[Go! - D/D/D Divine Zero King Rage]]" represents the manipulation of space.
