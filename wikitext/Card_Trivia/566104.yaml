title: Card Trivia:Galatea, the Orcust Automaton
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Orcustrated Return]]", "[[Orcustrated Core]]", and "[[Orcustrated Release]]".
  * The background of this card's artwork seems to be the cathedral-like insides of "[[Orcustrion]]".
  * This monster has a spiritual form, recreated by "[[Avida, Rebuilder of Worlds]]": "[[World Legacy Token]]".
  * This monster has a [[Counterpart|retrained]] counterpart: "[[Galatea-I, the Orcust Automaton]]".
  * The evolution of "Galatea, the Orcust Automaton" follows multiple paths, differing for each of the souls inhabiting it:
  ** (Ib) → "[[Ib the World Chalice Justiciar]]" → "[[Lib the World Key Blademaster]]".
  ** (Lee) → "[[Orcust Knightmare]]" → "[[Knightmare Incarnation Idlee]]"
  ** (Galatea) → "World Legacy Token" → "Galatea-I, the Orcust Automaton".
  * This monster is a robotic vessel for the soul of "Ib, the World Chalice Priestess", designed by her brother "[[Longirsu, the Orcust Orchestrator]]" after her death (depicted in the artwork of "[[World Legacy's Sorrow]]") to look like her. Eventually, this monster developed her own soul.
  ** This monster is based on [[wikipedia:Galatea (mythology)|Galatea]], a statue carved by [[wikipedia:Pygmalion (mythology)|Pygmalion]] in in [[wikipedia:Greek mythology|Greek mythology]], who then came to life as the result of its creator's love. Fittingly, this monster named herself "Galatea" (by accessing the records of past civilizations) as she was loved by "Longirsu". Also, it can be said that robots are the next one to imitate humanity, like the statues.
  ** This card has the same [[ATK]] (1800) and [[Link Rating]] (2) of "Ib the World Chalice Priestess", as well as [[Link Arrow]]s that face two opposite directions.
  ** The edge of this monster's scythe is also derived from one of the blades of "[[Mekk-Knight Avram]]", the same one that "Ib" used to kill herself, as depicted in the artwork of "[[World Legacy Struggle]]".
  * The 'Key' symbol on this monster's stomach is the same as the symbol on the chest of "[[Mekk-Knight of the Morning Star]]".
