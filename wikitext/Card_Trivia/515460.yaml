title: Card Trivia:Skull Red Bird
wikitext: |-
  {{Navigation}}

  * This card is not available in ''[[Yu-Gi-Oh! World Championship 2007]]''; however, "[[Crimson Sunbird]]", which requires this card as [[Fusion Material]], appears in the video game, but cannot be Summoned without this card and "[[Faith Bird]]".
  * In the Chinese version of ''[[Yu-Gi-Oh! Duel Links]]'', this monster is standing on a rock instead of a skull.
