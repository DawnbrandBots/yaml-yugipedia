title: Card Trivia:Token Support
wikitext: |-
  {{Navigation}}

  * A blue "[[Sheep Token]]" and "[[White Duston]]" appear in this card's artwork.
  ** Fittingly, the "Sheep Token" is a [[Monster Token]], while "White Duston" has 0 [[ATK]].
  * The word 「闘君」 (''Tōkun'', lit. "battle people") in this card's Japanese name is a homophone of the word "Token" (トークン, ''Tōkun'').
