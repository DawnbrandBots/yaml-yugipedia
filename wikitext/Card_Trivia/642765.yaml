title: Card Trivia:Gizmek Yata, the Gleaming Vanguard
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of 2 words from [[wikipedia:Japanese mythology|Japanese mythology]]: the "[[wikipedia:Three-legged crow|Yatagarasu]]", the three-legged crow, and "[[wikipedia:Misaki|misaki]]", a collective term for spirit-like existences, such as gods, demons, and spirits, amongst other supernatural entities.
  ** The Yatagarasu is a mark of rebirth and rejuvenation, which is likely referenced by one of this card's effects, that allows you to regain 2050 LP if it is [[tribute]]d.
  * This is the only "[[Gizmek]]" monster whose "title" part of its [[TCG]] name is not alliterative.
