title: Card Trivia:Elemental HERO Heat
wikitext: |-
  {{Navigation}}

  * This card has a female counterpart: "[[Elemental HERO Lady Heat]]".
  * This card is one of the few non-[[Warrior]]-[[Type]] "Elemental HERO" monsters, being a [[Pyro]]-Type monster.
  * This monster and "[[Phoenix Gearfried]]" both share physical similarities, including the same [[FIRE]] [[Attribute]], design, and color scheme.
  * This card's ''OCG''/''TCG''  artwork is taken from {{chapter|GX|006|ref}}, specifically from the panel showing [[Elemental Hero Heat (manga)|this monster]] being Summoned.
  * This card's FIRE Attribute and Pyro Type is likely based on the Marvel comics superhero, [[wikipedia:Human Torch|the Human Torch]], keeping in relation with the Western comics design of the “Elemental HERO” archetype.
