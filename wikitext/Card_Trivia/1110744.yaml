title: Card Trivia:Unbreakable Xyz Barrier
wikitext: |-
  {{Navigation}}

  * "[[Number 99: Utopia Dragonar]]" appears in this card's artwork.
  ** This card's artwork depicts "Dragonar" using its wings to block an attack, similar to how "[[Number 39: Utopia]]" uses its [[attack]]-[[negate|negating]] [[effect]] as depicted in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime (which serves as the basis for "[[Light Wing Shield]]"). This implies that it may be a representation of the effect of "Dragonar" to reduce the attacking monsters' [[ATK]] to 0.
  * This card's name is based on the fourth Japanese opening theme of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, ''[[Unbreakable Heart]]''.
