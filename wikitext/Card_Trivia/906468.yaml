title: Card Trivia:Super Armored Robot Armed Black Iron "C"
wikitext: |-
  {{Navigation}}

  * "[[Gokibore]]" appears in the chest of this monster.
  * This card's first [[effect]] to [[Special Summon]] itself and [[equip]] itself with [[Insect]] monsters with the same name from the player's [[Graveyard]], as well as the second effect to [[destroy]] monsters with [[ATK]] equal to or greater than the ATK of a [[sent]] monster equipped by this card's effect, are references to the ''[[wikipedia:Super Sentai|Super Sentai]]'' series, which prominently features combining mecha and fights against giant monsters.
  ** The second effect of this card may also be a reference to the [[flavor text]] of "[[Shiny Black "C" Squadder]]", another monster based on ''Super Sentai''; the flavor text mentions flying abilities that "let them confront the giants on equal terms!", and the second effect of this card can destroy "giant" monsters with higher ATK.
