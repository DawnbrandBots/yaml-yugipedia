title: Card Trivia:Skull Archfiend of Lightning
wikitext: |-
  {{Navigation}}

  [[File:Demon_Lightning_Attack.png|thumb|right|250|"[[Summoned Skull (manga)|Summoned Skull]]" using its "[[Attack and effect names in Yu-Gi-Oh!|Demon Lightning]]" attack.]]

  * This is one of the [[cover card]]s of ''[[Battle Pack: Epic Dawn]]'' and ''[[Threat of the Dark Demon World]]''.
  * This monster is a [[retrained]] version of "[[Summoned Skull]]".
  ** This is the first variant of "Summoned Skull" to contain the word "Skull" in its Japanese name.
  ** Either this monster or "Summoned Skull" appears in the artwork of "[[Level Tax]]", "[[Ring of Fiendish Power]]" and/or "[[Spell Summon Stopper]]".
  * This is the only "[[Archfiend]]" monster that has a [[maintenance cost]] and a [[die roll]]-based [[negate|negation]] effect but is not designed after on a chess piece.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|096|ref}}, specifically from the panel showing "[[Summoned Skull (manga)|Summoned Skull]]" using its "[[Attack and effect names in Yu-Gi-Oh!|Demon Lightning]]" attack.

