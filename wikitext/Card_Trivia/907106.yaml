title: Card Trivia:Heroic Challenger - Morning Star
wikitext: |-
  {{Navigation}}

  * This monster's name and weapon are based on a [[wikipedia:Morning star (weapon)|morning star]], a medieval weapon consisting of a spiked ball mounted on a shaft, resembling a mace.
  * This monster's ''[[OCG]]''/''[[TCG]]'' 500 [[Life Point]] [[activation condition]] references the initial gameplay of the "[[Heroic]]" [[archetype]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime where certain cards required activation condition of 500 or less Life Points.
