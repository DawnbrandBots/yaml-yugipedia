title: Card Trivia:Ultimate Flag Mech Ace Breaker
wikitext: |-
  {{Navigation}}

  * "[[Ultimate Flag (card)|Ultimate Flag]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Ace Sword Slash]]".
  * This is one of [[Yuga Ohdo]]'s [[signature card]]s in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
  ** This monster has the same [[ATK]] (2500) as the signature cards of the other anime protagonists: [[Yugi Muto]]'s "[[Dark Magician (anime)|Dark Magician]]", [[Jaden Yuki]]'s "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]", [[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]", [[Yuma Tsukumo]]'s "[[Number 39: Utopia (anime)|Number 39: Utopia]]", [[Yuya Sakaki]]'s "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]", [[Yusaku Fujiki]]'s "[[Firewall Dragon (anime)|Firewall Dragon]]" and [[Yudias Velgear]]'s "[[Galactica Oblivion (anime)|Galactica Oblivion]]".
