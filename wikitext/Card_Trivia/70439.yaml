title: Card Trivia:Mirage Tube
wikitext: |-
  {{Navigation}}

  * "[[Berfomet]]" and "[[Elemental HERO Avian]]" appear in this card's artwork.
  * The cylinder in this card's artwork is likely based on a [[wikipedia:Kaleidoscope|kaleidoscope]], an optical instrument shaped like a tube with an eyehole containing mirrors and loose colorful bits of plastic and/or glass that creates constantly changing, symmetrical patterns when rotated and viewed. This is more apparent in this card's anime artwork, which depicts this tube with a smaller eyehole.
  * This card is a reference to "[[Magic Cylinder]]":
  ** This card's Japanese name is "Mirage Cylinder".
  ** Both cards' artworks depict a tube-like object designed to redirect the opponent's monster's attack back at them.
  ** In the anime, both cards could only be [[activate]]d when an opponent's monster's attack, [[negate]]s that attack, and inflicts damage to the opponent equal to the [[ATK]] of their attacking monster.
  * This is the only [[Quick-Play Spell]] that cannot be [[activate]]d from the [[hand]].
  ** Due to this card's activation condition (an opponent's monster attacking), this limitation was initially redundant, since Quick-Play Spells can normally only be activated during the opponent's turn if they were already [[Set]] on the field. However, when "[[Condemned Maiden]]" debuted in ''[[Primal Origin]]'' (more than six years after this card's initial release), this limitation finally became relevant.
  *** It is likely that the text was initially only intended as a reminder to players, since it was the first Quick-Play Spell in the ''[[OCG]]''/''[[TCG]]'' that could only be activated in response to a specific action done during the opponent's turn.
