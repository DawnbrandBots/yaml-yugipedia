title: 'Card Trivia:New Order 13: Etheric Amon'
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's silhouette appears in the artwork of "[[Rank Wall]]".
  * This monster is based on [[wikipedia:Amun|Amun]], the Egyptian deity of the sky and one of the eight primordial Egyptian deities.
  * This is the only "[[New Order]]" monster to have an odd number for its name and [[Rank]].
  * This is the first [[Rank 13]] [[Xyz Monster]].
  ** This monster, "[[Number iC1000: Numeronius Numeronia]]", and "[[Raidraptor - Rising Rebellion Falcon]]" are also the only Rank 13 monsters.
  * In the anime, this monster holds the record for most [[Xyz Material]]s attached to a single Xyz Monster, which is 33.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster's Xyz Materials revolve around the column that makes up its lower body, unlike many other Xyz Monsters, whose Materials revolve around their whole body in an orbital-like fashion. When this monster's effect attaches new Xyz Materials to it, its column expands and its upper body is elevated.
  * In the English dubbed version of {{episode|ZEXAL|121|ref}}, the music track used in the sequences where a "[[Number]]" is Summoned was used for this monster's Summoning.
