title: Card Trivia:Barox
wikitext: |-
  {{Navigation}}

  * This is one of several monsters whose [[ATK]] or [[DEF]] is [[not divisible by 50]], the others being "[[Number S39: Utopia Prime]]", "[[Sword Arm of Dragon]]", and [[PaniK's monsters]]: "[[Castle of Dark Illusions]]", "[[Dark Chimera]]", "[[King of Yamimakai]]", and "[[Reaper of the Cards]]".
  * This monster, "[[Bickuribox]]", "[[Flame Swordsman]]", "[[Giltia the D. Knight]]", "[[Labyrinth Tank]]", and "[[Zombie Warrior]]" are the only [[Normal Monster]]s in the anime that were released as [[Fusion Monster]]s in the ''[[OCG]]''/''[[TCG]]''.
  ** Notably, these are all monster Summoned in the [[Duelist Kingdom (arc)|Duelist Kingdom arc]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** Despite being a monster used by [[Player Killer of Darkness (manga)|Player Killer of Darkness]] ([[PaniK]] in the anime), this monster's ''OCG''/''TCG'' [[Fusion Material]]s have no relation to PaniK's Deck and were never used by him.
  ** Similar Fusion Monsters that list unrelated Fusion Materials also apply to the majority of the early Non-Effect Fusion Monsters in the ''OCG''.
  * This is currently the oldest Fusion Monster with only a single print in the ''OCG''.
