title: Card Trivia:Harpie Regina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Splendid Slash]]".
  * This monster's name is derived from "''regina''", the Italian word for "queen".
  * This monster has an [[counterpart|upgraded]] [[Fusion Monster|Fusion]] counterpart: "[[Harpie Regina Splendid Armor]]".
