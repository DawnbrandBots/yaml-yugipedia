title: Card Trivia:Solemn Authority
wikitext: |-
  {{Navigation}}

  * The man in this card's artwork also appears in the artworks of "[[Forbidden Scripture]]", "[[Solemn Scolding]]", "[[Solemn Judgment]]", "[[Solemn Strike]]", and "[[Darklord Rebellion]]".
