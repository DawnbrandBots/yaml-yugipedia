title: Card Trivia:Dragon Shield
wikitext: |-
  {{Navigation}}

  * This card has the following in common with "[[Intrigue Shield]]":
  ** Both cards equip to a monster and have different degrees of preventing that monster from being destroyed in battle, as well as quashing [[battle damage]] players would have taken.
  ** Both cards (in the anime) were used by [[Number Guardian]]s (this card by [[Jinlon]] and "Intrigue Shield" by [[Mach]]).
