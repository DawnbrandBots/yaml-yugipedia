title: Card Trivia:Ruffian Railcar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Revolving Switchyard]]".
  * This monster's Japanese name, "Batrain" is based on the locomotive mecha from the 1983 anime ''[[wikipedia:Galactic Whirlwind Sasuraiger|Galactic Whirlwind Sasuraiger]]'', with the mecha rebranded from "Sasuraiger" to "Batrain C-3" for the anime's toy merchandise.
  ** This monster's Japanese title, "Ruffian Limited Express" (無頼特急, ''Buraitokkyū'') is a pun on one of the anime's predecessors: ''[[wikipedia:Galaxy Cyclone Braiger|Galaxy Cyclone Braiger]]'' (ブライガー, ''Buraigā'').
  *** Also, this monster's Japanese name, "Limited Express", is based on the type of express train which stops at a limited number of stops compared to other express services in similar routes.
