title: Card Trivia:Doll Monster Rob Robot, Customized
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's Japanese name, "Robo-chin", features the honorific "-chin", which is used to describe pets or objects, in the same cases the "it" is used in English.
  * This monster is the [[Card evolutions|customized]] form of "[[Doll Monster Rob Robot]]".
  ** Visually, this monster is "[[Doll Monster Rob Robot]]" with the wings of "[[Doll Monster Mr. Dragon]]" attached to its head.
