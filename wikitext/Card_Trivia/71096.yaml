title: Card Trivia:Getsu Fuhma
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fuhma Wave]]".
  * This monstee is based on Getsu Fūma, the main protagonist from the Japan-exclusive Famicom game, ''[[wikipedia:Getsu Fūma Den|Getsu Fūma Den]]''.
  ** This monster's effect to [[destroy]] a [[Fiend]] or [[Zombie]] monster references Getsu Fūma's rivalry with Ryūkotsuki, the final boss of ''Getsu Fūma Den'' whose final form is a gigantic skeletal dragon-like demon. 
  *** Furthermore, Ryūkotsuki also has a [[Ryu Kokki|card form]] with a similar effect that destroys [[Spellcaster]] and [[Warrior]] monsters, further referencing the rivalry between both characters.
  * This monster is similar to "[[Vampire Hunter]]":
  ** Both share the same [[Attribute]] ([[DARK]]), [[Level]] (4), and [[Type]] (Warrior).
  ** Both share an effect that destroys monsters that are depicted as "evil": This monster destroys Fiend and Zombie monsters, while "Vampire Hunter" destroys DARK monsters.
  ** Both are based on the protagonists of video games published by [[Konami]]: This monster is based on Getsu Fūma, the main protagonist from ''Getsu Fūma Den'', while "Vampire Hunter" is based on the Belmont clan from the ''[[wikipedia:Csstlevania|Castlevania]]'' video game series.
