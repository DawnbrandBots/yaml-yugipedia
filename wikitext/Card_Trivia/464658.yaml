title: Card Trivia:True King Lithosagym, the Disaster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[True King's Return]]" and "[[Zoodiac Combo]]".
  * This monster's Japanese name, "Lithosazim", is a combination of "Lithos" (the Latin word for "stone") and "[[wikipedia:Azim|Azim]]" (one of the Arabic names for [[wikipedia:Allah|Allah]]).
  ** This monster's Simplified Chinese name, "真龙皇 威岩真主 灾厄", features the characters "真主" (''Zhēnzhǔ''), which is the Chinese name for Allah.
  * Since the non-[[WIND]] "[[True Draco#True King|True King]]" monsters are the antagonistic rivals of an [[archetype]]/[[series]] related to the "[[Dracoslayer]]" storyline with the same [[Attribute]], this monster is a rival to the "[[Zoodiac]]" archetype (which primarily consists of [[EARTH]] monsters) as depicted in the artwork of "Zoodiac Combo".
