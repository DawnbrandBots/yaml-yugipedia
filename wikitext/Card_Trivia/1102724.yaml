title: 'Card Trivia:Number 69: Heraldry Crest - Shatter Stream'
wikitext: |-
  {{Navigation}}

  [[File:Number69HeraldryCrest-JP-Anime-ZX-NC-3.png|thumb|right|250|The second form of "[[Number 69: Heraldry Crest (anime)|Number 69: Heraldry Crest]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.]]
  * The number "69" appears on the lower half of this monster's center body.
  * This monster is based on the first form of "[[Number 69: Heraldry Crest]]" after using its card [[destroy|destruction]] effect the first time in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster is also the [[counterpart|evolved]] form of "Number 69: Heraldry Crest".
  ** This monster's name is based on the card destruction [[Attack and effect names in Yu-Gi-Oh! ZEXAL|effect name]] of "Heraldry Crest" in the anime, "Shatter Stream" ("God Shatter" in the Japanese version).
  * This monster has an evolved form: "[[Number 69: Heraldry Crest - Dark Matter Demolition]]".
  ** This monster's [[Quick Effect]] to [[Xyz Summon]] the aforementioned monster when the opponent's monster attacks or activates its effect, and then [[destroy]] that monster, is based on the anime effect of "Heraldry Crest", which can destroy the opponent's attacking monster, allowing it to transform into its "true form".

