title: Card Trivia:Sorcerer of Dark Magic
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster is an upgraded form of "[[Dark Magician]]".
  ** This monster has 700 [[ATK]]/[[DEF]] more than "Dark Magician".
  ** This monster's [[original ATK and DEF]] are the opposite of "[[Dark Sage]]", another form of a "Dark Magician".
  * This monster is the opposite of "[[Dark Paladin]]", another upgraded form of "Dark Magician".
  ** This monster is a [[Main Deck]] [[Effect Monster]], while "Dark Paladin" is an [[Extra Deck]] [[Fusion Monster]].
  ** This monster can negate the effect of [[Trap Card]]s, while "Dark Paladin" can negate the effect of [[Spell Card]]s.
  ** In the anime, this monster has an additional effect of reducing the opponent's monster ATK it battles by 500 for each [[Spellcaster]] [[sent]] from the [[field]] to [[Graveyard]], the opposite of "Dark Paladin" gaining 500 ATK for each [[Dragon]] in both field and Graveyards.
  * This is [[Yugi Muto]]'s special card in ''[[Yu-Gi-Oh! The Movie: Pyramid of Light]]'', as "[[Blue-Eyes Shining Dragon]]" was for [[Seto Kaiba]].
  ** Both monsters have an additional effect in the movie, which they lack in the ''[[OCG]]''/''[[TCG]]''.
