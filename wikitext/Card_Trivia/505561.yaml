title: Card Trivia:Great Shogun Shien
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Barrier Ninjitsu Art of Hazy Transfer]]", "[[Blind Spot Strike]]", "[[Evenly Matched]]", "[[Face-Off]]", "[[Gozen Match]]", and "[[Stand-Off]]".
  ** The artwork of "[[Secret Skills of the Six Samurai]]" depicts "[[Secret Six Samurai - Rihan]]" impersonating this monster.
  * This monster's title is derived from a "[[wikipedia:Shogun|shogun]]", the title for a military commander-in-chief of Japan from the 12th century to the 19th century. The shogun is ranked higher than the samurai, which reflects this monster's association with the "[[Six Samurai]]" [[archetype]].
