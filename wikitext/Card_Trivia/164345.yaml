title: Card Trivia:Nightmare Horse
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Reaper on the Nightmare]]", due to being one of its [[Fusion Material]]s.
  * This monster is a reference to the horse found in the 1781 [[wikipedia:oil painting|oil painting]] ''[[wikipedia:The Nightmare|The Nightmare]]'' by [[wikipedia:English people|Anglo]]-[[wikipedia:Switzerland|Swiss]] artist [[wikipedia:Henry Fuseli|Henry Fuseli]]. This painting shows a woman in [[wikipedia:slow-wave sleep|deep sleep]] with her arms thrown below her, and with a demonic and apelike [[wikipedia:incubus|incubus]] crouched on her chest.
  ** The horse along with the incubus in the painting refer to the [[wikipedia:urban legend|contemporary belief]] and [[wikipedia:folklore|folklore]] about [[wikipedia:nightmare|nightmares]].
  ** The "Nightmare" in this monster's name might be a pun on [[wikipedia:mare|mare]] which is an adult female [[wikipedia:horse|horse]] or other [[wikipedia:equidae|equine]].
  * Strangely, this card's text in its original ''TCG'' print in ''[[Pharaonic Guardian]]'' is ''"This monster can attack your opponent's Life Points directly even if there is a monster on your opponent's side of the field."'' "[[Servant of Catabolism]]", which debuted in the same ''TCG'' pack, says ''"This monster may attack your opponent's Life Points directly."'' in its original text. Despite being worded differently, both effects are identical.
