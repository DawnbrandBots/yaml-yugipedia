title: Card Trivia:Rebirth Judgment
wikitext: |-
  {{Navigation}}

  * The boy in this card's artwork resembles Sasori from ''[[wikipedia:Naruto Shippuden|Naruto Shippuden]]'', which is fitting, as he made himself into a puppet.
  * Like "[[Illusory Snatcher]]", this card might be a reference to the Konami game ''[[wikipedia:Snatcher (video game)|Snatcher]]'', a game where humanoid robots kill humans and then pretend to be their victim.
