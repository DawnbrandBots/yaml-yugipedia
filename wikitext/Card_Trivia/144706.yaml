title: Card Trivia:Delta Flyer
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Delta|delta]], the fourth letter of the [[wikipedia:Greek alphabet|Greek alphabet]], in which this monster's legs resembled the uppercase letter (Δ).
  ** The uppercase letter delta is used to denote the change of a quantity in equations used in mathematics and the sciences, which reflects this monster's effect to increase the [[Level]] of another monster the player controls by one.
