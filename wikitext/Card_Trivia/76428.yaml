title: Card Trivia:Vampire Lord
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Kaiba]]''.
  * This monster appears in the artwork of "[[Mark of the Rose]]".
  * This monster has an upgraded form: "[[Vampire Genesis]]".
  * Before the release of "[[Chaos Emperor Dragon - Envoy of the End]]", this was the most expensive non-promo card.{{Citation needed}}
  * In the French release of ''[[Structure Deck: Zombie Madness]]'', this monster is named "S'''a'''igneur Vampire" instead of "S'''e'''igneur Vampire". This spelling is a pun on ''saigner'', the French word for "bleeding".
  * This monster creates an endless loop with "[[Vampire Hunter]]". At the start of the [[Damage Step]], the effect of "Vampire Hunter" will [[destroy]] this monster via its effect, and subsequently, this monster's effect will [[Special Summon]] itself from the [[Graveyard]]. This is a reference to the ''[[wikipedia:Castlevania|Castlevania]]'' video game series produced by [[wikipedia:Konami|Konami]], and the eternal conflict between the Belmont Clan and the main antagonist, Dracula, whom "Vampire Hunter" and this monster are both based on.
