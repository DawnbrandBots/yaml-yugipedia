title: Card Trivia:Secret Skills of the Six Samurai
wikitext: |-
  {{Navigation}}

  * "[[Secret Six Samurai - Rihan]]" appears in this card's artwork, impersonating "[[Great Shogun Shien]]".
  * This card's effect to [[send]] a monster the player [[control]]s to the [[Graveyard]] and [[Special Summon]]ing a [[banish]]ed "[[Six Samurai]]" monster is similar to the effect of "[[Cunning of the Six Samurai]]" to send a "Six Samurai" monster the player controls to the Graveyard and Special Summoning a "Six Samurai" monster in the Graveyard.
