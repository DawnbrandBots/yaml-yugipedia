title: Card Trivia:Set Sail for The Kingdom
wikitext: |-
  {{Navigation}}

  * This card is one of five invitational cards to the [[Duelist Kingdom]] tournament in the [[Yu-Gi-Oh! (manga)|Yu-Gi-Oh! manga]] and [[Yu-Gi-Oh! (anime)|anime]]. Any contestant who wished to board the ship sailing to Duelist Kingdom must present this card at the [[Domino Pier]] before the written departure time.
