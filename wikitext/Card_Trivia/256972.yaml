title: Card Trivia:Ghostrick Stein
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Break]]", "[[Ghostrick Festival]]" (albeit just his arm), "[[Ghostrick Mansion]]", "[[Ghostrick Night]]", "[[Ghostrick Parade]]", "[[Ghostrick Renovation]]", "[[Ghostrick Shot]]", and the ''[[Advanced Tournament Pack 2013 Vol.4]]'' print of "[[Duel Checker]]".
  * This monster is based on [[wikipedia:Frankenstein's monster|Frankenstein's monster]], a character in [[wikipedia:Mary Shelley|Mary Shelley's]] 1818 novel, ''[[wikipedia:Frankenstein|Frankenstein]]'' who is often depicted in media as a towering monster composed of multiple dead body parts, brought to life by a mad scientist.
