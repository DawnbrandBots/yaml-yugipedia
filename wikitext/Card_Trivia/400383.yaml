title: Card Trivia:Amorphage Gluttony
wikitext: |-
  {{Navigation}}

  * This card name, Gastrimargia means gluttony in Greek.
  ** Each of the seven sins is related to one of the seven princes of Hell, with [[wikipedia:Beelzebub|Beelzebub, the Lord of the Flies]] being related to gluttony.
  ** "Gastr" takes its name from ''Drosophila melano'''gaster''''', the binomial name of the common fruit fly.
