title: Card Trivia:Trishula, Dragon of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Hidden Arsenal 4: Trishula's Triumph]]'' and ''[[Duel Terminal - Pulse of the Trishula!!]]''.
  * This monster appears in the artworks of "[[Ice Dragon's Prison]]", "[[Nekroz Kaleidoscope]]", "[[Terror of Trishula]]", "[[Underwater Snow Prison]]", and "[[Void Trap Hole]]".
  ** This monster's three heads are depicted in the artwork of "[[Mirror of the Ice Barrier]]".
  * This monster is named after [[wikipedia:Trishula|Trishula]], the trident wielded by [[wikipedia:Shiva|Shiva]], the god of destruction in [[wikipedia:Hindu mythology|Hindu mythology]]. In Hindi, it is written as "त्रिशूल" and is pronounced without the "''a''".
  ** A trident is a pole-arm weapon with three prongs at the end. This reflects this monster's three-headed appearance and its effect to [[banish]] the opponent's cards from their [[hand]], [[field]], and [[Graveyard]].
  * This monster features several counterparts:
  ** An "[[lswarm]]" counterpart: "[[Evilswarm Ouroboros]]"
  ** A "[[Nekroz]]" counterpart: "[[Nekroz of Trishula]]"
  ** Two retrained counterparts: "[[Trishula, the Dragon of Icy Imprisonment]]" and "[[Trishula, Zero Dragon of the Ice Barrier]]"
  * This is the first monster to have a ''[[Duel Terminal]]'' installment named after it.
  ** This is also the first monster to have a ''[[Hidden Arsenal (series)|Hidden Arsenal]]'' set named after it.
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'', the word "Barrier" in this card's name is mistakenly written lowercase, as "Trishula, Dragon of the Ice barrier". The same occurrence can be seen on the ''[[TCG]]'' version of this card in ''[[Duel Terminal 4]]''.
  * [[Kalin Kessler (Duel Links)|Kalin Kessler]] has datamined audio from ''[[Yu-Gi-Oh! Duel Links]]'' pertaining to this card, even though he never used it in the [[Yu-Gi-Oh! 5D's|anime]] or [[Yu-Gi-Oh! 5D's (manga)|manga]]. This is a possible reference to "[[Infernity]]" [[Deck]]s being able to [[Summon]] this card multiple times in the same turn with the correct setup in the ''OCG''/''TCG''<ref>[https://ygorganization.com/infernity-loop-satisfaction-version/ Strategy: New Age Infernity Loops]</ref><ref>[https://ygorganization.com/infernity-loop-satisfaction-version/ Infernity loop: Satisfaction version]</ref><ref>https://www.youtube.com/watch?v=vWQN1CFaiK4</ref>.

