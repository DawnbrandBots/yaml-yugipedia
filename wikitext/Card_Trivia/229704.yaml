title: Card Trivia:Gagaga Clerk
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gagagadraw]]" and "[[Gagagamirror]]".
  * Similar to how "[[Gagaga Girl]]" is the apprentice of "[[Gagaga Magician]]", this monster could be the apprentice of "[[Gagaga Caesar]]", due to the same white clothing and wings on their heads. This is also supported by the fact that every time this card was used an [[Xyz Material]] in the anime, it was always used with "Gagaga Caesar"
