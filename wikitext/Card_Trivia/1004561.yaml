title: Card Trivia:Darkness Galactica Oblivion
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Darkness (Rush Duel series)|Darkness]] form of "[[Galactica Oblivion]]".
  * This is the first released ''[[Rush Duel]]''-original card to have an effect that [[negate]]s effects.
  ** The first ever ''Rush Duel''-original card with an effect that prevents the activation of effects, "[[Shadow Flower Art of the Sickle Lily]]", is currently an [[anime-exclusive]] card.
