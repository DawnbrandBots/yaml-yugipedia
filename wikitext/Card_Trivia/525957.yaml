title: Card Trivia:Odd-Eyes Revolution Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.13]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Odd-Eyes Pendulum Dragon]]", combined with "[[Clear Wing Synchro Dragon]]", "[[Dark Rebellion Xyz Dragon]]", and "[[Starving Venom Fusion Dragon]]".
  ** The three rings on this monster's back and the three colored orbs on its horns represent the other three [[Four Dimensional Dragons|Dimensional Dragons]], as they have the same color seen on the orbs of the other three Dimension Dragons.
  *** Red: "Starving Venom Fusion Dragon"; also seen on "Odd-Eyes Pendulum Dragon".
  *** Purple: "Dark Rebellion Xyz Dragon".
  *** Green: "Clear Wing Synchro Dragon" is the only Dimensional Dragon to lack the coloured orbs, having green wings instead; also seen on "Odd-Eyes Pendulum Dragon".  
  * This monster is the manga [[counterpart]] of "[[Supreme King Z-ARC]]".
  ** Both are [[Level 12]] [[Dragon]] [[Pendulum Monster]]s with opposite [[Attribute]]s: this monster's Attribute is [[LIGHT]], while the Attribute of "Z-ARC" is [[DARK]].
  ** Both are the ultimate combined evolutions of the [[Four Dimensional Dragons]].
  ** Both were used to defeat [[Declan Akaba]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime and his [[Reiji Akaba (DY)|manga counterpart]] in the ''[[Yu-Gi-Oh! ARC-V The Strongest Duelist Yuya!!]]'' manga.
  ** This monster has ? [[ATK]]/[[DEF]], while "Z-ARC" has a fixed 4000 ATK/DEF.
  ** This monster shuffles all cards on the [[field]] back into the [[Deck]] with hefty cost, while "Z-ARC" [[destroy]]s all cards with no cost.
  ** This monster cannot prevent its own destruction, while "Z-ARC" has a highly protective effect.
  ** This monster has a high [[Pendulum Scale]], while "Z-ARC" has a low Pendulum Scale.
  ** This monster is a [[Main Deck]] monster, while "Z-ARC" is an [[Extra Deck]] monster.
  ** This monster focuses on supporting Extra Deck monsters and [[add]]ing cards to the [[hand]], while "Z-ARC" focuses on countering them.
  ** This monster was used by [[Yuya Sakaki (DY)|Yuya Sakaki]], the protagonist of the manga, while "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]" was used by [[Z-ARC]], the final antagonist of the anime.
  * This is the first Pendulum Monster with ? DEF.
  * This card's artwork is taken from {{chapter|ARC-V The Strongest Duelist Yuya!!|015|ref}}, specifically from the panel showing [[Odd-Eyes Revolution Dragon (DY)|this monster]] being Summoned.
