title: Card Trivia:Firewall eXceed Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Dark Neostorm]]''.
  * This monster appears in the artwork of "[[Cynet Circuit]]".
  * This monster is an [[Xyz Monster|Xyz]] [[counterpart]] of "[[Firewall Dragon]]".
  ** The "X" in this card's Japanese name further references its Xyz Monster [[card type]].
  ** Both share a [[Special Summon]] effect and have the same [[Rank]]/[[Link Rating]].
  * This monster is the rival counterpart of "[[Borreload eXcharge Dragon]]".
  ** Both are Xyz counterparts of [[Yusaku Fujiki]] and [[Ryoken Kogami|Varis]]' [[signature card]]s.
  ** Both monsters' wings (and in this monster's case, horns) are very similar and are shaped like an "X", referencing their card type.
  ** Both have a common naming scheme where the "X" in their Japanese names stands for another word.
  ** Both have a [[Continuous Effect]] that applies only while they are [[Xyz Summon]]ed.
  ** Both have an effect to revive their [[Link Monster|Link]] counterparts while preventing the player from Special Summoning or [[Direct attack|attacking directly]] for the rest of the turn.
  * This is the first and last Xyz Monster to be Xyz Summoned in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  * This was the last card Yusaku got from a [[Data Storm]] on-screen in the anime.
