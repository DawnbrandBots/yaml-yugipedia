title: Card Trivia:Nitro Synchron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Battle Tuned]]", "[[De-Synchro]]", "[[Speed Spell - Overtune]]" and "[[Tuner's High]]".
  * This card's name and appearance are based on a [[wikipedia:Nitromethane|nitro]] tank.
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, whenever [[Yusei Fudo]] activates the multi-attack effect of "[[Shooting Star Dragon]]", this card was always one of the [[Tuner monster]]s revealed by the effect.
