title: Card Trivia:Ancient Pixie Dragon
wikitext: |-
  {{Navigation}}

  * This monster's silhouette appears in the artwork of "[[Duel Dragon Token]]".
  * This monster is the [[Duel Dragon]] [[counterpart]] of "[[Ancient Fairy Dragon]]".
  ** Interestingly, this monster's [[Attribute]] is [[DARK]] while "Ancient Fairy Dragon" is a [[LIGHT]] monster.
  *** This Attribute change is somewhat reflected in its ''[[TCG]]'' name change; while [[wikipedia:Fairy|fairies]] are radiant, gentle creatures that live in [[wikipedia:Enchanted forest|magical forests]], [[wikipedia:Pixie|pixies]] are mischievous or malicious troublemakers that dwell underground.
  *** This difference is reflected between the ''[[Yu-Gi-Oh! 5D's]]'' anime and [[Yu-Gi-Oh! 5D's (manga)|manga]]. In the anime, [[Luna]] and her brother [[Leo]] are wealthy children living in the [[Tops]], while in the manga, [[Luna (manga)|Luna]] and [[Leo (manga)|Leo]] are orphans who have to participate in underground [[Duel]]s in order to survive. Luna's personality also reflects the change as she is caring in the anime, but apathetic in the manga.
  ** This monster's effect also reflects the Attribute change; while its "Signer Dragon" counterpart [[Special Summon]]s a monster, this card [[destroy]]s a monster.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|022|ref}}, specifically from the panel showing [[Ancient Pixie Dragon (manga)|this monster]] alongside "[[Power Tool Mecha Dragon (manga)|Power Tool Mecha Dragon]]".
  * This is the [[signature card]] of Luna in the ''Yu-Gi-Oh! 5D's'' manga.
