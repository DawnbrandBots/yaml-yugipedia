title: Card Trivia:Speedroid Gum Prize
wikitext: |-
  {{Navigation}}

  * This monster is based on a packet of [[wikipedia:Chewing gum|chewing gum]], which was prominently seen when it was Summoned before taking on its robotic appearance in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's Japanese name, "OMK Gum" ({{Ruby|Ｏ|オー}}{{Ruby|Ｍ|エム}}{{Ruby|Ｋ|ケー}}ガム ''Ōemukē Gamu''), is a portmanteau of the Japanese words "''omake''" (オマケ), "[[wikipedia:Mk 48 machine gun|MK gun]]" ({{Ruby|Ｍ|エム}}{{Ruby|Ｋ|ケー}}ガン ''Emu Kei Gan''), and "gum" (ガム ''Gamu'').
  *** "''Omake''" is based on the Japanese word for "bonus", which is reflected in this monster's effect to give the [[Synchro Monster]] it used as [[Synchro Material]] a "bonus" amount of [[ATK]].
  *** "MK gun" is based on this monster's appearance in the anime where it "shoots" a box containing "[[Speedroid Ohajikid (anime)|Speedroid Ohajikid]]" from the rear port of its "backpack" after its third effect is successfully resolved.
  * This monster's third ''[[OCG]]''/''[[TCG]]'' effect to make the [[Synchro Monster]] that uses it as [[Synchro Material]] gain 1000 [[ATK]] is an alteration of its effect in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, which allows it to increase the Synchro Monster's ATK equal to the ATK of the "[[Speedroid]]" monster [[send|sent]] to the [[Graveyard]]. In {{episode|ARC-V|116|ref}}, [[Yugo]] used this effect to send the 1000 ATK "Ohajikid" to the [[Graveyard]] and increase the ATK of "[[Crystal Wing Synchro Dragon (anime)|Crystal Wing Synchro Dragon]]" by the same amount.
