title: Card Trivia:Outer Entity Azathot
wikitext: |-
  {{Navigation}}

  * This card's name and art is a reference to [[wikipedia:Azathoth|Azathoth]], a fictional deity from the works of American horror writer [[wikipedia:H.P.Lovecraft|H.P.Lovecraft]]. Azathoth is defined as the "Blind Idiot God" which controls the universe from the depths of Chaos.
  ** As a side note, the genealogy of the Outer Gods created by Lovecraft defines Azathoth as the sole parent of [[wikipedia:Nyarlathotep|Nyarlathotep]]– fittingly "[[Outer Entity Nyarla]]" is the only other "[[Outer Entity]]" Xyz Monster released before "Azathoth."
