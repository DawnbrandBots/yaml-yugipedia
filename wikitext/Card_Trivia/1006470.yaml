title: Card Trivia:B.B.B. - Beast Brave Brandish
wikitext: |-
  {{Navigation}}

  * "[[Supreme Beasteam Magnum Overlord]]" appears in this card's artwork in [[Maximum Mode]] (together with "[[Supreme Beasteam Magnum Overlord (L)|Supreme Beasteam Magnum Overlord [L]]]" and "[[Supreme Beasteam Magnum Overlord (R)|Supreme Beasteam Magnum Overlord [R]]]").
  ** This Spell's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! SEVENS|effect name]] of "Magnum Overlord [L]" in the ''[[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!]]'' manga, "Beast Brave Boost" ({{Ruby|ＢＢＢ|ビースト・ブレイブ・ブースト}} ''Bīsuto Bureibu Būsuto''), where that monster lacked the [[piercing]] [[effect]] that its real-life version was granted (which this Spell also grants).
