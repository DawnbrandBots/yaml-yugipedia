title: Card Trivia:Cell Explosion Virus
wikitext: |-
  {{Navigation}}

  * "[[Goblin Attack Force]]" and several copies of "[[Corruption Cell "A"]] appear in this card's artwork.
  ** This card's artwork seemingly depicts the aftermath of "[[Mass Hypnosis]]".
  * This card is a reference to "[[Mirror Force]]", as can be seen by its effect and the similar 'force' that appears in its artwork.
  * The Spanish name of this card mistranslated "''cell''" as "''celda''" instead of "''célula''".
