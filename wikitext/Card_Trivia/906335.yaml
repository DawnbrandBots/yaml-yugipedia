title: Card Trivia:Hyper Rank-Up-Magic Utopiforce
wikitext: |-
  {{Navigation}}

  * The [[neutral form]] of "[[Number 99: Utopia Dragonar]]" appears in this card's artwork.
  * This card's Japanese name, "Hyper-Rank-Up-Magic - Utopia Force", is a reference to the English name of the "[[Utopia (archetype)|Utopia]]" archetype, known in Japanese as "King of Wishes, Hope".
  * This is the first "Hyper-Rank-Up-Magic" card to be released in the ''[[OCG]]''/''[[TCG]]''.
  ** This card's [[counterpart]], "[[Hyper-Rank-Up-Magic Ultimate Force]]", was the first "Hyper-Rank-Up-Magic" card to appear in the anime, but was released in the ''OCG''/''TCG'' nearly 4 years and 9 months later after this card's release.
