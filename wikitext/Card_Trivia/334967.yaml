title: Card Trivia:Cyber Dragon Infinity
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * This monster appears in the artwork of "[[Infinite Impermanence]]".
  * This card is an [[Card evolutions|upgraded]] form of "[[Cyber Dragon Nova]]".
  * This monster's tail in this card's artwork is depicted in a pose that forms an [[wikipedia:Infinity symbol|infinity symbol]].
  * This card is the first [[Xyz Monster]] to require [[Xyz Material]]s of both a specific [[Type]] and [[Attribute]].
  * This monster's wings feature a head on their tips.
  ** This likely mirrors the three heads of "[[Cyber End Dragon]]".
