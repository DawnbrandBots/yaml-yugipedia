title: Card Trivia:Super Vehicroid - Mobile Base
wikitext: |-
  {{Navigation}}

  * The turntables from the artwork of "[[Vehicroid Connection Zone]]" appear in the background of this card's artwork.
  * This monster is an "alternate form" of "[[Megaroid City]]".
  ** Both cards reference the concept of giant robots that can transform into cities or bases and vice versa, including the ''Transformers'' character [http://tfwiki.net/wiki/Metroplex_(G1) Metroplex].
  ** The word "Mobile" in this monster's name is a pun on its effects, as it allows the player to "mobilize" a "[[roid]]" monster from the [[Deck]] or [[Extra Deck]] whose [[ATK]] is less than or equal to an opponent's monster's ATK, and it becomes "mobile" by [[return]]ing a "roid" monster to the [[hand]] and move to that monster's [[Monster Zone]] during the end of each turn.
  * This monster has the highest [[original DEF]] (5000, tied with [[5000 DEF Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  ** This is the only monster with 5000 DEF to not also have 5000 [[ATK]].
