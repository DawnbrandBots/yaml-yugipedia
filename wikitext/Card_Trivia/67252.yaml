title: Card Trivia:Blowback Dragon
wikitext: |-
  {{Navigation}}

  * This monster's appearance and effect is based on the [[wikipedia:M1911 pistol|M1911 pistol]], a semi-automatic pistol.
  ** Ironically, the M1911 pistol is not a blowback-operated firearm, and instead uses a short recoil system.
  * This monster's [[Attribute]], [[Level]], [[Type]], [[ATK]] and [[DEF]] is the same as that of "[[Ally of Justice Clausolas]]", with the only difference being that "Clausolas" is a [[Normal Monster]] instead of an [[Effect Monster]].
  * North American [[Duel Terminal]]s use this card's uncensored artwork while playing as [[Bandit Keith (Duel Terminal)|Duel Terminal]].
  * The probability of landing at least two heads with three coin flips (as described on the card) is the same as the probability of landing heads on a single coin flip (50%).
