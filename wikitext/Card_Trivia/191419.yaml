title: Card Trivia:Tri-Wight
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Old Mind]]".
  * Three "[[Skull Servant]]s" appear in this card's artwork.
  ** The events in this card's artwork seem to continue in the artwork of "[[Brutal Retribution]]".
  * This card's name is a portmanteau of "twilight", "tri", and "[[Wight]]" (ワイト ''Waito''), the Japanese name of "Skull Servant".
  ** This card's Japanese name, "Tri-Wight Zone" (トライワイトゾーン ''Toraiwaitozōn''), is also a pun on "twilight zone" (トワイライトゾーン ''Towairaitozōn'').
