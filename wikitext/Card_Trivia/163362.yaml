title: Card Trivia:Ally of Justice Omni-Weapon
wikitext: |-
  {{Navigation}}

  * On the side of this monster's body, the letters "[[AOJ]]" can be seen.
  * This monster has eight arms equipped with weapons, although only four of them can be determined from the artwork:
  ** Hammer.
  ** Drill.
  ** Giant scissor/cutter.
  ** Giant punch.
