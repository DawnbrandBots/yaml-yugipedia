title: Card Trivia:Garvas the Winged Magical Beast
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed ''[[Rush Duel]]'' counterpart of "[[Garvas]]".
  ** This monster's association with the [[War-Lion]] [[series]] is based on how, in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, "Garvas" was one of the monsters required to [[Ritual Summon]] "[[Super War-Lion]]".
