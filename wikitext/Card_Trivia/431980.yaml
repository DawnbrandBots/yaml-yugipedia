title: Card Trivia:Dinoster Power, the Mighty Dracoslayer
wikitext: |-
  {{Navigation}}

  * This monster is "[[Luster Pendulum, the Dracoslayer]]" wearing the armor of "[[Dinomist Plesios]]" and "[[Dinomist Stegosaur]]", after the events depicted in the artwork of "[[Dinomic Powerload]]".
  * This card is the first monster with 2950 [[DEF]].
