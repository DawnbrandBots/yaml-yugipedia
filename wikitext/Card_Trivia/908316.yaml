  [[File:WhiteVeil-JP-Anime-GX-NC.png|thumb|right|250|"[[Armed Dragon LV10 (anime)|Armed Dragon LV10]]" equipped with "[[White Veil (anime)|White Veil]]."]]

  * This monster is a [[retrained]] counterpart of "[[Armed Dragon LV10]]".
  ** This monster's appearance is based on a scene from {{episode|GX|070|ref}} where [[Chazz Princeton]] (while brainwashed as a member of the [[Society of Light]]) [[equip]]s "[[White Veil (anime)|White Veil]]" to his "[[Armed Dragon LV10 (anime)|Armed Dragon LV10]]", causing its body to turn bright white.

