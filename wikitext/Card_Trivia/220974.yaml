title: Card Trivia:Gagaga Cowboy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Overlay Barrage]]" and "[[Re-Xyz]]".
  * This is the first "[[Gagaga]]" [[Xyz Monster]].
  ** The barrels on this monster's guns are in the shape of the "Gagaga" crest.
  * This monster has the highest [[original DEF]] (2400) of all "Gagaga" monsters.
  * This monster and "[[Light Dragon @Ignister (anime)|Light Dragon @Ignister]]" are the only Xyz Monsters in the anime that list a specific requirement for only one of their materials.
