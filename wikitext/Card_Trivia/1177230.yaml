title: Card Trivia:Dark Magical Curtain
wikitext: |-
  {{Navigation}}

  * "[[Dark Magic Curtain]]" and "[[Dark Magician Girl]]" appear in this card's artwork.
  * This card is a [[retrained]] counterpart of "[[Dark Magic Curtain]]".
  ** Its effect to allow each player to [[Special Summon]] a [[DARK]] [[Spellcaster]] monster from their [[Deck]] and specifically mentioning "[[Dark Magician]]" and "[[Dark Magician Girl]]" is a reference to the effect of "Dark Magic Curtain" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], which allowed each player to Special Summon a [[Black Magic]] monster from their Deck, the [[Type]] of which "Dark Magician" and "Dark Magician Girl" belonged to.
  *** Additionally, the words "Black Magical" in this card's Japanese name ({{Ruby|黒|くろ}}{{Ruby|魔|ま}}{{Ruby|導|どう}}, ''Kuromadō'') is a reference to the Japanese name for the Black Magic Type ({{Ruby|黒|くろ}}{{Ruby|魔|ま}}, ''Kuroma'').
