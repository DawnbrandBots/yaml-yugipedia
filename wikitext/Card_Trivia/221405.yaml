title: Card Trivia:Xyz Xtreme !!
wikitext: |-
  {{Navigation}}

  * "[[Gaia Dragon, the Thunder Charger]]" and "[[Gem-Knight Pearl]]" appear in this card's artwork.
  ** Ironically, if the players revealed those monsters, neither will take damage from this card's effect as their ATK are equal.
  * This is the only card with the English name contains a space between the last letter and the exclamation marks.
