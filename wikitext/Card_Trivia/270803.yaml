title: Card Trivia:Mimimic
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Three Card Summon]]".
  * "Mi" in this card's name could be the shortened version of "''mittsu''" (三), the Japanese word for the number "three".
  ** This is reflected in this card's [[Level]] (3), [[ATK]]/[[DEF]] (each 300), and effect supporting [[Level 3]] monsters.
  ** Also, "mimi" in this card's name could also be translated to "''mimi''" (耳), the Japanese word for "ear", which is reflected in this monster's oversized ears.
  * This monster appears to be based on the [[wikipedia:Chattering teeth (toy)|chattering teeth]], a wind-up toy that resembles a pair of mechanized teeth, often equipped with walking feet.
