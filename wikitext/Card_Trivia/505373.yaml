title: Card Trivia:Majestic Mech - Ohka
wikitext: |-
  {{Navigation}}

  * This card is named after "ohka (桜花)", a Japanese word meaning "cherry blossom". "[[wikipedia:Ohka|Ohka]]" was also the name of a Japanese attack plane in World War II, which coincidentally reflects this card's [[Special Summon]] effect.
  * This card has a [[Zombie]] counterpart "[[Malevolent Mech - Goku En]]".
