title: Card Trivia:Kaiser Sea Snake
wikitext: |-
  {{Navigation}}

  * This monster's first ''[[OCG]]''/''[[TCG]]'' [[Special Summon]]ing effect is based on the effect of "[[Shed the Situation]]", which was used to Special Summon this monster from [[Ryoga Kamishiro (manga)|Ryoga Kamishiro's]] [[hand]]. Its [[condition]] is based on how Ryoga [[control]]led no monsters and [[Kyoji Yagumo]] controlled "[[No. 35: Ravenous Tarantula (manga)|No. 35: Ravenous Tarantula]]" and "[[No. 84: Pain Gainer (manga)|No. 84: Pain Gainer]]" in {{chapter|ZEXAL|044|ref}}.
  ** This monster's ''OCG''/''TCG'' effects to Special Summon a [[Level 8]] [[Sea Serpent]] monster, make its [[Level 4]] and reduce its [[original ATK]] is an alteration of the effect of "Shed the Situation", which halved this monster's [[Level]] and [[ATK]] and treated it as two monsters for the [[Xyz Summon]] of an [[Xyz Monster]], but its [[ATK]] become halved.
  * This card's artwork is taken from the aforementioned chapter of the ''Yu-Gi-Oh! ZEXAL'' manga, specifically from the panel showing [[Kaiser Sea Snake (manga)|this monster]] being Summoned, albeit with its mouth open. 
  ** Also, the background of this card's artwork is taken from the same chapter, specifically from the panel showing this monster alongside its molten form before they are used to Xyz Summon.
