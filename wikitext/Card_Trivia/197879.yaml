title: Card Trivia:ZW - Phoenix Bow
wikitext: |-
  {{Navigation}}

  * This is the first card to change a monster's [[ATK]] or [[DEF]] by specifically 1100.
  ** It is also the first card to even mention the number 1100 in its lore.
  * This card being a phoenix is in direct relation to the [[Yu-Gi-Oh! ZEXAL - Episode 049|episode]] it debuted in; [[Astral]] is revived from seemingly dying, just as a phoenix rises from its ashes after death.
