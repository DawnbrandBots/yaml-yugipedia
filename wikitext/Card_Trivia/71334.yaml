title: Card Trivia:Nobleman of Crossout
wikitext: |-
  {{Navigation}}

  * This card has a [[counterpart]]: "[[Nobleman of Extermination]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Nobleman of Crossout]]".
  * The knight in this card's artwork appears in the artwork of "[[Crossout Designator]]".
  * When looking closely at the background of this card's artwork, one can see an area which looks similar to [[wikipedia:Europe|Europe]].
  * This card's position on the [[Forbidden]]/[[Limited]] List has [[Historic Forbidden/Limited Chart|changed]] eight times, which is second most after "[[Chaos Sorcerer]]" with nine.
