title: Card Trivia:Rolling x Rolling
wikitext: |-
  {{Navigation}}

  * "[[Draco the Tiny]]" and the ring from the artwork of "[[Straynge Cat]]" appear in this card's artwork.
  ** This card's effect [[support]]ing both [[Dragon]] and [[Spellcaster]] [[Type]] monsters is a reference to the friendship between [[Lucidien Kallister]] and [[Yuga Ohdo]] (whose respective Decks primarily consist of monsters of those Types) in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
