title: Card Trivia:Lady of D.
wikitext: |-
  {{Navigation}}

  * Dragons similar to "[[Divine Dragon Ragnarok]]" and "[[Divine Dragon Apocralyph]]" appear in the background of this card's artwork.
  * The "D." in this card's name stands for "Dragon".
  * This card is the female [[counterpart]] of "[[Lord of D.]]".
  ** Both have the same [[Attribute]] ([[DARK]]), [[Type]] ([[Spellcaster]]), [[Level]] (4), and [[DEF]] (1100).
  ** This card prevents [[Dragon]] monsters from being [[destroy]]ed by battle, while "Lord of D." prevents Dragon monsters from being [[target]]ed by effects.
  * This monster has a [[Card evolutions|merged]] form with "Divine Dragon Apocralyph": "[[Queen Dragun Djinn]].
