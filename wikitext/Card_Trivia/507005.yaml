title: Card Trivia:Winged Kuriboh
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * This monster appears in the artworks of "[[Alchemical Experiment]]", "[[Berserker Crush]]", "[[Divine Abyss of the Sacred Beast]]", "[[Gift Card]]", "[[Lucky Chance]]", "[[The Flute of Summoning Kuriboh]]", "[[Trade-In]]", and "[[Wake Up Your Elemental HERO]]".
  * This monster is a [[LIGHT]] [[Fairy]] [[counterpart]] of "[[Kuriboh]]".
  ** This is the first "[[Kuriboh (archetype)|Kuriboh]]" monster whose [[Attribute]]/[[Type]] is not [[DARK]]/[[Fiend]].
  * This monster has a [[Dark counterpart]]: "[[Darkuriboh]]".
  * This monster has three [[Counterpart|upgraded]] "[[LV]]" forms:
  ** "[[Winged Kuriboh LV6]]" (also treated as an "[[Elemental HERO]]" and "[[Favorite]]" monster)
  ** "[[Winged Kuriboh LV9]]"
  ** "[[Winged Kuriboh LV10]]"
  * This is the [[Duel Monster Spirit]] of [[Jaden Yuki]] in the ''Yu-Gi-Oh! GX'' anime and manga.
  ** In {{episode|Yu-Gi-Oh! GX|001|ref}}, Jaden Yuki was given this card by a figure who strongly resembled [[Yugi Muto]], who called it a "lucky card". Later, in {{episode|Yu-Gi-Oh! GX|016|ref}}, Jaden confirmed that this card was a "rare card" given to him by the [[King of Games|Duel King]] Yugi Muto.
  ** This card's alternate artwork depicts this monster tilting to its side and winking, referencing the moments in {{episode|Yu-Gi-Oh! GX|001|ref}} where the spirit of [[Winged Kuriboh (character)|Winged Kuriboh]] did the same at Jaden (in its card form), both shortly after Jaden drew it (during his Duel) and at the very end of the episode.
  * In the ''[[Yu-Gi-Oh! OCG Stories]]'' manga, [[Raye (manga)|Raye]] owns dolls of both this monster and "Kuriboh".
