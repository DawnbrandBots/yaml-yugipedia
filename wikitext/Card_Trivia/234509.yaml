title: Card Trivia:Iron Hans
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Iron John|Iron John]], an enchanted iron-skinned wild man from the titular fairy tale (also known as "Iron Hans") who is locked away in an iron cage and imprisoned in a castle courtyard. A young prince frees him, and Iron John takes the prince away from his kingdom to escape the death penalty for releasing him.
  ** This card's effect [[Special Summon]]ing "[[Iron Knight]]" from the [[Deck]] references a segment in ''Iron John'', in which the titular character is called on to help the exiled prince defend the kingdom he served in by granting him a horse, a set of armor, and a legion of iron-clad soldiers to defend the kingdom he served in.
