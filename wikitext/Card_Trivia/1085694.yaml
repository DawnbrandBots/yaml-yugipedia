title: Card Trivia:Poseidra, the Storming Atlantean
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Poseidra, the Atlantean Dragon]]".
  ** This monster is also the "[[Atlantean]]" counterpart of "[[Sacred Fire King Garunix]]"
  ** According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], this monster is "Poseidra" after having separated "[[Mermail Abyssgaios]]" from itself, thus regaining its conscience.
  ** This monster is depicted riding a battering ram, similar to one that "Poseidra, the Atlantean Dragon" is riding in the artwork of "[[Call of the Atlanteans]]".
  * This monster has an upgraded [[Xyz Monster|Xyz]] form: "[[Poseidra Abyss, the Atlantean Dragon Lord]]".
