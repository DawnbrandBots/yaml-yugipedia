title: Card Trivia:Hard-sellin' Zombie
wikitext: |-
  {{Navigation}}

  * This card is the [[Zombie counterpart]] of "[[Hard-sellin' Goblin]]".
  ** Both cards are the conceptual opposites of "[[Robbin' Goblin]]" and "[[Robbin' Zombie]]"; instead of "robbing" the opponent's [[hand]] or [[Deck]], their effect "sell" their own cards back to their owners by returning them to the hand or Deck.
  ** The goblin zombie from the artwork of "Robbin' Zombie" appears in this card's artwork.
  * A zombified "[[Thunder Kid]]" appears in this card's artwork as one of the creatures being sold.
