title: Card Trivia:Reptilianne Lamia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Reptilianne Ramifications]]".
  * This card is based on the [[wikipedia:Lamia|Lamia]], a woman from [[wikipedia:Greek mythology|Greek mythology]] who was transformed into a half-human half-snake monster.
  * This monster is a younger version of "[[Reptilianne Hydra]]", as shown by their similar attires and helmets. The color of their scales are also the same and the transformation of "Hydra" into this monster is depicted in the artwork of "Reptilianne Ramifications".
  ** The ''[[TCG]]'' versions of those cards have switched names, where "Lamia" is named "Hydra", and "Hydra" is "Lamia" in the Japanese ''[[OCG]]''. The name switches in the TCG is likely to accurately describe their appearance.
