title: Card Trivia:U.A. Player Manager
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[U.A. Man of the Match]]".
  * "[[U.A. Perfect Ace]]" appears in this card's artwork.
  * This card is based on the [[wikipedia:Player-coach|Player-coach]] of a sports team, who can both play in the team and coach its players.
  ** Although the artwork depicts it being a player-coach for a baseball team; other sports such as American football, association football, and basketball also apply.
