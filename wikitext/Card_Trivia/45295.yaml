title: Card Trivia:Gaia Knight, the Force of Earth
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Pack Volume 1]]''.
  * This monster appears in the artworks of "[[D.D.D. - Different Dimension Derby]]", "[[Synchro Ring]]", and "[[Tri-and-Guess]]".
  * This monster is a [[Synchro Monster|Synchro]] counterpart of "[[Gaia The Fierce Knight]]".
  ** This monster has three other [[Extra Deck]] counterparts:
  *** [[Fusion Monster|Fusion]]: "[[Gaia Drake, the Universal Force]]"
  *** [[Link Monster|Link]]: "[[Gaia Saber, the Lightning Shadow]]"
  *** [[Xyz Monster|Xyz]]: "[[Gaia Dragon, the Thunder Charger]]"
  * This is one of three Synchro Monsters to not feature an effect, the others being "[[Naturia Leodrake]]" and "[[Scrap Archfiend]]".
  * This monster's appearance is mechanical, as its torso is attached to the back of the horse, similarly to "[[Dingirsu, the Orcust of the Evening Star]]".
  * This monster has the lowest [[original DEF]] (800) of all non-Link [[Gaia Knight]] monsters.
