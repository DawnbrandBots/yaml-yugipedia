title: Card Trivia:CAN - Melo:D
wikitext: |-
  {{Navigation}}

  * A purple version of "[[Ice Pop Bear]]" appears in this card's artwork.
  * This monster is an adult version of "[[CAN:D]]".
  ** This monster's name is a portmanteau of "CAN:D" (which is itself a spelling of "candy" using the smiling [[wikipedia:emoticon|emoticon]] ":D") and "melody".
