title: Card Trivia:Ghostrick Shot
wikitext: |-
  {{Navigation}}

  * "[[Ghostrick Alucard]]", "[[Ghostrick Jiangshi]]", "[[Ghostrick Lantern]]", "[[Ghostrick Mummy]]", "[[Ghostrick Nekomusume]]", "[[Ghostrick Specter]]", "[[Ghostrick Stein]]", "[[Ghostrick Witch]]", "[[Ghostrick Yeti]]", and "[[Ghostrick Yuki-onna]]" appear in this card's artwork.
  * This card's name is a portmanteau of "[[Ghostrick]]" and "trick shot" (specifically from the sport of [[wikipedia:Golf|golf]]).
  ** Fittingly, in this card's artwork, "Ghostrick Witch" is depicted using her broom like a [[wikipedia:Golf club|golf club]] to launch a roll of [[wikipedia:Toilet paper|toilet paper]] backwards over her own head.
