title: Card Trivia:Redox, Dragon Ruler of Boulders
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragoroar]]".
  * This monster is one of the [[Cover card]]s of ''[[2013 Collectible Tins Wave 2]]''.
  * This monster is the older version of "[[Reactan, Dragon Ruler of Pebbles]]". This is supported by the fact this monster has two cut-off horns while "Reactan" still retains its own.
  * ''[[wikipedia:Redox|Redox]]'' is an abbreviation of the term ''Reduction Oxidation'', which is a general term for any chemical reaction that results in an atoms oxidation state changing.
  * This monster has a "[[True Draco]]" counterpart: "[[True King Lithosagym, the Disaster]]"
  ** Both are [[EARTH]] monsters with similar Summoning conditions, effects that activate when they are affected by card effects in a certain way (being banished by effect for "Redox", being destroyed by effect for "Lithosazim") to replace themselves with another monster, and have effects relating to EARTH monsters.
