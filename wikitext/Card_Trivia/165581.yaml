title: Card Trivia:Steam Synchron
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Steam locomotive|steam locomotive]], a type [[wikipedia:locomotive|locomotive]] that can move by the expansion of steam.
  * This monster's design features the model number "C888" on the smokebox door.
  * This is the first and currently only [[WATER]] "[[Synchron]]" monster.
  * This is the first [[Main Deck]] [[Tuner monster]] to feature an effect that allows it to perform a [[Synchro Summon]] during the opponent's [[Main Phase]].
