title: Card Trivia:Amorphage Envy
wikitext: |-
  {{Navigation}}

  * The ''OCG'' name of this card is named for ''cavum'' (Latin for "hollow, cavity, depression"). In Japanese pop culture, the word has been misinterpreted as the psychological "depression", referring to ''lypē'' (lit. "sadness") of the [[wikipedia:Seven deadly sins|eight evil thoughts]].
  ** The ''TCG'' name of this card is named after "envy" of the [[wikipedia:Seven deadly sins|seven deadly sins]].
  * This is the first (and currently only) card that directly prevents other cards from being activated in a specific [[Chain Link]].
