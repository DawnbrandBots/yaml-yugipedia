title: Card Trivia:Mirror Labyrinth
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Flash Assailant]]" and reflections of "[[Big Eye]]" appear in this card's artwork.
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this card was used by [[Misty Tredwell]] during her final [[Duel]] with [[Akiza Izinski]], which fittingly took place in a hall of mirrors within the [[Satellite]]'s [[abandoned amusement park]].
