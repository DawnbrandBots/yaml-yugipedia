  {{Navigation}}

  * This monster appears in the artwork of "[[Necroquip Prism]]".
  ** This monster's appearance in "Necroquip Prism", which was first released in ''[[Eternity Code]]'', predates this card's release in ''[[The Infinite Forbidden]]'' by 4 years, 2 months, and 18 days.

