title: Card Trivia:Dharma-Eye Magician
wikitext: |-
  {{Navigation}}

  * This monster's weapon is a giant [[wikipedia:Prayer wheel|prayer wheel]] with [[wikipedia:Mantra|mantras]] inscribed upon it. In the [[wikipedia:Tibetan Buddhism|Tibetan Buddhist]] tradition, prayer wheels are used for spreading spiritual blessings and well-being, and spinning such a wheel will have much the same meritorious effect as orally reciting the prayers written upon it.
  ** This monster's paired counterpart, "[[Wisdom-Eye Magician]]", also has a prayer wheel chained to the end of his flail.
