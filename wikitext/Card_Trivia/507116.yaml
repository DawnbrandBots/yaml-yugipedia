title: "Card Trivia:Hero's Rule 1: Five Freedoms"
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * The [[Version 2 Duel Disk|Battle City]] and [[Academia Disk]]s appear in this card's artwork.
  * This card has a [[Counter Trap Card]] counterpart: "[[Hero's Rule 2]]".
  ** Both cards were used by [[Jaden Yuki]] during his separate Duels against the [[Sacred Beast]]s in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Ironically, this card was released in the ''[[OCG]]''/''[[TCG]]'' 18 years ''after'' "Hero's Rule 2".
