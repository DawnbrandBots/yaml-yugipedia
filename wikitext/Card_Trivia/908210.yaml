title: Card Trivia:Runick Golden Droplet
wikitext: |-
  {{Navigation}}

  * The proto-Germanic rune [[wikipedia:Gyfu|Gyfu]] (ᚷ) appears in the spell circle above the golden ring in this card's artwork.
  * This card is based on [[wikipedia:Draupnir|Draupnir]], a golden ring possessed by the god [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]]. The ring is said to have the ability to multiply itself: every nine nights, eight new rings 'drip' from Draupnir, each one of the same size and weight as the original.
