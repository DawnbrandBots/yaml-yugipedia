title: Card Trivia:Tactical Espionage Expert
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Solid Snake|Solid Snake]], the main protagonist of [[Konami]]'s ''[[wikipedia:Metal Gear|Metal Gear]]'' franchise. Specifically, it references the ''[[wikipedia:Metal Gear Solid|Metal Gear Solid]]'' franchise whose tagline is "Tactical Espionage Action." Its design and the location depicted in its card artwork resembles The Tanker from ''[[wikipedia:Metal Gear Solid 2|Metal Gear Solid 2]]'', which is supported by [https://www.pojo.biz/board/showpost.php?p=17792954&postcount=224 a Pojo post] made by [[Kevin Tewart]].
  * This monster has three [[counterpart]]s with different [[Attribute]]s:
  ** [[WATER]]: "[[Creeping Doom Manta]]".
  ** [[WIND]]: "[[Eagle Eye]]".
  ** [[FIRE]]: "[[Invasion of Flames]]".
