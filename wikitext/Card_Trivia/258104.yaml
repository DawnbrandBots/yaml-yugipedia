title: 'Card Trivia:Number 72: Shogi Rook'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster is based on the ''hisha'' piece in the game of [[wikipedia:Shogi|shogi]], which is also known in English as the "rook".
  ** This monster's Japanese name, "Chariot's Rook", is a pun on ''hisha'' (飛車), which translates to "flying chariot", similar to the first portion of its name.
  ** This monster's manga effect reflects the movement of the ''hisha'' piece, which allows it to move forward any number of spaces in a non-diagonal direction, similar to how this monster can move forward and [[destroy]] all cards in the same [[column]] as the opponent's. In the ''[[OCG]]''/''[[TCG]]'', this monster's effect is changed so it can only destroy one monster and one [[Set]] [[Spell]]/[[Trap Card]] the opponent [[control]]s, which would make up the two cards that make up their column on their field.
  *** In {{chapter|ZEXAL|026|ref}}, when this monster is affected by the effect of "[[Line Promotion]]", it is "promoted" to the ''ryūō'' piece, which is also known in English as the "dragon king". The ''ryūō'' piece uses the movement of the ''hisha'' to move forward in any non-diagonal direction with the addition of moving one square in any direction, similar to how this monster gains the effect to destroy two of the opponent's monsters adjacent to its column.
  * This is the first [[Extra Deck]] monster to have an effect related to columns (in the manga only).
  * This is the first [[Beast-Warrior]] "[[Number]]".
  * This card's artwork is taken from {{chapter|ZEXAL|025|ref}}, specifically from the panel showing [[No. 72: Line Monster Chariot Hisha (manga)|thus monster]] being Summoned.
