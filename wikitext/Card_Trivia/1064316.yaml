title: Card Trivia:Red-Eyes Black Fullmetal Dragon
wikitext: |-
  {{Navigation}}

  [[File:Red-Eyes Black Fullmetal Dragon.png|thumb|200px|"[[Red-Eyes Black Metal Dragon (manga)|Red-Eyes Black Metal Dragon]]" [[equip]]ped with "[[Dragon Nails (manga)|Dragon Nails]]".]]

  * This monster appears in the artwork of "[[Time Engine]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Red-Eyes Black Metal Dragon]]", [[equip]]ped with "[[Dragon Nails]]".
  ** This monster's appearance and [[original ATK]] (3400) are based on a scene from {{chapter|Yu-Gi-Oh!|123|ref}} (and its [[Yu-Gi-Oh! (anime)|anime]] [[Yu-Gi-Oh! - Episode 032|adaptation]]), where [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] equips "[[Red-Eyes Black Metal Dragon (manga)|Red-Eyes Black Metal Dragon]]" with "[[Dragon Nails (manga)|Dragon Nails]]", increasing its 2800 [[original ATK]] by 600 and preventing it from being [[destroy]]ed by the effect of [[Keith Howard (manga)|Bandit Keith Howard's]] "[[Blast Sphere (manga)|Blast Sphere]]".
  * This monster's effect to [[negate]] an opponent's card or effect activation, and inflict damage to them equal to the original [[ATK]] of one of their [[Attack Position]] monsters reference a scene from the aforementioned chapter where "Red-Eyes Black Metal Dragon" was equipped with Bandit Keith's "Blast Sphere", which would have destroyed the former and inflict damage to Jonouchi equal to its ATK. 
  ** This effect being a [[Quick Effect]] is based on how the destruction and damaging effects of "Blast Sphere" would activate during the end of Bandit Keith's turn. At that moment, Jonouchi quickly equips "Dragon Nails" to "Red-Eyes Black Metal Dragon", causing its ATK to exceed that of "Blast Sphere's" 2900 ATK, which in turn causes the effect of "Blast Sphere" against Jonouchi to be negated.

