title: Card Trivia:Spikeshield with Chain
wikitext: |-
  {{Navigation}}

  * This card has the "with Chain" name like "[[Kunai with Chain]]" and "[[Blast with Chain]]".
  ** All 3 cards are also [[Trap Card]]s that can equip themselves to a monster and give it a 500 [[ATK]] boost, as well as additional effects.
