title: Card Trivia:Mecha Phantom Beast Stealthray
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Do a Barrel Roll]]",  "[[Phantom Fortress Enterblathnir]]", "[[Scramble!! Scramble!!]]", and "[[Xyz Override]]".
  * This monster's name and appearance are a combination of the [[wikipedia:Northrop Grumman B-2 Spirit|stealth bomber]] and the [[wikipedia:Stingray|stingray]].
