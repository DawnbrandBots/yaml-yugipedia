title: Card Trivia:DoomZ V Five - Amalthe
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Artmage Vandalism -Assault-]]" and "[[Artmage Varnish -Alteration-]]" (mechanical claw-arm only) and "[[DoomZ Raiders]]" (sans faceplate).
  ** This monster's appearance in "Artmage Vandalism -Assault-" and "Artmage Varnish -Alteration-" predates this card's release by nearly 3 months.
  * This monster is named after [[wikipedia:Amalthea (moon)|Amalthea]], one of the moons orbiting the planet [[wikipedia:Jupiter|Jupiter]], which is also named "Jupiter V" after being the fifth moon to be discovered orbiting the planet.

