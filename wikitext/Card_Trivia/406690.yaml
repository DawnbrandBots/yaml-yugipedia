title: Card Trivia:Chronograph Sorcerer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Pendulum Evolution]]''.
  * This monster appears in the artwork of "[[Time Pendulumgraph]]".
  * This monster is named after a [[wikipedia:Chronograph|chronograph]], a specific type of [[wikipedia:watch|watch]] that is used as a [[wikipedia:stopwatch|stopwatch]] combined with a display watch.
  * This monster is the combined form of "[[Stargazer Magician]]" and "[[Timegazer Magician]]".
  ** This monster's name and appearance are a reference to "Timegazer Magician".
  *** Furthermore, this monster's name is also a reference to the original planned name of "Timegazer Magician": "Chronograph Magician" ({{Ruby|時読みの魔術師|クロノグラフ・マジシャン}}, ''Kuronogurafu Majishan''). Later on, "Timegazer Magician" was ultimately named as such by taking off the furigana and reading its kanji as they spell ({{Ruby|時|とき}}{{Ruby|読|よ}}みの{{Ruby|魔|ま}}{{Ruby|術|じゅつ}}{{Ruby|師|し}}, ''Tokiyomi no Majutsushi'').
  *** This monster's robe and the background of this card's artwork feature Roman numeral patterns, which are often present on old analog clocks, further referencing time and "Timegazer Magician".
  ** This monster has two counterparts, which are also combined forms of the two "[[Magician]]s" as well:
  *** "[[Astrograph Sorcerer]]" (referencing "Stargazer Magician")
  *** "[[Timestar Magician]]" (referencing both "Stargazer Magician" and "Timegazer Magician")
