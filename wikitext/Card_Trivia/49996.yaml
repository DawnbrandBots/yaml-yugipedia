title: Card Trivia:Arcanite Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Assault Overload]]", "[[Banishing Climb]]", "[[Barrier Wave]]", "[[Extra Shave Reborn]]", "[[Synchro Overlimit]]", and "[[Synchro Transcend]]".
  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster has an [[Card evolutions|upgraded]] "[[/Assault Mode]]" form: "[[Arcanite Magician/Assault Mode]]".
  ** This monster is also wearing a set of its "Assault Mode" armor underneath its cloak.
  * This monster has an upgraded [[Fusion Monster|Fusion]] form: "[[Supreme Arcanite Magician]]".
  * This monster's robes feature a white color scheme, referencing its [[Synchro Monster]] [[card type]].
  ** This concept is shared with the designs of "Arcanite Magician/Assault Mode" (whose armor features an orange color scheme corresponding with its [[Effect Monster]] type), and "Supreme Arcanite Magician" (whose armor features a purple color scheme corresponding with its Fusion Monster type).
