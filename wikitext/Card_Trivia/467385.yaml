title: Card Trivia:SPYRAL Quik-Fix
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[SPYRAL MISSION - Rescue]]" and "[[SPYRAL Resort]]".
  * This monster bears resemblance to [[wikipedia:Otacon|Hal "Otacon" Emmerich]] from the ''[[wikipedia:Metal Gear|Metal Gear]]'' video game franchise.
  ** This monster's name, as well as its ability to supply you with "[[SPYRAL GEAR]]" cards, is likely a reference to [[wikipedia:Q (James Bond)|Q]], the Quartermaster from the ''[[wikipedia:James Bond|James Bond]]'' franchise.
