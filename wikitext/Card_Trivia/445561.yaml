title: Card Trivia:Miscellaneousaurus
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of "miscellaneous" (meaning "of various types or from different sources") and "saurus". This is fitting as its appearance is a combination of various dinosaurs or prehistoric reptiles:
  ** This monster's bone structure is a combination of ''[[wikipedia:Tyrannosaurus Rex|Tyrannosaurus Rex]]'' (jawline, neck, arms, ribcage, and hind legs), ''[[wikipedia:Triceratops|Triceratops]]'' (upper skull), ''[[wikipedia:Ankylosaurus|Ankylosaurus]]'' (tail), ''[[wikipedia:Pterodactyl|Pterodactyl]]'' (wings), and ''[[wikipedia:Stegosaurus|Stegosaurus]]'' (the plates down its spinal column).
