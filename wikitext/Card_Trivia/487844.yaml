title: Card Trivia:Crowned by the World Chalice
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[World Legacy's Heart]]", "[[World Legacy Discovery]]", "[[World Legacy Awakens]]", and "[[World Legacy Struggle]]".
  ** Her dead body can be seen in the artworks of "[[Orcustrated Return]]", "[[Orcustrated Release]]", and "[[Guardragon Reincarnation]]".
  * "Crowned by the World Chalice" → "[[Ib the World Chalice Priestess]]" → "[[Knightmare Corruptor Iblee]]" → "[[Galatea, the Orcust Automaton]]" → "[[Ib the World Chalice Justiciar]]" → "[[Lib the World Key Blademaster]]".
  ** "Ib the World Chalice Priestess" is this monster after having been empowered by a "[[World Legacy]]" artifact, while "Knightmare Corruptor Iblee" is her corrupted form after "[[Lee the World Chalice Fairy]]" becomes evil and seemingly takes over her body.
  ** In addition, "Galatea, the Orcust Automaton" appears to be a robotic puppet modeled after her, somehow acquired by her brother "[[Beckoned by the World Chalice|Ningirsu]]" at one point after her death in "[[World Legacy's Sorrow]]".
  ** Additionally, "[[Knightmare Incarnation Idlee]]" is this monster fused with "[[Orcust Knightmare]]", "[[Guardragon Pisty]]", "[[Guardragon Agarpain]]" and "[[Guardragon Elpy]]" (after the initial transformation of "Galatea, the Orcust Automaton" in the artwork of "Orcustrated Release"). She is released from "Idlee" by "[[Guardragon Justicia]]" in the artwork of "Guardragon Reincarnation".
  ** Also, "Ib the World Chalice Justiciar" appears to be this monster, reborn with the wings of "Justicia".
