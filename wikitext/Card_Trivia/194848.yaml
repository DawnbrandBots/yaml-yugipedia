title: Card Trivia:Snowdust Dragon
wikitext: |-
  {{Navigation}}

  * This card belongs to a rare type of monsters which use [[Ice Counter]]s.
  ** The other monsters are "[[Ice Master]]", "[[Cold Enchanter]]", "[[Snowman Creator]]", "[[Snow Dragon]]" and "[[Snowdust Giant]]" .
  * This card may be an evolved version of "Snow Dragon". This is further supported by the similar names, [[Attribute]] and [[Type]]. Also, this card's [[Level]], [[ATK]] and [[DEF]] are double the those of "Snow Dragon".
  * This card bears a similar name to "[[Stardust Dragon]]".
  * This card's effect gives Ice Counters the effect they had in the manga.
