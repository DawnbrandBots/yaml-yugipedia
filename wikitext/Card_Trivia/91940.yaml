title: Card Trivia:Gryphon's Feather Duster
wikitext: |-
  {{Navigation}}

  * This card's effect is the opposite of "[[Harpie's Feather Duster]]", with an additional healing effect.
  ** Both this card and "[[Gryphon Wing]]", which specifically counters "Harpie's Feather Duster", are the basis for "[[Phantom Gryphon]]" and its rivalry with "[[Harpie]]s", as indicated in that monster's [[flavor text]].
