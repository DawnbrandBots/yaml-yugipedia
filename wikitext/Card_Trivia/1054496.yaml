title: Card Trivia:Ancient Brain
wikitext: |-
  {{Navigation}}

  * The base kanji used for this monster's Japanese name, "Demonic Sky Elder" (魔天老, ''Matenrō'') is homophonic to the word "skyscraper" (摩天楼, ''matenrō''), with the characters "摩" ("to scrape") and "楼" ("tower") replaced with "魔" ("demon; magic") and "老" ("old").
