title: Card Trivia:The Sanctified Darklord
wikitext: |-
  {{Navigation}}

  * "[[Darklord Nasten]]" appears in this card's artwork.
  ** The shadowy figure pouring the water over him seems to be the god depicted in the artworks of the "[[Solemn]]" cards.
  ** A similar scene appears in the artwork of "[[Forbidden Droplet]]", where "[[Condemned Darklord]]" is pouring a chalice over a restrained "Darklord Nasten".
