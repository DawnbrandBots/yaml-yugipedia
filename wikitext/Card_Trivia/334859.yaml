title: Card Trivia:Satellarknight Alsahm
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to the [[wikipedia:Alpha Sagittae|Alpha Sagittae]], also known as ''Sham'' or ''Alsahm''.
  ** The constellation [[wikipedia:Sagitta|Sagitta]] appears in the artwork of this card, with Alsahm's location in said constellation denoted by an encircled star.
  * This card's name "Alsahm" is the pronunciation of the Arabic word "السهم" which means arrow, reflecting this monster's appearance as an archer.
