title: Card Trivia:Topologina Honeycomb Beehicle
wikitext: |-
  {{Navigation|mode=nongame}}

  * Multiple "[[Topologina Bambee]]", "[[Topologina Gatsbee]]", and "[[Topologina Maybee]]" appear in this card's artwork.
  * This card's name is a reference to a [[wikipedia:Honeycomb|honeycomb]], a mass of hexagonal [[wikipedia:Wax|wax]] cells built by [[wikipedia:Honey bee|honey bees]] in their [[wikipedia:Beehive|nests]] to contain their [[wikipedia:Larvae|larvae]] and stores of [[wikipedia:Honey|honey]] and [[wikipedia:Pollen|pollen]].
  ** This card's name also contains a portmanteau of the words "bee" and "vehicle".
