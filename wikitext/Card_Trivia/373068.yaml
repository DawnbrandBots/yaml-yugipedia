title: Card Trivia:Metalfoes Crimsonite
wikitext: |-
  {{Navigation}}

  * This card is likely named after [[wikipedia:ja:ヒヒイロカネ|Hihiirokane]], a mythical metal or alloy from Japanese mythology.
  * This is the first Fusion Monster that specifies the [[ATK]] or ATK range of its [[Fusion Material]]s.
  * This monster is the [[Counterpart|Fusion counterpart]] of "[[Metalfoes Volflame]]" after the effects of "[[Metalfoes Fusion]]."
