title: Card Trivia:Supreme Beasteam Magnum Overlord (R)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[B.B.B. - Beast Brave Brandish]]" in [[Maximum Mode]] (together with "[[Supreme Beasteam Magnum Overlord (L)|Supreme Beasteam Magnum Overlord [L]]]" and "[[Supreme Beasteam Magnum Overlord]]").
  * This monster has three [[counterpart]]s: "[[Supreme Machine Magnum Overlord (R)|Supreme Machine Magnum Overlord [R]]]", "[[Supreme Railartillery Magnum Overlord (R)|Supreme Railartillery Magnum Overlord [R]]]", and "[[Supreme Skystream Magnum Overlord (R)|Supreme Skystream Magnum Overlord [R]]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (3), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (500/0) with the above-mentioned monsters.
