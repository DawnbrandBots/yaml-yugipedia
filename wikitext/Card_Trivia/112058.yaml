title: Card Trivia:Forgotten Temple of the Deep
wikitext: |-
  {{Navigation}}

  * "[[7 Colored Fish]]" and "[[Abyssal Kingshark]]" appear in this card's artwork.
  * The temple in this card's artwork appears in the artworks of "[[Numen erat Testudo]]" and "[[Testudo erat Numen]]".
  * The temple in this card's artwork is likely an alternate, semi-surfaced view of "[[A Legendary Ocean]]" or a part of "[[Lemuria, the Forgotten City]]".
