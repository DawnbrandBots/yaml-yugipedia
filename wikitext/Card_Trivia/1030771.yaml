title: Card Trivia:Icelyn the Super Assistant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chemicalize Bloom]]".
  * This monster's Japanese name, "Hiya", is based on the Japanese onomatopoeia for chilliness.
  * This monster has an [[Counterpart|upgraded]] form: "[[Icelyn the Hyper Assistant]]".
