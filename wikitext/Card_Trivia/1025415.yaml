title: Card Trivia:Flock Together
wikitext: |-
  {{Navigation}}

  * This card's Japanese name and artwork is a pun on 目白押し (''mejiro oshi''), a Japanese phrase describing a situation where many people or things are packed together in a space; it is derived from the tendency for [[wikipedia:Warbling white-eye|warbling white-eye]] (Japanese: メジロ, ''mejiro'', also written as "目白") flocks to perch together on the same branch.
  ** This card substitutes the character 押し (''oshi'') in 目白押し with its alternate kanji form, 圧し, which has connotations of "pressured".
  ** This card's artwork depicts a flock of warbling white-eyes that appear to be wearing neckties, which may be referencing the tendency for the [[wikipedia:Tokyo subway|Tokyo subway]] to get very crowded during rush hour, with many commuters being working-class men who wear a suit and tie to work. This is supported by the Deluxe Icon Frame in ''[[Yu-Gi-Oh! Master Duel]]'' representing the card, as its description states, "The way they pack closely together reminds one of a train during rush hour."
  ** This card's effect also references the crowded nature described in this phrase, as it can only be activated if there are many monsters on the field.
  * This card's ''[[TCG]]'' name is derived from the idiom "[[wikipedia:Birds of a feather flock together|birds of a feather flock together]]".
