title: Card Trivia:Tri-and-Guess
wikitext: |-
  {{Navigation}}

  * "[[Gaia Drake, the Universal Force]]", "[[Gaia Knight, the Force of Earth]]", and "[[Gaia Dragon, the Thunder Charger]]" appear in this card's artwork.
  ** All three are [[Extra Deck]] variants of "[[Gaia The Fierce Knight]]", representing the three types of Extra Deck monsters that this card can declare ([[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], and [[Xyz Monster|Xyz]] respectively).
  ** All three are surrounded by colored auras corresponding to their card type.
  * This is the only card that can require you to reveal your Extra Deck.
  * This card's English name is a pun on "Tri" meaning "three" and "Try and guess".
