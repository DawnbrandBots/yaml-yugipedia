title: Card Trivia:Forbidden Cyber Style Technique
wikitext: |-
  {{Navigation}}

  * This card's effect to reduce the player's [[Life Points]] to 50 to perform a powerful [[Fusion Summon]] likely references the self-sacrificial nature that [[Zane Truesdale]] adopts during the third season of the  ''[[Yu-Gi-Oh! GX]]'' anime, where countless Underground Duels and being subjected to electrical shocks for each Life Point loss left his body in critical condition to the point that overexertion would lead to his death (or "being sent to the stars", in the case of the English dubbed version). As such, Zane Duels with the intent of putting everything on the line and expects his opponents to do the same, as should said Duel be his last he wants to go out in a blaze of glory.
  ** This attitude is put on full display during the his Duel against [[Jesse Anderson]] (who was possessed by [[Yubel (character)|Yubel]]) where Zane pushes his [[Deck]] to its absolute limits; however, despite his best efforts, he loses due to the damaging effect of "[[Power Bond]]".
