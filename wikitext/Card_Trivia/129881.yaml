title: Card Trivia:Gem-Knight Ruby
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the artworks of "[[Gem-Knight Master Diamond]]" and "[[Scatter Fusion]]".
  * This card is named after the mineral [[wikipedia:Ruby|ruby]].
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gem-Knight Garnet]]" and "[[Gem-Knight Sapphire]]".
  ** The water droplet symbol on its chest-plate, the blue trim on its armor, and its wristbands are based on "Sapphire".
