title: Card Trivia:Guiding Ariadne
wikitext: |-
  {{Navigation}}

  * This is the first [[Fairy]]-Type [[Pendulum Monster]].
  * This monster is based on [[wikipedia:Ariadne|Ariadne]], the daughter of [[wikipedia:Minos|Minos]], king of [[wikipedia:Crete|Crete]]. She was in charge of maintaining the labyrinth where six men and six women were brought in as sacrifices to the [[wikipedia:Minotaur|Minotaur]]. She also helped [[wikipedia:Theseus|Theseus]] defeat the Minotaur by providing him with a long thread (represented by this monster's "tail") to mark his path into the labyrinth.
