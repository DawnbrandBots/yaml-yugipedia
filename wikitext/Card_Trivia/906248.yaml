title: Card Trivia:Traptrix Pinguicula
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Forest of the Traptrix]]''/''[[Structure Deck: Beware of Traptrix]]'' and ''[[Structure Deck: Forest of the Traptrix - The Legend of Duelist Quarter Century Edition]]'', as well as the cover card of ''[[Structure Deck: Forest of the Traptrix Banquet Invitation Pack]]''.
  * This monster is named after ''[[wikipedia:Pinguicula|Pinguicula]]'' (Japanese: {{Ruby|虫|ムシ}}{{Ruby|取|トリ}}{{Ruby|菫|スミレ}} ''Mu<u>shitorisu</u>mire''), the scientific name of the Butterwort, a type of carnivorous plant in the family Lentibulariacaea that use their sticky glandular leaves to lure, trap and digest insects.
  * "[[Traptrix Genlisea]]" and "[[Traptrix Vesiculo]]" appear in this card's artwork.
