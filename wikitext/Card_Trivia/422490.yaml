title: Card Trivia:Superheavy Samurai Soulbeads
wikitext: |-
  {{Navigation}}

  * In the Korean dubbed version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster's name was "Superheavy Samurai Soul Death Reversal" (초중무사소울 죽음반환, ''Chojungmusasoul Jug-eumbanhwan'') instead of "Superheavy Samurai Soul Beads of Resurrection" (초중무사소울 부활의 염주, ''Chojungmusasoul Buhwal-ui Yeomju'').
