title: Card Trivia:Volcanic Eruption
wikitext: |-
  {{Navigation}}

  * This card depicts the storyline of the extinction event of the [[dinosaur]]s, where a seismic shift causes the volcano to erupt and destroy the dinosaurs.
  ** "[[Jurassic World]]" → "[[Seismic Shockwave]]" → "'''Volcanic Eruption'''"/"[[Molten Destruction]]" → "[[Survival Instinct]]" → "[[Survival of the Fittest]]" → "[[Extinction on Schedule]]".
  * This card and "[[Jurrac Impact]]" are both [[Trap Card]]s with a similar destruction effect that feature [[Dinosaur]] themes.
