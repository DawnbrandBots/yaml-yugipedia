title: Card Trivia:Hallohallo
wikitext: |-
  {{Navigation}}

  * This monster is themed around [[Wikipedia:Halloween|Halloween]].
  ** This monster's name is a repetition of the first portion of "Halloween".
  ** This monster's design is based on a [[wikipedia:Jack-o'-lantern|jack-o'-lantern]], a carved pumpkin lantern associated with Halloween.
  ** This monster's [[flavor text]] is an allusion to [[Wikipedia:Trick-or-treating|trick-or-treating]], which is practiced during Halloween evening.
  ** This monster was released in the ''[[TCG]]'' release of ''[[Circuit Break]]'' in October 2017.
  * This is the first [[Tuner Pendulum Monster]] not to have a negative effect or restrictions when it is used as [[Synchro Material]].
  ** However, this may be because it was released during the ''[[Yu-Gi-Oh! VRAINS]]'' era, when new restrictions were placed on [[Pendulum Summon]]ing monsters from the [[Extra Deck]].
  ** It is also the first [[Normal Monster|Normal]] Tuner Pendulum Monster and Tuner Pendulum Monster not to be part of an [[archetype]].
