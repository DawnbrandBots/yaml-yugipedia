title: Card Trivia:Shateki
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * Prize versions of "[[Cockadoodledoo]]", "[[Ghostrick Specter]]", "[[Naturia Strawberry]]", "[[Panzer Dragon]]", "[[Rock Spirit]]", "[[Snowman Creator]]", "[[SPYRAL GEAR - Drone]]", "[[Super Quantal Fairy Alphan]]", and "[[Wind-Up Rat]]", a fan with the image of "[[Moja]]", and the goblin children from the artwork of "[[Gift Exchange]]" (including the grumpy one wearing his "[[Scrap Kong]]" shirt) appear in this card's artwork.
  ** The [[Level]]s of "Cockadoodledoo", "Panzer Dragon", and "Rock Spirit" are "5", reflecting how the player must [[Die roll|roll]] a "6" on their six-sided die to [[destroy]] them.
  * This card is based on ''shateki'' (射的), a carnival game typically featured in Japanese festivals where players use air guns or similar tools to shoot targets and win prizes.
  ** This card's Japanese name replaces the second kanji for ''teki'' (的) with the kanji ''teki'' meaning "enemy" (敵), 
  *** This card's naming scheme and effects reflect the objective of ''shateki'': the player [[target]]s an opponent's monster and rolls a six-sided die (aiming their air gun at the target), and if they roll a result equal to higher than the targeted monster's Level, that monster is destroyed, and the player is "awarded" with a "prize" of a monster with the same Level as the die roll's result [[add]]ed from the [[Deck]] to the [[hand]]; otherwise, they reduce that monster's Level by 1.
