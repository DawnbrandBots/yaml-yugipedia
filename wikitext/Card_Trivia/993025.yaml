title: Card Trivia:Synchro Rumble
wikitext: |-
  {{Navigation}}

  * "[[Red Dragon Archfiend]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|5D's|154|ref}} where [[Jack Atlas]] [[Special Summon]]s "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" from his [[Graveyard]] via the effect of "[[Red Cocoon]]", which is shown by having it appear out of a pool of molten metal.
  * This card's name references the [[Synchro Summon]]ing [[Summon chants in Yu-Gi-Oh! 5D's|chant]] of "Red Dragon Archfiend" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime: ''"Witness the power of the rumbling heavens!"''
