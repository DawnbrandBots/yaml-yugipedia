title: Card Trivia:Zexal Field
wikitext: |-
  {{Navigation}}

  * [[ZEXAL III]] appears in this card's artwork.
  ** This card is based on the [[ZEXAL III#ZEXAL Field|ZEXAL Field]] ability of ZEXAL III from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * A red-and-blue background similar to the one of "[[Rank-Up-Magic Zexal Force]]" is featured in this card's artwork, referencing [[Yuma Tsukumo|Yuma]] and [[Astral]]'s [[ZEXAL (power)|ZEXAL]] power.
