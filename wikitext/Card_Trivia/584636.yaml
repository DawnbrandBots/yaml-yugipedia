title: Card Trivia:Soul Pendulum
wikitext: |-
  {{Navigation}}

  [[File:PendulumSummon.png|thumb|right|250|"[[Stargazer Magician (anime)|Stargazer Magician]]" and "[[Timegazer Magician (anime)|Timegazer Magician]]" in the [[Pendulum Zone]]s being used to perform a [[Pendulum Summon]].]]

  *  "[[Odd-Eyes Pendulum Dragon]]", "[[Stargazer Magician]]", "[[Timegazer Magician]]", [[Yuya Sakaki|Yuya Sakaki's]] [[Yuya's pendant|pendant]], and the [[Pendulum Summon]]ing portal from the ''[[Yu-Gi-Oh! ARC-V]]'' anime appear in this card's artwork.
  ** This card's artwork is based on the various sequences in the ''Yu-Gi-Oh! ARC-V'' anime where Yuya Sakaki commonly Pendulum Summons "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]" by using both "[[Stargazer Magician (anime)|Stargazer Magician]]" and "[[Timegazer Magician (anime)|Timegazer Magician]]" in the [[Pendulum Zone]]s.
  * This card's name is derived from Yuya Sakaki's [[Summon chants in Yu-Gi-Oh! ARC-V|Pendulum Summoning chant]] in the original Japanese version of the ''Yu-Gi-Oh! ARC-V'' anime: "Swing, my '''soul's pendulum!'''" (揺れろ、魂のペンデュラム！''Yurero, tamashī no pendyuramu!''), as well as the name of the [[Shake! The Pendulum of the Soul!|soundtrack]] that usually played when Yuya performed a Pendulum Summoning.

