title: Card Trivia:Terrorking Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Archfiend's Oath]]", "[[Archfiend's Roar]]", "[[Battle-Scarred]]", "[[Castle Link]]", "[[Checkmate]]", "[[Counterattack Beacon]]", "[[Dice It]]", "[[Dice-nied]]", "[[Diced Dice]]", "[[Diceversity]]", "[[Flash Effect]]", "[[Pandemonium]]", "[[Rainbow Life]]", "[[Subspace Battle]]", and "[[That Six]]".
  * This card is one of the six [[wikipedia:Chess piece|chess piece]]-themed "[[Archfiend]]" cards that debuted in ''[[Threat of the Dark Demon World]]'' in the ''[[OCG]]'' and ''[[Dark Crisis]]'' in the ''[[TCG]]'', each one featuring a [[wikipedia:Chessboard|chessboard]] background,. In this monster's case, it is based on the [[wikipedia:King (chess)|king]], a crown-shaped chess piece, as this monster features a crown on its head.
  * This card has a [[retrained]] [[Link Monster|Link]] [[counterpart]]: "[[Masterking Archfiend]]".
  * The English and Japanese names of "[[Terrorking Salmon]]" are puns on the respective names of this monster.
