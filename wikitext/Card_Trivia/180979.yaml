title: Card Trivia:Evigishki Levianima
wikitext: |-
  {{Navigation}}

  * This card's name is based on the [[wikipedia:Leviathan|Leviathan]], a mythological creature of the sea.
  * "[[Gishki Photomirror]]" appear on this monster's chest and in the background of this card's artwork.
  * "[[Gishki Avance]]" and "[[Gishki Emilia]]" were used to [[Ritual Summon]] this card.
  ** This is supported by the fact this monster has the clothing and sword of "Gishki Avance" and the hair of "[[Gishki Emilia]]".
