  {{Navigation}}

  * "[[Sky Striker Ace - Shizuku]]" appears in this card's artwork.
  ** This card's artwork was adapted into a panel in {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|6|ref}}, where [[Raye (manga)|Raye]] uses her "Shizuku" suit to shoot down and destroy the spinning blades projected by [[Roze (manga)|Roze]]'s [[Sky Striker Ace - Zeke|piloted mecha]].
