title: Card Trivia:Prior of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Frozen Domain of the Ice Barrier]]" and "[[Void Trap Hole]]".
  * "[[Mirror of the Ice Barrier]]" appears in this card's artwork, adorning the top of this monster's staff.
  * "[[Mirror Mage of the Ice Barrier]]" → "Prior of the Ice Barrier" → "Sacred Spirit of the Ice Barrier". 
  ** According to the [[Duel Terminal Master Guide card storylines|''Duel Terminal Master Guide'' card storylines]], this monster is "[[Sacred Spirit of the Ice Barrier]]" when he was alive.
  * This monster is responsible for sealing [[Brionac, Dragon of the Ice Barrier|the]] [[Gungnir, Dragon of the Ice Barrier|three]] [[Trishula, Dragon of the Ice Barrier|dragons]] of the "[[Ice Barrier]]" in his youth, as "Mirror Mage of the Ice Barrier", alongside his best friend "[[Georgius, Swordman of the Ice Barrier]]".
