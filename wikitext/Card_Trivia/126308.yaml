title: Card Trivia:Hyena
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Armored Back]]".
  * Two other "Hyenas" appear in this card's artwork.
  * This is one of a few cards in the game to refer to a card's name in plural.
  * This monster's effect to [[Special Summon]] multiple copies of itself from the [[Deck]] when [[destroy]]ed by battle is based on the tendencies of some [[wikipedia:hyena|hyenas]] to display pack behavior and hunt in small groups.
