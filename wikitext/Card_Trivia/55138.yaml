title: Card Trivia:Earthbound Immortal Cusillu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Eternal Sunshine]]".
  * This monster is based on the monkey [[wikipedia:Geoglyph|geoglyph]] of the [[wikipedia:Nazca Lines|Nazca Lines]].
  ** This monster's name is derived from ''k'usillu'', the [[wikipedia:Quechuan languages|Quechua]] word meaning "monkey".
  * This is the [[signature card]] of [[Devack]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
