  * The following monsters appear in this card's artwork:
  ** The blonde girl (presumably as her online avatar) from the artwork of "[[Evil‚òÖTwin's Trouble Sunny]]", which this card's name confirmed to be called Sunny.
  ** "[[Evil‚òÖTwin Lil-la]]" and "[[Evil‚òÖTwin Ki-sikil]]", specifically from the artwork of "[[Boo-Boo Game]]", though their eyes are censored out.
  ** "[[Live‚òÜTwin Ki-sikil]]" and "[[Live‚òÜTwin Lil-la]]", both in their normal appearance as well as cosplaying as "[[Sky Striker Ace - Raye]]" and "[[Sky Striker Ace - Roze]]".
  ** "[[M-Warrior 1|M-Warrior #1]]" and "[[M-Warrior 2|M-Warrior #2]]".
  *** This is particularly peculiar, as the latters feel out-of-place compared to [[I:P Masquerena|other]] [[S:P Little Knight|monsters]] that have been showed belonging to the same narrative universe as the "[[Evil‚òÖTwin]]s", yet they appear in this card's artwork as actual characters (whereas "Raye" and "Roze" might be fictional) and forms a pair alike to "Evil‚òÖTwins" while also referencing the macho character clich√© common in [[Wikipedia:Shounen|shounen]] media.
  * The card's artwork is likely a reference to conflicts between online personalities.
  ** The fliers in the artwork of "Boo-Boo Game" resemble Sunny's sunglasses and the figures in the background of "Trouble Sunny", and the artwork of "Boo-Boo Game" has a video feed-like filter, implying that Sunny is mocking "Lil-la" and "Ki-sikil" for being beaten to the heist by her.
  ** This card's Japanese name, "Trouble Sun", is a pun on "Evil‚òÖTwin's Trouble Sunny", as well as "Mr. Trouble" („Éà„É©„Éñ„É´„Åï„Çì "Trouble-san", a Japanese term for online trolls trying to stir up controversy on purpose) and "Troublesome".
  ** This card's ''[[TCG]]'' name, "Sunny's Snitch", refers to a "snitch", someone who intentionally reveals secret (usually incriminating) information about another individual; it is often seen as synonymous to "tattletale", someone who gossips or reports wrongdoings for attention, similar to what Sunny does by releasing a video mocking "Lil-la" and "Ki-sikil" for their failed heist.
  ** However, it is worth noting that the censorship applied by Sunny to preserve the identities of "Lil-la" and "Ki-sikil" implies a genuine rivality, rather than an actual act of incrimination. This is similar to the clich√© that wants rivals to be those who are going to beat each other; as a matter of fact, Sunny would no more be able to race with them for heists to then mock them if they ended up being arrested.
