title: Card Trivia:Cupid Dunk
wikitext: |-
  {{Navigation}}

  * This monster's name and design reference the sport of [[wikipedia:Basketball|basketball]], with this monster's outfit being based on that worn by basketball players, and the [[wikipedia:Basketball (ball)|titular ball]] used by this monster.
  ** This monster's Japanese name, "Low Cupit" (ロー・キューピット, ''Rō Kyūpitto'') is a play on the Japanese name of "basketball" (籠球, ''rōkyū'').
  ** This monster's ''[[TCG]]'' name is based on the [[wikipedia:Slam dunk|slam dunk]], a type of basketball shot where a player jumps and forcefully pushes the ball down through the hoop with their hands.
