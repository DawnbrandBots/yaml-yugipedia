title: Card Trivia:Marincess Aqua Argonaut
wikitext: |-
  {{Navigation}}

  * This monster resembles [[Skye Zaizen]]'s first persona in [[LINK VRAINS]], Blue Angel.
  ** Fittingly, Skye used a "[[Marincess]]" [[Deck]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, given to her by [[Aqua (character)|Aqua]].
  ** In addition, "[[Marincess Great Bubble Reef]]" is also similar in appearance to Skye's friend [[Miyu Sugisaki]], who was Aqua's [[Lost Incident]] origin.
  * This monster is based on the ''[[wikipedia:Argonaut (animal)|Argonauta]]'', specifically a species of octopus that is known as the ''[[wikipedia:Argonauta argo|Argonauta argo]]'', which is called "Aoi-gai" (葵貝, アオイガイ) in Japanese, referencing Skye's first name in the Japanese version of the ''Yu-Gi-Oh! VRAINS'' anime: "Aoi".
