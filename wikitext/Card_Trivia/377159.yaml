title: Card Trivia:Symbol of Friendship
wikitext: |-
  {{Navigation}}

  [[File:YGO-033 Smiley.png|thumb|right|The [[symbol of friendship]].]]
  * This card is based on the [[symbol of friendship]] that [[Téa Gardner]] created with her friends: [[Yugi Muto]], [[Joey Wheeler]] and [[Tristan Taylor]].
  ** This card's effect is based on the moment when Yugi recalls the friendship sign with his friends before drawing "[[Exodia the Forbidden One]]", while [[Seto Kaiba]] controls 3 copies of "[[Blue-Eyes White Dragon]]" and an unnamed kappa monster.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|33|ref}}, specifically from the panel showing the result of Anzu's drawing.

