title: Card Trivia:Mermail Abysstrite
wikitext: |-
  {{Navigation}}

  * This card is based on the Greek goddess [[wikipedia:Amphitrite|Amphitrite]], the wife of [[wikipedia:Poseidon|Poseidon]].
  ** This card is the female counterpart of "[[Mermail Abyssgaios]]", who is based on Poseidon and named for his epithet "Ennosigaios" (meaning "earth-shaker").
  ** Each card has the inverse [[original ATK and DEF]] of the other.
  * "[[Abyss-sting Triaina]]" appears in this card's artwork, wielded by this monster.
  * According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], this monster is the queen of the "[[Mermail]]s".
  ** "[[Mermail Abyssalacia]]" and "[[Abysstrite, the Atlantean Spirit]]" are both evolutions of this monster. The first, after having gained legs to be able to walk on "[[Lemuria, the Forgotten City]]", and the second after having formed a covenant with "[[Abyssrhine, the Atlantean Spirit]]".
