  * This card appears in the artwork of "[[Overtake Summon]]".
  * Despite being used multiple times in the anime, this card was never successfully [[activate]]d.
  ** This card shares this distinction with "[[R - Righteous Justice]]", "[[Sakuretsu Armor]]", and "[[Vacua Annihilation]]".
