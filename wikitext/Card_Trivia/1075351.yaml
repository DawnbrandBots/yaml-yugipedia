title: Card Trivia:Maliss in Underground
wikitext: |-
  {{Navigation}}

  * "[[Maliss P Chessy Cat|Maliss <nowiki><P></nowiki> Chessy Cat]]", "[[Maliss P Dormouse|Maliss <nowiki><P></nowiki> Dormouse]]", and "[[Maliss P White Rabbit|Maliss <nowiki><P></nowiki> White Rabbit]]" appear in this card's artwork.
  * This card's name is a play on ''Alice in Wonderland'' (an alternative name for ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]'') and ''Alice's Adventures Under Ground'' (the name of the original manuscript for ''Alice's Adventures in Wonderland'').
  ** "Underground" can also refer to the [[wikipedia:Cybercrime|cybercrime]] [[wikipedia:Black market|underground economy]], an economic network of virtual sites and platforms where illegal activities and criminal transactions are carried out, such as the sale of malware and hacking tools.
  * On the official ''OCG'' X/Twitter account, [https://x.com/YuGiOh_OCG_INFO/status/1823702361505968290 images of this card's artwork] are mistakenly labelled as "M∀LICE IN UNDER'''''LAND'''''".
