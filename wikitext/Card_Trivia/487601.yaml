title: Card Trivia:Smile Universe
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Performapal Smile Sorcerer]]".
  * Most, if not all the known planets in the [[wikipedia:Solar System|Solar System]], appear in this card's artwork.
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this card was used to [[Special Summon]] "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]". Despite this, "Z-ARC" is a [[Nomi]] monster and this card does not [[Ignoring the Summoning conditions|ignore Summon conditions]].
