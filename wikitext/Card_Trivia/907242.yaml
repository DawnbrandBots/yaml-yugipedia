title: Card Trivia:Sigurstate Sol
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia: Sól (Germanic mythology)|Sól]], the goddess of the [[wikipedia:Sun|Sun]] in [[wikipedia:Germanic mythology|Germanic mythology]].
  * This monster has a [[DARK]] counterpart: "[[Belsectacle Mani]]".
  ** Both share the same [[Level]] (7), [[Type]] ([[Cyberse]]), and [[original DEF]] (0).
  ** Both are named after the deities of the Sun and the [[wikipedia:Moon|Moon]] from Germanic mythology.
  ** Both monsters are depicted with mirrored poses and wearing similar armor, albeit with swapped colors to correspond to their respective [[Attribute]].
