title: Card Trivia:Elemental HERO Neos Knight
wikitext: |-
  {{Navigation}}

  * This monster represents the friendship between [[Jaden Yuki]] and [[Yusei Fudo]] in ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'', as Jaden [[Fusion Summon]]ed it by using his "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" and Yusei's "[[Junk Gardna (anime)|Junk Gardna]]" during their [[Duel]] against [[Paradox]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to prevent it from inflicting [[battle damage]] to the opponent is based on how it battled "[[Malefic Cyber End Dragon (anime)|Malefic Cyber End Dragon]]" and "[[Malefic Rainbow Dragon (anime)|Malefic Rainbow Dragon]]", both of whom were in [[Defense Position]] in the movie.
