title: Card Trivia:Metrognome
wikitext: |-
  {{Navigation}}

  * Red and blue [[Pendulum Scale]]s appear in this card's artwork: one serving as the [[wikipedia:Bob (physics)|bob]] of a pendulum (in this monster's hand), and the other adorning the [[wikipedia:Metronome|metronome]]'s adjustable weight on this monster's hat, respectively.
  * This card's name is a portmanteau of the words "metronome" and "[[wikipedia:Gnome|gnome]]".
  ** Fittingly, this monster is a gnome with a metronome on its hat, and its effects are related to equal-value Pendulum Scales - the latter being evocative of a metronome serving as a guide for a person to match its [[wikipedia:Tempo|tempo]].
