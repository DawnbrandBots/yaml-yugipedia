title: Card Trivia:Xyz Drop
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card has the same effect as "[[Xyz Reborn]]" and "[[Overlay Regen]]".
  ** All 3 cards were used by the ''[[Yu-Gi-Oh! ZEXAL]]'''s main protagonists; Yuma used "Xyz Reborn" in ''[[Yu-Gi-Oh! D Team ZEXAL]]'' and in the anime, [[Kite Tenjo|Kite]] used "Overlay Regen" in the anime and [[Reginald Kastle|Shark]] used "Xyz Drop" in [[Yu-Gi-Oh! ZEXAL (manga)|the manga.]]
