title: Card Trivia:Hinotama Soul
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fusion Draft]]".
  * This monster's ''[[TCG]]'' name is based on the [[wikipedia:Hinodama|hinodama]], a ''[[wikipedia:Yōkai|yōkai]]'' in [[wikipedia:Japanese folklore|Japanese folklore]] who are depicted as floating blue fireballs that wander around at night, rumored to be the lost souls of the dead separated from their bodies.
