title: Card Trivia:Ibicella Lutea
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Ibicella lutea|Ibicella lutea]]'', a species of flowering plant known by the common name ''yellow unicorn-plant''.
  ** This monster's Japanese name (イビルセラ ''Ibirusera'', "Evilcella") is a pun on "Ibicella" (イビセラ ''Ibisera'') and "evil"（イビル''Ibiru''), reflecting its menacing appearance. For some unknown reason, this card's English name is just "Ibicella Lutea" instead of "Evilcella Lutea".
