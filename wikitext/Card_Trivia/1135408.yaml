title: Card Trivia:Flametongue the Burning Blade
wikitext: |-
  {{Navigation}}

  * This monster is named after the Flame Tongue, a sword magically imbued with fire, which has become a popular and recurring magical weapon in fantasy role-playing games including ''[[wikipedia:Dungeons & Dragons|Dungeons & Dragons]]'' and ''[[wikipedia:Final Fantasy|Final Fantasy]]''.
  * This monster has a [[counterpart]]: "[[Laevateinn the Burning Blade]]".
