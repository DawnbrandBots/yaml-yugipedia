title: Card Trivia:Evilswarm Thunderbird
wikitext: |-
  {{Navigation}}

  * This is the "[[lswarm]]" counterpart of "[[Mist Valley Apex Avian]]".
  * This monster seems to be perched on top of "[[Shrine of Mist Valley]]".
  * This card's effect was mistranslated in the TCG release of [[Duel Terminal 7]]. It should have stated that after it has been banished via its effect, it returns to the field during the next Standby Phase (in compliance with the OCG lore). Instead, it states that it returns during "''your'' next Standby Phase." However this has been corrected with the release of Hidden Arsenal 7.
