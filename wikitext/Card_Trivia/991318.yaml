title: Card Trivia:Three Cavalteers
wikitext: |-
  {{Navigation}}

  * "[[Beast Drive Mega Elephant]]", "[[Night Vision the Phantom Pigeon]]" and "[[Shield Boring Kong]]" appear in this card's artwork.
  * The pronunciation of this card's Japanese name, "Three Heavy Cavalries" (''Sanjūki'') is a pun on the Japanese name for [[wikipedia:The Three Musketeers|The Three Musketeers]] (''Sanjūshi'').
