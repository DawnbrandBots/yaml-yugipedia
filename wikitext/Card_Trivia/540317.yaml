title: Card Trivia:Skull Servant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Brutal Retribution]]", "[[Certain Death Promotion]]", "[[Dark Eruption]]", "[[Fusion Draft]]", "[[Monster Rebone]]", "[[Phantom Bind]]", "[[Pride of the Weak]]", "[[Self-Mummification]]", "[[Skeletal Swarm]]", "[[Spirit Caller]]", "[[Tri-Wight]]", and "[[Zombie Master]]".
  ** According to the [[Master Guide 3 card storylines#Let's Look for Mr. "Skull Servant" Hidden in These Cards|Master Guide 3 card storylines]], this monster appears in the artwork of "[[Chthonian Blast]]".
  ** Also, either this monster or "[[King of the Skull Servants]]" (or possibly both in some cases) appear in the artworks of "[[Ghost Salvage]]", "[[Graceful Revival]]", "[[Panic Burial]]", "[[Reject Reborn]]", "[[Terrible Deal]]", and "[[Wight Reanimator]]".
  * This card appears in the artwork of "[[Ante]]" and "[[BIG Win!?]]".
  * This monster's Japanese name, "Wight", is the archaic English word for specific kind of creature, which has often been used to describe a ghost or a wraith-like creature in modern fantasy fiction.
  * This monster has a [[recolored counterpart]]: "[[The Wandering Doomed]]".
  * In the digitally colored ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, [[Skull Servant (Toei)|Toei anime]], [[Skull Servant (Bandai)|Bandai card game]], and [[Skull Servant (gum)|Top gum card]], this monster is depicted with a green cloak; however, in the ''[[OCG]]'' and all subsequently released media (except the colorized manga), this monster has a purple cloak.
  ** This monster's recolored counterpart, "The Wandering Doomed", has a green cloak, potentially referencing this older coloration of "Skull Servant".
  * This monster became infamous as being among of the worst monsters in the game, prompting [[Konami]] to create support cards for it as the [[Wight]] [[series]].
  ** Due to its reputation as being a very weak monster on its own, several ''Yu-Gi-Oh!'' video games will reward the player with the "Skull Servant Finish" bonus if this monster manages to reduce the opponent's [[Life Points]] to zero with an attack.
