title: Card Trivia:Kabazauls
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Lost World]]".
  * This monster has an upgraded ''[[Yu-Gi-Oh! Rush Duel]]'' counterpart, "[[Sneezing Greedizauls]]".
  * Although "[[Bracchio-raidus]]" is the first known [[WATER]] [[Dinosaur]]-[[Type]] monster, "[[Kabazauls]]" is the first WATER Dinosaur-Type monster released in the ''[[TCG]]''.
  * The ''TCG'' name is a most likely a mistranslation of Kabazaurus.<!-- Not sure if this last part is needed. -->
