title: Card Trivia:Saqlifice
wikitext: |-
  {{Navigation}}

  * "[[Naturia Sacred Tree]]" and the body of "[[Tohushaddoll Grysta]]" ("[[El Shaddoll Grysta]]") appear in this card's artwork.
  * According to the [[Master Guide 5 card storylines#"Qliphort" Boot-Up|''Master Guide 5'' card storylines]], the 10 'Cores' from "Grysta's" body are being absorbed by the "Sacred Tree" to awaken the "[[Qli]]".
  * This card's Japanese name features a pun based on the fact that part of the words "sa'''crif'''ice" and "'''Qliph'''oth" are pronounced identically in Japanese.
  ** This carries into the English translation, being a portmanteau of "sacrifice" and "[[Qli]]."
  * The base of this card's Japanese name translates to "Sacrifice of the Machine Husks".
  ** The "Sacrifice" used in this card's Japanese name is almost the same as the "[[Tribute|Sacrifice]]" used on early Yu-Gi-Oh! OCG cards before being superseded by "[[Tribute|Release]]", fitting the [[Tribute Summon]]-centered gameplay of the archetype.
