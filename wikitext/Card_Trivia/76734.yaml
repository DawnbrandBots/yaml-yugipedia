title: Card Trivia:Servant of Catabolism
wikitext: |-
  {{Navigation}}

  * This monster is one of the eleven [[Immortal]] monsters in ''[[Yu-Gi-Oh! The Duelists of the Roses]]''.
  * The spiky objects inside this monster's weapon canister are the same as the objects within the gun-like weapon in the artwork of "[[Moisture Creature]]".
  ** In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', both are Immortal monsters, and the spiky objects represent the [[Crush]] terrain, which powers up Immortal monsters and is produced when they are [[destroy]]ed in battle on any other terrain.
  * [[wikipedia:Catabolism|Catabolism]] is a scientific term that describes the metabolic pathways which break molecules down into smaller units, thus releasing energy.
  * In 3D video games such as ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'' and ''Yu-Gi-Oh! The Duelists of the Roses'', this monster is depicted as [[Card Gallery:Servant of Catabolism|a much larger creature]], with its head being the only part shown in this card's artwork.
