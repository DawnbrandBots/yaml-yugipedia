title: Card Trivia:Hyper-Ancient Shark Megalodon
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Megalodon|megalodon]], an extinct species of shark from millions of years ago, regarded as one of the largest predators to live.
  ** The megalodon is also regarded as one of the most powerful predators to live, which is reflected in this card's 2900 [[ATK]] and destruction effect.
