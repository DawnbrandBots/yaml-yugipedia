title: Card Trivia:Chronomaly Winged Sphinx
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Great Sphinx of Giza|Great Sphinx of Giza]], the largest monolith statue on Earth located on the [[wikipedia:Giza Plateau|Giza Plateau]] on the west bank of the [[wikipedia:Nile|Nile]] river in Giza, Egypt. The statue depicts a [[wikipedia:sphinx|sphinx]], a mythological creature with the head of a human and the body of a lion who, in [[wikipedia: Egyptian mythology|Egyptian mythology]], is seen as the guardians of the entrances into temples.
  ** This monster features carved wings, which the Great Sphinx of Giza does not have in real life. Instead, this monster is likely based on the ''[[wikipedia:Lamassu|Lamassu]]'', a creature resembling the winged sphinx in [[wikipedia:Mesopotamia|Mesopotamian]] [[wikipedia:Ancient Mesopotamian religion|religion]] serving as the protective deity of the [[wikipedia:Assyrian homeland|land of Assyria]]. According to legend, the ''lamassu's'' human-like head, bull-like body, and eagle-like wings each symbolized intelligence, strength, and freedom.
