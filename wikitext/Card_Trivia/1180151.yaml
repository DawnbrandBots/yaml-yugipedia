title: Card Trivia:Card of Distrain
wikitext: |-
  {{Navigation}}

  * This card's name is derived from "distrain", the legal term for seizing a person's personal property and enforcing payment of a debt, usually in the form of rent or taxes, which reflects its effect to "seize" one of the opponent's two or more [[Set]] [[Spell]]/[[Trap Card]]s by preventing its [[activate|activation]] this turn, and collecting a debt from their opponent by inflicting 800 damage each time they activate another Set card besides the [[target]]ed Set card.
