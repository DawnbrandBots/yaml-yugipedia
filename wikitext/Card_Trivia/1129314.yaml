title: Card Trivia:Zera the Evil Fiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zera Advent]]".
  * This monster is a [[Rush Duel]]-exclusive [[retrained]] counterpart of "[[Zera the Mant (Rush Duel)|Zera the Mant]]".
  ** This monster's name is derived from the [[flavor text]] of "[[Warrior of Zera (Rush Duel)|Warrior of Zera]]": "''To escape the temptation of '''evil fiends'''...''"
