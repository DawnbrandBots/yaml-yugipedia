title: Card Trivia:Nehshaddoll Genius
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Selection 10]]''.
  * This card's name, "Nehshaddoll",  is a portmanteau of "[[wikipedia:Nehushtan|Nehushtan]]" (the name of the bronze serpent erected by the prophet [[wikipedia:Moses|Moses]]) and "[[Shaddoll]]".
  ** The kanji 「星」 ("Star") in this card's Japanese name and the serpentine origin of Nehushtan are a reference to "[[Satellarknight Unukalhai]]".
  *** The kanji 「星なる影」 ("Stellar Shadow") in this card's Japanese name and the kanji 「聖なる影」 ("Holy Shadow") in the Japanese name of "[[Qadshaddoll Keios]]" can both be read as ''Seinarukage'' (せいなるかげ).
  ** The name "Nehushtan" is also used as a term to refer to "false idols".
  * This monster seems to be "[[Qliphort Genius]]" possessing the body of "[[Shaddoll Squamata]]" ("Satellarknight Unukalhai").
  ** This card has the same [[ATK]] (1800) as all the three aforementioned monsters, the same [[Attribute]] ([[EARTH]]) and [[Type]] ([[Machine]]) as "Qliphort Genius", and the same [[Level]] (4) and [[DEF]] (1000) as "Satellarknight Unukalhai" and "Shaddoll Squamata".
  ** Just like "Qliphort Genius", this card is named after the concept of a "genius" in [[wikipedia:Roman mythology|Roman mythology]], according to which every person, place, and thing had a instance of divinity within them, not much different from "souls".
  ** This card's [[Flip Effect]] to target a "Shaddoll" monster the player [[control]]s and make it [[unaffected]] by [[monster effect]]s for a turn, except its own, is based on the effect of the "[[Qli]]" monsters to be unaffected by the effects of monsters that have lower ATK then them.
