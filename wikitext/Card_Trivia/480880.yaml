title: Card Trivia:Phantasm Spiral Wave
wikitext: |-
  {{Navigation}}

  * "[[Fire King High Avatar Garunix]]" and "[[Phantasm Spiral Dragon]]" appear in this card's artwork.
  * "Spiral Wave" in this card's name is a reference to the identical attack name of "[[Spiral Serpent]]" (as mentioned in that card's [[flavor text]]), the predecessor monster to "Phantasm Spiral Dragon".
