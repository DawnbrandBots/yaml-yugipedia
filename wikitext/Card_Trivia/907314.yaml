title: Card Trivia:Dogmatikacism
wikitext: |-
  {{Navigation}}

  * "[[Fallen of Albaz]]", "[[Dogmatika Ashiyan]]", and "[[Dogmatika Ecclesia, the Virtuous]]" appear in this card's artwork.
  ** "Ecclesia" is clutching her head in pain due to the curse at the 'Stigmata' mark on her forehead, performed by "Ashiyan" by opening a portal to the "Hole", as a sentence of punishment for her sparing "Albaz".
  ** The event in this card's artwork are likely continued by "Albaz" absorbing "Ecclesia's" corrupted 'Stigmata' and [[Albaz Dragon|turning]] [[The Dragon that Devours the Dogma|into]] "[[Brigrand the Glory Dragon]]".
  * This card's name might be a wordplay between "stigma" and "dogmatism".
