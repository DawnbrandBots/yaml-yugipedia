title: Card Trivia:Starfish
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Receding Tide]]".
  * This monster is based on a [[wikipedia:Starfish|starfish]], a marine echinoderm resembling a star.
  ** This monster's name is also a pun on its [[Level]]-manipulation effect, as the Levels are represented by stars.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when three copies of this monster are summoned, the other two copies are colored blue and green. This references the [[wikipedia:RGB color model|RGB color model]], an additive color model where the red, green, and blue primary colors of light are added together to create a colorful array of colors
