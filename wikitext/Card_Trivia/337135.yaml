title: Card Trivia:Caninetaur
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is a pun on the romanized Greek word "''[[wikipedia:Centaur|kéntauros]]''"  (ケンタウル, ''kentaurosu'' lit. "centaur") with the first character replaced with the character for "[[wikipedia:Dog|dog]]" (けん, ''Ken'').
  * This monster has a counterpart: "[[Leotaur]]".
