  [[File:ZubabaKnight-JP-Anime-ZX-NC.png|thumb|250px|"[[Zubaba Knight (anime)|Zubaba Knight]]" being Summoned.]]
  * This monster is a retrained [[counterpart]] of "[[Zubaba Knight]]".
  ** This monster's pose is based on that of "[[Zubaba Knight (anime)|Zubaba Knight]]" when it is Summoned in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's second bulleted effect to [[destroy]] an opponent's [[Defense Position]] monster is based on the effect of "Zubaba Knight".

