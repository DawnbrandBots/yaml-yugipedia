title: Card Trivia:Grappler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Amazoness Substitution]]" and "[[Molting Escape]]".
  * This monster has a [[recolored counterpart]]: "[[Drooling Lizard]]".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', when this monster attacks, it charges and swipes its claws, despite its grappling and constricting fighting style suggested by its name and [[flavor text]].
