title: Card Trivia:Orcustrion
wikitext: |-
  {{Navigation}}

  * The cathedral-like insides of this monster provide the background for the artworks of "[[Orcust Brass Bombard]]", "[[Orcust Cymbal Skeleton]]", "[[Orcust Harp Horror]]", and "[[Galatea, the Orcust Automaton]]".
  ** This monster also appears in the artwork of "[[Orcustrated Einsatz]]".
  * This card is named after [[wikipedia:orchestrion|orchestrion]]s.
