title: Card Trivia:Thunder King, the Lightningstrike Kaiju
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:King Ghidorah|King Ghidorah]], a giant three-headed electrical dragon ''[[wikipedia:Kaiju|kaiju]]'' from the ''[[wikipedia:Godzilla (franchise)|Godzilla]]'' franchise.
  * This monster has a "Super Anti-Kaiju War Machine" counterpart: "[[Super Anti-Kaiju War Machine Mecha-Thunder-King]]".
  * This monster can be seen as a rival of "[[Dogoran, the Mad Flame Kaiju]]".
  ** Both are based on rival monsters in ''kaiju'' films produced by [[wikipedia:Toho|Toho]].
  ** Both have "Super Anti-Kaiju War Machine" counterparts.
  ** Both feature an effect that devastates the opponent's [[field]], and then a secondary aspect that affects their attacks for the turn. This monster prevents the opponent from [[activate|activating]] card effects and allows it to attack up to three times, while "Dogoran" [[destroy]]s all monsters the opponent [[control]]s but prevents itself from attacking.
