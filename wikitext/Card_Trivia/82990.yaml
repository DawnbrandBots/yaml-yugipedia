title: Card Trivia:Diskblade Rider
wikitext: |-
  {{Navigation}}

  * This monster has a [[counterpart]]: "[[Chaosrider Gustaph]]".
  * This monster's Japanese name, "Disk Rider", can be seen as a joke by [[wikipedia:Konami|Konami]], referring to "'''Disk RaiDa'''", a Deck that was popular shortly before the Japanese release of ''[[Light of Destruction]]'' (the pack this card debuted in), which used "[[Light and Darkness Dragon]]" and "[[Destiny HERO - Disk Commander]]".
  ** "'''RaiDa'''" is a commonly used Japanese abbreviation for "Light and Darkness Dragon", derived from the Japanese pronunciation of the words "light" (raito) and "darkness" (dakunesu).
  * This monster is wielding a [[wikipedia:Chakram|chakram]], with another attached above its motorcycle's rear wheel.
