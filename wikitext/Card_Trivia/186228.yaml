title: Card Trivia:D-Boyz
wikitext: |-
  {{Navigation}}

  * The "'''D'''" in "''D-Boyz''" is slang for "the", effectively making the name "The Boyz." "D-Boyz" may also be a reference to "D Boys", which is slang for "dope dealers."
  ** This card's name may also allude to [[wikipedia:B-boying|B-boying]], slang for breakdancing, evidenced by the clothes worn by the "D-Boyz" and their poses.
  *** The D might also stand for their type ([[Fiend|Demon]], or Fiend in English).
