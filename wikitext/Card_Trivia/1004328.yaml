title: Card Trivia:Blue-Eyes Vision Dragon
wikitext: |-
  {{Navigation}}

  * [[The Relic]] appears in this card's artwork.
  ** This, along with the background of the artwork, is based on the underground chamber, the location where most of the Duels against [[Otes]] (who used "[[Blue-Eyes White Dragon (anime Rush Duel)|Blue-Eyes White Dragon]]") took place in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
  * This monster's name and holographic appearance reference [[Solid Vision]], the technology used to project holograms of monsters in the various ''Yu-Gi-Oh!'' anime series.
  ** This is similar to "[[Blue-Eyes Solid Dragon]]", which has the same [[Attribute]] ([[LIGHT]]), [[Level]] (8), and [[original ATK and DEF]] (2500/2000).
  * This is the first [[Monster Card]] to feature an effect which allows it to be treated as more than one [[Fusion Material]].

