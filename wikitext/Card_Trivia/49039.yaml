title: Card Trivia:Crossline Counter
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Des Kangaroo]]" and an "[[Axe Raider]]" equipped with "[[Axe of Despair]]" appear in this card's artwork.
  ** Interestingly, the international version of "Axe of Despair" is shown in this card artwork, with no differences between the Japanese and international dub versions of this card's artwork.
  * This card's Japanese name can also be translated as "Clothesline Counter", which may be named for the [[wikipedia:Professional wrestling attacks|"clothesline" wrestling maneuver]].
