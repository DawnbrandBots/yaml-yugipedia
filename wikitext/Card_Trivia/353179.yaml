title: Card Trivia:Herald of the Arc Light
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Invincibility Barrier]]".
  * This monster makes up the lower-body portion of "[[Herald of Ultimateness]]".
  * This is the first [[Extra Deck]] monster to be related to [[Ritual Monster]]s and [[Ritual Spell Card]]s.
