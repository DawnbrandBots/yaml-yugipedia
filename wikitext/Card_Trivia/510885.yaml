title: Card Trivia:The Spell Absorbing Life
wikitext: |-
  {{Navigation}}

  * This card is a reverse effect of "[[Ceasefire]]". Both cards flips all monsters face-up, canceling any [[Flip Effect]]s. The only difference is that "[[Ceasefire]]" does 500 damage to your opponent for each [[Effect Monster]] on the field while "[[The Spell Absorbing Life]]" gives you 400 [[Life Points]] for each of them.
