title: Card Trivia:Fire King High Avatar Kirin
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Qilin|kirin]]'', a mythological Eastern Asian creature with the head and the body of a dragon, and the hooves and horn of a [[wikipedia:Unicorn|unicorn]].
  * This monster is an evolved counterpart of "[[Fire King Avatar Kirin]]".
