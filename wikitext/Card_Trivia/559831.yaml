title: Card Trivia:Dinowrestler Capoeiraptor
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Capoeira|capoeira]] and ''[[wikipedia:Velociraptor|Velociraptor]]''.
  * This monster appears in the artworks of "[[Dinomuscle]]" and "[[Crazy Evolution]]".
  * The [[Card Number]]s of this card and "[[Dinowrestler Capaptera]]" were swapped in the ''TCG'' 1st Edition of [[Soul Fusion]].
