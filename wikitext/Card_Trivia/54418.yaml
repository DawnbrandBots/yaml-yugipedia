title: Card Trivia:Late Penalty
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The emperor from the [[Royal]] series of card artworks appears in this card's artwork.
  * This card's name reflects its effect to make the opponent face a "penalty" for not [[control]]ling any monsters during their [[Standby Phase]] (or their opponent's monsters being "late" for the beginning of their turn) by forcing them to skip their [[Battle Phase]].
  * This card's video game effect requiring the player to control a [[Level 2]] or lower [[Spellcaster]] monster is based on its appearance in {{episode|5D's|044|ref}} where [[Lazar]] [[activate]]s this card while he controls  "[[Jester Confit (anime)|Jester Confit]]", a [[Level 1]] Spellcaster monster.
