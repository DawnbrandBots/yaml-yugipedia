title: Card Trivia:Triple Ancient Gear Hunting Hound
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Double Ancient Gear Hunting Hound]]".
  ** This monster also has an upgraded form: "[[Ultimate Ancient Gear Hunting Hound]]".
  * This monster's appearance and [[Fusion Material]]s are based on the [[wikipedia:Cerberus|cerberus]], a canine monster in [[wikipedia:Greek mythology|Greek mythology]] with three dog heads.
  * This card is the first [[Fusion Monster]] to have two separate lists of Fusion Materials for its [[Fusion Summon]].
  ** However, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this card is only Fusion Summoned using three copies of "[[Ancient Gear Hunting Hound (anime)|Ancient Gear Hunting Hound]]".
