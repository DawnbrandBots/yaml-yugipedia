title: Card Trivia:Red-Eyes Black Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack 5]]'' and ''[[Starter Deck: Joey]]'', and is also one of the cover cards of ''[[Dark Legends]]'', ''[[Phantom God]]'', the box of ''[[Duelist Legacy Volume.2]]'', ''[[Retro Pack]]'', ''[[Prismatic Art Collection]]'', ''[[Triple Build Pack: Evolution Impact]]'', and ''[[25th Anniversary Tin: Dueling Heroes]]''.
  * This monster appears in the artworks of "[[Black Dragon's Roar]]", "[[Confronting the Black Dragon]]", "[[Cyberdark Invasion]]", "[[Inferno Fire Blast]]", "[[Meteor Flare Fusion]]", "[[Red-Eyes Burn]]", "[[Red-Eyes Insight]]", "[[Red-Eyes Spirit]]", and "[[The Rival's Name]]".
  ** This monster's silhouette appears in the artwork of "[[Red-Eyes Black Dragon Sword]]", reflecting the fact that, in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]], "[[Red-Eyes Black Dragon Sword (anime)|Red-Eyes Black Dragon Sword]]" was created by fusing this monster with "[[Claw of Hermos]]".
  *** Fittingly, "Red-Eyes Black Dragon Sword" shares the same [[Attribute]] ([[DARK]]), [[Level]] (7), [[Type]] ([[Dragon]]), and [[original ATK and DEF]] (2400/2000) as this monster.
  * This monster has several [[counterpart]]s:
  ** Two "[[Metalmorph (archetype)|Metalmorph]]"-related counterparts: "[[Red-Eyes Black Metal Dragon]]" and "[[Red-Eyes Metal Claws Dragon]]".
  ** An egg counterpart: "[[The Black Stone of Legend]]".
  ** Two baby counterparts: "[[Black Dragon's Chick]]" and "[[Red-Eyes Baby Dragon]]".
  ** A younger counterpart: "[[Red-Eyes Retro Dragon]]".
  ** A [[Gemini monster|Gemini]] counterpart: "[[Red-Eyes Black Flare Dragon]]".
  ** A "[[Malefic]]" counterpart: "[[Malefic Red-Eyes Black Dragon]]".
  ** A "[[Toon]]" counterpart: "[[Red-Eyes Toon Dragon]]".
  ** A "[[Blue-Eyes]]" counterpart: "[[Blue-Eyes White Dragon]]".
  ** A "[[Statue]]" counterpart: "[[Red-Eyes Statue Dragon]]".
  ** An [[Card evolutions|evolved]] counterpart: "[[Red-Eyes Darkness Dragon]]", which itself has its own metal and [[zombie counterpart]]s, "[[Red-Eyes Darkness Metal Dragon]]" and "[[Red-Eyes Zombie Dragon]]".
  ** A [[retrained]] counterpart: "[[Red-Eyes Alternative Black Dragon]]".
  ** A weaker counterpart: "[[Red-Eyes Soul]]".
  ** A [[Zombie]] [[Xyz Monster|Xyz]] counterpart (with "[[Flame Swordsman]]" and "[[Tiger Axe]]"): "[[The Undying Legion]]".
  ** A ''[[Rush Duel]]'' [[Cat (Rush Duel series)|Cat]] counterpart: "[[Red-Eyes Black Cat]]"
  ** A ''Rush Duel'' [[High Tech Dragon]] counterpart: "[[Red-Boot Boost Dragon]]"
  * Unlike "[[Dark Magician]]" and "Blue-Eyes White Dragon", this monster does not have a [[Match winner]] counterpart.
  * In the ''[[TCG]]'', this card was originally printed with the name "Red-Eyes B. Dragon".
  ** This card's name was later [[Card Errata:Red-Eyes Black Dragon|errata'd]] in ''Legendary Duelists: Season 1'' to revert the abbreviation to "Black".
  * The ''[[Red-Eyes Black Dragon (Bandai)|Bandai]]'' version of this card has 2400 DEF, while this card has 2000 DEF.
  * This is the main card of the ''[[Yu-Gi-Oh! (Toei film)|Yu-Gi-Oh!]]'' movie produced by [[Toei Animation]] and based on the [[Yu-Gi-Oh! (Toei anime)|first anime series]]. In the movie, this card was owned by [[Shougo Aoyama]]. It was also stated in the movie that "[[Blue-Eyes]]" represents power while "[[Red-Eyes]]" represents potential. This is more or less true, as while "Blue-Eyes" focuses mainly on being a [[Beatstick]], "Red-Eyes" focuses more on being flexible with certain decks, and with the release of "[[Meteor Black Comet Dragon]]", this trait is heightened.
  ** Another theme regarding the two monsters and certain cards in their archetypes is violence/anger ("Red-Eyes") and destruction/pride ("Blue-Eyes"). This is alluded to by their descriptions in ''[[Yu-Gi-Oh! The Sacred Cards]]''.
  ** "Inferno Fire Blast", "Red-Eyes Burn", "Red-Eyes Black Flare Dragon", "Red-Eyes Flare Metal Dragon", "Archfiend Black Skull Dragon", and "Meteor Black Comet Dragon" all inflict [[Burn]] damage; however, with the newest support cards focusing on the [[equip]]ping mechanic ("Red-Eyes Baby Dragon", "[[Gearfried the Red-Eyes Iron Knight]]", "[[Red-Eyes Fang with Chain]]", and "[[Red-Eyes Slash Dragon]]"), this has been downplayed.
  ** "[[Blue-Eyes White Dragon]]", "[[Blue-Eyes Ultimate Dragon]]", "[[Blue-Eyes Alternative White Dragon]]" "[[Blue-Eyes Twin Burst Dragon]]", "[[Neo Blue-Eyes Ultimate Dragon]]", "[[Burst Stream of Destruction]]", and "[[Neutron Blast]]" revolve around destroying the opponents' cards. Ironically, "[[Deep-Eyes White Dragon]]" has an effect that inflicts burn damage, which was the norm with the "Red-Eyes" archetype.
  ** These archetypes' traits describe the characters that represent their archetypes. "Red-Eyes" and its wrathful connotation could describe [[Joey Wheeler]]'s past as a bully and temperament when ridiculed. "Blue-Eyes" and its references to destruction and power could represent [[Seto Kaiba]] and his vanity.
  * This is the [[signature card]] of [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] ([[Joey Wheeler]] in the anime).
  ** During the ''[[Waking the Dragons]]'' story arc in the ''Yu-Gi-Oh!'' anime, this was the only signature card of the three main characters ([[Yugi Muto]], Joey Wheeler, and Seto Kaiba) that was never affected by "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]".
  * This card's first ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|086|ref}}, specifically from the panel showing [[Red-Eyes Black Dragon (manga)|this monster]] being Summoned.
  ** This monster is depicted with three claws in its first and second ''OCG''/''TCG'' artworks, but is later depicted with four claws in its third, fourth, and fifth artworks.
