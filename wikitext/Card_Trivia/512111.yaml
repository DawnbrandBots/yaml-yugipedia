title: Card Trivia:Dark Elf
wikitext: |-
  {{Navigation}}

  * This monster is the [[DARK]] [[Effect Monster]] [[recolored counterpart]] of "[[Mystical Elf]]", with opposite [[ATK]] and [[DEF]].
  ** This monster may have been a precursor to the concept of [[dark counterpart]]s.
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster can be fused with "Mystical Elf" to form "[[Cosmo Queen]]".
