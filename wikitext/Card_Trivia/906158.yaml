title: Card Trivia:Icejade Gymir Aegirine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Icejade Manifestation]]".
  * This monster is named after [[wikipedia:Ægir|Gymir]], a [[wikipedia:jötunn|jötunn]] and a personification of the sea in [[wikipedia:Norse mythology|Norse mythology]]. Gymir is also known by the name Aegir (similar to the Japanese name of "Aegirine").
  * This monster is an upgraded [[Synchro Monster|Synchro]] form of "[[Icejade Aegirine]]" after inheriting the crown of the late "[[Icejade Kosmochlor]]".
  ** The [[Level]] (10) of "Aegirine Gymir" is the same as the Level of "Kosmochlor", while the [[ATK]]/[[DEF]] (3000/1500) of "Aegirine Gymir" are reversed with the ATK/DEF (1500/3000) of "Kosmochlor"
  * This monster has a [[Tuner monster|Tuner]] form: "[[Icejade Ran Aegirine]]".
