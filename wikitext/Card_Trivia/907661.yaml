title: Card Trivia:Pile Armed Dragon
wikitext: |-
  {{Navigation}}

  [[File:ArmedChanger-JP-Anime-GX-NC.png|thumb|200px|"Armed Dragon LV7" equipped with "Armed Changer"]]

  * This monster is a [[retrained]] [[counterpart]] of "[[Armed Dragon LV7]]".
  ** This monster's appearance is based on a scene from {{episode|GX|026|ref}} where "[[Armed Dragon LV7 (anime)|Armed Dragon LV7]]" is [[equip]]ped with "[[Armed Changer (anime)|Armed Changer]]", giving it a set of drill-like knuckles.
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! GX|effect name]] of "[[Armed Dragon LV5 (anime)|Armed Dragon LV5]]" from the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime: "Destroyed Pile".
  ** Fittingly, this card's artwork features a blue, webbed background artwork similar to the artwork of "Armed Dragon LV7".
  * This is the first [[WIND]] "[[Armed Dragon]]" monster to not also be a "[[LV]]" monster.

