title: Card Trivia:Altergeist Memorygant
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2020]]''.
  * This monster's name is a portmanteau of "[[wikipedia:The Morrígan|Morrígan]]" and "[[wikipedia:Computer memory|memory]]".
  ** The Morrigan is the [[wikipedia:Irish mythology|Irish]] goddess of war and death, who often takes the form of a crow.
  ** Computer memory is the storage space in the computer, where data is to be processed and instructions required for processing are stored.
