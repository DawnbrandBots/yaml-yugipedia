title: Card Trivia:Red-Eyes Flare Metal Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Classic Pack 04]]''.
  * This monster appears in the artwork of "[[Return of the Red-Eyes]]".
  * This card's artwork resembles the fifth ''[[OCG]]'' artwork of "[[Red-Eyes Black Dragon]]".
  * This monster is a [[Metal counterpart|Metal]] [[Xyz Monster|Xyz]] [[counterpart]] of "[[Red-Eyes Black Flare Dragon]]".
  ** This monster also appears to be "Red-Eyes Black Flare Dragon" transformed into this monster by fusing with "[[Black Metal Dragon]]", which is supported in the artwork of "Return of the Red-Eyes".
  *** This is somewhat odd as, under normal circumstances, the [[ATK]] of "Red-Eyes Black Flare Dragon" would be 3000 after being [[equip]]ped with "Black Metal Dragon", but this monster's ATK is just 2800.
  ** By extension, this monster can also be considered the Xyz counterpart of "[[Red-Eyes Black Metal Dragon]]" and/or "[[Red-Eyes Darkness Metal Dragon]]"; however, despite this, due to this monster being a [[Rank 7]] monster, it cannot be [[Summon]]ed using either of these counterpart as [[material]]s, without using [[Level]]-changing card effects.
  * This card's Spanish name, "''Dragón de Metal Replandeciente Ojos Rojos''", features two typos, as it is missing a letter and a word. It should be "''Dragón Re'''s'''plandeciente '''de''' Ojos Rojos''".
  ** Oddly, "Red-Eyes Black Flare Dragon" (which, along with this card, also debuted in ''[[Clash of Rebellions]]'' in the ''[[TCG]]'') had its name correctly displayed as "''Dragón Negro Resplandeciente de Ojos Rojos''".
