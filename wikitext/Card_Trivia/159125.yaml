title: Card Trivia:Excalibur
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is named after the sword of [[wikipedia:King Arthur|King Arthur]].
  * This card shares its name with "[[Heroic Champion - Excalibur]]", whose effect also doubles its own [[ATK]].
  * Despite its name, the sword depicted in the card's artwork resembles the [http://lotr.wikia.com/wiki/Andúril Andúril] from the Lord of the Rings series.
