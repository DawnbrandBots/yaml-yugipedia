title: Card Trivia:Masked Chameleon
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a pun on the words "kamen" (カメン "''mask''" in Japanese) and "chameleon".
  ** The design of its head shares resemblance to the masks worn by the ''[[wikipedia:Kamen Rider|Kamen Riders]]'', specifically that of ''[[wikipedia:Kamen Rider Amazon|Amazon]]''.
