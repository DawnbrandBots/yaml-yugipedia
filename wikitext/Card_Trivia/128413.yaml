title: Card Trivia:Light of Destruction (card)
wikitext: |-
  {{Navigation|Light of Destruction}}

  * This card shares its name with the [[Booster Pack]] ''[[Light of Destruction]]'', and the malevolent entity from the ''[[Yu-Gi-Oh! GX]]'' anime [[The Light of Destruction]].
  * The artwork of this card depicts the destruction of the "[[Realm of Light]]", from the same perspective as that card.
  ** The excess [[light]] destroying the Realm of Light could be an analogy for this card's effect speeding up the milling effect of "[[Lightsworn]]" monsters, causing a [[Deck Out]].
  * This card is similar to a [[mill]] version of "[[Dark Room of Nightmare]]".
