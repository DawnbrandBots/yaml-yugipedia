title: Card Trivia:Mind Pollutant
wikitext: |-
  {{Navigation}}

  * "[[Ally of Justice Catastor]]", "[[Fabled Raven]]" and "[[Mist Valley Thunder Lord]]" appear in this card's artwork.
  ** This card's artwork depicts "Raven" taking control of "Thunder Lord", forcing it to destroy "Catastor" (the remains of which can be seen in the artwork of "Thunder Lord").
