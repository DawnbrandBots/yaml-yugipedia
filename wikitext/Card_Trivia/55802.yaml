title: Card Trivia:Ape Magician
wikitext: |-
  {{Navigation}}

  * This monster's weapon is based on a [[Cursed Needle|Minus Staff]], a weapon used by [[Zeman the Ape King (character)|Zeman the Ape King]] and his [[monkey troop|army]] to inflict the [[Minus Curse]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** The Minus Curse can also cause a character's personality to become reversed, which is reflected in this monster's effect to switch [[control]] of an opponent's monster.
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster is also treated as a [[Spellcaster]] monster.
  ** This monster shares this trait with "[[Ape Fighter]]", a fellow member of the [[Ape]] [[series]] whose anime effect allows it to be treated as a different [[Type]].
