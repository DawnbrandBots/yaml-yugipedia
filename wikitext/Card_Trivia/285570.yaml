title: 'Card Trivia:New Order 6: Etheric Apophis'
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artworks of "[[Rank Domination]]" (as a silhouette) and "[[Rank-Up Advantage]]".
  * This monster is based on [[wikipedia:Apep|Apep]], the Egyptian embodiment of chaos, who is often depicted as a giant serpent.
  ** This monster's name reflects its [[Rank]], which is also reflected in the '''six''' glowing gems in this monster's glyphs.
  * This is the first [[Xyz Monster]] to be [[Xyz Summon]]ed through [[Rank-Up|Double Rank-Up]] in the anime.
