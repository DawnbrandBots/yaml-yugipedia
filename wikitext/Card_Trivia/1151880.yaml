title: Card Trivia:Dracotail Shaulas
wikitext: |-
  {{Navigation}}

  * This monster is the combined [[Fusion Monster|Fusion]] form of "[[Dracotail Mululu]]" and "[[Dracotail Phryxul]]".
  ** The [[Wikipedia:Astrological sign|astrological signs]] of the aforementioned monsters, [[wikipedia:Scorpio (astrology)|Scorpio ]] and [[wikipedia:Taurus (astrology)|Taurus]] respectively, are opposing signs in the [[Wikipedia:Astrological sign#Western zodiac signs|Western Zodiac]]. Fittingly, the aforementioned monsters also have opposite [[Attribute]]s, [[DARK]] and [[LIGHT]] respectively.
