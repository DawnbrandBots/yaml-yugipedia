title: Card Trivia:Trap Trick
wikitext: |-
  {{Navigation}}

  * "[[Traptrix Dionaea]]" and "[[Traptrix Mantis]]" appear in this card's artwork.
  ** The events of this card's artwork appear to precede the events depicted in "[[Traptrix Trap Hole Nightmare]]" or "[[Trap Tracks]]", as it features the same warrior and two goblins before they fall under attack by the spiders and pitcher plants in the artwork of "Traptrix Trap Hole Nightmare".
