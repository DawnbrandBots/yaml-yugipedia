title: Card Trivia:Absolute Axon Kicker
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Ultimate Axon Kicker]]".
  ** Fittingly, this monster's last effect can [[Special Summon]] the aforementioned monster.
  * This monster is tied with "[[Hyper Psychic Blaster/Assault Mode]]", "[[Juraishin, the Cursed Thunder God]]", and "[[Psychic End Punisher]]" for having the highest [[Level]] (11) of all [[Psychic]] monsters.
