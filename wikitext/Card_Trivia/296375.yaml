title: Card Trivia:Survival of the Fittest
wikitext: |-
  {{Navigation}}

  * "[[Ultimate Tyranno]]" and a deceased "[[Black Tyranno]]" appear in this card's artwork.
  ** This card's artwork resembles the fight scene between the ''Spinosaurus'' and the ''Tyrannosaurus rex'' from ''[[wikipedia:Jurassic Park III|Jurassic Park III]]''. "Black Tyranno's" pose resembles the ''T. rex's'' pose at the end of the fight, while "Ultimate Tyranno's" pose resembles the ''Spinosaurus's'' pose when it defeated the ''T. rex''.
  * This card's artwork depicts the storyline of the extinction event of the [[dinosaur]]s, where a seismic shift causes the volcano to erupt and destroy the dinosaurs.
  ** "[[Jurassic World]]" → "[[Seismic Shockwave]]" → "[[Volcanic Eruption]]"/"[[Molten Destruction]]" → "[[Survival Instinct]]" → '''Survival of the Fittest''' → "[[Extinction on Schedule]]"
  * This card's Spanish name, ''"Supervivencia del Más en Forma"'' is subject to a possible mistranslation, as "Fittest" is translated here as "in good physical shape", rather than the meaning "of suitable capability" typically associated with the phrase; the phrase is usually translated as "[[wikipedia:es:Supervivencia del más apto|Superiviencia del Más Apto]]".
