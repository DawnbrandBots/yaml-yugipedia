title: Card Trivia:Hi-Speedroid Kendama
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: High-Speed Riders]]''/''[[High-Speed Riders]]''.
  * This monster appears in the artwork of "[[Speed Recovery]]".
  * This monster is based on a ''[[wikipedia:Kendama|kendama]]'', a traditional skill toy in Japan consisting of a handle, a pair of cups, and a ball that are all connected together by a string.
  ** This monster's Japanese name, "Magical Sword Dama" ({{Ruby|魔|ま}}{{Ruby|剣|けん}}ダーマ, ''Maken Dāma'') is a portmanteau of "magical sword" (魔剣, ''maken'') and "''kendama''" (けん玉), with the latter word translating to "sword [and] ball". The swords and bladed weapons are often associated with [[piercing]] [[battle damage]], similar to this monster's first effect.
  * This monster's second ''[[OCG]]''/''[[TCG]]'' bulleted effect to [[Special Summon]] it from the [[Graveyard]] is based on the anime effect of "[[Speed Recovery (anime)|Speed Recovery]]", a [[Spell Card]] used to Special Summon this monster in {{episode|ARC-V|037|ref}}.
  * During the [[wikipedia:manzai|manzai]] [[wikipedia:omake|omake]] of the original Japanese version of {{episode|ARC-V|054|ref}}, [[Zuzu Boyle]] calls this monster a ''kendama'', with [[Yugo]] angrily correcting her that it is called "Maken Dharma". Ironically, this monster's ''TCG'' name ''is'' "Hi-Speedroid Kendama".
  * In the [http://www.pojo.biz/board/showthread.php?t=1211054 ''Shonen Jump'' poll] to determine which of four cards should be released as a [[Shonen Jump promotional cards|Shonen Jump promotional card]], this card was named "Hyperspeedroid Dahma".
