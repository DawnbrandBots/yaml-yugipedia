title: Card Trivia:Zefra Path
wikitext: |-
  {{Navigation}}

  * "[[Pilica, Descendant of Gusto]]" and "[[El Shaddoll Wendigo]]" appear in this card's artwork.
  ** This card depicts "El Shaddoll Wendingo" being transformed into "[[Ritual Beast Tamer Zefrawendi]]" and "Pilica, Descendant of Gusto" into "[[Ritual Beast Tamer Zeframpilica]]".
  *** The yellow and green orbs from the [[Naturia Sacred Tree|tree]] in the artwork of "[[Oracle of Zefra]]" seems to be 'choosing' "Pilica" and "Wendy" as "Zefra", as those orbs shoot the energy to both of them.
