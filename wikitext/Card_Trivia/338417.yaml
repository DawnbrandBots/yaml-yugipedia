title: Card Trivia:Blue-Eyes Tyrant Dragon
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[Fusion Monster|form]] of "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" [[equip]]ped with "[[Tyrant Burst Dragon (anime)|Tyrant Burst Dragon]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime. In the English dubbed version of the anime only, this monster was referred to as a distinct monster, while in the original Japanese version, it was not given its own name.
  ** 18 years after this monster's debut in the anime, this card would later receive an ''[[OCG]]''/''[[TCG]]'' release as a distinct monster in ''[[Battle of Chaos]]'', referencing the above-mentioned facts, along with its [[Summoning conditions]] and effects.
  * This is the only monster that was formed by using a "[[Legendary Dragon]]" twice in the anime.
  ** [[Seto Kaiba]] [[Fusion Summon|fused]] "[[Fang of Critias]]" with "[[Tyrant Wing (anime)|Tyrant Wing]]" to form "Tyrant Burst Dragon", which he then fused with "Blue-Eyes White Dragon" to [[Summon]] this card.
  ** While portrayed in the English dubbed anime and the ''OCG''/''TCG'' as a true [[Fusion Monster]] with its own distinct card, this monster is functionally identical to a regular "[[Blue-Eyes White Dragon]]" [[equip]]ped by "[[Tyrant Burst Dragon]]" via the latter's anime monster effect.
  * This is the only anime-original card to be released in the ''OCG'' [[Series 11]] [[Core Booster]] sets.

