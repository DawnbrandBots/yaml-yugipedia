title: Card Trivia:Dark Resonator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mind Trust]]", "[[Over Tuning]]", "[[Red Carpet]]", "[[Resonator Command]]", "[[Resonator Engine]]", "[[Soundproofed]]", "[[Synchro Call]]", "[[Tuner's High]]", and "[[Vision Synchro]]".
  * This monster has the highest [[original ATK]] (1300) of all "[[Resonator]]" monsters.
  * This card has a [[retrained]] counterpart: "[[Darkness Resonator]]".
  * This monster shares the same [[Attribute]] ([[DARK]]), [[Level]] (3), and [[ATK]] (1300) as "[[Junk Synchron]]" and "[[Blackwing - Gale the Whirlwind]]".
  ** Fittingly, all three monsters are the first [[Tuner monster]]s used by [[Jack Atlas]], [[Yusei Fudo]], and [[Crow Hogan]], respectively, in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
