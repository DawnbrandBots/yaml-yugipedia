title: Card Trivia:Negative Energy Generator
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on the manga effects of "[[Dark Energy (manga)|Dark Energy]]".
  * This card is an [[Card evolutions|upgraded]] form of "[[Negative Energy]]".
  * This is the first [[Spell Card]] to be used in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, as well as the first [[Normal Spell Card]].
  ** This is also the first Spell Card used by [[Seto Kaiba]] in the anime.
  ** This is also the first [[Anime-only|anime-exclusive]] Spell Card to appear.
