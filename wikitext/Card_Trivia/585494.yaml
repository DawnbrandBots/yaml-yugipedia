title: Card Trivia:Psi-Reflector
wikitext: |-
  {{Navigation}}

  * The weapons and armor of "[[Hyper Psychic Blaster]]" appear in this card's artwork.
  * This monster shares similarities with "[[Arcane Apprentice]]".
  ** Both are [[Tuner monster]]s that can [[add]] "[[Assault Mode Activate]]" from the player's [[Deck]] to the [[hand]].
  ** Both are related to a [[Synchro Monster]] with an "[[/Assault Mode]]" [[counterpart]].
