title: Card Trivia:Gladiator Beast Domitianus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gladiator Beast Charge]]" and "[[Gladiator Rejection]]".
  * This card is named after ''[[wikipedia:Domitian|Titus Flavius Caesar Domitianus Augustus]]'', otherwise known as Domitian, an Ancient [[wikipedia:Roman emperor|Roman emperor]].
  ** In line with this card requiring "[[Gladiator Beast Vespasius]]" as [[Fusion Material]], the Roman Emperor Domitian is the son of the emperor Vespasian, Vespasius' namesake.
  * Based on the artwork of "[[Gladiator Beast United]]" and this card's required Fusion Materials, this monster is a fusion of "[[Gladiator Beast Vespasius]]", "[[Gladiator Beast Lanista]]", and "[[Gladiator Beast Retiari]]".
  * This card has the highest [[original ATK]] of all [[Sea Serpent]] monsters and all the "[[Gladiator Beasts]]".
  * This monster's armor and weapon are based on the armors/weapons of other "[[Gladiator Beast]]" monsters and "Gladiator Beast" [[Equip Spell]]s:
  ** Armor:
  *** Helmet and sash: "Retiari"
  *** Upper neck armor: "[[Gladiator Beast Torax|Torax]]"
  *** Lower neck armor: "[[Gladiator Beast Augustus|Augustus]]"
  *** Inner shoulder armor: "[[Gladiator Beast Murmillo|Murmillo]]"
  *** Chestplate: "[[Gladiator Beast's Battle Archfiend Shield|Battle Archfiend Shield]]"
  *** Left arm: "[[Gladiator Beast Secutor|Secutor]]"
  *** Right arm: "[[Gladiator Beast's Battle Manica|Battle Manica]]"
  *** Back and knees: "[[Gladiator Beast Nerokius|Nerokius]]"
  *** Abdominal: Chariot of "[[Gladiator Beast Essedarii|Essedarii]]"
  *** Groin: "Vespasius"
  *** Lower groin and right shoulder: "[[Gladiator Beast Samnite|Samnite]]"
  *** Side of legs: "Lanista"
  *** Tail: "[[Gladiator Beast Tygerius|Tygerius]]"
  ** Weapon:
  *** Hilt: "[[Gladiator Beast's Battle Halberd|Battle Halberd]]"
  *** Lower hilt: staff of "Torax"
  *** Blade: "[[Gladiator Beast's Battle Gladius|Battle Gladius]]"
  *** Trident: Trident of "Retiari"
