title: Card Trivia:There Can Be Only One
wikitext: |-
  {{Navigation}}

  * "[[King of the Skull Servants]]", "[[Skull Dog Marron]]", "[[The Lady in Wight]]", and "[[Wightprince]]" appear in this card's artwork.
  ** This card's artwork is likely a continuation of the events depicted in "[[Quarantine]]", as "King of the Skull Servants", "The Lady in Wight", and "Wightprince" are all in vacation clothes.
  ** "Wightprince" and "Skull Dog Marron" are depicted on the other side of the metal detectors, with "King of the Skull Servants" and "The Lady in Wight" being stopped by the security guards on the other side. This reflects the effect of this card: "Skull Dog Marron" and "Wightprince" are monsters that have two different [[Type]]s ([[Beast]] and [[Zombie]], respectively), while "King of the Skull Servants" and "The Lady in Wight" are not allowed as they are also Zombies.
  * This card's Japanese name, "Sensor Differentiations" (センサーばんべつ ''Sensā Banbetsu'') is a pun on the four-character idiom meaning "highly varied" ([[wiktionary:千差万別|千差万別]] ''sensa banbetsu'').
  ** This card's ''[[TCG]]'' name references the iconic tagline of the 1986 film ''[[wikipedia:Highlander (film)|Highlander]]'', which reflects this card's effect to prevent each player from [[control]]ling more than 1 monster of each Type.
  * This card's effect is the opposite of "[[Rivalry of Warlords]]".
