title: Card Trivia:Castle Link
wikitext: |-
  {{Navigation}}

  * "[[Desrook Archfiend]]", "[[Terrorking Archfiend]]", and "[[Terrorking Salmon]]" appear in this card's artwork.
  ** This card's name, artwork, and effect reference the chess term "[[wikipedia:Castling|castling]]", where the [[wikipedia:King (chess)|king]] is moved to the opposite side of the [[wikipedia:Rook (chess)|rook]] for greater protection. This is reinforced by this card's effect, as well as the presence of "Des'''rook''' Archfiend" and "Terror'''king''' Archfiend" in this card's artwork.
  * This card appears in the artwork of "[[Draw Discharge]]".
