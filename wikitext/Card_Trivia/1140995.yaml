  * This monster is the "[[Synchron]]" [[counterpart]] of "[[Scrap-Iron Scarecrow]]".
  * This monster is depicted wearing a white scarf similar to that worn by "[[Junk Synchron]]" and "[[Junk Warrior]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
