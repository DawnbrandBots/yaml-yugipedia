title: Card Trivia:CXyz Simon the Great Moral Leader
wikitext: |-
  {{Navigation}}

  * This monster is the "[[CXyz]]" [[Card evolutions|evolution]] of "[[Norito the Moral Leader]]".
  ** This monster's title "Great Moral Leader" ("Disciplinary High Priest" in Japanese) reflect its owner, [[Carlyle Chesterton]], who serves as the disciplinary leader of the [[Heartland City]] student council in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** Like "Norito", this monster is based on a Shinto priest; however, while "Norito" wears black robes, this monster wears white clothes, which is a color used to symbolize purity, and is worn out of respect when approaching the Kami. The decorations worn by Simon resemble abstract versions of various paraphernalia found at Shinto shrines.
  ** This monster's name is based on ''[[wikipedia:ja:祭文|Saimon]]''「祭文」, a written proclamation recited at Shinto rituals addressed to the ''kami''. In contrast to ''norito'', ''saimon'' are generally read on non-official, non-public occasions.
  * This is the first "CXyz" monster to not feature an effect that involves dealing [[effect damage]] to the opponent.
  ** This is also the first "CXyz" monster that did not absorb other [[Xyz Material|Overlay Units]] from another [[Xyz Monster]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, since in {{episode|ZEXAL|077|ref}} [[Yuma Tsukumo]] did not control an [[Xyz Monster]] at the time.
