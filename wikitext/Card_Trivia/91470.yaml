title: Card Trivia:Forest Wolf
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the Big Bad Wolf from the fairy tale, ''[[wikipedia:Little Red Riding Hood|Little Red Riding Hood]]'', in which the Big Bad Wolf stalks the titular character in the forest to her sickly grandmother's house, whom he later devours and uses her clothes to disguise himself to devour Red Riding Hood.
  ** This monster's effect to [[equip]] itself with a monster it [[destroyed by battle]] to itself references how the Big Bad Wolf devoured Red Riding Hood and her grandmother.
  ** This monster's effect makes the opponent choose which of the monsters equipped to it to [[Special Summon]], referencing how a nearby hunter cuts open the Big Bad Wolf's belly to free Little Red Riding Hood and her grandmother near the end of the story.
  * In the English dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, when [[Rebecca Hawkins]] asked if this monster was based on the Big Bad Wolf from ''Little Red Riding Hood'', [[Leon von Schroeder]] stated that the wolf she spoke of was of a different fairy tale.
