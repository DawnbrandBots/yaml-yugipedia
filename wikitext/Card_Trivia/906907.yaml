title: Card Trivia:Jointech Tosceratops
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Yuhi - Join and Explode! Join and Intensify!]]''. 
  ** In addition, the pack is also named after the [[Summon chants in Yu-Gi-Oh! GO RUSH!!#Yuhi Ohdo|Summon chant]] used for this monster in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * This monster appears in the artworks of "[[Coin Tech Lucky Rush]]", "[[Coin Tech Power Unit]]", "[[Coin Tech Rebirth]]", "[[Jointech Digup]]", and "[[Jointech Merry-Go-Round]]".
  * This monster's name is a portmanteau of "toss" (reflecting its [[coin toss]] effect) and "triceratops".
