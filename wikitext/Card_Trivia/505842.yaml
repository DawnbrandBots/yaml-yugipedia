title: Card Trivia:A Deal with Dark Ruler
wikitext: |-
  {{Navigation}}

  * "[[Dark Ruler Ha Des]]" appears in this card's artwork, hence the card's name.
  * This card seems to allude to deals that [[wikipedia:Hades|Hades]] had made with two [[wikipedia:List of Greek mythological figures|Greek heroes]] after they had completed certain, but separate tasks:
  ** The first one being [[wikipedia:Orpheus|Orpheus]] after he had traveled to the [[wikipedia:Greek underworld|Underworld]] to find his lost love, [[wikipedia:Eurydice|Eurydice]] while playing songs that melted the hearts of two of the Underworld dwellers [[wikipedia:Cerberus|Cerberus]] and [[wikipedia:Charon (mythology)|Charon]]. After Orpheus had played a song on his [[wikipedia:lyre|lyre]] that touched the heart of the Greek god of death, Hades allowed Orpheus to travel with Eurydice back into the [[wikipedia:Upper World (Greek)|human world]] under the condition that he did not look back and always traveled in front of Eurydice.
  ** The second one being [[wikipedia:Heracles|Heracles]] defeating Cerberus in his [[wikipedia:Labours of Hercules|Twelve Labours]]. With Heracles, after he had defeated Cerberus, Hades allowed Heracles to bring Cerberus to Eurytheus under the condition that he did not harm the animal and return it back to the gates of the Underworld once he was done.
