title: Card Trivia:Millennium Seeker
wikitext: |-
  {{Navigation}}

  * This monster is based on [[Shadi Shin|Shadi]].
  ** A silhouette of the [[Millennium Scales (manga)|Millennium Scales]] appears in the background of this card's artwork, which was used by Shadi in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster is depicted wearing an [[wikipedia:ankh|ankh]] in its necklace, referencing the [[Millennium Key (manga)|Millennium Key]], which was also used by Shadi in the manga and anime.
  ** This monster is depicted weighing a heart against a feather. This references the [[Weighing of the Heart]], a ritual performed by Shadi in the manga and anime where he would use the Millennium Scales to measure the [[Feather of Ma'at]] against the weight of a person's misdeeds.
  *** This monster's effect to allow the opponent to decide whether to [[Special Summon]] the [[target]]ed monster in their [[Graveyard]] or not references the [[Question of Truth]], a [[Shadow Game (manga)|Shadow Game]] conducted by Shadi in the manga and anime, in which he uses the Millennium Scales to judge his crimes and asks [[Curator Kanekura]] a series of questions based on personal decisions.
