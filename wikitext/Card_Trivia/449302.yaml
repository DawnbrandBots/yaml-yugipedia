title: Card Trivia:Crimson Nova Trinity the Dark Cubic Lord
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Crimson Nova the Dark Cubic Lord]]".
  ** This monster is based on [[wikipedia:Trimurti|Trimurti]], the trinity of supreme divine beings in [[wikipedia:Hindusim|Hindusim]], which consists of [[wikipedia:Brahma|Brahma]], [[wikipedia:Vishnu|Vishnu]], and [[wikipedia:Shiva|Shiva]].
  *** Fittingly, this monster is a Fusion between three copies of "Crimson Nova", which itself is based on Shiva.
  ** This monster's [[DEF]] (3000) is equal to the [[ATK]] of "Crimson Nova the Dark Cubic Lord".
  * This monster can be considered the [[DARK]] [[Fiend]] [[counterpart]] of "[[Neo Blue-Eyes Ultimate Dragon]]".
  ** Both have an [[original ATK]] of 4500.
  ** Both are Fusion Monsters that use three copies of the same monster as [[Fusion Material]]s.
  ** Both monsters' owners expressed some form of obsession in the ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'' movie: [[Crimson Nova Trinity the Dark Cubic Lord (anime)|this monster]]'s owner, [[Aigami]], is obsessed with moving to a better world, while the owner of "[[Neo Blue-Eyes Ultimate Dragon (anime)|Neo Blue-Eyes Ultimate Dragon]]", [[Seto Kaiba (manga)|Seto Kaiba]], is obsessed to [[Duel]]ing [[Pharaoh Atem]] again.
  * This is the first Fusion Monster to list multiple copies of a specific card as Fusion Materials with a number, instead of repeating the name that many times.
