title: Card Trivia:Voidvelg Apocalypse
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dark Hole Paradox]]", "[[Voidvelg Shroud]]", and "[[Voidvelg Transition]]".
  * Two "[[Dark Hole (Rush Duel)|Dark Holes]]" appear in this card's artwork.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Voidvelg Palerider]]".
  ** This monster and its effect to [[add]] "Dark Hole" to the [[hand]] is based on the [[wikipedia:Apocalypse|Apocalypse]], an event involving destruction on a catastrophic scale.
  ** This monster's [[Fusion Material]]s are also based on how the Apocalypse is written in the [[wikipedia:Book of Revelation|Book of Revelation]], the final book of the [[wikipedia:New Testament|New Testament]] in the [[wikipedia:Bible|Christian Bible]] written by prophets (referenced by "[[Dark Prophet]]"). The Book of Revelation describes the [[wikipedia:Four Horsemen of the Apocalypse|Four Horsemen of the Apocalypse]] who serve as heralds of the Apocalypse, with Death serving as the fourth horseman riding a pale horse and carrying a scythe (which "Voidvelg Palerider" is based on).
  * This is the first [[Galaxy (Type)|Galaxy]] [[Type]] Fusion Monster in ''[[Yu-Gi-Oh! Rush Duel]]''.
