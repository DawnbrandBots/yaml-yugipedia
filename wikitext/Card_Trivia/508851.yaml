title: Card Trivia:Xing Zhen Hu
wikitext: |-
  {{Navigation}}

  [[File:Dragon Cards sealed.png|thumb|right|250px|The [[soul-eating jar]], as seen in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.]]

  * This card is based on the [[soul-eating jar]], an item featured in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, which contains the cursed [[Dragon Cards]]. 
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|046|ref}} showing the soul-eating jar.
  ** This card's name (心鎮壷 - ''Xīn Zhēn Hú'') is Chinese for "Jar of Soul Suppression", which reflects its effect to "suppress" the [[activate|activation]] of two [[Spell]]/[[Trap Card]]s on the [[field]]. 
  * This card has a [[counterpart]]: "[[Xing Zhen Hu Replica]]".
  * "''Shin tsen fū''" (''xin zhen hu'') is an example of Japanese readings highly approximating to Chinese readings, more than [[wikipedia:On'yomi|on'yomi]]. Other Chinese-style-read Japanese words have been known so far include "''kyonshī''" ("[[Master Kyonshee]]"), "''nyan''" ("[[Thunder Nyan Nyan]]"), "''wanfū''" ("[[King Tiger Wanghu]]"), and "''xiaolong''" ("[[Stardust Xiaolong]]").

