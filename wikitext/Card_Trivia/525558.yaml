title: Card Trivia:Downbeat
wikitext: |-
  {{Navigation}}

  * In music, a downbeat is the first beat of a measure.
  * This card has a counterpart, "[[Transmodify]]".
  * "[[Symphonic Warrior Drumss]]", "[[Symphonic Warrior Guitaar]]" and "[[Symphonic Warrior Basses]]" appear in this card's artwork.
