  * "[[Hip Hoshiningen]]", "[[The Calculator]]", and "[[The Calibrator]]" appear in this card's artwork.
  ** Fittingly, this card's effect bears a resemblance to the effect of "The Calculator" and "The Calibrator", as they also gain [[ATK]] based on the [[Level]]/[[Rank]] of certain monsters on the [[field]].
