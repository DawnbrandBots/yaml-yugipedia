title: Card Trivia:Thunder Ball
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Gorogon" is derived from ''gorogoro'', the Japanese onomatopoeia for someting large and heavy starting to roll.
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, this monster was created as a ''[[Dungeon Dice Monsters]]'' piece, and was exclusive to that game before it was released as a card in the ''[[OCG]]''/''[[TCG]]''.
  ** It shares the same [[original ATK and DEF]] (450/400) stats with its ''Dungeon Dice Monsters'' counterpart.
  ** Its effect to [[Special Summon]] itself at the end of the [[Damage Step]] references the delayed dimension technique [[Yugi Mutou (manga)|Yugi Mutou]] used to [[Summon]] this monster during [[Ryuji Otogi (manga)|Ryuji Otogi]]'s turn, after Otogi had attacked Yugi's [[Monster Lord]].
  ** Its effect to send a [[Trap Card]] to the [[Graveyard]] in order to destroy all other monsters in the same [[column]] is based on its ''Dungeon Dice Monsters'' effect to pay one [[Trap Crest]] in order to roll as far as possible in a straight line, destroying all monsters it runs into.
  * This monster has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any manga [[Monster Card]], released nearly 23 years after its first appearance in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga on July 26, 1999.
  * In the ''[[Yu-Gi-Oh! Dungeon Dice Monsters (video game)|Yu-Gi-Oh! Dungeon Dice Monsters]]'' video game, this monster continues forward, destroying all dimensioned monsters/items in its path until it hits the end of the Dungeon Path.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|138|ref}}, specifically from the panel showing this monster being Summoned.
