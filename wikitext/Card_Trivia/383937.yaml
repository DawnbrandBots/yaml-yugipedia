title: Card Trivia:Performapal Corn
wikitext: |-
  {{Navigation}}

  * This monster's name, along with the name of "[[Performapal Uni]]", spells "[[wikipedia:Unicorn|unicorn]]", a legendary horse creature with a single horn protruding from its head.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[add]] an "[[Odd-Eyes]]" monster from the [[Deck]] to the [[hand]] is an alteration of its manga effect to add a [[Pendulum Monster]] from the [[Deck]] to the [[hand]]. In {{chapter|ARC-V|005|ref}}, the Pendulum Monster that this monster added was "[[Odd-Eyes Mirage Dragon (manga)|Odd-Eyes Mirage Dragon]]".
  * This card's artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, specifically from the panel showing [[Enter-Mate Corn (manga)|this monster]] being Summoned.
