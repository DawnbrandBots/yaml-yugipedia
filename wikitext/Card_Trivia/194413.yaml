title: Card Trivia:Inzektor Ant
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Powered Inzektron]]", "[[Zekt Conversion]]" and "[[Inzektor Firefly]]".
  * This card is based on an [[wikipedia:Ant|ant]]. The Japanese name, "Ameise", is the German name for ant.
  * This card is similar to the [[wikipedia:List of Kamen Rider Kabuto characters#ZECTroopers|ZECTroopers]] since they both have a similar theme and use a similar weapon.
  * This card is also featured in some of the "[[Inzektor]]" Spells and Traps (with [[Inzektor Giga-Mantis|mantis]] or [[Inzektor Giga-Weevil|weevil]] armor on), hinting that it is the basic member of the archetype and their ability to equip with each/to each other.
