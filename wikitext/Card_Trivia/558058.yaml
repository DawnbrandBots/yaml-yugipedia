title: Card Trivia:Vendread Anima
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vendread Nightmare]]".
  * According to [[Master Duel card storylines]], this monster is the "[[Vendread Core]]" that morphed the Vendread hordes into the shape to that of the deceased wife of "[[Revendread Slayer]]" in an attempt to psychologically overwhelm him.
