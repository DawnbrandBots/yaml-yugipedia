title: Card Trivia:Dark Ruler No More
wikitext: |-
  {{Navigation}}

  * "[[Dark King of the Abyss]]" and "[[Revived King Ha Des]]" appear in this card's artwork.
  ** "[[Demotion]]" > "[[Abyssal Designator]]" > "[[Herald of the Abyss]]" > "[[Hate Buster]]" > "[[Mind Drain]]" (presumably "[[Skill Drain]]" and "[[Soul Drain]]" as well)  > "[[Skill Prisoner]]" > "[[Destruct Potion]]" > "[[Fake Life]]" > "[[Call of the Archfiend]]" > "[[Reject Reborn]]" > "[[Powerful Rebirth]]" > '''"Dark Ruler No More"'''
  ** This card's artwork depicts the aftermath of the events depicted in the artwork of "[[Skill Prisoner]]" and/or "[[Powerful Rebirth]]".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card has a special animation when activated: the hand of "Dark King of the Abyss" takes the soul of "Ha Des" and unleashes its energies upon the opponent's monsters.
