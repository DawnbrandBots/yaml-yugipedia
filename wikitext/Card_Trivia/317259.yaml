title: Card Trivia:Resonance Insect
wikitext: |-
  {{Navigation}}

  * This monster is conceptually similar to "[[Howling Insect]]" due to the following:
  ** Both monsters have the same [[Attribute]] and [[Type]].
  *** In fact, both monsters seem to be modeled after [[wikipedia:Cricket (insect)|crickets]].
  ** Both monsters' names and appearances have auditory themes, which could further support their appearances taking after crickets.
  ** Both monsters have [[Toolbox]] effects that can be used when they leave the [[field]] in a certain manner.
