title: Card Trivia:Speed Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Speed Spell - Vision Wind]]", "[[Synchro Fellowship]]", "[[Synchro Strike]]", and "[[Urgent Tuning]]".
  * This monster has four [[counterpart]]s, whose names are synonymous to the word "speed": "[[Dash Warrior]]", "[[Rapid Warrior]]", "[[Rush Warrior]]", and "[[Sonic Warrior]]".
  * This monster has a retrained counterpart: "[[Full-Speed Warrior]]".
  * This is the first monster Summoned by [[Yusei Fudo]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
