title: Card Trivia:Fortune Fairy En
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Miracle Stone]]" and "[[Unacceptable Result]]".
  * This monster's name is based on "''en''", the Japanese word for "flame".
  * This monster has a "[[Fortune Lady]]" [[counterpart]]: "[[Fortune Lady Fire]]".
