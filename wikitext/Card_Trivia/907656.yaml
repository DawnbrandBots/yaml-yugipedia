title: Card Trivia:Talons of Shurilane
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Schlieren|schlieren]], a type of defect in transparent lenses that is often not visible to the naked eye.
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Illusion]] [[Type]] and its effect to [[return]] a [[Fiend]] or Illusion monster to the [[hand]] to [[Special Summon]] itself reference how this monster is a Fiend and [[Dreams]] [[Alignment]] monster in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series.
  * This monster's effect to [[destroy]] an opponent's monster by returning itself to the hand when the player's card is [[target]]ed by an effect references its [[flavor text]] in ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'' and ''[[Yu-Gi-Oh! The Sacred Cards]]'', which describe it as a monster that hides in illusions and viciously attacks anyone who sees it.
