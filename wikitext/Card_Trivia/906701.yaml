title: Card Trivia:Doom Kraken
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] [[Effect Monster|Effect]] counterpart of "[[Fiend Kraken]]".
  ** This card has 200 more [[ATK]]/[[DEF]] than "Fiend Kraken". This is a reference to the effect of "[[Umi]]" (which increases [[Aqua]] monsters' ATK/DEF by that amount), which is also a common trend of the retrained counterparts of [[Mako Tsunami]]'s monsters in ''[[Duelist Pack: Duelists of the Abyss]]''/''[[Legendary Duelists: Duels From the Deep]]''.
