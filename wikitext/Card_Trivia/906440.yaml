  * Several "[[Unauthorized Bootup Device]]s" appear in this card's artwork.
  * This monster is the [[DARK]] [[counterpart]] of "[[Machina Force]]".
  ** Visually, this monster is a combination of "[[Machina Possesstorage]]", "[[Machina Resavenger]]", "[[Machina Unclaspare]]", and a corrupted version of "[[Machina Fortress]]".
