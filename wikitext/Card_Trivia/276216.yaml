title: Card Trivia:Maiden with Eyes of Blue
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Wishes for Eyes of Blue]]".
  * This monster has a retrained [[counterpart]]: "[[Maiden of White]]".
  * This monster is based on [[Kisara]], who carries the spirit of "[[Blue-Eyes White Dragon]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's [[Quick Effect]] to [[Special Summon]] "Blue-Eyes White Dragon" in response to an attack or card effect references how Kisara would unconsciously Summon "Blue-Eyes White Dragon" in response to an enemy [[ka]] attack.
  ** Similarly, "[[Palladium Oracle Mahad]]" is based on [[Mahad]], the carrier of the "[[Illusion Magician]]", who became the "[[Dark Magician]]", and "[[Palladium Oracle Mana]]" is based on [[Mana]], the carrier of "[[Dark Magician Girl]]". Similarly, all three of these cards are able to Summon their respective monster from the [[hand]], [[Deck]], or [[Graveyard]].
  * This monster's design features two images of "Blue-Eyes White Dragon" sown onto her dress, and her necklace is engraved with the English letters "BE", short for "Blue-Eyes".
  ** The design of the "Blue-Eyes White Dragon" is shared with "[[Rider of the Storm Winds]]", who bears it on his tunic.
