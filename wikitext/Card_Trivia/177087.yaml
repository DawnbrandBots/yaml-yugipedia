title: Card Trivia:Constellar Praesepe
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Beehive Cluster|Beehive Cluster]], a star cluster also known as "Praesepe", located in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Cancer(constellation)|Cancer]], which appears in the background of this card's artwork.
  ** This monster's armor features crab-like claws, referencing how Cancer is also known as the "crab" constellation.
