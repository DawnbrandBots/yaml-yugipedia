title: Card Trivia:Crossmind Archfiend
wikitext: |-
  {{Navigation}}

  * Conceptually and visually, this monster is a [[counterpart|retrained]] counterpart of "[[Thought Ruler Archfiend]]"; however, this monster appears to be based more on "[[Overmind Archfiend]]".
  ** All three monsters are [[Psychic]] "[[Archfiend]]" [[Synchro Monster]]s that share a similar Japanese naming scheme, "Mental {...} Daemon"; however, the ''[[TCG]]'' naming schemes of this monster and "Overmind Archfiend" are nearly identical as opposed to that of "Thought Ruler Archfiend".
  ** The [[Attribute]]s of both this monster and "Overmind Archfiend" are [[DARK]] as opposed to "Thought Ruler Archfiend", whose Attribute is [[LIGHT]].
  ** This monster's [[original ATK and DEF]] are 500 points less than "Overmind Archfiend's" [[DEF]] and [[ATK]] respectively, whereas it has no appearent correlation to "Though Ruler Archfiend's" stats.
  ** Both this monster and "Overmind Archfiend" feature an effect that can [[Special Summon]] a [[banish]]ed Psychic monster: This monster requires it to remain on the [[field]] to Special Summon a banished Psychic monster, while "Overmind Archfiend" requires it to leave the field to Special Summon the banished Psychic monster(s).
