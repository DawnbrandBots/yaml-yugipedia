title: Card Trivia:OuTerverSe Bug Fungus
wikitext: |-
  {{Navigation}}

  * This monster is based on the parallel universe observed by [[Yudias Velgear]] through [[Kuaidul Velgear]] in {{episode|GO RUSH!!|135|ref}}, in which all life on [[Earth (planet)|Earth]] is hybridized with ''[[wikipedia:Cordyceps|Cordyceps]]'', a parasitic fungus known for infecting bugs to survive.
  *  This monster has an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form: "[[OuTerverSe Mother Fungus]]".
