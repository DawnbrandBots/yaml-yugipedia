title: Card Trivia:Dark Matter Enigmata
wikitext: |-
  {{Navigation}}

  * The silhouettes of [[Bruyea]], [[Fukamura]], [[Sabyuas]], and [[Zeyet]] appear in this card's second artwork.
  * This monster appears in the artworks of "[[Dark Matter Force]]", "[[Dark Matter Haze]]", and "[[Dark Matter Psychic Phantom]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Dark Matter Mist]]".
