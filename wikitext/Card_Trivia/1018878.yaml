title: Card Trivia:Dian Keto the Boogie Master
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[All For Naught - Bubble Burst]]" and "[[Revival 2510]]".
  ** This monster's fan and purse also appear in the artwork of "[[Aqua Inflation]]".
  * This monster's Japanese name (逆玉の神 ディアン・ケト ''Gyakutama no Kami Dian Keto'') comes from the phrase 「逆玉の輿」 (''gyakutama no koshi''), which refers to a man who gains wealth and social status by marrying a woman that has more of either, akin to the English expression "[[wikipedia:gold digger|gold digger]]".
  * This monster is the younger [[Bubble Era]] [[counterpart]] of "[[Dian Keto the Cure Master]]".
  ** In turn, this monster has the following counterparts:
  *** A jailer counterpart: "[[Dian Keto the Security Master]]".
  *** A cook counterpart: "[[Dian Keto the Cooking Master]]".
  *** An even younger counterpart: "[[Dian Keto the Cure Prodigy]]".
  * This is the [[signature card]] of [[Mimi Imimi]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime and [[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!|manga]].
