title: Card Trivia:Tierra, Source of Destruction
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Void Apocalypse]]" and "[[Zefra War]]".
  * This monster is named after "[[wikipedia:Tierra (computer simulation)|Tierra]]", the name of an artificial life simulation designed to study the evolution of digital organisms.
  ** This is reflected in this monster's artificial and mechanical designs, as well as those of the associated "[[Infernoid]]" [[archetype]], in contrast to the organic designs of "[[Sophia, Goddess of Rebirth]]" and [[Duel Terminal Master Guide card storylines#The Tribes Created by "Sophia, Goddess of Rebirth"|her creations]].
  * This monster's name is mentioned in the [[flavor text]] of "[[Qliphort Scout]]", referencing its original role as the executive of the "[[Qliphoth]]" system.
  * According to the [[Master Guide 5 card storylines]], this monster is the fully revived form of "[[Infernoid Tierra]]" after she absorbed the power of 'Creation' from "[[Darktellarknight Batlamyus]]" and the power of the ten 'Cores' from the "[[Qli]]" monsters.
  ** The ten 'Cores' and parts from both "[[Apoqliphort Skybase]]" and "[[Apoqliphort Towers]]" are incorporated into this monster's design.
  * The energies of the powers of 'Creation' and 'Destruction' form a shape in the center of this monster's chest that resembles an upside-down Unicode symbol for power, which is commonly found on the power buttons of many electronics.
  * This monster has a [[counterpart|downgraded]] "Infernoid" form: "[[Infernoid Tierra]]"
  * This monster is a counterpart of "[[Sophia, Goddess of Rebirth]]":
  ** Both share the same [[Level]] (11).
  ** Both feature opposite [[Attribute]]s and [[Type]]s: This monster's Attribute/Type is [[LIGHT]]/[[Fiend]], while those of "Sophia's" is [[DARK]]/[[Fairy]].
  ** Both are [[Special Summon Monster]]s who feature similar effects that clear the players' [[hand]]s, [[field]]s, and [[Graveyard]]s and prevent cards and effects from [[activate|activating]] in response.
  * This monster is a counterpart of "[[Avida, Rebuilder of Worlds]]":
  ** Both share the same Attribute (LIGHT) and Level (11).
  ** Both are named after life-simulation computer programs, with [[wikipedia:Avida (software)|Avida]] also being inspired by the Tierra program.
  ** Both are Special Summon Monsters who share a similar effect that [[shuffle]]s monsters into the Decks and prevent cards and effects from activating in response.
  ** Despite having no other connection to the "Qli", "Avida" bears multiple "Qli" Cores.
