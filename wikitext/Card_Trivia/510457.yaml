title: Card Trivia:Ojama Black
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amaze Attraction Wonder Wheel]]" (as a face on the Ferris wheel), "[[Beast Rising]]", "[[Harpies' Hunting Ground]]", "[[Nitwit Outwit]]", "[[Ojama Country]]", "[[Ojama Delta Hurricane!!]]", "[[Ojama Delta Thunder!!]]", "[[Ojama Delta Wear]]", "[[Ojama Ride]]", "[[Ojama Trio]]", "[[Ojamagic]]", "[[Ojamandala]]", "[[Ojamuscle]]", "[[Ojamarble]]", "[[Ojamassimilation]]", "[[Ojamatch]]", "[[Painful Decision]]", "[[Painful Escape]]", "[[Performapal Guard Dance]]", "[[Power Filter]]", "[[Solidarity]]", "[[Super Team Buddy Force Unite!]]", "[[The Big Cattle Drive]]", "[[Three in One]]", and "[[Trickstar Live Stage]]".
  * "[[Ojama Yellow]]" and this card were released in ''[[Invasion of Chaos]]'', but "[[Ojama Green]]" was released in the previous pack, ''[[Dark Crisis]]''.
  * This card's flavor text is the same as "Ojama Yellow" and "Ojama Green". The only other cards with the same flavor text are the Normal "[[Magnet Warrior]]" monsters.
