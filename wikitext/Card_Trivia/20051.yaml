title: Card Trivia:Thunder Kid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[DNA Transplant]]", "[[Hard-sellin' Zombie]]", and "[[Scrum Force]]".
  * This card has a [[recolored counterpart]]: "[[Electric Lizard]]".
  * In video games released prior to its ''[[TCG]]'' debut, this card's name is '''"Kaminarikozou"''', which means "Thunder Kid" in Japanese.
