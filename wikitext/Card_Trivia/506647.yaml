title: Card Trivia:Versago the Destroyer
wikitext: |-
  {{Navigation}}

  * This card's name, "Versago", is likely a deliberate a mistranslation of [[wikipedia:Vassago|Vassago]]. In [[wikipedia:Demonology|demonology]], Vassago is the Prince of the Southern Regions of Hell, ruling over twenty-six legions of demons. He is said to be the Demon of Prophecy and the controller of the element enchantment air and Air Elementals (air demons). Vassago can be persuaded to tell the magician of events past and future, can discover hidden and lost things, and has a "good" nature; he is a relatively calm demon and usually remains quite mellow and quiet and kind, though in combat he can be fast and fierce. He is also a lover of magic.
