title: Card Trivia:Royal Decree
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster Chronicle]]''.
  * The king wearing the pointed crown, red robes, and violet mantle in this card's artwork appears in the artworks of "[[Conscription]]" and "[[Imperial Iron Wall]]".
  * The castle in this card's artwork appears in the artworks of "[[Catapult Zone]]", "Imperial Iron Wall", "[[Rock Bombardment]]", "[[Royal Surrender]]", and "[[The Huge Revolution is Over]]".
