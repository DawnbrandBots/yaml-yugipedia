title: Card Trivia:Skull-Mark Ladybug
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Anti-Aircraft Flower]]".
  * This monster shares similarities with "[[Burning Algae]]":
  ** Both monsters share the same [[original ATK and DEF]] (500/1500).
  ** Both monsters feature an effect increases a player's [[Life Point]]s by 1000.
  ** Both monsters debuted in the ''[[TCG]]'' in the same [[Core Booster]] pack, ''[[Invasion of Chaos]]''.
