title: Card Trivia:Unchained Soul of Sharvara
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Sharvara and Shyama|Sharvara]], one of the two Hindu mythological watchdogs belonging to [[wikipedia:Yama|Yama]].
  * This monster is the wolf form of "[[Unchained Ogre Shara]]". They have the same [[Attribute]] and opposite [[ATK]]/[[DEF]].
