title: 'Card Trivia:New Order 10: Etheric Horus'
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's silhouette appears in the artwork of "[[Rank Domination]]".
  * This monster is based on [[wikipedia:Horus|Horus]], the Egyptian deity of the sky, who is often depicted with the head of a falcon.
  ** This monster's name reflects its [[Rank]], which is also reflected in the '''ten''' glowing gems in this monster's glyphs.
