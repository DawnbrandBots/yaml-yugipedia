title: Card Trivia:D/D Savant Nikola
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Nikola Tesla|Nikola Tesla]].
  ** The red orb mounted into its torso may be a reference to a [[wikipedia:Plasma globe|plasma globe]], also known as a tesla ball, one of Tesla's most recognizable inventions.
  ** The shape of the monster, with the orb near its head in particular, may also reference [[wikipedia:Wardenclyffe Tower|Wardenclyffe Tower]], also known as the Tesla Tower, a wireless transmission station designed and built by Tesla, which featured a tower with a spherical top.
  ** The arc of metal suspended around the monster's midsection may be a stylized [[wikipedia:Tesla coil|Tesla coil]], an electrical resonant transformer circuit designed by Tesla.
  * The fact that this monster was first used in the ''[[Yu-Gi-Oh! ARC-V]]'' anime as a [[Pendulum Scale]] alongside "[[D/D Savant Thomas]]", based on [[wikipedia:Thomas Edison|Thomas Edison]], may be a reference to the [[wikipedia:War of the currents|war of the currents]], a competition in the 19th century surrounding the introduction of electric power transmission systems, where Tesla advocated for the use of [[wikipedia:Alternating current|alternating current]], which was at odds with Edison, who supported the usage of [[wikipedia:Direct current|direct current]].
  ** Tesla and Edison's enmity, partly resulting from the war of the currents, is reflected in the [[Level]]s and Pendulum Scales of this monster and "D/D Savant Thomas", where one monster's Level is equal to the other monster's Pendulum Scale, making the one monster unable to [[Pendulum Summon]] the other if it is used as a Pendulum Scale.
  * Unlike previous "D/D Savant" cards, this card derives its name from the first name of its namesake, rather than the last name. Also, unlike previous "D/D Savant" cards, this card's Spanish print uses a different wording in its translation ("D/D Nikola the Savant" instead of "D/D Savant Nikola").
