title: Card Trivia:Flavian - Colosseum of the Gladiator Beasts
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] counterpart of "[[Colosseum - Cage of the Gladiator Beasts]]".
  ** This card is based on the [[wikipedia:Flavian Amphitheater (Pozzuoli)|Flavian Amphitheater]], the third-largest elliptical amphitheater where gladiator matches took place in [[wikipedia:Ancient Rome|Ancient Rome]], smaller than the [[wikipedia:Colosseum|Colosseum]] and the [[wikipedia:Amphitheatre of Capua|Amphitheatre of Capua]].
