title: Card Trivia:Twin-Headed Wolf
wikitext: |-
  {{Navigation}}

  * This monster appears to be based on [[wikipedia:Orthus|Orthus]], a two-headed wolf from [[wikipedia:Greek mythology|Greek mythology]].
  ** However, this card's Japanese name, "Twin Head Cerberus" (ツインヘッド・ケルベロス ''Tsuinheddo Keruberosu''), is based on [[wikipedia:Cerberus|Cerberus]], the three-headed guard dog of the underworld.
