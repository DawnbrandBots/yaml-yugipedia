title: Card Trivia:Masterful Magician, Servant of the Sanctuary
wikitext: |-
  {{Navigation}}

  * This monster is an [[Effect Monster|Effect]] [[Match winner]] [[counterpart]] of "[[Dark Magician]]".
  ** This monster has the same [[Attribute]] ([[DARK]]), [[Level]] (7), and [[ATK]]/[[DEF]] (2500/2100) as "Dark Magician".
  * This monster has a "[[Blue-Eyes White Dragon]]"-based counterpart: "[[Dragon of Illumination, Sanctuary's Shield]]".
  ** Oddly, this card was released one year before "Dragon of Illumination".
  * This is the only Match Winner champion card to have the same Level and original ATK as the runner-up card ("[[Gatebridgeo the Waterfront Warbeast]]").
