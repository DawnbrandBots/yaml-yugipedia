title: Card Trivia:Gimmick Puppet Princess
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Repair Puppet]]".
  * This is the first and currently only [[LIGHT]] "[[Gimmick Puppet]]" monster.
  * This monster and "[[Gimmick Puppet Scarecrow]]" are the only "Gimmick Puppet" monsters currently not released in the ''[[OCG]]''/''[[TCG]]''.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when a second copy of this monster is Summoned, its hair and clothing will feature a different color scheme, in which its auburn hair will turn black, and its pink dress will turn teal.
