title: 'Card Trivia:Number 80: Rhapsody in Berserk'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster is named after a [[wikipedia:Rhapsody (music)|rhapsody]], a music term referring to a single-movement instrumental piece that has an irregular, spontaneous and free-form composition, and "berserk", the tone the rhapsody is played in.
  ** Fittingly, this monster's neutral form resembles an irregular drum-like musical instrument that might accompany a rhapsody.
  ** This monster's name is similar to that of [[wikipedia:George Gershwin|George Gershwin]]'s ''[[wikipedia:Rhapsody in Blue|Rhapsody in Blue]]''.
  * This monster has a "[[Number C]]" [[Card evolutions|upgraded]] form: "[[Number C80: Requiem in Berserk]]".
  ** This monster's name contrasts with the name of its "Number C" form, which is named after a [[wikipedia:Requiem|requiem]], a somber tone used to accompany a funeral mass.
  * This monster and "[[Number 58: Burner Visor]]" both feature an effect that [[equip]]s themselves to other monsters and can [[activate]] their effects during the [[Battle Phase]].
  ** This represents [[Don Thousand]]'s influence over [[Alito]] and [[Girag]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, as the two aforementioned monsters were used to support their "[[Number 10X]]" monsters necessary to maintain Don Thousand's curse on them.
