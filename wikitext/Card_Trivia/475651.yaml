title: Card Trivia:Bloom Diva the Melodious Choir
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ostinato]]".
  * This is the [[signature card]] of [[Zuzu Boyle]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** Like the signature cards of many of the other ''Yu-Gi-Oh!'' heroines, this card is performance-themed. In this case, this monster is based on an opera singer.
