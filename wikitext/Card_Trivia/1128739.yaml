title: Card Trivia:Steam Knight - BULLauncher
wikitext: |-
  {{Navigation}}

  * This monster is based on the [https://www.cocos-jpn.co.jp/menu/grand/hamburg/ beefstew], a menu item offered the Japanese branch of [[Wikipedia:ja:ココスジャパン|Coco's Bakery]].
  ** This monster's name is a portmanteau of "bull" and missile "launcher" as depicted in its artwork.
  * This card has the highest number of corner brackets ("「」", used as quotation marks in Japanese writing), with a total of 11:
  ** 「ＢＵＬＬａｕｎｃｈｅｒ」 is the name of the card.
  ** 「Ｃｏｃ－ＯＳ」 is the pun on '''Coco's''' Bakery.
  ** 「ＢＦＳ装甲」 ("BFS Armor") is an acronym for the "beef stew" poured into the steak.
  ** 「マデラ」 ("Madera") refers to [[Wikipedia:Madeira wine|Madeira wine]], which Coco's uses to accent the flavor of their beef stew.
  ** 「Ｆｏｉｌ－Ｐａｃｋｅｒ」 is mechanism further alludes to the tinfoil that "packs" in the hamburg steak.
  ** 「Ｂｅｅｆ－Ｒｉｆｌｅ」is a reference to the rifle attached to the leg of the beef in this card's artwork.
  ** 「包焼蒸騎」("Steam Knight") is the series name of this card and "[[Steam Knight - Hamburk]]".
  ** 「ＷＩＮＧｅａｒ」 and 「ＢＯＡＲｍｓ」 refers to the chicken and pork, the two other type of meat used in Coco's hamburger.
  **  「熟成合体」 (''Jukusei Gattai'', lit. "Maturity and Combined") is the name of cooking process for Coco's hamburger.
  ** 「包焼獣神－ＢＷ」("Steam Jushin - BW") with "B" refers to "beef" and "W" means "double". This name is a reference to [https://www.cocos-jpn.co.jp/menu/grand/hamburg/beefstew_foilpack_double2309.html Double Baked Hamburger with Rich Beef Stew] an item in Coco's menu.
