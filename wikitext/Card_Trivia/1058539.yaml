title: 'Card Trivia:Number C32: Shark Drake LeVeiss'
wikitext: |-
  {{Navigation}}

  [[File:Shark Drake LeVeiss with Chaos Overlay Units.png|thumb|300px|This monster's [[Xyz Material#In the anime|Chaos Overlay Units]], as seen in the commercial for ''[[Rage of the Abyss]]''.]]

  * This is the [[cover card]] of ''[[Rage of the Abyss]]''.
  * This monster's [[neutral form]] appears in the artwork of "[[Reincarnation Unveiling Mail]]".
  * This monster is a [[Rank-Up|Ranked-Up]] "[[Number C]]" form of "[[Number 32: Shark Drake]]".
  ** This monster has visual traits of "[[Number C32: Shark Drake Veiss]]" and "[[Number 17: Leviathan Dragon]]", both of which were used by [[Reginald Kastle]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  *** This monster's name is a portmanteau of "Shark Drake Veiss" and "LeVice Dragon", the Japanese name of "Leviathan Dragon".
  **** "Vice" also sounds similar to "Weiß", the German word for "white", which reflects this monster's white color scheme.
  ** In the commercial for ''Rage of the Abyss'', this monster has [[Xyz Material#In the anime|Chaos Overlay Units]], which are unique to "[[C (archetype)|C]]" [[Xyz Monster]]s of [[Barian]] origin. In the anime, "[[Number C32: Shark Drake Veiss (anime)|Number C32: Shark Drake Veiss]]" had normal Overlay Units instead.
  * This monster's [[ATK]]/[[DEF]] (3100/2600) follow the same pattern as "[[Number C39: Utopia Ray Victory]]", being respectively 300 and 500 higher than those of its base form (2800/2100).
  * When this card's text was initially revealed on the [https://web.archive.org/web/20240514033132/https://yu-gi-oh.jp/news_detail.php?page=details&id=1930 YU-GI-OH.jp website] and the ''V Jump'' July 2024 issue, its second effect was listed as two separate effects, while the ''V Jump'' magazine also stated that it had a [[Level]] instead of a [[Rank]]. Both the [https://x.com/yu_gi_oh_jp/status/1790215457443631285 YU-GI-OH.jp X account] and the [https://vjump.shueisha.co.jp/news/n10_20240521_01/ ''V Jump'' website] issued corrections afterwards.
