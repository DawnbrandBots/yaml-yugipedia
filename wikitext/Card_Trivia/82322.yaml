title: Card Trivia:Just Desserts
wikitext: |-
  {{Navigation}}

  * This card's Japanese name (自業自得, ''Jigou jitoku'') is a common Buddhist saying which is often translated as "You reap what you sow".
  ** This card's English name is a pun on the phrase "just deserts" (meaning the punishment or reward that one deserves), combining it with the homophone "dessert" (a sweet dish served at the end of a meal).
  * In the German dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card was named "Selber Schuld" which translates to "serves you right".
  * In the Latin American Spanish dubbed version of the ''Yu-Gi-Oh!'' anime, this card's name was translated as "Sólo Desierto",  meaning "Just Desert".
