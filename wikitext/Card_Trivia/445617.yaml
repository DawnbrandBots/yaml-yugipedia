title: Card Trivia:Predaplant Chimerafflesia
wikitext: |-
  {{Navigation}}

  * This monster is a combination of the ''[[wikipedia:Rafflesia|Rafflesia]]'' plant and the [[wikipedia:Chimera (mythology)|Chimera]].
  ** This monster's name may also be a reference to [[wikipedia:Graft-chimaera|horticultural chimeras]], a horticultural rarity where two different plant species or varieties fuse at the graft union to produce a new, distinct shoot, which reflects its non-animalistic appearance compared to the other "[[Predaplant]]" monsters, and its status as a [[Fusion Monster]].
  ** This monster's effect to decrease an opponent's monster's [[ATK]] and increase this monster's ATK by the same amount references how the ''Rafflesia'' is a parasitic plant, which derives its nutrition from other plants.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to decrease the opponent's monster's ATK by 1000 and increase this monster's ATK by the same amount is an alteration of its effect in the manga, which changes the opponent's monster's ATK to become its [[original ATK]] and increases this monster's ATK equal to the change. In {{chapter|ARC-V|009|ref}}, this monster's effect was used against "[[Frightfur Bear (manga)|Frightfur Bear]]", whose ATK was increased by 1000 via its effect, which allowed this monster to decrease "Frightfur Bear's" ATK and increase its ATK by 1000.
  * This monster's ''OCG''/''TCG'' pose is taken from a panel from the aforementioned chapter of the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga showing [[Predaplant Chimera Rafflesia (manga)|this monster]] being Summoned.
