title: Card Trivia:Sirenorca
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Siren (mythology)|siren]], a humanoid creature in [[wikipedia:Greek mythology|Greek mythology]] who takes the form of a beautiful human woman with an alluring voice that entices anyone who hears their song. The sirens are originally depicted as a human woman with the wings (or the body) of a bird before they became synonymous with [[wikipedia:Mermaid|mermaids]], a creature depicted with the upper body of a human woman and the lower body of a fish.
  * This monster is a combination of the monsters used by [[Reginald Kastle]] and [[Rio Kastle]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: [[Fish]] and [[Winged Beast]].
  ** This card's effect to change the [[Level]]s of all monsters between 3 or 5 reference the Kastle siblings' [[Duel]]ing strategies, which centers around the [[Xyz Summon]]ing of [[WATER]] [[Xyz Monster]]s whose [[Ranks]] range from 3 to 5.
