title: Card Trivia:Libromancer Doombroker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Libromancer Displaced]]", "[[Libromancer Intervention]]", and "[[Libromancer Prevented]]".
  * This monster is "[[Libromancer Agent]]" [[Card evolutions|empowered]] by the novel character that he can summon (according to the title of the novel that "Agent" is holding, the character is named "Deathbroker").
  ** The "Deathbroker" character also appears in the artwork of "Libromancer Agent".
