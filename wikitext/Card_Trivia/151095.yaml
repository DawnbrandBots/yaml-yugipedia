title: Card Trivia:White Veil
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect to inflict 3000 damage to the player when it leaves the [[field]] is an alteration of its effect in the ''[[Yu-Gi-Oh! GX]]'' anime, which inflicts damage to the controller of the [[equip]]ped monster equal to its [[ATK]] if that monster is [[destroy]]ed. In the [[Duel]]s where this card is used, it was equipped to "[[Armed Dragon LV10 (anime)|Armed Dragon LV10]]" and "[[White Night Dragon (anime)|White Night Dragon]]", both of whom have 3000 ATK.
  * The woman in this card's art bears a strong resemblance to [[Alexis Rhodes]].
