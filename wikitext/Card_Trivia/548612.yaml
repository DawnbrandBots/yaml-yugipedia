title: Card Trivia:Mamemaki
wikitext: |-
  {{Navigation}}

  * "[[Bean Soldier]]", "[[Jerry Beans Man]]", "[[Naturia Beans]]" and the goblin children from the artwork of "[[Gift Exchange]]" appear in this card's artwork.
  * This card's name and artwork reference the tradition of ''Mamemaki'' ("bean scattering") during [[wikipedia:Setsubun|Setsubun]], the day before the beginning of springtime in Japan.
  ** The unlucky goblin boy from the artwork of "Gift Exchange" is depicted being unhappy for being chosen as the ''oni'' for the other goblin children to throw their beans at, and is encouraged by other bean-based monsters as a result.
