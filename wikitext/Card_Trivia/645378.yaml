title: Card Trivia:Generaider Boss Stage
wikitext: |-
  {{Navigation}}

  * The symbol in this card's artwork appears in the artworks of "[[Dovelgus, Generaider Boss of Iron]]", "[[Frodi, Generaider Boss of Swords]]", "[[Hela, Generaider Boss of Doom]]", "[[Harr, Generaider Boss of Storms]]", "[[Jormungandr, Generaider Boss of Eternity]]", "[[Loptr, Shadow of the Generaider Bosses]]", "[[Mardel, Generaider Boss of Light]]", "[[Naglfar, Generaider Boss of Fire]]", "[[Nidhogg, Generaider Boss of Ice]]", "[[Utgarda, Generaider Boss of Delusion]]", "[[Generaider Boss Quest]]", "[[Generaider Boss Room]]", and "[[Generaider Token]]".
  ** Considering that the monsters of the "[[Generaider]]" archetype are references to [[wikipedia:Norse mythology|Norse mythology]], the image at the center of this card's artwork is likely a reference to the [[wikipedia:Norse cosmology|Nine Worlds]] of Norse mythology, connected together by [[wikipedia:Yggdrasil|Yggdrasil]].
  *** All of the [[Level]]/[[Rank]] 9 "Boss" monsters have one of the nine circles highlighted a certain color. This represents which of the nine worlds they reside in.
