title: Card Trivia:Iron Knight
wikitext: |-
  {{Navigation}}

  * This card is based on the prince from the fairy tale, ''[[wikipedia:Iron John|Iron John]]'', in which the prince frees the titular enchanted wild man from an iron cage, who takes the young prince to escape the kingdom's death penalty for releasing him. The exiled prince calls upon Iron John to help him in the war in the other kingdom he served in, and is granted a horse, a set of armor, and a legion of iron-clad soldiers.
  ** This card's effect losing 1000 [[ATK]] while controlling "[[Iron Hans]]" references how the exiled prince returns everything he borrowed from Iron John after successfully defending the kingdom and returns to his former position.
  ** This card's ''[[OCG]]''/''[[TCG]]'' effect [[add]]ing "Iron Hans" to the [[hand]] (or a [[Warrior]] monster while "[[Golden Castle of Stromberg]]" is on the [[field]]) further references how the exiled prince calls for Iron John's help to defend the kingdom, who provides the additional iron-clad soldiers provided by Iron John to defend the kingdom.
