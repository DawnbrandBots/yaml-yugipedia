title: Card Trivia:Property Spray
wikitext: |-
  {{Navigation|mode=nongame}}

  * "Property" is a word synonymous with "[[Attribute]]", which in turn is commonly used to describe the "elemental" groups of [[Monster Card]]s.
  * This card's artwork depicts a hand with long dark nails holding and using an aerosol spray can, similar to those appearing in the artwork of "[[Eradicating Aerosol]]".
  ** This card's artwork also depicts six bubbles and stripes on the spray can, which are colored after the corresponding Attributes: [[EARTH]] (represented by the color orange), [[WIND]] (represented by the color green), [[FIRE]] (represented by the color red), [[WATER]] (represented by the color blue), [[LIGHT]] (represented by the color yellow), and [[DARK]] (represented by the color purple).
