title: 'Card Trivia:Number 8: Heraldic King Genom-Heritage'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Flash of Heraldry]]".
  * The number "08" appears above this monster's left eye.
  * "[[Number]]" monsters often take the form of their owners and/or their original desires; this card represents its original owner, [[Vetrix]].
  ** This monster's title, "Heraldic King", reflects the heraldry theme of Vetrix's "[[Heraldic Beast]]" [[Deck]].
  ** "Genom Heriter"/"Genom-Heritage" both reference a [[wikipedia:Genome|genome]], the [[wikipedia:DNA|DNA]], or [[wikipedia:RNA|RNA]] information encoded in every [[wikipedia:Organism|organism]], that can be passed down to another member of another generation, which reflects this monster's effect to gain the name and effects of an opponent's [[Xyz Monster]].
  *** Fittingly, before this monster debuted in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, Vetrix forcibly "inherited" [[Hart Tenjo]]'s power in a ritual using energy chains resembling DNA chains.
  ** This monster's mask-like face with a red eyes and the number "08" above its left eye is similar to Vetrix's appearance, who had a mask with a red gem covering the left side of his face.
  ** This monster's [[Psychic]] [[Type]] and effect to gain the name, effects, and [[ATK]] of an opponent's Xyz Monster's and reducing its ATK to 0 and negating its effects reflect Vetrix's ability to steal his opponent's memories, which can affect them psychologically and render them vulnerable in [[Duel]]s.
  *** Furthermore, this monster's anime effect treated the [[target]]ed monster's name as "[[Unknown]]".
  * This is the first Psychic "Number" monster.
  * This is the first "Number" monster to require monsters of a specific [[archetype]] ("Heraldic Beast") as [[Xyz Material]]s to be [[Xyz Summon]]ed.
  * This is one of the few Xyz Monsters whose effects do not involve [[detach]]ing its own Xyz Materials.
  ** However, because its effects allow it to gain the effects of other Xyz Monsters, this monster may detach its [[material]]s to use the copied effects.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster detached an Xyz Material to [[activate]] its effect, it absorbed it through its mask. Then, it wrapped its hair around the targeted monster and absorbs the appearance and the color of the monster. This monster absorbed red material, then glowing red as it changed its appearance to resemble a masked version of the [[target]]ed monster.
  * This card's European ''[[TCG]]'' version has its effect printed in a smaller font than the American ''TCG'' version.
