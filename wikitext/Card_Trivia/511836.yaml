title: Card Trivia:Giltia the D. Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fusion Shot]]".
  * The "D." in this monster's name stands for "Dark", which is ironic, as its [[Attribute]] is [[LIGHT]].
  * This monster has a [[signature move]] counterpart: "[[Giltia the D. Knight - Soul Spear]]".
  * This is the first LIGHT monster to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** This is also one of the first [[Fusion Monster]]s to appear in the anime, along with "[[Empress Judge]]", "[[Labyrinth Tank]]", "[[Punished Eagle]]", "[[Roaring Ocean Snake]]", and "[[Skelgon]]".
  * This monster, "[[Barox]]", "[[Bickuribox]]", "[[Flame Swordsman]]", "[[Labyrinth Tank]]", and "[[Zombie Warrior]]" are the only [[Normal Monster]]s whose [[Monster Card|Monster]] [[Card type]]s were changed to [[Fusion Monster]] upon their release in the ''[[OCG]]''/''[[TCG]]''. Notably, these are all monster Summoned in the [[Duelist Kingdom (arc)|Duelist Kingdom arc]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and anime.
  ** Also, this monster, "Flame Swordsman", and "[[Thousand Dragon]]" are the three monsters used by [[Joey Wheeler]] in the Duelist Kingdom arc whose card types were changed to Fusion Monster types upon their release in the ''OCG''/''TCG''.
