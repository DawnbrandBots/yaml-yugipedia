title: Card Trivia:Time Stream
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! GX]]'' anime and the ''[[Yu-Gi-Oh! Tag Force]]'' video games, this card could [[Tribute]] monsters from the listed "[[Cenozoic]]" and "[[Mesozoic]]" [[archetype]]s and [[Special Summon]] a higher-[[Level]] "Mesozoic" or "[[Paleozoic (anime)|Paleozoic]]" monster respectively. This is a reverse order of the [[wikipedia:Era (geology)|geologic eras]] of the [[wikipedia:Phanerozoic|Phanerozoic]] [[wikipedia:Geologic time scale#Terminology|Eon]], which lists the [[wikipedia:Paleozoic|Paleozoic]], [[wikipedia:Mesozoic|Mesozoic]], and [[wikipedia:Cenozoic|Cenozoic]] eras in that order. The older the period, the stronger the monster. In the anime, this card's effect is referred to as "devolving" its [[target]] by [[Jim Crocodile Cook]].
