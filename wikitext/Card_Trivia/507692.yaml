title: Card Trivia:Warrior Dai Grepher
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Array of Revealing Light]]", "[[Attack Pheromones]]", "[[Cry Havoc!]]", "[[D.D. Post]]", "[[Dai Dance]]", "[[Different Dimension Ground]]", "[[Dimension Wall]]", "[[Dimensional Inversion]]", "[[Double Dai]]", "[[Expendable Dai]]", "[[Falling Down]]", "[[Fusion Trench]]", "[[Gravity Fluctuation]]", "[[Gravity Lash]]", "[[How Did Dai Get Here?]]", "[[Morale Boost]]", "[[Painful Return]]", "[[Rivals Unite]]", "[[Sakuretsu Force]]", "[[Simultaneous Loss]]", "[[The A. Forces]]", "[[The Paths of Destiny]]", "[[Umbral Horror Retaliation]]", and  "[[Unexpected Dai]]".
  * This card has several counterparts:
  ** 1 [[Gemini monster]]: "[[Knight Day Grepher]]".
  ** 1 "[[Lightray]]" monster: "[[Lightray Grepher]]".
  ** 1 [[Dark counterpart]]: "[[Dark Grepher]]".
  ** 1 "[[Chaos]]" counterpart: "[[Chaos Grepher]]".
  ** 3 "[[LV]]" [[Dark Lucius]] forms: "[[Dark Lucius LV4]]", "[[Dark Lucius LV6]]", and "[[Dark Lucius LV8]]".
  * Similar to "[[Gagagigo]]", "[[Goblin of Greed]]", "[[Dark King of the Abyss]]", and "[[Warrior Lady of the Wasteland]]", this monster has a [[lore]] told through various other card artworks.
  ** This monster seems to be a recurring rival to "Warrior Lady of the Wasteland", and their rivalry continues after she becomes "[[D.D. Warrior Lady]]"; they are seen battling in "Simultaneous Loss", "Dimension Wall" and "Different Dimension Ground" (where this monster has become "Dark Lucius LV4").
  ** In "Dai Dance", he attempts to court "D.D. Warrior Lady", much to her visible chagrin.
  * Both this monster and "[[Dark Blade]]" share an ability to manipulate [[Dragon]] monsters; they are also [[Normal Monster]]s who can be [[Fusion Material|Fused]] with a Dragon to form a [[Fusion Monster]]: "[[Dark Blade the Dragon Knight]]" for "Dark Blade" and "[[Ryu Senshi]]" for this card.
