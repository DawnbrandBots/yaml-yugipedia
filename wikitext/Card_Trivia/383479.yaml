title: Card Trivia:Zefrasaber, Swordmaster of the Nekroz
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chosen of Zefra]]".
  * This monster is the "[[Zefra]]" counterpart of "[[Great Sorcerer of the Nekroz]]". This is reflected by his Level, Attribute, ATK, and DEF being the same as those of "Great Sorcerer".
  * This is the first Monster Card that can Ritual Summon a [[Ritual Monster]].
  * This monster has the same white sphere as "[[Apoqliphort Skybase]]" and "[[Infernoid Pirmais]]".
  * Until the release of "[[Performapal Odd-Eyes Synchron]]", this was the first card to be simultaneously a member of three archetypes.
  * This monster is wearing/wielding the weapons of the following "[[XX-Saber]]" monsters:
  ** The forearm blade of "[[XX-Saber Gardestrike]]" (on his right forearm)
  ** The sword of "[[XX-Saber Faultroll]]" (on his left arm)
  ** The blade of the scythe of "[[XX-Saber Darksoul]]" (on his right shoulder)
  ** The whip sword of "[[XX-Saber Fulhelmknight]]" (in his right hand)
  ** The sword of "[[XX-Saber Hyunlei]]" (in his right hand)
  ** The twin swords of "[[XX-Saber Emmersblade]]" (attached to his waist)
  ** The hilts of the twin daggers of "[[XX-Saber Ragigura]]" (attached to aforementioned twin swords)
  ** The sword of "[[XX-Saber Boggart Knight]]" (in his left hand)
  ** The animal-like horned weapons of "[[XX-Saber Garsem]]" (attached to his feet)
  ** The blade of "[[Sword of Sparkles]]" of "[[XX-Saber Gottoms]]" (attached to his waist)
