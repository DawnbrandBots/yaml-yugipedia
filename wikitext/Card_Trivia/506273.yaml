title: Card Trivia:Trap Jammer
wikitext: |-
  {{Navigation}}

  * A circle made from four mirror images of the top right section of "[[Dark Magical Circle]]" appears in this card's artwork.
  ** "[[Bear Trap]]" appears in this card's ''[[OCG]]''/''[[TCG]]'' artwork, while the card "[[Mirror Wall]]" appears in this card's anime artwork.
  * Unlike the Japanese version of "[[Magic Jammer]]", this card's artwork does not depict a hexagram, although it was shown with one in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' and ''[[Yu-Gi-Oh! GX]]'' anime.
