title: Card Trivia:Let's Go Together
wikitext: |-
  {{Navigation}}

  * The monsters in this card's artwork also appear in the artwork of "[[In Papa's Footsteps]]".
  ** The monsters in this card's artwork are based on ''yukinko'' (雪ん子, "snow child"), a Japanese ''[[wikipedia:Yōkai|yōkai]]'' that usually resembles a small child wearing a straw coat.
  * This card's Japanese name ({{Ruby|夙|つと}}めてはしろ {{Ruby|二人|ふたり}}ではしろ, ''Tsutomete wa Shiro Futari de Hashiro''), has 7-7 syllables, when combined with the Japanese name of "In Papa's Footsteps" can be interpreted as the ''shimo-no-ku'' part in ''[[wikipedia:Tanka|tanka]]'', a classical Japanese poetry. 
  ** This card's effect reflects the formula of a ''tanka''; the player must [[banish]] the top '''seven''' cards of their [[Deck]] and the opponent also banishes '''seven''' cards from their [[Extra Deck]] and/or the top of their Deck.
  ** 「{{Ruby|夙|つと}}めて」 is an archaic Japanese word that means "early morning", which reflects the break of dawn depicted in this card's artwork.
  ** The use of 「はしろ」 in both phrases of this card's name forms a pseudo-rhyme that uses the same characters with different readings and meanings. The first use (''wa Shiro'') means "is white", and the second use (''hashiro'') means "run" (similar to what the ''yukinko'' is depicted doing in this card's artwork).
  ** This card's Korean and Simplified Chinese names are also written with two phrases consisting of 7 phonetic units each, mirroring the structure of ''tanka'', both of which form a rhyme.
  * The ''ad hoc'' word 成霜 (''Chéng Shuāng'') in the phrase 笑语成霜 (''Xiào Yǔ Chéng Shuāng'', lit. "Laughter turns to frost") in this card's Simplified Chinese name is a pun on the homonym 成双 (lit. "to come as a pair"), meaning "laughing as a pair together" in context.
