title: Card Trivia:Sky Striker Mecharmory - Hercules Base
wikitext: |-
  {{Navigation}}

  * This card's name references the the [[wikipedia:Lockheed C-130 Hercules|Lockheed C-130 Hercules]], an American military transport aircraft. Fittingly, the code "S-130" appears on this base's right wing.
  * This card's artwork was adapted into a panel in {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|4|ref}}, where the "S-130 Hercules Base" is in the hangar preparing for takeoff.
