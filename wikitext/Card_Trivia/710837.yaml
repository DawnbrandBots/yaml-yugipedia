title: Card Trivia:Eldlixir of Black Awakening
wikitext: |-
  {{Navigation}}

  * The philosopher's stone embedded in the chest of "[[Eldlich the Golden Lord]]" appears in this card's artwork.
  * This is one of three "[[Eldlixir]]" cards that represents the three stages of the ''[[wikipedia:Magnum opus (alchemy)|Magnum opus]]'' process. ("'''Eldlixir of Black Awakening'''" → "[[Eldlixir of White Destiny]]" → "[[Eldlixir of Scarlet Sanguine]]")
  ** This card is based on [[wikipedia:Nigredo|nigredo]] (or '''blackness'''), the first step of the process representing putrefaction or decomposition.
  *** In alchemy, the process of blackness is the first step in the pathway to the [[wikipedia:Philosopher's Stone|philosopher's stone]], where all alchemical ingredients had to be cleansed and cooked extensively to a uniform black matter. Fittingly, this card's artwork depicts the philosopher's stone's color being black, which would later change in the aforementioned cards' artworks.
