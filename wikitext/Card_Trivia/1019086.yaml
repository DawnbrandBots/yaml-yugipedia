title: Card Trivia:Hiyari @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located at the top of this monster's horn.
  * This monster and "[[Water Leviathan @Ignister]]" represent [[Aqua (character)|Aqua]], the [[WATER]] [[Ignis]].
  ** This monster's name is based on "''hiyahiya''", the Japanese onomatopoeia for "chilly", which is commonly associated with ice, the frozen state of water.
  ** This monster's design and color scheme are based on those of the dress worn by "[[Marincess Wonder Heart]]", the last monster used by Aqua while partnered with [[Skye Zaizen|Blue Maiden]] before her termination at the hands of [[Bohman]].
  ** This monster's body resembles an upside-down version of Aqua's teardrop-shaped head, or one of her teardrop-shaped pigtails.
  ** This monster's effect is designed to facilitate the [[Ritual Summon]]ing of "Water Leviathan", which can be done by [[add]]ing it and/or "[[A.I.'s Ritual]]" from the [[Deck]] to the [[hand]], and changing its [[Level]].
  *** This monster's ''[[OCG]]''/''[[TCG]]'' effect to change its Level to 4 is an alteration of its effect after [[Tribute|Tributing]] an "@Ignister" [[Link Monster]], which can increase its Level by the [[Link Rating]] of the Tributed monster. In the ''[[Yu-Gi-Oh! VRAINS]]'' anime, [[Ai]] Tributes the [[Link-3]] "[[Fire Phoenix @Ignister (anime)|Fire Phoenix @Ignister]]" and increases this monster's Level by 3, changing its Level from 1 to 4.
