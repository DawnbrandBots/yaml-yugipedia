title: Card Trivia:Ikelos, the Dream Mirror Sprite
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dream Mirror Hypnagogia]]".
  * The back of "Ikelos, the Dream Mirror Mara" appear in the mirror in this card's artwork.
  * This monster is named after [[wikipedia:Phobetor|Ikelos]], one of the thousand sons of [[wikipedia:Somnus|Somnus]], the personification of sleep from [[wikipedia:Roman mythology|Roman mythology]], from [[wikipedia:Ovid|Ovid]]'s ''[[wikipedia:Metamorphoses|Metamorphoses]]''.
  ** It is also named after a [[wikipedia:Sprite (folklore)|sprite]], a [[wikipedia:Supernatural|supernatural]] entity often depicted as a [[wikipedia:Fairy|fairy]]-like creature or as an ethereal entity.
  * This monster has a [[DARK]] [[counterpart]]: "[[Ikelos, the Dream Mirror Mara]]".
  ** Both have the same [[Level]] (1) and [[Type]] ([[Fairy]]), but opposite [[Attribute]]s and [[ATK]]/[[DEF]].
