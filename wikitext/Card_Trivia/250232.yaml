title: Card Trivia:Divination of Fate
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's artwork is similar to the artwork of "[[Bending Destiny]]".
  ** Fittingly, both cards are used by different antagonistic characters who use fortune-telling [[Deck]]s in the anime. This card is used by [[Sartorius]], who uses the "[[Arcana Force]]" Deck in ''[[Yu-Gi-Oh! GX]]'', while "Bending Destiny" is used by [[Carly Carmine]], who uses the "[[Fortune Lady]]" [[Deck]] in ''[[Yu-Gi-Oh! 5D's]]''.
