title: Card Trivia:Artifact Labrys
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Labrys|Labrys]], the double-headed [[wikipedia:axe|axe]] that was said to have originated from [[wikipedia:Crete|Crete]].
  ** In addition, this monster may also be based on the boss character [[fandom:w:c:megamitensei:Labrys|Labrys]] from the ''[[wikipedia:Persona (series)|Persona]]'' series of video games. The two share similar designs (teenage females with long ponytails) and wield similar mechanical Labrys weapons.
  * The inert artifact form of this monster appears in the artwork of "[[Artifact Sanctum]]".
