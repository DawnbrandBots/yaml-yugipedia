title: Card Trivia:Horus the Black Flame Dragon LV8
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Soul of the Duelist]]'', as well as one of the cover cards of ''[[Expert Edition Volume 3]]''/''[[Dark Revelation Volume 3]]''.
  * This monster appears in the artworks of "[[Canopic Protector]]" and "[[Level Up!]]".
  * "[[Dark Magical Circle]]", with an [[Eye of Wdjat]] in its center, appears in this card's artwork.
  * This monster is the [[Card evolutions|upgraded]] form of "[[Horus the Black Flame Dragon LV4]]" and "[[Horus the Black Flame Dragon LV6]]".
  ** The artwork of "Level Up!" depicts the transformation of "Horus the Black Flame Dragon LV6" into this monster, which also reveals that this monster's arms are inside the chest of its "LV6" form.
  * This monster has a [[Dark counterpart]]: "[[Dark Horus]]".
  * This monster has a [[retrained]] counterpart: "[[Horus the Black Flame Deity]]".
  * This monster, "[[The Creator]]", and "[[Sacred Phoenix of Nephthys]]" are possibly connected to each other:
  ** They are all representations of Egyptian deities.
  ** They all share similar physical traits, including a mechanical appearance and a blue gemstone.
  ** They all have Dark counterparts: "Dark Horus", "[[The Dark Creator]]", and "[[Dark Nephthys]]".
  ** They were released as the [[cover card]]s for the consectuive [[Series 4]] [[Core Booster|Core Booster packs]]: ''[[Soul of the Duelist]]'' (this monster), ''[[Rise of Destiny]]'' ("The Creator"), and ''[[Flaming Eternity]]'' ("Sacred Phoenix of Nephythys").
  ** They each have a support monster first released in the same Core Booster packs they debuted in that have a humanoid design: "[[Horus' Servant]]", "[[The Creator Incarnate]]", and "[[Hand of Nephthys]]".
