title: Card Trivia:Shogi Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Xyz Align]]".
  * This monster is based on the ''keima'' piece in the game of [[wikipedia:Shogi|shogi]], which is also known in English as the "knight".
  ** This monster's Japanese name, "K Horse" ({{Ruby|Ｋ|ケイ}}ホース, ''Kei Hosu'') is a pun on ''keima''; the English letter "K" is pronounced "''kei''", while the Japanese word for horse is "ma" (馬).
  ** This monster's appearance is based on a [[wikipedia:centaur|centaur]], a half-man half-horse creature from [[wikipedia:Greek mythology|Greek mythology]]. This reflects its [[Beast-Warrior]] [[Type]], as its appearance consists of the bottom half of a horse (representing the Japanese name of the ''keima'' piece, as horses are represented by the [[Beast]] Type) and the top half of a sword-wielding humanoid (representing the English name of the ''keima'' piece, as knights are represented by the [[Warrior]] Type).
  ** This monster's manga effect reflects the movement of ''keima'', which is restricted to moving two squares forward followed by one square sideways, similar to how this monster can move into the opponent's [[Spell & Trap Zone]] and [[destroy]] one [[Set]] card sideways from its position.
  * This monster's weapon is based on the ''[[Wikipedia:Zhanmadao|zhanmadao]]'', a single-bladed anti-cavalry Chinese sword that is also known as the "horse-butchering zao".
  * This card's artwork is taken from {{chapter|ZEXAL|025|ref}}, specifically from the panel showing [[Line Monster K Horse|this monster]] being Summoned.
