title: Card Trivia:Naturia Spiderfang
wikitext: |-
  {{Navigation}}

  * This monster and its effect to prevent itself from declaring an attack unless the opponent [[activate]]d a [[Spell]]/[[Trap Card]] or any card [[effect]] that turn are based on the behavior of certain web-spinning [[wikipedia:Spider|spiders]]; they build their webs and then wait for prey to become ensnared in the silk before they attack.
