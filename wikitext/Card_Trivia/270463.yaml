title: Card Trivia:Tellus the Little Angel
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Terra (mythology)|Tellus Mater]], another name for "Mother Earth" in [[wikipedia:Roman mythology|Roman mythology]].
  * This card's ''[[OCG]]''/''[[TCG]]'' [[Ignition Effect]] is based on its appearance in {{chapter|R|039|ref}}, when [[Yako Tenma]] used "[[Multiply (manga)|Multiply]]" to turn his single "[[Tellus Wing Token (manga)|Tellus Wing Token]]" into three copies.
  * In the ''[[Yu-Gi-Oh! R]]'' special chapter "[[Summon The Dark Ruler!!]]", this card's Japanese name was simply "Tellus" (テルス).
