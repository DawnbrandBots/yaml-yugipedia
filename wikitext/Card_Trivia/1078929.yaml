title: Card Trivia:Dragon of Illumination, Sanctuary's Shield
wikitext: |-
  {{Navigation}}

  * A tower resembling the [[wikipedia:Seattle Space Needle|Seattle Space Needle]] appears in the background of this card's artwork, referencing how the [[Yu-Gi-Oh! World Championship 2024|''Yu-Gi-Oh!'' World Championship 2024]] was held in [[wikipedia:Seattle|Seattle]], [[wikipedia:Washington (state)|Washington]].
  * This monster is an [[Effect Monster|Effect]] [[Match winner]] [[counterpart]] of "[[Blue-Eyes White Dragon]]".
  ** This monster has the same [[Attribute]] ([[LIGHT]]), [[Level]] (8), and [[ATK]]/[[DEF]] (3000/2500) as "Blue-Eyes White Dragon".
  * This monster has a "[[Dark Magician]]"-based counterpart: "[[Masterful Magician, Servant of the Sanctuary]]".
  ** Oddly, this monster was released one year later than "Masterful Magician".
  * This card and "[[Elttaes, the MASTER of DUELS]]" are the first ''[[Yu-Gi-Oh! Rush Duel]]'' cards to be printed in English.
  ** They are also the first ''Yu-Gi-Oh! Rush Duel'' Match winners.
