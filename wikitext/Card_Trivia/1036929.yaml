  * "[[Fallen of Argyros]]" and the wreckage of several "[[Therion]]" monsters (including "[[Therion "Duke" Yul|"Duke" Yul]]" and "[[Therion "Empress" Alasia|"Empress" Alasia]]") appear in this card's artwork.
