title: Card Trivia:An Owl of Luck
wikitext: |-
  {{Navigation}}

  * This monster has a [[Trap Card]] counterpart: "[[A Cat of Ill Omen]]"
  ** Both are [[Flip monster]]s whose [[Flip effect]]s can involve "[[Necrovalley]]".
  ** Both are based on superstitions centered around certain animals and luck; in this monster's case, owls in [[wikipedia:Owl|modern Japan]] are regarded as lucky and often seen on talismans or charms.
