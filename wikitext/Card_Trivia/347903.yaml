title: Card Trivia:Bujingi Sinyou
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * This is the sword that "[[Bujinki Amaterasu]]" is wielding.
  * The [[wikipedia:Sin-you|Sin-you]] (also called Hiai Chai, Chiai Tung, or Kai Tsi) is a mythical [[wikipedia:Chinese culture|Chinese]] [[wikipedia:Chimera (mythology)|chimerical]] creature known throughout various [[wikipedia:East Asian cultural sphere|East Asian culture]]s, and is often compared to the [[wikipedia:Qilin|Qilin]] (in this case "[[Bujingi Quilin]]").
  * This is the only "Bujingi" monster to be printed in a rarity higher than [[Super Rare]].
