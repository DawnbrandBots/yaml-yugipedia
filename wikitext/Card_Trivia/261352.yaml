title: Card Trivia:Gorgonic Guardian
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gorgon Charm]]", "[[Gorgonic Ritual]]" and "[[Gorgonic Temptation]]".
  * This monster is based on the [[wikipedia:Gorgon|Gorgon]], a feminine half-human, half-snake creature from [[wikipedia:Greek mythology|Greek mythology]] known for having sharp fangs and venomous snakes for hair.
  ** This monster's effect to make an opponent's monster's [[ATK]] become 0 and [[negate]] its effects is a reference to the Gorgon's power to turn people who look upon it to stone with their gaze.
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, [[Reginald Kastle|Nash]] used a mirror shield to defeat this monster's gaze, referencing how the Gorgon [[wikipedia:Medusa|Medusa]] was defeated by [[wikipedia:Perseus|Perseus]] by using the shield to deflect her gaze.
  * This monster's design features [[wikipedia:heterochromia iridum|heterochromia iridium]], a term used to describe the different-colored irises in the eyes of a living being.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this monster served as part of [[Vector|Vector's]] army in his past life.
