title: Card Trivia:Insect Neglect
wikitext: |-
  {{Navigation}}

  * The original Japanese card name is a complicated pun, as the kanji "無視加護" is pronounced "''Mushikago''", which can mean "Insect Cage", but the kanji themselves mean "disregard" and "divine protection"; hence, its OCG name is sometimes given as "Divine Protection of the Disregarded".
  * "[[Naturia Beetle]]" appears in this card's artwork.
  * This card's English name bears a strong allusion to Franz Kafka's ''[[wikipedia:The metamorphosis|The Metamorphosis]]''.
