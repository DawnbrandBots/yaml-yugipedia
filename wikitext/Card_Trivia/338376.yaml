title: Card Trivia:Assault Blackwing - Raikiri the Rain Shower
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Black Feather Illusion]]".
  * This monster's name is based on ''Raikiri'' (雷切, lit. "Lightning Cutter"), a famous Japanese sword used by the samurai, [[wikipedia:Tachibana Dōsetsu|Tachibana Dōsetsu]].
  ** "Rain" is also a reference to a story about Dōsetsu: one rainy day, he took shelter under a tree when all of a sudden, a bolt of lightning struck him. Dōsetsu used his sword ''Chidori''  (千鳥, lit. "A Thousand Birds") to cut the Thunder God inside the lightning bolt, allowing him to survive. After this incident, he renamed his sword ''Chidori to Raikiri'' (雷切, lit. "Lightning Cutter").
  *** Fittingly, this monster shares the same [[Level]] (7) and [[original ATK and DEF]] (2600/2000) with its fellow member of the "[[Assault Blackwing]]" sub-[[archetype]], "[[Assault Blackwing - Chidori the Rain Sprinkling]]".
