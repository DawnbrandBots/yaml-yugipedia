title: Card Trivia:White Papillon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Wingstream]]".
  * Despite not being a member of the "[[Papillon]]" [[archetype]] (since its Japanese name does not contain「パピヨン」 ''Papiyon''), [[Jesse Anderson (manga)|Jesse Anderson]] still considered this monster a valid target for the effect of "[[Butterfly Fairy]]" in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
