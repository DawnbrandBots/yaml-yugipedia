title: Card Trivia:Grand Convergence
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Grand cross (astrology)|grand cross]], an astrological event where four planets of a different [[wikipedia:Classical element|classical elemental alignment]] (fire, wind, earth, and water) are aligned in such a way that they are 90 degrees apart from each other and form a perfect cross. A grand cross is often seen as a sign of tension and inability to progress because the different aspects of the personality are at odds with each other.
  ** This card's Japanese artwork features a cross connecting all of the aligned planets. Prior to its re-release in ''[[The Lost Art Promotion 2023 I]]'', the cross was removed from this card's ''[[TCG]]'' artwork to avoid religious connotations; however, the cross is still visible in this card's artwork in the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This card's artwork is based on the depiction of the [[wikipedia:Solar System|Solar System]] before 2006, when [[wikipedia:Pluto|Pluto]] was still considered as the ninth planet before its demotion to a [[wikipedia:Dwarf planet|dwarf planet]].
