title: Card Trivia:Gemini Elf
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster Chronicle]]''.
  * These monsters appear in the artworks of "[[Break Away]]", "[[Death and Rebirth]]", and "[[Non-Spellcasting Area]]".
  * Despite being depicted as twin elves, this monster's name is written in singular form.
  * This monster has a [[Toon monster|Toon]] [[counterpart]]: "[[Toon Gemini Elf]]".
  * This monster appears to be a counterpart of "[[Gemini Imps]]", which also depicts twin monsters with blue and purple color schemes.
  * This is the first [[Level 4]] [[Normal Monster]] with 1900 [[ATK]].
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', the brunette elf is named Kachua and the blond elf is named Lora.
  * This  monster's Portuguese name ("Elfos Gêmeos Toon") is male-gendered, despite the fact that both elves are depicted as female.
