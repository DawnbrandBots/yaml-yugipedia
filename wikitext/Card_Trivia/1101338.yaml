title: Card Trivia:See Me Rolling
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to a lyric in the song, "[[wikipedia:Ridin'|Ridin']]" by [[wikipedia:Chamillionaire|Chamillionaire]], in which "rolling" refers to the act of driving, while this card's effect refers to the act of tossing a [[Dice|die]].
