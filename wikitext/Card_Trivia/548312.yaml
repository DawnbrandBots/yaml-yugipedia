title: Card Trivia:Ridiculing World
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card can be seen as a twisted [[counterpart]] of "[[Smile World]]".
  ** Its naming scheme and its [[ATK]]-boosting effect are similar to those of "Smile World".
  ** This is also reflected in this card's artwork, which depicts evil spirits laughing at the man suffering, as opposed to the artwork of "Smile World", which depicts colorful shapes with smiling faces and joyous laughter.
  *** Similarly, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, when both cards are [[activate]]d, the smiling figures from their respective cards' artwork elicit a noticeable reaction from the affected monsters. In this card's case, the evil spirits from this card's artwork elicit angry and irritated reactions from [[Yuya Sakaki]]'s monsters.
