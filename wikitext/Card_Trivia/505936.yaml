title: Card Trivia:Prevent Rat
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart]]: "[[Armored Rat]]".
  * This card's Spanish print features several errors, as it shows its [[Type]] as "''B'''é'''stia''" instead of "''B'''e'''stia''" ([[Beast]]), and its lore lacks of diacritical marks in "''est'''a''' escudada''" and "''defendi'''e'''ndose a s'''i''' misma''" (it should be "''est'''á''' escudada''" and "''defendi'''é'''ndose a s'''í''' misma''", respectively).
