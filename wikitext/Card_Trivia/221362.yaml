title: Card Trivia:Heroic Champion - Gandiva
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Gandiva|Gandiva]], a mythological bow in Hinduism.
  ** This monster's name and appearance as a feminine figure riding a horse likely references [[wikipedia:Lady Godiva|Lady Godiva]], an 11th-century Anglo-Saxon noblewoman who, according to a legend, rode naked through the streets of Coventry in order to gain a remission of the oppressive taxation imposed by her husband on his tenants.
