title: Card Trivia:Queen Butterfly Danaus
wikitext: |-
  {{Navigation}}

  * This monster's name and appearance are based on the ''[[wikipedia:Danaus (genus)|Danaus]]'', a genus of monarch butterflies, which are sometimes referred to as the "queens butterfly". This is further reinforced by this monster's title, "Queen", which is given to female monarchs.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|057|ref}}, specifically from the panel showing [[Queen Butterfly Danaus (manga)|this monster]] being Summoned.
