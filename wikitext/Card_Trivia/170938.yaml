title: Card Trivia:Construct Element
wikitext: |-
  {{Navigation|mode=nonGame}}

  * One half each of "[[Elemental HERO Gaia]]" and "[[Elemental HERO Great Tornado]]" appear in this card's artwork. Despite this, this card could not be used to change one into the other, as the former is [[Level]] 6 and the latter is Level 8.
  * This card is an "[[Elemental HERO]]" version of the "[[Masked HERO]]" support cards "[[Mask Change]]", "[[Mask Change II]]", and "[[Form Change]]". All allow monsters to be returned to the [[Main Deck|Deck]] or [[Extra Deck]] to [[Special Summon]] others, based on [[Level]].
  * This card is an "Elemental HERO" version of the "[[Neo-Spacian]]" support cards "[[EN Shuffle]]" and "[[Cross Change]]".
