title: Card Trivia:Gravity Bind
wikitext: |-
  {{Navigation}}

  * The orb from this card's artwork appears in the artwork of "[[Attribute Gravity]]".
  * This card appears in the artwork of "[[Photon Hurricane]]".
  * This card's artwork depicts the enigmatic design of the "fabric of space," an interweaving grid of squares that shows any distortion in space, like gravity; however, this artwork depicts the concept is reverse, as instead of causing the depression in the grid, the mass (which is represented by the blue ball) is bound by it, reflecting this card's effect to "bind" [[Level 4]] or higher monsters and prevent them from attacking.
  * This card has a "[[Morphtronic]]" [[counterpart]]: "[[Morphtronic Bind]]".
  * This card has an [[Anime-only|anime-exclusive]] counterpart: "[[Gravity Gain]]".
