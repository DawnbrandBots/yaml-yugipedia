title: Card Trivia:Confusion Chaff
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Chaff (countermeasure)|chaff]], a radar countermeasure which involves dispersing thin strips of aluminum, metallized glass fiber, or plastic with the intention of blinding or disrupting radar systems.
  ** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this card is [[activate]]d, it shatters into glowing strips, which blinds the opponent's second monster attacking the player directly, disrupts its attack, and forces it to blindly attack the opponent's first monster that attacked the player directly.
