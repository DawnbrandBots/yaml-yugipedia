title: Card Trivia:Reptilianne Vaskii
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Vasuki|Vasuki]] is a [[wikipedia:Naga|naga]] in Asian mythology; the king of nagas in Buddhist and Hindu mythology and one of the eight Great Naga Kings in Japanese and Chinese mythology.
  ** Despite nagas being male beings (their female counterparts are known as nagini), this monster is a female.
  * The monster on the card is holding a lotus flower, which is an important symbol in several Asian mythologies.  In Buddhist and Hindu myth, it is the symbol of immortality.
  ** It also looks similar to the card "[[Samsara Lotus]]", a monster based around the concept of [[wikipedia:Samsara|Samsara]], the cycle of life, death, and rebirth within [[wikipedia:Hinduism|Hinduism]].
  * This card bears a strong resemblance to "[[Otohime]]".
