title: Card Trivia:Doomkaiser Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Return of the Zombies]]" and "[[Zombie Reborn]]".
  * The word "Kaiser" in this monster's name is the German word for "emperor".
  * This monster is the [[Zombie counterpart]] of "[[Chthonian Emperor Dragon]]".
  ** This monster's name is based on the Japanese name of "Chthonian Emperor Dragon": "Hell Kaiser Dragon".
  * This monster has an [[Card evolutions|upgraded]] "[[/Assault Mode]]" form: "[[Doomkaiser Dragon/Assault Mode]]".
