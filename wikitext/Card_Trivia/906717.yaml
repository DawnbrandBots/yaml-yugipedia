title: Card Trivia:CAN - Re:D
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Dynamic Eternal Live!!]]''.
  * A costume of this monster appears in both artworks of "[[Necromaid Stitch]]".
  ** "[[Necromaid Nana]]" is [[cosplay]]ing as this monster in the artwork of "[[Necromaid Re:D]]".
  * This monster is an adult version of "[[CAN:D]]".
  ** This monster's [[wikipedia:Electronic keyboard|keyboard]] references the toy keyboard being played by "CAN:D" in the artwork of "[[JAM:P Start!]]".
  ** This monster's name is a portmanteau of "CAN:D" (which is itself a spelling of "candy" using the smiling [[wikipedia:emoticon|emoticon]] ":D") and "ready".
  *** "Re" is also used in music to denote the key of D within the fixed-Do solfege system.
  *** The Japanese pronunciation of "Re:D" is similar to "''redi''", the Japanese pronunciation of "lady".
