title: Card Trivia:Secrets of Dark Magic
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" and the ceremonial torches from the artwork of "[[Black Magic Ritual]]" appear in this card's artwork.
  ** "[[Magician of Black Chaos]]" appears in this card's second artwork.
  *** The appearance of "Magician of Black Chaos" in this card's second artwork is taken from {{chapter|Yu-Gi-Oh!|130|ref}}, specifically from the panel showing [[Magician of Black Chaos (manga)|that monster]] being Summoned.
  ** The red and blue spiral patterns in this card's artwork references the cards that can [[Fusion Summon]], which commonly features a spiraling pattern consisting of two different colored spirals in their artwork (e.g. "[[Polymerization]]").
  * This is the first card that allows the player to either Fusion Summon or [[Ritual Summon]].
