title: Card Trivia:Solemn Scolding
wikitext: |-
  {{Navigation}}

  * The man in the artworks of "[[Solemn Judgment]]", "[[Solemn Authority]]", and "[[Forbidden Scripture]]" appears in this card's artwork.
  ** The human forms of "[[Capricious Darklord]]" and "[[Indulged Darklord]]" appear in this card's artwork.
  ** The woman from the artwork of the "[[Forbidden (archetype)|Forbidden]]" archetype also appears in this card's artwork—the top of her head is visible in the lower left.
  *** This may depict the woman's punishment after being caught in "Forbidden Scripture", and before her transformation into "[[Condemned Maiden]]".
  * This card appears in the artwork of "[[Miracle Mirror]]".
