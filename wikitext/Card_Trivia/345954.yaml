title: Card Trivia:Wings of Misdirection
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name carries a reference, as "Misdirection" is a trick used by Kuroko Tetsuya from the anime ''[[wikipedia:Kuroko's Basketball|Kuroko's Basketball]]''. Kuroko is voiced by [[wikipedia:Kenshō Ono|Kenshō Ono]], who also voices [[Yuya Sakaki]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime in which this card was featured.
