title: Card Trivia:Neo Flamvell Shaman
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is very similar to [[Flamvell Grunika]] in terms of attack and defense, and it also deals burn damage just like Grunika.
  * Despite this card resembling a tiger, it is not a [[Beast]] type or [[Beast-Warrior]] type.
