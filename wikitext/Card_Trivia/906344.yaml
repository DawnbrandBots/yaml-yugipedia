title: Card Trivia:Dragon Dowser
wikitext: |-
  {{Navigation}}

  * A [[wikipedia:Dowsing|dowser]] is a [[wikipedia:Divination|divination]] instrument used to find a certain object(s) or material(s).
  ** Fittingly, this monster is depicted as "waking up" once it is over the red area of the [[wikipedia:Thermography|thermogram]] in this card's artwork, with red being associated with the warmest part of the thermal image.
