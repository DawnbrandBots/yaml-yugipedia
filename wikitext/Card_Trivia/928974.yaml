title: Card Trivia:Bujin Mahitotsu
wikitext: |-
  {{Navigation}}

  * This monster is named after "Ame-no-mahitotsu", an alternate name for [[wikipedia:Ama-Tsu-Mara|Amatsumara]], the [[wikipedia:Shinto|Shinto]] deity of the forge. Fittingly, this monster is depicted "forging" a new "[[Bujin]]" monster with raw materials.
  * The [[Main Deck]] "Bujin" [[Beast-Warrior]] monsters resemble characters that appear in the ''[[Yu-Gi-Oh! GX]]'' anime through their head shapes and color schemes. In this case, this monster resembles [[Maximillion Pegasus]], the creator of ''[[Duel Monsters]]''.
  ** This monster's glowing left eye references the [[Millennium Eye]], which Pegasus wore in his left eye socket during the [[Duelist Kingdom (arc)|Duelist Kingdom]] arc of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  *** The aforementioned facts further reference the myth of Amenomahitotsu, whose names translates to "one eye of heaven" and was the Shinto deity of forging, similar to how Pegasus is known for having one eye and creating ''Duel Monsters''.
