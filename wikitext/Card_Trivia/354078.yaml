title: Card Trivia:Starving Venom Fusion Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Invasion: Vengeance]]'', as well as one of the cover cards of the Japanese version of ''[[Dimension Box Limited Edition]]''.
  * This monster appears in the artworks of "[[Predaprime Fusion]]", "[[Predaprimitive]]", and "[[Supreme Rage]]".
  * This is the [[signature card]] of [[Yuri]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This card represents [[Z-ARC]]'s sadistic personality, which is also reflected in Yuri's behavior towards his opponents, being so cruel to the point [[Leo Akaba]] was horrified that Yuri kept an evil personality even when not [[awakened]].
  * This monster is the [[Fusion Dimension]] [[counterpart]] of "[[Odd-Eyes Pendulum Dragon]]", "[[Dark Rebellion Xyz Dragon]]", and "[[Clear Wing Synchro Dragon]]".
  ** This is the only [[Four Dimensional Dragons|Dimension Dragon]] whose Japanese name does not contain the Japanese name of its [[Summoning mechanic]]: it is named after [[Fusion Summon]] ({{Ruby|融|ゆう}}{{Ruby|合|ごう}}{{Ruby|召|しょう}}{{Ruby|喚|かん}} ''Yūgō Shōkan''), but its Japanese name contains 「フュージョン」 (''Fyūjon'', "Fusion") instead.
  * This monster has multiple forms:
  ** A [[Yu-Gi-Oh! ARC-V (manga)|manga]] [[counterpart]]: "[[Starving Venemy Dragon]]".
  ** A "[[Supreme King Dragon]]" counterpart: "[[Supreme King Dragon Starving Venom]]".
  ** An [[Card evolutions|upgraded]] form: "[[Greedy Venom Fusion Dragon]]".
  ** A "[[Predaplant]]" form: "[[Starving Venom Predapower Fusion Dragon]]".
  ** An upgraded [[Fusion Pendulum Monster|Fusion Pendulum]] form with "Odd-Eyes Pendulum Dragon": "[[Odd-Eyes Venom Dragon]]".
  ** An upgraded [[Fusion Pendulum Monster|Fusion Pendulum]] form with "Clear Wing Synchro Dragon": "[[Starving Venom Wing Dragon]]".
  ** A retrained counterpart: "[[Starving Venom Fusion Dragon of the Four Heavenly Dragons]]"
  * This is the first "[[Venom]]" and "[[Fusion (archetype)|Fusion]]" [[Fusion Monster]], as well as the first [[Dragon]] "Venom" monster.
  * This is the first Fusion Monster in the ''[[OCG]]''/''[[TCG]]'' to require [[Fusion Material]]s to be in a specific location (the [[field]]), with the exception of monsters that are Summoned with [[Contact Fusion]]. This likely reflects how the other Dimension Dragons also require their respective [[material]]s to be on the field.
  * This monster has the following distinctions from the other Dimension Dragons:
  ** It is the only one to not have 2500 [[ATK]], having 2800 ATK instead.
  ** It is the only one whose [[Level]] is not 7, being 8 instead.
  ** It is the only one whose ''TCG'' name was changed when it was released: this monster's Japanese name is "Starve Venom Fusion Dragon" (スターヴ・ヴェノム・フュージョン・ドラゴン, ''Sutāvu Venomu Fyūjon Doragon'').
  ** It is the only one to not have an [[Attack and effect names in Yu-Gi-Oh! ARC-V|an attack or effect name]] in the ''Yu-Gi-Oh! ARC-V'' anime.
  ** It is the only one whose effects were not all [[activate]]d in the anime, as its last effect was mentioned several times but never activated.
  * While this monster was used with "[[Ultra Polymerization (anime)|Ultra Polymerization]]" in the ''Yu-Gi-Oh! ARC-V'' anime, it is actually impossible to fully utilize "[[Ultra Polymerization]]" with this monster in the ''OCG''/''TCG'', as per [https://ygorganization.com/ocg-maximum-crisis-rulings/ this ruling].
  * This monster's roar is the same as those of "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" and "[[Black-Winged Dragon (anime)|Black-Winged Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
