title: Card Trivia:Amazing Time Ticket
wikitext: |-
  {{Navigation}}

  * This ticket appears in the artworks of "[[Amazement Assistant Delia]]", "[[Amazement Abomination Arlekino]]" and "[[Fukubiki]]".

  * This card's artwork depicts the text 「１０：０３　ＮＥＸＴ ∀→ＣＣ／１２：５０」, which imply the current time is 10:03, and the next show: "[[Amaze Attraction Cyclo-Coaster]]" will start at 12:50.
