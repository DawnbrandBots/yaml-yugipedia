title: Card Trivia:Alligator's Sword Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Aqua Gate]]".
  * Visually, this monster is "[[Alligator's Sword]]" riding on the back of "[[Baby Dragon]]".
  * This monster has a [[retrained]] [[Main Deck]] [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart: "[[Alligator's Sword Dragon Knight]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to attack the opponent directly if the only monsters they control are [[EARTH]], [[WATER]], or [[FIRE]] is a reference to a scene during [[Katsuya Jonouchi and Ryota Kajiki's Duel (manga)|Katsuya Jonouchi and Ryota Kajiki's Duel]], where this monster was able to fly over the sea cast by "[[Umi (manga)|Umi]]" and attack [[Ryota Kajiki (manga)|Ryota Kajiki]] directly, unlike the rest of the other monsters in [[Katsuya Jonouchi (manga)|Katsuya Jonouchi's]] [[Deck]].
  * This monster's pose in its ''OCG''/''TCG'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|180|ref}} showing the result of "[[Polymerization (manga)|Polymerization]]" fusing "[[Alligator's Sword (manga)|Alligator's Sword]]" and "[[Baby Dragon (manga)|Baby Dragon]]".
