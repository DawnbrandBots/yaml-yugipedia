title: Card Trivia:Umbral Soul
wikitext: |-
  {{Navigation}}

  * This monster appears to be based on an eight-legged [[wikipedia:Basilisk|Basilisk]], a legendary monster believed to be able to kill people or turn them to stone with the power of its eyes.
  * The word "[[wikipedia:Umbra|umbra]]" is Latin for "ghost" or "shadow", as well as the scientific term for the darkest part of a shadow.
  * This monster is the [[DARK]] member of the [[Attribute Reptile]]s: the others are "[[Radiant Spirit]]", "[[Firestorm Prominence]]", "[[Silent Abyss]]", "[[Destruction Cyclone]]", and "[[Raging Earth]]".
