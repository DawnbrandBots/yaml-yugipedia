title: Card Trivia:Elemental HERO Glow Neos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Instant Contact]]".
  * This monster is a [[Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Glow Moss]]".
  * This card was the only "[[Neos]]" [[Fusion Monster]] that spoke in the ''[[Yu-Gi-Oh! GX]]'' anime.
