title: Card Trivia:Attack Cannon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Meklord Emperor Granel]]" appears in this card's artwork, depicted firing "[[Granel Attack]]" from its body.
  ** Fittingly, this card was used on both monsters in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** The artwork reflects its effect, as it allows the player to destroy an opponent's monster by "firing" an "[[Attack (archetype)|Attack]]" monster from the "[[Meklord Emperor]]" monster like a cannon.
