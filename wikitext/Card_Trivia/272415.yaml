title: Card Trivia:Mystical Fairy Elfuria
wikitext: |-
  {{Navigation}}

  * This is the first card to directly prevent Xyz Summons by mentioning it in its card text.
  * This card's Japanese name is a combination of "elf" and "[[wiktionary:-philia|-philia]]".
  ** This card is the antonym to "[[Ghost Fairy Elfobia]]", whose name is a combination of "elf" and "[[wiktionary:-phobia|-phobia]]".
