title: Card Trivia:VIP Whale
wikitext: |-
  {{Navigation}}

  * This monster's design and effect are based on the term "whale", a slang term for a [[wikipedia:High roller|high roller]], a gambler who wage huge sums of money and therefore often received preferential treatment, which is now used to describe players who spent huge amounts of money on [[wikipedia:Free-to-play|free-to-play]] video games, especially [[wikipedia:Gacha games|gacha games]].
