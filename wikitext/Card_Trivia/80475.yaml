title: Card Trivia:Rogue Doll
wikitext: |-
  {{Navigation}}

  * This monster's [[flavor text]] in the ''[[OCG]]''/''[[TCG]]'' references its first appearance in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, where its [[Type]] was [[White Magic]], which was more effective when battling [[Fiend]] monsters.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|061|ref}}, specifically from the panel showing [[Rogue Doll (manga)|this monster]] being Summoned.
