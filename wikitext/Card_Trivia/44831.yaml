title: Card Trivia:Chain Thrasher
wikitext: |-
  {{Navigation}}

  * This monster appears to be wielding a ''[[wikipedia:Kusari-fundo|kusari-fundo]]'', with a bladed attachment at one end.
  * This monster's face and blonde hair are very similar to those of "[[D.D. Survivor]]", indicating that they are the same person.
  ** This is further supported by the artwork of "[[D/D/D Headhunt]]", which depicts "D.D. Survivor" with the same ''kusari-fundo'' in front of him.
  ** This is also supported by the fact that this monster is wearing bandages on limbs that correspond to the mechanical-looking limbs of "D.D. Survivor" (similar to "[[Warrior Lady of the Wasteland]]" and "[[D.D. Warrior Lady]]").
