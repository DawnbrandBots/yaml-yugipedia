title: Card Trivia:Dark Illusion
wikitext: |-
  {{Navigation}}

  * This card's Japanese name ({{Ruby|闇|やみ}}の{{Ruby|幻|げん}}{{Ruby|影|えい}}, ''Yami no Gen'ei'') translates to "Phantom of Darkness", which in turn references the ''[[Phantom Darkness]]'' [[Core Booster|Core Booster pack]] in which this card was first released.
  ** This card shares its English name with the [[Dark Illusion (anime)|anime name]] of "[[Black Illusion]]" in the English dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
