  * [[wikipedia:Defragmentation|Defragmentation]] is the process of restoring lost data.
  ** This may refer to its effect, as it takes lost data ([[Cyberse]] monsters in the [[Graveyard]]) and restores it ([[Special Summon]]s it to the [[field]]).
