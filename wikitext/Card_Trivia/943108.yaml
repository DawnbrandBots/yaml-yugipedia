title: Card Trivia:Salamangreat Burst Gryphon
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Griffin|gryphon]], a legendary creature who is depicted with the body of a lion, and the head, wings, and talons of an eagle.
  * This monster's white color scheme references how [[Synchro Monster]] [[Monster Card|Cards]] feature a white-colored card border.
