title: Card Trivia:Purple Poison Magician
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Magician]]" form of "[[Starving Venom Fusion Dragon]]".
  ** This card's name, "Purple Poison", is a reference to the purple color scheme of "Starving Venom" and its [[Summon chants in Yu-Gi-Oh! ARC-V#Yuri|Summon chant]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime: ''Poisonous dragon with hungry fangs'' ({{Ruby|飢|う}}えた{{Ruby|牙|きば}}{{Ruby|持|も}}つ{{Ruby|毒|どく}}{{Ruby|龍|りょう}}！ ''Ueta kiba motsu doku ryū!'').
  ** This card is a [[DARK]] monster, so it can be used as [[Fusion Material]] to [[Fusion Summon]] "Starving Venom".
  ** This card's [[Pendulum Effect]] to make a [[DARK]] [[Spellcaster]] monster that battles gain 1200 [[ATK]], before [[damage calculation]], is based on the effect of "Starving Venom" to make it gain ATK equal to an opponent's [[Special Summon]]ed monster, until the end of the [[turn]], if it is Fusion Summoned.
  ** This card's [[monster effect]] to [[destroy]] a [[face-up]] card when this card is destroyed is based on the effect of "Starving Venom" to destroy all the opponent's Special Summoned monsters if it is destroyed and was Fusion Summoned.
  ** This monster's clothes are based on "Starving Venom".
  * This card is the only [[Z-ARC Magician]] to have an ATK (1200) lower than its [[DEF]] (2100).
