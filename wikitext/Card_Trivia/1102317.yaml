title: Card Trivia:Wight Reanimator
wikitext: |-
  {{Navigation}}

  * Six "[[Skull Servant]]s" (or "[[King of the Skull Servants]]") and the silhouette of "[[Zombie Master]]" appear in this card's artwork.
  * This card is a "[[Wight]]" counterpart of "Zombie Master".
  ** This card's effect to [[send]] "Skull Servant" or a card that mentions it to the [[Graveyard]] to [[Special Summon]] a "Skull Servant" or "King of the Skull Servants" from the Graveyard is similar to the effect of "Zombie Master".
