title: Card Trivia:Blaze Fenix, the Burning Bombardment Bird
wikitext: |-
  {{Navigation}}

  * This monster is similar to "[[Ignition Beast Volcannon]]".
  ** Both monsters require a [[Machine]] and [[Pyro]] monster as [[Fusion Material]]s.
  ** Both monsters feature an effect that inflicts [[effect damage]].
  ** Both monsters are used by [[Greiger (manga)|Greiger]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This monster's [[Attack and effect names in Yu-Gi-Oh! 5D's|effect name]] in the ''Yu-Gi-Oh! 5D's'' manga, "Giant Fenix Air Raid", references the Japanese name of "[[Flying Fortress SKY FIRE]]", "Giant Bomber AIR RAID". Both monsters are used by [[Greiger]] in the ''Yu-Gi-Oh! 5D's'' manga and [[Yu-Gi-Oh! 5D's|anime]] respectively.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|010|ref}}, specifically from the panel showing [[Blaze Fenix, the Burning Bombardment Bird (manga)|this monster]] being Summoned.
