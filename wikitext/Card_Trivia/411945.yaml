title: Card Trivia:Red Wyvern
wikitext: |-
  {{Navigation}}

  * This card is a younger form of "[[Scarlight Red Dragon Archfiend]].
  ** This card's effect further underlines this statement: "Red Wyvern" can [[destroy]] only one [[Special Summon]]ed monster on the [[field]], while "Scarlight Red Dragon Archfiend" can destroy all of them.
  * A [[wikipedia:wyvern|wyvern]] is a type of [[wikipedia:dragon|dragon]] with no arms. It is found in European mythology, and is often associated with destruction and pestilence.
  * This card's ATK and DEF are likely a reference to "[[Red-Eyes Black Dragon]]" (who has its own [[Red-Eyes Wyvern|wyvern]] [[counterpart]]) as "Scarlight Red Dragon Archfiend" matches "[[Blue-Eyes White Dragon]]".
