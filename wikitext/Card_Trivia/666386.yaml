title: Card Trivia:Megalith Bethor
wikitext: |-
  {{Navigation}}

  * This monster's shattered pieces appear in the artwork of "[[Megalith Unformed]]".
  * This monster is based on [[wikipedia:Olympian spirits|Bethor]], one of the seven [[wikipedia:Olympian spirits|Olympian spirits]].
  * This monster is a [[Card evolutions|transformed]] version of "[[Megalith Hagith]]".
  ** This monster is emerging from the bottom of the base of "Hagith".
  ** The artwork of "[[Megalith Promotion]]" depicts "Hagith" transforming into this monster.
  * This monster has a combined form with "[[Megalith Aratron]]" and "[[Megalith Phaleg]]": "[[Megalith Phul]]".
