title: Card Trivia:Hieratic Dragon of Nebthet
wikitext: |-
  {{Navigation}}

  * This card's name comes from the Egyptian God, [[wikipedia:Nephthys|Nephthys]].
  ** That name is shared with "[[Sacred Phoenix of Nephthys]]" and "[[Dark Nephthys]]".
  * This card appears in the artwork for "[[Hieratic Seal of Convocation]]".
  * This card has the same appearance as "[[Hieratic Dragon of Eset]]", though the wings are colored violet.
  ** This is a reference to the mythology of Nephthys disguising herself as Isis to seduce Osiris, as well as the fact that they are both [[Level]] 5, have similar stats, and opposite artworks (sunrise/sunset and pose reflected).
  * Its effect is the monster counterpart of "[[Hieratic Dragon of Su]]".
  * The helmet in the image bears the symbol of Nephthys; a basket sitting ontop a temple.
