title: Card Trivia:G Golem Invalid Dolmen
wikitext: |-
  {{Navigation}}

  * This monster is based on a "[[wikipedia:Dolmen|dolmen]]", a type of single-chamber megalithic tomb, usually consisting of two or more vertical megaliths supporting a large flat horizontal capstone or "table".
  ** This monster's name is based on the word "invalidate", which means "to cancel" or "[[negate]]", which reflects its effect to negate the effects of the opponent's [[control]]led cards if it is destroyed while [[co-link]]ed.
  * This monster is an [[Card evolutions|upgraded]] form of "[[G Golem Stubborn Menhir]]".
  ** This monster also has an upgraded form: "[[G Golem Dignified Trilithon]]".
