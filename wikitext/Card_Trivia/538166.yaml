title: Card Trivia:Ordeal of a Traveler
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the Japanese version of ''[[Pharaonic Guardian (Japanese)|Pharaonic Guardian]]''.
  * "[[Guardian Sphinx]]" appears in this card's artwork.
  * This card's name and artwork reference the ancient Greek tale of [[wikipedia:Oedipus|Oedipus]], in which he encounters a [[wikipedia:Sphinx|sphinx]] while traveling his path, and demanded him to answer a riddle. ("What creature walks on four legs in the morning, two in the afternoon and three in the evening?")
  ** This card's effect reflects the encounter with the sphinx (the [[trigger-like]] effect [[activate|activating]] when the opponent's monster declares an attack) and the riddle it poses to Oedipus (making the opponent call the [[card type]]). If Oedipus answered the riddle correctly, then the sphinx would allow him to pass; however, if Oedipus answered incorrectly, then the sphinx would devour him ([[return]]ing the attacking monster to the [[hand]] if the opponent guessed incorrectly).
