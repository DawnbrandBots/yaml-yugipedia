title: Card Trivia:Present Card
wikitext: |-
  {{Navigation}}

  * Multiple "[[Kuribon]]s" appear in this card's artwork, adorned on the gift card.
  * This card is a [[counterpart]] of "[[Gift Card]]".
  ** This is supported by the fact that the "card" features multiple "[[Winged Kuriboh]]s" adorned on it, English words written on it in [[wikipedia:Cursive|cursive]], and an effect that benefits the opponent.
