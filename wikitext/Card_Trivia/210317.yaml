title: Card Trivia:Lightray Diabolos
wikitext: |-
  {{Navigation}}

  * This card is a Light counterpart of "[[Diabolos, King of the Abyss]]".
  * This card probably refers to the story of "Lucifer", which means "light bearer" and is also is a name for Satan/The Devil. In the battle against Heaven, he turned into a dragon with the name "Diabolos", and after being cast out into Hell "Lucifer" became the creator of darkness. Thus "Lightray Diabolos" became "Diabolos King of The Abyss".
  * This is the only [[Special Summon-only]] "Lightray" monster.
