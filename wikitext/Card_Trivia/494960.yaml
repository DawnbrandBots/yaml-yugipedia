title: Card Trivia:White Aura Bihamut
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "bi" and "[[wikipedia:Bahamut|Bahamut]]".
  ** "Bi-" is the numeral prefix commonfly associated with the number "two", which reflects this monster's two heads.
  *** "Bi" also shares a similar pronunciation with "''bai''", the Chinese word for the color "white", reflecting this monster's color scheme and association with the "[[White]]" [[archetype]].
  ** "Bahamut" is a giant primordial fish in [[wikipedia:Religion in pre-Islamic Arabia|Arabian mythology]] who helps support the Earth and is suspended in water for its own stability.
  *** This monster's heads are based on the ''[[wikipedia:Dunkleosteus|dunkleosteus]]'', an extinct species of large predatory fish, reflecting the depiction of the Bahamut as a giant primordial fish.
  *** In the English version of the ''[[Yu-Gi-Oh! ARC-V]]'' manga, this card's name is "[[White Aura Biphamet (manga)|Biphamet]]", which is a portmanteau of the words "bi" and "[[wikipedia:Baphomet|Baphomet]]".
  * This is the first Synchro Monster to specifically list a [[Tuner Synchro Monster]] and then non-[[Tuner monster]]s.
  * This monster has the highest [[original ATK]] (3300) of all [[Fish]] monsters.
  ** It also has the highest original ATK (3300) of all [[WATER]] monsters, tied with "[[Nekroz of Areadbhair]]" and "[[Nekroz of Decisive Armor]]".
  * This monster is tied with "[[Earthbound Immortal Chacu Challhua]]" for having the highest [[Level]] (10) of all Fish monsters.
  ** This monster is also tied with "[[Big Whale]]" for having the highest [[original DEF]] (3000) of all Fish monsters.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are an alteration of its manga effect: its left head and right head are each treated as different monsters, and when one head is [[destroy]]ed, the other head that remains intact revives it, making it nearly indestructible.
  ** In the ''OCG''/''TCG'', this monster's "[[Divine Dragon Token]]" shares this monster's stats. If the player controls no "Divine Dragon Token" during the opponent's turn (most likely when it was destroyed), this monster can Special Summon a "Divine Dragon Token". Likewise, if this monster is destroyed and [[sent]] to the [[Graveyard]] by the opponent while the player controls a "Divine Dragon Token", it is [[Special Summon]]ed from there, thereby replicating its near-indestructibility as depicted in the manga.
  ** The "Divine Dragon Token" Summoned by this monster's ''OCG''/''TCG'' effect has the highest printed ATK (3300) of all [[Token Monster]]s.
  * This card's artwork is taken from {{chapter|ARC-V|021|ref}}, specifically from the panel showing [[White Aura Biphamet (manga)|this monster]] attacking [[Yugo (manga)|Yugo]] directly.
