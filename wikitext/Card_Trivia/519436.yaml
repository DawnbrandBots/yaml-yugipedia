  * This monster's Japanese name, "Bagooska the Drunk Sleeping Demon Beast" (жіҐзќЎй­”зЌЈгѓђг‚°гѓјг‚№г‚«, ''DeisuimajЕ« BagЕ«suka'') features multiple puns:
  ** "Bagooska" is a portmanteau of the Japanese words for "tapir" (гѓђг‚Ї, ''[[wikipedia:Baku (spirit)|Baku]]'') and the Japanese onomatopoeia for sleeping (г‚°гѓјг‚№г‚«, ''GЕ«suka'').
  *** This monster is based on the ''baku'', a supernatural being in Japanese mythology that resembles the [[wikipedia:Malayan tapir|Malayan tapir]], who devours nightmares.
  ** The kanji for "heavy sleep" (жіҐзќЎ, ''Deisui'') is similar to the kanji for "dead drunk" (жіҐй…”, ''Deisui''), reflecting how this monster is depicted completely unconscious from drinking too much, whereas the Japanese artwork depicts beer bottles and cans littered near this monster.
  * This card was revealed on April 1st, 2017 (4/1) in Japan - widely known as April Fools' Day - at 4:01 A.M. local time.
