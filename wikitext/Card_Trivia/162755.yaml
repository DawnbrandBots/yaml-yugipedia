title: Card Trivia:Zenmailfunction
wikitext: |-
  {{Navigation}}

  * A broken "[[Wind-Up Soldier]]" appears in this card's artwork.
  ** This card's artwork depicts the aftermath of the artwork of "[[Overwind]]".
  * This card's English name is a portmanteau of ''Zenmai'', the Japanese name of the "[[Wind-Up]]" [[archetype]], and "malfunction".
