title: Card Trivia:Infernal Flame Vixen
wikitext: |-
  {{Navigation}}

  * This card has a counterpart: "[[Infernal Flame Banshee]]".
  * This is the only Xyz Monster in the game to list its materials backwards, saying "2 Pyro-type Level 4 monsters" instead of the standard "2 Level 4 Pyro-type monsters".
