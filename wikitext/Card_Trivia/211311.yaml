title: Card Trivia:Blue Mountain Butterspy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Butterspy Courage]]" and "[[Butterspy Protection]]".
  * This monster is based on the ''[[wikipedia:Papilio ulysses|Papilio ulysses]]'', which is also known as the "blue mountain swallowtail" butterfly.
