title: Card Trivia:Verre, the Maid of Endymion
wikitext: |-
  {{Navigation}}

  * The butterfly from the artwork of "[[Genni, the Maid of Endymion]]" appears in this card's artwork.
  * This monster is based on [[Rilliona]] disguised as one of [[Endymion (character)|Endymion]]'s maids in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Great Magic War|1|ref}}, specifically from the panel where Verre sneaks into [[Endymion Castle]].
  ** This monster's effect to [[add]] "[[Magical Dimension]]" from the [[Deck]] to the [[hand]] references how in ''Yu-Gi-Oh! OCG Stories'', Rilliona uses a spell named "Dimension Magic", which is the Japanese name of "Magical Dimension".
