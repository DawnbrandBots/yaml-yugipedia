title: Card Trivia:Dark Magic Inheritance
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]", "[[Dark Magician]]", and "[[Dark Magician Girl]]" appear in this card's artwork.
  ** This is the first and currently only card where its artwork depicts "Dark Magician Girl" not wearing her hat.
  * This card's text is redundant, as there are currently no [[Spell]]/[[Trap Card]]s that specifically list "Dark Magician Girl" that does not also list "Dark Magician".
  ** "[[Dark Burning Attack]]" lists "[[Dark Magician Girl (archetype)|Dark Magician Girl]]" monsters instead of just "Dark Magician Girl", making it an ineligible target for this card.
