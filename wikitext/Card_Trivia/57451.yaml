title: Card Trivia:B.E.S. Big Core MK-2
wikitext: |-
  {{Navigation}}

  * The [[Gradius|Vic]] [[Victory Viper XX03|Viper]] and "[[Falchionβ]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Boss on Parade]]".
  * The [[B.E.S.|Bacterium Empire Series]] are the main bosses in [[Konami]]'s ''[[wikipedia:Gradius (series)|Gradius]]'' video games. "Big Core" serves as the standardized design, with [[B.E.S.|every other ship]] following the same principles: A central power core protected by a set of [[wikipedia:ablative armor|ablative]] barriers. Sometimes following a famous on-screen prompt to "SHOOT THE CORE!", the player's ship must destroy the barriers, then the power core, in order to defeat the boss, all while dodging enough weapon's fire to typically fill the game screen.
  ** In this case, this card is based on the [[fandom:w:c:gradius:Big Core MK II|Big Core MK II]], the second boss to be dubbed "Big Core" that debuted in ''Gradius II''. This card's artwork depicts the initial attack patterns of "Big Core MK II" which involves its wings spread out to fire giant lasers, which leaves the shields and the power cores vulnerable to attack.
  * This card is an upgraded and more powerful version of "[[B.E.S. Big Core]]".
  * This is the only "B.E.S." monster that does not gain counters when [[Normal Summon]]ed. This seems to be by design, as it is also one of the only "B.E.S." monsters that gains counters when [[Special Summon]]ed through "[[Boss Rush]]".
