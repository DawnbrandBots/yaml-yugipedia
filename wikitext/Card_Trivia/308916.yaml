title: Card Trivia:Stellarknight Triverr
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Hexatellarknight]]" and "[[Stellarnova Bonds]]".
  * This card's name is a combination of the prefix ''tri-'', meaning ''three'', and ''hiver'', the French word for the [[wikipedia:season|season]] ''[[wikipedia:winter|winter]]''.
  ** Interestingly, its official French name is a combination of the prefix ''tri-'' and ''winter''.
  * This monster's triangle shield and the fact that it can be Summoned with three monsters named after the [[wikipedia:star|stars]] [[wikipedia:Sirius|Sirius]], [[wikipedia:Procyon|Procyon]] and [[wikipedia:Betelgeuse|Betelgeuse]] are references to the [[wikipedia:Winter Hexagon|Winter Triangle]].
  ** This monster also reflects this by incorporating design elements from "[[Satellarknight Sirius]]", "[[Satellarknight Procyon]]", and "[[Satellarknight Betelgeuse]]". This is apparent, but not limited, by the blue and orange parts (the suit of "Sirius" and "Procyon" respectively), the white hair, armor, as well as the white-violet coat (from "Betelgeuse"), though it doesn't seem to wield the same weapon of any of those three.
