title: Card Trivia:Supreme Railartillery Magnum Overlord (L)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Versus Pack Maximum Force]]''.
  * This monster has three [[counterpart]]s: "[[Supreme Beasteam Magnum Overlord (L)|Supreme Beasteam Magnum Overlord [L]]]", "[[Supreme Machine Magnum Overlord (L)|Supreme Machine Magnum Overlord [L]]]", and "[[Supreme Skystream Magnum Overlord (L)|Supreme Skystream Magnum Overlord [L]]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (4), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (800/0) with the above-mentioned monsters.
