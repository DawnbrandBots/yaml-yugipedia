title: Card Trivia:Royal Cookpal Knight Pasta
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Metabolic Storm]]".
  * This monster's Japanese name, "Royal Cookmate Knight Napolitan", is based on [[wikipedia:Naporitan|naporitan]], a popular dish in Japan consisting of pasta mixed with tomato ketchup, mushrooms, root vegetables, and pork.
