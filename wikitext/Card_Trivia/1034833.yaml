title: Card Trivia:Wonky Quartet
wikitext: |-
  {{Navigation}}

  * This monster is based on the "[[wikipedia:Town Musicians of Bremen|Town Musicians of Bremen]]", a German fairy tale about four aging animals (a donkey, a dog, a cat, and a rooster) who decided to run away from their neglectful masters and become town musicians in the city of [[wikipedia:Bremen|Bremen]]. 
  ** This monster's design is based on the statue of the four animals in Bremen, which depicts the aforementioned animals stacked on top of each other, from the large donkey to the small rooster.
  ** The base kanji used in this monster's Japanese name (四獣層 ''Shijū-sō'') is a pun on the Japanese word for "quartet" (四重奏 ''Shijūsō'').
  *** The former based kanji (四獣層) literally translates to "four-beast layer/stratum", which reflects this monster's design, which consists of four stacked animals.
