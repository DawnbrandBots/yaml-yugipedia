title: Card Trivia:Brotherhood of the Fire Fist - Ram
wikitext: |-
  {{Navigation}}

  * This monster is named after '''[[wikipedia:Zhu Wu|Zhu Wu]]'''
  ** '''Zhu Wu''' ranks 37th among the 108 [[wikipedia:108 Stars of Destiny|Liangshan heroes]] and 1st among the 72 [[wikipedia:Water Margin|Earthly Fiends]] and is nicknamed "Resourceful Strategist".
  *** Described in the novel as a handsome man with blazing eyes and a long beard, '''Zhu Wu''' dresses like a Taoist priest and carries a hand fan made of crane feathers.
  **** His expertise in military strategy and battle formations earn him the nickname, hence its effect being able to set "[[Fire Formation]]s" from the [[GY]] or [[Deck]].
  * This monster appears in the artwork of "[[Ultimate Fire Formation - Sinto]]".
