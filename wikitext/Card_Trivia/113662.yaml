title: Card Trivia:The Drdek
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is based on [[4Kids]] co-producer Matthew Drdek, who worked on the English localization of the ''[[Yu-Gi-Oh!]]'' anime.<ref>{{cite podcast |host1=[[Tara Sands]] |host2=Steve Yurko |host3=Matthew Drdek |date=February 7, 2024 |title=Ep 17: Matthew Drdek: 4Kids Flashback: Anime Podcast Abt History of Pokémon, Yu-Gi-Oh, One Piece etc |url=https://www.youtube.com/watch?v=KgysFHpC7t0&t=3448 |work=4Kids Flashback |access-date=September 18, 2025 |time=57:28 |quote=Just google me, you'll even see the Yu-Gi-Oh! card they named after me, which is basically a severed foot.}}</ref>
  ** Matthew Drdek also served as the producer for the first season of the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime and served as a creative consultant for the for the English dubbed version of the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * Despite this card's [[flavor text]] stating that this monster is bipedal (two-legged), this monster is instead a monopod (one-legged).
  * This card could be related to "[[Death Hand]]".
  ** This card's Japanese name is "Death Foot".
  ** Both are limbs with an eye.

