title: Card Trivia:Weeping Idol
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Staff God|Staff God]], an icon in Inca religion that depicts a front-facing human-like figure holding a staff in each hand.
  ** This monster's [[Rock]] [[Type]] references how the Staff God is carved or etched into stone or metallic surfaces, including in the [[wikipedia:Gate of the Sun|Gate of the Sun]].
