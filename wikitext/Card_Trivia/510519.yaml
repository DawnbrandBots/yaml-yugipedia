title: Card Trivia:Cloudian - Eye of the Typhoon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Raging Cloudian]]".
  * This monster is based on the [[wikipedia:Eye (cyclone)|eye]], the mostly calm center of a cyclone or a hurricane.
  ** This monster's name is a visual pun on its appearance, which features a single giant eyeball.
  * This is the only "[[Cloudian]]" monster with a non-[[WATER]] [[Attribute]], non-[[Fairy]] or [[Fiend]] [[Type]]s, and features no effects in relation with [[Fog Counter]]s.
  * This is the [[signature card]] of [[Adrian Gecko]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
