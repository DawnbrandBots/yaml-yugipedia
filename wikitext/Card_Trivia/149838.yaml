title: Card Trivia:Necrolancer the Time-lord
wikitext: |-
  {{Navigation}}

  * "Time-lord" appears to be a misnomer, as while this card is shown to manipulate space in order to travel, no mention to time is given to it in the card description, apart from the title.
  ** In addition, this card has no relation to the "[[Timelord]]" [[archetype]] that was released later, neither by Japanese name nor overall theme.
