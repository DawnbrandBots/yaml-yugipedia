title: Card Trivia:Super Quantal Mech Beast Grampulse
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Super Quantal Mech Ship Magnacarrier]]" and "[[Super Quantal Union - Magnaformation]]".
  * This monster's name is a portmanteau of "''[[wikipedia:Risso's dolphin|Grampus]]''" (the only species of [[wikipedia:Dolphin|dolphin]] with this scientific name that is commonly known as Risso's dolphin) and "pulse".
  * This monster forms the legs of "[[Super Quantal Mech King Great Magnus]]", as well as the arms of "[[Neo Super Quantal Mech King Blaster Magna]]".
