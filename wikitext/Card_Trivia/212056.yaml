title: Card Trivia:That Wacky Magic!
wikitext: |-
  {{Navigation}}

  * "[[Tempest Magician]]", "[[Magidog]]", and "[[Magicat]]" are featured in this card's artwork.
  * The "[[Dark Magical Circle]]" is featured in this card on the floor around "Tempest Magician".
  * [[Spell Counter]]s can be seen floating around the room.
  * This card art seems to show a sequence of events with "[[That Wacky Alchemy!]]" and "[[Quick Booster]]":
  *# In "That Wacky Alchemy!", "[[Alchemist of Black Spells]]" aggressively casts a destruction effect in response to a rival's Spell Card use (represented as the Spell Counter) while "Magicat" and "Magidog" panic at the damage that Spell Card has done.
  *# In "Quick Booster", "Alchemist of Black Spells" seeks to repair the damage done to his own power from the loss of a Spell Card (again, represented as a Spell Counter) through the risky action of powering his device with "[[Type Zero Magic Crusher]]" and suffering pain if he makes a mistake.
  *# In "That Wacky Magic!", "Tempest Magician" in a desperate act, reuses spent Spell Cards (shown as Spell Counters) to fuel an explosive attack while "Magicat" and "Magidog" watch in horror at the pain it is causing "Tempest Magician" to cast this spell.
