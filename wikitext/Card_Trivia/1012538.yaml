title: Card Trivia:Hagoromo the Cloudle-Handling Celestial Seamstress
wikitext: |-
  {{Navigation}}

  * This monster is named after a ''hagoromo'', (羽衣) a type of feather mantle from ''[[Wikipedia:The Tale of the Bamboo Cutter|The Tale of the Bamboo Cutter]]'' that Princess Kaguya is given to wear upon her return to the moon.
