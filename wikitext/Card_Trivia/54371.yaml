title: Card Trivia:Earthbound Immortal Ccapac Apu
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Edition Volume 3]]''.
  * This monster appears in the artworks of "[[Earthbound Release]]" and "[[Revival of the Immortals]]".
  * This monster is based on the giant [[wikipedia:geoglyph|geoglyph]] of the [[Nazca Lines]].
  * This monster's name, "Ccapac Apu", is derived from ''[[wiktionary:qhapaq|qhapaq]]'' and ''apu'', the [[wikipedia:Quechuan languages|Quechua]] words meaning "lord".
  ** In [[wikipedia:Inca mythology|Inca mythology]], "[[wikipedia:Apu (god)|Apu]]" is commonly used to refer to a mountain with a living spirit, where its body and energy form the spirit's "home" and "temple".
  * This monster is tied with "[[Earthbound Immortal Uru]]" for the highest [[ATK]] (3000) of all [[Level 10]] "[[Earthbound Immortal]]" monsters.
  * "Earthbound Immortal" monsters often represent their owners and their initial ambitions and desires; in this monster's case, it represents [[Kalin Kessler]] and his desire to make [[Yusei Fudo]] suffer.
  ** This monster's damaging effect that [[activate]]s upon [[destroy]]ing an opponent's monster by battle references how Kalin wishes to make Yusei suffer the same pain from his perceived betrayal, and the physical abuse he endured while imprisoned by [[Sector Security]] before dying of starvation.
  * This monster is the Nintendo DS icon for the ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'' video game.
  * This is the [[signature card]] of [[Kalin Kessler]] during his time as a Dark Signer in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
