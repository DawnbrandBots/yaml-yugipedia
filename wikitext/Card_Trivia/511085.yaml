title: Card Trivia:Seven-Armed Fiend
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name contains "Demon" (デーモン ''Dēmon''), which makes it an "[[Archfiend]]" monster.
  * In the Japanese version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card had 666 [[ATK]] and 666 [[DEF]], with 666 commonly believed to be the "Number of the Devil" in the Bible; they were changed to 1000 in the dubbed versions.
  ** This is the first card to have an [[original ATK and DEF]] that is not evenly divisible by 10.
  * This card was used by [[Alexander the Great]] during the [[Yu-Gi-Oh! Capsule Monsters|Capsule Monsters arc]]. Each of this monster's arms contained a special ability:
  ** The Arm of Skulls allowed it to summon an army of "[[Skull Knight 2|Skull Knight #2]]".
  ** The Arm of Regeneration allowed it to revive any monster in its army.
  ** The Arm of Entrapment allowed to grab and hold any opponent, no matter the distance.
  ** The Arm of Defense allowed it to erect an impenetrable barrier.
  ** The Arm of Destruction allowed it to unleash a massive fireball, its most powerful ability.
  ** The Arm of Clairvoyance allowed it to read the opponent's thoughts.
  ** Its remaining arm demonstrated no ability beyond swiping at enemies.
