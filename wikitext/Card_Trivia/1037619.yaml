title: Card Trivia:Ragnaraika Stag Sovereign
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name,「{{Ruby|蕾禍|ライカ}}ノ{{Ruby|大王鬼牙|ダイオウガ}}」features multiple puns:
  ** Its name is a portmanteau of the words「大王平鍬形」(''daiō hirakuwagata'', lit. "great king flat beetle"), a species of beetle whose scientific name is ''Dorcus bucephalus'', and「オーガ」(''ōga'', "ogre").
  ** The spelling contains the kanji「鬼」(''oni'', "Japanese ogre"), which comes from「鬼虫」(''onimushi'', lit. "ogre bug"), another name for the stag beetle, and the kanji「牙」(''ga'', "fang").
  * This is the first [[Link-5]] monster that can be [[Link Summon]]ed with only 2 [[Link Material|Link Materials]].
  ** This is also the first Link-5 monster that is not a [[LIGHT]] or [[DARK]] monster.
