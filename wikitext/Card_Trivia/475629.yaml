title: Card Trivia:Windwitch - Glass Bell
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] looks slightly like [[Rin]], the user of the "[[Windwitch]]" Deck in ''[[Yu-Gi-Oh! ARC-V]]''.
  ** Moreover, it may reference the [[:File:WindwitchIceBell-JP-Anime-AV-NC-2.png|alternate color scheme]] used for a second copy of "[[Windwitch - Ice Bell]]" in the anime. This color scheme also makes her resemble [[Iris]], while the original "Ice Bell" is similar to [[Rio Kastle]].
