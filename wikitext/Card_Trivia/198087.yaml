title: Card Trivia:Trap Sluzer
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The cards "[[Call of the Haunted]]", "[[Coffin Seller]]", "[[Des Counterblow]]", "[[Human-Wave Tactics]]", "[[The First Sarcophagus]]", and "[[The Regulation of Tribe]]" appear in this card's Japanese artwork.
  ** The cards "[[Ancient Lamp (anime)|Ancient Lamp]]", "[[Chaos Barrier Field]]", "[[Chthonian Polymer]]", "[[Compulsory Evacuation Device]]", "[[Dark Spirit of the Silent]]", "[[Destiny Signal]]", "[[DNA Surgery]]", "[[Dramatic Rescue]]", "[[Ground Erosion]]", and "[[Vessel of Illusion]]" appear in this card's international artwork.
  *** Ironically, the aforementioned cards in the international artwork except for "DNA Surgery" and "Ground Erosion" are not [[Continuous Trap Card]]s; however, in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, "Dark Spirit of the Silent" was a Continuous Trap Card before being released as a [[Normal Trap Card]] while in the manga and [[Yu-Gi-Oh! (anime)|anime]], "Ancient Lamp" was a Normal Trap Card before it was released as a [[Monster Card]].
  * This monster's Japanese name, "Trap Throughzer" (トラップ・スルーザー, ''Torappu Surūzā'') uses the katakana for "through" (スルー), which is a [https://jisho.org/search/%20%20%20%20%E3%82%B9%E3%83%AB%E3%83%BC colloquial usage of the English word] meaning "ignore". This would reflect the monster's effect, allowing the player to "ignore" the effects of Continuous Trap Cards.
  ** This monster's international name is likely a Japanese translation error of "Throughzer" due to the similar pronunciation of the word "''Surūzā''".
