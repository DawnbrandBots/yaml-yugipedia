title: Card Trivia:"A" Cell Breeding Device
wikitext: |-
  {{Navigation}}

  * Multiple [[A-Counter]]s appear in this card's artwork.
  * The device in this card's artwork appears in the artwork of "[["A" Cell Recombination Device]]".
  * Until the release of "[["A Case for K9"]]", when using the convention of symbols first, this was first card in alphabetical order in English.
