title: Card Trivia:Golem Sentry
wikitext: |-
  {{Navigation}}

  * This monster  has the same [[Attribute]] ([[EARTH]]), [[Level]] (4), [[Type]] ([[Rock]]), [[original ATK]] (800), and effect as "[[Guardian Statue]]".
  * Initially, in the ''[[OCG]]''/''[[TCG]]'', this monster is depicted with an unknown polearm weapon, which is later revealed to be a battle axe in its appearance in the ''[[Yu-Gi-Oh! GX]]'' anime and in its non-card rendering in video games, including the ''[[Yu-Gi-Oh! 5D's]]'' video games for the Nintendo DS, and ''[[Yu-Gi-Oh! Master Duel]]''.
