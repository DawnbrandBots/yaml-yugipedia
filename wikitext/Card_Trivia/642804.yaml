title: Card Trivia:Earth Golem @Ignister
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[A.I.'s Show]]".
  * The "[[@Ignister]]" logo is located in the gem embedded in this monster's chest.
  * This monster represents the [[EARTH]] [[Ignis]], [[Earth (character)|Earth]]
  ** This monster's EARTH [[Attribute]] and effects reference how the EARTH monsters rely on rock-solid defenses and brute strength.
  ** This monster is based on the designs of two "[[G Golem]]" monsters used by Earth: "[[G Golem Invalid Dolmen]]" and "[[G Golem Crystal Heart]]".
  *** The crystalline heart on this monster's pelvis references "G Golem Crystal Heart", the "G Golem" counterpart of "[[Marincess Crystal Heart]]", a [[Link Monster]] given to Earth by his fellow Ignis, [[Aqua (character)|Aqua]], representing Earth's bond with Aqua, as well as his love for her. Fittingly, this monster was [[Fusion Summon]]ed using "[[Doshin @Ignister]]" and "[[A.I. Love Fusion]]", which further represents Earth's feelings for Aqua. This is further reinforced by its damage protection effect, which further highlights Earth's desire to protect Aqua. 
  ** This monster's [[Fusion Monster|Fusion]] type is the same as both "[[Cyberse Clock Dragon]]", the monster that was used to defeat Earth in his first Duel against [[Yusaku Fujiki|Playmaker]], and "[[Dinowrestler Chimera T Wrextle]]", the monster that debuted in his last Duel against [[George Gore|The Gore]].
  *** This monster's [[ATK]]-gaining effect references how Earth was defeated by The Gore and was terminated and incorporated into his AI chip. Fittingly, this card debuted in [[Ai]]'s Duel against The Gore, which the former won using this monster.
