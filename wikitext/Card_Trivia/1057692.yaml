title: Card Trivia:Union Activation
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * "[[Union Hangar]]" appears in this card's artwork.
  ** This card's artwork depicts "[[X-Head Cannon]]" being converted into "[[X-Cross Cannon]]".
  * This card's second effect references how the [[Battle City Rules]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]] allowed "[[XYZ-Dragon Cannon]]" to be treated as three [[Tribute]]s (one for each of its components), which [[Seto Kaiba]] used to [[Tribute Summon]] "[[Obelisk the Tormentor]]".
  ** This effect [[add]]ing a monster with 3000 or more ATK from [[Deck]] to [[hand]] and [[Normal Summon]]ing it is designed to allow a player to add and Summon Seto Kaiba's signature card, "[[Blue-Eyes White Dragon]]", as well as "Obelisk the Tormentor".
