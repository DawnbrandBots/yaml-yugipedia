title: Card Trivia:Fiendsmith's Desirae
wikitext: |-
  {{Navigation}}

  * This monster is named after "[[wikipedia:Dies irae|Dies irae]]", a sequential Latin poem which describes [[wikipedia:Last Judgment|Judgment Day]], which is often used for the [[wikipedia:Funeral|funeral]] or the [[wikipedia:Requiem|Requiem Mass]] for the dead.
