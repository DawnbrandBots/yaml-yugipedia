title: Card Trivia:Miraculous Swordsman - Buster Blader
wikitext: |-
  {{Navigation}}

  * This monster's title, "Miraculous Swordsman", is a reference to the two [[Trap Card]]s that depict "[[Buster Blader]]": "[[Miracle Locus]]" and "[[Miracle Restoring]]".
  ** This monster is "Buster Blader" wearing armor that bears the gilding and green jewels depicted in the artwork of "Miracle Restoring", while also wielding the swords that "Buster Blader" is depicted using in the artwork of "Miracle Locus".
  ** In ''[[Yu-Gi-Oh! Rush Duel]]'', "[[Miracle Secret Arts]]", a retrain of "Miracle Restoring", can [[Fusion Summon]] this monster.
