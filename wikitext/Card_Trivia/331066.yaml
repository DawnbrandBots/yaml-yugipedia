title: Card Trivia:Nekroz of Unicore
wikitext: |-
  {{Navigation}}

  * This monster is "[[Great Sorcerer of the Nekroz]]" wearing armor based on "[[The Fabled Unicore]]".
  ** This monster shares the [[Level]], [[ATK]] and [[DEF]] as the  aforementioned monster, and also has a similar [[Negation]] [[Effect]].
  ** Out of his 4 forms Great Sorcerer appears to be the youngest in this card's artwork (Almost as young as when he was "[[Gishki Avance]]"). It is unknown if this is because the power of the monster this armor is based off of is having an effect on his body, or possibly the ritual that turned him into this monster revitalized him.
  * "[[Nekroz Mirror]]" appears in this card's artwork on his staff, the same as his previous form.
  * This card has the highest [[ATK]] of any [[Level 4]] or lower [[WATER]] monster, as well as any Level 4 or lower [[Ritual Monster]].
