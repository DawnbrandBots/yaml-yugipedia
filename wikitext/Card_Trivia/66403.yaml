title: Card Trivia:Gaia Power
wikitext: |-
  {{Navigation}}

  * The Spanish ''[[Starter Deck 2006]]'' print of this card has an [[Equip Spell Card]] icon instead of a [[Field Spell Card]] one.
  * This card has [[counterpart]]s for other [[Attribute]]s:
  ** "[[Luminous Spark]]" for [[LIGHT]].
  ** "[[Molten Destruction]]" for [[FIRE]].
  ** "[[Mystic Plasma Zone]]" for [[DARK]].
  ** "[[Rising Air Current]]" for [[WIND]].
  ** "[[Umiiruka]]" for [[WATER]].
  * This card has an opposite counterpart: "[[Acidic Downpour]]".
