title: Card Trivia:Umbramirage the Elemental Lord
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "Umbra" (Latin for "shade") and "[[wikipedia:Mirage|Mirage]]".
  * Like the other "[[Elemental Lord]]s", this monster's summon-triggered effect is reminiscent of a (previously) banned card, in this case: "[[Sangan]]".
  ** It is the only such effect that wasn't based on a [[Normal Spell Card|Normal Spell]]/[[Normal Trap Card|Trap Card]], and was instead based on an [[Effect Monster]]'s [[Trigger Effect]].
  ** It is the only such effect that, at the time of the respective Lords' printings, was based on a card that had already received a functional [[errata]]. However, this lacks the restriction that was given to "Sangan" as part of its errata, so it could be said it was based on a card that no longer existed (the original text of "Sangan").
