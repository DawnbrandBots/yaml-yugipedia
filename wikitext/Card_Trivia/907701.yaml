title: Card Trivia:Cosmic Quasar Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Duelist Nexus]]''.
  * Five [[Synchro Summon]]ing rings from the ''[[Yu-Gi-Oh! 5D's]]'' anime appear in this card's artwork.
  * This monster is a [[retrain]]ed counterpart of "[[Shooting Quasar Dragon]]" and "[[Cosmic Blazar Dragon]]".
  ** This monster's effect to [[negate]] cards on the [[field]], up to the number of monsters used as its [[Synchro Material]] +1 likely references how "[[Shooting Quasar Dragon (anime)|Shooting Quasar Dragon]]" was [[Synchro Summon]]ed by using five of the [[Signer Dragon]]s (except for "[[Stardust Dragon]]"), including the [[Tuner Synchro Monster]] "[[Life Stream Dragon (anime)|Life Stream Dragon]]", as Synchro Material in the anime. This allowed [[Yusei Fudo]] to attacks all of [[Z-one]]'s five "[[Timelord]]" monsters on the field.
  ** This monster's final effect references the [[Summoning condition]] of [[Delta Accel Synchro Summon]]ing and [[Limit Over Accel Synchro Summon]]ing, which requires a [[Tuner Synchro Monster]] and two or more non-[[Tuner]] Synchro Monsters as [[material]].
