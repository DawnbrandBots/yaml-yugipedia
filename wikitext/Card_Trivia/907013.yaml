title: Card Trivia:Gate Guardian of Thunder and Wind
wikitext: |-
  {{Navigation}}

  [[File:Yugioh021.png|thumb|right|300|"Gate Guardian" composed of just "Kazejin" and "Sanga of the Thunder" following the destruction of "Suijin"]]

  * This monster appears in the artwork of "[[Double Attack! Wind and Thunder!!]]".
  * This monster is based on the appearance of "[[Gate Guardian]]" after "[[Suijin]]" had been [[destroy]]ed in {{chapter|Yu-Gi-Oh!|097|ref}} and in {{episode|Yu-Gi-Oh!|021|ref}}.
  * This monster's [[original ATK and DEF]] are each equal to half the combined original [[ATK]] and [[DEF]] of its [[Fusion Material]]s.
  * This monster's effect to [[search]] for a [[Spell]]/[[Trap Card]] mentioning "[[Sanga of the Thunder]]", "[[Kazejin]]" and "Suijin" is based on the appearance of "Gate Guardian" without "Suijin"; [[Dox]] used "[[Riryoku]]" to increase the [[ATK]] of "Gate Guardian's" two components ("[[Riryoku Guardian]]") while [[Para]] used "Gate Guardian" to attack Yami Yugi's "[[Dark Magician]]" with the combined attack of "Sanga" and "Kazejin" ("Double Attack! Wind and Thunder!!").

