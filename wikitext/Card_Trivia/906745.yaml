title: Card Trivia:Crystal Shark
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Shark (archetype)|Shark]]" [[counterpart]] of "[[Number 94: Crystalzero]]".
  ** This monster's name and appearance are based on "Crystalzero".
  ** This monster's [[Level]] (5) matches the [[Rank]] of "Crystalzero".
  ** This monster's [[original ATK and DEF]] (1100/800) are half of those of "Crystalzero" (2200/1600).
  ** Both monsters share an effect that halves the [[ATK]] of a [[target]]ed monster.
  * This monsters is a counterpart of "[[Abyss Shark]]", which is based on "[[Number 73: Abyss Splash]]".
  ** Both monsters are depicted with mirrored poses in their card artworks.
  ** Both monsters share the same [[Attribute]] ([[WATER]]), Level (5), and [[Type]] ([[Fish]]), as well as the same combined ATK and [[DEF]] (1900).
