title: Card Trivia:Continuous Destruction Punch
wikitext: |-
  {{Navigation}}

  * "[[Des Kangaroo]]" appear in this card's artwork.
  ** The appearance of "Des Kangaroo" in this card's artwork is fitting, as this card's secondary effect [[destroy]]s the opponent's monster, similar to the effect of the aforementioned monster. 
  *** This follows the trend of two other [[Spell]]/[[Trap Cards]], "[[Cross Counter]]" and "[[Destruction Punch]]", which depicts "Des Kangaroo" punching an opponent and features an effect that destroys an opponent's monster based on the value of their [[ATK]] or [[DEF]] against the player's attacked [[Defense Position]] monster.
  ** This card's artwork depicts a goblin similar in appearance with appearance of "[[Coach Goblin]]". Both monsters are depicted with small horns, a pair of yellow eyes with an injured left eye, and missing teeth.
  ** At the time of this card's release in ''[[Champion of Black Magic]]'' (in the ''[[OCG]]'') and ''[[Dark Revelation Volume 1]]'' (in the ''[[TCG]]''), "Des Kangaroo" had not yet been released until its debut in ''[[Controller of Chaos]]'' (in the ''OCG'') and ''[[Invasion of Chaos]]'' (in the ''TCG'').
  * This is one of the few ''TCG'' cards with an artwork that depicts blood and gore.
