title: Card Trivia:Visas Amritara
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[New World Stars]]", "[[Realm Eulogy]]", and "[[Sharv Sarga]]".
  ** This card's artwork appears in the artwork of "[[Loka Samsara]]".
  * This monster's name is a portmanteau of the Hindi words ''amirita'' ("immortality") and ''tara'' ("star").
  * This monster is "[[Visas Starfrost]]" after having combined with his 4 emotions: "[[Scareclaw Reichheart]]", "[[Tearlaments Reinoheart]]", "[[Kashtira Riseheart]]", and "[[Mannadium Riumheart]]".
  ** Each of the 4 colors at the edges of this monster's clothes represent those emotions. Clockwise, those are: Blue ("Reinoheart"), green ("Reichheart"), red ("Riseheart") and orange ("Riumheart").
