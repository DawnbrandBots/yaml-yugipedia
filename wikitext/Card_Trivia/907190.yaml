title: Card Trivia:Advance Block
wikitext: |-
  {{Navigation}}

  * "[[Max Raider]]" and a blocky version of "[[Alpha Burn Drake]]" appear in this card's artwork.
  ** The blocky version of "Alpha Burn Drake" might be a reference to how [[Yuamu Ohdo]] is the original owner of [[Yuhi Ohdo]]'s [[Jointech]] [[Main Deck|Deck]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, something further enforced by the card being able to be used with [[Machine]] [[Type]]s as well.
