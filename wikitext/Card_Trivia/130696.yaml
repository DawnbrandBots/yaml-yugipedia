title: Card Trivia:Blackwing - Aurora the Northern Lights
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Aurora (astronomy)|Aurora Borealis]], a natural light display predominantly seen in the Earth's sky, which reflects its [[LIGHT]] [[Attribute]]. This phenomenon is also known as the "Northern Lights", which appears in the background of this card's artwork.
  ** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster is depicted with the Aurora Borealis above its head. Also, when this monster uses its effect to [[banish]] a "[[Blackwing]]" [[Synchro Monster]] and make this monster's name, [[original ATK]], and effects the same as that banished monster's, it creates an auroral projection of that banished monster around itself.
  * This is the first [[Level 7]] or higher non-Synchro "Blackwing" monster.
  * This monster has the highest [[Level]] (10) of all [[Main Deck]] "Blackwing" monsters.
  * This is the only "Blackwing" monster whose Attribute is not [[DARK]].
  * This is the only "Blackwing" monster to have [[?]] [[ATK]].
  * This is the first non-Synchro Monster to require a [[Tuner monster]] and a non-Tuner monster to Summon it.
  * In the ''Yu-Gi-Oh! 5D's'' anime, [[Crow Hogan]] used this monster to counter the effects of the "[[Meklord]]" monsters, similar to [[Yusei Fudo]]'s "[[Shooting Star Dragon (anime)|Shooting Star Dragon]]" and [[Jack Atlas]]' "[[Red Nova Dragon (anime)|Red Nova Dragon]]". Though this monster's effect can assume the name, ATK, and effects of a Synchro Monster, it is not treated as a Synchro Monster, which allows it to avoid the anti-Synchro effects of the "Meklord" monsters.
  ** Unlike "Shooting Star Dragon" and "Red Nova Dragon", however, this monster has no relationship with Crow's "[[Black-Winged Dragon (anime)|Black-Winged Dragon]]" and cannot copy its name, ATK, and effects, as its effect can only be used on a "Blackwing" Synchro Monster.
