title: Card Trivia:Lefty Driver
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Junk Repair Heal]]".
  * This monster's weapon is based on a [[wikipedia:List of screw drives#Slotted drives|flat-bladed screwdriver]], a type of slotted [[wikipedia:Screw drive|screw drive]] with a single horizontal indentation in the fastener head.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|010|ref}}, specifically from the panel showing [[Lefty Driver (manga)|this monster]] being Summoned.
