title: Card Trivia:Spirit Charmers
wikitext: |-
  {{Navigation}}

  * "[[Aussa the Earth Charmer]]", "[[Hiita the Fire Charmer]]", "[[Eria the Water Charmer]]", and "[[Wynn the Wind Charmer]]" (or "[[Aussa the Earth Charmer, Immovable]]", "[[Hiita the Fire Charmer, Ablaze]]", "[[Eria the Water Charmer, Gentle]]", and "[[Wynn the Wind Charmer, Verdant]]") appear in this card's artwork.
  * This card shares both its ''[[OCG]]'' ("Masters of the Spirit Arts") and ''[[TCG]]'' ("Spirit Charmers") names with the [[Structure Deck]]s in which it was released: ''[[Structure Deck: Masters of the Spiritual Arts]]''/''[[Structure Deck: Spirit Charmers]]''.
