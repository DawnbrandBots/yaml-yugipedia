title: Card Trivia:Root Ransom Virus
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Rootkit|rootkit]], a type of malware program that allows malicious actors to gain access to a computer or network and control it without the owner's knowledge.
  ** This card's international name is also a reference to [[wikipedia:Ransomware|ransomware]], a  type of malware that prevents access to a device's files, systems, or networks and demands a ransom for their return.
