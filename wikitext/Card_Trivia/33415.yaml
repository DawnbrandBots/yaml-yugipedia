title: Card Trivia:Overworked
wikitext: |-
  {{Navigation}}

  * "[[Kozaky]]" appears in this card's artwork.
  ** The letters "KOZ" appear on the back of the [[wikipedia:Computer monitor|computer monitor]] in this card's artwork, likely short for "Kozaky".
  ** <!--It is not the exact same interface, as the etched lines and yellow/black lines are different.-->An interface similar to the interface of "[[Kozaky's Self-Destruct Button]]" also appears in the background.
  * This card's artwork, effect, and Japanese name (translated as "Overspec") likely reference [[wikipedia:Overclocking|overclocking]], which is the practice of increasing a device's [[wikipedia:Clock rate|clock rate]] past its manufacturer's recommended specifications, to potentially yield an increase in the device's performance, but at the risk of various downsides to the device.
  ** However, these characteristics may reference the flavor text of "Kozaky" as well, which describes him as a [[wikipedia:Workaholic|workaholic]], as reinforced by this card's English, German, Italian, and Spanish names.
