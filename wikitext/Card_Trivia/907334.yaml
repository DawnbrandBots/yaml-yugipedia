title: Card Trivia:Amphibious Bugroth MK-11
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[counterpart]] of "[[Amphibious Bugroth]]" and an upgraded form of "[[Amphibious Bugroth MK-3]]".
  * "MK-11" in this monster's name references to its debut in [[Series 11]], just like "Amphibious Bugroth MK-3" references to [[Series 3]].
  ** Alternatively, it can be read as "MK-II" (with II being 2 in Roman numerals), referencing to the lack of a monster called 'Amphibious Bugroth MK-2' despite "Amphibious Bugroth MK-3" existing.
  *** Fittingly, this monster has more similarities with "Amphibious Bugroth" than "Amphibious Bugroth MK-3" has, sharing the same [[Level]] (5) and [[ATK]] (1850) whereas the latter only shares the same [[DEF]] (1500).
