title: Card Trivia:Flint
wikitext: |-
  {{Navigation}}

  * "[[Flint]]" and "[[Flint Lock]]" are from the 1991 Konami Shooter "''[[wikipedia:Xexex|Xexex]]''". In that game, Flint was the primary weapon of the ship Flint Lock.
  * The shape of "Flint" resembles the three "arms" at the rear of "Flint Lock".
