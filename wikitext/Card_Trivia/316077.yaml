title: Card Trivia:Qliphort Scout
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Nephe Shaddoll Fusion]]" and "[[Qlipper Launch]]".
  * A blue and red [[Pendulum Scale]] appears on each end of this monster.
  * [[wikipedia:Qliphoth|Qliphoth]] and [[wikipedia:Sephirot|Sefiroth]] (singular Sephirah) are concepts described by the [[wikipedia:Kabbalah|Kabbalah]], a set of [[wikipedia:Esotericism|esoteric]] teachings meant to explain the relationship between an unchanging, eternal, and mysterious [[wikipedia:Ein Sof|Ein Sof]] (no end) and the mortal and finite [[wikipedia:Universe|universe]] ([[wikipedia:God|God]]'s creation). The Sephirot (also Romanized as Sephiroth, Sefirot, and Sefiroth) are the ten [[wikipedia:Emanationism|emanations]] and attributes of God with which he continually sustains the universe in existence.
  ** This monster is specifically based on [[wikipedia:Tiferet|Tiferet]], the sixth of the Sephirot in the [[wikipedia:Tree of life (Kabbalah)|Kabbalistic Tree of Life]].
  ** This card's Japanese name contains ツール ''tsūru''; this is a pun on "tool" and "Kaitul" (カイツール ''Kaitsūru'' "ugliness"), the sixth Qliphoth emanation which is associated with the [[wikipedia:Devil|Devil]] [[wikipedia:Belphegor|Belphegor]].
  * This card includes several computer-related [[wikipedia:Character (computing)|characters]] and [[wikipedia:Syntax (programming languages)|syntaxes]] in its flavor text:
  ** [[wikipedia:Tierra (computer simulation)|Tierra]] is a [[wikipedia:Computer simulation|computer simulation]] of life in which [[wikipedia:Computer program|computer programs]] compete for [[wikipedia:Central processing unit|CPU]] time and access to main memory.
  ** The [[wikipedia:Japanese yen|Yen]] sign ([[wikipedia:¥|¥]]) as seen in this card's Japanese flavor text is used in place of the reverse solidus (\), also known as the [[wikipedia:Backslash|backslash]], in [[wikipedia:Path (computing)|computing paths]] in Japanese-locale systems. Similarly, the [[wikipedia:Korean won|Won]] sign ([[wikipedia:Won sign|₩]]) as seen in its Korean flavor text is used instead in Korean-locale systems.
  * This card is the first [[Pendulum Monster]] to have been on an OCG/TCG Forbidden/Limited List, and the first [[Normal Monster]] to be [[Semi-Limited]]. It is also the only Normal Monster to have ever been on the Forbidden/Limited Lists that is not a "[[Forbidden One]]" card.
  ** This only extends to [[Master Duel]] Lists, as "[[Genex Controller (Duel Links)|Genex Controller]]" has been [[Limited 2]] in ''[[Yu-Gi-Oh! Duel Links]]''.
