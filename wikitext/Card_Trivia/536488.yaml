title: Card Trivia:Prometheus, King of the Shadows
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Prometheus|Prometheus]], a Titan from [[wikipedia:Greek mythology|Greek mythology]] who brought fire to humans and was punished by [[wikipedia:Zeus|Zeus]] by being tied to the top of a mountain, and having an eagle eat his liver every day, which regenerated.
  * This monster's Japanese name, "Dark King Prometheus" ({{Ruby|闇|やみ}}{{Ruby|王|おう}}プロメティス, ''Yamiō Purometisu''), corresponds with the Japanese name of "[[Eradicator Epidemic Virus]]", "Deck Destruction Virus of Darkness" ({{Ruby|闇|やみ}}のデッキ{{Ruby|破|は}}{{Ruby|壊|かい}}ウイルス, ''Yami no Dekki Hakai Uirusu'').
  * This is the first card to be reprinted in two different ''[[Gold Series (series)|Gold Series]]'' packs: a [[Gold Rare]] in ''[[Gold Series]]'', and as a [[Common]] in ''[[Gold Series 4: Pyramids Edition]]''.
