title: Card Trivia:The Atmosphere
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Atmosphere of Earth|Atmosphere]], a layer of gases that envelops the Earth, held in place by gravity.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|045|ref}}, specifically from the panel showing [[The Atmosphere (manga)|this monster]] being Summoned.
