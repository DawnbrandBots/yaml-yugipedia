title: Card Trivia:Poplar of the White Forest
wikitext: |-
  {{Navigation}}

  * This monster is a "[[White Forest]]" [[Tuner Synchro Monster]] counterpart of "[[Snake-Eyes Poplar]]".
  ** "Poplar" took on this form after absorbing the remaining energy of "[[Diabell, Queen of the White Forest]]" that was released after "[[Azamina (card)|Azamina]]" shed her [[Queen Azamina|possessed]] [[Saint Azamina|body]].
  * "[[Snake-Eyes Vengeance Dragon]]" is the combined form of this monster and "[[Diabellstar Vengeance]]".
