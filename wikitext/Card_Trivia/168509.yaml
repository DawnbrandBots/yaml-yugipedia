title: Card Trivia:Empty Machine
wikitext: |-
  {{Navigation}}

  * This card's name references "[[wikipedia:Ayin and Yesh|Ein]]", the [[wikipedia:Kabbalah|Jewish Kabbalistic]] term representing nothingness, nonexistence, and emptiness, used as part of the concept of [[wikipedia:Ein Sof|Ein Sof]].
  ** The translations of "Ein" are synonymous with the number "0", which represents an empty quantity. Fittingly, the golden ring in this card's artwork resembles the number "0", which also reflects this card's anime effect of reducing the [[ATK]] of the player's monsters to 0.
  * This card's anime effect to [[Tribute Summon]] a [[Level 10]] monster without Tributing is incorporated into the ''[[OCG]]''/''[[TCG]]'' effects of the "[[Timelord]]" monsters, except "[[Sephylon, the Ultimate Timelord]]".
