title: Card Trivia:Sinful Spoils of Betrayal - Silvera
wikitext: |-
  {{Navigation}}

  * "[[Diabellstar the Black Witch]]" and "[[Snake-Eyes Flamberge Dragon]]" appear in this card's artwork.
  ** This card depicts the active form of the former's "scarf", which is in actuality the soul of "[[Silvy of the White Forest]]", mutated after it was separated from her own body by "[[Azamina (card)|Azamina]]". The body itself mutated into "[[Azamina Ilia Silvia]]", which accordingly also has the word "betrayal" in its Japanese name, although written as 「背信」 (''haishin'') instead of 「裏切り」 (''uragiri'').
  *** "[[Guilt of the Sinful Spoils]]" depicts "Silvera" defeating "Silvia".
