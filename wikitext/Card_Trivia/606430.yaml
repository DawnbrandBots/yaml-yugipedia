title: Card Trivia:Crossout Designator
wikitext: |-
  {{Navigation}}

  * The knight from "[[Nobleman of Crossout]]" appears in this card's artwork, with his pose mirroring the artwork of "[[D.D. Designator]]", alluding to the fact that this card's effect is mechanically a cross between the two cards.
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card has an animation when activated: the knight from the artwork appears and points his sword towards the opponent.
