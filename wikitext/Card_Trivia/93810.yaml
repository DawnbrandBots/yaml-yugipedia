title: Card Trivia:Grave Lure
wikitext: |-
  {{Navigation}}

  * This is one of several cards that allows cards to be [[face-up]] in the [[Main Deck]], the others being "[[Convulsion of Nature]]", "[[Parasite Paracide]]", "[[Pharaoh's Treasure]]", "[[Symmetry Rorschach]]", and the anime effect of "[[Wiretap (anime)|Wiretap]]".
