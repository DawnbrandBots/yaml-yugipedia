title: Card Trivia:Ronintoadin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rain of Frogs]]", and "[[Two Toads with One Sting]]".
  * This monster's Japanese name, "Classy Toad" (いきカエル, ''ikikaeru'') is a pun on the Japanese term 「生き返る」 meaning "to bring back to life", reflecting its effect to [[Special Summon]] itself from the [[Graveyard]].
  ** This monster's Japanese name and effect are similar to those of "[[Frog Resurrection]]" (イキカエル, ''ikikaeru'').
  ** This monster's English name is derived from "''[[wikipedia:Rōnin|ronin]]''", a term for [[wikipedia:Samurai|samurai]] that have no masters to serve under.
