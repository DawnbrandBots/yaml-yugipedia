title: Card Trivia:The Winged Dragon of Ra
wikitext: |-
  {{Navigation|other=[[The Winged Dragon of Ra (Sphere Mode)|Sphere Mode]] - [[The Winged Dragon of Ra (Phoenix Mode)|Phoenix Mode]]}}

  * This is one of the [[cover card]]s of ''[[Battle Pack 2: War of the Giants]]'', ''[[Millennium Box Gold Edition]]'', and ''[[Legendary Collection: 25th Anniversary Edition]]''.
  * This monster appears in the artwork of "[[Ancient Chant]]", "[[Blaze Cannon]]", "[[Dangers of the Divine]]", "[[Gravekeeper's Inscription]]", "[[Gravekeeper's Oracle]]", "[[Quiz Panel - Ra 10]]", "[[Quiz Panel - Ra 20]]", "[[Quiz Panel - Ra 30]]", "[[Sun God Unification]]", and "[[The True Sun God]]".
  * This monster is based on [[wikipedia:Ra|Ra]], the god of the [[wikipedia:Sun|Sun]] in [[wikipedia:Ancient Egyptian religion|Ancient Egyptian religion]] who is depicted with the head of a falcon.
  * This monster has multiple [[counterpart]]s:
  ** [[Wicked God]]: "[[The Wicked Avatar]]".
  ** [[Sacred Beast]]: "[[Hamon, Lord of Striking Thunder]]".
  ** [[Retrained]]: "[[The Winged Dragon of Ra - Sphere Mode]]" and "[[The Winged Dragon of Ra - Immortal Phoenix]]".
  * The background of this card's artwork was used in the ''[[Yu-Gi-Oh! Forbidden Memories]]'' video game as one of the [[Forbidden Ruins]] wall designs. Interestingly, the hexagram was not edited out in this card's international artwork, but the international version of ''Forbidden Memories'' replaced it with a hexagon.
  * This is the only Egyptian God to not have a ''[[Dungeon Dice Monsters]]'' version.
  * This is the only Egyptian God to not be named specifically in the Chinese ''[[OCG]]'': its name is 「太陽神的翼神龍」 ("Winged God Dragon of Sun God"), but does not contain the name "Ra".
  * In the Japanese version of the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], it is explained that the [[hieratic text]] printed on this card records the following three groups of this monster's abilities (as said by [[Seto Kaiba (manga)|Seto Kaiba]] in {{chapter|Yu-Gi-Oh!|248|ref}} and his [[Seto Kaiba|anime counterpart]] in {{episode|Yu-Gi-Oh!|127|ref}}). When roughly translated to English, the text reads:
  ** 1st ability: ''Ra shall acquire the power of three tributes. However, only those who offer the ancient incantation to heaven shall God follow.''
  ** 2nd ability: ''God shall revive from earth. By offering the Ritual of Revival and his own life, one shall be united with God, and all enemies on the battlefield shall be incinerated.''
  ** 3rd ability: ''In an instant, God shall become a Phoenix, and all evil spirits chosen by it shall repose on earth.''
  * In the English dubbed version of ''Yu-Gi-Oh!'' anime, this card's hieratic text has a different meaning, as first seen when [[Yami Marik]] recited it in {{episode|Yu-Gi-Oh!|092|ref}}.
  ** Also, in the English version of the anime, when Marik attempted to gain [[control]] of this monster, he spoke understandable words. However, in the Japanese versions of the ''Yu-Gi-Oh!'' manga and anime, he recited the hieratic text itself in an unknown language, while in the manga, his speech bubbles are filled with hieratic text. In {{episode|Yu-Gi-Oh!|221|ref}}, when [[Yami Yugi|Atem]] Summoned this monster, he used a different chant, while in the Japanese version, he still chanted in incomprehensible hieratic.
  * In {{chapter|Yu-Gi-Oh!|083|ref}}, [[Marik Ishtar (manga)|Marik Ishtar]] stated that this monster was the most powerful of the three [[Egyptian God]]s, even being considered in [[Hierarchy|another class]]. This is displayed later when it easily gets rid of "[[Slifer the Sky Dragon (manga)|Slifer the Sky Dragon]]" via its [[God Phoenix (manga)|Phoenix Mode]], and when it was immune to the attack of "[[The God of the Obelisk]]", despite the latter having ∞ [[ATK]] while this monster was in its Battle Mode.
  ** Ironically, in the ''[[OCG]]''/''[[TCG]]'', this monster is generally considered to be the weakest Egyptian God. Further irony is that its sealed form is generally considered the best version of this monster.
  * In the Japanese version of the ''Yu-Gi-Oh!'' manga and anime, this monster and the other [[Egyptian God]]s were in English, but still had their Japanese names. Also, in the manga, "Defense" was mispelled as "Defence".
  ** In its first appearance as a card in the Japanese version of the anime, the name appeared with its proper Japanese characters, being the only Egyptian God to appear in this form in the anime series. Also, it appeared with its [[DIVINE]] [[Attribute]] icon and its [[Divine-Beast]] [[Type]] in Japanese characters, "???" in its lore, and "????" for its ATK and [[DEF]] values.
  * During the [[Battle City (manga arc)|Battle City]] arc in the ''Yu-Gi-Oh!'' manga (and its [[Battle City (part 1)|two]]-[[Battle City (part 2)|parter]] anime adaptation), each time this monster was Summoned, a new effect was revealed:
  ** [[Katsuya Jonouchi and Rishid's Duel (manga)|Katsuya Jonouchi and Rishid's Duel]] and its [[Joey Wheeler and Odion's Duel|anime adaptation]]: When [[Rishid (manga)|Rishid]] ([[Odion]] in the anime) Summoned the counterfeit copy, he revealed that this monster took on the ATK/DEF of the monsters that were [[Tribute]]d to [[Tribute Summon]] it.
  ** [[Mai Kujaku and Dark Marik's Duel (manga)|Mai Kujaku and Dark Marik's Duel]] and its anime adaptation: When [[Mai Kujaku (manga)|Mai Kujaku]] ([[Mai Valentine]] in the anime) Summoned this monster in its Sphere Mode against [[Dark Marik (manga)|Dark Marik]] (Yami Marik in the anime), having taken it from him with the effect of "[[Amazoness Chain Master (manga)|Amazoness Chain Master]]" (and its [[Amazoness Chain Master (anime)|anime counterpart]]), the effect stated to be "the first power of Ra" was revealed: ''God himself will serve the player to utter the ancient text''. This referred to the hieratic text that only appeared when this monster was Summoned, which had to be spoken aloud to control the card. As Mai was unable to, Yami Marik did so, and he gained control of this monster, transforming it from its Sphere Mode to its Battle Mode.
  ** [[Dark Bakura and Dark Marik's Duel (manga)|Dark Bakura and Dark Marik's Duel]] and its [[Yami Bakura and Yami Marik's Duel|anime adaptation]]: When Dark Marik (Yami Marik in the anime) used this monster against [[Dark Bakura (manga)|Dark Bakura]] ([[Yami Bakura]] in the anime), its second power was revealed: "[[Point-to-Point Transfer]]" (or "One-Turn Kill" in the Japanese manga and anime), which allows the player to pay [[Life Points]] to increase its ATK/DEF; and "[[Instant Attack]]", which allows to attack ignoring other effects and conditions, while being able to attack all the monsters on the [[field]] as well as attacking directly.
  ** [[Katsuya Jonouchi and Dark Marik's Duel (manga)|Katsuya Jonouchi and Dark Marik's Duel]] and its [[Joey Wheeler and Yami Marik's Battle City Duel|anime adaptation]]: When Dark Marik (Yami Marik in the anime) used this monster against [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] ([[Joey Wheeler]] in the anime), its third power was revealed: Its [[God Phoenix (manga)|God Phoenix]] ([[Egyptian God Phoenix]] in the anime) form, capable of [[destroy]]ing monsters on the field.
  ** [[Dark Yugi and Dark Marik's Duel (manga)|Dark Yugi and Dark Marik's Duel]] and its [[Yami Yugi and Yami Marik's Duel|anime adaptation]]: When Dark Marik (Yami Marik in the anime) used this monster against [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in the anime), it revealed a different effect/part of a previous effect. The first time, it was revealed that this monster's Phoenix Mode was immune to destruction, and its destruction effect could destroy another God card. The second time, it was revealed that the player could Tribute monsters to increase this monster's ATK/DEF by those of the Tributes monster's. The third time, in the manga only, it was revealed that even in Battle Mode, this monster was immune to the attacks and effects of Gods that were lower in rank. This hierarchy would later be expanded upon in ''[[Yu-Gi-Oh! R]]''.
  * Until it was gained control of by Dark Marik, this monster's Battle Mode was always obscured in some manner, most notably when it was Summoned by Rishid (possibly due to the card being a fake).
  * In the ''Yu-Gi-Oh!'' manga and anime, Dark Marik (Yami Marik in the anime) used this monster several times, but he never Tribute Summoned it and instead opted to [[Special Summon]] it from the [[Graveyard]] with "[[Monster Reborn (manga)|Monster Reborn]]" (and its [[Monster Reborn (anime)|anime counterpart]]) and use its ATK-increasing effects, though the first time he used it was when he took control of it during his Duel against Mai Kujaku (Mai Valentine in the anime), which had the ATK inherited from the three monsters Mai Tributed to Tribute Summon it. In the manga, Mai Tributed three copies of "[[Harpie Lady (manga)|Harpie Lady]]" to Tribute Summon it, while in the anime, Mai Tributed three copies of "[[Cyber Harpie (anime)|Cyber Harpie]]". Also, in the anime, Yami Marik intended to Tribute his three "[[Slime Token (anime)|Slime Tokens]]" to Tribute Summon it before Mai destroyed his "[[Jam Breeding Machine (anime)|Jam Breeding Machine]]".
  ** In the anime, whenever this monster was used by someone else other than Yami Marik, it was Normal Summoned. In {{episode|Yu-Gi-Oh!|221|ref}}, Atem Normal Summoned it during the [[Battle Ritual]] to give [[Yugi Muto]] the challenge of facing all three Egyptian Gods at once. In {{episode|GX|085|ref}}, [[Franz]] Normal Summoned a copy of this monster (in the English dubbed version, he uses a condensed version of the same chant used by Yami Marik).
  *** According to Seto Kaiba in the manga, this monster's advantage compared to the other Gods is the "power of quickness", where if other Gods are Special Summoned from the Graveyard, they can't attack during the same turn, and they would return to the Graveyard at the end of the turn, meaning that "Monster Reborn" would be wasted on a God, while this monster can attack on the same turn, helped by its ATK-increasing effects to ensure its [[OTK]] strategy, which primarily makes up Dark Marik's overall Dueling strategy.
  *** Ironically, despite this monster being usually Special Summoned from the Graveyard by Dark Marik (Yami Marik in the anime) in the ''Yu-Gi-Oh!'' manga and anime, in the ''OCG''/''TCG'', this monster's [[legal]] version cannot be Special Summoned.
  * This monster's later designs feature the following distinctions from its original design: 
  ** It has a gold color scheme instead of a dull yellow color scheme.
  ** It has four claws instead of three.
  ** It has shoulder pads and an arch on its back.
  ** It has a tail feather instead of a long lizard-like tail.
  ** It appears to have an eagle-like beak without any teeth.
  * This is one of the three only cards to have the cost of paying Life Points until the player has 100 left, the other two being "[[Backs to the Wall]]" and "[[Sun God Unification]]".
  * The [[Effect Monster]] version of this card is one of the few cards early printed in the game to not have the 8-digit [[password]] in the bottom left corner, and no border around the card artwork.
  * Many [[counterfeit]] versions of this card exist, with alternate arts rarely or never seen anywhere else.
  * [[Upper Deck Entertainment]] representatives used a copy of this card, which had a different image and the hieratic text in the place of the flavor text.
  * In ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'', the icon for Divine-Beast monsters is based on this monster.
