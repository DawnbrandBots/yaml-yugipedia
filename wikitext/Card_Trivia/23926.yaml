title: Card Trivia:Handcuffs Dragon
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Wapper", is the police slang for "handcuff", which was popularized in Japan and used frequently in police dramas during the 1980s.
  * This monster has [[Equal ATK and DEF|equal]] [[original ATK and DEF]] (1800), likely reflecting its appearance, which features a pincer-like head identical to its tail.
  * This is the first monster to be [[Tribute Summon]]ed in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
