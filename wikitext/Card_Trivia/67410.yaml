title: Card Trivia:Hitotsu-Me Giant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Stage of Destiny]]".
  ** A cookie of this monster appears in the artwork of "[[Monster Assortment]]".
  * This card appears in the artwork of "[[Cost Down]]".
  * This monster's Japanese name is derived from the [[wikipedia:Cyclopes|Cyclops]], a one-eyed giant in [[wikipedia:Greek mythology|Greek mythology]].
  ** This monster's ''[[TCG]]'' name is based on the ''[[wikipedia:Hitotsume-kozō|Hitotsume-kozō]]'', a one-eyed yokai in Japanese mythology, with "Hitotsu-me" being the Japanese word for "one-eyed" or "first". Coincidentally, this is the first monster to appear as a hologram in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  * This is the first monster to be Summoned by [[Seto Kaiba]] in the ''Yu-Gi-Oh!'' anime.
  ** This is also the first [[Beast-Warrior]] monster Summoned in the anime.
  * This monster has a "[[Cyber]]" [[counterpart]]: "[[Cybernetic Cyclopean]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' and [[Konami's Yu-Gi-Oh! Duel Monsters]]' poses are taken from a panel from {{chapter|Yu-Gi-Oh!|036|ref}} showing [[Hitotsu-me Giant (manga)|this monster]] being Summoned, albeit with added details.
