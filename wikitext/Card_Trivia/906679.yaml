title: 'Card Trivia:Player C39: Home Run Smasher'
wikitext: |-
  {{Navigation}}

  * This monster is a ''[[Rush Duel]]'' [[Baseball]] parody of "[[Number C39: Utopia Ray]]".
  ** This monster's name is a parody of the Japanese name of "Utopia Ray": "Hope Ray".
  ** This monster's [[Type]] ([[Warrior]]) and [[original ATK and DEF]] (2500/2000) are the same as "Utopia Ray".
  ** This monster's effect requirement to [[shuffle]] 3 [[Level 4]] monsters from the [[Graveyard]] into the [[Deck]] is based on the three Level 4 monsters required to Xyz Summon "Utopia Ray".
  ** This monster's effect allowing it to gain 1500 ATK and reduce an opponent's monster's ATK by 3000 is a reference to the effect of "Utopia Ray", which can gain 500 ATK and reduce the ATK of an opponent's monster by 1000 for every [[Xyz Material]] detached from it. In addition, the requirement of 1000 or less [[Life Points]] is derived from the restriction of the effect of "Utopia Ray", which requires the player to have 1000 Life Points or less to use its effect.
