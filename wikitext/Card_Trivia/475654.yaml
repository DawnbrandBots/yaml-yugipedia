title: Card Trivia:Subterror Behemoth Stygokraken
wikitext: |-
  {{Navigation}}

  * "[[Subterror Nemesis Warrior]]" appear in this card's artwork.
  * This monster's English name is a combination of the words "[[wikipedia:Stygofauna|stygofauna]]" (living organisms that live in subterranean cave systems) and "[[wikipedia:Kraken|Kraken]]" (a sea monster from [[wikipedia:Nordic folklore|Nordic folklore]]).
  ** This monster's Japanese name, "Subterror Malice Aquadria", is a portmanteau of "[[Aqua]]" and "Adriatic" (referencing the [[wikipedia:Adriatic Sea|Adriatic Sea]], keeping with the [[wikipedia:Mediterranean Sea|Mediterranean Sea]] theme of the Japanese names of the "[[Subterror Behemoth]]" monsters).
  * This is the first [[EARTH]] [[Sea Serpent]] monster, as well as the first Sea Serpent [[Flip monster]].
