title: Card Trivia:Meklord Army of Granel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Meklord Astro the Eradicator]]" and "[[The Resolute Meklord Army]]".
  * This monster is the "[[Meklord Army]]" [[counterpart]] of "[[Meklord Emperor Granel]]".
  ** This monster's effect is similar and antithetical to that of "Meklord Emperor Granel"; this monster's effect decreases a monster's [[ATK]] by half, while "Meklord Emperor Granel" increases its ATK by the player's [[Life Point]]s.
  * Similar to its "[[Meklord Army of Skiel|Skiel]]" and "[[Meklord Army of Wisel|Wisel]]" counterparts, this monster's ''[[TCG]]'' name indicates a plural, similar to that of "[[Royal Firestorm Guards]]"; however, this card's artwork and the ''[[Yu-Gi-Oh! 5D's]]'' anime only depicts one monster.
