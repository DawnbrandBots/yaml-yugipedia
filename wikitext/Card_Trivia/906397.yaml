title: Card Trivia:Cutter Shark
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster's name reflects its effect to "cut" in battle by [[Tribute|Tributing]] the player's monster when it is targeted for an attack.
  ** This monster's ''[[TCG]]'' name is also based on the clipper ship ''[[wikipedia:Cutty Sark|Cutty Sark]]'', which is named after [[wikipedia:Cutty-sark (witch)|Cutty-sark]], the witch featured on its figurehead.
