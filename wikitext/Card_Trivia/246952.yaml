title: Card Trivia:Battlin' Boxer Headgeared
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Battlin' Boxing Spirits]]" and "[[Fancy Footwork]]".
  * This monster's name and design are based on a [[wikipedia:headgear (martial arts)|headgear]], a padded helmet worn by amateur fighters in combat sports to prevent concussions. This is reflected in this monster's effect to prevent it from being [[destroyed by battle]] the first time.
