title: 'Card Trivia:Number 13: Embodiment of Crime'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * The number "13" appears on this monster's left shoulder plate.
  * The Japanese names of this monster ("Cain's Devil") and "[[Number 31: Embodiment of Punishment]]" ("Abel's Devil") are based on the Biblical story of [[wikipedia:Cain and Abel|Cain and Abel]], the first and second sons of [[wikipedia:Adam and Eve|Adam and Eve]], where Cain committed the first sin by killing Abel. The opposite position of their numbers further allude to this.
  ** The reference this monster makes to Abel takes on additional meaning in the context of its debut in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga. This monster appeared out of [[Kaito Tenjo (manga)|Kaito Tenjo's]] [[Extra Deck]] after he reduced [[Ryoga Kamishiro (manga)|Ryoga "Shark" Kamishiro's]] [[Life Point]]s to below half - in short, Kaito played the role of Cain after he "killed" Shark (Abel) during the Duel.
  * The ''[[TCG]]'' names of this monster and "Number 31: Embodiment of Punishment" may be derived from the title of the novel "[[wikipedia:Crime and Punishment|Crime and Punishment]]" by [[wikipedia:Fyodor Dostoyevsky|Fyodor Dostoyevsky]].
  ** In particular, this monster's ''TCG'' references the aforementioned crime of Cain murdering Abel.
  * Along with "Number 31: Embodiment of Punishment", this is one of the few "[[Number]]" monsters in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and manga to not prevent its destruction by battle from non-"Number" monsters.
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|ZEXAL|031|ref}}, specifically from the panel showing [[No. 13: Cain's Doom (manga)|this monster]], albeit with the razor disc in a different position.
