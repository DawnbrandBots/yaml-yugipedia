title: Card Trivia:Special Schedule
wikitext: |-
  {{Navigation}}

  * A remodeled version of "[[Ancient Gear Gadjiltron Dragon]]" and the [[Graveyard]] portal from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime appear in this card's artwork.
  ** Fittingly, "Ancient Gear Gadjiltron Dragon" can be [[Special Summon]]ed by this card's effect.
  * The green-lit signal in this card's artwork appears in the artworks of "[[Exceptional Schedule]]" and "[[Urgent Schedule]]".
  * The tunnel in this card's artwork is possibly the same tunnel that appears in the artwork of "Urgent Schedule".
  * This card's TCG name is the same as the OCG name for "Exceptional Schedule".
