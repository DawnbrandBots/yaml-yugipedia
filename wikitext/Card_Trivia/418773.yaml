title: Card Trivia:Kozmotown
wikitext: |-
  {{Navigation}}

  * "[[Kozmo Forerunner]]" appears in this card's artwork.
  * This card is a reference to the capital city of the planet [[wikipedia:Coruscant|Coruscant]] from the ''[[wikipedia:Star Wars|Star Wars]]'' franchise, as well as the [[wikipedia:Emerald City|Emerald City]] from ''[[wikipedia:The Wonderful Wizard of Oz|The Wizard of Oz]]''.
