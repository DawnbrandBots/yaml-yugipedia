title: Card Trivia:Flash of Heraldry
wikitext: |-
  {{Navigation}}

  [[File:Number8HeraldicKingGenomHeritage-JP-Anime-ZX-Effect.png|thumb|300px|"[[Number 8: Heraldic King Genom-Heritage (anime)|Heraldic King Genom-Heritage]]" using its name-stealing effect.]]
  * "[[Number 8: Heraldic King Genom-Heritage]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|054|ref}} where "[[Number 8: Heraldic King Genom-Heritage (anime)|Number 8: Heraldic King Genom-Heritage]]" entangles "[[Photon Papilloperative (anime)|Photon Papilloperative]]" with its hair and absorbs its genetic information via the red lights traveling through its hair and into its body.
  * This card's name is based on the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack name]] of "Genom-Heritage" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: "Flash Impact".
  * This card and "[[Number 69: Heraldry Crest - Dark Matter Demolition]]" are the first cards in the ''[[OCG]]''/''[[TCG]]'' to feature an effect that can [[Changes card names|change a card's name]] into the name of a card that does not exist.
  ** This card's [[Quick-Play Spell]] subcategory and effect to treat an opponent's monster's name as "Unknown" is based on the third bulleted effect of "Heraldic King Genom-Heritage" in the anime, which can replace the name of an opponent's attacking monster with "Unknown" and replace its own name with that opponent's monster's name.

