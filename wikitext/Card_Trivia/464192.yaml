title: Card Trivia:Ritual Beast Return
wikitext: |-
  {{Navigation}}

  * "[[Dance Princess of the Nekroz]]", "[[Great Sorcerer of the Nekroz]]", "[[Gusto Falco]]", "[[Infernoid Decatron]]", "[[Ritual Beast Tamer Elder]]", "[[Ritual Beast Tamer Zeframpilica]]", "[[Ritual Beast Tamer Zefrawendi]]", and "[[Spiritual Beast Tamer Winda]]" appear in this card's artwork.
  * This card's artwork shows the conclusion of the third part of Duel Master storyline, where [[Tierra, Source of Destruction|the ultimate threat]] has now been defeated.
  ** The destruction of the final boss freed "[[Shaddoll Falco]]" and "[[El Shaddoll Winda]]" from the curse of the Shaddoll, allowing them to be reborn as "Gusto Falco" and "Spiritual Beast Tamer Winda", respectively.
  *** "Winda" and "Falco" are also now [[Ritual Beast Ulti-Kimunfalcos|partners]] in [[Ritual Beast|the new tribe]] that takes care both of them.
  ** The events in this card's artwork might be followed by "[[Zefra Providence]]", where the heroes are bidding farewell to their friends.
