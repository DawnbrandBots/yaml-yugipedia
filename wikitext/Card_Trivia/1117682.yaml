title: Card Trivia:Nimble Lemming
wikitext: |-
  {{Navigation}}

  * This card's artwork and effect references a misconception that [[wikipedia:Lemming|lemmings]] are prone to jumping off cliffs (as a result of migratory behavior or a drive for [[wikipedia:Mass suicide|mass suicide]]), which was made popular by a staged scene in the 1958 [[wikipedia:Walt Disney|Walt Disney]] documentary ''[[wikipedia:White Wilderness (film)|White Wilderness]]''.
