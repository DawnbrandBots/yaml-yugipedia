title: Card Trivia:Mirror Prison
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Giant Rat]]" and two "[[Lamb Token]]s" appear in this card's artwork.
  ** "Giant Rat" is depicted holding the tail and skull of another "Giant Rat" in its front paws in this card's artwork, likely reflecting how this card's effect prevents the opponent's monsters to attack unless the opponent [[Tribute]]s a monster of the same [[Type]].
  * This card's effect not applying to [[Machine]] and [[Zombie]] monsters is likely based on the fact that the members of the aforementioned Types are depicted as not being "alive".
