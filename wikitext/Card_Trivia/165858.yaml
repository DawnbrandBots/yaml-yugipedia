title: Card Trivia:Doll Chimera
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on a [[wikipedia:Chimera (mythology)|chimera]], a creature from [[wikipedia:Greek mythology|Greek mythology]] whose body consists of parts of different creatures.
  ** Fittingly, this monster is the combination of "[[Doll Part Blue]]", "[[Doll Part Gold]]", "[[Doll Part Pink]]", and "[[Doll Part Red]]".
