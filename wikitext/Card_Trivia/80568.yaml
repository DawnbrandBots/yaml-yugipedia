title: Card Trivia:Catapult Turtle
wikitext: |-
  {{Navigation}}

  * This is the first card to receive a [[Errata|functional errata]].
  * This is the first [[Monster Card]] to be [[Forbidden]] after receiving a functional errata, and the second card overall (after "[[Imperial Order]]").
  ** This is the only card that has never been Forbidden prior to receiving a functional errata, but became Forbidden after receiving one later on.
  * This monster has three [[retrained]] counterparts:
  ** A [[Gaia The Fierce Knight (archetype)|"Gaia The Fierce Knight"]] retrained counterpart: "[[Artillery Catapult Turtle]]"
  ** A ''[[Rush Duel]]'' counterpart: "[[Launcher Catapult Turtle]]"
  ** A younger ''Rush Duel'' counterpart: "[[Catapult Baby Turtle]]"
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, during the [[Duelist Kingdom (arc)|Duelist Kingdom]] arc, [[Yami Yugi]] used this monster to [[Tribute]] a monster he once owned, or taken from the opponent with "[[Brain Control (anime)|Brain Control]]". This monster was never used again during the [[Battle City (part 1)|Battle City]] and [[Virtual World (arc)|Virtual World]] arcs in light of Yami Yugi's mantra against sacrificing monsters to achieve victory.
  ** However, during the [[Waking the Dragons]] arc, this monster was used once more during Yami Yugi's first Duel with [[Rafael]], representing the change in Yami Yugi's opinion for sacrificing monsters under the influence of the [[The Seal of Orichalcos (anime)|The Seal of Orichalcos]].
  * The [[Catapult Turtle (Bandai)|Bandai]] version of this monster is a [[Level 6]] [[Beast]] monster with an [[original ATK and DEF]] of 1600/2200. The Konami version is a [[Level 5]] [[Aqua]] monster with an original [[ATK]] and [[DEF]] of 1000/2000.
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster is the Anti Ground cannon, while "[[Barrel Rock]]" is the Anti Air cannon.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|083|ref}}, specifically from the panel showing [[Catapult Turtle (manga)|this monster]] being Summoned, albeit in an opposite position.
