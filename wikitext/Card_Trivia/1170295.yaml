title: Card Trivia:Time Demolition Dragon Blastchronos
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's Japanese name (バクハーデス, ''Bakuhādesu'') is a combination of the Japanese words "''Bakuha''" (爆破, lit. "Destructive Explosion") and ''Kuronosu'' (クロノス, lit. "Chronos").
  ** In [[wikipedia:Greek mythology|Greek mythology]], [[wikipedia:Chronos|Chronos]] is the personification of time, which reflects this monster's clock-shaped ring on its back, its usage of bladed weapons that highly resemble clock hands, and its effect to make the opponent's monsters lose 1200 [[ATK]] and [[support]] "[[Time Machine (Rush Duel)|Time Machine]]".
