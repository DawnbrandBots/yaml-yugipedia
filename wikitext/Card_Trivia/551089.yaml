title: Card Trivia:Vendread Battlelord
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Revendread Evolution]]", "[[Vendread Charge]]", and "[[Vendread Revolution]]".
  * According to the [[Master Duel card storylines]], this monster was formed by the vengeful spirits of the "Vendreads" slain by "[[Revendread Slayer]]". Its power was eventually absorbed by "Slayer", transforming him into "[[Revendread Executor]]".
