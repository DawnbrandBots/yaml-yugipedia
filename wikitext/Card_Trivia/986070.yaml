title: Card Trivia:Wattkyuki
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Four Perils|窮奇]] (''qiongqi''), a bull-tiger-like monster from Chinese mythology that devours people, and serves as a counterpart to ''[[wikipedia:Kamaitachi|kamaitachi]]'' from Japanese folklore.
  ** This card's name is based on the Japanese transliteration of 窮奇, ''kyuuki''.
