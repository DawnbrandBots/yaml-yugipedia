title: Card Trivia:Full Armored Dark Knight Lancer
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Full Armored]]" [[Card evolutions|upgraded]] form of "[[Number C101: Silent Honor DARK]]", [[equip]]ped with "[[Black Ray Lancer]]".
  ** Both monsters are used by [[Reginald Kastle]] and his [[Seven Barian Emperors|Barian Emperor]] alter-ego, Nash, in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's effect to [[attach]] an opponent's monster to itself as [[Xyz Material]] after its owner's monster becomes equipped with an [[Equip Card]] references the effect of "Silent Honor DARK", which can attach an opponent's [[Special Summon]]ed monster to itself as material.
