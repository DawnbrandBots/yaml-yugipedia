title: Card Trivia:Voidvelg Chaosmachia
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[High-Grade Collection]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Voidvelg Requiem]]".
  ** Visually, this monster is a Fusion between "Voidvelg Requiem" and "[[Abysslayer Leviaknight]]", which were used to first [[Fusion Summon]] it in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * This monster is named after ''[[wikipedia:Chaoskampf|Chaoskampf]]'', a widespread mythological motif involving a battle between a culture hero deity and a chaos monster, often in the form of a sea serpent or dragon.
  ** Fittingly, "Abysslayer Leviaknight" is a [[Sea Serpent]] [[Type]] monster.
