title: Card Trivia:Debunk
wikitext: |-
  {{Navigation}}

  * "[[Shien's Footsoldier]]", "[[Shien's Squire]]", and an unknown "[[Ninja]]" appear in this card's artwork.
  ** Both are valid targets for this card's activation; the effect of "Shien's Footsoldier" activates in the [[Graveyard]], and the effect of "Shien's Squire" activates in the [[hand]].
  ** The presence of a "Ninja" monster in this card's artwork further reinforces the rivalry between the "[[Six Samurai]]" and "Ninja" [[archetype]]s, as shown in "[[Blind Spot Strike]]".
