title: Card Trivia:DoomZ VII Seven - Elara
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[DoomZ Raiders]]", sans faceplate.
  * This monster is named after [[wikipedia:Elara (moon)|Elara]], one of the moons orbiting the planet [[wikipedia:Jupiter|Jupiter]], which is also named "Jupiter VII" after being the seventh moon to be discovered orbiting the planet.
