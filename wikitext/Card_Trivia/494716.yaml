title: 'Card Trivia:Number 68: Sanaphond the Sky Prison'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This card is named after [[wikipedia:Sandalphon|Sandalphon]], an extremely tall [[wikipedia:Archangel|archangel]].
  ** The kanji 「{{Ruby|魔|ま}}{{Ruby|天|てん}}{{Ruby|牢|ろう}}」 (''Matenrō'', "Fiendish Skyprison") in this card's Japanese name is a pun on 「{{Ruby|摩|ま}}{{Ruby|天|てん}}{{Ruby|楼|ろう}}」 (''Matenrō'', "Skyscraper").
