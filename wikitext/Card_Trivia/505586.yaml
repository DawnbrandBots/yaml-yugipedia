title: Card Trivia:The Unhappy Maiden
wikitext: |-
  {{Navigation}}

  * This monster has a [[counterpart]]: "[[The Unhappy Girl]]".
  ** Unlike "The Unhappy Girl", this card's international release was not edited to reduce bust size.
  ** Either this monster or "The Unhappy Girl" appears in the artwork of "[[Double Payback]]" (near the top-left corner of the artwork).
  * This monster appears to be based on the titular character from "[[wikipedia:The Little Match Girl|The Little Match Girl]]".
