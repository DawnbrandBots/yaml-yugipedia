title: Card Trivia:F.A. Turbo Charger
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[F.A. Off-Road Grand Prix]]" and "[[F.A. Winners]]".
  * "[[U.A. Playmaker]]" appears as the driver in this card's artwork, as indicated by his bare arms and the wristbands on both of them, in addition to the football-face-mask-themed grille on the vehicle.
