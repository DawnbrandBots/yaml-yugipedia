title: Card Trivia:Angmarl the Fiendish Monarch
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Witch-king of Angmar|Witch-king of Angmar]], a major antagonist from [[wikipedia:J. R. R. Tolkien|J.R.R. Tolkien's]] [[wikipedia:Tolkien's legendarium|Middle-earth legendarium]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' is taken from a panel from {{chapter|ARC-V|002|ref}} showing [[Demon Emperor Angmar (manga)|this monster]] being Summoned.
