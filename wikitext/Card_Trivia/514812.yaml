title: Card Trivia:Chaos Goddess
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chaos Phantasm]]" and "[[Trust Chain]]".
  * "[[Dark Beast Token]]" and "[[Light Beast Token]]" appear in this card's artwork.
  * This monster has a downgraded form: "[[Chaos Witch]]".
  * This is the first [[Synchro Monster]] that predetermines which [[Attribute]]s the [[Tuner monster]] and the [[Synchro Material]]s must have, as well as the first where both must featured different Attributes.
  * This monster is a counterpart of "[[Chaos Archfiend]]".
  ** Both share the same [[Level]] (8) and [[original ATK and DEF]] (2500/1800).
  ** This monster's [[Attribute]] ([[DARK]]) and [[Type]] ([[Fiend]]) is the opposite of the Attribute ([[LIGHT]]) and Type ([[Fairy]]) of "Chaos Goddess".
  ** Both monsters' designs feature one white wing and one black wing, wield a similarly-shaped staff, and an inverted color scheme.
