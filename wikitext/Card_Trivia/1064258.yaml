title: Card Trivia:Earthbound Immortal Red Nova
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]'' and ''[[Nature Pack: Courageous Zoodiacs]]''.
  * This is the [[Monster Card]] version of [[Red Nova]], the strongest "[[Earthbound Immortal]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** Fittingly, this monster has the highest [[Level]] (12) and [[original ATK]] (3500) of all "Earthbound Immortal" monsters.
  ** This monster's effect to [[send]] "[[Red Dragon Archfiend]]" to the [[Graveyard]] and [[Special Summon]] "[[Red Nova Dragon]]" from the [[Extra Deck]] is based on a scene from {{episode|5D's|113|ref}}, where [[Jack Atlas]] uses the power of [[Blazing Soul]] to seal Red Nova into a card, which was then [[Synchro Summon]]ed by using "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" as [[Synchro Material]] to create "[[Red Nova Dragon (anime)|Red Nova Dragon]]".
  *** In addition, both this monster and "Red Nova Dragon" have the same [[Attribute]] ([[DARK]]), Level (12), and [[original ATK and DEF]] (3500/3000), as well as mirrored poses in their card artworks.
  * This monster is tied with "[[Earthbound Immortal Uru]]" for the highest original [[DEF]] (3000) of all "Earthbound Immortal" monsters.
  * This monster has the highest original [[ATK]] (3500) of all monsters that can be [[Normal Summon]]ed without restriction or downside, completely breaking the [[conventions of 3000 ATK and DEF]].
  * This is the only "Earthbound Immortal" monster that does not have:
  ** a name based on [[wikipedia:Quechuan languages|Quechua]] words.
  ** an effect that [[destroy]]s itself if there is no [[Field Spell]] on the [[field]].
  ** an effect to attack the opponent [[Direct attack|directly]].
  ** an effect that prevents the opponent from [[target]]ing it for attacks.
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card was bugged, and accidentally had the ability to attack directly and prevented the opponent from targeting it for attacks like other "Earthbound Immortal" monsters. The bug was fixed in player-vs-player game modes, but currently remains untouched in Solo Mode.
