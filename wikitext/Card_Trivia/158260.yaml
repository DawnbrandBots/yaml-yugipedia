title: Card Trivia:The Blazing Mars
wikitext: |-
  {{Navigation}}

  * This monster is based on the planet [[wikipedia:Mars (planet)|Mars]], the fourth planet in the [[wikipedia:Solar System|Solar System]].
  ** This monster's [[FIRE]] [[Attribute]] and [[Pyro]] [[Type]] reference the Japanese name of Mars, "Kasei" (火星), which translates to "Fire Star".
  ** This monster is based on the planet's namesake, the [[wikipedia:Mars (mythology)|Roman god of war]], which reflects the military nature of [[Axel Brodie (manga)|Axel Brodie's]] [[Deck]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  * This monster is the [[signature card]] of Axel Brodie in the ''Yu-Gi-Oh! GX'' manga.
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Destiny HERO - Plasma]]", "[[Destiny End Dragoon]]", "[[Assault Revival]]", "[[NEX]]", "[[ZERO-MAX]]", and the other [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * In the ''Yu-Gi-Oh! GX'' manga, this monster's [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] is "Syrtis Major", which is based on the "dark spot" located in the boundary between the northern lowlands and southern highlands of the planet Mars.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|058|ref}}, specifically from the panel where [[Chazz Princeton (manga)|Chazz Princeton]] notices [[The Blazing Mars (manga)|this monster]] is radiating darkness after it is Summoned.
