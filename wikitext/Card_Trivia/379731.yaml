title: Card Trivia:Performapal Ballad
wikitext: |-
  {{Navigation}}

  * This monster's Japanese is a portmanteau of the Japanese words for "rose" (バラ, ''Bara'') and "ballad" (バラード, ''Barādo'').
  ** This monster shares its naming scheme with "[[Performapal Barracuda]]", whose shares the same [[Attribute]] ([[EARTH]]), [[Level]] (3), [[Type]] ([[Plant]]), [[original ATK and DEF]] (500/1100), and similar rose motif.
