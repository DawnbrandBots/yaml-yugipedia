title: Card Trivia:Dark Tyranno
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Tyrannosaurus|Tyrannosaurus]]'', a species of large and bipedal predatory dinosaur from the [[wikipedia:Late Cretaceous|Late Cretaceous]] period.
  * This monster is a [[counterpart]] of "[[Black Tyranno]]".
  ** Both feature effects that allow them to attack directly if the only monsters the opponent [[control]]s are in [[Defense Position]].
  ** In the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, despite both monsters' different naming schemes, [[Tyranno Hassleberry]] always calls this monster "''Black'' Tyranno".
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] itself from the player's [[hand]] when a [[Spell Card]] or effect is [[activate]]d during the [[Main Phase]] is a reference to how, in the ''Yu-Gi-Oh! GX'' anime, this monster was Special Summoned multiple times via the effect of "[[New Ultra Evolution]]", which was activated during Hassleberry's Main Phase.
