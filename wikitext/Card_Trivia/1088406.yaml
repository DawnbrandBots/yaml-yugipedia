title: Card Trivia:Light Force
wikitext: |-
  {{Navigation}}

  * "[[Arcana Force XV - The Fiend]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|101|ref}} where "[[Arcana Force XV - The Fiend (anime)|Arcana Force XV - The Fiend]]" is Summoned. The Duel takes place in [[Sartorius]]'s private Dueling arena hidden beneath the [[Obelisk Blue|Obelisk White]] dormitory where his Duel against [[Aster Phoenix]] takes place.
  ** The silhouette in the light in this card's artwork is based on the design of [[wikipedia:The Devil (tarot card)|The Devil]] [[wikipedia:Tarot|Tarot card]] in the ''[[Yu-Gi-Oh! GX]]'' anime. Fittingly, in the anime, The Devil Tarot card represents Sartorius's fate while under the influence of the [[The Light of Destruction|Light of Destruction]].
  * This card's Japanese name, "The Wave of Light", is based on the alternate name of the Light of Destruction in the ''Yu-Gi-Oh! GX'' anime.

