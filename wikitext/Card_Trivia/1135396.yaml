title: Card Trivia:Hecahands Ibtel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Hecahands Bait]]" and "[[Yad'al-Hecahands]]".
  * This monster's name is derived from "''ibṭ''" (ابط), the Arabic word for "armpit".
  * This monster has a combined form with "[[Hecahands Yadel]]": "[[Hecahands Mankibuel]]".
