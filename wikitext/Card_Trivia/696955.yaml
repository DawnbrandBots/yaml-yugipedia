title: Card Trivia:Dragonmaid Sheou
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragonmaid Changeover]]".
  * This monster is the dragon form of "[[House Dragonmaid]]".
  ** This monster's ''[[TCG]]'' name is an anagram of "House".
  ** This monster's Japanese name, "Strahl", is the German word for "ray", as in "ray of light", reflecting its [[LIGHT]] [[Attribute]].
  * This monster has the highest [[Level]] (10) and [[original ATK]] (3500) of all "[[Dragonmaid]]" monsters.
