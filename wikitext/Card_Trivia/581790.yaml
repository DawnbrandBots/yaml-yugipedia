title: Card Trivia:Traptrix Sera
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Traptrix Allomerus]]" and "[[Traptrip Garden]]".
  * This monster is based on the ''[[wikipedia:Drosera|Drosera]]'', or sundew, a genus of carnivorous plants that lure, trap and digest their preys with a sticky [[wikipedia:Mucilage|mucilage]] generated from glands covering its leaves.
  ** Those droplets can be seen in the upper corners of this monster's artwork, as well as decorating its hair.
