title: Card Trivia:Xtra HERO Wonder Driver
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 20]]''.
  * This is the first "[[HERO]]" [[Link Monster]].
  * This is the first [[legal]] "HERO" monster to not belong to any of the five previously existing "HERO" sub-[[archetype]]s.
  ** This also makes it the first legal [[Extra Deck]] "HERO" monster to not be a [[Fusion Monster]].
  * This is the only [[Xtra HERO]] monster so far to have a different [[Attribute]] ([[LIGHT]]) than the others ([[DARK]]).
  * Among the Xtra HERO Link Monsters, this monster represents the "[[Elemental HERO]]" sub-archetype.
  ** It can search "[[Polymerization]]" like "[[Elemental HERO Blazeman]]" and "[[Elemental HERO Woodsman]]", and the "[[Change]]" [[Quick-Play Spell]]s like "[[Elemental HERO Shadow Mist]]".
