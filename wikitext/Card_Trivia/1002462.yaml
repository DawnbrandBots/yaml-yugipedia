title: Card Trivia:Nightmare Pain
wikitext: |-
  {{Navigation}}

  * "[[Yubel]]" appears in this card's artwork.
  * This card is based on the [[Attack and effect names in Yu-Gi-Oh! GX|name]] of the [[effect damage|damage]]-inflicting effects of "[[Yubel (anime)|Yubel]]" and "[[Yubel - Terror Incarnate (anime)|Yubel - Terror Incarnate]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's artwork is a reference to how, after having activated that effect, "Yubel" and "Yubel - Terror Incarnate" are protected from being [[destroyed by battle]] by wrapping themselves with a thorny vine and then uses it as a whip to inflict the [[battle damage]] to the opponent as [[effect damage]].
  ** This card's third effect references the anime versions of the above-mentioned cards, which inflicted effect damage to the opponent whenever they [[battle]]d, instead of the opponent attacking them.
  ** This card's second effect to force the opponent to attack a "[[Yubel (archetype)|Yubel]]" monster references a scene from {{episode|GX|150|ref}}, where [[Yubel (character)|Yubel]] (while possessing [[Jesse Anderson]]) used the darkness of [[Echo]]'s spirit to force "[[Torch Golem (anime)|Torch Golem]]" on [[Adrian Gecko]]'s [[field]] to attack their card counterpart and use its damaging effect to win the [[Duel]].
