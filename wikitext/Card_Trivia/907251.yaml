title: Card Trivia:Armored White Bear
wikitext: |-
  {{Navigation}}

  * This monster's video game effect to [[Special Summon]] a [[Level 4]] or lower [[LIGHT]] [[Beast]] monster from the [[Deck]] or [[Graveyard]] is an alteration of its effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which can Special Summon "[[Regulus (anime)|Regulus]]", a LIGHT Beast monster, from the Deck or Graveyard. In the ''[[OCG]]''/''[[TCG]]'', this monster can Special Summon any Level 4 or lower Beast monster.
  * This was the first unreleased card featured in the ''[[Yu-Gi-Oh! Tag Force]]'' video game series to be released in the ''[[OCG]]''/''[[TCG]]'' after being ported to another videogame (''[[Yu-Gi-Oh! Duel Links]]''), and the first unreleased card featured in ''Duel Links'' to be released.
