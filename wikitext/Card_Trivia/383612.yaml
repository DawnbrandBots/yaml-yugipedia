title: Card Trivia:Tellarknight Ptolemaeus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zefra Divine Strike]]".
  ** According to the ''[[Master Guide 5 card storylines#Star-Guiding Knight|Master Guide 5 card storylines]]'', this monster is an [[Card evolutions|upgraded]] form of "[[Constellar Sombre]]" after fusing with "[[Stellarknight Constellar Diamond]]" and the rest of the remaining "[[tellarknight]]s".
  * This card is named after the astronomer [[wikipedia:Ptolemy|Ptolemy]] and is possibly based on his [[wikipedia:Geocentric model|geocentric model]] of the universe, which appears in the background of its artwork.
  ** This card's [[cost]] of [[detach]]ing 7 [[Xyz Material]]s in order to use its turn skipping effect may be a reference to the 7 spheres that orbit Earth in Ptolemy's model: the Moon, Mercury, Venus, the Sun, Mars, Jupiter, and Saturn.
  * This is the first "tellarknight" monster to be [[Forbidden]].
  * This card has a watered-down [[counterpart]]: "[[Darktellarknight Batlamyus]]".
  ** This card's [[Attribute]] ([[LIGHT]]) is the opposite of the Attribute ([[DARK]]) of "Batlamyus".
  ** This card's [[ATK]]/[[DEF]] (550/2600) are inverted with the ATK/DEF (2600/550) of "Batlamyus"
  ** Both cards are named after Ptolemy.
  ** Both cards have effects that require 7 other cards for the [[activation]].
  ** According to the ''[[Master Guide 5 card storylines#Knight of Tierra|Master Guide 5 card storylines]]'', "Batlamyus" is the upgraded form of "[[Gem-Knight Lapis]]", the twin sister of "Ptolemaeus" ("[[Gem-Knight Lazuli]]").
  * As its second effect requires 7 Xyz Materials to be detached to activate it, this card is the [[Xyz Monster]] that requires the largest defined number of Xyz Materials to be detached from it to activate its effect.
