title: Card Trivia:Perform Puppet
wikitext: |-
  {{Navigation}}

  * "[[Gimmick Puppet Dreary Doll]]", "[[Gimmick Puppet Humpty Dumpty]]", "[[Gimmick Puppet Scissor Arms]]", the shadow of "[[Number 40: Gimmick Puppet of Strings]]", and the ''[[Yu-Gi-Oh! ZEXAL]]'' version of the [[Graveyard]] portal appear in this card's artwork.
  ** This card's artwork references the artwork of "[[Junk Puppet]]", which depicts "Dreary Doll" being pulled out her coffin (or box) in a similar fashion.
