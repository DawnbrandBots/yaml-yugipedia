title: Card Trivia:Subterror Behemoth Stalagmo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Subterror Cave Clash]]".
  * "[[Subterror Nemesis Warrior]]" appears in this card's artwork.
  * This monster's English name is based on a [[wikipedia:Stalagmite|stalagmite]], a type of rock formation that rises from the floor of the cave.
  ** This monster's Japanese name, "Subterror Malice Gibraltar", is a reference to the [[wikipedia:Strait of Gibraltar|Strait of Gibraltar]], keeping with the [[wikipedia:Mediterranean Sea|Mediterranean Sea]] theme of the Japanese names of the "[[Subterror Behemoth]]" monsters.
