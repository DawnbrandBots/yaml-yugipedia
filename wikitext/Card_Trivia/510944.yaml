title: Card Trivia:Sebek's Blessing
wikitext: |-
  {{Navigation}}

  * This card's name is based on [[wikipedia:Sobek|Sebek]], the ancient Egyptian god who is depicted with the head of a crocodile.
  ** In [[wikipedia:Egyptian mythology|Egyptian mythology]], Sebek became associated with healing after he and the [[wikipedia:Isis|goddess Isis]] restored her husband [[wikipedia:Osiris|Osiris]] to life when he was violently murdered by his brother, [[wikipedia:Set|Set]]. This reflects this card's effect restoring the player's [[Life Point]]s equal to the [[battle damage]] inflicted to the opponent with a [[direct attack]].
  * The crocodilian entity depicted in this card is depicted carrying the same staff and mirror as "[[Sorcerer of Sebek]]", which also shares the same effect increasing the player's [[Life Point]]s equal to the amount of [[battle damage]] inflicted to the opponent.
