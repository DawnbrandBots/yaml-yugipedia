title: 'Card Trivia:Number 43: Manipulator of Souls'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This card has a "[[Number C]]" [[Card evolutions|upgraded]] form: "[[Number C43: High Manipulator of Chaos]]".
  * "Number" monsters often take a form that reflects their owners and/or their original desires. In this case, this "Number" represents its original owner, [[Vector]].
  ** This monster's Japanese name, "Soul-Puppeteering Demon - Soul Marionetter", is based on the [[wikipedia:Marionette|Marionette]]-style puppetry, where a jointed doll or dolls is controlled from above by a living puppeteer. This monster's ''[[TCG]]'' name, "Manipulator of Souls", references this concept as well. Both names reflect Vector's role as a manipulative villain in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime,
  ** This monster's appearance and stats are similar to those of the "[[Umbral Horror]]" monsters, an [[archetype]] used by Vector, which consists of [[DARK]] [[Fiend]] monsters with a playstyle revolving around having 0 [[ATK]].
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[equip]]ped itself with a "Number", it transformed the equipped "Number" into a marionette puppet controlled with the strings extending from its claws.
