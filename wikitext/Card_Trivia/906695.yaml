title: Card Trivia:Double Disruptor Dragon
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Dual wield|dual-wield weapons]].
  ** This monster's effect allows the player to [[Special Summon]] two different "[[Rokket]]" monsters from the [[Graveyard]].
  ** This monster's dual color scheme consists of one-half blue and one-half purple, referencing the two [[Spell]]s that its second effect [[search]]es ("[[Heavy Interlock]]" and "[[Rapid Trigger]]"), which can [[Ritual Summon]] "[[Borreload Riot Dragon]]" (a [[Ritual Monster]], whose card border features a blue color scheme) and [[Fusion Summon]] "[[Borreload Furious Dragon]]" (a [[Fusion Monster]], whose card border features a purple color scheme), respectively.
  * This monster may be a rival [[counterpart]] of "[[Dual Assembwurm]]":
  ** Both are [[Level 8]] monsters whose names include a word related to the number two: "double" and "dual". 
  ** Both monsters have split colour schemes: this monster has a blue left half and a purple right half, while "Dual Assembwurm" has a blue left half and a red right half.
  ** Both monsters are depicted with opposite poses: this monster's body is angled to its right, with its head angled slightly to its left, while "Dual Assembwurm" is angled to its left, with its head angled slightly to its right.
  ** Both monsters have angular wings which appear to be made of energy. 
  ** This is a [[Dragon]] monster and supports "Rokket" and "[[Borrel]]" monsters, both of which are [[archetype]]s consisting of Dragon monsters used by [[Roken Kogami]]/Varis in the ''[[Yu-Gi-Oh! VRAINS]]'' anime. "Dual Assembwurm" is a [[Cyberse]] monster, a [[Type]] that was primarily used by [[Yusaku Fujiki]]/Playmaker, and relies on Cyberse monsters to activate its effects in the ''Yu-Gi-Oh! VRAINS'' anime.
  *** This monster can Special Summon two "Rokket" monsters from the Graveyard at the cost of [[Tributing]] itself, and can [[banish]] itself from the Graveyard to add a Spell Card that supports the "Borrel" archetype to the player's hand, providing support to other monsters; in contrast, "Dual Assembwurm" can Special Summon itself from the hand at the cost of banishing two Cyberse monsters from the hand and/or [[face-up]] on the player's [[field]], and requires banishing Cyberse monsters to activate its second effect, relying on those monsters to support itself.
