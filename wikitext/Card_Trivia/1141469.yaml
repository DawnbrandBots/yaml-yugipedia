title: Card Trivia:Dogmatika Lawbringer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster is named after a [[wikipedia:Chaplain|chaplain]], a religious official of Judeo-Christian faith that often leads worship duties, with some serving military personnel.
  * This monster looks to be an advanced form of "[[Dogmatika Ashiyan]]".
