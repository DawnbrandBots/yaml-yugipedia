title: Card Trivia:Ancient Warriors Saga - Deception and Betrayal
wikitext: |-
  {{Navigation}}

  * "[[Ancient Warriors - Rebellious Lu Feng]]" and "[[Ancient Warriors - Savage Don Ying]]" appear in this card's artwork.
  ** This card's artwork is a reference to a scene from ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', where Lü Bu confronted Dong Zhuo, his adoptive father, with Cao Cao's forged imperial decree that summoned 18 princes to attack Dong Zhuo.
