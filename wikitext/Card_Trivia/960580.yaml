title: Card Trivia:Night Vision the Phantom Pigeon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Three Cavalteers]]".
  ** This monster also appears as a component of the armor featured in the artwork of "[[Bizarrmor]]".
  * This monster's Japanese title (''Genshobato no Kishi'') is a pun on the Japanese name for "carrier pigeon" (''denshobato'').
  ** This monster's Japanese name (''Naito Vijon'') and appearance is a combination of "knight" (reflecting its overall appearance), "night vision" (reflecting the green glowing eyes in this monster's visor resembling those of [[wikipedia:Night-vision device|night-vision goggles]]), and "pigeon" (reflecting this monster's pigeon motif).
