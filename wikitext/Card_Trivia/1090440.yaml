title: Card Trivia:Goddess of the Two Sides
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Goddess of Whim]]".
  ** This monster's coin tossing effect is a reference to the effect of "Goddess of Whim" in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, which can [[send]] itself to the [[Graveyard]] and allows the player to [[draw a card]]. This is the same effect as the result for this monster's Tails resolution (if it is the only monster the player [[control]]s).
