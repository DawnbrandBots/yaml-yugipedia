title: Card Trivia:Skull Archfiend of Confusion
wikitext: |-
  {{Navigation}}

  * This monster is a [[Counterpart|retrained]] ''[[Rush Duel]]'' counterpart of "[[Summoned Skull (Rush Duel)|Summoned Skull]]". 
  ** This monster's name is a reference to the [[flavor text]] of "[[Summoned Skull]]": "''A fiend with dark powers for '''confusing''' the enemy.</i>”
  ** This monster's [[Level]] (7) is a reference to how "[[Summoned Skull (manga)|Summoned Skull]]" is a [[Level 7]] monster in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
