title: Card Trivia:Shaddoll Hedgehog
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]''.
  * This monster is the "[[Shaddoll]]" version of "[[Neo Flamvell Hedgehog]]".
  ** "[[Shaddoll Falco]]" is a [[Tuner monster]] like its regular counterpart, "[[Gusto Falco]]". Oddly, this card is not a Tuner monster, despite "Neo Flamvell Hedgehog" being one.
  * The name of this monster might be a pun on the SEGA character [[wikipedia:Shadow the Hedgehog|Shadow the Hedgehog]].
  * This monster appears in the artwork of "[[Ritual Beast Ambush]]".
