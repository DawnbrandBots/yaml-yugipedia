title: Card Trivia:Ultimate Fire Formation - Seito
wikitext: |-
  {{Navigation}}

  * "Seito" can be translated to mean "West Dipper"
  ** "''[[wikipedia:Dipper (Chinese constellation)|Dipper]]''" is also a Chinese constellation.
  ** The number of "[[Fire Formation]]" cards required to activate "Seito" matches the number of stars in its artwork. This reflects the number of stars in the West Dipper constellation on which each "Fire Formation" card is based.
  * "[[Brotherhood of the Fire Fist - Tiger King]]" and "[[Brotherhood of the Fire Fist - Lion Emperor]]" appear in this card's artwork.
