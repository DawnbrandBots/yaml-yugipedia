title: Card Trivia:Borrel Reboot
wikitext: |-
  {{Navigation}}

  [[File:Borrel Reboot.png|thumb|right|250|The first [[Link Summon]]ing of "[[Borreload Dragon (anime)|Borreload Dragon]]" in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.]]

  * "[[Borreload Dragon]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|VRAINS|011|ref}}, where "[[Borreload Dragon (anime)|Borreload Dragon]]" is [[Link Summon]]ed for the first time.
  ** This card's name and effect both reference "[[Red Reboot]]", a [[Counter Trap Card]] used by [[Roken Kogami|Varis]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, which requires the player to pay half of their [[Life Point]]s to [[activate]] from their [[hand]], [[negate]]s the activation of an opponent's [[Trap Card]], [[Set]]s that card, and prevents its activation.

