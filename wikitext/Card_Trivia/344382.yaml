title: Card Trivia:D/D/D Wave Oblivion King Caesar Ragnarok
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[D/D/D Oblivion King Abyss Ragnarok]]", fused with "[[D/D/D Wave King Caesar]]".
  ** This monster has the same [[Attribute]] ([[DARK]]) as "Abyss Ragnarok", and has 1000 [[ATK]] and 2 [[Level]]s more than its base form.
  ** Fittingly, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, [[D/D/D Wave Oblivion King Caesar Ragnarok (anime)|this monster]] was [[Fusion Summon]]ed by using "[[D/D/D Oblivion King Abyss Ragnarok (anime)|D/D/D Oblivion King Abyss Ragnarok]]" and "[[D/D/D Wave King Caesar (anime)|D/D/D Wave King Caesar]]" as [[Fusion Material]]s.
