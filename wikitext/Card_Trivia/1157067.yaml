title: Card Trivia:Deadly Zombie Breath
wikitext: |-
  {{Navigation}}

  * "[[Dragon Zombie]]" and "[[Kojikocy]]" appear in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|90|ref}} showing "[[Dragon Zombie (manga)|Dragon Zombie]]" attacking "[[Kojikocy (manga)|Kojikocy]]".
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Dragon Zombie" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].

