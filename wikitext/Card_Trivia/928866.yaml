title: Card Trivia:Destruction of the Universe
wikitext: |-
  {{Navigation}}

  * A silhouette of [[Tiadosia Kallister]] appears in this card's artwork.
  * This card's Japanese name is a portmanteau of the Japanese words for "the whole universe" (三千世界 ''sanzensekai'') and "destruction" (破壊 ''hakai'').
  ** ''Sanzensekai'' also translates to "3000 worlds", deriving from the 3000 realms in some Buddist teachings. This number is reflected in this card's cost of 3000 [[Life Point]]s.
