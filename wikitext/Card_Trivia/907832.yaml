title: Card Trivia:Kappa's Blast
wikitext: |-
  {{Navigation}}

  * "[[Kappa Emperor River Slider]]" appears in this card's artwork.
  * This card's name is derived from a Japanese saying (''He no Kappa'', "like a kappa farting"), which is equivalent to the English phrase "piece of cake". The English name is also a play on "gas", as the card artwork depicts "Kappa Emperor River Slider" hitting the gas on their speedboat.
