title: Card Trivia:Deskbot 003
wikitext: |-
  {{Navigation}}

  * Being a "[[Deskbot]]" monster, this monster is made up of various objects that can be commonly found on/in desks, specifically with a [[wikipedia:Measuring instrument|measuring instrument]] theme:
  ** A [[wikipedia:Compass (drawing tool)|compass]] with a pencil attached (attached to its right arm)
  ** Triangular [[wikipedia:Protractor|protractors]] (its helmet faceplate)
  ** A [[wikipedia:Vernier scale|vernier]] [[wikipedia:Caliper|caliper]] (attached to its left arm)
  ** [[wikipedia:Tape measure|Tape measures]] (its feet, pelvis, and the middle of its chest)
  ** [[wikipedia:Spirit level|Spirit levels]] (its shoulders)
  ** (This monster's measuring instrument theme is also supported by the presence of twin [[wikipedia:Angle|acute angle]] geometric designs on its chest, with their vertexes defined by arcs.)
  * The number 003 can be seen on this monster's helmet.
  * This monster appears in the artwork of "[[Deskbot Jet]]", seen on the lower platform.
