title: Card Trivia:Nekroz of Trishula
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: Tribe Force]]''/''[[The Secret Forces]]''.
  * This monster is "[[Shurit, Strategist of the Nekroz]]" wearing armor based on "[[Trishula, Dragon of the Ice Barrier]]".
  ** This monster shares the same [[Attribute]], [[Level]], [[ATK]], [[DEF]] and [[Monster effect|effect]] as the aforementioned monster.
  ** In this card's second artwork, "Shurit" is wearing an armor based on "[[Trishula, Zero Dragon of the Ice Barrier]]" instead.
  ** As with "[[Nekroz of Brionac]]", "[[Shurit, Strategist of the Nekroz]]" appears to be the older in this card's artwork. It is unknown whether this is because time has passed, or because the power of the monster this armor is based off of is having an effect on his body.
  * "[[Nekroz Mirror]]" appears in this card's artwork as the hilt of his sword, the same as his previous form.
  * This card is the first Level 9 [[Ritual Monster]].
