title: Card Trivia:Buerillabaisse de Nouvelles
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the demon ''[[wikipedia:Buer (demon)|Buer]]'' and the traditional French stew ''[[wikipedia:Bouillabaisse|bouillabaisse]]''.
  ** "Buer" is described as having five to six limbs, the former being the same number this monster has. Additionally, the demon possesses knowledge of herbs and their uses, reflected in both "bouillabaisse" containing various herbs and this monster's ears, wings, and similar features resembling leafy herbs like basil or bay leaves.
  * This monster is closely related to "[[Poissonniere de Nouvelles]]", the fish chef, who directly supports "Buerillabaisse de Nouvelles" via her effect, and is shown preparing the dish of "Buerillabaisse" in "[[Recette de Poisson (Fish Recipe)]]".
