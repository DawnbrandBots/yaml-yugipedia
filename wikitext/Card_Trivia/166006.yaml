title: Card Trivia:Gishki Vision
wikitext: |-
  {{Navigation}}

  * This monster shares similarities with "[[Gishki Shadow]]".
  ** Both monsters share a similar appearance.
  ** Both monsters share an effect that allows them to be treated as the entire [[Tribute]] for a [[WATER]] [[Ritual Monster]]. 
  ** Both monsters share a [[discard]]ing effect that allows them to [[add]] a specific "[[Gishki]]" card from the [[Deck]] to the [[hand]] that facilitates the [[Ritual Summon]]ing of a "Gishki" Ritual Monster.
