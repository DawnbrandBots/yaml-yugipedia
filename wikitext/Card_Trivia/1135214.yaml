title: Card Trivia:Synchro Fellowship
wikitext: |-
  {{Navigation}}

  [[File:Synchro Fellows.png|thumb|right|250|[[Yusei]] with these monsters.]]
  * "[[Junk Synchron]]", "[[Quillbolt Hedgehog]]", "[[Sonic Chick]]", "[[Sonic Warrior]]", and "[[Speed Warrior]]" appear in this card's artwork.
  ** The design of "Junk Synchron" in this card's artwork is also one of the [[cover card]]s of ''[[Structure Deck: Power of Fellows]]''.
  ** This card's artwork is based on a scene from {{episode|5D's|154|ref}} where [[Yusei Fudo]] [[control]]s the aforementioned monsters before using them as [[Synchro Material]] for "[[Junk Warrior (anime)|Junk Warrior]]".
  * This card's name is derived from the [[Attack and effect names in Yu-Gi-Oh! 5D's|effect name]] of "[[Junk Warrior]]" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime, "Power of Fellows" ("Power of Fellowship" in ''[[Yu-Gi-Oh! Duel Links]]''), which is the name of the [[Structure Deck]] this card was first released in.

