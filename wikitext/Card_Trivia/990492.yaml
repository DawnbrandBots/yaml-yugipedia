title: Card Trivia:Speed Intruder
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[High Speed Rule]]" and "[[Speed Up]]".
  ** A [[Praime]] [[counterpart]] of this monster appears in the artwork of "[[Full-Speed Penetrate]]".
  * This monster is named after an [[wikipedia:Intruder (air combat)|intruder]], a military aircraft designed to penetrate enemy air space to disrupt operations.
