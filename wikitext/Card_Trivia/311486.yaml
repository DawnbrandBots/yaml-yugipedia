title: Card Trivia:Qlipper Launch
wikitext: |-
  {{Navigation}}

  * The Japanese name of this card comes from [[wikipedia:Fortran|Fortran]], a programming language, suiting the computer theme of the archetype.
  ** Furthermore, the English name comes from [[wikipedia:Clipper (programming language)|Clipper]], another programming language.
  * "[[Qliphort Scout]]" appears in this card's artwork, attached to the "[[Qli]]" [[wikipedia:Sephirot|sephirot]] structure emerging from underneath "[[Naturia Sacred Tree]]".
  ** The event in this card's artwork is preceded by that shown in "[[El Shaddoll Fusion]]", and followed by the event shown in "[[Qlimate Change]]".
  * The base of this card's Japanese name translates to "Booting Up Machine Husks".
  ** This references the Qli archetype in general. The [[wikipedia:Qliphoth|Qliphoth]] are the opposite of the virtues described by the Sephirot diagram, and are referred to as shells or husks that hide the Sephirot from humans. The Qli monsters, then, are the machine husks described by the card's name.
