title: Card Trivia:Mature Chronicle
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] counterpart of "[[Spell Chronicle]]".
  ** This card's artwork replaces the wings and tail in the artwork of "Spell Chronicle" with the wings and tail of "[[Yubel]]", and the moon symbol in the artwork of "Spell Chronicle" with a symbol based on the artwork of "[[Super Polymerization]]".
  ** In contrast to the moon symbol and blue background in the artwork of "Spell Chronicle", this card's artwork instead depicts a sun symbol and a red background.
  * This card's name references [[Yubel (character)|Yubel]]'s duty to [[The Supreme King]] in the ''[[Yu-Gi-Oh! GX]]'' anime. Yubel was to protect The Supreme King until he "matured" into adulthood and could control [[The Gentle Darkness]]. Yubel was also the one responsible for pushing [[Jaden Yuki]]'s character growth over the course of the [[Dimension World]] arc; therefore, this card reflects Jaden's coming of age.
  * This card's second, third, and fifth bulleted effects are based on the anime effects of "[[Spell Chronicle (anime)|Spell Chronicle]]". In the anime, Yubel used this card to [[banish]] five cards of their choice from their [[Deck]], although Jaden made all the decisions of choosing which cards were [[add]]ed to Yubel's [[hand]] after the two [[Chronicle Counter]]s were removed for this card's activation, including "[[Super Polymerization (anime)|Super Polymerization]]" on the final turn of the [[Duel]].
