title: Card Trivia:El Shaddoll Wendigo
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Shaddoll]]" [[counterpart]] of "[[Ritual Beast Ulti-Pettlephin]]".
  ** Its transformation can be seen in the artwork of "[[Ritual Beast Ambush]]".
  ** "Wendigo" also appears in "[[Zefra Path]]", being transformed by "[[Oracle of Zefra]]" into "[[Ritual Beast Tamer Zefrawendi]]".
  * A [[wikipedia:Wendigo|Wendigo]] is a demonic half-beast creature appearing in the legends of the [[wikipedia:Algonquian peoples|Algonquian peoples]] along the [[wikipedia:East Coast of the United States|Atlantic Coast]] and Great Lakes Region of both the [[wikipedia:United States|United States]] and [[wikipedia:Canada|Canada]].
