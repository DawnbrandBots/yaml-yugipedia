title: Card Trivia:Gather Your Mind
wikitext: |-
  {{Navigation}}

  * An [[Eye of Wdjat]] tattoo is visible on the woman's shoulder in this card's artwork.
  * This was one of the first cards to have a name-based [[activate|activation]] restriction in its effect that prevented the player from activating the card or effect more than [[once per turn]] between any number of copies of that card.
