title: Card Trivia:Constructor Art - Buildestruction
wikitext: |-
  {{Navigation}}

  * "[[Constructor Demolisher Wyrm Drake Crush]]" appears in this card's artwork.
  * The scene depicted in this card's artwork is related to that seen in the artwork of "[[Constructor Resurrection]]".
  ** Both artworks depict the same destroyed wreckage and scattered pink shards of light. Also, "Buildestruction" and "Resurrection" depict two monsters that are counterparts to each-other ("Drake Crush" and "[[Constructor Wyrm Buildragon]]").
