  * This monster is named after [[wikipedia:Balthazar (magus)|Balthazar]], one of the three [[wikipedia:Biblical Magi|Biblical Magi]] who gave the gift of [[wikipedia:Myrrh|myrrh]] to the newly born [[wikipedia:Jesus|Jesus]].
