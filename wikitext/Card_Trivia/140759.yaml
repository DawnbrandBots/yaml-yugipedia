title: Card Trivia:Amazoness Heirloom
wikitext: |-
  {{Navigation}}

  * The statue in the card art looks similar to a fertility doll.
  * The background shows a string with some beads, which can imply that the "Heirloom" is also a necklace.
  * The '''muiraquitã''' is a kind of amulet of indigenous origin from the amazon region. There are legends that the amulet was offered as a gift by the Icamiaba female warriors to all those Indians who annually visited their camp.
