title: Card Trivia:Tanngnjostr of the Nordic Beasts
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Tanngrisnir and Tanngnjóstr|Tanngnjóstr]], one of the goats that pulled [[wikipedia:Thor|Thor's]] chariot in [[wikipedia:Norse mythology|Norse mythology]].
  ** In Old Nordic, the name Tanngnjóstr translates to "teeth grinder". Fittingly, in {{episode|5D's|124|ref}}, when this monster is used to [[Synchro Summon]] "[[Thor, Lord of the Aesir (anime)|Thor, Lord of the Aesir]]", it is depicted grinding its teeth.
