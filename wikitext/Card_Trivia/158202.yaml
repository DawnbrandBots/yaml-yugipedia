title: Card Trivia:Red Carpet
wikitext: |-
  {{Navigation}}

  * "[[Barrier Resonator]]", "[[Dark Resonator]]", and the silhouette of "[[Red Nova Dragon]]" appear in this card's artwork.
  ** This card's artwork likely depicts the [[Synchro Summon]] of "Red Nova Dragon" using "[[Red Dragon Archfiend]]", "Barrier Resonator", and "Dark Resonator" as [[Synchro Material]]s.
  ** This card's name and artwork are a reference to the presence of a red carpet when a famous person appears at an event.
  *** Fittingly, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, [[Jack Atlas]] (the owner of "[[Red Nova Dragon (anime)|Red Nova Dragon]]") was a famous celebrity in [[New Domino City]].
  *** "Scar-Red" in this card's Japanese name, "Scar-Red Carpet" is based on [[Red Nova]], a demon also known as "Scar-Red Nova" in the original Japanese version of the ''Yu-Gi-Oh! 5D's'' anime whose power is used to create "Red Nova Dragon".
