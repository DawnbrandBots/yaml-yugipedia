title: Card Trivia:Superalloy Beast Raptinus
wikitext: |-
  {{Navigation}}

  * If you examine the art closely, there appears to be stitches connecting the different body parts together. This could be a reference to the classic horror monster Frankenstein's monster.
  * The Spanish ''[[Gladiator's Assault]]'' First Edition print has no diacritical mark in its name, appearing as "''S'''u'''per''" instead of "''S'''ú'''per''".
  * This card has an [[Equip Spell]] based on this card's name and appearance: "[[Supermagic Sword of Raptinus]]".
