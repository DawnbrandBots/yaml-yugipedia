title: Card Trivia:Quiz Panel - Slifer 20
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Slifer the Sky Dragon]]" appears in this card's artwork.
  * This card has two counterparts: "[[Quiz Panel - Obelisk 20]]" and "[[Quiz Panel - Ra 20]]".
  * This is the only "Quiz Panel - Slifer" card that does not involve a test of physical strength or endurance.
