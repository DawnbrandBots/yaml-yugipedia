title: 'Card Trivia:Number S0: Utopic ZEXAL'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster is the manga [[counterpart]] of "[[Number F0: Utopic Future]]".
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Rank]] (0), [[Type]] ([[Warrior]]), no [[original ATK and DEF]] (0/0 by default, on this monster's case), and effect to treat themselves as [[Rank 1]] monsters.
  ** Both can be [[Xyz Summon]]ed by using [[Xyz Monster]]s with the same [[Rank]] as [[material]]; however, this monster requires three "[[Number]]" monsters, while "Utopic Future" does not require "Number" monsters.
  *** This monster's ''[[OCG]]''/''[[TCG]]'' alternate [[Summoning condition]] requiring the player to [[discard]] a "[[Rank-Up-Magic]]" card and using a "[[Utopia (archetype)|Utopia]]" monster as material is based on a scene in {{chapter|ZEXAL|051|ref}} where it was Summoned via the effect of "[[Shining Hope Road (manga)|Shining Hope Road]]", which was considered a [[Rank-Up]] [[Spell Card]].
  * This monster shares similarities with "[[Number 99: Utopic Dragon]]".
  ** Both monsters are part of the "Utopic" [[archetype]] and are related to the "Utopia" archetype.
  ** Both monsters can be Xyz Summoned by discarding "Rank-Up-Magic" cards and using a "Utopia" monster as [[Xyz Material]].
  * This monster shares similarities with "[[CXyz Barian Hope]]".
  ** Both are LIGHT Warrior Xyz Monsters.
  ** Both monsters require "Number" Xyz Monsters as material, which represent the bonds between the user's closest allies.
  ** Both monsters gain 1000 [[ATK]] for each material attached to them.
  ** Boh have been used in the penultimate [[Duel]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]], respectively.
  * This is the first case of a human [[Duelist]] ([[Yuma Tsukumo (manga)|Yuma Tsukumo]]) to Summon themselves as a monster.
  * This card's artwork is taken from the aforementioned chapter of the ''Yu-Gi-Oh! ZEXAL'' manga, specifically from the panel showing [[No. S0: Hope ZEXAL (manga)|this monster]] being Summoned.
