title: Card Trivia:Ether Finder
wikitext: |-
  {{Navigation}}

  * This monster is closely related to "[[Ether Seeker]]".
  ** Both monsters have the same [[ATK]], [[DEF]], [[Level]], and [[Attribute]], and have similar names, effects, and appearances, including having the same type of [[Duel Disk]]-like device on one arm. Also, this monster can Special Summon "Ether Seeker" with its effect.
