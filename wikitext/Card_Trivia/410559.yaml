title: Card Trivia:First-Aid Squad
wikitext: |-
  {{Navigation}}

  * "[[Marauding Captain]]", "[[Field-Commander Rahz]]", "[[Freed the Matchless General]]", "[[Muscle Medic]]", and the unknown warrior from the artworks of "[[Cry Havoc!]]", "[[The A. Forces]]", "[[Marmiting Captain]]", and "[[Motivating Captain]]" appear in this card's artwork.
  ** Ironically, none of the named monsters featured in this card's artwork can be targeted by this card.
  ** The [[Level]], [[Type]], [[Attribute]], [[ATK]] and [[DEF]] that this card possesses when [[Summoned]] by its own effect are the same as "Marauding Captain".
