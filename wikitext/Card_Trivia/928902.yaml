  * The upper half of "[[Prediction Princess Tarotrei]]" and the lower half of "[[Prediction Princess Tarotreith]]" appear in this card's artwork.
  * This is the first card that can [[Ritual Summon]] a [[Ritual Monster]] in [[face-down]] [[Defense Position]].
