title: Card Trivia:Soul Resonator
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[Blazing Soul]], a power used by [[Jack Atlas]] to [[Synchro Summon]] "[[Red Nova Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster features the feathers worn by the [[Legendary Signer]], who first used the power of Blazing Soul to seal away [[Red Nova]] in the anime.
  ** This monster features a fiery silhouette of the [[Mark of the Dragon|Mark of the]] [[Crimson Dragon]] on its back, which appeared when Jack Atlas and the Legendary Signer used the power of Blazing Soul to seal away Red Nova in the anime. In the case of Jack Atlas, he used the power of Blazing Soul to transform "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" into "[[Red Nova Dragon (anime)|Red Nova Dragon]]".
