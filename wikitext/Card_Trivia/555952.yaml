title: Card Trivia:Demise, Supreme King of Armageddon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Breaking of the World]]", and its shadow appears in the artwork of "[[Ruin, Supreme Queen of Oblivion]]".
  * This monster has two downgraded form: "[[Demise, Agent of Armageddon]]" and "[[Demise, King of Armageddon]]".
  * This monster has a retrained [[counterpart]] (wearing armor based on "Ruin, Supreme Queen of Oblivion"): "[[End of the World Ruler]]".
