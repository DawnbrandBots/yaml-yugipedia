title: Card Trivia:Mayakashi Metamorphosis
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the transformation of the Main Deck "[[Mayakashi]]" monsters into their [[Synchro Monster]] counterparts:
  ** "[[Dakki, the Graceful Mayakashi]]" → "[[Yoko, the Graceful Mayakashi]]"
  ** "[[Shafu, the Wheeled Mayakashi]]" → "[[Oboro-Guruma, the Wheeled Mayakashi]]"
  ** "[[Hajun, the Winged Mayakashi]]" → "[[Tengu, the Winged Mayakashi]]"
  ** "[[Yasha, the Skeletal Mayakashi]]" → "[[Gashadokuro, the Skeletal Mayakashi]]"
