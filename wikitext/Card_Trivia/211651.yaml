title: Card Trivia:Dragonic Attack
wikitext: |-
  {{Navigation}}

  * This card is based on common tropes in popular media regarding martial arts, where "soft styles" of martial arts are often exaggerated to allow one to utilize their ''qi'' and perform energy attacks or even magic; such martial arts styles are also given "dragon" motifs, reflecting the role of the dragon in some East Asian cultures as a symbol of spirit and the heavens.
  * This card's artwork resembles the Dragon Fist attack used by the main character of the ''[[wikipedia:Dragon Ball|Dragon Ball]]'' franchise, Goku.
  * This card is the thematic opposite of "[[Sword of Dragon's Soul]]", as it turns a [[Warrior]]-[[Type]] monster into a [[Dragon]]-Type rather than empowering it to destroy a Dragon-Type.
