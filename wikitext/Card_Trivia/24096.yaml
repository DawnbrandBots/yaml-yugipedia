title: Card Trivia:Des Dendle
wikitext: |-
  {{Navigation}}

  * "[[Vampiric Orchis]]" and several "[[Wicked Plant Token]]s" appear in this card's artwork.
  * This monster is the patch of blue flowers growing on the roots of "Vampire Orchis". 
  ** This monsters Japanese name "Death Dendro" is derived from an abbreviation of [[wikipedia:Dendrobium|Dendrobium]], a genus of orchids which grow on the roots of trees and are native to much of Asia.
  * This card is currently the only [[Plant]]-Type Union monster.
