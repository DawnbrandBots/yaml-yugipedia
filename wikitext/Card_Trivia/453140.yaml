title: Card Trivia:Zodiac Sign
wikitext: |-
  {{Navigation}}

  * "[[Master Peace, the True Dracoslayer]]", "[[Zoodiac Ramram]]", "[[Zoodiac Thoroughblade]]", and "[[Zoodiac Whiptail]]" appear in this card's artwork.
  ** The kanji above each of the aforementioned "[[Zoodiac]]" monsters corresponds to that of the animal they represent in the [[wikipedia:Chinese zodiac|Chinese zodiac]]: [[wikipedia:Goat (zodiac)|Goat]], [[wikipedia:Horse (zodiac)|Horse]], and [[wikipedia:Snake (zodiac)|Snake]], respectively.
  * Like the other Field Spells of archetypes related to the "[[Dracoslayer]]" storyline ("[[Ignition Phoenix]]", "[[Dinomic Powerload]]", "[[Majesty's Pegasus]]", "[[Amorphous Persona]]", "[[Crystolic Potential]]", "[[Metamorformation]]", and "[[Dragonic Diagram]]"):
  ** They are Field Spells that feature a member of the "Dracoslayer" archetype in its artwork.
  ** They support their respective archetype, but are not part of the archetype themselves (they do not have the archetype in their name).
  ** Their Japanese names each have a word abbreviated with an English letter with Furigana. In this card's case, "Sign" is written as a "S".
