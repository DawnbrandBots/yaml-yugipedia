title: Card Trivia:Ignoble Knight of High Laundsallyn
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Extra Pack: Knights of Order]]''.
  * This monster is an upgraded version of "[[Ignoble Knight of Black Laundsallyn]]".
  ** As such, this monster is also based on the Arthurian knight, [[wikipedia:Lancelot|Lancelot du Lac]].
  ** Fittingly, this monster has exactly 100 more [[ATK]] and [[DEF]] than "Black Laundsallyn" does.
  * Red versions of "[[Noble Arms - Arfeudutyr]]" and "[[Noble Arms - Excaliburn]]", and a purple shadow version of "[[Lady of the Lake]]" appear in this card's artwork.
  ** The appearance of these objects all relate to elements of Lancelot's story; Arfeudutyr is based on Lancelot's sword Arondight, Lancelot was raised by the [[wikipedia:Lady of the Lake|Lady of the Lake]] in a magic world after his parents are driven out of their kingdom, and Excaliburn reflects the knight's ultimate betrayal of [[wikipedia:King Arthur|King Arthur]], who was the true owner of said blade.
  * This knight draws a parallel to "[[Artorigus, King of the Noble Knights]]" in that he has red lines running throughout his swords and body, while "Artorigus" has blue lines.
  * This knight's ghost appears in the artwork of "[[Noble Knight Eachtar]]".
