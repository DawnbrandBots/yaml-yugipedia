title: 'Card Trivia:Number C92: Heart-eartH Chaos Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * The number "92" is located on the right side of this monster's lower abdomen.
  * This monster is a "[[Number C]]" [[Card evolutions|upgraded]] form of "[[Number 92: Heart-eartH Dragon]]".
  ** This monster's first effect to gain [[Life Point]]s equal to the [[battle damage]] inflicted on the opponent by the player's monster is based on the anime effect of "[[Number 92: Heart-eartH Dragon (anime)|Number 92: Heart-eartH Dragon]]", which can regain the player's Life Points by the amount of battle damage they would take and inflict the same amount to the opponent as damage.
  * This is the first [[Rank 10]] "[[Number]]" monster, as well as the first "Number C" monster.
  * This monster, alongside "[[Number C69: Heraldry Crest of Horror]]", are the only two "Number C" monsters in the anime that were Summoned using their base forms, but not their original owners. In this monster's case, it was Summoned by [[Number 96]] while its base form was originally owned by [[Dr. Faker]].
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster's roar is similar to that of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]".
