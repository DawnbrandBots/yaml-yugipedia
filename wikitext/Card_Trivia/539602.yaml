title: Card Trivia:Waboku
wikitext: |-
  {{Navigation}}

  * The maidens in this card's artwork appear in the artwork of "[[Hallowed Life Barrier]]".
  * This card's ''[[TCG]]'' name is an untranslated part of its Japanese name, "Emissaries of Reconciliation" ({{Ruby|和|わ}}{{Ruby|睦|ぼく}}の{{Ruby|使|し}}{{Ruby|者|しゃ}}, ''Waboku no Shisha''), leaving its ''TCG'' name as the Japanese word for "reconciliation".
  * This card's original text only stopped [[battle damage]], it did not protect the player's monsters from being [[destroyed by battle]].
  ** Despite this, this card was given a ruling that stated that it protected the player's monsters from being [[destroy]]ed on the original ''Yu-Gi-Oh!'' website.
  *** This ruling also stated that no monsters on the [[field]] would be destroyed, [[face-down]] monsters are [[flip]]ped [[face-up]], and the [[Battle Phase]] ends when this card is [[activate]]d.
