title: Card Trivia:Gladiator Beast Alexander
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gladiator Beast's Respite]]".
  * This monster is named after [[wikipedia:Severus Alexander|Severus Alexander]], an emperor of [[wikipedia:Ancient Rome|Ancient Rome]].
  * This monster can only be [[Special Summon]]ed by the effect of "[[Gladiator Beast Dimacari]]", with this monster being based on a lion and "Dimacari" being based on a [[wikipedia:African buffalo|African buffalo]]. This likely references how lions are the natural predators of the African buffalo.
