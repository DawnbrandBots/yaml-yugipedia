title: Card Trivia:Immortal Phoenix Gearfried
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Warriors' Strike]]''.
  * This monster is a [[retrained]] version of "[[Phoenix Gearfried]]".
  ** The transformation of "Phoenix Gearfried" into this monster is depicted in the artwork of "[[Gemini Ablation]]".
  * This monster's name is likely a reference to "[[The Winged Dragon of Ra - Immortal Phoenix]]".
  ** This is further supported by the fact during the end of [[Katsuya Jonouchi and Dark Marik's Duel (manga)|Katsuya Jonouchi and Dark Marik's Duel]] and its [[Joey Wheeler and Yami Marik's Battle City Duel|anime adaptation]], [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] ([[Joey Wheeler]] in the anime) nearly used "[[Gearfried the Iron Knight]]" to defeat [[Dark Marik (manga)|Dark Marik]] ([[Yami Marik]] in the anime) on his turn after suffering an attack from the Phoenix Mode of Dark Marik's "[[The Winged Dragon of Ra|Winged Dragon of Ra]]".
