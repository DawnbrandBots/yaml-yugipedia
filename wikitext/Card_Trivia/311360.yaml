title: Card Trivia:Naturia Gaiastrio
wikitext: |-
  {{Navigation}}

  * "[[Naturia Beast]]" appears in this card's artwork (in the bottom-left corner).
  * Visually, this monster is a [[Fusion Monster|Fused]] form of "[[Leo, the Keeper of the Sacred Tree]]" and "[[Naturia Landoise]]".
  ** This is reflected by its [[Rock]] [[Type]] and the hill on this monster's back (like "Naturia Landoise"), as well as its anti-[[target]]ing effect (which is similar to the effect of "Leo, the Keeper of the Sacred Tree").
  * This card has a "[[Ritual Beast Ulti]]" [[counterpart]]: "[[Ritual Beast Ulti-Gaiapelio]]".
