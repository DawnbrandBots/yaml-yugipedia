title: Card Trivia:Elfnote Regina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dead-End Power Patron Realm - Viraia]]".
  * This monster is an "[[Elfnote]]" [[counterpart]] of "[[Artmage Litera]]", achieved by taking on the power of the [[Elfnote Seraphim Strelitzia|Grand Spirit]].
  ** This suggests that this monster, just like "[[Artmage Graflare]]", was not originally a resident of "[[Artmage Academic Arcane Arts Acropolis]]", but instead hailing from the same nation as the "Elfnote".
