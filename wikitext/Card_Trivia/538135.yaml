  * "[[Marauding Captain]]" and "[[Terrorking Archfiend]]" appear in this card's artwork.
  ** This card's artwork depicts "Terrorking Archfiend" giving "Marauding Captain" the scar on his face.
  ** The events depicted in this card's artwork continues in the artwork of "[[Counterattack Beacon]]".
