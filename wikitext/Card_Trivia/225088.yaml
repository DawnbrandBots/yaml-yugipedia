title: Card Trivia:Iron Cage
wikitext: |-
  {{Navigation}}

  * This card is based on the iron cage from the fairy tale, ''[[wikipedia:Iron John|Iron John]]'', in which the titular enchanted wild man is imprisoned by the king and imprisoned in a castle courtyard. Years later, a young prince frees him, and Iron John takes the prince away from his kingdom to escape the death penalty for releasing him.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, the cage imprisons the [[target]]ed monster, causing it to disappear for one turn until it eventually "releases" the targeted monster. Fittingly, in {{episode||197|ref}}, this card was used to destroy "[[Iron Hans (anime)|Iron Hans]]", a monster based on Iron John from the titular fairy tale who was imprisoned inside the iron cage.
