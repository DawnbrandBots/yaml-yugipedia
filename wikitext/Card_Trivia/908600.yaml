title: Card Trivia:Meteonis Drytron
wikitext: |-
  {{Navigation}}

  * "[[Drytron Meteonis Draconids]]" appears in this card's artwork.
  * The [[wikipedia:Draco (constellation)|Draco]] constellation appears in this card's artwork.
  ** Fittingly, the "[[Drytron]]" monsters are named after the stars in the constellation.
  * The kanji 「流星輝巧群」 (normally ''Ryūsei Kikō Gun'', read as "Meteonis Drytron") in this card's Japanese name can be translated as "Meteor Drytron Shower".
  * This is the first [[Ritual Spell]] to require monsters with an [[ATK]] instead of [[Level]]s as [[Tribute]]s for a [[Ritual Summon]].
  ** This is also the first card to allow [[Xyz Monster|Xyz]] and/or [[Link Monster]]s to be used as Tributes for a Ritual Summon, albeit only [[Machine]] monsters.
