title: Card Trivia:Cannon Soldier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Autonomous Action Unit]]", "[[Blasting Fuse]]", "[[Covering Fire]]", "[[Divine Wrath]]", "[[Faulty Fire]]", "[[Fuse Line]]", "[[Linear Accelerator Cannon]]", "[[Mass Driver]]", and "[[Transmodify]]".
  * The ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' version of this card appears in the artwork of the ''Rush Duel'' version of "[[Exchange (Rush Duel)|Exchange]]".
  * This card has a [[Toon monster|Toon]] [[counterpart]]: "[[Toon Cannon Soldier]]".
  * This card has a ''Rush Duel'' counterpart: "[[Cannon Soljersey]]".
  * This card has an [[Card evolutions|upgraded]] form: "[[Cannon Soldier MK-2]]".
  ** Based on the artwork of "Transmodify", "Cannon Soldier" is within "Cannon Soldier MK-2", with the former most likely controlling the latter.
