title: Card Trivia:Booby Trap E
wikitext: |-
  {{Navigation}}

  * The English letter "E" in this card's name is based on the English spelling of '''''e'''izoku'' ({{Ruby|永|えい}}{{Ruby|続|ぞく}}), the Japanese word for "'''e'''ternal" or "continuous". This is reflected in this card's [[Continuous Trap Card]] type in the ''[[Yu-Gi-Oh! ARC-V]]'' anime and its effect [[support]]ing Continuous Trap Cards.
