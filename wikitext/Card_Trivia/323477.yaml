title: Card Trivia:Scrap Fist
wikitext: |-
  {{Navigation}}

  [[File:Scrap_Fist.jpg|thumb|"Junk Warrior" attacking.]]
  * "[[Junk Warrior]]" appears in this card's artwork.
  ** This card's name is the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "[[Junk Warrior (anime)|Junk Warrior]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This card's artwork is a reference to the scene in {{episode|5D's|154|ref}} where [[Yusei Fudo]] used the effect of "Junk Warrior" to raise its [[ATK]], and then [[attack]]ed and [[destroy]]ed "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]", during his last [[Duel]] against [[Jack Atlas]].
  *** However, unlike this card's effect, in the anime "Red Dragon Archfiend" was not in [[Defense Position]], thus Jack did not receive [[piercing]] [[battle damage]] damage. Also, "Red Dragon Archfiend" was [[destroyed by battle]], not by a [[card effect]].
  * This card mirrors "[[Absolute Powerforce (card)|Absolute Powerforce]]", a support card for "[[Red Dragon Archfiend]]". Both cards are battle support cards that prevent the activation of cards and effects, inflict [[Piercing|piercing damage]], and double battle damage.
  ** The difference between both cards is that "Absolute Powerforce" gives "Red Dragon Archfiend" 1000 more [[ATK]], referencing how "Red Dragon Archfiend" has a higher [[original ATK]] than "Junk Warrior" does. This card however, prevents "Junk Warrior" from being destroyed by battle and destroys the opponent's monster at the end of the [[Damage Step]].
  *** In other words, despite being weaker, "Junk Warrior" can almost always destroy "Red Dragon Archfiend" with this card, even if "Absolute Powerforce" is successfully applied to the latter monster. This reflects how "[[Junk Warrior (anime)|Junk Warrior]]" destroys "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" in the [[Yu-Gi-Oh! 5D's - Episode 154|final episode]] of ''Yu-Gi-Oh! 5D's''.
