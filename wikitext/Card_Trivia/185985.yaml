title: Card Trivia:Daigusto Emeral
wikitext: |-
  {{Navigation}}

  * This card's name and [[Type]] suggest that it was formed from a [[Level]] 4 "[[Gusto]]" monster and "[[Gem-Knight Emerald]]", suggesting an alliance between the "[[Gem-Knight]]" and "Gusto" [[archetype]]s.
  ** This is reflected in the card's effects, and how they work well with their respective archetypes.
  ** This card's [[ATK]] and [[DEF]] are equal to that of "Gem-Knight Emerald".
  ** The other [[Xyz Material]] used to form this monster could possibly be "[[Caam, Serenity of Gusto]]", due to their similar effects.
  * This card is the first and one of the few [[WIND]] [[Rock]]-Type monsters.
  * This card's effect may be a parallel to that of "[[Lavalval Chain]]"; this card focuses on searching the Graveyard, while "Lavalval Chain" focuses on searching through the Deck.
  ** The two monsters may be rivals; both appear in ''Duel Terminal 13'', and possess the same ATK and mirrored poses.
  ** There are noticeable rivalries between the "[[Laval]]s" and "Gem-Knights", as well as "[[Gishki]]s" and "Gustos"; "Chain" uses monsters from the former of each pair (both of which are allied portrayed as evil) as Xyz Material, while "Emeral" uses monster from the latter archetypes (also allied and portrayed as good).
  * This monster resembles ''[[w:c:kamenrider:Kamen Rider Ryuki|Kamen Rider Ryuki]]'' [[w:c:kamenrider:Survive Mode|Survive Mode]] with its helmet and chest armor.{{fact}}
  * This monster appears in the artworks of "[[Overlay Regen]]", "[[Overlay Zero Buster]]" and "[[Xyz Discharge]]".
