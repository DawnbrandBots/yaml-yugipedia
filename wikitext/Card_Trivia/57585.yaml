title: Card Trivia:Jurrac Giganoto
wikitext: |-
  {{Navigation}}

  * This card's name is based off [[wikipedia:Giganotosaurus|Giganotosaurus]] (Giant southern lizard), a carnivorous dinosaur that was bigger than Tyrannosaurus but smaller than Spinosaurus.
  * This is the first [[Dinosaur]]-[[Type]] [[Synchro Monster]] in the [[OCG]].
  * This card appears to be an older version of "[[Jurrac Monoloph]]".
