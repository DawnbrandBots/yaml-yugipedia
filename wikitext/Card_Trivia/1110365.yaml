title: Card Trivia:Twin Volteccer
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is a [[retrained]] [[Effect Monster|Effect]] [[counterpart]] of "[[Vortex Shooter]]".
  * This monster's Japanese name (ヴォルテッカー, ''Vorutekkā'') may be a portmanteau of "Vortex" (ヴォルテクス, ''vorutekusu'') and "Volteccer" (ボルテッカー, ''borutekkā''), the signature attack of the Japanese platform hero [[Wikipedia:Pulseman|Pulseman]].
