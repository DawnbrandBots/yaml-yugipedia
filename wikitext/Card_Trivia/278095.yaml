title: Card Trivia:Over Tuning
wikitext: |-
  {{Navigation}}

  * "[[Dark Resonator]]" and "[[Trap Eater]]" appear in this card's artwork.
  ** Both were used by [[Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This card's name is a reference to [[Double Tuning]] (also known as Over Tuning), an advanced [[Synchro Summon]]ing mechanic used by Jack Atlas in the ''Yu-Gi-Oh! 5D's'' anime.
