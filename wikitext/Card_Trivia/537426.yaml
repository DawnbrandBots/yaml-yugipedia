title: Card Trivia:King Dragun
wikitext: |-
  {{Navigation}}

  * "[[The Flute of Summoning Dragon]]" appears in this card's artwork, being held by this monster.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster used it as a weapon.
  * This monster is a [[Fusion Monster|Fusion]] form of "[[Lord of D.]]" with "[[Divine Dragon Ragnarok]]".
  ** This monster's [[original ATK]] (2400) is twice that of "Lord of D." (1200).
  ** This monster's [[original DEF]] (1100) is the same as that of "Lord of D.".
  ** This monster's first effect to prevent [[Dragon]] monsters from being [[target]]ed by the opponent's card effects is similar to the effect of "Lord of D.", while this monster's second effect to [[Special Summon]] a Dragon monster from the [[hand]] is similar to that of "The Flute of Summoning Dragon", which requires "Lord of D." to be activated.
  * This monster has a female [[Xyz Monster|Xyz]] [[counterpart]]: "[[Queen Dragun Djinn]]".
  ** Both monsters have the kanji 「竜魔人」 (''Ryūmajin'', "Dragon Djinn") in their Japanese names.
  ** Both are depicted with mirrored poses.
  ** This monster's [[Fusion Material]]s ("Lord of D." + "Divine Dragon Ragnarok") are both [[Level 4]] monsters, so they can also be used as [[Xyz Material]]s to [[Xyz Summon]] "Queen Dragun".
  ** This monster can prevent Dragon monsters from being [[target]]ed by the opponent's card effects and Special Summons one Dragon monster from the hand, while "Queen Dragun" can prevent Dragon monsters from being destroyed by battle and Special Summons [[Level 5]] or higher Dragon monsters from the [[Graveyard]].
  ** Both monsters were also initially released as [[Super Rare]]s in the ''[[TCG]]'' edition of ''[[Galactic Overlord]]''; however, this monster was instead printed as an [[Ultimate Rare]] in ''Galactic Overlord'' in the ''[[OCG]]'', while "Queen Dragun" was printed as a [[Rare]].
  * Though this card is available in the ''[[Yu-Gi-Oh! World Championship 2008]]'' video game, it cannot be Summoned without a [[Fusion Substitute Monster]] as "Divine Dragon Ragnarok", one of its Fusion Materials, is not available in the game.
