title: Card Trivia:Madolche Puddingcess Chocolat-a-la-Mode
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Madolche Puddingcess]]".
  ** This monster's name is a portmanteau of "[[wikipedia:ja:プリンアラモード|pudding à la mode]]" and "[[wikipedia:Chocolate|chocolate]]".
  *** ''Pudding à la mode'' is a Western confection that originated in Japan, which consists of a dessert platter with custard pudding in the center and decorated with sweets. Fittingly, the design of this monster's dress and its jigsaw puzzle-piece platform are both based on the custard ''pudding à la mode''.
  *** "Chocolate" is spelled in its French variation, "chocolat", which makes up the brown color scheme of this monster's dress and its jigsaw puzzle-piece platform. Its Japanese name, "Choco-a-la-Mode" (プディンセス・ショコ・ア・ラ・モード, ''Madoruche Pudinsesu Shoko a ra Mōdo'') is a portmanteau of ''shoko'' (ショコ, lit. "choco"), ''shokora'' (ショコラ, lit. ''chocolat''), and ''a ra mōdo'' (ア・ラ・モード, lit. "à la mode").
  * This is the first [[Rank 5]] "[[Madolche]]" Xyz Monster.
