  * This is one of the [[cover card]]s of ''[[Legendary Hero Decks]]''.
  * This monster is based on "[[wikipedia:Gullveig|Gullveig]]", a figure from Norse mythology. It is speculated that Gullveig is the same figure as "[[wikipedia:Freyja|Freyja]]".
