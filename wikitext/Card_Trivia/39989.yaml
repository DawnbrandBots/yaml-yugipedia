title: Card Trivia:Morphtronic Monitron
wikitext: |-
  {{Navigation}}

  * This card is based on a security camera, as seen in the background.
  * The picture on this card loosely resembles a Decepticon Transformer named Shockwave/Shockblast.
  * This is the only "Morphtronic" card whose artwork resembles the artwork for a "Morphtronic" monster, yet this card isn't a monster card.
