title: Card Trivia:Dodge Roll
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's artwork depicts a fighter jet performing an [[wikipedia:Aileron roll|aileron roll]], an acrobatic maneuver in which the airplane rotates 360° primarily about its longitudinal axis.
  ** Ironically, despite this card's name and effect to "dodge" damage, the aileron roll does not help the aircraft dodge enemy missiles; instead, it is strictly used for airshows.
