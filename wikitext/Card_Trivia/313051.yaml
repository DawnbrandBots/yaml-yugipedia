title: Card Trivia:Scrounging Goblin
wikitext: |-
  {{Navigation}}

  * This monster is holding a "[[Pot of Duality]]".
  * This monster appears in the artwork of "[[Land Flipping]]", and "[[Shipping Error]]".
  * This monster seems to be an older version of "[[Goblin of Greed]]"
  * The negation part of this card's effect is fitting, as it represents "charity" given to a beggar.
