title: Card Trivia:Elemental HERO Darkbright
wikitext: |-
  {{Navigation}}

  * This monster is the [[Fusion Monster|Fusion]] form of "[[Elemental HERO Sparkman]]" and "[[Elemental HERO Necroshade]]"
  ** This monster's name and [[Fusion Material]]s reference the dark lightning appearing in the background of this card's artwork, which is represented by the respective [[Attribute]]s of "Sparkman" ([[LIGHT]]) and "Necroshade" ([[DARK]]).
