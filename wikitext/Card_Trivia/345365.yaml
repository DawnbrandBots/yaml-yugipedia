title: Card Trivia:Stellarknight Alpha
wikitext: |-
  {{Navigation}}

  * "[[Satellarknight Deneb]]" appears in this card's artwork, along with the chestpieces and headpieces of "[[Satellarknight Altair]]" and "[[Satellarknight Vega]]".
  ** As such, this card's artwork likely depicts the creation of "[[Stellarknight Delteros]]".
