title: Card Trivia:Raphion, the Timelord
wikitext: |-
  {{Navigation}}

  * This monster is named after the Judaic archangel, [[wikipedia:Raphael (archangel)|Raphael]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Raphael is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Hod|Hod]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Hod is the eighth of the ten Sefira of the Tree of Life, and this was the eighth "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * In ''[[Yu-Gi-Oh! 5D's Tag Force 6]]'', this monster's unique effect activates at the end of the [[Damage Step]], like the "Timelord" monsters in the anime (except "[[Metaion, the Timelord (anime)|Metaion, the Timelord]]"), rather than at the end of the [[Battle Phase]].
