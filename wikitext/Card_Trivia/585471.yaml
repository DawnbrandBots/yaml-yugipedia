title: Card Trivia:Yuki-Onna, the Ice Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mayakashi Winter]]" and "[[Ghost Meets Girl - A Mayakashi's Manuscript]]".
  * This monster is based on the ''[[wikipedia:Yuki-onna|yuki-onna]]'' (雪女, "snow woman"), a yokai that takes the form of a beautiful woman with extremely pale skin and often wearing a white kimono.
  * This monster is the true form of "[[Yuki-Musume, the Ice Mayakashi]]".
  * This monster has two [[Card evolutions|upgraded]] forms: "[[Yuki-Onna, the Icicle Mayakashi]]" and "[[Yuki-Onna, the Absolute Zero Mayakashi]]". The latter wields the double-bladed naginata of "[[Shiranui Skillsaga Supremacy]]", which this monster is shown taking in the artwork of "Ghost Meets Girl - A Mayakashi's Manuscript".
