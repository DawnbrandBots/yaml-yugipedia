title: Card Trivia:Sonic Duck
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[First Wind]]" and "[[Weed Out]]".
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, when [[Jaden Yuki]], [[Syrus Truesdale]], [[Chazz Princeton]], [[Alexis Rhodes]], [[Atticus Rhodes]], [[Tyranno Hassleberry]], [[Jim Crocodile Cook]], and [[Axel Brodie]] rode this monster in another dimension, it mirrored the Chocobo riding from the ''Final Fantasy'' series.
