title: Card Trivia:Ritual Beast Ulti-Nochiudrago
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Void Breach]]".
  * This monster is the combined form of "[[Spiritual Beast Tamer Lara]]" and a purified "[[Taotie, Shadow of the Yang Zing]]".
  ** This monster shares the same [[Type]] ([[Wyrm]]) as "Yang Zing" monsters.
  ** This monster's effect that prevents "Ritual Beast" monsters from being targeted by card effects is reminiscent of the effect of "[[Yazi, Evil of the Yang Zing]]" (another upgraded form of "Taotie"), which prevents itself from being targeted.
  * This card's name is a portmanteau of ノチウ ''nochiw'' (the [[wikipedia:Ainu language|Ainu]] word for "star") and "drago". This may be a reference to the Japanese name of the "[[Yang Zing]]" (竜星 ''Ryūsei'', "Dragon Star") [[archetype]].
  * This monster has an upgraded [[WIND]] [[Psychic]] [[Link Monster|Link]] form: "[[Ritual Beast Ulti-Reirautari]]".
