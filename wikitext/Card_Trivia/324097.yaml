title: Card Trivia:Stegocyber
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "''[[wikipedia:Stegosaurus|Stegosaurus]]''" and "cyber".
  * This is the only [[Main Deck]] monster debuting in ''[[Battle Pack 3: Monster League]]'' whose [[Level]] is not 4 or lower.
