title: Card Trivia:Darkfall
wikitext: |-
  {{Navigation}}

  * Three "[[X-Saber Airbellum]]s" and three "[[Sea Koala]]s" appear in this card's artwork.
  ** This may be a reference to the fact that both were often Summoned together by "[[Rescue Cat]]" prior to its banning and later errata, to Summon a [[Level 5]] [[Synchro Monster]] and weaken an opponent's monster. The sequences of events would be this: the player Summons both "Airbellum" and "Sea Koala"; the opponent activates "Darkfall"; the "Airbellum" and "Sea Koala" are sent into the hole/to the [[Graveyard]], and the other two copies of each in the first player's [[Deck]] go down with them.
  ** The floor collapsing in this card's artwork is the same stone floor in "[[People Running About]]" and "[[Out of the Blue]]". The same monsters also appear in the latter, but they are being blown away from the stone floor, as opposed to falling into a hole.
  * This is an upgraded version of "[[Chain Destruction]]", but it is also harder to [[activate]] since it can only be activated when at least two [[Monster Card|monsters]] are [[Special Summon]]ed [[face-up]] on your opponent's side at the same time.
