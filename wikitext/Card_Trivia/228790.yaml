title: Card Trivia:Mermail Abysslinde
wikitext: |-
  {{Navigation}}

  * This monster appears to be half [[wikipedia:Koi|koi]].
  * This monster appears in the artworks of "[[Abyss-sphere]]", "[[Abyss-squall]]", and "[[Deep Sea Aria]]".
  * This monster is based on one of the [[wikipedia:Rhinemaidens|Rhinemaidens]], specifically Woglinde. The other corresponding "[[Mermail]]" monsters are "[[Mermail Abyssgunde]]" and "[[Mermail Abysshilde]]".
  ** This is supported by the appearance of all of those monsters in the artwork of "Abyss-squall".
