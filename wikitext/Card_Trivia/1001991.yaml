title: Card Trivia:Resolve (card)
wikitext: |-
  {{Navigation}}

  * "[[Esperade the Smashing Superstar]]", "[[Kimeruler the Dark Raider]]" and "[[Multistrike Dragon Dragias]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|SEVENS|024|ref}}, where [[Gavin Sogetsu]], [[Lucidien Kallister]] and [[Romin Kassidy]] defeat three holograms of [[Otes]] at the same time with their monsters. Furthermore, this card's name references the Japanese title of that episode, "Resolve".

