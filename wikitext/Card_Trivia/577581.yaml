title: Card Trivia:Impcantation Inception
wikitext: |-
  {{Navigation}}

  * "[[Impcantation Bookstone]]", "[[Impcantation Candoll]]", "[[Impcantation Talismandra]]", and "[[Impcantation Penciplume]]" appear in this card's artwork.
  ** The artwork seems to show these four monsters Ritual Summoning "[[Impcantation Chalislime]]".
  ** The room in the artwork actually forms part of the body of "[[Crealtar, the Impcantation Originator]]" when it becomes active.
