  * This is the [[cover card]] of ''[[Duelist Pack: Legend Duelist 6]]''/''[[Legendary Duelists: Magical Hero]]'', ''[[Classic Pack 01]]'', and ''[[Legendary Duelists: Season 3]]''.
  * "[[Dark Magician]]" and "[[Dark Magician Girl]]" (wearing slightly different robes) appear in this card's artwork.
  * "[[Celeb Rose Luxury Magicians]]" is based on this monster.
