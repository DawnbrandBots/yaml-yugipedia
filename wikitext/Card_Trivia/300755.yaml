title: Card Trivia:Forbidden Scripture
wikitext: |-
  {{Navigation}}

  * The woman in the artworks of the other "Forbidden" series of cards appears in this card's artwork.
  ** The man in the artworks of "[[Solemn Scolding]]", "[[Solemn Authority]]" and "[[Solemn Judgment]]" can also be seen, at the lower left.
  ** The artwork of "Solemn Scolding" depicts the aftermath of the events in this card's artwork.
  **Interestingly, this card's artwork depicts the room's interior in a modern style with an [[wikipedia:Electric light|electric lamp]] on the table, which contrasts with the [[wikipedia:Ancient Greece|Ancient Greek]] theme of the "[[Forbidden (archetype)|Forbidden]]" [[archetype]].
  * This card has an [[anime-only|anime-exclusive]] [[counterpart]]: "[[Clean Barrier - Clear Force]]."
  * Interestingly, this is the only member of the "Forbidden" archetype that does not change the [[ATK]] of the [[target]]ed monster; instead, it prevents it from being changed.
