title: Card Trivia:Crying Moon Rabbit
wikitext: |-
  {{Navigation}}

  * "[[Ancient Turtle Protector]]" appears in this card's artwork (hidden behind the [[Level]] star in this [https://yugipedia.com/wiki/File:CryingMoonRabbit-DBR-JP-VG-artwork.png physical card's artwork]).
  * This monster is based on the [[wikipedia:Moon rabbit|Moon rabbit]], a mythical figure in Japanese folklore based on the interpretations of the dark markings on the Moon resembling two rabbits pounding mochi. 
  ** This monster's Japanese name ({{Ruby|月|つき}}{{Ruby|涙|なみ}}の{{Ruby|兎|うさぎ}}, ''Tsukinami no Usagi'') features multiple puns:
  *** The first portion of this monster's Japanese name ({{Ruby|月|つき}}{{Ruby|涙|なみ}}, ''Tsukinami'') contains a minor pun on the words 「月次」 (''tsukinami'', lit. "monthly," also "tritely mundane") and 「涙」 (''namida'', "tear").
  **** According to this card's [[flavor text]], this monster is reminiscing about its good old mundane daily routine pounding mochi, which is likely why it is depicted shedding its tears.
  *** The second portion of this monster's Japanese name (の{{Ruby|兎|うさぎ}}, ''no Usagi'') is a pun on the Japanese name of the [[Wikipedia:Japanese hare|Japanese hare]] (野兎, ''Nousagi''), which translates to "field rabbit".
