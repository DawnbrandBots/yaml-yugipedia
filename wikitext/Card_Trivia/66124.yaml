title: Card Trivia:Gallis the Star Beast
wikitext: |-
  {{Navigation}}

  * This monster has a [[counterpart]]: "[[Rallis the Star Bird]]".
  ** Both cards feature similar names, similar ''[[OCG]]''/''[[TCG]]'' artwork, and feature an effect that involves a monster's [[Level]] being multiplied by 200.
  ** Both of these cards were owned and used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This card could be related to "[[Grizzly, the Red Star Beast]]".
