title: Card Trivia:Gem-Knight Seraphinite
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the artworks of "[[Gem-Knight Master Diamond]]" and "[[Scatter Fusion]]".
  * This monster is named after [[wikipedia:Seraphinite|seraphinite]], a trade name for a particular form of clinochlore, a member of the [[wikipedia:Chlorite group|Chlorite group]], whose name is based on the [[wikipedia:Seraph|Seraphim]], the angels of [[wikipedia:Heaven|Heaven]].
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gem-Knight Lazuli]]" and "[[Constellar Virgo]]".
  * This monster and "Gem-Knight Lazuli" are the first [[female]] "Gem-Knight" monsters, and by extension the first female "Gem-Knight" [[Effect Monsters]] to be released in the "[[OCG]]"/"[[TCG]]".
  ** This monster is also the first female "Gem-Knight" Fusion Monster, and by extension the first [[Extra Deck]] monster to be released in the "OCG"/"TCG".
