title: Card Trivia:Silent Swordsman Zero
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ties That Bind]]".
  ** The older version of this monster appears in the artwork of "[[Turn Silence]]".
  ** This monster's pose is based on the pose assumed by "[[Silent Swordsman]]" in the artwork of "[[Silent Sword Slash]]".
  * This monster is a [[Shining Sarcophagus (series)|Shining Sarcophagus]] [[counterpart]] of "[[Silent Swordsman LV0]]".
