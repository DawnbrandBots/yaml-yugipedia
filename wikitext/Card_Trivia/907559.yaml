title: Card Trivia:Despian Proskenion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Branded in Central Dogmatika]]".
  * This monster is named after the ''[[wikipedia:Skene (theatre)|proskenion]]'', the space in front of the backdrop in ancient Greek theatre, which would later become the main stage for actors to perform.
  * This monster is the corrupted version of "[[Dogmatika Nexus]]".
  * This monster has a "[[Bystial]]" [[counterpart]]: "[[The Bystial Alba Los]]".
