title: Card Trivia:Myutant Beast
wikitext: |-
  {{Navigation}}

  * This monster is a mutated form of "[[Myutant M-05]]".
  ** "Myutant M-05" appears in this monster's chest.
  *** Fittingly, the "M" in "Myutant M-05's" name refers to its effect to [[search]] the "[[Myutant]]" monsters.
  ** This card being [[Beast]]-[[Type]] and [[EARTH]]-[[Attribute]] reflects its connection to its associated [[card type]], the brown-orange-framed [[Monster Card]].
