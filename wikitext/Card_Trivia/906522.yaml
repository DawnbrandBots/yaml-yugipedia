  [[File:The_White Dragon_stone_slab.png|thumb|right|250px|[[The White Dragon (manga)|The White Dragon]] is shown to have been sealed inside of a stone slab.]]

  * An engraving of "[[Blue-Eyes White Dragon]]" appears in this card's artwork.
  ** The ruins of the [[Pharaoh's palace]] also appear in the background of this card's artwork.
  ** This card's artwork is based on a panel from {{chapter|Yu-Gi-Oh!|334|ref}}, where [[The White Dragon (manga)|The White Dragon]] ''[[ka]]'' was shown to have been sealed into a stone slab.
  * This card is a "[[Blue-Eyes]]"-related [[counterpart]] of "[[Eternal Soul]]".

