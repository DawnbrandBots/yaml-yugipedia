title: Card Trivia:Puppet Rook
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Rook (chess)|rook]], a [[wikipedia:Chess piece|chess piece]] resembling a tower castle.
  ** This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] a [[Level 6]] or higher [[EARTH]] [[Warrior]] monster from the [[Graveyard]] by sending itself there references the [[wikipedia:Castling|castling]] move in the game of [[wikipedia:Chess|chess]] where both a rook and the king are moved simultaneously. Fittingly, "[[Puppet King]]" is a valid target for this monster's effect.
  * This monster's ''OCG''/''TCG'' effect to change itself to [[Defense Position]] when [[Normal Summon]]ed is based on its appearance in {{chapter|R|019|ref}}, where [[Reiko Kitamori]] Normal Summoned [[Puppet Rook (manga)|this monster]] in Defense Position.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! R]]'' manga, specifically from the panel showing this monster being Summoned.
