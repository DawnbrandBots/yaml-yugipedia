title: Card Trivia:Fruits of Kozaky's Studies
wikitext: |-
  {{Navigation}}

  * "[[Fatal Abacus]]", "[[Kozaky]]", and the book from the artwork of "[[Spell Economics]]" appear in this card's artwork.
  ** The international artwork version of "[[Spellbinding Circle]]" also appears as a background image on the computer monitor in this card's artwork (in the upper-right corner).
  ** According to the [[Master Guide 2 card storylines]], both the abacus and the book are used by "Kozaky" as tools for his research.
