title: Card Trivia:Creator of Miracles
wikitext: |-
  {{Navigation}}

  * This monster is based on [[ZEXAL III]], the strongest form of [[ZEXAL (power)|ZEXAL]] used by [[Yuma Tsukumo]] and [[Astral]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's pose and effect requiring the player to [[declare]] "[[ZEXAL III#ZEXAL Field|ZEXAL Field]]!" is based on the similarly-named ability of ZEXAL III, which was used to counter the effects of the [[Barian]] Field in {{episode|ZEXAL|123|ref}}.
  ** This monster's effect mentioning "[[Creator of Hope]]" and "[[Winning Formula]]" references how both aforementioned monsters are based on ZEXAL and [[ZEXAL II]], the two previous forms of ZEXAL III, in that particular order.
  * This is the only released [[Duel winner]] that is [[illegal]].
  ** This card's Korean version includes a standard [[password]] ([[60087721]]) in the lower-left corner and lacks [[limitation text]], implying that it is [[legal]] there; however, this card is listed as illegal in the official Korean database.
  *** Nevertheless, the Korean version of this card's [[victory condition]] still requires the Korean versions of "[[Creator of Hope]]" and "[[Winning Formula]]", both of which feature the correct limitation text.
