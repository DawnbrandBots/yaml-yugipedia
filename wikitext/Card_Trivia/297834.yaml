title: Card Trivia:Silent Wobby
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Wobbegong|wobbegong]], a species of [[wikipedia:carpet shark|carpet shark]] known for being bottom-dwelling sharks.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect is somewhat based on that of "[[Cross Draw of Destiny]]", which [[Nash]] used to Summon this card the only time it appeared in the [[Yu-Gi-Oh! ZEXAL|anime]].
