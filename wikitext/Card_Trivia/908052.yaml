title: Card Trivia:Cyber-Stein Frankenshrine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Zombie Carnival]]" and "[[Zombie Fireworks]]".
  * This monster is a ''[[Rush Duel]]'' [[counterpart]] of "[[Cyber-Stein]]".
  ** The second portion of this monster's name is a pun on "Frankenstein".
  ** This monster is themed after the Ondo folk music, which is often associated with Japanese festivals.
