title: Card Trivia:Green Gadget
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[All-Out Attacks]]", "[[Boot-Up Order - Gear Charge]]", "[[Boot-Up Order - Gear Force]]", "[[Boot-Up Pulverize - Gear Crusher]]", "[[Drastic Drop Off]]", "[[Magnetic Storm]]", "[[Maximum Gadget the Moving Fortress]]", "[[Mobile Deployment Gear Start]]", and "[[Stronghold the Moving Fortress]]".
  * This monster has a combined [[retrain]]ed counterpart with "[[Red Gadget]]" and "[[Yellow Gadget]]": "[[Gadget Trio]]".
  * The yellow "mist" surrounding this monster references how it can be [[add]]ed from the player's [[Deck]] to the [[hand]] by the effect of "[[Yellow Gadget]]", while the red gears in the background of this card's artwork, as well as the red coloration of this monster's irises is a reference to how it can add "[[Red Gadget]]" from the player's Deck to the hand.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|339|ref}}, specifically from the panel showing [[Green Gadget (manga)|this monster]] being [[Summon]]ed.
