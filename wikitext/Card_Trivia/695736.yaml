title: Card Trivia:Tindangle Dholes
wikitext: |-
  {{Navigation}}

  * In the [[wikipedia:Cthulhu Mythos|Cthulhu Mythos]], the [https://lovecraft.fandom.com/wiki/Dhole Dhole] is a huge, slimy worm-like creatures, at least several hundred feet long, that burrows underground.
  * This monster's body shape is somewhat similar to a lesser-known toy from the creator of the Rubik's cube: the [[wikipedia:Rubik's Snake|Rubik's Snake]]. They both consist of a long chain of rotatable triangular prisms.
