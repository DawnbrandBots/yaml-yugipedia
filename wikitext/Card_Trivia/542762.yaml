title: Card Trivia:Shaddoll Core
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]''.
  * "[[El Shaddoll Winda]]" appears in this card's artwork.
  * The object "Shaddoll Core" is emerging from appears to be the head of "[[Cairngorgon, Antiluminescent Knight]]". The [[ATK]] and [[DEF]] of both "Cairngorgon" and this card end in "50", which is a common trait of the "[[lswarm]]" monsters. It also has the same DEF as "Cairngorgon", and exactly 1000 less ATK. This card's art also resembles that of "[[Infestation Infection]]", implying a connection between the "[[Shaddoll]]" [[archetype]] and the "lswarm" virus.
