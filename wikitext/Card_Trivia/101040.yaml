title: Card Trivia:Divine Serpent Geh
wikitext: |-
  {{Navigation}}

  * This monster's name is drived from ''Gē̃'' (Γῆ), another spelling of ''[[wikipedia:Gaia|Gaia]]'', the personification of the [[Earth (planet)|Earth]].
  ** This monster's Japanese title, "Snake God" (蛇神, ''jashin'') is homophonic with the Japanese name for the [[Wicked God]] [[series]] (邪神, ''jashin'').
  * This monster has the highest [[Level]] (12) of all [[Reptile]] monsters.
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster has the highest [[original ATK and DEF]] (∞/∞) of all monsters.
  ** In the ''[[OCG]]''/''[[TCG]]'', this monster's original [[ATK]] is undefined (?) in reference to the concept of this monster having infinite ATK, as it can become equal to the monster with the highest ATK on the [[field]]. In {{episode|Yu-Gi-Oh!|182|ref}}, this monster's ATK was matched only by "[[Timaeus the Knight of Destiny (anime)|Timaeus the Knight of Destiny]]", whose ATK became the combined total ATK of the three "[[Legendary Knight]]s" used to [[Fusion Summon]] it, with "[[Legendary Knight Hermos (anime)|Legendary Knight Hermos]]" having infinite ATK via a combination of its effect and the effect of "[[Legendary Knight Critias (anime)|Legendary Knight Critias]]".
  * In the ''Yu-Gi-Oh!'' anime, while the [[The Great Leviathan|Great Leviathan]] is not a [[Duel Monster Spirit]], this monster appears to either represent it or be connected to it. This monster appears inside a vortex that serves as a gateway to the realm where the souls of the victims of "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]" are stored. When "Knight of Destiny" attacks and destroys this monster, it creates a gap to the Earth, which allows the souls of [[Yugi Muto]], [[Joey Wheeler]], and [[Seto Kaiba]] to be released by the [[Legendary Knight]]s.
