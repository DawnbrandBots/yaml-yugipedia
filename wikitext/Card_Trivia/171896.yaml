title: Card Trivia:Bunilla
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Big Cattle Drive]]" and "[[Wrecker Panda]]".
  * This monster's name is a portmanteau of "bunny" and "vanilla".
  ** "Vanilla" is a term used to describe [[Non-Effect Monster]]s based on their vanilla-colored card border, which reflects this monster's [[Normal Monster]] type.
  * This is the first monster in the ''[[OCG]]''/''[[TCG]]'' to feature an [[ATK]] of 150, as well as a [[DEF]] of 2050.
