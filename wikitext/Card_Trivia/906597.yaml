title: Card Trivia:Gluttonous Reptolphin Greethys
wikitext: |-
  {{Navigation}}

  * This card's name is possibly a portmanteau of the words "greedy" and "ikhthys", the Greek word for "fish".
  * This card is a counterpart to "[[Ravenous Crocodragon Archethys]]": they have the same [[Attribute]], [[Type]], [[ATK]] and [[DEF]], and an effect based on the number of cards in a player's [[hand]].
