title: Card Trivia:Black Ray Lancer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Xyz Entrust]]".
  * This monster has the following forms:
  ** An [[Card evolutions|upgraded]] form: "[[Valiant Shark Lancer]]".
  ** 2 "[[Full Armored]]" combinations [[equipped]] with another monster: "[[Full Armored Black Ray Lancer]]" (with "[[Submersible Carrier Aero Shark]]") and "[[Full Armored Utopic Ray Lancer]]" (with "[[Number 39: Utopia]]").
  * This is the first [[Beast-Warrior]] [[Xyz Monster]].
  * This is one of the [[signature card]]s of [[Reginald Kastle|Reginald "Shark" Kastle]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This is one of the few monsters owned by the latter that is not WATER, [[Fish]], or [[Aqua]], (but it does list WATER monsters as [[Xyz Material]]).
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[detach]]es its materials, it absorbs them through its spear or chest. When this monster negates an [[Effect Monster]]'s effect(s), it blasts their effects away using winds from its wings.
  * In {{episode|ZEXAL|084|ref}}, when this monster is equipped with "[[Sharkify]]", Sharks starts calling it "Black Shark Lancer", implying that its name refers to [[wikipedia:Batomorphi|ray fishes]], the closet relatives of sharks.
