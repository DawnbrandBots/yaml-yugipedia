title: Card Trivia:Dodger Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Battle Pack 3: Monster League]]''.
  * This card is based on the '[[wikipedia:Chinese dragon|Chinese Dragon]]'.
  * The crescent shaped tail of this monster looks similar to the symbol of Counter Trap Cards.
  * The "Dodger" part of this card's name could be related to the fact that it "dodges" around Counter Traps, preventing them from being activated.
