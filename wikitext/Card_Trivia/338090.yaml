title: Card Trivia:Odd-Eyes Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Super Starter: Space-Time Showdown]]''.
  * This monster appears in the artwork of "[[Sky Iris]]".
  * This monster has multiple forms:
  ** An [[Card evolutions|upgraded]] form: "[[Odd-Eyes Advance Dragon]]"
  ** Six [[Four Dimensional Dragons#"Odd-Eyes Dragon's" elemental evolutions|elemental]] upgraded forms
  *** [[DARK]] [[Effect Monster|Effect]]: "[[Odd-Eyes Wizard Dragon]]"
  *** [[LIGHT]] Effect: "[[Odd-Eyes Saber Dragon]]"
  *** [[EARTH]] [[Ritual Monster|Ritual]]: "[[Odd-Eyes Gravity Dragon]]"
  *** [[WIND]] [[Fusion Monster|Fusion]]: "[[Odd-Eyes Vortex Dragon]]"
  *** [[FIRE]] [[Synchro Monster|Synchro]]: "[[Odd-Eyes Meteorburst Dragon]]"
  *** [[WATER]] [[Xyz Monster|Xyz]]: "[[Odd-Eyes Absolute Dragon]]"
  ** Two [[Pendulum Monster|Pendulum]] upgraded forms: "Odd-Eyes Pendulum Dragon" and "[[Odd-Eyes Phantom Dragon]]"
  * This was the original [[signature card]] of [[Yuya Sakaki]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** In {{episode|ARC-V|001|ref}}, this card was transformed into "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]", after it reacted with [[Yuya's pendant]].
  ** This card represents [[Z-ARC]]'s entertaining spirit, which is reflected by Yuya's ideals.
  ** This card has the same [[ATK]] (2500) as the signature cards of the other anime main protagonists (with the exception of [[Yuga Ohdo]]'s "[[Sevens Road Magician (anime)|Sevens Road Magician]]"): [[Yugi Muto]]'s "[[Dark Magician (anime)|Dark Magician]]", [[Jaden Yuki]]'s "[[Elemental Hero Neos (anime)|Elemental HERO Neos]]", [[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]", [[Yuma Tsukumo]]'s "[[Number 39: Utopia (anime)|Number 39: Utopia]]", [[Yusaku Fujiki]]'s "[[Firewall Dragon (anime)|Firewall Dragon]]" and [[Yudias Velgear]]'s "[[Galactica Oblivion (anime)|Galactica Oblivion]]".
  ** This card's effect to inflict damage to the opponent equal to half the [[original ATK]] of a monster that it [[destroy]]ed by battle and [[sent]] to the [[Graveyard]] is similar to the effect of "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]", which was also Jaden Yuki's first signature card in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * In the ''Yu-Gi-Oh! ARC-V'' anime, this monster's roar was similar to that of "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]" and the [[Crimson Dragon]].
