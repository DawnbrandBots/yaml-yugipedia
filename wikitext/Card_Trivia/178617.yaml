title: Card Trivia:Constellar Kaus
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Epsilon Sagittarii|Kaus Australis]], the brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Saggitarius (constellation)|Saggitarius]].
  ** The constellation and the astrological symbol for [[wikipedia:Sagittarius (astrology)|Sagittarius]] (♐︎︎) appears in the background of this card's artwork, with the location of Kaus Australis denoted by the encircled star in the constellation.
  ** This monster's bow and arrow references how Sagittarius is also known as the "archer" constellation.
  *** Also, this monster's appearance references how Sagittarius is often depicted with the upper body of a human and the lower body of a horse.
