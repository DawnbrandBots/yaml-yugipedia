title: Card Trivia:Lo, the Prayers of the Voiceless Voice
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Barrier of the Voiceless Voice]]", "[[Prayers of the Voiceless Voice]]", and "[[Saffira, Divine Dragon of the Voiceless Voice]]".
  * This monster is based on the hooded woman that appears in the artworks of "[[Novox's Prayer]]" and "[[Sprite's Blessing]]".
  ** This monster was released over 22 years and 7 months after the release of "Novox's Prayer" in the Japanese ''[[OCG]]''.
  * This monster's ''[[TCG]]'' name is based on the Japanese pronunciation of "Law" (ロー, ''Rō''), which is featured in the Japanese names of "[[Skull Guardian]]" ("Law Guardian") and its associated [[Ritual Spell]], "Novox's Prayer" ("Law's Prayer").
  ** It is also a reference to the "[[Voiceless Voice]]" archetype, as "vox" is the Latin word for "voice".
  ** This monster's effect supporting [[LIGHT]] [[Warrior]] or [[Dragon]] [[Ritual Monster]]s references "Novox's Prayer" and "Sprite's Blessing", [[Ritual Spell]]s used to [[Ritual Summon]] "[[Skull Guardian]]" (a Warrior monster) and "[[Sauravis, the Ancient and Ascended]]" (a Dragon monster) respectively.
  *** Furthermore, the artwork of "Sprite's Blessing" also features the same room as depicted in "[[Hymn of Light]]", the Ritual Spell used to Summon "[[Saffira, Queen of Dragons]]", which is eventually connected to this card through its "[[Voiceless Voice]]" [[counterpart]]: "Saffira, Dragon Queen of the Voiceless Voice".
  * This monster has the same [[original DEF]] as the [[ATK]] of "Skull Guardian" (2050).
