title: Card Trivia:Neo Space
wikitext: |-
  {{Navigation}}

  * This dimension appears in the artworks of "[[Elemental HERO Cosmo Neos]]", "[[Instant Neo Space]]", "[[Neo Space Connector]]", "[[Neo Space Pathfinder]]", "[[Neos Fusion]]", and "[[Space Gift]]".
  * This card appears in the artwork of "[[Convert Contact]]".
  * In some card texts, this card's name is written as "Neo-Space" instead of "Neo Space".
