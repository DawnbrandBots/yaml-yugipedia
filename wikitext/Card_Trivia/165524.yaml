title: Card Trivia:Tyrant's Tummyache
wikitext: |-
  {{Navigation}}

  * This card's artwork is part of a card series that shows the emperor story, based on the fairytale [[wikipedia:The Emperor’s New Clothes|The Emperor’s New Clothes]].
  * Possibly, the emperor is using food to try to forget his troubles after the fit he threw in "[[Tyrant's Temper]]", "[[Tyrant's Tirade]]" and "[[Tyrant's Tantrum]]".
  * The emperor from this card appears in the artwork of "[[The Emperor's Holiday]]", "Tyrant's Temper", "Tyrant's Tirade", "Tyrant's Tantrum", "[[Tyrant's Throes]]", "[[Double Payback]]", "[[The Huge Revolution is Over]]", "[[Asleep at the Switch]]", "[[Turnabout]]", "[[Retort]]" and "[[Clear Robe]]".
