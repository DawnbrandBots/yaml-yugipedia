title: Card Trivia:Bujin Hirume
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * This monster appears in the artwork of "[[Bujincident]]".
  * This monster is named after "Ōhirume-no-muchi-no-kami", one of the many names of [[wikipedia:Amaterasu|Amaterasu]], the [[wikipedia:Shinto|Shinto]] deity of the sun. Fittingly, rays of sunlight appear in the background of this card's artwork.
  * The [[Main Deck]] "[[Bujin]]" [[Beast-Warrior]] monsters resemble characters appearing in the ''[[Yu-Gi-Oh! GX]]'' anime through their head shapes and color schemes. In this case, this monster resembles [[Alexis Rhodes]], while its white color scheme is a reference to how Alexis wears a white uniform belonging to the [[Society of Light]].
  ** This monster is depicted in the artwork of "Bujincident" being transformed into its corrupted form, "[[Bujinki Amaterasu]]" by "[[Bujin Hiruko]]". Since "Hiruko" resembles [[Sartorius]], this references how Sartorius brainwashes Alexis into turning against her friends and joining the Society of Light.
  *** The aforementioned facts further reference the myth of Amaterasu, who was the Shinto deity of the sun, while Alexis is represented by the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[Arcana Force Tarot readings#The Sun|The Sun]] in {{episode|GX|093|ref}}.
