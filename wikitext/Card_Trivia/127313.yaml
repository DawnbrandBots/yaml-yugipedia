title: Card Trivia:Reptilianne Rage
wikitext: |-
  {{Navigation}}

  * The markings in this card's artwork resembles the face of a chameleon, reflecting this card's effect of changing the equipped monster's [[Type]] to [[Reptile]].
  * This card is somewhat reminiscent of the "[[Mask]]" series, as it not only does it take the form of a tribal mask, but its [[Equip Spell Card]] type and effects also resemble those of "[[Mask of Weakness]]" and "[[Mask of Brutality]]".
