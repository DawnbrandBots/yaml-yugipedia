title: Card Trivia:Backup @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located on this monster's hair bun.
  * This monster is an "@Ignister" [[counterpart]] of "[[Backup Secretary]]".
  ** Both monsters feature an effect that allows them to [[Special Summon]] themselves from the [[hand]] if the player [[control]]s a [[Cyberse]] monster.
  ** Both monsters have a [[Set Number]] ending in "002" in the [[Core Booster]] packs they were introduced in.
  ** This monster's design features elements of "[[The Arrival Cyberse @Ignister]]", referencing how in {{episode|VRAINS|120|ref}}, "[[Backup Secretary (anime)|Backup Secretary]]" was one of the [[Link Material]]s for "[[Accesscode Talker]]," which defeated "The Arrival Cyberse" in a mutual clash.
