title: Card Trivia:Awakening of the Possessed
wikitext: |-
  {{Navigation}}

  * "[[Familiar-Possessed - Aussa]]", "[[Familiar-Possessed - Hiita]]", "[[Familiar-Possessed - Wynn]]", and "[[Familiar-Possessed - Eria]]" appear in this card's artwork.
  ** The poses of the aforementioned monsters in this card's artwork serve as the basis for the poses of the "[[Charmer]]" figures in the [[Yu-Gi-Oh! Card Game Monster Figure Collection]].
