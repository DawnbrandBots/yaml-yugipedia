title: Card Trivia:Orichalcos Shunoros
wikitext: |-
  {{Navigation}}

  * "[[Orichalcos Aristeros]]", "[[Orichalcos Deuteros]]", "[[Orichalcos Dexia]]", "[[Orichalcos Tritos]]", and "[[The Seal of Orichalcos]]" appear in this card's artwork.
  ** This card's artwork is based on a scene during {{episode|Yu-Gi-Oh!|180|ref}} where this monster (bearing "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]") is preparing to attack while "Orichalcos Tritos" is on the [[field]].
  * This monster's name is likely a misromanization of "''synoros''" (συνορος), the Greek word for "border".
  * This monster is based on the ''[[wikipedia:Dogū|dogū]]'', a small humanoid figurine made during the later part of the [[wikipedia:Jōmon period|Jōmon period]] of prehistoric Japan.
