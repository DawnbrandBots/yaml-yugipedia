title: Card Trivia:Nanobreaker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Forced Back]]".
  * This monster is based on Jake, the cyborg protagonist of the [[Konami]] game, ''[[wikipedia:Nano Breaker|Nano Breaker]]''.
  ** Ironically, Jake is a male character, while this monster's design is female.
  * This monster's prefix, "Nano-", is based on the term meaning "very small", which reflects its effect to [[destroy]] [[Level 3]] or lower monsters without destroying them by battle.
