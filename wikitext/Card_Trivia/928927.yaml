title: Card Trivia:Kanan the Sword Diva
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bubbleburst Shock!]]" and "[[Party Party Party]]".
  * This monster is the ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] of "[[Kanan the Swordmistress]]".
  ** This monster's Japanese name, "Kanan the Ganguro Swordsman" and appearance are based on ''[[wikipedia:Ganguro|ganguro]]'', a fashion trend used by young Japanese women in the mid-1990's which is distinguished by hair dye and a dark tan skin coloration to contrast their bright make-up.
  * This monster has a [[DARK]] Bubble Era counterpart: "[[Kanan the Security Guard]]".
