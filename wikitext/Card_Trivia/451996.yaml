title: Card Trivia:Revendread Slayer
wikitext: |-
  {{Navigation}}

  * The origin of "[[Revendread Slayer]]" can be found in the artwork of "[[Revendread Origin]]", in which he obtained the power of the "[[Vendread]]" to save (or avenge) his wife.
  ** This monster also appears in the artworks of "[[Revendread Evolution]]", "[[Vendread Nights]]", "[[Vendread Reunion]]", "[[Vendread Revolution]]", and "[[Vendread Daybreak]]".
  ** This monster's appearance, along with backstory, could be a possible reference to [[wikipedia:Spawn (comics)|Spawn]], the ''Image Comics'' anti-hero.
  * This monster also resembles the Parasite Super Tyrant from ''Resident Evil: Operation Raccoon City''. Both have discolored skin and large spider legs attached to their backs.
