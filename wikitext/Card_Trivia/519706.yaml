title: Card Trivia:World Legacy Clash
wikitext: |-
  {{Navigation}}

  * "[[Auram the World Chalice Blademaster]]", "[[Imduk the World Chalice Dragon]]", "[[Lee the World Chalice Fairy]]", "[[X-Krawler Synaphysis]]", "[[Krawler Glial]]", "[[Krawler Axon]]", "[[Krawler Dendrite]]", and several "[[Krawler Spine]]s" can be seen in this card's artwork.
  * This card is the first card in a sequence of "[[World Legacy]]" [[Spell]]/[[Trap]] cards that depict "[[Lee the World Chalice Fairy]]" becoming corrupted. Visible in the top left corner of the artwork, the light from one of the four devices normally that surrounds "Lee" appears dark red. The scene depicted here takes place before "[[World Legacy Trap Globe]]", where the light from two of the devices have turned red. Her transformation continues in the artwork of "[[Mekk-Knight]]" support cards. In "[[World Legacy Whispers]]", three lights have turned red, and in "[[World Legacy's Secret]]", all four devices have been corrupted and "Lee" is depicted in shadow with sinister red facial features.
