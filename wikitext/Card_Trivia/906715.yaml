title: Card Trivia:Crawling Torso
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Teke Teke|Teke Teke]]'', the vengeful ghost of a schoolgirl who fell on a railway line and was sliced in half by a train. According to Japanese urban legend, Teke Teke lurks around urban areas and train stations, and moves by dragging her upper torso with her hands or elbows, which makes a scratching or ''teke teke''-like sound, which she is named after.
