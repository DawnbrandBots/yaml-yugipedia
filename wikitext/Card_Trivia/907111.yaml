title: Card Trivia:Myutant Synthesis
wikitext: |-
  {{Navigation}}

  * Visually, this monster is the [[Fusion Monster|Fusion]] of "[[Myutant GB-88]]", "[[Myutant Beast]]", "[[Myutant Mist]]", and "[[Myutant Arsenal]]".
  ** The left neck bears the same blue eye as "[[Myutant M-05]]". The head of the neck is shaped like a bestial maw, and the neck is covered with the same fin-like appendages as "Beast".
  ** The center neck bears the same red eye as "[[Myutant ST-46]]". The head is adorned with a crystal, and the rest of the neck is decorated with crystalline patches similar to the crystals of "Mist".
  ** The right neck bears a distinct purple eye, but the shape of the eye is very similar to "ST-46". The neck is accentuated with metal cables and small components, reminiscent of "Arsenal".
  ** The body bears the same green eye as "GB-88". The body itself is composed of parts from the other "Myutants". The arms and fins are from "Beast", the tail is from "Arsenal", and the flower-like tentacles are from "Mist".
  ** "[[Myutant Fusion]]" depicts "GB-88" in the process of transforming into "Synthesis", by devouring the other escapees of "Beast", "Mist", and "Arsenal".
  * This monster has an [[Card evolutions|evolved]] form, after having completely assimilated the other "[[Myutant]]" monsters: "[[Myutant Ultimus]]".
