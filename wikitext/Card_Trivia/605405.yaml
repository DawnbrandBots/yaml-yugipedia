title: Card Trivia:Megistric Maginician
wikitext: |-
  {{Navigation}}

  * "Megistric" is a reference to the Greek word, ''Megisti'', which means "biggest" or "greatest", and to "Hermes Trismegistus" (meaning "thrice-great Hermes") who is said to be the author of the "[[wikipedia:Emerald Tablet|Emerald Tablet]]", an ancient alchemical text.
  ** "Maginician" is a portmanteau of the words "imagination" and "magician".
  * A [[Spell Counter]] appears in this card's artwork.
