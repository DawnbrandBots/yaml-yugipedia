title: Card Trivia:U.A. Penalty Box
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Penalty box|penalty box]], which is used in certain sports such as hockey or rugby. Players who have incurred penalties, but have not been expelled from the game, sit there for a given amount of time until they are allowed to come back in.
  ** This purpose is referenced in this card's effect: the opposing monster is "penalized" when it attacks, and is banished for two turns (or is sent to the penalty box for a two-turn time-out).
  * The blonde man from the artworks of "[[U.A. Signing Deal]]" and "[[U.A. Locker Room]]" appears in this card's artwork. This is supported by the fact that one of the men in this card's artwork is wearing a jersey with the number 9 on it, and also has blonde hair.
