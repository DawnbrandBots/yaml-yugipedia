title: Card Trivia:Graceful Skull Dice
wikitext: |-
  {{Navigation}}

  * The angel and the blue die from the artwork of "[[Graceful Dice]]" and the demon and the red die from the artwork of "[[Skull Dice]]" appear in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|197|ref}} showing the angel from "[[Graceful Dice (manga)|Graceful Dice]]" and the demon from "[[Skull Dice (manga)|Skull Dice]]" simultaneously rolling their die.
  * This card is a [[retrained]] [[Dark Time Wizard (series)|Dark Time Wizard]] combined [[counterpart]] of "Graceful Dice" and "Skull Dice".
