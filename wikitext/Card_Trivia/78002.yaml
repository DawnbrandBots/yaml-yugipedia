title: Card Trivia:Crystal Pair
wikitext: |-
  {{Navigation}}

  * "[[Crystal Beast Sapphire Pegasus]]" and "[[Crystal Beast Topaz Tiger]]" appear in this card's artwork.
  ** The design of "Crystal Beast Topaz Tiger" in this card's artwork is also one of the [[cover card]]s of ''[[Duelist Pack: Jesse Anderson]]''.
  * This card's effect is similar to its [[Anime-only|anime-exclusive]] [[Quick-Play Spell Card]] counterpart: "[[Crystal Flash]]".
