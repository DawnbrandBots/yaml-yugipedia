title: Card Trivia:Switcheroroo
wikitext: |-
  {{Navigation}}

  * This card is based on the fairy tale "[[wikipedia:Momotarō|Momotarō]]".
  ** Fitting the card's name, the art depicts Momotaro & co. along with the Oni switching roles as Protagonists & Antagonists respectively.
  * This card's English name is a portmanteau of "hero" and "switcheroo".
  * In this card's artwork, the letters on the flag are "大安売り" (Big Sale), this flag is commonly found in front of Japanese stores. The red Oni is trying to mimic the flag "日本一" (Japan's Number One) that is often depicted in Momotaro's artworks.
