title: Card Trivia:Tornado Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears to be the cause of "[[Heavy Storm Duster]]",  "[[Heavy Storm]]",  "[[Storm]]", "[[Localized Tornado]]", and "[[Double Dust Tornado Twins]]" (due to featuring the cow present in each of these artworks, as well as house wreckage) as well as "[[Tornado]]" (due to featuring the book and apple from its artwork).
  ** This monster's effect is also reminiscent of the effect of "[[Mystical Space Typhoon]]".
