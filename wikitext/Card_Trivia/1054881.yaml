title: Card Trivia:Rekindling the Ashened
wikitext: |-
  {{Navigation}}

  * "[[Embers of the Ashened]]" and the head of "[[Veidos the Dragon of Endless Darkness]]" appear in this card's artwork.
  ** "Embers of the Ashened" is portrayed lunging into battle against "Veidos the Dragon of Endless Darkness", with the [[Cannot be destroyed by card effects|presumed hope]] of destroying the latter with the former's effect.
