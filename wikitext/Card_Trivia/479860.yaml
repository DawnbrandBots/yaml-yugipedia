title: Card Trivia:Rank-Up-Magic Limit Over Force
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is the only "[[Rank-Up-Magic]]" card owned by [[Kite Tenjo (ARC-V)|Kite Tenjo]] to not specifically support the "[[Cipher]]" archetype.
  ** It is also the only "Rank-Up-Magic" card introduced in the ''[[Yu-Gi-Oh! ARC-V]]'' anime to be used by more than one Duelist, which includes [[Shay Obsidian]].
