title: Card Trivia:Mystic Roastman
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Yakiniku]]" [[counterpart]] of "[[Mystic Horseman]]".
  ** Its Japanese name is a pun with the Japanese name of "Mystic Horseman", "Kentauros" (ケンタウロス ''Kentaurosu''), and "pork loin" (ロース ''Rōsu'').
  ** Its [[flavor text]] parodies the original flavor text of "Mystic Horseman".
