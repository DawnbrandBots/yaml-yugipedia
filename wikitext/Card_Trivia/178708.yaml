title: Card Trivia:Evilswarm Obliviwisp
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ordeal of the Hero]]".
  * This monster is the "[[lswarm]]" counterpart of "[[Neo Flamvell Origin]]".
  * The [[ATK]] of this card is the 50 points lower than the ATK of "Origin", while its [[DEF]] is 50 points higher than 10 times the DEF of "Origin".
