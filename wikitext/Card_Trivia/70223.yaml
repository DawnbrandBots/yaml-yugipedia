title: Card Trivia:Rainbow Neos
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Rainbow Dragon]]".
  ** This monster represents [[Jaden Yuki]]'s friendship with [[Jesse Anderson]] in the ''[[Yu-Gi-Oh! GX]]'' anime, as it is a Fusion of their two [[ace monster]]s.
  *** Ironically, Jesse never saw this monster being used, as in all the times it was used, he was either absent or unconscious.
  ** In the anime, this monster was never [[Fusion Summon]]ed using "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" and "[[Rainbow Dragon (anime)|Rainbow Dragon]]" as [[Fusion Material]]s. Instead, "[[Rainbow Dark Dragon (anime)|Rainbow Dark Dragon]]" or a card with effects that treated its name as "Rainbow Dragon" were used as material.
  * This is the first [[Ghost Rare]]/[[Holographic Rare]] card to not be the [[cover card]] of a [[Core Booster]].
  * This monster has the highest [[original ATK]] (4500) of all "[[Neos]]" monsters.
  * This monster is similar to "[[Dragon Master Knight]]".
  ** Both are [[LIGHT]] Fusion Monsters that require the main protagonist's [[Non-Effect Monster|non-Effect]] [[Warrior]] monster with the highest original ATK (Jaden Yuki's "Elemental HERO Neos" for this card and [[Yami Yugi]]'s "[[Black Luster Soldier (anime)|Black Luster Soldier]]" for "[[Dragon Master Knight (anime)|Dragon Master Knight]]") and a a rival character's [[Special Summon-only monster|Special Summon-only]] [[Dragon]] monster (Jesse Anderson's "Rainbow Dragon" for this card and [[Seto Kaiba]]'s "[[Blue-Eyes Ultimate Dragon (anime)|Blue-Eyes Ultimate Dragon]]" for "Dragon Master Knight") as Fusion Materials.
  * This monster, "[[Armed Neos]]" and "[[Elemental HERO Divine Neos]]" are the only "Neos" Fusion Monsters that cannot be [[Special Summon]]ed with "[[Miracle Contact]]", as the former two are not "[[Elemental HERO]]" monsters, while "Divine Neos" does not list "Elemental HERO Neos" as a Fusion Material.
