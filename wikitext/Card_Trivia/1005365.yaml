title: Card Trivia:Voidalvelg Pandora
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Tractor Wave]]".
  * This monster is named after "[[wikipedia:Pandora|Pandora]]", the first human woman created by the gods whose curiosity led her to open "[[wikipedia:Pandora's box|Pandora's box]]", an artifact from [[wikipedia:Greek mythology|Greek mythology]] that contained plagues and curses, which were released on mankind upon its opening.
