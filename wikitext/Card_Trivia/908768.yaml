title: Card Trivia:Elemental HERO Spirit of Neos
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Duel-Ignition Deck: HERO]]'', and is also one of the cover cards of ''[[2025 Mega-Pack Tin]]''.
  * This monster is a [[retrained]] [[counterpart]] of "[[Elemental HERO Neos]]".
  ** This card's artwork is based on the [[Elemental HERO Neos (character)|the spirit]] of "[[Elemental HERO Neos (anime)|Elemental Hero Neos]]" in space above the Earth's atmosphere in an attempt to stop the satellite [[SORA (satellite)|SORA]] from destroying the Earth during [[Jaden Yuki]]'s [[Duel]] with [[Sartorius]].
  ** This monster's [[Special Summon]]ing effect triggered by an opponent's monster's attack references how Jaden Yuki gained the power to manifest the spirit of "Elemental Hero Neos" to protect himself from attacks, as seen in the ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' movie, and it has withstood attacks from monsters with higher [[ATK]] than it, thus the effect to prevent being [[destroy]]ed by battle.
  * This monster shares a similar naming scheme and strikes a pose similar to that of "[[Spirit of Yubel]]", the retrained counterpart of "[[Yubel]]", one of the [[signature card]]s of [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Incidentally, both this monster and "Spirit of Yubel" share a couple of similar monster [[effect]]s.
  *** Both monsters are able to Special Summon themselves from the [[hand]] when an opponent declares an [[attack]] and prevent themselves from being [[destroy]]ed by [[battle]].
  *** Upon being Special Summoned, both monsters can allow the player to [[add]] a [[Spell]]/[[Trap Card]] that [[mentions]] a card that is a member of their respective [[archetype]]s (an "[[Yubel (archetype)|Yubel]]" monster for "Yubel" and an "Elemental HERO" monster for this monster).
