title: Card Trivia:Karakuri Cash Cache
wikitext: |-
  {{Navigation}}

  * "[[Karakuri Merchant mdl 177 "Inashichi"]]" appears in this card's artwork. Also, the warehouse of this card's artwork also appears in the artwork of "[[Karakuri Cash Shed]]".
  * "''Cash''" and "''Cache''" are homophones and thus pronounced the same. This is likely meant to be a reference to this card's Japanese name, which is also a wordplay, although a different kind of wordplay.
