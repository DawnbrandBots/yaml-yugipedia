title: Card Trivia:Dances with Beasts
wikitext: |-
  {{Navigation}}

  * "[[Berserk Gorilla]]", "[[Scrap Kong]]", "[[Shien's Squire]]", and the silhouettes of "[[Diamond Dire Wolf]]", "[[Koalo-Koala]]", "[[Master of Oz]]", "[[Number 49: Fortune Tune]]", and "[[Skullbird]]" appear in this card's artwork.
  ** Appropriately, this card depicts three monsters with different original names against the silhouetted monsters, who have more than 8000 combined [[ATK]].
  ** The silhouettes imply this card may be a continuation to "[[Cattle Call]]", another card whose artwork depicts those five monsters.
  * This card's Japanese name, (зЌЈж№§гЃЌи‚‰иєЌг‚Љ, ''Shishiwaki Nikuodori'') translates to "beasts arise meat leaping". It is a play on гЂЊиЎЂж№§гЃЌи‚‰иєЌг‚‹гЂЌ (''chiwaki nikuodoru''), which means "to be blood tingled with excitement".
  ** This card's English name is likely a reference to the 1990 American Western film, ''[[wikipedia:Dances with Wolves|Dances with Wolves]]''.
