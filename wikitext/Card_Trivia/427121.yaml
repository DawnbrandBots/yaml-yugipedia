title: Card Trivia:Triamid Cruiser
wikitext: |-
  {{Navigation}}

  * Similar to "[[Triamid Fortress]]" and "[[Triamid Kingolem]]", this structure appears to be based on the [https://powerrangers.fandom.com/wiki/King_Pyramidder King Pyramidder] mecha from the ''[[Wikipedia:Chouriki Sentai Ohranger|Chouriki Sentai Ohranger]]'' TV show (alternatively [https://powerrangers.fandom.com/wiki/Pyramidus Pyramidus], from ''[[Wikipedia:Power Rangers Zeo|Power Rangers Zeo]]'').
  ** Specifically, this structure is based on its Carrier Formation.
