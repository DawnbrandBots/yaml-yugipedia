title: Card Trivia:Conduction Warrior Alchemicalizer Suirai
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[High-Grade Collection]]''.
  * "[[Alchemicalize Orb]]" appears in this card's artwork.
  * "Suirai" is a pun on "水" (''sui'', lit. "water") and "雷" (''rai'', lit. "thunder or lightning").
  * This is the first Fusion Monster original to ''[[Yu-Gi-Oh! Rush Duel]]'' that does not require any named Fusion Materials.
