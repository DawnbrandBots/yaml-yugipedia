title: Card Trivia:The Rock Spirit
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Titan the Rock Spirit", is based on the [[wikipedia:Titan (mythology)|Titans]], a race of giants from [[wikipedia:Greek mythology|Greek mythology]] that preceded the [[wikipedia:Twelve Olympians|Olympian Gods]].
  * This monster has five [[Attribute Spirit]] [[counterpart]]s:
  ** [[FIRE]]: "[[Spirit of Flames]]"
  ** [[WATER]]: "[[Aqua Spirit]]"
  ** [[WIND]]: "[[Garuda the Wind Spirit]]"
  ** [[DARK]]: "[[Luna the Dark Spirit]]"
  ** [[LIGHT]]: "[[Diana the Light Spirit]]"
