title: Card Trivia:Gem-Knight Phantom Quartz
wikitext: |-
  {{Navigation}}

  * This card is based on a type of quartz known as [[wikipedia:Phantom quartz|phantom quartz]].
  * This monster is wearing the same armor as "[[Gem-Knight Crystal]]".
  ** This monster also possesses three pairs of "[[Zefra]]" wings, despite not being a member of that [[archetype]].
  ** This card's Japanese name ("Gem-Knight Phantom Roots") is similar to the Japanese names of "[[Shaddoll Core]]" ("Shaddoll Roots") and "[[Shaddoll Zefracore]]" ("Ohr Shaddoll - Sephiraroots").
  * This card is the first [[Rock]] [[Link Monster]].
