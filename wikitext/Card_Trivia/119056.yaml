title: Card Trivia:Worm Call
wikitext: |-
  {{Navigation}}

  * The city in this card's artwork appears in the artworks of "[[Jurrac Impact]]" and "[[Worm Zero]]".
  ** This card's artwork depicts what appears to be "Worm Zero" in the center of the portal above the city, lowering a monster into the city, reflecting its effect to [[Special Summon]] a [[Reptile]] "[[Worm]]" monster from the player's [[hand]] in [[face-down]] [[Defense Position]].
