title: Card Trivia:Mythic Water Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragon Dance]]".
  * This card is the [[WATER]] counterpart of "[[Mythic Tree Dragon]]".
  * This card features similarities with with "[[Water Dragon]]":
  ** Both cards feature similar names and serpentine appearances.
  ** Both cards feature the same [[WATER]] [[Attribute]] and [[Level]].
  ** Both cards feature an effect that requires a monster with certain Attributes as a prerequisite for their effects, with this card requiring an [[EARTH]] Attribute monster to be on the player's field to be [[Special Summon]]ed, and "Water Dragon" reducing the ATK of FIRE Attribute monsters to 0.
  *** Furthermore, these said Attribute criteria are two things that water in real-life is "strong" against, with water weathering or eroding most earth-based materials, and extinguishing fires by cutting off their oxygen.
