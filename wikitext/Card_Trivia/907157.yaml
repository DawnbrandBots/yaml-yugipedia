title: Card Trivia:Dogmatikalamity
wikitext: |-
  {{Navigation}}

  * "[[Dogmatika Maximus]]" appears in this card's artwork, opening a portal to the "Hole".
  ** This may have resulted in the transformation of the "[[Dogmatika]]" monsters into the corrupted "[[Despia]]" monsters.
  * This card's Japanese name, "Dragmata" ({{Ruby|凶導の福音|ドラグマータ}} ''Doragumāta''), is a portmanteau of "Dogmata" (the plural of "[[wikipedia:Dogma|dogma]]") and "Dragma" (the Japanese name of the "Dogmatika" archetype).
  ** It could also be a portmanteu of "Dragma" and "stigmata", as this card depicts "Maximus" activating the stigmatas of all Dogmatika citizens.
  ** The kanji 「凶導の福音」 (''Kyōdō no Fukuin'') in this card's Japanese name can be translated as "Heretical Gospel".
  * This card is a [[counterpart]] of "[[Dogmatikamacabre]]".
  ** Both are [[Ritual Spell Card]]s whose name is listed on a "[[Dogmatika]]" [[Ritual Monster]]: "[[White Knight of Dogmatika]]" for this card and "[[White Relic of Dogmatika]]" for "Dogmatikamacabre".
  ** Along with their Ritual Monsters, they have the kanji 「{{Ruby|凶|きょう}}{{Ruby|導|どう}}」 (''Kyōdō'' "Heretical") in their Japanese names, unlike the rest of the "Dogmatika" monsters, which use 「{{Ruby|教|きょう}}{{Ruby|導|どう}}」 (''Kyōdō'' "Dogmatic") instead, in reference to the real [[Despia|wicked nature]] of the "Dogmatika" Church.
  ** Both depict the same monster in their card artworks: "Dogmatika Maximus" for this card and his corrupted form "[[Dramaturge of Despia]]" for "Dogmatikamacabre".
