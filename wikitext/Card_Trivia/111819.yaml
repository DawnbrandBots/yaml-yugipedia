title: Card Trivia:Symbol of Heritage
wikitext: |-
  {{Navigation}}

  * This card's effect is a watered down version of "[[Monster Reborn]]" as a monster can only be Special Summoned from your own Graveyard as long as there are 2 other cards with the same name as the target.
  * This symbol has a similar design to "[[Monster Reincarnation]]" and the ''[[TCG]]'' version of "Monster Reborn".
