title: Card Trivia:The Fabled Ganashia
wikitext: |-
  {{Navigation}}

  * This card's name is based off the Hindu elephant deity [[wikipedia:Ganesha|Ganesha]].
  * This card seems to be stepping on something similar to the creature appearing in the artworks of "[[The Fabled Kudabbi]]", "[[The Fabled Peggulsus]]", and "[[The Fabled Unicore]]".
  * This card resembles "[[Garnecia Elefantis]]" in both name and appearance, seeming to be a younger version that was recruited by the Fabled.
  * The imp-like creature in this card's artwork is also featured in that of "[[Fabled Leviathan]]'s".
  ** The purple colour of the creature seems to imply an [[Attribute]], in this case [[DARK]].
  ** This creature's name is Vio as pointed out in [[Duel Terminal Master Guide]]
  * This monster appears in the artwork of "[[Fiend Griefing]]".
