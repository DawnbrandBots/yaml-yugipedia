title: Card Trivia:Sky Striker Mecha - Shark Cannon
wikitext: |-
  {{Navigation}}

  * "[[Sky Striker Ace - Raye]]" appears in this card's artwork.
  ** This card's artwork was adapted into a panel in {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|3|ref}}, where [[Raye (manga)|Raye]] fires the "Shark Cannon" to destroy homing missiles fired by the [[Spectra Union]]'s missile launcher.
  * This card's name references the [[wikipedia:Northrop F-20 Tigershark|Northrop F-20 Tigershark]], an American fighter aircraft. Fittingly, the code "S-020" appears on this cannon's bottom portion.
