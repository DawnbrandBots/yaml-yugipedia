title: Card Trivia:Cyber End Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Cybernetic Revolution]]'' and ''[[Tactical-Try Deck: Decisive Strike Cyber Dragon]]'', as well as one of the cover cards for ''[[Expert Edition Volume 4]]''/''[[Dark Revelation Volume 4]]'', and ''[[Prismatic Art Collection]]''.
  * This monster appears in the artworks of "[[Cyber Network]]", "[[Cybernetic Revolution (card)|Cybernetic Revolution]]", "[[Cyber Eternal]]" "[[Fusion Buster]]", "[[Future Fusion Nova]]", "[[Super Strident Blaze]]", and the second artwork of "[[Limiter Removal]]".
  ** This monster appears in its second ''[[OCG]]''/''[[TCG]]'' artwork in the artwork of "[[Cybernetic Horizon (card)|Cybernetic Horizon]]".
  * This card is the [[signature card]] of [[Zane Truesdale]], which later came under the ownership of his brother, [[Syrus Truesdale]].
  * This monster is an [[Card evolutions|upgraded]] form of "[[Cyber Twin Dragon]]".
  * This card has a [[retrained]] counterpart: "[[Cyber End Dragon the Decisive Strike Dragon]]".
  * This card has a "[[Malefic]]" counterpart: "[[Malefic Cyber End Dragon]]".
  ** Since October 5, 2017, this card's Spanish text listed on the Yu-Gi-Oh! Trading Card Game - Card Database is the Spanish text of "Malefic Cyber End Dragon".
  * This card's [[DEF]] is equal to the [[ATK]] of "[[Cyber Twin Dragon]]" much like the DEF of "Cyber Twin Dragon" is equal to the ATK of "[[Cyber Dragon]]".
  * The three "Cyber Dragons" fused in this card have different head designs in this card's artworks.
  ** The head on the left bears resemblance to "[[Proto-Cyber Dragon]]", while the head on the right bears resemblance to "[[Cyber Dragon Zwei]]".
  * This monster's appearance may be based on [//wikizilla.org/wiki/Mecha-King_Ghidorah Mecha-King Ghidorah] or Mecha-Ghidorah.
  * This is the first Fusion Monster in ''[[Yu-Gi-Oh! Rush Duel]]'' to list more than 2 Fusion Materials.
