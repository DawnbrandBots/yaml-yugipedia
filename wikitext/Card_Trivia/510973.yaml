title: Card Trivia:Tsukuyomi
wikitext: |-
  {{Navigation}}

  * This monster is based on ''[[wikipedia:Tsukuyomi-no-Mikoto|Tsukuyomi-no-Mikoto]]'' (also known as ''Tsukuyomi-no-kami''), the [[wikipedia:Shinto|Shinto]] deity of the moon.
  ** Tsukuyomi's siblings are "[[Amaterasu]]" and "[[Susa Soldier|Susanoo]]" (named "Susa Soldier" in the ''[[TCG]]''). Their father is "[[Izanagi]]" and his wife is "[[Izanami]]".
  * This card was [[Forbidden]] for twelve formats before becoming [[Limited]] again, which was the most of any card at that time, with the previous benchmark holder being "[[Dark Hole]]" at nine; it shared this distinction with "[[Black Luster Soldier - Envoy of the Beginning]]". Both cards were later surpassed by "[[Magician of Faith]]" at thirteen in the [[TCG]], and "[[Cyber-Stein]]" at sixteen in the [[OCG]].
  * This card is one of 2 [[Spirit monster]]s to have been on the Forbidden list, with the other one being "[[Yata-Garasu]]".
