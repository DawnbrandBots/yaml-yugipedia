title: Card Trivia:Guard Go!
wikitext: |-
  {{Navigation}}

  * "[[Dododo Warrior]]", "[[Gagaga Child]]", and "[[Gogogo Ghost]]" appear in this card's artwork.
  * This card's Japanese name (ガードゴー, ''Gādogō'') is a pun on the first syllables of the names of the "[[Gagaga]]" ("Ga"), "[[Dododo]]" ("Do") and "[[Gogogo]]" ("Go") [[archetype]]s.
