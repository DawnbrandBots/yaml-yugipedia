title: Card Trivia:Blackwing - Zephyros the Elite
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Crow]]''.
  * This monster's name is based on [[wikipedia:Anemoi|Zephyrus]], a member of the [[wikipedia:Anemoi|Anemoi]], the Greek Gods of the wind who rule over the cardinal directions from where the winds come from.
  ** More specifically, Zephyrus is the god of the [[wikipedia:West wind|west wind]] and is described as the gentlest of the winds. This in turn serves as the basis for "[[wikipedia:zephyr|zephyr]]", the term for a gentle and moderate wind.
  * This monster's hairstyle and design resembles its owner, [[Crow Hogan]], in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This is the first "[[Blackwing]]" monster that can [[Special Summon]] itself from the [[Graveyard]] instead of its owner's [[hand]].
  * In the ''Yu-Gi-Oh! 5D's'' anime, this monster could be Special Summoned repeatedly at the cost of taking 400 damage. In the ''[[OCG]]''/''[[TCG]]'', however, this monster was given a '''summon restriction''' [[condition]] to prevent it from abusing cards that would benefit its effect (i.e. "[[Black-Winged Dragon]]").
  * In the first printed Spanish editions of ''Duelist Pack: Crow'', this card's effect featured the word "''regresar''" instead of "''devolver''", which is the official word for "''return''".
  ** This card shares this similar trait with "[[Burial from a Different Dimension]]", "[[Honest]]", "[[Power Tool Dragon]]", and "[[Winged Rhynos]]", all of which were later corrected in subsequent printings.
