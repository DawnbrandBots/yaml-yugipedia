title: Card Trivia:Chronomaly Nebra Disk
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Nebra sky disk|Nebra sky disk]], a bronze disk with a blue-green patina and inlaid with gold patterns of the stars, the sun, and the crescent moon. The disk, discovered buried on the Mittelberg hill near the German city of [[wikipedia:Nebra|Nebra]], is the oldest concrete depiction of astronomical phenomena known from anywhere in the world.
