title: Card Trivia:Evil Eye Domain - Pareidolia
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Pareidolia|Pareidolia]].
  ** In addition to the moon theming from "[[Evil Eye of Selene]]", the moon in this card's artwork may be a reference to the [[wikipedia:Moon rabbit|moon rabbit]], a famous example of pareidolia with cultural significance in Japan.
