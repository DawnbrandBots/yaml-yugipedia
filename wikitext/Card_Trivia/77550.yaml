title: Card Trivia:Dimensional Alchemist
wikitext: |-
  {{Navigation}}

  * This card has similar appearance to a "[[Monarch (series)|Monarch]]".
  * This monster appears to be performing a "[[Dark Core]]", which removes a monster from play.
  * This card along with "[[Caius the Shadow Monarch]]" were the only ''TCG'' Structure Deck cards that were reprinted as [[Gold Rare]]. As it happens, these cards both were first printed in the same Structure Deck being ''[[The Dark Emperor Structure Deck]]''
