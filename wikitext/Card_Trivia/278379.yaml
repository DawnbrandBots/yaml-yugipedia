title: 'Card Trivia:Number 73: Abyss Splash'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Kastle Siblings]]''.
  * This monster appears in the artwork of "[[Number 39: Utopia Rising]]".
  ** This monster's silhouette appears in the artwork of "[[Xyz Revive Splash]]".
  * The number "73" is located on this monster's right thigh plate.
  * This monster has a "[[Number C]]" [[Card evolutions|upgraded]] form: "[[Number C73: Abyss Supra Splash]]".
  * This monster has a "[[Shark (archetype)|Shark]]" counterpart: "[[Abyss Shark]]".
  * "[[Number]]" monsters often take the form reflecting their owners and/or their original desires. In this case, this [[Mythyrian Number]] represents this card's original owner, [[Reginald Kastle|Nash]], and its [[Number Guardian|"Number" Guardian]], [[Abyss (character)|Abyss]].
  ** This monster's Japanese name, "Roaring Waterfall Deity", reflects how Abyss served as the ocean god in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster is a [[counterpart]] to "[[Number 94: Crystalzero]]", a fellow Mythyrian Number belonging to Nash's sister, [[Rio Kastle|Marin]].
  *** Both share the same [[Attribute]] ([[WATER]]), [[Rank]] (5), and [[Type]] ([[Warrior]]).
  *** Both feature [[ATK]]-based effects that are complete opposites of each other; in this monster's case, it doubles its own ATK.
  **** In {{episode|ZEXAL|109|ref}}, "[[Number 94: Crystalzero (anime)|Number 94: Crystalzero]]" used its effect to repeatedly halve the ATK of [[Number 73: Abyss Splash (anime)|this card]] and destroy it in battle. This reflects how [[Number 94: Crystalzero (character)|Crystalzero]] was Summoned to counter Abyss's attack on the [[United Lands of the Poseidon Ocean]] while under [[Vector]]'s control.
  * This monster's number is the opposite of that of  "[[Number 37: Hope Woven Dragon Spider Shark]]".
  ** Both were used by [[Reginald Kastle]]/[[Ryoga Kamishiro (manga)|Ryoga Kamishiro]] in the ''Yu-Gi-Oh! ZEXAL'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]], respectively.
