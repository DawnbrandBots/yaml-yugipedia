title: Card Trivia:Zoodiac Broadbull
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zoodiac Combo]]".
  * This monster is based on the [[wikipedia:Chinese zodiac|Chinese zodiac]] sign of the [[wikipedia:Ox (zodiac)|Ox]].
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018288644400611331 Bilibili] and [https://weibo.com/7406309913/5118912050497037 Weibo] at 2:00 AM (China Standard Time) on January 4, 2025, which was the fourth quarter of the Chou hour in the traditional Chinese timekeeping system.
