title: Card Trivia:Destiny HERO - Dusktopia
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Light's Revenge]]''.
  * This monster features a golden Aztec pyramid on its right shoulder, likely a reference to the mythical golden city of [[wikipedia:El Dorado|El Dorado]].
  * This monster is an upgraded form of "[[Destiny HERO - Dystopia]]".
  ** This monster's name is portmanteau of the words "[[wikipedia:Dusk|dusk]]" and "[[wikipedia:Utopia|utopia]]", the former word referencing its [[DARK]] [[Attribute]].
  ** In contrast to "Dystopia", which focuses on [[effect damage]] and [[destroy]]ing cards, this monster's effects focus on protecting cards from destruction and reducing [[battle damage]].
  *** This monster's name and effects are opposite to those of "Dystopia", reflecting the change in the personality and outlook of [[Aster Phoenix (ARC-V)|Aster Phoenix]], who primarily used the destructive "[[Destiny HERO - Dystopia (anime)|Destiny HERO - Dystopia]]" when he was a [[Duel Academy (ARC-V)|Duel Academy]] soldier, but then he evolved it into the protective "[[Destiny HERO - Dusktopia (anime)|Destiny HERO - Dusktopia]]" after being enlightened by [[Yuya Sakaki]].
  **** Fittingly, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster was Summoned by fusing "Dystopia" with  "[[Destiny HERO - Dreamer (anime)|Destiny HERO - Dreamer]]", referencing the common definition of a utopia, which is an ideal (or "dreamed-up") place or society that possesses perfect qualities for its members.
  * This monster shares the same Attribute (DARK), [[Level]] (10), [[Type]] ([[Warrior]]), and [[original ATK and DEF]] (3000/3000) with "[[Destiny End Dragoon]]".
  ** Both monsters were used by [[Aster Phoenix]]: "[[Destiny End Dragoon (anime)|Destiny End Dragoon]]" was used by him in the ''[[Yu-Gi-Oh! GX]]'' anime and this monster was used by [[Aster Phoenix (ARC-V)|his alternate universe counterpart]] in the ''Yu-Gi-Oh! ARC-V'' anime.
