title: Card Trivia:Fire Formation - Domei
wikitext: |-
  {{Navigation}}

  * "[[Brotherhood of the Fire Fist - Eland]]" and "[[Brotherhood of the Fire Fist - Kirin]]" appear in this card's artwork.
  * This card is named after the Chinese name for [[wikipedia:Alcor (star)|Alcor]], the companion star of [[wikipedia:Mizar|Mizar]].
