title: Card Trivia:Robotic Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Appliancer Test]]".
  * The design of "[[Clockwork Knight]]" appears to be based off this monster.
  * This monster's design differs from how it is depicted in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** This monster's original design features a single green line stretching horizontally across its face and obscured at the center by the vertical intersection of the metallic cross shape on its face, giving it the appearance of two separate eyes. In the anime, this monster is depicted with two separate eyes.
  ** This monster's design also features a machine gun on its left arm in place of its hand. In the anime, and in the artwork of "Appliancer Test", this monster is depicted with both hands.
