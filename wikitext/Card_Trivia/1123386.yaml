title: Card Trivia:Sandwich Day
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This card is based on the [[drawbread]]s, a type of sandwich featured in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** The card's artwork specifically depicts the [[Golden Eggwich]], the rarest and most desirable version of the drawbreads, along with the varieties of drawbreads depicted in {{episode|GX|017|ref}}, including (in clockwise order) the pizza, fish, hamburger, ''yakisoba'', and korokke/croquette varieties.
  ** This card's effects reference the process of "[[draw]]ing" the drawbreads in the ''Yu-Gi-Oh! GX'' anime, where they are placed in identical wrappers, similar to how [[face-down]] cards have identical [[card backing]]s.
  *** This card's 200 [[Life Point]] cost is a reference to the price of the drawbread in the ''[[Yu-Gi-Oh! GX Tag Force]]'' video game series.
  *** This card's bulleted effects reference the goal to "draw" the Golden Eggwich hidden among the different drawbreads (each represented by the monster they draw and monsters in the player's [[Graveyard]]). 
  **** The first bulleted effect, allowing the player to draw a card if they draw a monster with a different [[Attribute]] from monsters in their [[Graveyard]], represents how the player has successfully drawn the Golden Eggwich.
  **** The second bulleted effect to force the player to [[discard]] a card if they draw a monster with the same Attribute as monsters in their Graveyard represent how the player failed to draw the Golden Eggwich.
