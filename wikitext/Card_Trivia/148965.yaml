title: Card Trivia:Foolish Return
wikitext: |-
  {{Navigation}}

  * This card is a [[Quick-Play Spell Card]] counterpart of "[[Foolish Burial]]".
  ** Both cards have artworks depicting a single hand emerging from a surface while clutching an item.
  ** This card appears to counter "Foolish Burial", since it [[return]]s a card from the opponent's [[Graveyard]] to the [[Deck]], while "Foolish Burial" sends a monster from the player's Deck to the Graveyard.
