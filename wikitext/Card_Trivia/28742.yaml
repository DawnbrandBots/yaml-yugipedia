title: Card Trivia:Elemental HERO Gaia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Construct Element]]".
  * This monster is named after [[wikipedia:Gaia|Gaia]]", the personification of [[wikipedia:Earth|Earth]] in [[wikipedia:Greek mythology|Greek mythology]].
  ** Fittingly, this monster is [[EARTH]] and requires an EARTH monster as [[Fusion Material]].
  * This monster has a [[WIND]] [[counterpart]]: "[[Elemental HERO Great Tornado]]".
  ** This monster has a dark color scheme, while "Great Tornado" has a bright color scheme.
  ** This monster is depicted with its left arm stretched out in the bottom-right corner, while "Great Tornado" is depicted with its right arm stretched out in the top-left corner.
  ** This monster has 2200 [[ATK]], while "Gaia" has 2200 [[DEF]].
  ** Both monsters have an effect that halves the ATK of an opponent's monster when they are [[Fusion Summon]]ed: this monster can halve the ATK of an opponent's monster, while "Great Tornado" can halve the ATK/DEF of all the opponent's monsters.
  * This is the only [[Level 6]] [[Nomi]] "[[HERO]]" [[Fusion Monster]].
  * This card's ''[[OCG]]''/''[[TCG]]''  artwork is taken from {{chapter|GX|028|ref}}, specifically from the panel showing [[Elemental Hero Gaia (manga)|this monster]] being [[Summon]]ed.
