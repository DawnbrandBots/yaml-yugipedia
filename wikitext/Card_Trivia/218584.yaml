title: Card Trivia:Magical Labyrinth
wikitext: |-
  {{Navigation}}

  * The spiral in the background of this card's artwork may be an homage to [[Fusion Summon]]ing.
  ** Fittingly, in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], "[[Wall Shadow]]" was a [[Fusion Monster|Fusion]] of "[[Labyrinth Wall]]" and "[[Shadow Ghoul]]".
  * This is one of the few [[Equip Spell Card]]s in the game that can only be equipped to a specific monster.
