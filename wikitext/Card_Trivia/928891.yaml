title: Card Trivia:Dragunity Remus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragunity Draft]]".
  * This monster is named after [[wikipedia:Remus|Remus]], the twin brother of [[wikipedia:Romulus|Romulus]], founder and first king of Rome.
  * This monster has two upgraded forms:
  ** [[Link Monster]] (combined with "[[Dragunity Quirinus]]"): "[[Dragunity Knight - Romulus]]"
  ** [[Synchro Monster]] (combined with "[[Dragunity Falchion]]" and "Quirinus"): "[[Dragunity Knight - Areus]]"
