title: Card Trivia:Mystical Space Typhoon
wikitext: |-
  {{Navigation}}
  * The cyclone in this card's artwork appears in the artworks of "[[Radiant Typhoon Manifestation]]" and "[[Radiant Typhoon Mandate]]".
  * This card has several weaker and/or altered counterparts: "[[Mystical Wind Typhoon]]", "[[Tornado]]", "[[Gust]]", "[[Twister]]", "[[Dust Tornado]]", "[[Wild Tornado]]", "[[Chain Whirlwind]]", "[[Double Cyclone]]", "[[Typhoon]]", "[[Cosmic Cyclone]]", "[[Galaxy Cyclone]]", "[[Twin Twisters]]", "[[Dicephoon]]", "[[Space Cyclone]]", the [[Anime-only|anime-exclusive]] "[[Psychic Cyclone]]", and the [[Manga-only|manga-exclusive]] "[[Sonic Cyclone]]".
  ** This card also has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Mystical Space Typhoon]]".
  * Many players joke about "MST negates", due to beginners often mistakenly believing that [[destroy]]ing a card [[negate]]s its effect, and thus that this card can be [[chain]]ed to an [[activate]]d [[Spell]] or [[Trap Card]] to negate its effect.
  ** Many years later a card named "[[Blizzard]]", very similar to "Mystical Space Typhoon" both conceptually and technically, was released and is actually able to negate the affected card, although it can only target Spells and not Traps.
  ** "[[Radiant Typhoon Mandate]]" allows a player to negate a face-up card an opponent controls when "Mystical Space Typhoon" is activated.
  * This was the first [[Spell Card]] ever to be released as [[Ghost Rare]].
  ** Additionally, counting both the ''[[OCG]]'' and ''[[TCG]]'', this card has been printed in every rarity besides [[Holographic Rare]].
  * This is one of the few cards that are known by two different names in the Spanish ''TCG'', along with "[[Twin-Headed Behemoth]]" and "[[Blackwing Armed Wing]]".
  * Prior to ''[[Yu-Gi-Oh! VRAINS]]'', this was one of only three cards to have appeared in all ''Yu-Gi-Oh!'' anime series, along with "[[Mirror Force]]" and "[[Polymerization]]". Of the three, this card and "Polymerization" have also appeared in every ''Yu-Gi-Oh!'' anime entry.
