title: Card Trivia:Life Shaver
wikitext: |-
  {{Navigation}}

  * This card has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any [[Continuous Trap Card]], released over 20 years after its first appearance in the original [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'']] manga on February 15, 2002.
  ** This card was originally a [[Normal Trap Card]] in the manga and [[Yu-Gi-Oh! (anime)|anime]].
