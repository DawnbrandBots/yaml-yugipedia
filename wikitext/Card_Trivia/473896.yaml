title: Card Trivia:Speedlift
wikitext: |-
  {{Navigation}}

  * "[[Speedroid Den-Den Daiko Duke]]" and "[[Speedroid Pachingo-Kart]]" appear in this card's artwork.
  * This card's Japanese name, "Speedrift", is a portmanteau of "speed" and "drift". 
  ** In motorsport racing, a drift is a technique where the driver intentionally oversteers a car to make it slide sideways through a turn, which is what "Speedroid Pachingo-Kart" is depicted performing in this card's artwork.
  ** This card's ''[[TCG]]'' name  is likely a Japanese translation error of "Speedrift".
