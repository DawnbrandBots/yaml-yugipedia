title: Card Trivia:The Golden Swordsoul
wikitext: |-
  {{Navigation}}

  * These two monsters appear in the artwork of "[[Dogmatikamacabre]]", "[[Springans Interluder]]", and "[[The Three Brave Swordsouls]]".
  * This monster's Japanese name, "Xiangjian Masters of Xuanyuan" ({{Ruby|軒|けん}}{{Ruby|轅|えん}}の{{Ruby|相|そう}}{{Ruby|剣|けん}}{{Ruby|師|し}} ''Ken'en no Sōkenshi''), is based on [[wikipedia:zh:軒轅劍|Xuanyuan Jian]] (軒轅劍), a legendary Chinese sword.
  ** The kanji ''Ken'en'' (軒轅) in this monster's Japanese name seems to be a pun on ''Ken'en no naka'' (犬猿の仲, lit. "like dog and monkey"), a phrase for a relationship where both parties are at odds with each other (similar to the English phrase "fight like cat and dog").
  ** This monster's ''[[TCG]]'' name, "The Golden Swordsoul", is a reference to the [[wikipedia:Yellow Emperor|Yellow Emperor]], a legendary Chinese sovereign who is said to have forged and used Xuanyuan Jian.
  * This monster is a "[[Swordsoul]]" [[counterpart]] of "[[Dogmatika Adin, the Enlightened]]" and "[[Dogmatika Theo, the Iron Punch]]", matching how "[[The Iris Swordsoul]]" is the "Swordsoul" counterpart of "[[Dogmatika Fleurdelis, the Knighted]]".
  ** Specifically, they are [[Adin]] and [[Theo (CARD GAME THE CHRONICLES)|Theo]] after they left the "[[Dogmatika Nation]]" together with [[Fleurdelis]], with all three eventually joining the Swordsouls after they bring them to the [[Icejade]]s to seal their stigmata (as depicted in "[[Swordsoul Emergence]]" and "[[Icejade Cradle]]").
  *** Fittingly, these characters together make up "The Three Brave Swordsouls".
