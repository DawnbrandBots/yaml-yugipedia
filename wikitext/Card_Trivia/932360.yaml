title: Card Trivia:Gazelle the King of Mythical Claws
wikitext: |-
  {{Navigation}}

  * This monster is the [[retrained]] counterpart of "[[Gazelle the King of Mythical Beasts]]".
  ** The Japanese word for "Mythical Claws" (幻爪, ''Gensō'') shares a similar pronunciation with the word "illusion" (幻想, ''gensō'').
  *** Fittingly, this monster is a member of the [[Chimera]] series, centered around the [[Fusion Summon]]ing of [[Illusion]] Fusion Monsters, which this monster can facilitate by [[add]]ing "[[Chimera Fusion]]" or the required [[Fusion Material]] from the [[Deck]] to the [[hand]].
