title: Card Trivia:Chakra
wikitext: |-
  {{Navigation}}

  * This card's name may be based on the [[wikipedia:Sudarshana Chakra|Sudarshana Chakra]], a disc-like weapon used by the Hindu god [[wikipedia:Vishnu|Vishnu]] in [[wikipedia:Hindu mythology|Hindu mythology]].
  ** [[wikipedia:Chakra|Chakra]] is also a term used in Hindu metaphysical tradition and other belief systems, referring to parts of the human body that are centres of life forces or vital energy.
  *One of the cards designed by the original author, Takahashi Kazuki.
  **A rough sketch is published in volume 18 of the original manga.
