title: Card Trivia:Unibird
wikitext: |-
  {{Navigation}}

  * This monster's lightning bolt design and color scheme are similar to those of "[[Thunder Unicorn]]".
  ** Fittingly, this monster is used to [[Special Summon]] "[[Thunder Unicorn (anime)|Thunder Unicorn]]" from the [[Graveyard]] via its effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
