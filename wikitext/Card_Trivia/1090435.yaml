title: Card Trivia:Lightstorm Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded [[LIGHT]] [[Synchro]] counterpart of "[[Darkstorm Dragon]]".
  ** "[[Sage with Eyes of Blue]]" appears in this card's artwork.
  ** This card was made to coincide with the release ''[[Structure Deck: Blue-Eyes White Destiny]]''/''[[Structure Deck: Advent of the Eyes of Blue]]'', effectively a remake of ''[[Structure Deck: The Blue-Eyed Dragon's Thundering Descent]]''/''[[Saga of Blue-Eyes White Dragon Structure Deck]]'', which reprinted "Darkstorm Dragon" and introduced "[[Rider of the Storm Winds]]".
