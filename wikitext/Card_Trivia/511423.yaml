title: Card Trivia:Chu-Ske the Mouse Fighter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rage and Conspiracy]]".
  * This monster is based on the actor and martial artist, [[wikipedia:Bruce Lee|Bruce Lee]].
  * This monster's name is a pun on "chuu", the Japanese onomatopoeia for a mouse's squeak, and "Yusuke", a common male name in Japan.
