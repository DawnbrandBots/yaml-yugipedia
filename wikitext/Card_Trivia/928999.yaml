title: Card Trivia:Majestic Mirage
wikitext: |-
  {{Navigation}}
  [[File:ShootingStarDragon-JP-Anime-5D-NC-2.png|thumb|right|300px|The effect of "Shooting Star Dragon" as seen in the anime.]]
  * "[[Shooting Majestic Star Dragon]]" (and its red and yellow mirages) appears in this card's artwork.
  ** A [[Turbo Duel]]ing lane and what is very likely a night view of [[New Domino City]] also appear in this card's artwork.
  * This card's name and artwork reference the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack and effect]] of "[[Shooting Star Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime, "Stardust Mirage", which creates one colored mirage of itself for each attack it can perform after using its effect.
