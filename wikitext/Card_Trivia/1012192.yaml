title: Card Trivia:Floowandereeze & Empen
wikitext: |-
  {{Navigation}}

  * This monster's name and design is based on the [[wikipedia:Emperor penguin|emperor penguin]], a species of bird found in [[wikipedia:Antartica|Antartica]].
  ** Fittingly, the emperor penguin is marked on Antarctica in the map appearing on the artwork of "[[Floowandereeze and the Magnificent Map]]".
