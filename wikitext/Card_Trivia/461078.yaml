title: Card Trivia:Destiny HERO - Dystopia
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: Destiny Soldiers]]''/''[[Destiny Soldiers]]''.
  * This monster appears in the artwork of "[[D - Hyper Nova]]".
  * This monster is named after a [[wikipedia:Dystopia|dystopia]], an imagined state or society where there is great suffering and injustice, usually taking place in a totalitarian or post-apocalyptic setting. 
  ** This reflects this monster's owner, [[Aster Phoenix (ARC-V)|Aster Phoenix]], who led the forces of [[Duel Academy (ARC-V)|Duel Academy]] into the invasion of [[Heartland City (ARC-V)|Heartland City]], which resulted in the city being reduced to ruins and the citizens being oppressed.
  * This monster has an [[Card evolutions|upgraded]] form: "[[Destiny HERO - Dusktopia]]".
  * This is the first "[[Destiny HERO]]" [[Fusion Monster]].
