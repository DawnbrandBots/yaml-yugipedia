title: Card Trivia:Vylon Stigma
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Stigma (letter)|Stigma]] is a ligature of the Greek letters sigma (S) and tau (Τ).
  * This monster appears to be floating above the black hole seen during [[Xyz Summon]]s. This may also relate to how Pentacro and Tesseract are four-dimensional polygons, while the Vylon [[Tuner monster|Tuners]] in the past were three-dimensional shapes.
  * This monster, along with "[[Vylon Tesseract]]" and "[[Vylon Pentachloro]]", is a part of "[[Vylon Disigma]]".
