title: Card Trivia:A Wild Monster Appears!
wikitext: |-
  {{Navigation}}

  * "[[Grandsoil the Elemental Lord]]" appears in this card's artwork.
  ** Ironically, this card's effect does not allow "Grandsoil" to [[activate]] its effect to [[Special Summon]] a monster from the [[Graveyard]] when it is Summoned with this card's effect, making it the least useful [[Elemental Lord]] to Summon with this method.
  * This card's Japanese name is based on "[http://idioms.thefreedictionary.com/a+bolt+from+the+blue a bolt from the blue]", an idiom used to refer to something unexpected that takes someone by surprise (e.g. "a bolt of lightning from a clear blue sky"), which is reflected in its artwork and effect.
  ** This card's ''[[TCG]]'' name is a reference to the iconic phrase from the ''[[wikipedia:Pokémon|Pokémon]]'' video game series, "''A [[bulbapedia:wild Pokémon|wild Pokémon]] appeared!''", due to the sudden appearance of "Grandsoil" in this card's artwork.
