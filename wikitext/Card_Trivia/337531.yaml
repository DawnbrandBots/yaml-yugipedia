title: Card Trivia:Aether, the Empowering Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Golden Dragon Summoner]]".
  * This monster is named after the [[wikipedia:Aether (classical element)|aether]], the purported fifth element which is believed to be the material that fills up the universe beyond the terrestrial sphere.
  ** This monster is also based on the [[wikipedia:Yellow Dragon|Yellow Dragon]], the purported fifth member of the [[wikipedia:Four Symbols|Four Symbols]] appearing among the [[wikipedia:Chinese constellations|Chinese constellations]] along the ecliptic that represents the element of [[Wikipedia:Earth (wuxing)|Earth]], the Chinese quintessence (aether), and the changing of seasons.
  * This monster has a [[DARK]] [[counterpart]]: "[[Aether, the Evil Empowering Dragon]]".
  * This is the first monster to feature an effect that [[activate]]s when it is [[Pendulum Summon]]ed.
