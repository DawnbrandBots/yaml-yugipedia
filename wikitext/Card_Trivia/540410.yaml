title: Card Trivia:Cyber Valkyrie
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's Japanese name, "Hail Cyber", is a reference to the two [[series]] used by different incarnations of Alexis Rhodes in the ''Yu-Gi-Oh! GX'' [[Yu-Gi-Oh! GX|anime]] and [[Yu-Gi-Oh! GX (manga)|manga]]: [[Cyber Girl]] (used by the [[Alexis Rhodes|anime incarnation]]) and [[Snow]] (used by the [[Alexis Rhodes (manga)|manga incarnation]]).
  ** This monster's international name is based on a [[wikipedia:Valkyrie|valkyrie]], a host of female figures and handmaidens of [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]], who chooses those destined to be slain in battle.
