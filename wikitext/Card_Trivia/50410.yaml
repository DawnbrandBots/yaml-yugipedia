title: Card Trivia:Red Medicine
wikitext: |-
  {{Navigation}}

  * A diagram of the bottle in this card's artwork appears in the artwork of "[[Chemical Cure Red]]".
  * This card is tied with other cards as the first [[Spell Card]] and the first card with a [[Life Point]]-gaining effect in the ''[[OCG]]''/''[[TCG]]''.
  * This card has a counterpart: "[[Blue Medicine]]".
  ** Both cards are references to items of the same names in ''[[wikipedia:The Legend of Zelda|The Legend of Zelda]]'' series.
  * This card has a polar opposite damage [[counterpart]]: "[[Hinotama]]".
  * This is one of the first Spell Cards seen on-screen in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, along with "[[Block Attack]]", "[[Mooyan Curry]]", "[[Polymerization]]", and "[[Remove Trap]]".
