title: Card Trivia:Frightfur Defender
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Edge Imp Chain]]", "[[Frightfur Sheep]]", and "[[Fluffal Sheep]]" appear in this card's artwork.
  * The usage of this card in episode 34 {{episode|ARC-V|034}} resembles the effect of "Frightfur Sheep" (''[[OCG]]''/''[[TCG]]'') itself that revives it from destruction with 800 ATK plus. The [[Frightfur Sheep (anime)|anime version]] of "Frightfur Sheep" does not possess this effect.
