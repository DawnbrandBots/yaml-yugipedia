title: 'Card Trivia:Number 58: Burner Visor'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is the first [[Pyro]] "[[Number]]" monster.
  * This monster and "[[Number 80: Rhapsody in Berserk]]" both feature an effect that [[equip]]s themselves to other monsters and can [[activate]] their effects during the [[Battle Phase]].
  ** This represents [[Don Thousand]]'s influence over [[Alito]] and [[Girag]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, as the two aforementioned monsters were used to support their "[[Number 10X]]" monsters necessary to maintain Don Thousand's curse on them.
