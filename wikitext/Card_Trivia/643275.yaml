title: Card Trivia:The World Legacy
wikitext: |-
  {{Navigation}}

  * "[[Imduk the World Chalice Dragon]]", "[[Lib the World Key Blademaster]]", and "[[World Legacy - "World Key"]]" appear in this card's artwork.
  ** This card's artwork depicts the end of the "[[World Legacy]]" storyline: "Lib" is travelling through the world along with "Imduk", guided by the glow of the "World Key" (which was given to her by "[[Avida, Rebuilder of Worlds]]"), with the intent of sealing it forever and prevent the battle for its power to happen again.
