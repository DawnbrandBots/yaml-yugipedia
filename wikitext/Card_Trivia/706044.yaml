title: Card Trivia:Gizmek Uka, the Festive Fox of Fecundity
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of [[wikipedia:Ukanomitama|Ukanomitama]] and [[wikipedia:Inari Ōkami|Inari Ōkami]].
  ** Inari Ōkami is the ''[[wikipedia:Kami|kami]]'' of foxes in [[wikipedia:Japanese mythology|Japanese mythology]], referenced in this monster's appearance.
