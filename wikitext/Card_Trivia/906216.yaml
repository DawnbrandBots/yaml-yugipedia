title: Card Trivia:Altergeist Silquitous
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Brownie (folklore)|silkie]]" and "[[wikipedia:Ubiquitous computing|ubiquitous computing]]".
  ** "Silkie" is the English and Scottish name for a brownie, a humanoid household spirit in [[wikipedia:Scottish folklore|Scottish folklore]].
  *** Despite this, this monster's appearance is based on a [[wikipedia:Sirin|sirin]], a mythological creature in ancient Russian legends who is depicted as an owl with the head of a beautiful woman.
  ** "Ubiquitous computing" is a concept in computer science where computing is made to appear anytime and everywhere.
