title: Card Trivia:Mist Valley Apex Avian
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Hidden Arsenal: Chapter 1]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Mist Valley Thunderbird]]".
  * This card has a "[[lswarm]]" [[counterpart]]: "[[Evilswarm Thunderbird]]".
  * This card has the highest [[ATK]] of all "[[Mist Valley]]" monsters.
