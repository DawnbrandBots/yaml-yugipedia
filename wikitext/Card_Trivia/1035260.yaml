title: Card Trivia:Accelerator
wikitext: |-
  {{Navigation}}

  * The device in this card's artwork appears in the artwork of "[[Jinzo - Amplified]]".
  * This card is a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Amplifier]]".
  * This is the first card in ''Yu-Gi-Oh! Rush Duel'' to feature an effect that can overwrite effects.
  ** This is also the first card in ''Yu-Gi-Oh! Rush Duel'' to feature an effect that cannot be [[negate]]d.
