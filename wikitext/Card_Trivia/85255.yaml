title: Card Trivia:Onmoraki
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the ''onmoraki'', an avian ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore taking on the form of a fire-breathing black crane.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|022|ref}}, specifically from the panel showing [[Onmoraki (manga)|this monster]] being Summoned.
