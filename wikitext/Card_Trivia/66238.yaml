title: Card Trivia:Gladiator Beast Andal
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gladiator Proving Ground]]", "[[Gladiator Taming]]", and "[[Thumbs Down]]".
  * This monster is named after the ''[[wikipedia:List of Roman gladiator types#Andabata|andabatae]]'', a type of gladiator who battled while wearing a helmet with one eye-hole in [[wikipedia:Ancient Rome|Ancient Rome]].
  * This is the only "[[Gladiator Beast]]" [[Normal Monster]].
