title: Card Trivia:Traptrix Pudica
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Terrifying Trap Hole Nightmare]]".
  * This monster is based on the ''[[wikipedia:Nepenthes pudica|Nepenthes pudica]]'', a pitcher plant species found in North Kalimantan that can produce fully functional underground pitchers.
  ** Fittingly, this monster has a similar appearance with "[[Traptrix Nepenthes]]", who is based on the same clade of plants.
