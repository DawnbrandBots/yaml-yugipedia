title: Card Trivia:Chimeratech Crush Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Evolution Result Flash]]".
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Cyber Assault Dragon]]", "[[Cyber Search Dragon]]", and "[[Cyber Stealth Dragon]]".
  * This monster is a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Chimeratech Rampage Dragon]]".
