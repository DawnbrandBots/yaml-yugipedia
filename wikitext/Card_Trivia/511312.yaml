title: Card Trivia:A Rival Appears!
wikitext: |-
  {{Navigation}}

  * "[[Ebon Magician Curran]]" and "[[White Magician Pikeru]]" appear in this card's artwork.
  ** "Curran" and "Pikeru" are [[counterpart]]s that have the same [[Level]] ([[Level 2 Monster Cards|2]]), which is reflected in this card's effect to [[select]] a monster the opponent [[control]]s and [[Special Summon]] a monster from the player's hand that has the same Level. Also, according to the [[Master Guide 2 card storylines#File No. 11: Two Adorable Princesses|Master Guide 2 card storylines]], "Curran" and "Pikeru" are twin sisters.
