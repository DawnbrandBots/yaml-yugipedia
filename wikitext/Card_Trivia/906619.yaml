title: Card Trivia:Junk Sleep
wikitext: |-
  {{Navigation}}

  * "Junk sleep" is a term used to describe a physiological effect, where proper REM sleep is not achieved because one has been using consumer electronics right up until the moment they fall asleep.
  * "[[Searchlightman]]", "[[Magnetic Mosquito]]", "[[Sonic Jammer]]", and "[[Supply]]" appear in this card's artwork.
