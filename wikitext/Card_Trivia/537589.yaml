title: Card Trivia:Mystical Elf
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gift of The Mystical Elf]]", "[[Lineage of Destruction]]", and "[[Vaccination]]".
  ** This monster's image appears as the profile of the coin in the artwork of "[[Gold Moon Coin]]".
  ** A younger version of this monster appears in the artwork of "[[Wipe of the Spritzical Elf]]".
  ** A stone tablet of this monster appears in the artwork of "[[Wedju Temple]]".
  * This monster has three [[counterpart]]s:
  ** An [[Effect Monster]] [[recolored counterpart]], with opposite [[ATK]] and [[DEF]]: "[[Dark Elf]]".
  ** A [[signature move]] counterpart: "[[Mystical Elf - White Lightning]]".
  ** A ''[[Rush Duel]]'' [[Bubble Era]] counterpart: "[[Bubbly Elf]]".
  * This monster's effect to increase the ATK and DEF of "[[Blue-Eyes White Dragon]]" by 500 in ''[[Yu-Gi-Oh! Dark Duel Stories]]'' and ''[[Yu-Gi-Oh! The Sacred Cards]]'' is a reference to its hidden ability used in {{chapter|Yu-Gi-Oh!|076|ref}} and {{episode|Yu-Gi-Oh!|010|ref}} (which also became the basis of "Mystical Elf - White Lightning").
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster can be fused with "[[Dark Elf (FMR)|Dark Elf]]" to form "[[Cosmo Queen (FMR)|Cosmo Queen]]".
  * This monster's pose in its ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|010|ref}} showing [[Mystical Elf (manga)|this monster]] being Summoned.
