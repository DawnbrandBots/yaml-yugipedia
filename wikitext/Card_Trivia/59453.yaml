title: Card Trivia:Gigastone Omega
wikitext: |-
  {{Navigation}}

  * This is a counterpart of "[[Megarock Dragon]]".
  * This card is also a counterpart and an advanced form of "[[Gigantes]]" (in terms of its effect).
  * It's possible to argue that this card is a combination (in the artwork) of "[[Megarock Dragon]]" and "[[Gigantes]]".
  * This card has a [[Light]] [[attribute]] [[counterpart]], "[[Soul of Purity and Light]]".
