title: 'Card Trivia:Number 92: Heart-eartH Dragon'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This is the [[cover card]] of ''[[Cosmo Blazer]]''.
  * The number "92" is located on the right side of this monster's lower abdomen.
  * This monster has a "[[Number C]]" [[Card evolutions|upgraded]] form: "[[Number C92: Heart-eartH Chaos Dragon]]".
  * This is the first [[Rank 9]] [[Xyz Monster]] to require three monsters as [[Xyz Material]]s for its [[Xyz Summon]].
  * "[[Number]]" monsters often take the form of their owner's initial ambitions and desires; in this monster's case, it represents its owner, [[Dr. Faker]].
  ** This monster's Japanese title, "Fake-Body God Dragon", references the name of Dr. Faker.
  *** It is also similar to the Japanese title of "[[Number 53: Heart-eartH]]". Fittingly, this monster is the true form of "Heart-eartH " while both monsters' color schemes and the background of their card artworks are opposite of each other.
  ** The word "Heart" references [[Heartland City]], which was founded by Dr. Faker. Fittingly, the gemstone in the hollow section of this monster's chest resembles an upside-down human heart.
  *** The word "eartH" references the planet [[Earth (planet)|Earth]], which Dr. Faker planned to conquer by destroying the [[Astral World]]. The capitalization in "Heart-eartH" is likely due to the two words being anagrams.
  * This is the only "Number" monster in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime to not have the common effect that only allowed it to be [[destroyed by battle]] with other "Number" monsters, as its effect already prevented it from being destroyed by battle with any monster.
  ** However, in the ''Yu-Gi-Oh! ZEXAL'' anime, "[[Number C92: Heart-eartH Chaos Dragon (anime)|Number C92: Heart-eartH Chaos Dragon]]" lacks its base form's effect to prevent itself from being destroyed in battle with any monster, so it has that common effect instead.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this monster's last effect allows it to be [[Special Summon]]ed from the [[Graveyard]] one time only if it is destroyed while it has no [[Xyz Material]]s; however, this monster also lacks any effect that requires to [[detach]] its Xyz Materials, so it is impossible to activate its last effect without detaching its materials first with another card.
