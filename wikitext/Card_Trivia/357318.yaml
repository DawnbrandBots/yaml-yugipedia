title: Card Trivia:Graydle Dragon
wikitext: |-
  {{Navigation}}

  * This is the first [[Aqua]]-[[Type]] [[Synchro Monster]].
  * This monster appears to be a physical amalgamation of body parts from other "[[Graydle]]" monsters, including the head of "[[Graydle Alligator]]", the wings of "[[Graydle Eagle]]" and the limbs and torso of "[[Graydle Slime]]". It also has "[[Graydle Cobra]]" as a tail.
  * During its only appearance in anime, It lacked the tail.
