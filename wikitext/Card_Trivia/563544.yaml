title: Card Trivia:Giant Ballpark
wikitext: |-
  {{Navigation}}

  * "[[Basic Insect]]", "[[Gokibore]]", "[[Kumootoko]]", and "[[Kuwagata α]]" appear in this card's artwork.
  ** This card's name and artwork depicting "Gokibore" reference how the latter monster's Japanese name, "Roachball" (ゴキボール ''Gokibōru'') features the word "ball" in it.
  * The events depicted in this card's artwork continue in the artwork of "[[Giant Ballgame]]".
