title: Card Trivia:Cyberse Reminder
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to [[wikipedia:Reminder software|reminder software]], while its artwork is a reference to either [[wikipedia:Data mining|data mining]] or [[wikipedia:Cryptocurrency|cryptocurrency mining]].
  * The crevices and glowing coins in this card's background also appear in the artwork of "[[Cynet Mining]]", which is a valid target for this card's effect.
