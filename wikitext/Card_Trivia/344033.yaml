title: Card Trivia:Raidraptor - Revolution Falcon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Raider's Unbreakable Mind]]".
  * Despite its name, this monster closely resembles a [[wikipedia:Secretarybird|secretary bird]] more than a [[wikipedia:Falcon|falcon]].
  * This monster has a [[signature move]] counterpart: "[[Raidraptor - Revolution Falcon - Air Raid]]".
  * This monster represents the final push and [[wikipedia:Revolution|revolutionary]] attack in the final stages of a [[wikipedia:Rebellion|rebellion]]. This is supported by its [[effect]]s, which allow it to weaken any [[Special Summon]]ed [[monster]] it [[battle]]s, [[attack]] all monsters the opponent [[control]]s, and [[destroy]] a monster individually and inflict half of its [[ATK]] as [[Effect damage|damage]]. These are reminiscent of the destruction of any remaining assets that have weakened foundation, ruling out any allied parties, and the final destruction of what could be the force that is orchestrating everything, respectively.
  * In the anime, this was the first [[Xyz Monster]] to be Summoned both through [[Rank-Up]] and through the normal [[Xyz Summon]]ing method.
  ** In the anime, when this card is Xyz Summoned normally, the animation background is normal purple with purple lightning sparking; however, when Summoned via Ranking-Up, the animation background is blazing.
