title: Card Trivia:FaSolfachord Fancia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Solfachord Elegance]]" and "[[Solfachord Happiness]]".
  ** This monster's chibi avatar appears in the artworks of "[[Solfachord Harmonia]]" and "[[Solfachord Symphony]]".
  * This monster is based on "''Fa''", the second syllable of the [[wikipedia:Solfège|solfège]], which reflects its [[Level]] (4).
  ** "Fancia" starts with the English letter "F", which is based on the [[wikipedia:F (musical note)|fourth musical note]] of the [[wikipedia:C major|C major scale]] in the fixed solfège.
