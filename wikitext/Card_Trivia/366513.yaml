  * This card derives its name from [[wikipedia:Marrella|''Marrella'']], a genus of extinct [[wikipedia:Cambrian|Cambrian]] animal found as fossils in the [[wikipedia:Burgess Shale|Burgess Shale Formation]] in the Canadian Rockies of British Columbia, Canada.
