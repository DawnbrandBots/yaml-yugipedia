title: Card Trivia:Harpie's Pet Baby Dragon
wikitext: |-
  {{Navigation}}

  * "Harpie's Pet Baby Dragon" is a younger version of "[[Harpie's Pet Dragon]]".
  * "[[Harpie Girl]]" is shown holding the chains of this monster.
  * This card has the same ATK and a similar name to "[[Baby Dragon]]" and "[[Red-Eyes Baby Dragon]]".
