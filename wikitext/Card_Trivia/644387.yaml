title: Card Trivia:Topologina Beeswax
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is named after [[wikipedia:Beeswax|beeswax]], a natural [[wikipedia:Wax|wax]] produced by [[wikipedia:Honey bee|honey bees]], in order to create a [[wikipedia:Honeycomb|honeycomb]] in their [[wikipedia:Beehive|nests]], which are used to contain their [[wikipedia:Larvae|larvae]] and stores of [[wikipedia:Honey|honey]] and [[wikipedia:Pollen|pollen]].
