title: Card Trivia:El Dorado Adelantado
wikitext: |-
  {{Navigation}}

  * "[[Eldlich the Golden Lord]]" appears in this card's artwork.
  * This card's name is based on ''[[wikipedia:Adelantado|adelantado]]'', a title held by Spanish nobles in service of their respective kings during the [[wikipedia:Middle Ages|Middle Ages]]. It was later used as a military title held by some Spanish [[wikipedia:Conquistador|conquistadores]] of the 15th, 16th and 17th centuries.
