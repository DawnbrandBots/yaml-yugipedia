title: Card Trivia:Generaider Boss Room
wikitext: |-
  {{Navigation}}

  * "[[Hela, Generaider Boss of Doom]]" appears in this card's artwork.
  * The symbol from "[[Generaider Boss Stage]]" appears in this card's artwork, albeit the bottom circle is highlighted purple. This circle represents [[wikipedia:Helheim|Helheim]], the world of death and decay, where [[wikipedia:Hel (being)|Hel]] rules.
