title: 'Card Trivia:Number 27: Dreadnought Dreadnoid'
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Dreadnought|dreadnought]], a class of warships equipped with naval guns.
  ** This monster's design features a main cannon similar in design to the main cannon of "[[Number 81: Superdreadnought Rail Cannon Super Dora]]".
  *** Fittingly, this monster's effect can [[Special Summon]] "Super Dora" and other [[Rank 10]] "Superdreadnought" [[Xyz Monster]]s, whose naming scheme references the [[wikipedia:Dreadnought#Super-dreadnought|super-dreadnought]] warship, a more powerful class of dreadnought warship equipped with a single powerful main cannon similar to those of the "Superdreadnought" Xyz Monsters.
