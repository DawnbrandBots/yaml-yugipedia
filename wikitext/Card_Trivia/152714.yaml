title: Card Trivia:Life Gardna
wikitext: |-
  {{Navigation}}

  * This monster's name and appearance is based on a [[wikipedia:Lifeguard|lifeguard]], a rescuer who supervises the safety of swimming areas.
  ** This monster's name also reflects its effect to allow the player to gain 800 [[Life Point]]s when used for a [[Synchro Summon]]ing, which will allow them to continue the [[Duel]].
