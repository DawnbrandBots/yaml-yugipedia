title: Card Trivia:Red Dragon Archfiend/Assault Mode
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Crimson Crisis]]''.
  ** This is also the first cover card in the ''[[Yu-Gi-Oh! 5D's]]'' era that isn't a [[Synchro Monster]].
  * This monster appears in the artworks of "[[Assault Reboot]]", "[[Assault Slash]]", and "[[Duel Evolution - Assault Zone]]".
  * This monster is the "[[/Assault Mode]]" [[counterpart]] of "[[Red Dragon Archfiend]]".
  * This is the first [[Ghost Rare]] card to feature a 3D picture printed on it.
  * This is the only [[Signer Dragon]]-related card from a [[Core Booster]] pack that hasn't been released in a Collector's Tin.
