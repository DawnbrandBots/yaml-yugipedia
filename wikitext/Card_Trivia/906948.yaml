title: Card Trivia:Constructor Wyrm Buildragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Asana - Pride of the Heavy Cavalry Style]]'', as well as one of the cover cards of ''[[Deck Mod Pack: Destined Power Destruction!!]]''.
  * This monster appears in the artwork of "[[Constructor Resurrection]]".
  * This monster is related to "[[Constructor Demolisher Wyrm Drake Crush]]".
  ** The two monsters are thematically opposites, with one "building" and the other "demolishing". Also, both monsters are visually similar, and "Drake Crush" can be Special Summoned by the effect of "Build Dragon".
  * This monster has an [[Counterpart|upgrade]]d combined form with "[[Wyrm Excavator the Heavy Cavalry Draco]]" (together with "[[Wyrm Excavator the Heavy Cavalry Draco (L)|Wyrm Excavator the Heavy Cavalry Draco [L]]]" and "[[Wyrm Excavator the Heavy Cavalry Draco (R)|Wyrm Excavator the Heavy Cavalry Draco [R]]]"): "[[Infinite Heavy Cavalry Buildragoon]]".
