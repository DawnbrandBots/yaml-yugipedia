title: Card Trivia:Glow-Up Bulb
wikitext: |-
  {{Navigation}}

  * This monster has a [[Zombie counterpart]]: "[[Glow-Up Bloom]]".
  * This monster's Japanese name (グローアップ・バルブ, ''Gurōappu Barubu'') could mean either "'''Grow-Up Bulb'''" or "'''Glow-Up Bulb'''" due to the pronunciation of the English letters "L" and "R" being similar in Japanese. 
  ** This monster's English name was likely intended to be "Grow-Up" due to its effect allowing it to "grow up" on the [[field]] by [[Special Summon]]ing itself from the [[Graveyard]], and because its artwork does not depict anything related to glowing.
  * This is the first [[Forbidden]] card whose effect can only be used [[Only once per Duel|once per Duel]] in the ''[[OCG]]'', and the only one of such cards to be previously [[Limited]] in the ''[[TCG]]''.
  ** It is also one of the two Forbidden cards whose effects can only be used once per Duel, the second being "[[Blackwing - Steam the Cloak]]".
