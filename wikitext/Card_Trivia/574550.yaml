title: Card Trivia:NEXT
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Neos]]", "[[Neo-Spacian Air Hummingbird]]", "[[Neo-Spacian Aqua Dolphin]]", "[[Neo-Spacian Dark Panther]]", "[[Neo-Spacian Flare Scarab]]", "[[Neo-Spacian Glow Moss]]", and "[[Neo-Spacian Grand Mole]]" appear in this card's artwork.
  * This card's name is short for "Neospace Extension".
  * This card is an [[Card evolutions|upgraded]] form of "[[NEX]]".
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[ZERO-MAX]]", the "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
