title: Card Trivia:Decode Talker Extended
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] counterpart of "[[Decode Talker]]".
  * This monster is the [[cover card]] of ''[[Starter Deck 2019]]''.
  * This card's third effect activating when a monster it points to is destroyed by battle or sent to the GY is a reference to the effect of "[[Firewall Dragon]]".
