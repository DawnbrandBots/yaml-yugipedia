title: Card Trivia:Max Warrior
wikitext: |-
  {{Navigation}}

  * This monster is likely based on a ''[[wikipedia:Sōhei|sōhei]]'' (a [[wikipedia:Buddhism|Buddhist]] [[wikipedia:Warrior monk|warrior monk]] in classical/feudal Japan), as supported by the following:
  ** It is wearing a headcowl, which was typical attire of the ''sohei''.
  ** It is wearing [[wikipedia:Japamala|mala beads]] around its neck, which Buddhist monks are known to wear.
  ** It is wielding a ''[[wikipedia:Sasumata|sasumata]]'', a polearm that is occasionally depicted as one of the seven weapons that [[wikipedia:Benkei|Benkei]] (a famous ''sohei'') either wielded or carried with him.

  * When this monster destroys an opponent's monster by battle, its effect results in it having the same [[Level]] (2), [[ATK]] (900), and [[DEF]] (400) as "[[Speed Warrior]]".
  ** Fittingly, both are [[WIND]] [[Warrior]] monsters used by [[Yusei Fudo]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's ATK-reduction effect is an inverse to the ATK-gaining effect of "Speed Warrior".
