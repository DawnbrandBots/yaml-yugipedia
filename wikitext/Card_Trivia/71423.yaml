title: Card Trivia:Agathion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * An '''agathion''' is a [[Wikipedia:Familiar spirit|familiar spirit]] which appears only at midday in the shape of a human or an animal, or even within a talisman, bottle or magic ring.
  * When played in the Manga, this card bares a resemblance to the [[Familiar of Red Nova]].
