  * "[[Samurai Skull]]", "[[Night Dragolich]]", "[[Big Eye]]", and the goblins from the "[[Trap Hole (archetype)|Trap Hole]]" cards appear in this card's artwork.
  * "[[wikipedia:Free range|Free-Range]]" is a term used to describe [[wikipedia:Livestock|livestock]] that are allowed to roam freely, albeit usually in an enclosure and for at least part of each day.
