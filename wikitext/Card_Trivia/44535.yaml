title: Card Trivia:Neo Signal
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's artwork is a reference to [[wikipedia:Smoke signal|smoke signals]].
  * This card has four different [[Archetype|archetypal]] counterparts appearing in the ''[[Yu-Gi-Oh! GX]]'' era:
  ** "[[Hero Signal]]" for "[[Elemental HERO]]"
  ** "[[Destiny Signal]]" for "[[Destiny HERO]]"
  ** "[[Apparition]]" for "[[Vision HERO]]"
  ** "[[SOS]]" for "[[Masked HERO]]"
  * This card's effect specifies a [[Level 4]] or lower "[[Neo-Spacian]]" monsters, even though there are no [[Main Deck]] Level 4 "Neo-Spacian" monsters.
