  * The Sun-like symbols in this card's artwork are based on a similar symbol in the card artwork of "[[Book of Taiyou]]".
  ** Fittingly, this monster's [[Quick Effect]] to change the controller's [[face-down]] [[Spellcaster]]s [[face-up]] is similar to the effect of "Book of Taiyou".
