title: Card Trivia:Pillar of the Future - Cyanos
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2024]]''.
  * This monster's name is based on ''kuáneos'', the Greek word for "blue", which serves as the origin for "[[wikipedia:Cyan|cyan]]", a blueish color.
  * This is the [[Monster Card]] version of [[Cyanos]], a character in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|9|ref}}, specifically from the panel showing Cyanos next to [[Roze (manga)|Roze]].
  ** This monster's effect [[support]]ing "[[Sky Striker Ace - Roze]]" references Cyanos' friendship with Rose in the "[[Sky Striker Ace]]" arc of the ''Yu-Gi-Oh! OCG Stories'' manga.
