  * This monster appears in the artworks of "[[Destruction Sword Flash]]" and "[[Protector Whelp of the Destruction Swordsman]]".
  * This card's name is derived from the full title given to "[[Buster Blader (manga)|Buster Blader]]" when it first appeared in {{chapter|Yu-Gi-Oh!|172|ref}} and in the original Japanese version of {{episode|Yu-Gi-Oh!|067|ref}}.
