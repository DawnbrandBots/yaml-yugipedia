title: Card Trivia:Disenchanter
wikitext: |-
  {{Navigation}}

  * This monster may be the older form of "[[Magician of Faith]]".
  ** Both monsters share a similar appearance.
  ** Both monsters share a similar Japanese naming scheme: this monster's Japanese name is "Saint Disenchanter" ({{Ruby|聖なる解呪師|セイント・ディスエンチャンター}}, ''Seinto Disuenchantā''), while the Japanese name for "Magician of Faith" is "Saint Magician" ({{Ruby|聖なる魔術師|セイント・マジシャン}}, ''Seinto Majishan'').
  ** Both monsters share an effect that places a [[target]]ed [[Spell Card]] back in the [[hand]]; this monster [[return]]s a [[face-up]] Spell Card from the [[field]] to the hand, while "Magician of Faith" [[add]]s a Spell Card from the [[Graveyard]] to the hand.
