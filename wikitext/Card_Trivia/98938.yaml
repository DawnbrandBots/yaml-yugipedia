title: Card Trivia:Regulus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ancient Sunshine]]".
  * This monster is based on [[wikipedia:Regulus|Regulus]], the brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Leo (constellation)|Leo]], which is also known as the "lion" constellation.
  * This monster has a retrained [[counterpart]]: "[[Regulus the Fairy Beast]]".
