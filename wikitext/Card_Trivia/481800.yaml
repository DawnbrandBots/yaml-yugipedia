title: Card Trivia:Supreme King Dragon Clear Wing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Soul of the Supreme King]]" and "[[Supreme King Z-ARC - Synchro Universe]]".
  * This monster is the corrupted "[[Supreme King Dragon]]" [[counterpart]] of "[[Clear Wing Synchro Dragon]]".
  ** This is the only "Supreme King Dragon" monster to have a different [[Attribute]] than its [[Four Dimensional Dragons|Dimension Dragon]] original counterpart.
  ** This is the only "Supreme King Dragon" monster to be able to [[Special Summon]] itself from the [[Graveyard]].
  ** This monster and "[[Supreme King Dragon Odd-Eyes]]" are the only "Supreme King Dragon" monsters to have a different [[Level]] than their Dimension Dragon counterparts.
  * This is the only [[DARK]] "[[Clear Wing]]" monster.
  ** It is also the only "Clear Wing" monster to have dull wings instead of glowing ones. Ironically, in the original Japanese version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime, when [[Z-ARC]] [[Synchro Summon]]ed this monster, his [[Summon chants in Yu-Gi-Oh! ARC-V#Z-ARC|Summoning chant]] includes the passage "''Kin with wings of light''".
