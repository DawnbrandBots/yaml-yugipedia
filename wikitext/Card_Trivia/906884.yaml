  {{Navigation}}

  * This card is a [[Ritual Monster|Ritual]] [[counterpart]] of "[[Disciple of Nephthys]]".
  * A glowing "[[A Feather of the Phoenix]]" appears in this card's artwork.
  * This card has the highest [[ATK]] of all [[Level 2]] monsters in the ''[[OCG]]'' and ''[[TCG]]''.
