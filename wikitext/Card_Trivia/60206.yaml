  * The [[Duelist]] in this card's artwork also appears in the artwork of "[[Assault Mode Zero]]".
  ** The Duelist is also wielding a generic [[Duel Disk#Standard Duel Disks|New Domino City Duel Disk]].
  * The different equipment in this card's artwork represent the armor that "[[/Assault Mode]]" monsters gain.
