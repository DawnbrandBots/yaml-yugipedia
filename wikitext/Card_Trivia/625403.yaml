title: Card Trivia:Gimmick Puppet Bisque Doll
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Condolence Puppet]]" and "[[Puppet Parade]]".
  * This monster is based on a 19th century doll created from [[wikipedia:Bisque (pottery)|bisque pottery]], a white porcelain pottery heated in a kiln without a ceramic glaze.
