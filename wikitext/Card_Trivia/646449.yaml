title: Card Trivia:TA.I.med Technique
wikitext: |-
  {{Navigation|mode=nongame}}

  * [[Ai]] appears in this card's artwork.
  * This card's Japanese name is a reference to [[wikipedia:Maai|Maai]], a [[wikipedia:Japanese martial arts|Japanese martial arts]] term most often used in [[wikipedia:Kendo|kendo]] referring to the space between two opponents in combat.
  ** This card's name and artwork are likely a reference to ''[[wikipedia:Iaido|iaido]]'', a Japanese martial art that emphasizes being aware and capable of quickly drawing the sword and responding to a sudden attack.
