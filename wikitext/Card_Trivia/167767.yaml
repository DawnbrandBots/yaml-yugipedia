title: Card Trivia:Galaxy-Eyes Photon Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Photon Shockwave]]'', and is also one of the cover cards of ''[[Duelist Pack: Kite]]'', ''[[Collectible Tins 2011 Wave 2]]'', ''[[25th Anniversary Tin: Dueling Heroes]]''. and ''[[Battles of Legend: Monster Mayhem]]''.
  ** This is the first non-[[Extra Deck]] [[Booster Pack]] cover card since ''[[Crimson Crisis]]''.
  * This monster appears in the artworks of "[[Galaxy Barrier]]", "[[Galaxy Burst]]", "[[Galaxy Expedition]]", "[[Galaxy Hundred]]", "[[Galaxy Zero]]", "[[Kite Token]]", "[[Lord of the Tachyon Galaxy (card)|Lord of the Tachyon Galaxy]]", "[[Miracle Galaxy]]", "[[Numbers Last Hope]]", "[[Photon Current]]", "[[Photon Escape]]", "[[Photon Stream of Destruction]]", "[[Photon Wing]]", and "[[Triangle Evolution]]".
  * This monster has multiple forms:
  ** A younger form: "[[Galaxy-Eyes Cloudragon]]".
  ** A [[Link Monster|Link]] counterpart: "[[Galaxy-Eyes Solflare Dragon]]".
  ** 2 [[retrained]] counterparts: "[[Galaxy-Eyes Afterglow Dragon]]" and "[[Galaxy-Eyes Photon Change Dragon]]".
  ** A "[[Cipher]]" counterpart: "[[Galaxy-Eyes Cipher Dragon]]".
  ** An upgraded Xyz form: "[[Galaxy-Eyes Full Armor Photon Dragon]]".
  ** An upgraded Chaos form: "[[Neo Galaxy-Eyes Photon Dragon]]".
  ** An upgraded "[[Number]]" form: "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]".
  ** An upgraded "[[Number C]]" form: "[[Number C62: Neo Galaxy-Eyes Prime Photon Dragon]]".
  * True to its name, this monster's eyes have a [[wikipedia:Spiral galaxy|spiral galaxy]]-like pattern.
  * This is the [[signature card]] of [[Kaito Tenjo (manga)|Kaito Tenjo]] (and his [[Kite Tenjo|anime counterpart]]) in ''Yu-Gi-Oh! ZEXAL'' [[Yu-Gi-Oh! ZEXAL (manga)|manga]] and [[Yu-Gi-Oh! ZEXAL|anime]].
  ** This card has the same [[ATK]] (3000) as the signature cards of the rivals from the other ''[[Master Duel]]'' anime series: [[Seto Kaiba]]'s "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]", [[Chazz Princeton]]'s "[[Armed Dragon LV10 (anime)|Armed Dragon LV10]]", [[Jack Atlas]]'s "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]", [[Declan Akaba]]'s "[[D/D/D Doom King Armageddon (anime)|D/D/D Doom King Armageddon]]", and [[Roken Kogami|Varis]]'s "[[Borreload Dragon (anime)|Borreload Dragon]]".
  *** This monster also shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (8), [[Type]] ([[Dragon]]), and [[original DEF]] (2500) as "Blue-Eyes White Dragon".
  **** This monster's [[attack name]], "Photon Stream of Destruction", is also very similar in name and appearance to "[[Burst Stream of Destruction]]", the attack name of "Blue-Eyes White Dragon".
  **** Similar to "Blue-Eyes White Dragon's" evolved form, "[[Blue-Eyes Ultimate Dragon]]", this monster's evolved form, "Neo Galaxy-Eyes Photon Dragon", features three heads and has an original ATK of 4500.
  *** Furthering its similarities to "Red Dragon Archfiend", in the original Japanese version of the ''Yu-Gi-Oh! ZEXAL'' anime, Kite calls this monster "Ore no tamashii" (lit. "My soul"), which is similar to what Jack Atlas calls "Red Dragon Archfiend" in the Japanese version of the ''Yu-Gi-Oh! 5D's'' anime.
  *** This monster also shares another similarity with "Blue-Eyes White Dragon" and "Red Dragon Archfiend", in that they are depicted facing the opposite direction of their rival counterparts.
  * The design of "[[Galaxy Dragon]]" greatly resembles this monster; in the ''Yu-Gi-Oh! ZEXAL'' manga, [[Hishakaku]] considered it as "a monster designed to combat Galaxy-Eyes", as indicated by its [[Galaxy Dragun (manga)|manga effect]] and the effect of "[[Dragon Buster]]".
  * In the ''Yu-Gi-Oh! ZEXAL'' anime and the manga, when this monster is Summoned, it appears as a four-sided star that absorbs all light around it, and then takes the form of this monster.
  ** This is similar to the neutral form of the "[[Number]]" monsters. This is fitting, given this monster's [[Number 62: Galaxy-Eyes Prime Photon Dragon|true form]] is a "Number" monster.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, after this monster is Summoned, its body remains its basic dull, purple color until it steals [[Xyz Material]]s, which then makes the scales and jewels on its body light up and glow brightly. In ''[[Yu-Gi-Oh! Duel Links]]'', its in-game model depicts it with green skin instead.
  * According to [[Astral]], this monster has light dwelling within it similar to [[Astral World|his own world]]. In the international dubbed version of the ''Yu-Gi-Oh! ZEXAL'', Astral says he had seen the dragon before. This may be why it has a rivalry with "[[Number 107: Galaxy-Eyes Tachyon Dragon]]", which is a monster from [[Barian World]].
  * Since its second appearance in the ''Yu-Gi-Oh! ZEXAL'' anime, this monster has been reusing the roar of "Stardust Dragon", along with the roars of "[[Shooting Star Dragon]]" and "[[Shooting Quasar Dragon]]".
  * In the Facebook game "Social Empires", there is a dragon based on this card called "[https://web.archive.org/web/20161104071728/http://socialempires.wikia.com:80/wiki/Galaxy_Dragon Galaxy Dragon]".
