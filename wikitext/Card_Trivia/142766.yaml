title: Card Trivia:Element Dragon
wikitext: |-
  {{Navigation}}

  * The members of the [[Element]] series always depict the monsters' color scheme and respective card artworks to correspond with the [[Attribute]]s they gain their effects from; in this case of this monster, it is [[FIRE]] and [[WIND]].
  ** This monster's color scheme features a red-colored body (FIRE), and green-colored belly and wings (WIND).
  ** This card's artwork depicts molten lava (FIRE) and gusts of wind emanating from this monster's wingbeats (WIND).
