title: Card Trivia:Digital Bug Registrider
wikitext: |-
  {{Navigation}}

  * This monster's name and appearance are puns on "strider" (short for "[[wikipedia:Gerridae|water strider]]", a species of insects known for their ability to move across the surface of water) and "register" (a small, high-speed storage location within the computer used to hold data and instructions for quick access by the computer).
