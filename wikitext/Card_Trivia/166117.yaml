title: Card Trivia:D.D. Jet Iron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Change to Jet Iron]]".
  ** This monster's ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] is an alteration of the effect of "Change to Jet Iron", which can [[Special Summon]] this monster by [[Tribute|Tributing]] "[[D.D. Esper Star Sparrow]]", "[[Beast-Warrior Puma]]", "[[Phoenix Beast Gairuda]]", and "[[Ironhammer the Giant]]".
  * This monster's [[original ATK]] in the ''OCG''/''TCG'' (4000) is equal to half the combined original [[ATK]] of "Esper Star Sparrow", "Beast-Warrior Puma", "Phoenix Beast Gairuda" and "Ironhammer the Giant" (8000), which it gains via its effect in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
