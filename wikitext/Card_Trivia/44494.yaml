title: Card Trivia:The Creator Incarnate
wikitext: |-
  {{Navigation}}

  * The circular ornament on the backs of this monster and "[[The Creator]]" appears to be the visual inspiration for the symbol on the tip of the staff of "[[Herald of Creation]]".
  ** This is supported by the fact that this card and "The Creator" appeared in [[Rise of the Dragon Lords Structure Deck|the same product]] that "Herald of Creation" debuted in, as well as the theme of "creation" these monsters share.
  ** The same symbol appears as the weapon [[wikipedia:Hilt|pommels]] for "[[Divine Dragon Knight Felgrand]]", "[[Guardian of Felgrand]]", and "[[Paladin of Felgrand]]", as well as the sword crossguard for "[[Dragon Knight of Creation]]" (another "creation"-themed monster).
  * This card's name and effect seems to suggest that this card is the human incarnation or avatar of "The Creator".
