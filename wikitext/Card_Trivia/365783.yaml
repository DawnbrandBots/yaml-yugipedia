title: Card Trivia:Yosenju Tsujik
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Yosenju Shinchu L]]" (as a carving), "[[Yosenjus' Sword Sting]]", and "[[Yosenju Wind Worship]]".
  * This card's Japanese name is a pun based on the words "[[wikipedia:Tsujigiri|tsujigiri]]" ("crossroad killing") and "tsujikaze" (whirlwind).
  * This monster bears a strong resemblance to Himura Kenshin, the main character of the manga/anime "Rurouni Kenshin", known as "Samurai X" in the West. This monster's clothes even has 3 visible "X" marks, and it is using Battoujutsu technique, which is also used by Himura Kenshin.
