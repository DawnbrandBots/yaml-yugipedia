title: Card Trivia:Trance the Magic Swordsman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Enhanced Counter]]".
  * This monster is the older counterpart of "[[Neo the Magic Swordsman]]", as indicated by the name, similar flavor text and appearance.
  * This card shares the highest [[ATK]] of all [[Level 6]] [[Normal Monster]]s with "[[Frostosaurus]]" and "[[Light Bringer Lucifer]]".
  ** The aforementioned monsters also have the highest ATK of all Level 6 monsters without a [[Summoning condition]].
