title: Card Trivia:PSY-Framegear Gamma
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[PSY-Frame Circuit]]".
  * The steel frame on this monster's head is similar to the design of "[[Ally of Justice Catastor]]".
  * "[[PSY-Framelord Omega]]" is this monster equipped to "[[PSY-Frame Driver]]", along with "[[PSY-Framegear Alpha]]", "[[PSY-Framegear Beta]]", "[[PSY-Framegear Delta]]" and "[[PSY-Framegear Epsilon]]".
