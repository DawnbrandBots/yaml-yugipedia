title: Card Trivia:Extra Plorer
wikitext: |-
  {{Navigation}}

  * "[[Space Fusion - Extra Plasma]]" is an [[Card evolutions|upgraded]] form of this monster.
  ** Both monsters share a similar design, and their card artworks feature a nearly identical pose and background.
  ** This monster is also a required [[Fusion Material]] for the [[Fusion Summon]] of "Space Fusion - Extra Plasma".
