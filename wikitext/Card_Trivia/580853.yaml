title: Card Trivia:Potato & Chips
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Farm Delivery]]" and "[[Soul Unseal]]".
  * This card's artwork depicts Potato and Chips, the mascots of [[wikipedia:Calbee|Calbee]], a Japanese brand of potato chips.
  ** Both mascots are shown lounging on the couch eating potato chips; this is a pun on the term "[[wikipedia:Couch potato|couch potato]]", which describes a person spending most of their time sitting or laying on the couch.
