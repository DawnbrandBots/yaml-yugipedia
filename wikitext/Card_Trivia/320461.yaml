title: Card Trivia:Nekroz of Catastor
wikitext: |-
  {{Navigation}}

  * This monster is "[[Exa, Enforcer of the Nekroz]]" wearing armor based on "[[Ally of Justice Catastor]]".
  ** This monster shares the same [[Level]], [[ATK]], [[DEF]] as the aforementioned monster and also has a similar [[Effect]].
  * This monster is the first level 5 [[Ritual Monster]].
  * "[[Nekroz Mirror]]" appears in this card's artwork on his chest, the same as his previous form.
  * This is the first "[[Nekroz]]" monster to be [[Dragon-Type]].
