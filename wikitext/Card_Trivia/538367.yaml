title: Card Trivia:Return Zombie
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[D - Mind]]", "[[Damage Summon]]", and "[[Immortal Class]]".
  * This monster shares similarities with "[[Reborn Zombie]]":
  ** Both share the same [[Attribute]] ([[DARK]]), [[Level]] (4), [[Type]] ([[Zombie]]), and [[original ATK and DEF]] (1000/1600).
  ** Both feature an effect that only [[activate]]s if the player has cards in their [[hand]].
  ** Both were used by [[Chazz Princeton]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
