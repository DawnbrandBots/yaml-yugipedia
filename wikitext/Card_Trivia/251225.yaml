title: Card Trivia:Antidote Nurse
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster appears in the artwork of "[[Service Puppet Play]]".
  ** This monster was released nearly 2 months after the release of "Service Puppet Play" in the Japanese ''[[OCG]]''.
  * This monster's Japanese name, "Vaccingale" is a portmanteau of "[[wikipedia:Vaccine|vaccine]]" and the renowned English nurse [[wikipedia:Florence Nightingale|Florence Nightingale]].
  ** This monster's Japanese name is based on an [[wikipedia:Antivirus software|antivirus software]], a computer program used to prevent, detect, and remove malware, which is also known as a "vaccine".
  ** This monster's Italian name ("Tempesta di Vaccino") is based on another interpretation of the Japanese name, "Vaccine Gale".
  * This is the first [[anime-only|anime-exclusive]] card featured in ''[[Yu-Gi-Oh! ZEXAL World Duel Carnival]]'' to be released in the ''OCG''/''[[TCG]]''.
