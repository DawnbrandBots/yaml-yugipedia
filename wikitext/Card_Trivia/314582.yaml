title: Card Trivia:Abyss-scale of the Kraken
wikitext: |-
  {{Navigation}}

  * This armor appears in the artwork of "[[Mermail King - Neptabyss]]".
  * This armor is named after the [[wikipedia:Kraken|Kraken]], a sea monster from Scandinavian folklore that resembles a giant cephalopod.
  * This armor's orange color scheme and this card's effects reference how [[Effect Monster|Effect]] [[Monster Card]]s feature an orange card border.
