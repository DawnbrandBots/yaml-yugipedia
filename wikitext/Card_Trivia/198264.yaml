title: Card Trivia:Champion's Pulse
wikitext: |-
  {{Navigation}}

  * A [[Duel Priest]] appears in this card's artwork, using the [[Blazing Soul]] power.
  ** The same Duel Priest appears in the artwork of "[[King's Consonance]]".
  * This card's Japanese name, "{{translated name|Champion's Pulse|ja}}" ({{name|Champion's Pulse|ja}}, ''{{romanized name|Champion's Pulse|ja}}'') is derived from a passage of Jack Atlas's [[Synchro Summon]]ing [[Summon chants in Yu-Gi-Oh! 5D's#Jack Atlas|chant]] for "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime: ''The ruler's heartbeats now form a line!'' (王者の鼓動、今ここに列をなす '''''Ōja no kodō''', ima koko ni retsu o nasu'').
