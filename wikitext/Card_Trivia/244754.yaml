title: Card Trivia:Xyz Remora
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Remora|remora]], a species of fish also known as the "suckerfish".
  ** This monster's [[detach]]ing and [[Special Summon]]ing effects reflect the nature of the remora to accompany larger species of aquatic life and feed off of their scraps.
  ** However, this monster's design is based on a [[wikipedia:Hammerhead shark|hammerhead shark]] instead.
