title: Card Trivia:Megalith Phaleg
wikitext: |-
  {{Navigation}}

  * This monster's shattered pieces appear in the artwork of "[[Megalith Unformed]]".
  * This monster is based on [[wikipedia:Olympian spirits|Phaleg]], one of the seven [[wikipedia:Olympian spirits|Olympian spirits]].
  * This monster is a [[Card evolutions|transformed]] version of "[[Megalith Ophiel]]".
  ** This monster is emerging from the bottom of the base of "Ophiel".
  * This monster has a combined form with "[[Megalith Aratron]]" and "[[Megalith Bethor]]": "[[Megalith Phul]]".
