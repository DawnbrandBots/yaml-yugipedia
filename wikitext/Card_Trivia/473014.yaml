title: Card Trivia:Invoked Mechaba
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Merkabah mysticism|Merkabah]], also spelled Merkaba, is the [[wikipedia:divine light|divine light]] vehicle allegedly used by [[wikipedia:ascended master|ascended masters]] (or [[wikipedia:angel|angels]]) to connect with and reach those in tune with the higher [[wikipedia:Plane (esotericism)|realms]], according to the [[wikipedia:Spirituality|spiritual]] teachings in [[wikipedia:sacred geometry|sacred geometry]] and the [[wikipedia:New Age|New Age movements]]. "''Mer''" means "Light". "''Ka''" means "[[wikipedia:Spirit|Spirit]]". "''Ba''" means "[[wikipedia:Physical body|Body]]". ''Mer-Ka-Ba'' means the spirit/body surrounded by counter-[[wikipedia:rotation|rotating]] fields of light, (wheels within wheels), [[wikipedia:spiral|spirals]] of [[wikipedia:energy|energy]] as in [[wikipedia:DNA|DNA]], which [[wikipedia:Transport phenomena|transports]] spirit/body from one [[wikipedia:dimension|dimension]] to another.{{Citation needed}} It is depicted as a rotating [[wikipedia:Stellated octahedron|Star Tetrahedron]].
