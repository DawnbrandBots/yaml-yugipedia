title: Card Trivia:Cyber Harpie Lady
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Alluring Mirror Split]]".
  * Visually, this monster is "[[Harpie Lady 1]]" [[equip]]ped with "[[Cyber Shield]]" and "[[Electro-Whip]]". Accordingly, its name is a reference to the former.
  ** Its appearance is based on two ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga panels depicting "[[Harpy Lady (manga)|Harpy Lady]]": its lower body and its left arm wielding "Electro-Whip" are based on a panel from {{chapter|Yu-Gi-Oh!|115|ref}} showing "Harpy Lady" equipped with "[[Electro-Whip (manga)|Electro-Whip]]" alongside "[[Harpies' Pet Dragon (manga)|Harpies' Pet Dragon]]", right after the latter was Summoned; its head, hair, upper right arm, and chest are based on one from {{chapter|Yu-Gi-Oh!|116|ref}}, showing "Harpy Lady" with "[[Shadow of Eyes (manga)|Shadow of Eyes]]" being used on it.
  ** Ironically, "Harpie Lady" cannot normally be equipped with "Electro-Whip" in the ''[[OCG]]''/''[[TCG]]''.
  ** This card's [[ATK]] (1800) is based on the ATK of "Harpie Lady" (1300) increased by "Cyber Shield". Strangely, its [[DEF]] (1300) is lower than that of "Harpie Lady" (1400).
  *** The [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] versions of "[[Harpie Lady 2 (Bandai)|Harpie Lady 2]]" and "[[Harpie Lady 3 (Bandai)|3]]" also have 1800 ATK and are depicted wearing "[[Cyber Shield (Bandai)|Cyber Shield]]", making them conceptually similar to this card.
  * This card has a [[signature move]] [[Synchro Monster|Synchro]] [[counterpart]]: "[[Cyber Slash Harpie Lady]]".
  * This is the only [[Effect Monster]] to have its whole text written between parentheses.
