title: Card Trivia:Qlimate Change
wikitext: |-
  {{Navigation}}

  * "[[Naturia Sacred Tree]]" appears in this card's artwork, along with the "[[Qli]]phort" [[wikipedia:Sephirot|sephirot]] tree as seen in the artworks of "[[Qlipper Launch]]" and "[[Saqlifice]]".
  ** The event shown in this card's artwork is preceded by that shown in "Qlipper Launch", and followed by the event shown in "Saqlifice".
  * The base of this card's Japanese name translates to "Hidden Machine Husks".
  * This card’s TCG name is a pun on "Climate Change".
