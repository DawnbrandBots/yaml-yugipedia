title: Card Trivia:Mystical Knight of Jackal
wikitext: |-
  {{Navigation}}

  * This monster appears on the artwork of "[[Lighten the Load]]".
  * This monster is based on [[wikipedia:Jackal|jackals]] in Egyptian mythology, which is associated with [[wikipedia:Anubis|Anubis]], the Egyptian god associated with embalmment and death.
  ** This card's effect reflects this, as it is able to return the opponent's monster from the [[Graveyard]] to the top of their [[Deck]].
  * This card has a counterpart: "[[Ghost Knight of Jackal]]".
  * Although the monster itself is based on Egyptian mythology, the weapons in its hands are [[wikipedia:Katar (dagger)|katars]], which originated in India.
