title: Card Trivia:Doomblaze Fiend Overlord Despairacion (R)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Corruption of the Blaze Fiends]]".
  ** This monster appears in the artworks of "[[Blaze Fiend Assault]]" and "[[Doomblaze Despair]]" in [[Maximum Mode]] (together with "[[Doomblaze Fiend Overlord Despairacion (L)|Doomblaze Fiend Overlord Despairacion [L]]]" and "[[Doomblaze Fiend Overlord Despairacion]]").
  * This card and its other pieces are the first [[Maximum Monster]]s to have effects that can be used even when not in Maximum Mode.
  ** This and the [L] piece are also the first side pieces of a Maximum Monster to be [[Level]] 10.
