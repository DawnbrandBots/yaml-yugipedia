title: Card Trivia:UFOroid Fighter
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Tempest]]" appears in this card's artwork.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, "[[Elemental Hero Tempest (anime)|Elemental Hero Tempest]]" and "[[UFOroid (anime)|UFOroid]]" were used as this card's [[Fusion Material]]s.
  ** Interestingly, in the ''[[OCG]]''/''[[TCG]]'' this card was released about three months prior to "Tempest".
  * This monster is the ''Yu-Gi-Oh! GX'' [[counterpart]] of "[[Dark Flare Knight]]" or "[[Black Skull Dragon]]" from the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (manga)|anime]].
  ** The three are the [[Fusion Monster]]s of one of the protagonist's monster ("Tempest" for [[Jaden Yuki]] and "[[Dark Magician (anime)|Dark Magician]]" for [[Yugi Muto]]) and their best friend's monster ("[[UFOroid (anime)|Uforioid]]" for [[Syrus Truesdale]] and "[[Flame Swordsman (anime)|Flame Swordsman]]" or "[[Red-Eyes B. Dragon (anime)|Red-Eyes Black Dragon]]" for [[Joey Wheeler]]).
  ** Both this monster and "Black Skull Dragon" debuted in a [[Tag-Team Duel]] against the [[Paradox Brothers]] and were instrumental in defeating them.
