title: Card Trivia:Violet Witch
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[Wikipedia:Viola (plant)|violet]], a genus of flowering plants known for their blue and violet colors.
  * This monster has a [[retrain]]ed counterpart: "[[Vengeful Witch]]".
  * This monster shares similarities with "[[Witch of the Black Forest]]":
  ** Both monsters the same [[Attribute]] ([[DARK]]), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (1100/1200).
  ** Both monsters share a similar effect that allows the player to add a monster with 1500 [[DEF]] from the [[Deck]] to the [[hand]] when they are [[sent]] to the [[Graveyard]].
