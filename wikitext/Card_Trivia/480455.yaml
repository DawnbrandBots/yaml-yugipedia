title: Card Trivia:Speedroid Marble Machine
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Marble (toy)|marbles]], a small spherical object made of hardened earthen materials, steel, or plastic that is commonly used as toys.
  ** This monster's Japanese name (ビーダマシーン, ''Bīdamashīn''), is a portmanteau of the words "marble" (ビー玉, ''bīdama'') and "[[machine]]" (マシーン, ''mashīn'').
  *** This monster's Japanese name and humanoid appearance are likely a pun on "[[wikipedia:B-Daman|B-Daman]]" (ビーダマン, ''Bīdaman''), a Japanese marble-shooting franchise which features humanoid-shaped toys with a cavity in the chest to house and launch specifically-made marbles.
