title: Card Trivia:Transam Diskarma Linac
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Diskarma Ritual]]".
  * "Diskarma" (ディスカルマ, ''Diskaruma''), might be a reference to Disc Armor (ディスクアーマ, ''Disuku Āma''), a recurring enemy from the ''[[wikipedia:Castlevania|Castlevania]]'' franchise that uses a chained grinding-wheel weapon similar to the weapon this monster wields.
  ** This monster's name is also a homage to "[[Transam Praime Armor Nova]]", the [[signature card]] of [[Kuaidul Velgear]], both of which he used during his Duel against [[Yudias Velgear]] in {{episode|GO RUSH!!|135|ref}}.
  * This monster is an [[Counterpart|upgraded]] [[Ritual Monster|Ritual]] form of "[[Transam Linac]]".
  * This is the first Ritual Monster, as well as the first [[Level 11]] monster, in ''[[Yu-Gi-Oh! Rush Duel]]''.
  * This is the first and last Ritual Monster to be [[Ritual Summon]]ed in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
