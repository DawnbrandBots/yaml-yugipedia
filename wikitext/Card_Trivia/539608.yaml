title: Card Trivia:Metal Guardian
wikitext: |-
  {{Navigation}}

  * Despite this monster's name and appearance, it is a [[Fiend]] monster rather than a [[Machine]] monster.
  * This is the only monster used by the [[Player Killer of Darkness (manga)|Player Killer of Darkness]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ([[PaniK]] in the [[Yu-Gi-Oh! (anime)|anime]]) whose [[ATK]] and [[DEF]] are divisible by 50.
  * In the ''Yu-Gi-Oh!'' manga, the [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai Official Card Game]], and in certain video games, this monster's [[original ATK and DEF]] is 1500/2800.
  * This card's [[Metal Guardian (Bandai)|Bandai]] version is a [[Level 6]] [[Warrior]] monster with an original ATK and DEF of 1500/2800, while the [[Konami]] version is a [[Level 5]] Fiend monster with an original ATK and DEF of 1150/2150.
