title: Card Trivia:Black Rose Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Crossroads of Chaos]]'', and is also one of the cover cards of ''[[Duelist Saga]]'', the ''[[Collectible Tins 2008 Wave 2]]'', ''[[Legendary Duelists: Season 2]]'', ''[[25th Anniversary Tin: Dueling Heroes]]'', and ''[[Synergy Pack 01: Syncro Acceleration]]''.
  ** This is the only card that was reprinted two times with "DUEL TERMINAL" written on it without actually being in one of the ''[[Duel Terminal]]'' sets.
  * This monster appears in the artworks of "[[Black Rose Garden]]" (as a statue), "[[Blooming of the Darkest Rose]]", "[[Crimson Dragon Quetzacoatl]]", "[[Frozen Rose]]", and "[[Synchro Overtop]]".
  * This monster's name appears to contradict its appearance, given that the [[wikipedia:Rose|roses]] which adorn its body are red rather than black. However, this monster's main body features a black color scheme, and the name can be taken as a more literal description of this monster's nature.
  * This is the [[signature card]] of [[Akiza Izinski]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's name references Akiza's alter-ego, the "Black Rose".
  ** This monster's design reflects how Akiza is beautiful in appearance but dangerous in nature.
  ** This monster's first effect to [[destroy]] all cards on the [[field]] when [[Synchro Summon]]ed references Akiza's psychic abilities, which had the power to materialize her cards into physical form, which caused harm to those around her.
  ** This monster's second effect to force an opponent's [[Defense Position]] monster to [[Attack Position]] and reducing its [[ATK]] to 0 reference both her brutality and her ability to critically injure anyone she [[Duel]]ed as the "Black Rose".
  ** This is first and one of the two signature cards of a female lead to be a Dragon monster, the other being [[Yuamu Ohdo]]'s "[[Blue-Fang Burst Dragon]]".
  * This monster has four alternate forms:
  ** A [[Duel Dragon]] [[Yu-Gi-Oh! 5D's (manga)|manga]] counterpart: "[[Black Rose Moonlight Dragon]]".
  ** A retrained [[Plant]] counterpart: "[[Bramble Rose Dragon]]".
  ** An [[Card evolutions|upgraded]] form: "[[Ruddy Rose Dragon]]".
  ** An upgraded "[[/Assault Mode]]" form: "[[Black Rose Dragon/Assault Mode]]".
  * This is the only monster to have been a [[featured card]] in an anime more than any other card, being featured four times.
  * This was the first [[Signer Dragon]]:
  ** to be [[Limited]], on [[September 2009 Lists|September 1, 2009]]. It went back to [[Unlimited]] [[September 2010 Lists|one year later]].
  ** whose effect relates to a specific [[Type]] and the first to have a specific support card, "[[Thorn of Malice]]".
  ** to be [[Level 7]] instead of [[Level 8]], followed later by "[[Ancient Fairy Dragon]]".
  ** to have never been used against any of the "[[Meklord]]" monsters at least once, because Akiza never battled any of the [[Three Pure Nobles]] or [[Aporia]] himself.
  ** to be depicted with a moveable iris in the anime.
