title: Card Trivia:Ultimate Conductor Tyranno
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Tyranno's Rage]]''/''[[Dinosmasher's Fury Structure Deck]]''.
  * This monster appears in the artwork of "[[Survival's End]]".
  * This monster is a [[retrained]] [[counterpart]] of "[[Super Conductor Tyranno]]" and "[[Ultimate Tyranno]]", as well as "[[Black Tyranno]]" and "[[Tyranno Infinity]]".
  ** This monster's effect to attack all of the opponent's monsters once each is based on the effect of "Ultimate Tyranno", while its effect to inflict 1000 damage to the opponent is based on the effect of "Super Conductor Tyranno". The monster's [[Summoning condition]] is based on the effect of "Tyranno Infinity".
  * This monster has the highest [[original DEF]] (3200) of all [[Dinosaur]] monsters.
