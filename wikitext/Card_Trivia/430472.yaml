title: Card Trivia:Mistaken Accusation
wikitext: |-
  {{Navigation}}

  * "[[Sangan]]" and "[[Witch of the Black Forest]]" appear in this card's artwork.
  ** Both monsters sharing the same cell is a reference to both having similar effects, as well both being on the [[Forbidden]] list at the time of this card's release.
  * This card's artwork continues from the events depicted in the card artwork of "[[Mistaken Arrest]]", where "Sangan" was arrested after the cab he entered in the artwork of "[[Shared Ride]]" turned out to have a "[[Pot of Greed]]" inside.
