title: Card Trivia:Comic Hand
wikitext: |-
  {{Navigation}}

  * This hand appears in the artwork of "[[Comic Cat]]".
  ** As seen in that card's artwork, this hand is likely based on a specific type of toy that originated from the [[wikipedia:Ultra Hand|Ultra Hand]], which utilizes the concept of the "lazy tongs" [[wikipedia:pantograph|pantograph]] principle to grab things.
  * This is the first card in the ''[[OCG]]''/''[[TCG]]'' that can grant a monster an [[ability]].
