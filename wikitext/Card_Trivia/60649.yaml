title: Card Trivia:Counterbalance
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's artwork and effect are based on [[Money and Knife]], the first [[Shadow Game (manga)|Shadow Game]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]]. In this game, [[Dark Yugi]] and [[Tetsu Ushio (manga)|Tetsu Ushio]] each used a knife to stab a stack of cash on the top of their hand and keep any number of bills they collected. The game ends until the money is gone or when the player stabs their own hand and forfeits their winnings.
