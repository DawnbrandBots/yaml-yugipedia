title: Card Trivia:D/D/D First King Clovis
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Clovis I|Clovis I]], the first king of the [[wikipedia:Franks|Franks]] to unite all the Frankish tribes under one ruler.
  ** The end of this monster's spear and the design of this monster's throne are shaped like a ''[[Wikipedia:Fleur-de-lis|fleur-de-lis]]'', a heraldic charge in the shape of a stylized lily that is representative of France both throughout history and in the modern era. This further references how Clovis I is regarded in French historiography as "the first king of what would become France."
  * This monster has the same hairstyle as [[Riley Akaba]], the adoptive younger sister of [[Declan Akaba]], who uses the "[[D/D]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
