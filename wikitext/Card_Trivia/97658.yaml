title: Card Trivia:Vindikite R-Genex
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "vindicate" and "kite".
  ** This monster's name is also likely play on the German pronunciation of the word "wind", with the letter "w" pronounced as the letter "v".
  ** This monster's appearance is also likely based on a [[wikipedia:Kite (bird)|kite]], the common name for a species of bird of prey.
