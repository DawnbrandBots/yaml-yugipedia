title: Card Trivia:Thousand-Eyes Restrict
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for the international version of ''[[Pharaoh's Servant]]'' and ''[[Thousand Eyes Bible]]'', and is one of the cover cards of ''[[Structure Deck: Pegasus]]'' and the box of ''[[Duelist Legacy Volume.3]]''.
  * This monster appears in the artworks of "[[Detonating Kuriboh]]", "[[Extra Net]]", and "[[Summon Gate]]".
  * This monster has 2 [[retrained]] counterparts: "[[Millennium-Eyes Restrict]]" and "[[Nightmare-Eyes Restrict]]".
  * Despite its name, this monster's design features fifty-six visible eyes, including the main golden eye, the two green eyes, and eyes that can only be partially seen.
  ** This monster's golden eye resembles the [[Millennium Eye]], which was famously used, along with this monster, by [[Maximillion Pegasus]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This is the first [[Fusion Monster]] to be [[Limited]] and the first to be [[Forbidden]].
  ** It is also the first Fusion Monster to be [[Semi-Limited]], though only in the ''[[OCG]]''.
  * This is the first Fusion [[Effect]] [[Effect Monster|Monster]].
  * This is the first Fusion Monster to list a [[Ritual Monster]] as [[Fusion Material]].
  * This is the only Fusion Monster that shares the same [[Attribute]], [[Type]], [[Level]], and [[ATK]]/[[DEF]] as all of its Fusion Materials.
  * This was the first Level 1 Fusion Monster, and was the only Level 1 Fusion Monster until the release of "[[Fullmetalfoes Alkahest]]", nearly 16 years later.
  * This was the first card to be printed in [[Ultimate Rare]].
  * The lore from this card's original print did not mention that the equipped monster is destroyed instead when this card would be destroyed by battle.
