title: Card Trivia:Frenzied Panda of the Bamboo Forest
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed ''[[Rush Duel]]'' counterpart of "[[Frenzied Panda (Rush Duel)|Frenzied Panda]]".
  ** This monster's association with the [[War-Lion]] [[series]] is based on how, in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, "Frenzied Panda" was one of the monsters required to [[Ritual Summon]] "[[Super War-Lion]]".
