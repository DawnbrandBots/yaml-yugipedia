title: Card Trivia:The Virtuous Vestals
wikitext: |-
  {{Navigation}}

  * "[[Dogmatika Ecclesia, the Virtuous]]", "[[Dogmatika Fleurdelis, the Knighted]]" (without her armor), and the skeletal monks from the artwork of "[[White Relic of Dogmatika]]" appear in this card's artwork.
  ** This card's name is a reference to how "Ecclesia" and "Fleurdelis'" were formerly the two "saints" of the "[[Dogmatika Nation]]".
  ** This card's [[flavor text]] (''Sometimes like a kind sister, sometimes like a strict teacher. The bond is always there, even while far apart.'') is also a reference to their sisterly relationship, spanning 10 years, with "Ecclesia" possibly being "Fleurdelis'" squire, according to the former's concept art.

  * This card's artwork is adapted into {{episode|CARD GAME THE CHRONICLES|3|ref}}, specifically the scene where [[Ecclesia]] and [[Fleurdelis]] recall the promise they made together long ago.
