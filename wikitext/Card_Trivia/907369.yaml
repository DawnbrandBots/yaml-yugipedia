title: Card Trivia:Kamaleon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Circle of Wrath]]" and "[[Fire Wrath]]".
  * This monster's name is a portmanteau of the Japanese word for "scythe" (カマ, ''kama'') and "chameleon" (カメレオン, ''kamereon'').
  * This monster has a [[Praime]] [[counterpart]]: "[[Praime Kamaleon]]".
