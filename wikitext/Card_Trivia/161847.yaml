title: Card Trivia:Snoww, Unlight of Dark World
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark World Puppetry]]".
  * This monster's name is a pun on "[[wikipedia:Shades of white|snow white]]", a term often used to describe something that is a pure white color.
  ** The character 「白諾」 in this monster's Chinese name is a combination of 「白」 ("white") and 「諾」 (''nuò''), and is a [[wikipedia:Transcription into Chinese characters|transcription]] of the [[wikipedia:Phoneme|phoneme]] sequence /noʊ/ as in "s'''now'''").
  * This monster has a "[[Lightsworn]]" counterpart: "[[Weiss, Lightsworn Archfiend]]".
  ** This monster's name is based on the color white, similar to how Weiss's name is based on the German word for "white" (''Weiß'').
  ** This monster's [[original ATK and DEF]] (1700/0) are the inverse of Weiss's (0/1700).
