title: Card Trivia:Kochobo's Hinamatsuri
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:ja:人形神|Kochobo]], a cursed doll possessed by a thousand spirits in Toyama Prefecture folklore.
  * The monster is based on the [[wikipedia:Empress of Japan|Empress]] doll used in ''[[wikipedia:Hinamatsuri|Hinamatsuri]]'', a religious Shinto holiday celebrated annually on the 3rd of March in Japan, which involves platforms covered in red carpet material used to display ornamental dolls (including the Empress) and a folded screen used as the backdrop.
  * This monster is featured as limited-time [[List of Yu-Gi-Oh! Master Duel accessories|accessories]] in ''[[Yu-Gi-Oh! Master Duel]]'' on March 1, 2025, in celebration of ''Hinamatsuri'' before this card debuted in the game.
