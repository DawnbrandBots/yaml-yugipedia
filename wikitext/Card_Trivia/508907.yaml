title: Card Trivia:Brave Attack
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The cards "[[Buster Blader]]", "[[Gazelle the King of Mythical Beasts]]", and "[[Obnoxious Celtic Guard]]" appear in this card's artwork.
  ** Fittingly, the above-mentioned cards are used by [[Yami Yugi]], who used this card in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** The sword-wielding monster in this card's artwork heavily resembles "[[Lava Battleguard]]" and "[[Swamp Battleguard]]" (the only existing "[[Battleguard]]" monsters when this card debuted), as reinforced by its bushy hair, its fur-covered forearms, its horns, and its muscular build.
