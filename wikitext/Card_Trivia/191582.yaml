  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Pack Volume 2]]''.
  * This card's name is a [[wikipedia:Palindrome|palindrome]] in all languages it has been released in.
  * According to ''[[Valuable Book 15]]'', this card was made to commemorate the [[wikipedia:Dragon (zodiac)|Year of the Dragon]], as this card was released in 2012.
