title: Card Trivia:Abyss-sphere
wikitext: |-
  {{Navigation}}

  * "[[Mermail Abysslinde]]" appears in this card's artwork.
  ** According to the [[Master Guide 4 card storylines#File No. 01: The Great Battle Raging between Fire and Water in the South Seas|''Master Guide 4'' card storylines]], "Abysslinde" is being eliminated by the "[[Atlantean]]" forces for trying to oppose to their usage of the power of "[[Mermail Abyssgaios]]" in the fight against the "[[Fire King]]" monsters.
  *** Fittingly, the last part of this monster's effect can [[trigger]] the effect of "Mermail Abysslinde" to [[Special Summon]] a "[[Mermail]]" monster from the [[Deck]], when she is [[destroy]]ed on the [[field]]. If a [[Level 7]] monster is Summoned, it can be used with "[[Poseidra, the Atlantean Dragon]]" already on the field as [[Xyz Material]]s to [[Xyz Summon]] "Mermail Abyssgaios", which is said to require a sacrifice in the card storylines.
