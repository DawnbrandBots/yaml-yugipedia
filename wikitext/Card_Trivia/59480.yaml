title: Card Trivia:Water of Life
wikitext: |-
  {{Navigation}}

  * This card is based on the fairy tale, ''[[wikipedia:The Water of Life (German fairy tale)|The Water of Life]]'', in which a trio of prince brothers were tasked to retrieve the water from the [[wikipedia:Fountain of youth|fountain of youth]] to cure their dying father, the king.
  ** This card's effect of [[Special Summon]]ing a monster from the [[Graveyard]] references the magic of the fountain of youth, which could not only restore the youth of whoever drinks the water, but could also cheat death.
