title: Card Trivia:Armored Zombie
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Army of the Haunted]]" and "[[Ectoplasmic Fortification]]".
  * This monster is the [[Zombie counterpart]] of "[[Zanki]]".
  ** In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], this monster was "Zanki" affected by "[[Call of the Haunted]]".
  ** In {{episode|Yu-Gi-Oh!|079|ref}}, this card was seen as a [[Normal Monster]], like in the ''[[OCG]]''/''[[TCG]]''.
  * This monster, "[[Clown Zombie]]" and "[[Dragon Zombie]]" are the only Zombie counterparts to have two [[Level]]s less than their original counterparts.
