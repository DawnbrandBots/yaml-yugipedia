title: Card Trivia:Water Spirit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Tuner's Barrier]]" and "[[Spirit Sculptor]]" (albeit frozen).
  * This monster has an [[retrain]]ed counterpart: "[[Tuning Gum]]".
  * This is one of the few cards in the game that refers to the real world.
