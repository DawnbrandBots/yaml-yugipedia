title: Card Trivia:Magician of Faithfulness
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2024]]''.
  * This monster is a [[retrained]] counterpart of "[[Magician of Faith]]".
  ** This monster has twice the [[original ATK and DEF]] of "Magician of Faith", as well as a [[Flip effect]] that can add a [[Spell Card]] from its controller's [[Graveyard]] to the [[hand]], then Special Summons itself or "Magician of Faith" from the Deck.
  ** This monster's English, Italian, and Japanese names incorporate their respective languages' names for "Magician of Faith".
  *** "Saincred" in this monster's Japanese name is a portmanteau of the words "saint" and "sacred".
