title: Card Trivia:Performapal Coin Dragon
wikitext: |-
  {{Navigation}}

  * This kanji of this card's Japanese name, "Entermate Drago Remora" (ＥＭ小判竜) features the characters used for ''[[wikipedia:Koban (coin)|koban]]'' (小判), an ovular gold coin used in Edo period feudal Japan.
  ** Fittingly, this monster's appearance is based on a [[wikipedia:Japanese dragon|Japanese dragon]] with the features of a [[wikipedia:Common remora|common remora]] fish and a gold koban coin on top of its head.
