title: Card Trivia:Evilswarm Golem
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legacy of the Valiant: Deluxe Edition]]''.
  * This card is the "[[lswarm]]" counterpart of "[[Ally of Justice Catastor]]".
  ** This card has 50 less [[ATK]] and 50 more [[DEF]] than "Ally of Justice Catastor".
  ** This card has a similar effect to "Ally of Justice Catastor", except it has a Level restriction and can only be used once per turn.
