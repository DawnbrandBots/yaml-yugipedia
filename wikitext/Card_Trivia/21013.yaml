title: Card Trivia:Polymerization
wikitext: |-
  {{Navigation|other=[[Polymerization (alternate password)|Alternate password]]}}

  * "[[Elemental HERO Avian]]", "[[Elemental HERO Burstinatrix]]", and a copy of this card appears in this card's third ''[[OCG]]''/''[[TCG]]'' artwork.
  ** This card's third ''OCG''/''TCG'' artwork is a parody of this card's second ''OCG''/''TCG'' artwork.
  ** This card's third ''OCG''/''TCG'' artwork is based on how in the ''[[Yu-Gi-Oh! GX]]'' anime, [[Jaden Yuki]] would commonly use this card to [[Fusion Summon]] "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" using both "[[Elemental Hero Avian (anime)|Elemental Hero Avian]]" and "[[Elemental Hero Burstinatrix (anime)|Elemental Hero Burstinatrix]]" as [[Fusion Material]].
  *** This card's third artwork mirrors the artwork of "[[Dark Fusion]]", another card used by Jaden (specifically his past life as the [[The Supreme King|Supreme King]]) which depicts "Avian" and "Burstinatrix" preparing to become Fusion Material for another [[Fusion Monster]] that mentions the pair's names, being "[[Evil Hero Inferno Wing (anime)|Evil Hero Inferno Wing]]".
  * The creatures in this card's artwork appear in the artwork of "[[Flash Fusion]]", "[[Greater Polymerization]]", "[[Harmonic Synchro Fusion]]", "[[Instant Fusion]]", "[[Montage Fusion]]" (as silhouettes), "[[Penetration Fusion]]", and "[[Ready Fusion]]".
  * This card appears in the artwork of "[[Fusion Destruction]]", "[[Fusion Grab!]]", "[[Fusion Recovery]]", "[[Fusion Substitute]]", and "[[Hope for the Future]]".
  ** This card's artwork, or an altered version of its artwork, appears in the artwork of "[[Anti-Fusion Device]]", "[[Double Fusion]]", "Harmonic Synchro Fusion", "[[Mixeroid]]", and "[[Revoke Fusion]]".
  *** The background of this card's artwork appears in the artworks of "[[Fossil Fusion]]", "[[Fusion Tag]]", and "[[Ultra Polymerization]]".
  * This card's ''TCG'' name is based on the process of [[wikipedia:Polymerization|polymerization]] in [[wikipedia:polymer chemistry|chemistry]], in which two or more molecular units can be fused into large chains of units called [[wikipedia:polymer|polymers]], reflecting this card's effect to fusing two or more monster to form a [[Fusion Monster]].
  * "[[Synchro Fusionist]]" is based on the molten form of the fiendish monster in the right part of this card's artwork.
  * This card has a ''[[Rush Duel]]'' counterpart with a similar artwork: "[[Fusion (Rush Duel)|Fusion]]".
  * This card has a [[Skill Card]] counterpart: "[[Fusion Party!]]".
  * This card and "[[Dark Magician]]" are the only cards to have different [[password]]s for [[Polymerization (alternate password)|alternate artwork]].
  ** This card's second artwork was used in the international dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** This card's second artwork depicts a copy of this card with alternate artwork in the center of the two monsters moving towards it, which reflects the process of this card's Fusion Summoning effect.
  *** This card's second artwork is the only card to feature an image of itself in its own artwork.
  ** Despite it being edited for its international release, the copy of this card in its second international artwork was left untranslated.
  * This is one of the first [[Spell Card]]s seen on-screen in the ''Yu-Gi-Oh!'' anime, along with "[[Block Attack]]", "[[Mooyan Curry]]", "[[Red Medicine]]", and "[[Remove Trap]]".
  * This card has the most [[errata]] of any card in the ''OCG'', with eight different errata.
  ** This card is one of the few cards whose errata made the text longer. The original text did not explain how to conduct the Fusion Summon.
  * Prior to ''[[Yu-Gi-Oh! VRAINS]]'', this was one of three cards to have appeared in every [[Nihon Ad Systems|''Yu-Gi-Oh!'' NAS]] anime series and film, the others being "[[Mystical Space Typhoon (anime)|Mystical Space Typhoon]]" and "[[Mirror Force (anime)|Mirror Force]]". Out of those three cards, this is the only card to have been ''played'' in all of them.
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this card's Japanese name (ゆうごう, ''Yūgō'') serves as the basis for a running gag where [[Yugo]] is repeatedly mistaken as an ally of the [[Fusion Dimension]].
