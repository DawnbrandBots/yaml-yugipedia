title: Card Trivia:Deskbot 002
wikitext: |-
  {{Navigation}}

  * Being a "[[Deskbot]]" monster, this monster is made up of various objects you could normally find on/in a desk, specifically with a "correction implement" theme.
  ** A [[wikipedia:Mechanical pencil|mechanical pencil]] with an attached eraser and a supportive metal tip (as its "gun")
  ** A cylindrical eraser holder, with an equipped eraser (as its "wristblade")
  ** 2 [[wikipedia:Correction tape|correction tape]] containers (as its feet)
  ** [[wikipedia:Eraser|Erasers/rubbers]]
  *** Spare eraser refills (attached near its waist)
  *** Two dual erasers (attached to its helmet)
  *** Various other erasers protruding from its body
  * The number 002 can be seen on this monster's helmet.
  * This monster appears in the artwork of "[[Deskbot Jet]]", behind one of the panels to the right of "[[Deskbot 005]]".
