title: Card Trivia:Abduction
wikitext: |-
  {{Navigation}}

  * "[[Great Angus]]" appears in this card's artwork.
  ** The events depicted in this card's artwork continues in the artwork of "[[Beast Soul Swap]]".
  *** Due to the Japanese name of the aforementioned card ("Cattle Mutilation"), this card's name references the theory around [[wikipedia:Cattle mutilation|phenomenon of the same name]], in which it conjectured that an extraterrestrial being is being involved.
