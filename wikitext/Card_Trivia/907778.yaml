title: Card Trivia:Scoop Scooter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Automatic Accident Prevention]]", "[[Breaking News!]]", and "[[Reporting from the Scene!]]".
  * This monster's Japanese name, "Delivery Machine Whirr" ({{Ruby|配|はい}}{{Ruby|達|たつ}}マシン・ブーン, ''Haitatsu Mashin Būn'') is a pun on the Japanese word for "newspaper" (新聞, ''shinbun'').
