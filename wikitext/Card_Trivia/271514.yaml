title: Card Trivia:Spell Wall
wikitext: |-
  {{Navigation}}

  * "[[Gishki Noellia]]", "[[Gishki Avance]]", "[[Gishki Emilia]]" and "[[Gishki Zielgigas]]" appear in this card's artwork - all the human "[[Gishki]]s" being Spellcaster-Type.
  ** "Gishki Noellia" is seen using her magic to protect "Gishki Emilia" and "Gishki Avance" from "Gishki Zielgigas".
  ** The ''magic shield'' that "Noelia" is using is the symbol of the "[[Ice Barrier]]".
  * This takes place after "Gishki Noellia" is freed from the "Evilswarms" as seen in "[[Constellar Meteor]]", and immediately following the events of "[[Aquamirror Cycle]]".
  ** "Gishki Noellia" no longer has the Aquamirror. She gives it to "Avance" and "Emilia" and is later used to help create "[[Evilswarm Kerykeion]]"
  ** She appears to be going back to her Ice Barrier origins by destroying the monster she created (Gishki Zielgigas), using Ice Barrier magic instead of the Aquamirror.
