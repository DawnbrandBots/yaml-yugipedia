title: Card Trivia:Magic Drain
wikitext: |-
  {{Navigation}}

  * This card may be considered a counterpart to "[[Soul of Purity and Light]]" due to their seemingly similar images depicting the opposite to each other. "[[Magic Drain]]" having a demon sucking the life out of a man and "[[Soul of Purity and Light]]" is an angel soothing someone.
  * The image in this card appears to be a [[wikipedia:Succubus|Succubus]] draining the life from a man as a reference to this card's name and effect.
