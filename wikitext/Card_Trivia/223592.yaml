title: Card Trivia:Empress of Prophecy
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * This monster appears in the artwork of "[[Spellbook of Judgment]]" and "[[Spellbook of Miracles]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Empress (tarot card)|The Empress]].
  ** This monster's Japanese name, "Trice", is derived from the French word for "empress", ''impératrice''.
  ** This monster's shield is a reference to the heart-shaped stone depicted on The Empress Tarot card from the [[wikipedia:Rider-Waite Tarot|Rider-Waite Tarot]]. This could be proved by the orb on this monster's shield, which appears to form the [[wikipedia:Planet symbols#Venus|symbol]] for the planet [[wikipedia:Venus|Venus]], which is also depicted on the Tarot card.
  * This monster's scepter and earrings bear a resemblance to the [[Emperor's Key]]. It shares the trait of having such an item with two other "[[Prophecy]]" monsters - "[[Emperor of Prophecy]]" and "[[Hierophant of Prophecy]]".
  ** These three monsters appear to be in the same "room". The thrones of this monster and "Emperor" face each other, while the throne of "Hierophant" is between them.
