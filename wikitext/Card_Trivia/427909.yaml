title: Card Trivia:Kozmo Strawman
wikitext: |-
  {{Navigation}}

  * "[[Kozmo Farmgirl]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Kozmo Tincan]]".
  * This monster is a combination of the [[wikipedia:Scarecrow (Oz)|Scarecrow]] from ''[[wikipedia:The Wizard of Oz (1939 film)|The Wizard of Oz]]'' and [[wikipedia:C3-PO|C3-PO]] from ''[[wikipedia:Star Wars|Star Wars]]''.
  ** This card's artwork depicts this monster encountering "Kozmo Farmgirl" and her robotic canine companion. This references a scene in ''The Wizard of Oz'' where [[wikipedia:Dorothy Gale|Dorothy Gale]] and her dog [[wikipedia:Toto (Oz)|Toto]] (whom "Kozmo Farmgirl" and the robotic canine are based on) first encounter the Scarecrow
  * The フォルミート (Forumīto) part of this card's Japanese name may be a [[wikipedia:Language change|corruption]] of the Latin word ''[[wiktionary:formido#Noun|formido]]'', which as a noun can mean "scarecrow".
