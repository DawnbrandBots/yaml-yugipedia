title: Card Trivia:Cyber Jar
wikitext: |-
  {{Navigation}}

  * This monster has a [[retrain]]ed ''[[Rush Duel]]'' [[Magnet Warrior (Rush Duel)|Magnet Warrior]]-related [[counterpart]]: "[[Magnet Citadel Jar]]".
  * Despite this monster's name and appearance, it is actually a [[Rock]] monster instead of a [[Machine]] monster.
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, when this monster's effect activates, its eye would open and create a powerful vacuum that would suck in all of the other monsters on the [[field]] before it self-destructed. In some episodes, instead of vacuuming up the monsters, this monster would fire a laser beam from its eye and destroy all monsters before vanishing itself.
