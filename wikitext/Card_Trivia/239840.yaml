title: Card Trivia:Emperor of Prophecy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spellbook of Knowledge]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Emperor (tarot card)|The Emperor]].
  ** This monster's Japanese name, "Empereur", is based on the French word for "emperor".
  * This monster's scepter bears a resemblance to the [[Emperor's Key]]. It shares the trait of having such an item with two other "[[Prophecy]]" monsters - "[[Empress of Prophecy]]" and "[[Hierophant of Prophecy]]".
  ** These three monsters appear to be in the same "room". The thrones of this monster and "Empress" face each other, while the throne of "Hierophant" is between them.
