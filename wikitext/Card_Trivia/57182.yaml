title: Card Trivia:Cactus Fighter
wikitext: |-
  {{Navigation}}

  * This monster's design is based on the [[wikipedia:Opuntia|prickly pear cactus]], a genus of watering cactus which feature flat pads and are known for producing fruit and flowers.
  * This monster has the highest [[original ATK]] for a [[Level 4]] [[Plant]] monster.
  * This monster shares similarities with "[[Cactus Bouncer]]":
  ** Both monsters share the same [[Attribute]] ([[EARTH]]), [[Level]] (4), and [[Type]] (Plant).
  ** Both monsters feature high [[ATK]] and low [[DEF]] with a difference of 1500.
  ** Both monsters were initially released as [[TCG-only|''TCG''-exclusive]] cards.
  *** Ironically, despite the similarities between both monsters, the effect of "Cactus Bouncer" prevents this monster from Special Summoning "[[Needle Token]]s".
