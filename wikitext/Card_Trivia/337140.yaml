title: Card Trivia:Dreamland
wikitext: |-
  {{Navigation}}

  * A statue of "[[Elder Entity N'tss]]" appears in this card's artwork.
  * This card is based on the [[wikipedia:Dreamlands|Dreamlands]], a vast alternate dimension that can only be accessed in dreams in [[wikipedia:H. P. Lovecraft|H. P. Lovecraft]]'s [[wikipedia:Cthulhu Mythos|Cthulhu Mythos]].
