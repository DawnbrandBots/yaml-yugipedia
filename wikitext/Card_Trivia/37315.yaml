title: Card Trivia:Plaguespreader Zombie
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Certain Death Promotion]]", "[[Quarantine]]", "[[Return of the Zombies]]", and "[[Uni-Song Tuning]]".
  * This card appears in the artwork of "[[Hand Configuration]]".
  * This monster is likely based on ''[[wikipedia:Nuppeppō|Nuppeppō]]'', a [[wikipedia:Yōkai|yōkai]] in Japanese folklore who is depicted as an undead amorphous being that wanders aimlessly, spreading its odor of rotten flesh.
  ** This is reinforced by the "plague spreader" theme of this monster and by the fact it has not a defined form, being composed by parts of many different creatures.
  *** While most of this monster's body features aren't identifiable parts of specific monsters, its right arm appears to be that of "[[Koalo-Koala]]" and its left arm appears to be that of "[[Berserk Gorilla]]".
  * This is the first [[Zombie]] [[Tuner monster]].
  * Fitting its Zombie [[Type]], this monster is required for the [[Synchro Summon]] of three [[Synchro Monster]]s that are [[Zombie counterpart]]s of existing monsters: "[[Archfiend Zombie-Skull]]", "[[Doomkaiser Dragon]]", and "[[Revived King Ha Des]]".
  ** From 2008 with the release of ''[[Crossroads of Chaos]]'', to 2016 with the release of ''[[Breakers of Shadow]]'', the three aformentioned monsters were the only Legal Zombie Synchro Monsters in the ''[[TCG]]'', meaning that all Zombie Synchro Monsters required "Plaguespreader Zombie" as [[material]] during that period of time.
  * This monsters shares many similarities with "[[Pain Painter]]" and "[[Mad Mauler]]":
  ** They have the same [[Attribute]] ([[DARK]]), [[Level]] (2), Type (Zombie/Tuner) and [[original ATK and DEF]] (400/200).
  ** Both "Pain Painter" and "Mad Mauler" feature effects that allows them to treat their names as this monster.
