title: Card Trivia:Evil Dragon Ananta
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Shesha|Ananta Shesha]], the king of the [[wikipedia:Nāga|Nagas]] described as a seven-headed serpent in [[wikipedia:Hindu mythology|Hindu mythology]].
  ** This monster's mandatory effect to [[destroy]] a card on the [[field]] at the end of each turn is based on the belief that Ananta Sesha is responsible for the end of each [[wikipedia:Kalpa (aeon)|Kalpa]], the time period allotted to the earth.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|021|ref}}, specifically from the panel showing [[Ananta the Snake Dragon|this monster]] being Summoned.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Target]] and [[Destroy]] a card on the [[Field]] during the [[End Phase]], is based on the usage of the effect of the [[Spell Card]] "[[Sneak Attack]]" in the Yu-Gi-Oh! GX chapter 21: "[[Yu-Gi-Oh! GX - Chapter 021|Enemies on the Move!]]". In this chapter, [[Seika Kohinata]] uses the Spell, which allowed "Ananta" to attack and destroy the [[Defense Position]] [[Monster]] "[[Elemental Hero Terra Firma]]" outside the [[Battle Phase]].
  ** In the OCG/TCG, it is not possible for a monster to attack outside the Battle Phase. Instead, the effect enables to Target and Destroy a card on the Field during the End Phase, which technically emulates what happened to "Terra Firma" in the manga chapter.
