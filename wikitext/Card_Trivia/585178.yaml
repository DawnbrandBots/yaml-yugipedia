title: Card Trivia:Kingyo Sukui
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]", "[[Goblin Calligrapher]]", and the goblin boy from the artwork of "[[Gift Exchange]]" appear in this card's artwork.
  ** Additionally, the goblin boy is wearing a mask of "[[Super Quantum Red Layer]]".
  * This card's name and artwork are based on [[wikipedia:Goldfish scooping|goldfish scooping]], a traditional Japanese festival game.
  ** This card's effect further references this, with the objective of [[Excavate|"scooping" up]] a monster from the top of the [[Deck]] with the same [[Attribute]] as the [[target]]ed monster in the opponent's [[Graveyard]]; this card acts as the "net", and "breaks" by [[destroy]]ing itself if the excavated card does not match.
