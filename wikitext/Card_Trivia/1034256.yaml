title: Card Trivia:Tenpai Dragon Chundra
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sangen Kaimen]]".
  * This monster is based on the ''hóng zhōng'' tile (红中), a [[wikipedia:Mahjong|mahjong]] tile written with the character meaning "red center" that is also known as the "red dragon" tile.
  ** This monster's Japanese name, "Chundora" (チュンドラ, ''Chundora'') is a portmanteau of the words used for the ''zhōng'' tile (チュン, ''chun'') and the shortened word for "dragon" ('''ドラ'''ゴン, '''''dora'''gon'').
  ** "Chun" is close to the Mandarin Wades-Giles phonetic spelling for 中 ''zhōng'', being Chung.
  * This monster has two combined "[[Sangen]]" [[Synchro Monster]] forms:
  ** "[[Sangenpai Bident Dragion]]" (combined with "[[Tenpai Dragon Paidra]]")
  ** "[[Sangenpai Transcendent Dragion]]" (combined with "Paidra" and "[[Tenpai Dragon Fadra]]")
