title: Card Trivia:Divine Golden Shadow Dragon Dragluxion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Duelists of Brilliance]]'' and ''[[Maze of the Master]]''.
  * This monster is a [[retrain]]ed counterpart of "[[Number 46: Dragluon]]".
  ** The base kanji used for this monster's Japanese title, "Gold Dragon", can be read in Chinese as "Jīnlóng" (金龍), referencing the character [[Jinlong]], who used "Dragluon" and is revealed to be its spirit in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's name is a portmanteau of the words "Dragluon", "lux", and "[[wikipedia:Fluxion|fluxion]]".
  *** "Lux" is based on the Latin word for "light", which reflects this monster's [[LIGHT]] [[Attribute]].
  *** "Fluxion" is based on a function corresponding to the rate of change of a variable quantity. It was introduced as a derivative of time by English philosopher [[wikipedia:Isaac Newton|Sir Isaac Newton]].
  ** Alternatively, this monster's name is a portmanteau of "dragon", and "[[wikipedia:luxon|luxon]]". The latter refers to any particle that travels at the speed of light in a vacuum, such as photons and gluons.
  ** Visually, this monster is "Dragluon" wearing the gold-colored variation of the armor plating of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]", both of which this monster can [[Special Summon]] with its effect. The armor also resembles that of "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]".
