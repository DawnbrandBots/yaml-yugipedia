title: Card Trivia:Rock Band Xenoguitar
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words [[wikipedia:Xenotime|xenotime]], a rare-earth mineral, and [[wikipedia:Guitar|guitar]].
  ** This monster's name is also a reference on the [[wikipedia:Rock music|wikipedia:Rock music]], as the monster features various motif of the music genre and a literal rock .
