title: Card Trivia:Eldlich the Mad Golden Lord
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Eldlich the Golden Lord]]"
  ** The artwork of "[[Seven Cities of the Golden Land]]" depicts "Eldlich the Golden Lord" transforming into this monster.
  ** This monster's [[original ATK and DEF]] (3800/3500) are the reverse of the original ATK and DEF of "Eldlich the Golden Lord" after they were increased by 1000 via its effect (3500/3800).
  * This monster's Japanese name, "El Rey Conquista Eldlich", translates to "The Conquest King Eldlich", with "''Rey''" and "''Conquista''" being the Spanish words for "king" and "conquest", respectively.
  * This monster has the highest original [[DEF]] (3500) of all [[Zombie]] monsters.
