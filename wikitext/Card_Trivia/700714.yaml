title: Card Trivia:Void Apocalypse
wikitext: |-
  {{Navigation}}

  * The most identifiable figures in this card's artwork are "[[Reeshaddoll Wendi]]", "[[Nekroz of Valkyrus]]" "[[Nekroz of Gungnir]]", "[[Zefraath]]", and "[[Tierra, Source of Destruction]]".
  ** One may also look much closer at the artwork for the smaller figures; they appear to be:
  *** "[[Ritual Beast Ulti-Cannahawk]]" (on the left side of the art of Wendi, identified by [[Ritual Beast Tamer Elder|a figure wearing red cape]], riding [[Spiritual Beast Cannahawk|a giant bird with yellow leg]]), and
  *** "[[Nekroz of Decisive Armor]]" (appears below the art of Wendi, identifiable as a tailed creature with some armor and a giant cannon on its back).
