title: Card Trivia:Runick Destruction
wikitext: |-
  {{Navigation}}

  * "[[Hugin the Runick Wings]]" and "[[Munin the Runick Wings]]" appear in this card's artwork.
  ** The proto-Germanic rune [[wikipedia:Haglaz|Haglaz]] (ᚺ) also appears on the yellow gemstone of the right hand gauntlet in this card's artwork.
  * This card may be based on [[wikipedia:Járngreipr|Járngreipr]], which in [[wikipedia:Norse mythology|Norse mythology]] are the iron gloves of the thunder god [[wikipedia:Thor|Thor]] that allow him to wield [[wikipedia:Mjölnir|Mjölnir]].
