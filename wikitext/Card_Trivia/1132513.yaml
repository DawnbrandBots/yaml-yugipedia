title: Card Trivia:Psychic Omnibuster
wikitext: |-
  {{Navigation}}

  * This monster is based on a Ghostbuster, a member of the titular group in the [[wikipedia:Ghostbusters (franchise)|''Ghostbusters'' franchise]], as indicated by the following:
  ** It is wielding a weapon similar in appearance to a {{Fandom|ghostbusters|Particle Thrower|Neutrona Wand}}, being connected by a hose to back-mounted reservoirs, similar to the back-mounted [[wikipedia:Proton pack|proton pack]].
  ** Its wielded weapon is discharging a wavy energy beam, which is similar to the wavy {{Fandom|ghostbusters|Proton Stream|proton streams}} in the ''Ghostbusters'' franchise.
  ** Its name contains "buster", just as the name "Ghostbusters" does.
  * The colors of the liquids inside the reservoirs on this monster's back correspond to the [[card type]]s referenced by its effect: [[Effect Monster]] (orange), [[Spell]] (green), and [[Trap]] (purple).
