title: Card Trivia:Despian Quaeritis
wikitext: |-
  {{Navigation}}

  [[File:DespianQuaeritis-ConceptArt.png|thumb|right|300|This monster's concept art.]]

  * This monster appears in the artworks of "[[Branded in Central Dogmatika]]", "[[Branded Opening]]", and "[[Dogmatikaturgy]]".
  * This card is named after the Latin question ''[[wikipedia:Quem quaeritis?|Quem quaeritis?]]'' ("whom do you seek?"), spoken by angels to the [[wikipedia:The Three Marys|Three Marys]] seeking [[wikipedia:Jesus|Jesus Christ]] in the first known liturgical drama.
  ** "[[Guiding Quem, the Virtuous]]" represents the other half of the question.
  * This monster is the possessed armor of "[[White Knight of Dogmatika]]" ("[[Dogmatika Fleurdelis, the Knighted]]").
  * This monster has an evolved form: "[[Granguignol the Dusk Dragon]]".
  * This monster's concept art notes the following:
  ** It was created from the darkness within the discarded armor of "Fleurdelis", with a dragon-like form resulting from that darkness being released.
  ** The blade of its spear, created from the sword and shield of "Fleurdelis", can spring open into a sword and snap shut on the prey.
  ** It can shift between bipedal and quadrupedal (similar to that of a dragon or lizard) stances.
  ** It is twice as tall as "[[Dogmatika Maximus]]".
  * This card is similar to the [[Albaz Dragon]] series:
  ** It is a Level 8 [[Fusion Monster]] with 2500 ATK.
  ** This monster is draconic, as noted in its concept art.
  ** It can be [[Fusion Summon]]ed by using "[[Aluber the Jester of Despia]]" or "[[Fallen of Albaz]]" as [[Fusion Material]]s.
  ** Its effect of [[add]]ing to the player's [[hand]], or [[Special Summon]]ing, "Fallen of Albaz" or a "[[Despia]]" monster from the [[Deck]] is similar to the Albaz Dragons' effects of adding, or Special Summoning, a card of their related archetype or "Fallen of Albaz" from the Deck.
  *** However, this card's effect activates immediately if it [[leaves the field]] [[face-up]] because of an opponent's card effect, unlike the Albaz Dragons, whose effects only activate during the [[End Phase]] of the turn they were sent to the [[GY]].
