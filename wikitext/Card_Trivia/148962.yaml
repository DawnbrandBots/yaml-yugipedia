title: Card Trivia:Laval Stennon
wikitext: |-
  {{Navigation}}

  * This monster appears to be Synchro Summoned using "[[Laval Cannon]]" and "[[Vylon Stella]]". The head of "Vylon Stella" appears on this monster's chest.
  ** This card's name ("Stennon") is a portmanteau of "Stella" and "Cannon".
  * This card shows that the [[Laval]]s and the [[Vylon]]s have joined forces to fight against their common enemy, the [[Steelswarm]], in the [[Duel Terminal]] story.
