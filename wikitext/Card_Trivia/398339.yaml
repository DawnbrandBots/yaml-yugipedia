title: Card Trivia:Performapal Fireflux
wikitext: |-
  {{Navigation}}

  * The Japanese pronunciation of this card's name {ホタルクス ''Hotarukusu'') is a portmanteau of the Japanese word for "firefly" (蛍 ''Hotaru'') and the pronunciation of "lux" (ルクス ''Rukusu'').
  ** "Lux" is the Latin word for "light", reflecting this card's [[LIGHT]] [[Attribute]] and this monster's design, which feature a light bulb in place of its abdomen.
