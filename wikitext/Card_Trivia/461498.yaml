title: Card Trivia:Abyss Actor - Funky Comedian
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abyss Actor's Injury]]", "[[Abyss Actors Back Stage]]", "[[Abyss Actors' Curtain Call]]", "[[Abyss Actors' Dress Rehearsal]]", "[[Abyss Improv]]", "[[Abyss Playhouse - Fantastic Theater]]", "[[Set Rotation]]", and "[[Stand In]]".
  * This card's name is based on a [[wikipedia:comedian|comedian]], a term used in [[wikipedia:acting|acting]] to describe a person who seeks to entertain the audience by making them laugh through jokes or comical situations.
