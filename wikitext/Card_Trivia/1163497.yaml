title: Card Trivia:Qadi of the Monumenthes
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Preparations for the Monumenthes Festival]]".
  * This monster's name is derived from [[wikipedia:Qadi|Qadi]], the Arabic word to refer to a magistrate or judge of a [[wikipedia:Sharia|Sharia]] court.
