title: Card Trivia:Speed World
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card has two upgraded versions: "[[Speed World 2]]" and "[[Speed World Neo]]".
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this card allowed the [[Dark Signer]]s to Summon their "[[Earthbound Immortal]]s" during [[Turbo Duel]]s, as their effects rely on [[Field Spell Card]]s to prevent them from being [[destroy]]ed via their own effects, while this card cannot be [[remove]]d from the [[field]].
