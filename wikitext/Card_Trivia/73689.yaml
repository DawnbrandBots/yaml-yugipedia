title: Card Trivia:Herald of Creation
wikitext: |-
  {{Navigation}}

  * The seal on the ground in this card's artwork also appears in the artwork of "[[Testament of the Arcane Lords]]".
  * This monster's garments are based on the appearance of "[[Felgrand Dragon]]".
  * The symbol on the tip of this monster's staff appears to be based on the circular ornament on the backs of "[[The Creator]]" and "[[The Creator Incarnate]]".
  ** This is supported by the theme of "creation" these monsters share, as well as the fact that those two monsters also appeared in the ''[[Rise of the Dragon Lords Structure Deck]]'', in which this monster also debuted.
  ** This symbol also serves as the weapon [[wikipedia:Hilt|pommels]] of "[[Divine Dragon Knight Felgrand]]", "[[Guardian of Felgrand]]", and "[[Paladin of Felgrand]]", as well as the sword crossguard of "[[Dragon Knight of Creation]]" (another "creation"-themed monster).
  * In ''[[Yu-Gi-Oh! GX Tag Force 2]]'', this card is named "Prophet of the Creator". In the database however, it was still listed as "Herald of Creation".
