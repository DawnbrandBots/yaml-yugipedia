title: Card Trivia:Antrebellion of the Rebellion
wikitext: |-
  {{Navigation}}

  * This monster's flag appears in the artwork of "[[Antiberty Flag]]".
  * The Japanese pronunciation of "Antrebellion" (アリベリオン ''Ariberion'') is a portmanteau of the Japanese word for "ant" (蟻 ''Ari'') and "rebellion" (リベリオン ''Riberion'').
