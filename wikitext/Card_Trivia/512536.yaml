title: Card Trivia:Darkbishop Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Archfiend's Roar]]" and "[[Pandemonium]]".
  * This card is one of the six [[wikipedia:chess|chess]]-themed "[[Archfiend]]" cards that debuted in ''[[Threat of the Dark Demon World]]'' in the ''[[OCG]]'' and ''[[Dark Crisis]]'' in the ''[[TCG]]'', each one featuring [[wikipedia:chessboard|chessboard]] background, all of whom are based on a [[wikipedia:chess piece|chess piece]]. In this monster's case, it is based on the [[wikipedia:Bishop (chess)|bishop]], a hood-shaped chess piece, as this monster features a hood on its head.
  ** This card's last effect is a reference to how the bishop is mostly used in counter moves in chess.
  * This is the only chess-themed "Archfiend" monster that doesn't have its own effect and is the only one that can also support other "Archfiend" monsters in its [[die roll]] effect.
