title: Card Trivia:Vanity's Fiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Vanity's Emptiness]]" and "[[Sinister Yorishiro]]".
  * This card has two [[counterpart]]s:
  ** "[[Vanity's Ruler]]"; both have similar names and one has the other's roses underneath their robes.
  ** "[[Majesty's Fiend]]"; both are [[Level]] 6 [[Fiend]]-[[Type]] monsters with 2400 [[ATK]] that cannot be [[Special Summon]]ed, and both have in their Japanese names the word 「{{Ruby|魔人|デビル}}」 (''Debiru'', "devil").
  * This is the first [[Legend Card]] to become [[Forbidden]], as well as the first card to go from [[Unlimited]] to Forbidden in ''[[Yu-Gi-Oh! Rush Duel]]''.
