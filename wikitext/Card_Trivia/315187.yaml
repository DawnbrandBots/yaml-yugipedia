title: 'Card Trivia:Number 21: Frozen Lady Justice'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * Like other "[[Number]]" monsters associated with [[Kyoji Yagumo]], this monster is related to one of the [[wikipedia:Seven deadly sins|seven deadly sins]], more specifically, to the [[wikipedia:Anger|deadly sin of wrath]].
  ** This monster's [[WATER]] [[Attribute]], [[Aqua]] [[Type]], and ice motif are based on the proverb "[[wikipedia:Revenge|revenge is a dish best served cold]]", which is commonly associated with wrath.
  ** This monster's name and appearance both reference [[wikipedia:Lady Justice|Lady Justice]], the personification of moral force in the judiciary systems. Fittingly, in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, this monster was used in conjunction with the judiciary-themed [[Field Spell Card]] "[[Court Battle]]", and by using both Kyoji won his Duel against [[Mr. Heartland (manga)|Mr. Heartland]].
  * As with all the other "Number" monsters used by Kyoji, this card was molded to the situation at hand, being made as a direct counter to the defensive "[[No. 52: Diamond Crab King|Number 52: Diamond Crab King]]." It was also made to abuse the effect of "Court Battle" to grant it [[Xyz Material]]s to defeat Mr. Heartland in the ''Yu-Gi-Oh! ZEXAL'' manga.
  * This monster's ''[[OCG]]''/''[[TCG]]'' alternate [[Summoning condition]], which requires the player to use a [[Rank 5]] monster as Xyz Material by [[detach]]ing one of its materials, is derived from the effect of "[[Rank-Up Spider Web]]", which was used to Summon this monster in the ''Yu-Gi-Oh! ZEXAL'' manga.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|ZEXAL|034|ref}}, specifically from the panel showing [[No. 21: Frozen Lady Justice (manga)|this monster]] being Summoned, albeit holding its sword in its right hand.
