title: Card Trivia:Cobal, Excavator of Dark World
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is the "[[Dark World]]" color pun for the word [[wikipedia:Cobalt|cobalt]], an element with compounds that often produce distinctive deep blue colors.
  * This is the only "Dark World" monster alongside "[[Scarr, Scout of Dark World]]" to not feature an effect involving [[discard]]ing cards.
  ** This is also currently the only [[anime-only|anime-exclusive]] "Dark World" monster.
