title: Card Trivia:Hazy Glory
wikitext: |-
  {{Navigation}}

  * "[[Hazy Flame Basiltrice]]" appears in this card's artwork.
  * The 7 typhoons that appear in this card's artwork each match a primary color of the rainbow, save for indigo; a light blue typhoon appears in its place.
  * The 7 colored typhoons represent the 7 "[[Hazy Flame]]" monsters that was released up until "[[Cosmo Blazer]]": Hyppogrif, Cerbereus, Griffin, Sphynx, Peryton, Basiltrice and Mantikor.
