title: Card Trivia:Link Party
wikitext: |-
  {{Navigation}}

  * Clockwise from top-left: "[[Greatfly]]", "[[Wee Witch's Apprentice]]", "[[Hip Hoshiningen]]", "[[Missus Radiant]]", "[[Mistar Boy]]", and "[[Duelittle Chimera]]", appear in this card's artwork.
  ** These cards are all members of the [[Attribute Booster]] series.
  ** All six Link Monsters have different [[Attribute]]s, fulfilling the condition of this card's last effect.
  * This card's name is probably a pun of "drink party", as the monsters are having a tea-drinking party in the artwork.
  * Each effect involves a number that is 500 times the number of Attributes required to apply that effect.
