title: Card Trivia:Darkwight @Ignister
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is a younger version of "[[Dark Templar @Ignister]]".
  ** Its name is a minor variation of the ''[[OCG]]'' name of "Dark Templar": "Dark Knight".
  ** The location of its [[@Ignister]] symbol also matches "Dark Templar", the left shoulder pad.
  * This monster is the first non-[[Zombie]] "[[Wight]]" monster.
  ** It's also the first "Wight" [[Link Monster]].
