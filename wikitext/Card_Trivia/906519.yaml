title: Card Trivia:Magical Cylinders
wikitext: |-
  {{Navigation}}

  * Two "[[Magic Cylinder]]s" appear in this card's artwork, being loaded as bullets into a [[wikipedia:Cylinder (firearms)|firing cylinder]] (with an additional one already loaded).
  ** "[[Dark Magical Circle]]" appears on the [[wikipedia:Rim (firearms)|rims]] of the cylinders.
  * This card is a "Magic Cylinder" [[counterpart]] to "[[Mirror Force Launcher]]".
  ** Both cards are [[Trap Cards]] that can [[Set]] their respective Traps ("Magic Cylinder and "[[Mirror Force]]") directly from the [[Deck]], while also allowing the player to [[activate]] them the same turn.
  ** "[[Magic Cylinder (later anime)|Magic Cylinder]]" and "[[Mirror Force (later anime)|Mirror Force]]" were both used by [[Roken Kogami|Varis]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, and the set this card debuted in, ''[[Burst of Destiny]]'', prominently features cards that [[support]] Varis' Deck.
