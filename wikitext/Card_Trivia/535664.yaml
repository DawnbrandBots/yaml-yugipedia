title: Card Trivia:D - Time
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on the phrase "[[wikipedia:tea (meal)|tea time]]", keeping in relation with the European theme of the "[[Destiny HERO]]" archetype.
  ** This card's effect reflects this, as in England, "tea time" is a break period when citizens of all class go on break for tea, referenced by this card's effect to [[add]] a "Destiny HERO" monster from the [[Deck]] to the [[hand]] instead than just [[Summon]]ing it immediately.
