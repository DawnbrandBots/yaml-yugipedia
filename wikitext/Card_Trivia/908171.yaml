title: Card Trivia:Heroic Champion - Claivesolish
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Claíomh Solais|Claíomh Solais]], a sword from several Irish and Scottish Gaelic folktales.
  * This monster is a "[[Heroic Champion]]" [[counterpart]] of "[[Number 39: Utopia]]".
  ** Its first effect to prevent other monsters from being [[target]]ed for [[attack]]s references the effect of "Utopia", who can [[detach]] an [[Xyz Material]] and [[negate]] a monster's attack.
  ** This monster likely references how in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, [[Nistro]] and [[Yuma Tsukumo]] (who each used the "[[Heroic]]" archetype and "[[Number 39: Utopia (anime)|Number 39: Utopia]]", respectively) formed a close friendship, symbolized by Nistro gifting Yuma with "Heroic Champion - Excalibur" in {{episode|ZEXAL|059|ref}}.
  * This monster's effect to have the player pay [[Life Point]]s until they have 500 left and double the [[ATK]] of a monster they [[control]] at the start of the [[Battle Phase]] references the anime effect of "[[Heroic Champion - Excalibur (anime)|Heroic Champion - Excalibur]]", which requires the player to have 500 or less Life Points in order for it to attack, and detach an Xyz Material to double its ATK.
