title: Card Trivia:Simorgh, Lord of the Storm
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Elborz, the Sacred Lands of Simorgh]]" and "[[Simorgh Sky Battle]]".
  * This card's name is a reference to ''[[Structure Deck: Lord of the Storm]]'', the set in which "[[Simorgh, Bird of Divinity]]" (the first "[[Simorgh]]" card) was first released.
  * This monster is the upgraded [[Card evolutions|counterpart]] of "Simorgh, Bird of Divinity".
  * This monster has a [[DARK]] counterpart: "[[Simorgh of Darkness]]".
  * This card has a [[Link Monster]] [[counterpart]] merged with "[[Simorgh of Darkness]]": "[[Simorgh, Bird of Sovereignty]]".
