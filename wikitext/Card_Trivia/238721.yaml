title: Card Trivia:Freezing Point
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Lavalval Chain]]" and "[[Sword Breaker]]" appear in this card's artwork.
  * This card's Japanese name references [[wikipedia:Absolute zero|absolute zero]], the lowest theoretical temperature where an atom's movements stops and matter solidifies at 0 [[wikipedia:Kelvin|kelvin]], commonly measured at −273.15° [[wikipedia:Celsius|Celsius]] and -459.67° [[wikipedia:Fahrenheit|Fahrenheit]].
  ** This card's English name references "freezing point", the point where water freezes into ice at 0° Celsius, commonly measured at 32° Fahrenheit.
