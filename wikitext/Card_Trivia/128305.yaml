title: Card Trivia:Deepsea Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Deep Sea Aria]]".
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, during the [[Virtual World (arc)|Virtual World arc]], [[Gansley]] takes the form of "[[Deepsea Warrior]]" to act as his [[Deck Master]], whose Deck Master ability allows him to [[Tribute]] two monsters on his his field to redirect an opponent's attack back at their [[Life Point]]s.
  ** This card, along with "[[Robotic Knight]]", another monster used by a member of [[The Big Five]] as a Deck Master, have 1600 [[ATK]] and features a Deck Master ability to send any number of monsters to inflict effect damage to the opponent. Both of these cards, as well as "[[Nightmare Penguin]]", another Deck Master of The Big Five, are all Level 4 and have 1800 [[DEF]]. The last two Deck Masters of The Big Five, "[[Jinzo]]" and "[[Judge Man]]", are both used by the other one's opponent, have an effect to destroy a certain type of the opponent's cards on the field, are Level 6, and have 1500 DEF.
