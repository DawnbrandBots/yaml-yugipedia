title: Card Trivia:Alinsection
wikitext: |-
  {{Navigation}}

  * This card has one of the largest gaps of time between its first (and only) ''[[OCG]]'' release and its original ''[[TCG]]'' release, separated by a period of 20 years. In the ''OCG'', it was first printed in May 1999 in ''[[Booster 2]]'', while it was released in the ''TCG'' print only in August 2019, in ''[[Speed Duel Starter Decks: Ultimate Predators]]''.
  * According to ''[[The Valuable Book 1]]'', this monster seems to be food for [[Winged Beast]] and [[Beast]] monsters.
