title: Card Trivia:Bicorn Re'em
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Re'em|re'em]], a horned beast mentioned in the Hebrew Bible whose name can be translated as "[[unicorn]]".
  ** Ironically, despite the re'em being depicted as a wild ox, this monster resembles a carnivorous feline creature.
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster is used to [[Synchro Summon]] "[[Voltic Bicorn]]", a similarly-named two-horned [[Synchro Monster]] named after the two-horned bicorn, which also features a [[mill]]ing effect when it leaves the [[field]].
