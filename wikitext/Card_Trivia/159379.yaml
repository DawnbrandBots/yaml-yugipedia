title: Card Trivia:Egyptian God Slime
wikitext: |-
  {{Navigation}}

  [[File:GodSlime-JP-Manga-DM-NC-color.png|thumb|250px|"[[Slime Token (manga)|Slime Token]]" taking the appearance of "[[The God of the Obelisk]]" in the manga.]]

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Duelists of Gloom]]''/''[[Legendary Duelists: Rage of Ra]]''.
  * This monster's appearance is based on that of the "[[Slime Token (manga)|Slime Token]]" (and its [[Slime Token (Metal Reflect Slime)|anime counterpart]]) [[Special Summon]]ed by the effect of "[[Metal Reflect Slime (manga)|Metal Reflect Slime]]" (and its [[Metal Reflect Slime (anime)|anime counterpart]]) taking the form of "[[The God of the Obelisk]]" ("[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]" in the anime) in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's [[original DEF]] of 3000 is based on the effect of "Metal Reflect Slime" in the ''Yu-Gi-Oh!'' manga and anime, which can only be [[activate]]d when the player takes [[battle damage]] from an opponent's monster's attack that reduces more than half of their [[Life Point]]s, allowing them to Special Summon a "Slime Token" whose [[DEF]] is 3/4 of the opponent's monster's [[ATK]]. During [[Dark Yugi and Dark Marik's Duel (manga)|Dark Yugi and Dark Marik's Duel]] (and its [[Yami Yugi and Yami Marik's Duel|anime adaptation]]), this monster's DEF becomes 3/4 of the 4000 ATK of "Obelisk".
  ** This monster's ''[[OCG]]''/''[[TCG]]'' status as a [[Fusion Monster]] is a reference to how, in the ''Yu-Gi-Oh!'' manga and anime, [[Dark Marik (manga)|Dark Marik]] ([[Yami Marik]] in the anime) [[Fusion Summon]]ed this monster by fusing the "[[God Slime (manga)|God Slime]]" (and its [[Egyptian God Slime (anime)|anime counterpart]]) with "[[Revival Jam (manga)|Revival Jam]]" (and its [[Revival Jam (anime)|anime counterpart]]).
  * This monster's ''OCG''/''TCG'' effect to prevent itself from being [[destroy]]ed by battle is a reference to how, in the ''Yu-Gi-Oh!'' manga and anime, this monster was also treated as "Revival Jam", whose effects allowed it to be immediately [[Special Summon]]ed after being destroyed. Because of this effect, in the manga, this monster was sometimes referred to as "[[Immortal God Slime (manga)|Immortal God Slime]]", while in the original Japanese version of the anime, it was sometimes referred to as "[[Immortal Egyptian God Slime]]".
  ** This monster's ''OCG''/''TCG'' effect to prevent the opponent from [[target]]ing other monsters with attacks or card effects is a reference to the effect of "[[Jam Defender]]" in the manga and anime, which allowed all attacks and effects to be redirected to "Revival Jam". Since this monster was also treated as "Revival Jam" in the manga and anime, the effect of "Jam Defender" is also applied to it.
  * This monster's ''OCG''/''TCG'' effect to treat itself as one or three [[Tribute]]s for the [[Tribute Summon]] of a monster references how in [[Battle City Rules]], players could Tribute a single [[Fusion Monster]] to Tribute Summon another monster or activate effects that requires more than one monster, depending on the amount of [[Fusion Material]]s it has.
  ** In the manga and anime, however, this monster was Tributed by [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in the anime) via the effect of "[[Soul Taker (manga)|Soul Taker]]" (and its [[Soul Taker (anime)|anime counterpart]]) to activate a monster's effect that requires two Tributes, that being "Obelisk".
  * This monster and "[[Sun God Unification]]" are the first cards in the English ''TCG'' to use the word "God".
  * This monster's ''OCG''/''TCG'' pose is taken from a panel from {{chapter|Yu-Gi-Oh!|271|ref}} showing the "Slime Token" transforming into this monster.

