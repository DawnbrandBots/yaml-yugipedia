title: Card Trivia:Mimicat
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]] of ''[[Dragons of Legend 2]]''.
  * The cat in this card's artwork appears in the artworks of "[[Cat Confusion]]" and "[[Counter Meowsure]]".
  * This card's Japanese name is based on a [[wikipedia:Copycat|copycat]], while this card's ''[[TCG]]'' name is a portmanteau of the words "[[wikipedia:Mimicry|mimic]]" and "copycat", both of which refer to a person copying an aspect(s) of something or somebody else. This reflects this card's [[Doppelganger (manga)|original]] [[Doppleganger (anime)|lore]], which allows it to change into the form of a card on the opponent's [[field]] or [[Graveyard]].
  ** This card's name in the English version of the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], "Doppelganger", is based on the [[wikipedia:Doppelgänger|similarly-named]] term for a ghostly [[wikipedia:Apparitional experience|apparition]] that appears as a double of a living person, which reflects this card's effect to become a "doppelganger" of a card in the opponent's Graveyard or, according to this card's lore in the manga, on the opponent's field.
  * This card has a [[Monster Card]] [[counterpart]]: "[[Comic Cat]]".
