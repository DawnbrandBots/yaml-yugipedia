title: Card Trivia:Sunset Rebirth
wikitext: |-
  {{Navigation}}

  * "[[Soleil the Skysavior Angel]]" appears in this card's first artwork, depicted transforming into "[[Lua the Skysavior Angel]]".
  ** This perspective is supported by the word "Sunset" in this card's name, which is the daily disappearance of the Sun below the horizon, marking the ending of the day and the beginning of the night when the Moon appears.
  ** "[[Chaos Emperor Dragon - Envoy of the End]]" appears in this card's second artwork.
  * This is the first [[Trap Card]] to appear on the Forbidden and Limited lists in ''[[Yu-Gi-Oh! Rush Duel]]''.
