title: Card Trivia:Celebrontosaurus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Commanding Ritzy King Rex]]".
  * This monster is based on [https://en.wikipedia.org/wiki/Brontosaurus Brontosaurus], an iconic sauropod from Late Jurassic North America and the concept of [https://en.wikipedia.org/wiki/Celebrity celebrity].
  ** The flavor text on this card may be referencing the fact that Brontosaurus was considered synonymous with [https://en.wikipedia.org/wiki/Apatosaurus Apatosaurus] until 2015.
