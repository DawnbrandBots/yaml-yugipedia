title: Card Trivia:X-Saber Bruno
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Brunor|Brunor]], one of the [[wikipedia:Knights of the Round Table|Knights of the Round Table]].
  ** This monster's effect to perform a [[Synchro Summon]] during the opponent's turn may be a reference to [[Bruno]], the first character in the franchise to perform an [[Accel Synchro Summon]].
