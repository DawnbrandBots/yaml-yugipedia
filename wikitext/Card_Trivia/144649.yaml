title: Card Trivia:Windaar, Sage of Gusto
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Daigusto Eguls]]" and "[[Dust Storm of Gusto]]".
  * According to the Duel Terminal Master Guide, this monster is the father of "[[Winda, Priestess of Gusto]]" and "[[Wynn the Wind Charmer]]"; the staff in this card's artwork is similar to the one "Wynn" is holding.
  * This card has the highest ATK and Level of all non-Synchro [[Gusto]] monsters.
