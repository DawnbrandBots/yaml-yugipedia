title: Card Trivia:Judgment of Anubis
wikitext: |-
  {{Navigation}}

  * The statue in this card's artwork also appears in the artworks of "[[Curse of Anubis]]", "[[Temple of the Kings]]", and "[[Treasures of the Kings]]".
  * This card appears in the artwork of "[[Last Chance]]".
  * This card is named after [[wikipedia:Anubis|Anubis]], the [[wikipedia:Egyptian god|Egyptian god]] of death and embalming whose role is to protect the Egyptian tombs. According to [[wikipedia:Egyptian mythology|Egyptian mythology]], Anubis attended the [[Weighing of the Heart]], a ritual that determined whether a dead person's soul may pass into the afterlife or be fed to the soul-eating deity, [[Ammit]].
  ** Fittingly, in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], this card was used to counter the effect of "[[Giant Trunade]]" against "[[Temple of the Kings]]", which is based on an Egyptian tomb, thereby reflecting how this card "protected" "Temple of the Kings" from leaving the [[field]].
  * This card's original effect in the [[Judgment of Anubis (manga)|manga]] and [[Judgment of Anubis (anime)|anime]] was partially reworked in the effect of "[[Verdict of Anubis]]".
