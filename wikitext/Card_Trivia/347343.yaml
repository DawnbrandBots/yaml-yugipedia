title: Card Trivia:Performage Fire Dancer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is based on a [[Wikipedia:Hooping|hoop dancer]], a circus performer who performs dance movements while using large hoops.
  * This monster has a [[WATER]] [[counterpart]]: "[[Performage Water Dancer]]".
