title: Card Trivia:Infinite Antlion
wikitext: |-
  {{Navigation}}

  * This is a [[Monster Card]] counterpart of "[[Infinite Dismissal]]".
  ** This monster's Japanese and international names are based on the naming schemes of "Infinite Dismissal" (also known as "Messiah's Antlion Pit").
  ** This monster's [[trigger]]ed [[Special Summon]]ing effect is similar to the effect of "[[Vortex|Infinite Dismissal]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which could be [[activate]]d when an opponent's monster declared an attack.
  ** This monster's destruction [[effect]] activated when an [[Insect]] monster battles references [[Dinosaur Ryuzaki and Insector Haga's Duel (manga)|Dinosaur Ryuzaki (Rex Raptor) and Insector Haga's (Weevil Underwood's) Duel]] in the ''Yu-Gi-Oh!'' manga and anime, where Weevil activated "Infinite Dismissal", using it to trap "[[Two-Headed King Rex (anime)|Two-Headed King Rex]]" before destroying both it and the vortex with his powered-up "[[Basic Insect (anime)|Basic Insect]]".
