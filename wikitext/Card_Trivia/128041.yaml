title: Card Trivia:Malefic Divide
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Sin Cross", and effect to [[Special Summon]] a "[[Malefic]]" monster from the [[Graveyard]] and [[banish]] it during the [[End Phase]], likely reference the [[Wikipedia:Crucifixion of Jesus|crucifixion of Jesus Christ]], who was nailed to a cross and dies for the sins of humanity. Three days after his crucifixion and death, Jesus resurrected from his tomb and later ascended into [[Wikipedia:Heaven|Heaven]].
  ** Fittingly, in the ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' movie, [[Paradox]] uses this card to resurrect "[[Malefic Stardust Dragon (anime)|Malefic Stardust Dragon]]" shortly after [[Yusei Fudo]] uses the effect of "[[Stardust Dragon (anime)|Stardust Dragon]]" to Tribute itself and negate the effect of "[[Malefic Truth Dragon (anime)|Malefic Truth Dragon]]". During the End Phase of said turn, this card's effect banishes "Malefic Stardust Dragon" while at the same time, the original "Stardust Dragon" revives itself in Yusei's field.

  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the other "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
