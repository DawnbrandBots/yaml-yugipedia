title: Card Trivia:White Wing Magician
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Magician]]" [[counterpart]] of "[[Clear Wing Synchro Dragon]]".
  ** This card's name, "White Wing", and design are based on the design and color scheme of "Clear Wing".
  ** This card's [[WIND]] [[attribute]] matches that of "Clear Wing", as with the other [[Z-ARC Magician]] cards.
  ** This card is a [[Tuner monster]], so it can be used as [[Synchro Material]] to [[Synchro Summon]] "Clear Wing".
  ** This card's [[Pendulum Effect]] to [[negate]] the [[activation]] of a card or effect that [[target]]s a [[DARK]] [[Spellcaster]] monster the player [[control]]s, and [[destroy]] it, is based on the effect of "Clear Wing" to negate a [[monster effect]] that targets 1 [[Level]] 5 or higher monster on the [[field]], and destroy it.
  * This card is has the following distinctions from the other [[Z-ARC Magician]]s.
  ** It is the only monster that is female.
  ** It is the only non-[[DARK]] monster of the group.
  ** It is the only one whose [[Pendulum Effect]] does not start a [[Chain]].
  ** It is the only one to have no [[Ignition Effect]] or [[Trigger Effect]] in its [[monster effect]]s; this card's [[Condition]] to [[banish]] itself if the [[Pendulum Summon]]ed card is used as Synchro Material also makes it the only card with a "negative" monster effect.
