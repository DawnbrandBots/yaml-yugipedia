title: Card Trivia:Claw Reacher
wikitext: |-
  {{Navigation}}

  * This is one of the first cards seen on-screen in the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'']] anime, the others being "[[Kageningen (anime)|Kageningen]]", "[[The Furious Sea King (anime)|The Furious Sea King]]", and "[[Skull Stalker (anime)|Skull Stalker]]".
  ** This is also one of the first [[DARK]] monsters to appear in the anime, along with "Kageningen", and "Skull Stalker".
  ** This is also the first [[Fiend]] monster to appear in the anime.
