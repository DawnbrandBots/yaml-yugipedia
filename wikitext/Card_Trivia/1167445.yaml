title: Card Trivia:Summon Shock
wikitext: |-
  {{Navigation}}

  * "[[Summon Limit]]", "[[Summon Breaker]]", and the angel and demon from the artwork of "[[Summon Over]]" appear in this card's artwork.
  ** This card continues the events of "Summon Over", with the angel and demon from "Summon Over" being inadvertently electrocuted after attempting to shut off and accidentally damaging "Summon Breaker".
