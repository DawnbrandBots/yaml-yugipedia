title: Card Trivia:Lemon Magician Girl
wikitext: |-
  {{Navigation}}

  * Part of the "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster is depicted wearing a pair of earrings that resemble [[Level]] stars, reflecting how it is a [[Level 2]] monster.
  * This is the only flavor-themed member of the "[[Magician Girl]]" [[archetype]] to [[negate]] the effects of the [[Spellcaster]] monster that it can [[Special Summon]].
