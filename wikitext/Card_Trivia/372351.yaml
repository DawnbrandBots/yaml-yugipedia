title: Card Trivia:Raptor's Gust
wikitext: |-
  {{Navigation}}

  * This card's anime effect is a watered-down version of "[[Raptor's Storm]]".
  ** Fittingly, both cards debuted in {{episode|ARC-V|034|ref}}.
  ** When this card was released in the ''[[OCG]]''/''[[TCG]]'', it had the same effect (but slightly different [[activation requirement]]) as "Raptor's Storm".
