title: Card Trivia:Roboyarou
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is a combination of "[[Robo]]" and "yarou", the Japanese derogatory word for "punk".
  * This monster has a female [[counterpart]]: "[[Robolady]]".
  ** This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] counterpart with "Robolady": "[[Super Roboyarou]]".
