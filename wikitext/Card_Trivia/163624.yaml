title: Card Trivia:Armor Wizard Pazoo
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's Japanese name (パズー, ''Pazū'') is a shortened version of the word "puzzle" (パッズル, ''Pazzuru''). Fittingly, in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, it was used by [[Yugi Mutou (manga)|Yugi Mutou]], who wielded the [[Millennium Puzzle (manga)|Millennium Puzzle]] (千年パッズル, ''Sennen Pazzuru'').
  ** In the manga, when this monster's effects [[equip]]s itself to the [[Monster Lord|Dungeon Master]], it is depicted disassembling itself and reassembling itself like a three-dimensional puzzle into its sword or its shield.
  * This monster's effects allows the Dungeon Master's [[ATK]] and [[DEF]] to become 2500 and 2100, similar to the [[original ATK and DEF]] of "[[Dark Magician (manga)|Dark Magician]]", the [[signature card]] of Yugi Mutou.
  ** In the manga, this monster was used by Yugi Mutou to defeat [[Ryuji Otogi (manga)|Ryuji Otogi]] in ''[[Dungeon Dice Monsters]]''. In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster's role was replaced by "[[Dark Magician (anime)|Dark Magician]]" and was used by [[Yami Yugi]] to defeat [[Duke Devlin]].
