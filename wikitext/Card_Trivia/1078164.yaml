  * This [[Skill]] references a scene from ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'' where [[Yugi Mutou (manga)|Yugi Muto]] [[activate]]s "[[Metamorphortress (anime)|Metamrphortress]]" while he [[control]]s "[[Dark Magician (anime)|Dark Magician]]". The alternate activation condition references how Yugi used "Metamorphortress" while [[Seto Kaiba (manga)|Seto Kaiba]] controlled "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]".
