title: Card Trivia:Cyclos the Circular Sprite
wikitext: |-
  {{Navigation}}

  * The head of "[[Circle of the Fairies]]" appears in this card's artwork.
  * This monster is named after a [[wikipedia:Fairy Ring|fairy circle]], a naturally occurring phenomenon where mushrooms grow in a ring or an arc, which is commonly associated with witchcraft or fairies in Western European folklore. Fittingly, this monster's name is based on ''Kýklos'' (κύκλος), the Greek word for "circle".
