title: Card Trivia:Magistus Invocation
wikitext: |-
  {{Navigation}}

  * "[[Crowley, the Magistus of Grimoires]]" and "[[Aiwass, the Magistus Spell Spirit]]" appear in this card's artwork.
  ** This card's artwork is based on the claims of [[wikipedia:Aleister Crowley|Aleister Crowley]], that a being called [[wikipedia:Aiwass|Aiwass]] dictated ''[[wikipedia:The Book of the Law|The Book of the Law]]'' to him.
  ** The book from the artwork of "Crowley, the Magistus of Grimoires", which appears to be an earlier version of "[[The Book of the Law]]", also appears in this card's artwork.
  * This card's effect, and English and Japanese furigana names, are based on "[[Invocation]]". Its Japanese kanji name is based on "[[The Book of the Law]]".
