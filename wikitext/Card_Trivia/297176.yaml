title: Card Trivia:Ghostrick Socuteboss
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Festival]]", "[[Ghostrick or Treat]]", "[[Ghostrick Parade]]", and "[[Ghostrick Renovation]]".
  * This monster is based on the [[wikipedia:Succubus|succubus]], a female demon that appears in the dreams of men to seduce them, which is reflected in this monster's sleepiness and bedtime attire.
  ** This card's ''[[TCG]]'' name, "Socuteboss" is a portmanteau of "succubus", "so cute" (reflected in this monster's ''moe'' appearance), and "boss".
