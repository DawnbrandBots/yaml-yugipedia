title: 'Card Trivia:Number 39: Utopia'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  [[File:Number39Utopia-JP-Anime-ZX-Sealed.png|thumb|right|250|This monster's neutral form while it is being Summoned.]]

  [[File:Number39UtopiaOriginalDesign.jpg|thumb|right|277|This monster's early concept, with the number "03" instead of "39" on its shoulder plate.]]

  * This is the [[cover card]] of ''[[Starter Deck 2011]]''/''[[Starter Deck: Dawn of the Xyz]]'', ''[[Starter Deck 2012]]''/''[[Starter Deck: Xyz Symphony]]'', ''[[Duel Starter Deck]]'', and ''[[Star Pack 2013]]'', as well as one of the cover cards of ''[[Duel Power]]'', ''[[Duelist Pack: Yuma]]'', ''[[Structure Deck: Overlay Universe]]'', ''[[Prismatic Art Collection]]'', and ''[[25th Anniversary Tin: Dueling Heroes]]''.
  ** This is the first card to be the cover card of three different [[Starter Deck]]s.
  ** This card's [[Set Number]] ("YS12-XX039" and "ST14-TC0XX39") in ''Starter Deck: Xyz Symphony'' and ''Duel Starter Deck'' is a reference to its number (39)
  * This monster appears in the artworks of "[[Bonds of Hope]]", "[[Double Buster Swords]]", "[[Endless Bond]]", "[[Final Countup]]", "[[Future Drive]]", "[[Galaxy Hundred]]", "[[Generation Force (card)|Generation Force]]", "[[Grave Chaos]]", "[[Hope 1]]", "[[Light Wing Bumper]]", "[[Light Wing Shield]]", "[[Number Return]]", "[[Number Spell Caster]]", "[[Numbers Evocation]]", "[[Numbers Impact]]", "[[Overlay Reborn]]", "[[Overlay Rebirth]]", "[[Purge Ray]]", "[[Reservation Reward]]", "[[Rising Sun Slash]]", "[[Superior Overlay]]", "[[Token (Astral and Number 39: Utopia)]]", "[[Tsukumo Slash]]", "[[Ultimate Xyz]]", "[[Utopia Buster]]", "[[Utopia Rising]]", "[[Utopian Aura]]", "[[Utopian Hope]]", "[[Xyz Energy]]", "[[Xyz Entrust]]", "[[Xyz Lay]]", "[[Xyz Reborn Plus]]",  "[[Xyz Revenge Shuffle]]", "[[Xyz Shift]]", "[[Yu-Gi-Oh! ZEXAL (card)|Yu-Gi-Oh! ZEXAL]]", "[[Zexal Entrust]]", and "[[ZW - Sylphid Wing]]".
  ** This monster's neutral form appears in the artworks of "[[Double-Rank-Up-Magic Utopia Force]]", "[[Rank-Up-Magic Dark Force]]", "[[Xyz Change Tactics]]", and "[[Xyz Treasure Ticket]]".
  *** This card's third artwork is based on its neutral form in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, which appears during the sequences where it is [[Xyz Summon]]ed.
  * This card appears in the artworks of "[[E☆HERO Pit Boss]]" and "[[Numeron Xyz Revision]]".
  ** This card (written in [[Astral glyphs]]) appears in the artwork of "[[The Deal of Destiny]]".
  * The number "39" appears on this monster's left shoulder pad.
  ** According to [[Kazuki Takahashi]]'s artwork book, ''[[Duel Art]]'', this monster's early concept design originally had the number "03" instead of "39".
  * This monster's Japanese name, "King of Wishes, Hope" ({{Ruby|希|き}}{{Ruby|望|ぼう}}{{Ruby|皇|おう}}ホープ ''Nanbāzu Sanjūkyū Kibōō Hōpu''), is likely a reference to the myth of [[wikipedia:Pandora|Pandora]], a woman in [[Wikipedia:Greek mythology|Greek mythology]] who opened a box that unleashed all sins upon the world, with the only thing remaining in the box being hope.
  ** Fittingly, in the ''Yu-Gi-Oh! ZEXAL'' [[Yu-Gi-Oh! ZEXAL (manga)|manga]] and [[Yu-Gi-Oh! ZEXAL|anime]], after Yuma Tsukumo unleashed the "[[Number]]" cards, they twisted and/or amplified their [[Number holder|holders']] desires, with this monster being the only "Number" monster not to influence Yuma's desires. This is because the user is wielding the [[Emperor's Key]] or this monster is in Astral's possession.
  ** This monster's [[Attack and effect names in Yu-Gi-Oh! ZEXAL|effect name]] in the original Japanese version of ''Yu-Gi-Oh! ZEXAL'', "Moon Barrier" (ムーン・バリア ''Mūn Baria''), is based on the kanji 「{{Ruby|皇|おう}}」 (''Bō'', lit. "full moon") in its Japanese name.
  * This monster's ''[[TCG]]'' name is based on a "[[wikipedia:Utopia|utopia]]", a literary term used for a perfect society or community. The word originated with [[wikipedia:Thomas More|Sir Thomas More]], in his 1516 [[wikipedia:Utopia (book)|novel of the same name]].
  ** In the book, More wrote a small segment describing the games played by the Utopians (people of Utopia): "They have, however, two games not unlike our chess. The one, a battle of numbers, in which number consumes number. The other, a contest between the virtues and vices, in which the discord among the vices themselves and their union against virtue is not unpleasantly represented". Fittingly, this describes the battle of the "Number" monsters in the ''Yu-Gi-Oh! ZEXAL'' anime and manga.
  * This is the [[signature card]] of [[Yuma Tsukumo (manga)|Yuma Tsukumo]]/[[Astral (manga)|Astral]] (and their [[Yuma Tsukumo|anime]] [[Astral|counterpart]]) in the ''Yu-Gi-Oh! ZEXAL'' manga and anime.
  ** This monster has the same the same original ATK (2500) as the signature cards of the other main protagonists of the manga: [[Yugi Mutou (manga)|Yugi Mutou]]'s "[[Dark Magician (manga)|Dark Magician]]", [[Jaden Yuki (manga)|Jaden Yuki]]'s "[[Elemental Hero Terra Firma (manga)|Elemental Hero Terra Firma]]", [[Yusei Fudo (manga)|Yusei Fudo]]'s "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]", [[Yuya Sakaki (manga)|Yuya Sakaki]]'s "[[Odd-Eyes Phantom Dragon (manga)|Odd-Eyes Phantom Dragon]]", [[Tatsuhisa Kamijo (manga)|Tatsuhisa Kamijo]]'s "[[Multistrike Dragon Dragias (manga)|Multistrike Dragon Dragias]]" and [[Yudias Velgear (manga)|Yudias Velgear]]'s "[[Galactica Oblivion (manga)|Galactica Oblivion]]".
  *** This monster also has the same [[original ATK]] (2500) as the signature cards of the other main protagonists of the anime (with the exception of [[Yuga Ohdo]]'s "[[Sevens Road Magician (anime)|Sevens Road Magician]]"): [[Yugi Muto]]/[[Yami Yugi]]'s "[[Dark Magician (anime)|Dark Magician]]", [[Jaden Yuki]]'s "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]", [[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]", [[Yuya Sakaki]]'s "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]", [[Yusaku Fujiki]]'s "[[Firewall Dragon (anime)|Firewall Dragon]]" and [[Yudias Velgear]]'s "[[Galactica Oblivion (anime)|Galactica Oblivion]]".
  ** As an [[Xyz Monster]], it is the first signature card of a main protagonist not to possess a [[Level]].
  * This monster has several alternate forms.
  ** A [[Xyz Evolution#Rank-Down Xyz De-Evolution|Rank-Down]] form: "[[Number 39: Utopia Roots]]"
  ** Three [[retrained]] counterparts: "[[Number 39: Utopia Double]]", "[[Number 39: Utopia Rising]]", and "[[Number 39: Utopia the Envoy of Light]]"
  ** Five "[[Number C]]" forms via [[Xyz Evolution#Chaos Xyz Evolution|Chaos Xyz Evolution]]:
  *** "[[Number C39: Utopia Ray]]" (without a "[[Rank-Up-Magic]]" card)
  **** "[[Ultimate Dragonic Utopia Ray]]" ("Utopia Ray" [[equip]]ped with "[[ZW - Dragonic Halberd]]")
  **** "[[Ultimate Leo Utopia Ray]]" ("Utopia Ray" equipped with "[[ZW - Leo Arms]]")
  *** "[[Number C39: Utopia Ray V]]" (with "[[Rank-Up-Magic Limited Barian's Force]]")
  *** "[[Number C39: Utopia Ray Victory]]" (with "[[Rank-Up-Magic Numeron Force]]")
  ** Two "[[Number S]]" forms via [[Xyz Evolution#Shining Xyz Evolution|Shining Xyz Evolution]]:
  *** "[[Number S39: Utopia Prime]]" (without a "Rank-Up-Magic" card)
  *** "[[Number S39: Utopia the Lightning]]" (with "[[Rank-Up-Magic Shining Force]]")
  ** Two upgraded forms via [[Xyz Evolution#Rank-Up Xyz Evolution|Rank-Up Xyz Evolution]]
  *** "[[Number 39: Utopia Beyond]]" (a Rank-Up form Summoned with "[[Rank-Up-Magic Astral Force]]")
  *** "[[Number 99: Utopia Dragonar]]" (a [[Rank-Up#Hyper Rank-Up|Hyper Rank-Up]] form of "Utopia Beyond" Summoned with "[[Hyper Rank-Up-Magic Utopiforce]]")
  ** A [[Dragon]] Hyper Rank-Up ultimate form: "[[Number 99: Utopic Dragon]]"
  ** A [[Yu-Gi-Oh! ZEXAL (manga)|manga]] ultimate form: "[[Number 93: Utopia Kaiser]]"
  * The following monsters are also based on this monster:
  ** An "[[Onomat]]" [[counterpart]]: "[[Utopic Onomatopoeia]]"
  ** An "[[Astral (archetype)|Astral]]" counterpart: "[[Astraltopia]]"
  ** A "[[Magician]]" [[Xyz Pendulum Monster|Xyz Pendulum]] counterpart: "[[Magician of Hope]]"
  ** A [[DARK]] counterpart: "[[Number 98: Antitopian]]"
  ** A "[[ZS -]]" counterpart: "[[ZS - Utopic Sage]]"
  ** A "[[Heroic Champion]]" counterpart: "[[Heroic Champion - Claivesolish]]"
  ** A [[Baseball]] ''[[Yu-Gi-Oh! Rush Duel]]'' counterpart: "[[Player 39: Home Run Hitter|Player #39: Home Run Hitter]]"
  * "[[Full Armored Utopic Ray Lancer]]" is "[[Black Ray Lancer]]" equipped with this monster.
  * "Number" monsters often take the form of their owner's initial ambitions and desires; in this monster's case, it represents its owner, Yuma Tsukumo.
  ** This monster's effect to [[negate]] a monster's attack references Yuma's determination to stay strong, never give up, and protect his friends.
  * This is the first card to be printed in Astral glyphs, as well as the first [[Legal]] card to be printed in a fictional language.
  ** Since this card printed in Astral glyphs also existed in the ''TCG'', this is the first ''TCG'' card to contain Japanese text.
  * This monster is the [[LIGHT]] counterpart of "[[Number 96: Dark Mist]]", similar to how [[Number 96 (character)|Number 96]] is the dark counterpart of Astral.
  * This monster, "[[Gachi Gachi Gantetsu]]", and "[[Grenosaurus]]" were the first Xyz Monsters to be released in the ''[[OCG]]''/''TCG''.
  * This is the first Xyz Monster to be released as [[Gold Rare]] in the ''TCG'' (in ''[[Gold Series: Haunted Mine]]'').
  * In the anime, this monster seemed to be the most loyal "Number" monster to Astral.
  ** In {{episode|ZEXAL|038|ref}}, when Number 96 attacked Astral, this monster protected him. It also acted completely on its own, as both Astral and Number 96 were clearly surprised.
  * In the anime, this monster reached the highest finite [[ATK]] (204,000) of all monsters using the effects of "[[Number 100: Numeron Dragon (anime)|Number 100: Numeron Dragon]]" and "[[Number 73: Abyss Splash (anime)|Number 73: Abyss Splash]]" via the effect "[[Utopia Rising]]", as well as "[[Double or Nothing! (anime)|Double or Nothing!]]".
  * This is the first monster whose Korean name (No.39 유토피아 ''Neombeojeu Samsipgu Yutopia'', "No.39 Utopia") has the same naming scheme as both its Japanese and ''TCG'' name.
