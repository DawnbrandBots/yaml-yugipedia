title: Card Trivia:Ritual Beast Ulti-Pettlephin
wikitext: |-
  {{Navigation}}

  * This monster is the [[Fusion Monster|Fusion]] between "[[Ritual Beast Tamer Wen]]" and "[[Spiritual Beast Pettlephin]]".
  * This monster appears in the artwork of "[[Ritual Beast Steeds]]".
  * The sum of [[ATK]] & [[DEF]] of all 3 "[[Spiritual Beast]]" Fusion Monsters is 3000. For this card's ATK is 200 and DEF is 2800.
  * This monster has both a "[[Shaddoll]]" and "[[Zefra]]" counterpart: "[[El Shaddoll Wendigo]]" and "[[Ritual Beast Tamer Zefrawendi]]".
  ** Their respective transformations can be seen in the artworks of "[[Ritual Beast Ambush]]" and "[[Zefra Path]]".
