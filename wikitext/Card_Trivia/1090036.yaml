title: Card Trivia:Motor Kaiser
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2025]]''.
  * This monster's name is based on "[[wikipedia:Kaiser|kaiser]]", the German word for "emperor".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|R|034|ref}}, specifically from the panel showing [[Motor Kaiser (manga)|this monster]] being Summoned.
