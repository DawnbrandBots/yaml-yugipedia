title: Card Trivia:Toon Dark Magician
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the box of ''[[Legendary Duelists: Season 1]]''.
  * "[[Toon World]]" appears in this card's artwork.
  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Dark Magician]]", as well as the "[[Dark Magician (archetype)|Dark Magician]]" counterpart of "[[Toon Dark Magician Girl]]".
  ** This monster's effect to [[Special Summon]] a Toon monster from the [[Deck]] is a reference to the effects of cards that can Special Summon "Dark Magician" or other [[Spellcaster]] monsters related to the "Dark Magician" [[archetype]] from the Deck (e.g. "[[Bond Between Teacher and Student]]", "[[Magician Navigation]]", and "[[Sage's Stone]]").
