title: Card Trivia:Prologue of the Destruction Swordsman
wikitext: |-
  {{Navigation}}

  * "[[Buster Blader, the Destruction Swordmaster]]", "[[Buster Dragon]]", and "[[Buster Whelp of the Destruction Swordsman]]" appear in this card's artwork.
  ** This card's artwork appears to depict the first scene in the "Buster Blader" storyline, where "Buster Blader" rescues or steals "Buster Whelp" from "Buster Dragon", which is suggested to be its parent, as "Buster Whelp" eventually grows into "Buster Dragon".
  *** This is further reinforced by this card's ''[[OCG]]''/''[[TCG]]'' name: the kanji「揺籃」 (''Yōran'') in this card's Japanese name figuratively read as "infancy", while a prologue is a separate introductory section of a literary, dramatic, or musical work.
  *** Additionally, a prologue is an event or act that leads to another, which may be referencing the future events in the "Buster Blader" storyline: the transformation of "Buster Whelp" into "Buster Dragon" and "Buster Blader" slaying the latter.
