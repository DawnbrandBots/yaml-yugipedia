title: Card Trivia:Steelswarm Hercules
wikitext: |-
  {{Navigation}}

  * This card's name could be based on the [[wikipedia:Hercules beetle|Hercules beetle]], similar to how the other "[[Steelswarm]]" monsters are named after insects or stages of an insect's life.
  * This monster appears in the artworks of "[[Apex Predation]]", "[[Infestation Tool]]", and "[[Trial and Tribulation]]".
  ** In "Trial and Tribulation", it is infecting a mournful "[[Gishki Noellia]]" into becoming the "[[Evigishki]]"/"[[Evilswarm]]" hybrid "[[Gishki Psychelone]]".
  * This card can be seen as an opposite of "[[Vylon Omega]]".
  ** Both are [[Level 10]] with 3200 [[ATK]].
  ** Both require exactly 3 monsters to be [[Summon]]ed.
  ** This card is a [[DARK]] [[Fiend]] monster while "Vylon Omega" is a [[LIGHT]] [[Fairy]] monster.
  ** This card can only be [[Normal Summon]]ed while "Vylon Omega" can only be [[Special Summon]]ed.
  * This card has a revived "Evigishki" [[counterpart]]: "[[Gishki Zielgigas]]".
