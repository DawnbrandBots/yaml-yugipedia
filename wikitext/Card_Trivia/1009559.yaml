title: Card Trivia:Legendary Fire King Ponix
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Circle of the Fire Kings]]", predating its own release by over a decade.
  * "[[Fire King Sanctuary]]" appears in this card's artwork.
  * This monster is a baby form of "[[Fire King High Avatar Garunix]]".
  ** "Circle of the Fire Kings" depicts this monster emerging from the corpse of "High Avatar Garunix", in reference to the rebirth ability of the phoenix.
  ** This monster is also the younger form of "[[Fire King Avatar Garunix]]".
  * This monster is a "[[Fire King]]" [[counterpart]] of "[[Legendary Atlantean Tridon]]".
  ** Both have the word "Legendary" (真 ''Shin'', lit. "True") in their names before their own [[archetype]] names.
  ** Both are the baby forms of the archetypes' boss monsters.
  * This monster can also be considered a counterpart of "[[Neptabyss, the Atlantean Prince]]".
  ** Both are [[Level 1]] [[Effect Monster]]s that act as [[List of unofficial terms|starter]]s for their own archetypes, and were released many years after the debut of their corresponding themes to improve their consistency.

  == See also ==
