title: Card Trivia:Amaze Attraction Majestic Merry-Go-Round
wikitext: |-
  {{Navigation}}

  * "[[Amazement Administrator Arlekino]]" appears in this card's artwork.
  * This card's artwork takes inspiration from cards of the "[[Six Samurai]]" [[archetype]].
  ** The location is based on "[[Shien's Dojo]]" and "[[Shien's Castle of Mist]]", also featuring the crows from the latter.
  ** The horses wear armor similar to that of "[[Legendary Ebon Steed]]".
  ** "Ɐrlechino" is wearing the armor of "[[Legendary Six Samurai - Shi En]]".
  ** The neon lights in the merry-go-round feature the same colors used in artworks such as "[[Backs to the Wall]]".
  ** There is the flag of "[[Shien's Squire]]".
  ** The first bulleted effect, which protects the equipped monster from the destruction, is also also based on a similar effect present on several "Six Samurai" monsters, such as "[[The Six Samurai - Zanji]]".
  * This [[wikipedia:Carousel|merry-go-round]] appears in the artwork of "[[Amazement Precious Park]]".
