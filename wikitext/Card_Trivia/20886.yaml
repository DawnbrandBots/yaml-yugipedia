title: Card Trivia:Trial of Nightmare
wikitext: |-
  {{Navigation}}

  * This card was first released as "Trial of Hell", but later [[Card Errata:Trial of Nightmare|errata'd]] to "Trial of Nightmare".
  * The Spanish name of this card in the video game [[Yu-Gi-Oh! Dungeon Dice Monsters (video game)|Dungeon Dice Monsters]] is "''Sendero de Pesadillas''", which translates to "''Tr'''ai'''l of Nightmares''".
