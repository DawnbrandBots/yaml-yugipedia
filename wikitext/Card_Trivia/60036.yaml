title: Card Trivia:Attack Guidance Armor
wikitext: |-
  {{Navigation}}

  * This card's name and effect are similar to those of "[[Attack Guidance Barrier]]".
  ** Both cards were used by [[Seto Kaiba]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This card's first ''[[OCG]]''/''[[TCG]]'' effect to [[destroy]] the [[attack]]ing monster is based on how Seto Kaiba described its effect in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and anime, which is mentioned to redirect a monster's attack towards itself.
  * This card has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any [[Trap Card]], released over 20 years after its first appearance in the ''Yu-Gi-Oh!'' manga on October 22, 2001.
