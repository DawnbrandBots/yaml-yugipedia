title: Card Trivia:Performapal Partnaga
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the words "partner" (パートナー ''pātonā'') and "[[wikipedia:Nāga|Nāga]]" (ナーガ ''nāga''). The name reflects the "supporting" [[Card effect|effects]] of this [[monster]], giving more [[ATK|attack strength]] to other monsters.
  * This monster is based on a [[wikipedia:Rattlesnake|rattlesnake]].
  * This card is the first [[Reptile]]-[[Type]] [[Pendulum Monster]].
