title: Card Trivia:Burning Rebirth
wikitext: |-
  {{Navigation}}

  * True to this card's effect, "[[Red Dragon Archfiend]]" appears in this card's artwork.
  * This card's artwork appears to be a "Red Dragon Archfiend" version of "[[Starlight Road]]".
  * Despite many cards existing with a similar [[Tribute]] effect, this card was the first card whose effect is called in the Japanese anime of 5Ds as a '''Release Escape'''.
