title: Card Trivia:Bururu @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located on this monster's left ear.
  * This monster and "[[Wind Pegasus @Ignister]]" represent [[Windy]], the [[WIND]] [[Ignis]].
  ** This monster's name is based on "''buruburu''", the Japanese onomatopoeia for "shivering", a sensation generally associated with a cold breeze.
  ** This monster's design features a face with a sinister expression, referencing Windy's malicious nature after being reprogrammed by Lightning.
  ** This monster's design also features wing-like ears, likely referencing the "[[Stormrider]]" [[archetype]] used by Windy, which features avian-themed monsters.
  ** This monster's [[Tuner]] [[Type]] is designed to facilitate the [[Synchro Summon]]ing of "Wind Pegasus".
