title: Card Trivia:Necromaid Nana
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Maid's Baneful Gift]]", "[[Necromaid Order]]", "[[Necromaid Resize]]", and "[[Necromance]]", as well as in the second artworks of "[[Ghost Cyclone]]", "[[Necromaid Carriage]]", and "[[Necromaid Stitch]]" and both artworks of "[[Maid's Mischief]]".
  * This monster is similar in design to Nana Hiiragi from ''Talentless Nana'', another show animated by [[Bridge]] (the studio that animated ''[[Yu-Gi-Oh! SEVENS]]'').
  * This monster has 2 [[Counterpart|upgraded]] [[Ritual Monster|Ritual]] forms: "[[Necromaid Lurker]]" and "[[Necromaid Re:D]]".
