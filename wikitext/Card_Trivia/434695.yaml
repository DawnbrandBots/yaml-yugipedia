title: Card Trivia:Priestess with Eyes of Blue
wikitext: |-
  {{Navigation}}

  * The attire this monster wears is very similar to the [[Obelisk Blue]]'s female uniform in ''[[Yu-Gi-Oh! GX]]'', albeit with a longer skirt.
  * Just as "[[Maiden with Eyes of Blue]]" represents [[Kisara]], this monster (along with "[[Protector with Eyes of Blue]]" and "[[Sage with Eyes of Blue]]") may represent one of the other three "[[Blue-Eyes White Dragon]]" [[Ka|spirit]] holders.
  ** Alternatively, this card could could represent an older version of Maiden with Eyes of Blue (and thus an older Kisara).
  * This card is the only "[[with Eyes of Blue]]" monster whose effects don't include the ability to Special Summon "Blue Eyes White Dragon".
  * Priestess is holding the [[wikipedia:Kagura suzu|Kagura suzu]], a tool used in [[wikipedia:Kagura|Kagura]] by [[wikipedia:Miko|Miko]].
  * This monster appears in the artwork of "[[Mausoleum of White]]".
