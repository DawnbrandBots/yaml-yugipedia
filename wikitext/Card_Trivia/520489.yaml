title: Card Trivia:Eva
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "EBE" is based on the abbreviation for "Extraterrestrial Biological Entity".
  ** This monster's ''[[TCG]]'' name is likely based on the abbreviation for "Extraterrestrial Visitor Alien".
  * This card's artwork depicts this monster crash-landing on Earth at some point during the [[wikipedia:Mesozoic|Mesozoic Era]], as evidenced by the [[wikipedia:Pterosaur|pterosaur]] flying in the background.
