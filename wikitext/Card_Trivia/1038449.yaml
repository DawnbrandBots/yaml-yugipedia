title: Card Trivia:Wander Triple
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Mean Mutt Blasting Bowwow]]", "[[Mean Mutt Bullblade]]", and "[[Mean Mutt Chihuahua Warrior]]" appear in this card's artwork.
  * The first portion of this card's Japanese name (ワンダー, ''Wanda'') is a pun on "''wan''" (ワン), the Japanese onomatopoeia of a dog's bark.
