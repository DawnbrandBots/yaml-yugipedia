title: Card Trivia:PSY-Frame Driver
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[PSY-Frame Circuit]]", "[[PSY-Frame Overload]]" (as "PSY-Framelord Omega"), "[[S-Force Bridgehead]]", and "[[S-Force Specimen]]".
  * This monster's name is derived from [[wikipedia:Driver circuit|driver ciruit]], an [[wikipedia:Electrical network|electrical circuit]] or other [[wikipedia:Electronic component|electronic component]] used to control another circuit or component, such as a high-power [[wikipedia:Transistor|transistor]], [[wikipedia:Liquid-crystal display|liquid-crystal display]] (LCD), and numerous others.
  * This is the first [[Psychic]] [[Normal Monster]] that is not a [[Pendulum Monster]].
  * This monster may be the upgraded version of "[[Wattsychic Fighter]]", as shown by the similarities in their clothing.
  * This monster has two [[Card evolutions|evolutions]] using the "[[PSY-Frame]]" [[Tuner monster]]s as armor:
  ** "[[PSY-Framelord Zeta]]" is this monster equipped with "[[PSY-Framegear Alpha]]" and "[[PSY-Framegear Beta]]";
  ** "[[PSY-Framelord Omega]]" is this monster equipped with "PSY-Framegear Alpha", "PSY-Framegear Beta", "[[PSY-Framegear Gamma]]", "[[PSY-Framegear Delta]]" and "[[PSY-Framegear Epsilon]]".
  * This monster's [[flavor text]] mentions the "[[S-Force|Security Force]]s", predating the appearance of that archetype for more than 5 years.
