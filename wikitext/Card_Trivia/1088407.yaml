title: Card Trivia:Arcana Force EX - The Chaos Ruler
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a combination of "[[Arcana Force EX - The Light Ruler]]", "[[Arcana Force EX - The Dark Ruler]]", and "[[Arcana Force XXI - The World]]".
  ** Each of this monster's dragon heads features designs on their foreheads that are based on the faces of the aforementioned "[[Arcana Force]]" monsters: The upper-left head features the face of "The World", the bottom-left head features the face of "The Light Ruler", and the bottom-right head features the face of "The Dark Ruler".
  ** This monster's name makes it part of the [[Chaos (series)|Chaos]] [[series]], which primarily focuses on [[LIGHT]] and [[DARK]] monsters, reflecting how this monster is a combination of "The Light Ruler" and "The Dark Ruler" (whose [[Attribute]] was DARK in the ''[[Yu-Gi-Oh! GX]]'' anime).
  * The background of this card's artwork references the [[The Light of Destruction|Light of Destruction]], the main antagonist of the [[Society of Light (arc)|Society of Light]] arc in the ''[[Yu-Gi-Oh! GX]]'' anime whose possession of a character's body (i.e. [[Sartorius]], who uses the "[[Arcana Force]]" [[archetype]]) causes them to glow with a sickly white miasma.
  * This monster's [[Continuous Effect]] references the original anime effect of "[[Light Barrier (anime)|Light Barrier]]", which was able to negate the effects of all non-"Arcana Force" monsters.
