title: Card Trivia:Card Destruction
wikitext: |-
  {{Navigation}}

  * The cards "[[Cyber-Tech Alligator]]", "[[Garma Sword]]", "[[Garma Sword Oath]]", "[[Widespread Ruin]]" and a card whose [[Card backing|backing]] is only visible appear in this card's artwork.
  ** The hand of "[[Dark Ruler Ha Des]]" and the ''[[Rush Duel]]'' versions of "[[Darkness Approaches (Rush Duel)|Darkness Approaches]]", "[[Gust (Rush Duel)|Gust]]", "[[Machine Attacker (Rush Duel)|Machine Attacker]]", "[[Petit Moth (Rush Duel)|Petit Moth]]" appear in this card's ''[[Card Destruction (Rush Duel)|Rush Duel]]'' artwork.
  * This card appears in the artwork of "[[Destruction Trigger]]".
  * This card has several [[counterpart]]s:
  ** A weaker counterpart: "[[Hand Destruction]]"
  ** A ''Rush Duel'' counterpart: "[[Card Revitalization]]"
  ** A "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Card Destruction]]"
  * This card's artwork features the cards' layouts and texts written in their original Japanese format, despite its international release.
