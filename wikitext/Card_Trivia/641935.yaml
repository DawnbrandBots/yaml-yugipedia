title: Card Trivia:Gorgon, Empress of the Evil Eyed
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Evil Eye Reemergence]]" and "[[Imprudent Intrusion]]".
  * "[[Evil Eye of Gorgoneio]]" appears in this card's artwork.
  * This monster is a [[Card evolutions|transformed]] [[Link Monster|Link]] version of "[[Medusa, Watcher of the Evil Eye]]".
  * This card is named after a [[wikipedia:Gorgon|gorgon]], a mythical creature with the ability to [[wikipedia:Petrifaction in mythology and fiction|petrify]] any who look directly at her face.
