title: Card Trivia:D/D/D Super Doom King Dark Armageddon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[D/D/D Doom King Armageddon]]".
  ** This monster's name is a reference to the fact that Xyz Monsters have black card frames.
  * This is the first [[Xyz Pendulum Monster]] that cannot be [[Pendulum Summon]]ed.
  * Like the other "Super Doom King" monsters that resemble the final antagonists from the previous anime series, this monster references [[Don Thousand]], the final antagonist from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. Fittingly, this monster is also an allusion to the fact that the ''Yu-Gi-Oh! ZEXAL'' era was when Xyz Monsters were played frequently.
  ** This monster's horns resemble the [[Barian Emblem]], the symbol of [[Barian World]], the dimension where Don Thousand was banished to after [[Astral World]] decided to abandon the power of [[Chaos (power)|Chaos]].
  ** This monster's tentacles reference those often used by Don Thousand to restrain his victims, including restraining [[Vector]] to his throne and [[Reginald Kastle|Nash]] in a [[Sphere Field]].
