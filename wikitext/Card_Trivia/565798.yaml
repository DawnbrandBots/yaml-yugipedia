title: Card Trivia:Cyberse White Hat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cynet Recovery]]" and "[[Life Hack]]".
  * This card's name and artwork both reference the [[wikipedia:White hat (computer security)|white hat]], a classification for ethical hackers whom are hired by corporations to purposely hack their security systems as a means of testing its strength.
