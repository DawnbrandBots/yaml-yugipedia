title: Card Trivia:Tao Tao the Chanter
wikitext: |-
  {{Navigation}}

  * This monster appears to be a female [[counterpart]] of "[[Master Tao the Chanter]]", similar to "[[Dark Magician Girl]]" for "[[Dark Magician]]" and "[[Nightmare Apprentice]]" for "[[Nightmare Magician]]".
  ** Fittingly, this monster is one [[Level]] lower than "Master Tao the Chanter" like in the other pairs, has 300 less [[original ATK and DEF]] than it, and has an effect that can [[Special Summon]] it.
