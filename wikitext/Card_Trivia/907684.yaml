title: Card Trivia:Zexal Alliance
wikitext: |-
  {{Navigation}}

  * "[[Number C39: Utopia Ray]]" and the "X" from the ''[[Yu-Gi-Oh! ZEXAL]]'' logo (albeit faint) appear in this card's artwork.
  ** The blue and red streams featured in this card's background artwork reference the [[Xyz Summon]] animation when [[Yuma Tsukumo|Yuma]] and [[Astral]] perform a [[ZEXAL Morph]].
  *** This card is likely a reference to {{episode|ZEXAL|024|ref}}, when Yuma and Astral performed a ZEXAL Morph for the first time during the latter's [[Duel]] against [[Kite Tenjo]], where "[[Number C39: Utopia Ray (anime)|Number C39: Utopia Ray]]" was played in that Duel.
  * This is the second card with an effect that specifically lowers [[Life Point]]s to 10, with the first being "[[Number S39: Utopia Prime]]".
  ** As a result, this card's effect is possibly a reference to that of "Utopia Prime", since this card specifically [[Special Summon]]s a "[[Utopia (archetype)|Utopia]]" monster.
