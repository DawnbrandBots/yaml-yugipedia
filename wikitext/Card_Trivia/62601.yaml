title: Card Trivia:Dark Diviner
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Zumwalt", is based on the German topographical surname meaning "for the forest".
  ** This monster's Japanese name may also be derived from the [[wikipedia:USS Zumwalt|USS ''Zumwalt'']], a [[wikipedia:Destroyer|destroyer ship]] used by the [[wikipedia:United States Navy|United States Navy]], named after the Naval officer [[wikipedia:Elmo Zumwalt|Elmo Zumwalt]].
  *** Similarly, the name of the [[Dark Synchro Monster]] "[[Frozen Fitzgerald]]" is derived from the [[wikipedia:USS Fitzgerald|USS ''Fitzgerald'']], another destroyer ship used by the United States Navy named after the Naval officer [[wikipedia:William Charles Fitzgerald|William Charles Fitzgerald]].
  ** This monster's ''[[TCG]]'' name is based on a diviner, a person who uses special powers to predict future events.
  * The number of orbs on this monster's staff is equal to this monster's [[Level]] (4).
  * This monster has the lowest Level (4) of all Dark Synchro Monsters.
  * This monster's required [[Synchro Material]] in the ''[[OCG]]''/''[[TCG]]'' is based on its appearance in {{episode|5D's|029|ref}} when it was [[Dark Synchro Summon]]ed using "[[Dark Tuner Chaos Rogue (anime)|Dark Tuner Chaos Rogue]]" (a [[Dark Tuner monster]]) and "[[Shield Worm (anime)|Shield Worm]]" (an [[Insect]] non-Tuner monster) as [[material]].
