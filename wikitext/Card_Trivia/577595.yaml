title: Card Trivia:Edge of the Ring
wikitext: |-
  {{Navigation}}

  * "[[Yokotuner]]" and "[[Yoko-Zuna Sumo Spirit]]" appear in this card's artwork.
  ** Fittingly, both are [[wikipedia:Sumo|sumo wrestlers]] in a [[wikipedia:Dohyō|sumo wrestling ring]], with their names derived from ''[[wikipedia:Yokozuna|yokozuna]]'', the highest rank in sumo wrestling.
  ** The artwork of "[[Bownty]]" reveals that "Yokotuner" won the match depicted in this card's artwork.
  ** A ''[[Yu-Gi-Oh! ARC-V]]''-era "Synchro ring" also appears in this card's artwork, serving as the wrestling ring's boundaries.
