title: Card Trivia:Neo-Spacian Twinkle Moss
wikitext: |-
  {{Navigation}}

  * This monster is the [[NEX|extended]] form of "[[Neo-Spacian Glow Moss]]".
  ** This monster's appearance is female, while the appearance of "Glow Moss" appears to be androgynous.
  ** This is the only "[[Neo-Spacian]]" monster to not have an [[Card evolutions|upgraded]] [[Contact Fusion]] form with "[[Elemental HERO Neos]]".
  * This monster has the highest [[original DEF]] (1100) of all the "Neo-Spacian" monsters, tied with "[[Neo-Spacian Marine Dolphin]]".
