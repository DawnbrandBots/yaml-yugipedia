title: Card Trivia:Cosmic Cyclone
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a [[wikipedia:Supermassive black hole|supermassive black hole]] with an [[wikipedia:Accretion disk|accretion disk]] and a [[wikipedia:Astrophysical jet|relativistic jet]] visible, in the process of absorbing a star.
  * This card is a [[counterpart]] of "[[Mystical Space Typhoon]]", whose Japanese name is "Cyclone".
