title: Card Trivia:Riryoku Guardian
wikitext: |-
  {{Navigation}}

  * "[[Gate Guardian]]" and the man in the artwork of "[[Riryoku]]" appear in this card's artwork.
  ** The pose of "Gate Guardian" is taken from {{chapter|Yu-Gi-Oh!|095|ref}}, specifically from the panel depicting its Summon.
  ** This card's artwork is based on that of "Riryoku", as well as its effect in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which halved the opponent's [[Life Point]]s and increased the ATK of one of its user's monsters by the halved amount (with "Gate Guardian" being that monster).

