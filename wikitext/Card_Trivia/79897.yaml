title: Card Trivia:Evolution Burst
wikitext: |-
  {{Navigation}}

  * "[[Cyber Dragon]]" appears in this card's artwork
  ** This card's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Cyber Dragon (anime)|Cyber Dragon]]" in the Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's artwork is based on a scene from {{episode|GX|147|ref}} where [[Zane Truesdale]]'s "Cyber Dragon" attacks [[Jesse Anderson]] directly (while the latter was possessed by [[Yubel (character)|Yubel]]), as indicated by the light‑purple background matching the otherworldly setting of their Duel.
  * In the ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'' video game, the words "[[Spell Card]]" that appear under this card's name seem to be skinnier and more squeezed together, compared to other Spell Cards.
