title: Card Trivia:Samsara
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Saṃsāra|Saṃsāra]] refers to the cycle of [[wikipedia:reincarnation|reincarnation]] or rebirth in religions such as [[wikipedia:Hinduism|Hinduism]], [[wikipedia:Buddhism|Buddhism]], [[wikipedia:Jainism|Jainism]], and [[wikipedia:Sikhism|Sikhism]].
  ** This is fitting, as this card's effect allows monsters Tributed for Ritual Summons to be "reincarnated" in their owners' Decks.
  * The same symbols from the artwork of "[[Dark Magical Circle]]" appear in this card's artwork.
