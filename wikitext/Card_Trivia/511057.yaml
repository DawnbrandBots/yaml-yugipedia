title: Card Trivia:B.E.S. Crystal Core
wikitext: |-
  {{Navigation}}

  * This card is based on the [[/index.php?title=W:c:gradius:Crystal Core&action=edit&redlink=1|Crystal Core]] variant of "Big Core" from the ''[[wikipedia:Gradius|Gradius]]'' games.
  * Like "[[B.E.S. Big Core MK-2]]", this card's artwork features the [[Gradius|Vic]] [[Victory Viper XX03|Viper]], the playable "hero" ship featured in the ''Gradius'' games.
  * This monster appears in the artwork of "[[Safe Zone]]" and "[[Boss Rush]]".
