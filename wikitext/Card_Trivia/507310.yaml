title: Card Trivia:Negate Defense
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name, "Ghost's Defense Seal" ({{Ruby|死|し}}{{Ruby|霊|りょう}}の{{Ruby|守|しゅ}}{{Ruby|備|び}}{{Ruby|封|ふう}}じ, ''Shiryō no Shubifūji'') is similar to that of "[[Stop Defense]]", which is ""Defense" Seal" (『{{Ruby|守|しゅ}}{{Ruby|備|び}}』{{Ruby|封|ふう}}じ, ''"Shubi" Fūji'').
  ** Both are [[Normal Spell Card]]s where their artworks depict a knight being forced out of their defensive positions, reflecting their effects to change an opponent's [[Defense Position]] to [[Attack Position]].
