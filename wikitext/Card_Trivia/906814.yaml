title: Card Trivia:Tamainabot
wikitext: |-
  {{Navigation}}

  * Two copies of "[[Tamabot]]" appear in this card's artwork.
  * This monster appears in the artworks of "[[Strike Tamabowling]]" "[[Tama Bond]]", "[[Tamabat]]", "[[Tamabit]]", "[[Tamabot King Golem]]", "[[Tamalauncher]]", and "[[Tamatamabangborn]]".
  * This monster is based on an [[wikipedia:Incubator (egg)|egg incubator]], a machine designed to hatch eggs at the right temperature and humidity.
  * This monster has the highest [[original ATK and DEF]] (2000/2000) of all [[Level 2]] monsters.
