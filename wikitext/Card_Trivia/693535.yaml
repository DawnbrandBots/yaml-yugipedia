  * This monster has green and black feathers, suggesting that it might be a fused form of both "[[Simorgh, Bird of Divinity]]" and "[[Dark Simorgh]]", or [[Simorgh, Lord of the Storm|the other two]] [[Simorgh of Darkness|of their evolved forms]].
