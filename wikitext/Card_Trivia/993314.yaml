title: Card Trivia:Storagepod
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "''storage''" and "''[[wikipedia:Sauropoda|sauropod]]''".
  * This is the first, and currently only [[Fusion Monster]] in the ''[[OCG]]''/''[[TCG]]'' to list two optional and variable [[Type]]-specific [[Fusion Material]]s.
  ** Since "[[Trifortressops]]" is a [[Machine]] monster, and "[[Stegocyber]]" is a [[Dinosaur]] monster, this monster can be [[Fusion Summon]]ed using only one of the two Types listed as its required material.
  ** This is also the first Fusion Monster in the ''OCG''/''TCG'' to list a specifically-named monster(s) and a monster(s) of a specific Type(s) as Fusion Material, as well as the first Fusion Monster to be Fusion Summoned this way without name or Type-changing effects.
