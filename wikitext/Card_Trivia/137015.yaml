title: Card Trivia:Axe of Fools
wikitext: |-
  {{Navigation}}

  * This axe appears in the artwork of "[[Missing Force]]" and "[[Nomadic Force]]".
  * True to this card's name, the head of this axe features a foolish-looking face in its design.
  * Although this card's name, artwork, and first effect reference "[[Axe of Despair]]", this card's effects are similar to that "[[Mask of Brutality]]".
  ** Both cards grant 1000 [[ATK]] to the equipped monster and reduce [[Life Points]] during the [[Standby Phase]].
