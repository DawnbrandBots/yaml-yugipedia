title: Card Trivia:Fairy of the Spring
wikitext: |-
  {{Navigation}}

  * The woman depicted in this card's artwork is holding two copies of "[[Wicked-Breaking Flamberge - Baou]]", one gold and one silver.
  * This card's artwork  references [[wikipedia:Aesop's Fables|Aesop's fable]] of "[[wikipedia:The Honest Woodman|The Honest Woodman]]", where the titular protagonist loses his axe in a river but is offered (separately) a silver axe and a golden axe, under the assumption that one of them is his, as a test of honesty. Ultimately, the woodcutter is honest about his axe being neither of them, and receives all 3 axes for his honesty.
  ** This card's effect also reflects this by retrieving an [[Equip Spell Card]] from the Graveyard.
  ** This fable is also referenced by "[[Half or Nothing]]" and "[[Lucky Iron Axe]]".
