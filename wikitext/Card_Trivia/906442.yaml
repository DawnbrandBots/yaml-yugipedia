title: Card Trivia:Swordsoul Punishment
wikitext: |-
  {{Navigation}}

  * "[[Bystial Dis Pater]]" and "[[Despian Luluwalilith]]" appear in this card's artwork.
  * This card's ''TCG'' name is a reference to "[[Dogmatika Punishment]]".
  ** Both cards feature different forms of "[[Dogmatika Fleurdelis, the Knighted]]" attacking a [[Dragon]] monster. In the case of "Dogmatika Punishment", "Fleurdelis" is attacking "[[Titaniklad the Ash Dragon]]", whereas this card's artwork depicts "Despian Luluwalilith" (a corrupted form of "Fleurdelis") attacking "Bystial Dis Pater".
  ** Both cards have an effect to counter [[Extra Deck]] monsters.
