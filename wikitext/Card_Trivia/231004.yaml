title: Card Trivia:Ninjitsu Art of Shadow Sealing
wikitext: |-
  {{Navigation}}

  * "[[White Dragon Ninja]]" and "[[Blue Dragon Ninja]]" appear in this card's artwork.
  * "Kagenui" in this card's Japanese name refers to a fabled ninja technique of using a kunai or shuriken to pin the target's shadow to the ground, preventing them from moving.
