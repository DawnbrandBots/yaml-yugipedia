title: Card Trivia:Alba System Dogmatikalamity
wikitext: |-
  {{Navigation}}

  * This is the first "[[Dogmatika]]" [[Extra Deck]] monster.
  * This monster resembles a mechanized form of "[[Albion the Sanctifire Dragon]]".
  * This monster has the highest [[original ATK]] (4500) of all [[Level 8]] monsters.
  ** This is also the first Level 8 monster to feature an original ATK of 4500.
