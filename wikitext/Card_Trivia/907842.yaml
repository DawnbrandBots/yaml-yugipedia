title: Card Trivia:Tearlaments Kaleido-Heart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Tearlaments Cryme]]", "[[Tearlaments Grief]]", and "[[Tearlaments Heartbeat]]".
  ** This card's artwork appears in the artwork of "[[Loka Samsara]]".
  * "[[Tearlaments Kitkallos]]" and "[[Tearlaments Scheiren]]" appear in this card's artwork.
  * This card is named after a [[wikipedia:Kaleidoscope|kaleidoscope]].
  ** This card's name is a reference to the stained glass theme of the "[[Tearlaments]]" monsters.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Tearlaments Reinoheart]]".
  * This card has three [[Heart]] counterparts:
  ** "[[Scareclaw]]" [[Link Monster|Link]]: "[[Scareclaw Tri-Heart]]"
  ** "[[Kashtira]]" [[Xyz Monster|Xyz]]: "[[Kashtira Arise-Heart]]"
  ** [[LIGHT]] "[[Mannadium]]" [[Synchro Monster|Synchro]]: "[[Mannadium Prime-Heart]]"
  ** This card also has a "[[Visas Starfrost]]"-oriented counterpart: "[[Vicious Astraloud]]"
