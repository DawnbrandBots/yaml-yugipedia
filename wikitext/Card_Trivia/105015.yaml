title: Card Trivia:Dragunity Knight - Trident
wikitext: |-
  {{Navigation}}

  * This card is designed after a [[wikipedia:Trident|trident]]; the horns/armor on the head of this monster form three spikes, equal to the number of prongs on a trident, and it has an effect that sends three of your opponent's cards or card types in their [[Extra Deck]] to the [[Graveyard]].
  * The position of this card's stance is similar to that of "[[Felgrand Dragon]]".
  * "[[Dragunity Primus Pilus]]" appears to be the one riding "Trident".
  ** According to the "Master Guide", the dragon is a mature form of "[[Dragunity Javelin]]".
