title: Card Trivia:Brigrand the Glory Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Tri-Brigade Revolt]]".
  ** The silhouette of this monster's head also appears inside one of the ice spikes in the artworks of "[[Mirrorjade the Iceblade Dragon]]" and "[[Branded Sword]]".
  * "[[Dogmatika Ecclesia, the Virtuous]]" appears in this card's artwork, being held by this monster.
  * This monster is a "[[Tri-Brigade]]"-oriented [[Card evolutions|empowered]] [[Albaz Dragon|form]] of "[[Fallen of Albaz]]".
  ** The kanji ''Konjiki'' (痕喰, lit. "stigmata eating") in this card's Japanese name and the 'Stigmata' on this monster's forehead imply that, in order to transform into this monster, "Fallen of Albaz" absorbed the 'Stigmata' from "Ecclesia", presumably after she was almost corrupted through her 'Stigmata' in "[[Dogmatikacism]]".
  *** ''Konjiki'' (痕喰) is also a homophone of ''Konjiki'' (金色, lit. "golden"), referring to the color of the 'Stigmata' mark and this monster's horns.
  ** This monster's name ("Brigrand") and appearance are references to the "Tri-Brigade" archetype.
  ** This card is also a [[Beast]] monster, like the "Tri-Brigade" monsters.
  * "[[The Dragon that Devours the Dogma]]" is "Fallen of Albaz" in the midst of transforming into this monster.
