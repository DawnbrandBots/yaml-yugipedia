title: Card Trivia:Fortune Lady Every
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fortune Lady Calling]]".
  * This monster is an older version of "[[Solitaire Magician]]".
  * This is the first "[[Fortune Lady]]" monster whose skin tone was not changed upon its international release, referencing the "Fortune Lady" appearance in the English-dubbed version of ''[[Yu-Gi-Oh! 5D's]]''.
  ** This is also the only "Fortune Lady" monster to have the exact same English name as its Japanese name, while the rest of "Fortune Lady" monsters have the last "y" omitted.   
  * In ''[[Yu-Gi-Oh! Duel Links]]'', when [[Dark Signer Carly Carmine]] [[Synchro Summon]]s this monster, she refers to it as a [[Dark Synchro Summon|Dark Synchro]] and the Dark Synchro Summon animation plays instead of the normal one.
