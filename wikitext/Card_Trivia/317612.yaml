title: Card Trivia:Shopina the Melodious Maestra
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Frédéric Chopin|Frédéric François Chopin]], a Polish composer and virtuoso pianist of the Romantic period.
  ** "[[wikipedia:Laureate|Laureate]]" in this card's Japanese name is a title for a recipient of honor or recognition for achievement in an art. It may be a reference to the laureates of the [[wikipedia:International Chopin Piano Competition|International Chopin Piano Competition]], a prestigious competition devoted entirely to Chopin's works.
  * This card's name was first translated imprecisely in Portuguese as "Shopina, a ''Diva'' Melodiosa" ("Shopina the Melodious ''Diva''"). It has since received an [[Card Errata:Shopina the Melodious Maestra|erratum]], being changed into "Shopina, a ''Maestra'' Melodiosa".
