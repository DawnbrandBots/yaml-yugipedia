title: Card Trivia:Long-Tailed Black Horse
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[send]] an [[EARTH]] [[Zombie]] monster from the [[Deck]] to the [[Graveyard]] was likely designed to send "[[Nurikabe]]" there in order to use its ''OCG''/''TCG'' effect to make the player pay 1000 [[Life Point]]s to [[Special Summon]] it and another Zombie monster from the Graveyard. This is a reference to a scene in {{chapter|GX|047|ref}} where [[Long-Tailed Black Horse (manga)|this monster]] and "[[Nurikabe (manga)|Nurikabe]]" were Special Summoned from [[Bastion Misawa (manga)|Bastion Misawa's]] Graveyard via the effect of "[[Ghostly Reinforcements]]".
  ** This monster's pose in its ''OCG''/''TCG'' artwork is taken from a panel from the aforementioned chapter of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' showing this monster being Summoned, albeit reversed.
