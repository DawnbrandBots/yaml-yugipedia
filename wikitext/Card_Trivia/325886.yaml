title: Card Trivia:Great Sorcerer of the Nekroz
wikitext: |-
  {{Navigation}}

  * This monster is an older version of "[[Gishki Avance]]" and "[[Avance, Swordsman of the Nekroz]]", as reflected by their identical stats and the same "[[Gishki Aquamirror]]"-ahdorned sword they carry.
  ** This card has a "[[Zefra]]" version: "[[Zefrasaber, Swordmaster of the Nekroz]]".
  * "[[Shurit, Strategist of the Nekroz]]" is the son of this monster and "[[Dance Princess of the Nekroz]]".
  * This monster has two [[Ritual Monster|Ritual]] armored forms: "[[Nekroz of Unicore]]" and "[[Nekroz of Valkyrus]]".
  ** He appears as himself in the artworks of "[[Ritual Beast Return]]" and "[[Zefra Providence]]".
  * In addition to the aforementioned "Gishki Aquamirror", "[[Nekroz Mirror]]" also appears as part of this monster's staff.
