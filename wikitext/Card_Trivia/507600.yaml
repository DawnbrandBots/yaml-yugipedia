  * This monster has a [[counterpart]]: "[[The Unhappy Maiden]]".
  ** Unlike "The Unhappy Maiden", this card's artwork was edited to reduce this monster's bust size.
  ** Either this monster or "The Unhappy Maiden" appears in the artwork of "[[Double Payback]]" (near the top-left corner of the artwork).
