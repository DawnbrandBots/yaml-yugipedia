title: Card Trivia:Ground Erosion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card appears in the international artwork of "[[Trap Sluzer]]".
  * In the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]], this card replaced the role of "[[Crumbling Axe]]" in the [[Yu-Gi-Oh! (manga)|manga]], as the latter card's effect [[target]]ed [[Dark Yugi (manga)|Dark Yugi's]] "[[The God of the Obelisk]]", and decreased its [[ATK]] by 500 for each turn it was [[face-down]], despite its immunity to [[Spell]]/[[Trap Cards]]. 
  ** In the ''Yu-Gi-Oh!'' anime, this card instead used to place [[Turn Counter]]s on itself for each turn it was [[face-up]], [[select]] the [[Monster Card Zone]] occupied by "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]", and decrease its [[ATK]] by 500 for each Turn Counter on this card without having to target "Obelisk". Also, its additional effect to [[negate]] the effects of the monster in the selected Monster Card Zone was designed to counter the [[Quick Effect]] of "Obelisk" in the anime.
