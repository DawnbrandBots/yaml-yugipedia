title: Card Trivia:Goblin Bikers Gone Wild
wikitext: |-
  {{Navigation}}

  * "[[Goblin's Crazy Beast]]", "[[Goblin Biker Big Gabonga]]", "[[Goblin Biker Boom Mach]]", "[[Goblin Biker Clatter Sploder]]", "[[Goblin Biker Dugg Charger]]", "[[Goblin Biker Mean Merciless]]", and an unknown "[[Goblin Biker]]" monster appear in this card's artwork.
  * The first half of this monster's Japanese name (天上天下), combined with the second half of "[[Goblin Bikers Gone Bonkers]]'" Japanese name (唯我独尊), form the phrase 「天上天下唯我独尊」(''tenjōtenge yuigadokuson'', "throughout heaven and earth, I alone am exalted"), supposedly the [[wikipedia:The Buddha|Buddha's]] first words from birth according to the [[wikipedia:Dirgha Agama|Dirgha Agama]].
  ** The phrase is commonly associated with [[wikipedia:Bōsōzoku|Bōsōzoku]] slogans, a Japanese youth motorcycle subculture.
