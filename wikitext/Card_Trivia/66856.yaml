title: Card Trivia:Black Ptera
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Extinction on Schedule]]".
  * This monster is based on the ''[[wikipedia:Pteranodon|pteranodon]]'', a genus of [[wikipedia:Pterosaur|pterosaurs]] known for being the largest flying reptiles with a large wingspan.
  ** Ironically, this monster's design features sharp teeth, despite the fact that the ''pteranodon'' was known for having no teeth.
