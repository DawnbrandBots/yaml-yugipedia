title: Card Trivia:Madolche Magileine
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on the [[wikipedia:French people|French]] [[wikipedia:dessert|dessert]] ''[[wikipedia:Madeleine (cake)|madeleine]]'', a small, shell-shaped [[wikipedia:sponge cake|sponge cake]].
  ** This card's English name is a combination of the words "[[wikipedia:Magic|Magic]]" or "Magician" and the dessert called "madeleine". "Magic" + "Madeleine" = "Magileine"
  ** This card's Japanese name is a combination of the Japanese word for [[wikipedia:witchcraft|witch]] (''majo'') and "madeleine". "Majo" + "Madeleine" = "Majoleine".
  * This monster appears in the artwork of "[[Madolche Chateau]]","[[Madolche Tea Break]]", "[[Madolche Nights]]", and "[[Xyz Reception]]".
  * One of the forks in the artwork of "[[Madolche Lesson]]" is the fork "Magileine" uses.
  * "Magileine" has [[wikipedia:Heterochromia iridum|heterochromic eyes]]. Her right eye is [[wikipedia:green|green]] and her left eye is [[wikipedia:violet (color)|violet]].
  * At the end of her fork are three Madeleine cakes, which is the dessert she is named after.
  * This monster, along with "[[Madolche Butlerusk]]" and "[[Madolche Puddingcess]]" appear on the sign for the school festival's "Monster cafe" in [[Yu-Gi-Oh! ZEXAL - Episode 092|episode 92]] of the ''[[Yu-Gi-Oh! ZEXAL|ZEXAL]]'' anime. The sign is modeled after a [[Spell Card]] and the three monsters can be seen having tea in the picture, so it may be a reference to the art of "Madolche Tea Break".
