title: Card Trivia:Power Capsule
wikitext: |-
  {{Navigation}}

  * This card's effect is designed to simulate the acquisition of a Power Capsule from [[wikipedia:Konami|Konami]]'s ''[[wikipedia:Gradius|Gradius]]'' series, which would upgrade the player's ship in one of various ways. The [[Card effect|effect]] of  "[[Victory Viper XX03]]" covers that enemies randomly drop Power Capsules.
  * The background artwork for this card very heavily resembles the background during the first boss rush of ''[[wikipedia:Gradius V|Gradius V]]''. It is quite likely that this card's artwork was meant to be a simulation of the pre-boss rush "Zub Rush" in which innumerable smaller enemies will appear that drop power capsules upon being killed.
  ** This is supported by the fact that these capsules appear in the artwork of "[[Boss Rush]]".
