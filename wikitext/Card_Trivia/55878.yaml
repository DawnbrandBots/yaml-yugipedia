title: Card Trivia:Fushi No Tori
wikitext: |-
  {{Navigation}}

  * This monster resembles a [[wikipedia:Phoenix (mythology)|phoenix]], an immortal mythological bird.
  ** This card's name can be translated as "Fire Bird of Undeath/Immortality". This is fitting, given this monster's appearance of a phoenix (birds that are reborn when their life ends, thus never truly dying).
