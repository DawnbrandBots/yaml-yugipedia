title: Card Trivia:Brotherhood of the Fire Fist - Wolf
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, ''Shōensei Urubushō'', is derived from "[[wikipedia:Wu Song|Wu Song]]" (read in Japanese as "Bu Shō") and "wolf" (urufu). Wu Song is one of the 108 [[wikipedia:Water Margin|Liangshan heroes]], ranked 14th among the 36 Heavenly Spirits, and is a practitioner of the [[wikipedia:Drunken boxing|Drunken Eight Immortals style of drunken boxing]].
  ** This monster can be seen with a flask of alcohol worn on his hip.
  * This monster appears in the artwork of "[[Fire Formation - Gyokkou]]".
  * The kanji "傷" on this monster's belt and the wolf in this card's artwork translates to "wound" or "scar".
