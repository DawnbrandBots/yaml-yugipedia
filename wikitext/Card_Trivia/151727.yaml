title: Card Trivia:Blackwing - Sharnga the Waning Moon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023]]''.
  * This monster is named after the [[wikipedia:Sharanga|Sharanga]], a celestial bow wielded by [[wikipedia:Vishnu|Vishnu]], the Hindu god of preservation.
  ** This monster's title is named after the waning crescent, the final [[wikipedia:Lunar phase|lunar phase]] of the moon, where the sunlight hits a leftmost portion of the moon before the "new moon", making the moonlight appear crescent-shaped.
  * This monster's pose mirrors that of "[[Blackwing - Pinaki the Waxing Moon]]".
  ** Both are named after bows wielded by [[wikipedia:Hindu deities|Hindu deities]] and different lunar phases that face opposite directions.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|027|ref}}, specifically from the panel showing [[Blackwing - Sharnga the Waning Moon (manga)|this monster]] being Summoned, albeit with its eyes turned towards the viewer.
