title: Card Trivia:CXyz Mechquipped Djinn Angeneral
wikitext: |-
  {{Navigation}}

  * This monster's name features two portmanteaus, with "Mechquipped" being a combination of "mech" and "equipped", and "Angeneral" being a combination of "angel" and "general".
  ** The latter's Japanese name, "Engeneral" is a combination of "engine", "angel" and "general". This is supported by how this monster's design and [[Type]], despite its name and resemblance to [[Machine]] monsters, is actually a [[Fairy]] monster.
  * This monster is the "[[CXyz]]" [[Card evolutions|evolution]] of "[[Mechquipped Angineer]]".
  * This is the first "CXyz" monster, as well as the first [[Xyz Monster]] to be Summoned through [[Rank-Up|Ranking-Up]].
  ** This is also the first Xyz Monster to be summoned through the effect of a "[[Rank-Up-Magic]]" card in the anime.
  * This monster shares similarities with "[[Number C40: Gimmick Puppet of Dark Strings]]" and "[[Number C102: Archfiend Seraph]]", as all three monsters are "[[C (archetype)|Chaos]]" Xyz Monsters that represent demonic figures or fallen angels, while their original forms represent them as angelic figures.
