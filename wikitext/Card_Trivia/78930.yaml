title: Card Trivia:Skilled Dark Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Supremacy]]".
  * Four [[Spell Counter]]s appear in this card's artwork.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, by the time three [[Spell Card]]s are activated, the Spell Counters on this monster's right shoulder, left shoulder and chest plate will glow in consecutive order.
  * This monster's base Japanese name for "Black Magician" (黒魔術師, ''Kuromajutsushi'') can also translate to "Necromancer", reflecting its effect to [[Special Summon]] "[[Dark Magician]]" from the player's [[Graveyard]].
  * This monster has a [[LIGHT]] [[counterpart]]: "[[Skilled White Magician]]".
  ** Both monsters' [[Attribute]]s and [[original ATK and DEF]] are the complete opposite of each other.
  ** Both monsters' effects can Special Summon the [[Fusion Material]]s for "[[Dark Paladin]]".
  ** Both monsters debuted together in the ''[[Champion of Black Magic]]'' [[Core Booster|Core Booster pack]].
  * This monster has an older ''[[Rush Duel]]'' counterpart: "[[Wizened Dark Magician]]".
  * This monster's appearance differs between the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh]]'' and ''[[Yu-Gi-Oh! GX]]'' anime series. In ''Yu-Gi-Oh!'', this monster's cloak is blue and his armor is turquoise with silver trim, while in ''Yu-Gi-Oh! GX'', it wears a white cloak with navy armor and orange trim, which is later reused in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
