title: Card Trivia:Condolence Puppet
wikitext: |-
  {{Navigation}}

  * "[[Gimmick Puppet Bisque Doll]]" appears in this card's artwork.
  * This card was first revealed on the ''[[OCG]]'' [https://twitter.com/YuGiOh_OCG_INFO/status/1178566144585805825 Twitter] page on the 30th September 2019, at 4:04 pm JST. This is likely a reference to [[Quattro]], who is named after the number "4" and used a "[[Gimmick Puppet]]" Deck in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
