title: Card Trivia:Fabled Lurrie
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Demon Roar God Revival!!]]''.
  * This monster appears in the artwork of "[[Stairway to a Fabled Realm]]".
  ** "Stairway to a Fabled Realm" also appears in this card's second artwork.
  * This card's second artwork depicts the mask of "[[Fabled Gammajin]]", and the imps Wrath (red), Gludd (blue), Gree (white), and Malice (black).
