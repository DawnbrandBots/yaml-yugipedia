title: Card Trivia:K9-66X "Jacks"
wikitext: |-
  {{Navigation}}

  * "[[K9-04 Noroi]]" appears in the distance of this card's artwork, seemingly controlling this monster. 
  * This monster is the combined [[Xyz Monster|Xyz]] form of "[[K9-66a Jokul]]" and "[[K9-66b Lantern]]".
  ** The artwork of "[[K9-EW Special Release Experiment]]" depicts their transformation into this monster.
  ** This monster is named after both [[wikipedia:Jack Frost|Jack Frost]] (referenced by the ice-themed "K9-66a Jokul") and the [[wikipedia:Jack-o'-lantern|Jack-o'-lantern]] (referenced by the fire-themed "K9-66b Lantern").
  ** This monster's [[original ATK and DEF]] are 600 higher than those of "K9-66a Jokul" and "K9-66b Lantern", referencing the number 6 being repeated in the names of all three of them.
