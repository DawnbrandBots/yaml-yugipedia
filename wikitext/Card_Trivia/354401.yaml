title: Card Trivia:Dante, Pilgrim of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Extra Pack 2015]]''.
  * This monster appears in the artwork of "[[The Terminus of the Burning Abyss]]".
  * Like "[[Dante, Traveler of the Burning Abyss]]", this monster is based on the real-world Italian poet [[wikipedia:Dante Alighieri|Dante Alighieri]], author of the ''[[wikipedia:Divine Comedy|Divine Comedy]]'': a three-part epic poem depicting Dante on a mystical odyssey through the Christian afterlife.
  ** Unlike "Traveler", this card depicts Dante in the final section of the poem, ''[[wikipedia:Paradiso (Dante)|Paradiso]]''. In it, Dante finally reaches Heaven after a harrowing journey through Hell and Purgatory. He is greeted by his love Beatrice, who guides him through the realms of the Angels to the Empyrean and God himself, where he becomes enlightened through the direct contemplation of the divine.
