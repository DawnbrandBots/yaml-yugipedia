title: Card Trivia:Shaddoll Squamata
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]''.
  * This monster is "[[Satellarknight Unukalhai]]" (or at least its armor) transfigured into a "[[Shaddoll]]" after the events depicted in the artwork of "[[Curse of the Shadow Prison]]".
  ** Both monsters share the same [[Level]] (4) and the same [[original ATK and DEF]] (1800/1000), as well as similar [[effect]]s of [[send]]ing cards from their respective [[archetype]]s to the [[Graveyard]].
  ** This monster's serpentine appearance likely references the star [[wikipedia:Alpha_Serpentis|Alpha Serpentis]], which "Satellarknight Unukalhai" is named after.
  * This monster's ''[[TCG]]'' name comes from the taxonomic classification [[wikipedia:Squamata|Squamata]], the order of reptiles which comprehends all snakes and lizards.
  * This monster features a golden snake-like object/entity coiled around its body. This may have been from the staff of "[[Constellar Rasalhague]]", which appears in the artworks of "[[Curse of the Shadow Prison]]", "[[El Shaddoll Shekhinaga]]", "[[Jiaotu, Darkness of the Yang Zing]]", "[[Shaddoll Zefranaga]]", and "[[Yang Zing Brutality]]".
