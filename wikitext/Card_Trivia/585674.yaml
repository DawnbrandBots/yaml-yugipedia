title: Card Trivia:T.G. Halberd Cannon/Assault Mode
wikitext: |-
  {{Navigation}}

  * This monster is the [[Card evolutions|upgraded]] "[[/Assault Mode]]" form of "[[T.G. Halberd Cannon]]".
  ** This is the first "/Assault Mode" monster to have the same [[Level]] as its base form, since "T.G. Halberd Cannon" already has the highest possible printed Level (12).
  * This monster has the highest Level (12) and [[original ATK and DEF]] (4500/4500) of all "[[T.G.]]" monsters (tied with "T.G. Halberd Cannon" for the highest Level of all "T.G." monsters).
  ** It is also tied with "[[Red Nova Dragon/Assault Mode]]" for the highest Level (12) of all "/Assault Mode" monsters.
