title: Card Trivia:Nomadic Force
wikitext: |-
  {{Navigation}}

  * "[[Axe of Fools]]", "[[Cursed Armaments]]", "[[Cursed Bill]]", "[[Draining Shield]]", "[[Emergency Provisions]]", "[[Pestilence]]", the sword of "[[Field-Commander Rahz]]", and the armor of "[[Giga Gagagigo]]" appear in this card's artwork.
  * This monster appears to be an older [[counterpart]] of "[[Exiled Force]]".
  ** This monster is depicted with its members wielding "Axe of Fools", "Cursed Armaments", "Cursed Bill", and "Pestilence", all of which are [[Equip Spell Card]]s that feature negative effects.
  *** This monster has an older counterpart, "[[Missing Force]]", where the [[equip]]ment's negative effects have taken their toll on the group and thinned their ranks.
  * It is speculated that the characters in this card's artwork eventually grew into "[[Freed the Brave Wanderer]]", "[[Marauding Captain]]," and "[[Field-Commander Rahz]]".
  ** In [[Master Guide 1 card storylines#The_Days_of_Freed,_the_Career_Soldier|Master Guide 1]], it is mentioned that "Exiled Force" was under the command of "Freed". The soldier in the center is holding "Draining Shield", whereas the artwork of "Draining Shield" depicts "Freed". The soldier near the right rear is suffering from "Pestilence", whereas the artwork of "Pestilence" depicts "Marauding Captain". The soldier wearing the red handband is the same one that "Field-Commander Rahz" wears, while the soldier in the center is holding the sword wielded by "Rahz".
