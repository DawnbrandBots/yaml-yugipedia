title: Card Trivia:Enchanted Sword Nothung
wikitext: |-
  {{Navigation|mode=nonGame}}

  * In [[wikipedia:Norse mythology|Norse mythology]], [[wikipedia:Gram (mythology)|Gram]] is the name of the sword that [[wikipedia:Sigurd|Sigurd]] (Siegfried) used to kill the dragon [[wikipedia:Fafnir|Fafnir]]. In [[wikipedia:Richard Wagner|Richard Wagner]]'s ''[[wikipedia:Der Ring des Nibelungen|Der Ring des Nibelungen]]'', the sword is called Nothung.
