title: Card Trivia:Galaxy-Eyes Afterglow Dragon
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] [[counterpart]] of "[[Galaxy-Eyes Photon Dragon]]".
  * This card's name is based on the [[wikipedia:Gamma-ray burst|afterglow]], which in astronomy refers to the gradually fading shine coming from [[wikipedia:Gamma-ray burst|gamma-ray bursts]], and sometimes [[wikipedia:Nova|novae]] and [[wikipedia:Supernova|supernovae]].
