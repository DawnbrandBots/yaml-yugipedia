title: Card Trivia:Life Stream Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Crimson Dragon Quetzacoatl]]" and "[[Life Extreme]]", which depicts its transformation from "[[Power Tool Dragon]]".
  * This monster is the true form of [[Leo]]'s [[signature card]] "[[Power Tool Dragon (anime)|Power Tool Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime, as well Leo's true signature card.
  ** This monster being the "evolved" form of "Power Tool Dragon" reflects how Leo "evolves" into a [[Signer]].
  ** This monster's effect to restore [[Life Point]]s (to 2000 in the anime, to 4000 in the ''[[OCG]]''/''[[TCG]]'') and prevent effect damages reflects Leo's desire to protect his twin sister [[Luna]] and his friends from harm in the anime.
  ** According to ''[[Duel Art]]'', "Power Tool Dragon" was always intended by [[Kazuki Takahashi]] to be a [[Signer Dragon]] with a true form, although the initial design was very different from this monster.
  * This monster has the highest combined [[ATK]] and [[DEF]] (5300) out of all the "Signer Dragons".
  * This is the only Signer Dragon to not have a [[Duel Dragon]] [[counterpart]]; instead, "Power Tool Dragon" has a Duel Dragon counterpart: "[[Power Tool Mecha Dragon]]".
  * This is the only Signer Dragon to be a Tuner monster and the only one to require a specific [[Synchro Material]].
  ** It is also the only [[Tuner Synchro Monster]] to require a [[Synchro Monster]] as a Synchro Material.
  * The monster's anime effect to change other Synchro Monsters' [[Level]]s to 1 is incorporated into the [[Spell Card]], "[[Synchro Overtop]]".
