title: Card Trivia:Gorgon's Eye
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Gorgon|Gorgon]], a feminine half-human, half-snake creature from [[wikipedia:Greek mythology|Greek mythology]] known for having sharp fangs and venomous snakes for hair.
  ** This card's name and effect to [[negate]] the effects of all [[Defense Position]] monsters is a reference to the Gorgon's power to turn people who look upon it to stone with their gaze.
  ** The background of this card's artwork features a design similar to that of "[[Reptilianne Gorgon]]", another card based on the Gorgon.
  * This card's Spanish name features a typo, as it didn't translate the word "Gorgon", thus, it was printed as "''El Ojo del Gorgon''" rather than"''El Ojo de la Gorgona''".
