title: 'Card Trivia:Number 77: The Seven Sins'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * Like other "[[Number]]" monsters associated with [[Kyoji Yagumo]], this monster is related to one of the [[wikipedia:Seven deadly sins|seven deadly sins]]; unlike the others, however, this monster's name is not related to a specific sin, instead being a reference to all the seven deadly sins.
  * This is the first revealed [[Rank 12]] "Number" monster (excluding "[[Number C]]" monsters); however, the first [[Rank]] 12 "Number" monster to be released in the ''[[OCG]]''/''[[TCG]]'' was "[[Number 93: Utopia Kaiser]]".
  ** This is also the first Rank 12 monster to have a regular [[Xyz Summon|Xyz]] [[Summoning condition]]; "Number 93: Utopia Kaiser" has its Summoning condition from the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga changed in the ''OCG''/''TCG''.
  * This monster's ''OCG''/''TCG'' alternate Summoning condition, which requires the player to use a [[Rank 10]] or [[Rank 11]] [[DARK]] monster as [[Xyz Material]], is an alteration of the effect of "[[Revenge Prison]]", which was used to Summon it by using the Rank 11 "[[No. 84: Pain Gainer (manga)|No. 84: Pain Gainer]]" (a DARK monster) as Xyz Material in {{chapter|ZEXAL|045|ref}}. The alternate condition requiring a Rank 10 monster as an alternate option is based on how Yagumo also controlled the Rank 10 "[[No. 35: Ravenous Tarantula (manga)|No. 35: Ravenous Tarantula]]".
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''Yu-Gi-Oh! ZEXAL'' manga, specifically from the panel showing [[No. 77: The Seven Sins (manga)|this monster]] being Summoned.
