title: Card Trivia:Zombina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Monster Assortment]]" (as a cookie).
  ** "[[Live☆Twin Ki-sikil]]" cosplays as this monster in the artwork of "[[Evil★Twin's Trouble Sunny]]" (in the upper-right corner), in one of two billboards that advertise "Monster Assortment".
  * This monster is indirectly mentioned in the [[flavor text]] of "[[Zombino]]".
  ** According to [[The Valuable Book EX 5 card storylines|The Valuable Book EX 5]], this monster and "Zombino" are streamers and "the leading stars of the melancholic horror world", who are major competition for the "[[Live☆Twin]]" monsters.
