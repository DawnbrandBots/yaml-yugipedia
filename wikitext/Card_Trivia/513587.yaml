title: Card Trivia:ZERO-MAX
wikitext: |-
  {{Navigation}}

  * This card's name is an [[wikipedia:oxymoron|oxymoron]], as its effect can only be [[activate]]d when the player has no ("ZERO") cards in their [[hand]] and allows them to [[destroy]] monsters that do not have the equal or higher ("MAX") [[ATK]] than the [[Special Summon]]ed "[[Infernity]]" monster.
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[NEXT]]", the "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
