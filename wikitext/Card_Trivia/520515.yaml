title: Card Trivia:Excode Talker
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Extreme Force]]''.
  ** This is the first "[[Code Talker (archetype)|Code Talker]]" monster to be released in a [[Core Booster|Core]] [[Booster pack]] instead of a [[Starter Deck]] or [[Structure Deck]].
  * This monster appears in the artworks of "[[Break & Reverse]]", "[[Cynet Codec]]", and "[[Disconnect Linker]]".
  * This monster's name is likely based on [[wikipedia:Xcode|Xcode]], a software application used by [[wikipedia:Apple Inc.|Apple Inc.]]
  * This monster has five "Code Talker" [[counterpart]]s:
  ** [[DARK]]: "[[Decode Talker]]"
  ** [[LIGHT]]: "[[Encode Talker]]"
  ** [[FIRE]]: "[[Powercode Talker]]"
  ** [[WATER]]: "[[Shootingcode Talker]]"
  ** [[EARTH]]: "[[Transcode Talker]]"
