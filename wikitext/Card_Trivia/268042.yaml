title: Card Trivia:High Tide on Fire Island
wikitext: |-
  {{Navigation}}

  * "[[Atlantean Attack Squad]]", "[[Atlantean Dragoons]]", "[[Atlantean Pikeman]]", "[[Fire King Avatar Barong]]", "[[Fire King Avatar Kirin]]", "[[Fire King Avatar Yaksha]]", "[[Fire King High Avatar Garunix]]", "[[Fire King Island]]", and "[[Poseidra, the Atlantean Dragon]]" appear in this card's artwork.
  ** This card's artwork depicts the "[[Atlantean]]" monsters attempting to invade "Fire King Island" and fighting against the "[[Fire King]]" monsters.
  *** The event in this card's artwork continues in the artwork of "[[Firestorms Over Atlantis]]".
  * This card's artwork is adapted into a minor scene in ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'', which depicts "Garunix" and "Poseidra" battling each other.
