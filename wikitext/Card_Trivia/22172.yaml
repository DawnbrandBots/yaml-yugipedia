title: Card Trivia:Gate Guardian
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Speed Duel GX: Midterm Paradox]]''.
  * This monster appears in the artwork of "[[Riryoku Guardian]]".
  * This monster is the combined form of "[[Kazejin]]", "[[Suijin]]", and "[[Sanga of the Thunder]]".
  ** This card's [[ATK]]/[[DEF]] are each equal to half the combined [[original ATK and DEF]] of the three aforementioned monsters.
  ** When this card was first released in Japan as one of the [[Yu-Gi-Oh! Duel Monsters II: Dark Duel Stories Duelist Legend in Tokyo Dome attendance cards|''Dark Duel Stories Duelist Legend in Tokyo Dome'' attendance cards]], it was impossible to [[Summon]], as those three monsters had not been released yet.
  ** This monster was a [[Ritual Monster]] in a few early video games, with "[[Gate Guardian Ritual]]" as its [[Ritual Spell Card]] and requiring those three monsters as [[Tribute]]s.
  *** In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster was a [[Fusion Monster]] instead.
  * This card has an [[Card evolutions|upgraded]] form: "[[Dark Guardian]]".
  * This monster has a retrained Fusion Monster counterpart: "[[Gate Guardians Combined]]".
  * This is the first [[Level 11]] monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This is the [[signature card]] of the [[Paradox Brothers]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * In {{chapter|Yu-Gi-Oh!|096|ref}}, [[Meikyû the Elder]] revealed in his thoughts that "[[Exodia the Forbidden One (manga)|Exodia the Forbidden One]]" used to be the only monster in ''[[Duel Monsters]]'' that could only be Summoned by "activating" several cards at once, until [[Maximillion J. Pegasus (manga)|Maxilillion Pegasus]] created the three cards capable of Summoning [[Gate Guardian (manga)|this monster]]: "[[Sanga of the Thunder (manga)|Sanga of the Thunder]]", "[[Kazejin (manga)|Kazejin]]", and "[[Suijin (manga)|Suijin]]".
  ** Despite this, in {{chapter|Yu-Gi-Oh!|097|ref}}, [[Dark Yugi (manga)|Dark Yugi]] thought that this monster was simply three monsters stacked on top of each other, and proved to be correct when he won the [[Duel]] by defeating it one monster at a time.
  * In the "Ultimate Dueling Guide", this monster is listed as one of the best cards in ''[[Metal Raiders]]'', the set in which it debuted.
  * In the intro to [[Yu-Gi-Oh! - Volume 011|Volume 11]] of the ''Yu-Gi-Oh'' manga, [[Kazuki Takahashi]] admitted that he felt he rushed this monster's design, noting that it was due to his rather busy schedule.
  * This monster's Summoning cutscene in ''[[Yu-Gi-Oh! Duel Links]]'' features an underground dungeon setting with two gates. This is a reference to the [[Duel]] between [[Yami Yugi]], [[Joey Wheeler]], and the [[Paradox Brothers]] in the [[Paradox Brothers' dungeon]] in the ''Yu-Gi-Oh!'' manga and anime.
  * This card's [[Gate Guardian (Bandai)|Bandai]] and ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|095|ref}}, specifically from the panel showing [[Gate Guardian (manga)|this monster]] fully manifesting after being Summoned, with minor changes in detailing.
  * The color scheme of "[[Gate Guardian (Bandai)|Gate Guardian]]" and its components are radically different in the [[Bandai's Official Card Game|Bandai card game]]. "[[Sanga of the Thunder (Bandai)|Sanga of the Thunder]]" is silver with bronze nails, "[[Kazejin (Bandai)|Kazejin]]" is pink and exudes wind energy (which it does not do in other card depictions in the ''[[OCG]]''/''[[TCG]]''), "[[Suijin (Bandai)|Suijin]]" is pink and surrounded by a silvery substance/cloak in its own card art, and as a component of "Gate Guardian" it is pink in the head and feet, silver in the legs, and a lighter silver on the toes. Its toes also look noticeably longer than they are in the monster's other appearances.
  ** The Bandai art team also seemed to make the legs into bulbous masses directly connected to the feet, with no sign of any knee joints. This is possibly a misunderstanding of how "Gate Guardian" is supposed to be designed, as its art is based on a scene where the monster was kneeling during its Summoning, making its lower legs hard to see.
