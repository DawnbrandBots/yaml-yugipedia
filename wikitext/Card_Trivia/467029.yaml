title: Card Trivia:Follow Wing
wikitext: |-
  {{Navigation}}

  * This card's last effect is similar to the effects of "[[Clear Wing Synchro Dragon]]" and "[[Crystal Wing Synchro Dragon]]", in that their effects also involve Level 5 or higher monsters, and increasing their own ATK by the ATK of those monsters under the right circumstances.
  ** This is also connected by the fact that [[Yugo]] uses all of these cards in the [[Yu-Gi-Oh! ARC-V|anime]].
