title: Card Trivia:Symph Amplifire
wikitext: |-
  {{Navigation}}

  * "[[Symphonic Warrior Basses]]", "[[Symphonic Warrior Drumss]]", "[[Symphonic Warrior Guitaar]]", "[[Symphonic Warrior Miccs]]", and "[[Symphonic Warrior Synthess]]" appear in this card's artwork.
  ** This card marks the first appearance of "Symphonic Warrior Miccs" over 8 months in the Japanese ''[[OCG]]'' before its release in ''[[Dimension of Chaos]]''.
  * The word "Symph" was likely added to this card's English name to differentiate it from "[[Amplifier]]" for card effects that require the player to state a specific card name (e.g. "[[Prohibition]]").

