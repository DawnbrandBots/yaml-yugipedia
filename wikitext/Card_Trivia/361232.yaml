title: Card Trivia:Bee Formation
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Battlewasp - Ballista the Armageddon]]" appears in this card's artwork.
  * The Japanese pronunciation of this card's name is a pun, as the Japanese word for "bee" (蜂 ''hachi'') shares the same pronunciation of the number "8" (八 ''hachi'').
  ** Fittingly, this card's artwork features a swarm of bees forming the number "8" behind "Ballista the Armageddon", which was also used in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
