title: Card Trivia:Goddess of Sweet Revenge
wikitext: |-
  {{Navigation}}

  * This monster is a [[Card evolutions|retrained]] version of "[[Gyakutenno Megami]]".
  ** This monster's name and effect reference how [[Seto Kaiba]] used "[[Gyakutenno Megami]]" to jam and disarm [[Kemo]]'s gun in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and original Japanese [[Yu-Gi-Oh! (anime)|anime]].
