title: Card Trivia:Brotherhood of the Fire Fist - Raven
wikitext: |-
  {{Navigation}}

  * In the ''OCG'', this monster is named after ''[[wikipedia:Zhang Qing (Featherless Arrow)|Zhang Qing]]'' (read in Japanese as Chō Sei) and "raven" (reivun).
  ** ''Zhan Quing'' ranks 16th of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "Featherless Arrow".
  * The kanji 捷 on this monster's belt and the raven in this card's artwork means "clever/agile".
  * This monster appears in the artwork of "[[Fire Formation - Tenki]]".
