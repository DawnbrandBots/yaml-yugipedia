  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Champion of Chaos!!]]''.
  * This monster appears in the artworks of "[[Divergence]]" and "[[Synchro Gift]]".
  * This monster has the highest [[Level]] (9) of any "[[Genex]]" monster.
  * This monster has a "[[lswarm]]" counterpart: "[[Evilswarm Coppelia]]"
