title: Card Trivia:Rai Rider
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Three Card Summon]]".
  * "Rai" in this card's name is the Japanese word for "lightning"/"thunder", which is reflected in this card's [[Thunder]] [[Type]].
  * In {{episode|Yu-Gi-Oh! ZEXAL|006|ref}}, as Yuma prepares to Xyz Summon "[[Number 17: Leviathan Dragon (anime)|Number 17: Leviathan Dragon]]", this monster performs the iconic bike slide from the film ''[[wikipedia:Akira (1988 film)|Akira]]'', before becoming an Xyz Material.
