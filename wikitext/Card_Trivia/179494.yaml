title: Card Trivia:Giant Hunter
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Opticlops]]" and "[[Stinging Swordsman]]" appear in this card's artwork.
  ** This card's artwork is a reference to the Japanese fairy tale of [[wikipedia:Issun-bōshi|Issun-bōshi]], where the titular character battles an [[wikipedia:oni|oni]] with his sewing needle.
  * This card's Japanese name, "Giant Killing", is likely named after the [[wikipedia:Giant Killing|Japanese soccer manga of the same name]], which in turn is based on the [[wikipedia:Association football|soccer]]-associated term used to describe an [[wikipedia:Upset (competition)|upset victory]].
  ** Fittingly, in {{episode|ZEXAL|027|ref}}, this card was used by [[Yuma Tsukumo]] in a game-winning combo against [[Striker Crossit]], a soccer player who used a [[soccer]]-themed [[Deck]], while Yuma only had 100 LP left.
