title: Card Trivia:Durga the Shadow Flower Submarine
wikitext: |-
  {{Navigation}}

  * This card's name and appearance are based on Buddhist incense.
  ** The furigana of this card's name is "Senkou", a term that can be used to denote the activity of lighting up and presenting incenses in Buddhist altars.
  ** One of the primary materials of Buddhist incenses are [[wikipedia:agarwood|Agarwood]], which is written using the kanji「沈香」, meaning "incense that sinks in water", explaining why this card is depicted as a submarine.
