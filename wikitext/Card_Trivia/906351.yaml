title: Card Trivia:EN - Engage Neo Space
wikitext: |-
  {{Navigation}}

  [[File:Neos_attacks_Candelato.png|thumb|right|250|"[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" attacks "[[Candelato, the Beast of Light]]", in the ''[[Yu-Gi-Oh! GX]]'' anime.]]

  * "[[Candelato, the Beast of Light]]", "[[Elemental HERO Neos]]", and [[Neo Space (location)|Neo Space]] (more specifically, the shores of [[Io]], the moon orbiting the planet [[wikipedia:Jupiter|Jupiter]]) appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|062|ref}}, where "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" attacks and [[destroy]]s "[[Candelato, the Beast of Light (anime)|Candelato, the Beast of Light]]" by battle, which takes place on the shores of Io.
  * The initials "EN" references both the "[[Elemental HERO]]" and "[[Neo-Spacian]]" [[archetype]]s.

