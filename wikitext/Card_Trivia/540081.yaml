title: Card Trivia:Flying Kamakiri 2
wikitext: |-
  {{Navigation|Flying Kamakiri #2}}

  * This monster appears in the artwork of "[[Insect Rampage]]" and "[[Magia Magic - Thunder of Judgment]]".
  * This monster's ''[[TCG]]'' name is based on "''kamakiri''", the Japanese word for "mantis".
  * This monster has a [[counterpart]]: "[[Flying Kamakiri 1|Flying Kamakiri #1]]".
