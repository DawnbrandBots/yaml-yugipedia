title: Card Trivia:Galaxy-Eyes Photon Change Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed counterpart of "[[Galaxy-Eyes Photon Dragon]]".
  ** This monster is named after [[Photon Transformation]], an ability used by [[Kite Tenjo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime (also known as "Photon Change" in the original Japanese version), whose [[signature card]] is "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]".
