title: Card Trivia:X-Krawler Neurogos
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:neuron|neurons]], the specialized cells that make up the [[wikipedia:nervous system|nervous system]].
  * This card, "[[Excrawler Qualiark|Qualiark]]", and "[[Excrawler Synapses|Synapses]]" are the first [[Insect]]-[[Type]] [[Link Monster]]s.
  ** However, "Qualiark" was revealed first.
