title: Card Trivia:Scissor Hercules
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed ''[[Rush Duel]]'' [[counterpart]] of "[[Hercules Beetle]]".
  ** This monster's name is a reference to the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Hercules Beetle" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]: "Scissors Boomerang".
