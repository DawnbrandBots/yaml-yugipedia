title: Card Trivia:Inzektor Hopper
wikitext: |-
  {{Navigation}}

  * This card may be based on the [[wikipedia:Calliphoridae|Calliphoridae]], commonly known as the blowfly, because the insect depicted in the art has two wings.
  * The name of this card suggests that it would be based off of either [[wikipedia:Kamen Rider KickHopper|Kamen Rider KickHopper]] or [[wikipedia:Kamen Rider PunchHopper|PunchHopper]].
  ** It also bears some resemblance to the Grasshopper Yummy from [[wikipedia:Kamen Rider OOO|Kamen Rider OOO]]
  * This is the 1st [[TCG Exclusive]] [[Inzektor]] monster.
  * The "weapon" it has may symbolise that its effect can give the ability of attacking your opponent directly to an Inzektor monster it was equipped to so it could be a "weapon" to inflict "piercing" damage.
  * The effect [[Inzektor Hopper]] gives to the equipped monster when it unequips through its own effect is similar to [[Rapid Warrior]]'s effect.
