title: Card Trivia:Zera Ritual
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Advance Pack: Devil's Ceremony]]''.
  * "[[Warrior of Zera]]" appears in this card's artwork.
  ** This card's artwork depicts "[[Warrior of Zera]]" transforming into "[[Zera the Mant]]" (the [[Ritual Monster]] this card can be used to [[Ritual Summon]]).
  ** This card marks the first appearance of "Warrior of Zera" nearly four years in the Japanese ''[[OCG]]'' before its release in ''[[The Sanctuary in the Sky (set)|The Sanctuary in the Sky]]''.

