title: Card Trivia:Party Up
wikitext: |-
  {{Navigation}}

  * "[[Vishwar Lambadi]]" appears in this card's artwork.
  * The pronunciation of this card's Japanese name, "Excitagain" (アゲアゲイン ''Ageagein'') is a portmanteau of the Japanese slang for "high spirit" (アゲアゲ ''ageage'') and "gain" (ゲイン ''Gein'').
