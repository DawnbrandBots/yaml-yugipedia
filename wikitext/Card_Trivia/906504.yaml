title: Card Trivia:Surprise Chain
wikitext: |-
  {{Navigation}}

  * Two "[[Mokey Mokey]]" (in their [[Mokey Mokey Smackdown|enraged state]]) and two goblins from the [[Token Celebration]] series appear in this card's artwork.
  ** The event depicted in this card's artwork is a continuation of the events depicted in the artwork of "[[Shipping Error]]".
  ** Many images of "Mokey Mokey" appear on the uniforms of the goblins, the side of the truck, and the outside of the boxes.
  ** The truck has a visual design reminiscent of "[[Dark Factory of Mass Production]]" and "[[Dark Factory of More Production]]", including an image of the conveyor belt on its side.
  * This card's name and effect is a play on [[wikipedia:supply chain|"supply chain"]].
