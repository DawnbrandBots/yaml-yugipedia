title: Card Trivia:World Legacy's Mind Meld
wikitext: |-
  {{Navigation}}

  * "[[Crusadia Maximus]]", "[[Crusadia Krawler]]", and "[[Crusadia Draco]]" appear in this card's artwork.
  * This card is a reference to the [[fandom:w:c:memory-alpha:mind meld|mind meld]] from the ''Star Trek'' franchise, a recurring ability of the moderately-telephatic Vulcan race that lets them share thoughts and memories with someone else.
  ** According to ''[[Master Guide 6 card storylines|Master Guide 6]]'', this card's artwork indeed depicts "Maximus" looking into the memory of "Krawler" to find out about the other tribes that inhabit their world (which eventually form the "[[Crusadia]]" group with him).
