title: Card Trivia:Magicians of Bonds and Unity
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of both "[[Dark Magician]]" and "[[Dark Magician Girl]]".
  ** This monster's theme around the number 25 references the 25th anniversary of the ''[[Yu-Gi-Oh!]]'' card game.
  * This monster has an upgraded [[Synchro Monster|Synchro]] form: "[[Paladins of Bonds and Unity]]".
  * This monster has a "[[Blue-Eyes White Dragon]]"-based counterpart: "[[Dragon of Pride and Soul]]".
  * This monster has a different color scheme in correspondence to the color of the [[Series 12]] [[Core Booster]] they are released in. The color of their gems in their staffs and the background correspond with these different color schemes as well.
  ** ''[[Duelist Nexus]]'': Green.
  ** ''[[Age of Overlord]]'': Yellow.
  ** ''[[Phantom Nightmare]]'': Red.
  ** ''[[Legacy of Destruction]]'': Orange.
