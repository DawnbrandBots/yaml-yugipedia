title: Card Trivia:Infinity Tooth
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Jawsman]]" appears in this card's artwork.
  * This card may be a reference to how sharks [[wikipedia:Shark|continuously shed their teeth]] over the course of their lives. This fits the context of this card's use in the anime– [[Shark]] "shed" the cards in his deck made "useless" by "[[Number C5: Chaos Chimera Dragon]]."
