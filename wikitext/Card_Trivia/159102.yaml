title: Card Trivia:ESP Amplifier
wikitext: |-
  {{Navigation}}

  * The head apparatus in this card's artwork is similar to the one worn by "[[Doctor Cranium]]".
  * This card's name is likely a reference to [[Espa Roba]], a character from the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]] who is a self-proclaimed Psychic Duelist. During his Duel with [[Joey Wheeler]], Espa used "[[Amplifier]]" to increase the [[ATK]] of his "[[Jinzo]]" (whose Japanese name is "Android - Psycho Shocker").
  ** This card's ''[[TCG]]'' name is based on [[wikipedia:Extrasensory perception|extrasensory perception]], the term used for psychic powers, which is commonly referred to by its abbreviated form, "ESP".
  * This card has the following [[counterpart]]s:
  ** For [[Machine]]s: "[[Limiter Removal]]"
  ** For [[Plant]]s: "[[Raging Mad Plants]]"
  ** For [[Beast]]s and [[Beast-Warrior]]s: "[[Wild Nature's Release]]"
