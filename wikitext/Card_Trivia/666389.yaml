title: Card Trivia:Megalith Hagith
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Megalith Portal]]" and "[[Megalith Promotion]]".
  * This monster is based on [[wikipedia:Olympian spirits|Hagith]], one of the seven [[wikipedia:Olympian spirits|Olympian spirits]].
  * This monster has a [[Card evolutions|transformed]] version: "[[Megalith Bethor]]".
  ** "Bethor" is emerging from the bottom of the base of this monster.
  ** The artwork of "Megalith Promotion" depicts this monster transforming into "Bethor".
