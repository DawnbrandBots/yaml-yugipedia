title: Card Trivia:Secret Six Samurai - Hatsume
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Six Shinobi]]".
  * This monster is likely based on [[wikipedia:Hatsume no Tsubone|Hatsume no Tsubone]], a legendary (possibly fictional) female ninja from the [[wikipedia:Sengoku period|Sengoku period]] that served [[wikipedia:Tokugawa Ieyasu|Tokugawa Ieyasu]].
