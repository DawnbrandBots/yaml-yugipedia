title: Card Trivia:Toon World
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Pegasus]]'' and the box of ''[[Duelist Legacy Volume.1]]''.
  * This book appears in the artworks of "[[Comic Cat]]", "[[Shadow Toon]]", "[[Shine Palace]]", "[[Toon Bookmark]]", "[[Toon Dark Magician]]", "[[Toon Dark Magician Girl]]", "[[Toon Defense]]", "[[Toon Page-Flip]]", "[[Toon Table of Contents]]", "[[Toon Terror]]", and "[[Twister]]".
  * In this card's first ''[[OCG]]''/''[[TCG]]'' artwork, "[[Manga Ryu-Ran]]" appears on the front cover and "[[Toon Mermaid]]" appears on the back cover, and the book is open to "[[Fiend Castle]]".
  ** Also, this card's ''OCG''/''TCG'' artwork is also taken from {{chapter|Yu-Gi-Oh!|127|ref}}, specifically from the panel showing "[[Toon Summoned Skull (manga)|Toon Summoned Skull]]" for the first time while "Toon World" is open to "[[Evil Castle]]" and "[[Toon Mermaid (manga)|Toon Mermaid]]" and "[[Manga Ryu-Ran (manga)|Manga Ryu-Ran]]" were hidden inside the book, causing them to be visible on its covers.
  * This book is based on a [[wikipedia:Pop-up book|pop-up book]], a book with three-dimensional pages and elements that "pop up" when a page is turned.
  * This card has an improved counterpart: "[[Toon Kingdom]]".
  ** This card also has a [[Skill Card]] counterpart: "[[It's a Toon World!]]"
  * In the [[Card Errata:Toon World|first Japanese print]] of this card, the player must pay 500 [[Life Point]]s during each of their [[Standby Phase]]s to keep "Toon World" in play, and if "Toon World" is sent from the field to the Graveyard, they gain all Life Points paid for the maintenance of "Toon World".
  ** The video games ''[[Yu-Gi-Oh! Duel Monsters 5: Expert 1]]'', ''[[Yu-Gi-Oh! Duel Monsters 6: Expert 2]]'' and ''[[Yu-Gi-Oh! The Eternal Duelist Soul]]'' use the old effect.
  ** In ''Yu-Gi-Oh! The Eternal Duelist Soul'', "[[Toon World (EDS)|Toon World]]" has the original effect, despite having text for the newer effect.
  ** In ''[[Yu-Gi-Oh! Worldwide Edition: Stairway to the Destined Duel]]'', "[[Toon World (SDD)|Toon World]]" has the newer effect, despite having text for the older effect, when played in Japanese. Other language settings use the text for the correct effect.
  * In the video game ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this card's two artworks were featured on two different cards:
  ** The ''Structure Deck: Pegasus'' artwork of this card was featured on the [[Field Spell Card]] "[[Toon World (DOR)|Toon World]]".
  ** This card's first ''OCG''/''TCG'' artwork is used for the [[Equip Spell Card]] "[[Fiend Castle]]".
  * In {{chapter|Yu-Gi-Oh!|110|ref}}, [[Yugi Mutou (manga)|Yugi Mutou]] speculates that since [[Toon World (manga)|this card]] isn't circulated to the general public, it seems to be an original card made just for [[Maximillion J. Pegasus (manga)|Pegasus]], being the only one in the world.
