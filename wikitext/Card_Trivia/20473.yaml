title: Card Trivia:Dark Magician (Arkana)
wikitext: |-
  {{Navigation|Dark Magician|other=[[Dark Magician|Alternate art]]}}

  * This is one of the [[cover card]]s of ''[[Speed Duel: Streets of Battle City]]''.
  * This is the [[signature card]] of [[Arkana]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * Although generally considered to be merely an [[alternate art]] form of the standard "[[Dark Magician]]", this card is unusual as it is one of the only two cards that not only have different artwork, but also different 8-digit passcodes, from their standard artwork versions; the other cards is "[[Polymerization]]"
  ** The Korean version of this card did not share the unique 8-digit passcode of the Japanese and ''[[TCG]]'' versions until its reprint in [[Duelist Pack: Battle City]].
  ** The different 8-digit passcode could also be the reason for a glitch in ''[[Yu-Gi-Oh! The Dawn of Destiny]]'', where the player can have three copies of the standard "Dark Magician" and three copies of this version in the same [[Deck]].
