title: Card Trivia:Yu-Jo Friendship
wikitext: |-
  {{Navigation}}

  * [[Yami Yugi]] and [[Joey Wheeler]] appear in this card's artwork.
  * "Yu-Jo" and "YU-JYO", from the card's English and Japanese names, come from different romanizations of the first kanji of the Japanese names for Yugi and Joey, ''Yūgi'' (遊戯) and ''Jōnouchi'', (城之内), which together form ''yūjō'' (友情), the Japanese word for "friendship".
  * This was the first card to require physical interaction between players.
  ** Several years later, "[[Transmission Gear]]" was released, becoming the second.
  ** In in-person events, players are not required to physically shake hands; the opponent can simply verbally accept the handshake.
