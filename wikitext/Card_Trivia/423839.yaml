title: Card Trivia:Performapal Sky Pupil
wikitext: |-
  {{Navigation}}

  * As its name suggests, this monster can be considered the apprentice of "[[Performapal Sky Magician]]".
  ** Similar to how "Performapal Sky Magician" symbolizes [[Yusho Sakaki]]'s career as a [[Dueltainer]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster most likely symbolizes [[Yuya Sakaki]]'s goal to follow in his father's foot steps.
