title: Card Trivia:Virtual World Gate - Chuche
wikitext: |-
  {{Navigation}}

  * "[[Virtual World Roshi - Laolao]]", "[[Virtual World Mai-Hime - Lulu]]", and "[[Virtual World Phoenix - Fanfan]]" appear in this card's artwork.
  * 朱雀 (zh: 朱雀 ''zhūquè'') means [[wikipedia:Vermillion Bird|Vermillion Bird]], one of the [[wikipedia:Four Symbols|Four Symbols]] (zh: 四象 ''sìxiàng'') of the Chinese constellations. It represents the fire element and southern direction.
  ** Fittingly, "Virtual World Phoenix - Fanfan" is also based on the Vermillion Bird.
