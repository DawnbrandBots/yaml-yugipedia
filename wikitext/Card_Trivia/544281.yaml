title: Card Trivia:Magical Musketeer Kidbrave
wikitext: |-
  {{Navigation}}

  * This monster's appearance is likely based on Max, an "assistant forester" and the protagonist of the German opera ''[[wikipedia:Der Freischütz|Der Freischütz]]'' (1821).
  ** Its name is based on the notorious outlaw [[wikipedia:Billy the Kid|Billy the Kid]].
  * This monster appears in the artwork of "[[Magical Musket - Cross-Domination]]".
  * If you look closely, the left hand of "The Kid" is identical to that of "Zamiel".
