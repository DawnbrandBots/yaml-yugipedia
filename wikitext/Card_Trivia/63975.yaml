title: Card Trivia:Shien's Footsoldier
wikitext: |-
  {{Navigation}}

  * This monster is based after [[wikipedia:Toyotomi Hideyoshi|Toyotomi Hideyoshi]], a samurai lord who united Japan. He served [[wikipedia:Oda Nobunaga|Oda Nobunaga]] (the model of "[[Shien]]") as a footsoldier. He had the nickname Saru, meaning "monkey", because he looked like one.
  * Strangely enough, there were no "[[Six Samurai]]" monsters lower than Level 3 when this card was released, although this card does say "level 3 or below". However in [[Storm of Ragnarok]], Level 2 "[[Kagemusha of the Six Samurai]]" was released.
  * This monster appears in the artwork of the cards "[[Debunk]]", "[[Nitwit Outwit]]", "[[Hidden Springs of the Far East]]", "[[Shadow Six Samurai - Kizaru]]", and "[[The Six Shinobi]]".
