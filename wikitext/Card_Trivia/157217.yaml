title: Card Trivia:T.G. Hyper Librarian
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Library]]".
  * "SC" in this monster's Japanese anime name is a reference to its [[Spellcaster]] [[Type]].
  ** Additionally, "X" in this card's Japanese anime name is a reference to this card's [[Synchro Monster]] [[card type]].
  * This is the first member of the "[[T.G.]]" [[archetype]] to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This is the first "T.G." monster to feature only one effect.
  ** This is also the only [[Level 5]] "T.G." Synchro Monster that does not have an effect where you [[draw]] cards when it is destroyed.
  ** This monster also has the highest [[original ATK]] (2400) of the Level 5 "T.G." Synchro Monsters.
  ** This monster and "[[T.G. Recipro Dragonfly]]" are the only "T.G." Synchro Monsters that do not have any [[Synchro Summon]]ing requirements.
