title: Card Trivia:Bazoo the Soul-Devourer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Bazoo the Soul-Eater]]".
  ** This monster's [[Rank]] (4) is also equal to the [[Level]] of "Bazoo the Soul-Eater", which is referenced in its requirement of three [[Level 4]] monsters.
  ** This monster has the same [[original DEF]] (900) as "Bazoo the Soul-Eater", and its [[original ATK]] (2500) is equal to that of "Bazoo the Soul-Eater" (1600) after using its effect to banish three monsters from the controller's [[Graveyard]] and increase its [[ATK]] by 300 for each monster banished this way. 
  ** This monster's effect to attach three cards from either player's Graveyard to itself as [[material]] is also based on the effect of "Bazoo the Soul-Eater" to banish monsters, and is likely designed to resemble this monster harvesting more souls to "eat".
