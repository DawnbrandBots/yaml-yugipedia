title: Card Trivia:Karakuri Super Shogun mdl 00N "Bureibu"
wikitext: |-
  {{Navigation}}

  * This card is an upgraded version of "[[Karakuri Steel Shogun mdl 00X "Bureido"]]".
  * The "Bureibu" of this card's name is the Romaji reading for "Brave".
  * Similar to the other "[[Karakuri]]" [[Synchro Monster]]s, this card's combined ATK and DEF is 4500.
  * The kanji 零 that that is on this monster's kusazuri is Japanese for 0.
