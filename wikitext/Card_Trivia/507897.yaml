title: Card Trivia:Gladiator Beast Hoplomus
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Hoplomachus|Hoplomachus]] which was a type of Gladiator. They were armed with a parody of the Greek's weapons and armor. They often were put up against [[Gladiator Beast Murmillo|Murmillos]] which were heavily-armed Gladiators and were much like Roman soldiers.
  * This card is featured in the artwork of "[[Defensive Tactics]]".
  * This monster possesses the highest DEF of all [[Main Deck]] [[Gladiator Beast|Gladiators]].
