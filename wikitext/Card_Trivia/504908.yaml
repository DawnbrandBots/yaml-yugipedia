title: Card Trivia:Harpie Lady Sisters
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Harpie Lady Elegance]]", with the red-haired sister also appearing in the artwork of "[[Impact Flip]]" and the third artwork of "[[Harpie's Feather Duster]]".
  * This monster is "[[Harpie Lady]]"/"[[Harpie Lady 1]]", "[[Harpie Lady 2]]", and "[[Harpie Lady 3]]" [[equip]]ped with "[[Cyber Shield]]" and "[[Electro-Whip]]".
  ** This monster's [[Level]] (6) and [[original ATK and DEF]] (1950/2100) are half the total of those of the three "Harpie Ladies" (4 and 1300/1400 × 3 = 12 and 3900/4200).
  * This monster has a ''[[wikipedia:Power Pros|Power Pros]]''-themed parody: "[[Power Pro Lady Sisters]]".
  * This is the first [[Special Summon-only monster]] in the ''[[OCG]]''/''[[TCG]]''.
  * This is the [[signature card]] of [[Mai Valentine]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|070|ref}}, specifically from the panel where "[[Harpy Lady (manga)|Harpy Lady]]" is split into three duplicates via "[[Kaleidoscope (manga)|Kaleidoscope]]".
