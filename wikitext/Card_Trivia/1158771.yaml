title: Card Trivia:Power Vice Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed counterpart of "[[Vice Dragon]]".
  ** The word "power" in this monster's name references how "Vice Dragon" is used by [[Jack Atlas]], who primarily uses a '''Power''' Deck.
  ** This monster's effect to [[add]] a "[[Resonator]]" monster from the player's [[Deck]] to the [[hand]] after it is [[Special Summon]]ed references how in the ''[[Yu-Gi-Oh! 5D's]]'' anime, after "[[Vice Dragon (anime)|Vice Dragon]]" is Special Summoned via its effect, it is usually followed by the [[Normal Summon]]ing of a "Resonator" monster.
  ** This monster's effect to prevent "[[Red Dragon Archfiend]]" from being [[destroyed by battle]] when it is used as [[Synchro Material]] references a scene in {{episode|5D's|084|ref}}, where Jack uses "Vice Dragon" and "[[Trust Guardian (anime)|Trust Guardian]]" to [[Synchro Summon]] "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]". Jack applies the effect of "Trust Guardian" multiple times over the course of the Duel, which prevents "Red Dragon Archfiend" from being destroyed by battle since it was Synchro Summoned using "Trust Guardian" as a Synchro Material.
