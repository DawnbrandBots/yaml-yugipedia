title: Card Trivia:Edict of Atlantis
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[A Legendary Ocean]]", and the [[wikipedia:Poseidon|Poseidon]]-like figure from the artworks of "[[Poseidon Wave]]" and "[[Zeus' Breath]]" appears in this card's artwork.
  ** Fittingly, the Japanese name of "A Legendary Ocean" is "Legendary Capital Atlantis", which is based on the fictional island of [[wikipedia:Atlantis|Atlantis]]. According to [[wikipedia:Plato|Plato's]] dialogues, ''[[wikipedia:Timaeus (dialogue)|Timaeus]]'' and ''[[wikipedia:Critias (dialogue)|Critias]]'', the legendary city of Atlantis was the domain of Poseidon before it sunk into the sea.
