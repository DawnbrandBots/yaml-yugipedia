title: Card Trivia:Tsumuha-Kutsunagi the Lord of Swords
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Mega Pack 08]]''.
  * ''Tsumuhakutsunagi'' (Japanese: 都牟羽沓薙) is a combination of ''Tsumuha-no-tachi'' (Japanese: 都牟羽大刀) and ''Kutsunagi-no-ken'' (Japanese: 沓薙剣); both are alternate names for ''[[wikipedia:Kusanagi no Tsurugi|Kusanagi no Tsurugi]]'', a legendary Japanese sword and one of the three [[wikipedia:Imperial Regalia of Japan|Imperial Regalia of Japan]].
  * This card is the first [[Level 11]] [[Spirit monster]].
  * This card is tied with "[[Amaterasu]]" and "[[Shinobaron Peacock]]" for the highest [[ATK]] among Spirit monsters.
