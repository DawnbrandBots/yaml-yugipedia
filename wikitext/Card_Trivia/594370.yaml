title: Card Trivia:Witchcrafter Scroll
wikitext: |-
  {{Navigation}}

  * A [[Spell Counter]] and the symbol of the "[[Spellbook]]" [[archetype]] appear in this card's artwork.
  ** This is a reference to the fact that [[Witchcrafter Madame Verre|Rilliona]], the Witchcrafter Guild's guildmaster, was friends with both [[Endymion, the Master Magician|Endymion]], the master of [[Magical Citadel of Endymion|The Magical Citadel]], and [[Aleister the Invoker|Aleister Crowley]], the head of [[The Grand Spellbook Tower]], when they were [[Magistus|younger]].
  * The scrolls in this card's artwork appears in the artwork of "[[Witchcrafter Genni]]".
