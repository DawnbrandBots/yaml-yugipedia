title: Card Trivia:Doriado
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Doriado's Blessing]]".
  * This monster's Japanese name appears to be derived from ''dryade'', the French spelling of "dryad", which may be the reason for its English name in early video games. However, when explaining the change to the current one, [[Dan Scheidegger]] claimed in a [http://www.pojo.biz/board/showthread.php?p=1943645#post1943645 post on Pojo] that it is indeed meant to be "Doriado", the monster's given name.
  * This monster has four [[counterpart]]s:
  ** A [[recolored counterpart]]: "[[Lady of Faith]]".
  ** Two [[retrained]] counterparts: "[[Elemental Mistress Doriado]]" and "[[Elemental Grace Doriado]]".
  ** A [[Pendulum Monster|Pendulum]] [[Dark counterpart]]: "[[Dark Doriado]]".
  * This is the only [[Normal Monster]] to have both [[Korean]] and [[Simplified Chinese]] releases but no ''[[TCG]]'' ones.
