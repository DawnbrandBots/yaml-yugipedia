title: Card Trivia:Dark Matter Transcend Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Contact Fusion]] form of "[[Dark Matter Emperor Dragon]]".
  ** Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Dark Matter Dragon]]", "[[Contact Dark Matter Wyvern]]", and "[[Transam Linac]]", which [[Yuhi Ohdo]] first used to [[Fusion Summon]] it in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * This is the first Fusion Monster that can be [[Summon]]ed by Contact Fusion with 3 [[Fusion Material]]s, in both ''[[Yu-Gi-Oh! Rush Duel]]'' and the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
