title: Card Trivia:Witchcrafter Bystreet
wikitext: |-
  {{Navigation}}

  * The emblem of the "[[Spellbook]]" [[archetype]] and a [[Spell Counter]] symbol appear in this card's artwork.
  * This card's artwork depicts a symbol over each of the seven different shops, which corresponds with the seven main "[[Witchcrafter]]" monsters. From left to right, these symbols appear to be:
  ** Yellow (Spell Counter): "[[Witchcrafter Genni]]" (same symbol as the one on her staff).
  ** Green: "[[Witchcrafter Pittore]]" (symbol and housing appear to look like they are covered in paint).
  ** Orange: "[[Witchcrafter Potterie]]" (symbol appears to be made out of clay).
  ** Purple: "[[Witchcrafter Edel]]" (gemstone symbol).
  ** Red: "[[Witchcrafter Schmietta]]" (gear-like symbol).
  ** Light Yellow: "[[Witchcrafter Haine]]" (symbol similar to staff).
  ** Blue ("Spellbook" emblem): "[[Witchcrafter Madame Verre]]" (blue glass symbol).
