title: Card Trivia:Wind-Up Zenmaintenance
wikitext: |-
  {{Navigation}}

  * "[[Wind-Up Soldier]]" appears in this card's artwork.
  * "Zenmaicon" in this card's Japanese name is a portmanteau of ''Zenmai'', the Japanese name of the "[[Wind-Up]]" [[archetype]], and ''maikon''  (マイコン), the Japanese word for "[[wikipedia:Microcomputer|microcomputer]]".
  ** "Zenmaintenance" in this card's English name is a portmanteau of ''Zenmai'' and "maintenance".
