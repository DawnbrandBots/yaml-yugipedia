title: Card Trivia:Junk Gardna
wikitext: |-
  {{Navigation}}

  * This monster has the highest [[original DEF]] (2600) of all "[[Junk]]" monsters.
  * This is the only [[Synchro Monster]] that [[Yusei Fudo]] [[Synchro Summon]]ed in the original Japanese version of the anime without using the word "clustering" in its [[Summon chants in Yu-Gi-Oh! 5D's|summon chant]].
  ** This is also the only "Junk" Synchro Monster that Yusei never Summoned in the ''[[Yu-Gi-Oh! 5D's]]'' anime, as he only Summoned it during the ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' movie.
  * This is the only card released in the ''[[Yu-Gi-Oh! 3D Bonds Beyond Time Movie Pack]]'' to not be a "[[Malefic]]" card.
