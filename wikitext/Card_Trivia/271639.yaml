title: Card Trivia:HTS Psyhemuth
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Psychic Eraser Laser]]".
  * The English letters "HTS" is an abbreviation for [[wikipedia:High-temperature superconductivity|high-temperature superconductivity]], a term used for the ability of certain materials (such as copper oxide) to conduct electricity with zero electrical resistance at temperatures above the boiling point of liquid nitrogen. This term is also referenced in this monster's Japanese name, "Psychonductor Behemuth".
  ** "Psyhemuth" is a portmanteau of the words "psychic" and "behemoth", the latter being the mythical beast this monster is based on.
