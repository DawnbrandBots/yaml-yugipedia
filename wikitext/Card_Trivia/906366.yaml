title: Card Trivia:Tri-Brigade Fraktall
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Tri-Brigade (card)|Tri-Brigade]]" and "[[Tri-Brigade Stand-Off]]".
  * This card's name is likely a portmanteau of the words "[[wikipedia:Cataphract|cataphract]]" (a form of armored heavy cavalryman fielded in ancient warfare) and "[[wikipedia:Centaur|centaur]]", a creature from [[wikipedia:Greek mythology|Greek mythology]] with the upper body of a human and the lower body and legs of a horse.
