title: Card Trivia:Performapal Trumpanda
wikitext: |-
  {{Navigation}}

  * This card's name is a word play with "Rappa" (ラッパ), meaning "[[wikipedia:trumpet|trumpet]]", and "[[wikipedia:Giant panda|Panda]]" (パンダ).
  * This is the first [[Pendulum Monster]] whose [[Pendulum Scale]] matches its [[Level]], thus making it the first Pendulum Monster that cannot be [[Pendulum Summon]]ed using another copy of itself as a Pendulum Scale.
  ** However, if this card's [[Pendulum Effect]] to increase its own Pendulum Scale is used, it ''can'' Pendulum Summon a copy of itself.
  * This [[Monster Card|monster]] appears in the artwork of "[[Performance Exchange]]".
