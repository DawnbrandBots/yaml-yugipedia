title: Card Trivia:OuTerverSe Endless Doom Oblivion
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[OuTerverSe of Terror]]''.
  * This monster appears in the artwork of "[[OuTerverSe Detonation Fusion]]".
  * This monster is an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form of "[[OuTerverSe Burst Oblivion]]".
  ** As with "Burst Oblivion", this monster is based on one of the parallel universes observed by [[Yudias Velgear]] through [[Kuaidul Velgear]] in {{episode|GO RUSH!!|135|ref}}, in which the instant [[Earth (planet)|Earth]] achieved world peace, it was destroyed by a [[wikipedia:Gamma-ray burst|gamma-ray burst]].
  * This monster is an [[OuTerverSe (series)|OuTerverSe]] counterpart of "[[Eternal Galactica Oblivion]]".
  ** This monster has "opposite" non-named [[Fusion Material]]s (2 non-[[LIGHT]] [[Attribute]] monsters) to "Eternal Galactica Oblivion" (2 LIGHT Attribute [[Galaxy (Type)|Galaxy]] [[Type]] monsters).
  ** This monster shares a similar [[cost]] of [[Shuffle|shuffling]] 5 monsters from the [[Graveyard]] into the [[Main Deck|Deck]] to [[activate]] its [[effect]] with "Eternal Galactica Oblivion".
  ** This monster shares its [[Level]] (9) and [[original ATK and DEF]] (3500/2500) with "Eternal Galactica Oblivion".
  ** In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, when this monster's Type becomes Galaxy, it takes on the color scheme of "Eternal Galactica Oblivion".
