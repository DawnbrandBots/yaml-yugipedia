title: Card Trivia:Neo Flamvell Origin
wikitext: |-
  {{Navigation}}

  * This card may be the counterpart of "[[Flamvell Baby]]", since they both appear young-looking.
  * Judging by its name and appearance, the monster depicted in this card may be what all "[[Flamvell]]" and/or "[[Neo Flamvell]]" monsters grow or evolve from.
  * This card has a "[[lswarm]]" counterpart, "[[Evilswarm Obliviwisp]]".
