title: Card Trivia:Evil HERO Inferno Wing - Backfire
wikitext: |-
  {{Navigation}}

  * "[[Supreme King's Castle]]" appears in this card's artwork.
  ** The comet from the [[Dimension World]] arc of the ''[[Yu-Gi-Oh! GX]]'' anime also appears in this card's artwork, glowing blue as it did when [[The Supreme King]] was active.
  * This monster is the [[signature move]] [[counterpart]] of "[[Evil HERO Inferno Wing]]".
  ** This monster is also the "[[Evil HERO]]" counterpart of "[[Elemental HERO Flame Wingman - Infernal Rage]]".
  *** Both are game-original counterparts of "Evil HERO Inferno Wing" and "[[Elemental HERO Flame Wingman]]" respectively, named after their signature moves from the ''Yu-Gi-Oh! GX'' anime.
  **** Unlike "Elemental HERO Flame Wingman - Infernal Rage", however, its English name is the combination of its English and Japanese effect names, "Infernal Backlash" and "Hellback Fire".
  *** Both are depicted performing an attack while the background of their card artworks depicts the [[Field Spell Card]] that [[support]]s their respective "[[HERO]]" sub-[[archetype]]s.
  *** Both share [[Trigger Effect]]s that trigger upon their [[Special Summon]] to [[add]] a card from the [[Deck]] or [[Graveyard]] ("Infernal Rage" adds a "[[Favorite]]" card, while this monster adds "[[Dark Fusion]]" or a non-[[Fusion Monster]] card that [[mentions]] it).
