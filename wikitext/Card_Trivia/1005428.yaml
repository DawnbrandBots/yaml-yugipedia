title: Card Trivia:Cyc the Child of Wind
wikitext: |-
  {{Navigation}}

  * This monster's name is the shortened form of the word "cyclone".
  ** This monster has a [[counterpart]] with a similar naming scheme: "[[Torna the Windweaver]]".
  * This is the first card to feature a [[Only once per turn|once-per-turn]] effect that is restricted by card name in ''[[Yu-Gi-Oh! Rush Duel]]'', since this effect cannot be [[activate]]d again if it had already been activated that turn, even with multiple copies.
