title: Card Trivia:OuTerverSe Mother Fungus
wikitext: |-
  {{Navigation}}

  * This monster is an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form of "[[OuTerverSe Bug Fungus]]".
  ** As with "Bug Fungus", this monster is based on the parallel universe observed by [[Yudias Velgear]] through [[Kuaidul Velgear]] in {{episode|GO RUSH!!|135|ref}}, in which all life on [[Earth (planet)|Earth]] is hybridized with ''[[wikipedia:Cordyceps|Cordyceps]]'', a parasitic fungus known for infecting bugs to survive.
