title: Card Trivia:Alector, Sovereign of Birds
wikitext: |-
  {{Navigation}}

  * This card's name and appearance are derived from "Alector", the ancient Greek word for "rooster" ("Aλέκτωρ").
  * This card's name was initially translated as "Divine Fowl King Alector" before its release in the TCG, but its condition that only allows one copy of it on the field mistakenly referred to this card as "Divine Bird King Alector" in its videogame appearances.
  * This card shares an odd distinction with "[[Elemental HERO Absolute Zero]]" and "[[Kachi Kochi Dragon]]": They are all promo cards for manga volumes in which they do not appear.
  ** Of the three, this card is unique in that it does not show up in its respective manga series at all.
