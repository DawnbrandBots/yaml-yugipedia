title: Card Trivia:Grandpa Demetto (card)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Doll Happiness]]" and "[[Doll House]]".
  ** The roof of "Doll House" appears in this card's artwork.
  * This is the [[Monster Card]] counterpart of [[Grandpa Demetto]], a character featured in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  ** This monster's effect to [[Special Summon]] [[Normal Monster]]s from the [[Graveyard]] as [[Level 8]] [[DARK]] monsters reference how Grandpa Demetto, as part of the "[[Doll House (manga)|Doll House]]" [[Field Spell Card]], was responsible for fixing [[Cologne]]'s "[[Doll Monster]]s" whenever they were destroyed, causing their [[Level]]s to increase and for them to take on more hideous and gothic appearances.
  *** This monster's effect to change the Special Summoned Normal Monsters' [[Attribute]] to DARK is designed to allow the player to use them as [[material]] to [[Xyz Summon]] "[[Number 22: Zombiestein]]", as Cologne did in the ''Yu-Gi-Oh! ZEXAL'' manga.
  ** This monster's effect to destroy an opponent's monster and inflict damage to the opponent references a moment in {{chapter|ZEXAL|017|ref}} where, after Cologne uses the effect of "Number 22: Zombiestein" to negate the effect of "[[Number 50: Blackship of Corn]]", "Number 22: Zombiestein" is somehow forced to immediately attack "Number 50: Blackship of Corn", even though it is Yuma's turn. Coincidentally, the attacks deals 2400 damage, and this monster would deal 2400 damage with its effect if it targeted the Rank 8 "Number 22: Zombiestein".
  * This card's artwork is taken from {{chapter|ZEXAL|016|ref}}, specifically from the panel where Grandpa Demetto makes his first appearance, although his right eye is no longer hanging from its socket and the face of the doll he is holding is turned away from the viewer.
