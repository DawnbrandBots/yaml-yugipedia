title: Card Trivia:Supreme King Dragon Dark Rebellion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Soul of the Supreme King]]".
  * This monster is the "[[Supreme King Dragon]]" corrupted [[counterpart]] of "[[Dark Rebellion Xyz Dragon]]".
  ** However, this monster's effect to change the [[ATK]] of an opponent's monster to 0 and gain its [[original ATK]] is similar to the effect of "[[Dark Requiem Xyz Dragon]]", rather than its base form.
  * Due to the effect of "[[En Birds]]", this is the first monster to have a [[Rank]] without being an [[Xyz Monster]] in the anime.
