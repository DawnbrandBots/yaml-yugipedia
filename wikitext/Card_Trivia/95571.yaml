title: Card Trivia:Psychic Soul
wikitext: |-
  {{Navigation}}

  * "[[Mind Protector]]" appears in this card's artwork.
  ** This card is referenced by the artwork of "[[Psychic Eraser Laser]]", which depicts "Mind Protector" causing the ''soul'' of "[[HTS Psyhemuth]]" to leave its body, similarly to this card's artwork.
  *** Fittingly, both cards feature an effect that involves eliminating a monster on the field to increase its owner's [[Life Points]].
