title: Card Trivia:Triple Borrel Launch
wikitext: |-
  {{Navigation}}

  * "[[Borrelsword Dragon]]" appears in this card's artwork.
  * This card's three bulleted effects is a reference to how [[Roken Kogami]], who used the "[[Borrel]]" [[archetype]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, told the imprisoned [[Yusaku Fujiki]] not to forget about thinking of three things during the [[Lost Incident]]. This resulted in an older Yusaku, in his [[LINK VRAINS]] persona as Playmaker, to develop a habit of explaining himself by listing three separate reasons.
