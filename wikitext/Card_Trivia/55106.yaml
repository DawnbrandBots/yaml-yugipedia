title: Card Trivia:Magical Exemplar
wikitext: |-
  {{Navigation}}

  * This monster has a [[Synchro Monster|Synchro]] [[Card evolutions|counterpart]]: "[[Tempest Magician]]".
  ** "Tempest Magician" is this monster wielding the scythe of "[[Night's End Sorcerer]]", and can be [[Synchro Summon]]ed by using this card and "Night's End Sorcerer" as [[Synchro Material]].
  *** Fittingly, all three monsters debuted as [[TCG exclusive|''TCG''-exclusive]] cards in 2008.
  * This monster has a [[Pendulum Monster|Pendulum]] counterpart: "[[Magical Abductor]]".
  * This is the first ''TCG''-exclusive card to be released in a [[Structure Deck]].
