title: Card Trivia:Prima Materiactor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Materiactor Meltthrough]]".
  * This monster's name is a pun on "[[wikipedia:Prima materia|prima materia]]", the starting material required to undergo the four stages of the ''[[wikipedia:Magnum opus (alchemy)|Magnum opus]]'' process in [[wikipedia:Alchemy|alchemy]].
  * This monster's flavor text of being "''long shrouded its existence in complete mystery''" and "''in recent years many new species have been discovered''" may reflect the fact that the [[Materiactor]] archetype had been debuted since 2021, however it only receives additional members and support cards to become playable recently, 3 years after its first introduction.
