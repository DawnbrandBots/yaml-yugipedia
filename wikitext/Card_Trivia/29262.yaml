title: Card Trivia:Thestalos the Firestorm Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Domain of the True Monarchs]]", "[[March of the Monarchs]]", "[[The Monarchs Erupt]]", "[[The Monarchs Revolt]]", "[[The Monarchs Masterplan]]", and "[[Tribute Carnival]]".
  * This monster's Japanese name, "''Tesutarosu''", is derived from the [[wikipedia:Ferrari Testarossa|Ferrari Testarossa]], a model of luxury sports car produced by Italian sports car manufacturer [[wikipedia:Ferrari|Ferrari]].
  * This monster has an [[Card evolutions|upgraded]] Mega Monarch form: "[[Thestalos the Mega Monarch]]".
  * This monster has a [[Vassal]] [[counterpart]]: "[[Berlineth the Firestorm Vassal]]".
