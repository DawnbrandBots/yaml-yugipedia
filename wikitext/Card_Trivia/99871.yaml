title: Card Trivia:Vengeful Shinobi
wikitext: |-
  {{Navigation}}

  * "Shinobi" is part of a phrase, "shinobi-no-mono", which is ninja (忍の者) in Japanese. It means "to steal away" and "to forbear". Neither necessarily meaning as a thief, but as a way of sneakiness. It may also be translated as "one skilled in the art of stealth."
