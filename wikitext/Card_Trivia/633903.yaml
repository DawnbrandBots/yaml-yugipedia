title: Card Trivia:Primathmech Laplacian
wikitext: |-
  {{Navigation}}

  * In [[wikipedia:Mathematics|mathematics]], the [[wikipedia:Laplace operator|Laplace operator]] (or Laplacian) is a [[wikipedia:Differential operator|differential operator]] given by the [[wikipedia:Divergence|divergence]] of the [[wikipedia:Gradient|gradient]] of a [[wikipedia:Function (mathematics)|function]] on [[wikipedia:Euclidean space|Euclidean space]].
  * This monster's appearance is a combination of "[[Mathmech Nabla]]", "[[Mathmech Multiplication|Multiplication]]", and "[[Mathmech Division|Division]]".
  ** The artwork of "[[Mathmech Superfactorial]]" shows this monster's creation.
