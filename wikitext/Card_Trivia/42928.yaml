title: Card Trivia:Elemental HERO Voltic
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: HERO's Strike]]'' and the ''[[TCG]]'' version of ''[[Premium Pack 2 (TCG)|Premium Pack 2]]''.
  * This monster appears in the artwork of "[[Hero Pressure]]".
  * This monster's Japanese name, "Voltech" (ボルテック ''Borutekku''), may be a reference to "Volteccer", the signature attack of the Japanese platform hero [[Wikipedia:Pulseman|Pulseman]].
  * This is the only [[Thunder]] "[[Elemental HERO]]" monster.
