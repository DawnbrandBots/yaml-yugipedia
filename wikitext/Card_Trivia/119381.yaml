title: Card Trivia:Shrink
wikitext: |-
  {{Navigation}}

  * This card has a polar opposite [[anime-exclusive]] [[counterpart]]: "[[Pump Up]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Shrink]]".
