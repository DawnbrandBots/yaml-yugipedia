title: Card Trivia:Delinquent Duo
wikitext: |-
  {{Navigation}}

  * The purple imp in this card's artwork appears in the artworks of "[[Mistaken Arrest]]" and "[[Shared Ride]]".
  * "[[Gemini Imps]]" are the older versions of the monsters in this card's artwork.
  ** Ironically, the effect of "Gemini Imps" is designed to counter this card's [[discard]]ing effect.
  * The [[discard]]ing effect of "[[Fuh-Rin-Ka-Zan]]" is based on this card.
  * The [[Summon]]-[[trigger]]ed effect of "[[Moulinglacia the Elemental Lord]]" is based on this card.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Delinquent Duo]]".
  * This card can be considered a counterpart of "[[The Chorus in the Sky]]".
  ** Both are [[Normal Spell Card]]s that requires [[pay]]ing 1000 [[Life Point]]s to be [[activate]]d.
  ** This card's artwork depicts a pair of demonic figures, while the artwork of "The Chorus in the Sky" depicts a pair of angelic figures.
  ** This card's effect makes the opponent [[discard]] up to two cards from their [[hand]], while "The Chorus in the Sky" makes the player [[add]] up to two cards to their hand.
  ** This card was [[Limited]] for most of its playable time and so it could only be once per [[Deck]], while "The Chorus in the Sky" can only be activated [[once per turn]].
