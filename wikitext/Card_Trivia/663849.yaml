title: Card Trivia:Karakuri Bonze mdl 9763 "Kunamzan"
wikitext: |-
  {{Navigation}}

  * The 9763 of this card's name represents a multiplication problem: 9 x 7 = 63.
  ** The number is also written in Japanese on this monster's robes: 九七六参.
  * This monster is wielding a [[wikipedia:Khakkhara|Khakkhara]], a [[wikipedia:Buddhism|Buddhist]] ringed staff used primarily in prayer.
  * This monster's name is likely a reference to ''namusanbou'' (南無三宝, ''The Homage to the [[wikipedia:Refuge (Buddhism)|Three Jewels]]''), a Buddhist song dedicated to the Three Refuges of Buddhism.
