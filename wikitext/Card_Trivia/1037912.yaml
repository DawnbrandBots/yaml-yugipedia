title: Card Trivia:Big Inflate Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Time Dimension Hole]]".
  * This monster's name references the [[wikipedia:Tokyo Dome|Tokyo Dome]], the location where the ''Yu-Gi-Oh! Duel Monsters: The Legend of Duelist Quarter Century'' event took place, where its dome-shaped roof features an air-inflated structure.
  * This monster has the highest number of cards required to pay the [[cost]] for its effect (50).
  * The minimum number of total cards needed in the [[Deck]] at the start of the Duel would be 55, since both players have to start with 5 cards in the [[hand]].
  ** The only ways to both have less total cards in the Deck at the start of the Duel and have enough cards in the Deck to pay for this monster's cost would be to either return cards from the hand to the Deck without adding any back into the hand, remove cards from the hand and later return them to the Deck, or if the opponent adds cards to the player's Deck with effects like "[[Parasite Paracide]]".
