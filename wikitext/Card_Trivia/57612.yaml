title: Card Trivia:Windmill Genex
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Burst Synchro Summon]]".
  * This monster's name is based on [[wikipedia:Wind power|wind power]], the natural energy produced by the wind, which causes it to rotate the [[wikipedia:Wind turbine|wind turbine]] and generate electrical power.
  ** Fittingly, this monster is the [[Card evolutions|upgraded]] [[Synchro Monster]] version of "[[Genex Blastfan]]", a monster based on a [[wikipedia:Fan (machine)|fan]], a machine designed to create an airflow with its blades.
