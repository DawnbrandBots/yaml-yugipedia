title: Card Trivia:Arrive in Light
wikitext: |-
  {{Navigation}}

  [[File:MajesticDragon-JP-Anime-5D-NC-2.png|thumb|right|250|"[[Majestic Dragon (anime)|Majestic Dragon]]" being used to [[Synchro Summon]] a "[[Majestic]]" [[Synchro Monster]].]]

  * "[[Majestic Dragon]]" appears in this card's artwork.
  ** This card's artwork is based on the [[Synchro Summon]]ing sequence of a "[[Majestic]]" monster using "[[Majestic Dragon (anime)|Majestic Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This card's first effect references the power of the [[Crimson Dragon]] to [[add]] "Majestic Dragon" to the tops of [[Yusei Fudo]] and [[Jack Atlas]]' [[Deck]]s anime when they were in dire situations in the anime.
  * This card's Japanese and international names are each derived from the different passages of Yusei's [[Summon chants in Yu-Gi-Oh! 5D's#Yusei Fudo|Synchro Summoning chant]] for "[[Majestic Star Dragon (anime)|Majestic Star Dragon]]" in the original Japanese version of the ''Yu-Gi-Oh! 5D's'' anime: 
  ** This card's Japanese name, "Arriving Miracle", is derived from the first passage: ''Gathering starlights will enlighten a new '''miracle!''''' (集いし星の輝きが新たな奇跡を照らし出す。''Tsudoishi hoshi no kagayaki ga aratana kiseki wo terashidasu!'')
  ** This card's ''[[TCG]]'' name is derived from the final passage: '''''Arrive in light''', Savior Star Dragon!'' (光来せよ、《セイヴァー・スター・ドラゴン》！ ''Kouraiseyo, Seivā Sutā Doragon!'')

