title: Card Trivia:Curry Fiend Roo
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is named after [[wikipedia:Roux|roux]], a mixture of fat and flour used to thicken sauces, including [[wikipedia:Curry|curry]].
  * This monster's design is incorporated around the many aspects of cooking and eating curry.
  ** This monster wears a [[wikipedia:Sauce boat|sauce boat]] for a helmet and three dishware plates on each shoulder plate, carries a [[wikipedia:Rice cooker|rice cooker]] in one hand, a large spoon in the other hand, and features forks for feet. This references how curry is often served in a sauce boat on a plate with white rice, which can also be eaten with either a fork or a spoon.
  ** This monster wears a pendant of potatoes with a carrot attached and a belt of onions, the vegetables used for cooking with curry. Fittingly, this monster can be [[Special Summon]]ed via the effect of "[[Curry Pot]]", which also requires a "[[Carrotman]]", "[[Potatoman]]", and "[[Onionman]]" owned by the player to be [[banish]]ed.
  * This monster's effect to gain 200 [[ATK]] for each "[[Spice]]" card in the [[Graveyard]] references how curry consists of different spices, which includes [[Counter Spice Cumin|cumin]], [[Mix Spice Garamasala|garam masala]], [[Red Pepper Spice|red chili pepper]], [[Spell Spice Caraway|caraway]], and [[Spell Spice Cinnamon|cinnamon]].
  * This monster's [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] in the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, "Montezuma's Revenge", is a term used for food poisoning from eating undercooked or underprepared food.
