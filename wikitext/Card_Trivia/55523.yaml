title: Card Trivia:Abaki
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Imperial Manners]]" and "[[Power Shift]]".
  * This card's effect is the opposite to that of "[[Stray Asmodian]]", in which is shares the same [[Attribute]] and [[Type]].
  * In ''[[Starter Deck: Syrus Truesdale]]'', this card was printed with an incorrect [[DEF]] of 1000. All other prints and appearances use the correct DEF of 1100.
