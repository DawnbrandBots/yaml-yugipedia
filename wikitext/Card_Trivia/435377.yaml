title: Card Trivia:Fluffal Bear
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Album of Memories]]", "[[Fluffal Crane]]" and "[[Frightfur Parade]]".
  ** Its severed arm appears in the artwork of "[[Frightfur Patchwork]]", sewn together with parts from various other "[[Fluffal]]" monsters.
