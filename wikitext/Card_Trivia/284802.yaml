title: Card Trivia:Toy Knight
wikitext: |-
  {{Navigation}}
  * This monster's Japanese name (トイナイト) is a palindrome, which is likely referenced by the inversions of the English letter "T" and the color schemes of both the letters and the block-like parts they appear on.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster is [[Special Summon]]ed, it appears in a fireworks display, whereas all the other [[Monster Card]]s in the anime will glow before the corresponding monsters are Summoned.
