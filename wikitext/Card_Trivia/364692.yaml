title: Card Trivia:U.A. Turnover Tactics
wikitext: |-
  {{Navigation}}

  * "[[U.A. Goalkeeper]]", "[[U.A. Playmaker]]", and "[[U.A. Stadium]]" appear in this card's artwork.
  * Given the context of this card's artwork (showing a player being replaced with another one) and some of its other ''TCG'' names ("Tactiques de Rotation U.A.", French for "U.A. Rotation Tactics"; "U.A. Tática de Contra-ataque", Spanish for "U.A. Counterattack"), the word "turnover" in this card's English name doesn't seem to be defined as losing possession of the ball in sports, but rather the replacement of people (players).
  ** Given this card's French name, this card appears to reference the [[wikipedia:Squad rotation system|squad rotation system]] technique used in some sports.
