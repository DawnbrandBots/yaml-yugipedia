title: Card Trivia:Hero's Rule 2
wikitext: |-
  {{Navigation}}

  * An [[Academia Disk]] appears in this card's artwork.
  * This card has a [[Normal Trap Card]] counterpart: "[[Hero's Rule 1: Five Freedoms]]".
  ** Both cards were used by [[Jaden Yuki]] during his separate Duels against the [[Sacred Beast]]s in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Ironically, this card was released in the ''[[OCG]]''/''[[TCG]]'' 18 years ''before'' "Hero's Rule 1: Five Freedoms".
