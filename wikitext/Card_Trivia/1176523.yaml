title: Card Trivia:Wynn the Wind Spiritualist
wikitext: |-
  {{Navigation}}

  * "[[Familiar of the Wind Spiritualist]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Spiritual Coven]]".
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Wynn the Wind Charmer (Rush Duel)|Wynn the Wind Charmer]]".
  ** This monster's name and effect reference "[[Spiritual Wind Art - Miyabi]]", a [[Spiritual Art]] [[Trap Card]] that allows the player to place an opponent's card on the bottom of their [[Deck]].
