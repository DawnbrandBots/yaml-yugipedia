title: Card Trivia:Wanderer of Zera
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded [[counterpart]] of "[[Warrior of Zera (Rush Duel)|Warrior of Zera]]".
  ** Fittingly, this monster's [[DEF]] (1600) is the same as the [[ATK]] of "Warrior of Zera", and its ATK (2300) is the same as the DEF of all other upgraded counterparts of said monster.
  *** As a result, this monster is the only upgraded counterpart of "Warrior of Zera" to have different [[original ATK and DEF]], likely due to the lower power level of ''[[Rush Duel]]'' compared to the ''[[OCG]]/[[TCG]]''.
