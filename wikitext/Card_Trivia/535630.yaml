title: Card Trivia:Dark King of the Abyss
wikitext: |-
  {{Navigation}}

  * This monster appears in several other cards' artworks that reveals his conflict with "[[Dark Ruler Ha Des]]": "[[Demotion]]", "[[Abyssal Designator]]", "[[Herald of the Abyss]]", "[[Hate Buster]]", "[[Mind Drain]]", "[[Skill Prisoner]]", "[[Destruct Potion]]", "[[Fake Life]]", "[[Call of the Archfiend]]", "[[Reject Reborn]]", "[[Powerful Rebirth]]", and "[[Dark Ruler No More]]".
  ** This monster is presumably the off-screen culprit of "[[Skill Drain]]" and "[[Soul Drain]]" as well.
