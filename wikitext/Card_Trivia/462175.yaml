title: Card Trivia:Crystron Rosenix
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Crystolic Potential]]".
  * This monster's name is a portmanteau of the words "rose" (derived from "[[wikipedia:Quartz|rose quartz]]", a pink variety of quartz) and "phoenix" (a mythological bird associated with fire, immortality, and rebirth).
  * "[[Crystron Phoenix]]" is the [[Counterpart|Synchro counterpart]] of this monster after merging with "[[Crystron Quan]]" and "[[Crystron Citree]]".
