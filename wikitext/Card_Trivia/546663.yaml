title: Card Trivia:Isolde, Two Tales of the Noble Knights
wikitext: |-
  {{Navigation}}

  * These monsters are based on the two [[wikipedia:Iseult|Iseult]] in the [[wikipedia:Matter of Britain|Arthurian]] story of ''[[wikipedia:Tristan and Iseult|Tristan and Iseult]]''.
  ** The left monster is based on [[wikipedia:Iseult|Iseult of Ireland]], the lover of [[wikipedia:Tristan|Tristan]].
  ** The right monster is based on [[wikipedia:Iseult|Iseult of Brittany]], the eventual wife of Tristan.
  ** The black and white sails depicted in the background of this card's artwork are a reference to the story of Iseult of Brittany, where Tristan, after suffering a poisoned wound that only Iseult of Ireland - his initial lover - could cure, asked her to come for him and flying the white sail on the ship if she came, and black if she did not. She agreed to come and the ship raced home, with white sails high. However, as Tristan was too weak to move, he asked his current wife, Iseult of Brittany, to check the signal through the window, and she deceived him by saying that the ship had black sails, due to her jealousy. Tristan immediately expired in despair, and, as Iseult of Ireland arrived and found her lover dead, she grieved and passed away at his side.
