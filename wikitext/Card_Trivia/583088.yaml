title: Card Trivia:Drone XL
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name could be a reference to "[[wikipedia:Fat Man|Fat Man]]", the nuclear bomb dropped on [[wikipedia:Nagasaki|Nagasaki]] in August 9th of 1945. The main body of the monster is also similar to the device in shape, which was bigger and "fatter" than other models of conventional and nuclear bombs (hence the nickname).
  ** Additionally, it could also be based on the "[[wikipedia:Airbus Beluga|Beluga]]", an airliner that is modified to carry aircraft parts (i.e. [[Drone Token]]s).
  * In the anime, the "[[Drone Token]]" Special Summoned with this card's effect was ejected from the slot on this monster's very back.
  * This card's design and name could also be a reference to the US' "[[wikipedia:General Atomics MQ-9 Reaper|Reaper Drone]]", which is a larger drone than, (but a different design to) the much more widely known "[[wikipedia:Predator Drone|Predator Drone]]" model. 
  ** The Reaper Drone has two tail wing diagonally upward control surfaces (along with a downward tail surface, forming a Y shape) similar to this card's design, while the Predator has three downward tail surfaces that form an M shape.
