title: Card Trivia:Infernalvania
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on [[wikipedia:Transylvania|Transylvania]], the home of [[wikipedia:Count Dracula|Count Dracula]].
  ** This could be viewed as an homage to the ''[[wikipedia:Castlevania|Castlevania]]'' video game series, which are made by [[wikipedia:Konami|Konami]] and frequently feature Dracula as the main antagonist.
  * In the original Japanese version of its debut episode, {{episode|GX|031|ref}}, [[Vellian Crowler]] pointed out that this card is [[Forbidden]], making it the second Forbidden [[Field Spell Card]] to appear in the anime after "[[Golden Castle of Stromberg (anime)|Golden Castle of Stromberg]]".
