title: Card Trivia:Aqua Jet Surface
wikitext: |-
  {{Navigation}}

  [[File:Shark-san's Magic Combo.png|thumb|"[[Big Jaws (anime)|Big Jaws]]" powered up by "[[Aqua Jet (anime)|Aqua Jet]]".]]
  * "[[Surfacing Big Jaws]]" and the [[Heartland City]] Station appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|001|ref}}, where "[[Big Jaws (anime)|Big Jaws]]" is boosted into the air with "[[Aqua Jet (anime)|Aqua Jet]]" before swooping down to [[attack]].
  * This card's name is a combination of those of "[[Surface]]" and "[[Aqua Jet]]".
  ** This card's first effect is based on "Surface", while its second effect is based on "Aqua Jet".

  == See also ==
