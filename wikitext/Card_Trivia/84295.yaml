title: Card Trivia:Goblin Zombie
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Return of the Zombies]]" and "[[Zombie World]]".
  * The marking on this monster's head resembles the [[Eye of Wdjat]].
  * This monster looks similar to the soldiers of [[Zorc Necrophades]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|234|ref}}, specifically from the panel showing [[Goblin Zombie (manga)|this monster]] being Summoned.
