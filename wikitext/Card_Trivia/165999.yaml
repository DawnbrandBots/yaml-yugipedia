title: Card Trivia:Gusto Codor
wikitext: |-
  {{Navigation}}

  * This is the first "[[Gusto]]" not to be in a ''Duel Terminal''.
  * This is the first "[[Gusto]]" monster to be released in the TCG (and legal for tournament play).
  * "Gusto Codor" has a similar artwork and name with "[[Mist Condor]]".
  * This card and "[[Gusto Griffin]]" are the only [[Winged Beast]]-[[Type]] "[[Gusto]]" monsters that are not [[Tuner monster]]s.
