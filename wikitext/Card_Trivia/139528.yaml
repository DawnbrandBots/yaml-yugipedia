title: Card Trivia:Chain Whirlwind
wikitext: |-
  {{Navigation}}

  * This card's name and artwork are puns on "[[Chain]]", the term used for the stacking cards to determine the order of [[Resolve|resolution]] of [[activate]]d cards or effects, which reflects how its effect "chains" with the effect that [[destroy]]s a card on the [[field]] by destroying two [[Spell]]/[[Trap Card]]s.
