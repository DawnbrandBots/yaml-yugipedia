title: Card Trivia:Dormant Volcano
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is a reference to how a [[wikipedia:Volcano|volcano]] is considered "dormant" when it has not erupted in a long time, but is still capable of erupting.
  ** This card's effect reflects this by initially inflicting 300 damage when [[destroy]]ed, and then having each player [[add]] a [[FIRE]] monster from their [[Deck]] to their [[hand]] during the player's next [[Standby Phase]] after it was destroyed.
