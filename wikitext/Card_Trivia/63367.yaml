title: Card Trivia:Card Shuffle
wikitext: |-
  {{Navigation}}

  * "Shot Gun Shuffle", the Japanese name of this card, is an illegal card shuffling technique used by [[Arkana]] in the [[Yu-Gi-Oh! (anime)|Yu-Gi-Oh anime]] and [[Yu-Gi-Oh! (manga)|manga]]. The technique ensure he draws "[[Dark Magician (Arkana)|Dark Magician]]" on his first turn, but also damages his other cards.
  ** In [[Yu-Gi-Oh! Duel Links]], one of [[Arkana (Duel Links)|Arkana]]'s [[Skill]]s is named "Card Shuffle", and it is very similar to this card's effect. Arkana also has a specific quote when using the card "Card Shuffle".
  * The man in this card's artwork also appears in the artwork of "[[Magician Manipulation]]" and "[[Dealer's Choice]]".
