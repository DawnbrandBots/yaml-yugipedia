title: Card Trivia:Fiendsmith in Paradise
wikitext: |-
  {{Navigation}}

  * "[[Fiendsmith's Lacrima]]" appears in this card's artwork.
  ** Ironically, "Fiendsmith's Lacrima" cannot be used with this card's effect under normal circumstances, as this card [[target]]s a [[Level 7]] or higher [[LIGHT]] [[Fiend]] monster, and "Lacrima" is only [[Level 6]].
