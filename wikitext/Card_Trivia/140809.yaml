title: Card Trivia:Decago Knight
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name and [[Level]] (10) are based on the [[wikipedia:Decagon|decagon]], a geometrical polygon with ten sides.
  ** This monster's shield and the shape in the background of this card's artwork both feature a decagonal shape.
  ** This card's [[original ATK and DEF]] (1000) are each equal to 10<sup>3</sup> (10x10x10), referencing the number "10" and the "three" copies of this card needed for its effect.
