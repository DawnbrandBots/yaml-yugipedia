title: Card Trivia:The Agent of Judgment - Saturn
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Solar Ray]]".
  * This monster is based on the planet [[wikipedia:Saturn|Saturn]], which appears in the background of this card's artwork.
  ** This monster may also be based on [[wikipedia:Saturn (mythology)|Saturn]], the Roman god of agriculture, which serves as the namesake of the planet.
  * Similarly to "[[The Agent of Force - Mars]]", this monster's effect becomes more powerful based on how much additional [[Life Point]]s the player has over their opponent.
