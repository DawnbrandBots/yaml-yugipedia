title: Card Trivia:Karakuri Soldier mdl 236 "Nisamu"
wikitext: |-
  {{Navigation}}

  * The "'''236'''" of this card's name represents a multiplication problem: 2 x 3 = 6.
  ** The number is also written in Japanese on this monster's chest: 弐参六.
  ** This card's name is Japanese for 2-3-6 (Ni-Sa-Mu).
  * This monster appears in the artworks of "[[Ninjitsu Art of Super-Transformation]]" and "[[Karakuri Cash Inn]]".
