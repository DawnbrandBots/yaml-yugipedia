title: Card Trivia:Norito the Moral Leader
wikitext: |-
  {{Navigation}}

  * This monster's design is based on a priest in the Shinto religion, the indigenous belief system in Japan.
  ** This monster's name is based on ''[[wikipedia:Norito|norito]]''「祝詞」, the liturgical texts or ritual incantations in Shinto, addressed towards the ''kami''.
  ** This monster's title "Moral Leader" ("Disciplinary Chief Priest" in Japanese) reflect its owner, [[Carlyle Chesterton]], who serves as the disciplinary leader of the [[Heartland City]] student council in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster has a "[[CXyz]]" [[Card evolutions|evolution]]: "[[CXyz Simon the Great Moral Leader]]"
