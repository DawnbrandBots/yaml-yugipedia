title: Card Trivia:Plasmatic Model Sonic Horse
wikitext: |-
  {{Navigation}}

  * This monster is the armor of "[[Plasmatic Model Another Rising Lystella]]" and "[[Plasmatic Model Rising Lenoir]]".
  ** The process of this monster uniting with "[[Plasmatic Model Lenoir]]" is depicted in "[[Plasmatic Model Docking]]".
  ** The process of this monster uniting with "[[Plasmatic Model Lystella]]" is depicted in "[[Plasmatic Model Another Docking]]".
