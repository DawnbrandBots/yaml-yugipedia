title: Card Trivia:Mirage Knight
wikitext: |-
  {{Navigation}}

  * This monster is based on the concept of a [[wikipedia:Mirage|mirage]], an optical illusion caused by light refraction or heated air that produces a displaced image.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, when "[[Dark Flare Knight (anime)|Dark Flare Knight]]" is destroyed by battle, it leaves behind flames which cause [[Mirage Knight (anime)|this monster]] to appear. This is based on a [[wikipedia:heat haze|heat haze]], an inferior mirage observed when viewing objects through a mass of heated air.
  ** This monster's effect to [[banish]] itself after attacking or being attacked is based on how real-life mirages disappear from someone's point of view when they approach the displaced image of the object caused by the light refraction.
  * "[[Mirage Dragon]]" is based on this monster's armor.
  * This monster has a [[retrained]] counterpart: "[[Mirage Swordsman]]".
