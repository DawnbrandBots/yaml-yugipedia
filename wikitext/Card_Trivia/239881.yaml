title: Card Trivia:Madolchepalooza
wikitext: |-
  {{Navigation}}

  * "[[Madolche Puddingcess]]", "[[Madolche Queen Tiaramisu]]", "[[Madolche Chouxvalier]]", "[[Madolche Butlerusk]]", "[[Madolche Marmalmaide]]", "[[Madolche Cruffssant]]" and "[[Madolche Mewfeuille]]" appear in this card's artwork.
  ** The rabbit and squirrel that appear in the artwork of "Madolche Queen Tiaramisu" also appear in this card's artwork.
  ** Ironically, it is impossible for "Madolche Queen Tiaramisu" to be Special Summoned from the hand.
  * "Festa" (in this card's Japanese name) is an Italian word for ''party''.
