title: Card Trivia:Narukami Waterfall
wikitext: |-
  {{Navigation|mode=nonGame}}

  * '''Narukami 「鳴神」''' is the name of a [[W:kabuki|kabuki]] play of 1684 and its main character.
  * Narukami was a monk that lived in a cave at the north of Kyoto, where he performed his prayers so that the new prince would be born healthy, in return for several favors that the Emperor had offered. However, the Emperor didn't fullfil his word and ignored Narukami, whom mounted in rage and swore revenge. Using the magical techniques of the Yamabuchi, Narukami captured the Dragon King that controlled the rains, sealing it in a jar behind a waterfall, bringing the worst drought that had never been seen in Japan.
