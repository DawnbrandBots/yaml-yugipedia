title: Card Trivia:Daigusto Falcos
wikitext: |-
  {{Navigation}}

  * "[[Kamui, Hope of Gusto]]" appears in this card's artwork, riding a larger version of "[[Gusto Falco]]". Also, their Levels match this card's Level.
  ** This may be because of "[[Kamui, Hope of Gusto]]" [[tuning]] with the "[[Gusto Falco]]" [[Special Summon]]ed by its effect.
  * This card has a "[[lswarm]]" counterpart, "[[Evilswarm Hraesvelg]]".
