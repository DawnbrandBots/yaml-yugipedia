title: Card Trivia:Traitor Fog
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name, "Reverse Mist" (ウラぎり, ''Uragiri'') is a homophone of the Japanese word for "betrayal" (裏切り, ''uragiri''). 
  ** This card's English manga name, "Mistrust", is a portmanteau of the words "mist" and "mistrust".
