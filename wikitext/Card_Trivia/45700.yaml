title: Card Trivia:The Unfriendly Amazon
wikitext: |-
  {{Navigation}}

  * This monster shares the same [[original ATK]] (2000) as "[[Panther Warrior]]", and features an effect that allows the player to [[Tribute]] their monsters for a [[cost]].
  ** Both monsters are also used by major characters in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime: this monster was used by [[Mai Valentine]] and "[[Panther Warrior (anime)|Panther Warrior]]" was used by [[Joey Wheeler]].
