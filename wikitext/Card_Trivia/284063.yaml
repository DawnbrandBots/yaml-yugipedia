title: Card Trivia:Sylvan Marshalleaf
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Sylvan Blessing]]", "[[Sylvan Charity]]", "[[Sylvan Lotuswain]]", and "[[Flourishing Frolic]]".
  * This card's name, "Marshalleaf", is a portmanteau of "Marshal" (a military rank) and "Leaf".
