title: Card Trivia:Topologic Trisbaena
wikitext: |-
  {{Navigation}}

  * This card is the [[cover card]] of ''[[Flames of Destruction]]'', as well as one of the cover cards of ''[[Mega Pack 02]]''.
  * This monster appears in the artwork of "[[Detonation Code]]".
  * This monster's name is a portmanteau of the words "[[wikipedia:Torus|torus]]" and "[[wikipedia:Amphisbaena|amphisbaena]]".
  ** A ring torus is homeomorphic to the product of two circles, making it appear as a three-dimensional shape resembling a doughnut or inner tube.
  ** The amphisbaena is a creature from [[wikipedia:Greek mythology|Greek mythology]] who is depicted as a winged serpent with two feet and two heads each located at the top of its body and at the end of its tail.
  * This monster's design exhibits trilateral symmetry, perhaps referencing its status as a Link-3 monster.
  ** This monster's design also features a [[wikipedia:Trefoil knot|trefoil knot]], the simplest example of a nontrivial knot in [[wikipedia:Topology|topology]] and [[wikipedia:Knot theory|knot theory]], as the shape of the pelvic area, which is better seen in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  * The design of "[[Borrelcode Dragon]]" is based on this monster's visual design, and shares the same [[Attribute]] ([[DARK]]), [[Link Arrow]]s, [[original ATK]] (2500), [[Link Rating]] (3), and [[Summoning condition]] (2+ [[Effect Monster]]s).
  * This card has the lowest Link Rating and [[ATK]] of "[[Topologic]]" monsters.
