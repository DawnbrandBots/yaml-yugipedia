title: Card Trivia:Overlay Capture
wikitext: |-
  {{Navigation}}

  * "[[Gagagigo the Risen]]" and "[[Sword Breaker]]" appear in this card's artwork.
  * This card's artwork and effect are similar to those of "[[Overlay Burglary]]".
  * This card's name reflects its anime effect to "capture" an [[Xyz Material]] from an opponent's [[Xyz Monster]] and [[attach]] it to the player's Xyz Monster.
  ** Interestingly, in the ''[[OCG]]''/''[[TCG]]'', this card's effect simply [[detach]]es the opponent's Xyz Materials and attaches itself to the player's Xyz Monster, which undermines the concept of "capturing".
