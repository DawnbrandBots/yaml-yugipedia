title: Card Trivia:Zoma the Earthbound Spirit
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] counterpart of "[[Zoma the Spirit]]" combined with "[[Call of the Earthbound]]".
  ** The above-mentioned cards were used in conjunction by [[Yami Bakura]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]. This follows the pattern of combining two or more of Yami Bakura's cards, including "[[Dark Spirit of Malice]]" and "[[Dark Spirit of Banishment]]".
  ** This card's bulleted effect to force the opponent's monsters to attack this card is based on the effect of "Call of the Earthbound".
  ** This card's effect to inflict damage equal to double the [[original ATK]] of the opponent's monster that [[destroy]]s it by battle is based on the effect of "Zoma the Spirit" in the manga and anime.
  *** The maximum amount of damage this card can inflict is 3000. This references a scene during [[Yugi Muto]] and Yami Bakura's Duel where the latter uses "Call of the Earthbound" to force the former's "[[Silent Swordsman LV1]]" to attack and destroy "Zoma the Spirit". This [[activate]]s the effect of "Zoma" to inflict damage to Yugi equal to double the 1500 original ATK of "Silent Swordsman LV1", which is 3000.
