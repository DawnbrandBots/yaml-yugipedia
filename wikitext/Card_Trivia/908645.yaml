title: Card Trivia:War Rock Bashileos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[War Rock Generations]]".
  ** The "Bashileos" depicted in "War Rock Generation" is an older one with a full beard, who is clashing with the youthful "[[War Rock Meteoragon]]". This indicates that "Bashileos" and his band of [[War Rock]] monsters ("[[War Rock Fortia|Fortia]]", "[[War Rock Gactos|Gactos]]", "[[War Rock Orpis|Orpis]]", and "[[War Rock Skyler|Skyler]]") are the older generation to "Meteoragon" and his band of War Rock monsters ("[[War Rock Wento|Wento]]" and "[[War Rock Mammud]]"). This also coincides with the latter three's second generation being released in War Rock's second wave of support in the [[TCG]] (in [[Lightning Overdrive]]), contrasting the former five's first generation release (in [[Blazing Vortex]]).
