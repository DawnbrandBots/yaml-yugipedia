title: Card Trivia:Palenque Sarcophagus
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is based on the [[wikipedia:sarcophagus|sarcophagus]] of [[wikipedia:K'inich Janaab' Pakal|K'inich Janaab' Pakal]], a ruler of the [[wikipedia:Maya|Mayan]] polity of [[wikipedia:Palenque|Palenque]].
  ** The large carved stone sarcophagus lid in the Temple of Inscriptions is a famous piece of Classic [[wikipedia:Maya art|Maya art]] (Which is ironic since when shown in the anime, the lid of the sarcophagus shows no such inscriptions).
  * This is a "[[Chronomaly]]" version of "[[Pot of Greed]]".
  * In the anime, when this card is activated, the ground explodes and a sarcophagus emerges. It opens up, revealing empty contents.
