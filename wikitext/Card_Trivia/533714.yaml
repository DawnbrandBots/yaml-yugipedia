title: Card Trivia:Speedroid Double Yoyo
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Yo-yo|yo-yo]], a toy consisting of an axle connected to two disks, and a string looped around the axle.
  ** Fittingly, this monster is depicted with electrical sparks connecting the two spiked yo-yo weapons from its main bodies, likely serving as the "string".
