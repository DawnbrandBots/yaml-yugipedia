title: Card Trivia:Abyss Boat Watchman
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Charon (mythology)|Charon]], the boatman of [[wikipedia:Greek underworld|Hades, the Greek underworld]] who ferries the deceased souls of those given funeral rites across the rivers [[wikipedia:Styx|Styx]] and [[wikipedia:Acheron|Acheron]].
