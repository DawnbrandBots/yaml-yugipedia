title: Card Trivia:Magician Navigation
wikitext: |-
  {{Navigation}}
  [[File:Mahado_moves_to_attack_Diabound.png|thumb|right|200px|[[Mahado (manga)|Dark Magician]] moves to attack [[Diabound (manga)|Diabound]].]]
  [[File:DMG saves Mahado.png|thumb|right|200px|[[Dark Magician Girl (manga character)|Dark Magician Girl]] saves Mahado from Diabound's attack.]]

  * "[[Dark Magician]]" and "[[Dark Magician Girl]]" appear in this card's artwork.
  ** The pose of "Dark Magician" is taken from {{chapter|Yu-Gi-Oh!|318|ref}}, specifically from the panel showing the [[Mahado (manga)|Mahado]]-infused ''[[ka]]'' moving to attack the exposed area of [[Diabound (manga)|Diabound]]'s spirit shield.
  ** The pose of "Dark Magician Girl" is taken from {{chapter|Yu-Gi-Oh!|316|ref}}, specifically from the panel revealing that Mahado had escaped [[Diabound (manga)|Diabound]]'s attack due to [[Mana (manga)|Mana]]'s ''ka'',  [[Dark Magician Girl (manga character)|Dark Magician Girl]], lifting him to safety. However, there are various changes in detail, such as "Dark Magician Girl" holding her rod instead of "Dark Magician".

