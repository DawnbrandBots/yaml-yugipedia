title: Card Trivia:Crystron Phoenix
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Crystron Impact]]".
  * This monster is a combination of "[[Crystron Quan]]", "[[Crystron Citree]]", and "[[Crystron Rosenix]]".
  ** Ironically, the sum of the [[Level]]s of these monsters ([[Level 7|7]]) is not equal to this monster's Level ([[Level 9|9]]), and they cannot be used as [[Synchro Material]]s to Summon this card as they aren't [[Synchro Monster]]s.
  * This monster and "[[Crystron Quariongandrax]]" represent [[Accel Synchro Summon]] and [[Double Tuning]], respectively, the highest forms of non-[[Pendulum Summon|Pendulum]] related [[Synchro Summon]] used in the ''[[Yu-Gi-Oh! 5D's]]'' and ''[[Yu-Gi-Oh! ARC-V]]'' anime.
