title: Card Trivia:Twin Twisters
wikitext: |-
  {{Navigation}}

  * "[[Ancient Telescope]]", "[[Horn of Light]]", a "[[Magical Hats|Magical Hat]]", the ankh from the Japanese artwork of "[[Monster Reborn]]", and 2 "[[Sheep Token]]s" appear in this card's artwork.
  ** The first three items listed above also appear in the artwork of "[[Fusion Recycling Plant]]", indicating that that location is the ultimate fate of these items.
  * These twisters are a part of the various weather phenomenon that comprise "[[Heavy Storm Duster]]".
