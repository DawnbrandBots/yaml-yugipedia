title: Card Trivia:Reject Reborn
wikitext: |-
  {{Navigation}}

  * "[[Dark King of the Abyss]]", "[[Guardian of the Labyrinth]]", "[[Revived King Ha Des]]", and several "[[King of the Skull Servants]]" and/or "[[Skull Servant]]s" appear in this card's artwork.
  ** "[[Demotion]]" > "[[Abyssal Designator]]" > "[[Herald of the Abyss]]" > "[[Hate Buster]]" > "[[Mind Drain]]" (presumably "[[Skill Drain]]" and "[[Soul Drain]]" as well) > "[[Destruct Potion]]" > "[[Fake Life]]" > "[[Call of the Archfiend]]" > '''"Reject Reborn"''' > "[[Powerful Rebirth]]" > "[[Skill Prisoner]]" > "[[Dark Ruler No More]]"
  ** This card's artwork appears to depict the artwork of "[[Powerful Rebirth]]" from a different angle.
