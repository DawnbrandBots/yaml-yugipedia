title: Card Trivia:Ultimate Dragonic Utopia Ray
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Lightning Overdrive]]''.
  ** Fittingly, this card's [[Set Number]] is "LIOV-XX0'''39'''", referencing this monster's number.
  * This monster is a [[retrained]] counterpart of "[[Number C39: Utopia Ray]]".
  ** Visually, this monster is a combination of "Utopia Ray" and "[[ZW - Dragonic Halberd]]".
  * This monster's pose is a reference to the pose that [[Yuma Tsukumo]] assumed when he unlocked [[The Door]] with the [[Emperor's Key]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * Due to its [[name condition]], this the first ''[[OCG]]''/''[[TCG]]''-original "[[Number C]]" monster.
  * Along with "[[Ultimate Leo Utopia Ray]]", this is one of the two "[[Utopia (archetype)|Utopia]]" [[Xyz Monster]]s which do not have "[[Number]]" in its printed name.
  ** This is also one of the two "[[Number]]" monsters which have a [[name condition]] that treats them as being part of the archetype.
