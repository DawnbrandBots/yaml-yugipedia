title: Card Trivia:Sevens Road Charmy Witch
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a [[Fusion Monster|Fusion]] between "[[Sevens Road Witch]]" and "[[Straynge Cat]]", which were used to first [[Fusion Summon]] it in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.

  * This card's artwork features seven instances of a unique cross-shaped symbol, referencing the seven motif of the [[Sevens Road]] [[series]]. This symbol is similar to those seen in other [[Sevens Road]] monsters, and has a design evocative of cat ears.
