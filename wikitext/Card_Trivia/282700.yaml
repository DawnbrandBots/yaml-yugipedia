title: 'Card Trivia:Number 70: Malevolent Sin'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Duelist Saga]]''.
  * "[[Number]]" monsters often take a form that reflects their owners and/or their original desires. In this case, this "Number" represents its original owner, [[Kyoji Yagumo]].
  ** This monster's name and appearance both reference [[wikipedia:Jonathan Edwards (theologian)|Jonathan Edwards]]' Sermon, which revolves around sinners and a metaphor that depicts all sinners as spiders awaiting death by being dropped into a fire. Fittingly, this monster reflects Kyoji's sin of murdering his younger [[Yuji Yagumo|brother]]'s impostor.
  *** Also, this monster's appearance reflects Yagumo's spider-themed appearance, his ability to control spiders, and his [[Spider]] [[Deck]].
  * This is the only "Number" monster to appear in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga that never had any of its effects revealed.
