title: Card Trivia:Wake Up Your Elemental HERO
wikitext: |-
  {{Navigation}}

  [[File:Jaden_and_his_Elemental_HEROes_in_Wake_Up_Your_Heart.png|thumb|right|250|[[Jaden Yuki]] and his "[[Elemental HERO]]" monsters, as seen in "[[Wake Up Your Heart]]"]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * "[[Elemental HERO Necroshade]]", "[[Elemental HERO Neo Bubbleman]]", "[[Elemental HERO Shining Flare Wingman]]", "[[Elemental HERO Wildedge]]", "[[Winged Kuriboh]]", and two "[[Hero Kid]]s" appear in this card's artwork.
  ** Unlike the other monsters that appear in this card's artwork, "Winged Kuriboh" cannot be used as a Fusion Material for the Fusion Summon of this card, as it is a [[Fairy]] monster and is neither a Warrior monster (unless its type is changed to Warrior with a card like "[[DNA Surgery]]") nor an "Elemental HERO" Fusion Monster.
  ** "[[Elemental HERO Clayman]]" is the only [[Main Deck]] "[[Elemental HERO]]" from the first season of the ''[[Yu-Gi-Oh! GX]]'' anime to not be represented by its corresponding [[Fusion Monster]]s.
  * This card's name and artwork are based on a shot from "[[Wake Up Your Heart]]", the second Japanese ending theme of the ''Yu-Gi-Oh! GX'' anime, which was sung by [[KENN]], the Japanese voice actor of [[Jaden Yuki]].
  * This card's effects are based on the effects of the monsters that appear in its artwork.
  ** "Shining Flare Wingman": Gaining 300 [[ATK]] for each [[Fusion Material]] used for its [[Fusion Summon]] and inflicting damage to the opponent equal to the [[original ATK]] of an opponent's [[destroy]]ed monster.
  ** "Wildedge": Making a number of attacks on monsters each [[Battle Phase]] up to the number of Fusion Monsters used for its Fusion Summon.
  ** "Neo Bubbleman": Destroying the monster it battles, after [[damage calculation]].
  ** "Necroshade" and "Hero Kid": [[Special Summon]]ing 1 [[Warrior]] monster from the [[hand]] or [[Deck]] if this Fusion Summoned card is destroyed.
  * This card is the only "[[HERO]]" monster to have the "(Elemental) HERO" part of its name at the end rather than at the start.

