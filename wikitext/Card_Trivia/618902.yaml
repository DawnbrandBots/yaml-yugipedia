title: Card Trivia:Firewall Dragon Darkfluid
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Chaos Impact]]'', as well as one of the cover cards of ''[[Mega Pack 04]]''.
  * This monster is named after [[wikipedia:Dark fluid|dark fluid]], an alternative theory to both dark matter and dark energy that attempts to explain both phenomena in a single framework.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Firewall Dragon]]".
  ** This monster is the only 3000 [[ATK]] upgraded [[signature card]] of an anime protagonist that was never Summoned using its base form as [[material]].
  ** This monster also has an upgraded form: "[[Firewall Dragon Singularity]]".
  * This monster has a [[signature move]] [[counterpart]]: "[[Firewall Dragon Darkfluid - Neo Tempest Terahertz]]".
  * This monster is the rival counterpart of "[[Borrelend Dragon]]".
  * This monster's color scheme is based on 5 of the [[Ignis]].
  ** [[Ai]]: The purple bits of its armor and wings.
  ** [[Aqua (character)|Aqua]]: The blue bits of its armor and wings.
  ** [[Earth (character)|Earth]]: The brown bits of its armor.
  ** [[Flame (character)|Flame]]: The red bits of its armor.
  ** [[Windy]]: The green color scheme of its body and on its wings.
  * This is the first [[Legal]] [[Link-5]] [[Link Monster]] to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This monster is similar to "[[Shooting Quasar Dragon]]".
  ** Both are the upgraded form of the main protagonists' ace monsters ("Firewall Dragon" and "[[Stardust Dragon (anime)|Stardust Dragon]]"): this monster was used by [[Yusaku Fujiki]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, while "[[Shooting Quasar Dragon (anime)|Shooting Quasar Dragon]]" was used by [[Yusei Fudo]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** In the anime, both monsters were created by the bonds between major group of six characters: this monster created by combining the power of all the Ignis (except [[Ai]]), while "Shooting Quasar Dragon" was created from the bonds between six 6 [[Signer]]s and their [[Signer Dragons]].
  ** Both monsters feature effects that allow them to [[attack]] multiple times per turn, as well as a [[Quick Effect]] that can [[negate]] the effects of other cards: this monster can only negate [[monster effect]]s, while "Shooting Quasar Dragon" can negate any [[card effect]].
