title: Card Trivia:Elemental HERO Neos
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the ''[[Collectible Tins 2006 Wave 1]]'', as well as one of the cover cards of ''[[Starter Deck 2007]]'', ''[[Duelist Edition Volume 1]]'', ''[[Precious Pack Volume 1]]'', ''[[Structure Deck: HERO's Strike]]'', ''[[Duel Power]]'', ''[[Prismatic Art Collection]]'', ''[[25th Anniversary Tin: Dueling Heroes]]'', ''[[Speed Duel GX: Midterm Destruction]]'', and ''[[Battles of Legend: Monster Mayhem]]''.
  * This monster appears in the artworks of "[[Assault Armor]]", "[[Battle of Sleeping Spirits]]", "[[Common Soul]]", "[[Contact Out]]", "[[Contact Soul]]", "[[Dark Contact]]", "[[Elemental Storm]]", "[[EN - Engage Neo Space]]", "[[Favorite Contact]]", "[[Hero Descent]]", "[[Hope for the Future]]", "[[Instant Contact]]", "[[Justi-Break]]", "[[Miracle Contact]]", "[[Neos Force]]", "[[Neos Fusion]]", "[[Neos Spiral Force]]", "[[Neos Wiseman]]", "[[NEXT]]", "[[Over Fusion]]", "[[Reverse of Neos]]", and "[[Wrath of Neos]]".
  ** A helmet based on this monster's head appears in the artwork of "[[Fake Neos]]".
  * This monster is based on the character designs of ''[[wikipedia:Bio Booster Armor Guyver|Guyver]]'' and the ''[[wikipedia:Ultra Series|Ultra Series]]''.
  ** This monster's name is based on [[wikia:w:c:ultra:Ultraman Neos (character)|Ultraman Neos]], a character from the latter series.
  * This is the [[signature card]] of [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** It has the same [[original ATK]] (2500) as the signature cards of the other anime protagonists (with the exception of [[Yuga Ohdo]]'s "[[Sevens Road Magician (anime)|Sevens Road Magician]]"): [[Yugi Muto]]'s "[[Dark Magician (anime)|Dark Magician]]", [[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]", [[Yuma Tsukumo]]'s "[[Number 39: Utopia (anime)|Number 39: Utopia]]", [[Yuya Sakaki]]'s "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]", [[Yusaku Fujiki]]'s "[[Firewall Dragon (anime)|Firewall Dragon]]", and [[Yudias Velgear]]'s "[[Galactica Oblivion (anime)|Galactica Oblivion]]".
  ** This monster has the same [[Level]] (7) as the [[Main Deck]]-based signature cards of the other anime main protagonists: Yugi Muto's "Dark Magician", Yuya Sakaki's "Odd-Eyes Pendulum Dragon", Yuga Ohdo's "Sevens Road Magician", and Yudias Velgear's "Galactica Oblivion".
  *** This is the only signature card used by the main protagonists that does not appear during the first season of their respective anime series, having first appeared during the second season of ''Yu-Gi-Oh! GX''.
  ** This monster's name is based on "néos", the Greek word for "new", reflecting how it is a new "[[Elemental HERO]]" monster and Jaden Yuki's new main signature card, replacing the role of "[[Elemental HERO Flame Wingman]]".
  * This monster has 27 forms (24 ''[[OCG]]''/''[[TCG]]'' + 3 ''[[Rush Duel]]'').
  ** A downgraded [[Gemini monster|Gemini]] form: "[[Elemental HERO Neos Alius]]".
  ** 2 [[retrained]] counterparts: "[[Elemental HERO Honest Neos]]" and "[[Elemental HERO Spirit of Neos]]".
  ** 8 [[Contact Fusion]]s with the "[[Neo-Spacian]]" monsters:
  *** With "[[Neo-Spacian Aqua Dolphin|Aqua Dolphin]]": "[[Elemental HERO Aqua Neos]]" and its ''Rush Duel'' counterpart "[[Elemental HERO Pulse Neos]]".
  *** With "[[Neo-Spacian Air Hummingbird|Air Hummingbird]]": "[[Elemental HERO Air Neos]]" and its ''Rush Duel'' counterpart "[[Elemental HERO Sky Neos]]".
  *** With "[[Neo-Spacian Dark Panther|Dark Panther]]": "[[Elemental HERO Dark Neos]]".
  *** With "[[Neo-Spacian Flare Scarab|Flare Scarab]]": "[[Elemental HERO Flare Neos]]" and its ''Rush Duel'' counterpart "[[Elemental HERO Heat Neos]]".
  *** With "[[Neo-Spacian Glow Moss|Glow Moss]]": "[[Elemental HERO Glow Neos]]".
  *** With "[[Neo-Spacian Grand Mole|Grand Mole]]": "[[Elemental HERO Grand Neos]]".
  ** An [[NEX|extended]] Contact Fusion (with "[[Neo-Spacian Marine Dolphin|Marine Dolphin]]"): "[[Elemental HERO Marine Neos]]".
  ** 4 [[Triple Contact Fusion]]s:
  *** With "Flare Scarab" and "Grand Mole": "[[Elemental HERO Magma Neos]]".
  *** With "Grand Mole" and "Dark Panther": "[[Elemental HERO Nebula Neos]]".
  *** With "Dark Panther" and "Glow Moss": "[[Elemental HERO Chaos Neos]]".
  *** With "Air Hummingbird" and "Aqua Dolphin": "[[Elemental HERO Storm Neos]]".
  ** A [[Quadruple Contact Fusion]] form: "[[Elemental HERO Cosmo Neos]]".
  ** An [[Ultimate Contact Fusion]] form: "[[Elemental HERO Divine Neos]]".
  ** 4 non-Contact Fusion forms:
  *** Standard: "[[Elemental HERO Brave Neos]]".
  *** With 1 [[Warrior]] monster: "[[Elemental HERO Neos Knight]]".
  *** With "[[Elemental HERO Shining Flare Wingman]]": "[[Elemental HERO Shining Neos Wingman]]".
  *** With "[[Yubel]]": "[[Elemental HERO Neos Kluger]]".
  *** "[[Evil HERO]]": "[[Evil HERO Neos Lord]]".
  ** 3 [[Super Polymerization|Super Fusion]] forms:
  *** With "Yubel": "[[Neos Wiseman]]".
  *** With "[[Rainbow Dragon]]": "[[Rainbow Neos]]".
  *** With "[[Armed Dragon Thunder LV10]]": "[[Armed Neos]]".
  * "[[Neo Space Pathfinder]]" is also based on this monster, similar to how "[[Dark Magician Girl]]" is the apprentice of "Dark Magician".
  * In ''Yu-Gi-Oh! Rush Duel'', despite having an overly high ATK/[[DEF]] for its Level and a versatile playstyle surrounding it (similar to "[[Dark Magician (Rush Duel)|Dark Magician]]"), this is not a [[Legend Card]].
  * This card's French [[flavor text]] formerly contained the word "Nouvel Héros", which is incorrect as the word "Héros" contains an [[wikipedia:Aspirated h|aspirated "h"]]; this error was later fixed with an [[Card Errata:Elemental HERO Neos|errata]] with the release of ''[[Ra Yellow Mega Pack]]''.
