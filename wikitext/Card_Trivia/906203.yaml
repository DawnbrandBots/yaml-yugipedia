title: Card Trivia:Dark Sorcerer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragon Encounter]]" and "[[Shining Superstar Riff]]", as well as in both artworks of "[[Attribute Shift Bomb]]".
  * This monster has 6 [[counterpart]]s:
  ** 1 [[LIGHT]] counterpart: "[[Light Sorcerer]]".
  ** 1 [[WATER]] counterpart: "[[Aqua Sorcerer]]".
  ** 1 [[FIRE]] counterpart: "[[Flare Sorcerer]]".
  ** 1 [[EARTH]] counterpart: "[[Earth Sorcerer]]".
  ** 1 [[WIND]] counterpart: "[[Aero Sorcerer]]".
  ** 1 retrained counterpart: "[[Dark Sorcerer of Destruction]]".
