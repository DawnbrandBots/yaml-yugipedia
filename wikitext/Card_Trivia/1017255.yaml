title: Card Trivia:Kaiser Glider - Golden Burst
wikitext: |-
  {{Navigation}}

  * This monster is a [[signature move]] [[counterpart]] of "[[Kaiser Glider]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Kaiser Glider" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** This monster's effect to match its [[ATK]] with an opponent's monster's ATK is based on the effect of "Kaiser Glider", which cannot be [[destroyed by battle]] by a monster with equal ATK.
