title: Card Trivia:Final Gesture
wikitext: |-
  {{Navigation}}

  * "[[Genex Controller]]", "[[Genex Spare]]", and the remains of "[[Ally of Justice Field Marshal]]" appear in this card's artwork.
  ** This card's Japanese name, "Final Tuning" ({{Ruby|最|さい}}{{Ruby|期|ご}}の{{Ruby|同|どう}}{{Ruby|調|ちょう}} ''Saigo no Dōchō''), references how both "Genex Controller" and "Spare" are [[Tuner monster]]s.
  ** This card's effect to [[Special Summon]] a [[Level 3]] monster from the [[hand]] of [[Graveyard]] with the same name as the monster they [[control]] references how the effect of "Genex Spare" can change its name to "Genex Controller".
