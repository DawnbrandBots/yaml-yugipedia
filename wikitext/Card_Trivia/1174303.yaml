title: Card Trivia:Token (Tea and "Dark Magician Girl")
wikitext: |-
  {{Navigation}}

  * The design of [[Téa Gardner]] in this card's first artwork is taken from her Summoning cut-in/victory pose in ''[[Yu-Gi-Oh! Duel Links]]'', while the design of "[[Dark Magician Girl]]" is taken from its third ''[[OCG]]''/''[[TCG]]'' artwork.
  ** The design of Téa Gardner in this card's second artwork is taken from her Summoning cut-in/victory pose in ''Yu-Gi-Oh! Duel Links'' from the ''Dark Side of Dimensions'' world, while the design of "Dark Magician Girl" is taken from its fifth ''OCG'' artwork.
  * This card's [[flavor text]] is based on the dialogue from {{episode|Yu-Gi-Oh!|102|ref}} when Téa chooses "[[Dark Magician Girl (anime)|Dark Magician Girl]]" as her [[Deck Master]] before her Duel against [[Crump]].
