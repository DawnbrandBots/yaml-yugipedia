title: Card Trivia:Magistus Vritra
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Vritra|Vritra]] is the name of a serpent or dragon in [[wikipedia:Hinduism|Hinduism]].
  * "[[Vahram, the Magistus Divinity Dragon]]" and "[[Zoroa, the Magistus of Flame]]" appear in this card's artwork.
  * The word 「祆現」 in this card's Japanese kanji name appears to be a play on 「顕現」  (''kengen'', "manifest").
  ** The character 「祆」 (''ken'') is a reference to the Japanese reading of the Chinese word for [[wikipedia:Zoroastrianism|Zoroastrianism]], 祆教 (''xiān jiào''; ''kenkyō'' in Japanese).
