title: Card Trivia:Purushaddoll Aeon
wikitext: |-
  {{Navigation}}

  * "[[Darktellarknight Batlamyus]]" and "[[Infernoid Tierra]]" appear in this card's artwork.
  ** This card's artwork depicts "Tierra" absorbing "Batlamyus" to transform into "[[Tierra, Source of Destruction]]".
  ** The events in this card's artwork are a continuation of the events depicted in "[[Void Feast]]".
  * [[wikipedia:Purusha|Purusha]] is a [[wikipedia:Sanscrit|Sanscrit]] word with many meanings, most significantly being the name of the entity that became the origin of all things in [[wikipedia:Hindu mythology|Hindu mythology]], described as a giant with 1000 heads, 1000 eyes and 1000 legs.
  * [[wikipedia:Aion (deity)|Aion]] is a Greek word meaning "time"/"age"/"era" and a word [[wikipedia:Plato|Plato]] used to refer to "eternity". It refers to the true god's metaexistence in [[wikipedia:Gnosticism|Gnosticism]] and its an existence that opposes to the Archon (which is the fake gods, such as "Sophia, Goddess of Rebirth").
  * The kanji 「魂源への影劫回帰」 (''Kongen e no Eigō Kaiki'') in this card's Japanese name roughly translates to "[[wikipedia:Eternal return|Eternal Return]] to the Soul's Origin".
  ** The kanji 「魂源」 (''Kongen'') is a homophone of 「根源」 (''Kongen'', "Origin"), with 「魂」 (''Kon'', "Soul") substituting 「根」 (''Kon'', "Root").
  ** 「影劫回帰」 (''Eigō Kaiki'') is a homophone of 「永劫回帰」 (''Eigō Kaiki'', "Eternal Return"), with 「影」 (''Ei'', "Shadow") substituting 「永」 (''Ei'', "Eternal").
  ** Eternal return is the concept proposed by [[wikipedia:Friedrich Nietzsche|Friedrich Nietzsche]] in ''[[wikipedia:Thus Spoke Zarathustra|Thus Spoke Zarathustra]]'', believing that humanity has no previous lives or next lives, but repetitions of the current life.
