title: Card Trivia:Claret Note
wikitext: |-
  {{Navigation}}

  * The symbols on the cover of the book appear to be based on [[wikipedia:Cuneiform|Cuneiform writing]], a system of writing used in the ancient Middle East.
  * This card's English name translation replaces the word "Blood" with "Claret," a name for [[wikipedia:Bordeaux Wine|Bordeaux wine]] used in Great Britain, in order to make this card appear less gruesome.
  ** However, the Japanese name of the "[[Plasma Token]]", "Blood Token", was censored the same way as "[[Destiny HERO - Plasma]]," changing the blood reference to [[wikipedia:Blood Plasma|blood plasma]]. Together, the two translations do not make sense, save that both substances are red.
  ** The English name translation does keep in relation with the European theme associated with the "[[Destiny HERO]]" archetype, as well as being used to Summon "Destiny HERO - Plasma", who was initially used by [[The D]].
