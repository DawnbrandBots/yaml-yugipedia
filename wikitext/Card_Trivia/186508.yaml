title: Card Trivia:Star Light, Star Bright
wikitext: |-
  {{Navigation}}

  * The scene in this card's artwork of a small planet with a big tree and a lonely inhabitant is very similar to that of the French book ''[[wikipedia:The Little Prince|The Little Prince]]''.
  * The name of the card comes from [[wikipedia:The Walt Disney Company|Disney]]'s ''[[wikipedia:Pinocchio (1940 film)|Pinocchio]]'' when [[wikipedia:Mister Geppetto#Disney version|Geppetto]] wished on a star with the line "''Star Light, Star Bright, first star I see tonight. I wish I may, I wish I might, have the wish I make tonight''", with his wish being for [[wikipedia:Pinocchio#Disney.27s version|Pinocchio]] to become a real boy. The Japanese version of the card is also named from ''Pinocchio'' with its name being 'Wish Upon a Star', which is the name of the song from ''Pinocchio''.
