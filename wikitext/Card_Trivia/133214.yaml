title: Card Trivia:Red Nova Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectible Tins 2010 Wave 2]]''.
  ** In the ''[[TCG]]'', this card and "Shooting Star Dragon" were released before their corresponding [[Core Booster]]s, in ''Collectible Tins 2010 Wave 2''.
  * This monster appears in the artwork of "[[Red Reign]]".
  ** This monster's silhouette appears in the artwork of "[[Red Carpet]]".
  ** A burning geoglyph of this monster appears in the artwork of "[[Red Zone]]".
  * This monster is named after a [[wikipedia:Nova|nova]], an astronomical event that causes the sudden appearance of a bright, apparently "new" star, that slowly fades over several weeks or many months.
  ** This monster may also be named after a [[wikipedia:Luminous red nova|luminous red nova]], a stellar explosion caused by the merging of two stars, which has a distinct red color.
  * This monster is an [[Card evolutions|upgraded]] [[Double Tuning]] form of "[[Red Dragon Archfiend]]".
  * This monster has multiple forms:
  ** A [[Duel Dragon]] [[Yu-Gi-Oh! 5D's (manga)|manga]] [[counterpart]]: "[[Hot Red Dragon Archfiend King Calamity]]".
  ** A [[Synchro Dimension]] counterpart: "[[Tyrant Red Dragon Archfiend]]".
  ** An upgraded [[Triple Tuning]] form: "[[Red Supernova Dragon]]".
  ** An upgraded [[Quadruple Tuning]] form: "[[Red Hypernova Dragon]]".
  ** An upgraded "[[/Assault Mode]]" form: "[[Red Nova Dragon/Assault Mode]]".
  ** A [[signature move]] counterpart: "[[Red Nova Dragon - Burning Soul]]".
  * This monster is the rival counterpart of "[[Shooting Star Dragon]]".
  ** Both are the upgraded forms of the [[signature card#Yu-Gi-Oh! 5D's anime|ace monsters]] of the main rivals of the ''[[Yu-Gi-Oh! 5D's]]'' anime ([[Jack Atlas]]'s "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" for this monster, and [[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]" for "[[Shooting Star Dragon (anime)|Shooting Star Dragon]]").
  ** Both are Summoned via an upgraded [[Synchro Summon]]ing mechanic introduced in the ''Yu-Gi-Oh! 5D's'' anime: this monster was Summoned via [[Double Tuning]], while "Shooting Star Dragon was obtained via [[Accel Synchro Summon]].
  ** Both were obtained by the main rivals of the ''Yu-Gi-Oh! 5D's'' anime, who received them upon encountering two different antagonists who originated from opposite time periods: This monster was created by Jack by sealing an ancient deity ([[Red Nova]]), while "Shooting Star Dragon" was given to Yusei by a futuristic god ([[Z-one]]), while "Red Nova Dragon" was created by Jack.
  *** Jack obtained this monster when he proved that he had a [[Blazing Soul]], whereas "Shooting Star Dragon" was acquired by Yusei while he was in a [[Clear Mind]] state. Both Yusei and Jack also said that the states of Clear Mind and Blazing Soul are opposite concepts and weapons to defeat [[Iliaster]] in {{episode|5D's|113|ref}}.
  *** Jack obtained this monster during a Ground Duel, while Yusei obtained this monster during a [[Turbo Duel]].
  ** This monster gains [[ATK]] based on the number of Tuner monsters in the [[Graveyard]] (representing the past) while "Shooting Star Dragon" can attack multiple times based on the number of [[Tuner monster]]s [[excavate]]d from the [[Deck]] (representing the future).
  ** Both have a [[Quick Effect]] to [[banish]] themselves from the [[field]] to [[negate]] an attack and [[Special Summon]] themselves during the [[End Phase]].
  ** Both monsters have mirrored poses in their respective card artworks.
  * This is the first [[Level 12]] Synchro Monster.
  ** This is also the first Synchro Monster to require 2 Tuner monsters as [[Synchro Material]].
  * This monster is similar to "[[Blue-Eyes Ultimate Dragon]]" and "[[Neo Galaxy-Eyes Photon Dragon]]".
  ** This monster and "Blue-Eyes Ultimate Dragon" are Level 12 monsters.
  ** This monster and "Neo Galaxy-Eyes Photon Dragon" can gain ATK in multiples of 500.
  ** They are the upgraded forms of the ace monsters of main rivals in the anime: Jack Atlas's "Red Dragon Archfiend" for this monster, [[Seto Kaiba]]'s "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" for "[[Blue-Eyes Ultimate Dragon (anime)|Blue-Eyes Ultimate Dragon]]", and [[Kite Tenjo]]'s "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]" for "[[Neo Galaxy-Eyes Photon Dragon (anime)|Neo Galaxy-Eyes Photon Dragon]]".
  ** They require three materials to be Summoned from the [[Extra Deck]].
