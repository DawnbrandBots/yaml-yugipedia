title: Card Trivia:Sylvan Charity
wikitext: |-
  {{Navigation}}

  * "[[Orea, the Sylvan High Arbiter]]", "[[Sylvan Lotuswain]]", "[[Sylvan Flowerknight]]", "[[Sylvan Guardioak]]", "[[Sylvan Komushroomo]]", "[[Sylvan Marshalleaf]]", "[[Sylvan Peaskeeper]]", and "[[Sylvan Sagequoia]]" appear in this card's artwork.
  * This card's name and effect are strongly similar to "[[Graceful Charity]]", allowing the player to [[draw]] 3 cards while losing 2 cards from their [[hand]] as a drawback.
  ** In addition, both card's disadvantages can be used to the player's advantage, through "[[Dark World]]" cards (which activate their effects upon being discarded) in the case of "Graceful Charity", and "[[Sylvan]]" cards (which activate their effects upon being [[excavate]]d from the top of the [[Deck]]) in the case of this card.
