title: Card Trivia:Transcendosaurus Meteorus
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Wild Survivors]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Transcendosaurus]] [[Special Summon Monster|Special Summon]] form of "[[Xeno Meteorus]]".
  * This monster is tied with "[[Transcendosaurus Gigantozowler]]" and "[[Transcendosaurus Glaciasaurus]]" for the highest [[Level]] (12) of all [[Dinosaur]] monsters.
