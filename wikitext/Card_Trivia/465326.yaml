title: Card Trivia:Performapal Odd-Eyes Metal Claw
wikitext: |-
  {{Navigation}}

  * This is the first "[[Performapal]]" [[Fusion Monster]].
  * This monster has the highest [[original ATK]] (3000) of all "Performapal" monsters
  * This monster's second effect is a reference to the effect of "[[Performapal Silver Claw]]", which was used as [[Fusion Material]] for this monster in the ''[[Yu-Gi-Oh! ARC-V The Strongest Duelist Yuya!!]]'' manga.
  * This card's artwork is taken from {{chapter|ARC-V The Strongest Duelist Yuya!!|006|ref}}, specifically from the panel showing [[Performapal Odd-Eyes Metal Claw (DY)|this monster]] being Summoned.
