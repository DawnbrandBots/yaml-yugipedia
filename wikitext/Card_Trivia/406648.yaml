title: Card Trivia:Double Iris Magician
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Magician (archetype)|Magician]]" form of "[[Odd-Eyes Pendulum Dragon]]".
  ** Its clothing is heavily based on the dragon's appearance.
  ** Its [[Pendulum Effect]] that doubles [[battle damage]] is a reference to the [[monster effect]] of "Odd-Eyes Pendulum Dragon".
  ** Its monster effect that retrieves a "[[Pendulumgraph]]" card is reference to the Pendulum Effect of "Odd-Eyes Pendulum Dragon" that retrieves a [[Pendulum Monster]].
  ** Its name is a reference to "[[Sky Iris]]", a [[Field Spell Card]] that depicts "[[Odd-Eyes Dragon]]" in its artwork (and supports "[[Odd-Eyes]]" cards).
