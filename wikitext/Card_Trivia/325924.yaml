title: Card Trivia:Rubic, Malebranche of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * The [[wikipedia:Malebranche (Divine Comedy)|Malebranche]] were demonic characters in Dante's ''The Divine Comedy'' who guard the fifth Bolgia of Malbolge, the Eighth Circle of Hell. They are known for their ruthless cruelty, and are responsible for the punishment of corrupt politicians by holding them under a boiling lake of pitch.
  ** Of the 12 named Malebranche, this card specifically represents the demon "Rubicante," the "Red-Faced Terror."
  ** He also appears under the name [http://castlevania.wikia.com/wiki/Lubicant Lubicant] in [[Konami]]'s Castlevania games.
  * This card is the only "[[Burning Abyss]]" Tuner monster, and also the only one to not have an [[Card effect|effect]] that activates in the [[Graveyard]].
