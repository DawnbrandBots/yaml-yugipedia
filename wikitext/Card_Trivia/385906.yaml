title: Card Trivia:Reaper Scythe - Dreadscythe
wikitext: |-
  {{Navigation}}

  * This card and "[[Celestial Sword - Eatos]]" are the only two "[[Guardian]]"-affiliated [[Equip Spell Cards]] whose artworks don't depict the "Guardian"-associated accoutrements being located within a grotto-like sanctum. These spell cards also do not need to be activated to summon their respective Guardian monsters.
