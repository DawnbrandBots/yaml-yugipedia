title: Card Trivia:Naturia Beast
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Infinite Feast]]", "[[Naturia Gaiastrio]]", and "[[Naturia White Oak]]".
  * This monster is based on the [[wikipedia:White Tiger (mythology)|Byakko]], the White Tiger, one of the [[wikipedia:Four Symbols|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]] that represents the cardinal direction of the west in [[wikipedia:Chinese mythology|Chinese mythology]].
  ** This is reinforced by this monster's connection with "[[Naturia Barkion]]" and "[[Naturia Landoise]]", who are each based on the other two of the Four Symbols from Chinese mythology ([[wikipedia:Azure Dragon|Seiryu]] and [[wikipedia:Black Turtle-Snake|Genbu]], respectively), and they feature [[Quick Effect]]s that [[negate]] a card of a specific [[Card type|type]].
  * This monster has a "[[Shaddoll]]" [[counterpart]]: "[[Shaddoll Beast]]".
