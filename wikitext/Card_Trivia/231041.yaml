title: Card Trivia:Goblin Circus
wikitext: |-
  {{Navigation}}

  * "[[Avatar of the Pot]]", "[[Goblin of Greed]]", "[[Pot of Generosity]]", "[[Pot of Greed]]", "[[Sinister Serpent]]", and the monsters from the Japanese artwork of "[[Fiend Comedian]]" (as seen [[Card Artworks:Fiend Comedian|here]]) appear in this card's artwork.
  ** In this scene, the "[[Pot of Greed]]" is depicted missing a piece, presumably the "[[Shard of Greed]]".
  ** This card's artwork is the first instance where the Japanese version of "Fiend Comedian" appears in the ''[[TCG]]''.
