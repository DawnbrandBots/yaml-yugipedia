title: Card Trivia:Vain Betrayer
wikitext: |-
  {{Navigation}}

  * The cards "[[Hero Mask]]", "[[Mask of Darkness]]", "[[Mask of Dispel]]", "[[Masked Dragon]]", and "[[Tutan Mask]]" appear in this card's ''[[OCG]]''/''[[TCG]]'' artwork.
  ** The cards "[[V Call]]", "[[V Gnome]]", "[[V Salamander]]", "[[V Sylph]]" and "[[V Undine]]" appear in this card's anime artwork.
  * This card represents its owner, [[Vector]], who is known for having a "vain" personality in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. In {{episode|ZEXAL|096|ref}}, Vector revealed himself as the true identity of his persona, "Ray Shadows", so he would befriend [[Yuma Tsukumo]] and later "betray" him and his friends to their doom.
  ** This card's ''OCG''/''TCG'' masked-themed artwork further represents how "Ray" was Vector in disguise, while its anime effect was designed to counter the "[[V (archetype)|V]]" [[archetype]], which was made possible when Vector (as "Ray") gave Yuma the "V" cards as part of his plan to gain his trust in {{episode|ZEXAL|094|ref}}.
