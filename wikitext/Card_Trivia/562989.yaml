title: Card Trivia:Photon Orbital
wikitext: |-
  {{Navigation}}

  * This card is a "[[Photon]]" [[retrained]] counterpart of "[[Orbital 7 (card)|Orbital 7]]".
  ** This card and its original counterpart are also based both on [[Orbital 7]], [[Kite Tenjo]]'s assistant robot in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]].
  ** This card's effect of [[equip]]ping itself to another monster is possibly a reference to the [[Orbital 7#Functions and abilities|ability]] of the original Orbital 7, which was capable of transforming and being worn by Kite.
