title: Card Trivia:Hieratic Seal of Convocation
wikitext: |-
  {{Navigation}}

  * "[[Hieratic Dragon of Eset]]", "[[Hieratic Dragon of Nebthet]]", and the sealed form of "[[Hieratic Dragon of Asar]]" appear in this card's artwork.
  ** This card's artwork appears to parallel the revival of the dismembered [[wikipedia:Osiris|Osiris]] (represented by the sealed form of "Asar" through the magic power of his sisters [[wikipedia:Isis|Isis]] and [[wikipedia:Nephthys|Nephthys]].
