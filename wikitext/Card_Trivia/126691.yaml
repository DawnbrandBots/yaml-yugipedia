title: Card Trivia:The Fabled Chawa
wikitext: |-
  {{Navigation}}

  * Due to the look of the monster and the name of the card, this card was based on a Chihuahua.
  ** As such, it is based off Maya and Aztec mythology about the chihuahuas. Chihuahuas were a big part of Maya and Aztec culture, seeing as how they were hunting dogs and considered to be keepers of the underworld, guiding the souls of humans to the afterlife.
  * The imp-like creature in this card's artwork is also featured in that of "[[Fabled Leviathan]]".
  ** This creature's name is Breach as pointed out in [[Duel Terminal Master Guide]]
