title: Card Trivia:The Tyrant Neptune
wikitext: |-
  {{Navigation}}

  * This monster is based on the planet [[wikipedia:Neptune (planet)|Neptune]], the eight planet in the [[wikipedia:Solar System|Solar System]].
  ** This monster's [[WATER]] [[Attribute]] is a reference to how Neptune was named after the [[wikipedia:Neptune (mythology)|Roman god of the sea]].
  *** This monster's Attribute is also a reference to the Japanese name for Neptune, "Kaiousei" (海王星), which translates to "Sea King Star".
  * This is the [[signature card]] of [[Jim Crocodile Cook (manga)|Jim Crocodile Cook]] in the ''Yu-Gi-Oh! GX'' [[Yu-Gi-Oh! GX (manga)|manga]].
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * This is the first and currently only Legendary Planet card to become [[Forbidden]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|045|ref}}, specifically from the panel showing [[The Tyrant Neptune (manga)|this monster]] being Summoned.
