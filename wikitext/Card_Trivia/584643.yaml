title: Card Trivia:Hi-Speedroid Kitedrake
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legendary Arc-V Decks]]''.
  * This monster is based on a [[wikipedia:Kite|kite]], a toy consisting of a light frame with thin material stretched over it, which is flown in the wind at the end of a long string.
  * This card was released as a result of two public polls.
  ** The [https://ygorganization.com/remindervizgetsfirstdibstosuchapromo/ first poll] was choosing 1 out of 10 themes that would receive future support: "[[Speedroid]]" was [http://blog.livedoor.jp/maxut/archives/52470924.html the most voted theme].
  ** The [https://ygorganization.com/doyouwantmoresupportormorebosses/ second poll] was deciding what kind of support the theme would receive: "A high-[[Level]] [[Synchro Monster]] that decides victory" was the most voted option.
