title: Card Trivia:Golondrinas Prison
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card, along with "[[Golondrinas Roar]]", are named after the [[wikipedia:Cave of Swallows|Cave of Swallows]], a huge vertical drop cave in Mexico known as the ''Sótano de las Golondrinas'', which is the first known location of the supposed cryptid, the [[wikipedia:Rod (optical phenomenon)|skyfish]].
