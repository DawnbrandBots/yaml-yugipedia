title: Card Trivia:Vertical Landing
wikitext: |-
  {{Navigation}}

  * A vertical take-off and landing ([[Wikipedia: VTOL|VTOL]]) aircraft is one that can hover, take off and land vertically. This classification includes fixed-wing aircraft as well as helicopters and other aircraft with powered rotors, such as cyclogyros/cyclocopters and tiltrotors.
  * "[[Mecha Phantom Beast Harrliard]]","[[Mecha Phantom Beast Coltwing]]" and "[[Mecha Phantom Beast Tetherwolf]] appear in this card's artwork.
  ** This is probably because the effect of the former supports the effect of the latter.
  ** Also because both are based off three aircraft that can perform a VTOL
  ** They seem to be landing within "[[Phantom Fortress Enterblathnir]]"
  * This card has the opposite effect of "[[Scramble!! Scramble!!]]".
  ** This is somewhat fitting, as "Mecha Phantom Beast Harrliard" seems to be landing on an aircraft carrier, possibly the same one shown in the artwork of that card.
