title: Card Trivia:Digital Bug Centibit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bug Matrix]]".
  * This monster's name and appearance are puns on "[[wikipedia:Centipede|centipede]]" (an arthropod known for their elongated bodies and multiple legs) and "[[wikipedia:Bit|bit]]" (the smallest unit of data in computers, representing a single binary value of either 0 or 1).
