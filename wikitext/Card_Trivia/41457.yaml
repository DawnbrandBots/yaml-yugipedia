title: Card Trivia:Dark Verger
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Dark Verdure", is based on the word "[[wiktionary:verdure|verdure]]", which refers to greenness or greenery.
  ** This monster's ''[[TCG]]'' name is likely a mistranslation of the word "verdure"; however, this naming scheme likely reflects its effect, which allows it to con'''verge''' with a [[Plant]] [[Tuner monster]] on the [[field]] from the [[Graveyard]].
  * In ''[[Yu-Gi-Oh! Duel Arena]]'', ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'', and ''[[Yu-Gi-Oh! Master Duel]]'', the icon for Plant monsters are based on this monster.
