title: Card Trivia:Enma's Judgment
wikitext: |-
  {{Navigation}}

  * "[[Red Ogre]]" appears in this card's manga artwork.
  * This card's name and artwork are based on the role of [[wikipedia:Yama (Buddhism)|Enma]], the King of Hell in East Asian and Buddhist mythology who presides over the multiple Hells and passes judgment to the souls of deceased sinners.
  ** In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, Enma is depicted with the kanji for "king" (王) on his hat, which is also seen in this card's manga artwork. In this card's ''[[OCG]]''/''[[TCG]]'' artwork, the design of Enma is changed, which includes the design of his hat, with the markings resembling the kanji.
  *** This card's Japanese and manga artworks feature the desk with the kanji for "prison" (獄 ''Goku'') written on the front, which is short for the kanji for "hell" (地獄 ''Jigoku''); this, along with the above-mentioned fact, further reference Enma's role as the King of Hell by sentencing the sinners to one of the Hells.
  ** According to mythology, after Enma sentences the dead to one of the many Hells, an ''[[wikipedia:Oni|oni]]'' is tasked with administering the sentences and torments the sinners. Fittingly, in the ''Yu-Gi-Oh! GX'' manga, this card's effect can [[Special Summon]] "[[Red Ogre (manga)|Red Ogre]]", which is based on said ''oni''.
