title: Card Trivia:Synchro Transmission
wikitext: |-
  {{Navigation}}

  * "[[Shield Wing]]", "[[Tuningware]]", and 4 [[Synchro Summon]]ing rings appear in this card's artwork.
  ** This card's artwork depicts "Tuningware" and "Shield Wing", along with a [[Level 4]] [[Tuner monster]] (represented by the 4 Synchro Summoning rings) being used as [[Synchro Material]]s for a [[Level 8]] [[Synchro Monster]]. "Tuningware" is using its effect to be treated as a [[Level 2]] monster when used as Synchro Material, based on the two glowing orbs that represent a non-Tuner monster's [[Level]].
  * This card has a [[Battle Phase]] [[counterpart]]: "[[Urgent Tuning]]".
