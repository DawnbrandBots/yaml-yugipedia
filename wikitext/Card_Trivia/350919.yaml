title: Card Trivia:Odd-Eyes Rebellion Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Clash of Rebellions]]'' and ''[[Star Pack Battle Royal]]''.
  * This monster appears in the artworks of "[[Extra Pendulum]]" and "[[Pendulum Dimension]]".
  * This card appears in the artwork of "[[Pendulum Flip R]]" and "[[Xyz on Xyz]]".
  * This monster is a combined [[Card evolutions|upgraded]] [[Xyz Pendulum Monster|Xyz Pendulum]] form of "[[Odd-Eyes Pendulum Dragon]]" and "[[Dark Rebellion Xyz Dragon]]".
  ** This card's Japanese name, "Supreme King Black Dragon, Odd-Eyes Rebellion Dragon", is potentially a reference to the black card frame of [[Xyz Monster]]s.
  ** This card's [[Attack and effect names in Yu-Gi-Oh! ARC-V|attack name]] in the Japanese version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime, "Imperial Wrath Revolt - Strike Disobey", is a combination of the attack names of "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]" ("Spiral Strike Burst") and "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]" ("Lightning Disobey of Rebellion").
  ** In the anime, this card represents the state of [[Yuya Sakaki]] and [[Yuto]] merged together.
  *** Fittingly, Yuya often [[Xyz Summon]]ed this card using "Odd-Eyes Pendulum Dragon" and "Dark Rebellion Xyz Dragon" as [[Xyz Material]]s.
  *** Occasionally, when this card activated its [[Trigger Effect]] in the anime, a silhouette of "Dark Rebellion" appeared, reflecting how Yuto was violently reacting from inside Yuya.
  * This card is an Xyz [[counterpart]] of "[[Odd-Eyes Venom Dragon]]" and "[[Odd-Eyes Wing Dragon]]".
  * This card has a [[counterpart]]: "[[Odd-Eyes Raging Dragon]]".
  ** Both cards are [[Rank 7]] Xyz Pendulum Monsters with 3000 [[ATK]] and 2500 [[DEF]].
  ** This monster is similar in appearance to "Dark Rebellion Xyz Dragon", while "Odd-Eyes Raging Dragon" is similar in appearance to "Odd-Eyes Pendulum Dragon".
  *** However, in the anime, this card was Summoned with Yuya's "[[Performapal]]" Deck, while "[[Odd-Eyes Raging Dragon (anime)|Odd-Eyes Raging Dragon]]" was Summoned with Yuto's "[[Phantom Knights]]" [[Deck]].
  ** Both cards can [[attack]] multiple times if they are Summoned using an Xyz Monster as [[Xyz Material]].
  ** Both cards features the same [[Pendulum Effect]] of placing another monster in the other [[Pendulum Zone]].
  ** In the anime, when Yuya Xyz Summoned this card, he called "Odd-Eyes" first and then "Dark Rebellion", while when he Xyz Summoned "Odd-Eyes Raging Dragon", he called "Dark Rebellion" first and then "Odd-Eyes".
  * This card has two counterparts:
  ** [[Signature move]]: "[[Odd-Eyes Rebellion Dragon Overlord]]".
  ** "[[Xyz Dragon]]": "[[Odd-Eyes Rebellion Xyz Dragon]]".
  * "[[Raidraptor - Rising Rebellion Falcon]]" is a combination of [[Raidraptor - Ultimate Falcon]]" and this monster.
  * This is the first card to have an effect that can place a [[Pendulum Monster]] from the Deck in the [[Pendulum Zone]].
  * This card is the first Xyz Pendulum Monster, as well as the first Pendulum Monster to also be an [[Extra Deck]] monster.
  ** It is also the first Extra Deck monster that can be [[Pendulum Summon]]ed.
  * In the anime, this card and "Odd-Eyes Raging Dragon" were the only merged forms of "Odd-Eyes Pendulum Dragon" and another [[Four Dimensional Dragons|Dimensional Dragon]] to not require the latter as [[material]] for their Summon.
  ** In {{episode|ARC-V|102}}, Yuya used "[[Dragoncaller Magician (anime)|Dragoncaller Magician]]" instead of "Dark Rebellion Xyz Dragon" as Xyz Material to Xyz Summon this card, during his [[Duel]] against [[Kite Tenjo (ARC-V)|Kite Tenjo]].
