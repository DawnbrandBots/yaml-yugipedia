title: Card Trivia:Red-Eyes Transmigration
wikitext: |-
  {{Navigation}}

  * This card is one of two [[Ritual Spell Card]]s in the [[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]] anime whose corresponding [[Ritual Monster]]s does not rely on [[Level]]s, but rather certain monsters to [[Ritual Summon]], the other being "[[Dragon Revival Ritual]]".
  ** In this card's case, its anime effect can Ritual Summon "[[Lord of the Red]]" by [[Tribute|Tributing]] "[[Red-Eyes Black Dragon]]" and one [[Warrior]] monster.
