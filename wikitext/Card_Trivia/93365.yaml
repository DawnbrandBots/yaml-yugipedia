title: Card Trivia:Flamvell Grunika
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Flare]]" and "[[Flamvell Counter]]".
  * "Grunika" might be based on [[wikipedia:Guernica (town)|Guernica]], a Spanish town that was bombed by the Nazis during the [[wikipedia:Spanish Civil War|Spanish Civil War]].
  * This card's fixed amount of [[damage]] multiplication (200) is the same as most "[[Flamvell]]" monsters' [[DEF]] (200).
