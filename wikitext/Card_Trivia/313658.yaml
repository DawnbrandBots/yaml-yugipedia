title: 'Card Trivia:Number 35: Ravenous Tarantula'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * Like the other "[[Number]]" monsters associated with [[Kyoji Yagumo]], this monster is related to one of the [[wikipedia:Seven deadly sins|seven deadly sins]], specifically, the [[wikipedia:Gluttony|deadly sin of gluttony]].
  ** This is reflected in this monster's [[ATK]]-increasing effect, as it and all monsters the player controls constantly gains [[ATK]]/[[DEF]] equal to the difference between both players' [[Life Point]]s.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|044|ref}}, specifically from the panel where Yagumo explains [[No. 35: Ravenous Tarantula (manga)|this monster's]] effects.
