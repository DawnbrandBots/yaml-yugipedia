title: Card Trivia:Synchro Overtop
wikitext: |-
  {{Navigation}}

  * "[[Ancient Fairy Dragon]]", "[[Black Rose Dragon]]", "[[Black-Winged Dragon]]", "[[Red Dragon Archfiend]]", and the [[Synchro Summon]] rings used by "[[Life Stream Dragon]]" appear in this card's artwork.
  ** This card's name references [[Over Top Clear Mind]], an ability used by [[Yusei Fudo]] when he performed the [[Limit Over Accel Synchro Summon]] of "[[Shooting Quasar Dragon (anime)|Shooting Quasar Dragon]]" in ''Yu-Gi-Oh! 5D's'' episode 150: [[Yu-Gi-Oh! 5D's - Episode 150|"Entrusted Feelings of My Father"]].
  ** This card's artwork and effects are based on a scene in the same episode where Yusei [[Special Summon]]ed the [[Signer Dragon]]s, except "[[Stardust Dragon (anime)|Stardust Dragon]]", via the effect of "[[Speed Spell - Synchro Panic]]", which also [[negate]]d their effects. He then uses the effect of "[[Life Stream Dragon (anime)|Life Stream Dragon]]" to change the other Signer Dragons' [[Level]]s to 1, so that they could be used as [[Synchro Material]]s for "Shooting Quasar Dragon".

