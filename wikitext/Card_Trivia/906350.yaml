title: Card Trivia:Hinezumi Hanabi
wikitext: |-
  {{Navigation}}

  * This card's name is a combination of the words ''Nezumi'' (ネズミ, meaning mouse/rat) and ''Hanabi'' (花火, meaning fireworks). This card's name is also the name for the [[wikipedia:Catherine wheel (firework)|Catherine wheel firework]].
  * "[https://en.wiktionary.org/wiki/火鼠 Hinezumi]", or "fire rat", is a [[wikipedia:Yōkai|yōkai]] of Asian mythology.
