title: Card Trivia:Fisherman, Legend of the Sea
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[Dark Time Wizard (series)|Dark Time Wizard]] [[counterpart]] of "[[The Legendary Fisherman]]".
  ** This monster's pose is taken from a panel from {{chapter|Yu-Gi-Oh!|242|ref}} showing "[[The Legendary Fisherman (manga)|The Legendary Fisherman]]" being Summoned.
  ** This monster's [[Level]] (4) is based on the fact that "The Legendary Fisherman" was [[Level 4]] in the manga, but is [[Level 5]] in the anime and the ''[[OCG]]''/''[[TCG]]''.
