title: Card Trivia:Amphibian Angel - Frog-hael
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster's Japanese name "{{translated name|Amphibian Angel - Mifrog|ja}}" ({{name|Amphibian Angel - Mifrog|ja}}, ''{{romanized name|Amphibian Angel - Mifrog|ja}}'') is a pun on the name of the archangel "[[wikipedia:Michael (archangel)|Michael]]" (ミカエル, ''Mikaeru''), replacing the katakana「カエル」 (''chael'') with the katakana「ガエル」 (''gaeru'', lit. "frog").
