title: Card Trivia:Yamatano Dragon Scroll
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to the ''[[wikipedia:Yamata no Orochi|Yamata no Orochi]]'', a legendary 8-headed and 8-tailed [[wikipedia:Japanese dragon|Japanese dragon]] who is illustrated with the red paint on the scroll.
  * According to a [http://www.pojo.biz/board/showthread.php?p=8294167#post8294167 Pojo post] by Dan Scheidegger (a Upper Deck Entertainment employee), this card was originally planned to be released in ''[[McDonald's Pack 2]]'', but McDonald's decided against it, as the corporation decided that the red paint on the scroll looked too much like blood.
