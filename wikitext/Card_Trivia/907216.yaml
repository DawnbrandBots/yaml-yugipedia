title: Card Trivia:Supreme Skystream Magnum Overlord (L)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maximum Ultra Evolution Pack]]''.
  * This monster appears in the artworks of "[[Super Electromagnetic Maximum]]", "[[Supreme Marine Fortress Magnum Overbase]]", and "[[Urgent Strike]]".
  * This monster has three [[counterpart]]s: "[[Supreme Beasteam Magnum Overlord (L)|Supreme Beasteam Magnum Overlord [L]]]", "[[Supreme Machine Magnum Overlord (L)|Supreme Machine Magnum Overlord [L]]]", and "[[Supreme Railartillery Magnum Overlord (L)|Supreme Railartillery Magnum Overlord [L]]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (4), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (800/0) with the above-mentioned monsters.
