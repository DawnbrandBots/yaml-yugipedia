title: Card Trivia:Flying Pegasus Railroad Stampede
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Selection 5]]''.
  * This monster appears in the artwork of "[[Urgent Schedule]]".
  * This monster has an upgraded [[Xyz Monster|Xyz]] [[counterpart]]: "[[Superdreadnought Rail Cannon Flying Launcher]]".
  * This monster is based on the ''[[wikipedia:Pegasus (train)|Pegasus]]'', one of the trains used by the now-defunct [[wikipedia:City Night Line|City Night Line]] train category for the [[wikipedia:Deutsche Bahn|Deutsche Bahn]] railway company in Germany.
  ** Fittingly, this monster's design is based on the [[wikipedia:Pegasus|Pegasus]], the name of a winged horse in [[wikipedia:Greek mythology|Greek mythology]] whom the City Night Line train was named after.
  * The knight in this monster's design is based on [[Anna Kaboom]], who used a [[Train]] [[Deck]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's name, "Flying Pegasus" is based on the flying cannon that Anna carried around and piloted in the anime.
  ** This monster's name and design reference how the Pegasus is the named of a winged horse, with the first name of Anna's friend, [[Yuma Tsukumo]] being based on the Japanese name for "horse".
  *** Fittingly, this monster's mechanical wings resemble those of "[[Number F0: Utopic Future]]", a monster used by Yuma Tsukumo, whose Japanese [[Summon chant]] describes it as a Pegasus.
  **** Also, this monster's alternate design is based on Yuma and his [[signature card]], "[[Number 39: Utopia]]", while also sharing some traits with "[[Number C39: Utopia Ray Victory]]".
