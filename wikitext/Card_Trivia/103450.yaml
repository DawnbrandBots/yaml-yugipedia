title: Card Trivia:Dark Mimic LV1
wikitext: |-
  {{Navigation}}

  * This card and "[[Dark Mimic LV3]]" are based on the [[wikipedia:Mimic (Dungeons & Dragons)|mimic]], a type of shapeshifting creature that occurs in many fantasy works and lures in prey by disguising itself as something innocuous or desirable (e.g., a treasure chest).
  * This is the first [[Flip monster]] with a non-[[Flip effect|Flip]] [[effect]].
