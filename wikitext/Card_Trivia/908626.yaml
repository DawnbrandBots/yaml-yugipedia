title: Card Trivia:Starving Venemy Lethal Dose Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Starving Venemy Dragon]]".
  ** This monster is the [[Yu-Gi-Oh! ARC-V (manga)|manga]] [[counterpart]] of "[[Greedy Venom Fusion Dragon]]".
  * This monster is similar to "[[Number C5: Chaos Chimera Dragon]]".
  ** Both monsters were released in the ''[[OCG]]''/''[[TCG]]'' before their base forms; however, unlike "Chaos Chimera Dragon", this monster's base form was shown in the anime/manga.
  * In the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, parts of this monster's body were colored white. For some reason, when this card was printed in the ''OCG''/''TCG'', the white parts of this monster's body were changed to purple.
  * When the chapters of the ''Yu-Gi-Oh! ARC-V'' manga depicting [[Yuya Sakaki (manga)|Yuya Sakaki]], [[Yuto (manga)|Yuto]], [[Yugo (manga)|Yugo]] and [[Yuri (manga)|Yuri's]] Duel against [[Eve]] were first serialized in the magazine, [[Starving Venemy Lethal Dose Dragon (manga)|this monster]] was erroneously drawn in place of "[[Starving Venemy Dragon (manga)|Starving Venemy Dragon]]" in all the scenes that featured it. This error was later fixed when the chapters were registered.
  * This card's artwork is taken from {{chapter|ARC-V|031|ref}}, specifically from the panel showing this monster being Summoned.
