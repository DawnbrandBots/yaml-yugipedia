title: Card Trivia:Amano-Iwato
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Amano-Iwato|Amano-Iwato]], the cave in [[wikipedia:Japanese mythology|Japanese mythology]] where [[wikipedia:Amaterasu|Amaterasu]], the [[wikipedia:Shinto|Shinto]] goddess of the sun, sealed herself away inside following the unruly conduct of her brother, [[wikipedia:Susanoo-no-Mikoto|Susano'o]], the Shinto god of storms, and deprived the world of sunlight until she was tricked into coming out.
  * This card's background is similar to [[Ground Breaking]], a trap card used by Noah Kaiba in the anime, who notably used Spirit Monsters.
