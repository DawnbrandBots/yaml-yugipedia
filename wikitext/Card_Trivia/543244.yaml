title: 'Card Trivia:Number 99: Utopic Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster is a [[Rank-Up#Hyper Rank-Up|Hyper Rank-Up]] [[Dragon]] [[Card evolutions|upgraded]] form of "[[Number 39: Utopia]]".
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, [[Astral]] referred to this monster as ''the apex and end of the [[Number]]s'' (ナンバーズの終焉にして頂点, ''Nanbāzu no shūen ni shite chōten'').
  * This monster has two combined forms.
  ** With "[[Number F0: Utopic Future]]": "[[Number F0: Utopic Draco Future]]".
  ** With "[[Number 39: Utopia Beyond]]": "[[Number 99: Utopia Dragonar]]".
  * This monster has a ''[[Rush Duel]]'' [[Baseball]] parody: "[[Player 99: Grand Slam Dragon|Player #99: Grand Slam Dragon]]".
  * This monster is similar to "[[Shooting Quasar Dragon]]".
  ** Both are [[LIGHT]] Dragon [[Extra Deck]] monsters with 4000 [[ATK]].
  ** Both require three [[material]]s to be Summoned; however, this monster can be [[Xyz Summon]]ed with less than three [[Xyz Material]]s and "Shooting Quasar Dragon" can be [[Synchro Summon]]ed with more than three [[Synchro Material]]s.
  ** Both are the ultimate forms of an anime protagonist's [[ace monster]]: [[Yuma Tsukumo]]'s "Number 39: Utopia" for this monster and [[Yusei Fudo]]'s [[Stardust Dragon (anime)|Stardust Dragon]]" for "[[Shooting Quasar Dragon (anime)|Shooting Quasar Dragon]]".
  *** Both are also considered the ultimate forms of their respective [[archetype]]/[[series]]: this monster is considered the apex of the "Number" monsters, while "Shooting Quasar Dragon" is the ultimate form of the [[Signer Dragon]]s, represents the bonds of the [[Signer]]s.
  *** Both are Summoned via a further-upgraded [[Summoning mechanic]]: Hyper Rank-Up for this monster and [[Limit Over Accel Synchro Summon]] for "Shooting Quasar Dragon".
  ** Both have an effect to Special Summon another monster of their respective archetype/series: this monster can Special Summon a "Number" monster from the [[Graveyard]], while "Shooting Quasar Dragon" can Special Summon "[[Shooting Star Dragon]]" (the [[Accel Synchro Monster|Accel Synchro]] upgraded form of "Stardust Dragon").
  ** Both have an effect to [[negate]] the [[activate|activation]] of a card effect and [[destroy]] that card: this monster can negate monster effects that [[target]] it, while "Shooting Quasar Dragon" can negate any card effect, except for [[Counter Trap Card]]s.
  * This was the last "[[Number]]" monster to be Xyz Summoned in the ''Yu-Gi-Oh! ZEXAL'' anime.
  * This monster's ''[[OCG]]''/''[[TCG]]'' alternate [[Summoning condition]] by [[discard]]ing a "[[Rank-Up-Magic]]" card and use a "[[Utopia (archetype)|Utopia]]" monster as material is a reference to a scene of {{episode|ZEXAL|146|ref}}, where Astral Summoned this monster by Ranking-Up "[[Number 39: Utopia Roots (anime)|Number 39: Utopia Roots]]" with "[[Hyper-Rank-Up-Magic Ultimate Force (anime)|Hyper-Rank-Up-Magic Ultimate Force]]", during his [[Duel]] against Yuma Tsukumo.
  * This card's [[Set Number]] in its first ''TCG'' release in ''[[The New Challengers]]'' (NECH-XX099) is a reference to its number.
