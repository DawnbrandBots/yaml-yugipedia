title: Card Trivia:Pot of Extravagance
wikitext: |-
  {{Navigation}}

  * "[[Eldlich the Golden Lord]]" appears in this card's alternate artwork.
  ** This card's alternate artwork depicts "Eldlich the Golden Lord" summoning golden zombies out of the pot, referencing the gameplay of the "[[Eldlich]]" theme and the associated "[[Eldlixir]]" and "[[Golden Land]]" [[archetype]]s, which revolves around quickly [[Special Summon]]ing [[Zombie]] monsters.
  * This pot is a combination of "[[Pot of Greed]]" and "[[Pot of Riches]]".
  * This is the first card that requires the [[banish]]ment of [[face-down]] cards from the [[Extra Deck]] as cost for its [[activate|activation]].
