title: Card Trivia:Makourai, the Lightning Strike
wikitext: |-
  {{Navigation}}

  * "[[Great Moth]]" and "[[Summoned Skull]]" appear in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|068|ref}} showing "[[Summoned Skull (manga)|Summoned Skull]]" attacking "[[Great Moth (manga)|Great Moth]]".
  * This card's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Summoned Skull" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
