title: Card Trivia:Performage Trapeze Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Performance Mage Hurricane]]".
  * This monster is based on a [[Wikipedia:Trapeze|trapeze artist]], a circus performer who performs acrobatic and aerialist stunts with a trapeze, a short horizontal bar hung by ropes from a ceiling support.
  * This monster has a [[Ranked-Up]] form: "[[Performage Trapeze High Magician]]".
  * This is the [[signature card]] of [[Dennis McField]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
