title: Card Trivia:Harpie's Feather Storm
wikitext: |-
  {{Navigation}}

  * This card has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Harpie's Feather Tempest]]".
  * Until its reprint in [[25th Anniversary Rarity Collection]], this card's French name translated to "[[Harpie's Pet Dragon]]".
  ** However, this card did not share its French name with the French version of "Harpie's Pet Dragon", as the latter was translated as "Harpie's Dragon".
