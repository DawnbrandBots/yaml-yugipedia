  * Several copies of this monster appear in the artwork of "[[Magical Mid-Breaker Field]]".

  * This monster's ''[[TCG]]'' name, "Maryokutai" (魔力体) is the Japanese word for "Magical Body", which ommited the "吸収" (Absorbtion) part from its Japanese's name.
