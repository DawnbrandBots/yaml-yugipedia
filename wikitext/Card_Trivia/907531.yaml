title: Card Trivia:Cycliptron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Particle Acceleration]]".
  * This card is named after a [[wikipedia:Cyclotron|cyclotron]], a type of [[wikipedia:Particle accelerator|particle accelerator]].
  * Similar to the other "[[Tron (series)|tron]]" monsters used by [[Nail Saionji]], the number of rings on this monster's body is the same as its [[Level]].
  * "[[Seedchrotron Brusselun]]" appears to be an evolved form of this monster.
  ** The [[wikipedia:Synchrotron|synchrotron]], which "Seedclotron" is named after, was developed from the cyclotron.
