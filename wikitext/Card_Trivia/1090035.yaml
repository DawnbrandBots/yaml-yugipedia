title: Card Trivia:Wonko, Noble Knight of the Forest
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2025]]''.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect [[support]]ing "[[Fairy Tale Prologue: Journey's Dawn]]" is based on a scene from {{chapter|5D's|036|ref}}, where [[Wonko, Noble Knight of the Forest (manga)|this monster]] is [[Normal Summon]]ed while [[Leo (manga)|Leo]] had "[[Fairy Tale Prologue: Journey's Dawn (manga)|Fairy Tale Prologue: Journey's Dawn]]" on his [[field]].
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, specifically from the panel showing this monster being Summoned, albeit mirrored.
