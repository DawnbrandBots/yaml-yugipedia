title: Card Trivia:Icejade Erosion
wikitext: |-
  {{Navigation}}

  * "[[Swordsoul Strategist Longyuan]]" (holding the sword of "[[Swordsoul of Mo Ye]]") and an unknown "[[Icejade]]" monster  appear in this card's artwork.
  ** This card's artwork may depict the first betrayal attack of "Longyuan" against the "Icejade" tribe, as supported by the dark aura surrounding it.
