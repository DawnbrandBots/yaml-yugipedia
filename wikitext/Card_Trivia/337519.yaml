title: Card Trivia:Golden Dragon Summoner
wikitext: |-
  {{Navigation}}

  * The head of "[[Aether, the Empowering Dragon]]" appears in this card's artwork.
  ** This card's effect is a weaker version of the effect of "Aether".
  * This monster is based on the [[wikipedia:Huang Long (Four Symbols)|Yellow Dragon]], which is sometimes counted as the fifth Guardian Beast of the [[wikipedia:Four Symbols (China)|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]].
