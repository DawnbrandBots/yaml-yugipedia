title: Card Trivia:Mannadium Reframing
wikitext: |-
  {{Navigation}}

  * "[[Mannadium Prime-Heart]]" and "[[Vicious Astraloud]]" appear in this card's artwork.
  ** This card's artwork depicts "Mannadium Prime-Heart" attacking "Vicious Astraloud" with a kicking attack, referencing the iconic ''Rider Kick'' finishing move from the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise.
  * This card's ''[[TCG]]'' name references ''[[wikipedia:Cognitive reframing|cognitive reframing]]'', a strategy used to change the negative viewpoint of a situation into a more helpful one.
