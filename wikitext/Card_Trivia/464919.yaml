title: Card Trivia:Metalfoes Mithrilium
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Metalfoes Combination]]".
  * This monster's name is based on [[wikipedia:Mithril|Mithril]], a fictional metal featured in [[wikipedia:J. R. R. Tolkien|J. R. R. Tolkien]]'s Middle-earth legendarium, which is described as being harder and lighter than [[wikipedia:Steel|steel]].
  ** Mithril is described to resemble silver, which is reflected in how this monster is the [[Fusion Monster|Fusion]] [[counterpart]] of "[[Metalfoes Silverd]]".
