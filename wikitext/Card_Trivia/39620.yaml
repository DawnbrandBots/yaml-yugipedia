title: Card Trivia:Last Resort
wikitext: |-
  {{Navigation}}

  * This card is named after "last resort", the term that describes a final course of action, used only when all else has failed.
  ** This card's artwork is a parody of "last resort", as it depicts a folding chair on the moon, which is the type of chairs used for vacationers at a resort hotel. Also, the depiction of outer space reflects how it is often labeled as "the final frontier", with the word "final" being a synonym of the word "last".
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[activate]] "[[Ancient City - Rainbow Ruins]]" from the player's [[Deck]] is an alteration on this card's effect to activate a [[Field Spell Card]]. In {{episode|GX|107|ref}}, [[Jesse Anderson]] used this card to activate the Field Spell Card, "[[Ancient City - Rainbow Ruins (anime)|Ancient City - Rainbow Ruins]]" from his Deck.
