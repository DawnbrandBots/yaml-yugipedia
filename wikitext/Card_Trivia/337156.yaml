title: Card Trivia:Archfiend Eccentrick
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Pendulum Hole]]".
  * This is the first "[[Archfiend]]" [[Pendulum Monster]].
  * This monster is a [[LIGHT]] and Pendulum [[counterpart]] of "[[Archfiend Heiress]]", as well as a younger version of "[[Highness Archfiend]]" and "[[Archfiend Empress]]".
  ** The word "Eccentric" in this monster's name is a pun on the Japanese name of "Archfiend Heiress", "{{Translated name|Archfiend Heiress|ja}}".
