title: Card Trivia:Insect Queen
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Collectible Tins 2004]]'' and ''[[Speed Duel: Streets of Battle City]]''.
  * This monster appears in the artwork of "[[Turf]]"
  * This card appears in the first Japanese artwork of "[[Exchange]]".
  * This monster has a [[Counterpart|retrained]] counterpart: "[[Metamorphosed Insect Queen]]".
  * This monster has a [[Fusion Monster|Fusion]] with "[[Great Moth]]": "[[Ultimate Great Insect]]".
  * This is the [[signature card]] of [[Insector Haga (manga)|Insector Haga]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ([[Weevil Underwood]] in the [[Yu-Gi-Oh! (anime)|anime]]).
  * This monster appears to be an older version or the mother of "[[Insect Princess]]".
  * In the ''Yu-Gi-Oh!'' manga and anime, when this monster uses its effect to [[Tribute]]s a monster before [[declare|declaring]] an attack, it feasts in the Tributed monster. Then, after it [[destroy]]s a monster by battle, it lays an egg containing "[[Insect Larva]]", which is also known as an "[[Insect Monster Token]]" in the ''[[OCG]]''/''[[TCG]]''.
