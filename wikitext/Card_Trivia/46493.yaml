title: Card Trivia:Revived King Ha Des
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Destruct Potion]]", "[[Fake Life]]", "[[Mind Drain]]", "[[Reanimation Wave]]", "[[Reject Reborn]]", "[[Skill Prisoner]]", "[[Soul Drain]]", and "[[Dark Ruler No More]]".
  * This monster is a [[Synchro Monster|Synchro]] [[Zombie counterpart]] of "[[Dark Ruler Ha Des]]".
  ** Like the other Zombie counterparts, this monster has 0 [[DEF]].
  ** Ironically, despite this card's name, "Dark Ruler Ha Des" cannot be [[Special Summon]]ed from the [[Graveyard]] ("revived").
  * This monster is the enemy of "[[Dark King of the Abyss]]", as seen in many card artworks which depict the storyline of "Dark Ruler Ha Des".
  * The left horn on this monster's head in its ''[[OCG]]'' artwork is broken, likely due to whatever destroyed "Ha Des" in his [[Fiend]] form (possibly the aftermath of "[[Hate Buster]]"). In the ''[[TCG]]'' artwork, its right blue orb is broken.
