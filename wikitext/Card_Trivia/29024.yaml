title: Card Trivia:Gladiator Beast Equeste
wikitext: |-
  {{Navigation}}

  * This card's name comes from the equestrian class (a group of knights who fought on horseback) which gained political power during the late Roman Republic.
  * It could be also named after the Equites, a type of Gladiator that fought on horseback but would then dismount.
  * The "[[Gladiator Beast's Battle Manica]]" can be seen in the card's artwork.
  * Equeste is shown on the "[[Trojan Gladiator Beast]]" in a Trojan version.
