title: Card Trivia:Flower Cardian Willow with Calligrapher
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fraud Check]]" and "[[Super All In!]]".
  * "[[Flower Cardian Lightshower]]" and "[[Poison Draw Frog]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Willow and [[wikipedia:Ono no Michikaze|Ono no Michikaze]]", one of the special cards in the "Pine" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's ''[[TCG]]'' name, "Calligrapher", is based on how Ono no Michikaze was a well-known calligrapher in 10th century Japan.
  ** This monster's [[Level]] (11) references how the "Willow and Ono no Michikaze" card falls under the month of November, the eleventh month of the year.
  ** This monster's [[original ATK and DEF]] (2000/2000) references how the "Willow and Ono no Michikaze" card is a ''hikari'' card, which is worth twenty points.
  * This is the only [[Level 11]] [[Tuner monster]].
  ** This monster also has the highest [[Level]] of all Tuner monsters.
