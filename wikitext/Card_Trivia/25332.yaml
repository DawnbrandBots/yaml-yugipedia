title: Card Trivia:Dream Clown
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Asleep at the Switch]]" and "[[Last Minute Cancel]]".
  * This monster's effect is opposite to that of "[[Crass Clown]]".
  * This monster has an identical effect to that of "[[Blade Rabbit]]".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster is also treated as a [[Toon monster]], as it can be powered up in the [[Toon (terrain)|Toon]] [[terrain]].
