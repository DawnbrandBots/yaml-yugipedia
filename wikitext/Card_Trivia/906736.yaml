title: Card Trivia:RGB Rainbowlution
wikitext: |-
  {{Navigation}}

  * "[[Berserk Gorilla]]", "[[Scrap Kong]]", and "[[Shien's Squire]]" appear in this card's artwork.
  * The number "16,770,000" in this card's Japanese name is a reference to the number of colors that can be generated in the 8-bit RGB (red, green, blue) color model, which is exactly 16,777,216.
