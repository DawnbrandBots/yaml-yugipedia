title: Card Trivia:Fire Lake of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * The Fire Lake alluded to in this card is most likely the boiling lake of pitch that the [[wikipedia:Malebranche (Divine Comedy)|Malebranche]] use for the punishment of corrupt politicians ([[wikipedia:Barratry (common law)|barrators]]), by forcing and holding them under.
  ** "[[Alich, Malebranche of the Burning Abyss]]" and "[[Calcab, Malebranche of the Burning Abyss]]" appears on this card's artwork, a reference to the [[wikipedia:Alichino (devil)|fight between Alichino and Calcabrina]].
