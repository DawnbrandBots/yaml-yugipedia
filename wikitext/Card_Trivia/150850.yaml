  * This card has a [[counterpart]] for [[Beast]]s: "[[Maji-Gire Panda]]".
  ** Both cards have an effect to gain 500 [[ATK]] each time a monster of their type on the controller's side of the field is [[destroy]]ed.
  ** Both cards were released in ''[[Flaming Eternity]]''.
