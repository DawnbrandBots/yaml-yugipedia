title: Card Trivia:Non-Spellcasting Area
wikitext: |-
  {{Navigation}}

  * "[[Dark Hole]]", "[[Gemini Elf]]", and "[[Goblin Attack Force]]" appear in this card's artwork.
  ** This reflects this card's effects, as the artwork depicts the [[Normal Monster]] "Gemini Elf" being protected from "Dark Hole" while the [[Effect Monster]] "Goblin Attack Force" is being sucked inside the "Dark Hole".
  * Unlike most card artworks featuring "Gemini Elf", the pair's busts are unedited in this card's artwork.
