title: Card Trivia:Mobius the Frost Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[By Order of the Emperor]]", "[[Domain of the True Monarchs]]", "[[Frost Blast of the Monarchs]]", "[[Inverse Universe]]", "[[Magical Mid-Breaker Field]]", "[[March of the Monarchs]]", "[[Prideful Roar]]", "[[The Monarchs Masterplan]]", "[[The Monarchs Revolt]]", and "[[Tribute Carnival]]".
  * This monster's name is derived from the [[wikipedia:Möbius strip|Möbius strip]], a non-orientable object with only one side and one boundary curve.
  * This monster has an [[Card evolutions|upgraded]] Mega Monarch form: "[[Mobius the Mega Monarch]]".
  * This monster has a [[Vassal]] [[counterpart]]: "[[Escher the Frost Vassal]]".
  * This is one of three [[Monarch (series)|Monarch]] monsters whose [[Trigger Effect]]s are optional, the other two being "[[Delg the Dark Monarch]]" and "[[Kuraz the Light Monarch]]".
