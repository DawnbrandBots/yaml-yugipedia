title: Card Trivia:Borrelend Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Creation Pack 10]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Borreload Dragon]]", combined with "[[Borrelsword Dragon]]" and "[[Borrelguard Dragon]]".
  ** Ironically, this monster cannot be [[Link Summon]]ed using only "Borreload", "Borrelsword", and "Borrelguard Dragon" as [[Link Material]]s.
  ** This monster's first effect is a combination of the first effects of "Borrelsword" (cannot be [[destroyed by battle]]), "Borrelguard" (cannot be [[destroy]]ed by [[card effect]]s), and "Borreload" (cannot be [[target]]ed by any player with monster effects).
  * This monster is the rival [[counterpart]] of "[[Firewall Dragon Darkfluid]]".
  ** This monster is similar to "[[Blue-Eyes Ultimate Dragon]]" and "[[Neo Galaxy-Eyes Photon Dragon]]", as they all are upgraded three-headed forms of a rival's ace monster.
