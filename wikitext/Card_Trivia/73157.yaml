title: Card Trivia:Enishi, Shien's Chancellor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gozen Match]]", and "[[Evenly Matched]]".
  ** It is possible that "Legendary Six Samurai - Enishi" became "Shien's Chancellor" by defeating "[[Legendary Six Samurai - Kizan]]" in the artwork of the former card.
  * "[[Legendary Six Samurai - Enishi]]" is the younger version of this card, and is wearing the armor that appears in this card's background.
  * The fiery glow around this monster is similar to that around "[[Great Shogun Shien]]", as is the glow around "[[Hand of the Six Samurai]]" and "[[Shien's Advisor]]". This, coupled with the red eyes and 'Shien' glyphs on these monster's foreheads, suggests that "Shien" has some kind of magical influence over them.
