title: Card Trivia:Water Enchantress of the Temple
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Grand Creators]]''/''[[The Grand Creators]]''.
  * This monster appears in the artworks of "[[Fateful Adventure]]", "[[Rite of Aramesir]]", and "[[Thunder Discharge]]".
  * This monster is based on [[fandom:c:konosuba:Aqua|Aqua]], a character from ''[[wikipedia:KonoSuba|KonoSuba]]'', who is a water goddess with a water-related power and is responsible for the reincarnation of humans into the fantasy world.
  ** "Rite of Aramesir" depicts this monster conducting the summoning of an "[[Adventurer Token]]", further hinting the reference of ''Isekai'' trope that ''KonoSuba'' oftens takes a jab upon.
