  * "[[K9-X "Werewolf"]]" appears in this card's artwork.
  ** This card depicts the transformation of "[[K9-ØØ "Hound"]]" into ""Werewolf"". 
  *** Furthermore, the background of this card's artwork features a full moon, referencing the mythology of werewolves, where a human transforms into a werewolf under a full moon.
