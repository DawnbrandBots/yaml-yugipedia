title: Card Trivia:Apoqliphort Skybase
wikitext: |-
  {{Navigation}}

  * This monster's [[archetype|archetypal]] name is a portmanteau of the words "[[wikipedia:Apocrypha|apocrypha]]" (or [[wikipedia:apocalypse|apocalypse]]) and "[[Qli]]phort". 
  ** This monster's Japanese name, "Apoqliphort Kernel" ({{name|Apoqliphort Skybase|ja}}, ''{{romanized name|Apoqliphort Skybase|ja}}'') is a pun on "[[wikipedia:Kernel (operating system)|kernel]]" (the core part of an operating system that acts as a bridge between the software and hardware) and "Bacikal" (バチカル ''Bachikaru'', lit. "atheism"), the first [[wikipedia:Qlippoth|Qlippoth]] emanation which is associated with the [[wikipedia:Devil|Devil]] [[wikipedia:Satan|Satan]].
  * This monster and "[[Apoqliphort Towers]]" are the only "[[Apoqliphort]]" monsters, and the only non-[[Pendulum Monster|Pendulum]] "Qli" monsters. Also, this monster is based on the first Qliphah, while "Towers" is based on the last.
