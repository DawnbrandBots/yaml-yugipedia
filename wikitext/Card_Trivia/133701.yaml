title: Card Trivia:Seven Swords Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Alliance]]".
  * This monster's name and [[Level]] (7) reflect the seven types of blades that make up its design, including the two swords it wields in each hand, the pair of ''[[wikipedia:Kama (tool)|kama]]'' blades on its hips, the bladed shoulder guards, and the single longsword on its back. Also, the background includes seven different glowing lines.
  * This monster appears to be an antithesis to "[[Dark Highlander]]".
  ** Both are [[Level 7]] Synchro Monsters.
  ** Both monsters feature effects that center around the usage of [[Equip Card]]s to inflict damage to the opponent; this monster [[support]]s Equip Cards, while "Dark Highlander" [[destroy]]s them.
  ** Both monsters are used by the main rivals of the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga; this monster is used by [[Yusei Fudo (manga)|Yusei Fudo]], while "Dark Highlander" is used by his rival [[Jack Atlas (manga)|Jack Atlas]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|010|ref}}, specifically from the panel showing [[Seven Swords Warrior (manga)|this monster]] being Summoned.
