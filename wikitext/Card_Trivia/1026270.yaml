title: Card Trivia:Gandora-G the Dragon of Destruction
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Legacy of Destruction]]''.
  * This monster appears in the artwork of "[[Ties That Bind]]".
  * This monster is a [[Shining Sarcophagus (series)|Shining Sarcophagus]] [[counterpart]] of "[[Gandora the Dragon of Destruction]]".
  ** The capital English letter "G" in this monster's name stands for ''[[wikipedia:Geas|geas]]'', an obligation or a prohibition magically imposed on someone in Irish folklore.
  *** "Geas" can also refer to "[[Final Geas (anime)|Final Geas]]", a card used by [[Yugi Mutou (manga)|Yugi Muto]] in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'', in which Yugi uses the effect of "[[Gandora-X the Dragon of Demolition (anime)|Gandora-X the Dragon of Demolition]]" to [[destroy]] [[Seto Kaiba (manga)|Seto Kaiba's]] "[[Deep-Eyes White Dragon (anime)|Deep-Eyes White Dragon]]", while the effect of "Deep-Eyes" destroys "Gandora-X", which in turn, allows Yugi to [[activate]] "Final Geas" later that turn.
  * This monster's effect to [[Special Summon]] a [[Level 7]] or lower monster references a scene in {{episode|Yu-Gi-Oh!|218|ref}}, where [[Yugi Muto]] uses the effect of "[[Gandora the Dragon of Destruction (anime)|Gandora the Dragon of Destruction]]" to remove from play all other monsters on the field, then destroy itself after using its effect, which activated the effect of "[[Spirit Sword of Sealing]]" to [[return]] "[[Silent Swordsman LV7 (anime)|Silent Swordsman LV7]]" to the field.
  ** This monster's effect to increase the Summoned monster's [[Level]] also supports this, as it can potentially power up a Summoned "[[Silent Swordsman Zero]]" to match the stats of "Silent Swordsman LV7" in the anime if seven cards are destroyed in this way.
