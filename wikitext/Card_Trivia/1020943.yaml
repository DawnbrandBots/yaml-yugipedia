title: Card Trivia:Ages of Stars and Frost
wikitext: |-
  {{Navigation}}

  * "[[Scareclaw Reichheart]]" and "[[Visas Samsara]]" appear in this card's artwork.
  ** This card's artwork is adapted into a minor scene in ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'', seen from the point of view of "Scareclaw Reichheart".
  * This card's Japanese name, 「幾星霜」 (''Ikuseisō''), is a pun on "(how) many ages". The kanji 「星霜」 (''Seisō'', lit. "Stars and Frost") means "year", derived from the notion of a yearly cycle of moving stars in the sky and falling frost on the earth.
  ** This card's name also references "[[Visas Starfrost]]".
  * This is the first [[Spell Card]] in the ''[[OCG]]''/''[[TCG]]'' that allows a player to conduct their [[Battle Phase]] twice.
