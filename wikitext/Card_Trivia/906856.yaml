  * This monster is an [[Card evolutions|upgraded counterpart]] to "[[Palace Gargoyle]]".
  ** Fittingly, "Palace Gargoyle" appears in this card's artwork.
  ** They are both based on "[[Ryu-Kishin Powered]]", which has the same [[ATK]]/[[DEF]] as this card.
