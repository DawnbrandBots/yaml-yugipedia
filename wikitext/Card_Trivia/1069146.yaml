title: Card Trivia:Flying Mary, the Wandering Ghost Ship
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Ghost ship|ghost ship]], a seafaring vessel with no living crew aboard. The ghost ships are known for wandering the seas adrift, which reflects this monster's base Japanese name, "Wandering Ghost Ship" (彷徨える幽霊船, ''Samayoeru Yūreisen'').
  ** This monster's name is a combination of the names of two well-known ghost ships: the ''[[wikipedia:Flying Dutchman|Flying Dutchman]]'' (a fictional ship with a ghostly crew) and the ''[[wikipedia:Mary Celeste|Mary Celeste]]'' (a real-life ship whose crew mysteriously disappeared).
  * This monster shares similarities with "[[Sea Monster of Theseus]]".
  ** Both are [[WATER]] [[Zombie]] [[Extra Deck]] monsters based on famous ships from European history/mythology.
  ** Both use two monsters of the same type as [[material]]s: this monster requires two Zombie monsters, while "Sea Monster of Theseus" requires two [[Tuner monster]]s.
  ** This monster supports [[Level 5]] and higher Zombie monsters, while "Sea Monster of Theseus" is a Level 5 Zombie monster.
  * While not directly related to its [[Eldlich|corresponding theme]], this monster, "[[Heosvarog the Mechanical Dawn]]", and "[[L Magi Mergy]]" were all announced at the same time<ref>{{cite web | url = https://yu-gi-oh.jp/news_detail.php?page=details&id=1990 | title = Vジャンプ9月特大号掲載記事：第3回　『RAGE OF THE ABYSS（レイジ・オブ・ジ・アビス）』の収録カードを公開！② | publisher = YU-GI-OH.jp {{icon|jp}} | accessdate = July 10, 2024 | archive-url = https://web.archive.org/web/20240709040836/https://yu-gi-oh.jp/news_detail.php?page=details&id=1990 | archive-date = July 9, 2024}}</ref> and support the Types and strategies featured in the first three [[Tactical-Try Deck]]s.

