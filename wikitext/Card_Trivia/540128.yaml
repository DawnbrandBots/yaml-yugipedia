title: Card Trivia:Nine-Tailed Fox
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:kitsune|kyūbi no kitsune]]'', a nine-tailed fox ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore who gains supernatural powers based on the number of tails it has, with nine being the highest and most commonly depicted.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|017|ref}}, specifically from the panel showing [[Nine-Tailed Fox (manga)|this monster]] being Summoned.
