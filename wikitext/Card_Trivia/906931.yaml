title: Card Trivia:Kuribot
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Kuribotriple]]", "[[Siesta Hold]]", and "[[Widening Whisper]]".
  ** This monster's second and fifth artworks are based on the second and third copies of this monster that appear in the artwork of "Kuribotriple".
  * This monster appears to be a mechanical [[counterpart]] of "[[Sphere Kuriboh]]" with the number "7" on its face, referencing how it debuted in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
  * This monster has an two [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] forms: 
  ** "[[Kuribotorero]]" (with "[[Siesta Torero]])".
  ** "[[Bikuribot]]" (with another copy of itself).
  * This is the first monster related to "[[Kuriboh]]" to be played in multiple copies by its owner in the anime and manga. In this monster's case, it was used by [[Yuga Ohdo]] in the ''Yu-Gi-Oh! SEVENS'' anime.
