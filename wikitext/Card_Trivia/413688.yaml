title: Card Trivia:Super Quantum Red Layer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Layer 19 "Sudden Incursion! Super Quantum Black!!"]]", "[[Super Quantal Alphan Spike]]", and "[[Super Quantal Alphancall Appeal]]".
  * This monster is based on the archetypal Red Ranger featured in the ''[[wikipedia:Super Sentai|Super Sentai]]'' and ''[[wikipedia:Mighty Morphin Power Rangers|Power Rangers]]'' franchises. Fittingly, this monster's [[Attribute]] is [[FIRE]], which is represented by a red-colored circle.
