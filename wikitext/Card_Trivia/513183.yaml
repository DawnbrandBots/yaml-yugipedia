title: Card Trivia:Shine Palace
wikitext: |-
  {{Navigation}}

  * "[[Toon World]]" appears in this card's artwork.
  ** "[[Dark Rabbit]]" appears on the front cover of "Toon World". Fittingly, in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, when [[Maximillion J. Pegasus (manga)|Pegasus]] uses this card on "[[Blue-Eyes Toon Dragon (manga)|Blue-Eyes Toon Dragon]]", "[[Dark Rabbit (manga)|Dark Rabbit]]" is hidden inside "[[Toon World (manga)|Toon World]]".
  * This card appears in the artwork of "[[Toon Page-Flip]]".
  * This card is the [[LIGHT]] [[counterpart]] of "[[Fiend Castle]]", another page in "Toon World".
  * In several video games, this card's text incorrectly states that it increases the ATK of all LIGHT monsters by 700, rather than only the equipped monster; however, the effect still functions correctly.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|110|ref}}, specifically from the panel where [[Shine Palace (manga)|this card]] is activated.
