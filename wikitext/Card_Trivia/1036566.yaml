title: Card Trivia:Metaltronus
wikitext: |-
  {{Navigation}}

  * "[[Ritual Beast Ulti-Reirautari]]" and "[[Zefra Metaltron]]" appear in this card's artwork.
  ** Ironically, neither of the aforementioned monsters can be [[Special Summon]]ed by this card's effect by [[target]]ing the other, as they do not share their [[Type]], [[Attribute]], or [[original ATK]]. However, "[[Ritual Beast Ulti-Nochiudrago]]" (the base form of "Ritual Beast Ulti-Reirautari") does have the same Type and Attribute as "Zefra Metaltron", thus being a valid monster to Special Summon by targeting it and viceversa.
  *** This might imply that this card's artwork depicts "Ritual Beast Ulti-Nochiudrago" transforming into "Ritual Beast Ulti-Reirautari" by drawing spiritual power from "Zefra Metaltron", a connection further supported by the following symmetry: in the artwork of "Ulti-Reirautari", "[[Spiritual Beast Tamer Lara]]" has wings similar to those of "Sophia, Goddess of Rebirth (which the "[[Zefra]]" [[archetype]] is based on), while in its own artwork, "Zefra Metaltron" wields a staff similar to that "[[Ritual Beast Tamer Zefrawendi]]" (which appears in the artwork of "Ulti-Reirautari").
