title: Card Trivia:Suijin
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is derived from [[wikipedia:Suijin|Suijin]] (水神), the Shinto god of water in Japanese mythology.
  * The kanji on this monster's body (水) translates to "water", reflecting this its [[WATER]] [[Attribute]] and [[Aqua]] [[Type]].
  * This monster is one of the components of "[[Gate Guardian]]" which makes up the abdomen and legs.
  ** It is the second largest piece of "Gate Guardian", with this monster's [[ATK]] being exactly 100 less than "[[Sanga of the Thunder]]" and 100 more than "[[Kazejin]]".
  * The [[Suijin (Bandai)|Bandai]] version of this card is a [[Level]] 6 "[[Black Magic]]" monster (which can be considered a [[DARK]] [[Spellcaster]]), whereas the [[Konami]] version is [[Level]] 7 and a WATER/Aqua monster.
  * This monster has the most design variations of all the "Gate Guardian" pieces.
  ** In this card's artwork and in different video games, this monster is depicted as a disembodied head and spindly arms covered by a purple or dark bluish cloak. This is a close duplication of the manga artwork's design, though the original artwork was ambiguous as to whether the substance surrounding it was cloth or water. 
  ** In the manga and [[Bandai's Official Card Game|Bandai]] depictions, this monster's eyes were empty crescent shapes, had a sharp looking jaw and no orb in its mouth.
  ** In the depictions of "Gate Guardian" and in the ''[[Yu-Gi-Oh! GX]]'' anime, this monster is depicted as a pair of monstrous blue legs and a pelvis, with its head placed on the crotch area. Notably, its head is different between the two forms, as an independent monster, its jaw is more curved, as a "Gate Guardian" component, it is squarish. 
  ** In the ''[[Yu-Gi-Oh! Duel Links]]'' Summoning animation for "Gate Guardian", this monster floats in the air like the other two pieces and the legs were arms until it fused into "Gate Guardian". This may be a reference to its own card art design.
  ** In the ''Yu-Gi-Oh! GX'' anime and the aforementioned ''Duel Links''  Summoning animation, this monster's head was more light blue when compared to the body. In all other depictions, its head is the same color as the legs.
  ** In the artworks of "[[Gate Guardian of Wind and Water]]", "[[Gate Guardian of Water and Thunder]]", and "[[Gate Guardians Combined]]", this monster's head is depicted a lot bigger than it was in previous depictions.
