title: Card Trivia:Dogmatika Ashiyan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dogmatika Genesis]]", "[[Dogmatikacism]]", "[[Tri-Brigade Stand-Off]]", and "[[Tri-Brigade Revolt]]".
  * This monster is based on the [[wikipedia:Order of Assassins|Order of Assassins]]. ''Ḥashashiyan'' is the Persian root word for "Assassin".
  * This monster has a "[[Despia]]" form, corrupted by the power of the Hole: "[[Ad Libitum of Despia]]".
  * "[[Dogmatika Maximus]]" (who was "[[Dogmatika Alba Zoa]]" at the time) calls this monster his "other half" during the climax of the Abyss storyline. It's unknown if it simply means "Ashyiyan" used to be "Maximus's" right-hand man or if "Ashiyan" is literally a cast off portion of "Maximus". The fact "Maximus" similarly refers to "[[Aluber the Jester of Despia]]" as "[[Albaz|that guy's]] other half" may hint at the latter.
  * This monster's weapons are a pair of oversized [[wikipedia:Tekko|Tekkō-kagi]]. [[wikia:w:c:streetfighter.fandom:Vega|Vega]] from ''[[wikipedia:Street Fighter|Street Fighter]]'' also wears a white mask and wields an oversized variation of this weapon. The two also serve dictator figures with megalomaniacal personalities.
