title: Card Trivia:Hypernova Burst
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a homophone for the Japanese word for "[[wikipedia:Superluminous supernova|superluminous supernova]]." However, the "supernova" part (新星 ''shinsei'', lit. "new star") has been replaced with 「辰醒」, which can be roughly translated as "Dragon Awakening" ("Dragon" referring to [[wikipedia:Dragon (zodiac)|the Chinese zodiac animal]] rather than the creature itself).
