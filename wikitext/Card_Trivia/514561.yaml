title: Card Trivia:Magic Triangle of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * "[[General Gantala of the Ice Barrier]]", "[[General Grunard of the Ice Barrier]]" and "[[General Raiho of the Ice Barrier]]" are featured on this card's artwork.
  * At the time of release in the [[TCG]], this card was impossible to play; only two [[Legal]] "[[Ice Barrier]]" monsters could be in the hand, "[[Cryomancer of the Ice Barrier]]" and "[[Blizzed, Defender of the Ice Barrier]]".
  * The artwork appears to depict the final seal being unleashed to release "[[Trishula, Dragon of the Ice Barrier]]" at the end of the Duel Terminal war.
