title: Card Trivia:Chemicalized Salamander
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Requiem of Destruction!!]]''.
  * This monster appears in the artworks of "[[Chemicalize Ignition]]", "[[Chemicalizing Impact]]", and "[[Maximum Flare Fusion]]".
  * This monster is based on the mythical [[wikipedia:Cultural depictions of salamanders|salamander]], a lizard-like creature associated with the [[wikipedia:Fire (classical element)|classical element of fire]].
  * This is the [[signature card]] of [[Maddox Sogetsu]] (and his [[Manabu Sogetsu (manga)|manga counterpart]]) in the ''Yu-Gi-Oh! GO RUSH!!'' [[Yu-Gi-Oh! GO RUSH!!|anime]] and [[Yu-Gi-Oh! GO RUSH!! (manga)|manga]].
