title: Card Trivia:Boycotton
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of "boycott" and "cotton".
  ** To "boycott" means to refuse to cooperate with or participate in something; this card's artwork depicts this monster refusing to have its coat shaved off.
  *** This is also reflected in this card's effects to have its controller take any damage from battles involving this card, then return itself to the hand after the battle.
  ** "[[wikipedia:Cotton|cotton]]" is a product made from a plant of the genus ''[[wikipedia:Gossypium|gossypium]]'', which grows soft, fluffy fiber around the seeds it produces as a form of protective casing; this is reflected in this card's [[Plant]] [[Type]].
  *** This monster is based on a [[wikipedia:Sheep|sheep]], a domesticated farm animal whose [[wikipedia:Wool|wool]] coat has a similar appearance to cotton.
