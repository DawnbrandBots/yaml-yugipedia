title: Card Trivia:Mermaid Archer
wikitext: |-
  {{Navigation}}

  * This card's effect simulates a reversal of a [[Union monster]]'s effect, which typically strengthens the [[equip]]ped monster and prevents it from being destroyed by battle; however, this card does not receive the support that a Union monster would be entitled to (such as "[[Roll Out!]]").
  ** To snowball this, like "[[Power Tool Dragon]]", this card has the reverse effect of Union monsters, in that it can destroy an [[Equip Card]] to prevent itself from being destroyed, as Union monsters destroy themselves to protect the equipped monster.
  * This card is thematically similar to "[[Red Archery Girl]]".
  * This card, "[[Mermail Abysstrite]]", "[[Guardian Kay'est]]", and members of the "[[Deep Sea]]" [[archetype]] (except for "[[Deep Sea Artisan]]" and "[[Deep Sea Sentry]]") are the only mermaid-based [[Sea Serpent]]-[[Type]] monsters, whereas all other mermaid-based monsters are either [[Fish]] or [[Aqua]]-Type monsters.
