title: Card Trivia:Time-Space Trap Hole
wikitext: |-
  {{Navigation}}

  * This card was designed to counter [[Pendulum Summon]]s.
  ** As such, this card's name and artwork are a reference to the first two [[Pendulum Monster]]s revealed: "[[Timegazer Magician]]" ([[wikipedia:Time|Time]]) and "[[Stargazer Magician]]" ([[wikipedia:Space|Space]]).
