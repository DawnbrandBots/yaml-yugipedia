title: Card Trivia:Orichalcum Mirage
wikitext: |-
  {{Navigation|mode=nongame}}

  * Multiple "[[Chronomaly Crystal Chrononaut]]s" appear in this card's artwork.
  * The arrangement in this card's artwork appears in the artwork of "[[Chronomaly Technology]]".
  * This card is named after [[wikipedia:Orihalcum|orichalcum]], a fictional metal featured in several ancient writings, including the story of [[Atlantis]] written in [[wikipedia:Plato|Plato's]] dialogue, ''[[wikipedia:Critias (dialogue)|Critias]]''.
