title: Card Trivia:Ritual of Grace
wikitext: |-
  {{Navigation}}

  * This was the first [[Ritual Spell Card]] to have an effect besides [[Ritual Summon]]ing a [[Ritual Monster]].
  * This is the only card which has "un-targetable" written on its card text.
  * This card's artwork appears to feature a portion of the hat and skirt of "[[Divine Grace - Northwemko]]".
