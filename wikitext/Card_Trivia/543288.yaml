title: Card Trivia:Transformation
wikitext: |-
  {{Navigation}}

  * This card references the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise, where the heroes transform into their power suits while shouting "Transform!"
  ** Fittingly, in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, when [[Syrus Truesdale (manga)|Syrus Truesdale]] [[activate]]d this card, he is [[equip]]ped with a set of armor based on the "[[Blue-Eyes White Dragon]]".
  * This card shares similarities with "[[Power Bond]]", a card used in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Both cards are given to [[Syrus Truesdale]] by his brother, [[Zane Truesdale|Zane]] during their childhood.
  ** Both cards feature a powerful effect and a severe drawback, which deals damage to the player equal to a monster's [[ATK]].
