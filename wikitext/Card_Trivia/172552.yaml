title: Card Trivia:Bug Switch
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Crashbug X]]", "[[Crashbug Y]]", "[[Crashbug Z]]" and "[[Super Crashbug]]" appear in this card's artwork.
  * This card is similar to "[[Delta Reactor]]", a card related to the "[[Reactor]]" [[archetype]] which can [[Special Summon]] the archetype's boss monster.
