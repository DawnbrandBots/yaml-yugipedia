title: Card Trivia:Ice Pop Bear
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[JAM:P Check!]]", "[[JAM:P Set!]]", and "[[JAM:P Start!]]", as well as in both artworks of "[[JAM:P Catch!]]".
  ** A purple version of this monster appears in the artwork of "[[CAN - Melo:D]]".
  * This monster's Japanese name, "AI Bear Can" (エーアイくまキャン, ''Ē Ai Kuma Kyan'') features multiple puns.
  ** The first portion of this monster's name is a pun on the Japanese word for "demon" (悪魔, ''Akuma''), reflecting how its effect [[mention]]s "[[Ama Lilith]]", which is based on the demon [[wikipedia:Lilith|Lilith]].
  ** This second portion of this monster's name features the word "Can", reflecting how its effect mentions "[[CAN:D]]", who also appears along with this monster in the artworks of the aforementioned [[JAM]] [[Spell Card]]s.
  *** Fittingly, the aforementioned monsters can be [[Special Summon]]ed with this monster's effect, which can be used to [[Fusion Summon]] either "[[Amabear Lilith]]" (with "Ama Lilith") or "[[CAN:D ALL]]" (with "CAN:D").

