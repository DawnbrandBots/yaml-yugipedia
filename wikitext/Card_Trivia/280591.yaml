title: Card Trivia:Deep-Space Cruiser IX
wikitext: |-
  {{Navigation}}

  * This monster is likely inspired by [[wikipedia:Deep Space Nine (fictional space station)|Deep Space Nine]], a fictional space station featured in ''[[wikipedia:Star Trek: Deep Space Nine|Star Trek: Deep Space Nine]]''.
  ** This monster's [[Level]] (9) and [[Equal ATK and DEF|equal]] [[original ATK and DEF]] (900/900) reflect its motif surrounding the number "9"; also, in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster was used to [[Xyz Summon]] "[[Number 9: Dyson Sphere]]", a [[Rank 9]] monster.
  ** The three arcs attached to pylons even resemble the profile of the eponymous station, a few concentric rings with three long and curved pylons extending both up and down from equidistant points of the outermost ring.
