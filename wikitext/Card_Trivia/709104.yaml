title: Card Trivia:Magikey Locking
wikitext: |-
  {{Navigation}}

  * "[[Clavkiys, the Magikey Skyblaster]]" and "[[Magikey Maftea]]" appear in this card's artwork.
  ** This card's artwork appears to show "[[Magikey Fiend - Transfurlmine]]" transforming back into "Clavis".
  * This card's artwork appears to continue the events of "[[Magikey Battle]]".
  ** The decaying gray monster in this card's artwork also appears in the artwork of "Magikey Battle".
