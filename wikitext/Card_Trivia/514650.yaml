title: Card Trivia:Infernity Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Infernity Launcher]]" and "[[Wave-Motion Inferno]]".
  ** This monster's attacking hand appears in the artwork of "[[Infernity Paranoia]]".
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster]] counterpart: "[[Infernity Doom Archfiend]]".
  * This is one of the few [[Fiend|demonic]]-like monsters to not have its horns removed in the ''[[TCG]]''.
