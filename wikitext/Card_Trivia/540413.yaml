title: Card Trivia:Goddess Urd's Verdict
wikitext: |-
  {{Navigation}}

  * '''[[wikipedia:Urd (Norn)|Urd]]''', in Norse mythology is one of the three [[wikipedia:Norn|Norns]] along with [[Goddess Skuld's Oracle|Skuld]] and [[Goddess Verdandi's Guidance|Verandi]].
  * Her name means "that which has become" and is related to the English word "weird".
  * She is also a character in ''[[wikipedia:Der Ring des Nibelungen|Der Ring des Nibelungen]]'' written by [[wikipedia:Richard Wagner|Richard Wagner]].
  * She resembles [[wikipedia:Sailor Uranus|Sailor Uranus]] from ''[[wikipedia:Sailor Moon|Sailor Moon]]''.
