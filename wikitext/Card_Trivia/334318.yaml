title: Card Trivia:Bi'an, Earth of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Yang Zing Creation]]".

  * This monster is based on [[wikipedia:zh:狴犴|Bì'àn]] (Chinese: 狴犴 ''bì'àn''), one of the [[wikipedia:Nine sons of the dragon|nine sons]] of the [[wikipedia:Dragon King|Dragon King]] who is depicted as a hybrid of a dragon and a tiger.
  ** According to Chinese mythology, Bì'àn is associated with legal action and is historically placed over prison gates to keep guard.
