title: Card Trivia:The Last Warrior from Another Planet
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the box of ''[[Duelist Legacy Volume.3]]''.
  * This monster's effect to [[destroy]] its controller's other [[monster]]s if it is [[Special Summon]]ed reflects its name, as the lone survivor among other monsters who are all wiped out.
  ** This monster's effect to prevent either player from Summoning monsters also represents its isolation as the "last warrior".
