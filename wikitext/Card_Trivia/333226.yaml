title: Card Trivia:Phantom Gryphon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gryphon Wing]]".
  ** This monster was released nearly 15 years after the release of "Gryphon Wing" in the Japanese ''[[OCG]]''.
  * This monster is based on the [[wikipedia:Griffin|gryphon]], a creature in [[wikipedia:European mythology|European mythology]] who is depicted as a hybrid of a lion and an eagle, and is often used as a [[wikipedia:Heraldry|heraldry]] [[wikipedia:Charge (heraldry)|charge]].
  * This monster's [[flavor text]] indicating a rivalry with "[[Harpie]]s" is referenced in the effects of "Gryphon Wing" and "[[Gryphon's Feather Duster]]". The former specifically negates "[[Harpie's Feather Duster]]", while the latter's effect is the opposite of "Harpie's Feather Duster".
  * [[Phantom Gryphon (character)|A characterized version]] of this monster appeared as a [[Duel Monster Spirits|Duel Spirit]] in the anime more than ten years before it was released, first appearing in {{episode|Yu-Gi-Oh!|147|ref}}.

