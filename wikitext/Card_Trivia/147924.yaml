title: Card Trivia:Meklord Astro Mekanikle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Meklord Emperor Creation]]".

  * This monster is the combination of the three "[[Meklord Emperor]]s", referencing how the owners of each "Meklord Emperor", [[Primo]], [[Lester]], and [[Jakob]], all combined into the single android entity, [[Aporia]].
  ** Despite the above-mentioned fact, this monster resembles "[[Meklord Emperor Wisel]]" the most, with the white color scheme, humanoid shape, and very similar legs.
  ** This monster, along with the three "Meklord Emperors", are the only monster to feature the infinity symbol in their Japanese ''[[OCG]]'' names.
  *** This monster's Japanese anime name, "Machine Imperial God Machinicle Infinity Cubic" (機皇神マシニクル∞³) references how the three cores of the "Meklord Emperors", "[[Wise Core]]", "[[Sky Core]]", and "[[Grand Core]]", were required to [[activate]] "Meklord Emperor Creation" and [[Special Summon]] this monster.
  **** This monster's Japanese anime name is the only card to be printed with an [[wikipedia:Exponent|exponent]], a mathematical symbol representing the number of times to use that number in a multiplication equation.
  *** For unknown reasons, despite this monster's Japanese anime name featuring the word "Cubic" in its name, it is omitted in its Japanese ''OCG'' name.
  ** This monster's appearance is a combination of the visual parts from the three "Meklord Emperors": its right arm resembles a combination of "[[Granel Guard]]" and "[[Wisel Guard]]"; its left arm resembles to "[[Skiel Attack 5]]" when connected; its head resembles "[[Granel Top]]" when connected; and its legs resemble those of "[[Wisel Carrier]]".

  * This monster's ''[[TCG]]'' name is a corruption of the word "mechanical".

  * This monster is the only "[[Meklord Astro]]" monster to be a [[LIGHT]] monster.

  * This is the first "[[Meklord]]" monster not part of the "[[Meklord Emperor]]" sub-[[archetype]] to feature the effect of absorbing [[Synchro Monster]]s.

  * According to its written text in the ''[[Yu-Gi-Oh! 5D's]]'' anime, this is the only [[Level 12]] monster ever shown to not have any type of [[Summoning condition]]. This is utilized when Aporia Special Summons it by using "[[Chaos Infinity (anime)|Chaos Infinity]]". As such, it is also the only Level 12 monster that can be [[Normal Summon]]ed in the anime.

  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster's attack uses the same sound effect for the attack of "[[Meklord Emperor Granel (anime)|Meklord Emperor Granel]]".
  * This is the [[signature card]] of Aporia in the ''Yu-Gi-Oh! 5D's'' anime.
