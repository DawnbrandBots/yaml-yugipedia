title: Card Trivia:Destined Rivals
wikitext: |-
  {{Navigation}}

  * "[[Blue-Eyes White Dragon]]" and "[[Dark Magician]]" appear in this card's artwork, with their poses taken from {{chapter|Yu-Gi-Oh!|335|ref}}.
  ** The former's pose is taken from the panel depicting [[The White Dragon (manga)|The White Dragon]] ''[[ka]]'' fully manifested from its [[stone slab]], albeit with some notable differences, such as its pose being mirrored (horizontally) and slightly rotated, the addition of its "Reign of Destruction" attack, and the positioning of its claws and wings.
  ** The latter's pose is taken from the panel depicting [[Mahado (manga)|Mahado]] (as his ''ka'') launching his attack at Blue-Eyes White Dragon's stone slab, albeit rotated upright.
  * This card's name is likely a reference to {{chapter|Yu-Gi-Oh!|257|ref}}, when [[Dark Yugi (manga)|Dark Yugi]] and [[Seto Kaiba (manga)|Seto Kaiba]] witness a memory of their battle more than 3000 years ago.

