title: Card Trivia:Ancient Leaf
wikitext: |-
  {{Navigation}}

  * The leaves depicted in this card's artwork resemble the wings of "[[Ancient Fairy Dragon]]".
  ** This card was also featured in the same pack as "Ancient Fairy Dragon", ''[[Ancient Prophecy]]''.
  ** Moreover and fittingly here, this card could be used with "Ancient Fairy Dragon": provided that its [[control]]ler [[LP]] are not less than 8000, using the effect of "Ancient Fairy Dragon" to destroy a [[Field Spell Card]] would give them 9000 LP, fulfilling the [[activation requirement]] of this card.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Ancient Leaf]]".
