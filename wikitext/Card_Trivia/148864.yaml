title: Card Trivia:Fleur de Vertiges
wikitext: |-
  {{Navigation}}

  * This card's name means "Flower(s) of [[wikipedia:Vertigo|Vertigo]]" in French.
  * This card's video game effect [[activation condition]] requiring a [[Field Spell Card]] to be on the [[field]] is an addition to its activation condition in the ''[[Yu-Gi-Oh! 5D's]]'' anime, when a monster(s) is [[Special Summon]]ed to the opponent's [[field]]. In {{episode|5D's|139|ref}}, this card was [[activate]]d while the Field Spell Card "[[Ecole de Zone (anime)|Ecole de Zone]]" was on the field.
