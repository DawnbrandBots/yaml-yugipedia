title: Card Trivia:Constellar Ptolemy M7
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Duelist Set: Version Lightning Star]]'', as well as one of the cover cards of ''[[Duelist Set DX: Double Union]]''.
  * This monster appears in the artworks of "[[Constellar Belt]]", "[[Infestation Terminus]]", "[[Xyz Soul]]" and "[[Xyz Universe]]".
  * This monster's name is based on the [[wikipedia:Messier 7|Messier 7]], a star cluster also known as the "Ptolemy Cluster", located in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Scorpius (constellation)|Scorpius]], which appears in the background of this card's artwork.
  * This monster's armor is a combination of the armor of the following [[Main Deck]] "[[Constellar]]" monsters:
  ** "[[Constellar Antares]]": Its four metallic limbs are located on this monster's midsection plate, its floating claws are located beside this monster's shoulder pauldrons, and its stinger weapon serves as this monster's tail.
  ** "[[Constellar Aldebaran]]": Its bull-horned helmet make up a portion of this monster's midsection plate located just underneath the "Constellar" crest at the chest area.
  ** "[[Constellar Alrescha]]": Its gill-like shoulder pauldrons serve as this monster's shoulder pauldrons.
  ** "[[Constellar Virgo]]": Its mechanical wings are located at the thigh sections of this monster's rear hind legs.
