title: Card Trivia:Gagaga Sister
wikitext: |-
  {{Navigation}}

  * This card is the female equivalent of "[[Gagaga Child]]".
  * Given that "Gagaga Sister" has blonde hair like "[[Gagaga Girl]]", it is possible that the two monsters are siblings. This would help explain its name: "Gagaga ''Sister''".
  ** Another hint to this is the pink ribbon and skull accessory "Gagaga Sister" wears - "Gagaga Girl" also wears a pink ribbon on her back and has a cellphone with a skull accessory on it.
  * This card is the only [[Spellcaster]]-[[Type]] "[[Gagaga]]" monster to not have chains incorporated into its outfit.
