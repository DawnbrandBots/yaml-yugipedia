title: Card Trivia:Energy Drain (DM)
wikitext: |-
  {{Navigation|mode=nonGame|Energy Drain}}

  * This card's English name is similar to that of the [[Trap Card]] "[[Energy Drain]]" released in the [[Core Booster|Core]] [[Booster pack]], ''[[Invasion of Chaos]]''.
  ** Despite this, both cards' Japanese names are differentiated by the presence of the Japanese punctuation mark "・" used for spaces in transcriptions.
  * This card's international artwork resembles the anime artwork of "[[Silent Doom]]".
