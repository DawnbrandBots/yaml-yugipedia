title: Card Trivia:Armityle the Chaos Phantasm
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Limited Edition 10: Chaos Black]]'' and ''[[Creation Pack 03]]''.
  * This monster appears in the artworks of "[[Dimension Fusion Destruction]]" and "[[Rainbow Bridge of Salvation]]".
  * This monster is named after Amatiel, one of the angels of the spring in [[wikipedia:Pietro d'Abano|Pietro d'Abano's]] grimoire, ''[http://www.esotericarchives.com/solomon/heptamer.htm Heptameron]''.
  * This monster has a [[signature move]] counterpart: "[[Armityle the Chaos Phantasm - Phantom of Fury]]".
  * This monster is the [[Sacred Beast]] counterpart of "[[Holactie the Creator of Light]]".
  * This monster, "[[Armed Dragon Thunder LV10]]", "[[Numeron Chaos Ritual]]", and "[[Ten Thousand Dragon]]" are the only cards that refer to an [[ATK]] with 5 digits (10,000 ATK).
  * This monster's effect to gain 10,000 ATK may reference the combined total ATK of the three Sacred Beasts (10000) during the scene they were all first assembled in {{episode|GX|049|ref}}, with "[[Hamon, Lord of Striking Thunder (anime)|Hamon, Lord of Striking Thunder]]" and "[[Raviel, Lord of Phantasms (anime)|Raviel, Lord of Phantasms]]" each having 4000 ATK/DEF, while "[[Uria, Lord of Searing Flames (anime)|Uria, Lord of Searing Flames]]" had 2000 ATK/DEF via its effect.
