title: Card Trivia:Pikeru's Circle of Enchantment
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" and "[[White Magician Pikeru]]" and appears in this card's artwork.
  * This card's effect is most likely a reaction to the effect of "[[Ebon Magician Curran]]" to inflict 300 damage to the opponent for each monster they [[control]].
  * This is one of two cards in the ''[[TCG]]'' to feature an error in its effect text where the number "0" is written as the English letter "O", with the other being "[[Spirit Barrier]]".
