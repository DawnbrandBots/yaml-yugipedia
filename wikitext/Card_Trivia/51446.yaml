title: Card Trivia:Phantom Beast Wild-Horn
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gouki Grit]]" and "[[Shadow Dance]]".
  ** This monster's horns appear in the artwork of "[[Horn of the Phantom Beast]]".
  * This monster is based on an [[wikipedia:Alaskan moose|Alaskan moose]], the largest subspecies of [[wikipedia:Moose|moose]].
  * Since the "[[Phantom Beast]]" [[Beast-Warrior]] monsters are based on the "[[White Knight]]" [[archetype]] due to sharing similar effects, this monster's effect is based on that of "[[White Knight Lancer]]".
