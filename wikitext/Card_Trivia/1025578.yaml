title: Card Trivia:Supreme King Z-ARC - Synchro Universe
wikitext: |-
  {{Navigation}}

  * "[[Supreme King Dragon Clear Wing]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ARC-V|138|ref}} where [[Z-ARC]] controls both "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]" and "[[Supreme King Dragon Clear Wing (anime)|Supreme King Dragon Clear Wing]]".
  * This monster is the [[Synchro Pendulum Monster|Synchro Pendulum]] form of "[[Supreme King Z-ARC]]".
  ** Its name references the [[Synchro Dimension]], one of the [[Four Dimensions]] which prominently uses [[Synchro Monster]]s in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** Its Synchro Monster property and effect of changing its card name to "Supreme King Z-ARC" references how "Supreme King Z-ARC" is also treated as a Synchro Monster in the anime.
  ** Its [[Pendulum Effect]] is based on the anime Pendulum Effect of "Supreme King Z-ARC", while its [[monster effect]] to [[Special Summon]] up to two "[[Supreme King Dragon]]" monsters in [[Defense Position]] when it destroys a monster by battle is based on the anime monster effect of "Supreme King Z-ARC".
  *** Its effect to place it in the [[Pendulum Zone]] when it is destroyed is based on the final ''[[OCG]]''/''[[TCG]]'' monster effect of "Supreme King Z-ARC".
  * This is the first [[Level 12]] Synchro Pendulum Monster.

