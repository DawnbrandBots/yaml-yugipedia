title: Card Trivia:Brain Control
wikitext: |-
  {{Navigation}}

  * The hands and brain in this card's artwork appear in the artwork of "[[Brain Reboot]]".
  * This card has a [[Monster Card|Monster]] counterpart: "[[Brain Controller]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Brain Control]]".
  * In the [[wikipedia:Nintendo DS|Nintendo DS]] and [[wikipedia:PlayStation Portable|PlayStation Portable]] ''[[Yu-Gi-Oh!]]'' video games, a smaller version of this card's artwork is used as a reference icon for all cards that allow the user to switch [[control]] of a monster on the [[field]].
