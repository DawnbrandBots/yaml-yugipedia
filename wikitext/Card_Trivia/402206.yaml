title: Card Trivia:Abyss Actor - Extras
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abyss Actors' Curtain Call]]", "[[Abyss Actors' Dress Rehearsal]]", and "[[Abyss Playhouse - Fantastic Theater]]".
  * This card's name is based on [[wikipedia:extra (acting)|extra]], a term used in [[wikipedia:acting|acting]] to describe a background actor who appears in a nonspeaking capacity.
  ** This is reflected in this card's [[Pendulum Effect]] by moving from the [[Pendulum Zone]] to the [[Monster Zone]], as well as its ''[[OCG]]''/''[[TCG]]'' [[Monster Effect]] of [[Tribute|Tributing]] itself to recruit a another "[[Abyss Actor]]" into the Pendulum Zone, essentially leaving the stage to give a main character the limelight.
