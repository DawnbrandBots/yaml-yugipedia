  * This monster is based on the [[wikipedia:Cockatrice|Cockatrice]], a two-legged dragon-like creature with the head of a rooster.
  * The imp-like creature in this card's artwork goes by the name '''Lust''' according to the [[Duel Terminal]] Master Guide.
