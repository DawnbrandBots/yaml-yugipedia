title: Card Trivia:Stormridership Stolastorm
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's name is based on [[wikipedia:List of demons in the Ars Goetia|Stolas]], a Great Prince of Hell, usually depicted as being a crowned [[wikipedia:Owl|owl]] with long legs, hence the owl head at the front of this monster.
