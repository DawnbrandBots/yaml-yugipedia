title: Card Trivia:Hieracosphinx
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Hieracosphinx|hieracosphinx]], a creature in [[wikipedia:Egyptian mythology|Egyptian mythology]] who is depicted with the head of a falcon and the body of a lion.
  * This monster has a defensive [[counterpart]]: "[[Criosphinx]]".
  ** Both share the same [[Attribute]] ([[EARTH]]), [[Level]] (6), and [[Type]] ([[Rock]]), and have an inverted [[original ATK and DEF]] (2400/1200).
