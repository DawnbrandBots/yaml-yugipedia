title: Card Trivia:Terrorking Salmon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Castle Link]]", "[[Double Hooking]]", and "[[Grappler Angler]]".
  * This card's name is a pun on the name of the [[wikipedia:Chinook salmon|king salmon]].
  ** This monster has the necessary stats to benefit from "[[Monarch]]" support, enhancing the pun. 
  * This card and "[[Terrorking Archfiend]]" share the same title, "Terrorking" (ジェノサイドキング "Genocide King").
  ** "[[Infernalqueen Salmon]]" (a reference to "[[Infernalqueen Archfiend]]") and the "[[Vilepawn Salmon Token]]s" it Summons (a reference to "[[Vilepawn Archfiend]]") continue this trend.
  * Though this monster appears as [[Terrorking Salmon (character)|an opponent]] in ''[[Yu-Gi-Oh! 5D's World Championship 2011: Over the Nexus]]'', the card itself is absent from the game.
  * Despite this card's ''[[TCG]]'' [[flavor text]] mentioning the World of Darkness, the original Japanese text directly mentions the [[Dark World]].
  ** This creates an interesting parallel with "[[Mad Lobster]]", whose original Japanese text says it is a delicacy in all over the world, while its English text says it is a delicacy in the Dark World.
