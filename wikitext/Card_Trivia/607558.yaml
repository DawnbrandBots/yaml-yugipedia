title: Card Trivia:Borreload Furious Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[Fusion Monster|Fusion]] [[counterpart]] of "[[Borreload Dragon]]".
  ** The "F" in this monster's Japanese name and its purple color scheme further reference its Fusion Monster [[card type]].
  * This monster has a counterpart: "[[Borreload Fatalflare Dragon]]".
  * This is the only "[[Borrel]]" monster used by [[Yusaku Fujiki]] instead of [[Roken Kogami]].
  * This is the last Fusion Monster to be [[Fusion Summon]]ed in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
