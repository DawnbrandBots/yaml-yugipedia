title: Card Trivia:Tang the Noodle Ninja
wikitext: |-
  {{Navigation}}

  * This monster's name and hair are based on ''chidjire men'', or "curly noodles".
  * This monster appears in the artworks of "[[The Noodle Art of Flavor Shift]]" and "[[The Noodle Art of Spicery]]".
  * There is a giant pair of chopsticks on the back of this monster.
