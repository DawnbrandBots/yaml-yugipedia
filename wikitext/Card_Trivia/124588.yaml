title: Card Trivia:Dragunity Legionnaire
wikitext: |-
  {{Navigation}}

  * A [[wikipedia:legionnaire|Legionnaire]] refers to a member of a [[wikipedia:legion|legion]], especially the [[wikipedia:French Foreign Legion|French Foreign Legion]]. It was also a term used for soldiers of the [[wikipedia:Roman Legion|Roman Legion]], which may be the origin for this cards name, since a lot of the names for the "Dragunity" monsters seem to be based on Latin terms.
  * This monster appears to be part of "[[Dragunity Knight - Gae Dearg]]".
  * This card's Japanese name is almost  identical to the English name of [[Dragunity Legion Structure Deck|the Structure Deck it appears in]].
