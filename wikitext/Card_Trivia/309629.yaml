title: Card Trivia:Beast-Eyes Pendulum Dragon
wikitext: |-
  {{Navigation}}

  * This card is the only "[[Pendulum Dragon]]" monster whose [[Attribute]] is not [[DARK]].
  * Compared to the other "[[Odd-Eyes]]" monsters, this one does not have a red right eye. Instead, it's yellow/gold and has a beast-like pupil, unlike its left eye which remains green.
  * Each "Pendulum Dragon" [[Fusion Monster]] is Summoned utilizing a [[Type]] of monster [[Yuya Sakaki]] used in his Deck, with this card using [[Beast]] monsters.
  ** Ironically, despite being called "Pendulum Dragon", this card is not a [[Pendulum Monster]], but a Fusion Monster made up of "[[Odd-Eyes Pendulum Dragon]]" and a Beast monster. This makes this card (and its counterparts) differ from the other 'normal' evolutions of the [[Four Dimensional Dragons]], as all of them are of the [[card type]] featured in their name.
  * This card has two counterparts:
  ** A [[Spellcaster]]-based counterpart: "[[Rune-Eyes Pendulum Dragon]]".
  ** A [[Warrior]]-based counterpart: "[[Brave-Eyes Pendulum Dragon]]".
  * This card is the first [[Contact Fusion]] Monster that can also be properly [[Fusion Summon]]ed, as well as the first Contact Fusion Monster that is Summoned by [[Tribute|Tributing]] the [[Fusion Material]]s.
  * This monster's cry is similar to the cry of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]", though in the Duel between Yuya and [[Sylvio Sawatari|Sylvio]] in the [[Arc League Championship]], it adopted the the roar of [[Crimson Dragon]] this time.
