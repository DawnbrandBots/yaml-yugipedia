title: Card Trivia:Mythical Beast Garuda
wikitext: |-
  {{Navigation}}

  * This monster's silhouette appears in the artwork of "[[Mythical Bestiary]]".
  * This monster is based on [[wikipedia:Garuda|Garuda]], a god described as the king of birds in [[wikipedia:Hindu mythology|Hindu mythology]], who is either depicted as a giant bird or as a man with bird features.
  * This monster is a [[Card evolutions|combined]] form of "[[Mythical Beast Jackal]]" and the unknown monster that appears alongside it in the artwork of "Mythical Bestiary".
