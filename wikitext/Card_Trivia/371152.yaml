title: Card Trivia:Metalfoes Silverd
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork for "[[Metalfoes Fusion]]".
  * This monster has two enhanced counterparts, "[[Metalfoes Mithrilium]]" and "[[Heavymetalfoes Electrumite]]".
  * This card's Japanese name is a portmanteau of the katakana words for "silver" (シルバー ''shirubā'') and "bird" (バード ''bādo'').
