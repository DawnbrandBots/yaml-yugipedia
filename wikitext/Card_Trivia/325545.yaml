title: Card Trivia:Contract Laundering
wikitext: |-
  {{Navigation}}

  * The emperor wearing the crown, red robes, and violet mantle from the artworks of "[[D/D Recruits]]", "[[Imperial Custom]]", "[[Imperial Manners]]", "[[Imperial Order]]", "[[Imperial Register]]", "[[Late Penalty]]", and "[[Spell-Stopping Statute]]" appears in this card's artwork, depicted burning the contract depicted in the artwork of "D/D Recruits".
  ** This card's artwork depicts the emperor terminating the contract between himself and another unknown party, in which both parties will receive return benefits, which reflects this card's effect to [[destroy]] all "[[Dark Contract]]" cards in the player's [[Spell & Trap Zone]] and receive benefits in the form of [[draw]]n cards and 1000 [[Life Point]]s for each "Dark Contract" card destroyed.
