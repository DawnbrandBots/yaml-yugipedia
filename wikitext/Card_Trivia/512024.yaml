title: Card Trivia:Dark Gray
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Night Before the Big March]]" and "[[The Big March of Animals]]".
  * This monster has a [[recolored counterpart]]: "[[Ancient One of the Deep Forest]]".
  * Despite this monster's name and [[flavor text]] stating that this monster is "entirely gray", this monster's tail color is green.
