title: Card Trivia:Ritual Beast Ulti-Reirautari
wikitext: |-
  {{Navigation}}

  * "[[Ritual Beast Tamer Zeframpilica]]" and "[[Ritual Beast Tamer Zefrawendi]]" appear in this card's artwork.
  * This monster appears in the artwork of "[[Metaltronus]]".
  * This monster's name is a portmanteau of the [[wikipedia:Ainu language|Ainu]] words ''reira'' (an outdated Japanese transliteration or ''réra'', lit. "wind") and ''utari'' (the possessive form of ''utar'', lit. "friend"/"companion").
  * This monster is an upgraded [[Link Monster|Link]] form of "[[Ritual Beast Ulti-Nochiudrago]]" ("[[Spiritual Beast Tamer Lara]]" and "[[Taotie, Shadow of the Yang Zing]]").
  ** This monster is wearing armor based on "[[Ritual Beast Ulti-Gaiapelio]]", the previous partner of "Lara".
  ** The wings of "Lara" in this card's artwork are very similar to the wings of "[[Sophia, Goddess of Rebirth]]".
  ** This monster has the same [[original ATK]] (2600) as "[[Yazi, Evil of the Yang Zing]]" (another upgraded form of "Taotie"), and this monster's third effect is reminiscent of the second effect of "Yazi", which [[target]]s a card on each players' [[field]]s and [[destroy]]s them.
