title: Card Trivia:Salamangreat Raging Phoenix
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Duelist Pack: Duelists of Explosion]]''/''[[Legendary Duelists: Soulburning Volcano]]'' and ''[[Structure Deck: Salamangreat Sanctum]]''/''[[Structure Deck: Salamangreat Sanctum Transcend Power-Up Pack]]''.
  * Visually, this monster is "[[Salamangreat Pyro Phoenix]]" wearing the armor of "[[Fire Phoenix @Ignister]]".
  ** This monster has the same [[original ATK]] (2800) and [[Link Rating]] (4) as "Pyro Phoenix".
  ** The "[[@Ignister]]" symbol appears on this monster's chest, similar to "Fire Phoenix".
