title: Card Trivia:Goggle Golem
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Unleash Your Power!]]", "[[Gemini Trap Hole]]", and "[[Gemini Spark]]".
  * This card is similar to "[[Dawnbreak Gardna]]", which was also initially released in ''[[Tactical Evolution]]''. "Gardna" gains [[DEF]] when Normal Summoned the second time, while this card gains [[ATK]].
