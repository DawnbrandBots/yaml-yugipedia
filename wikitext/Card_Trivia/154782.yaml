title: Card Trivia:Rainbow Bridge Bifrost
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Bifröst|Bifröst]], a burning rainbow bridge connecting the mortal realm of [[wikipedia:Midgard|Midgard]] and the divine realm of [[wikipedia:Asgard|Asgard]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** The castle-like structure in the sky in this card's artwork likely represents Asgard or [[wikipedia:Valhalla|Valhalla]], while the large tree beneath the rainbow likely represents [[wikipedia:Yggdrasil|Yggdrasil]], the tree that connects the nine realms.
  * This card's ''[[OCG]]''/''[[TCG]]'' [[cost]] to [[banish]] three [[Level 10]] or higher monsters from the [[Extra Deck]] is a reference to the three "[[Aesir]]" monsters used by [[Team Ragnarok]] in the ''[[Yu-Gi-Oh 5D's]]'' anime. In {{episode|5D's|138|ref}}, Team Ragnarok used their card along with their god cards to send [[Team 5D's]] to the [[Divine Temple]].
  ** The additional [[LIGHT]] [[Synchro Monster]] requirement is a reference to how this card's owner, [[Halldor]], is the wielder of "[[Odin, Father of the Aesir (anime)|Odin, Father of the Aesir]]"; while the [[Attribute]] of "Odin" is [[DIVINE]] in the anime, the Attribute of its ''OCG''/''TCG'' version is LIGHT.
