title: Card Trivia:Warm Worm
wikitext: |-
  {{Navigation}}

  * This card may have been intended as the larval stage of "[[Blazewing Butterfly]]"; the backgrounds on the cards are very similar, and the artwork of each monster has a similar style and flavor.
  * This card, "[[Chrysalis Larva]]", "[[Neo-Spacian Flare Scarab]]" and "[[Blazewing Butterfly]]" are the only [[Insect]]-Type [[FIRE]] [[Monster Cards]].
