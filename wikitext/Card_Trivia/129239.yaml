title: Card Trivia:Royal Magical Library
wikitext: |-
  {{Navigation}}
  * In Yu-Gi-Oh! GX, this card's monster form is one of the purple-cloaked magicians in its artwork.
  ** However, its name and 3D appearance in any console games that feature this card, reveal that the real monster is the ''group'' of magicians in the artwork.
  ** Two of these magicians can be seen in the OCG/TCG artwork of this card, and if you look closely, you can see five in its 3D appearance in [[Yu-Gi-Oh! World Championship 2008]].
