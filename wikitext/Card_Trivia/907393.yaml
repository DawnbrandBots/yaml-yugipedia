title: Card Trivia:Transmigration of Curiosity
wikitext: |-
  {{Navigation}}

  * "[[Attron]]", "[[Femtron]]", "[[Yggdrago the Sky Emperor]]" in [[Maximum Mode]] (together with "[[Yggdrago the Sky Emperor (L)|Yggdrago the Sky Emperor [L]]]" and "[[Yggdrago the Sky Emperor (R)|Yggdrago the Sky Emperor [R]]]"), "[[Yoctron]]", and "[[Zeptron]]" appear in this card's artwork.
  ** The pose and shadowed appearance of "Yggdrago" reference the scene in which it was [[Maximum Summon]]ed in [[Yu-Gi-Oh! SEVENS - Episode 023|episode 23]] of the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
  * The yellow shards in this card's artwork are the same as those which appear each time a monster is [[Summon]]ed in the ''Yu-Gi-Oh! SEVENS'' anime.
