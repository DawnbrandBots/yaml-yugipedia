title: Card Trivia:Neo Blue-Eyes Ultimate Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Blue-Eyes Ultimate Dragon]]".
  ** Visually, this monster appears to be the fusion of three "[[Blue-Eyes Alternative White Dragon]]s", the retrained counterpart of "Blue-Eyes Ultimate Dragon's" [[material]], "[[Blue-Eyes White Dragon]]".
  *** Ironically, this monster was [[Fusion Summon]]ed by only using "Blue-Eyes White Dragons" in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'', where "Blue-Eyes Alternative White Dragon" is mentioned by a different retrained counterpart of "Blue-Eyes Ultimate Dragon", "[[Blue-Eyes Alternative Ultimate Dragon]]".
  ** This monster follows the same trend as "[[Neo Galaxy-Eyes Photon Dragon]]", "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]", and "[[Neo Galaxy-Eyes Cipher Dragon]]", where they are the three-headed upgraded [[Extra Deck]] forms of [[-Eyes Dragon]] monsters with an [[original ATK and DEF]] of 3000/2500, who shares the same original [[ATK]] and feature the prefix "Neo" in their names.
  *** Ironically, it was "Blue-Eyes Ultimate Dragon" in the first place to inspire the trend followed by the formers of the protagonist's rival having a three-headed upgrade of their [[Dragon]] [[ace monster]]s.
  * "[[Crimson Nova Trinity the Dark Cubic Lord]]" can be seen as a [[DARK]] counterpart of this monster:
  ** Both are [[Fusion Monster]]s that use of three of the same monster as [[Fusion Material]]s.
  ** Both monsters share the same [[original ATK]] (4500).
  ** Both can attack multiple times in the same [[Battle Phase]].
  ** Both debuted in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]''.
  * This monster's wyvern-like mechanical body with glowing lines of energy was likely inspired by the design of either "[[Blue-Eyes Shining Dragon]]" or "[[Red-Eyes Darkness Metal Dragon]]".
  ** Both this monster and "[[Blue-Eyes Shining Dragon]]" are upgraded forms of "Blue-Eyes Ultimate Dragon" (either technically or conceptually) that debuted in a movie. Both also have an effect that can negate an opponent's effect.
  ** "Red-Eyes Darkness Metal Dragon" is considered the most powerful form of "Blue-Eyes White Dragon's" rival, "[[Red-Eyes Black Dragon]]", due to the impact it has historically had on the game, while this monster is supposed to be the most powerful form of "Blue-Eyes White Dragon" in the ''Yu-Gi-Oh! The Dark Side of Dimensions''.
