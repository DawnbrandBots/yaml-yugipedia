title: Card Trivia:Primeval Planet Perlereino
wikitext: |-
  {{Navigation}}

  * "[[Scareclaw Light-Heart]]" and "[[Visas Starfrost]]" likely appear in this card's artwork, as the blue meteor in the background.
  ** A miniature version of this land appears in the artwork of "[[Mannadium Meek]]".
  * This card's name, "Perlereino", is a portmanteau of "[[wikipedia:Pearl|pearl]]" (referring to the pearl-like tears of the "Tearlaments" monsters) and "[[wiktionary:reino|reino]]" (the Spanish word for "realm", and a reference to "[[Tearlaments Reinoheart]]").
  ** The kanji 「{{Ruby|壱|い}}{{Ruby|世|せ}}{{Ruby|壊|かい}}」 (''Isekai'') in this card's Japanese name can be translated as "First World Destruction".
  * This card is a "[[Tearlaments]]"-related [[counterpart]] of "[[Clear New World]]".
  * This card has a "[[Scareclaw]]"-related counterpart: "[[Primitive Planet Reichphobia]]".
