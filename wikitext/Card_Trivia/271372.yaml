title: Card Trivia:Vampire Grace
wikitext: |-
  {{Navigation}}

  * This monster may be based on the Hugarian countess Erzsébet Báthory, known in English as [[wikipedia:Elizabeth Báthory|Elizabeth Báthory]], who was accused of killing young women in order to drain their blood and bathe in it; such legends surrounding her vampiric tendencies were generally recorded years after her death.
  ** The 2000 [[Life Point]] cost to [[Special Summon]] this card from the [[Graveyard]] is equal to this card's original [[ATK]], suggesting that the Life Points are "drained" into her power.
