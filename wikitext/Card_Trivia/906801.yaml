title: Card Trivia:Dogmatika Theo, the Iron Punch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Swordsoul Emergence]]".
  ** The right member of "[[The Golden Swordsoul]]" is this monster after he left the "[[Dogmatika Nation]]" with "[[Dogmatika Fleurdelis, the Knighted]]" and joined the "[[Swordsoul]]" tribe, having abandoned his "[[Dogmatika]]" armor and hammer.
