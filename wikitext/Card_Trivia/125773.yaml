title: Card Trivia:Fortress Whale's Oath
wikitext: |-
  {{Navigation}}

  * "[[Fortress Whale]]" appears in this card's artwork.
  ** Oddly, despite the international artwork of "Fortress Whale" being edited to recolor its turret gun emplacements, this card's international artwork does not edit the original design of "Fortress Whale's" turret guns.
  * This card has a [[retrained]] ''[[Rush Duel]]'' counterpart: "[[Bluefin Oath]]".
