title: Card Trivia:Dark Scorpion - Tragedy of Love
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Dark Scorpion - Meanae the Thorn]]" appears in this card's artwork.
  * This card's name, artwork, and effect suggest that "Meanae the Thorn" is in love with "[[Don Zaloog]]" and willing to sacrifice herself for him, which is expressed overtly in {{episode|GX|039|ref}}, in which this card first appears.
