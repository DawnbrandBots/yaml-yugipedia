title: Card Trivia:Ancient Sacred Wyvern
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Rivalry]]".
  * This monster is based on a [[wikipedia:Wyvern|wyvern]], a creature from [[wikipedia:European mythology|European mythology]] who is depicted as a winged serpentine dragon without forearms.
  * This monster appears to have some sort of relation to "[[Ancient Fairy Dragon]]".
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Level]] (7), and [[original ATK]] (2100). In addition, both monsters feature a similar naming scheme and relation to [[Fairy|fairies]]. 
  ** Both are [[Synchro Monster]]s based on serpentine dragons with designs include only one set of limbs: This monster features a set of hind legs, while "Ancient Fairy Dragon" features a set of forearms.
  ** Both are used by [[Luna (Tag Force)|Luna]] in ''[[Yu-Gi-Oh! 5D's Tag Force 4]]'' and ''[[Yu-Gi-Oh! 5D's Tag Force 6]]''.
