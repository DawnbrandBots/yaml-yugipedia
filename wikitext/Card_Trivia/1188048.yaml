title: Card Trivia:Extra! Extra! Hot Off the Press
wikitext: |-
  {{Navigation}}

  * "[[Reporter Lilim]]", "[[Reporter Raccoon]]", and "[[Reporter Recorder]]" in its human form appear in this card's artwork.
  * This card is a [[retrained]] counterpart of "[[Hot Off the Press]]", having a similar artwork and effects forcing the opponent to [[excavate]] the bottom cards of their [[Deck]] and then inflicting 400 damage to the opponent for each monster excavated.
