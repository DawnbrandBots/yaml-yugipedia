title: Card Trivia:The First Darklord
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Lucifer|Lucifer]], a religious figure who is usually associated with [[wikipedia:Satan|Satan]] and was the first fallen angel.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Darklord Morningstar]]".
