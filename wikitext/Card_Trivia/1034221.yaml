title: Card Trivia:Zero Rite Killing Method
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's name and artwork depicting a silhouette of a butler are based on [[Alfred]], who transforms into this card in {{episode|GO RUSH!!|085|ref}}.
  ** This card's Japanese name (零儀殺法 ''Reigisappō'') is a pun on the word for "etiquette" (礼儀作法 ''Reigisahō''), reflecting Alfred's position as the butler of the Kallister family.
  *** This card's Japanese name also the kanji for the number zero (零 ''Rei''), reflecting this card's effect to [[Special Summon]] monsters with 0 [[ATK]] or 0 [[DEF]] from the [[hand]].
