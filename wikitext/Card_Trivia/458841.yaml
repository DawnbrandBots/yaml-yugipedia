title: Card Trivia:Skelesaurus
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battle Pack 3: Monster League]]''.
  * This monster appears in the artwork of "[[Supernatural Danger Zone]]".
  * This monster is the [[Zombie counterpart]] of "[[Ultimate Tyranno]]".
  * This monster's Gemini effect allows it to treat it as an [[EARTH]] [[Dinosaur]] monster, thereby making it the first Dinosaur [[Gemini monster]].
