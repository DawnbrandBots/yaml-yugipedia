title: Card Trivia:Rafflesia Seduction
wikitext: |-
  {{Navigation}}

  * A [[Wikipedia:Rafflesia|rafflesia]] is a tropical, parasitic plant that produces an odor like rotting flesh; such a pungent stench is specifically meant to attract and seduce certain insects (namely flies) so that they can transport its pollen for reproduction.
  ** This explains this card's effect--when flipped, this card temporarily "seduces" a monster, switching its [[control]] for the duration of the turn
