title: Card Trivia:New Frontier
wikitext: |-
  {{Navigation}}

  * "[[Albaz the Ashen]]", "[[Incredible Ecclesia, the Virtuous]]", "[[Springans Branga]]", "[[Springans Pedor]]", "[[Springans Rockey]]" (multiple), "[[Tri-Brigade Kitt]]", "[[Tri-Brigade Ferrijit the Barren Blossom]]", "[[Tri-Brigade Mercourier]]", "[[Tri-Brigade Shuraig the Ominous Omen]]", and "[[Tri-Brigade Rugal the Silver Sheller]]" appear in this card's artwork.
  ** According to this card's concept art, the red eyeball in the vehicle piloted by "Albaz" is the 317th Virtuous Vestal of "[[Dogmatika]]", who used to be a part of "[[Despian Quaeritis]]" and "[[Granguignol the Dusk Dragon]]".
  *** 317 is the 66th [[wikipedia:Prime number|prime number]], referencing the [[wikipedia:Number of the beast|number of the beast]] associated with the dark ritual of "[[Despia]]".
  *** In the ''[[Complete File: Story of White]]'' lore booklet, this Vestal is given the name "Miina", which is a [[goroawase]] of 317.
  * This card's name is a reference to how the "Abyss" continent was originally referred to as '[[The Valuable Book EX card storylines#No. 01: The Closed Land|The Closed Land]]'.
