title: Card Trivia:Transcode Talker
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck 2018]]''/''[[Starter Deck: Codebreaker]]''.
  * This monster appears in the artwork of "[[Cynet Codec]]".
  * This monster is named after [[wikipedia:Transcoding|transcoding]], the conversion of either language or information from one form of coded representation to another.
  * This monster has five "[[Code Talker (archetype)|Code Talker]]" [[counterpart]]s:
  ** [[DARK]]: "[[Decode Talker]]"
  ** [[LIGHT]]: "[[Encode Talker]]"
  ** [[WIND]]: "[[Excode Talker]]"
  ** [[FIRE]]: "[[Powercode Talker]]"
  ** [[WATER]]: "[[Shootingcode Talker]]"
