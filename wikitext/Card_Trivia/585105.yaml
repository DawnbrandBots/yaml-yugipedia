title: Card Trivia:Angraecum Umbrella
wikitext: |-
  {{Navigation}}

  * This monster's name is based off of the genus [[wikipedia:Angraecum|Angraecum]], whose flower appears in this card's artwork as an umbrella.
  ** Part of this card's Japanese name "Umbreacum" is also a wordplay on "umbrella" and "angraecum".
