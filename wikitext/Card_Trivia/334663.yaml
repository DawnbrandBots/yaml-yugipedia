title: Card Trivia:Reverse Reuse
wikitext: |-
  {{Navigation}}

  * The monsters in this card's artwork are based on how [[face-down]] monsters are represented in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This card's Spanish is "''Reuso Inverso''". The word "''reuso''" does not exist in Spanish. The word that should have been instead used is "''reutilización''". Thus, this card's name should have been "'''''Reutilización Inversa'''''".
