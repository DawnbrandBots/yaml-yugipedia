title: Card Trivia:Forced Back
wikitext: |-
  {{Navigation}}

  * "[[Nanobreaker]]" appears in this card's artwork.
  * This card has a parody [[counterpart]]: "[[Cash Back]]".
  ** Both are [[Counter Trap Card]]s: this card can [[negate]] a [[Normal Summon|Normal]] or [[Flip Summon]], while "Cash Back" can negate a [[Spell]]/[[Trap Card]] or [[monster effect]].
  *** Both can [[return]] the negated card: to the [[hand]] for this card and to the [[Deck]] for "Cash Back".
  ** Their artworks depict a monster and a shattered item being blown back by a white explosion. The pose of "Nanobreaker" in this card's artwork and "Goblin of Greed" in the artwork of "Cash Back" is also similar.
