title: Card Trivia:Gem-Knight Citrine
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the artworks of "[[Gem-Knight Master Diamond]]" and "[[Scatter Fusion]]".
  * This card is named after Madeira [[wikipedia:Citrine|citrine]], a bright orange gemstone.
  ** This monster's wooden armor is also a reference to "Madeira", which means "wood" in Portuguese.
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gem-Knight Ruby]]" and a "[[Laval]]" monster.
