title: Card Trivia:The Prime Monarch
wikitext: |-
  {{Navigation}}

  * The monster in this card's artwork is a silhouette of "[[Ehther the Heavenly Monarch]]".
  * This card has a [[counterpart]]: "[[The First Monarch]]".
  ** Both are [[Continuous Trap Card]]s that can [[Special Summon]] themselves as monsters.
  ** Both share a similar naming scheme and artwork that depicts their corresponding [[Monarch]] monster.
  ** Both share the same [[original ATK and DEF]] (1000/2400) and have opposite [[Attribute]]s and [[Type]]s: This monster is a [[LIGHT]] [[Fairy]] monster while the Attribute and Type of "The First Monarch" is [[DARK]] [[Fiend]].
  * This monster's [[Level]] is 5, referencing the first [[Monarch]] monster to be released, "[[Zaborg the Thunder Monarch]]", which is the only one of the original series whose Attribute is LIGHT and whose Level is 5.
  * This card has the highest original [[DEF]] (2400) of all [[Trap Monster]]s that are not treated as [[Trap Card]]s when Summoned via their own effect.
  * This is the only Trap Monster that is not treated as a Normal Trap Card when Summoned via their own effect, instead being a Continuous Trap Card.
