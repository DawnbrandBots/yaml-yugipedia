title: Card Trivia:Molting Escape
wikitext: |-
  {{Navigation}}

  * "[[Grappler]]" appears in this card's artwork.
  ** This card's name and artwork is a reference to a real-life snake "shedding" or "[[wikipedia:moulting|molting]]" its [[wikipedia:scale (anatomy)|scales]], and in doing so, its skin expands and grows stronger, which is reflected in this card's effects.
  *** Likewise, this card's artwork implies that "[[Drooling Lizard]]" is the monster who shed its skin and became "Grappler", despite the latter being 400 [[ATK]] and [[DEF]] stronger, as opposed to the 300 ATK boost from this card's effect.
