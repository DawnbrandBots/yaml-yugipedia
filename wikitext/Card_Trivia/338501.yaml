title: Card Trivia:Performapal Guitartle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Performapal Pendulum Art & Clean]]".
  * This card's name is a portmanteau of "guitar" and "turtle".
  ** Despite this card's name, this monster's body resembles a [[wikipedia:Mandolin|mandolin]], a picked string instrument with a circular rim and a sound hole.
