title: Card Trivia:Therion "Empress" Alasia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spright Smashers]]".
  ** The wrecked remains of this monster appear in the artwork of "[[Blink Out]]".
  * This monster is based on [[wikipedia:HD 168746|Alasia]], a star in the constellation of [[wikipedia:Serpens|Serpens]].
  ** This monster's design features a serpent-like appearance, referencing how Serpens is also known as the "snake" constellation.
