title: Card Trivia:Dark Balter the Terrible
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mispolymerization]]" and "[[Mutamorphosis]]".
  * This monster shares similarities with "[[Fiend Skull Dragon]]" and "[[Ryu Senshi]]".
  ** All three are [[Fusion Monster]]s who share the same [[original ATK and DEF]] (2000/1200).
  ** All three monsters feature effects that [[negate]] the [[activate|activation]] of certain [[card type]]s.
  ** All three monsters are the physical amalgams of their [[Fusion Material]]s. In this monster's case, it is an amalgam of In this monster's case, it is an amalgam of "[[Frontier Wiseman]]" and "[[Possessed Dark Soul]]".
  *** "Frontier Wiseman": This monster's humanoid appearance, clothing, and [[Spell Card]]-negating effect are similar to those of "Frontier Wiseman".
  *** "Possessed Dark Soul": This monster's [[Fiend]] [[Type]], and its horns and wings in its Japanese artwork are similar to those of "Possessed Dark Soul".
  **** This monster is likely the result of "Frontier Wiseman" after being possessed by the "Possessed Dark Soul".
  * Despite this monster's appearance in ''[[Yu-Gi-Oh! 5D's World Championship 2011: Over the Nexus]]'', neither of its Fusion Materials appear in that game.
