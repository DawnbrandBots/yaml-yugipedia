title: Card Trivia:Lyrilusc - Assembled Nightingale
wikitext: |-
  {{Navigation}}

  * This monster has a [[Fusion Parasite (anime)|corrupted]] [[Fusion Monster]] form: "[[Lyrilusc - Independent Nightingale]]".
  ** This monster is depicted facing the right side at an upwards angle, mirroring the pose of "Independent Nightingale", which faces the left side at a downwards angle.
  ** This monster's name is based on how it can grow stronger with an "assembly" of [[Xyz Material]]s, unlike "Independent Nightingale", which can grow stronger "independently" on the [[field]].
  ** This is currently the only [[Xyz Monster]] [[mentions|mentioned]] as [[Fusion Material]] by name.
  * This is the [[signature card]] of [[Lulu Obsidian]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
