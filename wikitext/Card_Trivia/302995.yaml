title: Card Trivia:Artifact Aegis
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Aegis|Aegis]], the shield that is carried by [[wikipedia:Athena|Athena]] and [[wikipedia:Zeus|Zeus]] in [[wikipedia:Greek mythology|Greek mythology]]. It is bearing the head of a [[wikipedia:Gorgon|Gorgon]].
  * This Artifact appears on the card "[[Artifact Sanctum]]".
  * This monster and "[[Artifact Achilleshield]]" are the only 2 "[[Artifact]]" Shield, both can protect "[[Artifact]]" [[Monster Card|monsters]] and have the same total combined sum of [[ATK]] and [[DEF]].
