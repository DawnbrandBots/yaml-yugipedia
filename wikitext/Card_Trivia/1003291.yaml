title: Card Trivia:Stand Up Centur-Ion!
wikitext: |-
  {{Navigation}}

  * "[[Centur-Ion Emeth VI]]" and "[[Centur-Ion Primera]]" appear in this card's artwork.
  ** "Centur-Ion Primera"'s pose, standing with arms crossed, resembles the "[https://knowyourmeme.com/memes/gainax-pose Gainax Pose]" heavily associated with the [[wikipedia:Mecha|Mecha]] genre, in particular the anime series ''[[wikipedia:Gunbuster|Gunbuster]]'' and ''[[wikipedia:Tengen Toppa Gurren Lagann|Tengen Toppa Gurren Lagann]]'' produced by [[wikipedia:Gainax|Gainax]].
