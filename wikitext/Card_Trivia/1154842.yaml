title: Card Trivia:Forbidden Ritual Art
wikitext: |-
  {{Navigation}}

  * "[[Djinn Releaser of Rituals]]" appears in this card's artwork. 
  ** This card's second effect replicates the effect of "Djinn Releaser of Rituals" to be used as material for a [[Ritual Summon]] while it is in the [[Graveyard]], allowing any one monster to do so.
