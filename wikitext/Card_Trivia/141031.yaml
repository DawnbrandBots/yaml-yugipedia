title: Card Trivia:Wattchimera
wikitext: |-
  {{Navigation}}

  * This card is based off a [[wikipedia:Chimera (mythology)|Chimera]], a mythlogical beast said to be composed of many different animals. It is typically depicted as a lion with an additional goat's head and the tail replaced with a snake, although they are known to have wings and/or lack the goat's head on some occasions.
