title: Card Trivia:Magicalized Fusion
wikitext: |-
  {{Navigation}}

  * This card has two [[Type]]-specific [[counterpart]]s:
  ** "[[Dragon's Mirror]]" (for [[Dragon]]s)
  ** "[[Recycling Plant]]" (for [[Machine]]s).
  * This card's artwork is similar to the artwork of "Dragon's Mirror", which depicts a monster emerging from the mirror, albeit with a mirrored position.
