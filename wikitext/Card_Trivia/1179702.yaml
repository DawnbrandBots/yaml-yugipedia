title: Card Trivia:Dark Rebellion Xyz Dragon of the Four Heavenly Dragons
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Dark Rebellion Xyz Dragon]]".
  ** This monster's name is a reference to how "Dark Rebellion Xyz Dragon" is one of the [[Four Dimensional Dragons]], which are also known as the "Four Heavenly Dragons" in the original Japanese version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's [[archetype condition]] to treat it as a "[[The Phantom Knights]]" monster references how "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]" is primarily used by [[Yuto]], who uses the "The Phantom Knights" [[archetype]].
  ** This monster's effect to [[destroy]] an equal number or cards of each [[field]] is a reference to the ''[[OCG]]''/''[[TCG]]'' effect of "[[The Phantom Knights of Break Sword]]", an Xyz Monster used by Yuto in the ''Yu-Gi-Oh! ARC-V'' anime, which destroys one card on each player's field.
