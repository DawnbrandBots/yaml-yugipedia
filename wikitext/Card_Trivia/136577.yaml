title: Card Trivia:Einroid
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster's name is based on "''ein''", the German word for the number "1", which is reflected in its [[Level]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[send]] two [[Level 4]] or lower [[Machine]] monsters from the [[Deck]] to the [[Graveyard]] is an alteration of its effect in the ''[[Yu-Gi-Oh! GX]]'' manga, where it can send two "[[roid]]" monsters from the Deck to the Graveyard. In {{chapter|GX|057|ref}}, [[Einroid (manga)|this monster's]] effect sent the Level 4 "[[Dreiroid]]" and "[[Vierroid]]" to the Graveyard.
  ** This monster's ''OCG''/''TCG'' effect specifically mentioning Machine monsters was most likely done to avoid supporting non-Machine "roid" monsters (such as "[[Dark Jeroid]]" and "[[Salamangreat Zebroid X]]").
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|GX|056|ref}}, specifically from the panel showing this monster being Summoned.
