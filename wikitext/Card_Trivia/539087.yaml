title: Card Trivia:Oni Tank T-34
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chicken Game]]" and "[[Pole Position]]".
  ** This card is one of few cards featuring weapons that were not censored; however, in "Pole Position" and "Chicken Game", its gun is edited to resemble a laser gun.
  * This monster was inspired by the [[wikipedia:T-34|T-34]] Soviet Tank, which was developed during World War II, and the "[[wikipedia:Oni|oni]]", a type of [[wikipedia:Yokai|yōkai]] in Japanese mythology depicted as an ogre-like humanoid with horns, reflected in this monster's design.
