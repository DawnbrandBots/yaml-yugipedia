title: Card Trivia:Get Your Game On! (card)
wikitext: |-
  {{Navigation}}

  * The energy bolts in the background of this card's artwork appear to be the same as in the background of "[[Elemental HERO Necroshade]]".
  * This card's name is a reference to the catchphrase of [[Jaden Yuki]] in the English version of the ''[[Yu-Gi-Oh! GX]]'' anime: ''Get Your Game On!''.
  ** This is the first card to have a name that is a rereference to a catchphrase of a ''[[Yu-Gi-Oh!]]'' anime character.
  * This card has the following text written on its [[Card backing|backing]]: "Thank you for attending the 2007 Yu-Gi-Oh! TRADING CARD GAME WORLD CHAMPIONSHIP this card is not for sale".
  ** This is the only card in the ''[[TCG]]'' to have written text on the back, besides the [[Summoned Skull Sample promotional card|production samples]] of "[[Summoned Skull]]".
  * This is the only card to have an activation requirement that the opponent cannot necessarily know if the player has actually met it, as they cannot know if the player attended the 2007 Yu-Gi-Oh! TRADING CARD GAME World Championship or not.
  * This is the only card in the ''TCG'' to have an exclamation mark taller than the [[wikipedia:Small caps|small capital letters]] in its card name, as tall as the capital letters.
  ** It is also the only card to have the [[limitation text]] "Not usable in Official Duels."
