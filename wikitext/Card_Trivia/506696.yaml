title: Card Trivia:Gilti-Gearfried the Magical Steel Knight
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2020]]''.
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gearfried the Iron Knight]]" and "[[Giltia the D. Knight]]".
  ** In the ''[[Yu-Gi-Oh! R]]'' manga, [[Gilti-Gearfried the Magical Steel Knight (manga)|this monster]] is [[Fusion Summon]]ed by fusing "[[Gearfried the Iron Knight (manga)|Gearfried the Iron Knight]]" and "[[Giltia the D. Knight (manga)|Giltia the D. Knight]]".
  ** In the ''[[OCG]]''/''[[TCG]]'', this monster's [[Fusion Material]]s are two generic [[Warrior]] monsters with different [[Attribute]]s, making "Gearfried the Iron Knight" and "Giltia the D. Knight" valid candidates for its [[Fusion Summon]].
  * This monster's ''OCG''/''TCG'' effects are based on the effects of [[Spell]] and [[Trap Card]]s used on this card by [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] during his Duel against [[Reiko Kitamori]] in the ''Yu-Gi-Oh! R'' manga, where it is a [[non-Effect Monster]].
  ** This monster's effect to make a second [[attack]] during each [[Battle Phase]] if Fusion Summoned using monsters on the field is based on the effect of the Trap Card, "[[Relentless Attacks]]", which allowed this monster to make a second attack immediately after its first one.
  ** This monster's effect to [[banish]] a Spell to have it gain [[ATK]] equal to half its current [[DEF]] during [[damage calculation]] when battling an opponent's monster is based on the effect of the Spell Card, "[[Extra Boost]]", which adds half the DEF of a target monster to its ATK.
  * This card's artwork is taken from {{chapter|R|020|ref}}, specifically from the panel showing [[Gilti-Gearfried the Magical Steel Knight (manga)|this monster]] being Summoned.
