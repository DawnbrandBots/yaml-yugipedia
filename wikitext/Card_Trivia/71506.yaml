title: Card Trivia:DNA Erasure Magic
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The doctor and nurses from the artworks of "[[DNA Checkup]]", "[[DNA Surgery]]", and "[[DNA Transplant]]" appear in this card's artwork.
  ** The doctors and nurses are depicted wearing magician's robes, which reflects this card's name and [[Continuous Spell Card]] [[card type|type]].
  * This is the only [[DNA]] card to not be released in the ''[[OCG]]''/''[[TCG]]''.
