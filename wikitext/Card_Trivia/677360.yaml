title: Card Trivia:El Shaddoll Apkallone
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Rebirth of Shaddoll]]''/''[[Structure Deck: Shaddoll Showdown]]'', as well as the cover card of ''[[Structure Deck: Rebirth of Shaddoll Deck Enhancement Pack]]''.
  * A form of this monster resembling "[[Evigishki Neremanas]]" appears in the artwork of "[[Lev Shaddoll Fusion]]".
  * This is the "[[Shaddoll]]" counterpart of "[[Evigishki Mind Augus]]".
  ** This card appears to be named after the term ''[[wikipedia:Apkallu|Apkallu]]''.
  * This monster wields the "[[Gishki Aquamirror|Aquamirror]]" staff possessed by "[[Evilswarm Kerykeion]]", which bears the "[[Constellar]]" symbol.
  ** The blue strings emerging from this staff are binding "Kerykeion" in the artwork of "[[Qadshaddoll Keios]]".
  ** Unlike "Mind Augus", the symbol of the "[[Gishki]]" appears in the right eye of this monster's piscine half.
