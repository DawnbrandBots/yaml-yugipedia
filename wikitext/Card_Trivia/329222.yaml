  [[File:Stardust's statue.jpg|thumb|right|250px|The Stardust Dragon statue.]]
  * The [[Stardust Dragon statue|statue]] of "[[Stardust Dragon]]", created by [[Bashford]] in {{episode|5D's|068|ref}}, appears in this card's artwork.
  ** This card belongs to the [[Scrap-Iron]] series, which is used by both Bashford and [[Yusei Fudo]], the owner of "[[Stardust Dragon (anime)|Stardust Dragon]]", in the ''[[Yu-Gi-Oh! 5D's]]'' anime.

