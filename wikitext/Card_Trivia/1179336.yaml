title: Card Trivia:Skyfire of the Sacred Beast
wikitext: |-
  {{Navigation}}

  * "[[Hamon, Lord of Striking Thunder]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|048|ref}} where "[[Hamon, Lord of Striking Thunder (anime)|Hamon, Lord of Striking Thunder]]" is Summoned, in which it is depicted emerging from shattering crystals.
  * This card's name is based on the [[Attack and effect names|attack name]] of "Hamon, Lord of Striking Thunder" in the ''[[Yu-Gi-Oh! GX]]'' anime, "Cerulean Skyfire".
  ** "[[Cerulean Skyfire]]" itself is a card that supports "Hamon", but this card is notably not a retrain of that one.
  * This card's first effect is based on the effect of the [[Continuous Spell Card]], "[[Triangle Force]]", which was used to Summon "Hamon, Lord of Striking Thunder" in {{episode|GX|149|ref}}.
