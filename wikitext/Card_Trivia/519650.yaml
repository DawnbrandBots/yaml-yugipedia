title: Card Trivia:Broken Line
wikitext: |-
  {{Navigation}}

  * "[[Batteryman D]]", "[[Batteryman C]]", "[[Batteryman AA]]", "[[Super-Electromagnetic Voltech Dragon]]", and one of the monsters in the artwork of "[[Batteryman AAA]]" appear in this card's artwork.
  * This card's name and artwork are a reference to the effect of "[[Super-Electromagnetic Voltech Dragon]]". "[[Super-Electromagnetic Voltech Dragon]]" gains effects when it is Tribute Summoned by Tributing "[[Batteryman D]]", "[[Batteryman C]]", or "[[Batteryman AA]]", but not "[[Batteryman AAA]]".
