title: Card Trivia:Dicephoon
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name is a portmanteau of the words "dice" and "typhoon", reflecting how it is a [[die roll]] variant of "[[Mystical Space Typhoon]]".
  ** This card's Japanese name, "Dicyclone" (サイコロン, ''Saikoron'') is a portmanteau of the words "dice" (サイコロ, ''Saikoro'') and "Cyclone" (サイクロン, ''Saikuron''), the Japanese name of "Mystical Space Typhoon".
