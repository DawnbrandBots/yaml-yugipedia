title: Card Trivia:Volcanic Doomfire
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Force of the Breaker]]'', as well as one of the cover cards of ''[[Collectible Tins 2007 Wave 2]]'', ''[[Precious Pack Volume 2]]'', and ''[[Duelist Edition Volume 1]]''.
  * This monster appears in the artworks of "[[Volcanic Curse]]", "[[Volcanic Emission]]", and "[[Volcanic Wall]]".
  * This monster has a female [[counterpart]]: "[[Volcanic Queen]]".
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster represented [[Axel Brodie]]'s father, [[Mr. Brodie]], while "[[Volcanic Queen (anime)|Volcanic Queen]]" represented Axel's mother. [[Trueman]] would pit the two against one another (with him using "Queen") to represent Axel's traumatic past where he only had time to save one of his parents from a car wreck, and Axel wanted to save his dad, condemning his mother to death (thought that didn't happen since his dad woke up and saved the whole family anyways).
  * This monster has an upgraded form: "[[Volcanic Emperor]]".
  * This is the [[signature card]] of Axel Brodie in the ''Yu-Gi-Oh! GX'' anime.
