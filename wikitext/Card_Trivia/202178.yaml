title: Card Trivia:Necro Mannequin
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Necro Cycle]]".
  * This monster's design appears to be loosely based on the dolls of [[wikipedia:Hans Bellmer|Hans Bellmer]], which are also plain grey in colour and are composed of several doll parts.
  * In the original Japanese version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster's middle leg was dangling out of its mouth. This was later removed in the international dubbed version.
  * This card's anime artwork is taken from {{chapter|Yu-Gi-Oh!|326|ref}}, specifically from the panel showing [[Necromannequin (manga)|this monster]] being Summoned.
