title: Card Trivia:Darkuriboh
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2026]]''.
  * This monster is a [[Dark counterpart]] of "[[Winged Kuriboh]]".
  ** This monster can also be considered an "[[Evil HERO]]" and "[[Yubel (archetype)|Yubel]]" [[counterpart]] of "Winged Kuriboh", since it [[support]]s both [[Fiend]] and [[Fusion Monster]]s.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, "[[Winged Kuriboh (character)|Winged Kuriboh]]" was a companion to [[Jaden Yuki]], whom made frequent use of "[[Polymerization]]" (which this monster can search or recycle) and Fusion Monsters.
