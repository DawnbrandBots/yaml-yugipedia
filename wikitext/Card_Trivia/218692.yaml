title: Card Trivia:Sophia, Goddess of Rebirth
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Jewels of the Valiant]]".
  ** According to the ''[[Duel Terminal Master Guide card storylines#The "Divine Wind" Begins to Gather at the "Shrine"|Duel Terminal Master Guide card storylines]]'', "Sophia" is sealed within "[[Shrine of Mist Valley]]".
  ** "Sophia" is mentioned in the flavor text of "[[Qliphort Scout]]" as the name of the [[wikipedia:Directory (computing)|computer folder]] containing the '[[Zefra|zefra.exe]]' [[wikipedia:Executable|executable file]].
  * This monster is based on [[wikipedia:Sophia (Gnosticism)|Sophia]] of [[wikipedia:Gnosticism|Gnosticism]]. Sophia is an [[wikipedia:Aeon (Gnosticism)|Aeon]], one of the emanations of God, said to have created the material world as a result of falling from the totality of God.
  ** ''[[wikipedia:Sophia (wisdom)|Sophía]]'' (Σοφία) is the Greek word for "wisdom".
  * This card has two counterparts:
  ** "[[Nekroz of Sophia]]" ("[[Nekroz]]" counterpart)
  ** "[[Tierra, Source of Destruction]]" ('[[Qli|Qliphoth]]' counterpart)
  *** This card's [[Type]] ([[Fairy]]) and [[Attribute]] ([[DARK]]) are opposites of the Type ([[Fiend]]) and Attribute ([[LIGHT]]) of "Tierra".
  *** This card's [[ATK]]/[[DEF]] (3600/3400) are inverted with the ATK/DEF (3400/3600) of "Tierra".
  *** The organic appearance of "Sophia" contrasts with the mechanical appearance of "Tierra".
  * The design of "Sophia" contains visual elements representing [[Duel Terminal Master Guide card storylines#The Tribes Created by "Sophia, Goddess of Rebirth"|the tribes she has created]], as well as the tribes that inherited her power:
  ** "[[Dragunity]]": The winged ornament in the center of her chest.
  ** "[[Flamvell]]": Her flame-like horns.
  ** "[[Gem-Knight]]": The bejeweled armlets on her upper arms.
  ** "[[Gusto]]": The green wings on her head.
  ** "[[Ice Barrier]]": The hexagonal necklace on her neck.
  *** "[[Gishki]]": The "[[Gishki Aquamirror|Aquamirrors]]" on her chest.
  ** "[[Jurrac]]": The scaled pattern on the skirt of her dress.
  ** "[[Laval]]": The fiery pattern on her dress.
  ** "[[Mist Valley]]": Her lightning-like hair.
  ** "[[Naturia]]": The vine-like tattoos on her arms.
  ** "[[X-Saber]]": The tassets embossed with X-shaped decorations on her hips.
  ** "[[Constellar]]" & "[[lswarm]]": The crystals of 'Creation' and 'Destruction' in her hands, later absorbed by "[[Constellar Sombre]]" and "[[Evilswarm Kerykeion]]" respectively.
  * This card's German lore has a major error; instead of ''Must be [[Special Summon]]ed (from your [[hand]]) by [[banish]]ing 1 [[face-up]] [[Ritual Monster|Ritual]], [[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], '''and''' [[Xyz Monster]] from anywhere on the field, (...)'', it is printed ''Must be Special Summoned (from your hand) by banishing 1 face-up Ritual, Fusion, Synchro, '''or''' Xyz Monster from anywhere on the field, (...)'' which would make it ridiculously easy to Summon this card.
