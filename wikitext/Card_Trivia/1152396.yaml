title: Card Trivia:Dragunity Quirinus
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Quirinus|Quirinus]], an early Roman god once considered to be the deified form of [[wikipedia:Romulus|Romulus]], the first king of Rome. ''Quirinus'' is also an epithet of [[wikipedia:Mars (mythology)|Mars]], the Roman god of war.
  * This monster has two upgraded forms:
  ** [[Link Monster]] (combined with "[[Dragunity Remus]]"): "[[Dragunity Knight - Romulus]]"
  ** [[Synchro Monster]] (combined with "[[Dragunity Falchion]]" and "Remus"): "[[Dragunity Knight - Areus]]"
