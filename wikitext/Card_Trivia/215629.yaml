title: Card Trivia:Lucky Punch
wikitext: |-
  {{Navigation}}

  * "[[Behemoth the King of All Animals]]" and "[[Rescue Rabbit]]" appear in this card's artwork.
  ** This card's artwork is a parody of "[[Cross Counter]]".
  ** The artwork of "[[Duck Dummy]]" is a reference to this card, with "Behemoth" recoiling in fear from a cutout of "Rescue Rabbit".
  * Every time the player uses this card's effect, there is a 1/8 chance that they will [[Draw a card|draw]] 3 cards (3 Heads), and a 1/8 chance of this card being [[destroy]]ed (3 Tails).
  * This card and "[[Dice Jar]]" have the highest [[Life Points]] loss effect.
