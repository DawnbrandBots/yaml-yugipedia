title: Card Trivia:Exosister Martha
wikitext: |-
  {{Navigation}}

  * This monster is implied to be the sister of "[[Exosister Elis]]", who she lost in battle, mentioned in [[The Valuable Book EX 2 card storylines]]. Due to the fact "[[Exosister]]" monsters work in pairs, this aspect was carried over within this monster's effect, since it mentions "Elis".
  * This monster has an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form: "[[Exosister Karmael]]".
