title: Card Trivia:Rank-Up-Magic Limited Barian's Force
wikitext: |-
  {{Navigation}}

  * [[Barian glyphs]] appear in this card's artwork.
  * This card's name and effects reflect how it is a "limited" version of "[[Rank-Up-Magic Barian's Force]]" since it can only [[target]] [[Rank 4]] monsters, only [[Xyz Summon]] "[[Number C]]" monsters, and cannot take an [[Xyz Material]] from an opponent's monster; however, this card can Xyz Summon monsters of any [[Type]].
  ** This card's artwork also depicts seal-like objects around the [[Barian Emblem]], which may be the reason this card has a limited power.
  * "[[Rank-Up-Magic Numeron Force (anime)|Rank-Up-Magic Numeron Force]]" is the "true form" of this card (after being transformed by [[ZEXAL II]]), as explained by [[Astral]] in {{episode|ZEXAL|098|ref}}.
