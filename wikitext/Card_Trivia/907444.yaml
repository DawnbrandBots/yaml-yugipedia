title: Card Trivia:Pendulum Encore
wikitext: |-
  {{Navigation}}

  * A silhouette of "[[Odd-Eyes Pendulum Dragon]]" appears in this card's artwork.
  * The two spotlights on both sides of the stage in this card's artwork is a reference to the two columns of light that appear when a player places a [[Pendulum Monster]](s) in a [[Pendulum Zone]](s) in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This is the first card that can perform a [[Pendulum Summon]].
