title: Card Trivia:Gonogo
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is a pun based on the words "go" and "no-go".
  ** The name may be based on this monster's ''[[OCG]]''/''TCG'' effect to change the [[battle position]] of a monster that it [[battle]]d with to [[face-down]] [[Defense Position]], which can prevent that monster from "going" any further during that turn.
  ** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, [[Gonogo (anime)|this monster]] is used by [[Sector Security]] officer [[Tetsu Trudge]], though its effects are unknown; this monster's ''OCG''/''TCG'' effect fits the general "obstruction" theme of cards associated with Trudge.
