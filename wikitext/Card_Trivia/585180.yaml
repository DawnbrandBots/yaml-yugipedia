title: Card Trivia:Madolche Petingcessoeur
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Madolche Dessert]]", "[[Madolche Promenade]]" and "[[Madolche Salon]]".
  * This monster's name is a portmanteau of the words "pudding", "petite sœur" (French for "little sister"), and "princess".
  ** Based on this monster's name and appearance, this monster appears to be the younger sister of "[[Madolche Puddingcess]]".
