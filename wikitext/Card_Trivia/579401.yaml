title: Card Trivia:Superdreadnought Rail Cannon Juggernaut Liebe
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Barrage Blast]]".
  ** This monster's main cannon appears in the artwork of "[[Number 27: Dreadnought Dreadnoid]]".
  * This monster is based on the ''[[wikipedia:Landkreuzer P. 1500 Monster|Landkreuzer]]'', a theoretical [[wikipedia:Self-propelled artillery|self-propelled "land cruiser"]] for the ''[[wikipedia:Schwerer Gustav|Schwerer Gustav]]'' railway gun for [[wikipedia:World War II|World War II]], despite it being depicted traveling by rail.
  ** This is reflected by this monster's alternate [[Summoning conditions]]: it can be [[Xyz Summon]]ed using a [[Rank 10]] [[Machine]] [[Xyz Monster]] as [[material]], which includes "[[Superdreadnought Rail Cannon Gustav Max]]" and "[[Number 81: Superdreadnought Rail Cannon Super Dora]]".
  ** This monster's name is based on the [[wikipedia:Dreadnought#Super-dreadnought|super-dreadnought]] warship, a more powerful class of dreadnought warship equipped with a single powerful main cannon similar to those like this monster. Fittingly, this monster can be [[Special Summon]]ed with the effect of "Dreadnought Dreadnoid", whose orange-lined cannon resembles this monster's.
  * "Liebe" is the German word for "love", referencing the infatuation of [[Anna Kaboom]] (who used a [[Train]] [[Deck]]) for [[Yuma Tsukumo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
