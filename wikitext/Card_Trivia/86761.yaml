title: Card Trivia:Darklord Zerato
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Extra Pack]]''.
  * The ruins of "[[The Sanctuary in the Sky]]" appears in the background of this card's artwork.
  ** This would imply that this monster is the one responsible for the destruction of the sanctuary.
  * This card depicts the "[[Warrior of Zera]]" on the path of discovering "The Sanctuary in the Sky" and obtaining the power of the "Archlords", only to be later corrupted by it and fall into the darkness, destroying "The Sanctuary".
  ** "[[Warrior of Zera]]" → "[[The Sanctuary in the Sky]]" → "[[Zeradias, Herald of Heaven]]" → "[[Archlord Zerato]]" → "'''Darklord Zerato'''"
