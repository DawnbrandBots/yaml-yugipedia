title: Card Trivia:Inzektor Giga-Mantis
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Mantis|Mantis]]
  * This card is the offensive counterpart of "[[Inzektor Giga-Weevil]]".
  * This is one of the few "[[Inzektor]]" monsters that cannot be equipped with another "[[Inzektor]]" monster (the other being "[[Inzektor Giga-Weevil]]").
  * Despite being based on a mantis, this card shares a similar image of [[wikipedia:Kamen Rider Gatack|Kamen Rider Gatack]] in its Rider Form with its Double Calibur. Gatack is based on a Stag Beetle.
  ** However he may also share a resemblance to Kamen Rider OOO's Gatakiriba form due to the green armor stagbeetle head and mantis blades.
  * This card is featured in "[[Variable Form]]" and "[[Inzektor Orb]]".
  ** The above cards also hint that this card is just an "[[Inzektor]]" monster putting a mantis armor on (in this case, "[[Inzektor Ant|Ant]]"). The same for "[[Inzektor Giga-Weevil]]".
