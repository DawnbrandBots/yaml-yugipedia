title: Card Trivia:Mutamorphosis
wikitext: |-
  {{Navigation}}

  * "[[Dark Balter the Terrible]]" appears in this card's artwork, transforming into "[[Cyber Dragon]]".
  ** Fittingly, the above-mentioned monsters' [[Level]]s are 5, making them eligible [[target]]s for this card's effect.
  * This card is a [[counterpart]] of "[[Metamorphosis]]".
  ** Both cards feature similar artworks. Additionally, this card's Japanese name, "Back Mutation", references the kanji in the Japanese name for "Metamorphosis", 突然変異, which translates to "mutation".
  ** This card's effect is an inversion of "Metamorphosis" in terms of the [[Tribute]]d monster for cost and the resulting [[Special Summon]]ing, with an added detail in that its effect allows use of [[Synchro Monster]]s as well as [[Fusion Monster]]s.
  ** In the past, "Cyber Dragon" was frequently used with "Metamorphosis" to Special Summon "Dark Balter the Terrible." Fittingly, this card's artwork depicts "Dark Balter" regressing into "Cyber Dragon."
