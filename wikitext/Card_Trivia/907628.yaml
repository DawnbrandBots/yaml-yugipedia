title: Card Trivia:Magician's Salvation
wikitext: |-
  {{Navigation}}

  [[File:DMG saves Mahado.png|thumb|250px|[[Dark Magician Girl (manga character)|Dark Magician Girl]], saving [[Mahado (manga)|Mahado]].]]

  * "[[Dark Magical Circle]]", "[[Dark Magician]]", and "[[Dark Magician Girl]]" appear in this card's artwork.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|316|ref}}, specifically from the panel showing that [[Mahado (manga)|Mahado]] (as a ''[[ka]]'') had escaped [[Diabound (manga)|Diabound]]'s attack due to [[Mana (manga)|Mana]]'s ''ka'', [[Dark Magician Girl (manga character)|Dark Magician Girl]], lifting him to safety.
  * This card's effect to [[Set]] "[[Eternal Soul]]" from the [[Deck]] while its name contains the word "salvation" is ironic, as the very existence of "Eternal Soul" proves that Mana was not able to reach Mahado in time to save him from being sealed inside a stone slab in the first place.
  ** Also, the scene depicted in this card's artwork follows the creation of said stone slab (which is depicted in the artwork of "Eternal Soul") rather than preceding it, thus making said effect illogical.

