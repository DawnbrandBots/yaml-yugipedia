title: Card Trivia:Meika Etraynze the Shadow Flower Venus
wikitext: |-
  {{Navigation}}

  * "[[Meika Etraynzeyes the Shadow Flower Lunatic]]" is a version of this monster with red eyes, a pink dress, and glasses.
  * This card was the first [[Fusion Monster]] to require 2 [[Level]] 7 or higher monsters as [[Fusion Material]] in ''[[Yu-Gi-Oh! Rush Duel]]''.
  * "[[wiktionary:めいか|Meika]]" is a Japanese term used to refer to popular flowers and beautiful women; traditionally, it's often used to refer to famous historical [[wikipedia:Geisha|geishas]].
