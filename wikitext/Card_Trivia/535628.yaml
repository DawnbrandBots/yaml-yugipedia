title: Card Trivia:Dark Lucius LV4
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Falling Down]]", "[[Different Dimension Encounter]]", "[[Different Dimension Ground]]", "[[Painful Return]]", and "[[Sakuretsu Armor]]".
  * This monster is based on [[wikipedia:Lucifer|Lucifer]], a fallen angel who is often interpreted as the Devil and is often associated with the [[wikipedia:Seven deadly sins|deadly sin]] of [[Wikipedia:Pride|pride]].
  * This monster is "[[Warrior Dai Grepher]]" after being corrupted by "[[Wicked-Breaking Flamberge - Baou]]", as shown in the artwork of "[[Falling Down]]".
  ** This card's effect is also similar to that of "Wicked-Breaking Flamberge - Baou".
