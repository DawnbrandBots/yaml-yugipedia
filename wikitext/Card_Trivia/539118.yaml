title: Card Trivia:Haniwa
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[The Law of the Normal]]", "[[The Return to the Normal]]", "[[The Revenge of the Normal]]", "[[The Toil of the Normal]]" and "[[Treasure Panda]]".
  ** An illustration of this monster appears in the artwork of "[[Ichiroku's Ledger Book]]".
  * This monster is based on the ''[[wikipedia:Haniwa|haniwa]]'', clay figures which were made for ritual use and buried with the dead as funerary objects during the Kofun period (3rd to 6th century AD) of Japanese history.
  * This monster has a [[recolored counterpart]]: "[[Rock Spirit]]".
