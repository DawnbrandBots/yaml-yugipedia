title: Card Trivia:Crimson Dragon Quetzacoatl
wikitext: |-
  {{Navigation}}

  [[File:Crimson Dragon along with the original 5 Signer Dragons in CROSS GAME.jpg|thumb|right|250|[[Crimson Dragon]] along with the original [[Signer Dragon]]s in "[[CROSS GAME]]"]]

  * "[[Ancient Fairy Dragon]]", "[[Black Rose Dragon]]", "[[Life Stream Dragon]]", "[[Red Dragon Archfiend]]", and "[[Stardust Dragon]]" appear in this card's artwork.
  ** These are the original five [[Signer Dragon]]s that appeared in the first season of ''[[Yu-Gi-Oh! 5D's]]'', before the addition of "[[Black-Winged Dragon]]" in the second season.
  ** This card's artwork is based on the scene of the [[Crimson Dragon]] and its servants from [[CROSS GAME]], the second ending credits of the ''Yu-Gi-Oh! 5D's'' anime.
  * This monster is a [[retrained]] [[DARK]] counterpart of "[[Crimson Dragon (card)|Crimson Dragon]]".
  ** This monster's name references how the Crimson Dragon is identified as [[wikipedia:Quetzalcōātl|Quetzalcoatl]], the winged serpentine deity from [[wikipedia:Aztec mythology|Aztec mythology]], by [[Greiger]] and [[Max]] in {{episode|5D's|113|ref}}, which centers around [[Jack Atlas]]. 
  *** Fittingly, this monster debuted in ''[[Limit Over Collection: The Rivals]]'', which features cards based on those used by Jack Atlas in the ''Yu-Gi-Oh! 5D's'' anime, while its DARK [[Attribute]] is designed to [[support]] the "[[Red Dragon Archfiend (archetype)|Red Dragon Archfiend]]" [[archetype]] used by Jack Atlas.

