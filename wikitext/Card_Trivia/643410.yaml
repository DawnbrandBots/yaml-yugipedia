title: Card Trivia:Tachyon Spiral Galaxy
wikitext: |-
  {{Navigation}}

  * "[[Number 107: Galaxy-Eyes Tachyon Dragon]]" appears in this card's artwork.
  ** This card's name references both the [[wikipedia:Spiral galaxy|spiral galaxies]] and the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack name]] of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: "Tachyon Spiral of Destruction".
  ** This card's artwork depicts "Number 107: Galaxy-Eyes Tachyon Dragon" performing an attack similar to how it is shown in {{episode|ZEXAL|083|ref}}, where it releases shockwaves from its arms.
