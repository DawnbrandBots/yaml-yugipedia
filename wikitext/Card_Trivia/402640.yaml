title: Card Trivia:Relinkuriboh
wikitext: |-
  {{Navigation}}

  * This monster appears to be "[[Kuriboh]]" adopting the physical traits of "[[Relinquished]]", specifically having the claws and the [[Eye of Anubis]] of the latter.
  ** This card's name is a portmanteau of "Relinquished" ("Sacrifice" in the ''[[OCG]]'') and "Kuriboh".
  ** This is a reference to how "[[Kuriboh (manga)|Kuriboh]]" was the key to defeating "[[Thousand-Eyes Restrict (manga)|Thousand-Eyes Restrict]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], the latter being the fusion of "[[Relinquished (manga)|Relinquished]]" and "[[Thousand-Eyes Idol (manga)|Thousand-Eyes Idol]]".
  * This card and "[[Sphere Kuriboh]]" appear to have their effects swapped in development, since the latter features an effect to support [[Ritual Monster]]s, but references "[[The Winged Dragon of Ra - Sphere Mode]]" (which is not a Ritual Monster), while this card features an effect to support "[[The Winged Dragon of Ra]]" but references "Relinquished".
