title: Card Trivia:Thousand-Eyes Idol
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dice Crisis]]" and "[[Relinquished Fusion]]".
  * Despite its name, this monster's design features eighteen visible eyes.
  * This monster has a [[retrained]] [[counterpart]]: "[[Golden-Eyes Idol]]".
  * This monster, "[[Hieratic Seal of the Sun Dragon Overlord]]" and "[[Soitsu]]" have the lowest [[original ATK and DEF]] (0/0) of all [[Normal Monster]]s, excluding [[Token Monster]]s. Of these three, this monster also has the lowest [[Level]] (1).
