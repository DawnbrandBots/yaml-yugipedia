title: Card Trivia:Scar-Knight
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is based on a [[wikipedia:Scar|scar]], a growth of tissue marking the spot where skin has healed after an injury.
  ** A scarring can occur after picking off a [[wikipedia:Scab|scab]] left over from a wound, reflecting this monster's association with "[[Scab Scar Knight]]" and how it can [[Special Summon]]ed via the effect of "[[Scab Scream]]".
  * Despite this monster's name, its design features very little to almost no scarring in its artwork.
  ** However, in the ''[[Yu-Gi-Oh! GX]]'' anime, during [[Mr. Stein]]'s flashbacks, this monster's appearance and shield featured very little scar marks. In the present day, during Mr. Stein's [[Duel]] with [[Jaden Yuki]], this monster's body and shield are completely covered in scars.
