title: Card Trivia:Jizukiru, the Star Destroying Kaiju
wikitext: |-
  {{Navigation}}

  * An image of this monster appears in the artwork of "[[The Kaiju Files]]".
  * The tower from the artwork of "[[Kyoutou Waterfront]]" appears in this card's artwork (in the upper-left corner).
  * This monster appears to be based on both the [//wikizilla.org/wiki/Legion Legion] species and [//wikizilla.org/wiki/Iris Iris] from the Gamera Heisei trilogy. Coincidentally, Legion and Iris would end up antagonizing Tokyo and Kyoto respectively, the cities that inspired the name of "Kyoutou Waterfront".  
  ** This monster is associated with being made of inorganic material (reflecting its [[Machine]] [[Type]]), referencing how the Legion are made of silicone. This monster is depicted as having seemingly crashed into the city from space, similar to how the Legion came to Earth from a meteorite that crashed into Sapporo. This monster also seems to have some insectoid legs near its mid-section and mandibles, resembling the leg and mandible structures on the Legion species. 
  ** This monster's design primarily takes elements from Iris, having a bird-like mouthless face with a mono eye, a silvery color-scheme with various portions of its body glowing with energy, wing structures on its shoulders and weaponized arms.  
  * This monster can be seen as the rival of "[[Gameciel, the Sea Turtle Kaiju]]".
  ** Both are based on rival monsters in ''kaiju'' films produced by [[wikipedia:Kadokawa Corporation|Kadokawa]].
  ** Both feature effects that [[negate]]s the [[activate|activation]] of a card effect; however, this monster can [[destroy]] any card on the [[field]] at the cost of three [[Kaiju Counter]]s, while "Gameciel" [[banish]]es the card that triggered the effect at the cost of two Kaiju Counters.
  * The design for the [[Kaiju Counter]] icon in ''[[Yu-Gi-Oh! Duel Links]]'' and ''[[Yu-Gi-Oh! Master Duel]]'' is based on this monster's face.
