title: Card Trivia:Koa'ki Meiru Shield
wikitext: |-
  {{Navigation}}

  * This card has a similar artwork and effect to "[[Mirror Force]]".
  ** When "[[Kozaky]]" and "[[Magical Scientist]]" were making the [[Koa'ki Meiru]], they probably made equipment to protect their new species (possibly based off existing technology). If this was true, then it would explain the similarity of "Koa'ki Meiru Shield" and "Mirror Force".
