title: Card Trivia:Drytron Mu Beta Fafnir
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Drytron Fafnir]]".
  * This monster is named after [[wikipedia:Fafnir|Fafnir]], a dwarf in [[wikipedia:Norse mythology|Norse mythology]] who was cursed to become a dragon.
  ** This monster is also named after [[wikipedia:42 Draconis|Fafnir]], a giant star in the northern constellation of [[wikipedia:Draco (constellation)|Draco]], which is also designated as "42 Draconis".
  *** Fittingly, "μβ´" (Mu-Beta) is the notation for the number "42" in the [[wikipedia:Greek numerals|Greek numeral system]].
  * This monster has the highest [[original ATK]] (2000) of all [[Rank 1]] [[Xyz Monster]]s.
  * This card's Japanese release features a slight [[misprint]] in its [[DEF]] stats, as the number "0" is only three spaces away from the "DEF" mark, instead of four. Strangely, this imperfection was present in the official proxy released on the ''Yu-Gi-Oh! [[OCG]]'' Twitter, too. This was corrected for its ''[[TCG]]'' release.
