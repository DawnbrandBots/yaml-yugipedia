title: Card Trivia:Pineapple Blast
wikitext: |-
  {{Navigation}}

  * The term "Pineapple" commonly refers to the [[wikipedia:Mk 2 grenade|Mk 2 Grenade]].
  * This card has an [[anime-only]] counterpart, "[[Shadow Balance]]".
  ** It also has a "[[Koa'ki Meiru]]" [[counterpart]], "[[Core Blast]]".  Incidentally, both cards have the word "Blast" in their names.
  * The Spanish ''[[Dark Revelation Volume 1]]'' print of this card showed several typos on its lore, namely a lack of diacritical marks.
