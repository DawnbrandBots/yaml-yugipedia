title: Card Trivia:Maginificent Magikey Mafteal
wikitext: |-
  {{Navigation}}

  * "Maftea" comes from "Mafteah Shelomoh", the Hebrew name for the ''[[wikipedia:Key of Solomon|Key of Solomon]]''.
  * This card is the monster counterpart and unsealed form of the Spell "[[Magikey Maftea]]".
  ** Fittingly, "Magikey Maftea" appears in this card's artwork.
