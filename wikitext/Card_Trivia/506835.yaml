title: Card Trivia:Eria the Water Charmer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Over Rush Pack 4]]'', ''[[Structure Deck: Spirit Charmers]]''/''[[Structure Deck: Masters of the Spiritual Arts]]'', ''[[Structure Deck: Masters of the Spiritual Arts Spirit Art Awakening Pack]]'', and ''[[Structure Deck: Masters of the Spiritual Arts - The Legend of Duelist Quarter Century Edition]]''.
  * This monster appears in the artworks of "[[Grand Spiritual Art - Ichirin]]", "[[Spirit Charmers]]", "[[Spiritual Refinement]]", and "[[Spiritual Water Art - Aoi]]" (although the former two may be featuring "[[Eria the Water Charmer, Gentle]]" instead).
  * "[[Gigobyte]]" appears in this card's artwork, serving as this monster's familiar.
  * This monster's name is likely derived from ''[[wikipedia:Aquarius|Aquarius]]'' (spelled 「アク<u>エリア</u>ス」, ''Aku'''eria'''su'', in Japanese), a Latin word meaning "water-bearer".
  * This monster has five [[Card evolutions|upgraded]] [[counterpart]]s: 
  ** A "[[Familiar-Possessed]]" counterpart: "[[Familiar-Possessed - Eria]]".
  ** A [[Link Monster|Link]] counterpart: "[[Eria the Water Charmer, Gentle]]".
  ** A Channeler counterpart: "[[Eria the Water Channeler]]".
  ** An adult, [[Cataclysmic Charmer]] counterpart: "[[Raging Eria]]".
  ** A retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Eria the Water Spiritualist]]".
  * This monster is very similar to "[[Gishki Ariel]]" in both name (especially in Japanese, where that card is called "Erial") and appearance, implying that the two may be associated in some way, similar to "[[Wynn the Wind Charmer]]" and "[[Winda, Priestess of Gusto]]" being sisters according to the ''[[Duel Terminal Master Guide card storylines#The Main House|Duel Terminal Master Guide]]''.
