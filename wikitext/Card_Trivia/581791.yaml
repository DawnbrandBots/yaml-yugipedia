title: Card Trivia:Condemned Darklord
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Forbidden Crown]]" and "[[Forbidden Droplet]]".
  * This monster is a fully corrupted version of "[[Condemned Maiden]]" and "[[Condemned Witch]]", first seen in the "[[Forbidden (archetype)|Forbidden]]" and "[[Solemn]]" cards' artworks as a denizen of paradise [[Master Guide 4 card storylines#File No. 02: The Maiden Exiled from Paradise|who was cursed by God for stealing the "Forbidden" artifacts from His treasure room]] and [[The Valuable Book EX card storylines#No. 08: Condemned Witch|refusing to repent]].
