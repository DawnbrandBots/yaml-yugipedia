title: Card Trivia:Blackwing - Vayu the Emblem of Honor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Black Thunder]]".
  * This monster's name is based on [[wikipedia:Vayu|Vayu]], the [[wikipedia:Deva (Hinduism)|Hindu god]] of the [[wikipedia:cardinal direction|cardinal directions]], as well as the Indian word for "air".
  * This monster's suit is identical to the ''[[wikipedia:Japanese school uniform|gakuran]]'', the male Japanese high school uniform, and his footwear is the traditional Japanese ''[[wikipedia:Geta (footwear)|geta]]'' wooden sandals.
  * This monster is a [[counterpart]] of "[[Blackwing - Vata the Emblem of Wandering]]".
  ** Both monsters feature the same red emblem in the background of their respective cards' artwork.
  ** Both monsters share the same [[original ATK and DEF]] (800/0) and have effects that can [[Special Summon]] a [[Synchro Monster]] from the [[Extra Deck]].
  ** Both monsters feature inverted color schemes; this monster has a black coat, black feathers, and red hair, while "Vata" has a white coat, black feathers, and blue hair.
  * This is the first [[Tuner monster]] whose effect prevents itself from being used for a [[Synchro Summon]].
  ** This is the only monster whose Synchro Summoning restriction is not treated as a [[condition]].
  * This monster and "[[Shiranui Spectralsword]]" are the only Tuner monsters that can Summon Synchro Monsters from the Extra Deck while in the [[Graveyard]].
