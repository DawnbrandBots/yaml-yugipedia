title: Card Trivia:Blackwing - Simoon the Poison Wind
wikitext: |-
  {{Navigation}}

  * This monster's name is based on a [[wikipedia:Simoom|simoom]], a strong, dry, dust-laden wind that blows in the Middle East. The simoom is known for suffocating humans and animals, which reflects the second portion of this monster's name and its damaging effect.
