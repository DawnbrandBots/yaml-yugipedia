title: Card Trivia:Swords of Concealing Light
wikitext: |-
  {{Navigation}}

  * This card has a counterpart: "[[Swords of Revealing Light]]".
  ** Both cards' Japanese names are nearly identical, with the only difference being that they refer to opposing [[Attribute]]s.
  ** This card's English name is a play on the name of "Swords of Revealing Light", causing it to imply its effect can [[reveal]] cards in some way despite the fact that it does not.
