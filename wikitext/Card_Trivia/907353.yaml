title: Card Trivia:Ojisan
wikitext: |-
  {{Navigation}}

  * This monster's name is a play on the Japanese word for "uncle" or "middle-aged man" (おじさん, ''ojisan''), and the [[wikipedia:Goatfish|goatfish]], which was named for its "middle-aged-man-like" barbels.
  ** This monster's appearance is a goatfish with a design based on the stereotypical representation of a tired middle-aged Japanese salaryman, which features a balding head with "barcode" hairlines and a loose necktie.
