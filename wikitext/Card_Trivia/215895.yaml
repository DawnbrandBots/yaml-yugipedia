title: Card Trivia:Gold Coins for Cats
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Neko Mane King]]" appears in this card's artwork.
  * This card's name is a Japanese idiom equivalent to "to cast [[wikipedia:pearls before swine|pearls before swine]]".
  ** This card depicts [[wikipedia:Koban (coin)|koban]], which are associated with the idiom.
