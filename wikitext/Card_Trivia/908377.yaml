title: Card Trivia:Crowley, the Magistus of Grimoires
wikitext: |-
  {{Navigation}}

  * This monster is a younger version of "[[Aleister the Invoker]]".
  ** They have the same [[Level]], [[Attribute]] and [[Type]], but have reversed [[ATK]]/[[DEF]].
  ** Fittingly, they are both based on [[wikipedia:Aleister Crowley|Aleister Crowley]].
  * This monster appears in the artworks of "[[Alpha Summon]]", "[[The Journeying Three Magi]]", "[[Magistus Invocation]]", "[[Magistus Theurgy]]", and "[[Trismagistus]]".
  * This monster is holding what appears to be a precursor to "[[The Book of the Law]]".
  ** The kanji title in this card's Japanese name, 「法典の大賢者」 "Great Sage of the Lawbook", appears to be a reference to "The Book of the Law".
  * This monster has a retrained counterpart: "[[Crowley, the Gifted Magistus]]".
