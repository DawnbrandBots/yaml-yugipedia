title: Card Trivia:Tower of Babel
wikitext: |-
  {{Navigation}}

  * This card is named after the Biblical [[wikipedia:Tower of Babel|Tower of Babel]], mentioned in Genesis 11. The tower was built by the settlers of Shinar (an old name for Babylon) which they intended to reach Heaven. For their audacity and hubris, God cursed them so that every worker spoke a different language, so they could not communicate with each other and the tower collapsed.
  ** One historical site believed to have been the "real" Tower of Babel is [[wikipedia:Etemenanki|Etemenanki]], a ziggurat temple in Babylonia whose name meant "temple of the foundation of heaven and earth".
