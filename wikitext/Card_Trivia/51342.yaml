title: Card Trivia:X-Saber Anu Piranha
wikitext: |-
  {{Navigation}}

  * This monster's armor and weapon bear a resemblance to those belonging to [[wikipedia:Ivy Valentine|Ivy Valentine]], a character from the 2002 fighting video game, ''[[wikipedia:Soul Calibur II|Soul Calibur II]]''.
  * This monster's ''[[TCG]]'' name is based on a [[Wikipedia:Piranha|piranha]], a species of sharp-toothed freshwater fish inhabiting the South American rivers.
  * This is the only "[[X-Saber]]" [[Normal Monster]].
  ** This monster and "[[Sabersaurus]]" are the only "[[Saber]]" Normal Monsters.
  * According to the ''Duel Terminal'' storyline, "[[XX-Saber Fulhelmknight]]" is the reincarnation of this monster.
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', this monster uses its Japanese name, "X-Saber Anapelera".
