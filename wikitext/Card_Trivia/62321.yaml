title: Card Trivia:Giant Trunade
wikitext: |-
  {{Navigation}}

  * The face of the hurricane in this card's artwork appears in the card artworks of "Hey, Trunade!" and "[[Flower Cardian Willow]]".
  * This card has two [[counterpart]]s:
  ** A weaker [[retrained]] counterpart: "[[Hey, Trunade!]]"
  ** A "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Giant Trunade]]".
  * The "Trunade" in this card's ''[[TCG]]'' name is a misromanization of トルネード (''Torunēdo,'' "Tornado"). Curiously, this card's original Japanese name is ハリケーン (''Hariken'', "Hurricane"), not "Tornado".
  * This card is one of the four [[Forbidden]] cards whose effect is part of the effects of "[[Pot of The Forbidden]]".
