title: Card Trivia:Caius the Shadow Monarch
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[The Dark Emperor Structure Deck]]'',  ''[[Structure Deck: Advent of the Emperor]]'', and ''[[Structure Deck: Triumphant Return of the Monarchs]]''.
  * This monster appears in the artwork of "[[By Order of the Emperor]]", "[[Domain of the True Monarchs]]", "[[Illusory Snatcher]]", "[[Invasion of the Monarchs]]", "[[March of the Monarchs]]", "[[The Monarchs Revolt]]", "[[Red Screen]]", "[[The Monarchs Masterplan]]", and "[[Tribute Carnival]]".
  * In [[wikipedia:History of Rome|Roman history]], the names [[wikipedia:Caius|Caius]] and [[wikipedia:Gaius|Gaius]] are interchangeable. Therefore, this monster's name is likely a reference to many powerful figures of the late [[wikipedia:Roman Republic|Roman Republic]], including [[wikipedia:Gaius Gracchus|Gaius Gracchus]], [[wikipedia:Julius Caesar|Gaius Julius Caesar]] and [[wikipedia:Augustus|Gaius Augustus]].
  ** This is supported by the name of this monster's "[[Vassal]]" counterpart, "[[Lucius the Shadow Vassal]]", which is also a [[wikipedia:Praenomen|praenomen]] of [[wikipedia:Ancient Rome|Ancient Rome]].
  * This monster has an [[Card evolutions|upgraded form]]: "[[Caius the Mega Monarch]]".
  * This monster appears to be conjuring a "[[Dark Core]]", another card which features a monster-[[banish]]ing effect.
