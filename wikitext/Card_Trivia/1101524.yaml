title: Card Trivia:Doppler Demon Dowsing
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's name, when written in English, uses the capital letter "D" for the first letter of all three words, referencing the "[[D/D/D]]" [[archetype]] used by [[Reiji Akaba (manga)|Reiji Akaba]] in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
