title: Card Trivia:Flame Manipulator
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Chain Material]]".
  * This monster is similar to [[wikipedia:Tetsuo Shima|Tetsuo Shima]] from the manga and animated film ''[[wikipedia:Akira (film)|Akira]]''.
  * This card is the only [[FIRE]] [[Spellcaster]] [[Normal Monster]].
  * In this card's Portuguese [[flavor text]], "Sea of Flames" and "Wall of Fire" were not mentioned.
  * The early Spanish prints of this card have a small typo: "'''la''' "Muro de Fuego"" is written instead of "'''el''' "muro de fuego"". The ''[[Legendary Collection 4: Joey's World Mega Pack]]'' print also omits the definite articles.
  * This card has an advanced form, "[[Flame Ruler]]", as suggested by their names and blue hair.
  ** This is further supported by the fact that their original DEF is 100 points higher than their original ATK.
