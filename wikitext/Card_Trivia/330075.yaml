title: Card Trivia:Showtime Street
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is a combination of [[Wikipedia:Times Square|Times Square]] and [[Wikipedia:Broadway (Manhattan)|Broadway]], two well-known areas located in [[Wikipedia:Manhattan|Manhattan]] in [[Wikipedia:New York City|New York City]] which are famous for their large billboards and commercial stage entertainment.
  ** Fittingly, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this card is [[Yusho Sakaki]]'s [[Action Card|Action]] [[Field Spell Card]], who is also a well-known [[Dueltainer]].
  ** This card's artwork features an advertisement for "Musical Heart", which is a parody of the advertisement for the well-known Broadway musical, ''[[wikipedia:The Phantom of the Opera (1986 musical)|The Phantom of the Opera]]''.
  * This card's artwork features different advertisements to the previous ''Yu-Gi-Oh!'' anime series, including:
  ** ''[[Yu-Gi-Oh! GX]]'':
  *** An advertisement for "[[Card Trooper]]", which debuted in the ''Yu-Gi-Oh! GX'' anime.
  ** ''[[Yu-Gi-Oh! 5D's]]'':
  *** An advertisement for "Stardust", referencing the "[[Stardust (archetype)|Stardust]]" [[archetype]] from the ''Yu-Gi-Oh! 5D's'' anime.
  ** ''[[Yu-Gi-Oh! ZEXAL]]'':
  *** An advertisement for "Quattro", referencing the character [[Quattro]] from the ''Yu-Gi-Oh! ZEXAL'' anime.
  *** An advertisement for "Shining Draw", referencing the [[Shining Draw]] ability from the ''Yu-Gi-Oh! ZEXAL'' anime.
  * In the original Japanese version of the ''Yu-Gi-Oh! ARC-V'' anime, this card has appeared multiple times in the anime during the introduction sequences before the first opening, [[Believe x Believe]] from {{episode|ARC-V|001|ref}} to {{episode|ARC-V|030|ref}}; however, its name was first revealed in {{episode|ARC-V|014|ref}}, when it was properly played for the first time on-screen.
