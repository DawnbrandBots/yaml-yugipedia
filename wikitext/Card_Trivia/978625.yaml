title: Card Trivia:Gaia, Conqueror of Champions
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] ''[[Rush Duel]]'' counterpart of "[[Gaia the Dragon Champion]]".
  ** This monster's pose is based on the artwork of "[[Gaia the Dragon Ch|Gaia the Dragon Champion]]" in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series.
  * This monster's [[Magical Knight]] [[Type]] is based on how "[[Gaia the Fierce Knight (manga)|Gaia the Fierce Knight]]" was the strongest monster of the Magical Knight Type in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * This is the first non-[[DARK]] Magical Knight [[Fusion Monster]] (being [[WIND]] instead), and the first that does not list a [[Spellcaster]] monster as [[Fusion Material]].
