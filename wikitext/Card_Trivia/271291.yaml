title: Card Trivia:Pot of Dichotomy
wikitext: |-
  {{Navigation}}

  * This pot is a combined form of "[[Pot of Avarice]]" and "[[Pot of Benevolence]]".
  ** This card's Japanese name, "Pot of Avarice and Selflessness" ({{Ruby|貪|どん}}{{Ruby|欲|よく}}で{{Ruby|無|む}}{{Ruby|欲|よく}}な{{Ruby|壺|つぼ}} ''Don'yoku de Muyoku na Tsubo''), is a combination of the Japanese names of "Pot of Avarice" ({{Ruby|貪|どん}}{{Ruby|欲|よく}}な{{Ruby|壺|つぼ}} ''Don'yoku na Tsubo'') and "Pot of Benevolence" ({{Ruby|無|む}}{{Ruby|欲|よく}}な{{Ruby|壺|つぼ}} ''Muyoku na Tsubo'', "Pot of Selflessness").
  ** This is the first combined [[Greed (series)|Pot]] card to not be a merged form of "[[Pot of Greed]]".
  * This card is a [[counterpart]] of "[[Pot of Duality]]".
