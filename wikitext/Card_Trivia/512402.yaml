title: Card Trivia:Lycanthrope
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Power Bind]]" and "[[Ritual Buster]]".
  * "[[Mystical Moon]]" appears in the background of this card's artwork.
  ** Fittingly, this monster is a valid target for the effect of "Mystical Moon".
  * This monster is based on a [[wikipedia:Werewolf|lycanthrope]], another term used for a werewolf, a human who transforms into a wolf-like creature, which is often depicted with human-like qualities.
  ** The appearance of "Mystical Moon" in this card's artwork references the mythology of werewolves, where a human transforms into a werewolf under a full moon.
  * This monster appears to be the human from the artwork of "[[Synthesis Spell]]", as seen by its pair of ripped trousers and experimental tubes, as well as patterned markings similar to the runes seen in that card's artwork.
  ** This card's artwork seems to depict this monster escaping from the laboratory where he was transformed from his original human form, based on the spotlights and the laboratory building in the background.
