title: Card Trivia:Leogun the Golden-Haired Magical Beast
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed ''[[Rush Duel]]'' [[counterpart]] of "[[Leogun]]".
  ** This monster's association with the [[War-Lion]] [[series]] is based on how, in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, "Leogun" was one of the monsters required to [[Ritual Summon]] "[[Super War-Lion]]".
