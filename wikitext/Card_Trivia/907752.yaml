title: Card Trivia:Aqua Sorcerer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Mismatched Rivalry]]".
  * This monster may be based on the blue copy of "[[Dark Sorcerer]]" that appears in the artwork of "[[Magiquartet Shock]]".
  * This monster has five [[counterpart]]s:
  ** 1 [[DARK]] counterpart: "Dark Sorcerer".
  ** 1 [[LIGHT]] counterpart: "[[Light Sorcerer]]".
  ** 1 [[FIRE]] counterpart: "[[Flare Sorcerer]]".
  ** 1 [[WIND]] counterpart: "[[Aero Sorcerer]]".
  ** 1 [[EARTH]] counterpart: "[[Earth Sorcerer]]".

  == See also ==
