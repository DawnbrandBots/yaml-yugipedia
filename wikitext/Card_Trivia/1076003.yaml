title: Card Trivia:Evil HERO Toxic Bubble
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Evil HERO]]" [[counterpart]] of "[[Elemental HERO Bubbleman]]".
  ** This monster visually resembles "[[Elemental HERO Neo Bubbleman]]", the [[Metamorphosis|metamorphosed]] form of "Bubbleman", given both monsters share a belt buckle of the letter "N" and fin-like details on the backs of their armor.
  ** This monster's effects to [[Special Summon]] itself from the [[hand]] and to [[Draw a card|draw two cards]] under the correct conditions once it has been Special Summoned are based on the effects of "Elemental HERO Bubbleman".
