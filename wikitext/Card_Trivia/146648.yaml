title: Card Trivia:Salvagent
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "salvation", "salvage", and "agent".
  ** This monster's effect reflects this, which can not only "salvage" a [[Synchro Monster]] from the [[Graveyard]], but also provides it "salvation" from the "[[Meklord]]" [[archetype]]'s anti-Synchro effects in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster's appearance and weapons are similar to that of "[[Stardust Phantom]]".
  ** Fittingly, both monsters were used by [[Yusei Fudo]] in the anime to Special Summon a monster related to the "[[Stardust (archetype)|Stardust]]" [[archetype]] from the Graveyard.
