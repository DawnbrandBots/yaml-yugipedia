title: Card Trivia:Sinister Seeds
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Demon Balsam Seed", is based on the ''[[wikipedia:Impatiens balsamina|Impatiens balsamina]]'', a species of flower native to India and Myanmar that is also known as "balsam".
  ** The balsam plant is known for blooming into multiple flowers (sometimes with a reddish hue) on a single stem, which is reflected in this card's effect to [[Special Summon]] "[[Sinister Seed Token]]s" for each multiple of a fixed amount of [[battle damage]].
