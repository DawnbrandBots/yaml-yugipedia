title: Card Trivia:Constellar Antares
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Upshift]]".
  * This monster's name is based on [[wikipedia:Antares|Antares]], the brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Scorpio (constellation)|Scorpio]].
  ** The constellation and the astrological symbol for [[wikipedia:Scorpio (astrology)|Scorpio]] (♏︎︎) appears in the background of this card's artwork, with the location of Antares denoted by the encircled star in the constellation.
  ** This monster features eight metallic limbs, two mechanical claws, and a scorpion-like chain weapon, referencing how Scorpio is also known as the "scorpion" constellation.
  * This monster has the highest [[original ATK]] (2400) of all [[Main Deck]] "[[Constellar]]" monsters.
