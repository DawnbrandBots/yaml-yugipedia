title: Card Trivia:Book of Moon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the Japanese version of ''[[Pharaonic Guardian (Japanese)|Pharaonic Guardian]]''.
  * This card has four [[counterpart]]s: "[[Book of Taiyou]]", "[[Book of Life]]", "[[Book of Eclipse]]", and "[[Book of Lunar Eclipse]]".
  ** This card also has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Book of Moon]]".
  * This card has an [[anime-only|anime-exclusive]] counterpart: "[[Book of Flip]]"
  * This card is the opposite counterpart of "[[Book of Taiyou]]".
  ** Both cards are named after the opposing celestial bodies representing the daytime and nighttime; "Taiyou's" ''[[TCG]]'' name is the Japanese word for "sun".
  ** This card can [[flip]] a [[face-up]] monster on the field into [[face-down]] [[Defense Position]], while "Book of Taiyou" can flip a [[face-down]] monster on the field into face-up [[Attack Position]].
  * In the German print of ''[[Legendary Collection 3: Yugi's World Mega Pack]]'', this card's effect is misprinted with the effect of "[[Creature Swap]]".
