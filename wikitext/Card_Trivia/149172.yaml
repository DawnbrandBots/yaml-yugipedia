title: Card Trivia:Odin, Father of the Aesir
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Storm of Ragnarok]]''.
  ** This is the first cover card in the ''[[Yu-Gi-Oh! 5D's]]'' [[Core Booster]] series to not feature any direct relation to the anime's protagonists.
  * This monster appears in the artwork of "[[Gotterdammerung]]".
  * "[[Nordic Relic Draupnir]]" and "[[Nordic Relic Gungnir]]" appear in this card's artwork.
  * This card is based on [[wikipedia:Odin|Odin]], the chief of the [[wikipedia:Æsir|Æsir]] and the Norse gods in [[wikipedia:Norse mythology|Norse mythology]] who is also known as the god of war, wisdom, and prophecy. In Norse mythology, Odin is depicted as a one-eyed old man with a long white beard who wields the mighty spear, [[wikipedia:Gungnir|Gungnir]], and possesses the magic gold ring, [[wikipedia:Draupnir|Draupnir]].
  ** This card's ''[[TCG]]'' name, "Odin, Father of the Aesir" is a reference to Odin's title in Norse mythology as "All-Father", serving as the father of gods and men.
  ** In Norse mythology, Odin sacrificed his left eye to drink from the [[wikipedia:Urðarbrunnr|Urðarbrunnr]] (the "Well of Urd"), which allowed him to see into the future.
  *** This myth is referenced by this monster's covered left eye and the card, "[[Odin's Eye]]", which can be used in conjunction with this card.
  * In the ''Yu-Gi-Oh! 5D's'' anime, this monster had the same [[Attribute]] ([[DIVINE]]) and [[Type]] ([[Divine-Beast]]) as "[[Thor, Lord of the Aesir (anime)|Thor, Lord of the Aesir]]" and "[[Loki, Lord of the Aesir (anime)|Loki, Lord of the Aesir]]".
  ** In the anime, this monster was depicted as the tallest of the three "Aesir" monsters, while "Loki" was the shortest, and "Thor" was the second tallest.
  * This card, "[[Arcana Force EX - The Dark Ruler]]", "[[Arcana Force EX - The Light Ruler]]", "[[Sandaion, the Timelord]]", and "[[Sephylon, the Ultimate Timelord]]" have the highest [[DEF]] (4000) of all [[Fairy]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  * This monster currently has the longest known [[Summon chants in Yu-Gi-Oh! 5D's#Halldor|Summon chant]] of any monster in the anime.
