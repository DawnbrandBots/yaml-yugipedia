  * This monster has a [[Link Monster|Link]] [[Counterpart|evolution]]: "[[Enlilgirsu, the Orcust Mekk-Knight]]".
  * This monster's effect to Summon a "World Legacy Token" and treating itself as a [[Tuner monster]] reference the bond between "[[Ningirsu the World Chalice Warrior]]" and "[[Ib the World Chalice Priestess]]", as its effect facilitates the [[Synchro Summon]] of this monster's sister, "[[Ib the World Chalice Justiciar]]".
  ** Also, the orange ribbon this monster is holding is the same as that of "[[Crowned by the World Chalice]]".
