title: Card Trivia:Gurifoh
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Mind Scan (card)|Mind Scan]]".
  * This monster is "[[Kuriboh]]" wearing a hood based on "[[Griffore]]".
  ** This monster references a scene from {{chapter|Yu-Gi-Oh!|118|ref}}, where [[Dark Yugi (manga)|Dark Yugi]] offered "[[Kuriboh (manga)|Kuriboh]]" and "[[Griffore (manga)|Griffore]]" among the [[Tribute]]s with "[[Black Luster Ritual (manga)|Black Luster Ritual]]" to [[Ritual Summon]] "[[Black Luster Soldier (manga)|Black Luster Soldier]]", during his [[Duel]] against [[Mai Kujaku (manga)|Mai Kujaku]].
