title: Card Trivia:Jongleur-Ghoul Illusionist
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, (ジョングルグール ''Jongurugūru'') and appearance features multiple puns:
  ** "Jongleur" (ジョングルール ''Jongurūru'') is based on another word for a [[wikipedia:Minstrel|minstrel]], a medieval entertainer whose various skills include singing, music, and juggling.
  ** ''Guruguru'' (グルグル) is the Japanese onomatopoeia for something swirling, which is reflected by this monster's [[flavor text]] mentioning that its eyes are able to spin.
  ** "Ghoul" (グール ''Gūru'') is based on an evil spirit or phantom that robs graves and feeds on dead bodies.
  * This monster is depicted overlapping a white border, while the Japanese flavor text uses full hiragana and spaces instead of periods, referencing the presentation of cards in the earlier installments of the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series.
  ** The first hiragana letter of each sentence, when put together, spell out "もうおそい", which translates to "It's too late".
  *** In the Chinese translation, the first characters of each line combine to make "已无处可逃", which translates to "There is nowhere to escape".
  * This is the first [[Illusion]] [[Normal Monster]], and is consequently the first Illusion monster to not feature the effect to prevent monsters from being destroyed in battles involving itself.
