title: Card Trivia:Don Thousand/Monster B
wikitext: |-
  {{Navigation}}

  * This is the only card to have a printed ATK of five digits.
  ** The word "ATK" at the bottom of the card's text box has been shifted to the left to fit the five digits. This is in contrast to "[[Don Thousand/Monster C]]", which changes the font/spacing of the text to fit the digits.
