title: Card Trivia:Zubaba Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Guard Plus]]", "[[Onomatopia]]", "[[Onomatopickup]]", and "[[United Front]]".
  * This card appears in the artwork of "[[Three Card Summon]]".
  * This monster's name is derived from the Japanese sound effect, "''zuba''", which is used to represent something being cut or sliced with a single blow, which reflects this monster's usage of its swords and its effect to [[destroy]] and opponent's [[Defense Position]] monster.
  * This monster has an "[[Astral (archetype)|Astral]]" [[counterpart]]: "[[Astral Knight]]".
  * This monster has a ''[[Rush Duel]]'' [[Baseball]] parody: "[[Zubaba Batter]]".
  * This monster has a retrained counterpart: "[[Zubababa Knight]]".
  * Despite the numerous times this monster appeared in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, its effect was never used.
  ** This monster shares this trait with "[[Ganbara Knight]]", another one of [[Yuma Tsukumo]]'s first monsters in the ''Yu-Gi-Oh! ZEXAL'' anime.
