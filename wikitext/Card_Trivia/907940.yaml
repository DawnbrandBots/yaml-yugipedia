title: Card Trivia:Dyna Mondo
wikitext: |-
  {{Navigation}}

  * Two "[[Bonfire]]" appear in this card's artwork.
  * This monster's Japanese name ({{name|Dyna Mondo|ja}}, ''{{romanized name|Dyna Mondo|ja}}'') can be understood as follows:
  ** ''Daina'' (大儺) is a modified alternate Japanese name (usually read as ''taina'') for the Sino-Japanese exorcist rituals of the [[wikipedia:Nuo folk religion|Nuo folk religion]] (追儺).
  ** ''Mondo'' (主水) is the shortened form for ''mondo no tsukasa'' (主水司), the water supply bureau of the [[wikipedia:Ministry_of_the_Imperial_Household|Ministry of the Imperial Household]]. The use of the title is likely a form of ''hyakkanna'' (百官名), which is the use of an official title as one's informal given name.
  *** Taken together, the monster's Japanese name can be interpreted to mean "Mondo the Exorcist".
