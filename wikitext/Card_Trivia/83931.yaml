title: Card Trivia:Penumbral Soldier Lady
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is based on the penumbra, the shadow that partially eclipses an area of the Moon.
  * This monster has a [[LIGHT]] [[counterpart]]: "[[Luminous Soldier]]".
  ** Both are based on the Moon and the Sun, respectively; this monster's Japanese name is "Moon Soldier Lady", while the Japanese name of "Luminous Soldier" is "Sun Soldier".
  ** Both share the same [[original ATK and DEF]] (2100/1400) and effects that raise their [[ATK]] against the opposite [[Attribute]].
  ** Both were used as [[Fusion Material]]s required for the [[Fusion Monster]]s mentioning "[[Keeper Shield Token]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime; [[Penumbral Soldier Lady (anime)|this monster]] was used to Summon "[[Penumbral Keeper]]", while "[[Luminous Soldier (anime)|Luminous Soldier]]" was used to Summon "[[Luminous Keeper]]".
