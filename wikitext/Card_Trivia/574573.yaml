title: Card Trivia:Elemental HERO Cosmo Neos
wikitext: |-
  {{Navigation}}

  * "[[Neo Space]]" appears in the background of this card's artwork.
  * This monster is a [[Quadruple Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with three "[[Neo-Spacian]]" monsters.
  ** Visually, this monster is a combination of "[[Elemental HERO Chaos Neos]]", "[[Elemental HERO Magma Neos]]", and "[[Elemental HERO Storm Neos]]".
  *** "Chaos Neos": Its outer wings, mask, two-clawed feet, and right hand.
  *** "Magma Neos": Its lower metal wings, [[wikipedia:Greave|greaves]], and left forearm.
  *** "Storm Neos": Its inner wings, shoulders, pelvis, and elbow blades.
  ** This monster is also similar to "[[Elemental HERO Divine Neos]]", as by extension, it is also a Fusion of "Neos" and all six "Neo-Spacian" monsters, since each of the three aforementioned Fusion Monsters requires two different "Neo-Spacian" monsters as [[Fusion Material]]s: "[[Neo-Spacian Flare Scarab|Flare Scarab]]" and "[[Neo-Spacian Grand Mole|Grand Mole]]" for "Magma Neos", "[[Neo-Spacian Dark Panther|Dark Panther]]" and "[[Neo-Spacian Glow Moss|Glow Moss]]" for "Chaos Neos", and "[[Neo-Spacian Air Hummingbird|Air Hummingbird]]" and "[[Neo-Spacian Aqua Dolphin|Aqua Dolphin]]" for "Storm Neos".
  * This is the first and currently only [[Level 11]] "Elemental HERO" monster.
  * This is the first and currently only "[[Neos]]" Quadruple Contact Fusion Monster.
  * This monster has the highest [[original ATK]] (3500) of all "Elemental HERO" monsters.
