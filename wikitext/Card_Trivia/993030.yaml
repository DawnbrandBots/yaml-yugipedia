title: Card Trivia:T.G. All Clear
wikitext: |-
  {{Navigation}}

  [[File:TG Synchro Summon.png|thumb|250px|"[[T.G. Jet Falcon (anime)|T.G. Jet Falcon]]" being used as a [[Synchro Material]].]]
  * "[[T.G. Star Guardian]]" appears in this card's artwork.
  ** This card's artwork is based on the unique Synchro Summoning animation used for non-[[Accel Synchro Monster|Accel]] "[[T.G.]]" [[Synchro Monster]]s in {{episode|5D's|144|ref}}
  * This card's name references the [[Summon chants in Yu-Gi-Oh! 5D's#Antinomy|Summon chants]] used by [[Antinomy]] when Synchro Summoning a "T.G." Synchro Monster in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This card's effect to turn "T.G." monsters into [[Machine]] monsters references how in the anime, all "T.G." monsters that are not Machine-[[Type]] have an effect that also treats them as Machine monsters.

