title: Card Trivia:Man-Eating Treasure Chest
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Mimic (Dungeons & Dragons)|mimic]], a shapeshifting creature in the fantasy genre that lures in prey by disguising itself as something innocuous or desirable (e.g. a treasure chest).
  * This card's [[flavor text]] lore is similar to that of "[[Yaranzo]]", another "monster-in-a-box" card that disguises itself as a treasure chest to attack unwary passersby.
