title: Card Trivia:Karakuri Ninja mdl 7749 "Nanashick"
wikitext: |-
  {{Navigation}}

  * The '''7749''' of this card's name represents a multiplication problem: 7 x 7 = 49.
  ** The number is also written in Japanese on this monster's right arm: 七七四九.
  * This is the strongest "[[Karakuri]]" monster (in terms of [[ATK]]) that is not a [[Synchro Monster]].
  * This monster is armed with a [[wikipedia:Katana|katana]] and a [[wikipedia:Chakram|chakram]]. As a reference to this card being a mechanical "[[Ninja]]", the chakram and the crossguard of the sword are gear-shaped.
