title: Card Trivia:Subterror Behemoth Fiendess
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Extra Pack 2017]]''.
  * This monster appears in the artwork of "[[Parthian Shot]]".
  * This monster is the [[Card evolutions|upgraded]] [[Link Monster|Link]] [[counterpart]] of "[[Subterror Fiendess]]".
  * This is the first [[Wyrm]] Link Monster.
  * This is the first "[[Subterror]]" [[Extra Deck]] monster, as well as the first ''[[OCG]]''-original "Subterror" monster.
