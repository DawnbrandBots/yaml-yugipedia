title: Card Trivia:Holding Arms
wikitext: |-
  {{Navigation}}

  * This monster and "[[Plasma Eel]]" serve as replacements for "[[Viser Des (manga)|Viser Des]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** All three monsters share the same [[Attribute]] ([[DARK]]), [[Level]] (4), and [[original ATK and DEF]] (500/1200) and are used by [[Yami Marik]].
  *** This monster shares the same [[Fiend]] [[Type]] as "Viser Des" in the anime and the ''[[OCG]]''/''[[TCG]]''.
  ** All three monsters feature a similar effect that [[target]]s an opponent's monster and prevent them from being [[destroyed by battle]].
  *** Also, this monster and "Viser Des" are depicted as torturous restraints in their respective debut media, designed to prevent the opponent from moving when combined with their counterparts ("[[Holding Legs (anime)|Holding Legs]]" in the anime, "[[Viser Shock (manga)|Viser Shock]]" in the manga).
