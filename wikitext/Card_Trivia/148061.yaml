title: Card Trivia:Mystical Shine Ball
wikitext: |-
  {{Navigation}}

  * Three different-colored copies of this monster (blue, red, and purple) appear in the artwork of "[[The Agent of Creation - Venus]]" and "[[The Agent of Destruction - Venus]]".
  ** This monster also possibly appears in the artwork of "[[The Agent of Mystery - Earth]]", serving as the head of its staff.
