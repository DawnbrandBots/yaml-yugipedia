title: Card Trivia:Flying Kamakiri 1
wikitext: |-
  {{Navigation|Flying Kamakiri #1}}

  * This monster appears in the artwork of "[[Insect Rampage]]".
  * This card's ''[[TCG]]'' name, "Kamakiri", is the Japanese word for "mantis".
  * This card has a [[counterpart]]: "[[Flying Kamakiri 2|Flying Kamakiri #2]]".
  * This card has five [[Attribute]] counterparts.
  ** [[EARTH]]: "[[Giant Rat]]".
  ** [[FIRE]]: "[[UFO Turtle]]".
  ** [[WATER]]: "[[Mother Grizzly]]".
  ** [[DARK]]: "[[Mystic Tomato]]".
  ** [[LIGHT]]: "[[Shining Angel]]".
