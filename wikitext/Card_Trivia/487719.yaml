title: Card Trivia:Supreme Rage
wikitext: |-
  {{Navigation}}

  * The silhouettes "[[Clear Wing Synchro Dragon]]", "[[Dark Rebellion Xyz Dragon]]", "[[Odd-Eyes Pendulum Dragon]]", "[[Starving Venom Fusion Dragon]]", and "[[Supreme King Z-ARC]]" appears in this card's artwork. 
  ** The silhouettes of the [[Four Dimension Dragons]] in the foreground are based on the same poses as depicted in their respective original card artworks.
  ** This card's artwork references how in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, the aforementioned monsters are depicted as silhouettes during the flashback scenes of the [[Original Dimension]].
