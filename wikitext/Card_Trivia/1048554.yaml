title: Card Trivia:Cosmic Tree Irmistil
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Yggdrasil|Yggdrasil]], the immense tree that connects the [[wikipedia:Norse cosmology|Nine Worlds]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** Its name may be based on [[wikipedia:Irminsul|Irminsul]], a pillar-like object that is related to Yggdrasil.
