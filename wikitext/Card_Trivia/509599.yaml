title: Card Trivia:Hero Mask
wikitext: |-
  {{Navigation}}

  * This card appears in the ''[[OCG]]''/''[[TCG]]'' artwork of "[[Vain Betrayer]]".
  * The mask of "[[Elemental HERO Avian]]" appears in this card's artwork.
  ** This card's name, artwork, and effect reflects this, as this card allows a monster to don the mask of an "Elemental HERO", thereby assuming its identity.
