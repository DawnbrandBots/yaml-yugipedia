title: Card Trivia:Urgent Schedule
wikitext: |-
  {{Navigation}}

  * "[[Flying Pegasus Railroad Stampede]]", "[[Night Express Knight]]", the green-lit signal from the artwork of "[[Special Schedule]]", and the [[Graveyard]] portal from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime appear in this card's artwork.
  ** The scene depicted in this card's artwork appears to take place in the same tunnel as "Special Schedule".
  ** Ironically, despite this card's artwork, "Night Express Knight" cannot be [[Special Summon]]ed by this card's effect.
