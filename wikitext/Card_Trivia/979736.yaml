title: Card Trivia:Qebehsenuef, Protection of Horus
wikitext: |-
  {{Navigation}}

  * A carving of this monster appears in the artwork of "[[Walls of the Imperial Tomb]]".
  * This monster is named after a [[wikipedia:Four sons of Horus|Qebehsenuef]], one of the four sons of [[wikipedia:Horus|Horus]] depicted with the head of a falcon, who represents the [[wikipedia:Canopic jar|canopic jar]] of the intestines in [[wikipedia:Egyptian mythology|Egyptian mythology]].
  ** According to Egyptian mythology, Qebehsenuef is under the protection of [[wikipedia:Serket|Serket]], the Egyptian goddess associated with the scorpion. Fittingly, this monster shares its [[original ATK and DEF]] (2500/2000) with "[[Mystical Beast of Serket]]", a monster based on Serket's scorpion iconography.
