title: Card Trivia:Mecha Phantom Beast Turtletracer
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Grumman E-1 Tracer|E-1 Tracer]] and the [[wikipedia:Turtle|turtle]].
  * This monster, "[[Mecha Phantom Beast Sabre Hawk]]", and "[[Mecha Phantom Beast Concoruda]]" are the only "Mecha Phantom Beast" monsters that don't have effects that Special Summon "Mecha Phantom Beast Tokens".
  ** Fittingly, their artworks reflect this with "Mecha Phantom Beast Tokens" being nonexistent in them.
