title: Card Trivia:Infinitrack Fortress Megaclops
wikitext: |-
  {{Navigation}}

  * This was the first Link Monster to list an [[Xyz Monster]] as [[Link Material]].
  * This monster is equipped with [[wikipedia:Excavator|excavators]].
  * This monster appears in the artwork of "[[Heavy Forward]]" (albeit only its base).
  * This card has the highest [[ATK]] of all [[Link Rating|Link]] 3 monsters.
