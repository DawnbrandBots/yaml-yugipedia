title: Card Trivia:Photon Slasher
wikitext: |-
  {{Navigation}}

  * This card seems to be an advanced version of "[[Photon Thrasher]]" or lesser form of "[[Starliege Paladynamo]]".
  ** In fact, this card's [[TCG]] name is another possible transliteration of "[[Photon Thrasher]]'s" Japanese name.
  * This card has the same [[Attribute]], [[ATK]] and [[Level]] as "[[Cyber Dragon]]". They also have a similar summoning condition.
