title: Card Trivia:Fires of Shiranui
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on the ''shiranui'', a ghostly phenomenon from the Japanese folklore of [[wikipedia:Kyūshū|Kyūshū]]. According to the folklore, during the nights in the last days of the seventh month in Japan's old calendar, strange fiery lights appear above the waters of the [[wikipedia:Yatsushiro Sea|Yatsushiro Sea]] and the [[wikipedia:Ariake Sea|Ariake Sea]].
