title: Card Trivia:Legend Lineage Saber
wikitext: |-
  {{Navigation}}

  * The saber of "[[Grand Legend Saber]]" appears in this card's artwork.
  * This monster is an [[Counterpart|upgraded]] [[Ritual Monster|Ritual]] form of "[[Legend Saber]]".
  * This is the first [[Celestial Warrior]]-[[Type]] Ritual Monster, as well as the first Celestial Warrior-Type monster that isn't a [[Fusion Monster]].
  ** This is the first time a Fusion Type introduced in the ''[[Yu-Gi-Oh! SEVENS|SEVENS]]'' era was used on a non-Fusion Monster.
