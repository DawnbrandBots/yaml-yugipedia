title: Card Trivia:Nega-Ton Corepanel
wikitext: |-
  {{Navigation}}

  * The machine is being powered by an "[[Iron Core of Koa'ki Meiru]]", which you can see in the bottom of the card's artwork.
  ** It appears that a pre-exploding "[[Core Blast]]" is hooked up to the machine.
  * This card's name is a pun of "megaton" and "negation".
