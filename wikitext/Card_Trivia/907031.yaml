title: Card Trivia:Ancient Warriors Saga - East-by-South Winds
wikitext: |-
  {{Navigation}}

  * This card is based on an event in the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', when [[wikipedia:Zhuge Liang|Zhuge Liang]] [[wikipedia:List of fictitious stories in Romance of the Three Kingdoms|changes to wind direction from northwest to southeast]] during the [[wikipedia:Battle of Red Cliffs|Battle of Red Cliffs]], in order to aid [[wikipedia:Zhou Yu|Zhou Yu's]] attack on [[wikipedia:Cao Cao|Cao Cao's]] fleet, setting it ablaze.
  ** Fittingly, "[[Ancient Warriors - Ingenious Zhuge Kong]]" appears in this card's artwork.
