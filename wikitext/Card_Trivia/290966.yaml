  [[File:Utopia Xyz Evolution.png|thumb|250px|"[[Number 39: Utopia (anime)|Number 39: Utopia]]" undergoing [[Xyz Evolution#Chaos Xyz Evolution|Chaos Xyz Evolution]].]]

  * The [[neutral form]] of "[[Number 39: Utopia]]" appears in this card's artwork.
  ** This card's artwork depicts "[[Number 39: Utopia (anime)|Number 39: Utopia]]" undergoing [[Xyz Evolution#Chaos Xyz Evolution|Chaos Xyz Evolution]] (known in Japanese as "Chaos Xyz Change") to [[Xyz Summon]] "[[Number C39: Utopia Ray (anime)|Number C39: Utopia Ray]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.

