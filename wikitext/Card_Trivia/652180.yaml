title: Card Trivia:Armatos Legio Plumbum Trident
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's name is a combination of the words ''"plumbum"'' (the Latin name for the [[wikipedia:Chemical element|element]] [[wikipedia:Lead|lead]]) and the [[wikipedia:Trident|trident]].
  ** The 3 upward pointing [[Link Arrow]]s of this card are likely a reference to the three prongs of a trident.
  ** They could also reference the Link Arrows of [[Judgment Arrows]], which this card can search upon destruction.
