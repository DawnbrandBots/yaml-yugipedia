title: Card Trivia:Stellarknight Zefraxciton
wikitext: |-
  {{Navigation}}

  * This monster is the "[[tellarknight]]"/"[[Zefra]]" version of "[[Evilswarm Exciton Knight]]", sharing the same [[Type]], [[Attribute]], [[ATK]] and [[DEF]].
  * The constellation behind this monster is [[wikipedia:Musca|Musca]], the "Great Fly" constellation. This further ties in this monster's connections with the demon [[wikipedia:Beelzebub|Beelzebub]].
  * This card has the same gray sphere as "[[Qliphort Stealth]]" and "[[Infernoid Antra]]". Beelzebub, from which "Antra's" OCG name is derived, is also a reference to "Evilswarm Exciton Knight's" Japanese name, ''"'''Verzbuth''', the Exciton-Glimmer Knight"''.
  * This monster appears in the artwork of "[[Chosen of Zefra]]".
  * This is the first "[[Stellarknight]]" monster that is not an [[Xyz Monster]].
  * This is the first "[[Tellarknight]]" [[Fiend]]-Type monster.
