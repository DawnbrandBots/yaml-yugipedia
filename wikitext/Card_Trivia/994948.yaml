title: Card Trivia:Dice Angel
wikitext: |-
  {{Navigation}}

  * This is the ''[[Rush Duel]]'' [[Monster Card]] version of "[[Graceful Dice (Rush Duel)|Graceful Dice]]".
  ** This monster's Japanese name (サイコロの天使, ''Saikoro no Tenshi'') is the inversion of the Japanese name for "Graceful Dice", "Angel's Dice" (天使のサイコロ, ''Tenshi no Saikoro'').
  * This monster has an [[Card evolutions|upgraded]] version: "[[Dice Archangel]]".
  * This monster has an [[ATK]]/[[DEF]]-decreasing [[counterpart]]: "[[Dice Demon]]".

