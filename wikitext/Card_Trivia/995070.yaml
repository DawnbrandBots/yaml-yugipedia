title: Card Trivia:Abyssal Dragon Lord Abyss Poseidra (R)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Abysslayer Quintiamat]]".
  * This monster is based on [[wikipedia:Cetus (mythology)|Cetus]], a sea monster in [[wikipedia:Greek mythology|Greek mythology]] who is often depicted as a giant sea serpent.
  ** According to Greek mythology, [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea, released Cetus to attack the ancient city of [[wikipedia:Aethiopia|Aethiopia]] after [[wikipedia:Cassiopeia (mother of Andromeda)|Queen Cassiopeia]] boasted that she and her daughter [[wikipedia:Andromeda (mythology)|Andromeda]] were more beautiful than the beautiful sea-nymphs. This is reflected in this monster's association with "[[Abyssal Dragon Lord Abyss Poseidra]]", a [[Maximum Monster]] based on Poseidon.
