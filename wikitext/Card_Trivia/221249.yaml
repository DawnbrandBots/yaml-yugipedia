title: Card Trivia:Stray Cat Girl
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This is the female, human counterpart of "[[Stray Cat]]".
  * This card's video game [[Special Summon]]ing effect references this card's appearance in {{episode|ZEXAL|039|ref}}, where [[Cathy Katherine]] Special Summons this card via the effect of the [[Quick-Play Spell Card]] "[[Cat Food]]" during [[Pip]]'s [[Battle Phase]], which requires the player to [[Tribute]] "[[Stray Cat (anime)|Stray Cat]]", the [[Level 1]] [[Beast]] monster.
