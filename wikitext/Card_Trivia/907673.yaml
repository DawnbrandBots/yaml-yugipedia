title: Card Trivia:Water Break
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[wikipedia:Mizuwari|Mizuwari]]" is a term for the type of way to mix alcoholic beverages in Japan; two parts of cold water are mixed with one part of the spirit and some ice. Such practice has originated from ''[[wikipedia:Shōchū|Shōchū]]'' traditions.
