title: Card Trivia:Destiny HERO - Destroyer Phoenix Enforcer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[2025 Mega-Pack Tin]]''.
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Elemental HERO Phoenix Enforcer]]" and "[[Destiny HERO - Plasma]]".
  ** Fittingly, both can be used as [[Fusion Material]]s for this monster's [[Fusion Summon]].
  ** Both monsters were used by [[Aster Phoenix]] in the ''[[Yu-Gi-Oh! GX]]'' anime; the former as an ace monster and alter-ego used to seek vengeance against the one responsible for his father's murder (disappearance in the English dubbed version), and the latter after defeating [[The D]] under the influence of [[The Light of Destruction]].
  * This is the "[[Destiny HERO]]" [[counterpart]] of "[[Elemental HERO Shining Phoenix Enforcer]]".
  ** Both share the same [[Level]] (8), [[Type]] ([[Warrior]]), and [[original ATK and DEF]] (2500/2100).
  ** Both can manipulate [[ATK]] based on the number of "[[HERO]]" monsters in the Graveyard: This monster decreases the opponent's monsters' ATK by 200 for each "HERO" monster, while "Shining Phoenix Enforcer" gains 300 ATK for each "Elemental HERO" monster.
  ** Both feature an effect that allows them to remain on the field: This monster can [[Special Summon]] itself from the Graveyard during the next [[Standby Phase]], while "Shining Phoenix Enforcer" cannot be [[destroyed by battle]].
  *** This monster's last effect may be a reference to the [[wikipedia:Phoenix (mythology)|phoenix]], a mythical bird that can continually revive itself after death. Fittingly, this monster's name is based on a phoenix, which in turn references Aster Phoenix.
  *** This monster's last effect is also similar to the last effect of "[[Destiny End Dragoon]]", the last [[signature card]] used by Aster in the anime.
