title: Card Trivia:The Agent of Entropy - Uranus
wikitext: |-
  {{Navigation}}

  * This monster is based on the planet [[wikipedia:Uranus|Uranus]], which appears in the background of this card's artwork.
  ** This monster may also be based on [[wikipedia:Uranus (mythology)|Uranus]], the Greek god of the sky, which serves as the namesake of the planet.
