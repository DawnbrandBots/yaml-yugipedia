title: Card Trivia:Cockadoodledoo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Shateki]]" (as a toy).
  * The three hamsters in this card's artwork appear in the artwork of "[[Cheepcheepcheep]]".
  ** Fittingly, this monster is the older version of "Cheepcheecheep". This is further supported by the fact that this monster can be [[Special Summon]]ed by the effect of "Cheepcheepcheep".
  * This monster's name is based on the onomatopoeia of a rooster's crowing.
