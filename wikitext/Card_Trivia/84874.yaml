title: Card Trivia:The Rival's Name
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Red-Eyes Black Dragon]]" and a [[Ra Yellow]] student, and a [[Duelist]] resembling [[Joey Wheeler]] appears in this card's artwork.
  * The kanji used in this card's Japanese name suggests its title is "Name of a Rival", but the furigana uses ''tomo'' (とも) which means "friend" instead. This references the circumstances surrounding this card's use in {{episode|GX|176|ref}} when [[Jaden Yuki]] uses it to [[target]] "[[Rainbow Dragon (anime)|Rainbow Dragon]]" in [[Jesse Anderson]]'s [[Graveyard]], who was technically an opponent during their Triangle Duel with [[Yusuke Fujiwara]].
  * Despite being a [[Continuous Spell Card]] in both ''[[Yu-Gi-Oh! GX]]'' and the ''[[Tag Force]]'' series, this card is refereed to as a [[Trap Card]] in the files for ''[[Yu-Gi-Oh! Duel Links]]''.
