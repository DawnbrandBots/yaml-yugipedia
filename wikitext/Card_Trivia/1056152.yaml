title: Card Trivia:Bettan Bat
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|面子蝙蝠|メンコウモリ}}, ''Menkoumori'') is a portmanteau of the words "''[[wikipedia:Menko|menko]]''" ({{Ruby|面子|めんこ}}) and "bat" ({{Ruby|蝙蝠|コウモリ}}, ''koumori'').
  ** ''Menko'' is a Japanese children's game where square cards are thrown on the ground and players must use their card to flip over the other cards on the ground. This is reflected in this monster's [[coin toss]] effect, which will change a monster's [[battle position]] to [[face-up]] [[Attack Position]] if heads, or [[face-down]] [[Defense Position]] if tails.
