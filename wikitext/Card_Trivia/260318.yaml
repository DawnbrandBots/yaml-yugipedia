title: Card Trivia:White Dragon Wyverburster
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the words "[[wikipedia:wyvern|wyvern]]" and "[[wikipedia:X-ray burster|burster]]".
  * This card is the [[LIGHT]] counterpart of "[[Black Dragon Collapserpent]]".
  ** Both have "[[Chaos]]"-style Summoning requirements.
  ** This card's effect can search "[[Black Dragon Collapserpent]]" when sent from the field to the GY.
  ** This monster seems to be a smaller/younger version of "[[Lightpulsar Dragon]]" while "[[Black Dragon Collapserpent]]" being smaller/younger version of "[[Darkflare Dragon]]".
