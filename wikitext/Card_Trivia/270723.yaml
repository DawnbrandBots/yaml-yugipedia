title: Card Trivia:Crimson Knight Vampire Bram
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to [[wikipedia:Bram Stoker|Bram Stoker]], the author of ''[[wikipedia:Dracula|Dracula]]''.
  * This card's Japanese name, "Edelritter", is German for "noble knight".
  ** The kanji 「{{Ruby|紅貴士|エーデルリッター}}」 (''Kōkishi'', "Crimson Noble Knight", read as ''Ēderurittā'', "Edelritter") in this card's Japanese name is a portmanteau of 「高貴」 (''Kōki'', "Noble") and 「騎士」 (''Kishi'', "Knight"), with the kanji 「紅」 (''Kō'', "Crimson") being a homophone of 「高」.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Shadow Vampire]]".
