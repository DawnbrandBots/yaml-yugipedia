title: Card Trivia:Necroman the Third
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on "Necromancer" (ネクロマンサー ''Nekuromansā'') and "Third" (サード ''Sādo'').
  * This monster is based on Arsène Lupin III, the titular protagonist of the manga series, ''[[wikipedia:Lupin the Third|Lupin III]]''.
  ** This monster shares the same face and clothing style as Lupin III, especially his signature red suit jacket.
  * This monster is also based on Kaito Kuroba, also known as Kaito Kid from ''[[wikipedia:Magic Kaito|Magic Kaito]]''.
  ** This monster's cape is based on Kaito's. Additionally, his disembodied head is based on an illusion Kaito employs using a decoy head.
