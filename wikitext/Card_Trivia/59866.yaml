title: Card Trivia:Forbidden Chalice
wikitext: |-
  {{Navigation}}

  * Similarly to the other "[[Forbidden (archetype)|Forbidden]]" [[Spell Card]]s, this chalice is based on a holy relic, the [[wikipedia:Holy Chalice|Holy Chalice]], which [[wikipedia:Jesus|Jesus]] used at the [[wikipedia:Last Supper|Last Supper]] to serve wine.
  * A black version of this chalice appears in the artwork of "[[Forbidden Droplet]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Forbidden Chalice]]".
