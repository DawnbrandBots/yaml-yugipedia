title: Card Trivia:Nimble Momonga
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Beast Rage]]", "[[Night Before the Big March]]" (as a silhouette), and "[[The Big March of Animals]]".
  * This monster is based on the [[wikipedia:Japanese dwarf flying squirrel|Japanese dwarf flying squirrel]], whose scientific name is the ''Pteromys momonga''.
  * This monster has a [[counterpart]]: "[[Nimble Musasabi]]".
  ** Both monsters are based on different species of Japanese flying squirrel.
  ** Coincidentally, both cards also share the same ''[[TCG]]'' expansion set [[card number]] of "086".
  * This monster appears to be the opposing counterpart to "[[Giant Germ]]", who debuted in the same set as it, ''[[Pharaoh's Servant (Japanese)|Pharaoh's Servant]]'':
  ** Both monsters share the same [[original ATK and DEF]] (1000/100).
  ** Both monsters feature an effect that manipulates [[Life Point]]s upon being [[destroy]]ed. This monster increases the player's Life Points, while "Giant Germ" decreases the opponent's Life Points.
  ** Both monsters feature effects that [[Special Summon]]s multiple copies of itself from the [[Deck]]. This monster Special Summons multiple copies of itself in [[face-down]] [[Defense Position]], while "Giant Germ" Special Summons multiple copies of itself in face-up [[Attack Position]].
