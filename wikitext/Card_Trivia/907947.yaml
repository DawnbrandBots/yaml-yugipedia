title: Card Trivia:Yamatako Orochi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ryu-Ge Realm - Sea Spires]]".
  * This monster's name is a pun on ''[[wikipedia:Yamata no Orochi|Yamata no Orochi]]'' (ヤマタノオロチ), a legendary creature from [[wikipedia:Japanese mythology|Japanese mythology]], and ''tako'' (タコ, "octopus").
