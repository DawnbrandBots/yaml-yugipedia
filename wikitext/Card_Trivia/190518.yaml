title: Card Trivia:Xyz Territory
wikitext: |-
  {{Navigation}}

  * "[[Evolzar Dolkka]]" appears in this card's artwork.
  * This is the first card to feature an effect that refers to [[Rank]]s of [[Xyz Monster]]s and the first [[Field Spell Card]] to support Xyz Monsters.
  * This card is similar to "[[Xyz Colosseum]]", as they are both Field Spell Cards and features effects of increasing an Xyz Monster's [[ATK]] by 200 and limiting players to attacking with Xyz Monsters.
  ** This card gives an attacking Xyz Monster 200 ATK x its [[Rank]], while "Xyz Colosseum" merely gives an Xyz Monster 200 ATK.
