title: Card Trivia:Earthbound Immortal Wiraqocha Rasca
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectible Tins 2009 Wave 2]]''.
  * This monster appears in the artwork of "[[Earthbound Linewalker]]" and "[[Ultimate Earthbound Immortal]]".
  * This monster is based on the condor [[wikipedia:Geoglyph|geoglyph]] of the [[wikipedia:Nazca Lines|Nazca Lines]].
  ** Specifically, this monster is based on the [[wikipedia:Andean Condor|Andean condor]], which is one of the most sacred animals in [[wikipedia:Inca mythology|Inca mythology]] and one of [[wikipedia:Peru|Peru]]'s national animals, as well as [[wikipedia:Ecuador|Ecuador]]'s national and most venerated animal.
  * This monster's name is derived from [[wikipedia:Viracocha|Wiracocha]], the creator and supreme deity in the pre-Inca and [[wikipedia:Inca mythology|Inca mythology]].
  * This is the only "[[Earthbound Immortal]]" monster whose effect was changed in the ''[[OCG]]''/''[[TCG]]'', as it can [[shuffle]]s cards the player control into the [[Deck]] and gains 1000 [[ATK]] for each card shuffled, while its anime effect reduced the opponent's [[Life Points]] to 1 if its controller skipped their [[Battle Phase]].
  ** This is also the only "Earthbound Immortal" whose [[original ATK and DEF]] were changed in the ''OCG''/''TCG'': this monster has 100 ATK and 100 [[DEF]], while in the anime, it had 1 ATK and 1 DEF.
  * This is the [[signature card]] of [[Rex Goodwin]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** Like the other "Earthbound Immortals" used by the [[Dark Signer]]s, this monster represents its owner and their initial ambitions and desires; in this case, this monster represents Rex Goodwin and his desire to rule over the world.
  *** This monster being based on the Andean condor, the largest flying land bird in the Western Hemisphere, reflects Goodwin's enhanced physique when he revealed himself as a [[Dark Signer]].
  *** In Andean mythology, the condor is associated with the sun deity, who was believed to rule the upper world, and is also considered a symbol of power and health by many Andean cultures. This reflects Goodwin's desire to become the ruler of the world with the power of the Dark Signers and the [[Crimson Dragon]], as well as his [[Inca]] Deck.
  * In the ''Yu-Gi-Oh! 5D's'' anime, this monster was the largest "[[Earthbound Immortal]]" monster and also had the largest [[Nazca Lines|geoglyph]].
  * This is the only "Earthbound Immortal" monster to have body parts colored differently than its color schemes; specifically, the wreath of white feathers around its neck, and its yellow eyes.
  * This monster's Summoning cutscene in ''[[Yu-Gi-Oh! Duel Links]]'' features the [[Stairway to the Dragon Star]].
  ** This is a reference to the [[Duel]] between [[Yusei Fudo]], [[Jack Atlas]], [[Crow Hogan]], and Rex Goodwin as a [[Dark Signer]] at the stairway in {{episode|5D's|063|ref}}, in which this monster debuted.
