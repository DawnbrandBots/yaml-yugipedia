title: Card Trivia:Lord of the Red
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Dragons of Legend 2]]'' and ''[[Dragons of Legend: Unleashed]]''.
  * This monster is the combined form of "[[Red-Eyes Black Dragon]]" and a "[[Player Token]]".
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster is [[Ritual Summon]]ed with "[[Red-Eyes Transmigration (anime)|Red-Eyes Transmigration]]", where its anime effect requires "Red-Eyes Black Dragon" and a [[Warrior]] monster, the same [[Type]] as the "Player Token".
  ** This monster resembles the "Red-Eyes Black Dragon" [[Duel Armor]] worn by [[Joey Wheeler]] in ''[[Yu-Gi-Oh! Capsule Monsters]]'', similar to how this monster's armor was worn by Joey during his [[Duel]] against [[Valon]].
  * In the anime, this monster shares the same [[original ATK and DEF]] (2400/2000) as "Red-Eyes Black Dragon"; however, in the ''[[OCG]]''/''[[TCG]]'', this monster's original [[DEF]] is 2100.
  * This monster's ''OCG''/''TCG'' pose is taken from a scene from {{episode|Yu-Gi-Oh!|171|ref}} where [[Lord of the Red (anime)|this monster]] is Summoned, while the green light beneath this monster is coming from "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]" that was active during that episode.
