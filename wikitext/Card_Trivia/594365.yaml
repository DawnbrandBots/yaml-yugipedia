title: Card Trivia:Witchcrafter Haine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Witchcrafter Celebration]]", "[[Witchcrafter Confusion Confession]]", "[[Witchcrafter Distortion‎]]", "[[Witchcrafter Draping]]", "[[Witchcrafter Masterpiece]]", "[[Witchcrafter Unveiling]]" and "[[Witchcrafter Walpurgis‎‎]]".
  * This monster's name is derived from "''haine''", the Romanian word for "clothing".
  ** This monster's French name is derived from "''indumenti''", the Italian word for clothing, presumably due to "''haine''" being the French word for "hatred".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Witchcrafter Vice-Madame]]".
  * According to ''[[Official Card Game Art Works]]'', this monster's age is 20 and her height is between 170 to 180 cm (5'7" to 5'11"), she's the type to cry easily, and her provisional name was "Witchcraft Raptier".
