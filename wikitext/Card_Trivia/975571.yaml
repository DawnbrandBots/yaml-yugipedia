title: Card Trivia:Spirit Summit Warrior
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Mononofu of the Scraped Summit" ({{Ruby|摩|ま}}{{Ruby|頂|ちょう}}の{{Ruby|武士|もののふ}}, ''Machō no Mononofu''), features the base kanji for "Mononofu" (武士), which can also be written as ''bushi'', a word synonymous to "samurai".
