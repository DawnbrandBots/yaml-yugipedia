title: Card Trivia:Skiel Guard
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is based on a nondescript insect, based on its six legs, keeping in relation with the "flying animal" theme of the "[[Skiel]]" [[archetype]].
  * This monster, "[[Skiel Carrier 3]]" and "[[Skiel Carrier 5]]" are the only "Skiel" monsters that does not feature an [[original DEF]] of 0.
