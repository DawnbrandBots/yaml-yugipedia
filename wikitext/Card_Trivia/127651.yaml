title: Card Trivia:Masked HERO Vapor
wikitext: |-
  {{Navigation}}

  * This monster is based on the archetypal blue Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[WATER]], which is represented by a blue-colored circle, while the kanji for "water" (水) appears as part of this monster's mask.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|051|ref}}, specifically from the panel showing [[Masked Hero Vapor (manga)|this monster]] being Summoned.
