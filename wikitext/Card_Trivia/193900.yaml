  * "[[Gem-Armadillo]]", "[[Gem-Knight Pearl]]", and "[[Gem-Turtle]]"  appear in this card's artwork.
  ** Fittingly,"Gem-Armadillo" and "Gem-Turtle" both share the same [[Level]] (4), which allows them to be used as the [[Xyz Material]]s for "Gem-Knight Pearl".
