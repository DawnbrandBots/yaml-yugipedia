title: Card Trivia:Victim Barrier
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Dark Ruler Ha Des]]" and "[[Winged Minion]]" appear in this card's artwork.
  ** The appearance of "Winged Minion" is fitting, as its Japanese name is "Ha Des's Familiar".
  ** This is one of the few cards depicting "Dark Ruler Ha Des" in its artwork that was not censored in the international versions to remove its horns; other cards include "[[Flash Effect]]", "[[Leading Question]]", and "[[Mind Trust]]".
