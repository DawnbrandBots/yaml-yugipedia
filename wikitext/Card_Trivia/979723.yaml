title: Card Trivia:Hapi, Guidance of Horus
wikitext: |-
  {{Navigation}}

  * A carving of this monster appears in the artwork of "[[Walls of the Imperial Tomb]]".
  * This monster is named after [[wikipedia:Four sons of Horus|Hapy]], one of the four sons of [[wikipedia:Horus|Horus]] depicted with the head of a baboon, who represents the [[wikipedia:Canopic jar|canopic jar]] of the lungs in [[wikipedia:Egyptian mythology|Egyptian mythology]].
  ** According to Egyptian mythology, Hapy is under the protection of [[wikipedia:Nephthys|Nephthys]], the Egyptian goddess of the air, which reflects this monster's [[WIND]] [[Attribute]]. Fittingly, this monster shares its [[original ATK and DEF]] (2400/1600) with "[[Sacred Phoenix of Nephthys]]", a monster based on Nephthys.
