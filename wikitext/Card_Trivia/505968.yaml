title: Card Trivia:Pharaonic Protector
wikitext: |-
  {{Navigation}}

  * This monster shares its Japanese name, "{{translated name|Pharaonic Protector|ja}}" ({{name|Pharaonic Protector|ja}}, ''{{romanized name| Pharaonic Protector|ja}}'') with that of the [[booster pack]] it was released in the ''[[OCG]]'': "Pharaonic Guardian - Guardian of the Royal Family" ({{Ruby|Ｐｈａｒａｏｎｉｃ|ファラオニック}} {{Ruby|Ｇｕａｒｄｉａｎ|ガーディアン}} －{{Ruby|王|おう}}{{Ruby|家|け}}の{{Ruby|守|しゅ}}{{Ruby|護|ご}}{{Ruby|者|しゃ}}－).
  ** This monster's Japanese name was changed in the ''[[TCG]]'' to avoid confusion with the "[[Guardian]]" [[archetype]].
  * This is one of the two monsters designed to be [[Special Summon]]ed via the effect of "[[Spirit of the Pharaoh]]", the other being "[[Pharaoh's Servant (card)|Pharaoh's Servant]]".
  ** Both monsters share their name with certain ''OCG''/''[[TCG]]'' [[Core Booster]] packs.
