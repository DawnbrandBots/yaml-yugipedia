title: Card Trivia:Gravekeeper's Ambusher
wikitext: |-
  {{Navigation}}

  * This monster may be the replacement for "[[Gravekeeper's Assailant]]" after she was offered as a Tribute (depicted in "[[Royal Tribute]]") and became "[[Night Assailant]]".
  * This monster bears a strong resemblance to the various main characters from the Ubisoft video game franchise, ''Assassin's Creed'', particularly [http://assassinscreed.wikia.com/wiki/Ezio_Auditore_da_Firenze Ezio Auditore da Firenze], the protagonist of ''Assassin's Creed II ''and its spinoffs.
  ** In particular, this monster's resemblance to Ezio can be attributed to it possessing a hood covering its eyes, a large collar attached to its robes, and the appearance of an ''Assassin's Creed''-esque hidden blade on its left arm.
  * The curved knives wielded by this monster are [[wikipedia:Kukri|kukri]] a type of Nepalese tool and weapon used for a myriad of everyday and militaristic purposes in Southern Asian culture, and their curved blade enables the wielder to make deep cuts with little wrist motion. These weapons are occasionally called "gurkha knives" for their use by the [[wikipedia:Gurkha Contingent|Gurkha Contingent]] counter-terrorist force.
  * Strangely, this card is one of the few monster's wielding explosives and ammunition that has not had it's artwork censored in the ''[[TCG]]''. This monster's design features dynamite under its coat and a bullet belt around its neck.
