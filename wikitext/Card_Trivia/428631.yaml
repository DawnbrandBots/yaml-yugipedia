title: Card Trivia:Super Quantal Mech King Great Magnus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Super Quantal Mech Sword - Magnaslayer]]" and "[[Super Quantal Union - Magnaformation]]".
  * This monster's appearance is a combination of the following "[[Super Quantal Mech Beast]]" monsters:
  ** "[[Super Quantal Mech Beast Magnaliger]]" - Body
  ** "[[Super Quantal Mech Beast Aeroboros]]" - Wings, Arms
  ** "[[Super Quantal Mech Beast Grampulse]]" - Legs
  *** The [[Rank]]s of the aforementioned [[Xyz Monster]]s add up to 12, the same as this monster's Rank.
  * This monster's artwork features the environments that the "Mech Beast" components had as their background, the fiery land of "Magnaliger", the stormy clouds of "Aeroboros", and the ocean of "Grampulse".  
  * This is the first [[Rank 12]] Xyz Monster to be released in the ''[[TCG]]''.
  * This monster having effects based on the number of its [[Xyz Material]]s reflects how this monster is based on the {{fandom|powerrangers|Category:Megazord|Megazord}}, the union of all {{fandom|powerrangers|Category:Ranger|Rangers}}' {{fandom|powerrangers|Category:Zords|Zords}}, or "{{fandom|powerrangers|Category:Mecha|Mecha}}" in the Japanese version of ''[[wikipedia:Power Rangers|Power Rangers]]''.
