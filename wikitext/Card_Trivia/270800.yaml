title: Card Trivia:Madolche Hootcake
wikitext: |-
  {{Navigation}}

  * The card's English name is a pun on "hoot", the onomatopoeia for the sound owls make and a [[wikipedia:Pancake|hotcake]]. Its Japanese name is based on the owls' sound "ho-o-o" (ホーー).
  ** It also wears a hat on its head that resembles a hotcake.
  * The smalls birds on the ground around Hootcake could be based on small drops of chocolate, something that is sometimes added on to pancakes.
  * Though this card is a [[Beast]] monster, it looks more like a [[Winged Beast]].
