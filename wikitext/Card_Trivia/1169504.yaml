title: Card Trivia:Deep-Eyes White Dragon, the Blue Abyss
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Deep-Eyes White Dragon]]".
  ** This monster's name is derived from the [[Summon chant#Seto Kaiba|Summon chant]] of "[[Deep-Eyes White Dragon (anime)|Deep-Eyes White Dragon]]" in the original Japanese version of ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'': ''Rise up from the '''azure abyss!'''''
