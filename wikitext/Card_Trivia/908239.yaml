title: Card Trivia:Magiquartet Shock
wikitext: |-
  {{Navigation}}

  * The [[Spellcaster]]s in this card's artwork all seem to be different-colored versions of "[[Dark Sorcerer]]", corresponding to the [[WATER]], [[WIND]], [[FIRE]] and [[EARTH]] [[Attribute]]s.
  ** "[[Aqua Sorcerer]]", "[[Aero Sorcerer]]", "[[Flare Sorcerer]]", and "[[Earth Sorcerer]]" are the WATER, WIND, FIRE and EARTH counterparts to "Dark Sorcerer" respectively, which may be based on the four different-colored "Dark Sorcerers" in this card's artwork.
