title: Card Trivia:Performapal Gongato
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Performapal Pendulum Art & Clean]]".
  * This monster's Japanese name, "Gongcat" (ドラネコ ''Doraneko'') is a portmanteau of the Japanese words for "gong" (ドラ ''dora'') and "stray cat" (ドラネコ ''doraneko'' ).
  ** This card's ''[[TCG]]'' name, "Gongato" is a portmanteau of the words "gong" and "gato", the Spanish word for "cat".
