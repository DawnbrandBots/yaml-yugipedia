title: Card Trivia:Mask of Brutality
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Spell of Mask]]'' and the box of ''[[Duelist Legacy Volume.3]]''.
  * This card has a ''[[Rush Duel]]'' [[Noodle Art]] parody: "[[Noodle Mask of Gluttony]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|185|ref}}, specifically from the panel showing this mask being equipped to "[[Shining Abyss (manga)|Shining Abyss]]".
