title: Card Trivia:Crystal Beast Emerald Tortoise
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Crystal Beacon]]", "[[Crystal Conclave]]", "[[Crystal Fortress]]", "[[Jesse Anderson - Bonder with the Crystal Beasts]]", and "[[Rainbow Bridge of the Heart]]".
  ** This monster's crystal form appears in the artworks of "[[Counter Gem]]", "[[Crystal Abundance]]", "[[Crystal Beast Token]]", "[[Crystal Keeper]]", "[[Crystal Master]]", "[[Crystal Miracle]]", "[[Crystal Release]]", and "[[Ultimate Crystal Magic]]".
  * This monster is based on [[wikipedia:Emerald|emerald]], a variation of the [[wikipedia:Beryl|beryl]] gemstone containing [[wikipedia:Chromium|chromium]] that often makes it appear green.
  * This monster has an "[[Advanced Crystal Beast]]" [[counterpart]]: "[[Advanced Crystal Beast Emerald Tortoise]]".
  * In the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's voice is similar to [[wikipedia:Filburt|Filburt]], a turtle character from the [[wikipedia:Nickelodeon|Nickelodeon]] animated series ''[[wikipedia:Rocko's Modern Life|Rocko's Modern Life]]''.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this card's [[Ignition Effect]] to [[target]] a monster the player [[control]]s that attacked during a turn and change that target to [[Defense Position]] was removed, as Duels in ''Yu-Gi-Oh! Duel Links'' are conducted as [[Speed Duel (format)|Speed Duels]], in which there is no [[Main Phase 2]].
  ** This is the first card in ''Yu-Gi-Oh! Duel Links'' to have its effect changed, as well as the first card to have an effect entirely removed rather than just modified (ignoring cards added to ''Duel Links'' prior to their ''[[OCG]]''/''[[TCG]]'' debut).
