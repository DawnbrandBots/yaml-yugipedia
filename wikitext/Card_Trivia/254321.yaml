title: Card Trivia:Tatakawa Knight
wikitext: |-
  {{Navigation}}

  * This card's Japanese pronunciation, "Tatakawanaito", can roughly translate to 'have to fight'.
  * This card is similar to "[[Ganbara Knight]]" in that their names translate into something they must do (to fight and to do their best respectively).
  * This is one of three [[Fan-Made Cards]] that won the ''Yu-Gi-Oh! ZEXAL Draw Contest'', the other two being "[[Bachibachibachi]]" and "[[Dotedotengu]]".
