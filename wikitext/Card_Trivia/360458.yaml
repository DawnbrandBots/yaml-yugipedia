title: Card Trivia:Rainbow Refraction
wikitext: |-
  {{Navigation}}

  * "[[Rainbow Dragon]]" appears in this card's artwork.
  ** This card's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Rainbow Dragon (anime)|Rainbow Dragon]]" in the ''[[Yu-Gi-Oh! GX]]'' anime: "Rainbow Refraction" ("Over the Rainbow" in the Japanese version).
  ** This card's Japanese name, "Over the Rainbow", is based on the title of the theme of the book, film, and musical ''[[wikipedia:The Wizard of Oz|The Wizard of Oz]]''.
