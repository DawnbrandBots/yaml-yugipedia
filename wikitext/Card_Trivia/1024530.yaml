title: Card Trivia:Voidvelg Morgenstein
wikitext: |-
  {{Navigation}}

  * This card is based on the "[[wikipedia:Morning star (weapon)|Morning Star]]" (German: ''Morgenstern''), a [[wikipedia:Club (weapon)|club]]-like weapon originating from 14th century Germany, but "stern" (シュテルン, german for "star") is instead replaced with "stein" (スタイン, german for "stone").
