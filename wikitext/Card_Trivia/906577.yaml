title: Card Trivia:The Thing In the Purple Mirror
wikitext: |-
  {{Navigation}}

  * This monster is based on the legend of the "[https://www.kowabana.net/2018/08/11/purple-mirror/ purple mirror]", where uttering or remembering the phrase "purple mirror" will curse or kill anyone before they turn twenty years old. According to Japanese urban legend, an ailing girl received a hand mirror for her birthday, which later she paints purple, but is unable to wash away the paint and regretfully dies before she turned twenty.
