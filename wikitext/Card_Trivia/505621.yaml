title: Card Trivia:VWXYZ-Dragon Catapult Cannon
wikitext: |-
  {{Navigation}}

  * This monster appears to based off the [[wikia:w:c:powerrangers:Category:Mecha|Mecha]] used in the [[wikipedia:Super Sentai|Super Sentai]] Japanese TV series (which is the show that ''[[wikipedia:Power Rangers|Power Rangers]]'' is based on).
  * This monster appears in the artwork of "[[Dimensional Catapult]]".
  * This card only has 200 more [[ATK]] and [[DEF]] than "[[XYZ-Dragon Cannon]]".
  * This monster is a physical amalgam of "[[V-Tiger Jet]]", "[[W-Wing Catapult]]", "[[X-Head Cannon]]", "[[Y-Dragon Head]]" and "[[Z-Metal Tank]]", being comprised of [[Fusion Monster]]s formed from those five monsters as its Fusion Materials.
  ** The parts of "V-Tiger Jet" are located on this monster's back, as seen in the anime and the tiger head is pulled over the head of "X". In the anime, it's shown that the claws of the back legs of "V-Tiger Jet" are connected to the parts of "W-Wing Catapult" as this monster's toes.
  ** The parts of "W-Wing Catapult" can be seen as this monster's legs, and are linked to the spaces where the head and body of "Y-Dragon Head" were linked to its wings. In the anime, it is shown that the claws of the back legs of "V-Tiger Jet" are connected to the parts of "W-Wing Catapult" as this monster's toes.
  ** The parts of "X-Head Cannon" are designed to be the torso, and it holds the parts of "Z-Metal Tank" in its hands. This card is one of the most important parts seen, as it has the most parts linked to it ("V-Tiger Jet" to its back and over its head, "Y-Dragon Head" under the spike ball, and "Z-Metal Tank" in its hands).
  ** The body and the head of "Y-Dragon Head" are located under the spike ball of "X-Head Cannon", and where its wings were, "W-Wing Catapult" is linked to the system. Furthermore, its wings are linked on the back, presumably to the parts of "V-Tiger Catapult" that are possibly on the back.
  ** The middle part of "Z-Metal Tank" is at this card's back (it's difficult to see this in the card artwork, but the anime shows that the middle part is mounted onto "V-Tiger Jet" and between the wings of "Y-Dragon Head"). The tank treads of "Z-Metal Tank" are held in the hands of "X-Head Cannon".
  * During the combining of "X-Head Cannon", "Y-Dragon Head" and "Z-Metal Tank into "XYZ-Dragon Cannon", the wings of "Y-Dragon Head" disappeared, but they returned in this card's artwork.
  * This is one of the few monsters that is a fusion of two Fusion Monsters.
  * Unlike the other monsters in its series, who name off all the letters in their names, this card's Japanese name is pronounced as "V to Z". It is pronounced this way in the English dubbed anime as well. Also, while the other cards pronounce the letter "Z" as "zed", this card pronounces it as "zee".
