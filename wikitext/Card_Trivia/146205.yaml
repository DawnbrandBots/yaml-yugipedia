title: Card Trivia:Brilliant Shrine Art
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, [[Kalin Kessler]] and [[Roman Goodwin]] used this card in their Duels against [[Yusei Fudo]] while he controlled "[[Stardust Dragon (anime)|Stardust Dragon]]". At both times, the two aforementioned [[Duelist]]s controlled no other monsters, except for their respective "[[Earthbound Immortal]]s"; Kalin controlled "[[Earthbound Immortal Ccapac Apu]]", while Roman controlled "[[Earthbound Immortal Uru]]".
