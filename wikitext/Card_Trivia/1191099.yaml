title: Card Trivia:Dark Time Wizard
wikitext: |-
  {{Navigation}}

  * "[[Time Wizard]]", wearing a black cape and shoes, appears in this card's artwork.
  ** The appearance of "Time Wizard" in this card's artwork is a reference to the fact that in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]], the artwork of "Time Wizard" was designed without a physical clock face, featuring two floating, disembodied eyeballs and clock hands in the center hole. In the ''[[OCG]]''/''[[TCG]]'', this monster's design features a half-blue, half-yellow clock face divided by a squiggly line, which was either an artistic choice or a misinterpretation of the cape visible through the hole.
  * The artworks of "[[Cyber Energy Shock]]", "[[Ectoplasmic Fortification]]", "[[Fighting Flame Sword]]", "[[Harpie Lady Elegance]]", "[[Proton Blast]]", "[[Red-Eyes Soul]]", "[[Sea Stealth Attack]]", and "[[Verdict of Anubis]]" appear in this card's artwork.
  ** The above-mentioned cards are based on cards depicting scenes from [[Katsuya Jonouchi (manga)|Katsuya Jonouchi's]] [[Duelist Kingdom (manga arc)|Duelist Kingdom]] and [[Battle City (manga arc)|Battle City]] Duels in the ''Yu-Gi-Oh!'' manga.
  ** Notably, "Ectoplasmic Fortification" appears in this card's artwork before its debut in ''OCG'' territories.
  * This card is a [[retrained]] [[Spell Card]] counterpart of "Time Wizard".
  ** This card is a reference to how "Time Wizard" is a Spell Card in the ''Yu-Gi-Oh!'' manga.
  ** This card's effect to [[destroy]] all monsters the opponent controls and inflict damage to the opponent equal to those monsters' combined [[ATK]] if the player calls the [[coin toss]] right is a reference to the appearance of "Time Wizard" in the manga, in which successfully spinning the roulette will cause the opponent's monsters to age 1000 years, which, in most cases, is immediately followed by those monsters being destroyed and the opponent taking damage.
