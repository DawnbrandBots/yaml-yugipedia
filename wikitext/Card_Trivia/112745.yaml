title: Card Trivia:Sparks
wikitext: |-
  {{Navigation}}

  * This card has a polar-opposite counterpart: "[[Mooyan Curry]]".
  * This card has an [[Anime-only|anime-exclusive]] [[Trap Card]] counterpart: "[[Surprise Punch]]".
  * Several ''[[Yu-Gi-Oh!]]'' video games reward the player with a [[DP|bonus]] if they manages to reduce the opponent's [[Life Points]] to zero using very weak cards, namely this card and "[[Skull Servant]]". Appropriately, the two bonuses are known as "Sparks Finish" and "Skull Servant Finish" respectively.
