title: Card Trivia:Hi-Speedroid Glider 2
wikitext: |-
  {{Navigation}}

  * This monster is based on the toy versions of both a [[wikipedia:Glider (aircraft)|glider aircraft]] and a [[wikipedia:Dart|dart]].
  ** This monster's Japanese name (グライダー{{Ruby|２|ツー}}, ''Guraidā Tsū'') is a portmanteau of the words "glider" (グライダー, ''Guraidā''), "darts" (ダーツー, ''Dātsū''), and the number "2" (ツー, ''Tsū'').
