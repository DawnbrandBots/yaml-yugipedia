  * This monster is the [[aged counterpart]] of "[[Dark Magician]]".
  * This monster has a [[counterpart]]: "[[Sorcerer of Dark Magic]]".
  ** Both share the same [[Attribute]] ([[DARK]]), [[Level]] (9), and [[Type]] ([[Spellcaster]]), as well as opposite [[ATK]] and [[DEF]] (2800/3200).
