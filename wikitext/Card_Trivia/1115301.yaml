title: Card Trivia:K9-66b Lantern
wikitext: |-
  {{Navigation}}

  * "[["A Case for K9"]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[K9-EW Special Release Experiment]]".
  * This monster is named after [[wikipedia:Stingy Jack|Jack-o'-lantern]], a mythical character associated with Halloween.
  * This monster has an upgraded [[Xyz Monster|Xyz]] form combined with "[[K9-66a Jokul]]": "[[K9-66X "Jacks"]]".
