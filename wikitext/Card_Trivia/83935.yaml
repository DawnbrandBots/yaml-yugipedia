title: Card Trivia:Time Seal
wikitext: |-
  {{Navigation}}

  * The strip of paper containing Japanese kanji in this card's artwork is most likely an ''[[wikipedia:Ofuda|ofuda]]'', which is a type of amulet or talisman made of wood cloth or metal that are issued by [[wikipedia:Shinto shrine|Shinto shrines]].
  ** ''Ofuda'' are used because it is believed they protect a family in residence from every instance of general harm (i.e. curses). This is reflected in this card's effect, in a case of [[wikipedia:Situational irony|situational irony]]: to skip the [[Draw Phase]] of the opponent's next turn, "protecting" the opponent's [[Deck]] from it, but also "cursing" the opponent by not allowing him to [[draw a card]].
  * According to a [https://www.pojo.biz/board/showthread.php?p=4555625#post4555625 Pojo post] by [[Kevin Tewart]], this card was mostly banned in the ''[[OCG]]'' because of its synergy with "[[Temple of the Kings]]".
