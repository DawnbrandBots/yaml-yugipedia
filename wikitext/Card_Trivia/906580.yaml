title: Card Trivia:Firewall Dragon Darkfluid - Neo Tempest Terahertz
wikitext: |-
  {{Navigation}}
  [[File:FirewallDragonDarkfluid-JP-Anime-VR-NC-2.png|thumb|right|300|"[[Firewall Dragon Darkfluid]]" preparing to attack.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * This monster is the [[signature move]] [[counterpart]] of "[[Firewall Dragon Darkfluid]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! VRAINS|attack name]] of "Firewall Dragon Darkfluid" in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** This monster's red color scheme is based on the appearance of "Firewall Dragon Darkfluid" when it declared an [[attack]] in the anime.
  * This monster's color scheme is based on five of the [[Ignis]].
  ** [[Ai]]: The purple parts of its armor and wings.
  ** [[Flame]]: The red parts of its armor.
  ** [[Earth (character)|Earth]]: The brown parts of its armor.
  ** [[Aqua (character)|Aqua]]: The parts bits of its armor and wings.
  ** [[Windy]]: The green parts of its wings.
