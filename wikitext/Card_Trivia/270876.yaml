title: 'Card Trivia:Number 66: Master Key Beetle'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster's horn resembles the [[Emperor's Key]], referencing how it contained [[Astral]]'s memories of how to operate the [[Different Dimension Airship]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This card's effects are based on the "locking" function of a key, as it can prevent a [[target]]ed card from being destroyed by card effects, and prevent its own destruction.
  * This monster's neutral form resembles a curled-up larva with the horn tip held downwards at an angle, giving it the shape of a question mark.
