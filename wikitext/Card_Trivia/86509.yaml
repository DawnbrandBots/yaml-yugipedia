title: Card Trivia:Stealthroid
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Stealth aircraft|stealth aircraft]], an aircraft designed to fly without being detected by sensors, which reflects its effect to "stealthily" [[destroy]] an opponent's [[Spell]]/[[Trap Card]] at the end of the [[Battle Phase]] if the player [[control]]s another "[[roid]]" monster.
  ** This monster's [[Yu-Gi-Oh! GX|anime]] and ''[[OCG]]''/''[[TCG]]'' design is based on the [[wikipedia:Lockheed F-117 Nighthawk|Lockheed F-117 Nighthawk]] stealth fighter; however, its [[Stealthroid (manga)|manga]] design is based on the [[wikipedia:Northrop B-2 Spirit|Northrop B-2 Spirit]].
  * This is the only [[Machine]] "roid" monster whose [[Attribute]] is [[DARK]].
  * This is the only Machine "roid" monster without visible eyes in its design, instead having a pair of shades in place.
