  {{Navigation}}

  * Multiple [[Spell Counter]] symbols appear in this card's artwork, including in the background and in this monster's armor, sword, and shield.
  ** There are twelve visible Spell Counters in this monster's armor and weapons.
  * This monster is a [[Card evolutions|upgraded]] [[Link Monster|Link]] form of "[[Breaker the Magical Warrior]]".
