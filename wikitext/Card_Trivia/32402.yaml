title: Card Trivia:Berserker Crush
wikitext: |-
  {{Navigation}}

  * "[[Winged Kuriboh]]" appears in this card's artwork.
  * This card shares its name with the [[attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Winged Kuriboh LV9 (manga)|Winged Kuriboh LV9]]" in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  ** This card's effect to [[banish]] a monster from the [[Graveyard]] and change the [[ATK]]/[[DEF]] of "Winged Kuriboh" to those of the banished monster's is a reference to both the effect [[cost]] of "[[Alchemical Experiment]]" to banish three monsters from the [[Graveyard]], and the manga effect of "Winged Kurboh LV9" to increase its ATK/DEF by those of the banished monsters'.
