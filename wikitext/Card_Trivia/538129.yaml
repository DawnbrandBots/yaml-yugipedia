title: Card Trivia:Ebon Magician Curran
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[A Rival Appears!]]", "[[Mutually Affured Destruction]]", "[[Perfect Counter Code 123]]", "[[Revenge Attack]]", and "[[Trial of the Princesses]]".
  ** "[[Live☆Twin Lil-la]]" cosplays as this monster in the artwork of "[[Live☆Twin Channel]]".
  * "Ebon" in this card's ''[[TCG]]'' name is a synonym of "black"; this card was likely named "Ebon Magician" in the ''TCG'' to avoid connotations with black magic.
  * This monster has an [[Card evolutions|upgraded]] form: "[[Princess Curran]]".
  * This card has a [[LIGHT]] rival [[counterpart]]: "[[White Magician Pikeru]]".
  ** Both are [[Level]] 2 [[Spellcaster]] monsters with 1200 [[ATK]] and 0 [[DEF]], and have [[LP]]-related effects that activate during the [[Standby Phase]].
  ** According to the [[Master Guide 2 card storylines#File No. 11: Two Adorable Princesses|Master Guide 2 card storylines]], "White Magician Pikeru" is this monster's twin sister.
