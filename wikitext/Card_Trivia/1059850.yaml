title: Card Trivia:Voidvelg Gehennamagia
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Voidvelg Requiem]]".
  ** This is the only form of "Voidvelg Requiem" to not retain its chest with 6 purple orbs and 6 green dots, although it does have a similar chest.
  * This monster is named after the [[wikipedia:Gehenna|Gehenna]], a valley surrounding [[wikipedia:Jerusalem|Jerusalem]] that has the connotation of a place of divine punishment in Jewish escathology.
