title: Card Trivia:Mystical Donator
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Puripriest" ({{name|Mystical Donator|ja}}, ''{{romanized name|Mystical Donator|ja}}'') is a pun on the Japanese onomatopoeia "''puri''" (プリ), which is sometimes used as an adverb for the word "angrily" (ぷり), which reflects this monster's angry-like expression.
  * This monster's effect to make its [[ATK]] become 0 and its first bulleted effect to increase the ATK of another monster the player [[control]]s by 800 is a reference to the effect of "[[Mystical Elf]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], where it can use its magic to transfer its ATK to another monster the player controls. In {{chapter|Yu-Gi-Oh!|076|ref}}, [[Dark Yugi (manga)|Dark Yugi's]] "[[Mystical Elf (manga)|Mystical Elf]]" transferred 800 ATK to the "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" he controlled after [[Special Summon]]ing it from the [[Ventriloquist of the Dead]]'s [[Graveyard]].
  * In the original Japanese version of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster's clothing resembles that of a [[wikipedia:Cardinal (Catholicism)|Catholic cardinal]], while its book resembles the [[wikipedia:Bible|Holy Bible]]. In the international dubbed version of the anime, its clothing was completely recolored and redesigned, and the crosses on its hood and book were removed, all to avoid religious connotations.
