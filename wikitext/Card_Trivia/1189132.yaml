title: Card Trivia:Prey Dullahan
wikitext: |-
  {{Navigation}}

  * This monster appears in both artworks of "[[Brassdes of the Wicked Wheels]]", as the motorcycle of "[[Weaksauce Brassdes]]".
  * This monster is based on the [[wikipedia:Dullahan|Dullahan]], a mythylogical spirit of a headless knight riding a black horse who often carries its severed head.
