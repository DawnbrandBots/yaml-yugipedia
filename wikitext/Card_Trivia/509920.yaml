title: Card Trivia:Berfomet
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chimera Fusion]]", "[[Mirage Tube]]", and "[[Sinister Justice]]".
  * This monster is based on [[wikipedia:Baphomet|Baphomet]], a winged demon who is depicted with the head of a goat and the body of a human.
  ** In the original Japanese and Korean languages, this monster's name is "Baphomet". This name change in the ''[[TCG]]'' was done to obscure the Satanic connotation connected with Baphomet.
  * This monster has a [[retrained]] counterpart: "[[Big-Winged Berfomet]]".
  * This monster shares the same [[Attribute]] ([[DARK]]), [[Type]] ([[Fiend]]) and [[original ATK and DEF]] (1400/1800) with "[[D/D Berfomet]]", which also shares the same [[Level]] (4) as the [[Baphomet (manga)|manga version]] of this monster.
