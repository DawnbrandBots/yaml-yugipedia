title: 'Card Trivia:Number 45: Crumble Logos the Prophet of Demolition'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * In Japanese, the number 4 can be read as "shi" and 5 can be read as "go". Together, they spell "shigo", meaning "after death", referencing this card being a Zombie-Type monster (undead).
  * "[[wikipedia:Logos|Logos]]" (Λόγος) is Greek for "speech", or "reason".
