title: Card Trivia:Enlilgirsu, the Orcust Mekk-Knight
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Enlil|Enlil]], the Mesopotamian god of wind.
  * This monster is an [[Card evolutions|upgraded]] [[Link Monster|Link]] form of "[[Girsu, the Orcust Mekk-Knight]]".
  ** Fittingly, this monster can be [[Link Summon]]ed by using "[[Longirsu, the Orcust Orchestrator]]" (one of the previous forms of "Girsu") and either "[[Galatea-I, the Orcust Automaton]]" or a "[[World Legacy Token]]" (which are forms of "[[Galatea, the Orcust Automaton]]") as [[Link Material]]s.
  * This monster's unique [[Link Arrows]] allow it to be in the center [[Main Monster Zone]] of a 4-card [[Extra Link]].
