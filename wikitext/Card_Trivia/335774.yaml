title: Card Trivia:Infernoid Devyaty
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Void Vanishment]]" (being transformed into the armor of "[[El Shaddoll Anoyatyllis]]").
  * This monster is based on [[wikipedia:Lilith|Lilith]], a female demon in [[wikipedia:Jewish mysticism|Jewish mysticism]]. Lilith is variously identified as one of the archetypical female demons, the first wife of Adam, and one of the 4 demon mates of Samael– the Angel of Death, and cohort to [[wikipedia:Naamah (demon)|Na'amah]] in mothering the demonic children of Adam– the Plagues of Mankind.
  * ''Devyaty'' is Russian for ''Ninth'', referring to this card's [[Level]].
  * This monster has a counterpart (with "[[Nekroz of Trishula]]"): "[[El Shaddoll Anoyatyllis]]".
  ** This monster is also worn as armor by "[[El Shaddoll Construct]]".
  * This card is the opposite [[counterpart]] of "[[Infernoid Onuncu]]".
  ** They have nearly identical [[ATK]]/[[DEF]], the same [[Summoning condition]] and effects that respectively [[destroy]] all [[Spell]]/[[Trap]]s or [[Monster]]s when [[Summon]]ed. Both cards can also [[Tribute]] a monster to respectively [[negate]] a [[monster effect]] or Spell/Traps.
  ** Both also share several similarities: the two monsters are [[wikipedia:Serpent (symbolism)|serpentine]] creatures, and they are two of the required [[Fusion Material]]s of "[[Infernoid Tierra]]".
  *** This may be a reference to the fact that the demons on which the two monsters are based are cohorts in mythology.
