title: Card Trivia:Crusadia Reclusia
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a reference to the [[wikipedia:Zen|Zen]] concept of ''[[wikipedia:Makyo|Makyo]]''.
  * This monster appears in the artworks of "[[World Legacy's Memory]]", "[[Crusadia Revival]]", "[[Crusadia Power]]", "[[Crusadia Vanguard]]", and "[[Crusadia Testament]]".
  * "[[Crusadia Magius]]" is this card's superpowered form.
