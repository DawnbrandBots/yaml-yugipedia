title: Card Trivia:Atlantean Pikeman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abyss-steam]]", "[[High Tide on Fire Island]]", "[[Phantasm Spiral Battle]]", and "[[Phantasm Spiral Grip]]".
  * According to this card's [[flavor text]], this monster serves "[[Poseidra, the Atlantean Dragon]]", also known as the "''Great Ocean Lord''".
  * Prior to the release of [[Digitron]], this card had the highest ATK of all Level 2 monsters that can be [[Normal Summon]]ed at 1400.
