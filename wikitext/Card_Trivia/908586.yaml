title: Card Trivia:Traptrix Holeutea
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Ibicella lutea|Ibicella lutea]]'', a species of flowering plant also known as the "devil's claws" due to its claw-like seed pods. The sticky resin coating of the plant is known to trap insects, but it lacks the ability to directly digest them. For this reason, it is considered a [[wikipedia:Protocarnivorous plant|protocarnivorous plant]].
