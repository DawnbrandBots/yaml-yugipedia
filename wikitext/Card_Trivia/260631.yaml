title: Card Trivia:Kidmodo Dragon
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a pun on "kodomo", the Japanese word for 'child', and "[[wikipedia:Komodo dragon|Komodo dragon]]", a species of monitor lizard.
  ** Its English name contains "kid", referencing how it is a young Komodo Dragon.
  * This monster's design is similar to that of "[[Poki Draco]]". Its [[ATK]] and [[DEF]] values are the opposite of "Poki Draco's".
