title: Card Trivia:Destructor Soldier Steeplejack
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Demolition Fighting Spirit]]", "[[Demolition Survey]]", and "[[Disaster Excavation]]".
  * This monster's Japanese name, "Toby Shock" (トビー・ショック, ''Tobī Shokku''), is a pun on the Japanese word for "construction worker" or "steeplejack" (鳶職, ''tobishoku'').
