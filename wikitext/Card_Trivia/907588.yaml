title: Card Trivia:King's Right
wikitext: |-
  {{Navigation}}

  * The king, knight, and palace in this card's artwork also appear in the artwork of "[[King's Majesty]]".
  ** This card's artwork appears to continue the events of "King's Majesty".
  ** The king in this card's artwork also appears (wearing different clothing) in the artworks of "[[King's Arrogance]]", "[[King's Greed]]", "[[King's Invitation]]" and "[[King's Management]]". His hand also appears in the artwork of "[[King's Authority]]".  
  * The character being knighted bears a slight resemblance to "[[Jack Atlas]]"
