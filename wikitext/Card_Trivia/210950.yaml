title: Card Trivia:Sishunder
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "ONeThunder" ({{Ruby|ＯＮｅ|オネ}}サンダー, ''ONeSandā'') is a portmanteau of the words "big sister" (おねいさん, ''Oneesan'') and "[[Thunder]]" (サンダー, ''Sandā'').
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|013|ref}}, specifically from the panel showing [[Sishunder (manga)|this monster]] being Summoned.
