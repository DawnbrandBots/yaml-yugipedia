title: Card Trivia:Word Working
wikitext: |-
  {{Navigation}}

  * "[[Mechaleon (Rush Duel)|Mechaleon]]", "[[Poet Fairy]]", and "[[Princessleon]]" appear in this card's artwork.
  ** This card's artwork and effects reference the scene in {{episode|SEVENS|079|ref}} where [[Lucidien Kallister|Lucidien "Luke" Kallister]] (taking over [[Yuga Ohdo]] after collapsing from his earlier injuries) repeatedly uses the effect of "[[Poet Fairy (anime)|Poet Fairy]]" to [[shuffle]] [[Yuga Goha]]'s [[Chameleon]] monsters from his [[Graveyard]] into his [[Deck]] and weaken his "[[Ecdysis Caesarleon (anime)|Ecdysis Caesarleon]]".
  *** This card's effect requirement is based on how it is designed to counter Yuga Goha's [[signature card]]s, which include the [[Level 7]] "[[Predator Gunleon (anime)|Predator Gunleon]]", the [[Level 8]] "Ecdysis Caesarleon", and the [[Spell Card]] "[[Monster Reborn (anime Rush Duel)|Monster Reborn]]".
  * This card's name and effect make it a counterpart to "[[Widening Whisper]]".
