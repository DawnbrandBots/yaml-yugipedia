title: Card Trivia:Archfiend Black Skull Dragon
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] [[counterpart]] of "[[Black Skull Dragon]]".
  ** Both monsters share the same [[Level]], [[Attribute]], [[Type]], [[ATK]] and [[DEF]] and are formed through the [[Fusion Summon|Fusion]] of a [[Level]] 6 "[[Archfiend]]" monster and a "[[Red-Eyes]]" monster.
  ** This card's Japanese name, "Fiend Dragon – '''Black Daemon's Dragon'''", is also based on "Black Skull Dragon", whose original name is "'''Black Daemon's Dragon'''".
  *** It was also the name "[[Black Skull Dragon (anime)|Black Skull Dragon]]" was called during its [[Yu-Gi-Oh! - Episode 021|first appearance]] in the Japanese version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Red-Eyes Archfiend of Lightning]]" and "[[Red-Eyes Black Flare Dragon]]", which are valid [[Fusion Material]]s for this card.
  * This card also shares the same Level, Attribute, Type, ATK and DEF as "[[Hot Red Dragon Archfiend Abyss]]". Both cards are demonic [[Dragon]]s that are [[Special Summon]]ed from the [[Extra Deck]] and are members of the "Archfiend" [[archetype]].
  * This card is the first [[Fusion Monster]] to require a [[Fusion Material]] of a specific [[Level]].
