title: Card Trivia:Lyrilusc - Independent Nightingale
wikitext: |-
  {{Navigation}}

  * This monster is a [[Fusion Parasite (anime)|corrupted]] [[Fusion Monster]] form of "[[Lyrilusc - Assembled Nightingale]]".
  ** This monster is depicted facing the left side at a downwards angle, mirroring the pose of "Assembled Nightingale", which faces the right side at an upwards angle.
  ** This monster's design features a darker color scheme, as well as sharp claws on the edges of its wings, which is not featured in the other members of the "[[Lyrilusc]]" [[archetype]].
  ** This monster's name is based on how it can grow stronger "independently" on the [[field]], unlike "Assembled Nightingale", which can grow stronger with an "assembly" of [[Xyz Material]]s.
