title: Card Trivia:Dark Snake Syndrome
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Black Death|Black Death]], a [[wikipedia:Bubonic plague|bubonic plague]] epidemic occurring in Europe from 1346 to 1353, which was infamously known for killing as many as fifty million people.
  * In the ''Yu-Gi-Oh!'' video games, this card's effect to double the damage will stop at the sixteenth turn after [[activate|activation]], at which point the damage inflicted will be 65,535, the maximum value of an unsigned 16-bit integer.
