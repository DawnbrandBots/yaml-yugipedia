title: Card Trivia:Dinowrestler Chimera T Wrextle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gouki Gameface]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Dinowrestler King T Wrextle]]"
  ** This monster's name is based on a [[wikipedia:Chimera (mythology)|chimera]], a creature in [[wikipedia:Greek mythology|Greek mythology]] whose body consists of parts of different animals. Fittingly, this monster is "King T Wrextle" wearing the fossilized parts of different [[Dinosaur]] monsters as armor.
  * This monster has a "[[Gouki]]" counterpart: "[[Gouki The Tyrant Ogre]]".
