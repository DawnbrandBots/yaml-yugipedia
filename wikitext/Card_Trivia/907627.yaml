title: Card Trivia:Branded Retribution
wikitext: |-
  {{Navigation}}

  * "[[Dramaturge of Despia]]" and "[[The Iris Swordsoul]]" appear in this card's artwork.
  ** According to [[The Valuable Book EX 2 card storylines#Facing the Main Culprit: Branded Retribution|The Valuable Book EX 2 card storylines]], the "Dramaturge" that "The Iris Swordsoul" struck down is actually "[[Despian Quaeritis]]".
  ** The events in this card's artwork are a continuation of those depicted in the artwork of "[[Dogmatikamacabre]]": "The Iris Swordsoul" is facing "Dramaturge of Despia", after they met again since "[[Dogmatika Fleurdelis, the Knighted]]" left the "[[Dogmatika Nation]]".
