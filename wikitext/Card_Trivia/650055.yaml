title: Card Trivia:Dragonmaid Tinkhec
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragonmaid Welcome]]".
  * This monster is the dragon form of "[[Kitchen Dragonmaid]]".
  ** This monster's ''[[TCG]]'' name is an anagram of "Kitchen".
  ** This monster's Japanese name, "Flamme", is the German word for "flame", reflecting its [[FIRE]] [[Attribute]].
