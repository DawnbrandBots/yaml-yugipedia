title: Card Trivia:Armor Breaker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Pinch Breaker]]".
  * This monster shares the same [[Attribute]] ([[EARTH]]), [[Level]] (3), and [[Type]] ([[Warrior]]), visual design, and naming scheme as "[[Card Blocker]]" and "[[Spell Striker]]".
  ** Coincidentally, all three monsters were used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** This is the only [[Union monster]] used by a ''Yu-Gi-Oh!'' anime protagonist.
