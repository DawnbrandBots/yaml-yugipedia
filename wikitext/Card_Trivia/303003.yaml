title: Card Trivia:Artifact Beagalltach
wikitext: |-
  {{Navigation}}

  * This monster is based on Beagalltach, one of the swords wielded by [[wikipedia:Aengus|Aengus]] in [[wikipedia:Irish mythology|Irish mythology]]. It has a sibling sword called Moralltach.
  ** This monster combines with "[[Artifact Moralltach]]" to form "[[Artifact Durandal]]", supporting the relationship between "Moralltach" and "Beagalltach". Also, this card's ATK and DEF are the reverse of that of "Beagalltach", and the stance of the spirits in each artwork is mirrored.
  * This artifact appears on the card "[[Artifact Sanctum]]".
