title: Card Trivia:Crystal Beast Amber Mammoth
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Jesse Anderson]]''.
  * This monster appears in the artwork of "[[Amber Crystal Circle]]", "[[Crystal Beacon]]", "[[Crystal Conclave]]", and "[[Crystal Fortress]]".
  ** This monster's crystal form appears in the artwork of "[[Ultimate Crystal Magic]]".
  * This monster is based on [[wikipedia:Amber|amber]], fossilized tree resin presented as a gemstone with an orange color.
  ** In the anime, this card is seen with something resembling a dragonfly in the amber on its forehead; this is a reference to how amber samples often contain trapped insects and other small organisms.
  * This monster has an "[[Advanced Crystal Beast]]" counterpart, "[[Advanced Crystal Beast Amber Mammoth]]".
  * In the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's voice and mannerisms are based on [[wikipedia:Arnold Schwarzenegger|Arnold Schwarzenegger]].
