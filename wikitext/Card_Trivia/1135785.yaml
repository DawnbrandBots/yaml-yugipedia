title: Card Trivia:Fusion Draft
wikitext: |-
  {{Navigation}}
  * "[[Battle Warrior]]", "[[Dissolverock]]", "[[Hinotama Soul]]", "[[Monster Egg]]", and "[[Skull Servant]]" appear in this card's artwork.
  ** Fittingly, the aforementioned monsters are [[Normal Monster]]s that are listed as [[Fusion Material]] for other [[Fusion Monsters]]:
  *** "Skull Servant" + "Dissolverock": "[[Flame Ghost]]"
  *** "Skull Servant" + "Battle Warrior": "[[Zombie Warrior]]"
  *** "Monster Egg" + "Hinotama Soul": "[[Charubin the Fire Knight]]"
