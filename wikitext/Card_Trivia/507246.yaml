title: Card Trivia:Demiurge Ema
wikitext: |-
  {{Navigation}}

  * The moon in this card's artwork appears in the artwork of "[[Blue Moon]]".
  * This monster is based on the [[wikipedia:demiurge|demiurge]], a divine being responsible for the creation of the physical world in pre-Christian religion, but is depicted as malicious in [[wikipedia:Gnosticism|Gnosticism]] for being linked to the material world.
  ** This monster's effect mentioning "[[Homunculus Token]]s" further reflects this, as the "Homunculus Tokens" are based on the [[wikipedia:homunculus|homunculus]], an artificial humanoid composed of artificial materials created in alchemy.
  * During the "Today's Strongest Card" segment at the end of {{episode|Yu-Gi-Oh! GX|077|ref}}, this card was revealed to be a [[Fan-Made Cards|Fan-Made Card]], whose card artwork was based on an illustration by Ms. Kanai, submitted for a Japanese card illustration contest held while the ''[[Yu-Gi-Oh! GX]]'' anime was airing.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are based on Spell Cards used by [[T-Bone]] alongside this monster in {{episode|Yu-Gi-Oh! GX|077|ref}}.
  ** This monster's effect to [[Special Summon]] itself from the [[hand]] by [[send]]ing four monsters with 2400 or more [[ATK]] and 1000 [[DEF]] from the hand, [[Deck]], and/or [[field]] to the [[Graveyard]] is based on the effect of "[[Shadow Moon]]", which can Special Summon this monster by sending four Level 5 or higher monsters with different [[Attribute]]s from the hand or field to the Graveyard. In the episode, T-Bone used "Shadow Moon" to send four different [[Monarch]] monsters from his hand and field to the Graveyard, which each have 2400 ATK and 1000 DEF.
  ** This monster's ''OCG''/''TCG'' effect to [[destroy]] one Spell/[[Trap Card]] on each player's field and Special Summon one "[[Homunculus Token]]" to each field in [[Defense Position]] is based on the effect of "Blue Moon", which can treat a Spell/Trap Card on each player's field as "Homunculus Tokens" and Special Summon them in Defense Position.
  ** This monster's ''OCG''/''TCG'' effect to gain 1600 ATK following the Summoning of the "Homunculus Tokens" is an alteration of its effect in the anime, which allows it to gain 800 ATK for each "Homunculus Token" on the field. In this episode, after the effect of "Blue Moon" Special Summons the two "Homunculus Tokens", this monster gained a total of 1600 ATK.
