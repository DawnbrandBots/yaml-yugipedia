title: Card Trivia:Gem-Knight Nepyrim
wikitext: |-
  {{Navigation}}

  * This monster's design is a combination of "[[Gem-Knight Lapis]]" and "[[El Shaddoll Construct]]". Fittingly, according to ''[[Duel Terminal]]'' lore, both monsters are the same person.
  ** This monster's name is a portmanteau of "[[wikipedia:Pyrite|pyrite]]" (a component in [[wikipedia:Lapis lazuli|lapis lazuli]]) and "Nephilim", the Japanese name of "Construct".
  ** This monster shares the same [[Attribute]] ([[LIGHT]]) and [[Type]] ([[Fairy]]) with "Construct".
  ** This monster shares the same [[original ATK and DEF]] (1550/1600) with "[[Constellar Sombre]]", who is actually the twin of "Gem-Knight Lapis", "[[Gem-Knight Lazuli]]".
  *** This monster shares the same crystal of 'Creation' in its chest as "Sombre". Its pose is also mirrored with "Sombre", and the background of the artwork has the same "[[Constellar]]"-style sparkles as "Sombre".
