title: Card Trivia:XY-Dragon Cannon
wikitext: |-
  {{Navigation}}

  * This monster's [[original ATK and DEF]] are the same as the [[ATK]] and [[DEF]] of "[[X-Head Cannon]]" when equipped with "[[Y-Dragon Head]]".
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|253|ref}}, specifically from the panel where "[[X-Head Cannon (manga)|X-Head Cannon]]" and "[[Y-Dragon Head (manga)|Y-Dragon Head]]" merge to create [[XY-Dragon Cannon (manga)|this monster]].
