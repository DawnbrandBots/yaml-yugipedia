title: Card Trivia:Sakakaze the Talismanic Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Avian Spell Tactics]]" and "[[Talismanic Seal Array]]".
  * "Sakakaze" is a term that refers to an ascending vertical attack in the Japanese martial art kendo.
  ** It could also be translated to "reverse wind". Hence this monster's [[Attribute]] is [[WIND]], and its artwork has a green theme.
