title: Card Trivia:Consolation Prize
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a wordplay between 廃車復活 (lit. "restoration of an out-of-service car") and 敗者復活 ([[wikipedia:Repechage|repechage]]).
  * "[[F.A. Sonic Meister]]" appears in this card's artwork, being redesigned into "[[F.A. Dawn Dragster]]".
