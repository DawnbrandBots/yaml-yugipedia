title: Card Trivia:Favorite HERO Flame Wingman
wikitext: |-
  {{Navigation}}

  * The full moon from the artwork of "[[Skyscraper]]" appears in this card's artwork.
  * This monster is a [[retrain]]ed "[[Favorite]]" counterpart of "[[Elemental HERO Flame Wingman]]".
  ** Its name is a reference to how [[Jaden Yuki]] called "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" his "favorite card" in the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime, as is the case with all "[[Favorite]]" cards.
  ** Its pose is based on the pose taken by "Elemental Hero Flame Wingman" in {{episode|GX|001|ref}} when it is depicted standing on the needle of the tallest building of "[[Skyscraper (anime)|Skyscraper]]".
  ** Its [[Fusion Material]]s requiring two monsters with same [[Type]] but different [[Attribute]]s references how "Flame Wingman" requires the [[WIND]] "[[Elemental HERO Avian]]" and the [[FIRE]] "[[Elemental HERO Burstinatrix]]" (both [[Warrior]] monsters) as [[material]].
  ** Its effect to make it gain 1000 [[ATK]] when battling an opponent's monster with 2200 or more ATK is a reference to the effect of "Skyscraper".
  * This card was revealed on February 24th, 2026, which marked the 21st anniversary of ''[[The Lost Millennium]]'', the [[Core Booster|Core Booster pack]] set that featured the debut of "Elemental HERO Flame Wingman".
