title: Card Trivia:Sword of Kusanagi
wikitext: |-
  {{Navigation}}

  * This sword appears in the artworks of "[[Amaterasu]]" and "[[Susa Soldier]]".
  * This card is based on the ''[[wikipedia:Kusanagi no Tsurugi|Kusanagi no Tsurugi]]'', a legendary Japanese sword and one of the three [[wikipedia: Imperial Regalia of Japan|Imperial Regalia of Japan]].
