title: Card Trivia:Jewelry Trap Hole
wikitext: |-
  {{Navigation}}

  * The monster in this card's artwork also appears in the artworks of "[[Acetic Acid Trap Hole]]", "[[Best Bite]]", "[[Inside Out Roll]]", "[[Rolled Sticky Save]]", "[[Rolled Voltuna]]", "[[Rolling Cucopper]]", "[[The Noodle Art of Pottery]]", "[[The Noodle Art of Roastery]]", "[[The Noodle Art of Saucery]]", "[[The Noodle Art of Savory]]", "[[Trap Lid]]", and "[[Twin Hole]]".
  * This card is a [[Bubble Era]] ''[[Rush Duel]]'' parody of "[[Acid Trap Hole]]" (in particular its [https://yugipedia.com/wiki/File:AcidTrapHole-TF05-JP-VG-2-artwork.png second ''OCG''/''TCG'' artwork]), using crystalline spikes instead of [[wikipedia:Sulfuric acid|sulfuric acid]].
  ** This card's connection with the Bubble Era [[series]] is reflected in its name: The combination of the first word「ジュエリー」(''Juerī'', lit. "jewelry") and the last kanji「穴」(''Ana'', lit. "hole") in this card's Japanese name both make up a pun on [[wikipedia:Juliana's|Juliana's]] (ジュリアナ, ''Juriana''), a Japanese nightclub that operated during the early 1990s where office ladies wearing body-conscious clubwear would congregate and dance.
