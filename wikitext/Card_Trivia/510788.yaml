title: Card Trivia:Panther Warrior
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Limited Edition 3: Joey Pack]]'', as well as one of the cover cards of ''[[Structure Deck: Joey]]'' and ''[[Collectible Tins 2005]]''.
  * This monster appears in the artworks of "[[Miracle Moment]]", "[[Sea Stealth Attack]]", "[[Verdict of Anubis]]", "[[Zero Gazer]]", and the second artwork of "[[Fire Formation - Tenki]]".
  * This monster has a [[retrained]] [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart: "[[Swift Panther Warrior]]".
  * This monster has a "[[Beastborg]]" counterpart: "[[Beastborg Panther Predator]]".
  * This monster shares the same [[original ATK]] (2000) as "[[The Unfriendly Amazon]]", and features an effect that allows the player to [[Tribute]] their monsters for a [[cost]].
  ** Both monsters are also used by major characters in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]]: this monster was used by [[Joey Wheeler]] and "[[The Unfriendly Amazon (anime)|The Unfriendly Amazon]]" was used by [[Mai Valentine]].
  * This monster's pose in its second ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|151|ref}} showing [[Panther Warrior (manga)|this monster]] being Summoned, albeit with this monster's legs and cape changing position.
