title: Card Trivia:Tachyon Cannon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on a [[wikipedia:Plasma railgun|plasma railgun]], a linear motor device that shoots ionized plasma instead of solid material.
  * This card's effect to grant the [[equip]]ped monster additional attacks is likely a reference to the theoretical ability of the [[wikipedia:Tachyon|tachyon particle]] to travel back and forth in time; the effect allows the equipped monster to travel itself back to a time where it had not yet declared an attack.
