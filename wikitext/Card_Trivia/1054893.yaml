title: Card Trivia:Double Dai
wikitext: |-
  {{Navigation}}

  * "[[Knight Day Grepher]]" and "[[Warrior Dai Grepher]]" appears in this card's artwork.
  ** The event depicted in the artwork of "[[Unexpected Dai]]" can be seen from a different angle in this card's artwork.
  *** Similar to how the Japanese name of "Unexpected Dai" is a play on the word for "unexpected", this card's Japanese name is a play on 「想定外」 (''souteigai'', "unforeseen").
  ** The two incarnations of the aforementioned monsters reflect this card's name and its effect to [[Special Summon]] an [[EARTH]] [[Warrior]] monster with the same or lower [[Level]] as the player's [[target]]ed monsters. "Knight Day Grepher" is a [[Level 4]] Warrior monster, and "Warrior Dai Grepher" is an EARTH Warrior monster with a matching Level.
