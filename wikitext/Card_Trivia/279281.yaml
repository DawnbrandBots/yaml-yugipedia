title: Card Trivia:Duston Roller
wikitext: |-
  {{Navigation}}

  * "[[Blue Duston]]", "[[Green Duston]]", "[[Red Duston]]", "[[White Duston]]", "[[Yellow Duston]]", and 2 other currently unknown "[[Duston]]" monsters are featured in this card's artwork.
  * The object featured in this trap's artwork is a "[[wikipedia:Paint roller|carpet cleaning roller]]"; an attachment for a [[wikipedia:mop|mop]] or [[wikipedia:broom|broom]] with an adhesive roll at the end used to trap lint or settled dust.
