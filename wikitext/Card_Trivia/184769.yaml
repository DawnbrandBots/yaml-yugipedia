title: 'Card Trivia:Number 32: Shark Drake'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Puppet Shark]]", "[[Shark Splash]]", and "[[Xyz Revive Splash]]".
  * The number 32 appears on the left side of this monster's chest.
  * This is the [[signature card]] of [[Reginald Kastle|Reginald "Shark" Kastle]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster has three forms:
  ** A downgraded [[Main Deck]] form: "[[Drake Shark]]".
  ** Two "[[Number C]]" [[Card evolutions|upgraded]] forms:
  *** Not Ranked-Up: "[[Number C32: Shark Drake Veiss]]".
  *** [[Ranked-Up]]: "[[Number C32: Shark Drake LeVeiss]]".
  * This is the first [[Sea Serpent]] "[[Number]]" monster.
  * This monster could be considered the antithesis to "[[Number 39: Utopia]]".
  ** "Utopia" relies on pure defensive strategies by [[negate|negating]] attacks, while this monster relies on pure offensive strategies, [[Special Summon]]ing the opponent's monster it [[destroyed by battle]] and attacking it again, to inflict even more damage to the opponent.
  ** Both monsters' "Number C" forms have opposing color schemes compared to their base forms: "Utopia" has a primarily bright color scheme while "[[Number C39: Utopia Ray]]" has a primarily darker color scheme; this monster has a darker scheme, while "Shark Drake Veiss" has a lighter color scheme.
