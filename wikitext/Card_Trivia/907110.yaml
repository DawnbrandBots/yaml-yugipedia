title: Card Trivia:Starry Night, Starry Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Selection 10]]''.
  * This monster appears in the artworks of "[[Starry Knight Arrival]]", and "[[Starry Knight Blast]]".
  ** This monster's silhouette appears in the artwork of "[[Starry Knight Ceremony]]".
  * This monster is a [[retrained]] counterpart of "[[Seiyaryu]]".
  ** This monster's Japanese name is a play on the ''[[TCG]]'' name of "Seiyaryu": it has the kanji 「{{Ruby|聖|せい}}{{Ruby|夜|や}}」 (''Seiya'') at the beginning, and 「{{Ruby|竜|りゅう}}」 (''Ryū'') at the end.
