title: Card Trivia:Personal Spoofing
wikitext: |-
  {{Navigation}}

  * "[[Altergeist Marionetter]]" and the snake-like creatures that form part of "[[Altergeist Primebanshee]]" appear in this card's artwork.
  * This card's name references a [[wikipedia:Spoofing attack|spoofing attack]], a situation in which a person or program successfully identifies as another by falsifying data to gain an illegitimate advantage.
