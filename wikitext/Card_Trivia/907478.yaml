title: Card Trivia:Roxrose Dragon
wikitext: |-
  {{Navigation}}

  * This monster is named after the ''Rosa roxburghii'', a species of pink wild rose native to China.
  ** The Japanese name for "Roxrose" (ロクスローズ, ''Rokusurōzu'') is an anagram of another "[[Rose Dragon]]" monster: "[[Crossrose Dragon]]" (クロスローズ, ''Kurosurōzu'').
  ** The Japanese name for the ''Rosa roxburghii'' is ''Izayoibara'', referencing the Japanese surname of [[Akiza Izinski]], "Aki '''Izayoi'''", who uses a "[[Rose]]" [[Deck]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime and [[Yu-Gi-Oh! 5D's (manga)|manga]].
