title: Card Trivia:RB Dragophone
wikitext: |-
  {{Navigation}}

  * The black smartphone in this card's artwork appears in the artwork of "[[Site Preview]]".
  * The English letters "RB" in this card's name is an abbreviation "[[Red-Boot Boost Dragon]]" and "[[Blue-Fang Burst Dragon]]", which this card's effect can [[support]].
  ** Fittingly, the smartphones in this card's artwork are each based on the designs of "Red-Boot Boost Dragon" and "Blue-Fang Burst Dragon".
