title: Card Trivia:Super Crashbug
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bug Switch]]".
  ** This monster's ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] is based on the effect of "Bug Switch", which requires the player the [[banish]] "[[Crashbug X]]", "[[Crashbug Y]]", and "[[Crashbug Z]]" from their [[Graveyard]] to [[Special Summon]] it.
  * This monster has the highest [[original DEF]] (3000) of all [[Level 4]] monsters.
  ** Due to this monster's effect, its [[ATK]] will become 3000, giving this card the highest ATK of all Level 4 monsters.
  * This monster's ATK/[[DEF]]-switching effect references the achievements of most computer viruses: to infiltrate a computer or program, scramble and confuse the data of all security programs, and try to eliminate and destroy the viruses.
