title: Card Trivia:Sky Cavalry Centaurea
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on ''saint'' (セイント ''seinto''), and ''[[wiktionary:centaurea|centaurea]]'' (セントレア ''sentorea'', セントーレア ''sentōrea'' or ケンタウレア ''kentaurea''), which is derived from the Latin term ''centaurus'' ("centaur").
  ** This card is based off a [[wikipedia:Centaur|centaur]] and a [[wikipedia:Centaurea|centaurea]] appears on the crest of its shield.
