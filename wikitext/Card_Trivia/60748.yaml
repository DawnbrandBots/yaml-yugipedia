title: Card Trivia:Respect Synchron
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Brionac, Dragon of the Ice Barrier]]" is featured on this card's artwork.
  * The card's design is similar to "[[Change of Heart]]".
  * This card and "[[Synchro Deflector]]" are the only "[[Synchron]]" cards that are [[Trap Card]]s.
