title: Card Trivia:D/D/D Dragonbane King Beowulf
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Pendulum Domination Structure Deck]]''.
  * This monster is based on [[wikipedia:Beowulf (hero)|Beowulf]].
  ** This monster's wolf-like appearance is a reference to different possible meanings of the name "Beowulf": "Bee-Wolf" ("hunter of bees"), "Beado-Wulf" ("war wolf"), or "Beow-Wolf" ("wolf of [[wikipedia:Beow|Beow]]").
  * This card has the same [[ATK]]/[[DEF]] (3000/2500) as the [[signature card]]s of main rivals in the anime: [[Seto Kaiba]]'s "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]", [[Chazz Princeton]]'s "[[Armed Dragon LV10 (anime)|Armed Dragon LV10]]", [[Jack Atlas]]' "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]", and [[Kite Tenjo]]'s "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]".
  ** This card's name, "Dragonbane", is also a reference to how the aforementioned cards are [[Dragon]] monsters.
  ** Ironically, this monster is based on Beowulf, who killed a dragon, as told in [[wikipedia:Beowulf|his epic poem]].
  ** This card is also a reference to how "[[D/D/D Doom King Armageddon]]" is the first signature card of a main rival in the anime to not be Dragon.
