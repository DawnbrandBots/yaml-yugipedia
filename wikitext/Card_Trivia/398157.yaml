title: Card Trivia:Amorphactor Pain, the Imagination Dracoverlord
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Forge of the True Dracos]]".
  * This monster is "[[Lector Pendulum, the Dracoverlord]]" and "[[Amorphage Goliath]]" merged together, possibly as a result of "[[Amorphous Persona]]".
  * This is the first [[Ritual Monster]] that lists a specific card other than a [[Ritual Spell Card]] as requirement for the [[Ritual Summon]], as "Amorphous Persona" is a [[Field Spell Card]].
