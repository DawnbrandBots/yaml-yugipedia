title: Card Trivia:Odd-Eyes Phantom Dragon
wikitext: |-
  {{Navigation}}

  * This monster is the [[Yu-Gi-Oh! ARC-V (manga)|manga]] counterpart of "[[Odd-Eyes Pendulum Dragon]]".
  ** Their [[Card effect|effects]] mirror each other; while both of their [[Pendulum Effect]]s [[activate]] when a [[Pendulum Monster]] [[battle]]s and the regular effect deals additional [[damage]] while battling, the actual functions of their effects greatly contrast each other.
  ** True to its counterpart status, while most of the body of "Pendulum Dragon" is [[wikipedia:red|red]], this monster has its body mostly [[wikipedia:blue|blue]], making these 2 monsters represent opposite sides of the [[Pendulum Scale]].
  ** In the manga, it is possible that this monster, and by extension all the other manga counterparts of the [[Four Dimensional Dragons]], may have been originated from the original card transforming into a [[Pendulum Monster]] (in this case, "[[Odd-Eyes Dragon]]"). This is strongly supported by [[Yuto (manga)|Yuto]]'s "[[Dark Rebellion XYZ Dragon (manga)|Dark Rebellion XYZ Dragon]]" (the only original Dimension Dragon featured in the manga) also appearing to have been permanently transformed/replaced by "[[Dark Anthelion Dragon (manga)|Dark Anthelion Dragon]]", and by [[Yugo (manga)|Yugo]] calling "[[Clearwing Fast Dragon (manga)|Clearwing Fast Dragon]]" an "evolved card".
  * This is the [[signature card]] of [[Yuya Sakaki (manga)|Yuya Sakaki]] in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
  ** This card shares the same original ATK (2500) as the signature cards of the other main protagonists of the manga: [[Yugi Mutou (manga)|Yugi Mutou]]'s "[[Dark Magician (manga)|Dark Magician]]", [[Jaden Yuki (manga)|Jaden Yuki]]'s "[[Elemental Hero Terra Firma (manga)|Elemental Hero Terra Firma]]", [[Yusei Fudo (manga)|Yusei Fudo]]'s "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]", [[Yuma Tsukumo (manga)|Yuma Tsukumo]]'s "[[No. 39: Utopia (manga)|No. 39: Utopia]]", [[Tatsuhisa Kamijo (manga)|Tatsuhisa Kamijo]]'s "[[Multistrike Dragon Dragias (manga)|Multistrike Dragon Dragias]]" and [[Yudias Velgear (manga)|Yudia Velgear]]'s "[[Galactica Oblivion (manga)|Galactica Oblivion]]".
  ** This card has the same [[Level]] (7) as the [[Main Deck]]-based signature cards of the other manga main protagonists: [[Yugi Muto]]'s "[[Dark Magician (manga)|Dark Magician]]", [[Jaden Yuki]]'s "[[Elemental HERO Terra Firma (manga)|Elemental HERO Terra Firma]]", [[Yuga Ohdo (manga)|Yuga Ohdo]]'s "[[Sevens Road Magician (manga)|Sevens Road Magician]]" and [[Yudias Velgear (manga)|Yudias Velgear]]'s "[[Galactica Oblivion (manga)|Galactica Oblivion]]".
  ** This card's [[Attribute]] ([[DARK]]) and [[Level]] (7) are the same as Yugi Muto's "Dark Magician".
  ** This card has offensive effect like "Elemental HERO Terra Firma" rather than a defensive one, like "Stardust Spark Dragon" and "Number 39: Utopia".
  ** Its name is a reference to Yuya's alias in the manga, "Phantom".
  ** This monster has physical features of each of the [[Four Dimensional Dragons]], reflecting how Yuya shares his body with all his counterparts in the manga.
  *** Its chest plate, horns, and limbs are similar to those of "Odd-Eyes Pendulum Dragon".
  *** It has the same chin spike as "[[Dark Rebellion Xyz Dragon]]" ([[Yuto]]).
  *** The pattern on its lower neck and its fingers and toes are similar to those of "[[Clear Wing Synchro Dragon]]" ([[Yugo]]).
  *** Its head and body are similar to those of "[[Starving Venom Fusion Dragon]]" ([[Yuri]]).
  * "[[Odd-Eyes Phantasma Dragon]]" and "[[All-Eyes Phantom Dragon]]" are powered-up versions of this monster.
  * The first three [[Dragon]] "[[Odd-Eyes]]" monsters that debuted in the manga are associated to the three primary colors: red for "[[Odd-Eyes Persona Dragon]]", blue for this monster, and green for "[[Odd-Eyes Mirage Dragon]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect reflects how in the manga this monster's effect, which inflicts damage equal to the ATKs of the monsters in the [[Pendulum Zone]]s, is usually used with "[[Odd-Eyes Mirage Dragon (manga)|Mirage Dragon]]" and "[[Odd-Eyes Persona Dragon (manga)|Persona Dragon]]", both having 1200 [[ATK]].
  * This card's ''OCG''/''TCG'' artwork is based on {{chapter|ARC-V|003|ref}}, specifically the panel showing [[Odd-Eyes Phantom Dragon (manga)|this monster]] being Summoned.
