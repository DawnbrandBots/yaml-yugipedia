title: Card Trivia:Brotherhood of the Fire Fist - Snake
wikitext: |-
  {{Navigation}}

  * In the ''[[OCG]]'', this card is named after ''[[wikipedia:Lin Chong|Lin Chong]]'' (read in Japanese as Rin Chū) and "snake" (suneiku).
  ** ''Lin Chong'' ranks 6th of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "Panther Head".
  *** This is a bit weird because its "flaming beast" is a snake, but the weapon of ''Lin Chong'' is a 8-foot-long snake spear.
  * This monster appears in "[[Fire Formation - Tensen]]" and "[[Five Brothers Explosion]]".
  * The kanji 雄 on this monster's belt and the snake in this card's artwork means "masculinity."
  * The [[Duelist League 18 participation cards]] Spanish prints of this card have their name in Portuguese ("''Irmandade do Punho de Fogo - Serpente''") instead of in Spanish ("''Hermandad del Puño de Fuego - Serpiente''").
