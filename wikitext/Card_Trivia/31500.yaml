title: Card Trivia:Tytannial, Princess of Camellias
wikitext: |-
  {{Navigation}}

  * This monster is loosely based on [[wikipedia:Titania|Titania]], the [[wikipedia:Fairy Queen|Queen of the Fairies]] from [[wikipedia:William Shakespeare|William Shakespeare]]'s play, ''[[wikipedia:A Midsummer Night's Dream|A Midsummer Night's Dream]]''. 
  ** This monster's [[WIND]] [[Attribute]] references the season of [[wikipedia:Winter|winter]], which is typically associated with a strong breeze. Additionally, its design is based on the [[wikipedia:Camellia|camellia]], which blooms in mid-to-late winter.
