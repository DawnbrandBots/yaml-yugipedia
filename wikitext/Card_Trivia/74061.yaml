title: Card Trivia:Dark Armed Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Ghosts From the Past: The 2nd Haunting]]''.
  * This monster appears in the artworks of "[[A Major Upset]]", "[[Dark Mambele]]", "[[Dracocension]]", and "[[Draconnection]]".
  * This monster is the [[Dark counterpart]] of "[[Armed Dragon LV7]]".
  ** This monster has an [[Xyz Monster]] [[counterpart]]: "[[Dark Armed, the Dragon of Annihilation]]".
  * This is one of the only two Dark counterparts of a "[[LV]]" monster, the other being "[[Dark Horus]]".
  ** Both were released in the same [[Core Booster|Core]] [[Booster pack]], ''[[Phantom Darkness]]'', just like their base forms ("[[Armed Dragon]]" and "[[Horus the Black Flame Dragon LV8]]", respectively) were both released in ''[[Soul of the Duelist]]''.
  * At one time, this was one of the most sought-after cards in the ''[[TCG]]'', selling for as much as $250.00.
  * The ''Phantom Darkness'' advertisement found in ''Shonen Jump'' Vol. 6, Issue 3, page 9 lists this card, "[[Rainbow Dark Dragon]]", and "[[Yubel - The Ultimate Nightmare]]" as [[Beast]] monsters instead of their respective Types. In pages 371 and 372, this card is properly listed as a [[Dragon]].
