title: Card Trivia:Naturia Sacred Tree
wikitext: |-
  {{Navigation}}

  * The art of this card is based on the [[wikipedia:Irminsul|Irminsul]], a sacred tree.
  * This tree was first alluded to in the name and artwork of "[[Leo, the Keeper of the Sacred Tree]]", who is related to the "[[Naturia]]" archetype but is not a member himself.
  * This tree appears in the artwork of several cards and seems to tell an overarching story dealing with the archetypes introduced in ''[[Series 9]]''. The order of the events is not completely clear.
  ** In "[[El Shaddoll Fusion]]"; "[[El Shaddoll Winda]]" has apparently damaged the tree for an unknown reason and enraged "Leo, the Keeper of the Sacred Tree".
  ** In "[[Qlipper Launch]]"; "[[Qliphort Scout]]" Activates a [[wikipedia:Sephirot|Sephirot]] structure deep in the roots of the tree.
  *** This results in the tree being uprooted in the artwork of "[[Qlimate Change]]", notice that the 10 spheres are colorless and inactive at this point.
  ** After uprooting; the Sephirot structure absorbs the 10 Pearls from the body of "[[El Shaddoll Grysta]]" in the art of "[[Saqlifice]]", thus activating its 10 spheres. (It is unknown at this point how Grysta was killed.)
  ** Absorbing the pearls and activating the 10 Sephirot spheres also somehow releases the "[[Infernoid]]" monsters, as seen in the artwork of "[[Void Expansion]]". (The two small floating islands seen in the art of "Saqlifice" and "[[Naturia Forest]]" can be seen burning in the art of "Void Expansion" so the events must be successive.)
  *** This event is further shown in the art of "[[Nephe Shaddoll Fusion]]".
  ** The tree can also be seen in the background during the events of "[[Ritual Beast Ambush]]"
  ** Later for an unknown reason the Sephirot structure (That was related to the Qliphort) slides down to reveal the 10 Pearls/Spheres as seen in the art of "[[Oracle of Zefra]]".
  ** 2 of the Pearls/Spheres immediately choose hosts, as seen in the art of "[[Zefra Path]]".
  *** This event creates "[[Ritual Beast Tamer Zeframpilica]]" and purifies "[[El Shaddoll Wendigo]]" (creating "[[Ritual Beast Tamer Zefrawendi]]").
  ** By unknown means, the Sacred Tree is severely damaged, as seen in "[[Void Imagination]]", while "[[Infernoid Decatron]]" hovers around it.
  ** In "[[Nine Pillars of Yang Zing]]"; it emanates nine light beams, one of which hits "[[Denglong, First of the Yang Zing]]".
  ** It appears in flames once again in the artwork of "[[Zefra War]]".
  * According to the [[Master Guide]] 4 Monster storylines<ref>[http://www.ygorganization.com/monsterstories/ YGOrganization] - [OCG] Master Guide 4 - Monster Stories</ref>, the Sacred Tree's roots go deep underground, even reaching [[Master Guide 3 card storylines|the world's]] core. Overflowing with its power, "[[Steelswarm Roach]]" could evolve into "[[Evilswarm Exciton Knight]]", and "[[Naturia Leodrake]]" into "Leo, the Keeper of the Sacred Tree".

