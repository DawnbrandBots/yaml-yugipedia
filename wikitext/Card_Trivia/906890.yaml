title: Card Trivia:CAN:D
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[JAM:P Check!]]", "[[JAM:P Set!]]", "[[JAM:P Start!]]", and "[[JAM:P Up!]]", as well as in both artworks of "[[JAM:P Catch!]]".
  * This monster's name is a pun on the word "candy" and the smiling [[wikipedia:emoticon|emoticon]] ":D".
  * "[[CAN - Re:D]]" appears to be an adult version of this monster
