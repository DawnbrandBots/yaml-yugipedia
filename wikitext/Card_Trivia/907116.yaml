title: Card Trivia:Awakening of the Possessed - Greater Inari Fire
wikitext: |-
  {{Navigation}}

  * "[[Familiar-Possessed - Hiita]]" appears in this card's artwork.
  * This card is named after [[wikipedia:Inari Ōkami|Inari]], the god of foxes in Japanese mythology.
  * This monster is a powered-up version of "[[Inari Fire]]".
