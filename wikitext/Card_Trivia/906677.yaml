title: Card Trivia:Despian Luluwalilith
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Swordsoul Punishment]]" and "[[Tri-Brigade Roar]]".
  * "[[Dogmatika Fleurdelis, the Knighted]]" → "[[The Iris Swordsoul]]" → "Despian Luluwalilith"
  ** This monster's armor is based on that of "[[Despian Quaeritis]]".
  * This monster is "[[Blazing Cartesia, the Virtuous]]", after "Ecclesia" is separated from it (i.e. the soul of "[[Guiding Quem, the Virtuous]]") and "Fleurdelis" is chosen as the next host for "Quem" instead.
  ** This monster lacks the typical "red eyeballs" motif of the other corrupted "[[Despia]]" monsters (such as "Despian Quaeritis"). In ''[[Yu-Gi-Oh! Card Game Art Works]]'', it is explained that is due to "Fleurdelis" managing to partially suppress the souls of previous "[[Dogmatika]]" saints along with that of "Quem's", thus allowing her to maintain her control over her dead body just long enough to defeat "[[Bystial Dis Pater]]".
  * This card's name is a combination of [[wikipedia:Aclima|Luluwa]] (the oldest daughter of [[wikipedia:Adam and Eve|Adam and Eve]]) and [[wikipedia:Lilith|Lilith]] (the first wife of Adam), who refused to submit to him and became a demon.
  ** Fittingly, "Fleurdelis", who refused to follow the "[[Dogmatika]]" Church, has now been revived as a "[[Despia]]" monster.
  * This card is the first [[Synchro Monster]] that explicitly lists a [[Tuner monster]] with a specific [[Level]] as [[material]].
  ** "[[Sea Dragon Lord Gishilnodon]]" did so implicitly due to requiring exactly 1 non-Tuner of a specific Level.
