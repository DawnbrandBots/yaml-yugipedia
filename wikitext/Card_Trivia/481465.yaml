title: Card Trivia:Lost World
wikitext: |-
  {{Navigation}}

  * "[[Babycerasaurus]]", "[[Bracchio-raidus]]", "[[Destroyersaurus]]", "[[Gilasaurus]]", "[[Hyper Hammerhead]]", "[[Kabazauls]]", "[[Mad Sword Beast]]", "[[Sabersaurus]]", "[[Miracle Jurassic Egg]]", "[[Trakodon]]", and "[[Uraby]]" appear in this card's artwork.
  ** The confused reaction of "Trakodon" and "Uraby" is a reference to the fact that they are [[recolored counterpart]]s of each other.
  * This card's name is a reference to the 1997 film, ''[[wikipedia:The Lost World: Jurassic Park|The Lost World: Jurassic Park]]'', which takes place on an island inhabited by reanimated dinosaurs.
  ** This card was the second [[Field Spell]] to solely [[support]] [[Dinosaur]] monsters, just like ''The Lost World: Jurassic Park'' was the second film in the ''[[wikipedia:Jurassic Park (franchise)|Jurassic Park]]'' franchise.
