title: Card Trivia:Ehren, Lightsworn Monk
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "''ehre''", the German word for "honor".
  * This monster's effect [[shuffle]]s an opponent's monster into the [[Deck]] instead of [[destroy]]ing it by battle, referencing a monk's training rule to prevent them from killing anyone.
  * Despite this monster's feminine appearance, its French and German names feature masculine titles, "le Moine" and "Mönch". This is likely because these words have no feminine forms (which would hypothetically be "la Moine" and "Mönchin", while other ''[[TCG]]'' languages derive fictitious feminine forms for their respective words for "monk".
