title: Card Trivia:Cookpal Pumapotato
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artworks of "[[Canning Cuisine]]" and "[[Food Cemetery]]".
  * This monster's Japanese name, "Potatopard" (ジャガジャガー ''Jagajagā'') is a portmanteau of the Japanese words for "potato" (ジャガイモ ''jagaimo'') and "jaguar" (ジャガー ''jagā'').
