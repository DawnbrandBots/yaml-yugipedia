title: Card Trivia:Evigishki Neremanas
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Focused Aquamirror]]".
  * "Neremanas" in this card's name is a portmanteau of ''[[wikipedia:Nereids|nereid]]'' (a sea nymph in Greek mythology) and ''mánas'' (मनस्, the Sanskrit word for "mind").
  * This monster is an upgraded form of "[[Evigishki Mind Augus]]", enhanced with the powers of the "[[Ice Barrier]]" through the "[[Gishki Nekromirror]]".
