title: Card Trivia:Galaxy War Drake
wikitext: |-
  {{Navigation}}

  * Most cards features a [[Trigger]] effect that [[activate]]s from the player's [[Graveyard]] if they were [[sent]] there when a card's effect is resolved, or from the player's [[hand]] if they weren't there in the Graveyard when that effect wasn't resolved. This card's effect erroneously has these conditions reversed.
