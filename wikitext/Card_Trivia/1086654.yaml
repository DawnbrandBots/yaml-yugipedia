  * "[[Metalflame Swordsman]]" appears in this card's artwork.
  ** This card's artwork references the artwork of "[[Rare Metalmorph]]", with "Metalflame Swordsman" taking the place of the mechanical figure featured in the artwork of the "[[Metalmorph (archetype)|Metalmorph]]" cards.
