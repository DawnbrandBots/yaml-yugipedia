title: Card Trivia:Valiant Shark Lancer
wikitext: |-
  {{Navigation}}

  [[File:Sharkify-JP-Anime-ZX-NC.png|thumb|right|300|"[[Black Ray Lancer (anime)|Black Ray Lancer]]" [[equip]]ped with "[[Sharkify]]", as seen in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.]]

  * This monster is an [[Card evolutions|upgraded]] form of "[[Black Ray Lancer]]".
  ** This monster's appearance references a scene from {{episode|ZEXAL|084|ref}}, where [[Reginald Kastle|Reginald "Shark" Kastle]] [[equip]]ped "[[Black Ray Lancer (anime)|Black Ray Lancer]]" with "[[Sharkify]]", treating as a "[[Shark (archetype)|Shark]]" monster and changing its spear into the shape of a shark.
  *** This monster's name references both the naming scheme of "Black Ray Lancer" assumed by Shark while equipped with "Sharkify" - "Black Shark Lancer"; it is also a reference to ''[[Legacy of the Valiant]]'', a [[Core Booster|Core]] [[Booster pack]] which features "[[Number C101: Silent Honor DARK]]" as the [[cover card]].
  *** This monster's [[original ATK]] (2500) references how "Black Ray Lancer's" original ATK (2100) is increased by 400 while equipped with "Sharkify".
  ** This monster's name is a pun on "[[Barian]]" (バリアン, ''Barian'') and "Valiant" (ヴァリアント, ''Varianto''), as the letters "B" and "R" are pronounced in a similar way to "V" and "L" in Japanese.
  ** This monster's effect to place a [[Spell]] on top of the player's [[Deck]] references [[Chaos Draw]], an ability which allowed the [[Seven Barian Emperors]] to [[draw]] "[[Rank-Up-Magic - The Seventh One (anime)|Rank-Up-Magic - The Seventh One]]" during a Duel in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
