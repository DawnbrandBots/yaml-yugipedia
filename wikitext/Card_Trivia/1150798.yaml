title: Card Trivia:Fist Armed Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed counterpart of "[[Armed Dragon LV5]]".
  ** This monster's Japanese name, "Threat Armed Dragon", is based on the Japanese title of {{episode|GX|025|ref}}: "Versus Manjome Thunder (Part 1): The '''Threat''' of Armed Dragon".
  ** This monster's appearance is based on scenes from the same episode where "[[Armed Dragon LV5 (anime)|Armed Dragon LV5]]" attacks by spinning its arms at high speed, creating glowing red motion blurs.

  == See also ==
