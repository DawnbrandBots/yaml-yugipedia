title: Card Trivia:Stray Lambs
wikitext: |-
  {{Navigation}}

  * This card is a weaker version of "[[Scapegoat]]". It is not a [[Quick-Play Spell Card]] and only [[Summon]]s 2 [[Token]]s instead of 4. However, unlike the "[[Sheep Token]]s", the "[[Lamb Token]]s" can be [[Tribute]]d for a [[Tribute Summon]].
  ** The horns of the two "lambs" that appears in this card's artwork are much longer and thinner than the horns of the four "sheep" depicted on "Scapegoat".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Stray Lambs]]".
