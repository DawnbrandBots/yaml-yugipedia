title: Card Trivia:Giant Germ
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on the largest-known germ, ''[[wikipedia:Balantidium coli|Balantidium coli]]'', the only ciliate phylum infectious to humans.
  * This monster's effects may be elucidated based on the following:
  ** This monster's effect [[activate|activating]] upon being [[destroy]]ed and inflicting effect damage reflects how a host's immune system fights off "germs", which in-part often raises the entire body's temperature to do so, in addition to the germ releasing its payload of symptoms to make the host feel ill.
  ** This monster's [[Special Summon]]ing effect reflects how most, if not all germs (especially this one as it is based on a bacterium) undergo [[wikipedia:Mitosis|mitosis]], an [[wikipedia:Asexual reproduction|asexual reproductive]] process by which a cell creates an identical copy of its own chromosomes and bisects itself into two cells each with the same chromosome information.
  * This monster appears to be the opposing counterpart to "[[Nimble Momonga]]", who debuted in the same set as it, ''[[Pharaoh's Servant (Japanese)|Pharaoh's Servant]]'':
  ** Both monsters share the same [[original ATK and DEF]] (1000/100).
  ** Both monsters feature an effect that manipulates [[Life Point]]s upon being destroyed. This monster decreases the opponent's Life Points, while "Nimble Momonga" increases the player's Life Points.
  ** Both monsters feature effects that Special Summons multiple copies of itself from the [[Deck]]. This monster Special Summons multiple copies of itself in [[face-up]] [[Attack Position]], while "Nimble Momonga" Special Summons multiple copies of itself in [[face-down]] [[Defense Position]].
  * In the ''[[Yu-Gi-Oh! World Championship]]'' games, when this monster is in Defense Position, it becomes green and shrinks a bit.
