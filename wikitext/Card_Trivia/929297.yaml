title: Card Trivia:Double-Headed Dino King Rex
wikitext: |-
  {{Navigation}}
  [[File:D-018 Stomp.png|thumb|right|"[[Two-Headed King Rex (manga)|Two-Headed King Rex]]" stomps on "[[Baby Dragon (manga)|Baby Dragon]]".]]

  * This monster is based on the [[Two-Headed King Rex (manga)|manga version]] of "[[Two-Headed King Rex]]".
  ** This monster's [[Level]] is 6, the same as "Two-Headed King Rex" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|77|ref}}, specifically from the panel where [[Dinosaur Ryuzaki (manga)|Dinosaur Ryuzaki]]'s "Two-Headed King Rex" destroys [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]]'s "[[Baby Dragon (manga)|Baby Dragon]]" by battle.
  *** This monster's effect are based on "Two-Headed King Rex's" in the same chapter where it is Summoned without [[Tribute|Tributing]] a monster and, upon its Summoning, instantly destroyed "Baby Dragon" by battle.

