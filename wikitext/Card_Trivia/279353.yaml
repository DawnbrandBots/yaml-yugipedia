title: Card Trivia:Bujingi Peacock
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * This monster appears in the artwork of "[[Bujin Regalia - The Jewel]]", transforming into its item form.
  * This card's Japanese name refers to the [[wikipedia:Yasakani_no_magatama#Yasakani_no_Magatama|Yasakani no Magatama]], one of the [[wikipedia:Imperial Regalia of Japan|Three Imperial Regalia of Japan]].
