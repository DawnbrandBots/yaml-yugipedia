title: Card Trivia:The Chorus in the Sky
wikitext: |-
  {{Navigation}}

  * The two cherubs from the artwork of "[[Chorus of Sanctuary]]" appear in this card's artwork.
  * The location in this card's artwork appears to be located in the right side of the artwork of "[[The Sanctuary in the Sky]]", as indicated by the similar ancient theatre designs and the presence of dark-colored rock.
  * A statue of the large angel that appears in this card's artwork also appears in the artwork of "[[The Sacred Waters in the Sky]]".
  ** Its purple skin, mono-colored eyes, and cloth-covered face are very similar to those of "[[Archlord Zerato]]", a monster that is also related to "The Sanctuary in the Sky".
