title: Card Trivia:Jack's Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Court of Cards]]", "[[Face Card Fusion]]", and "[[Joker's Straight]]".
  * This monster is based on the playing card, [[wikipedia:Jack (playing card)|the Jack]].
  ** Despite the Jack being a lower-ranked playing card, in certain card games, it is ranked higher than [[wikipedia:Queen (playing card)|the Queen]] and [[wikipedia:King (playing card)|the King]]. This is reflected in how this monster has a higher [[Level]] and [[original ATK]] than both "[[King's Knight]]" and "[[Queen's Knight]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|254|ref}}, specifically from the panel where [[Jack's Knight (manga)|this monster]] is shown being Summoned.
