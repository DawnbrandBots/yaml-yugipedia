title: Card Trivia:Lava Golem
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the ''[[OCG]]'' version of ''[[Structure Deck: Marik (OCG)|Structure Deck: Marik]]''.
  * This card appears in the artwork of "[[Card of Last Will]]".
  * This monster is likely based on the torture method through [[wikipedia:List of methods of torture|burning]], keeping in relation with the "torture" theme of [[Yami Marik]]'s [[Deck]].
  ** In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], when Yami Marik Summoned this monster during his [[Duel]] against [[Joey Wheeler]], it trapped Joey inside its cage while its body melted onto him, burning them and taking away his [[Life Point]]s.
  * This is one of the [[signature card]]s of Yami Marik in the ''Yu-Gi-Oh!'' manga and anime.
  * This monster shares similarities with "[[Grinder Golem]]", another torture-themed golem monster.
  ** Both share the same [[Level]] (8), [[Type]] ([[Fiend]]), and [[original ATK]] (3000).
  ** Both feature an effect that requires two monsters to be [[Special Summon]]ed to the opponent's [[field]] and prevents the player from [[Normal Summon]]ing or [[Set]]ting another monster during the same turn; this monster can be Summoned by [[Tribute|Tributing]] two monsters [[control]]led by the opponent, and "Grinder Golem" can Summoned by Special Summoning two "[[Grinder Token]]s" on the player's field.
  ** Both are used by secondary characters who were at one point bedeviled under the influence of a more perverse character; this monster is used by [[Marik Ishtar]] when he was under the influence of [[Yami Marik|his dark counterpart]], and "Grinder Golem" was used by [[Jesse Anderson]] when he temporarily served as [[Yubel (character)|Yubel's]] host.
