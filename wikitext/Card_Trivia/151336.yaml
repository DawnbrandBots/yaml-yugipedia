title: Card Trivia:Machina Cannon
wikitext: |-
  {{Navigation}}

  * Strangely, unlike "[[Machina]]" monsters like "[[Machina Defender]]", "[[Machina Force]]", and "[[Machina Sniper]]", as well as other [[Machine]] monsters that possess cannons, such as "[[Barrel Dragon]]" and "[[Superdreadnought Rail Cannon Gustav Max]]", this monster's rather realistic cannon weapons were not edited in the ''[[TCG]]''.
  ** This monster has a total of 6 visible cannons on its artwork: two on its arms, the large main cannon on its back, a smaller cannon attached to the top of the main back cannon, a small cannon under its left arm attached to its hip, and the very tip of a cannon identical to the opposite side of the hip that is mostly blocked by this monster's fist.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|014|ref}}, specifically from the panel showing [[Machina Cannon (manga)|this monster]] increasing its [[ATK]] via its effect.
