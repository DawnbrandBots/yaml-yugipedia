title: Card Trivia:Cyberdark Keel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cyberdark Impact!]]" and "[[Cyberdark Realm]]".
  * This card is named after the keel, which acts as the body of the ship, as this card provides the body of both "[[Cyberdark Dragon]]" and "[[Cyberdarkness Dragon]]"; however, it also appears to be the head of "[[Cyberdark Chimera]]".
  * This is the only "[[Cyberdark]]" monster to never use any of its effects in the ''[[Yu-Gi-Oh! GX]]'' anime.
