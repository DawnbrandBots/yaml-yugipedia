title: Card Trivia:Psychic Kappa
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Big Wave Small Wave]]".
  * This monster is based on a [[wikipedia:Kappa (folklore)|kappa]], a water sprite in Japanese folklore who is often depicted as a green humanoid with turtle-like features, webbed extremities, and a dish on top of its head.
  * This monster has a [[recolored counterpart]]: "[[Hyosube]]"
  * This monster has a [[retrained]] [[Xyz Monster]] counterpart: "[[Armored Kappa]]".
