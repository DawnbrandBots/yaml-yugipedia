title: Card Trivia:Secret Pass to the Treasures
wikitext: |-
  {{Navigation}}

  * This card's artwork is based on the famous photograph of [[wikipedia:Howard Carter|Howard Carter]], [[wikipedia:Arthur Callender|Arthur Callender]], and an unnamed Egyptian worker peering into the opened shrines of [[wikipedia:Tutankhamun|Tutankhamun]].
  * This card only appears in the ''[[Yu-Gi-Oh! 5D's Decade Duels Plus]]'', ''[[Yu-Gi-Oh! Duel Links]]'', ''[[Yu-Gi-Oh! Legacy of the Duelist]]'', and ''[[Yu-Gi-Oh! Master Duel]]'' video games, likely due to the programming difficulties stemming from the [[infinite loop]] conditions it can trigger.
