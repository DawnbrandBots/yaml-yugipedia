title: Card Trivia:Stardust Chronicle Spark Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Accel Synchro Monster|Accel Synchro]] form of "[[Stardust Spark Dragon]]".
  ** This monster's golden color scheme references how [[Yusei Fudo]] becomes golden when using [[Clear Mind#Over Top Clear Mind|Over Top Clear Mind]] to perform a [[Limit Over Accel Synchro Summon]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster can be considered the manga [[counterpart]] to "[[Shooting Star Dragon]]".
  ** This is enforced by both being [[Accel Synchro Monster]]s and by the first line of this monster's [[Summon chants in Yu-Gi-Oh! 5D's#Yusei Fudo|Summon chant]]: ''All thoughts spun by the tracks of '''shooting stars'''...!''
  * This is the only Accel Synchro Monster to appear in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh! 5D's - Ride SP1|ref}}, specifically from the panel showing [[Stardust Assault Warrior (manga)|this monster]] being Summoned.
