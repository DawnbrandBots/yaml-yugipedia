title: Card Trivia:Nurse Dragonmaid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragonmaid Hospitality]]", "[[Dragonmaid Downtime]]", "[[Dragonmaid Send-Off]]", and "[[Dragonmaid Clean-Up]]".
  * This monster's name is a reference to a [[wikipedia:Nursery (room)|nursery room]].
  * This monster is the maiden form of "[[Dragonmaid Ernus]]".
  ** This monster's name is a pun on "[[wikipedia:Nurse|nurse]]", based on its outfit which is typically worn by hospital nurses in Japan, and "[[wikipedia:Nursemaid|nursemaid]]", a maid who takes care of the children in the house.
