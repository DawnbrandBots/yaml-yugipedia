title: Card Trivia:Photon Cerberus
wikitext: |-
  {{Navigation}}

  * This card is based on the mythical beast, [[wikipedia:Cerberus|Cerberus]], the guard hound of the underworld. Unlike the other "Cerberus" monsters, this card stays true to its namesake.
  * This card is a monster version of "[[Trap Stun]]".
