title: Card Trivia:Odd-Eyes Rebellion Dragon Overlord
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Xyz Pendulum Monster|Xyz Pendulum]] form of "[[Odd-Eyes Pendulum Dragon]]" and "[[Dark Rebellion Xyz Dragon]]".
  ** This monster is the [[signature move]] [[counterpart]] of "[[Odd-Eyes Rebellion Dragon]]".
  *** This monster's name references the [[Attack and effect names in Yu-Gi-Oh! ARC-V|effect name]] of "[[Odd-Eyes Rebellion Dragon (anime)|Odd-Eyes Rebellion Dragon]]" in the Japanese version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime: "Overlord Howling".
  ** This monster's Japanese title, "Supreme King Black Dragon", references the black card frame of [[Xyz Monster]]s.
