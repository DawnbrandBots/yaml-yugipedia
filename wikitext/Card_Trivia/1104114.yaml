title: Card Trivia:Ancient Fairy Life Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Ancient Fairy Dragon]]".
  ** This monster's name references the [[Summon chants in Yu-Gi-Oh! 5D's#Luna|Summon chant]] of "[[Ancient Fairy Dragon (anime)|Ancient Fairy Dragon]]" in the Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime: ''The holy light of protection, now cross and become eternal '''life!'''''
  *** This monster's name likely parallels that of "[[Life Stream Dragon]]", the true form of "[[Power Tool Dragon]]", which was obtained by [[Leo]] after [[Ancient Fairy Dragon (character)|Ancient Fairy Dragon]] bestows him with the [[Mark of the Dragon]] and brings him back to "life" in {{episode|5D's|142|ref}}.
  ** This monster's first effect mentioning "[[World of Spirits]]" references how Ancient Fairy Dragon is the ruler of the [[Duel Monsters Spirit World]] inhabited by the [[Fairy]] monsters in the ''Yu-Gi-Oh! 5D's'' anime.
  *** This effect also allows the player to [[add]] "[[Eternal Sunshine]]" from the [[Deck]] to the [[hand]], which is the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "Ancient Fairy Dragon" in the ''Yu-Gi-Oh! 5D's'' anime.
