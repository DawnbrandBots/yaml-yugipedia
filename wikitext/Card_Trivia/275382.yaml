title: 'Card Trivia:Number C96: Dark Storm'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This is the [[cover card]] of ''[[Shadow Specters]]''.
  * This monster appears in the artwork of "[[Chaos Alliance]]".
  * This card and "[[Number C65: King Overfiend]]" are the first "[[Number C]]" monsters that have [[Rank]]s below 4.
  ** These two numbers are also the first [[Rank 3 Monster Cards]] that can be Summoned with a "[[Rank-Up-Magic]]" card.
  * Unlike other "Number C" monsters, this card's color (black) stays the same after evolving from its base form.
