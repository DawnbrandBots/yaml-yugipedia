title: Card Trivia:Destiny HERO - Diamond Dude
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[D - Fortune]]" and "[[D - Tactics]]".
  * This monster is likely based on the [[wikipedia:Cullinan Diamond|Cullinan Diamond]], a large diamond discovered at the [[wikipedia:Premiere Mine|Primiere Mine]] in [[wikipedia:Cullinan, South Africa|Cullinan, South Africa]] which was cut and gifted to the [[wikipedia:British royal family|British royal family]] in the early 20th century, keeping in relation with the European theme of the "[[Destiny HERO]]" [[archetype]].
