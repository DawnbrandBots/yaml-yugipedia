title: Card Trivia:Cranium Fish
wikitext: |-
  {{Navigation}}

  * "[[Charge Remora]]s" appear in this card's artwork.
  * This monster appears to be a [[Card evolutions|stronger]] form of "[[Ocean's Keeper]]" due to its similar color scheme and appearance. The effect of "Ocean's Keeper" can [[search]] this card, and this card's effect allows it to be [[Special Summon]]ed by [[Tributing]] "Ocean's Keeper".
  * This monster seems to be based on the fish [[wikipedia:Flowerhorn cichlid|Flowerhorn cichlid]].
