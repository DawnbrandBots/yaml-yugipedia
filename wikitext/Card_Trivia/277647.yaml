title: Card Trivia:Umbral Horror Mirage Token
wikitext: |-
  {{Navigation|mode=Token}}

  * The "mirage" in the name can refer to the fact that this [[Token Monster|token]] is a [[wikipedia:crystal|crystal]], which projects an [[wikipedia:holography|hologram]] (a [[wikipedia:mirage|mirage]]) of the targeted [[Xyz Monster]].
  * This monster appears in "[[Corrupted Keys]]".
