title: Card Trivia:ASHLAN U1000
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Asura|Asura]]" and "LAN" ("[[wikipedia:Local area network|local area network]]").
  ** This monster's name also features a play on the Japanese word for "wired / cabled" (有線, ''yūsen'') in reference to a LAN, whereas "''yūsen''" is a possible reading of "U1000" in Japanese.
