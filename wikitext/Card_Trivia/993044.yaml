title: Card Trivia:Dragoncurse Magician
wikitext: |-
  {{Navigation}}

  * This monster is a ''[[Rush Duel]]'' [[counterpart]] of "[[Skilled Blue Magician]]".
  ** This monster's effect requirement references how "Skilled Blue Magician" can [[Tribute]] itself with three [[Spell Counter]]s (which can be placed on it by activating [[Spell Card]]s) to [[Special Summon]] "[[Gaia The Fierce Knight]]".
  * This monster's name references "[[Curse of Dragon (Rush Duel)|Curse of Dragon]]", the [[Level 5]] [[Dragon]] [[Type]] [[Normal Monster]] commonly associated with "Gaia The Fierce Knight".
