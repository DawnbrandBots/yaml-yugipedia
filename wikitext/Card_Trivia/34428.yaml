title: Card Trivia:Master Kyonshee
wikitext: |-
  {{Navigation}}

  * "Kyonshee" is a mistranslation of ''kyonshī'', the Japanese pronuciation of ''[[wikipedia:Jiangshi|jiāngshī]]'', a Chinese vampire-like zombie that roams about and either steals the life force of living creatures or eats people.
  ** The piece of paper covering this monster's face is a Taoist talisman called ''[[wikipedia:fulu|fulu]]'', which is said to immobilize a jiangshi if placed on its face. The character 「呪」 on it is the kanji for "curse".
  ** This card's [[flavor text]] describing the monster as a martial arts master is likely a reference to how the jiangshi was popularized by Chinese martial arts movies, where it is sometimes controlled by an evil Taoist priest.
