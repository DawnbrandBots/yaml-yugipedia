title: Card Trivia:Sage of Wisdom - Himmel
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "himmel", the German, Danish, Swedish, and Norwegian word for "sky".
  * This is the [[Monster Card]] version of [[Himmel]], a character in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|1|ref}}, specifically from the panel during Himmel's introduction, when he describes how A.I. possesses emotional circuitry.
