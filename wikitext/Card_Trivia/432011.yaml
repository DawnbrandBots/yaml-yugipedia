title: Card Trivia:Aegaion the Sea Castrum
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from Aegaeon, one of the [[wikipedia:Hecatonchires|Hecatonchires]], three monstrous giants with fifty heads and one-hundred arms in ancient [[wikipedia:Greek mythology|Greek mythology]], which reflects this monster's giant size.
  ** This monster's name is also likely derived from the [[wikipedia:Aegean Sea|Aegean Sea]], or "Aigaion Pelagos" in Greek, which reflects the sea in this card's artwork, as well as its [[WATER]] [[Attribute]].
