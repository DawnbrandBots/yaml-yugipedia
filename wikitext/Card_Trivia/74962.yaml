title: Card Trivia:Beelze Frog
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Devil Frog" (アマガエル, ''amagaeru'') is a pun on the pronunciation of the [[wikipedia:Japanese tree frog|Japanese tree frog]], with the two kanji used in its name read as ''"a"'' and ''"ma"'', meaning ''evil'' and ''demon'' respectively.
  ** This monster's English name is a pun on [[wikipedia:Beelzebub|Beelzebub]], the Philistine deity who is also associated with the [[wikipedia:Devil|Devil]].
  * This monster is an adult form of "[[T.A.D.P.O.L.E.]]".
