title: Card Trivia:The Weather Painter Thunder
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Weather Forecast]]", "[[The Weather Rainbowed Canvas]]", and "[[The Weather Thundery Canvas]]".
  * This monster's Japanese name, "Turmer", is a reference to [[wikipedia:Turmeric|turmeric]], a flowering plant from the ginger family which produces a deep yellow powder used for cooking and dyeing.
