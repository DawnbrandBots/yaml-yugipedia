title: Card Trivia:Estrangement Dragon
wikitext: |-
  {{Navigation}}

  * The "Estrangement" in this card's name means to no longer be on friendly terms nor part of a social group, becoming separated. This is reflected in this card's [[effect]] to [[Special Summon]] another copy of itself from the [[Deck]] to the opponent's [[field]] and inability to be [[attack]]ed while another monster is present on the [[control]]ler's field.
  ** A synonym for "estrangement" is "alienation", which is reflected in this monster's design, which could be described as alien-like.
