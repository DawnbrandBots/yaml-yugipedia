title: Card Trivia:Chaos Sorcerer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dark Supremacy]]" and "[[Eternal Chaos]]".
  ** A monster resembling this monster in both pose and appearance appears in the artwork of "[[The Great Noodle Inversion]]".
  * This monster is depicted wielding yellow and dark purple lights, which represent the [[LIGHT]] and [[DARK]] [[Attribute]]s, respectively.
  * This monster has a "[[Lightray]]" [[counterpart]]: "[[Lightray Sorcerer]]".
  * This monster has a younger ''[[Rush Duel]]'' counterpart: "[[Dark Sorcerer]]".
  * "[[Chaos Betrayer]]" may be a retrained counterpart of this monster.
  ** Both monsters have in a similar pose, their left hand raised above their head and their right hand lowered in front of them.
  ** Both monsters can banish a LIGHT and DARK monster from the [[Graveyard]] to Special Summon themselves; this card from the hand and "Chaos Betrayer" from the GY.
  ** Both monsters have an effect to target and banish an opponent's card; this card targets a monster on the field, while "Chaos Betrayer" targets a card in the GY.
  * This is the one of the three "[[Chaos]]" monsters (alongside "[[Black Luster Soldier - Envoy of the Beginning]]" and "[[Chaos Emperor Dragon - Envoy of the End]]") to be set as [[Forbidden]] in [[Advanced Format]]; its status was [[Unlimited]] prior to the [[September 2006 Lists]].
  ** This card's status on the Forbidden/Limited List has [[Historic Forbidden/Limited Chart|changed]] nine times, overtaking "[[Nobleman of Crossout]]" which had moved eight times.
  ** This monster was nicknamed "the poor man's Chaos"{{Citation needed}} due to its [[Common]] rarity, as opposed to being [[Secret Rare]] like "Envoy of the Beginning" and "Envoy of the End".
