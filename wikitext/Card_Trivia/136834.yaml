title: Card Trivia:Dark Magician Girl the Dragon Knight
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Dragons of Legend]]'', and one of the cover cards for ''[[Collectors Pack: Duelist of Legend Version]]'', ''[[Dragons of Legend: Unleashed]]'', ''[[Dragons of Legend: The Complete Series]]'', and ''[[Prismatic Art Collection]]''.
  * This monster is a [[Fusion Monster|Fusion]] of "[[Dark Magician Girl]]" and "[[The Eye of Timaeus]]". 
  * This monster has two "[[Dark Magician]]"-based [[counterpart]]s: "[[Amulet Dragon]]" and "[[Dark Magician the Dragon Knight]]".
  * This is the first and last "The Eye of Timaeus"-based Fusion Monster to appear ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This is one of two "[[Legendary Dragon]]" Fusion Monsters to appear in more than one episode of the ''Yu-Gi-Oh!'' anime, the other being "[[Red-Eyes Black Dragon Sword]]".
  * This monster's Italian name features a translation error; instead of being named "'''''Ragazza''' Maga Nera, il Cavaliere del Drago''", which would be consistent with the Italian name of "Dark Magician Girl" ("''Ragazza Maga Nera''"), this monster is named "'''''Giovane''' Maga Nera, il Cavaliere del Drago''", meaning "Young Dark Magician, the Dragon Knight".
