title: Card Trivia:Boogie Trap
wikitext: |-
  {{Navigation}}

  * The knight and the two goblins from the artworks of many "[[Trap Hole (archetype)|Trap Hole]]" cards appear in this card's artwork.
  ** The rat from the artwork of "[[Eatgaboon]]" and the blue creatures from the artwork of "[[House of Adhesive Tape]]", both Trap Cards with similar effects to the "Trap Hole" cards, also appear in this card's artwork.
  * This card's name is a pun on "booby trap" and "boogie" (meaning "to dance"), as the person on the left in this card's artwork appears to be luring his victims into a trap with music.
  ** This card's artwork may be a reference to the legend of the [[wikipedia:Pied Piper of Hamelin|Pied Piper of Hamelin]], as the titular piper lured the rats of Hamelin to a river where they drowned.
  *** Fittingly, a rat appears in this card's artwork.
  *** The beguiling guitar player in this card's artwork also wears multiple colors, which corresponds to the definition of the adjective "[[wiktionary:pied|pied]]".
  * This card has a [[Spell]]-recycling [[counterpart]]: "[[Magical Stone Excavation]]".
