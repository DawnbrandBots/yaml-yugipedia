title: Card Trivia:Goyo Predator
wikitext: |-
  {{Navigation}}

  * Despite its [[Type|typing]] as a [[Warrior]]-Type, this monster more resembles a [[Beast-Warrior]].
  * The kanji found in the background of "[[Goyo Guardian]]" can also be found under this monster's feet, but is much harder to make out.
  * This card has the same [[Attribute]], [[Level]], Type and effect as "Goyo Guardian".
  ** Although it can be Special Summoned in either position, but battle damage it causes would be halved.
