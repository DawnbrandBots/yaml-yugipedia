title: Card Trivia:Yosenju Sabu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Yosenjus' Sword Sting]]" and "[[Yosenju Wind Worship]]".
  * This monster's appearance is based on [[Sylvio Sawatari]], specifically the [[:File:Arc V Silvio dressed in Mabuta no Haha.png|disguise]] he was wearing before his [[Duel]] against [[Yuya Sakaki]] in {{episode|ARC-V|031|ref}}.
  ** This monster's effect to place either "[[Dizzying Winds of Yosen Village]]" or "[[Yosen Whirlwind]]" [[face-up]] in its [[control]]ler's [[Spell & Trap Zone]] is also a reference to the aforementioned Duel, as those cards were first used by Sylvio in that Duel.
