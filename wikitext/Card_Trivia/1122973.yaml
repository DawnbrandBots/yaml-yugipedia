title: Card Trivia:Argostars - Adventurous Arion
wikitext: |-
  {{Navigation}}

  * "[[Argostars - Glorious Adra]]" appears in this card's artwork.
  * This monster is based on [[Wikipedia:Arion (horse)|Arion]], the horse that served as the steed of [[wikipedia:Adrastus|Adrastus]], the king of [[wikipedia:Argos|Argos]] and leader of the [[wikipedia:Seven against Thebes|Seven against Thebes]].
  ** Fittingly, this monster is depicted as the steed of "Argostars - Glorious Adra", who is named after Adrastus.
  ** This monster's name, "Courageous Arion", references how Arion saves Adrastus' life during the war of the Seven against Thebes by carrying him away from the battlefield.
