title: Card Trivia:Wightmare
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of ''Wight'' (the Japanese name for "[[Skull Servant]]") and ''nightmare'' (the black creature behind it is a reference to [[wikipedia:Mare (folklore)|Mare]]).
  ** Fittingly, this card has the same Type, Attribute, Level, ATK and DEF as "Skull Servant".
  * "[[Bone Mouse]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Panic Burial]]".
  ** This card appears in the artwork of "[[BIG Win!?]]" and "[[Old Mind]]".
