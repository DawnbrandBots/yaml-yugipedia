title: Card Trivia:Windstorm of Etaqua
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to [[wikipedia:Ithaqua|Ithaqua]], a fictional deity from the works of American horror writer [[wikipedia:H. P. Lovecraft|H. P. Lovecraft]], who causes enormous wintry gales.
  * This card has a ''[[Rush Duel]]'' [[Dolphin]] parody: "[[Seastorm of Iruqua]]".
