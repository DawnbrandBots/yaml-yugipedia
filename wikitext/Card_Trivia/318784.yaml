title: Card Trivia:Sylvan Peaskeeper
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Sylvan Blessing]], "[[Sylvan Charity]]", "[[Sylvan Waterslide]]", and "[[Flourishing Frolic]]".
  * This card's name, "Peaskeeper", is a pun on "Peas" and "Peacekeeper".
  * This card is similar to "[[Naturia Beans]]":
  ** Both monsters have similar card artworks, and are based off [[wikipedia:Legume|legume plants]].
  ** Both are [[Plant]] monsters, and are part of [[archetype]]s which prominently feature Plant cards ("[[Sylvan]]" and [[Naturia]]").
