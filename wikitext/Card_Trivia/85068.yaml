title: Card Trivia:Card Ejector
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Trick Battle]]".
  * This monster has a [[retrained]] counterpart: "[[Miracle Ejector]]".
  * This monster's appearance is based on "[[Dark Magician Girl]]".
  ** In a similar fashion, "[[Miracle Flipper]]" (another monster used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime) is based on "[[Dark Magician]]".
  * This monster shares the same [[Attribute]] ([[EARTH]]), [[Level]], (3), [[original ATK and DEF]] (400/400), and naming scheme as "[[Card Trooper]]" and "[[Card Blocker]]". Fittingly, all three monsters were used by Jaden Yuki in the ''Yu-Gi-Oh! GX'' anime.
  * This monster had a prominent role in both the [[Precious Time, Glory Days|fourth season opening]] of the ''Yu-Gi-Oh! GX'' anime, as well as in Jaden Yuki's teaser trailer for the movie ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'', despite never appearing in either the fourth season or the movie. In this monster's only anime appearance, it failed to use its effect and was destroyed by the effect of "[[Zero Hole (GX)|Zero Hole]]" in {{episode|GX|154|ref}}.
  * In the English dubbed version of the ''Yu-Gi-Oh! GX'' anime, this monster used its Japanese name, "Card Excluder".
  * In ''[[Yu-Gi-Oh! GX Tag Force 3]]'', this monster appears in the bottom right corner of the loading screen.
