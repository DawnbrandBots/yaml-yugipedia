title: Card Trivia:Hero Ring
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Flame Wingman]]" appears in this card's artwork.
  ** This card's name, "Hero Ring" (ヒーロー・ヘイロー ''Hīrō Heirō'', "Hero Halo"), is a reference to the ring of light behind the head of "Elemental HERO Flame Wingman".
  ** However, "Flame Wingman" cannot be used this card's effect, as this card [[target]]s [[Warrior]] monsters with 1500 or less [[ATK]], and "Flame Wingman" has 2100 ATK.
