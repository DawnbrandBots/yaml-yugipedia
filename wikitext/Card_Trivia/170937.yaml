title: Card Trivia:Gogogo Golem
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gogogo Goblindbergh]]", "[[Golden Form]]", "[[Guardraw]]", "[[Onomatopaira]]", "[[Onomatopia]]", "[[Reverse Breaker]]", "[[Re-Xyz]]", and "[[Wonder Xyz]]".
  * This monster's name is derived from the Japanese sound effect, "''go go go go''", which is used when the atmosphere is threatening or menacing.
  * This monster has two [[retrained]] counterparts: "[[Gogogo Golem - Golden Form]]" and "[[Gogogo Goram]]".
  * This monster has a "[[Number]]" upgrade: "[[Number 55: Gogogo Goliath]]".
  * This monster has an "[[Astral (archetype)|Astral]]" counterpart: "[[Astral Golem]]".
  * This monster has a ''[[Rush Duel]]'' [[Baseball]] parody: "[[Gogogo Umpire]]".
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster was in [[Defense Position]], the blue parts of its arms and legs became brown.
