title: Card Trivia:T.G. Power Gladiator
wikitext: |-
  {{Navigation}}

  * The letters "WA" in this monster's Japanese anime name (WAX-1000) references its [[Warrior]] [[Type]], while the letter "X" is a reference to its [[Synchro Monster]] [[card type]].
  * This is the first "[[T.G.]]" Synchro Monster to be Summoned in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
