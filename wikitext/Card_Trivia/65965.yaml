title: Card Trivia:Foolish Burial
wikitext: |-
  {{Navigation}}

  * The arm and shovel that appear in this card's artwork also appear in the artwork of "[[Return of the Zombies]]".
  * A stylized version of the gravestone in this card's international artwork appears in the artwork of "[[Overdone Burial]]".
  * This card appears in the artwork of "[[Foolish Graverobber]]".
  * This card's artwork depicts a [[wikipedia:Premature burial|premature burial]], the act of burying someone while they're still alive.
  * This card has seven [[counterpart]]s:
  ** "[[Extra-Foolish Burial]]"
  ** "[[Foolish Burial Goods]]"
  ** "[[Foolish Return]]"
  ** "[[Foolish Revival]]"
  ** "[[Peaceful Burial]]"
  ** "[[Psychic Burial]]"
  ** A "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Foolish Burial]]".
