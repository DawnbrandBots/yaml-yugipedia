title: Card Trivia:Munin the Runick Wings
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Runick Destruction]]", "[[Runick Freezing Curses]]", and "[[Runick Slumber]]".
  * This monster has a [[counterpart]]: "[[Hugin the Runick Wings]]".
  ** This monster and "Hugin the Runick Wings" are based on [[wikipedia:Huginn and Muninn|Huginn and Muninn]], the two ravens who serve as the informants for the god [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]].
