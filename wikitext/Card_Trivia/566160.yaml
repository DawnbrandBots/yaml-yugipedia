title: Card Trivia:Crusadia Krawler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Orcustrated Einsatz]]" and "[[World Legacy's Mind Meld]]".
  ** Parts of this monster also make up the shield of "[[Mekk-Knight Crusadia Avramax]]".
  * This monster is a [[Card evolutions|purified]] "[[Crusadia]]" form of "[[Krawler Spine]]" (as depicted in the artwork of "[[World Legacy's Mind Meld]]"), the last surviving "[[Krawler]]" monster (as depicted in the artwork of "[[World Legacy Survivor]]").
  ** "[[Krawler Soma]]" is also based on this monster and "[[Mekk-Knight Blue Sky]]", and may be a version of this monster recreated by "[[Avida, Rebuilder of Worlds]]", after He [[World Reassembly|reset the world]].
