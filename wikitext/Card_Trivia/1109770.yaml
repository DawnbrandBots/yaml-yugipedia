title: Card Trivia:Ukanomitsune-no-Tamayura
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Ukanomitama|Ukanomitama]]" (the goddess of food and agriculture in [[Wikipedia:Japanese mythology|Japanese mythology]]), "''[[Wikipedia:Kitsune|kitsune]]''" (a fox spirit in Japanese mythology), and "''tamayura''" (the ancient Japanese word meaning "a fleeting moment").
  ** ''Onari'' is also a play on ''Ō-Inari'', also known as [[wikipedia:Inari Ōkami|Inari Ōkami]], the Japanese ''kami'' of foxes and rice associated with Ukanomitama, whereas this monster is an anthropomorphic fox, while the background depicts raining rice grains and a field of rice plants.
  ** "Ukanomitsune" features "mitsu" (みつ), which is the ''kun'yomi'' word for the number "3", which reflects this monster's [[Level]] (3), its [[original DEF]] (300), and the number of masks depicted in its artwork.
  * This monster has an [[Card evolutions|upgraded]] [[Link Monster|Link]] [[counterpart]]: "[[Ukanomitsune-no-Onari]]".
