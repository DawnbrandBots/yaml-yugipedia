title: Card Trivia:The Undying Legion
wikitext: |-
  {{Navigation}}

  * Zombified versions of "[[Flame Swordsman]]", "[[Red-Eyes Black Dragon]]", and "[[Tiger Axe]]" appear in this card's artwork.
  ** These monsters were used by [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] (and his [[Joey Wheeler|anime counterpart]]) during his Duel against [[Ghost Kozuka (manga)|Ghost Kozuka]] (and his [[Bonz|anime counterpart]]) in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], and all three of them were [[destroy]]ed during that Duel.
