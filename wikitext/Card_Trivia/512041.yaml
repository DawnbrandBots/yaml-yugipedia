title: Card Trivia:Theban Nightmare
wikitext: |-
  {{Navigation}}

  * This card's name refers to Thebes, which is the name of an ancient city in Egypt and another in Greece. The former was the capital of the province of Waset, and was the capital of the entire country during the Eleventh and Eighteenth Dynasties. The latter was said to have been guarded by the "[[wikipedia:Sphinx|sphinx]]", and was the setting for a number of tragic myths.
  ** This card may also refers to Theban Necropolis, a ritual burial ground for much of Pharaonic times.
  * The condition for this card's effect similar to that of many "[[Infernity]]" monsters, with the extra condition of having no [[Spell Cards|Spell]] or [[Trap Card]]s on the field as well.
  ** Coincidentally, in the [[TCG]], both this card and the "[[Infernity]]" monsters made their debuts in a [[Booster Pack]] that started with and contains the word ''Ancient'' in its name (this card in ''[[Ancient Sanctuary]]'' and the "Infernity" archetype in ''[[Ancient Prophecy]]''.)
  * This card is similar in appearance to "[[Aswan Apparition]]" and the tail of "[[Emperor Sem]]".
  ** In addition, these three monsters have their names based on Egyptian words or names.
