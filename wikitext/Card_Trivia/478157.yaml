title: Card Trivia:Dark Contract with the Entities
wikitext: |-
  {{Navigation}}

  * This card's artwork appears to depict a document about "[[Outer Entity Nyarla]]" slipped in at the last page of "[[Forbidden Apocrypha]]".
  ** The document bears a large resemblance to a [https://www.chaosium.com/content/FreePDFs/CoC/Character%20Sheets/Character%20Sheet%20-%20Modern%20-%20Call%20of%20Cthulhu%20V6.pdf character sheet] from the horror role-playing game, ''[[wikipedia:Call of Cthulhu (role-playing game)|Call of Cthulhu]]''.
