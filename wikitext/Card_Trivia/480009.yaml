title: Card Trivia:En Birds
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The symbol of a reversed [[wikipedia:Epsilon|lunate epsilon]] (∋) appears in this card's artwork.
  ** A reversed lunate epsilon is a [[wikipedia:Mathematics|mathematical]] symbol used to indicate one thing consisting of multiple elements, which is reflected by this card's effect relating to [[Xyz Monster]]s, which are [[Xyz Summon]]ed using multiple [[Xyz Material]]s. Fittingly, this card was also used to create [[Lulu's bracelet]], which represents Xyz Summoning.
  ** The reversed epsilon can also be seen as the number "3", correlating to the "=" in the artwork of "[[En Flowers]]", as part of the mathematical formula for the number [[wikipedia:Pi|pi]].
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this was the card that created [[Lulu Obsidian]] and [[Yuto]] when [[Ray Akaba]] and [[Z-ARC]] separated their personalities.
  * This card's effect of negating the effects of all Xyz Monsters is a reference to the fact that it was created to counter "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]" in the anime.
