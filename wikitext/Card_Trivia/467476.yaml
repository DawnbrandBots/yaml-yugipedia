  * "[[Darklord Morningstar]]" appears in this card's artwork, presumably before he became a "[[Darklord]]".
  * This card's artwork parallels [[wikipedia:God in Christianity|God]] (as the old man from the "[[Solemn]]" cards) banishing the [[wikipedia:archangel|archangel]] [[wikipedia:Lucifer|Lucifer]] from [[wikipedia:heaven|heaven]].
