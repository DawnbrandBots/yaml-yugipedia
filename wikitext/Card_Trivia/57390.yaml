title: Card Trivia:Eradicating Aerosol
wikitext: |-
  {{Navigation}}

  * The aerosol can in this card's artwork features the kanji for "destruction" (滅) on it.
  * This card is based on an [[wikipedia:Insecticide|insecticide]], a type of chemical specifically employed in killing insects.
  * This card has several [[counterpart]]s that destroy a specific [[Type]] of [[monster]]:
  ** [[Fiend]]: "[[Exile of the Wicked]]"
  ** [[Fish]]: "[[Eternal Drought]]"
  ** [[Machine]]: "[[Acid Rain]]"
  ** [[Rock]]: "[[Breath of Light]]"
  ** [[Spellcaster]]: "[[Last Day of Witch]]"
  ** [[Warrior]]: "[[Warrior Elimination]]"
  ** Prior to its release in ''[[Gold Series 4]]'', this card and "Eternal Drought" were the only Type-specific destroyers that were ''[[OCG]]'' exclusive.
  * The "Spiked God" referenced in this card's name is likely just a regular human that is only a god from the perspective of insects which are significantly smaller and weaker than humans.
