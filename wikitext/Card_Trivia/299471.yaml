title: Card Trivia:Dodododraw
wikitext: |-
  {{Navigation}}

  * "[[Dododo Witch]]", "[[Dododo Warrior]]", "[[Dododo Driver]]" and "[[Dododo Buster]]" appear in this card's artwork.
  * "Dodododraw" is a portmanteau of "Dododo" and "draw".
  ** Interestingly, this card's Japanese name ,"ドドドドロー", is a play on "ドロー" (draw).
  * This card is the "[[Dododo]]" counterpart to "[[Gagagadraw]]," which also results in drawing two cards and has a very similar artwork.
