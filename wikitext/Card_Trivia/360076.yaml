title: 'Card Trivia:Number 81: Superdreadnought Rail Cannon Super Dora'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Barrage Blast]]".
  * This monster is based on the ''[[wikipedia:Schwerer Gustav|Dora]]'', an 80 cm railway gun developed and deployed by the German army during [[wikipedia:World War II|World War II]].
  ** ''Dora'' is the second such gun of its kind, after the ''[[wikipedia:Schwerer Gustav|Schwerer Gustav]]'', which "[[Superdreadnought Rail Cannon Gustav Max]]" is based on.
