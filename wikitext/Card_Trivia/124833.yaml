title: Card Trivia:Big Vintage Magna Mutton
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bacchus Banquet]]".
  * "Big Vintage" is derived from [[wikipedia:Vintage|vintage]], the process in which grapes are picked off the vine and created to make wine.
  ** Also, "Mutton" is either a reference to [[wikipedia:Mutton|sheep meat]], which is typically eaten with fine wine, or the "[[wikipedia:Château Mouton Rothschild|Château Mouton Rothschild]]", a wine estate famous for producing some of the world's best [[wikipedia:Bordeaux Wine|claret wine]].
  * This monster's effect, which allows itself to gain 1000 [[ATK]] during the player's [[Standby Phase]]s, is a reference to how wine becomes better over time.
