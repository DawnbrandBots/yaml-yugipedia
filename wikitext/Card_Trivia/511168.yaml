title: Card Trivia:Elemental HERO Neo Bubbleman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Wake Up Your Elemental HERO]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Elemental HERO Bubbleman]]".
  * This monster has an "[[Evil HERO]]" [[counterpart]]: "[[Evil HERO Toxic Bubble]]".
  * This monster, along with "[[Elemental HERO Air Neos]]", are the only "[[HERO]]" monsters that have yet to be [[reprint]]ed following the re-rendering of the name of the archetype from "Hero" to "HERO".
  * This monster and "[[Elemental Hero Clay Guardian (anime)|Elemental Hero Clay Guardian]]", being both "HERO" [[Fusion Monster]]s used by [[Jaden Yuki]] that could only be [[Special Summon]]ed from the [[Extra Deck]] by using another monster and a [[Spell Card]] in the ''[[Yu-Gi-Oh! GX]]'' anime, can be considered a prelude to the "[[Masked HERO]]" [[archetype]] used by Jaden's [[Jaden Yuki (manga)|manga counterpart]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, which can Summon Fusion Monsters from the [[Extra Deck]] by using another monster on the field and a Spell Card, usually "[[Mask Change]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]]s are based on its appearances in the ''Yu-Gi-Oh! GX'' anime when it was a Fusion Monster before its release as a [[Main Deck]] [[Effect Monster]]. In each appearance, Jaden Yuki [[Special Summon]]ed this monster via the effect of "[[Metamorphosis (anime)|Metamorphosis]]" by [[Tribute|Tributing]] "[[Elemental Hero Bubbleman (anime)|Elemental Hero Bubbleman]]".
  ** However, with "[[Metamorphosis]]" being [[Forbidden]] in the ''TCG'' [[Advanced Format]], this monster can only be Special Summoned by [[ignoring its Summoning conditions]], or in the ''OCG'' or [[Genesys]] where "Metamorphosis" is legal.
