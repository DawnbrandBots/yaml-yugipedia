title: Card Trivia:Transam Valuable Linac
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Transam Linac Overwrite]]".
  ** Visually, this monster is a Fusion of "Transam Linac Overwrite" and "[[Galactica Reminiscences]]", which [[Yudias Velgear (manga)|Yudias Velgear]] first used to [[Fusion Summon]] this card in the ''[[Yu-Gi-Oh! GO RUSH!! (manga)|Yu-Gi-Oh! GO RUSH!!]]'' manga.
