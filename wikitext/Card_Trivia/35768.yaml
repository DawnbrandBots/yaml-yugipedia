title: Card Trivia:Malevolent Mech - Goku En
wikitext: |-
  {{Navigation}}

  * This monster is the [[Zombie counterpart]] of "[[Majestic Mech - Ohka]]".
  ** This monster's Japanese name translates to "Darkness Gear - Imprisoning Flames", which contrasts the Japanese name of "Majestic Mech - Ohka" ("Lightning Gear - Cherry Fire").
