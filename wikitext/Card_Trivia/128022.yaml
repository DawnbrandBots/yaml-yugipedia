title: Card Trivia:Miracle Synchro Fusion
wikitext: |-
  {{Navigation}}

  * "[[Red Dragon Archfiend]]", "[[Stardust Dragon]]", and a ''[[Yu-Gi-Oh! 5D's]]'' version of the [[Synchro Summon]]ing ring appears in this card's artwork.
  ** The aforementioned monsters reference their respective owners, [[Jack Atlas]] and [[Yusei Fudo]], who each [[Fusion Summon]]ed a [[Fusion Monster]] in the ''Yu-Gi-Oh! 5D's'' anime.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Miracle Synchro Fusion]]".
