title: Card Trivia:Madolche Lesson
wikitext: |-
  {{Navigation}}

  * "[[Madolche Puddingcess]]" appears in this card's artwork.
  ** The person serving her is "[[Madolche Marmalmaide]]", who carries the "Madolches' Manners" book in her own artwork.
  * One of the forks on the table is the same as the one "[[Madolche Magileine]]" rides.
  * The tea cup on the table is the same one "[[Madolche Butlerusk]]" fills.
  * The "Madolches' Manners" book in this card's artwork references this card's Japanese name.
