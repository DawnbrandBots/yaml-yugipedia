title: Card Trivia:Foie Glasya de Nouvelles
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the demon [[wikipedia:Glasya-Labolas|Glasya-Labolas]] and the French dish [[wikipedia:Foie gras|Foie gras]] (fried liver of specially-fed geese).
  ** "Glasya-Labolas" is described as a dog with the wings of a gryphon (which this monster's wings resemble) and able to "gain the minds and love of friend and foe" (likely represented in this monster's effect to target up to three cards in either [[GY]] to shuffle into the Deck).
