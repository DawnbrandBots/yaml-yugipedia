title: Card Trivia:Chamber Dragonmaid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragonmaid Tidying]]", and the alternate artworks of "[[Dragonmaid Hospitality]]" and "[[House Dragonmaid]]".
  * This monster is the maid form of "[[Dragonmaid Cehrmba]]".
  ** This monster's name is based on a chambermaid, a maid who cleans and prepares the house's bedchambers.
  ** This monster is depicted using a feather duster and a mop with absorbent material made up of its feathers.
