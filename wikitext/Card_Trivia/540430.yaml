title: Card Trivia:Mischief of the Time Goddess
wikitext: |-
  {{Navigation}}

  * "[[Goddess Skuld's Oracle]]" appears in this card's artwork.
  ** Fittingly, both cards are based on [[wikipedia:Skuld|Skuld]], the [[wikipedia:Norns|Norn]] of the future, while this card's effect reflects the concept of traveling into the future.
  * This is the only card that can skip a turn's [[End Phase]] without completely skipping the entire turn.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, [[Zigfried von Schroeder]] took advantage of this card's effect to bypass the otherwise unavoidable drawback of his signature card, "[[Ride of the Valkyries (anime)|Ride of the Valkyries]]".
