title: Card Trivia:Cyber Dragon Nova
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Blitzkrieg of the Mechlight Dragons]]''/''[[Cyber Dragon Revolution Structure Deck]]''.
  * This monster appears in the artwork of "[[Cyber Network]]".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Cyber Dragon Infinity]]".
  * "Nova" possibly refers to [[wikipedia:Nova|the astronomical phenomenon of the same name]], which is the temporary brightening of a [[wikipedia:White dwarf|white dwarf star]] caused by gravity pulling additional mass onto the star, eventually resulting in a rapid ignition of nuclear fusion on the star's surface. This reflects this monster's [[Xyz Monster|Xyz]] [[Monster card type|type]], which features a cosmic design and [https://www.yugioh-card.com/en/products/past_products/starter2011/ origin].
  ** "Nova" is also Latin for "new", possibly referencing how this monster is the first "[[Cyber Dragon (archetype)|Cyber Dragon]]" Xyz Monster.
  *** Fittingly, this monster's [[original ATK and DEF]] (2100/1600) are equal to those of "Cyber Dragon"; also, "Cyber Dragon" can be used as [[Xyz Material]] for this monster's [[Xyz Summon]].
  * This monster's body features parts of various "[[Cyber]]" monsters as part of its body: the mechanical collar of "[[Cyber Barrier Dragon]]" (located lower on its body), the back spoiler of "[[Cyber Dragon Drei]]" (seemingly attached behind this monster's energy core), the tail of "[[Cyber Laser Dragon]]", and the stinger-like appendage of "[[Cyber Ouroboros]]" (at the tip of this monster's tail).
  ** Its wings also feature two red-colored portal-like frames, as well as two miniature heads located at the upper tips of its wings, which are similar in design to the purple-colored frames and the main head of "[[Chimeratech Fortress Dragon]]", respectively.
  *** The similarity of the heads are mostly identified by their upper-exposed snouts, and their existence is made more noticeable in the artwork of "[[Cyber Dragon Infinity]]" (this monster's upgraded form), where their mouths are opened.
  ** The assembly of this monster is depicted in the artwork of "[[Cyber Repair Plant]]".
