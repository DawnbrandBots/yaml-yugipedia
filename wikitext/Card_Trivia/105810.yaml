title: Card Trivia:Ojama Delta Wear
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Ojama Black]]", "[[Ojama Green]]", and "[[Ojama Yellow]]" appear in this card's artwork.
  * The first part of the term "Delta Wear" is based on the Greek uppercase letter "delta" (Δ), which is often depicted as a three-pointed triangle, reflecting how this card's [[activate|activation]] requires the '''three''' aforementioned "[[Ojama]]" monsters to be [[destroyed by battle]] this turn, who are depicted ''wearing'' the same pair of under''wear''.
