title: Card Trivia:Tsuru-Puru-Purun
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Turu-Purun]]".
  ** This monster's effect to [[destroy]] all of the opponent's [[face-up]] cards in the same [[column]] references the [[flavor text]] of "Turu-Purun": "''A strange, one-eyed monster that can fell an enemy with a single stab of its spear.''"
