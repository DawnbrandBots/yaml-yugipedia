title: Card Trivia:Dragon Queen of Tragic Endings
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sorrowful Chain]]".
  ** Its petrified wing and tail appears in the artwork of "[[Sad Story - Sorrowful Memories]]", its petrified body in the artwork of "[[Sad Story - Unwavering Truth]]" , and its petrified wing in the artwork of "[[Sad Story - Atrocious Day]]".
