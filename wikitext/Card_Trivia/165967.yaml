title: Card Trivia:Kagetokage
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of the Japanese words for "shadow" (カゲ, ''kage'') and "lizard" (トカゲ, ''tokage'').
  ** In the English version of the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, this monster was sometimes referred to as "Shadow Lizard", which is the translation of its Japanese name.
  ** This monster's name and [[Special Summon]]ing effect reflect how it serves as the "shadow" of the [[Level 4]] monster that was [[Normal Summon]]ed.
  * This monster has a [[retrain]]ed "[[Onomat]]" counterpart: "[[Onomatokage]]".
