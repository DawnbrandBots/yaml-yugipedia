title: Card Trivia:Sevens Paladin
wikitext: |-
  {{Navigation}}

  * There are 7 cross-shaped symbols in this card's artwork, referencing the 7 motif of the [[Sevens Road]] series.
  ** This symbol is the same as the symbol from the artwork of "[[Sevens Road Magician]]" (colored blue instead of orange).
  * This is the first [[Magical Knight]] [[Type]] monster.
  * Fitting the "[[Dark Magician]]" homage of its [[Sevens Road Magician|base form]], this monster is a homage to "[[Dark Paladin]]", the upgrade to "Dark Magician".
  ** Both are [[Fusion Monster]]s who share the same [[Attribute]] ([[DARK]]) and [[original ATK and DEF]] (2900/2400).
  ** Both are named after the character archetype of the "paladin", which requires specific [[Spellcaster]] and [[Warrior]] [[Type]] monsters as [[Fusion Material]].
  ** This monster's debut scene in {{episode|SEVENS|067|ref}} is similar to the debut scene of "[[Dark Paladin the Ultimate Magical Swordsman]]" in {{episode|Yu-Gi-Oh!|134|ref}}; this monster was also affected by "[[Scattered Solitude]]", similar to how "Dark Paladin" is affected by "[[Diffusion Wave-Motion]]".
