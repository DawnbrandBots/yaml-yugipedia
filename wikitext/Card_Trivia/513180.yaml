title: Card Trivia:The Creator
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Rise of Destiny]]'', and one of the cover cards for ''[[Expert Edition Volume 3]]''/''[[Dark Revelation Volume 3]]''.
  * This monster has three [[counterpart]]s:
  ** A [[Dark counterpart]]: "[[The Dark Creator]]".
  ** A "[[Chaos]]" counterpart: "[[The Chaos Creator]]".
  ** A "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] counterpart: "[[The Orchestrator of the Sacred Beasts]]"
  * This monster has a human form: "[[The Creator Incarnate]]".
  * The circular ornament on the backs of this monster and "The Creator Incarnate" appears to be the visual inspiration for the symbol on the tip of the staff of "[[Herald of Creation]]".
  ** This is supported by the fact that this card and "The Creator Incarnate" were both released in ''[[Rise of the Dragon Lords Structure Deck]]'', in which "Herald of Creation" debuted, as well as the "creation" theme the three monsters share.
  ** The same symbol appears as the weapon [[wikipedia:Hilt|pommels]] of "[[Divine Dragon Knight Felgrand]]", "[[Guardian of Felgrand]]", and "[[Paladin of Felgrand]]", as well as the sword crossguard of "[[Dragon Knight of Creation]]" (another "creation"-themed monster).
  * This monster, "[[Horus the Black Flame Dragon LV8]]", and "[[Sacred Phoenix of Nephthys]]" are possibly connected to each other:
  ** They are all representations of Egyptian deities.
  ** They all share similar physical traits, including a mechanical appearance and a blue gemstone.
  ** They all have Dark counterparts: "[[Dark Horus]]", "The Dark Creator", and "[[Dark Nephthys]]".
  ** They were released as the [[cover card]]s for the consectuive [[Series 4]] [[Core Booster|Core Booster packs]]: ''[[Soul of the Duelist]]'' ("Horus the Black Flame Dragon LV8"), ''[[Rise of Destiny]]'' (this monster), and ''[[Flaming Eternity]]'' ("Sacred Phoenix of Nephythys").
  ** They each have a support monster first released in the same Core Booster packs they debuted in that have a humanoid design: "[[Horus' Servant]]", "[[The Creator Incarnate]]", and "[[Hand of Nephthys]]".
  * In ''[[Yu-Gi-Oh! Rush Duel]]'', this is the first non-[[Maximum Monster]] to have a Summoning condition.
  ** In ''Yu-Gi-Oh! Rush Duel'', this monster's effect was changed to [[send]] a card from the player's [[hand]] to the [[Graveyard]] after [[Special Summon]]ing the monster instead of before. This was likely to prevent the sent card from being Special Summoned by its effect. In the ''[[OCG]]''/''[[TCG]]'', sending the card to the Graveyard occurs after [[target]]ing the monster to Special Summon, but due to the lack of targeting, that approach was not possible in ''Rush Duel''.
