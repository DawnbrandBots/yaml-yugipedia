title: Card Trivia:Chaos End Ruler - Ruler of the Beginning and the End
wikitext: |-
  {{Navigation}}

  * This monster's name and effect reference both "[[Black Luster Soldier - Envoy of the Beginning]]" and "[[Chaos Emperor Dragon - Envoy of the End]]", while being a more powerful version of the two.
  ** This monster shares the same [[Attribute]] ([[LIGHT]]) and [[Type]] ([[Warrior]]) as "Envoy of the Beginning".
  ** This monster is two [[Level]]s higher and has 500 more [[ATK]] in exchange for 500 less [[DEF]] compared to the aforementioned "Envoy" monsters.
  ** This monster's effect to pay 1000 [[Life Points]] and [[banish]] all cards in the opponent's [[hand]] (in the anime) [[field]], and [[Graveyard]], while inflicting 500 damage for each card banished by this effect, is the combined and stronger version of the banishing effect of "Envoy of the Beginning" and the mass removal and damaging effect of "Envoy of the End".
  * This is one of the few cards in the anime to be [[List of unseen cards|revealed but never actually played]].
  * According to the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card is part of a "legendary Deck", but it is currently unknown who it belonged to. In-universe, this card is considered one of the most powerful monsters in the game.
