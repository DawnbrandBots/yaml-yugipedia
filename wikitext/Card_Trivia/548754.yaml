title: Card Trivia:Trickstar Crimson Heart
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the ''[[wikipedia:Lamprocapnos|Lamprocapnos spectabilis]]'', a species of toxic flowering plants also known as the "bleeding heart", which appears as the symbols on the corners of this card's artwork.
  ** This monster's Japanese name, "Bloody Mary", is also based on the [[wikipedia:Mary, mother of Jesus|Virgin Mary]], a venerated figure in Christianity for being the mother of [[wikipedia:Jesus Christ|Jesus Christ]].
  *** This monster's Japanese name is also based on [[wikipedia:Mary I of England|Mary I]], the Queen of England who was named "Bloody Mary" after she ordered the prosecution and execution of 283 Protestants in the mid-16th century.
