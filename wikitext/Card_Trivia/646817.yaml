title: Card Trivia:Ten Thousand Dragon
wikitext: |-
  {{Navigation}}

  * Two ''[[OCG]]''/''[[TCG]]'' [[card backing]]s (one with its color inverted) appear in this card's artwork.
  * This card was released to commemorate the milestone of 10,000 cards printed in different formats, which passed with the [[Booster Pack]] that it was released in: ''[[Ignition Assault]]'' in the Japanese ''OCG'', ''[[Rise of the Duelist]]'' in the Korean ''OCG'', and ''[[Battles of Legend: Armageddon]]'' in the ''TCG''.
  ** As such, this card is themed around the number "10,000", including its [[password]] ([[00010000]]), its [[card number|number]] in ''Battles of Legend: Armageddon'' ("BLAR-XX'''10K'''"), and its [[Summoning condition]] requiring the player to [[Tribute]] monsters with a combined [[ATK]] and [[DEF]] total of 10,000 or more in order for its ATK/DEF to become 10,000.
  * According to [https://ygorganization.com/superstringfountainpentheory/ an article] in ''[[V Jump]]'', this monster and the cosmic background are based on the [[wikipedia:Superstring theory|superstring theory]], which hypothesizes that creation is actually made up of strings. As such, this monster represents the string, while the cosmos drawn using lines represents the creation of the ''OCG'' moving forward, which reflects its base Japanese name, "Creator Dragon of the World" (万物創世龍, ''Banbutsu Sōseiryū'').
  ** Also according to the article, this monster's design is based on "[[Chaos Emperor Dragon - Envoy of the End]]" while its pointed armor resembles the tip of a [[wikipedia:Fountain pen|fountain pen]]. This is likely a wordplay on the Japanese word for a fountain pen, "''mannenhitsu''" (万年筆), which translates to "ten thousand year writing utensil".
  * This card's password value is the first to be a power of 10.
  ** This card's password value is the second smallest of all cards in the ''OCG''/''TCG'', with the smallest being "[[Labrynth Cooclock]]".
  * This monster, "[[Armed Dragon Thunder LV10]]", "[[Armityle the Chaos Phantasm]]", and "[[Numeron Chaos Ritual]]" are the only cards that mention an ATK value with 5 digits (10,000 ATK).
  ** This is also currently the only card that mentions a DEF value with 5 digits (10,000).
  * "[[Primal Dragon, the Primordial]]" was specifically designed to [[support]] this monster.
  ** This is reinforced by how the design of "Primal Dragon, the Primordial" resembles the cosmos emitted from this monster's mouth, as well as featuring a similar background in its card artwork and an effect that can facilitate this monster's Summoning condition. Both monsters were also released in Japan in October of [[2019]].
  * This monster appears in the first icon for non-mobile versions of ''[[Yu-Gi-Oh! Master Duel]]'', as well as some in-game headers.
