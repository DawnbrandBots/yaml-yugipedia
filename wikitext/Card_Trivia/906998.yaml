  * This monster appears in the artwork of "[[Shadow Severing Strike]]".
  * This monster appears to be an older, [[DARK]] [[Synchro Monster|Synchro]] version of "[[D.D. Warrior]]".
  ** This may have been due to the events depicted in "[[D/D/D Headhunt]]", implying he was recruited by "[[King of Yamimakai]]".
