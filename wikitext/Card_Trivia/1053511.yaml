title: Card Trivia:Astellar of the White Forest
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Susurrus of the Sinful Spoils]]", and as a silhouette in the artworks of "[[Scourge of the White Forest]]", "[[Sinful Spoils of the White Forest]]", and "[[Tales of the White Forest]]".
  * This monster is the younger "[[White Forest]]" form of "[[Diabellstar the Black Witch]]".
  ** ''Asteria'' (Ἀστερία) is a Greek name meaning "starry one", referencing the name of "Diabellstar".
  ** An older version of this monster, though younger than "Diabellstar", also appears in the artwork of "[[Like the Diabell]]".
