title: Card Trivia:Mano a Mano
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Plague Wolf]]" and "[[Ryko, Lightsworn Hunter]]" appear in this card's artwork.
  * This card's Japanese name, "One-on-One Battle" is part of the Japanese name of {{episode|ZEXAL|080|ref}}, in which this card is used by [[Alito]].
  ** This card's international name is based on ''mano a mano'', the Spanish and Italian word for "[[wikipedia:Hand-to-hand combat|hand-to-hand]]"
