title: Card Trivia:Five Types of Assistance
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a palindrome (ごかのかご, ''Goka no Kago'').
  * This card's effect featuring the five [[Warrior]], [[Fairy]], [[Beast]], [[Reptile]], and [[Winged Beast]]-[[Type]] monsters is a reference to the five main [[Monster Card]] Types used by this card's owner, [[Gavin Sogetsu]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
  ** The artwork also depicts a swordsman (Warrior) being surrounded by, clockwise from top, a tenjin (Fairy), a turtle (Reptile), a rabbit (Beast), and a bird (Winged Beast).
