title: Card Trivia:Surgical Striker - S.P.E.C.T.R.A.
wikitext: |-
  {{Navigation}}

  * This monster is based on the mecha of the same name piloted by [[Azalea]] and [[Camellia]] during the final battle of the "[[Sky Striker]]" arc in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This monster's [[Link Rating]] (4) and requirement of a [[Link Monster]] as [[Link Material]] are likely a reference to that battle, as "[[Sky Striker Ace - Azalea]]" and "[[Sky Striker Ace - Camellia]]" are both [[Link-2]] monsters, and can be used to [[Link Summon]] this monster.
  ** This card's artwork is based on two specular panels from {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|17|ref}}, one where the mecha emerges from the ground and the other where it fires a swarm of combat drones at [[Raye (manga)|Raye]] and [[Roze (manga)|Roze]].
