title: Card Trivia:Cosmic Horror Gangi'el
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Micron Force]]", "[[Mysterious Triangle]]" and "[[Otherworld - The "A" Zone]]".
  * This monster is likely based on the "[[wikipedia:Cthulhu Mythos deities#Great Old Ones|Great Old Ones]]", a loose pantheon of ancient, powerful cosmic entities written by [[wikipedia:H.P. Lovecraft|H.P. Lovecraft]].
  ** This monster's international name references how the "Great Old Ones" are part of the [[wikipedia:Lovecraftian horror|Lovecraftian horror sub-genre]], sometimes known as "cosmic horror".
