title: Card Trivia:Time Thief Temporwhal
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Time Thief Power Reserve]]".
  * "[[Time Thief Perpetua]]" appears in this card's artwork.
  * This monster's name is a portmanteau of "temporal" (relating to time) and "whaler" (a large ship designed chiefly for whaling).
