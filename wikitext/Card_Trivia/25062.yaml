title: Card Trivia:Worm Apocalypse
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Worm King]]" and the Japanese artwork of "[[Worm Prince]]".
  ** This monster also makes up a part of the design of "[[Evilswarm Azzathoth]]".
  * The names of the twenty-six [[Reptile]] "[[Worm]]" monsters released for the ''[[Duel Terminal]]'' systems each start with one of the twenty-six letters of the English alphabet and are released in alphabetical order using their [[card number]]s, from "A" to "Z"; as such, this monster can be considered the first [[Reptile]] "[[Worm]]" monster, while "[[Worm Zero]]" can be considered the last.
