title: Card Trivia:T.G. Recipro Dragonfly
wikitext: |-
  {{Navigation}}

  * The letter "I" in this monster's Japanese anime name (IX-00) references its [[Insect]] [[Type]], while the letter "X" is a reference to its [[Synchro Monster]] [[card type]].
  * "Recipro" is short for "reciprocate", the corresponding response of an action, which reflects this monster's effect to [[Special Summon]] another "[[T.G.]]" Synchro Monster's [[material]]s from the [[Graveyard]] in response to [[send]]ing that monster to the Graveyard.
  ** Fittingly, this effect is also designed to easily [[Synchro Summon]] a [[Delta Accel Synchro Monster]], including "[[T.G. Halberd Cannon]]" or "[[Shooting Quasar Dragon]]".
  * This is the only [[Level 2]] Synchro Monster that is never a [[Tuner]].
  * Prior to the release of ''[[Battles of Legend: Hero's Revenge]]'', this monster could not be Summoned using [[Level 1]] non-[[Tuner]] "[[T.G.]]" monsters, as the only Level 1 "T.G." monsters at the time, "[[T.G. Drill Fish]]" and "[[T.G. Gear Zombie]]" were previously [[Anime-only|anime-exclusive]] and was not yet released in the ''[[OCG]]''/''[[TCG]]'' until that pack's release.
  * In the first English edition of this card's debut pack, ''[[Extreme Victory]]'', its [[WIND]] [[Attribute]] symbol is [[misprint]]ed as "Vento", the Portuguese and Italian for "wind".
