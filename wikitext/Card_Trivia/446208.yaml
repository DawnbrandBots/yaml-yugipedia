title: Card Trivia:Smile World
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Performapal Smile Sorcerer]]".
  * The smiley faces that appear in this card's artwork also appear in the artwork of "[[Performapal Duelist Extraordinaire]]" (as coloured outlines).
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this card represented [[Yusho Sakaki|the]] [[Yoko Sakaki|Sakaki]] [[Yuya Sakaki|family]]'s desire to see people happy.
