title: Card Trivia:Mardel, Generaider Boss of Light
wikitext: |-
  {{Navigation}}

  * The symbol from the artwork of "[[Generaider Boss Stage]]" appears in this card's artwork (although the lower left circle is highlighted green).
  * This monster is based on [[wikipedia:Freyja|Freyja]], a goddess in [[wikipedia:Norse mythology|Norse mythology]] and, in some versions, the [[wikipedia:Vanir|Vanir]] witch [[wikipedia:Gullveig|Gullveig]] or the wife of [[wikipedia:Odin|Odin]].
  ** This card's name, "Mardel", is based on "Mardöll", one of the numerous other names of Freyja, meaning "sea brightener".
  ** The symbol from the artwork of "Generaider Boss Stage" that appears in this card's artwork is based on [[wikipedia:Vanaheimr|Vanaheim]], home of the Vanir, a group of gods associated with fertility, wisdom, and precognition; Freyja is a Vanir, but became an honorary member of the [[wikipedia:Aesir|Aesir]].
