title: Card Trivia:Comics Hero King Arthur
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ordeal of the Hero]]".
  * This monster is based on [[wikipedia:King Arthur|King Arthur]], the legendary king of [[wikipedia:Great Britain|Great Britain]] who is regarded as a central figure in medieval literature.
  ** The Japanese pronunciation of "Arthur" (アーサー, ''Āsā'') also sounds similar to "author", which reflects this monster's owner, [[Art Stanley]], who is the author of his comic book in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster has a "[[CXyz]]" [[Card evolutions|evolution]]: "[[CXyz Comics Hero Legend Arthur]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[ATK]]-gaining effect and fixed amount of damage is based on "[[Comic Field]]", a [[Field Spell Card]] used in conjunction with this monster in the anime, which allows it to gain 500 ATK instead of being [[destroy]]ed by battle. This in turn would [[activate]] this monster's anime effect to inflict damage to the opponent equal to the change in ATK, which in this case, is 500.
