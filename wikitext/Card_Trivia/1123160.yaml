title: Card Trivia:Linkslayer @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located at the center of this monster's helmet and abdominal armor.
  * This monster is an "@Ignister" [[counterpart]] of "[[Linkslayer]]".
  ** Both monsters feature an effect that allows them to [[discard]] from the [[hand]] to [[destroy]] up to two [[Spell]]/[[Trap Card]]s.
  ** This monster's design features elements of "[[The Arrival Cyberse @Ignister]]", referencing how in {{episode|VRAINS|120|ref}}, "[[Linkslayer (anime)|Linkslayer]]" was one of the [[Link Material]]s for "[[Accesscode Talker]]," which defeated "The Arrival Cyberse" in a mutual clash.
