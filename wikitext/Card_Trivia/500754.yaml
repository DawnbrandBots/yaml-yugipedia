title: Card Trivia:Gaia Saber, the Lightning Shadow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[D.D.D. - Different Dimension Derby]]".
  * This monster is a [[Link Monster|Link]] counterpart of "[[Gaia The Fierce Knight]]".
  ** This monster has three other [[Extra Deck]] counterparts:
  *** [[Fusion Monster|Fusion]]: "[[Gaia Drake, the Universal Force]]"
  *** [[Synchro Monster|Synchro]]: "[[Gaia Knight, the Force of Earth]]"
  *** [[Xyz Monster|Xyz]]: "[[Gaia Dragon, the Thunder Charger]]"
  * This is the first [[Machine]] Link Monster.
  * This is the first [[non-Effect]] Link Monster.
