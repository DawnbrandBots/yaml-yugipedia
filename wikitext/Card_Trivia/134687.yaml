title: Card Trivia:Laval Dual Slasher
wikitext: |-
  {{Navigation}}

  * This is the first [[Synchro Monster]] to be printed with a [[Common]] [[rarity]] in a [[Core Booster|Core Booster pack]] (e.g. ''[[Photon Shockwave]]'') in the ''[[TCG]]''.
  ** The first Synchro Monster to be printed with a Common rarity in the ''[[OCG]]'' is "[[Magical Android]]" in the Japanese release of ''[[The Duelist Genesis]]'' Core Booster pack; however, it was printed as a [[Super Rare]] monster in its ''TCG'' release.
