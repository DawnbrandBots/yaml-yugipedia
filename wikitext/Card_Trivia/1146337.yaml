title: Card Trivia:The Fallen & The Virtuous
wikitext: |-
  {{Navigation}}

  * "[[Dogmatika Ecclesia, the Virtuous]]" and "[[Fallen of Albaz]]" appear in this card's artwork.
  ** This card's artwork is based on the scene from {{episode|CARD GAME THE CHRONICLES|3|ref}} where [[Albaz]] growls at [[Ecclesia]] during their first encounter.
  * This card's effects reference the events occurred in the aforementioned episode, while being representative of the [[wikipedia:Point of view (literature)|point of view]] of each of the two characters portrayed in its artwork.
  ** Ecclesia's POV: sending a monster that mentions "Fallen of Albaz" from the [[Extra Deck]] to the [[Graveyard]] to [[destroy]] a card on the [[field]] represents the latter (as "[[Titaniklad the Ash Dragon]]") falling from 'The Hole' and subsequentially producing a crater in the middle of the city of [[Dogmatika Nation|Dragma]].
  *** Fittingly, this first effect allows the coming of "Dogmatika Ecclesia, the Virtuous" game-wise by [[trigger]]ing by "Titaniklad's" effect in the [[End Phase]] to either [[add]] or [[Special Summon]] a "[[Dogmatika]]" monster from the [[Main Deck]].
  ** Albaz's POV: Special Summoning a monster from any Graveyard while the player has an "[[Ecclesia]]" monster on their field or Graveyard represents Albaz himself emerging from the crater and subsequentially transforming (into "[[Brigrand the Glory Dragon]]") at the sight of Ecclesia fainting.
  *** Fittingly, this second effect allows the player to [[Fusion Summon]] "Brigrand" on the spot by triggering the on-Summon effect of "Fallen of Albaz", if the other required [[material]] is on the field.
  * This card's Japanese name references the English name of the second arc of ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'', "The Fallen & The Virtuous", as opposed to the arc's Japanese name, 「{{Ruby|白|しろ}}の{{Ruby|物|もの}}{{Ruby|語|がたり}}」 (''Shiro no Monogatari'', "Story of White").
