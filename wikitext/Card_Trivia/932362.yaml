title: Card Trivia:Scarred Dragon Archfiend
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: The Crimson King]]''/''[[Structure Deck: Pulse of the King]]'' and ''[[Structure Deck: Pulse of the King Rumbling of Heaven and Earth Pack]]''.
  * This monster is a retrained [[counterpart]] of "[[Red Dragon Archfiend]]".
  ** This monster's name is based on [[Red Nova]], the strongest "[[Earthbound Immortal]]" (known as "Scar-Red Nova" in the Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime), which [[Jack Atlas]] sealed into "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]", allowing it to evolve into "[[Red Nova Dragon (anime)|Red Nova Dragon]]".
  ** This monster's effect to destroy [[Attack Position]] monsters mirrors the effect of "Red Dragon Archfiend" to destroy [[Defense Position]] monsters.
  * This monster shares similarities with other counterparts of "Red Dragon Archfiend".
  ** This monster shares its first effect with "[[Scarlight Red Dragon Archfiend]]."
  ** This monster's second effect destroys Attack Position monsters, similar to the effect of "[[Hot Red Dragon Archfiend]]".
  * This monster can be considered the rival counterpart of "[[Accel Synchro Stardust Dragon]]".
  ** Both are named after the method by which their original counterparts evolved into their [[Cosmic Synchro Monster]] forms in the ''Yu-Gi-Oh! 5D's'' anime.
  ** Both can [[Special Summon]] their original counterparts from the [[Extra Deck]] with a certain [[activation condition]], and the Summon is also treated as a [[Synchro Summon]].
