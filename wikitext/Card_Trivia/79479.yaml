title: Card Trivia:Golden Rule
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Crystal Beast Amethyst Cat]]", "[[Crystal Beast Ruby Carbuncle]]", and "[[Crystal Beast Sapphire Pegasus]]" appear in this card's artwork.
  * This card's name is based on the [[wikipedia:Golden Rule|Golden Rule]], the principle of treating others as one wants to be treated, and always ensuring in general or in a particular activity.
  ** This card's Japanese name (金科玉条, ''Kinkagyokujō'') is based on the writing of this idiom, which can also be read in kanji as "jewel" or "gemstone", reflecting its "[[Crystal Beast]]" [[support]] effect.
