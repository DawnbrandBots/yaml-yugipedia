title: Card Trivia:Juragedo
wikitext: |-
  {{Navigation}}

  * This monster's first ''[[OCG]]''/''[[TCG]]'' effect to gain 1000 [[Life Point]]s references the [[Point-to-Point Transfer]] ability of "[[The Winged Dragon of Ra]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which allows the player to pay all but one of their [[Life Point]]s to increase "Ra's" [[ATK]]/[[DEF]] by the same amount.
  ** This monster's second ''OCG''/''TCG'' effect to [[Tribute]] it to increase a monster's ATK by 1000 further references the Point-to-Point Transfer ability of "Ra", which allows the player to [[Tribute]] their monsters and increase "Ra's" ATK/DEF by the combined totals of the Tributed monsters' ATK/DEF. 
  *** During [[Dark Yugi and Dark Marik's Duel (manga)|Dark Yugi and Dark Marik's Duel]] (and its [[Yami Yugi and Yami Marik's Duel|anime counterpart]]), [[Dark Marik (manga)|Dark Marik]] used this ability to transfer his all but one of Life Points to increase "[[The Sun Dragon Ra]]'s" ATK/DEF, and then Tributes this monster to increase "Ra's" ATK/DEF by this monster's ATK/DEF.
  *** During the same Duel, Dark Marik gained 1000 Life Points from the effect of [[Dark Yugi (manga)|Dark Yugi]]'s "[[Soul Taker (manga)|Soul Taker]]", then used this effect to increase "Ra's" ATK/DEF by 1000.
  * This card's text underwent an [[Errata|erratum]] before it was released, in order to prevent an extremely powerful loop involving itself and "[[Begone, Knave!]]" to repeatedly [[Special Summon]] and return multiple copies of this card and gain a large amount of [[Life Points]].
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|266|ref}}, specifically from the panel where [[Juragedo (manga)|this monster]] attacks and destroys "[[Queen's Knight (manga)|Queen's Knight]]" by battle.
