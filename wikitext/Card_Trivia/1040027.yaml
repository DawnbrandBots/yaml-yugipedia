title: Card Trivia:Mementotlan Twin Dragon
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Memento]]" [[counterpart]] of "[[Twin-Headed Thunder Dragon]]".
  * This is the only "Memento" monster whose crystals have two different colors (green and yellow), mirroring the number of [[Fusion Material]]s (2) required for its [[Fusion Summon]].
  ** Conceptually speaking, it may imply that this monster is the combination of "[[Mementotlan Shleepy]]" (green crystals) and "[[Mementotlan Angwitch]]" (yellow crystals).
  *** This is further supported by "Mementotlan Shleepy" having a Fusion Summoning effect without an explicit result for it, whereas the artwork of "[[Mementotlan Fusion]]", which is the only other "Memento" card with a Fusion Summoning effect, suggests to be resulting into the only other "Memento" Fusion Monster, "[[Mementomictlan Tecuhtlica - Creation King]]".
