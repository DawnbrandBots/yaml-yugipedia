title: Card Trivia:Power Injector
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Teleport]]", "[[Column Switch]]" and "[[Emergency Apport]]".
  * This monster's appearance is based on [[wikipedia:Frankenstein's monster|Frankenstein's monster]], a humanoid creature created by the mad scientist [[wikipedia:Victor Frankenstein|Victor Frankenstein]], who is composed of body parts from multiple corpses and brought to life with electricity.
