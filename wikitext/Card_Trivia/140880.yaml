title: Card Trivia:Triangle Knight
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name and [[Level]] (3) are based on the [[wikipedia:Triangle|triangle]], a geometrical polygon with six sides.
  ** This monster's shield and the shape in the background of this card's artwork both feature a triangular shape.
  ** This card's effect allows it to [[shuffle]] "three" cards from the [[Graveyard]] and into the [[Deck]].
  ** This card's [[original ATK and DEF]] (900/900) are each multiples of three, multiplied by 300.
