title: Card Trivia:Ninjitsu Art of Duplication
wikitext: |-
  {{Navigation}}

  * "[[Ninja Grandmaster Hanzo]]" and two "clones" of him appear in this card's artwork.
  ** Ironically, this card's effect cannot [[Special Summon]] two monsters with the same name as a "[[Ninja]]" monster without the help of other cards.
