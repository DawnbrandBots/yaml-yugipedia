title: Card Trivia:Hannibal Necromancer
wikitext: |-
  {{Navigation}}

  * This card's effect is similar to that of "[[Breaker the Magical Warrior]]", but is limited to face-up [[Trap Card]]s.
  * In the original [[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]] manga and [[Yu-Gi-Oh! (anime)|anime]], this card was a [[Normal Monster]].
  * The background of this card's artwork is different in ''[[Yu-Gi-Oh! The Duelists of the Roses]]''.
  * In ''[[Yu-Gi-Oh! Nightmare Troubadour]]'', this card refers to [[Counter#Spell Counter|Spell Counters]] as ''Magic Counters''.
