title: Card Trivia:Ceremonial Token
wikitext: |-
  {{Navigation}}

  * In some Spanish Yu-Gi-Oh! video games, this token is named "'''Ficha Ceremoniale'''". This might be an error in programming due to the use of Spanish plural words, as the Spanish lore for "[[Offering to the Immortals]]" mentions them as "Ficha'''s''' Ceremoniale'''s'''".
