title: Card Trivia:Sogen
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:meadow|meadow]], an open grassland habitation with lush green vegetation.
  ** This card's [[Warrior]] and [[Beast-Warrior]] support effect references how the meadows and grasslands are often used as the site for many battles.
  ** This card is also based on the [[Meadow]] [[terrain]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
