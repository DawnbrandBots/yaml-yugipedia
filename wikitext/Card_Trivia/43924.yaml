title: Card Trivia:Quiz Panel - Obelisk 30
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Obelisk the Tormentor (original)|Obelisk the Tormentor]]" appears in this card's artwork.
  * This card has two counterparts: "[[Quiz Panel - Ra 30]]" and "[[Quiz Panel - Slifer 30]]".
  * At the time of this card's debut in the ''[[Yu-Gi-Oh! GX]]'' anime, there would have been six possible answers: "[[Exodia the Forbidden One]]", "[[Destiny Board]]", "[[Last Turn]]", "[[Final Countdown]]", "[[Relay Soul (anime)|Relay Soul]]", and "[[Deuce]]".
