title: Card Trivia:Don Thousand/Monster C
wikitext: |-
  {{Navigation}}

  * This card has the highest printed ATK of any [[Monster Card]], being in fact so high that a different font/spacing had to be used to hold all six digits.
  * This is the only [[Duel winner]] to use the phrasing "your opponent loses the [[Duel]]" rather than "you [[Victory condition|win]] the Duel". Presumably this is because this card is only used in a [[Boss Duel]] event against multiple challengers, making it possible for one or more to lose while the remainder can still win by defeating the boss.
