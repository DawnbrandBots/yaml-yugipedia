title: Card Trivia:Linear Accelerator Cannon
wikitext: |-
  {{Navigation}}

  * Two "[[Cannon Soldier]]s" appear in this card's artwork.
  ** This implies that this cannon is a more advanced version of "[[Mass Driver]]", which also shoots projectiles (for smaller damage) and features two "Cannon Soldiers".
  * This card is essentially a Normal Spell Card version of "[[Catapult Turtle]]".
