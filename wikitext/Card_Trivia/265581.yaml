title: Card Trivia:Corrupted Keys
wikitext: |-
  {{Navigation}}

  * Three "[[Umbral Horror Mirage Token]]s" appears in this card's artwork.
  * This card's Japanese name is a pun on the Japanese word ''Shinkīrō'', which translates to "mirage", reminding to the "Umbral Horror Mirage Tokens".
  ** The "Mirage" in this card's name and the [[Token Monster]]s Summoned by its effect are a reference to how [[Yuma Tsukumo]]'s first encounters with [[Vector]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' turned out to be an illusion.
