title: Card Trivia:Terrorphone Number
wikitext: |-
  {{Navigation}}

  * The number "4322194" in this card's artwork is a ''[[goroawase]]'' that can be interpreted as either 「自殺に行くよ」 ("kill yourself") or 「黄泉路に行くよ」 ("go to hell").
  * This card is based on ''[[wikipedia:One Missed Call (2003 film)|One Missed Call]]'', a 2003 Japanese horror film and franchise adapted from the horror novel, ''Chakushin Ari''. The story revolves around a young psychology student, whose fiends receive a disturbing voicemail message on their phones and end up dying days later, only to discover a vengeful spirit is behind the messages and murders.
