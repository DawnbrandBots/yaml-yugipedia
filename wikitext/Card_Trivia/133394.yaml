title: Card Trivia:Effect Veiler
wikitext: |-
  {{Navigation}}

  * This card has a counterpart, "[[Extra Veiler]]", which is used by [[Jack Atlas|Jack]], while this card is used by [[Yusei Fudo|Yusei]].
  * This monster's wings give it a slight resemblance to an [[wikipedia:angel|angel]].
  * This monster bears resemblance to the [[wikipedia:Vocaloid|Vocaloid]] "[[wikipedia:Hatsune Miku|Hatsune Miku]]", but even more so to that of Ren from the series ''[[wikipedia:DearS|DearS]]''.
  * This card is the first [[Starlight Rare]] reprint of an existing card in the [[TCG]]. 
  **It is also the first card to be reprinted in a main series [[Booster Pack]] in the TCG.
