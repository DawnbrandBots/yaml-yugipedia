title: 'Card Trivia:Number 69: Heraldry Crest - Dark Matter Demolition'
wikitext: |-
  {{Navigation}}

  [[File:Number69HeraldryCrest-JP-Anime-ZX-NC-4.jpg|thumb|right|250|The true form of "[[Number 69: Heraldry Crest (anime)|Number 69: Heraldry Crest]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.]]
  * This monster appears in the artwork of "[[Resurgam Xyz]]".
  * The number "69" appears on this monster's horn.
  * This monster is based on the "true form" of "[[Number 69: Heraldry Crest]]" after using its card [[destroy|destruction]] effect a second time in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack name]] of "Heraldry Crest" in the anime, "Dark Matter Demolition" ("God Rage" in the Japanese version).
  ** This monster is also the second and true, final [[counterpart|evolved]] form of "Number 69: Heraldry Crest" as well as the evolved form of "[[Number 69: Heraldry Crest - Shatter Stream]]", reflecting how "Heraldry Crest" transformed a second time when using its card destruction in the anime.
  ** This monster's [[original ATK]] (3100) references a scene from {{episode|ZEXAL|066|ref}} where this monster uses the stolen effect of "[[Number 17: Leviathan Dragon (anime)|Number 17: Leviathan Dragon]]" to gain 500 [[ATK]], increasing its 2600 ATK to 3100.
  * This monster and "[[Flash of Heraldry]]" are the first cards in the ''[[OCG]]''/''[[TCG]]'' to feature an effect that can [[Changes card names|change a card's name]] into the name of a card that does not exist.
  ** This monster's effect to treat an opponent's monster's name as "Unknown" is based on the anime effect of "[[Number 8: Heraldic King Genom-Heritage (anime)|Number 8: Heraldic King Genom-Heritage]]", which can replace the name of an opponent's attacking monster with "Unknown" and replace its own name with that opponent's monster's name.
  * This monster has the highest [[original ATK]] (3100) of all [[Rank]] 4 [[Xyz Monster]]s.

