title: Card Trivia:Black Metal Dragon
wikitext: |-
  {{Navigation}}

  * This monster can be considered the modern "[[Metalmorph]]" for the "[[Red-Eyes]]" archetype.
  ** This card can also be considered a [[counterpart]] of "[[Dragon Nails]]" due to the 600 ATK boost it grants.
  * This monster appears in the artwork of "[[Return of the Red-Eyes]]", during the process in which it fuses with "[[Red-Eyes Black Flare Dragon]]" to become "[[Red-Eyes Flare Metal Dragon]]".
  * If this card is equipped to "[[Red-Eyes Black Dragon]]", its [[ATK]] becomes 3000, the same as its rival monster, "[[Blue-Eyes White Dragon]]".
  * True to the fact that this card is a "Red-Eyes" support card without "Red-Eyes" in its name, this monster appears to have white eyes.
