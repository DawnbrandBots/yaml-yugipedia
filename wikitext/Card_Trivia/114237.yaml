title: Card Trivia:Eye of Illusion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * The [[Eye of Wdjat]] appears in this card's artwork.
  ** The Eye of Wdjat appears in the artwork of "[[Illusionist Faceless Magician]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' effects are based on how it was used by [[Maximillion Pegasus]] during his first Duel with [[Yugi Muto]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This card's first effect is based on how "[[Illusionist Faceless Mage]]" (an [[Illusion]] monster in the manga and a [[Spellcaster]] in the anime and ''OCG''/''TCG'') was protected from being destroyed by the "[[Dark Magician]]'s" attack.
  ** This card's control-switching effect is based on how Pegasus took control of "Dark Magician" after attacking "Illusionist Faceless Mage".
  ** This card's attack-managing effect is based on how this card redirected the attack of Yugi's "[[Celtic Guardian]]" to the entranced "Dark Magician".
  * This card has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any card, released 25 years after its first appearance in the ''Yu-Gi-Oh!'' manga on December 22, 1997.
