title: Card Trivia:Gleipnir, the Fetters of Fenrir
wikitext: |-
  {{Navigation}}

  * "[[Raging Sacred Curse]]", "[[Dromi the Sacred Shackles]]" and this card are based in the fetters that the [[Aesir|Nordic Gods]] prepared for [[Fenrir the Nordic Wolf|Fenrir]] ([[Raging Sacred Curse|Leyding]], [[Dromi the Sacred Shackles|Dromi]] and [[Gleipnir, the Fetters of Fenrir|Gleipnir]])
  * This card is named after [[wikipedia:Gleipnir|the chain]] that in Norse mythology holds the [[Fenrir the Nordic Wolf|giant wolf]] in place until Ragnarok.
