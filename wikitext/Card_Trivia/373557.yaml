title: Card Trivia:Down Force
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Raiza the Storm Monarch]]" appears in this card's artwork.
  * This card's name, "Down Force", is a pun on [[wikipedia:Downforce|downforce]] (the force acting on an object that causes it to go down) and "Down" (a layer of fine feathers found under the tougher exterior feathers).
