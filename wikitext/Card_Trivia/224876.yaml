title: Card Trivia:Stoic of Prophecy
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Hanged Man (Tarot card)|The Hanged Man]], the twelfth of the  [[wikipedia:Major Arcana|Major Arcana]] cards.
  ** This card's Japanese name, "'''Le Pendu'''", is from the French name for The Hanged Man, ''Le Pendu''.
  ** Additionally, its [[Attribute]] is [[WATER]], which reflects the [[wikipedia:Planet|planet]] associated with the Hanged Man: [[wikipedia:Neptune|Neptune]].
  * "[[wikipedia:Stoicism|Stoic]]" refers to a school of philosophy that believes overcoming emotions leads to better moral or ethical well-being – a good metaphor for the symbolism of the "hanged man" Tarot card, which most commonly depicts a person peacefully hanging from their foot upside-down.
  * This card is the first card to search for a "[[Prophecy]]"/"魔導" monster. Before the "Prophecy" archetype debuted, there was already an abundance of Japanese Monster Cards with "魔導" in their names, although none of them were Level 3. Therefore, it is very likely that this card was designed to specifically exclude those monsters, especially since this card only searches for Level 3 "Prophecy"/"魔導" monsters, of which many were released in ''[[Return of the Duelist]]'' and ''[[Abyss Rising]]''.
  * One of this monster's staves appears in the artwork of "[[World of Prophecy]]".
