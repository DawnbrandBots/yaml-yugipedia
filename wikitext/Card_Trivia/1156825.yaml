title: Card Trivia:El Shaddoll Meshahrail
wikitext: |-
  {{Navigation}}

  * The prefix "Meshah" in "Meshahrail" is derived from the Hebrew word meaning "salvation", "deliverance", and "freedom".
  * This monster is an upgraded form of "[[El Shaddoll Winda]]".
  ** According to ''Valuable Book ex 6'', This monster is "El Shaddoll Winda" after having been absorbed by "[[Qliphort Scout]]", with "Meshahrail" being in the process of executing C:\tierra\qliphoth.exe to release the [[Infernoid]]s.
  ** Fittingly, this monster's required [[Fusion Material]] includes a "[[Shaddoll]]" monster, an [[EARTH]] monster (the primary [[Attribute]] of the "[[Qliphort]]" [[archetype]]), and a [[DARK]] monster (the primary Attribute of the "[[Shaddoll]]" archetype).
  ** Also, this monster's effect which [[add]]s a "[[Shaddoll]]" card or a "[[Void]]" [[Spell]]/[[Trap Card]] from the [[Deck]] to the [[hand]] is similar to the [[Pendulum Effect]] of "Qliphort Scout", while its Continuous Effect, which grants it immunity to various other effects, is practically identical to the effect of "[[Apoqliphort Towers]]".
