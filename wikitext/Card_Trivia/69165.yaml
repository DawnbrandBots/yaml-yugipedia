title: Card Trivia:The Claw of Hermos
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Dragons of Legend: The Complete Series]]''.
  * The dragon in this card's artwork appears in the artwork of "[[Legend of Heart]]".
  * This card is named after ''[[wikipedia:Hermocrates (dialogue)|Hermocrates]]'', the hypothetical third part of [[wikipedia:Plato|Plato]]'s trilogy of dialogues, which serve as the source of myths pertaining to the lost city of [[wikipedia:Atlantis|Atlantis]].
  ** This card is based on the dragon form of [[Hermos]], one of the three legendary knights of [[Atlantis]] who were weakened and transformed into dragons by [[Dartz]] during the Battle of Atlantis, and sealed away in crystal by sticking them with magic swords. In this case, Hermos was sealed away with a sword sticking in its claw.
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card has the most associated [[Fusion Monster]]s out of the "[[Legendary Dragon]]s" with five ("[[Time Magic Hammer (anime)|Time Magic Hammer]]", "[[Red-Eyes Black Dragon Sword (anime)|Red-Eyes Black Dragon Sword]]", "[[Rocket Hermos Cannon (anime)|Rocket Hermos Cannon]]", "[[Big Bang Dragon Blow]]", and "[[Goddess Bow (anime)|Goddess Bow]]").
  * This is the only "Legendary Dragon" card:
  ** To not feature a wasteland in the background of its anime artwork.
  ** To have an [[Anime-only|anime-exclusive]] associated Fusion Monster ("Big Bang Dragon Blow").
  ** That was used by players other than its chosen Duelist in the ''Yu-Gi-Oh!'' anime (after its chosen Duelist [[Joey Wheeler]] lost his soul to "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]", this card was used by [[Mai Valentine]] (offscreen) and [[Yami Yugi]]).
  ** To not have an ''[[OCG]]''/''[[TCG]]''-original associated Fusion Monster ("[[The Eye of Timaeus]]" has "[[Dark Magician the Dragon Knight]]" and "[[Timaeus the United Magical Dragon]]", and "[[The Fang of Critias]]" has "[[Destruction Dragon]]").
