title: Card Trivia:Destructor Soldier Plumber
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Demolition Fighting Spirit]]" and "[[Demolition Perforation]]".
  * This monster's Japanese name, "High Kanko" (ハイ・カンコウ, ''Hai Kanko'') is a pun on the Japanese word for "plumber" (配管工, ''haikankō'').
