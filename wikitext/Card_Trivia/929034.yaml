title: Card Trivia:Hot Off the Press
wikitext: |-
  {{Navigation}}

  * "[[Reporter Raccoon]]" appears in this card's artwork.
  ** This card's artwork depicts "Reporter Raccoon" transforming the leaves she throws from her basket into paper, referencing the [[wikipedia:Japanese mythology|Japanese legend]] of the ''[[wikipedia:Bake-danuki|bake-danuki]]'', in which they use leaves to shapeshift.
  * This card's Japanese name, "Tile Burn" (''Kawara Bān'') is a play on ''kawaraban'' (lit. "tile-block print"), a type of newspaper published in 19th century Japan using clay printing blocks.
