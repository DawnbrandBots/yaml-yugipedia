title: Card Trivia:Toon Summoned Skull
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the Japanese version of ''[[Pharaoh's Servant (Japanese)|Pharaoh's Servant]]'', as well as one of the cover cards of ''[[Duelist Legacy Volume.1]]''.
  * This monster is the [[Toon monsters|Toon]] [[counterpart]] of "[[Summoned Skull]]".
  ** Unlike most Toon monsters, which retain the color scheme of their original counterparts, this monster is completely turquoise. This may be because, in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], this monster is the result of "[[Doppelganger (manga)|Doppelganger]]" (and its [[Doppelganger (anime)|anime counterpart]]) copying "Summoned Skull".
  * This monster's depiction varies depending on the media:
  ** In the ''Yu-Gi-Oh!'' manga and anime, this monster's torso extends to the inside of "[[Toon World (manga)|Toon World]]" (and its [[Toon World (anime)|anime counterpart]]) and is frequently seen attached to it.
  ** In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's 3D model is shown to feature normal legs.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|127|ref}}, specifically from the panel showing [[Toon Summoned Skull (manga)|this monster]] being Summoned.
