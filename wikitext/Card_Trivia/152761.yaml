title: Card Trivia:Stardust Phantom
wikitext: |-
  {{Navigation}}

  * This monster's staff bears the head and wings of "[[Stardust Dragon]]", while this monster's helmet is based on the head of "Stardust Dragon".
  * This card's effect is similar to that of "[[Trust Guardian]]".
  ** They both prevent Synchro Monsters from destroyed by battle.
  ** The Synchro Monsters lose ATK and/or DEF at the end of Damage Step.
  ** Furthermore, both this card and "Trust Guardian" are used by [[Yusei Fudo]] and [[Jack Atlas]], the protagonist and rival of ''[[Yu-Gi-Oh! 5D's]]'', respectively.
  * This card is similar in theme to monsters such as "[[Hand of Nephthys]]", "[[The Creator Incarnate]]", and the [[Paladins of Dragons]] monsters, in that they Special Summon the monster that is their namesake.
