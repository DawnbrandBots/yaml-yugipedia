title: Card Trivia:Sakuretsu Armor
wikitext: |-
  {{Navigation}}

  * "[[Dark Lucius LV4]]" appears in this card's artwork.
  * This card's Japanese name, "Reactive Armor" is based on [[wikipedia:Reactive armour|reactive armour]], more specifically the explosive reactive armour, a type of external vehicle armor consisting of a block of explosives that will detonate upon contact with incoming projectiles to reduce or dissipate the potential damage to the vehicle itself.
  ** The first portion of this card's ''[[TCG]]'' name is the proper pronunciation of the first two kanji (炸裂, ''Sakuretsu'') in its Japanese name, "Reactive Armor" (炸裂装甲, ''Sakuretsu Sōkō''), which translates to "explosion".
  * This card has a ''[[Rush Duel]]'' [[Drone (Rush Duel)|Drone]] parody: "[[Sakuretsu Alter]]".
  * Despite being used multiple times in the anime, this card was never successfully [[activate]]d.
  ** This card shares this distinction with "[[Battle Break]]", "[[R - Righteous Justice]]", and "[[Vacua Annihilation]]".
