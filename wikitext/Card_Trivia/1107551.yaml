title: Card Trivia:Evasive Chaos Ninsect Bewitching Flute Ageha
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Evasive Chaos Ninjutsu Art of I Want You]]" and "[[Evasive Chaos Ninjitsu Art of Insect Multiplication]]".
  * The first portion of this monster's Japanese name, ({{Ruby|тцЅ|сЂИсѓЊ}}{{Ruby|тдќ|сѓѕсЂє}}{{Ruby|жГћ|сЂЙ}}{{Ruby|угЏ|сЂдсЂЇ}} ''Hen'y┼Їmateki'') is a portmanteau of the words "тцЅтдќ" (''Hen'y┼Ї'', lit. "Mysterious Transformation") and "жГћугЏ" (''Mateki'', lit. "Demonic Flute").
  ** The second portion of this monster's Japanese name, "Ageha" is short for "''agehach┼Ї''", the Japanese name for the [[wikipedia:Swallowtail butterfly|swallowtail butterfly]].
