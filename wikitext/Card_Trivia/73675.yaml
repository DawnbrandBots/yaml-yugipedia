title: Card Trivia:Elemental HERO Rampart Blaster
wikitext: |-
  {{Navigation}}

  * This card is named after a [[wikipedia:Rampart (fortification)|rampart]], a type of fortification made out of excavated earth or masonry used for defense.
  ** Fittingly, this card is an [[EARTH]] monster and has a high [[DEF]] (2500).
  * This card has an "[[Evil HERO]]" [[counterpart]]: "[[Evil HERO Infernal Sniper]]".
  ** Both are [[Fusion Monster]]s that require "[[Elemental HERO Clayman]]" and "[[Elemental HERO Burstinatrix]]" as [[Fusion Material]]s.
  ** Both have the same [[Level]] (6), [[ATK]] (2000), and DEF (2500).
  ** This card can [[Direct attack|attack directly]] the opponent while it is in [[Defense Position]], but its ATK is halved during [[damage calculation]], inflicting 1000 damage to the opponent, while "Evil HERO Infernal Sniper" can inflict 1000 [[Effect damage|damage]] to the opponent while it is in Defense Position.
  * This card is the first female "[[Elemental HERO]]" [[Fusion Monster]].
  ** However, in the English version of the ''[[Yu-Gi-Oh! GX]]'' anime, in {{episode|GX|010|ref}}, during the [[Tag-Team Duel]] between [[Jaden Yuki]], [[Syrus Truesdale]], and the [[Paradox Brothers]], this monster was referred to multiple times as a "he" (most likely by mistake).
  ** This monster is also the only female "[[Elemental HERO]]" Fusion Monster to list "[[Elemental HERO Burstinatrix]]" as [[Fusion Material]].
