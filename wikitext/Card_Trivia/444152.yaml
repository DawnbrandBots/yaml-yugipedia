title: Card Trivia:Ojama Duo
wikitext: |-
  {{Navigation}}

  * "[[Ojama Blue]]" and "[[Ojama Red]]" appear in this card's artwork.
  * The titular "Ojama Duo" appear in the artworks of "[[Nitwit Outwit]]", "[[Ojama Country]]", "[[Ojama Duo]]" "[[Solidarity]]", and "[[Super Team Buddy Force Unite!]]".
  * This card has a similar counterpart, "[[Ojama Trio]]", that features "[[Ojama Black]]", "[[Ojama Green]]", and "[[Ojama Yellow]]", but has less effects.
