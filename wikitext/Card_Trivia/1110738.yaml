title: Card Trivia:Gagaga Ganbara Knight
wikitext: |-
  {{Navigation}}

  [[File:GanbaraKnight-JP-Anime-ZX-NC.png|thumb|250px|"[[Ganbara Knight (anime)|Ganbara Knight]]" being Summoned.]]

  * This monster is a "[[Gagaga]]" [[counterpart]] of "[[Ganbara Knight]]".
  ** This monster's pose is based on that of "[[Ganbara Knight (anime)|Ganbara Knight]]" when it is Summoned in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster is depicted wielding two differently colored "[[Gagagashield]]s".
  ** This monster's second bulleted effect to change the [[battle position]] of a monster on the [[field]] is based on the effect of "Ganbara Knight" to change itself from [[Attack Position]] to [[Defense Position]] when attacked.

