title: Card Trivia:Ruddy Rose Witch
wikitext: |-
  {{Navigation}}

  * Visually, this monster is based on [[Akiza Izinski]], who uses the "[[Rose]]" archetype in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster's ''[[TCG]]'' name is based on "ruddy", a healthy red color, which is used for this monster's red color scheme.
  ** "Ruddy" is also the informal British-English euphemism for "bloody", which references this monster's Japanese name, "Blood Rose Witch".
  * This monster has a [[counterpart]]: "[[Witch of the Black Rose]]".
  ** Both are [[Tuner monster]]s based on Akiza Izinski.
  ** Both can be used to [[Synchro Summon]] "[[Black Rose Dragon]]" or its [[Card evolutions|upgraded]] form, "[[Ruddy Rose Dragon]]".
  ** This monster's effect is designed to work with the ''[[OCG]]''/''[[TCG]]'' effect of "Witch of the Black Rose", which can only be [[Normal Summon]]ed, requires the player to [[control]] no cards to [[activate]] its effect, and will [[destroy]] itself the player does not [[draw]] a monster.
