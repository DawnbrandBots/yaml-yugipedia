title: Card Trivia:War Rock Big Blow
wikitext: |-
  {{Navigation}}

  * "[[War Rock Mammud]]" appears in this card's artwork.
  * One of the two adversaries getting knocked away by "Mammud" is throwing up the [[wikipedia:Sign of the horns|Sign of the Horns]]. Among many other meanings, this sign has been popularized as a sign of Rock Music, referencing the name of the "[[War Rock]]" [[archetype]].
