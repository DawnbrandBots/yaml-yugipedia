  {{Navigation}}

  [[File:Number_C101_Summoning.png|thumb|right|250px|The [[Chaos Xyz Evolution]] of "[[Number 101: Silent Honor ARK (anime)|Number 101: Silent Honor ARK]]" into "[[Number C101: Silent Honor DARK (anime)|Number C101: Silent Honor DARK]]".]]

  * "[[Number 101: Silent Honor ARK]]" and "[[Number C101: Silent Honor DARK]]" appear in this card's artwork.
  ** This card's artwork is a reference to the Summoning sequence of "[[Number C101: Silent Honor DARK (anime)|Number C101: Silent Honor DARK]]" in {{episode|ZEXAL|125|ref}}, in which it was ejected out of "[[Number 101: Silent Honor ARK (anime)|Number 101: Silent Honor ARK]]".
  * This card's effect to [[search]] a "[[Rank-Up-Magic]]" [[Quick-Play Spell]] is a reference to how [[Nash]] used "[[Rank-Up-Magic Quick Chaos (anime)|Rank-Up-Magic Quick Chaos]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
