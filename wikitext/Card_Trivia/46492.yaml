title: Card Trivia:Spell Striker
wikitext: |-
  {{Navigation}}

  * This monster has an older counterpart: "[[Spell Strider]]".
  * This monster shares the same [[Attribute]] ([[EARTH]]), [[Level]] (3), and [[Type]] ([[Warrior]]), visual design, and naming scheme with "[[Armor Breaker]]" and "[[Card Blocker]]". Fittingly, all three monsters were used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
