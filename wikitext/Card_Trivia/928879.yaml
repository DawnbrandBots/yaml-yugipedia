title: Card Trivia:Dogmatika Encounter
wikitext: |-
  {{Navigation}}

  * "[[Fallen of Albaz]]" and "[[Dogmatika Ecclesia, the Virtuous]]" appear in this card's artwork.
  ** The events in this card's artwork are continued from "[[Dogmatika Punishment]]": after having been defeated by "[[Dogmatika Fleurdelis, the Knighted]]", "[[Titaniklad the Ash Dragon]]" turns into "Fallen of Albaz", who is approached by "Ecclesia". The saint maiden, however, hesitates in delivering the finishing blow, as "Albaz" appears to be rather weakened. The events in this card's artwork are continued in "[[Tri-Brigade Stand-Off]]".
