title: Card Trivia:Gyaku-Gire Panda
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Trap Request]]".
  * This monster appears in the artwork of "[[Weed Out]]".
  * This monster has a [[counterpart]]: "[[Maji-Gire Panda]]".
  * ''Gyaku-Gire'' (lit. "wrongfully angry") is the Japanese term for getting angry at someone, simply because they are angry at you for a legitimate reason.
