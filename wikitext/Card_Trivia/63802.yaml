title: Card Trivia:Hero Signal
wikitext: |-
  {{Navigation}}

  * "[[Skyscraper]]" appears in this card's artwork.
  * The "H" insignia inside the signal appears in the artwork of "[[Good Hero]]" and "[[Miracle Fusion]]".
  * This card appears in the artwork of "[[Trap Strap]]".
  * This card has four different [[Archetype|archetypal]] counterparts appearing in the ''[[Yu-Gi-Oh! GX]]'' era:
  ** "[[Destiny Signal]]" for "[[Destiny HERO]]"
  ** "[[Neo Signal]]" for "[[Neo-Spacian]]"
  ** "[[Apparition]]" for "[[Vision HERO]]"
  ** "[[SOS]]" for "[[Masked HERO]]"
  * The signal is based on the [[wikipedia:Bat-Signal|Bat-Signal]] from the DC Comics, keeping in relation with the Western comics design of the "[[Elemental HERO]]" archetype.
  ** In the DC Comics, the Bat-Signal lights up when there is trouble in Gotham City, reflecting this card's effect to [[Special Summon]] an "Elemental HERO" monster when the player's monster is destroyed by battle.
