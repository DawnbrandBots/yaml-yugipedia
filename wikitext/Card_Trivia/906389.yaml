title: Card Trivia:Virtual World Gate - Xuanwu
wikitext: |-
  {{Navigation}}

  * "[[Virtual World Oto-Hime - Toutou]]", "[[Virtual World Shell - Jaja]]", and "[[Virtual World Roshi - Laolao]]" appear in this card's artwork.
  * 玄武 (''Xuánwǔ'') means [[wikipedia:Black Turtle-Snake|Black Turtle-Snake]], one of the [[wikipedia:Four Symbols|Four Symbols]] (zh: 四象 ''sìxiàng'') of the Chinese constellations. It represents the north direction and literally translates to "Dark Warrior", the epithet for the turtle-snake itself.
  ** Fittingly, "Virtual World Shell - Jaja" is also based on the Black Turtle-Snake.
