  * This monster appears in the artwork of "[[Big Wave Small Wave]]".
  * This card's English name is listed as "Sentinel of the Sea" in the English card text of the [[McDonald's Promotional Cards 2]] print of "[[Amphibious Bugroth]]", and as "Defender of the Sea" on the official database page for "Amphibious Bugroth".
