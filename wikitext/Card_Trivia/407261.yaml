title: Card Trivia:Supreme King Z-ARC
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Maximum Crisis]]''.
  * This monster appears in the artwork of "[[Soul of the Supreme King]]".
  ** This monster's silhouette appears in the artworks of "[[Supreme Disdain]]", "[[Supreme Faceoff]]", "[[Supreme Presence]]", and "[[Supreme Rage]]".
  * This card appears in the artwork of "[[Miracle of the Supreme King]]".
  * The Japanese katakana of "Z-ARC" (ズァーク, ''Zāku'') contains an unusual spelling: the normal character "ザ" (''Za'') is replaced by "ズ" (''Zu'') and "ア" (''A''), crossed together.
  ** This is likely references how the katakana for "ARC" (アーク, ''Āku'') is featured in the name of the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster is the combined form of [[Z-ARC]] with "[[Odd-Eyes Dragon]]"/"[[Odd-Eyes Pendulum Dragon]]", "[[Dark Rebellion Xyz Dragon]]", "[[Clear Wing Synchro Dragon]]", and "[[Starving Venom Fusion Dragon]]".
  * This monster has a [[LIGHT]] counterpart: "[[Odd-Eyes Arcray Dragon]]".
  ** This monster [[destroy]]s all cards on the [[field]] with no cost, while "Odd-Eyes Arcray Dragon" puts a Pendulum Monster from the Deck in the [[Pendulum Zone]] instead of a disruptive effect.
  ** This monster has a highly protective effect, while "Odd-Eyes Arcray Dragon" cannot prevent its own destruction.
  ** This monster has a low [[Pendulum Scale]], while "Odd-Eyes Arcray Dragon" has a high Pendulum Scale.
  ** This monster focuses on countering Extra Deck monsters and [[add]]ing cards to the [[hand]], while "Odd-Eyes Arcray Dragon" focuses on supporting hybrid [[Pendulum Monster]]s in the [[Extra Deck]].
  * This monster has a manga [[counterpart]]: "[[Odd-Eyes Revolution Dragon]]".
  ** Both monsters are [[Level 12]] [[Dragon]] Pendulum Monsters.
  ** Both monster have opposite [[Attribute]]s: this card is a [[DARK]] monster, while "Revolution Dragon" is a LIGHT monster.
  ** Both monsters are the ultimate combined evolutions of the [[Four Dimensional Dragons]].
  ** Both monsters were used against, and defeated, [[Declan Akaba]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime and [[Yu-Gi-Oh! ARC-V The Strongest Duelist Yuya!!|spin-off manga]].
  ** This monster has a fixed 4000 original ATK and DEF, while "Revolution Dragon" has a variable ? [[ATK]]/[[DEF]].
  ** This monster [[destroy]]s all cards on the [[field]] with no cost, while "Revolution Dragon" [[shuffle]]s all cards on the field back into the Deck with a hefty cost.
  ** This monster has a highly protective effect, while "Revolution Dragon" cannot prevent its own destruction.
  ** This monster has a low Pendulum Scale, while "Revolution Dragon" has a high Pendulum Scale.
  ** This monster is an [[Extra Deck]] monster, while "Revolution Dragon" is a [[Main Deck]] monster.
  ** This monster focuses on countering Extra Deck monsters and [[add]]ing cards to the [[hand]], while "Revolution Dragon" focuses on supporting them.
  ** This monster was used by Z-ARC, the final antagonist of the anime, and [[Yuya Sakaki]], while "[[Odd-Eyes Revolution Dragon (DY)|Odd-Eyes Revolution Dragon]]" was used only by [[Yuya Sakaki (DY)|Yuya Sakaki]], the protagonist of the manga.
  * This monster has a [[Synchro Pendulum Monster|Synchro Pendulum]] form: "[[Supreme King Z-ARC - Synchro Universe]]".
  * This is the first [[Fusion Pendulum Monster]] to be released.
  ** It is also the first Level 12 Pendulum Monster to be released.
  * This is the first Pendulum Monster to be a [[Nomi]] monster, as well as the first Pendulum Monster that cannot be [[Pendulum Summon]]ed.
  * In the anime, this card was the first hybrid [[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], [[Xyz Monster|Xyz]], and [[Pendulum Monster]].
  ** It was also the first Xyz Monster to have a printed [[Level]] instead of a [[Rank]] in the anime.
  ** It was also the only Fusion, Synchro, or Xyz Pendulum Monster that did not have an effect to place itself in the [[Pendulum Zone]].
  * In the anime, this monster was Summoned by a [[Unity Summon]].
  * This monster is similar to "[[Shooting Quasar Dragon]]".
  ** Both monsters are Level 12 Nomi Extra Deck monsters with 4000 ATK/DEF.
  ** Both monsters were [[Summon]]ed in the anime by a unique type of Summon: Unity Summon for this monster and [[Limit Over Accel Synchro]] for "[[Shooting Quasar Dragon (anime)|Shooting Quasar Dragon]].
  ** In the anime, both had unique [[card type]]s: this monster was a Fusion, Synchro, Xyz, and Pendulum Monster, while "Shooting Quasar Dragon" was a [[Limit Over Accel Synchro Monster]].
  ** In the anime, both monsters were Special Summoned by combining all the [[Dragon]] monsters of a specific [[series]]: the [[Four Dimensional Dragons]] for this card and the [[Signer Dragon]]s for "Shooting Quasar Dragon".
  * This monster is similar to "[[Five-Headed Dragon]]":
  ** Both monsters are Fusion Monsters that require multiple Dragon monsters as [[Fusion Material]]s.
  ** Both monsters have 1000 ATK and DEF for each [[material]].
  ** Both monsters were released in the ''[[OCG]]''/''[[TCG]]'' with their card types changed: "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]" was also a Synchro and Xyz Monster in addition to being a Fusion and Pendulum Monster, while "[[Mythic Dragon (anime)|Five-Headed Dragon]]" was a [[Ritual Monster]].
  ** Both monsters also debuted in the anime with characters acting as part of them: Z-ARC/[[Yuya Sakaki]] for this monster and [[The Big Five]] for "Five-Headed Dragon", to face off against multiple [[Duelist]]s.
  * Due to the effect of "[[En Moon]]", this is the first Level 12 [[Normal Monster]], as well as the first Normal Monster with an original ATK and DEF of over 3000.
