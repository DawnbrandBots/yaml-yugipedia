title: Card Trivia:Volcanic Shell
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Blaze Accelerator]]", "[[Blaze Accelerator Reload]]", "[[Catastrophe Draw]]", "[[Fire Ejection]]", and "[[Volcanic Blaze Accelerator]]".
  * This monster's ''[[OCG]]'' name, "Volcanic Bullet", is based on a [[wikipedia:Bullet|bullet]] while it's appearance and ''[[TCG]]'' name is based on the shell of a [[wikipedia:Cartridge (firearms)|bullet cartridge]], keeping in relation with the firearms design of the "[[Volcanic]]" archetype.
  ** This is further evident with this card's effects being used in conjunction with the "[[Blaze Accelerator (archetype)|Blaze Accelerator]]" archetype, as after this card is sent to the [[Graveyard]] after being shot out of a "Blaze Accelerator" card as ammo, it allows the player to "load" another "shell" by paying 500 [[Life Point]]s.
