title: Card Trivia:Banderillero Fiend
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Power Spirit]]".
  * This monster is based on the [[wikipedia:Banderillero|banderillero]], a type of bullfighter who plants colored flags on a bull's shoulders over the course of a fight. These fighters are judged based on their bravery and skill in getting as close to the bull as possible while planting the flags, and can actually "correct" the bull's charges with this lancing, such that the matador is less likely to be injured, which reflects this monster's effect to "lance away" any potential threat set up by the opponent and protect "[[Matador Archfiend]]" from dangerous "charges" the opponent's monsters could make.
