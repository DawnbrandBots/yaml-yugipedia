title: Card Trivia:Gogogo Golem - Golden Form
wikitext: |-
  {{Navigation}}

  [[File:GogogoGolem-JP-Anime-ZX-NC-Gold.jpg|thumb|right|250|"[[Gogogo Golem (anime)|Gogogo Golem]]" affected by "[[Golden Form]]".]]

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Yuma 2: Gogogo & Dododo]]''.
  * This monster is a [[retrained]] [[counterpart]] of "[[Gogogo Golem]]".
  ** This monster's name, appearance, and [[ATK]]-doubling effect is based on a scene from {{episode|ZEXAL|062|ref}} where "[[Gogogo Golem (anime)|Gogogo Golem]]" is transformed via the effect of "[[Golden Form]]", which doubles its ATK in the process.
  ** This monster's ATK-reduction and protective effect is based on "[[Power Change Barrier]]", a [[Continuous Trap Card]] that was used alongside "Gogogo Golem" while its ATK had been doubled via "Golden Form" in the same episode. Furthermore, its protective effect against an opponent's [[monster effect]]s is based on how "Power Change Barrier" was used against the effect of "[[Number C32: Shark Drake Veiss (anime)|Chaos Number 32: Shark Drake Veiss]]".

