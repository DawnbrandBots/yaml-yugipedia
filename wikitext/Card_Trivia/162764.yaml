title: Card Trivia:Meteor Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Meteorite Fall]]".
  * This monster has two [[retrained]] "[[Red-Eyes]]" [[counterpart]]s.
  ** A [[Gemini monster|Gemini]] counterpart: "[[Meteor Dragon Red-Eyes Impact]]".
  ** An [[Effect Monster|Effect]] counterpart: "[[Red-Eyes Black Meteor Dragon]]".
  ** A ''[[Rush Duel]]'' counterpart: "[[Meteor Drake]]".
  * This monster has a [[Fusion Monster|Fusion]] with "[[Red-Eyes Black Dragon]]": "[[Meteor Black Dragon]]".
  ** The shell on this monster's body can be seen on the skin of "Meteor Black Dragon".
  * This monster has a ''Rush Duel''-exclusive baby counterpart: "[[Meteor Dragon's Chick]]".
