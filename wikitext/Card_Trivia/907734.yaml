title: Card Trivia:Rokket Coder
wikitext: |-
  {{Navigation}}

  * Visually, this monster shares common design features with monsters of the "[[Borrel]]", "[[Code Talker (archetype)|Code Talker]]", and "[[Rokket]]" [[archetype]]s.
  ** The "Borrel" and "Rokket" archetypes are used by [[Varis]] while the "Code Talker" archetype is used by [[Yusaku Fujiki|Playmaker]], referencing how both Duelists formed an alliance to defeat [[Lightning]] and [[Bohman]] in the second season of the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  * This is the first "Rokket" monster that is not a [[Dragon]] monster, being a [[Cyberse]] monster instead.
  * This monster's green linework references Varis's association with green data particles in the ''Yu-Gi-Oh! VRAINS'' anime, which is first seen in {{episode|VRAINS|046|ref}} after Varis logs out of [[LINK VRAINS]] following his defeat against Playmaker, and again in {{episode|VRAINS|098|ref}} when he is absorbed into [[Mirror LINK VRAINS]] following his defeat against Lightning.
