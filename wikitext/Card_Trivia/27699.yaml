title: Card Trivia:Thunder Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Thunder Dragon Fusion]]".
  * In ''[[Yu-Gi-Oh! GX Spirit Caller]]'', this card can be [[discard]]ed even if the player has no more copies in their [[Deck]].
  * "[[Thunder Sea Horse]]" has the same [[Attribute]], [[Type]], and [[ATK]] as this card, as well as a similar name and effect.
  ** Its name is also a pun on ''Tatsu no otoshigo'' (竜の落し子), a Japanese term used for sea horses which literally means "dragon's child".
