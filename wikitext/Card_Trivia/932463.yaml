title: Card Trivia:Mega Star Monarch Estrome
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Advance Impact]]".
  * This monster is the [[Counterpart|upgraded]] Mega Monarch form of "[[Star Monarch Estrome]]".
  ** The artwork of "[[Nativity of the Monarchs]]" depicts "Estrome" transforming into this monster.
  * This monster's helmet design resembles those of the [[wikipedia:Cylons|Cylons]] from the ''[[wikipedia:Battlestar Galactica|Battlestar Galactica]]'' series.
