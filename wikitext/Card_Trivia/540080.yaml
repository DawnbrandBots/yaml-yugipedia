title: Card Trivia:Ojamuscle
wikitext: |-
  {{Navigation}}

  * "[[Ojama Black]]", "[[Ojama Green]]" and "[[Ojama Yellow]]" appear in this card's artwork.
  * This is the only "[[Ojama]]" card without "Ojama" in its ''TCG'' name.
  ** It's for this reason that this card features an [[archetype condition]].
  * On the Italian Card Database, this card's French name and text are listed instead.
