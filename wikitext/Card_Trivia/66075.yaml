title: Card Trivia:Armed Ninja
wikitext: |-
  {{Navigation}}

  * This monster appears in "[[Barrier Ninjitsu Art of Extinguishment]]", "[[Sealing Ceremony of Mokuton]]", and "[[Sealing Ceremony of Suiton]]".
  * This monster features the same symbol on its shoulders as "[[Lady Ninja Yae]]".
  * This monster has two [[counterpart]]s: "[[Crimson Ninja]]" and "[[White Ninja]]".
  ** This card also has a "[[Dragon Ninja]]" counterpart: "[[Blue Dragon Ninja]]". Coincidentally, that monster can be Summoned using this card and "[[Ninjitsu Art of Super-Transformation]]".
  * This card is one of the first five [[Effect Monster]]s to be released in the ''[[OCG]]'', the other four being "[[Hane-Hane]]", "[[Man-Eater Bug]]", "[[Reaper of the Cards]]", and "[[Skelengel]]".
