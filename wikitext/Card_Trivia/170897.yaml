title: Card Trivia:Saambell the Summoner
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Risebell the Summoner]]", "[[Unwavering Bond]]", and "[[Wavering Eyes]]".
  * The Japanese pronunciation of this monster's name (''Sēmuberu'') is likely a portmanteau of "same level" (''Sēmu Reberu''), which is reflected in its effect to [[Special Summon]] a monster with the "same [[Level]]" from the [[hand]].
  * This monster is the younger sister of "Risebell the Summoner", who later becomes "[[Risebell the Star Adjuster]]" and "[[Risebell the Star Psycher]]".
  ** This monster has an older counterpart: "[[Saambell the Star Bonder]]".
  ** They are all [[WIND]] monsters who are depicted with the same [[wikipedia:Haniwa|Haniwa]]-esque totem and sneering jackal creature in their card artworks, and feature Level-related effects.
