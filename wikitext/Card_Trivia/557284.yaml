title: Card Trivia:World Legacy's Memory
wikitext: |-
  {{Navigation}}

  * "[[Lee the World Chalice Fairy]]" (foreground left, in her human form), as well as the past equivalents of "[[Crusadia Arboria]]" (left), "[[Crusadia Reclusia]]" (middle) and "[[Crusadia Leonis]]" (right) appear as scientists in this card's artwork.
  ** The human form of "Lee" appears in the artwork of "[[World Legacy Bestowal]]".
  ** The blueprints for "[[Mekk-Knight of the Morning Star]]" (top left) and "[[World Legacy Key]]" (top right) can also be seen.
