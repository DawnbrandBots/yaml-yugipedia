title: Card Trivia:Cat Meeting
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[A Cat of Ill Omen]]", "[[Catnipped Kitty]]", "[[Dark Cat with White Tail]]", and "[[Rescue Cat]]" appear in this card's artwork.
  * This card is based on the real-life phenomenon of so-called "cat meetings", where cats have been observed to temporarily gather in circular formations in outdoor locations.<ref>{{cite book |last=Leyhausen |first=Paul |date=1979 |title=Cat Behavior: The Predatory and Social Behavior of Domestic and Wild Cats |translator-last1=Tonkin |translator-first1=Barbara A. |publisher=Garland STPM Press |location=New York, New York |isbn=0-8240-7017-8 |page=224 |quote=At nightfall there is often something which I can only describe as a social gathering. Males and females come to a meeting place adjacent to or situated within the fringe of their territories and just sit around… They sit, not far apart—2 to 5 m or even less; some individuals are even in actual contact, sometimes licking and grooming each other… I could observe this particularly well and on many occasions in the Paris population.}}</ref>

