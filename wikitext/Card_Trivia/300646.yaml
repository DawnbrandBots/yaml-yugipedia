title: Card Trivia:Release, Reverse, Burst
wikitext: |-
  {{Navigation}}

  * "[[Baby Tiragon]]", two copies of "[[Dark Magical Circle]]", and the [[Graveyard]] portal from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime appear in this card's artwork.
  * This card's name reflects its effect, as it allows the player to [[Tribute]] (or "release" in the Japanese media) their [[Xyz Monster]] to [[destroy]] the opponent's [[Set]] [[Spell]]/[[Trap Card]]s (or "reverse cards" in the Japanese media), which are depicted "bursting" in explosions.
  * This card's ''[[OCG]]''/''[[TCG]]'' [[cost]] to Tribute a "[[Utopia (archetype)|Utopia]]" monster is an alteration of its effect in the ''Yu-Gi-Oh! ZEXAL'' anime, which requires the player to Tribute an Xyz Monster. In {{episode|ZEXAL|113|ref}}, "[[Number 39: Utopia (anime)|Number 39: Utopia]]" was the monster Tributed to [[activate]] this card's effect.
