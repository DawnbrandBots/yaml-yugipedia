title: Card Trivia:The League of Uniform Nomenclature Strikes
wikitext: |-
  {{Navigation}}

  * Three copies of "[[Mokey Mokey]]" and "[[Ojama Yellow]]" appear in this card's artwork. 
  * This card's name and artwork reference "[[The League of Uniform Nomenclature]]".
  ** Both cards' artworks depict the same number of "Ojama Yellow" in the foreground and "Mokey Mokey" in the background. The background also features a red-and-white stripe pattern originating at a point in the horizon.
  ** Both cards feature an effect that allows the player to place two monsters on the [[field]] with the same name as the [[target]]ed monster from the [[Deck]]; however, this card's effect can [[equip]] that targeted monster with two monsters of the same name from the [[hand]] or [[Graveyard]].
