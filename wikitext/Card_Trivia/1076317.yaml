title: Card Trivia:Dark Matter Flaicheer Freya
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is a portmanteau of the words "flail" or "flair" and "cheer". 
  ** Additionally, this monster's name could also be based on [[wikipedia:Freyr|Freyr]], the brother of the Nordic goddess [[wikipedia:Freyja|Freyja]]. Fittingly, this monster requires "[[Dark Matter Freya]]" as [[Fusion Material]], who is based on the Nordic goddess of love, beauty, and battle.
