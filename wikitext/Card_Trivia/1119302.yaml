title: Card Trivia:Gouki Double Impact
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is named after the Japanese name for the "[[wikipedia:Doomsday device (wrestling)|doomsday device]]" ("Double Impact"), a double-team maneuver in [[wikipedia:Professional wrestling|professional wrestling]] that utilizes the [[wikipedia:Professional wrestling holds#Electric chair|electric chair]] position to set up an opponent for an aerial attack.
