title: Card Trivia:G.B. Hunter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Assault Spirits]]".
  * The "G.B." in this card's name stands for "[[Gladiator Beast]]".
  ** This is supported by this card's effect, which prevents the effects of the "Gladiator Beast" monsters from shuffling themselves into the Deck.
  *** This monster's high DEF also helps compound its effectiveness, since it cannot be easily destroyed by battle.
  ** The initials are used so as not to qualify this card for "Gladiator Beast" support cards.
