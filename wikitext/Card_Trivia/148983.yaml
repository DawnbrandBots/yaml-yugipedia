title: Card Trivia:Daigusto Sphreez
wikitext: |-
  {{Navigation}}

  * This monster is the [[counterpart|upgraded]] [[Synchro Monster|Synchro]] form of "[[Reeze, Whirlwind of Gusto]]".
  ** The artwork of "[[Tailwind of Gusto]]" depicts "Reeze" transforming into this monster, with her hair ribbons being discarded (both of which appear in the background) and gaining stylized armor based on "[[Vylon Sphere]]". 
  *** Fittingly, this monster can be [[Synchro Summon]]ed using both monsters as [[Synchro Material]].
  *** This references the [[Duel Terminal Master Guide card storylines]] where the "[[Gusto]]" [[archetype]] and the "[[Vylon]]" archetype joined forces to fight against their common enemy, the "[[Steelswarm]]" archetype. 
  ** This monster's [[original ATK and DEF]] has the same sum total of 3300 as "Reeze", but with 100 more [[ATK]] and 100 less [[DEF]] than the latter.
  ** This monster's effect is similar to the effect of "Reeze" in terms of "switching" theme: while "Reeze" switches [[control]] of the player's monsters with the opponent, this monster switches [[battle damage]] inflicted between players.
  * Unlike the other "Gusto" Synchro Monsters, this monster is not depicted mounting a giant bird, using stylized armor instead.
