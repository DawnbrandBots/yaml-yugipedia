title: Card Trivia:Scrap Factory
wikitext: |-
  {{Navigation}}

  * The thumbs-up in this card's artwork is a reference to the ending scene of ''[[wikipedia:Terminator 2: Judgment Day|Terminator 2: Judgment Day]]'', where the [[wikipedia:Terminator (character)|Terminator]] gives a thumbs-up as he is lowered into a vat of molten steel.
  * "[[Scrap Archfiend]]" (the arm and the horns in the melting pot), "[[Scrap Goblin]]", "[[Scrap Beast]]" and "[[Scrap Recycler]]" appear in this card's artwork.
