title: Card Trivia:Constellar Zubeneschamali
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Sacred Star Knights!!]]''.
  * This monster is based on [[wikipedia:Beta Librae|Zubeneschamali]], the brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Libra (constellation)|Libra]].
  ** The constellation and the astrological symbol for [[wikipedia:Libra (astrology)|Libra]] (♎︎︎) appears in the background of this card's artwork, with the location of Zubeneschamali denoted by the encircled star in the constellation.
  ** This monster's appearance resembles a symmetrical pair of scales, referencing how Libra is also known as the "scales" constellation.
  *** This monster's claws likely references how the name "Zubeneschamali" is derived from the Arabic name (الزُّبَانَى الشَمَالِي ''al-zubānā al-šamāliyy'') meaning "The Northern Claw".
