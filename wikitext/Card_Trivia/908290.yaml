title: Card Trivia:Odd-Eyes Pendulumgraph Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Dimension Force]]''.
  * This monster is an [[Card evolutions|upgraded]] "[[Pendulumgraph]]" [[Ritual Pendulum Monster|Ritual Pendulum]] form of "[[Odd-Eyes Pendulum Dragon]]".
  ** This monster's armor is based on the altar that appears in the artwork of "[[Odd-Eyes Advent]]".
  ** This monster's arc-shaped blade and staff are similar to those of "[[Timegazer Magician]]" and "[[Stargazer Magician]]", respectively.
  * This is the first Ritual Pendulum Monster.
  ** As it is also a [[Pendulum Monster]], this is the first [[Ritual Monster]] that can be placed in the [[Extra Deck]], although it cannot be properly Summoned from there (unless cards that [[Ignoring the Summoning conditions|ignore]] its [[Summoning condition]], such as "[[Miracle of the Supreme King]]", are used).
  ** This is the only Ritual Monster that can be properly Summoned by a [[Summoning mechanics|mechanic]] other than [[Ritual Summon]].
  * This is the first "Pendulumgraph" monster.
  * The color of the iris of this monster's right eye is unknown so far, as it was not shown even in the commercial of ''Dimension Force''
  ** The only color highlighted in the official commercial was a green light in this monster's left green eye.
