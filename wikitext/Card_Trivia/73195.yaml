title: Card Trivia:Chaos Command Magician
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Magician's Force]]'' [[booster box]] and ''[[Champion of Black Magic]]''.
  * The symbols in the background of this card's artwork are the same that appear in the artwork of various cards that place [[Spell Counter]]s, such as "[[Pitch-Black Power Stone]]".
  ** This monster also has 10 visible Spell Counters on its hat, collar, gloves, and scepter.
