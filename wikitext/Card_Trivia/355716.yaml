title: Card Trivia:Shaddoll Falco
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]''.
  * This monster is the "[[Shaddoll]]" [[counterpart]] of "[[Gusto Falco]]".
  * This card is the first [[Tuner monster]] to also be a [[Flip monster]].
  * This monster appears in the artwork of "[[Ritual Beast Ambush]]".
  * This monster can be assumed to be a puppet copy or revived body of "Gusto Falco", as "Gusto Falco" had died protecting "[[Kamui, Hope of Gusto]]".<ref>http://ygorganization.com/monsterstories/ "However, he lost his life in the Great War while protecting “Kamui”."</ref>

