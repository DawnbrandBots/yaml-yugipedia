title: Card Trivia:Hot Red Dragon Archfiend King Calamity
wikitext: |-
  {{Navigation}}

  * This monster appears in the ''[[OCG]]''/''[[TCG]]'' artwork of "[[Red Supremacy]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Hot Red Dragon Archfiend Bane]]", and the ultimate evolution of "[[Hot Red Dragon Archfiend]]".
  ** This monster is named after a "calamity", an event causing great and often sudden damage or distress.
  ** The names of "Hot Red Dragon Archfiend's" evolutions are spelled in consecutive alphabetic order to symbolize the monster's growth: first, there is "[[Hot Red Dragon Archfiend Abyss|'''A'''byss]]", then "'''B'''ane", and finally this card, "King '''C'''alamity", which further underlines these monsters' status as consecutive evolution steps.
  * This monster is the [[Duel Dragon]] [[counterpart]] of "[[Red Nova Dragon]]".
  ** They, along with "[[Tyrant Red Dragon Archfiend]]", are the only monsters in the ''[[Yu-Gi-Oh! 5D's]]'' anime and [[Yu-Gi-Oh! 5D's (manga)|manga]] to be Summoned through [[Double Tuning]].
  * This monster's posture and symbolism appear to be a tribute to the series of ''[[wikipedia:The Great Red Dragon Paintings|Red Dragon]]'' paintings by [[wikipedia:William Blake|William Blake]]. This one is very similar to the motif of ''The Great Red Dragon and the Beast From the Sea''.
  * This monster has the highest [[Level]] (12) and [[original ATK]] (4000) of all "[[Archfiend]]" monsters.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! 5D's - Ride SP2|ref}}, specifically from the panel showing [[Red Dragon King Red Dragon Calamity|this monster]] being Summoned.
