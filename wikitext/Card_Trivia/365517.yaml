title: Card Trivia:Noble Knight Bedwyr
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Noble Knights of the Round Table Box Set]]''.
  * This knight is based on [[wikipedia:Bedivere|Bedivere]], the [[wikipedia:Round Table|Knight of the Round Table]] who returns [[wikipedia:Excalibur|Excalibur]] to the [[wikipedia:Lady of the Lake|Lady of the Lake]], as portrayed in the artwork of "[[Last Chapter of the Noble Knights]]".
  ** This card's effect to send a "[[Noble Arms]]" Equip Spell Card from the Deck to the Graveyard is likely representative of the above incident.
  * "[[Noble Arms - Excaliburn]]" appears in this card's artwork.
  * This knight appears in the artwork of "Last Chapter of the Noble Knights".
