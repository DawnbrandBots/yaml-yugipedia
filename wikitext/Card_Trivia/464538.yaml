title: Card Trivia:Darklord Ixchel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Darklord Enchantment]]".
  * This monster's Japanese name is based on [[wikipedia:Ixtab|Ixtab]], the Mayan goddess of [[wikipedia:suicide|suicide]] who accompanies such suicides to heaven.
  ** This monster's ''[[TCG]]'' name is based on [[wikipedia:Ixchel|Ixchel]], the 16th-century name of the aged [[wikipedia:jaguar|jaguar]] Mayan goddess of midwifery and medicine.
