title: Card Trivia:Gadarla, the Mystery Dust Kaiju
wikitext: |-
  {{Navigation}}

  * This card's name and design reference [[wikipedia:Mothra|Mothra]], [//wikizilla.org/wiki/Battra Battra], and/or [//wikizilla.org/wiki/Megaguirus Megaguirus] from the ''[[wikipedia:Godzilla (franchise)|Godzilla]]'' franchise.
  * An image of this monster appears in the artwork of "[[The Kaiju Files]]".
  * The tower from the artwork of "[[Kyoutou Waterfront]]" also appears in this card's artwork (in the bottom-left corner).
