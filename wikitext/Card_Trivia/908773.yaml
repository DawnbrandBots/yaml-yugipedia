title: Card Trivia:Baby Spider
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to increase the [[Level]]s of all "[[Baby Spider]]s" by the [[Tribute]]d monster's Level is based on the effect of "[[Arachno-Cannibalism]]", which was used to Tribute one "Baby Spider" to increase the other "Baby Spiders'" Levels equal to the Tributed monster's Level in {{chapter|ZEXAL|044|ref}}.
  * This card's artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, specifically from the panel showing [[Baby Spider (manga)|this monster]] being Summoned, albeit reversed.
