title: Card Trivia:Ultra Polymerization
wikitext: |-
  {{Navigation}}

  * This card's artwork features the swirly background from "[[Polymerization]]", along with an energy orb with the two [[Fusion Material]] monsters posed in orbits similar to the anime's depiction of [[Xyz Material]]s, and the green rings that represents the ''[[Yu-Gi-Oh! ARC-V]]'' anime's depiction of [[Synchro Summon]]ing.
  ** This references this card's anime effect, which allows the user to Synchro Summon or [[Xyz Summon]] using the [[Special Summon]]ed Materials by either changing both monsters' [[Level]]s to 4 or treating one of them as a [[Tuner monster]].
  * This card's Japanese name (''Chōetsu Yūgō'') is a pun on the Japanese name of "[[Super Polymerization]]"(''Chō Yūgō''). Fittingly, this card was used by [[Yuri]], who uses the evolutionary chain of "Polymerization" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** Their evolutionary chain features the fact that each member holds an advantage over the others.
  *** "Polymerization" can use monsters from the controller's [[hand]] and [[field]].
  *** "Super Polymerization" can use an opponent's monster from their field.
  *** This card can use monsters from the controller's field, then returns those monsters to the field.
  * Despite the fact this card was used with "[[Starving Venom Fusion Dragon (anime)|Starving Venom Fusion Dragon]]" in the ''Yu-Gi-Oh! ARC-V'' anime, it's not possible to use this card's second effect with it in the ''[[OCG]]''/''[[TCG]]''. This is due to the fact that, in the anime, "Starving Venom" doesn't require its Materials to be on the [[field]], while its ''OCG''/''TCG'' counterpart does.
