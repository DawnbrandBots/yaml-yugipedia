title: Card Trivia:Volcanic Scattershot
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fire Recovery]]" and "[[Tri-Blaze Accelerator]]".
  * This monster's Japanese name, "Volcanic Buckshot", is based on a [[wikipedia:Shotgun shell|buckshot]], a type of cylindrical cartridge loaded with tiny spherical projectile pellets capable of scattering after being shot.
  ** This card's ''[[TCG]]'' name and effects further allude to this; after this card is sent to the [[Graveyard]] for the effect of a "[[Blaze Accelerator (archetype)|Blaze Accelerator]]" card, it can "scatter" two other copies of itself to destroy all monsters the opponent controls.
