title: Card Trivia:Gorgon of Zilofthonia
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "Zilofthonía" (ζηλοφθονία), the Greek word for "jealousy" or "envy".
  ** This monster is also named after the [[wikipedia:Gorgon|Gorgon]], a feminine half-human, half-snake creature from [[wikipedia:Greek mythology|Greek mythology]] known for having sharp fangs and venomous snakes for hair.
  *** This monster's effect to prevent monsters it points to from attacking, as well as [[negate|negating]] their [[activate]]d effects, references the Gorgon's power to turn people who look upon it to stone with their gaze.
  * This monster's design features elements reminiscent of the "[[Orcust]]" [[archetype]]. This, along with this monster's long blue hair and the resemblance between the shoulder piece and the face of "[[Knightmare Incarnation Idlee]]", suggests that this monster may be one of the forms of "[[Lee the World Chalice Fairy]]".
  ** With that in mind, this monster's effect may also be referencing the effect of "[[World Legacy's Secret]]", as that card depicts "Lee the World Chalice Fairy".
