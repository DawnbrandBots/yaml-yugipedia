title: Card Trivia:Stand-Off
wikitext: |-
  {{Navigation}}

  * "[[Shadow of the Six Samurai - Shien]]", "[[Great Shogun Shien]]" (with his back turned), "[[Hand of the Six Samurai]]", "[[Grandmaster of the Six Samurai]]", and "[[Enishi, Shien's Chancellor]]" appear in this card's artwork.
  ** The aftermath of the events in this card's artwork is shown in the artwork of "[[Face-Off]]".
  * This artwork implies that "Great Shogun Shien" may have been responsible in some way for the death of "[[Legendary Six Samurai - Shinai]]". This is supported by the following:
  ** "Shinai" is confirmed as dead, according to [[Master Guide 3 card storylines#Legendary Six Samurai - Shinai|Master Guide 3 card storylines]].
  ** "Hand of the Samurai", also known as "[[Legendary Six Samurai - Mizuho]]", was married to "Shinai" (as confirmed by the ''Master Guide 3'' card storylines).
  ** "Shadow of the Six Samurai - Shien" wears a necklace identical to that of "Shinai". This implies there is a relationship between him and "Shinai".
  *** Taken with this card's artwork, it appears that "Shadow" and "Mizuho", along with "Enishi" and "Grandmaster", are conspiring to bring about "Shogun Shien's" end. "Shadow" is confronting "Shien", but they are evenly matched. Meanwhile, "Mizuho" seems prepared to break the draw.
