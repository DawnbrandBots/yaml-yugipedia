title: Card Trivia:Lamia
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Lamia|Lamia]], a creature depicted as half-woman and half-serpent in [[wikipedia:Greek mythology|Greek mythology]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are specifically designed to support "[[Evil Dragon Ananta]]", which is based on the fact that both monsters were used by [[Seika Kohinata]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  ** This monster's first ''OCG''/''TCG'' effect to [[add]] a [[Level 8]] [[Reptile]] from the [[Deck]] to the [[hand]] references how in {{chapter|GX|21|ref}}, Seika Summoned [[Lamia (manga)|this monster]] immediately before [[Special Summon]]ing "[[Ananta the Snake Dragon]]", a Level 8 Reptile monster.
  ** This monster's second ''OCG''/''TCG'' effect [[activate]]s when it is [[banish]]ed, referencing how in the same chapter, this monster was one of the Reptile monsters banished to Special Summon "Ananta the Snake Dragon".
