title: Card Trivia:Elfnote Power Patron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Theorealize Liberation]]".
  * This monster is based on the [[wikipedia:Peafowl|peacock]], the sacred animal of the goddess [[wikipedia:Juno (mythology)|Juno]] in Roman mythology, which reflects this monster's relation to "[[Junora the Power Patron of Tuning]]".
  * This monster has multiple "[[Power Patron]]" counterparts from other [[archetype]]s.
  ** "[[Artmage]]": "[[Artmage Power Patron]]".
  ** "[[DoomZ]]": "[[Power Patron DoomZ]]".
