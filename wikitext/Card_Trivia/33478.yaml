title: Card Trivia:Athena
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Athena|Athena]], the Greek goddess of wisdom who is often depicted wearing a war helmet and wielding the [[wikipedia:Aegis|aegis]].

  * This monster's appearence seems to be heavily based on Saori Kido who is the reincarnation of the Goddess Athena in the anime and manga series [[wikipedia:Saint Seiya|Saint Seiya]].

  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|023|ref}}, specifically from the panel showing [[Athena (manga)|this monster]] being Summoned.
