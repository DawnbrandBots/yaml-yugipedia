title: Card Trivia:Cyber Eltanin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cyber Network]]".
  * This monster is named after "Eltanin", the proper name of [[wikipedia:Gamma Draconis|Gamma Draconis]], the brightest star in the constellation of [[wikipedia:Draco (constellation)|Draco]].
  ** The name of the star is derived from ''At-Tinnin'' (التنين), the Arabic name of the constellation meaning "the dragon", whereas the Arabic name of the star itself is ''Ra's al-Tinnīn'' (رأس التنين), meaning "the dragon's head", similar to how this monster's design consists primarily of mechanical dragon heads.
  * This monster can be seen as a [[LIGHT]] [[counterpart]] of "[[Chimeratech Overdragon]]" or "[[Chimeratech Fortress Dragon]]".
  * This is the [[signature card]] of [[Zane Truesdale (manga)|Zane Truesdale]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|039|ref}}, specifically from the panel showing [[Cyber Eltanin (manga)|this monster]] being Summoned.
