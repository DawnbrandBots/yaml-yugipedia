title: Card Trivia:Splitter Slime
wikitext: |-
  {{Navigation}}

  * "Splitter" in this card's name is a portmanteau of the words "split" and "''ritter''", the German word for "knight".
  * At the time this card was released, its effect was only capable of [[Special Summon]]ing two monsters, both of them [[Legend Card]]s: "[[Abyss Soldier (Rush Duel)|Abyss Soldier]]" (which debuted alongside this card in ''[[Deck Mod Pack: Requiem of Destruction!!]]'') and "[[Pitch-Black Warwolf (Rush Duel)|Pitch-Black Warwolf]]".
  ** Shortly afterward, ''[[Strongest Battle Deck 2022 +1 Bonus Card]]'' introduced another three monsters compatible with this effect, all of them Legend Cards: "[[Twin-Barrel Dragon (Rush Duel)|Twin-Barrel Dragon]]", "[[Mirage Dragon (Rush Duel)|Mirage Dragon]]", and "[[Flame Ruler (Rush Duel)|Flame Ruler]]".
