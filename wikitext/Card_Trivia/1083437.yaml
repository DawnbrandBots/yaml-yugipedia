title: Card Trivia:Galactic Enforcer
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Hands Attractor]]".
  * This monster's Japanese name, "Giant Bulge" (ジャイアント・バルジ ''Jaianto Baruji''), is based on a [[wikipedia:Galactic bulge|galactic bulge]], a tightly-packed star cluster at the center of a spiral galaxy, such that the galaxy appears to have a "bulge" at the center of its disc of stars.
  * This monster has a retrained [[Chaos (Rush Duel series)|Chaos]] [[Effect Monster|Effect]] [[counterpart]]: "[[Galactic Chaos Enforcer]]".
