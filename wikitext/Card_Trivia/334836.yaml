title: Card Trivia:Monster Rebone
wikitext: |-
  {{Navigation}}

  * "[[Skull Dog Marron]]" and "[[Skull Servant]]" appear in this card artwork.
  * This card's Japanese name, "Snatched Reborn" (よこどりボーン ''Yokodori Bōn'') is a portmanteau of the Japanese word for "snatched" (よこどり ''Yokodori'') and "reborn" (りボーン ''Ribōn'').
  ** The above-mentioned naming scheme serves as a visual pun of this card's artwork, which depicts "Skulls Dog Marron" "snatching" the [[wikipedia:Tibia|leg bone]] from "Skull Servant".
  ** This card's ''[[TCG]]'' name is based on the naming scheme of "[[Monster Reborn]]", with the word "bone" replacing the word "born", reflecting this card's artwork depicting skeletal monsters and [[Special Summon]]ing effect.
