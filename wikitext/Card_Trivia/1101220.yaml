title: Card Trivia:Sword Ryzeal
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Thode Raizeol", is based on a [[wikipedia:Cathode|cathode]], the positively charged electrode of an electrical device that supplies current&mdash;its name is also a play on "cathode" (カソード, ''kasōdo'') and "sword" (ソード, ''sōdo''), which this monster is depicted wielding.
  ** This monster's red color scheme matches the red plastic cap indicating the cathode of a car battery.
