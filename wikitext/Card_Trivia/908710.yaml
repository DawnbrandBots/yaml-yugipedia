title: Card Trivia:Dreaming Nemleria
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dreaming Reality of Nemleria, Realized]]" and "[[Sweet Dreams, Nemleria]]".
  * This card's 1500 [[DEF]] is a reference to the 15 card maximum of the [[Extra Deck]], which the "[[Nemleria]]" [[archetype]] can support in general.
