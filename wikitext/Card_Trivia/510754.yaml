title: Card Trivia:Old Vindictive Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magical Explosion]]".
  * Three visible [[Spell Counter]]s appears in this card's artwork.
  * This card shares the same [[Level]], [[ATK]] and [[DEF]] as "[[Man-Eater Bug]]"; however, this card's monster-destroying [[Flip effect]] can only destroy an opponent's monster.
  ** The ''[[Magician's Force]]'' version of this card had its effect misprinted, causing it to read the same as "Man-Eater Bug".
