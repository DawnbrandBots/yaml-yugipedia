title: Card Trivia:Ancient Gear Fist
wikitext: |-
  {{Navigation}}

  * This card is based on the [https://tvtropes.org/pmwiki/pmwiki.php/Main/RocketPunch "rocket punch" trope] commonly used in [[wikipedia:Mecha|mecha]] manga and anime, where a giant human-shaped robot fires a rocket-powered fist at its opponent.
  ** Fittingly, in {{episode|GX|092|ref}}, this card was [[equip]]ped onto "[[Ancient Gear Golem (anime)|Ancient Gear Golem]]", a monster that resembles a giant human-shaped robot.
