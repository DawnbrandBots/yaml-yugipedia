title: Card Trivia:Sangen Summoning
wikitext: |-
  {{Navigation}}

  * This location appears in the artwork of "[[Sangen Furo]]".
  * This card's Japanese name, ({{Ruby|盃|さかずき}}{{Ruby|満|み}}ちる{{Ruby|燦|さん}}{{Ruby|幻|げん}}{{Ruby|荘|そう}}, ''Sakazuki Michiru Sangensō'') is a pun on "''jansō''" ({{Ruby|雀|ジャン}}{{Ruby|荘|そう}}), the Japanese term for a "mahjong parlor", a place where people pay to play [[wikipedia:Mahjong|mahjong]] at their tables.
  ** This card's Japanese name uses the characters for "''sakazuki''" ({{Ruby|盃|さかずき}}) and "''mi''" ({{Ruby|満|み}}), which can be alternately read using the ''on'yomi'' readings ''hai'' ({{Ruby|盃|はい}}) and ''man'' ({{Ruby|満|まん}}); combined, they reference the word ''baiman'' ({{Ruby|倍|ばい}}{{Ruby|満|まん}}), a [[wikipedia:Japanese mahjong scoring rules#Mangan|term]] for scoring an 8-10 ''han'' hand in [[wikipedia:Japanese mahjong|Japanese mahjong]].
