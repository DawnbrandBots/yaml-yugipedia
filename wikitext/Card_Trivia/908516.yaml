title: Card Trivia:White Knight of Dogmatika
wikitext: |-
  {{Navigation}}

  * "White Knight of Dogmatika" → "[[Despian Quaeritis]]" → "[[Granguignol the Dusk Dragon]]"
  ** This monster is a half-corrupted form of the armor of "[[Dogmatika Fleurdelis, the Knighted]]".
  ** "Despian Quaeritis" is this armor after having been fully corrupted by the power of the "Hole".
  * This card is a counterpart of "[[White Relic of Dogmatika]]".
  ** Both are [[LIGHT]] [[Spellcaster]] [[Ritual Monster]]s with 500 [[ATK]] and 2500 [[DEF]].
  ** Both have an [[effect]] to [[send]] monsters from the opponent's [[Extra Deck]] to the [[Graveyard]].
  ** Both list the name of a "[[Dogmatika]]" [[Ritual Spell Card]] in their text: "[[Dogmatikalamity]]" for this card and "[[Dogmatikamacabre]]" for "White Relic of Dogmatika".
  ** Along with their Ritual Spells, they have the kanji 「{{Ruby|凶|きょう}}{{Ruby|導|どう}}」 (''Kyōdō'' "Heretical") in their Japanese names, unlike the rest of the "Dogmatika" monsters, which use 「{{Ruby|教|きょう}}{{Ruby|導|どう}}」 (''Kyōdō'' "Dogmatic") instead, in reference to the real [[Despia|wicked nature]] of the "Dogmatika" Church.
  ** Both are based on the original paladins of the "Dogmatika Nation": "[[Dogmatika Fleurdelis, the Knighted]]" for this monster, while "White Relic" is the successor of "[[Dogmatika Ecclesia, the Virtuous]]".
  ** Both have a "Hole" pattern.
