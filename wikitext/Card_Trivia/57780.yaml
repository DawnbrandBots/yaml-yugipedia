title: Card Trivia:Fabled Valkyrus
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duel Terminal - Demon Roar God Revival!!]]''.
  * This monster appears in the artwork of "[[Speed Spell - Deceased Synchron]]".
  * This monster bears a resemblance to "[[Fabled Leviathan]]".
  * The small creature in this card's background (Wrath) also appears in the artwork of "[[The Fabled Rubyruda]]".
  * This monster has a "[[Nekroz]]" version: "[[Nekroz of Valkyrus]]".
