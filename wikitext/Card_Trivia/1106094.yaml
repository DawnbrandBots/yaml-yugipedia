title: Card Trivia:Diabellze the White Witch
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded "[[White Forest]]" form of "[[Diabellze the Original Sinkeeper]]".
  * This monster has an opposing [[counterpart]]: "[[Diabellstar Vengeance]]".
  ** Both share the same [[original ATK and DEF]] (2500/2100).
  ** Both have opposite [[Attributes]] ([[LIGHT]] and [[DARK]]).
  ** Both have mirrored poses.
  ** Both are upgraded archetypal forms of an original pair of counterparts: "[[Diabellze the Original Sinkeeper]]" and "[[Diabellstar the Black Witch]]".
  *** Their Japanese names follow the same naming scheme as their opposite counterpart's original form:
  **** "Diabellze the White Witch" and "Diabellstar the Black Witch"
  **** "Diabellstar the Sin Adjudicator‎" and "Diabellze the Original Sinner"
