title: Card Trivia:Amorphage Goliath
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Amorphous Persona]]", and forms the bottom half of "[[Amorphactor Pain, the Imagination Dracoverlord]]".
  * Its Japanese name, ''Irritum'', is a Latin term for "nothingness", "worthlessness", or "vanity".
  * Its International name is a reference to [[wikipedia:Goliath|Goliath]].
