title: Card Trivia:Archnemeses Eschatos
wikitext: |-
  {{Navigation}}

  * Eschatos (ἔσχατος) is the [[wikipedia:Greek language|Greek]] word for "last".
  ** This card's name could be a reference to [[wikipedia:Eschatology|eschatology]], a part of theology discussing the ultimate destiny of mankind.
  * This monster appears in the artwork of "[[Nemeses Adrastea]]".
