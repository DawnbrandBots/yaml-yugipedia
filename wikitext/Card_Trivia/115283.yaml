title: Card Trivia:Lightning Warrior
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Limited Edition 17]]''.
  * This monster appears in the artworks of "[[Final Cross]]", "[[Flash Tune]]" and "[[Synchro Alliance]]".
  * This is the first [[Synchro Monster]] to be [[Summon]]ed in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * During the [[One-Shot Run]] against the [[Priests of Light|Priest of Light]] in the ''Yu-Gi-Oh! 5D's'' manga, this card is known as "Liu Akwek" and has a more natural appearance.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|001|ref}}, specifically from the panel showing [[Lightning Warrior (manga)|this monster]] being Summoned.
