title: Card Trivia:Token Stampede
wikitext: |-
  {{Navigation}}

  * All four "[[Sheep Token]]s" appear in this card's artwork.
  ** Also, the "Sheep Tokens" are in approximately the same spot as they were on the artwork of "[[Scapegoat]]".
  * This card's Japanese name is a pun; "闘君" (roughly "battle lords") is pronounced the same way as "Token" in Japanese ("Tōkun").
