  * Although this card's effect is never shown in either of its two appearances, its status as a Union monster are only known since it was summoned by the effect of "[[Ojama Ride]]" in [[Yu-Gi-Oh! GX - Episode 082|Yu-Gi-Oh! GX episode 82]].
