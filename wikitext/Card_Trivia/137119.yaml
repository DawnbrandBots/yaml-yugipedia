title: Card Trivia:Scrum Force
wikitext: |-
  {{Navigation}}

  * "[[Beaver Warrior]]", "[[Jerry Beans Man]]", "[[Oscillo Hero]]", and "[[Thunder Kid]]" appear in this card's artwork.
  ** This card's artwork is a reference to how the [[Deck]]s used by [[Team Taiyo]] consisted mainly of [[Normal Monster]]s in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This card's name and artwork is based on a "[[wikipedia:Scrum (rugby)|scrummage]]", an ordered team formation of players used to restart play in the sport of [[wikipedia:Rugby football|rugby football]], in which the team's forwards form up with their heads down and their arms interlocked, and push forward against a similar group from the opposing side.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to redirect the effect that would destroy this card to another card in the player's [[Spell & Trap Zone]] references a scene in {{episode|5D's|120|ref}}, where [[Jinbei Tanigawa]] used "[[Fake Trap (anime)|Fake Trap]]" to prevent this card from being destroyed by the destruction effect of "[[Speed World 2]]" [[activate]]d by [[Jack Atlas]].
