title: Card Trivia:Hecahands Bait
wikitext: |-
  {{Navigation}}

  * "[[Hecahands Ibtel]]", "[[Hecahands Yadel]]", and the eye of "[[Hecahands Jauzah]]" appear in this card's artwork.

  * This card's name is derived from ''Bayt al-Jauzā’'' ("House of the Central One"), an Arabic name of the star [[wikipedia:Betelgeuse|Betelgeuse]].
