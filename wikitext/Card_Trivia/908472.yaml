title: Card Trivia:Kurikara Divincarnate
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Mega Pack 07]]''.
  * This monster is based on Kurikara, which in [[wikipedia:Buddhist mythology|Buddhist mythology]] is a form of the god [[wikipedia:Acala|Acala]], with the appearance of a fire dragon coiled around an upright sword.
