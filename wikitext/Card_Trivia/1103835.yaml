title: Card Trivia:Ame no Murakumo no Mitsurugi
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2025]]''.
  * An illustration of this monster appears in the artwork of "[[Mitsurugi Mirror]]" and "[[Mitsurugi Ritual]]".
  * This monster is named after the ''[[wikipedia:Kusanagi no Tsurugi|Kusanagi no Tsurugi]]'', originally known as the ''"Ame-no-Murakumo-no-Tsurugi"'', a legendary Japanese sword and one of three [[wikipedia:Imperial Regalia of Japan|Imperial Regalia of Japan]].
  ** This monster's design is based on the eight-headed dragon/serpent [[wikipedia:Yamata no Orochi|Yamata no Orochi]], who was killed by the god [[wikipedia:Susanoo-no-Mikoto|Susanoo]], after which the ''Kusanagi'' is found embedded on its tail and taken by Susanoo.
  * This monster and "[[Futsu no Mitama no Mitsurugi]]" are the first [[Reptile]] [[Ritual Monster]]s.
  * This monster's [[original ATK and DEF]] (3200/800) is twice that of "[[Mitsurugi no Mikoto, Kusanagi]]"; also, they share the same color scheme and the sword "Kusanagi" holds appears in the background of this card's artwork.
