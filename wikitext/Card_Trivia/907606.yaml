title: Card Trivia:Therion "Duke" Yul
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Therion Charge]]".
  ** This monster's wrecked remains appears in the artwork of "[[Blink Out]]".
  * This monster is based on [[wikipedia:HD 73534 b|Drukyul]], an [[wikipedia:Exoplanet|extrasolar planet]] in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Cancer (constellation)|Cancer]].
  ** This monster's design features crab-like claws and four walking legs, referencing how Cancer is also known as the "crab" constellation.
  ** This is the only "[[Therion]]" monster to be named after a planet instead of a star.
