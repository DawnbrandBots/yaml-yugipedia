title: Card Trivia:Doodle Beast - Stego
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the box of ''[[Battles of Legend: Crystal Revenge]]''.
  * This monster is based on the ''[[wikipedia:Stegosaurus|Stegosaurus]]'', a species of large and quadrupedal herbivorous dinosaur from the [[wikipedia:Late Jurassic|Late Jurassic]] period.
  * The Simplified Chinese name was likely mistakenly altered by replacing Chinese characters with pinyin. Its ''[[Master Duel]]'' name is rendered properly as "涂鸦兽－剑龙".<ref>[https://nga.178.com/read.php?tid=38962705&rand=132]</ref>

