  * "[[Ritual Beast Tamer Zeframpilica]]", "[[Ritual Beast Tamer Zefrawendi]]", "[[Shaddoll Zefracore]]", "[[Shaddoll Zefranaga]]", "[[Satellarknight Zefrathuban]]", "[[Stellarknight Zefraxciton]]", "[[Zefraniu, Secret of the Yang Zing]]", "[[Zefrasaber, Swordmaster of the Nekroz]]", "[[Zefraxa, Flame Beast of the Nekroz]]" and "[[Zefraxi, Treasure of the Yang Zing]]" appear in this card's artwork. Incidentally, rather than being redrawn for this card, all of them use their stock art instead.
