title: Card Trivia:Kayenn, the Master Magma Blacksmith
wikitext: |-
  {{Navigation}}

  * The sword in the background of this card's artwork is similar to the one used by "[[Prominence, Molten Swordsman]]".
  * This card's name, "Kaen", is Japanese for "flame".
  * This card's name is also a homophone of cayenne, a spicy hot pepper.
