title: Card Trivia:Geargiauger
wikitext: |-
  {{Navigation}}

  * "[[Geargiano Mk-III]]" appears in this card's artwork.
  * The number ''05'' is displayed on the hull of the drill, referencing how this card is the '''5th''' released Level 4 "[[Geargia]]" monster.
  * This card's Japanese name, "Geargiangler", is a portmanteau of "Geargia" and ''angura'' (アングラ), a ''wasei-eigo'' contraction of "underground" (アンダーグラウンド ''andāguraundo'').
  ** This card's ''[[TCG]]'' name is a  portmanteau of "Geargia" and "[[wikipedia:Wood auger|auger]]", a type of drill used to drill into wood and other materials.
