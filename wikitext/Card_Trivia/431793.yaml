title: Card Trivia:Odd-Eyes Gravity Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[EARTH]] [[Ritual Monster|Ritual]] form of "[[Odd-Eyes Dragon]]".
  ** Fittingly, this monster has a gray color scheme, which is associated with the EARTH [[Attribute]].
  * This is the first "[[Odd-Eyes]]" Ritual Monster.
  * This monster has an opposite [[counterpart]]: "[[Odd-Eyes Vortex Dragon]]".
  ** This monster is an EARTH Ritual Monster, while "Vortex Dragon" is a [[WIND]] [[Fusion Monster]].
  ** This monster has its right eye surrounded by a furry spike, while "Vortex Dragon" has its left eye surrounded by a metallic coat.
  ** Both monsters have mirrored poses in their card artworks.
  ** Both have anti-[[Spell]]/[[Trap Card]] effects. This monster [[return]]s the opponent's Spells/Traps on the [[field]] to their [[hand]] upon its [[Special Summon]] for no cost, while "Vortex Dragon" can [[negate]] a Spell/Trap effect upon [[activate|activation]] and [[destroy]] it by [[shuffle|shuffling]] a [[face-up]] [[Pendulum Monster]] from the [[Extra Deck]] to the [[Deck]].
  *** In addition, both affect different types of cards upon being Summoned. This monster returns Spells/Traps on the opponent's field to the hand, while "Vortex Dragon" switches an opponent's monster from [[Attack Position]] to face-up [[Defense Position]].
