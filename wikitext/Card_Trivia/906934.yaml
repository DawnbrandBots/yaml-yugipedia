title: Card Trivia:Joker's Wild
wikitext: |-
  {{Navigation}}

  * "[[Joker's Knight]]" appears in this card's artwork.
  ** This card's name and effect to change into a [[Spell Card]] listing the [[Three Musketeers of Face Cards]] reference how the [[wikipedia:Joker (playing card)|Joker]] is often used as a [[wikipedia:Wild card|wild card]], which is used to represent any other playing card.
