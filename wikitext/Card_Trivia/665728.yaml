title: Card Trivia:Charged-Up Heraldry
wikitext: |-
  {{Navigation}}

  * "[[Heraldic Beast Leo]]", "[[Heraldic Beast Twin-Headed Eagle]]", and [[Vetrix]]'s [[crest]] appear in this card's artwork.
  * This card's name is based on a [[wikipedia:Charge (heraldry)|charge]], an emblem or device occupying the shield in [[Wikipedia:Heraldry|heraldry]].
  * This card's effect to restrict the player from [[Special Summon]]ing non-[[Psychic]] or [[Machine]] monsters from the [[Extra Deck]] is based on how in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, the [[Vetrix Family]] (founded by Vetrix, the user of the "[[Heraldic Beast]]" and "[[Heraldry]]" [[archetype]]s) primarily used Psychic and Machine [[Xyz Monster]]s.
