  * "[[Armed Samurai - Ben Kei]]" appears in this card's artwork.
  ** Fittingly, "[[Armed Samurai - Ben Kei (anime)|Armed Samurai - Ben Kei]]" was the monster [[equip]]ped with this card in {{episode|GX|086|ref}}.
  * This card is based on a [[wikipedia:Halberd|halberd]], a polearm consisting of an axe blade topped with a spike mounted on a long shaft.
