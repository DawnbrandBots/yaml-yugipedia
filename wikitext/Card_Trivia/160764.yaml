title: Card Trivia:Legendary Six Samurai - Shi En
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Six Strike - Triple Impact]]".
  ** This monster's armor appears in the artwork of "[[Shien's Scheme]]".
  ** "[[Amazement Administrator Arlekino]]" cosplays as this monster in the artwork of "[[Amaze Attraction Majestic Merry-Go-Round]]".
  * This monster has an upgraded counterpart: "[[Legendary Lord Six Samurai - Shi En]]".
  * This monster is the same as "[[Great Shogun Shien]]" and "[[Tenkabito Shien]]", as supported by the [[Master Guide 3 card storylines#Legendary Six Samurai - Shi En|''Master Guide 3'' card storylines]]; however, this monster's [[Attribute]] is [[DARK]] while the Attributes of the two aforementioned monsters are [[FIRE]].
  * The English name "Shi En" instead of "Shien" is explained by the fact that this monster's Japanese name, "Shien" is written as "シエン", while the Japanese name for the "[[Shien]]" [[archetype]] is written as "{{Ruby|紫|シ}}{{Ruby|炎|エン}}".
  * This is the only "[[Six Samurai]]" monster to have been [[Limited]], and later [[Semi-Limited]].
