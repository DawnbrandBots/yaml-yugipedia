title: Card Trivia:Voltic Bicorn
wikitext: |-
  {{Navigation}}

  * This is the second of the three [[Unicorn]] monsters ("[[Thunder Unicorn]]" > '''"Voltic Bicorn"''' < "[[Lightning Tricorn]]").
  ** This monster features one horn and 300 [[ATK]] more than "Thunder Unicorn", and one horn and 300 ATK less than "Lightning Tricorn".
  * This monster features 2500 ATK, and its effect can [[send]] seven cards from the top of the [[Deck]] to the [[Graveyard]] when [[destroy]]ed. This reflects its owner, [[Breo]], who uses what was initially thought to be a [[Beatdown]] strategy until it is revealed that Breo's true strategy is focused around [[mill]]ing the opponent's Deck until they run out of cards, thus causing them to lose the [[Duel]] via [[Deck out]].
