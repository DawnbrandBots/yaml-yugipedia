title: Card Trivia:Master Peace, the True Dracoslaying King
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Draco Awakening]]", "[[True Draco Heritage]]", and "[[True Draco Apocalypse]]".
  * This monster is probably "[[Master Peace, the True Dracoslayer]]" that is fused with (or given the power by) "[[Mariamne, the True Dracophoenix]]".
  ** The shield of this monster has a similar shape with the crown of "Mariamne". It also has a pair of white wings that is similar to the wings of "Mariamne".
