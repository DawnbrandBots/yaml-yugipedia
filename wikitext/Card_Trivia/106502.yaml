title: Card Trivia:Future Visions
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts seven visible images, with one depicting a Japanese graveyard; the other six depict different "elemental" environments representing six of the main [[Monster Card]] [[Attribute]]s.
  ** These "elemental" environments, from nearest to farthest, depict a glowing rainbow ([[LIGHT]]), rocky mountains ([[EARTH]]), an erupting volcano ([[FIRE]]), an underwater coral reef ([[WATER]]), a plain field with gusting clouds ([[WIND]]), and a black hole ([[DARK]]).
