title: Card Trivia:Crystron Thystvern
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Amethyst|amethyst]], a variation of quartz.
  ** This card's English name is a portmanteau of the words "amethyst" and "wyvern".
  * This monster appears in the artwork of "[[Crystolic Potential]]".
  * "[[Crystron Ametrix]]" is the [[Counterpart|Synchro counterpart]] to this monster after merging to "[[Crystron Citree]]".
