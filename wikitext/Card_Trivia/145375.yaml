title: Card Trivia:Master and Servant's Resolve
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a man about to perform [[wikipedia:Seppuku|seppuku]], a form of Japanese ritualistic suicide by stabbing themselves with a smaller blade.
  * The Japanese pronunciation of this card's name, ''Shujū no Kakugo'', serves as the title of the original Japanese version of {{episode|5D's|093|ref}}, in which this card debuted.
