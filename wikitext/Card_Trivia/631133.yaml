title: Card Trivia:Exploderokket Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name and design are based on [[wikipedia:Exploding ammunition|exploding ammunition]], a type of ammunition that is sabotaged and designed to explode and destroy the firearm and severely (or possibly kill) the person attempting to use the firearm, which reflects this monster's effect to inflict 2000 damage to each player.
