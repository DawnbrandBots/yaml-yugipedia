title: Card Trivia:Flying "C"
wikitext: |-
  {{Navigation}}

  * This card's [[Level]], [[ATK]] and [[DEF]] are equal to the sum of the Levels, ATK and DEF of "[[Maxx "C"]]" and "[[Shiny Black "C"]]".
  * Like the other "[["C"]]" monsters, this monster is based on the [[wikipedia:Smokybrown cockroach|smokybrown cockroach]], a common pest in Japan. It is known to be an adept flyer, which is the basis for its effect - it "flies" onto the opponent's [[field]] in response to them [[Summon]]ing a monster.
