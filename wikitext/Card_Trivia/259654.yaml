title: Card Trivia:Soul Drain Dragon
wikitext: |-
  {{Navigation}}

  * This monster is tied with "[[Blue-Eyes Chaos MAX Dragon]]" and "[[Liberator Eto]]" for having the highest [[original ATK]] (4000) of all [[Main Deck]] [[Level 8]] monsters.
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Special Summon]]ing restriction is based on a scene from {{episode|ZEXAL|105|ref}} where it was Special Summoned by the effect of "[[Number 46: Dragluon (anime)|Number 46: Dragluon]]".
  * This is the first card to use the word "deficit" in the English printing to describe the difference between player's [[Life Point]] totals.
