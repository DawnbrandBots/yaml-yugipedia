title: Card Trivia:Synchro Drive
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Celestial Wolf Lord, Blue Sirius]]" appears in this card's artwork.
  * This card's Japanese name, "Synchro Libido", is based on the term describing the driving force behind other needs, with this card's effect to prevent a [[Synchro Monster]] from being [[destroy]]ed and halving any [[battle damage]] representing that monster's drive to remain on the [[field]].
