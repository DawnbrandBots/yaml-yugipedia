title: Card Trivia:King's Consonance
wikitext: |-
  {{Navigation}}

  * A [[Duel Priest]] and "[[Dark Highlander]]" appear in this card's artwork.
  ** Said priest is possibly an ancestor of [[Jack Atlas (manga)|Jack Atlas]], who also used "Dark Highlander" in the [[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]] manga.
  *** This is further supported by the artwork of "[[Champion's Pulse]]", which depicts the same Duel Priest using a power similar to the [[Blazing Soul]] used by Jack's [[Jack Atlas|anime incarnation]].
  * This card can be seen as a [[counterpart]] to "[[King's Synchro]]".
  ** Both are [[Trap Card]]s that can [[negate]] attacks and Synchro Summon monsters by [[banish]]ing the [[Synchro Material]]s from the [[Graveyard]].
  ** Both were used by a different version of Jack Atlas: this card was used by his manga incarnation, and "King's Synchro" was used by his ''[[Yu-Gi-Oh! ARC-V]]'' [[Jack Atlas (ARC-V)|incarnation]].
  ** Both cards' artworks depict a lookalike of a predecessor of Jack Atlas: This card's artwork depicts the possible ancestor of Jack in the manga, while the artwork of "King's Synchro" depicts a character resembling [[Seto Kaiba]], who preceded Jack in the anime.
