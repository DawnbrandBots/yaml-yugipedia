title: Card Trivia:Gatling Dragon
wikitext: |-
  {{Navigation}}

  * The card is named after the [[wikipedia:Gatling gun|Gatling gun]], designed and created by American inventor [[wikipedia:Richard Jordan Gatling|Richard J. Gatling]].
  ** This is reflected in this monster's appearance and [[Fusion Material]]s, as the Gatling gun is a rapid-firing firearm that consists of multiple barrels; also, its [[ATK]] is the same as "[[Barrel Dragon]]" and its [[DEF]] is the same as "[[Blowback Dragon]]".
