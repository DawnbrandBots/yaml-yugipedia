title: Card Trivia:Last Counter
wikitext: |-
  {{Navigation}}

  * This card's name reflects how it is the "last" [[Counter Trap Card]] used by [[Alito]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * The art of this card references the "last counter" punch thrown in the box match between Rikishi Toru and Joe Yabuki in the ''[[wikipedia:Ashita no Joe|Ashita no Joe]]'' Anime/Manga.
