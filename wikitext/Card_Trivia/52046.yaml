title: Card Trivia:Elemental HERO Magma Neos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Double Hero Attack]]".
  * This monster is a [[Triple Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Flare Scarab]]" and "[[Neo-Spacian Grand Mole]]".
  ** This monster's [[Fusion Material]]s reference the elements that make up magma: igneous rocks (represented by the [[EARTH]] [[Attribute]] "Grand Mole"), molten by intense geothermal heat (represented by the [[FIRE]] Attribute "Flare Scarab").
  ** This monster's [[ATK]]-gaining effect is an upgraded version of the effects of "[[Elemental HERO Flare Neos]]" and "[[Elemental HERO Grand Neos]]", both of which use "Flare Scarab" and "Grand Mole" as Fusion Material, respectively.
  * This is the first Triple Contact Fusion "[[Neos]]" monster.
  ** It is also the only Triple Contact Fusion "Neos" monster that was used in more than one Duel of the ''[[Yu-Gi-Oh! GX]]'' anime.
