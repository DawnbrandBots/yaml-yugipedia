title: Card Trivia:Master of Ham
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on "hamster".
  ** This monster is also based on "[[Master of Oz]]", as it shares the same [[Attribute]] ([[EARTH]]) and [[Type]] ([[Beast]]), and its [[original ATK and DEF]] (2100/1850) are half those of "Master of Oz" (4200/3700).
  *** This monster's clothes resemble those of [[Jim Crocodile Cook]], matching the Australian theme of "Master of Oz" ("Oz" is a common nickname for [[wikipedia:Australia|Australia]]), and the scar across this monster's right eye is based on Jim's [[Eye of Orichalcum]].
  * This monster's name, effects, and [[Fusion Material]]s may be based on "[[Bubonic Vermin]]" (whose Japanese name is "Death Hamster") and "[[Super-Nimble Mega Hamster]]", which are both hamster-themed [[Flip monster]]s that can Summon monsters from the Deck in [[face-down]] [[Defense Position]].
  * This monster has a [[Synchro monster|Synchro]] counterpart, "[[THE Star Ham]]". Both are based on hamsters, with pun-filled names centered around the word "ham", and they share the [[Beast]] [[Type]].
  ** Both have effects that lets the player [[Special Summon]] a monster when they are Summoned: "THE Star Ham" Summons a [[Synchro material]] from the [[Graveyard]] and treats it as a [[Tuner monster]], while this monster Summons a [[Flip monster]] from the [[hand]] or [[Deck]].
  ** Both have effects that allow them to Special Summon themselves from the Graveyard that require a two-card [[cost]]: "THE Star Ham" by [[discard]]ing two cards from the hand, and this monster by [[banish]]ing two Flip monsters from the [[field]] or Graveyard. In both cases, if they are Special Summoned this way, they are banished when they leave the field.
