title: Card Trivia:Meika Etraynzeyes the Shadow Flower Lunatic
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded [[Fusion Monster|Fusion]] counterpart of "[[Etraynze the Shadow Flower Ninja]]".
  ** This monster's name is a play on "Ranze Eyes", a delusional state named by [[Rayne Nanahoshi]] in the original Japanese version of the ''[[Yu-Gi-Oh! SEVENS]]'' anime where she hallucinates her targets of romantic affection as exaggerated beautiful versions of themselves.
  *** This monster's effect to make the opponent's monsters lose 730,000 [[ATK]]/[[DEF]] is based on how Rayne wrote a total of "seventy-three" observational journals of the targets of her romantic affections.

