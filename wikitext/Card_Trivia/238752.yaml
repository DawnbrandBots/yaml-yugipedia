title: Card Trivia:Heraldic Beast Basilisk
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Heraldry Reborn]]".
  * This monster is based on the [[wikipedia:Basilisk|basilisk]], a monster in [[wikipedia:European mythology|European mythology]] who is depicted as a hybrid of a serpent and a [[wikipedia:Chicken|cockerel]].
  ** This monster's appearance is similar to that of a [[wikipedia:Cockatrice|cockatrice]], a mythical beast that is depicted as a two-legged draconian creature with the head of a rooster. The basilisk and the cockatrice were considered similar based on their appearance and their ability to kill or petrify their victims with their gaze, which reflects this monster's [[destroy|destruction]] effect.
