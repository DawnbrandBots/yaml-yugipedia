title: Card Trivia:Metalzoa X
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Metalzoa]]", and an upgraded form of "[[Zoa the Fiendish Beast]]".
  ** This monster's name is based on the Japanese [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Metalzoa (anime)|Metalzoa]]" in the ''[[Yu-Gi-Oh! GX]]'' anime: "Metal X Scissors".
