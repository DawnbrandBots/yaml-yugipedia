title: Card Trivia:Celeb Brace - Death Wise
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card, along with "[[Celeb Blade - Death Wild]]", "[[Celeb Blouse - Death One Shoulder]]", and "[[Celeb Robe - Death Wind]]", contains a pun on "desu wa" (ですわ) in their names, which is a suffix that's typically used at the end of sentences by snobbish and high-class women, reflecting [[Yuna Goha]]'s character.
