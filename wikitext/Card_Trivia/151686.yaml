title: Card Trivia:Mimir of the Nordic Ascendant
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Mímir|Mímir]] (Old Norse "The rememberer, the wise one") or Mim is a figure in Norse mythology renowned for his knowledge and wisdom who is beheaded during the [[wikipedia:Æsir-Vanir War|Æsir-Vanir War]].
  * Mímir is also the owner of [[wikipedia:Mímisbrunnr|Mímir's Well]] that waters the tree Yggdrasil, into which [[Odin, Father of the Aesir|Odin]] cast his [[Eye of Odin|eye]] to gain wisdom of the future.
