title: Card Trivia:Samsara D Lotus
wikitext: |-
  {{Navigation}}

  * This monster is a [[Card evolutions|retrained]] [[Fiend]] counterpart of "[[Samsara Lotus]]".
  ** The D in this monster's name is a reference to the Japanese name of "[[Regenerating Rose]]",  "Split Demon Rose" (スプリット・{{Ruby|Ｄ|デモン}}・ローズ).
  *** Both monsters are used by [[Yubel (character)|Yubel]] in the ''[[Yu-Gi-Oh! GX]]'' anime, which they would use to facilitate the use of their [[Yubel (anime)|Monster Card forms]] ("Regenerating Rose's" "[[Regenerating Rose Token]]s" to act as [[Tribute Summon]] fodder for "[[Yubel]]", and "Samsara Lotus'" effect to [[Special Summon]] itself from the [[Graveyard]] during the [[End Phase]] in order to be [[Tribute]]d for "Yubel's" [[maintenance cost]]-like effect).
  ** This monster features the [[Devil Arm]], referencing how "Samsara Lotus" was used by Yubel in the ''Yu-Gi-Oh! GX'' anime.
