title: Card Trivia:Harpy Queens
wikitext: |-
  {{Navigation}}

  * Visually, these monsters appear to be "[[Harpy Lady (manga)|Harpy Lady]]" affected by "[[Cyber Bondage (manga)|Cyber Bondage]]" and an unknown card, possibly "[[List of unseen cards#"Blonde Wave"|Blonde Wave]]", then multiplied by "[[Kaleidoscope (manga)|Kaleidoscope]]" (adding also "[[Harpy Lady Sisters (manga)|Harpy Lady Sisters]]").
  * Like "[[Harpy Lady Sisters (manga)|Harpy Lady Sisters]]", these monsters' attack in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga was "[[Attack and effect names in Yu-Gi-Oh!|Triangle Ecstasy Spark]]".
  * This card has a similar name to "[[Harpie Queen]]", despite not being related to it.
