title: Card Trivia:Raidraptor - Rising Rebellion Falcon
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a combination of "[[Odd-Eyes Rebellion Dragon]]" and "[[Raidraptor - Ultimate Falcon]]", while also having some visual features in common with "[[Raidraptor - Rise Falcon]]".
  ** This monster's [[Destroy|destructive]] and [[Effect damage|damaging]] effect is similar to the effect of "Odd-Eyes Rebellion Dragon", while it shares the same [[Unaffected|immunity]] to card effects as "Ultimate Falcon".
  * This is the first ''[[OCG]]''/''[[TCG]]''-original monster to have a [[Level]] or [[Rank]] higher than 12.
  * This monster has the highest [[Rank]] (13) and [[original ATK and DEF]] (4000/3500) of all [[Winged Beast]] monsters.
  ** This monster is tied with "[[Number iC1000: Numerounius Numerounia]]" for the highest printed [[Xyz Material]] requirement of all Xyz Monsters, at 5 Level 13 monsters each, and has the highest [[Requires Type specific Xyz Materials|Type-specific]] printed material requirement, requiring said materials to be [[Winged Beast]].
