title: Card Trivia:Infinite Impermanence
wikitext: |-
  {{Navigation}}

  * "[[Cyber Dragon Infinity]]" appears in this card's artwork.
  * This card's Japanese name is a homophone of the idiom 「夢幻泡影」 (''mugenhōyō'', lit. "dreams, mirages, bubbles, shadows") taken from the [[wikipedia:Diamond Sutra|Diamond Sutra]], which means that everything that exists is as short-lived as those four things.
  ** Fittingly, in ''[[Yu-Gi-Oh! Duel Links]]'' and ''[[Yu-Gi-Oh! Master Duel]]'', this card's effect to [[negate]] [[Spell]]/[[Trap]] effects in the same column is represented by bubbles emerging from the affected zones when the card resolves. This is likely a reference to how the word "Impermanence" is written in Japanese as a compound of "bubbles" and "shadows", metaphorically signifying something as impermanent as those two.
