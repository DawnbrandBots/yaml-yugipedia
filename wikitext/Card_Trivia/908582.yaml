title: Card Trivia:Sour Scheduling - Red Vinegar Vamoose
wikitext: |-
  {{Navigation}}

  * The shipyard from "[[Gunkan Sushipyard Seaside Supper Spot]]" appears in this card's artwork.
  ** The red vinegar being shipped in this card's artwork is likely the "EDO-FRONT red vinegar" mentioned in the text of "[[Gunkan Suship Shari]]", used to make "[[Gunkan Suship Shari Red]]".
  * The bottle of red vinegar from this card's artwork appears in the artwork of "[[Gunkan Suship Catch-of-the-Day]]".
  ** The label reads 「赤酢」 (''akazu''), meaning "red vinegar".
  * This card's Japanese name 「赤酢の踏切」 is a play on 「開かずの踏切」 (''Akazu no Fumikiri'', lit. "unopening railroad crossing"), with the first word 「開かず」 (''Akazu'', lit. "unopening") swapped out for the homophonous 「赤酢」 (''akazu'', lit. "red vinegar").
  ** 「[[wikipedia:ja:開かずの踏切|開かずの踏切]]」(''Akazu no Fumikiri'', lit. "unopening railroad crossing") refers to a railroad crossing that has trains passing so often that it is rarely able to be crossed by cars or pedestrians. Japan's [[wikipedia:Ministry of Land, Infrastructure, Transport and Tourism|Ministry of Land, Infrastructure, Transport and Tourism]] defines an "unopening railroad crossing" as any crossing which cannot be crossed by cars or pedestrians for more than 40 minutes per hour during [[wikipedia:rush hour|rush hour]].
