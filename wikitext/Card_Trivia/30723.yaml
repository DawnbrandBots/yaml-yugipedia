title: Card Trivia:Solidroid α
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is one of three "Solidroid" [[Fusion Monster]]s that are based on the ''Getter Robo'' robots from [[wikipedia:Getter Robo|the titular anime and manga]], whose [[Fusion Material]]s are made up of a combination of three jet aircraft fighters and features different effects.
  ** In the English publication of the ''[[Yu-Gi-Oh! GX]]'' manga, one of this monster's Fusion Materials, "[[Turboroid]]", is mislabeled as "[[Truckroid]]".
