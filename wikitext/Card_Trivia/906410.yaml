title: Card Trivia:Traptrix Arachnocampa
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Traptantalizing Tune]]".
  * This monster is named after ''[[wikipedia:Arachnocampa|Arachnocampa]]'' (Japanese: {{Ruby|光|ヒカリ}}{{Ruby|茸|キノコ}}{{Ruby|蝿|バエ}} ''Hikari<u>kino</u>kobae''), a genus of fungus gnats with a bioluminescent larval stage that dwell in caves and grottos throughout Oceania. They use snares of made of silk threads around their nest, to trap prey.
