title: Card Trivia:Bickuribox
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Soul Absorption]]" and "[[Toy Parade]]".
  * This monster has a [[retrained]] counterpart: "[[Evil Box]]".
  * This monster's design is based on a [[wikipedia:jack-in-the-box|jack-in-the-box]], a toy with a jester figure that pops out as a "surprise" after turning its crank enough times.
  ** This monster's ''[[TCG]]'' name translates to "Surprise Box," with the "Bickuri" in its name derived from the Japanese word "''bikkuri''" (meaning "surprise").
  * This is one of four monsters used by [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]] that is treated as a [[Toon monster]] in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', the others including "[[Dark Rabbit (DOR)|Dark Rabbit]]", "[[Parrot Dragon (DOR)|Parrot Dragon]]", and "[[Toon Alligator (DOR)|Toon Alligator]]".
  ** Additionally, in ''Duelist of the Roses'', this monster's [[Type]] is [[List of Comic monsters|Comic]], allowing it to gain a power bonus from the [[Toon (terrain)|Toon terrain]].
  * This monster, "[[Barox]]", "[[Flame Swordsman]]", "[[Giltia the D. Knight]]", "[[Karbonala Warrior]]", "[[Labyrinth Tank]]", and "[[Zombie Warrior]]" are the only [[Normal Monster]]s whose [[Monster Card|Monster]] [[card type]]s were changed to [[Fusion Monster]] upon their release in the ''[[OCG]]''/''TCG''.
  ** Notably, these are all monsters Summoned in the [[Duelist Kingdom (manga arc)|Duelist Kingdom arc]] in the ''Yu-Gi-Oh!'' manga and anime.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|109|ref}}, specifically from the panel showing [[Bickuribox (manga)|this monster]] being Summoned, albeit with minor changes in detailing.
