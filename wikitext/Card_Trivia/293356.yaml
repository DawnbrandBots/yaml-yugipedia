title: 'Card Trivia:Number C1: Numeron Chaos Gate Sunya'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Collection Pack 2020]]''.
  * This monster's name is based on "''śūnya''", the Sanskrit word for the number "zero".
  * This monster is the [[Ranked-Up]] "[[Number C]]" form of "[[Number 1: Numeron Gate Ekam]]".
  ** This is also the first [[Rank 2]] "Number C" monster.
  ** This is also the first "Number C" monster that can perform a Rank-Up through its own effect.
