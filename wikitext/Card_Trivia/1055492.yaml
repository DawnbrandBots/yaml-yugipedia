title: Card Trivia:Mementotlan Shleepy
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Memento]]" [[counterpart]] of "[[Mystical Sheep 2|Mystical Sheep #2]]".
  ** This monster's name is a portmanteau of "sheep" and "Sleepy", the Japanese name of "Mystical Sheep #2".
  ** However, this monster is visually more similar to "[[Mystical Sheep 1|Mystical Sheep #1]]", which is reflected by both monsters' [[Fusion Summon]]-related effects.
