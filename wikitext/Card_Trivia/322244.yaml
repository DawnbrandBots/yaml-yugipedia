title: Card Trivia:Spiritual Beast Pettlephin
wikitext: |-
  {{Navigation}}

  * This card's name is derived from ペッ ''pet'' (the [[wikipedia:Ainu language|Ainu]] word for "river") and "dolphin".
  * "[[Ritual Beast Ulti-Pettlephin]]" is the [[Fusion Monster|Fusion]] between this monster and "[[Ritual Beast Tamer Wen]]".
  * This monster is based on [[wikipedia:Amazon river dolphin|Amazon river dolphin]].
