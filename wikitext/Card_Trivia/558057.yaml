title: Card Trivia:Revendread Executor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vendread Nightmare]]" and "[[Vendread Daybreak]]".
  * According to the [[Master Duel card storylines]], this monster is "[[Revendread Slayer]]" after absorbing the power of "[[Vendread Battlelord]]".
  * This is one of the [[cover card]]s for ''[[Extra Pack 2018]]''.
