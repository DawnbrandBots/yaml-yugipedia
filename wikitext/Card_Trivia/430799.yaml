  * "[[Flower Cardian Clover with Boar]]", "[[Flower Cardian Maple with Deer]]", "[[Flower Cardian Paulownia]]", "[[Flower Cardian Peony with Butterfly]]", "[[Flower Cardian Pine with Crane]]", "[[Flower Cardian Willow]]", "[[Flower Cardian Willow with Calligrapher]]", "[[Flower Cardian Zebra Grass with Moon]]", two "[[Flower Cardian Pine]]s", and two "[[Flower Cardian Zebra Grass]]es" appear in this card's artwork.
