title: Card Trivia:Argostars - Lightning Tydeu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Argostars - Giantslaying]]".
  * This monster is named after [[wikipedia:Tydeus|Tydeus]], one of the [[wikipedia:Seven against Thebes|Seven against Thebes]].
  ** The kanji ''shiden'' (紫電, lit. "violet lightning") in this monster's Japanese name is named after the [[wikipedia:Kawanishi N1K|Kawanishi N1K ''Shiden'']] fighter aircraft.
