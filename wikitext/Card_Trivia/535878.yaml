title: Card Trivia:Musician King
wikitext: |-
  {{Navigation}}

  * This card is based on Heavy Metal musicians, since they have an appearance of wearing bandana in their heads, not wearing T-shirts at all and have spiked hair.
  * Their [[Fusion Material]]s, "[[Witch of the Black Forest]]" and "[[Lady of Faith]]", are references to Heavy Metal iconic bands, "[[wikipedia:Black Sabbath|Black Sabbath]]" and "[[wikipedia:Judas Priest|Judas Priest]]": "Witch of the Black Forest" includes '''"Black"''' in it's name, while "Lady of Faith"'s name in the [[OCG]] is '''"High Priestess"'''.
  ** In addition, "Black Sabbath"'s first self-titled album depictes in its cover a witch-like woman in a forest.
  ** Following this trend, "Judas Priest" has an album titled '''"Defenders of the Faith"'''.
  ** This monster's guitar is based on a modified [[wikipedia:Gibson Flying V|Gibson Flying V]] guitar. That model of guitars were used by the guitarists K. K. Downing and Richie Faulkner, known to have been members of "Judas Priest".
  ** "Lady of Faith"'s [[TCG]] name can also be a reference to an alternative metal band, "[[wikipedia:Faith No More|Faith No More]]". Mike Bordin, "Faith No More"'s drummer, also played briefly for "Black Sabbath" and was part of the band of Ozzy Osbourne, "Black Sabbath"'s lead singer, during the latest solo career.
  * This monster has an [[anime-only|anime-exclusive]] [[Metalmorph (archetype)|Metal counterpart]]: "[[Heavy Metal King]]".
  ** This is another addition to the references of "Black Sabbath" and "Judas Priest", since those bands (mainly "Black Sabbath") are considered pioneers of the Heavy Metal genre.
  * Despite its Fusion Materials being female monsters, this monster is male and is not similar to either of them.
