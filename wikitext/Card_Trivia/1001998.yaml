title: Card Trivia:Magician's Sense
wikitext: |-
  {{Navigation}}

  * "[[Dark Magician (Rush Duel)|Dark Magician]]" and the knives of "[[Thousand Knives (Rush Duel)|Thousand Knives]]" appears in this card's artwork.
  ** This card's artwork also depicts "Dark Magician" preparing to attack with the "Thousand Knives” and the dark energy blast depicted in "[[Dark Magic Attack (Rush Duel)|Dark Magic Attack]]" and/or "[[Dark Resonance Burst]]".
