title: Card Trivia:Sacred Noble Knight of King Custennin
wikitext: |-
  {{Navigation}}

  * This card and "[[Noble Knight Custennin]]" are based off of "[https://en.wikipedia.org/wiki/Constantine_(Briton) King Constantine]". According to the pseudo-historical text "[https://en.wikipedia.org/wiki/Historia_Regum_Britanniae Historia Regum Britanniae]", he was the successor to "[https://en.wikipedia.org/wiki/King_Arthur King Arthur]".
  ** "Custennin" is Old English for "[https://en.wikipedia.org/wiki/Constantine_(name) Constantine]".
  ** This card's ''[[OCG]]'' name is a reference to the figure ''Custennin Corneu'' (Constantine of Cornwall).
  * The "[https://en.wikipedia.org/wiki/Holy_Grail Holy Grail]" can be seen in this card's artwork.
