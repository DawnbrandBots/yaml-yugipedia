title: Card Trivia:Cards for Black Feathers
wikitext: |-
  {{Navigation}}

  * This card is a watered down version of "[[Allure of Darkness]]".  While both allow to draw two cards, this forces you to remove a "Blackwing" Monster, instead of any DARK-Attribute Monster, plus it forbids Special Summons in that turn, which is quite a huge hindrance with a "Blackwing" Deck.
  * This is the "[[Blackwing]]s" version of "[[Trade-In]]" and "[[Destiny Draw]]" with summoning draw back.
  * This card, "[[Cards of Consonance]]", "[[Cards from the Sky]]" and the anime-only "[[Card from a Different Dimension]]" all share a similar effect (drawing 2 cards), while also sharing "Cards of/Cards from/for" on their English card names and "Treasure" (宝札) on their Japanese card names.
  * This card's restriction just like "[[Pot of Duality]]".
