title: Card Trivia:Harpie Lady Sisters (R)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Triple Build Pack: Godbreath Wing]]''.
  * This monster's appearance in [[Maximum Mode]] (together with "[[Harpie Lady Sisters (Rush Duel)|Harpie Lady Sisters]]" and "[[Harpie Lady Sisters (L)|Harpie Lady Sisters [L]]]") are based on the appearance of "[[Harpy Lady Sisters (manga)|Harpy Lady Sisters]]" in {{chapter|Yu-Gi-Oh!|117|ref}}.
  * This monster's Maximum Mode effect, allowing "[[Harpie Lady Sisters (Rush Duel)|Harpie Lady Sisters]]" to attack three times, references the effect of "[[Elegant Egotist]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which transformed "[[Harpie Lady]]" into the "[[Harpie Lady Sisters]]", who counted as three separate "Harpie Lady Sisters".
