title: Card Trivia:Verre Magic - Lacrima of Light
wikitext: |-
  {{Navigation}}

  *  "[[Invoked Cocytus]]" and "[[Rilliona, the Magistus of Verre]]" appear in this card's artwork.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Magistus|2|ref}}, specifically from the panel of [[Cocytus (manga)|Cocytus]] being attacked by [[Rilliona]] and [[Endymion (character)|Endymion]]. Appropriately, this card is named after the Rilliona's offensive spell.
