title: Card Trivia:The Weather Painter Moonbow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Weather Forecast]]".
  * This monster's Japanese name, "Arciel" (アルシエル ''Arushieru''), is based on ''L'Arc-en-Ciel'', the French word for "The Rainbow".
  ** Fittingly, this card's artwork depicts seven different color tubes associated with the colors of the rainbow.
  ** This monster is also named after the [[wikipedia:Moonbow|moonbow]], a rainbow produced by lunar light rather than direct sunlight.
  * The color tubes used by this monster represents seven [[Main Deck]] "[[The Weather]]" monsters, although only six are currently known.
  ** Red: None
  ** Orange: "[[The Weather Painter Sun]]"
  ** Yellow: "[[The Weather Painter Thunder]]"
  ** Green: "[[The Weather Painter Aurora]]"
  ** Blue: "[[The Weather Painter Snow]]"
  ** Indigo: "[[The Weather Painter Rain]]"
  ** Violet: "[[The Weather Painter Cloud]]"
  * This monster is a [[DARK]] [[counterpart]] of "[[The Weather Painter Rainbow]]".
