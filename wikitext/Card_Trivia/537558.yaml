title: Card Trivia:Reinforcement of the Army
wikitext: |-
  {{Navigation}}

  * "[[Marauding Captain]]" appears in this card's artwork.
  ** The knights in this card's artwork also appear in the artwork of "[[Reinforcement of the Army's Troops]]".
  ** "[[Sky Striker Ace - Raye]]" (wielding the railgun of "[[Sky Striker Ace - Hayate]]") and "[[Sky Striker Ace - Roze]]" (wearing parts of "[[Sky Striker Ace - Kagari]]") appear in this card's alternate artwork.
  * This card's artwork, Japanese name and theme are reminiscent of "[[Reinforcements]]".
  ** This card's ''[[TCG]]'' name is "Reinforcement of the Army", while its Japanese name is "Reinforcement"; also, the ''TCG'' card "[[Reinforcements]]" features the Japanese name of "Reinforcement of the Army".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Reinforcement of the Army]]".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', both of this card's artworks have special animations when this card is activated: "Marauding Captain" and his army (first artwork) or "Raye" and "Roze" (third artwork) charge onscreen before the chosen monster is added to the player's hand.
