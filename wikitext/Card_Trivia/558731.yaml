title: Card Trivia:Chaos Emperor, the Dragon of Armageddon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the ''[[Premium Pack Vol.14 2nd Wave]]'' pack, as well as one of the cover cards of the box of said pack, ''[[Battles of Legend: Armageddon]]'', and ''[[Battles of Legend: Chapter 1]]''.
  * This card is a [[Card evolutions|retrained]] version of "[[Chaos Emperor Dragon - Envoy of the End]]".
  * The crystal on this monster's chest has blue and red colors, which are the colors of the [[Pendulum Scale]] symbols.
