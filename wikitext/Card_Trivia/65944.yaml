title: Card Trivia:Miracle Rupture
wikitext: |-
  {{Navigation}}

  * "[[Giant Soldier of Stone]]" appears in this card's artwork.
  * The Japanese pronunciation of this card's name (奇跡の穿孔 ''Kiseki no Senkō'') features the word "''seki''", the Japanese homophonic word for "stone", reflecting this card's artwork featuring "Giant Soldier of Stone" (岩石の巨兵 ''Ganseki no Kyohei'') and [[Rock]] monster [[support]] effect.
  ** The Japanese pronunciation of this card's name also features the word "''senkou''", the Japanese homophonic word for "flash", reflecting the flash of light in this card's artwork.
