title: Card Trivia:Dwarf Star Dragon Planeter
wikitext: |-
  {{Navigation}}

  * This card seems to carry the same chest emblem as "[[Darkflare Dragon]]" and "[[Lightpulsar Dragon]]".
  * This card is named after the [[wikipedia:Dwarf star|dwarf stars]].
  ** In particular, "Planetar" refers to the initial name of [[wikipedia:Brown dwarf|Brown dwarfs]], objects half-way between gas planets and stars.
