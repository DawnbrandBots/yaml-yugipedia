title: Card Trivia:Susurrus of the Sinful Spoils
wikitext: |-
  {{Navigation}}

  * "[[Astellar of the White Forest]]" and "[[Elzette of the White Forest]]" appear in this card's artwork.
  * "Susurrus" is the Latin word for "whisper", which serves as the origin of the word "susurration", the sound of rustling, murmuring, or whispering.
