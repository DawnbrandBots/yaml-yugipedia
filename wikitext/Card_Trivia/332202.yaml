title: Card Trivia:Speedroid Ohajikid
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: High-Speed Riders]]''/''[[High-Speed Riders]]''.
  * This monster's name is a portmanteau of "''[[wikipedia:Ohajiki|ohajiki]]''" (おはじき, ''ohajiki'') and "kid" (キッド, ''kiddo'').
  ** ''Ohajiki'' is a traditional Japanese children's game consisting of small coin-shaped pieces where the player must flick their pieces into other players' pieces, similar to what this monster is depicted doing.
  ** This monster's Western-styled design references [[wikipedia:Billy the Kid|Billy the Kid]], an American outlaw and gunfighter of the [[wikipedia:Old West|Old West]].
