title: Card Trivia:Voidvelg Stork
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:H-II Transfer Vehicle|H-II Transfer Vehicle (HTV)]], an expendable Japanese automated cargo spacecraft designed for International Space Station resupply missions that is also known as the "white stork" in Japanese, which reflects this monster's appearance of the [[wikipedia:Oriental stork|stork bird]].
  ** This monster's effect to treat its name as "[[Contact Darkmatter Explorer]]" is a reference to its inspiration from this Japanese spacecraft. 
  ** This monster's effect to treat its name as  "[[Voidvelg Requiem]]" is a reference to [[wikipedia:Jeremiah 8|Jeremiah 8:7]], which is known as the "stork verse" in the [[wikipedia:Bible|Bible]], whereas the various [[Voidvelg]] monsters' names and designs draw inspiration from the Christian religion.
  * This monster has an [[Card evolutions|upgraded]] [[Contact Fusion]] form: "[[Voidvelg Beyond Probe]]".
