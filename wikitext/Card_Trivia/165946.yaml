title: Card Trivia:Big Jaws
wikitext: |-
  {{Navigation}}

  * This card looks a lot like one of the sharks from "[[Submersible Carrier Aero Shark]]", indicating that perhaps 2 "Big Jaws" were combined with "[[Aqua Jet]]" to form the monster.
  * This card's ''[[TCG]]''/''[[OCG]]'' effects may represent the behavior of a [[wikipedia:Great white shark|Great White Shark]], which is what this monster is meant to resemble. Often times, great whites (as well as other species of [[wikipedia:shark|sharks]]) will bite objects out of curiosity (this card attacking) and swim away never to return, ([[banish]]ed at the end of the [[Battle Phase]] in which it attacked), unless predating.
  * Similar to how [[Yuma Tsukumo|Yuma]]'s "[[Zubaba Knight]]" broke the trend of the first monster Summoned by the series main protagonist being [[WIND]] ("[[Winged Dragon, Guardian of the Fortress 1]]", "[[Elemental HERO Avian]]" and "[[Speed Warrior]]"), this card breaks the trend of the first monster Summoned by their opponent being [[EARTH]] ("[[Hitotsu-Me Giant]]", "[[Ancient Gear Golem]]" and "[[Assault Dog]]").
  * This monster has a retrained counterpart: "[[Surfacing Big Jaws]]".
