title: Card Trivia:X-Saber Pellina
wikitext: |-
  {{Navigation}}

  * This monster is likely named after [[wikipedia:King Pellinore|Pellinore]], one of the [[wikipedia:Knights of the Round Table|Knights of the Round Table]].
  * This monster's first effect may be based on the effect of "[[Rescue Cat]]", which was heavily used in the "[[X-Saber]]" Deck and was also used alongside "[[X-Saber Airbellum]]" in the [[Synchro Cat]] Deck. Both this monster and "Rescue Cat" are based on felines and feature effects that can [[send]] themselves to the [[Graveyard]] and [[Special Summon]] two specific monsters from the player's [[Deck]] at the cost of them being [[destroy]]ed during the [[End Phase]].
