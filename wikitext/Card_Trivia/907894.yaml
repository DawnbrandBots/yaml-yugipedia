title: Card Trivia:Expendable Dai
wikitext: |-
  {{Navigation}}

  * "[[Warrior Dai Grepher]]" and "[[Despair from the Dark]]" appear in this card's artwork.
  ** This card's artwork references the artwork of "[[The A. Forces]]", as supported by the presence of the same red-haired youth and the same huge warrior (with [[Card Trivia:The A. Forces|the latter appearing in several card artworks]]).
  ** This card's artwork is similar to that of "[[Staunch Defender]]", which depicts a [[Warrior]] monster fighting against "Despair from the Dark" (whereas the artwork of "Staunch Defender" depicts "[[Marauding Captain]]" battling "Despair from the Dark" instead).
