title: Card Trivia:Condemned Maiden
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Solemn Strike]]".
  * According to [[Master Guide 4 card storylines#File No. 02: The Maiden Exiled from Paradise|official lore]], this monster is a demonic version of the girl shown in the artworks of the "[[Forbidden (archetype)|Forbidden]]" [[Quick-Play Spell Card]]s, having been cursed by [[Solemn|God]] for stealing the eponymous artifacts from His vault, until the divine power left in her wears off. [[The Valuable Book EX card storylines#No. 08: Condemned Witch|She however refused to atone]], leading to her corruption becoming more advanced (depicted as "[[Condemned Witch]]" and "[[Condemned Darklord]]").
  * What appears to be the [[wikipedia:Venus symbol|Venus symbol]] (♀) appears on the chain around this monster's waist and on her eye patch.
