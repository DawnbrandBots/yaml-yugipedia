title: Card Trivia:Bingo Machine, Go!!!
wikitext: |-
  {{Navigation}}

  [[File:Ultimate_Bingo_Machine.png|thumb|right|300|The Ultimate Bingo Machine]]

  * This card is based on the [[Ultimate Bingo Machine]], a bingo machine modeled after the "[[Blue-Eyes Ultimate Dragon]]" that [[KaibaCorp]] used to determine the matchups in the [[Battle City]] finals in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This is reflected in this card's effect to have the opponent randomly choose a player's card that fits this card's criteria, including "[[Blue-Eyes]]" monsters or [[Spell]]/[[Trap Card]] [[support]] for "[[Blue-Eyes White Dragon]]" and "Blue-Eyes Ultimate Dragon".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|203|ref}} showing [[Isono (manga)|Isono]] unveiling the Ultimate Bingo Machine to determine the matchups for the Battle City finals.

