title: Card Trivia:Appliancer Copybokkle
wikitext: |-
  {{Navigation}}

  * This monster is based on a "bokkle", the Japanese word for [[wikipedia:Bogle|bogle]], the Scottish term for a ghost or a folkloric being.
  ** This monster's name and design are based on a [[wikipedia:Photocopier|photocopier]], a device designed to create copies of documents or images on paper, which is reflected in this monster's effect to "copy" its name as another "[[Appliancer]]" monster in the player's [[hand]].
