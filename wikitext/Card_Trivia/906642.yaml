title: Card Trivia:Rite of Aramesir
wikitext: |-
  {{Navigation}}

  * "[[Water Enchantress of the Temple]]" appears in this card's artwork.
  ** This card's artwork depicting "Water Enchantress" calling "[[Adventurer Token]]" into her world is based on a common plot device in RPG games as well as in ''isekai'' stories, where normal people are summoned or reincarnated in another world.
  * The word "Aramesir" in this card's name is "Risemara" (リセマラ, ''Risemara'') spelled backwards, a Japanese term derived from "reset marathon", which denotes the process of rerolling new accounts repeatedly when starting a mobile/gacha game, so as to end up with an account with the best possible starting resources.
  ** The characters 「菈玛至崇颂」 (''Lā mǎ zhì chóng sòng'') in this card's Simplified Chinese name are also an anagram of "reset marathon" (重置马拉松, ''Chóngzhì mǎlāsōng''), written with homophonous characters.
