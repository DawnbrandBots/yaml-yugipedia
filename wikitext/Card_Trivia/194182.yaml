title: Card Trivia:Armor Blast
wikitext: |-
  {{Navigation}}

  * Since the "[[Inzektor]]" archetype seems to be based of "Kamen Rider Kabuto", this card could be a reference to "Cast Off", in which the exterior armor breaks apart and is launched towards the opponent as an attack.
  ** This card shows an "[[Inzektor Ant]]" blasting his own "[[Inzektor Giga-Weevil|Giga Weevil]]" armor to defeat 2 enemies, which also featuring this card's effect.
  ** Coincidentally "Inzektor Giga-Weevil" resembles the armor that is often broken apart and launched as a weapon in "Kamen Rider Kabuto" while "Inzektor Ant" can be seen as the rider underneath that continues fighting after losing the armor.
