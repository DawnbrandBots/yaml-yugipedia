title: Card Trivia:Cyber Angel Dakini
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magnificent Machine Angel]]".
  * This is one of the [[cover card]]s of ''[[Duelist Pack: Dimensional Guardians]]''.
  * This monster is based on the [[wikipedia:dakini|dakini]], a sacred female deity in [[wikipedia:Vajrayana|Vajrayāna Buddhism]]. In the medieval legends of India, the dakini is trained under the Hindu goddess, '''[[wikipedia:Kali|Kali]]''', the destroyer of evil who is depicted as a blue four-armed deity and wields a [[wikipedia:scimitar|scimitar]], a [[wikipedia:sword|sword]], and a [[wikipedia:trishula|trishula]], similar to this monster's design and weapons.
  * The Spanish print of this card features an incorrect term for "Ritual Monster". Despite appearing correctly on the lore the second time it is mentioned, the first time said term appears as "''monstruo Ritual''" instead of "''Monstruo de Ritual''".
