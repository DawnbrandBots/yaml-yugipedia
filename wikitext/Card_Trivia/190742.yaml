title: 'Card Trivia:Number 50: Blackship of Corn'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Xyz Treasure]]".
  * The number "50" appears on the right side of this monster's center sail.
  * This is the first [[Plant]] "[[Number]]" monster.
  * This is the first "Number" monster to appear exclusively in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  * This monster is based on a hybrid of various [[wikipedia:Corn|corn]] seeds mixed with with Chinese sticky rice using the [[wikipedia:F1 hybrid|F1 hybrid]] method.
  ** In China, black corn is also known as ''Hēi Zhēn Zhū'' (黑珍珠), which is translated to "[[wikipedia:Black Pearl|Black Pearl]]", referencing the fictional ship in the [[wikipedia:Pirates of the Caribbean (film series)|''Pirates of the Caribbean'' film series]] known for its black hull. Fittingly, the design pattern of the hull, the underside of the ship, resembles black kernels of corn.
  ** This monster's Japanese name, "Black Corn" (ブラック・コーン号 ''Burakku Kōn-gō'') is a reference to the real-life Japanese battleship [[wikipedia:Japanese battleship Kongō|Kongō]] used by the [[wikipedia:Japanese Imperialist Navy|Japanese Imperialist Navy]] in World War I and World War II.
  * "Number" monsters often take the form of their owner's initial ambitions and desires; in this monster's case, it represents its owner, [[Captain Corn]].
  ** This monster's appearance is a pirate ship with a corn-shaped hull. In the ''Yu-Gi-Oh! ZEXAL'' manga, Captain Corn was originally a kernel of a corn cob eaten by the pirate, [[Captain Roberts]], which fell into his compass and traveled the world with him.
