title: Card Trivia:Pentestag
wikitext: |-
  {{Navigation}}

  * This card's name, "Pentestag", is a portmanteau of "[[wikipedia:Penetration test|penetration test]]" (also known as a pen test), which is used to determine how safe a network is compared to known cyber threats, and "[[wikipedia:Stag beetle|stag beetle]]" (which this monster is based on).
  * This monster seems to be related to "[[Cliant]]" and "[[Link Spider]]".
  ** All three have a largely black and light-blue color schemes of their bodies.
  ** They are also visually based on insects (although [[wikipedia:Arachnid|arachnids]] are not technically insects).
  ** Their card artworks depict a net-like motif in the background, with the exception of this card.
  ** All three cards were also printed in ''[[Starter Deck: Codebreaker]]''.
