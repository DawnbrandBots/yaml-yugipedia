title: Card Trivia:Gorz the Emissary of Darkness
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the ''[[OCG]]'' release of ''[[Duelist Pack: Yugi (OCG)|Duelist Pack: Yugi]]'', and is also one of the cover cards of ''[[Battles of Legend: Monster Mayhem]]''.
  * This monster appears in the artwork of "[[Stairway to the Underworld]]".
  * This monster's [[original ATK and DEF]] (2700/2500) is an inverse of that of "[[Kaien the Emissary of Darkness]]", which is the Japanese name of the "[[Emissary of Darkness Token]]" that its ''[[OCG]]''/''[[TCG]]'' effect can [[Special Summon]].
  ** This monster's ''OCG''/''TCG'' effect to Special Summon itself when the player takes damage and the first bulleted effect to Special Summon an "Emissary of Darkness" is based on the effect of "[[Stairway to the Underworld]]", which allows the player to Special Summon two "[[Emissary of Darkness]]" monsters from the [[Deck]] if the player took [[battle damage]] from a [[direct attack]]. In the ''[[Yu-Gi-Oh! R]]'' manga, this monster and "Kaien the Emissary of Darkness" were both Special Summoned via the effect of "Stairway to the Underworld".
  * This is the only promotional card to date to not feature the golden hologram in the corner.
  * The [[Ghost Rare|Ghost]]/[[Gold Rare]] version of this card's artwork changes colors, unlike most other Ghost Rare cards.{{fact}}
  * Until the release of "[[Arcana Force XII - The Hangman]]", this was the only known non-[[Forbidden]] card which had the potential to create a [[Zero Turn Kill]] without relying on an alternate [[victory condition]].
