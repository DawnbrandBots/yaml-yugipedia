title: Card Trivia:Celeb Rose Magician
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's first artwork.
  ** "[[Celeb Rose Witch]]" appears in this card's second artwork.
  * This monster appears in the artworks of "[[Celeb Charity]]", "[[Celeb Rose Luxury Magicians]]", "[[Celebright Privilege]]", and "[[Charis Magic - Elegant Change]]", as well as in the second artworks of "Celeb Rose Witch" and "[[The Secret of Manifestation]]".
  * This monster is a [[Celeb Rose]] [[counterpart]] of "[[Sevens Road Magician]]".
  ** Both monsters share the same [[Level]] (7), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (2100/1500).
