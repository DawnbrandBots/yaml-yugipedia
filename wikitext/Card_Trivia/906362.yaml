title: Card Trivia:Road Arms - Sevens Lance
wikitext: |-
  {{Navigation}}

  * The [[Sevens Road]] sigil appears in this card's artwork.
  * The weapon in this card's artwork appears to be an evolution of the weapon held by "[[Sevens Road Magician]]" in its artwork.
  * This is the first [[Equip Spell Card]] to appear in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  ** This is also one of the first Equip Spell Cards to be printed in ''[[Yu-Gi-Oh! Rush Duel]]''.
