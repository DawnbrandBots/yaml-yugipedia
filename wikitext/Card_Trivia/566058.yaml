title: Card Trivia:Noble Arms - Clarent
wikitext: |-
  {{Navigation}}

  * This sword is based on Clarent, a sword that is mentioned in the fifteenth-century English poem [[wikipedia:Alliterative Morte Arthure|Alliterative Morte Arthure]]. According to that poem, Clarent was a ceremonial sword taken by Mordred to kill King Arthur.
  ** Fittingly, "[[Noble Knight Medraut]]", the "Noble Knight" monster based on Mordred, appears in this card's artwork.
  * This sword appears in the artwork of "Noble Knight Medraut".
