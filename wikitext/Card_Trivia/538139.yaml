title: Card Trivia:Compulsory Evacuation Device
wikitext: |-
  {{Navigation}}

  * "[[Giga Gagagigo]]" appears in this card's artwork, depicted being ejected out of this machine.
  * This card appears in the artwork of "[[Emergency Evasion]]" and in the international artwork of "[[Trap Sluzer]]".
  * This card has three [[counterpart]]s: "[[Compulsory Circulation Device]]", "[[Compulsory Escape Device]]", and "[[Compulsory Recoil Device]]".
