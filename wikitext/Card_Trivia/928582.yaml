title: Card Trivia:Vanquish Soul Caesar Valius
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Wild Survivors]]''.
  * This monster appears in the artworks of "[[Stake your Soul!]]" and "[[Vanquish Soul Calamity Caesar]]".
  * This monster resembles the "boss character" in [[wikipedia: Fighting game|fighting games]] (e.g. Susano'o from ''[[wikipedia:BlazBlue|Blazblue]]'', [[wikipedia:M. Bison|M. Bison]] and [[wikipedia:Akuma (Street Fighter)|Akuma]] from ''[[wikipedia:Street Fighter|Street Fighter]]'', Justice from ''[[wikipedia:Guilty Gear|Guilty Gear]]'', etc.). These characters are known for playing a significant role in "Arcade" and "Story" modes of said games, more often than not being one of central antagonists if not the final ones. Their movesets can vary greatly but are generally difficult to execute yet especially powerful in terms of damage output and utility.
  ** This basis can be seen in both halves of its effect that [[reveal]] a monster(s) as [[cost]] cementing itself as the penultimate threat within the "[[Vanquish Soul]]" [[archetype]] due to its ability to [[Destroy|deal]] and [[Unaffected by activated card effects|withstand]] significant opposition, not to mention having the highest [[ATK]] among all "Vanquish Soul" monsters.
