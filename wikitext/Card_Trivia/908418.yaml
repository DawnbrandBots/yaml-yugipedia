title: Card Trivia:Amazement Administrator Arlekino
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amaze Attraction Cyclo-Coaster]]", "[[Amaze Attraction Horror House]]", "[[Amaze Attraction Majestic Merry-Go-Round]]", "[[Amaze Attraction Rapid Racing]]", "[[Amaze Attraction Thrill Train]]", "[[Amaze Attraction Viking Vortex]]", "[[Amaze Attraction Wonder Wheel]]", "[[Amazement Precious Park]]", and "[[Amazement Special Show]]".
  ** This monster also appears as a toy in the artwork of "[[Amazement Family Faces]]".
  * The wand of "[[Dark Magician Girl]]", balloons shaped like "[[Kuriboh]]" and "[[Sheep Token]]s", and two copies of "[[Magic Cylinder]]" (one hidden behind this monster's wings) appear in this card's artwork.
  * This monster's name is derived from "Arlecchino", the original Italian name for the [[wikipedia:Harlequin|Harlequin]] character featured prominently in the [[wikipedia:commedia dell'arte|commedia dell'arte]] form of Italian professional theater.
  * This monster has an "evil" [[LIGHT]] [[counterpart]]: "[[Amazement Abomination Arlekino]]".
