title: Card Trivia:Windrose the Elemental Lord
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Wind rose|wind rose]], a graphic tool used by [[wikipedia:Meteorology|meteorologists]] to give a succinct view of how [[wikipedia:Wind speed|wind speed]] and [[wikipedia:Wind direction|direction]] are typically distributed at a particular [[wikipedia:Location|location]].
  ** This monster's name, "Windrose", is a portmanteau of the German words "wind" and "rose".
  *** This is the only "[[Elemental Lord]]" monster whose name can also be translated into English, since both "wind" and "rose" are [[wikipedia:Cognate|cognates]] that differ only in pronunciation between the two languages.
  * This monster's effect to [[destroy]] all [[Spell]] and [[Trap Card]]s the opponent [[control]]s when it is [[Special Summon]]ed is based on the effect of "[[Harpie's Feather Duster]]".
