title: Card Trivia:Stardust Wish
wikitext: |-
  {{Navigation}}

  * "[[Stardust Dragon]]" appears in this card's artwork.
  ** This card's artwork is based on "[[Stardust Dragon (anime)|Stardust Dragon]]" using its effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime, in which it transforms into a cluster of stardust.
  * The petals in the bottom-right of this card's artwork are the same as those in the artwork of "[[Frozen Rose]]".
  * This card's name is based on the  [[Summon chants in Yu-Gi-Oh! 5D's#Yusei Fudo|Summon chant]] of "Stardust Dragon" in the anime: ''Gathering '''wishes''' will become a new shining star!''
