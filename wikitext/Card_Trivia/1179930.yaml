title: Card Trivia:Toon World the Perfect World
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Revolution Booster: Toon / Witchcrafter / Unchained]]''.
  * "[[Dark Rabbit]]" appears on the cover of the book in this card's artwork.
  * This card is a [[retrained]] [[Field Spell]] counterpart of "[[Toon World]]".
  ** This card's name is a reference to how in original Japanese version of the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] called "Toon World" the "perfect world" where Death does not exist, which relates to the trauma he suffered from the death of his love interest, [[Cyndia (manga)|Cyndia]].
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|109|ref}}, specifically from the panel showing "[[Toon World (manga)|Toon World]]" manifesting. That same panel was also previously used in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' as part of the background for the [[Toon (terrain)|Toon terrain]].
  ** This card's effect to [[banish]] [[Toon monster]]s in response to resolution of cards and effects is a reference to how in the ''Yu-Gi-Oh!'' manga and anime, Toon monsters could retreat inside "Toon World" to dodge the attacks of non-Toon monsters.
