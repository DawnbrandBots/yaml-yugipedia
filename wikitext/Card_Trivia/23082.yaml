title: Card Trivia:Morphtronic Magnen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Morphtransition]]", "[[Factory of 100 Machines]]", and "[[Morphtronic Map]]".
  * This monster is based on a magnet, as seen in the background of this card's artwork and its ability to either attract ([[Attack Position]]) or repel ([[Defense Position]]) opposing monsters.
  * This card is the only "[[Morphtronic]]" with a negative (Attack Position) effect.
  ** This could be a possible pun on the fact that magnets tend to have a "negative" polarity on one side.
  * This card has a [[counterpart]]: "[[Morphtronic Magnen Bar]]".
  * In {{episode|5D's|013|ref}}, [[Leo]] called the act of having two of this card in Defense Position a "Magna Lock".
