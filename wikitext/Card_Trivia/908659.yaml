title: Card Trivia:Albion the Branded Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Bond]]", "[[Judgment of the Branded]]" and "[[Screams of the Branded]]".
  ** The silhouette of this monster's head also appears inside one of the ice spikes in the artworks of "[[Mirrorjade the Iceblade Dragon]]" and "[[Branded Sword]]".
  * This monster is a "[[Branded]]" [[Card evolutions|empowered]] [[Albaz Dragon|form]] of "[[Fallen of Albaz]]".
  ** The kanji ''Rakuin'' (烙印, lit. "branded") in this card's Japanese name is a homophone of ''Rakuin''  (落胤, lit. "illegitimate child") from the Japanese name of "[[Fallen of Albaz]]".
  *** This card's name, "Albion" (アルビオン ''Arubion''), is an alternative poetic name for [[wikipedia:Albion|Great Britain]], derived from ''Albus'' (Latin for "white"). ''Albus'' is also the origin of the Japanese name of "Fallen of Albaz".
  *** Albion is also the name of [[wikipedia:Albion (Blake)|the primeval man]] in the mythology of the poet [[wikipedia:William Blake|William Blake]], derived from the same name for Great Britain. Other cards in the Abyss story refer to William Blake's poetry, such as "[[Icejade Cenote Enion Cradle]]", "[[Dogmatika Alba Zoa]]", "[[The Bystial Alba Los]]", and the card artwork of "[[Branded in White]]".
  * This monster has a transformed version, as seen in the artwork of "[[Branded Bond]]": "[[Albion the Shrouded Dragon]]".
  * Along with "Albion the Shrouded Dragon", this monster can be considered the "good" counterpart to "[[Masquerade the Blazing Dragon]]".
  ** All three are [[Albaz Dragon|draconic]] forms of "[[Fallen of Albaz]]"/"[[Aluber the Jester of Despia]]".
  ** They all have similar "[[Branded]]" [[Spell Card]]s that can [[Fusion Summon|Summon]] them ("[[Branded in White]]"/"[[Branded in Red|in Red]]").
