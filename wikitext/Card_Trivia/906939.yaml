title: Card Trivia:Illusion Strike Dragon Miragias
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Luke - Dragon's Dragons]]'', as well as one of the cover cards of ''[[Deck Mod Pack: Illusion Strike Mirage Impact!!]]''.
  * This monster appears in the artwork "[[Phantom Roar]]", as well as in both artworks of "[[Gias x Gias]]".
  * The design of "[[Twin Edge Phantom Dragon]]" is based on this monster.
  * The background of this card's artwork features seven stars, and this monster features seven green orbs on its body, including both of its eyes, referencing this card's [[Level]] and the title of its debut series ''[[Yu-Gi-Oh! SEVENS]]''.
  ** These features are shared with its counterparts, "[[Multistrike Dragon Dragias]]" and "[[Steel Strike Dragon Metagias]]", both of which also debuted in the ''Yu-Gi-Oh! SEVENS'' anime.
