title: Card Trivia:Thunderclap Skywolf
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the background of the artwork of "[[Thunderclap Monk]]".
  * This monster's Japanese name, "{{translated name|Thunderclap Skywolf|ja}}" ({{name|Thunderclap Skywolf|ja}}, ''{{romanized name|Thunderclap Skywolf|ja}}''), is a portmanteau of the Japanese words for "wolf" (狼, ''Ōkami''), and "thunder" (雷, ''kaminari'').
