title: Card Trivia:Vampire Bat
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on a [[wikipedia:Vampire bat|vampire bat]], a species of bats whose food source is blood.
  * This monster is depicted as a swarm of vampire bats; however, in the ''Yu-Gi-Oh! GX'' anime, while the monster is neutral, the swarm of bats unite to form one giant bat.
  ** When this monster attacks, it splits into its swarm and proceeds to bite their target until either the monster is destroyed or until their direct attack is complete. This is a reference to how actual [[wikipedia:Vampire|vampires]] are known for vanishing in a swarm of bats.
  ** This monster seems to be an homage to the [https://castlevania.fandom.com/wiki/Giant_Bat Giant Bat], a recurring boss in the ''[[wikipedia:Castlevania|Castlevania]]'' video game series, which usually appears as a conglomerate of bats.
