title: Card Trivia:Cannonball Spear Shellfish
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Heartless Drop Off]]", "[[Mystik Wok]]", "[[Orca Mega-Fortress of Darkness]]", "[[Return from the Different Dimension]]" and "[[Salvage]]".
  * This card is based on the ''[[wikipedia:baculites|baculite]]'', an extinct species of [[wikipedia:Cephalopod|cephalopod]] with a nearly straight shell.
