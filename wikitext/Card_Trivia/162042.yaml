title: Card Trivia:Division
wikitext: |-
  {{Navigation}}

  * This monster's name reflects its effect to "divide" itself into two "[[Machine Token]]s", both of which highly resemble this monster.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are based on its appearance in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  ** This monster's first effect to [[Tribute]] all "Divison" the player [[control]]s and [[Special Summon]] "Machine Tokens" up to twice the number Tributed is based on its appearance in {{chapter|GX|058|ref}}. In this chapter, [[Axel Brodie (manga)|Axel Brodie]] used the effect of two copies of "[[Division (manga)|Divison]]" to Tribute themselves in order to Special Summon two "[[Machine Token (manga)|Machine Tokens]]" each, for a total of four Tokens.
  *** In the ''OCG''/''TCG'', since this effect is restricted to being used [[only once per turn]], this effect was changed to be able to Tribute multiple copies of "Divison" at once (rather than just the "Division" whose effect was activated itself) in order to allow four "Machine Tokens" to be Special Summoned using two copies of "Division".
  ** The [[effect damage]] inflicted when "Machine Tokens" are destroyed and this monster's second effect to destroy Tokens when it is banished are both based on the usage of the effects of "[[The Blazing Mars (manga)|The Blazing Mars]]" in {{chapter|GX|059|ref}}. In this chapter, Axel Brodie Special Summoned "[[The Blazing Mars (manga)|The Blazing Mars]]" by [[banish]]ing three unspecified monsters from his [[Graveyard]], then used the other effect of "The Blazing Mars" to [[send]] his four "Machine Tokens" to the Graveyard in order to inflict a total of 2000 damage.
  *** In the ''OCG''/''TCG'', because the effect of "[[The Blazing Mars]]" requires sending monsters to the Graveyard as a cost, it is not possible to use the Tokens for its effect; instead, the opponent takes 500 damage when "Machine Tokens" are [[destroy]]ed. Thus, if "The Blazing Mars" is Special Summoned by banishing a copy of "Division", "Division" can use its second effect to destroy all of the player's "Machine Tokens", causing 500 damage will be inflicted for each, the same damage inflicted per monster by the effect of "The Blazing Mars".
