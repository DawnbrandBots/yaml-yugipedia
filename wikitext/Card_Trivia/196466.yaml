title: Card Trivia:Spellbook Magician of Prophecy
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * This [[Monster Card|monster]] appears in the artwork of "[[Spellbook of Fate]]".
  * This monster is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Magician (Tarot card)|The Magician]], the first of the [[wikipedia:Major Arcana|Major Arcana]].
  ** This card's Japanese name comes from the French name for "The Magician" Tarot card, ''Le Bateleur''.
  * This monster is holding the "[[Spellbook of Secrets]]", which is appropriate because both of their [[Card effect|effects]] involve searching for "[[Spellbook]]" cards.
  ** "Spellbook of Secrets" can search for this card due to "Spellbook Magician" having the "Madōsho" (魔導書) or "Spellbook" kanji in his name, since "Secrets" searches for any "Madōsho" or "Spellbook" card.
  * This monster also looks similar to the [https://finalfantasy.fandom.com/wiki/Blue_Mage_(Tactics_Advance) Blue Mage] Class in ''[[wikipedia:Final Fantasy Tactics Advance|Final Fantasy Tactics Advance]]''.
  * This monster is the only "[[Prophecy]]" monster which has "Spellbook" in its name.
