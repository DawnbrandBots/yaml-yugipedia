title: Card Trivia:Shiranui Samuraisaga
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Shiranui Style Synthesis]]."
  * This card is the first [[Zombie]] [[Synchro Monster]] that can be [[Synchro Summon]]ed without "[[Plaguespreader Zombie]]", and is also the first that is not the [[Zombie counterpart]] of an already existing monster.
  * This monster is "[[Shiranui Samurai]]" wielding "[[Shiranui Spectralsword]]."
  ** Fittingly, this card can be [[Synchro Summon]]ed using the above monsters as [[Synchro Material]]s, as well as with the [[Graveyard]] effect of "Spectralsword" by [[banish]]ing "Samurai."
  * ** This monster has an [[Card evolutions|upgraded]] form, with its soul fused with "Shiranui Spectralsword": "[[Shiranui Shogunsaga]]".
