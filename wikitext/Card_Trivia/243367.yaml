title: Card Trivia:Retort
wikitext: |-
  {{Navigation}}

  * The emperor that appears in this card's artwork also appears in the artwork of "[[Asleep at the Switch]]", "[[Clear Robe]]", "[[Double Payback]]", "[[The Emperor's Holiday]]", "[[The Huge Revolution is Over]]","[[Turnabout]]", "[[Tyrant's Tantrum]]", "[[Tyrant's Temper]]", "[[Tyrant's Throes]]", "[[Tyrant's Tirade]]", and "[[Tyrant's Tummyache]]".
  * Four of the snickering people from the artwork of "The Emperor's Holiday" and two men from the artwork of "[[Royal Oppression]]" appear in this card's artwork.
  ** The events in this card's artwork are the continuation of the events in the artwork of "Turnabout": the deposed emperor is now being scorned by his former subjects.
  * This is the only card whose ''[[OCG]]'' artwork depicts the emperor wearing a shirt.
