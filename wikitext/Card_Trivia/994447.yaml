title: Card Trivia:Fossilized Star Aldebalance
wikitext: |-
  {{Navigation|mode=nongame}}

  * The balancing stones in this card's artowrk appear in the artwork of "[[Stunning Stacking Stones]]".
  * This card's name is a portmanteau of "[[wikipedia:Aldebaran|Aldebaran]]" (the bright star located in the zodiac constellation of [[wikipedia:Taurus (constellation)|Taurus]]) and "balance".
