title: Card Trivia:Grave of the Super Ancient Organism
wikitext: |-
  {{Navigation}}

  * This card's second Spanish name, ''"La Tumba de un Organismo Super Antigüo"'' has a typo: Spanish diphthongs typically do not need a diaeresis in syllables "ua" or "uo", meaning that ''"Antig'''u'''o"'' would be the correct rendering.
