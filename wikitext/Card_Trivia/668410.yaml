title: Card Trivia:Gizmek Kaku, the Supreme Shining Sky Stag
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of [[wikipedia:ja:天之尾羽張|Ame-no-Kaku-no-Kami]], [[wikipedia:Kagu-tsuchi|Kagu-tsuchi]] and [[wikipedia:Takemikazuchi|Takemikazuchi]].
  ** Kagu-Tsuchi is the ''[[wikipedia:Kami|kami]]'' of fire in [[wikipedia:Japanese mythology|Japanese Mythology]]. Kagu-tsuchi's birth burned his mother [[wikipedia:Izanami|Izanami]], causing her death. His father [[wikipedia:Izanagi|Izanagi]], in his grief, beheaded Kagu-tsuchi with his sword, Ame no Ohabari (天之尾羽張), and cut his body into eight pieces, which became eight volcanoes. The blood that dripped off Izanagi's sword created a number of deities, including Takemikazuchi. One of the legends of Takemikazuchi is that he was invited to visit [[wikipedia:Nara Park|Nara]], riding a white deer. Ame-no-Kaku-no-Kami is a lesser known deity of deer.
  ** Other parts of this card and its artwork are a reference to these 3 deities:
  *** [[FIRE]] [[Attribute]]: Kagu-Tsuchi, the kami of fire.
  *** Lightning in background of artwork: Takemikazuchi, a god of thunder and swords.
  *** Deer appearance: Ame-no-Kaku-no-Kami, a deity of deer.
  * This monster appears in the artwork of "[[Sacred Scrolls of the Gizmek Legend]]".
  * This card may be a reference to "[[Meklord Emperor Granel]]".
  ** They both have an effect to equip a monster from the [[Extra Deck]]. This card equips monsters in the [[Extra Monster Zone]], while "Granel" equips [[Synchro Monster]]s.
  ** They both have an effect to Special Summon the equipped monster.
  ** The pronunciation of part of this card's Japanese name, ''Kikōtei'', is the same as the Japanese name for the "[[Meklord Emperor]]" archetype.
  * This is the first released monster with 2750 DEF.
