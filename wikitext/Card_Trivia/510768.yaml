title: Card Trivia:Vennominon the King of Poisonous Snakes
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Offering to the Snake Deity]]" and "[[Venom Shot]]".
  * This monster's name is a portmanteau of the words "[[Venom]]" and "phenomenon".
  * This is the [[signature card]] of [[Thelonious Viper]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
