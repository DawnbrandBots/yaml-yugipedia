title: Card Trivia:Malefic Paradox Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Malefic Paradigm Shift]]".
  * This monster has a [[retrained]] [[Main Deck]] counterpart: "[[Malefic Paradigm Dragon]]".
  * This is the only "[[Malefic]]" [[Synchro Monster]].
  * This monster's relationship with "[[Malefic Truth Dragon]]" references the nature of a [[wikipedia:Paradox|paradox]], a statement that appears to be impossible but also likely true.
  ** Both are the only draconic "Malefic" monsters that do not feature black-and-white armor in their designs.
  ** Both monsters' color schemes are based on the design of their owner, [[Paradox]]; this monster's black-and-white color scheme is based on Paradox's mask, while "Malefic Truth Dragon" is based on his hair.
  ** In ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'', when [[Malefic Paradox Dragon (anime)|this monster]] was [[destroy]]ed, it allowed Paradox to [[activate]] "Malefic Paradigm Shift" to Special Summon "[[Malefic Truth Dragon (anime)|Malefic Truth Dragon]]". This references how a paradox (the state that appears impossible but is also likely true) undergoes the process of a [[Wikipedia:Paradigm shift|paradigm shift]] (the shift of a commonly-held belief to a new belief by mass consensus), which is then changed into the truth.
  * This monster's tail has a logo that resembles the infinity symbol (∞), the signature trait of [[Iliaster]], the organization of which this monster's owner, Paradox, was a part of in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * In ''Yu-Gi-Oh! 3D Bonds Beyond Time'', while most Synchro Monsters appear from a column of light when Summoned, this monster appeared from a column of darkness similar to a [[Dark Synchro Monster]] in the ''Yu-Gi-Oh! 5D's'' anime.
