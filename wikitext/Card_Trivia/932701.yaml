title: Card Trivia:Supreme Railartillery Magnum Overlord
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Versus Pack Maximum Force]]''.
  * This monster has three [[counterpart]]s: "[[Supreme Beasteam Magnum Overlord]]", "[[Supreme Machine Magnum Overlord]]", and "[[Supreme Skystream Magnum Overlord]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (10), [[Type]] ([[Machine]]), [[original ATK and DEF]] (1900/0), and [[MAXIMUM ATK]] (4000) with the above-mentioned monsters.
  * This is the first [[Maximum Monster]] to be [[Summon]]ed outside [[Maximum Summon]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * Along with "[[Supreme Railartillery Magnum Overlord (L)|Supreme Railartillery Magnum Overlord [L]]]" and "[[Supreme Railartillery Magnum Overlord (R)|Supreme Railartillery Magnum Overlord [R]]]", this is the only "[[Magnum Overlord]]" monster not used by [[Yuga Ohdo|Yuga]] [[Yuga Ohdo (manga)|Ohdo]] in either the anime or the manga.
