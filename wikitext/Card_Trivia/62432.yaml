title: Card Trivia:Lucky Loan
wikitext: |-
  {{Navigation}}

  * "[[Fortune Fairy Ann]]" and "[[Fortune Fairy Chee]]" appear in this card's artwork.
  * Keeping in-theme with its Japanese card name (幸運の前借り, Good-Luck Loan), this card's effect immediately grants the player good luck by [[Special Summon]]ing a [[Spellcaster]] monster, in return for bad luck later on by restricting the player from Summoning monsters during their next turn.
