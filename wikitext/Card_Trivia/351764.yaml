title: Card Trivia:Dragodies, the Empowered Warrior
wikitext: |-
  {{Navigation}}

  * This card has a [[DARK]] counterpart "[[Dragonox, the Empowered Warrior]]".
  ** Both "Dragonox" and this monster are two alternative forms of "[[Ventdra, the Empowered Warrior]]".
  * This card's name is a [[wiktionary:portmanteau|portmanteau]] of "[[wiktionary:dragon|dragon]]" and the Latin word "dies" meaning "day".
  ** This fits with this card's [[Attribute]] and further strengthens the connection to [[Dragonox, the Empowered Warrior|its counterpart]], who incorporates the Latin word for "night" in its name.
