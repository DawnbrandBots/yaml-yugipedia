title: Card Trivia:D/D Ghost
wikitext: |-
  {{Navigation}}

  * This monster's design features the silhouette of a cat, referencing [[wikipedia:Schrödinger's cat|Schrödinger's cat]], a famous thought experiment about quantum superposition, in which a hypothetical cat is placed inside a sealed box with a flask of poison and a radioactive substance, and is considered simultaneously dead <i>and</i> alive due to a random subatomic event which may or may not occur that would result in the release of the poison, until the box is opened and it can be observed whether the cat is dead <i>or</i> alive.
