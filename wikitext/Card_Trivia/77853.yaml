title: Card Trivia:Cyber Ouroboros
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Ouroboros|ouroboros]], a serpent who is commonly depicted swallowing its own tail.
  ** In alchemy, the ouroboros is used as an example of an eternal cycle of destruction and recreation. This is reflected in this card's effect when [[banish]]ed, which sends a card from the [[hand]] to the [[Graveyard]] and replaces it by [[draw]]ing another card.
