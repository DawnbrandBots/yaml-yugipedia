  [[File:YGO-001 Ushio in the leaves.png|thumb|right|250|[[Tetsu Ushio (manga)|Tetsu Ushio]] in the leaves.]]

  * This card's art is a reference to the [[Yu-Gi-Oh! - Duel 001|first chapter]] in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'' manga]], in which [[Dark Yugi (manga)|Dark Yugi]] placed a [[Penalty Game (manga)|Penalty Game]] on [[Tetsu Ushio (manga)|Tetsu Ushio]], "GREED, the Illusion of Avarice", driving him insane and making him think that leaves and trash were money.

