title: Card Trivia:Ojama Yellow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amaze Attraction Wonder Wheel]]" (as a face on the Ferris wheel), "[[Beast Rising]]", "[[Eliminating the League]]", "[[Harpies' Hunting Ground]]", "[[Man-Thro' Tro']]", "[[Nitwit Outwit]]", "[[Ojama Country]]", "[[Ojama Delta Hurricane!!]]", "[[Ojama Delta Thunder!!]]",  "[[Ojama Delta Wear]]", "[[Ojama Ride]]", "[[Ojama Trio]]", "[[Ojamagic]]", "[[Ojamarble]]", "[[Ojamandala]]", "[[Ojamarking]]", "[[Ojamassimilation]]", "[[Ojamatch]]", "[[Ojamuscle]]", "[[Over Capacity]]", "[[Painful Decision]]", "[[Painful Escape]]", "[[Performapal Guard Dance]]", "[[Power Filter]]", "[[Pride Shout]]", "[[Solidarity]]", "[[Super Team Buddy Force Unite!]]", "[[The Big Cattle Drive]]", "[[The League of Uniform Nomenclature]]", "[[The League of Uniform Nomenclature Strikes]]", "[[Three in One]]", "[[Treasure Panda]]", "[[Treaty on Uniform Nomenclature]]", "[[Trickstar Live Stage]]", and in the Japanese artwork of "[[Wattcancel]]".
  ** This monster appears in the most card artworks.

  * This card's flavor text is the same as that of "[[Ojama Green]]" and "[[Ojama Black]]". The only other cards with the same flavor text are [[Normal Monster|Normal]] "[[Magnet Warrior]]" monsters.

  * This monster has an [[Anime-only|anime-exclusive]] [[Machine]] counterpart: "[[Ojamachine Yellow]]".
