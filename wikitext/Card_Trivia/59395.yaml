title: Card Trivia:Sky Scourge Norleras
wikitext: |-
  {{Navigation}}

  * This card is named after the ''[https://finalfantasy.fandom.com/wiki/Nautilus_(Final_Fantasy_III) Nautilus]'' from ''[[wikipedia:Final Fantasy III|Final Fantasy III]]''.
  * This card is the "[[Sky Scourge]]" version of "[[Chaos Emperor Dragon - Envoy of the End]]".
  * Because each [[Attribute]] of the [[Sky Scourge]]s is different, it's possible they each represent one of the three realms. [[Sky Scourge Invicil]] represents ''Earth'', [[Sky Scourge Enrise]] represents ''Heaven'' and [[Sky Scourge Norleras]]  represents ''Hell''.
