title: Card Trivia:Dowsing Burn
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on [[wikipedia:Dowsing|dowsing]], a technique used to search for underground water, minerals, or anything invisible using pointer tools, including a pair of metal rods.
  ** This card's effect to [[banish]] an opponent's monster from the [[Graveyard]] references how the dowsing rods are used a tool of divination to locate gravesites.
  ** Ironically, despite the archaeological theme of [[Jim Crocodile Cook]]'s [[Deck]], dowsing rods have been criticized for being poor archeological tools.
