title: Card Trivia:Magical Name - "Rosa Mundi"
wikitext: |-
  {{Navigation}}

  * "[[Aleister the Invoker]]" and "[[Virakam the Artificial Spirit]]" appears in this card's artwork.
  ** This card's artwork is a reference to the romance between [[wikipedia:Aleister Crowley|Aleister Crowley]] (whom "Aleister the Invoker" is based on) and his lover, Soror Virakam (whom "Virakam the Artificial Spirit" is based on).
  * This card's name is a reference to ''Rosa Mundi'', a collection of poems written by Aleister Crowley that were dedicated to his wife, [[wikipedia:Rose Edith Kelly|Rose Edith Kelly]].
