title: Card Trivia:UFOLight
wikitext: |-
  {{Navigation}}

  * This monster's base Japanese name, "Sundog Lamplight" (幻日灯火, ''Genjitsu Tomoshibi'') is based on a [[wikipedia:sundog|sundog]], a bright spot that is sometimes seen in the sky next to the sun, caused by sunlight getting refracted by ice crystals in the atmosphere.
  ** The sundog appears at the intersection of a ring and the horizontal arm of a cross, both centered on the sun itself. This is reflected in this monster's underside, which resembles a star within a circle, decorated with four arrows.
  ** This monster's base Japanese name features the base word for "illusion" (幻, ''Gen''), reflecting its [[Illusion]] [[Type]].
  * This is the first [[FIRE]] Illusion monster.
