title: Card Trivia:Ghostrick Vanish
wikitext: |-
  {{Navigation}}

  * "[[Ghostrick Alucard]]" appears in this card's artwork.
  * The building in the background of this card's artwork is likely the exterior of "[[Ghostrick Mansion]]".
  ** This card's artwork (with a castle-looking building and "Alucard") is likely a reference to [[Konami]]'s [[wikipedia:Castlevania|Castlevania]] games.
