title: Card Trivia:Fraud Check
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Flower Cardian Cherry Blossom with Curtain]]", "[[Flower Cardian Clover with Boar]]", "[[Flower Cardian Paulownia with Phoenix]]", "[[Flower Cardian Peony with Butterfly]]", "[[Flower Cardian Pine with Crane]]", "[[Flower Cardian Willow]]", "[[Flower Cardian Willow with Calligrapher]]", "[[Flower Cardian Zebra Grass]]", "[[Flower Cardian Zebra Grass with Moon]]", two "[[Flower Cardian Paulownia]]s" and two "[[Flower Cardian Pine]]s" appear in this card's artwork.
  ** The man who appears in the artworks of "[[Fraud Check]]" and "[[Fraud Freeze]]" and the mustached man who appears in the artworks of "[[Dark Bribe]]", "Fraud Check", "Fraud Freeze" "[[Sneaky Sleeve]]", and "[[Super Koi Koi]]" appear in this card's artwork.
