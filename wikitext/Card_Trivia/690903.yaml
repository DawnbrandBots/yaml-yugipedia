  * This card's additional effect in the ''[[OCG]]''/''[[TCG]]'' likely references [[Foresee Draw]], an ability used by [[Akiza Izinski (manga)|Akiza Izinski]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, which allows her to predict what card she will [[draw]].
