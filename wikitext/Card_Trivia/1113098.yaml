title: Card Trivia:Harpie Lady Feather Duster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hysteric Eyes]]".
  * This monster is an [[counterpart|upgraded]] [[Fusion Monster|Fusion]] counterpart of "[[Harpie Lady (Rush Duel)|Harpie Lady]]", [[equip]]ped with "[[Harpie's Electro Shield]]".
  ** This monster is based on a scene from {{episode|Yu-Gi-Oh!|029|ref}} where [[Mai Valentine]] [[activate]]s "[[Harpie's Feather Duster (anime)|Harpie's Feather Duster]]", causing "[[Harpie Lady (anime)|Harpie Lady]]" (equipped with "[[Cyber Shield (anime)|Cyber Shield]]") to manifest two extra pairs of green wings.

