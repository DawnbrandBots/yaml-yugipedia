title: Card Trivia:Arma Knight
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of "[[wikipedia:Ammonoidea|ammonite]]" (a species of extinct cephalopod with a spiral-shaped shell) and "knight".
  ** Visually, this monster is an ammonite wearing a knight's helmet and pauldrons while carrying a lance and a shield typically wielded by a knight.
