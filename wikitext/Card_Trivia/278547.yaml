title: 'Card Trivia:Number 87: Queen of the Night'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * The number "87" is located on the left side of its abdomen.
  * This monster's name and design are based on the "queen of the night", the alternate name for the [[wikipedia:Night-blooming cereus|night-blooming cereus]], a cactus flower that only blooms at night, as indicated by the nighttime setting in the background of this card's artwork.
  ** This monster's Japanese title, "Beautiful Goddess of the Four Seasons" (雪月花美神, ''Setsugekka Bishin'') is a pun on the Japanese name for the night-blooming cereus (月下美人, ''gekkabijin'').
  * This monster's weapon appears to based on a [[wikipedia:Bat'leth|bat'leth]], a double-sided hybrid-edged weapon with a curved blade, four points, and three handholds on the back.
  * This monster shares many design aspects with the members of the [[Plant Princess]] [[series]], which features a humanoid female monster emerging from a flower. Fittingly, the Plant Princesses can be used to [[Xyz Summon]] this monster.
  ** This monster's relationship with the Plant Princess series is enforced with its Japanese title, "Beautiful Goddess of the Four Seasons", whereas the Plant Princesses are based on flowers that bloom during each of the four seasons.
  * This monster has the highest [[original ATK]] (3200) of all [[Plant]] monsters.
