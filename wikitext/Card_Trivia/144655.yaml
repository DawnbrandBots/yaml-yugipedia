title: Card Trivia:Dark Desertapir
wikitext: |-
  {{Navigation}}

  * This card has a counterpart, "[[Desertapir]]".
  * Much like "[[Super Rush Recklessly]]", this card was released first in the ''[[TCG]]'' and is based on an older card that did not support [[Beast]]-Type monsters.
  * This card's artwork is the opposite of that of "Desertapir". Both feature two of this monster in the same relative positions in the desert, but the artwork of "Desertapir" has the desert set during the day while this card's artwork has it set at night.
  ** This card may by the 'form' "Desertapir" takes on during the night, while it appears to sleep during the day. This may indicate that "Desertapir" is nocturnal, similar to how the majority of real tapirs are nocturnal.
