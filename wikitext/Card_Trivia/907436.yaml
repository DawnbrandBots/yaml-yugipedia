title: Card Trivia:Ultimate Slayer
wikitext: |-
  {{Navigation}}

  * "[[Apollousa, Bow of the Goddess]]" appears in this card's artwork.
  * This card's Japanese name, "Artemite Slay" (アルテミット・スレイ, ''Arutemitto Surei''), is a pun on the name "Artemis", the namesake of "Apollousa, Bow of the Goddess", which has a similar spelling to the word "ultimate" (アルティメット, ''Arutimetto'').
