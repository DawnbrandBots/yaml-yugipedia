title: Card Trivia:Tellusion the Magna Warrior
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "''Tellus''", the Latin name for the planet [[Earth (planet)|Earth]].
  * Visually, this monster is a combination of "[[Magnet Warrior Sigma Plus]]" and "[[Magnet Warrior Sigma Minus]]", the two monsters required to [[Special Summon]] it. This monster's formation from the two aforementioned monsters is depicted in the artwork of "[[Magnet Bonding]]".
  ** "Magnet Warrior Sigma Plus": This monster uses the helmet, chest, and boots of "Sigma Plus".
  ** "Magnet Warrior Sigma Minus": This monster uses the body, shoulders, hands, and feet of "Sigma Minus".
