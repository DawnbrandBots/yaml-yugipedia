title: Card Trivia:Performapal Teeter Totter Hopper
wikitext: |-
  {{Navigation}}

  * The Japanese pronunciation of this card's name is a portmanteau of the words "teeter totter" (ぎったんばっこん ''gittanbakkon'') and "grasshopper" (バッタ ''batta'').
  ** This naming scheme reflects this card's effect, which was prominently used in the ''[[Yu-Gi-Oh! ARC-V]]'' anime when [[Performapal Teeter Totter Hopper (anime)|this card]] "teeter tottered" between its own effect and the [[discard]]ing effect of "[[Performapal Rain Goat (anime)|Performapal Rain Goat]]", creating a [[controlled loop]] against the damaging effect of "[[Flower Cardian Lightshower (anime)|Flower Cardian Lightshower]]".
