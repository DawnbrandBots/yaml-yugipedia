title: Card Trivia:Aquaactress Arowana
wikitext: |-
  {{Navigation}}

  * This monster is inspired on the [[wikipedia:Arowana|arowana]], popular name given to freshwater bony fish of the Family Osteoglossidae, native to parts of Africa, South America, Asia, and Australia, and whose species ''[[wikipedia:Arapaima gigas|Arapaima gigas]]'', also known as "''pirarucu''" is one of the world's biggest freshwater fish, if not ''the'' biggest.
