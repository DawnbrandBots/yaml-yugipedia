  {{Navigation}}

  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[Magnet Warrior (Rush Duel)|Magnet Warrior]] [[counterpart]] of "[[Heavy Mech Support Platform]]".
  * This monster has two upgraded [[Fusion Monster|Fusion]] forms:
  ** A Fusion with "[[Alpha The Magnet Warrior (Rush Duel)|Alpha The Magnet Warrior]]: "[[Alpha the Magnet Cavalry]]".
  ** A Fusion with "[[Beta The Magnet Warrior (Rush Duel)|Beta The Magnet Warrior]]": "[[Beta the Magnet Cavalry]]".

