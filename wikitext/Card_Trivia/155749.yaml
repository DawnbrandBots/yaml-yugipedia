title: Card Trivia:T.G. Cyber Magician
wikitext: |-
  {{Navigation}}

  * The letters "SC" in this monster's Japanese anime name (SC-01) references its [[Spellcaster]] [[Type]].
  * This monster, "[[Eccentric Boy]]", "[[Malefic Parallel Gear]]", and "[[Mara of the Nordic Alfar]]" are the only [[Tuner monster]]s that can [[Synchro Summon]] using a non-Tuner monster(s) in the [[hand]] as [[material]].
