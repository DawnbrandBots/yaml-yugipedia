title: Card Trivia:Furtunate Cat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Straynge Cat Festival]]" and "[[Straynge Cat Jealousy]]".
  * The ring of "[[Straynge Cat]]" appears on this monster's tail.
  ** Fittingly, the pronunciation of this monster's Japanese name, "Fortunate Familiar" (まぐれ使い魔 ''Magure Tsukaima'') is similar to the pronunciation of the Japanese name of "Straynge Cat", "Stray Familiar" (はぐれつかいま ''Hagure Tsukaima'').
