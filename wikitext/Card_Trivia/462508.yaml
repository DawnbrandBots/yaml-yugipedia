title: Card Trivia:Dragon Core Hexer
wikitext: |-
  {{Navigation}}

  * This card is the older counterpart of "[[Dragon Horn Hunter]]".
  * This card has the highest [[Level]], [[ATK]] and [[DEF]] of all [[Normal Monster|Normal]] [[Tuner monster]]s.
  ** It also has the highest DEF of all Tuner monsters (tied with "[[Destrudo the Lost Dragon's Frisson]]") and all [[Level 8]] Normal Monsters.
  * This card has the lowest non-0 ATK of all Level 8 Normal Monsters.
  * This monster would eventually become "[[Draluvice the Diabolic Dragon Fortress]]".
