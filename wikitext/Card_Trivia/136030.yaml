title: Card Trivia:Ally of Justice Thunder Armor
wikitext: |-
  {{Navigation}}

  * This card appears to be an upgraded version of "[[Ally of Justice Garadholg]]".
  ** It also seems to resemble "[[Ally of Justice Nullfier]]" in apperance.
  *** This monster's [[Level]] ([[Level 8|8]]) is equal to the combined levels of the above monsters (both [[Level 4]]), further reinforcing that it is possibly a combined form of "Garaldholg" and "Nullifier".
