title: Card Trivia:Gathering Light
wikitext: |-
  {{Navigation}}

  * This card's name is based on the beginning of [[Yusei Fudo]]'s [[Synchro Summon]]ing [[Summon chants in Yu-Gi-Oh! 5D's|chant]]s in the ''[[Yu-Gi-Oh! 5D's]]'' anime, as well as the title of {{chapter|5D's|065|ref}}, when this card debuted.
  * This card is a manga counterpart of "[[Converging Wishes]]", a card used by Yusei Fudo in the ''Yu-Gi-Oh! 5D's'' anime.
  ** Both cards are named after the beginning of Yusei Fudo's Synchro Summoning chants in the anime.
  ** Both cards are related to a specific series of [[Dragon]] [[Synchro Monster]]s in the ''Yu-Gi-Oh! 5D's'' era; this card is related to the [[Duel Dragon]] series in the manga, while "Converging Wishes" is related to the [[Signer Dragon]] series in the anime.
  ** Both cards are used during the Duel between Yusei Fudo and a final antagonist which result in the former's victory; this card is used against [[Rex Goodwin (manga)|Rex Goodwin]] in the manga, while "Converging Wishes" is used against [[Z-one]] in the anime.
  * In the ''Yu-Gi-Oh! 5D's'' manga, this card's effects specifically affected [[Duel Dragon]]s. In the ''OCG''/''TCG'', each of these effects affects a different group of monsters that all include most Duel Dragons, but none of them include all of the Duel Dragons. All Duel Dragons except the [[Fusion Monster]] "[[Dragonecro Nethersoul Dragon]]" are [[Level 7]] or higher Synchro Monsters, and most of them are Level 7 or 8 Dragon monsters.
  ** In the ''OCG''/''TCG'', the cost for its first effect requires banishing a "[[Power Tool]]" or Level 7 or 8 Dragon Synchro Monster. In {{chapter|Yu-Gi-Oh! 5D's|065|ref}}, Yusei used 5 different Synchro Monsters for this effect, all of which met these conditions. ("[[Power Tool Mecha Dragon (manga)|Power Tool Mecha Dragon]]" was the only Duel Dragon used for this effect that is not a Dragon monster.)
  ** In the ''OCG''/''TCG'', its second effect boosts the ATK of Level 7 or higher Synchro Monsters for every banished Level 7 or higher Synchro Monster. In {{chapter|Yu-Gi-Oh! 5D's|065|ref}} and {{chapter|Yu-Gi-Oh! 5D's|066|ref}}, this effect was used to increase the ATK of "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]" for each of the Duel Dragons used for its first effect (all of which are Level 7 or higher Synchro Monsters).
  ** In the ''OCG''/''TCG'', its third effect can negate an attack once per turn while its controller has a banished Synchro Monster. In the manga, it can negate an attack once per turn if a Duel Dragon has been placed underneath it by its first effect.
