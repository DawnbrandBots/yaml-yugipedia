title: Card Trivia:Armatos Legio Legatus Legionis
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's arm appears in the artwork of "[[Armatos Replacement]]".
  * This monster is named after a ''[[wikipedia:Legatus|legatus legionis]]'', a high-ranking Roman military officer in the [[wikipedia:Roman Army|Roman Army]], more specifically an ex-[[wikipedia:Praetor|praetor]] given command of one of Rome's elite [[wikipedia:Roman legion|legions]].
