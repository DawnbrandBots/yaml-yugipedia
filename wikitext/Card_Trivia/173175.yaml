title: 'Card Trivia:Number 20: Giga-Brilliant'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * The number 20 appears on this monster's right wing.
  * This monster's name is a pun on "ant".
  ** The first portion of this monster's Japanese name, "Gig-Ant Brilli-Ant" ({{Ruby|蟻|ぎ}}{{Ruby|岩|がん}}{{Ruby|土|と}}ブリリアント ''Giganto Buririanto''), is also a pun on "ant" (アント ''Anto'').
  ** The second portion of this monster's name is based on the adjective describing something bright or radiant, which reflects this card's [[LIGHT]] [[Attribute]].
  * This is the first [[Insect]] [[Xyz Monster]], as well as the first Insect "[[Number]]" monster.
  * In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, this was the first "[[Number]]" monster taken by [[Kaito Tenjo (manga)|Kaito Tenjo]] from an [[Number 20's holder|unnamed criminal]] who was rampaging through the [[Heartland Shopping Mall]]. In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, "[[Number 56: Gold Rat (anime)|Number 56: Gold Rat]]" appeared instead in a similar scene and was used by a different [[Number 56's holder|unnamed criminal]].
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[detach]]es an [[Xyz Material]], it absorbs it through its forehead, which then causes its body to glow a bright outline as its [[ATK]] increases by 300.
  * In the anime, [[Number 20: Giga-Brilliant (anime)|this monster]] and "[[Number 10: Illumiknight (anime)|Number 10: Illumiknight]]" are the first "Number" monsters that [[Yuma Tsukumo]] and [[Astral]] did not claim after they Dueled against their owner. This is due to how both monsters' owner, [[Kite Tenjo]], ended their Duel due to his brother [[Hart Tenjo|Hart]] collapsing from overuse of his power.
