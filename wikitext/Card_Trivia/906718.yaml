title: Card Trivia:Prediction Princess Bibliomuse
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Bibliomancy|bibliomancy]]" (the usage of books in [[wikipedia:Divination|divination]]) and "[[wikipedia:Muses|muse]]" (the goddesses of literature, science, and the arts in [[wikipedia:Greek mythology|Greek mythology]]).
  * Visually, this monster resembles [[Aura Sentia]], who used the "[[Prediction Princess]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
