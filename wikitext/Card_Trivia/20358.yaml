title: Card Trivia:Exchange
wikitext: |-
  {{Navigation}}

  * The cards "[[Widespread Ruin]]", "[[Insect Queen]]", two "[[Garma Sword]]s", two "[[Garma Sword Oath]]s", "[[Sinister Serpent]]" and "[[Cyber-Tech Alligator]]" appear in this card's first Japanese and international anime artwork. All of these cards are included in the [[Yu-Gi-Oh! Duel Monsters III: Tri-Holy God Advent promotional cards]]; also they appear in the artwork of "[[Card Destruction]]", except for "Insect Queen" and "Sinister Serpent".
  ** The cards "[[Exodia the Forbidden One]]", "[[Left Arm of the Forbidden One]]", "[[Right Leg of the Forbidden One]]", "[[Mirror Force]]", "[[Pot of Greed]]", "[[Dark Magician]]", "[[Time Wizard]]", and "[[Raigeki]]" appear in this card's ''[[TCG]]'', Korean, and second Japanese artwork.
  ** The ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' versions of "[[Acid Trap Hole (Rush Duel)|Acid Trap Hole]]", "[[Ancient Rules (Rush Duel)|Ancient Rules]]", "[[Baby Dragon (Rush Duel)|Baby Dragon]]", "[[Cannon Soldier (Rush Duel)|Cannon Soldier]]", "[[Curse of Dragon (Rush Duel)|Curse of Dragon]]", "[[Feral Imp (Rush Duel)|Feral Imp]]", "[[Gaia The Fierce Knight (Rush Duel)|Gaia The Fierce Knight]]", and "[[Giga-Tech Wolf (Rush Duel)|Giga-Tech Wolf]]" appear in this card's ''Rush Duel'' artwork.
  * This card, "[[Amazoness Chain Master]]", "[[Battlin' Boxer Cheat Commissioner]]", and "[[Scrounging Goblin]]" are the only cards in the ''[[OCG]]''/''[[TCG]]'' that allow players to take and use cards from their opponents' hand.
  * Players using different [[Card sleeve|protective sleeves]] can complicate the use of this card.
  ** Conversely, when players are using sleeves that are nearly or exactly identical, it can cause confusion during the Duel, and if left unchecked, could lead to loss or seizure of property - in this case, the respective cards - whether intentional or not. As such, this card has been restricted from use at countless events at the local level.
