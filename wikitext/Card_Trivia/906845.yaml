title: Card Trivia:Minairuka
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the Japanese word for "dolphin" (イルカ ''iruka'') and the phase "minai ru ka", which translates to "take a look at this" in English.
  ** Fittingly, this monster is depicted calling out to someone and waving a fin towards it, gesturing someone to come over to its location.
  * This card is the similarly-named [[counterpart]] of "[[Imairuka]]".
  ** Unlike "Imairuka", this card is a [[Fish]] monster due to it being based on a dolphin, whereas "Imairuka" is a [[Sea Serpent]] monster.
