title: Card Trivia:Jinzo - Layered
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[Xyz Monster|Xyz]] [[counterpart]] of "[[Jinzo]]".
  ** This monster's name reflects its appearance, which features multiple layered shoulder pads, as well as its Xyz Monster [[card type]], as it can be [[Xyz Summon]]ed by sticking (or "layering") the required [[Xyz Material]]s.
  ** This monster's effect to take control of an opponent's face-up monster references "[[Mind Control]]" and "[[Brain Control]]", cards used by [[Espa Roba]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]] to take control of his opponent's monsters. The monster being unable to attack may be based on the ''[[OCG]]''/''[[TCG]]'' effect of "Mind Control", which also prevents the controlled monster from attacking.
