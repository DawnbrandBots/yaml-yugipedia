title: Card Trivia:Preparation of Rites
wikitext: |-
  {{Navigation}}

  * "Preparation of Rites" → "[[Pre-Preparation of Rites]]" → "[[Urgent Ritual Art]]" → "[[Advanced Ritual Art]]"
  * "[[Ritual Raven]]" appears in this card's artwork.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Preparation of Rites]]".
  * This card has a ''[[Rush Duel]]'' [[Jersey]] counterpart: "[[Preparation of Jersey Rites]]".
  * There is a glitch when using this card in ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia|World Championship 2010]]'', where, even though the player is presented the choice to retrieve a [[Ritual Spell]], the game will force them to [[add]] one to the [[hand]] from the [[Graveyard]] if possible, regardless of whether they choose to or not.
