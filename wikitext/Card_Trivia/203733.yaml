title: Card Trivia:Shadow of the Six Samurai - Shien
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Evenly Matched]]", "[[Face-Off]]", and "[[Stand-Off]]".
  * This is the first monster that's both a "[[Six Samurai]]" and a "[[Shien]]" monster.
  * This monster wears the same necklace as "[[Legendary Six Samurai - Shinai]]", implying some sort of relationship.
  ** Both "Shien" and "Shinai" share the same hair color.
  * This monster could be an older version of "[[Kagemusha of the Blue Flame]]" and possibly "[[Kagemusha of the Six Samurai]]".
  ** This monster has the same [[Attribute]] and [[DEF]] as "Kagemusha of the Blue Flame".
  ** The "Kagemusha of the Blue Flame" relation is supported by the artwork of "[[Unification]]".
  ** This is also supported by the physical similarities between the monsters, and the implication that this monster is the ''Shadow'' of "Shien" - indicating a more clandestine bodyguard position than the other "Kagemusha" monsters.
  * This monster is wearing clothing similar to that of "[[Tenkabito Shien]]", and wearing the same arms armor pieces of "[[Great Shogun Shien]]".
  ** This is fitting, as "Kagemusha of the Blue Flame" is the double of "Great Shogun Shien", who is also "Tenkabito Shien".
  * This is one of the [[cover card]]s of the ''[[Samurai Warlords Structure Deck]]''.
  ** This card is the first ''[[TCG]]''-exclusive card to be the cover card of a [[Structure Deck]], and the first [[Xyz Monster]] to be included in a Structure Deck.
  * This is the only monster with 2500 ATK and 400 DEF.
