title: Card Trivia:Hazy Flame Basiltrice
wikitext: |-
  {{Navigation}}

  * This monster appears on the artwork of "[[Hazy Glory]]".
  * This is the first [[Xyz Monster]] that allows the player to use a variable amount of [[Xyz Material]]s for its [[Xyz Summon]], from 2 to 5.
  ** In addition, it is also the first Xyz Monster released in the [[OCG]] that can directly be [[Xyz Summon]]ed with 5 [[material]]s, without the use of [[Xyz Evolution]] or material-attachment effects, such as "[[Overlay Regen]]".
  *** The first Xyz Monster that could be Xyz Summoned with 5 materials was the [[Yu-Gi-Oh! ZEXAL (manga)|manga]] version of "[[Number 91: Thunder Spark Dragon]]", but this was changed upon its actual release in the ''OCG''.
  * The "Basiltrice" part of the name is a combination of the mythological creatures [[wikipedia:Basilisk|Basilisk]] and [[wikipedia:Cockatrice|Cockatrice]]. The basilisk and the cockatrice were considered to be similar creatures, if not the same; both are said to be able to kill or turn to stone whomever they looked at.
