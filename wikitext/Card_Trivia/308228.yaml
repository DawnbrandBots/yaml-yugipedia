title: Card Trivia:Confronting the "C"
wikitext: |-
  {{Navigation}}

  * This monster has the highest [[DEF]] of any Level 5 or lower [[Insect]]-[[Type]] monster.
  * Like the other [["C"]] monsters, this monster is based on the [[wikipedia:Smokybrown cockroach|smokybrown cockroach]].
  * This card's artwork is seen from the point of view of a man whose home has been infested by cockroaches and is desperately trying to get rid of them, hence the rolled up newspaper and top of a Crockpot. This card's high DEF and Japanese name imply that several of the cockroaches are in the area seen in the artwork, and that the man has them cornered.
  * This card's high DEF and immunity to effects that target it make this card a stubborn pest, which is how the cockroaches in the artwork (and to another extent, in real life) are portrayed.
