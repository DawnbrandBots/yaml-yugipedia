title: Card Trivia:A.I. Connect
wikitext: |-
  {{Navigation}}

  * [[Ai]], [[Aqua (character)|Aqua]], [[Earth (character)|Earth]], [[Flame]], [[Lightning]], [[Windy]], and a close-up of the fountain from the artwork of "[[Ignister A.I.Land]]" appear in this card's artwork.
  ** This card's name and artwork reference Ai's sibling bond with his fellow [[Ignis]]. This is also reflected in its bulleted effects, which is applied based on the [[Attribute]] of the [[reveal]]ed [[Cyberse]] monster, as the Ignis and their corresponding "[[@Ignister]]" monsters represent the six main Attributes.
  * This card's Japanese name is a portmanteau of the words "ties" (繋がり合い, ''tsunagariai'') and "Ai".
