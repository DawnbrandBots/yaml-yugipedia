title: Card Trivia:Moisture Creature
wikitext: |-
  {{Navigation}}

  * This monster is one of the eleven [[Immortal]] monsters in ''[[Yu-Gi-Oh! The Duelists of the Roses]]''.
  * The spiky objects inside this monster's weapon canister also appear in the artwork of "[[Servant of Catabolism]]", where it can be seen within that monster's head.
  ** In ''Yu-Gi-Oh! The Duelists of the Roses'', both are Immortal monsters, and the spiky objects represent [[Crush]] terrain, which powers up Immortal monsters and is produced when they are destroyed in battle on any other terrain.
  * This card's [[Summon]]-triggered effect is similar to those of "[[Gilford the Lightning]]", which destroys all monsters the opponent controls, and "[[Beast King Barbaros]]", which destroys all cards the opponent controls.
  ** All three also gain their bonus effects when [[Tribute Summon]]ed with 3 [[Tribute]]s.
  * This monster is a hidden character in ''[[Yu-Gi-Oh! The Falsebound Kingdom]]''. He claims to be an alien that got trapped inside the game, and is identified as a monster character; he uses the gun-like device in his attack, called '''Sterilizing Beam'''.
  * This monster's full model in ''Yu-Gi-Oh! The Duelists of the Roses'' depicts it as an alien-like humanoid, with the umbrella-like device spread out when it is in [[Defense Position]].
