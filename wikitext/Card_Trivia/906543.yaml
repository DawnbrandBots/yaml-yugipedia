title: Card Trivia:Shadow Ghoul of the Labyrinth
wikitext: |-
  {{Navigation}}

  * "[[Labyrinth Wall]]" appears in this card's artwork.
  * This monster is a [[retrained]] [[counterpart]] of "[[Shadow Ghoul]]".
  ** This monster's appearance is based on "Shadow Ghoul" fused with "Labyrinth Wall" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's [[Graveyard]] effect to destroy an opponent's monster during their [[Damage Step]] while controlling a "[[Labyrinth Wall (archetype)|Labyrinth Wall]]" card references how "Shadow Ghoul" had the ability to move freely around the labyrinth walls and launch a preemptive strike on any monster entering the labyrinth, destroying [[Yami Yugi]]'s weaker monsters.
