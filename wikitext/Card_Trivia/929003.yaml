title: Card Trivia:ExPress Train
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Major Breaking News!]]".
  * This monster's English name is a portmanteau of "[[wikipedia:Express train|express train]]" and "[[wikipedia:News media|press]]".
  ** This monster is a [[wikipedia:Locomotive|locomotive]] featuring a [[wikipedia:Chimney (locomotive)|smokestack]] with a [[wikipedia:Nib (pen)|pen nib]] poking out of it, as well as a [[wikipedia:Camera lens|camera lens]] serving as its [[wikipedia:Smokebox|smokebox]], with these unique features being common motifs of [[wikipedia:Journalist|reporters]].
