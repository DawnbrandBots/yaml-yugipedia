title: Card Trivia:Imaginary Reactor
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[counterpart]] of "[[Imaginary Actor]]".
  ** This monster's effect to treat itself as "Imaginary Actor" and supporting "[[Monster Reincarnation (Rush Duel)|Monster Reincarnation]]" references a scene in {{episode|SEVENS|058|ref}} where [[Yuo Goha]] used "[[Monster Reincarnation (anime Rush Duel)|Monster Reincarnation]]" to [[add]] "[[Imaginary Actor (anime)|Imaginary Actor]]" from his [[Graveyard]] to his [[hand]].
  * This monster and "[[Ancient Gear Golem (Rush Duel)|Ancient Gear Golem]]" are the first ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' cards to debut in ''[[Yu-Gi-Oh! Duel Links]]'' before their physical print, as they were released in the game 11 days prior to their print in the ''[[Neo Legend Awakening Pack]]''.
