title: Card Trivia:Virtual World Roshi - Laolao
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Virtual World Gate - Chuche]]", "[[Virtual World Gate - Qinglong]]", and "[[Virtual World Gate - Xuanwu]]".
  * ''[[wikipedia:Rōshi|Rōshi]]'' (zh: 老师 ''Lǎoshī'') is a title in [[wikipedia:Zen|Zen Buddhism]] (zh: 禅宗 ''Chánzōng''), meaning "teacher".
  * This card's name is a [[wikipedia:reduplication|reduplication]] of the Chinese character ''lǎo'' (老; "old").
