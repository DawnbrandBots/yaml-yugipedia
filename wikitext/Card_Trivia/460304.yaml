title: Card Trivia:Crystron Quandax
wikitext: |-
  {{Navigation}}

  * This monster appears to be formed from "[[Crystron Quan]]" and "[[Crystron Smiger]]".
  ** Both are shown merging together in the artwork of "[[Crystron Entry]]".
  ** Its name contains "Quan" and it shares many similarities with "Quan" and "Smiger" in its overall design.
