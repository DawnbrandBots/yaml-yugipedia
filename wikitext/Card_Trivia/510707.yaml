title: Card Trivia:Arcana Force XV - The Fiend
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * This monster appears in the artwork of "[[Arcanatic Doomscythe]]" and "[[Light Force]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Devil (tarot card)|The Devil]].
  ** This monster's number "XV" and [[original ATK and DEF]] (2500) reference how The Devil is the fifteenth trump card of the Majora Arcana Tarot.
  * Unlike most "[[Arcana Force]]" monsters, neither of this monster's effects are strictly positive or negative. This may be due to the fact that The Devil is almost never a positive sign in [[wikipedia:tarot reading|Tarot reading]], regardless of its position.
  * This monster's appearance is based on the Lovecraftian creature, the Flying Polyps, which are known for their depicts of eyeballs on black bodies, keeping in relation with the extraterrestrial theme of the "Arcana Force" [[archetype]].
  ** According to Cthulhu Mythos, the Flying Polyps are known for their destruction. In the ''[[Yu-Gi-Oh! GX]]'' anime, the Devil Tarot card represents the [[The Light of Destruction|Light of Destruction]], which is speculated by [[Maximillion Pegasus]] to have influenced the rise of dictators and the onset of world wars.
  ** The lower half of this monster's body is based on the creature in one poster for the 1968 movie ''[[wikipedia:They Saved Hitler's Brain|They Saved Hitler's Brain]]''. Although never showing up onscreen as such, the remains of Adolf Hitler are depicted on the poster as a brain inside a spherical vat, standing on a tentacle, identical to the bottom half of this monster.
