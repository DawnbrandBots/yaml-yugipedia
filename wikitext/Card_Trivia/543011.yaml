title: Card Trivia:Counterstrike Molt
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Hell Needle Caterpillar]]" and "[[Scarred Warrior]]" appear in this card's artwork.
  * This card's Japanese name, "Counterattack Ecdysis", is named after [[wikipedia:Ecdysis|ecdysis]], the molting of the exoskeleton in species of insects and arthropods.
