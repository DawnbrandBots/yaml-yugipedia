title: Card Trivia:Familiar-Possessed - Lyna
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * An [[Card evolutions|advanced]] form of "[[Happy Lover]]" appears in this card's artwork.
  ** The bolt of blue lightning that appears in this card's artwork seems to be the same one that appears in the artwork of "[[Familiar-Possessed - Dharc]]".
  * This monster is an upgraded form of "[[Lyna the Light Charmer]]".
