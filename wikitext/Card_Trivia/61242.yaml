title: Card Trivia:V-Tiger Jet
wikitext: |-
  {{Navigation}}

  * This card (with its original anime artwork) appears in the original anime artwork of "[[Montage Dragon]]".
  * This card, along with "[[X-Head Cannon]]", are the the only two [[Normal Monsters]] in "[[A-to-Z]]" series.
  ** Both monsters share the similarity of being the topmost monster in their respective [[Fusion Monster]]s: "[[XYZ-Dragon Cannon]]" and "[[VW-Tiger Catapult]]".
