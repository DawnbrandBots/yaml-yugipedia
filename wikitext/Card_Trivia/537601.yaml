title: Card Trivia:Hiita the Fire Charmer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Over Rush Pack 4]]'', ''[[Structure Deck: Spirit Charmers]]''/''[[Structure Deck: Masters of the Spiritual Arts]]'', ''[[Structure Deck: Masters of the Spiritual Arts Spirit Art Awakening Pack]]'', and ''[[Structure Deck: Masters of the Spiritual Arts - The Legend of Duelist Quarter Century Edition]]''.
  * This monster appears in the artworks of "[[Attribute Gravity]]", "[[Grand Spiritual Art - Ichirin]]", "[[Spirit Charmers]]", and "[[Spiritual Fire Art - Kurenai]]" (although the middle two may be featuring "[[Hiita the Fire Charmer, Ablaze]]" instead).
  * "[[Fox Fire]]" appears in this card's artwork, serving as this monster's familiar.
  ** This makes this the only "[[Charmer]]" monster to feature an [[Effect Monster]] as a familiar.
  * This monster's name, "Hiita" (ヒータ, ''Hīta''), is derived from of the word "heat" (ヒート, ''Hīto'')
  * This monster has five [[Card evolutions|upgraded]] [[counterpart]]s: 
  ** A "[[Familiar-Possessed]]" counterpart: "[[Familiar-Possessed - Hiita]]".
  ** A [[Link Monster|Link]] counterpart: "[[Hiita the Fire Charmer, Ablaze]]".
  ** A Channeler counterpart: "[[Hiita the Fire Channeler]]".
  ** A [[Cataclysmic Charmer]] counterpart: "[[Blazing Hiita]]".
  ** A retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Hiita the Fire Spiritualist]]".
