title: Card Trivia:Half or Nothing
wikitext: |-
  {{Navigation}}

  * "[[Judge Man]]" appears in this card's artwork.
  * This card's artwork (and its effect, to a lesser extent) references [[wikipedia:Aesop's Fables|Aesop's fable]] of "[[wikipedia:The Honest Woodman|The Honest Woodman]]", where the titular protagonist loses his axe but is offered (separately) a silver axe and a golden axe, under the assumption that one of them is his, as a test of honesty.
  ** This fable is also referenced by "[[Fairy of the Spring]]" and "[[Lucky Iron Axe]]".
