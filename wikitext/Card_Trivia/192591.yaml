title: Card Trivia:Tomato in Tomato
wikitext: |-
  {{Navigation|mode=otherGame}}

  * Multiple copies of this monster appear in the artworks of "[[Frightfur Parade]]" and "[[Toy Parade]]".
  * This monster's Japanese name, "Tomatomatryoshka" (トマトマトリョーシカ, ''Tomatomatoryōshika'') is a pun on "[[wikipedia:Matryoshka doll|matryoshka doll]]", a series of Russian dolls of different decreasing sizes that can be placed inside of the other.
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster's effect [[Special Summon]]s a copy of itself from the [[Deck]], the top of its tomato-like head popped off, revealing another copy inside similar to a matryoshka doll.
  ** This monster's Japanese name is a portmanteau of "tomato" (トマト, ''tomato'') and "Matrix" (マトリョーシカ, ''matoryōshika''), with the name featuring a repetition of the former word.
