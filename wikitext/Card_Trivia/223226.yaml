title: Card Trivia:Spellbook of Eternity
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is derived from the [[wikipedia:Almanac|almanac]], which was used for astronomical data and various statistics.
  * The word ''"Alma"'' is Latin for "soul", and can be also translated in Greek as "jump"; this fits this card's effect to retrieve [[banish]]ed [[Spell Card]]s, which "jump" back to your [[hand]].
