title: Card Trivia:Horn of Heaven
wikitext: |-
  {{Navigation}}

  * This horn appears in the artwork of "[[Harvest Angel of Wisdom]]" and "[[Smashing Horn]]".
  * This card has two [[counterpart]]s: "[[Black Horn of Heaven]]" and "[[Grand Horn of Heaven]]".
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this was a [[Normal Trap Card]] instead of a [[Counter Trap Card]].
  * This was the first card used in the anime that has an activation [[cost]].
  ** [[Horn of Heaven (anime)|This card]] was first used in [[Yami Yugi and Yami Bakura's Duelist Kingdom Duel]], the first anime-exclusive Duel in the ''Yu-Gi-Oh!'' anime.
