title: Card Trivia:Veiss Shark
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster is a [[Main Deck]] "[[Shark (archetype)|Shark]]" [[counterpart]] of "[[Number C32: Shark Drake Veiss]]".
  ** This monster's name and appearance are based on "Shark Drake Veiss".
  ** This monster's [[Level]] (4) matches the [[Rank]] (4) of "Shark Drake Veiss".
  ** This monster's [[original ATK and DEF]] (1800/1100) are 1000 less than those of "Shark Drake Veiss" (2800/2100).
