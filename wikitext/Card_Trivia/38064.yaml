title: Card Trivia:Red-Eyes Wyvern
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Wyvern|wyvern]], a creature from [[wikipedia:European mythology|European mythology]] who is depicted as a winged dragon without forearms.
  * This is the first "[[Red-Eyes]]" monster whose [[Attribute]] is not [[DARK]].
  * "[[Gearfried the Red-Eyes Iron Knight]]" can be seen as a [[Warrior]] counterpart to this monster:
  ** Both share the same [[Level]] (4) and [[original ATK and DEF]] (1800/1600).
  ** Both feature effects that allows the player to [[Special Summon]] "Red-Eyes" monsters from the [[Graveyard]].
