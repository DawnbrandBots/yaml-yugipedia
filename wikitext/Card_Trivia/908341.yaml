title: Card Trivia:End of the Line
wikitext: |-
  {{Navigation}}

  * "[[Dekoichi the Battlechanted Locomotive]]" and a hologram of "[[Pot of Greed]]" appear in this card's artwork.
  * This card's Japanese name, ''Sōmatō'' ({{Ruby|走|そう}}{{Ruby|魔|ま}}{{Ruby|灯|とう}}), is a pun on ''[[wikipedia:ja:走馬灯|Sōmatō]]'' (Japanese: 走馬灯), also known as the revolving lantern, a type of Chinese lantern with a rotating decorated lantern globe. In Asian superstitions, the revolving lantern is said to be related to the flashbacks one sees at the end of their life, which is reflected in this card's effect of allowing the player to [[draw]] cards while their [[Life Points]] are close to 0.
  ** This card's ''[[TCG]]'' is based on the expression meaning the conclusion of something in which there are no available options or further progress that is possible, which reflects how this card's effects are activated when the player is near the end of the Duel while their Life Points are close to 0.
  *** This card's ''TCG'' name originates from the idea of reaching the last stop on a train line. Fittingly, this card's artwork depicts "Dekoichi the Battlechanted Locomotive" in a railway line, while ironically, the railway line appears to loop around the lantern without an ending.
  * This card's effect allows the player to draw a maximum of four cards from the Deck. In Japanese, the number "4" ("shi") shares the same reading with the word "death" (死), which reflects how this card's effects can only be [[activate]]d when the player is on the verge of losing while their Life Points are close to 0.
  * This is one of the few cards to feature an effect that involves a Life Point value [[not divisible by 10]].
