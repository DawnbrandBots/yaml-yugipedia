title: Card Trivia:Dragunity Oubliette
wikitext: |-
  {{Navigation}}

  * "[[Brionac, Dragon of the Ice Barrier]]", "[[Dragunity Knight - Areadbhair]]", "[[Gungnir, Dragon of the Ice Barrier]]", "[[Trishula, Dragon of the Ice Barrier]]", and either "[[Sacred Spirit of the Ice Barrier]]" or "[[Prior of the Ice Barrier]]" appear in this card's artwork.
  ** The events depicted in this card's artwork appear to continue in the artwork of "[[Void Trap Hole]]".
  * The depiction of "Areadbhair" attacking "Brionac" is a reference to the hoax purporting the name "Brionac" as the name of [[wikipedia:Lugh|Lugh's spear]] during the time that "Brionac" was released in the ''OCG'' in 2008.
  ** "Areadbhair" was also named after Lugh's spear, although using the name given in a 17th mythology narrative titled ''The Fate of the Children of Tuireann''. Both "Areadbhair" and this card were released in 2021, by this time the name "Brionnac" has been debunked as fabrication.
  ** This card's ''[[TCG]]'' name is derived from the French word "oubliette", meaning "to forget", referencing the aforementioned fabricated history of the word "Brionac". Its change from the Japanese name "Dragunity Void" was most likely done to avoid supporting the "[[Void]]" [[archetype]] in the ''TCG''.
