title: Card Trivia:Meteor Black Mars Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a <i>[[Rush Duel]]</i>-original retrained [[Effect Monster|Effect]] [[counterpart]] of "[[Meteor Black Dragon (Rush Duel)|Meteor Black Dragon]]".
  ** This monster is named after [[wikipedia:Mars (planet)|Mars]], the fourth planet in the [[wikipedia:Solar System|Solar System]].
  *** This monster's name is also based on the [[Guardian Star]] Mars, which is the first Guardian Star of "[[Meteor B. Dragon (FMR)|Meteor Black Dragon]]" in ''[[Yu-Gi-Oh! Forbidden Memories]]'', and the equivalent of the [[Fire (Alignment)|Fire]] [[Alignment]] in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series.
  *** This monster's [[FIRE]] [[Attribute]] and fiery appearance also reference the Japanese name of Mars, "Kasei" (火星), which translates to "Fire Star".
