title: Card Trivia:Collected Power
wikitext: |-
  {{Navigation}}

  * This card may be a reference to the numerous "gathered power attacks" seen in Shonen manga/anime. The most famous example is probably Goku's "Spirit Bomb", or "Genki-Dama", attack from the ''Dragon Ball Z'' series, which this card strongly resembles.
  * This card's artwork seems to depict the event occurring directly before the event of "[[Hyper Burning]]".
