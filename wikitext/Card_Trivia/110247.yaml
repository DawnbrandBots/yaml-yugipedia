title: Card Trivia:Sixth Sense
wikitext: |-
  {{Navigation}}

  * It took 10 years for this card to get released in the ''[[TCG]]''.
  * In addition to the regular meaning of "sixth sense", this card's name may also reference the six sides of a regular die, used for this card's effect.
  * This is the only Gambling card that is [[Forbidden]].
  * This card has never been [[Unlimited]] in the ''TCG'', as it was immediately [[Limited]] on the day it was released and shortly thereafter made Forbidden.
  ** This card is one of extremely few cards to have never been Unlimited at some point in both the ''TCG'' and ''[[OCG]]'', excluding cards that were released in the extremely early stages of the game before official banlists existed. Another example is "[[Reborn Tengu]]", which was on the ''OCG'' [[March 2012 Lists (OCG)|Forbidden/Limited Lists]] before its release in ''[[Extra Pack 2012]]''.
