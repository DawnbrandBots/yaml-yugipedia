title: Card Trivia:Fallout
wikitext: |-
  {{Navigation}}

  * This card's name and artwork is based on the military term used to describe a soldier who lags behind their unit formation when they stop maintaining their pace, falls behind too far to catch up, or is out of formation at the end of a run.
  ** This term is often encouraged or antagonized by members of the soldier's unit to catch up and remain in formation, most often because there is incentive for remaining together. This is reflected in this card's effect to increase a [[Special Summon]]ed monster's [[ATK]]/[[DEF]] by 4000 at the cost of the player being unable to conduct their [[Draw Phase]], [[Main Phase]], or [[Battle Phase]] for the next five turns.
