title: Card Trivia:Fairy King Albverdich
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Alberich|Alberich]], a dwarf who guards the treasure of the Nibelungen, in Norse mythology.
  * This card is similar in name, effect, and design to "[[Fairy King Truesdale]]".
  ** The Japanese name of "Truesdale", "Oberon", is the French translation of Alberich used for the name of the "King of Fairies" in French and English texts.
  * This card has also similarities with [[Fairy Knight Ingunar]] such as Type, Attribute, theme and naming.
  * Oddly, despite this card being a ''"Fairy King"'', it is actually a [[Plant]]-[[Type]] monster, not a [[Fairy]].
  ** The same is also true for "Fairy King Truesdale".
  * This monster appears in the artwork of "[[Flower Judgment]]".
