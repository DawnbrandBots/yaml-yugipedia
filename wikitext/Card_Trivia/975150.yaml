title: Card Trivia:Battle Royal Mode - Joining
wikitext: |-
  {{Navigation}}

  * "[[Chaos Ancient Gear Giant]]", multiple "[[Ancient Gear Knight]]s", and members of [[Obelisk Force]] appear in this card's artwork.
  ** This card's artwork is a reference to the Obelisk Force's invasion of the [[Xyz Dimension]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, where each member is commonly seen using the depicted "[[Ancient Gear]]" monsters in various flashbacks.
  * This card's name and bulleted effect is based on the [[Arc League Championship]] where [[Duelist]]s must pay a penalty of 2000 [[Life Point]]s by illegally joining a currently active [[Duel]] in the ''Yu-Gi-Oh! ARC-V'' anime.
  ** The bulleted [[Special Summon]]ing effect that triggers the Life Point loss effect references the first on-screen penalty in [[Yu-Gi-Oh! ARC-V - Episode 042|episodes 42]] and [[Yu-Gi-Oh! ARC-V - Episode 043|43]] where [[Dennis McField]] Summons the [[Level 4]] "[[Performage Damage Juggler (anime)|Performage Damage Juggler]]" during the [[Duel]] between [[Yuya Sakaki]], [[Taka]], and [[Nagi]] and loses 2000 Life Points as a penalty.
  ** Both this card's artwork and the above-mentioned facts reference how it was revealed that Dennis was associated with [[Duel Academy (ARC-V)|Duel Academy]] and green-lit their invasion of the Xyz Dimension in the anime.
  * This card's effects protect monsters from being destroyed in battle, but also allow a player to benefit from taking damage. This can be perceived as a reference to the many, many instances in ''ARC-V'' where a monster was protected from destruction in battle but its controller still took damage.

