title: Card Trivia:Odd-Eyes Wing Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the box of ''[[Premium Pack Vol.14 1st Wave]]''.
  * This monster appears in the artwork of "[[Pendulum Dimension]]".
  * This monster is an [[Card evolutions|upgraded]] [[Synchro Pendulum Monster|Synchro Pendulum]] form of "[[Odd-Eyes Pendulum Dragon]]" and "[[Clear Wing Synchro Dragon]]".
  ** This monster's Japanese title, "Supreme King White Dragon", references the white card frame of [[Synchro Monster]]s.
  * This monster is the Synchro [[counterpart]] of "[[Odd-Eyes Venom Dragon]]" and "[[Odd-Eyes Rebellion Dragon]]".
  * This is the last Synchro Monster to be [[Synchro Summon]]ed in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This is also one of the last Pendulum Monsters to be [[Pendulum Summon]]ed in the ''Yu-Gi-Oh! ARC-V'' anime, along with "[[Odd-Eyes Venom Dragon (anime)|Odd-Eyes Venom Dragon]]", "[[Performapal Odd-Eyes Seer]]", and "[[Performapal Ignition Eagle]]".
  * This is the first [[Legal]] [[Pendulum Scale|Scale]] 10 Pendulum Monster to have no negative [[Pendulum Effect]]s or restrictions on the monsters that can be [[Pendulum Summon]]ed with this card and another Pendulum Monster.
  * In the anime, this monster's right eye was green, and its left eye was red, while this monster is depicted with a red right eye and green left eye in its card artwork.
  * This monster's Portuguese name was translated wrong, as it uses the word "Alado" (meaning "Winged") instead of "de Asas" (meaning "Wing).
  ** This is the second "[[Odd-Eyes]]" monster whose Portugese name was mistranslated in-game, the first being "[[Odd-Eyes Arc Pendulum Dragon]]".
