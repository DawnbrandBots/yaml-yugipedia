title: Card Trivia:Valkyrion the Unity Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Magnet Return]]" and "[[Magnet Thunder Charge]]".
  * This monster is a [[retrain]]ed ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Valkyrion the Magna Warrior]]".
  ** Its [[Fusion Monster]] [[Card type|type]] and specific [[Fusion Material]]s are based on how "Valkyrion" was created by combining the three "[[Magnet Warrior]]s", "[[Alpha The Magnet Warrior (manga)|Alpha]]", "[[Beta The Magnet Warrior (manga)|Beta]]", and "[[Gamma The Magnet Warrior (manga)|Gamma]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and anime. In the ''[[OCG]]''/''[[TCG]]'', this would change this to Tributing the components from the field.
  *** This is further reinforced by its [[effect]] to [[send]] itself to the [[Graveyard]] to [[Special Summon]] its Fusion Materials, which is based on how "Valkyrion" was separated back into the three "Magnet Warrior" monsters via "[[De-Fusion (manga)|De-Fusion]]" in the manga, or Tributing itself to Special Summon its components from the Graveyard in the ''OCG''/''TCG''.
  * This is the first and currently only monster with an [[Original ATK and DEF|original DEF]] of 3900 in ''Yu-Gi-Oh! Rush Duel''.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|189|ref}}, specifically from the panel showing "[[Valkyrion the Magna Warrior (manga)|Valkyrion the Magna Warrior]]", albeit reversed.
