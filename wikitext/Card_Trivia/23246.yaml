title: Card Trivia:Mind Over Matter
wikitext: |-
  {{Navigation}}

  * "[[Mind Master]]" appears in this card's artwork
  * The symbol for power on "[[Mind Master]]" is absent on this card's artwork.
  * This is a slightly more situational version of "[[Solemn Judgment]]" or a [[Psychic]] equivalent to the [[Plant]]-based "[[Pollinosis]]".
  * The name of this card is taken from the base theory of the "Noetic Science" (a science that studies the power of the mind). It theorizes that the mind can do anything, so they say "The Mind Is Over Matter".
