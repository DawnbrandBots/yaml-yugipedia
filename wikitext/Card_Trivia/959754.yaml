title: Card Trivia:Absolute Powerforce (card)
wikitext: |-
  {{Navigation}}

  [[File:Red Dragon Archfiend 12.png|thumb|"Red Dragon Archfiend" attacking.]]

  * "[[Red Dragon Archfiend]]" appears in this card's artwork.
  * This card's name is based on the [[Attack and effect names in Yu-Gi-Oh! 5D's|effect name]] (later, also attack name) of "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which would also become the basis for the name of the ''[[Absolute Powerforce]]'' [[Core Booster]] set featuring cards used by [[Jack Atlas]] in the anime.
  * This card mirrors "[[Scrap Fist]]", a support card for "[[Junk Warrior]]". Both cards are battle support cards that prevent the activation of cards and effects, inflict [[Piercing|piercing damage]], and double battle damage.
  ** The difference between both cards is that this card gives "Red Dragon Archfiend" 1000 more [[ATK]], referencing how "Red Dragon Archfiend" has a higher [[original ATK]] than "Junk Warrior" does. "Scrap Fist", however, prevents "Junk Warrior" from being destroyed by battle and destroys the opponent's monster at the end of the [[Damage Step]].
  *** In other words, despite being weaker, "Junk Warrior" can almost always destroy "Red Dragon Archfiend" with "Scrap Fist", even if this card is successfully applied to the latter monster. This reflects how "[[Junk Warrior (anime)|Junk Warrior]]" destroys "Red Dragon Archfiend" in the [[Yu-Gi-Oh! 5D's - Episode 154|final episode]] of ''Yu-Gi-Oh! 5D's''.
