title: Card Trivia:Abysskite Liem
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abysskite Deep Shield]]", "[[Abysskite Mapping]]", "[[Abysskite Miracle Girls]]", and "[[Abysskite Prevent Wall]]", as well as in both artworks of "[[Abysskite Party]]".
  * The character [[Liem Kokai]] from ''[[Yu-Gi-Oh! GO RUSH!!]]'' is based on this monster.
  ** In {{episode|GO RUSH!!|86|ref}}, it is mentioned that in-universe, the resemblance is coincidental, but that she did change her hairstyle to enhance it.

