title: Card Trivia:Sol and Luna
wikitext: |-
  {{Navigation}}

  * This card's name is based on the Latin words for "sun" and "moon", respectively, while this card's artwork depicts two [[Spellcaster]]-like monsters designed after the sun and moon in an upside-down and opposite position.
  ** This reflects this card's effect to [[target]] a monster on the player's and opponent's [[field]], while the bulleted effects are based on those of "[[Book of Taiyou]]" and "[[Book of Moon]]", which are themed after the sun and moon and can switch both monsters in opposite [[battle position]]s.
