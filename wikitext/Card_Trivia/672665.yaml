title: Card Trivia:Transcicada
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Cicada|cicada]], a large insect with large transparent wings that appears mostly in warmer climates. The male cicada is known for creating a loud droning noise by vibrating two membranes on its abdomen.
  ** The "[[Moult Token]]" [[Special Summon]]ed by this monster's effect is based on the [[wikipedia:Exuviae|exuviae]], the remains of an exoskeleton left behind by insects, including cicadas, after undergoing the process of moulting.
