title: Card Trivia:Abyssrhine, the Atlantean Spirit
wikitext: |-
  {{Navigation}}

  * This monster is holding the neck bracelet of "[[Poseidra, the Atlantean Dragon]]" (later the arm bracelet of "[[Mermail Abyssgaios]]") that appears in the artwork of "[[Abyss-squall]]".
  ** According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], this monster resides in "[[Lemuria, the Forgotten City]]", and is the spirit guarding the bracelet.
  * This monster is named after the [[wikipedia:Rhinemaidens|Rhinemaidens]], a trio of sea nymphs who guarded the gold from which the eponymous ring of ''[[wikipedia:Der Ring des Nibelungen|Der Ring des Nibelungen]]'' (which the neck bracelet in this card's artwork is based on) was forged.
  * This monster can be considered the "[[Atlantean]]" [[counterpart]] of "[[Fire King Courtier Ulcanix]]".
  ** Both have effects that can [[Special Summon]] the original [[List of unofficial terms|boss monster]]s of their respective archetypes from the [[Main Deck]].
  ** Both feature the bracelet associated with their respective archetypes in their own artworks: this monster holds it, while "Fire King Courtier Ulcanix" wears it as a headband in the same way as "[[Neptabyss, the Atlantean Prince]]".
  ** Both were released as [[Secret Rare]] cards in ''[[Rage of the Abyss]]'', in the ''[[TCG]]''.
  * This is the first and currently only "Atlantean" monster to not be [[Sea Serpent]].
