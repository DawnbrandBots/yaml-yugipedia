title: Card Trivia:Goblin Marauding Squad
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Snatch Drone]]".
  * This monster references "[[Marauding Captain]]", as supported by the following facts:
  ** At least three of the goblins are attempting to wear wigs with a hairstyle similar to that of "Marauding Captain", as well as two of the goblins wearing similar spiked shoulder pads.
  ** The goblin in the forefront is striking the same pose that "Marauding Captain" does in his own card artwork, as well as wearing a similar cloak (fashioned from its tunic), knee pads, and elbow pads; wielding its standard [[wikipedia:kanabō|kanabō]], but with a sword's hilt; and wearing a chestplate with a similar golden cross-like design.
  ** The goblins have encountered "Marauding Captain" before, as indicated by the artworks of "[[Assault on GHQ]]" and "[[Prepare to Strike Back]]".
