title: Card Trivia:Ursarctic Mikpolar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ursarctic Big Dipper]]", "[[Ursarctic Departure]]", and "[[Ursarctic Slider]]".
  * This monster's name is a portmanteau of "micro" and "''Ursus polaris''", the Latin name of the [[wikipedia:Polar bear|polar bear]].
