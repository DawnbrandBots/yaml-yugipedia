title: Card Trivia:Nightmare Apprentice
wikitext: |-
  {{Navigation}}

  * This monster is an [[Illusion]] counterpart of "[[Dark Magician Girl]]" and "[[Apprentice Illusion Magician]]".
  ** This monster has the same [[Special Summon]]ing method and [[search]]ing effect as "Apprentice Illusion Magician".
  * This monster is the apprentice and feminine counterpart of "[[Nightmare Magician]]".
  ** This card's artwork depicts the same magic circle as the one in the artwork of "Nightmare Magician".
