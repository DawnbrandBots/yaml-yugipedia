title: Card Trivia:Cyber Tutubon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[counterpart]] of "[[Cyber Tutu]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] itself from the player's [[hand]] by [[Tribute|Tributing]] a [[Fairy]] or [[Warrior]] monster references [[Alexis Rhodes]]' (and her [[Alexis Rhodes (ARC-V)|alternate version's]]) usage of the "[[Cyber Angel]]" [[archetype]] and [[Cyber Girl]] [[series]], both of which primarily consists of Fairy and Warrior monsters, respectively.
