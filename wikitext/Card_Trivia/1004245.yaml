title: Card Trivia:Deep Space Yggdrago
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Deep Space Impact]]" and "[[Space Resonance]]".
  * This monster is a [[Space]] and [[DARK]] [[counterpart]] of "[[Yggdrago the Sky Emperor]]" in [[Maximum Mode]].
  ** In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, this monster's [[Summon chants in Yu-Gi-Oh! GO RUSH!!|Summoning chant]] resembles the [[Summon chants in Yu-Gi-Oh! SEVENS|Summoning chant]] of "Yggdrago the Sky Emperor" in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
