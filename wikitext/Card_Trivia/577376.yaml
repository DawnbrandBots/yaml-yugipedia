title: Card Trivia:Orcustrated Release
wikitext: |-
  {{Navigation}}

  * "[[Guardragon Pisty]]", "[[Guardragon Agarpain]]", "[[Guardragon Elpy]]", "[[Galatea, the Orcust Automaton]]", "[[Longirsu, the Orcust Orchestrator]]", and the corpse of "[[Crowned by the World Chalice]]" appear in this card's artwork.
  * The word "Release" in this card's name has a number of potential double meanings.
  ** It is the Japanese term for the [[Tribute]] game mechanic, which is this card's activation cost.
  ** It could refer to the release of the [[Guardragon]]s in the background, or of "[[Lee the World Chalice Fairy]]"'s spirit stored in "[[Galatea, the Orcust Automaton]]".
  ** It can, in Japanese, be read as [[wikipedia:Lilith|Lilith]], potentially related to the serpent referred to in the Japanese lore text of "[[Guardragon Justicia]]" or simply a religious allusion as is common for cards thematically related to the "[[World Legacy]]" archetype.
  ** The Japanese name ”リリース” includes the Japanese name of "[[Lee the World Chalice Fairy]]", "リース".
  ** It is also a musical term, as is common amongst [[Orcust]] cards. It refers to the act or manner of ending a sound.
