title: Card Trivia:Infinite Machine
wikitext: |-
  {{Navigation}}

  * This card's name references [[wikipedia:Ein Sof|Ein Sof]], the [[wikipedia:Kabbalah|Jewish Kabbalistic]] term representing the concept of infinity.
  ** The translation of Ein Soph is reflected in the two golden rings in this card's artwork, forming the infinity symbol ("∞"). Fittingly, this card also represents [[Z-one]], the leader of his own version of [[Iliaster]], whose members also included [[Aporia|three]] [[Bruno|android]] [[Paradox|members]] who use monsters with an infinity symbol ("∞") motif in their Japanese anime names or their appearances.
