title: Card Trivia:Re-Fusion
wikitext: |-
  {{Navigation}}

  * This is a [[fusion]] version of "[[Fulfillment of the Contract]]" and "[[Premature Burial]]", as well as possibly "[[Wicked Rebirth]]".
  * This is one of few cards seen in the anime, but never actually played.
  * This card's artwork seems to be a more realistic version of the artwork of "[[Polymerization]]".
