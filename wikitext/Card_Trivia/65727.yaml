title: Card Trivia:Chain Material
wikitext: |-
  {{Navigation}}

  * The cards "[[Flame Manipulator]]", "[[Heart of the Underdog]]", and "[[Masaki the Legendary Swordsman]]" appear in this card's Japanese anime and ''[[OCG]]''/''[[TCG]]'' artworks.
  ** The cards "[[Black Luster Soldier - Envoy of the Beginning]]" and "[[Cold Wave]]" appear in this card's international anime artwork.
  * The appearance of the above-mentioned cards in this card's Japanese anime and ''OCG''/''TCG'' artworks likely reference [[Joey Wheeler]], as the two monsters are [[Fusion Material]] for one of his [[signature card]]s, "[[Flame Swordsman]]".
  ** The presence of "Heart of the Underdog" references the running gag that Joey is subjected to throughout the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime: the card's Japanese name, "''Bonkotsu no Iji''", features the word "''bonkotsu''", a term that [[Seto Kaiba]] frequently uses to insult Joey. This is further reinforced during the [[Grand Championship (arc)|Grand Championship]] arc, where [[Yugi Muto]] points out that "Heart of the Underdog" reminds him of Joey because he is considered to be the underdog.
  ** The cards may indicate that the depicted [[Deck]] is a [[Normal Monster]] Deck, since "Masaki the Legendary Swordsman" and "Flame Manipulator" are both Normal Monsters, which the effect of "Heart of the Underdog" [[support]]s.
  * This is the only card to depict where [[banish]]ed cards are placed in its artwork.
