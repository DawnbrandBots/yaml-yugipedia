title: Card Trivia:Moulinglacia the Elemental Lord
wikitext: |-
  {{Navigation}}

  * Like the other "[[Elemental Lord]]" cards, this monster's given name is in a unique Western language, in this case French ("Moulin Glace" literally means "Ice Mill").
  ** However, it is more likely named after the geological [[wikipedia:moulin (geomorphology)|moulin]] or glacier mill; a roughly circular, vertical to nearly vertical well-like shaft within a [[wikipedia:glacier|glacier]] through which [[wikipedia:water|water]] enters from the surface.
  * Like the other "Elemental Lords", this monster's summon-triggered effect is reminiscent of a (previously) banned card, in this case: "[[Delinquent Duo]]".
  * This monster appears in the artwork of "[[Chaos Alliance]]".
