title: Card Trivia:Block Golem
wikitext: |-
  {{Navigation}}

  * This monster shares similarities with "[[Blockman]]", another monster themed around [[building blocks]]. 
  ** Both share the same [[Attribute]] ([[EARTH]]), [[Type]] ([[Rock]]), and [[original ATK and DEF]] (1000/1500).
  ** Both monsters feature an effect that can [[Tribute]] themselves to [[Special Summon]] multiple [[Level 4]] Rock monsters.
