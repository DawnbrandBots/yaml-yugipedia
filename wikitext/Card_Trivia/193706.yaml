title: 'Card Trivia:Number 91: Thunder Spark Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * The number "91" appears on the left side of this monster's head.
  * This is the first [[Xyz Monster]] in the manga that requires 5 [[Xyz Material]]s.
  ** This is also the first Xyz Monster to have the number of Xyz Materials changed when it was released in the ''[[OCG]]''/''[[TCG]]''.

  * "Number" monsters often take the form of their owner's initial ambitions and desires; in this monster's case, it represents its owner, [[Thunder Spark]], who shares its same with him.
  ** This monster's appearance is based on an [[wikipedia:Electric Eel|electric eel]], a species of eel known for their ability to stun their prey by generating electricity. In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, Thunder Spark's body was created from an electron, and thus couldn't touch anyone due to them being electrified.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|ZEXAL|014|ref}}, specifically from the panel showing [[No. 91: Thunder Spark Dragon (manga)|this monster]] while entering the desert portion of the [[Speed Field]].
