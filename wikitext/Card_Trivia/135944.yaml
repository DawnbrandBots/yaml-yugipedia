title: Card Trivia:Ojamagic
wikitext: |-
  {{Navigation}}

  * "[[Ojama Black]]", "[[Ojama Green]]" and "[[Ojama Yellow]]" appear in this card's artwork.
  * The figure hidden behind the red curtain in this card's artwork is based on a ''[[wikipedia:Kuroko|kuroko]]'', a stagehand in [[wikipedia:Theatre of Japan|traditional Japanese theatre]] who is dressed in all-black clothing, indicating that they are invisible and not part of the action on-stage.
