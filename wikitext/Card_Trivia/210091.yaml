title: Card Trivia:Catapult Zone
wikitext: |-
  {{Navigation}}

  * The castle in this card's artwork appears in the artworks of "[[Imperial Iron Wall]]", "[[Rock Bombardment]]", "[[Royal Decree]]", "[[Royal Surrender]]", and "[[The Huge Revolution is Over]]".
  * This card's artwork is similar to the artwork of "[[Throwstone Unit]]", which also depicts knights and/or warriors using a [[wikipedia:Catapult|catapult]] to launch stones at a castle.
