title: Card Trivia:H - Heated Heart
wikitext: |-
  {{Navigation}}

  * The blue letter "H" in this card's artwork appears in the artworks of "[[H.E.R.O. Flash!]]" and "[[Hero Flash!!]]".
  * This is the only card required to activate "Hero Flash!!" that does not specifically [[support]] "[[Elemental HERO]]" monsters.
