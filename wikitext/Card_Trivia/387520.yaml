title: Card Trivia:Card of the Soul
wikitext: |-
  {{Navigation}}

  [[File:Yugi draws Gandora.png|thumb|250px|[[Yugi Mutou (manga)|Yugi Mutou]] draws "[[Gandora the Dragon of Destruction (manga)|Gandora the Dragon of Destruction]]".]]
  * This card's artwork is based on a scene from {{chapter|Yu-Gi-Oh!|327|ref}}, specifically from the panel showing [[Yugi Mutou (manga)|Yugi Mutou]] [[draw]]ing "[[Gandora the Dragon of Destruction (manga)|Gandora the Dragon of Destruction]]".
  * This card's name is based on the Japanese term "''tamashī no kādo''" (i.e. "soul card", or "card of the soul"), which has been used several times in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** In {{chapter|Yu-Gi-Oh!|183|ref}}, after [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] demanded [[Ryota Kajiki (manga)|Ryota Kajiki]] to answer why he chose to [[Special Summon]] "[[The Legendary Fisherman (manga)|The Legendary Fisherman]]" instead of "[[Fortress Whale (manga)|Fortress Whale]]" in the [[Yu-Gi-Oh! - Duel 327|previous chapter]], Ryota referred to "The Legendary Fisherman" as his "soul card". In response, Jonouchi internally echoed the term to himself.
  ** In {{episode|Yu-Gi-Oh!|087|ref}}, after "[[Jinzo (anime)|Jinzo]]" [[destroy]]s [[Odion]]'s [[Trap Card]]s via its effect, [[Joey Wheeler]] referred to "Jinzo" as a "soul card" that he inherited from [[Espa Roba|someone]] he Dueled against.
  ** In {{chapter|Yu-Gi-Oh!|260|ref}}, after [[Dark Yugi (manga)|Dark Yugi]] Special Summoned "[[Red-Eyes Black Dragon (manga)|Red-Eyes Black Dragon]]" via the effect of [[Seto Kaiba (manga)|Seto Kaiba]]'s "[[The Flute of Summoning Dragon (manga)|The Flute of Summoning Dragon]]", Dark Yugi referred to that monster as the "soul card" that Jonouchi gave him.

