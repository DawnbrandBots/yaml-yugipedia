title: Card Trivia:Emerging Emergency Rescute Rescue
wikitext: |-
  {{Navigation}}

  * "[[Rescue Cat]]", "[[Rescue Ferret]]", "[[Rescue Hamster]]", and "[[Rescue Rabbit]]" appear in this card's artwork.
  ** The hedgehog in the artwork is seemingly a younger version of "[[Rescue Hedgehog]]", which had not yet been released when this card was.
  * The pronunciation of this card's Japanese name, "Urgent Emergency Assistance Rescue" (きんきゅうきゅうきゅうきゅうめいレスキュー, ''Kin'''kyū''' '''Kyūkyū''' '''Kyū'''mei Resu'''kyū''''') is an alliterative pun on the pronunciation of ''kyū'' ("きゅう").

  == See also ==
