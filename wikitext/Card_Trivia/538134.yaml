title: Card Trivia:Timidity
wikitext: |-
  {{Navigation}}

  * "[[Dark Scorpion - Chick the Yellow]]" appears in this card's artwork.
  ** This card's artwork depicts "Chick the Yellow" with a frightened expression, as "yellow" is a slang term for cowardice.
  * The visual effect of drafty air in this card's artwork is a play on how the word "timidity" (臆病風) is written with the character for "wind" (風) in Japanese.
