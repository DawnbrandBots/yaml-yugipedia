title: Card Trivia:Sanctity of Dragon
wikitext: |-
  {{Navigation}}

  * This card may be a reference to the legend of [[wikipedia:Saint George and the Dragon|Saint George and the Dragon]], with this card referencing the dragon that [[wikipedia:Saint George|Saint George]] fought and slew.
  ** This card, along with its accompanying [[Match winner]], "[[Iron Knight of Revolution]]", share a common English theme, which fits with the original intention to hold the [[World Championship 2017]] in [[wikipedia:London|London, England]] before it was moved to [[wikipedia:Tokyo|Tokyo, Japan]].
  * This card and "[[Iron Knight of Revolution]]" are the first [[Match winner]]s that are [[Link Monster]]s.
  ** They are also both the first [[Nomi]] and [[TCG exclusive]] Link Monsters.
  * This is the first [[Link 5 Monster Cards|Link 5]] [[Link Monster]].
