title: Card Trivia:Archfiend Emperor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Archfiend's Fervor]]".
  * This monster is the [[Ritual Pendulum Monster|Ritual Pendulum]] form of "[[Royal Archfiend]]".
  * This monster shares the same [[original ATK and DEF]] (2500/1200) as "[[Summoned Skull]]".
  ** This monster's [[Level]] (7) is also the same as "[[Summoned Skull (manga)|Summoned Skull]]" in the manga.
