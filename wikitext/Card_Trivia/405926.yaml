title: Card Trivia:Apprentice Illusion Magician
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster is based on [[Mana]] and her ''[[ka]]'' in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], [[Dark Magician Girl (character)|Dark Magician Girl]].
  ** This card has the same [[Type]], [[Attribute]], [[Level]], [[ATK]] and [[DEF]] as "[[Dark Magician Girl]]".
  ** This card is a counterpart of "[[Ebon Illusion Magician]]", which is based on [[Mahad]] (whom Mana served as an apprentice to) and his ''ka'', [[Illusion Magician]].
  * This monster has an [[Illusion]] counterpart: "[[Nightmare Apprentice]]".
  * This card has the same ATK, Type, and [[Special Summon]] effect as "[[The Tricky]]", another monster used by [[Yami Yugi]] in the manga and anime.
  * This card's ATK/DEF-increasing [[Quick Effect]] is likely a reference to the effect of "[[Dark Magic Twin Burst]]".
  * This card's Spanish printed name features a typo, as the word "Illusion" is spelled "Iusion" instead.
