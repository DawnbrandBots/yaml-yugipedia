title: Card Trivia:Speedroid Den-Den Daiko Duke
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Speedlift]]".
  * This monster is based on a ''[[wikipedia:Den-den daiko|Den-den daiko]]'', a Japanese hand-held pellet drum used in Shinto-Buddhist ceremonies.
  ** This monster's Japanese name (電々大公, ''Denden Daikō'') is a pun on its appearance: 
  *** "''Denden''" (電々) is the Japanese word for "electric", reflecting this monster's electric bolt motif.
  *** "''Daikō''" has a similar pronunciation with "''taikō''" (大公), the Japanese word for "archduke", reflecting how it is designed after a European [[wikipedia:Archduke|archduke]] from the [[wikipedia:Middle Ages|Middle Ages]].
  * This is the first "[[Speedroid]]" [[Tuner monster]] to not be a "[[Dice (archetype)|Dice]]" monster.
