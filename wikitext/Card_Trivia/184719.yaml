title: 'Card Trivia:Number 16: Shock Master'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Summon Gate]]".
  * The number "16" appears on this monster's waist.
  * This monster's Japanese title, "Ruler of Color" ({{Ruby|色|いろ}}の{{Ruby|支|し}}{{Ruby|配|はい}}{{Ruby|者|しゃ}}, ''Iro no Shihaisha'') reflect its effect to prevent the [[activate|activation]] of the effects of [[Spell]]s, [[Trap]]s, and [[Monster Card]]s, which feature different colored card borders.
  ** This monster's Japanese name, "Shock Ruler" (ショック・ルーラー, ''Shokku Rūrā'') is a pun on one of the ''onyo'' readings of the kanji for "color" (色, しょく, ''shoku''), which is pronounced similarly to the word "shock" (ショック, ''shokku'').
  *** Fittingly, this monster's [[neutral form]] resembles a [[wikipedia:Prism (optics)|prism]], a transparent optical element with a flat, polished surface which can refract and reflect light, including those of different colors.
  * This is the first [[Fairy]] "[[Number]]" monster, as well as the first "Number" monster to be [[Forbidden]].
  ** Coincidentally, this monster was [[September 2013 Lists (TCG)|made]] Forbidden in the ''[[TCG]]'', around the same time that "[[Number 11: Big Eye]]" [[September 2013 Lists (OCG)|made]] [[Limited]] in the ''[[OCG]]''. Fittingly, both monsters were used by [[Fortuno]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster detaches an Xyz Material, it absorbs it into its center horn. Its effect then uses the bigger eyes above its face as spotlights and [[reveal]]s the [[face-down]] cards on the field of the declared [[Card type|type]] before launching the center horn on its forehead, which skewers the revealed card. Afterwards, this monster's horn regrows.
