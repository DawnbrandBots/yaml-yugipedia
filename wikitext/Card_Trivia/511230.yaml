title: Card Trivia:Option Hunter
wikitext: |-
  {{Navigation}}

  * The monster in this card's artwork is taken from the [[wikipedia:Konami|Konami]] game series ''[[wikipedia:Gradius|Gradius]]''. In the game, Option Hunters appear at set intervals late in the game to attempt to steal the player's options.
  * This card has an [[Anime-only|anime-exclusive]] counterpart: "[[Wish of Final Effort]]".
