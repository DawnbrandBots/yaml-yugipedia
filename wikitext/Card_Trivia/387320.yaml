title: Card Trivia:Satellarknight Zefrathuban
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chosen of Zefra]]".
  * This monster's name is based [[wikipedia:Thuban|Thuban]], the alpha star in the constellation of [[wikipedia:Draco (constellation)|Draco]].
  ** This monster's Japanese name, "Aesatellarknight Sephirathuban" ({{Ruby|竜星因士|イーサテラナイト}}－セフィラツバーン ''Īsateranaito - Sefira Tsubān''), is also based on the [[wikipedia:Aether (mythology)|Aether]].
  ** Fittingly, the constellation of Draco appears in this card's artwork, with Thuban's location indicated by an encircled star.
  * This monster's armor is based on on "[[Chiwen, Light of the Yang Zing]]".
  ** The kanji「{{Ruby|竜|イー}}{{Ruby|星|サテ}}」(''Īsate'', "Dragon Star") is the same as the kanji「{{Ruby|竜|りゅう}}{{Ruby|星|せい}}」(''Ryūsei'', "Dragon Star") in the Japanese name of the "[[Yang Zing]]" monsters.
  * This monster features the same red sphere as "[[Qliphort Cephalopod]]" and "[[Infernoid Piaty]]".
