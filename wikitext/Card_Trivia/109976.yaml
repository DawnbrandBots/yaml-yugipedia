title: Card Trivia:Pendulum Machine
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Limited Edition 2: Keith Pack]]''.
  * This monster appears in the artwork of "[[Heavy Metal Raiders]]".
  * A plastic figurine toy was released for this card long before it was released as a card for the ''[[TCG]]''.
  * This card's first ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|120|ref}}, specifically from the panel where [[Dark Yugi (manga)|Dark Yugi]] thinks to himself that [[Katsuya Jonouchi (manga)|Jonouchi]] should watch out for [[Pendulum Machine (manga)|this monster's]] special ability.
