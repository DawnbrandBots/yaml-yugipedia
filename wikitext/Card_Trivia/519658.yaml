title: Card Trivia:World Legacy Trap Globe
wikitext: |-
  {{Navigation}}

  * "[[Ningirsu the World Chalice Warrior]]", "[[Ib the World Chalice Priestess]]", "[[Auram the World Chalice Blademaster]]", "[[Lee the World Chalice Fairy]]" and the remains of several "[[Krawler]]" monsters appear in this card's artwork. A few members of the "[[Mekk-Knight]]" archetype can also be seen in the upper-right corner of this card's artwork, entrapping "Ib" in a sphere of energy.
  * The events depicted in this card's artwork are continued in the artwork of "[[World Legacy Key]]", which show "Ib" in the custody of the "Mekk-Knight" monsters.
  * This card is the second card in a sequence of "[[World Legacy]]" [[Spell]]/[[Trap]] cards that depict "[[Lee the World Chalice Fairy]]" becoming corrupted. In the first card, "[[World Legacy Clash]]", "Lee" can be seen with one device projecting dark red light. In this card's artwork, the light from two of the four devices appears dark red. Her transformation continues in the artwork of "[[Mekk-Knight]]" support cards. In "[[World Legacy Whispers]]", three lights have turned red, and in "[[World Legacy's Secret]]", all four devices have been corrupted and "Lee" is depicted in shadow with sinister red facial features.
