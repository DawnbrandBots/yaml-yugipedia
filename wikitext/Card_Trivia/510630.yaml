title: Card Trivia:Elemental HERO Tempest
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Destruction Chant of the Sacred Beast]]" and "[[UFOroid Fighter]]" (being part of that monster).
  * This monster is the [[Fusion Monster|Fusion]] form of "[[Elemental HERO Avian]]", "[[Elemental HERO Sparkman]]", and "[[Elemental HERO Bubbleman]]".
  ** This monster's [[Fusion Material]]s reference the elements that make up a typical tempest, a violent and windy storm: intense winds (represented by the [[WIND]] [[Attribute]] "Avian"), lightning (represented by the electric-themed "Sparkman"), and heavy rain (represented by the [[WATER]] Attribute "Bubbleman").
  ** When this monster debuted in {{episode|GX|011|ref}}, it was likely intended to be a parallel of the [[Paradox Brothers]]' usage of "[[Gate Guardian (later anime)|Gate Guardian]]", which was also composed of three monsters representing the same elements: "[[Kazejin (anime)|Kazejin]]" (wind), "[[Suijin (anime)|Suijin]]" (water), and [[Sanga of the Thunder (anime)|Sanga of the Thunder]]" (lightning). This is further supported by the fact that this monster had a similar Summoning sequence in that episode to "[[Gate Guardian (anime)|Gate Guardian]]" in {{episode|Yu-Gi-Oh!|020|ref}}, as seen by both monsters being Summoned by having their "component" monsters transforming into different-colored beams of light and spiraling into a focused point.
  * This monster has a ''[[Rush Duel]]'' counterpart: "[[Elemental HERO Heliosphere]]".
  * In {{episode|GX|021|ref}}, as [[Jaden Yuki]] attempted to [[Fusion Summon]] this monster, he referred to it as his "strongest Hero".
