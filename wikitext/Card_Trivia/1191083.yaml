title: Card Trivia:Red-Eyes Black Dragon Exceed
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Beyond The Brave]]''.
  * This monster is an [[aged counterpart]] of "[[Red-Eyes Black Dragon]]".
  * This monster's pose is based on that of the first artwork of "[[Blue-Eyes White Dragon]]".
  * This monster appears to represent the realized potential of "Red-Eyes Black Dragon", which is stronger than "Blue-Eyes White Dragon".
  * This monster is a [[Fusion Monster|Fusion]] [[counterpart]] of "[[Red-Eyes Black Fullmetal Dragon]]".
  ** Both monsters are [[Card evolutions|upgraded]] versions of "Red-Eyes Black Dragon" with an [[original ATK]] of 3400.
  ** This monster's immunity to the effects of the opponent's [[Spell Card]]s is a reference to "[[Metalmorph (manga)|Metalmorph]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ("[[Magic Metal Force]]" in the [[Yu-Gi-Oh! (anime)|anime]]), which makes the [[equip]]ped monster immune to destruction by Spell Cards and magical attacks.
  ** This monster's alternate [[Summoning condition]], which allows the player to [[Tribute]] a monster the opponent controls to [[Special Summon]] it during the turn a monster(s) is  [[destroy]]ed via the effect of "[[Dark Time Wizard]]", is a reference to how, during the [[Battle City (manga arc)|Battle City]] arc of the ''Yu-Gi-Oh!'' manga (and its [[Battle City (part 1)|two]]-[[Battle City (part 2)|part]] anime adaptation), [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] ([[Joey Wheeler]] in the anime) did not have ownership of his "[[Red-Eyes Black Dragon (manga)|Red-Eyes Black Dragon]]" ("[[Red-Eyes B. Dragon (anime)|Red-Eyes B. Dragon]]" in the anime), as he allowed [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in the anime) to keep it after winning it from the defeated [[Rare Hunter 1 (manga)|Rare Hunter]] ([[Seeker]] in the anime).
