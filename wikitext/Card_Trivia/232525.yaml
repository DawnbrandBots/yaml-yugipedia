title: Card Trivia:Fire Formation - Tensen
wikitext: |-
  {{Navigation}}

  * "[[Brotherhood of the Fire Fist - Dragon]]" and "[[Brotherhood of the Fire Fist - Snake]]" appear in this card's artwork.
  * This card is named after "''Tensen''" (天璇), the Chinese-Japanese astronomy name for ''[[wikipedia:Dubhe|Alpha Ursae Majoris]]'', one of the seven stars in the constellation of [[wikipedia:Ursa Major|Ursa Major]].
  * Like other "[[Fire Formation]]" cards, this card's effect is a variant on an existing [[Spell]]/[[Trap Card]]. In this card's case, its effect is based on "[[Rush Recklessly]]".
