title: Card Trivia:Homunculus the Alchemic Being
wikitext: |-
  {{Navigation}}

  * In [[wikipedia:Alchemy|alchemy]], a [[wikipedia:Homunculus|homunculus]] is a being created by alchemical processes, generally to do the bidding of its creator. They are usually created from [[wikipedia:plant|plants]] altered to generate a womb (hence this card's [[Type]]).
  * This monster's appearance may be based on the homunculi from ''[[wikipedia:Fullmetal Alchemist|Fullmetal Alchemist]]''.
