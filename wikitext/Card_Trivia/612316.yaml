title: Card Trivia:Two Toads with One Sting
wikitext: |-
  {{Navigation}}

  * "[[Ronintoadin]]", "[[Toadally Awesome]]", and "[[Treeborn Frog]]" appear in this card's artwork.
  * This card's Japanese name, "Two Hops with One Sting" ({{Ruby|一|いっ}}{{Ruby|惜|せき}}{{Ruby|二|に}}{{Ruby|跳|ちょう}}, ''Isseki Nichou'') literally means "one sorrow two jumps". It is a play on the Japanese idiom 「一石二鳥」 meaning "to kill two birds with one stone".
