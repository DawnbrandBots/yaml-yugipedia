title: Card Trivia:Dark Magician of Destruction
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]'' and ''[[Tactical-Try Pack: Dark Magic / HERO / Mikanko]]''.
  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster is a [[signature move]] [[counterpart]] of "[[Magician of Black Chaos]]".
  ** This monster's [[Summoning condition]] requiring a [[LIGHT]] and/or a [[DARK]] monster references the [[Chaos (series)|Chaos]] [[series]], which is mostly centered around the LIGHT and DARK [[Attribute]]s.
  ** This monster's alternate Summoning condition requiring the player to [[banish]] a [[Level 6]] or higher DARK [[Spellcaster]] monster on the turn a [[Spell Card]] is [[activate]]d, is based on a scene in {{chapter|Yu-Gi-Oh!|130|ref}}, in which "[[Dark Magician (manga)|Dark Magician]]" evolves into "[[Magician of Black Chaos (manga)|Magician of Black Chaos]]" with the [[Ritual Spell Card]] "[[Dark Magic Ritual (manga)|Dark Magic Ritual]]".
  ** This card being a [[Fusion Monster]] may be a reference to the Japanese name of {{episode|Yu-Gi-Oh!|039|ref}}: "Fusion of Light and Dark - Black Chaos Descends", the debut episode of "[[Magician of Black Chaos (anime)|Magician of Black Chaos]]" in the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'' anime]].
