title: Card Trivia:Phantom Beast Rock-Lizard
wikitext: |-
  {{Navigation}}

  * This is the first and currently only [[DARK]] "[[Phantom Beast]]" monster.
  * Since the "Phantom Beast" [[Beast-Warrior]] monsters are based on the "[[White Knight]]" [[archetype]] due to sharing similar effects, this monster's effect is based on that of "[[White Knight Lord]]".
