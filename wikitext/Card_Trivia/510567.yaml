title: Card Trivia:Kanan the Swordmistress
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Power Parasite]]".
  * This monster has three ''[[Rush Duel]]'' [[counterpart]]s:
  ** A [[LIGHT]] [[Bubble Era]] counterpart: "[[Kanan the Sword Diva]]"
  ** A [[DARK]] Bubble Era counterpart: "[[Kanan the Security Guard]]"
  ** A [[WATER]] [[Bubble Actress]] counterpart: "[[Kanan the Beautiful Swordmistress]]"
  * This card's [[flavor text]] references [[wikipedia:Muhammad Ali|Muhammad Ali]]'s famous quote describing his fighting style, "Float like a butterfly, sting like a bee".
