title: Card Trivia:Ancient Warriors - Fearsome Zhang Yuan
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Zhang Liao|Zhang Liao]] ([[wikipedia:Courtesy name|courtesy name]]: '''Wenyuan'''), from the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', considered to be [[wikipedia:Five Elite Generals|one of the best generals of the era serving under Cao Cao]], he was known for his pivotal role during the [[wikipedia:Battle of Xiaoyao Ford|Battle of Hefei]] as well during several millitary campaigns. He also appeared during several fictional events in the Three Kingdoms, such as his [[wikipedia:Battle of Xiapi|surrender in the Battle of Xiapi]], his role in [[wikipedia:List of fictitious stories in Romance of the Three Kingdoms|the capture of Guan Yu]] among other events.
  * Fittingly, this monster has a battle-oriented effect.
