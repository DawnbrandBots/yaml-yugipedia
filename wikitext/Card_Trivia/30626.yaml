title: Card Trivia:Ground Attacker Bugroth
wikitext: |-
  {{Navigation}}

  * This monster has three [[WATER]] [[counterpart]]s: "[[Amphibious Bugroth]]", "[[Amphibious Bugroth MK-3]]" and "[[Amphibious Bugroth MK-11]]".
  ** While this card's Japanese [[flavor text]] indicates that this monster is going to ''become'' "Amphibious Bugroth" (陸上戦闘ロボット。今はダメだが、海でも使えたらしい。 ''A surface battle robot. It is no good now, but it seems that it could be used in the sea.''), its English flavor text indicates that this monster was ''previously'' "Amphibious Bugroth" (''A surface battle robot that was once used for sea warfare.'').
