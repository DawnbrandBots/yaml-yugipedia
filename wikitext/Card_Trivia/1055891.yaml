title: Card Trivia:Performage Cup Tricker
wikitext: |-
  {{Navigation}}

  * This monster's name and appearance are based on the [[wikipedia:Cups and balls|cups and balls]], a magic trick where a performer hides a ball underneath one of three cups, shuffles the cups around, and uses misdirection and sleight of hand to make the ball appear as if it vanished or transported underneath another cup.
  ** This monster's effects reflect the "cups and balls" trick: in the anime, an [[Xyz Monster]]'s [[Xyz Material]] is depicted as a round, spherical object similar to a ball.
  *** This monster's [[Special Summon]]ing effect is triggered by [[detach]]ing an Xyz Monster's material. In the anime, this monster makes an Xyz Monster's material vanish before it is Special Summoned, where it will hide the material under one of its cups and make it disappear, similar to how the cups and balls trick seemingly make the ball disappear.
  *** This monster's effect allows it to [[attach]] an Xyz Material from one of the player's Xyz Monsters to another Xyz Monster, similar to how the performer can move the ball around by shuffling the cups.
