title: Card Trivia:Stealthagic
wikitext: |-
  {{Navigation}}

  * This card recursively appears in its own artwork.
  * This card's name may be a pun on "[[wikipedia:Science, technology, engineering, and mathematics|STEM learning]]".
  ** Its Japanese name being read as ''Sutemajikku'' is a pun on the fact ''sute'' is the Japanese term for discarding, thus referring to its effect of granting an additional draw if a [[Spell Card]] is sent from the hand to the Graveyard to meet its requirement.
