title: Card Trivia:Steel-Stringed Sacrifice
wikitext: |-
  {{Navigation}}

  * This monster's name is a play on [[wikipedia:Steel-string acoustic guitar|steel-stringed guitar]], a type of acoustic guitar, and [[wikipedia:Sacrifice bunt|sacrifice bunt]], a strategic technique in the sport of [[wikipedia:Baseball|baseball]] where the batter intentionally bunts the ball and is put out, but allows the base runner to advance.
  ** Ironically, this monster is depicted holding an electric guitar, not an acoustic guitar. While electric guitars commonly use strings made of stainless steel or nickel-plated steel, they are generally not referred to as "steel-stringed guitars".
  ** Fittingly, this monster is depicted standing on a batter's box located at home plate, holding its guitar in a bunting position. The guitar has also been fitted with baseball-themed decals.
  ** The word "Sacrifice" in its name is also likely a reference to its effect to support [[Tribute Summon]]s, which in Japanese was referred to as "Sacrifice Summon" before the implementation of [[Master Rule]] 1.
  ** This monster's Japanese name ({{Ruby|鉄|てつ}}{{Ruby|絃|げん}}の{{Ruby|犠打職人|ギダーマン}}, ''Tetsugen no Gidāman'') is a play on 「{{Ruby|犠打|ぎだ}}」 (''gida'', "sacrifice bunt") and 「ギターマン」 (''gitāman'', "guitarman").
