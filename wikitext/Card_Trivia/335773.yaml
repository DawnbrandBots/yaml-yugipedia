title: Card Trivia:Void Vanishment
wikitext: |-
  {{Navigation}}

  * "[[Infernoid Devyaty]]", "[[El Shaddoll Shekhinaga]]", and the symbol of the "[[Ice Barrier]]" tribe (the yellow light) appear in this card's artwork.
  ** Since "Shekhinaga" is frozen, this card's artwork shows that "Devyaty" is the one in control in the combination between it and "Shekhinaga" to form "[[El Shaddoll Anoyatyllis]]".
