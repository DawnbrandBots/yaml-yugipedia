title: Card Trivia:Raviel, Lord of Phantasms - Shimmering Scraper
wikitext: |-
  {{Navigation}}

  * This monster is a [[Card evolutions|retrained]] [[signature move]] counterpart of "[[Raviel, Lord of Phantasms]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "Raviel, Lord of Phantasms" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This monster's [[Summoning condition]]s is based on those of "Raviel's" in the ''Yu-Gi-Oh! GX'' anime,  requiring a [[Tribute]] of three monsters of any [[Type]], rather than [[Fiend]] monsters specifically.
  * This monster lacks an [[archetype-exclusion condition]] removing it from the "[[Scrap]]" archetype. This may be because "scrape" and "Scrap" are different enough that this exclusion can remain implicit.
