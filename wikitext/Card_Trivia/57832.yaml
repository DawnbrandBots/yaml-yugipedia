title: Card Trivia:Gladiator Beast Samnite
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Samnite (gladiator type)|Samnite gladiator]].
  * This monster appears in the artwork of "[[Indomitable Gladiator Beast]]".
  * In the [[Yu-Gi-Oh! 5D's]] English dub, the silhouette of this monster is often used to demonstrate special abilities in the explanatory clips.
  *  This card shares the wings in it's artwork with "[[Gladiator Beast Heraklinos]]"
