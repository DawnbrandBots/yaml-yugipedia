title: Card Trivia:Surging-Wave Fish Slash
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Surging-Wave Swordsman Onimaru Kunituna]]" appears in this card's artwork.
  * The Japanese word, ''katsugyo'' (活魚) is often used to refer to freshly caught fish and shellfish kept in tanks or sold at local fish markets, and intended for human consumption.
