title: Card Trivia:Destiny HERO - Drilldark
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: Destiny Soldiers]]''/''[[Destiny Soldiers]]''.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] a "[[Destiny HERO]]" monster with less than or equal [[ATK]] after being [[Normal Summon|Normal]] or Special Summoned is based on the effect of "[[D-Pressure]]", a [[Spell Card]] used by [[Aster Phoenix (ARC-V)|Aster Phoenix]] to Special Summon a second copy of [[Destiny HERO - Drilldark (anime)|this monster]] after he Normal Summoned the first copy in {{episode|ARC-V|104|ref}}.
