title: Card Trivia:Elemental HERO Sunrise
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legendary Duelists: Season 3]]''.
  * This monster is likely an "[[Elemental HERO]]" rendition of [[Jaden Yuki]], the user of the "Elemental HERO" [[archetype]] in the ''[[Yu-Gi-Oh! GX]]'' anime and [[Yu-Gi-Oh! GX (manga)|manga]]''.
  ** This monster's armor primarily features a red color scheme, referencing the motif of the [[Slifer Red]] dormitory, which Jaden belongs to.
  ** The position of this monster's front hand is a reference to the gesture that Jaden made the end of a victorious Duel while saying his catchphrase ("Gotcha! That was a fun Duel" in the Japanese version and "That's game" in the English version).
  ** This monster's effect to [[search]] "[[Miracle Fusion]]" references Jaden's usage of the card to [[Fusion Summon]] "Elemental HERO" [[Fusion Monster]]s. This effect may also play into this monster's "sunrise" motif, signifying the coming of a new day to put a stop to villainy, almost as if by miracle.
  ** This monster features an [[original ATK]] of 2500, similar to Jaden's [[signature card]], "[[Elemental HERO Neos]]".
  ** "[[Elemental HERO Flame Wingman - Infernal Rage]]" - a retrain of "[[Elemental HERO Flame Wingman]]", Jaden's first signature card - is capable of Summoning this monster with its own effect provided it was Fusion Summoned using a [[Normal Monster]](s) as material, which made up the majority of Main Deck "Elemental HERO" monsters at his disposal towards the beginning of the anime.
  *** "Infernal Rage's" [[Fusion Material]] requires two "Elemental HERO" monsters with different [[Attribute]]s, not unlike this monster's, with the exception of including any two "[[HERO]]" monsters of different Attributes.
