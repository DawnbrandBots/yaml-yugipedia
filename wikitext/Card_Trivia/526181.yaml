title: Card Trivia:Shelrokket Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Borrel Regenerator]]" and "[[Rokket Barrage]]".
  * This monster's name and design are based on [[wikipedia:Shotgun cartridge|shotgun shells]], a type of rimmed, cylindrical ammunition used specifically in shotguns. The shells are usually loaded with [[wikipedia:Shot (pellet)|small lead pellets]] that spread upon being fired, which reflects this monster's effect to [[destroy]] a monster in the same [[column]] it was in, and any monster adjacent to it.
