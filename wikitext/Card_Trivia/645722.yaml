title: Card Trivia:Altergeist Failover
wikitext: |-
  {{Navigation}}

  * "[[Altergeist Multifaker]]" appears in this card's artwork.
  * This card is named after [[wikipedia:Failover|failover]], a method of protecting computer systems from failure, in which standby equipment automatically takes over when the main system fails.
  ** Fittingly, this card's effect allows the player to [[Special Summon]] an "[[Altergeist]]" monster from their [[hand]] when another card they [[control]] is [[destroy]]ed by an opponent's [[card effect]].
