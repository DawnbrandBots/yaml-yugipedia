title: Card Trivia:Dragon Spirit of White
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Beacon of White]]".
  * This monster is a younger form of "[[Blue-Eyes Spirit Dragon]]".
  ** Fittingly, "Blue-Eyes Spirit Dragon" can be [[Synchro Summon]]ed by using this monster as [[Synchro Material]].
  ** This monster's Japanese name, "White Spirit Dragon" ({{Ruby|白|しろ}}き{{Ruby|霊|れい}}{{Ruby|龍|りゅう}}, ''Shiroki Reiryū''), is derived from ''shiroki ryū'' ({{Ruby|白|しろ}}き{{Ruby|龍|りゅう}}, "white dragon"), the title used to describe "[[The White Dragon (manga)|Blue-Eyes White Dragon]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga when it was [[Kisara (manga)|Kisara]]'s ''[[Ka]]'' during the Ancient Egypt times.
