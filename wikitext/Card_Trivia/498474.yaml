title: Card Trivia:Megaroid City
wikitext: |-
  {{Navigation}}

  * The following "[[roid]]" monsters appear in this card's artwork:
  ** "[[Truckroid]]" (bottom-left corner)
  ** "[[Carrieroid]]" (middle of bottom edge)
  ** "[[Decoyroid]]" (bottom-right corner)
  ** "[[Mixeroid]]" (middle of right edge)
  ** "[[Steamroid]]" (top-right corner)
  ** "[[UFOroid]]" (middle of top edge)
  ** "[[Expressroid]]" (upper-left corner)
  ** "[[Cycroid]]" (middle of left edge)
  ** "[[Drillroid]]" (hunched over, following "Cycroid")
  ** "[[Stealthroid]]" (near the center of the artwork, on one of the platforms)
  * This city appears in the artwork of "[[Emergeroid Call]]".
  * The building structure that is most prominent in this card's artwork appears to be the "alternate form" of "[[Super Vehicroid - Mobile Base]]".
  ** Both cards reference the concept of giant robots that can transform into cities or bases and vice versa, including the ''Transformers'' character [http://tfwiki.net/wiki/Metroplex_(G1) Metroplex], with the city in this card's artwork highly resembling Metroplex's [http://news.tfw2005.com/wp-content/uploads/sites/10/2013/07/Generations-Metroplex-001_1372955266.jpg city mode], including splayed legs, open cavities on the chest, and a clearly visible waist.
