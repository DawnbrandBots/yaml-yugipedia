title: Card Trivia:Aqua Madoor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magical Stream]]".
  * This monster has an [[Card evolutions|evolved counterpart]], "[[Neo Aqua Madoor]]", and a ''[[Rush Duel]]'' counterpart, "[[Wave Crest Madoor]]".
  ** "Neo Aqua Madoor" itself has a retrained counterpart, "[[Glacier Aqua Madoor]]", and a [[Lightray]] counterpart, "[[Lightray Madoor]]".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', when this monster attacks, it conjures a liquid wall around the attack target (which is accurate to its [[flavor text]]), drowning that attack target, and then laughing afterwards.
