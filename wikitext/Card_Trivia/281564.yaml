title: Card Trivia:Bujingi Pavo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * This monster appears in the artwork of "[[Bujinki Amaterasu]]", serving as the skirt of that monster.
  * This monster has a counterpart: "[[Bujingi Peacock]]".
  ** This monster's name– "Pavo"– is Latin for "Peacock" and most likely refers to the [[wikipedia:Pavo (constellation)|constellation of the same name]]. This constellation symbolizes the presence of the peacock in the story of Zeus and [[wikipedia:Io (mythology)|Io]] in Greek mythology, where the God Hermes slew Io's giant hundred-eyed guardian [[wikipedia:Argus Panoptes|Argus Panoptes]] and adorned the Peacock's tail with the giant's eyes.
