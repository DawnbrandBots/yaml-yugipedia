title: Card Trivia:Runick Allure
wikitext: |-
  {{Navigation}}

  * "[[Loptr, Shadow of the Generaider Bosses]]" and "[[Runick Fountain]]" appear in this card's artwork.
  * The crystal in this card's artwork also appears in the artwork of "[[Runick Tip]]".
  * The kanji ''Taburakashi'' ({{Ruby|誑|たぶら}}かし, "deception") in this card's Japanese name is a reference to the Japanese name of ''[[wikipedia:Gylfaginning|Gylfaginning]]'' (ギュルヴィたぶらかし ''Gyuruvi Taburakashi'', "Deception of Gylfi"), the first part of the ''[[wikipedia:Prose Edda|Prose Edda]]''. The ''Prose Edda'' is considered to be the most comprehensive and detailed source for modern knowledge of [[wikipedia:Norse mythology|Norse mythology]]. The ''Gylfaginning'' part of the ''Prose Edda'' describes the creation and destruction of the world of the [[wikipedia:Æsir|Æsir]], along with many other aspects of Norse mythology.
  ** ''Taburakashi'' ("deception") is also a reference to [[wikipedia:Loki|Loki]], the Norse god of lies, which "Loptr, Shadow of the Generaider Bosses" is based on.
