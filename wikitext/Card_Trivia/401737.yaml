title: Card Trivia:Dragon's Bind
wikitext: |-
  {{Navigation}}

  * "[[Seiyaryu]]" appears in this card's artwork.
  * This card has a [[counterpart]]: "[[Dragon's Mind]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[target]] a [[Dragon]] monster with 2500 or less [[ATK]] and [[DEF]] the player [[control]]s is an alteration of its effect in the anime, which only targets a Dragon monster the player controls. In {{episode|ARC-V|72|ref}}, this card was used to target "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]", whose [[original ATK and DEF]] is 2500/2000.
