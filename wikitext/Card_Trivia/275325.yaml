title: Card Trivia:Cloudian - Acid Cloud
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Acid rain|acid rain]], in which pollutants carried in gaseous form precipitates into acidic rain, which damages the environment.
  ** This monster's effect reflects this, as it can harm the "environment" of the [[field]] by destroying one [[Spell]]/[[Trap Card]] after removing two [[Fog Counter]]s. Ironically, rainwater is always slightly acidic during precipitation.
