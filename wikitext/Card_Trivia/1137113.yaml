title: Card Trivia:Apocavities
wikitext: |-
  {{Navigation}}

  * This card's English name is a portmanteau of the words "[[wikipedia:Apocalypse|apocalypse]]" and "[[wikipedia:Tooth decay|dental cavities]]".
  ** This card's Japanese name is a portmanteau of the words "apocalypse" and "caries", another word for the tooth decay that causes cavities.
  *** The kanji in this card's Japanese name, 「黙歯録」 (''Mokushiroku'', lit. "silent dental record") is a play on 「ヨハネの黙示録」 (''yohane no mokushiroku'', lit. "[[wikipedia:Book of Revelation|Apocalypse of John]]"), with the kanji 「示」 ("to show") replaced with 「歯」("tooth").
  ** The white, red, gray, and black knights in this card's artwork and this card's effect to remove up to four [[C Counter]]s from itself likely reference the [[wikipedia:Four Horsemen of the Apocalypse|Four Horsemen of the Apocalypse]].
