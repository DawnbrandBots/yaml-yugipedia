title: Card Trivia:Atomic Scrap Dragon
wikitext: |-
  {{Navigation}}

  * This monster is the [[Card evolutions|final]], three-headed form of "[[Scrap Dragon]]".
  ** Its [[Level]] is 1 higher than that of "[[Scrap Twin Dragon]]", with 200 more [[original ATK and DEF]].
  ** As with its previous form, its effect [[target]]s one of the opponent's cards for each 'head'.
  * This card has the highest Level, [[ATK]], and [[DEF]] of all the "[[Scrap]]" monsters.
  * This card has the highest Level and ATK of any [[EARTH]] [[Dragon]]-[[Type]] monster.
