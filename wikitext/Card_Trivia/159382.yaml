title: Card Trivia:Lazion, the Timelord
wikitext: |-
  {{Navigation}}

  * The card is named after the Judaic archangel, [[wikipedia:Raziel|Raziel]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Raziel is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Chokhmah|Chokhmah]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Chokhmak is the second of the ten Sefira of the Tree of Life, and this was the second "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This is the only "Timelord" monster to feature a body part that is not entirely made of metal, namely, the fire in its shoulders.
