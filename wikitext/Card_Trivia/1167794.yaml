title: Card Trivia:DoomZ Command "A.D.R.A.S.T.E.I.A."
wikitext: |-
  {{Navigation}}

  * "[[Artmage Graflare]]" and "[[DoomZ XII Zero - Drastea]]" (in a remodeled form) appear in this card's artwork.
  ** Fittingly, this card's first effect to prevent the [[equip]]ped monster from being [[destroyed by battle]] is based on that of "Graflare's".
