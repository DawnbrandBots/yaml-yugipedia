title: Card Trivia:OuTerverSe Wish of Devilgear
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[OuTerverSe Galaxy Form]]".
  * This monster's name is a portmanteau of "devil" (the Japanese name of its [[Fiend]] [[Type]]) and "Velgear" (referencing the [[Velgearian]]s in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime). 
  * This monster has a [[Fairy]] Type [[counterpart]]: "[[OuTerverSe Wish of Angeleva]]".
  * This monster has an upgraded "complete [[Maximum Monster]]" form: "[[Wish of OuTerverSe the World-Shattering Emperor (R)|Wish of OuTerverSe the World-Shattering Emperor [R]]]".
  * This monster and "Wish of Angeleva" are the first ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' cards with two name change conditions (to become their complete forms in the [[hand]], and "[[OuTerverSe]]" in the [[Graveyard]]), as well as the first two side Maximum Monster components without a "side label" in their original card names.
