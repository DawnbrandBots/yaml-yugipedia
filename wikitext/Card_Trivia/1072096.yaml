title: Card Trivia:Poseidra Abyss, the Atlantean Dragon Lord
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Firestorms Over Atlantis]]".
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Poseidra, the Storming Atlantean]]".
  ** According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], this monster is an evolved version of "Poseidra" which transformed once its [[Abyss-squall|bracelet]] resonated with the one owned by "[[Garunix Eternity, Hyang of the Fire Kings]]" during [[Firestorms Over Atlantis|their battle]].
  ** "[[Mermail Abyssgaios]]" (the "[[Mermail]]" king who took over the body of "Poseidra") can also be used as [[Xyz Material]] for this card's [[Xyz Summon]], via its own [[Summoning condition]].
  * This monster's secondary heads and the red jewels on its shoulder armor are based on "[[Lost Blue Breaker]]", who was preyed on by "Poseidra" in order to fully mature, according to the [[Master Guide 4 card storylines#The Greedy Ruler of the Seas|''Master Guide 4'' card storylines]].
