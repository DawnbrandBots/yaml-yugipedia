title: Card Trivia:Psychic Shockwave
wikitext: |-
  {{Navigation}}

  * "[[Jinzo]]" appears in this card's artwork.
  ** This card is [[activate]]d in response to a [[Trap Card]] and [[Special Summon]]s a [[Level 6]] [[DARK]] [[Machine]] monster. "Jinzo" is an eligible target for this effect, which would then allow it to [[negate]] the effect of the original Trap Card.
  * This card's name is derived from one of the [[Attack and effect names in Yu-Gi-Oh!|attack names]] of "Jinzo" from the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and the original Japanese version of the [[Yu-Gi-Oh! (anime)|anime]]: "Psychic Wave".
  ** A different card, "[[Psychic Wave]]", is directly named after this attack name.
