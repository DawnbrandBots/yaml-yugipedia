title: Card Trivia:Black Rose Moonlight Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Duel Dragon Token]]" (as a silhouette).
  * This monster is the [[Duel Dragon]] [[Yu-Gi-Oh! 5D's (manga)|manga]] [[counterpart]] of "[[Black Rose Dragon]]".
  * This is the [[signature card]] of [[Akiza Izinski (manga)|Akiza Izinski]] in the ''Yu-Gi-Oh! 5D's'' manga.
  * In the omake at the end of {{chapter|5D's|061|ref}}, [[Masashi Satō]] revealed that he intended this monster to be the [[Tuner Synchro Monster]] of the Duel Dragons, but was outvoted, resulting in "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]" being chosen instead.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|041|ref}}, specifically from the panel showing [[Moonlight Dragon Black Rose (manga)|this monster]] being Summoned.
