title: Card Trivia:Doppelganger
wikitext: |-
  {{Navigation}}

  * The Duelist from the artwork of "[[Wicked Rebirth]]" appears in this card's artwork.
  * This card's name is based on a [[wikipedia:Doppelgänger|doppelgänger]], the term used for a ghostly apparition that appears as a double of a living person.
  ** Fittingly, this card's artwork depicts the Duelist being attacked from behind by the "doppelgänger" of their monster, which reflects its effect to inflict the same amount of [[effect damage]] to the opponent inflicted by their own monster's effect.
  ** This card's Japanese name, "Doppel Gainer", is a pun on "doppelgänger".
