title: Card Trivia:Raidraptor - Blaze Falcon
wikitext: |-
  {{Navigation}}

  * This monster represents the warfare stage of a [[wikipedia:Rebellion|rebellion]]. In this stage, rebels gain tactical advantages through [[wikipedia:Ambush|sneak attacks]] or destroying massive essential assets and leaving nothing to salvage. This is supported by this monster's two effects, either allowing it to [[Direct attack|attack directly]] (sneak attack) or [[destroy]]ing all [[Special Summon]]ed monsters, which are typically very powerful, and inflicting [[damage]] (the destruction of vital assets).
