title: Card Trivia:Brain Controller
wikitext: |-
  {{Navigation}}

  * This is a [[Monster Card]] [[counterpart]] of "[[Brain Control]]".
  ** This monster's pose is based on the artwork of "Brain Control", which features a brain in the center and a pair of hands with a red aura positioned above the brain.
  * This monster is a counterpart of "[[Mind Master]]":
  ** Both are [[Tuner monster]]s who share the same [[Level]] (1), [[Type]] ([[Psychic]]), and [[original ATK and DEF]] (100/200).
  ** Both monsters have opposite [[Attribute]]s: this monster's Attrbute is [[DARK]], while the Attribute of "Mind Master" is [[LIGHT]].
  ** Both monsters' designs feature a brain in a glass vessel, and a pair of mechanical hands attached to long, cord-like arms.
