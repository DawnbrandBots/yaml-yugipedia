title: Card Trivia:Eria the Water Spiritualist
wikitext: |-
  {{Navigation}}

  * "[[Familiar of the Water Spiritualist]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Spiritual Coven]]".
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Eria the Water Charmer (Rush Duel)|Eria the Water Charmer]]".
  ** This monster's name and effect reference "[[Spiritual Water Art - Aoi]]", a [[Spiritual Art]] [[Trap Card]] that allows the player to look at their opponent's [[hand]] and [[send]] one card in their hand to the [[Graveyard]].
