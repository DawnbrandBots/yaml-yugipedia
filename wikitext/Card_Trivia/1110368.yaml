title: Card Trivia:OuTerverSe Acid Blob
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[OuTerverSe Diversity Scream]]".
  * This monster is based on the parallel universe observed by [[Yudias Velgear]] through [[Kuaidul Velgear]] in {{episode|GO RUSH!!|135|ref}}, in which civilization resided in the stomach of a massive life form.
  * This monster has an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form: "[[OuTerverSe Toxic Blob]]".
