title: Card Trivia:Alchemy Beast - Moonface the Silver
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Silver|silver]], one of the seven planetary metals used in alchemy.
  * This monster is based on the [[wikipedia:Moon|Moon]], where the [[wikipedia:Crescent|crescent moon]] (☽) serves as the symbol of silver in alchemy.
  ** This monster's design features a smiling face composed of three different crescent moons.
  * This is the only "[[Alchemy Beast]]" monster whose design is not based on animals used in alchemy.
