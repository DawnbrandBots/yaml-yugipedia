title: Card Trivia:Dark Effigy
wikitext: |-
  {{Navigation}}

  * This card has [[LIGHT]], [[WIND]] and [[EARTH]] counterparts: "[[Light Effigy]]", "[[Wind Effigy]]" and "[[Earth Effigy]]".
  * In a [[Shonen Jump]] issue, this card was advertised as being able to be used as two tributes for "[[The Wicked Avatar]]", even though it is not a [[Normal Monster]].
