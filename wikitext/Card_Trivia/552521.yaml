title: Card Trivia:Sky Striker Ace - Shizuku
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sky Striker Maneuver - Jamming Waves!]]".
  ** "[[Sky Striker Ace - Roze]]" appears in this card's alternate artwork.
  *** This card's alternate artwork continues the events depicted in the artwork of "[[Sky Striker Mobilize - Linkage!]]", where this monster serves as a shield summoned by "[[Sky Striker Ace - Raye]]" to protect herself and "Roze" in its alternate artwork, rather than the original monster.
  * This monster's name is based on ''shizuku'' the Japanese word for "droplet", reflecting its [[WATER]] [[Attribute]].
  * This monster and "[[Sky Striker Ace - Kagari]]" are the first [[Link Monster]]s with Top-diagonal [[Link Arrow]]s.
  * in ''[[Yu-Gi-Oh! Cross Duel]]'', this monster attacks by generating a force field in front of itself and then ramming the target.
