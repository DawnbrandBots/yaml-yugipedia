title: Card Trivia:Guivre
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Guivre|guivre]], a creature from [[wikipedia:European mythology|European mythology]] who is depicted as a winged serpentine dragon without forearms.
  ** This monster's effect to [[Special Summon]] a "[[Wyvern Token]]" is based on how the guivre is derived from the [[wikipedia:Wyvern|wyvern]], a similar winged dragon without forearms that is depicted in European mythology.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are based on [[Spell]]/[[Trap Card]]s used alongside it in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  ** This monster's effect to gain 400 [[ATK]] for each [[Dragon]] monster the player [[control]]s is based on the effect of "[[Dragons Unite]]", an [[Equip Spell Card]] used by [[Chazz Princeton (manga)|Chazz Princeton]], which he used to [[equip]] [[Guivre (manga)|this monster]] with in {{chapter|GX|025|ref}}. 
  ** This monster's [[Quick Effect]] to [[Tribute Summon]] a Dragon monster during the [[Battle Phase]] or [[Main Phase 2]] is based on the effect of "[[Dragon Descent]]", a [[Trap Card]] used by Chazz, which he used to [[Tribute]] this monster and a "Wyvern Token" to [[Special Summon]] "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]" from his hand during [[Jaden Yuki (manga)|Jaden Yuki's]] Battle Phase in {{chapter|GX|032|ref}}. In the ''OCG''/''TCG'', this monster's effect was changed to Tribute Summon "[[Light and Darkness Dragon]]" due to its ''OCG''/''TCG'' effect preventing it from being Special Summoned.
  *** This monster's pose in its ''OCG''/''TCG'' artwork is taken from a panel from the above-mentioned chapter of the ''Yu-Gi-Oh! GX'' manga showing this monster being Summoned.
