title: Card Trivia:Lucent, Netherlord of Dark World
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Kelto", is a play on ''keruto'' which is derived from "skeleton" ''sukeruton'', part of which is homophonous with the Japanese word 透ける ''sukeru'', which translates to "to be transparent", reflecting this card's English name, which is derived from the word "translucent".
  * This card's Chinese name, 透特, is a combination of 透 ("transparent") and 特 ''tè'' ([[wikipedia:Transcription into Chinese characters|a transcription]] of the [[wikipedia:Phoneme|phoneme]] /t/ as in ''kel'''t''''').
