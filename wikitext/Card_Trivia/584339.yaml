title: Card Trivia:Performapal Smile Sorcerer
wikitext: |-
  {{Navigation}}

  * The cards "[[Smile Universe]]" and "[[Smile World]]" appear in this card's artwork, held by this monster.
  * The red and blue rings on this monster's right hand represent the two colors of the [[Pendulum Scale]]s.
  * This monster resembles [[Yuya Sakaki]], who used the "[[Performapal]]" and "[[Smile]]" archetypes in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's cape is similar to Yuya's jacket, which he wears like a cape.
  ** In this card's ''[[OCG]]'' artwork, the position of this monster's fingers holding the two "[[Smile]]" cards mimics how Yuya held his two [[Pendulum Monster]]s before placing them in the [[Pendulum Zone]]s.
