title: Card Trivia:D/D/D Dragon King Pendragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Dark Legion Starter Deck]]''/''[[Duelist Entry Deck VS: Dark Legion]]'', as well as one of the cover cards of ''[[Duelist Entry Deck VS]]''/''[[2-Player Starter Deck: Yuya & Declan]]''.
  * This monster's name is a reference to either [[wikipedia:Uther Pendragon|Uther Pendragon]] or his son, [[wikipedia:King Arthur|Arthur Pendragon]], both known as legendary kings of [[wikipedia:Sub-Roman Britain|Britain]]. The surname "Pendragon" means "dragon head" in the original Welsh language, which Uther acquired when he witnessed a portentous dragon-shaped comet. 
  ** Fittingly, this monster has a draconic appearance, and can be [[Special Summon]]ed from the [[hand]] by [[Tributing]] a [[Dragon]] monster and another [[Fiend]] monster from the hand and/or the player's [[field]].
  * This was the first "[[D/D/D]]" monster to be released in the ''[[TCG]]''.
