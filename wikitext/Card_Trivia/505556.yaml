title: Card Trivia:Dunames Dark Witch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gift of the Martyr]]", "[[Rainbow Veil]]", and "[[Speed Spell - Summon Speeder]]".
  ** All of these cards' artworks depict her in the censored appearance, with some of them having cleavage already covered in Japanese versions.
  * "Dunames" in this card's name is derived from ''Dunamis'', the [[wikipedia:Ancient Greek|Ancient Greek]] word for "power" or "force".
  ** The "Valkyria" in this card's Japanese name, "Dunamis Valkyria", is derived from a [[wikipedia:Valkyrie|valkyrie]], a host of female figures and handmaidens of [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]], who chooses those destined to be slain in battle.
  ** This card's ''[[TCG]]'' name, "Dunames Dark Witch", is likely based on how, during the Middle Ages, the definition of valkyries changed from deities to witches.
  * This card has several [[counterpart]]s:
  ** A [[Dark counterpart]]: "[[Dark Valkyria]]"
  ** A [[retrained]] counterpart: "[[Power Angel Valkyria]]"
  ** A "[[Chaos]]" counterpart: "[[Chaos Valkyria]]"
  ** 3 [[Rush Duel]] counterpart: "[[Demi-glace Dark Witch]]", "[[Tiramisu Dark Witch]]", and "[[Tutumes Dark Witch]]".
  * In some video games, this card's French name is "Sorcière Dunoms", showing that "Dunames" was translated as something meaning "of the Names".
