title: Card Trivia:Karakuri Ninja mdl 919 "Kuick"
wikitext: |-
  {{Navigation}}

  * The '''919''' of this card's name represents a multiplication problem: 9 x 1 = 9.
  ** The number is also written in Japanese on this monster's left arm: 九壱九.
  * One of the knives that Kuick is holding is the same one that "[[Karakuri Ninja mdl 339 "Sazank"]]" wields.
  * This monster's model number is a play on a Japanese way of saying "quick".
