title: Card Trivia:Elemental HERO Ocean
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bewitchment]]", "[[Element Counter]]", "[[Hero Pressure]]", and "[[Magic Elf Order]]".
  * This is the first "[[Elemental HERO]]" monster from the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga to be released in the ''[[OCG]]''.
  ** It is also the second "Elemental HERO" monster from the manga to be released in the ''[[TCG]]''.
  * This monster shares similarities with "[[Warrior of Atlantis]]".
  ** Both share the same [[Attribute]] ([[WATER]]), [[Level]] (4) and appearance.
  ** Both feature effects that [[support]] "[[Umi]]": This monster's manga effect allows it to attack directly if "Umi" is on the [[field]], while "Warrior of Alantis" can [[search]] for "Umi" in the player's [[Deck]].
  * This card's ''OCG''/''TCG''  artwork is taken from {{chapter|GX|002|ref}}, specifically from the panel showing [[Elemental Hero Ocean (manga)|this monster]] being Summoned.
