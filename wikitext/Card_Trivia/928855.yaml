title: Card Trivia:Proof of Pruflas
wikitext: |-
  {{Navigation}}

  * This monster is based on Pruflas, a demon prince in the ''[[wikipedia:Pseudomonarchia Daemonum|Pseudomonarchia Daemonum]]'' who is depicted with the head of a cat.
  * This monster's name is a wordplay on "Pruflas" and its existence being "proof-less": this card's artwork depicts this monster turning itself invisible after creating a mess, while the cat's owner blames it for the mess, because this monster's existence cannot be proved and is thus "proof of [the] proof-less".
