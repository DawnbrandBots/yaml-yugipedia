title: Card Trivia:Divine Councilor Agent Artemisdirection
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is a portmanteau of "[[wikipedia:Artemis|Artemis]]" and "misdirection".
  ** Artemis is the goddess of nature in [[wikipedia:Greek mythology|Greek mythology]] who is symbolized by the crescent moon, which appears in the background of this card's artwork.
  ** Misdirection is the act of sending someone in the wrong direction, which reflects this monster's effect to [[add]] "[[Secret Counteroffensive Triple Attack]]" from the [[Graveyard]] to the [[hand]].
