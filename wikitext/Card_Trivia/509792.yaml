title: Card Trivia:Exxod, Master of The Guard
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Invincible Fortress]]''.
  * This monster appears in the artwork of "[[Dance of the Guardian]]".
  ** Fittingly, this monster's Japanese name is "Guardian God Exxod", while the Japanese name of "Dance of the Guardian" is "Dance of the Guardian God".
  * This is the only incarnation of "[[Exodia the Forbidden One]]" that is not a [[DARK]] [[Spellcaster]] monster.
  * This monster has the highest [[original DEF]] (4000) of all [[Level 8]] monsters and [[Rock]] monsters.
  ** This monster's original DEF is equal to the combined [[ATK]]/[[DEF]] of all the "[[Forbidden One]]" monsters.
  * Before "[[Exodius the Ultimate Forbidden Lord]]" was released, [[Konami]] publicized this card as the final incarnation of "Exodia".<ref>{{cite web | url = http://entertainment.upperdeck.com/yugioh/en/products/structuredecks/SD7.aspx |archive-url = https://web.archive.org/web/20070205052957/http://entertainment.upperdeck.com/yugioh/en/products/structuredecks/SD7.aspx | title = Products - Yu-Gi-Oh! TRADING CARD GAME Upper Deck Entertainment | website = Upper Deck | archive-date = February 5, 2007 | accessdate = July 12, 2024}}</ref>

