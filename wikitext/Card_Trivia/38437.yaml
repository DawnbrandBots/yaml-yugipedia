title: Card Trivia:Paralyzing Chain
wikitext: |-
  {{Navigation}}

  * This is one of the first cards to feature a Duelist using one of the standard [[Duel Disk]]s from ''[[Yu-Gi-Oh! 5D's]]''.
  * The Duelist featured in this card's artwork also appears to be the same Duelist seen in the artwork of "[[Half or Nothing]]", albeit seen from the rear in that card.
