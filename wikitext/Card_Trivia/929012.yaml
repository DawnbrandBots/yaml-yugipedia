title: Card Trivia:Reptilianne Melusine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Reptilianne Recoil]]".
  * This card's name is a reference to the [[wikipedia:Melusine|Melusine]], a spirit of fresh water bodies from European folklore usually depicted as half woman and half snake.
  * This monster's facial structure, hair, and forehead jewel greatly resemble those of [[Misty Tredwell]], the user of the "[[Reptilianne]]" archetype in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This is supported by this monster's appearance in the artwork of "Reptilianne Recoil", which also features the geoglyph of "[[Earthbound Immortal Ccarayhua]]", the "[[Earthbound Immortal]]" monster used by Misty.
  *** Fittingly, this monster's effect is capable of adding "Earthbound Immortal Ccarayhua" from the Deck to the hand.
