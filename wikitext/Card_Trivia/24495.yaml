title: Card Trivia:Gladiator Beast Gyzarus
wikitext: |-
  {{Navigation}}

  * This monster's name appears to be a corruption of [[wikipedia:Julius Caesar|Gaius Caesar]].
  * This monster appears in the artwork of "[[Gladiator Beast Charge]]".
  * A portion of a few other "[[Gladiator Beast]]" monsters can be seen on "Gladiator Beast Gyzarus". They are:
  ** The face, wings, and arms of "[[Gladiator Beast Bestiari]]".
  ** Armor (not quite the same because it is green with red stones and some parts are shaped differently) of "[[Gladiator Beast Secutor]]".
