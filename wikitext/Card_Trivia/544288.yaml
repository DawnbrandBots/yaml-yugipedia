  {{Navigation}}

  * This monster appears in the artwork of "[[The Six Shinobi]]".
  * This card is named after [[wikipedia:Fūma Kotarō|Fūma Kotarō]] (風魔 小太郎).
  ** This card's [[WIND]] [[Attribute]] is a reference to the kanji 「風魔」 (''Fūma'', "Wind Demon") in the name of Fūma Kotarō.
