title: Card Trivia:Mystical Wind Typhoon
wikitext: |-
  {{Navigation}}

  * This card has a similar name and effect to "[[Mystical Space Typhoon]]", but also an activation requirement.
  * This card has some [[counterpart]]s: "[[Wild Tornado]]", "[[Double Cyclone]]", "[[Chain Whirlwind]]", "[[Driving Snow]]", "[[Gust]]", "[[Mystical Space Typhoon]]", "[[Tornado]]", and "[[Twister]]".
  * According to a [https://www.pojo.biz/board/showthread.php?p=5116454#post5116454 Pojo post] by Dan Scheidegger (an Upper Deck Entertainment employee), UDE wanted to name this card "Cyclone", which was the Japanese name of "Mystical Space Typhoon", but [[Konami]] "wouldn't go for it".
