title: Card Trivia:Balloon Lizard
wikitext: |-
  {{Navigation}}

  * This monster's name, appearance, and effect are based on the real-life concept of [[wikipedia:Balloon|balloons]] being blown up.
  ** As air is pumped into the balloon, it will grow bigger until the excessive air inside or an external force on a small area of the balloon causes it to burst. This reflects this monster's effect to place a [[counter]] on it during the player's [[Standby Phase]], where [[destroy]]ing it would cause it to inflict the [[effect damage]] at the player who destroyed it.
  * This monster can give the player a victory similar to the [[victory condition]] of "[[Final Countdown]]", both involving the required 20 turn count to activate its effect. This monster can inflict 8000 damage (this card's 400 damage x 20) while "Final Countdown" ends in 20 turns; however, with this monster, only the player's turns count whereas the opponent's turns are required for the victory condition of "Final Countdown".
