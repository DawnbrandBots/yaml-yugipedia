title: Card Trivia:Scrap Kong
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Brutal Beast Battle]]", "[[Chain Ignition]]", "[[Dances with Beasts]]", and "[[RGB Rainbowlution]]".
  ** This card's artwork is featured on a shirt(s) shown in the artworks of "[[Bunny Ear Enthusiast]]", "[[Hatsugai]]", "[[Fukubiki]]", "[[Gift Exchange]]", "[[Matching Outfits]]", "[[Shateki]]", and "[[Yaminabe Party]]". 
  ** The recurring appearances of this card's artwork in a shirt is a reference to a 2ch meme, referring to how useless the card is on its own.
  * This is the first (and only) non-Tuner "[[Scrap]]" monster to have the effect to recover a "Scrap" monster from the GY when destroyed by a "Scrap" card's effect.
  * The barrel that appears as the belly of this monster, along with its name, might be a reference to ''[[wikipedia:Donkey Kong (video game)|Donkey Kong]]''.
  * In addition to both being gorillas, this card and "[[Berserk Gorilla]]" share the same [[Level]], [[ATK]], [[DEF]], [[Type]], and [[Attribute]], in addition to an effect to destroy themself (though each applies in different circumstances).
