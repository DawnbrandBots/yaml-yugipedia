title: Card Trivia:Man Beast of Ares
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Ares|Ares]], the god of war in [[wikipedia:Greek mythology|Greek mythology]].
  * This monster is based on the [[wikipedia:Minotaur|Minotaur]], a creature from Greek mythology that is depicted with the head of a bull on the body of a man.
