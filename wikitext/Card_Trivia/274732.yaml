title: Card Trivia:Spellbook of Judgment
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Judgement (Tarot card)|Judgement]], the twentieth of the [[wikipedia:Major Arcana|Major Arcana]].
  * "[[Empress of Prophecy]]", "[[Hierophant of Prophecy]]", and "[[Reaper of Prophecy]]" appear in this card's artwork.
  ** According to the [[Gagaga Academy Tospedia card storylines#"The Fool's Bizarre Adventure" Edition|Gagaga Academy Tospedia card storylines]], this card's artwork depicts "Empress of Prophecy" and "Hierophant of Prophecy" attempting to purify and save "[[Fool of Prophecy]]" after he was corrupted by "[[Spellbook of the Master]]" and subsequently transformed into "[[Reaper of Prophecy]]".
  * The colored "wings" of the "crest" depicted in this card's artwork may refer to the other "[[Spellbook]]" cards: red for "[[Spellbook of Power]]"; green for "[[Spellbook of Wisdom]]"; white for "[[Spellbook of Eternity]]"; yellow for "[[Spellbook of Fate]]"; purple for "[[Spellbook of Life]]"; black/grey for "[[Spellbook of the Master]]"; and cyan in the middle for "[[Spellbook of Secrets]]".
