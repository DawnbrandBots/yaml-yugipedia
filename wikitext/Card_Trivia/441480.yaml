title: Card Trivia:The Six Shinobi
wikitext: |-
  {{Navigation}}

  * "[[Secret Six Samurai - Doji]]", "[[Secret Six Samurai - Fuma]]", "[[Secret Six Samurai - Genba]]", "[[Secret Six Samurai - Hatsume]]", "[[Secret Six Samurai - Kizaru]]", "[[Secret Six Samurai - Rihan]]", "[[Shien's Footsoldier]]", and "[[Shien's Squire]]" appear in this card's artwork.
  ** This card's artwork depicts all the "[[Secret Six Samurai]]" monsters.
  ** This card's artwork is based on the artwork of "[[Six Samurai United]]": both depict a group of "[[Six Samurai]]" monsters with a large emblemized "Six Samurai" symbol in the background.
  * This is the first [[Spell]]/[[Trap Card]] whose effect [[activate]]s if the player [[control]]s six monsters, which only became possible with the introduction of the [[Extra Monster Zone]] with [[Master Rule#New Master Rule|Master Rule 4]] in 2017.
