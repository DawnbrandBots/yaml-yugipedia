title: Card Trivia:Land Power
wikitext: |-
  {{Navigation|mode=nonGame}}

  * In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, when this card is [[activate]]d, the surrounding area transforms into the [[Heartland Theme Park]].
  * This card's effects are similar to the effects of [[Toon]] monsters, which allows the members of the "[[Heart Monster]]" [[archetype]] to become immune to attacks and allows them to attack the opponent directly.
