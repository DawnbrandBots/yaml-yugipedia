title: Card Trivia:Telekinetic Shocker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Psychic Path]]", "[[Overlay Satellite]]", and "[[Void Chain]]".
  * This card's name is a reference to [[wikipedia:Telekinesis|telekinesis]], the psychic ability to moves objects with the mind.
  * The in-game icon for [[Psychic]] monsters appear to be based on this monster.
