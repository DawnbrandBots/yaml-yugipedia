title: Card Trivia:Tragoedia
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from ''tragoedia'', the Latin word meaning "a tragedy".
  * This monster shares some similarities with "[[Yubel]]":
  ** Both monsters are [[Level 10]] [[DARK]] [[Fiend]] monsters without an [[original ATK and DEF]].
  ** Both monsters are based on antagonists in the ''[[Yu-Gi-Oh! GX]]'' anime and manga, who have hospitalized a friend of [[Jaden Yuki]] who influenced his passion for Dueling.
  ** Both monsters' bodies are destroyed prior to the beginning of the anime and manga, forcing their spirits to possess humans to restore their true forms, and hid their true identities in shadow.
  * This monster's effects are based on [[Tragoedia (character)|Tragoedia's]] role in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  ** This monster's [[Special Summon]]ing effect reference Tragoedia's creation from the hatred of the citizen of [[Kul Elna]] after learning about [[Kul Elna massacre|his hometown's massacre]].
  ** This monster's effect to take [[control]] of the opponent's monsters reference Tragoedia's ability to possess other people.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|31|ref}}, specifically from the panel where this monster fully reveals himself to the Egyptian priests.
