title: Card Trivia:Shadow Planarian
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Like its support card "[[Splitting Planarian]]", this monster is based on the [[wikipedia:Planarian|planarian]], a type of non-parasitic flatworm famous for its extraordinary regenerative abilities.
  ** Fittingly, this monster is modeled after the planarian's oft-cited feat of regenerating into multiple individuals when divided lengthwise, as this monster is the regenerated spawn of "Splitting Planarian."
