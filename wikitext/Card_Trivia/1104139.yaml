title: Card Trivia:Double Ripple
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's video game effect to [[Special Summon]] "[[Ancient Fairy Dragon]]" and "[[Power Tool Dragon]]" from the [[Extra Deck]] by [[send]]ing a [[Tuner monster]] and a non-Tuner monster whose total [[Level]]s equal 7 is an alteration of its effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which could Special Summon a [[Synchro Monster]] with the same [[Level]] and [[Synchro Material]] from both the player's and the opponent's [[Extra Deck]]s. 
  ** In {{episode|5D's|142|ref}}, this card was used to Special Summon "[[Ancient Fairy Dragon (anime)|Ancient Fairy Dragon]]" and "[[Power Tool Dragon (anime)|Power Tool Dragon]]", who share the same Level (7) and Synchro Material (1 Tuner + 1+ non-Tuner monsters). Additionally, both monsters were Summoned by sending two monsters: the Tuner monster "[[Clock Resonator (anime)|Clock Resonator]]" and the non-Tuner monster "[[Morphtronic Boomboxen (anime)|Morphtronic Boomboxen]]".
