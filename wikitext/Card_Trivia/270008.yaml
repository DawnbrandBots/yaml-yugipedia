title: Card Trivia:Googly-Eyes Drum Dragon
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Googly eyes|Googly Eyes]] are small plastic craft supplies used to imitate eyeballs.
  * When this card was first Summoned in the anime, it was concealed in a bright blue light similar to the "[[Photon]]" monsters, which made it initially resemble "[[Galaxy-Eyes Photon Dragon]]" before revealing its actual form.
  * This card's Japanese name's kana reading, ガラクターアイズ・ファット・ドラゴン ''Garakutāaizu Fatto Doragon'', is a pun on 我楽多 ''garakuta'' ("garbage"), and a parody of ギャラクシーアイズ・フォトン・ドラゴン ''Gyarakushīaizu Foton Doragon'' ("Galaxy-Eyes Photon Dragon").
