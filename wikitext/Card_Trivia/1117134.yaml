title: Card Trivia:Majesty of OuTerverSe
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artworks of "[[Chaos of OuTerverSe]]" and "[[OuTerverSe Majestic Ritual]]".
  * This monster's Japanese [[Attack and effect names in Yu-Gi-Oh! GO RUSH!!|attack name]]s in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime are based on Greek words.
  ** "Basileus" (Βασιλεύς), present in all of its attack names, means "king", and contains a pun with the "Usu" (臼) kanji in [[Otes|Usu Otei]]'s name.
  ** "Pegniz" (παιγνίδι), present in its first attack name, means "play".
  ** "Menoeides" (μηνοειδής), present in its second attack name, means "crescent-shaped".
  ** "To Mellon" (τὸ μέλλον), present in its third attack name, means "the future".
  * This monster has a [[Machine]] [[Maximum Monster|Maximum]] counterpart, "[[Wish of OuTerverSe the World-Shattering Emperor]]", as noted by their similar red armored robotic designs and allusions to one of Otes's two true designs. Of the two, this monster's slender physique references Otes's design from ''[[SEVENS]]''.
