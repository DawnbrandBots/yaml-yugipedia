title: Card Trivia:Xyz Tribalrivals
wikitext: |-
  {{Navigation}}

  * "[[Alchemic Magician]]" and "[[Slacker Magician]]" appear in this card's artwork.
  ** According to the [[Master Guide 4 promotional cards|Master Guide 4]] monster stories, after finding out about her friend "Slacker Magician"'s slacking personality, "Alchemic Magician" barges into Slacker's house to convince her to get up and stop slacking. "Slacker Magician" eventually does so and becomes "[[Downerd Magician]]".<ref>[http://www.ygorganization.com/monsterstories/ YGOrganization] - [OCG] Master Guide 4 - Monster Stories</ref>
  * The events of this card's artwork are seemingly followed by "[[Arrivalrivals]]".

