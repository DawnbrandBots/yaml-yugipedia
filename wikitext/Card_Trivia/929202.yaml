  * In sports, a [[wikipedia:Most valuable player|most valuable player]] (MVP) award is an honor typically bestowed upon an individual as the most performing player (or players) in an entire league, for a particular competition, or on a specific team.
  * "[[U.A. Player Manager]]", "[[U.A. Perfect Ace]]", and "[[U.A. Mighty Slugger]]" appear in this card's artwork.
