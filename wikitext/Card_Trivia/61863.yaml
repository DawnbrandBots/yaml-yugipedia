title: Card Trivia:Earthbound Immortal Aslla piscu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Earthbound Whirlwind]]".
  * This card is based on the hummingbird [[wikipedia:Geoglyph|geoglyph]] of the [[wikipedia:Nazca Lines|Nazca Lines]].
  * "Aslla piscu" is based on the [[wikipedia:Quechuan languages|Quechua]] words ''Aslla'' and ''[[wiktionary:pisqu|pisqu]]'', both meaning "little bird".
  * "Earthbound Immortal" monsters often represent their card's owner and their initial ambitions and desires; in this card's case, it represents [[Carly Carmine]] and her ability to read fortunes.
  ** In [[wikipedia:Inca mythology|Inca mythology]], the hummingbird is believed to be a messenger from heaven. This represents Carly's occupation as a news reporter, as well as the "messages from the future" from her "[[Fortune Fairy]]" monsters, and how [[Misty Tredwell]]'s fortune-telling dictated Carly's death at the hands of [[Sayer]], which later transformed her into a [[Dark Signer]].
  ** Also, in Inca mythology, the hummingbird represents the next step into the human consciousness. This is reflected in Carly's ability to read fortunes via her cards, which is reflected in her "Fortune Fairy" and "[[Fortune Lady]]" [[Deck]]s, as well as her ability to project illusions through "[[Enlightenment]]".
  * This card is the only "[[Earthbound Immortal]]" monster that has never been a [[featured card]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This is also the only "Earthbound Immortal" monster that has never been picked on the [[card of the week]].
  ** In the anime, this was the only "[[Earthbound Immortal]]" monster whose Summoning animation did not include the "[[Earthbound God (composition)|Earthbound God]]" theme; the "[[Dark Tuning (composition)|Dark Tuning]]" theme played instead.
  * This card is one of the two "Earthbound Immortal" monsters that spoke in the ''Yu-Gi-Oh! 5D's'' anime, the other being "[[Earthbound Immortal Chacu Challhua (anime)|Earthbound Immortal Chacu Challhua]]".
  ** This card is also the only "Earthbound Immortal" monster to have speak a total of three times: once in Carly's flashback, once while possessing Carly to force her to complete the [[Duel]], and the final time when speaking through her.
  * This is the [[signature card]] of [[Carly Carmine]] during her time as a Dark Signer in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster's Summoning cutscene in ''[[Yu-Gi-Oh! Duel Links]]'' features a city-like setting. This is a reference to this card's debut in {{episode|5D's|039|ref}} where the Duel between Carly (as a Dark Signer) and Sayer took place at the [[Arcadia Movement building]] in [[New Domino City]].
  * The "piscu" in this cards name starts with a lowercase letter. This is the only card that starts a word lowercase that isn't a connector word like "the" or "of" and doesn't contain a stylized capital like [[Parallel eXceed]].
