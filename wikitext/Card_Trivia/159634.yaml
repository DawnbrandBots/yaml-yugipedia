title: Card Trivia:Gladiator Beast Tygerius
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gladiator Beast's Valor]]" and "[[Gladiator Taming]]".
  * This monster's ''[[TCG]]'' name is a pun on [[wikipedia:Tiberius (praenomen)|Tiberius]], a personal name used throughout [[wikipedia:Ancient Rome|Ancient Roman history]], which is also used by the [[wikipedia:List of Roman emperors|emperors of Rome]], including [[wikipedia:Tiberius|Tiberius]] (''Tiberius Julius Caesar Augustus'') and [[wikipedia:Claudius|Claudius]] (''Tiberius Claudius Caesar Augustus Germanicus'').
