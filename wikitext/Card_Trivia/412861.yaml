title: Card Trivia:Kozmo Sliprider
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Kozmo Forerunner]]".
  * "[[Kozmo Farmgirl]]" appears in this card's artwork.
  ** Fittingly, this monster is created and piloted by "Kozmo Farmgirl".
  * This monster's name and red color scheme are derived from the [[wikipedia:Ruby slippers|ruby slippers]] from ''[[wikipedia:The Wizard of Oz|The Wizard of Oz]]''.
  * The Konami blog article announcing this card mentions that this monster is not capable of faster-than-light travel.<ref>{{cite web | url = https://yugiohblog.konami.com/articles/?p=7305 | title = Destiny Among the Stars | author = Jerome McHale | publisher = Konami | date = July 16, 2015 | accessdate = June 7, 2024}}</ref> This may be a reference to the [[wikia:w:c:starwars:Delta-7 Aethersprite-class light interceptor|Jedi starfighter]] used by Obi-Wan Kenobi in ''[[wikipedia:Star Wars: Episode II – Attack of the Clones|Star Wars: Episode II – Attack of the Clones]]'', which had red wings and was also incapable of lightspeed travel on its own due to its lack of a hyperdrive.

