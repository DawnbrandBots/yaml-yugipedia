title: Card Trivia:Skyfaring Castle of the Black Forest
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:List of castles in Germany|castles of Germany]] and the [[wikipedia:Black Forest|Black Forest]], a large forested mountain range in [[wikipedia:Germany|Germany]].
  ** This card's name is also possibly based on "[[wiktionary:Luftschloss|luftschloss]]" ("air castle"), a German word for "a fantasy or an unrealistic dream".
  ** This card and "[[Kaiser Eagle, the Heavens' Mandate]]" have a common German theme and were first released at the [[World Championship 2019]] in [[wikipedia:Berlin|Berlin]], Germany.
  * This card is the first [[Rock]] [[Match winner]].
