title: Card Trivia:Swap Frog
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Ogre Frog" (きガエル, ''kigaeru''), is a pun on the Japanese kanji 「鬼」 normally read as "''oni''", which is associated with demons.
  ** Fittingly, this monster's design features a pair of red devil horns.
  ** Also, this monster's Japanese name is a pun on the Japanese term meaning "to change one's clothes". This is reflected in its English name and effects, as it will allow the player to "swap" one "[[Frog]]" monster on the [[field]] with another one in their [[hand]].
  * This monster is likely the antithesis of "[[Treeborn Frog]]", as both monsters' designs are based on the denizens of [[wikipedia:Heaven|Heaven]] and [[wikipedia:Hell|Hell]]. This monster's design features red devil horns and its Japanese name is associated with demons, while the halo and wings of "Treeborn Frog" are associated with angels.
  ** Also, both monsters feature opposing effects, as this monster can [[send]] an [[Aqua]] monster to the [[Graveyard]] when Summoned, while "Treeborn Frog" can be [[Special Summon]]ed from the Graveyard.
