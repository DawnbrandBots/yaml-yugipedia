title: Card Trivia:Ancient Fairy Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Ancient Prophecy]]'', as well as one of the cover cards of ''[[Collectible Tins 2009 Wave 1]]'' and ''[[Synergy Pack 01: Syncro Acceleration]]''.
  * This monster appears in the artworks of "[[Ancient Sunshine]]", "[[Crimson Dragon Quetzacoatl]]", "[[Eternal Sunshine]]", "[[Fairy Breath]]", "[[Synchro Overtop]]", and "[[World of Spirits]]".
  * The background of this card's artwork is similar to "[[Ancient Forest]]".
  ** Fittingly, both cards were used by [[Luna]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** Both also have an effect related to the [[Battle Phase]]: this card prevents the player from conducting their Battle Phase if they [[activate]] its effect to [[Special Summon]] a [[Level 4]] or lower monster from the [[hand]], while "Ancient Forest" [[destroy]]s a monster that attacked at the end of the Battle Phase.
  * This monster has two alternate forms.
  ** A [[Duel Dragon]] [[Yu-Gi-Oh! 5D's (manga)|manga]] [[counterpart]]: "[[Ancient Pixie Dragon]]".
  ** An [[Card evolutions|upgraded]] form: "[[Ancient Fairy Life Dragon]]".
  * This is the [[signature card]] of Luna in the ''Yu-Gi-Oh! 5D's'' anime.
  ** This monster's mane has a similar greenish color as Luna's hair.
  ** This monster' low [[ATK]] reflects how Luna is the youngest member of the [[Signer]]s.
  ** This monster's first effect to Special Summon a Level 4 or lower monster from the hand references how Luna's spirit was transported to the [[Duel Monsters Spirit World]], but her body was left in a coma/trance.
  ** This monster's second effect to destroy [[Field Spell]]s, make the player gain 1000 [[Life Points]], and [[add]] a Field Spell from their [[Deck]] to their hand references Luna's promise to dispel the [[Minus Curse]] in the Spirit World and heal it after [[Devack]] was defeated.
  *** Ironically, this effect would be ineffective in a [[Turbo Duel]], as Field Spells other than "[[Speed World (anime)|Speed World]]" and "[[Speed World 2 (anime)|Speed World 2]]" cannot be used in a Turbo Duel, and said Field Spells cannot be destroyed.
  * This monster and "[[Black-Winged Dragon]]" are the only [[Signer Dragon]]s to not have legs.
  * This monster has the lowest ATK (2100) and the highest [[DEF]] (3000) of all Signer Dragons.
  ** This is also the only Signer Dragon to have a lower ATK than its DEF.
  * This is the only Signer Dragon to speak in the ''Yu-Gi-Oh! 5D's'' anime, as well as the first Signer Dragon to have a confirmed gender (female).
  * This is one of four Signer Dragons that never got an upgraded form in the ''Yu-Gi-Oh! 5D's'' anime, the others being "[[Black Rose Dragon]]", "Black-Winged Dragon", and "[[Life Stream Dragon]]".
  * This is the first Signer Dragon to become [[Forbidden]].
  * In the ''Yu-Gi-Oh! 5D's'' anime, when this monster was controlled by [[Yusei Fudo]], it was the only monster that did not turn blue while in [[Defense Position]].
