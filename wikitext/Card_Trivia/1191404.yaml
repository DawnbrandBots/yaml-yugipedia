title: Card Trivia:Destiny HERO - Dreadnought
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[Fusion Monster|Fusion]] [[counterpart]] of "[[Destiny HERO - Dreadmaster]]".
  ** This monster's name is based on "Predator of Dreadnought", the attack name of "Dreadmaster" in the Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This monster's [[DEF]] (2800) is a reference to {{Episode|GX|059|ref}}, the first appearance of "Dreadmaster", in which its DEF became 2800 due to its own effect.
