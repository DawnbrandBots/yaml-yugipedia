title: Card Trivia:OuTerverSe Direct Driver
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[OuTerverSe Level Ladder]]".
  * This monster is an [[OuTerverSe (series)|OuTerverSe]] [[counterpart]] of "[[Direct Dive Dragon]]".
  ** This monster shares a similar name, appearance, and [[effect]] with "Direct Dive Dragon".
  ** This monster shares its [[ATK]] (1200) with "Direct Dive Dragon" after the latter [[activate]]s its effect.
  ** In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, when this monster's [[Type]] becomes [[Galaxy]], it takes on the color scheme of "Direct Dive Dragon".
