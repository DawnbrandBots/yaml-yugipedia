title: Card Trivia:Detonating Kuriboh
wikitext: |-
  {{Navigation}}

  [[File:Thousand-Eyes_Restrict_absorbs_multiple_Kuriboh.png|thumb|"[[Thousand-Eyes Restrict (manga)|Thousand-Eyes Restrict]]" absorbs the [[Multiply (manga)|multipled]] "[[Kuriboh (manga)|Kuriboh]]".]]

  * "[[Thousand-Eyes Restrict]]" appears in this card's artwork.
  ** This card's artwork is based on the panel from {{chapter|Yu-Gi-Oh!|131|ref}} where "[[Thousand-Eyes Restrict (manga)|Thousand-Eyes Restrict]]" absorbs numerous "[[Kuriboh (manga)|Kuribohs]]" and is weakened by their explosions as a result.
  * This monster is the [[signature move]] [[counterpart]] of "[[Kuriboh]]".
  ** This monster's effects are based on the appearance of "Kuriboh" in the aforementioned chapter, which [[Dark Yugi (manga)|Dark Yugi]] uses to [[destroy]] [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus's]] "Thousand-Eyes Restrict".
  *** Its [[Special Summon]]ing effect is based how Dark Yugi activates "[[Multiply (manga)|Multiply]]" to divide "Kuriboh" into countless copies.
  *** Its [[Quick Effect]] to [[equip]] itself to an opponent's monster in response to its effect activation is based on how the numerous "Kuribohs" are absorbed by "Thousand-Eyes Restrict" in response to its effect when it [[target]]ed Dark Yugi's "[[Magician of Black Chaos (manga)|Magician of Black Chaos]]", preventing it from being absorbed.
  **** Its effect to [[negate]] the equipped monster's effects is based on how the numerous "Kuribohs" explode after being absorbed by "Thousand-Eyes Restrict", blinding its eyes and negating its effects.

