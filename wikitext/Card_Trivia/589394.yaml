  * "[[Medusa, Watcher of the Evil Eye]]", "[[Basilius, Familiar of the Evil Eye]]", "[[Serziel, Watcher of the Evil Eye]]" (who is wearing "[[Evil Eye of Selene]]"), and "[[Catoblepas, Familiar of the Evil Eye]]" appear in this card's artwork.
