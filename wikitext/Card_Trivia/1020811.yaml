title: Card Trivia:Forge a New Future
wikitext: |-
  {{Navigation}}

  [[File:Decode Talker & Borreload Dragon from VRAINS OP 1.png|thumb|300px|"[[Decode Talker (anime)|Decode Talker]]" attacks "[[Borreload Dragon (anime)|Borreload Dragon]]" in ''[[With The Wind]]''.]]
  * "[[Borreload Dragon]]" and "[[Decode Talker]]" appear in this card's artwork.
  * This card's Japanese name, "Prisoner of Destiny", is based on a scene in the original Japanese version of {{episode|VRAINS|046|ref}}, where [[Varis]] states that he and [[Yusaku Fujiki|Playmaker]] were both "prisoners of fate".
  ** This card's ''[[TCG]]'' name is based on the English dubbed version of the same scene from the same episode, where Playmaker states that he and Varis could "forge a new path to the future together".
  ** This card's artwork is based on a scene from the first opening of ''[[Yu-Gi-Oh! VRAINS]]'', ''[[With The Wind]]'', in which "[[Decode Talker (anime)|Decode Talker]]" attacks "[[Borreload Dragon (anime)|Borreload Dragon]]". The setting and the attack were changed to match the mentioned episode, where "Decode Talker" has its [[ATK]] increased by the effect of "[[Zero Extra Link (anime)|Zero Extra Link]]".

