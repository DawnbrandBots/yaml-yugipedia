title: Card Trivia:Kikinagashi Fucho
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of ''Kikinagasu'' (聞き流す, lit. "in one ear and out the other") and ''Fukinagashi fūchō'' (フキナガシフウチョウ, lit. "[[wikipedia:King of Saxony bird-of-paradise|King of Saxony bird-of-paradise]]").
  * ''Kikinagasu'' is a colloquial expression for "ignoring someone" or more specifically "not paying attention to", with the pun being incorporated into the card's effect; which allows it to "ignore" the opponent entirely by being immune to their card effects, and also preventing its destruction by battle and any damage through its detach effect.
