title: Card Trivia:Big Insect
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Black garden ant|black ant]].
  * The icon for Insect monsters in ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'' is based on this monster.
  * This card has one of the largest gap of time from its first and only ''[[OCG]]'' release to its original ''[[TCG]]'' release, separated by a period of 20 years. It was first printed in the ''OCG'' August 1999 in ''[[Booster 4]]'' , while the first print of the card in the ''TCG'' was in August 2019 in ''[[Speed Duel Starter Decks: Ultimate Predators]]''.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|66|ref}}, specifically from the 1-page panel where [[Insector Haga (manga)|Insector Haga]] imposes an menacing aura with his field of [[Big Ant (manga)|this monster]], "[[Giant Flea (manga)|Giant Flea]]", "[[Pillroach]]", "[[Basic Insect (manga)|Basic Insect]]" equipped with "[[Laser Cannon Armor (manga)|Laser Cannon Armor]]", and "[[Hercules Beetle (manga)|Hercules Beetle]]".
