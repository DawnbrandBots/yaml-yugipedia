title: Card Trivia:Cherubini, Ebon Angel of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * This card is based on the black [[wikipedia:Cherub|Cherub]], a character mentioned in Dante Aligheri's ''[[wikipedia:Divine Comedy|Divine Comedy]]''. In Canto XXVII of the ''[[wikipedia:Inferno (Dante)|Inferno]]'', the Francisian monk [[wikipedia:Guido I da Montefeltro|Guido I da Montefeltro]] recounts how he reluctantly gave advice to pope [[wikipedia:Pope Boniface VIII|Boniface VIII]], only after Boniface had agreed to absolve him for the sin of his fraudulent counsel. After his death, [[wikipedia:Francis of Assisi|St. Francis]] arrived to claim his soul for the saved, but a black Cherub appeared to assert Hell's superior claim over Guido.
  * This monster's appearance borrows from traditional depictions of Cherubim as [[wikipedia:Tetramorph|tetramorphs]] with four heads: that of a Lion, an Ox, an Eagle and a Man.
  ** The weapon in Cherubini's left hand are based on the biblical description of the weapons wielded by the Cherubim sent to guard the Garden of Eden: fiery swords "which turned every way..." This passage also suggests the wildly curving appearance of the sword seen in the artwork.
  * This is the first "[[Burning Abyss]]" [[Link Monster]] to be released.
