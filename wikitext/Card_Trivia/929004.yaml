title: Card Trivia:Amazement Attendant Comica
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amaze Attraction Thrill Train]]" and "[[Amazement Special Show]]".
  ** This monster also appears as a toy in the artwork of "[[Amazement Family Faces]]".
  * This card's name, "Comica", is a synonym of "Commedia" ("comedy") in Italian, used for theater plays and old movies.
  * This card is the opposite [[counterpart]] of "[[Amazement Assistant Delia]]".
  ** Both have a mirrored appearance.
  ** Both have opposite [[ATK]] and [[DEF]].
