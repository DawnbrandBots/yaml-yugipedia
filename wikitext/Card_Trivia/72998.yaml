title: Card Trivia:Weapon Change
wikitext: |-
  {{Navigation}}

  * The knight in this card's artwork appears in the artwork of "[[Birthright]]".
  * This card is a [[Continuous Spell Card]] [[counterpart]] of "[[Sword & Shield]]".
  ** Both cards' artworks depict a knight with an artistic gestalt of a sword and a shield (each representing [[ATK]] and [[DEF]] respectively) taking each other's places.
  ** This card's [[Warrior]] and [[Machine]] support effect references the appearances of "[[Shield and Sword (manga)|Shield and Sword]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where it was used by [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] and [[Bandit Keith (manga)|Bandit Keith Howard]], who each used the aforementioned card while they controlled Warrior and Machine monsters, respectively.
