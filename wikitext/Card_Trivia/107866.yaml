title: Card Trivia:Psychic Emperor
wikitext: |-
  {{Navigation}}

  * The monster's appearance and [[Psychic]] [[Type]] are based on the portrayal of Buddhist monks, particularly those who have mastered mental fitness to the point of being rumored to know telekinesis.
  * The ring behind "Psychic Emperor" in this card's artwork resembles a [[wikipedia:Stargate (device)|Stargate]].
