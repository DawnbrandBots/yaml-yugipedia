title: Card Trivia:Dark Coffin
wikitext: |-
  {{Navigation}}

  * This card and "[[Statue of the Wicked]]", simultaneously released in ''[[Pharaonic Guardian (Japanese)|Pharaonic Guardian]]'', were the first Trap Cards in the ''[[OCG]]''/''[[TCG]]'' that are incapable of being activated, and instead only activate their effects when destroyed while [[Set]] on the field.
