title: Card Trivia:Zushin the Sleeping Giant
wikitext: |-
  {{Navigation}}

  * This monster is likely based on [[wikipedia:Kumbhakarna|Kumbhakarna]], the Hindu sleeping giant.
  * This monster's name is based on the Japanese onomatopoeia "''zushi''" (ズシ), which is used to represent the sound of a heavy object falling, similar to a "thump", a "thud", or a "boom".
  ** As such, this monster's name represents the Japanese onomatopoeia of heavy footfalls, which is commonly associated with fictional giants in different media.
  * When this card was released in ''[[Collectors Pack: Duelist of Flash Version]]'', it was printed as a [[Normal Rare]] card. This is a reference to the ''[[Yu-Gi-Oh! 5D's]]'' anime, where [[Zushin the Sleeping Giant (anime)|this card]] was depicted as the single most common ''Duel Monsters'' card, with nearly the entire [[World Racing Grand Prix]] audience possessing a copy; [[Leo]] mentions that he even owns multiple copies.
  ** This card is also known for its steep [[Summoning condition]], which made it nearly impossible to Summon: [[Team Taiyo]] was the first to successfully Summon this monster in the history of ''[[Duel Monsters]]''.
