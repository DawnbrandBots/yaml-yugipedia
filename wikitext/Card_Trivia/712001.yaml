title: Card Trivia:Penguin Torpedo
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{episode|Yu-Gi-Oh!|103|ref}}, specifically from the scene when [[Penguin Torpedo (anime)|this monster]] is Summoned for the first time.
  * This monster's ''OCG''/''TCG'' effect to take control of an opponent's [[Level 6]] or lower monster references the [[Duel]] between [[Crump]] (who used this monster) and [[Téa Gardner]] (who used the Level 6 "[[Dark Magician Girl]]" as her [[Deck Master]]) in the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'']] anime.
  ** This monster's ''OCG''/''TCG'' effect to take control of an opponent's monster after inflicting battle damage references the Duels between [[The Big Five]] and their opponents, where if a Big Five member won their Duel, he would be able to possess the loser's body in order to escape [[Noah's Virtual World]].
