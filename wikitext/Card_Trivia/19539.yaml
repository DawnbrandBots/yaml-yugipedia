title: Card Trivia:Swords of Revealing Light
wikitext: |-
  {{Navigation}}

  * The swords in this card's artwork appear in the artwork of "[[Swordsman of Revealing Light]]".
  * This card appears in the artworks of "[[Forced Activation]]", "[[Heraldry Burst]]", "[[Release Restraint Wave]]", and "[[Scarlet Security]]".
  * The three swords in this card's artwork reference the three turns that this card's effect lasts.
  * This card has several [[counterpart]]s:
  ** "[[Dark-Piercing Sword]]"
  ** "[[Restraining Sword of Impact]]"
  ** "[[Spiritual Swords of Revealing Light]]"
  ** "[[Swords of Burning Light]]"
  ** "[[Swords of Concealing Light]]"
  * The swords appear on [[Pharaoh Atem]]'s side on the [[Tablet of Lost Memories]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This is the first [[Spell Card]] played by [[Yami Yugi]] in the ''Yu-Gi-Oh!'' anime.
  * In ''[[Yu-Gi-Oh! Duel Links]]'' and ''[[Yu-Gi-Oh! Master Duel]]'', this card has a special animation when [[activate]]d, in which the swords in this card's artwork will drop down from the sky.
