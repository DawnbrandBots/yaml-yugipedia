title: Card Trivia:Super King Rex
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ascending Evolution]]", "[[Crack Fall]]", "[[Dinosaur Crush]]", "[[Dyna Body Heat]]", and "[[Top of the Food Chain]]".
  ** The artwork of "[[Coevolutionary Miracle]]" depicts "[[Little D (Rush Duel)|Little D]]" transforming into this monster.
  * This monster is based on a ''[[wikipedia:Tyrannosaurus|Tyrannosaurus rex]]''.
  * This monster has a [[Nouveau Riche Dinosaur]] [[counterpart]]: "[[Ritzy King Rex]]".
