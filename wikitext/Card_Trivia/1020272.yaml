title: Card Trivia:Here Goes Something!
wikitext: |-
  {{Navigation}}

  * This card's name is a phrase commonly uttered by [[Jaden Yuki]] in the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, more often than not when he is under pressure during a Duel and preparing to either [[Draw Phase|draw for turn]] or activate a particular effect.
  * This card's effect to allow an "[[Elemental HERO]]" monster to [[Can make multiple attacks on monsters|attack multiple monsters]] is similar to the effect of "[[Feather Shot]]", which Jaden uses prominently in the anime.
