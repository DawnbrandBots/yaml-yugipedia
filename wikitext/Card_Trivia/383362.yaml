title: Card Trivia:Speedroid Red-Eyed Dice
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dicetadium of Fate]]".
  * This monster is based on a [[wikipedia:Dice|six-sided die]], a cube-shaped die with six square faces.
  ** This monster's name reflects its design, which features a red-colored "eye" on the one side representing the singular [[wikipedia:Pip (counting)|pip]], while the same side and the other sides feature pips resembling "eyedrops".
  *** This monster's name reflects its motif surrounding the number "1"; it features a single archaic design of an "eye", its [[Level]] is 1, its [[original ATK and DEF]] is 100/100, and its effect can change the Level of a "[[Speedroid]]" monster to a minimum of 1.
  *** This monster's design also reflects its motif surrounding the number "6"; it is a six-sided die with six visible faces and is surrounded by six glowing orbs, and its effect can change a "Speedroid" monster's Level to a maximum of 6.
