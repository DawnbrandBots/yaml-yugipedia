title: Card Trivia:Satellarknight Rigel
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Rigel|Rigel]], which is the brightest star in the [[wikipedia:constellation|constellation]] [[wikipedia:Orion (constellation)|Orion]].
  ** The constellation Orion appears in the artwork of this card, with Rigel's location in said constellation denoted by an encircled star.
  ** Rigel, [[wikipedia:Aldebaran|Aldebaran]], [[wikipedia:Capella|Capella]], [[wikipedia:Pollux (star)|Pollux]], [[wikipedia:Procyon|Procyon]] and [[wikipedia:Sirius|Sirius]] are the five stars of the [[wikipedia:Asterism (astronomy)|asterism]] known as the [[wikipedia:Winter Hexagon|Winter Hexagon]].
  * [[wikipedia:Betelgeuse|Betelgeuse]] and [[wikipedia:Rigel|Rigel]] are the two brightest star of the Orion constellation. While the first represents a [[wikipedia:red supergiant|red supergiant]] star nearing the end of its life, Rigel can be seen as a [[wikipedia:blue supergiant|blue one]].
  ** In the "[[tellarknight]]" archetype, "[[Satellarknight Rigel|Rigel]]" and "[[Satellarknight Betelgeuse|Betelgeuse]]" are the only monsters to share the same constellation.
  ** The dualism of the stars is also conserved through the cards :
  *** Their [[ATK]] and [[DEF]] points are interchanged.
  *** Their effect is complentary : Rigel targets a card on a field, and send it to the graveyard. In contrast, Betelgeuse send itself to the GY, to add a card to your hand.
  *** They both represent Orion, the Hunter, in a different position.
  *** Betelgeuse wield his sword from the left hand ; while Rigel from the right one.
  *** They both were a cape, but the foreground color of the emblem is opposed (blue for Rigel, red for Betelgeuse).
  *** The slightly constrast in the color of their wavy hair might be a reference to Betelgeuse's end of life, older than Rigel.
  *** Their background color, retaken from the star herself, are [[wikipedia:Complementary colors|complementary]].
