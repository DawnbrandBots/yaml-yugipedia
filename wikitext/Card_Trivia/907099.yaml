title: Card Trivia:Underworld Goddess of the Closed World
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Mega Pack 05]]'' and ''[[Essential Selection 01]]''.
  * This monster's Japanese name, "Saros-Eresh Kurnugias", is a combination of "[[wikipedia:Saros (astronomy)|Saros]]" (a cycle of exactly 223 lunar months, or a little over 18 years, that can be used to predict both solar and lunar eclipses), "[[wikipedia:Ereshkigal|Ereshkigal]]" (the [[wikipedia:Mesopotamia|Mesopotamian]] goddess of the underworld), and "[[wikipedia:Ancient Mesopotamian underworld|Kurnugi]]" (one of the names for the underworld in [[wikipedia:Mesopotamian mythology|Mesopotamian mythology]]).
  ** The dragon in this card's artwork is likely based on the Kur, half-brother of Ereshkigal, who brought her to the underworld against her will to become its queen.
  ** Unusually, this monster's ''[[TCG]]'' name is a translation of the base kanji of its Japanese name (閉ザサレシ世界ノ冥神 ''Tozasareshi Sekai no Meishin''), rather than of the forced reading given for them.
  * This monster has a younger form: "[[Moon of the Closed Heaven]]".
