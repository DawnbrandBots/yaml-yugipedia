title: Card Trivia:The Phantom Knights of Shade Brigandine
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Brigandine|brigandine]], a form of body armor made of iron rings or plates.
  * This card and "[[The Phantom Knights of Tomb Shield]]" are the first [[Trap Monster]]s that can [[Special Summon]] themselves directly from the [[Spell & Trap Zone]] as monsters upon [[activation]], but do not treat themselves as [[Trap Card]]s. This is closer in design to the previous mechanic of Trap Monsters, as opposed to having to be [[sent]] to the [[Graveyard]] first.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|002|ref}}, specifically from the panel showing [[Phantom Knights Shade Brigandine (manga)|this Trap Monster]] being Summoned.
