title: Card Trivia:Miracle Fertilizer
wikitext: |-
  {{Navigation}}

  * Four "[[Nettles]]", along with a picture of "Nettles" on the can, appear in this card's artwork.
  * The spray can shown in this card appears in the artwork of "[[That Grass Looks Greener]]".
  * The artwork of "[[Tyrant Farm]]" is very similar to this card's artwork.
