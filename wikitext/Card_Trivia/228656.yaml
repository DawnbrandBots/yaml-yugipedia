title: 'Card Trivia:Number 69: Heraldry Crest'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Number Lifter]]".
  * The number "69" appears on this monster's left horn.
  * This monster's color scheme is based on the [[wikipedia:Yin and yang|yin and yang]] from [[wikipedia:Taoism|Taoism]].
  * This monster has a "[[Number C]]" [[Card evolutions|upgraded]] form: "[[Number C69: Heraldry Crest of Horror]]".
  * This monster has two [[signature move]] evolution forms: "[[Number 69: Heraldry Crest - Shatter Stream]]" and "[[Number 69: Heraldry Crest - Dark Matter Demolition]]".
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, the aforementioned evolved forms are the transformed versions of this monster after using its [[anime-exclusive]] effect to [[destroy]] an opponent's card when their monster declares an attack.
  * "[[Number]]" monsters often take the form of their owners and/or their original desires; this card represents its original owner, [[Vetrix]] and his insurmountable amount of rage. Fittingly, in the ''Yu-Gi-Oh! ZEXAL'' anime, a great amount of anger was required to [[control]] this monster.
  ** This monster's name reflects the heraldry theme of Vetrix's [[Deck]].
  ** This monster's [[Psychic]] [[Type]] and effects to [[negate]] the effects of all the other [[Xyz Monster]]s on the [[field]] reflects Vetrix's ability to steal and manipulate his opponent's memories, which can affect them psychologically and render them vulnerable in [[Duel]]s.
  ** This monster's effect to gain the effects of Xyz Monsters on the field reflects how Vetrix stole [[Hart Tenjo]]'s power.
  ** This monster's anime-exclusive effect to destroy a card the opponent controls when their monster declare an attack reflects Vetrix's desire to destroy his enemies, including [[Dr. Faker]].
  * Visually, this monster resembles Vetrix, having white horns that invoke Vetrix's longest pair of hair fringes, and a ribbed spine that resembles his ponytail. The horns also have red highlights that resemble the red detail on the center of Vetrix's hair. This monster's stubby legs may also reference Vetrix's short child body.  
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster used its effect to gain the effects of all other Xyz Monsters on the field, a clawed hand made of pink energy came out of its back and impaled its [[target]], draining it of its color.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this monster's roar was similar to that of "[[Number 17: Leviathan Dragon (anime)|Number 17: Leviathan Dragon]]".
  ** Coincidentally, "Leviathan Dragon" was one of the Xyz Monsters whose effect was stolen by this card. (see "Dark Matter Demolition")
