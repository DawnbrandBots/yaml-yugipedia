title: Card Trivia:Galaxy-Eyes Cloudragon
wikitext: |-
  {{Navigation}}

  * This monster is a younger form of "[[Galaxy-Eyes Photon Dragon]]".
  ** This monster's [[ATK]] and [[DEF]] (300/250) are one-tenth of the [[original ATK and DEF]] of "Galaxy-Eyes Photon Dragon".
  ** This monster is the "[[Galaxy-Eyes]]" [[counterpart]] of "[[The White Stone of Legend]]": both share the same [[Attribute]] ([[LIGHT]]), [[Level]] (1), original ATK and DEF, and are the younger form of the signature card of their respective [[archetype]].
  ** This monster's design and self-[[Tribute|Tributing]] effect also closely resemble those of "[[Black Dragon's Chick]]" and "[[The Black Stone of Legend]]".
  ** This card's artwork depicts "Galaxy-Eyes Photon Dragon" being born from what appears to be a cosmic [[wikipedia:Nebula|nebula]], a body of interstellar clouds which stars are "born" from.
  * This monster has a "[[Tachyon]]" counterpart: "[[Tachyon Cloudragon]]".
  * This monster and "[[Galaxy-Eyes Solflare Dragon]]" are the only "Galaxy-Eyes" Dragon monsters whose names are not directly based on a particle.
