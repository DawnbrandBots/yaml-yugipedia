title: Card Trivia:Red Sprinter
wikitext: |-
  {{Navigation}}

  * This monster is based on a "sprinter" in [[wikipedia:Horse racing|horse racing]], a horse that can quickly run over short distances.
  ** This monster also appears to be based on the [[wikipedia:Jersey Devil|Jersey Devil]], a cryptid who is often depicted as a bipedal creature with horse-like features and small arms with clawed hands.
