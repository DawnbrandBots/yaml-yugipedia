title: Card Trivia:Frozen Fitzgerald
wikitext: |-
  {{Navigation}}

  * This monster's name is likely based on the author [[wikipedia:F. Scott Fitzgerald|F. Scott Fitzgerald]], who is known for writing winter-themed stories.
  ** This monster's name may also be derived from the [[wikipedia:USS Fitzgerald|USS ''Fitzgerald'']], a [[wikipedia:Destroyer|destroyer ship]] used by the [[wikipedia:United States Navy|United States Navy]], named after the Naval officer [[wikipedia:William Charles Fitzgerald|William Charles Fitzgerald]].
  *** Similarly, the Japanese name for the [[Dark Synchro Monster]], "[[Dark Diviner]]", "Jet-Black Zumwalt", is derived from the [[wikipedia:USS Zumwalt|USS ''Zumwalt'']], another destroyer ship used by the United States Navy named after the Naval officer [[wikipedia:Elmo Zumwalt|Elmo Zumwalt]]. 
  * This is the first Dark Synchro Monster to appear in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster's required [[Synchro Material]] in the ''[[OCG]]''/''[[TCG]]'' is based on its appearance in {{episode|5D's|027|ref}} when it was [[Dark Synchro Summon]]ed using "[[Dark Tuner Catastrogue (anime)|Dark Tuner Catastrogue]]" (a [[Dark Tuner monster]]) and "[[Blizzard Lizard (anime)|Blizzard Lizard]]" (a [[Beast]] non-Tuner monster) as [[material]].
