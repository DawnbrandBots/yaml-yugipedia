title: Card Trivia:Twin Vortex
wikitext: |-
  {{Navigation}}

  * This card's name and artwork both reference "[[Lightning Vortex]]".
  * This card has an ''[[OCG]]''/''[[TCG]]'' [[counterpart]]: "[[Mektimed Blast]]".
  * This card's video game effect to [[destroy]] the player's [[Machine]] monster is an alteration of its effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which destroys a monster the player [[control]]s, in addition to destroying the opponent's monster. In the [[Duel]]s where this card was used, its effect was used to destroy "[[Wise Core (anime)|Wise Core]]" and "[[Sky Core (anime)|Sky Core]]", both of whom are Machine monsters.
