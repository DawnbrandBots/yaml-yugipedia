title: Card Trivia:Floowandereeze & Snowl
wikitext: |-
  {{Navigation}}

  * This monster's name and design is based on the [[wikipedia:Snowy owl|snowy owl]], a species of bird found in the [[wikipedia:Arctic|Arctic regions]].
  ** The snowy owl appears in the artwork of "[[Floowandereeze and the Advent of Adventure]]".
  ** Fittingly, the background of this card's artwork depicts [[wikipedia:Pine|pine trees]] marked on [[wikipedia:Greenland|Greenland]] on the map appearing in the artwork of "[[Floowandereeze and the Magnificent Map]]".
