title: Card Trivia:Ghostrick Festival
wikitext: |-
  {{Navigation}}

  * "[[Ghostrick Alucard]]", "[[Ghostrick Angel of Mischief]]", "[[Ghostrick Doll]]", "[[Ghostrick Dullahan]]", "[[Ghostrick Fairy]]", "[[Ghostrick Ghoul]]", "[[Ghostrick Jackfrost]]", "[[Ghostrick Jiangshi]]", "[[Ghostrick Lantern]]", "[[Ghostrick Mary]]", "[[Ghostrick Mummy]]", "[[Ghostrick Nekomusume]]", "[[Ghostrick Siren]]", "[[Ghostrick Skeleton]]", "[[Ghostrick Socuteboss]]", "[[Ghostrick Specter]]", the arm of "[[Ghostrick Stein]]", "[[Ghostrick Warwolf]]", "[[Ghostrick Witch]]", "[[Ghostrick Yeti]]", and the upper half of "[[Ghostrick Yuki-onna]]" appear in this card's artwork.
  * This is the first [[Extra Deck]] monster that can use a [[face-down]] monster as [[material]] for a built-in [[Special Summon]], besides [[Contact Fusion]].
  * This card is similar to the "[[Ghostrick]]" [[Field Spell Card]]s.
  ** This card's name and artwork are similar to those of "[[Ghostrick Mansion]]", "[[Ghostrick Museum]]", and  "[[Ghostrick Parade]]", which depict various "Ghostrick" monsters in their card artwork and are named after a location or event.
  ** This card's effect only applies while a "[[Ghostrick]]" card is in the [[Field Zone]].
  ** Furthermore, the activation condition of "[[Ghostrick or Treat]]" requires the player to control either a "Ghostrick" [[Link Monster]] (which is currently only this card) or a "Ghostrick" Field Spell.
