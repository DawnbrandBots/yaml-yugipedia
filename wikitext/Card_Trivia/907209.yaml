title: Card Trivia:Piercing the Darkness
wikitext: |-
  {{Navigation}}

  [[File:Piercing the Darkness.png|thumb|250px|"[[Dark Paladin (manga)|Dark Paladin]]" attacking 3 "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragons]]" at once via the effect of "[[Diffusion Wave-Motion (manga)|Diffusion Wave-Motion]]".]]

  * "[[Dark Paladin]]" appears in this card's artwork.
  ** Fittingly, "Dark Paladin" can be [[Fusion Summon]]ed using "[[Dark Magician]]", a [[Normal Monster]], as [[Fusion Material]], which is required for this card's effect.
  * This card's artwork is based on a scene from [[Dark Yugi and Seto Kaiba's Battle City Duel (manga)|Dark Yugi and Seto Kaiba's Battle City Duel]] (and its [[Yami Yugi and Seto Kaiba's Battle City Duel|anime adaptation]]) where "[[Dark Paladin (manga)|Dark Paladin]]" makes multiple attacks using the effect of "[[Diffusion Wave-Motion (manga)|Diffusion Wave-Motion]]".
  ** This card's name is a reference to the above-mentioned scene where [[Dark Yugi (manga)|Dark Yugi]] orders "Dark Paladin" to attack [[Seto Kaiba (manga)|Seto Kaiba's]] three "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragons]]" and destroy Kaiba's darkness.

