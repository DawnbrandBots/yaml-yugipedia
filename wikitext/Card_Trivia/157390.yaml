title: Card Trivia:Wattmole
wikitext: |-
  {{Navigation}}

  * Based on this card's ''[[OCG]]'' name, this monster is based on the [[wikipedia:Golden mole|Golden mole]].
  * This card bears a slight resemblance to [[wikipedia:Gurren Lagann|Gurren-Lagann]]'s Boota, and its sunglasses are similar to those worn by Kamina from the same show.
  * This monster's claws resemble those of [[wikipedia:Freddy Kreuger|Freddy Kreuger]] from ''[[wikipedia:A Nightmare On Elm Street|A Nightmare on Elm Street]]''.
