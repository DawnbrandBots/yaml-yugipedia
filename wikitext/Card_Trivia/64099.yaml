title: Card Trivia:Beaver Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Emergency Evasion]]", "[[Pinpoint Guard]]", and "[[Scrum Force]]".
  ** A stone tablet of this monster appears in the artwork of "[[Wedju Temple]]".
  * This monster has a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Marching Beaver Warrior]]".
  * Despite this monster's name, its tail is similar to a mouse or a rat than a beaver.
  * This card's [[flavor text]] probably refers to "[[Sogen]]", a [[Field Spell]] which, as this card's text suggests, would make this card's [[DEF]] fairly high (1700).
  * The [[Beaver Warrior (Bandai)|Bandai]] version of this card has 1400 [[ATK]] and 1800 DEF, whereas the [[Konami]] version of has 1200 ATK and 1500 DEF.
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from {{chapter|Yu-Gi-Oh!|067|ref}}, specifically from the panel showing [[Beaver Warrior (manga)|this monster]] being Summoned.
