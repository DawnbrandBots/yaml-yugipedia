title: Card Trivia:Peten the Dark Clown
wikitext: |-
  {{Navigation}}

  * This monster is possibly a counterpart of "[[Saggi the Dark Clown]]".
  ** Both share the same [[Attribute]] ([[DARK]]), [[Level]] (3), and [[Type]] ([[Spellcaster]]).
  ** Both were used by [[Seto Kaiba]] in the original ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' series to [[activate]] the effect of a [[Virus Card]].
