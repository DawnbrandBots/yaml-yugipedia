title: Card Trivia:Qardan the Clear-Sighted
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2024]]''.
  * This monster's name is based on "''abw qardan''", the Arabic term for the [[Wikipedia:Crested ibis|crested ibis]], which this monster's mask resembles.
  ** According to [[wikipedia:Egyptian mythology|Egyptian mythology]], the crested ibis is associated with [[wikipedia:Thoth|Thoth]], the [[wikipedia:Egyptian god|Egyptian god]] depicted with the head of an ibis, who is associated with divine knowledge and writing, which reflects this monster's title.
