title: Card Trivia:Nekroz Mirror
wikitext: |-
  {{Navigation}}

  * The mirror in this card's artwork resembles a "[[Gishki Aquamirror]]".
  ** This makes sense as the "[[Nekroz]]" [[archetype]] appears to be the successors of the "[[Gishki]]"; two of the core members are older versions of "[[Gishki Avance]]" and "[[Gishki Emilia]]", the only survivors of the last war.
  * This mirror appears in the following artworks:
  ** "[[Shurit, Strategist of the Nekroz]]" (as the hilt of his sword).
  *** As "Shurit" is the base of "[[Nekroz of Clausolas]]", "[[Nekroz of Brionac]]" and "[[Nekroz of Trishula]]" the hilt of these monsters' swords are also this mirror.
  ** "[[Great Sorcerer of the Nekroz]]" (on his staff).
  ** "[[Dance Princess of the Nekroz]]" (worn on her forehead).
  ** "[[Ariel, Priestess of the Nekroz]]" (on her hat)
  ** "[[Exa, Enforcer of the Nekroz]]" (worn on his chest).
  *** As "Exa" is the base of "[[Nekroz of Catastor]]" and "[[Nekroz of Decisive Armor]]", this mirror is worn on their chests.
  ** "[[Nekroz of Unicore]]" (on his staff just like his previous form).
  ** "[[Nekroz of Valkyrus]]" (on his chest).
  ** "[[Nekroz of Gungnir]]" (on her staff).
  ** "[[Nekroz of Sophia]]" (on her stomach).
  ** "[[Nekroz Kaleidoscope]]" (the mirror on the sword of "Shurit" is glowing and mostly obscured by a bright light).
  ** "[[Nekroz Cycle]]" (the mirror on the forehead of "Dance Princess" can be seen).
  ** "[[Zefra Divine Strike]]" (the mirror on the stomach of "Nekroz of Sophia" can be seen).
