title: Card Trivia:Azamina Ilia Silvia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Azamina Debtors]]" and "[[Guilt of the Sinful Spoils]]".
  ** A silhouette of this monster appears in the artwork of "[[Deception of the Sinful Spoils]]".
  * This monster is named after [[Wikipedia:Rhea Silvia|Rhea Silvia]], the mother of [[Wikipedia:Romulus and Remus|Romulus and Remus]], with the former of the two brothers being the mythological founder of [[Wikipedia:Rome|Rome]].
  ** According to [[Wikipedia:Roman mythology|Roman mythology]], Rhea Silvia was impregnated by [[Wikipedia:Mars (mythology)|Mars]], the Roman god of war, and gave birth to Romulus and Remus. The twin brothers were taken away by a servant of [[Wikipedia:Amulus|King Amusulus]], their outraged father, and set adrift the river [[Wikipedia:Tiber|TIber]]. This monster's twin-headed wolf-like appearance reflects how the twins Romulus and Remus were rescued and suckled by a [[Wikipedia:She-wolf (Roman mythology)|she-wolf]].
  * This monster is an [[Card evolutions|upgraded]] "[[Azamina]]" form of "[[Silvy of the White Forest]]".
  * This monster has two [[counterpart]]s.
  ** "[[White Forest]]" [[Synchro Monster|Synchro]]: "[[Silvera, Wolf Tamer of the White Forest]]".
  *** Both are depicted with mirrored poses.
  *** Both have opposite [[Attribute]]s ([[DARK]] and [[LIGHT]]).
  *** Both share the same [[Level]] (6).
  *** Both share the same [[original ATK]] (1900).
  ** "[[Sinful Spoils]]" [[Trap Card]]: "[[Sinful Spoils of Betrayal - Silvera]]".
  *** The kanji ''Haishin'' (背信) in this monster's base Japanese name and the kanji ''Uragiri'' (裏切り) in the Japanese name of "Sinful Spoils of Betrayal - Silvera" both translate to "betrayal".
  * This monster has the same [[original DEF]] of "[[Rciela, Sinister Soul of the White Forest]]".
  ** Conversely, "[[Azamina Mu Rcielago]]" has the same original DEF of "Silvera, Wolf Tamer of the White Forest".
