title: Card Trivia:Sword Arm of Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Jurassic Power]]".
  * This monster is based on the ''[[wikipedia:Stegosaurus|Stegosaurus]]''; however, it does not have the four tail spikes, having a "stinger" resembling that of scorpions.
  * This is the first monster to have an [[ATK]] or [[DEF]] that is [[not divisible by 50]], as well as the first and currently only monster with an [[original DEF]] of 2030.
  ** This is also one of several monsters whose ATK or DEF is not divisible by 50, the others being "[[Number S39: Utopia Prime]]" and [[PaniK's monsters]]: "[[Barox]]", "[[Castle of Dark Illusions]]", "[[Dark Chimera]]", "[[King of Yamimakai]]", and "[[Reaper of the Cards]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|078|ref}}, specifically from the panel showing [[Sword Dragon (manga)|this monster]] attacking and [[destroy]]ing "[[Axe Raider (manga)|Axe Raider]]".
  ** This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is also taken from {{chapter|Yu-Gi-Oh!|078|ref}}, specifically from the panel showing this monster attacking and destroying "[[Swamp Battleguard (manga)|Swamp Battleguard]]".
