title: Card Trivia:Intrigue Shield
wikitext: |-
  {{Navigation}}

  * This card has the following in common with "[[Dragon Shield]]":
  ** Both cards have the word "Shield" in their names.
  ** Both cards can equip to a monster and have different degrees of preventing that monster from being destroyed in battle, as well as quashing [[Battle Damage]] players would have taken.
  ** Both cards (in the ''[[OCG]]'') were first released in ''[[Shadow Specters]]'' as [[Common]]s rarity-wise.
  ** Both cards (in the anime) were used by [[Number Guardian]]s (this card by [[Mach]] and "Dragon Shield" by [[Jinlon]].)
