title: Card Trivia:Chronomaly Pyramid Eye Tablet
wikitext: |-
  {{Navigation}}

  * "[[Chronomaly Colossal Head]]", "[[Chronomaly Crystal Chrononaut]]" and "[[Chronomaly Golden Jet]]" appear in this card's artwork.
  * The [[Eye of Wdjat]] is depicted at the top of the tablet in this card's artwork. 
  * This card is possibly based on the ''[[wikipedia:Emerald Tablet|Emerald Tablet]]'', a cryptic text that is commonly associated with the ''[[wikipedia:Magnum opus (alchemy)|Magnum opus]]'' process and the creation of the [[wikipedia:Philosopher's Stone|philosopher's stone]]. 
  ** The ''Emerald Tablet'' is claimed to be the work of [[wikipedia:Hermes Trismegistus|Hermes Trismegistus]], a syncretic combination of the Greek god  [[wikipedia:Hermes|Hermes]] and the Egyptian god [[wikipedia:Thoth|Thoth]], the latter of which reflects the inclusion of the Eye of Wdjat in this card's artwork, as it is based on the [[Wikipedia:Eye of Horus|Eye of Horus]], a common symbol in Ancient Egypt.
