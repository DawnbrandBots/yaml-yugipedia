title: Card Trivia:Dirge of the Lost Dragon
wikitext: |-
  {{Navigation}}

  * "[[Destrudo the Lost Dragon's Frisson]]" appears in this card's artwork.
  * A [[wikipedia:Dirge|dirge]] is a somber song that expresses mourning or grief.
  ** "[[wikipedia:Strain (music)|Strain]]" in this card's Japanese name refers to the sound of a piece of a music as it is being played.
