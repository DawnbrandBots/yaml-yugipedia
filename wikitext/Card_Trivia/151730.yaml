title: Card Trivia:Blackwing - Gram the Shining Star
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Blackwing - Delta Union]]".
  * This monster is named after [[wikipedia:Gram (mythology)|Gram]], the sword used by [[wikipedia:Sigurd|Sigurd]] to kill the dragon [[wikipedia:Fafnir|Fafnir]] in [[wikipedia:Norse mythology|Norse mythology]].
  * This is the first "[[Blackwing]]" [[Synchro Monster]] Summoned in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This monster's [[Nomi]] effect is likely due to the effect "[[Blackwing - Vayu the Emblem of Honor]]", which can easily [[Special Summon]] this monster from the [[Extra Deck]] with any [[Level 4]] "[[Blackwing]]" monster in the [[Graveyard]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|027|ref}}, specifically from the panel showing [[Blackwing - Gram the Shining Star (manga)|this monster]] being Summoned
