title: Card Trivia:Shining Superstar Riff
wikitext: |-
  {{Navigation}}

  * "[[Dark Sorcerer]]", "[[Magical Beast Wolfang]]" and "[[Prima Guitarna the Shining Superstar]]" appear in this card's artwork.
  ** This card's effect to increase [[ATK]] is based on the effect of "Prima Guitarna", which increases ATK by the same amount as this card.
  * This card's artwork is based on a scene from {{episode|SEVENS|003|ref}}, where [[Romin Kassidy]] used "[[Prima Guitarna the Shining Superstar (anime)|Prima Guitarna the Shining Superstar]]" for the first time in a [[Rush Duel]] while using Yuga's spare [[Spellcaster]] [[Deck]].
  ** This card's effect requiring the opponent to control a monster with 2100 ATK references how Yuga controlled "[[Sevens Road Magician (anime)|Sevens Road Magician]]" during this scene.

