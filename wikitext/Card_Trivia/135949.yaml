title: Card Trivia:Royal Knight
wikitext: |-
  {{Navigation}}

  * This knight is similar to the [[Counter Fairy|Counter Fairies]] in appearance.
  * This monster is similar in appearance to "[[Majestic Mech - Senku]]".
  ** This may be because "Senku" is the result after "[[Celestial Transformation]]" where the effect involve a Fairy monster being Summoned, halve its ATK and destroy it in the End Phase.
  *** This matches closely because both are Fairy monsters, "Royal Knight" has 1300ATK/800DEF and "Senku" has its ATK/DEF reduced exactly by 300 (1000ATK/500DEF), also the latter has the same final effect of "Celestial Transformation" which send it to the Graveyard in the End Phase.
