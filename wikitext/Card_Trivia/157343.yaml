title: Card Trivia:Blackwing - Calima the Haze
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is derived from the [[wikipedia:Calima|calima]], a dusty wind originating from the [[wikipedia:Saharan Air Layer|Saharan Air Layer]].
  ** "Calima" is also the sibling wind of the [[wikipedia:Sirocco|sirocco]], a hot wind from the Sahara Desert, referenced in the names of two other "[[Blackwing]]" monsters: "[[Blackwing - Sirocco the Dawn]]", and "[[Blackwing - Ghibli the Searing Wind]]" (named after the Libyan name for the sirocco).
  ** This monster's title is named after a [[wikipedia:Haze|haze]], a weather phenomenon caused the slight obscuration of the lower atmosphere caused by fog or other fine suspended dust particles.
