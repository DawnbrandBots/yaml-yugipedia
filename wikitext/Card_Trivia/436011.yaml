title: Card Trivia:Zoodiac Ratpier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragonic Diagram]]" and "[[Zoodiac Combo]]".
  * This monster is based on the sign of the [[wikipedia:Rat (zodiac)|Rat]] in the [[wikipedia:Chinese zodiac|Chinese zodiac]].
  ** This monster's effect to [[send]] a "[[Zoodiac]]" monster from the [[Deck]] to the [[Graveyard]] references the Rat's role in The Great Race, where it pushed the Cat into the water, causing it to drown.
  * This monster's Japanese name, "Marmorat" (モルモラット, ''Morumoratto'') appears to be a portmanteau of the words "''morumotto''" (the Japanese word for [[wikipedia:guinea pig|guinea pig]]) and "''ratto''" (the Japanese pronunciation for the English word "[[wikipedia:rat|rat]]"), both of them based on [[wikipedia:rodent|rodents]] largely raised as [[wikipedia:animal testing|experimental animals]].
  ** This monster's ''[[TCG]]'' name is a portmanteau of "[[wikipedia:rapier|rapier]]" and "rat", which is reflected by this monster's appearance as a rat-themed [[wikipedia:knight|knight]] who are known for wielding rapiers as weapons.
  *** Also, this monster's weapon is a rapier that features rat-like figures on its hilt, which further reflects this monster's ''TCG'' name.
  * This monster's rapier is wielded by "[[Metaltron XII, the True Dracombatant]]".
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018257720651808792 Bilibili] and [https://weibo.com/7406309913/5118881850984712 Weibo] at midnight (00:00 China Standard Time) on January 4, 2025, which was the fourth quarter of the Zi hour in the traditional Chinese timekeeping system.
