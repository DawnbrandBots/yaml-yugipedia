title: Card Trivia:Danger! Thunderbird!
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Thunderbird (mythology)|thunderbird]].
  * This monster appears in the artworks of "[[Realm of Danger!]]", "[[Danger! Excitement! Mystery!]]", and "[[You're in Danger!]]".
  ** A feather from this monster appears in the artwork of "[[Danger! Response Team]]".
