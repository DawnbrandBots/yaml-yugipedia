title: Card Trivia:The Ultimate Creature of Destruction
wikitext: |-
  {{Navigation}}

  [[File:BlueEyesUltimateDragon-JP-Anime-GX-NC.png|thumb|right|300|"Blue-Eyes Ultimate Dragon" being Fusion Summoned by Kaibaman.]]

  * "[[Blue-Eyes Ultimate Dragon]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|034|ref}} where [[Kaibaman (character)|Kaibaman]] [[Fusion Summon]]s "[[Blue-Eyes Ultimate Dragon (anime)|Blue-Eyes Ultimate Dragon]]" while [[Jaden Yuki]]'s [[Field Spell Card]] "[[Skyscraper (anime)|Skyscraper]]" is active.
  ** This card's Japanese name, "Tough! Invincible! Unbeatable!" is the phrase Kaibaman says as he attacks with his three "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragons]]" ([[Special Summon]]ed by using "[[De-Fusion (anime)|De-Fusion]]" on "Blue-Eyes Ultimate Dragon") to win the Duel.
  *** This card's ''[[TCG]]'' name is based on a scene from the international dubbed version of {{episode|Yu-Gi-Oh!|022|ref}} where [[Seto Kaiba]] internally monologues his strategy to assemble his three "Blue-Eyes White Dragons" to Summon "Blue-Eyes Ultimate Dragon", which he considers "the ultimate creature of destruction".
  * The design of "Blue-Eyes Ultimate Dragon" in this card's artwork is reused in the artwork of "[[Token (Kaiba and "Blue-Eyes Ultimate Dragon")]]".

