title: Card Trivia:Relieve Monster
wikitext: |-
  {{Navigation}}

  * The silhouette of "[[Winged Minion]]" appears in this card's artwork, depicted in the [[Monster Card]] in the player's [[hand]].
  ** Despite being a [[Level 2]] [[Effect Monster]], this card's artwork depicts the "Winged Minion" card as a [[Level 4]] [[Normal Monster]].
  *** This card's artwork depicts the Monster Card in its old ''[[OCG]]'', where the [[ATK]]/[[DEF]] are listed to the right of the effect text rather than below.
  * Despite being a [[Trap Card]], this card's artwork depicts it being [[activate]]d from the hand, which could imply that the effect of "[[Makyura the Destructor]]" was activated that turn. At the time of this card's release, "Makyura the Destructor" was the only monster to feature an effect that activates Trap Cards from the player's hand.
