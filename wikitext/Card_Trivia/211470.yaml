title: 'Card Trivia:Number C32: Shark Drake Veiss'
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Abyss Rising]]''.
  * This monster is likely based on the [[wikipedia:Goblin shark|goblin shark]], a rare species of deep-sea shark with a distinctive elongated nose and nail-like teeth.
  * This monster is the "[[Number C]]" form of "[[Number 32: Shark Drake]]".
  ** The third portion of this monster's name, "Veiss", is derived from "''weiss''" (Weiß), the German word for "white", which reflects this monster's color scheme.
  *** "Veiss" features a similar pronunciation to the English word "vice," referencing how sharks are known to clamp down hard when biting their prey, locking them in a '''vice'''grip.
  **** "Vice" (バイス, ''Baisu'') is also part of the Japanese name of "[[Number 17: Leviathan Dragon]]" ("Numbers 17: LeVice Dragon"), the first "[[Number]]" monster used by [[Reginald Kastle|Reginald "Shark" Kastle]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. Fittingly, the Japanese [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack name]] of "Leviathan Dragon" was also known as "Vice Stream".
  **** A vice can also be defined as immoral or wicked behavior, referencing how this monster and its owner, Shark, was portrayed as "evil" in the anime, while its counterpart, "[[Number C39: Utopia Ray (anime)|Chaos Number 39: Utopia Ray]]" and its owners, [[Yuma Tsukumo]] and [[Astral]] as portrayed as "good".
  * This monster has a [[Ranked-Up]] counterpart: "[[Number C32: Shark Drake LeVeiss]]".
  * This monster has a [[Main Deck]] "[[Shark (archetype)|Shark]]" counterpart: "[[Veiss Shark]]".
  * This monster has an [[Card evolutions|upgraded]] form combined with "[[Number 101: Silent Honor ARK]]": "[[N.As.H. Knight]]".
  * This is the first [[Sea Serpent]] "Number C" monster.
  * This is the first card to [[support]] the "Shark" [[archetype]], albeit exclusively in the anime.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[detach]]es an [[Xyz Material]], it bites down on it, then shoots an energy blast into the ground, revealing a [[Graveyard]] portal. The "Shark" monster that it [[banish]]es emerges from the Graveyard portal before disappearing, causing the [[target]]ed opponent's monster's [[ATK]] to be reduced by the ATK of the banished monster.
