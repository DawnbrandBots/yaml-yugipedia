title: Card Trivia:Mean Mutt Chihuahua Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Wander Triple]]".
  * This monster's Japanese name (アイクチワワ, ''Aikuchiwawa'') is a portmanteau of the Japanese words "''aikuchi''" (あいくち, ''aikuchi'') and "[[wikipedia:Chihuahua (dog breed)|Chihuahua]]" (チワワ, ''Chiwawa'').
  ** Fittingly, this monster is a Chihuahua wielding a ''[[wikipedia:Tantō|tantō]]'' sword with an ''aikuchi'', a form of ornate Japanese sword mounting designed to carry Japanese short swords while being worn by its owner.
