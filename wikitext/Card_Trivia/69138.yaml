title: Card Trivia:Illusion Gate
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This card is based on "[[wikipedia:The Gates of Hell|The Gates of Hell]]", a sculpture created by [[wikipedia:Auguste Rodin|Auguste Rodin]], which depicts the entrance to Hell as imagined in [[wikipedia:Dante Alighieri|Dante Alighieri]]'s ''[[wikipedia:Inferno (Dante)|Inferno]]''.
  * This card shares similarities with "[[The Seal of Orichalcos]]", as both feature a hazardous effect in the anime where the loser of the Duel will have their soul offered to an evil entity ([[The Great Leviathan]] for "The Seal of Orichalcos", and the [[Sacred Beast]]s for this card), and both cards in the ''OCG''/''TCG'' can only be used [[Only once per duel|once per Duel]].
  ** This card also shares similarities with "[[Soul Binding Gate]]", as both cards depicts gates to the underworld, feature effects that [[destroy]]s monsters, deduct their users' [[Life Point]]s, and ultimately turn on their respective users after their defeat in the Duel they were used.
  * This is the only card in the ''[[Yu-Gi-Oh! Tag Force]]'' games to feature the word "percent" printed in its text, and currently the only such card in any medium.
  * This card's ''[[OCG]]''/''[[TCG]]'' and video game effects requiring the player to deduct their Life Points are an alteration of its [[activation condition]] in the anime, which requires the player to offer up their soul to the Sacred Beasts.
