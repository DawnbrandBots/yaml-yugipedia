title: Card Trivia:Gimmick Puppet Des Troy
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Trojan Horse|Trojan Horse]], a giant wooden horse built by the Greek warriors during the [[wikipedia:Trojan War|Trojan War]]. The Greek hero [[wikipedia:Odysseus|Odysseus]] constructed the wooden horse and hid himself and his warriors inside while the Trojans wheeled the horse into the guarded city of [[wikipedia:Troy|Troy]], claiming it as a victory trophy.
  ** During the same night, after the Trojans allowed the wooden horse to enter the city, Odysseus and his men emerged from the horse to open the city gates for the Greek army to enter. This is reflected in this monster's effect to [[Special Summon]] "[[Gimmick Puppet]]" monsters from the [[hand]].
  ** This monster's name is a portmanteau of "[[destroy]]" (reflecting this monster's destruction effect), "Des" (the Japanese pronunciation of "death"), and "Troy". This namesake references how the Trojan Horse became instrumental in the destruction of the city of Troy, in which the rest of the Greek army destroyed the city and ended the Trojan War.
  * This is the first "Gimmick Puppet" monster to feature a part of its name written in kanji.
  * This monster is tied with "[[Gimmick Puppet Cattle Scream]]" and "[[Gimmick Puppet Nightmare]]" for the highest [[original DEF]] (2000) of all [[Main Deck]] "Gimmick Puppet" monsters.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to destroy a "Gimmick Puppet" monster is based on the effect of "[[Card of Puppets]]", a [[Spell Card]] used by [[Quattro]], which was used to destroy this monster in {{episode|ZEXAL|114|ref}}.
