title: Card Trivia:Under Pressure
wikitext: |-
  {{Navigation}}

  * This card's name references the anime effect of "[[Carboneddon (anime)|Carboneddon]]", where it effects can [[Special Summon]] "[[Hyozanryu (anime)|Hyozanryu]]" after it has ten or more cards on top of it in the [[Graveyard]]. This, in turn, references how diamonds are formed as a result of buried carbon deposits being subjected to high temperatures and pressure, whereas the Japanese name of "Hyozanryu" is "Diamond Dragon".
