title: Card Trivia:Mistar Boy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Link Party]]".
  * This card is an [[Card evolutions|upgraded]] [[Link Monster|Link]] form of "[[Star Boy]]".
  * This card is the first [[Aqua]] Link Monster.
  * This card's name is a pun on the word "mister" and the phrase "Star Boy".
