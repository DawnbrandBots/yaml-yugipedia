title: 'Card Trivia:Number 48: Shadow Lich'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * This monster's shadow appears in the artwork of "[[Number 75: Bamboozling Gossip Shadow]]".
  * This monster is based on a [[wikipedia:Lich|lich]], an undead wizard or dark priest who has undergone a black magic ritual to gain eternal life and necromancy as an undead being.
  ** A lich typically has the ability to manipulate the dead and use undead monsters like skeletons, zombies, and phantoms as minions, which reflects this monster's effects surrounding the usage of "[[Phantom Token]]s".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|031|ref}}, specifically from the panel showing [[No. 48: Shadow Lich (manga)|this monster]] being Summoned.
