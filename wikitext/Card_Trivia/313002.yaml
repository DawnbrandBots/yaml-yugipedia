title: Card Trivia:Lightsworn Sanctuary
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]''.
  * "[[Celestia, Lightsworn Angel]]", "[[Michael, the Arch-Lightsworn]]", "[[Minerva, Lightsworn Maiden]]" and her owl familiar appear in this card's artwork.
  * This card's artwork depicts the transformation of "Minerva, Lightsworn Maiden" into "[[Minerva, the Exalted Lightsworn]]".
  * This card's artwork features a location much like the one in the artwork of "[[Hymn of Light]]".
