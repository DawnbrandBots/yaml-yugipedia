title: Card Trivia:Majestic Mech - Senku
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Celestial Transformation]]".
  ** This monster seems to be a evolved form of "[[Royal Knight]]", both have a similar body structure and "Majestic Mech - Senku" has 300 less in ATK and DEF than "Royal Knight" due to the effect of "Celestial Transformation"
  * Unlike both "[[Majestic Mech - Goryu]]" and "[[Majestic Mech - Ohka]]" in that they both have a [[counterpart]] ("[[Pyrotech Mech - Shiryu]]" and "[[Malevolent Mech - Goku En]]" respectively), this is the only "[[Majestic Mech]]" monster that has yet to have a counterpart of its own.
  * This monster is remarkably similar in appearance to that of the villains from ''[[wikipedia:Genesis of Aquarion|Genesis of Aquarion]]''.
