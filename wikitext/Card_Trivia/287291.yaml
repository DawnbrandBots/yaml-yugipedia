title: Card Trivia:Surprise Punch
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on a [[wikipedia:Jack-in-the-box|jack-in-the-box]], a children's toy consisting of a musical box with a crank handle and a clown figure on a spring designed to pop out of the box when cranked; however, this card's artwork depicts the jack-in-the-box with a [[wikipedia:Boxing glove|boxing glove]] outfitted on the spring instead of a clown.
  ** This card is similar to "[[Punch-in-the-Box]]", another [[Normal Trap Card]] that depicts a jack-in-the-box with a boxing glove outfitted on the spring.
