title: Card Trivia:Light End Sublimation Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed [[Main Deck]] counterpart of "[[Light End Dragon]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! GX|effect name]] of "[[Light End Dragon (manga)|Light End Dragon]]" in the ''[[Yu-Gi-Oh! GX]]'' ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga: "Shining Sublimation".
  ** This monster being a Main Deck monster is based on how "Light End Dragon" was originally a monster that could be used in the Main Deck in the manga; in the ''[[OCG]]''/''[[TCG]]'', it was released as a [[Synchro Monster]], which this monster can [[banish]] for its [[Special Summon]]ing effect.
  * This monster has a [[DARK]] [[counterpart]]: "[[Dark End Evaporation Dragon]]".
  ** Both monsters are the retrained Main Deck counterparts of "Light End Dragon" and "[[Dark End Dragon]]", respectively.
  ** Both monsters are named after their base counterparts' effect names in the ''Yu-Gi-Oh! GX'' manga, which are based on the conversion of certain states of matter into gas; in this monster's case, it is based on sublimation, the conversion of solid matter into vapor without passing through the state of liquid matter.
  * This card's artwork is taken from {{chapter|GX|061|ref}}, specifically from the panel showing "Light End Dragon" attacking [[Principal MacKenzie]] (possessed by [[Tragoedia (character)|Tragoedia]]) directly.
