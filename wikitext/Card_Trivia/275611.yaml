title: Card Trivia:Traptrix Myrmeleo
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Antlion|antlion]], an insect that traps its prey in a pit it made.
  ** This card's Japanese name is a compressed form of the English word "antlion".
  ** This card's English name is the genus name of most antlions, which is a combination of the Greek words for "ant" (myrmínki) and for "lion" (léon)
  * This monster appears in the artwork of "[[Traptrix Trap Hole Nightmare]]" and "[[Traptrix Rafflesia]]".
