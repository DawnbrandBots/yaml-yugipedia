title: Card Trivia:Gigobyte
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Compensation Exchange]]", "[[Eria the Water Charmer]]", "[[Home of the Charmers]]", "[[Premature Return]]", "[[Raging Eria]]", "[[Spiritual Art Familiars]]", "[[Spiritual Refinement]]", "[[The Law of the Normal]]", "[[The Return to the Normal]]", "[[The Revenge of the Normal]]", "[[The Toil of the Normal]]" and "[[Triangle Power]]".
  * '''"Gigobyte"''' > "[[Jigabyte]]" > "[[Gagagigo]]" > "[[Giga Gagagigo]]" > "[[Gogiga Gagagigo]]" > "[[Gagagigo the Risen]]"
  ** This monster is the first and juvenile form of the [[Gigo]] [[series]]. Its [[flavor text]] makes reference to its many forms, each of which become more and more demonic in appearance and description.
  * This monster's name is a pun on [[wikipedia:Byte#Multiple-byte units|gigabyte]], a specific unit of data equal to about one billion bytes of data.
  * This monster has a [[retrained]] ''[[Rush Duel]]'' counterpart: "[[Familiar of the Water Spiritualist]]".
  * In ''[[Yu-Gi-Oh! World Championship 2008]]'', this monster is capable of human speech, occasionally adding "Gigo" in his sentences. In {{episode|CARD GAME THE CHRONICLES|9|ref}}, he does not communicate in the human language, only speaking "Gigo", but [[Eria]] is able to understand him.
  * This card's Spanish print features two misspellings in its lore, as it says "''un d'''i'''a su corazón ser'''a''' manchado''" instead of "''un d'''í'''a su corazón ser'''á''' manchado''" ("''one day his heart shall be tainted''"). This mistake wasn't corrected in ''[[Yu-Gi-Oh! Duel Arena]]''.
