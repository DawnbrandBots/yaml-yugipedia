title: Card Trivia:Myutant GB-88
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Myutant Fusion]]" and "[[Myutant Synthesis]]".
  * The "GB" in this card's name likely refers to its effect of [[Special Summon]]ing "[[Myutant]]" monsters that are either in the [[Graveyard]] or [[banish]]ed, unlike the other low-[[Level]] "Myutant" monsters that can only Special Summon them from the [[hand]] or [[Deck]].
  * This monster is a mutated form of "[[Myutant Mutant]]".
  ** This monster has a mutated [[Fusion Monster|Fusion]] form: "[[Myutant Synthesis]]".
