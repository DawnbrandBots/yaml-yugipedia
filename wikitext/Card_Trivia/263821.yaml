title: Card Trivia:Shark Fortress
wikitext: |-
  {{Navigation}}

  * "[[Submersible Carrier Aero Shark]]" appears in this card's artwork.
  * Visually, this monster appears to be similar to the [[wikipedia:Basking shark|basking shark]] or [[wikipedia:Whale shark|whale shark]] due to its open mouth, but it is also a reference to the [[wikipedia:B-52 Stratofortress|B-52 Stratofortress]].
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card's [[Xyz Summon]] portal appeared similar to that of "[[Neo Galaxy-Eyes Photon Dragon (anime)|Neo Galaxy-Eyes Photon Dragon]]", but was colored blue instead.
