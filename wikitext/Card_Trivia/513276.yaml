title: Card Trivia:Soul Resurrection
wikitext: |-
  {{Navigation}}

  * The background of this card's artwork is based on that featured in the artworks of the [[Spirit monster]]s and their [[support card]]s.
  ** This is reinforced by how this card's Japanese name ({{Ruby|蘇|よみがえ}}りし{{Ruby|魂|たましい}}, ''Yomigaerishi Tamashī'') is shared with the second portion of the Japanese name of ''[[Mythological Age]]'' ({{Ruby|Ｍｙｔｈｏｌｏｇｉｃａｌ|ミサラジカル}} {{Ruby|Ａｇｅ|エイジ}} －{{Ruby|蘇|よみがえ}}りし{{Ruby|魂|たましい}}－, ''Misarajikaru Eiji - Yomigaerishi Tamashī -''), the [[Core Booster]] pack in which the Spirit monsters debuted.
  * This card has a counterpart which [[Special Summon]]s a [[Normal Monster]] in [[Attack Position]]: "[[Birthright]]".
  * This card's Spanish name is misspelled as "Resurección del Alma", rather than the correct "Resur'''r'''ección del Alma".
