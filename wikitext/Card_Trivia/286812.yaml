title: Card Trivia:Depth Shark
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on a [[wikipedia:Anglerfish|Anglerfish]], a species of fish who are known for living in the deepest depths of the sea.
  * Prior to being renamed, "[[Deepsea Shark]]" had the same Portuguese name as this card, "Tubarão das Profundezas".
