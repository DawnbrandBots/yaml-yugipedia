title: Card Trivia:Phoenix Gearfried
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the ''[[Warriors' Strike Structure Deck]]''/''[[Structure Deck: Warriors' Strike]]''.
  ** In the U.S. commercial for the ''Warriors' Strike Structure Deck'', it is stated that this monster is the leader of the [[Gemini monster]] tribe.
  * This monster appears in the artworks of "[[Champion's Vigilance]]", "[[Gemini Ablation]]", "[[Majesty of Fire]]" and "[[Supervise]]".
  * This monster's armor design is similar to that of "[[Evocator Chevalier]]".
  * This monster has a "[[Lightray]]" counterpart: "[[Lightray Gearfried]]".
  * This monster has a [[retrained]] counterpart: "[[Immortal Phoenix Gearfried]]".
  * This is the first Gemini monster to require two [[Tribute]]s to Summon it.
  * This monster is tied with "[[Poly-Chemicritter Dioxogre]]" for the highest [[original ATK]] (2800) of all Gemini monsters.
