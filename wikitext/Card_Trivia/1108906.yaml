title: Card Trivia:Cyber Rush Fusion
wikitext: |-
  {{Navigation}}

  * Two copies of "[[Cyber Dragon (Rush Duel)|Cyber Dragon]]" and "[[Cyber Rush Dragon]]" appear in this card's artwork.
  * This card's effect to destroy a player's monsters other than the [[Fusion Monster]] [[Fusion Summon]]ed by this card is a possible reference to the ''[[OCG]]''/''[[TCG]]'' effect of "[[Chimeratech Overdragon]]" whose [[Trigger Effect]] sends all other cards on its controller's field to the [[Graveyard]] upon its [[Summon]]ing.
