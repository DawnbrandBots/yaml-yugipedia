title: Card Trivia:Violet Flash
wikitext: |-
  {{Navigation}}

  * This card's name references the violet card frame of [[Fusion Monster]]s.
  * This card's effects reference how [[Yuri]] uses this card to vanish after abducting [[Rin]] and [[Lulu Obsidian]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This card's first effect, preventing the [[activate|activation]] [[Spell]]/[[Trap Card]]s in response to the activation of "[[Polymerization]]" and "[[Fusion (archetype)|Fusion]]" cards, references Yuri's successful escape after abducting his targets.
  ** This card's second effect, letting the player [[draw]] a card after [[Fusion Summon]]ing a monster, references how Yuri gains his captured targets and transports them to the [[Fusion Dimension]].
