title: Card Trivia:D/D/D Oblivion King Abyss Ragnarok
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Special Summon Evolution]]''.
  * This monster is named after [[wikipedia:Ragnarök|Ragnarök]], an apocalyptic series of future events in [[wikipedia:Norse mythology|Norse mythology]] that signals the death of the Old World and many of its inhabitants, including the gods, before the world is renewed and repopulated.
  ** This monster's Japanese title (壊薙王, ''Kaichiō'') is a homophone of the Japanese word for "chairman" (会長, ''Kaichō'').
  * This monster has 2 alternate forms.
  ** An [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form (fused with "[[D/D/D Wave King Caesar]]"): "[[D/D/D Wave Oblivion King Caesar Ragnarok]]"
  ** A [[Link Monster|Link]] counterpart: "[[D/D/D Sky King Zeus Ragnarok]]"
