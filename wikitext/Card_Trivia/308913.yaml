title: Card Trivia:Satellarknight Procyon
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Procyon|Procyon]], the brightest [[wikipedia:star|star]] in the [[wikipedia:constellation|constellation]] [[wikipedia:Canis Minor|Canis Minor]].
  ** The constellation Canis Minor appears in the artwork of this card, with Procyon's location in said constellation denoted by an encircled star.
  ** [[wikipedia:Sirius|Sirius]], Procyon and [[wikipedia:Betelgeuse|Betelgeuse]] are the three stars of the [[wikipedia:Asterism (astronomy)|asterism]] known as the Winter Triangle. Sirius and Procyon, along [[wikipedia:Pollux (star)|Pollux]], [[wikipedia:Aldebaran|Aldebaran]], [[wikipedia:Rigel|Rigel]] and [[wikipedia:Capella|Capella]]  are the stars of the asterism known as the [[wikipedia:Winter Hexagon|Winter Hexagon]].
