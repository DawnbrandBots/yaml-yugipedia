title: Card Trivia:Dogmatika Maximus
wikitext: |-
  {{Navigation}}

  * Over the course of the "Abyss" storyline, this monster transforms into "[[Dramaturge of Despia]]", then into "[[Dogmatika Alba Zoa]]", and finally, "[[Bystial Dis Pater]]".
  ** As "Alba Zoa", he refers to "[[Dogmatika Ashiyan]]" as "his other half". It is unclear if this is an eccentric way of saying "Ashiyan" was his right-hand man or if "Ashiyan" is literally a cast-off portion of him. The fact that he refers to "[[Aluber the Jester of Despia|Aluber]]" as "[[Albaz|that guy's]] other half" may hint at the latter.
