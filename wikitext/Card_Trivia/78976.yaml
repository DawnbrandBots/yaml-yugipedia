title: Card Trivia:Skilled White Magician
wikitext: |-
  {{Navigation}}

  * Four [[Spell Counter]]s appear in this card's artwork.
  * This monster appears in the artwork of "[[Dark Supremacy]]".
  * This monster has a [[DARK]] [[counterpart]]: "[[Skilled Dark Magician]]".
  ** Both monsters' [[Attribute]]s and [[original ATK and DEF]] are the complete opposite of each other.
  ** Both monsters' effects can Special Summon the [[Fusion Material]]s for "[[Dark Paladin]]".
  ** Both monsters debuted together in the ''[[Champion of Black Magic]]'' [[Core Booster|Core Booster pack]].
  * Visually, this monster resembles "[[Witness of Dragon Destroyer]]", another monster that supports "[[Buster Blader]]".
