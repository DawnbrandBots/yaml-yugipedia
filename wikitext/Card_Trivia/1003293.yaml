title: Card Trivia:Centur-Ion Emeth VI
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Valiant Smashers]]''/''[[Valiant Smashers]]''.
  * "[[Centur-Ion Primera]]" appears in this card's artwork.
  * This monster appears in the artworks of "[[Centur-Ion Phalanx]]", "Centur-Ion Primera", "[[Emblema Oath]]", "[[Centur-Ion Bonds]]", and "[[Stand Up Centur-Ion!]]".
  * This card's name is based on ''emét'' (אמת), the Hebrew word for "truth". This is a reference to the [[wikipedia:Golem|golem]] of Jewish folklore, which is said to be animated by the word ''emét'' inscribed on its forehead.
