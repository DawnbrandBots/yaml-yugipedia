title: Card Trivia:Time Dimension Hole
wikitext: |-
  {{Navigation}}

  * "[[Big Inflate Dragon]]" appears in this card's artwork.
  ** "Big Inflate Dragon" can be [[Special Summon]]ed by this card's effect, but then would be unable to activate its own effect since its own effect can only be activated upon its successful [[Normal Summon]].
  * This card's artwork depicts year numbers from 1999 to 2024, referencing the 25th anniversary of ''[[Yu-Gi-Oh! Official Card Game]]''.
