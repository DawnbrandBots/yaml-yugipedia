title: Card Trivia:Destiny HERO - Plasma
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectible Tins 2007 Wave 1]]'', ''[[Prismatic Art Collection]]'', and ''[[Speed Duel GX: Duel Academy Box]]''.
  * This monster appears in the artworks of "[[Break the Destiny]]", "[[Fusion Destiny]]", "[[Plasma Counter]]", and "[[Plasma Roar]]".
  * This is the [[signature card]] of [[Aster Phoenix]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This monster is based on [[wikipedia:Count Dracula|Count Dracula]], the king of the vampires and the title character of [[wikipedia:Bram Stoker|Bram Stoker's]] 19th century Gothic horror novel, ''[[wikipedia:Dracula|Dracula]]''.
  ** This monster's names reference the blood that Dracula sucks from his victims; its Japanese name, "Bloo-D" is a play on the word "blood" or "bloody", while its English name, "Plasma", is based on the clear, yellowish, liquid component of blood that makes up more than half of its volume.
  *** This monster's Japanese name is also a reference to [[The D]], who originally stole this card from [[Mr. Phoenix]] and used it during underground duels in the ''Yu-Gi-Oh! GX'' anime.
  *** This monster's Japanese name is also a "blue ''bloo''d", which is a term used for an aristocrat; in the original Japanese version of the ''Yu-Gi-Oh! GX'' anime, this card's name was written in blue ink.
  ** This monster is also likely based on [[wikipedia:Dracula (Castlevania)| Dracula's]] appearance in [[Konami]]'s video game series, ''[[wikipedia:Castlevania|Castlevania]]''.
  *** This monster's [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] in the original Japanese version of the ''Yu-Gi-Oh! GX'' anime, "Bloody Fears", is a reference to "Bloody Tears", a recurring soundtrack in the ''Castlevania'' series.
  *** This monster's effect to [[equip]] a monster the opponent controls to itself and gain [[ATK]] equal to half the original ATK of the equipped monster is based on how Dracula could absorb the souls of his enemies and gain all their powers (a power more commonly demonstrated by his incarnation, Soma Cruz).
  * In the ''Yu-Gi-Oh! GX'' anime, whenever this monster absorbs another monster or duelist, the monster or duelist becomes trapped in perpetual torment underneath its wings. This is visually similar to the fate of the people killed by the turtle demon Jinmen in the ''[[wikipedia:Devilman|Devilman]]'' franchise, where the still-moving faces of victims become trophies on Jinmen's shell. Notably, "Plasma" made its first full appearance in {{episode|GX|98|ref}}, the same duel that Aster debuted "[[Destiny Hero - Malicious]]", itself resembling the titular Devilman who battles Jinmen.
  * This card's second artwork depicts this monster with a white aura, referencing how it was used by The D while possessed by the [[The Light of Destruction|Light of Destruction]] in the ''Yu-Gi-Oh! GX'' anime.
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * This is one of the few "[[Destiny HERO]]" monsters to not have the suffix "-guy" in their Japanese names, the others being "[[Destiny HERO - Dark Angel]]" and "[[Destiny HERO - Dread Servant]]".
  * This card's original ''[[TCG]]'' text contained several grammatical errors, forgetting some plurals and capitalization and omitting the word "ATK" at one point; this card's text was later fixed with an [[Card Errata:Destiny HERO - Plasma|errata]] in ''Legendary Collection 2''.
