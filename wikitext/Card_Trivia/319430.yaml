title: 'Card Trivia:Number 101: Silent Honor ARK'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * This monster appears in the artworks of "[[Seventh Ascension]]" and "[[Seventh Eternity]]".
  * This monster has a "[[Number C]]" [[Card evolutions|evolved]] form: "[[Number C101: Silent Honor DARK]]", which appears in this card's artwork, sealed inside this monster's centerpiece.
  * This monster's Japanese name reads "'''S.H. Ark''' Knight", while its English name reads "'''S'''ilent '''H'''onor '''ARK'''". Both names relate to the fact that this monster was used by [[Reginald Kastle|Nash]], the true form of Reginald "Shark" Kastle in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * The number 101 is the combined value of adding together 39 and 62, representing "[[Number 39: Utopia]]" and "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]", respectively. This seems fitting since all three monsters were the true aces of the three main characters in the ''Yu-Gi-Oh! ZEXAL'' anime: [[Yuma Tsukumo]], [[Kite Tenjo]], and Shark/Nash.
  * This is one of the few cards where its Japanese name (excluding furigana characters) is written entirely in Latin letters.
  * This monster has an evolved form combined with "[[Number C32: Shark Drake Veiss]]": "[[N.As.H. Knight]]".
  * This is the first non-"[[Number C]]" and "[[Number 10X]]" monster that does not feature an effect involving the [[negate|negation]] of card effects.
  * This monster's color scheme and attack in the anime is very similar to that of "[[Number C32: Shark Drake Veiss]]", Reginald Kastle's previous [[ace monster]].
  * This is the only "[[Number 10X]]" monster that never altered its owner's memory, as Nash had claimed that he willingly chose to go to [[Barian World]] due to his people being sent there. The dubbed version however, never referenced this.
  ** This is also the only "Number 10X" that [[Don Thousand]] never reclaimed, as Nash and Yuma Tsukumo were able to defeat him.
