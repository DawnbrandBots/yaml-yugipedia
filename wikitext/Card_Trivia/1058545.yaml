title: Card Trivia:Virtue Stream
wikitext: |-
  {{Navigation}}

  * "[[LeVirtue Dragon]]" appears in this card's artwork.
  * This card's name is the opposite of the Japanese [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack name]] of "[[Number 17: Leviathan Dragon]]", "Vice Stream". A "virtue" is the quality of doing what is good, while a "vice" is the quality of doing what is wrong.
  ** This is further reinforced with the depiction of "LeVirtue Dragon" in this card's artwork, as its name is a portmanteau of the words "[[Wikipedia:Leviathan|Leviathan]]" and "virtue" while the Japanese name of "Leviathan Dragon", "Levice Dragon", is a portmanteau of the words "Leviathan Dragon" and "vice".
