title: Card Trivia:Celestial Sword - Eatos
wikitext: |-
  {{Navigation}}

  * Oddly, in dubbed versions of the [[Yu-Gi-Oh! (anime)|anime]], the goddess' midriff and bust size, as well as the halo above the goddess' head, were not edited out as they usually would be.
  * This card and "[[Reaper Scythe - Dreadscythe]]" are the only two "[[Guardian]]"-affiliated [[Equip Spell Card]]s whose artworks do not depict their weapon within a grotto-like sanctum.
  * Despite appearing to be intended to work together, due to [[missing the timing]], this card's effect cannot activate when sent to the GY by the effect of its counterpart monster, [[Guardian Eatos]].
