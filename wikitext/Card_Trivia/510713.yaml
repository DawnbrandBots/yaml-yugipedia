title: Card Trivia:Crystal Beast Sapphire Pegasus
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Collectible Tins 2007 Wave 1]]''.
  * This monster appears in the artworks of "[[Crystal Blessing]]", "[[Crystal Conclave]]", "[[Crystal Fortress]]", "[[Crystal Miracle]]", "[[Crystal Pair]]", "[[Golden Rule]]", "[[Jesse Anderson - Bonder with the Crystal Beasts]]", "[[Rainbow Bridge of the Heart]]", and "[[Take Flight]]".
  ** This monster's crystal form appears in the artworks of "[[Counter Gem]]", "[[Crystal Abundance]]", "[[Crystal Beast Token]]", "Crystal Blessing", "[[Crystal Boon]]", "[[Crystal Keeper]]", "[[Crystal Master]]", "[[Crystal Release]]", and "[[Ultimate Crystal Magic]]".
  * This monster is based on a [[wikipedia:Sapphire|sapphire]], the blue variation of the [[wikipedia:Corundum|corundum]] gemstone.
  ** This monster is based on a [[wikipedia:winged unicorn|winged unicorn]], an equine mythical creature with both the wings of a [[wikipedia:pegasus|pegasus]] and the horn of a [[wikipedia:unicorn|unicorn]].
  * This monster has an "[[Advanced Crystal Beast]]" [[counterpart]]: "[[Advanced Crystal Beast Sapphire Pegasus]]".
  * This is the only [[Beast]] "[[Crystal Beast]]" monster whose [[Attribute]] is not [[EARTH]].
  * In the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's voice and mannerisms are based on Mister Ed, the talking white horse from the 1960's TV series, ''[[wikipedia:Mister Ed|Mister Ed]]''.
  ** Also, in the English dubbed version of the anime, the other "Crystal Beast" monsters referred to this monster as their leader, likely because it had the highest [[original ATK]] (1800) of all "Crystal Beast" monsters, and because of its effect to placed a "Crystal Beast" monster from the [[hand]], [[Deck]], or [[Graveyard]], [[face-up]] in the player's [[Spell & Trap Zone]] as a [[Continuous Spell Card]].
