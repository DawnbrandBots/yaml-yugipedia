title: Card Trivia:Spell Reactor・RE
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Delta Reactor]]".
  * This monster's suffixed letters spell out the third of the three-part naming scheme of "[[Flying Fortress SKY FIRE]]".
  * The green-colored explosion in the background of this card's artwork references how [[Spell Card]]s features a green-colored card border.
  ** The green-colored explosion appears in the artwork of "Flying Fortress SKY FIRE".
