title: Card Trivia:Yata-Garasu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Legacy of Yata-Garasu]]", "[[Mobius Glacier]]", and "[[Tour Bus To Forbidden Realms]]".
  * "[[Orb of Yasaka]]" appears in this card's artwork.
  * This monster is based on [[wikipedia:Yatagarasu|Yatagarasu]], a three-legged crow associated with the sun and the goddess [[wikipedia:Amaterasu|Amaterasu]] in [[wikipedia:Japanese mythology|Japanese mythology]].
  * This card is the first [[WIND]] Spirit monster, and was the only one until the release of ''[[Raging Tempest]]'' more than 15 years later.
  * This card holds the record for the longest continuous amount of time on the [[Forbidden]] list before being removed, having been on the ''[[TCG]]'' list for 17 years and 9 months between [[August 2004 Lists|August 2004]] and [[May 2022 Lists (TCG)|May 2022]] and on the ''[[OCG]]'' list for 18 years and 2 months between August 2004 and [[October 2022 Lists (OCG)|October 2022]], when it was moved to [[Limited]].
  ** This card and "[[Tsukuyomi]]" are the only Spirit monsters ever to have been on the Forbidden list.
  * This was one of the few cards whose first reprint was [[Common]], while the original print was [[Secret Rare]].
  * In most video games, such as the ''[[Yu-Gi-Oh! Tag Force]]'' and ''[[Yu-Gi-Oh! World Championship]]'' series, using this card is the only way the opponent AI will ever [[surrender]] the [[Duel]]. If the player successfully inflicts [[battle damage]] with this card while the opponent [[control]]s no cards and has no cards in their [[hand]], the opponent will be stuck in an inescapable [[lockdown]], as the player can continuously skip the next [[Draw Phase]] and prevent the AI from ever being able to play or use any cards.
