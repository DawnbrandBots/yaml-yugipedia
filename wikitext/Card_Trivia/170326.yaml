title: Card Trivia:Tatsunootoshigo
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a pun on the [[wikipedia:Seahorse|sea horse]].
  ** This card's English name is a transliteration of the Japanese word "タツノオトシゴ", which translates to "'''Sea Horse'''", though not literally.
  * This card has a [[retrained]] "[[Memento]]" [[counterpart]]: "[[Mementotlan Tatsunootoshigo]]".
  * This card has two [[Bubble Era]] counterparts in ''[[Yu-Gi-Oh! Rush Duel]]'': "[[Seahorse Carrier]]" and "[[Seahorse Server]]".
