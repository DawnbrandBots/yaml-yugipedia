title: Card Trivia:Constellar Omega
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Omega Centauri|Omega Centauri]], a star cluster located in the constellation of [[wikipedia:Centaurus|Centaurus]], which appears in the background of this card's artwork.
  ** This monster's appearance references how Centaurus is named after the creature with the upper body of a human and the lower body of a horse.
