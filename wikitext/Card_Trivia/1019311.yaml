title: Card Trivia:Gen the Diamond Tiger
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Takeda Shingen|Takeda Shingen]], the ''daimyo'' of Kai Province during the [[wikipedia:Sengoku period|Sengoku period]] of Japan, who was also known as the "Tiger of Kai".
  ** This monster's effect can [[Special Summon]] "[[Ken the Warrior Dragon]]" to the opponent's field, whose effects are similar, but can also Special Summon this monster. This references the rivalry between Shingen and [[wikipedia:Uesugi Kenshin|Uesugi Kenshin]], the ''daimyo'' of Echigo Province, who was also known as the "Dragon of Echigo".
  * Though they are not part of an official [[archetype]] outside of themselves, "[[Gen the Diamond Tiger]]" and "[[Ken the Warrior Dragon]]" are clearly designed as indirect [[support]] for the cards "[[Triple Tactics Talent]]" and "[[Triple Tactics Thrust]]". This is evidenced by the fact that summoning either of them to the opponent's field will make those cards activatable, as well as sharing a [[wikipedia:Bushido|Bushido]] aesthetic with the "Triple Tactics" archetype.
  ** Gen holds a [[wikipedia:Gunbai|gunbai fan]], similar to the one seen in both Talent and Thrust. 
  *** Additionally, Ken and Gen both have effects that mimic those of "Triple Tactics Talent" (one drawing 2 cards and the other removing a card from the opponent's hand).
