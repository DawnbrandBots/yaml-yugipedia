title: Card Trivia:Magic Planter
wikitext: |-
  {{Navigation}}

  * The card "[[Ivy Shackles]]" appears in this card's ''[[OCG]]''/''[[TCG]]'' artwork, while the card "[[The World Tree]]" appears in this card's anime artwork.
  ** The reason for this card's name and the difference between its artwork and effects are due to the fact this card's effect worked on [[Continuous Spell Card]]s in the anime, instead of [[Continuous Trap Card]]s.
  ** "Ivy Shackles", which was a Continuous Spell Card in the anime, was also used with this card in {{episode|5D's|024|ref}}.
