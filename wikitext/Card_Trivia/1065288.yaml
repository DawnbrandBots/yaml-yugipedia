title: Card Trivia:Ocean of Regeneration
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This card's effect to [[Special Summon]] a [[WATER]] monster from the [[Graveyard]] references its appearance in {{episode|Yu-Gi-Oh!|103|ref}}, in which [[Crump]] erroneously states that its effect regenerates a WATER monster, contradicting its displayed text, which instead states that it regenerates an [[Aqua]] monster. Regardless, the monster Special Summoned by its effect, "[[Penguin Torpedo (anime)|Penguin Torpedo]]", is a WATER Aqua monster.
