title: Card Trivia:Georgius, Swordman of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Saint George|Saint George]], a venerated Christian hero who is said to have slain a dragon ("[[Lancea, Ancestral Dragon of the Ice Mountain]]") using a lance named Ascalon ("[[Dragunity Knight - Ascalon]]").

  * This monster has a "[[Dragunity]]" [[Link Monster|Link]] form combined with "Ascalon": "[[Dragunity Lord - Georgius]]".
