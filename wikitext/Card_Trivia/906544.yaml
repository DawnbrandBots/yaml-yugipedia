title: Card Trivia:Jointech Rex
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Go Rush Deck - Jointech Attack]]'', as well as one of the cover cards of ''[[Deck Mod Pack: Galaxy of Fate!!]]''.
  * This monster appears in the artworks of "[[Joint Passion]]", "[[Jointech Merry-Go-Round]]", and "[[Jointech Tail Swing]]", as well as in both artworks of "[[Hybridrive Back Fusion]]".
  * This is the [[signature card]] of [[Yuhi Ohdo]] (and his [[Yuhi Ohdo (manga)|manga counterpart]]) in the ''Yu-Gi-Oh! GO RUSH!!'' [[Yu-Gi-Oh! GO RUSH!!|anime]] and [[Yu-Gi-Oh! GO RUSH!! (manga)|manga]].
  * This monster has 6 forms:
  ** A [[Praime]] [[counterpart]]: "[[Jointech Praime Rex]]".
  ** An upgraded [[Maximum Monster|Maximum]] form: "[[Mega Jointech Fortrex]]" (with "[[Mega Jointech Fortrex (L)|Mega Jointech Fortrex [L]]]" and "[[Mega Jointech Fortrex (R)|Mega Jointech Fortrex [R]]]" as its left and right components).
  ** A [[Fusion Monster|Fusion]] form with "[[Blue-Fang Burst Dragon]]": "[[Jointech Burst Dragon]]". In the [[Yu-Gi-Oh! GO RUSH!!]] anime, this fusion represented Yuhi's bonds with his sister [[Yuamu]].
  ** A Fusion form with "[[Jointech Ace]]": "[[Jointech Ace Rex]]"
  * "[[Bluetech Burst Rex]]'s" armor is inspired by this monster.
