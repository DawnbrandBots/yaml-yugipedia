title: Card Trivia:Qliphort Genius
wikitext: |-
  {{Navigation}}

  * This card name is a reference to the mythological concept of "[[wikipedia:Genius (mythology)|Genius]]", according to which every person, place, and thing had a instance of divinity within them, not unlike "souls".
  ** In this case, the name might refer to the shadow coming out the "Qliphort" core. According to [[Master Guide 5 card storylines#Cry of the God of Destruction|Master Guide 5]], the power of "[[Tierra, Source of Destruction]]" was split up inside the "Qliphorts", meaning that they indeed have pieces of her as "genii".
  * This monster appears in the artwork of "[[Shaddoll Schism]]".
  * This card is the first "Qliphort" monster to be in the Extra Deck from the start of the duel.
