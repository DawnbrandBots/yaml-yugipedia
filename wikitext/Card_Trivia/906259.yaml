title: Card Trivia:Gigantic Spright
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Spright Double Cross]]" and "[[Spright Smashers]]".
  * This monster is named after gigantic jets, a type of [[wikipedia:Upper-atmospheric lightning|transient luminous event]].
  * This is the first card to treat [[Link Monster]]s as having [[Level]]s.
