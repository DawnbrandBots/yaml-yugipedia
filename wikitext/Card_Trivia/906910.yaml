title: Card Trivia:Dododo Second
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Requesting 9]]" and "[[Ten Thousand Knocks]]".
  * This monster is a ''[[Rush Duel]]'' [[Baseball]] parody of "[[Dododo Warrior]]".
  * This monster's effect references a common effect in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, which allowed one monster to be treated as two [[Xyz Material]]s for an [[Xyz Summon]].
