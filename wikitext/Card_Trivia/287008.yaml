title: Card Trivia:Rank-Up-Magic Admiration of the Thousands
wikitext: |-
  {{Navigation}}

  * This is the first "[[Rank-Up-Magic]]" card that can [[Special Summon]] multiple "[[Number C]]" monsters at once, although they are not the product of this card.
  ** It is also the first "Rank-Up-Magic" card that cannot Special Summon "[[CXyz]]" monsters in the anime.
  * [[Don Thousand's Emblem]] appears in this card's artwork, with the colors of its gems changed to represent the [[Seven Barian Emperors]]:
  ** White: [[Dumon]]
  ** Blue: [[Marin]]
  ** Green: [[Girag]]
  ** Yellow: [[Mizar]]
  ** Grey: [[Vector]]
  ** Red: [[Alito]]
  ** Center: [[Nash]]
  * A magic circle that appears when monsters are Special Summoned from the [[Graveyard]] is featured behind this emblem.
  * [[Barian glyphs]] appear in this card's artwork.
