title: Card Trivia:Nightmare Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Nightmare Hands]]".
  * This monster is an [[Illusion]] [[counterpart]] of "[[Dark Magician]]".
  * This monster has a feminine counterpart: "[[Nightmare Apprentice]]".
  ** This card's artwork depicts the same magic circle as the one in the artwork of "Nightmare Apprentice".
  * This monster's effects reference a scene during [[Dark Yugi and Maximillion J. Pegasus' TV Duel (manga)|Dark Yugi and Maximillion J. Pegasus's TV Duel]] in {{chapter|Yu-Gi-Oh!|062|ref}} (and its [[Yu-Gi-Oh! (anime)|anime]] [[Yu-Gi-Oh! - Episode 002|adaptation]]), where [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] uses the effect of the "[[Eye of Deception]]" against [[Dark Yugi (manga)|Dark Yugi's]] "[[Dark Magician (manga)|Dark Magician]]". 
  ** While several Illusion [[monster]]s share the effect to prevent monsters from being [[destroyed by battle]]s involving themselves, this monster's first effect, and likely the inspiration for several Illusion monsters possessing said effect, references the effect of "Eye of Deception", which prevented Pegasus's "[[Illusionist Faceless Mage (manga)|Illusionist Faceless Mage]]" (an Illusion monster in the manga) from being destroyed after attacking Dark Yugi's "Dark Magician" (in the anime, the "[[Eye of Illusion (anime)|Eye of Illusion]]" [[Negates attacks|negates]] the attack from "[[Illusionist Faceless Mage (anime)|Illusionist Faceless Mage]]" against "[[Dark Magician (anime)|Dark Magician]]" rather than preventing the former's destruction). 
  ** This monster's second effect, to take [[control]] of an opponent's monster that it battled, references how the effect of "Eye of Deception" can switch control of an opponent's attacking monster when combined with an Illusion monster, whereas Pegasus used it in combination with "Illusionist Faceless Mage" to take control of Dark Yugi's "Dark Magician".
  ** This monster's third effect to [[destroy]] a card on the [[field]], which [[activate]]s when a monster declares an attack, references how Dark Yugi's "[[Celtic Guardian (manga)|Celtic Guardian]]" was destroyed after its attack intended for "Illusionist Faceless Mage" was redirected to "Dark Magician" while it was under Pegasus's control.
  *** Fittingly, this monster's base ''rōmaji'' name, "Entrancement Magician" (幻惑の魔術師, ''Genwaku no Majutsushi'') is based on the [[flavor text]] for "Eye of Deception" in the manga and anime: ''The one '''entranced''' by this eye becomes the Illusionist's slave for only 1 turn.''
  *** Also, the effects of the ''[[OCG]]''/''[[TCG]]'' print of "Eye of Illusion", which was released after this monster, are similar to this monster's effects, albeit watered-down and more accurate to the card's effects in the manga and anime.
