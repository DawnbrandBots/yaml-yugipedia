title: Card Trivia:Foolish Burial Goods
wikitext: |-
  {{Navigation}}

  * The arm in this card's artwork also appears in the artworks of "[[Peaceful Burial]]" and "[[Psychic Burial]]".
  ** The arm in this card's artwork is related to the one in the artwork of "[[Called by the Grave]]", as both appear in the artwork of "[[Extra-Foolish Burial]]", have earth built up around them, ridges, and pointed fingernails.
  * The bouquet in this card's artwork also appears in the artwork of "Peaceful Burial", albeit with the flowers planted.
  * This card references the custom of burying the deceased with their personal belongings.
  * This card is a [[Spell]]/[[Trap]]-[[send]]ing [[counterpart]] of "[[Foolish Burial]]".
  ** This card's ''[[OCG]]'' artwork depicts a similar tombstone as that of the ''[[TCG]]'' artwork of "Foolish Burial", instead of the cross-shaped tombstones usually seen in ''OCG'' artworks.
