title: Card Trivia:Samsara, Dragon of Rebirth
wikitext: |-
  {{Navigation}}

  * The symbol on this monster's chest is an [[wikipedia:Ankh|Ankh]], the same symbol as shown on the Japanese artwork of "[[Monster Reborn]]", which this card's [[effect]] imitates.
  ** Oddly enough, this wasn't censored or changed in this card's ''[[TCG]]'' artwork, which has normally been the case in the past.
  * [[wikipedia:Saṃsāra|Samsara]] is the Cycle of Rebirth in Hinduism.
