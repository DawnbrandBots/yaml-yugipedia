title: Card Trivia:Garbage Collector
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to [[wikipedia:Garbage collection (computer science)|garbage collection]], a form of automatic memory management used in computer programs.
  * The monster depicted bears a resemblance to the [[Litterbot]]s from ''[[Yu-Gi-Oh! ZEXAL]]'', having a frowning face, and serving comparable functions ("garbage"/trash collecting).
