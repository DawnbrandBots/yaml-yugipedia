title: Card Trivia:Comic Cat
wikitext: |-
  {{Navigation}}

  * "[[Comic Hand]]" and "[[Toon World]]" appear in this card's artwork.
  * This is the [[Monster Card]] [[counterpart]] of "[[Mimicat]]".
  ** This monster's name is based on the Japanese name of "Mimicat", "Copycat".
  ** This monster's effect to be treated as a [[Toon monster]] while "[[Toon World]]" is on the [[field]] references how [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus's]] monsters were affected by the effect of "[[Toon World (manga)|Toon World]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's effect to [[Tribute]] an opponent's monster while "Toon World" is on the [[field]] and [[Special Summon]] a monster that mentions "Toon World" references a scene during {{chapter|Yu-Gi-Oh!|127|ref}} where Pegasus uses the effect of "Mimicat" to "copy" [[Dark Yugi (manga)|Dark Yugi's]] "[[Summoned Skull (manga)|Summoned Skull]]", which is then transformed  into "[[Toon Summoned Skull (manga)|Toon Summoned Skull]]" with "Toon World".
