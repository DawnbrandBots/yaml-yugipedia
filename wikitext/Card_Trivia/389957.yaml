title: Card Trivia:Flower Cardian Boardefly
wikitext: |-
  {{Navigation}}

  * This monster is based on ''Inoshikachō'', a card combination in the ''[[wikipedia:Hanafuda|hanafuda]]'' card game, ''[[wikipedia:Koi-Koi|Koi-Koi]]'', consisting of the "Boar" (猪, ''Inoshishi'') "Deer" (鹿, ''Shika'') and "Butterfly" (蝶, ''Chō'') ''tane'' cards, each worth ten points.
  ** The images of the suits associated with the ''tane'' cards (clover, maple, and peony) appear in the background of this card's artwork.
  ** This monster's ''[[TCG]]'' name is a combination of "Boar", the first two letters of "Deer", and is overall meant to be similar to "Butterfly".
  ** This monster's armor is also a combination of the above-mentioned animals featured in the ''tane'' cards: its chest armor is designed after the head of a boar, its helmet and polearm feature the antlers of a deer, and the shield on its left gauntlet is designed after a butterfly.
  ** Fittingly, in {{episode|ARC-V|061|ref}}, this monster was first [[Synchro Summon]]ed using "[[Flower Cardian Clover with Boar (anime)|Flower Cardian Clover with Boar]]", "[[Flower Cardian Maple with Deer (anime)|Flower Carian Maple with Deer]]", and "[[Flower Cardian Peony with Butterfly (anime)|Flower Cardian Peony with Butterfly]]" as [[Synchro Material]]s, each representing the three ''tane'' cards.
