title: Card Trivia:Hell-Tuning Invasion
wikitext: |-
  {{Navigation}}

  * This Skill is designed to support the effect of "[[Royal Rebel's Invasion (Duel Links)|Royal Rebel's Invasion]]" by increasing the [[Level]]s of the player's monsters to 5 and lowering the Levels of the opponent's monsters to 4, allowing the effect of "Invasion" to [[destroy]] them.
