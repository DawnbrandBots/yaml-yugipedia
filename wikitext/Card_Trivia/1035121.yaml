title: Card Trivia:Ancient Gear Tanker
wikitext: |-
  {{Navigation}}

  [[File:AncientGearTank-JP-Anime-GX-NC.png|thumb|right|250|"[[Ancient Gear Soldier (anime)|Ancient Gear Soldier]]" equipped with "[[Ancient Gear Tank (anime)|Ancient Gear Tank]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.]]

  * This monster is a retrained [[counterpart]] of "[[Ancient Gear Soldier]]", [[equip]]ped with "[[Ancient Gear Tank]]".
  ** This monster's design is based on a scene in {{episode|GX|069|ref}} where "[[Ancient Gear Soldier (anime)|Ancient Gear Soldier]]" pilots the "[[Ancient Gear Tank (anime)|Ancient Gear Tank]]" it is equipped with.
  ** This monster shares the same [[equal ATK and DEF|equal]] [[original ATK and DEF]] (1300) as "Ancient Gear Soldier".
  ** This monster's effect to have "[[Ancient Gear Golem]]" gain 600 [[ATK]] is based on the effect of "Ancient Gear Tank", which increases the ATK of the equipped "[[Ancient Gear]]" monster by 600.

