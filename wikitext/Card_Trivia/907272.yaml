title: Card Trivia:Soulicer Crystal
wikitext: |-
  {{Navigation}}

  * This monster originally debuted as a constructed card in ''[[Yu-Gi-Oh! Dark Duel Stories]]'', and is also one of five constructible cards to be released in the ''[[OCG]]''/''[[TCG]]''. It is a [[List of significant constructed cards#Standard combinations|matched constructed card]] using the 47th upper and lower body [[card part]]s, "[[Soulicer]]" and "[[Crystal (card part)|Crystal]]".
  ** This is also one of [[List of significant constructed cards#Became regular cards|seven originally constructible cards]] to appear as a regular card in the game's sequel, ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'', of which three were released in the ''OCG''/''TCG''.
  *** This time around, this card was released as a [[Level 6]] monster as part of the game's rebalancing, while its ''OCG''/''TCG'' [[Special Summon]]ing effect is a reference to how in the above-mentioned video games, it could be [[Normal Summon]]ed without [[Tribute]].
  ** This is also the first constructed card not to be released in a [[Core Booster]] set.
  * This card has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any video game-original card, released 24 years and 7 months after its first appearance in ''Yu-Gi-Oh! Dark Duel Stories'' in Japan on July 13, 2000.
