title: Card Trivia:Performapal Dag Daggerman
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Knife throwing|knife thrower]], an entertainer who throws knives to hit the target, or to miss their human target.
  * This monster's hairstyle and hat slightly resembles [[Yusho Sakaki]], the father of [[Yuya Sakaki]], who uses this card in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
