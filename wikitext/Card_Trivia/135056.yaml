title: Card Trivia:Skuna, the Leonine Rakan
wikitext: |-
  {{Navigation}}

  * This monster and its two-headed appearance are based on a ''[[wikipedia:Komainu|komainu]]'', the pair of statues of lion-dog creatures that guard the entrance of [[wikipedia:Shinto shrine|Shinto shrines]].
  ** This monster's title is based on a ''[[wikipedia:Arhat|Rakan]]'', the Japanese word for "''Arhat''", a person who has achieved a state of enlightenment in [[wikipedia:Buddhism|Buddhism]].
  ** This monster, along with its accompanying [[Match winner]], "[[Aggiba, the Malevolent Sh'nn S'yo]]", both share a Japanese Buddhism theme, referencing how they were released as [[Yu-Gi-Oh! World Championship 2009 prize cards|prize cards]] at the 2009 ''Yu-Gi-Oh!'' World Championship, which was held in [[wikipedia:Japan|Japan]].
