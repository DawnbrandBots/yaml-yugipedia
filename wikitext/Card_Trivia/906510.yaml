title: Card Trivia:Giant Starfall
wikitext: |-
  {{Navigation}}

  * "[[Idaten the Conqueror Star]]" appears in this card's artwork.
  * This is the first card with an effect that targets a monster without a [[Level]].
  ** This, along with the appearance of "Idaten the Star Conqueror" in this card's artwork, is a reference to how, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, the aforementioned monster battled "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]" (an [[Xyz Monster]] that features a [[Rank]] instead of a Level) in every Duel that it appeared in.
