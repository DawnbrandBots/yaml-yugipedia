title: Card Trivia:S-Force Chase
wikitext: |-
  {{Navigation}}

  * "[[S-Force Rappa Chiyomaru]]", "[[S-Force Dog Tag]]", and "[[I:P Masquerena]]" appear in this card's artwork.

  * This card's artwork is adapted into ''[[Underground Data Courier]]'' in ''Yu-Gi-Oh! Master Duel'', specifically the scene where [[Chiyomaru]] chases [[I:P Masquerena (character)|I:P Masquerena]] while accusing her as a wanted criminal.
