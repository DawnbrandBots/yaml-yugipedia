title: Card Trivia:Overload Future Fusion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This card is a [[retrained]] counterpart of "[[Future Fusion]]" and "[[Overload Fusion]]".
  ** This card's effects likely reference [[Zane Truesdale]], who used both "[[Future Fusion (anime)|Future Fusion]]" and "[[Overload Fusion (later anime)|Overload Fusion]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** Each time Zane used "Future Fusion" in his [[Duel]]s, it was used to send multiple "[[Cyber Dragon (anime)|Cyber Dragon]]" from his [[Deck]] to the [[Graveyard]] and [[Fusion Summon]] "[[Cyber Twin Dragon (anime)|Cyber Twin Dragon]]" or "[[Cyber End Dragon (anime)|Cyber End Dragon]]"; both monsters [[Mentions|mention]] "Cyber Dragon" as material, hence this card's effect to send a [[Fusion Material]] mentioned by a [[Fusion Monster]] from the [[Deck]] to the Graveyard.
  *** This card's effect to Fusion Summon a [[DARK]] [[Machine]] monster by [[banish]]ing its materials from the Graveyard is very similar to the effect of "Overload Fusion", albeit without the option to use materials from the field.
