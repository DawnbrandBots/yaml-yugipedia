title: Card Trivia:Hieratic Dragon King of Atum
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Xyz Discharge]]".
  * This card seems to be the unsealed form of "[[Hieratic Seal of the Dragon King]]".
  * This card's name comes from the Egyptian God, [[wikipedia:Atum|Atum]].
  * Each monster in the "Hieratic" archetype has the light from the sun in some way. This one appears to be right in front of it facing away.
