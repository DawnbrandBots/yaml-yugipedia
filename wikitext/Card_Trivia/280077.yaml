title: Card Trivia:Overlay Booster
wikitext: |-
  {{Navigation}}

  * This monster is related to "[[Overlay Sentinel]]":
  ** Both monsters share the same [[Attribute]] ([[LIGHT]]) and [[original ATK and DEF]] (2000/0).
  ** Both monsters share an ''[[OCG]]''/''[[TCG]]'' effect where they can be [[Summon]]ed in [[Defense Position]].
  ** Both monsters feature an inverted effect that manipulates a monster's [[ATK]] by 500 for each [[Xyz Material]] attached to the player's [[Xyz Monster]].
  ** Both monsters are first used by [[Kite Tenjo]] during his Duel against [[Jinlong]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
