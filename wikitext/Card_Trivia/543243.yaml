title: Card Trivia:Hi-Five the Sky
wikitext: |-
  {{Navigation}}

  * [[Yuma Tsukumo]] appears in this card's artwork.
  ** This card's artwork is based on the shot from the first Japanese opening theme of the ''Yu-Gi-Oh! ZEXAL'' anime, ''[[Masterpiece]]'', showing Yuma jumping towards the sun.
  ** This card's name references Yuma's catchphrases in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: In the original Japanese version, his catchphrase is "[[Kattobingu Daze!]]", while in the English dubbed version, his catchphrase is "Hi-five the sky!"

