title: Card Trivia:Maliss Q Hearts Crypter
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Crossover Breakers]]''/''[[Crossover Breakers]]''.
  * This monster appears in the artwork of "[[Maliss C TB-11]]".
  * This monster is based on the [[wikipedia:Queen of Hearts (Alice's Adventures in Wonderland)|Queen of Hearts]] from ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]'' and consequently the [[wikipedia:Queen (playing card)|Queen of Hearts]] in [[wikipedia:Playing card|playing card]]s.
  * This monster is  named after crypters, a type of software program that encrypts and obfuscates files (such as malware) to bypass detection by security tools.
