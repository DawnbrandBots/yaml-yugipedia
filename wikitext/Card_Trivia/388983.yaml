title: Card Trivia:Captain Lock
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Perished Pirate]]".
  * This monster's name is based on  [[wikipedia:Captain Hook|Captain Hook]], the main antagonist of [[wikipedia:J. M. Barrie|J. M. Barrie's]] 1911 novel, ''[[wikipedia:Peter and Wendy|Peter and Wendy]]'' who is depicted as a pirate captain with a hoot for a left hand.
  ** This monster's name is a pun on its appearance, as it appears to have a padlock with an unsecured shackle resembling a hook. The naming scheme is also on a pun on its [[Lockdown]] effect, preventing the player's opponent from Summoning or [[Set]]ting monsters from their [[hand]].
