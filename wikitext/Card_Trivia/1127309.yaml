title: Card Trivia:D/D Lance Soldier
wikitext: |-
  {{Navigation}}

  [[File:Lance_Defense_Soldiers.png|thumb|250px|Lance Defense Soldiers logo]]
  * This monster and "[[D/D Defense Soldier]]" are named after the [[Lancers]], short for '''Lance Defense Soldiers''' (ランス・ディフェンス・ソルジャーズ ''Ransu Difensu Sorujāzu''), the organized group of [[Standard Dimension]] [[Duelist]]s led by [[Declan Akaba]] who defend the dimension from invaders from other dimensions.
  ** Visually, this monster is based on the figure in the Lance Defense Soldiers' logo, which is a knight wielding a lance weapon and riding its horse.
