title: Card Trivia:Darkness Greed
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Sevens Road Magician]]" appears in this card's artwork.
  * This card's name is a reference to "[[Pot of Greed (Rush Duel)|Pot of Greed]]", which allows the player to [[draw]] two cards, whereas this card's effect allows the player to draw a maximum of two cards.
  ** This card's Japanese name, "Darkness Magic 549" features the number "549" (''go yon kyū''), which is ''[[goroawase]]'' for the Japanese word for "greed" ({{Ruby|強|ごう}}{{Ruby|欲|よく}}, ''gōyoku'').
  ** This is further clarified in {{episode|SEVENS|091|ref}} when [[Lucidien Kallister]], known for using "[[Pot of Greed (anime Rush Duel)|Pot of Greed]]", chides [[Otes]] for being greedy after playing this card.
