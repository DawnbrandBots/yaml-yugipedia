title: Card Trivia:Nightmare Archfiends
wikitext: |-
  {{Navigation}}

  * 3 "[[Nightmare Archfiend Token]]s" appear in this card's artwork.
  * The [[Duelist]] is in this card's artwork is wielding a generic [[Duel Disk#Standard Duel Disks|New Domino City Duel Disk]].
  * This card has a similar effect to "[[Ojama Trio]]".
  ** Both cards are also [[Trap Card]]s that in the anime, were used by rivals of a main character in a specific series ("Ojama Trio" is used by [[Chazz Princeton]], who is [[Jaden Yuki]]'s rival in ''[[Yu-Gi-Oh! GX]]'', whereas this card is used by [[Jack Atlas]], who is [[Yusei Fudo]]'s rival in ''[[Yu-Gi-Oh! 5D's]]''.)
