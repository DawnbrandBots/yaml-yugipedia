title: Card Trivia:Ignister A.I.Land
wikitext: |-
  {{Navigation}}

  * A close-up of the fountain at the top right area of the island in this card's artwork appears in the artwork of "[[A.I. Connect]]"
  * This card's name is a portmanteau of the words "[[Ai]]" and "[[wikipedia:Island|island]]".
  ** The shape of the island in this card's artwork resembles the shape of Ai's head.
  ** A statue of Ai appears at the bottom left area of the island, while an image of Ai's head appears on the [[wikipedia:Ferris wheel|Ferris wheel]] near the center of the island.
