title: Card Trivia:Qliphort Monolith
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Re-qliate]]".
  * This monster's Japanese name, "Qliphort Assembler" ({{name|Qliphort Monolith|ja}}, ''{{romanized name|Qliphort Monolith|ja}}'') is a pun on [[wikipedia:Assembly language|assembler]] (a computer program written in a primitive, low-level programming language) and Aiyatsbus, the ninth [[wikipedia:Qlippoth|Qlippoth]] emanation, which is associated with the [[wikipedia:Devil|Devil]] [[wikipedia:Lilith|Lilith]].
  * The error that occurs in this card's [[flavor text]] is a [[wikipedia:null pointer|null pointer]] exception, an error that occurs when a program attempts to read or write memory at "nowhere" or "no location", which is invalid in any standard [[wikipedia:Operating system|operating system]].
  ** The number "0x00-000" in this card's flavor text is based on how a computer processor interpretes the error as a location of 0.
  ** The [[wikipedia:Core dump|error dump]] in this card's Japanese flavor text below the "===CARNAGE===" header (たッgなnトiのoモdる{{Ruby|知|し}}rヲu{{Ruby|悪|あく}}o{{Ruby|善|ぜん}}yりナnにoウよyノrりgトnひaノれsワiれワdはo{{Ruby|人|ひと}}Gヨ{{Ruby|見|み}}イdなoレo{{Ruby|知|し}}lもfカるeキr{{Ruby|生|い}}iにf{{Ruby|久|きゅう}}{{Ruby|永|えい}}gベn{{Ruby|食|た}}iてrッb{{Ruby|取|と}}もoラtか{{Ruby|木|き}}tノn{{Ruby|命|いのち}}aベw{{Ruby|伸|の}}ヲd{{Ruby|手|て}}nはa{{Ruby|彼|かれ}}) contains two streams of reverse text, one in English and one in Japanese.
  *** The English stream of text reads ''God is angry on your doing and want to bring [[Infernoid|fire flood]]'', which is a reference to [[wikipedia:Noah's Ark|Noah's Ark]] in the [[wikipedia:Bible|Bible]]'s [[wikipedia:Old Testament|Old Testament]].
  *** The Japanese stream of text is written alternately in [[wikipedia:Hiragana|hiragana]]/[[wikipedia:Kanji|kanji]] and [[wikipedia:Katakana|katakana]] to obfuscate it; when converted to the proper grammar, it reads 「見よ人は我々の一人のようになり善悪を知るものとなった彼は手を伸べ命の木からも取って食べ永久に生きるかもしれない」 (''Behold, the man is become as one of us, to know good and evil: and now, lest he put forth his hand, and take also of the tree of life, and eat, and live for ever:''), which is a quote from the Hebrew Bible's Genesis 3:22, and is also a reference to the [[wikipedia:Tree of life (biblical)|tree of life]] in the Old Testament.
  *** Unlike "[[Evilswarm Heliotrope]]", this card's Japanese flavor text is not written entirely backwards, but rather right-to-left and top-to-bottom.
  ** The error dump in this card's ''[[TCG]]'' flavor text ("[[El Shaddoll Fusion|Xlmgzxg]] drgs gsv [[Naturia Sacred Tree|Hzxivw Givv]] rh [[Nephe Shaddoll Fusion|uliyrwwvm]]. [[Infernoid|Gsv hxlfitv]] szh yvvm fmovzhsvw") is enciphered using the [[wikipedia:Atbash|Atbash cipher]]; when deciphered, it reads ''[[El Shaddoll Fusion|Contact]] with the [[Naturia Sacred Tree|Sacred Tree]] is [[Nephe Shaddoll Fusion|forbidden]]. [[Infernoid|The scourge]] has been unleashed''.
  *** The error dump in this card's flavor text was not translated in the Portuguese print of this card from the English version, unlike the other ''TCG'' prints.
  ** The number "0x1i-666" in this card's flavor text is a reference to 666, the [[wikipedia:Number of the beast|number of the beast]].
  *** The two memory addresses in this card's flavor text ("0x1i-666" and "0x00-000") appear to be written in the standard [[wikipedia:Hexadecimal|hexadecimal]] [[wikipedia:Numeral system|positional numeral system]], as they start with "0x"; however, "i" and "-" are not hexadecimal digits.
