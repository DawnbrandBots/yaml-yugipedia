title: Card Trivia:Kozmo Soartroopers
wikitext: |-
  {{Navigation}}

  * These monsters appear in the artworks of "[[Kozmo Landwalker]]" and "[[Kozmoll Dark Lady]]".
  * These monsters are a combination of the [[wikipedia:Winged monkeys|flying monkeys]] from ''[[wikipedia:The Wizard of Oz (1939 film)|The Wizard of Oz]]'' and the [[wikipedia:Stormtrooper (Star Wars)|Imperial Stormtroopers]] from ''[[wikipedia:Star Wars|Star Wars]]''.
  * The シーミウズ (Shīmiuzu) part of this card's Japanese name may be a [[wiktionary:portmanteau#Etymology_2|portmanteau]] of ''[[wiktionary:simian|Simian]]'' ('''シミ'''アン, Shimian) and ''[[wiktionary:corvus|Corvus]]'' (コル'''ウス''', Koru'usu).
