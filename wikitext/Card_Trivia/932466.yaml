title: Card Trivia:Zuse the Wisdom Vassal
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[By Order of the Monarch]]".
  * This monster is named after [[wikipedia:Konrad Zuse|Konrad Zuse]], the German civil engineer who created the world’s first programmable computer, the [[wikipedia:Z3 (computer)|Turing-complete Z3]].
  * This monster has a [[Monarch (Rush Duel series)|Monarch]] [[counterpart]]: "[[Wilhel the Wisdom Monarch]]".
