title: Card Trivia:Curse of Dragon, the Magical Knight Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] [[counterpart]] of "[[Curse of Dragon]]", and a [[Curse of Dragon (series)|Curse of Dragon]] counterpart of "[[Gaia the Magical Knight of Dragons]]".
  ** Visually, this monster is a Fusion of "[[Curse of Dragon, the Cursed Dragon]]" wearing the armor of "[[Gaia the Magical Knight]]".
