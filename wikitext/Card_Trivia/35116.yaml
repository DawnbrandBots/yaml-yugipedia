title: Card Trivia:Flying Fortress SKY FIRE
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Delta Reactor]]".
  * This monster is based on the [[wikipedia:Boeing B-17 Flying Fortress|Boeing B-17 Flying Fortress]], a giant heavy bomber aircraft used in [[wikipedia:World War II|World War II]].
  ** This monster also seems to be visually based on "Big Duo" from the anime ''[[wikipedia:The Big O|The Big O]]''.
  * This monster is the combined form of "[[Summon Reactor・SK]]", "[[Trap Reactor・Y FI]]", and "[[Spell Reactor・RE]]".
  ** The three colored explosions in the background of this card's artwork appear in each of the "[[Reactor]]" monsters' artworks.
  ** This monster features the propellered turbine shoulders of "Summon Reactor", the green torso and legs of "Trap Reactor", and the red claws and the bombs of "Spell Reactor".
  ** "SKY FIRE" ("Airraid" in the ''[[OCG]]'') is the combination of the lettered suffixes used in the names of the "Reactor" monsters.
  *** "[[Summon Reactor・SK]]" ("Summon Reactor・'''AI'''")
  *** "[[Trap Reactor・Y FI]]" ("Trap Reactor・'''RR'''")
  *** "[[Spell Reactor・RE]]" ("Magic Reactor・'''AID'''")
  * This is the [[signature card]] of [[Greiger]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** Greiger's Japanese name, "Bommer", and this monster's Japanese name, "Giant Bomber Airraid" both share the same Japanese spelling and pronunciation of "bomber" (ボマー ''Bomā'').
