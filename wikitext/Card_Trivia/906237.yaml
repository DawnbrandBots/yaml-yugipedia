title: Card Trivia:RESCUE!
wikitext: |-
  {{Navigation}}

  * "[[Rescue-ACE Hydrant]]" and a hologram of "[[Rescue-ACE Air Lifter]]" appear in this card's artwork.
  ** This card's artwork appears in the artwork of "[[Rescue-ACE HQ]]".
  * The name of this card, along with the other "[[Rescue-ACE]]" [[Spell Card|Spell]]/[[Trap Card|Traps]], represents the letters of the archetype's Japanese name ({{Ruby|Ｒ－ＡＣＥ|レスキュー・エース}}).
  ** "R.A.C.E." is also an acronym used by healthcare personnel to remember the response procedure in the case of fire: '''R'''escue/Remove, '''A'''lert/Alarm, '''C'''ontain/Confine, '''E'''xtinguish/Evacuate.
