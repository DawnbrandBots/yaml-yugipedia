title: Card Trivia:Mysterious Puppeteer
wikitext: |-
  {{Navigation}}

  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', if this monster is the player's [[Deck Master]], then the [[Ritual Monster]] "[[Psycho-Puppet (DOR)|Psycho-Puppet]]" will gain 1500 [[ATK]], increasing its 2000 ATK to 3500.
  * The first Spanish edition of this card used the word "''oponente''" instead of "''adversario''" (the official term for "''opponent''"). This was corrected in newer prints. In both cases, the word "''campo''" ("''[[field]]''") is spelled without a capital letter.
