title: Card Trivia:X-Saber Wayne
wikitext: |-
  {{Navigation}}

  * This monster is likely named after [[wikipedia:Ywain|Sir Ywain]], one of the [[wikipedia:Knights of the Round Table|Knights]] of the [[wikipedia:Round Table|Round Table]].
  ** This monster's name and Western-themed appearance are both puns on the American actor [[wikipedia:John Wayne|John Wayne]], who was well-known for playing heroes in [[wikipedia:Western (genre)|Western films]].
  * This monster has an "[[Ice Barrier]]" [[counterpart]]: "[[General Wayne of the Ice Barrier]]".
