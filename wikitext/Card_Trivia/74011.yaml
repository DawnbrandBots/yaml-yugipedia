title: Card Trivia:Yubel - Terror Incarnate
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Yubel - Das Abscheulich Ritter", is the German for "Yubel - The Detestable Knight".
  ** The German name for this card is based on the English name, rather than the Japanese name. This also occurs to its [[Yubel - The Ultimate Nightmare|next form]]'s name.
  ** "Yubel - Das Abscheulich Ritter" is grammatically incorrect German: the correct name would be "Yubel - '''Der''' Abscheulich'''e''' Ritter".
  *** However, the use of the neutral article over the grammatically-correct masculine one could refer to the androgynous nature of "Yubel".
  * This card has the lowest [[original ATK and DEF]] (0/0) of all [[Level 11]] monsters.
  * This monster, like its other counterparts, features "eyes" and "face" throughout different parts of its body; in this monster's case, its chest resembles the third eye of "[[Yubel]]".
  * This is the only incarnation of "Yubel" where its head retracts into its body, although it re-emerges in its next form.
