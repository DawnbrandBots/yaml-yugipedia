title: Card Trivia:Gotterdammerung
wikitext: |-
  {{Navigation}}

  * "[[Odin, Father of the Aesir]]" appears in this card's artwork.
  * ''[[wikipedia:Götterdämmerung|Götterdämmerung]]'' ("Twilight of the Gods") is a translation into German of the Old Norse phrase [[wikipedia:Ragnarök|Ragnarök]], which in Norse mythology refers to a prophesied war of the gods that brings about the end of the world.
