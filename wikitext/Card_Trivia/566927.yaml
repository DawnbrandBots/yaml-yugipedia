title: Card Trivia:Devotee of Nephthys
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Rebirth of Nephthys]]" and "[[Last Hope of Nephthys]]".
  * This card is the first Level 2 [[Ritual Monster]] to be released.
  * Visually, this monster is a Ritual Monster counterpart to "[[Hand of Nephthys]]".
