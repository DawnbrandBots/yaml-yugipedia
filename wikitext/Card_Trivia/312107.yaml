title: Card Trivia:Depth Gardna
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the [[wikipedia:Ammonoidea|ammonite]], a type of extinct nautiloid famous for its distinct bony shells commonly found at fossil sites.
  ** This monster may also be based on the [[wikipedia:Nautilus|nautilus]], the living descendants of the ammonite. This is hinted by this card's name, "'''Depth''' Gardna", as the nautilus lives in the ocean deep, while ammonites dwelled in the open ocean.
