title: Card Trivia:Jet Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Forceback]]".
  * During the time "[[Jet Synchron]]" was [[Forbidden]] in the ''[[TCG]]'' [[Advanced Format]], the only way to [[Synchro Summon]] this card was to use a [[Synchro Substitute Monster]] (i.e. "[[Junk Anchor]]", "[[Quickdraw Synchron]]", or "[[Righty Driver]]") or an effect that [[Treats Special Summon as Synchro Summon|treats a Special Summon as a Synchro Summon]].
