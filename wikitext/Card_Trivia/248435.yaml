title: Card Trivia:Tornado Wall
wikitext: |-
  {{Navigation}}

  * The tornados from this card's artwork also appear in the artwork of "[[Sea Stealth II]]".
  * Initially, this card's effect gave the player immunity to [[battle damage]] and [[effect damage]]; however, in later prints, this card's effect was rewritten to only reduce battle damage from ''[[attack]]ing monsters'' to 0.
