title: 'Card Trivia:Number C5: Chaos Chimera Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of the box of ''[[Collectors Pack: Duelist of Legend Version]]''.
  * "[[Number]]" monsters often take the form of their owners and/or their original desires; this card represents the combined power of five of the [[Seven Barian Emperors]] that [[Vector]] had absorbed before his [[Duel]] against [[Nash]]: [[Dumon]], [[Rio Kastle|Marin]], [[Girag]], [[Alito]], and himself.
  ** The spheres on this monster's chest represent four of the Barian Emperors that Vector absorbed: Marin (blue), Girag (green), Alito (red), and Dumon (white).
  ** This card's name is based on the [[wikipedia:Chimera|Chimera]], a creature from [[wikipedia:Greek mythology|Greek mythology]] made up of several different animals fused together.
  *** Fittingly, in the  ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster was Summoned by using four "[[Number C]]" monsters, with the effect of "[[Rank-Up-Magic Admiration of the Thousands (anime)|Rank-Up-Magic Admiration of the Thousands]]".
  * This monster is the "Number C" [[Card evolutions|upgraded]] form of "[[Number 5: Doom Chimera Dragon]]".
  ** This card is the only "Number C" monster whose base form did not appear in the ''Yu-Gi-Oh! ZEXAL'' anime.
  ** This card is also the first "Number" monster to be released in the ''OCG''/''TCG'' before its base form.
  * This card is the first "Number" monster in the ''[[OCG]]''/''[[TCG]]'' that can be Summoned with a variable number of Xyz Materials.
  * This card and "[[Number C73: Abyss Supra Splash]]" are the first "Number C" monsters to be released in the ''TCG'' before being released in the ''OCG''.
  * In the English dubbed version of the ''Yu-Gi-Oh! ZEXAL'' anime, this monster's roar was the same as that of "[[Number 17: Leviathan Dragon]]".
