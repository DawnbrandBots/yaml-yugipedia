title: Card Trivia:Card of Sanctity
wikitext: |-
  {{Navigation}}

  * In the original Japanese version of {{episode|Yu-Gi-Oh!|131|ref}}, [[Seto Kaiba]] referred to [[Card of Sanctity (anime)|this card]] (which had a different effect in the anime) as the "ultimate hand renewal" card.
  * This card's effect was substantially weakened relative to the manga and anime when it was released in the ''[[OCG]]''/''[[TCG]]''. To compensate for this, several other cards inspired by it have been granted its original effect: "[[Silent Burning]]", "[[The Revived Sky God]]", and "[[Future Silence]]".
