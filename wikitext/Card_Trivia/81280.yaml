title: Card Trivia:Gearfried the Iron Knight
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the box of ''[[Duelist Legacy Volume.3]]'' and ''[[Speed Duel: Streets of Battle City]]''.
  * This monster appears in the artwork of "[[Dimension Explosion]]", "[[Release Restraint]]", and "[[Verdict of Anubis]]".
  * This monster has several forms:
  ** A [[Lightray]] [[counterpart]]: "[[Lightray Gearfried]]".
  ** A "[[Red-Eyes]]" counterpart: "[[Gearfried the Red-Eyes Iron Knight]]".
  ** Two [[Card evolutions|upgraded]] forms: "[[Phoenix Gearfried]]" and "[[Immortal Phoenix Gearfried]]".
  ** A [[Fusion Monster|Fusion]] with "[[Giltia the D. Knight]]": "[[Gilti-Gearfried the Magical Steel Knight]]".
  * This monster is similar to "[[Power Tool Dragon]]", as both are armored versions of their true, hidden form and have effects that involve [[Equip Spell Card]]s.
  * During his [[Duel]] against [[Rex Raptor]] in {{episode|Yu-Gi-Oh!|162|ref}}, [[Joey Wheeler]] tells the story of "[[Gearfried the Swordmaster]]": "Gearfried" wielded a power so great, that merely holding a weapon resulted in the wide scale devastation of an entire battlefield. Fearful of his own might, he sealed himself in a suit of iron armor to limit his power, which is reflected in this card's effect of destroying any [[Equip Card]] [[equip]]ped to it.
