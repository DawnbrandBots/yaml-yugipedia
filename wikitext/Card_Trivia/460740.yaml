title: 'Card Trivia:Number 98: Antitopian'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster is symbolically the opposite of "[[Number 39: Utopia]]".
  ** This monster has the opposite color scheme, [[Attribute]] and [[ATK]]/[[DEF]] compared to "Utopia".
  ** This monster's pose is facing the opposite direction compared to "Utopia".
  ** "Utopia" [[negate]]s a monster's [[attack]] by detaching 1 [[Xyz Material]], while this card changes the attacking monster into [[Defense Position]] by detaching 1 Xyz Material.
  ** This card can [[Special Summon]] itself from the [[Graveyard]] by 'absorbing' one "[[Utopia (archetype)|Utopia]]" monster as Xyz Material.
  ** The Japanese name of "Utopia" is "King of Wishes, Hope" whereas this card's name is "King of Despair, Hopeless".
  ** This monster's [[Number]] glyph is on its right shoulder, as opposed to being on the left like on "Utopia" and [[Utopia (archetype)|all of its forms]].
  ** Ironically, the monster following this card in the "Number" archetype is "[[Number 99: Utopic Dragon]]", "Utopia"'s final form.
