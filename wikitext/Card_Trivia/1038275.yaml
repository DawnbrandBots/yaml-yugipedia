title: Card Trivia:Golgoil the Steel Seismic Smasher
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[Illusion]] [[counterpart]] of "[[Golgoil]]".
  ** The word "DAIMAJIN" (meaning "great demon" in Japanese) is engraved on this monster's upper armor.
  ** This monster's [[original ATK and DEF]] (1800/3200) is twice that of "Golgoil" (900/1600).
  ** This monster's Illusion [[Type]] references how in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' and ''[[Yu-Gi-Oh! True Duel Monsters]]'' video game series, "[[Golgoil (DM2)|Golgoil]]" belonged to the [[Dreams]] [[Alignment]], which is known in the Japanese version as "Illusion Magic" (げんそうま, Gensōma) or "Illusion" (げん{{Ruby|想|そう}}, ''Gensō'').
  ** This monster's effect to [[support]] [[Machine]] monsters references how "Golgoil" is a Machine monster in the ''[[OCG]]''/''[[TCG]]'' and in the ''Yu-Gi-Oh! Duel Monsters'' video game series.
  ** This monster's effect to [[Special Summon]] itself after being [[banish]]ed is a reference to its [[Golgoil (DOR)|appearance]] in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', in which it can revive itself after being [[destroyed by battle]].
