title: Card Trivia:Heroic Champion - Kusanagi
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Kusanagi no Tsurugi|Kusanagi no Tsurugi]], a sword in [[wikipedia:Japanese mythology|Japanese mythology]].
  * This card is similar to "[[Heroic Champion - Excalibur]]", as both cards can make their [[ATK]] 4000 by using up all of their [[Xyz Material]]s for their effects.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster was depicted to be much bigger in size compared the rest of the "[[Heroic]]" monsters, likely to represent its status as the boss monster of the "[[Heroic Champion]]" archetype. This was shown particulary clearly when "[[Heroic Champion - Kusanagi (anime)|this monster]] battled "[[Gagaga Cowboy (anime)|Gagaga Cowboy]]" during [[Yuma Tsukumo]] and [[Nistro]]'s Duel in {{episode|ZEXAL|059|ref}}.
