  * "[[Thought Ruler Archfiend]]" appears in this card's artwork.
  ** This card's artwork is a continuation of the events depicted in the artwork of "[[Telekinetic Charging Cell]]", where the cell overloads, transforming "Thought Ruler Archfiend" into "[[Overmind Archfiend]]".
