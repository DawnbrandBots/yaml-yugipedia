title: Card Trivia:Paladin of White Dragon
wikitext: |-
  {{Navigation}}

  * The warrior in this card's artwork appears to be voyaging on an adventure:
  ** "[[Raregold Armor]]" >  "[[Kishido Spirit]]" > "[[Ritual Weapon]]" > "[[White Dragon Ritual]]" > "'''Paladin of White Dragon'''" > "[[Paladin of the Cursed Dragon]]".
  * The dragon mount seems to be an infant "[[Blue-Eyes White Dragon]]", presumably hatched from "[[The White Stone of Legend]]".
  * This is the first [[Dragon]] [[Ritual Monster]].
  * This monster has multiple [[counterpart]]s:
  ** A "[[Red-Eyes]]" [[counterpart]]: "[[Paladin of Dark Dragon]]".
  ** A [[Zombie]] counterpart: "Paladin of the Cursed Dragon"
  ** A "[[Photon]]" counterpart: "[[Paladin of Photon Dragon]]".
  ** An "[[Armed Dragon]]" counterpart: "[[Knight of Armor Dragon]]".
  * Oddly, despite being a Dragon monster in the anime, this monster did not contribute to the [[ATK]]-gaining effect of "[[Blue-Eyes Shining Dragon (anime)|Blue-Eyes Shining Dragon]]" in ''[[Yu-Gi-Oh! The Movie: Pyramid of Light]]''.
