title: Card Trivia:Black Garden
wikitext: |-
  {{Navigation}}

  * The statue in this card's artwork seems to depict a [[wikipedia:Faun|faun]], a creature from [[wikipedia:Greek mythology|Greek mythology]] that is depicted with the upper body of a man and the bottom half of a goat.
  * This card has a [[retrained]] counterpart: "[[Black Rose Garden]]".
  * This card shares similarities with "[[Ecole de Zone]]".
  ** Both are [[Field Spell Card]]s depicting a rose garden-themed area in their artworks.
  ** Both cards feature an effect that affects a monster that is Summoned and [[Special Summon]]s a [[Token Monster]] afterwards.
  ** Both cards are used by a character in the ''[[Yu-Gi-Oh! 5D's]]'' whom at one point were affiliated with clandestine organizations: this card was used by [[Akiza Izinski]] when she was in the [[Arcadia Movement]], and "Ecole de Zone" by [[Sherry LeBlanc]] when she temporarily defected to [[Iliaster]].
