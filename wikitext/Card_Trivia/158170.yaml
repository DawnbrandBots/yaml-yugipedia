title: Card Trivia:Elemental HERO Nova Master
wikitext: |-
  {{Navigation}}

  * This monster's name is based on a [[wikipedia:Nova|nova]], an astronomical event which causes the sudden appearance of a bright, apparently "new" [[wikipedia:Star|star]].
  ** The star is a self-illuminating object in space that is made up of [[wikipedia:Plasma|plasma]], a fundamental state of matter that takes the form of fire when sufficiently heated, which reflects this monster's [[FIRE]] [[Attribute]] and [[Fusion Material]] requiring a FIRE monster.
  * This monster is likely an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Elemental HERO Heat]]".
  * This monster has "[[Elemental HERO]]" Attribute-based Fusion [[counterpart]]s for five of the other six Attributes:
  ** [[EARTH]]: "[[Elemental HERO Gaia]]"
  ** [[WIND]]: "[[Elemental HERO Great Tornado]]"
  ** [[WATER]]: "[[Elemental HERO Absolute Zero]]"
  ** [[LIGHT]]: "[[Elemental HERO The Shining]]"
  ** [[DARK]]: "[[Elemental HERO Escuridao]]"
  * This is the only Attribute-based "Elemental HERO" [[Fusion Monster]] to not appear in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga. This is likely due to the fact that "[[Elemental HERO Inferno]]" (the original FIRE member of its counterparts in the manga) was released with specific [[Fusion Material]]s in the ''[[OCG]]''/''[[TCG]]'', resulting in the creation of this monster to fill the gap.
