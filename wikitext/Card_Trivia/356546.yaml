title: Card Trivia:Tsukumo Slash
wikitext: |-
  {{Navigation}}

  * "[[Number 39: Utopia]]" appears in this card's artwork.
  * This card's name references the surname of [[Yuma Tsukumo (manga)|Yuma Tsukumo]], who uses this card in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga. "Tsukumo" can also be read as the Japanese word for the number "99".
  ** This card's artwork depicts "Utopia" performing multiple quick slash attacks with its sword, which creates multiple visible afterimages in the process, making it appear as if there are a total of "nine" visible swords.
  ** In the manga, when this card was [[activated]], the difference between Yuma and [[Astral (manga)|Astral's]] [[Life Point]]s were "99" (with the former having 1 Life Point, and the latter having 100 Life Points). This allowed "[[No. 39: Utopia (manga)|Number 39: Utopia]]" to gain '''9900''' [[ATK]] via this card's effect.
  * This is the last card used in the ''Yu-Gi-Oh! ZEXAL'' manga.
