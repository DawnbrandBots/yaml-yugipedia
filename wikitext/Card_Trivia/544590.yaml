title: Card Trivia:Cross-Dimensional Duel
wikitext: |-
  {{Navigation}}

  * "[[Ancient Gear Golem]]", "[[Elemental HERO Flame Wingman]]", "[[Skyscraper]]", and the silhouettes of [[Jaden Yuki]] and [[Vellian Crowler]] appear in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|GX|167|ref}}, where Jaden's "Flame Wingman" battled Crowler's "Ancient Gear Golem" while "Skyscraper" was active. Jaden is depicted with his right arm extended toward the opponent, matching the pose he uses in the episode this scene is taken from.
  *** This is supported by the fact that the color of Jaden's [[Slifer Red]] jacket can be seen, as opposed to {{episode|GX|001|ref}} (with a similar scene), where he had not received his Slifer Red uniform nor enrollment in [[Duel Academy]] yet.
  * This card's Japanese name, "Cross Dimension" (競闘－クロス・ディメンション, ''Kyōtō - Kurosu Dimenshon'') is a pun on Crowler's Japanese name, "Chronos de Medici":
  ** The base kanji for "competition" (競闘) is a homonym of "vice-principal" (教頭), both of which is read as ''kyōtō''.
  ** "Cross Dimension" nearly matches "Chronos de Medici" when written in Japanese, with just a few syllables removed and added (「<u>クロス・ディメ</u>ンション」 vs 「<u>クロ</u>ノ<u>ス・</u>デ・<u>メディ</u>チ」)

