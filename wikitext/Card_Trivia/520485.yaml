  * This monster appears in the artworks of "[[Beast Magic Attack]]" and "[[Mythical Bestiamorph]]".
  * This monster is an upgraded form of "[[Mythical Beast Cerberus]]".
  ** Both have effects that increase their [[ATK]] and revolve around [[Spell Counter]]s.
