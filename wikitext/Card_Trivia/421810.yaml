title: Card Trivia:Dogoran, the Mad Flame Kaiju
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Extra Pack 2016]]''.
  * This monster appears in the artwork of "[[Interrupted Kaiju Slumber]]".
  ** Several images of this monster also appear in the artwork of "[[The Kaiju Files]]".
  * The tower from the artwork of "[[Kyoutou Waterfront]]" appears in this card's artwork (in the upper-right corner).
  * This monster is named after [//wikizilla.org/wiki/Dogora Dogora], a gaseous jellyfish-like alien ''[[wikipedia:kaiju|kaiju]]'' from the 1964 ''kaiju'' [[wikipedia:Dogora|film of the same name]]; however, its design is a combination of Burning Godzilla and Destoroyah, the two rival ''kaiju'' from the 1995 film, ''[[wikipedia:Godzilla vs. Destoroyah|Godzilla vs. Destoroyah]]''.
  * This monster has a "Super Anti-Kaiju War Machine" counterpart: "[[Super Anti-Kaiju War Machine Mecha-Dogoran]]".
  * This monster can be seen as a rival of "[[Thunder King, the Lightningstrike Kaiju]]".
  ** Both are based on rival monsters in ''kaiju'' films produced by [[wikipedia:Toho|Toho]].
  ** Both have "Super Anti-Kaiju War Machine" counterparts.
  ** Both feature an effect that devastates the opponent's [[field]], and then a secondary aspect that affects their attacks for the turn. This monster [[destroy]]s all monsters the opponent [[control]]s but prevents itself from attacking, while "Thunder King" prevents the opponent from [[activate|activating]] card effects and allows it to attack up to three times.
