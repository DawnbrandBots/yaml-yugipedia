  * The hero and the giant from "[[Ego Boost]]" appear in this card's artwork.
  * This card's artwork is likely a reference to the ''[[wikipedia:JoJo's Bizarre Adventure|JoJo's Bizarre Adventure]]'' manga and anime franchise, with the two heroes performing Jotaro Kujo and DIO's poses.
