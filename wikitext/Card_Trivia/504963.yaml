title: Card Trivia:Black Process - Negledo
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is one of four cards that represents the four stages of the ''[[wikipedia:Magnum opus (alchemy)|Magnum opus]]'' process. ("'''Black Process - Negledo'''" > "[[White Process - Albedo]]" > "[[Yellow Process - Kitolenics]]" > "[[Red Process - Rubedo]]")
  ** In this card's case, it is based on [[wikipedia:Nigredo|nigredo]] (or '''blackness'''), the first step of the process representing putrefaction or decomposition.
  *** Fittingly, this is the first "Process" card used by [[Lyman Banner|Amnael]] during his [[Duel]] against [[Jaden Yuki]] in {{episode|GX|045|ref}}.
  *** This card's artwork depicts the primary colors of light (red, green, blue), along with the colors obtained by mixing either of these colors (magenta + cyan → purple; cyan + yellow → green; and yellow + magenta → red). When the three primary colors are mixed together, it creates the color black.
  *** In alchemy, the process of blackness is the first step in the pathway to the [[wikipedia:Philosopher's Stone|philosopher's stone]], where all alchemical ingredients had to be cleansed and cooked extensively to a uniform black matter. This is reflected in this card's effect to "clean" their [[field]] by [[banish]]ing their "[[Alchemy Beast]]" monsters and drawing two cards for each banished monster.
  * This is the only one of the "Process" cards that doesn't [[Special Summon]] a monster.
