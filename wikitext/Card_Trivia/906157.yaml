title: Card Trivia:Glory Level Talisman
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a string of fresh garlic bulbs wrapped around a [[wikipedia:vampire|vampire's]] neck. Ironically, garlic is often used to ward off and repel vampires in mythology.
  ** This card's effect reflects this, as it can "ward off" card effects and "repel" any attacks from the opponent's monster and [[destroy]] it.
  ** The five garlic bulbs in this card's artwork references this card's effect to be [[equip]]ped to a [[Level 5]] monster.
