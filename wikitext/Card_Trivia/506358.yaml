title: Card Trivia:Cloudian - Cirrostratus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Updraft]]".
  * This monster is based on [[wikipedia:cirrostratus cloud|cirrostratus clouds]], a high-altitude variation of the [[wikipedia:stratus cloud|stratus clouds]].
  ** This monster's cat-like appearance is a reference to how cirrostratus clouds is often nicknamed "cats-hair".
