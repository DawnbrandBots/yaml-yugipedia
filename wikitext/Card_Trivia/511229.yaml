title: Card Trivia:Giant Kozaky
wikitext: |-
  {{Navigation}}

  * This card has the highest original printed ATK (2500) and the highest total stats (4900 ATK and DEF) of any Level 4 monsters in the ''[[OCG]]''/''[[TCG]]''.
  * "[[Kozaky]]" appears in this card's artwork. Its effect is a reference to how "Kozaky" is needed to control the Monster.
  ** In his respective storyline, this card's strength is said rival an [[Archfiend|Archfiend's]].
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'' and ''[[Yu-Gi-Oh! 5D's World Championship 2011: Over the Nexus]]'', this card exists, but "Kozaky" does not.
  * In DS games such as ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'', this monster is shown to be a [[:File:GiantKozaky-WC10-EN-VG-NC.png|tank-like machine]].
  * This monster has the number "539" on the side of its head. This is a pun, as the number can be read in Japanese as "Go"-"San"-"Kyuu", which sounds similar to "Kozaky".
