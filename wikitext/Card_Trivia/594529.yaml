title: Card Trivia:Endymion's Lab
wikitext: |-
  {{Navigation}}

  * "[[Magidog]]", "[[Magicat]]", "[[Tempest Magician]]", and "[[Alchemist of Black Spells]]" appear in this card's artwork.
  * In this artwork, it looks like they are preparing for the ritual that happens in the artwork of "[[That Wacky Magic!]]". But then the ritual goes wrong so "Alchemist of Black Spells" has to forcefully stop it in the artwork of "[[That Wacky Alchemy!]]".
