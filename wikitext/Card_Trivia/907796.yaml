title: Card Trivia:Dream Tower of Princess Nemleria
wikitext: |-
  {{Navigation}}

  * This tower appears in the artworks of "[[Nemleria Dream Defender - Couette]]", "[[Nemleria Dream Defender - Oreiller]]", and "[[Nemleria Louve]]".
  * This card's artwork depicts the tower is stacked with 15 pancakes, referencing the 15 card maximum of the [[Extra Deck]], which the "[[Nemleria]]" [[archetype]] can support in general.
