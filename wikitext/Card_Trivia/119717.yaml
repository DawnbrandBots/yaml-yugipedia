  * This monster appears in the artwork of "[[Battle Tuning]]".
  * Despite the numerous times this monster appeared in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh 5D's]]'' manga, its effect was never used.
