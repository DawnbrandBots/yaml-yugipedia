title: Card Trivia:Guard Penguin
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Kastle Siblings]]''.
  * This is the first "[[Penguin]]" monster whose [[Type]] is [[Winged-Beast]].
  ** This is also the second "Penguin" monster whose Type is not [[Aqua]], the first being "[[Bolt Penguin]]", a [[Thunder]] monster.
