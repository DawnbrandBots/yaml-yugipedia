title: Card Trivia:Memory Crush King
wikitext: |-
  {{Navigation}}

  * This card has a [[counterpart]]: "[[Memory Crusher]]".  Both cards inflict damage depending on your opponent's Extra Deck monsters.
  ** Interestingly, while its counterpart has its horns removed in its international artwork, this card did not.
  * This monster appears in the artwork of "[[Memory Loss]]".
