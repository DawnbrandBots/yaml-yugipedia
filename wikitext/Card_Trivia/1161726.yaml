title: Card Trivia:Fairy Tail - Wiccat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fairy Tail Ball]]".
  * This monster is based on the [[wikipedia:Wicked Witch of the West|Wicked Witch of the West]] from the children's novel ''[[wikipedia:The Wonderful Wizard of Oz|The Wonderful Wizard of Oz]]''.
  ** This monster's crystal ball is based on the iconic crystal ball used by the Wicked Witch in the 1939 film adaptation ''[[wikipedia:The Wizard of Oz|The Wizard of Oz]]''.
  ** This monster's name is a portmanteau of the words "Wicked" and "Cat."
