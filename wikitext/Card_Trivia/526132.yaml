title: Card Trivia:World Legacy Whispers
wikitext: |-
  {{Navigation}}

  * Clockwise from center: "[[Imduk the World Chalice Dragon]]", a corrupted "[[Lee the World Chalice Fairy]]", "[[Ningirsu the World Chalice Warrior]]", "[[Auram the World Chalice Blademaster]]", and "[[Mekk-Knight Spectrum Supreme]]" appear in this card's artwork.
  * This card is the third card in a sequence of "[[World Legacy]]" [[Spell]]/[[Trap]] cards that depict "[[Lee the World Chalice Fairy]]" becoming corrupted. In the first card, "[[World Legacy Clash]]", "Lee" can be seen with one device projecting dark red light. The second card, "[[World Legacy Trap Globe]]", depicts the light from two of the devices having turned red. In this card's artwork, the light from three of the four devices appears dark red. Her transformation concludes in "[[World Legacy's Secret]]", where all four devices have been corrupted and "Lee" is depicted in shadow with sinister red facial features.
