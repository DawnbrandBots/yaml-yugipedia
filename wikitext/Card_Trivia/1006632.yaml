  * This card is based on [[wikipedia:Camelot|Camelot]], the castle and court of [[wikipedia:King Arthur|King Arthur]].
  * This is the first card in the ''[[OCG]]''/''[[TCG]]'' to feature an effect where a [[Spell]]/[[Trap Card]] can be temporarily [[banish]]ed from the [[field]].
