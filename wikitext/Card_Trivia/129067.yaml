title: Card Trivia:Matador Archfiend
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster is based on the [[wikipedia:Bullfighter|matador]], a performer in the activity of bullfighting who must avoid being hit by the bull, which is usually a lot stronger than him, and kill it indirectly with daggers.
  ** This monster has red wings, which resemble the matador's iconic red cape or drape, which was used to provoke the bull to attack it.
  ** This monster's effects reflects the role of the matador, as it can [[destroy]] any monster that attacks it and [[negate]]s any [[battle damage]] to this monster's controller. In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster was used in conjunction with "[[Dark Arena (anime)|Dark Arena]]", which forced the opponent's monster to attack this monster, which resulted in their destruction, further referencing this monster's matador theme and the bullfighting theme of [[Titan]]'s [[Warrior]] "[[Archfiend]]" [[Deck]].
  * This is the [[signature card]] of Titan in the ''Yu-Gi-Oh! GX'' anime.
  * This is the final [[Ritual Monster|Ritual Monster]] debuting in the ''Yu-Gi-Oh! GX'' anime to be released in the ''[[OCG]]''/''[[TCG]]''.
  * Despite being unable to attack, this monster still has an attack animation in the ''[[Yu-Gi-Oh! Tag Force]]'' video game series. It can be seen by having its effect negated and ordering it to attack.
