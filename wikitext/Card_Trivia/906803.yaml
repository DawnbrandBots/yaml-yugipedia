title: Card Trivia:Whitefish Salvage
wikitext: |-
  {{Navigation}}

  * This card's Japanese name uses the kanji for "salvation" (救済), but with the reading for "salvage" (サルベージ).
  ** This is reflected in this card's artwork depicting a priest offering "salvation" to the fallen souls in the cemetery, and its effect to "salvage" a [[Fish]] monster in the [[Graveyard]].
