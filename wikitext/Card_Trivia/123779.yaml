title: Card Trivia:Queen's Pawn
wikitext: |-
  {{Navigation}}

  * "[[Amazoness Queen]]" and "[[Amazoness Trainee]]" appear in this card's artwork.
  ** Ironically, this card cannot be used when "Amazoness Trainee" [[destroy]]s a monster by battle, due to its effect to [[return]] the destroyed monster into the [[Deck]] instead of [[send]]ing it to the [[Graveyard]]; however, "Amazoness Trainee" could be the monster being [[Special Summon]]ed by this card's effect.
  * This card's artwork is similar to those of "[[Double-Edged Sword Technique]]" and "[[Order to Smash]]".
