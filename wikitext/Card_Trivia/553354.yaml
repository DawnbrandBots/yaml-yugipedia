title: Card Trivia:Gouki Bearhug
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Bear hug|bear hug]], a technique in [[wikipedia:Professional wrestling|professional wrestling]] which involves wrapping the wrestler's arms around an opponent's torso and squeezing until they submit or lose their breath. Fittingly, this monster's design is based on a [[wikipedia:Bear|bear]].
