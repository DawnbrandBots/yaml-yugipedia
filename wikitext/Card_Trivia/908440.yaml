title: Card Trivia:SolSolfachord Gracia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Solfachord Formal]]" and "[[Solfachord Happiness]]".
  ** This monster's chibi avatar appears in the artworks of "[[Solfachord Harmonia]]" and "[[Solfachord Symphony]]".
  * This monster is based on "''Sol''", the fifth syllable of the [[wikipedia:Solfège|solfège]], which reflects its [[Level]] (5).
  ** "Gracia" starts with the English letter "G", which is based on the [[wikipedia:G (musical note)|fifth musical note]] of the [[wikipedia:C major|C major scale]] in the fixed solfège.
