title: Card Trivia:T.G. Rush Rhino
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[TG1-EM1]]".
  * The letters "BE" in this monster's Japanese anime name (BE-04) references its [[Beast]] [[Type]].
  ** This monster's name and effect reference "[[Rush Recklessly]]", a [[Quick-Play Spell]] that can increase a monster's [[ATK]] during battle, which depicts a Beast monster rushing towards its target. It also references the nature of the [[wikipedia:Rhinoceros|rhinocerous]] to rush at potential threats.
