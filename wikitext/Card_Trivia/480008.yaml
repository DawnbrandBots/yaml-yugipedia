title: Card Trivia:En Winds
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The symbol for a square cap (⊓) appears in this card's artwork.
  ** The square cap is a [[wikipedia:Mathematics|mathematical]] symbol used to indicate the [[wikipedia:Disjoint union|disjoint union]], a binary operator that combines all distinct elements of a pair of given sets, which is reflected by this card's effect relating to [[Synchro Monster]]s, which are the "union" of a [[Tuner monster]] and a non-Tuner monster. Fittingly, this card was also used to create [[Rin's bracelet]], which represents [[Synchro Summon]]ing.
  ** The square cap can also be interpreted as the number ".1", correlating to the "=" in the artwork of "[[En Flowers]]" as part of the mathematical formula for the number [[wikipedia:Pi|pi]].
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this was the card that created [[Rin]] and [[Yugo]] when [[Ray Akaba]] and [[Z-ARC]] separated their personalities.
  * This card's effect to [[negate]] the effects of all Synchro Monsters refers to the fact that it was created to counter "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]" in the anime.
