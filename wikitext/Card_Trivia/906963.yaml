title: Card Trivia:Fairy Tail - Rochka
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Selection 10]]''.
  * This monster appears in the artworks of "[[Fairy Tail Ball]]", "[[Fairy Tale Tails]]", and "[[Weaver of Fairy Tails]]".
  ** This monster's tail appears in the artwork of "[[Tails of the Fairy Tails]]".
  * This monster is based on the Russian fairy tale, ''[[wikipedia:Snegurochka|Snegurochka]]'', also known as "The Snow Maiden".
  ** This monster's effect to make the opponent gain 500 [[Life Point]]s, [[reveal]] the top three cards of their [[Deck]], and make the player choose one card to [[add]] to their [[hand]] is based on the gift exchanges at Christmas, which ''Snegurochka'' has been associated with in Russia.
  ** This monster's effect to allow the player to [[send]] it to the [[Graveyard]] when it battles is based on how Snegurochka's body, which is made of snow, melts or evaporates at the end of the story, either because of flame or because she gained the ability to love.
