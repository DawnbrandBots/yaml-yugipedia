title: Card Trivia:Favorite HERO Shining Flare Wingman
wikitext: |-
  {{Navigation}}

  * "[[Skyscraper]]" appears in the background of this card's artwork.
  * This monster is a [[retrain]]ed "[[Favorite]]" counterpart of "[[Elemental HERO Shining Flare Wingman]]".
  ** Its name is a reference to how [[Jaden Yuki]] called "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" his "favorite card" in the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime, as is the case with all "[[Favorite]]" cards.
  ** Its Summon effect is a reference to strategies Jaden Yuki uses in the ''Yu-Gi-Oh! GX'' anime:
  *** "[[Fifth Hope (anime)|Fifth Hope]]", which [[shuffle]]s five "[[Elemental HERO]]" monsters in [[Graveyard]] into the [[Deck]] to draw two cards (compared to this monster's effect's five monsters in general, which also functions identically to "[[Pot of Avarice]]").
  *** "[[Skyscraper (anime)|Skyscraper]]" and/or "[[Elemental Hero Shining Flare Wingman (anime)|Elemental Hero Shining Flare Wingman]]", the former increasing an "Elemental HERO" monster's [[ATK]] by 1000 when attacking an opponent's monster with a higher ATK, and the latter continuously increasing its ATK for each "Elemental Hero" monster in Graveyard (although "Shining Flare Wingman's" effect boosts its ATK by 300 per monster, compared to this monster's proverbial 200 for each of its five monsters shuffled into the Deck totaling 1000 ATK).
  * This is the first "Elemental HERO" [[Fusion Monster]] released in the ''[[OCG]]/[[TCG]]'' without a [[Nomi|"Must be Fusion Summoned"]] [[condition]] (or similar, in the case of the "[[Neos]]" Fusion Monsters that utilize [[Contact Fusion]]).
