title: Card Trivia:White Ninja
wikitext: |-
  {{Navigation}}

  * This monster is wielding a "[[Fuhma Shuriken]]".
  * This monster has two [[counterpart]]s: "[[Armed Ninja]]" and "[[Crimson Ninja]]".
  ** This is supported by the fact that they are all [[Flip monster]]s and the Japanese names of those monsters translate to "Blue Ninja" and "Red Ninja", respectively. Additionally, they all have "[[Dragon Ninja]]" forms.
  * This monster appears in the artworks of "[[Blind Spot Strike]]" and "[[Barrier Ninjitsu Art of Gathering Shadows]]".
  * This card has a "Dragon Ninja" counterpart: "[[White Dragon Ninja]]". Coincidentally, that monster can be Summoned using this card and "[[Ninjitsu Art of Super-Transformation]]".
