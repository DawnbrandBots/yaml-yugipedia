title: Card Trivia:Blood Sucker
wikitext: |-
  {{Navigation}}

  * This monster shares many similarities with the "[[Vampire]]" [[archetype]], having the same [[Attribute]] ([[DARK]]), [[Type]] ([[Zombie]]), and a [[mill]] [[Monster effect|effect]].
  ** Fittingly, together with "[[Overpowering Eye]]", this monster was used by [[Tilla Mook]], who uses a vampire-themed Deck in the ''[[Yu-Gi-Oh! R]]'' manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|R|004|ref}}, specifically from the panel showing [[Blood Sucker (manga)|this monster]] being Summoned.
