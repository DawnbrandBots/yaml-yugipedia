title: Card Trivia:Void Ogre Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zero Gate of the Void]]".
  * This monster's Japanese name, "Purgatory Dragon - Ogre Dragoon", is based on [[wikipedia:Purgatory|Purgatory]], an afterlife realm in the Christian Catholic religion where the departed souls of sinners must atone for their sins before entering [[wikipedia:Heaven|Heaven]].
  ** This monster shares a common theme with "[[Ascension Sky Dragon]]" and "[[Dragonecro Nethersoul Dragon]]", as the three of them are each associated with an afterlife realm in the in the Christian Catholic religion. This monster is associated with Purgatory, "Dragonecro Nethersoul Dragon" is associated with [[wikipedia:Hell|Hell]], and "Ascension Sky Dragon" is associated with Heaven.
  * This monster is the [[Yu-Gi-Oh! 5D's (manga)|manga]] counterpart to "[[Infernity Doom Dragon]]" and "[[Hundred Eyes Dragon]]" in the [[Yu-Gi-Oh! 5D's|anime]].
  ** All three monsters are [[Kalin Kessler]]'s [[signature card]]s in their various continuities.
  ** All three monsters require a [[DARK]] [[Tuner monster]], feature demonic motifs, and share an [[original ATK]] of 3000.
  * This is the first [[Duel Dragon]] to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This card resembles "[[Red-Eyes Black Dragon]]".
  * This card's pose resembles "[[Zera the Mant]]" and "[[Ryu-Kishin Powered]]".
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|5D's|019|ref}}, specifically from the panel showing [[Void Ogre Dragon (manga)|this monster]] being Summoned.
