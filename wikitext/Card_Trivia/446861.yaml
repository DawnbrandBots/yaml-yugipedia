title: Card Trivia:ABC-Dragon Buster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[A-to-Z Energy Load]]".
  * This monster can be seen as a modern [[counterpart]] of "[[XYZ-Dragon Cannon]]".
  * This monster shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (8), [[Type]] ([[Machine]]), [[original ATK and DEF]] (3000/2800) and similar effects with "[[VWXYZ-Dragon Catapult Cannon]]".
  * This monster is a physical amalgam of "[[A-Assault Core]]", "[[B-Buster Drake]]", and "[[C-Crush Wyvern]]", being comprised of Fusion Monsters formed from those three monsters as its Fusion Materials.
  ** "A-Assault Core": Its body and tail acts as the base for this monster.
  ** "B-Buster Drake": Its body makes up the left side of "A-Assault Core's" weaponized tail-like cannon. Additionally, one of "B-Buster Drake's" two cannons attached to "C-Crush Wyvern" and the  wings of "B-Buster Drake" are attached to both sides of "A-Assault Core".
  ** "C-Crush Wyvern": Its body makes up the right side of the weaponized tail-like cannon of "A-Assault Core". Additionally, one of the rocket launcher wings of "C-Crush Wyvern" is attached to "B-Buster Drake".
