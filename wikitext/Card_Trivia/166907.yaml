title: Card Trivia:Phoenix Beast Gairuda
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Change to Jet Iron]]", "[[Galaxy Queen's Light]]", and "[[Wings of Unity]]".
  * This monster is based on a [[wikipedia:Phoenix|phoenix]], a mythological bird associated with fire, immortality, and rebirth. Fittingly, the background of this card's artwork features flames.
  ** This monster's name is derived from [[wikipedia:Garuda|Garuda]], a divine eagle-like being in [[Wikipedia:Buddhist mythology|Buddhist]] and [[wikipedia:Hindu mythology|Hindu mythology]], who is depicted as the mount of the Hindu god [[wikipedia:Vishnu|Vishnu]].
