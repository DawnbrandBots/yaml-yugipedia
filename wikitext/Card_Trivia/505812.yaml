title: Card Trivia:Genin
wikitext: |-
  {{Navigation}}

  * This monster's international name is based on the Japanese word for "public performer", which reflects its [[flavor text]].
  * This monster's appearance is based on the protagonist of the 1997 Japanese role-playing game, ''[[Wikipedia:Moon: Remix RPG Adventure|Moon: Remix RPG Adventure]]''.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's [[Type]] is [[List of Comic monsters|Comic]], allowing it to gain a power bonus from the [[Toon (terrain)|Toon terrain]].
