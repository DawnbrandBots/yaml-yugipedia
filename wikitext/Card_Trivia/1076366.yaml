title: Card Trivia:Red-Eyes Moon Dragon
wikitext: |-
  {{Navigation}}

  [[File:Blue-Eyes in the commercial.png|thumb|300px|"[[Blue-Eyes White Dragon]]" in the commercial for ''[[Structure Deck: The Blue-Eyed Dragon's Thundering Descent]]''.]]

  * This monster is a downgraded [[Effect Monster]] [[counterpart]] of "[[Red-Eyes Black Dragon (Rush Duel)|Red-Eyes Black Dragon]]".
  ** This monster is named after the [[wikipedia:Moon|Moon]], the natural satellite of the [[wikipedia:Earth|Earth]] primarily seen at night.
  *** This monster's name is also based on the [[Guardian Star]] Moon, which is the first Guardian Star of "[[Red-eyes B. Dragon (FMR)|Red-Eyes Black Dragon]]", "[[Summoned Skull (FMR)|Summoned Skull]]", and "[[B. Skull Dragon (FMR)|Black Skull Dragon]]" in ''[[Yu-Gi-Oh! Forbidden Memories]]'', and the equivalent of the [[Fiend (Alignment)|Fiend]] [[Alignment]] in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series.
  * This card's artwork is based on a scene from the commercial for ''[[Structure Deck: The Blue-Eyed Dragon's Thundering Descent]]'', that depicts "[[Blue-Eyes White Dragon]]" standing on the edge of a cliff in a similar pose with the Moon in a mirrored upside-down [[wikipedia:Crescent|crescent]] [[wikipedia:Lunar phase|phase]] in the background.
