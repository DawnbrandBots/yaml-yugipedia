title: Card Trivia:White Magician's Defensive Spell
wikitext: |-
  {{Navigation}}

  * This Skill references an ability used by [[Bakura (MW)|White Wizard Bakura]] in the ''[[Monster World]]'' tabletop RPG to lower [[Dark Master Zorc]]'s defenses. Its effect being more powerful the lower the player's roll reflects the mechanics of ''Monster World'', where rolling lower numbers yields better results.
