title: Card Trivia:Sprind the Irondash Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Springans Blast!]]".
  ** The silhouette of this monster's head also appears inside one of the ice spikes in the artworks of "[[Mirrorjade the Iceblade Dragon]]" and "[[Branded Sword]]".
  ** Pieces of this monster appear in the artwork of "[[Tribe Drive]]".
  * "[[Fallen of Albaz]]" and "[[Incredible Ecclesia, the Virtuous]]" appear in this card's artwork.
  * This monster is a "[[Springans]]"-oriented [[Fusion Monster]] form of "Fallen of Albaz".
  ** The kanji ''Tekku'' (鉄駆, lit. "Irondash") in this card's Japanese name is a homophone of "tech" (テック ''Tekku''), which is an abbreviation of "technology", referencing this monster's mechanical appearance.
  ** This monster's name, "Sprind", and [[Machine]] [[Type]] are a reference to the "Springans" monsters, but its dark color scheme and the blue aura emanating from its eyes are similar to the weapons of the "[[Tri-Brigade]]" monsters. This could imply that this monster was built by "[[Tri-Brigade Kitt]]", who has [[Springans Kitt|ties]] to the "Springans" monsters.
  ** This was the first [[Albaz Dragon]] to not be a transformation of "Fallen of Albaz", being an aircraft piloted by him instead.
  * This monster has a combined form with "[[Tri-Brigade Bearbrumm the Rampant Rampager]]": "[[Rindbrumm the Striking Dragon]]".
  * This monster shares a part of its name with "[[Spright Sprind]]", which was created using scraps from this monster as depicted in "[[Tribe Drive]]".
