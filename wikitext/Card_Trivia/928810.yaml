title: Card Trivia:Service Ace
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is a reference to an [[wikipedia:Ace (tennis)|ace]], a term used in tennis where the serve isn't touched by the receiver and wins the server the point.
  ** This card's effect of inflicting 1500 damage to the opponent is a reference to the scoring system in tennis where the receiver scores 15 points.
