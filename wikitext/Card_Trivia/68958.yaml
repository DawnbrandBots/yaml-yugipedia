title: Card Trivia:Blue Thunder T-45
wikitext: |-
  {{Navigation}}

  * Like the [[Gradius]] series, [[Konami]] has based this card off the arcade game, ''[[wikipedia:Thunder Cross (arcade game)|Thunder Cross]]''. In the game, the ship used by the player is named "Blue Thunder M-45".
  * Also, this card's artwork is a replica of the [http://www.game-ost.com/static/covers_soundtracks/2546_6968.jpg original Thunder Cross arcade poster.]
  * This card's options, unlike those of "[[Victory Viper XX03]]", have the ability to exist without "Blue Thunder" remaining on the field. This is perhaps a nod at the fact that in ''Thunder Cross'', the Blue Thunder's options kept formation and were controllable by the player.
