title: Card Trivia:Element Magician
wikitext: |-
  {{Navigation}}

  * The members of the [[Element]] series always depict the monsters' color scheme and respective card artworks to correspond with the [[Attribute]]s they gain their effects from; in this case of this monster, it is [[WATER]] and [[WIND]].
  ** This monster's color scheme features blue-colored hair and eyes (WATER), and green-colored clothing (WIND).
  ** The background of this card's artwork depicts a vast body of water (WATER) underneath a cloudy sky (WIND).
