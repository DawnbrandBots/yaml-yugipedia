title: Card Trivia:Fake Feather
wikitext: |-
  {{Navigation}}

  * "[[Blackwing - Gale the Whirlwind]]" and the card "[[Graverobber]]" appears in this card's artwork.
  ** This is a reference to how discarding "Blackwing - Gale the Whirlwind" will allow the player to activate the effect of "Graverobber".
  ** This card's effect is also similar to "Graverobber", which also allows the player to activate the effect of an opponent's [[Trap Card]] in their [[Graveyard]] in the anime.
  *** Both cards were used respectively by [[Crow Hogan]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime and [[Joey Wheeler]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, both of whom share similar roles in their respective series.
