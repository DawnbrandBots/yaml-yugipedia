title: Card Trivia:Alchemy Beast - Salamandra the Steel
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is based on [[wikipedia:Iron|iron]], one of the seven planetary metals used in alchemy.
  ** This monster's international name is based on [[wikipedia:steel|steel]], a metallic alloy that primarily consists of iron and other metals.
  * This monster is based on the [[wikipedia:Salamander|salamander]], a lizard often associated with the classic element of fire in alchemy.
