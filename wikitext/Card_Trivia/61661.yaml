title: Card Trivia:Axe Dragonute
wikitext: |-
  {{Navigation}}

  * This monster has a counterpart: "[[Lancer Dragonute]]".
  ** Both monsters are based on a "dragonewt", a race of humanoid dragons in mythology.
  ** Both monsters are used by [[Willa Mette]] in the ''[[Yu-Gi-Oh! R]]'' manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|R|014|ref}}, specifically from the panel showing [[Axe Dragonute (manga)|this monster]] being Summoned.
