title: Card Trivia:Kabuki Stage - Big Bridge
wikitext: |-
  {{Navigation}}

  * Possibly, and judging by its colours, the artwork of this card is based on Vincent van Gogh's Japonaiserie "''The Bridge in the Rain (after Hiroshige)''", which in turn was a copy of Utagawa Hiroshige's "''Sudden Shower over Shin-Ōhashi bridge and Atake''" (''大はしあたけの夕立, Ōhashi atake no yūdachi'').
