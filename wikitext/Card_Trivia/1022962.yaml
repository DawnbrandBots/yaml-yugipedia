title: Card Trivia:Lancea, Ancestral Dragon of the Ice Mountain
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Terminal World (set)|Terminal World]]''.

  * This monster is the original form of "[[Brionac, Dragon of the Ice Barrier]]", "[[Gungnir, Dragon of the Ice Barrier]]" and "[[Trishula, Dragon of the Ice Barrier]]", with it splitting into the three after being sliced apart by "[[Georgius, Swordman of the Ice Barrier]]".
