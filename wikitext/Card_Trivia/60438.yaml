title: Card Trivia:Jetroid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Emergeroid Call]]" and "[[March of the Roids]]".
  * This monster is based on a [[wikipedia:Fighter aircraft|jet fighter aircraft]], a military aerial vehicle used in aerial combat.
  ** Fittingly, this monster's effect reflects the jet fighter aircraft's maneuverability, as it allows the player to "maneuver" around an opponent's attack by activating a [[Trap Card]] from their [[hand]].
