title: Card Trivia:Printing Presser
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Major Breaking News!]]" and "[[Reprinter]]".
  * This monster's Japanese name, "Toughroid" (タフロイド, ''Tafuroido''), sounds similar to "tabloid", a newspaper dominated by headlines, photographs, and sensational stories.
  * This monster has a retrained [[counterpart]]: "[[Premium Printing Presser]]".
