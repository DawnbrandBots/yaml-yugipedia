title: Card Trivia:Performapal Sky Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dueltaining]]", "[[Fleeting Flower of the Magician]]", and "[[Sky Illusion]]".
  ** This monster's Chinese linking rings appear in the artwork of "[[Performapal Sky Ring]]".
  * This monster has a female [[counterpart]]: "[[Performapal Sky Magician Girl]]".
  * This is the [[signature card]] of [[Yusho Sakaki]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, and his primary method to move around during an [[Action Duel]].
  ** This monster shares the same [[Level]] (7) and [[original ATK and DEF]] (2500/2000) as "[[Odd-Eyes Pendulum Dragon]]", the signature card of Yusho's son, [[Yuya Sakaki]].
  ** Despite its numerous appearances in the anime, this monster's stats, effects, and status as part of the "[[Performapal]]" [[archetype]] were not revealed until {{episode|ARC-V|132|ref}}.
