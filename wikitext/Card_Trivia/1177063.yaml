title: Card Trivia:Synchro Emergency
wikitext: |-
  {{Navigation}}

  [[File:Synchro Warriors.png|thumb|right|The scene from ''[[Road to Tomorrow ~Going My Way!!~]]'' depicting [[Yusei Fudo]] alongside his [[Warrior]] [[Synchro Monster]]s]]

  * "[[Junk Destroyer]]", "[[Junk Warrior]]", "[[Nitro Warrior]]", "[[Road Warrior]]", and "[[Turbo Warrior]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from ''[[Road to Tomorrow ~Going My Way!!~]]'', the final opening theme of the ''[[Yu-Gi-Oh! 5D's]]'' anime, showing [[Yusei Fudo]] along with his aforementioned [[Synchro Monster]]s.
  * This card's name and effect to [[Synchro Summon]] a Synchro Monster is a reference to "[[Urgent Tuning]]", a [[Trap Card]] used by Yusei Fudo in the ''Yu-Gi-Oh! 5D's'' anime that allows the player to Synchro Summon a Synchro Monster during the [[Battle Phase]], whereas the base Japanese word for "Urgent" (緊急, ''Kinkyū'') can also be translated as "emergency".

