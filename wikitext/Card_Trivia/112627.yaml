title: Card Trivia:Chaos King Archfiend
wikitext: |-
  {{Navigation}}

  * This card along with "[[Drill Synchron]]", "[[Drill Warrior]]", "[[Splendid Rose]]", "[[Bird of Roses]]", and "[[Morphtronic Vacuumen]]" were made into anime cards as a result of a drawing competition, as seen in the preview of episodes [[Yu-Gi-Oh! 5D's - Episode 074|74]], [[Yu-Gi-Oh! 5D's - Episode 075|75]], [[Yu-Gi-Oh! 5D's - Episode 076|76]], [[Yu-Gi-Oh! 5D's - Episode 077|77]] and [[Yu-Gi-Oh! 5D's - Episode 078|78]].
  * This card's effect is similar to that of "[[Shield & Sword]]".
  ** This card's ATK and DEF are the same, reflecting positively on the ability since it switches the ATK and DEF of all face-up monsters your opponent controls.
