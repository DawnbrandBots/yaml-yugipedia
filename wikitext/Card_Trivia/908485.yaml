title: Card Trivia:Libromancer Fireburst
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2022]]''.
  * This monster appears in the artwork of "[[Libromancer Origin Story]]".
  * This monster appears to be a fusion of "[[Libromancer Geek Boy]]" and "[[Libromancer Fire]]".
  ** It being a Level 7 makes it equal to the sum of their respective levels of 3 and 4.
  ** Its formation may be depicted in "[[Libromancer Bonded]]".
  ** This monster and its aggregations may be a reference to the [[wikipedia:DC Comics|DC Comics]] superhero [[wikipedia:Firestorm (character)|Firestorm]], a nuclear-powered superhero created from the fusion of football star [[wikipedia:Ronnie Raymond|Ronnie Raymond]] and nuclear physicist [[wikipedia:Martin Stein|Martin Stein]], a jock and a geek just like "Libromancer Fire" and "Libromancer Geek Boy".
