title: Card Trivia:Soul Arms - Avalonia Holder
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's name references [[wikipedia:Avalon|Avalon]], the birthplace of the mythical sword [[wikipedia:Excalibur|Excalibur]] in [[wikipedia:Arthurian legend|Arthurian legend]].
  ** This is further reflected with this card's effect serving as [[support]] for "[[Heavy Arms - Double Nexcalibur]]", which also serves as a reference to Excalibur.
