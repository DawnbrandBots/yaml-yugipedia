title: Card Trivia:Purrelyeap!?
wikitext: |-
  {{Navigation}}

  * "[[Purrely (card)|Purrely]]" appears in this card's artwork, transforming into "[[Epurrely Happiness]]".
  * This card's name is a portmanteau of "Purrely" and "leap".
  * The exclamation and question marks on the Japanese copies of this card and "[[Purrely Sharely!?]]" are strangely printed in a different font. This font is reserved for Latin letters and Arabic numerals, and only for these two marks if all other characters are Latin letters, such as the case of "[[Rescue-ACE]]" cards (for example, "[[ALERT!]]"), and not the case of the aforementioned "Purrely" cards.
