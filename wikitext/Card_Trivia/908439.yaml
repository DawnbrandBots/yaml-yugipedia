title: Card Trivia:Choju of the Trillion Hands
wikitext: |-
  {{Navigation}}

  * This monster is a combined [[retrained]] counterpart of "[[Senju of the Thousand Hands]]" and "[[Manju of the Ten Thousand Hands]]".
  ** "Choju" is the Japanese word for "1 trillion hands".
  *** However, despite this, this monster is depicted with only 45 visible hands.
  *** While it is logical for the upgrade of ''Sen'' (千, 1,000) and ''Man'' (万, 10,000) would be ''Oku'' (億, 100,000,000), this monster's name went straight to ''Cho'' (兆, 1,000,000,000,000) instead.
