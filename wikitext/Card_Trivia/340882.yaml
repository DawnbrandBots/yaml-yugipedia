title: Card Trivia:Aria the Melodious Diva
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Melodious Concerto]]" and "[[Melodious Illusion]]".
  * A [[wikipedia:bass clef|bass clef]] and an [[wikipedia:eighth note|eighth note]] appear in this card's artwork.
  * This monster is based on an [[wikipedia:aria|aria]], a piece performed by a lone singer, primarily without orchestral accompaniment.
  ** This is in contrast to "[[Sonata the Melodious Diva]]", a monster based on a [[wikipedia:sonata|sonata]], a piece played with no vocal accompaniment. Fittingly, both monsters debuted in {{episode|ARC-V|002|ref}}.
