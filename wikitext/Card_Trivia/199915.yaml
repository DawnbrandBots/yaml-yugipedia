title: Card Trivia:Samsara Dragon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this monster could [[Special Summon]] "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]" from the [[Graveyard]]. In the ''[[OCG]]''/''[[TCG]]'', this monster's effect was changed to [[add]] a [[Level 5]] or higher [[Dragon]] from the [[Graveyard]] to the [[hand]] and immediately [[Tribute Summon]] it due to the ''OCG''/''TCG'' effect of "[[Light and Darkness Dragon]]" preventing it from being Special Summoned.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|GX|062|ref}}, specifically from the panel showing [[Samsara Dragon (manga)|this monster]] being Summoned.
