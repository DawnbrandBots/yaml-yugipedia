title: Card Trivia:Altergeist Malwisp
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Malware|malware]]" and "[[wikipedia:Will-o'-the-Wisp|will-o'-the-wisp]]".
  ** A will-o'-the-wisp is an atmospheric ghost light figure who leads people astray at nighttime or in the fog, causing them to lose their way and end up in a swamp.
  ** "Malware" is the term for any computing software specifically designed to disrupt, damage, or gain unauthorized access to a computer system.
