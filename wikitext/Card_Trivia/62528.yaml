title: Card Trivia:Dimension Fusion Destruction
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Sacred Beasts of Chaos Sacred Beasts Unleashed Pack]]''.
  * "[[Armityle the Chaos Phantasm]]", "[[Hamon, Lord of Striking Thunder]]", "[[Raviel, Lord of Phantasms]]", and "[[Uria, Lord of Searing Flames]]" appear in this card's artwork.
  * This card's anime effect had been adapted in the ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] of "Armityle the Chaos Phantasm". To account for this, it was buffed when released in the ''OCG''/''TCG''.
