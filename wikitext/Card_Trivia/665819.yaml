title: Card Trivia:Gagagaga Magician
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] counterpart of "[[Gagaga Magician]]".
  * The golden Oriental dragon design on this monster’s cape resembles "[[Number 100: Numeron Dragon]]".
  * This monster's bulleted effect to make a "[[Utopic Future]]" Xyz Monster's [[ATK]] become 4000 is based on a scene in {{episode|ZEXAL|146|ref}} where [[Yuma Tsukumo]] uses the effect of "[[Memories of Courage]]" to increase the ATK of "[[Number F0: Utopic Future (anime)| Utopic Future]]" by 500 for every "[[Number]]" monster in each player's [[Graveyard]] until the end of the turn. At the time, there were 8 "Number" monsters; therefore, its ATK is increased from 0 to 4000.
  ** This monster's bulleted effect allows the player to [[detach]] two [[material]]s from that "Utopic Future" Xyz Monster and [[negate]] its effects, referencing how in that scene, Yuma [[activate]]d "[[Hi-Five the Sky (anime)|Hi-Five the Sky]]" to negate the effects of "Utopic Future" (who did not have any [[Xyz Material]]s) before he activated "Memories of Courage".
  ** The bulleted effect of "[[Gagagaga Girl]]" was designed to work in conjunction with this monster's, allowing that "Utopic Future" Xyz Monster to also make a second attack, referencing how the final effect of "Memories of Courage" allowed "Number F0: Utopic Future" to make a second attack as it had not inflicted [[battle damage]] to [[Astral]].
