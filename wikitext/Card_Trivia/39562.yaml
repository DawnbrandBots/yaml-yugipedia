title: Card Trivia:Umiiruka
wikitext: |-
  {{Navigation}}

  * This card has [[counterpart]]s for other [[Attribute]]s:
  ** "[[Gaia Power]]" for [[EARTH]].
  ** "[[Luminous Spark]]" for [[LIGHT]].
  ** "[[Molten Destruction]]" for [[FIRE]].
  ** "[[Mystic Plasma Zone]]" for [[DARK]].
  ** "[[Rising Air Current]]" for [[WIND]].
  * This card's ''[[TCG]]'' name is a combination of the Japanese words "''umi''" (海) which means "sea" and "''iruka''" (海豚) which means "dolphin", reflected by the dolphin in this card's artwork.
