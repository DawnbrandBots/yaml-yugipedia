title: Card Trivia:Exile of the Wicked
wikitext: |-
  {{Navigation}}

  * This card is based on an [[wikipedia:exorcism|exorcism]], the spiritual practice of removing evil spirits or demons from a place or person's body.
  * This card has several [[counterpart]]s that destroy a specific [[Type]] of [[monster]]:
  ** [[Fish]]: "[[Eternal Drought]]"
  ** [[Insect]]: "[[Eradicating Aerosol]]"
  ** [[Machine]]: "[[Acid Rain]]"
  ** [[Rock]]: "[[Breath of Light]]"
  ** [[Spellcaster]]: "[[Last Day of Witch]]"
  ** [[Warrior]]: "[[Warrior Elimination]]"
