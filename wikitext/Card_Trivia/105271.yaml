title: Card Trivia:The Fabled Catsith
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Obedience Schooled]]".
  * This monster is based on the ''[[wikipedia:Cat-sìth|cat-sìth]]'', a fairy creature from [[wikipedia:Celtic mythology|Celtic mythology]].
  * The imp-like creature in this card's artwork also appears in the artwork of "[[Fabled Leviathan]]".
  ** This creature's name is Heresy, as pointed out in the [[Duel Terminal Master Guide card storylines|''Duel Terminal Master Guide'' card storylines]].
