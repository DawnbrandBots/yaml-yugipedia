title: Card Trivia:Psiics, Moonlight of the Ghoti
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Keaf, Murk of the Ghoti]]".
  * "Keaf, Murk of the Ghoti" and "[[Paces, Light of the Ghoti]]" appear in this card's artwork.
  ** "Keaf" is connected to this monster through a long filament.
  *** This is based on the [[wikipedia:Anglerfish|anglerfish]], which uses a growth of flesh resembling a prey animal (the "esca") attached to the end of a modified dorsal fin spine (the "illicium") to lure in its own prey.
  * This monster's name is an anagram for ''[[wiktionary:piscis|piscis]]'', the Latin word for "fish".
