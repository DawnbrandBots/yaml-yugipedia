title: Card Trivia:Mythical Beast Cerberus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magical Blast]]".
  * This monster is named after [[wikipedia:Cerberus|Cerberus]], the three-headed dog of the underworld in Greek mythology.
  ** However, this monster has two heads instead of three (though depending on the story, Cerberus could have as little as one head or as many as 50).
  ** The fact that this monster's heads are from different animals also makes it similar to the mythological [[wikipedia:Chimera (mythology)|Chimera]].
  * This monster has an upgraded form: "[[Mythical Beast Master Cerberus]]".
  ** This monster's right head is the same as "[[Mythical Beast Jackal]]", while its left head is the same as "Master Cerberus".
