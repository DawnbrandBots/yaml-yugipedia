title: Card Trivia:Solar Wind Jammer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Hologram Projection]]" and "[[Tannhauser Gate]]".
  * This monster's name is a play on "[[wikipedia:Solar wind|solar wind]]" (a stream of charged particles from the Sun's upper atmosphere) and "[[wikipedia:Windjammer|windjammer]]" (a commercial sailing ship with multiple masts).
  ** This monster is also based off the concept of a [[wikipedia:Solar sail|solar sail]], a form of spacecraft propulsion that uses the powerful electromagnetic emissions of the Sun to push a spaceship, similar to a regular sail of a ship of Earth.
