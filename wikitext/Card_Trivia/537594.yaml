title: Card Trivia:Crass Clown
wikitext: |-
  {{Navigation}}

  * This monster's English name is a pun on the term "[[wiktionary:class clown|class clown]]".
  * This monster has a [[Zombie counterpart]]: "[[Clown Zombie]]".
  * This monster's effect is the opposite to that of "[[Dream Clown]]".
  * This card's Spanish print in ''[[Metal Raiders]]'' features a typo on the word "owner", as it had an extra diacritical mark ("''propiet'''á'''rio''" instead of "''propiet'''a'''rio''").
