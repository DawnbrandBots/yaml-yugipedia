title: Card Trivia:Drytron Zeta Aldhibah
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Drytron Fafnir]]" and "[[Drytron Asterism]]".
  * This monster's name is based on [[wikipedia:Zeta Draconis|Aldhibah]], the binary star system located in the northern constellation of [[wikipedia:Draco (constellation)|Draco]], which is also designated as "Zeta Draconis".
