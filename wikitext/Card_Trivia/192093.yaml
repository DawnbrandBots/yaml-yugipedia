title: Card Trivia:Gishki Psychelone
wikitext: |-
  {{Navigation}}

  * "[[Gishki Aquamirror]]" appears in this card's artwork, located at the tip of this monster's staff.
  * This monster appears in the artwork of "[[Constellar Meteor]]".
  * This monster's name is a portmanteau of the words "[[wikipedia:psyche|psyche]]" and "[[wikipedia:Aspidochelone|aspidochelone]]".
  ** This is supported by the similar portmanteaus used for other "[[Evigishki]]" monsters, such as:
  *** "[[Evigishki Levianima]]", which uses the words "[[wikipedia:Anima|anima]]" and "[[wikipedia:Leviathan|Leviathan]]".
  *** "[[Evigishki Merrowgeist]]", which uses the words "''[[wikipedia:geist|geist]]''" and "[[wikipedia:Merrow|merrow]]".
  * This monster is "[[Gishki Noellia]]" infected by the "[[Evilswarm]]" virus, as depicted in the artwork of "[[Creeping Darkness]]"; however, compared to other infected monsters, "Gishki Noellia" is not completely corrupted by the virus, as her name remains unchanged.
  ** The symbol of the "Evilswarm" [[archetype]] can be seen on the chair-like structure that this monster is sitting on, the center of the corrupted "Gishki Aquamirror" on top of her staff, and faintly on her torso.
  * This is the first "[[Gishki]]" [[Ritual Monster]] whose [[Type]] is not [[Aqua]], instead being a [[Fiend]].
  * This monster and "[[Gishki Zielgigas]]" are the only "Gishki" Ritual Monsters whose names do not feature the prefix "Evi-"; however, this is due to a misprinting, as both monsters have "Evi-" (イビ-) in their Japanese names.
