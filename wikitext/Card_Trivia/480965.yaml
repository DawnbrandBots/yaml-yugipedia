title: Card Trivia:Zoodiac Hammerkong
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] appears in the artwork of "[[Zoodiac Gathering]]".
  * This monster represents the sign of the [[wikipedia:Monkey (zodiac)|Monkey]] in the [[wikipedia:Chinese zodiac|Chinese zodiac]].
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018505110754426944 Bilibili] and [https://weibo.com/7406309913/5119123443419793 Weibo] at 4:00 PM (China Standard Time) on January 4, 2025, which was the fourth quarter of the Shen hour in the traditional Chinese timekeeping system.
