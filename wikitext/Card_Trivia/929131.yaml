title: Card Trivia:Shield Boring Kong
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Three Cavalteers]]".
  ** This monster also appears as a component of the armor featured in the artwork of "[[Bizarrmor]]".
  * "[[Apocalypse - Beast Gear World]]" appears in this card's artwork.
  * This monster is based on both a [[wikipedia:Tunnelling shield|shield machine]] and a [[wikipedia:Boring (manufacturing)|boring machine]].
