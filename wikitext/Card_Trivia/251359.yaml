title: Card Trivia:Fire King Avatar Barong
wikitext: |-
  {{Navigation}}

  * This monster is featured in the artwork of "[[High Tide on Fire Island]]".
  ** A fiery form of this monster appears in the artwork of "[[Echelon of the Fire Kings]]".
  * This monster is based on [[wikipedia:Barong (mythology)|Barong]], a mythological lion-like creature in [[wikipedia:Balinese mythology|Balinese mythology]].
  * This card is one of the first two cards released as a [[Rare]] in a [[Structure Deck]].
