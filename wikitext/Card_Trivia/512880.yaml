title: Card Trivia:Spiritual Water Art - Aoi
wikitext: |-
  {{Navigation}}

  * "[[Eria the Water Charmer]]" appears in this card's artwork.
  * "Aoi" is Japanese for a type of plant known as a "Hollyhock." A flower is seen attached to the staff of "Eria the Water Charmer" in this card's artwork.
  ** Although the "aoi" in this card's name (葵) bears a passing resemblance to the "ao" referring to the color blue (青), it is completely unrelated.
