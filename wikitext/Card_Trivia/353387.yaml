title: Card Trivia:Performapal Trampolynx
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Performapal Dramatic Theater]]", and "[[Performapal Popperup]]".
  ** A coloured outline of this monster appears in the artwork of "[[Performapal Duelist Extraordinaire]]".
  * This card's name, "Trampolynx", is a portmanteau of "[[wikipedia:Trampoline|Trampoline]]" and "Lynx".
  ** This is reflected in this card's effect of [[return]]ing a card in either player's [[Pendulum Zone]] to the [[hand]].
