title: Card Trivia:Vanity's Emptiness
wikitext: |-
  {{Navigation}}

  * The English title of this card is a double entendre: the word 'vanity' comes from the Latin root "vanus", meaning 'empty'.
  * "[[Vanity's Fiend]]" and similar-looking symbols from the artwork of "[[Vanity's Call]]" appears in this card's artwork.
  * This card appears in the artwork of "[[Arrow Break]]".
