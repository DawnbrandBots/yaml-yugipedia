title: Card Trivia:Drytron Meteonis DA Draconids
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Meteoroa Drytron]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Drytron Meteonis Draconids]]"
  ** This monster is named after the [[wikipedia:Draconids|Draconids]], a meteor shower that seemingly originates from the northern constellation of [[wikipedia:Draco (constellation)|Draco]].
  ** This monster is also named after DAD, the code terminology for the December Alpha Draconids meteor shower, which was discovered in 2010 by SonataCo, a Japanese video meteor network.
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) and [[original DEF]] (5000, tied with [[5000 DEF Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
