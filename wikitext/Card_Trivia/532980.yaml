title: Card Trivia:Datacorn
wikitext: |-
  {{Navigation}}

  * This card's English name is a portmanteau of the words "data" and "acorn".
  * This card's Japanese name is a pun on ドングリ (''donguri'' "[[wikipedia:Acorn|acorn]]") and ドングル (''donguru'' "[[wikipedia:Dongle|dongle]]"), which have very similar pronunciations in Japanese.
