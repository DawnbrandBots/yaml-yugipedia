title: Card Trivia:Madolche Puddingcess
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Madolche Lesson]]", "[[Madolche Nights]]", "[[Madolche Salon]]", "[[Madolche Tea Break]]", "[[Madolche Waltz]]", and "[[Madolchepalooza]]".
  * This monster's name is a portmanteau of "[[wikipedia:Pudding|pudding]]" and "princess".
  ** This monster's name is based on pudding, a flavored custard-like dessert consisting of milk, sugar, and thickening agents like egg yolks or corn starch.
  *** A variation of dessert pudding includes a cake-like consistency with dried fruit, which this monster's jigsaw puzzle-piece platform is based on. Fittingly, the design of this monster's dress is based on custard pudding, while its jigsaw puzzle-piece platform is based on cake-like pudding.
  ** This monster's name is also a pun on the Japanese pronunciation of "princess" (''purincessu''), as ''purin'' is the Japanese word for "pudding".
  * This monster has an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form: "[[Madolche Puddingcess Chocolat-a-la-Mode]]".
  * This monster is likely the daughter of "[[Madolche Queen Tiaramisu]]", given how their naming schemes are puns on the royal titles of "queen" and "princess".
