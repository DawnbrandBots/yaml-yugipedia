title: Card Trivia:Morphtronic Earfon
wikitext: |-
  {{Navigation}}

  * This monster is based on wireless earphones.
  * This monster bears a resemblance to [[Leo]] and [[Luna]]; the former uses a "[[Morphtronic]]" Deck in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This card is the first "Morphtronic" [[Synchro Monster]].
  * This card has the same Level (4) and the inverse ATK/DEF, of "[[Armory Arm]]", another [[Machine]] Synchro Monster with the ability to equip itself to a monster, and which was used by [[Yusei Fudo]] in ''Yu-Gi-Oh! 5D's''.
