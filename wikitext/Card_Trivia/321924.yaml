title: Card Trivia:Ritual Beast Tamer Lara
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from レラ ''réra'', the [[wikipedia:Ainu language|Ainu]] word for "wind".
  * This monster appears in the artworks of "[[Ritual Beast's Bond]]", "[[Ritual Beast Inheritance]]", and "[[Ultimate Providence]]".
  * "[[Ritual Beast Ulti-Apelio]]" is the [[Fusion Monster|Fusion]] between this monster and "[[Spiritual Beast Apelio]]".
  * "[[Ritual Beast Ulti-Gaiapelio]]" is the Fusion between this monster, "Spiritual Beast Apelio", and "[[Naturia Gaiastrio]]".
  * "[[Spiritual Beast Tamer Lara]]" is this card's upgraded form.
