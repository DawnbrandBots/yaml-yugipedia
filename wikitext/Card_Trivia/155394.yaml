title: Card Trivia:Trap Pause
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Skill Drain]]" and "[[Royal Oppression]]" appear in this card's artwork, depicted turning to stone.
  ** Both cards are [[Continuous Trap Cards]] that requires the players to pay [[Life Point]]s for a cost and [[negate]]s the effects of a monster(s) on the [[field]].
