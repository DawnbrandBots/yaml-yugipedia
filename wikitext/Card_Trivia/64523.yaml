title: Card Trivia:Shadow Ghoul
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Return of the Zombies]]".
  * This card has a [[retrained]] counterpart: "[[Shadow Ghoul of the Labyrinth]]".
  * This card is one of several cards that lack a [[passcode]].
  * The [[Shadow Ghoul (Bandai)|Bandai]] version of this card has 2000 [[ATK]] & 1400 [[DEF]], whereas the Konami version has 1600 [[ATK]]/ [[DEF]]. Moreover, the Bandai version is violet, while the Konami version is green.
  * This card's Bandai artwork is taken from {{chapter|Yu-Gi-Oh!|093|ref}}, specifically from the panel showing [[Wall Shadow (manga)|this monster (fused with "Labyrinth Wall")]] emerging to attack "[[Beaver Warrior (manga)|Beaver Warrior]]".
  * In a 40-card Deck consisting of only monsters, this card's maximum ATK (by its own effect) will be 5500 if all other monsters are in the Graveyard, or 7000 ATK if all monsters in the Extra Deck are in the Graveyard as well.
  ** In a 60-card Deck, its maximum ATK will be 7500, or 9000 if counting the Extra Deck.
