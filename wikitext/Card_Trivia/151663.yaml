title: Card Trivia:Tyr of the Nordic Champions
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Týr|Týr]], the Nordic god of war in [[wikipedia:Norse mythology|Norse mythology]] whose right hand was bitten off by the wolf creature, [[wikipedia:Fenrir|Fenrir]].
  ** This card's artwork depicts the monster with its right arm covered.
  * This card shares its name with "[[Tyr, the Vanquishing Warlord]]".
