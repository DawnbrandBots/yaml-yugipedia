title: Card Trivia:Amaze Attraction Wonder Wheel
wikitext: |-
  {{Navigation}}

  * This card's artwork features one of the houses and snake-like creatures as seen in the artwork of "[[Ojama Country]]", with the wheel's passenger cars resembling the houses. The faces of "[[Ojama Green]]", "[[Ojama Yellow]]", and "[[Ojama Black]]" appear in the center of the wheel.
  ** This card's second bulleted effect is also based on the effect of "Ojama Country".
  ** "[[Amazement Administrator Arlekino]]" also appears in this card's artwork.
  * This [[wikipedia:Ferris wheel|ferris wheel]] appears in the artwork of "[[Amazement Precious Park]]".
