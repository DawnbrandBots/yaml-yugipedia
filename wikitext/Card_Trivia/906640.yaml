title: Card Trivia:Metalfoes Vanisher
wikitext: |-
  {{Navigation}}

  * This monster is "[[Heavymetalfoes Amalgam]]" wearing armor based on "[[True King Agnimazud, the Vanisher]]". Fittingly, both cards share the same [[Level]], [[Attribute]], [[ATK]], and [[DEF]], and have similar effects.
  * This card is currently the only [[Level]] 9 [[Pendulum Monster]] in the ''[[TCG]]''/''[[OCG]]''.
