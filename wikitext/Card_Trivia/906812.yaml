title: Card Trivia:Chronicle Sorceress
wikitext: |-
  {{Navigation}}

  * This monster is based on "[[Dark Magician Girl]]".
  * This monster is the female [[counterpart]] of "[[Chronicle Magician]]".
  ** This monster's [[original ATK and DEF]] (1250/1250) are both half of those of "Chronicle Magician" (2500/2500).
  ** This monster's [[Level]] (4) is half of that of "[[Blue-Eyes White Dragon]]" (8).
