title: Card Trivia:Slime Token
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Jam Breeding Machine]]" and "[[Reactor Slime]]".
  * Prior to receiving its own artwork in ''[[Tournament Pack 2020 Vol.2]]'', in video games this [[Token Monster|Token]]'s artwork was a cropped version of the artwork of "[[Jam Breeding Machine]]", with the machine edited out. This card's ''[[OCG]]'' artwork depicts this Token in the same pose, with only the background changed.
  ** In ''[[Yu-Gi-Oh! Duel Links]]'', [[Slime Token (Duel Links)|this card]]'s in-game artwork was updated in 2021, after ''Tournament Pack 2020 Vol.2'' was released.
