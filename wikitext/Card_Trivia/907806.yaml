title: Card Trivia:Doll Monster Miss Mädchen, Customized
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Girl-chan", features the honorific "-chan", which is used to describe affection and intimacy towards girls.
  ** This monster's international name, "Mädchen", is the German word for "girl".
  * This monster is a [[Card evolutions|customized]] form of "[[Doll Monster Miss Mädchen]]".
  ** Visually, this monster is "Doll Monster Miss Mädchen" with the tail of "[[Doll Monster Mr. Dragon]]" sewn into its torso.
  * This monster has a re-customized form: "[[Doll Monster Miss Mädchen, Re-Customized]]".
