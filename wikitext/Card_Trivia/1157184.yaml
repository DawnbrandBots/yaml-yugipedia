title: Card Trivia:Galaxy-Eyes Antimatter Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[LIGHT]] [[counterpart]] of "[[Number 95: Galaxy-Eyes Dark Matter Dragon]]".
  ** This monster is named after [[wikipedia:Antimatter|antimatter]], a form of matter that consists of antiparticles, which are counterparts to the particles that make up ordinary matter.
  ** This monster is based on how "Galaxy-Eyes Dark Matter Dragon" became [[Forbidden]] in 2019 due to how it was easy to Summon in typical [[Dragon]] Decks, which took advantage of how it could [[send]] multiple Dragon monsters to the [[Graveyard]] (as [[cost]]) to trigger effects, or easily retrieve or Summon them.
