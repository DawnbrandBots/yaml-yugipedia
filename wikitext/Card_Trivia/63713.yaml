title: Card Trivia:Rare Metal Soul
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Super Roboyarou]]" appears in this card's artwork.
  ** This card's [[Quick-Play Spell Card]] [[Card type|type]] and effect are based on the effect of "Super Roboyarou", which allows it to gain 1000 [[ATK]] during the [[Damage Step]].
  *** Fittingly, in {{episode|Yu-Gi-Oh!|106|ref}}, during [[Nezbitt]]'s [[Battle Phase]], [[Tristan Taylor]] used the [[Deck Master]] ability of "[[Super Roboyarou (anime)|Super Roboyarou]]" to [[Set]] this card before it was [[destroyed by battle]] by Nezbitt's "[[Machine King (anime)|Machine King]]", which resulted in his automatic loss. 
  **** In [[Yu-Gi-Oh! - Episode 107|the next episode]], [[Duke Devlin]] used the Deck Master ability of "[[Strike Ninja (anime)|Strike Ninja]]" to [[activate]] this card and increase the [[ATK]] of [[Serenity Wheeler]]'s "[[St. Joan (anime)|St. Joan]]" by 1000 before it [[destroy]]ed Nezbitt's Deck Master, "[[Perfect Machine King (anime)|Perfect Machine King]]" by battle, resulting in their automatic victory. This symbolizes how the "spirit" of Tristan's "Super Roboyarou" allowed Duke and Serenity to defeat Nezbitt.
  ** This card's name is based on the Japanese name of the [[Robo]] [[series]], "Raremetal", which consists of both "Super Roboyarou" and "[[Super Robolady]]",  both of which are appropriate [[target]]s for this card's effect.
