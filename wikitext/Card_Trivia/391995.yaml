title: Card Trivia:Subterror Nemesis Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Subterror Cave Clash]]", "[[Subterror Behemoth Burrowing]]",  "[[Subterror Behemoth Stalagmo]]", "[[Subterror Behemoth Stygokraken]]", "[[Subterror Succession]]", "[[Subterror Behemoth Ultramafus]]", "[[Subterror Behemoth Voltelluric]]", "[[Subterror Behemoth Umastryx]]" and "[[Subterror Final Battle]]".
  * This monster's appearance bears resemblances to the [[W:c:teamico:Wander|main character]] of the popular [[wikipedia:PlayStation 2|PlayStation 2]] game ''[[wikipedia:Shadow of the Colossus|Shadow of the Colossus]]''.
