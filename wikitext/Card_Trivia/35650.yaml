title: Card Trivia:Giant Rex
wikitext: |-
  {{Navigation}}

  * Despite its name, this monster is not based on a ''[[wikipedia:Tyrannosaurus|tyrannosaurus]]'' but instead appears to be based on either a ''[[wikipedia:Spinosaurus|spinosaurus]]'' or another [[wiktionary:veliferous|veliferous]] [[wikipedia:Spinosauridae|spinosaurid]].
  ** If so, the kingly connotation of this monster's name may allude to ''spinosaurus's'' size, as it is the largest carnivorous dinosaur in existence.
  * Despite being an [[Effect Monster]] that has been used in multiple series of the anime, its effect has never been revealed or mentioned, and the card text when shown has always been illegible (seen at too far a distance) or obscured (such as by the hand of the character holding the card). The only known text is "''If your opponent controls no monsters...''".
  ** In the ''[[OCG]]''/''[[TCG]]'', this monster cannot attack directly, implying that its effect in the anime is "''If your opponent controls no monsters, this card cannot attack''".
