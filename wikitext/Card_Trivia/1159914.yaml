title: Card Trivia:Souffraruda the Defiant Soulclad Scripture
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Advance Pack: Revenge Hearts]]''.
  ** This card and "[[Gaigustvelgr the Defiant Soulclad Sword]]" are the first cover cards of a ''[[Yu-Gi-Oh! Rush Duel]]'' [[booster pack]] that is not featured in the related anime franchise.
  * This monster is an [[Counterpart|upgraded]] [[Ritual Monster|Ritual]] form of "[[Souffraes the Defiant Soul]]".
