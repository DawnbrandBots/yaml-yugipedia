title: Card Trivia:Fire King Avatar Arvata
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is based on [[wikipedia:Ganesha|Ganesha]], a Hindu deity depicted as a four-armed humanoid with the head of an elephant in [[wikipedia:Hindu mythology|Hindu mythology]].
  ** This monster's ''[[TCG]]'' name is based on [[wikipedia:Airavata|Airavata]], a divine four-tusked elephant with a white complexion in Hindu mythology.
