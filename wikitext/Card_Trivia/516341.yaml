title: Card Trivia:Silent Insect
wikitext: |-
  {{Navigation}}

  * This monster bears similar markings to "[[Doom Dozer]]" and "[[Aztekipede, the Worm Warrior]]".
  * This card's effect and name are a reference to silence, a [[wikipedia:status effect|status effect]] common in [[wikipedia:role-playing game|RPGs]]. Much like the silence of those games, this card prevents an opponent from using magic.
  * This insect appears to be a part of the family [[wikipedia:Belostomatidae|Belostomatidae]].
