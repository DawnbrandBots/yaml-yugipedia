title: Card Trivia:Cynet Backdoor
wikitext: |-
  {{Navigation}}
  * This card's name, artwork, and effect reference backdoors used by hackers.
  ** Backdoors are a means of bypassing normal security measures in order to access information. Likewise, the banished monster is granted a means of bypassing your opponent's defenses to access your opponent's Life Points.
  ** It is fitting that [[Yusaku Fujiki]], a hacker, would use this card in a Deck built around [[Cyberse]] monsters.
