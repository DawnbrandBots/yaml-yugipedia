title: Card Trivia:Dark Spell Regeneration
wikitext: |-
  {{Navigation}}

  * This card is a "[[The Winged Dragon of Ra]]"-support [[counterpart]] of "[[Magical Trick Mirror]]".
  ** This card can [[Special Summon]] "The Winged Dragon of Ra", while "Magical Trick Mirror" can Special Summon "[[Obelisk the Tormentor]]".
  *** Both cards were used by [[Yami Marik]] and [[Seto Kaiba]], respectively, during their [[Yami Yugi and Yami Marik's Battle City Duel|their]] [[Yami Yugi and Seto Kaiba's Battle City Duel|Duels]] with [[Yami Yugi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This card's ''[[OCG]]''/''[[TCG]]'' effects are based on its usage in the ''Yu-Gi-Oh!'' manga and anime, where Yami Marik used it to [[activate]] "[[Monster Reborn (anime)|Monster Reborn]]" from Yami Yugi's Graveyard during Yugi's turn in order to Special Summon "[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]" in its "Egyptian God Phoenix" mode.
  ** The additional effect sending the opponent's monster to the Graveyard references the effect of "Ra's" "Egyptian God Phoenix" mode to send "[[Slifer the Sky Dragon (anime)|Slifer the Sky Dragon]]" to the Graveyard.
  ** The additional effect to send "The Winged Dragon of Ra" to the Graveyard during the [[End Phase]] reference the effects of the [[Egyptian God]]s in both the manga/anime and the ''OCG''/''TCG'' (as the other two can be Special Summoned), where they would be sent to the Graveyard during the End Phase during the turn they were Special Summoned.
