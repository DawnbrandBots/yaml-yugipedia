title: Card Trivia:Blackwing - Blizzard the Far North
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Blackboost]]" and "[[Blackwing - Backlash]]".
  * This monster is named after a [[wikipedia:Blizzard|blizzard]], a severe storm that is categorized with high winds and falling snow, while its title of "Far North" is a reference to the [[wikipedia:North Pole|North Pole]], an area with a freezing climate where blizzards can often occur.
  * This monster, "[[Blackwing - Abrolhos the Megaquake]]", and "[[Blackwing - Auster the South Wind]]" are the only "[[Blackwing]]" monsters that cannot be [[Special Summon]]ed.
