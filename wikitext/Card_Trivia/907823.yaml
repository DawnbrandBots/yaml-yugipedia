title: Card Trivia:Drytron Asterism
wikitext: |-
  {{Navigation}}

  * "[[Drytron Alpha Thuban]]", "[[Drytron Beta Rastaban]]", and "[[Drytron Zeta Aldhibah]]"  appear in this card's artwork.
  * This card is named after an [[wikipedia:Asterism (astronomy)|asterism]], a popularly known pattern or group of stars that can be seen in the night sky, similar to a [[wikipedia:Constellation|constellation]].
  ** The kanji in this card's Japanese name (星彩の竜輝巧 ''Seisai no Ryukikō'') can be translated to "Star-Colored Drytron".
