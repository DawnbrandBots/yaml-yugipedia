title: Card Trivia:Storm Dragon's Return
wikitext: |-
  {{Navigation}}

  * "[[Tempest, Dragon Ruler of Storms]]" appears in this card's artwork.
  ** This card's name is an intentional reference to how the [[status]] of "Tempest" was changed from [[Forbidden]] to [[Limited]] in both lists preceding this card's release in ''[[Rising Rampage]]'' (the ''OCG'' [[April 2019 Lists (OCG)|April 2019]] and ''TCG'' [[July 2019 Lists (TCG)|July 2019]] ones, respectively).
  * This card's effect resolution and artwork are a reminiscence of the general mechanics of the Level 7 "[[Dragon Ruler]]s", due to their compulsory effect that returns them to the hand during the opponent's End Phase, if they were Special Summoned.
