title: Card Trivia:Neos Wiseman
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Neos]]" and "[[Yubel]]" appear in this card's artwork.
  * This monster is an [[Card evolutions|upgraded]] form of "Elemental HERO Neos", [[Fusion Monster|fused]] with "Yubel".
  ** This monster represents [[Jaden Yuki]] after he fused with [[Yubel (character)|Yubel]] in {{episode|GX|155|ref}}, as it is a Fusion of his two [[signature card]]s in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Additionally, in {{episode|GX|177|ref}}, when Jaden used "[[Super Polymerization (anime)|Super Polymerization]]" to [[Fusion Summon]] this card, he also [[discard]]ed "[[Winged Kuriboh (anime)|Winged Kuriboh]]", his [[Spirit Partner]].
  ** This monster's effect to inflict [[Effect damage|damage]] to the opponent equal to the [[ATK]] of a monster it battled at the end of the [[Damage Step]] is also similar to the effect of "[[Elemental HERO Flame Wingman]]" (Jaden's first signature card), which can inflict damage to the opponent equal to the ATK of a monster it [[destroy]]ed in the [[Graveyard]].
  * This monster has a [[retrained]] [[Fusion Monster|Fusion]] [[counterpart]]: "[[Elemental HERO Neos Kluger]]".
  * This monster is the anime counterpart of "[[Ma'at]]".
  ** Both monsters were originally Fusion Monsters in the ''Yu-Gi-Oh! GX'' anime and [[Yu-Gi-Oh! GX (manga)|manga]], but they were released as [[Effect Monster]]s in the ''[[OCG]]''/''[[TCG]]''.
  ** Both monsters have similar [[Summoning condition]]s: this monster must be [[Special Summon]]ed from the [[hand]] by [[send]]ing a [[face-up]] "Elemental HERO Neos" and a face-up "Yubel" the player [[control]]s to the [[Graveyard]], while "Ma'at" must be Special Summoned from the hand by sending a [[LIGHT]] [[Dragon]] monster and a LIGHT [[Fairy]] monster the player controls to the Graveyard.
  ** Both monsters were used by Jaden Yuki during his Duel against the final antagonist of the anime and manga; both were also [[Fusion Summon]]ed using two signature cards: "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" and "[[Yubel (anime)|Yubel]]" for this monster, and "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]" and "[[Winged Kuriboh (manga)|Winged Kuriboh]]" for "[[Ma'at (manga)|Ma'at]]".
  ** This monster was Summoned by discarding "Winged Kuriboh" to activate "Super Polymerization", while "Ma'at" was Summoned using "Winged Kuriboh" as [[Fusion Material]].
  * In the Korean ''[[OCG]]'' version of ''[[Premium Pack Vol.6]]'', this card was [[misprint]]ed as a Fusion Monster.
