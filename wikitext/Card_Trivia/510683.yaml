title: Card Trivia:Mechanicalchaser
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster Chronicle]]''.
  * This monster appears in the artworks of  "[[Autonomous Action Unit]]", "[[Covering Fire]]", and "[[Spark Breaker]]".
  * At the time this card was released, it had the highest [[original ATK]] (1850) of all [[Level 4]] monsters with no negative effects or costs, making it highly sought after for use in tournaments. Its use later dropped after more [[Level]] 4 monsters with 1900 ATK or higher were released.
  ** However, this card's ''[[Tournament Pack: 1st Season]]'' [[Ultra Rare]] print is still considered an extremely valuable collector's item.
