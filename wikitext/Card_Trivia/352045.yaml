title: Card Trivia:Aromage Rosemary
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Aroma Gardening]]" and "[[Humid Winds]]".
  * This monster is named after the ''[[wikipedia:Rosemary|Salvia rosmarinus]]'' (commonly known as the rosemary), a shrub with clusters of small flowers and fragrant, evergreen, needle-like leaves, which are used for cooking, while the oils are used for perfumes and incenses.
  * This monster has two upgraded forms:
  ** [[LIGHT]] [[Synchro Monster]]: "[[Aromaseraphy Rosemary]]"
  ** [[DARK]] [[Link Monster]]: "[[Aromalilith Rosemary]]"
