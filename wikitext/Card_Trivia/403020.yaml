title: Card Trivia:Berry Magician Girl
wikitext: |-
  {{Navigation}}

  * Part of the "[[Dark Magical Circle]]" appears in this card's artwork.
  * This card is the only flavor-themed "[[Magician Girl]]" monster whose effect specifically [[Special Summon]]s a "Magician Girl" monster instead of any [[Spellcaster]]-[[Type]] monster.
  ** It is also the only member who cannot change the attack target of an opponent's monster from itself to the Special Summoned monster, as well as halve the current [[ATK]] of the opponent's monster.
