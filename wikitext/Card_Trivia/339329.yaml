title: Card Trivia:Fire Jinn the Flame Genie of the Lamp
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|evolved]] form of "[[La Jinn the Mystical Genie of the Lamp]]" [[Fusion Monster|Fused]] with "[[Red Lamp]]".
  * In the [[Yu-Gi-Oh! ARC-V|anime]], this was one of the very few monster to stop its attack due to being discontent with its method of attack on a certain target.
