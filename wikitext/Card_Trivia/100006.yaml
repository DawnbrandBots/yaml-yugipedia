title: Card Trivia:Maiden of Macabre
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Geishadow", is a portmanteau of "geisha" (a type of historical Japanese courtesan specializing in traditional music and dance) and "shadow" (based on this card's [[DARK]] [[Attribute]] and appearance).
  ** This monster's appearance is more closely based off the ''[[wikipedia:Oiran|oiran]]'', another type of historical Japanese courtesan, as evidenced by the obi tied to the front and the monster's abundance of decorative hair pieces. While geisha primarily specialized in traditional performance arts, oirans were also prostitutes, and were commonly known to become murderers during the Edo period of Japan.
  * In ''[[Spellcaster's Command Structure Deck]]'', a leaflet suggesting cards to add to improve the Deck's performance erroneously calls this card "Maiden of '''the''' Macabre".
