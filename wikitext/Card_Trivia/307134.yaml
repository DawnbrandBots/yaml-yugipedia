title: 'Card Trivia:Number 36: Chronomaly Chateau Huyuk'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Number 33: Chronomaly Machu Mech]]" and "[[Chronomaly Vimana]]", serving as the monsters' engine.
  ** This is also supported by this monster's Japanese name, and the fact that the structure of "Number 33" is surrounding the blue sphere in this card's artwork, just as depicted in the artwork of "Number 33".
  ** This is fitting, as this card's effect complements the effect of "Number 33".
  * This monster is based on [[wikipedia:Çatalhöyük|Çatalhöyük]], the largest and best-preserved neolithic site found to date.
  ** "Çatal" is the Turkish word for "fork". Literally translated, its name means "Fork Mound".
  * As with other Arclight "Numbers", this card's number references its owner, [[Trey]]. Both this "Number's" digits as well as the number as a whole are multiples of 3.
