title: Card Trivia:Fishborg Launcher
wikitext: |-
  {{Navigation}}

  * This is the counterpart to, and intended replacement for, "[[Fishborg Blaster]]".
  ** Furthermore, the ATK/DEF of this card are the reversed ATK/DEF of "Fishborg Blaster"
  * Despite the name "''Fish''borg," the cyborg appears to be powered by a ''[[wikipedia:Belostomatidae|Belostomatidae]]'' insect.
