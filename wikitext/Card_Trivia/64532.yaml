title: Card Trivia:Spiritualism
wikitext: |-
  {{Navigation}}

  * "[[Dark Spirit of the Silent]]" appears in this card's artwork.
  ** Both cards were used by [[Yami Bakura]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and [[Yu-Gi-Oh! (manga)|manga]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|201|ref}}, specifically from the panel where "[[Poltergeists (manga)|Poltergeists]]" appeared.
  * Some copies of "[[Fairy Meteor Crush]]" in ''[[Dark Beginning 1]]'' were [[misprint]]ed as this card.
