title: Card Trivia:Cyber Kirin
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Qilin|qilin]] (or "kirin"), a mythical creature from East Asian cultures who is depicted with the body of a deer covered with dragon-like scales, the tail of an ox, and a mane of fire.
  ** This monster's Japanese name, "Cyber Giraffe" is a pun, as the qilin is associated with the image of a [[wikipedia:Giraffe|giraffe]], while "kirin" is the Japanese word for "giraffe".
