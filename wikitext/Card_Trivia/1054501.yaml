title: Card Trivia:Delirium Papillon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Delirium Honeyed Words]]", as well as in both artworks of "[[Invitation to a Delirious Dream]]".
  * This monster's design is based on the [[wikipedia:Butterfly|butterfly]], with its name being the French word for it, "papillon".
