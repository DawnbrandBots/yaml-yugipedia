title: Card Trivia:Evil Thorn
wikitext: |-
  {{Navigation}}

  * This monster's design features a dark, thorny fruit, which resembles a grenade. Fittingly, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster's damaging effect [[activate]]s, the fruit swells up in size before it explodes and shoots the thorns at the opponent.
