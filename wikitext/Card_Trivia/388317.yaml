title: Card Trivia:Frightfur Chimera
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Frightfur March]]" and "[[Frightfur Parade]]".
  * This monster is based on the mythological [[wikipedia:Chimera (mythology)|chimera]], a fire-breathing hybrid monster that combines the body of [[wikipedia:lion|lion]], the head of a [[wikipedia:goat|goat]], and a [[wikipedia:snake|snake]] for its tail.
  * This is the only "[[Frightfur]]" [[Fusion Monster]] that features a different background artwork from the other "Frightfur" Fusion Monsters, which depicts a dark background with suture patterns.
  ** This is also the only "Frightfur" Fusion Monster that does not feature any "[[Edge Imp]]" motif from the other "Frightfur" Fusion Monsters, which features bladed weapons with pink eyes inhabiting a shaded area within the monster's body.
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, when this monster attacks, it launches a rocket out of its mouth.
  * In the {{episode|ARC-V|083|ref}}, this monster dances with "[[Bloom Prima the Melodious Choir (anime)|Bloom Prima the Melodious Choir]]" in a ballroom setting due to the effect of "[[Fusion Fright Waltz (anime)|Fusion Fright Waltz]]", referencing the iconic ballroom dance scene between [[wikipedia:Belle (Disney)|Belle]] and the [[wikipedia:Beast (Beauty and the Beast)|Beast]] in the 1991 Disney animated film, ''[[wikipedia:Beauty and the Beast (1991 film)|Beauty and the Beast]]'', with this card representing the Beast, and "Bloom Prima" representing Belle.
