title: Card Trivia:Orcustrated Einsatz
wikitext: |-
  {{Navigation}}

  * "[[Orcustrated Babel]]" appears at the center of this card's artwork.
  ** On the bottom part of the artwork, the "[[Crusadia]]s" (from left to right: "[[Crusadia Draco|Draco]]", "[[Crusadia Magius|Magius]]", "[[Crusadia Regulex|Regulex]]", "[[Crusadia Krawler|Krawler]]", "[[Crusadia Equimax|Equimax]]", and "[[Crusadia Spatha|Spatha]]") can be seen fighting "[[Orcust]]" monsters (specifically: "[[Orcust Harp Horror|Harp Horror]]", "[[Orcust Brass Bombard|Brass Bombard]]", "[[Orcust Cymbal Skeleton|Cymbal Skeleton]]", and "[[Orcustrion]]").
  * This card is named after the German/Japanese term for "entrance" (German: ''[https://de.wikipedia.org/wiki/Einsatz_(Zeitpunkt) Einsatz]'', Japanese: アインザッツ ''Ainzattsu''), or the beginning of a musician's playing or singing.
