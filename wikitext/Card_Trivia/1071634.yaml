title: Card Trivia:Fiendsmith's Agnumday
wikitext: |-
  {{Navigation}}

  * "[[Fiendsmith Engraver]]" appears in this card's artwork.
  * This monster is named after [[wikipedia:Agnus Dei|Agnus Dei]], a Latin phrase that translates to "Lamb of God", used as a liturgical prayer in honor of [[wikipedia:Jesus|Jesus Christ]]. The phrase is also used as a musical accompaniment for the prayer as part of a Mass setting.
