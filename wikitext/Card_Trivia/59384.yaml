title: Card Trivia:Morphtronic Bind
wikitext: |-
  {{Navigation}}

  * "[[Morphtronic Celfon]]" is featured on this card's artwork.
  * This card is a [[Morphtronic]] version of "[[Gravity Bind]]" with the only difference being that the opponent cannot change their monster's battle positions while this card is face up and your monsters can still attack.
  * This card is similar to "[[Armor Ninjitsu Art of Freezing]]":
  ** Both support a specific [[Archetype]]
  ** Both are [[Continuous Trap Card]]s
  ** Both can prevent attacks
  ** Both can prevent the opponent from [[Battle position changes|changing the Battle Position]] of a monster
