title: Card Trivia:Regenesis Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Regenesis Code]]".
  * This monster's Japanese name is based on ''Bereshit'', the Jewish name for the [[wikipedia:Book of Genesis|Book of Genesis]], the first book in the [[wikipedia:Torah|Torah]], and whose title translates to "In the Beginning".
  ** Fittingly, this monster was listed as the first "[[Regenesis]]" monster to be released in ''[[Alliance Insight]]''.
