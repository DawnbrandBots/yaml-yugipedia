title: Card Trivia:Flying Elephant
wikitext: |-
  {{Navigation}}

  * This monster is most likely based on [[wikipedia:Dumbo|Dumbo]], the main character from the [[wikipedia:Dumbo (film)|Disney film]] of the same name who is a baby elephant who learns to fly with his enormous ears.
  * This is the first [[WIND]] monster in the ''[[OCG]]''/''[[TCG]]'' to be a [[Duel winner]], as well as the first non-[[DARK]] monster in the ''OCG''/''TCG'' to be a Duel winner.
  * This monster's ''OCG''/''TCG'' Duel winner effect is based on how [[Maximillion Pegasus]] used this card to defeat [[Bandit Keith]] through [[Sam]] in the original [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'']] manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's once-per-turn immunity to destruction by card effects is, similarly, a reference to its [[Flying Elephant (anime)|anime lore]] and how flying monsters were immune to ground-based attacks in the ''Yu-Gi-Oh!'' manga and anime.
