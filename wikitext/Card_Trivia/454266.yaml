title: Card Trivia:Cattle Call
wikitext: |-
  {{Navigation}}

  * "[[Diamond Dire Wolf]]", "[[Flower Wolf]]", "[[Koalo-Koala]]", "[[Master of Oz]]", "[[Mavelus]]",  "[[Number 49: Fortune Tune]]", "[[Skullbird]]", "[[Snowdust Giant]]", "[[Totem Bird]]", and "[[Vortex the Whirlwind]]" appear in this card's artwork.
  ** All of the above-mentioned monsters are eligible [[target]]s for this card's first effect.
  * This card's artwork, name, and effect continues the trend of "[[The Big March of Animals]]" and "[[The Big Cattle Drive]]".
