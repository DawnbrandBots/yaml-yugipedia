title: Card Trivia:Emblem of the Awakening
wikitext: |-
  {{Navigation}}

  * This emblem appears in the artwork of "[[Cú Chulainn the Awakened]]".
  * This emblem is fashioned after a [[wikipedia:Celtic knot|Celtic knot]], a symbolic pattern used in Celtic art. It is a looped knot with no beginning or end that goes on infinitely, which is believed to represent the eternity of life.
