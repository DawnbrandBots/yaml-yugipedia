title: Card Trivia:Savage Colosseum
wikitext: |-
  {{Navigation}}

  * This card, along with "[[Colosseum - Cage of the Gladiator Beasts]]," "[[Kaiser Colosseum]]", and "[[Xyz Colosseum]]", reference the Roman [[wikipedia:Colosseum|Colosseum]].
  * This card is similar to "[[Dark Arena]]", as both cards are [[Field Spell Card]]s that feature an effect that forces monsters to attack.
