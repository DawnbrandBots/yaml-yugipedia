title: Card Trivia:Cliant
wikitext: |-
  {{Navigation}}

  * This card's name and the shape of the back of this monster's torso are based on [[wikipedia:Klein bottle|Klein bottles]], a one-sided surface which, if traveled upon, could be followed back to the point of origin while flipping the traveler upside down (much like the shoulder pads of "[[Topologic Bomber Dragon]]").
  ** This card's name may also be based on a [[wikipedia:Client (computing)|client]], a piece of computer hardware or software that accesses a service made available by a server.
  * This monster seems to be related to "[[Link Spider]]" and "[[Pentestag]]".
  ** All three have a largely black and light-blue color schemes of their bodies.
  ** They are also visually based on insects (although [[wikipedia:Arachnid|arachnids]] are not technically insects).
  ** Their card artworks depict a net-like motif in the background, with the exception of "Pentestag".
  ** All three cards were also printed in ''[[Starter Deck: Codebreaker]]''.
