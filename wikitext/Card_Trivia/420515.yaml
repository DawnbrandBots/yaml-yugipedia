title: Card Trivia:Superheavy Samurai General Jade
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Hisu-E" (ヒス－Ｅ, ''Hisu-Ī'') is a pun on "''hisui''" (翡翠), the Japanese word for "jade".
  * This monster, along with "[[Superheavy Samurai General Coral]]", are the first "[[Superheavy Samurai]]" [[Pendulum Monster]]s.
