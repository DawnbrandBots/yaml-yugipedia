title: Card Trivia:Goblin of Greed
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Battleguard Sorcery]]", "[[Bubble Crash]]", "[[Cash Back]]", "[[Dark Factory of Mass Production]]", "[[Dark Factory of More Production]]", "[[Dark Scorpion Combination]]", "[[Extra Buck]]", "[[Fine]]", "[[Goblin Circus]]", "[[Goblin Out of the Frying Pan]]", "[[Goblin Thief]]", "[[Good Goblin Housekeeping]]", "[[Heavy Slump]]", "[[Hidden Fangs of Revenge]]", "[[Jar Robber]]", "[[Kingyo Sukui]]", "[[Panic Shuffle]]", "[[Peeking Goblin]]", "[[Pollinosis]]", "[[Recall]]", "[[Redeemable Jar]]", "[[Return (card)|Return]]", "[[Royal Prison]]", "[[Sales Pitch]]", "[[Second Coin Toss]]", "[[Single Purchase]]", "[[The Forceful Checkpoint]]", "[[That Grass Looks Greener]]", "[[Tilted Try]]", "[[Upstart Goblin]]", and "[[Waking the Dragon]]".
  * "[[Jar of Greed]]" and "[[Pot of Greed]]" appear in this card's artwork.
  * This monster has a [[counterpart]]: "[[Scrounging Goblin]]".
  * This monster has a ''[[Rush Duel]]'' counterpart: "[[Upgrade Goblin]]".
  * This card's Spanish name has a typo, as it was printed as "Goblin de la Cod'''í'''cia" instead of "Goblin de la Cod'''i'''cia".
