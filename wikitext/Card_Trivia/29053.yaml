title: Card Trivia:Forest Hunter
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the hunter from the fairy tale, ''[[wikipedia:Little Red Riding Hood|Little Red Riding Hood]]'', who rescues Red Riding Hood and her grandmother from the Big Bad Wolf's belly.
  ** This monster's effect to [[banish]] a [[Beast]] or [[Beast-Warrior]] monster further references the hunter's role in ''Little Red Riding Hood'', in which he comes to the rescue of Red
  *** Fittingly, in {{episode||196|ref}}, this monster is [[Special Summon]]ed by the effect of "[[Little Red Riding Hood]]" after it is [[destroy]]ed by "[[Obnoxious Celtic Guardian (anime)|Obnoxious Celtic Guardian]]", in which this monster banishes "[[Chimera the Flying Mythical Beast (anime)|Chimera the Flying Mythical Beast]]" from the field.
