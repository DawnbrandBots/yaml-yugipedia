  [[File:Dark_Bakura_fades_away.png|thumb|right|250px|[[Dark Bakura (manga)|Dark Bakura]] taunts [[Dark Marik (manga)|Dark Marik]] as he fades away.]]

  * "[[Curse Necrofear]]" appears in this card's artwork.
  * This card is based on [[Dark Bakura and Dark Marik's Duel (manga)|Dark Bakura and Dark Marik's Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This card's artwork depicts "Curse Necrofear" pointing at the viewer, referencing the artwork of "[[Dark Designator]]", which depicts a hand pointing at a hooded man and the shadow behind him. During the Duel, [[Dark Bakura (manga)|Dark Bakura]] used "[[Dark Designator (manga)|Dark Designator]]" to retrieve [[Dark Marik (manga)|Dark Marik's]] "[[The Sun Dragon Ra]]" to use against him.
  ** This card's artwork also depicts "Curse Necrofear" fading into darkness, referencing the effects of the "Darkness Play" [[Penalty Game]] that Dark Marik inflicted on Dark Bakura, where a Duelist's body would fade away from existence in wisps of smoke each time they lost [[Life Point]]s.
  *** Specifically, the art depicts the right side of "Curse Necrofear's" body fading away while the monster points, as if taunting the viewer. This references Dark Bakura's fate after losing the Duel; as the right side of his body gets consumed, he taunts Dark Marik that he will come back from this, because [[Zorc Necrophades (manga)|he ''is'' darkness]].

