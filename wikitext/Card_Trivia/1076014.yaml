title: Card Trivia:Evil HERO Infernal Rider
wikitext: |-
  {{Navigation}}

  * Visually, this monster resembles "[[Picador Fiend]]".
  ** This monster is based on the creature that chased [[Axel Brodie]] during a nightmare he has in {{episode|GX|141|ref}}. In the nightmare, the creature's rider turned into the visage of the [[The Supreme King|Supreme King]] with his faceplate down, as the Supreme King's voice taunted and tormented a fearfully fleeing Axel.
  * This monster's effect to [[banish]] itself and 4 other monsters to [[Set]] "[[Super Polymerization]]" is based on the plan of [[Brron, Mad King of Dark World (character)|Brron, Mad King of Dark World]] in {{episode|GX|135|ref}} and {{episode|GX|136|ref}}, where he attempted to sacrifice five of [[Jaden Yuki]]'s friends to acquire the "[[Super Polymerization (anime)|Super Polymerization]]" card.
  ** This monster's effect to Set "Super Polymerization" and allow monsters that must be [[Special Summon]]ed with "[[Dark Fusion]]" to be [[Fusion Summon]]ed with other effects is a reference to a scene of {{episode|GX|140|ref}}, where the Supreme King used "Super Polymerization" to Fusion Summon "[[Evil Hero Dark Gaia (anime)|Evil HERO Dark Gaia]]", despite "Dark Gaia" having a [[Summoning condition]] that states it can only be Special Summoned with "Dark Fusion" in both the anime and ''[[OCG]]''/''[[TCG]]''.
