title: 'Card Trivia:Number 78: Number Archive'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster's design is based on the [[Different Dimension Airship]] from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** The pillars in this card's artwork resemble those of the Airship.
  ** Several card names are written on this monster's pillars in [[Astral glyphs]].
  ** Its name is a reference to the role of the Airship in the anime, being the 'archive' of the pieces of [[Astral]]'s memory: the "[[Number]]s".
  *** Its effect of [[Special Summon]]ing any "Number" monster with [[Number#Original|a number from 1 to 99]] is also a reference to this.
  * Various card names appear on the pillars in this card's artwork written in Astral glyphs.
  ** In the top-left corner (read from left-to-right, in a descending fashion), the first row contains "[[Number 32: Shark Drake]]" (ク・ドレイイク, ''ku Doreīku'') and "[[Number C32: Shark Drake Veiss]]" (ＣＮｏ．３２ カイコ, ''Kaosu Nanbāzu Sanjūni Kaiko''), while the second row contains "[[Number 33: Chronomaly Machu Mech]]" (ック, ''kku'') and "[[Number 34: Terror-Byte]]" (Ｎｏ．３４ デンサンキジユウテ, ''Nanbāzu Sanjūyon Densankijū Te'').
  *** The Japanese name of "Shark Drake" is slightly incorrect in this card's artwork, as it has an extra 「イ」.
  ** In the column in the top-right corner (read from left-to-right, in a descending fashion), the first row contains "[[Number 39: Utopia Beyond]]" (ボオビヨンド・, ''bō'ō Biyondo''), while the second row contains "[[Number 39: Utopia]]  (オプ, ''opu''), and "[[Number 39: Utopia Roots]]" (Ｎｏ．３９キボオホオプ・ルウツ, ''Nanbāzu Sanjūkyū Kibō'ō Hōpu Rūtsu'').
  *** The third row appears to depict the name of a "[[Number 39: Utopia (archetype)|Number 39: Utopia]]" monster (most likely a "[[Number C]]" monster).
  * This is the first card to contain the same archetype string ("Number") twice in its name.
