title: Card Trivia:Rainbow Shaman
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's [[Level]] (7) references how a rainbow has seven visible colors: red, orange, yellow, green, blue, indigo, and violet.
  ** This monster's [[LIGHT]] [[Attribute]] also references this, as a rainbow is a visible spectrum caused by reflection, refraction, and dispersion of light through water droplets.
