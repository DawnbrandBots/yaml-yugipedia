title: Card Trivia:The Great Noodle Inversion
wikitext: |-
  {{Navigation}}

  * This card's Japanese name ("天地返し" ''Tenchigaeshi'') refers to the method of eating ramen by lifting the noodles from the bottom of the bowl and placing them on top of the ramen's vegetables, which is depicted in this card's artwork.
  * The mage in this card's artwork is posed similarly to "[[Chaos Sorcerer]]".
