  {{Navigation}}

  * This monster appears in the artworks of "[[Double Interlock]]" and "[[Heavy Interlock]]".
  * This monster is a [[Ritual Monster|Ritual]] [[counterpart]] of "[[Borreload Dragon]]".
  ** The "R" in this monster's Japanese name and its blue color scheme further reference its Ritual Monster [[card type]].
