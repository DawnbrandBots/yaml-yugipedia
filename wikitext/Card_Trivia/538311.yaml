title: Card Trivia:Backs to the Wall
wikitext: |-
  {{Navigation}}

  * "[[The Six Samurai - Irou]]", "[[The Six Samurai - Kamon]]", "[[The Six Samurai - Nisashi]]", and "[[The Six Samurai - Yariza]]" appear in this card's artwork.
  ** This card's artwork likely indicates that "Irou", "Kamon", "Nisashi", and "Yariza" all sacrificed themselves for their friends, considering that the original "[[Six Samurai]]" monsters share an effect that allows the player to [[destroy]] another "Six Samurai" monster to prevent them from being destroyed.
