title: Card Trivia:Chimeratech Overdragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Chimeratech Cyber]]''.
  * This monster appears in the artwork of "[[Evolution End Burst]]".
  * This monster has a similar counterpart: "[[Chimeratech Fortress Dragon]]".
  ** The [[Attribute]]s of the "[[Cyber]]" [[Fusion Monster]]s requiring "[[Cyber Dragon]]" as Fusion Material are [[LIGHT]], while all four [[Chimeratech]] Fusion Monsters are [[DARK]] instead.
  *** Similarly, while all "[[Cyber Dragon (archetype)|Cyber Dragon]]" monsters include the phrase "[[Evolution Burst]]" in their attack names, both Chimeratech monsters include "Evolution Result" instead.
  ** Both this monster and "Chimeratech Fortress Dragon" are based on the [[wikipedia:Chimera (mythology)|chimera]], a creature in [[wikipedia:Greek mythology|Greek mythology]] whose body consists of parts of different animals. More recently, the concept of the chimera is the idea of combining things that occur naturally, much like both monsters are [[Fusion Summon]]ed by using various [[Machine]] monsters.
  *** Both monsters' designs may also be based on the [[wikipedia:Lernaean Hydra|Hydra]] or the ''[[wikipedia:Yamata no Orochi|Yamata no Orochi]]'', mythological serpentine monsters that are depicted with multiple heads.
  * This monster has a LIGHT counterpart: "[[Cyber Eltanin]]".
  * This is the first Fusion Monster to have a variable number of Fusion Materials.
  * This is the only Fusion Monster listing "Cyber Dragon" as Fusion Material to have all identical heads.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster was depicted as having a head for each monster used in its [[Fusion Summon]]. Its official artwork gives it six heads, which may reference its debut anime appearance (where it was summoned with six Fusion Materials).
