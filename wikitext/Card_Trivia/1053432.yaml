  * "[[Sangenpai Transcendent Dragion]]" appears in this card's artwork.
  * This card is named after ''rinshan kaihō'', a ''[[wikipedia:Japanese mahjong yaku|yaku]]'' (or a condition that determines the value of a player's hand) in the game of [[wikipedia:Japanese mahjong|Japanese mahjong]].
