title: Card Trivia:Crimson Dragon (card)
wikitext: |-
  {{Navigation}}

  * A statue of this monster appears in the artwork of "[[Scrap-Iron Sacred Statue]]".
  * The [[New Domino City]] skyline, as well as the monument representing the unity of New Domino City and [[Satellite]], appear in the background of this card's artwork.
  * This is the [[Monster Card]] version of the [[Crimson Dragon]] from the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** Fittingly, this monster's effect can [[Special Summon]] the six original [[Signer Dragon]]s.
  ** This monster's effect to [[Synchro Summon]] a [[Dragon]] [[Synchro Monster]] by returning itself to the [[Extra Deck]] is based on a scene from {{episode|5D's|64|ref}}, where the Crimson Dragon used "[[Majestic Star Dragon (anime)|Majestic Star Dragon]]" to gain physical form so it could attack [[King of the Netherworld]].
  * This monster has a [[Yu-Gi-Oh! 5D's (manga)|manga]] [[counterpart]]: "[[Ultimaya Tzolkin]]".
  * This monster has a [[Link]] [[counterpart]]: "[[Duel Link Dragon, the Duel Dragon]]".
  * This monster has a [[retrained]] counterpart: "[[Crimson Dragon Quetzacoatl]]".
  * This monster has a downgraded [[Tuner monster|Tuner]] form: "[[Shining Star Dragon]]".
