title: Card Trivia:Blockman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Toy Parade]]".
  * This monster's name is based on its appearance of being made out of [[building blocks]].
  * This monster shares similarities with "[[Block Golem]]", and "[[Block Dragon]]", two other building blocks-themed monsters.
  ** All three share the same [[Attribute]] ([[EARTH]]) and [[Type]] ([[Rock]]).
  *** This monster and "Block Golem" also share the same [[original ATK and DEF]] (1000/1500), and feature an effect that can [[Tribute]] themselves to [[Special Summon]] multiple [[Level 4]] Rock monsters.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|341|ref}}, specifically from the panel showing [[Blockman (manga)|this monster]] being Summoned.
