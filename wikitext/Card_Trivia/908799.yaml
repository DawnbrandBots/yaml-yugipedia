title: Card Trivia:Supreme Beasteam Magnum Overlord (L)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[B.B.B. - Beast Brave Brandish]]" in [[Maximum Mode]] (together with "[[Supreme Beasteam Magnum Overlord]]" and "[[Supreme Beasteam Magnum Overlord (R)|Supreme Beasteam Magnum Overlord [R]]]").
  * This monster has three [[counterpart]]s: "[[Supreme Machine Magnum Overlord (L)|Supreme Machine Magnum Overlord [L]]]", "[[Supreme Railartillery Magnum Overlord (L)|Supreme Railartillery Magnum Overlord [L]]]", and "[[Supreme Skystream Magnum Overlord (L)|Supreme Skystream Magnum Overlord [L]]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (4), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (800/0) with the above-mentioned monsters.
