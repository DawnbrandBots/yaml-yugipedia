title: Card Trivia:Princessleon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Scale Incense Liberation]]" and "[[Word Working]]".
  * This monster's Japanese name (ヒメレオン, ''Himereon'') is a portmanteau of the Japanese word for "princess" (姫 ''hime'') and "chameleon" (カメレオン, ''kamereon'').

  == See also ==
