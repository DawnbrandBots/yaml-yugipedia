  * "[[Pitch-Dark Dragon]]" and discolored versions of "[[Kiryu]]", "[[Sky Dragon]]", and "[[Blackland Fire Dragon]]" appear in this card's artwork.
  ** Fittingly, these cards were [[discard]]ed to [[activate]] this card's effect in the ''[[Yu-Gi-Oh!]]'' anime.
