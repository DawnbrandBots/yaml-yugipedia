title: Card Trivia:Cloudian - Nimbusman
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Cumulonimbus cloud|cumulonimbus clouds]], a low-altitude cloud formation which is formed when copious amounts of [[wikipedia:Cumulus cloud|cumulus clouds]] band together.
  ** Fittingly, in the ''[[Yu-Gi-Oh! GX]]'' anime, [[Adrian Gecko]] [[Tribute Summon]]ed this monster by [[Tributing]] four "[[Sheep Cloud Token]]s" [[Special Summon]]ed by the effect of "[[Cloudian - Sheep Cloud (anime)|Cloudian - Sheep Cloud]]", a monster based on cumulus clouds.
