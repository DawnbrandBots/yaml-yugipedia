title: Card Trivia:Fairy King Truesdale
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Oberon's Prank]]".
  * This monster's Japanese name is based on [[wikipedia:Oberon|Oberon]], the king of the fairies featured in [[Wikipedia:Middle Ages|medieval]] and [[Wikipedia:Renaissance|Renaissance]] literature and most prominently featured in [[wikipedia:William Shakespeare|William Shakespeare's]] play, ''[[wikipedia:A Midsummer Night's Dream|A Midsummer Night's Dream]]''.
  ** Despite this monster's title as "Fairy King", it is a [[Plant]] monster rather than a [[Fairy]] monster. This, and its effect to increase a Plant monster's [[ATK]]/[[DEF]] by 500, references how Oberon and his wife [[Wikipedia:Titania (Fairy Queen)|Titania]] reside in an [[Wikipedia:Enchanted forest|enchanted forest]] as depicted in the French epic poem ''[[Wikipedia:Huon of Bordeaux|Huon de Bordeaux]]'' and ''A Midsummer Night's Dream''.
