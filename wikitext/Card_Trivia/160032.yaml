title: Card Trivia:Blackwing - Hurricane the Tornado
wikitext: |-
  {{Navigation}}

  * This monster's name and title are each based on two types of powerful rotating storms: a [[wikipedia:Hurricane|hurricane]] (a powerful storm characterized by a large low-pressure center) and a [[wikipedia:Tornado|tornado]] (a violently rotating column of air making contact between the surface of the Earth and low overhanging clouds).
