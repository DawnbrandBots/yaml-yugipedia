title: Card Trivia:Card Rotator
wikitext: |-
  {{Navigation}}

  * "[[Jerry Beans Man]]" and "[[Marshmallon]]" appear in this card's artwork.
  ** Fittingly, both cards are currently at a disadvantage in this card's artwork, as their [[Battle Position]]s are being changed from [[Attack Position|Attack]] and [[Defense Position]]s, respectively.
  *** "Jerry Beans Man" has 0 [[DEF]], making it vulnerable to attacks from the opponent's monster.
  *** "Marshmallon" cannot be destroyed by battle, but the player still suffers [[battle damage]] when attacked in Attack Position.
