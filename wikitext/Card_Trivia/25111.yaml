title: Card Trivia:Mind Master
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Column Switch]]", "[[Mind Over Matter]]",  "[[Psychic Trigger]]", "[[Psychic Path]]", and "[[Telekinetic Power Well]]".
  ** This monster's brain appears in the artworks of "[[Brain Hazard]]" and "[[Brain Research Lab]]".
  * The symbol on the glass dome that encases this monster's brain resembles the Unicode symbol for power, which is commonly found on the power buttons of many electronics.
  * This card is the first case of Konami announcing a card errata on their website, which occurred soon after its release.<ref>{{cite web | url = http://www.yugioh-card.com/japan/lineup/5ds/bp_the_duelist_genesis/info.html | title = <nowiki>「メンタルマスター」カードテキストに関するお知らせ</nowiki> | publisher = Konami | accessdate = February 6, 2017}}</ref> 
  * This is the first Psychic monster to become [[Forbidden]].
  ** This is also one of two [[Tuner monster]]s to be Forbidden, the other being "[[Fishborg Blaster]]".
  * This monster is a counterpart of "[[Brain Controller]]":
  ** Both are [[Tuner monster]]s who share the same [[Level]] (1), [[Type]] ([[Psychic]]), and [[original ATK and DEF]] (100/200).
  ** Both monsters have opposite [[Attribute]]s: this monster's Attrbute is [[LIGHT]], while the Attribute of "Brain Controller" is [[DARK]].
  ** Both monsters' designs feature a brain in a glass vessel, and a pair of mechanical hands attached to long, cord-like arms.

