title: Card Trivia:Sonata the Melodious Diva
wikitext: |-
  {{Navigation}}

  * A [[wikipedia:treble clef|treble clef]] appears in this card's artwork.
  * This monster is based on a [[wikipedia:sonata|sonata]], a piece played with no vocal accompaniment.
  ** This is in contrast to "[[Aria the Melodious Diva]]", a monster based on an [[wikipedia:aria|aria]], a piece performed by a lone singer, primarily without orchestral accompaniment.  Fittingly, both monsters debuted in {{episode|ARC-V|002|ref}}.
