title: Card Trivia:Goddess of Whimsy
wikitext: |-
  {{Navigation}}

  * This monster is the ''[[Rush Duel]]'' [[counterpart]] of "[[Goddess of Whim]]".
  ** This monster's tails effect to [[send]] it to the [[Graveyard]] and allows the player to [[draw a card]] is possibly based on the effect of "[[Goddess of Whim (ROD)|Goddess of Whim]]" in ''[[Yu-Gi-Oh! The Sacred Cards]]'' and ''[[Yu-Gi-Oh! Reshef of Destruction]]'', where she can be sacrificed to draw a card.
