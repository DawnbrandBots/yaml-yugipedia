  {{Navigation|mode=nonGame}}

  * "[[Slifer the Sky Dragon]]" appears in this card's artwork. (Japanese Anime Only)
  * This card has 2 counterparts, "[[Quiz Panel - Ra 30]]" and "[[Quiz Panel - Obelisk 30]]".
  * In the English dub of [[Yu-Gi-Oh! GX]], this card's effect is "''Drink a bowl of water in 1 minute''."
