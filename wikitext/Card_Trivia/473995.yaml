title: Card Trivia:Predaponics
wikitext: |-
  {{Navigation}}

  * Several "[[Predaplant Flytrap]]s" appear in this card's artwork.
  * This card's ''[[TCG]]'' name, "Predaponics", is a portmanteau of "[[Predap]]" and "[[wikipedia:Hydroponics|hydroponics]]", a way of growing plants that doesn't use soil by immersing their roots directly into nutrient-rich water.
