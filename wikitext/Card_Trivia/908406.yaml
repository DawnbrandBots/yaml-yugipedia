title: Card Trivia:Icejade Ran Aegirine
wikitext: |-
  {{Navigation}}

  * The frozen remains of "[[The Abyss Dragon Swordsoul]]" appear in this card's artwork.
  * This monster appears in the artwork of "[[Million-Century Ice Prison]]".
  * This monster is a [[Tuner monster|Tuner]] form of "[[Icejade Gymir Aegirine]]" ("[[Icejade Aegirine]]").
  ** This card's effect is similar to "[[Swordsoul Strategist Longyuan]]", implying that "Aegirine" has absorbed the power of "Longyuan" ("The Abyss Dragon Swordsoul") after she defeated the latter in battle.
  * [[wikipedia:Rán|Rán]] is a goddess and personification of the sea in [[wikipedia:Norse mythology|Norse mythology]]. She is also known as the wife of the [[wikipedia:Jötunn|jötunn]] [[wikipedia:Ægir|Ægir]] (also known as Gymir).
