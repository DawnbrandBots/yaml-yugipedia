title: Card Trivia:Abyss Actor - Curtain Raiser
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abyss Actors' Curtain Call]]", "[[Abyss Playhouse - Fantastic Theater]]", and "[[Stand In]]".
  * This card's name is based on a [[wikipedia:curtain raiser|curtain raiser]], a term used in [[wikipedia:acting|acting]] to describe an opening performance for the main attraction of the show,  where the first person on stage is often known for "raising the stage curtain".
  ** This reflects both this card's [[Pendulum Effect]] and [[Monster Effect]], as this monster acts as the player's "opening performance" by being the only monster they control, which allows it to gain 1100 [[ATK]]. Fittingly, in this card's debut in {{episode|ARC-V|141|ref}}, this was the first monster Summoned by [[Sylvio Sawatari]], which emphasizes the term in which this card is named after.
