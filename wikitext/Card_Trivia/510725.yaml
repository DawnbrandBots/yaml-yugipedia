title: Card Trivia:Cloudian - Poison Cloud
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fog Control]]".
  * This monster's name is based on [[wikipedia:Air pollution|air pollution]], in which poisonous gases are released into the air which causes harm to humans, animals, and the environment.
  ** This monster's effect reflects this, as its body can destroy any monster exposed to this monster in battle and then harms the opponent by 800 points.
