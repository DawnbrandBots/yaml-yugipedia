title: Card Trivia:D/D Evil
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Devil|Devil]], the personification of evil in various cultures and religious traditions.
  ** This monster's name, when combining the naming scheme of the "[[D/D]]" [[archetype]] with "Evil", could be read as "devil", reflecting its [[Fiend]] [[Type]].
