title: Card Trivia:The Tricky
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' and ''[[Yu-Gi-Oh! R]]'' manga, in every Duel this monster appeared in, [[Dark Yugi (manga)|Dark Yugi]] used its [[discard]] [[cost]] to discard one of the [[Egyptian God]]s from his [[hand]] to [[Special Summon]] this monster and later used "[[Monster Reborn (manga)|Monster Reborn]]" to Special Summon one of them from his [[Graveyard]].
  ** The only member of the Egyptian Gods who were successfully Special Summoned this way was "[[The God of the Obelisk]]", while this method used with the other two Egyptian Gods was unsuccessful due to a card used by Dark Yugi's opponent that [[negate]]d their Summoning. 
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|339|ref}}, specifically from the panel showing [[The Tricky (manga)|this monster]] being Summoned.
  * This card's summoning condition to discard 1 card and Special Summon itself is carried over by some [[retrained]] counterparts of "[[Dark Magician Girl]]", such as "[[Apprentice Illusion Magician]]" and "[[Dark Magician Girl the Magician's Apprentice]]".
