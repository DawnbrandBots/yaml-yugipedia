  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Phantom Revengers]]''/''[[Phantom Revenge]]''.
  * This monster's face appears in the artwork of "[[Hecahands Mankibuel]]" and "[[Hecahands Bait]]".
  * ''Al-Jauzā' '' ("The Central One") is the Arabic name of the constellation [[wikipedia:Orion (constellation)|Orion]].
