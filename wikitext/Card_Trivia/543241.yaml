title: Card Trivia:Halfway to Forever
wikitext: |-
  {{Navigation|Halfway to Forever}}

  * [[Yuma Tsukumo]], [[Astral]], and the [[Emperor's Key]] appear in this card's artwork.
  * This card's Japanese name, "Master Piece", is based on the first Japanese opening theme of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, "''[[Masterpiece]]''", while its artwork is based on the final shot of the opening; the scene was also featured in the first English opening theme, "''[[Take a Chance]]''".
  ** The aforementioned openings are used as the "ending" theme of {{episode|ZEXAL|146|ref}}, the final episode in the anime in which this card appears.
  ** This card's ''[[TCG]]'' name, however, is based on the second English opening theme of the anime, "[[Halfway to Forever (song)|Halfway to Forever]]".

