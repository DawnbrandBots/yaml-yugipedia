title: Card Trivia:Pennant of Revolution
wikitext: |-
  {{Navigation}}

  * "[[Noble Knight Joan]]" appears in this card's artwork.
  ** Fittingly, "Noble Knight Joan" is based on [[wikipedia:Jeanne d'Arc|Jeanne d'Arc]] (Joan of Arc), who is frequently used as a symbol of France.
  * This card's artwork is based on [[wikipedia:Liberty Leading the People|''Liberty Leading the People'']], a painting by [[wikipedia:Eugène Delacroix|Eugène Delacroix]] to commemorate the [[wikipedia:July Revolution|July Revolution]], albeit in a mirrored composition.
  ** This card's effect to [[add]] "[[Liberty at Last!]]" to the player's [[hand]] references the overall liberal symbolism of ''Liberty Leading the People'', more specifically the [[wikipedia:Storming of the Bastille|storming of the Bastille]] on the eve of the [[wikipedia:French Revolution|French Revolution]].
