title: Card Trivia:Armed Dragon LV7
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork "[[Level Down!?]]".
  * "[[Armed Dragon LV3]]" → "[[Armed Dragon LV5]]" → "Armed Dragon LV7" → "[[Armed Dragon LV10]]"
  ** This monster is an [[Card evolutions|upgraded]] form of "Armed Dragon LV5".
  * This monster has several counterparts:
  ** A [[Dark counterpart]]: "[[Dark Armed Dragon]]".
  ** A "[[Metaphys]]" [[counterpart]]: "[[Metaphys Armed Dragon]]".
  ** Two [[retrained]] counterparts: "[[Armed Dragon Thunder LV7]]" and "[[Pile Armed Dragon]]".
  *** Fittingly, the artwork of "Pile Armed Dragon" features a blue, webbed background similar to this card's artwork.
  * This is the only "[[LV]]" monster whose effect cannot [[Special Summon]] its upgraded form, as "Armed Dragon LV10" was released much later.
