title: Card Trivia:Favorite Hero
wikitext: |-
  {{Navigation}}

  [[File:Flame Wingman in Fine Weather Rising Hallelujah.png|thumb|right|300px|"[[Elemental HERO Flame Wingman (anime)|Elemental HERO Flame Wingman]]", as it appears in "[[Fine Weather Rising Hallelujah]]".]]
  * "[[Elemental HERO Flame Wingman]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from the first opening of ''[[Yu-Gi-Oh! GX]]'', "[[Fine Weather Rising Hallelujah]]"; the scene was also featured in the Season 1 version of the English dub opening of ''Yu-Gi-Oh! GX'', "[[Get Your Game On!]]".
  ** The full moon in the background is a reference to the moon's significant presence in the ''Yu-Gi-Oh! GX'' anime scenes when "Flame Wingman" makes its climactic attack while "[[Skyscraper (anime)|Skyscraper]]" is active. 
  * This card's name is a reference to {{episode|Yu-Gi-Oh! GX|167|ref}}, specifically to the scene where [[Jaden Yuki]] referred to "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" as his "favorite hero" after he Fusion Summoned it, during his last Duel against [[Vellian Crowler|Dr. Vellian Crowler]].
  ** Jaden also referred to "Flame Wingman" as his "favorite '''card'''" in the following episodes:
  *** {{episode|Yu-Gi-Oh! GX|001|ref}}, when he Fusion Summoned it in his first Duel against Crowler.
  *** {{episode|Yu-Gi-Oh! GX|002|ref}}, when he Fusion Summoned it in his first Duel against [[Chazz Princeton]].
  *** {{episode|Yu-Gi-Oh! GX|023|ref}}, when he Fusion Summoned it in his Duel against [[Belowski]].
  *** {{episode|Yu-Gi-Oh! GX|151|ref}}, when he Fusion Summoned it in his Duel against [[Jesse Anderson]] (who was possessed by [[Yubel (character)|Yubel]] at the time).
  {{clear}}

