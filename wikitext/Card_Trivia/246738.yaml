title: Card Trivia:March of the Monarchs
wikitext: |-
  {{Navigation}}

  * "[[Thestalos the Firestorm Monarch]]", "[[Raiza the Storm Monarch]]", "[[Caius the Shadow Monarch]]", "[[Mobius the Frost Monarch]]", "[[Zaborg the Thunder Monarch]]" and "[[Granmarg the Rock Monarch]]" appear in this card's artwork.
  ** Also, those six [[Monster Card|monsters]] are the 'original' "[[Monarch]]s" that have six different [[Attribute]]s and have [[Card effect|effects]] [[activate]]d only when [[Tribute Summon]]ed (unlike "[[Kuraz the Light Monarch]]" and "[[Delg the Dark Monarch]]").
  * The background in this card's artwork shows a destroyed city, likely done by the "Monarchs" themselves.
  ** The events of this card's artwork may have happened after the events of "[[By Order of the Emperor]]".
