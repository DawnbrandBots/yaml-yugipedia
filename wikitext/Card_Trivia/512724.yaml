title: Card Trivia:Hino-Kagu-Tsuchi
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the box of ''[[Duelist Legacy Volume.5]]''.
  * This monster appears in the artworks of "[[Card of Adversity]]" and "[[Last Turn]]".
  * This monster is based on [[wikipedia:Kagu-tsuchi|Hi-no-Kagutsuchi]], the [[wikipedia:Shinto|Shinto]] god of fire in [[wikipedia:Japanese mythology|Japanese mythology]] whose birth caused his mother, [[wikipedia:Izanami|Izanami]] to be burned to death, and his father, [[wikipedia:Izanagi|Izanagi]], to retaliate by cutting his body into eight pieces, which formed eight volcanoes.
  * Unlike other [[Spirit]] monsters, this monster's Korean name, "화지가구토" (''Hwajigaguto'') is not directly transcribed from the Japanese furigana,「ヒノカグツチ」(''Hi no Kagutsuchi''). It is actually a nonsensical [[wikipedia:Sino-Korean vocabulary|Sino-Korean]] rendering of the Japanese kanji「火之迦具土」(which would hypothetically be read in [[wikipedia:Sino-Japanese vocabulary|Sino-Japanese]] as ''Kashikaguto''). A proper transcription would be "히노카구츠치" (''Hinokagucheuchi'') or "히노카그츠치" (''Hinokageucheuchi'').
