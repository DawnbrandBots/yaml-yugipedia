title: Card Trivia:Nessus the Star Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Evil Star Beacon]]".
  ** The artwork of "Beacon" depicts "Nessus" following "[[Echeclus the Star Knight]]", mentioned to be this monster's mentor in this card's text.
  * This monster is named after [[wikipedia:Nessus (mythology)|Nessus]], a [[wikipedia:Centaur|centaur]] in Greek mythology.

