title: Card Trivia:Crystal Beast Topaz Tiger
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Jesse Anderson]]''.
  * This monster appears in the artwork of "[[Crystal Blessing]]", "[[Crystal Conclave]]", "[[Crystal Flash]]", "[[Crystal Fortress]]", and "[[Crystal Pair]]".
  ** This monster's crystal form appears in the artwork of "[[Ultimate Crystal Magic]]".
  * This monster is based on [[wikipedia:Topaz|topaz]], a gemstone containing elemental impurities that often cause it to appear yellow.
  * This monster has an "[[Advanced Crystal Beast]]" [[counterpart]]: "[[Advanced Crystal Beast Topaz Tiger]]".
  * In the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's voice and mannerisms are based on [[wikipedia:Sean Connery|Sean Connery]].
