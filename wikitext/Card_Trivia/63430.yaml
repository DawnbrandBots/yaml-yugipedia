title: Card Trivia:Release Restraint Wave
wikitext: |-
  {{Navigation}}

  * The cards "[[Spellbinding Circle]]" and "[[Swords of Revealing Light]]" appear in this card's artwork.
  ** In video games starting from ''[[Yu-Gi-Oh! Duel Links]]'', the card "[[Shadow Spell]]" appears in this card's artwork, replacing the card  "Spellbinding Circle".
  ** This card's artwork depicted the samurai destroying its own sword to unleash a wave powerful enough to destroy the aforementioned cards, reflecting its effect to [[destroy]] the player's [[Equip Spell Card]] to destroy the opponent's [[Set]] [[Spell]]/[[Trap Card]]s.
  * This card's name references "[[Release Restraint]]", a Spell Card that can [[Special Summon]] "[[Gearfried the Swordmaster]]", which, like this card, feature an effect centered around the usage of an Equip Spell Card to destroy an opponent's card(s).
