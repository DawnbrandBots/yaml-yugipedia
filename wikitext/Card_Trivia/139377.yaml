  * This is the first [[Insect]] [[Fusion Monster]] in the ''[[TCG]]''/''[[OCG]]''.
  * The monster is based on a combination of a [[Wikipedia:Hercules Beetle|Hercules Beetle]] and a [[Wikipedia:Stag Beetle|Stag Beetle]], which are both popular species in Japanese [[Wikipedia:Insect Fighting|Insect Fighting]].
