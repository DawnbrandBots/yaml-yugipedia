title: Card Trivia:Metal Detector
wikitext: |-
  {{Navigation}}

  * This card has three counterparts: "[[World Suppression]]" (for [[Field Spell Card]]s), "[[Armored Glass]]" (for [[Equip Spell Card]]s), and "[[Mystic Probe]]" (for [[Continuous Spell Card]]s).
  * In a few video games, including ''[[Yu-Gi-Oh! The Eternal Duelist Soul]]'', this card has the same effect as "Mystic Probe".
