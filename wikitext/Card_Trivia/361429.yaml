title: Card Trivia:Lunalight Cat Dancer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Lunalight Masquerade]]" and "[[Lunalight Serenade Dance]]" (as a shadow).
  * This monster has 3 upgraded forms.
  ** [[Level 8]]: "[[Lunalight Panther Dancer]]"
  ** [[Level 10]]: "[[Lunalight Leo Dancer]]"
  ** [[Level 12]]: "[[Lunalight Liger Dancer]]"
  * This is the [[signature card]] of [[Celina]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * In the ''Yu-Gi-Oh! ARC-V'' anime, when this monster is Summoned, a [[wikipedia:Riq|Riq]] track plays briefly.
  * This monster's damaging effect possibly references how [[wikipedia:cat|cats]] often scratch with their claws, as the very low damage it inflicts via its effect is sometimes referred to as "scratch damage".
