title: Card Trivia:S-Force Gravitino
wikitext: |-
  {{Navigation}}

  * The "[[S-Force]]" crest (black coloration) appears on this card's artwork, located at the top of "Gravitino's" helmet.
  * According to his concept art, this monster is "[[Gravity Controller]]" after joining the S-Force.
  ** It is likely his recruitment is shown in "[[S-Force Bridgehead]]", where "Gravitino" (as "Gravity Controller") is conversing with "[[S-Force Justify]]".
