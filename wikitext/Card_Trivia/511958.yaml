title: Card Trivia:Elemental HERO Phoenix Enforcer
wikitext: |-
  {{Navigation}}

  * This monster has two [[counterpart]]s that require "[[Elemental HERO Avian]]" and "[[Elemental HERO Burstinatrix]]" as [[Fusion Material]]:
  ** An original counterpart: "[[Elemental HERO Flame Wingman]]".
  ** An "[[Evil HERO]]" counterpart: "[[Evil HERO Inferno Wing]]".
  * This monster has two [[Card evolutions|upgraded]] forms: "[[Elemental HERO Shining Phoenix Enforcer]]" and "[[Destiny HERO - Destroyer Phoenix Enforcer]]".
  * This is the only "[[Elemental HERO]]" [[Fusion Monster]] that lists "Elemental HERO Burstintarix" as Fusion Material to be a [[FIRE]] monster.
  * This is the first [[Fusion Monster]] used by [[Aster Phoenix]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This monster's name is also a reference to Aster Phoenix, as he disguised himself in a "Phoenix Enforcer" costume, calling himself "The Demon", and wanted to enforce justice on [[The D|the man]] who killed [[Mr. Phoenix|his father]].
  ** This monster's Japanese name, "Phoenixguy", is also similar to the the Japanese names of Aster's "[[Destiny HERO]]" monsters, which have the suffix "-guy" in their Japanese names.
  * This monster's first appearance in the anime (in {{episode|GX|057|ref}}) was similar to that of the titular character in the 1989 film ''[[wikipedia:Batman (1989 film)|Batman]]''.
