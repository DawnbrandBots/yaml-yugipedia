title: Card Trivia:Tannhauser Gate
wikitext: |-
  {{Navigation}}

  * "[[Planet Pathfinder]]" and "[[Solar Wind Jammer]]" appear in this card's artwork.
  ** Fittingly, both monsters were [[target]]ed by this card's effect in {{episode|ZEXAL|055|ref}}.
  * This card's name is based on the Tannhäuser Gate mentioned during the [[wikipedia:Tears in rain monologue|"Tears in rain" monologue]] in the 1982 science fiction film, ''[[wikipedia:Blade Runner|Blade Runner]]''.
