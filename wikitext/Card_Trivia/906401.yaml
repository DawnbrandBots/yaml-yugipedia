title: Card Trivia:Cybernetic Horizon (card)
wikitext: |-
  {{Navigation}}

  * "[[Cyber End Dragon]]" (in its [[Card Artworks:Cyber End Dragon|second ''OCG''/''TCG'' artwork]]) and "[[Cyberdark Dragon]]" appear in this card's artwork.
  * This card is named after ''[[Cybernetic Horizon]]'', a set that introduced members and support for the "[[Cyber Dragon (archetype)|Cyber Dragon]]" archetype.
