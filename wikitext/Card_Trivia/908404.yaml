title: Card Trivia:Trismagistus
wikitext: |-
  {{Navigation}}

  * This card's name is based on [[wikipedia:Hermes Trismegistus|Hermes Trismegistus]], the purported author of the ''[[wikipedia:Hermetica|Hermetic Corpus]]'', a series of sacred texts that are the basis of [[wikipedia:Hermeticism|Hermeticism]].
  * A drawing of "[[Endymion, the Magistus of Mastery]]", "[[Crowley, the Magistus of Grimoires]]", and "[[Rilliona, the Magistus of Verre]]", all within the magic circle from the artwork of "[[Magistus Theurgy]]", appear in this card's artwork.
