title: Card Trivia:Ally of Justice Searcher
wikitext: |-
  {{Navigation}}

  * This card's artwork seems to depict the monster traveling along the "[[Worm]]" Nebula, since the landscape resembles the one in the card artworks of the other "Worm" monsters.
  * The letters "Ａ Ｏ Ｊ" (standing for "[[Ally of Justice]]") can be seen painted on the left side of this monster.
  * This monster reflects the later ambition of "Ally of Justice" to capture and analyze the "Worms" to further strengthen their machines, as supported by the [[Master Guide 3 card storylines#The Invasion of the "Worms" Intensifies|Master Guide 3 card storylines]]. This is supported by this card's Japanese name, "Ally of Justice Researcher", as well its English name, "Ally of Justice Searcher".
  ** This is also reflected in its effect to flip a face-down [[Defense Position]] monster to face-up [[Attack Position]] without activating any [[Flip effect]]s, which is designed to "search" out and counter the effects of "Worm" monsters.
