title: Card Trivia:Revolution Synchron
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Synchron]]" counterpart of "[[Power Tool Dragon]]"
  ** This monster's name references the [[Summon chants in Yu-Gi-Oh! 5D's|Summon chant]] of "[[Life Stream Dragon (anime)|Life Stream Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime: ''The courage and power to protect the future of the planet is a Revolution!''
  *** Fittingly, this monster's effects allow the [[Synchro Summon]] of "[[Life Stream Dragon]]". Also, its [[original ATK and DEF]] are respectively 2000 and 1000 points less than the latter's.
  * This monster is one [[Level]] lower than "[[Stardust Synchron]]", which is currently the only other "Synchron" counterpart of a [[Signer Dragon]], and its original [[ATK]] and [[DEF]] are 100 points less than the latter's DEF and ATK respectively.
