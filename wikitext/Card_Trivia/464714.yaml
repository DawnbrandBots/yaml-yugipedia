title: Card Trivia:That Grass Looks Greener
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]", "[[Snyffus]]", several "[[Nettles]]", and cans of "[[Miracle Fertilizer]]" appear in this card's artwork.
  ** The backyard depicted is the one in the artwork of "[[Waking the Dragon]]".
  * This card's ''[[TCG]]'' name is based on the proverb "the grass is always greener on the other side", which means that another person's circumstances may seem good when in reality they might not be.
  ** This card's Japanese name is a play on 「{{Ruby|隣|となり}}の{{Ruby|芝|しば}}{{Ruby|生|ふ}}は{{Ruby|青|あお}}い」 (''tonari no shibafu wa aoi'', lit. "the grass is [[wikipedia:Blue–green distinction in language|blue]] next door", a similar proverb to the English one) and 「{{Ruby|芝|しば}}{{Ruby|刈|か}}り」 (''shibakari'', "lawnmowing"). This is reflected by this card's effect to "mow" the player's "overgrown lawn" (larger [[Deck]]) to match the opponent's.
