title: Card Trivia:Infernoble Knight Captain Roland
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form of "[[Infernoble Knight - Roland]]".
  ** This monster and "Infernoble Knight - Roland" are based on [[wikipedia:Roland|Roland]] from ''[[wikipedia:The Song of Roland|The Song of Roland]]'', a poem based on the [[wikipedia:Battle of Roncevaux Pass|Battle of Roncevaux Pass]] in 778, during the reign of [[wikipedia:Charlemagne|Charlemagne]].
  ** A flaming version of "[["Infernoble Arms - Durendal"]]" appears in this card's artwork. This is fitting, as [[wikipedia:Durendal|Durendal]] was Roland's sword.
