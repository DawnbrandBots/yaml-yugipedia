title: Card Trivia:Compulsory Escape Device
wikitext: |-
  {{Navigation}}

  * "[[Magical Scientist]]", the outside of "[[Iron Core Specimen Lab]]", and another unknown scientist (who also appears in the artwork of "Iron Core Specimen Lab") appear in this card's artwork.
  ** The symbol of the "[[Koa'ki Meiru]]" [[archetype]] can be seen inside the light coming from the door.
  * This card has three [[counterpart]]s: "[[Compulsory Circulation Device]]", "[[Compulsory Evacuation Device]]", and "[[Compulsory Recoil Device]]".
