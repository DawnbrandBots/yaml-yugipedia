title: Card Trivia:Mischief of the Yokai
wikitext: |-
  {{Navigation}}

  * This card's artwork is a reference to the ''[[wikipedia:Yōkai|yōkai]]'', a class of spirits and supernatural entities in [[wikipedia:Japanese folklore|Japanese folklore]].
  ** The woman in this card's artwork appears to be a [[wikipedia:Yuki-onna|yuki-onna]], a ''yōkai'' that appears as a beautiful young woman wearing a kimono who resides in snowy mountain terrain and preys on travelers who get lost in snowstorms.
  ** Each of the smaller ''yōkai'' in this card's artwork has a [[Level]] star on their chest, referencing this card's Level-manipulation effect.
