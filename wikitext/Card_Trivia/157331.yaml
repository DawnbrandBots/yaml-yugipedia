title: Card Trivia:Chaos Bloom
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The molten monster in this card's artwork also appears in the artwork of "[[Chaos Burst]]" and "[[Chaos Return]]".
  * The three colorful energy bolts in this card's artwork represents this card's three effects depending on the number of copies of this card in the [[Graveyard]].
