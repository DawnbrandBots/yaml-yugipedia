title: Card Trivia:Swordsoul Grandmaster - Chixiao
wikitext: |-
  {{Navigation}}

  * This card is based on "[[wikipedia:zh:斩蛇剑|Chi Xiao]]" (lit. "red sky" and pronounced ''Chi Shao''), a sword used by [[wikipedia:Emperor Gaozu of Han|Liu Bang]], the first emperor of the [[wikipedia:Han dynasty|Han dinasty]]. According to legend, this sword was initially just an iron rod Liu Bang bragged about being a divine sword given to him by an immortal. After the braggart proved his courage by hunting down a huge white snake, the iron rod transformed into this legendary sword.
  ** The sword "Chi Xiao" represents power and authority.
  * This monster appears in the artwork of "[[Swordsoul Emergence]]".
