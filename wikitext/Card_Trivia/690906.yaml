title: Card Trivia:Yuki-Onna, the Absolute Zero Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Yuki-Onna, the Ice Mayakashi]]" and "[[Yuki-Onna, the Icicle Mayakashi]]".
  * This monster wields the double-bladed naginata of "[[Shiranui Skillsaga Supremacy]]", taken after she intervened in the [[Fateful Hour|battle between]] "Skillsaga" and "[[Yoko, the Graceful Mayakashi]]", as seen in the artwork of "[[Ghost Meets Girl - A Mayakashi's Manuscript]]".
  ** Fittingly, this monster has an effect that directly counters the "[[Shiranui]]" archetype, reflecting her gaining the powers of "Shiranui" and using it against them.
