title: Card Trivia:Sylvan Bladefender
wikitext: |-
  {{Navigation}}

  * "[[Mount Sylvania]]", "[[Sylvan Hermitree]]", and "[[Sylvan Sagequoia]]" appear in this card's artwork.
  * This monster's base Japanese title (葉心棒) is a portmanteau of the words "leaf" (葉) and "bodyguard" (用心棒).
  ** This monster's ''[[TCG]]'' name is a portmanteau of its Japanese name "Blade" and the word "defender".
