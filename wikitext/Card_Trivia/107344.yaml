title: Card Trivia:Ally of Justice Unlimiter
wikitext: |-
  {{Navigation}}

  * The letters AOJ can be seen on the side of the monster, a reference to "Ally of Justice".
  * It is implied that this is the "[[Limiter Removal]]" for "[[Ally of Justice|Allies of Justice]]" due to this card's name ("Unlimiter" has basically the same meaning as "Limiter Removal").
