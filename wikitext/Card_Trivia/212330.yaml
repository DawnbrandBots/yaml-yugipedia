title: Card Trivia:Moonlit Papillon
wikitext: |-
  {{Navigation}}

  * "Papillon" in this card's name is the French word for "butterfly".
  ** This is fitting, as in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, the Japanese name of this card's owner, [[Dextra]] is "Droite", the French word for "right"
  ** Bizarrely, in terms of animals, a [[wikipedia:Papillon (dog)|papillon]] is also a breed of [[wikipedia:Spaniel|spaniel dogs]]; more specifically, the [[wikipedia:Phalène|phalène]] also known as the "Butterfly Dog" due to the appearance of the saggy hair outspreading from both of its ears, giving the impression of butterfly wings.
