title: Card Trivia:Jellyfish
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Jelly Bind]]", "[[Jelly Hole]]", and "[[Jelly Rain]]".
  * This monster has a [[retrained]] [[counterpart]]: "[[Electric Jellyfish]]".
  * This monster, "[[Metal Fish]]", "[[Peacock]]", and "[[Wolf]]" are the only [[Normal Monster]]s to have a simple name that is also featured in their ''[[TCG]]'' [[flavor text]]s; aside from "Metal Fish", they are also all based on real-life animals.
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from {{chapter|Yu-Gi-Oh!|072|ref}}, specifically from the panel showing "[[Feral Imp (manga)|Feral Imp]]" attacking the [[Ocean]] with electricity.
