title: Card Trivia:Altergeist Marionetter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Altergeist Camouflage]]" and "[[Personal Spoofing]]".
  * This monster's name is a portmanteau of "[[wikipedia:Marionette|marionette]]" and "[[wikipedia:Computer network|network]]".
  ** A marionette is a human-like puppet controlled from above using wires or strings by the puppeteer.
  ** A computer network is a group of interconnected nodes or computing devices that exchange data and resources with each other.
