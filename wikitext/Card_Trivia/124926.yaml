title: Card Trivia:Spellbinding Illusion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is a counterpart of "[[Spellbinding Circle]]", but with an [[effect]] that stops a [[monster]]'s effect instead of an attack. Also, it has the anime effect of "Spellbinding Circle" that decreases the monster's ATK.
  * The artwork for this card come from the effect of [[Illusion Magician]], [[Mahad]]'s Ka.
