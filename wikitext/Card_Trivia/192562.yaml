title: Card Trivia:Tough Tomato
wikitext: |-
  {{Navigation|mode=nongame}}

  * Seven "[[Cherry Inmato]]s" appear in this card's artwork.
  * This card's Japanese name, "Tomato Matrix" (トマトマトリクス, ''Tomatomatorikusu'') is a pun on the 1999 science fiction film ''[[wikipedia:The Matrix|The Matrix]]'', in which the characters are depicted wearing sunglasses while in the titular location, similar to what the multiple "Cherry Inmato" are depicted wearing in this card's artwork.
  ** This card's Japanese name is a portmanteau of "tomato" (トマト, ''tomato'') and "Matrix" (マトリクス, ''Matorikusu''), with the name featuring a repetition of the former word.
