title: Card Trivia:Frost Blast of the Monarchs
wikitext: |-
  {{Navigation}}

  * "[[Mobius the Frost Monarch]]" appears in this card's artwork.
  * This card's name seems to be a play on "Fighting Spirit" (闘気 ''Tōki''), using the kanji for "Freezing" (凍).
  * Oddly, even though this card seems to be channeling the power of "Mobius", the effect more closely resembles the power of "[[Granmarg the Rock Monarch|Granmarg]]".
