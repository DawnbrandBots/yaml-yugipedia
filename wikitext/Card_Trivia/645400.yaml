title: Card Trivia:Frodi, Generaider Boss of Swords
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Generaider Boss Quest]]".
  * The symbol from the artwork of "[[Generaider Boss Stage]]" appears in this card's artwork (although the upper middle circle is highlight light yellow).
  * This monster is based on the [[wikipedia:Vanir|Vanir]] god [[wikipedia:Freyr|Freyr]], who wielded a [[wikipedia:Sword of Freyr|magical sword]], is the twin brother of [[wikipedia:Freyja|Freyja]], and was said to live in [[wikipedia:Álfheimr|Álfheimr]].
  ** This card's name, "Frodi", is a reference to how Freyr is called in the ''[[wikipedia:Ynglingatal|Ynglingasaga]]'' (Froði).
  ** The symbol from the artwork of "Generaider Boss Stage" that appears in this card's artwork is based on [[wikipedia:Álfheimr|Álfheimr]], home of the [[wikipedia:Dökkálfar and Ljósálfar|light elves]].
