title: Card Trivia:Green Baboon, Defender of the Forest
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Dark Legends]]''.
  * This monster appears in the artwork of "[[Roaring Earth]]".
  * This monster has two [[counterpart]]s: "[[Yellow Baboon, Archer of the Forest]]" and "[[Ancient Crimson Ape]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|R|008|ref}} showing [[Green Baboon, Defender of the Forest (manga)|this monster]] being Summoned.
