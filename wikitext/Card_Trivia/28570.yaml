title: Card Trivia:Winged Kuriboh LV10
wikitext: |-
  {{Navigation}}

  * This monster, along with "[[Winged Kuriboh LV9]]" and "[[Winged Kuriboh LV6]]", is an evolved form of "[[Winged Kuriboh]]".
  ** Unlike most other "LV" Monsters, "Winged Kuriboh LV9" cannot "level up" to "Winged Kuriboh LV10".
  * This monster has a [[retrained]] counterpart: "[[Winged Kuriboh Sabatiel LV10]]".
