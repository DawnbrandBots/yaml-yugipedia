title: Card Trivia:Doctor Cranium
wikitext: |-
  {{Navigation}}

  * This card bears a strong resemblance to Dr. Brown from [[wikipedia:Back to the Future|Back to the Future]].
  * The helm of this monster appears in "[[ESP Amplifier]]".
  * There may be some relationships between "[[Kozaky]]" and "[[Magical Scientist]]" with "[[Doctor Cranium]]" because they are all seem to be scientists or researchers. Each of them has something in common that:
  ** The [[ATK]] & [[DEF]] point of each of them are equal; "Kozaky" has 400/400, "Magical Scientist" has 300/300, and "Doctor Cranium" has 100/100.
  ** They are all [[Level]] 1 monsters.
