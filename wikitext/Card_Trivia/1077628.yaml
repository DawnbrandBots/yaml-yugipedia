title: Card Trivia:Hyper Engine Vast Vulcan (R)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vulcan Ignite Hyperdrive]]" in [[Maximum Mode]] (together with "[[Hyper Engine Vast Vulcan (L)|Hyper Engine Vast Vulcan [L]]]" and "[[Hyper Engine Vast Vulcan]]").
  * Along with "Vast Vulcan [L]" and "Vast Vulcan", this monster is named after [[wikipedia:Vulcan (mythology|Vulcan]], the god of fire, volcanoes, metalworking, and the forge in [[wikipedia:Roman mythology|Roman mythology]].
  * This monster's [[Level]] and the Level of "Vast Vulcan [L]" add up to 7, referencing the title of this monster's debut anime series, ''[[Yu-Gi-Oh! SEVENS]]''.
