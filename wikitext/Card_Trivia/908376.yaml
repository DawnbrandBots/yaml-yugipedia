title: Card Trivia:Puppet Pawn
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2022]]''.
  * This monster is based on a [[wikipedia:Pawn (chess)|pawn]], the weakest piece in the game of [[wikipedia:Chess|chess]].
  ** This monster's ''[[OCG]]''/''[[TCG]]'' [[direct attack]] effect references the role of a chess pawn, which can be moved to the last rank farthest from its original square on the opponent's side.
  *** This monster's ''OCG''/''TCG'' effect [[add]]ing "[[Promotion]]" from the [[Deck]] to the [[hand]] after inflicting battle damage references the [[wikipedia:Promotion (chess)|promotion]] mechanic in chess, where a pawn can be replaced with a [[wikipedia:Queen (chess)|queen]], a [[wikipedia:Rook (chess)|rook]], a [[wikipedia:Knight (chess)|knight]] or a [[wikipedia:Bishop (chess)|bishop]] after reaching the last rank farthest from its original square.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|R|019|ref}}, specifically from the panel showing [[Puppet Pawn (manga)|this monster]] being Summoned.
