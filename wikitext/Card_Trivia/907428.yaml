title: Card Trivia:Blackwing - Boreastorm the Wicked Wind
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from [[wikipedia:Boreas (god)|Boreas]], a member of the [[wikipedia:Anemoi|Anemoi]], the Greek gods of the wind who rule over the cardinal directions from where the winds come from, whereas Boreas is the god of the [[wikipedia:North wind|north wind]].
  ** This monster shares its ''[[TCG]]'' name with "[[Blackwing - Boreas the Sharp]]".
  * This is the first "[[Blackwing]]" [[Tuner Synchro Monster]].
  * This monster is tied with "[[Blackwing - Kogarashi the Wanderer]]" for the highest [[Level]] (6) of any "Blackwing" [[Tuner monster]].
  ** This monster has the highest [[original ATK]] (2400) of any "Blackwing" Tuner monster.
