title: Card Trivia:Psychicounter
wikitext: |-
  {{Navigation}}

  * Two copies of "[[Telepathic Agent]]" appear in this card's artwork.
  ** The "Telepathic Agent" wearing green also appears in the artworks of "[[Psychic Raid]]" and "[[Psychic Tailwind]]".
  ** The amount of [[Effect damage|damage]] [[Damage|inflict]]ed by this card's [[effect]] is equal to the [[ATK]] of "Telepathic Agent", and therefore the amount of damage it would inflict by [[Direct attack|attacking directly]] with its own effect.
