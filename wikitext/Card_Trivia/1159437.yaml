title: Card Trivia:Fallen Angel in Darkness
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] a "[[Darklord]]" monster, [[ignoring its Summoning conditions]], is a reference to how in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this card was used to Special Summon "[[Darklord Desire (manga)|Darklord Desire]]", which cannot be Special Summoned in the ''OCG''/''TCG''.
