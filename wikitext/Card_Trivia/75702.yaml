title: Card Trivia:Byser Shock
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Electric chair|electric chair]], a torture device used to execute prisoners by restraining their limbs to a chair and electrocuting them.
  * This monster's ''[[TCG]]'' name is likely meant to be named "Viser Shock"; however, this was likely due to a mistranslation based on how "Viser" and "Byser" share the same Japanese pronunciation of the letters "b" and "v" (バイサー ''Baisā'').
  * This monster has a counterpart: "[[Viser Des]]".
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster was replaced by "[[Holding Legs (anime)|Holding Legs]]".
  ** Both monsters share the same [[Attribute]] ([[DARK]]), [[Type]] ([[Fiend]]), and [[original ATK and DEF]] (800/600) and are used by [[Yami Marik]].
  ** Both monsters share a similar effect [[return]]ing [[Set]] cards on the [[field]] to the player's [[hand]].
  ** Both monsters are depicted as torturous restraints in their respective debut media, designed to prevent the opponent from moving when combined with their counterparts ("[[Viser Des (manga)|Viser Des]]" in the manga, "[[Holding Arms (anime)|Holding Arms]]" in the anime).
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|222|ref}}, specifically from the panel showing [[Viser Shock (manga)|this monster]] being Summoned.
