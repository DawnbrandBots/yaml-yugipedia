title: Card Trivia:D/D/D Duo-Dawn King Kali Yuga
wikitext: |-
  {{Navigation}}

  * A toy version of this monster appears in the artwork of "[[D/D Reroll]]".
  * This card is based on [[wikipedia:Kali Yuga|Kali Yuga]], the last of the four stages the world goes through as part of the cycle of [[wikipedia:Yuga|yugas]] described in the [[wikipedia:Hindu texts|Sanskrit scriptures]], within the present [[wikipedia:Hindu units of time|Mahayuga]]. In particular, Kali Yuga is associated with the apocalyptic demon [[wikipedia:Kali (demon)|Kali]].
  * The kanji 「双暁」 (''Sōgyō'', "Duo-Dawn") in this card's Japanese name is a homophone of 「創業」 (''Sōgyō'', "founding"), derived from 「創業者」 (''Sōgyōsha'', "founder").
