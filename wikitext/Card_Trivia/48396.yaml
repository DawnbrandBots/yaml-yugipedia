title: Card Trivia:Fire Recovery
wikitext: |-
  {{Navigation}}

  * "[[Volcanic Scattershot]]" appears in this card's artwork.
  * The card's Japanese name, "Fire Back", is a dual-layered pun:
  ** The name is an English idiom meaning "return fire", alluding to the firearms-based designs of the "[[Volcanic]]" and "[[Blaze Accelerator]]" [[archetype]]s.
  ** The name also reflects this card's effect that can "return" a [[FIRE]] monster "back" from the player's [[Graveyard]] to the [[field]].
  * In the second line of this card's Japanese lore in the anime, the word "monster" (モンスター) is repeated twice consecutively.
