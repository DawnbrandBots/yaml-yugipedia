title: Card Trivia:Inzektor Ladybug
wikitext: |-
  {{Navigation}}

  * This card bears some resemblance to the characters of Tron and the weapons they use, Data Discs.
  * This card's weapons resemble Miranda Lotto's "Time Record" from D.Gray Man.
  ** It wields 7 disks in total: one for each shoulder, knee and hip (one of them is in his right hand) and one on the chest.
  *** Ladybugs are generally represented with 7 dots, however, the only resemblance left (aside this) is the red and black coloration.
  *** This is further evidenced by the shape of his helmet (resembling a Ladybug).
  * "Gullhö" is the short form of "gullhöna", meaning "ladybug" in Swedish.
