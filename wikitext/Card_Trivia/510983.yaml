title: Card Trivia:Magical Scientist
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Compulsory Escape Device]]", "[[DNA Checkup]]", "[[Dr. Frankenderp]]", "[[Fusion Duplication]]", "[[Iron Core Specimen Lab]]", "[[Success Probability 0%]]", and "[[Tour Bus To Forbidden Realms]]".
  ** An illustration of this monster appears on the satchet depicted in the artwork of "[[Ready Fusion]]".
  ** This monster appears to be friends with "[[Kozaky]]", as seen in the artwork of "Success Probability 0%".
  * This monster is based on the "[[wikipedia:Mad scientist|mad scientist]]" stock character, who is typically depicted as a highly intelligent but eccentric or unhinged scientist whose experiments are often dangerous and unethical.
  ** This monster's Japanese name (''Madō Saientisuto'') is a pun on the Japanese word for "magical" (''madō''), which is also homophonic with the English word "mad" (i.e. "Magical/Mad Scientist").
  * This monster is depicted with purple hair in its card artworks, though it is given brown hair in its anime appearances.
  * This monster shares similarities with "[[Cyber-Stein]]", and is a reference to the original Frankenstein:
  ** Both appear in the artwork of "Tour Bus to Forbidden Realms".
  ** Both are associated with the "mad scientist" stock character. 
  ** Both feature effects that allows the player to [[Special Summon]] a [[Fusion Monster]] from the [[Extra Deck]] by paying Life Points in multiples of 1000, which led to the creation of an [[Cyber-Stein OTK|OTK]]/[[Magical Scientist Deck|FTK]] [[Deck]] in the past, as well as leading them to become [[Forbidden]].
