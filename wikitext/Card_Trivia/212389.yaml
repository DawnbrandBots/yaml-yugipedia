title: Card Trivia:Return (card)
wikitext: |-
  {{Navigation|Return}}

  * "[[Goblin of Greed]]" and "[[Pot of Greed]]" appear in this card's artwork.
  * This card's artwork appears to be a continuation of the events on the card "[[Goblin Out of the Frying Pan]]", as the man from that card appears here, along with the cards mentioned above.
  ** The same man in this card also appears in "[[Second Coin Toss]]".
  ** This card's artwork also features "Pot of Greed" with a broken handle, similar to the one seen in the artwork of "[[Fine]]".
  * This is the first card of the ''[[Yu-Gi-Oh! ZEXAL]]'' era to be printed in ''[[Yu-Gi-Oh! Rush Duel]]''.
