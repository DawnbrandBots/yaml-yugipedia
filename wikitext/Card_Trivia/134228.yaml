title: Card Trivia:Guldfaxe of the Nordic Beasts
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Gullfaxi|Gullfaxi]], a golden-maned horse gifted to [[wikipedia:Móði and Magni|Magni]] by his father [[wikipedia:Thor|Thor]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** According to Norse mythology, Gullfaxi is said to be one of the fastest horses on land, second only to [[wikipedia:Odin|Odin's]] steed, [[wikipedia:Sleipnir|Sleipnir]], which reflects its effect to [[Special Summon]] itself if the opponent [[control]]s a [[Synchro Monster]] and the player controls no monsters.
