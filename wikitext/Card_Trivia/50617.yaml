title: Card Trivia:Contract with the Abyss
wikitext: |-
  {{Navigation}}

  * This card is the [[DARK]] counterpart of the following [[Ritual Spell]]s:
  ** "[[Breath of Acclamation]]" - [[WIND]]
  ** "[[Earth Chant]]" - [[EARTH]]
  ** "[[Sprite's Blessing]]" - [[LIGHT]]
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Contract with the Abyss]]".
  * The room in [[Zeman's castle]] containing the portal appears to be based on the artwork of this card.
  * This card's Japanese name (''Contract with Naraku'') may be a reference to [[wikipedia:Naraka (Buddhism)|Naraka]], a term in Buddhist cosmology usually referred to in English as "hell" (or "hell realm") or "purgatory".
