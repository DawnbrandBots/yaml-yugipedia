title: Card Trivia:Basic Insect
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of  "[[Giant Ballgame]]", "[[Giant Ballpark]]", "[[Insect Rampage]]", and "[[Verdant Sanctuary]]".
  * This monster has a [[recolored counterpart]]: "[[Invader from Another Dimension]]".
  * This monster has a [[retrained]] ''[[Rush Duel]]'' counterpart: "[[Swarming Basic Insect]]".
  * This monster has two combined counterparts with "[[Insect Armor with Laser Cannon]]": "[[Armored Basic Insect with Laser Cannon]]" and "[[Bio-Insect Armor]]".
  * This is the first [[Insect]] monster to appear in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * The [[Basic Insect (Bandai)|Bandai]] version of this card has 1000 [[DEF]], while the [[Konami]] version has 700 DEF.
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from {{chapter|Yu-Gi-Oh!|060|ref}}, specifically from the panel showing [[Basic Insect (manga)|this monster]] being Summoned.
