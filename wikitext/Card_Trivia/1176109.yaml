title: Card Trivia:Mind Shuffle
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Mind Scan (card)|Mind Scan]]".
  * "[[Black Chaos the Dark Chaos Magician]]" and "[[Black Luster Soldier - Soldier of Light and Darkness]]" appear in this card's artwork.
  * This card's name is derived from [[Mind Shuffle (strategy)|Mind Shuffle]], a strategy used by [[Yugi Mutou (manga)|Yugi Mutou]] and [[Dark Yugi (manga)|Dark Yugi]] to defeat [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] and bypass the mind-reading power of his [[Millennium Eye (manga)|Millennium Eye]] by using the power of the [[Millennium Puzzle (manga)|Millennium Puzzle]] to shuffle their minds in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  ** This card's artwork depicts "Black Luster Soldier - Soldier of Light and Darkness" in a solidified form and "Black Chaos the Dark Chaos Magician" in spirit form as indicated by its pinkish color scheme, referencing how Yugi and Dark Yugi use the power of the Millennium Puzzle to switch their minds and bodies in the ''Yu-Gi-Oh!'' manga and [[Yu-Gi-Oh! (anime)|anime]], where one of them will become the host of Yugi's body while the other will become a spirit.
  ** The effect requirement to return a [[Level 7]] or higher monster to the [[hand]] in response to an opponent's card or effect [[activate|activation]] is a reference to a scene from {{chapter|Yu-Gi-Oh!|127|ref}}, where Pegasus's "[[Toon Summoned Skull (manga)|Toon Summoned Skull]]" attacks the Level 7 "[[Dark Magician (manga)|Dark Magician]]" that is hiding under one of the hats from "[[Magical Hats (manga)|Magical Hats]]", only for the normal Yugi to take over with Mind Shuffle, which changes the hat that "Dark Magician" is hiding under and causes the attack to miss.
