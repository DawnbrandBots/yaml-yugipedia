title: Card Trivia:Goldilocks the Battle Landscaper
wikitext: |-
  {{Navigation}}

  * This card's name and effect is a reference to [[wikipedia:Goldilocks principle|Goldilocks principle]], a metaphorical allusion originated from the children's fairy tale ''[[wikipedia:Goldilocks and the Three Bears|Goldilocks and the Three Bears]]'' which involves finding the right balance between the two extremities for satisfactory results.
  ** In addition, this card's effect involving the center monster zone may be a reference to "Goldilocks zone", an informal term used to refer to the [[wikipedia:Circumstellar habitable zone|Circumstellar habitable zone]] in astronomy.
  * This monster appears to be based on the "Traction cities" from the ''[[wikipedia:Mortal Engines|Mortal Engines]]'' novels.
  ** This card's romaji name, "Goldilocks the Scenic Battle Metropolis", may be a reference to [[wikipedia:London|London]], the capital of the [[wikipedia:United Kingdom|United Kingdom]] that features prominently as a major "Traction city" in the ''Mortal Engines'' novels and film.
