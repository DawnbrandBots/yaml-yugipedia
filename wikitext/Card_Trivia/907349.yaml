title: Card Trivia:Branded Disciple
wikitext: |-
  {{Navigation}}

  * "[[Albion the Shrouded Dragon]]", "[[Aluber the Jester of Despia]]", and "[[Incredible Ecclesia, the Virtuous]]" appear in this card's artwork.
  ** "Aluber" is confronting "Albion" and "Ecclesia" in "[[Icejade Cenote Enion Cradle]]".
  *** This is reflected in this card's effect, as it can negate the effects of a monster with 0 [[ATK]] or [[DEF]], like "[[Fallen of Albaz]]" (which has 0 DEF), while the player controls a [[Level]] 8 or higher [[Fusion Monster]], like "[[Masquerade the Blazing Dragon]]" or the "[[Despia]]" Fusion Monsters.
  ** The events in this card's artwork are continued in the artwork of "[[Branded Lost]]".
