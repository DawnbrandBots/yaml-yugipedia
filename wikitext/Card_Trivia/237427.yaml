title: Card Trivia:Rank-Up-Magic Barian's Force
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Barian Explosion]]".
  * The [[Barian Emblem]] appears in this card's artwork.
  * This is the first "[[Rank-Up-Magic]]" introduced in the anime.
  ** It is also the most used "Rank-Up-Magic" card in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This card has a "limited" but non-[[Type]] restrictive counterpart: "[[Rank-Up-Magic Limited Barian's Force]]".
  * This card has an [[Astral World|Astral]] counterpart: "[[Rank-Up-Magic Astral Force]]".
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when a [[Spell Card]] was [[activate]]d, it glowed white. This card, instead, glowed crimson when activated by a [[Barian]] pawn. When it was activated by a Barian, it emitted a rainbow-colored light.
  * The Spanish ''[[Premium Gold: Return of the Bling]]'' print of this card has a minor errata, spelling the word "''al''" as "''val''".
