title: Card Trivia:Brilliant Rose
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of "Crystal Rose", as indicated by their identical [[Attribute]]s ([[LIGHT]]), [[Level]] (2), [[Type]] ([[Rock]]), and [[original ATK and DEF]] (500/500), as well as featuring similar names, similar effects, and mirrored poses.
  ** This monster references the two monsters used together by [[Julia Krystal]] in {{episode|ARC-V|029|ref}}: "[[Crystal Rose]]" and "[[Gem-Knight Lady Brilliant Diamond]]".
  * This monster has a [[Fusion Monster|fused form]] with "[[Gem-Knight Quartz]]": "[[Gem-Knight Lady Rose Diamond]]".
