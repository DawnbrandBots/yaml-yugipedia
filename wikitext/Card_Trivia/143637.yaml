title: Card Trivia:Emissary of Darkness Token
wikitext: |-
  {{Navigation}}

  * This token was originally a monster card in the ''Yu-Gi-Oh! R'' manga, "[[Kaien the Emissary of Darkness]]", which was summoned alongside "[[Gorz the Emissary of Darkness]]" in [[Yugi Muto]]'s duels against [[Yako Tenma]] and [[Masumi Momono]].
  * "Kaien the Emissary of Darkness" and "Gorz the Emissary of Darkness" are each different genders and are both played by Yugi, similar to "[[Dark Magician]]" and "[[Dark Magician Girl]]".
