title: Card Trivia:Soldier Ari
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Multiplication of Ants]]".
  ** Curiously, unlike "Multiplication of Ants", this card has not been released in the ''[[OCG]]''/''[[TCG]]'' yet; however, it can [[Special Summon]] multiple copies of "[[Army Ant Token]]" with the same [[original ATK and DEF]] (500/1200) as this monster.
  * The second portion of this monster's ''TCG'' name is based on 「蟻」 (''ari'' "ant").
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], and in the ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'' videogame, this card is [[Level 4]]; however, in the ''Yu-Gi-Oh!'' Game Boy Advance games, it is Level 3 instead.
