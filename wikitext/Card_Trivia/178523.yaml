title: Card Trivia:Evilswarm Castor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Constellar Meteor]]" (uncorrupted), "[[Constellar Star Cradle]]", and "[[Ordeal of the Hero]]".
  ** In "Constellar Star Cradle", it is missing the red "lswarm" symbol from its hip plate.
  * This monster is based on [[wikipedia:Castor (star)|Castor]], the second-brightest star in the constellation of [[wikipedia:Gemini (constellation)|Gemini]].
  ** The constellation and the astrological sign for [[wikipedia:Gemini (astrology)|Gemini]] (♊︎︎) appears in the background of this card's artwork.
  * This monster is the "[[lswarm]]" counterpart of "[[Constellar Pollux]]".
  ** According to the [[Duel Terminal Master Guide card storylines|''Duel Terminal Master Guide'' card storylines]], "Castor" and "Pollux" are brothers who govern the constellation Gemini together.
  * This monster has a purified "[[Constellar]]" form: "[[Constellar Castor]]".
  ** Unlike the original form of "Castor" that appears in "Constellar Meteor", "Constellar Castor" retains similar features as this monster (an altered horn, curved spikes, and facial scars).
