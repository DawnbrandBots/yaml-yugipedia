title: Card Trivia:Mokey Mokey
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[1-Up]]", "[[D/D Reroll]]", "[[D.D. Trap Hole]]", "[[Dark Factory of Mass Production]]", "[[Dark Factory of More Production]]", "[[Floodgate Trap Hole]]", "[[Human-Wave Tactics]]", "[[Mokey Mokey King]]", "[[Shipping Error]]", "[[Surprise Chain]]", "[[Symbols of Duty]]", "[[The Law of the Normal]]", "[[The League of Uniform Nomenclature]]", "[[The League of Uniform Nomenclature Strikes]]", "[[The Return to the Normal]]", "[[The Toil of the Normal]]", "[[Treaty on Uniform Nomenclature]]", and "[[Trick Buster (manga)|Trick Buster]]".
  ** This monster appears in its enraged state in the artworks of "[[A Major Upset]]", "Dark Factory of More Production", "[[Mokey Mokey Smackdown]]", "Shipping Error", "Surprise Chain", and "[[The Revenge of the Normal]]".
  ** This monster's antenna appears in the artwork of "[[Peeking Goblin]]".
  ** Images of this monster appear on the uniforms, boxes, and truck shown in "Shipping Error", and "Surprise Chain".
  * This monster has a [[retrained]] counterpart: "[[Mokey Mokey Adrift]]".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "Mokey Mokey King".
  * This monster's [[flavor text]] stating that it sometimes gets mad and that is dreadful is a reference to the effect of "Mokey Mokey Smackdown" (whose artwork depicts this monster enraged) to make the [[ATK]] of all copies of this monster the player [[control]]s become 3000 until the end of the turn, if a [[face-up]] [[Fairy]] monster the player controls is [[destroy]]ed while they control "Mokey Mokey Smackdown".
