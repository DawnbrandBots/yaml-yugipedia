title: Card Trivia:Supreme King Dragon Starving Venom
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Theme Pack: Dragon Sword Trail]]''.
  * This monster appears in the artwork of "[[Soul of the Supreme King]]".
  * This monster is the "[[Supreme King Dragon]]" corrupted [[counterpart]] of "[[Starving Venom Fusion Dragon]]".
  ** This is the only "Supreme King Dragon" monster that is a counterpart of one of the [[Four Dimensional Dragons]] to not be [[Summon]]ed by its own [[effect]].
  *** Due to this, it is also the only one to not have an onscreen [[Summon chant]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, as well as the only "Supreme King Dragon" monster not to have its own main focus episode.
  ** This is the only "Supreme King Dragon" monster that cannot be [[Special Summon]]ed by the effect of "[[Supreme King Z-ARC]]".
  * In the anime, when this monster [[activate]]s its effect-stealing effect, it is revealed to have an extra mouth on its chest.
  * In the anime, this card is the first [[Fusion Monster]] that can [[Fusion Summon]] itself with its own effect.
