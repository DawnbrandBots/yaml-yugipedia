title: Card Trivia:Spirit of Yubel
wikitext: |-
  {{Navigation}}

  * The castle of the [[Duel Monsters Spirit World]] appears in this card's artwork.
  ** In {{episode|GX|155|ref}}, the castle was where [[Yubel (character)|Yubel]], as a human, volunteered to be [[the Supreme King]]'s guardian as a [[Duel Monster Spirit]] after a discussion with the [[King (character)|king]] at the time.
  * This monster is a retrained [[counterpart]] of "[[Yubel]]".
  ** This monster shares a similar naming scheme and strikes a pose similar to that of "[[Elemental HERO Spirit of Neos]]", the retrained counterpart of "[[Elemental HERO Neos]]", the [[ace monster]] of [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** Incidentally, both this monster and "Elemental HERO Spirit of Neos" share a couple of similar monster [[effect]]s.
  **** Both cards are able to [[Special Summon]] themselves from the [[hand]] when an opponent declares an [[attack]] and prevent themselves from being [[destroy]]ed by [[battle]].
  **** Upon being Special Summoned, both cards can allow the player to [[add a card|add]] 1 [[Spell Card|Spell]]/[[Trap Card|Trap]] that [[mentions]] a card that is a member of their respective [[archetype]]s (an "Elemental HERO" card's name for "Elemental HERO Spirit of Neos" and "Yubel" for this card).
