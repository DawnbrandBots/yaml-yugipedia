title: Card Trivia:Photon Papilloperative
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name, "Photon Papilloperative", is a portmanteau of [[wikipedia:Butterfly|"papillon"]] (the French word for "butterfly"), and "[[wikipedia:Espionage|operative]]" (a secret agent who carries out espionage missions).
  * This card is the first "[[Photon]]" [[Xyz Monster]] to be [[Xyz Summon]]ed in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This card is also the first "Photon" monster to not be Summoned by [[Kite Tenjo]], who primarily uses the "Photon" [[archetype]] in the anime.
