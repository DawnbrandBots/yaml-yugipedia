title: Card Trivia:Metal Plus
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[The Snake Hair]]" appears in this card's artwork.
  ** This card's artwork likely references the myth of [[wikipedia:Perseus|Perseus]], a hero in [[wikipedia:Greek mythology|Greek mythology]] who battles the [[wikipedia:Gorgon|Gorgon]] [[wikipedia:Medusa|Medusa]], whose gaze transforms people into stone. Perseus uses a polished shield to reflect Medusa's gaze back at her, allowing him to behead her.
  * This card's [[Spell Card]]-negating effect references the earliest version of "[[Metalmorph (manga)|Metalmorph]]" (or "[[Magic Metal Force]]"), which makes the [[equip]]ped monsters immune to magical attacks.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this card, being a more powerful version of "Metalmorph" is used on "[[Red-Eyes Darkness Dragon (anime)|Red-Eyes Darkness Dragon]]", a more powerful version of "[[Red-Eyes B. Dragon (later anime)|Red-Eyes Black Dragon]]". This references the usage of "Metalmorph" ("Magic Metal Force") in the [[Yu-Gi-Oh! (manga)|original]] [[Yu-Gi-Oh! (anime)|series]], where it was equipped to [[Joey Wheeler]]'s "[[Red-Eyes B. Dragon (anime)|Red-Eyes Black Dragon]]".
  *** The above-mentioned facts are further alluded by the [[Summoning condition]]s and the Spell Card immunity effect of "[[Red-Eyes Darkness Metal Dragon (anime)|Red-Eyes Darkness Metal Dragon]]" in the anime. In the original series, "Red-Eyes Black Dragon" transforms into "[[Red-Eyes Black Metal Dragon (manga)|Red-Eyes Black Metal Dragon]]" under the effect of "Metalmorph", causing it to be immune to magical attacks.
