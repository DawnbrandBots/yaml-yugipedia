title: Card Trivia:Candle of Fate
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Hand of Glory|Hand of Glory]], the dried and pickled hand of a hanged criminal.
  ** This card's artwork depicts the hand set in a candleholder holding a burning wick, referencing the Old European beliefs that the Hand of Glory, when combined with a candle made up of the criminal's fat, would posses the power to render anyone that it is presented to motionless.
