title: Card Trivia:Binary Sorceress
wikitext: |-
  {{Navigation}}

  * This card's name refers to a [[wikipedia:Binary code|binary code]], which is further reinforced with this monster having 2 [[Link Arrow]]s (binary codes use 2 numbers: 1 and 0).
  ** In this monster's Japanese name, "Binal" means "double" or "twofold".
  * "[[Tri-Gate Wizard]]" seems to be a counterpart to this card: a magician-based [[EARTH]] [[Cyberse]] [[Link Monster]] whose name refers to how many Link Arrows it has (In "Wizard's" case, 3).
