title: Card Trivia:Bujingi Wolf
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * Taruta is based on another of the Tokusa-no-Kandakara, the Tarutama (Jewel of Plenty). This is apparently a jewel which makes armour its form, which means it turns into armour. Taruta features many jewels on his armour, mostly different coloured magatama.
  ** It is rumored to be an armour that could change its form based on any battle situation the bearer requires.
  * This monster appears in its armament form in "[[Bujincarnation]]" and "[[Bujintei Susanowo]]".
  * So far, the Spanish printed lore has a small errata, as the "''cannot be destroyed''" part doesn't take into account that "''monsters''" is a plural noun.
