title: Card Trivia:Gearspring Spirit
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Shikigami|shikigami]], a type of spirit found in [[wikipedia:Japanese folklore|Japanese folklore]].
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card can be [[Special Summon]]ed by removing three [[Gearspring Counter]]s; however, since this card is released in the ''[[OCG]]''/''[[TCG]]'' without the other "[[Gearspring]]" cards, its effect no longer involves Gearspring Counters.
