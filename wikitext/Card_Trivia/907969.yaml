title: Card Trivia:Doombearer Psychopompos
wikitext: |-
  {{Navigation}}

  * "[[Soul-Absorbing Bone Tower]]" appears in this card's artwork, with "[[Zombie World]]" also appearing in the background.
  * This card is based on a [[wikipedia:Psychopomp|psychopomp]], a creature, spirit, angel, or deity in many religions whose responsibility is to escort newly deceased souls from Earth to the afterlife.
  * "[[Doomking Balerdroch]]" has similar patterns on its body as this monster does on its robe, implying a relationship between the two.
