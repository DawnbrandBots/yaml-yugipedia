title: Card Trivia:Mu
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is a counterpart of "[[Beeton (MCBB)|Beeton]]", as it has the same appearance as that monster, except with a different color scheme, fancier eyebrows, and different [[wikipedia:Iris (anatomy|irises]].
  ** This is supported by the fact that this monster has one of the abilities that [[Beeton]] had in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'' manga]] (Endure), while "Beeton" has the other (Curl Up).
