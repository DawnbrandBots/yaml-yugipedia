title: Card Trivia:The Phantom Knights of Tomb Shield
wikitext: |-
  {{Navigation}}

  * This card is the first [[Level 3]] "[[The Phantom Knights]]" [[Trap Monster]].
  * This card and "[[The Phantom Knights of Shade Brigandine]]" are the first [[Trap Monster]]s that are not simultaneously treated as Traps when Special Summoned that can Special Summon themselves directly from the Spell & Trap Zone as monsters upon activation, akin to a [[Trap Monster]], rather than having to be sent to the Graveyard first.
