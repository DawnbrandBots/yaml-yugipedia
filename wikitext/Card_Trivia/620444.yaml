title: Card Trivia:R - Righteous Justice
wikitext: |-
  {{Navigation}}

  * The yellow letter "R" in this card's artwork appears in the artworks of "[[H.E.R.O. Flash!]]" and "[[Hero Flash!!]]".
  * Despite being used multiple times in the anime, this card was never successfully [[activate]]d.
  ** This card shares this distinction with "[[Battle Break]]", "[[Sakuretsu Armor]]", and "[[Vacua Annihilation]]".
