title: Card Trivia:Red-Eyes Soul
wikitext: |-
  {{Navigation}}

  [[File:Rocket_Warrior_weakens_Red-Eyes.png|thumb|right|180|"Red-Eyes Black Dragon" losing its wing from the attack of "[[Rocket Warrior (manga)|Rocket Warrior]]".]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * This card appears in the artwork of "[[Dark Time Wizard]]".
  * This monster's design is based on the appearance of "[[Red-Eyes Black Dragon (manga)|Red-Eyes Black Dragon]]" in {{chapter|Yu-Gi-Oh!|260|ref}}, specifically from the panel depicting its sudden appearance during [[Dark Yugi (manga)|Dark Yugi]] and [[Seto Kaiba (manga)|Seto Kaiba's]] Duel, via the effect of "[[The Flute of Summoning Dragon (manga)|The Flute of Summoning Dragon]]".
  ** This monster's name is based on the title of the aforementioned chapter of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  ** However, unlike in the manga, this monster is depicted with its left arm and left wing missing. This detail, and this monster's 900 [[ATK]], reference [[Yugi Mutou and Brainwashed Jonouchi's Duel (manga)|Yugi Mutou and Brainwashed Jonouchi's Duel]] in the ''Yu-Gi-Oh!'' manga (and its [[Yugi Muto and Brainwashed Joey's Duel|anime]] counterpart) where [[Katsuya Jonouchi (manga)|Katsuya Jonouchi's]] "[[Rocket Warrior (manga)|Rocket Warrior]]" attacks and damages "Red-Eyes Black Dragon", causing its 2400 ATK to be reduced by 1500, as well as it losing its left arm, its left wing.
  * This monster's effects also reference the above inspirations for this monster's design:
  ** Its effect to [[Special Summon]] references a scene from the aforementioned chapter, where "Red-Eyes Black Dragon" was Summoned from Dark Yugi's hand via "The Flute of Summoning Dragon".
  ** Its [[Quick Effect]] to inflict damage to the opponent equal to the [[original ATK]] of "Red-Eyes Black Dragon" references a scene from {{chapter|Yu-Gi-Oh!|198|ref}}, where Yugi's damaged "Red-Eyes" attacked Joey directly in response to the latter's plea, even though Joey had already won the Duel during his own turn.
  *** This effect was also likely influenced by the effects of pre-existing cards, such as "[[Inferno Fire Blast]]", "[[Red-Eyes Black Flare Dragon]]", and "[[Red-Eyes Burn]]".

