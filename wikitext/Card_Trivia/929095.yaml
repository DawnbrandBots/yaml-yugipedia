title: Card Trivia:Earth Sorcerer
wikitext: |-
  {{Navigation}}

  * This monster may be based on the orange copy of "Dark Sorcerer" that appears in the artwork of "[[Magiquartet Shock]]".
  * This monster has five counterparts:
  ** 1 [[DARK]] counterpart: "[[Dark Sorcerer]]"
  ** 1 [[LIGHT]] counterpart: "[[Light Sorcerer]]"
  ** 1 [[WATER]] counterpart: "[[Aqua Sorcerer]]"
  ** 1 [[FIRE]] counterpart: "[[Flare Sorcerer]]"
  ** 1 [[WIND]] counterpart: "[[Aero Sorcerer]]"
