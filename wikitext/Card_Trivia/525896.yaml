title: Card Trivia:Proton Blast
wikitext: |-
  {{Navigation}}

  [[File:Proton Blast.png|thumb|right|250px|"[[Barrel Dragon (manga)|Barrel Dragon]]" attacks "[[Thousand Dragon (manga)|Thousand Dragon]]".]]

  * "[[Barrel Dragon]]" appears in this card's artwork.
  * This card appears in the artwork of "[[Dark Time Wizard]]".
  * This card's name is based on the [[attack name]] of "[[Barrel Dragon (anime)|Barrel Dragon]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This card's bulleted effects are based on the appearance of "Barrel Dragon" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and anime.
  ** This card's first two bulleted effects reference a scene during [[Joey Wheeler and Bandit Keith's Duel]] where [[Bandit Keith]] uses the effect of "Barrel Dragon" to make multiple attacks up to the number of successful roulette spins. Two out of three spins succeeded and "Barrel Dragon" attacks and [[destroy]]s [[Joey Wheeler]]'s "[[Garoozis (anime)|Garoozis]]" and "[[Axe Raider (anime)|Axe Raider]]" at the same time.
  *** This card's first bulleted effect inflicts 500 damage, while Joey only took 300 damage in the aforementioned scene.
  *** This card's second effect is also similar to the ''[[OCG]]''/''[[TCG]]'' effect of "Barrel Dragon".
  ** This card's third bulleted effect is likely a reference to "[[Pillager]]", a [[Spell Card]] used by Bandit Keith that forced the opponent to [[reveal]] their [[hand]] and allowed him to take one card from their hand.

