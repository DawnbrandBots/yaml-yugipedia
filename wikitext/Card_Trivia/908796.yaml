title: Card Trivia:Thunderspeed Summon
wikitext: |-
  {{Navigation}}

  * This card references Yugi's repeated use of "[[Jack's Knight]]", "[[Queen's Knight]]", and "[[King's Knight]]" to quickly assemble three [[Tribute]]s in order to [[Tribute Summon]] the [[Egyptian God Card]]s in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]]. In the manga, Yugi only Summoned "[[Slifer the Sky Dragon (manga)|Slifer the Sky Dragon]]" this way, while in the anime, he used these cards to Tribute Summon both "[[Slifer the Sky Dragon (anime)|Slifer the Sky Dragon]]" and "[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]".
  ** This card's alternate effect to [[add]] from the [[Deck]] to the [[hand]] and immediately [[Normal Summon]] a [[Level 10]] non-[[DARK]] monster with ? [[ATK]] is designed to add and Summon "[[Slifer the Sky Dragon]]" or "[[The Winged Dragon of Ra]]".
  *** This card's effect excluding Level 10 DARK monsters with ? ATK reference the "[[The Wicked Avatar]]" or "[[The Wicked Eraser]]", two members of the [[Wicked God]] cards in the ''[[Yu-Gi-Oh! R]]'' manga which both feature ? ATK.
