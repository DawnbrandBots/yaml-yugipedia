title: Card Trivia:Tongue Twister
wikitext: |-
  {{Navigation}}

  * This is one of three monsters designed by fans in the ''Yu-Gi-Oh! Design Your Destiny Card Contest'' held by [[Upper Deck Entertainment]] and [[4Kids]] that were made as real cards featured in ''[[Gladiator's Assault]]'', the other two being "[[Dragon Ice]]" and "[[Skreech]]".
  ** Only the artworks were submitted, and nothing else, as confirmed in a [http://www.pojo.biz/board/showthread.php?p=16346698#post16346698 post] by Jerome McHale.
  ** This monster was the winner of the 3-7 age division in that contest. The artist was Shamus B. of Farmington, New York.
  * This is one of several ''[[TCG]]''-[[TCG-only|exclusive]] cards to appear in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, the others being "[[Battlestorm (anime)|Battlestorm]]", "[[Grapple Blocker (anime)|Grapple Blocker]]", and "[[Wind-Up Zenmaines (anime)|Wind-Up Zenmaines]]".
