title: Card Trivia:Orcustrated Babel
wikitext: |-
  {{Navigation}}

  * This tower appears in the artworks of "[[World Legacy - "World Wand"]]", "[[Orcustrated Einsatz]]", and "[[Orcustrated Core]]".
  ** The ruins of this tower appear in the artwork of "[[Dingirsu, the Orcust of the Evening Star]]", both in the background and as part of that monster's armor.
  ** As shown in its card artwork, "World Legacy - "World Wand"" is attached at the top of this tower.
  * This card is based on the [[wikipedia:Tower of Babel|Tower of Babel]], a mythological tower featured in the [[wikipedia:Book of Genesis|Book of Genesis]] from the [[wikipedia:Hebrew Bible|Hebrew Bible]] and the Christian [[wikipedia:Old Testament|Old Testament]]. According to the story, the people of [[wikipedia:Shinar|Shinar]] rebelled against [[wikipedia:God|God]] by building a tower (a false temple) that would reach [[wikipedia:Heaven|Heaven]]. This act caused God to disrupt their work by confusing their language, so that they could not understand their speech and they were dispersed all over the world.
