title: Card Trivia:Borrelcode Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Burst of Destiny]]''.
  * This monster is a "[[Topologic]]"-[[support]]ing counterpart of "[[Borreload Dragon]]".
  ** This monster's design is based on the visual designs of "[[Topologic Trisbaena]]", and shares the same [[Attribute]] ([[DARK]]), [[Link Arrow]]s, [[original ATK]] (2500), [[Link Rating]] (3), and [[Summoning condition]] (2+ [[Effect Monster]]s).
  ** This monster's waist is similar to that of "[[Topologic Bomber Dragon]]", while its backpack is similar to that of "[[Topologic Gumblar Dragon]]"
  * This monster's name references how most of the "Topologic" monsters (except for "Topologic Gumblar Dragon") featured the word "Code" in their [[Attack and effect names in Yu-Gi-Oh! VRAINS|attack names]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
