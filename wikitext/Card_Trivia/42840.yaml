title: Card Trivia:D Cubed
wikitext: |-
  {{Navigation}}

  * This monster's name and effect to [[Special Summon]] two more copies of itself from the [[Deck]] is a reference to a mathematical [[wikipedia:Cube (algebra)|cube]], the product of a number multiplied by itself three times, which is represented by the subscript of 3 (<i>n</i>³).
  * This monster has an "[[Elemental HERO]]" [[counterpart]]: "[[Wroughtweiler]]".
  ** Both monsters are used as support for their respective "[[HERO]]" archetypes.
  ** Both monsters' designs are each based on a feline and canine, which are often depicted in popular culture as having rivalrous or antagonistic relationships with each other. Fittingly, their owners&mdash;[[Jaden Yuki]] and [[Aster Phoenix]], respectively&mdash;have a rivalry in the ''[[Yu-Gi-Oh! GX]]'' anime.
