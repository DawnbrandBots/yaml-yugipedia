title: Card Trivia:Blackwing - Steam the Cloak
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectors Pack: Duelist of Legend Version]]''.
  * This monster's is based on [[wikipedia:steam|steam]], a state of water in its gaseous stage due to vaporization, which is reflected in this card's effect of [[Special Summon]]ing a "[[Steam Token]]" after it leaves the field.
