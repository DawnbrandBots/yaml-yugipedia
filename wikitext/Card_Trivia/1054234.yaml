title: Card Trivia:Lord of the Tachyon Galaxy (card)
wikitext: |-
  {{Navigation}}

  [[File:TachyonTransmigration-GalaxyEyes.png|thumb|250px|"[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]" using "[[Attack and effect names in Yu-Gi-Oh! ZEXAL|Tachyon Transmigration]]" against "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]".]]

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * "[[Galaxy-Eyes Photon Dragon]]" and the [[neutral form]] of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|83|ref}}, where [[Mizar]] activates the effect of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]" against [[Kite Tenjo]]'s "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]".
  * This card's name references the [[Core Booster]] [[Booster pack|pack]] ''[[Lord of the Tachyon Galaxy]]'', which first introduced "Number 107: Galaxy-Eyes Tachyon Dragon" to the ''[[OCG]]''/''[[TCG]]''.

