title: Card Trivia:Speedroid Ultra Hound
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Ultra Hand|Ultra Hand]], a toy consisting of several criss-cross-connected plastic elements.
  ** This monster's ''[[TCG]]'' name, "Ultra Hound", is a pun on "Ultra Hand" and "hound".
  ** This monster's Japanese name, "Magic Hound" (マジックハウンド, ''Majikkuhaundo''), is a pun on "Magic Hand" (マジックハンド, ''Majikkuhando''), a similar type of tool that allows grabbing objects over long distances.
