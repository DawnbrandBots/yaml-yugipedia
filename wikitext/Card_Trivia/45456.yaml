title: Card Trivia:"A" Cell Scatter Burst
wikitext: |-
  {{Navigation}}

  * An [[A-Counter]] appears in this card's artwork.
  * This card's Spanish print uses the English ''[[TCG]]'' name of the "[[Alien]]" archetype instead of the Spanish one ("''Alienígena''"). It also uses the world "''celda''" instead of "''célula''" for "''cell''", likely suggesting that the card was machine translated from English to Spanish.
