title: Card Trivia:Small World
wikitext: |-
  {{Navigation}}

  * "[[S-Force Justify]]" appears in this card's artwork.
  ** This may be a reference to the synergy this card has with the "[[S-Force]]" theme, as its members are diverse enough that this card can search all of them, and doesn't have to reveal non-"S-Force" monsters to do so.
  * This card is based on the concept of a [[wikipedia:small-world network|small-world network]]: in a graph composed of an arbitrarily large number of dots randomly connected by lines, it is very likely that a path between any two dots can be achieved by chaining a very small number of those lines. In this case, each card is a dot, lines are relationships of having exactly 1 stat in common, and the challenge is finding a second-degree separation.
