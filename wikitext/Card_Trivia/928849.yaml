title: Card Trivia:Vernusylph Corolla
wikitext: |-
  {{Navigation}}

  * "[[Vernusylph of the Flowering Fields]]" and "[[Vernusylph of the Flourishing Hills]]" appear in this card's artwork.
  * This card's Japanese name, 「{{Ruby|春|はる}}{{Ruby|化|け}}{{Ruby|精|しょう}}の{{Ruby|花|はな}}{{Ruby|冠|かんむり}}」 (''Harukeshō no Hanakanmuri''), has a non-standard reading for 「花冠」 (''kakan'', "[[wikipedia:Petal|corolla]]"; literally "flower crown"), in order to disassociate its meaning from "corolla" and associate it with the meaning of "flower crown" or "wreath".
