title: Card Trivia:Tri-Brigade Ferrijit the Barren Blossom
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Opening]]", "[[New Frontier]]", "[[Tri-Brigade (card)|Tri-Brigade]]", "[[Tri-Brigade Showdown]]", "[[Tri-Brigade Stand-Off]]", "[[Tri-Brigade Revolt]]", "[[Tri-Brigade Oath]]", and "[[Triple Tactics Thrust]]" (2nd artwork).
  * "Ferrijit" may be a portmanteau of the words ''[[wikipedia:Felidae|felidae]]'' and ''[[wikipedia:Bayonet|baïonnette]]'' (French for bayonet, this monster's weapon); "Barren Blossom" is an idiom synonymous with "all bark and no bite".
  * This monster's concept art notes the following:
  ** She is based on a lynx or a caracal.
  ** She is the strong-willed mentor of the "Tri-Brigade" archetype.
  ** Her goggles have lenses that can be stacked on for various benefits.
  ** Her gold, cat-like eyes glow in the dark.
  ** She wears two good luck earrings on her right ear.
  * According to the concept art of "[[Tri-Brigade Kitt]]", this monster is her older sister.
  * [[Enako]] cosplayed as this monster during the July 2025 ''OCG Times'' livestream while she presented the "[[Tri-Brigade]]" cards for ''[[Doom of Dimensions]]''.
