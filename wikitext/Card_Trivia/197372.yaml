title: Card Trivia:Photon Sanctuary
wikitext: |-
  {{Navigation}}

  * This card was made to support the summoning of "[[Galaxy-Eyes Photon Dragon]]", as it can be Tribute Summoned or Special Summoned with its own effect by tributing the 2 "[[Photon Token]]s".
  * This card can be seen as LIGHT counterpart to "[[Fires of Doomsday]]".
