title: Card Trivia:Aromage Bergamot
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Aroma Gardening]]" and "[[Dried Winds]]".
  * This monster is named after "bergamot", the alternate name for the  ''[[wikipedia:Monarda didyma|Monarda didyma]]'', an aromatic herb with bright red flowers that bloom in summer with a similar aroma of the [[wikipedia:Bergamot orange|bergamot orange]].
