title: Card Trivia:Future Destruction
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The cards "[[Insect Knight]]", "[[Jar of Greed]]", "[[Mask of Darkness]]", "[[Pot of Avarice]]", and "[[Reload]]" appear in this card artwork.
  ** With the exception of "Insect Knight", all of the aforementioned cards feature effects that [[add]]s cards to the player's [[hand]].
  * This card's name reflects its effect to [[mill]] the player's [[Deck]] equal to the number of cards in their hand, thus "destroying" any chance of drawing any useful cards in their next [[Draw Phase]]s in the "future".
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this card was used by [[Aporia]] to mill his Deck until he had no cards left, and then activated the effect of "[[Afterglow (anime)|Afterglow]]" to add another copy for him to draw on his next Draw Phase. This represents Aporia's transition from despair to hope, as well as his attempt to prevent [[Z-one]] from destroying [[New Domino City]] by defeating him with the effect of "Afterglow", a card which represented his hope for a better future.
