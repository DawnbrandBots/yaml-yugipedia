title: Card Trivia:Borreload Fatalflare Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[Fusion Monster|Fusion]] [[counterpart]] of "[[Borreload Dragon]]".
  ** Visually, this monster appears to be a Fusion of "Borreload Dragon" and "[[Decode Talker]]", which can be used as [[Fusion Material]]s for this monster's [[Fusion Summon]]. This monster's design features purple electronic lines and humanoid hands similar to those of the latter, while its effect to increase its [[ATK]] by 500 is based on the first effect of "Decode Talker".
  *** This is a reference to the relationship between [[Roken Kogami]] and [[Yusaku Fujiki]], who used "[[Borreload Dragon (anime)|Borreload Dragon]]" and "[[Decode Talker (anime)|Decode Talker]]", respectively, in the ''[[Yu-Gi-Oh! VRAINS]]'' anime. Despite never accepting him as a friend, Roken ended up disclaiming Yusaku as an enemy and gifting him with "[[Borreload Furious Dragon (anime)|Borreload Furious Dragon]]" (another Fusion counterpart of "Borreload Dragon") before Yusaku's final Duel with [[Ai]].
  *** This monster also shares similarities with "[[Firewall Dragon]]", Yusaku's main [[signature card]] and rival to "Borreload Dragon", including similar design elements (i.e. a pointed face, slender clawed feet, the placement of its armor plating, similar-shaped wing membranes, and the visible areas of electronic lines beneath its armor), and an [[original ATK]] of 2500. Additionally, this monster's pose is similar to that of "Firewall Dragon" in its second alternate artwork, albeit mirrored.
  **** "FF" in this monster's Japanese name likely reference "[[Borreload Furious Dragon]]" (which similarly has "F" in its Japanese name) and "Firewall Dragon" (whose name starts with the letter F).
