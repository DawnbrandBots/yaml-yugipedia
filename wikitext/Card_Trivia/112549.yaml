title: Card Trivia:Electromagnetic Bagworm
wikitext: |-
  {{Navigation}}

  * The first portion of this monster's Japanese name, "Sackträger Magnet", is based on the German word for "[[wikipedia:Bagworm|bagworm]]".
  ** This monster's design and naming scheme is based on the stuff of the bagworm to cover itself in silk and other materials. This is further reflected in its models [[:File:ElectromagneticBagworm-WC10-EN-VG-NC.png|in the video games]], which features a small metallic body that covered with [[wikipedia:Motherboard|motherboards]], a [[wikipedia:Video card|video card]] and several other electronic devices, such as DVD players, stereo speakers, and TV monitors.
  *** When this monster is destroyed in battle, its coverings fall off, revealing its small metallic body.
  *** In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', one of the monitors in this monster's three-dimensional model features an image of a [[:File:ElectromagneticBagworm-DOR-EN-VG-NC.png|dancing frog]] on it.
