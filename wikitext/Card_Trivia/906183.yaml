title: Card Trivia:Nemleria Dream Defender - Oreiller
wikitext: |-
  {{Navigation}}

  * "[[Dream Tower of Princess Nemleria]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Nemleria Louve]]".
  * This monster is named after ''Oreiller'', the French word for "pillow".
  * According to [[The Valuable Book EX 4 card storylines|''The Valuable Book EX 4'' card storylines]], this monster is a bodyguard, trying to protect "[[Dreaming Nemleria]]" from being woken up by "[[Nemleria Dream Devourer - Reveil]]".
