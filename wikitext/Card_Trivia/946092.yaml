title: Card Trivia:Globerman
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is likely based on the giant from the fairy tale, ''[[wikipedia:Tom Thumb|Tom Thumb]]''.
  ** Fittingly, this monster can be [[Special Summon]]ed via the effect of "[[Giant's Training]]", which requires the player to [[Tribute]] "[[Tom Thumb]]".
  ** This monster's Japanese name is possibly an attempt to adapt the German word "größer" (which means "big", "grand", or "great" in English), albeit with the mistake of treating the German letter "ß" as the English letter "B".
