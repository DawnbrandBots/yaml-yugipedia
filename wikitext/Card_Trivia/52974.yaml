title: Card Trivia:Gate Blocker
wikitext: |-
  {{Navigation}}

  * This card appears in the international artwork of "[[Doom Gazer]]".
  * This monster has an [[Card evolutions|upgraded]] version: "[[Gate Blocker 2]]".
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster is restricted and can only be played by [[Sector Security]] officers in Pursuit Duels, and only with a Security Deck.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[negate]] the effects of [[Field Spell Card]]s and prevent the opponent from placing [[counter]]s on the [[field]] is based on its anime effect to restrict the opponent's usage of the Field Spell Card, "[[Speed World]]", which allows each player to gain a [[Speed Counter]] during each player's [[Standby Phase]].
