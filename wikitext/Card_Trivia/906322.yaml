title: Card Trivia:Dogmatika Alba Zoa
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dogmatikamatrix]]".
  * "[[Despia, Theater of the Branded]]" appears in this card's artwork.
  * "[[Dogmatika Maximus]]" → "[[Dramaturge of Despia]]" → "Dogmatika Alba Zoa" → "[[Bystial Dis Pater]]"
  ** This card is named after ''[[wikipedia:Vala, or The Four Zoas|The Four Zoas]]'', a series of prophetic books written by the poet [[wikipedia:William Blake|William Blake]]. The Zoas refer to four godlike beings that were born when the primordial man [[wikipedia:Albion (Blake)|Albion]] was divided fourfold.
  * This card is the first Ritual Monster to restrict what kind of card it can be [[Ritual Summon]]ed by.
