title: Card Trivia:Analyze Phlogiston
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Maddox - Chemist-Meow Draw of Flames!]]''.
  * This monster appears in the artwork of "[[Blue Burning]]".
  * This monster is named after [[wikipedia:Phlogiston theory|phlogiston]], a substance supposed by 18th-century chemists to exist in all combustible bodies, and to be released in combustion.
