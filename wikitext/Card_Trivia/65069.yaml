title: Card Trivia:Neo-Spacian Glow Moss
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Contact Out]]", "[[Hope for the Future]]", "[[NEX]]", "[[NEXT]]", and "[[Neospace Wave]]".
  * This monster has an [[NEX|extended]] form: "[[Neo-Spacian Twinkle Moss]]".
  ** This monster appears mostly androgynous, but "Neo-Spacian Twinkle Moss" has a feminine appearance, suggesting this monster is also female.
  * This monster has the lowest [[original ATK]] (300) of all "[[Neo-Spacian]]" monsters.
