title: Card Trivia:Plunder Patrollship Lys
wikitext: |-
  {{Navigation}}

  * This card is possibly named after 1 of the French Navy ships named ''[[wikipedia:French ship Lys|Lys]]''.
  ** In addition, "lys" is the Norwegian word for [[LIGHT]], which is this card's [[Attribute]].
  * This monster appears in the artworks of "[[Plunder Patroll Shipshape Ships Shipping]]", "[[Pride of the Plunder Patroll]]", and "[[Blackeyes, the Plunder Patroll Seaguide]]".
  ** A [[wikipedia:Pirate ship (ride)|swinging ship]] based on this card also appears in the artwork of "[[Amaze Attraction Viking Vortex]]".
