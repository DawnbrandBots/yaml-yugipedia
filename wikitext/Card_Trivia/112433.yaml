title: Card Trivia:Temple of the Sun
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Coricancha|Coricancha]], a temple in the [[wikipedia:Inca Empire|Inca Empire]] that was dedicated to the Inca sun god, [[wikipedia:Inti|Inti]].
  * The temple in this card's artwork is likely a reference to the [[Stairway to the Dragon Star]], a temple that was hidden underneath [[Rex Goodwin]]'s [[Goodwin Mansion|mansion]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime. Fittingly, this card was also released along with Rex Goodwin's cards in the [[Core Booster|Core Booster pack]], ''[[Absolute Powerforce]]''.
