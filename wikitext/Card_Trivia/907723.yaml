title: Card Trivia:Mean Mutt Sacred Shiba
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Shiba Inu|Shiba Inu]]" (a small breed of hunting dog native to Japan) and "[[wikipedia:Shiva|Shiva]]" (the Hindu deity of destruction).
  ** In Hinduism, Shiva is a four-armed humanoid who is sometimes depicted sitting in a cross-legged position, wielding his ''[[wikipedia:Trishula|trishula]]'' (a trident-like weapon) in his upper right hand.
  * This monster has a [[Praime]] [[counterpart]]: "[[Mean Mutt Sacred Praime Shiba]]".
  * In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, when this monster attacks, it uses a strike in a similar fashion to the [https://knowyourmeme.com/memes/right-hook-dog Right-Hook Dog] meme.
