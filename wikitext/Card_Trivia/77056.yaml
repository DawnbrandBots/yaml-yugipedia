title: Card Trivia:Eshila the Lovely Bisque Doll
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Door to Mirrorland]]".
  * This monster is based on [[wikipedia:Alice (Alice's Adventures in Wonderland)|Alice]], the main protagonist of ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]''.
  ** This monster's name, "Eshila" (エシーラ, '' Eshīra'') is the romanization of "Alice" (アリス, ''Arisu'') spelt backwards.
  ** This monster's name features the word "[[wikipedia:Bisque (pottery)|bisque]]", a type of porcelain which is white in color but not glazed, usually used in the creation of dolls in the 19th century.
  * In {{episode|GX|088|ref}}, this monster represents the turning point of the Duel between its owner [[Alice]] and [[Jaden Yuki]], where Alice rejects despair and accepts hope.
