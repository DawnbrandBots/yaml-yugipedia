title: Card Trivia:Chaos Infinity
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the ghostly image of a skull with an infinity symbol (∞) in place of its eyes shooting two fireballs from its mouth, representing the two "[[Meklord]]" monsters [[Special Summon]]ed by its anime effect.
  ** However, in the ''[[OCG]]''/''[[TCG]]'', this card's effect is altered to Special Summon only one "Meklord" monster from the [[Deck]] or the [[Graveyard]].
