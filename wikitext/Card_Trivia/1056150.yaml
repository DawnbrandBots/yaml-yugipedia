title: Card Trivia:Interdimensional Matter Forwarder
wikitext: |-
  {{Navigation}}

  [[File:Interdimensional Matter Transporter used on XYZ-Dragon Cannon.png|200px|thumb|"[[Interdimensional Matter Transporter (manga)|Interdimensional Matter Transporter]]" is used on "[[XYZ-Dragon Cannon (manga)|XYZ-Dragon Cannon]]".]]

  * This card is a [[retrain]]ed counterpart of "[[Interdimensional Matter Transporter]]".
  ** "[[XYZ-Dragon Cannon]]" and the machine in the artwork of "Interdimensional Matter Transporter" appear in this card's artwork.
  ** This card's artwork is based on a panel from {{chapter|Yu-Gi-Oh!|255|ref}}, where "[[Interdimensional Matter Transporter (manga)|Interdimensional Matter Transporter]]" is used on "[[XYZ-Dragon Cannon (manga)|XYZ-Dragon Cannon]]".
  * This card's first effect is based on the original effect of "Interdimensional Matter Transporter" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], in which the transported monster only briefly leaves the [[field]] and returns shortly after this card resolves (e.g. after an attack or effect is directed towards the transported monster).
  ** This card's second effect to temporarily [[banish]] a [[negate]]d monster in response to an opponent's card or effect [[activation]] is likely based on a scene during [[Joey Wheeler]] and [[Seto Kaiba]]'s [[Battle City]] Duel when Kaiba banishes "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" with "Interdimensional Matter Transporter" in response to the successful effect of Joey's "[[Time Wizard (anime)|Time Wizard]]" to prevent "Blue-Eyes White Dragon" from being weakened by it.
  ** This is the first card in the ''[[OCG]]''/''[[TCG]]'' to temporarily [[banish]] cards for just a [[Chain Link]], the smallest possible interval.

