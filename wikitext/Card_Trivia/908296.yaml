  * "[[Deep Sea Diva]]" appears in this card's artwork.
  ** "[[Magellanica, the Deep Sea City]]" also appears in the background of this card's artwork.
  * This monster is named after a ''[[wikipedia:Répétiteur|répétiteur]]'', an accompanist, tutor, or coach of ballet dancers or opera singers.
