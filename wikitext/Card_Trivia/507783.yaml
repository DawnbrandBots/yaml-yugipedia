title: Card Trivia:Raviel, Lord of Phantasms
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Shadow of Infinity]]'', ''[[Expert Edition Volume 4]]''/''[[Dark Revelation Volume 4]]'', the ''[[Collectible Tins 2006 Wave 1]]'', ''[[Structure Deck: Sacred Beasts of Chaos]]''/''[[Structure Deck: Sacred Beasts]]'', and ''[[Speed Duel GX: Duelists of Shadows]]''.
  * This monster appears in the artwork of "[[Awakening of the Sacred Beasts]]", "[[Dimension Fusion Destruction]]", "[[Magistery Alchemist]]", "[[Martyr of the Sacred Beasts]]", "[[Phantasmal Sacred Beasts of Chaos]]", and "[[Phantom of Chaos]]".
  * This card appears in the artwork of "[[Unleashing the Sacred Beasts]]".
  * This monster is named after [[wikipedia:Raziel|Raziel]], an angel who is depicted as the author of the ''[[wikipedia:Sefer Raziel HaMalakh|Sefer Raziel HaMalakh]]'', which he gives to [[wikipedia:Adam and Eve|Adam and Eve]] shortly after their expulsion from the [[wikipedia:Garden of Eden|Garden of Eden]], so they would find their way back and better understand their God.
  * This monster has a [[signature move]] [[counterpart]]: "[[Raviel, Lord of Phantasms - Shimmering Scraper]]".
  * This monster has a retrained "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] counterpart: "[[Raviel, Lord of Phantasms - Sacred Beast of Endless Eternity]]".
  * This monster is the [[Sacred Beast]] counterpart of "[[Obelisk the Tormentor]]".
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this card had a blue border, similar to that of "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]".
  ** Both monsters also had similar effects to [[Tribute]] a monster(s) and gain [[ATK]] in the anime.
  * According to a [https://www.pojo.biz/board/showthread.php?p=2692824#post2692824 Pojo post] by Dan Scheidegger (an Upper Deck Entertainment employee), this monster was originally approved to have "Genma" in its ''[[TCG]]'' name, but a 3rd company decided "they didn't like the word".
  ** In another [https://www.pojo.biz/board/showthread.php?p=2693162#post2693162 Pojo post], Dan further explained that this was not for censorship reasons, but rather because the company did not think the name was "cool enough".
  * The [[Spirit Keys]] appear in the background of this and the two other [[Sacred Beasts]] card's artwork.
