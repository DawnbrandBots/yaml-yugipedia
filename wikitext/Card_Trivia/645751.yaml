title: Card Trivia:Fuhma Wave
wikitext: |-
  {{Navigation}}

  * "[[Getsu Fuhma]]" and "[[Ryu Kokki]]" appear in this card's artwork. Both of these monsters are based on the protagonist and the final boss of the Japan-only Famicom video game ''[[wikipedia:Getsu Fūma Den|Getsu Fūma Den]]'', respectively, hence their appearance together.
  ** Fittingly, both of these monsters are [[DARK]], allowing this card to destroy one of them.
  ** This card's artwork and Japanese name ({{Ruby|風|ふう}}{{Ruby|魔|ま}}の{{Ruby|波|は}}{{Ruby|動|どう}} ''Fūma no Hadō'') are likely a reference to the ''[[wikia:w:c:getsufumaden:Hadou Katana|Hadou Katana]]'', the strongest weapon in the game that fires red energy waves when used.
