title: Card Trivia:Shooting Majestic Star Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Dawn of Majesty]]''.
  * This monster's mirages appear in the artwork of "[[Majestic Mirage]]".
  * [[Synchro Summon]]ing rings appear in this card's artwork.
  * This monster is an [[Card evolutions|upgraded]] "[[Majestic]]" form of "[[Shooting Star Dragon]]".
  ** This monster's appearance is also based on "[[Majestic Star Dragon]]".
  *** This monster has the green orbs of "Shooting Star Dragon" and the red orbs of "Majestic Star Dragon".
  *** This monster's first effect to [[negate]] a monster's effect is based on the effect of "Majestic Star Dragon", while its second effect to attack multiple times is based on the effect of "Shooting Star Dragon"; this monster's third effect to [[banish]] itself until the [[End Phase]] to negate a card or effect  is also based on the effect of "Shooting Star Dragon".
  * This monster is a counterpart to "[[Red Nova Dragon/Assault Mode]]".
  ** Both monsters are depicted with mirrored poses in their respective card artwork.
  ** Both monsters depict their counterparts going on different paths deeper into an evolution ("Majestic" and "/Assault Mode" respectively) that they both mutually obtained.
  * This is the only "Majestic" monster:
  ** That has a pair of arms in addition to its wings.
  ** That does not [[shuffle]] itself into the [[Extra Deck]] and Special Summon its base form from the [[Graveyard]] during the End Phase if it is still on the [[field]].
  ** That does not gain any additional effect or [[ATK]] from a monster negated with its effect.
  ** That does not specifically require its base form and a [[Level 1]] non-[[Tuner monster]] to be Synchro Summoned.
  *** Indeed, because this monster is one [[Level]] higher than "Shooting Star Dragon", it cannot be Synchro Summoned using that monster and a Level 1 non-Tuner monster, unless its Level is changed.
