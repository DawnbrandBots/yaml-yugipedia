title: Card Trivia:Tyrant Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Struggle of Chaos]]'' and the box of ''[[Duelist Legacy Volume.5]]''.
  * This monster appears in the artworks of "[[A Wingbeat of Giant Dragon]]", "[[Card Advance]]", "[[Dragon's Gunfire]]", "[[Overwhelm]]", "[[Stamping Destruction]]", and "[[The Dragon's Bead]]".
  ** This monster also appears in the artwork of "[[Asymmetaphys]]", depicted transforming into its "[[Metaphys]]" counterpart, "[[Metaphys Tyrant Dragon]]".
  * This monster's jewel on its forehead can protect it from [[Trap Cards]], which is reflected in its anti-Trap effect and shown in the artwork of "The Dragon's Bead".
  * "[[Tyrant Wing]]" is based on this monster, in terms of name, appearance, and effect.
