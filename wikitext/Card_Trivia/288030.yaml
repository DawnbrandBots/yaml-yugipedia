title: Card Trivia:Rank-Up-Magic Astral Force
wikitext: |-
  {{Navigation}}

  * The [[Emperor's Key]] appears in this card's artwork.
  * This card is the [[Astral World|Astral]] [[counterpart]] of "[[Rank-Up-Magic Barian's Force]]".
  * This card's effect is a reference to the belief of this card's owner, [[Eliphas]], in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: this card can perform a [[Rank-Up]] on an [[Xyz Monster]] monsters to Summon a monster with two [[Rank]]s higher than the base monster, and this evolution can be repeated thanks for this card's effect to be [[add]]ed from the [[Graveyard]]; this parallels Eliphas' belief that a continuous Rank-Up of the Astral World will finally allow it to triumph and destroy the [[Barian World]].
  * This is the first "[[Rank-Up-Magic]]" card that did not use the power of [[Chaos (power)|Chaos]] in the anime.
  ** This is also the first "Rank-Up-Magic" card that did not Summon "[[C (archetype)|C]]" Xyz Monsters only.
  ** This is also the first "Rank-Up-Magic" card that was able to Summon any generic Xyz Monster, rather than just "[[Number]]", "[[Number C]]" or "[[CXyz]]" Monsters, until the ''[[Yu-Gi-Oh! ARC-V]]'' anime introduced more cards that can do so.
