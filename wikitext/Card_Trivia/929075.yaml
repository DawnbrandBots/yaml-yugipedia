title: Card Trivia:Imprisoned Beautiful Witch
wikitext: |-
  {{Navigation}}

  * "[[Dian Keto the Security Master]]" and three "[[Whispering Fairy|Whispering Fairies]]" appear in this card's artwork.
  ** This card's artwork depicts "Dian Keto the Security Master" imprisoning "Whispering Fairies", both of which are used by [[Mimi Imimi]] and [[Yuga Ohdo]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime, respectively, referencing Mimi's role as a minor antagonist who uses the [[Bubble Era]] [[series]].
