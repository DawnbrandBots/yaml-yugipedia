title: Card Trivia:Summer Schoolwork Successful!
wikitext: |-
  {{Navigation}}

  * "[[Some Summer Summoner]]" appears in this card's artwork.
  ** Drawings depicting "Some Summer Summoner" performing various summer activities appears on a notebook in this card's artwork.
  * This card's Japanese name, 「火器の祝台」 (''Kaki no Shukudai''), is a play on the term 「夏季の宿題」 ("summer homework"), a type of homework given to students for completion during summer vacation, but written using kanji meaning "gun celebration stand".
  * A notebook depicting a graph with a pair of equations <code>2x + y = 13</code> and <code>x + y = 9</code> appears in this card's artwork, referencing the artwork and effect of "[[Simultaneous Equation Cannons]]".
