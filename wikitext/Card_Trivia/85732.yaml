title: Card Trivia:Expressroid
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck: Syrus Truesdale]]''.
  ** In the ''[[TCG]]'', this card was released in ''Starter Deck: Syrus Truesdale'' and ''[[Gladiator's Assault]]''. Ironically, in the United States of America, it was "re-released" in ''Gladiator's Assault'' after being first released in ''Starter Deck: Syrus Truesdale''.
  * This monster is based on an [[wikipedia:Express train|express train]], a type of high-speed passenger train that doesn't make stops until it reaches its destination, which reflects its effect to quickly "transport" two "[[roid]]" monsters from the [[Graveyard]] to the [[hand]] when it is Summoned. 
  ** This monster's design is based on the [[wikipedia:300 Series Shinkansen|300 Series Shinkasen]], a series of land-based high-speed express trains in Japan that operated from 1992 until its discontinuation in 2012.
