title: Card Trivia:Reptilianne Ramifications
wikitext: |-
  {{Navigation}}

  * "[[Reptilianne Lamia]]" and the silhouette of "[[Reptilianne Hydra]]" appear in this card's artwork.
  ** This card's artwork appears to depict "Lamia" transforming into "Hydra". The ''[[TCG]]'' versions of those cards have switched names, where "Lamia" is named "Hydra", and "Hydra" is "Lamia" in the Japanese ''[[OCG]]''. As such, the name of the card is likely referring to "Hydra's" transformation into "Lamia".
  ** This card's name might be a portmanteau of "Lamia" and "ramification", which may reflect not only the transformation of "Lamia", but the ''ramification'' of its neck into the five heads of "Hydra".
