title: Card Trivia:Vulcan Ignite Hyperdrive
wikitext: |-
  {{Navigation}}

  * "[[Hyper Engine Vast Vulcan]]" appears in this card's artwork in [[Maximum Mode]] (together with "[[Hyper Engine Vast Vulcan (L)|Hyper Engine Vast Vulcan [L]]]" and "[[Hyper Engine Vast Vulcan (R)|Hyper Engine Vast Vulcan [R]]]").
  ** This card is named for the [[Attack and effect names in Yu-Gi-Oh! SEVENS|attack name]] of "Vast Vulcan" in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
  * This card is the first [[signature move]] card for a monster exclusive to the ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' format.
  * This card is the first card to [[support]] [[Maximum Monster]]s, as well as the first card to support cards in Maximum Mode.
