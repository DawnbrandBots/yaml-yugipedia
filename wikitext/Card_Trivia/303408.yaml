title: Card Trivia:Vampire Duke
wikitext: |-
  {{Navigation}}

  * This monster's appearance is reminiscent of the classic "movie vampire" made famous by Bela Lugosi's portrayal of Dracula.
  ** As a result, this monster is nearly identical to the one that appears in the artwork of "[[Overpowering Eye]]", a "[[Spell Card]]" designed to synergize with other "[[Vampire]]" monsters.
