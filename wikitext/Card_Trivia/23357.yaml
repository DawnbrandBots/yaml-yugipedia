title: Card Trivia:Different Dimension Dragon
wikitext: |-
  {{Navigation}}

  * This is the only "[[Different Dimension]]" monster whose effect doesn't involve [[banish]]ing, along "[[Invader from Another Dimension]]". It is also the only card in which the words "Different Dimension" are only written out, excluding cards like "[[D.D.M. - Different Dimension Master]]" and "[[D.D.R. - Different Dimension Reincarnation]]".
  * Rather than be based on the [[banishing]] mechanic, this card's name is based on its first effect. In the anime, this card's first effect is illustrated as it entering a portal to another dimension and then returning to the field.
  * In ''[[Yu-Gi-Oh! World Championship 2008]]'', this monster's color in the card and when on the [[field]] is light-blue.
