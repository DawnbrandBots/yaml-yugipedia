title: Card Trivia:Stardust Xiaolong
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Stardust Illumination]]".
  * This monster's name is based on "''xiǎolóng''" (小龙/小龍), meaning "little dragon" in Hanyu Pinyin, a form of romanized Chinese.
  ** "''Xiǎolóng''" more commonly refers to the snake, as one of the 12 Chinese zodiac animals (十二生肖, ''shí'èr shēngxiào'').
  ** "''Shaoron''" (''xiaolong'') is an example of Japanese readings highly approximating to Chinese readings, more than [[wikipedia:Kanji|on'yomi]]. Other Chinese-style-read Japanese words so far include "''kyonshī''" ("[[Master Kyonshee]]"), "''nyan''" ("[[Thunder Nyan Nyan]]"), "''wanfū''" ("[[King Tiger Wanghu]]") and "''shin tsen fū''" ("[[Xing Zhen Hu]]" and "[[Xing Zhen Hu Replica]]"). The actual on'yomi reading on the other hand, would be "Shōryū".
  * This monster has a [[counterpart]]: "[[Red Nova (card)|Red Nova]]".
