title: Card Trivia:Burst Stream of Destruction
wikitext: |-
  {{Navigation}}

  * "[[Blue-Eyes White Dragon]]" appears in this card's artwork.
  ** This card is named after the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" in the Japanese version of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]: "Burst Stream of Destruction".
  * This card has a "[[Red-Eyes]]"-related [[counterpart]]: "[[Inferno Fire Blast]]".
  * In ''[[Yu-Gi-Oh! GX Duel Academy]]'', this card can be [[activate]]d without [[control]]ling "Blue-Eyes White Dragon".
