title: Card Trivia:Crimson Call
wikitext: |-
  {{Navigation}}

  * "[[Crimson Resonator]]", "[[Red Dragon Archfiend]]", and a [[Turbo Duel]]ing track appear in this card's artwork.
  ** This card's artwork is based on scenes in the ''[[Yu-Gi-Oh! 5D's]]'' anime in which monsters are Summoned through a glowing circular portal. Furthermore, the angle of the portal, along with the motion lines and effects, suggests that the Summoning of "Crimson Resonator" is taking place during a Turbo Duel.
