title: Card Trivia:Parrot Dragon
wikitext: |-
  {{Navigation}}
  * This is one of four monsters used by [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]] that is treated as a [[Toon monster]] in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', the others including "[[Bickuribox (DOR)|Bickuribox]]", "[[Dark Rabbit (DOR)|Dark Rabbit]]", and "[[Toon Alligator (DOR)|Toon Alligator]]".
  ** Additionally, in ''Duelist of the Roses'', this monster's [[Type]] is [[List of Comic monsters|Comic]], allowing it to gain a power bonus from the [[Toon (terrain)|Toon terrain]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! Duelist|49|ref}}, specifically from the panel showing [[Parrot Dragon (manga)|this monster]] being Summoned.
