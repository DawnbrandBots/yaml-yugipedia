title: Card Trivia:Transmission Gear
wikitext: |-
  {{Navigation}}

  * "[[Geargiaccelerator]]", "[[Geargiano Mk-II]]", "[[Geargiano Mk-III]]" and "[[Geargiano]]" appear in this card's artwork.
  ** "[[Torque Tune Gear]]" also appears in this card's artwork ('equipped' to "Geargiaccelerator").
  * This card's name, artwork, and effect are all based on the fact that each of the "[[Geargiano (archetype)|Geargiano]]" monsters has one of their fists in one of the three [[rock-paper-scissors]] shapes.
  * This is the first card to require players to play "rock-paper-scissors".
  ** This is the second card in the ''[[OCG]]''/''[[TCG]]'' whose effect requires physical interaction with the other player, the first being "[[Yu-Jo Friendship]]" (released in the ''OCG'' about 15 years before this card).
  * This word 「変則」 (''hensoku'') in this card's Japanese name 「変則ギア」 means "anomaly; irregularity"; it is a homophone of 「変速」 (''hensoku''), meaning "change gears".
