title: Card Trivia:Galactica Draw
wikitext: |-
  {{Navigation|mode=nongame}}

  * [[Yudias Velgear]] appears in this card's artwork.
  * This card shares similarities with "[[Drastic Draw]]".
  ** Both feature and were used by the protagonists of the ''[[Yu-Gi-Oh!]]'' anime series they debuted in during their final episodes (Yudias from ''[[Yu-Gi-Oh! GO RUSH!!]]'' for this card and [[Yusaku Fujiki|Playmaker]] from ''[[Yu-Gi-Oh! VRAINS]]'' for "Drastic Draw").
  ** Both feature blank versions of a [[Monster Card]] (a [[Normal Monster]] for this card and an [[Effect Monster]] for "Drastic Draw"), a [[Spell Card]], and a [[Trap Card]].
  ** Both involve the use of a [[Ritual Monster]] in the anime ("[[Transam Diskarma Linac]]" as the [[cost]] to [[activate]] this card and "[[Cyberse Magician (anime)|Cyberse Magician]]" being [[banish]]ed from the [[Graveyard]] with "[[Cynet Ritual (anime)|Cynet Ritual]]" to [[Special Summon]] 2 "[[Cynet Token (anime)|Cynet Token]]s" and use them as the cost to activate "[[Drastic Draw (anime)|Drastic Draw]]").
