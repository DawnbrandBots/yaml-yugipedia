title: Card Trivia:Koa'ki Meiru Wall
wikitext: |-
  {{Navigation}}

  * This card has a [[monster effect]]-negating counterpart, "[[Koa'ki Meiru Guardian]]", a [[Trap Card]]-negating counterpart, "[[Koa'ki Meiru Sandman]]", and a [[Summon]]-negating counterpart, "[[Koa'ki Meiru Overload]]".
  ** They all have the same [[ATK]], [[DEF]], [[Attribute]], [[Type]], [[Level]], and [[maintenance cost]].
  * The German version of this card has a wrong effect. Instead of [[Spell Card]]s, its effect can negate Trap Cards, just like "Koa'ki Meiru Sandman".
