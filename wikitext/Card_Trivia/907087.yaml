  * "[[Dragosite]]", the silhouettes of "[[Alpha Burn Drake]]", "[[Applizard]]", "[[Beta Burn Dragon]]", "Dragosite", and "[[SSD Drake]]", and the black phone from the artwork of "[[RB Dragophone]]" appear in this card's artwork.
