title: 'Card Trivia:Number 96: Dark Mist'
wikitext: |-
  {{Navigation|other=[[Number 96 (character)|Character]]}}

  {{Numbers trivia}}

  * The number "96" appears on this monster's head.
  * This card is the opposite counterpart of "[[Number 39: Utopia]]", like [[Number 96 (character)|Number 96]] is the opposite counterpart of [[Astral]].
  * This monster has a "[[Number C]]" [[Card evolutions|upgraded]] form: "[[Number C96: Dark Storm]]".
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card was the first "[[Number]]" monster to take on multiple forms without card effects.
  ** When it first appeared, to lure [[Yuma Tsukumo]] into taking it, this monster's fake form had the purple-colored number "96" on its head and flaming eyes on its torso (similar to its real form); however, its body had a bulbous body with a large, red-lipped mouth and a fat belly, and the torso eyes were less intimidating.
  ** When it was Summoned by [[Vector]] in his [[Duel]] against [[Marin]] and [[Dumon]] in {{episode|ZEXAL|131|ref}}, this monster transformed into a darkened puppet version of Astral, reflecting Number 96's true nature as a fragment of [[Don Thousand]]. Fittingly, it was also [[equip]]ped to "[[Number 43: Manipulator of Souls (anime)|Number 43: Manipulator of Souls]]", another monster with a puppet theme used by Vector.
  * This card is the first [[Fiend]] "[[Number]]" monster, as well as the first [[Rank]] 2 "Number" monster.
  * This card had the most [[Number holder]]s of all "Number" cards in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This card was the first "Number" monster to require monsters with a specific [[Attribute]] as [[Xyz Material]]s, though only in the Japanese version of the ''Yu-Gi-Oh! ZEXAL'' anime.
  * In the anime, when this monster [[detach]]ed an Xyz Material, it absorbed it through the face on its torso.
  * This monster's neutral form in the anime was a blob of black slime with a flickering, flame-like object inside. The slime then formed its right claw, left leg and head before finally appearing in its true form.
  ** When this monster turned into its full fake form, its right hand and head were shown being formed before the full fake form appeared.
  * This card is the second "Number" monster whose neutral and true forms were not rendered in 3D graphics, the first being "[[Number 83: Galaxy Queen]]"; however, in {{episode|ZEXAL|037|ref}}, its normal form was shown in 3D.
