title: Card Trivia:Conduction Warrior Linear Magnum Plus Minus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Power Off]]".
  * This card appears in the original anime artwork of "[[Montage Dragon (anime)|Montage Dragon]]".
  * This monster's name is derived from the [[wikipedia:Linear motor|linear motor]] (an electric induction motor that produces straight-line motion by running a magnetic field on the track, used with [[wikipedia:Moinorail|monorails]] and [[wikipedia:Streetcar|streetcars]]) and the [[wikipedia:Railgun|linear cannon]] (a linear motor device designed to use electromagnetic force to launch high-velocity projectiles, two of which are featured in this monster's design as its weapons).
  ** This monster's name features the word "Magnum", which a form of the Latin word "''magnus''", meaning "great" (reflecting its "greater" [[Level]] and [[original ATK and DEF]] stats) and is a pun on the word "magnet" (reflecting its association with the "[[Magnet]]" and "[[Magnet Warrior]]" [[archetype]]s).
  ** This monster's Japanese naming scheme for "Plus Minus" (±) is also a pun on the kanji for "warrior" (士) in the base Japanese name for the "[[Magnet Warrior]]" [[archetype]] (戦士), which resembles a plus sign (+) written over the minus sign (-), whereas in the ''[[Yu-Gi-Oh! GX]]'' anime, this monster features the [[Plus Minus monster|Plus Minus]] sub-type, its [[Summoning condition]] requires the player to [[send]] "[[Magnet Warrior Σ＋ (anime)|Magnet Warrior Σ＋]]" and "[[Magnet Warrior Ω－]]" to the [[Graveyard]], and it gains [[ATK]] equal to the total ATK of all [[Plus monster|Plus]] and [[Minus monster]]s on the [[field]].
  *** This monster's ''[[OCG]]''/''[[TCG]]'' Summoning condition by sending two "Magnet Warrior" monsters whose original Levels are 4 or lower to the [[Graveyard]] is an alteration of this Summoning condition in the anime, since the aforementioned "Magnet Warriors" are [[Level 4]] monsters. 
  *** This monster's ''OCG''/''TCG'' effect to gain half the ATK of an [[EARTH]] monster is an alteration of its effect to gain ATK equal to the total ATK of all Plus and Minus monsters on the field. In {{episode|GX|036|ref}}, this effect was used against "[[Amazoness Blowpiper (anime)|Amazoness Blowpiper]]", whose [[Attribute]] is EARTH and was treated as a Minus monster via the effect of "[[Magnet Force Minus]]".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Conduction Warrior Plasma Magnum]]".
  * This is the [[signature card]] of [[Bastion Misawa]]'s Earth Deck in the ''[[Yu-Gi-Oh! GX]]'' anime.
