title: Card Trivia:Maliss P Dormouse
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Maliss C MTP-07|Maliss <C> MTP-07]]" and "[[Maliss in Underground]]".
  * This monster is based on the [[wikipedia:Dormouse (Alice's Adventures in Wonderland character)|Dormouse]], a character from ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]'' who is depicted as a mouse present at the [[wikipedia:Hatter (Alice's Adventures in Wonderland)|Mad Hatter's]] tea party.
  ** This monster also references [[wikipedia:Clickjacking#MouseJack|MouseJack]], a variation of the clickjacking cyberattack, which describes as a class of vulnerabilities that affects wireless keyboards and mice unaffiliated with [[wikipedia:Bluetooth|Bluetooth]].
  * The symbol in the background of this card's artwork is based on the suit of [[wikipedia:Diamonds (suit)|Diamonds]], referencing the [[wikipedia:Playing card|playing card]] theme of ''Alice's Adventures in Wonderland''.
  * The English letter "P" stands for "pawn", referencing the [[wikipedia:Pawn (chess)|pawn]] piece used in the game of  [[wikipedia:Chess|chess]], which is the theme of ''[[wikipedia:Through the Looking-Glass|Through the Looking-Glass]]''.
