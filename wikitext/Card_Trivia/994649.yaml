title: Card Trivia:The Immortal Bushi Mourns the Mortal Body
wikitext: |-
  {{Navigation}}

  * "[[The Immortal Bushi]]" appears in this card's artwork.
  ** Similar to how the Japanese name of "The Immortal Bushi" is a pun on the word for "joints", this card's Japanese name is a pun on「{{Ruby|節々|ふしぶし}}の{{Ruby|痛|いた}}み」(''fushibushi no itami''), the Japanese term for "joint pain".
