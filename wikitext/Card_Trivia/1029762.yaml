  * [[Damamu]] appears in this card's artwork.
  ** Fittingly, they were transformed into this card in {{episode|GO RUSH!!|85|ref}}.
  * The Japanese word "''mechanko''" (めちゃんこ) is a slang adverb to describe something being "extremely so" or "very much (a thing/itself)".
