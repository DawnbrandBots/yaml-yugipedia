title: Card Trivia:Book of Taiyou
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the Japanese version of ''[[Pharaonic Guardian (Japanese)|Pharaonic Guardian]]''.
  * The book in this card's artwork appears in the artwork of "[[Raging Flame Sprite]]".
  ** The Sun-like symbol appearing in the artwork of "[[Eda the Sun Magician]]" is based on the symbol on the cover of the book in this card's artwork.
  * This card appears in the artworks of "[[Hyper Quick!]]".
  * This card is the opposite [[counterpart]] of "[[Book of Moon]]".
  ** Both cards are named after the opposing celestial bodies representing the daytime and nighttime; this card's ''[[TCG]]'' name, "Taiyou" is the Japanese word for "sun".
  ** This card can [[flip]] a [[face-down]] monster on the [[field]] into [[face-up]] [[Attack Position]], while "Book of Moon" can [[target]] a face-up monster on the field and change that target to face-down [[Defense Position]].
