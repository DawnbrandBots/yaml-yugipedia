title: Card Trivia:Mighty Gaze of the Sky Emperor
wikitext: |-
  {{Navigation}}

  * "[[Sevens Road Magician]]" and "[[Yggdrago the Sky Emperor]]" in [[Maximum Mode]] (together with "[[Yggdrago the Sky Emperor (L)|Yggdrago the Sky Emperor [L]]]" and "[[Yggdrago the Sky Emperor (R)|Yggdrago the Sky Emperor [R]]]") appear in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|SEVENS|023|ref}} when [[Nail Saionji]] [[Maximum Summon]]s "Yggdrago" for the first time, which appears as a silhouette, while [[Yuga Ohdo]] has "Magician" [[face-up]] on his [[field]].

