title: Card Trivia:B.E.S. Derringer Core
wikitext: |-
  {{Navigation}}

  * "[[Gradius]]" appears in this card's artwork.
  * This monster is based on the {{wikia|gradius|Dellinger Core}}, the final boss of the {{wikia|gradius|Boss Rush (Gradius III)|Boss Rush stage}} in the arcade and SNES versions of ''[[wikipedia:Gradius III|Gradius III]]''. Fittingly, this monster debuted alongside "[[Boss on Parade]]" (a [[Continuous Spell Card]] based on the aforementioned Boss Rush stage) in ''[[Burst Protocol]]''.
