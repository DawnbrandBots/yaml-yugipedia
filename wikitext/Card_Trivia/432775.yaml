title: Card Trivia:Fusion Parasite
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] appears in the artworks of "[[Parasite Discharge]]", "[[Parasite Factory]]", "[[Parasite Generator]]", "[[Parasite Maneuver]]", "[[Parasite Reborn]]", "[[Parasite Spell]]", and "[[Power Parasite]]".
  * Despite a [[Parasite Monster]] being used to control [[Zuzu Boyle]] at one point, "Fusion Parasite" cannot be used to [[Fusion Summon]] any existing "[[Melodious]]" [[Fusion Monster]], due to none of them having a specific Monster Card name listed on their [[Fusion Materials]].
