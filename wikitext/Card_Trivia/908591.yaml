title: Card Trivia:Mannadium Riumheart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mannadium Abscission]]", "[[Mannadium Imaginings]]", and "[[Peaceful Planet Calarium]]".
  * This card has 3 [[Heart]] [[counterpart]]s:
  ** [[DARK]] "[[Scareclaw]]": "[[Scareclaw Reichheart]]"
  ** [[WATER]] "[[Tearlament]]": "[[Tearlaments Reinoheart]]"
  ** [[FIRE]] "[[Kashtira]]": "[[Kashtira Riseheart]]"
  ** This card also has a non-Heart counterpart: "[[Visas Starfrost]]"
  *** The [[ATK]] (1500) and [[DEF]] (2100) of this card are reversed with the ATK (2100) and DEF (1500) of "Visas Starfrost".
  * This card has an upgraded [[Synchro Monster|Synchro]] form: "[[Mannadium Prime-Heart]]".
  * Unlike the rest of its Heart counterparts, this monster is depicted as a heroic character, and takes the place of "Visas" as the hero of the "[[Mannadium]]" story arc, as the latter has become the villainous "[[Vicious Astraloud]]".
  ** This dynamic parallels the first story arc with "Scareclaw", where the [[LIGHT]] "Visas" fought against its [[DARK]] counterpart, "Reichheart". This time the roles are reversed, with "Visas" being the DARK villain as "Astroud" and its counterpart "Riumheart" being the LIGHT hero.
  * This monster seems to be the personification "Visas"'s super ego, the moral side of one's mind that often conflicts with the id, the instinctual side.
  ** Fittingly this monster looks the most like "Visas" when compared to the other "Heart" monsters.
