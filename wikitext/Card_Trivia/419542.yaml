title: Card Trivia:Forbidden Apocrypha
wikitext: |-
  {{Navigation}}

  * This book appears in the artwork of "[[Dark Contract with the Entities]]".
  * This card is based on the ''[[wikipedia:Necronomicon|Necronomicon]]'', a fictional book from [[wikipedia:H.P. Lovecraft|H.P. Lovecraft's]] [[wikipedia:Cthulhu Mythos|Cthulhu Mythos]], which contains the accounts and histories of the [[wikipedia:Cthulhu Mythos deities|Old Ones]] and their methods to summon them.
  ** Fittingly, an illustration depicted in the open page of this book resembles "[[Old Entity Cthugua]]".
