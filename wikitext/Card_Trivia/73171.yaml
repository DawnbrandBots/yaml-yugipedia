title: Card Trivia:Gemini Summoner
wikitext: |-
  {{Navigation}}

  * This monster's armor is based on "[[Chthonian Emperor Dragon]]", which can also be seen in the background.
  * The number "2" is seen in this card's artwork, probably because of the definition of the Gemini zodiac: the twins.
  * This card is the first TCG original card released in an [[OCG]] Structure Deck.
