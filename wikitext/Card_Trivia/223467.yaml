title: Card Trivia:Spellbook of Fate
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Memories]]''.
  * "[[Spellbook Magician of Prophecy]]", "[[Hermit of Prophecy]]", and "[[Justice of Prophecy]]" appear in this card's artwork.
  * This card's Japanese name, "Goethe Spellbook", could be a tribute to [[wikipedia:Johann Wolfgang von Goethe|Johann Wolfgang von Goethe]], a world-famous, and well-known German poet.
  ** This card's name could also be derived from Goetia, Greek for "sorcery".
  ** This card's name could also refer to [[wikipedia:Lemegeton|Lemegeton's]] first chapter [[wikipedia:Goetia|Ars Goetia]].
  * This card's artwork resembles that of "[[Magic Triangle of the Ice Barrier]]".
