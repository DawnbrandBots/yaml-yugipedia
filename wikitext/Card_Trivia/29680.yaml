title: Card Trivia:Multiple Piece Golem
wikitext: |-
  {{Navigation}}

  * This is the first [[Rock]] [[Effect Monster|Effect]] [[Fusion Monster]] to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This is the first Fusion Monster to appear in the ''[[Yu-Gi-Oh! 5D's]]'' anime, followed by "[[Rare Fish (anime)|Rare Fish]]", "[[Centaur Mina (anime)|Centaur Mina]]" and "[[Dragon Knight Draco-Equiste (anime)|Dragon Knight Draco-Equiste]]".
  ** This is also the only monster Fusion Summoned through "[[Polymerization (anime)|Polymerization]]" in the ''Yu-Gi-Oh! 5D's'' anime.
  * This is the only [[Piece Golem]] monster to not have an [[original DEF]] of 0.
