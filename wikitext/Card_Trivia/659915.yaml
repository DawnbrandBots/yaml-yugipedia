title: Card Trivia:Brotherhood of the Fire Fist - Elephant
wikitext: |-
  {{Navigation}}

  * This card is named after ''[[wikipedia:Song Qing (Water Margin)|Song Qing]]''.
  ** ''Song Qing'' ranks 76th among the 108 [[wikipedia:108 Stars of Destiny|Liangshan heroes]] and 40th among the 72 [[wikipedia:Water Margin|Earthly Fiends]] and is nicknamed "Iron Fan".
  *** Based on his story,  he is the younger brother of ''[[wikipedia:Song Jiang|Song Jiang]]''. Hence there is a resemblance between each other: the clothing style, the hair color, both of them are holding a fan, and the fact that this monster is a [[Level]] 4, hence it can be used to summon "Tiger King".
