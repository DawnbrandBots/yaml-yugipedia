title: Card Trivia:Gouki Machine Suprex
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed [[Tuner monster|Tuner]] [[counterpart]] of "[[Gouki Suprex]]".
  ** This monster's name is based on [[wikipedia:Junji Hirata|Junji Hirata]], a retired Japanese [[wikipedia:Professional wrestling|professional wrestler]] known by his ring name, "Super Strong Machine" (スーパー・ストロング・マシン, ''Sūpā Sutorongu Mashin''), whose signature move was the "Machine Suplex Hold" (マシーン・スープレックス・ホールド).
