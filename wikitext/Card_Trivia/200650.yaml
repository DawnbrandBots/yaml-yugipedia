title: Card Trivia:Lightray Grepher
wikitext: |-
  {{Navigation}}

  * This is the first "[[Lightray]]" to be TCG Exclusive.
  ** This is also the the first "[[Lightray]]" that can be [[Normal Summon]]ed or [[Set]].
  * This is the "[[Lightray]]" counterpart of "[[Warrior Dai Grepher]]".
  ** This may also be the [[LIGHT]] version of its [[Dark counterpart]], "[[Dark Grepher]]". Both are TCG Exclusives, and have the same cost to Summon and activate their effect; their search methods are also tailored to each archetype, with "Lightray Grepher" [[banish]]ing a [[LIGHT]] monster and "Dark Grepher" sending a [[DARK]] monster to the [[Graveyard]].
  ** This card may represent "Warrior Dai Grepher" after taking the light path in "[[The Paths of Destiny]]" artwork. It might also be "Grepher" right before he becomes "[[Ryu Senshi]]", just as he becomes "[[Dark Grepher]]" right before he becomes "[[Dark Lucius]]".
  *** Another possibility is that "Dark Grepher" was purified by the "Lightrays", due to their similar effects.
  * This monster appears in the artwork of "[[Battler's Pride]]".
