title: Card Trivia:Domino Effect
wikitext: |-
  {{Navigation}}

  * The soldier wearing the Ancient Roman-style armor in this card's artwork appears in the artwork of "[[Fighting Spirit]]".
  * This card is based on the "[[wikipedia:Domino effect|domino effect]]", a cumulative chain reaction where one initial event triggers a series of similar, related, or inevitable events. Likewise, the effect is named after the [[wikipedia:Domino toppling|toppling]] of [[wikipedia:Dominoes|dominoes]], a rectangular tile used in games, which appear in this card's artwork.
  ** This card's effect reflects the above-mentioned facts, as the chain reaction is triggered the moment the player's monster [[destroy]]s an player's monster by battle, which leads to another of the opponent's monster for each of the player's monsters they [[send]] to the [[Graveyard]]. In {{episode|5D's|002|ref}}, this effect is depicted by the opponent's monster that was [[destroyed by battle]] topples into another monster, which topples into another monster like dominoes before they are destroyed.
