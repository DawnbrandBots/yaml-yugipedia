title: Card Trivia:Amplifier
wikitext: |-
  {{Navigation}}

  * "[[Jinzo]]" appears in this card's artwork.
  * The device in this card's artwork appears as part of the designs of "[[Psychic Bounder]]" and "[[Psychic Megacyber]]".
  * This card has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Accelerator]]".
  * This is the first and currently only [[Equip Spell Card]] to feature an effect [[activation]] that cannot be [[negate]]d.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|158|ref}} showing "[[Jinzo (manga)|Jinzo]]" being equipped with [[Amplifier (manga)|this card]], albeit with its hands raised.
