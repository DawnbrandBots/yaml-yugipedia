title: Card Trivia:Grandsoil the Elemental Lord
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chaos Alliance]]" and "[[A Wild Monster Appears!]]".
  * Like the other "[[Elemental Lord]]" cards, this monster's given name is in Western language; in this case, English.
  * Like the other "Elemental Lords", this monster's summon-triggered effect is reminiscent of a (previously) banned card, in this case: "[[Monster Reborn]]".
  * Prior to its errata in ''[[Tournament Pack 2018 Vol.1]]'' (OCG) and ''[[Flames of Destruction Special Edition]]'' (TCG), this monster was the only "Elemental Lord" whose effect was not restricted to [[only once per turn]]. Its effect was changed due to it causing undesirable loops and [[September 2017 Lists|ending up]] [[Forbidden]] in the ''[[TCG]]''.
