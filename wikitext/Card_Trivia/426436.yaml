title: Card Trivia:Predaplant Banksiogre
wikitext: |-
  {{Navigation}}

  * This monster is a combination of the ''[[wikipedia:Banksia|Banksia]]'' plant and the [[wikipedia:Ogre|ogre]].
  * This is the first "[[Predaplant]]" [[Tuner monster]].
  * This is the final monster to be [[Tribute Summon]]ed in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, as well as the first and currently only Tuner monster to be Tribute Summoned in the anime.
