title: Card Trivia:King Tiger Wanghu
wikitext: |-
  {{Navigation}}

  * This monster has a counterpart: "[[Fierce Tiger Monghu]]".
  ** Both monsters share the same [[Attribute]] ([[EARTH]]), [[Level]] (4), [[Type]] ([[Beast]]), [[original ATK and DEF]] (1700/1000), as well as effects that destroy monsters with lower ATK.
  ** Both monsters also have names that are base on the same phrase in English and Chinese: "Wanghu" is the literal translation from Chinese for "fierce tiger" (王虎, ''Wánghǔ''), written in a toneless Hanyu Pinyin form.
  *** "ワンフー" (''Wanfū'') is an example of Japanese readings highly approximating Chinese ones, more than [[wikipedia:On'yomi|on'yomi]]. Other Chinese-style-read Japanese words present in ''Yu-Gi-Oh!'' are ''shaoron'' ("[[Stardust Xiaolong]]", ''nyan'' ("[[Thunder Nyan Nyan]]"), ''kyonshī'' ("[[Master Kyonshee]]"), and ''shin tsen fū'' ("[[Xing Zhen Hu]]" and "[[Xing Zhen Hu Replica]]").
