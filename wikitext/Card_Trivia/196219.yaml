title: Card Trivia:Infernal Sun
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Luminous Soldier]]" appears in this card's artwork.
  * This card's Japanese name, "Sun of Naraku", is derived from [[wikipedia:Naraka (Buddhism)|Naraka]], a term in [[wikipedia:Buddhist cosmology|Buddhist cosmology]] often equivocated to "layer of hell" or "purgatory" in English. There are two particular sets of eight Naraka themed around fire and ice; a being is only born into a Naraka as a direct result of accumulated karma, rather than divine judgment or punishment, and will only remain in that Naraka for a finite (albeit incomprehensibly long) period of time before its rebirth.
