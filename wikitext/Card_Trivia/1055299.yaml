title: Card Trivia:Madolche Queen Tiarafraise
wikitext: |-
  {{Navigation}}

  * This monster is a [[Ranked-Up]] form of "[[Madolche Queen Tiaramisu]]".
  ** This monster's name is a portmanteau of "[[wikipedia:Tiara|tiara]]" and "[[wikipedia:Tiramisu|tiramisu]] [[wikipedia:Strawberry|à la fraise]]".
  *** Similar to "Tiaramisu", this monster's name is based on tiramisu, an Italian dessert consisting of layers of ladyfinger pastries dipped in coffee and a whipped mixture of eggs, sugar, and mascarpone, and flavored with cocoa.
  *** The "tiramisu à la fraise" is a variant of tiramisu topped with sliced strawberries (known in French as ''fraise''). Fittingly, the design of this monster's dress and its jigsaw puzzle-piece platform are based on the tiramisu à la fraise, while the back of its throne consists of strawberry-flavored wafers and icing with strawberries as the decoration.
