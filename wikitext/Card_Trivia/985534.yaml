title: Card Trivia:Tsumuji the Earthwind Star
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "''tsumuji''", the Japanese word for "whirlwind".
  ** Fittingly, in {{episode|ARC-V|042|ref}}, this monster is used to [[Fusion Summon]] "[[Fujin the Breakstorm Star]]", a monster based on the [[wikipedia:Raijin|Shinto deity of the wind]].
