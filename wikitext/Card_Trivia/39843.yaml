title: Card Trivia:Giant Ushi Oni
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster is based on the [[wikipedia:Ushi-oni|ushi-oni]], a ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore who is depicted as a bovine-headed demon with a spider-like body.
  * This monster is the [[Card evolutions|upgraded]] version of "[[Ushi Oni]]".
