title: Card Trivia:Svartalf of the Nordic Alfar
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is derived from [[wikipedia:Dökkálfar and Ljósálfar|Dökkálfar]], a race of dark elves in [[wikipedia:Norse mythology|Norse mythology]] who reside underground.
  ** This monster's ''[[TCG]]'' name is derived from [[wikipedia:Svartálfar|Svartálfar]], a race of dark elves in Norse mythology synonymous to the Dökkálfar, who reside in the underground realm of ''Svartálfaheimr''.
