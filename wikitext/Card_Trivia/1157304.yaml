title: Card Trivia:Power Capsule Red
wikitext: |-
  {{Navigation}}

  * This card is based on the Red Power Capsule, the main power-up item from the ''[[wikipedia:Gradius (video game)|Gradius]]'' video game series.
  ** In the ''Gradius'' series, the Red Power Capsule lights up the Power Meter and allows the player to choose the weapon to equip their weapon of choice, which is reflected in this card's effect to choose which [[excavate]]d cards to [[add]] to their [[hand]].
