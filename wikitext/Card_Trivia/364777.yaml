title: Card Trivia:Earthbound Servant Geo Grasha
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Animation Chronicle 2023]]'' and ''[[Maze of Millennia]]''.
  * This monster is based on [[wikipedia:Glasya-Labolas|Glasya-Labolas]], one of the Presidents of [[wikipedia:Hell|Hell]] in [[wikipedia:demonology|demonology]] who is depicted as a dog with the wings of a [[wikipedia:griffin|gryphon]]
  ** However, this monster's appearance is based on a [[wikipedia:Baphomet|Baphomet]], a demonic winged creature who is depicted with the head of a goat and the body of a winged human.
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, when this monster is destroyed, the images of souls are seen flying out of this monster's body, similar to how the destroyed "[[Earthbound Immortal]]s" release the souls they absorbed for their Summoning in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
