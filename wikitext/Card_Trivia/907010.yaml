  * This monster appears in the artwork of "[[Penguin Brave]]".
  * The design of the monsters that comprise "Penguin Brave", including this one, appears to be based on the classes/jobs from the [[wikipedia:Dragon Quest|Dragon Quest]] games.
  ** Based on the concept art for "Penguin Brave", this monster is a [[wikipedia:Macaroni penguin|macaroni penguin]].
