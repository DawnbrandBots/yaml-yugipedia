title: Card Trivia:Miracle Flipper
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on "[[Dark Magician]]".
  ** In a similar fashion, "[[Card Ejector]]" (another card used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime) is based on "[[Dark Magician Girl]]".
  * The original Japanese text of "Miracle Flipper" did not have the "at the end of the [[Battle Phase]]" clause. Instead it was [[Special Summon]]ed to the opponent's field right after being destroyed in battle, allowing an OTK situation with "[[Asura Priest]]". It was [[errata]]'d February 25, 2008.
