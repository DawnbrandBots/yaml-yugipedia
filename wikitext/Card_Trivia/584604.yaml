title: Card Trivia:Zerrziel, Ruler of the Evil Eyed
wikitext: |-
  {{Navigation}}

  * This monster is one of the [[cover card]]s for ''[[Deck-Build Pack: Infinity Chasers]]'' and ''[[The Infinity Chasers]]''.
  * This monster appears in the artwork of "[[Evil Eye Retribution]]".
  ** The artwork of "[[Evil Eye Awakening]]" depicts the transformation of "[[Serziel, Watcher of the Evil Eye]]" into this monster.
  * "[[Evil Eye of Selene]]" appears in this card's artwork.
  * This card is named after the archangel [[wikipedia:Sariel|Säräqael]] (also known as Sariel). Säräqael is one of the ''[[wikipedia:Watcher (angel)|Grigori]]'' (also known as the "watchers", a group of fallen angels that taught humanity forbidden knowledge) who taught men the course of the moon. Säräqael's name is said to provide protection against the [[wikipedia:Evil eye|evil eye]].
