title: Card Trivia:The Fabled Nozoochee
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Obedience Schooled]]" and "[[Jurrac Impact]]".

  * This monster is based on the '''Nozuchi''' (野槌), a serpent-like yokai from Japanese folklore, often described as a mysterious, limbless creature resembling a large snake.

  * The imp-like creature in this card's artwork also appears in the artwork of "[[Fabled Ragin]]".
  ** The creature's name is stated to be Gludd in the ''Duel Terminal Master Guide''.
