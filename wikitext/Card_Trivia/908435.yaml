title: Card Trivia:Dian Keto the Security Master
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Last Day of the Pretty☆Witch]]" and "[[Imprisoned Beautiful Witch]]".
  ** Both cards' artwork depicts this monster arresting and restraining monsters used by [[Yuga Ohdo]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime, referencing how [[Mimi Imimi]] is a minor antagonist in the series.
  * This monster is a ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] of "[[Dian Keto the Cure Master]]".
  ** This monster has two Bubble Era counterparts: "[[Dian Keto the Boogie Master]]" and "[[Dian Keto the Cooking Master]]"
