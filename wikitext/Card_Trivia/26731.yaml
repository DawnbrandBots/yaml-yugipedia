title: Card Trivia:Worm Hope
wikitext: |-
  {{Navigation}}

  * This monster is likely a downgraded form of "[[Worm Illidan]]".
  ** This is supported by the fact that both monsters' designs are similar, while the English letter "H" (which this monster's name begins with) comes before the English letter "I".
  * This is the first [[Monster Card]] to have an indent in its lore text. This helps seperates its [[FLIP]] effect from a second, unrelated effect.
  * This card's Spanish print features an error, as it uses the word "''oponente''" instead of "''adversario''", which is the correct term for "''opponent''".
