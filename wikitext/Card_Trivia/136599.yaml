title: Card Trivia:Dreiroid
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is based on "''drei''", the German word for the number "3", which is reflected in its [[Level]].
  * In the English publication of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this card was confused with "[[Vierroid]]", and mistakenly shown with that monster's name and Level (4).
