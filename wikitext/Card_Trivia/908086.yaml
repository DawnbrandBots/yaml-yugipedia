title: Card Trivia:Exus Summon
wikitext: |-
  {{Navigation}}

  * This card's name references the [[wikipedia:Quimbanda|Exus]], a phalanx of spirits associated with [[wikipedia:Eshu|Exu]], the Yoruba god of chaos and trickery.
  ** This card's name reflects Exu's title, as it can trick the opponent's attacking monster by trading in the player's monster for a weaker monster in their [[hand]].
  *** Fittingly, the aforementioned fact reflects its owner, [[Lester]], who is known for being deceitful, mischievous, and chaotic in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
