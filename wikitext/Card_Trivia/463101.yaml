title: Card Trivia:Fullmetalfoes Alkahest
wikitext: |-
  {{Navigation}}

  * This monster is a [[Counterpart|Fusion counterpart]] to "[[Raremetalfoes Bismugear]]" after the effects of "[[Fullmetalfoes Fusion]]".
  * This card's name may be a reference to the anime and manga series ''[[wikipedia:Fullmetal Alchemist|Fullmetal Alchemist]]''.
  ** It also makes reference to the [[wikipedia:Alkahest|alkahest]], a hypothetical, universal [[wikipedia:solvent|solvent]] in [[wikipedia:alchemy|alchemy]], that was also referenced in ''Fullmetal Alchemist''.
  * This is the first card in the ''[[OCG]]''/''[[TCG]]'' that can allow [[Spell Card]]s to be used as [[Fusion Material]]s for a [[Fusion Summon]].
  * This card is the second ''TCG''/''OCG'' [[Level]] [[Level 1 Monster Cards|1]] [[Fusion Monster]], with "[[Thousand-Eyes Restrict]]" being the first and only Level 1 Fusion Monster for nearly 16 years (This card was first released in [[Invasion: Vengeance]], on [[2016#July|July 9, 2016]], while "Thousand-Eyes Restrict" was released in [[Thousand Eyes Bible]] on [[2000#December|December 14, 2000]].) 
  ** These two [[monster]]s also share several other similarities, as they both:
  *** Have [[effect]]s to [[equip]] monsters to themselves (Thousand-Eyes Restrict can only [[Equips monsters from the opponent's field to itself|equip monsters your opponent controls to itself]], and only one at a time by this effect.)
  *** Require at least one [[Normal Monster]] as Fusion Material ("Thousand-Eyes Restrict" requires "[[Thousand-Eyes Idol]]", a Normal Monster, as Fusion Material.)
  *** Have [[0 ATK Monster Cards|0]]/[[0 DEF Monster Cards|0]] [[ATK]]/[[DEF]].
  *** Have their DEF change based on the monsters equipped to themselves by their effect ([[this card gains DEF]] equal to the equipped monsters' ATK, while Thousand-Eyes Restrict's [[Changes own ATK value|ATK]] & [[Changes own DEF value|DEF]] become equal to that of the monsters equipped to it by its effect.)
