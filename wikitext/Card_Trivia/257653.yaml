title: Card Trivia:Harpie's Pet Phantasmal Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hysteric Sign]]".
  * "[[Harpie Channeler]]" appears in this card's artwork.
  * This card is an [[Xyz Monster]] [[counterpart]] of "[[Harpie's Pet Dragon]]".
  * This card's [[Xyz Material]] requires three [[Level 4]] [[WIND]] monsters, referencing the Level 4 "[[Harpie Lady]]" and "[[Harpie Lady 1]]", "[[Harpie Lady 2|2]]" and "[[Harpie Lady 3|3]]".
  * As explained by the product overview for ''[[Lord of the Tachyon Galaxy]]'' on Konami's website, this monster's mirage-like appearance and effect comes from the fact that it belonged "from a time that never was", reflecting how Xyz Monsters didn't exist at the time when the other "[[Harpie]]" cards were released.
