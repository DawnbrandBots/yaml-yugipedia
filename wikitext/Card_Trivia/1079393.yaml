title: Card Trivia:Crystron Inclusion
wikitext: |-
  {{Navigation}}

  * "[[Crystron Quan]]" and "[[True King Bahrastos, the Fathomer]]" appear in this card's artwork.
  ** This card's artwork appears to depict "Quan" absorbing the power of "Bahrastos" before transforming into "[[Crystron Tristaros]]".
  ** The purple orb in this card's artwork appears to be the core of "[[Crystron Sulfador]]".
