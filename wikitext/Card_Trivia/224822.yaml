title: Card Trivia:ZW - Ultimate Shield
wikitext: |-
  {{Navigation}}

  * This monster's equip form appears in the background of this card's artwork.
  * This monster is based on the [[wikipedia:Black Turtle-Snake|Black Turtle-Snake]], one of the [[wikipedia:Four Symbols|Four Symbols]] in Chinese astrology.
  ** This is one of three [[Main Deck]] "[[ZW -]]" monsters whose ''[[TCG]]'' name does not include the name of the animal it depicts, a trait shared only by the other two Main Deck "ZW -" monsters that debuted in ''[[Cosmo Blazer]]'': "[[ZW - Lightning Blade|Lightning Blade]]" and "[[ZW - Tornado Bringer|Tornado Bringer]]".
  *** Out of the three, this is the only "ZW -" monster whose [[Type]] was not changed upon its release in the ''[[OCG]]''/''TCG''.
  * This is the only "ZW -" monster whose effect increases [[DEF]] instead of [[ATK]].
  * This is the first Main Deck "ZW -" monster that cannot [[equip]] itself from the [[hand]] to a "[[Utopia]]" monster.
