title: Card Trivia:Sea Lord's Amulet
wikitext: |-
  {{Navigation}}

  * The amulet's shape resembles the planetary symbol of [[wikipedia:Neptune|Neptune]] (♆), which is shaped like a trident.
  ** In [[wikipedia:Classic mythology|Greco-Roman mythology]], the trident is commonly associated with the Greek sea god [[wikipedia:Poseidon|Poseidon]] and his Roman counterpart, [[wikipedia:Neptune (mythology)|Neptune]], the latter whom the planet is named after.
