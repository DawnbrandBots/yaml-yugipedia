  * In [[wikipedia:Greek mythology|Greek mythology]], [[wikipedia:Lamia|Lamia]] was queen of [[wikipedia:Libya (mythology)|Libya]] and a mistress of the god [[wikipedia:Zeus|Zeus]]. After his jealous wife, [[wikipedia:Hera|Hera]] killed Lamia's children in retribution, the latter lost her mind from grief and despair and started stealing and devouring others' children out of envy, eventually transforming into a monster.
