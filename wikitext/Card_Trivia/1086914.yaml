title: Card Trivia:Evasive Chaos Ninsect Labyrinth Spider
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Evasive Chaos Ninjitsu Art of Furious Insect Barrage]]".
  * The first portion of this monster's Japanese name (迷網" ''Meimō'') literally means "Bewildering Web", but can also be interpreted as a "labyrinth".
