title: Card Trivia:Jar of Greed
wikitext: |-
  {{Navigation}}

  * This jar appears in the artworks of "[[Damaging Hand]]", "[[Fine]]", "[[Future Destruction]]", "[[Giant Tortoise of Greed]]", "[[Goblin of Greed]]", "[[Goblin Thief]]", "[[Jar Turtle]]", and "[[Redeemable Jar]]".
  ** The shell of "[[Giant Tortoise of Greed]]" is based on this jar.
  * This card has an opposite counterpart: "[[Jar of Generosity]]", which in turn is based on "[[Pot of Generosity]]", an opposite counterpart of "[[Pot of Greed]]".
  * With the release of ''[[Super Starter: Space-Time Showdown]]'', this card has the shortest effect [[Card text|text]] of any other card, with only 12 characters (including spaces and punctuation). The previous shortest text was that of "[[Pot of Greed]]", until this card's [[errata]] removed the phrase "from your Deck" from the end of the sentence.
