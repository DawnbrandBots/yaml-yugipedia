title: Card Trivia:Laevateinn the Burning Blade
wikitext: |-
  {{Navigation}}

  * This monster is named after ''[[wikipedia:Lævateinn|Lævateinn]]'', a weapon mentioned in the ''[[wikipedia:Poetic Edda|Poetic Edda]]'' poem ''[[wikipedia:Fjölsvinnsmál|Fjölsvinnsmál]]'' in [[wikipedia:Norse mythology|Norse mythology]], which was crafted by the Nordic trickster god, [[wikipedia:Loki|Loki]].
  * This monster has a [[counterpart]]: "[[Flametongue the Burning Blade]]".
