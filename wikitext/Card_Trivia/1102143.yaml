title: Card Trivia:Brilliant Fusion
wikitext: |-
  {{Navigation}}

  * This card is named after a [[wikipedia:Brilliant (diamond cut)|brilliant cut]], which involves cutting and polishing [[wikipedia:Diamond (gemstone)|diamonds]] or other [[Wikipedia:Gemstone|gemstones]] so they would have 57 or 58 [[Wikipedia:Facet|facets]], a cone-shaped underside, and a high level of sparkle and brilliance.
  ** Fittingly, in {{episode|ARC-V|29|ref}}, this card was used to [[Fusion Summon]] "[[Gem-Knight Lady Brilliant Diamond (anime)|Gem-Knight Lady Brilliant Diamond]]", who is based on a brilliant cut of diamond.
