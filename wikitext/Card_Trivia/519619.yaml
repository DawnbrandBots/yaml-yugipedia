title: Card Trivia:Krawler Spine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[World Legacy in Shadow]]", "[[World Legacy Clash]]", "[[World Legacy Pawns]]", and "[[World Legacy Survivor]]".
  ** "[[Crusadia Krawler]]" is a purified version of this monster, possibly the one depicted in the artwork of "World Legacy Survivor".
  * This card is named after [[wikipedia:dendritic spine|dendritic spines]], the small protrusions on a [[wikipedia:neuron|neuron]]'s [[wikipedia:dendrite|dendrite]].
