title: Card Trivia:Rescue Hamster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Emerging Emergency Rescute Rescue]]" and "[[Pendulum Hole]]".
  * This card was released in ''[[The New Challengers]]'', the second [[Core Booster]] related to ''[[Yu-Gi-Oh! ARC-V]]'', to promote [[Pendulum Monster]]s, just as "[[Rescue Rabbit]]" was released in the ''[[Photon Shockwave]]'', the second Core Booster related to ''[[Yu-Gi-Oh! ZEXAL]]'', to promote [[Xyz Monster]]s.
