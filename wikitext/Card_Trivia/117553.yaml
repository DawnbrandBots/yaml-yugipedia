title: Card Trivia:Turf
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Colossal Fighter]]", "[[Insect Queen]]", and three "[[Bee List Soldier]]s" appear in this card's artwork.
  * Despite this card's translated name, this card's Japanese name, ''Nawabari'' (縄張り), literally means "demarcation", or "claiming territory".
  * In the English version of the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, this card's effect stated that it can [[Special Summon]] a monster from the [[Main Deck]], while [[Sect Ijuin]] said that it can Special Summon a monster from his [[hand]], as the original Japanese version says.
