title: Card Trivia:Bunny Ear Enthusiast
wikitext: |-
  {{Navigation}}

  * The goblins from the artwork of "[[Gift Exchange]]" appear in the artwork of this card, including the recurring unlucky goblin with the "[[Scrap Kong]]" shirt.
  * This monster's Japanese name features the kanji 「導師」 which refers to a religious teacher, master, or guru, but here it has a similar connotation to the English word "evangelist", as in "one who tries to spread good word about something".
  ** This monster is evidently trying to spread bunny ears, perhaps as one of her company's products or promotional merch, given her [[wikipedia:Promotional model|campaign-girl]] uniform.
  * This card was revealed on Konami's ''[[OCG]]'' Twitter account on January 1st, 2023, during which month marks the start date for the [[wikipedia:Rabbit (zodiac)|Year of the Rabbit]].
