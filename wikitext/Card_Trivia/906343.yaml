title: Card Trivia:Scareclaw Acro
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Primitive Planet Reichphobia]]", "[[Scareclaw Alternative]]", and "[[Scareclaw Arrival]]".
  * This card is named after [[wikipedia:Acrophobia|acrophobia]], the fear of heights.
  ** Fittingly, this monster has wings and is depicted flying in its card artwork.
