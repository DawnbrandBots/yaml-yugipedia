title: Card Trivia:Demise, King of Armageddon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[End of the World]]", the main [[Ritual Spell Card]] for this monster.
  * This card and "[[Ruin, Queen of Oblivion]]" have an antithesis in the ''[[Stardust Overdrive]]'' series called "[[Divine Grace - Northwemko]]", whose effect relies on protecting cards on the [[field]] rather than destroying them.
  * This monster has a dowgraded form, "[[Demise, Agent of Armageddon]]", and an upgraded form, "[[Demise, Supreme King of Armageddon]]".
  * This card's artwork was an earlier design originally made for "[[King of Destruction - Xexex]]".
  * This is the first [[Ritual Monster]] to be [[Limited]]; it has since been [[Unlimited]].
  * This card shares a similar destruction effect with "[[Judgment Dragon]]", albeit costing 1000 more [[Life Points]].
