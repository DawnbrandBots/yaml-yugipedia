title: Card Trivia:Dimonno Vaalmonica
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Valiant Smashers]]''/''[[Valiant Smashers]]''.
  * This monster appears in the artworks of "[[Vaalmonica Disarmonia]]", "[[Vaalmonica Ereditare]]", "[[Vaalmonica Scelta]]", and "[[Vaalmonica Versare]]".
  * This monster is named after "demone", the Italian word for "demon".
  * According to this monster's concept art, she is actually the more level-headed counterpart of "[[Angello Vaalmonica]]", though no one listens to her advice due to her demonic appearance.
