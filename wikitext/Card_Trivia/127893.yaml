title: Card Trivia:Trigon
wikitext: |-
  {{Navigation}}

  * "[[Delta Tri]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Dragon Laser]]".
  * The effect this card grants to the equipped monster is similar to the effect of "[[Falchionβ]]"; both monsters are also from the ''[[Konami Arcade Games|Gradius]]'' series.
  * This monster originated from [[Konami]]'s arcade game ''[[wikia:c:Konami:Lightning_Fighters|Lightning Fighters]]'' (known as "Trigon" in Japan.), where it is the dragon laser power up you obtain in game. In Gradius Gaiden, Deltatry's fire dragons were heavily inspired by "Trigon"'s dragon lasers, hence the name "Trigon".
