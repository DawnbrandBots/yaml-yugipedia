title: Card Trivia:Tuner's High
wikitext: |-
  {{Navigation}}

  * "[[Dark Resonator]]", "[[Junk Synchron]]", "[[Nitro Synchron]]", "[[Top Runner]]", and a [[Turbo Duel]]ing track appear in this card's artwork.
  * This card's name likely references "[[wikipedia:Neurobiological effects of physical exercise#Euphoria|runner's high]]", a psychological state of [[wikipedia:Euphoria|euphoria]] induced state induced by a continuous state of exercise in [[wikipedia:Long-distance running|long-distance running]].
  ** This is supported by this card's artwork depicting "Top Runner" appearing flushed while continuously running along the long-distance Turbo Dueling tracks.
