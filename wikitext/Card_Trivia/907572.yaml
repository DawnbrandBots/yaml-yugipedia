title: Card Trivia:Esperade the Smashing Superstar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dream Ticket]]", "[[Exciting Times]]", "[[Peace & Rock n' Roll]]", "[[Resolve (card)|Resolve]]" and "[[Superstar Session]]".
  ** This monster's guitar appears in the artwork of "[[Star's Hand Roadie]]".
  * This card has a [[WIND]] [[Attribute]] [[Shaman Bandit]] [[counterpart]]: "[[Pirate of the Apport Winds]]".
  ** Both cards share the same [[Level]] (7), [[Type]] ([[Psychic]]), and [[original ATK and DEF]] (2500/0).
