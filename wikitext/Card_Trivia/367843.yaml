title: Card Trivia:Cricket Close
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name comes from the darts game [[wikipedia:Cricket (darts)|Cricket]], in which teams of throwers attempt to score the most points before all the available numbers are "closed" by being struck three times.
  ** In this card's artwork the '''12''' Cricket has been "closed" with three darts having hit the target. This may also allude to how the card itself functions ('''1''' Card your opponent controls and '''2''' cards you control are negated).
