title: Card Trivia:Argostars - Glorious Adra
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Argostars - Adventurous Arion]]" and "[[Argostars - Home Stadium]]".
  * This monster is named after [[wikipedia:Adrastus|Adrastus]], the king of [[wikipedia:Argos|Argos]] and the leader of the [[wikipedia:Seven against Thebes|Seven against Thebes]].
  * The kanji ''eikan'' (栄冠, lit. "laurels") in this monster's Japanese name has a similar pronunciation to the Greek word ''eikṓn'' (εἰκών), which refers to a likeness or representation (e.g. a portrait, a statue, etc.), usually of a sacred or venerated individual (such as the goddess-like being in this card's artwork).
  ** The word ''eikṓn'' or "icon" can also refer to a person or thing widely admired for having great influence or significance in a particular sphere, such as a star athlete.
  ** One of the kanji (栄 ''ei'', lit. "glory") used in ''eikan'' is the same kanji used for the name of the [[wikipedia:Nakajima Sakae|Nakajima ''Sakae'']] aircraft engine.
  *** The ''Sakae'' is a [[wikipedia:Radial engine|radial engine]], a type of engine configuration also referred to as a "star engine" due to its star-like appearance.
