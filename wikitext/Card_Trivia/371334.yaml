title: Card Trivia:Ebon High Magician
wikitext: |-
  {{Navigation}}

  * This card is similar to "[[Ebon Illusion Magician]]", as both are [[Xyz Monster|Xyz]] counterparts to "[[Dark Magician]]".
  * This card's effect that allows the player to activate [[Quick-Play Spell Card]]s and [[Trap Card]]s from the hand during the opponent's turn may be a reference to the anime effect of "[[Dark Sage (anime)|Dark Sage]]".
