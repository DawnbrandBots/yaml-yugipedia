title: Card Trivia:Deskbot 005
wikitext: |-
  {{Navigation}}

  * This card is the first "[[Deskbot]]" [[Pendulum Monster]] released in the archetype.
  * Being a "Deskbot" monster, this monster is made up of various objects that can be commonly found on/in desks, specifically with an [[wikipedia:Adhesive|adhesive]] theme:
  ** 2 rolls of [[wikipedia:Adhesive tape|transparent adhesive tape]] (one on each wrist)
  ** 2 [[wikipedia:Tape dispenser|tape dispensers]] (one on each shoulder)
  ** A glue pen (slung on its right shoulder)
  ** A [[wikipedia:Glue stick|glue stick]] with its glue extended (behind its left shoulder)
  ** 2 glue applicator bottles with retained caps (attached to left and right sides of its helmet)
  * This monster appears in the artwork of "[[Deskbot Jet]]", seen on the lower platform, near the frontal exhausts.
