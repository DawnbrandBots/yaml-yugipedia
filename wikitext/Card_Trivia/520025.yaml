title: Card Trivia:Triple Burst Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from [[wikipedia:Burst mode (weapons)|burst mode]], a firing method for firearms where the trigger pull fires a preset number of rounds per burst, usually two or three rounds. This is further reflected with this monster's design featuring three firearm barrels, its [[Link Rating]] ([[Link 3 Monster Cards|3]]), and its three separate effects.
  * This is the first Link Monster that debuted in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, but was not yet released or revealed in the ''[[OCG]]''/''[[TCG]]'' before or immediately following its debut.
