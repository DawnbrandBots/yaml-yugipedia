title: Card Trivia:World Suppression
wikitext: |-
  {{Navigation}}

  * This card has three counterparts: "[[Armored Glass]]" (for [[Equip Spell Card]]s,) "[[Metal Detector]]" (for [[Continuous Trap Card]]s,) and "[[Mystic Probe]]" (for [[Continuous Spell Card]]). This is the only card among its counterparts that only negates the effect of a card to which it was chained, not any other cards of its type.
