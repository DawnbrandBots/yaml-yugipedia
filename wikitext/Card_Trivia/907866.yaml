title: Card Trivia:Constellar Tellarknights
wikitext: |-
  {{Navigation}}

  * "[[Constellar Caduceus]]" and the rings of "[[Tellarknight Altairan]]" and "[[Tellarknight Lyran]]" appear in this card's artwork.
  ** This card's artwork appears to depict the transformation of "Constellar Caduceus" into "[[Tellarknight Constellar Caduceus]]".
