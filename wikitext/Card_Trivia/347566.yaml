title: Card Trivia:ZS - Vanish Sage
wikitext: |-
  {{Navigation}}

  * This monster's name reflects its effect to make itself "vanish" (or [[banish]] itself) to [[return]] the player's monster that had "vanished" to their [[field]], then make the make the opponent's weaker monster "vanish".
  * This is the first "[[ZS -]]" monster, as well as the first monster [[draw]]n by [[Yuma Tsukumo]] via [[Shining Draw]] that isn't a "[[ZW -]]" monster.
  * This monster's ''[[OCG]]''/''[[TCG]]'' fixed [[ATK]] amount of 3000 is an alteration of its effect in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, which banishes the opponent's monsters with ATK less than that of the monster [[Special Summon]]ed from banishment by this monster's effect. In {{episode|ZEXAL|123|ref}}, Yuma Tsukumo used this monster's effect to Special Summon "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]" and banish multiple "[[Infection Bug Token]]s", since their ATK is less than "Galaxy-Eyes Photon Dragon's" 3000 [[original ATK]].
