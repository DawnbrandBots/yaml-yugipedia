title: Card Trivia:Dark Rebellion Xyz Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[The New Challengers]]'', as well as one of the cover cards of ''[[2015 Mega-Tins]]'', ''[[Booster SP: Wing Raiders]]''/''[[Wing Raiders]]'', and the Japanese version of ''[[Dimension Box Limited Edition]]''.
  * This monster appears in the artwork of "[[Raider's Unbreakable Mind]]".
  ** This monster's silhouette also appears in the artwork of "[[Supreme Rage]]".
  * This card appears in the artworks of "[[Dueltain Ultimate Party]]" and "[[Xyz on Xyz]]".
  * This is the [[signature card]] of [[Yuto]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster represents [[Z-ARC]]'s vengeance on humanity, which is reflected by Yuto's action against [[Duel Academy (ARC-V)|Duel Academy]] as part of [[The Resistance]] against the [[Invasion of Xyz Dimension]] carried over by the [[Fusion Dimension]].
  * This monster is the [[Xyz Dimension]] [[counterpart]] of "[[Odd-Eyes Pendulum Dragon]]", "[[Clear Wing Synchro Dragon]]", and "[[Starving Venom Fusion Dragon]]".
  * This monster has multiple forms:
  ** An evolved [[Yu-Gi-Oh! ARC-V (manga)|manga]] [[counterpart]]: "[[Dark Anthelion Dragon]]".
  ** A "[[Supreme King Dragon]]" counterpart: "[[Supreme King Dragon Dark Rebellion]]".
  ** A [[Ranked-Up]] form: "[[Dark Requiem Xyz Dragon]]".
  ** An "Arc" Ranked-Up form: "[[Arc Rebellion Xyz Dragon]]".
  ** A [[retrained]] counterpart: "[[Dark Rebellion Xyz Dragon of the Four Heavenly Dragons]]".
  ** Three upgraded [[Xyz Pendulum Monster|Xyz Pendulum]] forms with "Odd-Eyes Pendulum Dragon": "[[Odd-Eyes Rebellion Dragon]]", "[[Odd-Eyes Rebellion Dragon Overlord]]", and "[[Odd-Eyes Raging Dragon]]".
  * This was the first [[Xyz Monster]] Summoned in the ''Yu-Gi-Oh! ARC-V'' anime.
  ** It is also the first Xyz Monster used by [[Yuya Sakaki]] the ''Yu-Gi-Oh! ARC-V'' anime.
  * In the ''Yu-Gi-Oh! ARC-V'' anime, this monster's initial roar was the same as that of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]".
  ** This monster's snarl was the same as that of "[[Number 17: Leviathan Dragon (anime)|Number 17: Leviathan Dragon]]" in the Japanese version of the ''Yu-Gi-Oh! ZEXAL'' anime.
  * This monster has the following distinctions from the other [[Four Dimensional Dragons]]:
  ** It is the only one whose silhouette did not appear in the anime before it was fully revealed; however, its silhouette appeared when it first clashed with "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]" in {{episode|ARC-V|018|ref}}.
  *** According to director [[Katsumi Ono]], the aforementioned scene was supposed to be featured in {{episode|ARC-V|001|ref}}, before this monster debuted in {{episode|ARC-V|007|ref}}.
  ** It is the only one to have a Rank instead of a [[Level]], as it is an Xyz Monster.
  ** It is the only one to have only one effect.
  ** It is the only one that appeared in both the ''Yu-Gi-Oh! ARC-V'' anime and manga, as the other Dimension Dragons were replaced by their manga counterparts; however, in {{chapter|ARC-V|016|ref}}, "[[Dark Anthelion Dragon (manga)|Dark Anthelion Dragon]]" became the new signature card of [[Yuto (manga)|Yuto]].
