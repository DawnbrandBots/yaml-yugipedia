title: Card Trivia:Drastic Drop Off
wikitext: |-
  {{Navigation}}

  * "[[Green Gadget]]" appears in this card's artwork.
  ** Fittingly, this card is designed to counter the "[[Gadget]]" [[archetype]], where the early members of the archetype features an effect that [[add]]s their mentioned "Gadget" monsters from the [[Deck]] to the [[hand]].
  * This card is the improved version of "[[Drop Off]]".
  * This is the only [[Counter Trap Card]] that counters [[draw]]s.
