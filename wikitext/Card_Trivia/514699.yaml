title: Card Trivia:Herald of Perfection
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Edition Volume 4]]''.
  * This monster appears in the artwork of "[[Invincibility Barrier]]".
  * This monster's body is made up of "[[Herald of Green Light]]" (lower body), "[[Herald of Purple Light]]" (upper body), and "[[Herald of Orange Light]]" (torso/stomach).
  ** This monster's [[Level]] (6) is the combined total of those monsters' Levels, and its effect to [[negate]] the [[activation]] of a [[Spell]]/[[Trap Card]], or monster effect, are based on those of the respective monsters'.
  * This monster has an [[Card evolutions|upgraded]] form: "[[Herald of Ultimateness]]".
  ** This monster makes up the middle body portion of "Herald of Ultimateness".
  * This is the first [[Ritual Monster]] to be printed in [[Ghost Rare]].
