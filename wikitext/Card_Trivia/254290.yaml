title: Card Trivia:Gagagawind
wikitext: |-
  {{Navigation}}

  * "[[Gagaga Girl]]" appears in this card's artwork.
  ** Fittingly, "Gagaga Girl" was the monster used with this card's effect in each of its appearances in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to change the Special Summoned "[[Gagaga]]" monster's [[Level]] to 4 is an alteration of its anime effect, which allows the player to increase the Special Summoned monster's Level by 1. In the anime, this card was used to Special Summon the [[Level 3]] "[[Gagaga Girl (anime)|Gagaga Girl]]" and increase its Level by 1, thus making it a [[Level 4]] monster.
