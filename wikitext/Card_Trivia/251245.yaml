title: Card Trivia:CXyz Coach Lord Ultimatrainer
wikitext: |-
  {{Navigation}}

  * This monster is the "[[CXyz]]" [[Card evolutions|evolution]] of "[[Coach King Giantrainer]]".
  * This is the first [[Rank 9 Monster Cards|Rank 9]] [[Xyz Monster]] that is not a "[[Number]]" monster.
  * This monster has the highest [[original ATK]] (3800) of all [[FIRE]] monsters.
  * This is the first "CXyz" monster in the ''[[OCG]]''/''[[TCG]]'' that can be [[Xyz Summon]]ed through [[Rank-Up|Ranking-Up]] whose additional effect requires any Xyz Monster to be [[attach]]ed to it instead of specifying its base form.
