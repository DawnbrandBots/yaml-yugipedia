title: Card Trivia:Barbeque Ox
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Yakiniku]]" counterpart of "[[Battle Ox]]".
  ** Its Japanese name is a combination of the Japanese name of "Battle Ox", "Minotaurus" (ミノタウルス ''Minotaurusu''), and "salty beef tongue" (タン塩 ''Tanshio'').
  ** Its [[flavor text]] parodies the original flavor text of "Battle Ox".
  * This monster appears in the artwork of "[[Best Bite]]".
