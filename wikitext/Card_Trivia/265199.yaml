title: Card Trivia:Tool Box
wikitext: |-
  {{Navigation}}

  * The English letter "D" stands for "Deformer", the Japanese name for the "[[Morphtronic]]" [[archetype]] used by [[Leo]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, whose [[Leo (manga)|manga incarnation]] uses this card.
  * The shovel and screwdriver in this card's artwork is a reference to "[[Power Tool Mecha Dragon]]" and/or "[[Power Tool Dragon]]", whose designs includes both aforementioned tools. Fittingly, this card's effect is also based on the effect of "Power Tool Dragon" to randomly [[add]] an [[Equip Spell Card]] from the [[Deck]] to the [[hand]].
