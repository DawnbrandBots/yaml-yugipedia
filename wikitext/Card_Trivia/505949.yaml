title: Card Trivia:Eradicator Epidemic Virus
wikitext: |-
  {{Navigation}}

  * This card has several counterparts: "[[Crush Card Virus]]", "[[Deck Devastation Virus]]", "[[Full Force Virus]]", and "[[Grinning Grave Virus]]".
  ** Of the "[[Virus]]" [[Trap]]s, this card represents the letter "E" in the alphabetical alliteration pattern.
  * The kanji 闇 on each of the viruses in this card's artwork means "darkness".
  * The Japanese name of "[[Prometheus, King of the Shadows]]" refers to this card.
  * On the Italian card, the turn count is misprinted as '''38'''.
