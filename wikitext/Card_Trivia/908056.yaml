title: Card Trivia:Arms Regeneration
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' bulleted effect to increase a monster's [[ATK]] by 800 references how in the ''[[Yu-Gi-Oh! R]]'' and ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, this card was used to [[equip]] an [[Equip Spell]] that increased the equipped monster's ATK by 800 ("[[Lightning Blade (manga)|Lightning Blade]]" in the ''Yu-Gi-Oh! R'' manga, and "[[Rusted Blade - Rust Edge]]" in the ''Yu-Gi-Oh! 5D's'' manga).
