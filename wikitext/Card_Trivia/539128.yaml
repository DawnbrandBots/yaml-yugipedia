title: Card Trivia:Mirror Force
wikitext: |-
  {{Navigation}}

  * This card appears in the artworks of "[[E☆HERO Pit Boss]]", "[[Mirror Force Launcher]]", "[[Photon Hurricane]]", "[[Reverse Engineering]]", "[[Trap Recycle]]", and the international and second Japanese artworks of "[[Exchange]]".
  ** This card's ''[[Rush Duel]]'' artwork appears in the artwork of "[[Enchanted Mirror]]", mirrored.
  * This was the first card released that could only be [[activate]]d in response to an attack.
  * Originally, this card also had an effect to negate attacks, before its first [[Card Errata:Mirror Force|erratum]] removed that effect.
  * This is currently the only card to appear in every ''[[Yu-Gi-Oh!]]'' anime series.
  * This card has many [[counterpart]]s and inspired cards, often [[Type]] or [[archetype]]-specific or downgraded in effect.
  ** Six [[Attribute]]-based counterparts:
  *** [[FIRE]]: "[[Blazing Mirror Force]]".
  *** [[DARK]]: "[[Dark Mirror Force]]".
  *** [[WATER]]: "[[Drowning Mirror Force]]".
  *** [[EARTH]]: "[[Quaking Mirror Force]]".
  *** [[LIGHT]]: "[[Radiant Mirror Force]]".
  *** [[WIND]]: "[[Storming Mirror Force]]".
  ** An "[[Infernity]]" counterpart: "[[Infernity Force]]".
  ** A "[[Koa'ki Meiru]]" counterpart: "[[Koa'ki Meiru Shield]]".
  ** A [[Shining Sarcophagus (series)|Shining Sarcophagus]] counterpart: "[[Dark Magic Mirror Force]]"
  ** A "[[Legendary Dragon]]" [[Fusion Monster]] with "[[The Fang of Critias]]": "[[Mirror Force Dragon]]"
  ** Many inspired cards: "[[Black Sonic]]", "[[Blackwing - Backlash]]", "[[Blast Held by a Tribute]]", "[[Cell Explosion Virus]]", "[[Dark Revelation]]", "[[Froggy Forcefield]]", "[[Justi-Break]]", "[[Mirror Mail]]", "[[Rose Barrier Force]]", "[[Sakuretsu Armor]]", "[[Shining Silver Force]]", "[[Wall of Thorns]]", "[[Wave Force]]", and "[[Widespread Ruin]]".
  ** 5 ''Rush Duel'' cards: "[[Constructor Force]]", "[[Dark Revelation]]", "[[Jointech Bumper]]", "[[Meower Force]]", "[[Sakuretsu Force]]", and "[[The Barrier]]".
  * This is one of the few cards to appear in every ''[[Yu-Gi-Oh!]]'' [[NAS]] anime series, along with "[[Marauding Captain]]".
