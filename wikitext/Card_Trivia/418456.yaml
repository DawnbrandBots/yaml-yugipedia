title: Card Trivia:Performapal Trump Girl
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] appears to be a counterpart of "[[Performapal Trump Witch]]".
  * This card fills the role of easily [[Fusion Summon]]ing "[[Rune-Eyes Pendulum Dragon]]", a role shared with "[[Performapal Splashmammoth]]" when used in a similar way to Summon "[[Beast-Eyes Pendulum Dragon]]".
  * Currently, this is the only "[[Performapal]]" [[Pendulum Monster]] that does not have a [[Pendulum Effect]].
  * This monster appears in the artwork of "[[Performapal Teamwork]]" and "[[Performapal Guard Dance]]".
