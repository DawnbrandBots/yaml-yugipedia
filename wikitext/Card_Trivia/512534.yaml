title: Card Trivia:Desrook Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Castle Link]]", "[[Pandemonium]]", and "[[Spell Summon Stopper]]".
  * This card is one of the six [[wikipedia:chess|chess]]-themed "[[Archfiend]]" cards that debuted in ''[[Threat of the Dark Demon World]]'' in the ''[[OCG]]'' and ''[[Dark Crisis]]'' in the ''[[TCG]]'', each one featuring [[wikipedia:chessboard|chessboard]] background, all of whom are based on a [[wikipedia:chess piece|chess piece]]. In this monster's case, it is based on the [[wikipedia:Rook (chess)|rook]], a castle-shaped chess piece, as the monster's appearance is similar to the castle piece.
  ** This card's effect is a reference to the chess move "[[wikipedia:castling|castling]]". In chess, this technique is generally used to compromise the rook's position in exchange for the king's safety, similar to how this card's effect of sending itself to the [[Graveyard]] to [[Special Summon]] "[[Terrorking Archfiend]]" from the Graveyard.
  ** This monster's appearance is similar to the altar in "[[Altar for Tribute]]", and may play a storyline role; that altar is part of the artwork in "Pandemonium", the "home turf" of the chess-themed "Archfiends".
