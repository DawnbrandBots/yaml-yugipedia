title: Card Trivia:Kamakiriman
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Kamakiller" (カマキラー ''Kamakirā''), is a portmanteau of the Japanese words for "sickle" (カマ ''Kama'') and "killer" (キラー ''Kirā''), and is a pun on the Japanese word for "mantis" (カマキリ ''Kamakiri'').
  ** This card's English name, "Kamakiriman", is a portmanteau of the words "''Kamakiri''" and "man", which reflects this monster's appearance.
