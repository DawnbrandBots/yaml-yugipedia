title: Card Trivia:PSY-Framelord Zeta
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s for ''[[High-Speed Riders]]''.
  * This monster is "[[PSY-Frame Driver]]" wearing "[[PSY-Framegear Alpha]]" around the head, chest, and arms, and "[[PSY-Framegear Beta]]" around the thighs and waist.
  ** "[[PSY-Framelord Omega]]" is this monster wearing "[[PSY-Framegear Delta]]" while riding "[[PSY-Framegear Gamma]]" and "[[PSY-Framegear Epsilon]]".
