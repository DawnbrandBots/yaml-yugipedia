title: Card Trivia:Witchcrafter Madame Verre
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Infinity Chasers]]''/''[[The Infinity Chasers]]''.
  * This monster appears in the artworks of "[[Witchcrafter Collaboration]]", "[[Witchcrafter Confusion Confession]]", "[[Witchcrafter Distortion]]", "[[Witchcrafter Holiday]]", "[[Witchcrafter Masterpiece]]", and "[[Witchcrafter Unveiling]]".
  ** "[[Witchcrafter Golem Aruru]]" appears in this card's second artwork.
  * This monster's name is derived from "''verre''", the French word for "glass".
  * This monster has three older forms: "[[Rilliona, the Magistus of Verre]]", "[[Rilliona, the Wondrous Magistus Witch Wardrobe]]", and "[[Witchcrafter Madame Rilliona]]".
  * This monster has an "[[Endymion]]" [[counterpart]]: "[[Verre, the Maid of Endymion]]".
  ** In the ''[[Yu-Gi-Oh! OCG Stories]]'' manga, [[Rilliona]] ended up in this form due to multiple failed attempts at using forbidden magic to maintain her youthful looks.
  * According to the ''[[Official Card Game Art Works]]'' book, this monster's age is 9 and her height is 133 cm (4'4").
