title: Card Trivia:Fighting Flame Swordsman
wikitext: |-
  {{Navigation}}

  [[File:Flame_Swordsman_Joey.png|thumb|right|303|[[Joey Wheeler]] as "[[Flame Swordsman (anime)|Flame Swordsman]]"]]

  * Visually, this monster is based on [[Joey Wheeler]], who used "[[Flame Swordsman]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's design is based on Joey's appearance while his soul was trapped inside "[[Flame Swordsman (anime)|Flame Swordsman]]", due to the power of [[Yami Bakura|Yami Bakura's]] [[Millennium Ring]] in {{episode|Yu-Gi-Oh!|013|ref}}.
  * This monster's sword is inscribed with the kanji for "fighting flame" (闘炎 ''Touen''), referencing its name.
  ** The inscribing on the sword also references "Flame Swordsman", whose sword is inscribed with the kanji for "flame" (炎).
  * This monster's name is likely based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Flame Swordsman" in the English translated version of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga: "Fighting Spirit Flame Slash Sword".
