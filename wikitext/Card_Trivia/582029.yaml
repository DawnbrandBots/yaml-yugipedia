title: Card Trivia:Super Express Bullet Train
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Shinkansen|Shinkansen]], colloquially known in English as the "bullet train", a network of high-speed railway lines in Japan where the locomotives are named for their bullet-shaped nose.
  ** Fittingly, this monster's design feature what appear to be [[wikipedia:Caliber|calibers]] of [[wikipedia:Bullet|bullet]]s on the nose of the locomotive and on the front of side-mounted rocket thrusters.
  *** This monster's side-mounted rocket thrusters are based on a [[wikipedia:Turbojet train|turbojet train]], a locomotive propelled by built-in turbojet engines, which can reach high speeds.
  ** This monster's Japanese name, "Limited Express", is based on the type of express train which stops at a limited number of stops compared to other express services in similar routes.
