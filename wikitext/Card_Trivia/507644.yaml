title: Card Trivia:Dark Scorpion Burglars
wikitext: |-
  {{Navigation}}

  * "[[Dark Scorpion - Chick the Yellow]]", "[[Dark Scorpion - Cliff the Trap Remover]]", "[[Dark Scorpion - Gorg the Strong]]", "[[Dark Scorpion - Meanae the Thorn]]", and "[[Don Zaloog]]" appear in this card's artwork.
  ** Despite the gun wielded by "Don Zaloog" depicted in its Japanese artwork being edited out in the ''[[TCG]]'', it is still present in his holster in this artwork.
  ** Despite being the "combination" of all the members of the "[[Dark Scorpion]]" [[archetype]], this monster's [[original ATK and DEF]] (1000/1000) is the same as "Meanae the Thorn's".
  * This monster is similar to "[[A-Team: Trap Disposal Unit]]", "[[Harpie Lady Sisters]]", and "[[House Duston]]" in appearance, as they depict every initial member of their themes while counting as a separate monster entirely.
