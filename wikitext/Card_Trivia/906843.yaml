title: Card Trivia:S-Force Pla-Tina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[S-Force Bridgehead]]".
  * The "[[S-Force]]" crest appears on this card's artwork, tattooed on this monster's right thigh. It's coloration appears to be brown, but this is due to "Pla-Tina’s" stockings as it is much more likely purple like the tattoos on her forehead and left arm.
