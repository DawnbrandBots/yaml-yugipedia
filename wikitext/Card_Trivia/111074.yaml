title: Card Trivia:Zero Hole (5D's)
wikitext: |-
  {{Navigation|Zero Hole|mode=nonGame}}

  * This card's artwork depicts an airplane, a boat, a radio tower, and a train among the objects being sucked into the vortex.
  * This card's name refers to the fact that the player needs '''zero''' cards in their [[hand]] to [[activate]] its effect.
