title: Card Trivia:Abysslayer Makara
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Makara|Makara]], a sea creature in [[wikipedia:Hindu mythology|Hindu mythology]] who serves as the mount for various water-based gods, including the river goddesses [[wikipedia:Ganga (goddess)|Ganga]] and [[wikipedia:Narmada_River#Significance in Hinduism|Narmada]], and the ocean god [[wikipedia:Varuna|Varuna]].
