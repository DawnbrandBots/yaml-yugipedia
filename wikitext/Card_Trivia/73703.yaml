title: Card Trivia:Psychic Wave
wikitext: |-
  {{Navigation}}

  * "[[Jinzo]]", "[[Jinzo - Returner]]", and the cards "[[Dust Tornado]]", "[[Shattered Axe]]", and "[[Trap Hole]]" appear in this card's artwork.
  ** A [[Duelist]] wearing a ''[[Yu-Gi-Oh! GX]]''-era [[Duel Disk]] can also be seen in this card's artwork, taking [[damage]] as per this card's first effect.
  * This card's name is based on one of the [[attack name]]s of "[[Jinzo (anime)|Jinzo]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and the original Japanese version of the [[Yu-Gi-Oh! (anime)|anime]].
