title: Card Trivia:Masked Hero Inferno
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artworks of "[[Damaged Mask]]", "[[Double Attack (Team Strike)]]", "[[Mask Change]]", and "[[Mask Function 1|Mask Function #1]]".
  * This monster is based on the archetypal red Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[FIRE]], which is represented by a red-colored circle.
  * This is the first "[[Masked HERO]]" monster to appear in the ''Yu-Gi-Oh! GX'' [[Yu-Gi-Oh! GX (manga)|manga]].
