title: Card Trivia:Duck Dummy
wikitext: |-
  {{Navigation}}

  * "[[Behemoth the King of All Animals]]" and a cutout of "[[Rescue Rabbit]]" appear in this card's artwork.
  ** "Behemoth" is afraid of the cutout due to the event depicted in the artwork of "[[Lucky Punch]]".
  * This monster's Japanese name, "Duck Dropper", likely refers to the carnival game where players shoot "duck droppers" that can be reset to standing position afterwards.
