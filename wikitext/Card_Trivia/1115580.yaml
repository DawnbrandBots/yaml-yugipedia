title: Card Trivia:Mind Procedure
wikitext: |-
  {{Navigation}}

  * This monster is the retrained counterpart to "[[Mind Protector]]"
  ** This monster's total [[original ATK and DEF]] (1100 + 1100) is equal to the total original ATK and DEF of "Mind Protector" (0 + 2200).
  ** This monster's effect to [[add]] a "[[Teleport]]" [[Normal Spell Card]] or [[Quick-Play Spell Card]] is based on how "Mind Protector" appears in the artwork of the Quick-Play Spell Card "[[Emergency Teleport]]".
