  * "[[Alien Shocktrooper]]" appears in this card's artwork.
  * The purple warrior in this card's artwork also appears in the artworks of "[[Battle Rush]]", "[[Comeback]]", "[[Cross Attack]]", "[[Courageous Heart]]", "[[Dimension Gate]]", "[[Double Tension]]", "[[Fiery Fervor]]", and "[[Heartfelt Appeal]]", all of which are used by [[Yuma Tsukumo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
