title: Card Trivia:Vola-Chemicritter Methydraco
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Burnout]]" and "[[Catalyst Field]]", the latter card's artwork revealing that this monster is the result of a merger between "[[Chemicritter Carbo Crab]]", "[[Chemicritter Hydron Hawk]]", and "[[Chemicritter Oxy Ox]]".
  ** Furthermore, this card's ATK and DEF are equal to the respective combined ATK and DEF of "[[Poly-Chemicritter Dioxogre]]" and "[[Poly-Chemicritter Hydragon]]", which can both be Special Summoned simultaneously via the effect of "Burnout" and are valid Xyz Materials for this card.
  * The chemical symbol of [[wikipedia:Methanol|Methanol]] (CH<sub>3</sub>OH) is represented by the four "H"s and the "O" surrounding the "C" on this monster's chest.
