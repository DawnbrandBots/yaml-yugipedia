title: Card Trivia:Stella the Clad Dragon Researcher
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Curse of the Magiclad Dragon]]", "[[Infernoclad Dragon - Flagal]]", "[[Magiclad Dragon - Vezzal the Star Eater]]", and "[[Researching the Clad Dragondom]]", as well as in the second artwork of "[[Clad Dragon Tome - Chapter on Curse Breaking]]" and both artworks of "[[Lightclad Dragon Egg]]".
  ** According to the Lore, this monster's second artwork is the result of "Stella" receiving a curse upon grabbing one of the scales of "Magiclad Dragon - Vezzal the Star Eater" as seen in "Curse of the Magiclad Dragon".
