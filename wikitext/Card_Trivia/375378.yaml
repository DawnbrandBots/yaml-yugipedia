title: Card Trivia:King's Synchro
wikitext: |-
  {{Navigation}}

  * Three [[Level]] stars, three [[Synchro Summon]]ing rings (as depicted in the ''[[Yu-Gi-Oh! ARC-V]]'' anime), and a man resembling [[Seto Kaiba]] appear in this card's artwork.
  ** This is odd, since Seto Kaiba is not associated with [[Synchro Monster]]s. However, [[Jack Atlas (ARC-V)|Jack Atlas]], who succeeded Seto Kaiba as a protagonist's rival, has a design similar to Seto Kaiba.
  * This card can be seen as a [[counterpart]] to "[[King's Consonance]]".
  ** Both are [[Trap Card]]s that can [[negate]] attacks and Synchro Summon monsters by [[banish]]ing the [[Synchro Material]]s from the [[Graveyard]].
  ** Both were used by a different version of Jack Atlas: this card was used by his ''[[Yu-Gi-Oh! ARC-V]]'' incarnation, and "King's Consonance" was used by his ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' [[Jack Atlas (manga)|manga incarnation]].
  ** Both cards' artworks depict a lookalike of a predecessor of Jack Atlas: this card's artwork depicts a character resembling Seto Kaiba, who preceded Jack in the anime, while the artwork of "King's Consonance" depicts the possible ancestor of Jack in the manga.
