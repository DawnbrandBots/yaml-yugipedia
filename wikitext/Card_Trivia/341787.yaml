title: Card Trivia:Monstrous Bird
wikitext: |-
  {{Navigation}}

  * The cow that this monster is carrying seems to be the same one that appears on the artworks of "[[Heavy Storm]]" and "[[Storm]]".
  * This is one of the first [[WIND]] monsters to appear in the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'']] anime, along with "[[Air Eater (anime)|Air Eater]]" and "[[Punished Eagle (anime)|Punished Eagle]]".
  ** This is also one of the first [[Winged Beast]] monsters to appear in the anime, along with "Punished Eagle".
