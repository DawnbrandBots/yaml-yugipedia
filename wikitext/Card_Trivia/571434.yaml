title: Card Trivia:Multi Sledgehammer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Link Rush]]".
  * This monster's name is a portmanteau of the words "[[wikipedia:Multithreading (computer architecture)|multithreading]]" (マルチスレッド, ''maruchisureddo'') and "sledgehammer" (スレッジハンマー, ''surejjihanmā'').
