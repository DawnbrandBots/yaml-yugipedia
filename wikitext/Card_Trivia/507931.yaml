title: Card Trivia:Succubus Knight
wikitext: |-
  {{Navigation}}

  * This monster has a counterpart: "[[Vishwar Randi]]".
  * This monster is based on a [[wikipedia:Succubus|succubus]]. A succubus is a female demon that seduces men in their sleep and usually steals her victims' soul or their semen.
  * The Spanish lore of this card (which also left part of its name-"Succubus"-untranslated) suffered from a mistranslation. "''An unworthy warrior wizard''" was translated as "''An unworthy warrior lizard''".
  ** Unlike its English version, this card hasn't been errata-ed, meaning it still keeps its erroneous name and lore, even on the Yu-Gi-Oh! Trading Card Game Card Database.
