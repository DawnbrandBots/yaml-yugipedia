title: Card Trivia:Super Roboyarou
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cybernetic Zone]]" and "[[Rare Metal Soul]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] counterpart of "[[Roboyarou]]".
  * This monster has a female counterpart: "[[Super Robolady]]".
  ** Fittingly, both require "Roboyarou" and "[[Robolady]]" as [[Fusion Material]]s, with the former being listed first.
