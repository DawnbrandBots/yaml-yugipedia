  [[File:Number107GalaxyEyesTachyonDragon-JP-Anime-ZX-NC-Attack.png|thumb|250px|"[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]" attacking in ''[[Unbreakable Heart]]''.]]

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * "[[Number 107: Galaxy-Eyes Tachyon Dragon]]" appears in this card's artwork.
  ** This card's name is based on the [[signature move]] of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This card's artwork is based on a shot from the second version of the fourth opening of the ''Yu-Gi-Oh! ZEXAL'' anime, ''[[Unbreakable Heart]]'', showing "Number 107: Galaxy-Eyes Tachyon Dragon" attacking.

