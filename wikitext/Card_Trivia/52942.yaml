title: Card Trivia:Colossal Fighter/Assault Mode
wikitext: |-
  {{Navigation}}

  * This monster is the [[Card evolutions|upgraded]] "[[/Assault Mode]]" form of "[[Colossal Fighter]]".
  ** This monster's effect is the opposite of that of "Colossal Fighter": this monster reduces the opponent's monsters' [[ATK]], while "Colossal Fighter" increases its own ATK.
  * This is the only "/Assault Mode" monster to be released as a promotional card for a [[Sneak Peek]].
