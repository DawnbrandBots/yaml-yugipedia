title: Card Trivia:Meklord Army Deployer Obbligato
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the "[[wikipedia:Obbligato|obbligato]]", a musical style which consists of around twenty F-major chords played at [[wikipedia:Dynamics (music)|fortissimo]].
  ** This is fitting, as this monster is a physical amalgam of "[[Meklord Astro Mekanikle]]" and "[[Fortissimo the Mobile Fortress]]", with this monster's second effect being based on the damaging effect of "[[Fortissimo the Mobile Fortress (anime)|Fortissimo the Mobile Fortress]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
