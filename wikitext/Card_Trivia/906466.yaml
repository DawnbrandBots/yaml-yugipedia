  * This is a ''[[Rush Duel]]'' [[Monster Card]] [[counterpart]] of "[[Coffin Seller]]".
  ** Both "[[Malevolent Catastrophe (Rush Duel)|Malevolent Catastrophe]]", which this monster supports, and "Coffin Seller" were cards used by [[Yami Marik]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].

