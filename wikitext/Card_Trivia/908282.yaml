title: Card Trivia:Springans Rockey
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gung-Ho! Springans!]]", "[[Spright Smashers]]", "[[Springans Booty]]", "[[Springans Brothers]]", "[[Springans Call!]]", "[[Springans Interluder]]", "[[Springans Kitt]]", "[[Springans Merrymaker]]", "[[Tally-ho! Springans]]", "[[New Frontier]]", "[[Tribe Drive]]", "[[Tri-Brigade Kitt]]", and "[[Tri-Brigade Rendezvous]]".
  ** This monster appears in its unarmored soot form in the artworks of "[[Albaz the Ashen]]", "[[Branded in High Spirits]]", "[[Light of the Branded]]", "[[Rindbrumm the Striking Dragon]]", "[[Swordsoul Assessment]]", and "New Frontier".
  ** A green hologram of this monster also appears in the artwork of "[[Springans Watch]]".
  ** The hammer of "[[Incredible Ecclesia, the Virtuous]]" is a skull worn by this monster.
