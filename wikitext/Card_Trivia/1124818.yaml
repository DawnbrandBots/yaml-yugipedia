title: Card Trivia:Trap Holic
wikitext: |-
  {{Navigation}}

  * "[[Ariane the Labrynth Servant]]", "[[Arianna the Labrynth Servant]]", "[[Arias the Labrynth Butler]]", "[[Labrynth Chandraglier]]", "[[Labrynth Stovie Torbie]]", and "[[Lovely Labrynth of the Silver Castle]]" appear in this card's artwork.
  * This card's name is a combination of the word "[[Trap]]" and the suffix "''-holic''" (used as slang to refer to any sort of obsession or addiction).
