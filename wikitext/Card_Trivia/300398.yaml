title: Card Trivia:And the Band Played On
wikitext: |-
  {{Navigation}}

  * "[[Symphonic Warrior Basses]]", "[[Symphonic Warrior Drumss]]", and "[[Symphonic Warrior Piaano]]" appear in this card's artwork.
  * This card's English name is likely based on the refrain of the 1895 pop song ''[[wikipedia:The Band Played On|The Band Played On]]'': while the song itself became the source material behind other films and movies, the refrain was much more popular and became a common phrase referring to bravery and steadfastness in the face of peril.
