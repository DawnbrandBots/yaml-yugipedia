title: Card Trivia:Patrician of Darkness
wikitext: |-
  {{Navigation}}

  * This monster resembles Dracula's design from the earlier ''[[wikipedia:Castlevania|Castlevania]]'' games.
  * This monster's red wings resemble a [[wikipedia:Torero|matador's]] red cape, which reflects this card's effect of choosing the opponent's attack target.
  * This is one of three male "noble" [[Zombie]] monsters, the other two being "[[Vampire Lord]]" and "[[Vampire's Curse]]".
