title: Card Trivia:Stardust Flash
wikitext: |-
  {{Navigation}}

  * "[[Stardust Dragon]]" appears in this card's artwork, creating [[wikipedia:Afterimage|afterimages]].
  * This card's artwork is similar to when "[[Shooting Star Dragon]]" attacks using afterimages in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This card was also used in {{episode|5D's|057|ref}}, the same episode as the [[Trap Card]] "[[Shooting Star]]", which may have been foreshadowing the first appearance of "Shooting Star Dragon".
