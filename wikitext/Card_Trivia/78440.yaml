title: Card Trivia:Key Mace
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Speed Spell - Ignition]]" and "[[World of Spirits]]".
  * This monster has two [[counterpart]]s: "[[Key Mace 2|Key Mace #2]]" and the character [[Gate Mace]].
  ** This relationship is further supported by the Japanese name of "Key Mace #2", which translates to "Lock Mace" in English.
  * This monster has a retrained "[[Memento]]" counterpart: "[[Mementotlan Mace]]".
