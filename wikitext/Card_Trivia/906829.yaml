title: Card Trivia:Seedchrotron Brusselun
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Synchrotron|synchrotron]], a type of [[wikipedia:Particle accelerator|particle accelerator]].
  * Similar to the other "[[Tron (series)|tron]]" monsters used by [[Nail Saionji]], the number of rings on this monster's body is the same as its [[Level]].
  * This monster appears to be an evolution of "[[Cycliptron]]".
  ** The synchrotron was developed from the [[wikipedia:Cyclotron|cyclotron]], which "Cycliptron" is named after.
