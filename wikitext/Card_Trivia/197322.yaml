title: Card Trivia:Mermail Abyssgaios
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abyss-strom]]" and "[[Fire King Sky Burn]]".
  * "[[Abyss-sting Triaina]]" appears in this card's artwork, wielded by this monster.
  * This monster is based on [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea who is often depicted wielding his signature weapon, the [[wikipedia:Trident|trident]].
  ** This monster's name is based on ''Ennosigaios'' ("earth-shaker"), an epithet of Poseidon referencing how Poseidon is also the Greek god of earthquakes.
  ** Fittingly, this monster can be Summoned by using "Poseidra" as an [[Xyz Material]], who is also based on Poseidon.
  * This monster has a female counterpart: "[[Mermail Abysstrite]]".
  ** Both monsters have opposite [[original ATK and DEF]].
  ** Both monsters are named after the Greek gods of the sea; "Abysstrite" is named after [[wikipedia:Amphitrite|Amphitrite]], the wife of Poseidon.
  ** According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], this monster once was the king of the "Mermails", while "Abysstrite" is their queen.
  * According to the [[Master Guide 4 card storylines|''Master Guide'' 4 card storylines]], this monster took over the body of "[[Poseidra, the Atlantean Dragon]]", after the latter was transformed by the bracelet seen in the artwork of "[[Abyss-squall]]".
  ** The bottom of this monster's body resembles "Poseidra", and both also share the same [[Attribute]] ([[WATER]]), original [[ATK]] and [[DEF]] (2800/1600), and this monster's [[Rank]] corresponds to the [[Level]] (7) of "Poseidra".
  *** Fittingly, this monster's silhouette also appears in the commercial of ''[[Realm of the Sea Emperor Structure Deck]]'', the [[Structure Deck]] in "Poseidra" was released.
  * According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], "[[Neptabyss, the Atlantean Prince]]" is this monster after having been separated from "Poseidra", having lost most of its powers and memories.
