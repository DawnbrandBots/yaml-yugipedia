title: Card Trivia:Gouki Riscorpio
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gouki Roar]]".
  * This monster is named after "Scorpio Rising", a technique used by Japanese professional wrestler, [[wikipedia:Meiko Satomura|Meiko Satomura]], which involves the usage of a step up axe kick. Fittingly, this monster's design is based on a [[wikipedia:Scorpion|scorpion]].
