title: Card Trivia:Valkyrie of the Nordic Ascendant
wikitext: |-
  {{Navigation}}

  * The [[wikipedia:Valkyrie|Valkyries]] are minor female Norse gods that serve [[Odin, Father of the Aesir|Odin]].
  ** Befittingly, this is a Tuner Monster that can Summon Odin in the game.
  * This monster's effect to Summon "[[Einherjar Token]]s" reflects the fact that Valkyries were sent to Earth to gather the souls of dead warriors, called "[[wikipedia:Einherjar|Einherjar]]" to ascend to the halls of the slain, [[Valhalla, Hall of the Fallen|Valhalla]], ruled by Odin and located in Asgard.
