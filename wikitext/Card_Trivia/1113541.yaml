title: Card Trivia:Divine Scorpion Beast of Serket
wikitext: |-
  {{Navigation}}
  [[File:MysticalBeastofSerket-JP-Anime-DM-NC-2.png|thumb|"[[Mystical Beast Serket (anime)|Mystical Beast Serket]]" taking on the humanoid stance of "[[Jinzo (anime)|Jinzo]]" after destroying it by battle.]]
  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is the [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Mystical Beast of Serket]]"
  ** This monster is based on the form "Mystical Beast of Serket" assumed after absorbing "[[Jinzo]]". Fittingly, this monster's [[Fusion Material]]s requires a monster with 2500 or less [[ATK]], while the [[original ATK]] of "Jinzo" is 2400.

