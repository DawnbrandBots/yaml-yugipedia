title: Card Trivia:Gorlag
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the [[wikipedia:Balrog|Balrog]], a fiery demon featured in [[wikipedia:J. R. R. Tolkien|J. R. R. Tolkien's]] [[wikipedia:Tolkien's legendarium|Middle-earth legendarium]].
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster is depicted wielding a fiery sword and was used with the card "[[Fire Whip]]", both of which are the weapons used by the Balrog in the 2001 fantasy film, ''[[wikipedia:The Lord of the Rings|The Lord of the Rings]]''.
  * In the English dubbed version of the ''Yu-Gi-Oh!'' anime, this card underwent various changes to distance it from J. R. R. Tolkien, likely to avoid legal issues.
  ** This monster's name is "Balrog" spelled backwards with the letter "g" replacing the letter "b".
  *** Interestingly, in this [https://www.youtube.com/watch?v=8YgVHzIyU8Q video] featuring clips of [[Alister|Alister's]] first Duel with [[Seto Kaiba]] on the official ''Yu-Gi-Oh!'' YouTube channel, Alister refers to this card by its Japanese name instead of its English name.
  ** This monster's flames were colored blue instead of orange in the original Japanese version.
