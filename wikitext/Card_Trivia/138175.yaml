title: Card Trivia:Prominence, Molten Swordsman
wikitext: |-
  {{Navigation}}

  * This card's name is based on a Solar Prominence, an  eruption  of  a  flame-like  tongue  of  relatively  cool,  high-density  gas  from  the  solar  chromosphere  into  the  corona  where  it  can  be  seen  during  a  solar  eclipse  or  by  observing  strong  spectral  lines  in  its  emission  spectrum.
  * The stance of this card could reference some Chinese martial arts such as [[wikipedia:Wushu (sport)|Wushu]].
  * This monster's sword is similar to the one that appears in the background of "[[Kayenn, the Master Magma Blacksmith]]".
