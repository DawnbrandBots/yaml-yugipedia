title: Card Trivia:Salamangreat Heatleo
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Soulburner]]''.
  * This monster appears in the artworks of "[[Link Fire's Return]]", "[[Salamangreat Claw]]", "[[Salamangreat Fang]]", "[[Salamangreat Roar]]", "[[Salamangreat Sanctuary]]", and "[[Will of the Salamangreat]]".
  * This monster has an upgraded [[Fusion Monster|Fusion]] form: "[[Salamangreat Violet Chimera]]".
  * "[[Decode Talker Heatsoul]]" is "[[Decode Talker]]" combined with this monster.
  * This is the [[signature card]] of [[Theodore Hamilton]]/Soulburner in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this card and "[[Salamangreat Pyro Phoenix (Duel Links)|Salamangreat Pyro Phoenix]]" are the only ace monsters whose Summoning animations do not play when Summoned normally; rather, they only play when [[Reincarnation Link Summon]]ed (i.e. Link Summoned using another copy of itself as one of the Link Materials).
