title: Card Trivia:Triangle Ecstasy Spark
wikitext: |-
  {{Navigation}}

  [[File:Triangle_Ecstasy_Spark_Duel_117.png|thumb|right|250|"[[Harpy Lady Sisters (manga)|Harpy Lady Sisters]]" attacking "[[Mystical Elf (manga)|Mystical Elf]]".]]

  * "[[Harpie Lady 1]]", "[[Harpie Lady 2]]", and "[[Harpie Lady 3]]" appear in this card's artwork.
  * The English letter "X" in this card's artwork is the pronunciation of the first syllable of "Ecstasy".
  * In the original Japanese version of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], as well as ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this was the attack name of "Harpie Lady Sisters".
  * In ''[[Yu-Gi-Oh! Rush Duel]]'', this card's activation requirement and effect to increase the ATK of [[WIND]] monsters by 600 is based on this card's ''[[OCG]]''/''[[TCG]]'' effect to increase the ATK of "[[Harpie Lady Sisters]]" to 2700, as "[[Harpie Lady Sisters (Rush Duel)|Harpie Lady Sisters]]" is 600 ATK less than the aforementioned amount.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|117|ref}}, specifically from the panel showing "[[Harpy Lady Sisters (manga)|Harpy Lady Sisters]]" attacking "[[Mystical Elf (manga)|Mystical Elf]]".

