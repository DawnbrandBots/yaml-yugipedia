title: Card Trivia:Synthetic Seraphim
wikitext: |-
  {{Navigation}}

  * Several "[[Synthetic Seraphim Token]]s" appear in this card's artwork.
  * This card's English name, and the English names of the "Synthetic Seraphim Tokens", are derived from the [[wikipedia:Seraph|seraphim]], the highest order of angels in traditional [[wikipedia:Angels in Christianity|Christian angelology]].
