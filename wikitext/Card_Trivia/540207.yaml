title: Card Trivia:Different Dimension Capsule
wikitext: |-
  {{Navigation}}

  * This card is similar to "[[Gold Sarcophagus]]" as they are both Egyptian-themed containers for holding the remains of the dead, of which also have very similar effects.
  * The capsule's face in this card's artwork bears a strong resemblance to the trademark mask of [[wikipedia:Tutankhamun|King Tut]].
