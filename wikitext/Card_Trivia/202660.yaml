title: Card Trivia:Electromagnetic Magnedragon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster shares similarities with "[[Valkyrion the Magna Warrior]]":
  ** Both share the same [[Attribute]] ([[EARTH]]), [[Level]] (8), [[Type]] ([[Rock]]), and [[original ATK]] (3500).
  ** Both require three [[Level 4]] "[[Magnet]]" monsters with Greek letters in their names.
  ** This monster's [[Fusion Monster|Fusion]] [[card type|type]] references how "Valkyrion" was treated as a Fusion Monster in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
