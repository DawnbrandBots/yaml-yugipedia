title: Card Trivia:Heroic Challenger - Extra Sword
wikitext: |-
  {{Navigation}}

  * This monster's name and weapons are based on the [[wikipedia:Dual wield|dual wielding]] technique, which requires the usage of two weapons, one in each hand.
  ** This monster's name also reflects its effect to grant an [[Xyz Monster]] that uses it as [[material]] an "extra" 1000 [[ATK]].
