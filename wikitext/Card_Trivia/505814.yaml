title: Card Trivia:Destiny HERO - Disk Commander
wikitext: |-
  {{Navigation}}

  * This card is the first "[[HERO]]" monster to be [[Forbidden]], the second being "[[Elemental HERO Stratos]]" in [[September 2013 Lists (TCG)|September 2013]] for the ''[[TCG]]''.
  * In the ''[[Legendary Collection 2: The Duel Academy Years Mega Pack]]'', this was the only "HERO" monster not to have "Hero" in all capital letters. This oversight was corrected in the ''[[Ra Yellow Mega Pack]]''.
