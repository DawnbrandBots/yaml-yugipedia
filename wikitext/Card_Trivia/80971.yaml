title: Card Trivia:Dark Red Enchanter
wikitext: |-
  {{Navigation}}

  * In the manga, this card has no [[effect]] and has an original [[ATK]] of 2300 - the same amount as when this monster gets its two [[Spell Counter]]s via its effect upon being [[summoned]].
  * With the exception of the helmet, this card bears a striking resemblance to the mage tier sets of the MMORPG ''World of Warcraft''.
