title: 'Card Trivia:Number 93: Utopia Kaiser'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Commitment to Tomorrow]]".
  * This is the first member of the "[[Utopia (archetype)|Utopia]]" [[archetype]] to not feature the number "39", instead being the number reversed.
  ** It is also the first "Utopia" monster not to be used by [[Yuma Tsukumo (manga)|Yuma Tsukumo]], instead being used solely by [[Astral (manga)|Astral]].
  ** This monster can be considered the "Utopia" and manga counterpart to "[[Number 99: Utopic Dragon]]".
  * This is the first [[Rank 12]] monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This monster's ''OCG''/''TCG'' [[Summoning condition]] requiring an [[Xyz Monster]](s) with the same [[Rank]] is similar to "[[Number F0: Utopic Future]]" and "[[Number S0: Utopic ZEXAL]]".
  ** All three monsters' Summoning conditions require [[Xyz Material]]s that do not feature [[Level]]s; however,  this monster is a Rank 12 monster, while the aformentioned monsters' [[Rank]]s are 0.
  *** Also, this monster does not use or mention [[Level 12]] monsters in its ''OCG''/''TCG'' Summoning condition. In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, however, this monster features the regular [[Xyz Summon]]ing condition.
  * This monster's ''OCG''/''TCG'' effect to [[Special Summon]] "Number" monsters with [[Rank 9]] and 3000 [[ATK]] maximum is an alteration of its manga effect, which could Special Summon any number of "Number" monsters up to the number of Xyz Materials [[attach]]ed to it. In the manga, this monster Special Summoned "[[No. 9: Dyson Sphere (manga)|No. 9: Dyson Sphere]]", whose Rank is 9, and "[[No. 46: Dragluon (manga)|No. 46: Dragluon]]", whose [[original ATK]] is 3000.
  * This card's artwork is taken from {{chapter|ZEXAL|054|ref}}, specifically from the panel showing [[No. 93: Utopia Kaiser (manga)|this monster]] being Summoned.
  * This monster shares similarities with "[[Number 99: Utopia Dragonar]]":
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Rank]] (12) and [[Type]] ([[Warrior]]).
  ** Both are the ultimate forms of "Number 39: Utopia" with different numerals from the number "39".
  ** Both share an effect to Special Summon a "Number" monster from the Extra Deck with limitations.
