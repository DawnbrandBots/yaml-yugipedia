title: Card Trivia:Majinrai, the Striking Storm
wikitext: |-
  {{Navigation}}

  * This card's name is based on the Japanese name of "[[Skull Archfiend of Lightning]]".
  * This card is a ''[[Rush Duel]]'' [[counterpart]] of "[[Makiu, the Magical Mist]]".
  * The damage inflicted by this card is equal to half the ATK of "[[Summoned Skull (Rush Duel)|Summoned Skull]]", rounded up to the nearest 100.
