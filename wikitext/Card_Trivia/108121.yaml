title: Card Trivia:Jurrac Aeolo
wikitext: |-
  {{Navigation}}

  * This monster may be based on the hadrosaurid dinosaur [[wikipedia:Amurosaurus|Amurosaurus]]. However, with the two 'horns' above and a little bit in front of the eyes, it is possibly an infant [[wikipedia:Allosaurus|Allosaurus]]. It also sports the name of a [[wikipedia:Aeolosaurus|Aeolosaurus]], a sauropod from the Late Cretaceous.
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'', this card's effect fails to mention that it can only Summon Level 4 or lower monsters.
  * This monster is emerging from a "[[Jurrac Token]]".
