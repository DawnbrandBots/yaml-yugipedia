title: Card Trivia:Mariña, Princess of Sunflowers
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from [[wikipedia:Sun and Moon (Inuit myth)|Malina]], one of the names given to the [[wikipedia:Inuit|Inuit]] goddess of the [[wikipedia:Sun|Sun]].
  ** This monster's [[FIRE]] [[Attribute]] references the season of [[wikipedia:Summer|summer]], which is typically the hottest of the four seasons. Additionally, this monster's design is based on the [[wikipedia:Common sunflower|common sunflower]], which blooms in the summer.
