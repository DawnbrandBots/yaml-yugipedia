title: Card Trivia:Sleipnir the Runick Mane
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Sleipnir|Sleipnir]], the eight-legged steed of [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]].
  * This monster ties together the "[[Runick]]" and "[[Generaider]]" [[archetypes]]:
  ** This monster's [[Level]] (9) is the same as most "Generaider" monsters.
  ** The "[[Runick Token]]s" [[Special Summon]]ed by this card's effect have the same [[ATK]]/[[DEF]]/[[Type]]/[[Attribute]] as the "[[Generaider Token]]s" Summoned "[[Generaider Boss Stage]]", and the respective effects to Summon them have the same trigger.
