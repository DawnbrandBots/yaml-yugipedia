title: Card Trivia:Ether Seeker
wikitext: |-
  {{Navigation}}

  * This monster is closely related to "[[Ether Finder]]".
  ** Both monsters have the same [[ATK]], [[DEF]], [[Level]], and [[Attribute]], and have similar names, effects, and appearances, including having the same type of [[Duel Disk]]-like device on one arm. Also, "Ether Finder" can Special Summon this monster with its effect.
