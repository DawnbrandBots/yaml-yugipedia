title: Card Trivia:Gladiator Beast Bestiari
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Defensive Tactics]]" and "[[Disarm]]".
  * This monster is named after the ''[[wikipedia:Bestiarius|bestiarii]]'', the plural form of ''bestiarius'', the name given to gladiators who battle beasts in [[wikipedia:Ancient Rome|Ancient Rome]].
  * This is the first "[[Gladiator Beast]]" monster to be [[Limited]].
