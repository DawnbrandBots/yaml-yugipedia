title: 'Card Trivia:Number S39: Utopia Prime'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Xyz Force]]".
  * This monster is a "[[Number S]]" [[Card evolutions|upgraded]] form of "[[Number 39: Utopia]]".
  ** This monster's Japanese name "Hope ONE" is based on [[No. S39: Utopia One (manga)|its appearance]] in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, where its [[original ATK]] is 250'''1''' and its effect allows the player to reduce their [[Life Point]]s to '''1''' to [[activate]] its [[banish]]ing and damaging effect.
  *** In {{chapter|ZEXAL|032|ref}}, this monster was created by the bond between [[Yuma Tsukumo (manga)|Yuma Tsukumo]], [[Ryoga Kamishiro (manga)|Ryoga "Shark" Kamishiro]] and [[Kaito Tenjo (manga)|Kaito Tenjo]], with the latter two having only 1 Life Point each at the time of this monster's creation.
  **** This monster's [[Attack and effect names in Yu-Gi-Oh! ZEXAL|effect name]], "Pandora's Force", references the myth of [[wikipedia:Pandora|Pandora]], a woman in [[Wikipedia:Greek mythology|Greek mythology]] who opened a box that unleashed all sins upon the world, with the only thing remaining in the box being hope. This naming scheme is shared with this monster's Japanese name and the Japanese name of "Utopia", which is "Hope".
  *** This monster's ''[[TCG]]'' name is based on a [[wikipedia:Prime number|prime number]], a natural number greater than 1 that is not a product of two smaller natural numbers, further reflecting its Japanese name and theme around the number 1.
  **** 251, this monster's ATK divided by 10, is prime unlike the 2501 ATK it possessed in the manga.
  * This monster has a [[Ranked-Up]] form: "[[Number S39: Utopia the Lightning]]".
  * This monster is the manga [[counterpart]] of "[[Number C39: Utopia Ray]]".
  ** This monster was Summoned through [[Shining Xyz Evolution]], while "[[Number C39: Utopia Ray (anime)|Number C39: Utopia Ray]]" was Summoned through [[Chaos Xyz Evolution]].
  * This is the first monster to be Summoned through Shining Xyz Evolution in the ''Yu-Gi-Oh! ZEXAL'' manga.
  * This is the first monster to have [[original ATK and DEF]] that ends with the number 1 while having an original ATK and DEF greater than 1.
  * This monster is the first upgraded form of "Utopia" to not have more than one sword.
  * This is one of several monsters whose ATK or [[DEF]] is [[not divisible by 50]], the others being "[[Sword Arm of Dragon]]" and [[PaniK's monsters]]: "[[Barox]]", "[[Castle of Dark Illusions]]", "[[Dark Chimera]]", "[[King of Yamimakai]]", and "[[Reaper of the Cards]]".
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from the aforementioned chapter of the ''Yu-Gi-Oh! ZEXAL'' manga, specifically from the panel showing [[No. S39: Utopia One (manga)|this monster]] using its [[banish]]ing effect and causing it to glow, albeit with its right arm and sword raised.
