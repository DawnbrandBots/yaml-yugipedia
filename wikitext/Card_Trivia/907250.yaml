title: Card Trivia:Shocking Rebone
wikitext: |-
  {{Navigation|mode=nongame}}

  * The Japanese pronunciation of this card's name is a portmanteau of the Japanese word for "bzzt bzzt" (びりびり ''Biribiri'') and "reborn" (リボーン ''Ribōn'').
  ** The Japanese pronunciation of this card's name features the phonetic rendering of the word "bone" (ボーン ''Bōn''), which is featured in this card's artwork.
