title: Card Trivia:Mahunder
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "OKaThunder" ({{Ruby|ＯＫａ|オカ}}サンダー, ''Okasandā'') is a portmanteau of the words "mother" (お母さん, ''Okāsan'') and "[[Thunder]]" (サンダー, ''Sandā'').
  ** This monster shares the same as "[[Pahunder]]", which reflects their position as "parents" in the family-themed "[[hunder]]" [[archetype]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Normal Summon]] a [[LIGHT]] [[Level 4]] [[Thunder]] monster [[once per turn]] is based on the rules of [[Speed Duel (ZEXAL)|Speed Dueling]] in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, which allows the player to Normal Summon up to two times per turn. In {{chapter|ZEXAL|013|ref}}, [[Thunder Spark]] used this rule to Normal Summon up to two of his "hunder" monsters.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter in the ''Yu-Gi-Oh! ZEXAL'' manga, specifically from the panel showing [[Mahunder (manga)|this monster]] being Summoned.
