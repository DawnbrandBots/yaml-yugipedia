title: 'Card Trivia:Number S39: Utopia the Lightning'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * This monster appears in the ''[[OCG]]''/''[[TCG]]'' artwork of "[[Shining Hope Road]]".
  * This is the first [[Rank-Up|Ranked-Up]] "[[Utopia]]" monster not to be Summoned by Ranking Up "[[Number 39: Utopia]]", in the anime/manga.
  * This monster can be seen as the manga counterpart of "[[Number C39: Utopia Ray Victory (anime)|Number C39: Utopia Ray Victory]]".
  ** Both monsters have been Summoned by [[Yuma Tsukumo]] using their representative "[[Rank-Up-Magic]]" cards in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]].
  ** Both monsters feature an effect that prevents the [[activate|activation]] of cards and effects until the end of the battle.
  * This is the first [[Rank-Up|Ranked-Up]] monster that has less [[original ATK]] than its base form: "[[Number S39: Utopia Prime]]".
  * This is the first "[[Number S]]" monster to be Summoned via Rank-Up in the ''Yu-Gi-Oh! ZEXAL'' manga.
  * This monster's ''OCG''/''TCG'' effect is similar to that of "[[Number 95: Galaxy-Eyes Dark Matter Dragon]]".
  ** Both require an [[Xyz Monster]] belonging to an [[archetype]], specifically "Utopia" or "[[Galaxy-Eyes]]" to [[Xyz Summon]] them more quickly.
  ** Both monsters cannot be used as an Xyz Material for an Xyz Summon in the ''OCG''/''TCG''.
  ** Both monsters were used in the final Duel between [[Kaito Tenjo (manga)|Kaito Tenjo]] and [[Yuma Tsukumo (manga)|Yuma Tsukumo]] in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  * This card's artwork is taken from {{chapter|ZEXAL|046|ref}}, specifically from the panel showing [[No. S39: Utopia the Lightning (manga)|this monster]] being Summoned.
