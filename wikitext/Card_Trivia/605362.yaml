title: Card Trivia:Fighting Dirty
wikitext: |-
  {{Navigation}}

  * "[[Great Phantom Thief]]" and "[[White Magical Hat]]" appear in this card's artwork.
  ** Both monsters are thieves, and each has stolen an article of clothing from the other in the artwork; "Great Phantom Thief"’s hat and "White Magical Hat"’s cape respectively. This plays into the card’s Japanese name: "Draw Game"; the thieves’ contest with each other has ended in a draw.
