title: Card Trivia:King of the Skull Servants
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Monster Rebone]]", "[[Phantom Bind]]", "[[Quarantine]]", "[[There Can Be Only One]]", and "[[Wightprince]]".
  ** Multiple copies of "[[Skull Servant]]" and/or this monster appear in this card's artwork.
  ** Either this monster or "Skull Servant" (or possibly both in some cases) appear in the artworks of "[[Certain Death Promotion]]", "[[Ghost Salvage]]", "[[Graceful Revival]]", "[[Panic Burial]]", "[[Reject Reborn]]", "[[Skeletal Swarm]]", and "[[Terrible Deal]]".
  * This card appears in the artwork of "[[BIG Win!?]]" and "[[Old Mind]]".
  * This is the first [[Zombie]] monster with [[?]] [[ATK]].
  ** The highest [[ATK]] amount this monster can gain via its own effect is 26,000 (from two other copies of itself and three copies each of "Skull Servant", "[[The Lady in Wight]]", "[[Wightmare]]", "[[Wightprince]]", "[[Wightprincess]]", "[[Wightbaking]]", "[[Moissa Wight]]", and "[[Wightlord]]").
  * [[Kevin Tewart]] hinted in [http://www.pojo.biz/board/showthread.php?p=1750560#post1750560 a post on Pojo] that this card (and potentially the rest of the [[Wight]] series) was the result of him mentioning to [[Konami]] the popularity of "Skull Servant" among fan circles like Pojo.
