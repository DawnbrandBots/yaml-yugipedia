title: Card Trivia:Lilith, Lady of Lament
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Lilith|Lilith]].
  * This card has a counterpart: "[[Malice, Lady of Lament]]".
  * This card's Japanese name, "リリス", is very similar to "リリース", "release", the Japanese term for the [[Tribute]] game mechanic. This mechanic is used both by this card's effect, and more generally as the theme of the ''[[Structure Deck: Lair of Darkness]]'' in which it was first released.
