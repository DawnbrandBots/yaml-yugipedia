title: Card Trivia:Stardust Assault Warrior
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of "[[Stardust Charge Warrior]]".
  ** This monster has 100 more [[ATK]] and 100 less [[DEF]] than "Stardust Charge Warrior".
  * This monster has an [[Accel Synchro Monster|Accel Synchro]] counterpart: "[[Stardust Warrior]]".
  * The black color scheme and the red markings of this monster's full-bodied suit underneath its armor are similar to the design Yusei Fudo's shirt.
  ** This circular armor plating located on this monster's knees resemble the orbs on Yusei's shirt.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! 5D's - Ride SP1|ref}}, specifically from the panel showing [[Stardust Assault Warrior (manga)|this monster]] being Summoned.
