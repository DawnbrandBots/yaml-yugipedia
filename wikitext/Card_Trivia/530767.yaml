title: Card Trivia:Mudragon of the Swamp
wikitext: |-
  {{Navigation}}

  * This monster is a [[Fusion Monster|Fusion]] [[counterpart]] of "[[King of the Swamp]]", "[[Beastking of the Swamps]]", and "[[Muddy Mudragon]]".
  * This monster has a younger form: "[[Baby Mudragon]]".
  * This is the first [[Wyrm]] Fusion Monster in the ''[[OCG]]''/''[[TCG]]''.
