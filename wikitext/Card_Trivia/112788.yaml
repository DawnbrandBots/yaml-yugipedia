title: Card Trivia:Drill Synchron
wikitext: |-
  {{Navigation}}

  * This card slightly resembles "[[Drillroid]]", and both cards have effects that take advantage of [[Defense Position]] monsters.
  * This is the first [[EARTH]] "[[Synchron]]" monster to be used.
  * This card along with "[[Drill Warrior]]", "[[Splendid Rose]]", "[[Bird of Roses]]", "[[Morphtronic Vacuumen]]" and "[[Chaos King Archfiend]]" were made into anime cards as a result of a drawing competition, as seen in the preview of [[Yu-Gi-Oh! 5D's - Episode 074|episode 74]], [[Yu-Gi-Oh! 5D's - Episode 075|75]], [[Yu-Gi-Oh! 5D's - Episode 076|76]], [[Yu-Gi-Oh! 5D's - Episode 077|77]] and [[Yu-Gi-Oh! 5D's - Episode 078|78]].
  * There is an "[[Infernity]]" equivalent to this card called "[[Infernity Dwarf]]"
  * This monster bears some resemblance to [[W:c:gurrenlagann:Lagann|Lagann]], one of the mecha in ''[[wikipedia:Gurren Lagann|Gurren Lagann]]''. Its drills on the forehead and arms further indicate that this might be an intended reference to Lagann, as Lagann creates drills in place of its hands and from its forehead when using its strongest move, Lagann Impact.
