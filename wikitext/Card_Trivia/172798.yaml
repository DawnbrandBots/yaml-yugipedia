title: Card Trivia:Eisbahn
wikitext: |-
  {{Navigation}}

  * "Eisbahn" is German for skating rink.
  * The monsters skating in the artwork of this card are "[[Gagagigo]]", which is a [[WATER]] monster, and "[[Goblin Attack Force]]", which is [[EARTH]]. This reflects the effect of this card as the EARTH monsters are falling over while the WATER monster is standing straight on the ice.
  * This card's effect is similar to that of "[[Stumbling]]", which also features "Gagagigo" in its artwork.
  * The city in the background looks like an iced version of "[[Lemuria, the Forgotten City]]".
