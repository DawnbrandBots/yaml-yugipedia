title: Card Trivia:Chronomaly Mayan Machine
wikitext: |-
  {{Navigation}}

  * This monster is based on the "Maya Astronaut" of [[wikipedia:K'inich Janaab' Pakal|K'inich Janaab' Pakal]], a ruler of the [[wikipedia:Maya|Mayan]] polity of [[wikipedia:Palenque|Palenque]].
  ** The "Palenque Astronaut" has been interpreted as depicting a man controlling a spaceship. This ornately decorated five ton stone was discovered in 1952 in Chiapas, Mexico covering the Tomb of the Mayan King Pakal at the Temple of Palenque, the only known Mayan pyramid to contain a tomb.
  * Ironically, this monster is effectively useless in a "[[Chronomaly]]" [[Deck]], as there are no "Chronomaly" monsters that require more than one [[Tribute]]. The only "Chronomaly" [[Machine]] monsters that can be [[Normal Summon]]ed are the [[Level 4]] "[[Chronomaly Golden Jet]]" and "[[Chronomaly Nebra Disk]]".
