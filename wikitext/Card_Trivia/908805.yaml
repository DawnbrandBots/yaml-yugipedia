  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.17]]''.
  * This monster is a [[signature move]] [[Card evolutions|retrained]] counterpart of "[[Harpie's Pet Dragon]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Harpie's Pet Dragon" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' and [[Yu-Gi-Oh! (anime)|anime]].
