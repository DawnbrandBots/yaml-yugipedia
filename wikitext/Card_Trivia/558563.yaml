title: Card Trivia:Magician of Hope
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Magician]]" [[Xyz Pendulum Monster|Xyz Pendulum]] form of "[[Number 39: Utopia]]".
  ** This monster's name is a reference to the Japanese name of "Utopia": "King of Wishes, Hope" ({{Ruby|希|き}}{{Ruby|望|ぼう}}{{Ruby|皇|おう}}ホープ, ''Kibōō Hōpu'').
  ** This monster's [[Pendulum Effect]] to [[negate]] a monster's attack once per turn is based on the effect of "Utopia" to [[detach]] an [[Xyz Material]] and negate a monster's attack.
  * This is the first [[Extra Deck]] [[Pendulum Monster]] that did not debut in the ''[[Yu-Gi-Oh! ARC-V]]'' anime or [[Yu-Gi-Oh! ARC-V (manga)|manga]].
