title: Card Trivia:Packet Cylinder
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of ''pake-shi'' (パケ死, lit. "death by packet") and "cylinder", with the former term being Japanese slang for accidentally incurring major expenses by accessing the web on a cell phone.
  ** "Cylinder" is likely a reference to "[[Magic Cylinder]]", since both cards are Trap Cards that activate in response to an opponent's monster's attack.
