title: Card Trivia:Yellow-Bellied Oni
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Red-Headed Oni]]".
  ** This card has the [[ATK]] of "[[Blue-Blooded Oni]]" and the [[DEF]] of "[[Red-Headed Oni]]". It also mirrors the effect of "Red-Headed Oni".
  * This is the first card in the ''[[OCG]]''/''[[TCG]]'' that can change the [[Rank]] of an [[Xyz Monster]].
