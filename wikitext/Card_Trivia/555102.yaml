title: Card Trivia:Topologic Gumblar Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectors Pack 2018]]''/''[[Battles of Legend: Relentless Revenge]]''.
  * This monster is named after the [[wikipedia:Gumblar|Gumblar]], a type of [[wikipedia:Trojan horse (computing)|Trojan horse malware]] that redirects a user's Google searches and attempts to install fake anti-virus software.
  ** This monster's effect reflects the function of the Trojan horse malware to mislead users of its true intent (making the opponent [[discard]] from their [[hand]]), which is to install damaging payloads in the user's computer (its [[Extra Link]] effect to inflict 3000 damage to the opponent after depleting their entire hand).
  * This is the first ''[[OCG]]''/''[[TCG]]'' card to directly mention Extra Linking.
