title: Card Trivia:Electro-Whip
wikitext: |-
  {{Navigation}}

  * The whip depicted in this card's artwork appears in the artwork of "[[Cyber Harpie Lady]]" and "[[Alluring Mirror Split]]".
  * In the early ''Yu-Gi-Oh!'' video games, this card can also be [[equip]]ped to certain [[female]] monsters such as "[[Harpie Lady]]".
  ** This is a reference to the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, where [[Mai Kujaku (manga)|Mai Kujaku]] used this card with "[[Harpy Lady (manga)|Harpy Lady]]".
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card was replaced by "[[Rose Whip]]", as it was released in the ''[[OCG]]'' with a changed effect that no longer allowed it to be used with "Harpie Lady" as it did in the manga.
