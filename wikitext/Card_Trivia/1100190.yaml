title: Card Trivia:Red-Eyes Maxi-Flare Dragon (R)
wikitext: |-
  {{Navigation}}

  * This monster's effect specifies that [[Spell]]/[[Trap Card]]s cannot be [[return]]ed to the [[Extra Deck]], despite the fact that there are currently no method of doing so in ''[[Yu-Gi-Oh! Rush Duel]]'', as there are no effects in the game that can treat a [[Monster Card]] as a Spell or Trap Card.
