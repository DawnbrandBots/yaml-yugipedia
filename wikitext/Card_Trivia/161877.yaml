title: Card Trivia:Dark Cat with White Tail
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cat Meeting]]".
  * The Japanese word for "White Tail" (尾も白い ''O mo Shiroi'') is a pun on the Japanese word for "interesting" (面白い ''omoshiroi'').
  ** This monster's name and effect reference the superstitions regarding [[wikipedia:Black cat|black cats]], which is said to cause bad luck to anyone who crosses its path.
  * This monster has a ''[[Rush Duel]]'' [[counterpart]]: "[[White Cat Without White Tail]]".
