title: Card Trivia:Mantman the Ultrahuman
wikitext: |-
  {{Navigation}}

  * This monster is based on a typical comic book superhero, as it is depicted performing an iconic "superhero landing".
  * This monster's name is similar to [[wikipedia:Ultraman (character)|Ultraman]]. Fittingly, Ultraman and the other heroes in the ''[[wikipedia:Ultraman|Ultra Series]]'' are giants who fight [[wikipedia:kaiju|kaiju]], and this monster has synergy with the "[[Kaiju]]" [[archetype]].
  ** This monster's immunity to being [[Tribute]]d and being [[destroy]]ed by battle prevents it from being Tributed to [[Special Summon]] a "Kaiju" monster, or destroyed by the player's "Kaiju" monster that was Special Summoned to the opponent's field, referencing how Ultraman almost never lost to a kaiju in [[wikipedia:Ultraman (1966 TV series)|his debut series]].
  ** This monster's effect to Special Summon itself if the opponent controls a card the player owns can be activated after Special Summoning a "Kaiju" monster to the opponent's field, similar to Ultraman arriving on the scene after a kaiju starts rampaging.
  ** This monster's effect to place itself at the bottom of the [[Deck]], then return a card the player owns to the hand, allows them to remove said "Kaiju" monster from the [[field]], similar to Ultraman defeating the kaiju with one of his special techniques and flying off. This effect can only be used during the [[End Phase]] of the turn the monster is Normal or Special Summoned, referencing how Ultraman can only survive in his giant form on Earth for three minutes, and usually defeats the kaiju at the end of the episode.
