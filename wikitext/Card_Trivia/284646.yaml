title: Card Trivia:Phantom Token
wikitext: |-
  {{Navigation|mode=token}}

  * This is the first [[Monster Token|Token]] in the manga to have a [[Rank]] instead of a [[Level]]. This is most likely because "[[No. 48: Shadow Lich (manga)|No. 48: Shadow Lich]]" disguises itself as a "Phantom Token" in the manga.
  * This Token's artwork is taken from its manga appearance in ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' [[Yu-Gi-Oh! ZEXAL - Rank 031|Rank 31]], when multiple copies of it were Summoned for the first time.
