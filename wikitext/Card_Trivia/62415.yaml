title: Card Trivia:Pikeru's Second Sight
wikitext: |-
  {{Navigation}}

  * "[[White Magician Pikeru]]" appears in this card's artwork.
  * This card's ''[[TCG]]'' names refer to [[wikipedia:Extrasensory perception|second sight]], an alleged form of extrasensory perception where a person perceives information (in the form of a vision) about future events before they happen, or about things/events at remote locations.
  ** However, this card's Japanese and Korean names instead refer to [[wikipedia:Telepathy|mind reading]].
