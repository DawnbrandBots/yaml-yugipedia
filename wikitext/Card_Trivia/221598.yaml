title: Card Trivia:Synchro Mirage Attack
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Blackwing Armor Master]]" and "[[Nitro Warrior]]" appear in this card's artwork.
  ** Both monsters were used by [[Crow Hogan]] and [[Yusei Fudo]] respectively in the ''[[Yu-Gi-Oh! 5D's]]'' anime, while this card was used by their [[Yusei Fudo (manga)|manga]] [[Crow Hogan (manga)|counterparts]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
