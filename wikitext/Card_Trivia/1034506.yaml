title: Card Trivia:Recette de Personnel (Staff Recipe)
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a [[wikipedia:Gratin|gratin]], which refers to any dish in which an ingredient is topped with a browned crust, often using breadcrumbs, grated cheese, eggs, or butter. Gratin is a classic culinary technique in traditional [[wikipedia:French cuisine|French cuisine]].
  * The silhouette depicted in this card's artwork shares similarities with "[[Buerillabaisse de Nouvelles]]", but it appears to be an unknown "[[Nouvelles]]" monster.
  ** This is supported by "Buerillabaisse" bearing five visible limbs (true to its basis in the demon [[wikipedia:Buer|Buer]]) while the silhouette appears to have only two.
  * This card's name had to be corrected in the French release due to the incorrect usage of the word "de", making this card the only card from the recipe archetype that had to be translated to French.
  ** The reason why the correction had to be made is because the french word "de" indicates what is inside the meal, so instead of the card's English name saying "Staff Recipe" as one might expect, it's actually saying that recipe was made from the staff's body parts (however, the phrasing remains awkward in French).
