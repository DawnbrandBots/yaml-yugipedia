title: Card Trivia:Flower Cardian Willow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Flower Gathering]]", "[[Fraud Check]]", "[[Super All In!]]",  and "[[Super Koi Koi]]".
  * The face from the hurricane in the artworks of "[[Giant Trunade]]" and "[[Hey, Trunade!]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Willow" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (11) references how the "Willow" suit falls under the month of January, the first month of the year.
  ** This monster's [[original ATK and DEF]] (100/100) references how the "Willow" card is a ''kasu'' card, which is worth one point.
  ** Uniquely, the ''kasu'' card of the "Willow" suit displays a scene of a thunderstorm, which explains the use of "Giant Trunade" on this card.
  * This is the first [[Level 11]] [[Normal Summon Monster]].
