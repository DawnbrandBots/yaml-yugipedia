title: Card Trivia:Altergeist Fijialert
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Fiji mermaid|Fiji mermaid]]" and "[[wikipedia:Alert dialog box|alert]]".
  ** The [[wikipedia:Fiji mermaid|Fiji mermaid]] is an object composed of the torso and head of a juvenile monkey sewn to the back half of a fish to pass off in sideshows as an actual [[wikipedia:Mermaid|mermaid]].
  ** "Alert" is based on an alert dialog box, a special dialog box that is displayed in a graphical user interface when something unexpected occurred that requires immediate user action.
