title: Card Trivia:Elemental HERO Plasma Vice
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[OCG]]'' version of ''[[Duelist Pack: Jaden Yuki 3]]'' and ''[[Collectible Tins 2007 Wave 2]]''.
  * This monster is a [[Fusion Monster|Fusion]] form of "[[Elemental HERO Sparkman]]" and "[[Elemental HERO Bladedge]]".
  ** The first portion of "Plasma Vice" is based on [[wikipedia:Plasma (physics)|plasma]], a state of matter formed from superheated, ionized gas that serves as a medium for the flow of electrical currents, which reflects this monster's electrical design and usage of "Elemental HERO Sparkman" as [[Fusion Material]].
  *** The second portion of "Plasma Vice" references this monster's elbow pads on its gauntlets, which are similar in appearance to vice clamps. Additionally, the gauntlets and the rest of its armor features a metallic golden color scheme, similar to "Elemental HERO Bladedge".
  ** This monster's effect to [[discard]] a card and [[destroy]] an opponent's [[Attack Position]] monster is similar to the effect of "[[Elemental HERO Thunder Giant]]", another "[[Elemental HERO]]" Fusion Monster that requires "Elemental HERO Sparkman" as [[Fusion Material]], while its second effect to inflict [[piercing]] [[battle damage]] to the opponent is based on the effect of "Elemental HERO Bladedge".
