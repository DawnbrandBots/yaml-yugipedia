title: Card Trivia:PSY-Framegear Epsilon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[PSY-Frame Circuit]]" and "[[S-Force Specimen]]".
  * "[[PSY-Framelord Omega]]" is this monster equipped to "[[PSY-Frame Driver]]", along with "[[PSY-Framegear Alpha]]", "[[PSY-Framegear Beta]]", "[[PSY-Framegear Gamma]]" and "[[PSY-Framegear Delta]]".
  * This monster is tied with "[[Digitron]]" for the highest [[original ATK]] (1500) of all [[Level 2]] [[Main Deck]] monsters.
