title: Card Trivia:Divine Dragon Titanomakhia
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Titanomachy|Titanomachy]] (pronounced ''Titanomakhia'' in Greek), a great war between the [[wikipedia:Titans|Titans]] lead by [[wikipedia:Cronus|Cronus]] and the gods of [[wikipedia:Mount Olympus|Olympus]] lead by [[wikipedia:Zeus|Zeus]] in [[wikipedia:Greek mythology|Greek mythology]].
  * Visually, this monster is a combined form of "[[Divine Dragon - Excelion]]", "[[Divine Dragon Ragnarok]]", and a blue "[[Divine Dragon Apocralyph]]".
