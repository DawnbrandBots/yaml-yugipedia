title: Card Trivia:Bri Synchron
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Yusei 3]]'' and ''[[Duelist Pack Collection Tin 2011]]''.
  * This monster's name and design appear to be based on the Braiger from the 1981 mecha anime ''[[wikipedia:Galaxy Cyclone Braiger|Galaxy Cyclone Braiger]]'', which can use "synchron energy" to grow in size.
  ** The monster's color being changed from red in the ''[[Yu-Gi-Oh! 5D's]]'' anime to green in the ''[[OCG]]''/''[[TCG]]'' and the redesign of some details may be attempts to make it more legally distinct.
