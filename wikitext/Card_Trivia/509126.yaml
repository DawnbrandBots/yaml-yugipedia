title: Card Trivia:Emergency Provisions
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Emergency Evasion]]".
  * The supplies in this card's artwork appear in the artwork of "[[Assault on GHQ]]" and "[[Nomadic Force]]".
  * The provisions depicted in this card's artwork include [[wikipedia:cracker (food)|crackers]], a can of [[wikipedia:tuna|tuna]] and [[wikipedia:beef|beef]], and a bag of unknown content.
