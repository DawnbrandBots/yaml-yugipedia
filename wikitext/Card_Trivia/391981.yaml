title: Card Trivia:Subterror Behemoth Umastryx
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Subterror Behemoth Burrowing]]".
  * "[[Subterror Nemesis Warrior]]" appears in this card's artwork.
  * This monster's English name is based on the ''[[wikipedia:Uromastyx|Uromastyx]]'', a genus of African and Asian [[wikipedia:Lizard|lizards]], which are commonly called "spiny-tailed lizards", or "dabb lizards".
  ** This monster's Japanese name, "Subterror Malice Liguriard", is a reference to the [[wikipedia:Ligurian Sea|Ligurian Sea]], keeping with the [[wikipedia:Mediterranean Sea|Mediterranean Sea]] theme of the Japanese names of the "[[Subterror Behemoth]]" monsters.
