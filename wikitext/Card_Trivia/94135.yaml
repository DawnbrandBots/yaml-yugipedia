title: Card Trivia:Princess Curran
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Ebon Magician Curran]]".
  * This card has a [[LIGHT]] twin [[counterpart]]: "[[Princess Pikeru]]".
  ** Both are [[Level]] 4 monsters with 2000 [[ATK]] and 0 [[DEF]], and have [[LP]]-related effects that [[activate]] during the [[Standby Phase]].
  ** Both must be [[Special Summon]]ed with "[[Trial of the Princesses]]".
