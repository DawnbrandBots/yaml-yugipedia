title: Card Trivia:Golden Bamboo Sword
wikitext: |-
  {{Navigation}}

  * This is the only "[[Bamboo Sword]]" [[Spell Card]] whose subcategory is neither [[Continuous Spell Card|Continuous]] nor [[Equip Spell Card|Equip]].
  ** As a result, it is also the only "Bamboo Sword" card to not remain on the field upon activation.
  * This card's effect is based on that of the [[Forbidden]] card "[[Pot of Greed]]", which requires a "Bamboo Sword" Equip Spell Card to [[activate]].
  ** Similarly, the effect of "[[Soul Devouring Bamboo Sword]]" is based on that of the Forbidden card "[[Yata-Garasu]]", which has a similar [[activation condition]].
