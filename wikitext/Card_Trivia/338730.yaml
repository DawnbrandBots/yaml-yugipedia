title: Card Trivia:Vigilante Gata
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The "[[Vigilante]]" monsters are based on [[wikipedia:Zenigata Heiji|Zenigata Heiji]], a fictional Japanese policeman who captured criminals using a jutte and old-fashioned coins. Together, the names of this monster, "[[Vigilante Zeni]]", and "[[Marksman Heiji Type 0]]" form "Zenigata Heiji".
