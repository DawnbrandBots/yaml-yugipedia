title: Card Trivia:Gem-Knight Alexandrite
wikitext: |-
  {{Navigation}}

  * This monster is based on alexandrite, the [[wikipedia:Gemstone|gemstone]] variety of the [[wikipedia:Mineral|mineral]] [[wikipedia:Chrysoberyl|chrysoberyl]] that can appear as blue-green under natural light or reddish-purple under natural light, which serve as the different colors of this monster's gemstones and glowing aura.
  * This is the first "[[Gem-Knight]]" [[Effect Monster]] that is not a [[Fusion Monster]].
