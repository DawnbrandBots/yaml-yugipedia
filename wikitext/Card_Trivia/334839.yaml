title: Card Trivia:Pulao, Wind of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of  "[[Laser Qlip]]" and "[[Sinister Shadow Games]]".
  ** The artwork of "Laser Qlip" depicts this monster and "[[Suanni, Fire of the Yang Zing]]" being destroyed by "[[Apoqliphort Towers]]". Their shadows would be transformed into their "Shaddoll" counterparts and would battle their original forms, as depicted in the artwork of "Sinister Shadow Games".
  * This monster is based on [[wikipedia:Pulao (dragon)|Púláo]] (蒲牢 ''púláo''), one of the [[wikipedia:Nine sons of the dragon|nine sons]] of the [[wikipedia:Dragon King|Dragon King]] in Chinese mythology, who is depicted as a dragon with smaller limbs.
  * This monster has a "[[Shaddoll]]" [[counterpart]]: the dragon mounted by "[[El Shaddoll Winda]]".
