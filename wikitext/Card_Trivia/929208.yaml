title: Card Trivia:Golden-Eyes Idol
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023 2nd Wave]]''.
  * This monster is a [[retrained]] [[counterpart]] of "[[Thousand-Eyes Idol]]".
  ** Multiple [[Millennium Eye]]s appear on this monster.
  *** This is a reference to [[Maximillion Pegasus]], the owner of the Millennium Eye in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], who also used "Thousand-Eyes Idol".
  *** Fittingly, this monster's effect to look at the opponent's [[hand]] is a reference to the mind-reading abilities of the Millennium Eye, which allowed Pegasus to look at his opponent's hand through their mind.
