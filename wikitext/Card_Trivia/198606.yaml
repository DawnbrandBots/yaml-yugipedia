title: Card Trivia:Darkness Outsider
wikitext: |-
  {{Navigation}}

  * This monster's name reflects its appearance; in contrast to the [[Fiend|demonic]], [[aqua]]tic, and [[Plant|floral]] designs of the other "[[Darkness (archetype)|Darkness]]" monsters, this monster's design is based on a jester.
  ** This monster's name also reflects its effects, which forces the opponent's monster "outside" their [[Deck]] to the player's [[field]], and then takes its place as an "outsider" in the opponent's Deck.
