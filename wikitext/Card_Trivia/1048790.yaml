title: Card Trivia:Trickstar Noble Angel
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Trickstar Holly Angel]]".
  ** This monster's Japanese name (ノーブルエンジェル, ''Nōburu Enjeru'') is based on [[Skye Zaizen]]'s initial [[LINK VRAINS]] alias, "Blue Angel" (ブルーエンジェル, ''Burū Enjeru''), who uses the "[[Trickstar]]" [[archetype]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** This monster's effect allows it to [[add]] "[[Angel of Blue Tears]]" from the [[Deck]] to the [[hand]], which is based on the book ''[[Blue Angel]]'', which later became the inspiration for Skye's LINK VRAINS avatar, Blue Angel.
