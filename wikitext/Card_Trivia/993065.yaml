title: Card Trivia:Launcher Catapult Turtle
wikitext: |-
  {{Navigation}}

  * This monster is a ''[[Rush Duel]]'' [[counterpart]] of "[[Catapult Turtle]]".
  * This monster's effect to [[destroy]] a [[Spell]]/[[Trap Card]] references a scene in {{chapter|Yu-Gi-Oh!|116|ref}}, when [[Dark Yugi (manga)|Dark Yugi]] used "[[Catapult Turtle (manga)|Catapult Turtle]]" to launch "[[Harpies' Pet Dragon (manga)|Harpies' Pet Dragon]]" at [[Mai Kujaku (manga)|Mai Kujaku]]'s "[[Mirror Wall (manga)|Mirror Wall]]", destroying both in the process.
  ** Its effect to destroy a monster if "[[Gaia the Dragon Champion (Rush Duel)|Gaia the Dragon Champion]]" is in the [[Graveyard]] references a scene in {{chapter|Yu-Gi-Oh!|83|ref}}, when Dark Yugi launched "[[Gaia the Dragon Champion (manga)|Gaia the Dragon Champion]]" at "[[Castle of Dark Illusions (manga)|Castle of Dark Illusions]]", destroying its flotation ring and causing it to collapse on [[Player Killer of Darkness (manga)|Player Killer of Darkness]]' other monsters.
