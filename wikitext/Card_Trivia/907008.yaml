title: Card Trivia:Psychic Burial
wikitext: |-
  {{Navigation}}

  * The hand and shovel of the monster in the artwork of "[[Psychic Trap Hole]]" appears in this card's artwork.
  * This card is a counterpart to "[[Foolish Burial]]".
  * This card's artwork references the artwork of "Foolish Burial" and "[[Extra-Foolish Burial]]".
  ** The purple arm in this card's artwork also appears in "[[Foolish Burial Goods]]" and "[[Peaceful Burial]]".
  ** The green arm in this card's artwork also appears in "[[Called by the Grave]]" and "[[Gravedigger's Trap Hole]]".
