title: Card Trivia:Double or Nothing!
wikitext: |-
  {{Navigation}}

  * The slot machine in this card's artwork appears in the background of the artwork of "[[Number 39: Utopia Double]]".
  * This card has a [[Synchro]] anime-only counterpart, "[[Synchro Ring]]".
  * This card uses the letter "W" to represent "Double", which is commonly used in Japan.
  ** This quality is shared with "[[Double-Rank-Up-Magic Utopia Force]]", which uses the "W" in its abbreviated Japanese name.
  * This card has the opposite effect and naming of "[[Half or Nothing]]".
  * This is the last card to be used in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
