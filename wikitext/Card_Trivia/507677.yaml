title: Card Trivia:Cross Counter
wikitext: |-
  {{Navigation}}

  * "[[Behemoth the King of All Animals]]" and "[[Des Kangaroo]]" appear in this card's artwork.
  ** The appearance of "Des Kangaroo" in this card's artwork is fitting, as this card's secondary effect [[destroy]]s the opponent's monster, similar to the effect of the aforementioned monster. 
  *** This follows the trend of two other [[Spell]]/[[Trap Cards]], "[[Continuous Destruction Punch]]" and "[[Destruction Punch]]", which depicts "Des Kangaroo" punching an opponent and features an effect that destroys an opponent's monster based on the value of their [[ATK]] or [[DEF]] against the player's attacked [[Defense Position]] monster.
  * This card's name is based on the [[wikipedia:Cross-counter|cross-counter]], a boxing technique where a punch is thrown immediately after an opponent's jab to exploit the opening in their position. Fittingly, this card's artwork depicts "Des Kangaroo" countering the attack of "Behemoth" by exploiting the size difference between the two.
