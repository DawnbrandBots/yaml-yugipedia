title: Card Trivia:Stargazer Magician
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck 2014]]'', and is also one of the cover cards of ''[[Star Pack ARC-V]]''.
  * This monster appears in the artworks of "[[Amazing Pendulum]]", "[[Magical Star Illusion]]", "[[Pendulum Back]]", "[[Pendulum Storm]]", "[[Pendulum Switch]]", and "[[Soul Pendulum]]".
  ** Additionally, this monster's staff's circular frame appears in the artwork of "[[Pendulum Impenetrable]]"
  * This card appears in the artwork of "[[Pendulum Begins]]".
  * This monster has a counterpart: "[[Timegazer Magician]]".
  ** This card represents the concept of [[wikipedia:space|space]], while "Timegazer Magician" represents the concept of [[wikipedia:time|time]].
  * This monster has a [[retrained]] counterpart: "[[Horoscope Sorcerer, the Stargazer Magician]]".
  * This monster has three combined forms with "Timegazer Magician".
  ** "[[Astrograph Sorcerer]]" (referencing this monster)
  ** "[[Chronograph Sorcerer]]" (referencing "Timegazer Magician")
  ** "[[Timestar Magician]]" (referencing both this monster and "Timegazer Magician", even though it resembles more this monster)
  * Despite [[Yuya Sakaki]]'s copies of [[Stargazer Magician (anime)|this card]] and "[[Timegazer Magician (anime)|Timegazer Magician]]" being of [[Rare]] rarity in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, such rarity of these cards has not been released in the ''[[OCG]]''/''[[TCG]]''.
