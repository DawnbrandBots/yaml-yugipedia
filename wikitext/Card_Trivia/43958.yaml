title: Card Trivia:Quiz Panel - Slifer 10
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Slifer the Sky Dragon]]" appears in this card's artwork.
  * This card have two counterparts: "[[Quiz Panel - Ra 10]]" and "[[Quiz Panel - Obelisk 10]]".
  * This is the only card that requires the player to do some kind of physical activity.
