title: Card Trivia:ZW - Sylphid Wing
wikitext: |-
  {{Navigation}}

  * "[[Number 39: Utopia]]" appears in this card's artwork.
  * This monster is based on a [[wikipedia:Sylph|sylphid]], an imaginary spirit of the air who is described as an invisible being. This is reflected by how, unlike the other "[[ZW -]]" monsters (aside from "[[ZW - Asura Strike]]"), this monster does not have a visible body, only its wings.
  * This is the first "ZW -" monster to be [[equip]]ped to the original "[[Number 39: Utopia (anime)|Number 39: Utopia]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, and the last "ZW -" monster to be created by [[ZEXAL III|ZEXAL]].
  * This monster's [[original ATK and DEF]] (800/1600) are respectively equal to the [[ATK]] a "[[Utopia (archetype)|Utopia]]" monster gains (800) when equipped with this monster, and the ATK it gains (1600) when the opponent [[Special Summon]]s a monster(s).
