title: Card Trivia:Cold Wave
wikitext: |-
  {{Navigation}}

  * "[[Bracchio-raidus]]" possibly appears in this card's artwork.
  ** This card's artwork may depict the events that transform "Bracchio-raidus" into "[[Frostosaurus]]"; both monsters have the same [[Attribute]], [[Type]] and [[Level]].
  * This card has an [[Effect Monster]] [[counterpart]]: "[[Heat Wave]]".
  ** The two dinosaurs in the artwork of "Heat Wave" are the same kind as the ones that appear in this card's artwork.
  * This card has a parody counterpart: "[[Cold Feet]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Cold Wave]]".
