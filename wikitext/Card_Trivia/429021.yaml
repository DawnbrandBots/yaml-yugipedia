title: Card Trivia:Spiral Flame Strike
wikitext: |-
  {{Navigation}}

  * "[[Odd-Eyes Pendulum Dragon]]" appears in this card's artwork.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh! ARC-V|effect name]] of "Odd-Eyes Pendulum Dragon" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This is the first [[signature move]] card inspired by a monster introduced in ''Yu-Gi-Oh! ARC-V''.
