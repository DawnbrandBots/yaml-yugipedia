title: Card Trivia:Holding Legs
wikitext: |-
  {{Navigation}}

  * This monster serves as a replacement for "[[Viser Shock (manga)|Viser Shock]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** Both monsters share the same [[Attribute]] ([[DARK]]), [[Type]] ([[Fiend]]), and [[original ATK and DEF]] (800/600) and are used by [[Yami Marik]].
  ** Both monsters share a similar effect [[return]]ing [[Set]] cards on the [[field]] to the player's [[hand]].
  ** Both monsters are depicted as torturous restraints in their respective debut media, designed to prevent the opponent from moving when combined with their counterparts ("[[Holding Arms (anime)|Holding Arms]]" in the anime, "[[Viser Des (manga)|Viser Des]]" in the manga).
  * The Spanish printed lore uses the word "''regresar''" instead of "''devolver''" ("''return''").
