title: Card Trivia:Sphere of Chaos
wikitext: |-
  {{Navigation}}

  * This monster is likely the "sealed" form of "[[Shell of Chaos]]".
  ** Both monsters share the same [[Attribute]] ([[DARK]]), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (1600/0).
  * This monster is designed to work in conjunction with "[[Chaos-End Master]]", whose effect can [[Special Summon]] this monster from the [[Deck]] and be used to [[Synchro Summon]] either "[[Light End Dragon]]" or "[[Dark End Dragon]]", due to this monster's effect to treat its [[Attribute]] as [[LIGHT]].
  ** This is supported by the fact that all four monsters were released in the same [[Booster Pack]] (''[[Limited Edition 12]]'' in the ''[[OCG]]'', and ''[[Raging Battle]]'' in the ''[[TCG]]'').
  ** This can also work in reverse; if this monster is [[Tribute Summon]]ed, its effect can [[add]] "Chaos-End Master" from the Deck to the [[hand]], allowing it to be [[Normal Summon]]ed later with this monster's effect to prevent it from being [[destroyed by battle]] protecting it in the meantime.
