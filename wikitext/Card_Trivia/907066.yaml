title: Card Trivia:Poseigyon Adventurer
wikitext: |-
  {{Navigation}}

  * This monster's name is likely a pun on the name of the 1972 American disaster film ''[[wikipedia:The Poseidon Adventure|The Poseidon Adventure]]''.
  ** Fittingly, this monster resembles [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea, whom the titular ocean liner is named after.
