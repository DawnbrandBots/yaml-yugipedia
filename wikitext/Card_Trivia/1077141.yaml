title: Card Trivia:Volcalizing Salamandeus
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Salamandeus of Scorching]]''.
  * "[[Roaring Firestorm Volcalize Phoenix (L)|Roaring Firestorm Volcalize Phoenix [L]]]" and "[[Roaring Firestorm Volcalize Phoenix (R)|Roaring Firestorm Volcalize Phoenix [R]]]" appear in this card's artwork.
  * This is the first [[Fusion Monster]] that requires a [[Maximum Monster]] as [[Fusion Material]].
  ** Visually, this monster is a Fusion of "[[Chemicalized Salamander]]" and "[[Roaring Firestorm Volcalize Phoenix]]".
