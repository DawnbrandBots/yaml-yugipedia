  {{Navigation|mode=otherGame}}

  * "[[Tri-Horned Dragon]]" is treated as a [[Ritual Monster]] in several video games, with this card as its respective [[Ritual Spell Card]]. In the ''[[TCG]]'' and ''[[OCG]]'', "Tri-Horned Dragon" is a [[Normal Monster]].
