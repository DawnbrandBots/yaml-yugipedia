  [[File:Image 2024-08-04 165800844.png|thumb|[[Yubel (character)|Yubel]] (whilst possessing [[Jesse Anderson]]) upon the throne she'd taken from [[Adrian Gecko]].]]
  * "[[Yubel]]" appears in this card's artwork.
  * This card is based on the throne used by [[Yubel (character)|Yubel]] in {{episode|GX|151|ref}}, which they claimed from [[Adrian Gecko]] from the prior episode. The specific pose assumed by "Yubel" in this card's artwork is the same pose assumed by their character form while possessing [[Jesse Anderson]] in the beginning of the episode.
