title: Card Trivia:Knightmare Goblin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[World Legacy's Nightmare]]".
  * This monster is the "[[Knightmare]]" corrupted form of "[[Mekk-Knight Green Horizon]]".
  ** Its waist plate is the same as the waist armor of "Green Horizon".
  ** "Knightmare Goblin" is also holding weapons with the same hilts and handles, and holds them similarly to the way "Green Horizon" holds its weapons.
  * The ''simile'' musical symbol can be seen on this monster's head.
