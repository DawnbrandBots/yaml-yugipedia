title: Card Trivia:Kerzebs, the Gaoled Glutton
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Cerberus|Cerberus]]" (the three-headed dog that guards the underworld in [[wikipedia:Greek mythology|Greek mythology]]) and "Belzebuth" (another name for [[wikipedia:Beelzebub|Beelzebub]]).
  ** "[[wiktionary:λαιμαργία|Laimargia]]" is the Ancient Greek word for "gluttony", referencing how Beelzebub is said to represent the sin of [[wikipedia:Gluttony|gluttony]], as well as reflecting this monster's effect to [[attach]] an [[activate]]d [[Spell Card]] to itself.
