title: Card Trivia:Disaster, Dragon Ruler of All Apocalypses
wikitext: |-
  {{Navigation}}

  * This monster's effect to gain 4600 [[ATK]]/[[DEF]] if the "[[Dragon Ruler]]" monsters of all six main [[Attribute]]s are [[attach]]ed to it as material references how the combined ATK and DEF of every other [[Level]]/[[Rank 7]] "Dragon Ruler" monster is 4600.
  * This is the first [[Xyz Monster]] that requires other Xyz Monsters that match its own [[Rank]] as material.
