title: Card Trivia:Supreme Disdain
wikitext: |-
  {{Navigation|mode=NonGame}}

  * "[[Armed Samurai - Ben Kei]]" and the silhouette of "[[Supreme King Z-ARC]]" appear in this card's artwork.
  * The kanji for "Disdain" (無礼) is written with the same first kanji and a visually similar second kanji as the Japanese phrase "no cards" (無札), reflecting this card's [[hand]] [[destroy|destruction]] effect.
