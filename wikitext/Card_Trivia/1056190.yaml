title: Card Trivia:Periallis, Empress of Blossoms
wikitext: |-
  {{Navigation}}

  * The monster's Japanese title, "Yingluo Imperial Flower" ({{Ruby|瓔|よう}}{{Ruby|珞|らく}}{{Ruby|帝|てい}}{{Ruby|華|か}}, ''Yōrakuteika'') is based on the ''[[wikipedia:Yingluo (ornament)|yingluo]]'', a ring-shaped neck ornament or fashion jewelry originating in ancient Chinese Buddhism that is also known as the ''yōraku'' in Japanese, which is worn by this monster.
  ** This monster's name is derived from the ''[[wikipedia:Fritillaria imperialis|Fritillaria imperialis]]'', a species of flowering plant also known as the "crown imperial". In Japan, the "crown imperial" is also known as the ''yōraku yuri'', which reflects this monster's Japanese title.
