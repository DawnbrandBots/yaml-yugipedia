title: Card Trivia:Zoodiac Kataroost
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zoodiac Gathering]]".
  * This monster is based on the [[wikipedia:Chinese zodiac|Chinese zodiac]] sign of the [[wikipedia:Rooster (zodiac)|Rooster]].
  * This monster's ''[[TCG]]'' name is a portmanteau of the words "[[wikipedia:Katar|katar]]" and "[[wikipedia:Rooster|rooster]]".
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018536034522103843 Bilibili] and [https://weibo.com/7406309913/5119153641363478 Weibo] at 6:00 PM (China Standard Time) on January 4, 2025, which was the fourth quarter of the You hour in the traditional Chinese timekeeping system.
