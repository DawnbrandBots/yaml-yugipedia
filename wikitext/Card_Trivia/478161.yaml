title: Card Trivia:Invoked Magellanica
wikitext: |-
  {{Navigation}}

  * This monster is named after one of the alternative names for [[wikipedia:Terra Australis|Terra Australis]], a [[wikipedia:continent|continent]] hypothesized since [[wikipedia:Classical antiquity|antiquity]] to be where [[wikipedia:Antarctica|Antarctica]] is.
  * This is the only "Invoked" [[Non-Effect Monster]].
  * This monster's hand appears in the artwork of "[[Omega Summon]]".
