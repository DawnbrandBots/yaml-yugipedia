title: Card Trivia:Monster Recovery
wikitext: |-
  {{Navigation}}

  * This card has a ''[[Rush Duel]]'' counterpart: "[[Monster Calling]]".
  * Prior to this card's fifth [[errata|erratum]], it is the only card that allowed the player to [[shuffle]] the opponent's monster (that you control) into the player's [[Deck]]. This card's additional clause was added to prevent card theft.
