title: Card Trivia:Maniacal Servant
wikitext: |-
  {{Navigation}}

  * This card resembles "Oogie Boogie", the main antagonist in the film [[wikipedia:The Nightmare Before Christmas|The Nightmare Before Christmas]]. The effect of "[[Maniacal Servant]]" is quite similar to Oogie Boogie, who feeds on insects and becomes bigger as his sack-like body fills up.
  * This card has an [[ATK]] boosting counterpart, "[[Prometheus, King of the Shadows]]".
