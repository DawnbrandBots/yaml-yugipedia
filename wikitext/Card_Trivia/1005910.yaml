title: Card Trivia:Magic Mirror Spirit Asogi
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "''asogi''", the Buddhist term for an extremely large number that cannot be counted to.
  ** In mathematics, ''asogi'' refers to the number "one hundred septendecillion", which is written as 10^56 (or the number "ten vigintillion", which is written as 10^64)
  * This monster has an offensive counterpart: "[[Magic Mirror Spirit Nayuta]]".
  ** Both are named after the Buddhist terms referring to a large numerical value.
  ** Both monsters' combined values of their [[ATK]] and [[DEF]] equal 4000.
