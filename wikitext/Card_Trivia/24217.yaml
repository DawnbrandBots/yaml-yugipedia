title: Card Trivia:Sky Scourge Enrise
wikitext: |-
  {{Navigation}}

  * This card is named after the ''[https://finalfantasy.fandom.com/wiki/Enterprise_(Final_Fantasy_III) Enterprise]'' from ''[[wikipedia:Final Fantasy III|Final Fantasy III]]''.
  * The orb in front of this monster is similar to that of "[[Caius the Shadow Monarch]]" and "[[Dimensional Alchemist]]". The orb itself might be a "[[Dark Core]]", which also has a similar effect to that of those cards.
  * This is a weaker version of "[[Chaos Sorcerer]]", which in turn has half the effect of "[[Black Luster Soldier - Envoy of the Beginning]]". The other half was recreated in "[[Ruin, Queen of Oblivion]]".
  * Because each [[Attribute]] of the "[[Sky Scourge]]s" is different, it's possible they each represent one of the three worlds. "[[Sky Scourge Invicil]]" may represent ''Earth'', "[[Sky Scourge Enrise]]" may represent ''Heaven'', and "[[Sky Scourge Norleras]]" may represent ''Hell''.
