title: Card Trivia:Doma The Angel of Silence
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Dumah (angel)|Dumah]], an angel in Rabbinical and Islamic literature that has authority over the wicked dead.
  * This card is the first [[DARK]] [[Fairy]] monster.
  * This is the only card in ''[[Starter Deck: Yugi]]'' that can be weakened by the effect of "[[Yami]]".
  * This card's print in the Portuguese version of ''[[Metal Raiders]]'' features the [[card number]] "PMT-015", lacking the letter "P" after the hyphen to mark the language.
