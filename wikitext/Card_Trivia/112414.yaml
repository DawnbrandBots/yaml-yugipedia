title: Card Trivia:Ancient Gear Statue
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is a bust of "[[Ancient Gear Golem]]".
  ** This monster likely references the first appearance of "[[Ancient Gear Golem (anime)|Ancient Gear Golem]]" in the ''[[Yu-Gi-Oh! GX]]'' anime, where [[Vellian Crowler|Dr. Crowler]] [[Tribute Summon]]ed it by [[Tribute|Tributing]] the two "[[Wicked Token (anime)|Wicked Tokens]]", each [[Special Summon]]ed by the effect of his two "[[Statue of the Wicked (anime)|Statue of the Wicked]]" [[Trap Card]]s.
