title: Card Trivia:Inverse Universe
wikitext: |-
  {{Navigation}}

  * "[[Mid Shield Gardna]]" and "[[Mobius the Frost Monarch]]" appear in this card's artwork.
  ** This card's artwork depicts "Mid Shield Gardna" battling "Mobius the Frost Monarch". While the former monster would normally be destroyed by the latter, this card's effect switches both monsters' [[ATK]]/[[DEF]], allowing "Mid Shield Gardna" (whose ATK becomes 1800) to defeat "Mobius" (whose ATK becomes 1000).
