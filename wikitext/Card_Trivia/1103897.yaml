title: Card Trivia:Galactica Chaos Oblivion
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Galactica of Eternity]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Galactica Oblivion]]", fused with "[[Voidvelg Requiem]]".
  ** This monster's ATK is "Voidvelg Requiem's" when fully buffed by its effect (3500) and its DEF is "Galactica Oblivion's" (2500). 
  ** This monster represents the bond between [[Yudias Velgear]] (who uses "[[Galactica Oblivion (anime)|Galactica Oblivion]]") and [[Zuwijo Zwil Velgear]] (who uses "[[Voidvelg Requiem (anime)|Voidvelg Requiem]]") in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  ** This monster's [[Attack and effect names in Yu-Gi-Oh! GO RUSH!!|attack name]], ''War To Zen! Ultima Chaos Requiem!'', is a combination of "Galactica Oblivion's" ''War To Zen! Awesome True Goodnight!'' and "Voidvelg Requiem's" ''Ultima Requiem'', with [[Chaos (Rush Duel series)|Chaos]] thrown in.
  ** This monster is also the [[Galactica]] [[counterpart]] of "[[Transamvelg Linac]]".
