title: Card Trivia:D/D/D Gust King Alexander
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: Raging Masters]]''.
  * This card appears in the artwork of "[[Extra Recovery]]".
  * This monster's name is based on [[wikipedia:Alexander the Great|Alexander III of Macedon]] (also known as "Alexander the Great"), the ruler of the ancient kingdom of [[wikipedia:Macedonia (ancient kingdom)|Macedonia]], known for launching a series of military campaigns that expanded his empire from [[wikipedia:Greece|Greece]] to northwestern [[wikipedia:India|India]].
  * This is the first "[[D/D/D]]" [[Synchro Monster]].
  * This monster has an [[Card evolutions|upgraded]] form: "[[D/D/D Gust High King Alexander]]".
  * Unlike "[[D/D/D Flame King Genghis]]" and "[[D/D/D Wave King Caesar]]", this monster does not have an effect related to the "[[Dark Contract]]" [[Spell]]/[[Trap Card]]s.
  ** This is also the only member of the trio to have its effect altered upon its release in the ''[[OCG]]''/''[[TCG]]''; its first [[D/D/D Gust King Alexander (anime)|anime version]] originally had two effects, while in the ''OCG''/''TCG'' this card has only one effect.
