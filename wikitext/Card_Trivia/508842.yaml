title: Card Trivia:Beiige, Vanguard of Dark World
wikitext: |-
  {{Navigation}}

  * This monster's name is the "[[Dark World]]" color pun for the color [[wikipedia:beige|beige]].
  ** This monster's Chinese name (米黃吉) is a combination of the characters "米黃" ("beige") and "吉" (''jí'', [[wikipedia:Transcription into Chinese characters|a transcription]] of the kana "ジ" (''ji'') featured in its Japanese name, "''Bē'''ji'''''" (ベー'''ジ''')).
