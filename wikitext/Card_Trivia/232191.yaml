title: Card Trivia:Brotherhood of the Fire Fist - Gorilla
wikitext: |-
  {{Navigation}}

  * In the OCG, this card is named after ''[[wikipedia:Guan Sheng|Guan Sheng]]'' (read in Japanese as Kan Shō) and "monkey" (en), although the beast appears in its artwork looks like an ape rather than a monkey.
  ** ''Guan Sheng'' ranks 5th of the 36 Heavenly Spirits of the 108 [[wikipedia:Water Margin|Liangshan heroes]] and is nicknamed "Great Blade".
  * The kanji 勇 on this monster's belt and the gorilla in this card's artwork means "courage/bravery."
  * This monster appears in the artwork of "[[Fire Formation - Tensu]]"  and "[[Five Brothers Explosion]]".
