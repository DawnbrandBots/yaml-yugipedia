title: Card Trivia:Violet-Scale Enhanced Blast Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[Fusion Monster|Fusion]] of "[[Blue-Fang Burst Dragon]]" and "[[Red-Boot Boost Dragon]]".
  ** This monster's name is based on the color violet, the combination of the colors red and blue. Fittingly, this monster's belly and wings are violet; this monster's [[Fusion Material]]s have red and blue color schemes; and the color of the Fusion Monster cards are violet.
  * This monster is named after "[[wikipedia:Database scalability|Database scalability]]", the ability for a database system to handle an influx of information and users without compromising performance, either by adding to its existing capabilities or by removing obsolete elements to make room.
  ** The word "Scale" could also refer to "[[wikipedia:Grayscale|grayscale]]", the term used for the digital spectrum of black, white and especially gray colors. Fittingly, this monster's scales are gray, and this monster's Fusion Materials have black and white scales.
