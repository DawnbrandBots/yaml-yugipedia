title: Card Trivia:Helios Duo Megistus
wikitext: |-
  {{Navigation}}

  * This is the second of the three "[[Helios]]" cards ("[[Helios - The Primordial Sun]]" > '''"Helios Duo Megistus"''' < "[[Helios Trice Megistus]]").
  ** "Megistus" is derived from the Greek word "''megisti''", which means "biggest" or "greatest", reflecting how this monster is larger in appearance compared to "The Primordial Sun".
  *** This monster's name is also a pun on ''Helios Megistos'', the term used for the theological concept in Ancient Greek literature and philosophy, which claims that all of the elements were ruled by [[Wikipedia:Helios|Helios]], the god of the Sun in [[Wikipedia:Greek mythology|Greek mythology]].
  * This monster is likely based on a [[wikipedia:Binary star|binary star system]], in which a smaller star orbits a larger star.
