title: Card Trivia:Sevens Road Sorcerer
wikitext: |-
  {{Navigation}}

  * This card's artwork features seven cross-shaped symbols, referencing the "7" motif of the [[Sevens Road]] [[series]].
  ** This symbol also appears in the artwork of artworks of "[[Majesty of the Sevens Road]]" and "[[Master of the Sevens Road]]".
  *** The artwork of "Master of the Sevens Road" shows that this monster corresponds to the bottom symbol in the Sevens Road crest. When "[[Master of the Sevens Road (anime)|Master of the Sevens Road]]" appears in the anime, the order of the symbols is reversed, so it instead appears to correspond to the lower right symbol.
  * This monster has a [[Celeb Rose]] [[counterpart]]: "[[Celeb Rose Sorcerer]]".
  ** Both monsters share the same [[Level]] (4), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (1300/100).
