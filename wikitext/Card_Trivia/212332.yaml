title: Card Trivia:Heroic Challenger - Spartan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Heroic Advance]]", "[[Heroic Call]]", "[[Heroic Change]]", "[[Heroic Envoy]]", and "[[Heroic Guard]]".
  ** This monster's shield appears in the artwork of "[[Heroic Retribution Sword]]".
  * This monster is based on the [[wikipedia:Spartan army|Spartan warrior]], a member of the army of [[wikipedia:Sparta|Sparta]] equipped with a large shield and a spear.
  ** This monster's effect is based on the [[wikipedia:Phalanx formation|phalanx formation]], a Spartan military formation where the warriors created a blockade by overlapping their shields and use their spears to attack the opponent.
