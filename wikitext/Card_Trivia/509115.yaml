title: Card Trivia:Ultimate Dragon
wikitext: |-
  {{Navigation|mode=othergame}}

  * The "[[Blue-Eyes Ultimate Dragon]]" is treated as a [[Ritual Monster]] in several video games, with this card as its respective [[Ritual Spell Card]]. In the ''[[TCG]]'' and ''[[OCG]]'', "Blue-Eyes Ultimate Dragon" is a [[Fusion Monster]] with  its [[Fusion Material Monster]]s being three "[[Blue-Eyes White Dragon]]".
