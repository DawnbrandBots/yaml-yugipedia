title: Card Trivia:Man-Eater Bug
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chain Disappearance]]".
  * This card is one of the first five [[Effect Monster]]s to be released in the ''[[OCG]]'', the other four being "[[Armed Ninja]]", "[[Hane-Hane]]", "[[Reaper of the Cards]]", and "[[Skelengel]]".
  * This monster has two [[retrained]] counterparts: "[[Mimicking Man-Eater Bug]]" and "[[Nobleman-Eater Bug]]".
  * This card shares the same [[Level]], [[ATK]] and [[DEF]] as "[[Old Vindictive Magician]]"; however, this card's monster-destroying [[Flip effect]] can also destroy one of the controller's monsters.
  ** The ''[[Magician's Force]]'' version of "Old Vindictive Magician" had its effect misprinted, causing it to read the same as this card.
