title: Card Trivia:Tearlaments Merrli
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Tearlaments Metanoise]]", "[[Tearlaments Perlegia]]", and "[[Tearlaments Sulliek]]".
  * This card is named after a [[wikipedia:Melusine|melusine]] and a [[wikipedia:Merrow|merrow]], legendary water-dwelling human-like beings in [[wikipedia:Folklore|folklore]] and [[wikipedia:Myth|mythology]].
