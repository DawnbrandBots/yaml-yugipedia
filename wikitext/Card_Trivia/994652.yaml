title: Card Trivia:Seed-Spitting Saplings
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Snack-Nibbling Oyatsuhime & Tsumatsuhime" (オオヤツ・ツマムヒメ ''Ooyatsu Tsumamuhime'') features a double-layered pun.
  ** Oyatsuhime and Tsumatsuhime are the twin daughters of [[wikipedia:Susanoo-no-Mikoto|Susanoo]] and tutelaries of wood production in Japanese mythology.
  ** ''Oyatsu wo tsumamu'' is the Japanese term for "nibbling on snacks", which these monsters are depicted doing so.
