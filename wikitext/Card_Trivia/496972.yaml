title: 'Card Trivia:Number 29: Mannequin Cat'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This card's name seems to be a pun on "[[wikipedia:Maneki-neko|Maneki-neko]]" (招き猫, lit. ''Beckoning Cat''). The Maneki-neko is a common Japanese lucky charm, usually made of ceramic, which is believed to bring good luck to the owner. The figurine depicts a cat beckoning with an upright paw (like this monster), and is usually displayed—many times at the entrance—in shops, restaurants, pachinko parlors, and other businesses.
