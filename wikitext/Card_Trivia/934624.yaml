title: Card Trivia:Vision Resonator
wikitext: |-
  {{Navigation}}

  * This monster references the "[[Fortune Lady]]" [[archetype]], which was used by [[Carly Carmine]] as a [[Dark Signer]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's name references "[[Future Visions]]" and "[[Fortune Vision]]", the two [[Spell Card]]s related to the "Fortune Lady" archetype.
  ** This monster's design is based certain elements in the design of the "Fortune Lady" monsters, including the bat wings, the eye-shaped crest, and both ends of their scythe-like magic staff weapons.
  *** This monster's color scheme is also the same as "[[Fortune Lady Past]]", which was based on Carly's appearance as a Dark Signer.
  ** The above-mentioned facts, along with this monster belonging to the "[[Resonator]]" archetype, reference the bond between [[Jack Atlas]] and Carly in the anime, during at which time, both characters [[Duel]]ed while Carly was a Dark Signer.
