title: Card Trivia:Opening of the Spirit Gates
wikitext: |-
  {{Navigation}}

  [[File:The Seven Spirit Gates open.png|thumb|300px|The seven [[Spirit Gates]] open.]]
  * This card is based on the [[Spirit Gates]], a series of gates containing the [[Sacred Beast]] cards, which are hidden beneath [[Duel Academy]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's artwork is based on a scene from {{episode|GX|048|ref}}, where after the Spirit Gates are opened, a series of obelisks rise from underground, encircling the location of the Sacred Beast cards in the forest. The electrical field connecting each Spirit Gate occurs later when [[Kagemaru]] challenges [[Jaden Yuki]] to a Duel using the Sacred Beast cards.
  * This card has a [[Skill Card]] counterpart: "[[Victory of the Shadow Riders]]".

