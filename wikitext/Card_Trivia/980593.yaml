title: Card Trivia:Vanquish Soul Jiaolong
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vanquish Soul Snow Devil]]".
  * This monster resembles the "zoner" character archetype in [[wikipedia: Fighting game|fighting games]], specifically in the "non-projectile zoner" sub-archetype (e.g. [[wikipedia:Dhalsim|Dhalsim]] from ''[[wikipedia:Street Fighter|Street Fighter]]'', Billy Kane from ''[[wikipedia:Fatal Fury|Fatal Fury]]'' and ''[[wikipedia:The King of Fighters|King of Fighters]]'', Axl Low from ''[[wikipedia:Guilty Gear|Guilty Gear]]'', etc.). Gameplay-wise, these characters make heavy use of long-reaching physical attacks and sometimes projectile-based attacks to keep a safe distance from the opponent while still maintaining a significant offense.
