title: Card Trivia:Swordsoul Sinister Sovereign - Qixing Longyuan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Sword]]" and "[[Swordsoul Strife]]".
  * This monster is based on [[wikipedia:zh:龍泉劍|Qixing Longyuan]] (七星龍淵), another name of the legendary Chinese sword "Longyuan", which is said to represent integrity.
  ** Ironically, "Swordsoul Strategist Longyuan" betrayed the other "[[Swordsoul]]" monsters.
  * This monster is an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form of "[[Swordsoul Strategist Longyuan]]".
  ** This card's [[ATK]] (2900) reflects how "Longyuan" (which has 1200 ATK) took the sword of "[[Swordsoul of Mo Ye]]" (which has 1700 ATK), as depicted in the artwork of "[[Icejade Erosion]]".
  ** This monster is "Swordsoul Strategist Longyuan" after accepting the secret deal with "[[Ad Libitum of Despia]]", betraying the other "Swordsoul" monsters.
  * "[[The Abyss Dragon Swordsoul]]" appears to be this monster combined with "[[Supreme Sovereign Serpent of Golgonda]]".
  * This card has the same [[Level]] and [[card type]] as "[[Swordsoul Supreme Sovereign - Chengying]]".
  ** This may reflect the will of "Longyuan" to overthrow "Chengying" and become the leader of the "Swordsoul" monsters.
  ** This card is [[FIRE]]-[[Attribute]], while "Chengying" is [[WATER]]-Attribute.
  ** Both monsters have mirrored poses in their card artwork, and are depicted fighting in the artwork of "Swordsoul Strife".
  ** This card's ''[[TCG]]'' name, "Swordsoul Sinister Sovereign", is also similar to the ''TCG'' name of "Chengying", "Swordsoul Supreme Sovereign".
