title: Card Trivia:G Golem Stubborn Menhir
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Menhir|menhir]], a prehistoric man-made megalithic tomb consisting of a capstone supported by two or more upright stones, and covered with earth or smaller stones to form a barrow.
  * This monster has two [[Card evolutions|upgraded]] forms: "[[G Golem Invalid Dolmen]]" and "[[G Golem Dignified Trilithon]]".
