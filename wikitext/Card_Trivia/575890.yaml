title: Card Trivia:Fateful Hour
wikitext: |-
  {{Navigation}}

  * "[[Yoko, the Graceful Mayakashi]]" and "[[Shiranui Skillsaga Supremacy]]" appear in this card's artwork.
  * The events of "[[Ghost Meets Girl - A Mayakashi's Manuscript]]" occur after this card's. It shows "[[Yuki-Onna, the Ice Mayakashi]]" stepping in and snatching the staff from "Shiranui Skillsaga Supremacy". She then transforms into "[[Yuki-Onna, the Absolute Zero Mayakashi]]".
