title: Card Trivia:Karakuri Komachi mdl 224 "Ninishi"
wikitext: |-
  {{Navigation}}

  * The "224" of this card's name represents a multiplication problem: 2 x 2 = 4.
  ** The number is also written in Japanese multiple times on this monster's kimono: 弐弐四.
  * This monster is based on a [[wikipedia:Geisha|geisha]].
  * If one looks closely, one can see that there are gears instead of flowers on this monster's kimono.
  * This monster appears in the artwork of "[[Karakuri Cash Inn]]".
