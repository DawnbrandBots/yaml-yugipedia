title: Card Trivia:Mystical Capture Chain
wikitext: |-
  {{Navigation}}

  * This card has a [[recolored counterpart]]: "[[Binding Chain]]".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's 3D model shows the plate that this monster binds to, instead of the chains and the chained monster.
  ** Strangely, in the much earlier game ''[[Yu-Gi-Oh! Forbidden Memories]]'', the 3D model shows the chain instead.
