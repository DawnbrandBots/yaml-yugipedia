title: Card Trivia:Dogulce Langue De Shakoki
wikitext: |-
  {{Navigation}}

  * This monster's name and appearance are a combination of the following:
  ** ''[[wikipedia:Dogū|Shakōkidogū]]'', a type of ''[[wikipedia:Dogū|dogū]]'' figurine from ancient Japan shaped like a small animal.
  ** ''[[wiktionary:Dolce|Dolce]]'', the Italian word for "dessert", fitting the dessert-themed [[Deck]] used by [[Prioria Sweetalina]].
  ** ''Langue'', the French word for "tongue", which is reflected in this monster's long tongue.
  ** ''[[wikipedia:Cat tongue|Langue de chat]]'', a type of small biscuit or chocolate bar translated to "cat tongue", reflecting this monster's overall appearance.
