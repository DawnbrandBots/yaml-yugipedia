title: Card Trivia:Superheavy Samurai Brave Masurawo
wikitext: |-
  {{Navigation}}

  * This monster is possibly named after [[wikipedia:Masurao Hiroo|Hiroo Masurao]], a former Japanese sumo wrestler known for being a lighter wrestler in the top division and his usage of grappling and throwing instead of the standard pushing technique.
  * Visually, this monster is based on [[Gong Strong]], who used the "[[Superheavy Samurai]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
