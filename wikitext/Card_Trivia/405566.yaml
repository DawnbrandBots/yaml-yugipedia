title: Card Trivia:Erebus the Underworld Monarch
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Advent of the True Monarch]]''/''[[Emperor of Darkness Structure Deck]]''.
  * This monster appears in the artworks of "[[Pantheism of the Monarchs]]", "[[Reawakening of the Emperor]]", and "[[The Monarchs Revolt]]".
  ** This monster's silhouette appears in the artworks of "[[Domain of the True Monarchs]]" and "[[The First Monarch]]", as this card had not yet been released when those cards were.
  * This monster's name is based on [[wikipedia:Erebus|Erebus]], the god of darkness in [[wikipedia:Greek mythology|Greek mythology]].
  * This is the first and currently only [[Zombie]] [[Monarch]] monster.
  * According to the lore of ''[[Yu-Gi-Oh! Master Duel]]'', this monster is the leader of the elemental Monarch monsters, watching as they reign destruction over various lands.
  * This is the [[signature card]] of [[Shingo Sawatari (manga)|Shingo Sawatari]] in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.

