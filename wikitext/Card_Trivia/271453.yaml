title: Card Trivia:Blackwing - Nothung the Starlight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Battle Tuning]]", "[[Black Revenge]]", and "[[Clinch Reborn]]".
  * This monster is named after [[wikipedia:Gram (mythology)|Nothung]], one of the names of the sword used by [[wikipedia:Sigurd|Sigurd]] to kill the dragon [[wikipedia:Fafnir|Fafnir]] in [[wikipedia:Norse mythology|Norse mythology]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|027|ref}}, specifically from the panel showing [[Blackwing - Nothung the Starlight (manga)|this monster]] being Summoned
