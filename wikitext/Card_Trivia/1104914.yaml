title: Card Trivia:Conbirdable
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "convertible" and "bird".
  ** This monster's Japanese title,「半纏鳥官」(''hanten chōkan''), is a pun on 「反転召喚」(''hanten shōkan'', lit. [[Flip Summon]]), 「半纏」(''hanten'', [[wikipedia:Hanten|a short winter coat]]), 「長官」(''chōkan'', lit. chief), and 「鳥」(''chō'', lit. bird).
