title: Card Trivia:Armityle the Chaos Phantasm - Phantom of Fury
wikitext: |-
  {{Navigation}}

  [[File:Armityle covers the field in darkness.png|thumb|right|300px|"[[Chaos Phantasm Armityle]]" covers the field in darkness.]]

  * This monster is a [[signature move]] counterpart of "[[Armityle the Chaos Phantasm]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! GX|effect name]] of "[[Chaos Phantasm Armityle]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This monster's effects are based on the effects of "Chaos Phantasm Armityle" in the anime where it switches [[control]] of this card to the opponent's [[field]] in order to [[banish]] all other monsters on their field. The final effect of "Armityle" switches control back to the owner's field at the end of the turn.
  ** This card's artwork is based on a scene from {{Episode|GX|149|ref}}: During the Duel between [[Adrian Gecko]] and [[Jesse Anderson]] (who is possessed by [[Yubel (character)|Yubel]]), during the end of the turn that Jesse [[Changes control|switches control]] of "[[Chaos Phantasm Armityle]]" to Adrian via its effect, he [[activate]]s its effect to [[banish]] all monsters on Adrian's [[field]]. This is demonstrated when "Chaos Phantasm Armityle" billows a cloud of darkness from its mouth to cover Adrian's field, which causes his "[[Exodius the Ultimate Forbidden Lord (anime)|Exodius the Ultimate Forbidden Lord]]" to disappear.

