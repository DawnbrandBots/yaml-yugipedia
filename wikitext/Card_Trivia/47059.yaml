title: Card Trivia:Wroughtweiler
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Friendog", is a portmanteau of the words "friend" and "dog".
  ** This monster's Japanese name, robotic appearance, and its relationship with the "[[Elemental HERO]]" [[archetype]] is likely based on Friender, the robotic canine companion of Casshern, the protagonist of [[wikipedia:Tatsunoko Production|Tatsunoko Production's]] [[wikipedia:Casshan|titular anime series]].
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "wrought" and ''[[wikipedia:Rottweiler|Rottweiler]]'', a breed of dog.
  * This monster has a "[[Destiny HERO]]" [[counterpart]]: "[[D Cubed]]".
  ** Both monsters are used as [[support]] for their respective "[[HERO]]" archetypes.
  ** Both monsters' designs are each based on a canine and feline, which are often depicted in popular culture as having rivalrous or antagonistic relationships with each other. Fittingly, their owners&mdash;[[Jaden Yuki]] and [[Aster Phoenix]], respectively&mdash;have a rivalry in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This monster has a ''[[Rush Duel]]'' counterpart: "[[Wroughtwyvern]]".
