title: Card Trivia:Iron Chain Dragon
wikitext: |-
  {{Navigation}}

  * This card bears a slight resemblance to "[[Vice Dragon]]", "[[Strong Wind Dragon]]" and "[[Exploder Dragonwing]]".
  * In keeping with other [[Archetype]]s, this is the '''[[Dragon]]''' of the "[[Iron Chain]]s".
  * The maximum ATK this monster can achieve with its effect is 5300, if you have 3 copies of every other "Iron Chain" as well as 2 other copies of "Iron Chain Dragon" in your Graveyard.
