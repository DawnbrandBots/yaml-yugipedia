title: Card Trivia:Dice Archdemon
wikitext: |-
  {{Navigation}}

  * The red die from the artwork of "[[Skull Dice (Rush Duel)|Skull Dice]]" appears in this card's artwork.
  * This monster is an [[Card evolutions|upgraded]] version of "[[Dice Demon]]".
  * This monster has an [[ATK]]/[[DEF]]-increasing counterpart: "[[Dice Archangel]]".
