title: Card Trivia:Guard Mantis
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are based on its appearance in {{chapter|R|013|ref}}.
  ** This monster's 1000 [[Life Point]] payment and effect to [[Special Summon]] it in [[Defense Position]] is based on its [[Normal Summon]] in the chapter, where [[Mendo Cino]] Normal Summoned [[Guard Mantis (manga)|this monster]] in Defense Position while "[[Labor Pain]]" was active, which requires paying 1000 LP to Normal Summon a monster.
  ** This monster's effect to change the [[battle position]] of an [[Insect]] monster during the opponent's turn is a reference to the fact that [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] used "[[Stop Defense (manga)|Stop Defense]]" on it, which allowed him to win the Duel by attacking this monster with "[[Jinzo (manga)|Jinzo]]".
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! R]]'' manga, specifically from the panel showing this monster being Summoned.
