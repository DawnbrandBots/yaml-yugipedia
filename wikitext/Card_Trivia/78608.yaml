title: Card Trivia:Senri Eye
wikitext: |-
  {{Navigation}}

  * This card's artwork displays the [[Eye of Wdjat]].
  * "千里眼" ''senrigan'' is the ability to see very very far. It literally means "thousand-mile eye".
  ** 千里眼 (''Qiānlǐyǎn'') is also the name of a mythical character appears in several Chinese folkloric tales, who was said to be able to see very, very far. He is usually depicted in media as a deity at the [[wikipedia:Jade Emperor|Jade Emperor]]'s service, and accompanied with 順風耳 (''Shùnfēng'ěr'' "ear that can hear through the floating wind").
