title: Card Trivia:Giant Kra-Corn
wikitext: |-
  {{Navigation}}

  * This monster's tentacle appears in the artwork of "[[Incornceivable]]".
  * This monster's Japanese name, "{{translated name|Giant Kra-Corn|ja}}" ({{name|Giant Kra-Corn|ja}}, ''{{romanized name|Giant Kra-Corn|ja}}'') is a portmanteau of the words "octopus" (タコ, ''tako'') and "corn" (コーン, ''kōn'').
  ** This monster's ''[[TCG]]'' name is a portmanteau of "[[wikipedia:Kraken|Kraken]]" (a legendary sea monster that is often depicted as a giant octopus) and "corn".
  * This monster's ''[[OCG]]''/''TCG'' effect to [[Special Summon]] itself from the [[hand]] in [[Defense Position]] when an opponent's monster declares an attack, and then change the attack [[target]] to it, is based on the effect of "Incornceivable", which [[activate]]s when an opponent's monster declares an attack with 2500 or more [[ATK]], allowing the player to Special Summon [[Giant Kra-Corn (manga)|this monster]] from his [[Deck]] and change the attack target to it. In {{chapter|ZEXAL|012|ref}}, [[Captain Corn]] Special Summoned this monster in Defense Position after "[[No. 50: Black Ship of Corn (manga)|No. 50: Black Ship of Corn]]" is attacked by [[Yuma Tsukumo (manga)|Yuma Tsukumo's]] "[[No. 39: Utopia (manga)|No. 39: Utopia]]", and changed the attack target of "Utopia" to this monster.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! ZEXAL]]'' manga, specifically from the panel showing this monster being Summoned.
