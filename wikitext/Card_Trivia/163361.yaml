title: Card Trivia:Wind-Up Warrior
wikitext: |-
  {{Navigation}}

  * This card has a [[counterpart]]: "[[Wind-Up Soldier]]".
  * On the backs of the ''[[Generation Force]]'' single [[Booster Pack]] packages, there is a card  tip dubbed "Wind-Up Warriors" introducing players to the "[[Wind-Up]]" [[archetype]] that ''did not'' pertain to this monster at all. Coincidentally, this card would later be released in the follow up [[Core Booster]] pack, ''[[Photon Shockwave]]''.
