title: Card Trivia:Service Puppet Play
wikitext: |-
  {{Navigation}}

  * "[[Antidote Nurse]]", "[[Number 15: Gimmick Puppet Giant Grinder]]", and "[[Tin Archduke]]" appear in this card's artwork.
  ** This card marks the first appearance of "Antidote Nurse" nearly 2 months in the Japanese ''[[OCG]]'' before its release in ''[[Animation Chronicle 2024]]''.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|033|ref}}, where [[Quattro]] first [[Xyz Summon]]s "[[Number 15: Gimmick Puppet Giant Grinder (anime)|Number 15: Gimmick Puppet Giant Grinder]]" and subsequently uses its effect to [[destroy]] [[Bronk Stone]]'s "[[Tin Archduke (anime)|Tin Archduke]]" and [[Caswell Francis]]'s "[[Antidote Nurse (anime)|Antidote Nurse]]", winning him the Duel.
  * The first portion of this card's Japanese name, "Servist", is a portmanteau of the words "service" and "sadist".
  ** The former word, together with the first portion of the names of "[[Gimmick Puppet Fantasix Machinix]]" and "[[CXyz Gimmick Puppet Fanatix Machinix]]", makes up the word "fanservice" (ファンサービ, ''Fansābisu''), the trademark slogan used by Quattro in the original Japanese version of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** The latter word is based on Quattro's penchant of tormenting his opponents during his Duels, which he considers his "fanservice". This is further reinforced with the kanji title of this card's Japanese name, "Puppet Service" (傀儡遊儀, ''Kugutsu Yūgi''), which may also be an allusion to that Quattro views his fans the same as his puppet-like monsters, helpless to do anything against the will of him, the "puppeteer", who pulls all the strings.

