title: Card Trivia:Duelist Kingdom (card)
wikitext: |-
  {{Navigation}}

  * This is one of five invitational cards to the [[Duelist Kingdom]] tournament in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]]. 
  ** This card's artwork depicts the [[Duelist Kingdom (island)|Duelist Kingdom island]] where the tournament was held. Any contestant who wished to participate needed to carry "[[Glory of the King's Hand]]" and/or "[[Glory of the King's Opposite Hand]]", "[[Duelist's Glove]]", and "[[Set Sail for The Kingdom]]".
  * This card briefly appears in the opening cinematic of ''[[Yu-Gi-Oh! The Duelists of the Roses]]''.
