title: Card Trivia:U.A. Signing Deal
wikitext: |-
  {{Navigation}}

  * The blonde man in this card's artwork also appears in the artworks of "[[U.A. Penalty Box]]" and "[[U.A. Locker Room]]". This is supported by the fact one of the men in that card's artwork is wearing a jersey with the number 9 on it, and also has blonde hair.
  * This card's effects reference signing athletes to sports teams; the summon can be seen as the recruitment, the negation of their effect and inability to use them for Xyz and Synchro Summons refer to restrictions placed on an athlete's behavior by their contract, and the Life Point loss references the salary to be paid to the athlete for their performance, with the association of a higher level (of skill) meaning more is to be paid.
