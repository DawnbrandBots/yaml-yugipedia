title: Card Trivia:Icejade Creation Kingfisher
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Swordsoul Strife]]".
  * The kanji ''Tei'' ({{Ruby|艇|テイ}}, "Ship") in this card's Japanese name is a homophone of the kanji ''Tei'' ({{Ruby|帝|テイ}}, "Empress") in the Japanese name of "[[Icejade Kosmochlor]]".
  ** This likely reflects this monster's high status among the "[[Icejade]]" monsters.
