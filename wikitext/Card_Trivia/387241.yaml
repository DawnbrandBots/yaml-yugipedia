title: Card Trivia:True King Agnimazud, the Vanisher
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Metalfoes Combination]]" and "[[True King's Return]]".
  ** This monster is referenced in the [[flavor text]] of "[[Metalfoes Volflame]]".
  * This monster's name is derived from [[wikipedia:Agni|Agni]], the god of fire in [[wikipedia:Hinduism|Hinduism]].
  * Since the non-[[WIND]] "[[True Draco#True King|True King]]" monsters are the antagonistic rivals of an [[archetype]]/[[series]] related to the "[[Dracoslayer]]" storyline with the same [[Attribute]], this monster is a rival to the "[[Metalfoes]]" archetype (which primarily consists of [[FIRE]] monsters) as depicted in the artwork of "Metalfoes Combination".
