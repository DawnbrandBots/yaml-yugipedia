title: Card Trivia:Thor, Lord of the Aesir
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[March Towards Ragnarok]]".
  * This monster is based on [[wikipedia:Thor|Thor]], the god of thunder in [[wikipedia:Norse mythology|Norse mythology]], who is often depicted wielding the legendary hammer [[wikipedia:Mjölnir|Mjölnir]] in his left hand.
  ** The handle of the hammer wielded by this monster is shaped like the [[wikipedia:Thurisaz|thurisaz]] (ᚦ) rune, which is commonly associated with Thor.
  * This monster features the following differences from the other "[[Aesir]]" monsters:
  ** It is the only "Aesir" monster whose effect affects [[Monster Card]]s, rather than [[Spell]] or [[Trap Card]]s.
  ** It is the only one whose ''[[OCG]]''/''[[TCG]]'' [[Type]] does not match that of the "[[Nordic]]" sub-[[archetype]] it is tied to, as its Type is [[Beast-Warrior]], while the Type of the "[[Nordic Beast]]" monsters is [[Beast]].
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster had the same [[Attribute]] ([[DIVINE]]) and Type ([[Divine-Beast]]) as "[[Loki, Lord of the Aesir (anime)|Loki, Lord of the Aesir]]" and "[[Odin, Father of the Aesir (anime)|Odin, Father of the Aesir]]".
  ** In the anime, this monster was depicted as the second tallest of the three "Aesir" monsters, while "Loki" was the shortest, and "Odin" was the tallest.
