title: Card Trivia:Odd-Eyes Lancer Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name references the [[Lancers]], a group of [[Duelist]]s that [[Yuya Sakaki]] is a part of in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This is fitting, given the context of the Duels from {{episode|ARC-V|142|ref}} to this monster's debut in {{episode|ARC-V|145|ref}}, in which Yuya Dueled against different members of the Lancers.
  * This is the only [[Main Deck]] "[[Odd-Eyes]]" [[Dragon]] monster whose design features wings.
