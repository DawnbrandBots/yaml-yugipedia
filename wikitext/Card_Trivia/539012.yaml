title: Card Trivia:Colosseum - Cage of the Gladiator Beasts
wikitext: |-
  {{Navigation}}

  * The colosseum in this card's artwork appears in the artworks of "[[Gladiator Beast War Chariot]]", "[[Gladiator Beast's Comeback]]", "[[Gladiator Proving Ground]]", "[[Gladiator Rejection]]", and "[[Gladiator's Return]]".
  * This card is based on the [[wikipedia:Colosseum|Colosseum]], an elliptical amphitheater where gladiator matches took place in [[wikipedia:Ancient Rome|Ancient Rome]].
