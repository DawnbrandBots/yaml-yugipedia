  * This monster, "[[Filia Regis]]", and "[[Juraishin, the Cursed Thunder God]]" were announced one after the other<ref>{{cite web | url = https://x.com/YuGiOh_OCG_INFO/status/1872975794768621630 | title = ⋅⋆⋄✧𝘼𝙇𝙇𝙄𝘼𝙉𝘾𝙀 𝙄𝙉𝙎𝙄𝙂𝙃𝙏 𝟐𝟎𝟐𝟓.𝟏.𝟐𝟓 𝐒𝐚𝐭 ✧⋄⋆⋅ ◆収録カード公開◆ ◤NT８０００－SIRIUS◢ 収録❗️ | publisher = 公式】遊戯王OCG (X) {{icon|jp}} | accessdate = December 31, 2024 | date = December 28, 2024 }}</ref><ref>{{cite web | url = https://x.com/YuGiOh_OCG_INFO/status/1873338178897326276 | title = ⋅⋆⋄✧𝘼𝙇𝙇𝙄𝘼𝙉𝘾𝙀 𝙄𝙉𝙎𝙄𝙂𝙃𝙏 𝟐𝟎𝟐𝟓.𝟏.𝟐𝟓 𝐒𝐚𝐭 ✧⋄⋆⋅ ✦収録カード公開✦ ◤妖竜の禁姫◢ 収録❗️ | publisher = 公式】遊戯王OCG (X) {{icon|jp}} | accessdate = December 31, 2024 | date = December 29, 2024 }}</ref><ref>{{cite web | url = https://x.com/YuGiOh_OCG_INFO/status/1874002560853364808 | title = ⋅⋆⋄✧𝘼𝙇𝙇𝙄𝘼𝙉𝘾𝙀 𝙄𝙉𝙎𝙄𝙂𝙃𝙏 𝟐𝟎𝟐𝟓.𝟏.𝟐𝟓 𝐒𝐚𝐭 ✧⋄⋆⋅ ✦収録カード公開✦ ◤呪雷神ジュラ◢ 収録❗️ | publisher = 公式】遊戯王OCG (X) {{icon|jp}} | accessdate = December 31, 2024 | date = December 31, 2024 }}</ref>, and are likely meant to tie in with the themes featured in the ''[[Quarter Century Trinity Box]]''. This monster, due to being a [[DARK]] [[Machine]] monster with effects that support DARK [[Link Monster]]s, is an indirect support to the "[[Orcust]]" [[archetype]].

