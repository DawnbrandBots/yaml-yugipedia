title: Card Trivia:Lock Cat
wikitext: |-
  {{Navigation}}

  * This monster's name, design, and effects are synergetic with "[[Key Mouse]]", both of which make up a lock and key combination.
  ** The effect of "Key Mouse" can add one [[Level 3]] or lower [[Beast]] monster from the [[Deck]] to the [[hand]], including this monster, whose effect in turn can [[Special Summon]] "Key Mouse" from the [[Graveyard]].
  *** The above-mentioned monsters are also synergetic with "[[Chain Dog]]", whose effect can Special Summon itself from the Graveyard when there are exactly two Beast monsters on the [[field]], including this monster and "Key Mouse". This, along with the above-mentioned monsters, creates a key, lock, and chain connection.
