title: Card Trivia:Satellarknight Vega
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Vega|Vega]], which is the brightest star in the constellation [[wikipedia:Lyra|Lyra]].
  ** The constellation Lyra appears in the artwork of this card, with Vega's location in said constellation denoted by an encircled star.
  * This monster has a counterpart: "[[Tellarknight Lyran]]".
  * This monster has a combined [[Xyz Monster|Xyz]] form with "[[Satellarknight Altair]]" and "[[Satellarknight Deneb]]": "[[Stellarknight Delteros]]".
  ** Vega, [[wikipedia:Altair|Altair]] and [[wikipedia:Deneb|Deneb]] are the three stars of the [[wikipedia:Asterism (astronomy)|asterism]] known as the [[wikipedia:Summer Triangle|Summer Triangle]].
