title: Card Trivia:Motor Frenzy
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to increase the [[ATK]] of itself or another Summoned [[Machine]] monster by half its original [[DEF]] and prevent its [[battle position]] from changing reference the effect of "[[Engine Tuner]]" to increase a monster's ATK by half of its DEF and preventing it from changing to [[Defense Position]].
  ** In {{chapter|R|033|ref}}, [[Keith Howard (manga)|Bandit Keith Howard]] used "Engine Tuner" to increase the ATK of this monster and of other Machine monsters, although the other monsters were Summoned while this card was not on the [[field]].
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! R]]'' manga, specifically from the panel showing [[Motor Violence|this monster]] being Summoned.
