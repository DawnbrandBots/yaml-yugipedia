title: Card Trivia:Eternal Drought
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Drought|drought]], an event where water supply in an area has run low, causing a substantial negative impact on its aquatic ecosystem.
  * This card has several [[counterpart]]s that destroy a specific [[Type]] of [[monster]]:
  ** [[Fiend]]: "[[Exile of the Wicked]]"
  ** [[Insect]]: "[[Eradicating Aerosol]]"
  ** [[Machine]]: "[[Acid Rain]]"
  ** [[Rock]]: "[[Breath of Light]]"
  ** [[Spellcaster]]: "[[Last Day of Witch]]"
  ** [[Warrior]]: "[[Warrior Elimination]]"
  ** Prior to its release in ''[[Gold Series 4: Pyramids Edition|Gold Series 4]]'', this card and "Eradicating Aerosol" were the only Type-specific destroyers that were ''[[OCG]]'' exclusive.
  * In many of the ''Yu-Gi-Oh!'' video games such as ''[[Yu-Gi-Oh! GX Duel Academy]]'', ''[[Yu-Gi-Oh! Worldwide Edition: Stairway to the Destined Duel]]'', and the ''[[5D's]]'' video games, this card is named "Eternal Draught".
  ** This is an ironic typo, as "draught" (a portion of liquid) has the opposite meaning of "drought" (a prolonged absence of water).
  * In ''[[Yu-Gi-Oh! Forbidden Memories]]'', this card can be created using "[[Umi]]" and "[[Mystical Moon]]"; this is a reference to [[Yami Yugi and Mako Tsunami's Duel]] in the original [[Yu-Gi-Oh! (manga)|Yu-Gi-Oh! manga]] and [[Yu-Gi-Oh! (anime)|anime]], where "[[Giant Soldier of Stone (anime)|Giant Soldier of Stone]]" destroys "[[Mystical Moon (manga)|Mystical Moon]]" (or "[[Full Moon]]" in the anime) and causes the [[ocean]] [[terrain]] to recede away.
