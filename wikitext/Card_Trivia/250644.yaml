title: Card Trivia:Blackfeather Darkrage Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Duel Dragon Token]]" (as a silhouette).
  * This monster has a "[[Signer Dragon]]" [[counterpart]]: "[[Black-Winged Dragon]]".
  ** This monster's name is a corruption of the name of "[[Blackwing]]" [[archetype]]; however, this monster switches the localized names from "Black-Winged Dragon" in the ''[[OCG]]''/''[[TCG]]''.
  ** This monster's effect is the opposite of that of "Black-Winged Dragon": this monster gains [[ATK]] after the player is inflicted with damage, while "Black-Winged Dragon" reduces the ATK of a monster based on the amount of damage that would've been inflicted onto the player.
  * This is the [[signature card]] of [[Crow Hogan (manga)|Crow Hogan]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|5D's|039|ref}}, specifically from the panel showing [[Blackwing Dragon Black Feather (manga)|this monster]] being Summoned
