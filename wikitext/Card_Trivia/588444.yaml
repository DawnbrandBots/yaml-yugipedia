  * This card is named after [[wikipedia:Slavic_paganism#God_and_spirits|Zirnitra]].
  * This card is a counterpart to "[[Chaos Dragon Levianeer]]", "[[Iron Dragon Tiamaton]]", "[[Omni Dragon Brotaur]]" and "[[Fantastical Dragon Phantazmay]]", all [[DARK]] [[Dragon]]s based on mythic dragons.
