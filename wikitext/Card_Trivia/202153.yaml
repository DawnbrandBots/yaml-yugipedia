title: Card Trivia:Express Train Trolley Olley
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Revolving Switchyard]]" and "[[Switch Point]]".
  * This monster is based on the [[wikipedia:Pennsylvania Railroad|Pennsylvania Railroad]] [[wikipedia:EMD SW1|EMD SW1]] [[wikipedia:switcher|yard switcher]] locomotive, which is commonly used to shunt [[wikipedia:Railroad car|freight cars]].
  * This monster's English and Japanese names both feature a similar rhyming naming scheme - "''Torokkorokko''" and "Trolley Olley".
  ** This monster's Japanese name, "Trolley Rocco" (トロッコロッコ, ''Torokkorokko'') features the latter word "Rocco", which can be pronounced as "''loco''", short for "locomotive".
  ** Also, this monster's Japanese name, "Limited Express", is based on the type of express train which stops at a limited number of stops compared to other express services in similar routes.
