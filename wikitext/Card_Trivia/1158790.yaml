title: Card Trivia:Vic Viper Beginning
wikitext: |-
  {{Navigation}}

  * This monster's effect requiring the player to pay 100 [[Life Point]]s is a reference to how arcade machines (which the ''[[wikipedia:Gradius|Gradius]]'' video game series originated from) requires the player to insert a coin to restart the game from zero, which in Japan were often 100-yen coins.
  ** This monster's effect to [[Special Summon]] up to two "[[Gradius' Option (Rush Duel)|Gradius' Option]]" from the player's [[Graveyard]] is a reference to how in spaceship shoot-em-up video games (e.g. the ''Gradius'' video game series), the player is rewarded a free power-up after losing a life to make it easier to advance.
