title: Card Trivia:Galaxy Mirror Sage
wikitext: |-
  {{Navigation}}

  * This monster is the only member of the "[[Galaxy]]" [[Archetype|archetype]] that is a [[Flip monster|Flip Monster]].
  * Its name may reference the fact that "Galaxy Mirror Sage" can [[Special Summon|Special Summon]] another copy of itself when it is [[Destroy|destroyed]].
