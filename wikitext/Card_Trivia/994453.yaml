title: Card Trivia:Rock Overlord Rubble King
wikitext: |-
  {{Navigation}}

  * A [[Praime]] [[counterpart]] of this monster appears in the artwork of "[[Praime Ziggurat]]".
  * This monster's Japanese name, "Gareking", is a portmanteau of the Japanese words for "rubble" (瓦礫, ''gareki'') and "king".
  ** "''Gareki''" can also be the Japanese word for "small scale model kit", which is usually applied to a [[wikipedia:Gundam model|Gundam model]], reflecting this monster's humanoid robotic appearance.
