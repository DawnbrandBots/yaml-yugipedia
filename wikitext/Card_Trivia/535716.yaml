title: Card Trivia:Blessings of the Nile
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Nile|The Nile]] is a river in [[wikipedia:Africa|Africa]], and is regarded as the longest river in the world. The card refers to the annual [[wikipedia:Flooding of the Nile|flooding of the Nile]] in Ancient Egypt, which could be destructive (discarding cards), but also deposited nutrients into the soil (gain LP) allowing for agriculture in the middle of the desert.
  * This is one of the few cards in the game that refer to the real world.
