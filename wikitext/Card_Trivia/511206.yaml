title: Card Trivia:Five-Headed Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Legend Awakening Pack]]''.
  * This monster appears in the artwork of "[[Paradox Fusion]]".
  * This monster has a [[Link Monster|Link]] counterpart: "[[Five-Headed Link Dragon]]".
  ** This monster also has a [[Spellcaster]] counterpart: "[[Quintet Magician]]".
  * This monster is based on the ''[[wikipedia:Dungeons & Dragons|Dungeons & Dragons]]'' [[wikia:w:c:forgottenrealms:Tiamat|representation]] of [[wikipedia:Tiamat|Tiamat]], a Mesopotamian goddess. ''Dungeons and Dragons'' depicts [[wikipedia:Tiamat (Dungeons & Dragons)|Tiamat]] as being a five-headed goddess of evil dragons, with each head colored one of the primary colors of chromatic dragons: blue, green, red, black, and white.
  * This monster's five heads each represent the [[Attribute]] of its required [[Fusion Material]]s:
  ** Mechanized head: [[EARTH]].
  ** Yellow spiked head: [[WIND]].
  ** Black head: [[DARK]].
  ** [[Sea Serpent]]-like head: [[WATER]].
  ** Flaming head: [[FIRE]].
  ** The lack of a [[LIGHT]] head references this monster's effect to prevent it from being destroyed in battle with another monster unless that monster's Attribute is LIGHT (or [[DIVINE]]).
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) and [[original DEF]] (5000, tied with [[5000 DEF Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]'' and ''[[Yu-Gi-Oh! Rush Duel]]''.
  * This is the first [[Nomi]] monster released in ''Yu-Gi-Oh! Rush Duel'', as well as the first [[Level 12]] monster and the first monster with a [[Level]] higher than 10.
