title: Card Trivia:Sengenjin Wakes from a Millennium
wikitext: |-
  {{Navigation}}

  * "[[Millennium Shield]]" appears in this card's artwork.
  * This monster is a [[retrained]] counterpart of "[[Sengenjin]]".
  ** This monster's artwork may be a reference to the [[flavor text|flavor texts]] of "Sengenjin" and "Millennium Shield". The flavor text of "Sengenjin" states that it carries [[Millennium Items]], while the [[Card_Errata: Millennium Shield|original flavor text]] of "Millennium Shield" refers to it as a Millennium Item.
