title: Card Trivia:Pharaonic Advent
wikitext: |-
  {{Navigation}}

  * This monster's name references the [[Tomb Keeper]]s, a group in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]] who served as protectors of the [[Pharaoh Atem|nameless pharaoh's]] tomb and awaited his return.
  ** This monster's [[Tribute]] effect requiring a [[Fairy]], [[Fiend]], or [[Reptile]] monster reference the monsters used by three members of the Tomb Keepers: [[Ishizu Ishtar]], [[Marik Ishtar]] and [[Odion]]. Ishizu's Deck featured Fairy monsters; Marik's Deck (as [[Yami Marik]]) featured Fiend monsters; and Odion's Deck featured the Reptile [[Trap Monster]], "[[Embodiment of Apophis]]".
  *** This monster's effect [[support]]ing [[Continuous Trap Card]]s also reference Odion's usage of Trap Monsters, which were introduced as Continuous Traps.
