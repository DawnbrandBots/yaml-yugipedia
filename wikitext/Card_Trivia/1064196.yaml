title: Card Trivia:Tamabot King Golem
wikitext: |-
  {{Navigation}}

  * "[[Tamainabot]]" appears in this card's artwork, serving as this monster's pilot.
  * This monster's initials ('''TKG''') are a pun on '''''tamago kake gohan''''' (lit. "egg on rice"), a popular Japanese breakfast food consisting of cooked Japanese rice topped or mixed with raw egg and soy sauce. Fittingly, "[[Tamabot]]" is an egg-shaped [[Machine]] [[Type]] monster, and this monster is depicted armed with soy sauce shooters attached to its knees.
  * This monster's Summoning animation in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime resembles the "Pilder on" sequence of ''[[wikipedia:Mazinger Z|Mazinger Z]]'' in the anime of the same name, with the monster emerging from a platform under a pool which splits in two, "[[Tamainabot (anime)|Tamainabot]]" inserting itself on its head like the Hover Pilder on Mazinger, and the monster raising its arms. In the background, [[wikipedia:Mount Fuji|Mount Fuji]] can be seen alongside two metal prongs similar to those of the Photon Power Laboratory.
