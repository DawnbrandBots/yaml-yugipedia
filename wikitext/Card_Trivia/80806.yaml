title: Card Trivia:Crawling Dragon 2
wikitext: |-
  {{Navigation|Crawling Dragon #2}}

  * Despite this card's name featuring the word "[[Dragon]]", this card is actually a [[Dinosaur]] monster.
  ** This is because the Japanese word for "dragon" (竜 ''ryu'') can be found in the Japanese word for "dinosaur" (恐竜 ''kyoryu''); in some ''Yu-Gi-Oh!'' video games such as ''[[Yu-Gi-Oh! Forbidden Memories|Forbidden Memories]]'', Dinosaur monsters can be used as a Dragon monster for [[Fusion Summon]]ing and [[equip]]ped with "[[Dragon Treasure]]".
  * This card has a [[recolored counterpart]]: "[[B. Dragon Jungle King]]".
  * This card shares the same [[Attribute]] ([[EARTH]]), [[Level]] (4), [[ATK]] (1600) and [[DEF]] (1200) as "[[Two-Headed King Rex]]".
  ** Both cards are also [[Fusion Material]] for "[[Bracchio-raidus]]".
  * The [[Crawling Dragon 2 (Bandai)|Bandai]] version of this card is [[Level 5]] with 2000 [[ATK]] and 1800 [[DEF]], whereas the Konami version of this card is [[Level 4]] with 1600 ATK and 1200 DEF.
  ** Both versions of this monster also feature a different color scheme from each other.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|079|ref}}, specifically from the panel showing [[Crawling Dragon 2 (manga)|this monster]] being Summoned.
