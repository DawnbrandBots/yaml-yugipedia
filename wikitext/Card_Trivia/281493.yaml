title: 'Card Trivia:Number C15: Gimmick Puppet Giant Hunter'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * The number 15 appears on this monster's headband, although it is difficult to see it.
  * This monster is a [[Ranked-Up]] "[[Number C]]" form of "[[Number 15: Gimmick Puppet Giant Grinder]]".
  ** This is the first "[[Gimmick Puppet]]" [[Xyz Monster]] with a [[Rank]] higher than 8.
  * This is the first "Number C" monster
  ** to be [[Machine]].
  ** to have less DEF than its base form.
  *** Its [[ATK]]/[[DEF]] (2500/1500) are the inverse of its base form's ones (1500/2500).
  ** to be used by [[Quattro]] and the [[Arclight Family]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[detach]]es an [[Xyz Material]], it is absorbed into the chest.
  ** When this monster's effect is [[activate]]d, it fires two glowing buzzsaws to dissect the monster, causing it to explode.
  ** When this monster attacks, it detaches its jaw and a [[wikipedia:Gatling gun|Gatling gun]] juts out of its mouth before rapidly shooting its bullets. In the English version of the anime, it rapidly shoots laser blasts.
