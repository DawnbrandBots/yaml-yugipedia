title: Card Trivia:TG1-EM1
wikitext: |-
  {{Navigation}}

  * "[[T.G. Rush Rhino]]" appears in this card's artwork.
  * This card's name reflects its effect to switch [[control]] the player's "[[T.G.]]" monster with an opponent's monster.
  ** "TG" stands for "T.G.", the "EM" stands for "enemy monster", and the "1" represents the one monster on the player and opponent's field [[target]]ed by this card's effect.
