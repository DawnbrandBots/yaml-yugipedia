title: Card Trivia:Vicious Astraloud
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mannadium Breakheart]]", "[[Mannadium Reframing]]", and "[[Peaceful Planet Calarium]]".
  ** "[[Visas Starfrost]]" appears possessing this monster's wings in the artwork of "[[A Shattered, Colorless Realm]]".
  ** This card's artwork appears in the artwork of "[[Loka Samsara]]".
  * This monster is an upgraded [[Fusion Monster|Fusion]] form of "Visas Starfrost", combined with "[[Scareclaw Reichheart]]", "[[Tearlaments Reinoheart]]", and "[[Kashtira Riseheart]]".
  ** The artwork of "[[Kashtira Akstra]]" depicts the transformation of "Visas Starfrost" into "Vicious Astraloud".
  ** This card is named after "Astra", the Latin word for "Star".
  ** It possesses a sword on its arm similar to "[[Scareclaw Tri-Heart]]", tentacle-like appendages similar to "[[Tearlaments Kaleido-Heart]]", and wings similar to "[[Kashtira Arise-Heart]]".
  * Under this form, "Visas's" role in the "Mannadium" arc is ironically similar to the first evil counterpart he clashed with in the [[Broken World]] storyline, "Scareclaw Reichheart", becoming the DARK villain to the LIGHT hero that he is an otherworldly counterpart of ("[[Mannadium Riumheart]]").
  * This form represents "Visas" giving into his id, the part of the mind tied to instinctual and selfish behavior, in contrast to the moral and selfless superego. This monster's clash with "[[Mannadium Prime-Heart]]" represents how the id and superego clash to determine what the ego should do.
  * This card has 4 [[Heart]] [[counterpart]]s:
  ** "[[Scareclaw]]" [[Link Monster|Link]]: "[[Scareclaw Tri-Heart]]"
  ** "[[Tearlaments]] Fusion: "[[Tearlaments Kaleido-Heart]]"
  ** "[[Kashtira]]" [[Xyz Monster|Xyz]]: "[[Kashtira Arise-Heart]]"
  ** "[[Mannadium]]" [[Synchro Monster|Synchro]]: "Mannadium Prime-Heart"
