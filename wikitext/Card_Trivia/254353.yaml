title: Card Trivia:Cold Sleeper
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on a cryogenic stasis pod, a device often depicted in media that puts people in a state of [[wikipedia:suspended animation|suspended animation]] (or a "cold sleep") to delay the onset of illness and death, which reflects its effect to "preserve" the life of the player's [[destroy]]ed monster by [[Special Summon]]ing it from the [[Graveyard]] at the cost of one of player's [[Monster Zone]]s.
