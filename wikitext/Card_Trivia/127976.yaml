title: Card Trivia:Ultimate Axon Kicker
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Psychicker", is a portmanteau of the words "psychic" and "kicker".
  ** This monster's ''[[TCG]]'' name is based on [[wikipedia:Axon|axon]], the name for a nerve fiber that sends information along the nervous system. 
  *** This monster's ''TCG'' naming scheme is based on the concept of telepathy, which can be described as transferring information from one system of nerves (and axons) to another.
  * This is the first [[Psychic]] [[Fusion Monster]].
  * This monster has an upgraded form: "[[Absolute Axon Kicker]]".
  * This monster is an [[upgrade]]d form of "[[Thought Ruler Archfiend]]", possibly as a result of the process depicted in the artwork of "[[Psychic Overload]]".
  ** This monster has the same [[Life Point]]-gaining effect as "Thought Ruler Archfiend", with an added [[piercing]] effect.
  ** This monster can be considered the [[LIGHT]] evolution of "Thought Ruler Archfiend" and the LIGHT counterpart of "[[Overmind Archfiend]]".
  ** This monster's name suggests that it is a Fusion of "Thought Ruler Archfiend" and "[[Armored Axon Kicker]]", both of which are valid [[Fusion Material]]s for this monster's [[Fusion Summon]].
