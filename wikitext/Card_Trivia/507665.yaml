title: Card Trivia:Absolute End
wikitext: |-
  {{Navigation}}

  * "[[Gagagigo]]" and "[[Invader of Darkness]]" appear in this card's artwork.
  ** This card's artwork is a reversal of "[[My Body as a Shield]]" (in which "[[Marauding Captain]]" shields "Gagagigo" from the attack of "[[Blazing Inpachi]]"), as "Gagagigo" shields one of "Marauding Captain"'s men from the attack of "Invader of Darkness".
  ** This card's artwork depicts a reverse angle shot of the artwork depicted in "[[Spirit Barrier]]".
