title: Card Trivia:Tuningware
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Transmission]]".
  * This monster is wearing a [[wikipedia:Wok|wok]] (with a stick handle) on its head. This likely serves as the basis for its ''[[TCG]]'' name, which is a portmanteau of the words "tuning" and "[[wikipedia:Cookware and bakeware|cookingware]]" (or "[[wikipedia:Kitchenware|kitchenware]]").
  * In the English dubbed version of the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster is called by its Japanese name, "Tuning Supporter".
