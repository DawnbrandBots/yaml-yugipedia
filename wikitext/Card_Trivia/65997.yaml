title: Card Trivia:Stim-Pack
wikitext: |-
  {{Navigation}}

  * The card's image, effect and Japanese name 「ドーピング」 (Doping) refer to [[Wikipedia:Doping (sport)|doping]], where performance-enhancing drugs increase performance (the 700 [[ATK]] increase) but have negative effects afterwards (the continual loss of 200 ATK).
  ** The negative effects are shown in the artwork of "[[Side Effects?]]".
  * "[[Horn Imp]]" appears in this card's artwork.
  * According to [[Master Guide 4 card storylines#Mysterious Medicines|Master Guide 4]], this potion was brewed by "[[Downerd Magician]]".<ref>http://www.ygorganization.com/monsterstories/</ref>

