title: Card Trivia:Azamina (card)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Curse of Diabell]]".
  * "[[Guilt-Gripping Morganite]]", "[[Succumbing-Song Morganite]]", and "[[Time-Tearing Morganite]]" appear in this card's artwork.
  * This monster is the [[card evolutions|upgraded]] form of "[[Saint Azamina]]", which in turn is the upgraded form of "[[Queen Azamina]]", both of which can be used to [[Special Summon]] this monster.
  ** "Queen Azamina" and "Saint Azamina" are forms taken by this monster while possessing the body of "[[Diabell, Queen of the White Forest]]", whereas this monster is its true form.
  * This monster has the highest [[Level]] (12) and [[original ATK and DEF|original]] [[ATK]] (4000) of all [[Illusion]] monsters.
  ** This monster is tied with "Saint Azamina" for the highest original [[DEF]] (4000) of all Illusion monsters.
