title: Card Trivia:Gaia Dragon, the Thunder Charger
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[D.D.D. - Different Dimension Derby]]", "[[Tri-and-Guess]]", and "[[Xyz Xtreme !!]]".
  * This monster is an [[Xyz Monster|Xyz]] [[counterpart]] of "[[Gaia the Dragon Champion]]".
  ** This monster's [[Rank]] (7) is equal to the [[Level]] (7) of "Gaia the Dragon Champion", which is referenced in its requirement of of two [[Level 7]] monsters. 
  ** This monster shares the same [[Attribute]] ([[WIND]]), [[Type]] ([[Warrior]]), and [[original ATK and DEF]] (2600/2100) as "Gaia the Dragon Champion".
  ** Both are depicted riding their steeds in mirrored poses in their respective card artworks.
  ** This monster's [[piercing]] effect is based on "[[Spiral Spear Strike]]", which supports "Gaia the Dragon Champion".
  * This monster has three other [[Extra Deck]] counterparts:
  ** [[Fusion Monster|Fusion]]: "[[Gaia Drake, the Universal Force]]"
  ** [[Link Monster|Link]]: "[[Gaia Saber, the Lightning Shadow]]"
  ** [[Synchro Monster|Synchro]]: "[[Gaia Knight, the Force of Earth]]"
  *** Visually, this monster's design is a combination of "Gaia Knight, the Force of Earth" and "Gaia Drake, the Universal Force".
  * This is the first Xyz Monster with an effect that does not require [[detach]]ing its own [[Xyz Material]]s.
