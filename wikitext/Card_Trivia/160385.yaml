title: Card Trivia:Legendary Six Samurai - Mizuho
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Asceticism of the Six Samurai]]" and "[[Six Strike - Double Assault]]".
  ** In the artwork of "Asceticism", this monster is shown to bear the symbol of "[[Shien]]" on her forehead.
  * This monster is the younger version of "[[Hand of the Six Samurai]]", according to the [[Master Guide 3 card storylines#Legendary Six Samurai - Mizuho|Master Guide 3 card storylines]].
  ** This is also supported by the fact the armor this monster wears appears in the background of the artwork of "Hand of the Six Samurai".
  ** Both monsters also share the same ATK, DEF, Type and Attribute, as well as '''very''' similar effects.
  ** It is likely that this monster was based on [[wikipedia:Hōjō Masako|Hōjō Masako]], since her biography is very similar to the biography of this monster as told in the ''Master Guide 3'' card storylines.
  * This monster is the wife of "[[Legendary Six Samurai - Shinai]]", as supported by the ''Master Guide 3'' card storylines.
  ** This is also supported by the fact both cards' artworks feature one half of the symbol of the "[[Six Samurai]]" that complement each other.
  ** Their effects are designed to work in conjunction with each other.
  ** Each monster wears the same necklace, with the string of each corresponding to the color of their spouse's armor.
