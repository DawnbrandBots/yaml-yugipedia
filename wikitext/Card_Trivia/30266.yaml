title: Card Trivia:Dark Bribe
wikitext: |-
  {{Navigation}}

  * The man in this card's artwork also appears in the artwork of "[[Fraud Check]]", "[[Fraud Freeze]]", "[[Sneaky Sleeve]]", "[[Super All In!]]", and "[[Super Koi Koi]]".
  * This card's name and artwork is a reference to its effect, as it allows the player to "bribe" the opponent by having them draw 1 card in order to negate their [[Spell]]/[[Trap Card]] and destroy it.
  * The badge worn by the man features the character 悪, which translates to "evil".
  * This card has a monster effect-negating equivalent: "[[Recall]]"
