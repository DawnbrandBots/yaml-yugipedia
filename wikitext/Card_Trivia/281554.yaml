title: Card Trivia:Sylvan Mikorange
wikitext: |-
  {{Navigation}}

  * "[[Sylvan Hermitree]]" appears in this card's artwork.
  * This card's name, "Mikorange", is a portmanteau of ''[[wikipedia:Miko|Miko]]'' and "Orange".
  ** This card's Japanese name is a blend of 蜜柑 (mikan orange) and 御神子 (diviner miko).
