title: Card Trivia:Hammer Bounzer
wikitext: |-
  {{Navigation}}

  * This card resembles an anthropomorphic hyena.
  * This card's [[attack name]] ('''Destroy Knuckle''') is the same as the attack name of "[[Junk Destroyer]]" in the Japanese Version of ''[[Yu-Gi-Oh! 5D's]]''.
  * Despite being a [[Warrior]], this card strongly resembles a [[Beast-Warrior]]-[[Type]] monster.
