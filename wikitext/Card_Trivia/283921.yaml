title: Card Trivia:Duel Checker
wikitext: |-
  {{Navigation}}

  * "[[Ghostrick Stein]]" and "[[Ghostrick Yuki-onna]]" appear in the artwork of this card's ''[[Advanced Tournament Pack 2013 Vol.4]]'' print.
  ** "[[Ghostrick Break]]" also uses this artwork, but its artwork is further zoomed out to show a larger scene, in addition to replacing the face on the back of "Ghostrick Stein" with multiple hearts.
  * [[Yuya Sakaki]] and "[[Enlightenment Paladin]]" appear in the artwork of this card's ''[[Advanced Tournament Pack 2016 Vol.1]]'' print.
