title: Card Trivia:Freezing Chains of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * "[[Trishula, Dragon of the Ice Barrier]]" appears in this card's artwork.
  * This card's artwork shows "Trishula" imprisoned in a pillar of ice, in reference to the [[Master Guide 3 card storylines|Duel Terminal storyline]]. Two other pillars are shown near it, which appear to be empty; "[[Brionac, Dragon of the Ice Barrier]]" and "[[Gungnir, Dragon of the Ice Barrier]]" were most likely contained within them, as the Duel Terminal story states that they were released before Trishula in order to combat the "[[Worm]]s" and "[[Fabled]]".
