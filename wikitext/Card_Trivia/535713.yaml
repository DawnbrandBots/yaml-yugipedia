title: Card Trivia:The Agent of Force - Mars
wikitext: |-
  {{Navigation}}

  * This monster is based on the planet [[wikipedia:Mars|Mars]], which appears in this card's artwork.
  ** This monster may also be based on [[wikipedia:Mars (mythology)|Mars]], the Roman god of war, which serves as the namesake of the planet.
  * This monster's pose (including its wings and outstretched arm) in this card's artwork is the exact same as that of "[[The Agent of Wisdom - Mercury]]", except mirrored.
  * Similarly to "[[The Agent of Judgment - Saturn]]", this monster's effect becomes more powerful based on how much additional [[Life Point]]s the player has over their opponent.
