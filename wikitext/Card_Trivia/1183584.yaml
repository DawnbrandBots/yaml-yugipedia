title: Card Trivia:Brassdes of the Diabolic Duds
wikitext: |-
  {{Navigation}}

  * This monster is "[[Weaksauce Brassdes]]" wearing clothes made out of "[[Prey Archfiend]]".
  * This monster's concept art [https://x.com/YuGiOh_RUSHDUEL/status/2038994735826616517 was published on April 1st] (Japanese time), [https://x.com/YuGiOh_RUSHDUEL/status/2039644012689383552 the day before the card itself was revealed].
  ** Fittingly, for [[wikipedia:April Fools' Day|April Fools' Day]], this monster's title, "Akutsuki", sounds similar to "''usotsuki''", the Japanese word for "liar". This was likely meant to sound similar to "''waruzuki''" (lit. "evil-attached"), in reference to how the concept art indicates that this monster's coat is a "deceived demon".
