title: Card Trivia:Enraged Battle Ox
wikitext: |-
  {{Navigation}}

  [[File:Battle Ox ka summoned - manga.png|thumb|250px|The [[Battle Ox (manga character)|Battle Ox ''ka'']] being summoned.]]

  * This monster appears in the artworks of "[[Rage of the Beasts]]" and "[[Thousand Punisher]]".
  * This monster is a [[retrained]] counterpart of "[[Battle Ox]]".
  ** Either this monster or "Battle Ox" appear in the artworks of "[[Excess Lesser Linker]]", "[[New Recruit]]", "[[Pixie Ring]]", "[[Rage of the Beasts]]", and "[[Triggered Summon]]".
  *** While the anime artwork of "Triggered Summon" features the depiction of "Battle Ox" from the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime (with its purple breastplate), both artworks depict a second ambiguous monster: either "[[Celtic Guardian]]" or "[[Obnoxious Celtic Guard]]". These two sets of monsters were the first "retrained" monsters, and the original monsters were each used in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and anime by rival characters [[Seto Kaiba (manga)|Seto Kaiba]] and [[Yugi Mutou (manga)|Yugi Mutou]], respectively.
  * This monster's pose is taken from a panel from {{chapter|Yu-Gi-Oh!|288|ref}} where the [[Battle Ox (manga character)|Battle Ox]] ''[[ka]]'' is Summoned.

