title: Card Trivia:Wightbaking
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on "Wight King" (the Japanese name of "[[King of the Skull Servants]]", whose pose this monster mirrors) and "Baking".
  * This monster appears to be making ''yakiimo'', or baked sweet potato, which is a popular winter snack in Japan. They are traditionally made by making a fire with a pile of fallen leaves and slowly baking sweet potatoes in them.
