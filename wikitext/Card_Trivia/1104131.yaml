title: Card Trivia:Change Slime - Skull Dragon Mode
wikitext: |-
  {{Navigation}}

  * The wing of "[[Red-Eyes Black Dragon (Rush Duel)|Red-Eyes Black Dragon]]" and the claw of "[[Summoned Skull (Rush Duel)|Summoned Skull]]" appear in this card's artwork.
  * This monster is a [[Red-Eyes (Rush Duel)|Red-Eyes]] and [[Summoned Skull (series)|Summoned Skull]] ''[[Rush Duel]]'' [[counterpart]] of "[[Change Slime]]".
  ** This monster's effect to [[Fusion Summon]] by using "Red-Eyes Black Dragon" and "Summoned Skull" as [[Fusion Material]]s references how "[[Change Slime (DM1)|Change Slime]]" can be used as a "[[Communication Fusion|catalyst monster]]" in order to create "[[B. Skull Dragon (DM1)|Black Skull Dragon]]" in the ''[[Yu-Gi-Oh! Duel Monsters (video game)|Yu-Gi-Oh! Duel Monsters]]'' video game.
