title: Card Trivia:Gladiator Beast Essedarii
wikitext: |-
  {{Navigation}}

  * This is the first [[Fusion Monster]], as well as the first "[[Gladiator Beast]]" Fusion Monster, ever to be released as a [[TCG exclusive]].
  * This is the first "Gladiator Beast" Fusion Monster that doesn't list a specific "Gladiator Beast" monster as a [[Fusion Material]].
  ** It is also the only "Gladiator Beast" Fusion Monster with no effect.
  * This monster is based on the [[wikipedia:Essedarius|Essedarius]], a type of [[wikipedia:gladiator|gladiator]] which fought upon [[wikipedia:chariot|chariots]] in the [[wikipedia:arena|arena]].
  ** This is supported by the slightly different version of "[[Gladiator Beast War Chariot]]" that appears in this card's artwork.
  * This monster resembles a humanoid [[wikipedia:Gorilla|gorilla]] in a chariot.
