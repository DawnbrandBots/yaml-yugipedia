title: Card Trivia:Naturia Pineapple
wikitext: |-
  {{Navigation}}

  * This is one of the few non-[[Synchro]] "[[Naturia]]" monsters whose effect doesn't involve the player's opponent. The other ones are "[[Naturia Cliff]]", "[[Naturia Dragonfly]]", "[[Naturia Hydrangea]]", "[[Naturia Ladybug]]", "[[Naturia Rock]]" and "[[Naturia Stinkbug]]".
  * "[[Naturia Rock]]" can be seen in this card's artwork, far away from "Pineapple".
  * This is the only [[TCG Exclusive]] "[[Naturia]]" card.
  * This card is the [[Naturia]] version of "[[Treeborn Frog]]".
