title: Card Trivia:Chronomaly Tuspa Rocket
wikitext: |-
  {{Navigation}}

  * This monster is based on the "[https://www.bibliotecapleyades.net/sitchin/esp_sitchin_28.htm Istanbul rocket]", the alleged 3,000 year-old carving of a space module discovered in the ruined Turkish city of [[wikipedia:Tushpa|Tushpa]]; however, the Istanbul rocket is believed to be a hoax.
  * This card was first revealed on the ''[[OCG]]'' [https://twitter.com/YuGiOh_OCG_INFO/status/1178550793626116097 Twitter] page on 30 September 2019, at 3:03 pm JST. This is likely a reference to [[Trey]], who is named after the number "3" and used a "[[Chronomaly]]" Deck in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
