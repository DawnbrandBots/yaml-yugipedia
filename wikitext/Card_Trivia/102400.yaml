title: Card Trivia:Koa'ki Meiru War Arms
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Battle Pack 3: Monster League]]''.
  * This is the first ''[[TCG]]''-exclusive "[[Koa'ki Meiru]]" [[Monster Card|monster]] to be released.
  * It is rather ironic that this monster is a [[Warrior]]-[[Type]], and "[[Koa'ki Meiru Crusader]]" is a [[Beast-Warrior]]-Type, when "War Arms" looks more like a Beast-Warrior, and "Crusader" looks like a Zombie.
  * This monster's name and [[Card effect|effect]] are a [[wikipedia:word play|play on the fact]] that it is a [[wikipedia:bear|bear]] that can [[equip]] itself; it has the ability to "[[wikipedia:Right to keep and bear arms|bear arms]]".
