title: Card Trivia:Raging Flame Sprite
wikitext: |-
  {{Navigation}}

  * "[[Book of Taiyou]]" appears in this card's artwork, depicted being burned by this monster.
  * This monster is based on the Japanese belief that there is a [[wikipedia:Sprite (folklore)|sprite]] for various objects, including fire.
  ** This monster's effect to gain 1000 [[ATK]] after inflicting battle damage to the opponent with a direct attack is likely a reference to the concept of flames growing more dangerous over time.
  * This card, along with "[[Whirlwind Prodigy]]", is likely designed by [[Akina Fujiwara]], who also did the designs for the "[[Charmer]]" monsters.
