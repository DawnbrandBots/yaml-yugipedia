title: Card Trivia:Legendary Wind-Up Key
wikitext: |-
  {{Navigation}}

  * This card is based on a wind-up key, which is used to re-wind devices powered by a [[wikipedia:Clockwork|clockwork]] motor.
  ** This card's effect is based on the real-life functions of wind-up keys, "re-winding" the "[[Wind-Up]]" monsters by flipping them [[face-down]] and enabling them to activate their effects.
