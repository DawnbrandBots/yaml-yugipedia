title: Card Trivia:White Magician Pikeru
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[A Rival Appears!]]", "[[Guts Guard]]", "[[Mutually Affured Destruction]]", "[[Pikeru's Circle of Enchantment]]", "[[Pikeru's Second Sight]]", "[[Revenge Attack]]", "[[Synchro Spirits]]", and "[[Trial of the Princesses]]".
  ** "[[Live☆Twin Ki-sikil]]" cosplays as this monster in the artwork of "[[Live☆Twin Channel]]".
  * This monster wears a hat based on a yellow "[[Sheep Token]]".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Princess Pikeru]]".
  * This card has a [[DARK]] rival [[counterpart]]: "[[Ebon Magician Curran]]".
  ** Both are [[Level]] 2 [[Spellcaster]] monsters with 1200 [[ATK]] and 0 [[DEF]], and have [[LP]]-related effects that activate during the [[Standby Phase]].
  ** According to the [[Master Guide 2 card storylines#File No. 11: Two Adorable Princesses|Master Guide 2 card storylines]], "Ebon Magician Curran" is this monster's twin sister.
  * Despite being a female monster, this card's Spanish name is male-gendered ("Mago Blanco" instead of "Maga Blanca").
