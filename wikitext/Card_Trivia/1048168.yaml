title: Card Trivia:Fiendsmith's Sequence
wikitext: |-
  {{Navigation}}

  * Two "[[Fiendsmith Token]]s" appear in this card's artwork.
  * The demonic creature appearing out of this monster resembles "[[Despair from the Dark]]".
  * This monster is named after the ''[[wikipedia:Sequence (musical form)|sequentia]]'', the Latin term for a sequence, a liturgical chant or hymn which often accompanies [[wikipedia:Music for the Requiem Mass|the music]] for the [[wikipedia:Requiem|Requiem]].
