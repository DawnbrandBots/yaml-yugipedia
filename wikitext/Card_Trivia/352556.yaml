title: Card Trivia:Lightsworn Judgment
wikitext: |-
  {{Navigation}}

  * "[[Judgment Dragon]]" and "[[Minerva, the Exalted Lightsworn]]" appear in this card's artwork.
  ** The event depicted in this card's artwork seems to take place above the house in the "[[Realm of Light]]", shows that "Minerva" is either calling the dragon (reflected by the effect of [[Minerva, Lightsworn Maiden|her younger counterpart]]), or probably taming the dragon, instead.
