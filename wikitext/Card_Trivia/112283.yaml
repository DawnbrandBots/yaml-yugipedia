title: Card Trivia:Zero
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's artwork depicts the first creation of the universe.
  * This card's name is based on how [[Yusuke Fujiwara]] (while possessed by [[Nightshroud]]) described the [[World of Darkness]] as "zero" in {{episode|GX|175|ref}}.
  ** In the same episode, Fujiwara also described the World of Darkness as an "infinite" world. In later episodes, this description is referenced and reinforced by this card and "[[Infinity (card)|Infinity]]", both of which share a relationship with "[[Darkness]]" and the "[[Darkness (archetype)|Darkness]]" [[Continuous Trap Card]]s.
