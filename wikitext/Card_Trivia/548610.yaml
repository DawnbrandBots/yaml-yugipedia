title: Card Trivia:Monster Reborn Reborn
wikitext: |-
  {{Navigation}}

  * The ankh from the original ''[[OCG]]'' artwork of "[[Monster Reborn]]" and a large number of the amulets depicted in the original ''[[TCG]]'' artwork of "Monster Reborn" appear in this card's artwork.
  * This card's ''TCG'' name is likely a reference to "Monster Reborn" with its original ''OCG'' artwork being released in ''[[The Lost Art Promotion]]'', as well as its shift from [[Forbidden]] to [[Limited]] on the [[February 2018 Lists]].
