  * This monster's name is based on a "montage", which is derived from the French word meaning "putting together", and is often used to refer to the effect of [[wikipedia:Film editing|film editing]] where many different images are put together into a sequence.
  ** Fittingly, the background of this card's anime artwork features many different images of Monster Cards in the background; this monster can be [[Special Summon]]ed by [[send]]ing three other monsters from the [[hand]] to the [[Graveyard]], and its [[ATK]] becomes 300 multiplied by the combined [[Level]]s of the sent monsters.
  ** Also, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster is first Special Summoned, the three parts of this monster are silhouetted by different colored lights until they are "put together" into a large silhouette and revealed as a single monster.
  * This is the [[signature card]] of [[Tetsu Ushio (manga)|Tetsu Ushio]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * Without Level-manipulating effects, the maximum ATK amount that this monster can reach via its own effect is 10,800, by using three [[Level 12]]  monsters.
