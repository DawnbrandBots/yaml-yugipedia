title: Card Trivia:7 Completed
wikitext: |-
  {{Navigation}}

  * The two [[7 Completed (ATK version)|ATK versions]] and one [[7 Completed (DEF version)|DEF version]] of this card appear in this card's artwork.
  ** This card's artwork references a scene from the Duel between [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] and [[Keith Howard (manga)|Bandit Keith Howard]] in {{chapter|Yu-Gi-Oh!|123|ref}} where Keith [[equip]]ped the aforementioned cards to his "[[Slot Machine (manga)|Slot Machine]]".
  ** In the international dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, the aforementioned [[ATK]] and [[DEF]] versions of this card utilize their [[7 Completed (manga)|manga appearance]], which features a white border and the same Japanese text; however, they still retained their colored artwork.
  * This is the only [[Equip Spell]] that allows the player to choose whether to give the equipped monster more ATK or [[DEF]].
  * In the North American English ''TCG'' release of ''[[Pharaoh's Servant]]'', even as the official term for "Magic Card" was officially changed and [[Card Errata:7 Completed|errata'd]] into "[[Spell Card]]", the cards' texts in this card's artwork still contained the term "Magic Card". A reprinted version of this card with a different artwork debuted in the ''TCG'' release of ''[[Duel Terminal 2]]'', with [[Card Artworks:7 Completed|a different artwork]] that completely removes the cards' texts.
