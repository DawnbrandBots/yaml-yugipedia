title: Card Trivia:Painful Choice
wikitext: |-
  {{Navigation}}

  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Painful Choice]]".
  * This card shares similarities with "[[Arduous Decision]]":
  ** Both cards are [[Normal Spell Card]]s.
  ** Both cards share part of their Japanese names ("''Kujū no Sentaku''" for this card, and "''Kujū no Ketsudan''" for "Arduous Decision".)
  ** Both cards' artworks depict people standing with at least one person shown to be in distress.
  ** Both cards feature effects allowing the opponent to choose one card the player takes from the [[Deck]].
  ** Also, both cards debuted during [[Yu-Gi-Oh! - Episode 105|the same episode]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * The ''[[Dark Beginning 1]]'' versions of this card were misprinted with "DB1-ENO33" in the set number area instead of "[[DB1-EN033]]", replacing the 0 (zero) with a capital O.
  * With the removal of "[[Yata-Garasu]]" from the [[Forbidden]] status in 2022, this card and "[[The Forceful Sentry]]" currently hold the record of the longest continuously Forbidden card in the game, having surpassed the previous record of 18 years and 2 months of "Yata-Garasu" on May 2023.
