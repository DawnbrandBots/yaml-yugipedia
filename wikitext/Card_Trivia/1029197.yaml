title: Card Trivia:Sky Striker Ace - Azalea Temperance
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2024]]''.
  * This monster is an [[Card evolutions|upgraded]] of "[[Sky Striker Ace - Azalea]]".
  ** This monster is based on the armor [[Azalea]] fashioned from the remains of [[Zard]] and [[Solferina]], and used to fight [[Raye (manga)|Raye]] and [[Roze (manga)|Roze]] in {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|15|ref}}.
  *** This card's artwork is taken from the aforementioned chapter, specifically from the panel showing Azalea engaging in the armor.
  *** This monster's effect to [[equip]] an opponent's monster to itself references how Azalea attaches [[Ciela]]'s mutilated body to the shield and discourages Raye and Roze from attacking.
