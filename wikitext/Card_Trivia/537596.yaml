title: Card Trivia:Demotion
wikitext: |-
  {{Navigation}}

  * "[[Dark Ruler Ha Des]]" and "[[Dark King of the Abyss]]" appear in this card's artwork.
  ** '''"Demotion"''' > "[[Abyssal Designator]]" > "[[Herald of the Abyss]]" > "[[Hate Buster]]" > "[[Mind Drain]]" (presumably "[[Skill Drain]]" and "[[Soul Drain]]" as well)  > "[[Skill Prisoner]]" > "[[Destruct Potion]]" > "[[Fake Life]]" > "[[Call of the Archfiend]]" > "[[Reject Reborn]]" > "[[Powerful Rebirth]]" > "[[Dark Ruler No More]]"
  * This is the only card in the ''[[OCG]]''/''[[TCG]]'' that includes the word "downgrade" in its most recent text; other cards that included "downgrade" in their original text have since been reprinted with [[Problem-Solving Card Text]].
