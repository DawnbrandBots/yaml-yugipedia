title: Card Trivia:Angel of Blue Tears
wikitext: |-
  {{Navigation}}

  [[File:Blue_Angel_book.png|thumb|right|250|The book ''[[Blue Angel (book)|Blue Angel]]''.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * The book ''[[Blue Angel (book)|Blue Angel]]'' appears in this card's artwork.
  ** This card's name references the story of Blue Angel, who lived a sad lonely life due to her cold-hearted personality.
  ** This card's artwork references a scene of {{episode|VRAINS|033|ref}}, where [[Spectre]] narrated the story of Blue Angel, during his [[Duel]] against [[Skye Zaizen]].
  ** In the ''[[Yu-Gi-Oh! VRAINS]]'' anime, [[Akira Zaizen]] frequently read the book to Skye Zaizen during her childhood, and Blue Angel later became the inspiration for Skye's [[LINK VRAINS]] avatar, [[Blue Angel]].
  * This card has a [[Trap Card]] counterpart: "[[Maiden of Blue Tears]]".
