title: Card Trivia:Tearlaments Sulliek
wikitext: |-
  {{Navigation}}

  * "[[Tearlaments Havnis]]", "[[Tearlaments Kitkallos]]", "[[Tearlaments Merrli]]", "[[Tearlaments Reinoheart]]", "[[Tearlaments Scheiren]]", and "[[Visas Starfrost]]" appear in this card's artwork.
  ** A "[[Scareclaw]]"-based weapon (possibly a transformed version of "[[Scareclaw Light-Heart]]") also appears in this card's artwork, being held by "Visas Starfrost".
  * This card's name "Sulliek" is a portmanteau of the words "Sully" and "Shriek".
