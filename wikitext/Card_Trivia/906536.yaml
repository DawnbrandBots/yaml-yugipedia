title: Card Trivia:On Your Mark, Get Set, DUEL!
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]''.
  * [[Tetsu Trudge]] and [[Yusei Fudo]], both in their respective [[Duel Runner]]s, appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|5D's|001|ref}}, where Yusei and Trudge prepare for their [[Turbo Duel]] as the [[Field Spell Card]] "[[Speed World (anime)|Speed World]]" is [[activate|activating]].
  * This card's Japanese name, "Riding Duel! Acceleration!" (ライディング・デュエル！アクセラレーション！ ''Raidingu Dyueru! Akuserarēshon!''), is the line often said by the [[MC]] at the start of a Turbo Duel in the Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime. 
  ** This card's Japanese name is also based on the Japanese title of the first episode of the anime, while its ''[[TCG]]'' name is based on the English title of the same episode.
  * This card's [[hand]]-manipulation effect to place a [[Signal Counter]] on it during the [[Standby Phase]] is a reference to the effect of "[[Speed World]]", which allows each player to gain a [[Speed Counter]] during each player's Standby Phase.
  ** This card's additional effect and the cost of two Signal Counters are based on the effect of "[[Speed Spell - Angel Baton (anime)|Speed Spell - Angel Baton]]", which allows the player to remove two Speed Counters, [[draw]] two cards, and then [[send]] one card from their [[hand]] to the [[Graveyard]].

