title: Card Trivia:Geargiano Mk-III
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Geargia Rampage Structure Deck]]''/''[[Duelist Set: Version Machine-Gear Troopers]]'' (Japanese version).
  * This card appears to be an upgraded version of "[[Geargiano]]" and "[[Geargiano Mk-II]]".
  ** Its pose is forward instead of sideways.
  *** Also its ATK is the same as that of "Geargiano Mk-II" and its DEF is the same as that of "Geargiano".
  * This monster appears in the artworks of "[[Geargiattacker]]", "[[Geargiagear Gigant XG]]", "[[Geargiauger]]" and "[[Transmission Gear]]".
  * Each of the "[[Geargiano (archetype)|Geargiano]]" monsters makes one of the [[rock-paper-scissors]] shapes with a fist; this one makes a paper shape.
