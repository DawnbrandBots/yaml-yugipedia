title: Card Trivia:Cyberdark End Dragon
wikitext: |-
  {{Navigation}}

  [[File:CyberdarkDragon-JP-Anime-GX-NC-3.png|thumb|right|300|"[[Cyberdark Dragon (anime)|Cyberdark Dragon]]" [[equip]]ped with "[[Cyber End Dragon (anime)|Cyber End Dragon]]" as seen in the ''[[Yu-Gi-Oh! GX]]'' anime.]]

  * This is the [[cover card]] of ''[[Structure Deck: Cyber Style's Successor]]''/''[[Structure Deck: Cyber Strike]]'' and ''[[Structure Deck: Cyber Style's Successor Secret Technique Inheritance Pack]]''.
  * This monster's [[Fusion Summon]] is depicted in the artwork of "[[Cybernetic Horizon (card)|Cybernetic Horizon]]".
  * This monster is a [[Fusion Monster|Fusion]] of "[[Cyberdark Dragon]]" and "[[Cyber End Dragon]]".
  ** This monster's [[ATK]]/[[DEF]] (5000/3800) are equal to the combined [[original ATK and DEF]] of "Cyberdark Dragon" (1000/1000) and "Cyber End Dragon" (4000/2800).
  ** This monster's appearance is based on a scene in {{episode|GX|095|ref}}, where [[Zane Truesdale]] [[equip]]ped "[[Cyber End Dragon (anime)|Cyber End Dragon]]" in his [[Graveyard]] to "[[Cyberdark Dragon (anime)|Cyberdark Dragon]]", after using the effect of "[[Rebirth Judgment (anime)|Rebirth Judgment]]" to change the former's [[Type]] to [[Dragon]].
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.

