title: Card Trivia:Dark Archetype
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from an [[archetype]], a prototypical example or the original model of a universally recognizable idea.
  ** An example of an archetype includes a certain trait associated with a certain type of character depicted in literature and art. This reflects this monster's effect to [[Special Summon]] another monster from the [[Deck]] who shares an [[original ATK]] "trait" with the taken [[battle damage]]. This is also reflected in this monster's anime effect, where the Special Summoned monster shares the same [[Level]] "trait" as the combined Level(s) of the monster(s) [[send|sent]] from the [[hand]] to the [[Graveyard]].
