title: Card Trivia:Odd-Eyes Pendulum Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Duelist Alliance]]'', ''[[Structure Deck: Master of Pendulum]]'', ''[[Star Pack ARC-V Beginner's Kit]]'', and ''[[Dimension Box Limited Edition]]'', as well as one of the cover cards of ''[[Star Pack ARC-V]]'', ''[[2015 Mega-Tins]]'', ''[[Duel Power]]'', ''[[Prismatic Art Collection]]'', and ''[[25th Anniversary Tin: Dueling Heroes]]''.
  ** This is the first cover card in the ''[[TCG]]'' since ''[[Light of Destruction]]'' to be printed as a [[Secret Rare]].
  ** This is the first cover card since "[[Galaxy-Eyes Photon Dragon]]" to not be an [[Extra Deck]] monster, though it can be placed in the Extra Deck as it is a [[Pendulum Monster]].
  * This monster appears in the artworks of "[[Odd-Eyes Accel]]", "[[Odd-Eyes Fusion]]", "[[Odd-Eyes Fusiongate]]", "[[Odd-Eyes Synchrogate]]", "[[Odd-Eyes Xyzgate]]", "[[Pendulum Encore]]", "[[Soul Pendulum]]", "[[Spiral Flame Strike]]", and "[[Supreme Rage]]".
  ** An outline of this monster's head also appears in the artwork of "[[Performapal Dramatic Theater]]".
  * This card appears in the artwork of "[[Pendulum Begins]]".
  * This is the [[signature card]] of [[Yuya Sakaki]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** In {{episode|ARC-V|001|ref}}, "[[Odd-Eyes Dragon (anime)|Odd-Eyes Dragon]]" transformed into this card, after it reacted with [[Yuya's pendant]].
  ** This card represents [[Z-ARC]]'s entertaining spirit, which is reflected by Yuya's ideals.
  *** According to [[Zuzu Boyle]], this card also represents the courage Yuya inherited from his father, [[Yusho Sakaki]].
  ** This monster's eye colors are based on Yuya's hair colors.
  ** This card has the same [[ATK]] (2500) as the signature cards of the other anime main protagonists (with the exception of [[Yuga Ohdo]]'s "[[Sevens Road Magician (anime)|Sevens Road Magician]]"): [[Yugi Muto]]'s "[[Dark Magician (anime)|Dark Magician]]", [[Jaden Yuki]]'s "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]", [[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]", [[Yuma Tsukumo]]'s "[[Number 39: Utopia (anime)|Number 39: Utopia]]", [[Yusaku Fujiki]]'s "[[Firewall Dragon (anime)|Firewall Dragon]]", and [[Yudias Velgear]]'s "[[Galactica Oblivion (anime)|Galactica Oblivion]]".
  ** This is also the first [[-Eyes Dragon]] signature card of a main protagonist in the anime.
  * This monster is the [[Standard Dimension|Standard/Pendulum]] [[counterpart]] of "[[Dark Rebellion Xyz Dragon]]", "[[Clear Wing Synchro Dragon]]", and "[[Starving Venom Fusion Dragon]]".
  * This monster has a [[Yu-Gi-Oh! ARC-V (manga)|manga]] counterpart: "[[Odd-Eyes Phantom Dragon]]".
  ** Both have [[Pendulum Effect]]s that [[activate]] when a monster battles: this monster  can reduce the [[battle damage]] the player takes from an [[attack]] involving a Pendulum Monster they [[control]] to 0, while "Odd-Eyes Phantom Dragon" can make a monster the player controls gain 1200 ATK until the end of the turn, when an [[attack]] is declared involving a player's [[face-up]] monster and an opponent's monster, and if they have an "[[Odd-Eyes]]" card in the other [[Pendulum Zone]]
  *** Both also have a [[monster effect]] to inflict damage to the opponent when they battle: this monster can double any [[battle damage]] it inflicts to the opponent, while "Odd-Eyes Phantom Dragon" can inflict [[Effect damage|damage]] to the opponent equal to the number of "Odd-Eyes" cards in the player's [[Pendulum Zone]]s x 1200, when it inflicts battle damage to the opponent by [[attack]]ing.
  ** This monster has a red color scheme, while "Odd-Eyes Phantom Dragon" has a blue color scheme.
  *** This is also a reference to the opposite colors of [[Pendulum Scale]]s.
  * This monster has multiple forms:
  ** A downgraded [[Effect Monster|Effect]] form: "[[Odd-Eyes Dragon]]".
  ** A "[[Supreme King Dragon]]" form: "[[Supreme King Dragon Odd-Eyes]]".
  ** Three [[Fusion Monster|Fusion]] upgraded forms: "[[Beast-Eyes Pendulum Dragon]]", "[[Brave-Eyes Pendulum Dragon]]", and "[[Rune-Eyes Pendulum Dragon]]".
  ** An upgraded Effect form: "[[Odd-Eyes Lancer Dragon]]".
  ** An "Arc" upgraded form: "[[Odd-Eyes Arc Pendulum Dragon]]".
  ** Seven hybrid [[Card evolutions|evolutions]]:
  *** [[Ritual Pendulum Monster|Ritual Pendulum]]: "[[Odd-Eyes Pendulumgraph Dragon]]" ([[Ritual Summon]]ed with "[[Odd-Eyes Advent]]").
  *** [[Fusion Pendulum Monster|Fusion Pendulum]]: "[[Odd-Eyes Venom Dragon]]" (with "Starving Venom Fusion Dragon").
  *** [[Synchro Pendulum Monster|Synchro Pendulum]]: "[[Odd-Eyes Wing Dragon]]" (with "Clear Wing Synchro Dragon").
  *** [[Xyz Pendulum Monster|Xyz Pendulum]]: "[[Odd-Eyes Raging Dragon]]", "[[Odd-Eyes Rebellion Dragon]]", "[[Odd-Eyes Rebellion Dragon Overlord]]" (with "Dark Rebellion Xyz Dragon") and "[[Odd-Eyes Rebellion Xyz Dragon]]" (with "[[Arc Rebellion Xyz Dragon]]").
  ** Two combined forms with the other [[Four Dimensional Dragons]]: "[[Odd-Eyes Revolution Dragon]]" and "[[Odd-Eyes Arcray Dragon]]".
  ** A retrained counterpart: "[[Odd-Eyes Pendulum Dragon of the Four Heavenly Dragons]]"
  * "[[Odd-Eyes Twin Tail Cat]]" is based on this monster.
  * This was one of the first monsters to be [[Pendulum Summon]]ed in the ''Yu-Gi-Oh! ARC-V'' anime, along with "[[Performapal Whip Snake (anime)|Performapal Whip Snake]]" and "[[Performapal Sword Fish (anime)|Performapal Sword Fish]]".
  * This monster has the following distinctions from the other Four Dimensional Dragons:
  ** It is the only one to have a downgraded form ("Odd-Eyes Dragon").
  ** It is the only one whose corresponding [[Four Dimensions|dimension]] in the anime was not initially named after its [[Summoning mechanic]], although it later became the Pendulum Dimension after Z-ARC was defeated.
  ** It is the only one without wings.
  ** It is the only one to be an [[Main Deck]] monster instead of an Extra Deck monster.
  ** It is the only one to not have an effect of gaining ATK, instead doubling the battle damage it inflicts to the opponent.
  * This card is currently the only [[Pendulum Monster]] [[mentions|mentioned]] as [[Fusion Material]] by name.
