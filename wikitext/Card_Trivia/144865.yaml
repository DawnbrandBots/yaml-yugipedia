title: Card Trivia:Wisel Carrier
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster resembles a pair of conjoined [[wikipedia:Leech|leeches]], keeping in relation with the "land animal" theme of the "[[Wisel]]" [[archetype]].
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this card's artwork is accidentally switched with the artwork of "[[Wisel Guard]]".
