title: Card Trivia:Kozmojo
wikitext: |-
  {{Navigation}}

  * "[[Kozmo Farmgirl]]" and the arm of "[[Kozmoll Dark Lady]]" appears in this card's artwork.
  * This card references the [[wikipedia:The Force|Force]], a metaphysical energy force featured in the ''[[wikipedia:Star Wars|Star Wars]]'' franchise.
  ** This card's artwork references the technique used by [[wikipedia:Darth Vader|Darth Vader]], where he can choke his subordinates using the Force without touching them.
