title: Card Trivia:Fighting Flame Sword
wikitext: |-
  {{Navigation}}

  [[File:Flame_Swordsman_cuts_Megasaurus.png|thumb|200px|"[[Flame Swordsman (manga)|Flame Swordsman]]" cuts "[[Megasaurus (manga)|Megazowler]]" in half.]]

  * This card appears in the artwork of "[[Dark Time Wizard]]".
  * "[[Flame Swordsman]]" and "[[Megazowler]]" appear in this card's artwork.
  ** This card's name references the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Flame Swordsman" in the English translated version of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga: "Fighting Spirit Flame Slash Sword".
  ** This card's artwork references a scene from {{chapter|Yu-Gi-Oh!|78|ref}} where [[Katsuya Jonouchi (manga)|Katsuya Jonouchi's]] "[[Flame Swordsman (manga)|Flame Swordsman]]" destroys [[Dinosaur Ryuzaki (manga)|Dinosaur Ryuzaki's]] "[[Megasaurus (manga)|Megazowler]]" by battle by cutting it in half.

