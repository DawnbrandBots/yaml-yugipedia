title: Card Trivia:Exterio's Fang
wikitext: |-
  {{Navigation}}

  * "[[Naturia Exterio]]'s" fang is shown in the artwork of this card.
  * This card is based on "Naturia Exterio's" effect to negate and destroy Spell and Trap Cards, while the discarding afterwards is similar to the cost to activate its effect.
  * Exterio was not out in the [[TCG]] at the time this card was released.
