title: Card Trivia:Patroid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Emergeroid Call]]" and "[[Roid Reinforcements]]".
  * This monster is based on a [[wikipedia:Police car|police car]], a vehicle used by the police for patrols and response to incidents, which reflects its effect to look at an opponent's [[face-down]] card once per turn, as if it was on patrol.
