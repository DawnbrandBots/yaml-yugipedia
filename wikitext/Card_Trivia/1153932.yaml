title: Card Trivia:First Penguin
wikitext: |-
  {{Navigation}}

  * This monster's name is a reference to "the first penguin", an idiom for someone who takes an unprecedented risk before anyone else, which reflects its effect to [[Special Summon]] itself from the player's [[hand]] if they [[control]] no [[face-up]] monsters, making it the "first" "[[Penguin]]" monster on the [[field]].
