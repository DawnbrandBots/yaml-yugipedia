title: Card Trivia:Tri-Brigade Roar
wikitext: |-
  {{Navigation}}

  * "[[Bystial Dis Pater]]" and "[[Tri-Brigade Arms Bucephalus II]]" appear in this card's artwork.
  ** "[[Despian Luluwalilith]]" also seems to be the figure surrounded by red lightning in the background of this card's artwork.
  ** This card's artwork depicts "[[Tri-Brigade Arms Bucephalus II]]" buying time for "[[Despian Luluwalilith]]" to charge her attack and eventually defeat "[[Bystial Dis Pater]]" as seen in the artwork of "[[Swordsoul Punishment]]."
