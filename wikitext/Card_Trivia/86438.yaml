title: Card Trivia:Meteor Black Dragon
wikitext: |-
  {{Navigation}}

  * This monster has an upgraded counterpart: "[[Meteor Black Comet Dragon]]".
  ** The name of "Meteor Black Comet Dragon" is based on this card's name, and it shares same [[Level]], [[Type]], [[ATK]] and [[DEF]] as this card. Both cards are also tied for the highest [[original ATK]] among "[[Red-Eyes]]"-based [[Fusion Monster]]s.
  ** "Meteor Black Comet Dragon" can also use "Red-Eyes Black Dragon" and "[[Meteor Dragon]]" as its Fusion Materials.
  ** This monster also has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Meteor Black Mars Dragon]]".
  * This card has [[List of cards with the longest OCG to TCG import times|the longest import time]] from its ''[[OCG]]'' debut to its ''[[TCG]]'' release among "[[Red-Eyes]]"-based cards at 12 years and 7 months.
  * This card is the only "Red-Eyes"-based Fusion Monster whose [[Attribute]] is not [[DARK]].
  * This card's DEF is exactly the same as its Fusion Materials.
  * This card is the third most powerful [[Non-Effect Monster]] in the game after "[[Blue-Eyes Ultimate Dragon]]" and "[[Master of Oz]]", both of which are also Fusion Monsters.
  * This card is the "Red-Eyes" equivalent to "Blue-Eyes Ultimate Dragon", in that both of these cards represent the ultimate form of their original monsters in terms of raw ATK power.
  * In ''[[Yu-Gi-Oh! Forbidden Memories]]'', [[Meteor B. Dragon (FMR)|this card]] has the highest ATK that the player can [[Fusion Summon]].
  ** It is also tied with "[[Perfectly Ultimate Great Moth (FMR)|Perfectly Ultimate Great Moth]]" for the highest ATK among [[Normal Summon]]-able monsters that can be legitimately obtained in-game (i.e., without spending 999,999 [[Star Chip (Forbidden Memories)|Star Chips]] in the [[Password]] menu or using a PocketStation).
