title: Card Trivia:Procession of the Tea Jar
wikitext: |-
  {{Navigation}}

  * This monster's base kanji (童妖, ''Douyou'') has the same reading with the word for "nursery rhyme" (童謡) with the kanji for "rhyme" (謡) changed into the kanji for "spooky" (妖)
  ** This monster's effect, changing monsters into [[face-down]] [[Defense Position]] and preventing face-down cards from being [[activate]]d, likely references the nursery rhyme "Chachatsubo" (ちゃちゃつぼ) in which the bottom of teapot is removed.
