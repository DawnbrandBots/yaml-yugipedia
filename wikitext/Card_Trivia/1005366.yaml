title: Card Trivia:Voidvelg Elpis
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is named after "[[wikipedia:Elpis (mythology)|Elpis]]", the spirit of hope from [[wikipedia:Greek mythology|Greek mythology]]. Curiously, in the poem "[[wikipedia:Works and Days|Works and Days]]", Elpis is the last item in [[wikipedia:Pandora's box|Pandora's box]], reflecting this card being used with "[[Voidalvelg Pandora]]".
