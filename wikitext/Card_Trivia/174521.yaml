title: Card Trivia:Gem-Elephant
wikitext: |-
  {{Navigation}}

  * This monster is almost similar to the "[[Crystal Beast]]s", though it is not considered to be in the same [[archetype]].
  ** Specifically, this monster could be considered a contrast to "[[Crystal Beast Amber Mammoth]]", which is a mammoth, whereas this card is an elephant.
  * This is the first "[[Gem-]]" monster to be released in the [[TCG]].
  * This card is the "Gem" [[counterpart]] of "[[Honest]]"; both monsters also have the same [[DEF]].
