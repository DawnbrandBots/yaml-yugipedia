title: Card Trivia:Shining Piecephilia
wikitext: |-
  {{Navigation}}

  * This monster is a crystallized version of "[[Shining Friendship]]".
  * "Piecephilia" is a combination of the words "piece" (which serves as a homophone for "peace", referencing the [[flavor text]] of "Shining Friendship") and "''philia''" (the Greek word for "friendship").
  ** The word "piece" also reflects this monster's design, as it is composed of multiple [[wikipedia:Burr puzzle|burr puzzle pieces]].
  * This monster's effect's maximum limit of 4 [[Piece Counter]]s is likely a reference the [[symbol of friendship]] drawn by [[Téa Gardner]] on the hands of her and her friends [[Joey Wheeler]], [[Tristan Taylor]], and [[Yugi Muto]] (totaling four people). Additionally, Téa used "[[Shining Friendship (anime)|Shining Friendship]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
