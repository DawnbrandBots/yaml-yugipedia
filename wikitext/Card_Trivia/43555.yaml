title: Card Trivia:Dark Necrofear
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the Japanese version of ''[[Labyrinth of Nightmare (Japanese)|Labyrinth of Nightmare]]''.
  * This monster appears in the artwork of "[[Sun God Unification]]".
  ** This monster's hand appears in the artwork of "[[Destiny Board]]".
  * This monster has a [[retrained]] counterpart with inverted [[ATK]]/[[DEF]]: "[[Curse Necrofear]]" 
  * This is the [[signature card]] of [[Yami Bakura]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * According to the ''Yu-Gi-Oh! Master Guide'', this monster is the queen of [[Fiend]] monsters.
  ** In the ''Yu-Gi-Oh!'' manga and the original Japanese anime, when  Yami Bakura is about to Summon this monster, he states it is the Queen of the World of the Dead.
  * In the ''[[Yu-Gi-Oh! Tag Force]]'' series, when the victory condition of "[[Destiny Board]]" is [[activate]]d, a special animation sequence depicts this monster rising from the darkness to spell out the message depicted in the artwork of "Destiny Board" and the "[[Spirit Message]]" cards before the sequence ends with a bright flash.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|204|ref}}, specifically from the panel showing [[Dark Necrofear (manga)|this monster]] being Summoned.
  <!-- To be re-added if another source ever emerges.

  * In this card's first appearance in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'' manga]], it had the name "'''Dark Necrophilia'''" (ダーク・ネクロフィリア).<ref>https://twitter.com/yugioh_xtweet/status/1107067188945391616"</ref> The name was changed to its current name starting from the next issue, as well as reprints of its debut issue.

