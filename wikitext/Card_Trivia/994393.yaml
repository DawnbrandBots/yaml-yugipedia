title: Card Trivia:Phantom Chimera Maybeast
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's Japanese name (キメラーレナイ, ''Kimerārenai'') is a pun on "[[wikipedia:Chimera (mythology)|chimera]]" and the Japanese word for "cannot decide" ({{Ruby|決|き}}められない, ''Kimerarenai'').
  ** Fittingly, this monster's design is based on a chimera, a three-headed creature in [[wikipedia:Greek mythology|Greek mythology]], where each heads' facial expression and pose are reminiscent to those of someone who cannot decide.
