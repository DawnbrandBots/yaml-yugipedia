title: Card Trivia:Train Connection
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Railway coupling|railway coupling]], a mechanism located at each end of a rail vehicle designed to connect it with other rail vehicles to form a train. 
  * This card's ''[[OCG]]''/''[[TCG]]'' [[activation condition]], requiring it to be [[equip]]ped to an [[EARTH]] [[Machine]] monster by [[banish]]ing two [[Level 10]] Machine monsters from the [[Graveyard]], is an alteration of its activation condition in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, which requires it to be equipped it to a Machine monster by banishing two [[Level 8]] or higher Machine monsters. In {{episode|ZEXAL|029|ref}}, this card was equipped to "[[Superdreadnought Rail Cannon Gustav Max (anime)|Superdreadnought Rail Cannon Gustav Max]]" (an EARTH Machine monster) by banishing the Level 10 Machine monsters, "[[Rocket Arrow Express (anime)|Rocket Arrow Express]]" and "[[Snow Plow Hustle Rustle (anime)|Snow Plow Hustle Rustle]]".
