title: Card Trivia:Ordoll the Adorable Star
wikitext: |-
  {{Navigation}}

  * "Ordoll" (オルドール ''Orudōru'') is a portmanteau of the Japanese words for "music box" (オルゴール, ''Orugōru'') and "doll" (ドル, ''Dōru'').
  ** This monster's kanji subtitle for "Adorable Audio Idol" (歌憐奏女, ''Karensōjo'') is a portmanteau of the Japanese words for "singer" (歌手, ''kashu''), "cute" (可憐, ''karen''), and "young girl" (奏女, ''sōjo'').
  *** The second kanji for "''karen''" (可''憐'') and the first kanji for "''sōjo''" (''奏''女) combined create the kanji of the Japanese word "''rensō''" (憐奏), which is a performance where two or more musicians play similar instruments, reflecting its effect to [[Special Summon]] a copy of itself from the [[Graveyard]].
  * This monster has an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form: "[[Duordoll the Adorable Star]]".
