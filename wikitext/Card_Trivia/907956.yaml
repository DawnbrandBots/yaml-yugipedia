title: Card Trivia:Shearkyrie the Celestial Seamstress
wikitext: |-
  {{Navigation}}

  * This monster is related to "[[Needlkyrie the Celestial Seamstress]]".
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Level]] (1), and [[Type]] ([[Fairy]]).
  ** Both are based on tools used in [[wikipedia:Sewing|sewing]]: this monster is based on [[Wikipedia:Scissors|shears]], while "Needlkyrie" is based on a [[Wikipedia:Sewing needle|sewing needle]].
  ** This monster's effect can [[Special Summon]] "Needlkyrie" from the [[Graveyard]].
