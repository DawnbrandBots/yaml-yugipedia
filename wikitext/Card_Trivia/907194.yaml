title: Card Trivia:Gunkan Suship Shari
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Sushi|sushi]] rice (しゃり ''Shari'').
  * This monster has 3 [[Xyz Monster|Xyz]] [[Card evolutions|combined]] forms.
  ** With "[[Gunkan Suship Shirauo]]": "[[Gunkan Suship Shirauo-class Carrier]]".
  ** With "[[Gunkan Suship Ikura]]": "[[Gunkan Suship Ikura-class Dreadnought]]".
  ** With "[[Gunkan Suship Uni]]": "[[Gunkan Suship Uni-class Super-Dreadnought]]".
  * This monster has a [[retrained]] [[counterpart]]: "[[Gunkan Suship Shari Red]]".
  ** Both monsters have mirrored poses in their card artworks.
  ** Both monsters have inverted [[original ATK and DEF]]: this monster has 2000 [[ATK]]/0 [[DEF]], while "Shari Red" has 0 ATK/2000 DEF.
  ** The effect of "Gunkan Suship Shari Red" treats its name as this card's while on the [[field]] or in the [[hand]], [[Deck]], or [[Graveyard]].
  * This monster has the longest [[card text]] of all cards in the English ''[[TCG]]'', with 710 characters.
  ** Additionally, it has the longest text of any [[Normal Monster]].
  ** This card's [[flavor text]] is written in the style of an in-depth food critic's appraisal, treating the shipyards as if they were a high class sushi restaurant.
  *** The flavor text mentions the number of "Shari" vessels is 2000, referencing this monster's ATK.
  *** The EDO-FRONT red vinegar that will be introduced in the near future references "Gunkan Suship Shari Red", which was later released in ''[[Power of the Elements]]''.
  **** The brand name "EDO-FRONT" references ''Edomae-sushi'' ("Edo waterfront sushi"), a style of sushi initially created in Edo (the old name of [[wikipedia:Tokyo|Tokyo]]) fast food businesses during the 19th century. [[wikipedia:Rice vinegar|Red vinegar]] was traditionally used for ''Edomae-sushi'', because rice vinegar was too expensive for fast food sushi.
  *** The flavor text mentions a four star rating, referencing this monster's [[Level]] (4).
