title: Card Trivia:Black Skull Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Metal Raiders]]'' and ''[[Revival of Black Demons Dragon]]'', and is also one of the cover cards of ''[[Duelist Legacy Volume.2]]''.
  ** This monster's appearance as the cover card for ''[[Revival of Black Demons Dragon]]'' is taken from {{chapter|Yu-Gi-Oh!|097|ref}}, specifically from the full-page panel displaying [[Black Skull Dragon (manga)|this monster]].
  * This is the first [[Level 9]] monster.
  * This monster has a [[retrain]]ed [[counterpart]]: "[[Archfiend Black Skull Dragon]]".
  ** It can be [[Fusion Summon]]ed by using "[[Red-Eyes Black Dragon]]" and "[[Summoned Skull]]" as [[Fusion Material]]s, and shares this monster's naming scheme, [[Attribute]] ([[DARK]]), [[Level]] (9), [[Type]] ([[Dragon]]), and [[original ATK and DEF]] (3200/2500).
  * This monster has a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Black Dragon Skull Archfiend]]".
  * The Japanese name of "[[Red Dragon Archfiend]]", "Red Daemon's Dragon", is similar to this monster's Japanese name, "Black Daemon's Dragon".
  ** Both are also "[[Archfiend]]" [[Dragon]] monsters that are [[Special Summon]]ed from the [[Extra Deck]]. 
  ** This card share the same Attribute (DARK), Level (9) Type (Dragon), and original [[ATK]] and [[DEF]] (3200/2500) with "[[Hot Red Dragon Archfiend Abyss]]".
  * The [[B. Skull Dragon (Bandai)|Bandai]] version of this card is [[Level 7]] and has 2600 DEF, whereas the Konami version is Level 9 and has 2500 DEF.
  * In the German dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, during this monster's first appearance, its attack was called "'''Geschmolzener Feuerball'''" ("''Molten Fireball''"), despite firing multiple fireballs. Ironically, in all later appearances, the attack name was changed to "'''Geschmolzene Feuerbälle'''" ("''Molten Fireball'''s'''''"), despite firing only a single fireball.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|098|ref}}, specifically from the panel showing the combined form of "[[Red-Eyes Black Dragon (manga)|Red-Eyes Black Dragon]]" and "[[Summoned Skull (manga)|Summoned Skull]]".
