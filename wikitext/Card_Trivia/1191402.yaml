title: Card Trivia:Destiny HERO - Doom Liege
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Clock Tower Prison City - Dark City]]".
  ** The moon in the artwork of "Clock Tower Prison City - Dark City" appears in the background of this card's artwork.
  * This monster is a retrained [[counterpart]] of "[[Destiny HERO - Doom Lord]]".
  ** This card's artwork is based on the first two times "Doom Lord" appeared onscreen in {{episode|GX|58|ref}}, standing menacingly in front of the moon.
