title: Card Trivia:Naturia Marron
wikitext: |-
  {{Navigation}}

  * This card has "[[Scrap]]", "[[Ice Barrier]]" and "[[Gusto]]" counterparts respectively: "[[Scrap Recycler]]", "[[Caravan of the Ice Barrier]]" and "[[Caam, Serenity of Gusto]]".
  * This card's name comes from ''maroon'', French for [[wikipedia:Chestnut|chestnut]].
  ** This monster also shares resemblance to certain species of [[wikipedia:Bur|bur]] fruit seeds.
