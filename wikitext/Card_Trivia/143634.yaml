  * This card has four different [[Archetype|archetypal]] counterparts appearing in the ''[[Yu-Gi-Oh! GX]]'' era:
  ** "[[Hero Signal]]" for "[[Elemental HERO]]"
  ** "[[Destiny Signal]]" for "[[Destiny HERO]]"
  ** "[[Neo Signal]]" for "[[Neo-Spacian]]"
  ** "[[Apparition]]" for "[[Vision HERO]]"
