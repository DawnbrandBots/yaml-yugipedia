title: Card Trivia:Nightmare-Eyes Restrict
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[Illusion]] [[counterpart]] of "[[Thousand-Eyes Restrict]]".
  ** "[[Thousand-Eyes Restrict (manga)|Thousand-Eyes Restrict]]" and related monsters used by [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] were originally Illusion monsters in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  ** This monster is based on how "Thousand-Eyes Restrict" was the first [[Fusion Monster]] to be [[Forbidden]] from 2006 to 2016 due to how it was exploited by cards like "[[Instant Fusion]]" and "[[Metamorphosis]]" to easily Summon it and lock down the opponent's board.
