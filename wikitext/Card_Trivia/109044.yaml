title: Card Trivia:Dark Guardian
wikitext: |-
  {{Navigation}}

  * This card appears in the original anime artwork of "[[Montage Dragon]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Gate Guardian]]".
  ** This monster's ''[[OCG]]''/''[[TCG]]'' [[archetype condition]] and alternate [[Summoning condition]] by [[shuffle|shuffling]] "[[Sanga of the Thunder]]", "[[Kazejin]]" and "[[Suijin]]" into the [[Deck]] is based on how this monster requires "Gate Guardian" to be in the [[Graveyard]] in order to be [[Summon]]ed in the anime.
  ** This monster's ''OCG''/''TCG'' effect allows it to become immune to  [[activate]]d monster and [[Spell Card|Spell]] effects if Summoned by "[[Dark Element]]", but not [[Trap Card]] effects, referencing how in {{episode|GX|11|ref}}, the Trap Card "[[Hero Barrier (anime)|Hero Barrier]]" was the only card effect used against this monster.
