title: Card Trivia:D/D Savant Copernicus
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Nicolaus Copernicus|Nicolaus Copernicus]].
  ** This is further expressed in the design of this monster, which includes a depiction of [[wikipedia:Heliocentrism|Heliocentrism]], the astronomical model in which the [[wikipedia:Earth|Earth]] and [[wikipedia:planet|planets]] revolve around the [[wikipedia:Sun|Sun]] at the center of the [[wikipedia:Solar System|Solar System]]. In particular, Copernicus presented a mathematical model of the system, triggering the [[wikipedia:Copernican Revolution|Copernican Revolution]].
  * The heliocentric model presented in this card's artwork may be based on an [https://en.wikipedia.org/wiki/Heliocentrism#/media/File:Heliocentric.jpg illustration] by [[wikipedia:Andreas Cellarius|Andreas Cellarius]] for the ''[[wikipedia:Harmonia Macrocosmica|Harmonia Macrocosmica]]''. This monster, who is holding the model on its back, may be a reference to common depictions of [[wikipedia:Atlas (mythology)|Atlas]], the [[wikipedia:Titan (mythology)|Titan]] who held up the [[wikipedia:sky|sky]].
