title: Card Trivia:SPYRAL Double Helix
wikitext: |-
  {{Navigation}}

  * "[[SPYRAL Super Agent]]" and "[[SPYRAL Sleeper]]" appear in this card's artwork.
  ** Both monsters appear younger than depicted in their respective card artworks, suggesting the possibility that "Sleeper" and "Super Agent" are allies in this card's artwork, rather than enemies.
  ** This card's artwork is possibly a reference to ''[[wikipedia:Metal Gear Solid: The Twin Snakes|Metal Gear Solid: The Twin Snakes]]'', whose cover depicts the main protagonist, [[wikipedia:Solid Snake|Solid Snake]], and the main antagonist, [[wikia:w:c:metalgear:Liquid Snake|Liquid Snake]], who were cloned from the same man.
  ** Given the [[SPYRAL]] archetype's nods to James Bond, this card's artwork may further reference the opening scene from the franchise film ''[[wikipedia:GoldenEye|GoldenEye]]'', in which 007 and teammate 006 were depicted as working their final mission together.
