title: Card Trivia:Aura Armor
wikitext: |-
  {{Navigation|mode=nonGame}}

  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' anime, when [[Joey Wheeler]] uses this card, he wears the armor depicted in its artwork and becomes the "[[Player Token]]". As a result, this card can be seen as similar to [[Valon]]'s "[[Armor monster|Armor]]" monsters.
  ** Furthermore, when the "Player Token" is used for a [[Ritual Summon]], the player becomes that Ritual Summoned monster. This can be seen when Joey Ritual Summons "[[Lord of the Red (anime)|Lord of the Red]]".
