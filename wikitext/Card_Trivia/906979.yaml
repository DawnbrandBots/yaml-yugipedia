  * Prior to receiving its own artwork in ''[[Token Pack (OCG)|Token Pack]]'', in video games this [[Token Monster|Token]]'s artwork was a recolored version of the artwork of "[[Phantom Skyblaster]]".
  ** In ''[[Yu-Gi-Oh! Duel Links]]'', [[Skyblaster Token (Duel Links)|this card]]'s in-game artwork was updated after the release of ''Token Pack'' in Japan.
