title: Card Trivia:Oni-Gami Combo
wikitext: |-
  {{Navigation}}

  * "[[Gem-Knight Pearl]]" appears in this card's artwork.
  ** According to the ''Duel Terminal'' Master Guide, this card's artwork depicts "Gem-Knight Pearl" defeating "[[Vylon Disigma]]". Appropriately, "Gem-Knight Pearl" has higher [[ATK]] and is a [[Non-Effect Monster]], which "Vylon Disigma" cannot target with its effect.
  ** This card's artwork may be a reference to the fact that "Gem-Knight Pearl" is the first non-Effect [[Xyz Monster]], meaning that this card is one of the only ways it can utilize its [[Xyz Material]]s.
  * This card has a manga [[counterpart]]: "[[Pursuit of the Fiend]]".
  ** Both cards' artworks depict "Gem-Knight Pearl" battling an unknown opponent.
  ** Both cards allow the player's Monster to attack twice by detaching all of its Xyz Materials.
