title: Card Trivia:Luck of the 7
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card references the [[wikipedia:Apocalypse|Apocalypse]], an event involving destruction on a catastrophic scale, where the number "7" is synonymous with the preceding events, including the "[[wikipedia:Seven trumpets|seven trumpets]]" and the "[[wikipedia:Seven seals|seven seals]]".
  ** Fittingly, the two crashing meteors in this card's artwork reflects its effect requirement of sending up to two [[Level 7]] monster from the [[hand]] to the [[Graveyard]], while also reflecting the two [[Spell]]/[[Trap Card]]s it can destroy with its effect.
  * This card's Japanese name can be deconstructed to refer to "the seventh month" (７月, ''Shichigatsu'', lit. "July"), referencing the prophecy of [[wikipedia:Nostradamus|Nostradamus]], where a "great king of terror" would appear in the 7th month of the year 1999.
  ** Fittingly, [[Nostra]] and [[Deceptus]], two characters based on Nostradamus, both transform into this card in {{episode|Go RUSH!!|085|ref}}.
