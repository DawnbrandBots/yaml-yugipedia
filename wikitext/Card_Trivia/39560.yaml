title: Card Trivia:Scrap-Iron Scarecrow
wikitext: |-
  {{Navigation}}

  * The scarecrow in this card's artwork appears in the artwork of "[[Magnetic Storm]]" and "[[Scrap-Iron Welding]]".
  * The scarecrow is depicted wearing a white scarf similar to that worn by "[[Junk Synchron]]" and "[[Junk Warrior]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This card has a "[[Synchron]]" [[Monster Card]] [[counterpart]]: "[[Scrap Synchron]]".
  * This card is among the three [[Trap Cards]] used by the protagonists of the first three ''[[Yu-Gi-Oh]]'' anime series (in this case, [[Yusei Fudo]]) that were featured in a one-point lesson in {{episode|ZEXAL|012|ref}}.
