title: Card Trivia:Onomatokage
wikitext: |-
  {{Navigation}}

  * The foot of "[[Ganbara Knight]]" appears in this card's artwork.
  ** This card's artwork references the multiple instances in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime where "[[Kagetokage (anime)|Kagetokage]]" was [[Special Summon]]ed alongside "[[Ganbara Knight (anime)|Ganbara Knight]]". 
  *** Ironically, this monster cannot be Special Summoned if the player [[control]]s "Ganbara Knight" alone; however, it can be if the player controls the latter monster's "[[Gagaga]]" counterpart, "[[Gagaga Ganbara Knight]]".
  * This monster is a retrained "[[Onomat]]" [[counterpart]] of "[[Kagetokage]]".
  ** This monster's name is a portmanteau of the Japanese name of the "Onomat" [[archetype]] (オノマト, ''Onomato'') and the Japanese word for "lizard" (トカゲ, ''tokage'').
  * This card is tied with "[[Utopic Onomatopoeia]]" for the highest number of [[archetype condition]]s on any card, with four ("[[Zubaba]]", "Gagaga", "[[Gogogo]]", and "[[Dododo]]").
