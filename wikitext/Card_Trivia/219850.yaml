title: Card Trivia:Constellar Siat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Upshift]]".
  * This monster's name is based on [[wikipedia:Delta Aquarii|Scheat]], the third-brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Aquarius (constellation)|Aquarius]].
  ** The constellation and the astrological symbol for [[wikipedia:Aquarius (astrology)|Aquarius]] (♒︎︎) appears in the background of this card's artwork, with the location of Scheat denoted by the encircled star in the constellation.
  ** This monster is depicted with a large jug of water, referencing how Aquarius is also known as the "water-bearer" constellation.
  * This is the first card to feature the [[condition]], "This card cannot be used as an [[Xyz Material]] for an [[Xyz Summon]], except for the Xyz Summon of...".
