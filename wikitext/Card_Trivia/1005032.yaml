title: Card Trivia:Battlewasp - Twinbow the Attacker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Battlewasp - Grand Partisan the Revolution]]".
  * This monster is named after a [[wikipedia:Crossbow|crossbow]], a ranged weapon used in the [[wikipedia:Middle Ages|Middle Ages]], consisting of short bow mounted at the end of a wooden stock that shoots short arrows. Fittingly, this monster's four legs are designed to resemble the curved mounted ends of the crossbow, branched out without the drawstring pulled back.
