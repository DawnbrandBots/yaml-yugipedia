title: Card Trivia:Golden Statue MK-III
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Three Lunar Legends]]".
  * This monster is based on [[wikipedia:Ninomiya Sontoku|Ninomiya Sontoku]], a prominent 19th-century Japanese agricultural leader, philosopher, moralist, and economist.
  ** A common trope of a school's "seven mysteries" is a legend that a Ninomiya Sontoku statue comes to life at night and walks around the school's hallways.
