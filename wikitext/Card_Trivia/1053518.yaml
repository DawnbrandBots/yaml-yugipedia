title: Card Trivia:Rciela, Sinister Soul of the White Forest
wikitext: |-
  {{Navigation}}

  * A monstrous caricature of this monster appears in the artwork of "[[Woes of the White Forest]]".
  * This monster has a downgraded form: "[[Rucia of the White Forest]]".
  * This monster has two [[counterpart]]s:
  ** "[[Azamina]]" [[Fusion Monster|Fusion]]: "[[Azamina Mu Rcielago]]".
  *** Both share the same [[ATK]] (2000).
  *** Both  share the same [[Level]] (6).
  *** Both have opposite [[Attribute]]s ([[LIGHT]] and [[DARK]]).
  *** Their artworks have mirrored poses.
  ** "[[Sinful Spoils]]" [[Spell Card]]: "[[Sinful Spoils of Doom - Rciela]]".
