title: Card Trivia:The Cursed Cat Counting Dishes
wikitext: |-
  {{Navigation}}

  * The black cat in this card's artwork is based on their association with [[wikipedia:Black cat|evil omens]] in Western superstitions.
  * This card's name is based on "dish counting", an accounting method in Japan used for conveyor belt sushi restaurants.
  ** There are nine broken dishes in this card's artwork, which reflects this card's activation requirement for an opponent's [[Level 9]] or lower monster to declare an attack on the player's [[Level 7]] or higher [[Zombie]] monster.
  *** Also, the nine broken dishes in this card's artwork references the Japanese ghost story, ''[[wikipedia:Banchō Sarayashiki|Banchō Sarayashiki]]''. According to legend, there was a beautiful dishwashing servant named Okiku who worked in [[wikipedia:Himeji Castle|Himeji Castle]] who dies an unjust death in a situation revolving around nine dishes. Okiku returned as a spirit who counted nine dishes in order.
