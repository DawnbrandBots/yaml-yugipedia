title: Card Trivia:Laser Qlip
wikitext: |-
  {{Navigation}}

  * "[[Apoqliphort Towers]]", "[[Pulao, Wind of the Yang Zing]]", and "[[Suanni, Fire of the Yang Zing]]" appear in this card's artwork.
  ** This card's artwork depicts "Apoqliphort Towers" firing laser beams from its countless spikes and destroying "Pulao" and "Suanni", which could explain their appearance in the artwork of "[[Sinister Shadow Games]]".
