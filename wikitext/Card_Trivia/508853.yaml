title: Card Trivia:Fuh-Rin-Ka-Zan
wikitext: |-
  {{Navigation}}

  * "[[wikipedia:Fūrinkazan|Fūrinkazan]]" 「風林火山」 means ''"Wind-Forest-Fire-Mountain"'' in Japanese, and in historical contexts it refers to [[wikipedia:Takeda Shingen|Takeda Shingen]]'s battle standard that was inspired in part by [[wikipedia:The Art of War|Sun Tzu's "The Art of War"]]: 「疾きこと風の如く、徐かなること林の如く、侵掠すること火の如く、動かざること山の如し」("Move as swift as the wind, stay as silent as a forest, attack as fierce as fire, unmovable defense like a mountain.")
  * Each of this card's four different effects correspond to one of four powerful [[Normal Spell Card]]s:
  ** "[[Raigeki]]"
  ** "[[Harpie's Feather Duster]]"
  ** "[[Delinquent Duo]]"
  ** "[[Pot of Greed]]"
  ** Of the four, "Pot of Greed" is the only card that was not [[Forbidden]] by the [[October 2004 Lists|most recent banlist]] at the time of this card's release, instead being [[Limited]].
