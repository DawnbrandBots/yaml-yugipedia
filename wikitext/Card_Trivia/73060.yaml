title: Card Trivia:Kaminari Attack
wikitext: |-
  {{Navigation}}

  * The card's name is a portmanteau of 神 (''Kami'', "God") and 雷 (''Kaminari'', "Thunder").
  ** In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' and ''[[Yu-Gi-Oh! World Championship]]'', the full body of this monster is shown and, as its name suggests, the monster's appearance can be compared to [[wikipedia:Thor|Thor]].
  *** This monster is also similar to most depictions of [[wikipedia:Zeus|Zeus]], the God of Thunder in [[wikipedia:Greek mythology|Greek mythology]].
  * This monster's appearance bears resemblance to "[[The Immortal of Thunder]]".
  * This is the only Level 5 [[Thunder]] [[Fusion Monster]].
  ** This is also the lowest level Thunder Fusion Monster in the game, and the only one that can be summoned with "[[Instant Fusion]]".
