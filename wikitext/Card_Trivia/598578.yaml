title: Card Trivia:Fortune Vision
wikitext: |-
  {{Navigation}}

  * The six cards in this card's artwork feature the eye symbol found on the foreheads of the "[[Fortune Lady]]" monsters.
  ** The designs of the cards are based on the backgrounds of the artworks of the first six "Fortune Lady" monsters (from nearest to farthest): "[[Fortune Lady Dark]]", "[[Fortune Lady Water]]", "[[Fortune Lady Light]]", "[[Fortune Lady Wind]]", "[[Fortune Lady Fire]]", and "[[Fortune Lady Earth]]".
  * The background of this card's artwork resembles the inverted colored background of "[[Future Visions]]", which this card can be used in conjunction with.
