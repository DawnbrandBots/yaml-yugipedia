title: Card Trivia:Selene, Queen of the Master Magicians
wikitext: |-
  {{Navigation}}

  * Five [[Spell Counter]]s appear in this card's artwork.
  * This card's name is based on [[wikipedia:Selene|Selene]], the goddess of the moon and the lover of [[wikipedia:Endymion (mythology)|Endymion]] in [[wikipedia:Greek mythology|Greek mythology]].
  * This monster is an unmasked "[[Reflection of Endymion]]", as well as an older version of "[[Artemis, the Magistus Moon Maiden]]".
