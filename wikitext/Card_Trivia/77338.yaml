title: Card Trivia:Rigorous Reaver
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Half Straight]]". 
  ** The aforementioned card's artwork depicts an eye within this monster's mouth.
  * This monster's Japanese name (リグラス, ''Rigurasu'') is a pun on "rigorous" and "grass".
  * In some video games, this card's text has an error that mistakenly states its effect as each player [[discard]]ing a card from their opponent's [[hand]], although the actual in-game effect is the correct one.
