title: Card Trivia:Doll Hammer
wikitext: |-
  {{Navigation}}

  * "[[Malice Doll of Demise]]" appears in this card's artwork.
  ** This card's artwork is similar to the artwork of "[[Silent Space]]", which also depicts "Malice Doll of Demise" wielding a hammer.
  ** This card's ''[[OCG]]''/''[[TCG]]'' effect to [[add]] itself from the [[Graveyard]] to the [[hand]] when a monster is [[Special Summon]]ed from the Graveyard may be a reference to the effect of "Malice Doll of Demise", which Special Summons itself from the Graveyard during the player's next [[Standby Phase]].
  *** However, despite appearing in this card's artwork, this card does not trigger the effect of "Malice Doll of Demise", which requires it be [[sent]] from the [[field]] to the Graveyard via the effect of a [[Continuous Spell Card]].
