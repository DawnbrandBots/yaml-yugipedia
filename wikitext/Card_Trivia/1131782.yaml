title: Card Trivia:Solfachord Primoa
wikitext: |-
  {{Navigation}}

  * This monster's name comes from ''Primo'', the leading part of the duet.

  * This monster is the only monster in the "[[Solfachord]]" archetype that do not features any fairy chibis playing the musical instrument.
  ** The musical notes in this card's background are crossed, which are references to [[wikipedia:Ghost note|Ghost note]], a musical note with a rhythmic value, but no discernible pitch when played, reflected in this card's Pendulum Scale of 0.
