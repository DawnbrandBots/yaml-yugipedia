title: Card Trivia:Flint Cragger
wikitext: |-
  {{Navigation}}

  * This card's name and [[Rock]] [[Type]] both reference [[wikipedia:Flint|flint]], a sedimentary stone that is commonly used for starting fires.
  ** This naming scheme is reflected in the sparks in this card's artwork and its [[burn]] effect depicted in the ''[[Yu-Gi-Oh! GX]]'' anime, in which this monster creates sparks in its mouth and breathes a stream of fire at the opponent.
  * This is one of three [[Rock]] monsters based on the fossilized skeletons of dinosaurs, the other two being "[[Fossil Dragon Skullgios]]" and "[[Fossil Dyna Pachycephalo]]".
  ** Fittingly, all three monsters were used by [[Jim Crocodile Cook]] in the ''Yu-Gi-Oh! GX'' anime.
