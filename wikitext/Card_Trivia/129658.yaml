title: Card Trivia:Malefic Parallel Gear
wikitext: |-
  {{Navigation}}

  * This monster has a [[retrain]]ed [[counterpart]]: "[[Malefic Paradox Gear]]".

  * This is the first "[[Malefic]]" monster that could be [[Normal Summon]]ed, and the only one that did not require a [[Field Spell Card]] to remain on the [[field]]. 
  ** This is also the first "Malefic" monster that does not have a draconian appearance, the second being "Malefic Paradox Gear".
