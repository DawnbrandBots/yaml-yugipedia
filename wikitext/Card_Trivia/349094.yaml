  * This monster appears in the artwork of "[[Oops!]]".
  * This card's name is derived from the [[wikipedia:GAU-8 Avenger|GAU-8 Avenger]] gatling gun, which is typically mounted to the [[wikipedia:Fairchild Republic A-10 Thunderbolt II|Fairchild Republic A-10 Thunderbolt II]] planes employed by the [[wikipedia:United States Air Force|United States Air Force]].
