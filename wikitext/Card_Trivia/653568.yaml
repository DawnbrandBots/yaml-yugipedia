  * This monster is named after '''[[wikipedia:Li Ying (Water Margin)|Li Ying]]'''
  ** '''Li Ying''' ranks 11th of the 36 Heavenly Spirits of the 108 [[wikipedia:Water Margin|Liangshan heroes]] and is nicknamed "Striking Hawk".
  * This is the first "[[Fire Fist]]" [[Fusion Monster]].
  * This monster appears in the artwork of "[[Fire Formation - Ingen]]".
