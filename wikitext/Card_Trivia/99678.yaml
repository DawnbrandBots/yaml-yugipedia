title: Card Trivia:Sabersaurus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dino Blast]]", "[[Lost World]]", and "[[Steamed Sabersaurus]]".
  * "[[Jurassic World]]" and multiple gentle "Sabersauruses" appear in the background of this card's artwork.
  * This monster is based on the ''[[wikipedia:Triceratops|Triceratops]]'', a large quadrupedal herbivorous dinosaur known for having a massive head with two large horns, a smaller horn on the beaked snout, and a bony frill above the neck.
  * This monster has an [[Xyz Monster|Xyz]] counterpart: "Steamed Sabersaurus".
