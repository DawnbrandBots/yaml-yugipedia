title: Card Trivia:Moissa Wight
wikitext: |-
  {{Navigation}}

  * This monster is a [[Wight]] counterpart of "[[Moissa Knight, the Comet General]]".
  ** This monster's effect to allow the player to conduct an additional [[Normal Summon]]ing of a [[Level 4]] or lower [[Zombie]] monster references the effect of "Moissa Knight", which allows the player to perform an additional [[Pendulum Summon]] from the [[hand]].
