title: Card Trivia:Princess of Tsurugi
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Queen of Swords", is likely references the [[wikipedia:Minor Arcana|Minor Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Queen of Swords|Queen of Swords]].
  * This monster has a [[recolored counterpart]], "[[Queen's Double]]", who acts as this monster's body double.
  ** This is reflected in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', where both this monster and "Princess of Tsurugi" use a rapier in their attack animations.
