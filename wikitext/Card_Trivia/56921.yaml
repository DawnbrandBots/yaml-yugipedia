title: Card Trivia:Morphtronic Radion
wikitext: |-
  {{Navigation}}

  * This card is named after a Radio, which it is capable of transforming into.
  * This card has some differences compared to the other "[[Morphtronic]]" monsters. It is [[Thunder]], instead of [[Machine]], and is [[LIGHT]], instead of [[EARTH]] (a trait shared with "[[Morphtronic Scopen]]").
