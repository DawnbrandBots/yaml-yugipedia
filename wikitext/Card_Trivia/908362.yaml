title: Card Trivia:Numeron Creation
wikitext: |-
  {{Navigation}}

  [[File:NumeronDragonEmerges.png|thumb|right|250|"[[Number 100: Numeron Dragon|Numeron Dragon]]" emerges.]]

  * "[[Number 100: Numeron Dragon]]" and the [[Legend of the Dragons of Light and Time|Tablet of the Moon]] crater appear in this card's artwork.
  ** This card's artwork and [[Activate|activation]] [[condition]] is based on a scene from {{episode|ZEXAL|135|ref}}, where "[[Number 100: Numeron Dragon (anime)|Number 100: Numeron Dragon]]" is created by the resonating energies of "[[Number 46: Dragluon (anime)|Number 46: Dragluon]]", "[[Number 62: Galaxy-Eyes Prime Photon Dragon (anime)|Number 62: Galaxy-Eyes Prime Photon Dragon]]", and "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]", all [[LIGHT]] [[Dragon]]s with 3000 or more [[ATK]].

