title: Card Trivia:Power Tool Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Raging Battle]]'', as well as one of the cover cards of ''[[Collectible Tins 2009 Wave 1]]'' and ''[[Synergy Pack 01: Syncro Acceleration]]''.
  * This monster appears in the artworks of "[[Life Extreme]]" (transforming into "[[Life Stream Dragon]]") and "[[Power Break]]".
  * This monster has a [[Duel Dragon]] [[counterpart]]: "[[Power Tool Mecha Dragon]]".
  * This monster has a true form: "[[Life Stream Dragon]]".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Power Tool Braver Dragon]]".
  * This monster has a "[[Synchron]]" counterpart: "[[Revolution Synchron]]".
  * This is the initial [[signature card]] of [[Leo]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's mechanical appearance and [[Machine]] [[Type]] reflect Leo's usage of the "[[Morphtronic]]" [[archetype]], which primarily consists of Machine monsters.
  ** This monster's toy-like appearance is revealed to be the "outer shell" of "Life Stream Dragon", who is a member of the [[Signer Dragon]]s, reflecting Leo's outward aspirations and naïveté in the first season of the anime, in which he formerly exaggerated that he was a [[Signer]] like his twin sister, [[Luna]]. 
  *** In {{episode|5D's|036|ref}}, when Luna revealed she had a vision of "Life Stream Dragon" participating with the Signer Dragons in the battle against the [[Earthbound Immortal]]s, she dismissed Leo's theory that this monster was the same monster due to having a resemblance. Later, in {{episode|5D's|143|ref}}, when Luna sees "Life Stream Dragon" for the first time, she realizes it was the same [[Dragon]] from her dream.
  * This monster is similar to "[[Gearfried the Iron Knight]]".
  ** Both monsters are armored versions of themselves that hide their true form.
  ** Both monsters' effects also involve [[Equip Spell Card]]s; this monster's effect involves randomly choosing an Equip Spell Card from the [[Deck]] to the [[hand]] and protects itself by [[destroy]]ing said card, while "Gearfried the Iron Knight" destroys all cards [[equip]]ped to it.
  * This card's older Spanish prints features the word "''regresar''" instead of "''devolver''" in their [[card text]], which is the term used for "[[return]]".
