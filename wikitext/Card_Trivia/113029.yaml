title: Card Trivia:Naturia Landoise
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Infinite Feast]]", "[[Naturia Forest]]", and "[[Synchro Creed]]".
  * "[[Naturia Beetle]]", "[[Naturia Butterfly]]", "[[Naturia Fruitfly]]", "[[Naturia Guardian]]", "[[Naturia Hydrangea]]", "[[Naturia Strawberry]]", and "[[Naturia Sunflower]]" appear in this card's artwork.
  * This monster is based on the [[wikipedia:Black Turtle-Snake|Genbu]], the Black Warrior, one of the [[wikipedia:Four Symbols|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]] that represents the cardinal direction of the north in [[wikipedia:Chinese mythology|Chinese mythology]].
  ** This is reinforced by this monster's connection with "[[Naturia Barkion]]" and "[[Naturia Beast]]", who are each based on the other two of the Four Symbols from Chinese mythology ([[wikipedia:Azure Dragon|Seiryu]] and [[wikipedia:White Tiger (mythology)|Byakko]], respectively), and they feature [[Quick Effect]]s that [[negate]] a card of a specific [[Card type|type]].
  * This is the first [[Rock]] [[Synchro Monster]].
