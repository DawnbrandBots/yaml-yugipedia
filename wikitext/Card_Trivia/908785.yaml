title: Card Trivia:Awakening of the Crystal Ultimates
wikitext: |-
  {{Navigation}}

  [[File:Rainbow_Dragon_sends_Duel_Academy_home.png|thumb|right|250|"[[Rainbow Dragon]]" sends Duel Academy home.]]

  * "[[Rainbow Dragon]]" and the main [[Duel Academy]] campus building appear in this card's artwork.
  * This card's Japanese name is a reference to the Japanese title of {{episode|GX|130|ref}}, "Rainbow Dragon Awakens" (レインボードラゴン覚醒), with "Rainbow Dragon" (レインボードラゴン) replaced with "Gem God" (宝玉神), itself another part of the Japanese name of "Rainbow Dragon".
  ** This card's artwork and effect to [[search]] for a "[[Rainbow Bridge (archetype)|Rainbow Bridge]]" card is based on a scene in the episode where [[Jesse Anderson]] uses the power of "[[Rainbow Dragon (anime)|Rainbow Dragon]]" to serve as the "bridge" to send Duel Academy and everyone inside back where they belong, after having been dragged into another dimension through [[Yubel (character)|Yubel's]] machinations.
  ** This card's effect to search for "[[Rainbow Refraction]]" is a reference to the [[Duel]] between [[Jaden Yuki]], [[Jesse Anderson]], and [[Marcel Bonaparte]] (possessed by Yubel) where Jesse unleashes the final attack of "Rainbow Dragon" after absorbing the power of the other "[[Crystal Beast]]" monsters that ended the Duel.

