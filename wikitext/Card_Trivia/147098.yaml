title: Card Trivia:Pyroxene Fusion
wikitext: |-
  {{Navigation}}

  * "[[Gem-Knight Prismaura]]" appears in this card's artwork.
  * This card's Japanese name, "Assemble Fusion", is based on an [[wikipedia:Assembled gem|assembled gem]], a [[wikipedia:Gemstone|gemstone]] made up of smaller gemstones.
  ** The word "Assemble" in "Assemble Fusion" is read as 「アッセンブル」. The kanji for "assemble" is 「輝石」 (''kiseki''), which translates to "pyroxene", which serves as the basis for its ''[[TCG]]'' name.
  * This is the first [[Trap Card]] in the ''[[OCG]]''/''TCG'' that can [[Fusion Summon]] a [[Fusion Monster]].
