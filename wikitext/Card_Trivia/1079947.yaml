title: Card Trivia:Mind Castlin
wikitext: |-
  {{Navigation}}

  * This monster's name references the chess term "[[wikipedia:Castling|castling]]", where the [[wikipedia:King (chess)|king]] is moved to the opposite side of the [[wikipedia:Rook (chess)|rook]] for greater protection.
  ** This is reflected in this monster's rook-themed outfit, as well as its effects to force two monsters (one on each field) to exchange control with each other.
