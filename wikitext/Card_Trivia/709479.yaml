title: Card Trivia:Ama Lilith
wikitext: |-
  {{Navigation}}

  * This monster appears in the second artwork of "[[JAM:P Catch!]]".
  * This monster's name is a portmanteau of the words "ama", "[[wikipedia:Lilith|Lilith]]", and "''[[wikipedia:Amaryllis|amaryllis]]''".
  ** "Ama" is the Japanese abbreviation of the word "amateur", referring to an amateur musician.
  ** "Lilith" is the name of the primordial female demon appearing in [[wikipedia:Jewish mythology|Jewish]] and [[wikipedia:Mesopotamian mythology|Mesopotamian mythology]].
  ** "Amaryllis" is a a genus of flowering bulbs shaped like a trumpet horn, often appearing in hues of pink and white, which serve as this monster's attire.
