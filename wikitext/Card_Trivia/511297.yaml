title: Card Trivia:Great Mammoth of Goldfine
wikitext: |-
  {{Navigation}}

  [[File:Killer Needle destroying Mammoth Graveyard.png|thumb|right|250|"[[Killer Needle (manga)|Killer Needle]]" destroying "[[Mammoth Graveyard (manga)|Mammoth Graveyard]]"]]

  * This monster's ''[[TCG]]'' name is based on [[4Kids]] co-producer Lloyd Goldfine, who helped bring the ''[[Yu-Gi-Oh!]]'' series to North America.
  ** This name was selected by Sam Murakami, who named a card after each of the writers ("[[Slifer the Sky Dragon]]" and "[[The Drdek]]" being the others).<ref>{{cite podcast |host1=[[Tara Sands]] |host2=Steve Yurko |host3=Lloyd Goldfine |date=April 3, 2024 |title=Ep 28: 4Kids Flashback: Lloyd Goldfine: Anime Podcast Abt History of Pokémon, Yu-Gi-Oh, One Piece an |url=https://www.youtube.com/watch?v=L-MnzpWqkyM&t=2640 |work=4Kids Flashback |access-date=September 18, 2025 |time=44:00}}</ref>
  * This monster has a [[Normal Monster|Normal]] [[recolored counterpart]]: "[[Mammoth Graveyard]]".
  * This monster has a [[retrained]] counterpart: "[[Great Mammoth of the Netherworld]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|065|ref}}, specifically from the panel where "[[Mammoth Graveyard (manga)|Mammoth Graveyard]]" (this monster's counterpart) is destroyed by "[[Killer Needle (manga)|Killer Needle]]"; however, this monster's right foreleg is lowered and its tusks aren't damaged, in contrast to that manga appearance.

