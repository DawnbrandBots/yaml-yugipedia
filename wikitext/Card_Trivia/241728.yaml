title: Card Trivia:Snowdust Giant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cattle Call]]" and "[[Energy Attractor]]".
  * This monster is based on a Jötunn, an ice giant in Norse mythology.
  ** This monster appears to be a humanoid/hybrid version of "[[Snowdust Dragon]]"; both monsters feature a similar naming scheme and designs, which include spikes sticking from their bodies and a purple-scaled bellies.
