title: Card Trivia:Mutsuba Tower (card)
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is based on the [[Mutsuba Tower]] from the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * The Japanese spelling and pronunciation of the number "2" (つう, ''tsu'') is forced into the word "Mutsuba" (むつば) to create a pun that correlates with this card's effect to double [[effect damage]].
