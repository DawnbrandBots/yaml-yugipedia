title: Card Trivia:Mist Valley Thunder Lord
wikitext: |-
  {{Navigation}}

  * He is holding the crushed remains of "[[Ally of Justice Catastor]]" in his hands. Ironically, the effect of "Catastor" would automatically destroy "Thunder Lord" were the two to face each other on the field.
  * The connection between "[[Mist Valley]]" and the "[[Ally of Justice]]" monsters was first hinted at in the flavor text for "[[Ally of Justice Clausolas]]".
  * This card's effect is an upgraded version of the effect of "[[Mist Valley Shaman]]".
  * This card appears in the artworks of "[[Mind Pollutant]]".
