title: Card Trivia:Evocator Chevalier
wikitext: |-
  {{Navigation}}

  * This monster's cloak and armor are similar to those of "[[Phoenix Gearfried]]", another [[Gemini monster]] with a similar, upgraded effect.
  * "Evocator" means "one who calls to arms" and "Chevalier" is French for "Knight".
  * This card appears in the artwork of "[[Herculean Power]]".
  * This card is a counterpart to "[[Evocator Eveque]]".
