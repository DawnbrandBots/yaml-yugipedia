title: Card Trivia:Azamina Determination
wikitext: |-
  {{Navigation}}

  * "[[Azamina Moa Regina]]", "[[Diabellze the Original Sinkeeper]]", and "[[Snake-Eyes Poplar]]" appear in this card's artwork.
  * This card's [[OCG]] name is named after "Hamartia", a literary term often associated with Greek tragedy. It refers to a tragic flaw or error that leads to a character's downfall. The word also has the meaning of "sin" in Christian theology.
