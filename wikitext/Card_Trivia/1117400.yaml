title: Card Trivia:Sky Striker Special Maneuver - Lemnisgate!
wikitext: |-
  {{Navigation}}

  * "[[Sky Striker Ace = Zero]]" appears in this card's artwork.
  *"Lemnisgate" is a portmanteau of "[[wikipedia:Lemniscate|lemniscate]]" (a term for any of several figure-eight or ∞-shaped curves in algebraic geometry) and "gate".
  * This is the first "[[Sky Striker]]" [[Quick-Play Spell Card]] that does not require the player to have no monsters in the [[Main Monster Zone]].
