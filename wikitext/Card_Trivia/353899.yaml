title: Card Trivia:Flower Cardian Pine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Flower Gathering]]", "[[Fraud Check]]", "[[Recardination]]", "[[Super All In!]]", and "[[Super Koi Koi]]".
  * This monster is based on the "Pine" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (1) references how the "Paulownia" suit falls under the month of January, the first month of the year.
  ** This monster's [[original ATK and DEF]] (100/100) references how the "Pine" card is a ''kasu'' card, which is worth one point.
  * This is the only [[Main Deck]] "[[Flower Cardian]]" monster to not reference any other card in its artwork.
