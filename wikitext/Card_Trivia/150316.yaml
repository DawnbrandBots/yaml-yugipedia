title: Card Trivia:Shien's Smoke Signal
wikitext: |-
  {{Navigation}}

  * The left [[wikipedia:Hata-jirushi|''hata-jirushi'']] in this card's artwork depicts the crest of "[[Shien]]", whereas the one on the right depicts the crest of the "[[Six Samurai]]".
  ** The crest of "Shien" is also present on the bucket-like apparatus used to elevate the smoke source.
  * The purple smoke signal in this card's artwork is fitting, since "Shien" literally means "purple flame" in Japanese.
