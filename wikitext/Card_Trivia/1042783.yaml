title: Card Trivia:Stumbling Rock
wikitext: |-
  {{Navigation}}

  * "[[Poliscoop]]" appears in this card's artwork.
  * This card's Japanese name (つまづき{{Ruby|岩|ロック}}, ''Tsumazuki Rokku'') is a play on someone stumbling over rocks on improperly tilled soil. 「ロック」 (''Rokku'', "Rock") can also be translated as "Lock", which reflects this card's effect to prevent the opponent from [[Tribute|Tributing]] monsters.
