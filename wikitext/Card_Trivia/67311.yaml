title: Card Trivia:Hero Flash!!
wikitext: |-
  {{Navigation}}

  * The blue letter "H" from the artwork of "[[H - Heated Heart]]", the green letter "E" from the artwork of "[[E - Emergency Call]]", the yellow letter "R" from the artwork of "[[R - Righteous Justice]]", and the purple letter "O" from the artwork of "[[O - Oversoul]]" appear in this card's artwork, arranged to spell out the word "[[HERO]]".
  * This card has a "[[Crystal Beast]]" [[counterpart]]: "[[GEM Burst]]".
  * This card has a [[retrained]] counterpart: "[[H.E.R.O. Flash!]]".
  * In ''[[Legendary Collection 2: The Duel Academy Years Mega Pack]]'', while the other "Hero" monsters (except for "[[Destiny HERO - Disk Commander]]" due to a [[misprint]]) were changed to "HERO", this card's name received the opposite treatment. This is likely due to this card not being a member of the "HERO" archetype as its Japanese name, unlike the members of the "HERO" [[archetype]]s, does not contain the English spelling for "HERO" (ＨＥＲＯ).
