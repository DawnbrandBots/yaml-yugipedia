title: Card Trivia:Mind Drain
wikitext: |-
  {{Navigation}}

  * This card has two counterparts: "[[Skill Drain]]" and "[[Soul Drain]]".
  * "[[Dark King of the Abyss]]" and either "[[Dark Ruler Ha Des]]" or "[[Revived King Ha Des]]" appear in this card's artwork.
  ** "[[Demotion]]" > "[[Abyssal Designator]]" > "[[Herald of the Abyss]]" > "[[Hate Buster]]" > '''"Mind Drain"''' (presumably "[[Skill Drain]]" and "[[Soul Drain]]" as well)  > "[[Skill Prisoner]]" > "[[Destruct Potion]]" > "[[Fake Life]]" > "[[Call of the Archfiend]]" > "[[Reject Reborn]]" > "[[Powerful Rebirth]]" > "[[Dark Ruler No More]]"
  ** This card's artwork depicts the aftermath of "[[Soul Drain]]", with "Dark King of the Abyss" claiming the soul of "Dark Ruler Ha Des".
  ** This card may depict the start or final transformation of "Dark Ruler Ha Des" into "Revived King Ha Des".
