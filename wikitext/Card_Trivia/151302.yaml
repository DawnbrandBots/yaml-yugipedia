title: Card Trivia:Blackwing - Kris the Crack of Dawn
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is named after a [[wikipedia:Kris|kris]], a traditional dagger used in Southeast Asia.
  ** This monster's title is derived from the [[wikipedia:Dawn|dawn]], the astronomical phenomena where indirect sunlight appears in the Earth's atmosphere hours before sunrise.
  * This monster's appearance resembles the appearance of the [[wikipedia:Garuda|Garuda]] statues in [[wikipedia:Bali|Bali]].
