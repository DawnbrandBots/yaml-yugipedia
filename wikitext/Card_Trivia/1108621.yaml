title: Card Trivia:Seven Stars Slash - Army Annihilator Hagun
wikitext: |-
  {{Navigation}}

  * "[[Sacred Sword of Seven Stars]]" appears in this card's artwork.
  * "Hagun" (破軍) is derived from "''Hagunsei''" (破軍星), the Japanese name for [[wikipedia:Alkaid|Alkaid]], the easternmost star in the [[wikipedia: Big Dipper|Big Dipper]] constellation.
