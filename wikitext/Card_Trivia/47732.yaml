title: Card Trivia:Inferno
wikitext: |-
  {{Navigation}}

  * Skulls of possible victims of this monster can be seen in this card's artwork, in the monster's mouth.
  * This card may be a more malevolent version of "[[Invasion of Flames]]", although, "Invasion of Flames" has a higher [[ATK]].
  * "Inferno" is Italian or Portuguese for "[[wikipedia:Hell|hell]]", a possible interpretation of the scene in this card's artwork.
  * The icon for [[Pyro]]-[[Type]] monsters in ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'' is based on this monster.
