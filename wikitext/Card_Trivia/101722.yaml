title: Card Trivia:Oshaleon
wikitext: |-
  {{Navigation}}

  * This monster is based on a character from the Japan-only arcade game: [[wikipedia:ja:脳開発研究所クルクルラボ|脳開発研究所クルクルラボ]].
  * The 3 stars on this monster's side reflects that it is a [[Level]] 3.
  * This card's name is most likely a combination of the words ''oshare'', the Japanese word for "fashion", and "chameleon", as represented by its bright colors and star markings. However, it can be taken as a combination of the Japanese pronunciation of "ocean" and "chameleon". Lending credence to this is its [[WATER]] attribute as well as the swirling water in the background of the card art.
  * This monster appears to have an older form: "[[Majioshaleon]]".
  * This monster appears in the artwork of "[[Majiosheldon]]".
