title: Card Trivia:The Terminus of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * "[[Dante, Traveler of the Burning Abyss]]" (transforming into "[[Dante, Pilgrim of the Burning Abyss]]"), "[[Virgil, Rock Star of the Burning Abyss]]", and "[[Beatrice, Lady of the Eternal]]" appear in this card's artwork.
  ** This card's artwork is based on the beginning of ''[[wikipedia:Paradiso (Dante)|Paradiso]]'', the third and final part of [[wikipedia:Dante Alighieri|Dante Alighieri]]'s ''[[wikipedia:Divine Comedy|Divine Comedy]]''. At the top of Mount Purgatory, after Dante and Virgil had braved the trials of Hell, Beatrice appears and guides Dante to Heaven.
