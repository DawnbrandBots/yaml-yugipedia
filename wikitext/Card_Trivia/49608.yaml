title: Card Trivia:Doble Passe
wikitext: |-
  {{Navigation}}

  * This card's name is based on the ballet step, "[[wikipedia:pasodoble|pasodoble]]", keeping in relation with the dance and music theme of [[Alexis Rhodes]]' Deck in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's name also reflects its effect, as "pasodoble" is the Spanish word for "two step". The first step of the card's effect is to take a direct attack from the opponent's monster while controlling their [[Attack Position]] monster, leading to the second step of allowing the player's monster to deal damage equal to its [[ATK]].
  *** In the ''Yu-Gi-Oh! GX'' anime, this card's damage-inflicting effect instead allowed Alexis' monsters to attack her opponents directly. This concept would later be integrated into this card's ''[[OCG]]''/''[[TCG]]'' effect of allowing the player's monsters to attack directly.
