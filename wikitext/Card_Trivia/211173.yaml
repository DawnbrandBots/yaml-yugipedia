title: Card Trivia:Wattaildragon
wikitext: |-
  {{Navigation}}

  * A depiction of this monster appears in the artwork of "[[Ancient Rules]]", which is referenced in this card's [[flavor text]].
  ** Its [[Level]] (6) and its [[ATK]] (2500) are also referenced in this card's flavor text.
  ** As "Ancient Rules" was released nearly six years prior to this card, this card is one of the few monsters to debut in the artwork of the [[Spell]]/[[Trap Card]] before being released as an actual card.
  ** This card's artwork and flavor text are similar to DRUMP, a 2013 one-shot manga released by [[Kazuki Takahashi]] about a blue dragon imprisoned inside a deck of magical playing cards for thousands of years.
  * This is the first "[[Watt]]" monster that isn't a [[Thunder]] monster, the second "Watt" [[Normal Monster]] (after "[[Wattkid]]"), and the strongest "Watt" monster in terms of ATK.
