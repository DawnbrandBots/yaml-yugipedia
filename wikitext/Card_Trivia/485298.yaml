title: Card Trivia:D/D/D Knowledge King Tomb Conquistador
wikitext: |-
  {{Navigation|mode=nongame}}

  * This is one of the few "[[D/D/D]]" monsters appearing not to be based on a historical person or an apocalyptic event.
  ** This monster is named after the [[wikipedia:Conquistador|Conquistadors]], a Spanish or Portuguese conqueror, explorer, or soldier who arrived in the Americas during the 16th and 17th centuries to expand their empires.
  * This monster's Japanese title ({{Ruby|識|し}}{{Ruby|慧|けい}}{{Ruby|王|おう}}, Shikeiō) is a homophone of [[wikipedia:Chief knowledge officer|CKO]] ("Chief Knowledge Officer"), an executive officer responsible for all the knowledge assets, practices and intellectual capital of an organization.
  * This is the only "D/D/D" monster not to be released in the ''[[OCG]]''/''[[TCG]]''.
