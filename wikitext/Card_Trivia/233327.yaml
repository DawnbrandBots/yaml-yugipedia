title: Card Trivia:Unification
wikitext: |-
  {{Navigation}}

  * "[[Tenkabito Shien]]" ("[[Legendary Six Samurai - Shi En]]" without his armor) and  "[[Kagemusha of the Blue Flame]]", albeit with a different color palette, appear in this card's artwork.
  * This card's artwork seems to follow the scenes from "[[Gozen Match]]" and "[[Rivalry of Warlords]]", to depict a country unified after years of war.
  * This card's effect is a [[Continuous]] version of "[[Attention!]]".
