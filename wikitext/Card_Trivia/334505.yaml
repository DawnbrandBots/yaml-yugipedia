title: Card Trivia:Curse of the Shadow Prison
wikitext: |-
  {{Navigation}}

  * "[[Satellarknight Unukalhai]]" and the staff of "[[Constellar Rasalhague]]"/"[[Evilswarm Kerykeion]]" appear in this card's artwork.
  ** According to the [[Master Guide 5 card storylines#Starlight Shining Upon the Shadow Prison|''Master Guide 5'' card storylines]], "Unukalhai" was drawn to the shadows when after sensing the power of "Evilswarm Kerykeion" (who had already been absorbed by the "[[Shaddoll Core]]"), since their powers are similar. When noticing "Unukalhai" struggling, "Kerykeion" tried to help, which explains the appearance of its staff in this card's artwork.
  * This card depicts the start of the transformation of "Unukalhai" (or at least its armor) into "[[Shaddoll Squamata]]" by the same shadow that appears in the artwork of "[[Ritual Beast Ambush]]".
