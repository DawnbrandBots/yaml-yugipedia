title: Card Trivia:Galaxy Defense Robot Orbital 7
wikitext: |-
  {{Navigation}}

  * This is the [[Monster Card]] version of [[Orbital 7]], a character from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, while its design is based on his fighting form.
  ** This monster is also an [[Card evolutions|upgraded]] form of "[[Orbital 7 (card)|Orbital 7]]" after removing all [[You Got It Boss! Counter]]s from it, in which its [[ATK]] becomes 2000.
  ** This monster's Japanese title, "Galaxy Defense Robo" (ＧＤロボ), is a reference to the Japanese name of the "[[Super Defense Robot]]" archetype used by Orbital 7 in the anime: "Super Defense Robo" (ＳＤロボ).
