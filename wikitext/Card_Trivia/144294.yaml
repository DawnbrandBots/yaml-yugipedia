title: Card Trivia:Wisel Top 3
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Wise T3]]".
  * The number "3" in this monster's name represents its [[Level]] (3).
  * This monster resembles a [[wikipedia:Rabbit|rabbit]], keeping in relation with the "land animal" theme of the "[[Wisel]]" [[archetype]].
  * This monster is the upgraded form of "[[Wisel Top]]".
  ** This monster's video game [[Special Summon]]ing effect is based on the effect of "Wise T3", which requires it to [[send]] "Wisel Top" to the [[Graveyard]] to Special Summon itself from the player's [[hand]].
