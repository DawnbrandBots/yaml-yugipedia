title: Card Trivia:Seven Kid Goats
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the seven goat kids from the [[wikipedia:Brothers Grimm|Brothers Grimm]] fairy tale, "[[wikipedia:The Wolf and the Seven Young Goats|The Wolf and the Seven Young Goats]]".
  ** This monster's effect to [[destroy]] an opponent's [[Beast]] or [[Beast-Warrior]] monster references the story of ''The Wolf and the Seven Young Goats'' where the Big Bad Wolf devours six of the titular goat kids by disguising themselves as their mother, who learns of her children's fate from the remaining kid. The goat mother then cuts open the wolf's belly, replaces the kids with heavy stones, and sews the belly up, which eventually causes the wolf's demise.
