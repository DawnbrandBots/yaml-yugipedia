title: Card Trivia:Destiny HERO - Dark Angel
wikitext: |-
  {{Navigation}}

  * This is one of the few "[[Destiny HERO]]" monsters whose Japanese name does not feature the suffix "-guy", the others being "[[Destiny HERO - Plasma]]" and "[[Destiny HERO - Dread Servant]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[activation condition]] requiring at least three "[[Destiny HERO]]" monsters in the player's [[Graveyard]] is based on its appearance in {{episode|GX|098|ref}}, where [[Aster Phoenix]] [[activate]]s this monster's effect on his turn after his "[[Destiny Hero - Captain Tenacious (anime)|Destiny Hero - Captain Tenacious]]", "[[Destiny Hero - Diamond Dude (anime)|Destiny Hero - Diamond Dude]]", and "[[Destiny Hero - Dreadmaster (anime)|Destiny Hero - Dreadmaster]]" were all [[destroyed by battle]] by [[The D]]'s "[[Destiny Hero - Plasma (anime)|Destiny Hero - Plasma]]".
  ** Also, this monster's effect to [[Special Summon]] a "Destiny HERO" monster to the opponent's [[field]] (which may include itself) is an alteration of its final anime effect, which allows the opponent to take [[control]] of it if they have an unused [[Monster Zone]].
  * This monster's ''OCG''/''TCG'' effect to [[negate]] and [[destroy]] the player's [[Spell Card]]s is an alteration of its anime effect, which, according to Aster Phoenix, was designed to counter the combo between "Destiny Hero - Plasma" and the Spell Card "[[D - Force (anime)|D - Force]]". It does so by changing the top card of the opponent's [[Deck]], which is where "D - Force" would be placed [[face-up]], thus negating the final effects of "Plasma", which negates the effects of the opponent's cards. In the ''OCG''/''TCG'', this monster's effect can be used to counter the effects of the real-life "[[D - Force]]", which is designed as a [[support]] card for "[[Destiny HERO - Plasma]]" and replicates the anime effects of the latter card.
