title: Card Trivia:Rhinotaurus
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Minotaur|Minotaur]], a creature in [[wikipedia:Greek mythology|greek mythology]] depicted with the head of a bull and the body of a human.
  ** This monster is a combination of a [[wikipedia:Rhinoceros|rhinoceros]] and the Minotaur.
