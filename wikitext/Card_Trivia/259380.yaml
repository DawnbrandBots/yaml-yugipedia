title: Card Trivia:Shogi Lance
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Xyz Align]]".
  * This monster is based ''kyōsha'' piece in the game of [[wikipedia:Shogi|shogi]], which is also known in English as the "lance".
  ** This monster's Japanese name, "Spear Wheel" and appearance are puns on ''kyōsha'', as the Japanese words for "spear" and "wheel" are "''kyō''" (香) and "''sha''" (車), respectively.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect is based on the effect of "[[Quick Star: Level 3]]", which increased the [[Level]]s of it and "[[Line Monster K Horse]]" (a [[Beast-Warrior]] monster) by three in {{chapter|ZEXAL|025|ref}}.
  * This card's artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, specifically from the panel showing [[Line Monster Spear Wheel|this monster]] being Summoned.
