title: Card Trivia:Flower Cardian Zebra Grass with Moon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fraud Check]]" and "[[Super All In!]]".
  * "[[The Wicked Avatar]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Zebra Grass with Full Moon", one of the special cards in the "Pine" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (8) references how the "Zebra Grass with Full Moon" card falls under the month of August, the eighth month of the year.
  ** This monster's [[original ATK and DEF]] (2000/2000) references how the "Zebra Grass with Full Moon" card is a ''hikari'' card, which is worth twenty points.
