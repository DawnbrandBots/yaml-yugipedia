title: Card Trivia:Utgarda, Generaider Boss of Delusion
wikitext: |-
  {{Navigation}}

  * The symbol from the artwork of "[[Generaider Boss Stage]]" appears in this card's artwork (although the upper right circle is highlighted light blue).
  * This monster is based on [[wikipedia:Útgarðar|Utgard]], a stronghold located in [[wikipedia:Jötunheimr|Jötunheimr]], home of the [[wikipedia:Jötunn|jötunn]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** The symbol from the artwork of "Generaider Boss Stage" that appears in this card's artwork is based on Jötunheimr.
  ** This card's name is also a reference to the jötunn [[wikipedia:Útgarða-Loki|Útgarða-Loki]], the ruler of the castle.
