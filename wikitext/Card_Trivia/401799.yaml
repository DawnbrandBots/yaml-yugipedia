title: Card Trivia:Hi-Speedroid Hagoita
wikitext: |-
  {{Navigation}}

  * This monster is based on a ''[[wikipedia:Hagoita|hagoita]]'', a wooden paddle used for playing ''[[wikipedia:Hanetsuki|hanetsuki]]'', a racquet game similar to [[wikipedia:Badminton|badminton]] in which players use them to volley [[wikipedia:Shuttlecock|shuttlecocks]].
  ** Fittingly, two shuttlecock-like devices appear in this card's artwork.
  ** This monster's Japanese name, "Machago Ita" (マッハゴー・イータ, ''Mahhagō Īta''), is also a portmanteau of the words "[[wikipedia:Mach number|Mach]]" (マッハ, ''Mahha'') and "''hagoita''" ({{Ruby|羽|は}}{{Ruby|子|ご}}{{Ruby|板|いた}}), the former word being a unit of measurement that compares the speed of an object to the speed of sound.
  *** The word "Machago" (マッハゴー, ''Mahhagō'') may also be a reference to the [[wikipedia:Mach Five (Speed Racer)|Mach Five]] (マッハ{{Ruby|号|ごう}}, ''Mahha-gō''), the fictional racing car from the ''[[wikipedia:Speed Racer|Speed Racer]]'' anime, which is originally known in Japan as ''Mach GoGoGo''.
