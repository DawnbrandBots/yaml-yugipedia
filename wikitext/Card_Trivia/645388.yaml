title: Card Trivia:Hela, Generaider Boss of Doom
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Generaider Boss Room]]".
  * The symbol from the artwork of "[[Generaider Boss Stage]]" appears in this card's artwork (although the bottom circle is highlighted purple, as depicted in the artwork of "Generaid Boss Room").
  * This monster is based on [[wikipedia:Hel (being)|Hel]], the being who presides over [[wikipedia:Hel (location)|Hel]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** The symbol from the artwork of "Generaider Boss Stage" that appears in this card's artwork is based on [[wikipedia:Helheim|Helheim]], the world of death and decay, where Hel rules.
  ** This monster's horns, black coat, and non-humanoid arms may also be based on the Hel's appearance in the ''[[wikipedia:Boktai|Boktai]]'' videogame series, which was published by [[wikipedia:Konami|Konami]].
  * This monster has a younger form: "[[Vala, Seidhr of the Generaider Bosses]]".
