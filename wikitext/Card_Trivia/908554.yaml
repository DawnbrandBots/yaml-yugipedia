title: Card Trivia:Voidvelg Elysium
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Zuwijo - Voidvelg of the Empty Sky]]''.
  * This monster appears in the artwork of "[[Diffuse Nebula]]".
  * This monster is named after [[wikipedia:Elysium|Elysium]], the afterlife for the righteous and heroic in Greek mythology.
  * This monster is a [[counterpart]] of "[[Voidvelg Requiem]]".
  * This monster has an [[Card evolutions|upgraded]] [[Contact Fusion]] form: "[[Dark Matter Elysium]]".
