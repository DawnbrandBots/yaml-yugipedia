title: Card Trivia:Dodododo Warrior
wikitext: |-
  {{Navigation}}

  [[File:DododoWarrior-JP-Anime-ZX-NC.png|thumb|250px|"[[Dododo Warrior (anime)|Dododo Warrior]]" being Summoned.]]
  * This monster is a retrained [[counterpart]] of "[[Dododo Warrior]]".
  ** This monster's pose is based on that of "[[Dododo Warrior (anime)|Dododo Warrior]]" when it is Summoned in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's effect to [[Special Summon]] itself with 1800 [[ATK]] is based on the effect of "Dododo Warrior", which can be [[Normal Summon]]ed without [[Tribute|Tributing]], but its ATK becomes 1800.
  * This monster's effect to Special Summon itself from the hand as a [[Level 4]] monster is based on the first effect of "[[Dododo Buster]]".

