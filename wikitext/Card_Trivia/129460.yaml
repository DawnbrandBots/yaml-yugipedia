title: Card Trivia:Malefic Cyber End Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Yu-Gi-Oh! 3D Bonds Beyond Time Movie Pack]]''.
  * This monster appears in the artwork of "[[Malefic Territory]]".
  * This monster is the "[[Malefic]]" [[counterpart]] of "[[Cyber End Dragon]]".
  ** Both monsters share the highest [[original ATK]] (4000) of all "[[Cyber]]" monsters.
