title: Card Trivia:Ritual Beast Tamer Elder
wikitext: |-
  {{Navigation}}

  * This monster is the older version of "[[Kamui, Hope of Gusto]]". This is supported by them having the same stats (ATK, DEF, Level, Attribute, and Type), barring "Kamui" being a [[Flip Effect Monster]].
  * "[[Ritual Beast Ulti-Cannahawk]]" is the [[Fusion Monster|Fusion]] between this monster and "[[Spiritual Beast Cannahawk]]".
  * This monster appears in the artworks of "[[Ritual Beast Return]]" and "[[Ritual Beast Ulti-Kimunfalcos]]".
