title: Card Trivia:Meklord Emperor Wisel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Boon of the Meklord Emperor]]", "[[Infinity Wall]]", "[[Majestic Absorption]]", and "[[Mektimed Blast]]".
  * This monster has a "[[Meklord Army]]" [[counterpart]]: "[[Meklord Army of Wisel]]".
  * This monster has a [[retrained]] counterpart: "[[Meklord Emperor Wisel - Synchro Absorption]]".
  ** Both monsters have the highest [[original ATK and DEF]] (2500/2500) of all [[Level 1]] monsters.
  * This is the first "[[Meklord]]" monster to appear in the anime, as well as the first "Meklord" monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This is the first card to use [[Problem-Solving Card Text]] in the ''TCG''.
  * This monster's ''OCG''/''TCG'' appearance is based on the appearance the five "[[Wisel]]" monsters take when on field together the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's [[Special Summon]]ing effect and original [[ATK]] and [[DEF]] (2500/2500) are based on how in the anime, the main components of this monster are intended to be [[Special Summon]]ed all at once by the effect of "[[Wise Core]]" and the middle piece gains the total ATK and DEF of all the others.
  ** This monster's additional effect to [[negate]] an opponent's [[Spell Card]] references the anime effect of "[[Wisel Top 3 (anime)|Wisel Top 3]]", which negates the effect of a Spell/[[Trap Card]].
  * This is the [[signature card]] of [[Primo]] in the ''Yu-Gi-Oh! 5D's'' anime.
  ** This monster uses its left arm to attack, similar to Primo's usage of his left hand.
  ** This monster appears to be the medium-sized member of the "[[Meklord Emperor]]s", reflecting how Primo is the medium-sized member of the [[Three Pure Nobles]] and represents the midlife of [[Aporia]].
  * The three "Meklord Emperors" likely represent the concept of the mind, body, and spirit, with this monster representing the mind, as well as humankind. This is also reflected in this monster's humanoid appearance.
