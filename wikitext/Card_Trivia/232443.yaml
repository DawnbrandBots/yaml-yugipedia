title: Card Trivia:Fire Formation - Tenki
wikitext: |-
  {{Navigation}}

  * "[[Brotherhood of the Fire Fist - Hawk]]" and "[[Brotherhood of the Fire Fist - Raven]]" appear in this card's first artwork.
  ** "[[Panther Warrior]]" and "[[Salamandra]]" appear in this card's second artwork.
  *** This is ironic since "Salamandra" can only be [[equip]]ped to [[FIRE]] monsters, and both "Panther Warrior" and its [[retrained]] counterpart "[[Swift Panther Warrior]]" are [[EARTH]] monsters.
  * This card is named after "''Tenki''" (天璣), the Chinese-Japanese astronomy name for ''[[wikipedia:Phecda|Gamma Ursae Majoris]]'', one of the seven stars in the constellation of [[wikipedia:Ursa Major|Ursa Major]].
  * Like other "[[Fire Formation]]" cards, this card's effect is a variant on an existing [[Spell]]/[[Trap Card]]. In this card's case, its effect is based on "[[Reinforcement of the Army]]".
