title: Card Trivia:Double Delta Warrior
wikitext: |-
  {{Navigation}}

  * This monster's design features two triangular flags, where the Greek uppercase letter "delta" (Δ) is represented by a triangular shape.
  ** Also, the shape of a triangle features three sides, and the '''two''' triangular flags add up to a total of '''six''' sides, representing this card's [[Level]] (6).
