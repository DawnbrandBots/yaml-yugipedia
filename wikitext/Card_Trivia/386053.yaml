title: Card Trivia:Fusion Tag
wikitext: |-
  {{Navigation}}

  * The card "[[Elemental HERO Sparkman]]", embossments of "[[Elemental HERO Flame Wingman]]" and "[[King of the Swamp]]" (as depicted from their respective card artworks), and the blue swirling patterns from the artwork of "[[Polymerization]]" appear in this card's artwork.
  ** This card's artwork is likely a reference to the [[Fusion Summon]]ing of "[[Elemental HERO Shining Flare Wingman]]", which can be greatly aided by this card's effect.
  * This card is a reference to [[wikipedia:Dog tag|dog tags]], the common term for military identification tags that contains information of its owner embossed into the metal, which reflects this card's effect to change the identity of the player's monster into that of the [[reveal]]ed [[Fusion Monster|Fusion Monster's]] if being used to [[Fusion Summon]] the turn this card is [[activate]]d.
  * This card's Spanish name was mistranslated from English, as the word "''tag''" was translated as "''label''".
