title: Card Trivia:Wisel Attack 5
wikitext: |-
  {{Navigation}}

  * The number "5" in this card's name represents its [[Level]] (5).
  * This monster resembles a [[wikipedia:Swan|swan]], keeping in relation with the "land animal" theme of the "[[Wisel]]" [[archetype]].
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this card has the highest [[original ATK]] (2000) of all "Wisel" monsters.
  * This card is one of the only "[[Meklord Emperor]]" parts that was never [[Summon]]ed, rather being discarded instead.
  ** This is also the only "Wisel" monster not used by [[Primo]].
