title: 'Card Trivia:Number 107: Galaxy-Eyes Tachyon Dragon'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This is the [[cover card]] of ''[[Lord of the Tachyon Galaxy]]'', as well as one of the cover cards of ''[[Duelist Pack: Duelists of Brilliance]]''.
  * This monster appears in the artworks of "[[Hundred Summon]]", "[[Neutrino Dowsing]]", "[[Tachyon Drive]]", "[[Tachyon Flare Wing]]", "[[Tachyon Spiral Galaxy]]", and "[[Tachyon Spiral of Destruction]]".
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this monster's [[neutral form]] was a black upside-down pyramid, with a formation on top of the square and blue and red panels on opposite triangle sides.
  ** This form of this monster appears in the artworks of "[[Lord of the Tachyon Galaxy (card)|Lord of the Tachyon Galaxy]]" and "[[Tachyon Transmigration]]".
  ** Once un-sealed, this monster temporarily reverted to its sealed form when using its effect; if it negated the effects of another "Number" monster, that monster reverted to its sealed form for as long as its effect remained negated.
  * The number "107" appears on the right side of this monster's head.
  * This monster is named after a [[wikipedia:Tachyon|tachyon]], a hypothetical particle that always moves faster than light. It is also theorized that a tachyon can travel backward and forward faster than light, through what is perceived as time.
  ** As noted by [[Astral]] in the anime, this monster's effect to [[negate]] the effects of all other [[face-up]] monsters currently on the [[field]] and make their [[ATK]]/[[DEF]] become their [[original ATK and DEF]] is based on the property of the tachyon to travel through time.
  * This is the [[signature card]] of [[Mizar]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster has the following forms.
  ** A younger form: "[[Tachyon Cloudragon]]".
  ** A [[Main Deck]] [[counterpart]]: "[[Galaxy-Eyes Tachyon Primal]]".
  ** A [[Link Monster|Link]] counterpart: "[[Galaxy Satellite Dragon]]".
  ** A "[[Number C10X]]" [[Card evolutions|upgraded]] form: "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]".
  * This is the first "[[Number 10X]]" monster to appear in the anime.
  ** It is also the first "[[Number]]" monster to have a triple-digit number.
  * This is the only "Number 10X" monster to not be a [[Rank 4]] monster.
  * This monster is the rival counterpart of "[[Galaxy-Eyes Photon Dragon]]".
  ** It has the same [[Attribute]] ([[LIGHT]]), [[Type]] ([[Dragon]]), and original ATK and DEF (3000/2500) as "Galaxy-Eyes Photon Dragon"; its [[Rank]] (8) is also the same as the [[Level]] of "Galaxy-Eyes Photon Dragon".
  ** This monster originates from the [[Barian World]] origin, while "Galaxy-Eyes Photon Dragon" originates from the [[Astral World]], as Astral comments about the light dwelling within it being similar to that of his world; its true form "[[Number 62: Galaxy-Eyes Prime Photon Dragon (anime)|Number 62: Galaxy-Eyes Prime Photon Dragon]]" is also of Astral World origin.
  ** This monster is the "Dragon of Time" referred to in the [[Legend of the Dragons of Light and Time]].
  * Ironically, being a member of the "[[Galaxy-Eyes]]" [[archetype]], this monster's design doesn't feature a galaxy in its eyes.
  * This is the only "Number 10X" monster that was not created by [[Don Thousand]], as it was instead created by the [[Number 100: Numeron Dragon (character)|Numeron Dragon]].
  * In the Japanese version of the anime, this monster's roar is similar to that of "Galaxy-Eyes Photon Dragon".
  * This monster's Italian name, "Numero 107: Drago Galattico Occhi Tachionici", features a typo, as it is translated to "Number 107: Tachyon-Eyes Galaxy Dragon".
