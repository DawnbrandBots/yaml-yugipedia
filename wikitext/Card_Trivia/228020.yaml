title: Card Trivia:Armaill
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Elimigate]]".
  * This monster's name is a portmanteau of the words "armor" and "mail".
  * This monster shares the same [[Level]] (3) and [[original ATK and DEF]] (700/1300) with "[[One-Eyed Shield Dragon]]", both of which are also [[Fusion Material]]s for "[[Dragoness the Wicked Knight]]".
