title: Card Trivia:Elemental HERO Escuridao
wikitext: |-
  {{Navigation}}

  * This monster is named after ''Escuridao'', the Portugese word for "darkness".
  ** Fittingly, this monster is [[DARK]] and requires a DARK monster as [[Fusion Material]].
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Elemental HERO Shadow Mist]]".
  * This monster has a [[LIGHT]] [[counterpart]]: "Elemental HERO The Shining".
  ** Both have effects that allow them to gain [[ATK]] for each "[[Elemental HERO]]" monster that is not in the [[hand]] or [[field]]: This monster gains ATK equal to the number of "Elemental HERO" monsters in the [[Graveyard]], while "The Shining" gains ATK equal to the number of [[banish]]ed "Elemental HERO" monsters.
  * This is the last of the Attribute Fusion "Elemental HERO" monsters to appear in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|062|ref}}, specifically from the panel showing [[Elemental Hero Escuridão (manga)|this monster]] being [[Fusion Summon]]ed, albeit with its right arm lifted up.
