title: Card Trivia:Jelly Cannon
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Tokoroten|Tokoroten]], in this card's Japanese name, is a dish in Japanese cuisine made from [[wikipedia:Agarophytes|agarophytes]], a type of seaweed. Tokoroten was traditionally made by boiling tengusa (''[[wikipedia:Gelidium amansii|Geidium amansii]]'') and then allowing the mixture to congeal into a jelly.
  * This cannon is based on a tokoroten mold, which has cylindrical shape and small square holes in one end, so when the jelly is pushed out of the mold, it will form long noodles.
  * This card's Japanese name is a play on the Japanese phrase ''[https://dictionary.goo.ne.jp/word/心太式/ Tokoroten-shiki]'' (心太式), which literally means "Tokoroten-style", and figuratively means "doing things in an orderly manner, like how a Tokoroten is made".
  ** The card name uses ''hōshiki'' instead of ''shiki'' (式). ''hōshiki'' is the reading of 方式, which means "method" and is mostly synonymous with ''shiki''. However, the card's kanji makes a play on ''hōshiki'' by using the homophonous characters of 砲式 instead of 方式, which literally means "cannon style", a play on the fact that the card depicts a Tokoroten-firing cannon.
