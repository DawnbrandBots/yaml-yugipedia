title: Card Trivia:King's Sarcophagus
wikitext: |-
  {{Navigation}}

  * This is the first card to feature an [[effect]] that can only be [[activated]] up to four times per turn.
  ** This effect supporting "[[Horus]]" monsters by [[send]]ing them to the [[Graveyard]] references [[wikipedia:Four sons of Horus|the Four sons of Horus]], a group of four deities who serve as protectors of the dead in [[wikipedia:Egyptian mythology|Egyptian mythology]].
