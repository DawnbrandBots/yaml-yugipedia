title: 'Card Trivia:Number 23: Lancelot, Dark Knight of the Underworld'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster is named after [[wikipedia:Lancelot|Lancelot]], a prominent character in [[wikipedia:Matter of Britain|Arthurian legends]] who is depicted as one of the most well-known [[wikipedia:Knights of the Round Table|Knights of the Round Table]]. 
  * Like other "Number" monsters associated with [[Kyoji Yagumo]], this monster is related to one of the [[wikipedia:Seven deadly sins|seven deadly sins]], specifically, the [[wikipedia:Lust|deadly sin of lust]].
  ** This is reflected in the legend of Lancelot's love affair with [[wikipedia:King Arthur|King Arthur's]] wife, [[wikipedia:Guinevere|Queen Guinevere]].
  *** Fittingly, "[[Tristan, Knight of the Underworld]]" and "[[Isolde, Belle of the Underworld]]" are ideal [[Xyz Material]] for this monsger's [[Xyz Summon]], and are based on the Celtic legend of  ''[[wikipedia:Tristan and Iseult|Tristan and Iseult]]'', which is cited as an influence on the romance between Lancelot and Guinevere.
  * As with all the other "Number" monsters used by Kyoji Yagumo, this card was molded to the situation at hand, to be a direct counter to [[Ryoga Kamishiro (manga)|Ryoga Kamishiro]]'s strategy of rapidly Summoning "[[Bahamut Shark (manga)|Bahamut Shark]]", and then using its effect to Summon "[[No. 47: Nightmare Shark (manga)|No. 47: Nightmare Shark]]".
  * This is the first "Number" monster used by Kyoji Yagumo whose number is not a multiple of 7.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|039|ref}}, specifically from the panel showing [[No. 23: Lancelot, Ghost Knight of the Underworld (manga)|this monster]] standing alongside Kyoji Yagumo.
