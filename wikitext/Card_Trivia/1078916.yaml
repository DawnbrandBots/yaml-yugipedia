title: Card Trivia:Theia, the Primal Being
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Theia|Theia]], the Greek goddess of sight and vision as well as the name of a [[Wikipedia:Theia (planet)|hypothesized planet]] in the early [[wikipedia:Solar System|Solar System]] that presumably collided with the Earth around 4.5 billion years ago, causing some of the resulting ejected debris to coalesce and form the [[wikipedia:Moon|Moon]].
  * This monster is a [[counterpart]] of "[[Nibiru, the Primal Being]]".
  ** Both share the same [[Level]] (11), [[Type]] ([[Rock]]), and [[original ATK and DEF]] (3000/600).
  ** Both have opposite [[Attribute]]s: this monster's Attribute is [[DARK]], while the Attribute of "Nibiru" is [[LIGHT]].
  ** Both were originally released as [[Prismatic Secret Rare]] [[TCG-only|World Premiere]] cards in a [[Mega-Tin]].
  ** This monster's effects are designed to work either in tandem or opposition with the effect of "Nibiru, the Primal Being".
  ** This monster closely resembles the "[[Primal Being Token]]" as well as the alternate artwork of "Nibiru, the Primal Being".
