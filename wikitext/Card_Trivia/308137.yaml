title: Card Trivia:CXyz Zubaba Saikyo General
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is the [[Ranked-Up]] "[[CXyz]]" form of "[[Zubaba General]]".
  ** This monster's name is based on ''saikyo'', the Japanese word for "strongest", referencing how this monster is an evolution of "Zubaba General". 
  *** This monster's name also references how it debuted in the ''[[Yu-Gi-Oh! D Team ZEXAL]]'' manga, which was printed in the ''[[Saikyō Jump]]'' magazine.
  * This is the first "CXyz" monster to debut outside the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This is also the first "CXyz" monster owned by a character ([[Yuma Tsukumo (D Team)|Yuma Tsukumo]]) who was not brainwashed by "[[Rank-Up-Magic Barian's Force]]".
  ** This is currently the only ''Yu-Gi-Oh! D Team ZEXAL''-exclusive card that has not been released in the ''[[OCG]]''/''[[TCG]]'' yet.
