title: Card Trivia:Amatsu-Okami of the Divine Peaks
wikitext: |-
  {{Navigation}}

  * "[[Noritoshi in Darkest Rainment]]" appears in this card's artwork, standing atop this monster's head.
  * This monster's name is based on the ''[[wikipedia:Amatsukami|Amatsukami]]'', the general term for ''kami'' residing in [[wikipedia:Takamagahara|Takamagahara]], a heavenly abode located in the sky.
  ** This monster's name and appearance is based on ''[[wikipedia:Kuraokami|Kuraokami]]'', the [[wikipedia:Shinto|Shinto]] deity of rain and snow, who is depicted as a giant white dragon.
