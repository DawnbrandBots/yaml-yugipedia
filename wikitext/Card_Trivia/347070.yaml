title: Card Trivia:Frightfur Bear
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Designer Frightfur]]", "[[Frightfur Factory]]", "[[Frightfur March]]", "[[Frightfur Parade]]", "[[Frightfur Reborn]]", and "[[Frightfur Repair]]".
  * This is the first [[Fusion Monster]] to be [[Fusion Summon]]ed in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster is similar to "[[Stuffed Animal]]", another monster based on a [[wikipedia:Teddy bear|teddy bear]] housing a destructive entity.
  * This is [[Sora Perse]]'s [[signature card]] in the ''Yu-Gi-Oh! ARC-V'' anime.
