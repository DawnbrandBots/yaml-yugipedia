title: Card Trivia:Reborn Tengu
wikitext: |-
  {{Navigation}}

  * "Tengu" (or "heavenly dogs") are a class of supernatural creatures found in Japanese folklore, art, theater, and literature. Although they take their name from a dog-like Chinese demon (Tiangou), the tengu were originally thought to take the forms of birds of prey, and they are traditionally depicted with both human and avian characteristics.
  * This monster carries a short sword (Wakizashi) and a long sword (Katana), similar to the samurai of Japanese tradition.
  * This card is the second [[TCG-only|TCG-exclusive]] card to be restricted in any way (after "[[Allure of Darkness]]"), and the first that was not the result of a mid-format change ("Allure" was [[Semi-Limited]] in [[May 2008 Lists|May 2008]]).
  ** It is also the first TCG-exclusive card, at the time, to be on the ''[[OCG]]'' [[March 2012 Lists (OCG)|Forbidden/Limited Lists]] before its release in ''[[Extra Pack 2012]]''.
