title: Card Trivia:Yad'al-Hecahands
wikitext: |-
  {{Navigation}}

  * "[[Hecahands Ibtel]]" appears in this card's artwork.

  * This card's name is derived from ''Yad al-Jauzā''' ("Hand of the [[wikipedia:Orion (constellation)|Orion]]"), the Arabic name of the star [[wikipedia:Betelgeuse|Betelgeuse]].
