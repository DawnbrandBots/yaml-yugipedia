title: Card Trivia:Contract with the Dark Master
wikitext: |-
  {{Navigation}}

  [[File:Dark_Master_Zorc_reveals_his_true_form.png|thumb|right|250|[[Dark Master Zorc]] transforming from his villager guise into his true form.]]

  * Both this card and "[[Dark Master - Zorc]]" use the base kana「闇の支配者」in their Japanese names; for this card, it is written as「やみのしはいしゃ」(''Yami no Shihaisha''), while for "Dark Master - Zorc" it is written as「ダーク・マスター」(''Dāku Masutā'').
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|052|ref}}, specifically from the panel showing [[Dark Master Zorc]] transforming from his villager guise into his true form in the ''[[Monster World]]'' game.

