title: Card Trivia:Asura Priest
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spirit Burner]]".
  * This monster is based on an [[wikipedia:Asura|asura]], a type of demonic being in [[wikipedia:Indian religions|Indian religions]] who are sometimes depicted as humanoid creatures with three pairs of arms.
  * This is the only card to feature the word "Priest" in its ''[[TCG]]'' name, as it is normally censored to avoid religious connotations. This part of the name was actually added in this context in addition to its Japanese name, "Asura".
