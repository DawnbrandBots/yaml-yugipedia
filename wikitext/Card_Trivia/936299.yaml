title: Card Trivia:Supreme King Dragon Lightwurm
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Wings of Light]]".
  * This card appears in the artwork of "[[Miracle of the Supreme King]]".
  * This monster is the [[LIGHT]] [[counterpart]] of "[[Supreme King Dragon Darkwurm]]" with an inverted [[original ATK and DEF]] (1200/1800).
  ** This monster's effect to [[Synchro Summon]] or [[Xyz Summon]] a "[[Supreme King Dragon]]" monster references how in {{episode|ARC-V|137|ref}} and {{episode|ARC-V|138|ref}}, Z-ARC uses two copies of "[[Supreme King Dragon Darkwurm (anime)|Supreme King Dragon Darkwurm]]" to Summon "[[Supreme King Dragon Clear Wing (anime)|Supreme King Dragon Clear Wing]]" and "[[Supreme King Dragon Dark Rebellion (anime)|Supreme King Dragon Dark Rebellion]]" as [[material]] during his opponents' turn.
