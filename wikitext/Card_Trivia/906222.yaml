title: Card Trivia:Roulette Spider
wikitext: |-
  {{Navigation}}

  * This card's effect is based on its effects in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where it could redirect an attack to any applicable target the arrow points at, including either player.
  ** This card's result of rolling a 1 that halves the user's [[Life Point]]s is based on this card's [[Activation condition|activation requirement]] in the ''Yu-Gi-Oh!'' anime, where the player must pay half their Life Points.
