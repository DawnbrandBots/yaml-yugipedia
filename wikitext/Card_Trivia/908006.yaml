title: Card Trivia:Ultimate Fusion
wikitext: |-
  {{Navigation}}

  * Three silhouettes of "[[Blue-Eyes White Dragon]]" appear in this card's artwork.
  ** This card's name and effect of [[Fusion Summon]]ing a [[Fusion Monster]] which mentions "Blue-Eyes White Dragon" or "[[Blue-Eyes Ultimate Dragon]]" in its text are a reference to {{episode|Yu-Gi-Oh!|178|ref}}, specifically to the scene where [[Yami Yugi]] [[Fusion Summon]]ed "[[Dragon Master Knight (anime)|Dragon Master Knight]]", declaring "Ultimate Fusion Summon" ({{Ruby|究|きゅう}}{{Ruby|極|きょく}}{{Ruby|融|ゆう}}{{Ruby|合|ごう}}{{Ruby|召|しょう}}{{Ruby|喚|かん}} ''Kyūkyoku Yūgō Shōkan''), during his Tag Team Duel with [[Seto Kaiba]] against [[Dartz]].
  *** Ironically, despite this card's name and artwork, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, Kaiba never declared "Ultimate Fusion" when he Summoned "[[Blue-Eyes Ultimate Dragon (anime)|Blue-Eyes Ultimate Dragon]]".
