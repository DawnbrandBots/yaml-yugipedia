title: Card Trivia:Ojama King
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Big March of Animals]]", "[[Dimension Explosion]]" and "[[Mecha Ojama King Transformation]]".
  * This card's [[Level]] and [[DEF]] is the combination of this card's [[Fusion Material]]s.
  * This monster is a physical amalgam of "[[Ojama Yellow]]", "[[Ojama Black]]", and "[[Ojama Green]]", as this monster features the eyes of "[[Ojama Yellow]]", the body and nose of "[[Ojama Black]]", and the mouth of "[[Ojama Green]]".
  * This is one of [[Chazz Princeton]]'s [[signature card]]s in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * In the ''[[Soul of the Duelist]]'' Spanish print of this card, the adjectives used for "Ojama Yellow" and "Ojama Black" refer to them as if they were females.
  * This monster has an [[Anime-only|anime-exclusive]] [[Machine]] counterpart: "[[Mecha Ojama King]]".
