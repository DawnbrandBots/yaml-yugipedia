title: Card Trivia:Sealmaster Meisei
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Talisman of Spell Sealing]]" and "[[Talisman of Trap Sealing]]".
  * This monster is based on [[wikipedia:Abe no Seimei|Abe no Seimei]], a real-world specialist of ''[[wikipedia:onmyōdō|onmyōdō]]'' during the [[wikipedia:Heian period|Heian period]] in [[wikipedia:Japan|Japan]].
  ** This monster's name, "Meisei", is an anagram of "Seimei".
