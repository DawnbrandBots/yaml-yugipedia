title: Card Trivia:Signal Warrior
wikitext: |-
  {{Navigation}}

  [[File:YuseiD-Wheel.jpg|thumb|right|300|''[[Yusei Go]]'', [[Yusei Fudo|Yusei]]'s [[Duel Runner]].]]

  * This monster is based on ''[[Yusei Go]]'', the [[Duel Runner]] used by [[Yusei Fudo]], as well as his helmet.
  ** This monster's Japanese name (シグナル, ''Shigunaru'') is a pun on the name of the [[Signer]]s (シグナー, ''Shiguna''), the team in which Yusei is a prominent member in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster's effects are based on "[[Speed World 2 (anime)|Speed World 2]]", a [[Field Spell Card]] used for [[Turbo Duel]]s in the second season of the ''Yu-Gi-Oh! 5D's'' anime.
  ** This monster's effect to place a [[Signal Counter]] on each [[face-up]] card in the [[Field Zone]] during each [[Standby Phase]] references the effect of "[[Speed World (anime)|Speed World]]" and "Speed World 2", which places a [[Speed Counter]] on their copy of both cards during the Standby Phase in a Turbo Duel.
  ** This monster's effects prevents itself from being [[destroyed]] by an opponent's card if it has a Signal Counter on it, referencing how the [[Speed World (series)|Speed World]] Field Spell Cards cannot be removed from the [[field]] during a Turbo Duel.
  * This monster is the "[[Warrior (archetype)|Warrior]]" [[counterpart]] of "[[Wheel Synchron]]", another monster based on ''Yusei Go''.
  ** This monster has the same [[original ATK and DEF]] (2400/1000) as the [[Monarch]] monsters, while "Wheel Synchron" has the same original ATK and DEF (800/1000) as the [[Vassal]] monsters.
