title: Card Trivia:Labrynth Cooclock
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Farewelcome Labrynth]]", "[[Labrynth Set-Up]]", and "[[Welcome Labrynth]]".
  * This monster is based on a [[wikipedia:Cuckoo clock|cuckoo clock]], a pendulum clock that strikes the hour with a sound like a [[wikipedia:Common cuckoo|common cuckoo's]] call and typically features a mechanical cuckoo that emerges with each note.
  * This card has the second smallest [[password]] value of all cards in the ''[[OCG]]''/''[[TCG]]'', after "[[Parallel Teleport]]".
