title: Card Trivia:Elemental HERO Air Neos
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strike of Neos]]''.
  * This monster appears in the artworks of "[[Dimension Explosion]]" and "[[Instant Contact]]".
  ** Oddly, in the artwork of "Instant Contact", this monster is depicted obscured and with its feathers colored white instead of pink.
  * This monster is a [[Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Air Hummingbird]]".
  * This monster has a ''[[Rush Duel]]'' [[counterpart]]: "[[Elemental HERO Sky Neos]]".
  * This is the only "[[Neos]]" Fusion Monster (from among the original six) that did not debut in the [[Yu-Gi-Oh! GX episode listing (season 2)|second season]] of the ''[[Yu-Gi-Oh! GX]]'' anime; instead, it first appeared in the third episode of the [[Yu-Gi-Oh! GX episode listing (season 3)|third season]], specifically {{episode|Yu-Gi-Oh! GX|107|ref}}, during [[Jaden Yuki]]'s [[Duel]] against [[Jesse Anderson]].
  * This card is notorious for not receiving any ''[[OCG]]''/''[[TCG]]'' reprint after ''Strike of Neos'' nor a digital release in newer video games. Also, the monster itself is visually obscured and even redesigned in the artwork of "Instant Contact".
  ** In 2025, it was speculated that the reason for this was that it was the subject of a copyright infringement lawsuit in 2008, where [[wikipedia:Beyond Comics|Beyond Comics]] sued against [[Konami]] Digital Entertainment Co., Nihon Ad Systems (NAS), [[4Kids Entertainment]], and [[Upper Deck Company]] (among other companies), claiming that this monster's design had unlawfully copied the design of its character Ravedactyl.<ref name="Lawsuit">{{cite web | url = https://trellis.law/doc/district/4831479/beyond-comics-inc-v-konami-corp | title = Legal Document: Beyond Comics Inc v Konami Corp | website = Trellis Law | accessdate = April 18, 2025}}</ref> However, there are a few facts that seem to contradict this:
  *** An [[Unlimited Edition]] reprint of ''[[Strike of Neos]]'' (the only [[booster pack]] this card was printed in) was made available via the English ''[[TCG]]'' reprint product ''[[Samurai Assault]]'', on December 6, 2011, which updated the text of this card to use the term "[[Extra Deck]]" instead of "[[Fusion Deck]]".
  *** It was obtainable and playable in ''[[Yu-Gi-Oh! Legacy of the Duelist: Link Evolution]]'', initially released in Japan on April 25, 2019, then released internationally on August 20, 2019.
  *** It is also unclear why this would not affect "Air Hummingbird", who shares design traits with this monster and thus could be seen as also infringing on Ravedactyl's design.
  ** This is the only "Neos" Fusion Monster that was not reprinted in ''[[Legendary Collection 2]]''.
  ** This monster, along with "[[Elemental HERO Neo Bubbleman]]", are the only "[[HERO]]" monsters that have yet to be [[reprint]]ed after the archetype's renaming from "Hero" to "HERO".
  * This monster was initially sketched by [[Hatsuki Tsuji]], a storyboard artist who worked on many ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' and ''[[Yu-Gi-Oh! GX]]'' episodes, including the ''GX'' episode where this monster debuted. This initial sketch was produced on or around June 28, 2006.

