title: Card Trivia:Astro Rescue
wikitext: |-
  {{Navigation}}

  * This monster has a similar appearance and name to "[[Astrosoldier]]".
  * This monster's name is a combination of ''Astronaut'' and ''Rescue'' or ''Rescuer''.
  ** This monster's art and effect both reflect its name: the art depicts an astronaut on a rope reaching out to someone's visible hand in need of rescue, and its effect lets the user "rescue" a [[Normal Monster]] from their [[Graveyard]].
