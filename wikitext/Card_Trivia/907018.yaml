title: Card Trivia:Sky Striker Ace - Azalea
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023 2nd Wave]]''.
  * This is the [[Monster Card]] version of [[Azalea]], a character in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This monster is named after the [[wikipedia:Azalea|azalea]], a red flower propagated by [[wikipedia:Cutting (plant)|cutting]], making them copies of the parent plant. This reflects how the character is a clone of [[Roze (manga)|Roze]] in the "[[Sky Striker Ace]]" arc of the ''Yu-Gi-Oh! OCG Stories'' manga.
  * This monster has an [[Card evolutions|upgraded]] form: "[[Sky Striker Ace - Azalea Temperance]]".
