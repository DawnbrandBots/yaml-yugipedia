title: Card Trivia:Endymion, the Mighty Master of Magic
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] counterpart of "[[Endymion, the Master Magician]]".
  * This is the [[cover card]] of ''[[Structure Deck R: Lord of Magician]]''/''[[Structure Deck: Order of the Spellcasters]]''.
  * This monster appears in the artwork of "[[Spell Power Mastery]]".
  * This card is named after the Greek mythological figure of [[wikipedia:Endymion (mythology)|Endymion]], who was beloved by the moon goddess Selene and put to sleep forever.
  * This monster has [[Spell Counter]]s on the ring around his back, in the center and ring of his staff, and attached to his robes.
  ** In total, there are 20 Spell Counters visible on this monster.
  * Currently, this card has the longest card text in the [[TCG]], with 181 words and 964 characters.
  ** For this reason, it is somewhat infamous among players and onlookers as a microcosm for how faster and more technical the game has become compared to its earlier eras.
