title: Card Trivia:Ariane the Labrynth Servant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Archfiend's Ghastly Glitch]]", "[[Labrynth Set-Up]]", and "[[Trap Holic]]".
  * This monster is based on a [[wikipedia:Maid|maidservant]] and [[wikipedia:Ariadne|Ariadne]], a girl in [[wikipedia:Greek mythology|Greek mythology]] who helped [[wikipedia:Theseus|Theseus]] escape the labyrinth of the [[wikipedia:Minotaur|Minotaur]] and whose name is spelled "Ariane" in French.
