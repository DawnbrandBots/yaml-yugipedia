title: Card Trivia:Fire Ant Ascator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ascator, Dawnwalker]]" and "[[Call of the Reaper]]".
  * This monster is based on the [[wikipedia:Fire ant|fire ant]], a species of red-colored ants known for their painful stingers, which are native to [[wikipedia:South America|South America]].
  ** This monster's name is also based on "''azcatl''", the Aztec word for "ant".
  ** This monster is also based on Azcatl, a giant red ant in [[wikipedia:Aztec mythology|Aztec mythology]] who was strong enough to carry a large kernel of corn.
  * This is the only monster from the [[Inca]] [[series]] that isn't based on a figure from [[wikipedia:Inca mythology|Inca mythology]], instead originating from Aztec mythology.
