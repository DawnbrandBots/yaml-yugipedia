title: Card Trivia:Descending Dragon of Clear Water
wikitext: |-
  {{Navigation}}

  * The dragon in this card's artwork appears in the artwork of "[[Dragon's Peak]]".
  * This Japanese term used for "Clear Water" (明鏡止水 ''Meikyōshisui'', lit. "Clear Mirror, Still Water") is a Japanese idiom that refers to a clear and undisturbed mind.
