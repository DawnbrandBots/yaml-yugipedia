title: Card Trivia:Shaddoll Zefranaga
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chosen of Zefra]]".
  * This monster is a "[[Zefra]]" transformed version of "[[Evilswarm Kerykeion]]" (who made up one half of ""[[Shaddoll Core]]").
  ** This card's Japanese name, "Ye Shaddoll - Sephiranaga" (イェシャドール－セフィラナーガ ''Yeshadōru - Sefiranāga''), is a reference to the name "[[wikipedia:Yeshua (name)|Yeshua]]", which means "salvation" in Hebrew.
  *** Fittingly, "Kerykeion" ascended after defeating "[[Sophia, Goddess of Rebirth]]" (as depicted in the artwork of "[[Sacred Serpent's Wake]]"), which is similar to [[wikipedia:Jesus Christ|Jesus Christ]].
  *** Also, the [[wikipedia:Book of Revelations|Book of Revelations]] tells of Jesus' Second Coming, which is similar to how "Kerykeion" returned during the war with the "[[Infernoid]]" monsters.
  ** However, this card's [[Level]], [[Type]], [[ATK]], and [[DEF]] are more similar to those of "[[Constellar Rasalhague]]", "Kerykeion's" original form.
  ** This card is named after the [[wikipedia:Nāga|nāga]], a deity or class of entity or being, taking the form of a very great snake.
  *** Fittingly, "Rasalhague" is based on the [[wikipedia:Ophiuchus (astrology)|Ophiuchus]], the "serpent-bearer".
  ** This monster also has the golden snake-like objects that were coiled around the body of "[[El Shaddoll Shekhinaga]]", before it was transformed into "[[El Shaddoll Anoyatyllis]]".
  * This card is a [[counterpart]] of "[[Qadshaddoll Keios]]".
  ** Both have the same Level, Type, ATK, and DEF, as well as opposite [[Attribute]]s.
  * This monster has the same purple sphere as "[[Qliphort Monolith]]" and "[[Infernoid Devyaty]]".
