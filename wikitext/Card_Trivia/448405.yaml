title: Card Trivia:Linkuriboh
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cynet Cascade]]", "[[Excess Lesser Linker]]", "[[One-Kuri-Way]]", and "[[You and A.I.]]".
  * This monster's design features a single [[Link Arrow]] is at the end of its tail, referencing its [[Link Rating]].
  * This card is the first "[[Kuriboh (archetype)|Kuri]]" [[Extra Deck]] monster.
  * This card has two "[[@Ignister]]"-related counterparts:
  ** A [[Link Monster]]: "[[Linguriboh]]".
  ** An [[Effect Monster]]: "[[Kurikurinku @Ignister]]".
  * This monster is used as the icon for the Cyberse Type in ''[[Yu-Gi-Oh! Legacy of the Duelist: Link Evolution]]''.
