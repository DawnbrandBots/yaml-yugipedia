title: Card Trivia:Hot Red Dragon Archfiend Bane
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[High-Speed Riders]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Hot Red Dragon Archfiend Abyss]]" and the second evolution of "[[Hot Red Dragon Archfiend]]".
  ** This monster's Japanese name, "Red Daemon Burial" (''Reddo Dēmon Beriaru'') is pronounced similarly to "[[wikipedia:Belial|Belial]]",  a term occurring in the [[wikipedia:Hebrew Bible|Hebrew Bible]]/[[wikipedia:Old Testament|Old Testament]] which later became personified as the [[wikipedia:Devil|Devil]] in Christian texts of the New Testament.
  ** This monster's English name, "Bane", is based on the definition describing something that is the source of death and destruction.
  ** The names of "Hot Red Dragon Archfiend's" evolutions are spelled in a consecutive alphabetic order, to symbolize the monster's growth: first there is "'''A'''byss", then this card, "'''B'''ane", and finally "[[Hot Red Dragon Archfiend King Calamity|King '''C'''alamity]]", which further underlines these monsters' status as consecutive evolution steps.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! 5D's - Ride SP2|ref}}, specifically from the panel showing [[Red Dragon Archfiend Burial|this monster]] being Summoned.
