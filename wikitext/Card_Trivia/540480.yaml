  [[File:Mahado_attacks_Bakura.png|thumb|right|250|[[Mahado (manga)|Mahado]] attacks [[Bakura, King of Thieves (manga)|Bakura]].]]

  * "[[Dark Magician]]" appears in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|293|ref}} showing where the [[Mahado (manga)|Mahado]]-infused "[[Magus of Illusion]]" attacking [[Bakura, King of Thieves (manga)|Bakura]].
  * This card's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Dark Magician" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].

