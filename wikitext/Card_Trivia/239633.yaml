title: 'Card Trivia:Number 106: Giant Hand'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * The number "106" appears on this monster's wrist, with the number 6 obscured by this monster's fingers.
  * This is the first "[[Number 10X]]" monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This monster has a [[Ranked-Up]] "[[Number C10X]]" form: "[[Number C106: Giant Red Hand]]".
  ** While this monster is based on a right hand, "Number C106: Giant Red Hand" is based on an undefined hand, having two thumbs and two index fingers.
  * This monster has the lowest [[original ATK]] (2000) of all "Number 10X" monsters.
  * This is the [[signature card]] of [[Girag]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[detach]]es an [[Xyz Material]], it absorbed it into the middle eye-like part. Then, a drill emerges from the forefinger and drills into the opponent's monster.
