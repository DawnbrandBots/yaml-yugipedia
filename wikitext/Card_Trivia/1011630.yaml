title: Card Trivia:Outstanding Dog Mary
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Poodle|poodle]], a breed of [[wikipedia:Dog|domestic dog]] known for their distinctively thick and curly coat.
  * This monster shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (1) and [[original ATK and DEF]] (100/100) with "[[Outstanding Dog Marron]]", which is supported by this monster's effect.
