title: Card Trivia:World Soul - Carbon
wikitext: |-
  {{Navigation}}

  * This monster features several references to the chemical element, [[wikipedia:Carbon|carbon]].
  ** The design of the halo above this monster's head is based on the atomic structure of carbon.
  ** The hexagonal patterns featured on this monster's arms and on the hilt of its weapon are based on the hexagonal structure of [[wikipedia:Graphite|graphite]], which is made purely of carbon.
  ** This monster's [[original ATK and DEF]] (1200/1200) are based on the [[wikipedia:Mass number|mass number]] of the most common isotope of carbon, which is 12.
