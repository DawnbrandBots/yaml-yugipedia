title: Card Trivia:Superheavy Samurai General Coral
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Superheavy General San-5" (サン－５ ''San-Go'') is a pun on "''sango''" (珊瑚), the Japanese word for "coral".
  * This monster, along with "[[Superheavy Samurai General Jade]]", are the first "[[Superheavy Samurai]]" [[Pendulum Monster]]s.
