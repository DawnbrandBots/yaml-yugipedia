title: Card Trivia:Todoroki the Earthbolt Star
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "''todoroki''", the Japanese word meaning "roar" or "rumble", which is often associated with the sound of thunder.
  ** Fittingly, in {{episode|ARC-V|042|ref}}, this monster is used to [[Fusion Summon]] "[[Raijin the Breakbolt Star (anime)|Raijin the Breakbolt Star]]", a monster based on the [[wikipedia:Raijin|Shinto deity of thunder and storms]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' Fusion Summoning [[Quick Effect]] is based on "[[Frontline Fusion]]", a [[Quick-Play Spell Card]] used by [[Nagi]] to Fusion Summon "Raijin the Breakbolt Star" during the [[Battle Phase]] in the above-mentioned episode.
