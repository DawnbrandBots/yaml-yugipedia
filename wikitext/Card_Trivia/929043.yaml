title: Card Trivia:Metarion Ashurastar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Imaginary Arc Turnback]]".
  * This monster is named after an [[wikipedia:Asura (Buddhism)|Asura]], a six-armed and multi-faced titan in Buddhism.
  * This is the first [[Cyborg]] [[Type]] monster.
  * This is the first [[Level 9 Monster Cards|Level 9]] monster in ''[[Yu-Gi-Oh! Rush Duel]]''.
  * This is the first [[Fusion Monster]] to be [[Fusion Summon]]ed, as well as the first monster [[Special Summoned]] from the [[Extra Deck]], in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
  ** This is also one of the first Fusion Monsters, as well as one of the first monsters in the Extra Deck, to be printed in ''Rush Duel''.
  * This is the [[signature card]] of [[Yuo Goha]] in the ''Yu-Gi-Oh! SEVENS'' anime.
