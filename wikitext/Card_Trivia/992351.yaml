title: Card Trivia:Sinful Spoils of Subversion - Snake-Eye
wikitext: |-
  {{Navigation}}

  * This object appears in the artworks of "[[Original Sinful Spoils - Snake-Eye]]" and "[[Divine Temple of the Snake-Eye]]".
  ** The artwork of "Original Sinful Spoils - Snake-Eye" depicts "[[Snake-Eyes Poplar]]" emerging from this object after the defeat of "[[Snake-Eyes Flamberge Dragon]]".
  ** "Poplar", "Flamberge Dragon", and their other upgraded counterparts bear this object on their foreheads.
  * This card is possibly a reference to [[wikipedia:Medusa|Medusa]], a female human-like creature from [[wikipedia:Greek mythology|Greek mythology]] who is known for having venomous snakes for hair, and the ability to turn anyone who looks at her to stone.
  ** This card's effect references the curse of Medusa's gaze, as this card places a monster in the controller's [[Spell & Trap Zone]] [[negate]]s their effects and renders them unable to attack, similar to how Medusa's victims would be turned to stone, visible but unable to move or do anything, essentially putting them in a form of stasis.
