title: Card Trivia:Gazer Shark
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is likely a mistranslation of the word "[[wikipedia:Geyser|geyser]]", a hot spring in which water intermittently boils and sends a tall column of water and steam into the air, which are discharged from this monster's body.
  ** The geyser usually causes water to erupt from underground, which reflects this monster's effect to [[Special Summon]] the two [[Level 5]] [[WATER]] monsters from the [[Graveyard]].
