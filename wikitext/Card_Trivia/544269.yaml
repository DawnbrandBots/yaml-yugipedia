title: Card Trivia:The Weather Painter Rain
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[The Weather Forecast]]", "[[The Weather Rainbowed Canvas]]", and "[[The Weather Rainy Canvas]]".
  * This card's Japanese name, "Lazula", is a reference to the [[wikipedia:Lapis Lazuli|Lapis Lazuli]], a semiprecious stone formerly used to make blue pigment.
