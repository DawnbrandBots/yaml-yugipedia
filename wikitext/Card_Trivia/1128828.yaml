title: Card Trivia:Magmacho Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name is the portmanteau of the words "[[wikipedia:Magma|magma]]" and "[[wikipedia:Machismo|macho]]".
  ** "Magma" is a molten or semi-molten from within the Earth's crust that forms into lava or [[wikipedia:Igneous rocks|igneous rocks]], which reflects this monster's fiery motif.
  ** "Macho", short for "machismo", describes strong or aggressive masculine pride, usually in the form of a muscular body, which reflects this monster's muscular appearance.
  *This card bares a similar appearance to “[[Magna Drago]]” visually and almost counter-mirrors its position.
