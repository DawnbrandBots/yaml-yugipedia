title: Card Trivia:Scarlight Red Dragon Archfiend
wikitext: |-
  {{Navigation}}

  * This is the cover card of ''[[Dimension of Chaos]]''.
  ** This is also the first cover card in the 9th series of Booster Packs to not be a member of the [[Four Dimension Dragons]] or an evolution of "[[Odd-Eyes Pendulum Dragon]]".
  ** This is also the last card to be released as a [[Ghost Rare]] in ''[[TCG]]'' for almost 5 years until the release of ''[[Legendary Duelists: Rage of Ra]]''.
  * This monster appears in the artwork of "[[Red Connection]]".
  * This is [[Jack Atlas (ARC-V)|Jack Atlas]]' [[signature card]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster appears to be an aged/scarred version of "[[Red Dragon Archfiend]]", noting its broken horn and one of its wrists seemingly bound in a ribcage-esque cast.
  ** This monster's design is inspired by the final Duel of ''[[Yu-Gi-Oh! 5D's]]'', where "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" and "[[Junk Warrior (anime)|Junk Warrior]]" battled using their fists, but the former was destroyed by the latter's [[Attack name|Scrap Fist]].<ref>[http://neoarkcradle.net/forum/showthread.php?tid=5032&pid=276682#pid276682 neoarkcradle.net] Scarlight Red Dragon Archfiend design</ref>
  *** Furthermore, its effect could be a reference to its continuing rivalry with "Junk Warrior". Since the anime effect of "Junk Warrior" is portrayed as a [[Continuous Effect]], this monster could [[destroy]] most of the [[Level]] 2 or lower monsters commonly used to increase the [[ATK]] of "Junk Warrior" and overcome it in [[battle]].
  * This card's English name is likely a pun on the word "[[wikipedia:scarlet (color)|scarlet]]", referring to a deep [[wikipedia:Tints and shades|shade]] of [[wikipedia:red|red]].
  ** It could also be a reference to the Japanese name of "[[Red Nova Dragon]]", which is "Scar-Red Nova Dragon".
  ** Another possible pun is that the "Scar-Right" in this monster's name is that its ''right'' wrist has been ''scarred'', as indicated by the cast-like binding on it. Also, its ''right'' horn has been ''scarred''/broken.
  ** In addition, it may also be a play on the word "[[wikipedia:starlight|starlight]]", with which it differs in only one letter.
  * This monster has an evolved form: "[[Tyrant Red Dragon Archfiend]]".

