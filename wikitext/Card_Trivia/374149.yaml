title: Card Trivia:Protector with Eyes of Blue
wikitext: |-
  {{Navigation}}

  * Just as "[[Maiden with Eyes of Blue]]" represents [[Kisara]], this monster (along with "[[Master with Eyes of Blue]]" and "[[Sage with Eyes of Blue]]") may represent one of the other three "[[Blue-Eyes White Dragon]]" [[Ka|spirit]] holders.
  * This monster appears in the artwork of "[[Mausoleum of White]]".
