title: Card Trivia:Synchro Deflector
wikitext: |-
  {{Navigation}}

  * "[[Junk Warrior]]", "[[Saggi the Dark Clown]]", and "[[XYZ-Dragon Cannon]]" appear in this card's artwork.
  ** Both "Saggi the Dark Clown" and "XYZ-Dragon Cannon" are monsters used by [[Seto Kaiba]].
  * The lore of this card's ''[[The Duelist Genesis]]'' print is not formatted as "full justify" (i.e. the lore text does not have an even boundary for the left margin as well as the right margin).
  * This card and "[[Respect Synchron]]" are the only "[[Synchron]]" cards that are [[Trap Card]]s.
