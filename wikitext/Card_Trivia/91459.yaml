title: Card Trivia:Winged Dragon, Guardian of the Fortress 2
wikitext: |-
  {{Navigation|Winged Dragon, Guardian of the Fortress #2}}

  * This card's ''[[OCG]]'' name is based on a [[wikipedia:wyvern|wyvern]], a legendary dragon featuring two legs and wings, which is used in various European folklore and heraldry.
  * This card is the [[recolored counterpart]] of "[[Winged Dragon, Guardian of the Fortress 1|Winged Dragon, Guardian of the Fortress #1]]", with 200 less [[ATK]] and [[DEF]].
  ** Despite this card's name and draconic appearance, this monster's [[Type]] is a [[Winged Beast]] rather than a [[Dragon]].
  ** In Italian, this card is named "Dragone Alato, Custode della Fortezza #2"; however, "[[Winged Dragon, Guardian of the Fortress 1|Winged Dragon, Guardian of the Fortress #1]]" is simply named "Drago Alato #1".
