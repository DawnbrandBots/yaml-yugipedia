title: Card Trivia:Zombie Tiger
wikitext: |-
  {{Navigation}}

  * "[[Decayed Commander]]" appears in this card's artwork.
  ** This reflects how the effect of "Decayed Commander" allows you to [[Special Summon]] this card.
  * This monster's skull appears in the artworks of "[[Zombie World]]" and "[[Return of the Zombies]]".
  * This is the only [[Zombie]]-[[Type]] [[Union monster]].
