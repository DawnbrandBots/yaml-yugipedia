title: Card Trivia:Prediction Princess Tarotrei
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Underworld Ritual of Prediction]]".
  * This monster's name is a portmanteau of "[[wikipedia:Tarot|tarot]]" (the type of card used in [[wikipedia:Divination|divination]]) and the Japanese word for "spirit" (霊, ''rei'').
  * This monster has a [[DARK]] counterpart: "[[Prediction Princess Tarotreith]]".
  ** This monster's [[original ATK and DEF]] (2700/1200) is an inverse of the original [[ATK]] and [[DEF]] (1200/2700) of "Tarotreith".
  * This is the first [[Ritual Monster]] to be [[Ritual Summon]]ed in ''[[Yu-Gi-Oh! ARC-V]]''.
