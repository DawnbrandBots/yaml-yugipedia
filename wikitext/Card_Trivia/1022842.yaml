title: Card Trivia:Celeb Blade - Death Wild
wikitext: |-
  {{Navigation}}

  * The lance in this card's artwork appears in the artwork of "[[Can You Celeb Blade]]".
  * This card, along with "[[Celeb Blouse - Death One Shoulder]]", "[[Celeb Brace - Death Wise]]", and "[[Celeb Robe - Death Wind]]", contain a pun on "desu wa" (ですわ) in their names, which is a suffix that's typically used at the end of sentences by snobbish and high-class women, reflecting [[Yuna Goha]]'s character.
