title: Card Trivia:Flower Cardian Paulownia with Phoenix
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fraud Check]]" and "[[Recardination]]".
  * "[[Fenghuang]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Paulownia with Phoenix", one of the special cards in the "Paulownia" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (12) references how the "Paulownia with Phoenix" card falls under the month of December, the twelfth month of the year.
  ** This monster's [[original ATK and DEF]] (2000/2000) references how the "Paulownia with Phoenix" card is a ''hikari'' card, which is worth twenty points.
