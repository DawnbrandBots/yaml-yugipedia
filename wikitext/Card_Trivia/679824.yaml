title: Card Trivia:Lib the World Key Blademaster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Starry Dragon's Cycle]]" and "[[The World Legacy]]".
  * "[[World Legacy - "World Key"]]" appears in this card's artwork.
  * "[[Crowned by the World Chalice]]" → "[[Ib the World Chalice Priestess]]" → "[[Knightmare Corruptor Iblee]]" → "[[Galatea, the Orcust Automaton]]" → "[[Ib the World Chalice Justiciar]]" → "Lib the World Keymaster"
  ** This monster is "Ib the World Chalice Justiciar" after she was revived by "[[Avida, Rebuilder of Worlds]]", who also entrusted her "World Legacy - World Key"; she later undertook a journey to seal "World Key" and prevent the battle for its power from occurring again.
  ** This monster is wearing the scarf of [[Beckoned by the World Chalice|Girsu]], her older brother, whom would be reborn following the climax of the ''[[World Legacy]]'' storyline as "[[Girsu, the Orcust Mekk-Knight]]".
