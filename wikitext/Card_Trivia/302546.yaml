title: 'Card Trivia:Number C9: Chaos Dyson Sphere'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster is the "[[Number C]]" [[Card evolutions|upgraded]] form of "[[Number 9: Dyson Sphere]]", though it also has many contrasting traits to "Dyson Sphere" as well.
  ** Both can deal direct damage to the opponent, with "Number 9: Dyson Sphere" doing so through its effect to [[Direct attack|attack directly]], and this monster doing so via its it two effects to deal [[effect damage]] based on the amount of [[Xyz Material]]s attached or detached.
  ** "Number 9: Dyson Sphere" can negate attacks while it has an Xyz Material attached, while this monster can battle an opponent's monster to attach it to itself as material.
  ** The contrasts between "Number 9: Dyson Sphere" and this monster are further emphasized in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime:
  *** "[[Number 9: Dyson Sphere (anime)|Number 9: Dyson Sphere]]" is a [[LIGHT]] monster and the largest "[[Number]]" monster, appearing as a massive mechanical space colony that dwarfed the Sun in its sealed form and was capable of encircling the Sun once unsealed. [[Number C9: Chaos Dyson Sphere (anime)|This monster]] is a [[DARK]] monster and the largest "[[Number C]]" monster, depicted at a similar size with a more organic and otherworldly appearance.
  *** "Number 9: Dyson Sphere" has an effect to negate attacks that [[target]] it; this monster, when [[Xyz Summon]]ed by [[Rank-Up|Ranking Up]] "Number 9: Dyson Sphere", has an effect that forces the opponent's monsters to attack it.
  *** The Overlay Units of "Number 9: Dyson Sphere" flow through this monster's panels, rather than orbiting the monster like most Xyz Monsters; when this monster is Xyz Summoned, it does not appear from an [[Overlay Network]], with its Chaos Overlay Units instead circling the atmosphere of the [[Earth (planet)|Earth]] before dissipating, followed by a red glow surrounding the Earth's atmosphere.
  * This is the only "Number C" monster to have its [[Attribute]] changed when it was released in the ''[[OCG]]''/''[[TCG]]''.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this is the only "Number C" monster to not successfully attack or activate an effect.
