title: Card Trivia:Coach King Giantrainer
wikitext: |-
  {{Navigation}}

  * This monster has a "[[CXyz]]" [[Card evolutions|evolution]]: "[[CXyz Coach Lord Ultimatrainer]]".
  * This is the first [[Monster Card]] in the ''[[OCG]]''/''[[TCG]]'' to feature an effect with an explicitly written limit of three activations per turn.
  ** This is also the first card to use the word "thrice" rather than "3 times".
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster's [[Attribute]] was [[EARTH]], but was later changed to [[FIRE]] upon its release in the ''OCG''/''TCG''.
