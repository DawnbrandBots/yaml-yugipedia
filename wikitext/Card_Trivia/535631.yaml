title: Card Trivia:Flash of the Forbidden Spell
wikitext: |-
  {{Navigation}}

  * As its name suggests, this card is a much weaker [[counterpart]] to "[[Raigeki]]".
  * Part of this card's Japanese name appears in this card's artworks in the form of the thunderbolts, specifically the kanji for "sealed magic" (封魔).
  * The background of this card's artwork is a heavily edited version of the artwork of "[[Spatial Collapse]]", as can be seen [[:File:FlashoftheForbiddenSpell-Trivia.png|here]].
  * This card has a [[counterpart]] for [[Spell]]/[[Trap Card]]s: "[[Straight Flush]]".
  ** Both cards were released in ''[[Cyberdark Impact]]''.
