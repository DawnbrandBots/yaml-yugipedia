title: Card Trivia:Watapon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Pixie Ring]]" and "[[World of Spirits]]".
  ** A stone tablet of this monster appears in the artwork of "[[Wedju Temple]]".
  * This monster has a [[Tuner monster|Tuner]] counterpart: "[[Hanewata]]".
  * This monster seems to be a [[counterpart]] to "[[Kuriboh]]":
  ** They have a similar appearence.
  ** They are both used by [[Yami Yugi]].
  ** This monster is [[LIGHT]], while "Kuriboh" is [[DARK]].
  ** This monster is [[Fairy]], while "Kuriboh" is [[Fiend]].
  ** This monster's [[ATK]] and [[DEF]] are the inverse of those of "Kuriboh".
