title: Card Trivia:Beebee Down
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's Japanese name, "Surprise Hatch - BB Down" (ビックリハッチ・ビービーダウン, ''Bikkurihatchi Bībīdaun'') contain several puns:
  ** "Surprise Hatch" (ビックリハッチ, ''Bikkurihatchi'') is a portmanteau of the Japanese words "surprised" (ビックリハ, ''bikkuriha'') and "hatch" (ハッチ, ''hatchi'').
  *** The Japanese word "''hatchi''" is homophonic with "''hachi''", the Japanese word for "bee". Fittingly, this card's artwork depicts a swarm of robotic bees emerging from a honeycomb-shaped hatch.
  ** "BB Down" (ビービーダウン ''Bībīdaun'') is a portmanteau of the words "[[wikipedia:BB gun|BB gun]]" and "down", which reflects this card's [[ATK]]-decreasing effect.
  *** The English letter "B" is homophonic with the word "bee" and is used to initialize the [[wikipedia:Ball (bearing)|bearing balls]] used primarily as ammunition for a BB gun. Fittingly, this card's artwork depicts the swarm of robotic bees shooting glowing bearing balls.
