title: Card Trivia:Igknight Squire
wikitext: |-
  {{Navigation}}

  * This card's name is derived from the [[wikipedia:.44 Magnum|.44 Magnum]] rounds which were originally designed for [[wikipedia:Revolver|revolvers]], but later adapted to [[wikipedia:carbine|carbines]] and [[wikipedia:rifle|rifles]].
  ** The card's International name is derived from the [[wikipedia:squire|squire]]. an apprentice or trainee knight. This is fitting, as this monster has the lowest ATK of the "[[Igknight]]s".
  * A magnum cartridge is a firearms cartridge larger than, or derived from, a similar cartridge. A magnum firearm is one using such a cartridge. Although the term "magnum" can be use to describe a cartridge of rifles and [[wikipedia:shotgun|shotguns]] that uses more powder inside the cartridges or shells than regular loads.
  * This monster appears in the artwork of "[[Ignition Phoenix]]" and "[[Oops!]]".
