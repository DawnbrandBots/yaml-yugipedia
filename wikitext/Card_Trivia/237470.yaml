title: Card Trivia:Imairuka
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ryu-Ge Realm - Sea Spires]]".
  * This monster's name is a portmanteau of ''Iruka'' (イルカ, "dolphin") and the phrase ''Ima iru ka?'', which translates to "Where am I now?".
  ** Fittingly, this monster has a confused expression, most likely due to the unfamiliar location of the background in this card's artwork.
  * This monster has a [[counterpart]]: "[[Minairuka]]".
  ** Unlike "Minairuka", this is a [[Sea Serpent]] monster instead of a [[Fish]] monster, which is a [[Type]] associated with dolphins.
  *** However, this monster's Sea Serpent Type is likely due to it having extra fins similar to an [[wikipedia:Ichthyosaur|ichthyosaur]], a sea reptile that lived alongside dinosaurs during the [[wikipedia:Mesozoic|Mesozoic Era]].
  * This monster has a ''[[Rush Duel]]'' counterpart: "[[Light Dolphin]]".
