title: Card Trivia:Meklord Emperor Wisel - Synchro Absorption
wikitext: |-
  {{Navigation}}

  [[File:Meklord Emperor Wisel eqiped with stardust.jpg|thumb|"Meklord Emperor Wisel" equipped with "Stardust Dragon".]]

  * This monster is a [[retrained]] [[signature move]] counterpart of "[[Meklord Emperor Wisel]]".
  ** This monster and "Meklord Emperor Wisel" have the highest [[original ATK and DEF]] (2500/2500) of all [[Level 1]] monsters.
  * Visually, this monster is "Meklord Emperor Wisel", upgraded with "[[Wisel Guard 3 (anime)|Wisel Guard 3]]", "[[Skiel Carrier 5 (anime)|Skiel Carrier 5]]", and [[equip]]ped with "[[Stardust Dragon]]".
  ** This monster is based on its appearance in {{episode|5D's|108|ref}}, in which [[Primo]] modified "[[Meklord Emperor Wisel (anime)|Meklord Emperor Wisel]]" with its upgraded parts and some "[[Skiel]]" cards he stole from [[Lester]], and equipped it with "[[Stardust Dragon (anime)|Stardust Dragon]]", during his [[Turbo Duel]] against [[Yusei Fudo]].
  ** This monster's second effect to prevent the opponent's monster from attacking is possibly a reference to the effect of "Skiel Carrier 5", which can [[negate]] an attack once per turn.
  ** This monster's [[Quick Effect]] is based on the effect of "Stardust Dragon", which can [[Tribute]] itself to negate the [[activate|activation]] of a destructive card effect and [[destroy]] that card.

