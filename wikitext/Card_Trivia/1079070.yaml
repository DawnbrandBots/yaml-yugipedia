title: Card Trivia:Speedroid Colonel Clackers
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Clackernel" (クラッカーネル, ''Kurakkāneru''), is a portmanteau of "[[wikipedia:Nutcracker doll|nutcracker]]", "[[wikipedia:Clackers|clackers]]", and "[[wikipedia:Colonel|colonel]]".
  ** This monster is based on the nutcracker, a decorative nutcracker figure designed to resemble a toy soldier. In particular, this monster's outfit is designed to resemble the [[wikipedia:Uniforms of the Union Army|uniform]] worn by the colonel of the [[wikipedia:Union Army|Union Army]] during the [[wikipedia:American Civil War|American Civil War]].
  ** This monster's toy is based on the [[wikipedia:Clackers#Revival|redesigned version]] of the clackers, a plastic toy consisting of a handle with two different colored triangles and weighted balls at the end, known for making a "clack!" sound when swung and striking each other.
  *** The red and blue spheres on this monster's clackers toy are based on the [[Pendulum Scale]], reflecting its status as a [[Pendulum Monster]].
