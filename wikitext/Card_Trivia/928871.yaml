title: Card Trivia:Emperor Tanuki's Critter Count
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Hinamatsuri|dairi-bina]]'' dolls of the [[wikipedia:Emperor of Japan|Japanese Emperor]] and [[wikipedia:Empress of Japan|Empress]] used in the ''[[wikipedia:Hinamatsuri|Hinamatsuri]]'' festival.
  ** Fittingly, this monster was revealed on [https://twitter.com/YuGiOh_OCG_INFO/status/1499353897852456965 Twitter] on March 3, the day of the ''Hinamatsuri'' festival in [[wikipedia:Japan|Japan]].
  ** This monster's Japanese name, 「お{{Ruby|代|だい}}{{Ruby|狸|り}}{{Ruby|様|さま}}の{{Ruby|代|かわ}}{{Ruby|算|ざん}}{{Ruby|様|よう}}」 (''Odairisama no Kawazanyō''), features multiple puns:
  *** 「お{{Ruby|代|だい}}{{Ruby|狸|り}}{{Ruby|様|さま}}」 (''Odairisama'') is a homophone of 「お{{Ruby|内|だい}}{{Ruby|裏|り}}{{Ruby|様|さま}}」 (''odairisama''), the formal name for the ''dairi'' doll in the ''dairi-bina'' dolls. The name is a [[wikipedia:Metonymy|metonym]] for the Japanese court, derived from 「{{Ruby|内|だい}}{{Ruby|裏|り}}」 (''Dairi''), the Japanese name of the [[wikipedia:Inner Palace (Dairi)|Inner Palace]].
  **** 「狸」 also means ''tanuki'' (たぬき), the term for the [[wikipedia:Japanese raccoon dog|Japanese raccoon dog]], which is reflected in this monster's raccoon-like appearance and the Japanese proverb 「{{Ruby|捕|と}}らぬ{{Ruby|狸|たぬき}}の{{Ruby|皮|かわ}}{{Ruby|算|ざん}}{{Ruby|用|よう}}」 (''toranu tanuki no kawazan'yō''), as stated below.
  **** 「{{Ruby|代|だい}}{{Ruby|狸|り}}」 (''Dairi'') is also a homophone of 「{{Ruby|代|だい}}{{Ruby|理|り}}」 (''dairi'', "proxy" or "substitute"), which is reflected by this monster's effect to allow the player to [[send]] a monster from their [[Extra Deck]] to the [[Graveyard]] as a "substitute" for this monster to [[Tribute]] if they would [[Ritual Summon]] a [[Ritual Monster]].
  *** 「{{Ruby|代|かわ}}{{Ruby|算|ざん}}{{Ruby|様|よう}}」 (''Kawazan'yō'') is a homophone of 「{{Ruby|皮|かわ}}{{Ruby|算|ざん}}{{Ruby|用|よう}}」 (''kawazan'yō'', "wishful thinking", lit. "skin counting"), a reference to the Japanese proverb 「[[wiktionary:捕らぬ狸の皮算用|捕らぬ狸の皮算用]]」 (''toranu tanuki no kawazan'yō''), which literally means "counting the skins of uncaught raccoon dogs", and figuratively means "do not count your chickens before they are hatched".
  *** The characters 「代」 and 「様」 are featured in both 「お{{Ruby|代|だい}}{{Ruby|狸|り}}{{Ruby|様|さま}}」 (''Odairisama'') and 「{{Ruby|代|かわ}}{{Ruby|算|ざん}}{{Ruby|様|よう}}」 (''Kawazan'yō''), but are read in different ways to fit the various word plays, making for a visual rhyme.
  * This monster's Simplified Chinese name (狸猫大人换天子) is a reference to the Chinese folk tale, ''[[wikipedia:The Crown Prince Replaced by a Cat (Chinese tale)|The Crown Prince Replaced by a Cat]]''.
