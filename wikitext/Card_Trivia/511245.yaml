title: Card Trivia:Second Coin Toss
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" and the man from the artworks of "[[Goblin Out of the Frying Pan]]" and "[[Return (card)|Return]]" appear in this card's artwork.
  ** This card's artwork is an ironic role reversal of "[[Upstart Goblin]]", in which "Goblin of Greed" is dropping coins for a human to pick up.
