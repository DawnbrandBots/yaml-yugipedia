title: Card Trivia:Buster Blaster
wikitext: |-
  {{Navigation}}

  * This monster's design features a similar aesthetic with the "[[T.G.]]" [[archetype]], both of which are used by [[Antinomy]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This is the first [[Union monster]] to appear in the ''Yu-Gi-Oh! 5D's'' anime.
  * In the anime, when this monster is [[equip]]ped to a monster, its head and hands recede into its body and its chest and legs are pushed together to form a cannon. The equipped monster then holds this monster by using its shoulder attachments as handles.
