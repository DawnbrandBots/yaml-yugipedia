title: Card Trivia:Firestorm Prominence
wikitext: |-
  {{Navigation}}

  * This card's [[EARTH]], [[WATER]], [[WIND]], [[DARK]] and [[LIGHT]] [[counterpart]]s are "[[Raging Earth]]", "[[Silent Abyss]]", "[[Destruction Cyclone]]", "[[Umbral Soul]]" and "[[Radiant Spirit]]", respectively. Their effects apply to their respective attributes.
  * This monster is based off of a [[wikipedia:crocodile|crocodile]].
  * The Spanish name of this card was printed as "'''''Prominenencia''' de la Tormenta de Fuego''" instead of "'''''Prominencia''' de la Tormenta de '''Fuego'''''". Moreover, on the Spanish section of the ''Yu-Gi-Oh!'' Card Database website, it appears as ""'''''Prominenencia''' de la Tormenta de '''Feugo'''''"
