title: Card Trivia:Dust Tornado
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Psychic Wave]]".
  * This card has combined variations with other members of the [[Cyclone (series)|Cyclone series]]:
  ** "[[Heavy Storm]]": "[[Heavy Storm Duster]]".
  ** "[[Hey, Trunade!]]": "[[Double Dust Tornado Twins]]".
  * This card's name reflects its effect to "blow away" an opponent's [[Spell]]/[[Trap Card]] and, once the tornado recedes, allows another to fall from the player's hand.
  * In this card's appearances throughout the various anime series, this card's second effect to [[Set]] a Spell/Trap Card was never used.
