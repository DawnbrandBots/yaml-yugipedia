title: Card Trivia:Performapal Thunderhino
wikitext: |-
  {{Navigation}}

  * The Japanese pronunciation of this card's name is a portmanteau of "thunderclap" (ジンライ ''Jinrai'') and "rhino" (ライノ ''Raino'').
  ** Fittingly, this monster's design features a ring of [[wikipedia:Den-den daiko|''Den-den daiko'' drums]] with ''[[wikipedia:Tomoe|tomoe]]'' symbols, which is commonly used as iconography for [[wikipedia:Raijin|Raijin]], the [[wikipedia:Shinto|Shinto]] deity of the lightning and thunder.
