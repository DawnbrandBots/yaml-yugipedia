title: Card Trivia:Gem-Merchant
wikitext: |-
  {{Navigation}}

  * This monster's face/head bears a very strong resemblance to the Black Mages of Final Fantasy, especially [[wikipedia:Vivi (Final Fantasy)|Vivi]] from [[wikipedia:Final Fantasy IX|Final Fantasy IX]].
  * This monster could be seen as an [[Earth]] [[Normal Monster]] counterpart to [[Honest]] as they both boost the [[ATK]] of a monster of a specific [[attribute]] during the damage step.
  ** The major differences is that this monster has a fixed atk-boost and the target monster must be a Normal Monster.
  * This card is the only "[[Gem-]]" support monster whose [[Type]] is not [[Rock]].
  ** It is also the only one not based on an animal.
