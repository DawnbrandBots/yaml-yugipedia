title: Card Trivia:Guardian Sphinx
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Legacy Volume.5]]''.
  * This monster appears in the artwork of "[[Ordeal of a Traveler]]".
  * This card appears in the artwork of "[[Impact Flip]]".
  * This monster is based on the [[wikipedia:Great Sphinx of Giza|Great Sphinx of Giza]], the statue of a reclining [[wikipedia:Sphinx|sphinx]] depicted with the head of a human and the body of a lion, albeit in a more exaggerated and undamaged appearance.
  ** This monster's name references how the Egyptian sphinx is often regarded as the guardian of temples and tombs. This is further reflected in this monster's [[original DEF]] (2400) and effect to guard the player by [[return]]ing the opponent's monsters back to the [[hand]].
  * This monster has an upgraded version: "[[Pharaonic Guardian Sphinx]]".
