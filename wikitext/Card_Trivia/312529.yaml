title: Card Trivia:Spiritual Beast Cannahawk
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of カンナ ''kanna'' (the [[wikipedia:Ainu language|Ainu]] word for "up", also used to form the name of the Ainu thunder god ''kanna [[wikipedia:kamuy|kamuy]]'') and "hawk".
  * This monster has a combined [[Fusion Monster|Fusion]] form with "[[Ritual Beast Tamer Elder]]": "[[Ritual Beast Ulti-Cannahawk]]".
  ** The alternate artwork for "Ulti-Cannahawk" depicts it as a combined form with "[[Spiritual Beast Tamer Winda]]" instead of "Elder".
