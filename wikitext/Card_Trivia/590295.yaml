  * This monster appears to be a robotic duplicate of "[[Thunder King, the Lightningstrike Kaiju]]". This is most likely a reference to [//wikizilla.org/wiki/Mecha-King_Ghidorah Mecha-King Ghidorah] from the [[wikipedia:Godzilla_(franchise)|Godzilla]] franchise.
