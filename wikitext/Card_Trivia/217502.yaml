title: Card Trivia:Doll Monster Miss Mädchen
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2021]]''.
  * This monster appears in the artworks of "[[Box of Friends]]" and "[[Doll House]]".
  * This card's Japanese name, "Girl-chan", features the honorific "-chan", which is used to describe affection and intimacy towards girls.
  ** This card's international name, "Mädchen", is the German word for "girl".
  * This monster has [[Card evolutions|customized]] and re-customized forms: "[[Doll Monster Miss Mädchen, Customized]]" and "[[Doll Monster Miss Mädchen, Re-Customized]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|016|ref}}, specifically from the panel showing [[Doll Monster Miss Mädchen (manga)|this monster]] being Summoned.
