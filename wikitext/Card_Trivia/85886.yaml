title: Card Trivia:Elemental HERO Clay Guardian
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Elemental HERO Clayman]]", as well as a counterpart to "[[Destiny HERO - Defender]]".
  ** This monster's [[original DEF]] (2800) is equal to the combined [[ATK]] and [[DEF]] of both "Clayman" and "Defender".
  ** The designs of this monster and "Defender" feature helmets resembling protective sports gear.
  * This is the final "[[Elemental HERO]]" monster from the ''[[Yu-Gi-Oh! GX]]'' anime to be released in the ''[[OCG]]''/''[[TCG]]''.
  ** This is the only "Elemental HERO" [[Fusion Monster]] from the ''Yu-Gi-Oh! GX'' anime released in the ''OCG''/''TCG'' without a [[Nomi]] clause.
  ** Before its release in ''[[Limited Pack GX: Ra Yellow]]'', this was the only "Elemental HERO" monster not to be released, due to the fact that "[[Metamorphosis]]", the required card to Summon it in the anime, was [[Forbidden]] in the [[Advanced Format]] in [[March 2005 Lists|March 2005]].
  * This monster has the highest original [[DEF]] (2800) of all [[Level 4]] monsters.
  * This monster has the lowest [[Level]] (4) of all "Elemental HERO" [[Fusion Monster]]s.
  * This monster and "[[Elemental Hero Neo Bubbleman (anime)|Elemental Hero Neo Bubbleman]]", being both "[[HERO]]" Fusion Monsters used by [[Jaden Yuki]] that could only be [[Special Summon]]ed from the [[Extra Deck]] by using another monster and a [[Spell Card]] in the ''Yu-Gi-Oh! GX'' anime, can be considered a prelude to the "[[Masked HERO]]" [[archetype]] used by Jaden's [[Jaden Yuki (manga)|manga counterpart]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, which can Summon Fusion Monsters from the [[Extra Deck]] by using another monster on the field and a Spell Card, usually "[[Mask Change]]".
