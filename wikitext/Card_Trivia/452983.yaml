title: Card Trivia:Chemicritter Carbo Crab
wikitext: |-
  {{Navigation}}

  * This is the first [[FIRE]] [[Aqua]]-[[Type]] monster since "[[Fire Kraken]]".
  * This monster has the letter "C" on its chest representing that the [[wikipedia:Carbon|Carbon]] was the basis of this monster.
  * This monster's right claw appears to be made of [[wikipedia:diamond|diamond]], which is one of the possible forms of pure carbon.
  * This monster appear in the artwork of "[[Catalyst Field]]".
