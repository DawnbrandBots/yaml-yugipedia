title: Card Trivia:The Weather Painter Rainbow
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Spirit Warriors]]''/''[[Spirit Warriors]]''.
  * This monster appears in the artwork of "[[The Weather Rainbowed Canvas]]".
  * This monster's Japanese name, "Arciel" (アルシエル ''Arushieru''), is based on ''L'Arc-en-Ciel'', the French word for "The Rainbow".
  ** Fittingly, this card's artwork depicts seven different color tubes associated with the colors of the rainbow.
  ** This monster's ''[[TCG]]'' name references how rainbows are made by the weather using water droplets from rain to refract light into the seven colors.
  ** This card's [[Link Monster]] [[card type]] and this monster's white color scheme also reference the rainbow's color origin; a single white light that reveals a spectrum of colors once dispersed through a prism due to differences in wavelengths.
  * The color tubes used by this monster represents seven [[Main Deck]] "[[The Weather]]" monsters, although only six are currently known.
  ** Red: None
  ** Orange: "[[The Weather Painter Sun]]"
  ** Yellow: "[[The Weather Painter Thunder]]"
  ** Green: "[[The Weather Painter Aurora]]"
  ** Blue: "[[The Weather Painter Snow]]"
  ** Indigo: "[[The Weather Painter Rain]]"
  ** Violet: "[[The Weather Painter Cloud]]"
  * This monster is a [[counterpart]] of "[[The Weather Painter Moonbow]]".
