title: Card Trivia:Pot of Duality
wikitext: |-
  {{Navigation}}

  * This pot appears in the artwork of "[[Progress Potter]]", "[[Single Purchase]]", "[[Recall]]", and "[[Scrounging Goblin]]".
  * The artwork of "[[Asleep at the Switch]]" possibly hints at how the two pots that make up this one became broken before being merged together.
  * True to its name (and its Japanese name more so), this pot features the faces of "[[Pot of Greed]]" and "[[Pot of Generosity]]".
  ** This card's effect imitates "Greed" when the top cards of your Deck is picked, and then imitates "Generosity" when some of them returned to the Deck.
  * According to the Konami ''[[TCG]]'' Website, this card was the most talked about [[Spell Card]] of 2010, as said [http://www.konami.com/yugioh/articles/?p=2101 here].
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Pot of Duality]]".
