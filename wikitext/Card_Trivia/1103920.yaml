title: Card Trivia:Twin Coolstars
wikitext: |-
  {{Navigation}}

  * This monster's name is phonetically similar to "twinkle stars", which is associated with the English poem "[[wikipedia:Twinkle, Twinkle, Little Star|Twinkle, Twinkle, Little Star]]".
  * This monster has a retrained [[Chaos (Rush Duel series)|Chaos]] [[counterpart]]: "[[Chaos Coolstars]]".
