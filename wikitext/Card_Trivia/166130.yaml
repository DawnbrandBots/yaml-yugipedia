title: Card Trivia:Grapha, Dragon Lord of Dark World
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Devil's Gate]]''/''[[Gates of the Underworld Structure Deck]]''.
  * This monster appears in the artworks of "[[Dark World Brainwashing]]" and "[[Dimension Slice]]".
  * This monster has an upgraded [[Fusion Monster|Fusion]] form: "[[Grapha, Dragon Overlord of Dark World]]".
  * This card's name is a pun on the color [[wikipedia:graphite (color)|graphite]].
  * This card's Chinese name, 「黑拉法」, is a combination of 「黑」 ("black") and 「拉法」 (''lāfǎ'', [[wikipedia:Transcription into Chinese characters|a transcription]] of 「ラファ」 ''rafa'' as in its Japanese name 「グラファ」 ''Gurafa'').
  * Until the release of "[[Hecahands Breus]]", this was the only card with an effect that could Special Summon a monster from the opponent's hand to the player's field.
