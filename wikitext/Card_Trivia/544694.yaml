title: Card Trivia:Cynet Storm
wikitext: |-
  {{Navigation}}

  * This card is based on a [[Data Storm]], a special vortex made out of data in the ''[[Yu-Gi-Oh! VRAINS]]'' anime that frequently appeared during a [[Speed Duel]] inside [[LINK VRAINS]].
  ** This card's third effect is a reference to "[[Storm Access (anime)|Storm Access]]", a [[Skill]] used frequently in the ''Yu-Gi-Oh! VRAINS'' anime in which the user can [[add]] a random [[Cyberse]] [[Link Monster]] to their [[Extra Deck]] while inside the Data Storm. Its effect to [[Special Summon]] the [[excavate]]d Cyberse Link Monster is based on how in the anime, the user immediately [[Link Summon]]ed that same type of monster.
  * This is the first and currently the only card that allows the player to both [[shuffle]] and excavate cards in their [[Extra Deck]].
