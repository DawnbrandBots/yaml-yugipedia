title: Card Trivia:Gallant Granite
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, 御影志士 (''mikage shishi''), is a pun on 御影石 (''mikageishi'', "granite")
  * [[wikipedia:Shishi (Japan)|Shishi]] (志士), sometimes known as Ishin Shishi (維新志士), were a group of Japanese political activists of the late Edo period.
