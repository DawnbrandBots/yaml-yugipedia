title: Card Trivia:Scarm, Malebranche of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * The [[wikipedia:Malebranche (Divine Comedy)|Malebranche]] were demonic characters in [[wikipedia:Dante Alighieri|Dante]]'s ''[[wikipedia:Divine Comedy|Divine Comedy]]'' who guard the fifth Bolgia of [[wikipedia:Malebolge|Malbolge]], the Eighth Circle of Hell. They are known for their ruthless cruelty, and are responsible for the punishment of corrupt politicians by holding them under a boiling lake of [[wikipedia:Pitch (resin)|pitch]].
  ** Of the 12 named Malebranche, this monster specifically represents the demon "[[wikipedia:Scarmiglione|Scarmiglione]]", the "troublemaker."
  ** Amusingly, Scarmiglione is the first of the Malebranche to be introduced by name in ''[[wikipedia:Inferno (Dante)|Inferno]]'', as well as the first of the "[[Burning Abyss]]" monsters to be spoiled for the ''[[TCG]]''.
  ** He also appears under the name [[W:c:castlevania:Skull Millione|Skull Millione]] in [[wikipedia:Konami|Konami]]'s ''[[wikipedia:Castlevania|Castlevania]]'' games.
