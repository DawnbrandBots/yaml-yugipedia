title: Card Trivia:Fire Formation - Tensu
wikitext: |-
  {{Navigation}}

  * "[[Brotherhood of the Fire Fist - Bear]]" and "[[Brotherhood of the Fire Fist - Gorilla]]" appear in this card's artwork.
  * This card is named after "''Tensu''" (天枢), the Chinese-Japanese astronomy name for ''[[wikipedia:Dubhe|Alpha Ursae Majoris]]'', one of the seven stars in the constellation of [[wikipedia:Ursa Major|Ursa Major]].
  * Like other "[[Fire Formation]]" cards, this card's effect is a variant on an existing [[Spell]]/[[Trap Card]]. In this card's case, its effect is based on "[[Double Summon]]".
