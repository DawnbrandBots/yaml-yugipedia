  * The design of [[Joey Wheeler]] in this card's artwork is taken from his Summoning cut-in/victory pose from ''[[Yu-Gi-Oh! Duel Links]]'', while the design of "[[Gilford the Lightning]]" is taken from its second ''[[OCG]]''/first ''[[TCG]]'' artwork.
