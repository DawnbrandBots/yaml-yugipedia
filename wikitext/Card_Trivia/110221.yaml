title: Card Trivia:Lord of the Lamp
wikitext: |-
  {{Navigation}}

  * This card has a [[counterpart]]: "[[La Jinn the Mystical Genie of the Lamp]]".
  * According to this card's [[flavor text]], this monster is the [[wikipedia:Jinn|jinn]] invoked through "[[Mystic Lamp]]".
  * This card's [[Fiend]] [[Type]] reflects how jinns are often associated with devils in mythology.
