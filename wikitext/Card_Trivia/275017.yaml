title: Card Trivia:Brotherhood of the Fire Fist - Buffalo
wikitext: |-
  {{Navigation}}

  * In the ''OCG'', this monster is named after ''[[wikipedia:Li Kui (Water Margin)|Li Kui]]'' (read in Japanese as Ri Ki) and "bull" (buru).
  ** ''Li Kui'' ranks 22nd of the 36 Heavenly Spirits of the 108 [[wikipedia:Water Margin|Liangshan heroes]] and is nicknamed "Black Whirlwind".
  * The kanji 殺 on this monster's belt and the buffalo in this card's artwork means "kill" and "murder."
  * This monster appears in the artwork of "[[Fire Formation - Kaiyo]]".
