title: Card Trivia:Ash Blossom & Joyous Spring
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * "[[Live☆Twin Lil-la]]" cosplays as this monster in the artwork of "[[Live☆Twin Channel]]".
  * This monster is based on the dog in the Japanese folk tale ''[[wikipedia:Hanasaka Jiisan|Hanasaka Jiisan]]''.
  ** Fittingly, this monster's ears and tail are based on those of a dog.
  ** This card's name, "Ash Blossom", and the cherry blossoms in this card's artwork are a reference to the events of that folk tale.
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card has two special animations when its effect is activated: both animations depict the negated card being surrounded by flower petals; if this card's second artwork is used, it additionally depicts this monster dancing around the negated card.
