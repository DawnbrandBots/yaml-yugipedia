title: Card Trivia:Koa'ki Meiru Sandman
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battle Pack 3: Monster League]]''.
  * This card has a [[monster effect]]-negating counterpart ("[[Koa'ki Meiru Guardian]]"), a [[Spell Card]]-negating counterpart ("[[Koa'ki Meiru Wall]]"), and a [[Summon]]-negating counterpart ("[[Koa'ki Meiru Overload]]").
  ** They all have the same [[ATK]], [[DEF]], [[Attribute]], [[Type]], [[Level]], and [[maintenance cost]].
  * This monster (along with "[[Koa'ki Meiru Powerhand]]") was the first "[[Koa'ki Meiru]]" monster created, according to the [[Master Guide 3 card storylines#Darkworld (Makai) History: Superbia 9th, XXXX|Master Guide 3 card storylines]].
