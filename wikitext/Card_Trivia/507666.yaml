title: 'Card Trivia:A-Team: Trap Disposal Unit'
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fossil Excavation]]", "[[Fossil Dig]]", "[[Geological Survey]]", and "[[Secret Blast]]".
  * "[[Aitsu]]", "[[Bear Trap]]", "[[Doitsu]]", "[[Koitsu]]", and "[[Soitsu]]" appear in this card's artwork.
  ** This monster's [[original ATK and DEF]] (300/400) are the combined [[ATK]]/[[DEF]] of the aforementioned monsters.
  ** This monster's [[Type]] is [[Machine]], while the Type of the aforementioned monsters is [[Fairy]].
  * This monster's name likely references the 1980's action-adventure TV series, ''[[wikipedia:The A-Team|The A-Team]]''.
  * Until the release of the "[[Number]]" monsters, this was the only card to feature a colon (:) in its name.
