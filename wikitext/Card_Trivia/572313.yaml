title: Card Trivia:Shiranui Style Success
wikitext: |-
  {{Navigation}}

  * "[[Shiranui Skillsaga Supremacy]]" and "[[Shiranui Spectralsword Shade]]" appear in this card's artwork.
  ** According to ''[[Master Guide 6 card storylines#File No. 04: The Quarrel Between the "Mayakashi" and the "Shiranui" Continues with the Tale of "Ghost Meets Girl"|Master Guide 6]]'', this card depicts "[[Shiranui Squire]]" transforming herself into "Skillsaga Supremacy", and channeling in her sword the yokai magic left within her from meeting "[[Dakki, the Graceful Mayakashi]]" to fight her true form, "[[Yoko, the Graceful Mayakashi]]".
