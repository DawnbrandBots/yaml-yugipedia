title: Card Trivia:The Statue of Easter Island
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Moai|Moai]], a series monolithic human figures made of rock in the [[wikipedia:Easter Island|Easter Island]].
  ** Given its relationship with the [[Konami Arcade Games]] [[series]], this monster is based on the Moai enemies in the ''[[wikipedia:Gradius|Gradius]]'' arcade video game franchise.
