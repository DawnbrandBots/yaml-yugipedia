title: Card Trivia:Weather Report
wikitext: |-
  {{Navigation}}

  * This card has a [[Normal Monster]] [[recolored counterpart]]: "[[Weather Control]]".
  * The doll hanging off this monster's umbrella is a [[wikipedia:Teru teru bōzu|teru teru bōzu]], a good-luck charm in Japanese culture that is said to bring clear, sunny days if hung from the window during the night before.
