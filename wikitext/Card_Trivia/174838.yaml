title: Card Trivia:Fish and Kicks
wikitext: |-
  {{Navigation}}

  * Multiple "[[7 Colored Fish]]" appear in this card's artwork.
  * This card is similar to "[[Fish and Swaps]]" and "[[Fish and Bids]]".
  ** All feature multiple "7 Colored Fish" in their card artworks.
  ** All are named after puns on "[[wikipedia:Fish and chips|fish and chips]]", an English dish consisting of fried fish and French fries.
  ** All are [[Spell Card]]s that support [[banish]]ed [[Fish]], [[Sea Serpent]], and [[Aqua]] monsters, and were released in ''[[Generation Force]]''.
