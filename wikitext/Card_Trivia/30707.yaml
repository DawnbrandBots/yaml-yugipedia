title: Card Trivia:Toy Magician
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effects to [[Set]] itself as a [[Spell Card]] in the [[Spell & Trap Zone]] and [[Special Summon]] it when it is [[destroy]]ed as a Spell Card are based on its interaction with "[[Toy Box (manga)|Toy Box]]" in the ''[[Yu-Gi-Oh! R]]'' manga, where this monster could "hide" itself inside the box and reemerge later.
  * In ''[[Yu-Gi-Oh! GX Tag Force 2]]'' and ''[[Yu-Gi-Oh! GX Tag Force 3]]'', when a character Sets this monster in the Spell & Trap Zone, they will always [[declare]] that they are Setting a monster, making it obvious they are Setting this monster.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|R|024|ref}}, specifically from the ending page showing an illustration of [[Toy Magician (manga)|this monster]], albeit with the position of its right arm holding the magic staff lifted higher.
