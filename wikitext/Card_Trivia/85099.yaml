title: Card Trivia:Dweller in the Depths
wikitext: |-
  {{Navigation}}

  * Close examination of the card illustration reveals a [[wikipedia:dragon|dragon]] shape in the distance.
  * This card is not present in [[wikipedia:Nintendo DS|DS]] games such as ''[[Yu-Gi-Oh! World Championship 2008]]'', likely because an image of the monster couldn't be found. However, its entire artwork is used as its hologram in ''[[Yu-Gi-Oh! Duel Links]]''.
