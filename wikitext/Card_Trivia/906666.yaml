title: Card Trivia:Power Pro Lady Sisters
wikitext: |-
  {{Navigation}}

  * This card is a parody of "[[Harpie Lady Sisters]]" featuring characters from ''[[wikipedia:Power Pros|Power Pros]]'', a Japanese baseball video game series created by [[Konami]].
  ** The three girls mentioned in the flavor text, Aoi Hayakawa, Mizuki Tachibana, and Hijiri Rokudo, are the green-haired, blue-haired, and purple-haired girls in the artwork, respectively.
  ** Aoi Hayakawa is depicted holding Power Pro-kun, the mascot of ''Power Pros''.
