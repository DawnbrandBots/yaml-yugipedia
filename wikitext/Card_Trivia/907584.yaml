title: Card Trivia:Therion "King" Regulus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Spright Double Cross]]", "[[Therion Cross]]", and "[[Therion Stand Up!]]".
  * This monster is named after [[wikipedia:Regulus|Regulus]], a star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Leo (constellation)|Leo]].
  ** This monster's design features a wild fiery-like mane and lower lion-like legs, referencing how Leo is also known as the "lion" constellation.
  *** This monster's apostrophized name references how the lion is commonly known as the "king of the beasts" or the "king of the jungle".
  * This monster has a [[DARK]] [[counterpart]]: "[[Therion Irregular]]".
  ** This monster's name is the opposite of that of "Irregular".
  ** This monster's [[original ATK and DEF]] (2800/1600) is an inverse of those of "Irregular" (1600/2800).
  ** Both monsters are depicted in mirrored poses in their respective card artworks.
  * "[[Springans Captain Sargas]]" has an upgraded [[Xyz Monster|Xyz]] form combined with this monster and "[[Springans Ship - Exblowrer]]": "[[Gigantic "Champion" Sargas]]".
