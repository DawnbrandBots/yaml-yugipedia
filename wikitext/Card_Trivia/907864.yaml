title: Card Trivia:Legend Saber
wikitext: |-
  {{Navigation}}

  * "[[Legendary Sword (Rush Duel)|Legendary Sword]]" appears in this card's artwork.
  ** This is a reference to how this monster's effect specifically [[support]]s [[Legend Card]]s.
  ** This monster's [[ATK]] gain is equal to the amount gained from the effect of "Legendary Sword".
  * This monster appears in the artwork of "[[Legend Slash]]", as well as in the first artwork of "[[An Epic Tale of Recollected Memories]]".
  * This monster has an [[Counterpart|upgraded]] [[Ritual Monster|Ritual]] form: "[[Legend Lineage Saber]]".
