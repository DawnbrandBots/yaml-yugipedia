title: Card Trivia:Denglong, First of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Nine Pillars of Yang Zing]]".

  * This monster's name is based on [[wikipedia:Denglong (mythology)|Dēnglóng]] (simplified Chinese: 蹬龙; traditional Chinese: 蹬龍, Hanyu Pinyin: ''dēnglóng''), one of the [[wikipedia:Nine sons of the dragon|sons]] of the [[wikipedia:Dragon King|Dragon King]] who is depicted as a hybrid of a dragon with other animal characteristics.
  ** This monster's Japanese name, "''Botenkou''" is the Japanese transliteration of Wàngtiānhǒu (望天吼), another name for Dēnglóng.
  ** According to Chinese mythology, Dēnglóng has a habit of guarding (reflected in its 2800 [[DEF]]) and is historically atop a ceremonial column, the ''[[wikipedia:Huabiao|huabiao]]'' to symbolize sending the will of heaven to humans, and delivering the conditions of the people to the heavens.

  * This is the first "[[Yang Zing]]" [[Tuner Synchro Monster]].
  ** This is also the first "Yang Zing" monster to be revealed for the ''[[OCG]]''/''[[TCG]]'', as well as the first Tuner Synchro Monster to be become [[Forbidden]] (only in the ''TCG'').

  * This is the first "Yang Zing" [[Synchro Monster]] to have 0 [[ATK]] or DEF, like the "Yang Zing" [[Main Deck]] monsters.
  ** This monster has the highest [[original DEF]] (2800) of all "Yang Zing" monsters, as well as all [[Level 5]] or lower [[Effect Monster]]s.
