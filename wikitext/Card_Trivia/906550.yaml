title: Card Trivia:Multistrike Dragon Dragias
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck Luke - Explosive Supremacy! Dragias!!]]'', as well as one of the cover cards of ''[[Starter Deck Set - Yuga vs. Luke]]'', ''[[Deck Mod Pack: Hyperspeed Rush Road!!]]'', and ''[[Megaroad Pack 2]]''.
  * This monster appears in the artworks of "[[7 Chance]]" (in a chibi form), "[[Concussive Charge]]", "[[Dragonic Gias]]", "[[Hypernova]]", "[[Resolve (card)|Resolve]]", and "[[Sevens Paranormal Fusion]]", as well as in both artworks of "[[Gias x Gias]]" and the second artwork of "[[Sevens Wonder Fusion]]".
  * The background of this card's artwork depicts seven stars, and this monster has seven red orbs on its body, including both of its eyes, referencing this card's [[Level]] and ''[[Yu-Gi-Oh! SEVENS]]'', the anime in which this card debuted.
  * This monster has multiple forms:
  ** An [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form with "[[The Dragon]]": "[[Hyperstrike Dragon Dragiastar F]]".
  ** An upgraded Fusion form with "[[The Draco]]": "[[Hyperstrike Dragon Dragiastar IF]]".
  ** A [[Maximum Monster|Maximum]] form: "[[Great Multistrike Dragon Dragias Burst]]" (with "[[Great Multistrike Dragon Dragias Burst (L)]]", "[[Great Multistrike Dragon Dragias Burst (R)]]" as its left and right components).
  ** [[The]] Counterpart: "[[The Dragias]]".
  ** These features are shared with "[[Illusion Strike Dragon Miragias]]" and "[[Steel Strike Dragon Metagias]]", both of which also debuted in the ''Yu-Gi-Oh! SEVENS'' anime.
  * This is the [[signature card]] of [[Lucidien Kallister|Lucidien "Luke" Kallister]] in the ''Yu-Gi-Oh! SEVENS'' anime and [[Tatsuhisa Kamijo (manga)|Tatsuhisa Kamijo]] in the ''[[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!]]'' manga.
  ** This is the first signature card of a rival to not have 3000 [[ATK]]. This trend was later followed by [[Zuwijo Zwil Velgear]]'s "[[Voidvelg Requiem (anime)|Voidvelg Requiem]]" from ''[[Yu-Gi-Oh! GO RUSH!!]]''.
  ** This card has the same ATK (2500) as the signature cards of the other manga protagonists: [[Yugi Mutou (manga)|Yugi Mutou]]'s "[[Dark Magician (manga)|Dark Magician]]", [[Jaden Yuki (manga)|Jaden Yuki]]'s "[[Elemental Hero Terra Firma (manga)|Elemental Hero Terra Firma]]", [[Yusei Fudo (manga)|Yusei Fudo]]'s "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]", [[Yuma Tsukumo (manga)|Yuma Tsukumo]]'s "[[No. 39: Utopia (manga)|No. 39: Utopia]]", [[Yuya Sakaki (manga)|Yuya Sakaki]]'s "[[Odd-Eyes Phantom Dragon (manga)|Odd-Eyes Phantom Dragon]]" and [[Yudias Velgear (manga)|Yudias Velgear]]'s "[[Galactica Oblivion (manga)|Galactica Oblivion]]".
