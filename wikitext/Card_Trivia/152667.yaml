title: Card Trivia:Scrap Mind Reader
wikitext: |-
  {{Navigation}}

  * This card looks like things in a beauty salon: shower head, hair heater, and blow dryer.
  * This card is similar to [[Plaguespreader Zombie]] and [[Snyffus]], in that it Special Summons itself from the Graveyard and is removed from play when removed from the field.
  * Unlike the other Scrap Tuner monsters, [[Scrap Mind Reader]] does not include the effects of destroying itself and then adding 1 "Scrap" monster from the Graveyard to the hand.
  ** Instead it shares its last effect, "''If this card is used as a Synchro Material Monster, all other Synchro Material Monsters must be "Scrap" monsters''" with [[Scrap Chimera]].
  * This card is the second [[TCG Only]] "[[Scrap]]" Card, next to [[Scrap Archfiend]].
