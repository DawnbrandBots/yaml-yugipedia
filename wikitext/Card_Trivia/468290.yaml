title: Card Trivia:Neo Galaxy-Eyes Cipher Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[Ranked-Up]] form of "[[Galaxy-Eyes Cipher Dragon]]".
  * This monster is the "[[Cipher]]" [[counterpart]] of "[[Neo Galaxy-Eyes Photon Dragon]]".
  ** Both are three-headed [[LIGHT]] [[Dragon]] [[Xyz Monster]]s with 4500 [[ATK]] and 3000 [[DEF]].
  ** Both have "Neo" in addition to their base form's names.
  ** Unlike "Neo Galaxy-Eyes Photon Dragon", this monster's [[Attack and effect names in Yu-Gi-Oh! ARC-V|attack name]], "Cipher Stream of Devastation" (戦慄のサイファー・ストリーム, ''Senritsu no Saifā Sutorīmu'', "Cipher Stream of Horror") does not feature the word "Ultimate" (アルティメット ''Arutimetto'').
  ** This monster also has the same color scheme as its base form, unlike "Neo Photon Dragon".
  ** Like "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]], this card must be [[Xyz Summon]]ed with Rank-Up in order for its effect to be used.
