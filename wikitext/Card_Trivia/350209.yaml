title: Card Trivia:Luster Pendulum, the Dracoslayer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dinomic Powerload]]".
  * This card is the first [[Tuner monster|Tuner]] [[Pendulum Monster]].
  * This monster has three [[Card evolutions|evolved]] forms: "[[Master Pendulum, the Dracoslayer]]",  "[[Ignister Prominence, the Blasting Dracoslayer]]", and "[[Majester Paladin, the Ascending Dracoslayer]]".
  * This monster has a merged form with "[[Dinomist Plesios]]" and "[[Dinomist Stegosaur]]": "[[Dinoster Power, the Mighty Dracoslayer]]".
  * This monster is related to the "[[Igknight]]", "[[Majespecter]]", and "[[Dinomist]]" monsters.
  ** "Ignister Prominence, the Blasting Dracoslayer" wears the armor of "[[Igknight Margrave]]".
  ** "Majester Paladin, the Ascending Dracoslayer" rides "[[Majespecter Unicorn - Kirin]]".
  ** "Dinoster Power, the Mighty Dracolsayer" wears "Dinomist Plesios" and "Dinomist Stegosaur" as armor.
