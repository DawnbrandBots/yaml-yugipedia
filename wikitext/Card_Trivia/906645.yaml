title: Card Trivia:Winds Over the Ice Barrier
wikitext: |-
  {{Navigation}}

  * "[[Dragunity Knight - Ascalon]]" and younger versions of "[[Gishki Avance]]" and "[[Gishki Emilia]]" appear in this card's artwork.
  ** The scene depicted mirrors those of "[[Sacred Serpent's Wake]]" and "[[Zefra Providence]]", which also feature "Avance" and "Emilia" witnessing the aftermaths of climactic battles of the [[Card storylines#Duel Terminal|''Duel Terminal'' storyline]].
