title: Card Trivia:Chirubimé, Princess of Autumn Leaves
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from [[wikipedia:Konohanachiru-hime|Konohanachiru-hime]], the [[wikipedia:Shinto|Shinto]] goddess associated with blossoms.
  ** This monster's [[EARTH]] [[Attribute]] references the season of [[wikipedia:Autumn|autumn]], which is typically associated with the harvest season. Additionally, this monster's design is based on [[wikipedia:Maple|maple leaves]], which undergo a broad spectrum of color changes in autumn.
  * This monster has the lowest [[original ATK]] (1800) and the highest [[original DEF]] (2800) of all members of the [[Plant Princess]] [[series]].
  ** As such, this is the only member of the Plant Princess series that doesn't have 2800 [[ATK]], instead having 2800 [[DEF]].
  * This is the only card whose English name includes the character "[[wikipedia:É|é]]".
