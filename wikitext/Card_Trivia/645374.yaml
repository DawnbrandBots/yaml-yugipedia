title: Card Trivia:Generaider Boss Loot
wikitext: |-
  {{Navigation}}

  * "[[Dovelgus, Generaider Boss of Iron]]" appears in this card's artwork.
  * This card's effect is based on two game mechanics:
  ** The effect that prevent "Generaider" monster from being attacked is based on how the player has to defeat the lesser enemies before facing the boss.
  ** The effect that allows the opponent to draw 1 card after destroying "Generaider" monster is based on a [[wikipedia:Loot (video games)|Loot drop]] system, where the player will be rewarded after defeating a boss.
