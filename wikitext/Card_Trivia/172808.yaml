title: Card Trivia:Tyrant's Throes
wikitext: |-
  {{Navigation}}

  * This card's event is an aftermath of "[[Tyrant's Tummyache]]".
  ** Coincidentally, this card and the latter restrict [[Summon]]s.
  * The emperor from this card appears in the artwork of "[[The Emperor's Holiday]]", "[[Tyrant's Temper]]", "[[Tyrant's Tirade]]", "[[Tyrant's Tantrum]]", "Tyrant's Tummyache", "[[Double Payback]]", "[[The Huge Revolution is Over]]", "[[Asleep at the Switch]]", "[[Turnabout]]", "[[Retort]]" and "[[Clear Robe]]".
