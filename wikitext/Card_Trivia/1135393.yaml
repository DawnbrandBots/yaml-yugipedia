title: Card Trivia:Ib'al-Hecahands
wikitext: |-
  {{Navigation}}

  * "[[Hecahands Yadel]]" appears in this card's artwork.

  * This card's name is derived from ''Ibţ al-Jauzā’'' ("Armpit of the [[wikipedia:Orion (constellation)|Orion]]"), a misspelling of the Arabic name of the star [[wikipedia:Betelgeuse|Betelgeuse]] (''Yad al-Jauzā’'', "Hand of the Orion") from which the English one is theorized to derive from.
