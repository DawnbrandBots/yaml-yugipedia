title: Card Trivia:Ghostrick Museum
wikitext: |-
  {{Navigation}}

  * "[[Ghostrick Dullahan]]", "[[Ghostrick Jiangshi]]", "[[Ghostrick Mary]]", "[[Ghostrick Mummy]]", "[[Ghostrick Skeleton]]", "[[Ghostrick Witch]]", and the mask of "[[Beast of the Pharaoh]]" appear in this card's artwork.
  ** This card's artwork depicts "Witch" scolding "Mummy" for breaking the mask of "Beast of the Pharaoh".
