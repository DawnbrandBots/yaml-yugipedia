title: Card Trivia:Hecatrice
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Hecate|Hecate]], the Greek goddess of magic and crossroads.
  * In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this monster's [[original ATK]] is 1300, while in the ''[[OCG]]''/''[[TCG]]'', its original [[ATK]] is 1500.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|GX|022|ref}}, specifically from the panel showing [[Hecatrice (manga)|this monster]] being Summoned.
