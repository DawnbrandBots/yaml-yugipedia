title: Card Trivia:Igknight Gallant
wikitext: |-
  {{Navigation}}

  * This is currently the only "[[Igknight]]" monster in the [[TCG]] that is not named after some kind of medieval military position.
  * This card's name in the [[OCG]] is derived from [[wikipedia:Caliber|Caliber]], a measurement for the internal diameter of a gun's barrel, and also the diameter of the rounds it fires.
