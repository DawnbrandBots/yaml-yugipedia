title: Card Trivia:Abyssal Dragon Lord Abyss Poseidra
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Versus Pack Maximum Force]]''.
  * This monster is based on [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea who is often depicted wielding his signature weapon, the trident.
  ** This monster's appearance is similar to a [[wikipedia:Centaur|centaur]], a half-human, half-horse creature. This likely references how Poseidon is closely associated with horses in [[wikipedia:Greek mythology|Greek mythology]].
