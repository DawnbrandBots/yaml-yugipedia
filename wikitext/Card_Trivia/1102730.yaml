title: Card Trivia:Heraldic Beast Gryphon
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Griffin|gryphon]], a creature in [[wikipedia:European mythology|European mythology]] who is depicted as a hybrid of a lion and an eagle and is often used as a [[wikipedia:Heraldry|heraldry]] [[wikipedia:Charge (heraldry)|charge]].
  ** This monster's pose is likely based on that of the lion depicted on the center shield in the [[wikipedia:Coat of arms of Belgium|Belgian coat of arms]]: the lion stands on its hind paws with its claws reaching out, with the frontmost claw angled low at its belly and the rearmost claw angled as high as its head.
  * This monster's design is likely based on the appearance of [[Yuma Tsukumo]] after undergoing his transformation into his [[ZEXAL (power)|ZEXAL]] form, which features a white spandex, red armor, and golden spiky hair.
  ** This monster's half-lion design and color scheme also references "[[ZW - Leo Arms]]", a lion-like [[Xyz Monster]] which also features a red-and-white color scheme with a golden mane. Fittingly, Yuma used both his ZEXAL form and "Leo Arms" during his Duel against [[Vetrix]].
