title: Card Trivia:Michael, the Arch-Lightsworn
wikitext: |-
  {{Navigation}}

  * "Michael" is the leader and founder of the "[[Lightsworn]]s", always accompanied by "[[Judgment Dragon]]". He's also responsible for enlisting the souls of heroes who died in eras they travel to.<ref>[http://www.ygorganization.com/geargia-lightsworn-lore/ YGOrganization] - [OCG] Lore on the Geargias and Lightsworn!</ref>
  * This is one of the [[cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]'', ''[[Duelist Set: Version Lightlord Judgment]]'', and the ''[[Realm of Light Structure Deck]]''.
  * This card is the first "Lightsworn" [[Extra Deck]] monster for the archetype.
  * "Judgment Dragon" appears in this card's artwork as "Michael's" steed.
  * This card gets its name from the Archangel [[wikipedia:Michael (archangel)|Michael]], hence the "Arch" in the card name.
  ** Furthermore, this card's effect of banishing cards seems to further reference the [[wikipedia:Book of Revelation|Book of Revelation]], in which the archangel Michael defeated and banished the fallen angels from Heaven.
  * This card and "[[Celestia, Lightsworn Angel]]" are the only "[[Lightsworn]]" monsters to feature more than one halo in their artwork.

