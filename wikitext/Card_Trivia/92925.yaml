title: Card Trivia:Call of the Grave
wikitext: |-
  {{Navigation}}

  * This card is one of a series of many cards (i.e. "[[Anti Raigeki]]", "[[Gryphon Wing]]", and "[[White Hole]]") specifically designed to counter commonly-used [[staple]]s. However, this is the only such card that does not include an additional negative effect for the opponent along with the negation.
  * This card has a [[Continuous Trap]] [[counterpart]]: "[[Call of Darkness]]".
