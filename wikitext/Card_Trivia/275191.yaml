title: Card Trivia:Brotherhood of the Fire Fist - Cardinal
wikitext: |-
  {{Navigation}}

  * In the ''[[OCG]]'', this monster is named after ''[[wikipedia:Gongsun Sheng|Gongsun Sheng]]'' (read in Japanese as ''Kōson Shō'') and "[[wikipedia:cardinal (bird)|cardinal bird]]" (''kōkanchō'').
  ** ''Gongsun Sheng'' ranks 4th of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "Dragon in the Clouds".
  * The kanji 間 on this monster's belt and the cardinal in this card's artwork means "space [of time, between things, etc.]".
  * This monster appears in the artwork of "[[Ultimate Fire Formation - Sinto]]".
