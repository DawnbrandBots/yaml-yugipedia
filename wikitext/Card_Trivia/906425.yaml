title: Card Trivia:Doomblaze Fiend Overlord Despairacion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Blaze Fiend Assault]]" and "[[Doomblaze Despair]]" in [[Maximum Mode]] (together with "[[Doomblaze Fiend Overlord Despairacion (L)|Doomblaze Fiend Overlord Despairacion [L]]]" and "[[Doomblaze Fiend Overlord Despairacion (R)|Doomblaze Fiend Overlord Despairacion [R]]]").
  * This card and its other pieces are the first [[Maximum Monster]]s to have effects that can be used even when not in Maximum Mode.
