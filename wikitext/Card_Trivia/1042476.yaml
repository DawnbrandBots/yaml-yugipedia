title: Card Trivia:Obliterate!!! Blaze
wikitext: |-
  {{Navigation}}

  * "[[The Unstoppable Exodia Incarnate]]" and a silhouette of [[Zorc Necrophades]] appear in this card's artwork.
  ** This card's name and artwork is based on a scene in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where [[Exodia the Forbidden One (character)|Exodia the Forbidden One]] battles Zorc by unleashing its "Exodia Blaze" attack; however, Zorc survives the attack and destroys Exodia.
