title: Card Trivia:Reversal of Fate
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Wheel of Fortune (tarot card)|The Wheel of Fortune]].
  ** The wheel in this card's artwork is based on a roulette wheel, which is primarily used in the gambling game of [[wikipedia:Roulette|roulette]], reflecting the [[coin toss]]ing gameplay of the "[[Arcana Force]]" [[archetype]].
