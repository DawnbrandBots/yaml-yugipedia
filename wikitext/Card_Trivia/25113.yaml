title: Card Trivia:Curse Reflection Doll
wikitext: |-
  {{Navigation}}

  * Two [[Duelist]]s appear in this card's artwork.
  * This card is based on the ''hitogata'', a man-shaped paper doll used by Shinto priests in a spiritual ceremony to absorb one's sins and ailments from their bodies.
  ** Fittingly, this card's effect can make the [[Effect damage|damage]] that would be inflicted by a card effect 0, and inflict damage to the opponent equal to the amount of damage that would have been inflicted.
