title: Card Trivia:Golgoil
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Iron Call]]".
  ** In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster was depicted with wheels on its lower body in its 3D model, while the artwork of "Iron Call" depicts this monster with a humanoid lower torso instead.
  * The words "MAJIN OF KOTETSU" (roughly meaning "demon of steel" in Japanese) are engraved on this monster's upper armor.
  * This monster has a [[Card evolutions|retrained]] [[Illusion]] counterpart: "[[Golgoil the Steel Seismic Smasher]]".
  * This monster has the longest [[List of cards with the longest OCG to TCG import times|''OCG'' to ''TCG'' import time]], debuting in the ''[[TCG]]'' more than 24 years after its first ''[[OCG]]'' debut on July 5, 1999.
