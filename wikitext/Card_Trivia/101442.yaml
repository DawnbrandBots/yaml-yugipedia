title: Card Trivia:Catoblepas and the Witch of Fate
wikitext: |-
  {{Navigation}}

  * The [[wikipedia:catoblepas|catoblepas]], the monster that the witch is riding on, is a mythical creature resembling an [[wikipedia:African buffalo|African buffalo]] from African mythology, whose gaze can turn people to stone.
  * This is the first and currently only support card for [[? ATK Monster Cards|monsters with ? ATK]].
