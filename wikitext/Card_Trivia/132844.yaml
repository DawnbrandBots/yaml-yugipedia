title: Card Trivia:Snyffus
wikitext: |-
  {{Navigation}}

  * Three "[[Nettles]]" appear in this card's artwork.
  ** Appropriately, this card's Japanese name, "Weeding Beast", implies a rivalry with "Nettles", whose Japanese name is "Weed".
  * This monster appears in the artworks of "[[That Grass Looks Greener]]" and "[[Land Flipping]]".
  * This card's name is likely a portmanteau of the word "sniff" (albeit with corrupted spelling) and the stereotypical dog name "Rufus", reflecting this monster's status as a dog.
  ** The name "Rufus" is derived from the Latin word "rūfus", which means "red" or "reddish". This is fitting, as this dog has reddish fur.
  ** Sniffing is one of the many stereotypical actions that dogs are known for.
