title: Card Trivia:The King of D.
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[2025 Mega-Pack Tin]]''.
  * This monster appears in the artwork of "[[Dragon Revival Rhapsody]]".
  * This monster is a [[Card evolutions|retrained]] counterpart of "[[Lord of D.]]".
  ** The design of the [[wikipedia:Multi-neck guitar|multi-necked electric guitar]] that this monster is depicted playing is based on "[[Blue-Eyes Ultimate Dragon]]".
  ** The chord this monster is depicting playing on its electric guitar is [[wikipedia:D major|D major]], which is a pun on the abbreviation of the English letter "D" used in its English, Italian, and Spanish names.
