title: Card Trivia:Laval Coatl
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Quetzalcoatlus|Quetzalcoatlus]]'', a genus of azhdarchid pterosaur named after the Aztec feathered serpent deity, [[wikipedia:Quetzalcoatl|Quetzalcoatl]].
  ** This monster's name is also based on "coatl", the Nahuatl word meaning "serpent".
  * This monster has an adult form: "[[Lavalval Dragun]]".
  * This monster bears a striking resemblance to "[[Daigusto Phoenix]]"; this may be the result of an alliance between the "[[Laval]]" and the "[[Gusto]]" tribes.
