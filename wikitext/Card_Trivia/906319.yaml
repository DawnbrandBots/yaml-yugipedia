title: Card Trivia:Nine-Lives Cat
wikitext: |-
  {{Navigation}}

  * This card's name, [[Rank]], [[ATK]], [[DEF]] (3*3=9), and its effect that allows you to [[Special Summon]] a [[Level]] 9 monster from your [[GY]], are all references to the myth that [[wikipedia:Cat|cats have nine lives]].
  ** This is also the ninth [[Zombie]] [[Xyz Monster]] in the [[TCG]].
  * This monster currently has the highest DEF of all [[Zombie]] monsters.
