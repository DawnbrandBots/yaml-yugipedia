title: Card Trivia:Altergeist Haunted Rock
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Altergeist Haundeadlock" (オルターガイスト・ホーンデッドロック '' Orutāgaisuto Hōndeddorokku'') references a [[wikipedia:Deadlock|deadlock]], a computer science term that's used to describe a state in which two or more processes (running simultaneously) require resources from each other, preventing them from continuing.
