title: Card Trivia:Imprudent Intrusion
wikitext: |-
  {{Navigation}}

  * "[[Basilius, Familiar of the Evil Eye]]", "[[Gorgon, Empress of the Evil Eyed]]", and "[[Serziel, Watcher of the Evil Eye]]" appear in this card's artwork.
  ** The events depicted in this card's artwork are the continuation of the events depicted in the artwork of "[[Evil Eye Reemergence]]".
  * This card's Japanese name, 「{{Ruby|死|し}}{{Ruby|償|しょう}}{{Ruby|不|ふ}}{{Ruby|知|ち}}」 (''Shishōfuchi'', "Punishment of Imprudence"), is a homophone of 「{{Ruby|死|し}}{{Ruby|生|しょう}}{{Ruby|不|ふ}}{{Ruby|知|ち}}」 (''Shishōfuchi''), which means "thinking nothing of one's death" and figuratively "reckless", with the kanji 「{{Ruby|償|しょう}}」 (''shō'', "price") replacing 「{{Ruby|生|しょう}}」 ("life").
