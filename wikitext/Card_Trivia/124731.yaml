title: Card Trivia:Dark Sanctuary
wikitext: |-
  {{Navigation}}

  * This card's artwork featuring eyes and mouths is likely a reference to the artistic works of [[wikipedia:Salvador Dalí|Salvador Dalí]].
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, "[[Destiny Board (manga)|Destiny Board]]" counted turns rather than placing [[Continuous Spell Card]]s on the field. In the [[Yu-Gi-Oh! (anime)|anime adaptation]] of [[Yami Yugi and Yami Bakura's Battle City Duel]], this presented the problem of [[Yami Bakura]] not having enough [[Spell & Trap Zone]]s to win the [[Duel]] with "[[Destiny Board (anime)|Destiny Board]]", so this card was created to allow Yami Bakura to complete "Destiny Board" by using his [[Monster Zone]]s instead.
  * This card's ''[[OCG]]''/''[[TCG]]'' [[attack target]]-managing effect references the [[Evil Ghost of Dark Sanctuary]], an entity summoned by this card's effect in the ''Yu-Gi-Oh!'' anime which possessed an opponent's monster once per turn. If the opponent declared an attack with the possessed monster, the Evil Ghost of Dark Sanctuary would emerge from that monster's body, [[Negate|negating]] the attack and inflicting damage to the opponent equal to half of the monster's [[ATK]].
  ** In the manga, "[[Dark Necrofear (manga)|Dark Necrofear]]" has [[Marionette's Spirit|this effect]] as its own [[monster effect]].
