title: Card Trivia:Cú Chulainn the Awakened
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Guard Robe Exchange]]".
  * The "[[Emblem of the Awakening]]" appears in this card's artwork, worn around this monster's neck.
  ** While quotation marks are usually used around card names appearing in prose, this card excludes them from "Emblem of the Awakening".
  * This monster is based on [[wikipedia:Cú Chulainn|Cú Chulainn]], a warrior hero and demigod in Irish mythology who single-handedly defeated the army of Connacht during the Cattle Raid of Cooley.
  ** This monster's spear is based on [[wikipedia:Gáe Bulg|Gáe Bulg]], one of the spears wielded by Cú Chulainn given to him by his martial arts teacher, the warrior woman [[wikipedia:Scáthach|Scáthach]].
  ** According to mythology, Cú Chulainn was born "Sétanta", but assumed his namesake after he killed the Culann family's fierce guard dog in self defense. He offered to take its place until he was replaced, thus earning the name meaning "Hound of Culann".
  * This is the only card whose English name includes the character "[[wikipedia:Ú|ú]]".
