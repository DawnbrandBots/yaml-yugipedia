title: Card Trivia:Vaalmonica Scelta
wikitext: |-
  {{Navigation}}

  * "[[Angello Vaalmonica]]", "[[Dimonno Vaalmonica]]", and "[[Selettrice Vaalmonica]]" appear in this card's artwork.
  * This card's artwork is based on a classical depiction of the concept of a "[[wikipedia:Shoulder angel|shoulder angel and devil]]", an interpretation and visualization of one's individual [[wikipedia:Conscience|conscience]] that drives them to make morally good or evil decisions.
  ** This card's name is based on ''scelta'', the Italian word for "choice", which further alludes to the concept of the "shoulder angel and devil".
  ** This card's artwork depicts "Selettrice" as the "host" of "Angello" and "Dimonno", which is evident by how they share about a similar appearance.
