title: Card Trivia:Rainbow Overdragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Rainbow Dragon]]".
  ** This monster's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Rainbow Dragon (anime)|Rainbow Dragon]]" in the Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime: "Over the Rainbow".
  * This monster has a [[counterpart]]: "[[Ultimate Crystal Rainbow Dragon Overdrive]]".
  ** Both are [[Level]] 12 Fusion Monsters with 4000 [[ATK]] and 0 [[DEF]].
  ** Both are upgraded forms of "Rainbow Dragon".
  ** Both require 7 "[[Crystal Beast]]" monsters as [[Fusion Material]]s; "Ultimate Crystal Rainbow Dragon Overdrive" also requires an "[[Ultimate Crystal]]" monster as [[material]].
  ** This monster's name is based on the attack name of "Rainbow Dragon" in the Japanese version of the ''Yu-Gi-Oh! GX'' anime, while the name of "Ultimate Crystal Rainbow Dragon Overdrive" is based on the effect name of "Rainbow Dragon", "Rainbow Overdrive" (レインボー・オーバードライブ ''Reinbō Ōbādoraibu'').
  * This is the first Fusion Monster that can [[Special Summon]] itself from the [[Extra Deck]] without [[Contact Fusion]].
