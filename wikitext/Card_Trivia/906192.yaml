title: Card Trivia:Ursarctic Big Dipper
wikitext: |-
  {{Navigation}}

  * "[[Ursarctic Mikpolar]]" appears in this card's artwork.
  * The ship in this card's artwork also appears in the artworks of "[[Ursarctic Departure]]" and "[[Ursarctic Slider]]".
  * This card's name is a reference to the [[wikipedia:Big Dipper|Big Dipper]] [[wikipedia:Asterism|asterism]], which is a part of the [[wikipedia:Ursa Major|Ursa Major]] [[wikipedia:Constellation|constellation]].
