  * "[[Digital Bug Cocoondenser]]", "[[Digital Bug Rhinosebus]]", and three "[[Digital Bug LEDybug]]" appear in this card's artwork.
  ** Each "LED Bug" has a number on its back, representing the [[Rank]]s of all currently released "[[Digital Bug]]" [[Xyz Monster]]s.
