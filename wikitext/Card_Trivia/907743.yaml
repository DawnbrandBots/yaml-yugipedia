title: Card Trivia:Kashtira Akstra
wikitext: |-
  {{Navigation}}

  * "[[Visas Starfrost]]" appears in this card's artwork.
  * This card's artwork appears to depict the transformation of "Visas Starfrost" into "[[Vicious Astraloud]]".
  ** Fittingly, its effect entails the controller banishing the former in order to Special Summon the latter.
