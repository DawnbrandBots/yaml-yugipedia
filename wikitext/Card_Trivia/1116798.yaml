title: Card Trivia:Winged Dragon of Chaos
wikitext: |-
  {{Navigation}}

  * One of the ceremonial torches from the artwork of "[[Black Magic Ritual (Rush Duel)|Black Magic Ritual]]" appears in this card's artwork.
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Winged Dragon, Guardian of the Fortress 1 (Rush Duel)|Winged Dragon, Guardian of the Fortress #1]]".
  ** This monster's effect to [[Set]] "Black Magic Ritual" from the [[Graveyard]] is based on the appearance of "[[Winged Dragon, Guardian of the Fortress (manga)|Winged Dragon, Guardian of the Fortress]]" in {{chapter|Yu-Gi-Oh!|130|ref}}, in which "[[Dark Magic Ritual (manga)|Dark Magic Ritual]]" was Set by [[Yugi Mutou (manga)|Yugi Mutou]] before the aforementioned monster was Summoned by [[Dark Yugi (manga)|Dark Yugi]]. Later in the chapter, when "Black Magic Ritual" was [[activate]]d, "Winged Dragon, Guardian of the Fortress" was one of the monsters [[Tribute]]d to [[Ritual Summon]] "[[Magician of Black Chaos (manga)|Magician of Black Chaos]]".
