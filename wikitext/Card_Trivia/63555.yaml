title: Card Trivia:Little-Winguard
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Alchemy Cycle]]", "[[Emergency Evasion]]" and "[[Switch Off]]".
  * In ''[[Yu-Gi-Oh! The Sacred Cards]]'', this was a [[Level]] 5 [[Normal Monster]] and was named "Tiny Guardian".
  * The word "[[Battle Position]]" is strangely translated with "Position" instead of "Kampfposition" in the German card lore, initially causing some players to believe that this card is able to move from one [[Monster Card Zone]] to another during the [[End Phase]].
  * "Winguard" is a portmanteau of "wing" and "guard".
  * This card's [[Yu-Gi-Oh! Duel Monsters (video game series)|''Yu-Gi-Oh! Duel Monsters'' video game]] card artwork is taken from {{chapter|Yu-Gi-Oh! Duelist|108|ref}}, specifically from the panel showing [[Little-Winguard (manga)|this monster]] and "[[Panther Warrior (manga)|Panther Warrior]]" alongside [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] (after [[Insector Haga (manga)|Insector Haga]] Summons "[[Pinch Hopper (manga)|Pinch Hopper]]" but before Jonouchi begins his next turn).
