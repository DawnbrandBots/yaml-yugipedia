title: Card Trivia:Xyz Universe
wikitext: |-
  {{Navigation}}

  * "[[Constellar Pleiades]]", "[[Constellar Hyades]]", "[[Constellar Praesepe]]", two parts of the body of "[[Constellar Ptolemy M7]]" as well as "[[Shrine of Mist Valley]]" appear in this card's artwork. It is possible that those Xyz Monsters are fusing together to form "Ptolemy" prior to the fight between "Ptolemy" and "[[Evilswarm Ouroboros]]" that takes place above the shrine, as shown in "[[Infestation Terminus]]".
  ** The circle being formed is similar to the one seen in "[[Constellar Belt]]".
