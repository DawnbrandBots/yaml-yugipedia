title: Card Trivia:Evil HERO Dead-End Prison
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Evil HERO]]" [[counterpart]] of "[[Elemental HERO Prisma]]".
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Level]] (4), and [[original ATK and DEF]] (1700/1100).
  ** Both share a similar effect to [[send]] monsters from the [[Main Deck]] to the [[Graveyard]], with the intended purpose of facilitating the [[Fusion Summon]] of certain [[Fusion Monster]]s that [[mention]] their [[Fusion Material]]s by name.
  ** The word "prison" has a similar pronunciation to "prism", reflecting how this monster is im'''prison'''ed in a cage made out of '''prism'''atic stones. The cage itself is a based on the crystalline interior of the lower floors of the [[Supreme King's castle (location)|Supreme King's castle]] from the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This is the first [[Rock]] "[[HERO]]" monster.
  ** Since it is the first (and only) non-[[Fiend]] monster among the "Evil HERO" monsters, this was likely a design choice to support the [[Fusion Summon]] of "[[Evil HERO Dark Gaia]]", which requires a Rock monster as Fusion Material.
  * This is the first monster to contain the word "dead" in its ''[[TCG]]'' name, though it is part of a hyphenated word.
