title: Card Trivia:Fairy's Hand Mirror
wikitext: |-
  {{Navigation}}

  * This mirror appears in the artworks of "[[Fusion Recycling Plant]]", "[[Twister]]" and "[[Weighbridge]]" (albeit broken in the latter).
  * This card has a counterpart, "[[Fiend's Hand Mirror]]".
  * Oddly, the nudity of this fairy in this card's artwork is not censored in the ''[[TCG]]''.
