title: Card Trivia:Berserker Soul
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' [[activation requirement]] to have the player's monster with 1500 [[ATK]] damage the opponent with a [[direct attack]] is based on a scene from {{episode|Yu-Gi-Oh!|162|ref}}, where [[Yami Yugi]] [[activate]]s this card after damaging [[Weevil Underwood]] from a direct attack with "[[Breaker the Magical Warrior (anime)|Breaker the Magical Warrior]]", whose 1600 ATK was decreased to 1500 via the effect of "[[Infestation]]".
  ** This card's ''OCG''/''TCG'' effect to allow the player to [[excavate]] up to eight cards and inflict 500 damage each time they excavated a [[Monster Card]] is an alteration of its effect in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, which allows the player to [[draw]] as many Monster Cards as they can until they draw a non-Monster Card, and allow their monster with 1500 or less ATK to make an additional [[direct attack]] for each Monster Card drawn. In the above-mentioned episode, Yami Yugi drew exactly eight Monster Cards with this card's effect, although [[Téa Gardner]] stopped the [[Duel]] before he could [[discard]] the eighth card.
  *** The eight successful excavations with this card's effect can deal a total of 4000 [[damage]], which is the amount of [[Life Points]] that [[Duelist]]s start each game with at the time this card appeared in the ''Yu-Gi-Oh!'' anime.
  * This card's damaging effect is worded as the resolution of a single effect, so by the game rules at the time of this card's release, a player could (and indeed was required to) continue to excavate cards and damage their opponent even after their Life Points had already become 0. This would continue to apply until the March 20, 2015 ruling change on [[victory condition]]s in the ''TCG''.
  ** This is based on this card's usage use in the ''Yu-Gi-Oh!'' anime, where Yami Yugi continued to attack [[Weevil Underwood]] several times using this card, even after Weevil had already lost the Duel.
  ** This outcome can be [https://www.youtube.com/watch?v=A8C2cNvkEz8&t=1m5s seen very prominently] in the ''[[Yu-Gi-Oh! Tag Force]]'' video game series.
