title: Card Trivia:Dark Blade the Captain of the Evil World
wikitext: |-
  {{Navigation}}

  * "[[Pitch-Dark Dragon]]" appears in this card's artwork.
  * This card is a [[Card evolutions|retrained]] version of "[[Dark Blade]]".
  ** "Dark Blade" has a pair of a [[Union monster]]s associated with it ("[[Kiryu]]" and "Pitch-Dark Dragon"). The Union mechanic is likely the basis for this card's effect to equip a [[Level]] 4 or lower [[LIGHT]] monster your opponent controls to itself, as well as the effect to destroy the monster equipped to this card instead if this card would be destroyed.
