title: Card Trivia:Guardian Statue
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Double Defender]]" and "[[Shifting Shadows]]".
  * This monster's appearance resembles "[[Granmarg the Rock Monarch]]" and "[[Grave Ohja]]".
  * This monster has the same [[Attribute]] ([[EARTH]]), [[Level]] (4), [[Type]] ([[Rock]]), [[original ATK]] (800), and effect as "[[Golem Sentry]]".
  * In earlier Spanish prints, this card's name was "''Est'''á'''tua Guardiana''" instead of "''Est'''a'''tua Guardiana''".
