title: Card Trivia:Performapal Cheermole
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Acrobatic Tower]]", "[[Last Minute Cancel]]", "[[Performapal Call]]", "[[Performapal Curtain Call]]", "[[Performapal Dramatic Theater]]", "[[Performance Exchange]]", "[[Performapal Guard Dance]]", "[[Performapal Pinch Helper]]", and "[[Performance Pirouette]]".
  ** A coloured outline of this monster appears in the artwork of "[[Performapal Duelist Extraordinaire]]".
