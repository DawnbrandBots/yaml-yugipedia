title: Card Trivia:Gaia the Dragon Champion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Corrosive Scales]]" and "[[Intercepting Gaia]]".
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gaia The Fierce Knight]]" and "[[Curse of Dragon]]".
  * This monster has multiple [[counterpart]]s:
  ** An [[Xyz Monster|Xyz]] counterpart: "[[Gaia Dragon, the Thunder Charger]]".
  ** Two [[retrained]] counterparts: "[[Sky Galloping Gaia the Dragon Champion]]" and "[[Gaia the Magical Knight of Dragons]]".
  ** A Fusion with "[[Dark Magician]]": "[[Dark Magician the Knight of Dragon Magic]]".
  ** Two ''[[Rush Duel]]'' counterparts: "[[Gaia, Conqueror of Champions]]" and "[[Swift Gaia the Dragon Champion]]".
  * This is the first Fusion Monster to be [[Fusion Summon]]ed in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], as well as the first Fusion Monster to be Summoned by [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in the anime).
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|Yu-Gi-Oh!|068|ref}} showing the result of "[[Polymerization (manga)|Polymerization]]" fusing "[[Gaia the Fierce Knight (manga)|Gaia the Fierce Knight]]" and "[[Curse of Dragon (manga)|Curse of Dragon]]" together.
  ** This monster's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] pose is taken from a panel from {{chapter|Yu-Gi-Oh!|083|ref}} showing "[[Catapult Turtle (manga)|Catapult Turtle]]" using its effect to launch [[Gaia the Dragon Champion (manga)|this monster]] at "[[Castle of Dark Illusions (manga)|Castle of Dark Illusions]]".
