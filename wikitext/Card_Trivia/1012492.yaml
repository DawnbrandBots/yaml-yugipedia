title: Card Trivia:Draco the Hand-Sewn
wikitext: |-
  {{Navigation}}

  * This monster is a plushie counterpart of "[[Draco the Tiny]]".
  ** This monster's Japanese name (手縫いドラコ, ''Tenui Dorako'') is a pun on the Japanese name of "Draco the Tiny", "Hand-Sized Draco" (手乗りドラコ, ''Tenori Dorako'').
  ** This monster is based on the "Draco the Tiny" plushie made by [[Lucidien Kallister]] in {{episode|sevens|27|ref}}.
