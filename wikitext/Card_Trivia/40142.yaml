title: Card Trivia:Machine Lord Ür
wikitext: |-
  {{Navigation}}

  * This monster's parts appear in the artwork of "[[Beast Machine King Barbaros Ür]]" as the monster's armor.
  * This is the first card to have an [[wikipedia:Umlaut (diacritic)|umlaut]] in its English name.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|R|044|ref}}, specifically from the panel showing [[Machine Lord Ür (manga)|this monster]] being Summoned.
