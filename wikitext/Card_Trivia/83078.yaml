title: Card Trivia:Dekoichi the Battlechanted Locomotive
wikitext: |-
  {{Navigation}}

  * "[[Bokoichi the Freightening Car]]" appears in the background of this card's artwork.
  ** This card's artwork is a different angle of the artwork of "Bokoichi".
  * This monster appears in the artwork of "[[End of the Line]]".
  * The [[Eye of Wdjat]] appears in this card's artwork, as the headlight on this monster.
  * This monster is likely based on the [[wikipedia:JNR Class D51|JNR Class D51]], a Japanese steam locomotive of the same name, ''Dekoichi''. A closer observation of this card's artwork and the artwork of "Bokoichi" reveals it has a 2-8-2 wheel configuration with a double bogie tender, and the nameplate on its forehead read "DE-51", which, phonetically, is the same class number as the real prototype, a D51.
  ** This card's effect of [[drawing]] more cards depending on the number of copies of "Bokoichi the Freightening Car" on the player's [[field]] is a reference to how a train delivers freight cars.
  ** The code on this monster's forehead, "DE-51", can be read as ''De-ko-ichi'' (5 = ''ko'', 1 = ''ichi''), which is this card's name.
