title: Card Trivia:VARefar, the Judge of Ball
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "VAR" ([[wikipedia:Video assistant referee|video assistant referee]]) and "[[wikipedia:Valefar|Valefar]]" (one of the 72 demons described in ''[[wikipedia:Ars Goetia|Ars Goetia]]'').
  ** In [[wikipedia:Demonology|demonology]], Valefar is described as a good familiar by his associates "till they are caught in the trap". As such, this monster references the consensus among the associated football community regarding the usage of VAR, as some only considered VAR fair when it's not used on their own teams.
  ** This monster's ''[[TCG]]'' epithet is a pun on the epithet "The Judge of All" with "All" changed to "Ball" to reference his appearance as a sports referee.
  * This monster's [[Level]] (11) references how a team in associated football usually consists of eleven players.
  * This monster's [[Quick Effect]] to [[Special Summon]] itself in response to an opponent's play and require the player to [[reveal]] a card of a specific [[Card type|type]] in their [[hand]] is based on the [[wikipedia:Penalty card|penalty card]] system in association football, where the referee will quickly step in and briefly interrupt the game to issue penalty cards to the players based on their actions.
  ** [[Monster Card]]: Represents the yellow card, issued as a caution when a player commits a foul, represented by its effect to force the opponent's monster into [[Defense Position]].
  ** [[Spell Card]]: Represents the rarely used green cards, which commends the player for their sportsmanship, represented by its effect to double the [[ATK]] of the opponent's monster.
  ** [[Trap Card]]: Represents the red card, issued to signify that a player has been sent off due to repeated fouls or major misconduct, represented by its effect to [[banish]] the opponent's monster from the [[field]].
