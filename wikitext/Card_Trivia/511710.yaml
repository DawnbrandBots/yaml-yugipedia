title: Card Trivia:D.D. Trainer
wikitext: |-
  {{Navigation}}

  * This monster is either "[[Coach Goblin]]" or "[[Second Goblin]]" riding "[[D.D. Crazy Beast]]".
  ** This card's artwork is a follow-up to the event depicted in the artwork of "D.D. Crazy Beast".
  * According to the [[Master Guide 1 card storylines]], this monster tames "D.D. Crazy Beast" after it pulls him into the [[Different Dimension]], though it still wants to eat him. He also has a father-son relationship with "[[D.D. Warrior]]" and aids in raising and nurturing "[[Different Dimension Dragon]]". Though he has no particular relationship with "[[D.D. Warrior Lady]]", he is said to be her type.
  * This monster appears in the artwork of "[[Premature Return]]".
  ** This card appears in the artwork of "[[Eater of Millions]]".
