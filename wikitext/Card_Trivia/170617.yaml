title: Card Trivia:Hook the Hidden Knight
wikitext: |-
  {{Navigation}}

  * This monster is likely based on [[wikipedia:The Hook|The Hook]], an urban legend about a serial killer with a pirate hook for a hand who attacks a couple in a parked car. The killer is sometimes portrayed as a faceless, silhouetted old man who wears a raincoat that conceals most of his features, especially his face.
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this is a "shadow card" created by [[Primo]], which features special powers that allows it to manifest in the real world.
  ** In this card's case, this monster can manifest a physical body from the shadows, which tries to snare the wheels of other players' [[Duel Runner]]s with its hook-hands and cause them crash.
