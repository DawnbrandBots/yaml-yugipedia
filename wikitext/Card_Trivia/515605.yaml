title: Card Trivia:XX-Saber Emmersblade
wikitext: |-
  {{Navigation}}

  * This is the first and only [[Insect]]-[[Type]] "[[X-Saber]]" monster.
  * This card, along with "[[Underground Arachnid]]", were the first two Insect-Type [[monster]]s to be realeased as [[Secret Rare]]s from a Booster Pack.
  * The "forearms" and "hands" of this card resemble the double "X" for "[[XX-Saber]]" Monsters.
  * Both this card and "[[XX-Saber Darksoul]]" are Level 3 [[TCG Exclusives]] "[[X-Saber]]" [[Searcher]]s with the set number of 081.
