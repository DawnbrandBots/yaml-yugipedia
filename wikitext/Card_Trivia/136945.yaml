title: Card Trivia:Worm Solid
wikitext: |-
  {{Navigation}}

  * This monster appears to be a pyramid containing the remains [[destroy]]ed [[Reptile]] "[[Worm]]" monsters, which reflects its effect to gain 100 [[DEF]], allowing the pyramid to become more "solid" as more "Worms" fit inside its pyramid.
  * If this card is scanned in any compatible ''[[Duel Terminal]]'' arcade machine, then the mouse cursor will be replaced by this monster.
  * The Spanish print of this card refers to the "Worm" [[archetype]] name as "''Gusano/a''" instead of "''Gusano''".
