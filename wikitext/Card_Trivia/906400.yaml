title: Card Trivia:Infernity Sage
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2021]]''.
  * This monster holds an item resembling the feather fan associated with [[wikipedia:Zhuge Liang|Zhuge Liang]], a Chinese statesman, strategist, and engineer who is recognized as the most accomplished strategist during the [[wikipedia:Three Kingdoms|Three Kingdoms]] era.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|019|ref}}, specifically from the panel showing [[Infernity Sage (manga)|this monster]] being Summoned, albeit with its arm holding the feather fan slightly raised up.
