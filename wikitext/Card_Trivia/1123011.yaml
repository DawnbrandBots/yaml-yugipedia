title: Card Trivia:Return of the Duelist (card)
wikitext: |-
  {{Navigation}}

  * "[[Heroic Champion - Excalibur]]" appears in this card's artwork.
  * This card is named after the ''[[Return of the Duelist]]'' [[Core Booster]] pack, which features "Heroic Champion - Excalibur" as the [[cover card]].
  ** This card's artwork is based on a scene from the [https://www.youtube.com/watch?v=ZG8pJqnBcus Japanese commercial] for ''Return of the Duelist'', where the stone casing of the petrified "Excalibur" is chipped away around its left eye before it breaks free.
  ** Fittingly, this card was revealed on the ''[[OCG]]'' [https://x.com/YuGiOh_OCG_INFO/status/1911751298166509629 Twitter] on April 13, 2025, in Japan, exactly 13 years after the Japanese release date of ''Return of the Duelist''.

