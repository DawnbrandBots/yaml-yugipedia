title: Card Trivia:The Duke of Demise
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[The Earl of Demise]]".
  ** This monster is based on a [[wikipedia:Duke|duke]], a male member of high-ranking nobility who is ranked below that of a king or queen.
  *** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster specifically required "[[The Earl of Demise (anime)|The Earl of Demise]]" and "[[Headless Knight (anime)|Headless Knight]]" as [[Fusion Material]]s; this is also reflected in this monster's 2000 [[ATK]] (the same as "The Earl of Demise") and 1700 [[DEF]] (the same as "Headless Knight").
  *** In the ''[[OCG]]''/''[[TCG]]'', this monster instead requires [[Fiend]] and/or [[Zombie]] monsters as Fusion Materials, which are the [[Type]]s of monsters commonly used by this monster's owner, [[Yami Bakura]], in the anime.
  * This was the last Fusion Monster that appeared in the ''Yu-Gi-Oh!'' anime to be released in the ''OCG''/''TCG''.
  ** However, "[[Big Bang Dragon Blow]]", an [[Equip Spell Card]] created by fusing "[[Big Bang Blow]]" and "[[Claw of Hermos]]" in the ''Yu-Gi-Oh!'' anime, has not yet been released in the ''OCG''/''TCG''. While it is an Equip Spell in the anime, other Equip Spells created with "[[The Claw of Hermos]]" have been printed as Fusion Monsters in the ''OCG''/''TCG'', with effects that treat themselves as Equip Spells.
  * In the ''Yu-Gi-Oh!'' anime, despite being a Fusion Monster, this card had the orange-colored frame of a [[Main Deck]] [[Effect Monster]], instead of the purple-colored frame of Fusion Monsters.
  * In the ''Yu-Gi-Oh!'' anime, this monster is depicted with one visible eyeball, while in its ''OCG''/''TCG'' artwork it is depicted with two visible eyeballs.
  * This is the only Fusion Monster in the ''OCG''/''TCG'' with multiple Type-specific Fusion Materials of variable Types, allowing it to be Fusion Summoned using [[material]]s of only one or both of the two Types listed.
  ** The only other monster in the ''OCG''/''TCG'' with optional and variable Fusion Material is "[[Storagepod]]". Unlike this monster, however, "Storagepod" requires a specifically-named monster(s) and a monster(s) of a specific Type(s) as Fusion Materials, which are "[[Trifortressops]]" or "[[Stegocyber]]" and one [[Machine]] or [[Dinosaur]] monster. Since "Trifortressops" is a Machine monster and "[[Stegocyber]]" is a [[Dinosaur]] monster, "Storagepod" can be Fusion Summoned using materials of only one of the two Types listed.
