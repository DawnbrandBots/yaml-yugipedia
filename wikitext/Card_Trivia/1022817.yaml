title: Card Trivia:Destructor Soldier Plasterer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Demolition Fighting Spirit]]", "[[Demolition Perforation]]", and "[[Demolition Survey]]".
  * This monster's Japanese name, "Sakan Yasan" (サカン・ヤサン, ''Sakan Yasan'') is a pun on the Japanese word for "plasterer" (左官屋, ''Sakan'ya'').
