title: Card Trivia:Fish Lamp
wikitext: |-
  {{Navigation}}

  * This is the first [[FIRE]] [[Fish]] monster.
  * This monster resembles the [[wikipedia:Ryukin|ryukin]], a breed of fancy goldfish with a pronounced hump on its back, used as a lantern to decorate various Japanese summer festivals, including as the ''[[wikipedia:Aomori Nebuta Matsuri|Aomori Nebuta Matsuri]]''.
