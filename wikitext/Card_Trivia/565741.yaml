title: Card Trivia:Eternal Galaxy
wikitext: |-
  {{Navigation}}

  * The silhouette of "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]" appears in this card's artwork.
  ** This card's name is possibly a reference to that monster's [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack name]]: "Eternity Photon Stream".
  ** An [[Overlay Network]] can also be seen in this card's artwork.
