title: Card Trivia:Mysterious Monolith
wikitext: |-
  {{Navigation|mode=nongame}}

  * Four [[Level]] stars appears in this card's artwork.
  ** The four Level stars in this card's artwork reflect this card's effect to be used as [[Xyz Material]] of a [[Rank 4]] [[Xyz Monster]]. Also, the monolith features a design with golden fixtures, similar to the gems used in the glyphs of the "[[New Order]]" monsters.
