title: Card Trivia:Judgment Arrows
wikitext: |-
  {{Navigation}}

  * This card is similar to "[[The Seal of Orichalcos]]".
  ** Both cards are [[Spell Card]]s used by a [[Lightning|main]] [[Dartz|antagonist]] in one season of their respective anime.
  ** Both cards have been used by a [[Ai|secondary]] [[Yami Yugi|protagonist]], despite the card's association with an antagonistic force.
  ** Both cards are based on the forces responsible for the destruction of a [[Cyberse (world)|certain]] [[Atlantis|important]] location in the anime.
  * This card is the first and so far only non-[[Link Monster]] card to feature [[Link Arrow]]s, as well as the first Spell Card to do so.
