title: Card Trivia:Curse of Fiend
wikitext: |-
  {{Navigation}}

  * The ceremonial rods in this card's artwork (or very similar ones) also appear in the artworks of "[[Black Magic Ritual]]", "[[Fusion Recycling Plant]]", and "[[Twister]]", as well as in the Japanese anime artwork of "[[Dark Dragon Ritual (anime)|Dark Dragon Ritual]]".
  * This is the only [[Normal Spell Card]] that can be [[activate]]d outside the [[Main Phase]].
