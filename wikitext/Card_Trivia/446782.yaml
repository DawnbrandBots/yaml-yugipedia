title: Card Trivia:Berserkion the Electromagna Warrior
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from the [[wikipedia:Berserker|berserker]], a warrior in [[wikipedia:Norse mythology|Norse mythology]] who fought in a furious trance while wearing bear skin.
  * This monster is the retrained [[counterpart]] of "[[Valkyrion the Magna Warrior]]".
  * Visually, this monster is a combination of "[[Alpha The Electromagnet Warrior]]", "[[Beta The Electromagnet Warrior]]", and "[[Gamma The Electromagnet Warrior]]", the three monsters required to [[Special Summon]] it.
  ** "Alpha The Electromagnet Warrior": This monster uses the polearm of "Alpha", as well as using the torso and shoulders of "Alpha" as its thighs and legs.
  ** "Beta The Electromagnet Warrior": This monster uses the upper legs of "Beta" as its lower legs.
  ** "Gamma The Electromagnet Warrior": This monster uses the gauntlet arms and torso of "Gamma", as well as using the shoulders of "Gamma" for the back of its shoulders.
