title: Card Trivia:Witchcrafter Pittore
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Witchcrafter Celebration‎]]", "[[Witchcrafter Confusion Confession]]", "[[Witchcrafter Creation]]", "[[Witchcrafter Patronus]]", "[[Witchcrafter Pupils]]", and "[[Witchcrafter Walpurgis‎]]".
  * This monster's name is derived from "''pittore''", the Italian word for "painter".
  ** Ironically, this monster's name is the masculine term for "painter", whereas the feminine term should be "''pittrice''"
