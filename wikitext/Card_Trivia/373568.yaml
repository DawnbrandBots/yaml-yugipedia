title: Card Trivia:Blue-Eyes Twin Burst Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Classic Pack 02]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Blue-Eyes Alternative White Dragon]]'"
  ** This monster has a "[[Cyber Dragon (archetype)|Cyber Dragon]]" [[counterpart]]: "[[Cyber Twin Dragon]]".
  *** Both are Fusion Monsters that require two copies of their [[archetype]]'s main monster ("[[Blue-Eyes White Dragon]]" for this monster and "[[Cyber Dragon]]" for "Cyber Twin Dragon") as [[Fusion Material]]s; both can also attack twice during each [[Battle Phase]].
