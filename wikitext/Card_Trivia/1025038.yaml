title: Card Trivia:Electromagnetic Turtle
wikitext: |-
  {{Navigation}}

  * This monster takes inspiration from other cards used by [[Yugi Muto]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's appearance as a turtle with a robotic design is similar to that of "[[Catapult Turtle]]".
  ** This monster's design features a [[wikipedia:Horseshoe magnet|horseshoe magnet]] and the letters "S" and "N" on the bottom of its shell typically found on both poles of a magnet, referencing the "[[Magnet Warrior]]" [[archetype]].
  ** This monster's [[Quick Effect]] to end the [[Battle Phase]] is likely based on the effect of "[[Kuriboh]]", which prevents [[battle damage]].
