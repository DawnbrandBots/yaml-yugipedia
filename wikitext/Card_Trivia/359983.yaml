title: Card Trivia:Dance Princess of the Nekroz
wikitext: |-
  {{Navigation}}

  * This monster is an older version of "[[Gishki Emilia]]" and "[[Emilia, Dance Priestess of the Nekroz]]", as reflected by their identical stats. She is also the mother of "[[Shurit, Strategist of the Nekroz]]".
  ** Like her younger selves, this monster has a seashell hanging from her left hip. "[[Pilica, Descendant of Gusto]]" wears a similar one as a hairband, which according to ''[[Master Guide 4 card storylines#The Little Protector in the Great Marshland|Master Guide 4]]'', was given to her by "her best friend from the "Gishki"" as a symbol of peace between their tribes.
  * This monster has three Ritual armored forms: "[[Nekroz of Gungnir]]", "[[Nekroz of Sophia]]", and "[[Nekroz of Metaltron]]".
  ** This monster also appears as herself in the artworks of "[[Nekroz Cycle]]", "[[Ritual Beast Return]]", "[[Zefra Providence]]".
  ** This monster is the only non-[[Ritual Monster|Ritual]] "Nekroz" monster that has a lower [[Level]] than all of its Ritual forms and cannot be used as the sole Tribute for any of them.
  * "[[Gishki Aquamirror]]" and "[[Nekroz Mirror]]" appears in this card's artwork.
