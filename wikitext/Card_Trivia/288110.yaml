  * "[[New Order 6: Etheric Apophis]]" and "[[New Order 8: Etheric Sebek]]" appear in this card's artwork.
  ** This card's artwork depicts the former being used to [[Xyz Summon]] the latter, both of which were used by this card's effect in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
