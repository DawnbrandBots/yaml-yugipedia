title: Card Trivia:Guiding Quem, the Virtuous
wikitext: |-
  {{Navigation}}

  * The wings of "[[Despian Quaeritis]]" appears in this card's artwork.
  ** This monster's name is derived from the Latin phrase ''[[wikipedia:Quem quaeritis?|Quem quaeritis?]]'', as with "Despian Quaeritis".
  * This monster is the true form of the soul possessing the body of "[[White Relic of Dogmatika]]", merged with the souls of all other Virtuous Vestals in the history of the "[[Dogmatika Nation]]" except the 317th (called Miine, who became the eye of the vehicle depicted in the artwork of "[[New Frontier]]") and the 666th ([[Ecclesia]]).
  ** "[[Blazing Cartesia, the Virtuous]]" is the form this merger took when it included both missing Vestals, and "[[Despian Luluwalilith]]" is when [[Fleurdelis]] temporarily managed to take control after Ecclesia was removed.
