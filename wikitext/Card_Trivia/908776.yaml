title: Card Trivia:Branded Regained
wikitext: |-
  {{Navigation}}

  * "[[Blazing Cartesia, the Virtuous]]" and "[[Bystial Druiswurm]]" appear in this card's artwork.
  * This card's name is a reference to ''[[wikipedia:Paradise Regained|Paradise Regained]]'', an epic poem by [[wikipedia:John Milton|John Milton]] and a sequel to ''[[wikipedia:Paradise Lost|Paradise Lost]]''.
