title: Card Trivia:Photon Trident
wikitext: |-
  {{Navigation}}

  * This is the 1st OCG/TCG [[Spell Card|Spell]]/[[Trap Card]] to support the "[[Photon]]" [[Archetype]].
  ** This is the 2nd [[TCG Exclusive]] "Photon" card made - the 1st being "[[Photon Sabre Tiger]]".
  * This card's effect is similar to "[[Photon Spear]]", as they both have a spear-theme and allow [[Piercing]] damage, but this card isn't a [[Equip Spell Card]] and is able to give [[ATK]].
