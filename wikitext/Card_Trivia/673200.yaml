  [[File:Three_Odd-Eyes_hybrids.png|thumb|right|250|[[Yuya Sakaki]] with "[[Odd-Eyes Venom Dragon (anime)|Odd-Eyes Venom Dragon]]", "[[Odd-Eyes Rebellion Dragon (anime)|Odd-Eyes Rebellion Dragon]]", and "[[Odd-Eyes Wing Dragon (anime)|Odd-Eyes Wing Dragon]]".]]

  * "[[Odd-Eyes Venom Dragon]]", "[[Odd-Eyes Wing Dragon]]", and "[[Odd-Eyes Rebellion Dragon]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ARC-V|148|ref}}, where [[Yuya Sakaki]] [[Summon]]ed "[[Odd-Eyes Venom Dragon (anime)|Odd-Eyes Venom Dragon]]", "[[Odd-Eyes Wing Dragon (anime)|Odd-Eyes Wing Dragon]]", and "[[Odd-Eyes Rebellion Dragon (anime)|Odd-Eyes Rebellion Dragon]]" with "[[Odd-Eyes Fusiongate]]", "[[Odd-Eyes Synchrogate]]", and "[[Odd-Eyes Xyzgate]]", during his [[Duel]] against [[Declan Akaba]].
  ** This card's name is a reference to the Pendulum Dimension, which the [[Standard Dimension]] was reborn into in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This card has the longest effect of any [[Trap Card]] in the English ''[[TCG]]'', with 119 words and 660 characters.

