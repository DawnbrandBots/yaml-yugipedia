  * This card somewhat resembles "[[Doom Dozer]]" and "[[Aztekipede, the Worm Warrior]]".
  ** Unlike them, it hasn't an effect that sends cards from the [[Deck]] to the [[Graveyard]], but like them, it has an effect that allows it to be summoned easily.
