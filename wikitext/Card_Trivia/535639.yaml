title: Card Trivia:The Six Samurai - Nisashi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Breakthrough!]]", "[[Six Samurai United]]", "[[Six Style - Dual Wield]]", and "[[Backs to the Wall]]".
  * This monster is wielding a ''[[wikipedia:Katana|katana]]'' and a ''[[wikipedia:Wakizashi|wakizashi]]'' (collectively known as ''[[wikipedia:Daishō|daishō]]'').
  * This monster is likely based on the Japanese swordsman [[wikipedia:Miyamoto Musashi|Miyamoto Musashi]], the founder of [[wikipedia:Niten Ichi-ryū|Niten Ichi-ryū]] (a dual-wielding sword style).
  ** Their names are similar: Nisashi and Musashi.
  ** The name and artwork of "[[Six Style - Dual Wield]]" (featuring this monster) reinforce the concept of Niten Ichi-ryū.
