title: Card Trivia:Go! - D/D/D Divine Zero King Rage
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Contract with the Zero King]]".
  * This monster's Japanese name, "Go-DDD Divine Zero King Zero God Reiji", and appearance are based on [[Declan Akaba]], whose Japanese name is "Reiji Akaba".
  ** This monster's names reflect [[Reiji Akaba (manga)|Reiji Akaba]] (the manga version of Declan) and his obsession with the number zero in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
  ** This monster's ''[[TCG]]'' name ("Go! - D/D/D Divine Zero King Rage") is derived from the katakana ''Reiji'' (レイジ), which has a similar pronunciation with the word "rage".
  * Among the [[G.O.D. (series)|G.O.D.]] cards, this monster represents the manipulation of space by rendering things "nonexistent" or zero, as per Reiji's obsession; its effects evoke this differently depending on the media.
  ** [[Divine Go-D/D/D Zero King Zero G.O.D. Reiji (manga)|The manga version of this monster]] makes its opponent's [[Life Point]]s become 0 if it successfully attacks and survives; in the ''[[OCG]]''/''TCG'', this effect causes it to gain [[ATK]] equal to the opponent's Life Points for the turn, ensuring that a direct attack would reduce their Life Points to 0, but only if their Life Points is 4000 or less.
  ** In the manga, any monster that attacks it has its ATK reduced to 0, effectively rendering the attack null as neither monster is destroyed by battle. The ''OCG''/''TCG'' simply makes it unable to be destroyed by battle and prevent its controller from taking battle damage, resulting in the same outcome.
  ** It can [[Tribute]] the controller's other monsters and gain effects that render the opponent's monsters' ATK (if Tributing 1 monster) or the opponent's cards in [[Monster Zone]]s, [[Spell & Trap Zone]]s, [[hand]], and [[Graveyard]] (if Tributing 3 monsters) "nonexistent". In the ''OCG''/''TCG'', it can Tribute a monster to [[Direct attack|attack directly]] (treating the opponent's monsters as "nonexistent"), prevent the opponent from activating effects in the [[Spell & Trap Zone]] (treating their [[Spell]]s and [[Trap]]s as "nonexistent"), or prevent them from activating card effects in the hand or Graveyard (treating cards in the hand and Graveyard as "nonexistent"); it can use this effect up to 3 times in order to fully emulate its manga counterpart.
  ** This monster's [[Pendulum Effect]]s in the ''OCG''/''TCG'' can also make effect damage 0, and reduce the number of Tributes needed to [[Normal Summon]]ing a high-Level "[[D/D]]" to 0.
  * This card's artwork is taken from {{chapter|ARC-V|042|ref}}, specifically from the panel showing [[Divine Go-D/D/D Zero King Zero G.O.D. Reiji (manga)|this monster]] being Summoned.
