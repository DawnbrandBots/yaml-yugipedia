title: Card Trivia:Token Sundae
wikitext: |-
  {{Navigation}}

  * The goblins and "[[Sheep Token]]s" that appear in this card's artwork also appear in the artwork of "[[Token Feastevil]]", "[[Token Thanksgiving]]", and "[[Oh Tokenbaum!]]".
  ** The international version of "Token Feastevil" did not edit the mugs nor the goblins eating the "Sheep Tokens", unlike in this card's artwork.
  * This card's name is a pun, where "Sundae" and "Sunday" are pronounced the same, the latter being the day that [[wikipedia:Easter|Easter]] (from the Japanese name) is always celebrated on.
