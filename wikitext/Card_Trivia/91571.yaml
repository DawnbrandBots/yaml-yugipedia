title: Card Trivia:King of Yamimakai
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[D/D/D Headhunt]]" and "[[Dark Contract with the Yamimakai]]".
  * This monster's ''[[TCG]]'' name is a partial translation of its Japanese name, "Supreme King of the Dark Demon World" ({{Ruby|闇|やみ}}{{Ruby|魔|ま}}{{Ruby|界|かい}}の{{Ruby|覇|は}}{{Ruby|王|おう}}, ''Yamimakai no Haō'').
  * This monster has a retrained ''[[Rush Duel]]'' [[counterpart]]: "[[Ominous Ogre of Yamimakai]]".
  * This is one of several monsters whose [[ATK]] or [[DEF]] is [[not divisible by 50]], the others being "[[Number S39: Utopia Prime]]", "[[Sword Arm of Dragon]]", and [[PaniK's monsters]]: "[[Barox]]", "[[Castle of Dark Illusions]]", "[[Dark Chimera]]", and "[[Reaper of the Cards]]".
  * The [[Bandai]] version of [[King of Yamimakai (Bandai)|this card]] is [[Level 7]] (the same [[Level]] it had in the manga) with an [[original ATK and DEF]] of 2600/1600.
  ** In ''[[Yu-Gi-Oh! The Sacred Cards]]'' and ''[[Yu-Gi-Oh! Reshef of Destruction]]'', this card's Level is still 5 but has an original ATK and DEF of 2600/2300 (the same it had in the manga).
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from {{chapter|Yu-Gi-Oh!|83|ref}}, specifically from the panel showing "[[Castle of Dark Illusions (manga)|Castle of Dark Illusions]]" falling on the [[Player Killer of Darkness (manga)|Player Killer]]'s monsters.
