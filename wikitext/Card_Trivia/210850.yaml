title: Card Trivia:Gear Gigant X
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Theme Pack: War of Infinite Machine]]''.
  * This monster appears in the artwork of "[[Garbage Collection]]", "[[Geargiagear]]" and "[[Xyz Discharge]]".
  * "[[Geargiano]]" and "[[Geargiano Mk-II]]" appear in this card's artwork.
  ** They are the [[Xyz Material]]s for this card, instead of the orbs that usually orbit other [[Xyz Monster]]s.
  ** It is not possible to Xyz Summon this card with "Geargiano" and "Geargiano Mk-II" normally, though a Level-modulating card like "[[Geargiagear]]" can enable it.
  * This monster can be seen as a [[Machine]] [[counterpart]] of "[[King of the Feral Imps]]":
  ** Both are [[Rank]] 4 Xyz Monsters with 2300 [[ATK]].
  ** Both cards search a member of their [[Type]] from the owner's [[Deck]] to the [[hand]] when an Xyz Material is [[detach]]ed from it.
