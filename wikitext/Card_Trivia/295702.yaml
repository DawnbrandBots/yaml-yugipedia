title: Card Trivia:Lady of the Lake
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Lady of the Lake|Lady of the Lake]], an important character in Arthurian legend. She was known for giving [[wikipedia:King Arthur|King Arthur]] [[wikipedia:Excalibur|Excalibur]] and raising [[wikipedia:Lancelot|Lancelot]] after his father's death.
  * "[[Noble Arms - Excaliburn]]" appears in this card's artwork.
  * A red, shadowy version of this lady appears in the artwork of "[[Ignoble Knight of High Laundsallyn]]".
  ** This lady also appears in the artwork of "[[Avalon]]" and "[[Last Chapter of the Noble Knights]]".
