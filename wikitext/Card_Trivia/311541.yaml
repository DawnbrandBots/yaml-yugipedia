title: Card Trivia:Night Dragolich
wikitext: |-
  {{Navigation}}

  * This card gains its name from the [[wikipedia:Dracolich|dracolich]]; an undead dragon that possesses certain abilities of a [[wikipedia:Lich|lich]].
  ** Despite this card's name and artwork, this card is [[Wyrm]]-[[Type]] and not [[Zombie]]-Type.
  * This monster appears in the artwork of "[[Free-Range Monsters]]".
  * The background of this monster's artwork seems to be "[[Dragon Shrine]]".
