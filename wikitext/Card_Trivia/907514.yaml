title: Card Trivia:Transcendosaurus Gigantozowler
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Transcendosaurus]] [[Fusion Monster|Fusion]] form of "[[Megazowler]]".
  * This monster is tied with "[[Transcendosaurus Glaciasaurus]]" and "[[Transcendosaurus Meteorus]]" for the highest [[Level]] (12) of all [[Dinosaur]] monsters.
