title: Card Trivia:Really Eternal Rest
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts [[Equip Card]]s, necessary to Summon "[[Guardian]]" monsters, including from top to bottom:
  ** "[[Shooting Star Bow - Ceal]]"
  ** "[[Wicked-Breaking Flamberge - Baou]]"
  ** "[[Rod of Silence - Kay'est]]"
  ** "[[Gravity Axe - Grarl]]"
  ** "[[Butterfly Dagger - Elma]]"
  ** "[[Twin Swords of Flashing Light - Tryce]]"
  * This card is a [[Trap Card]] version of "[[Eternal Rest]]".
