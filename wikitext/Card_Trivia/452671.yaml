title: Card Trivia:Performapal Handstandaccoon
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Return Tantan" (リターンタンタン ''Ritāntantan'') is a portmanteau of the Japanese pronunciation of "[[return]]" (リターン ''Ritān'') and the Japanese onomatopoeia of drumming (タンタン ''Tantan'').
  ** This monster's appearance and naming scheme is based on the legend of the ''[[wikipedia:Tanuki-bayashi|Tanuki-bayashi]]'', a strange sound of musical sounds, like drumming, caused by the ''[[wikipedia:Bake-danuki|Bake-danuki]]'', a ''[[wikipedia:Yōkai|yōkai]]'' resembling a shape-shifting raccoon dog.
  * This monster's eyes resemble [[Yuya Sakaki]]'s goggles, specifically the right lens obscured by a star, albeit with the color schemes of the orange lens and the blue star reversed.
