title: Card Trivia:Bait Bite Ball
wikitext: |-
  {{Navigation}}

  * The school of fish in this card's artwork appears in the artwork of "[[Grand Extreme]]".
  ** "Grand Extreme" appears to continue the events of this card's artwork.
  * "[[Battle Shark Samegalon]]" appears in this card's artwork.
  * This card is based on the "[[wikipedia:Bait ball|bait ball]]", a spherical swarm that fish adopt as a last-ditch survival mechanism when threatened by larger predators.
