title: Card Trivia:The Revenge of the Normal
wikitext: |-
  {{Navigation}}

  * "[[Gigobyte]]", "[[Haniwa]]", "[[Mokey Mokey]]" (in its enraged appearance from the artwork of "[[Mokey Mokey Smackdown]]"), "[[Mushroom Man]]", and "[[Petit Dragon]]" appear in this card's artwork.
  ** The events depicted in this card's artwork are a continuation of the events in the artworks of "[[The Law of the Normal]]", and are likely continued in the artworks of "[[The Return to the Normal]]" and "[[The Toil of the Normal]]".
  * The lion-like shadow on the left side of this card's artwork is presumed to be "[[Manticore of Darkness]]" due to its appearance and its glowing red eyes, whose foot appears in the artwork of "The Return to the Normal".
