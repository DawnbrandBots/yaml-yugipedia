title: Card Trivia:Luster Dragon 2
wikitext: |-
  {{Navigation}}

  * This monster has an [[Anime-only|anime-exclusive]] [[counterpart]]: "[[Diamond Head Dragon]]".
  * Despite their ''[[TCG]]'' name, this monster was originally released as "Luster Dragon", and its name was changed shortly after the release of "[[Luster Dragon]]".
  ** Both monsters' names were initially translated to "Luster Dragon" likely because their Japanese names contain gemstones, "Emerald" and "Sapphire" respectively.
