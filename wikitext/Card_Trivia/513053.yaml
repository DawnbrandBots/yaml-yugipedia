title: Card Trivia:Destruction Punch
wikitext: |-
  {{Navigation}}

  * "[[Des Kangaroo]]" appear in this card's artwork.
  ** The appearance of "Des Kangaroo" in this card's artwork is fitting, as this card's secondary effect [[destroy]]s the opponent's monster, similar to the effect of the aforementioned monster. 
  *** This follows the trend of two other [[Spell]]/[[Trap Cards]], "[[Cross Counter]]" and "[[Continuous Destruction Punch]]", which depicts "Des Kangaroo" punching an opponent and features an effect that destroys an opponent's monster based on the value of their [[ATK]] or [[DEF]] against the player's attacked [[Defense Position]] monster.
  ** At the time of this card's release in the [[Labyrinth of Nightmare (Japanese)|Japanese]] and [[Labyrinth of Nightmare|international]] release of the ''Labyrinth of Nightmare'' [[Core Booster|Core]] [[Booster pack]] "Des Kangaroo" had not yet been released until its debut in ''[[Controller of Chaos]]'' (in the ''OCG'') and ''[[Dark Revelation Volume 2]]'' (in the ''TCG'').
  * Like in its own artwork, "Des Kangaroo" features the word "DEATH" on the back of its vest.
