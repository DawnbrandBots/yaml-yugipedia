title: Card Trivia:Antihuman Intelligence ME-PSY-YA
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Mega Pack 06]]''.
  * This card's Japanese name is a play on "Artificial Intelligence" (Japanese: {{Ruby|人|じん}}{{Ruby|工|こう}}{{Ruby|智|ち}}{{Ruby|能|のう}} ''Jinkōchinō'') and a corruption of "Messiah".
  * This monster's design is inspired by the image of a dove holding a sprig of mistletoe, which commonly symbolizes "peace".
  * This card is the first [[Cyberse]] [[Pendulum Monster]].
