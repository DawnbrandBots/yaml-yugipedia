title: Card Trivia:Clock Tower Prison
wikitext: |-
  {{Navigation}}

  * This clock tower appears in the artworks of "[[D - Tactics]]" and "[[Eternal Dread]]".
  * This card has a retrained [[counterpart]] combined with "[[Dark City]]": "[[Clock Tower Prison City - Dark City]]".
  * This card is based on the [[wikipedia:Big Ben|Elizabeth Tower]], which is more commonly referred to as Big Ben.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this clock tower was shown to strike the hours of 3:00, 6:00, and 9:00 for each [[Clock Counter]] placed on this card. When the fourth Clock Counter was placed, the clock striked 12:00 and vibrated ominously.
  ** This card's effect to [[Special Summon]] "[[Destiny HERO - Dreadmaster]]" is a reference to the [[wikipedia:Man in the Iron Mask|Man in the Iron Mask]], an unknown prisoner who was arrested in the late 17th century and held in various French prisons.
  * This card was the first [[Field Spell Card]] to have an effect that applies only to its [[control]]ler.
