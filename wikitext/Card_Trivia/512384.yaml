title: Card Trivia:Ninjitsu Art of Decoy
wikitext: |-
  {{Navigation}}

  * "[[Ancient Tree of Enlightenment]]" and "[[Ninja Grandmaster Sasuke]]" appear in this card's artwork.
  * This card's name, artwork, and effect reference the substitution ''ninjitsu'', a technique used by ninjas in popular culture where a ninja swaps places with a block of wood to evade enemy attacks.
