title: Card Trivia:Tsukahagi, the Poisonous Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster is the human form of the ''[[wikipedia:Tsuchigumo|Tsuchigumo]]'', a ''[[wikipedia:Yōkai|yōkai]]'' in [[wikipedia:Japanese folklore|Japanese folklore]] that takes the form of a giant monstrous spider, whose legs appear in the background of this card's artwork.
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form: "[[Tsuchigumo, the Poisonous Mayakashi]]".
