title: Card Trivia:Peropero Cerperus
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a pun on the sound effect "peropero", which is used for a cat or a dog licking, and "[[wikipedia:Cerberus|Cerberus]]" - forming "'''Peropero''' Keru'''pero'''su".
  ** This card's name can also be a reference to ''perro'', a Spanish word for dog.
  * This card only has 2 heads in the [[Yu-Gi-Oh! ZEXAL (manga)|''Yu-Gi-Oh! ZEXAL'' manga]].
