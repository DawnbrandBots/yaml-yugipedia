title: Card Trivia:Aggiba, the Malevolent Sh'nn S'yo
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Vaiśravaṇa|Bishamonten]], the god of war in [[wikipedia:Buddhism|Buddhism]] who is depicted with a spear with one hand and a miniature pagoda in the other.
  ** This monster, along with its accompanying [[Match winner]], "[[Skuna, the Leonine Rakan]]", both share a Japanese Buddhism theme, referencing how they were released as [[Yu-Gi-Oh! World Championship 2009 prize cards|prize cards]] at the 2009 ''Yu-Gi-Oh!'' World Championship, which was held in [[wikipedia:Japan|Japan]].
