title: Card Trivia:Arzareth the Sweeping Wind
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Descent of the Sweeping Spirit]]".
  * This card is named after Arzareth, a land referenced in biblical apocrypha that the [[wikipedia:Ten Lost Tribes|ten lost tribes]] of Israel vanished into after being conquered by the [[wikipedia:Neo-Assyrian Empire|Neo-Assyrian Empire]], where the word "Arzareth" is the Hebrew word for "another land".
