title: Card Trivia:Ghostrick Break
wikitext: |-
  {{Navigation}}

  * "[[Ghostrick Yeti]]", "[[Ghostrick Yuki-onna]]", and "[[Ghostrick Stein]]" appear in this card's artwork.
  ** The scene depicted in this card's artwork is "Yeti" becoming heartbroken at the sight of "Yuki-onna" showing her affection to the unaware "Stein", reflecting this card's name (heart'''break''').
  * The scene in the artwork of "[[Duel Checker]]" appears in this card's artwork, but is zoomed out to show a larger scene. Also, the face on the back of "Ghostrick Stein" is changed to multiple hearts.
