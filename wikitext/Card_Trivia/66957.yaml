title: Card Trivia:Guardian Grarl
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Guardian Formation]]".
  * This monster is holding "[[Gravity Axe - Grarl]]" as its weapon.
  * This card's name, ''[[wikipedia:Tyrannosaurus|T-Rex]]'' appearance, and [[Dinosaur]] typing make it quite similar to the [[Neopets:Grarrl|Grarrl]], a creature of the ''[[wikipedia:Neopets|Neopets]]'' franchise.
