title: Card Trivia:Amulet Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Dragons of Legend: The Complete Series]]''.
  * This monster is a [[Fusion Monster|Fusion]] of "[[Dark Magician]]" and "[[The Eye of Timaeus]]".
  ** The symbols appearing on "The Eye of Timaeus" are based on the [[wikipedia:Enochian|Enochian]] alphabet, a constructed language recorded by English occultist [[wikipedia:John Dee|John Dee]].
  * This monster has another "Dark Magician"-based [[counterpart]]: "[[Dark Magician the Dragon Knight]]".
  * This monster has a "[[Dark Magician Girl]]"-based counterpart: "[[Dark Magician Girl the Dragon Knight]]"
