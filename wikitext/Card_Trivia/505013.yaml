title: Card Trivia:The Seal of Orichalcos
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Legendary Collection 3: Yugi's World]]'' and its [[Legendary Collection 3: Yugi's World Mega Pack|Mega Pack]]. 
  ** ''[[Extra Pack 2012]]'', which imports the card to the ''OCG'', also has this card as its cover card.
  * This seal appears in the artworks of "[[Orichalcos Deuteros]]", "[[Orichalcos Shunoros]]", "[[Orichalcos Sword of Sealing]]", and "[[Orichalcos Tritos]]".
  * The runes around the outer rim of the seal are the characters written in the [[wikipedia:Enochian|Enochian]] language, spelling out "OREICHALCOS" ("Oreichalcos") twice.
  ** The geometric figure inside the seal is a [[wikipedia:unicursal hexagram|unicursal hexagram]]. In a ''Yu-Gi-Oh! Trading Card Game'' blog post on Konami's website, it is called a "double-[[wikipedia:chevron (insignia)|chevron]] pattern".<ref name=firstline>[https://yugiohblog.konami.com/articles/?p=4217 Yu-Gi-Oh! TRADING CARD GAME » The Seal of Orichalcos: The First Line]</ref>
  ** In the original Japanese version of the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'']] anime, the text on all "[[Orichalcos]]" cards are also written entirely in Enochian runes, except for "[[Orichalcos Sword of Sealing (anime)|Orichalcos Sword of Sealing]]". Coincidentally, "Orichalos Sword of Sealing" is the only "Orichalcos" card to not be used by [[Dartz]], instead used by [[Rafael]].
  * This is the only [[Field Spell Card]] that can only be activated once per [[Duel]].
  * This is as the first card to prevent the user from [[Special Summon]]ing from their [[Extra Deck]].
  * This is the only card known to have received a printed [[The Seal of Orichalcos (mock-up)|mock-up]].
  * This is the first [[anime-only|anime-exclusive]] card to be released as a [[TCG exclusive|''TCG''-exclusive]] card in a [[Core Booster]].
  ** However, "[[Card of Sanctity]]" was the first anime card to be released in the ''TCG'' before the ''OCG'' in general.
  * This card previously existed as an [[Upper Deck Entertainment promotional card]] independent of Konami, and with the original effects plus one extra effect which allows it to [[negate]] and [[destroy]] any card. Fittingly, this card is given a [[Limitation Text]] that this is not an official card. There are only 15 copies of the [[Upper Deck Entertainment]] version in existence, all in the possession of members of Upper Deck Entertainment's R&D division, one of which was used in the Decks they played in the Orichalcos "[[Duel the Master]]" side event at previous [[National Tournament]]s.{{fact}} 
  ** The current status of these cards is unknown, as they haven't been used since [[Konami]] reclaimed distribution and organization rights.
  * This card's ''[[OCG]]''/''[[TCG]]'' effects are based on its effects in the ''Yu-Gi-Oh!'' anime. In the above-mentioned blog post on Konami's website, the number of sentences of the text in this card's ''TCG'' print of this card matches the number of lines and points in this seal's symbol.<ref name=firstline/> The effects have been [[nerf]]ed as much as possible while not remaining inconsistent with the anime.
  *# This card's first effect to increase the user's monster's [[ATK]] by 500 is the only effect fully preserved from its anime counterpart.
  *# This card's second effect, preventing it from being destroyed [[once per turn]], is based on how [[Yami Yugi]] attempted to destroy [[Gurimo]]'s copy of this card with "[[Dust Tornado (anime)|Dust Tornado]]". While Gurimo claimed the card could not be destroyed at all, since it was never attempted to be destroyed again, Konami asserted that Gurimo was intentionally deceiving Yugi.<ref name="blanks" />
  *# This card's third effect, preventing the opponent's monster from targeting the player's monster with the lowest ATK for attacks, is based on its anime counterpart's effect to prevent the opponent from attacking monsters placed in the [[Spell & Trap Zone]]. This effect is identical to that of "[[Pixie Ring]]", which Konami pointed out when announcing it.<ref name=blanks>[https://yugiohblog.konami.com/articles/?p=4270 Yu-Gi-Oh! TRADING CARD GAME » The Seal of Orichalcos: Filling in the Blanks]</ref>
  *# This card's fourth and fifth effects, preventing the user from Summoning monsters from the Extra Deck and destroying Special Summoned monsters, is based on what happened when this card was played by Yami Yugi, destroying "[[Dark Magician Girl the Dragon Knight (anime)|Dark Magician Girl the Dragon Knight]]" and reverting it to its unfused state. This is inconsistent with the anime, as [[Rex Raptor]] did [[Fusion Summon]] "[[Horned Saurus (anime)|Horned Saurus]]" while controlling this card in {{episode|Yu-Gi-Oh!|161|ref}}. 
  *#* Nevertheless, Yugi, [[Dartz]], [[Rafael]], [[Valon]], and [[Alister]] did not Fusion Summon after it was activated.<ref>[https://yugiohblog.konami.com/articles/?p=4229 Yu-Gi-Oh! TRADING CARD GAME » The Seal of Orichalcos: The Fourth & Fifth Lines]</ref>
  *#* When "[[Horned Saurus]]" was later released in the ''OCG''/''TCG'', it has been given an effect to place a [[Field Spell Card]] on the field, allowing it to coexist with "The Seal of Orichalcos".
  *# This card's sixth effect "once per Duel" [[condition]] is based on how a [[Duelist]] who uses this card once in a Duel will not be able to use it again, as either they will win the Duel and trap their opponent's soul in the card, or they will lose the Duel and their soul along with it.<ref name="blanks" /> Dartz also did not activate "The Seal or Orichalcos" a second time after "Orichalcos Tritos" was destroyed by "[[Legend of Heart]]".
  * This card is the first Spell Card in ''[[Yu-Gi-Oh! Duel Links]]'' to receive a full animated cutscene when activated.

