title: Card Trivia:Heroic Chance
wikitext: |-
  {{Navigation}}

  * "[[Heroic Champion - Excalibur]]" and the [[Duelist]] from the artwork of "[[Heroic Guard]]" appear in this card's artwork.
  ** This is fitting, since in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, the activation requirement of this card was similar to the restriction of "[[Heroic Champion - Excalibur (anime)|Heroic Champion - Excalibur]]'s" effect in the anime.
