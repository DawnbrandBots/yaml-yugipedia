title: Card Trivia:Bujinki Amaterasu
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * This monster is based on the [[wikipedia:Shinto|Shinto]] Sun goddess [[wikipedia:Amaterasu|Amaterasu]].
  * This card is the only "[[Bujin]]" [[Xyz Monster]] that does not require specific [[Xyz Material]]s to Summon.
  ** It is also the first "Bujin" Xyz Monster to not bear the suffix "-tei", as it does not represent a male [[wikipedia:god|god]], but a female [[wikipedia:goddess|goddess]].
  * This monster is a combination of parts of other "Bujin" monsters, specifically "[[Bujin Hirume]]" (the base), "[[Bujingi Warg]]" (the body armor), "[[Bujingi Sinyou]]" (the sword), "[[Bujingi Raven]]" (the wings) and "[[Bujingi Pavo]]" (the skirt).
  ** The "Bujingi" cards among these were all released as ''TCG''-exclusives.
  * This monster appears in the artwork of "[[Bujintervention]]".
  * Based on the storyline, this monster represents a corrupted "Bujin Hirume" (based on the artwork of "[[Bujincident]]") created by "[[Bujin Hiruko]]" (based on its lore), wielding three "Bujingi" ("[[Bujingi Quilin]]", "[[Bujingi Crow]]" and "[[Bujingi Peacock]]") which were given back by the three "Bujintei" (on the artwork of "Bujintervention", the three "Bujintei" are depicted fighting "Amaterasu" while missing these three "Bujingi"). Those three "Bujingis" became corrupted in the hand of "Amaterasu", becoming "Bujingi Sinyou", "Bujingi Raven" and "Bujingi Pavo", respectively.
  ** Also in the artwork of "Bujin Hirume", the sun is seen shining brightly, but is shown in eclipse in the art for "Bujin Amaterasu", reflecting the "darkening" or corruption of this monster.
