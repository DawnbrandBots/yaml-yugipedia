title: Card Trivia:The Gross Ghost of Fled Dreams
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is derived from an [[wikipedia:Incubus|incubus]], a male demon that appears in the dreams of female humans and causes them to experience nightmares or sleep paralysis, or drain their victims' energy.
  ** This monster's English name was likely named in honor of Norman J. Grossfeld, the president of [[4Kids Entertainment|4Kids Productions]] at the time.
  * "[[Dark Spirit of Banishment]]" is a combination of this monster, "[[Dark Spirit of the Silent]]", and "[[Headless Knight]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|Yu-Gi-Oh!|204|ref}} showing [[The Gross Ghost of Fled Dreams (manga)|this monster]] being Summoned.
