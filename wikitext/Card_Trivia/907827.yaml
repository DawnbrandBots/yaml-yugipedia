title: Card Trivia:Sportsdragon Closer
wikitext: |-
  {{Navigation}}

  * In baseball, a [[wikipedia:Closer (baseball)|closer]] is a relief pitcher who specializes in getting the final outs in a close game when his team is leading. This is referenced in this card's effect to gain a large amount of ATK and be made indestructible from Traps in order to finish the opponent off and win the Duel.
