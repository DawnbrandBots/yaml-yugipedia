title: Card Trivia:QQ Enneagon
wikitext: |-
  {{Navigation}}

  * This monster's name features multiple wordplays on the number 9, fitting with its stats and effects being themed around that number.
  ** The English letter "Q" is homophonous with ''kyū'' (九), the Japanese equivalent of '''9'''. 
  ** An enneagon is the alternate name of the [[wikipedia:Nonagon|nonagon]], the '''nine'''-sided polygon.
  *** The two Qs likely reflect how this monster's design features two visible enneagon-shaped jewels, while also having an [[equal ATK and DEF|equal]] [[original ATK and DEF]] of '''900'''.
