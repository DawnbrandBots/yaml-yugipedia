title: Card Trivia:Mementomictlan
wikitext: |-
  {{Navigation}}

  * A mural depicting "[[Mementomictlan Tecuhtlica - Creation King]]" appears in this card's artwork.
  * This card's name is derived from [[wikipedia:Mictlan|Mictlan]], the lowest section of the underworld in [[wikipedia:Aztec mythology|Aztec mythology]].
