title: Card Trivia:Elemental HERO Chaos Neos
wikitext: |-
  {{Navigation}}

  [[File:ElementalHEROChaosNeos-Poly.png|thumb|right|200|"Elemental HERO Chaos Neos" in the commercial of ''[[Gladiator's Assault]]''.]]

  * This is the [[cover card]] of ''[[Gladiator's Assault]]''.
  ** This monster also appears in 3D computer graphics in the commercial of ''Gladiator's Assault''.
  * This monster is a [[Triple Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Dark Panther]]" and "[[Neo-Spacian Glow Moss]]".
  ** This monster's [[Fusion Material]]s reference the [[Chaos]] [[series]], which primarily consists of [[DARK]] and [[LIGHT]] monsters, similar to the [[Attribute]]s of "Dark Panther" and "Glow Moss", respectively.
  ** This monster's design features four claws in its right hand, like "Dark Panther", and five claws in its left hand, like "Glow Moss".
  ** This monster's ''[[OCG]]''/''[[TCG]]'' effects are upgraded versions of the effects of "[[Elemental HERO Dark Neos]]" and "[[Elemental HERO Glow Neos]]".
  * This is the only "[[Neos]]" Triple Contact Fusion Monster to require "Neo-Spacian" monsters with opposite Attributes.
  * This is the only "Neos" Triple Contact Fusion Monster to have its effects changed from the ''[[Yu-Gi-Oh! GX]]'' anime when it was released in the ''OCG''/''TCG''.
  * This is the only "[[Neos]]" Triple Contact Fusion Monster to not have an effect that removes all other cards on the [[field]] when it [[leaves the field]].
  * This is the only "[[Elemental HERO]]" monster to be printed in [[Ghost Rare]].
  ** Some of the [[1st Edition]] Ghost Rare prints of this card in ''Gladiator's Assault'' were [[misprint]]ed with the name of "Rainbow Dragon", and some of the [[Unlimited Edition]] Ghost Rare prints of "Rainbow Dragon" were misprinted with this card's artwork.
  * This card's effect mistakenly appears in place of the [[card text]] of "[[Rain Storm]]" in the ''[[Yu-Gi-Oh! World Championship 2008]]'', ''[[Yu-Gi-Oh! GX Tag Force]]'', and ''[[Yu-Gi-Oh! GX Tag Force 2]]'' video games.
