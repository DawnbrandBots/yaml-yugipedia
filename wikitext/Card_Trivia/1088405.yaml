title: Card Trivia:Gladiator Beast Claudius
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Claudius|Claudius]], an Ancient [[wikipedia:Roman emperor|Roman emperor]].
  * Visually, this monster is a combination of many "[[Gladiator Beast]]" monsters:
  ** "[[Gladiator Beast Alexander|Alexander]]": Head, upper body, outer wings, and pteruges on chest
  ** "[[Gladiator Beast Andabata|Andabata]]": Shoulder-mounted guns and knee armor
  ** "[[Gladiator Beast Andal|Andal]]": Thigh armor
  ** "[[Gladiator Beast Attorix|Attorix]]": Inner shield on wings and lower part of weapon
  ** "[[Gladiator Beast Augustus|Augustus]]": Tail
  ** "[[Gladiator Beast Dimacari|Dimacari]]": Inner ankle armor
  ** "[[Gladiator Beast Dragases|Dragases]]": Armbands and middle part of weapon
  ** "[[Gladiator Beast Equeste|Equeste]]": Outer shield on wings, inner thigh armor, and pteruges on shoulders
  ** "[[Gladiator Beast Essedarii|Essedarii]]": Outer ankle armor
  ** "[[Gladiator Beast Gaiodiaz|Gaiodiaz]]": Shoulder armor and outer forearm armor
  ** "[[Gladiator Beast Hoplomus|Hoplomus]]": Thigh armor and lower leg armor
  ** "[[Gladiator Beast Laquari|Laquari]]": Feet armor and chin armor
  ** "[[Gladiator Beast Nerokius|Nerokius]]": Lower wings, knee armor, and inner forearm armor
  ** "[[Gladiator Beast Octavius|Octavius]]": Wings and armor belt
  ** "[[Gladiator Beast Retiari|Retiari]]": Legs and waist cloth
  ** "[[Gladiator Beast Sagittarii|Sagittarii]]": Horn, necklace, chest armor, and armor belt
  ** "[[Gladiator Beast Spartacus|Spartacus]]": Armbands and thigh armor
  ** "[[Gladiator Beast Tamer Editor|Tamer Editor]]": Chest cloth and upper part of weapon
  ** "[[Gladiator Beast Vespasius|Vespasius]]": Ankle fins
  * This monster has the highest [[Level]] (12) and [[original ATK]] (3700) of all "[[Gladiator Beast]]" monsters.
  ** This monster is also tied with "[[Candelato, the Beast of Light]]" for the highest Level of all [[Beast]] monsters.
  ** This is the first monster in the ''[[OCG]]/[[TCG]]'' with 3700 [[ATK]].
