title: Card Trivia:Star Monarch Estrome
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[The Emperor Realm]]" and "[[Nativity of the Monarchs]]".
  * This monster's helmet design resembles those of the [[wikipedia:Cylons|Cylons]] from the ''[[wikipedia:Battlestar Galactica|Battlestar Galactica]]'' series.
  * This monster has an [[Counterpart|upgraded]] Mega Monarch form: "[[Mega Star Monarch Estrome]]".
  * This monster has a Vassal counterpart: "[[Hebe the Star Vassal]]".
