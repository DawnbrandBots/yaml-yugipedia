  [[File:GaiatheFierceKnight-JP-Manga-DM-color.png|thumb|300px|"[[Gaia The Fierce Knight]]'s" card design, as seen in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]] manga''.]]
  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster is the "[[Millennium]]" counterpart of "[[Gaia The Fierce Knight]]".
  ** This monster's [[Level]] (6) references how "[[Gaia the Fierce Knight (manga)|Gaia the Fierce Knight]]" was a [[Level 6]] monster in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, while its pose is based on the original manga artwork of "Gaia the Fierce Knight".
