title: Card Trivia:Bujingi Raven
wikitext: |-
  {{Navigation}}

  * This card is a counterpart of "[[Bujingi Crow]]", they have just 100 of difference in ATK and DEF, both are based on the [[wikipedia:Three-legged crow|Yatagarasu]], or the three-legged crow, of East Asian mythology, and it also carries a mirror.
