title: Card Trivia:Doll Monster Mr. Dragon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Box of Friends]]".
  * This card's Japanese name, "Dra-kun", features the honorific "-kun", which is used to describe affection and intimacy towards boys.
  * This the only member of the "[[Doll Monster]]" [[archetype]] to not have a [[Card evolutions|customized]] form in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
