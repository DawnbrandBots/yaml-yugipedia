title: Card Trivia:Heroic Challenger - Ambush Soldier
wikitext: |-
  {{Navigation}}

  * This monster's name is based on an [[wikipedia:Ambush|ambush]], a basic attack used by soldiers in warfare where they wait in a confined position and launch a surprise attack against their enemies.
  ** Fittingly, this monster is depicted wearing a [[wikipedia:Camouflage|camouflage suit]] and [[wikipedia:Night-vision device|night-vision goggles]], both of which are used by soldiers to blend in with their surroundings in order to perform an ambush at nighttime.
  ** This monster's name also reflects its effect to "ambush" the opponent by [[Special Summon]]ing up to two "[[Heroic Challenger]]" monsters from the [[hand]] and/or [[Graveyard]].
