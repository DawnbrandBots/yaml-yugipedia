title: Card Trivia:Link Bumper
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Link Processing Failure]]" and "[[Urgent Link]]".
  * This monster's appearance features parts in a [[wikipedia:Pinball|pinball machine]] that are designed to "bump" a pinball, including slingshots on its shoulders, a bumper on its torso, and a pair of flippers on its pelvic area.
