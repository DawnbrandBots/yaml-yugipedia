title: Card Trivia:Dice Leveler
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Various die "nets" (shape layouts that can be made with a die or cube) can be seen in the background of this card. The one that appears on the front of this monster is censored in the English dub, possibly due to its cross-shaped configuration.
  * This card's Japanese name reflects its [[effect]]; the maximum [[Level]] it can reach with it is 7.
