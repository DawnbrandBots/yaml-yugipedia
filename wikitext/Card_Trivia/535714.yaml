title: Card Trivia:Aswan Apparition
wikitext: |-
  {{Navigation}}

  * This monster's name is a reference to [[wikipedia:Aswan|Aswan]], a city south of Egypt and the capital of the Aswan Governate.
  * This monster is similar to "[[Theban Nightmare]]", as both share a similar appearance and their names are synonymous with "phantasm". Additionally, the background of their card artworks depict a city.
  * This monster has a [[counterpart]] with the same [[original ATK and DEF]] that [[return]]s [[Continuous Spell Card]]s: "[[Nubian Guard]]".
