title: Card Trivia:Mega Fortress Whale
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Legendary Duelists: Duels From the Deep]]''.
  * This monster is a [[retrained]] [[Effect Monster|Effect]] counterpart of "[[Fortress Whale]]".
  ** This monster has 200 more [[ATK]]/[[DEF]] than "Fortress Whale". This is a reference to the effect of "[[Umi]]" (which increases [[Fish]] monsters' ATK/DEF by that amount), and is also a common trend of the retrained counterparts of [[Mako Tsunami]]'s monsters in ''[[Duelist Pack: Duelists of the Abyss]]''.
  ** This monster's effect to [[add]] a [[WATER]] [[Warrior]] monster from the [[Graveyard]] to the [[hand]] when it is [[destroy]]ed is based on a scene during [[Katsuya Jonouchi and Ryota Kajiki's Duel (manga)|Katsuya Jonouchi and Ryota Kajiki's Duel]] (and its [[Yu-Gi-Oh! (anime)|anime]] [[Yu-Gi-Oh! - Episode 069|adaptation]]) where [[Ryota Kajiki (manga)|Ryota Kaijiki]] played "[[Return of the Doomed (manga)|Return of the Doomed]]" to add "[[The Legendary Fisherman (manga)|The Legendary Fisherman]]" from the Graveyard to his hand when his "[[Fortress Whale (manga)|Fortress Whale]]" was destroyed.
