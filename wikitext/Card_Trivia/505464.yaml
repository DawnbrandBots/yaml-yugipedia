title: Card Trivia:Ancient Elf
wikitext: |-
  {{Navigation}}

  * This monster's English [[flavor text]] refers to it using male pronouns, even though many sources from across the franchise suggest that this monster is actually female.
  ** This monster has a feminine appearance.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, it screamed in a feminine voice when it was [[destroy]]ed.
  ** In the ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' video game, this monster's 3D image clearly depicts it as female. It also has a female battle-cry when attacking and a feminine cry of defeat when destroyed. Also, when this card successfully destroys a monster, its victory pose ends with it laughing in a feminine tone, similar to some other cards in the game, such as "[[Queen of Autumn Leaves]]"
  *** In the same game and in ''[[Yu-Gi-Oh! Forbidden Memories]]'', this card can also [[equip]] power up cards that are specifically for female monsters such as "[[Cyber Shield (DOR)|Cyber Shield]]", "[[Malevolent Nuzzler (DOR)|Malevolent Nuzzler]]", and "[[Electro-Whip (DOR)|Electro-Whip]]".
