  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster shares similarities with "[[Sevens Chariot]]".
  ** Both monsters feature a feline in their artworks alongside the main humanoid [[Fusion Material]] (a jaguar/leopard and "[[Celeb Rose Magician]]"/"[[Sevens Road Magician]]" respectively) and have similar [[Summon chants in Yu-Gi-Oh! GO RUSH!!|Summon chants]].
