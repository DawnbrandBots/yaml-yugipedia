title: Card Trivia:Cherry Inmato
wikitext: |-
  {{Navigation}}

  * The monsters that appears in this card's artwork are smaller versions of "[[Inmato]]", which also appears in this card's artwork. [[wikipedia:Cherry tomato|Cherry tomatoes]] are a small version of the [[wikipedia:tomato|tomato]] from the [[wikipedia:Mediterranean Basin|Mediterranean]].
  ** This card's [[ATK]] and [[DEF]] are half that of "Inmato".
  * This monster appears in the artworks of "[[Tomatapult]]", "[[Tough Tomato]]", and "[[Gap Power]]".
