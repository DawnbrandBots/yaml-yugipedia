title: Card Trivia:Blade Armor Ninja
wikitext: |-
  {{Navigation}}

  * This monster is featured as one of [[Roku]]'s statues, and is the only one that doesn't represent a monster from an older ''Yu-Gi-Oh!'' anime.
  * In the anime, when this monster detaches an [[Xyz Material]], it absorbs it through one of its swords.
  * In {{episode|ZEXAL|015|ref}} and {{episode|ARC-V|126|ref}}, there is a symbol found on this monster's back that resemble the kanji (忍).
