title: Card Trivia:Showdown Skull Archfiend
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart of "[[Summoned Skull (Rush Duel)|Summoned Skull]]".
  ** This monster's [[Level]] (7) is based on the fact that "[[Summoned Skull (manga)|Summoned Skull]]" is a [[Level 7]] monster in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh! Duelist|037|ref}}, specifically from the panel showing "[[Summoned Skull]]" being [[Summon]]ed.
