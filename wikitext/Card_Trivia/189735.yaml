title: Card Trivia:Rocket Arrow Express
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Turbojet train|turbojet train]], a locomotive propelled by built-in turbojet engines, which can reach high speeds.
  ** Fittingly, this monster has a [[wikipedia:Jet aircraft|jet aircraft]] on top of the locomotive, propelled by multiple turbojet engines.
  ** This monster's Japanese title, "Roaring Limited Express", is based on the type of express train which stops at a limited number of stops compared to other express services in similar routes.
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  ** This is also the first monster in the ''OCG''/''TCG'' to have 5000 [[ATK]] but not 5000 [[DEF]].
