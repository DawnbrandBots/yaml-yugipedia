title: Card Trivia:Red Supernova Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Creation Pack 11]]''.
  * Four orange [[Synchro Summon]]ing rings appear in this monster's artwork.
  * This monster is an [[Card evolutions|upgraded]] [[Triple Tuning]] form of "[[Red Nova Dragon]]".
  ** This monster is a further-upgraded form of "[[Red Dragon Archfiend]]" merged with [[Red Nova]], a demon also known as "Scar-Red Nova" in the ''Yu-Gi-Oh! 5D's'' anime whose power is used to create "Red Nova Dragon".
  ** This monster is named after a [[wikipedia:Supernova|supernova]], a powerful and luminous stellar explosion.
  ** This monster has an upgraded [[Quadruple Tuning]] form: "[[Red Hypernova Dragon]]".
  * This monster is the rival [[counterpart]] of "[[Cosmic Blazar Dragon]]".
  ** They are Level 12 [[Cosmic Synchro Monster]]s with 4000 ATK.
  ** They are Summonable via a further-enhanced Synchro Summoning mechanic: Triple Tuning (Over Tuning with 3 [[Tuner]]s instead of 2) for this monster, [[Delta Accel Synchro Summon]] for "Cosmic Blazar Dragon" respectively.
  ** They are all upgraded forms of the [[ace monster]]s of main characters of the ''Yu-Gi-Oh! 5D's'' anime: Jack Atlas' "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" for this monster and [[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]" for "[[Cosmic Blazar Dragon (anime)|Cosmic Blazar Dragon]]".
  * This is currently the only Synchro Monster to specifically require 3 Tuner monsters as Synchro Materials.
