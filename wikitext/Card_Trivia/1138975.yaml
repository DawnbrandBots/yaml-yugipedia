title: Card Trivia:Fish Sonar
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to a scene in {{chapter|Yu-Gi-Oh!|071|ref}} where [[Ryota Kajiki (manga)|Ryota Kajiki]] (whose usage of a [[WATER]] [[Deck]] inspired a common trend of the [[retrained]] counterparts of [[Mako Tsunami]]'s monsters in ''[[Duelist Pack: Duelists of the Abyss]]'') states that he would use the [[Duelist Kingdom (manga)|Duelist Kingdom]] prize money to buy a modern fishing boat equipped with a fish sonar.
