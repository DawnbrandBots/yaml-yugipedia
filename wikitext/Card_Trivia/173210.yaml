title: Card Trivia:Armored Xyz
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * Two [[Graveyard]] portals from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime appears in this card's artwork.
  * The red-and-white suit of armor in this card's artwork appears in the artwork of "[[Full-Armored Xyz]]".
  ** The red-and-white suit of armor in this card's artwork serves as the armor worn by "[[Armored Shark]]" and "[[Xyz Armor Torpedo]]".
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, despite [[Reginald Kastle|Reginald "Shark" Kastle]] giving this card to [[Yuma Tsukumo]], it was never used again.
  ** The "[[ZW]]" [[archetype]] appears to be an homage to this card, as they are monsters that can [[equip]] themselves to "[[Number 39: Utopia]]" and its various forms. This is best seen with "[[ZW - Leo Arms]]", an [[Xyz Monster]] that can equip itself to a "Utopia" monster (visualized as a set of armor), just like what this card's effect enables.
  * This card's ''[[OCG]]''/''[[TCG]]'' [[Attribute]]-changing effect is designed for the alternate [[Summoning condition]] of "[[Full Armored Black Ray Lancer]]", which can be [[Xyz Summon]]ed by using a [[Rank 3]] [[WATER]] monster. Since "[[Black Ray Lancer]]" is a [[DARK]] monster, this card's effect can allow it to be used as [[Xyz Material]] for its "[[Full Armor]]" counterpart.
