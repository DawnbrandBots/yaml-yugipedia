title: Card Trivia:Mazera DeVille
wikitext: |-
  {{Navigation}}

  * "[[Pandemonium]]" appears in the background of this card's artwork.
  * "Warrior of Zera" → "Pandemonium" → "'''Mazera DeVille'''"
  ** This monster is "[[Warrior of Zera]]" after he took the path of ending up in "Pandemonium" and allied himself with the "[[Archfiend]]s", finally evolving into this monster.
  * This monster shares the name "Mazera" with "[[Alghoul Mazera]]", with "Ma" derived from the Japanese word "''ma''" (魔), meaning "evil" or "demonic".
  * This monster has a [[LIGHT]] [[Fairy]] [[counterpart]]: "[[Archlord Zerato]]"
  * This monster has a ''[[Rush Duel]]'' [[Ritual Monster|Ritual]] counterpart: "[[Mazera, Devil of the Den]]".
  * According to a [http://www.pojo.biz/board/showthread.php?p=1943834#post1943834 Pojo post] by [[Kevin Tewart]], this card's ''[[TCG]]'' name was a deliberate request from its designer to closely follow the pronunciation of its Japanese name as much as possible.
  ** In another [http://www.pojo.biz/board/showthread.php?p=24711885#post24711885 post] by Tewart, it was revealed this was intended by this card's designer to relate a joke to the ''TCG''.
  *** In a third [http://www.pojo.biz/board/showthread.php?p=24711966#post24711966 post], Tewart confirmed that this card's designer's joke was that this monster was "the [[wikipedia:Cadillac de Ville series|Cadillac]] of demons".
