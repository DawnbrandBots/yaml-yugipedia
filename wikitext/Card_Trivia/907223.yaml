title: Card Trivia:Icejade Cenote Enion Cradle
wikitext: |-
  {{Navigation}}

  * "[[Albion the Shrouded Dragon]]", "[[Icejade Kosmochlor]]" and "[[Incredible Ecclesia, the Virtuous]]" appear in this card's artwork.
  * This card is named for a [[wikipedia:cenote|cenote]], a naturally-formed pit or sinkhole that exposes a source of groundwater.
  * "Enion" in this card's name is based on [[wikipedia:Enion|the character]] from [[wikipedia:William Blake|William Blake]]'s poetry, who is depicted as the female counterpart to [[wikipedia:Tharmas|Tharmas]], one of the four [[wikipedia:Zoa|Zoas]] created from the primordial man [[wikipedia:Albion|Albion]].
