title: Card Trivia:Icejade Acti
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Icejade Tremora]]".
  ** This card's artwork also appears in one of the bubbles in the artwork of "Icejade Tremora".
  *** A close-up of this monster's face can also be seen in the artwork of "Tremora", in the bubble below its left arm.
  * The combined names of this card and "[[Icejade Tinola]]" reference [[wikipedia:Actinolite|Actinolite]], a silicate mineral sometimes used as the gemstone [[wikipedia:Nephrite|Nephrite]], one of the types of [[wikipedia:Jade|Jade]].
  * This monster's hair ornament is modeled after [[wikipedia:Strongylodon macrobotrys|jade vines]], according to her concept art.
