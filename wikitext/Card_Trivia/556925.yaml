title: Card Trivia:F.A. Dead Heat
wikitext: |-
  {{Navigation}}

  * "[[F.A. Auto Navigator]]", "[[F.A. Dark Dragster]]", and "[[F.A. Dawn Dragster]]" appear in this card's artwork.
  ** This card's artwork depicts the race between "Dawn Dragster" and "Dark Dragster" from the inside of the former. The results of the race are depicted in the artwork of "[[F.A. Overheat]]".
  * This is the first card in the ''[[TCG]]'' to have a name that includes the word "dead" (or any variation of "death"), albeit as part of a racing expression.
