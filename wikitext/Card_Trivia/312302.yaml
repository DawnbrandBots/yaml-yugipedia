title: Card Trivia:P.M. Captor
wikitext: |-
  {{Navigation}}

  * This card is the first [[Zombie]]-[[Type]] [[Pendulum Monster]].
  * Both red and blue [[Pendulum Scale]]s appear on the suspenders of this monster.
  * The "P.M." in this card's name represents the first and last letters of the word, "Pendulum." This is reinforced by the pattern used for this card's other ''TCG'' names, using their language's name for "Pendulum": French is "P.E." (Pendule), German is "P.L." (Pendel), Italian is "P.M." (Pendulum), and Portuguese/Spanish is "P.O." (Pêndulo/Péndulo, respectively).
