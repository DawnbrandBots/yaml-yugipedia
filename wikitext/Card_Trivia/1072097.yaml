title: Card Trivia:Mermail King - Neptabyss
wikitext: |-
  {{Navigation}}

  * "[[Abyss-scale of Cetus]]", "[[Abyss-scale of the Kraken]]", "[[Abyss-scale of the Mizuchi]]", and "[[Abyss-sting Triaina]]" appear in this card's artwork, [[equip]]ped to this monster.
  ** Fittingly, the aforementioned cards can be [[search]]ed by this monster's effect.
  ** "[[Lemuria, the Forgotten City]]" also appears in this card's artwork.
  * This monster is an [[Card evolutions|upgraded]] [[Link Monster|Link]] form of "[[Neptabyss, the Atlantean Prince]]".
  ** According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], this monster is "Neptabyss", who was originally "[[Mermail Abyssgaios]]", after having regained his memories and powers by assembling all three "Abyss-scales".
  ** Similar to "Mermail Abyssgaios", the lower half of this monster's body is based on "[[Poseidra, the Atlantean Dragon]]".
