title: Card Trivia:White Knight Lord
wikitext: |-
  {{Navigation}}

  * Since the "[[Phantom Beast]]" [[Beast-Warrior]] monsters are based on the "[[White Knight]]" [[archetype]] due to sharing similar effects, this monster's effect in the anime is similar to that of "[[Phantom Beast Rock-Lizard]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] itself from the player's [[hand]] by [[banish]]ing three monsters from their [[Graveyard]] is a reference to the effect of "[[Sealed Gate]]", which requires the player to banish "[[White Knight Swordsman]]", "[[White Knight Lancer]]", and "[[White Knight Gardna]]" to Special Summon this monster from their hand or [[Deck]].
