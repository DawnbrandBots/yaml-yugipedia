title: Card Trivia:Timaeus the United Magical Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Timaeus the United Dragon]]".
  ** This monster's appearance and effects are a combination of other [[Timaeus (series)|Timaeus]]-based Fusion Monsters.
  *** This monster's [[Attribute]] ([[LIGHT]]), [[Level]] (10), and effect that makes it unaffected by other cards' effects are based on those of "[[Timaeus the Knight of Destiny]]".
  *** This monster's armor is based on the armor worn by "Dark Magician" in the artwork of "[[Dark Magician the Dragon Knight]]", while the [[wikipedia:Runes|runes]] around this monster's body are based on the same symbols [[Timaeus]] has on its body in the artwork of "[[Amulet Dragon]]".
  *** This monster's effect to make it gain 100 [[ATK]] for each [[Spell Card]] in the [[Graveyard]] or [[banish]]ment is based on the similar effect of "Amulet Dragon", while also synergizing with its own last effect.
  * This monster mentioning "[[Dark Magician Girl]]" as [[Fusion Material]] is justified by the existence of "[[Dark Magician Girl the Dragon Knight]]", which is a Timaeus-based Fusion form of the aforementioned monster and might have inspired this monster's last effect.
  * Interestingly, if either "Dark Magician" or "Dark Magician Girl" (or a [[Theme|thematic]] [[Main Deck]] monster whose name becomes any of theirs) is used as the first material with a [[Spellcaster]] as the second material, any [[Dragon]] of sort (and by extension, Timaeus) would be missing among this monster's [[material]]s.
  ** However, if "Dark Magician the Dragon Knight" is used as the specific material while considered "Dark Magician", this monster would be [[Fusion Summon]]ed using a Dragon monster even if the generic material was not a Dragon monster, and even if "Dark Magician the Dragon Knight's" [[Type]] was changed, Timaeus itself would still be spiritually present as the latter's mount.
  * This is the second "[[Legendary Dragon]]"-based Fusion Monster whose name includes the name of its corresponding "Legendary Dragon", the first being "[[Rocket Hermos Cannon]]".
