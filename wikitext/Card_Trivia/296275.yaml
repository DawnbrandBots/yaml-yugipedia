title: Card Trivia:Artifact Durendal
wikitext: |-
  {{Navigation}}

  * "[[wikipedia:Durendal|Durendal]]" was the sword which belonged to [[wikipedia:Roland|Roland]], a paladin of the French king [[wikipedia:Charlemagne|Charlemagne]] in the literature works known as the [[wikipedia:Matter of France|Carolingian cycle]].
  * Given the Neon Lines that appear over the sword, the name could also double as a loose reference to the character "Durandal" that appeared in ''[[wikipedia:Marathon (video game)|Marathon]]'' video game series.
  * This card's second effect is almost the same as "[[Reload]]". Both card's appearances also take after antiquated objects (this card being a reference to the Durendal sword and the artwork of "Reload" featuring an Egyptian-themed gun whose decor could make it qualify as an [[wikipedia:Out-of-place artifact|Out-of-place artifact]].)
  * This artifact appears to be the combined form of "[[Artifact Beagalltach]]" and "[[Artifact Moralltach]]" due to the twin circles on Durendal sharing the colors with their emblems when activated (red and blue respectively).
