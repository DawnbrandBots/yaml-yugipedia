title: Card Trivia:Dovelgus, Generaider Boss of Iron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Generaider Boss Loot]]".
  * The symbol from the artwork of "[[Generaider Boss Stage]]" appears in this card's artwork (although the lower middle circle is highlighted orange).
  * This monster is based on the [[wikipedia:Dwarf (mythology)|dwarf]] from [[wikipedia:Norse mythology|Norse mythology]], a race that many scholars believe synonymous with Svartálfar (black elves).
  ** The symbol from the artwork of "Generaider Boss Stage" that appears in this card's artwork is based on [[wikipedia:Svartálfar|Svartalfheim]], home of the dwarves and the [[wikipedia:Dökkálfar and Ljósálfar|dark elves]].
