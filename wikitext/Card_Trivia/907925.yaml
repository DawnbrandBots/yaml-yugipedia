title: Card Trivia:Meower Force
wikitext: |-
  {{Navigation}}

  * "[[Golden-Eyes Star Cat]]" appears in this card's artwork.
  * This card is a [[Cat (Rush Duel series)|Cat]] [[counterpart]] of "[[Mirror Force (Rush Duel)|Mirror Force]]".
  ** This card's Japanese name, "Wild Barrier - Stray Force -", is a pun on the Japanese name of "Mirror Force", which is "Holy Barrier - Mirror Force -".
  *** The Japanese writing and pronunciation of the word "Wild" (やせいなる ''Ya sei naru'' lit. "it becomes wild") is a pun on the Japanese word for "Holy" (せいなる ''Seinaru'').
  *** The Japanese writing and pronunciation of the word "Stray" (ノラ ''Norā'') is a pun on the Japanese pronunciation of the word "Mirror" (ミラ ''Mirā'').
