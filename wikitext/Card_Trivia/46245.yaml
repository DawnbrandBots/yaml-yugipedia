title: Card Trivia:Herald of Orange Light
wikitext: |-
  {{Navigation}}

  * This monster makes up the stomach/torso of "[[Herald of Perfection]]".
  * This monster's name, color scheme, and effects reference how [[Main Deck]] [[Effect Monster Card]]s feature an orange-colored card border.
  ** Oddly, this monster's Japanese name is "Vermillion Declarer", which based on a shade of red, rather than orange.
