title: Card Trivia:Alpha Summon
wikitext: |-
  {{Navigation}}

  * "[[Crowley, the Magistus of Grimoires]]"/"[[Crowley, the Gifted Magistus]]", "[[Endymion, the Magistus of Mastery]]", and "[[Rilliona, the Magistus of Verre]]" appear in the artwork of this card.
  ** This card depicts "Crowley" on the onset of transforming into "[[Invoked Magistus Omega]]" due to his "[[Invocation]]".
  * The kana of this card's Japanese name contains "[[wikipedia:Baphomet|Baphomet]]", the name of a demonic entity said to be allegedly worshiped by the [[wikipedia:Knights Templar|Knights Templar]]. [[wikipedia:Aleister Crowley|Aleister Crowley]] incorporated Baphomet within the cosmology of [[wikipedia:Thelema|Thelema]] as a divine deity symbolizing arcane perfection, and also adopted "Baphomet" as one of his [[wikipedia:Magical motto|magical mottoes]].
  ** The phrase 解体し統合せよ ("dissolve and coagulate") in the base Japanese name refers to a motto of alchemy, "solve et coagula"; the two words were also sometimes shown in depictions of Baphomet, with one on each arm.
  * This card's English name "[[Alpha Summon|Alpha]]" is the first letter in the Greek alphabet, which refers to "dissolve and coagulate" being the basic theory of magical motto, in opposition with "[[Omega Summon|Omega]]" is the last letter in the Greek alphabet, which refers to "The Great Beast" being the ideal magical motto of [[wikipedia:Aleister Crowley|Aleister Crowley]].
  ** Additionally, this card could be considered the weaker counterpart of "[[Omega Summon]]" as this card can only Summon a single opposing banished monster, with the drawback of needing to give one of the user's banished monsters to the opponent, whereas "[[Omega Summon]]" has no such drawbacks or caveats and can summon as many of its user's "[[Invoked]]" as possible.
