title: Card Trivia:Cipher Soldier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Soldier Revolt]]".
  * This card is one of only two monsters to be erroneously printed with two different [[Attribute]]s, with the other being "[[Nitro Warrior]]".
  ** In the English edition of ''[[Champion Pack: Game Four]]'', this card's Attribute is [[misprint]]ed as [[LIGHT]] instead of its correct [[EARTH]] Attribute.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this card's [[ATK]] is 2350.
