title: Card Trivia:Super Quantum Blue Layer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Super Quantal Alphan Spike]]" and "[[Super Quantal Alphancall Appeal]]".
  * This monster is based on the archetypal Blue Ranger featured in the ''[[wikipedia:Super Sentai|Super Sentai]]'' and ''[[wikipedia:Mighty Morphin Power Rangers|Power Rangers]]'' franchises. Fittingly, this monster's [[Attribute]] is [[WATER]], which is represented by a blue-colored circle.
