title: Card Trivia:Oilman
wikitext: |-
  {{Navigation}}

  * This is the second [[Union monster]] that can equip itself to any [[Machine]] monster, with the first being "[[Heavy Mech Support Platform]]".
  ** It is also one of six Union monsters that can equip to a copy of itself, the other five being "[[Spirit of the Six Samurai]], "[[Machina Peacekeeper]]", "[[Machina Gearframe]]", "Heavy Mech Support Platform", and "[[Metallizing Parasite - Lunatite]]".
  * The words "Heros Oil" can be seen on this monster's chest.
  * This card's name and artwork may be based on the "Oilman" Robo from ''[[wikipedia:Custom Robo|Custom Robo]]''.
