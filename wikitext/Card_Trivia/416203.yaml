title: Card Trivia:Performapal Shieldrummer
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This [[monster]] appears in the artwork of "[[Performapal Pendulum Art & Clean]]".
  * The Japanese pronunciation of this card's name is a portmanteau of "shield" (シールド ''Shīrudo'') and the onomatopoeia of a drum (ドンドコ ''Dondoko'').
  * Three ''[[wikipedia:Tomoe|tomoe]]'' are arranged in a ''mitsudomoe'' pattern, which is widely used in Shinto shrines, including drums.
