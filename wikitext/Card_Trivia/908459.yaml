title: Card Trivia:Kashtira Arise-Heart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Kashtira Big Bang]]", "[[Pressured Planet Wraitsoth]]", and "[[Scareclaw Defanging]]".
  * This monster is an upgraded [[Xyz Monster|Xyz]] form of "[[Kashtira Riseheart]]".
  * This card has three [[Heart]] counterparts:
  ** "[[Scareclaw]]" [[Link Monster|Link]]: "[[Scareclaw Tri-Heart]]"
  ** "[[Tearlaments]]" [[Fusion Monster|Fusion]]: "[[Tearlaments Kaleido-Heart]]"
  ** [[LIGHT]] "[[Mannadium]]" [[Synchro Monster|Synchro]]: "[[Mannadium Prime-Heart]]"
  ** This card also has a "[[Visas Starfrost]]"-oriented Fusion counterpart: "[[Vicious Astraloud]]"
