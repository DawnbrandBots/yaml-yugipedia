title: Card Trivia:Zoodiac Thoroughblade
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zodiac Sign]]".
  * This monster is based on the [[wikipedia:Chinese zodiac|Chinese zodiac]] sign of the [[wikipedia:Horse (zodiac)|Horse]].
  ** This monster's first effect to discard a "[[Zoodiac]]" card and [[draw a card]] references how in the The Great Race, the Horse was nearing the finish line when the Snake, hitching a ride on one of the hooves, startles it. This causes the Horse to jump on its hind legs and drop the Snake, who finishes in sixth place while the Horse finishes in seventh place, thereby becoming the seventh animal in the Chinese zodiac.
  * This monster's name is a portmanteau of the words "[[wikipedia:Thoroughbred|Thoroughbred]]" and "[[wikipedia:blade|blade]]".
  * This monster's sword is wielded by "[[Metaltron XII, the True Dracombatant]]".
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018443263247384580 Bilibili] and [https://weibo.com/7406309913/5119063044916173 Weibo] at noon (12:00 China Standard Time) on January 4, 2025, which was the fourth quarter of the Wu hour in the traditional Chinese timekeeping system.
