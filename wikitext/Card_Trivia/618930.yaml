title: 'Card Trivia:Number 76: Harmonizer Gradielle'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * The weapon this monster is wielding is based on a [[wikipedia:Keytar|keytar]].
  * The musical score visible in this card's artwork matches the beginning of ''[[wikipedia:Twinkle, Twinkle, Little Star|Twinkle, Twinkle, Little Star]]'', with the number arranged as a <sup>7</sup>/<sub>6</sub> [[wikipedia:time signature|time signature]].
  ** However, the score itself seems to use a much more conventional <sup>4</sup>/<sub>4</sub> signature.
