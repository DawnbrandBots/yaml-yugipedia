title: Card Trivia:The Deal of Destiny
wikitext: |-
  {{Navigation}}

  * The card "[[Number 39: Utopia]]" (written in [[Astral glyphs]]), [[The Door]], and multiple [[blank card]]s (most likely the blank "[[Number]]" cards) appear in this card's artwork.
  * This card references the deal made between [[Yuma Tsukumo]] and The Door during the Duel between Yuma and [[Reginald Kastle|Reginald "Shark" Kastle]] at the beginning of ''[[Yu-Gi-Oh! ZEXAL]]''.
  ** This card's effect to place 1 [[Emperor's Key Counter]] on it when the player's card(s) is [[destroy]]ed references how Yuma's broken [[Emperor's Key]] repairs itself right before he is transported to The Door.
  ** This card's effect to remove the Emperor's Key Counter from this card, send "[[The Door of Destiny]]" to the [[Graveyard]], and [[Special Summon]] a [[LIGHT]] "[[Utopia (archetype)|Utopia]]" or "[[Utopic]]" monster from the [[Extra Deck]] reference Yuma's acceptance of the deal with The Door. After Yuma unlocks The Door with the Emperor's Key, he releases the blank "Number" cards all over [[Earth (planet)|Earth]] and receives "Number 39: Utopia" as his own "Number" card. Originally (seen in the Japanese version of the ''Yu-Gi-Oh! ZEXAL'' anime), "Utopia" was written in Astral glyphs before they were translated into readable characters.

