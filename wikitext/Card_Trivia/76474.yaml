title: Card Trivia:Flute of Hamelin
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on the legend of the "[[wikipedia:The Pied Piper of Hamelin|The Pied Piper of Hamelin]]", keeping in relation with this card's owner, [[Princess Rose]]'s affiliation for fairy tales.
  ** This card's artwork depicts a role reversal of the story, as the rat wears the Pied Piper's clothes and is playing the pipe as well.
  ** This card's effect is a reference to the legend, as the eponymous Pied Piper used its pipe to lure the rats into the river to drown, as this card can "lure" any monster(s) with the same name to the [[Graveyard]].
  * The American Spanish dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime used the English pronunciation of the word "''Hamelin''" instead of the Spanish pronunciation ("''Hamelín''").
