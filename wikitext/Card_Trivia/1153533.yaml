title: Card Trivia:Exosister Betrayal
wikitext: |-
  {{Navigation}}

  * "[[Exosister Karmael]]" and "[[Exosister Kaspitell]]" appear in this card's artwork.
  * It is likely that the demon that is possessing Martha in the artwork of this card and "[[Exosister Karmael]]" is Asmodeus due to the fact that the spear Martha is holding is the same spear Asmodeus is holding in the artwork of "[[Exosister Returnia]]" It's likely that in the lore of Exosisters, Asmodeus defeated and possessed Martha, turning her into Karmael, and the battle depicted in "[[Exosister Returnia]]" is the Exosisters attempting to rescue her from his clutches. It could also possibly be theorized the demon next to Asmodeus in "[[Exosister Returnia]]" is a perverted and mutated form of Martha that Asmodeus created.
  * This card's Japanese name; "Exosister Bat Mater", comes from "''[[wikipedia:Stabat Mater|Stabat Mater]]''", a 13th-century Christian hymn that reflects on the sorrow of the Virgin Mary standing at the foot of the cross during the crucifixion of her son Jesus.
