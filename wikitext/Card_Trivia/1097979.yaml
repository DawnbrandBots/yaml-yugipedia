title: Card Trivia:SA.I.dekick
wikitext: |-
  {{Navigation}}

  * [[Ai]] (wielding the sword of "[[Dark Templar @Ignister]]") and "[[Decode Talker]]" appear in this card's artwork.
  ** "Decode Talker" has an effect to [[Tribute]] a monster it points to in order to [[negate]] an opponent's [[target]]ing effect, which this card's artwork and effect [[activate|activation]] likely represent.
  * This card's Japanese name (Ａｉ－ボウ) is a wordplay on "partner" (相棒, ''aibou'').
  ** Both this card's Japanese name and artwork reference how Ai and [[Yusaku Fujiki]] (who used "Decode Talker") were partners in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
