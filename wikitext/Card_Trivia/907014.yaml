title: Card Trivia:Red-Eyes Black Meteor Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Red-Eyes]]" [[counterpart]] of "[[Meteor Dragon]]".
  ** Unlike "[[Meteor Dragon Red-Eyes Impact]]", this monster is more similar to "[[Red-Eyes Black Dragon]]" than "Meteor Dragon".
  *** Fittingly, when [[Special Summon]]ed via its first effect, this monster's [[Level]] becomes 7, the same as "Red-Eyes Black Dragon".
  ** This monster has 200 more [[ATK]] than "Meteor Dragon".
