title: Card Trivia:Timestar Magician
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Pendulum Evolution]]''.
  * This monster is the combined form of "[[Stargazer Magician]]" and "[[Timegazer Magician]]".
  ** This monster's name is a reference to "Stargazer Magician" and "Timegazer Magician".
  *** This monster is also holding both the arc-shaped blade of "Timegazer" and the staff of "Stargazer".
  *** However, this monster physically resembles more "Stargazer" than "Timegazer".
  ** Ironically, neither of these monsters can normally be used to [[Xyz Summon]] this card.
  ** This card's original [[ATK]] and [[DEF]] are both swapped of that of "Stargazer Magician" and double that of "Timegazer Magician".
  ** This monster has two counterparts, that are combined forms of the two "[[Magician]]s" as well:
  *** "[[Astrograph Sorcerer]]" (referencing "Stargazer Magician")
  *** "[[Chronograph Sorcerer]]" (referencing "Timegazer Magician")
