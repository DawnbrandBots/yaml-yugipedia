title: Card Trivia:Evolzar Dolkka
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Extra Pack 2012]]'' and the ''[[Collectible Tins 2012 Wave 1]]''.
  * This monster appears in the artworks of "[[Breakthrough Skill]]" and "[[Xyz Territory]]".
  * This card is named after the therapod ''[[wikipedia:Dolichosuchus|Dolichosuchus]]'', also known as "Long Crocodile".
  * This is the first [[TCG-only|TCG-exclusive]] "[[Evol]]" card.
  ** This is the second [[Dragon]]-[[Type]] monster to support [[Dinosaur]] monsters.
