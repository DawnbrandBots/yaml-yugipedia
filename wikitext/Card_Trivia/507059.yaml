title: Card Trivia:Gradius
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[B.E.S. Derringer Core]]", "[[Safe Zone]]", and "[[Speed Spell - Final Attack]]".
  * This monster is based on {{wikia|gradius|Vic Viper}}, the main playable spaceship from [[Konami|Konami's]] shoot-em-up video game series, ''[[wikipedia:Gradius|Gradius]]''.
  ** This monster's ''[[TCG]]'' name is a misnomer, as it is based on the name of the {{wikia|gradius|Gradius (planet)|titular planet}} in the ''Gradius'' series. Its Japanese name is "Super Dimension Fighter: Vic Viper", which correctly refers to the spaceship rather than the planet.
  * This monster has three [[retrained]] counterparts: "[[Victory Viper XX03]]", "[[Vic Viper T301]]", and "[[Vic Viper Type-L]]".
  ** Due to this monster's ''TCG'' name, the connection between these monsters is lost in translation.
