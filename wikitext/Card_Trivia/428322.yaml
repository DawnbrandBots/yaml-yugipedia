title: Card Trivia:Battlewasp - Arbalest the Rapidfire
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Battlewasp - Grand Partisan the Revolution]]", "[[Battlewasp - Nest]]", "[[Revival Swarm]]", and "[[Summoning Swarm]]".
  * This monster is named after the [[wikipedia:Arbalest|arbalest]], the larger variation of the [[wikipedia:crossbow|crossbow]] used during the [[wikipedia:Middle Ages|Middle Ages]] in 12th century Europe. Fittingly, this monster's lower legs are designed to resemble the curved mounted ends of the arbalest, attached to the bowstring pulled backwards.
