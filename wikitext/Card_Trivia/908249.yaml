title: Card Trivia:Exosister Elis
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Exosister Arment]]" and "[[Exosister Pax]]".
  * This monster has an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form: "[[Exosister Mikailis]]".
  * According to [[The Valuable Book EX 2 card storylines]], "Exosister Elis" had a sister she lost in battle, prior to being partnered with "[[Exosister Stella]]". While not outright stated within ''The Valuable Book EX 2'' who the sister is in question, it is implied to be "[[Exosister Martha]]". This is due to the fact that the "[[Exosister]]" monsters work in pairs, an aspect carried over within effect text via mentioning the accompanying Exosister. In this case, the effect text of "Martha" directly mentions "Elis".
