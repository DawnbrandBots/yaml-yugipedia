title: Card Trivia:Kai-Den Kendo Spirit
wikitext: |-
  {{Navigation}}

  * This card is named after ''[[wikipedia:Menkyo#Menkyo_Kaiden|Menkyo Kaiden]]''(皆伝), the highest level of a license that is used by a school (''[[wikipedia:Ryū_(school)|koryū]]''), meaning that the student has learned everything and passed all aspects of his/her training within the ''koryū''. This license is usually used for classical martial arts, such as [[wikipedia:Kendo|kendo]].
