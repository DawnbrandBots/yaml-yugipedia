title: Card Trivia:Volcanic Blaze Accelerator
wikitext: |-
  {{Navigation}}

  * "[[Volcanic Shell]]" appears in this card's artwork.
  * The cannon in this card's artwork is based on [[Axel Brodie|Axel Brodie's]] [[Duel Disk]], which resembles a firearm in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's destruction effect, triggered by [[send]]ing a [[Level 1]] [[Pyro]] monster, references how Axel Brodie can fire multiple copies of "[[Volcanic Shell (anime)|Volcanic Shell]]" cards from his Duel Disk, sometimes destroying the monsters he shoots at.
