title: Card Trivia:Arcana Force I - The Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Magician's Scales]]" and "[[The Material Lord]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Magician (tarot card)|The Magician]].
  ** This monster's number "I" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (1100) reference how The Magician is the first trump card of the Majora Arcana Tarot.
  ** This monster's effect activation via a [[Spell Card]] is a reference to how magicians are typically associated with magic.
  ** Four separate images of this monster appear in the background of this card's ''[[OCG]]''/''[[TCG]]'' artwork, each colored (in clockwise order) red, yellow, blue, and green. This is likely referencing the [[wikipedia:Classical elements|classical elements]] (fire, earth, water, and air) that are represented by the [[Cup of Ace|cup]], the [[Ace of Sword|sword]], the [[Ace of Wand|wand]], and the [[Pentacle of Ace|pentacle]] (in no particular order), which is typically found in the depictions of The Magician.
  * In {{episode|GX|104|ref}}, this monster attacks by teleporting in front of [[Jaden Yuki]] and throwing a fireball directly in his face, a reference to one of the attacks of "The Magician", a recurring boss (also based on The Magician Tarot card) from the ''[[wikipedia:The House of the Dead (video game)|The House of the Dead]]'' video game series.
