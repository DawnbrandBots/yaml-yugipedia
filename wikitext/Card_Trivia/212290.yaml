title: Card Trivia:Evoltile Lagosucho
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Lagosuchus|Lagosuchus]], a reptile believed to be an ancestor of the dinosaurs.
  * This card is the first "Evoltile" monster that can't Special Summon "Evolsaur" monster, second being "[[Evoltile Elginero]]".
  ** This might be because [[wikipedia:Lagosuchus|Lagosuchus]] is not yet confirmed to be linked to Dinosaurs, hence the fact that it doesn't Special Summon an "Evolsaur" monster.
