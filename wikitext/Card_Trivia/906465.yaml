title: 'Card Trivia:Player 39: Home Run Hitter'
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Requesting 9]]".
  * This monster is a ''[[Rush Duel]]'' [[Baseball]] parody of "[[Number 39: Utopia]]".
  ** This monster's name is a parody of the Japanese name of "Utopia": "Hope".
  ** This monster's [[Type]] ([[Warrior]]) and [[original ATK and DEF]] (2500/2000) are the same as "Utopia", and its [[Level]] (8) is the combined Level of the [[Xyz Material]]s required to [[Xyz Summon]] "Utopia".
  ** This monster's effect requirement to [[send]] two [[Level 4]] monsters from the [[field]] to the [[Graveyard]] is a reference to the two Level 4 monsters required to Xyz Summon "Utopia".
  ** This monster's effect allowing it to gain [[ATK]] equal to its original ATK is a reference to the effect of "[[Double or Nothing!]]", which was used in combination with "Utopia" by [[Yuma Tsukumo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and manga.
  * This card's artwork features two flaming baseballs, which serves as a parody of the Overlay Units often seen in the ''Yu-Gi-Oh! ZEXAL'' anime and manga. In this monster's reference and concept art, the baseballs are specifically called "Oballay Units", a portmanteau of the words "Overlay Units" and "ball".
