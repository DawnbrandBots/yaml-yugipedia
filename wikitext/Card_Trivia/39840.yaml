title: Card Trivia:Soul Reversal
wikitext: |-
  {{Navigation}}

  * The artwork of this card may be the same as the artwork of "[[Miraculous Rebirth]]", but from a different perspective.
  * The Japanese name of the card is a pun, playing on the ambiguity of リバース as either "rebirth" (as it its effect returns a [[monster]] from the [[GY]] to your [[Deck]]) or "reverse" (as its effect pertains to [[Flip Effect Monster]]s, or "Reverse Monsters" in Japan).
