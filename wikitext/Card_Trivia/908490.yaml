title: Card Trivia:Battlefield Tragedy
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[Set]] another copy of itself from the [[Deck]] is based on a scene in {{chapter|R|019|ref}} where [[Reiko Kitamori]] [[activate]]d a second copy of this card when [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] tried to end his turn without attacking.
  * This is currently the only card that debuted in [[Premium Pack 2022]] to not be in [[Yu-Gi-Oh! Master Duel]].
