title: Card Trivia:Ursarctic Grand Chariot
wikitext: |-
  {{Navigation}}

  * This monster's name is based on one of the French names for the [[wikipedia:Big Dipper|Big Dipper]] [[wikipedia:Asterism|asterism]].
  ** Fittingly, the structure of the staff of this monster's weapon is based on the Big Dipper asterism.
