title: Card Trivia:Paralyzing Mushroom
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (シビレルダケ, ''Shibirerudake'') is a portmanteau of the words "shiver" (a bodily function in response to getting electrocuted, reflecting its [[Thunder]] [[Type]]) and [[wikipedia:Shiitake|shiitake]] (a type of edible mushroom native to Eastern Asia).
  * The 4 glowing spots, added to the glowing cross (which resembles 十, the kanji for "10"), found on this monster's head, equals 14, which is found in this monster's ATK ('''14'''00).
