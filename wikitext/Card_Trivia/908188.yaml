title: Card Trivia:Card Loan
wikitext: |-
  {{Navigation}}

  * This card's Japanese name (カードローン, ''Kādo Rōn''), is a portmanteau of the words "card" (カード, ''kādo''), "draw" (ドロー, ''dorō'') and "loan" (ローン, ''rōn'').
  ** Fittingly, [[Damon]] uses this card as part of his "draw"-themed Deck in the ''[[Yu-Gi-Oh! GX]]'' anime, as its Japanese name contains the word "draw" (ドロー, ''dorō'').
