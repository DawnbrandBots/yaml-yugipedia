title: Card Trivia:Harpie Queen
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Precious Pack Volume 2]]''.
  * This card is the first one to have an effect that changes its named while it is in the [[Graveyard]].
  * One of this monster's talon hands is not visible in the card artwork, though she is correctly depicted with both in other card artworks and non-card appearances such as ''[[Duel Terminal]]''.
  * This card is unrelated to the "Harpie Queens" that appear in [[Yu-Gi-Oh! Duelist - Duel 018|Duel 018]] of the ''Duelist'' manga, where [[Mai Valentine]] commands her powered-up "[[Harpie Lady Sisters]]" to destroy an opponent's monster; the name is likely coincidental.
  * This monster is featured in the artworks of "[[The Big Cattle Drive]]" and "[[Alluring Mirror Split]]".
