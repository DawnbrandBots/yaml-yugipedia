title: Card Trivia:Bonding - DHO
wikitext: |-
  {{Navigation}}

  * This is the first "[[Bonding]]" [[Trap Card]].
  * This card's name and effect reference the chemical formula of [[wikipedia:semiheavy water|semiheavy water]], "DHO", which requires one [[Duoterion|deuterium]] atom, one [[Hydrogeddon|hydrogen]] atom, and one [[Oxygeddon|oxygen]] atom.
