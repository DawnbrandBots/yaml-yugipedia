title: Card Trivia:Lorelei, the Symphonic Arsenal
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Lorelei|Lorelei]], a beautiful maiden in [[wikipedia:German folklore|German folklore]] who lives on a rock at the river [[wikipedia:Rhine|Rhine]].
  ** This monster being depicted singing, along with its design featuring a [[wikipedia:Pipe organ|pipe organ]], [[wikipedia:Drum|drums]], and [[wikipedia:Trumpet|trumpets]], references the legend of Lorelei, who uses her beautoful singing voice to lure unsuspecting sailors to the Rhine, causing them to crash into the rocks and drown.
  ** This monster, along with its accompanying [[Match winner]], "[[Tyr, the Vanquishing Warlord]]", both share a German theme, referencing how they were released as [[Yu-Gi-Oh! World Championship 2008 prize cards|prize cards]] at the 2008 ''Yu-Gi-Oh!'' World Championship, which was held in [[wikipedia:Germany|Germany]]
