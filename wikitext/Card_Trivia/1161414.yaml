title: Card Trivia:Superdreadnought Rail Cannon Flying Launcher
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded [[Xyz Monster|Xyz]] [[counterpart]] of "[[Flying Pegasus Railroad Stampede]]" based on "[[Superdreadnought Rail Cannon Juggernaut Liebe]]".
  ** This monster is based on [[Anna Kaboom]], who used a [[Train]] [[Deck]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  *** This monster's name "Flying Launcher" is named after the Japanese name of Anna's cannon, and this monster's design is based on Anna wielding the titular cannon.
