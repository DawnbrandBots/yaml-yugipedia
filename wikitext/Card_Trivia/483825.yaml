title: Card Trivia:Raidraptor - Revolution Falcon - Air Raid
wikitext: |-
  {{Navigation}}

  * This card is a [[Card evolutions|retrained]] version of "[[Raidraptor - Revolution Falcon]]", with this card's name partially based on that monster's Japanese effect name: "Revolutionary Airraid".
  ** This card was created to honor ''[[Yu-Gi-Oh! ARC-V]]'' [[Yu-Gi-Oh! ARC-V - Episode 034|episode 34]], which won [https://web.archive.org/web/20230701190727/http://vjump.shueisha.co.jp/yugioh_20th_duel/keka.html Shueisha's ''V Jump'' magazine's fan-favourite ''Yu-Gi-Oh! ARC-V'' Duel poll].
  *** Fittingly, this card's alternate Xyz Summon method and its effect that activates when Xyz Summoned are based on [[Raidraptor - Revolution Falcon (anime)|the anime effect of "Revolution Falcon"]] that also activates when Xyz Summoned (with this card's artwork also being based on the anime depiction of that anime effect).
