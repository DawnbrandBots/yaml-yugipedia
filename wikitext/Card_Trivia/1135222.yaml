title: Card Trivia:Anchorbolt Hedgehog
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Quillbolt Hedgehog]]".
  ** This monster is named after an [[wikipedia:Anchor bolt|anchor bolt]], a type of bolt used to connect structural and non-structural elements to concrete, whereas two of these bolts appear on the back of this monster's neck.
  ** This monster is depicted wearing a white scarf similar to that worn by "[[Junk Synchron]]" and "[[Junk Warrior]]", both of which "Quillbolt Hedgehog" is commonly associated with in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's pose is based on the pose struck by "Quillbolt Hedgehog" when it is used as [[Synchro Material]] in the ''Yu-Gi-Oh! 5D's'' anime.
