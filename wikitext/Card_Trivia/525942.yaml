title: Card Trivia:Nagel's Protection
wikitext: |-
  {{Navigation}}

  * Three "[[Tindangle Angel]]s" appear in this card's artwork.
  * This card is named after the [[wikipedia:Nagel point|Nagel point]], the point of intersection of lines drawn from each vertex of a triangle to the point where the opposite side is tangent to the triangle's excircle (the circle that lies outside the triangle and touches all three sides).
  ** Fittingly, this card's artwork depicts the aforementioned monsters creating the points of a protective triangle with their formation, while the three colored excircles lie outside said protective triangle.
  *** The three colored excircles in this card's artwork represent the color schemes of the [[Main Deck]] card frames: [[Monster Card]]s (the yellow one), [[Spell Card]]s (the green one) and [[Trap Card]]s (the red one).
