  [[File:Solfachord.png|thumb|300px|The "[[Solfachord]]" monsters, as seen in the ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES promotional video]]'']].
  * "[[DoSolfachord Cutia]]", "[[FaSolfachord Fancia]]", "[[MiSolfachord Eliteia]]", "[[ReSolfachord Dreamia]]", and "[[SolSolfachord Gracia]]" appear in this card's artwork.
  * This card's artwork is based on the short clip from ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'' where the "Solfachord" monsters are posing together before "Cutia" conducts the other "Solfachord" monsters during their performance.

