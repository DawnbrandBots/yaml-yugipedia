title: Card Trivia:Red-Eyes Black Cat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cat's Eye]]" and "[[Nyanderful Rush]]".
  * This monster is a ''[[Rush Duel]]'' [[Cat (Rush Duel series)|Cat]] parody of "[[Red-Eyes Black Dragon]]".
  ** This monster's pose closely resembles Red-Eyes Black Dragon's [[Card Artworks:Red-Eyes Black Dragon#/media/File:RedEyesBlackDragon-TF05-JP-VG.jpg|1st ''OCG''/''TCG'']] pose.
  ** This card's lore references [[Joey Wheeler]]'s (the primary user of "Red-Eyes Black Dragon" in the original series) usage of gambling Decks.
