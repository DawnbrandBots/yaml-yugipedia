title: Card Trivia:Nordic Relic Gungnir
wikitext: |-
  {{Navigation}}

  * In Norse mythology, [[wikipedia:Gungnir|Gungnir]] is [[Odin, Father of the Aesir|Odin's]] magical spear; it always hits its mark and always kills. The relic naturally appears in the artwork of "Odin, Father of the Aesir".
  ** "[[Gungnir, Dragon of the Ice Barrier]]" is also named after the spear.
  * This card's second effect to return the card to the field is the same as "[[Paradox Fusion]]".
