title: Card Trivia:Maliss C TB-11
wikitext: |-
  {{Navigation}}

  * "[[Maliss Q Hearts Crypter|Maliss <nowiki><Q></nowiki> Hearts Crypter]]" appears in this card's artwork.
  * This card's name is a reference to Chapter 11 of ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]''.
  ** "TB" is an acronym of "'''T'''hree '''B'''lasts", referring to the [[wikipedia:White Rabbit|White Rabbit's]] trumpet while serving as a herald for the [[wikipedia:Queen of Hearts (Alice's Adventures in Wonderland)|Queen of Hearts]].
