title: Card Trivia:Heavymetalfoes Amalgam
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Parametalfoes Fusion]]".
  * This monster named after an [[wikipedia:Amalgam (chemistry)|amalgam]], the chemistry term for an alloy that consists of [[wikipedia:Mercury (element)|mercury]] bonded with another metal.
  ** Fittingly, this monster's appearance is based on "[[Metalfoes Steelen]]" wearing an "amalgamated" suit of armor, which is a combination of its own armor and the armor of "[[Parametalfoes Melcaster]]".
