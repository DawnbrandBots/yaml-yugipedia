title: Card Trivia:Time Maiden
wikitext: |-
  {{Navigation}}

  * This monster's first three ''[[OCG]]''/''[[TCG]]'' effects are a combination of its anime effects (which can [[Special Summon]] itself from the [[hand]] and be treated as two [[Tribute]]s for the [[Tribute Summon]] of a [[Fairy]] monster) and its video game effect (which can Tribute itself to [[add]] a "[[Timelord]]" monster from the [[Deck]] to the hand).
