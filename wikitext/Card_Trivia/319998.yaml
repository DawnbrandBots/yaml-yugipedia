title: Card Trivia:Performapal Trump Witch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Performance Pirouette]]" and "[[Performapal Pendulum Art & Clean]]".
  * This monster's name is based on a [[wikipedia:Trump (card games)|trump card]], a valuable resource that may be used as a surprise to gain an advantage against the opponent, which is reflected in this monster's [[Fusion Summon]]ing [[Pendulum Effect]].
  ** The first portion of this monster's Japanese name (トランプ, ''Toranpu'') is also a pun on the word "[[wikipedia:Tramp|tramp]]", a traveling homeless person who wears raggedy clothing, which is reflected by this monster's raggedy clothing.
  * This is a [[Fan-Made Card]] drawn by a nine year-old girl named Mizuki Imai for the ''[[Yu-Gi-Oh! ARC-V Start Commemoration! Monster Design Contest]]''.
  ** The effect Mizuki wrote in her [[:File:PerformapalTrumpWitch-JP-Anime-AV-AC.png|drawing]] is: "You can [[pay]] 1000 [[Life Points]]; this card can [[attack]] all [[Monster Card|monster]]s your opponent [[control]]s with the same [[Attribute]] as this card once each".
  * This monster shares similarities with "[[Performapal Skullcrobat Joker]]".
  ** Both are [[DARK]] [[Spellcaster]] [[Pendulum Monster]]s.
  ** Both monsters' designs feature a [[wikipedia:Traditional animation|two dimensional]]-like appearance, blonde hair, black masks, a skull face on one of their accessories, at least one example of mismatching [[wikipedia:Patchwork|patchwork]] on their clothing, and the same-colored decorations hanging from their clothing: a pink heart, a green circle, a yellow [[wikipedia:Clubs (suit)|club]], and a purple [[wikipedia:Spades (suit)|spade]].
  * In the Korean dubbed version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster's name was "EM 트럼프 마녀" (''Enteomeiteu Teuleompeu Manyeo'') instead of "EM 트럼프 위치" (''Enteomeiteu Teuleompeu Wichi''), which still translates to "Entermate Trump Witch".
