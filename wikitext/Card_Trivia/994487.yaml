title: Card Trivia:Super Starslayer TY-PHON - Sky Crisis
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Typhon|Typhon]], a monstrous serpentine giant in [[wikipedia:Greek mythology|Greek mythology]].
  * This monster's Japanese kana title is "Logiastella" (гғӯгӮ®гӮўгӮ№гғҶгғ©, ''Rogiasutera''), which is a combination of the words "''[[wikipedia:Logia|logia]]''" (the Greek term for communications of divine origin) and "stella" (the Latin word for "star"), referencing how this monster was created to enforce the will of the gods, who are of extraterrestrial origin.
  * This monster has a [[LIGHT]] [[Machine]] [[counterpart]]: "[[Divine Arsenal AA-ZEUS - Sky Thunder]]".
  ** Fittingly, the Greek monster [[wikipedia:Typhon|Typhon]] was originally birthed to oppose and overthrow the sky god [[wikipedia:Zeus|Zeus]] ("AA-ZEUS"). This is reflected by how this monster's effects and [[Summoning condition]] are designed to counter "AA-ZEUS".
  ** The Japanese kana title for "AA-ZEUS" is "Negalogia" (гғҚгӮ¬гғӯгӮ®гӮў, ''Negarogia''), which can be interpreted as "the antithesis of the divine word", opposite to the kana title "Logiastella".
  ** Both monsters are depicted in mirrored poses in their respective card artworks.
  ** This monster is destroyed by "AA-ZEUS" in its alternate artwork.
  * This monster's Simplified Chinese name, "Divine Weapon Crisis Star пјҚ Arzeus TY-PHON" (зҘһе…өзҒҫжҳҹпјҚеҺ„е’’еј‘ е Өгғ»дё° ''shГ©n bД«ng zДҒi xД«ng пјҚ ГЁ zhГІu shГ¬ tГӯгғ»fД“ng''), includes the characters гҖҢеҺ„е’’еј‘гҖҚ (''ГЁ zhГІu shГ¬''), a [[wikipedia:Phono-semantic matching|phono-semantically matched]] alternate transcription of the name of "AA-ZEUS" consisting of the characters "disaster", "curse", and "killing".
