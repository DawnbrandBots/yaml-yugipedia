title: Card Trivia:Evasive Chaos Ninsect Sasumata Kabuto
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Evasive Chaos Ninjitsu Art of Furious Insect Barrage]]".
  * The first portion of this monster's name is based on a ''[[wikipedia:Sasumata|sasumata]]'', a two-pronged weapon used by the samurai class for catching criminals in feudal Japan, which this monster’s depicted wielding.
  ** The second portion of this monster's name, "Kabuto", is short for "''kabutomushi''", the Japanese name of the [[wikipedia:Japanese rhinoceros beetle|Japanese rhinoceros beetle]], which can also mean "helmet". Fittingly, this monster's helmet is designed after the head of a Japanese rhinoceros beetle.
