title: Card Trivia:The Fabled Rubyruda
wikitext: |-
  {{Navigation}}

  * This card's name is likely to be from "[[wikipedia:Ruby|Ruby]]" and "[[wikipedia:Garuda|Garuda]]", which is a mythical legendary bird.
  * The imp-like creature in this card's artwork is also featured in that of "[[Fabled Valkyrus]]'".
  ** The red colour of the creature seems to imply an [[Attribute]], in this case [[FIRE]].
  ** This creature's name is Wrath as pointed out in [[Duel Terminal Master Guide]]
