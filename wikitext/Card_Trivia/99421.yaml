title: Card Trivia:Worm Zero
wikitext: |-
  {{Navigation}}

  * A smaller version of this monster appears in the artwork of "[[W Nebula Meteor]]".
  * The city that appears in this card's artwork also appears in the artwork of "[[Worm Call]]".
  * This monster is the "[[Worm]]" planet.
  ** This monster appears to be a hive of "Worm" monsters, rather than an individual monster.
  *** Fittingly, this card can [[Special Summon]] more "Worm" monsters.
  ** This card is the ultimate "Worm" monster, as its name starts with the letter "Z".
  * This card has a "[[lswarm]]" counterpart: "[[Evilswarm Azzathoth]]".
  ** While this card is the last "Worm" monster due to its name starting with "Z", "Azzathoth" is the first "lswarm" monster as its name starts with "A".
  * This is the first [[Reptile]] [[Fusion Monster]].
  ** This is also the first Fusion Monster of a [[Duel Terminal]] archetype.
  * This monster is similar to the [[wikipedia:Moon|Moon]].
  ** This monster's front face seems to be based on the so-called 'Old Man of the Moon face' that can be seen in the full moon phase.
  * The text of this card's Spanish print refers to the "Worm" archetype as "Gusano/a" instead of "Gusano".
