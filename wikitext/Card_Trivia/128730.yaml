title: Card Trivia:Yami
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name, "Yami" is the Japanese word for "darkness".
  ** This card's [[Fiend]] and [[Spellcaster]] support effect references how fiends/demons are beings of darkness, and spellcasters are mostly practitioners of dark magic.
  ** This card's [[Fairy]] anti-support effect references how the Fairy monsters are represented through angelic beings, who are often contrasted with fiends/demons.
  *** This card's anti-support effect also reflects the typical battle between angels and demons, in which this card provides an advantage for the fiends/demons over the fairies/angels.
  ** This card is also based on the [[Night]] [[terrain]] in the original ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This card has a [[Skill Card]] counterpart: "[[Power of Dark]]".
