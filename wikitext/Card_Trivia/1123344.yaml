title: Card Trivia:Hrimnir the Divine Follower
wikitext: |-
  {{Navigation}}

  * This monster is named after [[Wikipedia:Sæhrímnir|Sæhrímnir]], a boar in [[wikipedia:Norse mythology|Norse mythology]] that is slain every night by the [[Wikipedia:Valkyrie|Valkyries]] for the gods' feasts in [[Wikipedia:Valhalla|Valhalla]], and is brought back to life the following day.
  ** This is reflected in the monster's effects, where it is [[Special Summon]]ed from the [[Graveyard]], and one of the [[Continuous Spell Card]]s it can [[search]]es for is "[[Valhalla, Hall of the Fallen]]".
