title: Card Trivia:Performapal Parrotrio
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Performapal Dramatic Theater]]" and "[[Performapal Show Down]]".
  * This card's Japanese name is a portmanteau of "[[wikipedia:Parakeet|parakeet]]" (インコ ''Inko'') and "chorus" (コーラス ''Kōrasu''), while its English name is a portmanteau of "[[wikipedia:Parrot|parrot]]" and "trio".
  ** Both names are equally valid with their bird term, as all three birds in this card's artwork are considered both parrots and parakeets (or formerly considered a parakeet): the blue bird is a [[wikipedia:Budgerigar|budgie]], the red bird is a [[wikipedia:Conure|conure]], and the yellow bird is a [[wikipedia:Cockatiel|cockatiel]].
  * The bowties and stars on each bird in this card's artwork correspond to the color of the next bird (proceeding to the left in sequence): the yellow bird has a red star and bowtie, the red bird has a blue star and bowtie, and the blue bird has a yellow star and bowtie.
