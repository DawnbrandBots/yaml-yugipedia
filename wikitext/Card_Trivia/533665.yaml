title: Card Trivia:Mahjong Munia Maidens
wikitext: |-
  {{Navigation}}

  * This card's design and Japanese name are puns on the original Chinese name for the game of [[wikipedia:Mahjong|mahjong]]: 麻雀 (pinyin: máquè), which means "sparrow."
  * "[[Kujakujaku]]" appears in this card's artwork, embossed on 2 Mahjong tiles.
  ** These tiles are likely the 1-sou tile, as it is commonly represented by a peacock or sparrow.
