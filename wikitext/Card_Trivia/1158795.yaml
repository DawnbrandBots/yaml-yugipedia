title: Card Trivia:Vic Viper Spread Bomb
wikitext: |-
  {{Navigation}}

  * This monster is reference to the Spread Bomb, a type of Missile weapon from the ''[[wikipedia:Gradius|Gradius]]'' video game series that drops multiple bombs in a frontal arc and explodes in a wide blast radius, reflecting its effect to [[destroy]] an opponent's [[Spell]]/[[Trap Card]].
