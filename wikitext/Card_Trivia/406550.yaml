title: Card Trivia:Metaltron XII, the True Dracombatant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[True Draco Apocalypse]]".
  * This [[Monster Card|monster]] is named after [[wikipedia:Metatron|Metatron]]. Its ''[[OCG]]'' name also references the [[wikipedia:Da'at|Da'at]].
  ** The name also references the "[[Metalfoes]]", and the "[[Crystron]]", and the "[[Zoodiac]]" (the "'''Twelve''' Zodiac Beasts").
  * This monster is composed of many monsters from the "[[Dracoslayer]]" storyline: the main body is that of "[[Crystron Quariongandrax]]", which appears to be enhanced by the armor of "[[Metalfoes Mithrilium]]", and it is wielding the weapons of many of the "Zoodiac" monsters:
  ** The rapier of "[[Zoodiac Ratpier|Ratpier]]" is attached to the right hip.
  ** The cannon of "[[Zoodiac Tigermortar|Tigermortar]]" is mounted on the left shoulder.
  ** The trident of "[[Zoodiac Drident|Drident]]" is held in the left hand.
  ** The whip of "[[Zoodiac Whiptail|Whiptail]]" is hanging off of the right leg.
  ** The sword of "[[Zoodiac Thoroughblade|Thoroughblade]]" is held in the right hand.
  ** The bow of "[[Zoodiac Boarbow|Boarbow]]" is attached to the back.
  ** The axe of "[[Zoodiac Broadbull|Broadbull]]" is attached behind the wings.
  ** The chakram of "[[Zoodiac Chakanine|Chakanine]]" is mounted on the right wrist.
  * This card is strongly similar to "[[Zefra Metaltron]]", which also appears as a golden angelic amalgam of archetype members from its lore series.
