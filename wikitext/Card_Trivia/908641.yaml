title: Card Trivia:Gravekeeper's Trap
wikitext: |-
  {{Navigation}}
  [[File:Gravekeeper%27s_Trap.png|thumb|right|250px|[[Ishizu Ishtar (manga)|Ishizu]] activates "[[Exchange of the Spirit (manga)|Exchange of the Spirit]]".]]

  * This is one of the [[cover card]]s of ''[[Magnificent Mavens]]''.
  * [[Ishizu Ishtar]] appears in this card's artwork.
  ** This card's name and artwork are based on a scene from {{chapter|Yu-Gi-Oh!|227|ref}} and {{episode|Yu-Gi-Oh!|094|ref}}, where Ishizu described her strategies as "a [[Gravekeeper's]] trap" before activating "[[Exchange of the Spirit (anime)|Exchange of the Spirit]]", before informing [[Seto Kaiba]] that despite his efforts to avert destiny, he has still walked right into it.
  ** This card's second effect is a reference to the same Duel, when Ishizu used her [[Millennium Necklace]] to predict the cards Kaiba would draw, before forcing him to [[discard]] them with "[[Muko (anime)|Muko]]".

