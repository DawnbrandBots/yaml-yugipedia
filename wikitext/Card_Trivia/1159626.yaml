title: Card Trivia:Kashtira Fenrir
wikitext: |-
  {{Navigation}}

  * ''[[wikipedia:Fenrir|Fenrir]]'' is also the name of a monstrous wolf from Norse mythology, playing a key role in the final battle of the gods in ''[[wikipedia:Ragnarök|Ragnarök]]''.
  * [[Super Quantum Black Layer]] resembles this monster, also sharing the same [[level]] (7), [[ATK]] and [[DEF]] (2400 each).
