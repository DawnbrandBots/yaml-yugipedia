title: Card Trivia:Gokipon
wikitext: |-
  {{Navigation}}

  * This card's name is derived from "gokiburi" (ごきぶり), the Japanese word for "cockroach".
  * This card has a counterpart: "[[Danipon]]".
  ** Together, both cards feature weaker, [[Insect]]-based effects similar to "[[Sangan]]" and "[[Witch of the Black Forest]]" respectively.
