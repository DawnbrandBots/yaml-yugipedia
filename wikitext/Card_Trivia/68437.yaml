title: Card Trivia:Ruby Dragon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is the [[Anime-only|anime-exclusive]] counterpart of "[[Luster Dragon]]" with 300 less [[ATK]] and [[DEF]].
  * This card's artwork is also identical to that of "Luster Dragon", except for the color. This is uncommon in the ''[[OCG]]''/''[[TCG]]'', as most [[Monster Card]]s released in the first ''[[Yu-Gi-Oh!]]'' era shared a [[recolored counterpart]], with the difference being the change of positions in their artwork.
  * Strangely, this card's lore is stated to have "very high defense power", but it actually has less [[DEF]] than "Luster Dragon", and less DEF than [[ATK]].
  * The [[Rush Duel]] counterpart of "Luster Dragon", "[[The Fire Dragon]]", is similar to this card.
