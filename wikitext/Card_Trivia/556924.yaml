title: Card Trivia:F.A. Winners
wikitext: |-
  {{Navigation}}

  * "[[F.A. Dawn Dragster]]", "[[F.A. Hang On Mach]]", "[[F.A. Motorhome Transport]]", "[[F.A. Turbo Charger]]", "[[F.A. Whip Crosser]]", "[[U.A. Midfielder]]", "[[U.A. Perfect Ace]]", and "[[U.A. Playmaker]]" appear in this card's artwork.
  ** This card's artwork depicts the driver of "Dawn Dragster" celebrating his victory over the race against "[[F.A. Dark Dragster]]" as depicted in the artworks of "[[F.A. Dead Heat]]" and "[[F.A. Overheat]]".
  * This card's [[Duel winner]] [[condition]] alludes to winning multiple circuits in the [[wikipedia:List of Formula One Grands Prix|Grands Prix]], which takes the form of the three "[[F.A.]]" [[Field Spell Card]]s required to be [[banish]]ed to fulfill the condition, as those Field Spell Cards are based on the different types of racing circuits featured in the Grand Prix.
