title: Card Trivia:Ghostrick Lantern
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amaze Attraction Horror House]]", "[[Ghostrick Festival]]", "[[Ghostrick Mansion]]" "[[Ghostrick Night]]", "[[Ghostrick Parade]]", "[[Ghostrick Renovation]]", "[[Ghostrick Scare]]", "[[Ghostrick Shot]]", and "[[Jack-In-The-Hand]]".
  * This monster is based on a [[wikipedia:Jack-o'-lantern|jack-o'-lantern]], a hollowed-out and carved pumpkin commonly used to ward off evil spirits in [[wikipedia:Halloween|Halloween]], when the boundaries between the human world and the otherworld have thinned.
