title: Card Trivia:Sleeping Scapegoats
wikitext: |-
  {{Navigation}}

  * "[[Swift Panther Warrior]]" and four "[[Scapegoat Token]]s" appear in this card's artwork.
  ** This is a reference to how [[Joey Wheeler]] frequently used "[[Panther Warrior (anime)|Panther Warrior]]" in conjunction with "[[Scapegoat (anime)|Scapegoat]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]], where the "[[Sheep Token]]s" were used as [[Tribute]]s to allow "Panther Warrior" to attack.
  * This card is a [[retrained]] [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart of "[[Scapegoat]]".
