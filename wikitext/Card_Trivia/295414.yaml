title: Card Trivia:Cyber Repair Plant
wikitext: |-
  {{Navigation}}

  * "[[Chimeratech Fortress Dragon]]" and a broken "[[Cyber Dragon]]" appear in this card's artwork.
  ** Also, what appears to be "[[Cyber Dragon Core]]" is visible under  the armor of "Cyber Dragon", implying that "Core" serves the basis for "Cyber Dragon".
  ** This card's artwork appears to depict the assembly of "[[Cyber Dragon Nova]]", as multiple of its components appear in this card's artwork.
  * The Spanish print of this card features a small typo, as it says "''1 of these effect''" instead of "'''1 of these effect'''s'''''". This was fixed in the Spanish release of ''[[Legendary Dragon Decks]]''.
