title: Card Trivia:Junk Dealer
wikitext: |-
  {{Navigation}}

  * The person that appears in this card's artwork is likely a [[wikipedia:Cyborg|cyborg]], an organism who is implanted with biomechatronic body parts, which is reflected in this card's [[Warrior]] and [[Machine]] [[support]] effect.
  ** The person in this card's artwork also resembles [[fandom:c:dragonball:Nappa|Nappa]] from the ''[[wikipedia:Dragon Ball|Dragon Ball]]'' franchise, with the patch on the left eye resembling a [[fandom:c:dragonball:Scouter|Scouter]], which is usually worn on a character's left eye in the series.
