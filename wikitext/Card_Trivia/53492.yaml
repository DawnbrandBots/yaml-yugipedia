title: Card Trivia:Overdrive Teleporter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Column Switch]]".
  * "[[Mind Protector]]" and "[[Psychic Commander]]" appear in this card's artwork.
  * This monster's name and effect are based on "[[Emergency Teleport]]", a [[Quick-Play Spell Card]] that can [[Special Summon]] a [[Level 3]] [[Psychic]] monster from the player's [[Deck]].
