title: Card Trivia:Mannadium Prime-Heart
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[2-Player Starter Set]]''.
  * This monster appears in the artworks of "[[Mannadium Breakheart]]" and "[[Mannadium Reframing]]".
  * This monster is an upgraded [[Synchro Monster|Synchro]] form of "[[Mannadium Riumheart]]".
  * This monster has three [[DARK]] "[[Heart]]" [[counterpart]]s:
  ** "[[Scareclaw]]" [[Link Monster|Link]]: "[[Scareclaw Tri-Heart]]".
  ** "[[Tearlaments]]" [[Fusion Monster|Fusion]]: "[[Tearlaments Kaleido-Heart]]".
  ** "[[Kashtira]]" [[Xyz Monster|Xyz]]: "[[Kashtira Arise-Heart]]".
  ** This monster also has a DARK "[[Visas Starfrost]]"-oriented Fusion counterpart: "[[Vicious Astraloud]]"
  * This is the first [[LIGHT]] upgraded form of a "Heart" monster or "Visas Starfrost".
  ** Fittingly, "Mannadium Riumheart" is the only "Heart" monster that did not become evil in the "Visas Starfrost" storyline.
  ** It is also the first upgraded form of a "Heart" monster to lack distinctly animalistic features, giving it a more civilized appearance, reflecting its good nature.
  * A post on [[Konami]]'s social media described this monster as having "multiple energy blades".
  * This monster's appearance is similar to a Kamen Rider, with "Mannadium Reframing" depicting it striking a pose similar to a Rider Kick.
