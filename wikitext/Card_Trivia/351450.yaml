title: Card Trivia:The Legendary Fisherman III
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[The Legendary Fisherman II]]", and the strongest form of "[[The Legendary Fisherman]]".
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, when this monster uses its effect to [[banish]] the opponent's monsters, it catches them in its fishing net. Then, when it [[return]]s those banished monsters to the [[Graveyard]], it releases those monsters into their card forms.
