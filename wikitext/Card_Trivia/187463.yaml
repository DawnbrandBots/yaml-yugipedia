title: Card Trivia:Jumbo Drill
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Drifter drill|drifter drill]], a tool used in mining and civil engineering to drill into rock.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to increase the [[Level]]s of all [[Machine]] monsters the player [[control]]s by 1 is based on the effect of "[[Overhaul]]", a [[Spell Card]] that was used alongside this monster in {{episode|ZEXAL|028|ref}}.
