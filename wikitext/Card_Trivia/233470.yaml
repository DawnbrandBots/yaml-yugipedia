title: Card Trivia:Madolche Messengelato
wikitext: |-
  {{Navigation}}

  * This card's name is a combination of "Messenger" and "Gelato", the Italian word for ice cream.
  * This monster appears in the artwork of "[[Madolche Ticket]]".
  * There is a possible reference to the anime "'''Letter Bee'''" in this card, as this monster delivers letters, and its effect requires Beast-Type "Madolche" monsters (Letter Bees have animals as partners).
