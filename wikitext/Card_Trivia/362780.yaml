title: Card Trivia:Skilled Blue Magician
wikitext: |-
  {{Navigation}}

  * Six [[Spell Counter]]s appear in this card's artwork.
  ** The sixth Spell Counter can be faintly seen on this monster's right shoulder.
  * This monster has a [[retrained]] ''[[Rush Duel]]'' [[counterpart]]: "[[Dragoncurse Magician]]".
  * This monster is a [[counterpart]] of "[[Skilled Red Magician]]".
  ** Both monsters feature an [[equal ATK and DEF|equal]] [[original ATK and DEF]] with the same amount.
  ** Both monsters feature an additional effect that can [[add]] a Spell Counter on a card by [[banish]]ing itself from the [[Graveyard]].
  ** Both monsters can [[Special Summon]] a member of the [[archetype]] used by [[Yugi Muto]]/[[Yami Yugi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]. In this monster's case, it can Special Summon the two "[[Gaia The Fierce Knight (archetype)|Gaia The Fierce Knight]]" monsters, "[[Gaia The Fierce Knight]]" or "[[Swift Gaia the Fierce Knight]]", which this monster's armor resembles.
