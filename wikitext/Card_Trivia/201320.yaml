title: Card Trivia:Madolche Chateau
wikitext: |-
  {{Navigation}}

  * This cards name refers to being a '[[wikipedia:Château|Château]]', a castle or a large manor or estate.
  ** This card's name can also be a pun on 'gâteau', French for cake, as it is a castle made of cake.
  * "[[Madolche Magileine]]", "[[Madolche Chouxvalier]]", "[[Madolche Mewfeuille]]" and "[[Madolche Baaple]]" appear in this card's artwork.
  ** The chateau in this card's artwork appears in the artwork of "[[Madolche Promenade]]".
  * This is the only card to use the character 'â' in its ''[[OCG]]'' card name.
