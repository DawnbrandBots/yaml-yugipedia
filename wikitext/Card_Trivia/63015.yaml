title: Card Trivia:Thorn of Malice
wikitext: |-
  {{Navigation}}

  * This card's artwork is similar to that of "[[Closed Forest]]".
  ** Incidentally, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, both cards are used by [[Signer]]s (this card by [[Akiza Izinski]] and "Closed Forest" by [[Devack]], who is a [[Dark Signer]]).  Moreover coincidentally, both cards' artworks possess antipodal color schemes in respect to both types of Signers, with this card's artwork having mostly ''lighter'' colors, whereas the artwork of "Closed Forest" has mostly ''darker'' colors.
  ** This card, like "[[Black Rose Dragon]]", references the personality of [[Akiza Izinski]]. This card represents the pain she felt from her past and how she wished to take it out on others.
  * This card shares similarities with "[[Double Tool C&D]]" in that it can only be equipped to a specific [[Signer Dragon]] or a certain type of monster, in this case "[[Black Rose Dragon]]" or [[Plant]]-Type monsters.
