title: Card Trivia:Zalen the Shackled Dragon
wikitext: |-
  {{Navigation}}

  * "Zalen" is a twist on ''rensa'' (連鎖, the Japanese word for "chain").
  ** This monster's name and design are further a play on [[Chain|effect chaining]], as its second effect can only be [[activate]]d when an effect is chained to and allows its user to [[negate]] a card effect that was chained to by another effect.
