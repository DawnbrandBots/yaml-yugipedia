title: Card Trivia:Tearlaments Rulkallos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[New World Stars]]" and "[[Tearlaments Scream]]".
  * This monster is an upgraded counterpart of "[[Tearlaments Kitkallos]]" after she was freed from the restraints of "[[Tearlaments Reinoheart]]", evident by the lack of padlocks that the other "[[Tearlaments]]" monsters have.
