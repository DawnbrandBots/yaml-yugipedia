title: Card Trivia:Stinging Jellyfish
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's Japanese name, "Death Chironex", is based on the ''[[wikipedia:Chironex fleckeri|Chironex fleckeri]]'', a species of box jellyfish.
  ** This monster's effect to [[destroy]] an opponent's monster that attacks it references the nature of the ''Chironex flexkeri'', where its extremely venomous darts will instantly kill anything that comes into physical contact with it.
