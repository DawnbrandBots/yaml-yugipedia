title: Card Trivia:Silpheed
wikitext: |-
  {{Navigation}}

  * A '''sylphid''' (also known as a [[wikipedia:sylph|sylph]]) is a mythological spirit that represents the element of air. The term originates with Paracelsus, who describes sylphs as invisible beings of the air, and has passed into general language as a term for minor spirits, elementals, or faeries of the air.
  * The wand this card wields is very similar to the one used by Sakura in the anime series [[wikipedia:Cardcaptor Sakura|Cardcaptor Sakura]], except that it lacks the 'beak'.
