title: Card Trivia:Luminous Soldier
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Joey]]'' and the box of ''[[Duelist Legacy Volume.4]]''. 
  * This monster appears in the artwork of "[[Infernal Sun]]".
  * This monster has a [[DARK]] [[counterpart]]: "[[Penumbral Soldier Lady]]".
  ** Both are based on the Moon and the Sun, respectively; this monster's Japanese name is "Sun Soldier", while the Japanese name of "Penumbral Soldier Lady" is "Moon Soldier Lady".
  ** Both share the same [[original ATK and DEF]] (2100/1400) and opposite [[Attribute]] [[anti-support]] effect.
  ** Both were used as [[Fusion Material]]s required for the [[Fusion Monster]]s mentioning "[[Keeper Shield Token]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime; [[Luminous Soldier (anime)|this monster]] was used to Summon "[[Luminous Keeper]]", while "[[Penumbral Soldier Lady (anime)|Penumbral Soldier Lady]]" was used to Summon "[[Penumbral Keeper]]".
  * In ''[[Yu-Gi-Oh! Duelists of the Roses]]'', this monster has 1600 [[ATK]] instead of 2100.
