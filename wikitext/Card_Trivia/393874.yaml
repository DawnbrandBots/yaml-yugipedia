title: Card Trivia:PSY-Framegear Delta
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[PSY-Frame Circuit]]" and "[[S-Force Specimen]]".
  * "[[PSY-Framelord Omega]]" is this monster equipped to "[[PSY-Frame Driver]]", along with "[[PSY-Framegear Alpha]]", "[[PSY-Framegear Beta]]", "[[PSY-Framegear Gamma]]" and "[[PSY-Framegear Epsilon]]".
