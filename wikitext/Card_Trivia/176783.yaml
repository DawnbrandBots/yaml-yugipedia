title: Card Trivia:Galaxy Wave
wikitext: |-
  {{Navigation}}

  * This card is an [[Xyz Monster|Xyz]] counterpart of "[[Synch Realm]]".
  * This card is showing the formation of an [[Overlay Network]] for a "[[Number]]" [[Monster Card|monster]].
  * The person on this card is wearing the [[D-Pad|ZEXAL version]] of the [[Duel Disk]], as well as an outfit that looks like the school uniforms worn by [[Yuma Tsukumo]] and other male students in ''[[Yu-Gi-Oh! ZEXAL]]''.
