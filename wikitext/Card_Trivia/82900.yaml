title: Card Trivia:Froggy Forcefield
wikitext: |-
  {{Navigation}}

  * "[[Treeborn Frog]]" appears in this card's artwork.
  * This card is the "[[Frog]]" version of "[[Mirror Force]]".
  * This card does not belong to the "Frog" [[archetype]], since its Japanese name doesn't contain the word Japanese word for "frog" (ガエル, ''gaeru''). In the extremely improbable situation that it is Summoned with "[[Magical Hats]]" and [[flip]]ped [[face-up]], another copy of this card cannot be [[activate]]d in response to an opponent's attack.
