title: Card Trivia:Ancient Dragon (DM anime)
wikitext: |-
  {{Navigation}}

  * This monster shares its name with the unrelated ''[[OCG]]''/''[[TCG]]'' card, "[[Ancient Dragon]]".
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster's [[Summoning condition]] is difficult, as it requires the combined effects of the [[Ancient (DM series)|Ancient]] cards. This was noted by [[Arthur Hawkins]] to be difficult to do, as he and [[Solomon Muto]] searched for the required seven cards to Summon this card until the latter obtained the last required card right before the beginning of the [[Grand Championship]] tournament.
