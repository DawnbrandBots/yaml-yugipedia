title: Card Trivia:Koa'ki Meiru Speeder
wikitext: |-
  {{Navigation}}

  * While the other "[[Koa'ki Meiru]]" monsters have the "[[Iron Core of Koa'ki Meiru]]" symbol on them, this monster has the "Iron Core" right in its center.
  * This monster is seen in pieces on the ground in the artwork of "[[Core Reinforcement]]".
