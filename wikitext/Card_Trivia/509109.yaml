title: Card Trivia:Sengenjin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Counter Meowsure]]".
  * This monster's ''[[TCG]]'' name is a portmanteau of its original Japanese name, ''Sennen Genjin'' (千年原人, "Millennium Primitive Man").
  * This monster has a [[retrained]] counterpart: "[[Sengenjin Wakes from a Millennium]]".
  * This is one of four monsters with 2750 [[ATK]], the other three being "[[Wingweaver]]", "[[Evilswarm Ouroboros]]", and "Sengenjin Wakes from a Millennium".
  * According to this card's [[flavor text]], this monster carries [[Millennium Items]]. The golden weapons on its back could be the mentioned Millennium Items, though they do not correspond with the seven seen in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * In the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, this card is a [[Ritual Monster]], with "[[Revival of Sennen Genjin]]" as its corresponding [[Ritual Spell Card]]. 
  ** In ''[[Yu-Gi-Oh! Duel Monsters II: Dark Duel Stories]]'', this monster requires "[[Millennium Golem (DM2)|Millennium Golem]]" as [[Tribute]], reflecting how both are "Millennium" monsters. In ''[[Yu-Gi-Oh! Dark Duel Stories]]'' onward, this monster requires "[[Hitotsu-me Giant (DDS)|Hitotsu-me Giant]]" as Tribute, reflecting how both are cyclopean [[Beast-Warrior]] [[Normal Monster]]s.
  * This monster has appeared in every ''[[Yu-Gi-Oh!]]'' game outside the ''[[OCG]]''/''TCG'', including ''[[Yu-Gi-Oh! Dungeon Dice Monsters]]'', the ''[[Yu-Gi-Oh! Capsule Monsters Collectible Figure Game]]'', and ''Yu-Gi-Oh! Heroclix''.
  ** This monster also shares this distinction with "[[Blue-Eyes White Dragon]]", "[[Celtic Guardian]]", "[[Curse of Dragon]]", "[[Dark Magician]]", "[[Gaia the Fierce Knight]]", "[[Kuriboh]]", "[[Mystical Elf]]", "[[Sanga of the Thunder]]", "[[Summoned Skull]]", and "[[Time Wizard]]".
