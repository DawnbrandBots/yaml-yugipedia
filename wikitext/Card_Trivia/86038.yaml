title: Card Trivia:Valhalla, Hall of the Fallen
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Valhalla|Valhalla]], the great hall in [[wikipedia:Norse mythology|Norse mythology]], which is described as a great hall presided over by [[wikipedia:Odin|Odin]] where the souls of warriors slain in battle feast and fight until [[wikipedia:Ragnarök|Ragnarök]], the end of the world.
  ** Fittingly, in ''[[Yu-Gi-Oh! 5D's Duel Transer]]'', the game's true antagonist [[Odin]] uses this card in his [[Deck]] while Dueling him in Hlidskjalf.
