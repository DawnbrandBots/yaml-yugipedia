title: Card Trivia:Spiritual Beast Rampengu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ritual Beast Tamer Zeframpilica]]".
  * This monster's name is portmanteau of ''ramu'' (the [[wikipedia:Ainu language|Ainu]] word for "heart"/"mind") and "penguin" (reflecting how it is based on a [[wikipedia:Crested penguin|crested penguin]]).
  * This monster is a grown-up version of the familiar that appears in the artwork of "[[Pilica, Descendant of Gusto]]".
  * Unlike the other "[[Spiritual Beast]]" monsters, this monster does not have a colored sphere within its "Ritual Beast" crest. Perhaps because of this, what should be its "[[Ritual Beast Ulti]]" form is instead a "[[Gusto]]" monster: "[[Daigusto Laplampilica]]".
