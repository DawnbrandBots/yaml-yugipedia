title: Card Trivia:Half Shield
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The shield in this card's artwork is in the shape of a heart, which is symmetrically dissected into two colored halves; this may be indicative of this card's effect in which it "halves" ''both'' types of inflicted [[Life Points]] damage, that which are  [[Battle Damage]] and [[effect damage]].
