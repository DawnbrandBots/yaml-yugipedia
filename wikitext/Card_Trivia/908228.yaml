title: Card Trivia:Supreme Skystream Magnum Overlord
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maximum Ultra Evolution Pack]]''.
  * This monster appears in the artworks of "[[Super Electromagnetic Maximum]]", "[[Supreme Marine Fortress Magnum Overbase]]", and "[[Urgent Strike]]".
  * This is the first [[Maximum Monster]] to have three [[Ignition Effect]]s instead of having at least one [[Continuous Effect]].
  ** This is also the first Maximum Monster that does not have an [[effect]] that prevents it from being [[destroy]]ed by [[Trap Card]] effects.
  * This monster has three [[counterpart]]s: "[[Supreme Beasteam Magnum Overlord]]", "[[Supreme Machine Magnum Overlord]]", and "[[Supreme Railartillery Magnum Overlord]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (10), [[Type]] ([[Machine]]), [[original ATK and DEF]] (1900/0), and [[MAXIMUM ATK]] (3500) with the above-mentioned monsters.
  * Along with "[[Supreme Skystream Magnum Overlord (L)|Supreme Skystream Magnum Overlord [L]]]" and "[[Supreme Skystream Magnum Overlord (R)|Supreme Skystream Magnum Overlord [R]]]", this is the last Maximum Monster to be [[Maximum Summon]]ed in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
