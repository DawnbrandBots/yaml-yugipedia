title: Card Trivia:Mermail Abyssteus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Abyss-steam]]".

  * This card's ''TCG'' and Chinese names are based off the [[wikipedia:Dunkleosteus|Dunkleosteus]], an enormous Devonian-era genus of fish.
  ** Its Japanese and Korean names, however, instead reference [[Wikipedia:Dinichthys|Dinichthys]], a separate species to which Dunkleosteus was once incorrectly assigned.
  * Despite being a Level 7 "[[Mermail]]" monster with a monstrous appearance, it is a [[Aqua]]-[[Type]] monster instead of the usual [[Sea Serpent]]-Type.
