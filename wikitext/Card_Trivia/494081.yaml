title: Card Trivia:Megalosmasher X
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Pliosaurus|Pliosaurus funkei]], also called "Predator X".
  * This monster appears to be depicted hunting an [[wikipedia:Ichthyosaur|Ichthyosaur]].
  * This is the first card to debut in a Structure Deck that contains more than 1 copy of it.
