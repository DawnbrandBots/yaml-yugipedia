title: Card Trivia:Gem-Knight Crystal
wikitext: |-
  {{Navigation}}

  * This monster has several transformations:
  ** "[[Gem-Knight Prismaura]]" who is visually a combination of this monster and "[[Vylon Prism]]".
  ** "[[Gem-Knight Zirconia]]" who is this monster after reaching the limits of his power and optimizing his Fusion ability.
  ** "[[Gem-Knight Master Diamond]]" who is this monster after concentrating the powers of the other higher-leveled "[[Gem-Knight]]" monsters, which resonated with the power of the "[[Constellar]]".
  ** "[[Cairngorgon, Antiluminescent Knight]]", who is this monster after his fusion powers went haywire, subsequently died and was corrupted into the "[[Shaddoll Core]]".
  ** "[[El Shaddoll Grysta]]" who is "Shaddoll Core" after activating the power of the 10 cores that originally belonged to the "Gem-Knight".
  ** "[[Stellarknight Constellar Diamond]]", who is this monster after dying again, being revived, then fusing with the then-living "[[Satellarknight]]" monsters.
  ** "[[Gem-Knight Hollowcore]]" who is a corrupted form of this monster.
  ** "[[Shaddoll Zefracore]]" who is this monster after receiving the powers of the "[[Zefra]]", having powers of both LIGHT and DARK.
  ** "[[Zefraath]]", who is "Zefracore" after the 11th "Zefra" activated and choose to use him as the vessel to manifest its powers.
  * This monster appears in the artwork of "[[Zefra Providence]]".
  * This card is named after [[wikipedia:Quartz|rock crystal]], also known as pure quartz or clear quartz.
  * This card is similar to "[[Elemental HERO Neos]]".
  ** It is a [[Level]] 7 [[Normal Monster]] with 50 less [[ATK]]/[[DEF]] than "Neos".
  ** Its [[flavor text]] describes this monster as being able to perform certain kinds of [[Fusion Summon|fusions]] with other "[[Gem-Knight]]" monsters, which is reminescent of the flavor text of "Neos" mentioning the [[Contact Fusion]] with the "[[Neo-Spacian]]" monsters.
  * This is the only "Gem-Knight" Normal Monster to not be listed as [[Fusion Material]] of any [[Fusion Monster]].
