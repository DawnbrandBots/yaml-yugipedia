title: Card Trivia:Voidvelg Globule
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Bok globule|Bok globules]], isolated and relatively small dark nebulae, containing dense cosmic dust and gas from which star formation may take place.
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Voidvelg Protostar]]".
