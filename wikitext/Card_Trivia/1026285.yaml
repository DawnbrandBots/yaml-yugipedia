title: Card Trivia:Moremarshmallon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ties That Bind]]".
  * This monster is a [[Shining Sarcophagus (series)|Shining Sarcophagus]] [[counterpart]] of "[[Marshmallon]]", depicted wearing eyeglasses similar to that of "[[Marshmallon Glasses]]".
  ** This monster's Japanese name (マシマシュマロン, ''Mashimashumaron'') is a portmanteau of "''mashi mashi''" (増し増し, lit. "more and more") and "''Mashumaron''" (マシュマロン, "Marshmallon").
  ** This monster's effect that prevents itself from being [[destroyed by battle]] is based on the first effect of "Marshmallon", while its effect to inflict 1000 [[effect damage|damage]] to the opponent is based on the second effect of "Marshmallon".
  ** This monster's effect that prevents the opponent's monsters from [[target]]ing other monsters for attacks is based on the effect of "Marshmallon Glasses".
  * This monster's effect to [[Special Summon]] another copy of itself when it is destroyed is based on the effect of "[[Marshmacaron]]", another counterpart of "Marshmallon".
