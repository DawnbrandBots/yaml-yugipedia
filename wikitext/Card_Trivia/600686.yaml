title: Card Trivia:Arcana Force IV - The Emperor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Arcana Spread]]".
  ** Consequently, this card appears in the artwork of "Arcana Spread".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Emperor (tarot card)|The Emperor]].
  ** This monster's number "IV" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (1400) reference how The Emperor is the fourth trump card of the Majora Arcana Tarot.
