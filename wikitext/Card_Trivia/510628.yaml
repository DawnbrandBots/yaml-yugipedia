title: Card Trivia:Giant Soldier of Stone
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ivy Shackles]]", "[[Lineage of Destruction]]", "[[Miracle Rupture]]" and "[[Weed Out]]".
  * This card appears in the artwork of "[[Draw Muscle]]".
  * This monster has two [[counterpart]]s:
  ** [[Retrained]]: "[[Sentry Soldier of Stone]]".
  ** [[Xyz Monster|Xyz]]: "[[Giant Soldier of Steel]]".
  * This monster, "[[Hell-Bound (manga)|Shadow Specter]]", and "[[Summoned Skull (manga)|Summoned Skull]]" are among the first cards to appear in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * This card's [[Giant Soldier of Stone (Bandai)|Bandai]] version is a [[Level 6]] [[Warrior]] monster with 1200 [[ATK]] and 2400 [[DEF]], and it has a brown color scheme. The [[Konami]] version of this card is a [[Level 3]] [[Rock]] monster with 1300 ATK and 2000 DEF, and it ha a grey color scheme.
  * At the time of this card's initial release, it was considered one of the most powerful Level 3 monsters in terms of ATK/DEF, but was made easier to obtain than the weaker "[[Mystical Elf]]", both of which were released in the ''[[EX Starter Box]]''.
  * The icon for Rock monsters in ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'' is based on this monster.
