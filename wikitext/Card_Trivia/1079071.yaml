title: Card Trivia:Crystal Clear Wing Over Synchro Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Crystal Clear Wing Synchro Dragon]]", and the ultimate form of "[[Clear Wing Synchro Dragon]]".
  ** This monster's name references [[Limit Over Accel Synchro Summon]], the most advanced type of [[Accel Synchro Summon]] used in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which requires a [[Tuner Synchro Monster]] and multiple non-Tuner [[Synchro Monster]]s to Summon a [[Limit Over Accel Synchro Monster]].
  *** This monster's effects are also similar to the third and fourth effects of "[[Shooting Quasar Dragon]]", allowing it to [[negate]] a card or [[effect]] [[once per turn]] and [[Special Summon]] a "[[Clear Wing]]" Synchro Monster when it [[leaves the field]].
  * This is the first Synchro Monster that specifies two different [[Tuner monster]] requirements as [[Synchro Material]]s.
  ** This monster's [[Summoning condition]] is based on [[Double Tuning]] (2 Tuners + 1 non-tuner monster) and Accel Synchro Summon (1 Tuner Synchro Monster + 1 non-Tuner Synchro Monster), which were mainly used by [[Jack Atlas]] and [[Yusei Fudo]] respectively in ''Yu-Gi-Oh! 5D's''.
  *** It also references [[Yugo]]'s desire to defeat [[Jack Atlas (ARC-V)|Jack Atlas]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
