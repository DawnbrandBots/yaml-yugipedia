title: Card Trivia:Ebon Sun
wikitext: |-
  {{Navigation}}

  * This card's name and artwork reference "[[The Supremacy Sun]]", both of which are used in conjunction in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  ** This card's artwork depicts a [[wikipedia:Solar eclipse|solar eclipse]], similar to the one depicted in the background of the ''[[OCG]]''/''[[TCG]]'' artwork of "The Supremacy Sun".
  ** This card's effect to increase the [[ATK]] of a monster [[Special Summon]]ed from the [[Graveyard]] works in tandem with the effect of "The Supremacy Sun" to Special Summon itself from the Graveyard repeatedly.
  ** This card's last ''OCG''/''TCG'' effect to [[return]] a [[discard]]ed [[Spell]]/[[Trap Card]] from the Graveyard to the [[hand]] is likely designed to work with the ''OCG''/''TCG'' effect of "The Supremacy Sun", which requires the player to discard a card in order to Special Summon it from the Graveyard. In the manga, "[[The Supremacy Sun (manga)|The Supremacy Sun]]" did not require discarding a card to Special Summon itself.
