title: Card Trivia:Kuribabylon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is a portmanteau of "[[Kuriboh]]" and "[[wikipedia:Babylon|Babylon]]".
  * This monster's  [[original ATK and DEF]] (1500/1000) in the ''[[OCG]]''/''[[TCG]]'' are exactly five times that of "Kuriboh's" (300/200).
  * This monster's first bulleted effect in the ''OCG''/''TCG'' allows it to be [[Special Summon]]ed from the [[hand]] if the player has more monsters in the [[GY]] than their opponent. This references [[Rafael]]'s Dueling strategy in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, which involves preventing his monsters from being sent to, or kept inside, the Graveyard.
  * This is the only [[Monster Card]] in the ''OCG''/''TCG'' with an effect that starts a [[Chain]] but is [[Unclassified effect|not classified]] as an [[Ignition]], [[Trigger]], or [[Quick Effect]].
