title: Card Trivia:Sinister Yorishiro
wikitext: |-
  {{Navigation}}

  * "[[Dark Ruler Ha Des]]", "[[Emissary from Pandemonium]]" and "[[Vanity's Fiend]]" appear in this card's artwork.
  * A ''[[wikipedia:Yorishiro|yorishiro]]'' is a [[wikipedia:Shinto|Shinto]] term for an object capable of attracting spirits, giving them a place to occupy.
  ** Judging from the name of the [https://yugiohblog.konami.com/articles/?p=5607 Konami article] this card was revealed in, it can be assumed the "yorishiro" referred by this card's name is a stone.
