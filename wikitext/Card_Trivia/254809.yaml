title: Card Trivia:Tempest, Dragon Ruler of Storms
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragoroar]]" and "[[Storm Dragon's Return]]".
  * This monster is one of the [[Cover card]]s of ''[[2013 Collectible Tins Wave 2]]''.
  * This monster is the older version of "[[Lightning, Dragon Ruler of Drafts]]".
  * This monster has a "[[True Draco]]" counterpart: "[[Mariamne, the True Dracophoenix]]"
  ** Both are [[WIND]] monsters with similar Summoning conditions, effects that activate when they are affected by card effects in a certain way (being banished by effect for "Tempest", being destroyed by effect for "Mariamne") to replace themselves with another monster, and have effects relating to WIND monsters.
