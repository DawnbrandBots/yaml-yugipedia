title: Card Trivia:Chorus of Sanctuary
wikitext: |-
  {{Navigation}}

  * The angel appearing in this card's artwork appears in the artwork of "[[The Chorus in the Sky]]".
  * This is the first [[Field Spell Card]] (not counting the [[Terrain]]s used in [[Duelist Kingdom]]) to be used in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * When this card was released the ''[[TCG]]'', only the angel's halo was removed from this card's artwork.
  ** In most of the worldwide video game releases, the cross on the gate in the background of this card's artwork was also removed; however, in the ''[[Yu-Gi-Oh! Duel Generation]]'' video game, both the halo and the cross remained unaltered.
  * In ''[[Yu-Gi-Oh! Duel Arena]]'' and ''[[Yu-Gi-Oh! Master Duel]]'', the icon for [[Fairy]] monsters are based on the angel appearing in this card's artwork.
