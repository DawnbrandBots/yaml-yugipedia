title: Card Trivia:Blackwing - Shura the Blue Flame
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Asura (Buddhism)|Asura]],  lowest ranks of the deities or demigods of the [[wikipedia:Buddhist cosmology|Kāmadhātu]] in Buddhism, which is pronounced in Japanese as "Ashura".
  ** This monster's name is also likely based on "Shura mono", sub-genre of warrior plays from the classic Japanese [[wikipedia:Noh|Noh]] musical drama where the protagonist appears as a ghost of a famous samurai and pleads to a monk for salvation.
  * This is the only "[[Blackwing]]" monster to not activate its effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
