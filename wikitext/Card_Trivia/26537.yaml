title: Card Trivia:Orichalcos Deuteros
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[The Seal of Orichalcos]]" appears in this card's artwork.
  * This seal appears in the artwork of "[[Orichalcos Tritos]]" and "[[Orichalcos Shunoros]]".
  * This card's name is based on "''deuteros''" (δεύτερος), the Greek word for "second", reflecting how it serves as the second layer of "The Seal of Orchalcos".
  * The runes around the outer rim of the seal are characters written in the [[wikipedia:Enochian|Enochian]] language, spelling "OREICHALCSDEURUSNIZANM" ("Oreichalcos Deuteros") with some unknown text at the end.
  ** In the original Japanese version of the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'']] anime, the text on all "[[Orichalcos]]" cards are also written entirely in Enochian runes, except for "[[Orichalcos Sword of Sealing]]". Coincidentally, "Orichalos Sword of Sealing" is the only "Orichalcos" card to not be used by [[Dartz]], instead used by [[Rafael]].
