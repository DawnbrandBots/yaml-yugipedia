title: Card Trivia:Zombino
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Monster Assortment]]" (as a cookie).
  ** "[[Live☆Twin Lil-la]]" cosplays as this monster in the artwork of "[[Evil★Twin's Trouble Sunny]]" (in the upper-right corner), in one of two billboards that advertise "Monster Assortment".
  * "[[Bone Mouse]]" appears in this card's artwork.
  * This card's Japanese [[flavor text]] has no punctuation, and is written entirely in [[wikipedia:Hiragana|hiragana]] (a simplified Japanese writing system, commonly used to render the pronunciation of the more complex [[wikipedia:Kanji|kanji]]). This gives the impression of having been written by a young child, such as this monster.
  ** This card's English flavor text is written in the form of ''[[wikipedia:Haiku|haiku]]'', a type of Japanese short form poetry which consists of three phrases, each containing five, seven, and five phonetic units in order.
  * This card's flavor text refers to "[[Zombina]]".
  ** According to [[The Valuable Book EX 5 card storylines|The Valuable Book EX 5]], this monster and "Zombina" are streamers and "the leading stars of the melancholic horror world", who are major competition for the "[[Live☆Twin]]" monsters.
