title: Card Trivia:Beeton
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster has a counterpart: "[[Mu]]", as that monster has the same appearance as this one, except with a different color scheme, fancier eyebrows, and different [[wikipedia:Iris (anatomy|irises]].
  ** This is supported by the fact that "Mu" has one of the abilities that [[Beeton]] had in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'' manga]] (Endure), while "Beeton" has the other (Curl Up).
