title: Card Trivia:Blue-Eyes Solid Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Legend Duelist 3]]''/''[[Legendary Duelists: White Dragon Abyss]]'' and ''[[Legendary Duelists: Season 2]]''.
  * This monster's name is a reference to [[Solid Vision]], the holographic technology integrated into ''[[Duel Monsters]]'' cards by [[KaibaCorp]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  ** Fittingly, this monster's wings are based on a [[Duel Disk]], and it has a holographic projector inside its mouth.
  ** This monster is similar to "[[Blue-Eyes Vision Dragon]]", another monster based on "Blue-Eyes White Dragon" themed around holographic technology, sharing the same [[Attribute]] ([[LIGHT]]), [[Level]] (8), [[Type]] ([[Dragon]]) and [[original ATK and DEF]] (2500/2000).
