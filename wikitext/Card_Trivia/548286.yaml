title: Card Trivia:Predaplant Lilizard
wikitext: |-
  {{Navigation}}

  * This monster is a combination of the ''[[wikipedia:Ecballium|Ecballium elaterium]]'' plant and the [[wikipedia:Lizard|lizard]].
  ** This is reflected in its Japanese name (テッポウリザード, ''Teppourizādo''), which is a portmanteau of the Japanese name of the ''Ecballium elaterium'' (テッポウウリ, ''Teppoūri'') and "lizard".
