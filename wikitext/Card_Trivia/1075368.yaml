title: Card Trivia:Maliss P Chessy Cat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Maliss in Underground]]".
  ** This monster's face appears in the artwork of "[[Maliss C GWC-06]]".
  * This monster is based on the [[wikipedia:Cheshire Cat|Cheshire Cat]], a character from ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]'' who is depicted as a cat with a distinctive mischievous grin and the ability to make himself disappear.
  ** This monster's ''[[TCG]]'' name is a portmanteau of "Cheshire Cat", "chess", and "pussycat".
  ** This monster also references "[[wikipedia:BlackCat (cyber gang)|BlackCat]]", the name of a group of cyber criminals who provides [[wikipedia:Ransomware|ransomware]] as a service to affiliates, where the group's logo is a black cat.
  * The symbol in the background of this card's artwork is based on the suit of [[wikipedia:Clubs (suit)|Clubs]], referencing the [[wikipedia:Playing card|playing card]] theme of ''Alice's Adventures in Wonderland''.
  * The English letter "P" stands for "pawn", referencing the [[wikipedia:Pawn (chess)|pawn]] piece used in the game of  [[wikipedia:Chess|chess]], which is the theme of ''[[wikipedia:Through the Looking-Glass|Through the Looking-Glass]]''.
