title: Card Trivia:Dark Templar @Ignister
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Mega Pack 04]]''.
  * This monster's sword appears in the artwork of "[[A.I. Challenge You]]" and "[[SA.I.dekick]]".
  * The "[[@Ignister]]" logo is located on this monster's left shoulder pad.
  * This monster has a younger form: "[[Darkwight @Ignister]]".
  * This monster represents the [[DARK]] [[Ignis]], [[Ai]].
  ** This monster's DARK [[Attribute]] and its [[Special Summon]]ing effects reference how DARK monsters often feature [[swarm]]ing effects.
  ** This monster is based on "[[Decode Talker]]", the first [[Link Monster]] acquired by [[Playmaker]] via [[Storm Access (anime)|Storm Access]] with the help of Ai.
  *** Both monsters feature the same Attribute (DARK), [[original ATK]] (2300), and [[Link Rating]] (3).
  *** Both monsters feature a Special Summoning effect. This monster can Special Summon the player's monsters, while "Decode Talker" can gain ATK based on all cards it [[points to]].
  **** This is a reference to Ai's later view on humanity, his mourning over the other Ignis, and deriving strength from his bond with them.
  **** Unlike "Decode Talker", this monster does not have an effect to [[Tribute]] other monsters to [[activate]] its effects, reflecting Ai's desire to see his friends again and never lose them.
  *** This monster's names reference Ai's demeanor in the final season of the ''[[Yu-Gi-Oh! VRAINS]]'' anime, where he performed vigilante justice on those who wronged him and the other Ignis, similar to the character archetype of "the dark knight" or "the knight templar".
  * This is the last monster in the ''Yu-Gi-Oh! VRAINS'' anime to declare an attack.
  * This monster shares similarities to "[[Number C101: Silent Honor DARK]]".
  ** Both monsters' Japanese names were changed from "Dark Knight" upon their international release.
  ** Both monsters' designs feature helmets with three spikes, a faceplate, and glowing eyes.
  ** Both monsters's designs feature wings; however, this monster's wings appear to be membranous, while the wings of "Silent Honor DARK" are more akin to a carapace.
  ** Both monsters' respective owners (Ai and [[Reginald Kastle|Reginald "Shark" Kastle]]) were close allies to their series' main protagonists ([[Yusaku Fujiki]] and [[Yuma Tsukumo]], respectively) before becoming the final antagonist of their series.
  * In the anime, this is the first monster whose [[Summon chants in Yu-Gi-Oh! VRAINS#Ai|Summon chant]] was interrupted, as, according to [[Roboppi]], it was too long.
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] requiring three monsters with different names is based on how in the ''Yu-Gi-Oh! VRAINS'' anime, it was [[Link Summon]]ed using three "@Ignister" monsters with different names.
