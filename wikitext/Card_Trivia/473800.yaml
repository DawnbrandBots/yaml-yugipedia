title: Card Trivia:Elemental HERO Honest Neos
wikitext: |-
  {{Navigation}}

  [[File:Elemental_HERO_Neos_in_Precious_Time,_Glory_Days.jpeg|thumb|right|250|"Elemental HERO Neos" affected by "Honest", as seen in ''Precious Time, Glory Days''.]]

  * This is one of the [[cover card]]s of ''[[Duelist Saga]]''.
  * This monster is a [[retrained]] [[counterpart]] of "[[Elemental HERO Neos]]".
  ** Visually, this monster is a combination of "Elemental HERO Neos" and "[[Honest]]".
  *** This monster's appearance references a scene from ''[[Precious Time, Glory Days]]'', the fourth and final opening of the ''[[Yu-Gi-Oh! GX]]'' anime, as well as the box art and title screen of ''[[Yu-Gi-Oh! GX Tag Force 3]]''.
  *** This monster's appearance is also based on a scene from {{episode|GX|160|ref}} where [[Jaden Yuki]] used the effect of "[[Honest (anime)|Honest]]" on "[[Elemental HERO Neos (anime)|Elemental Hero Neos]]", causing the latter to gain the former's angelic wings.
  *** This monster's effect to allow the player to [[discard]] it and make a "[[HERO]]" monster gain 2500 [[ATK]] is based on the effect of "Honest", which can be sent from the [[hand]] to the [[Graveyard]] and make the player's [[LIGHT]] monster gain ATK equal to the ATK of the opponent's monster it is battling until the end of the turn.

