title: Card Trivia:Arcana Spread
wikitext: |-
  {{Navigation}}

  * "[[Arcana Force IV - The Emperor]]" (and its card form) appears in this card's artwork.
  ** This card's artwork is based on the scenes in the ''[[Yu-Gi-Oh! GX]]'' anime where the hologram of the "[[Arcana Force]]" monsters' card form appear above them and rotates. The opponent must choose which position the rotating card lands on, with their right side up and upside down positions representing their heads or tails [[coin toss]] results.
  * This card is named after a tarot spread, a specific layout of tarot cards used in readings to explore questions or issues, wherein each position in the spread has a particular meaning.

