title: Card Trivia:House Duston
wikitext: |-
  {{Navigation}}

  * This card is named and based upon dust particles.
  * The "[[Duston]]" monsters in this card's artwork seem similar to some of the "[[Ojama]]" monsters, namely "[[Ojama Green]]" and "[[Ojama Red]]".
  ** This card's effect is also similar to those of the "[[Ojama]]" cards, such as "[[Ojama Trio]]", "[[Ojama King]]" and "[[Ojama Knight]]", all of which occupy your opponent's Monster Card Zones (or make unusable).
  * "[[Red Duston]]", "[[Green Duston]]", "[[Blue Duston]]", "[[White Duston]]", and "[[Yellow Duston]]" appear in this card's artwork.
