title: Card Trivia:Elephant Statue of Disaster
wikitext: |-
  {{Navigation}}

  * This card has a counterpart: "[[Elephant Statue of Blessing]]".
  * This card's effect is strictly better than that of "[[Minar]]".
  * This card's Japanese name is a pun: a "statue" (像 ''zō'') that depicts an "elephant" (象 ''zō'').
