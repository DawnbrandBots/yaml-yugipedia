title: Card Trivia:Dark End Evaporation Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed [[Main Deck]] counterpart of "[[Dark End Dragon]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! GX|effect name]] of "[[Dark End Dragon (manga)|Dark End Dragon]]" in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga: "Dark Evaporation".
  ** This monster being a Main Deck monster is based on how "Dark End Dragon" was originally a monster that could be used in the Main Deck in the manga; in the ''[[OCG]]''/''[[TCG]]'', it was released as a [[Synchro Monster]], which this monster can [[banish]] for its [[Special Summon]]ing effect.
  * This monster has a [[LIGHT]] [[counterpart]]: "[[Light End Sublimation Dragon]]".
  ** Both monsters are the retrained Main Deck counterparts of "Dark End Dragon" and "[[Light End Dragon]]", respectively.
  ** Both monsters are named after their base counterparts' effect names in the ''Yu-Gi-Oh! GX'' manga, which are based on the conversion of certain states of matter into gas; in this monster's case, it is based on evaporation, the process of converting liquid matter into vapor.
  * This card's artwork is taken from {{chapter|GX|032|ref}}, specifically from the panel showing "Dark End Dragon" being Summoned, albeit mirrored.
