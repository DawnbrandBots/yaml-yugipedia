title: Card Trivia:Kozmo Dark Eclipser
wikitext: |-
  {{Navigation}}

  * This spacecraft is based on the [[wikia:starwars:Eclipse-class dreadnought|Eclipse-class Super Star Destroyer]] from the ''Star Wars'' franchise.
  * This card is the first Machine-Type "[[Kozmo]]" monster that does not Special Summon a "Kozmo" monster with a lower Level from the Deck; instead, it adds a "Kozmo" monster with a lower Level from your Deck to your hand.
  * Several copies of "[[Kozmo DOG Fighter]]" and/or "[[DOG Fighter Token]]", and at least 1 "[[Kozmo Delta Shuttle]]" (in the upper-right corner) appear in this card's artwork.
