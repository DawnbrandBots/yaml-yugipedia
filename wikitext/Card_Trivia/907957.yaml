title: Card Trivia:Rhythmical Performer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amusi Performer]]", "[[Ego Rhythm]]", and "[[Speedy Performer]]", as well as in both artworks of "[[Amusi Annoyance]]" and the second artwork of "[[Back Beat]]".
  ** "Amusi Performer" and "Speedy Performer" appear in this card's artwork, whom this monster serves as a member of the trio.

  == See also ==
