title: Card Trivia:Gulliver Chain
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Three copies of "[[Toy Soldier (Tag Force Special)|Toy Soldier]]" appear in this card's artwork.
  * This card is a reference to ''[[wikipedia:Gulliver's Travels|Gulliver's Travels]]'', when Gulliver is tied to the ground, although ropes were used instead of chains.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this card was used on "[[Ancient Gear Golem (anime)|Ancient Gear Golem]]", which is often seen as gigantic, referencing how Gulliver was seen as gigantic to the citizens of [[wikipedia:Lilliput and Blefuscu|Lilliput]], a country inhabited by a race of tiny-sized humans.
