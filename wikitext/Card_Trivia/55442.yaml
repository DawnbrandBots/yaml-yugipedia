title: Card Trivia:Elemental HERO Absolute Zero
wikitext: |-
  {{Navigation}}

  * This monster appears in the second artwork of "[[Mask Change]]", changing into "[[Masked HERO Acid]]".
  * This monster is named after [[wikipedia:Absolute zero|absolute zero]], the lowest theoretical temperature where an atom's movements stops and matter solidifies at 0 [[wikipedia:Kelvin|kelvin]], commonly measured at −273.15° [[wikipedia:Celsius|Celsius]] and -459.67° [[wikipedia:Fahrenheit|Fahrenheit]].
  ** Fittingly, this monster's effect to destroy all monsters on the opponent's field when it leaves the field are likely based on this due to the fact that all lifeforms cannot exist in absolute zero temperature.
  * Design-wise, this monster appears to be an evolution of "[[Elemental HERO Ice Edge]]".
  ** Despite this, in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this monster was [[Fusion Summon]]ed using "[[Elemental HERO Ocean]]" as the [[WATER]] [[Fusion Material]] in both of its appearances.
  * This is the only Omni-"HERO" [[Fusion Monster]] to require any "[[HERO]]" monster as Fusion Material, rather than any specific "[[Elemental HERO]]" monster.
  * In the ''Yu-Gi-Oh! GX'' manga, this monster was considered to be [[Koyo Hibiki]]'s "ultimate HERO".
  * This monster, "[[Alector, Sovereign of Birds]]", "[[Kachi Kochi Dragon]]", and "[[Thunder King Rai-Oh]]" are the only promotional cards for a manga volume in which they did not appear.
  ** This is the promotional card for [[Yu-Gi-Oh! GX - Volume 004|the fourth volume]] of the ''Yu-Gi-Oh! GX'' manga, but it did not appear until the first chapter of [[Yu-Gi-Oh! GX - Volume 005|the fifth volume]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|033|ref}}, specifically from the panel showing [[Elemental Hero Absolute Zero (manga)|this monster]] being Summoned.
