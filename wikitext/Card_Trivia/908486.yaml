title: Card Trivia:Kashtira Preparations
wikitext: |-
  {{Navigation}}

  * "[[Kashtira Unicorn]]", "[[Tearlaments Reinoheart]]" (inside the giant capsule "Unicorn" is holding) and "[[Kashtira Riseheart]]" appear in this card's artwork.
  ** The appearance of "Riseheart" in this card's artwork is obscured most likely because it had not yet been released at the time this was card.

