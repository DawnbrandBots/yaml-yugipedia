title: Card Trivia:Dragon Buster Destruction Sword
wikitext: |-
  {{Navigation}}

  * This monster is an older form of "[[Buster Whelp of the Destruction Swordsman]]"
  ** This monster is "Buster Whelp of the Destruction Swordsman" wielding the sword of "[[Buster Blader, the Destruction Swordmaster]]".
  ** This card's [[DARK]] [[Attribute]] reflects how "Buster Whelp of the Destruction Swordsman" is eventually corrupted and becomes "[[Buster Dragon]]".
