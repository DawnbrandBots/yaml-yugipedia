title: Card Trivia:Number Wall
wikitext: |-
  {{Navigation}}

  * The circular formation of the "[[Number]]s'" numeric digits appears in this card's artwork.
  * This is the first [[support]] card for the "Number" [[archetype]], with "[[Number 6: Chronomaly Atlandis]]" being the second card to support the archetype, but the first ''[[OCG]]''/''[[TCG]]'' card to do so.
  ** This card's added ''OCG''/''TCG'' effect is similar to the anime-only effect that prevents all "Number" monsters from being destroyed by battle with non-"Number" monsters.
