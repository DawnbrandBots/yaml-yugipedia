title: Card Trivia:Bixi, Water of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Yang Zing Creation]]".

  * This monster's name is based on [[wikipedia:Bixi (mythology)|Bìxì]] (zh: 赑屃｜贔屭 ''bìxì''), one of the [[wikipedia:Nine sons of the dragon|nine sons]] of the [[wikipedia:Dragon King|Dragon King]] who is depicted as a hybrid of a dragon and a tortoise.
  ** According to Chinese mythology, Bìxì is associated with funerary complexes and is historically used as a decorative support base for commemorative steles and tablets for people with high nobility, including emperors.
