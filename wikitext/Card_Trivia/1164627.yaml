title: 'Card Trivia:Number 39: Utopia the Envoy of Light'
wikitext: |-
  {{Navigation}}

  * This [[monster]] is a [[retrained]] counterpart of "[[Number 39: Utopia]]".
  ** This monster's name is derived from a passage of [[Astral]]'s [[Summon chants in Yu-Gi-Oh! ZEXAL#Astral|Summon chant]] of "[[Number 39: Utopia (anime)|Number 39: Utopia]]" in the original Japanese version of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: ''Messenger of light'' (光の使者, ''Hikari no shisha'').
  ** This monster's effect to prevent itself from being [[destroyed by battle]] except with a "[[Number]]" monster is based on the effect that all "Number" monsters in the anime posses.
  ** This monster's effect to make it gain 2500 [[ATK]] when a second attack is declared references [[Yuma Tsukumo]]'s strategy in the ''Yu-Gi-Oh! ZEXAL'' anime, in which he uses the effect of "Number 39: Utopia" to negate its own attack, then activate [[Double or Nothing! (anime)|Double or Nothing!]]" to double its ATK and let it attack a second time.
  ** This monster's effect to [[Special Summon]] the monster it [[destroy]]s by battle to the player's [[field]] is based on the effect of "[[Number F0: Utopic Future (anime)|Number F0: Utopic Future]]".
