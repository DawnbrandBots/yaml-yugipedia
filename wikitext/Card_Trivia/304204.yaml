title: Card Trivia:Kabuki Stage - Cherry Blossom Mountain
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The tree that appears in this card artwork is named "[[wikipedia:cherry blossom|sakura]]", a tree found in Japan.
  * In the Japanese culture, sakura symbolizes arrival of a new life in the nature, which can be related to this card's effect of [[Field Spell Card|scenary change]].
