title: Card Trivia:Double Coston
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Certain Death Promotion]]".
  * This card's name and artwork are puns on the fact that it qualifies as two Tributes for the Tribute Summon of a [[DARK]] monster.
  * This card has the same Level, ATK and DEF as "[[Kaiser Sea Horse]]", another monster that can be [[treated as multiple Tributes]] for a Tribute Summon. As such, it can be seen as a [[DARK]] counterpart to "Kaiser Sea Horse".
