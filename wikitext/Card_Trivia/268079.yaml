title: Card Trivia:DZW - Chimera Clad
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Chimera (mythology)|chimera]], a creature in [[wikipedia:Greek mythology|Greek mythology]] whose body consists of parts of different creatures, while its weapon forms are based on [[wikipedia:Armour|cloth armor]] (a type of armor made with layers of fabric and reinforced with materials) and a [[wikipedia:Scythe|scythe]] (an agricultural hand-tool with a long polearm and a curved blade).
  * This is the first and currently only "DZW -" monster.
  ** This is the first "[[ZW -]]" monster to feature a modifier in front of its [[archetype]] name, the other being "[[SZW - Fenrir Sword]]".
  * This is the only "ZW -" monster in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime that does not change the [[equip]]ped monster's [[ATK]] or [[DEF]].
  * This monster and "[[ZW - Sylphid Wing (anime)|ZW - Sylphid Wing]]" are the only "ZW -" monsters in the ''Yu-Gi-Oh! ZEXAL'' anime that can be equipped to a monster other than "[[Number C39: Utopia Ray (anime)|Number C39: Utopia Ray]]".
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster was equipped to "[[Number C39: Utopia Ray V (anime)|Number C39: Utopia Ray V]]", part of its body transformed into a scythe, while the rest of its body was attached to "Utopia Ray V" in the form of dark armor with metallic wings, giving it an appearance similar to the Deathscythe Hell Custom, from ''[[wikipedia:Mobile Suit Gundam Wing|Mobile Suit Gundam Wing]]''.
