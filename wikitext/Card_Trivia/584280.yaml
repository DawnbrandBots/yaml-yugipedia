title: Card Trivia:Dark Cavalry
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Dark Magician]]" and "[[Gaia The Fierce Knight]]".
  ** Both [[Fusion Material]]s are used by [[Yami Yugi]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and [[Yu-Gi-Oh! (manga)|manga]].
  * This monster has a "[[Gaia the Dragon Champion]]" counterpart: "[[Dark Magician the Knight of Dragon Magic]]".
  ** Both are depicted with their steeds in mirrored poses in their respective card artworks.
