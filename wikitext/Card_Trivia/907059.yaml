title: Card Trivia:Hormone GunMcQueen, the Magnificent Shichirin
wikitext: |-
  {{Navigation}}

  * The "Horumon" (ホルモン) in this card's Japanese name is the Kansai term for beef or pork offal, [[wikipedia:horumonyaki|horumonyaki]], a genre of [[wikipedia:Japanese cuisine|Japanese cuisine]] which can be grilled.
  * This monster's name is a reference to the John Sturges film ''[[wikipedia:The Magnificent Seven|The Magnificent Seven]]'', similar to how "[[Shichirin Samurai - Kushiro the Skewer Master]]" references ''[[wikipedia:Seven Samurai|Seven Samurai]]'', which ''The Magnificent Seven'' was inspired by.
  ** The Japanese title of ''The Magnificent Seven'' is ''Kōya No Shichinin'' (荒野の七人), or ''The Seven Men of the Wilderness''. The first part of this monster's name is the same as the film's title, with one character changed, replacing ''Shichinin'' (七人), meaning "Seven People", with ''Shichirin'' (七輪), a type of grill.
  ** This monster's name, "GunMcQueen" references the actor [[wikipedia:Steve McQueen|Steve McQueen]], who played Vin Tanner in ''The Magnificent Seven'', while its Western-like appearance references how ''The Magnificent Seven'' is a Western film.
  * This monster's [[original ATK and DEF]] (2900/1400) can be read in ''[[goroawase]]'' as ''ni ku o i shi'', which means "delicious meat".
