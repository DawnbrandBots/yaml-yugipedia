  * In the English dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, the artwork of "[[Energy Drain (DM)|Energy Drain]]" used a recolored version of this card's anime artwork. Interestingly, at that point when "Energy Drain" made its appearance, this card had not yet debuted in the anime.
