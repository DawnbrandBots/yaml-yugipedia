title: Card Trivia:Pendulumucho
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[Pendulum (archetype)|Pendulum]]" and "''mucho''", the Spanish word for "much".
  * The monster on the left uses a pair of [[wikipedia:Maraca|maracas]], with each of the heads replaced with the blue and red markers used to indicate a [[Pendulum Scale]].
