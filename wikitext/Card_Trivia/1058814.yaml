title: Card Trivia:Magic Combo
wikitext: |-
  {{Navigation}}

  * This Skill references a scene from {{episode|ZEXAL|001|ref}}, in which [[Reginald Kastle|Reginald "Shark" Kastle]] uses "[[Aqua Jet (anime)|Aqua Jet]]" on "[[Big Jaws (anime)|Big Jaws]]", and his two lackeys shout: "It's here!", "Shark-san's Magic Combo!" (出た！シャークさんのマジックコンボだ！, ''Deta! Shākusan no Majikku Konbo da!'').
  ** Due to the irony in the fact that Shark was simply activating a [[Spell Card]], with no synergy or "combination" whatsoever, this phrase has gained quite a popularity among Japanese ''Yu-Gi-Oh!'' online communities, often used in an ironic or mocking manner.
