title: Card Trivia:Thunder Sea Horse
wikitext: |-
  {{Navigation}}

  * This monster shares the same [[Attribute]] ([[LIGHT]]), [[Type]] ([[Thunder]]), and [[original ATK]] (1600) as "[[Thunder Dragon]]", as well as a similar name and effect.
  ** This monster's name, "Thunder Seahorse", is also a pun on ''Tatsu no otoshigo'' (竜の落し子), a Japanese term used for sea horses which literally means "dragon's child".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|014|ref}}, specifically from the panel showing [[Thunder Sea Horse (manga)|this monster]] being Summoned.
