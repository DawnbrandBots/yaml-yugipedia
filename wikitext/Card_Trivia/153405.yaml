title: Card Trivia:Vylon Tetra
wikitext: |-
  {{Navigation}}

  * The "Tetra" in this card's name is Greek for "four"; this monster's body is in the shape of a [[wikipedia:Tetrahedron|tetrahedron]], a three-dimensional shape with four sides.
  * "[[Evigishki Tetrogre]]" wears armor resembling this monster in its card artwork.
  ** In the [[Master Guide 3 card storylines#Those Who Were Given Power|Master Guide 3 card storylines]], "Tetrogre" is the result of "[[Gishki Noellia]]" merging with this monster in order to fight against the "[[Steelswarm]]".
