title: Card Trivia:Fiendish Golem
wikitext: |-
  {{Navigation}}

  * The demonic statue in this card's artwork appears in the artwork of "[[Fiendish Chain]]".
  ** The chains, torches, and the blue flames appearing in the artwork of "Fiendish Chain" also appear in this card's artwork.
  * "[[Fiend Piece Golem]]" is a retrained [[counterpart]] of "[[Big Piece Golem]]" based on this card.
