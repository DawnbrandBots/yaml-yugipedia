  * In Irish folklore, [[wikipedia:Caladbolg|Caladbolg]] is the sword of [[wikipedia:Fergus mac Róich|Fergus mac Róich]], a legendary king of Ulster from a body of medieval heroic legends known as [[wikipedia:Ulster Cycle|the Ulster Cycle]].
