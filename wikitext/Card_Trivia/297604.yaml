title: 'Card Trivia:Number C88: Gimmick Puppet Disaster Leo'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Puppet Parade]]".
  * The number "88" appears on this monster's right shoulder.
  * This monster is a [[Ranked-Up]] "[[Number C]]" form of "[[Number 88: Gimmick Puppet of Leo]]".
  * This monster's body resembles a grenade, referencing its highly destructive effect in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** Also, in the anime, when this monster has no [[Xyz Material]]s left, the red crosshatch patterns on its body begin to glow and pulse vibrantly, as if about to detonate, referencing its automatic [[victory condition]] effect.
  * This is the first released [[Xyz Monster]] that cannot be [[Xyz Summon]]ed in the usual way, instead requiring a "[[Rank-Up-Magic]]" [[Spell Card]] to be Summoned.
  ** Strangely, this card still has an [[Xyz Material]] requirement of 4 [[Level 9]] monsters, despite the fact that it can never be Summoned in that way.
  ** "[[New Order 13: Etheric Amon]]", an [[anime-only]] card, also cannot be Xyz Summoned in the usual way, but it does not have the Xyz Material requirement printed on the card.
  ** This is the only "[[Number C]]" "[[Gimmick Puppet]]" monster in the ''[[OCG]]''/''[[TCG]]'' that requires its base form to be used, as it cannot be Summoned without Ranking-Up the base form.
  * This monster's ''OCG''/''TCG'' [[Duel winner]] effect requiring the opponent to have 2000 [[Life Point]]s or lower likely references its appearance in {{episode|Yu-Gi-Oh! ZEXAL|126|ref}}, in which it attempted to use this effect while [[Reginald Kastle|Nash]] had 1300 Life Points, which is less than 2000.
