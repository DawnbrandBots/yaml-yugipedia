title: Card Trivia:Lesser Dragon
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart]]: "[[Armored Lizard]]".
  * This monster and "[[Lizard Soldier (anime Rush Duel)|Lizard Soldier]]" are the first [[Dragon]] monsters Summoned in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
  * Despite this card's [[flavor text]] stating that it is incapable of breathing fire, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster attacks by breathing fire.
