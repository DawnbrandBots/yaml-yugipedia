title: Card Trivia:Dragonitout, the Supreme Divided Dragon of Dithering Doubt
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's Japanese name  and effect is a reference to ''[[wikipedia:Jugemu|Jugemu]]'', a famous ''[[wikipedia:rakugo|rakugo]]'' about a couple who could not decide on a name for their newborn son.
  ** The base kanji of "Super Nether Emperor Dragon" ({{Ruby|超|ちょう}}{{Ruby|冥|めい}}{{Ruby|帝|てい}}{{Ruby|竜|りゅう}} ''Chōmeiteiryū'') features the Japanese word for "long name" ({{Ruby|超|ちょう}}{{Ruby|冥|めい}}), ''Chōmei''), referencing the story of ''Jugemu'', in which the father eventually gives his baby son all of the names that he could not decide on, subsequently giving him a long name.
