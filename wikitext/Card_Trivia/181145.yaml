title: Card Trivia:Ninja Grandmaster Hanzo
wikitext: |-
  {{Navigation}}

  * This is a [[Cover card]] of the ''[[Collectible Tins 2012 Wave 2]]''.
  * This monster is named after [[wikipedia:Hattori Hanzō|Hattori Hanzō]], a famous samurai with the skills of a ninja and commander of several Iga ninja who served [[wikipedia:Tokugawa Ieyasu|Tokugawa Ieyasu]].
  * "[[Senior Silver Ninja]]" can be seen in the background of this card.
  * This card is very similar to "[[Ninja Grandmaster Sasuke]]". They are both "Ninja Grandmaster" cards, they both have 1800 ATK and 1000 DEF, and have opposing Attributes ([[DARK]] and [[LIGHT]], respectively).
  * This monster appears in the artwork of "[[Ninjitsu Art of Super-Transformation]]"
