title: Card Trivia:Majestic Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Arrive in Light]]" and "[[Guidance of Salvation]]".
  * This monster has a [[counterpart]]: "[[Converging Wills Dragon]]".
  * In all of this monster's appearances in the ''[[Yu-Gi-Oh! 5D's]]'' anime, it was used to [[Synchro Summon]] a "[[Majestic]]" monster in the same turn it was drawn.
  ** The only time that the necessary [[Signer Dragon]] was not already in play was in {{episode|5D's|128|ref}}. In each other case, this monster was Summoned almost immediately.
  ** Also, in every episode except the aforementioned episode, the Summoned "Majestic" monster was used to help its owner win their Duels during the same turn this monster was Summoned.
  ** Furthermore, this monster has always been drawn only when the Duelist (notably Yusei Fudo and [[Jack Atlas]]) bears the full [[Mark of the Dragon|mark]] of the [[Crimson Dragon]].
