title: Card Trivia:Toon Table of Contents
wikitext: |-
  {{Navigation}}

  * "[[Toon World]]" appears in this card's artwork, in which it depicts the table of contents within the book.
  ** "[[Manga Ryu-Ran]]" appears on the front cover of "Toon World".
  * The card artwork depicts a list labelled "Index" inside the front cover of the book. However, in all languages (including Japanese), the card's name indicates that it refers to a "Table of Contents". An [[wikipedia:Index (publishing)|index]] is typically placed at the end of a [[wikipedia:book|book]], while a [[wikipedia:table of contents|table of contents]] is found at the beginning, like in this card.
  ** This card's ''[[OCG]]'' artwork features chapters referring to the "[[Toon]]" monsters. As such, "Demon" refers to "[[Toon Summoned Skull]]" (known as "Toon Daemon" in Japanese), "Dragon" refers to either "[[Manga Ryu-Ran]]" (known as "Toon Dragon Egger" in Japanese) or "[[Blue-Eyes Toon Dragon]]", "Mermaid" refers to "[[Toon Mermaid]]", and "Elf" refers to "[[Toon Gemini Elf]]".
