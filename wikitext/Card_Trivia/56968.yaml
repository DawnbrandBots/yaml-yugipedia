title: Card Trivia:Vice Dragon
wikitext: |-
  {{Navigation}}

  * This is a [[Cover card]] of ''[[Deck Custom Pack 01]]''.
  * This card was supposed to come with the [[Duel Disk - Yusei Version]] but was accidentally released in [[Raging Battle: Special Edition]]s.
  * This monster appears in the artwork of "[[Advance Force]]".
  * This card has a [[retrained]] counterpart: "[[Power Vice Dragon]]".
  * This card shares its first effect with "[[Unknown Synchron]]", "[[Level Warrior]]", "[[T.G. Striker]]", "[[Oracle of the Sun]]" and "[[Cyber Dragon]]", except for having its attack and defense halved when [[Special Summon]]ed.
  ** However, this first effect ''and'' the exception is shared with "[[Solar Wind Jammer]]".
  * Interestingly, the name "Vice Dragon" was alternatively translated in German for "[[Clear Vice Dragon]]" as "Freier '''lasterhafter''' Drache", while "Vice Dragon" was translated to "'''Vize'''drache".
