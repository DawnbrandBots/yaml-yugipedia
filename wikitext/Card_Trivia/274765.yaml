title: Card Trivia:Panther Shark
wikitext: |-
  {{Navigation}}

  * This monster's name is reflected in its panther-like mask on its snout.
  * This card has a [[counterpart]]: "[[Eagle Shark]]".
  ** Both cards' naming schemes reference the 1981 Japanese television series ''[[wikipedia:Taiyo Sentai Sun Vulcan|Taiyo Sentai Sun Vulcan]]'' where the three main characters of the show are named Panther, Eagle, and Shark.
  ** Both cards' ''[[OCG]]''/''[[TCG]]'' effects are the combination of their respective effects in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, where [[Panther Shark (anime)|this card]] can be [[Normal Summon]]ed without [[Tribute]] if the opponent controls two or more monsters.
