  [[File:Number107GalaxyEyesTachyonDragon-JP-Anime-ZX-Sealed.jpg|thumb|The "neutral form" of "Number 107: Galaxy-Eyes Tachyon Dragon".]]

  * The [[neutral form]] of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]" and an [[Xyz Material|Overlay Unit]] appear in this card's artwork.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|effect name]] of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Tachyon Dragon]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, while its artwork depicts the effect [[activate|activation]] of "Galaxy-Eyes Tachyon Dragon", where it can revert into its neutral form.
