title: Card Trivia:This Creepy Little Punk
wikitext: |-
  {{Navigation}}

  [[File:Kiryu_Enters.png|thumb|right|250|Kalin's first appearance in the Crash Town arc.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * A partial silhouette of [[Kalin Kessler]] playing the harmonica and walking through [[Satisfaction Town|Crash Town]] appears in this card's artwork.
  ** This card's Japanese name, "Return of the Reaper" ({{Ruby|舞|ま}}い{{Ruby|戻|もど}}った{{Ruby|死|しに}}{{Ruby|神|がみ}}, ''Maimodotta Shinigami'') is based on Kalin's adopted nickname, "The Reaper" (しにがみ ''Shinigami'', "Death God") during the Crash Town arc in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  *** This card's international name is based on a scene in the international dubbed version of {{episode|5D's|091|ref}}, where Lawton tells Kalin that he's a "creepy little punk" after the latter laughs to himself upon Summoning "[[Infernity Zero (anime)|Infernity Zero]]". Kalin accepts the moniker, telling Lawton that "this creepy little punk" is going to beat him.
  ** This card's artwork is based on Kalin's entrance before his Duels during the Crash Town arc in the ''Yu-Gi-Oh! 5D's'' anime. The first time is before Kalin Duels before his Duel against [[The Giant]] on {{episode|5D's|086|ref}}, and the second time is before his [[Tag-Team Duel]] with [[Yusei Fudo]] against Lawton.

