title: Card Trivia:Freya, Spirit of Victory
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battle Pack 3: Monster League]]''.
  * This monster is named after [[wikipedia:Freyja|Freyja]], the Nordic goddess of love, beauty, and battle.
  * This is the only [[Fairy]] monster with four [[wikipedia:halo (religious iconography)|halo]]s in its design, with two in her hands and another two in her legs.
