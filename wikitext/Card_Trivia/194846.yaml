title: Card Trivia:Uminotaurus
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "Umi" (海), the Japanese word for "sea", and "Minotaurus", the Japanese name of "[[Battle Ox]]".
  ** This monster has the same [[Level]], [[ATK]], and [[DEF]] as "Battle Ox" and also has a similar design to it.
  ** It has a similar effect to "[[Enraged Battle Ox]]" (the [[retrained]] counterpart of "Battle Ox"), different only in the affected [[Type]]s, each reflecting their respective monster's nature.
  * This monster is based on a [[wikipedia:Sea Slug|sea slug]], a gastropod that was sometimes referred as "sea cow".
