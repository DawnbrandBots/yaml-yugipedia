  {{Navigation}}

  [[File:DoubleToolCD-JP-Anime-5D-NC.png|thumb|right|300|"[[Power Tool Dragon (anime)|Power Tool Dragon]]" [[equip]]ped with "[[Double Tool C&D (anime)|Double Tool C&D]]", as seen in the ''[[Yu-Gi-Oh! 5D's]]'' anime.]]

  * This is the [[cover card]] of ''[[Duelist Pack: Duelists of Pyroxene]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Power Tool Dragon]]".
  ** Visually, this monster appears to be "[[Life Stream Dragon]]" (the true form of "Power Tool Dragon") wearing an armor based on "Power Tool Dragon".
  *** This monster's appearance is based on "[[Power Tool Dragon (anime)|Power Tool Dragon]]" [[equip]]ped with "[[Double Tool C&D (anime)|Double Tool C&D]]" in {{episode|5D's|036|ref}}.
  ** This monster's name references the [[Summon chants in Yu-Gi-Oh! 5D's#Leo|Summon chant]] of "Power Tool Dragon" in the Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime: ''Docking strength with '''courage''' to protect the world's peace!''
  ** This monster's effect is designed to counter the "[[Meklord]]" (whose effects equips an opponent's [[Synchro Monster]]) and the "[[Timelord]]" [[archetype]]s (whose effects prevent their destruction by effects and battle), both of which were used by antagonists of the second season in the ''Yu-Gi-Oh! 5D's'' anime.
  ** This monster's [[original ATK and DEF]] (2500/2300) are an inverse of those of "Power Tool Dragon" (2300/2500).
