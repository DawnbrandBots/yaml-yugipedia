title: Card Trivia:Poly-Chemicritter Dioxogre
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a combination of "[[Chemicritter Carbo Crab]]" and "[[Chemicritter Oxy Ox]]".
  ** This card is named after [[wikipedia:Carbon dioxide|carbon dioxide]], a chemical compound made up of one [[wikipedia:Carbon|carbon]] atom and two [[wikipedia:Oxygen|oxygen]] atoms.
  * This card has the highest [[ATK]] of all [[Gemini monster]]s (tied with "[[Phoenix Gearfried]]").
