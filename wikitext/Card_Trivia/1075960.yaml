title: Card Trivia:Dark Matter Frikacheer
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is based on Fricka, the name given to the Nordic goddess [[wikipedia:Frigg|Frigg]] in ''[[wikipedia:Der Ring des Nibelungen|Der Ring des Nibelungen]]''.
  ** Fricka is also an alternative name for the Nordic goddess [[wikipedia:Freyja|Freyja]], which serves as the basis for the naming scheme of "[[Dark Matter Freya]]", another cheerleader-themed member of the [[Dark Matter]] [[series]] used by [[Zeyet]].
