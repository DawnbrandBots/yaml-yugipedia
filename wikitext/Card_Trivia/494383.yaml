title: Card Trivia:Odd-Eyes Phantasma Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[ Overscale Pendulum]] form of "[[Odd-Eyes Phantom Dragon]]".
  * This monster shares visual features with the [[signature card]]s of [[Yuya Sakaki (manga)|Yuya Sakaki]] (who also used this monster) and his brothers ([[Yuto (manga)|Yuto]], [[Yugo (manga)|Yugo]], and [[Yuri (manga)|Yuri]]) in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga:
  ** "[[Odd-Eyes Phantom Dragon]]": the stone-like scales and the orb on its forehead.
  ** "[[Dark Anthelion Dragon]]": the tusks located on the bottom half of this monster's head.
  ** "[[Clear Wing Fast Dragon]]": the plates located at its waist and a singular tail instead of two hind legs. 
  ** "[[Starving Venemy Dragon]]": the horns located on the top half of this monster's head.
  * This card's artwork is taken from {{chapter|ARC-V|018|ref}}, specifically from the panel showing [[Odd-Eyes Phantasma Dragon (manga)|this monster]] being Summoned.
