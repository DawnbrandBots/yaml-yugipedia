title: Card Trivia:Magician of Dark Illusion
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster likely references the origin story of the "[[Dark Magician]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]]: [[Mahado (manga)|Mahado]] ([[Mahad]] in the anime), one of Pharaoh Atem's most loyal priests and closest friend, sacrificed his life to combine his ''[[ba]]'' with his ''[[ka]]'', [[Magus of Illusion]] ([[Illusion Magician]] in the anime) to become the Dark Magician.
  ** This is reflected by how this monster shares the same [[Attribute]] ([[DARK]]), [[Level]] (7), [[Type]] ([[Spellcaster]]) as "Dark Magician", in addition to being treated as "Dark Magician" and to [[Special Summon]] "Dark Magician" from the [[Graveyard]]. 
  * This monster has a "[[Chaos]]" [[Ritual Monster|Ritual]] counterpart: "[[Illusion of Chaos]]".
