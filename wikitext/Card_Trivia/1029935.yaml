title: Card Trivia:Prominence
wikitext: |-
  {{Navigation}}

  * This card's name is based on [[wikipedia:Solar prominence|solar prominence]], a stream of incandescent gas projecting above the [[wikipedia:Sun|Sun's]] chromosphere.
  ** Fittingly, in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this card was [[equip]]ped to "[[The Supremacy Sun (manga)|The Supremacy Sun]]", a monster based on the Sun, whose [[Special Summon]]ing effect works in conjunction with this card's self-destruction effect.
