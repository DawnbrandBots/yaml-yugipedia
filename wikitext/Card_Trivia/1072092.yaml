title: Card Trivia:Armed Rebeellion
wikitext: |-
  {{Navigation}}

  * "[[Battlewasp - Sting the Poison]]" appears in this card's artwork.
  * This card's Japanese name,「{{Ruby|武|ぶ}}{{Ruby|装|そう}}{{Ruby|蜂|ほう}}{{Ruby|起|き}}」 (''busōhōki''), is a ''yojijukugo'' that means "armed rebellion"; the kanji in 「{{Ruby|蜂|ほう}}{{Ruby|起|き}}」(''hōki'', "rebellion") can also be interpreted as "rising bee", hence its effect supporting [[Insect]] monsters and its artwork depicting a "[[Battlewasp]]" monster, as they are an archetype of armed bees, and its English name being a play on the words "rebellion" and "bee".
