title: Card Trivia:Heavy Slump
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" appears in this card's artwork.
  * This card is named for an economic 'slump', which is a sudden downturn or [[wikipedia:recession|recession]]; this card's effect that activates when your opponent has at least 8 cards in their hand mirrors this definition, as it reduces their current hand to two.
  ** In clockwise order, from the bottom-left, the kanji 小麦粉, あずき, 大豆, 自社株 and 先物 in the ''[[OCG]]'' artwork of this card mean "flour", "red beans", "soybeans", "stocks" and "futures", respectively.
  ** The words around "Goblin of Greed" in the ''[[TCG]]'' artwork are 'stocks', 'orange juice', 'soybeans', 'pork bellies', 'futures' and 'copper', which are all traditional examples of publicly traded goods and commodities.
  *** Of these words, 'copper' was the only word that was added into the TCG artwork, as this card's ''[[OCG]]'' artwork does not feature brown-colored kanji.
