title: Card Trivia:Glacial Beast Iceberg Narwhal
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to inflict 600 damage to the opponent when another monster(s) the player [[control]]s is [[destroy]]ed by the opponent's card is based on a scene from {{episode|ARC-V|043|ref}}, when [[Olga]] uses this monster's anime effect to inflict 600 damage to [[Zuzu Boyle]], the same amount inflicted by [[Halil]]'s "[[Fire Jinn the Flame Genie of the Lamp]]" to [[Gong Strong]] in response to [[destroyed by battle]].
  ** The fact that this monster's ''OCG''/''TCG'' damaging effect requires the player to control another monster likely references how this monster was used alongside "Fire Jinn the Flame Genie of the Lamp" in every Duel it was used in the anime.
