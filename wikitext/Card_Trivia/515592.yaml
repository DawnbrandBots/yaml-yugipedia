title: Card Trivia:Dragunity Knight - Barcha
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Synchro Ejection]]" and "[[Synchro Sonic]]".
  * The card artwork shows that "[[Dragunity Angusticlavii]]" is the rider for this card, and "[[Dragunity Pilum]]" the mount.
  * This card's name is derived from the word "[[wikipedia:Barcha|Barcha]]", a type of lance with a wooden handle commonly used in the 16th century.
  * This is one of the [[cover card]]s of ''[[Hidden Arsenal: Chapter 1]]''.
