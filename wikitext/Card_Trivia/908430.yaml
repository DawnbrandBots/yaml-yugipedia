title: Card Trivia:Zexal Construction
wikitext: |-
  {{Navigation}}
  [[File:RankUpMagicLimitedBariansForce-JP-Anime-ZX.gif|thumb|200px|"[[Rank-Up-Magic Limited Barian's Force (anime)|Rank-Up-Magic Limited Barian's Force]]" being transformed into "[[Rank-Up-Magic Numeron Force (anime)|Rank-Up-Magic Numeron Force]]".]]

  * This card's artwork and effect are both based on a scene from {{episode|ZEXAL|098|ref}} where [[Yuma Tsukumo]] and [[Astral]] (after combining with each other into [[ZEXAL II]]), use their ability, [[ZEXAL II#Shining Evolution|Shining Evolution]], where they [[reveal]]ed  "[[Rank-Up-Magic Limited Barian's Force (anime)|Rank-Up-Magic Limited Barian's Force]]" in their [[hand]] and transform it into its "true form", "[[Rank-Up-Magic Numeron Force (anime)|Rank-Up-Magic Numeron Force]]".
  ** The listed [[archetype]]s in this card's effect also reference [[Shining Draw]], the power used by Yuma and Astral in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, which allows them to perform a [[Shining Draw]] to draw the cards they need, which mostly includes the members of the "[[Zexal]]" archetypes (including the "[[ZW -]]" and "[[ZS -]]" monsters), the "[[Rank-Up-Magic]]" cards and the "[[Rank-Down-Magic]]" cards.

