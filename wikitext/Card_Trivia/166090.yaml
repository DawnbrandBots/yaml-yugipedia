title: Card Trivia:Shard of Greed
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a shattered piece of "[[Pot of Greed]]", whose effect it imitates.
  ** "Pot of Greed" may have been fixed by connecting it to "[[Pot of Generosity]]", producing "[[Pot of Duality]]".
  ** This card's use of Greed Counters is analogous to the Pot's various fragments, which must be gradually re-assembled to attain its full value.
  * This card's artwork may show the aftermath of "[[Asleep at the Switch]]", as "Pot of Greed" may have been shattered by "[[Dream Clown]]".
  * In several card artworks, including "[[Goblin Circus]]", "[[Single Purchase]]", and "[[Jackpot 7]]", "Pot of Greed" can be seen missing this piece.
