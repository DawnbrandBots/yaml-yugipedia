title: Card Trivia:Drill Warrior
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Edition Volume 4]]''.
  * This monster appears in the artwork of "[[Dimension Voyage]]".
  * This monster, along with "[[Drill Synchron]]", "[[Splendid Rose]]", "[[Bird of Roses]]", "[[Morphtronic Vacuumen]]", and "[[Chaos King Archfiend]]", were made into anime cards as a result of a drawing competition, as seen in the preview of [[Yu-Gi-Oh! 5D's - Episode 074|episode 74]], [[Yu-Gi-Oh! 5D's - Episode 075|75]], [[Yu-Gi-Oh! 5D's - Episode 076|76]], [[Yu-Gi-Oh! 5D's - Episode 077|77]], and [[Yu-Gi-Oh! 5D's - Episode 078|78]] of the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster and "Drill Synchron" seem to be based on the eponymous mecha of the anime series ''[[wikipedia:Gurren Lagann|Gurren Lagann]]''.
