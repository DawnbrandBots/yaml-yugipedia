title: Card Trivia:Kewl Tune B2B
wikitext: |-
  {{Navigation}}

  * "[[Kewl Tune Cue]]" and "[[Kewl Tune Reco]]" appear in this card's artwork.
  * This monster's name is likely a reference to "B2B" (short for "back to back") DJ sets, a practice in which multiple DJs perform at the same time or shortly after one another. <ref>https://theedmist.co/2015/04/06/the-edm-dictionary-b2b-back-to-back/</ref><ref>https://www.vice.com/en/article/the-art-of-the-b2b/</ref>
  ** This monster's name is also likely a pun on how "Cue" and "Reco" are depicted performing at the same time while also standing "back to back", as well as its effects enabling both "back to back" attacks from the player's [[Tuner monster]]s, and its [[Quick Effect]] being used "back to back" each turn.
  * This is the first [[Level 10]] [[Tuner monster]], as well as the first Level 10 [[Tuner Synchro Monster]].
  * This monster has the highest [[original ATK]] (3200) of all Tuner monsters and Tuner Synchro Monsters.
