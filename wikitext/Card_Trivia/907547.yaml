title: Card Trivia:Witchcrafter Confusion Confession
wikitext: |-
  {{Navigation}}

  * "[[Witchcrafter Edel]]", [[Witchcrafter Genni]]", "[[Witchcrafter Haine]]", "[[Witchcrafter Madame Verre]]", "[[Witchcrafter Pittore]]", "[[Witchcrafter Potterie]]", and "[[Witchcrafter Schmietta]]" appear in this card's artwork.
  ** This card's artwork depicts the members of the "[[Witchcrafter]]" guild receiving a letter from their guild master "Madame Verre", causing various expressions of exasperation and dismay.
  *** The letter is presumably "Madame Verre" announcing a sudden leave of absence at the expense of the guild, which results in "Haine" assuming responsibility of the guild as "[[Witchcrafter Vice-Madame]]".
  *** The pose used by "Madame Verre" is a classic pose in Japanese pop culture known as ''tehepero'' (てへぺろ), typically used when a character commits a mistake and tries to laugh it off with a cute expression.
  * This card's name is likely a play on words with "Confusion" containing the phrase "fusion", especially given this card's effect to [[Fusion Summon]].
