title: Card Trivia:ZW - Sleipnir Mail
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Sleipnir|Sleipnir]], the mythical eight-legged [[wikipedia:horse|horse]] of [[wikipedia:Norse mythology|Norse mythology]]. However, this monster has four legs like a normal horse.
  * Parts of this monster's body are similar to "[[Number C39: Utopia Ray Victory]]" and "[[ZW - Leo Arms]]".
  * Despite being called "Sleipnir '''Mail'''", this monster does not– as is the case for most "[[ZW -]]" monsters– take the form of the weapon it is named for (which would be "[[wikipedia:Mail (armour)|Mail]]", a type of [[wikipedia:armour|armor]]) when it is [[equip]]ped in the anime. Rather, "Sleipnir Mail" stays in its monster form as a steed for "[[Utopia (archetype)|Utopia]]" to ride on.
