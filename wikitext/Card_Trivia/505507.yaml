title: Card Trivia:Pulling the Rug
wikitext: |-
  {{Navigation}}

  * The card's Japanese name and artwork is based on a common trick used by ninjas, where flipping the [[wikipedia:Tatami|''tatami'' mat]] vertically can be used to block incoming projectiles.
  ** This card's ''[[TCG]]'' name is based on a popular trick in Western cartoons, in which a long carpet is pulled out from underneath a person and causes them to fall.
