title: Card Trivia:Black Chaos the Ultimate Magical Swordsman
wikitext: |-
  {{Navigation}}

  * Visually, this monster appears to be a combination of "[[Black Chaos the Dark Chaos Magician]]" and "[[Black Luster Soldier - Soldier of Light and Darkness]]".
  ** Both monsters were released in ''[[Chaos Origins]]'', with them having effects that mention "[[Ritual of Light and Darkness]]" (just like this monster), and are eligible monsters to be [[shuffle]]d into the [[Deck]] by this monster's [[Special Summon]]ing [[Summoning condition|condition]].
  ** This monster's weapon is similar to those of "[[Dark Paladin]]" and "[[Red-Eyes Dark Dragoon]]", both of which are [[Fusion Monster|fusions]] of "[[Dark Magician]]" and another monster. All three monsters have "[[Ultimate Magical|Super Magic]]" in their Japanese names.
  ** This monster has the same cape-like attachment (hanging from its waist) adorned with metal bars that "Black Luster Soldier - Soldier of Light and Darkness" has, as well as the same style of [[wikipedia:Visor (armor)|visor]] with barred eye-slits (with five openings on each side).
  * This monster is holding a pose similar to that of "[[Dark Magician of Chaos]]" in the artwork of "[[Dedication through Light and Darkness]]", with a background artwork similar to that Spell's as well.
