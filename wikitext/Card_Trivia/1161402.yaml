title: Card Trivia:Heavy Armored Knight Babeldecker
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Bilevel rail car|double-decker rail car]], which is designed with two levels of passenger accommodation instead of one to increase passenger capacity.
  ** This is reflected by its effect to [[Xyz Summon]] a [[Xyz Monster]] using solely itself as [[Xyz Material]], metaphorically counting as 2+ materials for said Summon.
  * This monster is a [[counterpart]] of "[[Night Express Knight]]".
  ** Aside from being [[Level]] 10 [[EARTH]] [[Machine]]s like most [[Train]] monsters, they share the same [[DEF]] (3000).
  ** Both have an effect that allows the player to [[Normal Summon]] them without [[Tributing]].
  ** They share the same body structure, consisting of a giant armored humanoid with a train in place of its legs, and wield a shield in their left hands.
  *** The only significant difference is the weapon wielded in their right hands: another shield for this monster and a sword for "Night Express Knight", which is reflected by this monster having a lower [[ATK]] (500) than the latter (3000 if not using its effect).
