title: Card Trivia:Eria the Water Charmer, Gentle
wikitext: |-
  {{Navigation}}

  * This monster is a [[Link Monster|Link]] [[counterpart]] of "[[Eria the Water Charmer]]".
  ** Either this monster or "Eria the Water Charmer" appears in the artworks of "[[Charmer Quartet in Bloom]]", "[[Grand Spiritual Art - Ichirin]]", "[[Possessed Destiny]]", and "[[Spirit Charmers]]".
  * The familiar that appears in this card's artwork is similar to the ''[[wikipedia:Glaucus atlanticus|Glaucus atlanticus]]'', a species of sea slug with a blue color scheme and highly venomous appendages.
  ** The familiar in this card's artwork also appears in the artwork of "[[Eria the Water Channeler]]".
