title: Card Trivia:Denial Deity Dotan
wikitext: |-
  {{Navigation}}

  * The angelic figure in this card's artwork likely represents this monster's first listed [[Fusion Material]]: 1 [[LIGHT]] monster. Angels are often associated with the [[Fairy]] [[Type]], which is predominantly made up of LIGHT monsters.
  ** This monster's weapons likely represent its second listed Fusion Materials: 2 monsters, except on the [[field]] or in the [[Graveyard]]. Usually, this requires both Fusion Materials to be in the player's [[hand]], similar to how this monster is depicted holding two swords in its hands.
  * This monster's name is a pun on "[[wikipedia:Titan|Titan]]" (any of the pre-Olympian gods in Greek mythology) and the Japanese slang term 「同担拒否」 (''dōtankyohi'', lit. "same-role refusal"), referring to the practice among certain fans of refusing to interact with or share attention for a favorite character or idol with other fans who like the same one, often out of possessiveness or feelings of exclusivity.
  ** This concept is illustrated through this monster's effects providing a benefit when the player shares no monsters of the same name with their opponent and allowing them to banish any monsters that do.
  * This monster seems to be based on the final boss of ''Shadow of the Erdtree'', an ''[[Wikipedia:Elden Ring|Elden Ring]]'' [[Wikipedia:Downloadable content|DLC]]: Radahn, Consort of Miquella.
  ** The warrior in this card's artwork seems to be based on Radahn, as both have a muscular appearance, an unhappy expression, and wield two swords.
  ** The angelic figure in this card's artwork seems to be based on Miquella, who joins the fight when Radahn reaches a certain amount of health and holds himself onto Radahn's back.
  ** Radahn and Miquella also have a "godhood" status, similar to this monster.
