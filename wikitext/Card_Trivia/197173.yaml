title: 'Card Trivia:Number 6: Chronomaly Atlandis'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Atlandis Invitation]]".
  * "[[Number 33: Chronomaly Machu Mech]]" appears in this card's artwork.
  * The number "06" is located on this monster's chest ring.
  * This monster is based on [[wikipedia:Atlantis|Atlantis]], the fictional island nation that was mentioned in the dialogues ''[[wikipedia:Timaeus (dialogue)|Timaeus]]'' and ''[[wikipedia:Critias (dialogue)|Critias]]'' written by [[wikipedia:Plato|Plato]]. According to the dialogues, Atlantis was a highly advanced civilization that lived thousands of years before Plato's time, which was known for its impressive architecture and advanced technology. The people of Atlantis, however, became morally bankrupt, and they were punished by the Atlantean deities by sinking into the ocean along with the city over the course of a single night.
  ** This card's attack name in the Japanese version of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, "Divine Punishment", is based on how the Atlantean deities destroyed the city of Atlantis.
  ** This card's effect name, "Orichalcum Gate", is based on the [[wikipedia:Orichalcum|orichalcum]], a metal mentioned in several ancient writings, including the story of Atlantis in the ''Critias'' of Plato.
  * This card has a "[[Number C]]" [[Card evolutions|upgraded]] form: "[[Number C6: Chronomaly Chaos Atlandis]]".
  * Like most "[[Number]]" monsters below 10, this card's number matches its [[Rank]].
  * This is the first "Number" monster since "[[Number 34: Terror-Byte]]" to have a pink number.
  ** Oddly, in the ''Yu-Gi-Oh! ZEXAL'' anime, this card's number is depicted as purple when flashing.
  * This is the first monster to [[support]] the "Number" [[archetype]], as well as the first such card to be released in the ''[[OCG]]''/''[[TCG]]''.
  ** The first card to support the "Number" archetype is "[[Number Wall]]", which appeared in the ''Yu-Gi-Oh! ZEXAL'' anime earlier but was printed much later. Fittingly, both cards were used by [[Trey]].
  * This monster's neutral form resembles a volcano.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster uses an [[Xyz Material]], it absorbs it through its right hand, which it then uses to punch the opponent.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, after this card is [[Xyz Summon]]ed, the [[target]]ed "Number" monster appears next to it and its absorbed through its stomach, then turned into a miniature version of itself to fit inside the cavity.
  ** "Number 33: Chronomaly Machu Mech" appearing in this card's artwork is a reference to how Trey equipped "Machu Mech" to "Atlandis" in the latter's first appearance in {{episode|ZEXAL|048|ref}}.
  * This is the [[signature card]] of Trey in the ''Yu-Gi-Oh! ZEXAL'' anime.
