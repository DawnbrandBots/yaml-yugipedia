title: Card Trivia:Gem-Knight Master Diamond
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Absorb Fusion]]" and the second artwork of "[[Gem-Knight Fusion]]".
  * This monster is named after a [[wikipedia:Diamond|diamond]], a precious stone consisting of a clear and colorless crystalline form of pure [[Wikipedia:Carbon|carbon]].
  * This monster's title as "Master" reflects how (prior to the release of "[[Gem-Knight Lady Brilliant Diamond]]") it was the boss of the "[[Gem-Knight]]" [[archetype]], who was able to gain power through the "[[Gem-]]" monsters and utilize the abilities of the "Gem-Knight" [[Fusion Monster]]s. 
  ** Also, by [[Fusion Summon]]ing this monster, it will have at least 3200 [[ATK]], similar to the boss monsters of the "[[Vylon]]" ("[[Vylon Omega]]"), "[[Steelswarm]]" ("[[Steelswarm Hercules]]"), and "[[Gishki]]" ("[[Gishki Zielgigas]]") [[archetype]]s.
  * This monster is an evolution of "[[Gem-Knight Zirconia]]", who is subsequently an evolution of "[[Gem-Knight Crystal]]".
  ** According to the [[Duel Terminal Master Guide card storylines|''Duel Terminal Master Guide'' card storylines]], the seven 'Pyroxenes' in "Master Diamond's" sword are the 'Cores' of high-level "Gem-Knights" born from fusions that have gathered as the 'Cores' of "Zirconia". Fittingly, the faces of 7 "Gem-Knight" [[Fusion Monster]]s appear in the background of this card's artwork.
  *** Red: "[[Gem-Knight Ruby]]"
  *** Orange: "[[Gem-Knight Citrine]]"
  *** Yellow: "[[Gem-Knight Topaz]]"
  *** Green: "[[Gem-Knight Seraphinite]]"
  **** According to the [[Master Guide 5 card storylines|''Master Guide 5'' card storylines]], the 'Core' of "Seraphinite" is a separate 8th 'Pyroxene' in the possession of "[[Constellar Sombre]]", so it's impossible for the green 'Pyroxene' to belong to "Seraphinite". The green 'Pyroxene' likely belongs to "[[Daigusto Emeral]]" (the fusion of "[[Gem-Knight Emerald]]" and a "[[Gusto]]" monster), who is technically not a "Gem-Knight" Fusion Monster.
  *** Blue: "[[Gem-Knight Prismaura]]"
  *** Indigo: "[[Gem-Knight Aquamarine]]"
  *** Violet: "[[Gem-Knight Amethyst]]"
  * This monster has a [[Card evolutions|corrupted]] form: "[[Cairngorgon, Antiluminescent Knight]]".
  * This monster has a female [[counterpart]]: "[[Gem-Knight Lady Brilliant Diamond]]".
  * This monster has a [[retrained]] counterpart: "[[Gem-Knight Master Diamond Dispersion]]".
  * This is the first "Gem-Knight" Fusion Monster to require 3 [[Fusion Material]]s, which also are not specific.
