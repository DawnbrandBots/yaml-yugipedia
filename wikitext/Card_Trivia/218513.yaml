title: Card Trivia:Stardust Spark Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Final Cross]]", "[[Shifting Mirage]]", and "[[Stardust Re-Spark]]".
  * This monster is the [[Yu-Gi-Oh! 5D's (manga)|manga]], [[Duel Dragon]] and [[LIGHT]] [[counterpart]] of "[[Stardust Dragon]]".
  * This monster has two [[Card evolutions|evolved]] forms: "[[Stardust Chronicle Spark Dragon]]" and "[[Stardust Sifr Divine Dragon]]".
  * This is the [[signature card]] of [[Yusei Fudo (manga)|Yusei Fudo]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  ** This card has the same ATK (2500) as the signature cards of the other manga protagonists: [[Yugi Mutou (manga)|Yugi Mutou]]'s "[[Dark Magician (manga)|Dark Magician]]", [[Jaden Yuki (manga)|Jaden Yuki]]'s "[[Elemental Hero Terra Firma (manga)|Elemental Hero Terra Firma]]", [[Yuma Tsukumo (manga)|Yuma Tsukumo]]'s "[[No. 39: Utopia (manga)|No. 39: Utopia]]", [[Yuya Sakaki (manga)|Yuya Sakaki]]'s "[[Odd-Eyes Phantom Dragon (manga)|Odd-Eyes Phantom Dragon]]", [[Tatsuhisa Kamijo (manga)|Tatsuhisa Kamijo]]'s "[[Multistrike Dragon Dragias (manga)|Multistrike Dragon Dragias]]" and [[Yudias Velgear (manga)|Yudias Velgear]]'s "[[Galactica Oblivion (manga)|Galactica Oblivion]]".
  * In the manga, when this monster was controlled by the [[Priests of Light]], it had a dark color scheme; however, after [[Yusei Fudo (manga)|Yusei Fudo]] obtained it, it took on the lighter color scheme.
  * This is the first member of the "[[Stardust (archetype)|Stardust]]" archetype to be a [[Tuner monster]], though only in the manga.
  ** It is also the only Tuner monster of the Duel Dragon series.
