title: Card Trivia:Hydradrive Elements
wikitext: |-
  {{Navigation|mode=nongame}}

  * The six crystals at the base of this monster are colored after the corresponding [[Attribute]]s (from left to right): [[WIND]] (represented by the green crystal), [[EARTH]] (represented by the orange crystal), [[FIRE]] (represented by the red crystal), [[WATER]] (represented by the blue crystal), [[DARK]] (represented by the purple crystal), and [[LIGHT]] (represented by the yellow crystal).
