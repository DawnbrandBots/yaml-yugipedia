title: Card Trivia:Altergeist Hexstia
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Hestia|Hestia]]" and "[[wikipedia:Hexadecimal|hexadecimal]]".
  ** Hestia is the Greek goddess of the [[wikipedia:Hearth|hearth]], which is reflected in this monster's [[FIRE]] [[Attribute]] and its fiery design.
  ** A hexadecimal is a positional numeral system that represents numbers using a radix (base) of sixteen.
