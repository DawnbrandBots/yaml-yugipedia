title: Card Trivia:Performage Wing Sandwichman
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of the words "[[wikipedia:Wingman|wingman]]" and "[[wikipedia:Sandwich|sandwich]]".
  ** The wingman is the pilot of a secondary aircraft who flies alongside the primary aircraft and provides support. This is reinforced by this monster's appearance, which features a pair of wings and a uniform similar to that of the [[wikipedia:United States Air Force|United States Air Force]]. Also, this definition reflects its effect to change the [[Level]]s of all other monsters if the player controls another copy of this monster, which acts as its "wingman".
  ** A sandwich is a food item consisting of two slices of bread with meat, cheese, vegetables, or other fillings in between. The verbal definition of "sandwich" is to squeeze something in a small space between two people or objects, which reflects this monster's effect to change the Levels of all monsters between two copies of this monster. This is further demonstrated in the ''[[Yu-Gi-Oh! ARC-V]]'' anime when two copies of this monster "sandwich" the monsters between them with their shields.
  * This monster's shield features five yellow stars circling around the large red star in the center, which reflects its [[original Level]] of 5.
