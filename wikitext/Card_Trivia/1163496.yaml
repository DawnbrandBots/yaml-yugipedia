title: Card Trivia:Isyria, Deity of the Monumenthes
wikitext: |-
  {{Navigation}}

  * The offering from the artwork of "[[Offering to Isyria]]" appears in this card's second artwork.
  * This monster is an [[Card evolutions|upgraded]] [[Ritual Monster|Ritual]] form of "[[Yorishiro of Isyria]]".
  * This monster is the first Ritual Monster that can only be [[Special Summon]]ed with its respective [[Monumenthes Festival -The Isyria Seance-|Ritual Spell Card]] in ''[[Yu-Gi-Oh! Rush Duel]]''.
  * This monster's name comes from the combination of [[wikipedia:Isis|Isis]], the goddess of death and resurrection in the [[wikipedia:Ancient Egyptian religion|Ancient Egyptian religion]], and [[wikipedia:Assyria|Assyria]], name of one of the mayor ancient nations of [[wikipedia:Mesopotamia|Mesopotamian]] civilization.
  * This monster has the highest [[original DEF]] (3500) of all [[Level 4]] monsters.
