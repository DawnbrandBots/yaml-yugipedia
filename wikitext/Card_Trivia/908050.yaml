title: Card Trivia:Atrium's Wind
wikitext: |-
  {{Navigation}}

  * [[Yuro Goha]], "[[Cyber Falcon (Rush Duel)|Cyber Falcon]]", "[[Harpie Lady (Rush Duel)|Harpie Lady]]", and "[[Following World]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|SEVENS|054|ref}}, where Yuro played all three of these cards during his [[Turbo Duel#Yu-Gi-Oh! SEVENS|Turbo Rush Duel]] against [[Yuga Ohdo]].
  ** This card's additional draw requirement effect references the effect of "Following World", where it would increase the [[ATK]] of [[WIND]] [[Normal Monster]]s by 500, increasing the ATK of "Cyber Falcon" and "Harpie Lady" to 1900 and 1800 respectively, which was also used during the Duel between Yuro and Yuga.
  * This card has 3 [[Attribute]] counterparts, each corresponding to one of the [[Goha Six]]:
  ** [[WATER]], for [[Yujin Goha]]: "[[Dolphin's Treasure Chest]]"
  ** [[FIRE]], for [[Yuka Goha]]: "[[Heavy Roller]]"
  ** [[EARTH]], for [[Yuran Goha]]: "[[Telegraphed Strike]]"

