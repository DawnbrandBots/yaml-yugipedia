title: Card Trivia:Red Hypernova Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Quadruple Tuning]] form of "[[Red Dragon Archfiend]]".
  ** This monster has a [[Double Tuning]] counterpart: "[[Red Nova Dragon]]".
  ** This monster has a [[Triple Tuning]] counterpart: "[[Red Supernova Dragon]]".
  ** This monster is named after a [[wikipedia:Hypernova|hypernova]], an extremely powerful and luminous stellar explosion, much more energetic than a typical supernova. Its name is also derived from [[Red Nova]].
  * This monster is the rival [[counterpart]] of "[[Shooting Quasar Dragon]]".
  ** This monster's pose mirrors that of "Shooting Quasar Dragon".
  ** They are [[Level 12]] [[Cosmic Synchro Monster]]s with opposite [[Attribute]]s, and they are each Summoned via a further-enhanced [[Synchro Summon]]ing mechanic: Quadruple Tuning for this monster and [[Limit Over Accel Synchro]] for "Shooting Quasar Dragon". Also, this monster is Summoned using 4 [[Tuner]]s, while "Shooting Quasar Dragon" is Summoned using 4 non-Tuner monsters in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster Summons "Red Nova Dragon", while "Shooting Quasar Dragon" Summons "[[Shooting Star Dragon]]".
  ** This monster is [[Jack Atlas]]' ultimate monster in the card game, while "Shooting Quasar Dragon" is [[Yusei Fudo]]'s ultimate monster in the anime.
  * This monster also shares similarities with the retrain of "Shooting Quasar Dragon", "[[Cosmic Quasar Dragon]]".
  ** Both are [[Semi-Nomi]] Synchro Monsters that must first be Synchro Summoned Summoned by using the listed [[Synchro Material]]s.
  ** Both have a [[Quick Effect]] to banish itself and [[Synchro Summon]] another monster from [[Extra Deck]] in its place.
  ** Both are ''[[OCG]]''/''[[TCG]]''-exclusive upgraded forms of the [[ace monster]]s of main characters of the ''Yu-Gi-Oh! 5D's'' anime: Jack Atlas' "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" and Yusei Fudo's "[[Stardust Dragon (anime)|Stardust Dragon]]", respectively.
  * This monster has the same [[original ATK and DEF]] (4500/3000) as "[[Blue-Eyes Ultimate Dragon]]" (in its first ''TCG'' print) and "[[Neo Galaxy-Eyes Photon Dragon]]", which are also the upgraded forms of the [[Dragon]] ace monsters of other rivals, [[Seto Kaiba]] and [[Kite Tenjo]].
  * This monster has the highest original ATK (4500) of all Level 12 Synchro Monsters.
