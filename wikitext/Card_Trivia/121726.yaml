title: Card Trivia:Clock Knight No. 3
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Clockwork]]".
  * This monster's name, appearance, and [[original ATK and DEF]] (300/300) represent the number "3" read on a [[wikipedia:12-hour clock|12-hour clock face]].
  ** This monster also represents the hour of 3:00 on a clock face; however, its [[coin toss]] effect allows it to gain 1200 [[ATK]] when it lands on "heads" and increase its 300 ATK to 1500, referencing how 3:00 in the afternoon can be read as 15:00 in a [[wikipedia:24-hour clock|24-hour clock system]].
