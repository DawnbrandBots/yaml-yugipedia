title: Card Trivia:Skilled Red Magician
wikitext: |-
  {{Navigation}}

  * Five [[Spell Counter]]s appear in this card's artwork.
  ** Based on the design of this monster, there is likely a sixth Spell Counter on the other side of its right shoulder, albeit obscured by the angle.
  * This monster is a [[counterpart]] of "[[Skilled Blue Magician]]".
  ** Both monsters feature an [[equal ATK and DEF|equal]] [[original ATK and DEF]] with the same amount.
  ** Both monsters feature an additional effect that can [[add]] a Spell Counter on a card by [[banish]]ing itself from the [[Graveyard]].
  ** Both monsters can [[Special Summon]] a member of the [[archetype]] used by [[Yugi Muto]]/[[Yami Yugi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]. In this monster's case, it can Special Summon the two "[[Archfiend]]" monsters used by Yugi: "[[Summoned Skull]]" and "[[Archfiend of Gilfer]]", which this monster's armor resembles.
