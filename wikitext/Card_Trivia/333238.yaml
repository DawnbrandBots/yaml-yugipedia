title: Card Trivia:El Shaddoll Anoyatyllis
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a portmanteau of the word "anomaly" and the name "[[wikipedia:Lilith|Lilith]]", which is the name of a female demon or spirit from Jewish mythology.
  * This monster shares its Attribute, ATK, DEF, and Level with "[[Nekroz of Trishula]]", and is coincidentally covered in ice.
  * The artwork of "[[Void Vanishment]]" depicts "[[El Shaddoll Shekhinaga]]" and "[[Infernoid Devyaty]]" merging to form this monster.
  * The apparent destruction of this monster is depicted in the artwork of "[[Void Purification]]".
