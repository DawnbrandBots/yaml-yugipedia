title: Card Trivia:World Legacy Key
wikitext: |-
  {{Navigation}}

  * "[[Ib the World Chalice Priestess]]", "[[Mekk-Knight Blue Sky]]", "[[Mekk-Knight Red Moon]]", and "[[Mekk-Knight Green Horizon]]" appear in the artwork of this card.
  * The events depicted in this card's artwork, where "Ib" is in the custody of the "[[Mekk-Knight]]" monsters, follow those shown in the artwork of "[[World Legacy Trap Globe]]", where "Ib" is being captured by several "Mekk-Knight" monsters.
