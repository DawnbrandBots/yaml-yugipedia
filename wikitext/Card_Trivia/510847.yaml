title: Card Trivia:Gamble Angel Bunny
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on a [[wikipedia:Playboy Bunny|Playboy Bunny]].
  * This monster shares the same [[Attribute]] ([[EARTH]]), [[Level]] (4), [[original ATK and DEF]] (1200/1200), and effect with "[[Abare Ushioni]]".
  ** In ''GX Duel Memorial Album #06'', printed in ''V Jump'' March 2026, [[Masahiro Hikokubo]] explained that this wasn't a coincidence, as that monster was supposed to be used by [[Pierre]] in {{episode|GX|043|ref}}; however, its visual image was too far away or inconsistent with the character and aesthetics of Pierre, so they decided to swap out the monster.
