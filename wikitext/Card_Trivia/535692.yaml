title: Card Trivia:The Wicked Dreadroot
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Divine Evolution]]" (in its evolved form from the ''[[Yu-Gi-Oh! R]]'' manga).
  ** In the ''Yu-Gi-Oh! R'' manga, when [[The Wicked Dreadroot (manga)|this monster]] is upgraded via the effect of "[[Divine Evolution (manga)|Divine Evolution]]", its neck grows longer, its fingers become sharper and its legs transform into a serpentine body. This form is the one most commonly used for its limited appearances and card artwork in the manga, with the exception of its [[Summon]]ing in {{chapter|R|010|ref}}.
  *** While in this form, this monster is similar to the final form of "[[Diabound (manga)|Diabound]]".
  * This monster is the [[Wicked God]] counterpart of "[[Obelisk the Tormentor (original)|Obelisk the Tormentor]]".
  ** Similar to "Obelisk", this is the only Wicked God to have an [[original ATK and DEF]].
  ** This monster's effect to halve the [[ATK]]/[[DEF]] of all other monsters on the field is a reversal of "[[The God of the Obelisk]]'s" effect to gain [[∞]] ATK.
  * According to [[Yako Tenma]], this monster's name reflects the power it possesses: being fear incarnate, the root of dread; it causes all monsters to become half as strong from making them fearful.
  * This monster's French and Spanish name is mistranslated as "Deadroot" rather than "Dreadroot".
