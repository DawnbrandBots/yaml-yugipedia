title: Card Trivia:Convulsion of Nature
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts six natural disasters, each likely representing one of the six main [[Monster Card]] [[Attribute]]s.
  ** These natural disasters, from clockwise-left, depict a volcanic eruption ([[FIRE]]), a flood ([[WATER]]), a thunderstorm ([[LIGHT]]), an earthquake ([[EARTH]]), a wildfire ([[DARK]]), and a tornado ([[WIND]]).
  * This is one of several cards that allows cards to be [[face-up]] in the [[Main Deck]], the others being "[[Grave Lure]]", "[[Parasite Paracide]]", "[[Pharaoh's Treasure]]", "[[Symmetry Rorschach]]", and the anime effect of "[[Wiretap (anime)|Wiretap]]".
  ** Out of the cards mentioned above, this is the only card that allows each player to flip their [[Deck]]s over face-up.
