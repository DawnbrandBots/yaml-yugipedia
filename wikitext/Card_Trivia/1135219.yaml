title: Card Trivia:Junk Warrior Extreme
wikitext: |-
  {{Navigation}}

  [[File:Junk_Warrior_attacks_RDA.png|thumb|right|250|"[[Junk Warrior (anime)|Junk Warrior]]" attacks "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]".]]
  * This is one of the [[cover card]]s of ''[[Structure Deck: Power of Fellows]]'', and is the cover card of ''[[Structure Deck: Power of Fellows Light of Gathering Stars Pack]]''.
  ** This monster's name is a reference to ''[[Structure Deck: Synchron Extreme]]''/''[[Synchron Extreme Structure Deck]]'', which is another [[Structure Deck]] themed around [[Yusei Fudo]] and the "[[Junk]]", "[[Synchron]]", and "[[Warrior (archetype)|Warrior]]" [[archetype]]s.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Junk Warrior]]".
  ** This monster's helmet resembles Yusei's [[Turbo Duel]]ing helmet, while the small mark below its left eye references Yusei's [[criminal mark]].
  ** This monster's pose is based on a scene from {{episode|5D's|154|ref}}, where "[[Junk Warrior (anime)|Junk Warrior]]" prepares to attack "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]".
  * This monster has the highest [[original ATK]] (2900) of all "Junk" monsters.

