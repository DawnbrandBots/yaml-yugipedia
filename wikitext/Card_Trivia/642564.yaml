title: Card Trivia:Wattrain
wikitext: |-
  {{Navigation}}

  * "[[Wattcastle]]", "[[Wattgiraffe]]", "[[Wattlemur]]", and "[[Wattsquirrel]]" appear in this card's artwork.
  * The "E-01" on the front of the locomotive is a [[wikipedia:DRG locomotive classification|DRG locomotive classification]] for electric locomotives, specifically one that can travel over 90 km/h and has three driving axles.
