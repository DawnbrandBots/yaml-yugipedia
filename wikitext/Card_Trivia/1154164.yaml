title: Card Trivia:Shichi-Go-San
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to ''[[wikipedia:Shichi-Go-San|Shichi-Go-San]]'', a Japanese celebration in which children who reach the age of three are allowed to let their hair grow out, symbolizing a step towards adulthood and healthy growth.
  ** This card's effects are also a reference to this card's name, as its effects changed based on whether the [[equip]]ped monster's [[Level]] is 7 (''shichi''), 5 (''go''), or 3 (''san'').
