title: Card Trivia:Marshmallon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Beginner's Edition 1 (2011)]]''.
  * This monster appears in the artworks of "[[Card Rotator]]", "[[Double Check]]", "[[Hatsugai]]", "[[Marshmallon Glasses]]", and "[[Thousand Punisher]]".
  ** The artworks of "Card Rotator" and "Double Check" depict this monster featuring a set of very sharp teeth, which has been revealed many times in the anime.
  * This monster has two [[retrain]]ed counterparts: "[[Marshmacaron]]" and "[[Moremarshmallon]]".
