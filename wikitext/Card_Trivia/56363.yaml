title: Card Trivia:Speed Spell - Wheelie Breaker
wikitext: |-
  {{Navigation|mode=otherGame}}

  * Three copies of this card can be obtained in [[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]] ([[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator|World Championship 2009]]) for the [[wikipedia:Nintendo DS|Nintendo DS]] by linking it up with [[Yu-Gi-Oh! 5D's Wheelie Breakers]] for the [[wikipedia:Wii|Wii]].
  ** The name of this card is a reference to '''Wheelie Breakers''', a motor-racing sport using [[Duel Runner]]s which is different than [[Turbo Duel]]ing and is unique to [[Yu-Gi-Oh! 5D's Wheelie Breakers]], after which the game is named.
  * This card is the [[Speed Spell]] version of "[[Lightning Vortex]]".
  * [[Greiger]]'s Duel Runner [[The Beast]] is in the card's artwork.
  * This card can be obtained in [[Yu-Gi-Oh! 5D's Reverse of Arcadia]] by buying it from Wi-Fi for 3 points.
