title: Card Trivia:Witch of the Black Rose
wikitext: |-
  {{Navigation}}

  * This monster's name references its owner, [[Akiza Izinski]], who was also known as the "Black Rose Witch" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime (or simply the "Black Rose" in the international dubbed version of the anime).
  * This monster has a [[counterpart]]: "[[Ruddy Rose Witch]]".
  ** Both are [[Tuner monster]]s based on Akiza Izinski.
  ** Both can be used to [[Synchro Summon]] "[[Black Rose Dragon]]" or its [[Card evolutions|upgraded]] form, "[[Ruddy Rose Dragon]]".
  ** The effect of "Ruddy Rose Witch" is designed to work with this monster's ''[[OCG]]''/''[[TCG]]'' effect, which can only be [[Normal Summon]]ed, requires the player to [[control]] no cards to [[activate]] its effect, and will [[destroy]] itself the player does not [[draw]] a monster.
  * This monster appears on the loading screen in ''[[Yu-Gi-Oh! 5D's Tag Force 5]]''.
