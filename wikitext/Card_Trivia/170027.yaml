title: Card Trivia:Vylon Tesseract
wikitext: |-
  {{Navigation}}

  * This card looks slightly like a corrupted version of "[[Vylon Cube]]".
  ** As told in its name, it's based on the shape of a [[wikipedia:Tesseract|tesseract]], a four dimensional analogue of a cube.
  ** This could also be a sign that after the defeat of the [[Steelswarm]], the [[Vylon]] [[Archetype]] became corrupted and separated from their allies.
  * Similar to "[[Vylon Pentachloro]]", this card's number of claws reflect the shape on which it is based. This card's sides are rectangles or trapezoids, which means they have four points, and this monster has four claws on each limb.
  * This monster, along with "[[Vylon Stigma]]" and "[[Vylon Pentachloro]]", is a part of "[[Vylon Disigma]]".
