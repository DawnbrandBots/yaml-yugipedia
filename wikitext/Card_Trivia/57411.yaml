title: Card Trivia:Spirit Burner
wikitext: |-
  {{Navigation}}

  * "[[Asura Priest]]" appears in this card's artwork.
  * This card's name, artwork, and effect are layered puns, as "Asura Priest" is a [[Spirit monster]], a type of [[Effect Monster]] whose effect allows it to [[return]] itself to the player's [[hand]] during the [[End Phase]], which would then [[activate]] this card's "burn" damage effect.
