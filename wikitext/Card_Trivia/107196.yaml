title: Card Trivia:Machina Fortress
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Structure Deck: Machiners Command]]'' and ''[[Machina Mayhem Structure Deck]]''.
  * This monster appears in the artworks of "[[Machina Defense Perimeter]]" and "[[Machina Redeployment]]".
  * This is the first "[[Machina]]" monster to be released since ''[[Premium Pack 9]]'', which features this card's [[archetype]].
  * This card's Summoning cost is similar to that of a [[Ritual Monster]], except there is no [[Spell Card]] involved and the minimum combined [[Level]] required is one higher than that of the monster.
  * This monster has a [[Union monster|combined]] form with "[[Machina Gearframe]]" and "[[Machina Peacekeeper]]": "[[Machina Megaform]]".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Machina Citadel]]".
  * This card, "Machina Megaform", "[[Machina Irradiator]]" and "[[Machina Air Raider]]" all have a total combine stat of 4100.
  ** Coincidentally all of three card could trade themselves to bring out this card.
  ** This is also a reference to the lore as this monster was used as the basis to create "[[Machina Irradiator]]" and "[[Machina Air Raider]]".
