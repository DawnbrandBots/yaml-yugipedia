title: Card Trivia:The Agent of Creation - Venus
wikitext: |-
  {{Navigation}}

  * Three colored "[[Mystical Shine Ball]]s" appear in this card's artwork, orbiting counter-clockwise (from the viewer's perspective).
  * This monster is based on the planet [[wikipedia:Venus|Venus]], which appears in the background of this card's artwork.
  ** This monster may also be based on [[wikipedia:Venus (mythology)|Venus]], the Roman goddess of love, which serves as the namesake of the planet.
  ** This card's effect of [[Special Summon]]ing multiple copies "[[Mystical Shine Ball]]" likely references the planet Venus' ancient Greek name, ''Phosphoros'', which means "light-bringer".
  * This monster has a [[DARK]] [[retrained]] [[counterpart]], "[[The Agent of Destruction - Venus]]", who features an inverted [[original ATK and DEF]].
  ** This is likely a reference to the fact that historically, Venus was thought to be two distinct celestial bodies, the "morning star" and the "evening star", before it was discovered that they were in fact the same planet. As this monster's name references creation, it is most likely meant to represent Venus as the morning star.
  * This monster has a ''[[Rush Duel]]'' counterpart: "[[The Agent of Sanitation - Venus]]".
