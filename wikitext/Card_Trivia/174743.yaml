title: Card Trivia:Rosaria, the Stately Fallen Angel
wikitext: |-
  {{Navigation}}

  * This monster's wings are similar to those of "[[Queen Angel of Roses]]" and "[[Fallen Angel of Roses]]", all of which were used by [[Akiza Izinski (manga)|Akiza Izinski]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  ** In the ''Yu-Gi-Oh! 5D's'' manga, this card is a [[Fusion Monster]], where "[[Queen Angel of Roses (manga)|Queen Angel of Roses]]" and "[[Fallen Angel of Roses (manga)|Fallen Angel of Roses]]" were used as [[Fusion Material]].
  *** This card's ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] is based on "[[Prayer to the Evil Spirits]]", a [[Spell Card]] used by Akiza in the manga where she [[Fusion Summon|fused]] the above-mentioned cards from the [[Graveyard]] and the [[hand]] respectively to Summon this card.
  * This monster appears to be male; however, its Portuguese name features the word ''"anja"'', the feminine term for the word "angel" instead of its masculine term, "''anjo''".
