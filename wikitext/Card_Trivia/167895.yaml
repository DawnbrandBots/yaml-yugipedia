title: Card Trivia:Power Off
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Conduction Warrior Linear Magnum Plus Minus]]" appears in this card's artwork.
  * This card's [[Quick-Play Spell]] subcategory and effect references how in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], "[[Valkyrion the Magna Warrior]]" was affected by the effect of the Quick-Play Spell Card, "[[De-Fusion]]", allowing the player to [[Special Summon]] the three monsters required to Special Summon it, "[[Alpha The Magnet Warrior]]", "[[Beta The Magnet Warrior]]", and "[[Gamma The Magnet Warrior]]", from their [[Graveyard]].
