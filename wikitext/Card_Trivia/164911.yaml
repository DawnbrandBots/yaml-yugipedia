title: 'Card Trivia:Number 19: Freezadon'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Number Fortification]]" and "[[Number Karma]]".
  * The number "19" appears on the right side of this monster's chest.
  * "Number" monsters often take the form of their owners and/or their original desires. In this case, this "Number" represents its original owner, [[Chills]].
  ** This monster's name, [[WATER]] [[Attribute]], and [[Dinosaur]] [[Type]] reflects Chills' WATER Dinosaur [[Deck]].
  ** This monster's number (19) is the number "61" turned upside down, the same number as Chills' [[Tag Team]] partner, [[Scorch|Scorch's]] "Number" card, "[[Number 61: Volcasaurus]]". This, along with both monsters' inverted [[original ATK and DEF]] reflect Scorch and Chills' synergy as Tag-Team partners, despite their opposing "fire and ice" themes and offensive/defensive gameplay.
  * This is the first card in the anime with an effect that allows the player to "reload" an [[Xyz Monster|Xyz Monster's]]'s [[Xyz Material]]s.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster [[detach]]es an [[Xyz Material]], it absorbs it through its horn, then its rib cage opens up, where an orb of light appears in the center. This monster then places the orb between its claws and shoots the corb as a beam, hitting the [[target]]ed Xyz Monster and [[attach]]ing that monster's Xyz Materials that it used previously.
