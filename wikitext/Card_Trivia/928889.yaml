title: Card Trivia:Voidvelg Tyrfing
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Tyrfing|Tyrfing]], a magical sword from the [[wikipedia:Norse mythology|Norse mythological]] poem, "[[wikipedia:Hervararkviða|Hervararkviða]]", which became infamous for being a catalyst for bloodshed and death of its wielder.
  * This is the first [[Equip Spell Card]] to appear in the ''[[Yu-Gi-Oh! Rush Duel LP]]'' manga.
