title: Card Trivia:Cursed Dollhouse
wikitext: |-
  {{Navigation}}

  * The dollhouse in this card's artwork resembles the dollhouse from the first season finale of the anime ''Rozen Maiden''.
  ** This card's artwork and effect references the first season finale where Shinku recovered in a dollhouse while her arm was detached, whereas this card's effect allows a player to Special Summon 1 "[[Doll Part]]" monster from the player's Deck.
