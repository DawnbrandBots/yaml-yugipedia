title: Card Trivia:Dimension Drape
wikitext: |-
  {{Navigation}}

  * "[[D/D/D Doom King Armageddon]]" appears in this card's artwork.
  * This card's name, when written in English, uses the capital letter "D" for the first letter of both words, referencing the "[[D/D]]" [[archetype]] used by [[Reiji Akaba (manga)|Reiji Akaba]]" in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
