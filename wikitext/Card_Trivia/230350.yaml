title: Card Trivia:Valkyrian Knight
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[counterpart]] of "[[Command Knight]]"; its [[original ATK and DEF]] and first effect are the inverse of those of "Command Knight".
  ** This monster is holding "[[Divine Sword - Phoenix Blade]]" in her hands; "Command Knight" was featured in ''[[Structure Deck: Warrior's Triumph]]'', which also introduced that card
  * The activation requirement for this card's second effect is similar to that of "Divine Sword - Phoenix Blade", which also has an effect that banishes two [[Warrior]]-[[Type]] monsters as cost.
