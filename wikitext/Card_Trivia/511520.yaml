title: Card Trivia:The Wicked Avatar
wikitext: |-
  {{Navigation}}

  * This monster appears as the moon illustrated on the body of "[[Flower Cardian Zebra Grass with Moon]]" in its artwork.
  * This monster is the [[Wicked God]] counterpart to the [[Egyptian God]] card, "[[The Winged Dragon of Ra (original)|The Winged Dragon of Ra]]".
  ** This monster physically resembles "[[The Winged Dragon of Ra - Sphere Mode]]", and it can change its form as well. In contrast to "Ra" who changed into its own Battle Mode or [[The Winged Dragon of Ra - Immortal Phoenix|Phoenix Mode]], this monster changed its form to resemble a dark version of the strongest monster on the field other than itself. 
  *** During the final [[Duel]] between [[Yako Tenma]] and [[Dark Yugi (manga)|Dark Yugi]], Yako's "[[Metal Devil]]" was the strongest monster on the field due to its effect that reflected Dark Yugi and his Life Points; this monster thus took on the form of [[Yugi Mutou (manga)|Yugi Mutou]].
  *** This monster's effect to become a superior copy of another monster reflects Yako's resentment towards being seen as an inferior copy of his twin brother, [[Gekko Tenma]].
  ** In the ''[[Yu-Gi-Oh! R]]'' manga, [[The Wicked Avatar (manga)|this monster]] was referred to as a "dark sun"; its Egyptian God counterpart was referred to as "[[The Sun Dragon Ra]]".
  ** This monster's manga effect to have 1 more [[ATK]]/[[DEF]] than the strongest monster on the field is designed to counteract "The Sun Dragon Ra's" [[Point-to-Point Transfer]] effect, which allows the player to pay all but 1 [[Life Point]] to increase its ATK/DEF by the amount paid; both values were changed to 100 for their ''[[OCG]]''/''[[TCG]]'' releases.
  *** There is a further parallel between this monster and "The Winged Dragon of Ra" via their effects: This monster draws on the "strength" of other monsters on the field, with the strongest one other than this card typically under the opponent's control, while "Ra" draws on the strength of its controller and the monsters [[Tribute]]d ''from'' the field to [[Summon]] and empower it.
