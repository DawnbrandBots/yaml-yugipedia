title: Card Trivia:Amazoness Empress
wikitext: |-
  {{Navigation}}

  * This monster's hair and face are similar to those of [[Mai Valentine]], who used an "[[Amazoness]]" [[Deck]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and [[Yu-Gi-Oh! (manga)|manga]].
  * This monster is likely the successor of "[[Amazoness Queen]]".
  ** This card's name and [[Fusion Material]]s reference how an empress is recognized as the highest rank in monarchy, above a queen.
  * This monster has a younger form: "[[Amazoness Princess]]".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Amazoness Augusta]]".
