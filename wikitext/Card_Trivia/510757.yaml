title: Card Trivia:Overdrive
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Pole Position]]" and "[[Chicken Game]]".
  * This card is one of few cards whose ''[[TCG]]'' artwork features uncensored weapons.
  ** However, this monster's gun is censored in the card artwork of "Pole Position", by editing it to resemble a laser gun.
