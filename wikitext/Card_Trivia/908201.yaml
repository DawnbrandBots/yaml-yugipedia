title: Card Trivia:ZS - Utopic Sage
wikitext: |-
  {{Navigation}}

  * The end of this monster's staff is based on the front yellow hairstyle of [[ZEXAL III]].
  * This monster is a "[[ZS -]]" [[counterpart]] of "[[Number 39: Utopia]]".
  ** This monster shares the same [[Attribute]] ([[LIGHT]]), [[Rank]] (4), [[Type]] ([[Warrior]]), and [[Xyz Material]] requirement of "Utopia".
  ** This monster's [[original ATK and DEF]] (2000/2500) are the opposite of those of "Utopia" (2500/2000).
  * This is the first and currently only "ZS -" [[Xyz Monster]].
