  * This monster appears in the artworks of "[[Shaman of the Tenyi]]" and "[[Fists of the Unrivaled Tenyi]]".
  * This card's name is based on the [[wikipedia:Chakra|Chakra]] [[wikipedia:Chakra|Svadhishthana]], which is associated with water, hence this card's [[Attribute]] of [[WATER]].
