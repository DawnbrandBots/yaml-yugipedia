title: Card Trivia:Butterspy Courage
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Blue Mountain Butterspy]]" and "[[Swallowtail Butterspy]]" appear in this card's artwork.
  * This card's effect is similar to the effects of "[[Bounzer Guard]]".
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, both cards are used in a [[Tag-Team Duel]] involving [[Dextra]] and [[Nistro]] where both characters used their respective [[Trap Card]]s to protect their partner, which causes their [[Life Point]]s to be reduced to 0.
