title: Card Trivia:Ritual Beast Ambush
wikitext: |-
  {{Navigation}}

  * "[[Pilica, Descendant of Gusto]]", "[[Ritual Beast Ulti-Pettlephin]]", "[[Ritual Beast Ulti-Apelio]]", "[[Yazi, Evil of the Yang Zing]]", "[[Shaddoll Dragon]]", "[[Shaddoll Beast]]", "[[Shaddoll Falco]]" and "[[Shaddoll Hedgehog]]" appear in this card's artwork.
  ** The shadow transforming "Ritual Beast Ulti-Pettlephin" into "[[El Shaddoll Wendigo]]" also appears in the artwork of "[[Curse of the Shadow Prison]]".
  *** Ironically, despite this card's name hinting as if the "[[Ritual Beast]]" do an ambush, the artwork shows that one of them is being 'ambushed' instead.
  * This card's artwork depicts the battle between "[[Ritual Beast Ulti-Apelio]]" and "[[Yazi, Evil of the Yang Zing]]" (both have 2600 ATK), which took place above the "[[Naturia Sacred Tree]]".
