title: Card Trivia:Guardian Chimera
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Memories]]'' and ''[[Mega Pack 07]]''.
  * This monster is based on a [[wikipedia:Chimera (mythology)|chimera]], a creature in Greek mythology whose body consists of parts of different animals.
  ** Fittingly, this monster requires three monsters with different names as [[Fusion Material]]s, further referencing how the chimera's body is made up of different animal parts.
  * This monster is themed around the number 3.
  ** This monster's [[Level]] is 9, the square of the number '''3'''.
  ** This monster has an [[equal ATK and DEF|equal]] [[original ATK and DEF]] of '''3300'''.
  ** This monster requires '''three''' Fusion Materials with different names.
  *** Additionally, this monster's effects are related to the number of materials used from the [[hand]] and [[field]] to [[Fusion Summon]] it, allowing the player to [[draw]] cards equal to the number of materials used in the hand and [[destroy]] any number of the opponent's cards equal to the number of materials on the field.
  ** This monster is depicted with '''three''' main heads, although a fourth snake-like head also appears on its tail.
