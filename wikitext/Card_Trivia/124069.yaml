title: Card Trivia:Grappler of Landstar
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Landstar Forces]]".
  * This monster is based on a [[wikipedia:Commando|commando]], keeping in relation with the military unit theme of the "[[Landstar]]" [[archetype]].
  * This is the only "Landstar" monster to not feature 1200 [[DEF]].
  * Even though it has never been shown fully and clearly, it can be deduced that this was the only Normal Monster in the anime without flavor text.
