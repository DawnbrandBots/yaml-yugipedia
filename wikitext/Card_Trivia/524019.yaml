title: Card Trivia:Code Talker
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Speed Start Deck Link Edition]]''.
  * This monster appears in the artwork of "[[Link Atrocity]]".
  * This card is the first [[Link Rating|Link]]-2 "[[Code Talker (archetype)|Code Talker]]".
  ** It is also the first monster of this archetype whose [[ATK]] isn't 2300.
  * This card is a downgraded form of "[[Decode Talker]]".
  * This card has a [[LIGHT]] counterpart: "[[Code Talker Inverted]]".
  ** As its name suggests, their [[Link Arrow]]s are perpendicular to each other.
