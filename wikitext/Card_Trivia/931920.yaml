title: Card Trivia:How Did Dai Get Here?
wikitext: |-
  {{Navigation}}

  * "[[Shafu, the Wheeled Mayakashi]]", "[[Warrior Dai Grepher]]", and "[[Yuki-Musume, the Ice Mayakashi]]" appear in this card's artwork.
  * This card's ''[[TCG]]'' name is the wordplay of the phrase "How Did I Get Here?" and the character featured in the card artwork "[[Warrior Dai Grepher|Dai]]".
  ** This card's Japanese name is the wordplay on「奇々怪々」(''Kikikaikai''), which translates to "very strange, weird".
