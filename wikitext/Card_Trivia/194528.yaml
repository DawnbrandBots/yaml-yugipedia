title: Card Trivia:Constellar Virgo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Constellar Twinkle]]".
  * This monster's Japanese name is based on [[wikipedia:Spica|Spica]], the brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Virgo (constellation)|Virgo]].
  ** The constellation and the astrological symbol for [[wikipedia:Virgo (astrology)|Virgo]] (♍︎︎) appears in the background of this card's artwork, with the location of Spica denoted by the encircled star in the constellation.
  ** This monster's feminine appearance references how Virgo is also known as the "maiden" constellation.
  * This monster has a "[[Gem-Knight]]" [[Fusion]] form with "[[Gem-Knight Lazuli]]": "[[Gem-Knight Seraphinite]]".
