  * This card has a counterpart: "[[Double Shark]]".
  ** Both monsters are depicted with mirrored poses in their card artworks.
  ** Both cards' ''[[OCG]]''/''[[TCG]]'' [[Level]]-manipulation effects are the exact opposite of each other; in this card's case, it increases Levels.
