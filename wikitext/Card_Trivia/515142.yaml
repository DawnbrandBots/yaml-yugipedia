title: Card Trivia:Infernity Launcher
wikitext: |-
  {{Navigation}}

  * "[[Infernity Archfiend]]" and "[[Infernity Avenger]]" appear in this card's artwork.
  ** The design of the cannon in this card's artwork features designs similar to the design of "[[Infernity Destroyer]]".
  * This card's [[effect]] mechanics are reverse of "[[Wave-Motion Inferno]]".
  ** "Wave-Motion Inferno" has a no-[[hand]] effect on the [[field]] and a hand-clearing effect that [[activate]]s if the [[owner]] [[send]]s it to the [[Graveyard]]. This card has a hand-clearing effect on the field and a no-hand effect activated by sending it to the Graveyard.
