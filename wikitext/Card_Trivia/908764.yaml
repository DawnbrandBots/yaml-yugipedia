title: Card Trivia:Patissciel Couverture
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Concours de Cuisine (Culinary Confrontation)]]".
  * This monster's name references [[wikipedia:Couverture chocolate|couverture chocolate]], a type of chocolate used in cake decorations.
  * This card is the first ''[[TCG]]'' World Premiere card to receive a [[Starlight Rare]] print.
  * This monster is a counterpart of "[[Poissonniere de Nouvelles]]".
  ** This monster's design features angelic wings, while the design of "Poissoniere" features demonic wings.
  ** Both monsters share the same [[Attribute]] ([[DARK]]), [[Type]] ([[Fairy]]), and [[Pendulum Monster]] property.
  ** Both monsters feature an effect that place them in the [[Pendulum Zone]].
  ** Both monsters' [[original ATK and DEF]] are inverse of each other; this monster features 1700 [[ATK]]/700 [[DEF]], while "Poissoniere" features 700 ATK/1700 DEF.
  ** Both monsters are depicted having a rivalry with each other, as seen in the artwork of "Concours de Cuisine (Culinary Confrontation)".
