title: Card Trivia:Secret Six Samurai - Rihan
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Spirit Warriors]]''/''[[Spirit Warriors]]''.
  * This monster appears in the artworks of "[[Secret Skills of the Six Samurai]]" and "[[The Six Shinobi]]".
  * This monster is likely based on [[wikipedia:Hattori Hanzō|Hattori Hanzō]], a ninja that served the [[wikipedia:Tokugawa clan|Tokugawa clan]] during the [[wikipedia:Sengoku period|Sengoku period]].
