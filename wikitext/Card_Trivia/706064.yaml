title: Card Trivia:Witchcrafter Genni
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Witchcrafter Celebration‎]]", "[[Witchcrafter Confusion Confession]]", "[[Witchcrafter Unveiling]]", "[[Witchcrafter Vice-Madame]]" and "[[Witchcrafter Walpurgis‎]]".
  * "[[Witchcrafter Scroll]]" and two [[Spell Counter]] symbols (one on this monster's staff, the other emblazoned on a safe) appear in this card's artwork.
  * This monster's name is derived from "''génie''", the French word for "genius".
  * This monster has an "[[Endymion]]" [[counterpart]]: "[[Genni, the Maid of Endymion]]".
  * This monster is "[[Servant of Endymion]]" after moving to the "[[Witchcrafter]]" guild.
  ** This monster shares the same [[Attribute]] ([[WIND]]) and [[Type]] ([[Spellcaster]]), and its [[Level]] (1) and [[original ATK and DEF]] (300/500) are three times less than those of "Servant".
