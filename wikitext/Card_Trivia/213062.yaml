title: Card Trivia:Galaxy Queen's Light
wikitext: |-
  {{Navigation}}

  * "[[Number 83: Galaxy Queen]]", "[[Ironhammer the Giant]]", "[[Phoenix Beast Gairuda]]", "[[Beast-Warrior Puma]]" and "[[D.D. Esper Star Sparrow]]" appear in this card's artwork.
  * This card's artwork contains seven stars in reference to its effect.
  * This card has an anime-only counterpart, "[[Upshift]]".
  * Despite the reference to "Number 83: Galaxy Queen" in this card's name and art, this card cannot be used to summon "Galaxy Queen", nor can "Galaxy Queen" be affected by this card's effect. In fact, in the anime, it can be seen as the symbol of [[Nelson Andrews]] growing out of his mother's shadow.
