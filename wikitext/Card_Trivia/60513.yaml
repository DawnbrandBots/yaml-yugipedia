title: Card Trivia:Attack of the Cornered Rat
wikitext: |-
  {{Navigation}}

  * Multiple monsters resembling "[[Bone Mouse]]" appear in this card's artwork.
  * This card's name references the proverb "A cornered rat will bite the cat", meaning that anyone will fight back if they are desperate, which reflects this card's effect to allow the player to pay multiples of 100 [[Life Point]]s to reduce the opponent's monster's [[ATK]] by the same amount when battling their weaker [[Normal Monster]].
