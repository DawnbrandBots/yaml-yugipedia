title: Card Trivia:Fallen Angel of Roses
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Prayer to the Evil Spirits]]".
  * This monster has a counterpart: "[[Queen Angel of Roses]]".
  * This monster's appearance is based on the appearance of [[Akiza Izinski]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, who wears a similar Victorian-style outfit and a facial design resembling her mask she wears while assuming her alter-ego, the Black Rose.
  ** This monster's wings resemble those featured in the design of "[[Black Rose Dragon]]", Akiza's [[signature card]] in the anime. This monster also shares the same [[Level]] (7) and [[original ATK]] (2400) as "Black Rose Dragon".
