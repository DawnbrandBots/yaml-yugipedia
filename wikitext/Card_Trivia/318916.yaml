title: Card Trivia:Koa'ki Meiru Overload
wikitext: |-
  {{Navigation}}

  * This card has a [[monster effect]]-negating counterpart, "[[Koa'ki Meiru Guardian]]", a [[Spell Card]]-negating counterpart, "[[Koa'ki Meiru Wall]]", and a [[Trap Card]]-negating counterpart, "[[Koa'ki Meiru Sandman]]".
  ** They all have the same [[ATK]], [[DEF]], [[Attribute]], [[Type]], [[Level]], and [[maintenance cost]].
  * The core in this monster's chest is "[[Diamond Core of Koa'ki Meiru]]", as opposed to the regular "[[Iron Core of Koa'ki Meiru]]".
  * This monster might be the result of the explosion caused by "[[Core Blast]]", which also destroyed the laboratory of "[[Kozaky]]", as shown in "[[Compulsory Escape Device]]".
