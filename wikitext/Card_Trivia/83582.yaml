title: Card Trivia:Dark Simorgh
wikitext: |-
  {{Navigation}}

  * This card is the [[Dark counterpart]] of "[[Simorgh, Bird of Divinity]]".
  * This card's summoning methods are extremely similar to the members of the [[Chaos]] series, especially "[[Lightpulsar Dragon]]". The difference is that this card requires [[WIND]] monsters, instead of [[LIGHT]].
