title: Card Trivia:Silent Strider
wikitext: |-
  {{Navigation}}

  * This card is the opposite (in name, effect, [[ATK]], and [[DEF]]) of "[[Noisy Gnat]]".
  ** Both cards debuted in ''[[The Duelist Genesis]]'' and have [[wikipedia:Alliteration|alliterative]] English names.
  * This monster's appearance is a combination of a [[wikipedia:Gerridae|water strider]] and a [[wikipedia:Ninja|ninja]], using 4 [[wikipedia:Mizugumo|mizugumo]] to walk on water.
