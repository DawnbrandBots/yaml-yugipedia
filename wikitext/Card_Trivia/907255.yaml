title: Card Trivia:Sunny Forest
wikitext: |-
  {{Navigation}}

  * "[[Dream Ladybug Rainbow]]" and "[[Fancy Ladybug Pastel]]" appear in this card's artwork.
  * This card's Japanese name (お{{Ruby|天|てん}}{{Ruby|道|とう}}{{Ruby|様|さま}}の{{Ruby|森|もり}}, ''Otentōsama no Mori'') is a reference to the Japanese name of the ladybug, ''tentōmushi'', which can be translated more literally as "sunbug".
