title: Card Trivia:Sudden Thunder Swamp
wikitext: |-
  {{Navigation}}

  * "[[Swamp Mirrorer]]" appears in this card's artwork.
  ** The appearance of "Swamp Mirrorer", along with this card's name, artwork, and second effect references the "Swampman", the subject of a philosophical thought experiment introduced by [[wikipedia:Donald Davidson (philosopher)|Donald Davidson]], in which he is struck and disintegrated by a lightning bolt in a swamp, but an exact copy of Davidson, the Swampman, is created from a nearby tree and lives its life exactly as Davidson would have, indistinguishable from Davidson.
