title: Card Trivia:Gouki The Great Ogre
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[LINK VRAINS Box]]''.
  * This monster appears in the artworks of "[[Gouki Cage Match]]", "[[Gouki Face Turn]]", "[[Gouki Gameface]]", and "[[Gouki Unity]]".
  * This monster's name is based on [[wikipedia:The Great Sasuke| Masanori Murakawa]], a Japanese [[wikipedia:Professional wrestling|professional wrestler]] who is known by his ring name, "The Great Sasuke".
  * This monster has an upgraded Fusion form: "[[Gouki The Tyrant Ogre]]", from fusing with "[[Dinowrestler Chimera T Wrextle]]".
  * This is the [[signature card]] of [[George Gore]]/The Gore in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  * This monster and "[[Ningirsu the World Chalice Warrior]]" are the first [[Warrior]] [[Link Monster]]s.
