title: Card Trivia:Bystial Dis Pater
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Swordsoul Punishment]]" and "[[Tri-Brigade Roar]]".
  * "[[Dogmatika Maximus]]" → "[[Dramaturge of Despia]]" → "[[Dogmatika Alba Zoa]]" → "Bystial Dis Pater"
  ** This card is the degraded form of "Dogmatika Alba Zoa", resulting from him devouring the Level 6 "[[Bystial]]" monsters in an attempt to evolve. As a result this card's [[Level]], [[ATK]], and [[DEF]] are lower than those of "Alba Zoa".
  ** This card is named after [[wikipedia:Dīs Pater|Dīs Pater]], a Roman god of the underworld; the name means "rich father".
  ** Ironically, this card is a [[Synchro Monster]], one of the [[Extra Deck]] [[card type]]s that the "[[Dogmatika]]" archetype counters.
