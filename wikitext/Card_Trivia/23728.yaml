title: Card Trivia:Piri Reis Map
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Piri Reis map|Piri Reis map]], a famous pre-modern world map created by 16th century Ottoman-Turkish admiral and cartographer Piri Reis.
  ** The map depicts part of the western coasts of Europe and North Africa with reasonable accuracy, and the coast of Brazil is also easily recognizable. Various Atlantic islands including the Azores and Canary Islands are also depicted, as is the mythical island of Antillia. The map is noteworthy for its depiction of a southern landmass that some controversially claim is evidence for early awareness of the existence of Antarctica.
  * This card's effect [[add]]ing a monster with 0 ATK to the [[hand]] is likely a reference to the fact that "Reis" is similar to "Rei" (零), the Japanese word for "zero".
