title: Card Trivia:Y-Dragon Head
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Advent of Union]]''.
  * This monster appears in the artworks of "[[Union Hangar]]", "[[Union Scramble]]", and "[[XYZ Combine]]".
  * This card appears in the original anime artwork of "[[Montage Dragon]]".
  * This monster has a [[retrain]]ed counterpart: "[[Y-Yare Head]]".
  * In the French release of ''[[Duelist Pack: Chazz Princeton]]'', this card is missing the name of the [[equip]]ped monster in its effect.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|253|ref}}, specifically from the panel showing [[Y-Dragon Head (manga)|this monster]] being Summoned.
