title: Card Trivia:Ojamandala
wikitext: |-
  {{Navigation|mode=othergame}}

  * "[[Ojama Black]]", "[[Ojama Green]]", and "[[Ojama Yellow]]" appear in this card's artwork.
  * This card is based on a [[wikipedia:Mandala|mandala]], a geometric configuration of symbols used for religious purposes, including Buddhism and Hinduism.
  ** This card's effect to [[Special Summon]] the three original "[[Ojama]]" monsters from the [[Graveyard]] (which are depicted as figures on the mandala) reflects how Buddhism and Hinduism are religions centered around the belief of death, rebirth, and reincarnation..
  * This is the first card released in ''[[Yu-Gi-Oh! Duel Links]]'' that has not been released in the ''[[OCG]]''/''[[TCG]]''.
