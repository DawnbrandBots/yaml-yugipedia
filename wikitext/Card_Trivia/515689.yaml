  {{Navigation}}

  * This monster appears in the artwork of "[[Mamemaki]]".
  * The kanji 「植」 (''Ue'') on this monster's sword translates to "plant".
  * This card has two [[Rush Duel]] [[counterpart]]s: "[[Baked Bean Soldier]]" and "[[Bean Soljersey]]".
