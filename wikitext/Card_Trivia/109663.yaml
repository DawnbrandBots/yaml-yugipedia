title: Card Trivia:YZ-Tank Dragon
wikitext: |-
  {{Navigation}}

  [[File:Interdimensional_Matter_Transporter_used_on_XYZ-Dragon_Cannon.png|thumb|right|250|"[[XYZ-Dragon Cannon (manga)|XYZ-Dragon Cannon]]" being teleported by "[[Interdimensional Matter Transporter (manga)|Interdimensional Matter Transporter]]".]]

  * This is the only member of the [[A-to-Z]] [[series]]' "XYZ" [[Fusion Monster]]s to not feature the word "Cannon" in its name.
  * This monster's [[original ATK]] (2100) is equal to the [[ATK]] of "[[Y-Dragon Head]]" (1500) increased by 600 while [[equip]]ped with "[[Z-Metal Tank]]".
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh! Duelist|196|ref}}, specifically from the panel showing "[[XYZ-Dragon Cannon (manga)|XYZ-Dragon Cannon]]" being teleported by "[[Interdimensional Matter Transporter (manga)|Interdimensional Matter Transporter]]", albeit with "[[X-Head Cannon]]" being excluded and other minor detailing changes.

