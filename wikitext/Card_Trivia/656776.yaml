title: Card Trivia:Shiny Black "C" Squadder
wikitext: |-
  {{Navigation}}

  * This card's name and appearance are a reference to the ''[[wikipedia:Super Sentai|Super Sentai]]'' series, which often has costumed heroes fighting giant monsters.
  * The "giants" mentioned in this card's [[lore]] may also refer to humans such as the man that appears in the artworks of other "[["C"]]" [[Monster Card]]s, including "[[Flying "C"]]" (which demonstrates their "hidden flying abilities").
