title: Card Trivia:Delta Reactor
wikitext: |-
  {{Navigation}}

  * "[[Flying Fortress SKY FIRE]]", "[[Spell Reactor・RE]]", "[[Summon Reactor・SK]]", and "[[Trap Reactor・Y FI]]" appear in this card's artwork.
  * This card's name references a [[wikipedia:Delta formation|delta formation]], a flight pattern used by military air forces where multiple flying objects will come together in the shape of the letter "V" in order to fly more efficiently.
  ** The definition of the delta formation is reflected in this card's artwork, which depicts the three "[[Reactor]]" monsters positioned in a "V"-shaped formation. This is reinforced by the fact that the monsters are styled after [[wikipedia:World War II|World War II]] fighter and bombardment aircraft.
  ** The delta formation is derived from the Greek letter "delta", where its uppercase form resembles the shape of a triangle (Δ). The triangle is a polygon consisting of three different points and lines to form the shape, reflecting this card's effect to [[Special Summon]] "Flying Fortress SKY FIRE", which is the combined form of the three required "Reactor" monsters.
  * This card's effect to Special Summon "Flying Fortress SKY FIRE" has been incorporated into the ''[[OCG]]''/''[[TCG]]'' effect of "Summon Reactor・SK".
