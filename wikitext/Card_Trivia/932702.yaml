title: Card Trivia:Eternal Galactica Oblivion
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Oblivion of the Flash]]''.
  * This monster appears in the artworks of "[[Eternal Mirage]]" and "[[Galactica Providence]]".
  * This monster is an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form of "[[Galactica Oblivion]]".
  * This monster has an [[OuTerverSe (series)|OuTerverSe]] counterpart: "[[OuTerverSe Endless Doom Oblivion]]".
  * This monster has a rival [[Voidvelg]] counterpart: "[[Eternum Voidvelg Requiem]]".
  * This is the last Fusion Monster to be [[Fusion Summon]]ed, as well as the last monster [[Special Summoned]] from the [[Extra Deck]], in the ''[[Yu-Gi-Oh! GO RUSH!! (manga)|Yu-Gi-Oh! GO RUSH!!]]'' manga.
