title: Card Trivia:ZW - Asura Strike
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Asura|asura]], a type of demonic being in [[wikipedia:Indian religions|Indian religions]] who are sometimes depicted as humanoid creatures with three pairs of arms, while its weapon form is based on [[wikipedia:Gauntlet (glove)|gauntlet]], a type of glove that protects the hands and wrist of a combatant.
  ** Fittingly, "[[Number C39: Utopia Ray]]" appears in the background of this card's artwork [[equip]]ped with this monster's gauntlet form, in which it is depicted with an extra pairs of arms to match the common depiction of the asura and its three pairs of arms. This also befits this monster's base Japanese name, "Asura Extra Arms" (阿修羅副腕, ''Ashura Fukuwan'').
