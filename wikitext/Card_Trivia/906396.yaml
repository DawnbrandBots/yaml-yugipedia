title: Card Trivia:Gaia the Fierce Knight Origin
wikitext: |-
  {{Navigation}}

  * This monster appears to be the base form of "[[Gaia the Magical Knight]]":
  ** Both are similar in appearance; however, this monster lacks a cape, its horse has a smaller [[wikipedia:Barding|chanfron]], and its lance is less fancier.
  ** This monster's [[Battle Phase]] effect works well with the effect of "[[Gaia the Magical Knight of Dragons]]", who is visually a [[Fusion Monster|Fusion]] of "Gaia the Magical Knight" and "[[Curse of Dragon, the Cursed Dragon]]".
