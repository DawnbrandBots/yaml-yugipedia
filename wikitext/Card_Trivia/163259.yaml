title: Card Trivia:Giant Flea
wikitext: |-
  {{Navigation}}

  * In the German ''[[TCG]]'', this monster's name is "Riesenfliege", meaning "Giant Fly".
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|66|ref}}, specifically from the one-page panel showing [[Giant Flea (manga)|this monster]] prepared to attack, albeit with its pose rotated to be completely upright.
