title: Card Trivia:Branded in Red
wikitext: |-
  {{Navigation}}

  * "[[Aluber the Jester of Despia]]" (with the wings of "[[Masquerade the Blazing Dragon]]") appears in this card's artwork.
  ** This card's artwork likely depicts "Aluber" transforming into "Masquerade the Blazing Dragon".
  * The kanji ''Aka'' ({{Ruby|赫|あか}}, "Red") in this card's name is the same as ''Kaku'' ({{Ruby|赫|かく}}, lit. "bright") in the Japanese name of "[[Masquerade the Blazing Dragon]]".
  * This card has a [[counterpart]]: "[[Branded in White]]".
  ** Both depict "Fallen of Albaz"/"Aluber the Jester of Despia" in their card artworks.
  ** Both are [[Spell Card]]s that can [[Fusion Summon]] an [[Card evolutions|enpowered]] [[Fusion Monster|Fusion]] form of their respective monster: "Masquerade the Blazing Dragon" for this card and "[[Albion the Branded Dragon]]" for "Branded in White".
  ** Both represent opposite '[[Branded|Stigmata]]' marks' powers.
