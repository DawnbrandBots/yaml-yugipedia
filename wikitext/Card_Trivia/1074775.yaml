title: Card Trivia:Majesty of the White Dragons
wikitext: |-
  {{Navigation}}

  [[File:DMx001 Triple Blue-Eyes.png|thumb|right|250|[[Yami Yugi]] facing the three "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragons]]".]]

  * "[[Blue-Eyes Alternative White Dragon]]" and two "[[Blue-Eyes White Dragon]]s" appear in this card's artwork.
  ** This card's artwork references the [[Duel]] between [[Seto Kaiba (manga)|Seto Kaiba]] and [[Diva]] in the ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'' movie, where Kaiba [[control]]led the three aforementioned monsters.
  *** This card's artwork may also be a reference to a scene from {{episode|Yu-Gi-Oh!|001|ref}} where [[Yami Yugi]] is facing [[Seto Kaiba]]'s three "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragons]]".
  *** This card's second effect can be used to [[Ritual Summon]] "[[Blue-Eyes Chaos MAX Dragon]]" from the player's [[hand]] by [[Tributing]] of "Blue-Eyes White Dragons" from the player's hand or on the [[field]]. "[[Blue-Eyes Chaos MAX Dragon (anime)|Blue-Eyes Chaos MAX Dragon]]" also appeared in ''Yu-Gi-Oh! The Dark Side of Dimensions'', and it is based on "[[Obelisk the Tormentor]]", which was [[Tribute Summon]]ed in the aforementioned Duel by using exactly the three monsters depicted in this card's artwork.
  * This card's name is based on "[[Majesty with Eyes of Blue]]".
