title: Card Trivia:Burning Soul (card)
wikitext: |-
  {{Navigation}}

  * The [[Legendary Signer]] appears in this card's artwork.
  * This card references [[Blazing Soul]], a power used by [[Jack Atlas]] and the Legendary Signer in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which is also known as "Burning Soul" in the original Japanese version.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "[[Red Nova Dragon (anime)|Red Nova Dragon]]" in the anime, and the power used by Jack Atlas to seal away the demon [[Red Nova]] and transform "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" into "Red Nova Dragon".
  ** This card's artwork references a scene in ''Yu-Gi-Oh! 5D's'' episode 113: "[[Yu-Gi-Oh! 5D's - Episode 113|Burning, Seething Soul! Scar-Red Nova Dragon]]" where [[Greiger]] narrates the Legendary Signer who battled the demon, [[Red Nova]]. The Legendary Signer reached for the left side of his chest where the [[Mark of the Dragon|Mark of the]] [[Crimson Dragon]] was formed, pulled out a burning flame, and threw it at Red Nova to seal it away.
