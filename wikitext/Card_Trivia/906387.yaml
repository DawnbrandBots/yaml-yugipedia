title: Card Trivia:Vampire Fascinator
wikitext: |-
  {{Navigation}}

  * According to this monster's concept art, she is actually a creature that preys on [[vampire]]s by luring them into sucking her blood, which lets her take their power for herself and turn them into her own familiars.
  * This monster has the same kind of furry ears as "[[Vampire Sucker]]", another "Vampire" [[Link Monster]].
  ** Their bat familiars also have the same fluffy, round bodies.
