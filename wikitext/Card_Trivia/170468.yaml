title: Card Trivia:Masked HERO Goka
wikitext: |-
  {{Navigation}}

  * This monster is based on the archetypal red Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[FIRE]], which is represented by a red-colored circle.
  * This is the first "[[HERO]]" monster to include kanji in its Japanese name.
  * This is the first monster Summoned by a [[Transformation Summon]] in the ''Yu-Gi-Oh! GX'' [[Yu-Gi-Oh! GX (manga)|manga]].
