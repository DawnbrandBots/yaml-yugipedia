title: Card Trivia:Zefraxa, Flame Beast of the Nekroz
wikitext: |-
  {{Navigation}}

  * This is the first "[[Nekroz]]" [[Pendulum Monster]].
  ** It is also the first "Nekroz" monster to have an [[Attribute]] other than [[WATER]], followed by the [[LIGHT]]-Attribute "[[Nekroz of Sophia]]" and "[[Nekroz of Metaltron]]".
  * This monster is the "[[Zefra]]" version of "[[Exa, Enforcer of the Nekroz]]".
  * This monster has the same orange sphere as "[[Qliphort Helix]]" and "[[Infernoid Attondel]]".
  * This monster appears in the artwork of "[[Chosen of Zefra]]".
  * This monster bears resemblance to "[[Flamvell Grunika]]".
