title: Card Trivia:Maha Vailo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Custom Pack 01]]''.
  * This monster appears in the artwork of "[[Immortal Homeostasis]]".
  * This monster is named after [[wikipedia:Vairocana|Mahāvairocana]], a cosmic Buddha and the embodiment of the Buddhist concept of emptiness.
  * This monster has a [[retrained]] counterpart: "[[Maha Vailo, Light of the Heavens]]".
  * This monster has a ''[[Rush Duel]]'' [[Shaman Bandit]] counterpart: "[[Mahavaio the Melody Maker]]".
