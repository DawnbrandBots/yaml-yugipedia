title: Card Trivia:Majespecter Orthrus - Nue
wikitext: |-
  {{Navigation}}

  * This monster's name and serpentine tail are based on [[wikipedia:Orthrus|Orthrus]], a two-headed dog with a snake head for a tail in [[wikipedia:Greek mythology|Greek mythology]].
  ** This monster's name and appearance are based on the [[wikipedia:Nue|Nue]], a chimerical ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore whose body consists of the head of a monkey, the limbs of a tiger, the body of a Japanese raccoon dog, and a snake head for a tail.
