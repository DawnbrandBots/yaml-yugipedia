title: Card Trivia:Master Pendulum, the Dracoslayer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amorphous Persona]]", "[[Draco Face-Off]]" and "[[Forge of the True Dracos]]".
  * This monster is the [[LIGHT]] counterpart of "[[Lector Pendulum, the Dracoverlord]]".
  ** Both cards are [[Pendulum Monster]]s who share the same [[Level]] (4), [[Type]] ([[Dragon]]), and [[original ATK and DEF]] (1950/0).
