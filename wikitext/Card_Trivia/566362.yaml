title: Card Trivia:Orcust Harp Horror
wikitext: |-
  {{Navigation}}

  * The cathedral-like insides of "[[Orcustrion]]" seem to provide the background for this card's artwork.
  * This monster appears in the artwork of "[[Orcustrated Einsatz]]".
  * This card's Japanese name is a play on ''[[wikipedia:Divertimento|Divertimento]]'' and ''[[wikipedia:Devil|devil]]''.
