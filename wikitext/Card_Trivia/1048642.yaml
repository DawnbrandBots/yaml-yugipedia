title: Card Trivia:Mansion of the Dreadful Dolls
wikitext: |-
  {{Navigation}}

  [[File:VetrixFamilyHideout.png|thumb|The [[Vetrix Family]]'s hideout.]]

  * "[[Gimmick Puppet Dreary Doll]]", "[[Gimmick Puppet Egg Head]]", and "[[Gimmick Puppet Humpty Dumpty]]" appear in this card's artwork.
  ** Interestingly, "Dreary Doll" lacks blood stains on her bandages and dress, like how she is depicted in her censored ''[[TCG]]''/Korean artwork.
  * The base kanji 「地獄人」 (''Jigoku Ningyō'', lit. "Hell Dolls") in this card's Japanese name is based on the kanji subtitle used in the Japanese title of {{episode|ZEXAL|114|ref}}: ''Duelists of Sorrow - The Gimmick Puppets' Rumble of Darkness!!'' (悲哀なる決闘者 「地獄人形」冥動！！)
  * This mansion is based on the hideout used by the [[Vetrix Family]] where they held [[Hart Tenjo]] prisoner in {{episode|ZEXAL|041|ref}}.
  * This card shares some similarities characteristics with "[[Xyz Colosseum]]", another [[Field Spell Card]] which was used by [[Quattro]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** Both cards encourage the opponent to utilize their [[Xyz Monster]]s in order to bypass their restrictions, which sets the player up for the destruction and damaging effect of "[[Number 15: Gimmick Puppet Giant Grinder]]".
  ** This was shown in {{episode|ZEXAL|033|ref}}, during the [[Battle Royal]] between [[Caswell Francis]], [[Bronk Stone]], and Quattro. Caswell and Bronk [[Xyz Summon]]ed "[[Antidote Nurse (anime)|Antidote Nurse]]" and "[[Tin Archduke (anime)|Tin Archduke]]" respectively in order to bypass the second effect of "Xyz Colosseum", which prevents non-Xyz Monsters from attacking. This led to both monsters being [[destroy]]ed by Quattro's "[[Number 15: Gimmick Puppet Giant Grinder (anime)|Number 15: Gimmick Puppet Giant Grinder]]" on the following turn.
