title: Card Trivia:Uraby
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Lost World]]".
  * This card's Japanese name is a transliteration of "wild raptor".
  ** This monster lacks the sharp sickle-shaped toe claw seen on usual ''[[wikipedia:Dromaeosauridae|Dromaeosauridae]]''; however, there have been discoveries of "raptors" without the toe claw, including ''[[wikipedia:Sinraptor|Sinraptor]]'' and ''[[wikipedia:Fukuiraptor|Fukuiraptor]]''.
  * This card has a [[recolored counterpart]]: "[[Trakodon]]".
  ** Trakodon's artwork is based on [[Uraby (manga)|this card]]'s manga artwork.
  * In the ''[[Yu-Gi-Oh! Dungeon Dice Monsters]]'' video games, this monster is a [[Level 2]] [[Beast]] monster.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|079|ref}}, specifically from the panel showing [[Uraby (manga)|this monster]] being Summoned.
