title: Card Trivia:Bottomless Trap Hole
wikitext: |-
  {{Navigation}}

  * The goblin that appears in the artworks of "[[Adhesion Trap Hole]]", "[[D.D. Trap Hole]]", "[[Floodgate Trap Hole]]", "[[Giant Trap Hole]]", "[[Treacherous Trap Hole]]", and "[[Traptrix Trap Hole Nightmare]]" appears in this card's artwork.
  * This card's Japanese name, "Pitfall of Naraka", is a reference to [[wikipedia:Naraka|Naraka]], the realm of hell in Hinduism, Buddhism and other traditions.
