title: Card Trivia:One for One
wikitext: |-
  {{Navigation}}

  * "[[Samsara Lotus]]" and "[[Scarr, Scout of Dark World]]" appear in this card's artwork.
  ** "[[Quillbolt Hedgehog]]" and "[[Sonic Chick]]" appear in this card's second artwork.
  *** This card's second artwork is based on a scene from {{episode|5D's|028|ref}}, in which [[Yusei Fudo]] uses this card to [[send]] "[[Quillbolt Hedgehog (anime)|Quillbolt Hedgehog]]" from the [[hand]] to the [[Graveyard]] to [[Special Summon]] "[[Sonic Chick (anime)|Sonic Chick]]" from his [[hand]].
  * This card's name reflects its [[cost]] of sending one monster from the hand to the Graveyard to Special Summon a [[Level 1]] monster.
  * This card has a [[counterpart]]: "[[One by One]]", which has a parallel artwork and effect.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - One for One]]".
