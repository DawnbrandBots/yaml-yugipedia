title: Card Trivia:Voici la Carte (Today's Menu)
wikitext: |-
  {{Navigation}}

  * "[[Poissonniere de Nouvelles]]" appears in this card's artwork.
  * This card's name, artwork, and effect are based on the concept of being shown a restaurant's menu.
  ** The user (assuming the role of either a waiter or manager) effectively offers "daily specials" to the opponent (assuming the role of a customer) in the form of "[[Nouvelles]]" monsters to be [[Adds from Deck to hand|searched]], then assigns the corresponding chef (those being the ones featured in "[[Recette de Poisson (Fish Recipe)]]" and "[[Recette de Viande (Meat Recipe)]]") with the task of preparing the order for the customer.
  ** This similarity is shared with the card "[[Gunkan Suship Catch-of-the-Day]]".
  * The "[[Recipe]]" [[Ritual Spell]] searched with the corresponding Monster [[Type]] by this card implies that the [[Beast-Warrior]] "[[Nouvelles]]" [[Ritual Monster]]s are all fish dishes, and the [[Warrior]] ones meat dishes.
  ** By this logic and to avoid confusion, both "[[Poeltis de Nouvelles]]" and "[[Balameuniere de Nouvelles]]" feature fish fillets rather than poultry breasts or cuts of beef/venison.
  * This card's effect can be seen as an archetype-specific version of "[[Pre-Preparation of Rites]]", with the types of cards added from the [[Deck]] and [[Graveyard]] respectively to the hand being reversed.
