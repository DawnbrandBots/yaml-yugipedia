title: Card Trivia:Alien Infiltrator
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Alien Vader", is likely a pun on the word "invader", referencing the [[wikipedia:Alien invasion|alien invasion]] trope commonly featured in science fiction.
  ** This monster's Japanese name also likely references the ''[[wikipedia:Star Wars|Star Wars]]'' villain, [[wikipedia:Darth Vader|Darth Vader]], whose mask and helmet are similar to the design of this monster's head.
