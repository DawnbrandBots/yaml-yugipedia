title: Card Trivia:Borrelshroud Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Burst Protocol]]''.
  * This monster's name is based on a [[wikipedia:Barrel shroud|barrel shroud]], an external covering enveloping the barrel of a firearm that prevents the user from unwanted direct contact with the barrel.
  * This monster is an upgraded [[Link-5]] form of "[[Borreload Dragon]]" .
  * This monster is the rival "[[Borrel]]" [[counterpart]] of "[[Firewall Dragon Darkfluid]]", along with "[[Borrelend Dragon]]".
  ** This monster's wings are similar to those of "Darkfluid".
