title: Card Trivia:Magnet Bonding
wikitext: |-
  {{Navigation}}

  * "[[Magnet Warrior Sigma Minus]]" and "[[Magnet Warrior Sigma Plus]]" appear in this card's artwork.
  ** This card's artwork depicts the two "[[Magnet Warrior]]" monsters combining to form "[[Tellusion the Magna Warrior]]".
  * This card's name is a reference to the two [[archetype]]s primarily used by [[Bastion Misawa]] in the ''[[Yu-Gi-Oh! GX]]'' anime, "[[Magnet]]" (which he used for his [[EARTH]] [[Deck]]) and "[[Bonding]]" (which he used for his [[WATER]] Deck).
