title: Card Trivia:Nanana
wikitext: |-
  {{Navigation}}

  * This card is based on Nanana the Banana, the mascot of [[wikipedia:TV Tokyo|TV Tokyo]].
  ** Nanana's name is a play on "banana" and 七 ''nana'' ("seven" in Japanese).
  * [[Yuya Sakaki]] appears in this card's ''OCG'' artwork.
  * Nanana the Banana appears in the artwork of "[[Kumamon]]".
  * This card was released celebrate the 50th anniversary of TV Tokyo, which went on air in 1964, 50 years before ARC-V started.
  * This card was the first [[Action Card]] to receive an ''OCG'' release.
  ** However, this card was released in the ''OCG'' before it debuted in the ''ARC-V'' anime.
