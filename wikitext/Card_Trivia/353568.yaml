title: Card Trivia:Mystery Shell Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ryu-Ge Realm - Wyrm Winds]]".
  * This monster is based on the ''[[wikipedia:Glaucus atlanticus|Glaucus atlanticus]]'', commonly known as the "blue dragon".
  ** Fittingly, this is a [[Wyrm]] monster, which is a [[Type]] associated to [[Dragon]].
  ** This monster's flavor text notes its ability to deliver paralyzing stings, which is a reference to the venomous nematocysts the ''Glaucus atlanticus'' uses to sting its victims.
