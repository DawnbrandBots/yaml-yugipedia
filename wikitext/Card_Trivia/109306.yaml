title: Card Trivia:Fleur Synchron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Dilemma]]".
  * "Fleur" in this card's name is the French word for "flower".
  ** However, this monster has a mechanical appearance: its arms and legs are made of flexible metal, and there are [[wikipedia:Rivet|rivets]] along the edges of its [[wikipedia:Bud|bud]]-like body.
  * This card has an undead [[counterpart]], [[Card evolutions|combined]] with "[[Necro Fleur]]": "[[Necro Synchron]]".
  * This card is the only "[[Synchron]]" [[Tuner monster]] that appeared in the ''[[Yu-Gi-Oh! 5D's]]'' anime to not be used by [[Yusei Fudo]].
  ** Fittingly, unlike "[[Junk Synchron (anime)|Junk Synchron]]" (Yusei's main "Synchron" monster), that can [[Summon]] a [[Level]] 2 or lower monster from the [[Graveyard]] in order to [[Synchro Summon]] a [[Synchro Monster]], this card can Summon a Level 2 or lower monster from the [[hand]] after a Synchro Summon.
