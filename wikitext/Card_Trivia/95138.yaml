title: Card Trivia:Sun Dragon Inti
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Inti|Inti]], the god of the [[wikipedia:Sun|Sun]] in [[wikipedia:Inca mythology|Inca mythology]].
  * This monster is the [[LIGHT]] [[counterpart]] of "[[Moon Dragon Quilla]]".
  ** Both are named after the deities of the Sun and [[wikipedia:Moon|Moon]] in Inca mythology.
  ** Both are depicted with opposite color schemes and poses in their card artworks.
  ** Both monsters' [[Special Summon]]ing effects resemble the cycle of the Sun and the Moon.
  ** This monster's effect inflicts damage, while the effect of "Quilla" increases [[Life Points]].
  ** This monster was a [[Synchro Monster]], while "Quilla" was a [[Dark Synchro Monster]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
