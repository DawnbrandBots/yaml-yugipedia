title: Card Trivia:Fiend Castle
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Toon World]]" appears in this card's artwork, in which this card is a page.
  * The castle in this card's artwork appears in the artwork of "[[Toon Page-Flip]]".
  * This card is the [[Fiend]] [[counterpart]] of "[[Shine Palace]]", which is also a page from "Toon World".
  * The scene in which this card appeared in {{chapter|Yu-Gi-Oh!|127|ref}} is used as the first ''[[OCG]]''/''[[TCG]]'' artwork for "Toon World". It is also used as this card's artwork in ''[[Yu-Gi-Oh! The Duelists of the Roses]]''.
