title: Card Trivia:Destruct Potion
wikitext: |-
  {{Navigation}}

  *  "[[Dark King of the Abyss]]" and "[[Revived King Ha Des]]" appear in this card's artwork.
  ** "[[Demotion]]" > "[[Abyssal Designator]]" > "[[Herald of the Abyss]]" > "[[Hate Buster]]" > "[[Mind Drain]]" (presumably "[[Skill Drain]]" and "[[Soul Drain]]" as well)  > "[[Skill Prisoner]]" > '''"Destruct Potion"''' > "[[Fake Life]]" > "[[Call of the Archfiend]]" > "[[Reject Reborn]]" > "[[Powerful Rebirth]]" > "[[Dark Ruler No More]]"
  ** This card's artwork depicts the aftermath of the events in the artwork of "Hate Buster": after "[[Dark Ruler Ha Des]]" became "Revived King Ha Des", he absorbs the power of "Dark King of the Abyss" that was likely stolen from him "Soul Drain". These events are succeeded by "Fake Life".
