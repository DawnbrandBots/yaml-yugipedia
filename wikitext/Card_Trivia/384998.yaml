  * The chrysalis of an unknown "[[Chrysalis]]" monster appears in this card's artwork.
  * This card's name and effect of [[send]]ing all "Chrysalis" monsters the player [[control]]s to the [[Graveyard]] to [[Special Summon]] a monster from the player's [[hand]] or [[Deck]] whose name is written in the card text of those cards are a reference to making contact with alien life.
