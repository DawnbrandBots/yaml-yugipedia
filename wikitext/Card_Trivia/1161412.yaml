title: Card Trivia:Superdreadnought Rail Cannon Gustav Rocket
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed counterpart of "[[Superdreadnought Rail Cannon Gustav Max]]".
  ** This monster's name and appearance are a combination of "Gustav Max" and "[[Rocket Arrow Express]]".
  *** Four copies of "Rocket Arrow Express" serve as this monster's railcars, while the shattered glass-like substance is similar to that from the artwork of "Rocket Arrow Express"; also, this monster shares the same [[original ATK]] (5000) as "Rocket Arrow Express".
