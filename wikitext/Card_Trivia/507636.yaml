title: Card Trivia:Array of Revealing Light
wikitext: |-
  {{Navigation}}

  * "[[Warrior Dai Grepher]]" appears in this card's artwork.
  ** The seal in this card's artwork also appears on the hand of "[[Ryu Senshi]]", suggesting it was used by "Dai Grepher" to [[Fusion Monster|fuse]] himself with "[[Spirit Ryu]]" into "Ryu Senshi".
