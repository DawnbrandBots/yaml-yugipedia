title: Card Trivia:Majesty of the Sevens Road
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Accel Road of the Attack]]''.
  * Like "[[Master of the Sevens Road]]", this card's artwork features each of the cross-shaped symbols that appears in the artworks of the seven main [[Sevens Road]] monsters ("[[Sevens Road Magician|Magician]]", "[[Sevens Road Witch|Witch]]", "[[Sevens Road Warlock|Warlock]]", "[[Sevens Road Sorcerer|Sorcerer]]", "[[Sevens Road Enchanter|Enchanter]]", "[[Sevens Road Mage|Mage]]", and "[[Sevens Road Wiz|Wiz]]").
  ** The seven colored rings hanging off of this monster's belt also match the colors of the seven main Sevens Road monsters, in descending order by Level, except that the cyan ring representing "Enchanter" is moved to the top above "Magician".
