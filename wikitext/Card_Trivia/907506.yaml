title: Card Trivia:Transam Linac - Fight for the Light!
wikitext: |-
  {{Navigation}}

  * This monster is the [[signature move]] [[counterpart]] of "[[Transam Linac]]".
  ** This monster is named after "War To Zen!" (ウォー・トゥ・ゼン！ ''Wō Tu Zen!''), a common phrase used before the [[Attack and effect names in Yu-Gi-Oh! GO RUSH!!|attack names]] of [[Yudias Velgear]]'s monsters in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, such as the one of "[[Transam Linac (anime)|Transam Linac]]": "War To Zen! [[Maniac You Die]]!" (ウォー・トゥ・ゼン！マニアック・ユウ・ダイ！ ''Wō Tu Zen! Maniakku Yuu Dai!'').
