title: Card Trivia:Speed Spell - Speed Jammer
wikitext: |-
  {{Navigation|mode=otherGame}}

  * The [[Duel Runner]] in this card's artwork is one used by [[Sector Security]] in [[Yu-Gi-Oh! 5D's]].
  * The seal of "[[Magic Jammer]]" appears under the [[Duel Runner]].
  * This card is a special conception for "[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]".
