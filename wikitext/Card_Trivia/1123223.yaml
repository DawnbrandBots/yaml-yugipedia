title: Card Trivia:Maiden in Love
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are based on the [[Spell]]/[[Trap Card]]s used alongside [[Maiden in Love (anime)|this monster]] in {{episode|GX|020|ref}}.
  ** This monster's first ''OCG''/''TCG'' effect to force the opponent's monsters to attack it is based on the effect of the [[Continuous Trap Card]], "[[Defense Maiden (anime)|Defense Maiden]]", which changes the [[target]] of the opponent's monster's attack to this monster.
  ** This monster's ''OCG''/''TCG'' bulleted effect to take [[control]] of the opponent's monster with a [[Maiden Counter]] at the end of the [[Damage Step]] is based on the effect of the [[Equip Spell Card]], "[[Cupid's Kiss (anime)|Cupid's Kiss]]", which was [[equip]]ped to this monster and allowed the player to take control of the opponent's monster with a Maiden Counter after it battles the [[equip]]ped monster and inflicts [[battle damage]] at the end of the Damage Step.
