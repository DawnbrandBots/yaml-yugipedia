title: Card Trivia:3-Hump Lacooda
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Big March of Animals]]".
  * "Lacooda" is the English spelling of "''rakuda''" (ラクダ), the Japanese word for "camel"; however, this card's Japanese name is spelled "''Rakūda''" (ラクーダ), indicating that this card's unusual English name may be intentional, similar to "[[Des Lacooda]]".
