title: Card Trivia:Ante
wikitext: |-
  {{Navigation}}

  * The hand in this card's artwork also appears in the artwork of "[[Old Mind]]".
  * The card "[[Skull Servant]]" appears in this card's artwork.
  ** The arm in this card's artwork also appears in the artworks of "[[BIG Win!?]]" and "[[Old Mind]]", as indicated by the same-colored sleeves and the presence of the card "Skull Servant" in those artworks as well.
  * This is the only card that can treat non-[[Monster Card]]s as a [[Level 0]] monster by its own effect ("[[Phantasmal Lord Ultimitl Bishbaalkin]]" and "[[Ultimaya Tzolkin]]" are both printed as Level 0 monsters; however they are both treated as [[Level 12]] by the game ruling).
