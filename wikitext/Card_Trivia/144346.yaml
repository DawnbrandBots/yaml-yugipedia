title: Card Trivia:Meklord Emperor Granel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Attack Cannon]]", "[[Infinity Barrage]]", and "[[Meklord Assembly]]".
  * This monster has a "[[Meklord Army]]" [[counterpart]]: "[[Meklord Army of Granel]]"
  * This monster's ''[[OCG]]''/''[[TCG]]'' appearance is based on the appearance the five "[[Granel]]" monsters take when on field together the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's [[Special Summon]]ing effect is based on how in the anime, the main components of this monster are intended to be [[Special Summon]]ed all at once by the effect of "[[Grand Core]]".
  *** However, this is the only "[[Meklord Emperor]]" monster to not have a printed [[ATK]] equal to the combined total ATK of all the other base "Granel" monsters, which would have added up to '''3000'''. It is, however, the only "Meklord Emperor" monster to gain variable ATK equal to the player's [[Life Points]].
  ** This monster's additional effect to Special Summon [[Synchro Monster]]s [[equip]]ped to it is based on the anime effects of "[[Granel Attack (anime)|Granel Attack]]", "[[Granel Guard (anime)|Granel Guard]]", and their [[Granel Attack 3|upgraded]] [[Granel Guard 3|versions]], which both treated a Synchro Monster equipped to this monster as a monster for attacking or defending, though temporarily.
  *** This is the only "Meklord Emperor" monster that still allows the player's other monsters to attack.
  * This is the [[signature card]] of [[Jakob]] in the ''Yu-Gi-Oh! 5D's'' anime.
  ** This monster appears to be the largest-sized member of the "[[Meklord Emperor]]s", reflecting how Jakob is the largest member of the [[Three Pure Nobles]].
  * This is the first "Meklord Emperor" monster in the anime to be featured in a computer-generated imagery style, in contrast to "Wisel" and "Skiel" being shown in the traditional artwork style.
  * The three "Meklord Emperors" likely represent the concept of the mind, body, and spirit, with this monster representing the body, as well as the earth. This is reflected in this monster's [[EARTH]] [[Attribute]], as well as its humanoid appearance.
