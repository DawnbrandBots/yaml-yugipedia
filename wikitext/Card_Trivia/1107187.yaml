title: Card Trivia:Newsflash the Journalistic Juggernaut
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Major Breaking News!]]".
  * This first portion of this monster's Japanese title, "Journalistic Warship" (報道艦, ''Hōdōkan'') is a portmanteau of the Japanese words for "press officer" (報道官, ''Hōdō-kan'') and "warship" (艦, ''kan'').
  ** The second portion of this monster's Japanese title, "Rumbling Armored" (''Gōgai'') is a wordplay on the Japanese word for "extra" (号外, ''gōgai''), which is short for [[wikipedia:Newspaper extra|newspaper extra]], a special issue of a newspaper issued outside the normal publishing schedule to report on important or sensational news.
  * This monster's design is based on the ''[[wikipedia:Shachihoko|Shachihoko]]'', a sea monster in [[wikipedia:Japanese folklore|Japanese folklore]] that is depicted with the head of a lion and the body of a black-scaled carp, which is used as ornaments to adorn the roofs of Japanese temples and castles.
