title: Card Trivia:Light and Dark
wikitext: |-
  {{Navigation|mode=DuelLinks}}

  * This [[Skill]]'s name and release with [[Lumis and Umbra (Duel Links)|Lumis and Umbra]] in ''[[Yu-Gi-Oh! Duel Links]]'' are based on how [[Lumis]] and [[Umbra]] are each named after light and dark, respectively (whose respective Japanese names are "Mask of Light" and "Mask of Darkness"). Also, the [[Attribute]]s of the monsters that both characters use are primarily [[LIGHT]] and [[DARK]].
  ** This Skill's release with [[Dark Signer Rex Goodwin]] is based on how [[Rex Goodwin]] wielded the marks of the [[Crimson Dragon]] and the [[Dark Signer]], allowing him to wield the powers of light and darkness. Also, Rex's gameplay primarily revolves around the usage of the LIGHT Attribute "[[Sun Dragon Inti]]" and the DARK Attribute "[[Moon Dragon Quilla]]".
