title: Card Trivia:Dedicated Curse of Dragon
wikitext: |-
  {{Navigation}}

  * The object in the artwork of "[[Chaos Ceremonial Object]]" appears in this card's artwork.
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Curse of Dragon (Rush Duel)|Curse of Dragon]]".
  ** This monster references a scene in {{episode|Yu-Gi-Oh!|45|ref}}, where "[[Curse of Dragon (anime)|Curse of Dragon]]" was offered with "[[Black Luster Ritual (anime)|Black Luster Ritual]]" as part of the [[Tribute]] to [[Ritual Summon]] "[[Black Luster Soldier (anime)|Black Luster Soldier]]".
