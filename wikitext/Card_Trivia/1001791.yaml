title: Card Trivia:Vaalmonica Intonare
wikitext: |-
  {{Navigation}}

  * "[[Angello Vaalmonica]]" and the angelic glass goblet and glass harmonica from the artwork of "[[Vaalmonica, the Agathokakological Voice]]" appear in this card's artwork.
  * This card's name is based on ''intonare'', the Italian word for "harmonize".
