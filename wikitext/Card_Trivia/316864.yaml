title: Card Trivia:D/D Savant Kepler
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Johannes Kepler|Johannes Kepler]].
  ** This is further expressed in the design of the card, which features several orbs racing along on tracks. Kepler postulated the current model of the [[wikipedia:Solar System|Solar System]] that we know today, which was later proven by [[wikipedia:Galileo Galilei|Galileo Galilei]].
  * This card is a polar opposite to "[[D/D Savant Galilei]]" in terms of its Level, [[Pendulum Scale]] and [[Pendulum Effect]].
  ** In the anime, the Pendulum Scale-decreasing effect of this card is explained by this card being an unstable [[Pendulum Monster]] prototype.
