title: Card Trivia:Zerato, Angel of the Sanctuary
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Crossroads of Zera]]".
  * This monster is a [[retrained]] ''[[Rush Duel]]'' [[Ritual Monster|Ritual]] counterpart of "[[Archlord Zerato]]".
  ** This monster's title references "[[The Sanctuary in the Sky]]". Fittingly, this monster's effect to [[send]] a monster from the [[hand]] to the [[Graveyard]] and [[destroy]] a monster is based on the effect of "Archlord Zerato", which can only be applied while "The Sanctuary in the Sky" is [[face-up]] on the player's [[field]].
