title: Card Trivia:Deep Sea Diva
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Deep Sea Aria]]" and "[[Deep Sea Repetiteur]]".
  * This card's German name, "Tiefseetaucher", is a mistranslation, as it means "Deep Sea Diver".
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form: "[[Deep Sea Prima Donna]]".
  * This card was the first [[Sea Serpent]] [[Tuner monster]].
