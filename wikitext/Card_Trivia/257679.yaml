title: Card Trivia:Do a Barrel Roll
wikitext: |-
  {{Navigation}}

  * "[[Mecha Phantom Beast Stealthray]]" and "[[Mecha Phantom Beast Blackfalcon]]" appear in this card's artwork.
  * A [[wikipedia:Barrel roll|barrel roll]] is an aerial maneuver in which an airplane makes a complete rotation on its longitudinal axis while following a helical path, approximately maintaining its original direction. It is sometimes described as "a combination of a loop and a roll."
  ** A barrel roll is also commonly used to avoid enemy fire.
  * The English name of this card is a reference to the Star Fox 64 quote, "Press L or R twice to do a barrel roll!" which when shortened to "Do a barrel roll!" is a very popular Internet meme. In spite of this, the characters in Star Fox actually preform an [[wikipedia:Aileron roll|aileron roll]] when using the button commands from the quote.
