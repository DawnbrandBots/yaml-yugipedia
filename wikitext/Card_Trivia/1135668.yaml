title: Card Trivia:DoomZ XII Zero - Drastea
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[DoomZ Command "D.O.O.M.D.U.R.G."]]" and "[[DoomZ Command "A.D.R.A.S.T.E.I.A."]]" (in a fully mechanical remodeled form).
  * The originally introduced "[[Power Patron DoomZ]]" appears in this card's artwork, perched on this monster's left shoulder.
  * This monster has an upgraded [[Xyz Monster|Xyz]] form, fully empowered by the originally introduced, green energy/lightning-wielding "Power Patron DoomZ": "[[DoomZ XII End - Drastrius]]".
  ** Both are named after [[wikipedia:Adrastea (moon)|Adrastea]], one of the moons orbiting the planet [[wikipedia:Jupiter|Jupiter]].
  * This monster has a combined form with "[[Artmage Graflare]]": "[[DoomZ XIII Over - Graflareio]]".
  * This monster's name has the [[wikipedia:Roman numerals|Roman number]] "ⅩⅡ" (12) in its name, but the furigana reading as "Zero" (0) instead is a reference to the twelve-hour clock showing the time of midnight (12:00) of the [[wikipedia:Doomsday Clock|Doomsday Clock]].
  * This monster is heavily hinted and implied, through related card artworks and [https://ygorganization.com/doom-z-lore-intro/ supplementary] [https://ygorganization.com/reference-art-doom-z-monsters/ material], to be the older brother of "[[Artmage Graflare]]". Their relationship was confirmed in ''Valuable Book EX6''.
  ** Both monsters have similar facial features.
  ** Both monsters mirror each other in their single long horns on either side of their head and a short horn on the other, contrasting other "[[DoomZ]]" monsters who have two symmetrical horns on both sides of their heads.
