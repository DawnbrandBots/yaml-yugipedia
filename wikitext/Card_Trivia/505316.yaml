title: Card Trivia:Sand Gambler
wikitext: |-
  {{Navigation}}

  * This monster appears in the card artwork of "[[BIG Win!?]]".
  * This monster has a [[counterpart]]: "[[Gambler of Legend]]".
  ** Both cards [[Spellcaster]] monsters with a similar pose and [[coin toss]] effect.
  ** The background of this card's artwork is similar to that of the artwork of "Sand Gambler".
  * This monster is depicting tossing three coins, reflecting its effect to toss a coin three times.
  * The odds of getting the favorable and/or unfavorable result from this card's effect are only 1 in 8.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster is the spitting image of its user, [[Pierre the Gambler]].
  * According to the ''Master Guide 2'', this monster was voted the hottest male monster in a poll taken by females.
