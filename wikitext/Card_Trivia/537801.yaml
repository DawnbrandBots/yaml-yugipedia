title: Card Trivia:The Trojan Horse
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Trojan Blast]]".
  * '''[[wikipedia:The Trojan Horse|The Trojan Horse]]''' is part of the myth of the Trojan War. The Greeks gave a large wooden horse to the Trojans as a gesture of surrender, but unbeknownst to the Trojans, the horse was hollow and filled with Greek soldiers. When the horse was brought into Troy, the Greeks waited until night and attacked the city. This card's [[effect]] references this, as it can be used as multiple [[Monster Card|monsters]] for a [[Tribute]].
  * This is the only one of the six [[Attribute]]-specific monsters which can be [[treated as multiple Tributes]] that does not share its [[ATK]] and [[DEF]] with another of the six ("[[Double Coston]]" and "[[Kaiser Sea Horse]]" have 1700 ATK and 1650 DEF, while "[[Flame Ruler]]", "[[Unshaven Angler]]", and "[[Whirlwind Prodigy]]" have 1500 ATK and 1600 DEF).
