title: Card Trivia:Rebound
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a game of [[wikipedia:Basketball|Basketball]], played with a blue "[[Sheep Token]]" as the ball.
  ** In basketball, "[[wikipedia:Rebound (basketball)|Rebound]]" refers to when the player manages to collect the ball after a missed goal, this card's artwork depicted such situation.
  *** This card's effect is also based on this term, as it negate the opponent from "scoring" (bouncing a card back to your hand) and turning it into an advantage by discarding opponent's card.
  ** It seems that it's the "[[Goblin Attack Force]]" playing.
  * This is one of a few cards which activates an effect when [[destroy]]ed while [[set]].
