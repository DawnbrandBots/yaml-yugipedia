title: Card Trivia:Nekroz of Valkyrus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Stellarnova Bonds]]" and "[[Void Apocalypse]]".
  * This card is "[[Great Sorcerer of the Nekroz]]" wearing armor based on "[[Fabled Valkyrus]]".
  ** This monster shares the [[Level]], [[ATK]] and [[DEF]] as the aforementioned monster, as well as a similar effect dealing with [[Drawing a card|Drawing]] by sacrificing monsters.
  ** "[[Great Sorcerer of the Nekroz]]" appears younger in this card's artwork. It is unknown if this is because the power of the monster this armor is based off of is having an effect on his body, or possibly the ritual that turned him into this monster revitalized him.
  * "[[Nekroz Mirror]]" appears in this card's artwork, but worn on his chest instead of on his staff like in his previous form.
