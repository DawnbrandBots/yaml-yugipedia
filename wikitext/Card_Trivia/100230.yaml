title: Card Trivia:Shadow Delver
wikitext: |-
  {{Navigation}}

  * The shadow connected to the figure on "Shadow Delver" resembles [[Zorc Necrophades]].
  * The figure on "Shadow Delver" also resembles [[Aknadin]], while he is corrupted by Zorc Necrophades.
  * If this card was really inspired by Aknadin, before it was Gemini Summoned, he was the "normal" Aknadin. But, after has been Gemini Summoned, he became the "corrupted" Aknadin.
