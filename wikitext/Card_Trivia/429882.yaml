  * This card derives its name from [[wikipedia:Pikaia|Pikaia]], a genus of extinct [[wikipedia:Cambrian|Cambrian]] animal found as [[wikipedia:fossil|fossils]] in the [[wikipedia:Burgess Shale|Burgess Shale Formation]] in the [[wikipedia:Canadian Rockies|Canadian Rockies]] of [[wikipedia:British Columbia|British Columbia]], [[wikipedia:Canada|Canada]].
