title: Card Trivia:Hushed Psychic Cleric
wikitext: |-
  {{Navigation}}

  * This card is a [[Psychic]] counterpart of "[[Sage of Stillness]]", just as "[[Serene Psychic Witch]]" is a counterpart of "[[Sage of Silence]]".
  ** This card is also related to "[[Silent Psychic Wizard]]" and "[[Serene Psychic Witch]]".
