  * Although not released in Japan, ''[[The Valuable Book 9]]'', ''[[Yu-Gi-Oh! GX Tag Force]]'', and the Master Guide list the name as 「メテオ・ザ・マッチレス」, or "Meteo the Matchless".
  * This card resembles [[wikipedia:Abomination (comics)|The Abomination]] from Marvel Comics.
