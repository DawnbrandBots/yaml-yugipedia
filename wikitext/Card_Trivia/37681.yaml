title: Card Trivia:Cyber Shark
wikitext: |-
  {{Navigation}}

  * This monster's name and design are likely based on Cybershark, a character from the ''[[wikipedia:Transformers: Beast Wars|Beast Wars]]'' line of ''[[wikipedia:Transformers|Transformers]]'' toy franchise who takes on the form of a shark.
  * This monster shares similarities with "[[Cyber Dragon]]".
  ** Both share the same [[Level]] (5) and [[original ATK and DEF]] (2100/2000).
  ** Both feature an effect that allows them to be easily [[Summon]]ed from the [[hand]].
