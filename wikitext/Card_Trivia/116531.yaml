title: Card Trivia:Genex Ally Triarm
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Charge of the Genex!!]]''.
  * This monster's name uses the prefix "tri-", which is commonly associated with the number "3", which reflects this monster's triple-barreled blaster weapon and its effect listing three specific [[Attribute]]s.
  * This monster is a polar opposite [[counterpart]] of "[[Genex Ally Triforce]]":
  ** Both feature opposite color schemes; this monster's armor is black, while "Triforce's" armor is white.
  ** Both wear their blaster weapons on opposite arms; this monster wears it on its left arm, while "Triforce" wears it on its right arm.
  ** Both have different effects that depend on opposite Attributes; this monster uses the [[WIND]], [[WATER]], and [[DARK]] Attributes, while "Triforce" uses the [[EARTH]], [[FIRE]] and [[LIGHT]] Attributes.
