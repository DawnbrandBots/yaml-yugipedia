title: Card Trivia:Cyberse Magician
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Cybernetic Horizon]]''.
  ** This is the first [[Ritual Monster]] to be a cover card for [[Core Booster]] set series since "[[Relinquished]]" in ''[[Spell Ruler]]'', and the first cover card of a Core Booster set series that cannot be in the [[Extra Deck]] since "[[Galaxy-Eyes Photon Dragon]]" in ''[[Photon Shockwave]]''.
  * This is the first [[Cyberse]] Ritual Monster, as well as the first Ritual Monster to be [[Ritual Summon]]ed in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** It is also the first Ritual Monster to be used by the [[Yusaku Fujiki|protagonist]] of a spin-off series.
  * This monster has a [[retrained]] counterpart: "[[Cyberse Code Magician]]".
  * This monster shares several similarities to "[[Cyberse Clock Dragon]]" and "[[Cyberse Quantum Dragon]]".
  ** "Cyberse Clock Dragon"
  *** Both have an effect that allows them to gain a minimum of 1000 [[ATK]].
  *** Both have an effect that can [[add]] a card type ([[Monster Card|Monster]] and [[Spell Card|Spell]], respectively) from the [[Deck]] to the [[hand]] when they are sent to the [[Graveyard]] by an opponent's card effect.
  ** "Cyberse Quantum Dragon"
  *** Both have an effect that [[activate]]s when they battle an opponent's monster.
  ** "Cyberse Clock Dragon" and "Cyberse Quantum Dragon"
  *** They are the first Cyberse monsters of their respective monster card types (Ritual, [[Fusion Monster|Fusion]] and [[Synchro Monster|Synchro]], respectively).
  *** They all share the same [[Attribute]] ([[DARK]]), [[Level]] (7), [[Type]] (Cyberse), and [[original ATK and DEF]] (2500/2000).
  *** They all have an effect that protects the player's other monsters from being targeted by an opponent's attack or card effect while a [[Link Monster]] is also on their field.
  * This monster's [[Attack and effect names in Yu-Gi-Oh! VRAINS|attack name]], "Cyber Magic Attack" ("Cyberse Magic" in the Japanese version), is a reference to the attack name of "[[Dark Magician (anime)|Dark Magician]]" ("Black Magician" in the Japanese version): "Dark Magic Attack" ("Black Magic" in the Japanese version).
