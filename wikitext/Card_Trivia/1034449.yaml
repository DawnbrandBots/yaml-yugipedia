title: Card Trivia:Flowering Etoile the Melodious Magnificat
wikitext: |-
  {{Navigation}}

  * Visually, this monster is based on [[Zuzu Boyle]], who used the "[[Melodious]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's dress is decorated with the flowers of the [[wikipedia:Yuzu|yuzu]] plant, the namesake of the Japanese name of Zuzu ({{Ruby|柚|ゆ}}{{Ruby|子|ず}} ''Yuzu'').
  ** This monster is also wearing a double-banded bracelet connected at the intersection by a gem, referencing [[Zuzu's bracelet]].
  * This monster is named after ''[[wikipedia:Danseur étoile|danseuse étoile]]'' ("star dancer"), a title given to the highest ranked dancer at the [[wikipedia:Paris Opera Ballet|Paris Opera Ballet]]. The term ''étoile'' ("star") had been used to designate the best soloists of the Paris Opera Ballet since the 19th century, but it was only in 1940 that it was codified as the title at the top of the company's hierarchy.
  ** The stars decorating this monster's clothing appear to be a reference to both the title ''étoile'' ("star") and the five-petaled flowers of the yuzu plant.
