title: Card Trivia:Door to Mirrorland
wikitext: |-
  {{Navigation}}

  * "[[Eshila the Lovely Bisque Doll]]" appears in this card's artwork.
  * This card and its owner, [[Alice]] is a reference of the book ''Through the Looking Glass and What Alice Found There'', where Alice, the protagonist of ''Alice in Wonderland'' returns to Wonderland in which she assumes the role of a pawn on the white side of a chess game.
  ** Given that the chess-side is white and "Eshila's" image is dark in this card's artwork, this card's artwork and effect is not only a reference to Alice in ''Through the Looking Glass'' entering the mirror world, but also represents its owner's "reflective" transitioning from bitter to sweet.
