title: Card Trivia:Ambush Token
wikitext: |-
  {{Navigation}}

  * This [[Token]] appears in the artwork of "[[Back Attack Ambush]]".
  * This Token is based on a [[wikipedia:Tumbleweed|tumbleweed]], a dried plant that is detached from its roots above ground and rolls with the force of the wind.
  ** In pop-culture, tumbleweeds are used as a trope in Western films and TV shows, where they are often seen rolling across the scenery. Fittingly, this card debuted during the [[Satisfaction Town|Crash Town]] arc in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which features elements of the Western genre.
