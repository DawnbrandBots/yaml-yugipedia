title: Card Trivia:Rumbling of Heaven and Earth
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name ({{name|Rumbling of Heaven and Earth|ja}}, ''{{romanized name|Rumbling of Heaven and Earth|ja}}'') is derived from a passage of [[Jack Atlas]]'s [[Synchro Summon]]ing [[Summon chants in Yu-Gi-Oh! 5D's#Jack Atlas|chant]] for "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime: ''Bear witness to its creation-shaking power!'' (天地鳴動の力を見るがいい！ '''''Tenchi meidō''' no chikara wo miru ga ī!'')
