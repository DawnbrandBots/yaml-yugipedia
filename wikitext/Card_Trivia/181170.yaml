title: Card Trivia:Evolzar Solda
wikitext: |-
  {{Navigation}}

  * This card's name could be interpreted as ''[[wikipedia:Sordes|Sordes]]'', a pterosaur whose name means "hairy devil".
  * This card has the highest Rank and [[ATK]] among the "[[Evolzar]]" monsters; on the other hand, it also has the lowest [[DEF]].
  * This card is shown in the artwork of "[[Xyz Wrath]]" and "[[Xyz Discharge]]".
