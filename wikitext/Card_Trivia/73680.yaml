title: Card Trivia:Illegal Summon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's artwork and effect is a reference to the character [[wikipedia:Jiraiya|Jiraiya]] from ''The Legend of the Gallant Jiraiya'', as well as the adapted character from fellow Shonen Jump manga series ''Naruto''. In both stories, Jiraiya is a ninja with toad-based powers, including the ability to summon toads.
