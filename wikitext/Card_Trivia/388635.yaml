title: Card Trivia:Omega Summon
wikitext: |-
  {{Navigation}}

  * Clockwise from the top-right: "[[Invoked Purgatrio]]", "[[Invoked Caliga]]", "[[Invoked Raidjin]]", and "[[Invoked Magellanica]]" appear in this card's artwork.
  * "[[wikipedia:The Beast (Revelation)|To Mega Therion]]" in this card's Japanese and Korean names (Greek for "The Great Beast") is one of [[wikipedia:Aleister Crowley|Aleister Crowley]]'s [[wikipedia:Magical motto|magical mottoes]].
  ** "[[Invoked Magistus Omega]]" ("Invoked Beast Magistus Therion" in that card's Chinese, Japanese and Korean names) has a name derived from the same motto.
  * This card could be considered an advanced [[counterpart]] of "[[Alpha Summon]]", as "Alpha Summon" can only Summon a single opposing banished monster, with the drawback of needing to give the opponent one of the user's banished monsters in exchange, while this card has no such drawbacks or caveats and can Summon as many of the user's banished "[[Invoked]]" monsters as possible.
