title: Card Trivia:Constellar Algiedi
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Alpha2 Capricorni|Al Giedi Secunda]], a triple star system located in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Capricorn (constellation)|Capricorn]].
  ** The constellation and the astrological symbol for [[wikipedia:Capricorn (astrology)|Capricorn]] (♑︎︎) appears in the background of this card's artwork, with the location of Al Giedi Secunda denoted by the encircled star in the constellation.
  ** This monster's armor features goat-like horns on its helmet, referencing how Capricorn is also known as the "mountain goat" constellation.
  *** Also, this monster wears a cape in the shape of a fish tail, referencing how Capricorn is sometimes depicted with the upper body of a goat and the lower body of a fish.
