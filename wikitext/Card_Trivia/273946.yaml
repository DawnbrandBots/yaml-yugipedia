title: Card Trivia:Gentlemander
wikitext: |-
  {{Navigation}}

  * This monster is based on an [[wikipedia:Axolotl|axolotl]], a critically endangers species of aquatic salamander native to Mexico.
  ** This monster's Japanese name, "Gentlooper" (ジェントルーパー, ''Jentorūpā'') is a portmanteau of the words "gentleman" ( ジェントルマン, ''jentoruman'') and "wooper looper" (ウーパールーパー, ''ūpārūpā''), the Japanese term for the larval stage of an axolotl. This monster's English name is a portmanteau of the words "gentleman" and "salamander", referring to the group of amphibians to which the axolotl belongs.
