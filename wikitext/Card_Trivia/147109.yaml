title: Card Trivia:Blackwing Tamer - Obsidian Hawk Joe
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on the appearance of Native American chiefs.
  * This is the only "[[Blackwing]]" monster to not be a [[Winged Beast]] monster, being a [[Warrior]] monster instead.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|014|ref}}, specifically from the panel showing [[Blackwing Tamer - Blackhawk Joe (manga)|this monster]] being Summoned
