title: Card Trivia:Blackwing - Hillen the Tengu-wind
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Feilian|Feilian]], the Chinese god of the wind.
  ** In Japanese, the kanji compound meaning "Feilian" (飛廉) can be read as "Hillen" (ヒレン, ''Hiren'').
  ** This monster's title and appearance are based on a [[wikipedia:Tengu|tengu]], a legendary creature in [[wikipedia:Japanese mythology|Japanese mythology]] who is depicted with a humanoid avian-like appearance and wields a magic fan that can generate powerful winds, or a [[wikipedia:Khakkhara|khakkhara]] staff used by Buddhist monks.
  * This monster has the highest [[original DEF]] (2300) of all non-[[Synchro]] "[[Blackwing]]" monsters.
