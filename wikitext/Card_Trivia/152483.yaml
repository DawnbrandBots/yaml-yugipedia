title: Card Trivia:Jormungardr the Nordic Serpent
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Jörmungandr|Jörmungandr]], the sea serpent child of [[wikipedia:Loki|Loki]] and [[wikipedia:Angrboða|Angrboða]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** This monster's ''[[TCG]]'' name is a corruption or mistranslation of Jörmungandr.
  ** This monster's appearance in the ''[[Yu-Gi-Oh! 5D's]]'' anime further references the folklore of Jörmungandr:
  *** This monster's effect to [[Special Summon]] itself to the opponent's [[field]] if an "[[Aesir]]" monster is on the field is based on Jörmungandr's role in [[wikipedia:Ragnarök|Ragnarök]] where he [[wikipedia:Thor|Thor]] were prophesied to slay each other, with Thor killing Jörmungandr first and then himself dying from the beast's spewing venom after taking nine steps.
  **** In {{episode|5D's|129|ref}}, [[Halldor]] uses [[Jormungardr the Nordic Serpent (anime)|this monster's]] effect to Special Summon itself to [[Yusei Fudo]]'s field in [[Defense Position]], as Halldor controls a [[face-up]] [[Divine-Beast]] monster; one of the three Divine-Beast monsters he controls is "[[Thor, Lord of the Aesir (anime)|Thor, Lord of the Aesir]]".
  *** This monster's effect to inflict 3000 damage to the [[controller]] when switched from [[Defense Position]] to [[Attack Position]] is  based on how Jörmungandr is commonly depicted wrapped around the Earth and holding its tail in its mouth, and letting go of the tail is a herald of Ragnarök.
  **** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster is depicted having its tail in its mouth when in [[Defense Position]], and it lets go when it is changed to [[Attack Position]] before using its damaging effect. In the same episode, Halldor attempted to use this effect against Yusei using the effect of "[[Fenrir the Nordic Wolf (anime)|Fenrir the Nordic Wolf]]", which switches all monsters on Yusei's field, including this monster, to Attack Position during the [[Battle Phase]].
