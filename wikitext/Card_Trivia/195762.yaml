title: Card Trivia:Stonehenge Shield
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Ancient Gear Golem]]" appears in this card's artwork.
  ** Ironically, the effect of "Ancient Gear Golem" would prevent this card's [[activate|activation]].

  * This card is based on [[wikipedia:Stonehenge|Stonehenge]], a prehistoric monument located in [[wikipedia:Salisbury Plain|Salisbury Plain]] in [[wikipedia:Wiltshire|Wiltshire]], [[wikipedia:England|England]] composed of earthworks surrounding a circular setting of large standing stones.
