title: Card Trivia:Gimmick Puppet Scarecrow
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Attack Gimmick]]".
  * This monster features an old-fashioned semi-opened/closed bear trap for a head.
  * This monster and "[[Gimmick Puppet Princess]]" are the only "[[Gimmick Puppet]]" monsters currently not released in the ''[[OCG]]''/''[[TCG]]''.
