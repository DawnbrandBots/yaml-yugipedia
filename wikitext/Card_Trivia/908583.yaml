title: Card Trivia:Kashtira Riseheart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Kashtira Preparations]]", "[[Kashtira Overlap]]", and "[[Kashtiratheosis]]".
  ** This card's artwork appears in the artwork of "[[Loka Samsara]]".
  ** This monster's appearance is obscured in the artwork of "Kashtira Preparations", most likely because this card had not yet been released at the time "Preparations" had.
  * "[[wiktionary:říše|Rise]]" in this card's name is the Czech word for "realm".
  * This monster may be based on [[wikipedia:Oda Nobunaga|Oda Nobunaga]], a Japanese feudal warlord and a famous conqueror that came close to unifying all of Japan.
  ** This is supported by how this monster is the leader of "[[Pressured Planet Wraitsoth]]", which is described as the sixth "[[Broken World]]" within the Visas storyline (as indicated in "Wraitsoth's" ''OCG'' name). This alludes to how Nobunaga was also known by the nickname ''Dairokuten Maō'' (第六天魔王, lit. "Demon King of the Sixth Heaven").
  * This card has 3 [[Heart]] [[counterpart]]s:
  ** [[DARK]] "[[Scareclaw]]": "[[Scareclaw Reichheart]]"
  ** [[WATER]] "[[Tearlaments]]": "[[Tearlaments Reinoheart]]"
  ** [[LIGHT]] "[[Mannadium]]": "[[Mannadium Riumheart]]"
  ** This card also has a LIGHT non-Heart counterpart: "[[Visas Starfrost]]"
  *** The [[ATK]] (1500) and [[DEF]] (2100) of this card are reversed with the ATK (2100) and DEF (1500) of "Visas Starfrost".
  * This monster has an upgraded [[Xyz Monster|Xyz]] form: "[[Kashtira Arise-Heart]]".

