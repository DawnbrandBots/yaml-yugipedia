title: Card Trivia:Ninjitsu Art of Mosquito Marching
wikitext: |-
  {{Navigation}}

  * "[[Mosquito Commando]]" and several "[[Mosquito Force]]s" appear in this card's artwork.
  * This card's Japanese name, "Mosquitology Ninjitsu - Army Mosquito March" (蚊学忍法・軍蚊マーチ, ''Kagaku Ninpō Āmī Mosukīto Māchi'') features the word 「文学」(''bungaku''), the Japanese word for "literature", with the first kanji 「文」 replaced with the kanji 「蚊」 meaning "mosquito".
  ** The word ''kagaku'' (蚊学) shares the same pronunciation with the Japanese word for "chemistry" (化学).
  ** This naming scheme is a reference to the 1972 anime series, ''[[wikipedia:Science Ninja Team Gatchaman|Science Ninja Team Gatchaman]]''.
  ** "Army Mosquito" is also given a kanji subtitle that reads "''gunka''" (軍蚊), making the card's name read as "''Gunka'' March". This is a reference to the [[wikipedia:Gunkan kōshinkyoku|Gunkan kōshinkyoku]], the official march of the [[wikipedia:Imperial Japanese Navy|Imperial Japanese Navy]].
