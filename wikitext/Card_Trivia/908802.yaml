title: Card Trivia:Therion Discolosseum
wikitext: |-
  {{Navigation}}

  * "[[Endless Engine Argyro System]]", "[[Springans Captain Sargas]]", and "[[Tri-Brigade Kitt]]" appear in this card's artwork.
  ** This colosseum appears in the artwork of "Endless Engine Argyro System".
  * This card's ''[[TCG]]'' name, "Discolosseum", is a portmanteau of the words "disc" and "colosseum".
  * The center of this colosseum is based on the [[wikipedia:Zodiac|Zodiac]] wheel, which the members of the "[[Therion]]" [[archetype]] are based on.
