title: Card Trivia:Mystic Box
wikitext: |-
  {{Navigation}}

  * This card's effect is based on the based on [[wikipedia:escapology|escape artistry]], which is commonly used as a magic trick that has the magician reappear somewhere else.
  ** Another magic trick-themed card used by [[Yugi Mutou (manga)|Yugi Mutou]] (and his [[Yugi Muto|anime counterpart]]), "[[Magical Hats (manga)|Magical Hats]]" (and its [[Magical Hats (anime)|anime counterpart]]), is based on the common magic trick of using hats to hide and/or make things appear and also bears the same question marks the boxes do. Both cards' effects served as the effects of "[[Dark Magician (anime DDM)|Dark Magician]]'s" ''[[Dungeon Dice Monsters]]'' version in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Mystic Box]]".
  * This card has a ''[[Rush Duel]]'' counterpart: "[[Magical Shift Box]]".
  * This card has a "[[Chaos]]" counterpart: "[[Mystic Box of Chaos]]".
  * In the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and anime, this card would hide "[[Dark Magician (manga)|Dark Magician]]" (and its [[Dark Magician (anime)|anime counterpart]]) with an opponent's monster in the boxes in this card's artwork, where one of them would be skewered by swords. The box on the opponent's [[field]] would reveal the "Dark Magician" safe and unharmed while the other box would reveal the opponent's monster or [[Monster Card]] skewered by the swords.
  ** Several times after Yugi used this card (or its ''DDM'' counterpart as the effect of "Dark Magician") to transport the "Dark Magician" to somewhere else on the field and the opponent asked how Yugi just did it, Yugi explained that "a magician never reveals his secret" as "Dark Magician" shook his finger at them.
