title: Card Trivia:Swordsoul of Taia
wikitext: |-
  {{Navigation}}

  * This card is named after "[[wikipedia:zh:泰阿|Taie]]", a traditional Chinese sword said to be wielded by [[wikipedia:Han Xin|Han Xin]], titled the King of Chu, to lead his army against a Jin invasion. It had patterns like the waves of a flowing river.
  * This monster appears in the artwork of "[[Swordsoul Emergence]]".
