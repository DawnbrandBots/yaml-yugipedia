title: Card Trivia:Armament Reincarnation
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] "[[Armament Reincarnation Token]]s" up to the number of [[Equip Spell Card]]s and [[Trap Card]]s that [[equip]] themselves to a monster in the [[Graveyard]] is a reference to its effect in the ''[[Yu-Gi-Oh! R]]'' manga, where it can Special Summon as many Equip Spell Cards and [[Equip Trap Card]]s as [[Monster Card]]s, in which they are depicted being wielded by humanoid spirits. The "Armament Reincarnation Tokens'" [[original ATK and DEF]] (500/500) is based on how those of the Equip Spells and Equip Traps when they are Special Summoned as monsters.
