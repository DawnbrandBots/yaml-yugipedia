title: Card Trivia:Kunai with Chain
wikitext: |-
  {{Navigation}}

  * This card has two [[retrain]]ed counterparts:
  ** "[[Red-Eyes]]": "[[Red-Eyes Fang with Chain]]"
  ** "[[Salamandra (archetype)|Salamandra]]": "[[Salamandra with Chain]]"
  *** Both counterparts are based on cards used by [[Joey Wheeler]] ("[[Red-Eyes Black Dragon]]" and "[[Salamandra]]") in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * Despite this card's Japanese and international names, the bladed weapon attached to the chain in this card's artwork does not resemble a boomerang or a ''[[wikipedia:Kunai|kunai]]''. The bladed weapon more closely resembles a ''[[wikipedia:Kusarigama|kusarigama]]'', a traditional Japanese weapon consisting of a sickle attached to a chain with a heavy iron weight at the end. 
  * This card's ''[[OCG]]''/''[[TCG]]'' effects are based on its appearances in the ''Yu-Gi-Oh!'' manga and anime, where it is depicted either increasing the [[equip]]ped monster's [[ATK]] by 500, wrapping itself around the opponent's attacking monster to immobilize it (or changing it to [[Defense Position]]), or both at the same time.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', ''[[Yu-Gi-Oh! The Sacred Cards]]'', ''[[Yu-Gi-Oh! Reshef of Destruction]]'' and ''[[Yu-Gi-Oh! BAM]]'', this card was a [[Spell Card]].
