title: "Card Trivia:Fairy Tale Prologue: Journey's Dawn"
wikitext: |-
  {{Navigation}}

  * This card's first ''[[OCG]]''/''[[TCG]]'' effect to allow the player to [[draw]] a card if they [[control]] a [[Level 7]] or [[Level 8|8]] [[Dragon]] [[Synchro Monster]] is based on the effect of "[[Ancient Pixie Dragon]]", which allows the player to draw one card after a [[Field Spell Card]] is [[activate]]d. Fittingly, both cards were used by [[Luna (manga)|Luna]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  ** In {{chapter|Yu-Gi-Oh! 5D's|038|ref}}, [[Leo (manga)|Leo]] and Luna used the effect of "[[Ancient Pixie Dragon (manga)|Ancient Pixie Dragon]]" to draw a card after a "[[Fairy Tale]]" Field Spell was activated by the effect of another "Fairy Tale" Field Spell. In the ''OCG''/''TCG'', this card places a Field Spell Card in the [[Field Zone]] rather than activating it, so would not trigger the effect of "Ancient Pixie Dragon" like it did in the manga.
