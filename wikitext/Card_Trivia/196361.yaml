title: Card Trivia:Doppel Token
wikitext: |-
  {{Navigation|mode=token}}

  * "Doppel" is German word for "Double".
  * Interestingly, the Japanese artwork of this Token displays its gun as blue, just like the international artwork of "[[Doppelwarrior]]", despite the fact that the Japanese artwork of "Doppelwarrior" shows a black gun.
