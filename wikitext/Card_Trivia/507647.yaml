title: Card Trivia:Skull Dog Marron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Monster Rebone]]", "[[Quarantine]]", "[[There Can Be Only One]]", "[[Wightprince]]", "[[Wightprincess]]", and "[[Wightlord]]".
  * This monster is the "skeletal" [[counterpart]] of "[[Outstanding Dog Marron]]", sitting in the same position as the aforementioned monster.
  ** This card's [[flavor text]] references the story of [[wikipedia:Hachikō|Hachikō]], a loyal [[wikipedia:Akita|Akita dog]] who awaited the return of his master long after his master died.
  * The Spanish print of this card has received several errata for the line "''Todav'''í'''a est'''á''' esperando que vuelva su amo''" ("''He's still waiting for his master to come for him''"). [[SOD]]'s version was printed as "''Todav'''i'''a est'''a''' esperando que vuelva su amo''", while [[DR3]]'s was ""''Todav'''i'''a est'''á''' esperando que vuelva su amo''".
