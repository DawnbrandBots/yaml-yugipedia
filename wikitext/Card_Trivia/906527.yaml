title: Card Trivia:Yuki-Onna, the Icicle Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ghost Meets Girl - A Masterful Mayakashi Shiranui Saga]]".
  * This monster is "[[Yuki-Onna, the Ice Mayakashi]]" wearing a more elaborate dress.
  ** "[[Yuki-Onna, the Absolute Zero Mayakashi]]" has a further ornate one and holds the double-bladed naginata of "[[Shiranui Skillsaga Supremacy]]", hinting both it and this card to be "Yuki-Onna" powering up throughout her fight with "[[Shiranui Squire]]" and "[[Yoko, the Graceful Mayakashi]]" (as depicted in the artworks of "[[Ghost Meets Girl - A Mayakashi's Manuscript]]" and "A Masterful Mayakashi Shiranui Saga").
