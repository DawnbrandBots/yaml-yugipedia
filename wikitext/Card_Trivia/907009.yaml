title: Card Trivia:Heroic Champion - Jarngreipr
wikitext: |-
  {{Navigation}}

  * This monster's name is based on ''[[wikipedia:Járngreipr|Járngreipr]]'', the iron gloves worn by [[wikipedia:Thor|Thor]], the Norse god of thunder.
  * This is the first "[[Heroic Champion]]" [[Xyz Monster]] to not be a [[Rank 4]] monster, being a [[Rank 1]] monster instead.
