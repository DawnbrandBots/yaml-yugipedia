title: Card Trivia:Odd-Eyes Fusion
wikitext: |-
  {{Navigation}}

  * "[[Odd-Eyes Pendulum Dragon]]" appears in this card's artwork
  ** This card's artwork is a parody of the original "[[Polymerization (archetype)|Fusion]]" card, "[[Polymerization]]", featuring "Odd-Eyes Pendulum Dragon" instead of the two creatures (one dragon-like and one monster-like).
  *** This card can also be considered the "[[Odd-Eyes]]" [[counterpart]] to "Polymerization".
  * This is the first card in the ''[[OCG]]''/''[[TCG]]'' that can [[Fusion Summon]] a [[Fusion Monster]] using monsters in the [[Extra Deck]] as [[Fusion Material]]s.
  ** Such a card already existed in the manga - "[[Extra Fusion]]" - however, it has not been released yet.
