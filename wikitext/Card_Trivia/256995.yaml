title: 'Card Trivia:Number C106: Giant Red Hand'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Chaos Barrier]]" and "[[Chaos Hundred Universe]]".
  * This monster is a [[Ranked-Up]] "[[Number C10X]]" form of "[[Number 106: Giant Hand]]".
  ** This monster's Japanese name, "Giant Hand Red" (ジャイアント・ハンド・レッド, ''Jaianto Hando Reddo''), is a pun on "hundred" (ハンドレッド, ''Handoreddo''), referencing how this is a "Number C10X" monster.
  ** While "Giant Hand" is based on a right hand, this monster is based on an undefined hand, having two thumbs and two index fingers.
  * This is the first [[Rock]] "[[Number C]]" monster.
  * This is the first "Number C" monster in the ''[[OCG]]''/''[[TCG]]'' to gain its additional effect when any "[[Number]]" monster is [[attach]]ed to it as [[material]], not just its base form.
  ** However, unlike the other Ranked-Up "Number C" monsters, this monster does not gain effects if it does not have a "Number" monster as [[Xyz Material]].
