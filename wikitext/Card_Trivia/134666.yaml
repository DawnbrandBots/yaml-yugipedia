title: Card Trivia:Karakuri Anatomy
wikitext: |-
  {{Navigation}}

  * This card's name and artwork are a reference to ''[[wikipedia:Kaitai Shinsho|Kaitai Shinsho]]'' (roughly meaning "New Text on Anatomy"), a medical text translated into Japanese during the [[wikipedia:Edo period|Edo period]].
  * The image on the scroll represents a circuit diagram.
