title: Card Trivia:Alchemy Beast - Ouroboros the Bronze
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's Japanese name is based on [[wikipedia:Copper|copper]], one of the seven planetary metals used in alchemy.
  ** This monster's international name is based on [[wikipedia:Bronze|bronze]], a metallic alloy that primarily consists of copper and other metals.
  * This monster is based on the [[wikipedia:Ouroboros|ouroboros]], a serpent depicted swallowing its own tail used to symbolize the eternal cycle of destruction and recreation in alchemy.
