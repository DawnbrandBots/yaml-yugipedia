title: Card Trivia:Sandaion, the Timelord
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectors Pack 2018]]''.
  * This monster is named after the Judaic archangel, [[wikipedia:Sandalphon|Sandalphon]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Sandalphon is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Malkuth|Malkuth]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Malkuth is the tenth of the ten Sefira of the Tree of Life, and this was the tenth "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** In Jewish and Christian angelology, Sandalphon is described to be a very tall angel, which is reflected in this monster's size in comparison with the other nine "Timelord" monsters in the ''Yu-Gi-Oh! 5D's'' anime.
  *** In the anime, when [[Z-one]] first Summoned this monster, it was shown to be much larger than any of the previous nine "Timelord" monsters; however, when he Summoned it for the second time (with the effect of "[[Sephylon, the Ultimate Timelord (anime)|Sephylon, the Ultimate Timelord]]"), it appeared to be the same size as the previous "Timelords".
  **** This may be because this monster has 4000 [[original ATK]] whereas the previous "Timelords'" original [[ATK]] are 0. When "Sephylon" Summoned this monster along with three other previous "Timelords", the ATK of all four Summoned "Timelords" became 4000. Since this monster already had 4000 ATK, only the other three "Timelords" gained ATK, and thus the four Summoned "Timelords" appeared to be the same size as each other.
  * This is one of only two "Timelord" monsters to not have an [[original ATK and DEF]] of 0, the other being "[[Sephylon, the Ultimate Timelord]]".
  * This monster and "Sephylon's" [[LIGHT]] [[Attribute]] reference the [[wikipedia:Aether (classical element)|aether]], the "fifth element" that makes up the region where the stars and planets exist. The other four classical elements are [[EARTH]], [[WIND]], [[FIRE]] and [[WATER]], which the other eight [[Main Deck]] "Timelords" each possess.
  * This monster, "[[Arcana Force EX - The Light Ruler]]", "[[Arcana Force EX - The Dark Ruler]]", "[[Odin, Father of the Aesir]]", and "[[Sephylon, the Ultimate Timelord]]" have the highest [[original DEF]] (4000) of all [[Fairy]] monsters in the ''[[OCG]]''/''[[TCG]]''.
