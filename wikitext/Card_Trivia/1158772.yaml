title: Card Trivia:Fiend Piece Golem
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[DARK]] [[Fiend]] [[counterpart]] of "[[Big Piece Golem]]" based on "[[Fiendish Golem]]".
  ** This monster's effect to [[Special Summon]] itself from the [[hand]] while a Fiend [[Tuner monster]] is on the [[field]] references how "[[Big Piece Golem (anime)|Big Piece Golem]]" was usually tuned with the Fiend Tuner "[[Dark Resonator (anime)|Dark Resonator]]" to [[Synchro Summon]] "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's effect to decrease its [[Level]] by up to 2 references how "[[Medium Piece Golem]]" and "[[Small Piece Golem]]" are 1 and 2 Levels lower than "Big Piece Golem" respectively.
  ** This monster's effect, which [[activate]]s after it is [[sent]] to the [[Graveyard]] when used as [[Synchro Material]] or "[[Red Dragon Archfiend]]" (or a monster that [[mentions]] it), references the fact that each time "Big Piece Golem" was Summoned in the ''Yu-Gi-Oh! 5D's'' anime, it was usually used as Synchro Material for "Red Dragon Archfiend".
