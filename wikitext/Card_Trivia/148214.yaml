title: Card Trivia:Blue Moon
wikitext: |-
  {{Navigation|mode=nongame}}

  * A "[[Homunculus Token]]" appears in this card's artwork.
  * The moon in this card's artwork appears in the artwork of "[[Demiurge Ema]]".
  * This card's name is a reference to the "[[wikipedia:Blue moon|blue moon]]", an additional full moon that appears in a subdivision of a year (i.e. two full moons in a month).
  ** This card's name also references the phrase "once in a blue moon", which is used to describe a rare event or association with magical powers. In this case, the magic power associated with the blue moon appears to be the creation of a "Homunculus Token", which is based on the [[wikipedia:homunculus|homunculus]], an artificial humanoid composed of artificial materials created in alchemy.
