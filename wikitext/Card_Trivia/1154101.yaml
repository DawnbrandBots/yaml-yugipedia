title: Card Trivia:Tip of the Tinying Tongue
wikitext: |-
  {{Navigation}}

  * "[[Tongyo]]" appears in this card's artwork.
  ** This card's second effect is based on the effect of "[[Tongyo (DOR)|Tongyo]]" in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', which causes the monster that flipped it face-up by battle to lose 500 [[ATK]].
