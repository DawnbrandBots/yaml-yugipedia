title: Card Trivia:Mayakashi Mayhem
wikitext: |-
  {{Navigation}}

  * "[[Gashadokuro, the Skeletal Mayakashi]]", "[[Tsuchigumo, the Poisonous Mayakashi]]", "[[Oboro-Guruma, the Wheeled Mayakashi]]", and "[[Tengu, the Winged Mayakashi]]" appear in this card's artwork.
  * The event depicted by this card is likely happen during or after the event in "[[Ghost Meets Girl - A Mayakashi's Manuscript]]" where "[[Yuki-Onna, the Ice Mayakashi]]" acquired "[[Shiranui Skillsaga Supremacy]]"'s weapon and [[Yuki-Onna, the Absolute Zero Mayakashi|transformed]].
