title: Card Trivia:Wheel of Prophecy
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Wheel of Fortune (Tarot card)|Wheel of Fortune]], the tenth of the [[wikipedia:Major Arcana|Major Arcana]].
  ** This card's ''[[OCG]]'' name comes from the French name of the "Wheel of Fortune", ''La Roue de Fortune''.
  * This monster appears in the artwork of "[[Spellbook of Knowledge]]".
  * Even though this monster has the appearance of a humanoid [[wikipedia:lion|lion]], this monster is still a [[Spellcaster]], not a [[Beast-Warrior]], though this is most likely to have all "[[Prophecy]]" monsters be a single Type.
  ** This monster's appearance may allude to a similar figure that oversees the Wheel of Fortune in the actual Tarot, often depicted as either a [[wikipedia:human|human]] or a [[wikipedia:Sphinx|Sphinx]]-like humanoid.
