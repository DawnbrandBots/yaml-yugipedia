title: Card Trivia:Hyper Engine Vast Vulcan (L)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vulcan Ignite Hyperdrive]]" in [[Maximum Mode]] (together with "[[Hyper Engine Vast Vulcan]]" and "[[Hyper Engine Vast Vulcan (R)|Hyper Engine Vast Vulcan [R]]]").
  * Along with "Vast Vulcan" and "Vast Vulcan [R]", this monster is named after [[wikipedia:Vulcan (mythology|Vulcan]], the god of fire, volcanoes, metalworking, and the forge in [[wikipedia:Roman mythology|Roman mythology]].
  * This monster's [[Level]] and the Level of "Vast Vulcan [R]" add up to 7, referencing the title of this monster's debut anime series, ''[[Yu-Gi-Oh! SEVENS]]''.
