title: Card Trivia:Diabolos, King of the Abyss
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Curse of Darkness]]''.
  * This monster is named after ''diabolos'' (Διάβολος), the Greek word for "devil".
  ** This monster's [[Dragon]] [[Type]] and appearance are based on how in the Bible, the Devil assumes the form of a dragon during his battle against the archangel Michael.
  ** This monster's Japanese name, "Demon King Diabolos" ({{Ruby|魔|ま}}{{Ruby|王|おう}}ディアボロス, ''Maō Diaborosu''), has the kanji for "Demon King" ({{Ruby|魔|ま}}{{Ruby|王|おう}}, ''Maō''), which is also present in the Japanese name of "[[Deck Devastation Virus]]" ({{ruby|魔|ま}}のデッキ{{ruby|破|は}}{{Ruby|壊|かい}}ウイルス, ''Ma no Dekki Hakai Uirusu'' lit. "Deck Destruction Virus of the Devil").
  * This monster has a [[Lightray]] counterpart: "[[Lightray Diabolos]]".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Darkest Diabolos, Lord of the Lair]]".
