  {{Navigation}}

  * This monster appears in the artworks of "[[Deception of the Sinful Spoils]]", "[[Sinful Spoils Sanctification]]", and "[[Tales of the White Forest]]" (as a silhouette).
  * This monster has two [[Card evolutions|upgraded]] forms:
