title: Card Trivia:Mirror Force Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Dragons of Legend 2]]''.
  * While the color is less pronounced in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster's wings appear to be made of the same luminescent blue-silver membrane of which "[[Mirror Force]]" is composed.
  * This is the last "[[The Fang of Critias]]" [[Fusion Monster]], as well as the last overall "[[Legendary Dragon]]" Fusion Monster, to appear in the ''Yu-Gi-Oh!'' anime.
  ** Ironically, it was the first "Legendary Dragon" Fusion Monster to be officially revealed in the ''[[OCG]]''/''[[TCG]]''.
