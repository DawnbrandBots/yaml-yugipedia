title: Card Trivia:Performapal Skeeter Skimmer
wikitext: |-
  {{Navigation}}

  * A coloured outline of this monster appears in the artwork of "[[Performapal Duelist Extraordinaire]]".
  * This card's Japanese name, "Entermate Amenboat" (ＥＭアメンボート ''Entameito Amenbōto''), is a portmanteau of the Japanese name of the ''[[wikipedia:Gerridae|Gerridae]]'' family of water bugs (アメンボ, ''Amenbo''), and "boat" (ボート ''Bōto'').
  ** This card's English name is based on "[[wikipedia:Skeeter|skeeter]]", the North American slang for "mosquito".
  * This card and "[[Numbing Grub in the Ice Barrier]]" are the only [[WATER]] [[Insect]] monsters in the ''[[OCG]]''/''[[TCG]]''.
