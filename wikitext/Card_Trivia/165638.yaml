title: Card Trivia:Labyrinth Tank
wikitext: |-
  {{Navigation}}

  * This monster appears to be based on the "cleaner" from the 1986 fantasy film, ''[[wikipedia:Labyrinth (1986 film)|Labyrinth]]'', in which it is depicted as a large mechanical vehicle equipped with giant drills that runs along the walls of the maze.
  ** Its design is very likely based on the head of [https://wikizilla.org/wiki/Moguera Moguera] from the ''Godzilla'' franchise.
  * This monster has a retrained [[counterpart]]: "[[Labyrinth Heavy Tank]]".
  * This is one of the first [[Machine]] monsters to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, along with "[[Cyber Soldier]]", "[[Royal Guard]]", and "[[Launcher Spider]]".
  ** This is also one of the first [[Fusion Monster]]s to appear in the anime, along with "[[Empress Judge]]", "[[Giltia the D. Knight]]", "[[Punished Eagle]]", "[[Roaring Ocean Snake]]", and "[[Skelgon]]".
  * This monster, "[[Barox]]", "[[Bickuribox]]", "[[Flame Swordsman]]", "[[Giltia the D. Knight]]", and "[[Zombie Warrior]]" are the only [[Normal Monster]]s in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and anime whose [[Monster Card|Monster]] [[Card type]]s were changed to [[Fusion Monster]] upon their release in the ''[[OCG]]''/''[[TCG]]''.
  ** Notably, all these monsters appears in the [[Duelist Kingdom (arc)|Duelist Kingdom arc]] of the ''Yu-Gi-Oh!'' manga and anime.
  * This is the first non-Effect Fusion Monster to be released in ''[[Yu-Gi-Oh! Rush Duel]]''.
  * This is the first Fusion Monster to be [[Fusion Summon]]ed, as well as the first monster [[Special Summoned]] from the [[Extra Deck]], in the ''[[Yu-Gi-Oh! Rush Duel LP]]'' manga.
  * This card's [[Labyrinth Tank (Bandai)|Bandai artwork]] is taken from {{chapter|Yu-Gi-Oh!|093|ref}}, specifically from the panel showing [[Labyrinth Tank (manga)|this monster]] being Summoned.
  ** This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter, albeit with minor changes in detailing; this card's unique artwork in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series also comes from the aforementioned chapter, albeit with further changes in detailing.
