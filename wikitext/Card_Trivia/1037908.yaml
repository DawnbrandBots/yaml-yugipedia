title: Card Trivia:Sinful Spoils of Slumber - Morrian
wikitext: |-
  {{Navigation}}

  * "[[Diabellstar the Black Witch]]", "[[Diabellze the Original Sinkeeper]]", and "[[Snake-Eyes Poplar]]" appear in this card's artwork.
  * This card is named after the [[wikipedia:The Morrígan|Morrígan]], an Irish goddess of war and death. Her name is often translated as "phantom queen" or "great queen".
  ** This artifact's black feathered design is a reference to how the Morrígan is known to appear in the form of a crow.
  * This monster has an "[[Azamina]]" [[Fusion Monster|Fusion]] [[counterpart]]: "[[Azamina Moa Regina]]".
