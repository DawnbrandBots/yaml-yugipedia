title: Card Trivia:Gordian Slicer
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Gordian Knot|Gordian Knot]], an [[wikipedia:Ancient Greece|Ancient Greek legend]] where a peasant farmer named Gordias immediately becomes king after entering the city of [[wikipedia:Phrygia|Phrygia]] on an ox-cart, which was prophesized by an oracle. Gordias's son Midas dedicated the ox-cart to the Greek god [[wikipedia:Zeus|Zeus]], and tied it to a post with an intricate knot of cornel bark.
  ** The second portion of this card's Japanese name is based on [[wikipedia:Schneider (surname)|Schneider]], a German surname derived from the verb ''schneiden'', meaning "to cut". This references the legend of the Gordian Knot where in 4th century B.C., [[wikipedia:Alexander the Great|Alexander the Great]] attempted to untie the knot to fulfill the prophecy to rule all of Asia, but he later cut it with his own sword instead.
  * This card's name may also be a reference to the Goldion Hammer, a weapon wielded by GaoGaiGar.
  ** The effect of returning cards to the hand is possibly a reference to the Goldion Hammer's ability to purify those struck by it.
