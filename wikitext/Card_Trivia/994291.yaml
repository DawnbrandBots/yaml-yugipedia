title: Card Trivia:Arias the Labrynth Butler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Big Welcome Labrynth]]" and "[[Trap Holic]]".
  ** In the artwork of "Big Welcome Labrynth", only this monster's silhouette is visible, as this card had not yet been released at the time "Big Welcome" debuted.
  * This card's name might be a reference to "''Arias''" ([[wikipedia:jp:アリアドネー#芸術作品|アリアス]]), a name used in Japan to refer to a specific marble bust preserved in the [[wikipedia:Capitoline Museums|Capitoline Museums]] in Rome, Italy. The bust is now thought to be the Greek god [[wikipedia:Dionysus|Dionysus]], but its particularly feminine depiction of the god had caused it to originally be misidentified as [[wikipedia:Ariadne|Ariadne]] from [[wikipedia:Greek mythology|Greek mythology]], which was then apparently misspelled as "Arias" in Japanese material.

