title: Card Trivia:Space Fusion - Extra Plasma
wikitext: |-
  {{Navigation}}

  * This monster and its [[Fusion Material]], "[[Extra Plorer]]", share a similar design.
  ** In addition, their card artworks feature a similar pose and background.
  * This monster's design also resembles "[[Galactica Oblivion]]".
  ** This is fitting because "Galactica Oblivion" is a [[LIGHT]] [[Attribute]] [[Galaxy (Type)|Galaxy]] [[Type]] [[Monster Card|monster]], so it can be one of the materials for this card's [[Fusion Summon]].
