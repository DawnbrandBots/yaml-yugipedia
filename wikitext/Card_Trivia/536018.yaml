title: Card Trivia:Lich Lord, King of the Underworld
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Lich|Lich]], an undead wizard or dark priest who has undergone a black magic ritual to gain eternal life and necromancy as an undead being.
  ** A Lich typically contains its soul sealed in a magic item, such as a ring or amulet, that allows it to return if killed, which reflects this monster's effect to [[return]] itself from the [[Graveyard]] to the player's [[hand]].
  * This monster's Japanese name, "Death King Lich Lord", corresponds with the Japanese name of "[[Crush Card Virus]]", "Deck Destruction Virus of Death".
