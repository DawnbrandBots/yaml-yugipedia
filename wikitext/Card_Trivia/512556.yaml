title: Card Trivia:Ritual Foregone
wikitext: |-
  {{Navigation}}

  * The seals in this card's artwork are similar to the seal that appears in the artwork of the [[Barrier Statue]] monsters.
  * This card has a [[Fusion Summon]] [[counterpart]]: "[[Instant Fusion]]".
  ** Both can [[Special Summon]] monsters ([[Ritual Monster|Ritual]] and [[Fusion Monster]]s, respectively) at the cost of 1000 [[LP]], but, unlike this card, "Instant Fusion" can only Summon [[Level]] 5 or lower Fusion Monsters and in the [[Fusion Summon#Effects|proper]] way.
