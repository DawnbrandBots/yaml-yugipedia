title: Card Trivia:Blackwing - Harmattan the Dust
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Harmattan|Harmattan]], a season in South Africa that occurs between the end of November and the middle of March, which is characterized by a dry and dusty trade wind.
  * This monster is based on a [[wikipedia:curlew|curlew]], a species of bird whose habitat includes sandy and soft dirt areas.
