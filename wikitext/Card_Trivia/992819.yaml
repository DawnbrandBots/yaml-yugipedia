title: Card Trivia:Toon Black Luster Soldier
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Toon Chaos]]''.
  * This monster is the [[Toon monster|Toon]] counterpart of "[[Black Luster Soldier]]".
  ** This monster's [[Summoning condition]] is based on "[[Black Luster Ritual]]", the [[Ritual Spell Card]] used to [[Ritual Summon]] "Black Luster Soldier".
  ** This monster's [[banish]]ing effect is based on the first bulleted effect of "[[Black Luster Soldier - Envoy of the Beginning]]".
