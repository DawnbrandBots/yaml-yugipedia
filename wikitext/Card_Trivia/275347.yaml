title: Card Trivia:Abyss-scale of the Mizuchi
wikitext: |-
  {{Navigation}}

  * This armor appears in the artwork of "[[Mermail King - Neptabyss]]".
  * This card's name is based on [[wikipedia:Mizuchi|Mizuchi]], a water spirit from Japanese mythology that resembles a sea serpent or a [[wikipedia:Japanese dragon|Japanese dragon]].
  * This armor's green color scheme and this card's effects reference how [[Spell Card]]s feature a green card border.
