title: Card Trivia:Red-Eyes Zombie Dragon Lord
wikitext: |-
  {{Navigation}}

  * This monster is the [[Zombie counterpart]] of "[[Red-Eyes Darkness Metal Dragon]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Red-Eyes Zombie Necro Dragon]]".
  ** Visually, this monster is a combination of "Red-Eyes Zombie Necro Dragon" and "[[Doomking Balerdroch]]".
  *** "[[Red-Eyes Zombie Dragon]]" likely managed to defeat "Balerdroch" and regained his power, after their battle described in the [[Master Guide 6 card storylines#File No. 06: The World of the Immortal Undead Is in the Midst of a Constant Struggle for Supremacy...|Master Guide 6 card storylines]].
