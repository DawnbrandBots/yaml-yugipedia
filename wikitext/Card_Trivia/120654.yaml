title: Card Trivia:Gem-Knight Garnet
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Revenge Return]]".
  * This card is named after the [[wikipedia:Mineral|mineral]] [[wikipedia:Garnet|garnet]].
  * Due to its presence in the "[[Brilliant Fusion]]" engine, this card gave rise to the fan term "Garnet": a card that is required for a [[Deck]]'s strategy but is undesirable to [[draw]], as this card was used for the activation of "Brilliant Fusion" in order to [[Fusion Summon]] "[[Gem-Knight Seraphinite]]", and if this card was not in the Deck, the strategy would fail.
