title: Card Trivia:Cactus Bouncer
wikitext: |-
  {{Navigation}}

  * This monster's name is based on a [[wikipedia:bouncer|bouncer]], a guard that keeps unauthorized people out of bars or other establishments, or helps control rowdy patrons in said establishments, reflecting its effect to prevent monsters from being [[Special Summon]]ed.
  * This monster shares similarities with "[[Cactus Fighter]]":
  ** Both monsters share the same [[Attribute]] ([[EARTH]]), [[Level]] (4), and [[Type]] ([[Plant]]).
  ** Both monsters feature high [[ATK]] and low [[DEF]] with a difference of 1500.
  ** Both monsters were initially released as [[TCG-only|''TCG''-exclusive]] cards.
  *** Ironically, despite the similarities between both monsters, this monster's effect prevents the effect of "Cactus Fighter" from Special Summoning "[[Needle Token]]s".
