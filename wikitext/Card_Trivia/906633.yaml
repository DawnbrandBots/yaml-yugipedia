title: Card Trivia:Dragonic Pendulum
wikitext: |-
  {{Navigation}}

  * "[[Dinomight Knight, the True Dracofighter]]", "[[Ignis Heat, the True Dracowarrior]]", and "[[Majesty Maiden, the True Dracocaster]]" appear in this card's artwork.
  ** All three monsters are holding the orbs from "[[Heritage of the Light]]".
  ** The crest beneath the monsters' feet is the same symbol as the crown on "[[Mariamne, the True Dracophoenix]]".
