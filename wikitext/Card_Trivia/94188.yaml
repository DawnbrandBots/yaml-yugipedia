title: Card Trivia:Heaven's Lost Property
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's effect to make each player [[draw]] cards is similar to the manga and anime effect of "[[Card of Sanctity (manga)|Card of Sanctity]]", while the effect to make the player draw three cards and [[discard]] two is similar to the effect of "[[Graceful Charity]]". 
  ** Fittingly, both cards are themed around [[wikipedia:Heaven|Heaven]] or heavenly beings and have an effect that allows the player(s) to draw a certain amount of cards.
  * This card shares its English name with the ''[[wikipedia:Heaven's Lost Property|Heaven's Lost Property]]'' anime.
  ** Their Japanese names, however, do not match, since they use the different kanji for a prefix; this card's name has the kanji 「天」 (''Ten'', lit. "Heaven") while the anime's name has the kanji 「そら」 (''Sora'', lit. "Sky").
