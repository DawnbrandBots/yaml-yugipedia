title: Card Trivia:Knight of Armor Dragon
wikitext: |-
  {{Navigation}}

  * The paladin in this card's artwork also appears in the artwork of "[[Armor Dragon Ritual]]".
  * The dragon in this card's artwork is based on "[[Armed Dragon LV7]]".
  * This is the first (and currently only) monster in the [[Paladins of Dragons]] [[series]] to not use the word "Paladin" in its English name, instead keeping the literal translation of "Knight". This is likely due to the "[[Armed Dragon]]" [[archetype]] being associated with [[Chazz Princeton]], who in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga was associated with knight-themed dragons like "[[Dragonic Knight]]".
