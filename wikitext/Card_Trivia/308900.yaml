title: Card Trivia:Stealth Kragen Spawn
wikitext: |-
  {{Navigation}}

  * ''Kurāgen'' (クラーゲン) in this card's Japanese name is a portmanteau of ''kurage'' (海月, the Japanese word for "[[wikipedia:Jellyfish|jellyfish]]") and "[[wikipedia:Kraken|Kraken]]" (クラーケン ''kurāken'' in Japanese).
  ** In English, this is localized as "Kragen"—"Kraken" with the second "k" replaced by a "g", equivalent to the change made to the Japanese word for "Kraken" in this card's Japanese name.
  * "Ephyra" in this card's Japanese name ("Stealth Kragen Ephyra") is based on the [[wikipedia:Jellyfish|ephyra]] stage of the jellyfish's life cycle, which is a transitionary stage between the [[wikipedia:Polyp (zoology)|polyp]] and [[wikipedia:Medusa (biology)|medusa]] stages.
  ** As a result, this card can be viewed as a "younger form" of its "[[Number]]" [[counterpart]], "[[Number 4: Stealth Kragen]]", even down to the same stats.
  *** This card's effect to continuously [[Special Summon]] copies of itself and "Stealth Kragen" from the [[Graveyard]] after being destroyed is based on the [[wikipedia:Transdifferentiation|transdifferentiation process]] of the ''[[wikipedia:Turritopsis dohrnii|Turritopsis dohrnii]]'', which is also known as the "immortal jellyfish". This particular species of jellyfish is known for being the only species in the animal kingdom to reverse its biotic cycle by reverting to a younger polyp in response to physical damage.
