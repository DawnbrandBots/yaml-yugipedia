title: Card Trivia:Kyoutou Waterfront
wikitext: |-
  {{Navigation}}

  * This card's name is the wordplay of the two cities in Japan, the reverse form of current Japan's capital city [[wikipedia:Tokyo|Tokyo]] (Romanized as "Toukyou") and the slightly corrupted version of the former Imperial capital city of Japan [[wikipedia:Kyoto|Kyoto]] (Romanized as "Kyouto").
  ** This is supported by the tower illustrated in this card's artwork, which resembles the combination of the top of [[wikipedia:Tokyo Tower|Tokyo Tower]] and [[wikipedia:Kyoto Tower|Kyoto Tower]].
  ** Tokyo is the most attacked city by the [[Kaiju]]s in [[wikipedia:Tokusatsu|Tokusatsu]]. On the other hands, Kyoto, hardly mentioned in Tokusatsu franchises since it received the least number of attacks.
  * The fact that this card is on a waterfront may be a reference to the fact that in [[wikipedia:Kaiju|Kaiju]] films, many Kaiju (namely [[wikipedia:Godzilla|Godzilla]]) will arise from the water to attack a city.
  * The tower in this card's artwork also appears in the artworks of "[[Dogoran, the Mad Flame Kaiju]]", "[[Gadarla, the Mystery Dust Kaiju]]",  "[[Jizukiru, the Star Destroying Kaiju]]" and "[[Kumongous, the Sticky String Kaiju]]".
