title: Card Trivia:Pendulum Transfer
wikitext: |-
  {{Navigation}}

  * This is the first card that allows a player to give [[Pendulum Scale]]s to non-[[Pendulum Monster]]s, albeit only in the manga.
  ** This reflects the influence of [[Yuya Sakaki (manga)|Yuya]]'s powers in his counterparts' Decks, making them gradually evolve into Pendulums.
  * [[Yuya's pendant]] appears in this card's artwork.
