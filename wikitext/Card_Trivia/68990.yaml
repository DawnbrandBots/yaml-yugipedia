title: Card Trivia:Hayabusa Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Twin Big Shields]]".
  * This monster's ''[[TCG]]'' name is based on "''hayabusa''", the Japanese word for [[wikipedia:falcon|falcon]].
  * Curiously, despite having the appearance of a humanoid bird, this monster's [[Attribute]]/[[Type]] are [[EARTH]]/[[Warrior]] instead of [[WIND]]/[[Winged Beast]], which are commonly associated with bird-themed monsters.
  * This monster and its effect to make a second attack likely reference the Falcon class [[fandom:w:c:dragonquest:Falcon blade|weapons]] and [[fandom:w:c:dragonquest:Falcon Slash|attacks]] from the ''[[wikipedia:Dragon Quest|Dragon Quest]]'' video game series, which allows the player to attack twice.
