title: Card Trivia:Vampire Grimson
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vampire's Domain]]". Also, several "[[Vampire Familiar]]s" appear in this card's artwork.
  * This monster's name is a wordplay on "grim" (from "[[wikipedia:Death (personification)|grim reaper]]") and "crimson".
