title: Card Trivia:Premature Material
wikitext: |-
  {{Navigation}}

  * This Skill is a reference to a scene in {{episode|Yu-Gi-Oh!|079|ref}}, where [[Bonz]] uses the effect of "[[Premature Burial (anime)|Premature Burial]]" (which costs the player 800 [[Life Point]]s to [[activate]]) to [[Special Summon]] "[[The Snake Hair (anime)|The Snake Hair]]" (a [[Normal Monster]]) from his [[Graveyard]] before using it as [[Fusion Material]] for "[[Great Mammoth of Goldfine (anime)|Great Mammoth of Goldfine]]".
