title: Card Trivia:Spirit Illusion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This card's Japanese name, "Ghost Afterimage", is based on the optical illusion where the image continues to appear in someone's vision after the exposure to the original image has ceased. This card's international name is synonymous to its Japanese name.
  ** This is reflected in this card's effect to [[Special Summon]] a "[[Doppelganger Token]]" with the same stats as the [[equip]]ped monster, thus creating an "afterimage", an "optical illusion", or a "doppelgänger" of the same monster. 
  *** This was demonstrated in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime when it was equipped to "[[Diabound Kernel (anime)|Diabound Kernel]]", causing the Special Summoned "[[Doppelganger Token (anime)|Doppelganger Token]]" to transform into the aforementioned monster.
  * This card's ''[[OCG]]''/''[[TCG]]'' condition requiring it to be equipped to a [[Level 5]] or higher [[Fiend]] monster is based on its appearance in {{episode|Yu-Gi-Oh!|200|ref}} when this card was equipped to the Level 5 "Diabound Kernel".
  ** In addition to Fiend, this card's ''OCG''/''TCG'' condition requires it to be equipped to a [[Zombie]] monster, which are the [[Type]]s of monsters commonly used by this card's owner, [[Yami Bakura]] in the ''Yu-Gi-Oh!'' anime.
  ** This card's ''OCG''/''TCG'' effect to make the opponent's monster lose [[ATK]] equal to the equipped monster's ATK is based on a scene during the same episode where a "Doppelganger Token" with the same stats and effects as "Diabound Kernel" uses the latter monster's effect to equip itself to [[Seto Kaiba]]'s monsters, decreasing their ATK by the ATK of "Doppelganger Token".
