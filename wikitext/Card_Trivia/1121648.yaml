title: Card Trivia:Artmage Diactorus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[DoomZ Raiders]]".
  * This monster's name is based on "diaktoros" (διάκτορος), the Greek word for "guide".
  * This monster is an upgraded Fusion form of "[[Medius the Pure]]" after inheriting the power of "[[Nerva the Power Patron of Creation]]".
  * This monster has a "[[DoomZ]]" counterpart: "[[DoomZ Break - Diactorus]]".
