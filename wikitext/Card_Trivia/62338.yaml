title: Card Trivia:Chrysalis Pinny
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cocoon Party]]".
  * This card's name is based on [[wikipedia:Pinafore|pinny]] (also called pinafore), a British-English term for a sleeveless garment worn as an apron.
  ** Ironically, this monster does not have any obvious "garment" on it; however, it is sheltered by a pupa structure, which could be said to be its "clothes".
  * This monster is the "[[Chrysalis]]" form of "[[Neo-Spacian Glow Moss]]".
