title: Card Trivia:Benkei Guard
wikitext: |-
  {{Navigation}}

  * This is the first [[Action Card]] [[Gong Strong]] ever picked up.
  * This card shares the name with Gong's original ace monster, "[[Superheavy Samurai Big Benkei]]".
  * This card's effect is possibly a reference to the steadfastness of [[wikipedia:Benkei|Benkei]] in his "standing death".
