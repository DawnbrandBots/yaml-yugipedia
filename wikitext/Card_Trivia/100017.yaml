title: Card Trivia:Venom Boa
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Boa constrictor|boa constrictor]], a species of snake that kills their prey by wrapping its coils around their prey's body and strangles them to death.
  ** Ironically, despite being part of the "[[Venom]]" [[archetype]], which consists of monsters based on venomous snakes, this monster is based on a non-venomous snake species and is the only member of the archetype to be based on such.
