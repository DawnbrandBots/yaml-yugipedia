title: Card Trivia:Small Scuffle
wikitext: |-
  {{Navigation}}

  * "[[I:P Masquerena]]", "[[S-Force Nightchaser]]", and "[[S-Force Rappa Chiyomaru]]" (the hooded figure, recognizable by the footwear) appear in this card's artwork.
  ** The artwork seems to depict "Chiyomaru" defending "Masquerena" from being apprehended, just before joining her and becoming "[[S:P Little Knight]]".
  * This card's names are a play on the Japanese name of "Rappa Chiyomaru" (「乱破小夜丸」). Removing the last two ''kanji'' (「夜丸」, which can mean "night chase"), the remaining ones can be interpreted as either "little opposition" or "small scuffle".
  * This card's artwork is adapted into ''[[Underground Data Courier]]'' in ''[[Yu-Gi-Oh! Master Duel]]'', specifically the scene where [[Chiyomaru]] saves [[I:P Masquerena (character)|I:P Masquerena]] from a fatal blow coming from [[Nightchaser]].
