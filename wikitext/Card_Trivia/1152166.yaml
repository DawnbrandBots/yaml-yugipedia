title: Card Trivia:Elfnote Tinia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Elfnotes: A Plea for Help]]", "[[Elfnotes: Aristeia of Trust]]", "[[Elfnotes: Quatrain of Succession]]" and "[[June Pride - Elfnotes]]".
  * This monster is named after [[wikipedia:Diana (mythology)|Diana]], the Roman goddess of the Moon.
