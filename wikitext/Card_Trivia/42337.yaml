title: Card Trivia:Tyrant Burst Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "[[Tyrant Dragon]]".
  ** Both share the same [[Level]] (8), [[Type]] ([[Dragon]]), [[original ATK and DEF]] (2900/2500), an allowing them to attack multiple times, and a relationship with [[Trap Card]]s.
  * This monster's [[equip]]ping effect is a reference to a scene in {{episode|Yu-Gi-Oh!|167|ref}} when [[Seto Kaiba]] merges this monster with his "[[Blue-Eyes White Dragon]]" to create "[[Blue-Eyes Tyrant Dragon]]".
  ** This monster's ''[[OCG]]''/''[[TCG]]'' effect to make the equipped monster attack three times during the [[Battle Phase]] is a stronger version of "[[Tyrant Wing]]", as well as a reference to this monster's appearance in the same episode where "Blue-Eyes", after merging with this monster, attacked all of [[Alister]]'s monsters, which features two "[[Robot Token]]s" and "[[Spell Canceller (anime)|Spell Canceller]]", winning Kaiba the Duel.
  ** The background of this card's artwork is a reference to when this monster was Summoned during the second Duel between [[Seto Kaiba]] and Alister in the same episode, which took place on top of an airplane in a cloudy sky.
  * This is the only "[[Legendary Dragon]]" [[Fusion Monster]] with an [[equip]] effect to require a "Legendary Dragon" other than "[[The Claw of Hermos]]" to [[Special Summon]] it.
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, when this monster is equipped to a monster, the equipped monster gains this monster's jewel, undercarriage, and a spike on its chest. In addition, the equipped monster's horns are fused with this monster's, and its wings glow as if it were equipped with "Tyrant Wing".
