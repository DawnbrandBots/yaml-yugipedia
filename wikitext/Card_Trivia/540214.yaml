title: Card Trivia:King's Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Court of Cards]]", "[[Face Card Fusion]]", and "[[Joker's Straight]]".
  ** This monster's crown appears in the artwork of "[[Burden of the Mighty]]".
  * This monster is based on the playing card, [[wikipedia:King (playing card)|the King]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|254|ref}}, specifically from the panel showing [[King's Knight (manga)|this monster]] being Summoned.
