title: Card Trivia:Madolche Mewfeuille
wikitext: |-
  {{Navigation}}

  * This card's English name is a combination of the word ''mew'', the sound that a cat makes, and [[wikipedia:Mille-feuille|Mille-Feuille]], a French pastry with several layers. It's Japanese name is based on the cat sound "nyah" (ニャー).
  ** Fittingly, this card's jigsaw puzzle piece is a mille-feuille pastry.
  * This monster appears in the artworks of "[[Madolche Chateau]]" and "[[Madolche Promenade]]".
