title: Card Trivia:Proto-Cyber Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cyber Network]]".
  * This card appears in the artwork of "[[Three of a Kind]]".
  * This monster's appearance reflects its name, as it appears to be a ''prototype'' "[[Cyber Dragon]]".
  ** This card's [[Level]] (3), [[ATK]] (1100), [[DEF]] (600), and effect also reflects this, as this card's Level is 2 less than that of "Cyber Dragon", and its ATK/DEF are each 1000 lower than those of "Cyber Dragon's".
