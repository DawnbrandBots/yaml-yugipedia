title: Card Trivia:Ghostrick Jackfrost
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Festival]]", "[[Ghostrick-Go-Round]]", "[[Ghostrick Parade]]", and "[[Jack-In-The-Hand]]".
  * This monster is based on [[wikipedia:Jack Frost|Jack Frost]], the personification of winter who is responsible for the frosty weather.
