title: Card Trivia:Gem-Knight Topaz
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the artworks of "[[Gem-Knight Master Diamond]]" and "[[Scatter Fusion]]".
  * This card is named after [[wikipedia:Topaz|topaz]].
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gem-Knight Tourmaline]]" and "[[Gem-Knight Garnet]]".
  ** The flame symbol on its chest-plate, red trim on its armor, and the flame-like ornaments on its helmet are based on "Garnet".
  * This monster's two [[wikipedia:Tonfa|tonfas]] reflects its effect to attack twice during the [[Battle Phase]].
