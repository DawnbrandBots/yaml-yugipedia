title: Card Trivia:Big Eater
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster resembles a [[wikipedia:Tiki|tiki]], a Polynesian carving of wood or greenstones in the image of a humanoid figure.
  * This monster shares similarities with "[[Trap Eater]]".
  ** Both have a large mouth, alluding to the "Eater" part of their names.
  ** Both are [[Fiend]] [[Tuner monster]]s that can [[Special Summon]] themselves from the [[hand]] by [[send]]ing cards to the [[Graveyard]].
