title: Card Trivia:The Agent of Life - Neptune
wikitext: |-
  {{Navigation}}

  * This monster is based on the planet [[wikipedia:Neptune|Neptune]], which appears in the background of this card's artwork.
  ** This monster is also based on [[wikipedia:Neptune (mythology)|Neptune]], the Roman god of the sea, which serves as the namesake of the plane.
  *** This monster is also depicted wielding a trident, which is a common symbol for Neptune and his Greek counterpart, [[wikipedia:Poseidon|Poseidon]].
