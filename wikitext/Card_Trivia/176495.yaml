title: Card Trivia:Xyz Reborn
wikitext: |-
  {{Navigation}}

  * An Overlay Unit appears orbiting the symbol in this card's artwork, representing the [[Xyz Material]] gained by the monster [[Summon]]ed with this card.
  * This card's artwork is based on the ''[[TCG]]'' artwork of "[[Monster Reborn]]", and possibly that of "[[Monster Reincarnation]]".
  * This was the first card to allow Xyz Materials to be [[attach]]ed to an [[Xyz Monster]] other than by an [[Xyz Summon]].
  * This is the first card to attach a [[Trap Card]] (itself) to an Xyz Monster as [[material]].
  * This card is a [[counterpart]] of "Monster Reborn".
  ** This card can also be seen as an Xyz counterpart of the [[Synchro Summon]] support card "[[Descending Lost Star]]", but with fewer or no drawbacks.
  * This card also has a [[manga-only]] [[Card evolutions|upgraded]] form: "[[Xyz Reborn Plus]]".
