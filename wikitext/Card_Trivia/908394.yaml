  * The proto-Germanic rune [[wikipedia:Thurisaz|Thurisaz]] (ᚦ) appears on the green gemstone of the hammer in this card's artwork.
  * This card is based on [[wikipedia:Mjölnir|Mjölnir]], the hammer of the thunder god [[wikipedia:Thor|Thor]] in [[wikipedia:Norse mythology|Norse mythology]].
