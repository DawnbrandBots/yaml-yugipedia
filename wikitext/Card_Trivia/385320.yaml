  * This monster's design is based around various kitchen utensils, including using a [[wikipedia:Tea kettle|tea kettle]] for a headpiece, wielding a [[wikipedia:Frying pan|frying pan]] for a shield on its right arm, and holding a [[wikipedia:Spatula|spatula]] in its left hand.
