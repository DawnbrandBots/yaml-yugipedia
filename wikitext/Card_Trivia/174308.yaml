title: Card Trivia:Lumenize
wikitext: |-
  {{Navigation}}

  * "[[Bountiful Artemis]]" and "[[Alien Warrior]]" appear in this card's artwork.
  * Even though this card's Japanese name is pronounced "[[Photon]]", it's not a "Photon" card since its Katakana has フォト'''ナ'''イズ instead of フォト'''ン'''.
  * A ''[[wikipedia:Lumen (unit)|lumen]]'' is a unit of measurement used to measure the amount of visible light from a given source.
  * This card is the anime counterpart of "[[Photon Current]]".
