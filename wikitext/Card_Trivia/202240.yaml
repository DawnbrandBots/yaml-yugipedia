title: Card Trivia:One-Eyed Skill Gainer
wikitext: |-
  {{Navigation}}

  * This card is likely based off [[wikipedia:Date Masamune|Date Masamune]], a samurai who gained the title of the "One-Eyed Dragon" due to his missing eye.
  * This is the first [[Xyz Monster]] to specifically state that it can only use its effect once while it is on the field; "[[Evilswarm Ouroboros]]" may be considered the second since it can use each of its three effects only once. Since it only copies Xyz Monster effects, it will end up detaching the rest of its [[Xyz Material]]s through the copied effect.
  ** The first Xyz Material for this card's Summoning requirements is just used for its original effect since when it copies the effect of an Xyz Monster, it still has 2 Xyz materials, the average amount of most Xyz Monsters.
