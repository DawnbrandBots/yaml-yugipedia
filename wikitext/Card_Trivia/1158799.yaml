title: Card Trivia:Hyperspeed
wikitext: |-
  {{Navigation}}

  * This card is a reference to the {{wikia|gradius|Speed Up}} power-up item in the ''[[wikipedia:Gradius|Gradius]]'' video game series, which increases the spaceship's speed.
  ** This card is also likely a reference to the High Speed stages in the ''Gradius'' video game series, where the player has to maneuver their Vic Viper spaceship in stages where the speed is above average while avoiding enemies.
