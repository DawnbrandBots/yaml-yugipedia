title: Card Trivia:Spined Gillman
wikitext: |-
  {{Navigation}}

  * The name "Gillman" came from [[wikipedia:Gill-man|Gill-man]] which was the official name of the monster from the classic science fiction movie ''[[wikipedia:Creature from the Black Lagoon|Creature from the Black Lagoon]]'', and was an aquatic fish-man, like the monster in this card's art.
  * This card bears a resemblance to "[[Wow Warrior]]".
