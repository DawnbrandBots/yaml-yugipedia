title: Card Trivia:Gigarays Gandora the Dragon of Destruction
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[counterpart]] of "[[Gandora the Dragon of Destruction]]".
  ** This monster was created in honor of {{episode|Yu-Gi-Oh!|224|ref}}, which won [http://vjump.shueisha.co.jp/yugioh_20th_duel/keka.html Shueisha's V Jump magazine's fan favourite Yu-Gi-Oh! Duel Monsters Duel poll].
  *** Fittingly, the [[Shrine of the Millennium Stone]] appears in the background of this card's artwork.
  ** This monster cannot be [[Normal Summon]]ed/[[Set]], but can be [[Special Summon]]ed, while "Gandora the Dragon of Destruction" can be Normal Summoned/Set, but cannot be Special Summoned.
  *** The above-mentioned fact makes this the first "[[Gandora (archetype)|Gandora]]" monster that cannot be Normal Summoned/Set.
  * It would not be until January 2024 (for a total of 7 years after this card's original release in Japan) where this monster's third nuking effect could be used without relying on another copy of itself, thanks to the release of "[[Gandora-G the Dragon of Destruction]]".
