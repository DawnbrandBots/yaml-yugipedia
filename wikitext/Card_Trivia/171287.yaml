title: Card Trivia:Sephylon, the Ultimate Timelord
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Sephirot|Sephirot]], an alternate name for the Tree of Life, the ten emanations in the [[wikipedia:Kabbalah|Jewish Kabbalah]].
  ** Fittingly, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, when [[Sephylon, the Ultimate Timelord (anime)|this monster]] is [[Special Summon]]ed via the effect of "[[Infinite Light (anime)|Infinite Light]]", a tree structure appeared with the other ten "[[Timelord]]" monsters (representing the ten emanations of the Jewish Kabbalah) depicted on the circular patterns.
  *** This reference is maintained in this monster's ''[[OCG]]''/''[[TCG]]'' [[Special Summon]]ing effect, which requires the player to have ten or more monsters in their [[Graveyard]].
  *** Based on its position on the tree, this monster is based on The Almighty, Judeo-Christian God "Yahweh" or "Jehovah", but it received its name from the Sephirot to make it less offensive.
  * This is the [[signature card]] of [[Z-one]] in the ''Yu-Gi-Oh! 5D's'' anime.
  * This is the only "Timelord" monster whose is depicted from an angle rather than front on.
  * This is one of only two "Timelord" monsters to not have an [[equal ATK and DEF|equal]] [[original ATK and DEF]] of 0, the other being "[[Sandaion, the Timelord]]".
  * Despite its status as the higher level "Timelord", this is the only "Timelord" monster that does not have built-in protection from being destroyed, or an effect that prevents its controller taking [[battle damage]] from battles involving it. In the ''Yu-Gi-Oh! 5D's'' anime, it needs to [[banish]] one other "Timelord" monster to grant itself the built-in protection the other "Timelord" monsters have.
  * Despite being in possession of the [[Z-one|most powerful]] of [[Paradox|the]] [[Bruno|four]] [[Aporia|Duelists]] from the future in the ''Yu-Gi-Oh! 5D's'' anime, this is the only one of their [[signature card]]s that is not [[Level 12]], the other three being "[[T.G. Halberd Cannon]]", "[[Malefic Truth Dragon]]", and "[[Meklord Astro Mekanikle]]"; also, it is weaker than "Malefic Truth Dragon" in terms of [[ATK]] and [[DEF]].
  * In the ''Yu-Gi-Oh! 5D's'' anime, this monster's [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] is "Akashic Storm", which references "Akasha", the Sanskrit word meaning "aether", the basis and essence of all things in the material world, and the first material element created from the astral world. It is known as the "fifth element", the other four being [[WIND]], [[FIRE]], [[EARTH]] and [[WATER]].
  ** Fittingly, all ten original "Timelord" monsters possess one of the aforementioned [[Attribute]]s, with this monster and "Sandaion's" [[LIGHT]] Attribute referencing [[DIVINE]] or "aether".
  * This monster, "[[Arcana Force EX - The Light Ruler]]", "[[Arcana Force EX - The Dark Ruler]]", "[[Odin, Father of the Aesir]]", and "[[Sandaion, the Timelord]]" have the highest original DEF (4000) of all [[Fairy]] monsters in the ''OCG''/''TCG''.
