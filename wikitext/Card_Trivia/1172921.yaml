title: Card Trivia:Mech Misairuzame
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed ''[[Rush Duel]]'' counterpart of "[[Misairuzame]]".
  ** The name of this monster and its mechanical appearance are based on "[[Mech Bass]]", a monster that is one of the monsters required to [[Ritual Summon]] "[[Fortress Whale]]" in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series.
