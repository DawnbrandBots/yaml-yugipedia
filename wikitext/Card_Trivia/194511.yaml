title: Card Trivia:Sealing Ceremony of Katon
wikitext: |-
  {{Navigation}}

  * "[[Crimson Ninja]]" and two "[[Laval Token]]s", dressed as ninjas, appear in this card's artwork.
  ** Similar to "[[Sealing Ceremony of Raiton]]", you can't use the monsters in this card's artwork as the cost (because [[Token]]s can't exist in the Graveyard).
