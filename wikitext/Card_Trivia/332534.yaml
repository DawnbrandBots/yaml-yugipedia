title: Card Trivia:Mozarta the Melodious Maestra
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Wolfgang Amadeus Mozart|Wolfgang Amadeus Mozart]], a renowned [[wikipedia:composer|composer]] who was recognized as a prodigy from a young age.
  * This monster has the highest [[Level]] (8) and [[original ATK and DEF]] (2600/2000) of all "[[Melodious]]" [[Main Deck]] monsters.
