title: Card Trivia:Izanami
wikitext: |-
  {{Navigation}}

  * In old Japanese mythology, ''[[wikipedia:Izanami|Izanami]]'' is the spouse of ''[[wikipedia:Izanagi|Izanagi]]''.
  * In Shinto mythology, when Izanami gave birth to ''[[wikipedia:Kagu-Tsuchi|Kagu-Tsuchi]]'', she died because of the burns she received. Because of this, ''Izanagi'', in mourning, killed ''Kagu-Tsutchi'', split him into eight pieces, and scattered them and became eight volcanoes.
  * This card's effect to return a Spirit monster to your hand from your Graveyard at the cost of discarding a card from your hand, may be a reference to Izanami's status as a goddess of both creation and death in Japanese mythology.
