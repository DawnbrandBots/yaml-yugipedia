title: Card Trivia:Gem-Knight Pearl
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Xyz Startup!!]]'' and ''[[Battle Pack: Epic Dawn]]''.
  * This monster appears in the artworks of "[[Oni-Gami Combo]]", "[[Pursuit of the Fiend]]", "[[Rank Wall]]", "[[Shining Reborn]]", "[[Wild Charger]]", "[[Xyz Reversal]]", "[[Xyz Soul]]", "[[Xyz Stand]]", "[[Xyz Weight]]", and "[[Xyz Xtreme !!]]"
  ** Of the aforementioned cards, "Oni-Gami Combo" was released in the ''[[TCG]]'' before this card's introduction.
  * This monster is based on the [[wikipedia:Pearl|pearl]], a gemstone produced by shelled mollusks.
  * This is the only "[[Gem-Knight]]" [[Xyz Monster]], as well as the first [[Non-Effect Monster|non-Effect]] Xyz Monster. This may be based on how the "Gem-Knight" [[archetype]] is centered around [[Normal Monster]]s.
  * This monster might be an indication that the "Gem-Knight" archetype and "[[Gishki]]" archetype have joined forces to fight against their new enemy, the "[[Vylon]]" archetype. As such, this monster is likely the [[Xyz Summon]]ed form of "[[Gishki Mollusk]]" and a [[Level 4]] "Gem-Knight" Normal Monster, as pearls are naturally produced when a small piece of rock or sand accidentally gets into a mollusk's shell.
  ** Also, according to the [[Duel Terminal Master Guide card storylines| ''Duel Terminal'' storyline]], this monster was the one who defeated "[[Vylon Disigma]]".
  * This monster and "[[Backup Warrior]]" are the only two cards released in ''Battle Pack: Epic Dawn'' with no prior ''TCG'' release.
