title: Card Trivia:Brotherhood of the Fire Fist - Boar
wikitext: |-
  {{Navigation}}

  * In the OCG, this card is named after ''[[wikipedia:Lu Zhishen|Lu Zhishen]]'' (read in Japanese as Ro Chishin) and "boar" (inoshishi).
  ** ''Lu Zhishen'' ranks 13th of the 36 Heavenly Spirits of the 108 [[wikipedia:Water Margin|Liangshan heroes]] and is nicknamed "Flowery Monk".
  * This is the second [[Tuner monster]] of the entire "[[Fire Fist]]" [[Archetype]], the first being "[[Brotherhood of the Fire Fist - Spirit]]".
  ** This monster and "Spirit" flaming beasts have similar colors., and they both have a restriction to what kind of [[Synchro Monster]]s they can summon.
  * This monster appears in "[[Fire Formation - Yoko]]".
