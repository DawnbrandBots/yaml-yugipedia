title: Card Trivia:Eater of Millions
wikitext: |-
  {{Navigation}}

  * This monster, in what it seems to be a mature/transformed version of it after eating many cards, appears in the artwork of "[[Banquet of Millions]]".
  * The cards "[[Gagagigo]]", "[[D.D. Trainer]]", "[[Esper Girl]]" and "[[Knight Day Grepher]]" appear in this card's artwork.
  ** All of these monsters also appear in the artwork of "[[Premature Return]]".
