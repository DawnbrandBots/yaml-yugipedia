title: Card Trivia:Delirium Silbyx
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Triple Build Pack: Evolution Impact]]''.
  * This monster appears in the artworks of "[[Delirium Embrace]]" and "[[Quixotic Love]]".
  * This monster's design is based on the [[wikipedia:Bombyx|silk moth]], while its name is a portmanteau of its English name and its scientific name, ''bombyx''.
