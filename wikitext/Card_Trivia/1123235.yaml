title: Card Trivia:Lunalight Liger Dancer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legendary Arc-V Decks]]''.
  * This monster is an upgraded form of "[[Lunalight Leo Dancer]]", and the ultimate form of "[[Lunalight Cat Dancer]]".
  ** This monster is named after a [[wikipedia:Liger|liger]], a hybrid offspring of a male lion and a female tiger.
  * This monster has the highest [[Level]] (12) and [[original ATK and DEF]] (3800/3500) of all "[[Lunalight]]" monsters.
  ** It also has the highest Level (12) and original [[DEF]] (3500) of all [[Beast-Warrior]] monsters.
  ** This monster is tied with "[[Beast Machine King Barbaros Ür]]" for the highest original [[ATK]] (3800) of all Beast-Warrior monsters.
  * This is the only Fusion Monster that requires four [[Fusion Summon]]s for it to be Fusion Summoned traditionally: it must be Fusion Summoned using "Lunalight Leo Dancer", which must be Fusion Summoned using "[[Lunalight Panther Dancer]]", which must be Fusion Summoned using "[[Lunalight Cat Dancer]]", which must be Fusion Summoned using two "Lunalight" monsters.
