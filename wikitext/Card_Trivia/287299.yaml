title: Card Trivia:Quick-Span Knight
wikitext: |-
  {{Navigation}}

  * This is the first [[Tuner monster]] to be [[Summoned]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * In the "5D's Tracks: The 27th" omake at the end of {{chapter|Yu-Gi-Oh! 5D's|27|ref}}, [[Masashi Satō]] revealed that this monster's name was originally "Quick-Wrench Man" (クイック・レンチマン), before he realized he had confused the tools "spanner" and "wrench" with each other.
