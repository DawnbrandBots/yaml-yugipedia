title: Card Trivia:Armored Gravitation
wikitext: |-
  {{Navigation}}

  * "[[Active Guard]]", "[[Over Boost]]", "[[Psychic Armor Head]]", two unknown [[Armor monster]]s (serving as the left and right arms), and a [[Duelist]] wielding a [[Chaos Duel Disk]] appear in this card's artwork.
  * In the Italian dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, both this card and "[[Full Armor Gravitation]]" share the same name, "Forza di Gravità Corazzata".
