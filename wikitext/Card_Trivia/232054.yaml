title: Card Trivia:Brotherhood of the Fire Fist - Swallow
wikitext: |-
  {{Navigation}}

  * In the OCG, this card is named after ''[[wikipedia:Huyan Zhuo|Huyan Zhuo]]'' (read in Japanese as Koen Shaku) and "flying swallow" (hien).
  ** ''Huyan Zhuo'' ranks 8th of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "Double Clubs".
  * This monster appears in the artwork of "[[Fire Formation - Tenken]]"  and "[[Five Brothers Explosion]]".
  * The kanji 威 on this monster's belt and the swallow in this card's artwork means "authority/influence."
  * "Hien" in this card's Japanese name means "flying swallow".
