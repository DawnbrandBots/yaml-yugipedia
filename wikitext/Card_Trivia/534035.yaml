  [[File:Corrosive Scales.png|thumb|250px|"[[Great Moth (manga)|Great Moth]]" spreading its poisonous pollen, weaking "[[Gaia the Dragon Champion (manga)|Gaia the Dragon Champion]]".]]

  * "[[Gaia the Dragon Champion]]" and "[[Perfectly Ultimate Great Moth]]" appear in this card's artwork.
  ** This card's artwork and effects are based on a similar battle [[Yugi Muto]] had with [[Weevil Underwood]], where "Gaia the Dragon Champion" faced "[[Great Moth]]" and continuously lost 100 ATK points due to the poison from the wings of "Great Moth". Its artwork, more specifically, was based on {{chapter|Yu-Gi-Oh!|68|ref}}, in a panel which features "Gaia" facing "Great Moth".
  * This card's effect is partially based on the effect of "[[Great Moth (manga)|Great Moth]]" in the manga. The ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' incarnation of "[[Perfectly Ultimate Great Moth (DOR)|Perfectly Ultimate Great Moth]]", whose effect was based on the manga, also has a similar effect.

