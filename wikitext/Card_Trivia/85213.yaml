title: Card Trivia:Red Dragon Archfiend
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Collectible Tins 2008 Wave 1]]'', and is also one of the cover cards of ''[[Duelist Edition Volume 3]]'', ''[[Ghosts From the Past: The 2nd Haunting]]'', and ''[[Synergy Pack 01: Syncro Acceleration]]''.
  * This monster appears in the artworks of "[[Absolute Powerforce (card)|Absolute Powerforce]]", "[[Clashing Souls]]", "[[Crimson Call]]", "[[Crimson Dragon Quetzacoatl]]", "[[Crimson Gaia]]", "[[King's Resonance]]", "[[Scarlet Security]]", "[[Summoning Curse]]", "[[Synchro Overtop]]", and "[[Synchro Rumble]]".
  ** Three counterfeit versions of this monster (one purple, one yellow, and one blue) also appear in the artwork of "[[Time to Stand Up]]".
  * This is the first [[Dragon]] [[Synchro Monster]] - it was issued as a [[Weekly Shōnen Jump 2008, Issue 18 promotional card|''Weekly Shōnen Jump'' magazine promo]] that pre-dated the first episode of the ''[[Yu-Gi-Oh! 5D's]]'' anime by two days, and the ''[[OCG]]'' release of ''[[The Duelist Genesis]]'' by nearly three weeks. 
  * This monster was designed by [[Kazuki Takahashi]]. 
  * This is the [[signature card]] of [[Jack Atlas]] in the ''Yu-Gi-Oh! 5D's'' anime.
  ** This monster has the same [[ATK]] (3000) as the signature cards of the rivals from the other ''[[Master Duel]]'' anime series: [[Seto Kaiba]]'s "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]", [[Chazz Princeton]]'s "[[Armed Dragon LV10 (anime)|Armed Dragon LV10]]", [[Kite Tenjo]]'s "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]", [[Declan Akaba]]'s "[[D/D/D Doom King Armageddon (anime)|D/D/D Doom King Armageddon]]", and [[Roken Kogami|Varis]]'s "[[Borreload Dragon (anime)|Borreload Dragon]]".
  *** In the anime, Jack called this monster "my very soul" (''Waga tamashi'', in Japanese), like in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga Kaiba stated that "Blue-Eyes White Dragon" embodies his soul.
  ** As a Synchro Monster, this is the first signature card of a main rival to be an [[Extra Deck]] monster instead of a [[Main Deck]] monster.
  ** This monster's effect to [[destroy]] monsters in [[Defense Position]] and the player's other monsters that did not attack during a turn represents Jack Atlas' desire for power, which is reflected in his rise to his status as King of [[Turbo Duel]]s, by defeating any [[Duelist]] on his path.
  * This monster has the following forms:
  ** A younger form: "[[Red Rising Dragon]]"
  ** An "[[/Assault Mode]]" form: "[[Red Dragon Archfiend/Assault Mode]]"
  ** A "[[Majestic]]" form: "[[Majestic Red Dragon]]"
  ** A [[Double Tuning]] [[Card evolutions|upgraded]] form: "[[Red Nova Dragon]]"
  ** A [[Triple Tuning]] upgraded form: "[[Red Supernova Dragon]]"
  ** A [[Quadruple Tuning]] upgraded form: "[[Red Hypernova Dragon]]"
  ** A [[Duel Dragon]] [[counterpart]]: "[[Hot Red Dragon Archfiend]]"
  ** Two retrained counterparts: "[[Scarred Dragon Archfiend]]" and "[[The Crimson King]]"
  ** A [[Synchro Dimension]] counterpart: "[[Scarlight Red Dragon Archfiend]]"
  * This monster is the opposite of "[[Stardust Dragon]]".
  ** Both monsters have mirrored poses in their card artworks, as well as opposing color schemes.
  ** Both monsters have opposite effects involving the destruction of monsters: This monster's effect focuses on destroying monsters, while "Stardust Dragon" focuses on preventing monsters from being destroyed.
  ** This monster was used by Jack Atlas, the rival of the protagonist [[Yusei Fudo]], who uses "Stardust Dragon".
  * This monster has the highest original [[ATK]] (3000) of all Signer Dragons.
  * This monster, along with "[[Black-Winged Dragon]]", are the only Signer Dragons that have any relation to a specific [[archetype]].
  ** They are also the only two "Signer Dragons" to have their names changed in the ''[[TCG]]''.
  * This monster's Japanese name, "Red Daemon's Dragon", is similar to that of "[[Black Skull Dragon]]" ("Black Daemon's Dragon"), another [[Dragon]] monster with a demonic appearance. Fittingly, the [[Fusion Material]]s of "Black Skull Dragon" ("[[Red-Eyes Black Dragon]]" and "[[Summoned Skull]]") are "[[Red (archetype)|Red]]" and "[[Archfiend]]" monsters respectively, like this monster.
