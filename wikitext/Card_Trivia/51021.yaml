title: Card Trivia:Blackwing - Sirocco the Dawn
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Blackback]]" and "[[Delta Crow - Anti Reverse]]".
  * This monster is named after a [[wikipedia:Sirocco|sirocco]], a hot wind from the southeastern Mediterranean that is blown from the Sahara Desert and into southern Europe at hurricane speeds.
  ** This monster's name is referenced in the names of two other "[[Blackwing]]" monsters: "[[Blackwing - Calima the Haze]]" (named after the sibling wind of the sirocco), and "[[Blackwing - Ghibli the Searing Wind]]" (named after the Libyan name for the sirocco).
  * This is the first "[[Blackwing]]" monster Summoned in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
