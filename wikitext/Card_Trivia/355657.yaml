title: Card Trivia:Certain Victory! Monster Academy
wikitext: |-
  {{Navigation}}

  * This card's artwork is taken directly from the first scene of ''[[Yu-Gi-Oh! ZEXAL]]'''s last Japanese opening, "[[Challenge the GAME]]".
  * Despite being a card shown on the ''Yu-Gi-Oh! ZEXAL'' site, this card uses the [[Card layout#Series 9 layout|Series 9 layout]], one which is otherwise used only in ''[[Yu-Gi-Oh! ARC-V]]''.
