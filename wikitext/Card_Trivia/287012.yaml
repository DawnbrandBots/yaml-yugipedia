title: Card Trivia:Don Thousand's Throne
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this card is [[activate]]d, it summons the giant ornate throne from [[Don Thousand's palace]].
  ** When [[Vector]] activated this card in the anime, he is seen sitting on the throne; however, he decides to [[equip]] himself with the throne, which transforms into a set of armor similar to the armor [[Don Thousand]] used to trap him in {{episode|ZEXAL|122|ref}}, with a single eye centered in the chest plate that follows his eye movements.
