title: Card Trivia:Fire Formation - Yoko
wikitext: |-
  {{Navigation}}

  * This card was named after the ''[[wikipedia:Eta Ursae Majoris|Eta Ursae Majoris]]''.
  * "[[Brotherhood of the Fire Fist - Boar]]" and "[[Brotherhood of the Fire Fist - Caribou|Caribou]]" appear in this card's artwork.
  * Like other "[[Fire Formation]]" cards, this card's effect is a variant on an existing Spell/Trap card, in this case "[[Raigeki Break]]".
