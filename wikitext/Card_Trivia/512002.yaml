title: Card Trivia:Second Goblin
wikitext: |-
  {{Navigation}}

  * Either this monster or "[[Coach Goblin]]" appears in the artworks of "[[Lane Restriction]]" and "[[Premature Return]]".
  * "[[Giant Orc]]" appears in this card's artwork.
  * This monster is most likely "[[Coach Goblin]]", since in a [[Duel]], boxing, or similar fighting sports, a fighter's coach usually also serves as his "second" (corner man, attendant, agent, etc).
  ** This monster, "Coach Goblin", and "[[D.D. Trainer]]" appear to be the same monster, just in different situations. For example, the artwork of "[[D.D. Crazy Beast]]" depicts it pulling this monster into the [[Different Dimension]], leading to him becoming "D.D. Trainer".
  * This is the first and currently only [[Fiend]] [[Union monster]].
  * This monster is similar to "[[Protective Soul Ailin]]", as both are Union monsters that can be [[equip]]ped to specific monsters ("Giant Orc" for this card and "[[Indomitable Fighter Lei Lei]]" for "Ailin"), both of which have identical effects.
