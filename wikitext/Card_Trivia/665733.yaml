title: Card Trivia:Resurgam Xyz
wikitext: |-
  {{Navigation}}

  [[File:Number69HeraldryCrest-JP-Anime-ZX-NC-4.jpg|thumb|right|250|The true form of "[[Number 69: Heraldry Crest (anime)|Number 69: Heraldry Crest]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.]]

  * [[Number 69: Heraldry Crest - Dark Matter Demolition]]" appears in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|ZEXAL|067|ref}}, where [[Vetrix]] [[activate]]s the effect of "[[Number 69: Heraldry Crest (anime)|Number 69: Heraldry Crest]]" a second time, revealing its true form, during his Duel against [[Yuma Tsukumo]].
  ** This card's reveal date (on the ''[[OCG]]'' [https://twitter.com/YuGiOh_OCG_INFO/status/1178597601857490946 Twitter] on September 30th, 2019, at 6:09 P.M. JST) references 69, the number of "Heraldry Crest".
  * This card's name is based on "Resurgam", the Latin word for the phrase "I shall rise again".
