title: Card Trivia:Demolition Blast - Disaster Attack
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Demolition Charge Dragon Dangerous Blasthamut]]" appears in this card's artwork.
  * The base kanji "''Happa''" (発破) refers specifically to the usage of explosives for construction or mining ventures.
  ** The base kanji for "Disaster Attack" (災攻事 ''Saikōji'') is a pun on the base kanji for "reconstruction" (再工事 ''Saikōji'').
