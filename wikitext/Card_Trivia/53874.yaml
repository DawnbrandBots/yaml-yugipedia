title: Card Trivia:Hydro Genex
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Star Shift]]".
  * This monster's name is based on [[wikipedia:Hydroelectric energy|hydroelectric energy]], the energy produced by flowing water used to rotate the turbines and generate electrical power.
  ** Fittingly, this monster is the [[Card evolutions|upgraded]] [[Synchro Monster]] version of "[[Genex Undine]]", whose name is based on the elemental being of water.
  * This monster has a [[FIRE]] [[counterpart]]: "[[Thermal Genex]]".
  ** Both monsters feature [[Life Point]]-manipulation effects which [[activate]] when they [[destroy]] an opponent's monster by battle.
  *** This monster increases the player's Life Points, while "Thermal Genex" inflicts damage to the opponent.
