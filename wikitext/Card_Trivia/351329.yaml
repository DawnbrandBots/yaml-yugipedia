title: Card Trivia:Phonon Pulse Dragon
wikitext: |-
  {{Navigation}}

  * In [[wikipedia:physics|physics]], a [[wikipedia:Phonon|phonon]] refers to a [[wikipedia:quasiparticle|quasiparticle]] [[wikipedia:phenomenon|phenomenon]] in which [[wikipedia:atom|atoms]] composing a lattice of [[wikipedia:condensed matter physics|condensed matter]] (like a [[wikipedia:solid|solid]] or [[wikipedia:liquid|liquid]]) oscillate at a single uniform [[wikipedia:frequency|frequency]], which can produce "[[wikipedia:pulse (physics)|pulses]]" of [[wikipedia:sound|sound]].
  * The term "phonon" also comes from the Greek word φωνή (phonē), which literally translates to "sound" or "voice". This reflects the "sound" theme common among many [[Tuner monster]]s and Tuner monster related cards ("[[Frequency Magician]]", "[[Tune Warrior]]", "[[Tuning]]", "[[Discord]]", etc.).
