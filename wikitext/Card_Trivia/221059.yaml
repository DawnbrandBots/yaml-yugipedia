title: Card Trivia:Junk Mail
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster appears in the artwork of "[[Scrap-Iron Welding]]".
  * This monster's name is a pun on [[wikipedia:Advertising mail|junk mail]], with "mail" referring to a [[wikipedia:Armour|suit of armor]].
  * When {{chapter|5D's|028|ref}} was first published in ''[[V Jump]]'', this card featured a typo, where its [[ATK]]/[[DEF]] was listed as 2400/1600. This was later corrected in [[Yu-Gi-Oh! 5D's - Volume 004|the fourth volume]] of the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  ** This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from the same chapter, specifically from the panel showing [[Junk Mail (manga)|this monster]] being Summoned.
