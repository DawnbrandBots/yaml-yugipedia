title: Card Trivia:D/D Savant Thomas
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Thomas Edison|Thomas Edison]].
  ** The top half of this monster shaped like a [[wikipedia:Incandescent light bulb|incandescent light bulb]], arguably Edison's most famous invention.
  ** This monster has a heraldic [[wikipedia:Sun (heraldry)|sun]] for a face, possibly referencing the following quote by Edison in conversation with [[wikipedia:Henry Ford|Henry Ford]] and [[wikipedia:Harvey Samuel Firestone|Harvey Firestone]]: "''We are like tenant farmers chopping down the fence around our house for fuel when we should be using Nature's inexhaustible sources of energy — sun, wind and tide. … I'd put my money on the sun and solar energy. What a source of power! I hope we don't have to wait until oil and coal run out before we tackle that.''".
  ** The bottom half of the monster bears a resemblance to the horn of a [[wikipedia:Phonograph|phonograph]], another of Edison's inventions, which is connected to a red phonograph cylinder [[wikipedia:Gramophone record|record]].
  * The fact that this monster was first used in the ''[[Yu-Gi-Oh! ARC-V]]'' anime as a [[Pendulum Scale]] alongside "[[D/D Savant Nikola]]", based on [[wikipedia:Nikola Tesla|Nikola Tesla]], may be a reference to the [[wikipedia:War of the currents|war of the currents]], a competition in the 19th century surrounding the introduction of electric power transmission systems, where Edison advocated for the use of [[wikipedia:Direct current|direct current]], which was at odds with Tesla, who supported the usage of [[wikipedia:Alternating current|alternating current]].
  ** Edison and Tesla's enmity, partly resulting from the war of the currents, is reflected in the [[Level]]s and Pendulum Scales of this monster and "D/D Savant Nikola", where one monster's Level is equal to the other monster's Pendulum Scale, making the one monster unable to [[Pendulum Summon]] the other if it is used as a Pendulum Scale.
  * Unlike previous "D/D Savant" cards, this card derives its name from the first name of its namesake, rather than the last name. Also, unlike previous "D/D Savant" cards, this card's Spanish print uses a different wording in its translation ("D/D Thomas the Savant" instead of "D/D Savant Thomas").
