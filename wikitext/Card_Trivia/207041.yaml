title: Card Trivia:Abyss Warrior
wikitext: |-
  {{Navigation}}

  * This monster has a [[counterpart]]: "[[Abyss Soldier]]".
  ** Both monsters share the same [[Attribute]] ([[WATER]]), [[Type]] ([[Aqua]]), and [[original ATK and DEF]] (1800/1300).
  ** Both monsters are based on species of [[wikipedia:Whale|whales]] with a humanoid design; this monster is based on [[wikipedia:Physeteroidea|Physeteroidea whales]].
  ** Both monsters share an effect that can [[return]] a card from a specific place to the [[Deck]], which can be [[activate]]d by [[discard]]ing a WATER monster.
