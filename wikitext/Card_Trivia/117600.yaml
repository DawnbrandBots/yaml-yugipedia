title: Card Trivia:Sabatiel - The Philosopher's Stone
wikitext: |-
  {{Navigation}}

  * The bladed form of this card appears in the artwork of "[[Magistery Alchemist]]".
  * "Sabatiel" is likely a translation of "God's [[wikipedia:Sabbath|Sabbath]]".
  * The design of the sphere in this card's artwork is similar to the sphere featured in the artwork of "[[ZERO-MAX]]".
  * This card's name is based on the [[wikipedia:Philosopher's Stone|Philosopher's Stone]], a legendary alchemical substance that is said to transform base metals into gold or silver. It was also believed to be created by the [[wikipedia:Elixir of life|elixir of life]], a potion that is also said to give the drinker the power to rejuvenate and the gift of eternal youth or immortality.
  ** This card's name is a reference to the transformational power of the Philosopher's Stone, which allows the player to "transform" this card into any card from the [[Deck]] and the [[Graveyard]].
  *** However, this card's ''[[OCG]]''/''[[TCG]]'' effect of adding "[[Polymerization]]" or a "[[Fusion (archetype)|Fusion]]" card to the hand is a reference to how [[Jaden Yuki]] used that power during his [[Duel]] with [[Kagemaru]] by adding different cards belonging to the "Fusion" archetype from his Deck to his [[hand]].
  **** Before the start of the Duel in {{episode|GX|048|ref}}, this card was posthumously given to Jaden by [[Lyman Banner]], an alchemist who used an Alchemy Deck in the anime.
  **** During the same Duel, this card's [[ATK]]-gaining effect was used on "[[Elemental Hero Electrum (anime)|Elemental HERO Electrum]]", where its ''TCG'' name is based on a gold-silver alloy and its Japanese name, "Elemental HERO Elixirer", both names which further reference the Philosopher's Stone's legend of being created by the elixir of life and its ability to transform metals into gold or silver.
  * In the ''[[Yu-Gi-Oh! Tag Force]]'' video games which feature this card as a playable Game Original card that functioned closer to its anime counterpart rather than its ''OCG''/''TCG'' counterpart (i.e. from the [[Yu-Gi-Oh! GX Tag Force|first ''Tag Force'' title]] to the [[Yu-Gi-Oh! 5D's Tag Force 6|sixth]] which were all released before this card's ''OCG'' release), it is either [[Limited]] or [[Forbidden]].
