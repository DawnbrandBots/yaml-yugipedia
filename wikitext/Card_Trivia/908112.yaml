title: Card Trivia:Trap of Board Eraser
wikitext: |-
  {{Navigation}}

  * This card is named for a common classroom prank that occurs in schools in Japan and some other countries, where an eraser is placed atop a door so that it falls onto a student who opens it (as depicted in this card's artwork).
  * Unusually, this card's artwork is not edited to give the nude seated creature shorts in any of its English or international releases.
