title: Card Trivia:Simorgh, Bird of Ancestry
wikitext: |-
  {{Navigation}}

  * This card and "[[Dragon Spirit of White]]" are the only Effect Monsters that are treated as Normal Monsters in the hand.
  * This card has a younger version: "[[Simorgh, Bird of Bringing]]".
  * This is the first [[Monster Card]] that features effects that the effect of "[[Wind Effigy]]" can apply to, as its effects allows it to itself as a [[Normal Monster]] in the hand.
  ** This is also one of two cards to do so, the other being "[[Leonardo's Silver Skyship]]"; however, since the latter is an [[Illegal]] card, this is also the only legal card for the effect of "Wind Effigy" to apply to.
