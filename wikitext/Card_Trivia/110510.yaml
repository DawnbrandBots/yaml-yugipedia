title: Card Trivia:Black Stego
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Extinction on Schedule]]", "[[Spacetime Transcendence]]", and "[[Survival's End]]".
  * This monster is based on the ''[[wikipedia:Stegosaurus|Stegosaurus]]'', a species of large and quadrupedal herbivorous dinosaur from the [[wikipedia:Late Jurassic|Late Jurassic]] period.
  ** This monster's [[original DEF]] (2000) and effect to switch it into [[Defense Position]] reference how the ''Stegosaurus'' used its spiked tail to defend itself from attacking predators, which it is depicted doing in the ''[[Yu-Gi-Oh! GX]]'' anime and explained by [[Tyranno Hassleberry]] in the original Japanese version of {{episode|GX|063|ref}}.
