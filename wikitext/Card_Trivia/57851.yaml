title: Card Trivia:Earth Chant
wikitext: |-
  {{Navigation}}

  * This card is the [[EARTH]] counterpart of the following [[Ritual Spell]]s:
  ** "[[Breath of Acclamation]]" - [[WIND]]
  ** "[[Contract with the Abyss]]" - [[DARK]]
  ** "[[Sprite's Blessing]]" - [[LIGHT]]
  ** This card also has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Earth Chant]]".
  * This card's artwork is similar to that of "[[Dust Barrier]]".
  ** It also bears resemblance to the [[Nazca Lines]].
