title: Card Trivia:Spinning Wheel Spindle
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on the spinning wheel from the fairy tale, ''[[wikipedia:Sleeping Beauty|Sleeping Beauty]]''.
  ** This card's effect to [[destroy]] an opponent's monster and [[Special Summon]] it from the [[Graveyard]] after three turns reference the spinning wheel's role in ''Sleeping Beauty'', where the princess pricks her finger and falls asleep for a hundred years until she is awakened by the kiss of a handsome prince.
