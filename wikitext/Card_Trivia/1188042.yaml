title: Card Trivia:Archfiend's Origin
wikitext: |-
  {{Navigation}}

  * This monster is an [[card evolutions|upgraded]] form of "[[Summoned Skull]]".
  ** This monster's name is a reference to how "[[Summoned Skull (manga)|Summoned Skull]]" is the first "[[Archfiend]]" monster to debut in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  ** This monster's [[Level]] (7) is a reference to how "Summoned Skull" is a [[Level 7]] monster in the ''Yu-Gi-Oh!'' manga.
  ** This monster's purplish skin is a reference to [[Summoned Skull (Bandai)|"Summoned Skull"'s Bandai version]].
