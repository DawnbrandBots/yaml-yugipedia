title: Card Trivia:Vesper Girsu
wikitext: |-
  {{Navigation}}

  * "[[Girsu, the Orcust Mekk-Knight]]" and "[[World Legacy Token]]" appear in this card's artwork.<!-- do not add Idlee. the silhouette doesnt match her -->
  ** "Vesper" is the Latin name for the evening star, likely referencing "[[Dingirsu, the Orcust of the Evening Star]]", the previous form of "Girsu". This is further reinforced with this card's base kanji name, "Flash of the Evening Star" (宵星の閃光, ''Shōsei no Senkō'').
