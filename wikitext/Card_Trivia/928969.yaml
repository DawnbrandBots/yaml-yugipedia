title: Card Trivia:Ember the Super Assistant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chemicalize Bloom]]" and "[[Chemicalize Centrifuge]]".
  * This monster's Japanese name, "Achi", is based on the Japanese onomatopoeia for heat.
  * This monster has 2 [[Counterpart|upgraded]] forms: "[[Ember the Hyper Assistant]]" and "[[Ember the Ultra Assistant]]"
