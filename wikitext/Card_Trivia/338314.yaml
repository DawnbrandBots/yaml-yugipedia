title: Card Trivia:D/D Berfomet
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Baphomet|Baphomet]], a winged demon who is depicted with the head of a goat and the body of a human.
  ** In the original Japanese and Korean languages, this card's name is "Baphomet". This name change in the ''[[TCG]]'' was done to obscure the Satanic connotation connected with Baphomet.
  * This card shares the same [[Attribute]] ([[DARK]]), [[Type]] ([[Fiend]]) and [[original ATK and DEF]] (1400/1800) with "[[Berfomet]]", which also shares the same [[Level]] (4) as [[Baphomet (manga)|that monster's manga version]].
