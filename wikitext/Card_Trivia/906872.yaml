title: Card Trivia:Photon Timestop
wikitext: |-
  {{Navigation}}

  * "[[Numeral Hunter]]" and [[Heartland Tower]] appear in the artwork of this card.
  ** This card's artwork is a reference to [[Orbital 7]]'s ability to slow down time to the point of nearly freezing, except for [[Kite Tenjo]] and any "[[Number]]" holder, as seen in {{episode|ZEXAL|013|ref}}.
  *** Also, this card's artwork depicts the rain getting stuck in place, referencing the scene in the same episode where Kite and Orbital 7 slowed down time during a rainstorm before he challenged [[Yuma Tsukumo]] to a [[Duel]].

