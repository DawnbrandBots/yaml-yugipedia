title: Card Trivia:Stray Cat
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster appears in the artwork of "[[Mysterious Cat Transformation]]".
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, every copy of this monster features a different fur pattern and color scheme.
  ** In the anime, when an opponent's monster attacks this [[Attack Position]] monster, it is shown to have a horrifying monster-esque face; also, when it is in [[Defense Position]], it is depicted hiding in a cardboard box similar to the box in this card's artwork.
  * This card's video game effects to [[Special Summon]] another copy of itself from the [[hand]] is based on the effect of "[[Cat Meeting]]" used in {{episode|ZEXAL|009|ref}}.
  ** Also, this card's effect to Special Summon "[[Monster Cat]]" when it is [[destroyed by battle]] is based on the effect of "Mysterious Cat Transformation", which was also used in the same episode.
