title: Card Trivia:Wall of Revealing Light
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Heraldry Burst]]".
  * This card's artwork is similar to that of "[[Pyramid of Light]]".
  * This card is a [[Continuous Trap]] [[counterpart]] of "[[Swords of Revealing Light]]".
  ** This card's English name is a play on the name of "Swords of Revealing Light", causing it to imply its effect can [[reveal]] cards in some way despite the fact that it does not.
