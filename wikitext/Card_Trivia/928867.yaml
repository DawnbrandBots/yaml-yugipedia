title: Card Trivia:Omega Judgment
wikitext: |-
  {{Navigation}}

  * "[[Vylon Omega]]" appears in this card's artwork.
  ** This card's name references ''[[Duel Terminal - Judgment of Omega!!|Judgment of Omega!!]]'', a ''[[Duel Terminal]]'' pack that features the debut of "Vylon Omega".
  * This card is a counterpart to "[[Apex Predation]]".
  ** Both cards are ''[[TCG]]''-[[TCG-only|exclusive]] [[Normal Trap Card]]s that feature respective counterparts from the ''Duel Terminal'' lore.
