title: Card Trivia:White Duston
wikitext: |-
  {{Navigation}}

  * This is the first [[LIGHT]] [[Fiend]] [[Normal Monster]], and was the only one until the release of "[[Dipity]]" in ''[[Alliance Insight]]'', which came 11 years, 3 months and 8 days later.
  * Unlike the other "[[Duston]]" monsters, this monster lack a specific color, reflected by its lack of effects and its [[Normal Monster]] [[card type]].
  * This monster appears in the artworks of "[[Duston Roller]]", "[[Frontline Disturbance]]", "[[House Duston]]", "[[Magicalized Duston Mop]]", "[[Starduston]]",  "[[Token Support]]", "[[Trickstar Live Stage]]", and "[[Two-for-One Team]]".
  ** An illustration of this monster appears on the bedspread in the artwork of "[[Ojama Pajama]]".
  * This monster's Japanese [[flavor text]] includes 「ホコリ」 (''hokori''), a pun on 「{{Ruby|埃|ほこり}}」 (''hokori'', "dust") and 「{{Ruby|誇|ほこ}}り」 (''hokori'', "pride").
  ** The English flavor text translates the kanji as "proudust", a portmanteau of "proudest" and "dust".
  ** The Italian flavor text attempted to keep the pun on "most proud" ("più orgoglioso") and "dust" ("polvere") by rendering the word as "most dustproud" ("polverorgolioso").
  ** The flavor texts of all other ''[[TCG]]'' languages dropped the pun instead.
