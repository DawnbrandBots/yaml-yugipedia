title: Card Trivia:Ukiyoe-P.U.N.K. Sharakusai
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[P.U.N.K. JAM Dragon Drive]]", "[[P.U.N.K. JAM FEVER!]]", "[[Ukiyoe-P.U.N.K. Amazing Dragon]]", and "[[Ukiyoe-P.U.N.K. Rising Carp]]".
  * This card is named after ''[[wikipedia:Ukiyo-e|ukiyo-e]]'', a genre of Japanese art which flourished from the 17th through 19th centuries.
  ** This monster's name, "Sharakusai", is a portmanteau of the names "[[wikipedia:Sharaku|Sharaku]]" and "[[wikipedia:Hokusai|Hokusai]]". Both of them are well-known ''ukiyo-e'' artists.
  *** Tōshūsai Sharaku was known for his portraits of ''[[wikipedia:Kabuki|kabuki]]'' actors (The design of this monster resembles a ''kabuki'' actor).
  *** Katsushika Hokusai was known for his artworks of landscapes, plants, and animals; including carps ("Ukiyoe-P.U.N.K. Rising Carp").
  *** "Sharakusai" is also the Japanese adjectival word for "impertinent, saucy, impudent, cheeky" or "insolent".
