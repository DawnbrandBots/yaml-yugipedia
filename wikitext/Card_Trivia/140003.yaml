title: Card Trivia:Space Megatron
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster appears in the artwork of "[[Heavy Metal Raiders]]".
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, this monster shares the same name with [[wikipedia:Megatron|Megatron]], the main antagonist of the ''[[wikipedia:Transformers|Transformers]]'' franchise. Because of this, its name was changed in ''[[Yu-Gi-Oh! Early Days Collection]]''.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|122|ref}}, specifically from the panel showing [[Space Megatron (manga)|this monster]] being Summoned.
