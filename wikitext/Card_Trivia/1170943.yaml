  {{Navigation}}

  * This monster appears in the artworks of "[[GMX 55th Experiment Report]]" and "[[GMX Suppression Squad]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[GMX Associate Noma]]", whose transformation into this monster is depicted in the artwork of "[[GMX Applied Experiment 55]]".
