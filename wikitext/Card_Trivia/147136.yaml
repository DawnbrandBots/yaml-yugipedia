title: Card Trivia:Meklord Emperor Creation
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Meklord Astro Mekanikle]]" appears in the artwork for this card.
  * This card's video game effect to prevent the [[equip]]ped monster's destruction by [[banish]]ing a "[[Wisel]]", "[[Granel]]", or "[[Skiel]]" monster from the [[Graveyard]] is based on the anime effect of "[[Meklord Astro Mekanikle (anime)|Meklord Astro Mekanikle]]", which can prevent its destruction by banishing one of the "[[Meklord Emperor]]'s" parts.
