title: Card Trivia:Doomking Balerdroch
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Zombie Horde]]'' and ''[[Theme Pack: Undead Rondo]]''.
  * This monster appears in the artworks of "[[Phantom Bind]]", "[[Soul Levy]]", and "[[Zombie Power Struggle]]".
  * "[[Soul-Absorbing Bone Tower]]" and "[[Zombie World]]" appear in this card's artwork.
  * This monster is named after [[wikipedia:Balor|Balor Drochsuile]] (Balor of the Evil Eye), king of the Fomorians, a group of supernatural beings.
  * "[[Doombearer Psychopompos]]" has a robe pattern that is similar to this monster's body pattern.
  * According to the [[Master Guide 6 card storylines#File No. 06: The World of the Immortal Undead Is in the Midst of a Constant Struggle for Supremacy...|Master Guide 6 card storylines]], this monster is the enemy of "[[Red-Eyes Zombie Dragon]]" for the supremacy in "Zombie World".
  * This monster has a combined form with "[[Red-Eyes Zombie Necro Dragon]]": "[[Red-Eyes Zombie Dragon Lord]]".
  ** "Red-Eyes Zombie Dragon" likely managed to defeat this monster and took its power, after their battle described in ''Master Guide 6''.
