title: Card Trivia:Migratory Zereort
wikitext: |-
  {{Navigation}}

  * The silhouettes of several "[[Blizzard Falcon]]s" appear in this card's artwork.
  * This monster is a [[Main Deck]] form of "[[Ice Princess Zereort]]".
  ** This monster carries the staff of "Ice Princess Zereort" in its beak.
  ** This monster shares a similar naming scheme with "Ice Princess Zereort", whose Japanese name features "Ljod" (リオート ''Riōto''), the Russian word for "ice". This references the given name of [[Rio Kastle]], who uses "[[Ice Princess Zereort (anime)|Ice Princess Zereort]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * The "Migratory" (ミグラトリー ''Miguratorī'') in this monster's Japanese name is a wordplay on ''tori'' (鳥), the Japanese word for "bird", reflecting its [[Winged Beast]] [[Type]].
  * This monster's [[original ATK and DEF]] (1000/2200) are the opposite of "[[Sirenorca]]", another [[Level 5]] [[WATER]] Winged Beast monster that can [[Xyz Summon]] "Ice Princess Zereort".
