title: Card Trivia:Legendary Swordsman - Buster Blader
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Buster Blader (Rush Duel)|Buster Blader]]", based on its appearances in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'' manga]] and ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]''.
  ** This monster's pose is based on the artwork of "[[Buster Blader (DM4)|Buster Blader]]" in ''Duel Monsters 4''.
  ** This monster's [[Level]] is 8, the same as the Level of "Buster Buster" in the manga and in ''Duel Monsters 4''.
  ** This monster's title, "Legendary Swordsman" ({{Ruby|伝|でん}}{{Ruby|説|せつ}}の{{Ruby|戦|せん}}{{Ruby|士|し}} ''Densetsu no Senshi'', "Legendary Warrior") is based on the [[flavor text]] of "Buster Blader" in ''Duel Monsters 4'': ''A legendary warrior who specializes in slaying dragons.''
  ** This monster's effect grants it 500 ATK for each [[Dragon]] [[Type]] monster the opponent controls, the same as "[[Buster Blader (manga)|Buster Blader]]" in the manga; in contrast, "Buster Blader" also gains 500 ATK for Dragon Type monsters in the opponent's [[Graveyard]] in the ''[[OCG]]''/''[[TCG]]'' and ''Rush Duel''.
  * This monster's inability to attack directly may be based on the ''OCG''/''TCG'' card, "[[Buster Blader, the Dragon Destroyer Swordsman]]".
