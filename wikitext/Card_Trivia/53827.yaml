title: Card Trivia:Supersonic Skull Flame
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Skull Flame]]".
  * This is the first [[WIND]] [[Zombie]] monster.
  ** Because of this, this is the only member of the [[Burning Skull]] series to not be a [[FIRE]] monster, despite its flaming appearance.
  * This is the first card to use a star symbol「☆」in its name ("Speed King ☆ Skull Flame").
