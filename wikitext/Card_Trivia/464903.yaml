title: Card Trivia:Quarantine
wikitext: |-
  {{Navigation}}

  * "[[King of the Skull Servants]]", "[[Plaguespreader Zombie]]", "[[The Lady in Wight]]", "[[Wightprince]]", "[[Skull Dog Marron]]" and the skeleton dog from the artwork of "The Lady in Wight" appear in this card's artwork.
  ** This card's artwork depicts the "King of the Skull Servants", "The Lady in Wight", and "Wightprince" in their vacationing clothes; the events in this card's artwork likely continues in the artwork of "[[There Can Be Only One]]".
  ** This card's artwork also depicts "Plaguespreader Zombie" held in the Quarantine Zone; this likely reflects its naming scheme, as well as reference how its legality became [[Limited]] in March 2009 until it was moved out in July 2014.
