  * This is one of the [[cover card]]s of ''[[High-Grade Collection]]''.
  * Along with "[[Super Galaxy King Lord of Galactica (L)|Super Galaxy King Lord of Galactica [L]]]" and "[[Super Galaxy King Lord of Galactica (R)|Super Galaxy King Lord of Galactica [R]]]", this is the last [[Maximum Monster]] to be [[Maximum Summon]]ed in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
