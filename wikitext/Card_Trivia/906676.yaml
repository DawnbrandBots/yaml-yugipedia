  [[File:Ultimate Divine-Beast.png|thumb|right|250px|"[[Slifer the Sky Dragon (manga)|Slifer the Sky Dragon]]" breaking free of "[[Spellbinding Circle (manga)|Spellbinding Circle]]".]]

  * "[[Slifer the Sky Dragon]]" and the "[[Dark Magical Circle]]" portion of "[[Spellbinding Circle]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{chapter|Yu-Gi-Oh!|174|ref}}, specifically from the panel where the effect of "[[Spellbinding Circle (manga)|Spellbinding Circle]]" (which [[Dark Yugi (manga)|Dark Yugi]] used on "[[Slifer the Sky Dragon (manga)|Slifer the Sky Dragon]]") expired due to the [[Egyptian God#Shared effects|Egyptian God's effect]] to only be affected by [[card effect]]s for one turn, during his [[Duel]] against the [[Doll (manga)|Doll]].
  ** This card's effect to [[destroy]] all opponent's [[face-up]] cards that [[activate]]d their effects on the [[field]] in that turn, if the player [[control]]s a [[Divine-Beast]] monster, is also a reference to that scene in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.

