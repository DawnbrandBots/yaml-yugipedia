title: Card Trivia:Ritual Beast Ulti-Gaiapelio
wikitext: |-
  {{Navigation}}

  * This monster is the fusion between "[[Ritual Beast Tamer Lara]]", "[[Spiritual Beast Apelio]]", and "[[Naturia Gaiastrio]]".
  * This card is the first [[LIGHT]] "[[Ritual Beast]]" monster.
  ** It is also the only "[[Ritual Beast Ulti]]" monster that doesn't have the effect to [[Spiritual Beast|de-]][[Ritual Beast Tamer|fuse]] itself, and also need other "Ritual Beast Ulti" monster to Summon it.
  ** It is also the only "Ritual Beast Ulti" monster that only have its effect when Summoned with its own Summoning procedure.
  * This card has the highest ATK of all the "[[Ritual Beast]]" monsters.
  * This monster appears in the artwork of "[[Ultimate Providence]]".
