title: Card Trivia:Prohibit Snake
wikitext: |-
  {{Navigation}}

  * The first part of this monster's Japanese name, "Profibit Snake", is a portmanteau of "[[wikipedia:PROFINET|PROFINET]]" and "prohibit".
  ** This monster's skin features text censored by [[wikipedia:Pixelization|pixelization]], while a [[wikipedia:No symbol|general prohibition sign]] appears in the background of this card's artwork, which both reference the usage of the word "prohibit" in this monster's name.
