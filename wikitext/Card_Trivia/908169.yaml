title: Card Trivia:Black Luster Soldier - Soldier of Chaos
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Classic Pack 03]]'', and is one of the cover cards of ''[[Ghosts From the Past (set)|Ghosts From the Past]]'' and ''[[Battles of Legend: Chapter 1]]''.
  * This monster is a [[Link Monster|Link]] [[counterpart]] of "[[Black Luster Soldier]]".
  ** This monster's effects to [[banish]] one card on the [[field]] or allow for a second [[attack]] during the [[Battle Phase]] of the player's next turn after it destroys an opponent's monster by battle, are based on the effects of "[[Black Luster Soldier - Envoy of the Beginning]]".
