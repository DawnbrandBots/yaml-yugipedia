title: Card Trivia:Leng Ling
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Chinese mythology|Jiān Jiān]] ([https://ja.wikipedia.org/wiki/比翼の鳥 鶼鶼]), a two-headed Jiān (A mythical one-eyed bird with only one wing) with two wings, representing a husband and wife (As one is female and the other male and due to their only eye and wing, they rely on each other to properly see and fly).
