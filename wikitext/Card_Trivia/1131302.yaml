title: Card Trivia:Solfachord Solfegia
wikitext: |-
  {{Navigation}}

  * The fairies from the artworks of "[[GranSolfachord Coolia]]" and "[[GranSolfachord Musecia]]" appear in this card's.
  * This monster's name is a reference to [[wikipedia:Solfège|solfège]], the western system of assigning syllables to musical notes so that they can be read easily.
