title: Card Trivia:Elemental HERO Captain Gold
wikitext: |-
  {{Navigation}}

  * This monster's arm and gun appears in the artwork of "[[D-Faceoff]]".
  * "[[Skyscraper]]" appears in this card's artwork.
  * This monsters has an "[[Evil HERO]]" [[counterpart]]: "[[Evil HERO Adusted Gold]]"
  ** Both have the same [[Attribute]] ([[LIGHT]]), [[Level]] (4), and [[ATK]]/[[DEF]] (2100/800).
  ** Both are ''[[OCG]]''-original members of their respective "[[HERO]]" [[archetype]]s.
  ** Both have an effect that allows them to be [[discard]]ed to [[search]] a specific [[Spell Card]] from the player's [[Deck]].
  * This monster has the highest original ATK (2100) of all [[Level 4]] "[[Elemental HERO]]" monsters.
  * The Spanish print of this card uses the word "agregar" instead of "añadir" ("add"), and the second part of this monster's name is partially in Spanish.
