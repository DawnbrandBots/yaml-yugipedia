  [[File:RaidraptorRiseFalcon-JP-Anime-AV-NC-3.png|thumb|right|300|"[[Raidraptor - Rise Falcon (anime)|Raidraptor - Rise Falcon]]" activating its [[ATK]]-gaining effect, as seen in the [[Yu-Gi-Oh! ARC-V|anime]].]]

  * "[[Raidraptor - Rise Falcon]]" appears in this card's artwork.
  ** This card's artwork is based on a scene of {{episode|ARC-V|024|ref}}, where [[Shay Obsidian]] used the effect of "[[Raidraptor - Rise Falcon (anime)|Raidraptor - Rise Falcon]]" to have it gain [[ATK]] equal to the total ATK of all [[Special Summon]]ed monsters his opponents [[control]]led, causing it to be enveloped in a cloak of flames, and then proceeded to [[attack]] and [[destroy]] all of them, winning him the [[Duel]].

