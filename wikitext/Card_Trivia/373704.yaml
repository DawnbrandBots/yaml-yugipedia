title: Card Trivia:D/D Reroll
wikitext: |-
  {{Navigation}}

  * Toy versions of "[[D/D Cerberus]]", "[[D/D Lilith]]", "[[D/D Proud Chevalier]]", "[[D/D/D Doom King Armageddon]]", "[[D/D/D Dragon King Pendragon]]", "[[D/D/D Duo-Dawn King Kali Yuga]]", "[[D/D/D Flame King Genghis]]", "[[D/D/D Gust King Alexander]]", and "[[D/D/D Wave King Caesar]]" appear in this card's artwork.
  ** A cake version of "[[Mokey Mokey]]" also appears in the background of this card's artwork.
  ** The events in this card's artwork are the continuation of the events depicted in the artwork of "[[D/D/D Human Resources]]".
