title: Card Trivia:Spice the Special Noodle Ninja Rich Broth
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Gockboot Tasty Two Stars", is a reference to the ''[[wikipedia:Michelin Guide|Michelin Guide]]'' published by the French tire company [[wikipedia:Michelin|Michelin]], which awards up to three stars for excellence to a select few restaurants in certain geographical locations, with two stars awarded for excellent cooking.
