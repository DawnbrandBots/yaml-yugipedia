title: Card Trivia:Yamiterasu the Divine Ruler
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Chaotic Omega Rising!!]]''.
  * This monster's name is a portmanteau of "[[Yamiruler the Dark Delayer]]" (this monster's [[Fusion Material]]) and [[wikipedia:Amaterasu|Amaterasu]], the Shinto goddess of the Sun in Japanese mythology.
  * This is the first [[Celestial Warrior]] [[Type]] monster.
