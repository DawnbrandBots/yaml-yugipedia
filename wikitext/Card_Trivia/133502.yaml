title: Card Trivia:Koa'ki Meiru Prototype
wikitext: |-
  {{Navigation}}

  * This is the first and currently only "[[Koa'ki Meiru]]" monster with the ability to Summon [[Tokens]].
  * This is one of the few "Koa'ki Meiru" monsters that don't have the [[maintenance cost]] specific to that [[archetype]], the others being "[[Koa'ki Meiru Boulder]]", "[[Koa'ki Meiru Hydro Barrier]]", and "[[Koa'ki Meiru Tornado]]".
