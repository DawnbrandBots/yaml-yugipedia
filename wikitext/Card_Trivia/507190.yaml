title: Card Trivia:Kurama
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is based on [[wikipedia:Mount Kurama|Mount Kurama]], a mountain north of Kyoto, Japan which is believed to be the home of the [[wikipedia:Tengu|tengu]], a legendary creature in Japanese mythology who takes on avian-like appearances.
  * This monster has a [[recolored counterpart]]: "[[Whiptail Crow]]".
  * This monster has a prototype card from when the ''[[OCG]]'' was originally intended to be called ''[[Magic & Wizards]]''.
