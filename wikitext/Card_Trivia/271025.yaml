title: Card Trivia:Pumprincess the Princess of Ghosts
wikitext: |-
  {{Navigation}}

  * This monster appears to be the daughter of "[[Pumpking the King of Ghosts]]", as indicated by its artwork and name.
  ** It has half the Level, ATK and DEF of "Pumpking".
  ** Its effect is also similar to Pumpking's, but instead of increasing the [[ATK]] of your monsters of 100 points every turn, it decreases the ATK of your opponents monsters by 100 every turn.
  * This monster's effect while treated as a spell card closely resembles the anime/manga effect of "Pumpking".
