title: Card Trivia:Ghostrick Doll
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Festival]]" and "[[Ghostrick Parade]]."
  * This monster is based on a [[wikipedia:Bisque doll|bisque doll]], a doll made of bisque porcelain and characterized by their highly realistic features, which have become pop culture fixtures in supernatural horror movies.
