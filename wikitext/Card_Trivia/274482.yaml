title: Card Trivia:Transmodify
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is portmanteau of "trance", "trans", "star", and "turn".
  * This card's artwork reveals that "[[Cannon Soldier]]" operates "[[Cannon Soldier MK-2]]" from the inside.
  ** However, the effect of this card would not work with these monsters as they each have different [[Attribute]]s; "Cannon Soldier" is a [[DARK]] monster, while "Cannon Soldier MK-2" is an [[EARTH]] monster.
  * This card has a counterpart: "[[Downbeat]]".
