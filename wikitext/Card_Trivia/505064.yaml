title: Card Trivia:Dark Master - Zorc
wikitext: |-
  {{Navigation}}

  [[File:YGO-059 Last Page - Zorc.png|thumb|200px|right|Zorc's artwork from [[Yu-Gi-Oh! - Duel 059]]]]
  * This monster is based on [[Dark Master Zorc]], the ''[[Monster World]]'' avatar of [[Dark Bakura (manga)|Dark Bakura]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  ** This is the second card based on Dark Master Zorc from the ''Yu-Gi-Oh!'' manga, the first being "[[Zorc]]".
  * This monster's effects are based on the attacking mechanics of [[Monster World]], where rolling a lower number results in a stronger attack, with 00 being a "super-critical" and 99 being a "fumble"; the result for rolling a 1 or 2 represents critical hits, while the result for rolling a 6 represents a fumble.
  ** In ''[[Yu-Gi-Oh! Duel Links]]'', this card's attacks are named as they were in Monster World: When [[Yami Bakura (Duel Links)|Yami Bakura]] rolls 3, 4 or 5, the attack is named "Dark Catastrophe"; when he rolls 1 or 2, the attack is named "Zorc Inferno"; and when he attacks the player, the attack is named "Dark Phenomenon", which is also the name of one of [[Zorc Necrophades]]' attacks in the manga.
  * Both this monster and "[[Contract with the Dark Master]]" use the kanji 「闇の支配者」 in their Japanese names; for this monster, it is pronounced as「ダーク・マスター」 (''Dāku Masutā''), while for "Contract with the Dark Master" it is pronounced「やみのしはいしゃ」 (''Yami no Shihaisha'').
  * This card's artwork is based on Zorc's artwork from the last page of {{chapter|Yu-Gi-Oh!|059|ref}}.

