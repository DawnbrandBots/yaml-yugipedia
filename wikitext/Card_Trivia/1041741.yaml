title: Card Trivia:Eternal Arms - Durandaltainer
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is named after [[wikipedia:Durendal|Durandal]], the sword of Roland, a legendary paladin and partially historical officer of Charlemagne in French epic literature.
  ** Curiously, despite Durandal being a short-sword, resembling a [[wikipedia:Scimitar|scimitar]], the artwork of this card portrays a weapon that more strongly resembles a [[wikipedia:Rapier|rapier]].
  * This card's name is a portmanteau of "Durandal", "Grand", and "Entertainer".
