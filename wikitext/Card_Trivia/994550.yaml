title: Card Trivia:Negatwor Dragon
wikitext: |-
  {{Navigation}}

  * The swirling portals from the artwork of "[[Negate Attack (Rush Duel)|Negate Attack]]" appear in both of this card's artworks.
  ** This monster's name is based on the ''[[TCG]]'' name of "Negate Attack".
  * This monster's name is a portmanteau of "negator" and "two", reflecting its design, which features two portals from the artwork of "Negate Attack", which this monster's effect mentions.
  ** This monster's name also reflects its effect requirement to send "two" cards from the player's [[Deck]] to the [[Graveyard]], then make the opponent's monsters lose 2000 [[ATK]] if the player has "Negate Attack" in the Graveyard.
