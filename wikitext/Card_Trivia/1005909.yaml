title: Card Trivia:Magic Mirror Spirit Nayuta
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "''nayuta''", the Buddhist term for an extremely great number, which often said to be 100 million.
  ** In mathematics, ''nayuta'' is often referred to as the number "novemdecillion", which is written as 10^60 (or the number "ten duovigintillion", which is written as 10^70).
  * This monster has a defensive counterpart: "[[Magic Mirror Spirit Asogi]]".
  ** Both are named acter the Buddhist terms referring to a large numerical value.
  ** Both monsters' combined values of their [[ATK]] and [[DEF]] equal 4000.
