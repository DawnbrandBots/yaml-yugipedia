title: Card Trivia:Graceful Dice
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Joey]]''.
  * The angel in this card's artwork appears in the artworks of "[[Dicetadium of Fate]]", "[[Frightfur Parade]]", "[[Graceful Skull Dice]]", "[[Star Blaster]]", and "[[Toy Parade]]".
  ** The blue die appears in the artworks of "[[Dice Archangel]]", "[[Fusion Recycling Plant]]", "Graceful Skull Dice", "[[Twister]]", and "[[Weighbridge]]".
  * This card has an [[ATK]]/[[DEF]]-decreasing counterpart: "[[Skull Dice]]".
  * This card has a [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart combined with "Skull Dice": "Graceful Skull Dice".
  * This card has a ''[[Rush Duel]]'' [[Monster Card]] [[counterpart]]: "[[Dice Angel]]".
  * In ''[[Yu-Gi-Oh! Rush Duel]]'', this card was revealed as a [[Normal Spell Card]] instead of its [[Quick-Play Spell]] [[property]].
