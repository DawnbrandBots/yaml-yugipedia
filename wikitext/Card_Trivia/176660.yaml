title: Card Trivia:Evoltile Casinerio
wikitext: |-
  {{Navigation}}

  * This card is based on the extinct reptile ''[[wikipedia:Casineria|Casineria]]''.
  * This is the "[[Evoltile]]" version of "[[Rescue Rabbit]]".
  * This card's effect is ironic because it summons Dinosaur-Type monsters, and Rescue Rabbit, whose effect mirrors this card's, is usually used to summon Dinosaur-Type monsters for "[[Evolzar Laggia]]" or "[[Evolzar Dolkka]]".
