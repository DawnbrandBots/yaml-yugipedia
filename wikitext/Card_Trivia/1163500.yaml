title: Card Trivia:Yorishiro of Isyria
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Monumenthes Records]]" and "[[Preparations for the Monumenthes Festival]]", as well as in the second artwork of "[[Sarcophagus of Isyria]]".
  * This monster has an [[Counterpart|upgraded]] [[Ritual Monster|Ritual]] form: "[[Isyria, Deity of the Monumenthes]]".
  ** This may be because the monster's name refers to a ''[[wikipedia:Yorishiro|yorishiro]]'', an object or entity that attracts spirits or deities in [[wikipedia:Shinto|Shinto]] terminology where this monster functions as an intermediate host for "Isyria".
