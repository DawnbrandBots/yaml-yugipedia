title: Card Trivia:MiSolfachord Eliteia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Solfachord Formal]]" and "[[Solfachord Happiness]]".
  ** This monster's chibi avatar appears in the artworks of "[[Solfachord Harmonia]]" and "[[Solfachord Symphony]]".
  * This monster is based on "''Mi''", the third syllable of the [[wikipedia:Solfège|solfège]], which reflects its [[Level]] (3).
  ** "Eliteia" starts with the English letter "E", which is based on the [[wikipedia:E (musical note)|third musical note]] of the [[wikipedia:C major|C major scale]] in the fixed solfège.
