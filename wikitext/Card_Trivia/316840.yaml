title: Card Trivia:Food Cemetery
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Cookpal Cluckwheat]]", "[[Cookpal Eggong]]", "[[Cookpal Lionion]]", "[[Cookpal Pumapotato]]", and "[[Cookpal Rabbitomato]]" appear in this card's artwork.
  * The appliance in this card's artwork is based on a warming drawer, a [[wikipedia:home appliance|kitchen appliance]] used to keep food items hot for later consumption or cooking.
  ** The shape of the appliance in this card's artwork is [[wikipedia:elephant|elephant]], likely a reference to the "[[wikipedia:Elephants' graveyard|elephants graveyard]]" where elephants congregate to die. This is reflected by the depiction of many "[[Cookpal]]" monsters congregating to this card, as well as its effect placing said "Cookpal" monsters underneath this card instead of sending them to the [[Graveyard]].
