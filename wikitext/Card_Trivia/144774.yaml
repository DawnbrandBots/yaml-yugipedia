title: Card Trivia:Limiter Overload
wikitext: |-
  {{Navigation}}

  * This card's name could be a reference to "[[Limiter Removal]]" and the "Limiter Removal"-like effect of "[[Speed Warrior]]".
  * This card has a similar effect to "[[Scramble Egg]]"; both cards are used by [[Yusei Fudo]] in the anime and correspond to a monster he first used in the first [[Duel]] of ''[[Yu-Gi-Oh! 5D's]]'' ("[[Sonic Chick]]" and "Speed Warrior" respectively).
