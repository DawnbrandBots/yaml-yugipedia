title: Card Trivia:Those We Protect
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Morphtronic Remoten]]" and "[[Sunny Pixie]]" appear in this card's artwork.
  ** This card's name and artwork represent how in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, [[Leo (manga)|Leo]] (whose [[Leo|anime counterpart]] used "Morphtronic Remoten") desires to protect [[Luna (manga)|Luna]] (whose [[Luna|anime counterpart]] uses "Sunny Pixie").
