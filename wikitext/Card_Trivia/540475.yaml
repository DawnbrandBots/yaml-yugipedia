title: Card Trivia:Inaba White Rabbit
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Hare of Inaba|Hare of Inaba]], a white hare from [[wikipedia:Japanese mythology|Japanese mythology]] whose white hair was stripped off its body after using trickery to cross the sea, and was restored by [[wikipedia:Ōkuninushi|Ōkuninushi]], the [[wikipedia:Shinto|Shinto]] god of agriculture and medicine.
