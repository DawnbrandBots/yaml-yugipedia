title: Card Trivia:"Infernoble Arms - Almace"
wikitext: |-
  {{Navigation}}

  * This sword appears in the artworks of "[[Infernoble Knight Turpin]]" (assembled) and "[[Noble Arms Museum]]".
  * This card is based on Almace, the sword of [[wikipedia:Tilpin|Tilpin]].
  ** The [[wikipedia:Katana|katana]]-like appearance of the sword may be based on certain Japanese translations of the ''[[wikipedia:Song of Roland|Song of Roland]]'', where Almace is described as a ''ko-ori no yaiba'' (氷の刃 lit. "ice blade"), a blade sharpened like ice that scatters droplets of light upon being drawn. This term has also been used to describe certain katanas, such as the the fictional ''Murasame'' from the epic novel ''[[wikipedia:Nansō Satomi Hakkenden|Nansō Satomi Hakkenden]]''.
