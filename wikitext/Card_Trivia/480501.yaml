title: Card Trivia:Zefraath
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] appears in the artworks of "[[Zefra War]]" and "[[Void Apocalypse]]".
  * This card's Japanese name is a reference to the [[wikipedia:Torah|Torah]] and [[wikipedia:Tetragrammaton|Tetragrammaton]].
  ** This card's ''[[TCG]]'' name is a reference to [[wikipedia:Da'at|Da'at]], commonly transliterated as "Daath", which is the mystical state where all ten ''[[wikipedia:Sefirot|Sephiroth]]'' are united as one.
  * This card has several unique characteristics:
  ** It is the first monster with an [[original ATK]] of 3450.
  ** It is the first [[Main Deck]] [[Pendulum Monster]] that cannot be [[Pendulum Summon]]ed and has the highest [[ATK]] of all Main Deck Pendulum Monsters. It is also the first [[Level]] 11 Pendulum Monster.
  ** It is the first card that allows its controller to conduct a second Pendulum Summon in one [[turn]].
  * This card also has several unique characteristics compared to the other "[[Zefra]]" monsters:
  ** It has a [[Pendulum Effect]] that can be activated, and without their usual restrictive effect.
  ** Its [[Pendulum Scale]] is neither 1 or 7, and is changeable through its Pendulum Effect.
  ** It is a [[Nomi]] monster.
  ** It is Level 11, matching "[[Sophia, Goddess of Rebirth]]" and "[[Tierra, Source of Destruction]]". This card's confrontation with the latter is depicted in the artwork of "Zefra War".
  *** Its Level also refers to it being the 11th "Zefra" monsters.
  ** It has two pairs of the "Zefra" wings, unlike the other members, which only have one pair.
  ** It cannot be Pendulum Summoned, but instead must be [[Special Summon]]ed by a special method that mimics [[Extra Deck]] Summoning methods. It also cannot be Summoned from anywhere else, except from the Extra Deck, despite being a Main Deck monster.
  ** It is also the only "Zefra" monster without any connection with any of the 5 [[archetype]]s ("[[Shaddoll]]", "[[tellarknight]]", "[[Yang Zing]]", "[[Nekroz]]", and "[[Ritual Beast]]") by name, making it the first and the only ''pure'' "Zefra" monster.
  ** It has the ten "Zefra" orbs in its tail.
  * According to the [[Master Guide 5 card storylines]], "[[Tellarknight Ptolemaeus]]" used the power of the 9 "[[Yang Zing]]s" to release the power of the hidden eleventh "Zefra" that was sealed into the [[Oracle of Zefra|Sephirot system]], hence the "Yang Zing" insignia on the center plate of this monster's waist armor.
  ** The eleventh "Zefra" chose "[[Shaddoll Zefracore]]" to materialize that power, hence this monster's general appearance and [[Type]]. The last three digits of this card's ATK and [[DEF]] also match those of "Zefracore".
