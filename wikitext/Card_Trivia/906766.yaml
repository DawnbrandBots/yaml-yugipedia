title: Card Trivia:Primal Dragon, the Primordial
wikitext: |-
  {{Navigation}}

  * Two [[card backing]]s (one with its color inverted) appear in this card's artwork.
  * This monster was specifically designed to [[support]] "[[Ten Thousand Dragon]]".
  ** This is reinforced by how this monster's design resembles the cosmos billowing out of "Ten Thousand Dragon's" mouth, as well as featuring a background similar to that in its card artwork, features an effect to facilitate the [[Summoning condition]] of "Ten Thousand Dragon", and were both released in Japan in October of [[2019]].
