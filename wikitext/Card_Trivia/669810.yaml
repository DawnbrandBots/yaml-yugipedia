title: Card Trivia:Cupid Serve
wikitext: |-
  {{Navigation}}

  * This monster's name and design reference the sport of [[wikipedia:Tennis|tennis]], with this monster's outfit being based on that worn by tennis players, and the [[wikipedia:Tennis ball|tennis ball]] being used as the tip of this monster's arrow.
  ** This monster's Japanese name, "Tennis Cupit" (テイ・キューピット, ''Tei Kyūpitto'') is a play on the Japanese name of "tennis" (庭球, ''teikyū'').
  ** This monster's ''[[TCG]]'' name is based on the [[wikipedia:Serve (tennis)|tennis serve]], the starting shot at the beginning of each point.
