title: Card Trivia:Duel Academy (card)
wikitext: |-
  {{Navigation}}

  [[File:Duel_Academy.png|thumb|right|250|[[Duel Academy]], in the ''[[Yu-Gi-Oh! GX]]'' anime.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * [[Duel Academy]] appears in this card's artwork.
  ** This card's artwork also depicts the [[Abandoned Dorm]] and the [[Duel Academy power plant]], which were not shown in the full-island views of Duel Academy in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * Each of this card's effects are a reference to one of the three dorms of Duel Academy in the ''Yu-Gi-Oh! GX'' anime; the first required two [[Type]]s of each effect are a reference to the Types of monsters used by two [[Duelist]]s of a dorm, while the third Type is based on the [[Sacred Beast]] [[counterpart]] of the respective [[Egyptian God]] which each dorm was based on.
  ** 1st effect: [[Slifer Red]]
  *** [[Warrior]]: [[Jaden Yuki]] ("[[Elemental HERO]]")
  *** [[Beast]]: [[Chumley Huffington]] ("[[Koala]]")
  *** [[Pyro]]: "[[Uria, Lord of Searing Flames]]" (counterpart of "[[Slifer the Sky Dragon]]")
  ** 2nd effect: [[Ra Yellow]]
  *** [[Dinosaur]]: [[Tyranno Hassleberry]]
  *** [[Sea Serpent]]: [[Bastion Misawa]] ("[[Water Dragon (anime)|Water Dragon]]")
  *** [[Thunder]]: "[[Hamon, Lord of Striking Thunder]]" (counterpart of "[[The Winged Dragon of Ra]]")
  ** 3rd effect: [[Obelisk Blue]]
  *** [[Machine]]: [[Zane Truesdale]] ("[[Cyber Dragon (archetype)|Cyber Dragon]]")
  *** [[Fairy]]: [[Alexis Rhodes]] ("[[Cyber Angel]]")
  *** [[Fiend]]: "[[Raviel, Lord of Phantasms]]" (counterpart of "[[Obelisk the Tormentor]]")
  * Each of this card's effects are based on the [[Summoning condition]]s and one of the effects of the corresponding Sacred Beast.
  ** [[Destroy]]ing an opponent's card if the player [[activate]]s a [[Trap Card]]: the effect of "Uria, Lord of Searing Flames" to destroy an opponent's Spell/Trap Card, and its Summoning condition of [[send]]ing 3 [[Trap Card]]s to the [[Graveyard]].
  ** Inflicting 1000 [[Effect damage|damage]] to the opponent if the player activates a [[Spell Card]]: the effect of "Hamon, Lord of Striking Thunder" to inflict 1000 damage to the opponent if it destroys a monster by battle, and its Summoning condition of sending 3 Spell Cards to the Graveyard.
  ** Making one of the player's monsters gain 1000 [[ATK]] if they activate a [[monster effect]]: the effect of "Raviel, Lord of Phantasms" to Tribute a monster and gain its [[original ATK]], and its Summoning condition of Tributing 3 monsters.
