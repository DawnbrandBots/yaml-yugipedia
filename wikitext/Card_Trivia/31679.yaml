title: Card Trivia:Psychic Commander
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Psi-Impulse]]", "[[Overdrive Teleporter]]" and "[[Psychic Arsenal]]".
  * This card's Japanese artwork had an open hand instead of a pointing hand, but was altered because of its connotations of [[wikipedia:Adolf Hitler|Adolf Hitler]]'s men and how they saluted him.
