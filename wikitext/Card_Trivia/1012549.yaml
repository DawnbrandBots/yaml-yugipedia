title: Card Trivia:Elegant Light LV4
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Light Trap Level 4" (誘蛾灯 レベル４, ''Yūgatō Reberu Yon'') is based on a trap used to catch insects, attracted to the light within them.
  ** This card's international name is based on a different interpretation of the first two kanji of its Japanese name (優雅, ''Yūga''), which translates to "elegant", "graceful", or "refined".
