title: Card Trivia:Nemleria Dream Devourer - Reveil
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Nemleria Repeter]]".
  * This monster is named after "réveil", short for ''réveil-matin'', the French word for "[[wikipedia:Alarm clock|alarm clock]]", which is embedded in its torso.
  * According to [[The Valuable Book EX 4 card storylines|''The Valuable Book EX 4'' card storylines]], this monster is trying to prevent "[[Dreaming Nemleria]]" from dreaming, possibly by waking her up, the reason for having the alarm clock embedded in its body. This is reflected by the cost of its effect, [[banish]]ing [[Extra Deck]] monsters and preventing their Summoning, which most of the "[[Nemleria]]" [[archetype]] makes easier.
