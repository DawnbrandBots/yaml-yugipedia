title: Card Trivia:Allegro Toile
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is based on the [[wikipedia:Tempo|musical tempo]], "allegro", keeping in relation with the dance and music theme of [[Alexis Rhodes]]' Deck in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** The word "allegro" is the Italian word meaning "fast" or "quickly", often used as a term for the musical tempo that generally falls within the range of 120–168 beats per minute, which reflects this card's [[Quick-Play Spell Card]] [[Card type|type]] and its effect to "quickly" [[destroy]] a [[Spell]]/[[Trap Card]] on the [[field]] after a monster is [[Normal Summon]]ed.
