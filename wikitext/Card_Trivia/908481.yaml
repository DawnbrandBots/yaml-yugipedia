title: Card Trivia:Reign-Beaux, Overking of Dark World
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Devil's Gate]]''/''[[Structure Deck: Dark World]]''.
  * This monster appears in the artwork of "[[Dark World Punishment]]".
  * This is an upgraded counterpart of "[[Reign-Beaux, Overlord of Dark World]]" who, according to his protector ''[[Yu-Gi-Oh! Master Duel]]'', has obtained power matching the [[Grapha, Dragon Lord of Dark World|Dragon]] [[Grapha, Dragon Overlord of Dark World|Lord]].
