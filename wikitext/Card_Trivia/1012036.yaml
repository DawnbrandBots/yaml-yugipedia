title: Card Trivia:Floowandereeze & Stri
wikitext: |-
  {{Navigation}}

  * This monster's name and design is based on the [[wikipedia:Common ostrich|common ostrich]], a species of bird found in [[wikipedia:Africa|Africa]].
  ** Fittingly, the background of this card's artwork depicts an [[wikipedia:Adansonia|adansonia tree]] marked on Africa on the map appearing in the artwork of "[[Floowandereeze and the Magnificent Map]]".
