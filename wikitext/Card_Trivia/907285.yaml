title: Card Trivia:Nadir Servant
wikitext: |-
  {{Navigation}}

  * "[[Dogmatika Ecclesia, the Virtuous]]", "[[Dogmatika Fleurdelis, the Knighted]]", and the silhouette of "[[Titaniklad the Ash Dragon]]" appear in this card's artwork.
  ** This card's artwork depicts the start of the "Abyss" storyline: "[[Fallen of Albaz]]" descends from the sky through the "Hole" and ends up crashing in the "[[Dogmatika Nation]]" as "Titaniklad", while "Ecclesia" and "Fleurdelis" are witnessing his descent. The events in this card's artwork are continued in the artwork of "[[Dogmatika Punishment]]".
  * The [[wikipedia:nadir|nadir]] is the direction below in respect to a horizontal plane. In the context of astronomy and other sciences that deal with the Earth's curved surface, it is used to indicate the spot of the sky that is directly under an observer and at the opposite of the [[wikipedia:zenith|zenith]], which would be the zenith for another observer at the [[wikipedia:antipode|antipode]] of the first.
