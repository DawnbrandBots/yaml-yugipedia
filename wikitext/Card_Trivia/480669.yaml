title: Card Trivia:Fairy Tail - Luna
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fairy Tail Ball]]", "[[Fairy Tale Tails]]", and "[[Weaver of Fairy Tails]]".
  * This monster is based on the Japanese ''[[wikipedia:Monogatari|monogatari]]'' ''[[wikipedia:The Tale of the Bamboo Cutter|The Tale of the Bamboo Cutter]]''.
  ** This monster's Japanese name "Kaguya" is based on how the ''monogatari'' is also named "The Tale of Princess Kaguya", while its ''[[TCG]]'' name is based on the Latin word for "Moon" from which Princess Kaguya serves as its princess.
  ** This monster's [[Quick Effect]] references a portion of the plot of ''The Tale of the Bamboo Cutter'', where Princess Kaguya is visited by five suitors asking for her hand in marriage.
  *** This monster's effect, forcing the opponent to [[send]] a copy of the [[target]]ed monster from the [[Main Deck]] or [[Extra Deck]] to the [[Graveyard]] to [[negate]] its effect, reference how Princess Kaguya gives her suitors impossible tasks for them to fulfill in order to accept their marriage proposal. Its additional effect, [[return]]ing both it and the targeted monster back to the [[hand]] if the opponent fails to send a monster with the same name to the Graveyard, reference how the suitors were unable to complete their tasks.
  * Due to its archaic theme, this monster features a scroll in its tail, instead of a book like the other [[Fairy Tail]] monsters.
  ** This monster's scroll features the hiragana, "''ka''" (か), possibly short for its Japanese name, "Kaguya".
  * This is first member of the "[[Fairy Tail]]" [[archetype]] to not be related to [[wikipedia:Grimms' Fairy Tales|Grimms' Fairy Tales]].
