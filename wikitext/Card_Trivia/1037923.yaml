title: Card Trivia:Ultimate Baseball Homerun King
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Ultimate Baseball Kid]]".
  ** This monster's uniform references the uniforms worn by the [[wikipedia:Yomiuri Giants|Yomiuri Giants]], a Japanese professional baseball team who use the [[wikipedia:Tokyo Dome|Tokyo Dome]] as their home field, which is where the ''Yu-Gi-Oh! Duel Monsters: The Legend of Duelist Quarter Century'' event took place.
  * This monster's Japanese name, "Super Hot-Blooded Artist" ({{Ruby|超|ちょう}}{{Ruby|熱|ねっ}}{{Ruby|血|けつ}}{{Ruby|本塁打王|アーチスト}}, ''Chōnekketsu Āchisuto''), features the word "Artist" ({{Ruby|本塁打王|アーチスト}}, ''Āchisuto''), which is used to refer to baseball players who regularly hits home runs.
  ** As such, "Artist" is coined as a portmanteau of the words "arch" (referencing the arch-shaped trajectory of a hit baseball) and "artist".
