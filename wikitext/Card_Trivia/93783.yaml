title: Card Trivia:Shining Rebirth
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Avenging Knight Parshath]]", "[[Guardian Angel Joan]]", and "[[Hanewata]]" appear in this card's artwork.
  ** Fittingly, "Guardian Angel Joan" and "Hanewata" can be used as [[Synchro Material]]s to [[Synchro Summon]] "Avenging Knight Parshath".
  * This is the first card to feature an effect that allows the player to Synchro Summon from the [[Graveyard]].
