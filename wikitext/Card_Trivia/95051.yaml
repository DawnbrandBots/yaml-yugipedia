title: Card Trivia:Ayers Rock Sunrise
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Uluru|Uluru]], also known as Ayers Rock, a large sandstone rock formation in [[wikipedia:Australia|Australia]].
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this card was created by [[Chumley Huffington]], who used this card in [[Yu-Gi-Oh! GX - Episode 050|its debut episode]].
  * In the ''[[Yu-Gi-Oh! Tag Force]]'' video games, this card was named "Ayer's Rock Sunrise".
