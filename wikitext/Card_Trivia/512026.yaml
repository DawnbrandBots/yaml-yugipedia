title: Card Trivia:Ultimate Obedient Fiend
wikitext: |-
  {{Navigation}}

  * This monster's hand appears in the artwork of "[[Obligatory Summon]]".
  * This monster's design is based on the classic stereotypical depiction of the [[wikipedia:Devil|Devil]] in works of fiction, where it is depicted as a humanoid creature with horns, a goatee, and a red color scheme.
  ** Despite this, this monster's horns were not edited out from this card's international artwork.
  * Despite its name, this monster can only attack when it is the only card on the player's [[field]] and the player has no cards in their [[hand]].
