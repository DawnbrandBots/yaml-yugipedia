title: Card Trivia:U.A. Playmaker
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Quarterback|quarterback]], the leader of the offensive team in [[wikipedia:Gridiron football|North American football]], who is often responsible for dictating their team's plays.
  ** In this sense, the quarterback is essentially the [[wikipedia:Playmaker|playmaker]] in North American football.
  * This monster appears in the artworks of "[[Defense Zone]]", "[[F.A. Winners]]" and "[[Loss Time]]".
