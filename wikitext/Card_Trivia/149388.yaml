title: Card Trivia:Doppelwarrior
wikitext: |-
  {{Navigation}}

  * This card's name is based on a [[wikipedia:Doppelgänger|doppelgänger]], the biologically unrelated look-alike of a living person, reflecting the second faded image of this monster in this card's artwork.
  ** "Doppelgänger" is a German word in origin, reflecting this monster's design resembling a German ''[[wikipedia:Wehrmacht|Wehrmacht]]'' soldier wearing a ''[[wikipedia:Stahlhelm|Stahlhelm]]'' helmet.
  * The combined [[Level]] (1) and [[ATK]]/[[DEF]] (400/400) of the two "[[Doppel Token]]s" summoned by this card's second effect are equal to this card's Level (2) and ATK/DEF (800/800).
