title: Card Trivia:Bombardment Beetle
wikitext: |-
  {{Navigation}}

  * The Spanish lore of this card has two typos, as the words "''destrúyela''" y "''devuélvela''" are printed without their respective diacritical marks.
  * Based on its Japanese name, this monster is based on the [[wikipedia:Pentatomidae|stink bug]].
  ** This monster may also be based on the [[wikipedia:Deathwatch beetle|deathwatch beetle]] (named after the ticking sound it produces, similar to a [[wikipedia:Watch|watch]]), as potentially indicated by both the [[wikipedia:Clock face|clock face]] on its back with a skull in its center and its English name (although there are some beetles with the misnomer of "stink bug").
