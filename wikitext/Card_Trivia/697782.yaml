title: Card Trivia:Red Reign
wikitext: |-
  {{Navigation}}

  * "[[Red Nova Dragon]]" appears in this card's artwork.
  * This card's name is based on a "[[wikipedia:Reign|reign]]" a period in which a kingdom is ruled by a monarch, referencing [[Jack Atlas]]'s title as "King".
  ** The word "reign" is homophonic to the word "rain", which is reflected in this card's artwork depicting "Red Nova Dragon" and "raining" meteors.
  ** This card's Japanese name, "Scar-Red Reign" is based on [[Red Nova]], a demon also known as "Scar-Red Nova" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime whose power is used to create "Red Nova Dragon".
