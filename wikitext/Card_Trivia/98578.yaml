title: Card Trivia:Jurrac Titano
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Jurrac Volcano]]", presumably transforming into "Jurrac Meteor" (according to [[Duel Terminal Master Guide card storylines#They Used Magma to Turn Their Bodies into a Blazing Projectile|''Duel Terminal Master Guide'' card storylines]]).
  * This monster is based on the ''[[wikipedia:Tyrannotitan|Tyrannotitan]]'', a member of the [[wikipedia:Carcharodontosauridae|carcharodontosauridae]] family, a group of large and carnivorous bipedal dinosaurs that rival the ''[[wikipedia:Tyrannosaurus|Tyrannosaurus]]'' in size.
  ** Fittingly, this monster has the highest [[Level]] (9) and [[original ATK and DEF]] (3000/2800) of all "[[Jurrac]]" [[Main Deck]] monsters.
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form: "[[Jurrac Meteor]]".
  * This monster has an "[[lswarm]]" [[counterpart]]: "[[Evilswarm Salamandra]]".
