title: Card Trivia:Red-Eyes Pluto Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed [[Effect Monster]] counterpart of "[[Red-Eyes Black Dragon (Rush Duel)|Red-Eyes Black Dragon]]".
  ** This monster is named after [[wikipedia:Pluto|Pluto]], the most famous of the [[wikipedia:dwarf planet|dwarf planet]]s in the [[wikipedia:Solar System|Solar System]].
  *** This monster's name is also based on the [[Guardian Star]] Pluto, which is the second Guardian Star of "[[Summoned Skull (FMR)|Summoned Skull]]" (a member of the [[Red-Eyes (Rush Duel)|Red-Eyes series]] in <i>[[Yu-Gi-Oh! Rush Duel]]</i>), in ''[[Yu-Gi-Oh! Forbidden Memories]]''.
  *** This monster's base kanji name features 「冥竜」(lit. "nether dragon"), referencing how the planet Pluto is named after [[wikipedia:Pluto (mythology)|the Roman god of the underworld]], and is accordingly called "Meiōsei" (冥王星, lit. "Nether[world] King's Star") in Japanese.
