title: Card Trivia:Dragunity Arma Gram
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragunity Glow]]".
  * "[[Dragon Ravine]]" can be seen in this card's background.
  * This is the [[cover card]] of ''[[Structure Deck R: Dragunity Drive]]''.
  ** This card is a [[Card evolutions|retrained version]] of "[[Dragunity Arma Leyvaten]]", since all Decks from the ''[[Structure Deck R]]'' series have at least one retrained version of a monster from the original Structure Deck and that new version is commonly used as the cover card for the corresponding Structure Deck.
  * This monster is named after ''[[wikipedia:Gram (mythology)|Gram]]'', the sword that [[wikipedia:Sigurd|Sigurd]] used to kill the dragon [[wikipedia:Fafnir|Fafnir]].
