title: Card Trivia:Vylon Stella
wikitext: |-
  {{Navigation}}

  * "[[Laval Stennon]]" wears armor that seems to resemble this Tuner. This may be a reflection of the promotional material for the set both of them are released in, which suggests that the "[[Steelswarm]]" are at war with the other teams, who are allied against them.
  * This is the only [[Vylon]] Tuner to not have its [[ATK]] equal to its [[DEF]].
  ** The fact that this card has 200 DEF is a also possible reference to the fact it was designed to work with the [[Laval]]s: [[FIRE]] [[Attribute]] monsters with 200 DEF.
  * This card's name is based on a star.
  ** This card's name comes from "stellation", the process of creating new polyhedrals in three dimensions; a fitting name since all "[[Vylon]]" Tuner Monsters are shaped like polyhedrals.
  ** This card's name also sounds like "stellar," which would explain this card's star-shaped appearance.
  ** "Stella" is the Italian word for "star".
