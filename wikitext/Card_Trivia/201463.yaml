title: Card Trivia:Incornceivable
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The tentacle of "[[Giant Kra-Corn]]" appears in this card's artwork.
  ** Fittingly, this card's effects are incorporated into the ''[[OCG]]''/''[[TCG]]'' [[Special Summon]]ing effect of "Giant Kra-Corn".
  * This card's Japanese name ({{name|Incornceivable|ja}}, ''{{romanized name|Incornceivable|ja}}'') is a portmanteau of「コーン」(''kōn'', lit. "corn") and「こんなバカな」(''Konna bakana!'', lit. "inconceivable!").
