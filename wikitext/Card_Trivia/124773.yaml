title: Card Trivia:Wasteland
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:desert|desert]], a barren terrain featuring [[Rock|sand]] and the [[Zombie|skeletal remains]] of [[Dinosaur|creatures]] that perished in that area.
  ** This card is also based on the [[Desert]] [[terrain]] in the original ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This card has a [[Skill Card]] counterpart: "[[Straight to the Grave]]".
