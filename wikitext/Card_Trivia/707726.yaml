title: Card Trivia:Titanocider
wikitext: |-
  {{Navigation}}

  * "[[Apollousa, Bow of the Goddess]]" appears in this card's artwork.
  * This card's name is derived from the word "Titan", meaning a person of great strength or importance, and the suffix "cidal", meaning an action involving killing.
  * This card depicts a scene from the Gigantomachy of Greek mythology, where Artemis killed the giant Gration with a brutal rain of arrows.
