title: Card Trivia:Manticore of Darkness
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bunch of Beast Bodies]]", "[[Return from the Different Dimension]]", "[[The Big Cattle Drive]]","[[Threatening Roar]]", and "[[Wall of Disruption]]".
  ** This monster's arm appears in the artworks of "[[Smashing Ground]]" and "[[Smashing Horn]]".
  ** This monster's foot appears in the artwork of "[[The Return to the Normal]]".
  * This monster is based on the [[wikipedia:Manticore|manticore]], a creature from [[wikipedia:Greek mythology|Greek mythology]] who is depicted with a the body of a lion, the wings of a bat, and the tail of a scorpion.
  * This monster has a [[retrained]] counterpart: "[[Manticore of Smashing]]".
