title: Card Trivia:Orca Mega-Fortress of Darkness
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Big Wave Small Wave]]", "[[Heartless Drop Off]]", "[[Return from the Different Dimension]]", and "[[Salvage]]".
  ** A chibi version of this monster appears in the artwork of "[[Live☆Twin Channel]]".
  * "[[Torpedo Fish]]", multiple copies of "[[Cannonball Spear Shellfish]]", and "[[Amphibious Bugroth MK-3]]" appear in this card's artwork.
