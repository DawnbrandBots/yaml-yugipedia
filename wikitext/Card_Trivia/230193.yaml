title: Card Trivia:Breakthrough Skill
wikitext: |-
  {{Navigation}}

  * "[[Evolzar Dolkka]]" appears in this card's artwork.
  ** This monster making an appearance on this card is fitting because both cards can negate monster effects twice.
  ** "Dolkka" is shown breaking out of what appears to be an egg, which is a reference to the [[Dinosaur]] theme of the "[[Evol]]" [[archetype]].
