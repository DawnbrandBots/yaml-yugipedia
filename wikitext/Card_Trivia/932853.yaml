title: Card Trivia:Destructor Wyrm Bakhamut
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Demolition Art - Absolute Destruction]]", "[[Demolition Barricade]]", and "[[Demolition Fortified Armor]]".
  * This monster's Japanese name (バクハムート, ''Bakuhamūto'') is a portmanteau of the Japanese words "''Bakuha''" (爆破, lit. "Destructive Explosion") and "''Bahamūto''" (バハムート, lit. "Bahamut").
  * In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, this monster's [[Summon chants in Yu-Gi-Oh! GO RUSH!!|Summoning chant]] features the same passage used for the [[Summon chants in Yu-Gi-Oh! SEVENS|Summoning chant]] of "[[Wyrm Excavator the Heavy Cavalry Draco]]" in the original Japanese version of the ''[[Yu-Gi-Oh! SEVENS]]'' anime: ''Cry! Resound! O dragon of black steel!'' ({{Ruby|鳴|な}}け！{{Ruby|響|ひび}}け！{{Ruby|黒|くろ}}{{Ruby|鉄|がね}}の{{Ruby|竜|りゅう}}よ, ''Nake! Hibike! Kurogane no ryū yo!'').
