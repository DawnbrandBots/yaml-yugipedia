title: Card Trivia:Exxod Fires of Rage
wikitext: |-
  {{Navigation}}

  * "[[The Legendary Exodia Incarnate]]" and three copies of "[[Blue-Eyes White Dragon]]" appear in this card's artwork.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "[[Exodia the Forbidden One]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This card's artwork is based on a scene during [[Dark Yugi (manga)|Dark Yugi]] and [[Seto Kaiba (manga)|Seto Kaiba]]'s Duel in the ''Yu-Gi-Oh!'' manga and anime where "Exodia" is Summoned for the first time and unleashes its "Exodia Flame" attack to [[destroy]] Kaiba's three "Blue-Eyes White Dragons" and cause Yugi to automatically win the Duel.
