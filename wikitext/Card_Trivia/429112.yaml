title: Card Trivia:Vennu, Bright Bird of Divinity
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Primal Cry]]".
  * Vennu is likely a mistranslation of Bennu, an ancient Egyptian deity connected with the concepts of the Sun, creation, and rebirth, and is possibly the inspiration of the Phoenix from Greek mythology. According to Ancient Egyptian mythology, the cry of Bennu marked the beginning of creation.
