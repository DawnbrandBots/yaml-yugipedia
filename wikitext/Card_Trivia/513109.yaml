title: Card Trivia:Convert Contact
wikitext: |-
  {{Navigation}}

  * The monsters "[[Vorse Raider]]", "[[Swordstalker]]" and "[[Kaiser Sea Horse]]", along with the cards "[[Neo-Spacian Flare Scarab]]", "[[Neo Space]]", and "[[Common Soul]]", appear in this card's artwork.
  ** "Neo Space" is replaced by "[[Flash Fusion]]" in this card's international anime artwork.
  ** The monsters are all cards used by [[Seto Kaiba]], while the cards in the player's hand are all cards used by [[Jaden Yuki]].
