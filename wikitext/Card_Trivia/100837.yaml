title: Card Trivia:Elemental HERO The Shining
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.5]]''.
  * This monster has a [[DARK]] [[counterpart]]: "[[Elemental HERO Escuridao]]".
  ** Both have effects that allow them to gain [[ATK]] for each "[[Elemental HERO]]" monster that is not in the [[hand]] or [[field]]: this monster gains ATK equal to the number of [[banish]]ed "Elemental HERO" monsters, while "Escuridao" gains ATK equal to the number of "Elemental HERO" monsters in the [[Graveyard]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|041|ref}}, specifically from the panel showing [[Elemental Hero The Shining (manga)|this monster]] being Summoned.
