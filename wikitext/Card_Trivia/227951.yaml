title: Card Trivia:Slacker Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Xyz Tribalrivals]]", "[[Arrivalrivals]]", "[[Staring Contest]]", and "[[Get Out!]]".
  * This card's Japanese name comes from the term "[[:wikipedia:NEET|NEET]]", which refers to an out-of-school and unemployed young person.
  * This card has the highest [[DEF]] of all Rank 1  [[Xyz Monster]]s.
  ** This was also the first Rank 1 Xyz Monster that doesn't need 3 [[Xyz Material]]s to Summon.
  * According to the [[Master Guide 4 promotional cards|Master Guide 4]] monster stories,<ref>[http://www.ygorganization.com/monsterstories/ YGOrganization] - [OCG] Master Guide 4 - Monster Stories</ref> "Slacker Magician" is the rival and best-friend of "[[Alchemic Magician]]". Both are well-known potion masters who studied together and now run a potion shop. However, due to her introverted personality, "Slacker Magician" stopped working, staying at her house all day long. After the incessant attempts of "Alchemic Magician" to cheer her up, she returned to business, while also creating the popular potion "[[Stim-Pack]]".
  ** In fact, "Stim-Pack", or an early variant of the potion, possibly appears in this card's artwork.
  * "[[Downerd Magician]]" is an upgraded form of this card.
  ** The fact that you can [[Xyz Summon]] "Downerd Magician" by using this card in the [[Main Phase 2]] can imply that it wanted to slack off and not do battle, but finally decided to be productive later.
  ** To further support this, "Downerd Magician" has the reversed ATK and DEF of this card.

