title: Card Trivia:Harmonic Synchro Fusion
wikitext: |-
  {{Navigation}}

  * The orange monsters and the blue swirling patterns from the artwork of "[[Polymerization]]" and the [[Synchro Summon]]ing rings from the ''[[Yu-Gi-Oh! ARC-V]]'' anime appear in this card's artwork.
  ** The background of this card's artwork resembles the background used during the sequences when a [[Synchro Monster]] is Synchro Summoned in the ''Yu-Gi-Oh! ARC-V'' anime.
  * This card's name and artwork reflect how its effect can be used to [[Special Summon]] two different monsters from two different [[Extra Deck]] Special Summoning methods in harmony.
