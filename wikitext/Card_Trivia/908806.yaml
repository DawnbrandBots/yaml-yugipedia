title: Card Trivia:Albaz the Shrouded
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Alba Strike Recollections of Fate Pack]]''.
  * "[[Fallen of Albaz]]" appears in this card's artwork.
  ** This card's [[flavor text]] is a reference to the two parts of this card's name: the kanji ''Kokui'' ({{Ruby|黒|こく}}{{Ruby|衣|い}}, "black-shrouded"), which refers to the ''past buried in darkness'', and "Albus" (アルバズ, "white"), which refers to the ''bright future'', since it can also be interpreted as "alba" ("dawn").
  ** This card's name is also a reference to "[[Albion the Shrouded Dragon]]", one of the [[Albaz Dragon|draconic]] forms of "Fallen of Albaz".
  ** This card's artwork is the other half of the artwork of "[[Ecclesia the Exiled]]", as indicated by the same fire, skeleton, and background.
  *** The gigantic skeleton that appears in this card's artwork is also similar to the ones that appear in the artwork "[[Great Sand Sea - Gold Golgonda]]".
  * This card has a [[counterpart]]: "[[Aluber the Dogmatic]]".
  ** Both monsters also have mirrored poses in their card artworks.
