title: Card Trivia:Dragon Knight of Creation
wikitext: |-
  {{Navigation}}

  * This monster has a [[Spellcaster]] [[counterpart]]: "[[Herald of Creation]]".
  ** Both share the same [[Attribute]] ([[LIGHT]]) and [[Level]] (4).
  ** Both share a "creation" theme and a relation to the [[Felgrand]] [[series]].
  ** The symbol on the crossguard of this monster's sword is based on that appearing on the tip of the staff wielded by "Herald of Creation".
