title: Card Trivia:The Monarchs Revolt
wikitext: |-
  {{Navigation}}

  * "[[Caius the Shadow Monarch]]", "[[Eidos the Underworld Monarch]]", "[[Erebus the Underworld Monarch]]", "[[Mobius the Frost Monarch]]", "[[Raiza the Storm Monarch]]", and "[[Thestalos the Firestorm Monarch]]" appear in this card's artwork.
  ** The event depicted in this card's artwork likely follows that of "[[The Monarchs Masterplan]]".
  *** "[[Granmarg the Rock Monarch]]" and "[[Zaborg the Thunder Monarch]]" are the only [[monsters]] depicted in "The Monarchs Masterplan" that do not appear in this card's artwork, likely because their height would have obstructed the scene.
