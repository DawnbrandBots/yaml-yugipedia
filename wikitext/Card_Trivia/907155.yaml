title: Card Trivia:Ghost Meets Girl - A Masterful Mayakashi Shiranui Saga
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Magnificent Mavens]]''.
  * "[[Shiranui Squire]]", "[[Yoko, the Graceful Mayakashi]]", and "[[Yuki-Onna, the Icicle Mayakashi]]" appear in this card's artwork.
  ** The naginata that originally belonged to "[[Shiranui Skillsaga Supremacy]]" appears in this card's artwork.
  ** "Shiranui Squire" is wielding the same sword seen in the possession of "[[Shiranui Samurai]]" and "[[Shiranui Swordmaster]]".
  ** This card appears to depict the aftermath of the events depicted in "[[Ghost Meets Girl - A Mayakashi's Manuscript]]". "Yuki-Onna" has stolen the naginata of "Skillsaga Supremacy" and is about to use its power to transform into "[[Yuki-Onna, the Absolute Zero Mayakashi]]", while the latter has lost her powers, reverting to "Shiranui Squire", and without her naginata is forced to use her tribe's ancestral sword instead.
