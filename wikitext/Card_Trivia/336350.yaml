title: Card Trivia:Performapal Salutiger
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Soldier Tiger" (ヘイタイガー ''Heitaigā'') is a portmanteau of the words "soldiers" (兵隊 ''heitai'') and "tiger" (タイガー ''taigā'').
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "salute" and "tiger".
  ** The above-mentioned names reflect this monster's appearance as a tiger wearing soldier's clothing, who is depicted giving a typical soldier's salute. This in turn also reflects its effect to "call forth a troop of soldiers" by [[add]]ing a "[[Performapal]]" [[Pendulum Monster]] from the [[Deck]] to the [[hand]].
