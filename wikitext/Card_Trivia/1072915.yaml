title: Card Trivia:Wandering Titan of Tartarus
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Titans|Titans]] of [[wikipedia:Greek mythology|Greek mythology]], who were defeated by the [[wikipedia:Twelve Olympians|Olympian gods]] and imprisoned in [[wikipedia:Tartarus|Tartarus]], an abyssal pit deep within the [[wikipedia:Greek underworld|Greek underworld]].
  * This monster is very similar to the ''[[wikipedia:Magic: the Gathering|Magic: the Gathering]]'' creature card "[https://scryfall.com/card/thb/229/uro-titan-of-natures-wrath Uro, Titan of Nature's Wrath]", which also shares the same inspiration. They have nearly identical bodies depicted in mirrored poses, and both have an effect/ability that [[Special Summon]]s themselves from the [[Graveyard]].
