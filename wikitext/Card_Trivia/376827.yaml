title: Card Trivia:Crystal Wing Synchro Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Shining Victories]]'', as well  as one of the cover cards of ''[[Battles of Legend: Light's Revenge]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Clear Wing Synchro Dragon]]".
  ** This card is similar to "[[Shooting Star Dragon]]", the upgraded form of "[[Stardust Dragon]]": this card requires 1 [[Tuner monster]] and 1 or more non-Tuner [[Synchro Monster]]s as [[Synchro Material]]s, while "Shooting Star Dragon" requires 1 [[Tuner Synchro Monster]] and "Stardust Dragon".
  * This card has a "[[Clear Wing]]" counterpart: "[[Crystal Clear Wing Synchro Dragon]]".
  ** This card's effect can [[negate]] any [[monster effect]] and [[destroy]] that card, while the effect of "Crystal Clear Wing Synchro Dragon" can negate the activation or effect of a [[Spell]]/[[Trap Card]] and [[destroy]] it.
  * This card has an "[[Odd-Eyes]]" [[Synchro Pendulum Monster|Synchro Pendulum]] [[counterpart]]: "[[Odd-Eyes Wing Dragon]]".
  * This card is the [[Synchro Dimension]] counterpart of "[[Dark Requiem Xyz Dragon]]" and "[[Greedy Venom Fusion Dragon]]".
  ** They are the evolved form of one of the [[Four Dimensional Dragons]]: "Clear Wing Synchro Dragon" for this card, "[[Dark Rebellion Xyz Dragon]]" for "Dark Requiem", and "[[Starving Venom Fusion Dragon]]" for "Greedy Venom".
  ** They are 1 [[Level]]/[[Rank]] higher than their base form, and have 3000 [[ATK]] and 2500 [[DEF]], except "Greedy Venom", which is 2 Levels higher and has 3300 ATK.
  ** They have effects that increase their ATK equal to an opponent's monster's ATK, except "Greedy Venom", which decreases the opponent's monster's ATK.
  ** In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, they all debuted during a [[Duel]] against someone from the [[Fusion Dimension]] that took place in their corresponding [[Four Dimensions|dimension]].
  *** This card debuted in [[Yugo]]'s Duel against [[Celina]] in the Synchro Dimension, in {{episode|ARC-V|085|ref}}.
  *** "[[Dark Requiem Xyz Dragon (anime)|Dark Requiem Xyz Dragon]]" debuted in [[Yuya Sakaki]]/[[Yuto]]'s Duel against [[Aster Phoenix (ARC-V)|Aster Phoenix]] in the [[Xyz Dimension]], in {{episode|ARC-V|110|ref}}.
  *** "[[Greedy Venom Fusion Dragon (anime)|Greedy Venom Fusion Dragon]]" in [[Yuri]]'s Duel against Aster Phoenix, [[Kite Tenjo (ARC-V)|Kite Tenjo]], and Yugo in the Fusion Dimension, in {{episode|ARC-V|130|ref}}.
  ** They were all created when Yuya entered a state of mind with one of his [[dimensional counterparts]].
  *** This card was created after Yuya [[Synchronize (ability)|synchronized]] with Yugo.
  *** "Dark Requiem" was created after Yuya was possessed by Yuto.
  *** "Greedy Venom" was created by Yuri on his own, although Yuya was [[awakened]] at the time.
  ** In the anime, they were Summoned using their corresponding base form and a card of the archetypes their owner used.
  *** "[[Speedroid Red-Eyed Dice (anime)|Speedroid Red-Eyed Dice]]" of the "[[Speedroid]]" monsters for this card.
  *** "[[The Phantom Knights' Rank-Up-Magic Launch (anime)|The Phantom Knights' Rank-Up-Magic Launch]]" of the "[[The Phantom Knights]]" monsters for "Dark Requiem".
  *** "[[Predaplant Sarraceniant (anime)|Predaplant Sarraceniant]]" of the "[[Predaplant]]" monsters for "Greedy Venom", via "[[Super Polymerization (later anime)|Super Polymerization]]".
  * This card is one of two upgraded forms of the Four Dimensional Dragons that were not used by Yuya Sakaki in the anime, the other being "Greedy Venom Fusion Dragon".
  ** However, Yugo first Summoned this card when he was synchronized with Yuya, in {{episode|ARC-V|085|ref}}, while Yuri Summoned "Greedy Venom" on his own, in {{episode|ARC-V|130|ref}}.
