title: Card Trivia:Big Shield Gardna
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Broken Blocker]]", "[[Defender's Mind]]", "[[Guard Change]]", and "[[Guard Off]]".
  * This card appears in the original anime artwork of "[[Montage Dragon]]".
  * This monster has a downgraded counterpart: "[[Mid Shield Gardna]]".
  ** This monster also has a ''[[Rush Duel]]'' counterpart: "[[Long Shield Gardna]]".
  * The ''[[Dark Beginning 1]]'' version of this card is misnamed 'Guardna' with a 'u' as the 2nd letter.
  ** According to a [http://www.pojo.biz/board/showthread.php?p=1871737#post1871737 Pojo post] by [[Kevin Tewart]], this was attributed to a lack of communication between Konami and him, since Konami "thought it needed to be fixed and were in a hurry."
  * This is one of the few cards that has an effect which can be [[activate]]d while it is [[face-down]].
