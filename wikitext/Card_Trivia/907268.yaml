  {{Navigation}}

  * This monster is based on [[wikipedia:Vayu|Vayu]], the god of the wind in [[wikipedia:Hindusim|Hindusim]].
  * When this monster had extra "[[Vijam the Cubic Seed]]" underneath it, it grew an additional set of wings for each surplus "Vijam".
