title: Card Trivia:Artmage Non-Finito
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Artmage Impasto -Recapture-]]", "[[Dead-End Power Patron Realm - Viraia]]" and "[[Pasto-Ral Theorealize]]".
  * This monster's name is based on ''[[wikipedia:Non finito|non finito]]'', a sculpting technique derived from the Italian term meaning "not finished", where the sculpture is deliberately left unfinished.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Artmage Finmel]]" after inheriting the power of "[[Nerva the Power Patron of Creation]]".
  ** This monster has a "[[Medius the Pure]]" counterpart: "[[Artmage Diactorus]]".
