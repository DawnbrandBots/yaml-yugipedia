title: Card Trivia:Ryu-Kishin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Stage of Destiny]]".
  * This monster's Japanese name is derived from a [[wikipedia:Gargoyle (monster)|gargoyle]], a monster based on a mythical stone creature fixed to the walls or roofs of buildings that was believed to keep away evil spirits.
  ** This monster's English name is derived from the Japanese words "''ryu''" (meaning "dragon") and "''kishin''" (meaning "fierce god").
  * This monster has an [[Card evolutions|upgraded]] version: "[[Ryu-Kishin Powered]]".
  * This monster has a weaker version: "[[Ryu-Kishin Clown]]".
  * This is the first monster Summoned by [[Seto Kaiba]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * In the ''Yu-Gi-Oh!'' manga and [[Yu-Gi-Oh! (Toei anime)|Toei anime]], this monster's [[Level]] was 5; also, its [[original DEF]] was 1500 in the Toei anime.
  * This monster's pose in its ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|009|ref}} showing [[Ryu-Kishin (manga)|this monster]] being Summoned.
