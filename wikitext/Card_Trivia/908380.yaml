title: Card Trivia:Hyper Engine Vast Vulcan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vulcan Ignite Hyperdrive]]" in [[Maximum Mode]] (together with "[[Hyper Engine Vast Vulcan (L)|Hyper Engine Vast Vulcan [L]]]" and "[[Hyper Engine Vast Vulcan (R)|Hyper Engine Vast Vulcan [R]]]").
  * Along with "Vast Vulcan [L]" and "Vast Vulcan [R]", this monster is named after [[wikipedia:Vulcan (mythology|Vulcan]], the god of fire, volcanoes, metalworking, and the forge in [[wikipedia:Roman mythology|Roman mythology]].
