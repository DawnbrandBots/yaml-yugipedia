  {{Navigation}}

  * This monster appears in the artwork of "[[Runick Freezing Curses]]".
  * This monster has a [[counterpart]]: "[[Freki the Runick Fangs]]".
  ** This monster and "Freki the Runick Fangs" are based on [[wikipedia:Geri and Freki|Geri and Freki]], the two wolves who accompany the god [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]].
