title: Card Trivia:CXyz N.As.Ch. Knight
wikitext: |-
  {{Navigation}}

  [[File:NumberC101SilentHonorDARK-LVAL-JP-Commercial-2.png|thumb|right|250|"[[Number C101: Silent Honor DARK]]" in the commercial of ''[[Legacy of the Valiant]]''.]]
  * This is one of the [[cover card]]s of ''[[Duelist Pack: Duelists of the Abyss]]''.
  * This monster's Japanese name, "'''N'''aphil '''As'''ylum '''Ch'''aos Knight", is a [[wikipedia:backronym|backronym]] of "Nasch", the Japanese spelling of [[Nash]]'s name.
  ** "Naphil" is Hebrew for "fallen one", which is likely a reference to how Nash originally became Reginald "Shark" Kastle by being cast out of the [[Barian World]], or how Shark opposed [[Yuma Tsukumo]] and his allies once he learned of his identity as the leader of the [[Seven Barian Emperors]].
  ** "Asylum" is taken from the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|effect name]] of "[[Number 101: Silent Honor ARK (anime)|Number 101: Silent Honor ARK]]" in the Japanese version of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: "Eternal Soul Asylum".
  ** This monster wears the same crown Nash has, and the spear also has the [[Barian Emblem]] on its tip (which originated as Nash's pendant in his past life).
  * This monster is the "[[CXyz]]" [[Card evolutions|evolution]] of "[[N.As.H. Knight]]".
  ** This monster is the pilot of "N.As.H. Knight", as shown in the latter's concept art.
  ** Curiously, this monster's effects are the opposite of those of "N.As.H. Knight".
  *** This monster cannot be destroyed by card effects, while "N.As.H. Knight" cannot be [[destroyed by battle]] while a "[[Number]]" monster is on the [[field]].
  *** This monster can [[Xyz Summon]] a "[[Number 10X]]" monster by using itself as the [[Xyz Material]], while "N.As.H. Knight" can [[attach]] a "Number 10X" monster to itself as [[material]].
  * Visually, this monster is a combination of "[[Number C101: Silent Honor DARK]]" and "[[Number 32: Shark Drake]]".
  ** This monster's pose is based on that of "Silent Honor DARK" in the commercial of ''[[Legacy of the Valiant]]''.
  ** Both this monster and "Silent Honor DARK" are the pilots of their base forms.
  * This monster's [[original ATK and DEF]] (2000/3000) are the opposite of those of "[[Number C73: Abyss Supra Splash]]".
  ** Both are also [[Rank]] 6 [[WATER]] "[[C (archetype)|C]]" [[Xyz Monster]]s that cannot be [[destroy]]ed by [[card effect]]s.
  * This is the first ''[[OCG]]''/''[[TCG]]''-original "CXyz" monster.
  ** It is also the only "CXyz" monster with a base form to not gain an additional effect from it, as well as the first "CXyz" monster that [[Special Summon]]s itself on top of its base form.
