title: Card Trivia:Flint Lock
wikitext: |-
  {{Navigation}}

  * "Flint Lock" and "[[Flint]]" are based on the 1991 [[Konami]] Shooter "''[[wikipedia:Xexex|Xexex]]''". In the game, the space ship Flint Lock used Flint as its primary weapon.
  * The three "arms" at this monster's rear resemble the shape of "Flint"; this is also probably where "Flint" equips itself to "Flint Lock".
  * This card appears on the artwork of "[[Flint Missile]]".
