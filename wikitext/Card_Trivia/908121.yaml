title: Card Trivia:Constructor Demolisher Wyrm Drake Crush
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Constructor Art - Buildestruction]]" and "[[Demolisher Wyrm Roar]]", as well as in the second and third artworks of "[[Hammer Crush]]".
  * This monster is related to "[[Constructor Wyrm Buildragon]]".
  ** The two monsters are thematically opposites, with one "building" and the other "demolishing". Also, both monsters are visually similar, and "Dracrush" can be Special Summoned by the effect of "Buildragon".
