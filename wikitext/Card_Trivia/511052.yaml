title: Card Trivia:Ojama Knight
wikitext: |-
  {{Navigation}}

  * This card appears to be "[[Ojama Yellow]]" wearing a suit of armor.
  * The two characters appearing behind this monster are the [[Ojama]]s' grandparents
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, the unusable zones (via this card's effect) are occupied by these characters as markers for the spots.
  ** This is the only card in the game to have "[[Ojama Green]]" and  appear without "[[Ojama Black]]".
  * This card has the second highest [[DEF]] and [[Level]] of all the "[[Ojama]]" monsters.
  * "[[Ojama King]]" could be seen as this card's counterpart, as both monsters are "Ojama" [[Fusion Monster]]s with similar effects.
