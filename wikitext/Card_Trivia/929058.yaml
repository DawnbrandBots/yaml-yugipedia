title: Card Trivia:Oneiros, the Dream Mirror Tormentor
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Neiroy, the Dream Mirror Traitor]]".
  ** This monster is named after an [[wikipedia:Oneiros|Oneiros]], the personification of a dream in [[wikipedia:Greek mythology|Greek mythology]].
  * This monster has a [[LIGHT]] [[counterpart]]: "[[Oneiros, the Dream Mirror Erlking]]".
  ** Both have the same [[Level]] (10) and [[ATK]]/[[DEF]] (3000/3000), but opposite [[Attribute]]s and [[Type]]s ([[Fiend]] and [[Fairy]]).
