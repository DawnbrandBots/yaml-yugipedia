title: Card Trivia:Crystron Tristaros
wikitext: |-
  {{Navigation}}

  * This monster is "[[Crystron Quan]]" after absorbing the power of "[[True King Bahrastos, the Fathomer]]" (as shown in "[[Crystron Inclusion]]").
  * This monster has an upgraded [[Synchro Monster|Synchro]] form: "[[Crystron Eleskeletus]]".
