title: Card Trivia:Blackwing - Mistral the Silver Shield
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Blackboost]]" and "[[Blackwing - Backlash]]".
  * This monster is named after a [[wikipedia:Mistral (wind)|mistral]], a strong cold wind from the northwestern Mediterranean that is blown from southern France and into the [[wikipedia:Gulf of Lion|Gulf of Lion]] at hurricane speeds.
