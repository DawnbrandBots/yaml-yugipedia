title: Card Trivia:Constellar Sheratan
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Beta Arietis|Sheratan]], the second brightest star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Aries (constellation)|Aries]].
  ** The constellation and the astrological symbol for [[wikipedia:Aries (astrology)|Aries]] (♈︎) appears in the background of this card's artwork, with the location of Sheratan denoted by the encircled star in the constellation.
  ** This monster's armor features ram-like horns on its helmet, referencing how Aries is also known as the "ram" constellation.
