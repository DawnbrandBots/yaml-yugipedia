title: Card Trivia:Sanaki the Mikanko Devotee
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * A younger version of this monster appears in the artwork of "[[The Great Mikanko Ceremony]]".
  * The item this monster is holding is a ''[[wikipedia:Kagura suzu|kagura suzu]]'', a stick with a cluster of bells attached to it traditionally used by shrine maidens for ''[[wikipedia:kagura|kagura]]'' dances.
  * This is the only "[[Mikanko]]" monster without painted nails.
