title: Card Trivia:Legendary Sword
wikitext: |-
  {{Navigation}}

  * This sword appears in the artworks of "[[Gilford the Legend]]", "[[Iron Blacksmith Kotetsu]]", "[[Legend Saber]]", "[[Legend Slash]]", and "[[Miracle Locus]]".
  * This card is one of the first [[Spell Card]]s released in the ''[[OCG]]''/''[[TCG]]'', as well as one of the first [[Equip Spell Card]]s and [[Warrior]] [[support]] cards.
