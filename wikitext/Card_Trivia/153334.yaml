title: Card Trivia:TGX1-HL
wikitext: |-
  {{Navigation}}

  * This card's name reflects its effect to decrease the player's "[[T.G.]]" monster's [[ATK]]/[[DEF]] by half.
  ** "TG" stands for "T.G.", the "X1" represents the one "T.G." monster [[target]]ed by this card's effect, and "HL" stands for "half".
