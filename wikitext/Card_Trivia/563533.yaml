title: Card Trivia:Trickstar Band Sweet Guitar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Trickstar Festival]]" and "[[Trickstar Live Stage]]".
  * This monster's name is based on the ''[[wikipedia:Solanum dulcamara|Solanum dulcamara]]'', a species of vines commonly known as "bittersweet nightshade" that produces toxic flowers and berries, which appears as the symbols on the corners of this card's artwork.
