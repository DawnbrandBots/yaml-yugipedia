title: Card Trivia:Psychic Eraser Laser
wikitext: |-
  {{Navigation}}

  * "[[HTS Psyhemuth]]" and "[[Mind Protector]]" appear in this card's artwork.
  ** This card's artwork is a reference to the artwork of "[[Psychic Soul]]", which depicts the ''soul'' of "Mind Protector" leaving its body, similar to this card's artwork.
  *** Additionally, both cards feature "Mind Protector" in each cards' artwork and effects that involve eliminating a monster to increase a player's [[Life Point]]s.
