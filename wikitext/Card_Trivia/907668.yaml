  [[File:YGO5D142.jpg|thumb|250|"[[Meklord Astro Dragon Asterisk (anime)|Meklord Astro Dragon Asterisk]]" is Summoned.]]
  * "[[Meklord Astro Dragon Asterisk]]", "[[Meklord Army of Wisel]]", "[[Meklord Army of Skiel]]", "[[Meklord Army of Granel]]", and "[[Fortissimo the Mobile Fortress]]" appear in this card's artwork.
  ** This card's artwork is a reference to {{episode|5D's|142|ref}}, during which [[Aporia]] controlled all the above cards during his [[Duel]] against [[Jack Atlas]], [[Leo]] and [[Luna]].

