title: Card Trivia:Xyz-Raypierce
wikitext: |-
  {{Navigation}}

  * This monster's name, "Xyz-'''Raypier'''ce", references the fact that it is holding a [[wikipedia:Rapier|rapier]] in its artwork.
  ** This monster's name is also a play on the words '''Xyz''' and '''X-ray''', which reflects its appearance in its artwork as if it were being viewed through an [[wikipedia:X-ray|X-ray]] machine.
  *** Interestingly, this card's effect neither directly involves Xyz Monsters nor other members of the "[[Xyz (archetype)|Xyz]]" archetype, although its first effect could be used to gather more monsters for a Rank 4 Xyz Summon.
