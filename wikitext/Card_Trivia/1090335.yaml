title: Card Trivia:Clockwork Knight
wikitext: |-
  {{Navigation}}

  * This monster's name and appearance are a pun on "[[Clockwork Night]]", which its effect directly [[support]]s.
  ** This monster's appearance is also based on "[[Robotic Knight]]". In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, "[[Robotic Knight (anime)|Robotic Knight]]" served as the [[Deck Master]] for [[Nezbitt]], who also used "[[Clockwork Night (anime)|Clockwork Night]]".
