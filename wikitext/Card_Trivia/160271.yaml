  * This monster's name is derived from [[wikipedia:Dökkálfar and Ljósálfar|Dökkálfar]], a race of dark elves in [[wikipedia:Norse mythology|Norse mythology]] who reside in the light realm of [[wikipedia:Álfheimr|Álfheimr]].
