title: Card Trivia:Dark Magician Girl the Magician's Apprentice
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster is a [[Shining Sarcophagus (series)|Shining Sarcophagus]] [[counterpart]] of "[[Dark Magician Girl]]".
  ** This monster's name references the Japanese title of {{episode|Yu-Gi-Oh!|062|ref}}: ''"Magician's Student - Black Magician Girl"'', which features the anime debut appearance of "[[Dark Magician Girl (anime)|Dark Magician Girl]]".
  ** This is the second monster in the Shining Sarcophagus [[series]] that can be [[Special Summon]]ed while either player [[control]]s "[[Shining Sarcophagus]]".
  *** This is a reference to how, during the [[Rite of the Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (the [[Battle Ritual]] in the [[Yu-Gi-Oh! (anime)|anime]]), [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in anime) controlled "[[Dark Magician Girl (manga)|Dark Magician Girl]]" (and her [[Dark Magician Girl (anime)|anime counterpart]]) while [[Yugi Mutou (manga)|Yugi Mutou]] (and his [[Yugi Muto|anime counterpart]]) controlled "[[Gold Sarcophagus (manga)|Gold Sarcophagus]]" (and its [[Gold Sarcophagus (anime)|anime counterpart]]).
