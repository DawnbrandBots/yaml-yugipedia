title: Card Trivia:Call of the Haunted
wikitext: |-
  {{Navigation}}

  * This card appears in the artworks of "[[Down Burst]]", the Japanese artwork of "[[Trap Sluzer]]", and the anime artwork of "[[Destruction of Destiny]]".
  * This card has a [[Skill Card]] counterpart: "[[Call of the Haunted (Skill Card)|Call of the Haunted]]".
  * The words "κοναμι" and "ηανακο" are written in Greek on the the graves depicted in this card's ''[[OCG]]''/''[[TCG]]'' artwork. The first word is obviously "Konami" while the second word has no actual meaning in Greek.
  ** Using a standard English keyboard with the Greek language selected, typing "konami" results in "κοναμι", while typing "hanako" results in "ηανακο". [[wikipedia:Hanako (given name)|Hanako]] is a Japanese female name. It might be related to [[wikipedia:Hanako-san|Hanako-san]], a [[wikipedia:Japanese urban legend|Japanese urban legend]] about the spirit of a young [[wikipedia:World War II|World War II]]-era girl who haunts school bathrooms.
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], this card's effect allowed the player to [[Special Summon]] any monsters destroyed by the opponent from the [[Graveyard]], change their [[Type]]s to [[Zombie]] monsters, as well as granting them [[invincible|invincibility]], allowing them to regenerate each time they are [[destroyed by battle]]. In the ''OCG''/''TCG'', this card's Special Summoning effect is limited to only '''one''' monster and does not feature the Type-changing or constant Special Summoning effect.
