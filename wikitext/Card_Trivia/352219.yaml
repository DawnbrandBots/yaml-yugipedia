title: Card Trivia:Chicken Game
wikitext: |-
  {{Navigation}}

  * "[[Overdrive]]" and "[[Oni Tank T-34]]" appear in this card's artwork.
  ** This card's artwork continues the events of "[[Pole Position]]".
  * This card's name and effect are references to [[wikipedia:Chicken (game)|the game of chicken]], where two people compete to determine who is the coward between them.
  ** Specifically, the continual paying of [[LP]] refers to the competition between the players, and whoever pays LP to [[destroy]] this card is considered the "coward".
