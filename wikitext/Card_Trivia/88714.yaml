title: Card Trivia:Elegant Egotist
wikitext: |-
  {{Navigation}}

  * This card's artwork is a view of the head of "[[Harpie Lady]]" through a [[wikipedia:Kaleidoscope|kaleidoscope]], as indicated by this card's Japanese name. Its effect also reflects this in its ability to [[Special Summon]] a "mirror image" of "Harpie Lady".
  * This card was the first card in the ''TCG''/''OCG'' to Special Summon monsters from the [[Main Deck]].
