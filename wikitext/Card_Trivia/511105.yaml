title: Card Trivia:Ra's Disciple
wikitext: |-
  {{Navigation}}

  * This monster is wearing a hood, outfit, and cape based on "[[The Winged Dragon of Ra]]'s" physical appearance.
  * This is the first card in the ''[[OCG]]''/''[[TCG]]'' to support for the [[Egyptian God]] monsters.
  * This monster is similar to "[[Horus' Servant]]" and "[[Hand of Nephthys]]" in that they all support monsters based on [[wikipedia:Ancient Egypt|Ancient Egyptian]] deities while wearing outfits based on the appearance of said monsters.
  * This card's ''OCG''/''TCG'' effect of [[Special Summon]]ing two copies of "Ra's Disciple" from the [[hand]] and/or [[Deck]] is a reference to this card's usage in {{episode|GX|085|ref}} when [[Franz]] [[Normal Summon]]ed this card and used its anime effect to add two copies of "Ra's Disciple" from the Deck to the hand, both of which were Normal Summoned additionally with "[[Ultimate Offering]]".
  ** In the ''OCG''/''TCG'', when this card was released, it could simply Special Summon two copies of itself, allowing its owner to summon three "Ra's Disciple" in one turn.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this card was one of the reasons why "[[Give and Take]]" received the [[Limited 1]] status: you could use "Give and Take" to Special Summon this card from their GY to their opponent's side of the field in order to prevent them from Special Summoning any monsters.
