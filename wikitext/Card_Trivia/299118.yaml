title: Card Trivia:Jackpot 7
wikitext: |-
  {{Navigation}}

  * "[[Pot of Greed]]" (missing a shard, referencing "[[Shard of Greed]]") and the same slot depicted in the artwork of "[[7]]" appear in this card's artwork.
  ** Images of the "[[Kuriboh Token]]", the pink "[[Sheep Token]]", and the [[Eye of Wdjat]] depicted in the artwork of "7" also appear in the leftmost slot.
  * This slot machine appears in the artwork of "[[Tilted Try]]".
  * This is the first [[Instant Win]] card that requires the opponent to do the work and allow the player to win the [[Duel]].
