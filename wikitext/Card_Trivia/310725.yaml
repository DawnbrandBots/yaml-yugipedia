title: Card Trivia:Machina Megaform
wikitext: |-
  {{Navigation}}

  * This monster is the combined form of "[[Machina Fortress]]", "[[Machina Gearframe]]", and "[[Machina Peacekeeper]]".
  ** This monster has 100 more [[ATK]] and 100 less [[DEF]] than "Machina Fortress".
  * This monster, "Machina Fortress", "[[Machina Irradiator]]" and "[[Machina Air Raider]]" all have a total combine stat of 4100.
