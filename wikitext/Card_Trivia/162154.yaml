title: Card Trivia:Submersible Carrier Aero Shark
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Shark Fortress]]", "[[Torpedo Takedown]]", and the manga artwork of "[[Overlay Regeneration (manga)|Overlay Regen]]".
  * This is the first [[Fish]] [[Xyz Monster]].
  * This is the first Xyz Monster to be Summoned in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]].
  * "[[Full Armored Black Ray Lancer]]" is "[[Black Ray Lancer]]" equipped with this monster.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster's effect is [[activate]]d, the apparatus holding the sharks together absorbs the [[Xyz Material]]. This is depicted in the artwork of "Overlay Regen".
  ** In the anime, when its damaging effect is activated, it shoots a number of torpedoes based on the same number of cards in [[Reginald Kastle|Reginald "Shark" Kastle's]] [[hand]], which disperses into four smaller missiles.
  *** Since each torpedo represents 400 damage per card in the hand (in the ''[[OCG]]''/''[[TCG]]'', this effect inflicts only 100 damage per [[banish]]ed card), the four smaller missiles likely represents 100 damage each.
  * Up until {{episode|ZEXAL|010|ref}}, this was the first and only Xyz Monster for which the common [[Summon chants in Yu-Gi-Oh! ZEXAL#Reginald Kastle|Summon chant]] used for all Xyz Monsters in the anime was not used.
