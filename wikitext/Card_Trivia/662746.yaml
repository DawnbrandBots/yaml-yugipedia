title: Card Trivia:Time Thief Perpetua
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Time Thief Flyback]]", "[[Time Thief Power Reserve]]", "[[Time Thief Retrograde]]", and "[[Time Thief Temporwhal]]".
  ** This monster appears as a little girl in the artwork of "[[Time Thief Hack]]".
  ** This monster appears as an older adult in the artwork of"[[Time Thief Startup]]".
  * This monster is an [[Card evolutions|older]] form of "[[Time Thief Adjuster]]".
