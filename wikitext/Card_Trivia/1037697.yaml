title: Card Trivia:Salamandra, the Flying Flame Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Salamandra]]", "[[Flame Swordsrealm]]" and "[[Salamandra Fusion]]".
  ** The "[[Mirage Swordsman]]" equivalent of this monster appears in the artwork of "[[Flame Swordsdance]]".
  * This is a [[retrain]]ed [[Effect Monster]] counterpart of "[[Salamandra]]".
  ** This monster's effect to [[equip]] itself to "[[Flame Swordsman]]" is based on how "Salamandra" is an [[Equip Spell Card]] designed to work with "Flame Swordsman".
  ** This monster's [[original ATK]] (700) and effect to increase the ATK of "Flame Swordsman" by 700 are based on the effect of "Salamandra", which was commonly used to increase the ATK of "Flame Swordsman" by the same amount during the [[Duelist Kingdom (manga arc)|Duelist]] [[Duelist Kingdom (arc)|Kingdom]] arc of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This monster has an upgraded [[Fusion Monster|Fusion]] form: "[[Fighting Flame Dragon]]".
