title: Card Trivia:Ancient Gear Dark Golem
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Ancient Gear Golem]]".
  ** The kanji 「暗黒巨人」 (''Ankoku Kyojin'', "Dark Giant") in this monster's base Japanese name references [[Vellian Crowler]]'s "[[Ancient Gear]]" [[Deck]], which is called the "Medieval Shadow Deck" (暗黒の中世デッキ ''Ankoku no Chūsei Dekki'') in the Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime.
  * The horn-like pair of little gears on this monster's head resembles a [[wikipedia:Wreaths and crowns in antiquity|laurel wreath]], which were used as crowns worn by wealthy and powerful people in Ancient Greece and Rome, keeping in relation with the Greco-Roman design of the "Ancient Gear" [[archetype]].
