title: Card Trivia:Imprisoned Queen Archfiend
wikitext: |-
  {{Navigation}}

  * This card is a more powerful version of "[[Infernalqueen Archfiend]]".
  * The background in this card's artwork is different from the other chess-themed "Archfiends", featuring the chessboard pattern but in the form of a cube, indicating this monster's imprisonment.
  * The "Imprisoned" in this card's ''TCG'' name may be derived from how pieces in chess are "captured"; this card's effect activating while in the Graveyard implies that the Graveyard is the prison in question.
  ** Its Japanese name is simply "Prison Queen Demon", implying that rather than being a prisoner, this monster is the ruler of the prison.
