title: Card Trivia:Rage and Conspiracy
wikitext: |-
  {{Navigation}}

  * "[[Chu-Ske the Mouse Fighter]]", "[[Empress Mantis]]", "[[Niwatori]]", and "[[Petit Moth]]" appear in this card's artwork.
  ** "Chu-Ske" and "Niwatori" are plotting to trap "Empress Mantis" using a combination ''mouse''-and-''bird'' trap; the mouse trap is baited with a "Petit Moth".
