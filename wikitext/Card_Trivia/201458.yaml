title: Card Trivia:Tasuke Knight
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a pun: {{Ruby|助|たす}}ける　''tasukeru'' means "to save", and 助けないと ''tasukenai to'' specifically means "[I] must save [you]"; the latter sounds identical to this card's Japanese name and references its [[Card effect|effect]] to protect the player from an [[attack]].
