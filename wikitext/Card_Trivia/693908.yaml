title: Card Trivia:Prediction Princess Petalelf
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "[[wikipedia:Petal|petal]]" (the part of flowers, which are used in the method of [[wikipedia:Methods of divination|anthomancy]] in [[wikipedia:Divination|divination]]) and "[[wikipedia:Elf|elf]]" (a supernatural humanoid being who is depicted with pointed ears).
