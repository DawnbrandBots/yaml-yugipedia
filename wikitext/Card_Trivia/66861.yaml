title: Card Trivia:Final Fusion
wikitext: |-
  {{Navigation}}

  * Two [[wikipedia:Kaiju|kaiju]] appear in this card's artwork.
  * This card's name is a reference to the fact that it was the final card played in the Duel between [[Jaden Yuki]] and [[Zane Truesdale]] at the end of [[Yu-Gi-Oh! GX episode listing (season 1)|the first season]] of the ''Yu-Gi-Oh! GX'' anime.
