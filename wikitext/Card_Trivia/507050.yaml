title: Card Trivia:Lightning Crash
wikitext: |-
  {{Navigation}}

  * The silhouette of "[[Zaborg the Thunder Monarch]]" appears in this card's artwork.
  ** Fittingly, "Zaborg" was the [[Thunder]] monster used with this card's effect in {{episode|GX|077|ref}}.
  * This card's Japanese name is derived from "''kaminari''" (神鳴, lit. "thundering of the gods"), an archaic Japanese term for "lightning".
