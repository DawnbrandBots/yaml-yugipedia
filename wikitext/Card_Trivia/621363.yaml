title: Card Trivia:True Exodia
wikitext: |-
  {{Navigation}}

  * This monster is a [[wikipedia:Chibi (slang)|chibi]] version of [[Exodia the Forbidden One (character)|Exodia the Forbidden One]].
  * This card's Japanese name (真エクゾディア) can be seen in the background of this card's artwork.
  * This card's artwork was drawn by [[Kazuki Takahashi]].
  ** This was the last card released to feature his artwork before his death in July 2022.
