title: Card Trivia:Token (card)
wikitext: |-
  {{Navigation}}

  * The artwork of the [[Yu-Gi-Oh! Day]] Token ([[Yami Marik]]-themed) is taken from {{chapter|Yu-Gi-Oh! Duelist|163|ref}}, specifically in the panel where Yami Marik sarcastically wonders how [[Mai Kujaku (manga)|Mai Kujaku]] will use "[[The Sun Dragon Ra]]" without being able to read its hieratic text, after the panel in which he prompts her to continue her turn.
