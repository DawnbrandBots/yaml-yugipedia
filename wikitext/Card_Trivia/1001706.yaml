title: Card Trivia:Abyssal Sea Dragon Abyss Kraken
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Kraken|Kraken]], a mythical sea monster from [[wikipedia:Nordic folklore|Nordic folklore]] that is described as a giant squid that would sometimes attack ships and feed upon the sailors.
  * Along with "[[Abyssal Sea Dragon Abyss Kraken (L)|Abyssal Sea Dragon Abyss Kraken [L]]]" and "[[Abyssal Sea Dragon Abyss Kraken (R)|Abyssal Sea Dragon Abyss Kraken [R]]]", this is the first [[Maximum Monster]] to be [[Maximum Summon]]ed in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
