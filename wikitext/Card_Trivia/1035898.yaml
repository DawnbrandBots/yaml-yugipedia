title: Card Trivia:Soleil the Skysavior Angel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Skysavior Oath]]" and "[[Skysavior Watch]]", as well as in the third artwork of "[[Fusion (Rush Duel)|Fusion]]", the second artwork of "[[Skysavior Wish]]", and the first artwork of "[[Sunset Rebirth]]".
