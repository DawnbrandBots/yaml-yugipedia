title: Card Trivia:Hypnocorn
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "[[wikipedia:Hypnosis|hypnosis]]", a natural, trance-like state of focused attention and heightened suggestibility. The state of hypnosis is often depicted in different media being induced by swirling patterns, which reflect the swirling patterns in this monster's horns.
  * This monster has a similar appearance to a "[[Sheep Token]]" and a "[[Lamb Token]]".
