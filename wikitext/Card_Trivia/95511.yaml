title: Card Trivia:New Ultra Evolution
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card has a counterpart: "[[Double Evolution Pill]]".
  * This card has an upgraded version in the ''[[OCG]]''/''[[TCG]]'': "[[Ultra Evolution Pill]]".
  * This card references the fact that [[wikipedia:Dinosaur|dinosaurs]] are said to be the [[wikipedia:Origin of birds|ancestors]] of modern [[wikipedia:Bird|birds]].
  ** The "New" and "Revised" in this card's English and Japanese names likely refer to its effect to [[Tribute]] a [[Winged Beast]] monster instead of a [[Reptile]] monster.
