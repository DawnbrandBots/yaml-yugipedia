title: Card Trivia:Token Feastevil
wikitext: |-
  {{Navigation}}

  * "[[Sheep Token]]s" can be seen among the Tokens in this card's artwork.
  * This card's name is a pun on "feast" and "festival", as well as "evil", hinting that it is the damaging version of [[Token Thanksgiving]].
  *This card has a healing counterpart: [[Token Thanksgiving]]
