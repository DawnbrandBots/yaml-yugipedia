title: Card Trivia:Elemental Mirage
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Elemental HERO Sparkman]]" appears in this card's artwork.
  * This card has two [[counterpart]]s: "[[Destiny Mirage]]" (which revives "[[Destiny HERO]]" [[monster]]s) and "[[Stardust Mirage]]" (which revives all monsters, if "[[Stardust Dragon]]" is on the [[field]]).
