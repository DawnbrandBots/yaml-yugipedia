title: Card Trivia:Diplexer Chimera
wikitext: |-
  {{Navigation}}

  * A [[wikipedia:Diplexer|diplexer]] is an electronic device that allows two different devices to share a common communications channel.
  * A [[wikipedia:Chimera (mythology)|Chimera]] is a monstrous fire-breathing hybrid creature. They are usually depicted as a [[wikipedia:Lion|lion]], with the head of a [[wikipedia:Goat|goat]] protruding from its back, and a tail that might end with a [[wikipedia:Snake|snake's]] head.
