title: Card Trivia:Gouki Heel Ogre
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Jado Ogre", is based on [[wikipedia:Atsushi Onita|Atsushi Onita]], a Japanese [[wikipedia:Professional wrestling|professional wrestler]] who is known by his ring name, "Jado".
  ** Jado is known for innovating explosive-themed deathmatches and his pioneered signature move, the "[[wikipedia:Powerbomb|Thunder Fire Powerbomb]]", both of which are reflected by this monster's fiery appearance.
  ** Its ''[[TCG]]'' name is based on a [[wikipedia:Heel (professional wrestling)|heel]], a professional wrestler who portrays a villain.
  * This monster is depicted wielding a double-ended ''[[wikipedia: Kanabō|kanabo]]'', a studded war club used by samurai in [[wikipedia: History of Japan#Feudal Japan|feudal Japan]].
