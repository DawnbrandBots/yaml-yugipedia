title: Card Trivia:Dragonmaid Nudyarl
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragonmaid Welcome]]".
  * This monster is the dragonic form of "[[Laundry Dragonmaid]]".
  ** This monster's ''[[TCG]]'' name is an anagram of "Laundry".
  ** This monster's Japanese name, "Fluss", is the German word for "river", reflecting its [[WATER]] [[Attribute]].
  * Unlike the other "Dragonmaid" monsters' draconic forms, this monster's design more closely resembles [[wikipedia:Chinese dragon|Eastern dragons]] than Western dragons.
