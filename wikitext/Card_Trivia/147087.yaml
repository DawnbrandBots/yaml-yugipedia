title: Card Trivia:Gishki Beast
wikitext: |-
  {{Navigation}}

  * "[[Gishki Aquamirror]]" appears as this monster's necklace.
  * This card's effect is similar to that of "[[Junk Synchron]]", "[[Blackwing - Blizzard the Far North]]", "[[Black Salvo]]" and "[[Alien Ammonite]]".
  * As its name suggests, this card is a [[Beast]]-[[Type]]; the only Beast-Type "[[Gishki]]" thus far.
  * "[[Gishki Beast]]" is the first card to be printed in a [[Duel Terminal Edition]] after it has been printed in a widely available set (it was a rare in [[Photon Shockwave]]. It shares this distinction with "[[Number 39: Utopia]]", "[[Blue-Eyes White Dragon]]", "[[Burst Stream of Destruction]]", "[[Dark Magician]]", and "[[Dark Magic Attack]]".
  ** However, it is the first monster in a Duel Terminal-exclusive archetype to first be printed in a widely available set.
