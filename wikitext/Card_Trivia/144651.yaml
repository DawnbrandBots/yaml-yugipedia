title: Card Trivia:Shattered Axe
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Psychic Wave]]".
  * In the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]], this card's effect was used to [[target]] a monster and decrease its [[ATK]] by 500 for each turn it was [[face-down]]. This is evidenced by the fact that "[[The God of the Obelisk]]" was the monster targeted by this effect, despite its immunity to [[Spell]]/[[Trap Cards]]. In the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]], this card's role was replaced with "[[Ground Erosion]]".
