title: Card Trivia:E☆HERO Pit Boss
wikitext: |-
  {{Navigation}}

  * The cards "[[Black Luster Soldier - Envoy of the Beginning]]", "[[Blue-Eyes Ultimate Dragon]]", "[[Dark Magician]]" (in its 2nd ''[[OCG]]''/''[[TCG]]'' artwork), "[[Mirror Force]]", "[[Number 39: Utopia]]", and "[[Stardust Dragon]]" appear in this card's artwork.
  * This was a prize card first released at the [[World Championship 2013]], which was held in [[wikipedia:Las Vegas|Las Vegas]], [[wikipedia:Nevada|Nevada]].
  ** The "E" in "E☆HERO" stands for "Entertainment", which Las Vegas is well-known for.
  ** A "[[wikipedia:Pit manager|pit boss]]" is the manager who supervises the employees working in a [[wikipedia:Casino pit|casino pit]], which is common in Las Vegas.
  ** The bottom of this card's artwork features a design based on a [[wikipedia:Roulette|roulette wheel]] commonly used in casinos.
  ** This monster's [[LIGHT]] [[Attribute]] likely references one of the nicknames of Las Vegas: the "[[wikipedia:City of Light|City of Lights]]".
  ** This monster's appearance and [[Spellcaster]] [[Type]] reference the stage magicians that perform in Las Vegas.
  * This is the only "[[HERO]]" [[Xyz Monster]].
  ** This is also currently the only [[Match winner]] to belong to a specific [[archetype]].
  * This is the first Xyz Monster whose artwork depicts visible [[Xyz Material]]s, which in this case, appear to be casino chips.
