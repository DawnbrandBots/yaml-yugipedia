title: Card Trivia:Gizmek Okami, the Dreaded Deluge Dragon
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]'' name is a combination of ''Kurayamatsumi '' (alternatively written as ''Takaokami''), ''Kuramitsuha'', & ''[[wikipedia:Kuraokami|Kuraokami]]''.
  ** This is a reference to Japanese mythology, where ''[[wikipedia:Izanagi|Izanagi]]'' killed ''[[wikipedia:Kagutsuchi|Kagutsuchi]]'' by cutting him into three pieces, each of which became the three gods mentioned above.
  ** ''Kuraokami'' is the [[wikipedia:Shinto|Shinto]] deity of rain and snow, hence this monster's [[Attribute]] of [[WATER]]. Additionally, ''Kuraokami's'' appearance is that of a [[wikipedia:Japanese dragon|Japanese dragon]], hence this monster's appearance as such.
