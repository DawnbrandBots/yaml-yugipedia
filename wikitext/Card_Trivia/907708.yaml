title: Card Trivia:Nandes the Fire Awakener
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Nandes the Battle Commander" ({{Ruby|闘|とう}}{{Ruby|将|しょう}}ナンデス, ''Tōshō Nandesu'') is a wordplay on "nan desu" (なんです), an expression used to indicate what something assuredly is (e.g. "This is certainly a battle commander").
  * This monster shares similarities with "[[Betrayer of Peace]]".
  ** Both monsters share the same [[Level]] (4), [[Type]] ([[Warrior]]), and [[original ATK and DEF]] (1200/1000).
  ** Both monsters feature an effect that can change a Warrior-Type monster's [[battle position]] into a specific position.
  * This monster shares similarities with "[[Seyanen the Blazing Conqueror]]".
  ** Both monsters share the same [[Attribute]] ([[FIRE]]), Level (4), Type (Warrior), and swapped original ATK and DEF.
  ** Both monsters share a similar wordplay in their respective Japanese names.
