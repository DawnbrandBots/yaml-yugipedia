title: Card Trivia:Dragon Seeker
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and the ''[[OCG]]''/''[[TCG]]'', this monster is a hunched dragon-like creature; however, in ''[[Yu-Gi-Oh! Duel Monsters II: Dark Duel Stories]]'', this monster is depicted as a humanoid (possibly feminine) figure wearing black chest and leg armor, green clawed gauntlets, and possessing wings.
