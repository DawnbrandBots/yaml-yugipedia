title: Card Trivia:Bujin Torifune
wikitext: |-
  {{Navigation}}

  * This monster is named after "Ame-no-Torifune-no-Kami", a deity in [[wikipedia:Japanese mythology|Japanese mythology]] who is depicted as a large golden ship with the design and figurehead based on that of a bird. Fittingly, this monster's design features a golden color scheme, a pair of wings, and a helm slightly resembling the head of a bird.
  * The [[Main Deck]] "[[Bujin]]" [[Beast-Warrior]] monsters resemble characters appearing in the ''[[Yu-Gi-Oh! GX]]'' anime through their head shapes and color schemes. In this case, this monster resembles [[Elemental Hero Neos (character)|Elemental Hero Neos]] and his [[Elemental Hero Neos (anime)|card form's]] appearance after gaining angelic wings via the effect of "[[Honest (anime)|Honest]]".
