title: Card Trivia:Nordic Relic Laevateinn
wikitext: |-
  {{Navigation}}

  * In Norse mythology, [[wikipedia:Lævateinn|Lævateinn]] is a weapon mentioned in the Poetic Edda poem Fjölsvinnsmál. The amended name Lævateinn is etymologically considered to be a kenning for a sword (Old Norse "damage twig").
  ** "[[Dragunity Arma Leyvaten]]" is also named after the sword.
  * "Laevateinn" is also a fire sword in [[Konami]]'s game [http://castlevania.wikia.com/Castlevania_Aria_of_Sorrow Castlevania Aria of Sorrow].
