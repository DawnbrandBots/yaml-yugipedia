title: Card Trivia:Amabie
wikitext: |-
  {{Navigation}}

  * This was the first card to be released in the ''[[Yu-Gi-Oh! Official Card Game]]'' and in ''[[Yu-Gi-Oh! Rush Duel]]'' simultaneously.
  ** It is also the first card to have a different depiction of the same monster between the two games, being an adult in the ''OCG'' and a child in ''Rush Duel''. This is likely in reference to Konami's intended audience for each line of products.

  * An ''[[wikipedia:Amabie|amabie]]'' is a three-legged merfolk ''[[wikipedia:yōkai|yōkai]]'' that emerged in folklore in the mid-19th century. When someone was sent to investigate a creature that was appearing nightly in [[wikipedia:Kumamoto Prefecture|Kumamoto]], it reportedly told the investigator, "Good harvest will continue for six years from the current year; if disease spreads, draw a picture of me and show the picture of me to those who fall ill."
  ** This prophecy is reflected in its ''OCG'' effect, where the card and its artwork is revealed to cure (i.e. "increase the [[LP]] of") both players.
  ** Relatively obscure since its inception, this creature exploded in popularity in Japan after the onset of the [[COVID-19 pandemic]], to the point of appearing on health posters printed by the Japanese Ministry of Health, Labour, and Welfare.
