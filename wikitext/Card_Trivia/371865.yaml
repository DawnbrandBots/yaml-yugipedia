title: Card Trivia:Fluffal Sheep
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Frightfur Defender]]" and "[[Frightfur Parade]]".
  * This monster's second ''[[OCG]]''/''[[TCG]]'' effect to [[return]] another "[[Fluffal]]" monster the player controls to the [[hand]] and [[Special Summon]] an "[[Edge Imp]]" monster from the hand or [[Graveyard]] is based on the anime effect of "[[Edge Imp Sabres (anime)|Edge Imp Sabres]]", which allows the player who Summoned it to return a "Fluffal" monster they control to their hand to Summon a "Fluffal" monster from their hand to their field.
  ** In {{episode|ARC-V|033|ref}}, the effect of "Edge Imp Sabres" was used to return [[Fluffal Sheep (anime)|this monster]] to the [[Sora Perse|Sora Perse's]] hand, whereas a version of this effect is integrated into this monster's effect in the ''OCG''/''TCG''.
