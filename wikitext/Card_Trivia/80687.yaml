title: Card Trivia:Knight's Title
wikitext: |-
  {{Navigation}}

  * The English letter "B" on the shield in this card's artwork most likely stands for "Black Magician", the Japanese name of "[[Dark Magician]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[Tribute]] "Dark Magician" and [[Special Summon]] "[[Dark Magician Knight]]" is an alteration of its effect in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, which changes a [[Spellcaster]] monster's [[Type]] to [[Warrior]]. In {{episode|Yu-Gi-Oh!|113|ref}}, this card was used to change "[[Dark Magician (anime)|Dark Magician's]]" Spellcaster Type to Warrior, transforming it to "[[Dark Magician Knight (anime)|Dark Magician Knight]]".
