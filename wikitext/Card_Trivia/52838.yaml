title: Card Trivia:Rose Curse
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Axe of Despair]]" appears in this card's artwork. 
  ** Fittingly, the effect of "Axe of Despair" increases the [[equip]]ped monster's [[ATK]], which can be used to [[activate]] this card's effect.
  ** This card's artwork depicts the "Axe of Despair" in its ''[[TCG]]'' design, which replaces the severed head with a wooden texture.
