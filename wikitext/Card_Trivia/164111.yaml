title: Card Trivia:Glory of the King's Opposite Hand
wikitext: |-
  {{Navigation}}

  * This card is one of five invitational cards to the [[Duelist Kingdom]] tournament in the [[Yu-Gi-Oh! (manga)|Yu-Gi-Oh! manga]] and [[Yu-Gi-Oh! (anime)|anime]]. In the finals, this card's holder is allowed to [[Duel]] [[Maximillion Pegasus]] in the final match of the tournament, and the prize they claim will be unlimited. If the [[Duelist]] loses, however, their soul will be trapped inside this card. Without this card or "[[Glory of the King's Hand]]", the contestant could not participate in the finals and would be disqualified.
  ** This card's artwork is likely blank for two reasons. Firstly, it represents the undefined nature of the contestant's prize should they win. Secondly, the artwork becomes replaced with that of the contestant when their soul becomes trapped after losing.
