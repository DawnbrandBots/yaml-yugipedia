title: Card Trivia:Fusion Weapon
wikitext: |-
  {{Navigation}}

  * "[[Dark Flare Knight]]" appears in this card's artwork.
  * This card has a counterpart for [[Ritual Monster]]s: "[[Ritual Weapon]]".
  ** This card is tied with that card for having the highest boost of any Equip Spell Card that doesn't require any action from the equipped monster to gain its ATK boost.
  ** Both cards are used by [[Alexis Rhodes]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
