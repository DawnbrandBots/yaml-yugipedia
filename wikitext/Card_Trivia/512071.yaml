title: Card Trivia:Ruin, Queen of Oblivion
wikitext: |-
  {{Navigation}}

  * This card and "[[Demise, King of Armageddon]]" are less-powerful [[Ritual Monster|Ritual]] versions of "[[Black Luster Soldier - Envoy of the Beginning]]" and "[[Chaos Emperor Dragon - Envoy of the End]]", respectively.
  * This monster has a dowgraded form, "[[Ruin, Angel of Oblivion]]", and an upgraded form, "[[Ruin, Supreme Queen of Oblivion]]".
  * This card's artwork is similar in background and appearance to "[[Queen of Fate - Eternia]]".
  ** This card's artwork was originally one of the designs for "Queen of Fate - Eternia"{{citation needed}}.
  * The shadow in this card's artwork resembles "Demise, King of Armageddon".
  ** The unruly shape of the shadow figure suggest that it might be "[[Garlandolf, King of Destruction]]" instead.
  * This monster's shadow appears in the artwork of "[[Cycle of the World]]".
  * This card's background is the decoration and pattern seen on "[[The Beginning of the End]]".
  * "[[Divine Grace - Northwemko]]" is a counterpart to this card and "Demise, King of Armageddon". Its effect relies on protecting cards on the [[field]] rather than destroying them.
