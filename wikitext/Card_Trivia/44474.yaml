title: Card Trivia:Spirit Reaper
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Certain Death Promotion]]" and "[[Reaper on the Nightmare]]".
  * This monster is based on the [[wikipedia:Personifications of death|Grim Reaper]], the most common personification of death who is depicted as a skeletal figure who wears a cloak and wields a scythe used to reap the souls of the deceased.
  * This is the first [[Monster Card]] to feature an effect that prevents it from being [[destroyed by battle]].
