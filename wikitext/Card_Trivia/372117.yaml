title: Card Trivia:Malacoda, Netherlord of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * This card gains its name from the character [[wikipedia:Malacoda|Malacoda]], from the ''[[wikipedia:Divine Comedy|Divine Comedy]]'' written by the Italian poet [[wikipedia:Dante Alighieri|Dante Alighieri]]. In the poem, Malacoda served as the leader of the [[wikipedia:Malebranche (Divine Comedy)|Malebranche]], a band of demons who guard the Fifth Bolgia of Malbolge, the Eighth Circle of Hell.
  ** He also appears under the name [http://castlevania.wikia.com/wiki/Malacoda Malacoda] in [[Konami]]'s Castlevania games.
  * This is the first [[Ritual Monster]] of the "[[Burning Abyss]]" [[Archetype]].
  * This is a [[cover card]] of ''[[Extra Pack 2015]]''.
  * This monster appears in the artwork of "[[Good & Evil in the Burning Abyss]]".
  * This card is the 2nd Ritual Monster to be printed as a [[Ghost Rare]]; the first being "[[Herald of Perfection]]".
  ** It is also the first TCG exclusive to be Ghost Rare in a booster set.
