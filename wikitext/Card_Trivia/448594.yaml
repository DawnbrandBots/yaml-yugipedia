title: Card Trivia:Legendary Secret of the Six Samurai
wikitext: |-
  {{Navigation}}

  * This monster is the armor of "[[Great Shogun Shien]]" possessed by its spirit.
  ** This card's artwork is similar to that of "[[Spirit of the Six Samurai]]".
  * This card most likely pictures the results of the battle seen in "[[Face-Off]]", [[Stand-Off]]", and "[[Evenly Matched]]".
  ** Namely, it shows that "[[Great Shogun Shien]]" lost to "[[Shadow of the Six Samurai - Shien]]".
  * This monster's name is a reference to two of the existing groups of the "[[Six Samurai]]": "[[Legendary Six Samurai]]" and "[[Secret Six Samurai]]".
