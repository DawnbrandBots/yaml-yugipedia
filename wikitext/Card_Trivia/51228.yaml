title: Card Trivia:Koa'ki Meiru Guardian
wikitext: |-
  {{Navigation}}

  * This card was one of the 3 ''[[Raging Battle]]'' preview promos released in ''[[Duelist Pack Collection Tin 2009]]''.
  * Despite being a [[Rock]] monster with "Guardian" in its name, its [[DEF]] is much lower than its [[ATK]].
  * This card has a [[Trap Card]]-negating counterpart, "[[Koa'ki Meiru Sandman]]", a [[Spell Card]]-negating counterpart, "[[Koa'ki Meiru Wall]]", and a [[Summon]]-negating counterpart, "[[Koa'ki Meiru Overload]]". All four have the same ATK, DEF, [[Attribute]], [[Type]], [[Level]], and [[Maintenance Cost|maintenance cost]].
