title: Card Trivia:Dragonic Warrior
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster appears in the artwork of "[[Briar Transplant]]", "[[Dragon Unit Ritual]]", and "[[Dragonic Contract]]".
  * This monster has a combined form with "[[Armed Dragon, the Armored Dragon]]": "[[Dragonic Knight]]".
  * This monster's pose is based on its appearance in the artwork of "Dragon Unit Ritual", where it is depicted holding its sword up by its right hand (which is angled to the right side over its head) while clenching its left hand into a fist.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] a [[Level 4]] or lower [[Dragon]] monster from the [[Deck]] with its effects [[negate]]d is based on the effect of "Dragonic Contract", a [[Spell Card]] used by [[Chazz Princeton (manga)|Chazz Princeton]] to Special Summon "[[Armored Dragon (manga)|Armored Dragon]]" from his Deck (which was treated as a [[Normal Monster]]) in {{chapter|GX|002|ref}}. Its [[discard]]ing cost is based on how "Dragonic Contract" was [[activate]]d from the [[hand]].
