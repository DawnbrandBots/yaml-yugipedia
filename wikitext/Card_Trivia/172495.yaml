title: Card Trivia:Goblin Pothole Squad
wikitext: |-
  {{Navigation}}

  * This monster(s) appears in the artworks of "[[Backup Squad]]" and "[[Secret Blast]]".
  ** The ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' card "[[Goblin Digging Captain]]" is based on this monster and "[[Marauding Captain]]".
  * One of the moles from "[[Trap Mole]]" appears in this card's artwork.
  * This is the first card to define the "[[Trap Hole (archetype)|Trap Hole]]" [[archetype]].
  * In Spanish, this card specifically excludes "Agujero Trampa Oscuro" ("[[Dark Trap Hole]]"), despite the name of the card being "Agujero-Trampa Oscuro". This hyphen also makes the specific exclusion unnecessary.
