title: Card Trivia:Stock the Noodle Ninja
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Noodle Art of Shakery]]".
  * This monster's Japanese name ({{Ruby|火|か}}{{Ruby|麺|めん}}{{Ruby|忍|にん}}{{Ruby|者|じゃ}}バーリカータ, ''Kamen Ninja Bārikāta'') is based on ''barikata'' noodles, which are cooked to be firm to the bite, similar to ''[[wikipedia:Al dente|al dente]]'' for pasta and rice, which features a cloud shape and a red spiral pattern in the center.
  * The ends of this monster's weapon features ''[[wikipedia:narutomaki|narutomaki]]'', a type of ''kamaboko'' (or cured fish ''surimi'') used as a common topping on ramen.
  * This monster has a [[Praime]] [[counterpart]]: "[[Praime Stock]]".
