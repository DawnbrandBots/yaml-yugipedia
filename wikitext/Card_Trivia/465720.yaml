title: Card Trivia:Red Rising Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[Card evolutions|younger]] form of "[[Red Dragon Archfiend]]".
  * This card is a [[counterpart]] of "[[Shooting Riser Dragon]]".
  ** However, unlike this card, "Shooting Riser Dragon" is a younger form of "[[Shooting Star Dragon]]", not "[[Stardust Dragon]]".
  * The combo of [[Synchro Summon]]ing a [[Level]] 8 "[[Red Dragon Archfiend (archetype)|Red Dragon Archfiend]]" monster using this card, "[[Red Resonator]]", and "[[Red Sprinter]]" is similar to the [[loop]] of "[[Dragunity]]" [[Deck]]s to Summon Level 8 [[Synchro Monster]]s.
  ** Ironically, the "Dragunity" loop was one of the fastest ways to Synchro Summon "Stardust Dragon".
