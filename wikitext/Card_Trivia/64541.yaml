title: Card Trivia:Dark Spirit of the Silent
wikitext: |-
  {{Navigation}}

  * The spirit depicted in this card's artwork is similar to the spirits in the artwork of "[[Spiritualism]]".
  ** Similar spirits appear in the artworks of "[[Danger Draw (ARC-V)|Danger Draw]]", "[[Return of the Zombies]]", and "[[Zombie World]]".
  * This card appears in the international artwork of "[[Trap Sluzer]]".
  * This card has two [[Monster Card]] [[counterpart]]s, combined with other monsters used by [[Yami Bakura]]: "[[Dark Spirit of Banishment]]" ("[[The Gross Ghost of Fled Dreams]] + "[[Headless Knight]]") and "[[Dark Spirit of Malice]]" ("[[Earthbound Spirit]]" + "[[The Portrait's Secret]]").
  * In the original ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, this card was a [[Continuous Trap]] instead of a [[Normal Trap]].
  * For unknown reasons, the original North-American printing of this card had its name written with black text instead of white text.
  * According to a [http://www.pojo.biz/board/showthread.php?p=2635643#post2635643 Pojo post] by Dan Scheidegger (an Upper Deck Entertainment employee), this card was intended to be the "card equivalent" of the anime effect of "[[Dark Sanctuary]]".
