title: 'Card Trivia:Number C6: Chronomaly Chaos Atlandis'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * The number "06" is located on this monster's chest ring.
  * This is the "[[Number C]]" [[Card evolutions|upgraded]] form of "[[Number 6: Chronomaly Atlandis]]".
  ** This monster is a "[[Number]]" [[anti-support]] monster, while its base form is a "[[Number]]" [[support]] monster.
  ** This monster features a symmetrical design while its base form features an asymmetrical design. This is further enforced with this card's [[Original ATK and DEF|original ATK and DEF]] of 3300, in contrast to its base form's original [[ATK]]/[[DEF]] of 2600/3000.
  * This is the first "Number C" monster to have a number with only one digit.
  * This is the first [[Rank 7]] "Number C" monster.
  * This card has the highest ATK (3300) of all the "[[Chronomaly]]" monsters.
  * This is the first card released in the ''[[OCG]]''/''[[TCG]]'' that can reduce an opponent's Life Points to a fixed amount.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this card uses its monster [[equip]]ping effect, it envelops the opponent's monster with a tentacle made of magma, retracts it into its volcanic shoulder, and buries and petrifies that monster into the surface. This references the aftermath of the eruption of [[wikipedia:Eruption of Mount Vesuvius in AD 79|Mount Vesuvius]] in the ancient city of [[wikipedia:Pompeii|Pompeii]] where the victims of the eruption were encased, petrified, and preserved in ash deposits.
