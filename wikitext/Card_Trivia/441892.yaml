title: Card Trivia:Skiel Carrier
wikitext: |-
  {{Navigation}}

  * This is the only "[[Carrier]]" monster to feature two upgraded forms: "[[Skiel Carrier 3]]" and "[[Skiel Carrier 5]]".
  * Unlike "[[Wisel Carrier]]" and "[[Granel Carrier]]", this monster forms the wings of the full "[[Meklord]]", while the other two form the legs.
