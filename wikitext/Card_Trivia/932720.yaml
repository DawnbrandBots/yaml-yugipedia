title: Card Trivia:Purrely Sharely!?
wikitext: |-
  {{Navigation}}

  * "[[Epurrely Beauty]]", "[[Epurrely Happiness]]", "[[Epurrely Noir]]", and "[[Epurrely Plump]]" appear in this card's artwork.
  * The exclamation and question marks on the Japanese copies of this card and "[[Purrelyeap!?]]" are strangely printed in a different font. This font is reserved for Latin letters and Arabic numerals, and only for these two marks if all other characters are Latin letters, such as the case of "[[Rescue-ACE]]" cards (for example, "[[ALERT!]]"), and not the case of the aforementioned "Purrely" cards.
