title: Card Trivia:Noble Knight Token
wikitext: |-
  {{Navigation}}

  * In ''[[Yu-Gi-Oh! Duel Links]]'', despite this Token card using the same artwork as "[[Noble Knight Iyvanne]]", the monster sprite for this card is represented solely by the lion in that artwork.
  ** Fittingly in the same video game, the monster sprite for "Noble Knight Iyvanne" is represented solely by the human in its artwork.
