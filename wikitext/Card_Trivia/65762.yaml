title: Card Trivia:Witch of the Black Forest
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Mistaken Accusation]]".
  * This monster has a [[recolored counterpart]]: "[[Goddess with the Third Eye]]".
  ** The two also have a counterpart featured only in the artwork of "[[Aid to the Doomed]]".
  * This monster has a conceptual counterpart: "[[Sangan]]".
  ** Both are [[Fusion Material]]s for "[[Sanwitch]]".
  ** Both feature a number of eyes in their designs equal to their [[Level]]; in this monster's case, it has '''four''' eyes.
  ** Both feature effects that [[search]] monsters from the [[Deck]] with 1500 or less stats ([[DEF]] for this monster and [[ATK]] for "Sangan").
