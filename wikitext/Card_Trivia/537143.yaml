title: Card Trivia:Serpent Night Dragon
wikitext: |-
  {{Navigation}}

  * This monster has a [[retrained]] counterpart: "[[Wicked Serpent Night Dragon]]".
  * This monster is the [[DARK]] "evil" counterpart of "[[Seiyaryu]]".
  ** This is based on the fact that this monster's Japanese name is "Evil Knight Dragon", while the Japanese name of "Seiyraryu" is "Holy Knight Dragon", which serves as the basis of its ''[[TCG]]'' name.
  * In the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, this monster is a [[Ritual Monster]], which can be [[Ritual Summon]]ed using the corresponding [[Ritual Spell Card]], "[[Revived Serpent Night Dragon]]".
