title: Card Trivia:Weed Out
wikitext: |-
  {{Navigation}}

  * "[[Giant Soldier of Stone]]", "[[Gyaku-Gire Panda]]", "[[Injection Fairy Lily]]", "[[Karate Man]]", and "[[Sonic Duck]]" appear in this card's artwork.
  ** This card's artwork reveals that "Karate Man" is wearing an afro wig to cover his bald head.
  * This card's artwork is a parody of "[[Return from the Different Dimension]]", replacing the original monsters with [[Level 3]] monsters, and the "[[Different Dimension Gate]]" with a sieve through which the monsters fall.
