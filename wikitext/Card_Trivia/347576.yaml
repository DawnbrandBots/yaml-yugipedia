title: Card Trivia:Avalon
wikitext: |-
  {{Navigation}}

  * "[[Gwenhwyfar, Queen of Noble Arms]]", "[[Lady of the Lake]]", "[[Noble Arms - Caliburn]]", "[[Noble Arms - Excaliburn]]", "[[Sacred Noble Knight of King Artorigus]]", and a red version of "[[Noble Arms - Arfeudutyr]]" appear in this card's artwork.
  ** The presence of the red version of "Arfeudutyr" is an allusion to the "[[Laundsallyn]]" monster requirement of this card's activation, since it also appears in the artwork of "[[Ignoble Knight of High Laundsallyn]]".
  * This card is based on [[wikipedia:Avalon|Avalon]], a legendary island featured in the Arthurian legend, where [[wikipedia:King Arthur|King Arthur]] was taken to recover from his wounds after the [[wikipedia:Battle of Camlann|Battle of Camlann]].
