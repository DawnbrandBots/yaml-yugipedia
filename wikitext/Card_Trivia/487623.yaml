title: Card Trivia:Imduk the World Chalice Dragon
wikitext: |-
  {{Navigation}}

  * "[[World Chalice Guardragon]]" → "Imduk the World Chalice Dragon" → "[[Crusadia Draco]]" → "[[Guardragon Andrake]]" → "[[World Chalice Guardragon Almarduke]]" / "[[World Legacy Guardragon Mardark]]"
  ** This card appears to be "World Chalice Guardragon" powered up by the "[[World Legacy]]" artifact.
  *** It is ironic, because "World Chalice Guardragon" is an invalid [[Link Material]], as this card requires a [[Normal Monster]] in order to be [[Link Summon]]ed.
  * This monster appears in the artworks of "[[Starry Dragon's Cycle]]", "[[World Legacy Clash]]", "[[World Legacy Whispers]]", and "[[The World Legacy]]".
  * The eye of a "[[Krawler]]" can be seen on the ground next to this monster.
  * This card's name might be a reference to ''[[wikipedia:Anzû|Anzû]]'', a winged monster from Mesopotamian mythology also known as ''Imdugud''.
