title: Card Trivia:Dragunity Knight - Gae Dearg
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.7]]''.
  * This monster appears in the artwork of "[[Dragunity Legion]]".
  * This monster is named after the Gáe Derg, a red spear used by [[wikipedia:Diarmuid Ua Duibhne|Diarmuid Ua Duibhne]], the hero and demigod in [[wikipedia:Irish mythology|Irish mythology]]. Fittingly, this monster's design features red armor.
  * Visually, this monster is "[[Dragunity Legionnaire]]" riding a large "[[Dragunity Darkspear]]" as its mount.
