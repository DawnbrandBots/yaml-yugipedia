title: Card Trivia:Dark Matter Air Cheer
wikitext: |-
  {{Navigation|mode=nongame}}

  * "Air Cheer" (エールエール ''Ēruēru'') is named after an [[wikipedia:Air horn|Air horn]]. Additionally, it could also be a pun on the activity of cheering consisting of chanting the same slogan, as the name consists of two repeated katakana "エール".
