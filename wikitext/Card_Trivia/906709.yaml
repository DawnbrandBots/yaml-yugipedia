title: Card Trivia:Daigusto Laplampilica
wikitext: |-
  {{Navigation}}

  * This monster is an older form of "[[Ritual Beast Tamer Zeframpilica]]".
  ** This monster consists of older forms of "[[Pilica, Descendant of Gusto]]" and "[[Spiritual Beast Rampengu]]".
  *** Ironically, this card cannot be [[Synchro Summon]]ed using these monsters under normal circumstances, as neither monster is a [[Tuner]] and their [[Level]]s do not add up to 6.
