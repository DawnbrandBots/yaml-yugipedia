title: Card Trivia:White Warrior - Sleet the Morning Star
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Sleet|sleet]], a form of precipitation consisting of ice pellets, often mixed with rain or snow.
  ** This monster's subtitle and weapon are based on the [[wikipedia: Morning star (weapon)|morning star]], a club with a heavy spiked head, sometimes attached to the handle by a chain.
