title: Card Trivia:Shiranui Shogunsaga
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Shiranui Style Swallow's Slash]]".
  * "[[Shiranui Spectralsword]]" appears in this card's artwork.
  * A toy version of this monster's sword appears in the artwork of "[[Hatsugai]]".
  * This monster is a further [[Card evolutions|upgraded]] form of "[[Shiranui Samuraisaga]]".
  ** According to ''[[Master Guide 6 card storylines#File No. 04: The Quarrel Between the "Mayakashi" and the "Shiranui" Continues with the Tale of "Ghost Meets Girl"|Master Guide 6]]'', this monster is "[[Shiranui Samurai]]" after using "[[Shiranui Style Synthesis]]" to merge himself with the soul sealed within "[[Shiranui Spectralsword]]".
  * This card is the first [[Level]] 8 [[Zombie]] [[Synchro Monster]].
