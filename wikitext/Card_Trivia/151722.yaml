title: Card Trivia:Wattjustment
wikitext: |-
  {{Navigation}}

  * The gun in this card's artwork resembles a hot glue gun, used in art to bond heavier paper.
  * This cards name comes from the portmanteau of "Watt" and "Adjustment". Seeing as how it adjusts their attack, and gives them a new effect.
  * The gun in this card's artwork appears in the artwork of "[[Gift Exchange]]".
