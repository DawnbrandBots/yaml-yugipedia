title: Card Trivia:Springans Captain Sargas
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded in High Spirits]]", "[[Spright Double Cross]]", "[[Spright Smashers]]", "[[Spright Starter]]", "[[Springans Booty]]", "[[Springans Merrymaker]]", "[[Therion Charge]]", "[[Therion Cross]]", "[[Therion Discolosseum]]", and "[[Therion Stand Up!]]".
  * This card has an upgraded [[Xyz Monster|Xyz]] form combined with "[[Springans Ship - Exblowrer]]" and "[[Therion "King" Regulus]]": "[[Gigantic "Champion" Sargas]]".
  * This card is named after [[wikipedia:Theta Scorpii|Sargas]], a star in the constellation of [[wikipedia:Scorpius|Scorpius]].
  ** Fittingly, this monster has a scorpion-like tail and retractable claws, as shown in its concept artwork.
  ** This monster is related to the "[[Therion]]" monsters, which are also named after stars in constellations.
