title: Card Trivia:Divine Relic Mjollnir
wikitext: |-
  {{Navigation}}

  * In Norse mythology, [[wikipedia:Mjöllnir|Mjöllnir]] was the name of the weapon used by [[Thor, Lord of the Aesir|Thor]] himself, a hammer crafted out of iron gifted to him by the dwarves. The Norsemen believed that the sound of thunder was made by him hurling it at his foes.
  * It is usable by all [[Aesir]] monsters, though it was originally [[Thor, Lord of the Aesir|Thor]]'s weapon.
  * [[Thor, Lord of the Aesir]] seems to be holding this weapon. However, it does not look like this card.
  * Because it only affects "Aesir" monsters, this card's name is referred to as a '''Divine Relic''' as opposed to a [[Nordic Relic]].
