title: Card Trivia:Paladin of Dark Dragon
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Red-Eyes]]" [[counterpart]] of "[[Paladin of White Dragon]]".
  ** Unlike "Paladin of White Dragon", this monster can be [[Tribute]]d to [[Special Summon]] any "[[Red-Eyes]]" monster rather than only the [[archetype]]'s main member.
  * Unlike "Paladin of White Dragon", this monster is not depicted with a dragon mount in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime; however, in the ''[[OCG]]''/''[[TCG]]'', this monster is depicted mounted on a dark version of a younger "[[Blue-Eyes White Dragon]]" instead of a younger "[[Red-Eyes Black Dragon]]".
