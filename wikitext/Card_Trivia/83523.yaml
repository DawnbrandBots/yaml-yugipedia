title: Card Trivia:Bad Reaction to Simochi
wikitext: |-
  {{Navigation}}

  * The word "Simochi" (シモッチ, ''Shimocchi'') is not a Japanese word; it is instead a corruption of「{{Ruby|死|し}}{{Ruby|持|も}}ち{{Ruby|似|に}}{{Ruby|寄|よ}}る{{Ruby|副|ふく}}{{Ruby|作|さ}}{{Ruby|用|よう}}」 (''Shi mochi ni yoru fukusayō''), meaning "adverse reaction resembling death".
