title: Card Trivia:Suanni, Fire of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of  "[[Laser Qlip]]" and "[[Sinister Shadow Games]]".
  ** The artwork of "Laser Qlip" depicts this monster and "[[Pulao, Wind of the Yang Zing]]" being destroyed by "[[Apoqliphort Towers]]". Their shadows would be transformed into their "[[Shaddoll]]" counterparts and would battle their original form, as depicted in the artwork "Sinister Shadow Games".

  * This monster's name is based on [[wikipedia:zh:狻猊|Suānní]] (zh: 狻猊 ''suānní''), one of the [[wikipedia:Nine sons of the dragon|nine sons]] of the [[wikipedia:Dragon King|Dragon King]] who is depicted as a hybrid of a dragon and a lion.
  ** According to Chinese mythology, Suānní likes to sit down and is historically placed at the bases of Buddhist idols, under the Buddhas' or Bodhisattvas' feet.

  * This monster has a "Shaddoll" counterpart: "[[Shaddoll Dragon]]".
