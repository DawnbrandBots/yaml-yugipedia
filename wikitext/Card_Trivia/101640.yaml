title: Card Trivia:Regenerating Mummy
wikitext: |-
  {{Navigation}}

  * The OCG name uses the Portuguese word for mummy, "mirra", as a loanword.
  * The [[Gold Series]] Spanish print of this card uses the word "''regresar''" instead of "''devolver''", which is the official word for that TCG branch for the word "''return''".
