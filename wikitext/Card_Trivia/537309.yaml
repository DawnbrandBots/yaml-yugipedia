title: Card Trivia:Reshef the Dark Being
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Resheph|Resheph]], the Canaanite god of war and disease that was later adopted in [[wikipedia:Egyptian mythology|Egyptian mythology]].
  * This is the [[Monster Card]] version of [[Reshef the Dark Being (Reshef of Destruction)|Reshef the Dark Being]], the primary antagonist of ''[[Yu-Gi-Oh! Reshef of Destruction]]'', which was released roughly two years before its release in the ''[[OCG]]''/''[[TCG]]''.
  ** The three colored orbs in this monster's design are based on the [[Egyptian God]] cards that Reshef absorbs to regain their power in ''Reshef of Destruction''. This likely reflects this monster's [[LIGHT]] [[Attribute]], which is depicted with a yellow color scheme similar to the [[DIVINE]] Attribute.
  ** This monster's effect to [[discard]] a [[Spell Card]] and take [[control]] of an opponent's monster is based on "[[Change of Heart]]", which Reshef uses to facilitate the usage of the Egyptian God cards during his Duel in ''Reshef of Destruction''.
