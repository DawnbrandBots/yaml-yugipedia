title: Card Trivia:Blue-Eyes Ultimate Spirit Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Advent of the Eyes of Blue]]''/''[[Structure Deck: Blue-Eyes White Destiny]]'' and ''[[Structure Deck: Advent of the Eyes of Blue Legendary Majesty Inheritance Pack]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Blue-Eyes Spirit Dragon]]".
  * This monster is a [[Synchro Monster|Synchro]] [[counterpart]] of "[[Blue-Eyes Ultimate Dragon]]".
  ** Both are three-headed [[Level 12]] "[[Blue-Eyes]]" [[Extra Deck]] monsters.
  ** This monster's pose in its card artwork mirrors the pose of "Blue-Eyes Ultimate Dragon" in its first ''[[OCG]]''/''[[TCG]]'' artwork.
  ** Fittingly, after gaining 1000 [[ATK]] with its own effect, this monster's ATK will become 4500, the same [[original ATK]] as "Blue-Eyes Ultimate Dragon".
