title: Card Trivia:Bonded Bowing
wikitext: |-
  {{Navigation}}

  * The man in the card's artwork also appears in the artwork of "[[Bowing Brotherhood]]".
  * This card's Japanese name, "Bandaged Bowing" (オジギプス, ''Ojigipusu'') is a portmanteau of the Japanese words for "bowing" (お辞儀, ''Ojigi'') and "plaster cast" (ギプス, ''Gipusu'').
