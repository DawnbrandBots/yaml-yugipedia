title: Card Trivia:Magnet Reverse
wikitext: |-
  {{Navigation}}

  * This card's name is also likely "'''Magnet Rebirth'''", due to the ambiguous pronunciation of the Japanese word "''Ribāsu''".
  ** This is further enforced with this card's artwork depicting gravestones, as well as its effect to [[Special Summon]] [[Rock]] or [[Machine]] monsters from the [[Graveyard]].
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card was a [[Normal Spell Card]]; however, in the ''[[OCG]]''/''[[TCG]]'', it was released as a [[Quick-Play Spell Card]].
