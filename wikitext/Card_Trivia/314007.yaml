title: Card Trivia:Night Express Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Urgent Schedule]]".
  * This monster's appearance is based on the [[wikipedia:700 Series Shinkansen|700 Series Shinkansen]], a high-speed locomotive known for its flat "duck bill" nose design.
  ** This monster's name is based on the ''[[wikipedia:Night Express|Night Express]]'', an American express train known for its midnight schedule between Detroit, Michigan, and Louisville, Kentucky.
  *** This monster's appearance featuring a knight motif is a pun on its name, due to how the words "night" and "knight" rhyme with each other.
