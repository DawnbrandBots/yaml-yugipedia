title: Card Trivia:Red-Boot Boost Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Yuamu - Come Forth! High Tech Dragon!]]''.
  * This monster appears in the artworks of "[[Burst Boost]]", "[[Drag 'n Drop]]", "[[Dragonic Clock]]", "[[Dragons Boost Fusion]]", "[[Flash Memory Fusion]]", and "[[Red Boost]]".
  * This monster is a [[High Tech Dragon]] [[counterpart]] of "[[Red-Eyes Black Dragon (Rush Duel)|Red-Eyes Black Dragon]]".
  ** This monster's attack name ''(ダーク・ギガ・フレア Dāku Giga Furea)'' is based on the attack name of "[[Red-Eyes B. Dragon (later anime)|Red-Eyes B. Dragon]]" in the ''[[Yu-Gi-Oh! GX]]'' anime ''(ダーク・メガ・フレア  Dāku Mega Furea)''. 
  ** This monster has a [[LIGHT]] counterpart, "[[Blue-Fang Burst Dragon]]", who is a High Tech Dragon counterpart of "[[Blue-Eyes White Dragon]]", referencing the rivalry between "Blue-Eyes" and "Red-Eyes" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  * This monster is named after "[[wikipedia:RedBoot|RedBoot]]", an open-source application that allows the downloading and execution of embedded applications via serial or Ethernet.
  * This monster has three [[Fusion Monster|Fusion]] forms:
  ** An [[Card evolutions|upgraded]] form with "[[Booster Wyvern]]": "[[Red-Boot Enhanced Boost Dragon]]".
  ** A [[Darkness (Rush Duel series)|Darkness]] form: "[[Red-Reboot Enhanced Boost Dragon]]".
  ** A Fusion form with "Blue-Fang Burst Dragon": "[[Violet-Scale Enhanced Blast Dragon]]".
  * "[[Tamabot Boost Dragon]]" is "[[Tamabot]]" with design elements based on this monster.
