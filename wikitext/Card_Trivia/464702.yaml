title: Card Trivia:True King Bahrastos, the Fathomer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Crystron Impact]]", "[[Crystron Inclusion]]", and "[[True King's Return]]".
  * This monster's name is derived from "bahr", the Arabic word for "sea".
  ** The character "渎" in this monster's Simplified Chinese name, "真龙皇 渊渎圣子 统领" is a pun, as it means both "ditch" (referring to the oceanic abyss) and "profane".
  * Since the non-[[WIND]] "[[True Draco#True King|True King]]" monsters are the antagonistic rivals of an [[archetype]]/[[series]] related to the "[[Dracoslayer]]" storyline with the same [[Attribute]], this monster is a rival to the "[[Crystron]]" archetype (which primarily consists of [[WATER]] monsters) as depicted in the artwork of "Crystron Impact".
