title: Card Trivia:Super Koi Koi
wikitext: |-
  {{Navigation}}

  * "[[Flower Cardian Clover with Boar]]", "[[Flower Cardian Paulownia]]", "[[Flower Cardian Pine]]", and "[[Flower Cardian Willow]]" appear in this card's artwork
  ** The mustached man who appears in the artworks of "[[Dark Bribe]]", "[[Fraud Check]]", "[[Fraud Freeze]]", and "[[Sneaky Sleeve]]" appears in this card's artwork.
  * This card's name is based on "[[wikipedia:Koi-Koi|Koi-Koi]]", a game played with ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards, in which the player shouts the titular phrase and continues adding the hand to expect the right cards to form a combination.
  ** This card's effect further references the rules of "Koi-Koi", in which the player must [[excavate]] the top three cards of their [[Deck]] and assemble a number of "[[Flower Cardian]]" monsters used to create a combination; in this case, it allows the player to facilitate the possible [[Synchro Summon]]ing of a "Flower Cardian" [[Synchro Monster]], which is based on the combination of special ''hanafuda'' cards.
