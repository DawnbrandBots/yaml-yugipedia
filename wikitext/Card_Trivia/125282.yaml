title: Card Trivia:Stygian Sergeants
wikitext: |-
  {{Navigation}}

  * "Stygian" is a word used to describe something related to the river [[wikipedia:Styx|Styx]] of [[wikipedia:Greek mythology|Greek mythology]].
  * In the Japanese anime, this card had the name "Hell Twin Cop - Jaw & Kick" (ヘル・ツイン・コップ ジョー＆キック, ''Heru Tsuin Koppu Jō Ando Kikku''). This was a reference to [[wikipedia:CHiPs|CHiPs]], an American crime drama TV show whose Japanese name (白バイ野郎ジョン＆パンチ, ''Shirobai Yarō Jon Ando Panchi'') can be translated as "Police Motorcycle Guys Jon and Ponch".
  ** This reference is further supported by the fact that "Jaw" is a slight phonetic corruption of "Jon", and a "[[wikipedia:Kick|kick]]" can be said to be the complement of a "[[wikipedia:Punch (combat)|punch]]" (which sounds similar to "Ponch").
  * This card was the first [[DARK]]-[[Attribute]] [[Fiend]] [[Synchro Monster]] released in the ''[[TCG]]''.
