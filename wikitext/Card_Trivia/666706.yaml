title: Card Trivia:Mutually Affured Destruction
wikitext: |-
  {{Navigation}}

  * "[[White Magician Pikeru]]", "[[Ebon Magician Curran]]", and the top of the head of the giant from "[[Trial of the Princesses]]" appear in this card's artwork.
  * This card's TCG name is a pun on [[wikipedia:Mutual assured destruction|"mutual assured destruction" (MAD)]], a military doctrine revolving around deterring opposing sides from using a nuclear weapons by ensuring that both sides of the conflict will be totally destroyed if a full-scale nuclear exchange occurs.
  ** This card's effect is also based on this pun, as it prevents each player from using cards with the same name against each other.
