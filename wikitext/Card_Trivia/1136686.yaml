title: Card Trivia:Dracotail Phryxul
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Taurus (constellation)|Taurus]].
  ** The [[wikipedia:Astrological sign|astrological sign]] for [[wikipedia:Taurus (constellation)|Taurus]] appears on this monster's belt, its hair and (presumably) in the centers of the zodiac wheels emanating from its instrumental horn.
