title: Card Trivia:Neo Space Connector
wikitext: |-
  {{Navigation}}

  * "[[Neo Space]]" appears in the background of this card's artwork, seemingly depicted as a [[wikipedia:Hoag's Object|Hoag's Object]].
  * This monster is a younger form of "[[Neo Space Pathfinder]]".
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Level]] (4), [[Type]] ([[Warrior]]) and have opposite [[ATK]]/[[DEF]].
  ** Their card artworks also depict "Neos Space", albeit in different sizes.
  * This monster has a male "[[Elemental HERO]]" [[counterpart]]: "[[Elemental HERO Neos Alius]]".
