title: Card Trivia:Spearfish Soldier
wikitext: |-
  {{Navigation}}

  * This monster's head is based on a [[wikipedia:Billfish|billfish]], a group of predatory fish categorized by their notable flat, pointed bill.
  ** This monster's name and appearance are puns on [[wikipedia:Spearfishing|spearfishing]], a method of fishing that involves the usage of a sharp pointed tool to impale fish, whereas this monster's head features a long bill and wields double lances, both of which are used impale monsters.
