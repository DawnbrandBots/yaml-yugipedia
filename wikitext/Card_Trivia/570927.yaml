title: Card Trivia:Junk Speeder
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s for the ''[[2018 Mega-Tins]]''.
  * This monster's name and appearance are similar to those of "[[Speed Warrior]]".
  ** Both monsters feature an effect that doubles their own [[ATK]] on the turn it was Summoned in a specific manner.
  * This is the first "[[Junk]]" [[Synchro Monster]] that does not specifically require "[[Junk Synchron]]" as [[Synchro Material]].
  * This monster's pose references the ''"Rider Kick"'', a signature finishing move of multiple protagonists across the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' series.
