title: Card Trivia:Herald of Pure Light
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Invincibility Barrier]]".
  * This monster makes up the upper-body portion of "[[Herald of Ultimateness]]".
  * This monster's effect is the opposite of that of the other [[Herald]] monsters: this monster's [[add]]s cards from the [[Graveyard]] to the [[hand]], while the other Herald monsters [[send]] cards from the hand to the Graveyard to [[activate]] their effects.
