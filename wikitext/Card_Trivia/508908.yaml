title: Card Trivia:Uluru the Guardian Spirit
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is a reference to [[wikipedia:Uluru|Ayers Rock]], also known as Uluru, a large sandstone rock formation in Australia.
  ** Fittingly, in {{episode|GX|140|ref}}, [[Jim Crocodile Cook]] used "[[Sacred Defense Barrier (anime)|Sacred Defense Barrier]]" and "[[Uluru's Guardian]]", during his [[Duel]] against [[The Supreme King]].
