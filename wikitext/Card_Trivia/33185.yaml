  * "[[Gaia The Fierce Knight]]" appears in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|67|ref}} showing "[[Gaia the Fierce Knight (manga)|Gaia the Fierce Knight]]" attacking.
  ** This card is based on the [[attack name]] of "Gaia The Fierce Knight" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].

