title: Card Trivia:Zoodiac Chakanine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zoodiac Gathering]]".
  * This monster represents the sign of the [[wikipedia:Dog (zodiac)|dog]] on the [[wikipedia:Chinese zodiac|Chinese zodiac]].
  * This monster's Japanese name, "Lyca", is derived from both the Latin word for "wolf" and "Laika", the name of a [[wikipedia:Laika (dog breed)|Russian dog breed]].
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "[[wikipedia:Chakram|chakram]]" and "[[wikipedia:Canis|canine]]".
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018566958309703688 Bilibili] and [https://weibo.com/7406309913/5119183839040002 Weibo] at 8:00 PM (China Standard Time) on January 4, 2025, which was the fourth quarter of the Xu hour in the traditional Chinese timekeeping system.
