title: Card Trivia:Michizure
wikitext: |-
  {{Navigation}}

  * The men appearing in this card's artwork appear in the artwork of "[[Appropriate]]".
  * ''Michizure'' is a Japanese expression that literally means "fellow traveler", but is often used to indicate taking down an enemy with one's own defeat, which is reflected by this card's effect to [[destroy]] a monster on the [[field]] immediately after a monster is sent to the [[Graveyard]].
