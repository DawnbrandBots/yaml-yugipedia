title: Card Trivia:Beast Soul Swap
wikitext: |-
  {{Navigation}}

  * "[[Great Angus]]" appears in this card's artwork.
  ** The event depicted in this card's artwork is a continuation of the events depicted in the artwork of "[[Abduction]]".
  * This card's Japanese name, "Cattle Mutilation", is based on the [[wikipedia:Cattle mutilation|phenomenon of the same name]], in which livestock is killed or mutilated under unusual and sometimes bloodless circumstances, which is demonstrated in this card's artwork.
