title: Card Trivia:Gigantic "Champion" Sargas
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Tally-ho! Springans]]".
  * This monster is an upgraded [[Xyz Monster|Xyz]] form of "[[Springans Captain Sargas]]", combined with "[[Springans Ship - Exblowrer]]" and "[[Therion "King" Regulus]]".
  ** This monster's naming scheme is similar to that of the "[[Therion]]" [[archetype]], as well as the name of "[[Gigantic Spright]]".
  ** This monster's [[original ATK and DEF]] (2800/1500) is an inverse of those of "Springans Captain Sargas" (1500/2800).
  ** This monster can be [[Xyz Summon]]ed using either "Springans Captain Sargas" and "Therion "King" Regulus" (both [[Level 8]] monsters) or "Springans Ship - Exblowrer" (a "[[Springans]]" [[Xyz Monster]]).
