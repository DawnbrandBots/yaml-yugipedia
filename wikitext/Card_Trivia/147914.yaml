title: Card Trivia:Meklord Astro Dragon Asterisk
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Meklord Astro the Eradicator]]".
  * This monster's name is based on an [[wikipedia:Asterisk|asterisk]], a punctuation mark that is sometimes depicted as a six-pointed star when handwritten, which appears on this monster's face.
  ** In {{episode|5D's|142|ref}}, when this monster was Summoned, the asterisk was formed by overlaying the three atom-like infinity symbols (∞) of the "[[Meklord Emperor]]" monsters.
  *** Each of this monster's infinity symbols is colored differently to represent a "Meklord Emperor" and their respective "[[Meklord Army]]" monsters: blue for "[[Skiel]]", white for "[[Wisel]]", and orange for "[[Granel]]".
  * This monster's pose is depicted to form the shape of the infinity symbol.
  * Unlike the "Meklord Emperors" and "[[Meklord Astro Mekanikle]]", this monster does not feature an effect that [[equip]]s itself with an opponent's [[Synchro Monster]] and increase its [[ATK]] by said monster's ATK.
  * In the ''[[OCG]]''/''[[TCG]]'', the highest amount of ATK this monster will gain is 15,000, which can be accomplished by [[send]]ing three copies of "Meklord Astro Mekanikle" and one copy of "[[Meklord Astro Dragon Triskelion]]".
