title: Card Trivia:Hidden Armory
wikitext: |-
  {{Navigation}}

  * The swords and samurai armor in this card's artwork also appear in the artwork of "[[Armory Call]]".
  ** This two cards have very similar Japanese names; アームズ・ホール (''Āmuzu Hōru'') and アームズ・コール (''Āmuzu Kōru''), meaning "Arms Hole" and "Arms Call" respectively.
  * The armor on the right looks like a traditional knight's armor from the [[wikipedia:Middle Ages|Middle Ages]], while the one on the left looks like a traditional samurai armor.
  * This card could be considered a reference to "[[wikipedia:Hammerspace|hammerspace]]", a notional extradimensional space used to explain where comic, animated and video game characters keep various objects when not in use.
