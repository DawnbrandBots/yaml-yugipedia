title: Card Trivia:Phoenixian Cluster Amaryllis
wikitext: |-
  {{Navigation}}

  * This monster is based on an ''[[wikipedia:Amaryllis|amaryllis]]'', a genus of flowering bulb plants known for producing four trumpet-shaped flowers on a single stem.
  ** This monster's name, design, and [[FIRE]] [[Attribute]] are based on the [[wikipedia:Phoenix (mythology)|phoenix]], a mythical firebird that bursts into flames upon dying and is reborn from its ashes, which reflects its effect to be [[Special Summon]]ed from the [[Graveyard]] during the [[End Phase]] that it is [[destroy]]ed and [[sent]] there.
