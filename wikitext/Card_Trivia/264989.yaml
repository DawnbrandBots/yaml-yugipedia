title: Card Trivia:Big Whale
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Sperm whale|sperm whale]], the largest species of toothed whale and toothed predator.
  * This card has the highest [[DEF]] (3000) of any [[Fish]] monster.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect is based on this card's appearance in {{episode|ZEXAL|084|ref}}; [[Reginald Kastle|Reginald "Shark" Kastle]] uses the effect of "[[Tri-Slice]]", a card that could [[Tribute]] a [[Fish]] monster and [[Special Summon]] three [[WATER]] monster with the same name and a certain [[Level]], depending on the Level of the Tributed monster. As [[Big Whale (anime)|this card]] was a [[Level 9]] monster, Shark Tributed it to Special Summon three [[Level 3]] "[[Starfish (anime)|Starfish]]".
