title: Card Trivia:Sevens Road Witch
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Deck Set - Yuga vs. Luke]]'' and ''[[Megaroad Pack]]''.
  * This monster appears in the artworks of "[[Magical Sevens Fusion]]", "[[Seven Crossroad]]", "[[Sevens Road Boost]]", and "[[Sevens Twin Burst]]".
  ** "[[Magical Punisher]]" is based on the metal ring from this monster's staff.
  * This card's artwork features seven cross-shaped symbols, referencing the "7" motif of the [[Sevens Road]] [[series]].
  ** This symbol also appears in the artworks of "[[Majesty of the Sevens Road]]", "[[Master of the Sevens Road]]", "[[Sevens Road Ultima Witch]]", and "Sevens Twin Burst".
  *** The artwork of "Master of the Sevens Road" shows that this monster corresponds to the upper left symbol in the Sevens Road crest. When "[[Master of the Sevens Road (anime)|Master of the Sevens Road]]" appears in the anime, the order of the symbols is reversed, so it instead appears to correspond to the top symbol.
  * This monster has a [[Celeb Rose]] [[counterpart]]: "[[Celeb Rose Witch]]".
  ** Both monsters share the same [[Level]] (6), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (1600/1000). They also both have effects to summon the "Magician" monster of their respective series, though from different locations. 
  * Like many cards used by [[Yuga Ohdo]], this monster and "[[Sevens Road Magician]]" are homages to cards used by [[Yugi Muto]]; in this case "[[Dark Magician Girl]]" and "[[Dark Magician]]", respectively.
  ** This monster and "Dark Magician Girl" are both Level 6 [[DARK]] [[Attribute]] Spellcaster Type monsters that [[support]] the main [[Signature card|ace monster]] of their respective protagonist.
  ** This monster and "Sevens Road Magician" break from the visual theming used by all other Sevens Road monsters; they wear similar clothing in the same colors as each other's, rather than matching their background.
