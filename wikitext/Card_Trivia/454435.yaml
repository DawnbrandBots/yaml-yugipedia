title: Card Trivia:Kozmo Landwalker
wikitext: |-
  {{Navigation}}

  * 8 copies of "[[Kozmo Soartroopers]]", 3 copies of "[[Kozmo Delta Shuttle]]", and 2 other copies of this monster appear in this card's artwork.
  * This monster is based on the [[wikipedia:Walker (Star Wars)|AT-AT walkers]] from the ''[[wikipedia:Star Wars|Star Wars]]'' film franchise.
  * This monster is the only land-based "Kozmo" Machine-Type monster.
