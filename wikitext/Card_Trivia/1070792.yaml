title: Card Trivia:DPH Gendamoore
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "DPA Gendamoore", is based on [[wikipedia:Power analysis#Differential power analysis|differential power analysis]], a form of side channel attack in cryptography.
  ** This monster's ''[[TCG]]'' name is based on high-order differential power analysis (DPH), the advanced form of DPA attack.
