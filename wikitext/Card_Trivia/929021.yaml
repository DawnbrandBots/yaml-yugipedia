title: Card Trivia:Kumamon
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Kumamon|Kumamon]] is a mascot created by the government of [[wikipedia:Kumamoto Prefecture|Kumamoto Prefecture]] to draw tourists to the region after the [[wikipedia:Kyushu Shinkansen|Kyushu Shinkansen]] line opened.
  ** [[Nanana]] the Banana, the mascot of [[wikipedia:TV Tokyo|TV Tokyo]], also appears in this card's artwork.
  * This is first [[WATER]]-[[Attribute]] [[Pyro]]-[[Type]] [[Monster Card]].
