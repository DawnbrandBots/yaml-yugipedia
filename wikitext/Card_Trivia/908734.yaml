title: Card Trivia:Gizmek Inaba, the Hopping Hare of Hakuto
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sacred Scrolls of the Gizmek Legend]]".
  * This card is the first monster with 50 [[original ATK and DEF]].
  * This card's ''[[OCG]]'' name is based on ''[[wikipedia:Hare of Inaba|Inaba-no-Shirousagi]]'' and ''[[wikipedia:Oki Islands|Okinoshima]]''.
