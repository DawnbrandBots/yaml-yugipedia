title: Card Trivia:Magical King Moonstar
wikitext: |-
  {{Navigation}}

  * The background of this card's artwork features the symbols of a crescent moon and a star, which resemble the [[wikipedia:Star and crescent|star and crescent symbols]] used to represent the [[wikipedia:Ottoman Empire|Ottoman Empire]] and the modern-day [[wikipedia:Islam|Islamic religion]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|006|ref}}, specifically from the panel showing [[Magic King Moon Star (manga)|this monster]] being Summoned.
