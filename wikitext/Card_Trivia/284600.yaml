title: Card Trivia:Shining Destroyer
wikitext: |-
  {{Navigation|mode=nonGame}}

  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster's effect is [[activate]]d, an evil-looking imp appears above it. This represents the true nature of its owner,  [[Vector|Ray Shadows]], whose bright and happy demeanor is a façade for his darker and duplicitous nature.
