title: Card Trivia:Angry Burger
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Hungry Burger]]".
  ** The word "Angry" (アングリ, ''Angurī'') is a pun on the Japanese word for "open-mouthed" (あぐり, ''anguri''), reflecting this monster's wide open-mouthed appearance.
  *** "Angry" is also one of the only words to rhyme with "Hungry".
  ** Its appearance is based on a deluxe hamburger, which features additional fillings compared to "Hungry Burger", but lacks one of the layers of lettuce.
  ** The Japanese flag on its top bun is replaced with one of the "[[Nouvelles]]" logo as seen on the star badges of their monsters, namely "[[Chef de Nouvelles]]" and "[[Poissonniere de Nouvelles]]".
  * This monster has the highest original ATK (2800) of all [[Level 6]] [[Ritual]] Monsters.
