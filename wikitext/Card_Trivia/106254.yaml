title: Card Trivia:Chaos-End Master
wikitext: |-
  {{Navigation}}

  * This monster is designed to work in conjunction with "[[Sphere of Chaos]]", whose effect can [[Special Summon]] the latter monster from the [[Deck]] and be used to [[Synchro Summon]] either "[[Light End Dragon]]" or "[[Dark End Dragon]]", due to the effect of "Sphere of Chaos" treating its [[Attribute]] as [[LIGHT]].
  ** This is supported by the fact that all four monsters were released in the same [[Booster Pack]] (''[[Limited Edition 12]]'' in the ''[[OCG]]'', and ''[[Raging Battle]]'' in the ''[[TCG]]'').
  ** This can also work in reverse; if "Sphere of Chaos" is [[Tribute Summon]]ed, its effect can [[add]] this monster from the Deck to the [[hand]], allowing it to be [[Normal Summon]]ed later. The effect of "Sphere of Chaos" which prevents itself from being [[destroyed by battle]] protects it in the meantime.
