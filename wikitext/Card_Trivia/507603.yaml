title: Card Trivia:Covering Fire
wikitext: |-
  {{Navigation}}

  * "[[Cannon Soldier]]" and "[[Mechanicalchaser]]" appear in this card's artwork.
  * This card's name, artwork, and effect is a reference to [[wikipedia:suppressive fire|suppressive fire]], a military tactic where troops fire off weapons to protect exposed friendly soldiers on the battlefield, which is reflected by this card's effect allowing the other targeted monster to cover the attacked monster providing it its [[ATK]].
