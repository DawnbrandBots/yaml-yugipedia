title: Card Trivia:Raidraptor - Tribute Lanius
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Raidraptor - Arsenal Falcon]]".
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this card and "[[Raidraptor - Sharp Lanius]]" had their [[Ignition Effect]]s that were activated during [[Main Phase 2]] changed into [[Trigger Effect]]s that activate at the end of the [[Battle Phase]] due to the Main Phase 2 not being present in the game's [[Speed Duel]] format. These are the first two cards in ''Yu-Gi-Oh! Duel Links'' to have an effect modified to suit the format for reasons unrelated to [[effect damage]] ("[[Crystal Beast Emerald Tortoise]]", which also has an Ignition Effect only usable in Main Phase 2, had its Ignition Effect removed instead).
