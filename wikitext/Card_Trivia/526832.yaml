title: Card Trivia:Odd-Eyes Arc Pendulum Dragon
wikitext: |-
  {{Navigation}}

  [[File:PendulumSummon.png|thumb|right|250|A [[Pendulum Summon]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.]]

  * This is one of the [[cover card]]s of ''[[Legendary Dragon Decks]]'' and ''[[Legendary Arc-V Decks]]''.
  * The [[Pendulum Summon]]ing portal from the ''[[Yu-Gi-Oh! ARC-V]]'' anime appears in this card's artwork.
  * This monster is an "Arc" [[Card evolutions|upgraded]] form of "[[Odd-Eyes Pendulum Dragon]]".
  ** The jewel on this monster's head and the spines on its back are similar to that of [[Yuya Sakaki]]'s [[Yuya's pendant|pendant]].
  ** This monster's name references the title of the ''Yu-Gi-Oh! ARC-V'' anime.
  ** This monster's [[flavor text]] (''Made from miracles, this valiant and beautiful [[dragon]] has gleaming eyes that reflect [[Pendulum Summon|an arc drawn in the sky]].'') references Yuya's [[Summon chants in Yu-Gi-Oh! ARC-V#Yuya Sakaki|Summoning chant]] of "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]" in the Japanese version of the ''Yu-Gi-Oh! ARC-V'' anime: ''Appear! Wondrous and beautiful dichromatic eyes! Odd-Eyes Pendulum Dragon!''
  *** The flavor text also references Yuya's Pendulum Summoning chant in the Japanese version of the anime: ''Swing, my soul's pendulum! Draw an arc of light in the sky! Pendulum Summon!''
  * This is the first "[[Odd-Eyes]]" [[Normal Monster]].
