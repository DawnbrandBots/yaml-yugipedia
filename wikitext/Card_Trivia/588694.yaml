title: Card Trivia:Orcust Crescendo
wikitext: |-
  {{Navigation}}

  * This card's artwork shows the start of the battle between "[[Longirsu, the Orcust Orchestrator]]" and "[[Knightmare Incarnation Idlee]]", with "Longirsu" generating and throwing the spear of "[[Dingirsu, the Orcust of the Evening Star]]" at "Idlee", right before becoming "Dingirsu" himself to fight her.
