title: Card Trivia:Malefic Paradigm Shift
wikitext: |-
  {{Navigation}}

  * "[[Malefic Paradox Dragon]]" and "[[Malefic Truth Dragon]]" appear in this card's artwork.
  * This card's name is based on a [[wikipedia:Paradigm shift|paradigm shift]], a term describing a shift from a commonly held belief to a new belief by mass consensus.
  ** This is reflected in this card's anime effect, which allows the player to "shift" away from "Malefic Paradox Dragon" to "Malefic Truth Dragon".
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the other "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * This card's final ''[[OCG]]''/''[[TCG]]'' effect requiring the opponent to [[control]] a monster with 2500 or more [[ATK]] and make their monsters lose the same amount of ATK is a reference to the anime effect of "[[Malefic Paradox Dragon (anime)|Malefic Paradox Dragon]]" that reduces all of the opponent's monsters' ATK by the ATK of all other [[Synchro Monster]]s they control. In ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'', [[Paradox]] controlled "[[Stardust Dragon (anime)|Stardust Dragon]]" in addition to "Malefic Paradox Dragon", reducing the ATK of his opponent's monsters by 2500 with this effect.
