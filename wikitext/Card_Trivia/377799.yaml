title: Card Trivia:Shaddoll Zefracore
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chosen of Zefra]]".
  * This card's Japanese name, "Ohr Shaddoll - Sephiraroots" (オルシャドール－セフィラルーツ ''Oru Shadōru - Sefirarūtsu'') is a reference to the [[wikipedia:Ohr|Ohr]], a central [[wikipedia:Kabbalah|Kabbalistic]] term in the Jewish mystical tradition.
  * This monster is the "[[Zefra]]" transformed version of "[[Gem-Knight Crystal]]" (who made up one half of "[[Shaddoll Core]]").
  * This card is the first "[[Shaddoll]]" [[Pendulum Monster]].
  * This monster has the same multi-colored sphere and zig-zag pattern as "[[Apoqliphort Towers]]" and "[[Infernoid Onuncu]]".
  * This monster has the "Zefra" crest on its chest and the "[[Gem-Knight]]" crest on its waist.
