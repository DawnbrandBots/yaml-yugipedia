title: Card Trivia:Reflect Bounder
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magnet Reborn]]".
  * This monster has a [[retrained]] counterpart: "[[Psychic Bounder]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from {{chapter|Yu-Gi-Oh!|158|ref}} showing [[Reflect Bounder (manga)|this monster]] being Summoned.
  ** This monster's ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game pose is taken from a panel from the same chapter showing this monster attacking.
