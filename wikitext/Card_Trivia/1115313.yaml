title: Card Trivia:K9-ØØ Lupis
wikitext: |-
  {{Navigation}}

  * "[["A Case for K9"]]" appears in this card's artwork.
  * This monster has two [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] forms: "[[K9-ØØ "Hound"]]" and "[[K9-X "Werewolf"]]".
  * This card's name is intended to include [[wikipedia:slashed zero|slashed zeroes]], as evidenced by the furigana used in its Japanese name. On the Japanese and Simplified Chinese prints, the characters are printed as actual slashed zero characters; on the ''TCG'' and Korean prints, they are printed as [[wikipedia:slashed O|slashed O]] (Ø) instead. In other media (such as on the official Card Database), this card's Japanese and Simplified Chinese names are also rendered as slashed O.
  ** Ironically, the purpose of the slashed zero is to distinguish zero from the letter O.
  ** This card and "K9-ØØ "Hound"" are the only cards with the character "[[wikipedia:Ø|Ø]]" in their names.
