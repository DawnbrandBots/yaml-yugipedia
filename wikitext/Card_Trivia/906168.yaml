title: Card Trivia:The Dragias
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Double Star of the Assault!!]]''.
  * This monster is [[The]] [[counterpart]] to "[[Multistrike Dragon Dragias]]".
  * This monster has three [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] forms: "[[The Dragiastar]]", "[[The Trinity Dragiastar]]", and "[[The Perfect Dragiastar]]".
  * This is the [[signature card]] of [[The Luug]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
