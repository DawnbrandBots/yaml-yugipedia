title: Card Trivia:Straynge Cat Jealousy
wikitext: |-
  {{Navigation}}

  * "[[Furtunate Cat]]" and "[[Straynge Cat]]" appear in this card's artwork.
  * The Japanese pronunciation of this card's name (はぐれネコジェラシー ''Hagure Nekojerashī'') is a portmanteau of the Japanese word for the "cat teaser" toy (ネコジャラシー ''nekojarashi '') and "jealousy" (ジェラシー ''jerashī'').
  ** Fittingly, this card's artwork depicts "Furtunate Cat" playing with the ''nekojarashi'' toy, while "Straynge Cat" is depicted watching with a jealous expression.
