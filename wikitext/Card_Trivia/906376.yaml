title: Card Trivia:Runick Fountain
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Tactical Masters]]''/''[[Tactical Masters]]''.
  * This fountain appears in the artwork of "[[Runick Allure]]".
  * The missing eye of "[[Harr, Generaider Boss of Storms]]" appears in this card's artwork.
  ** This is a reference to how [[wikipedia:Odin|Odin]], which "Harr, Generaider Boss of Storms" is based on, sacrificed one of his eyes to Mímisbrunnr in exchange for a drink in the well.
  * This card is based on [[wikipedia:Mímisbrunnr|Mímisbrunnr]] ("well of Mímir"), one of the three wells located beneath the roots of the world-tree [[wikipedia:Yggdrasil|Yggdrasil]] in [[wikipedia:Norse mythology|Norse mythology]]. It is said that the water of this well contains vast wisdom.
