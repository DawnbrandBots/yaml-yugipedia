title: Card Trivia:Tatsunoko
wikitext: |-
  {{Navigation}}

  * This monster's name is translated from Japanese and Chinese to "Dragon's Child" (竜の子). It is also a shortened version of the Japanese name for "[[wikipedia:Seahorse|seahorse]]" (竜の落とし子 ''tatsu no otoshigo'', lit. "dragon's lost child"), which reflects this monster's design as a young seahorse with a dragon-like appearance.
  ** The aforementioned facts references the Japanese folklore where the seahorse is said to associated with dragons. According to the folklore, a seahorse will eventually transform into a dragon after 100 years.
  * This is the first [[Wyrm]] [[Tuner Synchro Monster]].
  ** It is also the first [[Level 3]] Tuner Synchro Monster.
  * "[[Coral Dragon]]" can be considered an upgraded/adult version of this monster.
  * This monster has a [[Zombie counterpart]]: "[[Tatsunecro]]".
  * This monster has the highest [[original ATK]] (1700) of all Level 3 [[Tuner monster]]s.
