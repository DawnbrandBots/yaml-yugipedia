title: Card Trivia:Cyberse Quantum Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name is a reference [[wikipedia:Quantum computing|quantum computing]], a form of computing that utilizes quantum-mechanical phenomena, such as superposition and entanglement.
  * This is the first [[Cyberse]] [[Synchro Monster]], as well as the first Synchro Monster of the "[[Cyber]]" [[archetype]].
  * This monster shares several similarities to "[[Cyberse Magician]]" and "[[Cyberse Clock Dragon]]".
  ** "Cyberse Magician"
  *** They both share an effect that [[activate]]s when they battle an opponent's monster.
  ** "Cyberse Clock Dragon"
  *** They are both [[Dragon]]-themed [[Extra Deck]] monsters.
  ** "Cyberse Magician" and "Cyberse Clock Dragon"
  *** They are the first Cyberse monsters of their respective monster card types (Synchro, [[Ritual Monster|Ritual]] and [[Fusion Monster|Fusion]], respectively).
  *** They all share the same [[Attribute]] ([[DARK]]), [[Level]] (7), [[Type]] (Cyberse), and [[original ATK and DEF]] (2500/2000).
  *** They all features an effect that protects their controller's other monsters from being targeted by an opponent's attack or card effect while a [[Link Monster]] is also on their [[field]].
  ** Unlike the two aforementioned monsters, this monster does not have a clearly defined based form. It is possible, however, that its base form is "[[Cyberse Synchron]]", due to their similar color schemes, and how the latter was always used to [[Synchro Summon]] this monster in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  *** This is also a likely homage to [[Yusei Fudo]]'s "[[Synchron]]" and "[[Warrior (archetype)|Warrior]]" archetypes used in the ''[[Yu-Gi-Oh! 5D's]]'' anime, in which most of the "Warrior" monsters were the [[Card evolutions|upgraded]] forms of the "Synchron" monsters.
  * This is the last Synchro Monster to be Synchro Summoned in ''Yu-Gi-Oh! VRAINS''.
