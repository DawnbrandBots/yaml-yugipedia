title: Card Trivia:Libromancer Firestarter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Libromancer Displaced]]" and "[[Libromancer Intervention]]".
  * This monster is "[[Libromancer Geek Boy]]" [[Card evolutions|empowered]] by the comic book character he can summon, as depicted in his card artwork, known as "[https://web.archive.org/web/20220202212747/https://pbs.twimg.com/media/FKm1G98XwAkw8XS.jpg:large Firestarter]".
