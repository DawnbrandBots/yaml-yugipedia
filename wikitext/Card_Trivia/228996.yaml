title: Card Trivia:Vile Germs
wikitext: |-
  {{Navigation}}

  * Ironically, despite the mainstream stigma that germs are harmful to any organism, this card's effect can increase the [[ATK]]/[[DEF]] of a [[Plant]] monster [[equip]]ped with this card by 300 points.
  * In the ''[[Yu-Gi-Oh! Forbidden Memories]]'' videogame, this card can be created by fusing "[[Kuriboh]]" with "[[Elegant Egotist]]".
