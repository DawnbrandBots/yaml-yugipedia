title: Card Trivia:Odd-Eyes Raging Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Raging Tempest]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Pendulum Monster|Xyz Pendulum]] form of "[[Odd-Eyes Pendulum Dragon]]" and "[[Dark Rebellion Xyz Dragon]]".
  ** This is the only merged form of "Odd-Eyes Pendulum Dragon" and another [[Four Dimensional Dragons|Dimensional Dragon]] whose Japanese name does not reference the color frame of its corresponding [[card type]].
  ** In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster represented the spirit of [[Z-ARC]] [[awakening]] inside [[Yuya Sakaki]] and [[Yuto]].
  *** This monster's appearance and [[Rank]] (7) is based on the [[wikipedia:Devil|devil]], which is often described as a red dragon with seven crowns. Fittingly, in the Japanese version of the ''Yu-Gi-Oh! ARC-V'' anime, Z-ARC was also called the "Devil Duelist".
  *** This monster was [[Xyz Summon]]ed only when Yuya Sakaki and Yuto were awakened. After Z-ARC's defeat, this monster was never seen again.
  * This monster has a [[counterpart]]: "[[Odd-Eyes Rebellion Dragon]]".
  ** Both are [[Rank 7]] Xyz Pendulum Monsters with an [[original ATK and DEF]] of 3000/2500.
  ** This monster is similar in appearance to "Odd-Eyes Pendulum Dragon", while "Odd-Eyes Rebellion Dragon" is similar in appearance to "Dark Rebellion Xyz Dragon".
  *** However, in the anime, this monster was Summoned with Yuto's "[[Phantom Knights]]" [[Deck]], while "[[Odd-Eyes Rebellion Dragon (anime)|Odd-Eyes Rebellion Dragon]]" was Summoned with Yuya's "[[Performapal]]" Deck.
  ** Both monsters can [[attack]] multiple times if they are Summoned using an Xyz Monster as [[Xyz Material]].
  ** Both monsters features the same [[Pendulum Effect]] of placing another monster in the other [[Pendulum Zone]].
  ** In the ''Yu-Gi-Oh! ARC-V'' anime, when Yuya Xyz Summoned this monster, he called "Dark Rebellion" first and then "Odd-Eyes", while when he Xyz Summoned "Odd-Eyes Rebellion Dragon", he called "Odd-Eyes" first and then "Dark Rebellion".
  ** Unlike "Odd-Eyes Rebellion Dragon" in the ''[[OCG]]''/''[[TCG]]'', this monster has an effect that require to [[detach]] its [[Xyz Material]]s.
  * In the ''Yu-Gi-Oh! ARC-V'' anime, this card and "Odd-Eyes Rebellion Dragon" were the only merged forms of "Odd-Eyes Pendulum Dragon" and another Dimensional Dragon to not require the latter as [[material]] for their Summon.
  * In the ''Yu-Gi-Oh! ARC-V'' anime, this monster's roar was the same as that of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]".
