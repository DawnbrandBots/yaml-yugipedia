title: Card Trivia:Kachi Kochi Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork "[[Power Change Barrier]]".
  * This monster's name is based on "''kachikochi''", the Japanese onomatopoeia for someone's body tensing up, which is further supported by how this monster appears to be tensing up as well.
  * This monster, "[[Alector, Sovereign of Birds]]", "[[Elemental HERO Absolute Zero]]", and "[[Thunder King Rai-Oh]]" are the only promotional cards for a manga volume in which they did not appear.
  ** This is the promotional card for [[Yu-Gi-Oh! ZEXAL - Volume 001|the first volume]] of the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, but it did not appear until the [[Yu-Gi-Oh! ZEXAL - Rank 019|first chapter]] of the [[Yu-Gi-Oh! ZEXAL - Volume 004|fourth volume]].
