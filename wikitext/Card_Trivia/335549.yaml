title: Card Trivia:Smoke Grenade of the Thief
wikitext: |-
  {{Navigation}}

  * This card is one of the few [[Equip Spell Card]]s that does not affect the [[equip]]ped monster in any way.
  * This card has the longest gap between the dates it was released and the dates it became [[Forbidden]] in the ''[[OCG]]'' and ''[[TCG]]''. It was Forbidden nearly 21 years and 11 months after its release in the ''OCG'', while it was Forbidden 17 years and 6 months after its release in the ''TCG''.
