title: Card Trivia:Zerozerock
wikitext: |-
  {{Navigation}}

  * "[[Ganbara Knight]]" appears in this card's artwork.
  ** Fittingly, [[Yuma Tsukumo]] used this card along with "[[Ganbara Knight (anime)|Ganbara Knight]]" in {{episode|ZEXAL|072|ref}}.
  * This card's name, "Zerozerock" (ゼロゼロック ''Zerozerokku''), is a portmanteau of "zero", "rock", and "lock".
  ** "Zero" reflects this card's effect supporting '''0''' [[ATK]] monsters.
  ** "Rock" reflects the multiple stone bricks forming a wall for a '''rock'''-solid defense.
  ** "Lock" reflects this card's '''[[lockdown]]''' effect, preventing the opponent's monsters from attacking the 0 ATK monsters.
