title: Card Trivia:Bunch of Beast Bodies
wikitext: |-
  {{Navigation}}

  * "[[Behemoth the King of All Animals]]", "[[Des Kangaroo]]", "[[Manticore of Darkness]]", and "[[Super-Nimble Mega Hamster]]" appear in this card's artwork.
  ** This card's artwork likely depicts the aftermath of the fight between "Behemoth the King of All Animals" and "Manticore of Darkness" depicted in the artwork of "[[Threatening Roar]]", with both monsters being knocked out.
  ** "[[Behemoth the King of a Hundred Battles]]" is an [[retrained|older version]] of "Behemoth the King of All Animals" after this battle takes place, made evident by its broken left horn.
  ** The appearance of "Des Kangaroo" and "Super-Nimble Mega Hamster" as being terrified of both monsters suggest that this is an alternate series of events that take place after the artwork of "Threatening Roar", where "Behemoth" did not run away from "Manticore" and end up later depicted being humiliated by various smaller monsters; in that series of events, the former two defeat it in "[[Cross Counter]]" and "[[Setuppercut]]", respectively.
  * This card's Japanese name, "Bunch of Beast" (獣累々 ''Shishiruirui''), is a pun on the Japanese idiom 「死屍累々」 (''Shishiruirui''), which means "a mountain of corpses".
