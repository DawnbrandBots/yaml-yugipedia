title: Card Trivia:The Fabled Cerburrel
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Hidden Arsenal: Chapter 1]]''.
  * This monster appears in the artwork of "[[Obedience Schooled]]".
  * The imp-like creature that appears in this card's artwork also appears in the artwork of "[[Fabled Ragin]]".
  ** The creature's name is "Malice", as said in the [[Duel Terminal Master Guide card storylines]].
  * This monster is based on [[wikipedia:Cerberus|Cerberus]], the three-headed dog of the Underworld in [[wikipedia:Greek mythology|Greek mythology]].
