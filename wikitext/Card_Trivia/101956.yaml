title: Card Trivia:Elemental HERO Great Tornado
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Construct Element]]".
  * This monster is named after a [[wikipedia:Tornado|tornado]], a violently rotating column of air that is in contact with both the surface of the Earth and a cumulonimbus cloud, which reflects this monster's [[WIND]] [[Attribute]] and [[Fusion Material]] requiring a WIND monster.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Elemental HERO Stratos]]".
  * This monster has an [[EARTH]] [[counterpart]]: "[[Elemental HERO Gaia]]".
  ** This monster has a bright color scheme, while "Gaia" has a dark color scheme.
  ** This monster is depicted with its right arm stretched out in the top-left corner, while "Gaia" is depicted with its left arm stretched out in the bottom-right corner.
  ** This monster has 2200 [[DEF]], while "Gaia" has 2200 [[ATK]].
  ** Both monsters have an effect that halves the ATK of an opponent's monster when they are [[Fusion Summon]]ed: this monster can halve the ATK/[[DEF]] of all the opponent's monsters, while "Gaia" can halve the ATK of an opponent's monster.
  * This card's ''[[OCG]]''/''[[TCG]]''  artwork is taken from {{chapter|GX|042|ref}}, specifically from the panel showing [[Elemental Hero Great Tornado (manga)|this monster]] being [[Summon]]ed.
