title: Card Trivia:The Dragon Dwelling in the Cave
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragon's Rage]]".
  * This card stereotypes dragons of European mythology. Its lore describes it as a cave-dwelling dragon who guards precious treasure, and it is said to be horrifying when angry. In addition, it bears a great resemblance to European dragons, apart from having a short neck.
