title: Card Trivia:Brinegir
wikitext: |-
  {{Navigation}}

  * "[[Hitodenchak]]" appears in this card's artwork.
  * This monster's name and appearance are based on a [[wikipedia:Brinicle|brinicle]], or brine icicle, a downward-growing hollow tube of ice enclosing a plume of descending brine that is formed beneath developing [[wikipedia:Sea ice|sea ice]].
