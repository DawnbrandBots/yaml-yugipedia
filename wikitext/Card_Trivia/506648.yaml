title: Card Trivia:Shutendoji
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Shuten-dōji|Shuten-dōji]], the leader of the ''[[wikipedia:Oni|oni]]'' in [[wikipedia:Japanese mythology|Japanese mythology]] who got his name (meaning "the ''sake''-drinking lad") from his underlings because of his love for drinking ''sake''.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|017|ref}}, specifically from the panel showing [[Shutendoji (manga)|this monster]] being Summoned.
