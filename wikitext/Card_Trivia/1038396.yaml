title: Card Trivia:Mean Mutt Bullblade
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Heartless Hound Blade - Sorrowful Beast]]", "[[Wander Triple]]" and "[[Wolftastic Mean Mutt]]".
  * This monster's Japanese name (ブルドッス, ''Burudossu'') is a portmanteau of the Japanese word for "[[wikipedia:Bulldog|Bulldog]]" (ブルドッグ, ''Burudoggu'') and "''dossu''" (ドッス).
  ** Fittingly, this monster is a Bulldog wielding a blade with an ''aikuchi'', a form of ornate Japanese sword mounting designed to carry Japanese short swords while being worn by its owner, whereas "''dossu''" is the nickname given to ''aikuchi''-style swords.
