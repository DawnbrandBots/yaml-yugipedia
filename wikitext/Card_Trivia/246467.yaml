title: Card Trivia:Constellar Sombre
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Jewels of the Valiant]]" and "[[Yang Zing Creation]]".
  ** According to the [[Duel Terminal Master Guide card storylines#"Lazuli" and the 12 "Constellar"|Duel Terminal Master Guide card storylines]], this monster is the evolved form of "[[Gem-Knight Lazuli]]" after using the sword of "[[Gem-Knight Master Diamond]]" to fuse with the twelve "[[Constellar]]" monsters (excluding "[[Constellar Rasalhague]]") and the crystallized power of "creation" from "[[Sophia, Goddess of Rebirth]]".
  *** Fittingly, the weapons and [[wikipedia:Astrological sign|astrological signs]] of the twelve "Constellars" are encircled around this monster counterclockwise according to the order of the [[wikipedia:Zodiac|Zodiac]].
  **** The sword of "[[Evilswarm Castor]]" is also visible alongside the sword of "[[Constellar Pollux]]" despite not being mentioned as one of the twelve "Constellars". Given how both monsters are named after the two brightest stars in the Zodiac constellation of [[wikipedia:Gemini (constellation)|Gemini]], "Castor" and "Pollux" likely represent a singular "Constellar".
  *** According to the [[Master Guide 5 card storylines#Star-Guiding Knight|Master Guide 5 card storylines]], "Sombre" later transforms into "[[Tellarknight Ptolemaeus]]" after fusing with "[[Stellarknight Constellar Diamond]]" and the rest of the remaining "[[tellarknight]]s".
  * This monster is named after the [[wikipedia:Sombrero Galaxy|Sombrero Galaxy]], an [[wikipedia:Unbarred spiral galaxy|unbarred spiral galaxy]] located in the Zodiac constellation of [[wikipedia:Virgo (constellation)|Virgo]].
  ** This makes this the first "[[Constellar]]" [[Main Deck]] monster to be named after a galaxy, rather than a specific star.
  * This monster has a "destruction" counterpart: "[[Evilswarm Kerykeion]]".
  ** Both monsters' [[Attribute]]s are opposite of each other; this monster's Attribute is [[LIGHT]], while "Kerykeion's" is [[DARK]].
  ** Both monsters' [[original ATK and DEF]] are an inverse of each other; this monster has 1550 [[ATK]]/1600 [[DEF]], while "Kerykeion" has 1600 ATK/1550 DEF.
  ** Both monsters' effects are parallel of each other, with the only difference being that they support their own respective archetypes.
