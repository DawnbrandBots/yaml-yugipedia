title: Card Trivia:Swallow Flip
wikitext: |-
  {{Navigation}}

  * "[[The Six Samurai - Irou]]" is featured in this card's artwork.
  * The name refers to a mythical sword technique from Japanese legend, the Tsubame Gaeshi (or the Turning Swallow Cut). The technique was created by Sasaki Kojiro, legendary rival of Miyamoto Musashi. It fits only one of the Six Samurai, which is in this card's art.
  * This card is the Special Summon counterpart to "[[Pulling the Rug]]".
  * This card is also a one turn use of "[[By Order of the Emperor]]".
  * This card's Spanish name should be "''Volteo de Golondrina''", as it suffers from a mistranslation of the word "''swallow''", having been translated as in the "to ingest" verb.
