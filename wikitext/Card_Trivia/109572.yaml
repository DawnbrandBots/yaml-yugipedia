title: Card Trivia:Machine King - 3000 B.C.
wikitext: |-
  {{Navigation}}

  * This card follows a four-staged evolution: '''Machine King - 3000 B.C.''' > "[[Machine King Prototype]]" > "[[Machine King]]" > "[[Perfect Machine King]]"
  * Despite this "[[Machine King (archetype)|Machine King]]" being the most antiquated-looking of its [[archetype]], this card's effect allows the highest potential-[[ATK]] gain of its archetype, being able to eclipse "[[Perfect Machine King]]"'s maximum 5500 ATK gain if a [[Machine]]-[[Type]] monster with an ATK higher than the given ATK is [[Tribute]]d.
