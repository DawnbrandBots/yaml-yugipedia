title: Card Trivia:Ichtyosterguard
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of ''[[wikipedia:Ichthyostega|Ichthyostega]]'' and "guard".
  ** Visually, this monster resembled an ''Ichthyostega'' wearing armor typically worn by a royal guard, which also reflects this card's high [[DEF]].
  ** The background of this released card's artwork features a beach shoreline, referencing how the ''Ichthyostega'' is one of the earliest known species to crawl out of the ocean and walk on land.
