title: Card Trivia:Antiberty Flag
wikitext: |-
  {{Navigation}}

  * The flag of "[[Antrebellion of the Rebellion]]" appears in this card's artwork.
  * The Japanese pronunciation of "Antiberty" (アリバティ ''Aribati'') is a portmanteau of the Japanese word for "ant" (蟻 ''Ari'') and "liberty" (リバティ ''Ribati'').
