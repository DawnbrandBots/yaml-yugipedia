title: Card Trivia:Red-Eyes Darkness Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Dragon's Roar]]'', and is also one of the cover cards of ''[[Structure Deck: Special Set]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Red-Eyes Black Dragon]]".
  ** This monster's design is based on the details of the outfit worn by [[Nightshroud]] while possessing [[Atticus Rhodes]] in the ''[[Yu-Gi-Oh! GX]]'' anime, including the yellow accents from his jacket and the red gemstone from the center of his mask.
  * This monster has a [[Metalmorph (archetype)|Metal counterpart]]: "[[Red-Eyes Darkness Metal Dragon]]".
  * This monster has two [[Zombie counterpart]]s: "[[Red-Eyes Zombie Dragon]]" and "[[Red-Eyes Zombie Necro Dragon]]".
  * This monster is the "[[Red-Eyes]]" [[counterpart]] of "[[Blue-Eyes Shining Dragon]]".
  ** Both are advanced, metallic, wvyern-like evolutions of their base forms.
  ** Both have the same [[original ATK and DEF]] as their base forms.
  ** Both are 2 [[Level]]s higher, and gain 300 [[ATK]] for each [[Dragon]] monster in the player's [[Graveyard]].
  ** However, this monster only requires its base form as a [[Tribute]] and has no further effects, while "Blue-Eyes Shining Dragon" requires "[[Blue-Eyes Ultimate Dragon]]" (the [[Fusion Monster|Fusion]] of 3 "[[Blue-Eyes White Dragon]]s") as a Tribute and has the effect of allowing the controller to negate card effects that target it.
