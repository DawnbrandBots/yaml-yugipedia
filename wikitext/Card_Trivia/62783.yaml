title: Card Trivia:Emperor Sem
wikitext: |-
  {{Navigation}}

  * This card's English and Japanese names are derived from ''"sem"'' or ''"setem"'', a title used by [[wikipedia:High Priest of Ptah|the ancient Egyptian high priests]] of [[wikipedia:Ptah|Ptah]], regarded as the patron god of crafts men.
  ** This card may also be named for [[wikipedia:Amenhotep II|Amenhotep II]], a pharaoh (or "emperor") who held the title of ''setem'' in his early life as a prince.
