title: Card Trivia:Dark World Puppetry
wikitext: |-
  {{Navigation}}

  * "[[Ryko, Twilightsworn Fighter]]" and "[[Snoww, Unlight of Dark World]]" appear in this card's artwork.
  **  This card's artwork appears to depict another event of the story depicted in the artworks of "[[Dark Smog]]" and "[[Dark World Brainwashing]]".
  * Despite this card's name, the appearance of "Snoww" later as "[[Weiss, Lightsworn Archfiend]]" seems to suggests that "Ryko" is recruiting her to join the "[[Lightsworn]]s".
