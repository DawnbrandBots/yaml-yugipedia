title: Card Trivia:Karakuri Steel Shogun mdl 00X "Bureido"
wikitext: |-
  {{Navigation}}

  * This card is an upgraded version of "[[Karakuri Shogun mdl 00 "Burei"]]", it also has its own [[Card evolutions|upgraded]] form: "[[Karakuri Super Shogun mdl 00N "Bureibu"]]".
  ** Like "Karakuri Shogun mdl 00 "Burei"", this card Special Summons a "[[Karakuri]]" monster when [[Synchro Summon]]ed, and does not have the "must battle" or "change it to Defense Position" effects.
  * The combined ATK and DEF of both this card and "Karakuri Shogun mdl 00 "Burei"" is equal 4500.
  * The word ''Bureido'' in this card's name can be interpreted as the romaji reading for "Blade", referencing the two swords this card wields.
  * The kanji 零 on this monster's breastplate is Japanese for 0.
