title: Card Trivia:Numeral Hunter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Photon Change]]", "[[Photon Timestop]]", and "[[Photon Hand (card)|Photon Hand]]".
  * This monster appears to be based on a combination of [[Kite Tenjo]] and "[[Galaxy-Eyes Photon Dragon]]" and is named after the former's occupation– a [[Number Hunter]].
  ** This monster is somewhat similar to "[[Kaibaman]]", whose design is also a combination of a monster ("[[Blue-Eyes White Dragon]]") and its owner ([[Seto Kaiba]]).
  ** The sum of this monster's [[original ATK and DEF]] (1600/1400) is equal to the [[ATK]] (3000) of "Galaxy-Eyes Photon Dragon".
  ** This monster's effects may also be based on Kite's character; as a Number Hunter, he was able to resist possession by the "Numbers" (which were all [[Xyz Monster]]s), making him unaffected by their effects.
