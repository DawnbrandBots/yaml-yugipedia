title: Card Trivia:Peacock Picotron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Strange Attractor]]".
  * This card's Japanese name is a combination of [[wikipedia: Peacock|peacock]] and ''[[wikipedia: Pico-|Pico-]]'', a [[wikipedia: Metric prefix|metric prefix]] meaning 10^-12.
  * Similar to the other [[Tron (series)|Tron]] monsters used by [[Nail Saionji]], the number of leaves on this monster's head is the same as its [[Level]].
