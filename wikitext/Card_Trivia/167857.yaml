title: Card Trivia:Eternal Dread
wikitext: |-
  {{Navigation}}

  * "[[Clock Tower Prison]]" appears in this card's artwork, positioned at 12:00, which may signify that 2 [[Clock Counter]]s were on "Clock Tower Prison" before this card was activated.
  * This card's effect is similar to that of "[[Offerings to the Bound Deity]]", but without a cost.
  ** Both cards give [[counter]]s to specific cards that require four counters to activate their effects ("[[Clock Tower Prison]]" for this card, and "[[Altar of the Bound Deity]]" for "Offerings to the Bound Deity") to use their effects.
