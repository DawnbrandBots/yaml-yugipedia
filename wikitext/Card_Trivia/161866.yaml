title: Card Trivia:Gem-Knight Amethyst
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the artworks of "[[Gem-Knight Master Diamond]]" and "[[Scatter Fusion]]".
  * This card is named after [[wikipedia:Amethyst|amethyst]], a violet to purple variety of quartz.
  * This monster is a visual [[Fusion Monster|Fusion]] of "[[Gem-Knight Crystal]]" and "[[Gem-Knight Iolite]]".
  ** The word "iolite" is derived from "violet" (the color of the amethyst).
  ** This monster's weapon and shield have the same color-scheme of "Gem-Knight Iolite".
  ** This card has the opposite [[ATK]]/[[DEF]] and the same [[Level]] as "Gem-Knight Crystal".
