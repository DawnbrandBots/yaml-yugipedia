title: Card Trivia:Madolche Marmalmaide
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Madolchepalooza]]".
  ** This monster's hands and the "Madolches' Manners" book she holds appear in the artwork of "[[Madolche Lesson]]".
  * This monster's name is a portmanteau of "[[wikipedia:Marmalade|marmalade]]" and "[[wikipedia:Maid|maid]]".
  ** Marmalade is a fruit preserve is a fruit preserve made from the juice and peel of citrus fruits boiled with sugar and water, with the most well-known version being made from bitter orange. Fittingly, this monster is depicted with a citrus orange hair clip and sitting on a jar of orange marmalade.
