title: Card Trivia:Dark Mambele
wikitext: |-
  {{Navigation}}

  * "[[Dark Armed Dragon]]" appears in this card's artwork.
  ** This card is likely named for the signature move of "Dark Armed Dragon", despite it not appearing in the anime or manga.
  *** Both this card and "Dark Armed Dragon" require three [[DARK]] monsters.
  *** In the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime, the [[Attack and effect names in Yu-Gi-Oh! GX|effect name]] of "[[Armed Dragon LV7 (anime)|Armed Dragon LV7]]" (which "Dark Armed Dragon" is based on) was "Genocide Cutter", which serves as the basis for this card's Japanese name, "Dark Genocide Cutter".
  *** In ''[[Yu-Gi-Oh! Duel Links]]'', [[Chazz Princeton (Duel Links)|Chazz Princeton]] declares "Dark Genocide Cutter" and "Dark Mambele" when activating the effect of "Dark Armed Dragon", in the Japanese and English versions respectively.
  * This card's ''[[TCG]]'' name is based on a [[wikipedia:Mambele (knives)|mambele]], a curved throwing dagger in central and southern Africa.
