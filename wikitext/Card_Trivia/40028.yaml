title: Card Trivia:Blue Medicine
wikitext: |-
  {{Navigation}}

  * The vase and goblet in this card's artwork also appear in the artwork of "[[Chemical Cure Blue]]".
  * This card has a counterpart known as "[[Red Medicine]]".
  ** Both cards are references to items of the same names in ''[[wikipedia:The Legend of Zelda|The Legend of Zelda]]'' series.
  * In the North American version of this card, its card text states: "Increases both you and your opponent's life points by 400 points." This card text is incorrect, however, as the Japanese card text only says that this card increases ''your'' life points. The European version card text is also correct.
