title: Card Trivia:Needle Worm
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Needlebug Nest]]" and "[[Verdant Sanctuary]]
  * This monster has a [[recolored counterpart]]: "[[Larvae Moth]]".
  * This monster is an older version of "[[Acid Crawler]]" (as seen in the artwork of "Needlebug Nest").
  * Prior to this card's third errata in ''[[Legendary Collection 3: Yugi's World Mega Pack]]'', its effect stated to "Discard" instead of "Send", as only cards from the hand can be "discarded".
