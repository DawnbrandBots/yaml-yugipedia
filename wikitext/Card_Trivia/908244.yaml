title: Card Trivia:Floowandereeze & Robina
wikitext: |-
  {{Navigation}}

  * This monster's name and design is based on the [[wikipedia:European robin|European robin]], a species of bird found in [[wikipedia:Europe|Europe]].
  ** Fittingly, the background of this card's artwork depicts the [[wikipedia:Big Ben|Big Ben]] clock tower in [[wikipedia:London|London]], [[wikipedia:England|England]] marked on Europe in the artwork of "[[Floowandereeze and the Magnificent Map]]".
