title: Card Trivia:Iron Core Specimen Lab
wikitext: |-
  {{Navigation}}

  * "[[Iron Core of Koa'ki Meiru]]", "[[Kozaky]]", "[[Magical Scientist]]", and a baby version of "[[Koa'ki Meiru Drago]]" all appear on the artwork of this card.
  ** On the far left corner, there is a third scientist that appears in the artwork of "[[Compulsory Escape Device]]".
  ** The screens "Magical Scientist" is reading say 0%. This could be a reference to "[[Success Probability 0%]]".
  * This card's artwork suggests that "Kozaky", "Magical Scientist", and the third scientist were the creators and/or discoverers of the "[[Iron Core of Koa'ki Meiru]]" and the "[[Koa'ki Meiru]]" monsters. The idea that the "Koa'ki" monsters are synthetically engineered life forms might explain their [[maintenance cost]] to [[reveal]] "Iron Core of Koa'ki Meiru" in the [[hand]], while their need of company from other monsters with a similar gene code to stay alive might explain their maintenance cost of revealing a monster of the same [[Type]] from the hand.
