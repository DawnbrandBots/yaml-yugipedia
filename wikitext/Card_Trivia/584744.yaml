title: Card Trivia:Battlin' Boxer Big Bandage
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dino Deceit]]".
  * This monster's name and design are based on the [[wikipedia:Bandage|bandages]] used to protect the boxer's hand and wrist in the sport of [[wikipedia:Boxing|boxing]]. This is reflected in this monster's ''[[OCG]]''/''[[TCG]]'' effect to protect itself from being [[destroyed by battle]] the first time.
