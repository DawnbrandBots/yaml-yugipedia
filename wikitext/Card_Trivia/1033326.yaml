  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster appears in the second artwork of "[[The Secret of Manifestation]]".
  * This monster is a [[Celeb Rose]] [[counterpart]] of "[[Sevens Road Warlock]]".
  ** Both monsters share the same [[Level]] (5), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (1100/1700).
