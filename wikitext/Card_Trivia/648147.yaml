title: Card Trivia:Morpheus, the Dream Mirror Black Knight
wikitext: |-
  {{Navigation}}

  * The back of "Morpheus, the Dream Mirror White Knight" appear in the mirror in this card's artwork.
  * This monster is named after [[wikipedia:Morpheus|Morpheus]], one of the thousand sons of [[wikipedia:Somnus|Somnus]], the personification of sleep from [[wikipedia:Roman mythology|Roman mythology]], from [[wikipedia:Ovid|Ovid]]'s ''[[wikipedia:Metamorphoses|Metamorphoses]]''.
  ** It is also named after the [[wikipedia:Black knight|black knight]], a literary [[wikipedia:Stock character|stock character]] usually portrayed as a [[wikipedia:Villain|villain]] who performs misdeeds.
  * This monster has a [[LIGHT]] [[counterpart]]: "[[Morpheus, the Dream Mirror White Knight]]".
  ** Both have the same [[Level]] (8) and [[Type]] ([[Warrior]], but opposite [[Attribute]]s and [[ATK]]/[[DEF]].
