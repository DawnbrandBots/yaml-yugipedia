title: Card Trivia:Myutant ST-46
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Myutant Arsenal]]", "[[Myutant Fusion]]", and "[[Myutant Mist]]".
  * This monster is a mutated form of "[[Myutant Mutant]]".
  ** This monster has two mutated forms: a [[Spell]]-based form, "[[Myutant Mist]]"; and a [[Trap]]-based form, "[[Myutant Arsenal]]".
  *** Fittingly, the "ST" in this card's name likely refers to its effect to [[search]] for "[[Myutant]]" [[Spell]]s and [[Trap]]s from the [[Deck]].
