title: Card Trivia:Bownty
wikitext: |-
  {{Navigation}}

  * "[[Yoko-Zuna Sumo Spirit]]" and "[[Yokotuner]]" appear in this card's artwork.
  ** This card's artwork appears to take place after the events of "[[Edge of the Ring]]", showing that "Yokotuner" won the match from that artwork.
  * This card's Japanese name (犬賞金 ''Kenshōkin'') is an alteration of the word for "prize money" (懸賞金), where the first character uses the kanji for the word "dog" (犬 ''ken'').
  ** This card's ''[[TCG]]'' name is a portmanteau of the words "bow-wow" (the onomatopoeia for a barking dog), and "bounty" (a reward given to someone in generous amounts).
