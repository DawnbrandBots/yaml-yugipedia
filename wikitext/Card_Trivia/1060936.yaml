title: Card Trivia:Dark Matter Enigknight Sieger
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Matter Assemble Force]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Dark Matter Knight]]".
  ** This monster is named after [[Zuwijo Zwil Velgear]], referencing how he became the Black Blade of the [[Dark Matter Empire]] after he was defeated by the [[Dark Meister]] in {{episode|GO RUSH!!|109|ref}}.
  *** In the [[UTS]] report of {{episode|GO RUSH!!|123|ref}}, [[Yudias Velgear]] almost called [[Dark Matter Enigknight Sieger (anime)|this monster]] "Dark Matter Enigknight Zuwijo" before correcting himself, which [[Damamu]] noticed.
