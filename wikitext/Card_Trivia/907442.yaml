  * This monster is based on [https://web.archive.org/web/20250402000823/https://misarin.net/youkai/frame/kaisetu/208301.htm Ruklamba], a mythological creature said to be the king of spirits and the strongest of all [[wikipedia:Masalai|Masalai]] who rules over animals and fishes and protects his village from illness, but can bring harm if he is angered or if his dwelling is disturbed.
