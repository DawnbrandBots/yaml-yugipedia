title: Card Trivia:G Golem Crystal Heart
wikitext: |-
  {{Navigation}}

  * This monster has a "[[Marincess]]" [[counterpart]]: "[[Marincess Crystal Heart]]".
  * This is the only "[[G Golem]]" monster to not be [[EARTH]], being a [[WATER]] monster instead.
  ** This is due to the fact that in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, this monster is the embodiment of what [[Aqua (character)|Aqua]], the WATER [[Ignis]], entrusted to [[Earth (character)|Earth]], the EARTH Ignis, before the [[Cyberse (world)|Cyberse World]] was attacked. This monster also represented the bond between Aqua and Earth.
  * In the ''Yu-Gi-Oh! VRAINS'' anime, when this monster was Summoned by [[George Gore]], it had an alternate color scheme where it was black instead of blue, and it gained a red aura when using its effect instead of a golden one.
