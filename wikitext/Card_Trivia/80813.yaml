title: Card Trivia:Feral Imp
wikitext: |-
  {{Navigation}}

  * The ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' version of this card appears in the artwork of the ''Rush Duel'' version of "[[Exchange (anime Rush Duel)|Exchange]]".
  * This card has two [[Reptile]] [[Type]] [[counterpart]]s: "[[Des Feral Imp]]" and "[[King of the Feral Imps]]".
  * The [[Feral Imp (Bandai)|Bandai]] version of this card is a [[Level]] 5 monster with 2000 [[ATK]], whereas the Konami version is a [[Level]] 4 monster with 1300 [[ATK]]. Moreover, the Bandai version is red, the Konami version is green.
