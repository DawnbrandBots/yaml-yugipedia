title: Card Trivia:Neo-Spacian Flare Scarab
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Deck 2007]]''.
  * This monster appears in the artworks of "[[Contact Out]]", "[[Hope for the Future]]", "[[NEX]]", and "[[NEXT]]".
  * This card appears in the artwork of "[[Convert Contact]]".
  * This monster may be based on the Underground Empire in ''[[wikipedia:Brave Police J-Decker|Brave Police J-Decker]]'', which was a parallel species of humans that evolved from insects instead of apes.
  * This monster has a "[[Chrysalis]]" form: "[[Chrysalis Larva]]".
  * This monster has 2 [[Contact Fusion]]s with "[[Elemental HERO Neos]]": "[[Elemental HERO Flare Neos]]" in the ''[[OCG]]''/''[[TCG]]'', and "[[Elemental HERO Heat Neos]]" in ''[[Rush Duel]]''.
  ** This monster has a [[Triple Contact Fusion]] with "Neos" and "[[Neo-Spacian Grand Mole]]": "[[Elemental HERO Magma Neos]]".
  ** This monster has an [[Contact Fusion#Ultimate Contact Fusion|Ultimate Contact Fusion]] with "Neos" and all the other "[[Neo-Spacian]]" monsters: "[[Elemental HERO Divine Neos]]".
