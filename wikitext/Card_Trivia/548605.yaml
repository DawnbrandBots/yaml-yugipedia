title: Card Trivia:Knightmare Cerberus
wikitext: |-
  {{Navigation}}

  * This card is based on the '''[[wikipedia:Cerberus|Cerberus]]'''.
  * The ''[[wikipedia:Dal segno|Dal segno]]'' symbol can be seen on this monster's head.
  * This monster appears in the artwork of "[[World Legacy's Nightmare]]".
  * This monster has a jewel in the chest that is similar to that of "[[Mekk-Knight Orange Sunset]]".
  ** The claws on "Knightmare Cerberus" also resemble the tops of the pylons that "Orange Sunset" has.
