title: Card Trivia:Stardust Illumination
wikitext: |-
  {{Navigation}}

  * "[[Stardust Dragon]]" and "[[Stardust Xiaolong]]" appear in this card's artwork.
  ** This card's artwork is based on the [[Synchro Summon]]ing sequences of "[[Majestic Star Dragon (anime)|Majestic Star Dragon]]" by using both "[[Stardust Dragon (anime)|Stardust Dragon]]" and "[[Stardust Xiaolong (anime)|Stardust Xiaolong]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
