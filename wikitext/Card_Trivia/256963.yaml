title: Card Trivia:Charisma Token
wikitext: |-
  {{Navigation}}

  * The characters appearing in this card's artwork are the 5 ''[[V Jump]]'' Charisma Duelists: [[Coin Toss Yukisuke]], [[Omoshiro Joke]], [[Kaiser Umiuma]], [[Ryusei]] and [[Senjome]].
  ** This Token is Level 5 based on the fact that the 5 "stars" of the ''V Jump'' Charisma Duelists appear in its artwork.
