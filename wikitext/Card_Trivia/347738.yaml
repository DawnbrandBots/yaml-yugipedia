title: Card Trivia:Contrast HERO Chaos
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Structure Deck: HERO's Strike]]''/''[[HERO Strike Structure Deck]]''.
  * This card is the first legal "[[HERO]]" card whose original name is not part of any "HERO" sub-[[archetype]]/[[series]].
  ** The only other one is the [[illegal]] "[[E☆HERO Pit Boss]]".
  * This monster is based on ''[[wikipedia:Kamen Rider W|Kamen Rider W]]'' in his Fang Joker state, albeit with the white and black color scheme reversed.
  ** This may be the reason it requires two "[[Masked HERO]]es" as [[Fusion Material]]s, as Double is a combination of both Shotaro Hidari and Phillip, and as Masked HEROes are mostly based on Japanese Tokusatsu heroes.
  ** This monster's effect further resembles Kamen Rider Eternal's finishing move, which could disable the regular power-ups of other Riders from ''[[wikipedia:Kamen Rider W|Kamen Rider W]]''.
  * This card is the first and so far the only "HERO" [[Fusion Monster]] that requires 2 "Masked HERO" monsters as Fusion Material.
  ** Also, due to this card's Condition, this card is also the first and so far the only "[[Elemental HERO]]" Fusion monster that requires "Masked HERO" monsters as materials, uniting 2 of the main protagonist's "HERO" archetypes in both anime and manga into one card.
  * This monster has some resemblance to "[[Elemental HERO Chaos Neos]]", both being [[Level 9 Monster Cards|Level 9]] [[DARK]] [[Attribute]] "HERO" Fusion Monster with "[[Chaos]]" in their name, 3000 ATK (and nearly equal DEF), and involve [[LIGHT]] Attribute in conjuction of DARK ("Contrast HERO Chaos" being treated as LIGHT on the field and "Elemental HERO Chaos Neos" having "[[Neo-Spacian Glow Moss]]" as one of the Fusion Materials) with an effect to negate monster effects.
  * This monster bears a striking resemblance to "[[Light and Darkness Dragon]]". Like "Light and Darkness Dragon", one half of its body is white while the other is black, except that the order of the colors is swapped. Both monsters have abilities that negate cards from activating and both are treated as LIGHT and DARK monsters at the same time. Even this monster's debut in the ''GX'' manga one shot, where it appears next to "[[Winged Kuriboh]]", is similar to the final Duel between [[Jaden Yuki (manga)|Jaden]] and [[Chazz Princeton (manga)|Chazz]] and [[Tragoedia (character)|Tragoedia]], where, near the end of the Duel, they Summon "Winged Kuriboh" and "Light and Darkness Dragon", respectively. It could be said that this monster is a reference to the friendship / rivalry between Jaden and Chazz in the manga.
