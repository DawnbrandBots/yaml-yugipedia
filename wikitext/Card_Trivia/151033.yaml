title: Card Trivia:Masked HERO Dian
wikitext: |-
  {{Navigation}}

  * This monster is based on the archetypal brown Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[EARTH]], which is represented by a  brown-colored circle.
  * This is the first and only female "[[Masked HERO]]" monster.
  * This monster is also tied with "[[Masked HERO Anki]]" for the highest [[original ATK]] (2800) of all "Masked HERO" monsters.
  ** This monster has the highest [[original DEF]] (3000) of all "Masked HERO" monsters.
  * This card's ''OCG/TCG'' artwork is taken from {{chapter|GX|059|ref}}, specifically from the panel showing [[Masked Hero Daian (manga)|this monster]] being Summoned.
