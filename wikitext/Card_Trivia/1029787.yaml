title: Card Trivia:Abysskite Ray Monochrome
wikitext: |-
  {{Navigation}}

  * "[[Shinesteel Ultra Dragon Devastar Okeabyss]]" appears in this card's artwork in [[Maximum Mode]] (together with "[[Shinesteel Ultra Dragon Devastar Okeabyss (L)|Shinesteel Ultra Dragon Devastar Okeabyss [L]]]" and "[[Shinesteel Ultra Dragon Devastar Okeabyss (R)|Shinesteel Ultra Dragon Devastar Okeabyss [R]]]").
  * This card's Japanese name features the katakana ''to'' (ト), ''re'' (レ), ''mo'' (モ), and ''ro'' (ロ) in order, which spells out the name of [[Tremolo Ryugu]] (トレモロ ''Toremoro''), who transforms into this card in {{episode|GO RUSH!!|85|ref}}.
