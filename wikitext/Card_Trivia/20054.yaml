title: Card Trivia:Goe Goe the Gallant Ninja
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Crackdown]]".
  * This monster is based on Ebisumaru, the main protagonist of the Konami video game series, ''[[wikipedia:Ganbare Goemon|Ganbare Goemon]]''.
  ** This monster is also based on [[wikipedia:Ishikawa Goemon|Ishikawa Goemon]], a legendary ninja warrior and bandit from 16th century Japan who stole good and valuables from the rich and gave them to the poor.
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', this monster's non-card sprite is depicted standing on the box appearing in the artwork of "[[Secrets of the Gallant]]". Fittingly, the artwork and the [[discard]]ing effects of "Secrets of the Gallant" and "[[Introduction to Gallantry]]" both reference this monster's sprite.
