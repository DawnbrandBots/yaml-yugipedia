title: Card Trivia:Enlightenment Paladin
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Breakers of Shadow]]'', and is one of the [[cover card]]s of ''[[25th Anniversary Tin: Dueling Heroes]]''.
  ** It is also the first cover card of a ''[[Yu-Gi-Oh! ARC-V]]'' [[Core Booster]] that is not a [[Dragon]]-[[Type]] monster.
  * This monster appears to be an older, [[Synchro Monster|Synchro]] version of "[[Timebreaker Magician]]" and "[[Timegazer Magician]]".
  ** This is supported by the 3 monsters' similar hairstyles and blade-like arcs on their bodies, as well as the fact that "[[Timebreaker Magician (anime)|Timebreaker Magician]]" was used for this card's first [[Synchro Summon]] in the anime .
  ** In addition, the arc-shaped blade of "Timegazer Magician" appears on this monster's arms and this monster's sword is similar to that of "Timebreaker Magician".
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Pendulum Monster|Synchro Pendulum]] form: "[[Nirvana High Paladin]]".
  ** Also, to somehow symbolize even further this fact, the first time [[Yuya Sakaki|Yuya]] used this card was during episode '''[[Yu-Gi-Oh! ARC-V - Episode 079|79]]''' of the anime, while "Nirvana High Paladin" debuted in episode '''[[Yu-Gi-Oh! ARC-V - Episode 097|97]]'''.
  * This card has same [[ATK]], [[DEF]], [[Level]] and [[card type]] (Synchro) as "[[Stardust Dragon]]".
  ** This resemblance seems to be intentional, as this card's evolution, "[[Nirvana High Paladin]]", has the same ATK, DEF, Level and card type as "[[Shooting Star Dragon]]", "Stardust Dragon's" evolution.
  * This monster appears in the artwork of the ''[[Advanced Tournament Pack 2016 Vol.1]]'' print of "[[Duel Checker]]".
