title: Card Trivia:Sea Dragon Lord Gishilnodon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ryu-Ge Realm - Sea Spires]]".
  * This is the first [[Synchro Monster]] that must be [[Synchro Summon]]ed using exactly 2 monsters.
  ** It is also the first Synchro Monster that requires a non-Tuner monster with a specific [[Level]], which consequently also requires the [[Tuner monster]] to be of a specified Level.
