title: Card Trivia:Dark Spirit of Malice
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Legend Duelist 5]]'' and ''[[Legendary Duelists: Immortal Destiny]]''.
  * This monster's appearance is a combination of "[[Dark Spirit of the Silent]]", "[[Earthbound Spirit]]", and "[[The Portrait's Secret]]".
  * This monster has a [[counterpart]] that responds to attacks, "[[Dark Spirit of Banishment]]".
