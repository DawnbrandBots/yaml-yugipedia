title: Card Trivia:Light Bringer Lucifer
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikia:w:c:monster-strike-enjp:Lucifer|Lucifer]], a monster from the mobile game ''[[wikipedia:Monster Strike|Monster Strike]]''.
  * This card shares the highest [[ATK]] of all [[Level]] 6 [[Normal Monster]]s with "[[Frostosaurus]]" and "[[Trance the Magic Swordsman]]".
  ** The aforementioned monsters also have the highest ATK of all Level 6 monsters without a [[Summoning condition]].
