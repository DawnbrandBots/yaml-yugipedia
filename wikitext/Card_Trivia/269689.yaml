title: Card Trivia:Kickfire
wikitext: |-
  {{Navigation}}

  * "[[The Kick Man]]" and "[[Woodborg Inpachi]]" appear in this card's artwork.
  ** This card's artwork depicts the final defeat and destruction of "Inpachi".
  ** This card's artwork parallels the artwork of the similarly-named "[[Backfire]]", which features an "[[Inpachi]]" monster being attacked (in the case of "Backfire", "[[Blazing Inpachi]]" is being attacked by "[[Chopman the Desperate Outlaw]]"); furthermore, it has a similar effect that deals damage when a [[FIRE]] monster is destroyed.
