title: Card Trivia:Black Mamba
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2022]]''.
  * This monster is based on the [[wikipedia:Black mamba|black mamba]], one of the world's most dangerous snakes known for their potent venom and supposed aggressive behavior.
  ** Despite the above-mentioned fact, this monster's appearance is based on a black-colored [[wikipedia:cobra|cobra]] as opposed to an actual black mamba (whose name refers to the colour of its mouth).
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|GX|020|ref}} showing [[Black Mamba (manga)|this monster]] being Summoned, albeit with detailed eyes.
