title: Card Trivia:Yellow Process - Kitolenics
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is one of four cards that represents the four stages of the ''[[wikipedia:Magnum opus (alchemy)|Magnum opus]]'' process. ("[[Black Process - Negledo]]" > "[[White Process - Albedo]]" > "'''Yellow Process - Kitolenics'''" > "[[Red Process - Rubedo]]")
  ** In this card's case, it is based on [[wikipedia:Citrinitas|citrinitas]] (or '''yellowness''') which represents a solar dawn or awakening.
  *** Fittingly, this was the third "Process" card used by [[Lyman Banner|Amnael]] during his [[Duel]] against [[Jaden Yuki]] in {{episode|GX|046|ref}}.
  *** In alchemy, the process of yellowness is the third step in the pathway to the [[wikipedia:Philosopher's Stone|philosopher's stone]], which represents the dawning of the "solar light" inherent in one's being, and that the reflective "lunar or soul light" was no longer necessary. This is reflected in this card's effect to [[Tribute]] "[[Helios - The Primordial Sun]]" and [[Special Summon]] "[[Helios Duo Megistus]]", a monster based on the [[wikipedia:Sun|Sun]].
