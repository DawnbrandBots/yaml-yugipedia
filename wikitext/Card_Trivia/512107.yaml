title: Card Trivia:Shinato, King of a Higher Plane
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from  ''[[wikipedia:Shinatsuhiko|Shinatobe]]'', the goddess of the wind in [[wikipedia:Japanese mythology|Japanese mythology]].
  * This monster had the highest [[original ATK and DEF]] (3300/3000) of all [[Ritual Monster]]s for 12 years, until the release of "[[Nekroz of Sophia]]" in 2015.
