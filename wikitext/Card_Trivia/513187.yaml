title: Card Trivia:Time Wizard
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Beginner's Edition 2]]'', ''[[Dark Beginning 2]]'', and ''[[Rush Duel Card Game Gum]]''.
  * This monster appears in the artworks of "[[Dark Time Wizard]]", "[[Time Magic Hammer]]" (as a silhouette) and "[[Vortex of Time]]".
  * A stone tablet of this monster appears in the artwork of "[[Wedju Temple]]".
  * This card appears in the ''[[TCG]]'' artwork of "[[Exchange]]".
  * This monster has a [[Fusion Monster|Fusion]] [[counterpart]] with "[[The Claw of Hermos]]": "Time Magic Hammer".
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, "[[Time Magic Hammer (anime)|Time Magic Hammer]]" was created when [[Joey Wheeler]] fused this monster with "[[Claw of Hermos|The Claw of Hermos]]".
  ** "Time Magic Hammer" also shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (2), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (500/400) as this monster.
  * This monster has a retrained Fusion counterpart: "[[Time Wizard of Tomorrow]]".
  * This monster has a retrained [[Spell Card]] counterpart: "Dark Time Wizard".
  ** This is a reference to how this monster was a Spell Card in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and its [[Bandai]] release. [[Konami]] released it as an [[Effect Monster]], likely because when it was played in the manga, this monster materialized similarly to how [[Monster Card]]s materialize in the manga.
  ** The artwork of "Dark Time Wizard" depicts this monster at an angle, with its cape visible through its body. This is a reference to the fact that, in the manga, this monster was designed without a physical clock face, featuring two floating, disembodied eyeballs and clock hands in the center hole. In the ''[[OCG]]''/''[[TCG]]'', this monster's design features a half-blue, half-yellow clock face divided by a squiggly line, which was either an artistic choice or a misinterpretation of the cape visible through the hole.
  * In the ''Yu-Gi-Oh!'' manga and anime, this monster's clock-like staff features a roulette with four spaces adorned with skull symbols representing the unsuccessful results of spinning the roulette, leading to its self-destruction effect. 
  ** In the manga, the two spaces that represent the successful results of spinning the roulette are adorned with the word "WIN". In the anime, the two spaces are instead red symbols, which are either simplified representations of a time machine or are based on the kanji 「当」 meaning "to be successful" or "to win" in specific contexts.
  * In ''[[Yu-Gi-Oh! Dark Duel Stories]]'', and in later entries in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, this monster's effect can transform "[[Baby Dragon]]" and/or "[[Dark Magician]]" on the [[field]], referencing how this monster transformed both "[[Baby Dragon (anime)|Baby Drgon]]" and "[[Dark Magician (anime)|Dark Magician]]" into their [[aged counterpart]]s in the anime.
  * This card's Bandai pose is taken from a panel from {{chapter|Yu-Gi-Oh!|070|ref}} showing [[Time Wizard (manga)|this monster]] being Summoned.
