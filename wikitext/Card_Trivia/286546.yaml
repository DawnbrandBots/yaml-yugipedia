title: Card Trivia:Full Armored Black Ray Lancer
wikitext: |-
  {{Navigation}}
  [[File:BlackRayLancer-JP-Anime-ZX-NC-FullArmoredXyz.png|thumb|"[[Black Ray Lancer (anime)|Black Ray Lancer]]" [[equip]]ped with "Aero Shark" by the effect of "[[Full Armored Xyz (anime)|Full Armored Xyz]]".]]

  * This monster is an [[Card evolutions|upgraded]] "[[Full Armored]]" form of "[[Black Ray Lancer]]", [[equip]]ped with "[[Submersible Carrier Aero Shark]]".
  ** This monster's appearance is based on a scene from {{episode|ZEXAL|091|ref}}, where [[Reginald Kastle]] [[equip]]ped "[[Black Ray Lancer (anime)|Black Ray Lancer]]" with "[[Submersible Carrier Aero Shark (anime)|Submersible Carrier Aero Shark]]" using the effect of "[[Full Armored Xyz (anime)|Full Armored Xyz]]", during his [[Duel]] against [[Rio Kastle]].
  ** This monster's [[Spell]]/[[Trap Card]] destruction effect is based on the effect of "[[Break Stream]]", which was also used on the equipped "Black Ray Lancer" in that episode.
  ** Ironically, this monster cannot be [[Summon]]ed by using "Black Ray Lancer" as an [[Xyz Material]] normally, requiring "[[Xyz Revive Splash]]", although it can be Summoned by using "Aero Shark" instead.

