title: Card Trivia:Double Payback
wikitext: |-
  {{Navigation}}

  * The emperor in this card's artwork also appears in the artwork of "[[The Emperor's Holiday]]", "[[Tyrant's Temper]]", "[[Tyrant's Tirade]]", "[[Tyrant's Tantrum]]", "[[Tyrant's Tummyache]]", "[[Tyrant's Throes]]", "[[The Huge Revolution is Over]]", "[[Asleep at the Switch]]", "[[Turnabout]]", "[[Retort]]" and "[[Clear Robe]]".
  * This event occurs immediately after the event in "The Huge Revolution is Over" and implies a second revolution after the first one was repressed.
  ** The Japanese names of "The Huge Revolution is Over" ("Huge Revolution Reversal") and this card ("Double Reversal") support this.
  * Either "[[The Unhappy Maiden]]" or "[[The Unhappy Girl]]" appears in this card's artwork (near the upper-left corner).
