title: Card Trivia:Union Controller
wikitext: |-
  {{Navigation}}

  [[File:Enemy Controller takes X-Head Cannon.png|thumb|250px|"[[Enemy Controller (manga)|Enemy Controller]]" takes control of "[[X-Head Cannon (manga)|X-Head Cannon]]".]]

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * "[[Enemy Controller]]" and "[[X-Head Cannon]]" appear in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|252|ref}} showing "[[Enemy Controller (manga)|Enemy Controller]]" taking [[control]] of "[[X-Head Cannon (manga)|X-Head Cannon]]", albeit mirrored.
  * This monster is a [[retrained]] [[Fusion Monster|Fusion]] counterpart of "Enemy Controller".
  ** This monster shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (6), [[Type]] ([[Machine]]), [[original ATK and DEF]] (2200/1900), and similar [[Fusion Material]]s as "[[XY-Dragon Cannon]]". This card's artwork depicts a scene from a few turns before "[[XY-Dragon Cannon (manga)|XY-Dragon Cannon]]" was Summoned in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.

