title: Card Trivia:Cyber Emergency
wikitext: |-
  {{Navigation}}

  * The fighter jet that appears in this card's artwork is similar to the [[wikipedia:F-35 Lightning II|F-35 Lightning II]], although it features [[wikipedia:Canard (aeronautics)|canards]] while the F-35 Lightning II does not.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect allowing the player to [[add]] this card from the [[Graveyard]] to the [[hand]] after its activation is [[negate]]d and sent there by an opponent's card references a scene in {{chapter|GX|039|ref}}, where this card's activation was repeatedly negated by the effect of [[Chazz Princeton (manga)|Chazz Princeton]]'s "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]". [[Zane Truesdale (manga)|Zane Truesdale]] repeatedly used this card's effect to add it from the Graveyard to his hand, which did not require this card's activation to be negated.
