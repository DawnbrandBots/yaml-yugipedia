title: Card Trivia:Arcana Call
wikitext: |-
  {{Navigation}}

  * "[[Arcana Force III - The Empress]]", "[[Arcana Force VI - The Lovers]]", and "[[Arcana Force VII - The Chariot]]" appear in this card's artwork.
  ** "Arcana Force VII - The Chariot" is based [[wikipedia:H.P. Lovecraft|H.P. Lovecraft's]] [[wikipedia:Great Race of Yith|Great Race of Yith]], who are capable of projecting their consciousness across time and swapping minds with other individuals. This is reflected in this card's artwork of the featured monster projecting the consciousness (or effect) of the [[banish]]ed "Arcana Force" monster until the end of the turn.
