title: Card Trivia:XYZ-Hyper Dragon Cannon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the [[Simplified Chinese]] version of ''[[Duelist Pack: Duelists of Brilliance]]'', as well as one of the cover cards of ''[[Maze of the Master]]''.
  * This monster appears in the artwork of "[[A-to-Z Energy Load]]".
  * This monster is a stronger [[retrained]] counterpart of "[[XYZ-Dragon Cannon]]".
  ** This monster has one [[Level]] and 200 more [[ATK]]/[[DEF]] than "XYZ-Dragon Cannon".
  ** This monster's pose is based on the third Japanese/international artwork of "XYZ-Dragon Cannon".
  ** This monster's name is based on the Japanese [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "[[XYZ-Dragon Cannon (anime)|XYZ-Dragon Cannon]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime: "Hyper Cannon".
