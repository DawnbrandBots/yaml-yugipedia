title: Card Trivia:Flamvell Guard
wikitext: |-
  {{Navigation}}

  * This card has the highest [[DEF]] (2000) of any [[Level 1]] [[Tuner monster]].
  * This is one of four "[[Flamvell]]" monsters with more than 200 DEF, the other three being "[[Flamvell Fiend]]", "[[Flamvell Uruquizas]]", and "[[Neo Flamvell Garuda]]".
  * This card has an "[[Ice Barrier]]" counterpart: "[[Blizzed, Defender of the Ice Barrier]]".
  * This card's Chinese name is stated as "Red Flame Guardian Dragon" (赤炎護衛龍) on the [http://www.yugioh-card.com/chi/cn-t/list/list.php?title=青眼龍轟臨&lang=cn-t official website], but it is printed "Flame Prison Guardian Dragon" (炎獄護衛龍) on the actual print.
