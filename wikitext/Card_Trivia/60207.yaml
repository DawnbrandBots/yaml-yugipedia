title: Card Trivia:Arcanite Magician/Assault Mode
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Assault Overload]]".
  ** This monster's armor appears in the artworks of "[[Arcane Apprentice]]".
  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster is the [[Card evolutions|upgraded]] "[[/Assault Mode]]" form of "[[Arcanite Magician]]".
  ** This monster is wearing the cloak of "Arcanite Magician" as a cape.
  * This monster's armor features an orange color scheme, referencing its [[Effect Monster]] [[card type]].
  ** This concept is shared with the designs of "Arcanite Magician" (whose robes features a white color scheme corresponding with its [[Synchro]] type) and "[[Supreme Arcanite Magician]]" (whose armor features a purple color scheme in correspondence with its Fusion type).
  * This monster has the lowest [[original ATK]] (900) of all "/Assault Mode" monsters.
