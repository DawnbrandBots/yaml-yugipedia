title: Card Trivia:Dragon Manipulator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cry Havoc!]]".
  ** This monster and "[[Warrior Dai Grepher]]" may be allies, as they fight along side each other in "Cry Havoc!", and they both posses powers to control [[Dragon]]s.
  * This monster has a [[Fiend]] counterpart: "[[Shadow Tamer]]".
