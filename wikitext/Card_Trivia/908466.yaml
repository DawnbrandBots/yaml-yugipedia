title: Card Trivia:ReSolfachord Dreamia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Solfachord Elegance]]" and "[[Solfachord Happiness]]".
  ** This monster's chibi avatar appears in the artworks of "[[Solfachord Harmonia]]" and "[[Solfachord Symphony]]".
  * This monster is based on "''Re''", the second syllable of the [[wikipedia:Solfège|solfège]], which reflects its [[Level]] (2).
  ** "Dremia" starts with the English letter "D", which is based on the [[wikipedia:D (musical note)|second musical note]] of the [[wikipedia:C major|C major scale]] in the fixed solfège.
