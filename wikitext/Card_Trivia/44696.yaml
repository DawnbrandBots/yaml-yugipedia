title: Card Trivia:Trial of the Princesses
wikitext: |-
  {{Navigation}}

  * "[[White Magician Pikeru]]" and "[[Ebon Magician Curran]]" appear in this card's artwork.
  ** Both those two monsters and the giant in this card's artwork also appear in the artwork of "[[Mutually Affured Destruction]]", where only the top of the giant's head is visible.
  * The mysterious figure on top of the balcony in this card's artwork is holding the same staff that also appears in the artworks of "[[Princess Pikeru]]" and "[[Princess Curran]]".
  ** The other two figures on each side of them in this card's artwork appear to be the sheep and rabbit butlers that appear in the artworks of "Princess Pikeru" and "Princess Curran", respectively.
