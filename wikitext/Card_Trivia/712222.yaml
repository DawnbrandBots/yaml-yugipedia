title: Card Trivia:Joker's Knight
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[King's Court]]''.
  * This monster appears in the artworks of "[[Double Wild]]" (as an illustrated design) and "[[Joker's Wild]]".
  * This monster is based on the [[wikipedia:Joker (playing card)|Joker]], a [[wikipedia:Playing card|playing card]] which represents the addition to the four [[wikipedia:Standard playing card suit|standard playing card suits]].
  ** This monster's effect to change its name to "[[Jack's Knight]]", "[[King's Knight]]", or "[[Queen's Knight]]" references how the Joker is often used as a [[wikipedia:Wild card|wild card]] to represent any other playing card.
