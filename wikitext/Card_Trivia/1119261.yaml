title: Card Trivia:Spring
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the season [[wikipedia:Spring (season)|spring]] in a Japanese setting (featuring misty pagoda and cherry blossom branch). 
  ** Fittingly, this card is released in the [[Core Booster]] pack, ''[[Duelist's Advance]]'', which was released during springtime in the northern temperature zone.
  * The Japanese text featured in this card's artwork 「春はあけぼの」 (lit. "In Spring It Is the Dawn") is the opening line for ''[[wikipedia:The Pillow Book|The Pillow Book]]''.
