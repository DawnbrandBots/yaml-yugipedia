title: Card Trivia:Cross Change
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Elemental HERO Avian]]" and "[[Neo-Spacian Aqua Dolphin]]" appear in this card's artwork.
  ** Both share the same [[Level]] (3), thus making them eligible for this card's effects.
  ** Both are depicted "crossing" their arms, making it a pun on this card's name.
  * This card's first effect is similar to the anime effect of "[[EN Shuffle (anime)|EN Shuffle]]".
  ** Interestingly, both "Elemental HERO Avian" and "Neo-Spacian Aqua Dolphin" also appear in the artwork of "EN Shuffle".
