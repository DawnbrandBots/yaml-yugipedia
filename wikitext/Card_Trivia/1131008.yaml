title: Card Trivia:Blaze Fiend Overlord Zebulth
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[counterpart]] of "[[Blaze Fiend Overlords Beelucitaroth (L)|Blaze Fiend Overlords Beelucitaroth [L]]]".
  ** This monster's [[Level]] ([[Level 10 Monster Cards|10]]) is equal to the level of "Blaze Fiend Overlords Beeluciroth [L]" while in [[Maximum Mode]], due to "[[Blaze Fiend Overlords Beelucitaroth]]"'s [[effect]] [[This card gains Levels|increasing its Level]] ([[Level 4 Monster Cards|4]]) by [[Level 6 Monster Cards|6]] while in Maximum Mode.
