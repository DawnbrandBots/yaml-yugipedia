title: Card Trivia:Zoodiac Bunnyblast
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zoodiac Barrage]]".
  * This monster is based on the [[wikipedia:Chinese Zodiac|Chinese Zodiac]] sign of the [[wikipedia:Rabbit (zodiac)|Rabbit]].
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018350491940159496 Bilibili] and [https://weibo.com/7406309913/5118972446113982 Weibo] at 6:00 AM (China Standard Time) on January 4, 2025, which was the fourth quarter of the Mao hour in the traditional Chinese timekeeping system.
