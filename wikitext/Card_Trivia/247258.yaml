title: Card Trivia:Battle Rush
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Koa'ki Meiru Powerhand]]" appears in this card's artwork.
  * The purple warrior in this card's artwork also appears in the artworks of  "[[Comeback]]", "[[Cross Attack]]", "[[Courageous Heart]]", "[[Dimension Gate]]", "[[Double Tension]]", "[[Fiery Fervor]]", "[[Full-Force Strike]]", and "[[Heartfelt Appeal]]", all of which are used by [[Yuma Tsukumo]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
