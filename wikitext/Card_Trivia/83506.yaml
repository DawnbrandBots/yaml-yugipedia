title: Card Trivia:Substitoad
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rain of Frogs]]".
  * This monster's Japanese name, "Substitute Toad" (イレカエル, ''irekaeru'') is a pun on the Japanese term 「入れ替える」 meaning "to swap around", reflecting its effect to "swap" one monster with a "[[Frog]]" monster from the [[Deck]].
  ** This monster's English name is a portmanteau of "substitute" and "toad", which also reflects its effect to "substitute" the [[Tribute]]d monster with a "Frog" monster from the Deck.
  * This monster has a watered-down counterpart: "[[Tradetoad]]".
  * This is the first card to ever become [[Forbidden]] due to its support for an [[archetype]]: it is banned due to its ability to [[mill]] the Deck and fill the [[Graveyard]] really quick by continuously Tributing the "Frog" monsters which were [[Special Summon]]ed by its effect.
