title: Card Trivia:Crystal Beast Amethyst Cat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Crystal Brilliance]]", "[[Crystal Conclave]]", "[[Golden Rule]]", "[[Jesse Anderson - Bonder with the Crystal Beasts]]", "[[Prism Wall]]", "[[Rainbow Bridge of the Heart]]", "[[Sapphire Revive]]", and "[[Spirit Poacher]]".
  ** This monster's crystal form appears in the artworks of "[[Crystal Abundance]]", "[[Crystal Beast Token]]", "[[Crystal Keeper]]", "[[Crystal Master]]", "[[Crystal Miracle]]", "[[Crystal Release]]", and "[[Ultimate Crystal Magic]]".
  * This monster is based on [[wikipedia:Amethyst|amethyst]], a purple-to-violet variation of the [[wikipedia:Quartz|quartz]] mineral.
  * This monster has an "[[Advanced Crystal Beast]]" [[counterpart]]: "[[Advanced Crystal Beast Amethyst Cat]]".
  * In the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's voice and mannerisms are based on [[wikipedia:Eartha Kitt|Eartha Kitt]] in her role as [[wikipedia:Catwoman|Catwoman]] in the 1960's ''[[wikipedia:Batman (TV series)|Batman]]'' TV series.
