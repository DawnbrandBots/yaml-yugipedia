  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Hierophant|The Hierophant]].
  ** This monster's number "V" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (1500) reference how The Hierophant is the fifth trump card of the Major Arcana Tarot.
