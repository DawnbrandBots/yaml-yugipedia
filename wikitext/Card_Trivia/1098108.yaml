title: Card Trivia:Sloppy Stasher Squirrel
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster's name and confused expression reference how [[wikipedia:Squirrel|squirrels]] are known for forgetting where they stash their acorns.
  ** This monster's Japanese name (うっかりす, ''Ukkarisu'') is a portmanteau of the Japanese words "''ukkari''" (浮かり, lit. "careless") and "''risu''" (リス, lit. "squirrel"). This, in turn, is also likely a pun on "''ukkari misu''", a Japanese phrase meaning "honest mistake", reflecting how this monster has forgotten where it stashed its acorns.
