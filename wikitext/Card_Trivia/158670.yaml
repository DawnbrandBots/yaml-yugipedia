title: Card Trivia:Soundproofed
wikitext: |-
  {{Navigation}}

  * "[[Dark Resonator]]" appears in this card's artwork.
  ** This card's artwork depicts the mallet and tuning fork wielded by "Dark Resonator" being destroyed, preventing its ability to perform a [[Synchro Summon]]. This reflects how the "[[Resonator]]" [[archetype]] is centered around a Synchro Summoning strategy and how [[Tuner monster]]s are generally associated with sound.
