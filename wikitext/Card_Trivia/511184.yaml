title: Card Trivia:Swordsman of Landstar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Defenders Intersect]]", "[[Emergency Evasion]]", "[[Landstar Forces]]", "[[Limit Reverse]]", "[[Mirror Route]]", and "[[Verdict of Anubis]]".
  * This monster has a [[retrained]] [[Tuner]] counterpart: "[[Comrade Swordsman of Landstar]]".
  * This monster has two ''[[Rush Duel]]'' counterparts: "[[Swordsman of Roadstar]]" and "[[Dice Archswordsman]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a lanel from {{chapter|Yu-Gi-Oh!|156|ref}} showing [[Swordsman of Landstar (manga)|this monster]] being Summoned.
