title: Card Trivia:Skiel Carrier 5
wikitext: |-
  {{Navigation|mode=nongame}}

  * The number "5" in this monster's name represents its [[Level]] (5).
  * This monster resembles a squid, an underwater mollusk where some species are known for flying via natural jet propulsion (like the [[wikipedia:Japanese flying squid|Japanese flying squid]]), keeping in relation with the "flying animal" design of the "[[Skiel]]" [[archetype]].
  * This monster, "[[Skiel Carrier 3]]", and "[[Skiel Guard]]" are the only "Skiel" monsters without 0 [[DEF]].
  ** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster has the highest [[original DEF]] (400) of all "Skiel" monsters.
