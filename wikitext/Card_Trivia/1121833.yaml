title: Card Trivia:Medius the Pure
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Artmage Academic Arcane Arts Acropolis]]", "[[Artmage Movement -Pedigree-]]", "[[Artmage Pact -Awakening-]]", "[[Artmage Peripeteia -Turmoil-]]", "[[Artmage Vandalism -Assault-]]", "[[Artmage Varnish -Alteration-]]", "[[DoomZ Change]]", "[[Elfnotes: A Plea for Help]]", "[[Elfnotes: Welcome Home]]", "[[Pasto-Ral Theorealize]]", "[[Theorealize]]", "[[Theorealize Overdrive]]", and "[[Prohibited Power Patron Portal - Terminus]]".
  * This monster has 3 upgraded forms, after inheriting the power of "[[Power Patron]]" monsters:
  ** "[[Nerva the Power Patron of Creation|Nerva]]"-based: "[[Artmage Diactorus]]".
  ** "[[Jupiter the Power Patron of Destruction|Jupiter]]"-based: "[[DoomZ Break - Diactorus]]".
  ** "Nerva", "Jupiter", and "[[Junora the Power Patron of Tuning|Junora]]"-based: "[[Vidolium the Unstable Power Patron of Unity]]".
