title: Card Trivia:Phantasmal Sacred Beasts of Chaos
wikitext: |-
  {{Navigation}}

  * "[[Hamon, Lord of Striking Thunder]]", "[[Raviel, Lord of Phantasms]]", and "[[Uria, Lord of Searing Flames]]" (and/or their "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] [[counterpart]]s) appear in this card's artwork.
  * This monster is named after ''[[Structure Deck: Sacred Beasts of Chaos]]'', which features [[support]] for the "[[Sacred Beast]]" [[series]] and the corresponding "[[Phantasm]]" archetype.
  * This monster's thrice per turn [[Quick Effect]] to [[negate]] the effect of an opponent's monster and gain [[Life Points]] equal to half its [[ATK]] is a reference to the power of the Sacred Beasts in the ''[[Yu-Gi-Oh! GX]]'' anime, where they drain the spirit energy from ''[[Duel Monsters]]'' cards from around the world and empower their user. In the case of this monster, which was released alongside the "Sacred Beast" [[retrain]]s of cards used by [[Kagemaru]] in ''[[Chaos Origins]]'', Kagemaru used the power of the Sacred Beasts to revitalize himself and regain his youth.
  * This monster's [[original ATK and DEF]] (5000/5000) is half the combined total [[ATK]] and [[DEF]] of the three Sacred Beasts (10000/10000) during the scene they were all first assembled in {{episode|GX|049|ref}}, with "[[Hamon, Lord of Striking Thunder (anime)|Hamon, Lord of Striking Thunder]]" and "[[Raviel, Lord of Phantasms (anime)|Raviel, Lord of Phantasms]]" each having 4000 ATK/DEF, while "[[Uria, Lord of Searing Flames (anime)|Uria, Lord of Searing Flames]]" had 2000 ATK/DEF via its effect.
  * This is the first [[Level 10]] monster with an original ATK and DEF of 5000.
  ** This monster has the highest original ATK (5000, tied with [[5000 ATK Monster Cards|other monsters]]) and original DEF (5000, tied with [[5000 DEF Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  *** This monster also has the lowest [[Level]] (10) for a monster with 5000 ATK and DEF.
  *** This monster also has the highest original ATK and DEF of all "Sacred Beast" and "Phantasm" monsters.
  * This monster shares similarities with "[[Phantasm Emperor Trilojig]]".
  ** Both are "Phantasm" [[Fusion Monster]]s that require three [[Level 10]] monsters as [[material]].
  ** Both feature an effect that [[target]]s an opponent's monster and affect Life Points based on half of their targeted monster's ATK: this monster makes the player gain Life Points, while "Trilojig" inflicts damage to the opponent.
