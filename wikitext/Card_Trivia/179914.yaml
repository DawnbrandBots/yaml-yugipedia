title: Card Trivia:Muzurhythm the String Djinn
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Djinn Orchestra]]" and "[[Resurrection March]]".
  * The "[[Djinn]]" logo is located on the golden orb on this monster's hat.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster is [[Xyz Summon]]ed, it plays a short version of "[[wikipedia:Pasodoble|pasodoble]]" music on its guitar.
