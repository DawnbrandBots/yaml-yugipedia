title: Card Trivia:Full Armor Gravitation
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Active Guard]]", "[[Advanced Shield]]", "[[Burning Knuckle]]", "[[Buster Knuckle]]", "[[Jet Blast Turret]]", "[[Over Boost]]", and "[[Psychic Armor Head]]" appear in this card's artwork.
  ** Fittingly, the above monsters were Summoned by this card's effect in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * In the Italian dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, both this card and "[[Armored Gravitation]]" share the same name, "Forza di Gravità Corazzata".
