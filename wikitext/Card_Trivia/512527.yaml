title: Card Trivia:Vilepawn Archfiend
wikitext: |-
  {{Navigation}}

  * This card is one of the six [[wikipedia:chess|chess]]-themed "[[Archfiend]]" cards that debuted in ''[[Threat of the Dark Demon World]]'' in the ''[[OCG]]'' and ''[[Dark Crisis]]'' in the ''[[TCG]]'', each one featuring [[wikipedia:chessboard|chessboard]] background, all of whom are based on a [[wikipedia:chess piece|chess piece]]. In this monster's case, it is based on the [[wikipedia:Pawn (chess)|pawn]], a dome-shaped chess piece, as this monster features a dome-like head and shoulder plates.
  ** This card's effect is a reference to how the front row of pawns can protect the more valuable chess pieces in chess.
  * This monster resembles a less ornate version of "[[Shadowknight Archfiend]]", as they both carry the same sword and shield, though the glow of "Vilepawn" is blue instead of bright red like "Shadowknight".
