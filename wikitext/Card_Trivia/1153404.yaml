title: Card Trivia:Tri-Brigade Springans Kitt
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of "[[Springans Kitt]]" referencing [[Kitt]]'s original form, "[[Tri-Brigade Kitt]]".
  ** This monster's name is a combination of the latters' names, and all three of them share the same [[Type]] ([[Beast]]). However, it has the same [[Level]] (4), [[original ATK and DEF]] (1700/1000), and opposite [[Attribute]] ([[LIGHT]], instead of [[DARK]]) as "Springans Kitt".
