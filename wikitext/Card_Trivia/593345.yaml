title: Card Trivia:Catoblepas, Familiar of the Evil Eye
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Catoblepas|catoblepas]], a large buffalo-like creature of myth that could cause death or petrification with a single glance.
  * This monster appears in the artworks of "[[Evil Eye Repose]]", "[[Evil Eye Defeat]]", and "[[Evil Eye Awakening]]"
