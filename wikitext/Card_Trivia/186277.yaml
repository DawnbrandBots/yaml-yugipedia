title: Card Trivia:Evilswarm Mandragora
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] appears to be the "[[lswarm]]" counterpart of a grown-up "[[Naturia Cosmobeet]]", as not only the feet and body are the same, so are their eyes and [[Monster effect|effect]].
  * This monster is based on the [[wikipedia:Mandrake (plant)|Mandragora]], commonly known as the "Mandrake". The plant is a powerful [[wikipedia:hallucinogen|hallucinogen]] that was said to have its [[wikipedia:root|roots]] in the form of a small [[wikipedia:child|child]] that, upon being pulled from its [[wikipedia:soil|earthen home]], would emit a [[wikipedia:screaming|scream]] so terrible, it would kill anyone who heard it.
  ** Its "antennae" and hands resemble a [[wikipedia:Venus flytrap|Venus flytrap]].
  * In her youth, [[Skye Zaizen]] carried a doll of this monster.
