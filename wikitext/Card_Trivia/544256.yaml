title: Card Trivia:Magical Musket Mastermind Zakiel
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Spirit Warriors]]''/''[[Spirit Warriors]]''.
  * This monster appears in the artworks of "[[Magical Musket - Crooked Crown]]" and "[[Magical Musket - Fiendish Deal]]".
  * The pistols featured in this card's artwork are the same as those appearing in the artwork of "[[Magical Musketeer Caspar]]".
  * This monster is based on "Samiel", ''the Black Huntsman'', one of the main antagonists of the German [[wikipedia:Opera|opera]] ''[[wikipedia:Der Freischütz|Der Freischütz]]''.
  * This card's last effect has an oversight in the ''[[TCG]]'', stating both ''"Once per turn"'' and ''"You can only use this effect of "Magical Musket Mastermind Zakiel" [[once per turn]]"''. The first string is redundant, as the effect cannot activate for both players on the same turn (it's only the opponent's [[End Phase]] from the perspective of oneplayer at a time); the second restriction already applies to all copies of this card.
