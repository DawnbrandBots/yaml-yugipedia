title: Card Trivia:Decoy Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name reflects its appearance, as the pair of small, orange glaring eyes serve as its true eyes, while the two large brown adornments on its face resembling large eyes serve as "decoys".
  ** This monster's name also reflects its effect, as it serves as a "decoy" for the [[Level 7]] or higher [[Dragon]] monster that it can [[Special Summon]] and redirect the opponent's monster's attack to.
  * This monster has a "[[Metaphys]]" counterpart: "[[Metaphys Decoy Dragon]]".
  * This card's Spanish print has two erratas: it lacks the word "de" which is normally used between the Level and Type in "''selecciona 1 monstruo [de] Tipo Dragón''" ("''select 1 [...] Dragon-Type monster''" and the word "''Nivel''" ("''Level''") lacks the capital letter.
