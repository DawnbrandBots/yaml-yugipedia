title: Card Trivia:Ha-Re the Sword Mikanko
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mikanko Fire Dance]]", "[[Mikanko Rivalry]]", "[[Mikanko Kagura]]", and "[[Mikanko Purification Dance]]"
  ** A younger version of this monster appears in the artworks of "[[Mikanko Promise]]" and "[[The Great Mikanko Ceremony]]".
  * This monster is named after ''[[wikipedia:Emperor Jimmu|Iwarebiko-no-Mikoto]]'' (磐余彦尊), the first [[wikipedia:Emperor of Japan|emperor of Japan]] and a descendant of the goddess ''[[wikipedia:Amaterasu|Amaterasu]]''.
  * The rat motif of this monster is based on the ''[[wiktionary:火鼠|hinezumi]]'', a mythical fire-rat in [[wikipedia:Japanese folklore|Japanese folklore]].
  * The sword of this monster is based on ''[[wikipedia:Kusanagi no Tsurugi|Kusanagi-no-Tsurugi]]'', a legendary Japanese sword and one of the three [[wikipedia:Imperial Regalia of Japan|Imperial Regalia of Japan]].
  ** According to ''[[The Valuable Book EX 3 card storylines#No. 07: Mikanko|The Valuable Book EX 3 card storylines]]'', this monster is from the 'Mitsurugi' branch family, named after the ''Kusanagi-no-Tsurugi''.
