title: Card Trivia:Crimson Sunbird
wikitext: |-
  {{Navigation}}

  * This card was released in Japan as a promo 12 years before its English release.
  * In ''[[Yu-Gi-Oh! Nightmare Troubadour]]'', this card is practically impossible to Summon as neither "[[Faith Bird]]" or "[[Skull Red Bird]]" exist in-game.  The only way to Summon it is with "[[Cyber-Stein]]".
