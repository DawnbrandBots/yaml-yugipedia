title: Card Trivia:Crimson Blade Dragon
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a combination of "[[Crimson Blader]]" and "[[Exploder Dragonwing]]", both of which were used by [[Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** Fittingly, this monster has the same [[DEF]] (2600) as "Crimson Blader", and the same [[Attribute]] ([[Dark]]), [[Level]] (7), [[Type]] ([[Dragon]]), and [[ATK]] (2400) as "Exploder Dragonwing".
  ** This monster's effect is a combination of both monsters' effects, where it can counter an opponent's [[Level 5]] or higher monster(s) like "Crimson Blader", and can [[destroy]] an opponent's monster at the start of the [[Damage Step]] like "Exploder Dragonwing".
