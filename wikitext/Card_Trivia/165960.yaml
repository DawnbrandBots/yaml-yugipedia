title: Card Trivia:Singularity Fiend
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is named after a [[wikipedia:Gravitational singularity|gravitational singularity]], a concept of [[wikipedia:General relativity|general relativity]] in which a region of space reaches infinite density, causing extreme distortion of space-time due to gravitational forces, and creating a [[wikipedia:Black hole|black hole]].
