title: Card Trivia:Elemental HERO Liquid Soldier
wikitext: |-
  {{Navigation}}

  * This monster has an [[EARTH]] counterpart: "[[Elemental HERO Solid Soldier]]".
  ** Both monsters are named after two of the three [[wikipedia:State of matter|states of matter]], with this monster being based on liquid, and "Solid Soldier" being based on solids.
  ** Both monsters share the effect to [[Special Summon]] a [[Level]] 4 or lower "[[HERO]]" monster when they are [[Normal Summon]]ed.
  ** In the leak description of the Magical HERO Booster pack, it said that [[Elemental HERO Liquid Soldier]], [[Elemental HERO Solid Soldier]] and [[Elemental HERO Blazeman]] are Brothers.
