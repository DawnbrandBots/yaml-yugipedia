title: Card Trivia:Nightmare Penguin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Drop Exchange]]".
  * In ''[[Yu-Gi-Oh! Reshef of Destruction]]'', this is a [[Level 5]] monster with 1300 [[ATK]] and 1750 [[DEF]].
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, during the [[Virtual World (arc)|Virtual World arc]], [[Crump]] takes the form of this monster to act as his [[Deck Master]]. Its ability increases the ATK of all face-up [[WATER]] monsters on his field by 200, the same as its second effect in the ''[[OCG]]''/''[[TCG]]''.
  ** As no other Deck Master abilities were mentioned, this is the only [[Effect Monster]] used as a Deck Master to not have its normal effect altered or expanded on.
  ** In the original Japanese version of the anime, [[Téa Gardner]] mentions that this monster's [[Attribute]] is [[WIND]], as it was used as the required WIND [[Tribute]] for the [[Ritual Summon]] of "[[Mythic Dragon (anime)|Mythic Dragon]]".
  * This monster's Japanese name, "Penguin Nightmare" (ペンギン・ナイトメア, ''Pengin Naitomea''), is similar to that of the Japanese name of "[[Penguin Knight]]" (ペンギン・ナイト, ''Pengin Naito'').
