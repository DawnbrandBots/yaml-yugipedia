title: Card Trivia:Barrel Lily
wikitext: |-
  {{Navigation}}

  * This card's Japanese [[flavor text]] contains a pun: ''Teppōyuri'' (てっぽうユリ) is pronounced the same as the Japanese name for the plant ''[[wikipedia:Lilium longiflorum|lilium longiflorum]]'' (テッポウユリ), but with that spelling it means "gun lily".
  * This monster is very similar in appearance to "[[Anti-Aircraft Flower]]", but with eyes.
