title: Card Trivia:Fiendish Chain
wikitext: |-
  {{Navigation}}

  * The chains, torches, and the blue flames appearing in this card's artwork appears in the artwork of "[[Fiendish Golem]]". 
  ** The demonic statue appearing in the artwork of "Fiendish Golem" also appears in this card's artwork. The wings and chain of the statue are also featured in the design of "[[Fiend Piece Golem]]"
  * This card appears in the artwork of "[[Dark Contract with Errors]]".
  * This card has a "[[Red Dragon Archfiend (archetype)|Red Dragon Archfiend]]" counterpart: "[[Red Dragon Archfiend's Chain]]".
  * This card shares many similarities with "[[Shadow Spell]]".
  ** Both cards are [[Continuous Trap Card]]s featuring their artwork depicting chains.
  ** Both cards feature a negative effect against the opponent's monster, prevent the [[target]]ed monster from attacking, and a self-destruction effect.
  ** Both cards are used by the main rivals of their respective debut series; this card is used by [[Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, while "Shadow Spell" is used by [[Seto Kaiba]] in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'' manga]] and [[Yu-Gi-Oh! (anime)|anime]]. Also, in a flashback sequence in {{episode|5D's|002|ref}}, Jack Atlas used "Shadow Spell" to defeat [[Yusei Fudo]].
