title: Card Trivia:Ib the World Chalice Justiciar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Crusadia Testament]]".
  * "[[Crowned by the World Chalice]]" → "[[Ib the World Chalice Priestess]]" → "[[Knightmare Corruptor Iblee]]" → "[[Galatea, the Orcust Automaton]]" → "Ib the World Chalice Justiciar" → "[[Lib the World Key Blademaster]]".
  ** This monster's appearance is a combination of "Crowned by the World Chalice" and the wings of "[[Guardragon Justicia]]", with their union being depicted in "[[Guardragon Reincarnation]]".
  *** This monster's [[original ATK]] (1800) is the same as of "World Chalice Priestess", while its [[original DEF]] (2100) is the same as both "Crowned" and "Justicia".
  *** This monster's [[Level]] (5) is the same as the Level of "[[World Legacy - "World Chalice"]]", the "[[World Legacy]]" form of "Justicia".
  * This monster's weapon is a combination of the staff wielded by "Ib the World Chalice Priestess" and one of the blades of "[[Mekk-Knight Blue Sky]]".
  ** This weapon is identical to the one wielded by "[[Knightmare Incarnation Idlee]]".
