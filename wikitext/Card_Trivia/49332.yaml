title: Card Trivia:Bubble Illusion
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Bubbleman]]" appears in this card's artwork.
  ** This card's name and artwork is a reference to "Bubbleman" dressed in a magician's outfit, performing a [[wikipedia:Magic (illusion)|magic trick]].
  * This card is one of four [[Spell Cards]] that support "[[Elemental HERO Bubbleman]]", the other three being "[[Bubble Blaster]]", "[[Bubble Rod]]" (both [[Equip Spell Card]]s), and "[[Bubble Shuffle]]" (a [[Quick-Play Spell Card]]).
  * Prior to the [[erratum]] of "[[Temple of the Kings]]", this card was the only non-[[Forbidden]] card that could reasonably allow generic [[Trap Card]]s to be activated on the first turn of the Duel.
