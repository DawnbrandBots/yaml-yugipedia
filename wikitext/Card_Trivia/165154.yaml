title: Card Trivia:Hot Red Dragon Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Duel Dragon Token]]" and "[[Red Supremacy]]".
  * This card's Japanese name, "Jeweled Demon Dragon - Red Daemon" (琰魔竜 レッド・デーモン, ''Enmaryū Reddo Dēmon''), features two puns.
  ** The kanji "琰" is made up of the character (炎) "Flame" and the radical of "King" (王).
  ** The kanji "琰魔", which characterizes the dragon, is pronounced as "Enma", similar to "[[wikipedia:Yama|Yama]]" (閻魔), the God who rules over death, hell, and the cycle of rebirth in Buddhism and East Asian mythology.
  * This card is the [[Duel Dragon]] [[counterpart]] to "[[Red Dragon Archfiend]]".
  ** [[Jack Atlas]]'s [[Mark of the Dragon]] Wings from the ''[[Yu-Gi-Oh! 5D's]]'' anime appears as marks on this monster's design.
  ** This monster's effect is the opposite of "Red Dragon Archfiend"; it destroys Attack Position monsters during the [[Main Phase]], while "Red Dragon Archfiend" destroys Defense Position monsters during the [[Battle Phase]].
  * This is the [[signature card]] of [[Jack Atlas (manga)|Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This card has three [[Card evolutions|evolved]] forms: "[[Hot Red Dragon Archfiend Abyss]]", "[[Hot Red Dragon Archfiend Bane]]" and "[[Hot Red Dragon Archfiend King Calamity]]".
  ** The names of this card's evolutions are spelled in a consecutive alphabetic order, to symbolize the monster's growth: first there is "'''A'''byss", then "'''B'''ane", and finally "King '''C'''alamity", which further underlines these cards' status as consecutive evolution steps.
