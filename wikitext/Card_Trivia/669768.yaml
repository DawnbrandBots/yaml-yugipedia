title: Card Trivia:Head Judging
wikitext: |-
  {{Navigation}}

  * "[[Ms. Judge]]" appears in this card's artwork.
  * This card's name is a pun on "head judge", a judge who holds a chief position among their rank.
  ** The card artwork depicts "Ms. Judge" thinking deeply and arguing with herself in her thoughts (i.e. ''judging'' in her ''head'').
