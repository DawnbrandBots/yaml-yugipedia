title: Card Trivia:Royal Rebel's Heavy Metal
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Roa - Demon's Rock]]'', as well as one of the cover cards of ''[[Deck Mod Pack: Shocking Lightning Attack!!]]''.
  * This monster appears in the artworks of "[[Destiny Introduction]]", "[[Gig and Take]]", "[[Rebel's Scream]]", "[[Royal Rebel's Command]]", and "[[Royal Rebel's King's Return]]".
  ** This monster's microphone appears in the artwork of "[[Royal Rebel's Impulse]]".
  * This monster is named after [[wikipedia:Heavy metal music|heavy metal music]], a genre of rock music that is traditionally characterized by loud distorted guitars, emphatic rhythms, dense bass-and-drum sound and vigorous vocals.
  * This is the [[signature card]] of [[Roa Kassidy]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
