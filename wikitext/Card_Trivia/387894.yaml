title: Card Trivia:Fairy Tail - Snow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fairy Tail Ball]]", "[[Fairy Tale Tails]]", and "[[Weaver of Fairy Tails]]".
  ** This monster's tail appears in the artwork of "[[Tails of the Fairy Tails]]".
  * This monster's name is based on the fairy tale ''[[wikipedia:Snow White|Snow White]]''.
  ** This monster's effect to [[banish]] 7 other cards reference the [[wikipedia:Seven Dwarfs|Seven Dwarfs]] that appear in ''Snow White''.
  * In this card's Japanese artwork, this monster's dress resembles the one worn by [[wikipedia:Snow White (Disney)|Snow White]] in the animated film by [[wikipedia:Walt Disney Animation Studios|Disney]], ''[[wikipedia:Snow White and the Seven Dwarfs (1937 film)|Snow White and the Seven Dwarfs]]''.
  ** In this card's ''[[TCG]]'' artwork, the color of this monster's clothes is changed from blue to red, likely to avoid copyright issues with Disney.
