  * This monster's Japanese name is based on ''Devarim'', the 44th [[wikipedia:Weekly Torah portion|weekly Torah portion]] in the annual Jewish cycle of the [[wikipedia:Torah|Torah]] [[wikipedia:Torah reading|reading]] and the first in the [[wikipedia:Book of Deuteronomy|Book of Deuteronomy]].
