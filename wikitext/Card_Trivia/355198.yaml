title: Card Trivia:Beginning Knight
wikitext: |-
  {{Navigation}}

  * This monster appears to be a [[wikipedia:Chibi (term)|chibi]] version of "[[Black Luster Soldier - Envoy of the Beginning]]".
  ** The bulleted effects that this monster grants the [[Ritual Summon]]ed "[[Black Luster Soldier (archetype)|Black Luster Soldier]]" monster are based on those of "Envoy of the Beginning".
  * This monster has a [[DARK]] [[counterpart]] based on "[[Black Luster Soldier - Envoy of the Evening Twilight]]": "[[Evening Twilight Knight]]".
