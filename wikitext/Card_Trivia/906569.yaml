title: Card Trivia:Armed Dragon Thunder LV10
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Blazing Vortex]]''.
  * This monster appears in the artwork of "[[Armed Dragon Thunderbolt]]".
  * This monster is a [[retrained]] counterpart of "[[Armed Dragon LV10]]".
  * Visually, this monster seems to be a [[Fusion Material]] for "[[Armed Neos]]", as indicated by the following similarities with each other:
  ** Various, identical lightning-shaped elements on both monsters' torsos, knees, and faces.
  ** Horn-like features on both monsters' shoulders and faces.
  ** Identical wing [[wikipedia:Phalanx bone|phalanges]].
  ** Clawed weapons on both monsters' wrists.
  * This monster features several references to [[Chazz Princeton]], the original user of the "[[Armed Dragon]]" [[archetype]] in the ''[[Yu-Gi-Oh! GX]]'' anime, whose name in the original Japanese version is "Jun Manjoume".
  ** This monster's design features a thunder motif, referencing Chazz's nickname in the Japanese version of the anime, "Manjoume Thunder".
  ** This monster's pose features one arm pointing towards the sky, referencing Chazz's signature pose, where he holds up one arm and points to the sky.
  ** This monster's bulleted effects feature the numbers 1, 10, 100, 1000, and 10000 in sequence, referencing Chazz's Japanese catchphrase "''Ichi, jū, hyaku, sen, Manjōme-sandā''" (一、十、百、千、万丈目サンダー meaning "one, ten, hundred, thousand, Manjoume Thunder", with "man" meaning "10000").
  *** This is the first card in the ''[[OCG]]''/''[[TCG]]'' to reference an [[ATK]] value of 1, and the first to reference a 1-digit ATK value that is not 0.
  * This monster, "[[Armityle the Chaos Phantasm]]", "[[Numeron Chaos Ritual]]", and "[[Ten Thousand Dragon]]" are the only cards that refer to an ATK with 5 digits (10,000 ATK).
  * This monster shares similarities with "[[The Crimson King]]":
  ** Both monsters are retrained counterparts of the [[signature card]]s of their respective anime protagonist's rival; Chazz Princeton and "[[Armed Dragon LV10 (anime)|Armed Dragon LV10]]" in ''Yu-Gi-Oh! GX'', and [[Jack Atlas]] and "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" in ''[[Yu-Gi-Oh! 5D's]]'' respectively.
  ** Both monsters are depicted striking the signature pose of their respective owners in their artworks. 
  ** Both monsters are the cover cards of their [[Core Boosters]], both of which start with the word "Blazing" (''Blazing Vortex'' and ''[[Blazing Dominion]]'', respectively).
