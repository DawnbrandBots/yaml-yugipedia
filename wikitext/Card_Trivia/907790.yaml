title: Card Trivia:Ecclesia the Exiled
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Alba Strike Recollections of Fate Pack]]''.
  * "[[Incredible Ecclesia, the Virtuous]]", and "[[Tri-Brigade Mercourier]]" appear in this card's artwork.
  ** This card's name is a reference to the exile of "[[Dogmatika Ecclesia, the Virtuous]]" from the "[[Dogmatika Nation]]", after she refused to execute "[[Fallen of Albaz]]".
  ** This card's [[flavor text]] states that "Ecclesia" gave "Albaz" his name (''With thoughts of coming days in mind, the girl gifts a name to the boy'').
  ** This card's artwork is the other half of the artwork of "[[Albaz the Shrouded]]", as indicated by the same fire, skeleton, and background.
  *** The gigantic skeleton that appears in this card's artwork is also similar to the ones that appear in the artwork "[[Great Sand Sea - Gold Golgonda]]".
