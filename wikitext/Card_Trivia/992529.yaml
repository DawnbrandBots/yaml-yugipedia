title: Card Trivia:Breath of Acclamation
wikitext: |-
  {{Navigation}}

  * The shrine in this card's artwork appears in "[[Stars Align Above the Shrine]]".
  * This card is based on a ''[[wikipedia:Himorogi|himorogi]]'', a sacred space or alter in [[wikipedia:Shinto|Shinto religion]] where it is marked off and purified to make it a space for the Kami to inhabit.
  * This card is the [[WIND]] counterpart of the following [[Ritual Spell]]s:
  ** "[[Contract with the Abyss]]" - [[DARK]]
  ** "[[Earth Chant]]" - [[EARTH]]
  ** "[[Sprite's Blessing]]" - [[LIGHT]]
