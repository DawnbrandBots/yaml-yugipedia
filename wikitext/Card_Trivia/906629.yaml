title: Card Trivia:Barian Untopia
wikitext: |-
  {{Navigation}}

  [[File:Inside_view_of_Barian_world.jpg|thumb|right|250|The Barian World, as seen in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * The [[Barian World]] appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|099|ref}} which depicts the Barian World in the scene where a pillar of fire is released from the [[Barian Sea]].
  * This card's Japanese name, "Land of Hope - Barian -" ({{Ruby|冀|き}}{{Ruby|望|ぼう}}{{Ruby|郷|きょう}}－バリアン－ ''Kibōkyō - Barian -''), is based on the Japanese name of "[[CXyz Barian Hope]]", "Chaos Xyz: King of Hope, Varian" ({{Ruby|ＣＸ|カオスエクシーズ}} {{Ruby|冀|き}}{{Ruby|望|ぼう}}{{Ruby|皇|おう}}バリアン ''Kaosu Ekushīzu Kibōō Barian'').

