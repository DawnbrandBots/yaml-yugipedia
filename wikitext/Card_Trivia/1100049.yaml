title: 'Card Trivia:Number S37: Spider Shark'
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2025]]''.
  * This monster is a "[[Number S]]" [[Card evolutions|upgraded]] form of "[[Number 37: Hope Woven Dragon Spider Shark]]".
  ** This monster is based on how in {{chapter|ZEXAL|051|ref}}, "[[No. 37: Hope Woven Dragon Spider Shark (manga)|No. 37: Hope Woven Dragon Spider Shark]]" was treated as a "Number S" monster with its [[Rank]] increased by 1 via the effect of "[[Shining Hope Road (manga)|Shining Hope Road]]", before being used to [[Xyz Summon]] "[[No. S0: Hope ZEXAL (manga)|Number S0: Hope ZEXAL]]". In this scene, its name was rendered in shorthand form, as "No. S37: Spider Shark".
  ** This monster's effect to [[banish]] an opponent's monster until their next [[Standby Phase]] is reminiscent of "[[Number 70: Malevolent Sin]]", which was transformed into "Number 37: Hope Woven Dragon Spider Shark" in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  * This monster and "[[Number S38: Titanic Galaxy]]" are the first ''[[OCG]]''/''[[TCG]]''-original "Number S" monsters, as well as the first "Number S" monsters not to be "[[Utopia (archetype)|Utopia]]/[[Utopic]]" monsters.
  * This card's artwork is taken from {{chapter|ZEXAL|050|ref}}, specifically from the panel showing "No. 37: Hope Woven Dragon Spider Shark" preparing to attack "[[Anti-Hope, God of Despair (manga)|Anti-Hope, God of Despair]]".

