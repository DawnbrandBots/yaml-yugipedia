title: Card Trivia:Eldlixir of Scarlet Sanguine
wikitext: |-
  {{Navigation}}

  * The [[wikipedia:Philosopher's Stone|philosopher's stone]] embedded in the chest of "[[Eldlich the Golden Lord]]" appears in this card's artwork.
  ** According to the lore from [[The Valuable Book EX card storylines#No. 05: Eldlich|The Valuable Book EX]] card storylines, the mummified monsters that appear in this card's artwork are the "thousands of souls" offered to the aforementioned magic stone to awaken it. Specifically, this card's artwork reveals that said offerings were thrown and ammassed into the pool (or well) that appears full of an unidentified liquid in the artworks of the "[[Eldlixir]]" [[Spell]]s.
  * This is one of three "Eldlixir" cards that represents the three stages of the ''[[wikipedia:Magnum opus (alchemy)|Magnum opus]]'' process. ("[[Eldlixir of Black Awakening]]" → "[[Eldlixir of White Destiny]]" → "'''Eldlixir of Scarlet Sanguine'''")
  ** Specifically, this card is based on the third stage, [[wikipedia:Citrinitas|citrinitas]], which refers to the process of transmuting silver (or albedo) into gold, similarly to how this card's artwork depicts the people and environment turning into gold. After the 15th century, citrinas was usually compressed and treated as an intermediary extension of [[wikipedia:Rubedo|rubedo]] (or '''redness'''), which represents alchemical success and the end of "the great work".
  *** In alchemy, the process of redness is the final step in the pathway to the philosopher's stone, which represents the achievement of enlightened consciousness and the total fusion of spirit and matter. Fittingly, this card's artwork depicts the philosopher's stone's color being red, which was transformed from its blackened and whitened states in the aforementioned cards' artworks.
