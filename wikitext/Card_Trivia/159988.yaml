title: Card Trivia:Elemental HERO Shadow Mist
wikitext: |-
  {{Navigation}}

  * This is the first [[DARK]] "[[Elemental HERO]]" monster to be introduced in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, as well as the first non-[[Fusion]] DARK "Elemental HERO" since "[[Elemental HERO Necroshade]]".
  * This is the last non-Fusion "Elemental HERO" monster played by [[Jaden Yuki (manga)|Jaden Yuki]] in the manga. Coincidentally, it has the same [[original ATK]] (1000) as "[[Elemental HERO Avian]]", who is the first "Elemental HERO" monster as well as the first "[[HERO]]" monster played in the [[Yu-Gi-Oh! GX|anime]].
