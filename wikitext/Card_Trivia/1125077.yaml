title: Card Trivia:Spirit Poacher
wikitext: |-
  {{Navigation}}

  [[File:Prey Counter.png|thumb|250px|"[[Crystal Beast Amethyst Cat (anime)|Crystal Beast Amethyst Cat]]" ensnared with the effect of "[[Hunting Net]]".]]

  * "[[Crystal Beast Amethyst Cat]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|115|ref}}, where [[Trapper]] ensnares "[[Crystal Beast Amethyst Cat (anime)|Crystal Beast Amethyst Cat]]" in a hunting net with the effect of "[[Hunting Net]]", forcing it to his [[field]] and placing a [[Prey Counter]] on it.
  *** This card's first bulleted effect allows the player to place a monster from their [[Deck]] to their [[Spell & Trap Zone]] as a [[Continuous Spell Card]], referencing how Trapper ensnares the "[[Crystal Beast]]" monsters (an [[archetype]] of monsters who share an effect to place themselves in the Spell & Trap Zone as Continuous Spell Cards) during his Duel against [[Jesse Anderson]]. 
  **** Alternatively, the first bulleted effect references Trapper's Dueling strategy, where he uses cards such as "[[Hunting Net]]" and "[[Capture Snare]]" to place the [[target]]ed opponent's monster in his Spell & Trap Zone as Continuous Spell Cards and place Prey Counters on them.
  *** This card's second bulleted effect references "[[Dark Auction]]", a [[Spell Card]] used by Trapper that allows him to [[return]] the opponent's monster with a Prey Counter back to their [[hand]] in exchange for losing [[Life Point]]s equal to that monster's [[ATK]].
  * This card's name is based on Trapper's occupation as a [[Duel Monster Spirit]] hunter in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's name is also similar to the Japanese title of ''Yu-Gi-Oh! GX'' episode 115: ''"Spirit Hunter Giese"''.

