title: Card Trivia:Full Moon Mirror
wikitext: |-
  {{Navigation}}

  * One of the shrouded spirits from the artwork of "[[Infinite Fiend Mirror]]" appears in this card's artwork.
  * This card's ''[[OCG]]''/''[[TCG]]'' bulleted effects reference the Deck used by [[Sarina]] in the ''[[Yu-Gi-Oh! GX]]'' anime, which included this card.
  ** This card's first bulleted effect to [[Special Summon]] a [[Level 6]] [[Fiend]] or [[Fairy]] monster from the [[hand]] or [[Graveyard]] is a reference to Sarina's usage of the [[Shikigami]] [[series]], which primarily consists of Level 6 and lower Fiend and Fairy monsters with effects that can Special Summon their "partner" monster from the Graveyard.
  ** This card's second and third bulleted effects to [[add]] a [[Level 10]] [[DARK]] monster from the [[Deck]] to the hand and Special Summon a Level 10 monster from the hand, respectively, both reference Sarina's [[signature card]], "[[Dark Creator (anime)|Dark Creator]]", whose [[Attribute]] is DARK and whose [[Level]] is 10.
