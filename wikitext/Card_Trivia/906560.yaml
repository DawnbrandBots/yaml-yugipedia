title: Card Trivia:Yamiruler the Dark Delayer
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Gavin - Demon Commander Three Legions]]'', as well as one of the cover cards of ''[[Megaroad Pack 2]]''.
  * This monster appears in the artworks of "[[Dark Ruler Battle Slash]]", "[[Sword Skill - Ruler's Slash]]" and "[[The Three Dark Rulers]]".
  ** This monster's arm appears in the artwork of "[[Scroll of Salutation]]".
  ** This monster's [[wikipedia:Gunbai|Gunbai fan]] and sword appear in the artwork of "[[Dark Ruler Battlegear]]".
  * This is the [[signature card]] of [[Gavin Sogetsu]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime and [[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!|manga]].
  * This monster's Japanese name, "Yameruler" (ヤメルーラ ''Yamerūra''), is a play on "Yameru" (止める), which means "to stop (an activity)", "to cease". Gavin Sogetsu, who uses this monster in the ''Yu-Gi-Oh! SEVENS'' anime, initially uses it with the goal of putting a "stop" to [[Rush Duel]]s, which are played with 7-shaped [[Duel Disk]]s.
  ** By contrast, this monster's English name, "Yamiruler", is a play on the word "Yami" (闇 ''Yami''), which translates to "darkness", referencing its [[DARK]] [[Attribute]].
  ** Both its English and Japanese names are based on its effect to "stop" or "delay" players from [[Tribute Summon]]ing [[Level 7]] or higher monster while it remains on the field.
  * This monster has the following forms:
  ** A [[Normal Monster|Normal]] [[counterpart]]: "[[Yamiruler]]".
  ** A retrained counterpart: "[[Yamiruler the Dark Delayer - Supreme Soldier Spear]]".
  ** An [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Yamiterasu the Divine Ruler]]".
