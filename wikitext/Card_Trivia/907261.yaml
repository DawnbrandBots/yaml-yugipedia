title: Card Trivia:Iron Draw
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' [[activation condition]] requiring exactly two [[Machine]] [[Effect Monster]]s is based on this card's usage in {{episode|ZEXAL|020|ref}}, where [[Bronk Stone]] activates this card while he controlled "[[Aye-Iron (anime)|Aye-Iron]]" and "[[Tin Goldfish (anime)|Tin Goldfish]]", both being Machine Effect Monsters.
  ** Additionally, this card's ''OCG''/''TCG'' effect to allow only one [[Special Summon]] after its effect [[resolve]]s is a reference to how in the aforementioned episode Bronk Summoned only "[[Number 39: Utopia (anime)|Number 39: Utopia]]" after he used this card.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this card was [[activate]]d, a metallic glove appears on the player's hand.
