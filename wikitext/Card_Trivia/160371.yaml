title: Card Trivia:Out of the Blue
wikitext: |-
  {{Navigation}}

  * Three "[[X-Saber Airbellum]]" and three "[[Sea Koala]]" appear in this card's artwork.
  * The floor flying in this card's artwork is the same stone floor in "[[People Running About]]" and "[[Darkfall]]".
  ** In fact, this card seems to take place either right before or right after the event depicted in the artwork of "[[Darkfall]]".
