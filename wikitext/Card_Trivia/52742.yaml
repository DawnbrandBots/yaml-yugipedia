title: Card Trivia:Turbo Cannon
wikitext: |-
  {{Navigation}}

  * This card's effect is a combination of the effect of its [[Tuner monster]] and associated [[Synchro Material]]: "[[Turbo Rocket]]" and "[[Turbo Booster]]".
  ** "Turbo Booster": [[destroy]]ing 1 [[face-up]] monster on the [[field]].
  ** "Turbo Rocket": inflicting [[Effect damage|damage]] to its [[control]]ler equal to half of its [[ATK]].
  * This card was the first [[Level]] 3 [[Synchro Monster]] to be revealed.
  * This card has the lowest [[ATK]] and [[DEF]] (0/0) of all Synchro Monsters (tied with "[[Ultimaya Tzolkin]]" and "[[Phantasmal Lord Ultimitl Bishbaalkin]]").
  * This was the first Synchro Monster to have ATK equal to its DEF.
