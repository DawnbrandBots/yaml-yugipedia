title: Card Trivia:Fulfillment of the Contract
wikitext: |-
  {{Navigation}}

  * This card has a Fusion counterpart, "[[Re-Fusion]]", as well as a more general counterpart, "[[Premature Burial]]".
  ** It is also possible that this card's Synchro counterpart would be "[[Wicked Rebirth]]".
  * The events shown in this card's artwork continues in "[[Execution of the Contract]]".
  * The circle in the ground in this card's artwork resembles a transmutation circle.
