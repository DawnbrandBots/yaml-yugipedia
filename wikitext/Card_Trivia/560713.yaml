title: Card Trivia:Sky Striker Mecha - Widow Anchor
wikitext: |-
  {{Navigation}}

  * "[[Sky Striker Ace - Raye]]" appears in this card's artworks.
  ** "[[Sky Striker Ace - Roze]]" and parts of "[[Sky Striker Ace - Kaina]]" also appear in its second one.
  ** Its first artwork was adapted into a panel in {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|18|ref}}, where [[Raye (manga)|Raye]] uses the "Widow Anchor" to clamp on one of the drones deployed by [[Surgical Striker - S.P.E.C.T.R.A.|S.P.E.C.T.R.A.]].
  * This card's name references the [[wikipedia:Northrop P-61 Black Widow|Northrop P-61 Black Widow]], an American fighter aircraft. Fittingly, the code "S-061" appears inside this anchor's clamp.
