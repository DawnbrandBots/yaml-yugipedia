title: Card Trivia:Morphtronic Celfon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Block Lock]]", "[[Factory of 100 Machines]]", "[[Junk Box]]", "[[Morphtronic Bind]]", "[[Morphtronic Converter]]", "[[Morphtronic Map]]", and "[[Morphtronics, Scramble!]]".
  * This monster is based on a cellular telephone, as indicated by its name, appearance and the ability to [[Special Summon]] other "[[Morphtronic]]" monsters. Its Japanese name is derived from "mobile phone", which is pronounced "'''moba'''iru '''fo'''o'''n'''" in Japanese.
  ** This is the only "Morphtronic" monster whose name is regionally-based; "Celfon" refers to the North American term "cell phone" (short for "cellular phone"), whereas such devices are called "mobile phones" in Commonwealth English.
  * Like the other "Morphtronic" monsters, "Celfon" resembles a Transformer. In this case, [[wikia:c:transformers:Speed Dial 800|Speed Dial 800]].
  * The numbers 1-6 on this monster's body are all together, while the rest (7-9) are separate; this is a reference to this card's effect using a 6-sided [[dice]].
  * Despite the fact that this card's first effect can Special Summon a [[Level]] 4 or lower "Morphtronic" monster (ignoring its Summoning conditions), at the time of its release (2008), there were no Level 5 or higher "Morphtronic" monsters, nor any "Morphtronic" monsters with Summoning conditions that could be ignored.
  ** In 2014 (6 years later), "[[Morphtronic Smartfon]]" was released, a "Morphtronic" monster with a Summoning condition that could be ignored by "Celfon's" effect.
  ** In 2022 (14 years later), "[[Morphtronic Scannen]]" was released, the first "Morphtronic" monster to be Level 5 or higher (being a Level 6 monster).
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster [[activate]]d its effect, the dials on its body lit up, and the yellow light went from number to number.
  ** When this monster was [[Normal Summon]]ed, it appeared in its cell phone form before transforming into a bot-like appearance.
