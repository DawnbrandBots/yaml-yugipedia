title: Card Trivia:Infestation Infection
wikitext: |-
  {{Navigation}}

  * This card's artwork shows a dead or dying "[[Steelswarm Cell]]" releasing "[[Steelswarm Origin]]" that turns monsters into "[[lswarm]]" monsters.
  ** This is consistent with how real viruses reproduce - by attacking cells of the host organism and using their nuclei to duplicate their DNA strains.
