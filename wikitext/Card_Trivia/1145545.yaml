title: Card Trivia:Darklord Djehuty
wikitext: |-
  {{Navigation}}

  * "[[Forbidden Scripture]]" appears in this card’s artwork.
  * This monster's name is the derived from the Egyptian name of [[wikipedia:Thoth|Thoth]], the [[wikipedia:Ancient Egyptian deities|ancient Egyptian deity]] of knowledge, wisdom, magic, and the Moon, who is heavily associated with esoteric magic and [[wikipedia:Alchemy|alchemy]].
