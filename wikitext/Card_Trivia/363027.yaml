title: Card Trivia:Magician's Robe
wikitext: |-
  {{Navigation}}

  * This monster is based on the robe worn by "[[Dark Magician]]".
  * This monster's pose is based on the 2nd ''[[OCG]]''/1st ''[[TCG]]'' artwork of "Dark Magician".
  * This card's Spanish print in ''[[The Dark Illusion]]'' features a small typo, as it shows the word "''field''" with no capital letter (which contradicts the way it's typically printed on that ''TCG'' branch).
