title: Card Trivia:Combined Maneuver - Engage Zero!
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legendary Modern Decks 2026]]'' and ''[[Nature Pack: Courageous Zoodiacs]]''.
  * "[[Sky Striker Ace - Raye]]", "[[Sky Striker Ace - Roze]]", and a transformed version of "[[Sky Striker Mecha - Adhilsaber]]" appear in this card's artwork.
  * This monster's name and design are based on a scene in {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|18|ref}}, where [[Raye (manga)|Raye]] and [[Roze (manga)|Roze]] destroy [[Surgical Striker - S.P.E.C.T.R.A.|S.P.E.C.T.R.A.]] with a combined attack.
  ** This is reflected by the [[activation condition]] of this monster's second effect, which requires "Sky Striker Ace - Raye" and "Sky Striker Ace - Roze" to be in the player's [[Graveyard]] to [[destroy]] the opponent's monsters.
  * This monster is a counterpart of "[[Sky Striker Ace = Zero]]".
  ** Both monsters are LIGHT LINK-2 "Sky Striker Ace" monsters that cannot be used as Link Material and are the only LINK-2 "Sky Striker Ace" monsters that can be Special Summoned by the effect of "Sky Striker Ace - Raye" and/or "[[Sky Striker Mobilize - Linkage!]]".
  ** Both monsters have an effect that interacts with both "Sky Striker Ace - Raye" and "Sky Striker Ace - Roze", with this monster having an effect to destroy all monsters the opponent controls when it declares an attack if both are in the Graveyard and "Sky Striker Ace = Zero" having an effect that Special Summons both from Deck and/or Graveyard by Tributing itself as cost.
  ** Both monsters represent an "ultimate" maneuver unique to Raye and Roze in their respective versions of the Sky Striker storyline, with this monster representing their final attack against S.P.E.C.T.R.A. and "Sky Striker Ace = Zero" representing a fusion of Raye and Roze.
