title: Card Trivia:Neo Space Pathfinder
wikitext: |-
  {{Navigation}}

  * "[[Neo Space]]" appears in the background of this card's artwork, seemingly depicted as a [[wikipedia:Hoag's Object|Hoag's Object]].
  * This monster resembles a female version of "[[Elemental HERO Neos]]".
  * Visually, "[[Neo Space Connector]]" appears to be a younger version of this monster.
  ** Both cards share the same [[Attribute]] ([[LIGHT]]), [[Level]] (4), [[Type]] ([[Warrior]]) and inversed [[original ATK and DEF]] (1800/800).
  ** Both cards feature a depiction of "Neos Space" as a Hoag's Object in their respective artworks, albeit in different size.
  * This is the only [[Field Searcher]] card that can retrieve its corresponding [[Field Spell Card]] from the [[Graveyard]].
  ** It is also the only Field Searcher card that does not either have 2100 [[ATK]] on its own or have 2100 ATK when its corresponding Field Spell is on the field.
