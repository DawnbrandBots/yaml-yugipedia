title: Card Trivia:Alchemic Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Xyz Tribalrivals]]", "[[Arrivalrivals]]", "[[Staring Contest]]", and "[[Get Out!]]".
  * According to the [[Master Guide 4 promotional cards|Master Guide 4]] monster stories,<ref>[http://www.ygorganization.com/monsterstories/ YGOrganization] - [OCG] Master Guide 4 - Monster Stories</ref> "Alchemic Magician" is the rival and best-friend of "[[Slacker Magician]]". Both are well-known potion masters who studied together and now run a potion shop. However, due to her introverted personality, "Slacker Magician" stopped working, staying at her house all day long. After the incessant attempts of "Alchemic Magician" to cheer her up, she returned to business, while also creating the popular potion "[[Stim-Pack]]".

