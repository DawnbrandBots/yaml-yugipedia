title: Card Trivia:Firestorms Over Atlantis
wikitext: |-
  {{Navigation}}

  [[File:Garunix vs Poseidra Chronicles.png|thumb|300px|"[[Fire King High Avatar Garunix]]" and "[[Poseidra, the Atlantean Dragon]]" in ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]''.]]

  * "[[Garunix Eternity, Hyang of the Fire Kings]]" and "[[Poseidra Abyss, the Atlantean Dragon Lord]]" appear in this card's artwork.
  ** The bracelet from the artwork of "[[Abyss-squall]]" and the bracelet from the artwork of "[[Fire King Sanctuary]]" also appear in this card's artwork.
  ** This card's artwork mimics the events depicted in the artwork of "[[High Tide on Fire Island]]".
  *** It is also based on a shot from ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'', depicting "[[Fire King High Avatar Garunix]]" and "[[Poseidra, the Atlantean Dragon]]" battling each other.

