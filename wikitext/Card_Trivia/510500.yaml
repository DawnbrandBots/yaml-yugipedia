title: Card Trivia:Level Tax
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Either "[[Skull Archfiend of Lightning]]" or "[[Summoned Skull]]" appears in this card's artwork.
  * In the Next-Episode Preview for [[Yu-Gi-Oh! GX - Episode 132|GX episode 132]], at the end of [[Yu-Gi-Oh! GX - Episode 131|episode 131]], this card is shown to be a Trap Card; upon the episode's airing the next week, it was revised to be a Spell Card.
