title: Card Trivia:Angelica's Angelic Ring
wikitext: |-
  {{Navigation}}

  * "[[Angelica, Princess of Noble Arms]]" appears in this card's artwork.
  ** This card's Japanese name, "Angering" (''Enjeringu''), is a portmanteau of "Angelica", "angel" and "ring".
  * This card's design is based on "[[Malevolent Nuzzler]]".
  ** Both depict a female humanoid in the same exact pose, facing the left side downward while showing off rings worn on their fingers.
  ** Both have an effect centered around 500 [[Life Point]]s: this card to gain that much before destroying it, while "Malevolent Nuzzler" to pay that much after it is sent to the [[Graveyard]].
  * This card's effect is based on the magic ring worn by Angelica in the epic poem ''Orlando Furioso'' ("The Frenzy of Orlando"), which has the ability to render all magic ineffective when placed on the finger, and to erase its own form when put inside the mouth.
