title: Card Trivia:Perfect Machine King
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[E.M.R.]]" and "[[Roll Out!]]".
  * "[[Heavy Mech Support Platform]]" (and by extension "[[Heavy Mech Support Armor]]") appears to be a support unit for "Perfect Machine King".
  ** The artwork of "Roll Out!" depicts "Heavy Mech Support Platform" being [[equip]]ped to this monster to give it cannons and either a new pair of legs or legs that support the equipment.
  ** "Heavy Mech Support Platform" shares common design elements with this monster and supplements its vulnerability to being destroyed. They were also released in the same [[Core Booster]] [[Booster pack|pack]] ''[[Rise of Destiny]]'' and have adjacent numbers.
  * "[[Machine King - 3000 B.C.]]" → "[[Machine King Prototype]]" → "[[Machine King]]" → "Perfect Machine King"
  ** This monster is the fourth and final evolution of "Machine King - 3000 B.C.". Fittingly, the number "04" can be seen on its left shoulder in this card's artwork.
  ** This monster's combined [[ATK]]/[[DEF]] (4200) are equal to the combined ATK/DEF of "Machine King".
  * This monster's pose in its card artwork is similar to the ending sequence of [[wikipedia:The King of Braves GaoGaiGar|GaoGaiGar]]'s Final Fusion, from ''The King of Braves GaoGaiGar''.
  ** This monster's appearance also resembles the ''Personal Trooper'' mech named ''"Alteisen"'' or ''"Gespenst Mk-III"'', from ''[[wikipedia:Super Robot Wars|Super Robot Wars]]''.
  * The maximum ATK this monster can gain from its own effect is 5500, which requires every [[Main Monster Zone]] and both [[Extra Monster Zone]]s to have a [[Machine]] monster.
  * In the [[Virtual World (arc)|Virtual World arc]] of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card was the first [[Deck Master]] to replace another Deck Master: [[Nezbitt]] fuses his "[[Robotic Knight (anime)|Robotic Knight]]" (which he took the form of) with "[[Machine King (anime)|Machine King]]" (who "Robotic Knight" serves, according to its [[flavor text]]) to [[Fusion Summon]] [[Perfect Machine King (anime)|this monster]].
  ** This monster's number "04" on its left shoulder may reflect the fact that Nezbitt was the fourth member of [[The Big Five]] to Duel in the ''Yu-Gi-Oh!'' anime.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is based on a [[:File:PerfectMachineKing-JP-Anime-DM-NC-3.png|scene]] from {{episode|Yu-Gi-Oh!|107|ref}}, where Nezbitt first Summoned this monster.
  ** Unlike in the anime, this card's ''OCG''/''TCG'' artwork depicts the full body of this monster.
