title: Card Trivia:Tenacity of the Monarchs
wikitext: |-
  {{Navigation}}

  * "[[Caius the Shadow Monarch]]" appears in this card's artwork.
  * Judging from the artwork, there is a possibility that "Caius" was stranded in the "[[Labyrinth of Nightmare (card)|Labyrinth of Nightmare]]", explaining how he's found himself surrounded and possessed by the spirits that gave him the power to evolve into "[[Caius the Mega Monarch]]".
