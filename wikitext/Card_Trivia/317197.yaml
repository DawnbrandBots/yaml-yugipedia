title: Card Trivia:Fluffal Owl
wikitext: |-
  {{Navigation}}

  * This was the first [[Monster Card|monster]] in the ''[[OCG]]''/''[[TCG]]'' that could [[Fusion Summon]] a [[Fusion Monster]] using its own effect; preceding it, only the effect of the anime-exclusive "[[Dyna Base]]" could do so.
  * This monster appears in the artwork of "[[Fluffal Crane]]".
  ** Its severed head appears in the artwork of "[[Frightfur Patchwork]]", sewn together with parts from various other "[[Fluffal]]" monsters.
