title: Card Trivia:Ancient Warriors - Valiant Zhang De
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ancient Warriors Saga - Three Visits]]" and "[[Ancient Warriors Saga - Defense of Changban]]".
  * This monster is based on [[wikipedia:Zhang Fei|Zhang Fei]] ([[wikipedia:Courtesy name|courtesy name]]: '''Yide'''), from the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', one of [[wikipedia:Liu Bei|Liu Bei]]'s [[wikipedia:Oath of the Peach Garden|sworn brothers]] and one of his "Tiger Generals", he was known for his might as a warrior and was regarded as one of the mightiest of his time, known for exploits of courage and valor he was also known for his impulsive and reckless behaviour. He was said to sport a "Serpent Spear" (whose head was shaped like a snake) which is also held by this monster.
  ** Additionally, this monster has a [[wikipedia:White Tiger (mythology)|White Tiger]] motif, a creature both [[wikipedia:White Tiger (mythology)|said]] to "only appear when the emperor ruled with absolute virtue" (which would refer to Liu Bei in this case) and to be associated with the West (which would be the [[wikipedia:Shu Han|Shu]] Kingdom Liu Bei ruled on).
