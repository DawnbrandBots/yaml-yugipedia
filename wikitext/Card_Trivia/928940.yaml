title: Card Trivia:Tailwind of Gusto
wikitext: |-
  {{Navigation}}

  * "[[Reeze, Whirlwind of Gusto]]" appears in this card's artwork, seemingly in the process of transforming into "[[Daigusto Sphreez]]".
  * This card's second bulleted effect likely references the [[Duel Terminal Master Guide card storylines#The Main Forces of Each Tribe Work with the "Vylon"|Duel Terminal storyline]], in which "Reeze", a [[Level 5]] monster, [[equip]]s itself with "[[Vylon Sphere]]", a [[Level 1]] [[Tuner monster]], to become "Daigusto Sphreez".
  ** As this card is an [[Equip Spell Card]], it is a valid target for "Sphere", further enforcing the connection.
