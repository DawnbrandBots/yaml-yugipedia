title: Card Trivia:Mad Lobster
wikitext: |-
  {{Navigation}}

  * This card is one of the few cards to have its artwork changed permanently in its later printings (in both the ''[[OCG]]''/''[[TCG]]'').
  * Despite this card's ''TCG'' [[flavor text]] mentioning the [[Dark World]], the original Japanese text makes no such mention. It instead says this monster is renowned all over the world.
  ** This creates an interesting parallel with "[[Terrorking Salmon]]", whose original Japanese text says it is a delicacy in the Dark World, while its English text translates it as the World of Darkness.
