title: Card Trivia:Clear Vice Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Clear Sacrifice]]".
  * This monster's effect is a more powerful version of that of "[[Honest]]".
  ** Fittingly, this monster is used by [[Yusuke Fujiwara]], where [[Honest (character)|Honest]] served as his [[Spirit Partner]] until Yusuke abandoned him in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This is the [[signature card]] of Yusuke Fujiwara after he was possessed by [[Nightshroud]].
