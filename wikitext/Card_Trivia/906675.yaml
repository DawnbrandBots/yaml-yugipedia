title: Card Trivia:Draco the Tiny
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Auguste Dragon's Counterattack]]", "[[Daor of Dragon]]", "[[Dragonic Stitch]]", "[[Rolling x Rolling]]", and "[[Vengeful Dragon's Counterattack]]".
  ** A chibi version of this monster appears in the artworks of "[[7 Chance]]" and "[[Triple Seven]]".
  * This monster has 2 [[counterpart]]s: 
  ** A plushie counterpart: "[[Draco the Hand-Sewn]]".
  ** [[The]] Counterpart: "[[The Draco]]".
