title: Card Trivia:Gameciel, the Sea Turtle Kaiju
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Interrupted Kaiju Slumber]]" and "[[Kaiju Capture Mission]]".
  * This monster is based on [[wikipedia:Gamera|Gamera]], a giant sea turtle ''[[wikipedia:kaiju|kaiju]]'' whose franchise was created to compete with the ''[[wikipedia:Godzilla (franchise)|Godzilla]]'' franchise.
  * This monster can be seen as the rival of "[[Jizukiru, the Star Destroying Kaiju]]".
  ** Both are based on rival monsters in ''kaiju'' films produced by [[wikipedia:Kadokawa Corporation|Kadokawa]].
  ** Both feature effects that [[negate]]s the [[activate|activation]] of a card effect; however, this monster can [[banish]] the card that triggered the effect at the cost of two [[Kaiju Counter]]s, while "Jizukiru" [[destroy]]s any card on the [[field]] at the cost of three Kaiju Counters.
