title: Card Trivia:Red Gardna
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect, which requires the player to [[control]] a "[[Red Dragon Archfiend (archetype)|Red Dragon Archfiend]]" monster and prevents the player's monsters from being [[destroy]]ed by the opponent's card effects, is an alteration of its effect in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, which simply protects the player's monsters from being destroyed by the opponent's card effects. In {{episode|ARC-V|093|ref}}, this monster's effect was [[activate]]d while [[Jack Atlas (ARC-V)|Jack Atlas]] controlled "[[Scarlight Red Dragon Archfiend (anime)|Scarlight Red Dragon Archfiend]]".
