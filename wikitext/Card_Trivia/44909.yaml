title: Card Trivia:Jurassic World
wikitext: |-
  {{Navigation}}

  * The landscape depicted in this card appears in the artworks of "[[Destroyersaurus]]", "[[Dinosaur Crush]]", "[[Extinction on Schedule]]", and in the anime artwork of "[[Sauropod Brachion (anime)|Sauropod Brachion]]".
  ** This card's artwork appears as a backdrop in the artwork of "[[Extraceratops]]".
  * This card has a [[Skill Card]] [[counterpart]]: "[[Dinosaur Kingdom]]".
  * This card has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[Dinokit]] counterpart: "[[Plassic World]]".
  * This card's artwork is part of a storyline depicting one of the theories about the extinction of dinosaurs in the real world, specifically an extreme climate change caused by atmosphere pollution caused by multiple volcanic eruptions caused by seismic shifts.
  ** "Jurassic World" → "[[Seismic Shockwave]]" → "[[Volcanic Eruption]]" → "[[Survival Instinct]]" → "[[Survival of the Fittest]]" → "[[Survival's End]]".
  * This card was the first [[Field Spell]] to solely [[support]] [[Dinosaur]] monsters, and the second to support them in general after "[[Wasteland]]". Coincidentally, the 2015 film, ''[[wikipedia:Jurassic World|Jurassic World]]'', which was released years later as the first of the second trilogy of the ''[[wikipedia:Jurassic Park (franchise)|Jurassic Park]]'' franchise, shares the same name with this card.
