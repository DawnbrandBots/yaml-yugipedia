title: Card Trivia:Scattered Solitude
wikitext: |-
  {{Navigation|mode=nongame}}

  * The outer "[[Sevens Road]]" crest appears in this card's artwork.
  * This card is an homage to "[[Diffusion Wave-Motion]]", a card used by [[Yami Yugi]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** In {{episode|SEVENS|067|ref}}, this card was used with "[[Sevens Paladin (anime)|Sevens Paladin]]", similar to how "[[Diffusion Wave-Motion (anime)|Diffusion Wave-Motion]]" was used with "[[Dark Paladin (anime)|Dark Paladin]]" in {{episode|Yu-Gi-Oh!|134|ref}}.
