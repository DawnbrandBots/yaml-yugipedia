title: Card Trivia:Rocket Medic
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rocket Salvation]]".
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Rocket Warrior]]".
  ** This monster's Japanese name (衛星兵, ''Eiseihei'') is a portmanteau of "combat medic" (衛生兵, ''Eiseihei''), "satellite" (衛星, ''Eisei''), and "trooper" (兵, ''Hei'').
