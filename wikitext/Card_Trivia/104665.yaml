title: Card Trivia:Lightforce Sword
wikitext: |-
  {{Navigation}}

  * This card is a counterpart to "[[Spirit Sword of Sealing]]".
  * This card's Japanese name is similar to that of "[[Swords of Revealing Light]]".
  * In most modern ''Yu-Gi-Oh!'' video games for the Nintendo DS and the PSP, the icon used for a card that is banished and eventually returns to the hand (such as by "[[Gold Sarcophagus]]") use an icon of a card impaled by a sword, directly referencing this card.
