title: Card Trivia:Memories of Hope
wikitext: |-
  {{Navigation}}

  * The circular formation of the "[[Number]]s'" numeric digits appears in this card's artwork.
  ** Additionally, several cards, possibly the "Numbers", appear in this card's artwork.
  *** This card's name is a reference to the "Number" cards being part of [[Astral]]'s '''memories''', as well as the Japanese name for the "[[Utopia (archetype)|Utopia]]" monsters: "'''Hope'''". Coincidentally, "[[Number 39: Utopia]]" was the only "Number" which remained in Astral's possession after he was released.
