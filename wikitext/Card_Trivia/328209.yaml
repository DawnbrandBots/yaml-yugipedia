title: Card Trivia:Gem-Knight Lady Brilliant Diamond
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Diamond (gemstone)|diamond]], a precious stone consisting of a clear and colorless crystalline form of pure [[Wikipedia:Carbon|carbon]].
  ** This monster's name is also based on a [[wikipedia:Brilliant (diamond cut)|brilliant cut]] of diamond, which involves cutting and polishing diamonds so they would have 57 or 58 [[Wikipedia:Facet|facets]], a cone-shaped underside, and a high level of sparkle and brilliance. Fittingly, in {{episode|ARC-V|29|ref}}, this monster was [[Fusion Summon]]ed with "[[Brilliant Fusion (anime)|Brilliant Fusion]]".
  * This monster is the female [[counterpart]] of "[[Gem-Knight Master Diamond]]".
  * This monster has a [[Card evolutions|downgraded]] form: "[[Gem-Knight Lady Rose Diamond]]".
  * This monster has the highest [[Level]] (10) and [[original ATK]] (3400) of all "[[Gem-Knight]]" monsters.
