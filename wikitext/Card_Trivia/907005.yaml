title: Card Trivia:Overlay Network (card)
wikitext: |-
  {{Navigation}}

  [[File:NumberOverlayNetwork.png|thumb|right|250|The galaxy-style [[Overlay Network]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * The galaxy-style [[Overlay Network]] used for the [[Xyz Summon]] of "[[Number]]" monsters in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and generic [[Xyz Monster]]s in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, as well as two [[Overlay Unit]]s (1 [[LIGHT]] and 1 [[DARK]]), appear in this card's artwork.
  ** This card's artwork likely references the first [[Xyz Summon]]ing of "[[Number 39: Utopia (anime)|Number 39: Utopia]]" in {{episode|ZEXAL|002|ref}}, which was performed by using "[[Ganbara Knight (anime)|Ganbara Knight]]" (LIGHT) and "[[Gagaga Magician (anime)|Gagaga Magician]]" (DARK) as Overlay Units.

