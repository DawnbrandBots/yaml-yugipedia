title: Card Trivia:Tessera the Primal Squire
wikitext: |-
  {{Navigation}}

  * The monster's Japanese name 源帝従騎テセラ (''Genteijuki Tesera'') uses the character [[Wiktionary:源|源]] (Gen) meaning source seen in both "[[The First Monarch]]" (始源の帝王 ''Shigen no Teiō'') and "[[The Prime Monarch]]" (真源の帝王, ''Shingen no Teiō''). Thus, the card names can be translated literally as: ''"Tessera the Source-Squire", "The Emperor of First-Source" and "The Emperor of True-Source"''. This places Tessera under both [[Erebus the Underworld Monarch]] and [[Ehther the Heavenly Monarch]].

  * The monster shares a resemblance with the similarly [[Level]] 1 and [[LIGHT|Light]] [[Attribute]] [[Vassal#Squire|Squire]]; "[[Edea the Heavenly Squire]]".
