  * "[[Elemental HERO Neos (Rush Duel)|Elemental HERO Neos]]" and "[[Skyscraper (Rush Duel)|Skyscraper]]" appear in this card's artwork.
  ** The pose assumed by "Elemental HERO Neos" on top of "Skyscraper" references a similar pose assumed by "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" when "[[Skyscraper (anime)|Skyscraper]]" is first [[activate]]d in the ''[[Yu-Gi-Oh! GX]]'' anime.
