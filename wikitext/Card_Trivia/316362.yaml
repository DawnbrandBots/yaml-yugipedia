title: Card Trivia:Ice Coffin Token
wikitext: |-
  {{Navigation}}

  * "Ice Coffin Token" appears to be the fixture from "[[Royal Knight of the Ice Barrier]]'s" shoulder.
  * The name "Ice '''Coffin'''" may come from the expression "last nail in the coffin;" the idea that it embodies the final step towards a goal. Given that this appears to be an obstruction-type token that can be [[Destroyed by battle]] with "Royal Knight of the Ice Barrier" to inflict extra [[Battle damage]] helps to support that interpretation.
  ** Also, since this monster's only official artwork bares no resemblance to a coffin reinforces the notion that the name is meant to be metaphorical.
