title: Card Trivia:Winged Kuriboh LV9
wikitext: |-
  {{Navigation}}

  * This monster's armor resembles that of "[[Breaker the Magical Warrior]]".
  * This monster is an [[Card evolutions|upgraded]] "[[LV]]" form of "[[Winged Kuriboh]]".
  * This is the first and currently only [[Level 9]] "LV" monster.
  * This monster's [[attack name]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, "Berserker Crush", is also the name of the [[Quick-Play Spell Card]], "[[Berserker Crush]]", which is designed to [[support]] "Winged Kuriboh".
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|GX|021|ref}} showing [[Winged Kuriboh LV9 (manga)|this monster]] being Summoned.
