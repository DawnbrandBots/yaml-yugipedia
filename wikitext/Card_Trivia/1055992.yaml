title: Card Trivia:Ragnaraika Skeletal Soldier
wikitext: |-
  {{Navigation}}

  * This monster's sword appears in the artwork of "[[Ragnaraika Bloom]]".
  ** This monster is likely an upgraded form of "[[Ragnaraika the Evil Seed]]", based on how its sword is depicted being held by an "Evil Seed" in the artwork of "Ragnaraika Bloom".
  * This monster's Japanese name ({{Ruby|蕾禍|ライカ}}ノ{{Ruby|武者髑髏|ムシャドクロ}}, ''Raika no Musha Dokuro'') is a portmanteau of「武者」(''musha'', lit. "warrior") and 「餓者髑髏」(''[[wikipedia:Gashadokuro|gashadokuro]]'', a skeletal monster from Japanese folklore).
