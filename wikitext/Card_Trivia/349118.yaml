title: Card Trivia:Igknight Paladin
wikitext: |-
  {{Navigation}}

  * This card's name is derived from the [[wikipedia:Musket|musket]], a muzzle-loaded, smoothbore firearm that was later replaced by the [[wikipedia:Rifle|rifle]].
  * This card's flavor text might be attribute to the fact that muskets, especially matchlock and flintlock muskets take longer time to ignite than later firearms that uses cartridges.
  * This monster appears in the artwork of "[[Ignition Phoenix]]" and "[[Bad Aim]]".
