title: Card Trivia:Ryko, Lightsworn Hunter
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Edition Volume 2]]''.
  * This monster appears in the artworks of "[[Charge of the Light Brigade]]", "[[Dark Smog]]", "[[Dark World Brainwashing]]", "[[Gagagarush]]", and "[[Mano a Mano]]".
  * This monster's name is derived from "''raikō''" (雷光), the Japanese word for "lightning", which reflects the lightning bolt accents in its design.
  * This monster is based on the [[wikipedia:Akita (dog breed)|Akita Inu]], a large Japanese breed of dog, whose ancestors were used for hunting.
  * This monster has a [[DARK]] [[counterpart]]: "[[Ryko, Twilightsworn Fighter]]".
  ** The artwork of "Dark Smog" depicts the transformation of this monster to "Ryko, Twilightsworn Fighter".
  * According to the lore of the "[[Lightsworn]]s", this monster is the pet dog of "[[Jain, Lightsworn Paladin]]". <ref>[http://www.ygorganization.com/geargia-lightsworn-lore/ YGOrganization] - [OCG] Lore on the Geargias and Lightsworn!</ref>

