title: Card Trivia:Red Dragon Ninja
wikitext: |-
  {{Navigation}}

  * This card is the "[[Dragon Ninja]]" counterpart of "[[Crimson Ninja]]". Interestingly, that monster cannot be used with "[[Ninjitsu Art of Transformation]]" to Summon this card unless its Level is increased by another effect.
  * "[[Blue Dragon Ninja]]" is a [[WATER]] monster that was released in the set before [[Abyss Rising]], which is centered around [[WATER]] monsters. "Red Dragon Ninja" is a monster released the set before [[Cosmo Blazer]], which is centered on [[FIRE]] monsters.
