title: Card Trivia:The Six Samurai - Yariza
wikitext: |-
  {{Navigation}}

  * This monster appears on the artwork of "[[Backs to the Wall]]", "[[Double-Edged Sword Technique]]", "[[Return of the Six Samurai]]", and "[[Six Samurai United]]".
  ** This monster's armor also appears in the artwork of "[[Swiftstrike Armor]]".
  * This monster is likely based on [[wikipedia:Maeda Toshiie|Maeda Toshiie]], also known as Matazaemon, a general of [[wikipedia:Oda Nobunaga|Oda Nobunaga]] during the [[wikipedia:Sengoku period|Sengoku period]], known for using a ''[[wikipedia:Yari|yari]]'' (a Japanese spear) as his preferred weapon and being known under the nickname "'''Yari''' no Mata'''za'''" (槍の又左).
  ** Fittingly, this monster is holding a ''yari'', which appears to be attached to its armor with a cable.
  * This monster's armor is similar to that of "[[Kagemusha of the Six Samurai]]". Both also appear to wield the same weapon.
