title: Card Trivia:Diabolic King Beetle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Intruding Beetles]]".
  * This monster is related to "[[Atlas Combat Beetle]]" and "[[Mulliness Power Beetle]]".
  * This monster has a cocoon [[counterpart]]: "[[Cocoon King Beetle]]".
  * Because サターン (Saturn) is similar in spelling to サタン (Satan) in Japanese, it's very likely this card's English name was the result of a mistranslation that was then censored to tone down connotations to Satanism, albeit with a word that still maintains a similar meaning: ('''Saturn''' King Beetle → '''Satan''' King Beetle → '''Diabolic''' King Beetle).
