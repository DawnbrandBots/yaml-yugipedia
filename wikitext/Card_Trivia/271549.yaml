title: Card Trivia:Vampire Takeover
wikitext: |-
  {{Navigation}}

  * "[[Vampire Sorcerer]]" and part of the buildings and the castle of "[[Vampire Kingdom]]" appear in this card's artwork.
  ** This card's artwork depicts "Vampire Sorcerer" transforming a modern city into the "Vampire Kingdom", most likely under the magic of the [[wikipedia:planetshine|planetshine]], reflecting its effect to [[activate]] the aforementioned [[Field Spell Card]] from the [[Deck]].
