title: Card Trivia:Earthbound Servant Geo Gryphon
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Griffin|gryphon]], a legendary creature who is depicted with the body of a lion, and the head, wings, and talons of an eagle.
  * This monster's name is a pun on "[[wikipedia:Geoglyph|geoglyph]]", a large design or motif formed by removing rocks and earth from the ground surface to create a "negative image" design similar to a [[wikipedia:Petroglyph|petroglyph]].
  ** The [[Earthbound Servant]] [[series]] is based on the "[[Earthbound Immortal]]" [[archetype]], which consists of monsters corresponding with the [[Nazca Lines]] geoglyphs.
