title: Card Trivia:Looking into the Future
wikitext: |-
  {{Navigation}}

  * This card's name reflects its effect, which is intended to facilitate the effect of "[[Destiny HERO - Diamond Dude]]", which can [[excavate]] and [[send]] a [[Spell Card]]. During the player's next turn, they can use the effect of "Diamond Dude" to [[activate]] the sent Spell Card's effect from the Graveyard, thereby sending that Spell into the "future" and bypassing the [[cost]] it may have.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, [[Aster Phoenix]] makes prominent use of the above-mentioned monster, in particular excavating "[[Destiny Draw]]" and thereby using its effect to [[draw]] two cards during his next turn without having to [[discard]] a "[[Destiny HERO]]" monster for cost.
