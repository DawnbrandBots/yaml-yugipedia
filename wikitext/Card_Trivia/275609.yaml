title: Card Trivia:Traptrix Atrax
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Atrax|Australian funnel-web spider]], that grabs anything that falls on its tubular web.
  * This monster appears in the artwork of "[[Traptrix Trap Hole Nightmare]]" and "[[Traptrix Rafflesia]]".
  ** Judging by the artwork of "Traptrix Trap Hole Nightmare", this monster's true form or her pet is a trapdoor spider.
