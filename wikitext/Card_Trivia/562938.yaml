title: Card Trivia:Abyss Playhouse - Fantastic Theater
wikitext: |-
  {{Navigation}}

  * "[[Abyss Actor - Curtain Raiser]]", "[[Abyss Actor - Evil Heel]]", "[[Abyss Actor - Extras]]", "[[Abyss Actor - Funky Comedian]]", "[[Abyss Actor - Leading Lady]]", "[[Abyss Actor - Sassy Rookie]]", and "[[Abyss Actor - Twinkle Little Star]]" appear in this card's artwork.
  ** A statue depicting the upper half of "[[Abyss Actor - Superstar]]" also appears in this card's artwork.
  *** The statue's pose is modeled after the pose stricken by [[Sylvio Sawatari]] (the user of the "[[Abyss Actor]]" [[Deck]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime) in the beginning of {{episode|ARC-V|007|ref}} when Sylvio's friends are praising him.
  ** "[[Abyss Actor - Mellow Madonna]]" and "[[Abyss Actor - Wild Hope]]" are depicted on the signboard being posted up by "Evil Heel" and "Funky Comedian".
