title: Card Trivia:Sasuke Samurai 4
wikitext: |-
  {{Navigation|Sasuke Samurai #4}}

  * Despite this card's Japanese name, "One-Hit Certain Kill Samurai", this card's effect is luck-based and ''not'' certain at all.
  * This is the only card that features "#4" in the ''[[TCG]]''.
  * This card is the only "[[Sasuke Samurai (series)|Sasuke Samurai]]" monster to wield a weapon other than a sword.
