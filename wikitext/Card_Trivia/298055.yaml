title: Card Trivia:Card of Endurance
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name, "Treasure Card of Masochism", is based on [[wikipedia:Sadomasochism|the term]] for a person taking sexual gratification from physical or verbal abuse and/or humiliation. This is reflected in this card's effect, which can benefit the player by willingly inflicting even more damage to themselves.
