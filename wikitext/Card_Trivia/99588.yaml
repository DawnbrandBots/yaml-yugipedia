title: Card Trivia:Divine Sword - Phoenix Blade
wikitext: |-
  {{Navigation}}

  * This sword appears in the artwork of "[[Valkyrian Knight]]".
  ** It is also featured in the monster sprite for "[[Freed the Matchless General]]", which debuted in ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'' and was used in later video games.
  * The hilt of this sword is based on "[[Sacred Phoenix of Nephthys]]".
  * This is the first [[Spell Card]] to have an [[Ignition-like Effect]] that [[activate]]s in the [[Graveyard]].
