title: Card Trivia:Bujingi Crane
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Ama-no-Habakiri|Ame-no-Habakiri]] (Slash of Heavenly Wings), the legendary sword used by the Shinto god Susanoo, with many different names including Totsuka no Tsurugi (Ten-hands Long Sword), Ame no Ohabari (Tail-feathers of Heaven) and Worochi no Aramasa. As evident from the names, they are often associated with birds in some way, so it makes sense that the card itself would feature a bird-like monster. The sword was held by Susanoo at the time of his banishment from the heavens. It would later be used by Susanoo to defeat Orochi the 8 headed snake, cutting off each of its 8 heads and tails. In the 4th tail he discovered the [[Bujin Relic - Murakumo|Ame no Murakumo no Tsurugi]].
  * This card's pose in its card artwork is identical to the pose of "[[Rallis the Star Bird]]" in its card artwork.
  * This monster appears in its armament form in "[[Bujincarnation]]", "[[Bujinfidel]]" and "[[Bujintei Susanowo]]".
