title: Card Trivia:Ojama Country
wikitext: |-
  {{Navigation}}

  * "[[Ojama Blue]]", "[[Ojama Black]]", "[[Ojama Green]]", "[[Ojama Red]]", and "[[Ojama Yellow]]" appear in this card's artwork.
  ** Six other unidentified "[[Ojama]]s" also appear in this card's artwork; based on the artwork of "[[Solidarity]]", it is assumed five of them have died.
  * This country bears a slight resemblance to "[[Secret Village of the Spellcasters]]".
  * The Spanish print of this card has the word "enviar" instead of "mandar" in its effect, which is the official term in that language for "[[send]]".
  * In ''[[Yu-Gi-Oh! 5D's Tag Force 6]]'', this card's area background depicts no "Ojama" figures, except for the unknown grey "Ojama" and "Ojama Blue", which can be seen on the very top of the area.
