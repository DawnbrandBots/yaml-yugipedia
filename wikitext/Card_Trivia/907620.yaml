title: Card Trivia:Noh-P.U.N.K. Foxy Tune
wikitext: |-
  {{Navigation}}

  * This monster is "[[Noh-P.U.N.K. Ze Amin]]" wearing different clothing.
  * This card is named after [[wikipedia:Noh|Noh]], a major form of classical Japanese dance-drama that has been performed since the 14th century.
  * This monster is based on ''Fishing Fox'', a ''[[wikipedia:Kyōgen|kyōgen]]'' play.
