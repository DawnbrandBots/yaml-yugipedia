title: Card Trivia:Exosister Asophiel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Exosister Carpedivem]]".
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Exosister Sophia]]".
  ** This card's name, "Asophiel", is a combination of either "[[wikipedia:Azrael|Azrael]]" or "[[wikipedia:Israfil|Israfil]]" and "Sophia".
