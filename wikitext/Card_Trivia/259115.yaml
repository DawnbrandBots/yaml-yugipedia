title: Card Trivia:Harpie Channeler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Harpie's Pet Phantasmal Dragon]]", "[[Hysteric Sign]]", "[[Alluring Mirror Split]]", and "[[Harpie's Feather Rest]]".
  * The [[original ATK and DEF]] of this card are the inverse of the original ATK and DEF of the original "[[Harpie Lady]]" and "Harpie Ladies [[Harpie Lady 1|1]], [[Harpie Lady 2|2]], and [[Harpie Lady 3|3]]".
  * The chain in her hand is a reference to her Dragon-related effect.
