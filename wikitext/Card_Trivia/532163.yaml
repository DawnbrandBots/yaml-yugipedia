title: Card Trivia:Parthian Shot
wikitext: |-
  {{Navigation}}

  * "[[Subterror Behemoth Fiendess]]" and "[[Subterror Nemesis Archer]]" appear in this card's artwork.
  ** This may also change the overall lore for "Subterrors", since this card's artwork implies that "[[Subterror Fiendess]]" is fighting with the "Subterror Nemesis" monsters to defeat the "[[Subterror Behemoth]]s", despite being one herself.
  *** This may be related to the fact that, like the "Subterror Nemesis" monsters, and unlike all other "Subterror Behemoth" monsters, "Subterror Behemoth Fiendess" is not a [[Flip Monster]], as it is a [[Link Monster]] and therefore cannot [[flip]]. 
  * This card is a reference to the [[wikipedia:Parthian shot|Parthian shot]], a light horse hit and run military tactic made famous by the Parthians, an ancient Iranian civilization.
