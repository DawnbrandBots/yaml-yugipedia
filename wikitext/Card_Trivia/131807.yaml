title: Card Trivia:Grizzly, the Red Star Beast
wikitext: |-
  {{Navigation}}

  * This monster is based on the bear appearing on the [[wikipedia:Flag of California|flag of California]] where the 2010 World Championship was held.
  ** This card's artwork depicts this monster standing on a field of grass with a red star in the sky, which are featured on the flag of California.
  * This card and "[[Stardust Divinity]]" are the first two and currently only [[Synchro Monster]]s to be [[Yu-Gi-Oh! World Championship prize cards|''Yu-Gi-Oh! World Championship'' prize cards]], as well as the only two [[illegal]] Synchro Monsters.
  * A copy of this card was auctioned on [http://www.yahoo.co.jp/ Yahoo! Japan] and sold for ¥1,200,999 (approximately US$15,560).<ref>[http://www.animenewsnetwork.co.uk/interest/2012-01-05/auctioned-yu-gi-oh-card-sells-for-us$15000+in-japan Auctioned Yu-Gi-Oh! Card Sells for US$15,000+ in Japan - Anime News Network]</ref>

