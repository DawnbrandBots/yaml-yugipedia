title: Card Trivia:Topologina Bambee
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Topologina Honeycomb Beehicle]]".
  * This monster's name is a pun on [[wikipedia:Bambi (character)|Bambi]], a fictional deer character from [[wikipedia:Felix Salten|Felix Salten's]] 1923 novel, ''[[wikipedia:Bambi, a Life in the Woods|Bambi, a Life in the Woods]]'' and its 1939 [[wikipedia:Bambi's Children|sequel]].
