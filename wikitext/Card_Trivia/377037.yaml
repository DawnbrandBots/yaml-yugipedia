title: Card Trivia:Tyrant Red Dragon Archfiend
wikitext: |-
  {{Navigation}}

  * This monster is the evolved, and healed form of "[[Scarlight Red Dragon Archfiend]]". It has grown back its broken right horn along with several new ones, as well as a second pair of wings, and it no longer appears to have a cast around its right arm.
  * This monster could be considered the ''[[Yu-Gi-Oh! ARC-V]]'' [[counterpart]] of "[[Red Nova Dragon]]" and "[[Hot Red Dragon Archfiend King Calamity]]", as all three require 2 [[Tuner]]s for their [[Synchro Summon]]ing (though this monster is the first to be generic with its [[material]]s).
  ** In addition, this is also the first [[Double Tuning]] "[[Red Dragon Archfiend (archetype)|Red Dragon Archfiend]]" monster whose [[Level]] is 10 instead of 12, unlike "Red Nova Dragon" and "King Calamity".
  ** This monster could also be somewhat similar to "[[Red Dragon Archfiend/Assault Mode]]", as both share the same Level (10) and [[original ATK]] (3500), and feature an effect that [[destroy]]s cards on the [[field]].
  * This monster's [[Summon chants in Yu-Gi-Oh! ARC-V#Jack Atlas|Summon chant]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime is almost identical to that of "[[Red Nova Dragon (anime)|Red Nova Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
