title: Card Trivia:Light and Darkness Dragonlord
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragon's Light and Darkness]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Light and Darkness Dragon]]".
  ** This monster's design is based on the design of "Light and Darkness Dragon" on the cover of [[Yu-Gi-Oh! GX - Volume 002|the second volume]] of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  ** This monster's Fusion [[card type]] and [[Fusion Material]]s are based on how "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]" is composed of both "[[Light End Dragon (manga)|Light End Dragon]]" and "[[Dark End Dragon (manga)|Dark End Dragon]]" in the manga.
