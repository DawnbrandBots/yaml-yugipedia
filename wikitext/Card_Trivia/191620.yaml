title: Card Trivia:Constellar Leonis
wikitext: |-
  {{Navigation}}

  * This monster is based on the Leonis stars, which make up the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Leo (constellation)|Leo]].
  ** The constellation and the astrological symbol for [[wikipedia:Leo (astrology)|Leo]] (♌︎︎) appears in the background of this card's artwork; the encircled star in the constellation is the location of [[wikipedia:Regulus|Regulus]], the brightest star in Leo.
  ** This monster's armor features a blue and white color scheme, referencing [[wikipedia:Alpha Leonis|Alpha Leonis]], the blue-white main sequence star in Leo.
  ** This monster's armor features a wild mane, referencing how Leo is also known as the "lion" constellation.
