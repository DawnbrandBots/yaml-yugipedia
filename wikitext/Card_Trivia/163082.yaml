title: Card Trivia:Air Eater
wikitext: |-
  {{Navigation}}

  * This monster has a [[Fusion Monster|Fusion]] [[retrained]] counterpart: "[[Aerial Eater]]".
  * This monster and "[[Dark Shade]]" are the only two [[WIND]] [[Fiend]] [[Normal Monster]]s in the ''[[OCG]]'', and neither have yet been released in the ''[[TCG]]''.
  * This is one of the first WIND monsters seen on-screen in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, the others being "[[Monstrous Bird (anime)|Monstrous Bird]]" and "[[Punished Eagle (anime)|Punished Eagle]]".
