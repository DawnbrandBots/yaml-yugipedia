title: Card Trivia:DoSolfachord Cutia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Solfachord Happiness]]", "[[Solfachord Harmonia]]", "[[Solfachord Scale]]", and "[[Solfachord Symphony]]".
  * This monster is based on "''Do''", the first syllable of the [[wikipedia:Solfège|solfège]], which reflects its [[Level]] (1).
  ** "Cutia" starts with the English letter "C", which is based on the [[wikipedia:C (musical note)|first musical note]] of the [[wikipedia:C major|C major scale]] in the fixed solfège.
