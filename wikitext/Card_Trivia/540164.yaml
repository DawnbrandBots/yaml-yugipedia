title: Card Trivia:Crop Circles
wikitext: |-
  {{Navigation}}

  * [[The Eye of Wdjat]] appears in this card's artwork.
  * This card is based on the [[wikipedia:Crop circle|crop circle]], a pattern created by flattening a crop, which are usually believed to have been created by extraterrestrials.
  * Uniquely, this card has an effect that can only be applied by attempting to perform an illegal action. Since this card cannot be activated if no valid "[[Alien]]" monsters are in your Deck, the intended targets must be removed from your Deck during the Chain for you to lose LP.
