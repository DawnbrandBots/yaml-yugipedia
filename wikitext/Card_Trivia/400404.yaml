  * This monster is based on a [[wikipedia:Kabuki|Kabuki]] actor and/or [[wikipedia:Edo period police|Edo period police]].
  * This monster shares with "[[Goyo Guardian]]" the exact same [[ATK]] and [[DEF]], thus tying with it as the strongest [[EARTH]] [[Warrior]]-[[Type]] [[Synchro Monster]] with the highest ATK.
  * This "[[Goyo]]" Synchro Monster has the highest [[Level]].
