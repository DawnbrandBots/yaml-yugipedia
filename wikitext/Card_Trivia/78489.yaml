title: Card Trivia:Mavelus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cattle Call]]".
  * This monster's name is derived from the word "Marvelous".
  * This monster's design is based on a [[wikipedia:phoenix (mythology)|phoenix]], a firebird in mythology that is commonly associated with death and rebirth.
  * This monster has a [[recolored counterpart|recolored]] [[Normal Monster]] [[counterpart]]: "[[Blue-Winged Crown]]".
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster is used as [[Fusion Material]] along with "[[Wing Eagle]]" to [[Fusion Summon]] "[[Crimson Sunbird]]".
