title: Card Trivia:Agave Dragon
wikitext: |-
  {{Navigation}}

  * The specific monster [[Type]]s listed in this monster's bulleted effects reference how the traditional Japanese word for "dragon" (竜, ''ryu'') is featured in the Japanese names of the [[Dinosaur]] (恐竜, ''Kyōryū'' lit. "Fearsome Dragon"), [[Sea Serpent]] (海竜, ''Kairyū'' lit. "Sea Dragon"), and [[Wyrm]] Types (幻竜, ''Genryū'' lit. "Phantom Dragon"), as opposed to the name of the [[Dragon]] Type (ドラゴン, ''Doragon'').
