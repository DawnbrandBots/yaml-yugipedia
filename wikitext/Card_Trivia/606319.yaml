title: Card Trivia:Dark Spirit of Banishment
wikitext: |-
  {{Navigation}}

  * This monster is one of the [[cover card]]s of ''[[Duelist Pack: Legend Duelist 5]]'' and ''[[Legendary Duelists: Immortal Destiny]]''.
  * This monster's appearance is a combination of "[[Dark Spirit of the Silent]]", "[[The Gross Ghost of Fled Dreams]]", and "[[Headless Knight]]".
  * This monster has a [[counterpart]] that responds to opposing effects, "[[Dark Spirit of Malice]]"
