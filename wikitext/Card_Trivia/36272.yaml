title: Card Trivia:Big Evolution Pill
wikitext: |-
  {{Navigation}}

  * This card, "[[Swords of Revealing Light]]", "[[Different Dimension Capsule]]" and "[[Nightmare's Steelcage]]" are the only [[Normal Spell Card]]s that remain [[face-up]] on the [[field]] after [[activate|activation]].
  ** The number of turns this card remains face-up is represented by the three pills in this card's artwork.
  * This card's original Spanish version features an error, as its translated lore reads "...you can [[Normal Summon]] or [[Special Summon]] monsters without [[Tribute|Tributing]]...", but this card has never been meant to affect Special Summoning. This was corrected with its reprint in the Spanish version of ''[[Turbo Pack: Booster Seven]]''.
