title: Card Trivia:Regenerating Rose
wikitext: |-
  {{Navigation}}

  * This monster's name are based on its effect to [[Special Summon]] two "[[Regenerating Rose Token]]s" when [[destroy]]ed by battle and sent to the [[Graveyard]].
  ** This monster's Japanese name, "Split Demon Rose", reflects its ability to "split" into two smaller roses, while its ''[[TCG]]'' name reflects its ability to "regenerate" itself by taking the form of two smaller [[wikipedia:Germination|germinated]] roses.
  * This monster shares multiple similarities with "[[Revival Rose]]", another monster based on [[wikipedia:Rose|rose plants]].
  ** Both monsters share the same [[Attribute]] ([[DARK]]) and [[Type]] ([[Plant]]).
  ** Both monsters' names reflect their effect that involve a means of their "recurrence" back to the [[field]].
  *** This monster can Special Summon two "Regenerating Rose Tokens" when it is destroyed by battle and sent to the Graveyard (hence its ability to "regenerate" itself by taking the form of two smaller germinated roses), whereas "Revival Rose" can Special Summon itself from the [[Graveyard]] if a [[Level 5]] or higher Plant monster the player [[control]]s is [[destroy]]ed (hence its ability to "revive" itself).
