title: Card Trivia:Advanced Ritual Art
wikitext: |-
  {{Navigation}}

  * The structure of the location in this card's artwork is similar to that of [[wikipedia:Stonehenge|Stonehenge]].
  * This card's artwork is part of a series of events in the order of "[[Preparation of Rites]]" → "[[Pre-Preparation of Rites]]" → "[[Urgent Ritual Art]]" → "Advanced Ritual Art".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Advanced Ritual Art]]"; and a counterpart with an inversed effect: "[[High Ritual Art]]".
