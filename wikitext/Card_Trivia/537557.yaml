title: Card Trivia:Mefist the Infernal General
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Mephistopheles|Mephistopheles]], a demon from [[wikipedia:German folklore|German folklore]] whom the character [[wikipedia:Faust|Faust]] sold his soul to.
  * This monster has an opposite counterpart: "[[Airknight Parshath]]".
  ** Both monsters have opposite [[Attribute]]s and [[Type]]s: this monster is a [[DARK]] [[Fiend]] monster, while "Airknight Parshath" is a [[LIGHT]] [[Fairy]] monster.
  ** Both monsters are [[Level 5]] monsters with an effect that deals [[piercing]] [[battle damage]] and a related effect involving the [[hand]]: this monster randomly [[discard]]s an opponent's card from their hand upon inflicting battle damage, while "Airknight Parshath" allows the player to [[draw]] a card upon inflicting battle damage.
