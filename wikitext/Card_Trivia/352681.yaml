title: Card Trivia:Herald of Ultimateness
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Herald of Perfection]]".
  ** This monster's body is made up of [[Herald of Pure Light]]" (head and arms), "Herald of Perfection" (body), and "[[Herald of the Arc Light]]" (waist and legs):
  *** Upper body portion: "[[Herald of Green Light]]".
  *** Middle body portion: "[[Herald of Orange Light]]".
  *** Lower body portion: "[[Herald of Purple Light]]".
  *** This monster's [[Level]] (12) is the combined total of the Level/[[Rank]] of "Herald of Pure Light", "Herald of Perfection", and "Herald of Arc Light".
  * This monster has the highest Level (12) of all [[Fairy]] monsters.
