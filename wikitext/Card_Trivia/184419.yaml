title: Card Trivia:Wind-Up Zenmaines
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on ''Zenmai'', the ''[[OCG]]'' name of the "[[Wind-Up]]" archetype, and [[wikipedia:Land mine|mines]].
  * This monster is a [[wikipedia:Ground warfare|land war]] [[wikipedia:Vehicle|vehicle]], probably a [[wikipedia:Tank|tank]], as indicated by its large bulking lower body similar to "[[Meklord Emperor Granel]]". This mirrors the other "Wind-Up" [[Xyz Monster]]s, "[[Wind-Up Zenmaister]]" and "[[Wind-Up Carrier Zenmaity]]", who are an [[wikipedia:Aerial warfare|aerial war]] vehicle and [[wikipedia:Naval warfare|naval war]] vehicle, respectively. The boss monster, "[[Wind-Up Arsenal Zenmaioh]]", can be viewed as the "general" instead.
  * This card was the second [[TCG-only|TCG-Exclusive]] Xyz Monster; the first was "[[Adreus, Keeper of Armageddon]]".
  ** This is the first ''[[TCG]]''-Exclusive card to be first releases in the ''OCG'' in ''[[Gold Series 2012]]'', making it the first Xyz Monster to be released as a [[Gold Rare]].
