title: Card Trivia:X-Saber Galahad
wikitext: |-
  {{Navigation}}

  * Despite its [[Type]] and [[Attribute]], this monster has several reptilian/amphibian features.
  * This card is likely named after [[wikipedia:Galahad|Sir Galahad]], a knight who appears in Arthurian legends. In these legends, Galahad was the son of Sir Lancelot, and is renowned for his gallantry and purity.
