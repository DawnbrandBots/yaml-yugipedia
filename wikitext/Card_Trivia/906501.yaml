title: Card Trivia:Mikanko Rivalry
wikitext: |-
  {{Navigation}}

  * "[[Ha-Re the Sword Mikanko]]" and "[[Ni-Ni the Mirror Mikanko]]" appear in this card's artwork.
  ** The ''[[wikipedia:Ink wash painting|suiboku]]'' painting in the background of this card's artwork depicts the ''[[wiktionary:火鼠|hinezumi]]'' ("fire rat") and the ''[[wikipedia:Nekomata|nekomata]]'' ("forked cat"), the sacred animals of "Ha-Re" and "Ni-Ni" respectively.
