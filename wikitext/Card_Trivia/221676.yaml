title: Card Trivia:Heroic Gift
wikitext: |-
  {{Navigation}}

  * The crest of the "[[Heroic]]" [[archetype]] appears in the background of this card's artwork.
  * This card's name may refer to the fact that most heroes fight with honor, and will more often than not take on their opponent in a fair fight. 
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, [[Nistro]] [[activate]]d this card to have a fair fight with [[Yuma Tsukumo]], as due to the rules of the [[Duel Coaster]], Yuma started the Duel with 100 [[Life Points]] while Nistro had 4000.
