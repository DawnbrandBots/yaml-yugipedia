title: Card Trivia:Frenzied Panda Cotta
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bye-Bye Strawberries]]", "[[Freshberry Collaboration]]", and "[[Hunting Strawberries]]".
  * This monster is a ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] of "[[Frenzied Panda (Rush Duel)|Frenzied Panda]]".
  ** Its name is a portmanteau of the Japanese name of "Frenzied Panda", "Killer Panda" (キラーパンダ ''Kirā Panda''), and "[[wikipedia:Panna cotta|Panna Cotta]]" (パンナコッタ ''Panna Kotta'').

