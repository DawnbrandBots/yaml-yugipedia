title: Card Trivia:Wightlord
wikitext: |-
  {{Navigation}}

  * "[[Skull Dog Marron]]" appears in this card's artwork.
  * This monster's name is a play on ''wight'' and the Japanese name for "[[Lightsworn]]",「ライトロード」(''Raitorōdo''), which can be interpreted as "Lightlord".
  ** This monster is wearing the armor and cape of "[[Jain, Lightsworn Paladin]]", while "Skull Dog Marron" is wearing the armor and making the same pose as "[[Ryko, Lightsworn Hunter]]".
  ** This monster's effect to [[send]] cards from the top of the [[Deck]] to the [[Graveyard]] is similar to the gameplay of the "Lightsworn" [[archetype]].
  ** The "Lightsworn" archetype was introduced in ''[[Light of Destruction]]'', which also introduced the third member of the "[[Wight]]" series and the first to have "Wight" in its English name, "[[The Lady in Wight]]". This monster was introduced in ''[[Legacy of Destruction]]'', which also introduced further support for the "Lightsworn" archetype.
