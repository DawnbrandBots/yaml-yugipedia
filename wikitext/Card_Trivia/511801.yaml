title: Card Trivia:Spell-Stopping Statute
wikitext: |-
  {{Navigation}}

  * The emperor in this card's artwork also appears in the artworks of "[[D/D Recruits]]", "[[Contract Laundering]]", "[[Imperial Register]]", "[[Late Penalty]]", "[[Imperial Order]]", "[[Imperial Custom]]" and "[[Imperial Manners]]".
  * "[[Dark Magical Circle]]" appears on the cover of the book in this card's artwork.
  * This card has a [[Continuous Trap Card]]-negating [[counterpart]]: "[[Royal Surrender]]".
  * The Spanish name of this card was first printed as "''Est'''á'''tua Para-Hechizos''". The second print corrected it to "''Est'''a'''tua Para-Hechizos''".
  ** Both names are incorrect translations, as it should be "''Estatuto Para-Hechizos''" or "''Estatuto Para-hechizos''". The used name translates to "''Spell-Stopping Statue''".
