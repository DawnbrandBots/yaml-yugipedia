title: Card Trivia:Spiral Serpent
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Phantasm Spiral Battle]]" and "[[Xyz Dimension Splash]]".
  * This card has the highest [[ATK]] of any [[Normal Monster|Normal]] [[Sea Serpent]] monster.
  * This card has a [[Wyrm]]-[[Type]] [[counterpart]]: "[[Phantasm Spiral Dragon]]", as implied by the name, [[ATK]], [[DEF]], [[Level]], and [[Attribute]].
  * This monster resembles an [[wikipedia:Elasmosaurus|Elasmosaurus]], a plesiosaur that swam around during the [[wikipedia:Cretaceous|Cretaceous Period]].
