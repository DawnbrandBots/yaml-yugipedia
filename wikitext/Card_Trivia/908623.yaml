title: Card Trivia:Traptrix Vesiculo
wikitext: |-
  {{Navigation}}

  * This monster is based on ''[[wikipedia:Aldrovanda vesiculosa|Aldrovanda vesiculosa]]'' (Japanese: {{Ruby|狢|ムジナ}}{{Ruby|藻|モ}} ''Mu<u>jina</u>mo''), a carnivorous plant which uses traps similar to the Venus flytrap.
  * This monster appears in the artwork of "[[Traptrix Pinguicula]]".
