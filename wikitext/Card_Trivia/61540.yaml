title: Card Trivia:Cemetary Bomb
wikitext: |-
  {{Navigation}}

  * This is the only card with the word "bomb" in its ''[[TCG]]'' name.
  * The Spanish prints of this card have a small errata, as the word "''in'''f'''lige''" ("''inflict''") is misprinted as "''in'''g'''lige''".
  * When this card was reprinted, it was renamed from the correctly spelled "Cemetery Bomb" to the incorrectly spelled "Cemetary Bomb."
