title: Card Trivia:Verdict of Anubis
wikitext: |-
  {{Navigation}}

  [[File:JudgmentofAnubis-JP-Manga-DM-NC.png|thumb|300px|"[[Judgment of Anubis (manga)|Judgment of Anubis]]" resolving, as seen in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]] manga''.]]

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This card appears in the artwork of "[[Dark Time Wizard]]".
  * "[[Gearfried the Iron Knight]]", "[[Panther Warrior]]", "[[Swordsman of Landstar]]", and the wolf-like apparition from "[[Judgment of Anubis]]" (as depicted in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]) appear in this card's artwork.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|210|ref}}, specifically from the panel showing [[Katsuya Jonouchi (manga)|Katsuya Jonouchi's]] "[[Gearfried the Iron Knight (manga)|Gearfried the Iron Knight]]", "[[Panther Warrior (manga)|Panther Warrior]]", "[[Swordsman of Landstar (manga)|Swordsman of Landstar]]" being [[destroy]]ed by the wolf-like apparition that manifests after [[Rishid (manga)|Rishid]] [[activate]]s "[[Judgment of Anubis (manga)|Judgment of Anubis]]".
  ** This card's activation requirement for the player to control three other [[Spell]]/[[Trap Card]]s references how Rishid controlled three other [[Set]] Spells/Traps when he activated "Judgment of Anubis".
  ** This card's effect to destroy the opponent's monsters and inflict damage equal to half of those monsters' combined total [[ATK]] is based on the effect of "Judgment of Anubis" in the ''Yu-Gi-Oh!'' manga and anime. Additionally, this effect requiring the player to [[control]] "[[Temple of the Kings]]" is based on how Rishid controlled "[[Royal Temple]]" when he activated "Judgment of Anubis".

