title: Card Trivia:Incredible Ecclesia, the Virtuous
wikitext: |-
  {{Navigation}}

  [[File:IncredibleEcclesiatheVirtuous-ConceptArt.png|thumb|right|250|Concept art.]]

  * This monster appears in the artworks of "[[Branded Bond]]", "[[Branded in Central Dogmatika]]", "[[Branded Loss]]", "[[Branded Disciple]]", "[[Branded in High Spirits]]", "[[Dogmatikaturgy]]", "[[Ecclesia and the Dark Dragon]]", "[[Icejade Cenote Enion Cradle]]", "[[Ecclesia the Exiled]]", "[[Sprind the Irondash Dragon]]", "[[Springans Blast!]]", "[[Springans Booty]]", "[[Springans Call!]]", "[[Springans Watch]]", "[[Swordsoul Assessment]]", "[[New Frontier]]", and "[[Tri-Brigade Rendezvous]]".
  ** This monster's hammer appears in the artwork of "[[Albaz the Ashen]]".
  * "[[Albion the Shrouded Dragon]]" and "[[Springans Rockey]]" (wearing the skull) appear in this card's artwork.
  ** "[[Blazing Cartesia, the Virtuous]]" appears in this card's third artwork.
  * This card's name is based on [[wikipedia:Ecclesia|ἐκκλησία (Ecclesia)]], the Greek term for Christian Church.
  * This monster is "[[Dogmatika Ecclesia, the Virtuous]]" after she left the "[[Dogmatika Nation]]" and discarded her "[[Dogmatika]]" armor.
  ** Based on the second concept art of "Dogmatika Ecclesia" and this monster's:
  *** The black soot creature is a "[[Springans]]" monster.
  *** Her cloak was given to her by "[[Tri-Brigade Kitt]]" (which is a hand-me-down from "[[Tri-Brigade Ferrijit the Barren Blossom]]"). She also has matching goggles with [[Tri-Brigade Kitt]] (''Osoro'' in the artwork refer to 「お揃い」, which is Japanese for "matching").
  *** She carries a knife with her.
  *** As her hairstyle from her time in the "Dogmatika Nation" was difficult to maintain on her own, "Ecclesia" ties her hair into a ponytail instead. She has since added braids on her left.
  * This monster has a corrupted form: "[[Blazing Cartesia, the Virtuous]]".
  * This card has a "Dogmatika" successor [[counterpart]]: "[[White Relic of Dogmatika]]".
  * In this monster's second artwork, she possesses a hammer and a pair of wings based on "[[Granguignol the Dusk Dragon]]", referencing her time corrupted as "Blazing Cartesia".
