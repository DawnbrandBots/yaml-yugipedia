title: Card Trivia:Level Down!
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Chthonian Soldier]]" appears in this card's artwork, despite not being a "[[LV]]" monster.
  ** Fittingly, "Chthonian Soldier" is used by [[Chazz Princeton]], who uses this card in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This card's name is nearly identical to that of "[[Level Down!?]]", another card that supports "LV" monsters.
