title: Card Trivia:Hand Destruction
wikitext: |-
  {{Navigation}}

  * "[[Sasuke Samurai]]" appears in this card's artwork.
  ** This card's artwork depicts "Sasuke Samurai" performing a sword attack at the four cards at the foreground, reflecting its initial effect in the anime to force each player to [[send]] a maximum of four cards from their [[hand]] to the [[Graveyard]] and [[draw]] the same number of cards. In the ''[[OCG]]''/''[[TCG]]'', it instead references the total number of four cards sent and the four cards drawn between each player.
  * This card's name and effect are references to "[[Card Destruction]]".
