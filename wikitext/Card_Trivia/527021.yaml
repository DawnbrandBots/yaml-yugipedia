title: Card Trivia:Security Dragon
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to [[wikipedia:Computer security|computer security]].
  * This monster is a prototype of "[[Firewall Dragon]]", making it a counterpart to "[[Proxy Dragon]]".
  ** Together with "Proxy Dragon", their [[ATK]] and [[Link Rating]]s equal those of "Firewall Dragon".
  ** Additionally, [[Proxy Dragon]] and [[Security Dragon]] can be used to summon [[Firewall Dragon]], since it needs only 2+ Monsters with a link rating of 4.
