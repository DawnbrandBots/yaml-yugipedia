title: Card Trivia:Ancient Warriors - Ambitious Cao De
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Cao Cao|Cao Cao]] ([[wikipedia:Courtesy name|courtesy name]]: '''Mengde'''), from the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', founder and emperor of [[wikipedia:Cao Wei|Wei]] state during the Three Kingdoms Period, being best known as a great administrator and his military conquest. His moniker "Ambitious" refers to his frequent portrayal as a ruthless tyrant in multiple adaptations.
  ** This monster's phoenix motif might be referencing the [[wikipedia:Vermillion Bird|Vermillion Bird]], one of the [[wikipedia:Four Symbols|Four Symbols]] that corresponds to the Fire Element. This is fitting, as it symbolize leadership and nobility, fitting with Cao Cao's upbringing.
  ** This card's second effect to summon any monster it destroyed in battle is a reference to Cao Cao's habit of recruiting his former enemies as subordinates, usually those with great skills.
