title: Card Trivia:Infernoble Knight Emperor Charles
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Charlemagne|Charlemagne]].
  * This card's artwork appears in the artwork of "[[The Continuing Epic of Charles]]".
  * This card has an upgraded form; "[[Emperor Charles the Great]]".
  * "[["Infernoble Arms - Joyeuse"]]" appears in this card's artwork. This is fitting, as [[wikipedia:Joyeuse|Joyeuse]] was the sword of Charlemagne.
