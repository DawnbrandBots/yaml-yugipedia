title: Card Trivia:Lee the World Chalice Fairy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[World Legacy Clash]]", "[[World Legacy Landmark]]", "[[World Legacy Whispers]]", "[[World Legacy Trap Globe]]", and "[[World Legacy's Heart]]".
  * "Lee the World Chalice Fairy" → "[[Knightmare Corruptor Iblee]]" → "[[Orcust Knightmare]]" → "[[Knightmare Incarnation Idlee]]".
  ** This monster is the fairy form of the blue haired female scientist that appear in the artworks of "[[World Legacy Bestowal]]" and "[[World Legacy's Memory]]".
  ** According to the ''[[Yu-Gi-Oh! Master Duel]]'' Solo Mode, she was one of the lead scientists of "Project [[Mekk-Knight]]" in an attempt to learn more about the legends of the "World Key".
  ** After her physical body perished piloting "[[Mekk-Knight of the Morning Star]]" and using it to awaken the Great Darkness, she transferred her soul into "[[World Legacy - "World Chalice"]]".
  ** "[[Neverending Nightmare Absorber]]" is an incarnation of this monster at an unknown point in time.
  * This monster appears to be a levitating fairy, but she is actually a 3D holographic projection.
  ** This monster is a reference to the third [[wikipedia:Clarke's laws|Clarke's law]], which states that "Any sufficiently advanced technology is indistinguishable from magic".
