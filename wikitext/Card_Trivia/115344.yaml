title: Card Trivia:Element Saurus
wikitext: |-
  {{Navigation}}

  * Like the other members of the [[Element]] series, this monster and the background of its card artwork each depict their respective color scheme and environment which corresponds with the [[Attribute]]s mentioned in its effect. In this case, the listed Attributes are [[EARTH]] and [[FIRE]].
  ** This monster's appearance consists of brown scales (EARTH) and a red belly, spines, and claws (FIRE). It is also depicted breathing a stream of fire from its mouth.
  ** The background of this card's artwork depicts the faint image of a mountain and deep crevices in the ground (EARTH), which are glowing red and orange, possibly from the magma (FIRE).
