title: Card Trivia:Tuning
wikitext: |-
  {{Navigation}}

  * "[[Spirit of the Harp]]" appears in this card's first artwork.
  ** This card's name is a pun on its artwork, which depicts "Spirit of the Harp" "tuning" her harp, while "tuning" is a term used for [[send]]ing [[Synchro Material]]s to the [[Graveyard]] for a [[Synchro Summon]].
  * "[[Junk Synchron]]" appears in this card's second artwork.
  ** This card's second artwork depicts "Junk Synchron" undergoing the process of "tuning" by activating the engine on its back, which is commonly depicted in the ''[[Yu-Gi-Oh! 5D's]]'' anime. Fittingly, "Junk Synchron" was the monster [[add]]ed by this card's effect in {{episode|5D's|027|ref}}.
  * This card has a parodied counterpart: "[[Hell Tuning]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Tuning]]".
  * This card's ''[[Tag Force 4]]'' effect is a combined version of its effect in the anime and the ''OCG''/''TCG'' effect - in ''Tag Force 4'', this card lets the player add only "Synchron" Tuner monsters just like in the ''OCG''/''TCG'' print, but also requires them to [[send]] cards with an amount equal to the Tuner's [[Level]], just like the anime effect.
