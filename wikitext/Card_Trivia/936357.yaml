title: Card Trivia:Harpie Lady Sisters (Rush Duel)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Triple Build Pack: Godbreath Wing]]''.
  * This monster has a [[counterpart|retrained]] counterpart: "[[Pet Master Harpie Lady]]".
  * This monster has an upgraded [[Fusion Monster|Fusion]] counterpart together with "[[Harpie Lady Sisters (L)|Harpie Lady Sisters [L]]]" and "[[Harpie Lady Sisters (R)|Harpie Lady Sisters [R]]]": "[[Harpie Lady Sisters Triangle Beauty]]".
  * This monster's appearance in [[Maximum Mode]] (together with "Harpie Lady Sisters [L]" and "Harpie Lady Sisters [R]") are based on the appearance of "[[Harpy Lady Sisters (manga)|Harpy Lady Sisters]]" in {{chapter|Yu-Gi-Oh!|117|ref}}.
  * This monster's appearance and 2100 [[original ATK]] is based on "[[Harpie Lady]]" after being [[equip]]ped with "[[Cyber Shield]]" and "[[Electro-Whip (manga)|Electro-Whip]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, which increased "Harpie Lady's" 1300 original [[ATK]] by the combined total of ATK increased by the effects of both [[Equip Spell Cards]] (500 + 300, respectively), which is 800.
