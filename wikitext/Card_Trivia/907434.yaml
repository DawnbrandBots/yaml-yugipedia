title: Card Trivia:Bizarrmor
wikitext: |-
  {{Navigation}}

  * This armor in this card's artwork is a fusion of "[[Beast Drive Mega Elephant]]", "[[Night Vision the Phantom Pigeon]]", and "[[Shield Boring Kong]]".
  ** The three mentioned monsters are the respective [[signature card]]s of [[Caterpillio Elephantus]], [[Pigetrap Quill|Pigetrap]]/[[Schubel Quill]], and [[Galian Townsend]], the servants of [[Asana Mutsuba]], who used this card in the ''[[Yu-Gi-Oh! SEVENS]]'' anime.
