title: Card Trivia:Temple of the Kings
wikitext: |-
  {{Navigation}}

  * The temple in this card's artwork appears in the artwork of "[[No Entry!!]]".
  ** Either this temple or "[[Treasures of the Kings]]" appears in the artwork of "[[The Man with the Mark]]".
  * The statue from the artwork of "[[Judgment of Anubis]]" appears in this card's artwork.
  ** This is a reference to the role of [[wikipedia:Anubis|Anubis]], the [[wikipedia:Egyptian god|Egyptian god]] of death and embalming who protects the Egyptian tombs.
  * [[Temple of the Kings (anime)|This card's]] anime effect to limit the number of [[Spell]]/[[Trap Card]]s the opponent can [[Set]] each [[turn]] is based on the ''[[Duel Monsters (manga)|Duel Monsters]]'' rules from the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, where each player can only [[activate]] one Spell from their [[hand]] and Set 1 Spell/Trap Card from their hand each turn, whereas this card's manga effect allows the player to Set two Trap Cards each turn.
  * This is the first card (and so far the only card) that became [[Forbidden]] immediately upon its release. Being released in the ''[[TCG]]'' in [[September 2010 Lists (TCG)|September 2010]] during the time that the ''TCG'' and the ''[[OCG]]'' shared a [[Forbidden & Limited List]], in which this card was Forbidden in the ''OCG'' [[September 2006 Lists (OCG)|4 years prior]].
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|210|ref}}, specifically from the panel where "[[Royal Temple]]" manifests itself.
