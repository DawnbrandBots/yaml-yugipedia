title: Card Trivia:Mystical Sand
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a pun on the word "sandwich".
  * This monster has a [[Bubble Actress]] counterpart: "[[Mystical Sandbox]]".
  * This monster may be [[Rock]]-[[Type]] because according to some of this card's videogame lores, she has power to turn opponents into stone.
  * In ''[[Yu-Gi-Oh! Capsule Monsters]]'', this monster is depicted with fully red eyes rather than the normal ones in its card artwork.
