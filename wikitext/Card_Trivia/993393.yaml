title: Card Trivia:S:P Little Knight
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed [[Link Monster]] counterpart of "[[S-Force Rappa Chiyomaru]]".
  ** "Little Night" is the direct translation of the ''chiyo'' ({{Ruby|小|ち}}{{Ruby|夜|よ}}) in "Chiyomaru".
  * This monster has a combined form with "[[I:P Masquerena]]": "[[W:P Fancy Ball]]".
  * "S:P" is likely a combination of the "I:P" in "I:P Masquerena" and the "S" in "[[S-Force]]".
  ** Since "I:P" stands for "internet protocol" and the "S" in "S-Force" stands for "security", "S:P" could likely mean "security protocol", a set of rules or procedures used to ensure the secure transmission and exchange of data between two or more devices over a network.
  * This card's first artwork is adapted into ''[[Underground Data Courier]]'' in ''[[Yu-Gi-Oh! Master Duel]]'', specifically the scene where [[Chiyomaru]] dodges [[Nightchaser]]'s attack with her "Ninjitsu Art of Substitution".
