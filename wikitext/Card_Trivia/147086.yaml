title: Card Trivia:Neo-Spacian Marine Dolphin
wikitext: |-
  {{Navigation}}

  * This monster is the [[NEX|extended]] form of "[[Neo-Spacian Aqua Dolphin]]".
  ** This monster has 300 more [[ATK]] and [[DEF]] than those of "Aqua Dolphin".
  ** This monster does not feature the 500 damage penalty to the player if they fail the condition of the [[hand]]-[[destroy|destruction]] effect.
  * This is the first [[Fusion Monster]] to not list any [[Fusion Material]].
  * This is the first and currently only extended form of a "[[Neo-Spacian]]" monster to feature an [[Card evolutions|upgraded]] [[Contact Fusion]] form.
  * This monster has the highest [[original DEF]] (1100) of all the "Neo-Spacian" monsters, tied with "[[Neo-Spacian Twinkle Moss]]".
