title: Card Trivia:Rank-Up-Magic Escape Force
wikitext: |-
  {{Navigation}}

  * This is the first "[[Rank-Up-Magic]]" card owned by [[Shay Obsidian]] to not support the "[[Raidraptor]]" archetype.
  ** This is also the first "Rank-Up-Magic" card in the ''[[Yu-Gi-Oh! ARC-V]]'' anime to be anime-exclusive.
