title: Card Trivia:Master of Oz
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Brutal Beast Battle]]", "[[Cattle Call]]", "[[Dances with Beasts]]" (as a silhouette), "[[Rival Crush]]", and "[[Thousand Punisher]]".
  * This monster's name is derived from "Oz", a common nickname for [[wikipedia:Australia|Australia]] derived from "Aus" (pronounced "oz").
  ** The rock formation in the background of this card's artwork is likely the [[wikipedia:Nourlangie Rock|Nourlangie Rock]] formations or [[wikipedia:Uluru|Ayers Rock]].
  ** This monster's [[Fusion Material]]s, "[[Big Koala]]" and "[[Des Kangaroo]]", are based on two of the most recognizable Australian animals: the [[wikipedia:koala|koala]] and the [[wikipedia:kangaroo|kangaroo]].
  *** This monster's [[original ATK and DEF]] (4200/3700) are the combined original [[ATK]] and [[DEF]] of its Fusion Materials.
  * This is the [[signature card]] of [[Chumley Huffington]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * "[[Master of Ham]]" follows this monster's naming scheme.
  ** This monster shares the same [[Attribute]] ([[EARTH]]) and [[Type]] ([[Beast]]) as "Master of Ham", and its [[original ATK and DEF]] are twice that of "Master of Ham".
  * This monster has the highest original [[ATK]] (4200) of all Beast monsters in the ''[[OCG]]''/''[[TCG]]''.
  ** This monster also has the highest original ATK and DEF (4200/3700) of all [[Level 9]] monsters.
