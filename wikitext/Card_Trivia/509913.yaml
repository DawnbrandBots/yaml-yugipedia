title: Card Trivia:Dark Factory of Mass Production
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" and "[[Mokey Mokey]]" appear in this card's artwork.
  ** The hat of "Goblin of Greed" can be seen hanging on one of the leavers in this card's artwork.
  * This factory appears in the artwork of "[[Dark Factory of More Production]]".
  ** The conveyor belt and skeleton picture in this card's artwork also appear on the van in the artwork of "[[Surprise Chain]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Dark Factory of Mass Production]]".
  * This card is the first [[Legend Card]] used in ''[[Yu-Gi-Oh! GO RUSH!!]]''.
  * A mini-game based on this card was included in the ''[[TCG]]'' version of [[Duel Terminal]] for [[Action Duel]] mode, where the player must help the "Goblin of Greed" position "Mokey Mokey" correctly.
