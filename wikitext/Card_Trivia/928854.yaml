title: Card Trivia:Fabled Marcosia
wikitext: |-
  {{Navigation}}

  * This monster is based on ''Marchosia'', a demon from the ''[[wikipedia:The Lesser Key of Solomon|Ars Goetia]]''.
  ** ''Marchosia'' is often depicted as a wolf with gryphon wings and a serpent’s tail. This form appears in the artwork of "[[Fabled Treason]]".
