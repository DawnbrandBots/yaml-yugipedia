title: Card Trivia:Shield Crush
wikitext: |-
  {{Navigation}}

  * "[[Millennium Shield]]" appears in this card's artwork.
  * This card proves wrong the rumor that "Millennium Shield" can block any strong attack, as said in the card's original ''[[TCG]]'' flavor text, similar to "[[Kaminote Blow]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Shield Crush]]".
