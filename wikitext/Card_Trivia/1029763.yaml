title: Card Trivia:Fake Fabricated Network Zone
wikitext: |-
  {{Navigation|mode=nongame}}

  * [[Tab Pitman]] appears in this card's artwork
  ** Fittingly, Tab was transformed into this card in {{episode|GO RUSH!!|85|ref}}.
  *** "Network Zone" (ネッツゾーン ''Nettsuzōn'') is a pun on Tab's Japanese name, Netsuzo (ネツゾー ''Netsuzō''). It is also a pun on "[[wikipedia:Fake news|fake news]]", a term used to describe false or misleading information presented as news, which incorporates the Japanese verbal word meaning "to fabricate" (ねつぞう ''Netsuzō'') and "network" (ネットワーク ''Nettowāku'') to refer to a fake news network.
