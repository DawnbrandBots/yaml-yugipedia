title: Card Trivia:Ally of Justice Cyclone Creator
wikitext: |-
  {{Navigation}}

  * This card has the same [[Level]], [[Type]], [[Attribute]], [[ATK]] and [[DEF]] as "[[Genex Controller]]", another [[Tuner]] monster.
  * This card is one of the few "[[Ally of Justice]]" monsters that does not have an anti-[[LIGHT]] effect.
  * This monster appears to be a combination of "Ally of Justice" technology and a "[[Mist Valley]]" monster.
