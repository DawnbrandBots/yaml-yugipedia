title: Card Trivia:Ancient Warriors Saga - Borrowing of Arrows
wikitext: |-
  {{Navigation}}

  * This card is a reference to the "[[wikipedia:List of fictitious stories in Romance of the Three Kingdoms|Borrowing of Arrows]]", a famous fictional event of the historical novel, ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', where previous to the [[wikipedia:Battle of Red Cliffs|Battle of Red Cliffs]], a decisive naval battle between the allied forces of the southern warlords [[wikipedia:Sun Quan|Sun Quan]] and [[wikipedia:Liu Bei|Liu Bei]], and the northern warlord [[wikipedia:Cao Cao|Cao Cao]], [[wikipedia:Zhuge Liang|Zhuge Liang]] uses straw boats to draw the enemy's fire and waste their arrows, as well as reuse those arrows for themselves.
  * Fittingly, [[Ancient Warriors - Ingenious Zhuge Kong|Ingenious Zhuge Kong]], who's based after Zhuge Liang, appears in this card's artwork.
