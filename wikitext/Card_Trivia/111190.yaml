title: Card Trivia:Illegal Business Practices
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The appearance of the grinning face in this card's artwork could be based on the [[wikipedia:Cheshire Cat|Cheshire Cat]], a character from the 1865 fantasy novel, ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]'', who is known for turning himself invisible with only his grinning face remaining visible.
