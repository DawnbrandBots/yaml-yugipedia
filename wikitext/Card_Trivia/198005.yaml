title: Card Trivia:Trion Barrier
wikitext: |-
  {{Navigation|mode=nonGame}}

  * True to this card's name and effect, "[[Triple Star Trion]]" appears in this card's artwork.
  ** Another fitting reference to "Triple Star Trion" is the single Star behind the monster, which most likely refers to the monster being [[Level]] 1 (thus, a one-star monster.)
