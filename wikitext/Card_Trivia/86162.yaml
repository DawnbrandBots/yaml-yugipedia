title: Card Trivia:Clear World
wikitext: |-
  {{Navigation}}

  * The silhouette of [[Yusuke Fujiwara]] appears in this card's artwork.
  * The crystal in this card's artwork appears in the artworks of "[[Attribute Mastery]]" and "[[Clear Wall]]".
  * This card's effects reference the gameplay and cultural associations of each [[Attribute]].
  ** [[LIGHT]]: Forcing the player to play with its [[hand]] [[reveal]]ed at all times.
  *** LIGHT has no real gameplay focus, but light is associated with revealing what is hidden. This effect allows the opponent to know if the player has "[[Honest]]" in their hand, which has an effect to [[send]] itself from the [[hand]] to the [[Graveyard]], during the [[Damage Step]], and make a player's LIGHT monster gain [[ATK]] equal to the ATK of an opponent's monster it is battling until the end of the turn. In the ''[[Yu-Gi-Oh! GX]]'' anime, [[Honest (character)|Honest]] was also the [[Duel Monster Spirit]] of Yusuke Fujiwara.
  ** [[DARK]]: Preventing the player's monsters from attacking at all (in the anime and ''[[Yu-Gi-Oh! GX Tag Force 3|Tag Force 3]]''), or while they [[control]] 2 or more monsters (in the ''[[OCG]]''/''[[TCG]]'').
  *** DARK monsters often have effects that focuses on [[Special Summon]]ing more monsters, and they frequently have high ATK. The darkness element is associated with evil and destruction.
  ** [[EARTH]]: Destroying an opponent's [[face-up]] [[Defense Position]] monster (or any monster, in the anime and ''Tag Force 3'').
  *** EARTH monsters, particularly [[Rock]] monsters, frequently have high [[DEF]]. Aside from Rock monsters, EARTH does not have any particular strategy, which may be reflected in how this card's effect is generic in the anime and ''Tag Force 3''. The earth element is associated with strength and robustness.
  ** [[WATER]]: Forcing the player to [[discard]] cards.
  *** Particularly in the past, when this card was released, WATER monsters had some effects related to discarding cards from the opponent's hand. Also, forcing discards disrupts the opponent's strategy, as opposed to attacking the monsters on their [[field]] or damaging their [[Life Point]]s. The water element is associated with passivity, subtlety, and (in martial arts) disruption.
  ** [[FIRE]]: Inflicting 1000 [[Effect damage|damage]] to the player during their [[End Phase]].
  *** [[Burn]] damage is strongly associated with FIRE.
  ** [[WIND]]: Forcing the player to pay 500 Life Points to [[activate]] [[Spell Card]]s (in the ''[[OCG]]''/''[[TCG]]'') or not being able to activate them at all (in the anime and ''Tag Force 3'').
  *** WIND monsters frequently have Spell/[[Trap Card]] removal effects, and a large number of Spell/Trap Cards that have Spell/Trap removal effects are based on wind and storms, such as "[[Mystical Space Typhoon]]", "[[Heavy Storm]]", and "[[Giant Trunade]]".
  * This card is the first [[Field Spell Card]] to be released as a [[Secret Rare]].
