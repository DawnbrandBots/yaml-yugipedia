title: Card Trivia:Capshell
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on a ''[[wikipedia:Gashapon|gashapon]]'', a spherical capsule popular in Japan, which contains a small capsule toy. Fittingly, this monster is depicted juggling the ''gashapon'' capsules while multiple capsules appear in the background of this card's artwork.
  ** This monster's name is a portmanteau of the words "capsule" (カプセル, ''kapuseru'') and "Hell" (シェル, ''Heru''), which reflects this monster's demonic appearance and [[Fiend]] [[Type]].
  ** This card's bulleted effects share the same effect, which allows the player to [[draw a card]] when it leaves the [[field]] after performing a certain action. This references how people can use a ''gashapon'' vending machine to obtain a capsule containing a random toy or figure inside.
