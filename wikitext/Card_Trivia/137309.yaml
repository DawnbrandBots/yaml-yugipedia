title: Card Trivia:Princess Pikeru
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[White Magician Pikeru]]".
  * This card has a [[DARK]] twin [[counterpart]]: "[[Princess Curran]]".
  ** Both are [[Level]] 4 monsters with 2000 [[ATK]] and 0 [[DEF]], and have [[LP]]-related effects that [[activate]] during the [[Standby Phase]].
  ** Both must be [[Special Summon]]ed with "[[Trial of the Princesses]]".
