title: Card Trivia:Mecha Phantom Beast Concoruda
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Concorde|Aérospatiale-BAC Concorde]] and [[Wikipedia:Garuda|Garuda]].
  * This is the first "[[Mecha Phantom Beast]]" that protects [[Token]]s from destruction, rather than itself.
  * This is the first "Mecha Phantom Beast" [[Synchro Monster]].
  * This monster appears in the artwork of "[[Sonic Boom]]", which makes sense since the Concorde was a supersonic passenger airplane.
  * This monster, "[[Mecha Phantom Beast Sabre Hawk]]", "[[Mecha Phantom Beast Turtletracer]]", and "[[Mecha Phantom Beast Jaculuslan]]" are the only "Mecha Phantom Beast" monsters without effects that Special Summon "[[Mecha Phantom Beast Token]]s".
  ** Fittingly, their artworks reflect this with "Mecha Phantom Beast Tokens" being nonexistent in them.
