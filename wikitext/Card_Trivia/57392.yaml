title: Card Trivia:Breath of Light
wikitext: |-
  {{Navigation}}

  * This card is based on the process of [[wikipedia:erosion|erosion]], where rocks are over time broken down by the elements like water and wind.
  * This card has several [[counterpart]]s that destroy a specific [[Type]] of [[monster]]:
  ** [[Fiend]]: "[[Exile of the Wicked]]"
  ** [[Fish]]: "[[Eternal Drought]]"
  ** [[Insect]]: "[[Eradicating Aerosol]]"
  ** [[Machine]]: "[[Acid Rain]]"
  ** [[Spellcaster]]: "[[Last Day of Witch]]"
  ** [[Warrior]]: "[[Warrior Elimination]]"
