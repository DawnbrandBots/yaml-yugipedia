title: Card Trivia:Pig Iron vs. Pen Peg
wikitext: |-
  {{Navigation}}

  * This card's name is a multi-layered pun derived from 豚 (''ton''), "pig", and the [[wikipedia:Tonne|metric ton]]—whose symbol of a lowercase '''t''' can be seen on the pig's helmet.
  ** ''Tonton'' (とんとん) also translates to "break even", the point in which profits and losses are equalized, referencing this card's ability to reset a monster's stats at the cost of LP, and to Set itself from the GY when both players have the same LP.
  ** This pun is also used in the name of the ''[[Capsule Monster Chess]]'' piece, "[[Megaton]]".
