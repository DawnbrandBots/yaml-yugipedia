title: Card Trivia:Building a Diorama
wikitext: |-
  {{Navigation}}

  * This Skill references the diorama [[Ryo Bakura (manga)|Ryo Bakura]] builds at the end of the [[Monster World (arc)|''Monster World'' arc]] of the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'' manga]].
  ** The Skill requiring the player to [[Ritual Summon]] a [[Level]] 8 or higher [[Ritual Monster]] references [[Dark Master Zorc]], the antagonist of ''[[Monster World]]'', whose ''[[OCG]]''/''[[TCG]]'' counterpart "[[Dark Master - Zorc]]" is a Level 8 Ritual Monster.
