title: Card Trivia:Helios - The Primordial Sun
wikitext: |-
  {{Navigation}}

  * This is the first of the three "[[Helios]]" monsters ('''"Helios - The Primordial Sun"''' > "[[Helios Duo Megistus]]" > "[[Helios Trice Megistus]]").
  * Prior to the release of the "[[Impcantation]]" monsters, this monster and its two evolved forms, "Helios Duo Megistus" and "Helios Trice Megistus", were the only [[LIGHT]] [[Pyro]] monsters in the ''[[OCG]]''/''[[TCG]]''.
