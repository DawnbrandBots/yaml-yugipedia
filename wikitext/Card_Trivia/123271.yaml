title: Card Trivia:Timaeus the Knight of Destiny
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Collectors Pack: Duelist of Destiny Version]]''.
  * An [[wikipedia:Infinity symbol|infinity symbol]] appears in the background of this card's artwork, reflecting how this monster gained infinite [[ATK]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** In the ''[[OCG]]''/''[[TCG]]'', this monster's original ATK and [[DEF]] are undefined (?) in reference to the concept of this monster having infinite ATK and DEF, as they can become equal to the monster with the highest ATK on the [[field]]. In {{episode|Yu-Gi-Oh!|182|ref}}, this monster's ATK became the combined total ATK of the three "[[Legendary Knight]]s" used to [[Fusion Summon]] it, with "[[Legendary Knight Hermos (anime)|Legendary Knight Hermos]]" having infinite ATK via a combination of its effect and the effect of "[[Legendary Knight Critias (anime)|Legendary Knight Critias]]", which became equal to the [[original ATK]] (∞) of "[[Divine Serpent Geh (anime)|Divine Serpent Geh]]".
