title: Card Trivia:Satellarknight Skybridge
wikitext: |-
  {{Navigation}}

  * "[[Satellarknight Altair]]" and "[[Satellarknight Vega]]" appear in this card's artwork.
  * This card is based on the [[wikipedia:The Weaver Girl and the Cowherd|"The Weaver Girl and the Cowherd"]], a Chinese folklore tale. The lovers Niulang and Zhinu (represented by the aforementioned "[[tellarknight]]" monsters and the stars they are based off, respectively) are separated by the Silver River (i.e. the [[wikipedia:Milky Way|Milky Way]]), and can meet only once a year (a parallel for this card's "once per turn" restriction), when a flock of magpies promise to make a 'bridge' out of their wings (akin to the one shown in this card's artwork) so that Zhinu can cross.
