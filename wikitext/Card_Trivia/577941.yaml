title: Card Trivia:Cyber Angel Izana
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Merciful Machine Angel]]".
  * This monster is based on '''[[wikipedia:Ishana|Ishana]]''', a deity in Indian mythology and guardian of the northeast. Ishana is depicted as a pale-colored deity with three eyes, wielding a trident, and wearing a celestial crown, similar to this monster's designs.
