title: Card Trivia:Unleashing the Sacred Beasts
wikitext: |-
  {{Navigation}}

  * The cards "[[Hamon, Lord of Striking Thunder]]", "[[Raviel, Lord of Phantasms]]", and "[[Uria, Lord of Searing Flames]]" appear in this card's artwork.
  ** This card's artwork depicts the second ''[[OCG]]''/''[[TCG]]'' artwork of "Uria, Lord of Searing Flames", while the artworks of "Hamon, Lord of Striking Thunder" and "Raviel, Lord of Phantasms" remain blank, referencing how, before this card's reveal in the ''OCG'', "Uria" was released with its remade anime artwork in ''[[Limited Pack GX: Slifer Red]]''.
