title: Card Trivia:Qliphort Helix
wikitext: |-
  {{Navigation}}

  * This card's Japanese name contains ゲノム ''genomu'', a pun on "genome" and "Chemdah" (ケムダー ''Kemudā'' "avarice"), the eighth [[wikipedia:Qliphoth|Qliphoth]] emanation which is associated with the [[wikipedia:Devil|Devil]] [[wikipedia:Adramelech|Adramelech]].
  * Like other "[[Qli]]" monsters that are somehow or somewhat related to [[wikipedia:Computing|computing]], "Genome" refers to the [[wikipedia:Genome|genomes]] of biological organisms, as they bear resemblance with how [[wikipedia:Computer|computers]] store their [[wikipedia:Data (computing)|data]].
  ** The intertwined gold and silver lines that make up this monster's body could be a reference to the double-helix structure of [[wikipedia:DNA|DNA]].
