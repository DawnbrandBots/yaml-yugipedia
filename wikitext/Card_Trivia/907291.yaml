title: Card Trivia:Cupid Fore
wikitext: |-
  {{Navigation}}

  * This monster's name and design reference the sport of [[wikipedia:Golf|golf]], with this monster's outfit being based on that worn by golf players, and the [[wikipedia:Golf ball|titular ball]] being used as the tip of this monster's arrow.
  ** This monster's Japanese name, "Gold Cupit" (コウ・キューピット, ''Kō Kyūpitto'') is a pun on the Japanese name for "golf" (孔球, ''kōkyū'').
  ** This monster's ''[[TCG]]'' name is based on "[[wikipedia:Fore (golf)|fore]]", the term used in the sport of golf to alert the other players of oncoming golf balls.
  ** This monster is depicted hitting the arrow with her bow in a manner similar to a gold swing, while the [[wikipedia:Quiver|quiver]] held by the [[wikipedia:Caddy|caddy]] is based on a golf bag.
