title: Card Trivia:Crashbug (card)
wikitext: |-
  {{Navigation|mode=nonGame|Crashbug}}

  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, a gigantic version of this monster appears as a [[wikipedia:QR Code|QR code]], that can be read by the [[Duel Gazer]].
  ** In the anime, [[Mr. Kay]] hacked the city's mainframe to arrange the [[Heartland City]] matrix into creating the QR code, which resembles this monster's head.
  ** Scanning the QR code also gives the number "06811834". The last two digits of the passcode, "34", references "[[Number 34: Terror-Byte]]", the "[[Number]]" monster that influenced Mr. Kay to release the [[Crashbug Virus]] and create the QR code for the giant hologram of this monster in ''Yu-Gi-Oh! ZEXAL'' episodes '''[[Yu-Gi-Oh! ZEXAL - Episode 003|3]]''' and '''[[Yu-Gi-Oh! ZEXAL - Episode 004|4]]'''.
  * Despite this card's [[flavor text]] describing this monster as an "[[LIGHT|electrical]] [[fairy]]" that brings happiness, it is a [[DARK]] [[Fiend]] monster like the other members of the [[Crashbug]] [[series]].
