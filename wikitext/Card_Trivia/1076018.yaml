  [[File:The Duelists Of Death.png|thumb|400px|The Duelists of Death in the anime.]]
  * "[[Chaos Sorcerer]]", "[[Evil HERO Neos Lord]]", "[[Guardian Baou]]", "[[Skilled Dark Magician]]", "[[Skilled White Magician]]", and "[[Skull Knight]]" appear in this card's artwork.
  ** This card's artwork is a reference to [[The Supreme King|the Supreme King]] and [[the Duelists of Death]], the commanders of [[The Supreme King's Army|his army]], who went on a conquest across the [[Duel Monsters Spirit World]] during the [[Dimension World]] arc in the ''[[Yu-Gi-Oh! GX]]'' anime.
