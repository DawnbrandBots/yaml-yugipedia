title: Card Trivia:Snowman Creator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Shateki]]" (on a postery).
  * "[[Snowman Eater]]" and a number of copies of the snowman from the artwork of "Snowman Eater" appear in this card's artwork.
  * This monster's appearance is based on a ''[[wikipedia:Kakigōri|kakigōri]]'' maker, a cranked machine that spins a block of ice over a shaving blade to create shaved ice.
