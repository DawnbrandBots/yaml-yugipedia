title: Card Trivia:Artifact Moralltach
wikitext: |-
  {{Navigation}}

  * This card is named after "Moralltach" (which means "The Great Fury"), a sword that is said to be owned by [[wikipedia:Aengus|Aengus]], a member of the [[wikipedia:Tuatha Dé Danann|Tuatha Dé Danann]] in [[wikipedia:Irish mythology|Irish mythology]]. Along and its sibling blade, Beagalltach, are also mentioned in connection with Aengus's fosterling [[wikipedia:Diarmuid Ua Duibhne|Diarmuid Ua Duibhne]].
  ** This monster combines with "[[Artifact Beagalltach]]" to form "[[Artifact Durandal]]", supporting the relationship between "Moralltach" and "Beagalltach". Also, this card's ATK and DEF are the reverse of that of "Beagalltach", and the stance of the spirits in each artwork is mirrored.
  * This artifact appears in the artwork of the card "[[Artifact Sanctum]]".
