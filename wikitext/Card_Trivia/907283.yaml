title: Card Trivia:Therion "Reaper" Fum
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Therion Charge]]".
  * This monster is named after [[wikipedia:Beta Piscium|Fumalsamakah]], a star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Pisces (constellation)|Pisces]].
  ** This monster's design features a fish-like tail and two fish-shaped blasters, referencing how Pisces is also known as the "fish" constellation.
  *** This monster's two fish-shaped blasters are also based on the old astronomical symbol of the constellation of Pisces, a pair of twin fishes connected by a cord (♓︎).
