title: Card Trivia:Soul Fist
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This card's artwork depicts the [[Legendary Signer]] using [[Blazing Soul]], a power used by the former and [[Jack Atlas]] during the battles against [[Red Nova]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** Fittingly, the [[Jack Atlas (ARC-V)|Jack Atlas]] from the ''[[Yu-Gi-Oh! ARC-V]]'' anime uses this card against [[Sergey Volkov]], who controlled a [[Earthbound Servant Geo Grasha|crimson-colored]] "[[Earthbound]]" [[Fusion Monster]] at the time.
  *** The Jack Atlas from ''5D's'' used Blazing Soul to seal away Red Nova and then grant its power to "[[Red Dragon Archfiend]]" to win the duel. The Jack Atlas from ''ARC-V'' used this card to similar effect, replacing Red Nova and "Red Dragon Archfiend" with "[[Earthbound Servant Geo Grasha]]" and "[[Scarlight Red Dragon Archfiend]]", respectively.
  * This card's Japanese name could also be "Engrave Soul Right", as it depicts a ''right'' hand, which is the hand the Blazing Soul mark appeared on for both users, as well as the arm of "Scarlight Red Dragon Archfiend" that is scarred.
