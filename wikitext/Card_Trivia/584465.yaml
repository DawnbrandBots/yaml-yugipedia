title: Card Trivia:Knightmare Incarnation Idlee
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Guardragon Reincarnation]]", "[[Orcust Crescendo]]", and "[[World Legacy Monstrosity]]".
  * According to ''[[Master Guide 6 card storylines]]'', the soul of "[[Lee the World Chalice Fairy]]" seized control over "[[Galatea, the Orcust Automaton]]" and merged with the corpse of "[[Crowned by the World Chalice]]" and five of the [[Guardragon]]s ("[[Guardragon Agarpain|Agarpain]]", "[[Guardragon Elpy|Elpy]]", "[[Guardragon Garmides|Garmides]]", "[[Guardragon Pisty|Pisty]]", and "[[Guardragon Promineses|Promineses]]"), revealing herself as "[[Orcust Knightmare]]" before transforming into "Knightmare Incarnation Idlee".
  ** This monster's [[equal ATK and DEF|equal]] [[original ATK and DEF]] (2100/2100) are the sum of the [[ATK]] (100) and [[DEF]] (2000) of "Lee the World Chalice Fairy".
  ** This monster's weapon is a combination of the staff of "Crowned by the World Chalice" and the scythe of "Galatea, the Orcust Automaton" (originally one of the blades of "[[Mekk-Knight Blue Sky]]").
  * This monster's Japanese name (イドリース, ''Idorīsu'') is named after the Islamic prophet [[wikipedia:Idris (prophet)|Idris]], who is identified with the biblical [[wikipedia:Enoch|Enoch]].
  ** The kanji 夢幻 (lit. "fantasy") in this monster's Japanese name is a reference to the dream theme of the "[[Knightmare]]" [[archetype]].
  * This monster's goddess-like design is similar to that of "[[Sophia, Goddess of Rebirth]]".
  ** The gem on her forehead and her horns are nearly identical to the ones of "Sophia".
  ** The cracks on her arms are similar to the pattern on the arms of "Sophia" emanating from the powers of "Creation" and "Destruction".
  ** Her translucent wings are similar to the wings of "Sophia".
  ** Her tail is similar to the tail of "[[Tierra, Source of Destruction]]" (a counterpart of "Sophia).
  ** The kanji 星 (lit. "star") in this monster's Japanese name is shared with the Japanese names of "Sophia" and "Tierra".
  *** The kanji is also shared with the Japanese name of the "[[World Legacy]]" archetype, "Star Relic" ({{Ruby|星|せい}}{{Ruby|遺|い}}{{Ruby|物|ぶつ}} ''Seiibutsu'').
