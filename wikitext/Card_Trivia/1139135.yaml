title: Card Trivia:Mazera, Devil of the Den
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Crossroads of Zera]]".
  * This monster is a [[retrained]] ''[[Rush Duel]]'' counterpart of "[[Mazera DeVille]]".
  ** This monster's title references the Japanese title of "[[Pandemonium]]", "Devil's Den". Fittingly, this monster's effect to randomly [[send]] up to three cards from the opponent's [[hand]] to the [[Graveyard]] is based on the effect of "Mazera DeVille", which can only be applied while "Pandemonium" is [[face-up]] on the player's [[field]].
