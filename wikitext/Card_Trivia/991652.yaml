title: Card Trivia:Seventh Eternity
wikitext: |-
  {{Navigation}}

  [[File:Number101andNumberC101.png|thumb|right|200|The inspiration for this card's artwork, from {{episode|ZEXAL|139|ref}}.]]

  * "[[Number 101: Silent Honor ARK]]" and "[[Number C101: Silent Honor DARK]]" appear in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|ZEXAL|139|ref}} where "[[Number C101: Silent Honor DARK (anime)|Number C101: Silent Honor DARK]]" and "[[Number 101: Silent Honor ARK (anime)|Number 101: Silent Honor ARK]]" are standing side-by-side.
  * This card's second bulleted effect references to the fourth effect of "Number C101" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, used in the above-mentioned episode, where [[Nash]] uses the [[effect]] of "Number C101" to [[detach]] "Number 101", then [[Special Summon]] "Number 101" from his [[Graveyard]].
  ** This wouldn't be possible in the ''[[OCG]]''/''[[TCG]]'', since Nash had no valid targets in his Graveyard when he activated the effect of "Number C101." This card's second effect recreates Nash's play, as it can detach "Number 101" from "Number C101", and then Special Summon "Number 101" from the Graveyard with the optional portion of the effect.

