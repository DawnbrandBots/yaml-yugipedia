title: Card Trivia:Battlewasp - Sting the Poison
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Armed Rebeellion]]", "[[Battlewasp - Grand Partisan the Revolution]]", and "[[Summoning Swarm]]".
  * This monster is named after a [[wikipedia:Stinger|stinger]], a sharp organ commonly found in stinging insects such as wasps, which can inject venom stored in its lower abdomen.
  ** This monster's Japanese name, "Needle the Stinger", is based on a [[wikipedia:Needld|needle]], a small and slender lengthy tool made of metal with a point-tipped end.
