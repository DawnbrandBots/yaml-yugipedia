title: Card Trivia:Goyo Catapult
wikitext: |-
  {{Navigation}}

  * This card is the only "[[Goyo]]" monster to not be released in the ''[[OCG]]''/''[[TCG]]''.
  ** It is also the only "Goyo" monster without an effect that either [[Special Summon]]s a monster or switches [[control]] of an opponent's monster.
  * This "Goyo" monster has both the lowest [[ATK]] and the highest [[DEF]].
