title: Card Trivia:Sevens Road Mage
wikitext: |-
  {{Navigation}}

  * The seven colored circles projected into the air in front of this monster correspond to the colors of each of the seven main [[Sevens Road]] monsters. This card's artwork also features seven cross-shaped symbols, referencing the "7" motif of the Sevens Road [[series]].
  ** The concentric rings inside each of the circles also appear in the artwork of "[[Sevens Road Ultima Witch]]" inside and around her staff.
  *** Each of the outermost rings includes 1 to 7 smaller circles, with the order reversed and offset by 1 compared to the order of the main Sevens Road monsters. As a result, "[[Sevens Road Witch]]" has 7 circles instead of "[[Sevens Road Magician]]", referencing "Ultima Witch".
  ** This symbol also appears in the artwork of artworks of "[[Majesty of the Sevens Road]]" and "[[Master of the Sevens Road]]".
  *** The ordering of the symbols in the artwork of "Master of the Sevens Road" suggests that this monster corresponds to the upper right symbol in the Sevens Road crest. When "[[Master of the Sevens Road (anime)|Master of the Sevens Road]]" appears in the anime, the order of the symbols is reversed, so it instead appears to correspond to the lower left symbol.

  * This monster has a [[Celeb Rose]] [[counterpart]]: "[[Celeb Rose Mage]]".
  ** Both cards feature the same [[Level]] (2), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (800/800).
