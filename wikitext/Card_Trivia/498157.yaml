title: Card Trivia:Mixeroid
wikitext: |-
  {{Navigation}}

  * The orange monsters and the blue swirling patterns from the artwork of "[[Polymerization]]" appear as part of this monster's design.
  * This monster is based on a [[wikipedia:cement mixer|cement mixer]], a construction vehicle that can store and transport cement while mixing its components, which reflects its effect to [[Special Summon]] a "[[roid]]" [[Fusion Monster]] from the [[Extra Deck]] whose [[Level]] is equal to those of its "components" it "mixes" in the [[Graveyard]].
