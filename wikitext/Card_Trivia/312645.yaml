title: Card Trivia:Constellar Tempest
wikitext: |-
  {{Navigation}}

  * The crest of the "[[Constellar]]" [[archetype]] appears in this card's artwork.
  * This is the first "Constellar" card to debut in the anime.
  * In the Spanish ''[[TCG]]'', this card kept the word "and" untranslated in the line "''puedes seleccionar 1 Monstruo Xyz "Constelación" que controles '''and''' 1 monstruo "Constelación" en tu Cementerio''" ("''You can target 1 "Constellar" Xyz Monster you control and 1 "Constellar" monster in your Graveyard''").
