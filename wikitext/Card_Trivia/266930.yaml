title: Card Trivia:Starliege Lord Galaxion
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of "[[Starliege Paladynamo]]".
  * The kanji 「{{Ruby|輝|き}}{{Ruby|光|こう}}{{Ruby|帝|てい}}」 (''Kikōtei'', "Radiant-Light") in this monster's Japanese name is a homophone of the Japanese name of the "[[Meklord Emperor]]" [[archetype]], "Machine Emperor" ({{Ruby|機|き}}{{Ruby|皇|こう}}{{Ruby|帝|てい}}, ''Kikōtei'').
