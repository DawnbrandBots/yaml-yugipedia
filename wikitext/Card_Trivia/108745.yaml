title: Card Trivia:Majestic Mech - Goryu
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[War of the Giants Reinforcements]]'' and ''[[War of the Giants: Round 2]]''.
  * "Majestic Mech - Goryu" is named after Koryu (蛟竜), a Japanese midget submarine which existed in World War II.
  * This card resembles a [[Dragon]] in appearance and a [[Machine]] in body structure.
  * This card is the [[LIGHT]] [[Fairy]] counterpart of "[[Pyrotech Mech - Shiryu]]".  They both have the same [[Level]], [[ATK]], [[DEF]], [[Summoning condition]]s, and [[piercing]] effect. They also have a negative effect that activates during the [[End Phase]] when [[Tribute Summon]]ed with 1 [[Tribute]].
