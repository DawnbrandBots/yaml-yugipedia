title: Card Trivia:Trickstar Narkissus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Trickstar Bouquet]]" and "[[Trickstar Cascade]]".
  * This monster's name is based on the ''[[wikipedia:Narcissus (plant)|Narcissus]]'', a species of toxic perennial flowering plants, which appears as the symbols on the corners of this card's artwork.
  ** This monster's name is a portmanteau of the words "''Narcissus''", and "kiss". The latter is reflected in this card's artwork, which depicts this monster making a [[wikipedia:Air kiss|blow kiss]] gesture.
