title: Card Trivia:Ninjitsu Art of Mosquito Repellent
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Number 2: Ninja Shadow Mosquito]]" appears in this card's artwork.
  * This card's Japanese name, "Mosquito Science Ninjitsu - Mosquito Repellent Flash" (蚊学忍法・蚊取り閃光 ''Kagaku Ninpō Katori Senkō'') features the word "''kagaku''", the Japanese word for "science," with the first kanji ''ka'' (化) replaced with the similar-sounding kanji ''ka'' (蚊) meaning "mosquito". This naming scheme references the "Science Ninja Art" from the 1972 anime series, ''[[wikipedia:Science Ninja Team Gatchaman|Science Ninja Team Gatchaman]]''.
  ** "Mosquito Repellant Flash" (蚊取り閃光 ''Katori Senkō'') is also a homophone of [[wikipedia:mosquito coil|mosquito coil]] (蚊取り線香 ''Katorisenkō''). Fittingly, in {{episode|ZEXAL|117|ref}}, when this card's damaging effect is [[activate]]d, it creates an explosive fuse that resembles a mosquito repellant coil.
