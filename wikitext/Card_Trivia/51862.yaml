title: Card Trivia:Dark Summoning Beast
wikitext: |-
  {{Navigation}}

  * This monster is a physical amalgam of the three "[[Sacred Beast]]s", including the body of "[[Hamon, Lord of Striking Thunder]]", the head of "[[Raviel, Lord of Phantasms]]", and the wings of "[[Uria, Lord of Searing Flames]]".
  * In ''[[Yu-Gi-Oh! GX Tag Force 3]]'', this monster's name is '''Lord of Dark Summons'''. Its effect allows it to [[Special Summon]] only one Sacred Beast, which must be correctly [[Summon]]ed before being '''Summoned'''.
