title: Card Trivia:Mirror Mage of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * "[[Mirror of the Ice Barrier]]" and three "[[Ice Barrier Token]]s" appear in this card's artwork.
  * This monster is the younger form of "[[Prior of the Ice Barrier]]". 
  * This monster is responsible for sealing "[[Lancea, Ancestral Dragon of the Ice Mountain]]", alongside his best friend "[[Georgius, Swordman of the Ice Barrier]]".
