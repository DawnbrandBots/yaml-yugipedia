title: Card Trivia:Lunalight Perfume Dancer
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "[[Luna Light Perfume]]", a [[Spell Card]] that [[support]]s the "[[Lunalight]]" [[archetype]], but does not share the archetype's naming scheme.
  ** This monster's name and effect to [[search]] for "Luna Light Perfume" are based on how this monster likely uses the perfume for her dances, which can be seen emanating from her body.
