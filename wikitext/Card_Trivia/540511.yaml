title: Card Trivia:Exodius the Ultimate Forbidden Lord
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Creation Pack 05]]''.
  * This monster appears in the artworks of "[[Defense Seal Wall]]", "[[Rage of the Forbidden One]]", and "[[Ritual of the Ultimate Forbidden Lord]]".
  * This monster is a [[Card evolutions|complete]] form of "[[Exodia the Forbidden One]]".
  ** This monster is the first and currently only form of "Exodia" to have exposed skin, as seen by the details on its exposed hands and feet.
  ** In the English version of the ''[[Yu-Gi-Oh! GX]]'' anime, [[Adrian Gecko]] states that [[Exodius the Ultimate Forbidden Lord (anime)|this monster]] is a distant cousin of "[[Exodia the Forbidden One (anime)|Exodia the Forbidden One]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Special Summon]]ing requirement by [[shuffle|shuffling]] all monsters from the [[Graveyard]] into the [[Deck]] is based on its appearance in the ''[[Yu-Gi-Oh! GX]]'' anime, when this card was Special Summoned by the effect of "Ritual of the Ultimate Forbidden Lord", which required the player to return all "[[Forbidden One]]" monsters in the Graveyard to the Deck.
  ** Also, this card's effect [[support]]ing [[Normal Monster]]s is a reference to the "Forbidden One" Normal Monsters, which increases this card's [[ATK]] by 1000.
  * In the ''Yu-Gi-Oh! GX'' anime, when this monster attacks, its attacking arm grows larger.
  * A poll held by ''[[Shonen Jump]]'' magazine suggested that this monster's English name would be "Exodius, the Ultimate Forbidden One", which was also its name in the English version of the ''[[Yu-Gi-Oh! World Championship 2008]]'' videogame.
  * This card's first English print as the [[Shonen Jump May 2008 subscription bonus|''Shonen Jump'' May 2008 subscription bonus]] features an error, as the circle used to indicate its [[DARK]] [[Attribute]] was mistakenly printed with the circle used to indicate [[Trap Card]]s. This was later corrected on its [[reprint]] in ''[[Collectible Tins 2010 Wave 2]]''.
