title: Card Trivia:Duality
wikitext: |-
  {{Navigation}}

  * Outlines of the wings of "[[Dark End Dragon]]" and "[[Light End Dragon]]" appear in this card's ''[[OCG]]''/''[[TCG]]'' artwork.
  ** Additionally, the backgrounds of the two halves of this card's artwork resemble the backgrounds of the ''OCG''/''TCG'' artworks of "Dark End Dragon" and "Light End Dragon".
  * In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this card could only [[Special Summon]] from the [[hand]], and was used to Special Summon "[[Light End Dragon (manga)|Light End Dragon]]" from [[Chazz Princeton (manga)|Chazz Princeton]]'s hand by [[Tribute|Tributing]] "[[Dark End Dragon (manga)|Dark End Dragon]]" (which are both Main Deck monsters in the manga). In the ''OCG''/''TCG'', this card can Special Summon from either the hand or [[Extra Deck]], since "Dark End Dragon" and "Light End Dragon" are [[Synchro Monster]]s in the ''OCG''/''TCG'', and so they cannot exist in the hand.
