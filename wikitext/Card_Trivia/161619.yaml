title: Card Trivia:Shooting Quasar Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Limit Overdrive]]".
  * Six different colored [[Synchro Summon]]ing rings from the ''[[Yu-Gi-Oh! 5D's]]'' anime appear in this card's artwork.
  ** The six Synchro Summoning rings reference the six [[Signer Dragon]]s associated with this monster in the ''Yu-Gi-Oh! 5D's'' anime, while the different colors correspond with Signer Dragons' respective color schemes from left to right: "[[Black-Winged Dragon]]" (black), "[[Black Rose Dragon]]" (maroon), "[[Red Dragon Archfiend]]" (red), "[[Ancient Fairy Dragon]]" (green), "[[Life Stream Dragon]]" (yellow), and "[[Stardust Dragon]]" (white).
  * This monster is named after a [[wikipedia:Quasar|quasar]], a subclass of a super bright celestial object powered by a [[wikipedia:Supermassive black hole|supermassive black hole]] in the center of a [[wikipedia:Galaxy|galaxy]].
  ** Fittingly, in {{episode|5D's|150|ref}}, when this monster was [[Summon]]ed and descended from above the sky, it was similar to an actual quasar.
  * This monster is an [[Card evolutions|upgraded]] [[Limit Over Accel Synchro Monster|Limit Over Accel Synchro]] form of "Stardust Dragon".
  * This monster has a [[Duel Dragon]] [[counterpart]]: "[[Stardust Sifr Divine Dragon]]".
  * This monster has a [[Delta Accel Synchro Monster|Delta Accel Synchro]] counterpart: "[[Cosmic Blazar Dragon]]".
  ** Both are named after a subclass of an [[Wikipedia:Active galactic nucleus|active galactic nucleus]] located in an active galaxy.
  ** Both share the same [[Level]] (12), [[Type]] ([[Dragon]]), [[Monster card type]] ([[Accel Synchro Monster]]), [[equal ATK and DEF|equal]] [[original ATK and DEF]] (4000), and [[Summoning condition]]s (1 [[Tuner Synchro Monster]] + 2+ non-[[Tuner monster|Tuner]] [[Synchro Monster]]s).
  ** Both are depicted in opposite poses in their respective card artworks: this monster is depicted going up to the right, with its head turned to the left, while "Cosmic Blazar Dragon" is depicted going down to the left, with its head turned to the right.
  ** This is the ultimate [[signature card]] of [[Yusei Fudo]] in the new timeline of the ''Yu-Gi-Oh! 5D's'' anime, while "[[Cosmic Blazar Dragon (anime)|Cosmic Blazar Dragon]]" was his ultimate signature card in the original timeline.
  ** However, unlike this monster, "Cosmic Blazar Dragon" is a [[WIND]] monster like "Stardust Dragon".
  ** These two monsters share a [[retrain]]: "[[Cosmic Quasar Dragon]]" 
  * This monster's body is similar to that of the "[[Timelord]]" monsters.
  ** Fittingly, in the aforementioned episode of the ''Yu-Gi-Oh! 5D's'' anime, this monster was used by Yusei Fudo during his Duel against [[Z-one]], who used the "Timelord" [[archetype]].
