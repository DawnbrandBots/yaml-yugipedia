title: Card Trivia:Invoked Babalon
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Babalon|Babalon]], a goddess in the occult system of [[wikipedia:Thelema|Thelema]] and a reinterpretation of the biblical [[wikipedia:Whore of Babylon|Whore of Babylon]].
  ** Fittingly, this monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Virakam the Artificial Spirit]]", who is based on Soror Virakam, the alternate name of Mary d'Este Sturges, whom [[wikipedia:Aleister Crowley|Aleister Crowley]] believed to be one of his "Scarlet Women", the earthly incarnations of Babalon.
