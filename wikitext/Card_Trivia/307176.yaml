title: Card Trivia:Black Brachios
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Survival's End]]".
  * This monster is based on the ''[[wikipedia:Brachiosaurus|Brachiosaurus]]'', a genus of [[wikipedia:Sauropoda|sauropod]] dinosaurs.
  ** This monster's appearance references "[[Black Tyranno]]", a [[Dinosaur]] monster with a predominantly black color scheme. This monster's effect to switch an opponent's monster to [[Defense Position]] is designed to work with the effect of "Black Tyranno", which can attack the opponent directly if they control only Defense Position monsters.
