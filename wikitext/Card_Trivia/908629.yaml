title: Card Trivia:Speaker for the Ice Barriers
wikitext: |-
  {{Navigation}}

  * "[[Defender of the Ice Barrier]]" appears in this card's artwork.
  * This monster appears to be a younger version of "[[Gishki Ariel]]", as indicated by their similar neck rings, blue hair, hair-attached tassels, and similarly-colored robes, as well as their identical Types, Attributes, Levels, ATK, and DEF.
  ** She also appears in the artwork of "[[After the Storm]]".
