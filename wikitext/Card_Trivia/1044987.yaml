title: Card Trivia:Bluetech Burst Rex
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Burst Rex of Awakening]]''.
  * Visually, this monster is "[[Blue-Fang Burst Dragon]]" wearing armor based on "[[Jointech Rex]]".
  ** In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, this monster represented the sibling bond of [[Yuamu]] and [[Yuhi Ohdo]], the owners of the aforementioned monsters.
  * This monster has a [[DARK]] [[Jointech]] counterpart: "[[Jointech Burst Dragon]]".
