title: Card Trivia:Icejade Tremora
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to [[wikipedia:Tremolite|tremolite]], a silicate mineral sometimes used as the gemstone [[wikipedia:Nephrite|nephrite]], one of the types of [[wikipedia:Jade|jade]].
  * This monster appears in the artwork of "[[Icejade Cradle]]".
  * Clockwise, the artworks of "[[The Iris Swordsoul]]", "[[Springans Interluder]]", "[[Branded in White]]", "[[Judgment of the Branded]]", "[[Tri-Brigade Stand-Off]]", "[[Branded Bond]]", and "[[Icejade Acti]]" appear in the bubbles in this card's artwork.
  ** A close-up of the face of "Icejade Acti" can also be seen in the bubble below this monster's left arm.
