title: Card Trivia:Digital Bug Websolder
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bug Matrix]]".
  * This monster's name and appearance are puns on "[[wikipedia:Web crawler|web crawler]]" (a computer program that systematically browses the World Wide Web for the purpose of web indexing that is also known as the "spiderbot") and "[[wikipedia:Solder|solder]]" (a low melting alloy used to create a permanent bond between metal workpieces, including circuit boards, whereas this monster's legs are based on [[wikipedia:Soldering iron|soldering irons]]).
