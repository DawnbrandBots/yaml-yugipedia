title: Card Trivia:White Dragon Ninja
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Draconnection]]" and "[[Ninjitsu Art of Shadow Sealing]]"
  * This card is the first non-"[[Karakuri]]" "[[Ninja]]" monster that is not [[Warrior]], being [[Dragon]] instead.
  * This card's artwork resembles the artwork of "[[White Ninja]]". The two monsters also share the same clothing and designs, with the headgear of "White Ninja" being attached to her right arm.
  ** The dragon in this card's artwork resembles the dragon in "[[Dragonic Attack]]". It is very likely that this card is "White Ninja" equipped with the [[Equip Spell Card]] "Dragonic Attack", making her a Dragon-[[Type]] monster.
  *** This card's [[ATK]] is equal to "White Ninja" equipped with "Dragonic Attack" and "[[Fuhma Shuriken]]".
  ** This card is a "[[Dragon Ninja]]" [[counterpart]] to "White Ninja". Coincidentally, this card can be Summoned using "White Ninja" and "[[Ninjitsu Art of Super-Transformation]]".
  * This monster is the only female "Dragon Ninja" monster.
  * The colors represented by "[[Red Dragon Ninja]]", "White Dragon Ninja", and "[[Blue Dragon Ninja]]" are the same of the flag of the United States of America and the Union Jack. Coincidentally, these three monsters were first released as [[TCG-only|TCG-exclusive]] cards, in America and Europe, before being released in the ''[[OCG]]''.
