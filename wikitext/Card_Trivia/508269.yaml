title: Card Trivia:Harpies' Hunting Ground
wikitext: |-
  {{Navigation}}

  * "[[Harpie Lady 1]]" ([[equip]]ped with "[[Electro-Whip]]") and "[[Ojama Black]]", "[[Ojama Green]]", and "[[Ojama Yellow]]" appear in this card's artwork.
  * This card is mentioned in the [[flavor text]] of "[[Phantom Gryphon]]".
  * In the first six entries of the ''[[Yu-Gi-Oh! Tag Force]]'' video game series, when this card is [[activate]]d, it plays an animation where the three "[[Ojama]]" monsters in this card's artwork circle around "Harpie Lady" in formation and defeats it.
  ** However, in ''[[Yu-Gi-Oh! GX Tag Force 2]]'', when this card is activated, the three "Ojama" monsters in this card's artwork attempt to jump onto the back of "Harpie Lady" only to be thrown off and scattered as she swipes at them. 
  * The ''[[Rise of Destiny]]'' Spanish print of this card has a small typo in its name, as it's printed as "''Territorio de Caza de las Arp'''i'''as''" instead of "''Territorio de Caza de las Arp'''í'''as''".
  * This card's artwork is based on a panel from {{chapter|Yu-Gi-Oh!|116|ref}} where "[[Dark Magician (manga)|Dark Magician]]" attempts to attack "[[Harpy Lady (manga)|Harpy Lady]]".

