title: Card Trivia:Tenyi Spirit - Vishuda
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vessel for the Dragon Cycle]]".
  * This card's name is based on the [[wikipedia:Chakra|Chakra]] [[wikipedia:Chakra|Vishudda]], which is associated with [[wikipedia:Akasha|Akasha]], meaning "space" or sometimes "cosmos", which itself is associated with darkness, hence this card's [[Attribute]] of [[DARK]].
