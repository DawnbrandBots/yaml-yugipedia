title: Card Trivia:Dragon Zombie
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Army of the Haunted]]", "[[Deadly Zombie Breath]]", and "[[Ectoplasmic Fortification]]".
  * This monster is the [[Zombie counterpart]] of "[[Crawling Dragon]]".
  ** In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], this monster was "Crawling Dragon" affected by "[[Call of the Haunted]]".
  ** In {{episode|Yu-Gi-Oh!|079|ref}}, this card was seen as a [[Normal Monster]], like in the ''[[OCG]]''/''[[TCG]]''.
  * This monster, "[[Armored Zombie]]", and "[[Clown Zombie]]" are the only Zombie counterparts to have two [[Level]]s less than their original counterparts.
  * The [[Dragon Zombie (Bandai)|Bandai version]] of this card is a [[Level 5]] [[Fiend]] monster with 2400 [[ATK]] and 400 [[DEF]], while the [[Konami]] version is a [[Level 3]] [[Zombie]] monster with 1600 ATK and 0 DEF.
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from {{chapter|Yu-Gi-Oh!|089|ref}}, specifically from the panel showing "[[Crawling Dragon (manga)|Crawling Dragon]]" being [[Special Summon]]ed from the [[Graveyard]] by the effect of "[[Call of the Haunted (manga)|Call of the Haunted]]".
