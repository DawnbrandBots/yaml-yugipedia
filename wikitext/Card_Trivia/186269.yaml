title: Card Trivia:Evilswarm Ketos
wikitext: |-
  {{Navigation}}

  * This card is the "[[lswarm]]" counterpart of "[[Gishki Shadow]]". It's also a counterpart to "[[Evilswarm O'lantern]]", being an Aqua while "O'antern" is a Pyro, while having an effect that destroys Spells and Traps, while O'lantern" destroys monsters.
  * This card's name is based on [[wikipedia:Ceto|ketos]], the ancient Greek term for sea monsters.
