title: Card Trivia:Duel Evolution - Assault Zone
wikitext: |-
  {{Navigation}}

  * "[[Red Dragon Archfiend/Assault Mode]]", "[[Stardust Dragon/Assault Mode]]", and the [[Kaiba Dome (5D's)|Kaiba Dome]] from the ''[[Yu-Gi-Oh! 5D's]]'' anime appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|5D's|SP1|ref}} (the title in which the first part of this card's name is based on), where "[[Red Dragon Archfiend/Assault Mode (anime)|Red Dragon Archfiend/Assault Mode]]" and "[[Stardust Dragon/Assault Mode (anime)|Stardust Dragon/Assault Mode]]" battle, in which both monsters' energy forms spiral into the sky above the Kaiba Dome.
  * This card's second effect to prevent "[[/Assault Mode]]" monster from being [[destroyed by battle]] and by the opponent's card effects the turn they are [[Special Summon]]ed references the final anime effect of "[[Assault Mode Activate (anime)|Assault Mode Activate]]".

