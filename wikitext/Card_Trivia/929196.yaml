title: Card Trivia:Ursarctic Miktanus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ursarctic Departure]]" and "[[Ursarctic Slider]]".
  * This monster's name is a portmanteau of "micro" and "''Ursus thibetanus''", the Latin name of the [[wikipedia:Asian black bear|Asian black bear]].
