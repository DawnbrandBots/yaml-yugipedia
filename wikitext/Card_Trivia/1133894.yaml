title: Card Trivia:Mystic Lamp
wikitext: |-
  {{Navigation}}

  * This monster is based on a magic lamp, a mystical item primarily featured in a few stories in ''[[wikipedia:One Thousand and One Nights|One Thousand and One Nights]]'', which takes the form of an ordinary [[wikipedia:Oil lamp|oil lamp]] containing a [[wikipedia:Genie|genie]] inside.
