title: Card Trivia:Yamata Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the box of ''[[Duelist Legacy Volume.5]]''.
  * This monster appears in the artworks of "[[Fengsheng Mirror]]" and "[[Last Turn]]".
  * This monster is based on the [[wikipedia:Yamata no Orochi|Yamata no Orochi]], a legendary eight-headed serpent in [[wikipedia:Japanese mythology|Japanese mythology]].
  * This is the first [[Dragon]] [[Spirit monster]], as well as the first [[Level 7]] Spirit monster.
  * This monster has the highest [[original DEF]] (3100) of all Level 7 monsters, as well as the highest original [[DEF]] of all Spirit monsters.
  * This monster's skin appears to have the same texture as the skin on the arms and the jointed limbs on the back of "[[Yamato-no-Kami]]".
