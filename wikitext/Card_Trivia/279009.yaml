title: Card Trivia:Vermillion Sparrow
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Vermilion Bird|Vermilion Bird]], one of the [[wikipedia:Four Symbols|Four Symbols]] appearing among the [[wikipedia:Chinese constellations|Chinese constellations]] along the ecliptic that represents the element of [[Wikipedia:Fire (wuxing)|Fire]], the southern direction, and the season of summer.
