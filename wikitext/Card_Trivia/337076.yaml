title: Card Trivia:Yang Zing Unleashed
wikitext: |-
  {{Navigation}}

  * In this card's artwork "[[Suanni, Fire of the Yang Zing]]" is merging with "[[Bi'an, Earth of the Yang Zing]]" and "[[Chiwen, Light of the Yang Zing]]" to form "[[Baxia, Brightness of the Yang Zing]]", probably a depiction of the latter being Synchro Summoned with this card's effect.
  * This card's name probably reflects the ability this card possesses to Synchro Summon outside of the [[Main Phase]] using "[[Yang Zing]]" monsters.
