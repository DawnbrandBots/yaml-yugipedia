title: Card Trivia:Delta Crow - Anti Reverse
wikitext: |-
  {{Navigation}}

  * "[[Blackwing - Bora the Spear]]", "[[Blackwing - Gale the Whirlwind]]", and "[[Blackwing - Sirocco the Dawn]]".
  ** Fittingly, all three monsters were [[control]]led by [[Crow Hogan]] to be [[activate]]d from his [[hand]] in {{episode|5D's|030|ref}}.
  * The first part of the term "Delta Crow" is based on the Greek uppercase letter "delta" (Δ), which is often depicted as a three-pointed triangle, while the second part is based on the [[wikipedia:Crow|crow]], a species of birds with predominantly black feathers. Since the "[[Blackwing]]" [[archetype]] primarily consists of black-colored birds, this would reflect how this card requires exactly '''three''' "Blackwing" monsters to be activated from the player's hand.
  ** The term "Anti Reverse" references the Japanese name for [[face-down]] [[Spell]]/[[Trap Card]]s, which is known as "reverse cards". Therefore, this term really means "Anti Face-Down", which reflects this card's effect to [[destroy]] the opponent's face-down Spell/Trap Cards.
  * This card is similar to "[[Black Sonic]]", a Trap Card that requires the player to control exactly three "Blackwing" monsters to be [[activate]]d from the hand, and features effects that remove cards from the opponent's [[field]].
