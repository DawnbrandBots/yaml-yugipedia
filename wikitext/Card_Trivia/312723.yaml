title: Card Trivia:Stardust Re-Spark
wikitext: |-
  {{Navigation}}

  * "[[Stardust Spark Dragon]]" appears in this card's artwork.
  * This card's base name translates to something like "The Spark/Ray of Light Stands on the Land Where Stars Fall", though the kanji used for "Spark" are the same as those used in the name for "Stardust Spark Dragon".
