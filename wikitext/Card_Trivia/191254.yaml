title: Card Trivia:Gishki Zielgigas
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spell Wall]]".
  * This monster is "[[Steelswarm Hercules]]" revived as a "[[Gishki]]" monster.
  ** This monster shares the same [[Level]] (10), [[original ATK and DEF]] (3200/0) as "Steelswarm Hercules", as well as an effect that can be [[activate]]d by paying [[Life Points]].
  ** According to the [[Duel Terminal Master Guide card storylines|''Duel Terminal'' Master Guide card storylines]], this monster was brought back from the dead by the power of the "Gishki", who were controlled by the "[[lswarm]]"; it gave the "lswarm" a fighting chance, but they were pushed back by "[[Gem-Knight Master Diamond]]", the ultimate "[[Gem-Knight]]" [[Fusion Monster|Fusion]].
  * This monster has the highest Level (10) and original [[ATK]] (3200) of all [[Aqua]] monsters.
  * This monster and "[[Gishki Psychelone]]" are the only "Gishki" [[Ritual Monster]]s whose names do not feature the prefix "Evi-"; however, this is due to a misprinting, as both monsters have "Evi-" (イビ-) in their Japanese names.
