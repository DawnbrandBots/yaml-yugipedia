title: Card Trivia:Royal Rebel's Superfan
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's Japanese name, "Royal Demon's Stan", is based on a [[wikipedia:Fan (person)#"Stan" fans|stan]], an extremely devoted fan of a celebrity, musician, or public figure, named after the 2000 song "[[Wikipedia:Stan (song)|Stan]]" by American rapper [[wikipedia:Eminem|Eminem]].
