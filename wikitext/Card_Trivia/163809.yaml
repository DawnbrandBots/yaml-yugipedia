title: Card Trivia:D.D. Esper Star Sparrow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Change to Jet Iron]]", "[[Galaxy Queen's Light]]", "[[Star Sparrow Forever]]", and "[[Wings of Unity]]".
  * This monster is based on [[Nelson Andrews]]'s character on his TV show, and its Japanese name is based on it: "Different Dimension Esper - Star Robin".
