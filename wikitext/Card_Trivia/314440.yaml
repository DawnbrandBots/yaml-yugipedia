title: Card Trivia:Dante, Traveler of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[The Traveler and the Burning Abyss]]", "[[Good & Evil in the Burning Abyss]]", and "[[The Terminus of the Burning Abyss]]".
  ** In the latter card's artwork, this monster is seen being transformed into "[[Dante, Pilgrim of the Burning Abyss]]".
  * [[wikipedia:Dante Alighieri|Dante Alighieri]] was a real-world Italian poet, best known for his epic poem ''[[wikipedia:The Divine Comedy|The Divine Comedy]]'', in which the author undertakes a mystical odyssey through the Christian afterlife. This monster appears to portray the fictionalized Dante as he appears in the first 34 of those poems (collectively titled ''[[wikipedia:Inferno|Inferno]]'') which depicts Dante's journey through the nine layers of Hell.
