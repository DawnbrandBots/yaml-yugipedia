title: Card Trivia:Jowls of Dark Demise
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is based on the Latin prefix "[[wiktionary:xenon#Latin|Xeno]]" which means "foreign" and "strange".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's 3D model in takes the form of the severed rotting head of a dragon, covered with tiny red tentacles, with its mouth resembling the mouth pictured in this card's artwork. When it battles, the actual monster sprouts its legs and pinchers, its eyes poking out on stalks. This gives it a strong resemblance to a famous sequence in John Carpenter's ''[https://en.wikipedia.org/wiki/The_Thing_(1982_film) The Thing]'', where the titular shapeshifter, having been reduced to severed head, grows legs and stalk eyes in an attempt to escape.
  ** In the Nintendo 3DS games, this monster's appearance is based on the form it takes when it battles in ''The Duelists of the Roses''.
