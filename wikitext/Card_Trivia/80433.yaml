title: Card Trivia:Judge Man
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dazzling Radiance]]", "[[Half or Nothing]]", and "[[Heaven's Judgment]]".
  * This monster may be based on [[wikipedia:Yama (Buddhism)|Enma]], the Judge of the [[wikipedia:Underworld|Underworld]] in [[wikipedia:Japanese mythology|Japanese mythology]].
  * The [[Judge Man (Bandai)|Bandai]] version of this card is a [[Level]] 7 monster, belongs to the "[[White Magic]]" family, and has 1800 [[ATK]] and 2600 [[DEF]], while the [[Konami]] version is a Level 6 [[Warrior]] monster with 2200 ATK and 1500 DEF.
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, during the [[Virtual World (arc)|Virtual World arc]], [[Johnson]] took the form of this monster to act as his [[Deck Master]]. Its Deck Master ability allowed him to destroy every monster on the [[field]] at the cost of 1000 [[Life Points]].
  ** In the Virtual World arc, both [[Judge Man (anime)|this monster]] and "[[Jinzo (anime)|Jinzo]]" (the Deck Master of [[Leichter]]) share the same Level (6), DEF (1500), and a Deck Master effect to [[destroy]] the opponent's cards of a certain [[card type|type]].
  * This monster is depicted with various full-body designs across the anime and other media:
  ** When [[Judgeman (manga)|this monster]] was Summoned by [[Seto Kaiba]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and in {{episode|Yu-Gi-Oh!|001|ref}}, it wore red armor that covered its entire body and a purple cape hanging off its back, wielded two small morning stars, and had very squat and distorted proportions.
  ** When this monster appeared as Johnson's Deck Master, and in {{episode|Yu-Gi-Oh!|167|ref}}, it had humanoid proportions, no visible morning stars, a grey breastplate over a dark blue robe, and a purple cloak hanging over its shoulders.
  *** This monster is depicted the same way in the artwork of "Half or Nothing".
  ** In the ''[[Yu-Gi-Oh! Forbidden Memories]]'' video game, this monster looked largely similar to its manga appearances, but has blue armor.
  ** In the ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' video game, this monster's armor was purple, the cape was removed, and the morning stars became significantly larger, bigger than its entire head.
  ** In the ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'' video game, the breastplate of this monster's armor changed from purple to indigo, and the design was far more elaborate than in ''Yu-Gi-Oh! The Duelists of the Roses''.
  * In the non-English ''TCG'' languages, this monster is simply called "Judge".
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from {{chapter|Yu-Gi-Oh!|038|ref}}, specifically from the panel showing this monster attacking "[[Beaver Warrior (manga)|Beaver Warrior]]".
