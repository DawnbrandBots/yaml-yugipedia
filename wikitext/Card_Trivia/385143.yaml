title: Card Trivia:Speedroid Terrortop
wikitext: |-
  {{Navigation}}

  * This monster is based on a ''[[wikipedia:Beigoma|beigoma]]'', a traditional Japanese spinning top.
  ** This monster's Japanese name, "Beigomax" (ベイゴマックス, ''Beigomakkusu''), is a portmanteau of the words "''beigoma''" (貝独楽, ''beigoma'') and "max" (マックス, ''makkusu'').
  * This is the first "[[Speedroid]]" monster to be [[Limited]] in the ''[[TCG]]'', as well as the first and currently only "Speedroid" monster to be Limited in the ''[[OCG]]''.
