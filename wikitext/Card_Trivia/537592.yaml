title: Card Trivia:Lighten the Load
wikitext: |-
  {{Navigation}}

  * "[[Mystical Knight of Jackal]]" appears in this card's artwork.
  ** The artwork depicts "Mystical Knight of Jackal" being shuffled into the Deck as this card's effect's cost.
  ** The monsters below it (from left to right) bears a strong resemblance to "[[Basic Insect]]" and "[[Hayabusa Knight]]" respectively.
  *** The three monsters each are based on the jackal, the falcon and the scarab beetle, animals which are often found in Egyptian mythology.
