title: Card Trivia:Perfectly Ultimate Great Moth
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Corrosive Scales]]".
  * This monster's name references the title of {{chapter|Yu-Gi-Oh!|067|ref}}, with its Japanese title being "Ultimate Perfect Form" and its English name likewise being "The Ultimate Great Moth".
  ** While this monster was never shown in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, it was only mentioned when [[Insector Haga (manga)|Insector Haga]] attempted to Summon it during the [[Duelist Kingdom]] tournament, but [[Dark Yugi (manga)|Dark Yugi]] countered this strategy, forcing Haga to [[Summon]] the weaker "[[Great Moth (manga)|Great Moth]]" instead, leaving him disappointed that the monster could not reach its "perfect form". However, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, [[Weevil Underwood]] managed to Summon this monster during his [[Duel]] against [[Joey Wheeler]] in the [[Battle City]] tournament.
  * During the Battle City tournament, this card was stated by Weevil Underwood during his Duel against Joey Wheeler to be the third strongest known Duel Monsters card in terms of ATK, behind "[[Gate Guardian]]" and "[[Blue-Eyes Ultimate Dragon]]", respectively. 
  * Prior to the release of [[Insect]] [[support]] cards in ''[[Duelist Pack: Legend Duelist 2]]'', this monster was infamous for being difficult to Summon due to its steep [[Summoning condition]]s. Because of this, several ''Yu-Gi-Oh!'' video games, such as ''[[Yu-Gi-Oh! 5D's Tag Force 6]]'', will reward the player with a bonus if they manage to successfully Summon this monster.
  * When this monster was [[Yu-Gi-Oh! Duel Monsters II: Dark Duel Stories promotional cards|first released in Japan]], it was impossible to Summon, as neither "[[Petit Moth]]" nor "[[Cocoon of Evolution]]" had been released yet. Those two cards were released two weeks later in ''[[Vol.4]]''.
  * This is the first [[Monster Card]] in the ''[[OCG]]'' to change its [[card type]] upon being released in ''[[Yu-Gi-Oh! Rush Duel]]''; in this case, a [[Fusion Monster]].
  ** Its status as a Fusion Monster in ''Rush Duel'' likely references how this monster could be obtained via [[Communication Fusion]] in the ''[[Yu-Gi-Oh! Duel Monsters (video game)|Yu-Gi-Oh! Duel Monsters]]'' video game for the Game Boy.
