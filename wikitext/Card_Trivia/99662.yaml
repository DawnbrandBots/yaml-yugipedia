title: Card Trivia:Launcher Spider
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Heavy Metal Raiders]]".
  * Despite this card's name, this monster features only six legs, whereas real spiders have eight.
  * This card has a [[retrained]] [[counterpart]]: "[[BM-4 Blast Spider]]".
  * This is the one of the first [[Machine]] monsters to appear in the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'']] anime, along with "[[Cyber Soldier (anime)|Cyber Soldier]]", "[[Labyrinth Tank (anime)|Labyrinth Tank]]", and "[[Royal Guard (anime)|Royal Guard]]".
  ** This is also one of the first [[FIRE]] monster to appear in the anime, along with "[[Flame Cerebrus (anime)|Flame Cerebrus]]".
  * In ''[[Yu-Gi-Oh! Forbidden Memories]]'', this card is Special Summoned by fusing "[[Jirai Gumo]]" with "[[Metalmorph]]".
  * This card's first ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|120|ref}}, specifically from the panel showing [[Launcher Spider (manga)|this monster]] being Summoned.
  ** This card's second ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|121|ref}}, specifically from the panel showing [[Keith Howard (manga)|Keith Howard]] declaring an attack with this monster on "[[Garoozis (manga)|Garoozis]]". However, its pose is reversed horizontally.
