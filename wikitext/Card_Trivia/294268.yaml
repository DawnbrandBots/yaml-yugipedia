title: Card Trivia:Monster Clock
wikitext: |-
  {{Navigation|mode=nonGame}}

  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster uses its effect, it uses its tongue to wrap the monster and into its mouth. The attacking monster is then transformed into an ornament on its tongue before spitting it out and in repeatedly, making it resemble the typical function of a [[wikipedia:Cuckoo clock|cuckoo clock]].
  ** This is further emphasized in {{episode|5D's|085|ref}} when this monster used its effect on "[[Blackwing - Gale the Whirlwind (anime)|Blackwing - Gale the Whirlwind]]", allowing it to perch on its repeatedly stuck-out tongue and make a "cuckoo" sound effect each time. This is based on the function of a mechanical [[wikipedia:Common cuckoo|cuckoo bird]] in a cuckoo clock, where it is stuck out on a retractable perch and makes a number of "cuckoo" sounds corresponding with the stricken hour.
