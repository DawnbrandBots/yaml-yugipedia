title: Card Trivia:S-Force Lapcewell
wikitext: |-
  {{Navigation}}

  * This card's name, "Lapcewell", is a portmanteau of "[[wikipedia:Pierre-Simon Laplace|Laplace]]" and "[[wikipedia:James Clerk Maxwell|Maxwell]]".
  ** This card's name and [[Fiend]] [[Type]] are a reference to both [[wikipedia:Maxwell's demon|Maxwell's demon]] and [[wikipedia:Laplace's demon|Laplace's demon]], two thought experiments about the movement of particles.
  * This is the only "[[S-Force]]" monster that:
  ** Does not have the "S-Force" crest depicted anywhere on its body in its card artwork.
  ** Whose column effect doesn't grant a passive stun effect to the monsters' are in the same column as S-Force monsters, instead it destroys cards within the same columns as "S-Force monsters"
