title: Card Trivia:Galactic Spiral Dragon
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Bulge, the Spiral Dragon", is based on a [[wikipedia:Bulge (astronomy)|bulge]], the term used in [[wikipedia:Astronomy|astronomy]] for a tightly packed group of [[wikipedia:Star|stars]] within a larger formation, and almost exclusively refers to the central group of stars found in most [[wikipedia:Spiral galaxy|spiral galaxies]].
