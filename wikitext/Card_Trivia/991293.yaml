title: Card Trivia:Gaia Prominence, the Fierce Force
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded [[Fusion Monster|Fusion]] counterpart of "[[Gaia Blaze, the Force of the Sun]]".
  ** This monster's name and [[Summoning condition]] requiring "Gaia Blaze, the Force of the Sun" as [[Fusion Material]] both reference a [[wikipedia:Solar prominence|solar prominence]], a large, bright, twisted structure of magnetic field plasma that extends from the Sun's surface into its corona.
  * This monster has the highest [[original ATK and DEF]] (3500/3100) of all [[Pyro]] monsters.
  * This monster and "[[Gaia Drake, the Universal Force]]" are tied for having the highest [[ATK]] (3500) of all [[Gaia Knight]] monsters.
  ** Coincidentally, both are Fusion Monsters that require a specific Gaia Knight [[Synchro Monster]] as one of their [[Fusion Material]]s.
