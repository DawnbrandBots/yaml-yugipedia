title: Card Trivia:Dragunity Knight - Areadbhair
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragunity Oubliette]]".
  * "[[Dragunity Legatus]]" appears riding this monster.
  ** "[[Dragon Ravine]]" can be seen in this card's background.
  * This card has a "[[Nekroz]]" counterpart, "[[Nekroz of Areadbhair]]".
  * This is the [[cover card]] of ''[[Structure Deck R: Dragunity Drive Legend of the Dragon Ravine Pack]]''.
  * This monster is named after ''[[wikipedia:Lugh|Areadbhair]]'', the bloodthirsty spear of [[wikipedia:Lugh|Lugh]], a god of [[wikipedia:Irish mythology|Irish mythology]]; the name "Areadbhair" means "Slaughterer".
