title: Card Trivia:Minoan Centaur
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Minocensatyrus", is a combination of "[[wikipedia:Minotaur|minotaur]]", "[[wikipedia:Centaur|centaur]]", and "[[wikipedia:satyr|satyr]]", three bestial monsters from Greek mythology. The monster in this card's artwork is combination of these mythical creatures.
  * The "Minoan" part in the English name refers to [[wikipedia:Minos|Minos]], a mythical king of Crete in Greek mythology; both the [[wikipedia:Minoan civilization|Minoan civilization]] and the [[wikipedia:Minotaur|Minotaur]] are named after him, with the Minotaur's name roughly translating to "Bull of Minos".
