title: Card Trivia:Stardust Divinity
wikitext: |-
  {{Navigation}}

  * This is the first "[[Stardust (archetype)|Stardust]]" monster that is not related to "[[Stardust Dragon]]", the only other monster being "[[Starduston]]".
  * This card is the third [[LIGHT]] [[Fairy]] [[Match winner]] card, the other two being "[[Tyr, the Vanquishing Warlord]]" and "[[Queen of Fate - Eternia]]".
  * This card and "[[Grizzly, the Red Star Beast]]" are the first two and currently only [[Synchro Monster]]s to be [[Yu-Gi-Oh! World Championship prize cards|''Yu-Gi-Oh! World Championship'' prize cards]], as well as the only two [[illegal]] Synchro Monsters.
