title: Card Trivia:Witchcrafter Golem Aruru
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Witchcrafter Masterpiece]]" (depicted in the middle of its construction), "[[Witchcrafter Unveiling]]", and in the second artwork of "[[Witchcrafter Madame Verre]]".
  * This monster's weapons include a hammer and a scissor, the tools featured on the "[[Witchcrafter]]" crest.
