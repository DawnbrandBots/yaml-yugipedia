title: Card Trivia:Nine Pillars of Yang Zing
wikitext: |-
  {{Navigation}}

  * "[[Naturia Sacred Tree]]" and "[[Denglong, First of the Yang Zing]]" appear in this card's artwork.
  * The "Nine Pillars" in this card's name refers to the 9 "[[Yang Zing]]" monsters created by "[[Constellar Sombre]]" using the ley lines.
  * This card's ''[[OCG]]'' name, {{Ruby|竜|りゅう}}{{Ruby|星|せい}}の{{Ruby|九|きゅう}}{{Ruby|支|し}} ''Ryūsei no Kyūshi'', is pronounced similarly to 竜生九子 ''Ryūsei Kyūshi'', AKA the [[wikipedia:Nine sons of the dragon|Nine Offspring of the Dragon]] that the "[[Yang Zing]]" monsters are based on.
