title: Card Trivia:Hidden Spellbook
wikitext: |-
  {{Navigation}}

  * The artwork of the ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' card "[[Spellbook Rejection]]" features books with the same bold, curvy symbols as the books in this card's artwork.
  ** The two books in that card's artwork also have the same upside-down triangle symbol as the glowing book in this card's artwork.
  * In the ''[[TCG]]'', this card was formerly named "Hidden Book of Spell" (first printed in ''[[Magician's Force]]'' in 2003), until its reprint in ''[[Gold Series: Haunted Mine]]'' in 2012 with the new name "Hidden Spellbook".
  ** This is because this card and "[[Spellbook Organization]]" are valid members of the "[[Spellbook]]" archetype released in ''[[Return of the Duelist]]'', despite being released many years before the archetype was created. Their Japanese names use the same characters for "spellbook" (魔導書, ''madōsho'') as the "Spellbook" archetype, which was translated as "Book(s) of Spell" prior to the archetype's creation.
