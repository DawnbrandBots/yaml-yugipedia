title: Card Trivia:Dangers of the Divine
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * "[[The Winged Dragon of Ra]]" appears in this card's artwork.
  ** This card's artwork is based on a scene during [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] and [[Rishid (manga)|Rishid's]] [[Katsuya Jonouchi and Rishid's Duel (manga)|Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (and its [[Joey Wheeler and Odion's Duel|counterpart]] in the [[Yu-Gi-Oh! (anime)|anime]]) where the counterfeit "[[The Sun Dragon Ra]]", after being Summoned from the "[[Royal Temple]]", transforms into a swirling black mist and absorbs its firebolts into the vortex.
  * This card's ''TCG'' name references the "danger" of playing a counterfeit copy of "Ra" in the ''Yu-Gi-Oh!'' manga and anime, which causes misfortune to befall the Duelist who plays it.
  ** Its Japanese name is a reference to [[God's Anger]], a soundtrack often used by the original Japanese version of the anime during scenes of the Egyptian Gods being Summoned.
  * This card's effect to allow the player to [[Special Summon]] "[[The Winged Dragon of Ra]]" by [[Tribute|Tributing]] a monster and paying half their [[Life Point]]s is based on the effect of the "[[Temple of the Kings]]" in the ''Yu-Gi-Oh!'' manga and anime, which allows the player to [[Normal Summon]] the monster sealed away in the ark of the temple by paying half of their Life Points, which in this case, was the counterfeit "Ra".
  ** This card's effect to prevent "The Winged Dragon of Ra" from attacking is based on how the real "Ra" hidden inside [[Marik Ishtar (manga)|Marik Ishtar's]] [[Deck]] became angry for having a counterfeit copy being played, thereby preventing the counterfeit "Ra" from attacking despite Rishid's orders.

