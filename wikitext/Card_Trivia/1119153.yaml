title: Card Trivia:Ultimate Trinity Stargazer
wikitext: |-
  {{Navigation|mode=nongame}}

  * The capital letters of this monster's name (UTS) are a reference to the [[UTS|Ultraterrestrial Tracker Squad]], the corporation where [[Yudias Velgear]] and [[Yuhi Ohdo]] work with [[Yuamu Ohdo]] as the president, in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  ** Fittingly, this monster's [[Fusion Material]]s are the 3 [[signature card]]s used by the aforementioned characters ("[[Galactica Oblivion]]" + "[[Jointech Rex]]" + "[[Blue-Fang Burst Dragon]]").
  ** This is also reflected in this monster's Japanese [[Attack and effect names in Yu-Gi-Oh! GO RUSH!!|attack name]], "War To Zen! Trouble Sob Done Job!" (ウォー・トゥ・ゼン！トラブル・ソーブ・ドーン・ジョブ！, ''Wō Tu Zen! Toraburu Sōbu Dōn Jobu!''), which is a pun on the Japanese name of UTS (宇宙人トラブル相談所, ''Uchūjin Toraburu Sōdanjo'').
  * This is the last [[Fusion Monster]] to be [[Fusion Summon]]ed, as well as the last monster [[Special Summon]]ed from the [[Extra Deck]], in the ''Yu-Gi-Oh! GO RUSH!!'' anime.
