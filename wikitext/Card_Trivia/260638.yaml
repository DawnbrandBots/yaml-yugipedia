title: Card Trivia:CXyz Skypalace Babylon
wikitext: |-
  {{Navigation|}}

  * This monster is the "[[CXyz]]" [[Card evolutions|evolution]] of "[[Skypalace Gangaridai]]".
  ** This monster is named after [[wikipedia:Babylon|Babylon]], the capital city of the [[wikipedia:Babylonian empire|Babylonian empire]].
  *** This is supported by the fact that its base form is named after [[wikipedia:Gangaridai|Gangaridai]], both of which are ancient civilizations and significant locations in [[wikipedia:Alexander the Great|Alexander the Great's]] military campaign, whereas Babylon was conquered by Alexander early in his military career.
  * This is the first [[Rank 11]] [[Xyz Monster]].
  * Unlike the other "CXyz" monsters that can inflict effect damage with an effect that can only be [[activate]]d if the "CXyz" monster has a specific [[material]] attached to it, this monster can inflict damage with its primary effect.
  * This monster has the highest [[original DEF]] (4000) of all [[WIND]] monsters (tied with "[[Cosmic Blazar Dragon]]").
