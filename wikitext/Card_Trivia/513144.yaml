title: Card Trivia:Recurring Nightmare
wikitext: |-
  {{Navigation}}

  * "[[Mist Archfiend]]" appears in this card's artwork.
  * This card has three [[counterpart]]s for monsters of a specific [[Attribute]]/[[Type]]:
  ** [[WATER]]: "[[Salvage]]"
  ** [[FIRE]]: "[[Oil]]"
  ** [[Thunder]]: "[[Recycling Batteries]]"
  * This card has a [[Cat (Rush Duel series)|Cat]] counterpart: "[[Returning Cat]]".
  * The Spanish prints of this card use the word "''regresar''" instead of "''devolver''", which is the official term for "''return''" in that TCG branch.
