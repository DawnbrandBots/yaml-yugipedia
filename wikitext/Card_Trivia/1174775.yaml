title: Card Trivia:Army of the Haunted
wikitext: |-
  {{Navigation}}

  * "[[Armored Zombie]]", "[[Clown Zombie]]", and "[[Dragon Zombie]]" appear in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|089|ref}} showing "[[Crass Clown (manga)|Crass Clown]]", "[[Crawling Dragon (manga)|Crawling Dragon]]", and "[[Zanki (manga)|Zanki]]" being revived into their [[Zombie counterpart]]s via the effect of "[[Call of the Haunted (manga)|Call of the Haunted]]".

