title: Card Trivia:Red-Eyes Baby Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a younger form of "[[Red-Eyes Black Dragon]]".
  ** It is also an older form of "[[Black Dragon's Chick]]".
  * This monster is a "[[Red-Eyes]]" [[counterpart]] of "[[Baby Dragon]]".
  ** Both are [[Level 3]] [[Dragon]] monsters with 1200 [[ATK]] and 700 [[DEF]].
  ** This monster's pose in its card artwork resembles the pose of "[[Thousand Dragon]]" in its second ''[[OCG]]''/''[[TCG]]'' artwork.
  ** Fittingly, both the aforementioned monsters were used by [[Joey Wheeler]], who also used "[[Red-Eyes B. Dragon (anime)|Red-Eyes Black Dragon]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and [[Yu-Gi-Oh! (manga)|manga]].
