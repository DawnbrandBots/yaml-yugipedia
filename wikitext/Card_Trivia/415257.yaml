title: Card Trivia:Kozmo Farmgirl
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Extra Pack 2016]]''.
  * This monster appears in the artworks of "[[Kozmo Forerunner]]", "[[Kozmo Lightsword]]", "[[Kozmo Sliprider]]", "[[Kozmo Strawman]]", "[[Kozmojo]]", and "[[Kozmourning]]".
  ** This monster's robotic canine companion appears in the artwork of "[[Kozmo Scaredy Lion]]".
  * This monster is based on a combination of [[wikipedia:Dorothy Gale|Dorothy Gale]] from ''[[wikipedia:The Wizard of Oz (1939 film)|The Wizard of Oz]]'' and [[wikipedia:Darth Vader|Anakin]] and [[wikipedia:Luke Skywalker|Luke Skywalker]] from ''[[wikipedia:Star Wars|Star Wars]]'', each of whom serve as the main protagonists of their respective films.
  ** This card's name references how Dorothy and Luke both lived the life of a farmer before being whisked away on their journeys.
  ** This card's Japanese name, "Dorothel", is derived from Dorothy's name.
  ** This monster's robotic canine companion references Dorothy's pet dog [[wikipedia:Toto (Oz)|Toto]], who serves as her companion in ''The Wizard of Oz''.
  *** According to this [https://yugiohblog.konami.com/articles/?p=7305 ''Yu-Gi-Oh! Trading Card Game'' blog], the robotic canine and "Kozmo Sliprider" were both created by this monster. This alludes to Anakin having built his own robotic companion as well as to his fighter pilot skills.
  ** The background of this card's artwork references the sandy or dusty terrain around Dorothy's farm as well as the desert planet of [[wikipedia:Tatooine|Tatooine]] where Anakin and Luke grew up, which orbits around a [[wikipedia:Binary star|binary star system]].
