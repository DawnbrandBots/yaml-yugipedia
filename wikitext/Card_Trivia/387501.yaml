title: Card Trivia:Black Dragon Ninja
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Dragon Ninja]]" counterpart of "[[Strike Ninja]]". Coincidentally, "Strike Ninja" can be used with "[[Ninjitsu Art of Transformation]]" to Summon this card.
  * This card is the first "Dragon Ninja" monster to be released in the ''OCG'' before the ''TCG''.
