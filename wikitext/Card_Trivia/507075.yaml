title: Card Trivia:Card Blocker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Guts Guard]]" and "[[Sneak Exploder]]".
  * This monster has an offensive [[counterpart]]: "[[Card Trooper]]".
  * This monster has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Card Defender]]".
  * This monster shares the same [[Attribute]] ([[EARTH]]), [[Level]] (3), and [[Type]] ([[Warrior]]), visual design, and naming scheme with "[[Armor Breaker]]" and "[[Spell Striker]]". Fittingly, all three monsters were used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
