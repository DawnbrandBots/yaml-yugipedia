title: Card Trivia:I:P Masquerena
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * This monster appears in the artworks of "[[EM:P Meowmine]]", "[[Small Scuffle]]", "[[S-Force Chase]]", and "[[Vivid Tail]]".
  * Three copies of "EM:P Meowmine" appear in this card's third artwork.
  * This monster has a combined form with "[[S:P Little Knight]]": "[[W:P Fancy Ball]]".
  * This monster's name is a reference to IP masquerading, a form of [[wikipedia:Network address translation|network address translation]] that hides an entire IP address space, usually consisting of private IP addresses, behind a single IP address in another, usually public address space.
  ** This monster's name and facial expression are also a reference to the commonly used <code>:P</code> emoticon in T9 text messaging. As shown in concept art, the monster's helmet also forms a feline face with a similar expression.
  * [[Enako]] [[cosplay]]ed as this monster at several Japanese ''Yu-Gi-Oh!'' events.
  * This card's first artwork is adapted into ''[[Underground Data Courier]]'' in ''[[Yu-Gi-Oh! Master Duel]]'', specifically the scene where [[I:P Masquerena (character)|I:P Masquerena]] declares, "Mission complete!" while leaping from rooftop to rooftop.
