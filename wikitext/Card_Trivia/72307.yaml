title: Card Trivia:Salamandra
wikitext: |-
  {{Navigation}}

  * The sword of "[[Flame Swordsman]]" appears in this card's artwork, being encircled by "[[Salamandra, the Flying Flame Dragon]]".
  * The sword in this card's artwork appears in the second artwork of "[[Fire Formation - Tenki]]".
  * The kanji (炎) on the sword in this card's artwork translates to "flame".
  * This card's name is based on a [[wikipedia:salamanders in folklore|salamander]], a mythical lizard-like creature associated with the [[wikipedia:Fire (classical element)|classical element of fire]], which is reflected in this card's effect of equipping itself only to a [[FIRE]] [[Attribute]] monster.
  * The entity around the sword bears a physical resemblance to "[[Darkfire Dragon]]".
  * This card has multiple [[counterpart]]s:
  ** An [[Effect Monster]] counterpart: "[[Salamandra, the Flying Flame Dragon]]"
  *** A [[Fusion Monster]] counterpart: "[[Fighting Flame Dragon]]"
  ** An evolved counterpart: "[[Salamandra Fusion]]"
  ** A [[Trap Card|Trap]] counterpart: "[[Salamandra with Chain]]"
