title: Card Trivia:Ancient Warriors Saga - Defense of Changban
wikitext: |-
  {{Navigation}}

  * "[[Ancient Warriors - Valiant Zhang De]]" appears in this card's artwork.
  ** This card is a reference to the [[wikipedia:Battle of Changban|Battle of Changban]] from the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', specifically to the moment when [[wikipedia:Zhang Fei|Zhang Fei]] boasted and demanded his foes step forward to fight him.
