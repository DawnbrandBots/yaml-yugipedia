title: Card Trivia:Multiple
wikitext: |-
  {{Navigation}}

  * This monster is based on a Multiple, an [[wikia:w:c:gradius:Option|Option]] weapon featured in the ''[[wikipedia:Gradius|Gradius]]'' video game series spin-off, ''[[wikipedia:Salamander (video game)|Salamander]]''.
  ** This monster's effect to change its name to "[[Gradius' Option (Rush Duel)|Gradius' Option]]" references how similar Multiples are to the Options in the rest of the ''Gradius'' video game series.
  ** This monster's effect to support "[[Super-Dimensional Lord British Space Fighter]]" references the fact that the Lord British also debuted in ''Salamander''.
  * This monster could be considered the ''[[Yu-Gi-Oh! Rush Duel]]'' [[counterpart]] of "[[Multi Token]]", with its Japanese name being "Multiple Token".
