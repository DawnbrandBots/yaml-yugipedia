title: Card Trivia:Evilswarm Azzathoth
wikitext: |-
  {{Navigation}}

  * This card is the "[[lswarm]]" counterpart of "[[Worm Zero]]".
  ** "[[Worm Apocalypse]]", "[[Worm Dimikles]]", "[[Worm Falco]]", "[[Worm King]]", "[[Worm Rakuyeh]]", "[[Worm Tentacles]]", "[[Worm Victory]]", "[[Worm Warlord]]", "[[Worm Xex]]" and "[[Worm Yagan]]" can be identified as being parts of the whole monster.
  ** In contrast with the one whole mass of "Worm Zero", this monster is an amalgamation of different bodies.
  * This card's name and appearance is derived from [[wikipedia:Azathoth|Azathoth]], a deity in H.P. Lovecraft's Cthulhu Mythos.
  * The "[[Worm]]" archetype has one monster that starts with every letter of the alphabet. Worm Zero is the last, and boss of the "Worm" monsters. This card, being the opposite of them, starts with an "A".
