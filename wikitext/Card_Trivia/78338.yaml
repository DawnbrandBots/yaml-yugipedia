title: Card Trivia:D.D.R. - Different Dimension Reincarnation
wikitext: |-
  {{Navigation}}

  * The figure from the artwork of "[[Premature Burial]]" appears in this card's artwork.
  * This card shares its acronymic name with ''[[wikipedia:Dance Dance Revolution|Dance Dance Revolution]]'', a music video game series produced by [[Konami]].
  ** In  ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'', Konami acknowledges this by including it in the Konami-themed Deck used by [[Nanobreaker (character)|Nanobreaker]].
  * This is one of the few cards to have its whole name written in both its acronymic version and its fully written-out version.
