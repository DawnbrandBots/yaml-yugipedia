title: Card Trivia:Edge Imp Saw
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Saw|saw]], a bladed tool with a hard toothed edge used to cut through material.
  ** This monster's body consists of two different types of saws: the main body is based on the blade of a [[wikipedia:Circular saw|circular saw]], while a series of [[wikipedia:Coping saw|coping saws]] crisscross its body.
