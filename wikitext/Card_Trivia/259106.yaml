title: Card Trivia:Skypalace Gangaridai
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Gangaridai|Gangaridai]], the geographical region of the ancient Indian subcontinent.
  ** This is supported by the fact that this monster's "[[CXyz]]" [[Card evolutions|evolution]], "[[CXyz Skypalace Babylon]]" is named after [[wikipedia:Babylon|Babylon]], both of which are ancient civilizations and significant locations in [[wikipedia:Alexander the Great|Alexander the Great's]] military campaign, whereas Gangaridai is the location of Alexander's final military campaign before returning to the west.
  * This monster appears to be a combination of elements from the two monsters used as its [[Xyz Material]]s: "[[Indestructible Airship Hindenkraft]]" and "[[Unsinkable Titanica]]".
  ** This is likely done to represent the [[Tag-Team Duel]]ing tactics of the husband-and-wife team of [[Mayday Walker|Mayday]] and [[Brooke Walker]], both of whom use the aforementioned monsters to [[Xyz Summon]] this monster, while Mayday uses this monster.
