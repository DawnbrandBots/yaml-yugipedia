title: Card Trivia:Wind Unicorn Parallel, the Dracoslayer
wikitext: |-
  {{Navigation}}

  * This monster is a retrained "[[Dracoslayer]]" [[counterpart]] of "[[Majespecter Unicorn - Kirin]]".
  ** This monster is based on how "Majespecter Unicorn - Kirin" was [[Forbidden]] from 2017 to 2024 due to its easy use in other [[Pendulum]] Decks to [[remove]] the opponent's monsters, while being hard to remove in response.
