title: Card Trivia:Gladiator Beast Sagittarii
wikitext: |-
  {{Navigation}}

  * This monster is named after the ''[[wikipedia:Sagittarii|sagittarii]]'', the Latin plural term for "archers" from [[wikipedia:Ancient Rome|Ancient Rome]].
  ** Since this monster's appearance is that of a [[wikipedia:Centaur|centaur]], its name could also be a reference to the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Sagittarius (astrology)|Sagittarius]], which is typically represented as a centaur with a [[wikipedia:Bow and arrow|bow and arrow]].
