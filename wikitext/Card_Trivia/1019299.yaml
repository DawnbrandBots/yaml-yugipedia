title: Card Trivia:Pitknight Filly
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Pit stop|pit stop]], an area at the side of a track where race cars are serviced and refueled.
  ** Fittingly, this monster's suit is designed after a [[wikipedia:Racecar|racecar]] mechanic stationed at a pit stop, while the background of this card's artwork features a checkered flag used to signal a pit stop.
  * This card shares some similarities with "[[Pitknight Earlie]]".
  ** Both monsters are named and designed after members of a racecar pit crew.
  ** Both monsters share the same [[Attribute]] ([[FIRE]]), [[Type]] ([[Cyberse]]), [[original ATK]] (1500), and [[Link Rating]] (2).
  ** Both monsters feature an effect that [[Special Summons]] them from the [[Graveyard]] if [[destroyed by battle]] or by card effect.
