title: Card Trivia:Radiant Typhoon Varuroon, the Vibrant Vortex
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Varuna|Varuna]], the Hindu god of rain.
  * This monster's Japanese name is a pun on гҖҢзөўзҲӣиҸҜйә—гҖҚ(''Kenrankarei''), a [[wikipedia:Yojijukugo|four-character idiom]] that combined the two idioms that express beautiful appearance (гҖҢзөўзҲӣгҖҚ''Kenran'' and гҖҢиҸҜйә—гҖҚ''Karei'')
  * This monster appears in the artwork of "[[Radiant Typhoon Mandate]]".
  * This card has a [[Link Monster]] counterpart: "[[Radiant Typhoon Varuroon, the Marine Eidolon]]".
