title: Card Trivia:Forbidden Droplet
wikitext: |-
  {{Navigation}}

  * "[[Condemned Darklord]]", "[[Darklord Nasten]]", and a black version of "[[Forbidden Chalice]]" appear in this card's artwork.
  ** A similar scene appears in the artwork of "[[The Sanctified Darklord]]", where a shadowy figure (appearing to be the "Solemn" god) is pouring a chalice over a willing "Darklord Nasten".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card has a special animation when activated: the "Forbidden Chalice" drops some of its contents on to the field, negating the opponent's monsters' effects.
