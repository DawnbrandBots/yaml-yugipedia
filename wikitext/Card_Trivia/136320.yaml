title: Card Trivia:Hand-Holding Genie
wikitext: |-
  {{Navigation}}

  * This monster's effect to increase [[DEF]] is similar to the effect of "[[Unity]]".
  ** The artwork "Unity" also features [[Yugi Muto]] and his friends putting their hands together to symbolize their friendship, which is referenced in this monster's name.
  *** Similarly, this monster's name and effect (which is depicted holding hands with all other [[Defense Position]] monsters in the ''[[Yu-Gi-Oh! 5D's]]'' anime) embody the bond shared by the members of [[Team Taiyo]], as well as everything they went through together.
