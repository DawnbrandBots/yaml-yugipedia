title: Card Trivia:Trap Eater
wikitext: |-
  {{Navigation}}

  * This card appears in the artworks of "[[Tuning Barrier]]" and "[[Over Tuning]]".
  * This card's name and artwork is similar to that of "[[Damage Eater]]" and "[[Big Eater]]"; both also [[Special Summon]] themselves by "eating" something that usually gives the opponent an advantage. Both of these cards are also used by [[Yusei Fudo]] and his rival [[Jack Atlas]] in the anime.
