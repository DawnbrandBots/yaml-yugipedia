title: Card Trivia:Aroma Strategy
wikitext: |-
  {{Navigation}}

  * This card's name and effect is based on the [[Aroma Tactics]], a trick used by [[Mai Valentine]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which allows her to guess the top card of her [[Deck]] by scenting her cards in different perfumes.
