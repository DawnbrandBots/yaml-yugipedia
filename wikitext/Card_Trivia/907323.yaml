title: Card Trivia:Albaz the Ashen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Expulsion]]", "[[Decisive Battle of Golgonda]]", "[[Light of the Branded]]", "[[Rindbrumm the Striking Dragon]]", "[[New Frontier]]", and "[[Tri-Brigade Showdown]]".
  * The soot form of "[[Springans Rockey]]" appears in this card's artwork, on this monster's shoulder.
  ** The hammer of "[[Incredible Ecclesia, the Virtuous]]" (previously worn by "Rockey") appears in the background of this card's artwork.
  ** Shards from the orb of "[[Alba-Lenatus the Abyss Dragon]]" can also be seen on the ground in this card's artwork.
  * This card is a [[retrained]] [[counterpart]] of "[[Fallen of Albaz]]".
  ** This card's Japanese name, "Albus" (アルバス ''Arubasu''), is Latin for "white".
  ** This card's name, "Albaz the Ashen" ({{Ruby|灰|かい}}{{Ruby|燼|じん}}のアルバス ''Kaijin no Arubasu''), is a reference to "[[Titaniklad the Ash Dragon]]" ({{Ruby|灰|かい}}{{Ruby|燼|じん}}{{Ruby|竜|りゅう}}バスタード ''Kaijinryū Basutādo'', "Bastard the Incineration Dragon").
  *** This monster's expulsion depicted in the artwork of "Branded Expulsion" is similar to the descent of "Titaniklad" on the "[[Dogmatika Nation]]" depicted in the artwork of "[[Nadir Servant]]".
  ** Unlike "Fallen of Albaz", this monster does not have the white gems on his forehead, chest, and hands, reflecting him missing the power of "[[Branded in White]]".
  *** According to [[The Valuable Book EX 2 card storylines]], the power of "Fallen of Albaz" to turn into a [[Albaz Dragon|draconic form]] was stolen by "[[Aluber the Jester of Despia]]", as depicted in the artwork of "[[Branded Lost]]".
  *** Fittingly, unlike "Fallen of Albaz", this card also does not have an effect to [[Fusion Summon]] using itself as [[Fusion Material]].
  * This monster's icy dagger is derived from the blades of "[[Mirrorjade the Iceblade Dragon]]".
  * This monster has two [[Albaz Dragon|empowered forms]]: "[[Rindbrumm the Striking Dragon]]" and "[[Albion the Sanctifire Dragon]]".
