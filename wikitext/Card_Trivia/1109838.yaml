title: Card Trivia:Giftarist - Speedy MIX
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart|retrained]] counterpart of "[[Giftarist]]".
  ** Visually, this monster is "Giftarist" wearing a jacket similar to the one worn by "[[Speedy Performer]]", which reflects how it is a "mix" between both monsters, while its effect mentioning "[[Companions!]]" references how both monsters appear in that card's artwork.
