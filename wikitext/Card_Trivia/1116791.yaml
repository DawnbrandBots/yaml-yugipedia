title: Card Trivia:OuTerverSe Wish of Angeleva
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[OuTerverSe Galaxy Form]]".
  * This monster's name is a portmanteau of "angel" (the Japanese name of its [[Fairy]] [[Type]]) and "Velgeariva" (referencing the phrase used by [[Yudias Velgear]] and [[Zuwijo Zwil Velgear]] when transforming into their Galaxy Forms in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime).
  * This monster has a [[Fiend]] Type [[counterpart]]: "[[OuTerverSe Wish of Devilgear]]".
  * This monster has an upgraded "complete [[Maximum Monster]]" form: "[[Wish of OuTerverSe the World-Shattering Emperor (L)|Wish of OuTerverSe the World-Shattering Emperor [L]]]".
  * This monster and "Wish of Devilgear" are the first ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' cards with two name change conditions (to become their complete forms in the [[hand]], and "[[OuTerverSe]]" in the [[Graveyard]]), as well as the first two side Maximum Monster components without a "side label" in their original card names.
