title: Card Trivia:Arcana Knight Joker
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Limited Edition 8]]'' and ''[[Speed Duel: Arena of Lost Souls]]''.
  * This monster is based on the [[wikipedia:Joker (playing card)|Joker]], a [[wikipedia:Playing card|playing card]] which represents the addition to the four [[wikipedia:Standard playing card suit|standard playing card suits]].
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Jack's Knight]]", combined with "[[King's Knight]]" and "[[Queen's Knight]]".
  ** This monster is a [[counterpart]] of "[[Arcana Extra Joker]]" (the upgraded [[Link Monster]] form of "King's Knight") and "[[Arcana Triumph Joker]]" (the upgraded [[Effect Monster]] form of "Queen's Knight").
  * This card's artworks are taken from {{chapter|R|010|ref}}, specifically from the panel showing [[Arcana Knight Joker (manga)|this monster]] being Summoned.
