title: Card Trivia:White Warrior - Hail the Iron Hammer
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Hail|hail]], a shower of frozen rain pellets falling from the cumulonimbus clouds.
  ** This monster's subtitle and weapon are based on the [[wikipedia:War hammer|war hammer]], a hammer-like weapon used by foot soldiers and cavalry.
