title: Card Trivia:Arcana Force XIX - The Sun
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Sun (tarot card)|The Sun]].
  ** This monster's number "XIX" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (2900) reference how The Sun is the nineteenth trump card of the Major Arcana Tarot.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, the Sun Tarot card represents [[Alexis Rhodes]], who uses a "[[White Night]]" [[Deck]] while a member of the [[Society of Light]]. Her strategy focuses on delaying and [[destroy]]ing her opponent's back row, similar to this monster's effects to [[Set]] a [[Spell Card]] and destroy cards in the [[Spell & Trap Zone]]s.
