title: Card Trivia:Darklord Amdusc
wikitext: |-
  {{Navigation}}
  * This monster appears in the artwork of "[[Banishment of the Darklords]]".
  * This monster is based on [[wikipedia:Amdusias|Amdusias]], a duke of Hell featured in the ''[[wikipedia:The Lesser Key of Solomon#Are Goetia|Ars Goetia]]'' who is depicted with the head of a [[wikipedia:Unicorn|unicorn]].
