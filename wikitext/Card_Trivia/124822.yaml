title: Card Trivia:Sword of Dark Rites
wikitext: |-
  {{Navigation}}

  * The sword's hilt in this card's artwork is based on the appearance of "[[Relinquished]]". This is fitting, as this card's ''[[OCG]]'' name, "Sacrifice Sword", features the word, "Sacrifice", the original ''OCG'' name of "Relinquished".
  ** The "Rites" in this card's ''[[TCG]]'' name is synonymous to a tradition or a "ritual", which further references both this sword's connection to "Relinquished", being a [[Ritual Monster]], as well as its card's effect that activates upon the equipped monster being [[Tribute]]d.
  * This sword looks similar to the swords "[[Dragunity Arma Mystletainn]]" and "[[Dragunity Arma Leyvaten]]" use as weapons.
  * The Spanish printed edition of this card uses the word "''regresar''" instead of "''devolver''" for "''return''".
