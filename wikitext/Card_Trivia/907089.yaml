title: Card Trivia:Blaze Fiend Overlords Beelucitaroth (R)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Resurrection of the Blaze Fiends]]".
  * This monster and its components are based on the trio of major demons making up the "unholy trinity" written in John Milton's epic poem, ''[[wikipedia:Paradise Lost|Paradise Lost]]''. This component in particular is based on [[wikipedia:Astaroth|Astaroth]].
  ** This monster is depicted holding a snake in its hand while resting on a large demonic with dragon-like wings and a serpentine tail, similar to how Astaroth is depicted in the ''[[wikipedia:Dictionnaire Infernal|Dictionnaire Infernal]]''.
