title: Card Trivia:Judge of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * A younger version of this monster appears in the second artwork of "[[Medallion of the Ice Barrier]]".
  * This card's Japanese name is a reference to a mythological mirror owned by [[wikipedia:Yama (Buddhism)|Yama]], a Buddhist underworld god, which is said to show a person's good and bad deeds.
  * This monster is the "[[Ice Barrier]]" counterpart of "[[Gishki Natalia]]".
