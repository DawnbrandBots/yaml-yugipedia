title: Card Trivia:Doomcaliber Knight
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Deathcalibur Knight" (デスカリバー・ナイト, ''Desukaribā Naito''), is a portmanteau of the words "death" (デス, ''Desu'') and "[[wikipedia:Excalibur|Excalibur]]" (エクスカリバー, ''Ekusukaribā'').
  * In the ''[[Yu-Gi-Oh! Ultimate Masters: World Championship Tournament 2006]]'' video game, this monster's name is "Skull Descovery Knight".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|324|ref}}, specifically from the panel where [[Death Knight Deathcalibur|this monster]] is shown attacking "[[Marshmallon]]".
