title: Card Trivia:Gouki Dragon Ogre
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Tatsumi Fujinami|Tatsumi Fujinami]], a Japanese [[wikipedia:Professional wrestling|professional wrestler]] known by his ring name, "The Dragon", who was credited for inventing the [[wikipedia:Professional wrestling holds#Dragon suplex|dragon suplex]] and the [[wikipedia:Professional wrestling holds#Dragon sleeper|dragon sleeper]].
  ** This monster has a rocket strapped to its back, referencing Fujinami's famous use of the [[wikipedia:Professional_wrestling_aerial_techniques#Suicide|suicide dive]] technique under the name "dragon rocket".
