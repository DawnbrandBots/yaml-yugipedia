title: Card Trivia:Magidog
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the words ''magic'' and ''[[dog]]''.
  * "Magidog" has a feline counterpart; "[[Magicat]]".
  ** Both monsters are featured in the artworks of "[[That Wacky Magic!]]", "[[That Wacky Alchemy!]]", and "[[Endymion's Lab]]".
  ** Both monsters have [[wikipedia:heterochromia|heterochromia]].
