title: Card Trivia:Tellarknight Genesis
wikitext: |-
  {{Navigation}}

  * "[[Darktellarknight Batlamyus]]", "[[Infernoid Decatron]]" "[[Tellarknight Ptolemaeus]]", and the core of "[[Apoqliphort Towers]]" appear in this card's artwork.
  ** According to the [[Master Guide 5 card storylines]], "[[Infernoid Tierra]]" manipulated the core of "Apoqliphort Towers" to resonate with the vacuum tubes of "Decatron", awakening the trapped soul of "[[Gem-Knight Lapis]]" ("[[Shaddoll Construct]]") as "Batlamyus".
