title: Card Trivia:Skull Stalker
wikitext: |-
  {{Navigation}}

  * This is one of the first cards seen on-screen in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, the others being "[[Claw Reacher (anime)|Claw Reacher]]", "[[Kageningen (anime)|Kageningen]]", and "[[The Furious Sea King (anime)|The Furious Sea King]]".
  ** This is also one of the first [[DARK]] monsters to appear in the anime, along with "Kageningen", and "Skull Stalker".
  ** This is also the first [[Warrior]] monster to appear in the anime, along with "Kageningen".
  * This is one of eight of [[Joey Wheeler]]'s [[Normal Monster]]s introduced in the ''[[TCG]]'' in ''[[Legendary Collection 4: Joey's World Mega Pack]]'' that have their English [[flavor text]]s written in his [[wikipedia:Brooklyn|Brooklyn]] accent. The other seven are "[[Anthrosaurus]]", "[[Hero of the East]]", "[[Kageningen]]", "[[Little D]]", "[[Meotoko]]", "[[Stone Armadiller]]", and "[[Wolf]]". ("[[Alligator's Sword]]", which is included in ''Legendary Collection 4: Joey's World Mega Pack'' but debuted in the ''TCG'' previously, also has this kind of English flavor text.)
  ** All of these monsters are seen in Joey's very first [[Deck]], except for "Hero of the East" (which is only seen when Joey has a dream of himself with his inexperienced Deck) and "Little D" (which has not appeared in the anime).
  ** In Italian, Portuguese and Spanish, these cards' flavor texts are also written in [[wikipedia:Eye dialect|eye dialect]] for the sake of humor. Apart from the French text which is translated more directly from the Japanese text in a little more serious way, texts in other ''TCG'' languages appear to be translated from the English text.
  * This card's original Japanese name is the same as the [[wikipedia:Deathstalker|Deathstalker]], one of the most dangerous scorpions on the planet.
