title: Card Trivia:Harpie Lady 1
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Harpies' Hunting Ground]]" and "[[Hysteric Party]]", as well as in the second ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' artwork of "[[Harpie Lady (Rush Duel)|Harpie Lady]]".
  * This monster represents one of the duplicates of "[[Harpie Lady]]" created by "[[Elegant Egotist]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], specifically the one that keeps the same overall appearance.
  ** While "[[Toon Harpie Lady]]" is a [[Toon]] counterpart of "Harpie Lady", its visual appearance is based on this monster.
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster is named Airo, likely in reference to the mythological harpy [[wikipedia:Aello|Aello]].
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|221|ref}}, specifically from a panel showing "[[Harpie Lady (manga)|Harpie Lady]]" being Summoned.
