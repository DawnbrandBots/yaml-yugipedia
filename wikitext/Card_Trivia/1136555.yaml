title: Card Trivia:Vengeful Witch
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed counterpart of "[[Violet Witch]]".
  ** This monster's Japanese name, "Violence Witch" is a pun on the name of "Violet Witch".
  ** This monster's name references how [[Akiza Izinski]] (who used "[[Violet Witch (anime)|Violet Witch]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime) concealed her identity as the "Black Rose" (the "Black Rose Witch" in the original Japanese version) and was initially known for being violent and vengeful.
