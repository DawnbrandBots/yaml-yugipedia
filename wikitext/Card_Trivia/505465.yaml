title: Card Trivia:Fuhma Shuriken
wikitext: |-
  {{Navigation}}

  [[File:Black_Ninja_destroys_Dark_Eye_Stalker.png|thumb|right|250|[[Black Ninja]] attacks and destroys [[Dark Eye Stalker]].]]

  * "[[Strike Ninja]]" appears in this card's artwork.
  * The shuriken in this card's artwork appears in the artwork of "[[White Ninja]]".
  * This card is based on a ''[[wikipedia:Shuriken|shuriken]]'', a throwing weapon in the form of a star with projecting blades or points, which are often used by ninjas as depicted in media.
  ** This card is based on the ''Fūma shuriken'', a fictional ''shuriken'' named after the [[wikipedia:Fūma Kotarō|Fūma ninja clan]] led by Fūma Kotarō during the [[wikipedia:Sengoku period|Sengoku period]] of [[wikipedia:Feudal Japan|feudal Japan]]. The written name of the Fūma clan (風魔) translates to "wind demon", reflecting how the ''shuriken'' in this card's artwork features the kanji for "demon" (魔).
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|140|ref}}, specifically from the panel where "[[Black Ninja]]" attacks and [[destroy]]s "[[Dark Eye Stalker]]"; however, the shuriken in this card's artwork are added in.

