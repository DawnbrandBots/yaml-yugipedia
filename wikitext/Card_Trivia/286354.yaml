title: Card Trivia:Cat Shark
wikitext: |-
  {{Navigation}}

  * This monster is named after several species of ground sharks, which are commonly known as "[[wikipedia:Catshark|catsharks]]".
  ** This monster's name is also a pun on its appearance, as it is depicted as a cat-like creature with a shark's tail and fins.
  * This card's artwork is taken from {{chapter|ZEXAL|019|ref}}, specifically from the panel showing [[Cat Shark (manga)|this monster]] being Summoned.
