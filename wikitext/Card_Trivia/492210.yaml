title: Card Trivia:The Ascended of Thunder
wikitext: |-
  {{Navigation}}

  * This card is an upgraded form of "[[The Immortal of Thunder]]".
  ** This card's effect is an inverted version of the effect of "The Immortal of Thunder", in terms of how it uses Life Points. "Immortal" gives its controller 3000 Life Points when flipped up, and takes 5000 Life Points from its owner when sent to the Graveyard. "Ascended" instead takes 3000 Life Points from its controller to be summoned, and gives its owner 5000 Life Points when destroyed.
