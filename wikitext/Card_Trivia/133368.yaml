title: Card Trivia:Scrap Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Scrap Lube]]".
  * This card has two [[Card evolutions|upgraded]] forms: "[[Scrap Twin Dragon]]" and "[[Atomic Scrap Dragon]]".
  ** Each form features 1 higher [[Level]], 200 more [[ATK]]/[[DEF]], one more card [[target]]ed by their effect, and one more head in its design, compared to its previous form.
