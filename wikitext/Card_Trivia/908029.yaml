title: Card Trivia:Materiactor Gigaboros
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Materiactor Annulus]]", "[[Materiactor Gigadra]]", "[[Materiactor Meltdown]]", and "[[Materiactor Meltthrough]]".
  * This monster is based on the [[wikipedia:Ouroboros|ouroboros]], a serpent depicted swallowing its own tail used to symbolize the eternal cycle of destruction and recreation in alchemy.
  ** This monster is depicted tied in the shape of a [[wikipedia:Trefoil knot|trefoil knot]], a knot formed by joining the two loose ends of a overhand knot to form a knotted loop, which resembles a three-leafed clover.
