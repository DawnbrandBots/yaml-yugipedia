title: Card Trivia:Linkslayer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Alert Lancer]]" and "[[Link Bound]]".
  * This card has a [[Link Monster]] counterpart: "[[Exslayer]]".
  * This card has an "[[@Ignister]]" counterpart: "[[Linkslayer @Ignister]]".
  * This monster's feline-like headgear and claws are a pun based on an alternate spelling of its name, "Lynx Slayer", referencing the [[wikipedia:Lynx|lynx]].
  * This is the first [[Cyberse]]-[[Type]] monster to appear in the anime.
  * Ironically enough, despite being called "Linkslayer", this card doesn't have any effect that is harmful to Link Monsters.
