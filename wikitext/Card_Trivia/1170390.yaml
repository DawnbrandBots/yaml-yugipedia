title: Card Trivia:Chanbar, the Flashy Sportsknight
wikitext: |-
  {{Navigation}}

  * "Chanbar" in this card's name is likely derived from "Sports Chanbara", an international Japanese sword/spear sport that uses padded weaponry, as further indicated by the title of "flashy sportsknight".
  * This monster is wielding a variety of [[wikipedia:Okinawan kobudō|Okinawan weapons]], including a ''[[wikipedia:Tonfa|tonfa]]'', a [[wikipedia:Nunchaku|nunchaku]], a ''[[wikipedia:Three-section staff|sansetsukon]]'', a ''[[wikipedia:Kama (tool)|kama]]'', and 2 other unknown weapons.<!--They are unidentified because their tips and full-lengths are off-screen-->
