title: Card Trivia:Superheavy Samurai Steam Train King
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Tetsudo-O" (テツドウ－Ｏ) is a pun on "''tetsudō''" (鉄道), the Japanese word for "railroad".
  * This monster's face is based on the ''[[wikipedia:Oni|oni]]'', a type of ''[[wikipedia:Yokai|yōkai]]'' depicted as a red ogre-like creature with horns and a long mane.
  * This monster has the highest [[original DEF]] (4800) of all [[Synchro Monster]]s.
  ** This is also the only monster with an original DEF of 4800.
  * This monster is symbolic of [[Gong Strong]] abandoning his "Non-Action" and "Heavystrong" Dueling styles in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** Gong's usual playing style involves him and his "[[Superheavy Samurai]]" monsters standing completely still and neglecting the use of [[Spell]]/[[Trap Card]]s. This monster's effect, however, allows Gong to use them, and thus, allows him to move, reflecting its appearance of a steam train.
