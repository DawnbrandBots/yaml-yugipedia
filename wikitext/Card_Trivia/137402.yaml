title: Card Trivia:Karakuri Ninja mdl 339 "Sazank"
wikitext: |-
  {{Navigation}}

  * The '''339''' of this card's name represents a multiplication problem: 3 x 3 = 9.
  ** The number is also written in Japanese on this monster's left arm: 参参九.
  * The knife this monster wields also appears in the artwork of "[[Karakuri Ninja mdl 919 "Kuick"]]".
