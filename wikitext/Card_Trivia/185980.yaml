title: Card Trivia:Lavalval Chain
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Freezing Point]]", "[[Overlay Award]]" and "[[Overlay Regen]]".
  * This monster is a [[FIRE]] [[Laval]] [[Xyz]] [[retrain]] of "[[Gishki Chain]]".
  ** This card's [[ATK]]/[[DEF]], and Type are the same as that of "Gishki Chain".
  ** A "Gishki" symbol with the "Laval" symbol inside it appears above this monster and on its chest.
  ** According to the [[Duel Terminal Master Guide card storylines]], this monster is "Gishki Chain" after "it gained forbidden power by sacrificing the "[[Laval]]"."
  *** This monster being a combination of the [[Gishki]] and [[Laval]] archetypes is reflected in its effects, and how they support the respective archetypes:
  **** The first effect allows "Laval" monsters to quickly fill the Graveyard for their effects.
  **** The second effect allows several "Gishki" monsters to activate their effects.
  * This card is the first [[FIRE]] [[Sea Serpent]]-Type monster.
  * This card may be a counterpart to "[[Daigusto Emeral]]":
  ** This card focuses on searching the Deck, while "Daigusto Emeral" focuses on searching through the Graveyard.
  ** Both monsters appear in ''Duel Terminal 13''.
  ** Both monsters have [[1800 ATK Monster Cards|1800 ATK]] 
  ** Both monsters are depicted in mirrored poses: this monster is facing to the right, and Daigust Emeral is facing to the left.
  ** There are noticeable rivalries between the "Lavals" and "[[Gem-Knights]]", as well as "Gishkis" and "[[Gusto]]s"; "Chain" uses monsters from the former of each pair (both of which are allied and portrayed as evil) as Xyz Material, while "Emeral" uses monster from the latter archetypes (also allied and portrayed as good).
  * This is the first "[[Laval]]" monster to be [[Forbidden]].
  ** This is the third Xyz Monster to be Forbidden in the ''[[TCG]]'', following "[[Wind-Up Carrier Zenmaity]]" and "[[Number 16: Shock Master]]". It was later followed by "[[Evilswarm Exciton Knight]]".
