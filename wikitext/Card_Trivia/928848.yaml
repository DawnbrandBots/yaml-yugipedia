title: Card Trivia:The Agent of Destruction - Venus
wikitext: |-
  {{Navigation}}

  * Three colored "[[Mystical Shine Ball]]s" appear in this card's artwork, orbiting counter-clockwise.
  * This monster is a [[DARK]], [[retrained]] [[counterpart]] of "[[The Agent of Creation - Venus]]", who features an inverted [[original ATK and DEF]].
  ** This monster is based on the planet [[wikipedia:Venus|Venus]], which appears in the background of this card's artwork.
  *** This monster may also be based on [[wikipedia:Venus (mythology)|Venus]], the Roman goddess of love, which serves as the namesake of the planet.
  *** This monster is likely a reference to the fact that Venus was historically thought to be two distinct celestial bodies, the "morning star" and "evening star", before it was discovered that they were actually one planet. As this monster's name references destruction, it is most likely meant to represent Venus as the evening star.
