title: Card Trivia:Generation Next
wikitext: |-
  {{Navigation}}

  [[File:Fine-Weather-Rising-Hallelujah.png|thumb|right|250|Shot of ''[[Fine Weather Rising Hallelujah]]'', with "[[Elemental HERO Avian]]", "[[Elemental HERO Burstinatrix]]", and "[[Elemental HERO Clayman]]".]]

  * "[[Elemental HERO Avian]]", "[[Elemental HERO Burstinatrix]]", and "[[Elemental HERO Clayman]]" appear in this card's artwork.
  ** This card's artwork is based on a shot from the first opening theme of the ''[[Yu-Gi-Oh! GX]]'' anime  (''[[Fine Weather Rising Hallelujah]]'' in the original Japanese version, ''[[Get Your Game On! (song)|Get Your Game On!]]'' in the English version), showing the aforementioned monsters rising out of the sea before flying into the sky.
  * This card's name references the meaning behind the title of the ''Yu-Gi-Oh! GX'' anime: ''Generation Next''.

