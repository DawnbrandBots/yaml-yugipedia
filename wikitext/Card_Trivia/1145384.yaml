title: Card Trivia:Throne of the Archfiends
wikitext: |-
  {{Navigation}}

  * The throne in this card's artwork appears in the artworks of "[[Archfiend's Usurpation]]" and "[[Archfiend Playtime]]".
  * This is the first [[Ritual Spell Card]] capable of [[Ritual Summon]]ing a [[Ritual Monster]] from the [[Extra Deck]]. This is likely a reference to how Ritual Monsters [[Ritual Monster#Rush Duel|exclusive]] to ''[[Yu-Gi-Oh! Rush Duel]]'' are stored in the Extra Deck, as opposed to the [[Main Deck]].
