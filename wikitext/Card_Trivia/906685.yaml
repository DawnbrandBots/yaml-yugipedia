title: Card Trivia:Blue-Eyes White Cat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cat's Eye]]" and "[[Nyanderful Rush]]".
  * This monster is a ''[[Rush Duel]]'' [[Cat (Rush Duel series)|Cat]] parody of "[[Blue-Eyes White Dragon]]".
  ** This monster's pose closely resembles Blue-Eyes White Dragon's [[Card Artworks:Blue-Eyes White Dragon#/media/File:BlueEyesWhiteDragon-OW-2.png|8th ''OCG''/7th ''TCG'']] pose.
  ** This monster's lore is based on [[Seto Kaiba]] and [[Seto]] (who both used "Blue-Eyes White Dragon" in the original series) who obtained great prosperity in their lives despite rather poor origins.
