title: Card Trivia:Flower Cardian Cherry Blossom
wikitext: |-
  {{Navigation}}

  * "[[Naturia Beetle]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Cherry Blossom" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (3) references how the "Cherry Blossom" card falls under the month of March, the third month of the year.
  ** This monster's [[original ATK and DEF]] (100/100) references how the "Cherry Blossom" card is a ''kasu'' card, which is worth one point.
