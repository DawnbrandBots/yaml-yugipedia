title: Card Trivia:Magikey Beast - Ansyalabolas
wikitext: |-
  {{Navigation}}

  * "[[Clavkiys, the Magikey Skyblaster]]" and the pistol from "[[Magikey Maftea]]" appear in this card's artwork.
  * This monster's name is based on ''[[wikipedia:Glasya-Labolas|Glasya-Labolas]]'', one of the Demon Lords of Hell from the ''[[wikipedia:Key of Solomon|Key of Solomon]]''.
  * This is the first [[Fusion Monster|Fusion]] [[Tuner monster|Tuner]] [[Effect Monster]] monster.
  * This monster has the highest [[original ATK]] (2200) of all [[Level 4]] Tuner monsters.
