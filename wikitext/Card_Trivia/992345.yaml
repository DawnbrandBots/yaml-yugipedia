title: Card Trivia:Snake-Eye Birch
wikitext: |-
  {{Navigation}}

  * The destroyed remains of this monster appear in the artwork of "[[Sinful Spoils of Doom - Rciela]]".
  * This monster's Japanese name, "Wight Birch", is a portmanteau of "wight" and "white birch".
  ** A [[wikipedia:Wight|wight]] is a creature in the modern fantasy genre used to describe an undead sentient being or a wraith-like creature.
  ** White birch, the common name of the ''[[wikipedia:Betula papyrifera|Betula papyrifera]]'', is a native species of ornamental and timber trees in northern North America known for their white peeling bark.
