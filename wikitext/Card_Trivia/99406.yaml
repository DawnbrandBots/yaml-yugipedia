title: Card Trivia:Reptilianne Medusa
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Gorgon|Gorgon]], [[Wikipedia:Medusa|Medusa]], a half-human, half-snake female monster in [[wikipedia:Greek mythology|Greek mythology]] who is known for having sharp fangs and venomous snakes for hair. 
  ** This monster's effect to reduce the opponent's monster's [[ATK]] to 0 and preventing them from changing [[battle position]] is a reference to Medusa's power to turn people who look upon it to stone with their gaze.
  *** This monster shares this effect with another Gorgon-themed "[[Reptilianne]]" monster: "[[Reptilianne Medusa]]".
  * This card's English name includes two spaces between "Reptilianne" and "Medusa".
