title: Card Trivia:Aussa the Earth Spiritualist
wikitext: |-
  {{Navigation}}

  * "[[Familiar of the Earth Spiritualist]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Spiritual Coven]]".
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Aussa the Earth Charmer (Rush Duel)|Aussa the Earth Charmer]]".
  ** This monster's name and effect reference "[[Spiritual Earth Art - Kurogane]]", a [[Spiritual Art]] [[Trap Card]] that allows the player to [[Special Summon]] a monster from their [[Graveyard]].
