title: Card Trivia:Stinging Swordsman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Giant Hunter]]" and "[[Overtake Summon]]".
  * This monster is based on [[wikipedia:Issun-bōshi|Issun-bōshi]], a Japanese fairy tale character of a boy who is born around one inch tall and is armed with a needle used to defeat an ''[[wikipedia:Oni|oni]]''.
  * This monster's Japanese name, "''Harikenshi''" ({{Ruby|針|はり}}{{Ruby|剣|けん}}{{Ruby|士|し}}, lit. "Needle Swordsman") is a pun on the word "hurricane". Fittingly, "Hurricane" is the Japanese name for "[[Giant Trunade]]", which also features an effect to [[return]] [[Spell]]/[[Trap Card]]s from the [[field]] to the [[hand]].
