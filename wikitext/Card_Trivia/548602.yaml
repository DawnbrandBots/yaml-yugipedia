title: Card Trivia:Knightmare Mermaid
wikitext: |-
  {{Navigation}}

  * This card is based on a '''[[wikipedia:Mermaid|Mermaid]]'''.
  * The ''[[wikipedia:Fermata|Fermata]]'' symbol can be seen on this monster's head.
  * This monster has a ring attached to its tail that is the same as the ring on the body of "[[Mekk-Knight Indigo Eclipse]]".
  ** The upper half of the ring behind "Mermaid" also appears to be made out of the upper half of the ring behind "Indigo Eclipse".
