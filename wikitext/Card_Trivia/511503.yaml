title: Card Trivia:Counter Cleaner
wikitext: |-
  {{Navigation}}

  * "[[Pot of Greed]]" appears as a vacuum cleaner in this card's artwork.
  ** The "Pot of Greed" in vacuum form also appears in the artwork of "[[Top Share]]".
  * This is the only card that is able to remove all types of [[counter]]s.
  * The counters featured in this card's artwork are the "[[Turn Counter]]s" Konami released around the year [[2000]].
