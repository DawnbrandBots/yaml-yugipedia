title: Card Trivia:Bujintei Tsukuyomi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bujintervention]]" and "[[Bujinunity]]".
  * This card is an upgraded form of "[[Bujin Arasuda]]" equipped with various "[[Bujin]]" monsters:
  ** "[[Bujingi Swallow]]" as its sword.
  ** "[[Bujingi Fox]]" as its shield.
  ** "[[Bujingi Hare]]" as its helmet.
  ** "[[Bujingi Peacock]]" as its wings and armor.
  * This monster is based on ''[[wikipedia:Tsukuyomi-no-Mikoto|Tsukuyomi]]'', the Shinto god of the Moon, hence the moon behind this monster and its original form, "Bujin Arasuda".
  * This monster follows the gimmick of how the "Bujintei" monsters' Summoning requirements mirror the traits of the non-Xyz "[[Bujin]]" [[Beast-Warrior]]s: "[[Bujintei Susanowo|Susanowo]]" is Summoned using two "Bujin" monsters, "[[Bujintei Kagutsuchi|Kagutsuchi]]" is Summoned using two Beast-Warrior-[[Type]] monsters, and this card is Summoned using two [[LIGHT]] monsters.
