title: Card Trivia:Fairy Tail - Rella
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fairy Tail Ball]]", "[[Fairy Tale Tails]]", and "[[Weaver of Fairy Tails]]".
  ** This monster's tail appears in the artwork of "[[Tails of the Fairy Tails]]".
  * This monster is based on the fairy tale ''[[wikipedia:Cinderella|Cinderella]]''.
  ** This monster's design features a book and a ribbon in her tail, like the other "[[Fairy Tail]]" monsters; however, its ribbon features patches, referencing how Cinderella is commonly depicted wearing tattered clothes.
  ** This monster's effect, to [[discard]] a [[Spell Card]] and [[equip]] itself with an [[Equip Spell Card]], references a portion of the plot of ''Cinderella'', where the titular character's [[wikipedia:Fairy godmother|fairy godmother]] casts a magic spell and transforms Cinderella's ragged clothes into a beautiful ballgown, and is given a pair of glass slippers for her feet.
  ** This monster's effect to [[return]] the Equip Spell to the [[hand]] references how the spell is broken at midnight, and Cinderella leaves behind a glass slipper while fleeing the royal castle.
