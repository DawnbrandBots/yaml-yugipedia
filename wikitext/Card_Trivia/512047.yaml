title: Card Trivia:Muka Muka
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "''mukamuka''" (ムカムカ), the Japanese onomatopoeia used to represent feelings of being angry, offended, or disgusted.<ref>https://jisho.org/search/%E3%83%A0%E3%82%AB%E3%83%A0%E3%82%AB%20</ref>
  * This monster has an [[Card evolutions|upgraded]] [[counterpart]]: "[[Enraged Muka Muka]]".
