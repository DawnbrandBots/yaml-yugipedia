title: Card Trivia:Moray of Greed
wikitext: |-
  {{Navigation}}

  * "[[Pot of Greed]]" appears in this card's artwork.
  * This card's Japanese name is a pun on the words ''Utsubo'' ("eel") and ''Tsubo'' ("pot").
  * This card has a [[counterpart]]: "[[Moray of Avarice]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Moray of Greed]]".
