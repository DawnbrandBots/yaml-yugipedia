title: Card Trivia:Spiritual Beast Tamer Winda
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ritual Beast Return]]".
  ** The artwork of "Ritual Beast Return" depicts this monster being freed from the "[[Infernoid]]" prison she was held in during the events in the artwork of "[[Nephe Shaddoll Fusion]]".
  * This monster is an older "[[Ritual Beast]]" form of "[[Winda, Priestess of Gusto]]".
  ** This monster's clothing resembles her "[[Shaddoll]]" form, "[[El Shaddoll Winda]]".
  * This monster has two combined "[[Ritual Beast Ulti]]" forms:
  ** "[[Ritual Beast Ulti-Kimunfalcos]]" (with "[[Gusto Falco]]")
  ** "[[Ritual Beast Ulti-Cannahawk]]" (alternate artwork; with "[[Spiritual Beast Cannahawk]]")
  * This is the first "Ritual Beast Tamer" monster to also be a "[[Spiritual Beast]]" monster.
