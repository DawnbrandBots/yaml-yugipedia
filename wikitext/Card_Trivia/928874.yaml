title: Card Trivia:Time Thief Adjuster
wikitext: |-
  {{Navigation}}

  * This monster is a younger version of "[[Time Thief Perpetua]]" and an older version of the little girl from "[[Time Thief Hack]]".
  * The older version of "Perpetua" from "[[Time Thief Startup]]" appears in this card's artwork.
  * The fingerless gadget gloves being tinkered in this card's artwork are suggested to be the gloves worn by "Time Thief Perpetua".
  * The device forms of "[[Time Thief Regulator]]" and "[[Time Thief Chronocorder]]" appears in this card's artwork.
