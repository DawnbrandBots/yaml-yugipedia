title: Card Trivia:The A. Forces
wikitext: |-
  {{Navigation}}

  * "[[Fiend Skull Dragon]]", "[[Warrior Dai Grepher]]", and the huge warrior appearing in the artworks of "[[Cry Havoc!]]", "[[Marmiting Captain]]", and "[[Motivating Captain]]" appear in this card's artwork.
  * This card appears in the artwork of "[[Snatch Drone]]".
  * This card's ''[[TCG]]'' name abbreviated the word "Allied" with the letter "A", likely to avoid references to the real-life [[wikipedia:Allies of World War II|Allies]] of [[wikipedia:World War II|World War II]].
  ** Despite this, in the English dubbed version of {{episode|Yu-Gi-Oh!|146|ref}}, [[Gurimo]] refers to this card as "Allied Forces".
