title: Card Trivia:EM:P Meowmine
wikitext: |-
  {{Navigation}}

  * "[[I:P Masquerena]]" appears in this card's artwork, although wearing dog-styled goggles rather than her usual cat-styled mask.
  ** This monster first appeared in the reference art sheet of the "Masquerena" figure under the name "Cat Mine" (ネコマイン, ''Neko Main'') alongside the aforementioned goggles, which were themselves labelled "Dog-type Visor" (イヌ型バイザー, ''Inu-gata Baisā'').
  ** This monster's Japanese name is a portmanteau of the words "grenade" (グレネード, ''Gurenēdo'') and "meow" (ニャー, ''nyā''). This monster's ''[[TCG]]'' name is a portmanteau of the words "meow" and "mine", referencing its original name in the reference art sheet and the cat motifs of "Masquerena".
  * The third artwork of "I:P Masquerena" features three copies of this monster in golden shiny color, with the kanji "smoke" (煙, ''kemuri'') on its forehead, suggesting that this monster is used as [[wikipedia:Smoke bomb|smoke bomb]] during her heist.
  * "EM:P" refers to the acronym of "[[wikipedia:electromagnetic pulse|electromagnetic pulse]]" (EMP), a burst of electromagnetic energy which can be produced by certain weapons to selectively damage electrical and electronic devices.
  ** "EM:P" and this monster's facial expression are also a reference to the <code>:P</code> emoticon. Additionally, the expressions is reminiscent of a cat barely sticking its tongue out of its mouth, commonly known on the Internet as a "blep".
  * This card's artwork is adapted into ''[[Underground Data Courier]]'' in ''Yu-Gi-Oh! Master Duel'', specifically the scene where [[I:P Masquerena (character)|I:P Masquerena]] throws this monster at [[Chiyomaru]] while being chased.
