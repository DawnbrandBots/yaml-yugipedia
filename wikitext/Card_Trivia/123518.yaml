title: Card Trivia:Rage Resynchro
wikitext: |-
  {{Navigation}}

  * The dragon in this card's image is possibly "[[Stardust Dragon]]", due to its wings, wings' claws, and arrow-like head.
  * This card's artwork mimics "[[Starlight Road]]".
  * This card's effect is similar to that of "[[Shining Rebirth]]", except that its last effect destroys the Summoned monster instead of granting immunity to destruction.
