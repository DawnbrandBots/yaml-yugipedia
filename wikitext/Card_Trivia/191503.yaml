title: Card Trivia:Latinum, Exarch of Dark World
wikitext: |-
  {{Navigation}}

  * This card is the first [[TCG Exclusive|TCG-exclusive]] "[[Dark World]]" monster.
  * This card's name is the "[[Dark World]]" color pun for the color [[wikipedia:Platinum (color)|platinum]].
  ** This card being a [[Level 6]] monster is likely a reference to platinum often being represented as a precious metal of higher importance than gold or silver, represented by "[[Goldd, Wu-Lord of Dark World|Goldd]]" and "[[Sillva, Warlord of Dark World|Sillva]]" respectively, both of which are [[Level 5]] monsters.
  * This card's Chinese name, 鉑提納, is a combination of 鉑 ("platinum") and 提納 ''tínà'' ([[wikipedia:Transcription into Chinese characters|transcription]]/transliteration of チナ ''china'' as in its Japanese name ラチナ ''Rachina'', or ''tina'' as in the Spanish word ''platina'').
  * This card has the highest [[DEF]] of all "Dark World" monsters.
