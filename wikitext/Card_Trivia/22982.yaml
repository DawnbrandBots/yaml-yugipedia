title: Card Trivia:Terminal Countdown
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card does have a different Japanese name than the [[OCG]]/[[TCG]] card "[[Final Countdown]]", since this card spells "Final" in katakana (ファイナル). The other card spells "Final" using kanji and furigana (<ruby><rb>終焉</rb><rp>(</rp><rt>しゅうえん</rt><rp>)</rp></ruby>).
  * The artwork on the card is reminiscent of the climax of the movie "Goldfinger". In that scene of that movie, the bomb that was set to destroy Fort Knox was also at the number 007 (also James Bond's code number) when it was disarmed.
