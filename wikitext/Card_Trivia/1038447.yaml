title: Card Trivia:Simultaneous Equation Cannons
wikitext: |-
  {{Navigation}}

  * This card is a retrained counterpart of "[[Linear Equation Cannon]]".
  * This card is based on [[wikipedia:system of equations|simultaneous equations]], a set of multiple equations meant to be solved together.
  ** This card's Japanese name (連慄砲固定式, ''Renritsuhō Koteishiki'') is a play on the Japanese word for "simultaneous equations" (連立方程式, ''Renritsu Hōteishiki''), which uses homophonous or partially homophonous kanji with different meanings to obfuscate the original word.
  ** This card requires the player to solve the simultaneous equations <code>2x + y = A</code> and <code>x + y = B</code>, where:
  *** "x" is the [[Rank]] of the [[banish]]ed/[[return]]ed [[Xyz Monster]]s.
  *** "y" is the [[Level]] of the banished/returned [[Fusion Monster]].
  *** "A" is the total number of cards in both [[hand]]s and on the [[field]].
  *** "B" is the Level/Rank of a monster the opponent controls.
  ** This card's effects requiring both Xyz Monsters and Fusion Monsters is a reference to the x-axis and the y-axis of a two-dimensional [[wikipedia:Cartesian coordinate system|Cartesian coordinate system]], where Xyz Monsters represent "X" and Fusion Monsters (''Yūgō Monsutā'' in Japanese) represent "Y".
