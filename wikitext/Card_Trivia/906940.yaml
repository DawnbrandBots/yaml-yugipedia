title: Card Trivia:Electric Jellyfish
wikitext: |-
  {{Navigation}}

  [[File:D-013 Absorb.png|thumb|250px|"[[Jellyfish (manga)|Jellyfish]]" absorbs the electric attack.]]
  * This monster is a [[retrained]] [[Effect Monster|Effect]] [[counterpart]] of "[[Jellyfish]]".
  ** This monster has 200 more [[ATK]]/[[DEF]] than "Jellyfish". This is a reference to the effect of "[[Umi]]" (which increases [[Aqua]] monsters' ATK/DEF by that amount), which is also a common trend of the retrained counterparts of [[Mako Tsunami]]'s monsters in ''[[Duelist Pack: Duelists of the Abyss]]''/''[[Legendary Duelists: Duels From the Deep]]''.
  ** This monster's second effect and artwork reference a scene from {{chapter|Yu-Gi-Oh!|72|ref}}, during [[Dark Yugi and Ryota Kajiki's Duel (manga)|Dark Yugi (Yami Yugi) and Ryota Kaiki's (Mako Tsunami's) Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]] when "[[Jellyfish (manga)|Jellyfish]]" was able to absorb the electric attack of "[[Feral Imp (manga)|Feral Imp]]" [[equip]]ped with "[[Horn of the Unicorn (manga)|Horn of the Unicorn]]", becoming stronger in the process.
  * This monster's Japanese name, "Electric Jellyfish - Physalia -", is based on the ''[[wikipedia:Physalia physalis|Physalia physalis]]'', also known as a "Portuguese man o' war"; the man o' war is actually a colony of small animals with different functions (called zooids) that resemble a jellyfish.

