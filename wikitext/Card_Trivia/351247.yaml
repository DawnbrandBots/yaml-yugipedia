title: Card Trivia:Minerva, the Exalted Lightsworn
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] is an older version of "[[Minerva, Lightsworn Maiden]]".
  * This monster appears in the artwork for "[[Lightsworn Judgment]]".
  * This card's [[Card effect|effect]] when [[detach]]ing an [[Xyz Material]] is similar to the effect of "[[Garoth, Lightsworn Warrior]]".
