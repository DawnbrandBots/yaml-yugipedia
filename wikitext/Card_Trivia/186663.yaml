title: Card Trivia:Evilswarm O'lantern
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Battle Pack 3: Monster League]]''.
  * This card is the "[[lswarm]]" counterpart of "[[Laval Cannon]]", but has 50 more [[ATK]] and 350 more [[DEF]] than the said card.
  * This is the first [[DARK]] [[Pyro]]-[[Type]] monster released in the ''[[OCG]]''; the second is "[[Evilswarm Obliviwisp]]".
  * This monster appears in the artwork of "[[Battler's Pride]]".
