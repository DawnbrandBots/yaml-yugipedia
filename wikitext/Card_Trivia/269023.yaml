title: Card Trivia:Bujintei Susanowo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[2014 Mega-Tins]]''.
  * This monster appears in the artwork of "[[Bujintervention]]" and "[[Bujinunity]]".
  * This card is based on [[wikipedia:Susanoo|Susanoo]], the Shinto god of the sea and storms.
  * This monster is "[[Bujin Yamato]]" after having gone through the process depicted in "[[Bujincarnation]]", equipped with the artifacts making up the "Bujingi".
  ** This is also supported by the ''[[Gagaga Academy Tospedia card storylines#"Bujin" Edition|Gagaga Academy Tospedia card storylines]]''.
  ** The "Bujingi" are the following pieces of armor/weaponry:
  *** "[[Bujingi Ophidian]]" is the circular-like headpiece that forms the wings.
  *** "[[Bujingi Crane]]" is its left-hand sword
  *** "[[Bujingi Turtle]]" is its left shoulder pad.
  *** "[[Bujingi Quilin]]" is its right-hand sword.
  *** "[[Bujingi Wolf]]" is the armor-parts of its legs and arms, as well as the helmet.
