title: Card Trivia:Celeb Blouse - Death One Shoulder
wikitext: |-
  {{Navigation}}

  * This card, along with "[[Celeb Blade - Death Wild]]", "[[Celeb Brace - Death Wise]]", and "[[Celeb Robe - Death Wind]]", contain a pun on "desu wa" (ですわ) in their names, which is a suffix that's typically used at the end of sentences by snobbish and high-class women, reflecting [[Yuna Goha]]'s character.
