title: Card Trivia:Artmage Litera
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Artmage Academic Arcane Arts Acropolis]]", "[[Artmage Impasto -Recapture-]]", "[[Artmage Masterwork -Succession-]]", "[[Artmage Peripeteia -Turmoil-]]", "[[DoomZ Change]]", "[[Elfnotes: A Plea for Help]]", "[[Elfnotes: Quatrain of Succession‎‎]]", "[[Elfnotes: Welcome Home]]", "[[Theorealize]]", and "[[Theorealize Overdrive]]".
  * This monster has an "[[Elfnote]]" [[counterpart]]: "[[Elfnote Regina]]".
  ** This suggests that this monster, just like "[[Artmage Graflare]]", was not originally a resident of "[[Artmage Academic Arcane Arts Acropolis]]", but instead hailing from the same nation as the "Elfnote".
