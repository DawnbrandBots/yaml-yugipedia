title: Card Trivia:Fist of Fate
wikitext: |-
  {{Navigation}}

  [[File:Obelisk_defeats_Mask_of_Darkness.png|thumb|"[[The God of the Obelisk]]" defeats [[Mask of Darkness (manga)|Mask of Darkness]].]]

  * This is the [[cover card]] of ''[[Egyptian God Deck: Obelisk the Tormentor]]'', as well as one of the cover cards of ''[[Structure Deck: Egyptian Gods' Advent: Slifer the Sky Dragon & Obelisk the Tormentor]]''.
  * "[[Obelisk the Tormentor]]" appears in this card's artwork.
  ** This card's name is a reference to the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and [[Yu-Gi-Oh! (manga)|manga]]: "Fist of Fate" (ゴッド・ハンド・クラッシャー ''Goddo Hando Kurasshā'', "God Hand Crusher").
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|189|ref}}, specifically from the panel showing "[[The God of the Obelisk]]" attacking [[Mask of Darkness (manga)|Mask of Darkness]] directly.
  ** This card's effect to [[negate]] the effects of an opponent's [[Effect Monster]], [[destroy]] it, and negate for the rest of the [[turn]] that monster's effects, as well as the effects on the [[field]] of monsters with the same original name is a reference to a scene in [[Yami Yugi and Yami Marik's Duel]]'s in the ''Yu-Gi-Oh!'' manga and anime, where [[Yami Yugi]] [[activate]]d "[[Soul Taker (anime)|Soul Taker]]" targeting [[Yami Marik]]'s "[[Immortal Egyptian God Slime]]", then [[Tributing]] it to activate "Obelisk's" effect to make its ATK infinite and allow it to attack on Yami Marik's turn; due to being a [[Fusion Monster]], per [[Battle City Rules]] "Immortal Egyptian God Slime" counted as 2 Tributes.

