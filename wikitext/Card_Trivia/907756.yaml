title: Card Trivia:Thunderbeetle Bassdrum
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Thunderbeetle Boost]]", "[[Thunderbeetle Gift]]", and "[[Thunderbeetle Storm]]".
  * This monster's name is based on a [[wikipedia:Bass drum|bass drum]], a large drum that produces a low pitch, which appears on the back of this monster.
