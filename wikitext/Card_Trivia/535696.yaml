title: Card Trivia:Ocean Dragon Lord - Neo-Daedalus
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Fury from the Deep]]'', and is also one of the cover cards of ''[[Structure Deck: Special Set 2]]''.
  * This monster appears in the artworks of "[[Aegis of the Ocean Dragon Lord]]" and "[[Xyz Dimension Splash]]".
  * This monster is a more advanced version of "[[Levia-Dragon - Daedalus]]", as indicated by its Summoning procedure.
  * This monster shares its title with "[[Ocean Dragon Lord - Kairyu-Shin]]".
