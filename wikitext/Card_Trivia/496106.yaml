title: Card Trivia:Cyberdarkness Dragon
wikitext: |-
  {{Navigation}}

  * This card is an upgraded version of "[[Cyberdark Dragon]]" that is equipped with "[[Cyberdark Cannon]]" and "[[Cyberdark Claw]]".
  * This card's effect [[equip]]ping [[Machine]] monsters from the [[Graveyard]] is based on how "Cyberdark Dragon" is used by the [[Zane Truesdale|Truesdale]] [[Syrus Truesdale|brothers]] to equip itself with the dragon-like Machine monsters treated as [[Dragon]] monsters in the Graveyard in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** "[[Cyber End Dragon]]" was changed to a Dragon monster via the effect of "[[Rebirth Judgment]]" used by Zane; and the effect of "[[Dragonroid]]" treats itself as a Dragon monster used by Syrus.
  * Currently, the only way a "[[Cyberdark]]" monster could fail to be appropriate [[Fusion Material]] for this card is if "[[Fusion Tag]]" was used to change the name of a [[Non-Effect Monster]] on the field to the name of a "Cyberdark" Fusion Monster.
