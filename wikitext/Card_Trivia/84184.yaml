title: Card Trivia:Celestia, Lightsworn Angel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vanquishing Light]]".
  * This monster's Japanese name is derived from the [[wikipedia:Cherub|cherubim]], the second highest ranking caste of [[wikipedia:angel|angels]] in [[wikipedia:Abrahamic religions|Abrahamic religions]].
  * This monster and "[[Michael, the Arch-Lightsworn]]" are the only "[[Lightsworn]]" monsters to feature more than one [[wikipedia:Halo (religious iconography)|halo]] in their designs.
  * This monster's Portuguese ''[[TCG]]'' name uses an explicitly and fictitiously feminine title, "Anja Luminosa" (not "Anjo Luminoso"), since words for "angel" are consistently masculine across European languages.
