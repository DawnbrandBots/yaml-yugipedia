title: Card Trivia:Senko the Skybolt Star
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "''senko''", the Japanese word meaning "flash", which is often associated with a flash of lightning.
  ** Fittingly, in {{episode|ARC-V|042|ref}}, this monster is used to [[Fusion Summon]] "[[Raijin the Breakbolt Star (anime)|Raijin the Breakbolt Star]]", a monster based on the [[wikipedia:Raijin|Shinto deity of lightning]].
