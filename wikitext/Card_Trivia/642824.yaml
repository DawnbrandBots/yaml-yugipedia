title: Card Trivia:A.I. Love Fusion
wikitext: |-
  {{Navigation}}

  * Two copies of [[Ai]] appear in this card's artwork.
  * This card's name is a wordplay on the expression, "I love you".
  ** This card's Japanese name is a portmanteau of "Ai" ({{Ruby|Ａｉ|アイ}}), "I love you" (アイラブゆう, ''Airabu iu''), and "[[Fusion Monster|Fusion]]" ({{Ruby|融|ゆう}}{{Ruby|合|ごう}}, ''Yūgō'').
  ** The two copies of Ai are depicted posing to create a heart shape, the common symbol of love. Fittingly, "Ai" is also the Japanese word for "love".
  *** Also, in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, Ai uses this card to [[Fusion Summon]] "[[Earth Golem @Ignister]]", a monster based on the [[EARTH]] [[Ignis]] [[Earth (character)|Earth]], who fell in love with the [[WATER]] Ignis [[Aqua (character)|Aqua]], both of whom owned a "[[Marincess Crystal Heart|Crystal]] [[G Golem Crystal Heart|Heart]]" card.
