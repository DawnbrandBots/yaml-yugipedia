title: Card Trivia:Performapal Sword Fish
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Performapal Call]]", "[[Performapal Curtain Call]]", and "[[Performapal Recasting]]".
  ** A colored outline of this monster appears in the artwork of "[[Performapal Duelist Extraordinaire]]".
  * This monster's name and appearance is a pun on "[[wikipedia:Swordfish|swordfish]]", as this monster resembles a fish shaped like a sword.
  * This card was one of the first monsters to be [[Pendulum Summon]]ed in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, along with "[[Performapal Whip Snake (anime)|Performapal Whip Snake]]" and "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]".
