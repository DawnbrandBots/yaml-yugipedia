title: Card Trivia:Transam Praime Armor Nova
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Praime Call]]".
  * This is the [[signature card]] of [[Kuaidul Velgear]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * This monster is a [[Praime]] [[counterpart]] of "[[Darkness Transam Craisis]]".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Transam Praime Full Armor Nova]]".
