title: Card Trivia:Toy Vendor
wikitext: |-
  {{Navigation}}

  * This card is based on a ''[[wikipedia:Gashapon|gashapon]]'' [[wikipedia:Vending machine|vending machine]], a machine that randomly dispenses a spherical capsule popular, which contains a small capsule toy inside.
  ** This card's effect is based on the function of the ''gashapon'' vending machine, where the user must pay with coins in order to operate the machine, which will dispense a random capsule with a toy inside.
  *** In the anime, this card can treat [[Level 4]] or lower monsters [[Special Summon]]ed by its effect as "[[Toy (ARC-V archetype)|Toy]]" monsters, while in the ''[[OCG]]''/''[[TCG]]'', this card can Special Summon "[[Fluffal]]" monsters. Both of these facts further reflect the function of a ''gashapon'' capsule to contain a toy inside, which was demonstrated during its first appearance in the anime.
  * This card has a "[[Frightfur]]" counterpart: "[[Frightfur Jar]]".
  ** The Japanese name of "Frightfur Jar", "Death-Toy Pot", is based on this card's Japanese name, "Toy Pot".
