title: Card Trivia:Silent Abyss
wikitext: |-
  {{Navigation}}

  * This card's [[EARTH]], [[LIGHT]], [[WIND]], [[DARK]], and [[FIRE]] counterparts are "[[Raging Earth]]", "[[Radiant Spirit]]", "[[Destruction Cyclone]]", "[[Umbral Soul]]" and "[[Firestorm Prominence]]", respectively. Their effects apply to their respective [[Attribute]]s.
  * This card may be based off of the [[wikipedia:Nerodia erythrogaster neglecta|Copperbelly Water Snake]], dark-colored snakes that live in lowland swamps and other wet habitats.
