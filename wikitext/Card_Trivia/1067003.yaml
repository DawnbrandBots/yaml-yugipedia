title: Card Trivia:Ragnaraika Wisteria of Woe
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Wisteria floribunda|wisteria floribunda]]'', a member of the ''[[wikipedia:Wisteria|wisteria]]'' genus of trees known for their twining vines and clusters of colorful flowers.
  ** This monster's Japanese name (УЋЙудЇсЃјТЏЮУЌц, ''Raika no Sarashifuji'') is a play on сђїТЏЮсЂЌждќсђЇ (''Sarashikubi'', lit. "exposed neck"), which refers to the heads of the people executed by beheading that are hung on a stone wall and put on public display. The kanji сђїждќсђЇ (''kubi'', lit. "neck") is replaced with сђїУЌцсђЇ (''fuji''), the kanji in the Japanese name for the ''wisteria florbunda'', which reflects this monster's design as a Japanese ''wisteria'' sporting multiple human skulls inside its flowers.
