title: Card Trivia:Millennium Shield
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Kaminote Blow]]", "[[Millennium Protection]]", "[[Paradox Synthesis]]", "[[Shield Crush]]", and "[[Sengenjin Wakes from a Millennium]]".
  ** Ironically, despite both of this card's [[flavor text]]s claiming this monster is able to resist any attack, it is depicted being destroyed in the artworks of "Kaminote Blow" and "Shield Crush", and being pierced in the artwork of "Millennium Protection".
  * [[The Eye of Wdjat]] appears in the center of this monster.
  * This monster has a [[retrained]] counterpart: "[[Shield of the Millennium Dynasty]]".
  * This monster is tied with "[[Labyrinth Wall]]" and "[[Legendary Dueling Field]]" for the highest [[original DEF]] (3000) of all [[Level 5]] monsters.
  * This card's original flavor text stated that this monster was a [[Millennium Item]]; however, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster was not referred to as a Millenium Item, and did not originate from the [[Millennium Stone]]. The flavor text was later [[Card Errata:Millennium Shield|changed]] to remove this statement.
  * In some video games, this is a [[Ritual Monster]] that can be [[Ritual Summon]]ed with "[[Curse of Millennium Shield]]".
