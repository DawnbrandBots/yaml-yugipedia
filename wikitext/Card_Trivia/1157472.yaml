title: 'Card Trivia:Destiny Draw: Vermillion Sparrow'
wikitext: |-
  {{Navigation}}

  * This Skill can only be obtained by characters who use [[Winged Beast]] Decks in their respective anime series:
  ** [[Mai Valentine (Duel Links)|Mai Valentine]] uses a "[[Harpie]]" Deck in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** [[Crow Hogan (Duel Links)|Crow Hogan]] uses a "[[Blackwing]]" Deck in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** [[Rio Kastle (Duel Links)|Rio Kastle]] uses a [[WATER]] Winged Beast Deck in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** [[Lulu Obsidian (Duel Links)|Lulu Obsidian]] uses a "[[Lyrilusc]]" Deck in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** [[Shay Obsidian (Duel Links)|Shay Obsidian]] uses a "[[Raidraptor]]" Deck in the ''Yu-Gi-Oh! ARC-V'' anime.
