title: Card Trivia:Courageous Crimson Chevalier Bradamante
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023 2nd Wave]]'' and ''[[Nature Pack: Blazing Heroes]]''.
  * This monster is based on [[wikipedia:Bradamante|Bradamante]], a fictional knight heroine from the [[wikipedia:Matter of France|Matter of France]]. She appeared first in the epic poem from the Renaissance: [[wikipedia:Orlando Innamorato|Orlando Innamorato]] by Matteo Maria Boiardo. She was depicted as a female knight in the service of Emperor Charlemagne. In the epic poems, she had a romance with the Muslim knight, Ruggiero, who converts to Christianity to be with her, having various difficulties and adventures because of their different origins.
