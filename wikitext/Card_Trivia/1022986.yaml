title: Card Trivia:Promethean Princess, Bestower of Flames
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Prometheus|Prometheus]], a Titan from [[wikipedia:Greek mythology|Greek mythology]] who is chained and tortured by [[wikipedia:Zeus|Zeus]] for stealing fire from the heavens and "bestowing" it to humankind.
  * Prior to this card's official unveiling on October 23rd, 2023, its name was revealed in [https://yu-gi-oh.jp/news_detail.php?page=details&&id=1701 an announcement] for new [[card sleeve]]s on August 7th, and its artwork appeared in [https://twitter.com/MasterDuelSite/status/1715687593025688025 PlayStation 5 Store advertisements] for ''[[Yu-Gi-Oh! Master Duel]]'' on October 21st.
  * This card was stated to have been designed for simultaneous debut in the ''[[OCG]]'' and in ''Master Duel'', and as such has the shortest timespan between real-life release and in-game addition (2 days). It shares this distinction with "[[Hallo, the Spirit of Tricks]]", and "[[Ween, the Spirit of Treats]]".
