title: Card Trivia:Gouki Roar
wikitext: |-
  {{Navigation}}

  * "[[Gouki Octostretch]]", "[[Gouki Ringtrainer]]", "[[Gouki Riscorpio]]", "[[Gouki Suprex]]", "[[Gouki Tagpartner]]", "[[Gouki The Master Ogre]]", and "[[Gouki Twistcobra]]" appear in this card's artwork.
  ** This card's artwork depicts "The Master Ogre" being empowered by the collective roar of the other "[[Gouki]]" monsters, which reflects this card's name and effect to increase an attacking "Gouki" monster's [[ATK]] by 300 for each "Gouki" monster the player [[control]]s.
