title: Card Trivia:Djinn Disserere of Rituals
wikitext: |-
  {{Navigation}}

  * This monster is the 1st [[TCG]]-exclusive "[[Djinn of Rituals]]" monster to be released.
  * This monster's name may be a play on the Latin word "Miserere", which means "Have mercy".
  * This is the first and only "Djinn of Rituals" card released as a [[Secret Rare]] in the TCG.
  * This is the first "Djinn of Rituals" to not have a weapon, opting out for a shield to represent protection of the Ritual.
  ** The shield's colors look similar to "[[Defender, the Magical Knight]]".
  * This card has the lowest [[ATK]], [[DEF]], and [[Level]] of all the "Djinns of Rituals".
