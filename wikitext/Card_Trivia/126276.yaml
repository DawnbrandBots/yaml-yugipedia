title: Card Trivia:Shuttleroid
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Space Shuttle|Space Shuttle]], a low-orbiting spacecraft that operated from 1981 until its discontinuation in 2011.
  * This is currently the only "[[roid]]" monster that is currently released in the ''[[OCG]]'' but not in the ''[[TCG]]''. 
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|GX|009|ref}}, specifically from the panel showing [[Shuttleroid (manga)|this monster]] being Summoned.
