title: Card Trivia:Gokibore
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Giant Ballgame]]", "[[Giant Ballpark]]", "[[Gokipole]]", and "[[Super Armored Robot Armed Black Iron "C"]]".
  * This monster's Japanese name ({{name|Gokibore|ja}}, ''{{romanized name|Gokibore|ja}}'') is a portmanteau of the words "cockroach" (ゴキブリ,''Gokiburi'') and "ball" (ボール, ''Bōru'').
  ** This monster's ''[[TCG]]'' name is a corruption of the Japanese word for "cockroach".
  * Despite this card's ''[[OCG]]''/''TCG'' artwork being very similar to its [[Yu-Gi-Oh! (manga)|manga]] artwork, it appears to be actually based on a panel in {{chapter|Yu-Gi-Oh!|066|ref}} showing [[Pillroach|this monster]] being Summoned.
