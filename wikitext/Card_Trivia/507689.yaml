title: Card Trivia:D.D. Warrior Lady
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Brain Reboot]]", "[[D.D. Designator]]", "[[D.D. Post]]", "[[D/D Recruits]]", "[[Dai Dance]]", "[[Dark Contract with the Different Dimension]]", "[[Different Dimension Gate]]", "[[Different Dimension Ground]]", "[[Dimension Fusion]]", "[[Dimension Reversion]]", "[[Dimension Wall]]", "[[Return from the Different Dimension]]", and "[[Space Jump]]".
  * "[[Different Dimension Gate]]" appears in this card's artwork.
  * This monster has two younger counterparts: "[[Rookie Warrior Lady]]" and "[[Warrior Lady of the Wasteland]]".
  ** This monster is "Warrior Lady of the Wasteland", after traveling to the [[D.D.|Different Dimension]] and losing her arm, as shown in "[[Karma Cut]]".
