title: Card Trivia:Metalsilver Armor
wikitext: |-
  {{Navigation}}

  * This armor appears in the artworks of "[[Centrifugal Field]]", "[[Dark Contract with the Yamimakai]]", "[[Formation Union]]", and  "[[Frontline Base]]".
  * This armor is worn by "[[Dark Blade]]", [[Dark Blade the Dragon Knight]]", and "[[Dark Blade the Captain of the Evil World]]".
  * This card has a [[counterpart]] focused on protecting unequipped monsters from attacks: "[[Raregold Armor]]".
