title: Card Trivia:Quantum Cat
wikitext: |-
  {{Navigation}}

  * This card's name is based on the thought experiment [[wikipedia:Schrödinger's cat|Schrödinger's cat]], where a cat inside a sealed box with a flask of poison that shatters in response to an unpredictable event could be interpreted as, by [[wikipedia:Quantum mechanics|quantum mechanics]], simultaneously both alive and dead.
  ** This could be referenced by this card's effect, as its [[Attribute]] and [[Type]] are both unknown until after it is activated. It may also be referenced by the fact this card is treated simultaneously as both a Trap and a Monster Card.
  * This monster can be considered a defensive [[counterpart]] to "[[Swamp Mirrorer]]". Both are [[Trap Monster]]s that [[Special Summon]] themselves as [[Normal Monster]]s, with fixed ATK and DEF but customizable Type and Attribute.
