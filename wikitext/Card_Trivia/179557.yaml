title: Card Trivia:Mask Change II
wikitext: |-
  {{Navigation}}

  * The masks featured in this card's artwork are, from left-to-right: "[[Masked HERO Dian]]", "[[Masked HERO Acid]]", "[[Masked HERO Koga]]" and "[[Masked HERO Divine Wind]]". Two more masks are barely visible behind the warrior featured in the artwork, but are obscured beyond recognition; they probably are "[[Masked HERO Goka]]" and "[[Masked HERO Dark Law]]". These masks represent six "[[Masked HERO]]s" with six different Attributes.
