title: Card Trivia:Rokket Tracer
wikitext: |-
  {{Navigation}}

  * This monster's name and the design of its head are based on [[wikipedia:Tracer ammunition|tracer ammunition]], a type of ammunition that contains a pyrotechnic compound in its base, which ignites upon firing and creates a visible trail of smoke or flame, allowing the shooter to track the bullet's trajectory.
  * This monster appears in the artwork of "[[Borreload Liberator Dragon]]".
