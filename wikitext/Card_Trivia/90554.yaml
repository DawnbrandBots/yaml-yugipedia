title: Card Trivia:Reaper of the Cards
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Double Tribute]]".
  * This card appears in the second [[Yu-Gi-Oh! (anime)|anime]] artwork and ''[[OCG]]''/''[[TCG]]'' artworks of "[[Card of Demise]]".
  * This is one of several monsters whose [[ATK]] or [[DEF]] is [[not divisible by 50]], the others being "[[Number S39: Utopia Prime]]", "[[Sword Arm of Dragon]]", and [[PaniK's monsters]]: "[[Barox]]", "[[Castle of Dark Illusions]]", "[[Dark Chimera]]", and "[[King of Yamimakai]]".
  ** This monster's ATK and DEF are likely meant to be ''[[goroawase]]'': its ATK digits, in individual ''kun'yomi'' pronunciation, can be read as: 1 = ''hi''; 3 = ''mitsu''; 8 = ''ya''; 0 = ''ma''; its DEF digits, in individual ''on'yomi'' pronunciation, can be read as: 1 = ''i''; 9 = ''ku''; 3 = ''sa''; 0 = ''re''. Put together, this produces the Japanese phrase ''Himitsu yama, ikusare'' (秘密山、行くされ, loosely "you are going to the secret mountain"), referencing how in Japanese folklore, death gods called ''[[wikipedia:Shinigami|shinigami]] ''are known to possess people and lead them to mountains, seas, and railroads where people have died.
  * This is one of the first five [[Effect Monster]]s to be released in the ''OCG'', with the other four being "[[Armed Ninja]]", "[[Hane-Hane]]", "[[Man-Eater Bug]]", and "[[Skelengel]]".
  * This monster's ''OCG''/''TCG'' pose is taken from a panel from {{chapter|Yu-Gi-Oh!|082|ref}} showing [[Reaper of the Cards (manga)|this monster]] right before it "attacks" [[Dark Yugi (manga)|Dark Yugi's]] [[Set]] [[Trap Card]], which Dark Yugi baited the [[Player Killer of Darkness (manga)|Player Killer of Darkness]] into doing.
  * This card's Spanish print in ''[[Dark Beginning 1]]'' features two typos, as it includes the words "destruyela" ("destroy it") and "devuelvela" ("return it") instead of "destrúyela" and "devuélvela".
