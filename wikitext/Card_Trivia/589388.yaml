title: Card Trivia:Evil Eye Mesmerism
wikitext: |-
  {{Navigation}}

  * "[[Serziel, Watcher of the Evil Eye]]", "[[Evil Eye of Selene]]", and "[[Basilius, Familiar of the Evil Eye]]" appear in this card's artwork.
  * Part of this card's Japanese name, 死配 (しはい ''shihai''), is a sort of pun on 支配 (meaning ''control''), of the same pronunciation.
