title: Card Trivia:Malefic Rainbow Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Yu-Gi-Oh! 3D Bonds Beyond Time Movie Pack]]''.
  * This monster appears in the artwork of "[[Malefic Territory]]".
  * This monster is the "[[Malefic]]" [[counterpart]] of "[[Rainbow Dragon]]".
  ** This monster is the only form of "Rainbow Dragon" that can be [[Special Summon]]ed by its effects and features the worst drawbacks.
  *** Because of this, it is also the only form of "Rainbow Dragon" that is not an "[[Ultimate Crystal]]" monster.
  * This is the only "Malefic" monster whose Special Summoning [[cost]] allows it to [[banish]] its counterpart from the [[hand]] as well as the [[Deck]].
  * In the English dubbed versions of ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' and ''[[Yu-Gi-Oh! Duel Links]]'', this is the only "Malefic" monster with a different [[Attack and effect names|attack name]] from its base form.
