title: Card Trivia:Double Resonator
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on its design: it is a "double-headed" monster with the English letter "W" (commonly pronounced "double-u") on its sash.
  ** This monster's name is also a pun on its effect to treat another monster as a [[Tuner monster]], which will allow the player to [[Synchro Summon]] a [[Synchro Monster]] that can only be Summoned using two Tuner monsters as material (which is also known as [[Double Tuning|'''Double''' Tuning]] in the anime).
