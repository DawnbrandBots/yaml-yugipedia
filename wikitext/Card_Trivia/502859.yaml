title: Card Trivia:Performapal Card Gardna
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Pendulum Effect]] is a curious reference to the manga Pendulum Effect of "[[D/D Count Surveyor (manga)|D/D Count Surveyor]]", which was used by the opponent in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
  ** This is an unique case, considering that usually manga cards get additional effects based on other cards their ''user'' played alongside them.
  * This card's artwork is taken from {{chapter|ARC-V|015|ref}}, specifically from the panel showing [[Performapal Card Gardna (manga)|this monster]] being Summoned.
  ** Furthermore, this monster's design is based on one copy of this monster appearing on the left of the same panel, depicted with a smile.
