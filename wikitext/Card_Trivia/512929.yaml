title: Card Trivia:Goldd, Wu-Lord of Dark World
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Smog]]" and "[[Dark World Lightning]]".
  * This monster's name is the "[[Dark World]]" color pun for [[wikipedia:gold (color)|gold]].
  ** This monster's title, "Wu-Lord" is the [[wikipedia:Pinyin|pinyin]] transcription of the [[wikipedia:Chinese characters|Han character]] "武" as in "武神" ("war god"). In this sense, this card retains the title of "war god" or "warlord".
  ** This monster's Chinese name, 金爾多, is a combination of 金 ("gold"), 爾 (''ěr'', [[wikipedia:Transcription into Chinese characters|a transcription]] of the [[wikipedia:Phoneme|phoneme]] /l/ as in ''go'''l'''d'') and 多 (''duō'', a transcription/transliteration of ド ''do'' as in its Japanese name ゴル'''ド''' ''Goru'''do''''').
  * This monster's effect parallels that of "[[Sillva, Warlord of Dark World]]", except instead of returning two cards from the opponent's hand to the bottom of their [[Deck]], this card's effect destroys an equal number of cards they control.
  * This monster and "Sillva, Warlord of Dark World" are based on the two antagonists featured in the Japanese TV series [[wikipedia:Monkey (TV series)|Monkey Magic]] - called Kin-Koku and Gin-Koku (whose names are translated to "Gold Horn" and "Silver Horn" respectively) - who served as Kings of the Underworld. Their names might also be based on two pieces in [[wikipedia:shogi|shogi]]: the Gold and Silver Generals.
  * According to the ''[[Master Guide 2 card storylines|Master Guide 2]]'' card storylines, "Goldd" and "Sillva" are the heads of the Dark World's military and serve beneath "[[Reign-Beaux, Overlord of Dark World|Reign-Beaux]]," the political and religious authority, and "Goldd" is in fact the junior partner of the two. The two are in turn immediate superiors to "[[Brron, Mad King of Dark World|Brron]]," though this was portrayed in the exact opposite way in the ''[[Yu-Gi-Oh! GX]]'' anime.
