title: Card Trivia:Synchro Cracker
wikitext: |-
  {{Navigation}}

  * 7 ''[[Yu-Gi-Oh! ARC-V]]'' [[Synchro Summon]]ing rings appear in this card's artwork.
  ** Fittingly, in the anime, this card's effect was used with "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]" (which is a [[Level]] 7 monster).
  ** The black star that appears in the middle of this card's artwork is similar to the stars that appeared during a [[Dark Synchro Summon]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
