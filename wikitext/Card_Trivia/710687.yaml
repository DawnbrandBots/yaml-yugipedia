title: Card Trivia:S-Force Justify
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[S-Force Bridgehead]]", "[[S-Force Origin]]" and "[[Small World]]".
  * The "[[S-Force]]" crest (white-colored) is located on the chest of this monster's power suit.
  * This monster has a [[counterpart]]: "[[S-Force Mystify]]".
  * This monster shares multiple similarities with the ''tokusatsu'' and anime hero [[wikipedia:Gridman the Hyper Agent|Gridman]].
  ** Both are agents in an interdimensional police organization.
  ** Both are voiced by Hikaru Midorikawa using a digitizing voice filter.
  ** Both are digital beings; this monster's [[Type]] is [[Cyberse]], and Gridman manifests in virtual space.
  ** Both wear full bodysuits, and are notably never seen without them. They are also primarily hand-to-hand combatants.
