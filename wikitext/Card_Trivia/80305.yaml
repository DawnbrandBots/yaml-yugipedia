title: Card Trivia:Curse of Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragonic Escape]]".
  ** A stone tablet of this monster appears in the artwork of "[[Wedju Temple]]".
  * The ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' version of this card appears in the artwork of the ''Rush Duel'' version of "[[Exchange (anime Rush Duel)|Exchange]]".
  * This monster has five [[retrained]] [[counterpart]]s;
  ** Two retrained [[Effect Monster]] counterparts: "[[Curse of Dragonfire]]" and "[[Curse of Dragon, the Cursed Dragon]]".
  ** One retrained [[Effect]] [[Fusion Monster]] counterpart: "[[Curse of Dragon, the Magical Knight Dragon]]".
  ** Two ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]''-original retrained Effect Monster counterparts: "[[Dedicated Curse of Dragon]]", and "[[Veteran Curse of Dragon]]".
  * This monster shares multiple similarities with "[[Kiryu]]":
  ** Both monsters share the same [[Attribute]] ([[DARK]]), [[Level]] (5), [[Type]] ([[Dragon]]) and [[original ATK and DEF]] (2000/1500).
  ** Both monsters serve as the mount for a certain [[Warrior]] [[Normal Monster]]; this monster serves as the mount for "[[Gaia The Fierce Knight]]" (as "[[Gaia the Dragon Champion]]") while "Kiryu" can serve as the mount of "[[Dark Blade]]" by [[equip]]ping itself to the latter monster.
  * In ''[[Yu-Gi-Oh! Dark Duel Stories]]'', ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', ''[[Yu-Gi-Oh! The Sacred Cards]]'' and ''[[Yu-Gi-Oh! Reshef of Destruction]]'', this card's effect can change the field into a "[[Wasteland]]" field. This references its combo attack with "[[Burning Land (manga)|Burning Land]]" (and its [[Burning Land (anime)|anime counterpart]]) in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|067|ref}}, specifically from the panel showing [[Curse of Dragon (manga)|this monster]] being Summoned.
