title: Card Trivia:The Masked Beast
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Spell of Mask]]''.
  * This monster has a ''[[Rush Duel]]'' [[Noodle Mask]] parody: "[[The Masked Feast]]".
  * This monster has the highest [[original ATK]] (3200) of all [[Fiend]] [[Ritual Monster]]s.
  * This monster shares part of its Japanese name with the horror film franchise, ''[[wikipedia:Hellraiser|Hellraiser]]'', which [[Kazuki Takahashi]] claimed to be a fan of. Its design, along with that of its counterpart "[[Masked Beast Des Gardius]]", bears a resemblance to the Cenobite designs featured in the films.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Duelist|127|ref}}, specifically from the panel showing [[The Masked Beast (manga)|this monster]] being Summoned, albeit with some differences in detailing.
