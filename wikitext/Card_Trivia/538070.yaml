title: Card Trivia:Fenrir
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Fenrid|Fenrir]], a wolf in Norse mythology, who is the son of [[wikipedia:Loki (mythology)|Loki]] and the giantess [[wikipedia:Angrboda|Angrboða]].
  ** This monster's effect to force the opponent to skip their next [[Draw Phase]] after it [[destroy]]s an opponent's monster by battle likely references ''[[wikipedia:Gylfaginning|Gylfaginning]]'', the first part of the Old Norse textbook, ''[[wikipedia:Prose Edda|Prose Edda]]'' book, in which the [[wikipedia:Æsir|Æsir]] attempt to bind Fenrir with [[wikipedia:Gleipnir|Gleipnir]] through means of deception. Since Fenrir does not trust that the Æsir will free him afterwards, he requests that one of them put their hand (sometimes depicted as arm) in his mouth. The god [[wikipedia:Tyr|Tyr]] is the one to put his hand in Fenrir's mouth, and it is bitten off as revenge when the Æsir refused to free the wolf.
