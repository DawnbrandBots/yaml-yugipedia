title: Card Trivia:Dora Dora
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Poki Draco]]", whose Japanese name is 「ポケ・ドラ」 (''Poke Dora'').
  ** Both monsters share the same [[Attribute]] ([[FIRE]]), [[Type]] ([[Dragon]]), and [[Level]] (3).
  ** This monster's [[ATK]] (400) and [[DEF]] (200) are exactly double that of "Poki Draco" (200/100), representing this card's name being "Dora" twice and the presence of a second dragon in its artwork.
  ** "Poki Draco" also appears in the artwork of "[[Uradora of Fate]]", a mahjong-themed card to which the "[[Tenpai Dragon]]" [[archetype]] that this card is themed after.
  * This monster is named after ''dora'', a tile in [[wikipedia:Japanese mahjong|Japanese mahjong]] that scores bonus points when used in a winning hand.
  ** This monster's name, "Dora Dora" (ドラ・ドラ, ''Dora Dora''), is a reference to ''dora dora'', a colloquial term used to refer to a hand that contains two ''dora'' tiles.
