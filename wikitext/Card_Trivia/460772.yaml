  * "[[Destiny HERO - Dogma]]" appears in this card's artwork.
  ** Ironically, "Dogma" cannot be [[Normal Summon]]ed, thus making it invalid for this card's [[activate|activation]].
  * This card's effect is incorporated into the ''[[OCG]]''/''[[TCG]]'' [[Special Summon]]ing effect of "[[Destiny HERO - Drilldark]]", which this card was used alongside in {{episode|ARC-V|104|ref}}.
