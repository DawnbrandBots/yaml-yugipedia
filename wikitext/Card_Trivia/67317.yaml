title: Card Trivia:Thousand Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|older]] form of "[[Hundred Dragon]]".
  ** This monster's [[Fusion Material]]s, "[[Baby Dragon]]" and "Time Wizard", are based on how in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], "[[Baby Dragon (manga)|Baby Dragon]]" would age and become this monster if "[[Time Wizard (manga)|Time Wizard]]" successfully used its effect.
  * This is one of the two first [[Fusion Monster]]s to be released in a ''[[TCG]]'' [[Starter Deck]] (''[[Starter Deck: Joey]]''), the other being "[[Flame Swordsman]]".
  ** This monster, "Flame Swordsman", and "[[Giltia the D. Knight]]" are among the three monsters used by [[Joey Wheeler]] in the [[Duelist Kingdom (arc)|Duelist Kingdom arc]] which were released as Fusion Monsters in the ''[[OCG]]''/''TCG''.
  * This monster has the same [[Level]] (7), [[Type]] ([[Dragon]]), and [[original ATK and DEF]] (2400/2000) as "[[Red-Eyes Black Dragon]]", Joey Wheeler's [[signature card]].
  * This is one of the few cards that lacks an 8-digit [[passcode]].
  * This card's [[Secret Rare]] rarity features its foil in the top-left-to-bottom-right direction, while Secret Rare cards are supposed to feature their foil in a top-right-to-bottom-left direction.
  * This card's first ''OCG''/''TCG'' and second ''OCG'' artworks are taken from {{chapter|Yu-Gi-Oh!|070|ref}} and {{chapter|Yu-Gi-Oh!|122|ref}}, respectively. Specifically, they are taken from the panels showing the final result of "Baby Dragon" being affected by "Time Wizard".
