title: Card Trivia:Shiranui Samurai
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Shiranui Style Synthesis]]".
  * This monster has two [[Synchro Monster|Synchro]] [[Card evolutions|upgraded]] forms: "[[Shiranui Samuraisaga]]" and "[[Shiranui Shogunsaga]]".
  * This is the only non-[[Tuner]] "[[Shiranui]]" monster whose [[ATK]] is not a multiple of 500.
