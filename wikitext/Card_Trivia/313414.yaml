title: Card Trivia:Purge Ray
wikitext: |-
  {{Navigation}}

  * "[[Number 17: Leviathan Dragon]]" and "[[Number 39: Utopia]]" appear in this card's artwork.
  ** Ironically, this card's ''[[OCG]]''/''[[TCG]]'' cannot [[Special Summon]] "Leviathan Dragon", as the [[Type]]s of both it and "Utopia" are [[Dragon]] and [[Warrior]], respectively.
  * This card's ''OCG''/''TCG'' effect to Special Summon a "[[Number]]" monster from the [[Graveyard]] with a lower [[Rank]] and the same Type as the [[Tribute]]d [[Xyz Monster]] is an alteration of its effect in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, which allows the player to Special Summon any Xyz Monster from their Graveyard. In {{episode|ZEXAL|120|ref}}, this card was used to Tribute "[[Number C39: Utopia Ray Victory (anime)|Chaos Number 39: Utopia Ray Victory]]" and Special Summon "[[Number 39: Utopia (anime)|Number 39: Utopia]]", both of which are Warrior monsters.
