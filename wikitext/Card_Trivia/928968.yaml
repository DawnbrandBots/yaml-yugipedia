title: Card Trivia:Romanpick
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Lullalabind]]", "[[Psychic Introduction]]", "[[Psykickoff Concert]]" and "[[Self Fan Club]]".
  * This monster's name is a portmanteau of the words "romantic" and "pick" (as in a guitar pick).
