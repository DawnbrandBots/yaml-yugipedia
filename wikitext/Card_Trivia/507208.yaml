title: Card Trivia:Pole Position
wikitext: |-
  {{Navigation}}

  * "[[Overdrive]]" and "[[Oni Tank T-34]]" appear in this card's artwork.
  ** Despite the edits to this card's ''[[TCG]]'' artwork to make the guns look less realistic, the artworks of the featured monsters themselves were kept the same as in the ''[[OCG]]''.
  ** The events in this card's artwork are continued in "[[Chicken Game]]".
  * The name of this card is a reference to the [[wikipedia:Pole position|racing lingo]].
  * This card only appears in ''Yu-Gi-Oh! Decade Duels Plus'', and not any other video game, likely due to the programming difficulties stemming from the infinite loop conditions it can trigger.
