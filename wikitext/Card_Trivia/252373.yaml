title: Card Trivia:Mermail Abyssmander
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:salamander|salamander,]] specifically a [[wikipedia:Giant salamander|giant salamander.]]
  ** This is the first [[Level]] 4 "[[Mermail]]" monster to not be based on a fish, instead being based on an [[wikipedia:amphibian|amphibian.]]
  *** Because of this, it is also the only "[[Mermail]]" monster that is below [[Level]]/[[Rank]] 7 to have legs.
  * This monster has 2 stars around its waist, referencing its Level-gaining effect.
