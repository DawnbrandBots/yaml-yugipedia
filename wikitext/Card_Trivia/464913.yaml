title: Card Trivia:Sprite's Blessing
wikitext: |-
  {{Navigation}}

  * "[[Gellenduo]]", "[[Happy Lover]]", "[[Lo, the Prayers of the Voiceless Voice]]", "[[Petit Angel]]", and "[[Winged Egg of New Life]]" appear in this card's artwork.
  ** All of these monsters are [[LIGHT]] [[Fairy]] monsters.
  ** This card's artwork depicts the same location as the artwork of "[[Hymn of Light]]".
  ** "[[Dark Magical Circle]]" also appears in this card's artwork.
  * This card is the [[LIGHT]] [[counterpart]] of the following [[Ritual Spell Card]]s:
  ** "[[Breath of Acclamation]]" - [[WIND]]
  ** "[[Contract with the Abyss]]" - [[DARK]]
  ** "[[Earth Chant]]" - [[EARTH]]
