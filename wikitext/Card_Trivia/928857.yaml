title: Card Trivia:Toon Terror
wikitext: |-
  {{Navigation}}

  [[File:Pharaoh's Servant commercial.png|thumb|250px|The library in the commercial for ''[[Pharaoh's Servant (Japanese)]]''.]]

  * "[[Toon World]]" appears in this card's artwork.
  ** "[[Manga Ryu-Ran]]" appears on the front cover of "Toon World".
  ** This card's artwork is based on a scene from the [https://www.youtube.com/watch?v=LxHTB6j0JPA Japanese commercial] for ''[[Pharaoh's Servant (Japanese)|Pharaoh's Servant]]'', which depicts "Toon World" being removed from the bookshelf of a library and opened.
  * This card's name could be a pun of "terror" and "teller", which are both pronounced and spelled ''terā'' (テラー), when used as English words within Japanese phonetics.

  == See also ==
