title: Card Trivia:The Revived Sky God
wikitext: |-
  {{Navigation}}

  [[File:The_revived_Osiris_faces_Silent_Magician.png|thumb|The revived "[[Slifer the Sky Dragon (manga)|Slifer the Sky Dragon]]" faces "[[Silent Magician (manga)|Silent Magician]]".]]

  * "[[Silent Magician LV8]]" and "[[Slifer the Sky Dragon]]" appear in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|343|ref}} showing "[[Slifer the Sky Dragon (manga)|Slifer the Sky Dragon]]" being Summoned by "[[Monster Reborn (manga)|Monster Reborn]]", while [[Yugi Mutou (manga)|Yugi Mutou]] controlled "[[Silent Magician (manga)|Silent Magician]]" at [[Level (stat boost)|Level]] 8.
  *** This card's effect to make each player [[draw]] until they hold six cards in their [[hand]] is a reference to the effect of "[[Card of Sanctity (manga)|Card of Sanctity]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], which Yugi had activated in the turn just before the above scene.
  **** "[[Silent Burning]]" and "[[Future Silence]]", which also depict a "[[Silent Magician (archetype)|Silent Magician]]" monster and feature a similar drawing effect, are also based on the above-mentioned scene.
  * This card has [[counterpart]]s for the other [[Egyptian God]] cards:
  ** "[[Obelisk the Tormentor]]": "[[The Breaking Ruin God]]"
  ** "[[The Winged Dragon of Ra]]": "[[The True Sun God]]"

