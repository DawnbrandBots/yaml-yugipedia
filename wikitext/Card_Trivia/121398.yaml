title: Card Trivia:Bubonic Vermin
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is a reference to [[wikipedia:Bubonic plague|bubonic plague]], a disease carried through [[wikipedia:Flea|fleas]], which was the cause of the deadly [[wikipedia:Black Death|Black Death]] pandemic in 14th century Europe. According to some reports, the pandemic was first caused and spread throughout Europe through fleas living on [[wikipedia:Rat|rats]] that traveled on trade ships.
