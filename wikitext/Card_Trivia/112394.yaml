title: Card Trivia:7 Colored Fish
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Catastrophe Draw]]", "[[Deep Sea Aria]]", "[[Fish and Bids]]", "[[Fish and Kicks]]", "[[Fish and Swaps]]", "[[Forgotten Temple of the Deep]]", and "[[Single Purchase]]".
  ** Contrary to this card's [[flavor text]] ("''A rare rainbow fish that has '''never been caught by mortal man'''.''", individuals of this monster species have been caught and sold by people, as depicted in the artworks of "Fish and Bids" and "Fish and Swaps".
