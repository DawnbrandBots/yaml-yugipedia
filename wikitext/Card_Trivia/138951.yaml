title: Card Trivia:Trap Booster
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Bear Trap]]" appears on this card's artwork.
  ** This makes this card one of the few cards that features a video game-exclusive card in its artwork, along with "[[Trap Jammer]]", "[[A-Team: Trap Disposal Unit]]" and "[[Remove Trap]]".
