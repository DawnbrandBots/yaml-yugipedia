title: Card Trivia:Blizzard Falcon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Blizzard Jet]]" and "[[Blizzard Vision]]".
  ** This monster's silhouette appears in the artwork of "[[Migratory Zereort]]".
  * This is the first [[WATER]] [[Winged Beast]] monster.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to inflict 1500 damage is an alteration of its effect in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, which inflicts damage to the opponent equal to the different between its higher current [[ATK]] and its [[original ATK]]. In {{episode|ZEXAL|079|ref}}, this monster's ATK was increased by 1500 via the effect of "Blizzard Jet" and inflicted the same amount of damage to [[Lotus Hanazoe]].
