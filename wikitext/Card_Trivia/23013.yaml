title: Card Trivia:Primal Seed
wikitext: |-
  {{Navigation}}
  [[File:Black_Luster_Soldier_silhouette.png|thumb|right|250|"[[Black Luster Soldier (manga)|Black Luster Soldier's]]" silhouette from the last panel of {{chapter|Yu-Gi-Oh!|117|ref}}.]]

  * "[[Black Luster Soldier - Envoy of the Beginning]]" appears in this card's artwork.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|117|ref}}, specifically from the last panel where [[Dark Yugi (manga)|Dark Yugi]] thinks that he has to Summon "[[Black Luster Soldier (manga)|Black Luster Soldier]]" within three turns; however, this card's artwork depicts "Black Luster Soldier - Envoy of the Beginning" with its sword raised in this card's artwork, while the sword of "Black Luster Soldier" in the panel was depicted lowered.
  * This card has a [[counterpart]]: "[[Chaos Seed]]".
  * This card was listed among the ''[[TCG]]'' cards that had their Portuguese lore changed; however, this card was never printed in Portuguese.<ref>{{cite web | url = http://www.yugioh-card.com/ygo_cms/ygo/all/uploads/Updated-Card-Names-Portuguese.pdf | title = Yu-Gi-Oh! TRADING CARD GAME: Updated Card Names - Portuguese | publisher = Konami | accessdate = January 25, 2018}}</ref>

