title: Card Trivia:Hysteric Party
wikitext: |-
  {{Navigation}}

  * The monsters being summoned on this card's artwork are 2 copies of "[[Harpie Lady 1]]", "[[Harpie Lady 2]]", and "[[Harpie Lady 3]]" each, this would be impossible as only 5 monsters can be on the field at once. Also only a combination of 3 Harpie monsters per deck is possible.
  ** The only possible explanation is that the monsters pictured are actually "[[Harpie Lady 1]]", "[[Harpie Lady 2]]", "[[Harpie Lady 3]]", and "[[Harpie Lady Sisters]]"
  *** That said, "[[Harpie Lady Sisters]]" cannot be Special Summoned by this card's effect.
