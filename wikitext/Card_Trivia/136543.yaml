title: Card Trivia:Masked HERO Acid
wikitext: |-
  {{Navigation}}

  * This monster appears in the second artwork of "[[Mask Change]]", with "[[Elemental HERO Absolute Zero]]" changing into this monster.
  * This monster is based on the archetypal blue Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[WATER]], which is represented by a blue-colored circle.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|055|ref}}, specifically from the panel showing [[Masked Hero Acid (manga)|this monster]] being Summoned.
