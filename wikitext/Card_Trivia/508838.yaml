title: Card Trivia:Gren, Tactician of Dark World
wikitext: |-
  {{Navigation}}

  * This card's name is the "[[Dark World]]" color pun for the color [[wikipedia:green|green]].
  ** This card's name and effect of destroying [[Spell Card]]s is a reference to Spell Cards featuring a green-colored border.
  * This card's Chinese name, 綠古林, is a combination of 綠 ("green") and 古林 ''gǔlín'' ([[wikipedia:Transcription into Chinese characters|transcription]] of its Japanese name グリン ''Gurin'').
  * "[[Dark World Grimoire]]" seems to be depicted in this card, but note this book has no "legs" which "Dark World Grimoire" has.
  * This monster appears in the artwork of "[[Dark World Archives]]".
