title: Card Trivia:Altergeist Pixiel
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Pixie|pixie]]" and "[[wikipedia:Pixel|pixel]]".
  ** A "pixie" is a mythical creature in [[wikipedia:British folklore|British folklore]] who are sometimes depicted as small, winged humanoid creatures.
  ** A "pixel" is a minute area of illumination on a display screen, one of many from which an image is composed.
