title: Card Trivia:Brohunder
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "ONiThunder" ({{Ruby|ＯＮｉ|オニ}}サンダー, ''ONiSandā'') is a portmanteau of the words "big brother" (お兄さん, ''Oniisan'') and "[[Thunder]]" (サンダー, ''Sandā'').
  * This is the last member of the [[hunder]] "family" to be released in the ''[[OCG]]''/''[[TCG]]''. The reason behind this is due to the lack of space in the ''[[V Jump Edition 7]]'', which contained only five slots; the slots were taken up by the first three members of the "hunder" family, "[[Number 91: Thunder Spark Dragon]]" and "[[Spirit Converter]]".
  ** When this card was finally released in ''[[Premium Pack 19]]'' over four years later, Konami joked that it had been lost somewhere in the [[Heartland Theme Park]]. <ref>{{citeweb|url=https://yugiohblog.konami.com/articles/?p=8183#more-8183|title=Duelist Saga: It Takes Two}}</ref>
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|013|ref}}, specifically from the panel showing [[Brohunder (manga)|this monster]] assembled with "[[Pahunder (manga)|Pahunder]]", "[[Mahunder (manga)|Mahunder]]", and "[[Sishunder (manga)|Sishunder]]".

