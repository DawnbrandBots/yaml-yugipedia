title: Card Trivia:Vendread Daybreak
wikitext: |-
  {{Navigation}}

  * "[[Revendread Slayer]]" appears in this card's artwork.
  * According to the [[Master Duel card storylines]], this card's artwork depicts the death of "Revendread Slayer" after he defeated the "[[Vendread]]" horde and before his revival into "[[Avendread Savior]]".
