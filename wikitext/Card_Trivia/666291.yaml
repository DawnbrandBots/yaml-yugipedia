title: Card Trivia:Ancient Warriors - Loyal Guan Yun
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ancient Warriors Saga - Chivalrous Path]]" and "[[Ancient Warriors Saga - Three Visits]]".
  * This monster is based on [[wikipedia:Guan Yu|Guan Yu]] ([[wikipedia:Courtesy name|courtesy name]]: '''Yunchang'''), from the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]''. Fittingly, as one of [[wikipedia:Liu Bei|Liu Bei]]'s [[wikipedia:Oath of the Peach Garden|sworn brothers]], he had a [[wikipedia:White Tiger (mythology)|White Tiger]] motif, a creature both [[wikipedia:White Tiger (mythology)|said]] to "only appear when the emperor ruled with absolute virtue" (which would refer to Liu Bei in this case) and to be associated with the West (which would be the [[wikipedia:Shu Han|Shu]] Kingdom, Liu Bei ruled). His moniker of "Loyal" refers to his unyielding loyalty to Liu Bei displayed in several occasions, notably impressed Cao Cao during his capture and subsequent escape that he decided to spare him.
  ** This monster's effect also reflect this, as it will protect other "Ancient Warriors" on the field by taking a hit by itself.
  ** Additionally, this monster's notoriously long beard is a reference to Guan Yu's moniker ("The Man with the Magnificent Beard") and also wields a [[wikipedia:Guandao|guandao]] (likely the legendary [[wikipedia:Green Dragon Crescent Blade|Green Dragon Crescent Blade]]), a type of Chinese blade he allegedly created.
