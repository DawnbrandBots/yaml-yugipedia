title: Card Trivia:Doodle Beast - Tyranno
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Crystal Revenge]]''.
  * This monster is based on the ''[[wikipedia:Tyrannosaurus|Tyrannosaurus]]'', a species of large and bipedal predatory dinosaur from the [[wikipedia:Late Cretaceous|Late Cretaceous]] period.
  * The Simplified Chinese name was likely mistakenly altered by replacing Chinese characters with pinyin. Its ''[[Master Duel]]'' name is rendered properly as "涂鸦兽－暴龙".<ref>[https://nga.178.com/read.php?tid=38962705&rand=132]</ref>

