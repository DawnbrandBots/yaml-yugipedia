title: Card Trivia:Blackbeard, the Plunder Patroll Captain
wikitext: |-
  {{Navigation}}

  * This monster is likely named after the legendary English pirate [[wikipedia:Blackbeard|Blackbeard]].
  * This monster appears in the artworks of "[[Plunder Patroll Booty]]", "[[Plunder Patroll Shipyarrrd]]", "[[Plunder Patroll Shipshape Ships Shipping]]", "[[Emblem of the Plunder Patroll]]", and "[[Plunder Patroll Parrrty]]".
  ** The telescope emblem from the "Emblem of the Plunder Patroll" appears in this card's artwork.
  * "[[Blackeyes, the Plunder Patroll Seaguide]]" appears in this card's artwork.
