title: Card Trivia:Hazy Flame Mantikor
wikitext: |-
  {{Navigation}}

  * This card is similar to "[[Manticore of Darkness]]"; they both are [[Level]] 6 [[FIRE]] [[Effect Monster]]s based on the [[wikipedia:Manticore|Manticore]].
  * This card's OCG name come from the mythical [[wikipedia:Myrmecoleon|Myrmecoleon]]; a creature born with the head of a lion and body of an ant (which can be seen as a mythical take of the real world ant-lion).
