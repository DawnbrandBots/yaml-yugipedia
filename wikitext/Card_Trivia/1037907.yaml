title: Card Trivia:Diabellze the Original Sinkeeper
wikitext: |-
  {{Navigation}}

  [[File:DiabellzetheOriginalSinkeeper-ConceptArt.png|thumb|right|250|Concept art.]]

  * This monster appears in the artworks of "[[Azamina Determination]]", "[[Azamina Aphes]]", "[[Filia Diabell]]", "[[Sinful Spoils of Slumber - Morrian]]", "[[Sinful Spoils Subdual]]", and "[[Sinful Spoils Sanctification]]".
  * The knob on this monster's cane resembles an apple, a fruit traditionally used to represent the [[wikipedia:Forbidden fruit|forbidden fruit]] growing in the [[wikipedia:Garden of Eden|Garden of Eden]].
  ** "Original Sin" references the [[wikipedia:Original sin|original sin]] of the first man, [[wikipedia:Adam and Eve|Adam]], who disobeyed God in eating the forbidden fruit.
  * This monster has an opposing [[counterpart]]: "[[Diabellstar the Black Witch]]".
  ** Both share the same [[original ATK and DEF]] (2500/2000).
  ** Both have opposite [[Attribute]]s ([[LIGHT]] and [[DARK]]).
  ** Both are associated with their own "[[Sinful Spoils]]" artifacts.
  ** This monster has white clothing with blue lining, while "Diabellstar" has black clothing with red lining.
  ** This monster has an effect that can counter "Diabellstar"-themed "Sinful Spoils" cards, as it can [[Special Summon]] itself if the opponent has a "Sinful Spoils" cards in their [[Graveyard]]; most "Sinful Spoils" cards are [[Quick-Play Spell Card]]s, and thus cannot be [[activate]]d during the player's turn unless they are [[Set]] on the [[field]] first.
  * This monster has two younger "[[White Forest]]" forms: "[[Elzette of the White Forest]]" and "[[Elzette, Azamina of the White Forest]]".
  * This monster has an upgraded "[[White Forest]]" form: "[[Diabellze the White Witch]]".
  * This monster's concept art notes the following:
  ** She is about the same height as "Diabellstar the Black Witch".
  ** Her left eye has a faint purple sclera, while her right eye is blue; this can be difficult to spot in the card's artwork.
  ** "Sinful Spoils of Slumber - Morrian" is attached to her right arm; unlike the "Sinful Spoils" possessed by "Diabellstar", "Morrian" is completely assimilated into the body of "Diabellze" and thus completely lacking in sentience.
  ** Outwardly, she appears as a friendly "good witch", though she often displays a wide range of emotions, ranging from sadistic smirks to shocked expressions.
  ** In the concept art of "[[Astellar of the White Forest]]", it is noted that this monster's younger self, "Elzette of the White Forest", is a "natural-born liar".
  * Like other ''[[OCG]]''/''[[TCG]]'' [[Illusion]] monsters, this monster's design features the [[Eye of Wdjat]] (as the patterns decorating the sleeves and the hem of the cape).
  * This is the first Illusion [[Effect Monster]] that does not feature the effect to prevent monsters from being [[destroyed by battle]]s involving itself.
