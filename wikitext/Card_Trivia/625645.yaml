title: Card Trivia:Mathematician
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectors Pack: Duelist of Legend Version]]''.
  * This monster's name is a pun on the words "mathematician" (a person who studies [[wikipedia:Mathematics|mathematics]], whereas this monster is depicted attacking using materialized mathematical formulas in the ''[[Yu-Gi-Oh! GX]]'' anime) and "magician" (reflecting this monster's appearance as an elderly magician and its [[Spellcaster]] [[Type]]).
