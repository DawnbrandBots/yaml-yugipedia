title: Card Trivia:Knight Day Grepher
wikitext: |-
  {{Navigation}}
  * This monster appears in the artworks of "[[Different Dimension Encounter]]", "[[Premature Return]]", "[[Swords at Dawn]]", and "[[Double Dai]]".
  ** This card appears in the artwork of "[[Eater of Millions]]".
  * This monster is a [[retrained]] [[Gemini monster|Gemini]] [[counterpart]] of "[[Warrior Dai Grepher]]".
  ** This card's name is a play on "night and day" and the name of "Warrior Dai Grepher".
  * This monster also appears to be the [[LIGHT]] counterpart to "[[Dark Lucius]]"; both existing on opposing paths that "Grepher" goes down.
  ** Both monsters wield the weapons of a "[[Guardian]]": "Knight Day Grepher" wields "[[Twin Swords of Flashing Light - Tryce]]" (as depicted in "Swords at Dawn") while "Dark Lucius" is possessed by "[[Wicked-Breaking Flamberge - Baou]]".
  ** The two monsters encounter each other in "Different Dimension Encounter".
