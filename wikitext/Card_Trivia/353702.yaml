title: Card Trivia:Retaliating "C"
wikitext: |-
  {{Navigation}}

  * This card's artwork is a continuation of the events in the artwork of "[[Confronting the "C"]]": the cockroaches are fighting back against the man whose point of view the artwork is in - he has fallen back in shock, as shown by the position of his foot.
  ** This is reflected in this card's effect of "scaring" the opponent's cards away ([[banish]]ing cards that would otherwise be sent to the [[Graveyard]]).
  * The Spanish lore of this card has an error, as it translates "instead" as "en vez", when it should be "en su lugar".
