title: Card Trivia:Phantasm Token
wikitext: |-
  {{Navigation}}

  * This card has the highest [[ATK]] of all [[Level]] 1 [[Token Monster]]s.
  * Prior to receiving its own artwork in ''[[Structure Deck: Sacred Beasts of Chaos]]'', in video games this card had the same artwork as "[[Raviel, Lord of Phantasms]]".
  ** In ''[[Yu-Gi-Oh! Duel Links]]'', [[Phantasm Token (Duel Links)|this card]]'s in-game artwork was updated after the release of ''Structure Deck: Sacred Beasts of Chaos'' in Japan.
