title: Card Trivia:One Hundred Thousand Gauss
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is based on [[wikipedia:Gauss (unit)|Gauss]], a unit of measurement of magnetic induction in physics.
  ** In conjunction with this card's name, the measurement of 100,000 Gauss is used in electromagnets to lift and move cars.
  * In the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this card's artwork has the same artwork as "[[Last Magnet]]".
