title: Card Trivia:Giant's Training
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Tom Thumb]]" appears in this card's artwork.
  * This card's artwork is a reference to the training scene in the 1978 martial arts comedy film, ''[[wikipedia:Drunken Master|Drunken Master]]'', in which Wong Fei-Hung undergoes training by balancing bowls of hot liquid on his knees and head. Fittingly, the man in the background of this card's artwork resembles Wong's master, Beggar So, the Drunken Master.
