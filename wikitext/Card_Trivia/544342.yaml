title: Card Trivia:The Weather Painter Cloud
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[The Weather Cloudy Canvas]]", "[[The Weather Forecast]]", and "[[The Weather Rainbowed Canvas]]".
  * This card's Japanese name, "Slate", is a reference to the [[wikipedia:Slate gray|slate gray]], a blueish-gray color based on [[wikipedia:Slate|the mineral]] with the same name, which is similar to the color of storm clouds.
