title: Card Trivia:Floowandereeze and the Magnificent Map
wikitext: |-
  {{Navigation}}

  * The wind patterns in this card's artwork correspond with the migration routes of the [[wikipedia:Arctic tern|Arctic tern]] (which the "[[Floowandereeze]]" monsters are based on) between the Arctic and Antarctic regions.
  * The map in this card's artwork depicts landmarks of certain countries which correspond with a certain real-life bird found in said country, including:
  ** A [[wikipedia:Pine|pine tree]] in [[wikipedia:Greenland|Greenland]], referencing the location of "[[Floowandereeze & Snowl]]".
  ** A city in [[wikipedia:North America|North America]], referencing the location of "[[Floowandereeze & Eglen]]".
  ** The [[wikipedia:Amazon River|Amazon River]] in [[wikipedia:South America|South America]], referencing the location of "[[Floowandereeze & Toccan]]".
  ** The [[wikipedia:Big Ben|Big Ben]] clock tower in [[wikipedia:England|England]], referencing the location of "[[Floowandereeze & Robina]]".
  ** An [[wikipedia:Adansonia|adansonia tree]] in [[wikipedia:Africa|Africa]], referencing the location of "[[Floowandereeze & Stri]]".
  ** A penguin in [[wikipedia:Antarctica|Antarctica]], referencing the location of "[[Floowandereeze & Empen]]".
