title: Card Trivia:Spright Red
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spright Gamma Burst]]".
  * The symbol for the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Virgo (constellation)|Virgo]] (♍︎︎) appears on this monster's outfit.
  * This monster is named after [[wikipedia:Sprite (lightning)|red sprites]], a large-scale electrical discharge colored red.
