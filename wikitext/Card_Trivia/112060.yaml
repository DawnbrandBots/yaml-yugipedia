title: Card Trivia:Tuner's Scheme
wikitext: |-
  {{Navigation}}

  * The man in this card's artwork appears in the artwork of "[[Tuning Collapse]]".
  * The man in this card's artwork is depicted holding a [[wikipedia:Tuning fork|tuning fork]], which references how [[Tuner monster]]s are used in [[Synchro Summon]]ing, as this card's effect takes [[control]] of [[Synchro Monster]]s.
