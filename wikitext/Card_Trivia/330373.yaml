title: Card Trivia:Absorb Fusion
wikitext: |-
  {{Navigation}}

  * "[[Gem-Knight Master Diamond]]" appears in this card's artwork.
  * This card's name is based on gemstone absorption, the process in which [[wikipedia:Gemstone|gemstones]] absorb certain wavelengths of light while reflecting the other wavelengths, which gives them their color and brilliance.
  * This card's background is dark as opposed to light compares to other from the time of release, signifying the core of "[[Gem-Knight Master Diamond]]" is malfunctioning and absorbs light instead of emitting it. Perhaps this is the beginning of his transformation into "[[Cairngorgon, Antiluminescent Knight]]".
