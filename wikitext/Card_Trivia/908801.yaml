title: Card Trivia:Raging Storm Dragon - Beaufort IX
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Beaufort scale|Beaufort scale]], an empirical measure that relates wind speed to observed conditions at sea or on land. The Roman numeral IX is the same number as this monster's [[Level]]. Additionally, a 9 on the Beaufort scale represents a strong/severe gale.
  ** This card's Japanese name, includes the Latin word "Novem" behind "Beaufort", which means 9.
  * This monster can be considered a counterpart to "[[Sauravis, the Ancient and Ascended]]" due to the following:
  ** Both cards have effects that discard themselves as a cost, and are capable of returning themselves from the [[field]] to the [[hand]].
  ** Both cards require a specific [[Ritual Spell Card]] to be [[Ritual Summon]]ed, which is also capable of Summoning any [[Ritual Monster]] with their [[Attribute]].
