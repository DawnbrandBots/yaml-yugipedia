title: Card Trivia:Penguin Soldier
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster Chronicle]]'' and ''[[Starter Pack Volume 1]]''.
  * This monster has a [[recolored counterpart]]: "[[Penguin Knight]]".
  * This monster has a [[Rush Duel]] counterpart: "[[Penguin Soljersey]]".
  * This monster appears in the artworks of "[[Battle x 2]]" and "[[Drop Exchange]]".
  ** This monster, or "[[Penguin Knight]]", appears in the artworks of "[[Diamond Dust]]" and "[[Penguin Sword]]".
  *** Both monsters appear in the artwork of "[[Soul Connection]]".
