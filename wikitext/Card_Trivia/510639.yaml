title: Card Trivia:Skull Dice
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Joey]]''.
  * The demon in this card's artwork appears in the artworks of "[[Dicetadium of Fate]]", "[[Graceful Skull Dice]]", and "[[Star Blaster]]".
  ** The red die in this card's artwork appears in the artworks of "[[Dice Archdemon]]", "[[Fusion Recycling Plant]]", "Graceful Skull Dice", "Star Blaster", "[[Twister]]", and "[[Weighbridge]]".
  * This card has an [[ATK]]/[[DEF]]-increasing [[counterpart]]: "[[Graceful Dice]]".
  * This card has a [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart combined with "Graceful Dice": "Graceful Skull Dice".
  * This card has a ''[[Rush Duel]]'' [[Monster Card]] counterpart: "[[Dice Demon]]".
