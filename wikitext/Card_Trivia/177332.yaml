title: Card Trivia:Digvorzhak, King of Heavy Industry
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Bucket-wheel excavator|bucket-wheel excavator]], a large heavy equipment machine which features a wheel and buckets to continuously scoop material while the wheel turns.
  * The Japanese pronunciation of this card's name, "Dobokzak" (''Doboku Zāku'') features the word ''Zāku'', the Japanese onomatopoeia for metal grinding or screeching against metal.
