title: Card Trivia:Mecha Phantom Beast Aerosguin
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] is based on a [[wikipedia:penguin|penguin]] and an [[wikipedia:Aeroscraft|Aeroscraft]] rigid airship.
  * This card is the only "[[Mecha Phantom Beast]]" monster whose artwork doesn't feature any "[[Mecha Phantom Beast Token]]s", despite it has the ability to [[Special Summon]] them. This could be a reference to the fact that while it can Summon the tokens, it had no [[Card effect|effect]] enabling them to be [[Tribute]]d.
  * Unlike most other "Mecha Phantom Beast" monsters, this monster's hologram projector isn't integrated into its main body, but hovering around it instead as separate units.
