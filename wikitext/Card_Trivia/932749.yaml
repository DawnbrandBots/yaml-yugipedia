title: Card Trivia:Altergeist Peritrator
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Peri|Peri]]" and "[[wikipedia:Penetration test|penetration test]]".
  ** "Peri" is a spirit in [[wikipedia:Persian mythology|Persian mythology]] who is depicted as a beautiful winged humanoid spirit.
  ** A "penetration test" is an authorized simulated cyberattack on a computer system, performed to evaluate the security of the system.
  *** The penetration test also accounts for testing the computer system's [[Firewall (archetype)|firewall]], which is reflected in this monster's [[FIRE]] [[Attribute]] and its fiery appearance.
