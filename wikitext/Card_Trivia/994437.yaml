title: Card Trivia:Swipnir
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's name is based on [[wikipedia:Pointing device gesture|Swiping]], a pointing device gesture, and [[wikipedia:Sleipnir|Sleipnir]], both an eight-legged horse in Norse mythology and a [[wikipedia:Sleipnir (web browser)|web browser]].
