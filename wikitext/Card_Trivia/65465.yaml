title: Card Trivia:Amazon of the Seas
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart]]: "[[Enchanting Mermaid]]".
  * This monster is listed as a [[Fusion Material]] for "[[Aqua Dragon]]" and "[[Man-eating Black Shark]]", which were the first [[Fusion Monster]]s to list more than two Fusion Materials.
  ** Both Fusion Monsters were released in ''[[Booster 4]]'' in the ''[[OCG]]''; "Aqua Dragon" was released in the ''[[TCG]]'' before this card and "[[Fairy Dragon]]".
  ** This is one of the few cards that is not available in ''[[Yu-Gi-Oh! World Championship 2007]]'', although "Aqua Dragon" is obtainable.
  ** This is one of two cards listed as a Fusion Material on multiple Fusion Monsters with more than two listed Fusion Materials; the other is "[[Elemental HERO Neos]]" (used for "[[Elemental HERO Nebula Neos]]" and "[[Elemental HERO Storm Neos]]").
  * This monster and "[[Gigaplant]]" appeared in the ''[[wikipedia:Mad TV|MADtv]]'' television sketch, "Yu-Gi-Bear!".
