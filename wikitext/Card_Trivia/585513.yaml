title: Card Trivia:Crackdown
wikitext: |-
  {{Navigation}}

  * "[[Goe Goe the Gallant Ninja]]" appears in this card's artwork.
  * This card is a reference to the [[wikipedia:Edo period police|Edo Period police force]], specifically where civilians would assist local police on investigations to capture suspects. This also makes it thematically similar to the "[[Goyo]]" archetype.
