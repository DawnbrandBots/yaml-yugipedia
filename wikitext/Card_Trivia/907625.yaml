title: Card Trivia:Clear New World
wikitext: |-
  {{Navigation}}

  * This world appears in the background of the artwork and in the right arm of "[[Visas Starfrost]]", the right hand of "[[Scareclaw Reichheart]]" and "[[Scareclaw Light-Heart]]", the body and wings of "[[Scareclaw Tri-Heart]]", the right shoulder of "[[Tearlaments Reinoheart]]", the body and tentacles of "[[Tearlaments Kaleido-Heart]]", the left arm of "[[Kashtira Riseheart]]" and "[[Kashtira Arise-Heart]]", the background of "[[Vicious Astraloud]]", and the background of "[[Sharv Sarga]]".
  * This card's name, "Clear New World" ({{Ruby|新世壊|ニュー・クリア・ワールド}} ''Nyū Kuria Wārudo'', "New Clear World"), is a pun of "Nuclear" (ニュークリア ''Nyūkuria'') and "New Clear" (ニュー・クリア ''Nyū Kuria'').
  ** This card's effect to target a [[face-up]] monster the player [[control]]s, [[destroy]] it, and [[Special Summon]] a monster from the [[Deck]] in [[Defense Position]] with a different original [[Type]] and [[Attribute]], whose [[Level]] is lower than that monster's [[original Level]], may be based on the concept of [[wikipedia:Radioactive decay|nuclear decay]] - a process by which an unstable [[wikipedia:Atomic nucleus|atomic nucleus]] loses energy by radiation, emits particles, and becomes an atom of an element with a lower mass.
  *** This effect may also be based on the effect of "Visas Starfrost" to [[target]] a monster the player controls with a different Type and Attribute than it, destroy it, and Special Summon itself from the hand.
  * This card has four [[counterpart]]s.
  ** "[[Scareclaw]]"-related: "[[Primitive Planet Reichphobia]]"
  *** This card's effect of Special Summoning monsters in [[Defense Position]] is also similar to the effects of the "Scareclaw" cards.
  ** "[[Tearlaments]]"-related: "[[Primeval Planet Perlereino]]"
  ** "[[Kashtira]]"-related: "[[Pressured Planet Wraitsoth]]"
  ** "[[Mannadium]]"-related: "[[Peaceful Planet Calarium]]"
