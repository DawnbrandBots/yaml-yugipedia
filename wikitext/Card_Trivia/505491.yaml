title: Card Trivia:Gilasaurus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Lost World]]".
  * This monster is likely based on the ''[[wikipedia:Velociraptor|velociraptor]]'', because of its effect to be instantly Special Summoned as a reflection of the ''velociraptor's'' incredible speed. It also sports a large sickle-like claw on its second digit on the foot.
  ** Its effect could be a reference to the movie ''Jurassic Park'', where it's stated that velociraptors are pack hunters: by Special Summoning this card, the owner can still Normal Summon another monster.
