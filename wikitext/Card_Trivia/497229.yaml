title: Card Trivia:Subterror Behemoth Dragossuary
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Extra Pack 2017]]''.
  * This monster's English name is a portmanteau of the words "dragon" and "ossuary", an area in which the bones of dead people are placed, reflecting this monster's design as a skeletal dragon.
  ** This monster's Japanese name, "Subterror Malice Alrabone" is a reference to the [[wikipedia:Alboran Sea|Alboran Sea]], keeping with the [[wikipedia:Mediterranean Sea|Mediterranean Sea]] theme of the Japanese names of the "[[Subterror Behemoth]]" monsters.
