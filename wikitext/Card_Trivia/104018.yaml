title: Card Trivia:Copycat
wikitext: |-
  {{Navigation}}

  * This monster has a [[Metal counterpart]]: "[[Metal Illusionist]]".
  * In the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]], this card is an [[Illusion Card]] that can copy the effect of any card (not just monster) used by the opponent. In the [[Yu-Gi-Oh! (anime)|anime]], this card's property was changed to a [[Level 5]] [[Spellcaster]] monster with 100 [[DEF]] and maintained its manga counterpart's effect before it was changed upon its release in the ''[[OCG]]''/''[[TCG]]''.
  ** Notably, in the manga, this card is only capable of copying a monster with the help of a "puppet", but what this "puppet" entails is never shown, as this card has only ever been used to copy a [[Spell]]/[[Trap Card]].
  * In this card's Chinese print in ''[[Starter Pack Volume 2]]'', the character ''族'' is missing from the [[Type]] line.
