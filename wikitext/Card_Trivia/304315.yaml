title: Card Trivia:Tainted Wisdom
wikitext: |-
  {{Navigation}}

  * This card's artwork may be inspired by the condition [[wikipedia:Cysticercosis|cysticercosis]], a health anomaly in which ingested pork tapeworms migrate to the brain, where they can not only live there but where they also can leave aching cysts throughout the organ.  The artwork may support this because there appear to be worm-like appendages extending from parts of the atrophied brain, which combined, make up this monster.
