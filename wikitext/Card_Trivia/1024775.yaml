title: Card Trivia:A.I. Meet You
wikitext: |-
  {{Navigation}}

  [[File:Ai_restored_body.png|thumb|right|300|Ai gets his body back.]]

  * [[Ai]] and [[Yusaku Fujiki]]'s [[Duel Disk]] appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|VRAINS|12|ref}}, where Ai's body is restored after his data is recovered from [[Varis]].
  * This card's Japanese name (めぐり－Ａｉ-) is a wordplay on "chance meeting" (めぐり合い, ''meguriai'').
  * This card, "[[A.I. Challenge You]]", and "[[You and A.I.]]" all share in common the wordplay use of the words "You" and "I" in their ''[[TCG]]'' names, with "I" being substituted with "[[A.I.]]". Fittingly, all three cards were part of the "[[@Ignister]]" support released together in ''[[Lightning Overdrive]]''.

