title: Card Trivia:Morinphen
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from a [http://gatherer.wizards.com/Pages/Card/Details.aspx?multiverseid=4463 similarly named] card from ''[[wikipedia:Magic: The Gathering|Magic: The Gathering]]''.
  * Among ''[[OCG]]'' players, this card is well known as a joke card (much like "[[Shapesnatch]]" in the ''[[TCG]]'') due to it being a [[Level 5]] [[Normal Monster]] with poor stats, but with [[ATK]] slightly too high to be [[search]]ed or Summoned by most common recruiters. Because of this, it has ranked highly among various user polls in Japan, notably in sleeve votes for both the ''OCG'' and ''[[Yu-Gi-Oh! Master Duel]]'' as a potential troll vote.
  ** Despite typically not winning, it often receives some merchandise as a consolation prize.
  * In ''[[Yu-Gi-Oh! Duelists of the Roses]]'', when this monster is made [[Deck Leader]], it'll speak in Latin.
