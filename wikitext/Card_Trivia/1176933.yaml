title: Card Trivia:Astrograph Sorcerer, the Star Magician
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Astrograph Sorcerer]]".
  ** This monster's Japanese title (星霜の魔術師, ''Seisō no Majutsushi'') is a reference to the Japanese poetic term for the passage of time (星霜, ''seisō'' lit. "Stars and Frost"), as well as a reference to the Japanese name of "[[Star Pendulumgraph]]" (星霜のペンデュラムグラフ, ''Seisō no Pendyuramugurafu''), a card which depicts "Astrograph Sorcerer" in its artwork.
