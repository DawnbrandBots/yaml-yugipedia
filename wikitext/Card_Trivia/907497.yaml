title: Card Trivia:S-Force Rappa Chiyomaru
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[S-Force Bridgehead]]", "[[S-Force Chase]]", and "[[Small Scuffle]]" (as the cloaked figure, recognizable by the footwear).
  * The "[[S-Force]]" crest is located on the base of this monster's left robe sleeve.
  * The word "Rappa" is an archaic Japanese word meaning "spy" or "ninja".
  * This monster has a [[retrain]]ed [[Link Monster]] counterpart: "[[S:P Little Knight]]".
  * This monster serves as the narrator of the "S-Force" storylines in ''[[The Valuable Book EX card storylines|The Valuable Book EX]]'' and ''[[Yu-Gi-Oh! Master Duel]]''.
  * This card's artwork is adapted into ''[[Underground Data Courier]]'' in ''Yu-Gi-Oh! Master Duel'', specifically the scene where [[Chiyomaru]] is about to attack [[I:P Masquerena (character)|I:P Masquerena]] with her shuriken.
