title: Card Trivia:Opticlops
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Giant Hunter]]".
  * This monster is based on the [[wikipedia:Cyclopes|Cyclops]], similar to "[[Hitotsu-Me Giant]]".
  * This is one of a few monsters depicted as servants of "[[Dark Ruler Ha Des]]"; the others are "[[Winged Minion]]" (seen in "[[Victim Barrier]]"), "[[Dark Resonator]]" (in "[[Mind Trust]]") and "[[Berserk Dragon]]" (in "[[A Deal with Dark Ruler]]").
