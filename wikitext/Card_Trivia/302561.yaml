title: Card Trivia:Chronomaly Gordian Knot
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Gordian Knot|Gordian Knot]], an [[wikipedia:Ancient Greece|Ancient Greek legend]] where a peasant farmer named Gordias immediately becomes king after entering the city of [[wikipedia:Phrygia|Phrygia]] on an ox-cart, which was prophesized by an oracle. Gordias's son, Midas dedicated the ox-cart to the Greek god [[wikipedia:Zeus|Zeus]] and tied it to a post with an intricate knot of cornel bark.
  ** This monster's appearance is based on how the Gordion knot is described as a complex knot comprised of other several knots so tightly entangled that it was impossible to see where it was fastened. In 4th century B.C., [[wikipedia:Alexander the Great|Alexander the Great]] attempted to unite the knot by unraveling it to rule all of Asia, but struggled and cut it with his own sword instead.
  * This monster's Japanese name, "OOParts Gordias Unite" reflects its effect to "unite" its [[Level]] with the Level of a "[[Chronomaly]]" monster [[Special Summon]]ed from the [[hand]] by its effect.
