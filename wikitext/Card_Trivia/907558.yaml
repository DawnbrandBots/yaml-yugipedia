title: Card Trivia:Evil Star Beacon
wikitext: |-
  {{Navigation}}

  * "[[Echeclus the Star Knight]]" and "[[Nessus the Star Knight]]" appear in this card's artwork.
  ** This is referenced by the text of "Nessus", which describes "Echeclus" as being his mentor. Also, both of these monsters are [[LIGHT]] [[Fiend]] [[Normal Monster]]s whose combined [[Level]]s equal exactly 10.
