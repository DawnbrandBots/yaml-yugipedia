title: Card Trivia:Stuffed Animal
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Kuigurumi" (くいぐるみ, ''Kuigurumi''), is a pun on the Japanese words "''nuigurumi''" (ぬいぐるみ, lit. "stuffed toy") and "''kui''" (くい, lit. "to eat").
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's [[Type]] is [[List of Comic monsters|Comic]], allowing it to gain a power bonus from the [[Toon (terrain)|Toon terrain]].
