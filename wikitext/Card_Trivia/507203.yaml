title: Card Trivia:Aussa the Earth Charmer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Over Rush Pack 4]]'', ''[[Structure Deck: Spirit Charmers]]''/''[[Structure Deck: Masters of the Spiritual Arts]]'', ''[[Structure Deck: Masters of the Spiritual Arts Spirit Art Awakening Pack]]'', and ''[[Structure Deck: Masters of the Spiritual Arts - The Legend of Duelist Quarter Century Edition]]''.
  * This monster appears in the artworks of "[[Grand Spiritual Art - Ichirin]]", "[[Spirit Charmers]]", "[[Spiritual Earth Art - Kurogane]]", "[[Spiritual Power Recovery Potion]]", and "[[Spiritual Refinement]]" (although the former two may be featuring "[[Aussa the Earth Charmer, Immovable]]" instead).
  * "[[Archfiend Marmot of Nefariousness]]" appears in this card's artwork, serving as this monster's familiar.
  * This monster's name, "Aussa", or "Aus" (アウス, ''Ausu'') in Japanese, is derived from the word "Earth" (アース, ''Āsu'').
  * This monster has five [[Card evolutions|upgraded]] [[counterpart]]s: 
  ** A "[[Familiar-Possessed]]" counterpart: "[[Familiar-Possessed - Aussa]]".
  ** A [[Link Monster|Link]] counterpart: "[[Aussa the Earth Charmer, Immovable]]".
  ** A Channeler counterpart: "[[Aussa the Earth Channeler]]".
  ** A [[Cataclysmic Charmer]] counterpart: "[[Avalanching Aussa]]".
  ** A retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Aussa the Earth Spiritualist]]".
