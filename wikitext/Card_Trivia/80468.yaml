title: Card Trivia:Saggi the Dark Clown
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Deflector]]".
  * This monster's name may be derived from "''sagi''" (詐欺), the Japanese word for "fraud" or "scam".
  * This is the first [[Spellcaster]] monster to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This monster has an [[Illegal]] Japanese-only [[counterpart]] featuring a prize-winner's face: "[[Masahiro the Dark Clown]]".
  * This monster has a [[retrained]] counterpart: "[[Peten the Dark Clown]]".
  ** Both share the same [[Attribute]] ([[DARK]]), [[Level]] (3), and [[Type]] (Spellcaster).
  ** Both were also used by [[Seto Kaiba]] in the original ''Yu-Gi-Oh!'' series to [[activate]] the effect of a [[Virus Card]].
  * The [[Saggi the Dark Clown (Bandai)|Bandai version]] of this card is [[Level 4]] and has 2200 [[DEF]], while the [[Konami]] version is [[Level 3]] and has 1500 DEF.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's Type is [[List of Comic monsters|Comic]], allowing it to gain a power bonus from the [[Toon (terrain)|Toon terrain]].
  * This monster's pose in its ''OCG''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|037|ref}} showing [[Saggi the Dark Clown (manga)|this monster]] being [[equip]]ped with "[[Dark Energy (manga)|Dark Energy]]".
  ** This monster's pose in its [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from a different panel in the same chapter showing [[Saggi the Dark Clown (manga)|this monster]] being Summoned.
