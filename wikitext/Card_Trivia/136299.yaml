title: Card Trivia:Daigusto Eguls
wikitext: |-
  {{Navigation}}

  * "[[Windaar, Sage of Gusto]]" is shown riding a more mature version of "[[Gusto Egul]]" in this card's artwork.
  * The effect of this card is a mirror version of "[[Daigusto Gulldos]]"' effect, destroying face down cards instead of face up cards.
