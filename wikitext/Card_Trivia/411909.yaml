title: Card Trivia:Dr. Frankenderp
wikitext: |-
  {{Navigation}}

  * Pictures of "[[Magical Scientist]]", "[[Kozaky]]", and the other scientist from "[[Iron Core Specimen Lab]]" and "[[Compulsory Escape Device]]" appear in this card's artwork. The former's picture is on a punching bag, while the latter two's pictures are on a dartboard riddled with darts, implying that this monster has a grudge against all three scientists.
  ** The horns of "Kozaky" were not removed in this card's TCG artwork.
  * This monster's Japanese name, "Dr. Frange", is a portmanteau of "''[[wikipedia:Victor Frankenstein|Dr. Frankenstein]]''", "strange" and "furage". The latter word means "flying get" and is a term used to describe finding something earlier than you should.
