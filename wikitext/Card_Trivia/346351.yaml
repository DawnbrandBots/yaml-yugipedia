title: Card Trivia:Gagaga Mancer
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "[[wikipedia:Necromancy|necromancer]]", the term used for a Spellcaster who uses magic to raise the dead, which reflects its effect to [[Special Summon]] a "[[Gagaga]]" monster from the [[Graveyard]].
  ** The hilt of this monster's sword features an [[wikipedia:Ankh|ankh]], an ancient Egyptian hieroglyphic character that reads as "life", representing the concept of eternal life, which further reflects this monster's effect to Special Summon a "Gagaga" monster from the Graveyard.
  * This is the only [[Spellcaster]] "Gagaga" monster to not feature an effect that involves the manipulation of [[Level]]s.
  * This is the only female "Gagaga" monster to have their face covered, as well as the only "Gagaga" monster to have all of its eyes covered.
