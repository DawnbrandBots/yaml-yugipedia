title: Card Trivia:Cyclone Blade
wikitext: |-
  {{Navigation}}

  * "[[Destiny HERO - Dogma]]" appears in this card's artwork.
  * This blade appears in the artwork of "[[D - Burst]]".
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this card was called "[[Heavy Storm Blade]]", referencing "[[Heavy Storm]]".
  ** Both "Heavy Storm Blade" and "Heavy Storm" can destroy all other [[Spell]] and [[Trap Card]]s on the [[field]].
  ** This card's anime version's Japanese name, 「大嵐剣」 (ヘビーストームブレード ''Hebī Sutōmu Burēdo''), shares part of its kanji with "Heavy Storm", 「大嵐」(おおあらし ''Ōarashi''). The Japanese name for "Heavy Storm" is read with a native Japanese reading, while the base kanji 「大嵐」 for this card's anime name is force read as "Heavy Storm", referencing the English name for "Heavy Storm".
