title: Card Trivia:Titaniklad the Ash Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dogmatika Punishment]]".
  ** This monster's silhouette also appears in the artwork of "[[Nadir Servant]]", and that of its head inside one of the ice spikes in the artworks of "[[Mirrorjade the Iceblade Dragon]]" and "[[Branded Sword]]".
  * This monster is a "[[Dogmatika]]"-oriented [[Card evolutions|empowered]] [[Albaz Dragon|form]] of "[[Fallen of Albaz]]".
  ** This card's Japanese name, "Bastard" (バスタード ''Basutādo''), is a reference to the kanji ''Rakuin'' (落胤, "Fallen Child") in the Japanese name of "Fallen of Albaz".
  *** This card's ''[[TCG]]'' name, "Titaniklad", is a reference to this monster's appearance as a dragon clad in a titanium-like armor.
  ** This card's effect to make itself [[unaffected]] by the activated effects of any other monsters [[Special Summon]]ed from the [[Extra Deck]] is similar to the Extra Deck-countering playing style of the "Dogmatika" archetype.
  * This monster's metallic appearance is very similar to that of "[[Lubellion the Searing Dragon]]" and "[[The Bystial Lubellion]]".
  ** The names of "Titaniklad the Ash Dragon" and "Lubellion the Searing Dragon" are both related to fire.
  *** The kanji ''Kaijin'' (灰燼, "Ash") in the Japanese name of "Titaniklad the Ash Dragon" can also be interpreted as "worthless", as in the expression ''kaijin-tokasu'' (灰燼と化す, "turned to ashes") for effort that is rendered worthless due to ruin or failure. It is a stark contrast to the grandiose kanji ''Shin'en'' (神炎, "God Flame") in the Japanese name of "Lubellion the Searing Dragon".
