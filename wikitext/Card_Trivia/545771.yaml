title: Card Trivia:Heavymetalfoes Electrumite
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Electrum|electrum]], an alloy of [[wikipedia:Gold|gold]] and [[wikipedia:Silver|silver]].
  ** Fittingly, this monster is "[[Metalfoes Silverd]]" wearing her armor and that of "[[Metalfoes Goldriver]]".
  *** This card's [[ATK]] is also the average of the ATK of "Silverd" and "Goldriver".
  * This card is the first [[Psychic]] [[Link Monster]].
  ** It is also the first "[[Metalfoes]]" [[Extra Deck]] monster that is not a [[Fusion Monster]].
  ** It is also the first Link Monster to list [[Pendulum Monster]]s as [[Link Material]]s.
  * In ''[[Yu-Gi-Oh! Legacy of the Duelist: Link Evolution]]'' and in the official card database, this card mistakenly had the artwork of "[[Armed Dragon Catapult Cannon]]" instead.
