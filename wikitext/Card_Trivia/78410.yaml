title: Card Trivia:Junk Warrior
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck 2008]]''/''[[Starter Deck: Yu-Gi-Oh! 5D's]]'', ''[[Duelist Pack: Yusei]]'', and is also one of the cover cards of ''[[Structure Deck: Synchron Extreme]]''/''[[Synchron Extreme Structure Deck]]'', ''[[Animation Chronicle 2023]]'', ''[[Maze of Millennia]]'', and ''[[Battles of Legend: Monster Mayhem]]''.
  * This monster appears in the artworks of "[[Clashing Souls]]", "[[Dimension Voyage]]", "[[Give and Take]]", "[[Junk Signal]]", "[[Scrap Fist]]", "[[Speed Spell - Synchro Return]]", "[[Synch Blast Wave]]", "[[Synchro Chase]]", "[[Synchro Deflector]]", "[[Synchro Emergency]]", "[[Synchro Gazer]]", "[[Synchro Spirits]]", "[[Synchro Strike]]", and "[[Urgent Tuning]]".
  ** The artworks of "Synchro Strike" and "Urgent Tuning" suggest that this monster's [[Synchro Summon]] is intended to specifically use "[[Junk Synchron]]" and "[[Speed Warrior]]" as [[Synchro Material]]s. This is reinforced multiple times in the ''[[Yu-Gi-Oh! 5D's]]'' anime, where [[Junk Warrior (anime)|this monster]] was Synchro Summoned using "[[Junk Synchron (anime)|Junk Synchron]]" and "[[Speed Warrior (anime)|Speed Warrior]]" as materials.
  * This card's second artwork is based on a scene from {{episode|5D's|001|ref}}, showing [[Junk Warrior (anime)|this monster]] being Summoned.
  * This monster has an [[Card evolutions|upgraded]] form: "[[Junk Warrior Extreme]]".
  * This monster has an upgraded "[[/Assault Mode]]" form: "[[Junk Warrior/Assault Mode]]".
  * This monster shares the same scarf and engine design on its back as "[[Junk Synchron]]". 
  * This is the [[signature card]] of [[Yusei Fudo]] in the ''Yu-Gi-Oh! 5D's'' anime, along with "[[Stardust Dragon (anime)|Stardust Dragon]]".
  ** This monster's effect to gain [[ATK]] from [[Level 2]] or lower monsters [[control]]led by the player reflects how Yusei draws his strength from his friends.
  * This is the first and last [[Synchro Monster]] to be Synchro Summoned in the ''Yu-Gi-Oh! 5D's'' anime.
  ** This is also the [[featured card]] of the first and last episode of the ''Yu-Gi-Oh! 5D's'' anime.
  * This is the first Synchro Monster to require a specific [[Tuner monster]] as [[Synchro Material]].
  * This is one of the first Synchro Monsters to be released in the ''[[TCG]]'', alongside "[[Gaia Knight, the Force of Earth]]" and "[[Colossal Fighter]]".
  * This is the first Synchro Monster to be released in ''[[Starter Deck 2009]]'' with a [[Common]] [[rarity]].
  * This monster is similar to "[[Elemental HERO Flame Wingman]]", a monster used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Both monsters were initially the signature cards of their respective anime's protagonist before they acquired a new signature card with an [[original ATK and DEF]] of 2500/2000.
  ** Both monsters were Summoned from the [[Extra Deck]] and used to defeat their opponent's monster with 3000 [[ATK]] in the first episode of their respective anime.
  * In ''[[Bonds - Kizuna]]'', the first Japanese opening theme song of the ''Yu-Gi-Oh! 5D's'' anime, the words "JUNK WARRIOR ATK 2300" are briefly displayed from inside Yusei's helmet visor; this is one of the few opening song details retained in the international version of the anime.
  * After {{episode|5D's|102|ref}}, this monster did not appear for 52 episodes until it was Summoned in the final episode, {{episode|5D's|154|ref}}, when it was used to defeat [[Jack Atlas]].
  ** During the final episode, this monster destroys "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" by battle, which can be interpreted as its payback after it was destroyed in battle by "Red Dragon Archfiend" in {{episode|5D's|005|ref}}.
  * This monster's signature attack, "[[Attack and effect names in Yu-Gi-Oh! 5D's|Scrap Fist]]", was directly homaged in the first episode of the anime ''[[wikipedia:Symphogear|Senki Zessho Symphogear G]]'', in which protagonist [[W:c:symphogear:Hibiki Tachibana|Hibiki Tachibana]] enlarged her right arm and engaged a set of brass knuckles, then rocketed forward with boosters on her back and a scarf trailing behind in a fashion identical to the typical stock footage of this monster. The two series have the same director, [[Katsumi Ono]].
