title: Card Trivia:Cocosh the Spellcaster of Happiness
wikitext: |-
  {{Navigation}}

  * This card is based on the [https://www.cocos-jpn.co.jp/menu/grand/dessert/cocoshe_maple2203.html Maple Cocosh], a [[wikipedia:Danish pastry|Danish pastry]] offered by the Japanese branch of ''[[Wikipedia:Coco's Bakery|Coco's Bakery]]''.
  ** The monster's design features a small plate of Cocosh as a head accessory, its color scheme is similar to it, and the white decorations on the hems of the outfit resemble the whipped cream on its top.
  ** The [[flavor text]] naming this monster's magic "Danish" references the nature of the Cocosh as a Danish pastry, while the name of her companion, "Maple" references the name and the flavor of the Cocosh.
