title: Card Trivia:Meklord Deflection
wikitext: |-
  {{Navigation}}

  [[File:Astro Mekanikle deflects the attacks.png|thumb|"[[Meklord Astro Mekanikle (anime)|Meklord Astro Mekanikle]]" deflecting the attacks.]]

  * "[[Meklord Astro Mekanikle]]" appears in this card's artwork.
  * This card's artwork is based on a scene from the fifth opening of the ''[[Yu-Gi-Oh! 5D's]]'' anime, ''[[Road to Tomorrow ~Going My Way!!~]]'', in which "[[Meklord Astro Mekanikle (anime)|Meklord Astro Mekanikle]]" deflects the attacks of "[[Red Nova Dragon (anime)|Red Nova Dragon]]" and "[[Black-Winged Dragon (anime)|Black-Winged Dragon]]".
  * This card's effect likely references the anime effects of the "[[Meklord Emperor]]" monsters, whose [[ATK]] were equal to the combined total of the various "[[Wisel]]", "[[Skiel]]", and "[[Granel]]" parts ("[[Top]]", "[[Attack (archetype)|Attack]]", "[[Guard]]", and "[[Carrier]]") present on the field.

