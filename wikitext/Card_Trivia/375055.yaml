title: Card Trivia:Scapeghost
wikitext: |-
  {{Navigation}}

  * This card is the [[Zombie counterpart]] of "[[Scapegoat]]".
  ** Its name is a pun on "Scapegoat's" name, with properties nearly identical to those of "[[Sheep Token]]s".
  ** This card is the first Zombie counterpart of a [[Spell Card]].
  * Several "[[Black Sheep Token]]s" appear in this card's artwork.
  * This monster appears in the artwork of "[[Amazement Abomination Arlekino]]" (as balloons).
