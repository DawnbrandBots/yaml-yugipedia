title: Card Trivia:NEX
wikitext: |-
  {{Navigation}}

  * "[[Neo-Spacian Air Hummingbird]]", "[[Neo-Spacian Aqua Dolphin]]", "[[Neo-Spacian Dark Panther]]", "[[Neo-Spacian Flare Scarab]]", "[[Neo-Spacian Glow Moss]]", and "[[Neo-Spacian Grand Mole]]" appear in this card's artwork.
  ** Despite this, this card can currently be used with "Aqua Dolphin" and "Glow Moss" to [[Special Summon]] "[[Neo-Spacian Marine Dolphin]]" and "[[Neo-Spacian Twinkle Moss]]", respectively.
  * This card's name is short for "Neo-Spacian Extent".
  * This card has an [[Card evolutions|upgraded]] form: "[[NEXT]]".
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "NEXT", "[[ZERO-MAX]]", the "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * This card's effect to [[send]] one1 [[face-up]] "[[Neo-Spacian]]" monster the player controls to the [[Graveyard]] and Special Summon a [[Level 4]] monster with the same name from the [[Extra Deck]] is similar to the effect of "[[Metamorphosis]]" to allow the player to [[Tribute]] a monster and Special Summon a [[Fusion Monster]] with the same [[Level]] from the Extra Deck.
  ** Fittingly, in the ''[[Yu-Gi-Oh! GX]]'' anime, this card and "[[Metamorphosis (anime)|Metamorphosis]]" were both used by [[Jaden Yuki]].
  ** This card is also similar to the "[[Change]]" [[Quick-Play Spell]]s, which were used by [[Jaden Yuki (manga)|Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga with his "[[Masked HERO]]" monsters, to Summon [[Fusion Monster]]s from the Extra Deck via [[Transformation Summon]].
