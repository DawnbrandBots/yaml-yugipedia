title: Card Trivia:Magicalibra
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the words "magical", "calibrate", and "[[wikipedia:Libra (astrology)|Libra]]", the seventh [[wikipedia:Astrological sign|astrological sign]] of the [[wikipedia:Zodiac|Zodiac]], usually represented as a set of [[wikipedia:Weighing_scale#Balance_scales|balance scales]], hence this monster's appearance.
