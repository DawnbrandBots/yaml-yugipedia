title: Card Trivia:Transam Kleine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Transam Nebula Fusion]]".
  * This card's name is based on a [[wikipedia:Sea angel|clione]], another name for the "sea angel", a species of small free-swimming sea slugs.
  * This monster appears to be holding a ''[[wikipedia:Chondrocladia|Chondrocladia lampadiglobus]]'', a type of carnivorous sea sponge that's also known as the "ping-pong tree sponge".
