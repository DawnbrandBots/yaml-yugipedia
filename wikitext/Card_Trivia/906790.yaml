title: Card Trivia:Altergeist Fifinellag
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Fifinella|Fifinella]]" and "lag".
  ** "Fifinella" is a female [[wikipedia:Gremlin|gremlin]], a mischievous humanoid creature in folklore who is known for being responsible for an unexplained problem in machinery or electronics.
  ** "Lag" is synonymous to the engineering term, "[[wikipedia:Latency (engineering)#Communications|latency]]", which describes a delay between a computer user's action and the server's reaction.
