title: 'Card Trivia:Number 100: Numeron Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Dragons of Legend: Unleashed]]''.
  * This monster appears in the artworks of "[[Number 39: Utopia Rising]]" and "[[Numeron Creation]]".
  * This is the [[Monster Card]] form of the [[Number 100: Numeron Dragon (character)|Numeron Dragon]] that created the [[Numeron Code]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, although this monster is not identical in appearance.
  * This is the final "[[Number]]" monster to come from the [[Astral World]].
  ** It is also as the only "Number" from the Astral World to have a three digit number; correspondingly, it is the only "Number" monster with a three digit number to not come from the [[Barian World]].
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this monster was created by resonating the energies of "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]" and "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]" together with "[[Number 46: Dragluon]]". Fittingly, this monster's effects are similar to the effects of the aforementioned "[[Galaxy-Eyes]]" monsters.
  ** "Galaxy-Eyes Prime Photon Dragon": its effect to increase its [[ATK]] depending on the total number of [[Rank]]s on the [[field]].
  ** "Neo Galaxy-Eyes Tachyon Dragon": its effect to [[return]] cards to their original location and position.
  ** However, this monster cannot be [[Summon]]ed by using "Prime Photon Dragon" and "Tachyon Dragon", as in the anime, it required two [[Level 1]] monsters, and in the ''[[OCG]]''/''[[TCG]]'', it requires two "Number" monsters that have the same name and Rank.
  ** Like "Number 62: Galaxy-Eyes Prime Photon Dragon", this monster's roar in the anime was the same as that of of "[[Stardust Dragon (anime)|Stardust Dragon]]" in the anime.
  * This is the only "[[Numeron]]" [[Xyz Monster]] to not be used by [[Don Thousand]] in the anime.
  * This is the first Xyz Monster to require [[Xyz Material]]s with the same name.
