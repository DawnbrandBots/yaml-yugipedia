title: Card Trivia:Cursed Seal of the Forbidden Spell
wikitext: |-
  {{Navigation}}

  * This is an enhanced counterpart of "[[Magic Jammer]]", with similar artwork and a more specific [[cost]].
  * The ''Forbidden'' part of this card's English name is a nod to how its effect "forbids" the [[Spell Card]] it negates from being used for the rest of the [[Duel]].
  ** Coincidentally, the English version of [[Invasion of Chaos]] (the [[Booster Pack]] that this card made its [[TCG]] debut in) was released in March of 2004, the same year that the [[Advanced Format]] (and thus the ''Forbidden'' list) was introduced.
