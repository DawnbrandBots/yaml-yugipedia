title: Card Trivia:Chiwen, Light of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Yang Zing Path]]" and "[[Yang Zing Unleashed]]".

  * This monster is based on [[wikipedia:Chiwen|Chīwěn]] (zh: 蚩吻 ''chīwěn''), one of the [[wikipedia:Nine sons of the dragon|sons]] of the [[wikipedia:Dragon King|Dragon King]] who is depicted as a hybrid of a dragon and a fish.
  ** According to Chinese mythology, Chīwěn is historically used as imperial roof decorations, placed on both ends of the ridgepoles to consume all evil influences.

  * This monster serves as the armor for "[[Satellarknight Zefrathuban]]".
