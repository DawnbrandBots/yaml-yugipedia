title: Card Trivia:Swordsoul Supreme Sovereign - Chengying
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Duel-Ignition Deck: Swordsoul]]''.
  * This monster appears in the artwork of "[[Swordsoul Assessment]]" and "[[Swordsoul Strife]]".
  * This monster is based on [[wikipedia:zh:承影劍|Cheng Ying]] (承影劍), a long sword without a blade from Chinese mythology, which represents elegance.
  * "[[Swordsoul Sinister Sovereign - Qixing Longyuan]]" has the same [[Level]] (10) and [[card type]] ([[Synchro Monster]]) as this card.
  ** This may reflect the will of "[[Swordsoul Strategist Longyuan]]" to overthrow this monster and become the leader of the "[[Swordsoul]]" tribe.
  ** This card is [[WATER]], while "[[Swordsoul Sinister Sovereign - Qixing Longyuan|Qixing Longyuan]]" is [[FIRE]].
  ** Both monsters have mirrored poses in their card artwork, and are depicted fighting in the artwork of "Swordsoul Strife".
  ** This card's ''[[TCG]]'' name, "Swordsoul Supreme Sovereign", is also similar to the ''TCG'' name of "Qixing Longyuan", "Swordsoul Sinister Sovereign".
