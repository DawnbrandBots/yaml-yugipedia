title: Card Trivia:Gladiator Beast Spartacus
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Spartacus|Spartacus]], a slave in Sicily who led a servile revolt during the years 73-71 BC, which is described in the accounts of Diodorus of Sicily. Spartacus and his forces were defeated by an army led by Crassus.
  * The text "''except "[[Gladiator Beast Spartacus]]"''" in this monster's effect is mostly redundant, since it already states that it "''cannot be [[Special Summon]]ed except by the effect of "[[Gladiator Beast Hoplomus]]"''", but it does prevent the player from Summoning it with another copy of this monster whose name was changed into that of "Gladiator Beast Hoplomus".
