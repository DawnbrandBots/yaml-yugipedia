title: Card Trivia:Therion Irregular
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spright Smashers]]".
  * This monster is named after [[wikipedia:Regulus|Regulus]], a star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Leo (constellation)|Leo]].
  ** This monster's design features a wild fiery-like mane and lower lion-like legs, referencing how Leo is also known as the "lion" constellation.
  * This monster is a [[DARK]] [[counterpart]] of "[[Therion "King" Regulus]]", corrupted by "[[Spright]]" energy.
  ** This monster's name ("Irregular") may be a play on "Regulus".
  ** This monster's [[original ATK and DEF]] (1600/2800) are the inverse of those of "Regulus" (2800/1600).
  ** Both monsters are depicted in mirrored poses in their respective card artworks.
  * This card is the only "[[Therion]]" monster to not have quotation marks in its name.
  ** It is also the only "Therion" monster to not have an effect to make a "Therion" monster [[equip]]ped with it gain 700 [[ATK]] and its preceding effect.
