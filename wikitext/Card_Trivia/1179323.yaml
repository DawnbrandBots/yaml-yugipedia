title: Card Trivia:Raviel, Lord of Phantasms - Sacred Beast of Endless Eternity
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] counterpart of "[[Raviel, Lord of Phantasms]]".
  ** This monster's pose is based on the pose assumed by "[[Raviel, Lord of Phantasms (Duel Links)|Raviel, Lord of Phantasms]]" during its Summoning cutscene in ''[[Yu-Gi-Oh! Duel Links]]''.
  ** This monster's yellow glow and the glowing orbs surrounding it are based on a scene from {{episode|GX|049|ref}}, where after "[[Raviel, Lord of Phantasms (anime)|Raviel, Lord of Phantasms]]" is Summoned, it drains the spirit energy from ''[[Duel Monsters]]'' cards from around the world. 
  ** This monster's [[Quick Effect]] to [[Tribute]] two "Sacred Beast" monsters and gain 1000 [[ATK]] is based in the effect of "Raviel, Lord of Phantasms", which allows it to Tribute two monsters and gain ATK equal to their combined ATK. In the anime, "Raviel, Lord of Phantasms" Tributed two "[[Phantasm Token]]s", whose [[original ATK]] is 1000, and gained ATK equal to their combined ATK.
  *** Interestingly, this effect which also destroys all of the opponent's monsters resembles the effect of "[[Obelisk the Tormentor]]", the [[Egyptian God]] counterpart of "Raviel, Lord of Phantasms".
