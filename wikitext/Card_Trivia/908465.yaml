title: Card Trivia:Overload Fusion
wikitext: |-
  {{Navigation}}

  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Overload Fusion]]".
  * This card can be seen as a "[[Cyber]]" variant of the card "[[Miracle Fusion]]".
  ** Both [[Fusion Summon]] by [[Banish|banishing]] materials from the [[field]] and/or [[Graveyard]].
  ** Both cards are used prominently by two characters in "[[Yu-Gi-Oh! GX]]" (respectively, [[Zane Truesdale]] for his "Cyber" Deck(s) and [[Jaden Yuki]] for his "[[Elemental HERO]]" Deck).
  * "[[Overload Future Fusion]]" is a retrained counterpart of both this card and "[[Future Fusion]]".
