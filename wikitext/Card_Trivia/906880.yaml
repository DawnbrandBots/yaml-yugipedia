title: Card Trivia:Pendransaction
wikitext: |-
  {{Navigation}}

  * This card's name is a play on "pending transaction".
  ** Alternatively, it may also be a portmanteau of "Pendulum" and "Transaction". As mentioned in the [[Card Tips:Pendransaction|Tips section]], this card works best in a Deck with many [[Pendulum Monster]]s, which, due to their mechanics, can increase the size of the player's [[Extra Deck]] during the course of the Duel.
