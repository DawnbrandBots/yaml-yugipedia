title: Card Trivia:Dogurad, the Stonetrooper
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "''[[wikipedia:Dogū|Dogū]]''" (a small humanoid figurine made during the later part of the [[wikipedia:Jōmon period|Jōmon period]] of prehistoric Japan) and "[[wikipedia:El Dorado|El Dorado]]" (the mythical city of gold supposedly located somewhere in South America).
