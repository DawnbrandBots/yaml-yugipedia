title: Card Trivia:Morphtronic Remoten
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Morphtronics, Scramble!]]", "[[Remake Puzzle]]" and "[[Those We Protect]]".
  ** Its appearance in the artwork of "Those We Protect" seems to represent how [[Leo]] wanted to protect [[Luna]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, as the monsters shown in that artwork were used by them.
  * This card is named after a [[wikipedia:Remote control|remote control]]. Its effect reflects that, by being able to "control" whatever "[[Morphtronic]]" monsters the player has in their [[hand]]/[[Graveyard]].
  ** This card's Japanese name is an abbreviated ''[[wikipedia:Wasei-eigo|wasei-eigo]]'' word, which stands for "[[wikipedia:Remote control|remo(te) con(trol)]]".
