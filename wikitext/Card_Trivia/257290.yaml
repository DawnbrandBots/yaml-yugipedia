title: Card Trivia:Jester Puppet Trick Rider
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on a circus performer riding a unicycle, a one-wheeled vehicle that is often used as a circus skill.
  ** This monster's Japanese name, "Kunst Reiter", is the German term for "artist rider", which reflects its appearance as a clown riding on a unicycle.
  *** This monster shares its Japanese naming scheme with its fellow "[[Jester Puppet]]" monster, "[[Jester Puppet Acrobat]]", whose name was based on the German term for "acrobat" ("Akrobat") before the localized release of {{chapter|5D's|043|ref}}.
