title: Card Trivia:JAM:P Start!
wikitext: |-
  {{Navigation}}

  * "[[CAN:D]]" and "[[Ice Pop Bear]]" appear in this card's artwork.
  ** The toy [[wikipedia:Electronic keyboard|keyboard]] being played by "CAN:D" in this card's artwork is referenced in the artwork of its adult version, "[[CAN - Re:D]]".
  * This card's name is a pun on the phrase "jump start", which is used to infuse energy into a situation to get the action started.
