title: Card Trivia:Fiend Kraken
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Kairyu-Shin's Dark Reef]]".
  * This monster is based on the [[wikipedia:Kraken|Kraken]], a mythical sea monster from [[wikipedia:Nordic folklore|Nordic folklore]] that is described as a giant squid that would sometimes attack ships and feed upon the sailors.
  * This monster has a [[retrained]] counterpart: "[[Doom Kraken]]".
  * The [[Fiend Kraken (Bandai)|Bandai]] version of this card is a [[Level 5]] "Sea-Beast" monster with an [[original ATK and DEF]] of 1500/2000, whereas the Konami version of this card is a [[Level 4]] [[Aqua]] monster with an original [[ATK]] and [[DEF]] of 1200/1400. The color schemes also differentiates between the two versions.
