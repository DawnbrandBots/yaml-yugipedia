title: Card Trivia:Doron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Reaction Summon]]" and "[[Small Stopper]]".
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, [[Damon]] uses this monster as part of his "draw"-themed Deck, as its Japanese name contains the word "draw" (ドロー, ''dorō'').
