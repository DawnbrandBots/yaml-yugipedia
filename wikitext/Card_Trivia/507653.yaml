title: Card Trivia:Sanwitch
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of its [[Fusion Material Monsters]]' names: "[[Sangan]]" and "[[Witch of the Black Forest]]". This also includes a play on the word [[Wikipedia:Sandwich|sandwich]].
  ** Its Japanese name, "Critchy", is also a portmanteau of its Fusion Material Monsters' names: "Critter" and "Witch of the Black Forest".
  * A chibi version of "Sangan" appears in this card's artwork.
  * The [[ATK]] and [[DEF]] of this card are exactly the combined [[ATK]] and [[DEF]] of its Fusion Material Monsters.
  * Despite both of this card's Fusion Material Monsters being [[Effect Monster]]s, this card is a [[Non-Effect Monster]].
  * This monster appears in the artwork of "[[Trick Buster (manga)|Trick Buster]]".
