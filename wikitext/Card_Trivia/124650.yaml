title: Card Trivia:Blaster Ogre
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's weapon is based on a [[wikipedia:Breechloader|breech-loading rifle]].
  * This monster is wearing an [[wikipedia:Officer (armed forces)|officer's]] uniform, as indicated by the [[wikipedia:Epaulette|epaulettes]] on its shoulders.
  * This is the only [[Gun Ogre]] monster whose [[ATK]] and [[DEF]] don't equal each other.
