title: Card Trivia:Archfiend Interceptor
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[Wikipedia:Interception|interception]], a move used in the sport of [[wikipedia:American football|American football]] where a player catches the football as it is passed from one of the opposing team's players to another player on the same team.
  ** This monster's name reflects its appearance, as it is based on an American football player, and its multiple hands are likely intended to "intercept" a passing football. Also, this monster is depicted standing on a green terrain with white stripes, referencing the similar designs used in American football fields.
  * In the English dubbed version of {{episode|5D's|076|ref}}, this monster is called by its Japanese name, "Intercept Daemon", instead of its ''[[TCG]]'' name.
