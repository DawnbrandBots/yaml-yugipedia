title: Card Trivia:Babycerasaurus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Lost World]]" and "[[Spacetime Transcendence]]".
  * This monster has a [[counterpart]]: "[[Petiteranodon]]".
  * This monster's name and appearance is the infant form of the [[wikipedia:Triceratops|triceratops]].
  ** This monster is depicted wearing its egg shell resembling a diaper, which is often worn by infants.
