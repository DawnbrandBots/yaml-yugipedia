title: Card Trivia:Iron Core Armor
wikitext: |-
  {{Navigation}}

  * This card's effect is a variation of "[[Burden of the Mighty]]".
  ** When "[[Kozaky]]" and "[[Magical Scientist]]" were making the [[Koa'ki Meiru]], they probably made equipment to protect their new species (possibly based off existing technology). If this was true, then it would explain the similarity of "[[Iron Core Armor]]" and "[[Burden of the Mighty]]".
