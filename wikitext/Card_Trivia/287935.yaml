title: 'Card Trivia:New Order 12: Etheric Maahes'
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Rank Domination]]".
  * This monster is based on [[wikipedia:Maahes|Maahes]], the Egyptian deity of war, who is often depicted with the head of a lion.
  ** This monster's name reflects its [[Rank]], which is also reflected in the '''twelve''' glowing gems in this monster's glyphs.
  * This is the first [[Rank 12]] [[Xyz Monster]].
