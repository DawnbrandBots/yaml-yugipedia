title: Card Trivia:Surgical Striker - H.A.M.P.
wikitext: |-
  {{Navigation}}

  * A silhouette of this monster appears in the background of the third artwork of "[[Sky Striker Ace - Raye]]".
  * This monster's name is a reference to "Hamp", the [[wikipedia:World War II Allied names for Japanese aircraft|Allied reporting name]] of the Imperial Japanese [[wikipedia:Mitsubishi A6M Zero|Mitsubishi A6M3-32]] fighter.
  ** The rest of its name in Japanese, 「閃術兵器」, is the term 「戦術兵器」 (''Senjutsuheiki'', "tactical weapon"), with the kanji 「戦」 (''Sen'') with the homophonous 「閃」 (''Sen'', lit. "flash"). This reflects the Japanese name of the "[[Sky Striker]]" [[archetype]], "Flash Sword" (閃刀 ''Sentō'').
