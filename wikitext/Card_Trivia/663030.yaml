title: Card Trivia:Acrobat Monkey
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hidden Springs of the Far East]]".
  * In {{episode|GX|013|ref}}, when this monster's [[Type]] is changed to [[Beast]] via the effect of "[[DNA Surgery (anime)|DNA Surgery]]", its robotic head and limbs are destroyed to reveal an actual monkey. Later, when this monster is affected by the effect of "[[Wild Nature's Release]]", it destroys the remainder of its mechanical armor, leaving only the helmet.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this monster is used to represent the robotic monkey that Tristan's mind was imprisoned in during the [[Virtual World (arc)|Virtual World arc]].
  ** When [[Tristan Taylor (Duel Links)|Tristan Taylor]] Summons this monster, he says, "Aww man, nightmares... You turn into this thing if you lose."
  ** When [[Serenity Wheeler (Duel Links)|Serenity Wheeler]] Summons this monster, she says, "Huh? Is that you, Tristan!?"
