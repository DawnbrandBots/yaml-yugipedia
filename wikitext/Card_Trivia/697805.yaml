title: Card Trivia:Crimson Resonator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Crimson Call]]".
  * This monster's horns and the design of its robe are based on the horns and abdomen of "[[Red Dragon Archfiend]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "Red Dragon Archfiend" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime: "Crimson Hell Flare".
  * This monster is the "Resonator" [[counterpart]] of "[[Stardust Synchron]]".
