title: Card Trivia:Strong Wind Dragon
wikitext: |-
  {{Navigation}}

  * This is a [[Cover card]] of ''[[Deck Custom Pack 01]]''.
  * This card has a similar effect to "[[Turret Warrior]]".
  ** It's also similar to "[[Tiger Dragon]]".  Both cards are [[Level]] 6 [[Dragon]]-[[Type]] monsters with 2400 [[ATK]] that gain an effect if a Dragon-Type monster is [[Tribute]]d for its Summon.
  * This monster possesses the effects of both "[[Spear Dragon]]" and "[[Kaiser Glider]]". Seto Kaiba uses both these cards and "Strong Wind Dragon" could be seen as a counterpart to both just as "[[Red Dragon Archfiend]]" is to "[[Blue-Eyes White Dragon]]".
  * This card's Level, ATK and [[DEF]] are the same as those of most "[[Monarch (series)|Monarch]]" monsters. It also has an effect when [[Tribute Summon]]ed.
