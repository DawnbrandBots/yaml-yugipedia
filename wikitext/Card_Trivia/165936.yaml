title: Card Trivia:Rescue Rabbit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Emerging Emergency Rescute Rescue]]", "[[Lucky Punch]]", "[[The Big Cattle Drive]]", and "[[Underdog]]".
  ** A cutout of this monster appears in the artwork of "[[Duck Dummy]]".
  * This card is similar to "[[Rabidragon]]", "[[Creepy Coney]]", "[[Bunilla]]", and "[[Wind-Up Rabbit]]", since they are all rabbit-themed monsters that were released in ''[[Photon Shockwave]]'' (which was released during the [[wikipedia:Rabbit (zodiac)|Year of The Rabbit]]).
  * This monster is the default mate in ''[[Yu-Gi-Oh! Master Duel]]''.
