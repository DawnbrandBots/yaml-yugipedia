title: Card Trivia:Special Hurricane
wikitext: |-
  {{Navigation}}

  * This card has an [[anime-only]] support card: "[[Hurricane Nest]]".
  * This card's artwork is similar to the initial explosion produced by the [[Zero Reverse]] incident.
  * This card is similar to "[[Koa'ki Meiru Tornado]]", as both cards are cyclonic-themed cards whose effects [[destroy]] [[Special Summon]]ed monsters.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Special Hurricane]]".
