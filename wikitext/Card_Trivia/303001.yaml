title: 'Card Trivia:Number C101: Silent Honor DARK'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is the [[cover card]] of ''[[Legacy of the Valiant]]'', and is also one of the cover cards of ''[[2025 Mega-Pack Tin]]''.
  * This monster appears in the artworks of "[[Chaos Hundred Universe]]", "[[Overlay Award]]", "[[Overlay Connection]]", "[[Seventh Ascension]]", "[[Seventh Eternity]]", and "[[Xyz Charge Up]]".
  * This monster is the [[Ranked-Up]] "[[Number C10X]]" form of "[[Number 101: Silent Honor ARK]]".
  ** This monster is the pilot of "Silent Honor ARK" (which can be considered its [[Neutral]] form), as depicted in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. It also means this is the only "Number C" monster to be a different entity from the base form, rather than an evolution, which was reinforced by its anime effect to [[Special Summon]] "Silent Honor ARK" from the [[Graveyard]] by [[detach]]ing all of its [[Xyz Material]]s.
  *** In the anime, when this monster is Summoned, the pilot and energy beams are ejected from "Silent Honor ARK". Some of the beams enter the arms of the pilot to generate the arms of "DARK", then the leg extensions would attach to this monster (it is not clear where these came from) and extend, and this monster would then grasp its spear (it is also unclear where it came from) and ready for battle. 
  ** This monster's effect to Special Summon itself from the Graveyard is based on a statement made by [[Reginald Kastle|Nash]] during his human life, in which he vowed to [[Vector]] that he would get his revenge on him, even if he had to come back from the dead.
  * This monster has an [[Card evolutions|upgraded]] form combined with "[[Number 32: Shark Drake]]": "[[CXyz N.As.Ch. Knight]]".
  * This monster has a "[[Full Armored]]" [[counterpart]]: "[[Full Armored Dark Knight Lancer]]".
  * This is the first [[Aqua]] "Number C" monster.
  * This is the first "Number C" monster to be revealed before its base form.
  * This is the first Rank-Up [[Xyz Monster]] to not gain an effect by having a specific material; instead, it requires "Number 101: Silent Honor ARK" to be in the Graveyard to use its effect.
  ** It is also the first "Number C" monster to not directly use its materials in any way.
  * This monster and its base form are the first monsters that can directly [[attach]] monsters the opponent controls to themselves from the [[field]] as materials.
  * This is one of the few "Number C" monsters whose card artworks does not feature a swirling vortex in its card artwork, although that is included in its anime artwork.
  * This monster is related to "[[Number C103: Ragnafinity]]".
  ** Both are used by [[Rio Kastle|Marin]] and Nash, who are fraternal twins in the anime.
  ** Both share the same [[Attribute]] ([[WATER]]), [[Rank]] (5), [[original ATK]] (2800), and effects to Special Summon itself from the Graveyard. Both also have dark color schemes. 
  ** Both share the same anime effect to Special Summon their base "[[Number 10X]]" forms from the Graveyard.
