title: Card Trivia:Mannadium Trisukta
wikitext: |-
  {{Navigation}}

  * This card is a "[[Mannadium]]" [[Synchro Monster|Synchro]] counterpart of "[[Tearlaments Kitkallos]]".
  ** This card's artwork is similar to the artwork of "Kitkallos" and this monster's armor features aspects of "Kitkallos's" design.
  ** This card has the same [[ATK]] as "Tearlaments Kitkallos".
