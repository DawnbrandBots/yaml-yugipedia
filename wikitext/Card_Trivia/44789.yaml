title: Card Trivia:Zombie World
wikitext: |-
  {{Navigation}}

  * In the order from top to bottom and from left to right, "[[Soul-Absorbing Bone Tower]]", "[[Zoma the Spirit]]", "[[Vampire Genesis]]", "[[Despair from the Dark]]", "[[Plague Wolf]]", "[[Dark Spirit of the Silent]]", "[[Temple of Skulls]]", the skull of "[[Zombie Tiger]]", the head of "[[Goblin Zombie]]", the skull of the fat zombie from "[[Three-Legged Zombies]]", and two copies of "[[Bone Mouse]]" appear in this card's artwork.
  * This world appears in the background artworks of "[[Archfiend Zombie-Skull]]", "[[Delta of Invitation]]", "[[Doombearer Psychopompos]]", "[[Doomking Balerdroch]]", "[[Immortal Ruler]]", "[[Necroworld Banshee]]", "[[Phantom Bind]]", "[[Red-Eyes Zombie Necro Dragon]]", "[[Red-Eyes Zombie Dragon Lord]]", "[[Return of the Zombies]]", and "[[Zombie Power Struggle]]".
