title: Card Trivia:Arcana Force XXI - The World
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Light Barrier]]" and "[[The Sky Lord]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The World (tarot card)|The World]].
  ** This monster's number "XXI" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (3100) reference how The World is the twenty-first trump card of the Major Arcana Tarot.
  ** Alternatively, this monster may be based on [[wikipedia:Dio Brando|Dio Brando's]] Stand, "[https://jojowiki.com/The_World The World]" in the ''[[wikipedia:JoJo's Bizarre Adventure|JoJo's Bizarre Adventure]]'' manga and anime series, which has the ability to stop time, similar to this monster's effect of skipping the opponent's next turn.
  *** Notably, the Japanese voice actor of this monster's owner, [[Sartorius]] is Takehito Koyasu, who is also the voice actor for Dio in the 2012 anime adaptation of ''JoJo's Bizarre Adventure''.
  *** Another comparison to ''JoJo's Bizarre Adventure'' comes in "[[wikia:w:c:jojo:King Crimson|King Crimson]]", the Stand of [[wikia:w:c:jojo:Diavolo|Diavolo]], whom explicitly skips forward in time in such a manner than only the direct result of the actions that would have occurred in that time remain, with none of the aforementioned actions having taken place at all.
  ** Four separate images of the Earth appear in the background corners of this card's artwork. This is likely referencing the [[wikipedia:Classical elements|classical elements]] (fire, earth, water, and air) appearing in The World Tarot card that also appear in [[wikipedia:The Magician (Tarot card)|The Magician]] Tarot card, signifying the Magician's completion of his goals.
  * This monster's appearance is based on the Lovecraftian deity [[wikipedia:Yog-Sothoth|Yog-Sothoth]], keeping in relation with the extraterrestrial theme of the "[[Arcana Force]]" archetype.
  ** This monster's pose in the ''[[OCG]]''/''[[TCG]]'' is based on the logo for Aphoom Zhah, a metal band named after the eponymous Lovecraftian deity.
  * This monster has a ''[[Rush Duel]]'' parody: "[[Arcanic Force The Flipflopper]]".
  * This card and "[[Question]]" are the only cards in the ''OCG''/''TCG'' for which the order of cards in the [[Graveyard]] is significant.
