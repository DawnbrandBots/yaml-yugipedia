title: Card Trivia:Nobody Phantom Thief
wikitext: |-
  {{Navigation}}

  * "[[Prophecy Phrase the Colors of the Wind]]" appears in both of this card's artworks.
  * The treasure in both of this card's artworks appears in the artwork of "[[Condurglar the Assisting Anthem]]".
  * [[wikipedia:Scat singing|Scat]] is a type of singing in which the performer makes random sounds with their voice rather than reciting lyrics.
  * This is the first [[Trap Card]] to be printed as an [[Over Rush Rare]] card.
