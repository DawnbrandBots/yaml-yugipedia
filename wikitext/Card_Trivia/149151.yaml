title: Card Trivia:Reeze, Whirlwind of Gusto
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[After the Storm]]" and "[[Tailwind of Gusto]]".
  * [[Master Guide 4 card storylines#The Little Protector in the Great Marshland|According to the Duel Terminal storyline]], this monster and "[[Kamui, Hope of Gusto]]" are the parents of "[[Pilica, Descendant of Gusto]]".
  * This card has an evolved form, "[[Daigusto Sphreez]]", which she takes after teaming up with "[[Vylon Sphere]]". In that state, she has untied hair, wears "Sphere" as armor, and gains red eyes similar to most "[[Gusto]]" [[Winged Beast]]s.
  ** "Tailwind of Gusto" appears to depict her transformation between the two forms.
