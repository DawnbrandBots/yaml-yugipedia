title: Card Trivia:Cyber Saurus
wikitext: |-
  {{Navigation}}

  * This monster is one of several [[Machine]] monsters based on a [[Dinosaur]], the others being "[[Cyber Dinosaur]]", "[[Trifortressops]]" and "[[Storagepod]]".
  * When this card was introduced in the ''[[TCG]]'', one of its [[Fusion Material]]s, "[[Two-Headed King Rex]]", was not yet released; this made it unusable until the first [[Fusion Substitute Monster]]s were released in ''[[Tournament Pack: 1st Season]]'' in September 2002. "Two-Headed King Rex" would be released the following October in ''[[Tournament Pack: 2nd Season]]''.
