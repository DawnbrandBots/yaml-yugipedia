title: Card Trivia:Kotodama
wikitext: |-
  {{Navigation}}

  * '''[[wikipedia:Kotodama|Kotodama]]''' or '''kototama''' (言霊) refers to the Japanese belief that mystical powers dwell in words and names. English translations include ''"soul of language"'', ''"spirit of language"'', ''"power of language"'', ''"power word"'', ''"magic word"'', and ''"sacred sound"''. The notion of kotodama presupposes that sounds can magically affect objects, and that ritual word usages can influence our environment, body, mind, and soul.
