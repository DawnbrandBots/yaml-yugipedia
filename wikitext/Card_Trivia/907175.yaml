title: Card Trivia:Delight of the Mighty
wikitext: |-
  {{Navigation}}

  * "[[Max Raider]]" appears in this card's artwork.
  ** This card's artwork likely depicts the aftermath of the scene depicted in the artwork of "[[Burden of the Mighty]]", in which a "delighted" "Max Raider" successfully retrieves one of the eggs from the baby birds' nest after being forced to be more careful with handling both. Additionally, this card's name and effects are also references to "Burden of the Mighty".
