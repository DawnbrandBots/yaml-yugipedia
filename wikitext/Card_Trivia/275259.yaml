title: Card Trivia:Neutrino Dowsing
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Number 107: Galaxy-Eyes Tachyon Dragon]]" and "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]" appear in this card's artwork.
  * This card is named after a [[wikipedia:Neutrino|neutrino]], a subatomic particle with no electrical charge and a very small mass that many theorists suggest has a tachyonic nature.
