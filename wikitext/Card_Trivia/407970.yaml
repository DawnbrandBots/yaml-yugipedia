title: Card Trivia:Kozmo Lightsword
wikitext: |-
  {{Navigation}}

  * "[[Kozmo Farmgirl]]", "[[Kozmoll Wickedwitch]]" and "[[Kozmo Goodwitch]]" appears in this card's artwork.
  * This card's artwork references the iconic "Duel of the Fates" battle between Darth Maul, Qui-Gon Jinn, and Obi-Wan Kenobi in ''[[wikipedia:Star Wars: Episode I – The Phantom Menace|Star Wars: Episode I – The Phantom Menace]]''.
  * The article announcing this card on Konami's site mentions a witch that strapped four wands to herself (one on each of her limbs).<ref>{{cite web | url = https://yugiohblog.konami.com/articles/?p=7485 | title = Close Quarters Combat | author = Jerome McHale | publisher = Konami | date = October 15, 2015 | accessdate = March 2, 2016}}</ref> This may be a reference to [[wikipedia:General Grievous|General Grievous]], who wielded four lightsabers in this fashion in his appearance in the novel ''Labyrinth of Evil''.

