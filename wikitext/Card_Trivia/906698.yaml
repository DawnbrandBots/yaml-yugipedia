title: Card Trivia:Oily Cicada
wikitext: |-
  {{Navigation}}

  * The Japanese pronunciation of this monster's name (オイリーゼミ, ''oirīzemi'') is a pun on ''aburazemi'' (アブラゼミ, the [[wikipedia:Graptopsaltria nigrofuscata|large brown cicada]]), but ''abura'' (油) is replaced by "oily" due to the former word meaning "oil".
  ** This card's artwork features the monster depicted with a flaming appearance, and the bottom half of the background is burnt and blackened; these are likely based on [[wikipedia:Petroleum|petroleum]], also known as "crude oil" or simply "oil", which is commonly known for being flammable.
