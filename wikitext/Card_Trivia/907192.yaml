title: Card Trivia:Dogmatika Fleurdelis, the Knighted
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dogmatika Punishment]]", "[[Nadir Servant]]", and "[[Tri-Brigade Airborne Assault]]".
  ** She also appears without her armor in the artwork of "[[The Virtuous Vestals]]".
  * This monster is named after the ''[[wikipedia:Fleur-de-lis|Fleur-de-lis]]'', a stylized lily used as a decorative design or symbol, notably representing French royalty and Catholic saints.
  * "[[The Iris Swordsoul]]" is this monster after fleeing from the "[[Dogmatika Nation]]" to avoid the "[[Despia]]" corruption, having joined the "[[Swordsoul]]".
  ** "[[White Knight of Dogmatika]]" and "[[Despian Quaeritis]]" are corrupted forms of this monster's armor, which she left behind.
  ** Due to being subsequently defeated in battle, the monster herself has nevertheless a "Despia" counterpart: "[[Despian Luluwalilith]]".
  ** "[[Dogmatika Fleurdelis, the Thunderbolt]]" is this monster resisting the corruption of the Hole.
  * This card's alternate artwork is based on {{episode|CARD GAME THE CHRONICLES|5|ref}}, where [[Fleurdelis]] parries a gunshot from [[Shuraig]] with her sword, though it is designed from scratch rather than taken from any specific frame.
