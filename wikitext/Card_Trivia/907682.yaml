title: Card Trivia:Link into the VRAINS!
wikitext: |-
  {{Navigation}}

  [[File:VRAINS_log_in.png|thumb|right|250|[[Yusaku Fujiki]] logs into [[LINK VRAINS]], in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]''.
  * The silhouette of [[Yusaku Fujiki]] logging into [[LINK VRAINS]] appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|VRAINS|001|ref}}, where Yusaku logged into LINK VRAINS as [[Playmaker]] for the first time on-screen.
  ** This card's name references the catchphrase "Into the VRAINS!", said by users when they logged into LINK VRAINS in the Japanese version of the ''[[Yu-Gi-Oh! VRAINS]]'' anime. In the English dub, they say "It's time to link into the VRAINS!" instead, which serves as the basis for this card's ''[[TCG]]'' name.

