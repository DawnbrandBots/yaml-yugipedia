title: 'Card Trivia:Number 7: Lucky Straight'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This was the first single-digit "[[Number]]" to be revealed.
  * The number "07" is located at the top of this monster's cane and on the casino token it's holding.
  ** This makes this card the only "Number" monster so far to have its number on two different places on its body.
  * This card features multiple references to the number "7" and its association with good luck.
  ** This card's number, [[Rank]], [[ATK]]/[[DEF]], ATK-gaining effect, die roll effect, and dice number effect activation all feature the number "7" or are related to the number "7".
  ** This card's Japanese name, "Lucky Stripe", is a pun on "lucky streak" or "lucky strike" alongside this monster's "striped" clothing pattern, while its English name, "Lucky Straight", is a reference to a straight in the game of [[wikipedia:Poker|poker]].
  ** This monster's posture is almost curved to resemble the number "7".
  * This card also features multiple references to gambling, where luck is often applied, which includes:
  ** This monster's appearance resembling a jester, referencing the [[wikipedia:Joker (playing card)|Joker playing card]], which commonly depicts a jester wielding a cane.
  ** This monster's appearance featuring collar and wrist cuffs resemble roulette wheels used in the game of [[wikipedia:Roulette|roulette]].
  ** This monster holding a [[wikipedia:casino token|casino token]], which is often used as currency in casinos where gambling often takes place.
  ** This monster's [[Xyz Material]]s requiring '''three''' [[Level 7]] monsters is a reference to the jackpot, the winning result of matching three of the same images on the slot machine, which also features the number "7".
  * The probability to roll a combined 7 for this card's "bonus" effect is 1/6.
  ** This is the most likely sum when rolling two six-sided dice, as it has six possible combinations, all of opposing faces of the dice (1-6, 2-5, 3-4, 4-3, 5-2, 6-1), the most of any possible sum. This may also be why it is viewed as a "lucky" number in gambling.
  * This card's three "bonus" effects may be references to three powerful cards that were [[Forbidden]] at least once: "[[Chaos Emperor Dragon - Envoy of the End]]", "[[Monster Reborn]]" and "[[Graceful Charity]]".
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card would grant its owner infinite good luck.
  ** This makes this one of the few "Number" monsters that didn't take control over its holder, and instead had a positive effect on its owner.
  * This card is the first "Number" monster to have been released in the ''[[V Jump Edition]]'' series.
