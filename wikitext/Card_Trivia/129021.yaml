title: Card Trivia:Elephun
wikitext: |-
  {{Navigation}}

  * This card is similar to the elephant from the "Elefun the Elephant" butterfly catching game (they're both blue elephants with  similar names). Two notable contrasts, however, are that "Elefun the Elephant" does not have wings and the "Elephun" card, besides its wings, only has a head for a body.
  ** This could explain the spelling, "Ele''ph''un", not using an 'f', to not conflict with the previously established "Elefun" game.
