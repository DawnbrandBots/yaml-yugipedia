title: Card Trivia:Sonic Jammer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Junk Sleep]]".
  * With its release in ''[[The Sanctuary in the Sky (set)|The Sanctuary in the Sky]]'', this was the last video game-exclusive card to be released in the ''[[OCG]]''/''[[TCG]]'' for at least 18 years, until the release of "[[Light Law Medium]]" in ''[[Dimension Force]]''.
  * This card's name and artwork, combined with the [[flavor text]] from [[Sonic Jammer (DM4)|its appearance]] in ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'', imply that this card is based on a [[wikipedia:Periodical cicadas|periodical cicada]].
