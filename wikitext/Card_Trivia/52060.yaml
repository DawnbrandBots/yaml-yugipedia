title: Card Trivia:Elemental HERO Storm Neos
wikitext: |-
  {{Navigation}}

  * This monster is a [[Triple Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Air Hummingbird]]" and "[[Neo-Spacian Aqua Dolphin]]".
  ** This monster's name, [[WIND]] [[Attribute]], and effect to [[destroy]] all [[Spell]]/[[Trap Card]]s on the [[field]] reference storm-themed cards (such as "[[Heavy Storm]]" and "[[Mystical Space Typhoon]]") mostly focus on countering Spell/Trap Cards on the field.
  ** This monster's [[Fusion Material]]s reference the elements that make up a typical storm: wind (represented by the WIND Attribute "Air Hummingbird") and rain (represented by the [[WATER]] Attribute "Aqua Dolphin").
  ** This is the only Triple Contact Fusion "[[Neos]]" monster to not share similar effects to its "Neo-Spacian" Fusion Materials or their respective "Neos" [[Contact Fusion]] monsters ("[[Elemental HERO Air Neos]]" and "[[Elemental HERO Aqua Neos]]").
  * In {{episode|GX|152|ref}}, when [[Jaden Yuki]] Summoned this monster, he called it the strongest of the "Neos" Fusion Monsters.\
  ** This is also the only monster for which Jaden used a [[Summon chant#Jaden Yuki|Summon chant]] in the original Japanese version of the anime.
