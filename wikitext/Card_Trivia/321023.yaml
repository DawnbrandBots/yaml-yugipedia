title: Card Trivia:Exa, Enforcer of the Nekroz
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragunity Divine Lance]]".
  * This monster appears to be the older version of "[[Hexa Spirit of the Ice Barrier]]", having five times its Level, ATK, and DEF.
  * This monster has two [[Ritual Monster|Ritual]] "[[Nekroz]]" forms: "[[Nekroz of Catastor]]" and "[[Nekroz of Decisive Armor]]".
  ** Also, this monster has a "[[Zefra]]" [[Pendulum Monster|Pendulum]] form: "[[Zefraxa, Flame Beast of the Nekroz]]".
  * The claws and leather straps of this monster bear great resemblance to those of [[X-Saber Airbellum]].
  * This monster is wearing a "[[Nekroz Mirror]]" on his chest.
