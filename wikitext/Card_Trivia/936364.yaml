title: Card Trivia:Miracle of the Supreme King
wikitext: |-
  {{Navigation}}

  * The cards "[[Supreme King Dragon Darkwurm]]" and "[[Supreme King Z-ARC]]" appear in this card's artwork, being transformed into "[[Supreme King Dragon Lightwurm]]" and "[[Odd-Eyes Arcray Dragon]]", respectively.
  ** This card's artwork references a scene in {{episode|ARC-V|140|ref}}, where [[Riley Akaba]] (possessed by [[Ray Akaba]]) uses the [[Four Nature Cards]] to change [[Z-ARC]]'s monsters into [[Normal Monster]]s in order to purify them.
  *** This card's first bulleted effect to [[destroy]] "Supreme King Z-ARC" and [[Special Summon]] an "[[Odd-Eyes]]" [[Pendulum Monster]] or a [[LIGHT]] "Supreme King Z-ARC" from the [[Extra Deck]] is designed to facilitate the Summoning of "Odd-Eyes Arcray Dragon", which is the LIGHT counterpart of "Z-ARC", further referencing the latter monster's purification.
  ** This card's third bulleted effect to [[Set]] a [[Quick-Play Spell Card]] from the [[Deck]] is designed to [[support]] "[[Wings of Light]]", which will Special Summon "Supreme King Dragon Lightwurm", whose [[Monster Effect]] can [[Synchro Summon]] "[[Supreme King Dragon Clear Wing]]" or [[Xyz Summon]] "[[Supreme King Dragon Dark Rebellion]]". This references how in {{episode|ARC-V|137|ref}} and {{episode|ARC-V|138|ref}}, Z-ARC uses two copies of "[[Supreme King Dragon Darkwurm (anime)|Supreme King Dragon Darkwurm]]" to Summon the aforementioned "[[Supreme King Dragon]]" monsters by using them as [[material]] during his opponents' turn.
  * This is the only card that can Special Summon "[[Odd-Eyes Pendulumgraph Dragon]]" from the Extra Deck, as it [[Ignoring the Summoning conditions|ignores]] [[Summoning condition]]s.
