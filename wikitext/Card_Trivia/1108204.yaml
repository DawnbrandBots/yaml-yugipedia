title: Card Trivia:Maliss P March Hare
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:March Hare|March Hare]], a character from ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]'' who is depicted as a hare present at the [[wikipedia:Hatter (Alice's Adventures in Wonderland)|Mad Hatter's]] tea party.
  ** This monster also references the [[wikipedia:Hare (computer virus)|Hare]] computer virus in 1996, which was capable of infecting [[wikipedia:Executable files|executable files]], [[wikipedia:Hard disk|hard disks]], and [[wikipedia:Floppy disk|floppy disks]], and was set to erase the computer's hard disk between August 22 and September 22.
  * The symbol in the background of this card's artwork is based on the suit of [[wikipedia:Spades (suit)|Spades]], referencing the [[wikipedia:Playing card|playing card]] theme of ''Alice's Adventures in Wonderland''.
  * The English letter "P" stands for "pawn", referencing the [[wikipedia:Pawn (chess)|pawn]] piece used in the game of  [[wikipedia:Chess|chess]], which is the theme of ''[[wikipedia:Through the Looking-Glass|Through the Looking-Glass]]''.
