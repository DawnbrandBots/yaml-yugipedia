title: Card Trivia:Fusion Recycling Plant
wikitext: |-
  {{Navigation}}

  [[File:FusionRecyclingPlant-MADU-EN-VG-artwork.png|thumb|right|300|The artwork of "Fusion Recycling Plant".]]

  * "[[Ancient Telescope]]", "[[Magical Citadel of Endymion]]", "[[Monster Eye]]", and "[[Supply]]" appear in this card's artwork.
  ** "Ancient Telescope" is being stolen by "Supply", who seems to be wary of "Monster Eye", whose searchlights indicate they are a type of guard.
  ** The following items also appear in the junk heap in this card's artwork:
  *** "[[Anti-Fusion Device]]" (the bottom-right corner)
  *** "[[Anti Raigeki]]" (on the left edge of the junk heap, next to "Needle Ceiling")
  *** "[[Fairy's Hand Mirror]]" (beneath "Anti Raigeki")
  *** "[[Graceful Dice]]" and "[[Skull Dice]]" (beneath "Needle Ceiling" and above "Supply")
  *** "[[Horn of Light]]" (near the top of the junk heap, to the left of the "Magical Hat")
  *** "[[Instant Fusion]]" (next to "Graceful Dice" and "Skull Dice", and above "Supply")
  *** "[[Magical Hats]]" (between "Type Zero Magic Crusher" and "Horn of Light")
  *** "[[Needle Ceiling]]" (to the left of "Anti-Fusion Device")
  *** "[[Type Zero Magic Crusher]]" (at the top of the junk heap)
  *** One of the ceremonial rods from the artwork of "[[Black Magic Ritual]]" or "[[Curse of Fiend]]" (above "Needle Ceiling")
  **** Many of the items that appear in this card's artwork also appear in the artworks of "[[Twin Twisters]]" and "[[Twister]]", suggesting that they were later sent to this recycling plant as a result.
  * This card's Japanese name, "Fusion Renaissance Agency" ({{Ruby|融|ゆう}}{{Ruby|合|ごう}}{{Ruby|再|さい}}{{Ruby|生|せい}}{{Ruby|機|き}}{{Ruby|構|こう}} ''Yūgō Saiseikikō''), is a reference to the [[wikipedia:Urban Renaissance Agency|Urban Renaissance Agency]].
