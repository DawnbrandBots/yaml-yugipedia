title: Card Trivia:Blaze Fiend Overlords Beelucitaroth (L)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Return of the Blaze Fiends]]".
  * This monster and its components are based on the trio of major demons making up the "unholy trinity" written in John Milton's epic poem, ''[[wikipedia:Paradise Lost|Paradise Lost]]''. This component in particular is based on [[wikipedia:Beelzebub|Beelzebub]].
  ** This monster's appearance is based on how Beelzebub is dubbed the "Lord of the Flies", and is sometimes depicted as a giant fly.
  * This monster has a retrained [[counterpart]]: "[[Blaze Fiend Overlord Zebulth]]".
