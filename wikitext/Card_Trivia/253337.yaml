title: Card Trivia:Radius, the Half-Moon Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Galaxy Wrath]]".
  * This monster's name is based on a [[wikipedia:Radius|radius]], a measure of distance from the center of a circle or sphere to its outer surface.
  ** The diameter of a circle or a sphere is twice the value of the radius, which is reflected in this monster's effect to change its [[Level]] from 4 to 8.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, the pieces of this monster's armor can change into the form of a [[wikipedia:Lunar phase|crescent moon]].
