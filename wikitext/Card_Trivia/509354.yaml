title: Card Trivia:Ancient Gear Soldier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ancient Gear Catapult]]", "[[Ancient Gear Double Imitation]]", "[[Ancient Gear Factory]]", "[[Ancient Gear Tank]]", and "[[Ancient Gear Workshop]]".
  * This monster has a retrained [[counterpart]] ([[equip]]ped with "[[Ancient Gear Tank]]"): "[[Ancient Gear Tanker]]".
  * This monster, as one of the original five "[[Ancient Gear]]" monsters (along with "[[Ancient Gear Beast]]", "[[Ancient Gear Cannon]]", "[[Ancient Gear Engineer]]", and "[[Ancient Gear Golem]]") features an [[Equal ATK and DEF|equal]] [[original ATK and DEF]] (1300).
  ** Unlike the other original "Ancient Gear" monsters, this monster doesn't have any other effect besides the standard effect of most "Ancient Gear" monsters: "if this card attacks, your opponent cannot activate any Spell or Trap Cards until the end of the Damage Step."
