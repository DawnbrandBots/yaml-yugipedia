title: Card Trivia:Outstanding Dog Marron
wikitext: |-
  {{Navigation}}

  * This monster also appears in the artwork of "[[Where Arf Thou?]]"
  ** This card's artwork also appears on the missing dog posters in the artwork of "Where Arf Thou?"
  * This monster is based on a [[wikipedia:Poodle|poodle]], a breed of [[wikipedia:Dog|domestic dog]] known for their distinctively thick and curly coat.
  ** This monster is named after 「マロン」 (''Maron''), the Japanese word for "chestnut". The word is derived from "marrón," the Spanish and Portuguese word for the color "brown", which is the hue of this monster's coat.
  * This monster has three different [[counterpart]]s:
  ** A "corrupted" counterpart: "[[Mad Dog of Darkness]]"
  ** A "mecha" counterpart: "[[Mecha-Dog Marron]]"
  ** A "skeletal" counterpart: "[[Skull Dog Marron]]"
  * This monster shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (1) and [[original ATK and DEF]] (100/100) with "[[Outstanding Dog Mary]]", whose effect supports this monster.
