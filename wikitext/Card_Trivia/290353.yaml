title: Card Trivia:Erosion Hand Forest
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name contains a pun in its kanji. When this card's name in the kanji (''"Shinshokushu no Mori"'') is sounded out, the Japanese word for "tentacle" (''"shokushu"'') is in it. This reflects this card's artwork, as the thorns are tentacle-like.
