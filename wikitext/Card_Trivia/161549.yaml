title: Card Trivia:Mystical Moon
wikitext: |-
  {{Navigation}}

  * The moon in this card's artwork appears in the artwork of "[[Attack the Moon!]]", "[[Gladiator Beast's Respite]]", and "[[Lycanthrope]]".
  ** The moon appearing in the artwork of "Lycanthrope", a [[Beast-Warrior]] monster that this card's effect [[support]]s, references the mythology of [[wikipedia:werewolf|werewolves]], where a human can transform into a werewolf under a full moon.
  * This card appears in the artwork of "[[Jelly Hole]]".
