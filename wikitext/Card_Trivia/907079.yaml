title: Card Trivia:Cyberse Desavewurm
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "disable" and "[[wikipedia:lindwurm|lindwurm]]".
  ** This monster's name is a reference to "[[Dual Assembwurm]]", whose name is a portmanteau of "assembly" and "lindwurm".
  * This is the first [[Fusion Monster]] to feature an effect that can change its own [[Level]].
