title: Card Trivia:Morpheus, the Dream Mirror White Knight
wikitext: |-
  {{Navigation}}

  * The back of "Morpheus, the Dream Mirror Black Knight" appear in the mirror in this card's artwork.
  * This monster is named after [[wikipedia:Morpheus|Morpheus]], one of the thousand sons of [[wikipedia:Somnus|Somnus]], the personification of sleep from [[wikipedia:Roman mythology|Roman mythology]], from [[wikipedia:Ovid|Ovid]]'s ''[[wikipedia:Metamorphoses|Metamorphoses]]''.
  ** It is also named after the [[wikipedia:Knight-errant|white knight]], a figure of medieval [[wikipedia:Chivalric romance|chivalric romance literature]] usually portrayed as a [[wikipedia:Hero|hero]] who performs good deeds.
  * This monster has a [[DARK]] [[counterpart]]: "[[Morpheus, the Dream Mirror Black Knight]]".
  ** Both have the same [[Level]] (8) and [[Type]] ([[Warrior]], but opposite [[Attribute]]s and [[ATK]]/[[DEF]].
