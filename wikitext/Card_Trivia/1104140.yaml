title: Card Trivia:Mach Synchron
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is based on a [[wikipedia:Supersonic jet|supersonic jet]], an aircraft capable of flying at supersonic speed.
  ** This monster's name and [[Level]] (1) reflect how a supersonic jet is able to fly at the speed of sound, which is measured at [[wikipedia:Mach number|Mach 1]], which is a unit of measurement that compares the speed of an object to the speed of sound
