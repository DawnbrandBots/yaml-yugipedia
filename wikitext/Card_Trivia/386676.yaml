title: Card Trivia:Assault Blackwing - Sohaya the Rain Storm
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the "Sohaya no Tsurugi" (楚葉矢の剣, lit. "Sword of Sohaya"), a sword used by the shogun and general [[wikipedia:Sakanoue no Tamuramaro|Sakanoue no Tamuramaro]] during the [[wikipedia:Heian perod|Heian period]] of Japan.
