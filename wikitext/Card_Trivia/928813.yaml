title: Card Trivia:Gouki The Powerload Ogre
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Rikidōzan|Mitsuhiro Momota]], a Korean-Japanese [[wikipedia:Professional wrestling|professional wrestler]] known by his ring name, "Rikidōzan", which translates to "power road mountain". Rikidōzan's signature move was the [[wikipedia:Knifehand strike|karate chop]], which this monster is depicted performing in this card's artwork.
