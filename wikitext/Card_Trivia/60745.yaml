title: Card Trivia:Virus Cannon
wikitext: |-
  {{Navigation}}

  * This card shares a relationship with "[[Magic Deflector]]", "[[Magic Reflector]]", and "[[Spell Canceller]]".
  ** All cards' artwork feature a device that share similar designs, including spiked legs, purple orbs, visible circuity and mechanical insides.
  ** All cards feature an effect related to [[Spell Card]]s, although "Magic Reflector" is a Spell [[support]] card, while the others are Spell [[anti-support]] cards.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|227|ref}} showing this device firing an energy blast at [[Ishizu Ishtar (manga)|Ishizu Ishtar's]] [[Deck]], albeit with some minor differences in detail.
