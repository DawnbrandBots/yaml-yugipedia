title: Card Trivia:Hinotama
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Damage Translation]]".
  * This card's ''[[TCG]]'' name is the Japanese word for "Fireball", which is the basis of this card's Japanese name, "Fire Ball".
  ** This card's artwork most likely depicts a [[wikipedia:Meteor shower|meteor shower]], where meteors become falling fireballs after entering Earth's atmosphere.
  * This card has a weaker [[counterpart]]: "[[Sparks]]".
  ** This card has two stronger counterparts: "[[Final Flame]]" and "[[Ookazi]]".
  ** It also has an opposite counterpart: "[[Red Medicine]]".
  * The ''TCG'' name of "[[Hinotama Soul]]" references this card's ''TCG'' name; however, its Japanese name, "Sting", does not reference the naming scheme.
