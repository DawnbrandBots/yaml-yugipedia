title: Card Trivia:Supreme Railartillery Magnum Overlord (R)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Versus Pack Maximum Force]]''.
  * This monster has three [[counterpart]]s: "[[Supreme Beasteam Magnum Overlord (R)|Supreme Beasteam Magnum Overlord [R]]]", "[[Supreme Machine Magnum Overlord (R)|Supreme Machine Magnum Overlord [R]]]", and "[[Supreme Skystream Magnum Overlord (R)|Supreme Skystream Magnum Overlord [R]]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (3), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (500/0) with the above-mentioned monsters.
