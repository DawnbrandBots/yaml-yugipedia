title: Card Trivia:Elastic Space
wikitext: |-
  {{Navigation|mode=NonGame}}

  * This card's artwork depicts a [[wikipedia:Light echo|light echo]], a cosmic phenomenon that occurs when light is reflected off surfaces distant from the source, and arrives at the observer with a delay relative to this distance; light echos sometimes bounces off dust clouds or nebula, causing them to ripple and expand, which can be seen from Earth later than the direct light from the emitting object.
