title: Card Trivia:Noble Knight Custennin
wikitext: |-
  {{Navigation}}

  * This card and "[[Sacred Noble Knight of King Custennin]]" are based off of "[[wikipedia:Constantine (Briton)|King Constantine]]". According to the pseudo-historical text "[[wikipedia:Historia Regum Britanniae|Historia Regum Britanniae]]", he was the successor to "[[wikipedia:King Arthur|King Arthur]]".
  ** "Custennin" is Old English for "[[wikipedia:Constantine (name)|Constantine]]"
  * This monster appears in the artwork of "[[Heritage of the Chalice]]".
