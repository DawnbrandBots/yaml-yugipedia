title: Card Trivia:Starry Knight Ceremony
wikitext: |-
  {{Navigation}}

  * "[[Starry Knight Astel]]", "[[Starry Knight Rayel]]" and "[[Starry Knight Flamel]]" appear in this card's artwork. The silhouettes of "[[Starry Knight Ciel]]", "[[Starry Knight Orbitael]]" and "[[Starry Night, Starry Dragon]]" also appear in the background.
  * This card's Japanese name is based on [[wikipedia:Birth of Jesus Christ|Nativity]], a Christian term meaning the birth of [[wikipedia:Jesus Christ|Jesus Christ]], relating to Christmas.
  ** Fittingly, the [[wikipedia:Polaris|Northern Star]] can be seen in this card's artwork. The Northern Star is part of Nativity.
