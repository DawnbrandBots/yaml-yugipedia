title: Card Trivia:The Great Emperor Penguin
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Emperor penguin|emperor penguin]], the largest species of penguin. Ironically, this monster closely resembles the [[wikipedia:Rockhopper penguin|rockhopper penguins]], which are the ''smallest'' penguins (being roughly half the height of emperor penguins).
