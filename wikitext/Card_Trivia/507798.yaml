title: Card Trivia:Success Probability 0%
wikitext: |-
  {{Navigation}}

  * "[[Magical Scientist]]" and a photo of "[[Kozaky]]" appear in this card's artwork.
  * In "Kozaky's" storyline, "[[Gagagigo]]" requests help from him after being horribly injured by "[[Invader of Darkness]]". "Kozaky" agrees to give him cybernetic enhancements, as shown in the artwork of "[[Level Conversion Lab]]", seeing it as a chance to gain information for his research. This card's artwork shows "[[Magical Scientist]]" warning him that the experiment literally has a 0% chance of success.
  ** "Magical Scientist" turned out to be right, as "[[Giga Gagagigo]]" went ballistic from the implants "Kozaky" gave him.
