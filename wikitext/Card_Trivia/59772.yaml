title: Card Trivia:Dewloren, Tiger King of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Terror of Trishula]]" and "[[Synchro Baton]]".
  * This card's name might be derived from '[[wikipedia:Dawon|Dawon]]', the tigress used as a steed by the goddess '[[wikipedia:Durga|Durga]]' in battle.
  * This monster is the [[cover card]] for the ''[[TCG]]'' [[Booster Pack]] ''[[Hidden Arsenal 2]]''.
  * This is the only "[[Ice Barrier]]" Synchro Monster that does not have an "[[lswarm]]" counterpart.
