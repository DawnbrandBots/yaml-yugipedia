title: Card Trivia:Cyberdark Horn
wikitext: |-
  {{Navigation}}

  * This card appears in the artworks of "[[Cyberdark Impact!]]" and "[[Cyberdark Realm]]".
  * This monster provides the horns of "[[Cyberdark Dragon]]" and "[[Cyberdarkness Dragon]]"; however, it also appears to be the tail of "[[Cyberdark Chimera]]".
  * This monster's eyes are actually formed by the green orb inside its mouth. When this monster's mouth is closed, the round cleft the back of the jaw exposes the orb and forms an eye-like silhouette.
  * In the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster screeches as it roars; however, in the English dubbed version, the screech is not present.
  * This was originally the only card to use the phrase ''"This card inflicts [[piercing]] damage"'' in place of the much longer ''"During battle between this attacking card and a Defense Position monster whose DEF is lower than the ATK of this card, inflict the difference as Battle Damage to your opponent."'' While it was initially assumed that all future cards would use "piercing" to describe this effect, all cards through ''[[Extreme Victory]]'' with piercing damage have used the old text, as there was no [[rulebook]] entry on [[piercing]]. From ''[[Generation Force]]'' onwards, however, the ''[[TCG]]'' has officially adopted "piercing battle damage" as the proper term.
