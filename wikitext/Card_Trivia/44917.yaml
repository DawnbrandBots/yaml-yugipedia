title: Card Trivia:Elemental HERO Prisma
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.3]]'', and is also one of the cover cards of ''[[Duelist Pack Collection Tin: Jaden Yuki]]''.
  * This monster has an "[[Evil HERO]]" counterpart: "[[Evil HERO Dead-End Prison]]".
  * This monster's name, appearance, and [[LIGHT]] [[Attribute]] are based on a [[wikipedia:Prism|prism]], a transparent optical element with a flat, polished surface which can refract and reflect light.
  ** This monster's effect is based on how a prism can "reflect" the image of a monster it [[send]]s to the [[Graveyard]] and treat it as a [[Fusion Material]] monster for the [[reveal]]ed [[Fusion Monster]].
  *** In {{episode|GX|154|ref}}, [[Jaden Yuki]] used this card to [[Fusion Summon]] "[[Rainbow Neos (anime)|Rainbow Neos]]" by sending "[[Rainbow Dragon (anime)|Rainbow Dragon]]" from his Deck to the Graveyard. This references a [[wikipedia:Dispersive prism|dispersive prism]], which can separate and refract white lights into its spectral components in the form of the colors of the rainbow.
  ** Because of the above-mentioned facts, this monster is likely based on the Marvel comics superhero, [[wikipedia:Doctor Spectrum|Doctor Spectrum]], keeping in relation with the Western comics design of the "[[Elemental HERO]]" archetype.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this card was originally a [[Level 5]] monster until its release in the ''[[OCG]]''/''[[TCG]]'', where it was changed to a [[Level 4]] monster.
