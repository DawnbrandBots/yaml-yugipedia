title: Card Trivia:Legion the Fiend Jester
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Legion (demons)|Legion]], the name of the group of demons possessing a man featured in the [[Wikipedia:Bible|Christian Bible]].
  * This monster's first ''[[OCG]]''/''[[TCG]]'' effect to [[Tribute Summon]] a [[Spellcaster]] monster in addition to the player's [[Normal Summon]]ing/[[Set]]ting is based on how it was [[Tribute]]d to Tribute Summon "[[Dark Magician]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's second ''OCG''/''TCG'' effect to [[add]] a Spellcaster [[Normal Monster]] to the player's [[hand]] is designed to [[support]] "Dark Magician", referencing the [[stripper technique]] used by [[Pandora (manga)|Pandora]] (and his [[Arkana|anime counterpart]]) where he trimmed the edges of his three "Dark Magician" cards to make them appear slightly smaller than his other cards so his opponent would inadvertently allow him to get one of those "Dark Magician" cards for his opening [[hand]]. 
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|161|ref}}, specifically from the panel showing [[Legion the Fiend Jester (manga)|this monster]] being Summoned.
