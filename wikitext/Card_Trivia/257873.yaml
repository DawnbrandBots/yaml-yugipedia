title: Card Trivia:Ascension Sky Dragon
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Super-Harmonized Duality]]".
  * This card's Japanese name, "Heavenly Supreme Dragon - Dragoascension", is based on [[wikipedia:Heaven|Heaven]], an afterlife realm in the Christian Catholic religion inhabited by God, the angels, and the departed souls of the good.
  ** This card shares a similar theme with "[[Dragonecro Nethersoul Dragon]]" and "[[Void Ogre Dragon]]", as the three cards are associated with an afterlife realm in the in the Christian Catholic religion. This card is associated with Heaven, "Dragonecro Nethersoul Dragon" is associated with [[wikipedia:Hell|Hell]], and "Void Ogre Dragon" is associated with [[wikipedia:Purgatory|Purgatory]].
  * This card can be considered the [[LIGHT]] [[counterpart]] to "Dragonecro Nethersoul Dragon".
  ** Both cards have opposite [[Attribute]]s; this card is a LIGHT monster, while "Dragonecro Nethersoul Dragon" is a [[DARK]] monster.
  ** Both cards' [[ATK]] and [[DEF]] are opposite of each other; this card has has ? ATK (0 by default) and 3000 DEF, while "Dragonecro Nethersoul Dragon" has  3000 ATK and 0 [[DEF]].
  ** Both monsters are the [[Duel Dragon]]s of the Goodwin brothers in the [[Yu-Gi-Oh! 5D's (manga)|manga]], referencing their opposite plans.
  *** Ironically, despite this card being associated with Heaven, its owner [[Rex Goodwin (manga)|Rex Goodwin]] wanted to resurrect and control the [[Ultimate God]], while his brother, [[Skeleton Knight|Roman]], "Dragonecro Nethersoul Dragon's" [[Duel Priest]], wanted to free his brother from the wicked entity's dark miasma and save him.
  **** Fittingly, this card was the first Duel Dragon Summoned by "[[Ultimate God Ultimaya Tzolkin (manga)|Ultimate God Ultimaya Tzolkin]]" during Rex's [[Turbo Duel]] against [[Yusei Fudo (manga)|Yusei Fudo]].
  * This is the first [[Level 10]] [[Synchro Monster]] that does not require specific Synchro Materials or a minimum of 2 non-Tuners.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|046|ref}}, specifically from the panel showing [[Celestial Conquering Dragon - Drago Ascension (manga)|this monster]] being Summoned.
