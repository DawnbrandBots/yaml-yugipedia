title: Card Trivia:Diced Dice
wikitext: |-
  {{Navigation}}

  * "[[Terrorking Archfiend]]" and "[[Snipe Hunter]]" appear in this card's artwork.
  ** This card's artwork appears to depict the aftermath of "[[Diceversity]]" (which depicts "Terrorking Archfiend" sweeping up a broken red die and "Snipe Hunter" rolling a blue die); specifically, this card's artwork shows the blue die now broken, and "Terrorking Archfiend" presenting "Snipe Hunter" with the now-repaired red die (as indicated by the tools in Terrorking's other hand).
