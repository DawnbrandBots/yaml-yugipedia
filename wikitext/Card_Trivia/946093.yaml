title: Card Trivia:Heavy Metal King
wikitext: |-
  {{Navigation}}

  * This monster's appearance in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime is a pun on the [[wikipedia:Heavy metal music|heavy metal music genre]], as it was created by "[[Musician King (anime)|Musician King]]" [[equip]]ped with "[[Metalmorph (anime)|Metalmorph]]".
  ** This is the only monster created with "Metalmorph" in the ''Yu-Gi-Oh!'' anime that has yet to be released in the ''[[OCG]]''/''[[TCG]]''.
