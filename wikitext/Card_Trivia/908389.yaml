title: Card Trivia:Rilliona, the Magistus of Verre
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Alpha Summon]]", "[[The Journeying Three Magi]]", "[[Magistus Theurgy]]", "[[Trismagistus]]", and "[[Verre Magic - Lacrima of Light]]".
  * This monster's Japanese name, "Cendrillon", is the French name of ''[[wikipedia:Cinderella|Cinderella]]'', with the English one derived from it.
  ** The word "Verre" (French for "glass") in this card's names and the glass high heels the monsters wears are references to the glass slippers of the story.
  * This monster is an older form of "[[Witchcrafter Madame Verre]]".
  ** This card is the only "[[Magistus]]" monster to be an older version of its original counterpart, instead of a younger one.
  *** In ''[[Yu-Gi-Oh! OCG Stories]]'', this is explained as [[Rilliona|the character]] using a spell of eternal youth, which reverts her to a child instead of merely stopping her aging; she subsequently decided to adopt the alias "Verre" when people wouldn't believe her about her identity.
  * This monster has an [[Card evolutions|upgraded]] [[Xyz Monster]] form: "[[Rilliona, the Wondrous Magistus Witch Wardrobe]]".
  * This monster has an upgraded "[[Witchcrafter]]" [[Fusion Monster]] form, "[[Witchcrafter Madame Rilliona]]".
