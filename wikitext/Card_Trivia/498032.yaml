title: Card Trivia:DDoS Attack
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on a [[wikipedia:Denial-of-service attack|distributed denial-of-service attack]] (DDoS), a cyberattack that attempts to make a website or online service unavailable to users.
  ** This card's effect reflects those of a DDoS attack, in which the incoming traffic flooding the victim (the number of copies of this card [[sent]] to the [[Graveyard]] multiplied by the [[target]]ed monster's [[Level]] x 100) originates from many different sources (the [[target]]ed [[Machine]] monster the player [[control]]s and sending a number of copies of this card from the [[Deck]] to the Graveyard), effectively making it impossible to stop the attack (inflicting damage to the opponent) simply by blocking a single source.
