title: Card Trivia:Heroic Envoy
wikitext: |-
  {{Navigation}}

  * "[[Heroic Challenger - Spartan]]" appears in this card's artwork.
  * This card's artwork is based on a scene in {{episode|ZEXAL|051|ref}} where [[Nistro]] Summons "[[Heroic Challenger - Spartan (anime)|Heroic Challenger - Spartan]]".
  ** The aforementioned Summoning scene references the ''[[wikipedia:Ultraman|Ultraman]]'' series, specifically the transformation scene of Ultraman Ace.
  * This card's 500 [[Life Point]] [[activation condition]] references the anime effect of "[[Heroic Champion - Excalibur (anime)|Heroic Champion - Excalibur]]", which required the player to have 500 or less Life Points to attack with that monster.
