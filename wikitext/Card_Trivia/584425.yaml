title: Card Trivia:Magical Musket - Crooked Crown
wikitext: |-
  {{Navigation}}

  * "[[Magical Musket Mastermind Zakiel]]" and "[[Magical Musketeer Max]]" appear in this card's artwork.
  ** The card's artwork references the third act of ''[[wikipedia:Der Freischütz|Der Freischütz]]'', where Max fires the seventh bullet under the devil's sway and accidentally hits Kaspar after it ricochets off Agathe's bridal wreath, as Samiel claims Kaspar's soul as his own.
