title: Card Trivia:Mermail Abysshilde
wikitext: |-
  {{Navigation}}

  * This monster appears to be half [[wikipedia:White ribbon eel|eel]].
  * This monster appears in the artwork of "[[Abyss-squall]]" and "[[Deep Sea Aria]]".
  * This monster is based on one of the [[wikipedia:Rhinemaidens|Rhinemaidens]], specifically Flosshilde. The other corresponding "[[Mermail]]" monsters are "[[Mermail Abysslinde]]" and "[[Mermail Abyssgunde]]".
  ** This is supported by the appearance of all of those monsters in the artwork of "Abyss-squall".
