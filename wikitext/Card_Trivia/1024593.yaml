title: Card Trivia:Peace & Rock n' Roll
wikitext: |-
  {{Navigation}}

  * "[[Esperade the Smashing Superstar]]" appears in this card's artwork.
  ** This card's name and the pose of "Esperade" in this card's artwork are based on a scene from {{episode|SEVENS|011|ref}}, where [[Roa Kassidy]] states that [[Romin Kassidy]], in her hunger-induced berserk state, can rock 'n roll and clinch Duels with freedom, love, and peace.
