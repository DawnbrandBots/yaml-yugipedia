title: Card Trivia:Abyss-squall
wikitext: |-
  {{Navigation}}

  * "[[Mermail Abyssgunde]]", "[[Mermail Abysshilde]]", "[[Mermail Abysslinde]]", and the neck bracelet of "[[Poseidra, the Atlantean Dragon]]" (later to be the arm bracelet of "[[Mermail Abyssgaios]]") appear in this card's artwork.
  ** Fittingly, this card can be used to [[Special Summon]] the three aforementioned "[[Mermail]]" monsters, then they can be [[Tribute]]d to Summon "Poseidra, the Atlantean Dragon" by its own effect.
  ** The bracelet in this card's artwork is a reference to the eponymous ring of ''[[wikipedia:Der Ring des Nibelungen|Der Ring des Nibelungen]]''. In the music dramas, the ring is described as being forged from gold that was guarded by the three [[wikipedia:Rhinemaidens|Rhinemaidens]]: Woglinde, Wellgunde, and Flosshilde (who correspond to "Mermail Abysslinde", "Mermail Abyssgunde", and "Mermail Abysshilde" respectively).
  * This card's Chinese name, 「深淵呼喚」 ("Abyss Call"), may be a mistranslation as its Japanese (アビスコール ''Abisukōru'') and Korean (어비스콜 ''Eobiseukol'') names can be interpreted as "Abysscall" instead, which could be interpreted as referring to this card's [[Special Summon]] effect.
