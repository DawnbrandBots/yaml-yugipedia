title: Card Trivia:Stardust Warrior
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Synchron Extreme]]''/''[[Synchron Extreme Structure Deck]]''.
  * This card is a "[[Warrior (archetype)|Warrior]]" version of "[[Stardust Dragon]]".
  ** Both monsters of the aforementioned archetype and that [[Synchro Monster]] were used by [[Yusei Fudo]] in the ''[[Yu-Gi-Oh 5D's]]'' anime.
  * This card's effect of [[Tributing]] itself to [[negate]] a [[Special Summon]] of an opponent's monster and [[destroy]] it is the opposite of the effect of "Stardust Dragon" to Tribute itself to negate a card or effect that would destroy cards on the [[field]], and destroy that card.
  ** Both cards also have an effect to Special Summon themselves from the [[Graveyard]] during the [[End Phase]], if their effects were [[activate]]d in a turn.
  * This card is a [[counterpart]] of "[[Stardust Assault Warrior]]" and "[[Stardust Charge Warrior]]".
  * The unarmored parts of this monster's body are similar to Yusei Fudo's shirt.
  * As this monster is based off of "Stardust Dragon", it naturally shares many design elements.
  ** The three protrusions on the head of "Stardust Dragon" appear on this monster as well. 
  ** Its chest is a more metallic version of the abdomen from "Stardust Dragon". 
  ** The kneecaps of "Stardust Dragon" make an appearance on this monster. 
  ** The light-blue segmented details throughout this card are the same as those of "Stardust Dragon".
  * This card is the first "Warrior" Accel Synchro Monster, as well as the first ''[[OCG]]''-original Accel Synchro Monster.
  * This card has the highest [[Level]] and [[DEF]] of all "Warrior" [[Synchro Monster]]s.
  ** This card also has the highest ATK of all "Warrior" Synchro Monsters (tied with "[[Road Warrior]]").
  * Like "[[Lightpulsar Dragon]]", this card received an [[Card Errata:Stardust Warrior|errata]] when it was released, in order to prevent an [[infinite loop]]: this card's leaked effect did not specify that the "Warrior" Synchro Monster that can be Special Summoned with this card's effect had to be Level 8 or lower, allowing the player to Special Summon a copy of this card from the [[Extra Deck]] when it [[Leaves the field|left the field]].
  * On the French and Spanish ''[[TCG]]'' product pages for ''Synchron Extreme Structure Deck'', this card was named "Guerrier de Poussière '''D'étoile'''" and "Guerrero '''del''' Polvo de Estrellas", instead of "Guerrier de Poussière '''d'Étoile'''" and "Guerrero '''de''' Polvo de Estrellas", respectively.
