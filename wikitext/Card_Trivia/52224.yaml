title: Card Trivia:Prime Material Falcon
wikitext: |-
  {{Navigation}}

  * This monster is named after the "[[wikipedia:Prima materia|prima materia]]", a formless primeval substance that is regarded as the original material of the universe.
  * This monster has a [[Dragon]] [[counterpart]]: "[[Prime Material Dragon]]".
  * Despite it being named after a [[wikipedia:Falcon|falcon]], this monster more resembles a [[wikipedia:Bald Eagle|bald eagle]].
