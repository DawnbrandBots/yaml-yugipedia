title: Card Trivia:Flame Viper
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart]]: "[[Serpent Marauder]]".
  ** Both cards' [[flavor text]]s indicate this monster is the fire-breathing opposite of the ice-breathing "Serpent Marauder".
  * This is the first non-[[FIRE]] [[Pyro]] monster.
  ** This is also the first [[EARTH]] Pyro monster prior to the introduction of the "[[Gem-Knight]]s".
