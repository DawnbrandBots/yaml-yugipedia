title: Card Trivia:Gagagadraw
wikitext: |-
  {{Navigation}}

  * "[[Gagaga Caesar]]", "[[Gagaga Girl]]" and "[[Gagaga Clerk]]" appear in this card's artwork.
  ** This card's artwork is referencing its effect: 3 "[[Gagaga]]" monsters appear in the artwork (reflecting the cost), 2 of which are holding 1 card each (reflecting the effect).
  * This card has a "[[Dododo]]" counterpart: "[[Dodododraw]]".
