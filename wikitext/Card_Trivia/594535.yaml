title: Card Trivia:Reflection of Endymion
wikitext: |-
  {{Navigation}}

  * This monster has [[Spell Counter]]s on the ring around her back, in her staff, and attached to her robes.
  ** In total, there are 18 Spell Counters visible on this monster.
  * This monster is a masked "[[Selene, Queen of the Master Magicians]]", as well as an older version of "[[Artemis, the Magistus Moon Maiden]]".
