title: Card Trivia:Onomatopaira
wikitext: |-
  {{Navigation}}

  * "[[Gagaga Magician]]" and "[[Gogogo Golem]]" appear in this card's artwork.
  * This card's name is a portmanteau of the words "onomatopoeia" (a sound effect used in media) and "pair" (reflecting the two monsters, one from each the listed archetypes, that can be [[add]]ed to the [[hand]]).
  ** Fittingly, this card lists the "[[Zubaba]]", "[[Gagaga]]", "[[Gogogo]]", and "[[Dododo]]" [[archetype]]s, which are based on onomatopoeia from Japanese media.
  ** This card's base Japanese name, "Onomato Cooperation" (オノマト連携, ''Onomato Renkei''), reflects this card's effect, which allows the player to ensure "cooperation" between the different sound effect-based archetypes by adding one member from two of the listed archetypes from the [[Deck]] to their hand.
