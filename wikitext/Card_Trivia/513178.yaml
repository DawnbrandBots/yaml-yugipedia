title: Card Trivia:Rainbow Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Tactical Evolution]]'', and is also one of the cover cards of the ''[[Collectible Tins 2007 Wave 2]]'', ''[[Duelist Edition Volume 2]]'', ''[[Duelist Pack: Jesse Anderson]]'', and ''[[25th Anniversary Tin: Dueling Heroes]]''.
  * This monster appears in the artworks of "[[Awakening of the Crystal Ultimates]]", "[[Fusion Over]]", "[[Rainbow Bridge of Salvation]]", "[[Rainbow Bridge of the Heart]]", "[[Rainbow Path]]", and "[[Rainbow Refraction]]".
  * This monster is the combined form of the seven "[[Crystal Beast]]" monsters, which are each based on a color of the [[wikipedia:Rainbow|rainbow]].
  ** Red: "[[Crystal Beast Ruby Carbuncle|Ruby Carbuncle]]"
  ** Orange: "[[Crystal Beast Amber Mammoth|Amber Mammoth]]"
  ** Yellow: "[[Crystal Beast Topaz Tiger|Topaz Tiger]]"
  ** Green: "[[Crystal Beast Emerald Tortoise|Emerald Tortoise]]"
  ** Blue: "[[Crystal Beast Sapphire Pegasus|Sapphire Pegasus]]"
  ** Indigo: "[[Crystal Beast Cobalt Eagle|Cobalt Eagle]]"
  ** Violet: "[[Crystal Beast Amethyst Cat|Amethyst Cat]]"
  *** In the ''[[Yu-Gi-Oh! GX]]'' anime, this card required all seven "Crystal Beast" monsters to be Summoned.
  * This is the [[signature card]] of [[Jesse Anderson]] in the ''Yu-Gi-Oh! GX'' anime.
  * This monster has the following 5 forms.
  ** A "[[Crystal Beast]]" younger form: "[[Crystal Beast Rainbow Dragon]]"
  ** A [[dark counterpart]]: "[[Rainbow Dark Dragon]]"
  ** A "[[Malefic]]" counterpart: "[[Malefic Rainbow Dragon]]"
  ** Two [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] forms: "[[Rainbow Overdragon]]" and "[[Ultimate Crystal Rainbow Dragon Overdrive]]"
  * This card's [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] in the Japanese version of the ''Yu-Gi-Oh! GX'' anime, "Over the Rainbow", is a reference to the titular song of the film ''[[wikipedia:The Wizard of Oz (1939 film)|The Wizard of Oz]]''.
  * This card is the first [[Holographic Rare]] to be released in the ''[[OCG]]'' and the first [[Ghost Rare]] to be released in the ''[[TCG]]''.
  ** Some of the [[1st Edition]] Ghost Rare prints of this card in ''[[Gladiator's Assault]]'' were [[misprint]]ed with the artwork of "[[Elemental HERO Chaos Neos]]", and some of the [[1st Edition]] Ghost Rare prints of "Elemental HERO Chaos Neos" were misprinted with this card's name.
  ** In the ''OCG'' version of ''[[Duelist Pack: Jesse Anderson]]'', this card was reprinted as a [[Rare]], but was not included in the ''TCG'' version.
