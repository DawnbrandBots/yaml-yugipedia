title: Card Trivia:Ancient Gear Golem - Ultimate Pound
wikitext: |-
  {{Navigation}}

  * This monster is the [[signature move]] [[counterpart]] of "[[Ancient Gear Golem]]".
  ** This monster's name is based on the Japanese [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Ancient Gear Golem (anime)|Ancient Gear Golem]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** In ''[[Yu-Gi-Oh! Duel Links]]'', this monster's attack name is "Ultimate Pound Pound" in Japanese, and "Mechanized Melee Mayhem" in English.
  * This monster was created to honor {{episode|GX|167|ref}}, which won ''[[Shueisha]]'s [[V Jump]]'' magazine's [http://vjump.shueisha.co.jp/yugioh_20th_duel/keka.html fan favorite ''Yu-Gi-Oh! 5D's'' Duel poll].
  ** As confirmed in ''[[V Jump]]'' March 2017, this monster's effect is inspired by the attack of the three "Ancient Gear Golems" that [[Vellian Crowler]] uses in conjunction with the anime effect of "[[Spell Gear (anime)|Spell Gear]]" in that episode.
