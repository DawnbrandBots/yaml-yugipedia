  * "[[Albion the Shrouded Dragon]]", "[[Incredible Ecclesia, the Virtuous]]", "[[Tri-Brigade Mercourier]]" (perched on the shoulder of "Ecclesia"), "[[Springans Rockey]]" ([[Springans#Design|without its armor]]), "[[Tri-Brigade Bearbrumm the Rampant Rampager]]", "[[Springans Branga]]", "[[Springans Captain Sargas]]", "[[Springans Kitt]]", "[[Springans Pedor]]", "[[Springans Ship - Exblowrer]]", multiple "[[Springans Rockey]]s" (including several that appear in the artwork of "[[Springans Merrymaker]]"), and the mechanical shrike from the artwork of "Springans Kitt" appear in this card's artwork.
