title: Card Trivia:Hieratic Seal of the Heavenly Spheres
wikitext: |-
  {{Navigation}}

  * "[[Hieratic Seal of the Sun Dragon Overlord]]", "[[Hieratic Seal of the Dragon King]]" and sealed forms of the other "[[Hieratic]]" monsters appear in this card's artwork, arranged in what appears to resemble a [[wikipedia:Planetary system|planetary system]]; the depicted monsters take the role of [[wikipedia:Celestial spheres|celestial spheres]], as hinted at by this card's name.
