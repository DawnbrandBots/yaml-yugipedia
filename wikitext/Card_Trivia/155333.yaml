title: Card Trivia:Counter Counter
wikitext: |-
  {{Navigation}}

  * The artwork of this card is the symbol for a [[Counter Trap Card|Counter Trap]].
  * Some copies of the original printing of this card in ''[[Tactical Evolution]]'' lacked the Counter Trap symbol, making it appear to be a [[Normal Trap Card|Normal Trap]]. This would make those copies unplayable, since [[Normal Trap Card|Normal Traps]] are [[Spell Speed 2]], while [[Counter Trap Card|Counter Traps]] are [[Spell Speed 3]]. This mistake was later fixed.
