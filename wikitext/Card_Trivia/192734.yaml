title: Card Trivia:Constellar Alrescha
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Alpha Piscium|Alrescha]], the binary star located in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Pisces (constellation)|Pisces]], whose [[wikipedia:Pisces (astrology)|astrological symbol]] (♓︎︎) appears in the background of this card's artwork in the constellation.
  ** The constellation of Pisces also appears in the background of this card's artwork, with the location of Alrescha denoted by the encircled star.
  ** This monster's armor features the designs patterns of fins, gills, and fish scales, referencing how Pisces is also known as the "fish" constellation.
  *** Fittingly, this monster's effect allows it to [[Special Summon]] a "[[Constellar]]" monster, including a "twin" copy of this monster, referencing how Pisces is often depicted as twin fish.
  ** This monster's weapons are based on the astrological sign of Pisces, which is commonly depicted as two fish bound together by a cord or a rope.
