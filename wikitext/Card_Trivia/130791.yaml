title: Card Trivia:Vylon Delta
wikitext: |-
  {{Navigation}}

  * This card is named after the letter Delta, the fourth letter of the [[wikipedia:Greek alphabet|Greek alphabet]].
  ** The Roman numeral engraved on its chest (IV) indicates this order.
  * The triangular ring on this monster's back resembles the uppercase Delta "Δ", while the rings on its arms resemble the lowercase Delta "δ".
  * This was the 1st "[[Vylon]]" monster to be released into the [[TCG]].
  * It is the only [[Vylon]] Synchro Monsters that have more DEF than its ATK.
