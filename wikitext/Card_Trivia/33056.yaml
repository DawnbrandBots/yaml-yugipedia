title: Card Trivia:Recycling Batteries
wikitext: |-
  {{Navigation}}

  * "[[Batteryman AA]]" and "[[Batteryman C]]" appear in this card's artwork.
  * This card has the highest numbered [[passcode]].
  ** On a side note, this card's passcode only contains the digits 5 and 9.
  * This card has three counterparts for monsters of a specific [[Attribute]]:
  ** [[WATER]]: "[[Salvage]]"
  ** [[FIRE]]: "[[Oil]]"
  ** [[DARK]]: "[[Recurring Nightmare]]"
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Recycling Batteries]]".
