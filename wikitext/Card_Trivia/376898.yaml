title: Card Trivia:Kozmo Tincan
wikitext: |-
  {{Navigation}}

  * "[[Kozmo Strawman]]" appears in this card's artwork.
  * This monster is a combination of the [[wikipedia:Tin Woodman|Tin Man]] from ''[[wikipedia:The Wizard of Oz (1939 film)|The Wizard of Oz]]'' and [[wikipedia:R2-D2|R2-D2]] from ''[[wikipedia:Star Wars|Star Wars]]''.
  ** This monster is depicted blowing steam from the upside-down tin funnel serving as the top of its head. This references the scene in ''The Wizard of Oz'' where the Tin Man blows two puffs of steam from his upside-down tin funnel hat during his dance.
  ** This card's artwork depicts this monster together with "Kozmo Strawman" on a desert terrain with a fallen spaceship in the background. This references the scene in the original ''[[wikipedia:Star Wars (film)|Star Wars]]'' film where R2-D2 and [[wikipedia:C-3PO|C-3PO]] (whom "Kozmo Strawman" is based on) are stranded on the desert planet [[wikipedia:Tatooine|Tatooine]] after their escape pod crashed. They briefly argue with each other before they temporarily go their separate ways.
  * The フェルブラン (Feruburan) part of this card's Japanese name is the French word ''[[wiktionary:fer-blanc|fer-blanc]]'', meaning "tin" or "tinplate".
