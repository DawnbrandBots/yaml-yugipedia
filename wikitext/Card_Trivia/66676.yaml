title: Card Trivia:Double Magical Arm Bind
wikitext: |-
  {{Navigation}}

  * This card has a [[counterpart]]: "[[Magical Arm Shield]]".
  ** Both devices are likely based on a specific type of toy that originated from the [[wikipedia:Ultra Hand|Ultra Hand]], which utilizes the concept of the "lazy tongs" [[wikipedia:pantograph|pantograph]] principle to grab things, as indicated by the fact that the devices are depicted as grabbing monsters in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and/or [[Yu-Gi-Oh! (anime)|anime]].
