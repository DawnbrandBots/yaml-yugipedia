title: Card Trivia:Luminous Spark
wikitext: |-
  {{Navigation}}

  * This card's artwork is similar to that of "[[Light of Intervention]]", as both cards' artworks feature a light and a red winged demon shielding itself away from the light.
  * This card has [[counterpart]]s for other [[Attribute]]s:
  ** "[[Gaia Power]]" for [[EARTH]].
  ** "[[Molten Destruction]]" for [[FIRE]].
  ** "[[Mystic Plasma Zone]]" for [[DARK]].
  ** "[[Rising Air Current]]" for [[WIND]].
  ** "[[Umiiruka]]" for [[WATER]].
