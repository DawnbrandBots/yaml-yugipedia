title: Card Trivia:Convex Knight
wikitext: |-
  {{Navigation}}

  * The word "Convex" in this monster's name refers to the Japanese term for certain auto-winding [https://en.wiktionary.org/wiki/%E3%82%B3%E3%83%B3%E3%83%99%E3%83%83%E3%82%AF%E3%82%B9#Etymology_2 tape measures], named for their convex shape.
  ** This monster's design consists of multiple such tape measures, with additional measuring tape in the background of this card's artwork.
