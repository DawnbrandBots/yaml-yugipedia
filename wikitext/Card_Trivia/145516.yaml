title: Card Trivia:Blackwing - Boreas the Sharp
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is derived from the [[wikipedia:Bora (wind)|bora]], a northern to north-eastern autumnal [[wikipedia:Katabatic wind|katabatic wind]] that occurs near the Adriatic Sea.
  ** This monster's ''[[TCG]]'' name is derived from [[wikipedia:Anemoi#Boreas|Boreas]], a member of the Anemoi, the Greek gods of the wind who rule over the cardinal directions from where the winds come from, whereas Boreas is the god of the [[wikipedia:Northern wind|north wind]].
  ** This monster shares its Japanese name with the ''[[TCG]]'' name of "[[Blackwing - Bora the Spear]]", as well as sharing its ''TCG'' name with "[[Blackwing - Boreastorm the Wicked Wind]]".
