title: Card Trivia:Performapal Camelump
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Rakudown" is a portmanteau of the Japanese word for "camel" (ラクダ ''Rakuda'') and the pronunciation of "down" (ダウン ''Daun'')
  ** This naming scheme reflects this card's effects to make the opponent's monster's [[ATK]] or [[DEF]] values go "down" by 800.
  * In the Korean dubbed version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this card's name was "Entermate Cameltown" ("EM 낙타운", ''Enteomeiteu Nagtaun'') instead of "Entermate Ragdown" ("EM 락다운", ''Enteomeiteu Lagdaun'').
