title: Card Trivia:Super Quantal Fairy Zetan
wikitext: |-
  {{Navigation}}

  * This monster is a [[DARK]] [[Zombie]] [[counterpart]] of "[[Super Quantal Fairy Alphan]]".
  ** Both share the same [[Level]] (1) and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (0/0).
  ** Both feature an effect to change the [[Level]]s of monsters to that of a "[[Super Quant]]" monster the player [[control]]s, and an effect to [[Tribute]] themselves to [[Special Summon]] a "Super Quant" monster.
  ** "Alphan" is named after the Greek letter alpha, the first letter of the Greek alphabet, while this monster is named after the Greek letter zeta, whose uppercase glyph is the same as that of Z, the last letter of the Latin alphabet.
  ** "Alphan" have 3 orbs that turns circularly, while "Zetan" have 3 orbs that turns sharply.
  *** "Black Layer" have 3 modules that turns circularly, while "White Layer" have 3 modules that turns sharply.
