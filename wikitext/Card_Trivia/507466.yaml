title: Card Trivia:Armored Glass
wikitext: |-
  {{Navigation}}

  * The armor in this card's artwork appears in the artwork of "[[Armor Break]]".
  * This card has three counterparts: "[[Metal Detector]]" (for [[Continuous Trap Card]]s), "[[World Suppression]]" (for [[Field Spell Card]]s), and "[[Mystic Probe]]" (for [[Continuous Spell Card]]s).
  * Oddly, for its international release, this card's artwork was not censored, as the upper armor features a clear bustline and the lower armor bears a striking resemblance to a [[wikipedia:G-string|G-string]].
