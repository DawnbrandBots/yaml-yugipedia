title: Card Trivia:Flamesaurus
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the ''[[wikipedia:Ankylosaurus|Ankylosaurus]]'', a species of [[wikipedia:Thyreophora|armored dinosaur]] known for its spiked clubbed tail.
  * This monster's Japanese name, "Punch Flamesaurus", is based on a [[wikipedia:Punch perm|punch perm]], a type of tightly permed male hairstyle stereotypically associated with gang members and labor workers during the 1970s - 1990s, which the scales on this monster's head resembles. This reflects this monster's owner, [[Scorch]], who serves as one of the leaders of his gang along with [[Chills]].
