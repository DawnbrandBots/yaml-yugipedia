title: Card Trivia:Extinction on Schedule
wikitext: |-
  {{Navigation}}

  * "[[Black Ptera]]", "[[Black Stego]]", "[[Black Tyranno]]", "[[Black Veloci]]" and "[[Jurassic World]]" appear in this card's artwork.
  * This card's artwork depicts one of the theories about the extinction of dinosaurs in the real world, specifically an asteroid impact which is believed to be the [[wikipedia:Cretaceous–Paleogene extinction event|Cretaceous–Paleogene extinction event]].
