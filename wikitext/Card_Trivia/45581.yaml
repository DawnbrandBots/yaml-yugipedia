title: Card Trivia:Mist Wurm
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Back]]".
  * This is the first [[Thunder]] [[Synchro Monster]].
  * Though this monster is not part of the "[[Mist Valley]]" [[archetype]], it is a [[WIND]] [[Thunder]] monster that features an effect which [[return]]s cards from the [[field]] to the [[hand]] and is depicted in a valley-like environment, which are common traits among the aforementioned archetype.
