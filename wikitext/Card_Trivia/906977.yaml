title: Card Trivia:Amazement Ambassador Bufo
wikitext: |-
  {{Navigation}}

  * Balloon versions of "[[Kuriboh]]" and a "[[Sheep Token]]" appear in this card's artwork.
  * This monster appears in the artworks of "[[Amazement Family Faces]]" (as a toy) and "[[Amazement Special Show]]".
  * This card’s name is probably based on the Italian word “Buffo”, which means “funny”.
