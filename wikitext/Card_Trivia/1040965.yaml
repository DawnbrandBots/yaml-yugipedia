title: Card Trivia:Swallow's Cowrie
wikitext: |-
  {{Navigation}}

  * This card is the counterpart of "[[Swallow's Nest]]".
  * This card's name is a reference to the Japanese folktale, ''[[wikipedia:The Tale of the Bamboo Cutter|The Tale of the Bamboo Cutter]]'', in which Princess Kaguya issues an impossible task to each of the five nobles to bring her a specific item in exchange for her hand in marriage, one of which is the [[wikipedia:Cowrie#Shell description|cowrie shell]] born from a [[wikipedia:Swallow|swallow]].
