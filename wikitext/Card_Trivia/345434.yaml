title: Card Trivia:Hypnosister
wikitext: |-
  {{Navigation}}

  * "[[Trancefamiliar]]" appears in the artwork of this card.
  ** "Trancefamiliar" also appears alongside this monster in the artwork of "Risebell the Summoner" and "Unending Nightmare".
  * This monster appears in the artwork of "[[Risebell the Summoner]]", "[[Unending Nightmare]]", "[[Unwavering Bond]]", and "[[Wavering Eyes]]".
  * This monster's name is a portmanteau of "hypnosis" and "sister".
  ** This monster is depicted holding a pendulum in her right hand; this reflects both the use of pendulums as hypnotic devices and the effects that this card gains based on the total number of cards in [[Pendulum Zone]]s.
  *** One of this monster's effects gained based on the total number of cards in Pendulum Zones allows this it to [[destroy]] any [[Pendulum Summon]]ed monster that battles it; another effect forces the opponent's monsters to attack this monster if they are able to, simulating hypnotism.
