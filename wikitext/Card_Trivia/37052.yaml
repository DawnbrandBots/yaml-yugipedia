title: Card Trivia:Huge Revolution
wikitext: |-
  {{Navigation}}

  * Three different people from the artworks of "[[Oppressed People]]" (the peasant being whipped), "[[People Running About]]" (the blonde man), and "[[United Resistance]]" (the hooded man standing on the corner) appear in this card's artwork.
  ** The aforementioned monsters are depicted wielding a [[wikipedia:Hoe (tool)|hoe]], a sword, and an umbrella, respectively.
  ** The [[Level]]s of these monsters are one, two, and three (respectively), with their artworks depicting the events leading to the "Huge Revolution" in numerical order (starting with the lowest Level).
  ** Despite these monsters being composed of normal humans, they have a variety of [[Attribute]]s: [[FIRE]], [[WIND]], and [[WATER]]. The colors of these Attributes reference the colors red, white, and blue present in the flags used in several countries that have had famous revolutions, including the [[wikipedia:French Revolution|French Revolution]], the [[wikipedia:American Revolution|American Revolution]], the [[wikipedia:Eighty Years' War|Dutch Revolution]], and the [[wikipedia:Russian Revolution|Russian Revolution]].
  * This card has a ''[[Rush Duel]]'' [[Gi-ant Revolution (series)|Gi-ant Revolution]] [[counterpart]]: "[[Gi-ant Revolution]]".
  * According to the [[Master Guide 1 card storylines|''Master Guide 1'' card storylines]], the events depicted in the artworks of "[[Royal Oppression]]", "[[Toll]]", and "[[Confiscation]]" contribute to the people's resentment that ultimately culminates in the "Huge Revolution".
  ** Despite this, the card "[[The Huge Revolution is Over]]" was released many years later (in ''[[Order of Chaos]]''), whose name, artwork, and effect indicated that the revolution had failed. However, "[[Double Payback]]" was released in the next booster pack, ''[[Galactic Overlord]]'', whose name and artwork appeared to indicate that the revolution had overcome its temporary setback.
  * The second Japanese artwork of "[[Vow of Tribe]]" is based on this card's artwork.
