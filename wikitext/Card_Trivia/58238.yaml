title: Card Trivia:Inmato
wikitext: |-
  {{Navigation}}

  * This monster and its Japanese name are based on the character "Tomabo" from a certain [[wikipedia:ja:脳開発研究所クルクルラボ|Konami arcade game]], while its English name is a portmanteau of the words "''inmate''" and "''tomato''" (specifically its American English pronunciation), which is also a pun based on its appearance.
  * This monster appears in the artworks of "[[Cherry Inmato]]", "[[Tomatapult]]", and "[[Performapal Guard Dance]]".
