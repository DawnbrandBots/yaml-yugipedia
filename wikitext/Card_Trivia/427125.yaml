title: Card Trivia:Triamid Pulse
wikitext: |-
  {{Navigation}}

  * Similar to "[[Triamid Cruiser]]", "[[Triamid Fortress]]", and "[[Triamid Kingolem]]", the structure in this card's artwork appears to be based on the [[w:c:powerrangers:King Pyramider|King Pyramider]] mecha from the ''[[w:c:powerrangers:Chouriki Sentai Ohranger|Chouriki Sentai Ohranger]]'' TV show (alternatively [[w:c:powerrangers:Pyramidus|Pyramidus]], from ''[[w:c:powerrangers:Power Rangers Zeo|Power Rangers Zeo]]'').
  ** Specifically, this card's artwork appears to be based on King Pyramider transitioning into its Battle Formation (aka, "Triamid Kingolem").
