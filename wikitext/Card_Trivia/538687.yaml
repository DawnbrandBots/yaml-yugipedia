title: Card Trivia:Splendid Venus
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Limited Edition 10: Holy White]]''.
  * This card is based on the planet [[wikipedia:Venus (planet)|Venus]], the second planet in the [[wikipedia:Solar System|solar system]].
  ** This monster's feminine appearance is based on the planet's namesake, the [[wikipedia:Venus (mythology)|Roman goddess of love and beauty]].
  * This is the only [[Legendary Planet]] (besides "[[Elemental HERO Terra Firma]]") not to have the word "The" at the beginning of its English name. [[Kevin Tewart]] was asked why it was left off, but answered on this [http://www.pojo.biz/board/showthread.php?p=17841376#post17841376 Pojo post] that he was on an extended vacation at the time and thus doesn't know why.
  ** Despite this, in another [http://www.pojo.biz/board/showthread.php?p=17841406#post17841406 Pojo post], Kevin said he "would rather not" errata this card's name to include the word "The".
  * This is one of the few cards in the ''[[OCG]]'' whose Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Destiny HERO - Plasma]]", "[[Destiny End Dragoon]]", "[[Assault Revival]]", "[[NEX]]", "[[ZERO-MAX]]", and the other Legendary Planet cards (except "Elemental HERO Terra Firma").
