title: Card Trivia:Nimble Musasabi
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Japanese giant flying squirrel|Japanese giant flying squirrel]], where the Japanese word for its scientific name, ''Petaurista leucogenys'', is ''musasabi''.
  * This monster has a [[counterpart]]: "[[Nimble Momonga]]".
  ** Both cards are based on different species of Japanese flying squirrel.
  ** Coincidentally, both cards also share the same ''[[TCG]]'' expansion set [[card number]] of "086".
