title: Card Trivia:Metal Dragon
wikitext: |-
  {{Navigation}}

  * The train appearing in the artwork of "[[Amaze Attraction Thrill Train]]" is based on this monster.
  * This is the first [[Machine]] [[Fusion Monster]] in the ''[[OCG]]''/''[[TCG]]''.
  * Some of this card's prints in ''[[Vol.3]]'' feature an error, where the circle used to indicate its [[WIND]] [[Attribute]] was mistakenly printed with the circle used to indicate the [[DARK]] Attribute.
