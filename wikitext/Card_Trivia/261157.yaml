title: 'Card Trivia:Number 46: Dragluon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Dragon Dance]]".
  ** This monster's shadow appears in the artwork of "[[Number 75: Bamboozling Gossip Shadow]]".
  * This monster's name is a portmanteau of the words "dragon", "gluon", and "long" (Chinese for "dragon").
  ** This monster's name is based on the [[wikipedia:elementary particle|elementary particle]] [[wikipedia:Gluon|gluon]], similarly to how the "[[Galaxy-Eyes]]" monsters are based on particles as well.
  * This monster has a [[DARK]] counterpart: "[[Number 97: Draglubion]]".
  ** Both monsters share the same [[Rank]] (8), [[Type]] ([[Dragon]]), [[original ATK and DEF]] (3000/3000), similar overall design, and an effect that supports Dragon monsters.
  ** This monster's Japanese name contains the kanji "神影龍" (''Shin'eiryū''), whereas the name of its counterpart "Draglubion" contains the kanji "龍影神" (''Ryūeishin''), which serve as palindromes of each other.
  ** Furthermore, the number "46" resembles the number "97", rotated 180 degrees.
  * This monster has a [[retrain]]ed counterpart: "[[Divine Golden Shadow Dragon Dragluxion]]".
  * "[[Number]]" monsters often take the form reflecting their owners and/or their original desires. In this case, this [[Mythyrian Number]] represents its original owner [[Mizar]] and this monster's [[Number Guardian|"Number" Guardian]], [[Jinlon]].
  ** This monster's appearance as a [[wikipedia:Chinese dragon|Chinese dragon]] reflects Jinlon's name, which is translated from Chinese into "Golden Dragon"; also the tendrils growing out of this monster's head resembles Jinlon's hairstyle.
  *** Fittingly, in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, according to the [[Legend of the Dragons of Light and Time]], this monster, along with "[[Number 62: Galaxy-Eyes Prime Photon Dragon (anime)|Number 62: Galaxy-Eyes Prime Photon Dragon]]" and "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]" can resonate to form "[[Number 100: Numeron Dragon (anime)|Number 100: Numeron Dragon]]", a monster that takes the appearance of a golden Chinese dragon.
  ** This monster's required [[Xyz Material]]s and effects is a reference to how Mizar was a dragon tamer in his past life, as well as the story of Mizar where he defended Jinlon from the villagers believing the latter was responsible for the disaster that struck the village.
  * This monster's neutral form resembles a mix of the neutral forms of "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]" and "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]", with the top half resembling "Galaxy-Eyes Photon Dragon" and the bottom half resembling "Galaxy-Eyes Tachyon Dragon".
  * In the anime, this monster's roar is the same one as that of the [[Crimson Dragon]].
