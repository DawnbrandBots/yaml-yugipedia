title: Card Trivia:Master Gig
wikitext: |-
  {{Navigation}}

  * This is the first [[Psychic]] monster that requires two [[Tribute]]s in order to [[Tribute Summon]].
  * This card was one of the 3 [[Raging Battle]] preview promos released in the [[Duelist Pack Collection Tin 2009]] green tin.
  * This card appears in the artwork of "[[Psi-Curse]]".
