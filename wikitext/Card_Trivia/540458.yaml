title: Card Trivia:Guardian Dreadscythe
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Dragons of Legend]]''.
  * This monster appears in the artwork of "[[Spirit Hunting]]".
  * This monster appears to be a darker, "fallen" version of "[[Guardian Eatos]]", as indicated by its dress being identical to the one "Eatos" wears, and its wings being lowered and recolored black.
  ** This is further suggested by their [[Type]]s, as this monster's Type is [[Fiend]], while the Type of "Eatos" is [[Fairy]].
  ** In addition, this monster's anime effects also reflect the fall of [[Rafael]], the user of the "Guardian" archetype in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime. Prior to "Guardian Eatos" being destroyed in battle by "[[Amulet Dragon (anime)|Amulet Dragon]]", Rafael vowed not to leave any of his monsters in the [[Graveyard]] as a sign of respect to his [[Duel Monster Spirit]] companions; however, when "Guardian Eatos" was [[destroy]]ed, Rafael became enraged and sacrificed all of his monsters to power up this monster in an attempt to defeat [[Yami Yugi]].
  * In the ''Yu-Gi-Oh!'' anime, this is the only "Guardian" monster that does not need an [[Equip Spell Card]] on the [[field]] in order to be Summoned, instead requiring "Guardian Eatos" to be destroyed.
  ** Indeed, this monster and "Guardian Eatos" (the only other "Guardian" to not have this [[Summoning condition]] in the ''[[OCG]]''/''[[TCG]]'') are the only two such "Guardian" monsters to not have their correlating [[Equip Spell]] visible in their artwork.
