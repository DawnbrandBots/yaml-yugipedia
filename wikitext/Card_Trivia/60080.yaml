title: Card Trivia:Little D
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Coevolutionary Miracle]]".
  * This monster's Japanese name, "Baby T-Rex", is based on the ''[[wikipedia:Tyrannosaurus rex|Tyrannosaurus rex]]'', although this monster features four fingers instead of two.
  * This monster has a [[recolored counterpart]]: "[[Tomozaurus]]".
  ** This is made clear by the 3D models of the two monsters in ''[[Yu-Gi-Oh! Forbidden Memories]]''.
  * This is one of eight of [[Joey Wheeler]]'s [[Normal Monster]]s introduced to the ''[[TCG]]'' in ''[[Legendary Collection 4: Joey's World Mega Pack]]'' that have their English [[flavor text]]s written in his [[wikipedia:Brooklyn|Brooklyn]] accent. The other seven are"[[Anthrosaurus]]", "[[Hero of the East]]", "[[Kageningen]]", "[[Meotoko]]", "[[Skull Stalker]]", "[[Stone Armadiller]]", and "[[Wolf]]". ("[[Alligator's Sword]]", which is included in ''Legendary Collection 4: Joey's World Mega Pack'' but debuted in the ''TCG'' previously, also has this kind of English flavor text.)
  ** All of these monsters are seen in Joey's very first [[Deck]], except for "Hero of the East" (which is only seen when Joey has a dream of himself with his inexperienced Deck) and "Little D" (which has not appeared in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime).
  ** In Italian, Portuguese and Spanish, these cards' flavor texts are also written in [[wikipedia:Eye dialect|eye dialect]] for the sake of humor. Apart from the French text which is translated more directly from the Japanese text in a little more serious way, texts in other ''TCG'' languages appear to be translated from the English text.
