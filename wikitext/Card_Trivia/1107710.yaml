title: Card Trivia:Root Wood
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card originally debuted as a constructed card in ''[[Yu-Gi-Oh! Dark Duel Stories]]''. It is a [[List of significant constructed cards#Standard combinations|matched constructed card]] using the 16th upper and lower body [[card part]]s, "[[Root]]" and "[[Wood (card part)|Wood]]".
  ** This is also one of [[List of significant constructed cards#Became regular cards|seven originally constructible cards]] to appear as a regular card in the game's sequel, ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]''.
