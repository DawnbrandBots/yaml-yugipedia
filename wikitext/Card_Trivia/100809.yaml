title: Card Trivia:Ally of Justice Decisive Armor
wikitext: |-
  {{Navigation}}

  * "[[Ally Mind]]" appears in this card's artwork as a part of this monster.
  * This card has the highest [[ATK]] and [[DEF]] of all "[[Ally of Justice]]" monsters.
  * The design of the monster is loosely based on ''Genseishin Juu-Riser'' from ''[[wikipedia:Genseishin Justirisers|Genseishin Justirisers]]'', which [[Konami]] has produced merchandise for is also associated with Konami.
  * This monster has a combined "[[Genex]]" form with "[[Ally of Justice Field Marshal]]": "[[Arms of Genex Return Zero]]".
  * This card has a "[[Nekroz]]" counterpart: "[[Nekroz of Decisive Armor]]".
  * This card has 3 cannons, likely representing each of its 3 [[Ignition]] effects and/or the minimum of 3 monsters required to [[Synchro Summon]] this monster.
