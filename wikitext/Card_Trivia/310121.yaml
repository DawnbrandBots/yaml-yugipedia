title: Card Trivia:Cosmic Sanctuary
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card resembles "[[The Sanctuary in the Sky]]" but in outer space.
  * This card may be an allusion to the ''Saint Seiya'' manga and anime, since the field resembles The Sanctuary, an important location within the series. Also the Cosmos is a frequent source of power.
  * This field is the signature field of [[Dipper O'rion]]. He claimed to know every place the Action Card would be in this field.
