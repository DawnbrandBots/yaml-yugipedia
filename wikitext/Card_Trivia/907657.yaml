title: Card Trivia:Trivikarma
wikitext: |-
  {{Navigation}}

  * "[[Visas Starfrost]]" appears in this card's artwork.
  * This card's artwork appears in the artwork of "[[Loka Samsara]]".
  * This card's name is a portmanteau of ''Trivikrama'', also known as [[wikipedia:Vamana|Vamana]]—the fifth avatar of the Hindu god [[wikipedia:Vishnu|Vishnu]]—and the word "karma"—the sum of a person's actions in this and previous states of existence, viewed as deciding their fate in future existences.
  ** In the legend of Vishnu, Vamana liberated the three worlds (Heaven, Earth, and Netherworld) from the demon lord [[wikipedia:Mahabali|Bali]] by requesting "three foot steps of land" from him while disguised as a Brahman. Bali grants his request, upon where Vamana enlarges and places the first step on Earth, and the second on Heaven; when Vamana rhetorically asks where he should take his third step, Bali stated the Netherworld, admitting defeat. Vamana grants this request and banishes Bali to the Netherworld afterwards.
  ** Fittingly, "Visas Starfrost", at this point within the "[[Broken World]]" storyline, has ventured the realms [[Scareclaw Reichheart|his]] [[Tearlaments Reinoheart|three]] [[Kashtira Riseheart|counterparts]] hail from, "[[Primitive Planet Reichphobia|Reichphobia]]", "[[Primeval Planet Perlereino|Perlerino]]" and "[[Pressured Planet Wraitsoth|Wraitsoth]]" and has reached a turning point in his fight with the conqueror "[[Kashtira Arise-Heart]]" after the latter seemingly kills "[[Scareclaw Light-Heart]]".
