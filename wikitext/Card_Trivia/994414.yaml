title: Card Trivia:RB Dragon Vert
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is based on [[wikipedia:Data conversion|data conversion]], the conversion of computer data from one format to another.
  ** This monster's name features the initials, "RB", each abbreviating the name of "[[Red-Boot Boost Dragon]]" and "[[Blue-Fang Burst Dragon]]", which its effect can [[support]].
  *** This naming scheme is reflected in this monster's effect, which allows it to "convert" one of the above-mentioned monsters in the player's [[hand]] with the other monster of a different [[Attribute]] in their [[Graveyard]].
  *** This monster is depicted striking a pose similar to the aforementioned monsters' while the red-and-blue background is a combination of those of the aforementioned cards' artwork.
