title: Card Trivia:Nobledragon Magician
wikitext: |-
  {{Navigation}}

  * This card is the second [[Tuner monster|Tuner]] [[Pendulum Monster]] released, despite being the first Tuner Pendulum Monster revealed, just before "[[Luster Pendulum, the Dracoslayer]]".
  * This card's name could be a reference to the "[[Topsiders]]" of the [[Synchro Dimension]] in the ''[[Yu-Gi-Oh! Arc-V]]'' anime, just as its counterpart, "[[Oafdragon Magician]]", could be a reference to the [[Commons (ARC-V)|Commons]].
