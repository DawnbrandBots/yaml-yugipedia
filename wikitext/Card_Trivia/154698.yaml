title: Card Trivia:Droll & Lock Bird
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * The design for "Droll" appears to be similar to that of "[[Night's End Sorcerer]]", and could also be considered a younger version of the same monster.
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this monster has a special animation when [[activate]]d, in which the bird's feathers surround both players' [[Deck]]s, preventing them from [[add]]ing cards from there to their [[hand]]s.
