title: 'Card Trivia:Number 59: Crooked Cook'
wikitext: |-
  {{Navigation}}

  * This card's reveal date, on the ''[[OCG]]'' [https://twitter.com/YuGiOh_OCG_INFO/status/729605125916876800 Twitter] on May 9, 2016 (5/9), is a reference to this card's number. May 9th is Gokū Day, a Japanese holiday that was officially recognized in 2015.
