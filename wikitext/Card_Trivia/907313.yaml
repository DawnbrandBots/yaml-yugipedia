title: Card Trivia:Qwerty Keyblade
wikitext: |-
  {{Navigation}}

  * This card is named after a [[wikipedia:QWERTY|QWERTY keyboard]], one of the most common keyboard layouts for Latin alphabets. The name itself is based on the first six keys on the top left letter row of the keyboard, "Q", "W", "E", "R", "T", and "Y".
