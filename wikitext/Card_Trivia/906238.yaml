title: Card Trivia:Unauthorized Reactivation
wikitext: |-
  {{Navigation}}

  * "[[Machina Sniper]]", "[[Machina Soldier]]" (being transformed into "[[Machina Possesstorage]]"), and "[[Unauthorized Bootup Device]]" appear in this card's artwork.
  ** This card's artwork indicates that "Machina Sniper", "Machina Soldier", and "[[Machina Defender]]" were deactivated before "Unauthorized Bootup Device" corrupted them.
  * This card's ''[[TCG]]'' name, "Unauthorized Reactivation", is the translation of the kanji in its Japanese name (無許可の再奇動, ''Mukyoka no Saikidō'').
  ** The kanji 「奇動」 (''Kidō'') in this card's Japanese name is a homophone of 「起動」 (''Kidō'', "Activation"): 「起」 (''Ki'') is replaced with 「奇」 (''Ki'', "Strange").
  *** The kanji is also the same as the one in the Japanese name of "Unauthorized Bootup Device".
