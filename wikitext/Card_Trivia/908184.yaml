title: Card Trivia:Ursarctic Polari
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ursarctic Drytron]]" and "[[Ursarctic Quint Charge]]".
  * This monster's name is based on [[wikipedia:Polaris|Polaris]], the northern polar star located in the circumpolar constellation of [[wikipedia:Ursa Minor|Ursa Minor]], which is also known as the "Little Bear".
  * This monster has a counterpart wearing "[[Drytron]]" armor: "[[Ursarctic Polar Star]]".
  * This is the first [[Level 1]] [[Synchro Monster]], appearing only about 13 years after the debut of the [[card type]] in the anime and in the ''[[OCG]]''/''[[TCG]]''.
