title: Card Trivia:Chronomaly Magella Globe
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''Chichuseki'', the globe belonging to [[wikipedia:Prince Shōtoku|Prince Shōtoku]], a semi-legendary regent and a politician, lasting from the late 6th century to the early 8th century. ''Chichuseki'' (which translates to "a stone in the Earth") is a carved stone sphere predating the terrestrial globe made in 1492 by [[wikipedia:Martin Behaim|Martin Behaim]] and the discovery of the Earth's spherical shape.
  ** This monster's name references [[wikipedia:Ferdinand Magellan|Ferdinand Magellan]], a Portuguese explorer best known for the [[wikipedia:Magellan expedition|Magellan expedition]] around the world, which confirmed the spherical shape of the Earth.
  *** Given the antiquity of this monster, its name might also reference ''[[wikipedia:Terra Australis|Terra Australis]]'', a hypothetical continent corresponding with Antarctica, which is also named ''Magellanica'', meaning "the land of Magellan".
