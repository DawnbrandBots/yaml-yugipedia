title: Card Trivia:Oath of Companionship
wikitext: |-
  {{Navigation}}

  * "[[Gogiga Gagagigo]]" and "[[Marauding Captain]]" appear in this card's artwork.
  ** This card's artwork is a continuation of the events depicted in "[[Memory of an Adversary]]".
  ** The circumstances of this card could have been the cause of the transformation of "Gogiga Gagagigo" into "[[Gagagigo the Risen]]", through the purification of his soul.
