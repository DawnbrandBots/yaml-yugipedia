title: Card Trivia:Attribute Bomb
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card's artwork depicts a roulette wheel where the strips are colored after the corresponding [[Attribute]]s (from left to right): [[WATER]] (represented by the blue strip), [[WIND]] (represented by the green strip), [[DARK]] (represented by the purple strip), [[FIRE]] (represented by the red strip), [[EARTH]] (represented by the brown strip), and [[LIGHT]] (represented by the yellow strip).
  ** This card's artwork also depicts an active bomb being thrown into the roulette with the possibility of landing on any of the strips before exploding, which reflects its effect to damage the opponent according to the declared Attribute.
