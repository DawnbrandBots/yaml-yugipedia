title: Card Trivia:Dian Keto the Cure Prodigy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Aqua Inflation]]" and "[[Embracing the Rain]]".
  ** A perfume whose design resembles this monster appears in the artwork of "[[D and Care]]".
  * This monster is the ''[[Rush Duel]]'' [[Bubble Actress]] [[counterpart]] of "[[Dian Keto the Cure Master (Rush Duel)|Dian Keto the Cure Master]]".
  ** This monster has two Bubble Actress counterparts: "[[Dian Keto the Food Prodigy]]" and "[[Dian Keto the Cleaning Prodigy]]".
  ** This monster has a [[Praime]] counterpart: "[[Praime Dian Keto]]".
