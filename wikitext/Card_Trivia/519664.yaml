title: Card Trivia:Backup Squad
wikitext: |-
  {{Navigation}}

  * "[[Goblin Attack Force]]", "[[Goblin Pothole Squad]]", and "[[Goblin Elite Attack Force]]" appear in this card's artwork.
  * This card's artwork is a continuation of the events depicted in the artwork of "[[Supply Squad]]".
  ** Also, both cards are [[Continuous Spell Card]]s that allow the player to [[Draw a card|draw]] cards when a usually hindering condition is met.
  * This card's artwork is a continuation of the events depicted in the artwork of "[[Secret Blast]]".
  ** The second effect of "Secret Blast" inflicts exactly 1000 [[Effect damage|damage]], which is what is needed to trigger this card's effect. Also, the aforementioned effect is only triggered when "Secret Blast" is destroyed, which means that it'd triggers "Supply Squad".
