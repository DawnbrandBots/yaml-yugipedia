title: Card Trivia:Leprechaun
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on a [[wikipedia:Leprechaun|leprechaun]], a small supernatural being in [[wikipedia:Irish mythology|Irish mythology]] that is often depicted as a small humanoid bearded man wearing green clothes who often partake in mischief. According to legend, leprechauns are known for being excellent shoemakers who hide their pot of gold at the end of the rainbow.
