title: Card Trivia:Blue-Eyes Spirit Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Beacon of White]]".
  * This is the first "[[Blue-Eyes]]" [[Synchro Monster]].
  * This monster has a younger form: "[[Dragon Spirit of White]]".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Blue-Eyes Ultimate Spirit Dragon]]".
  * This monster shares similarities with other monsters associated with "[[Blue-Eyes White Dragon]]":
  ** It shares the same [[Level]] (9) and [[original ATK and DEF]] (2500/3000) as "[[Azure-Eyes Silver Dragon]]".
  ** Its pose is mirrored compared to the pose of "[[Blue-Eyes Chaos MAX Dragon]]".
  ** The golden hair streak at the end of this monster's tail is similar to the golden hair on the head of "[[Legendary Dragon of White]]".
