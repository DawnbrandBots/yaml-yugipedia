title: Card Trivia:Gadget Soldier
wikitext: |-
  {{Navigation}}

  * This card has a counterpart:  "[[Mighty Guard]]".
  * This is the first "[[Gadget]]" monster to be released, although this was before the archetype was officially created with "[[Boot-Up Soldier - Dread Dynamo]]".
  * In the original [[Yu-Gi-Oh! (manga)|Yu-Gi-Oh! manga]], this card was a [[Level 4]] monster. In ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'', just like with many [[Monster Card]]s' [[Level]]s, this card's Level was changed to [[Level 6]], which would later be carried over to when it was released in the ''[[OCG]]''/''[[TCG]]''.
