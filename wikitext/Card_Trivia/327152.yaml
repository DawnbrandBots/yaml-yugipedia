title: Card Trivia:U.A. Goalkeeper
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Goalkeeper (association football)|goalkeeper]] in [[wikipedia:Association football|association football]] (aka soccer).
  ** This monster's effect reflects the role of a goalkeeper: defending against the "attacks" of the opponent.
  * This monster appears in the artworks of "[[Defense Zone]]" and "[[Loss Time]]".
