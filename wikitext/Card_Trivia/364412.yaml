title: Card Trivia:Qliphort Cephalopod
wikitext: |-
  {{Navigation}}

  * This card's Japanese name contains アクセス ''akusesu'', a pun on "access" and "Akzeriyyuth" (アクゼリュス ''Akuzeryusu'' "cruelty"), the fifth [[wikipedia:Qliphoth|Qliphoth]] emanation which is associated with the [[wikipedia:Devil|Devil]] [[wikipedia:Asmodeus|Asmodeus]].
  * This card's TCG name is a reference to the [[wikipedia:Cephalopod|cephalopod]].
