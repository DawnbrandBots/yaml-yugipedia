title: Card Trivia:Timaeus the United Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Gaze of Timaeus]]".
  * This is the [[Monster Card]] counterpart of "[[The Eye of Timaeus]]" and the [[Dragon]] form of "[[Legendary Knight Timaeus]]".
  ** This monster shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (8), and [[original ATK and DEF]] (2800/1800) as "Legendary Knight Timaeus".
  ** This monster's effect to [[Fusion Summon]] a [[Fusion Monster]] by using a [[Spellcaster]] monster as [[material]] is based on the effect of "The Eye of Timaeus", which requires the player to [[target]] a "[[Dark Magician (archetype)|Dark Magician]]" monster before performing a Fusion Summon and using that monster as material.
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Timaeus the United Magical Dragon]]".
