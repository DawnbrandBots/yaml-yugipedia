title: Card Trivia:Submarine Frog
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Unknown Frog" (みちガエル, ''michigaeru'') is a pun on the Japanese term meaning "to be hardly recognized", reflecting its appearance as a cartoonish, anthropomorphic frog in contrast with the realistic design of the other "[[Frog]]" monsters.
  ** This monster's English name is a reference to its design, as it features underwater gear.
  *** Likely, this monster's appearance is based on the term "frogman," a person equipped to work underwater, which is also a term associated with combat divers.
  *** This, and this monster's underwater suit also features the letter "F", referencing its status as a "Frog" monster.
  * This is the first [[TCG-only|''TCG''-exclusive]] card to feature a [[Common]] [[rarity]].
