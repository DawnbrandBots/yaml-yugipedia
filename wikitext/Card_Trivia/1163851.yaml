title: Card Trivia:Archfiend's Usurpation
wikitext: |-
  {{Navigation}}

  * "[[Archfiend Matriarch]]", "[[Duke Archfiend]]" and "[[Throne of the Archfiends]]" appear in this card's artwork.
  ** While "Archfiend Matriarch" adulates her newly usurped position on the "Throne of the Archfiends", "Duke Archfiend" is side-eyeing them both, presumably biding his time for his own usurpation.
