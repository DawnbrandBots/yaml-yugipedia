title: Card Trivia:Painful Return
wikitext: |-
  {{Navigation}}

  * "[[Warrior Dai Grepher]]", "[[Dark Lucius LV4]]" and "[[Dark Grepher]]" appear in this artwork.
  ** This card's artwork probably depicts the end of the dark crossroad seen in "[[The Paths of Destiny]]", showing that "Warrior Dai Grepher" is faced with two different paths of evil after having chosen the initial one.
