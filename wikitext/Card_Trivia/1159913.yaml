title: Card Trivia:Gaigustvelgr the Defiant Soulclad Sword
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Advance Pack: Revenge Hearts]]''.
  ** This card and "[[Souffraruda the Defiant Soulclad Scripture]]" are the first cover cards of a ''[[Yu-Gi-Oh! Rush Duel]]'' [[booster pack]] that is not featured in the related anime franchise.
  * This monster is an [[Counterpart|upgraded]] [[Ritual Monster|Ritual]] form of "[[Gaigust the Defiant Soul]]".
