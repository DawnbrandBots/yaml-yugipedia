title: Card Trivia:V Salamander
wikitext: |-
  {{Navigation}}

  * This card appears in the anime artwork of "[[Vain Betrayer]]".
  * This monster is based on a [[wikipedia:Cultural depictions of salamanders|salamander]], a mythological spirit representing the elemental spirit of fire that was introduced by the 16th-century alchemist [[wikipedia:Paracelsus|Paracelsus]].
  * This is the only "[[V (archetype)|V]]" card that was given to [[Yuma Tsukumo]] by [[Vector|Ray Shadows]] and was ever used in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
