title: Card Trivia:Ancient Gear Hunting Hound
wikitext: |-
  {{Navigation}}

  * This is the [[signature card]] of [[Obelisk Force]] in their [[Battle Royal]] Duels in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster has half the [[Level]] (3) and [[equal ATK and DEF]] (1000) of "[[Ancient Gear Beast]]".
  * This monster has four [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] forms, which require this card as [[Fusion Material]].
  ** Two copies: "[[Double Ancient Gear Hunting Hound]]".
  ** Three copies: "[[Triple Ancient Gear Hunting Hound]]".
  ** Three copies and 1 more "[[Ancient Gear]]" monster: "[[Ultimate Ancient Gear Hunting Hound]]".
  ** This monster and its aforementioned upgraded forms ([[Chaos Ancient Gear Giant (anime)|anime version]]): "[[Chaos Ancient Gear Giant]]".
