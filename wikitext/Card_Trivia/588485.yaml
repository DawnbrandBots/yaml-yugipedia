title: Card Trivia:Dingirsu, the Orcust of the Evening Star
wikitext: |-
  {{Navigation}}

  * This monster's spear appears in the artwork of "[[Orcust Crescendo]]".
  * The ruins of "[[Orcustrated Babel]]" appear in the background of this card's artwork.
  * "[[Beckoned by the World Chalice]]" → "[[Ningirsu the World Chalice Warrior]]" → "[[Longirsu, the Orcust Orchestrator]]" → "Dingirsu, the Orcust of the Evening Star" → "[[Girsu, the Orcust Mekk-Knight]]" → "[[Enlilgirsu, the Orcust Mekk-Knight]]"
  ** This monster is the result of "Longirsu, the Orcust Orchestrator" merging with the ruins of the "Orcustrated Babel" and the remnants of his "[[Orcust]]" army in order to defeat "[[Knightmare Incarnation Idlee]]".
  * This card is named after [[wikipedia:Dingir|Dingir]], a Sumerian word for "god", and [[wikipedia:Hesperus|Hesperus the Evening Star]].
  ** This card's Japanese name, "Sheorphegel Dingirsu", is also based on [[wikipedia:Sheol|Sheol]], the Hebrew land of the dead.
  * This card is a counterpart of "[[Mekk-Knight of the Morning Star]]".
  ** This card's ''[[TCG]]'' name, "Evening Star", is the translation of the kanji 「宵星の機神」 (''Shōsei no Kishin'', "Machine God of the Evening Star", but read as ''Shīorufegōru'', "Sheorphegel") in its Japanese name.
