title: Card Trivia:Bug Matrix
wikitext: |-
  {{Navigation}}

  * "[[Digital Bug Centibit]]", "[[Digital Bug Cocoondenser]]", "[[Digital Bug Corebage]]", "[[Digital Bug Rhinosebus]]", "[[Digital Bug Scaradiator]]" and "[[Digital Bug Websolder]]" appears in this card's artwork.
  * This card is based on a [[wikipedia:Motherboard|motherboard]]. Notable components/interfaces mimicked are "Rhinocebus" as the [[wikipedia:Peripheral Component Interconnect|PCI slots]], the wings of "Corebage" as the [[wikipedia:Chipset|chipset]], and "Scaradiator" as the [[wikipedia:CPU Fan|CPU fan]].
