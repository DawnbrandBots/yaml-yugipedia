title: Card Trivia:Duelist Alliance (card)
wikitext: |-
  {{Navigation|Duelist Alliance}}

  * This card's artwork shows [[Yuya's pendant]] drawing among the stars, which is similar to the Japanese title cards of the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This card's name is a reference to the [[Booster Pack]] ''[[Duelist Alliance]]'', the first Booster Pack to include [[Pendulum Monster]]s.
