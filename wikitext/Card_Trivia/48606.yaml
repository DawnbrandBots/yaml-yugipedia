title: Card Trivia:The World Tree
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Eternal Spell]]" and in the [[Card Artworks:Magic Planter|anime artwork]] of "[[Magic Planter]]".
  * This card is based on the concept of the [[wikipedia:World tree|world tree]] in various religions and mythologies (i.e. [[wikipedia:Yggdrasil|Yggdrasil]] in [[wikipedia:Norse mythology|Norse mythology]]), which depicts a colossal tree that connects the [[wikipedia:Heaven|heavens]], the terrestrial world, and the [[wikipedia:Underworld|underworld]] through its roots.
