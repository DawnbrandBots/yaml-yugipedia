title: Card Trivia:Nunu, the Ogdoadic Remnant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ogdoadic Water Lily]]".
  * This monster is based on [[wikipedia:Nu (mythology)|Nu]], one of the eight Egyptian [[wikipedia:Ogdoad (Egyptian)|Ogdoad]].
  * The water lily under this monster is probably the [[wikipedia:Nymphaea nouchali var. caerulea|Egyptian Water-lily]], which, according to [https://www.ucl.ac.uk/museums-static/digitalegypt/religion/deitiescreation.html some] [[wikipedia:Ancient Egyptian creation myths|Ancient Egyptian creation myths]], emerged from the [[wikipedia:Nu|Primordial Waters]] and either bloomed into a [[wikipedia:Solar deity|Sun God]] ([[wikipedia:Ra|Ra]], [[wikipedia:Horus|Horus]] or [[wikipedia:Atum|Atum]]) or a similar creator deity like [[wikipedia:Nefertem|Nefertem]].
