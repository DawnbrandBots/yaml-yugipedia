title: Card Trivia:Synchro Deception
wikitext: |-
  {{Navigation}}

  * The card "[[Stardust Dragon]]" and a [[Synchro Summon]]ing ring from the ''[[Yu-Gi-Oh! 5D's]]'' anime appear in this card's artwork.
  * This card shares some similarities with "[[Revoke Fusion]]".
  ** Both cards share an effect to send an [[Extra Deck]] monster to the [[Graveyard]] and supports monsters that can be used to Summon it.
  ** Both cards were used by the main protagonist of their respective anime series who became reluctant to utilize their series' Summoning methods: This card was used by [[Yusei Fudo]], while "Revoke Fusion" was used by [[Jaden Yuki]].
