title: Card Trivia:Weights & Zenmaisures
wikitext: |-
  {{Navigation}}

  * "[[Wind-Up Bat]]" and "[[Wind-Up Honeybee]]" appear in this card's artwork.
  * "Zenmaisures" in this card's name is a portmanteau of ''Zenmai'', the Japanese name of the "[[Wind-Up]]" [[archetype]], and "measures".
  * This card's Spanish print features a lore typo, as the word "''eli'''g'''e''" ("''choose''") appears as "''eli'''j'''e''".
