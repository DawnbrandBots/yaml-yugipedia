title: Card Trivia:Machina Citadel
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Machiners Command]]''/''[[Structure Deck: Mechanized Madness]]'', and is also one of the cover cards of ''[[Theme Pack: War of Infinite Machine]]''.
  * This monster appears in the artwork of "[[Machina Overdrive]]".
  * This card's Japanese name, "Machiners Colonel" (マシンナーズ・カーネル ''Mashinnāzu Kāneru''), is a pun on "[[wikipedia:Kernel (operating system)|kernel]]" (カーネル ''Kāneru'') and "[[wikipedia:Colonel|colonel]]" (コロネル ''Koroneru'').
  * This monster is an [[Card evolutions|upgraded]] form of "[[Machina Fortress]]".
  ** Fittingly, its name contains "Citadel", which by definition is a stronger fortress.
