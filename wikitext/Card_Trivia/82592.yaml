title: Card Trivia:Allure of Darkness
wikitext: |-
  {{Navigation}}

  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Allure of Darkness]]".
  * This card's artwork is similar to that of "[[Veil of Darkness]]".
  ** Both cards are [[Spell Card]]s that [[support]] [[DARK]] monsters and feature effects that involve [[draw]]ing and removing cards from the [[hand]].
  ** Both cards were originally released as ''[[TCG]]''[[TCG-only|-exclusive]] cards in [[Series 5]] [[Core Booster]] [[Booster pack|packs]].
  * This is the first card featuring a drawing effect to become a [[Special Edition]] promo.
  * This is the first ''TCG''-exclusive card to have its [[status]] restricted in any capacity, followed by "[[Reborn Tengu]]" and "[[Tour Guide From the Underworld]]".
  ** This is the first (and currently only) card to have a [[Semi-Limited]] status in between formats.
