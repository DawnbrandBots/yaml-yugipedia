title: Card Trivia:Earthbound Prison
wikitext: |-
  {{Navigation}}

  * This card's artwork is patterned after the [[wikipedia:Nazca Lines|Nazca Line]] geoglyph, "The Hands".
  * The Japanese pronunciation of this card's name (地縛牢 ''Jibakurō'') is phonetically similar to the pronunciation of "[[Cursed Prison]]" (呪縛牢 ''Jubakurō'').
  * This is the first [[Field Spell Card]] to appear in the ''[[Yu-Gi-Oh! ARC-V]]'' anime that is not an [[Action Card|Action Field]] or a "[[Speed World (series)|Speed World]]" card.
