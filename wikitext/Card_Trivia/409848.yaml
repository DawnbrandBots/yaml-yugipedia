title: Card Trivia:Igknight Reload
wikitext: |-
  {{Navigation}}

  * This card shows "[[Igknight Margrave]]" reloading his weapon.
  ** Ironically, this card doesn't actually need "[[Igknight]]s" to be used.
  * Despite its name being a callback to "[[Reload]]", it functions more like a [[Pendulum Monster]] specific version of "[[Magical Mallet]]".
  * This card is a generic Pendulum version of the "[[Performapal]]" specific Spell, "[[Performapal Recasting]]".
