title: Card Trivia:Quillbolt Hedgehog
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[2-Player Starter Set]]''.
  * This monster appears in the artworks of "[[Speed Spell - Overtune]]", "[[Synchro Fellowship]]", and the second artwork of "[[One for One]]".
  * This monster has a [[retrained]] counterpart: "[[Anchorbolt Hedgehog]]".
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this monster appears in the toolbox in front of the Card Studio screen when it is interacted with and rewards gems in the 5D's world.
