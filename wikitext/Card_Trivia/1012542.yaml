title: Card Trivia:Void Reignition
wikitext: |-
  {{Navigation}}

  * "[[Infernoid Evil]]" and parts of "[[Infernoid Attondel]]" appear in this card's artwork.
  ** This card's artwork depicts "Infernoid Evil" absorbing the remaining power from the corpses of the other "[[Infernoid]]" monsters to become "[[Infernoid Flood]]", as explained by the [[The Valuable Book EX 4 card storylines#No. 11: "Duel_Terminal" World Side Story, Secret Maneuvers in Purgatory|''The Valuable Book EX 4'' card storylines]].
