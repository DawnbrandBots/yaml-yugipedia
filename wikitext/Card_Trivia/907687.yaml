title: Card Trivia:Dogmatikaturgy
wikitext: |-
  {{Navigation}}

  * "[[Despian Quaeritis]]", "[[Dramaturge of Despia]]", "[[Incredible Ecclesia, the Virtuous]]", and "[[The Iris Swordsoul]]" appear in this card's artwork.
  * This card's Japanese name, "Dragmaturgy" (ドラグマトゥルギー ''Doragumaturugī''), is a portmanteau of "Dragma" (ドラグマ ''Doraguma''), the Japanese name of the "[[Dogmatika]]" archetype, and "Dramaturgy" (ドラマトゥルギー ''Doramaturugī''), a reference to "Dramaturge of Despia" and the theatrical theme of the "[[Despia]]" archetype.
