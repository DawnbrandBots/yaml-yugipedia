  * This card's Japanese name, "Handless Fake", references [[Kalin Kessler]]'s Dueling strategy in the ''Yu-Gi-Oh! 5D's'' [[Yu-Gi-Oh! 5D's|anime]] and [[Yu-Gi-Oh! 5D's (manga)|manga]], where it is commonly referred to as his "handless combo".
