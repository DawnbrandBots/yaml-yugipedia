title: Card Trivia:Black Shadow Squall
wikitext: |-
  {{Navigation}}

  * "[[Black-Winged Dragon]]" and [[Crow Hogan]] appear in this card's artwork.
  ** The artwork is based on a scene from {{episode|5D's|095|ref}}, where "Black-Winged Dragon" absorbs the damage that [[Bolton]]'s "[[Blood Mefist]]" was about to inflict to Crow.
  ** This card's name is a reference to the [[attack name]] of "Black-Winged Dragon" ("Noble Stream" in the Japanese version, and "Shadow Squall Blast" in the English version) and the name of its attack-reducing effect ("Black Burst" in Japanese, and "Black Orb Blast" in English).
