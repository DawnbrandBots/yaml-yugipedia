  * The correct answer to this card's question is "[[wikipedia:Staring contest|staring contest]]", as some variations of the game allow the players to make funny gestures in the attempt to make the other laugh.
  ** The correct answer for the dub version of this card's question is "true", in reference to the saying ''Laughter is the best medicine''.
