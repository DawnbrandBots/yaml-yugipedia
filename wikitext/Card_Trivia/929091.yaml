title: Card Trivia:Invincible Demise Lord
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Death (personification)|Grim Reaper]], the personification of death, who is often depicted as a cloaked skeleton with a scythe.
  * This monster represents its owner, [[Lucien Grimley]], who, after repeatedly losing his Duels, makes a deal with [[The Grim Reaper (character)|the spirit]] of the "[[Grim Reaper]]" card to obtain incredible [[draw]] power in exchange for his soul, which reflects this monster's effect to be [[Special Summon]]ed from the [[Graveyard]] after "losing" a battle with an opponent's monster in exchange for increased [[ATK]] and preventing it from being [[destroy]]ed by card effects.
  * This monster's additional ''[[OCG]]''/''[[TCG]]'' effect is designed to facilitate the [[activate|activation]] and effect of "[[Slash Draw]]", a card used by Lucien alongside this monster in {{episode|GX|091|ref}}, which requires the player to [[send]] the top cards of their [[Deck]] to their Graveyard equal to the number of cards the opponent [[control]]s, [[draw]] one card and show it, and then destroy as many cards on the [[field]] and inflict massive damage to the opponent if the drawn card was "Slash Draw".
