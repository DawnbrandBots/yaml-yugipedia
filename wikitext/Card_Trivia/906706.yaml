title: Card Trivia:Ursarctic Quint Charge
wikitext: |-
  {{Navigation}}

  * "[[Ursarctic Polari]]" and "[[Ursarctic Septentrion]]" appear in this card's artwork.
  * This card's name is possibly a reference to the [[wikipedia:Ursa Major Moving Group|Ursa Major Moving Group]], which consist of five of the seven stars of the [[wikipedia:Big Dipper|Big Dipper]] [[wikipedia:Asterism|asterism]], all having proper motions heading towards a common point in [[wikipedia:Sagittarius (constellation)|Sagittarius]].
