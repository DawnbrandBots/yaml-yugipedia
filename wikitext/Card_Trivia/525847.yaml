title: Card Trivia:Tindangle Acute Cerberus
wikitext: |-
  {{Navigation}}

  * This card is the first [[Fiend]] [[Link Monster]].
  * This card's [[Link Arrow]]s form an [[wikipedia:Acute and obtuse triangles|acute triangle]].
  * This monster appears in the artwork of "[[Tindangle Delaunay]]".
  * This card is the first [[TCG]]/[[OCG]] Link Monster to have 0 [[ATK]].
  * This is the [[signature card]] of [[Akira Zaizen]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
