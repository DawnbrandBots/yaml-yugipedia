title: Card Trivia:Update Wyvern
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Accoundra Burns Rage]]".
  * This monster is named after [[wikipedia:Patch (computer)|computer patching]], in which a computer software fixes security vulnerability and bugs through routine updates.
  ** Fittingly, this monster's chest features the software update symbol, which is often depicted as two arrows going in a circle.
