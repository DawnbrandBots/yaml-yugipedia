title: Card Trivia:Dragon of Pride and Soul
wikitext: |-
  {{Navigation}}

  * This monster's theme around the number 25 references the 25th anniversary of the ''[[Yu-Gi-Oh!]]'' ''[[OCG]]''/''[[TCG]]''.
  * This monster is a [[counterpart]] of "[[Blue-Eyes White Dragon]]".
  * This monster has a "[[Dark Magician]]"/"[[Dark Magician Girl]]"-based counterpart: "[[Magicians of Bonds and Unity]]".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Ultimate Dragon of Pride and Soul]]".
