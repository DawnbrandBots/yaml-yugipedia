title: Card Trivia:Millennium Revelation
wikitext: |-
  {{Navigation}}

  * An [[wikipedia:Ankh|ankh]] (from the Japanese artwork of "[[Monster Reborn]]"), two depictions of [[wikipedia:Horus|Horus]], and "[[The Winged Dragon of Ra]]" (as depicted on the [[Tablet of Lost Memories]]) appear in this card's artwork.
  * This card's name is derived from the internal dialogue of [[Dark Marik (manga)|Dark Marik]] in {{chapter|Yu-Gi-Oh!|236|ref}} (as well as [[Yami Marik]]'s in {{episode|Yu-Gi-Oh!|097|ref}}), specifically while he's chanting the third litany for the effect of "[[The Sun Dragon Ra]]", where he simultaneously observes that [[Marik Ishtar (manga)|Marik Ishtar]] never received "the full revelation of the [[Millennium Rod]]", which meant that Marik Ishtar wasn't aware of all the effects of "The Sun Dragon Ra".
  ** This is reflected by this card's effects centered around "Monster Reborn", which Marik Ishtar had assumed would be useless with "Ra", due to his limited knowledge of the Egyptian God's capabilities.
  *** This card's effects also reference how Dark Marik (Yami Marik) frequently [[Special Summon]]ed "The Sun Dragon Ra" from the Graveyard via "[[Monster Reborn (manga)|Monster Reborn]]" in his Duels, and its last effect references how the Egyptian God Cards were only affected by Spell Cards for one turn (resulting in them being sent to the Graveyard during the End Phase, if Special Summoned via "Monster Reborn").
