title: Card Trivia:Princess Cologne (card)
wikitext: |-
  {{Navigation|Princess Cologne}}

  * This monster appears in the artworks of "[[Doll Happiness]]", "[[Doll House]]", "[[Frightfur Parade]]" and "[[Toy Parade]]".
  * This is the [[Monster Card]] counterpart of [[Cologne]], a character featured in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga. This monster is depicted carrying her [[D-Pad]] in its balloon form.
  ** This monster's [[original DEF]] (2200) references how Cologne used "[[No. 22: Zombiestein (manga)|No. 22: Zombiestein]]" in the manga.
  ** This monster's effect to [[support]] "[[Box of Friends]]" is based on how Cologne used "[[Toy Box (ZEXAL manga)|Toy Box]]" in the manga. This, along with this monster's effect to [[Special Summon]] [[Normal Monster]]s, reflects Cologne's Dueling strategy in the manga, which revolves around swarming her [[field]] with the "[[Doll Monster]]s", an [[archetype]] of Normal Monsters.
