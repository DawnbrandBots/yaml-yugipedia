title: Card Trivia:Blackwing - Decay the Ill Wind
wikitext: |-
  {{Navigation}}

  * This monster appears to be based on a [[wikipedia:Red-headed vulture|red-headed vulture]], a species of [[wikipedia:vulture|vulture]], which are known for consuming [[wikipedia:Carrion|carrion]].
  * This monster's Japanese name, "Death the Mourning Wind", reflects its damaging effect and its [[Blackwing - Decay the Ill Wind (anime)|anime effect]] to make the player lose the [[Duel]] if the [[Synchro Monster]] that used this monster as [[Synchro Material]] is [[destroy]]ed.
  ** This monster's ''[[TCG]]'' name and damaging effect is a reference to the process of the [[wikipedia:Decomposition|decaying]] of dead flesh into carrion, where organic matter decomposes into simpler organic or nonorganic material.
  *** This monster's ''TCG'' title is derived from an "ill wind", a term that describes an unfortunate event that usually benefits someone, which is further reflected in this monster's damaging and beneficial [[Level]]-changing effects.
