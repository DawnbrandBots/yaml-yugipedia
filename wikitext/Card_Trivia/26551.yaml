title: Card Trivia:Orichalcos Dexia
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Orichalcos Shunoros]]".
  * This monster's name is based on "''dexia''" (δεξιά), the Greek word for "right", reflecting how this card is the "right arm" of "Orichalcos Shunoros".
