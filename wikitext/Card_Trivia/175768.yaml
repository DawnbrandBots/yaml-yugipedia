title: Card Trivia:Peeking Goblin
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the "[[Goblin of Greed]]" picking a vault door lock with a question mark from a "[[Mokey Mokey]]" to steal a "[[Pot of Greed]]", referencing the events of "[[Dark Factory of Mass Production]]" and relating to an overarching story told through a number of other cards:
  ** "[[Upstart Goblin]]"
  ** "[[Goblin Thief]]"
  ** "[[Jar Robber]]"
  ** "[[Bubble Crash]]"
  ** "[[Goblin Out of the Frying Pan]]"
  ** "[[Good Goblin Housekeeping]]"
  ** "[[Heavy Slump]]"
  ** "[[Second Coin Toss]]"
  ** "[[Dark Factory of Mass Production]]"
  ** "[[Dark Scorpion Combination]]"
  ** "[[Fine]]"
  ** "[[Pollinosis]]"
  * The picture on the bottom left of the artwork is that of "[[Graceful Charity]]", referencing this card's effect (taking three cards and selecting one of them).
  ** Despite the picture of this card being visible, the top part of the angel's head (where the crest of the monitor is at) stops just short of where its halo would have been, making the artwork edit for the TCG redundant.
