title: Card Trivia:Maxvassal Zahhak
wikitext: |-
  {{Navigation}}

  * The first portion of this monster's name is a combination of the words "max" (short for "[[Maximum Monster|Maximum]]") and "vassal".
  ** The second portion of this monster's name is based on [[wikipedia:Zahhak|Zahhak]], an evil figure in [[wikipedia:Persian mythology|Persian mythology]] described as a tyrannical ruler who becomes cursed with snakes growing from his shoulders after being deceived by [[wikipedia:Ahriman|Ahriman]], the embodiment of evil.
