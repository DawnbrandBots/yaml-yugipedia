title: Card Trivia:Conduction Warrior Plasma Magnum
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Conduction Warrior Linear Magnum Plus Minus]]".
  ** This monster's name is derived from [[wikipedia:Plasma (physics)|plasma]], a state of matter formed from superheated, ionized gas that serves as a medium for the flow of electrical currents.
  *** This monster's name features the word "Magnum", which a form of the Latin word "''magnus''", meaning "great" (reflecting its "greater" [[Level]] and [[original ATK and DEF]] stats) and is a pun on the word "magnet" (reflecting its association with the "[[Magnet]]" and "[[Magnet Warrior]]" [[archetype]]s).
  ** Visually, this monster appears to be a [[Fusion Monster|Fusion]] of "Conduction Warrior Linear Magnum Plus Minus" and "[[Plasma Warrior Eitom]]", with its name derived from both monsters, likely in reference to how in {{episode|GX|082|ref}}, "Eitom" was [[Special Summon]]ed by [[Tribute|Tributing]] "[[Conduction Warrior Linear Magnum ± (anime)|Conduction Warrior Linear Magnum ±]]".
  *** However, "Eitom" cannot be used as [[Fusion Material]] for this monster due to it being a [[LIGHT]] [[Thunder]] monster, while this monster's required Fusion Materials are two [[EARTH]] [[Rock]] monsters.
