title: Card Trivia:Elemental HERO Brave Neos
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Elemental HERO Neos]]".
  ** This monster's name is a reference to [[Jaden Yuki]], the owner of "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" in the ''[[Yu-Gi-Oh! GX]]'' anime, whose surname (遊城, ''Yūki'') is phonetically similar to the Japanese word for "courage" (勇気, ''Yūki'').
