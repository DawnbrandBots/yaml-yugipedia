title: Card Trivia:El Shaddoll Shekhinaga
wikitext: |-
  {{Navigation}}

  * According to the ''[[Master Guide 5 card storylines]]'', this monster is "[[El Shaddoll Construct]]" being restrained by both "[[Apoqliphort Towers]]" and the power of the staff of "[[Evilswarm Kerykeion]]" (wielded by "[[Stellarknight Delteros]]").
  ** This card shares the same [[Attribute]] ([[EARTH]]), [[Type]] ([[Machine]]) and [[Level]] (10) as "Apoqliphort Towers".
  *** This card's [[ATK]]/[[DEF]] (2600/3000) are inverted from the ATK/DEF (3000/2600) of "Towers".
  ** Due to the effect of "Towers" making it unaffected by [[Spell]]/[[Trap Card|Traps]], it is very difficult for "Towers" to be used as [[Fusion Material]] for this monster.
  ** This monster's transformation into "[[El Shaddoll Anoyatyllis]]" is depicted in the artwork of "[[Void Vanishment]]".
  * The name of this monster is a portmanteau of ''[[wikipedia:Shekhinah|shekhinah]]'' and ''[[wikipedia:Nāga|nāga]]''.
  ** In [[wikipedia:Kabbalah|Kabbalah]], the ''shekhinah'' is said to be the feminine aspect of the divine presence. ''Shekhinah'' is also identified with the tenth ''[[wikipedia:Sefirot|sefirah]]'', [[wikipedia:Malkuth|Malkuth]].
  *** Malkuth is the corresponding ''sefirah'' of the opposite ''[[wikipedia:Qliphoth|qliphah]]'' represented by "Apoqliphort Towers".
  ** The ''nāga'' is a divine race of half-serpent beings, relating to the serpentine theme of "Evilswarm Kerykeion".
