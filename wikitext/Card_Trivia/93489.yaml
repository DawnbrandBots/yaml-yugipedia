title: Card Trivia:Ojama Red
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Nitwit Outwit]]", "[[Ojama Country]]", "[[Ojama Duo]]" "[[Solidarity]]", and "[[Super Team Buddy Force Unite!]]".
  * This is the only "Ojama" [[Main Deck]] monster to wear clothing along with a bikini bottom, which in this case, is his yellow cape.
  * This card's effect is likely an homage to the ''Super Sentai'' series of television shows, as the Red Ranger is always the leader of the team.
