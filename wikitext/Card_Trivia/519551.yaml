title: Card Trivia:Trickstar Black Catbat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Trickstar Perennial]]" and "[[Trickstar Treat]]".
  * This monster's name is based on the ''[[wikipedia:Tacca chantrieri|Tacca chantrieri]]'', a species of toxic flowering plants that is also known as the "devil flower", "black bat flower", and the "cat's whiskers flower", which appears as the symbols on the corners of this card's artwork.
  ** This monster's Japanese name, "Sweet Devil", is based on the [[wikipedia:Devil|devil]], the personification of evil in various cultures and religious traditions.
