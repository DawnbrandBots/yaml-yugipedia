title: Card Trivia:PenduLuMoon
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] counterpart of "[[LaMoon]]".
  ** This monster's name is a portmanteau of the word "Pendulum" and its original counterpart's name, "LaMoon".
  ** This monster's stats are the ATK and DEF of "LaMoon" subtracted by 1000.
