title: Card Trivia:Miniborrel Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name is likely a reference to a [[wikipedia:Snubnosed revolver|snubnosed revolver]], a revolver with a short-barrel, purpose built for maneuverability (relatively easily summoned from the [[Extra Deck]] and [[GY]]) at the cost of power (low [[ATK]]).
