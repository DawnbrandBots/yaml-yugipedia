title: Card Trivia:Orb of Yasaka
wikitext: |-
  {{Navigation}}

  * The orb in this card's artwork appears in the artworks of "[[Legacy of Yata-Garasu]]" and "[[Yata-Garasu]]".
  * The [[wikipedia:Magatama|Yasakani no Magatama]] is a legendary Japanese item, and is one of the three Imperial Regalia of Japan. The other two are "[[Sword of Kusanagi]]" and "[[Mirror of Yata]]". A ''magatama'' is characteristically a flat and curved jewel, not a spherical one, therefore the English term "orb" is more accurate in this case.
