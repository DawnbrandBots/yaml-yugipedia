title: Card Trivia:Yaksha
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Yaksha|Yaksha]] is the name of a mythological broad class of nature-spirits who are caretakers of natural treasures hidden in the earth and tree roots.
  ** The French name of this card is missing the letter "k", referencing the Japanese version of these mythological creatures.
  * This card has an opposite [[Attribute]], [[ATK]], and [[DEF]] as "[[Rasetsu]]". Furthermore, while "Rasetsu" returns a Monster Card, this card returns a Spell/Trap Card
