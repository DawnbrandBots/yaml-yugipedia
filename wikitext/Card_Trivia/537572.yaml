title: Card Trivia:Ritual Weapon
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]", "[[Paladin of White Dragon]]", and two [[Eye of Anubis|Eyes of Anubis]] appear in this card's artwork.
  * This card has a [[Fusion Monster]]-supporting [[counterpart]]: "[[Fusion Weapon]]".
  ** This card and "Fusion Weapon" are tied for the highest [[ATK]]/[[DEF]] boost without drawbacks of any [[Equip Spell]]s.
  ** Both cards were also used by [[Alexis Rhodes]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
