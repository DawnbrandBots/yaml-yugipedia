title: Card Trivia:Familiar-Possessed - Dharc
wikitext: |-
  {{Navigation}}

  * The advanced form of "[[Meda Bat]]" appears in this card's artwork, depicted as this monster's familiar.
  * This is the first, and so far only, upgraded form of "[[Dharc the Dark Charmer]]".
  * This is the first "[[Familiar-Possessed]]" monster that has another effect than just a [[piercing]] effect.
  * From this card's artwork and the artwork of "Dharc the Dark Charmer", it seems that this monster is missing its right arm.
  * The bolt of blue lightning in this card's artwork appears to be the same one that appears in the artwork of "[[Familiar-Possessed - Lyna]]".
  ** This card's effect to add a [[Level]] [[Level 3 Monster Cards|3]] or [[Level 4 Monster Cards|4]] [[LIGHT]] [[Monster Card|Monster]] from the [[Deck]] to the [[hand]] allows the player to get "[[Lyna the Light Charmer]]" or "[[Familiar-Possessed - Lyna]]".
