title: Card Trivia:Blackwing - Abrolhos the Megaquake
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Abrolhos squall|Abrolhos squall]], a sudden blast of wind near the [[wikipedia:Abrolhos Archipelago|Abrolhos Archipelago]] off the coast of [[wikipedia:Brazil|Brazil]], which typically occurs from the month of May through August.
  * This monster has the highest [[original ATK]] (2600) of all non-Synchro "Blackwing" monsters.
  * This monster, "[[Blackwing - Auster the South Wind]]", and "[[Blackwing - Blizzard the Far North]]" are the only "Blackwing" monsters that cannot be [[Special Summon]]ed.
  * This is the first monster to feature an effect that prevents it from [[destroy]]ing other monsters by battle.
  ** This is one of only two monsters with this property whose [[Type]] is not [[Illusion]], the other being "[[Dragonecro Nethersoul Dragon]]".
