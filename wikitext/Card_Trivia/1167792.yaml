title: Card Trivia:Prohibited Power Patron Portal - Terminus
wikitext: |-
  {{Navigation}}

  * "[[Junora the Power Patron of Tuning]]", "[[Jupiter the Power Patron of Destruction]]", "[[Medius the Pure]]", and "[[Nerva the Power Patron of Creation]]" appear in this card's artwork.
  ** This card's artwork depicts the creation of "[[Vidolium the Unstable Power Patron of Unity]]".
  * This card is named after [[wikipedia:Terminus (god)|Terminus]], the Roman god who protected boundary markers.
