title: Card Trivia:Guardian Angel Joan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[For Our Dreams]]" and "[[Shining Rebirth]]".
  * This monster is based on [[wikipedia:Joan of Arc|Joan of Arc]], a prominent figure in the [[wikipedia:Hundred Years' War|Hundred Years' War]] where she fought as a member of the French army disguised in a soldier's armor, who was captured, tried, and burned at the stake; she would later be canonized as a saint.
  * This monster is a [[retrained]] [[counterpart]] of "[[St. Joan]]".
  * The Spanish name of this card features a typo, as it is printed as "'''A'''ngel Guardián Joan" instead of "'''Á'''ngel Guardián Joan".
