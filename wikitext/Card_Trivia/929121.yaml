title: Card Trivia:Needlkyrie the Celestial Seamstress
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is a portmanteau of the words "needle" (針, ''Hari'') and "valkyrie" (ヴァルキリー, ''Varukirī'').
  * This monster is related to "[[Shearkyrie the Celestial Seamstress]]".
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Level]] (1), and [[Type]] ([[Fairy]]).
  ** Both are based on tools used in [[wikipedia:Sewing|sewing]]: this monster is based on a [[Wikipedia:Sewing needle|sewing needle]], while "Shearkyrie" is based on [[Wikipedia:Scissors|shears]].
  ** This monster can be [[Special Summon]]ed from the [[Graveyard]] by the effect of "Shearkyrie".
