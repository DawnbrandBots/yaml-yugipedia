title: Card Trivia:Pitch-Black Warwolf
wikitext: |-
  {{Navigation}}

  * This monster shares the same [[Level]] (4), [[original ATK and DEF]] (1600/600), and effect with "[[Mirage Dragon]]".
  ** Both were released in the ''[[Rise of Destiny]]'' [[Core Booster|Core Booster pack]].
  ** Both were owned by [[Atticus Rhodes]] in the ''[[Yu-Gi-Oh! GX]]'' anime, with this monster being played by Atticus while free from the control of [[Nightshroud]].
