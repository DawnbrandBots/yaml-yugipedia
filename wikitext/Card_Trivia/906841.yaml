title: Card Trivia:Unauthorized Bootup Device
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Machina Possesstorage]]", "[[Machina Resavenger]]", "[[Machina Ruinforce]]", "[[Machina Unclaspare]]", and "[[Unauthorized Reactivation]]".
  * "[[wiktionary:Malefactor|Malefactor]]" (メイルファクター ''Meirufakutā'') in this card's ''[[OCG]]'' name means "criminal", "felon", or "evildoer".
  ** Fittingly, this monster corrupted the original "[[Machina]]" monsters into their [[DARK]] [[counterpart]]s.
  * In some way, this card could be consider a dark counterpart to "[[Machina Peacekeeper]]" :
  ** Both are [[Union Monster|Union Monsters]].
  ** Both have 500 ATK.
  ** Both have effects that give you another card upon their destruction,"[[Machina Peacekeeper]]" by adding another Union Monster and this card by reviving itself.
  * The kanji 「奇動」 (''Kidō'') in this card's Japanese name is a homophone of 「起動」 (''Kidō'', "Activation"), with 「起」 (''Ki'') being replaced with 「奇」 (''Ki'', "Strange").
