  {{Navigation|M-Warrior #2}}

  * This monster appears in the artworks of "[[Evil‚òÖTwin's Trouble Sunny]]", and "[[Live‚òÜTwin Sunny's Snitch]]".
  ** In the artwork of "Evil‚òÖTwin's Trouble Sunny", this monster appears on a billboard alongside its counterpart, "[[M-Warrior 1|M-Warrior #1]]", as part of a billboard advertisement for "[[Instant Fusion]]".
  *** This is likely related to the fact that the two monsters are the [[Fusion Material]]s for "[[Karbonala Warrior]]", a [[Fusion Monster]] which can be [[Special Summoned]] by the effect of "Instant Fusion".
  * The letter ''M'' in this card's ''TCG'' name stands for ''Magnets''.
  * This card's [[ATK]] (500) and [[DEF]] (1000) are the reversed ATK and DEF of "M-Warrior #2".
  * The Canadian-French prints of this card and "M-Warrior #1" from ''[[Legend of Blue Eyes White Dragon]]'' have their name contain the lowercase letter ''n'' for the [[wikipedia:Numero sign|numero sign]] (n¬∫), instead of the usual uppercase ''N'' (N¬∫).
  ** The Spanish prints of this card and "M-Warrior #2" in ''Legend of Blue Eyes White Dragon'' also uses the numero sign (n¬∫) instead of the usual superscripted [[wikipedia:Number sign|number sign]] (#).
