title: Card Trivia:Receive Ace
wikitext: |-
  {{Navigation|mode=nongame}}

  * The woman in this card's artwork also appears in the artwork of "[[Smash Ace]]".
  * This card is a reference to an [[wikipedia:Ace (tennis)|ace]], a term used in tennis where the serve isn't touched by the receiver and wins the server the point.
  ** Similar to "[[Service Ace]]", this card's effect of inflicting 1500 damage to the opponent is a reference to the scoring system in tennis where the receiver scores 15 points.
