title: Card Trivia:Crimson Blader
wikitext: |-
  {{Navigation}}

  * This monster has an [[Card evolutions|upgraded]] "[[/Assault Mode]]" form: "[[Crimson Blader/Assault Mode]]".
  * This monster has an "[[Exploder Dragonwing]]"-based [[counterpart]]: "[[Crimson Blade Dragon]]".
  * This is the second [[Synchro Monster]] that [[Jack Atlas]] [[Synchro Summon]]ed in the ''[[Yu-Gi-Oh! 5D's]]'' anime whose [[Type]] is not [[Dragon]], the first being "[[Chaos King Archfiend (anime)|Chaos King Archfiend]]".
  ** However, this is the only non-Dragon Synchro Monster that was owned and Summoned by Jack Atlas, as he borrowed "Chaos King Archfiend" from [[Kaz]] in {{episode|5D's|076|ref}}.
