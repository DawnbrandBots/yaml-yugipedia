title: Card Trivia:Ritual of Light and Darkness
wikitext: |-
  {{Navigation}}

  * The staff wielded by "[[Black Chaos the Dark Chaos Magician]]" and the sword wielded by "[[Black Luster Soldier - Soldier of Light and Darkness]]" appear in this card's artwork.
  * This card is a combined [[retrain]]ed counterpart of "[[Black Luster Ritual]]" and "[[Black Magic Ritual]]".
  ** This card's name is a reference to the [[Summon chant]]s of the aforementioned cards' respective corresponding [[Ritual Monster]]s, "[[Black Luster Soldier]]" and "[[Magician of Black Chaos]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], both of which mention the phrase "[[LIGHT|light]] and [[DARK|darkness]]" (光と闇, ''Hikari to yami'').
  * This card features the edited version of "[[Spellbinding Circle (manga)|Spellbinding Circle]]" from the color ''bunkoban'' of the [[Yu-Gi-Oh! (manga)|manga]].
  * This card's [[Ritual of Light and Darkness (series)|associated series]] is mechanically tied by mentioning this card. "Black Chaos the Dark Chaos Magician" and "Black Luster Soldier - Soldier of Light and Darkness" only mention this card in their "[[Summoning_condition#You_can_Ritual_Summon_this_card_with|You can Ritual Summon this card with]]..." text, marking the first time that this text has been gameplay-relevant rather than a helpful reminder.
  ** "[[Corrupted Ritual Records]]" supports [[Ritual Monster]]s by this text as well.
