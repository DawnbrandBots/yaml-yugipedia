title: Card Trivia:A.I. Mine
wikitext: |-
  {{Navigation|mode=nongame}}

  * [[Ai]] and "[[Pot of Greed]]" appear in this card's artwork.
  ** Ai's confused expression towards "Pot of Greed" is a possible reference to how "Pot of Greed" is a meme within the ''Yu-Gi-Oh!'' community. In its many appearances in the anime series, the activation of "Pot of Greed" is often followed by an explanation of its effect, despite its overall simplicity and how often it appears.<ref>{{cite web | url = https://knowyourmeme.com/memes/pot-of-greed | title = Pot of Greed | author = TheAlm | website = Know Your Meme | date = July 19, 2017 | accessdate = June 27, 2024}}</ref>
  *** In the case of this card's appearance in ''[[Yu-Gi-Oh! VRAINS]]'', Ai used this card to draw two cards, further referencing the effect of "Pot of Greed" to draw two cards.

