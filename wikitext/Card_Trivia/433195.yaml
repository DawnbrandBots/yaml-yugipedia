title: Card Trivia:Ehther the Heavenly Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Pantheism of the Monarchs]]" and "[[Restoration of the Monarchs]]".
  ** This monster's silhoutte appears in the artwork of "[[The Prime Monarch]]".
  * This card is named after the [[wikipedia:Greek primordial deities|primordial Greek deity]] [[wikipedia:Aether (mythology)|Aether]], who is the representation of light.
  * This card is the first female "[[Monarch]]" monster.
  * This is the first card released in a [[Structure Deck]] to have a "000" [[Set Number]].
