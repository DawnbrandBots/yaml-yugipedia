title: Card Trivia:Snake-Eye Oak
wikitext: |-
  {{Navigation}}

  * The destroyed remains of this monster appear in the artwork of "[[Sinful Spoils of Doom - Rciela]]".
  * This monster's Japanese name, "Oark", is a portmanteau of "oak" and "orc".
  ** An [[wikipedia:Oak|oak]] is a tree or shrub belonging to the genus ''Quercus'' of the [[wikipedia:Beech|beech family]], which bears acorns as fruit.
  ** An [[wikipedia:Orc|orc]] is a race of humanoid creatures in the fantasy genre that are often depicted ugly, warlike, and evil monsters.
