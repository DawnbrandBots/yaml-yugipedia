title: Card Trivia:Castle of Dark Illusions
wikitext: |-
  {{Navigation}}

  * The kanji 「闇」 (''Yami'') on this monster's front ring translates to "darkness", reflecting its [[DARK]] [[Attribute]].
  * This is one of several monsters whose [[ATK]] or [[DEF]] is [[not divisible by 50]], the others being "[[Number S39: Utopia Prime]]", "[[Sword Arm of Dragon]]", and [[PaniK's monsters]]: "[[Barox]]", "[[Dark Chimera]]", "[[King of Yamimakai]]", and "[[Reaper of the Cards]]".
  * Curiously, despite this monster being used by [[Player Killer of Darkness (manga)|Player Killer of Darkness]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ([[PaniK]] in the [[Yu-Gi-Oh! (anime)|anime]]), in the ''[[OCG]]''/''[[TCG]]'', this monster only [[support]]s [[Zombie]] monsters instead of [[Fiend]] monsters.
