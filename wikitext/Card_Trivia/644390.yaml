title: Card Trivia:Topologina Gatsbee
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Topologina Honeycomb Beehicle]]".
  * This monster's name is a pun on [[wikipedia:Jay Gatsby|Jay Gatsby]], the title character from [[wikipedia:F. Scott Fitzgerald|F. Scott Fitzgerald's]] 1925 novel, ''[[wikipedia:The Great Gatsby|The Great Gatsby]]''.
