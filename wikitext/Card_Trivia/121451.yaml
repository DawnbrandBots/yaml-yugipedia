title: Card Trivia:A/D Changer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Surprise Inspection]]".
  * The English letters "A" and "D" stands for "[[Attack Position|Attack]]" and "[[Defense Position|Defense]]".
  ** The blue flag with the letter "D" references how in the ''[[Yu-Gi-Oh! 5D's]]'' anime, monsters in Defense Position are depicted turning blue.
  ** Interestingly enough, both letters haven't been translated into the other languages' words for "Attack" and "Defense" (i.e. translated in Greek, it would be E (Επίθεση) and A (Άμυνα)).
