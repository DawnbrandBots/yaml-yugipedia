title: 'Card Trivia:Number 31: Embodiment of Punishment'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * The number "31" appears on this monster's right shoulder plate.
  * The Japanese names of this monster ("Abel's Devil") and "[[Number 13: Embodiment of Crime]]" ("Cain's Devil") are based on the Biblical story of [[wikipedia:Cain and Abel|Cain and Abel]], the first and second sons of [[wikipedia:Adam and Eve|Adam and Eve]], where Cain committed the first sin by killing Abel. The opposite position of their numbers further allude to this.
  ** The reference this monster makes to Abel takes on additional meaning in the context of its debut in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga. This monster appeared out of [[Ryoga Kamishiro (manga)|Ryoga "Shark" Kamishiro's]] [[Extra Deck]] after [[Kaito Tenjo (manga)|Kaito Tenjo]] reduced his [[Life Point]]s to below half - in short, Shark played the role of Abel when he was "killed" by Kaito (Cain) during the Duel.
  * The ''[[TCG]]'' names of this monster and "Number 13: Embodiment of Crime" may be derived from the title of the novel "[[wikipedia:Crime and Punishment|Crime and Punishment]]" by [[wikipedia:Fyodor Dostoyevsky|Fyodor Dostoyevsky]].
  ** In particular, this monster's ''TCG'' references God punishing Cain for murdering Abel.
  * Along with "Number 13: Embodiment of Crime", this is one of the few "[[Number]]" monsters in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and manga to not prevent its destruction by battle from non-"Number" monsters.
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|ZEXAL|030|ref}}, specifically from the panel showing [[No. 31: Abel's Doom (manga)|this monster]] being Summoned, albeit with the spiked mace in a different position.
