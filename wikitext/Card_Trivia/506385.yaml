title: Card Trivia:Larvae Moth
wikitext: |-
  {{Navigation}}

  * A similar-looking monster (possibly a younger version of this monster) appears in the artwork of "[[Needlebug Nest]]".
  * This monster has a [[recolored counterpart|recolored]] [[Effect Monster|Effect]] [[counterpart]]: "[[Needle Worm]]".
  * This monster has a ''[[Rush Duel]]'' [[Fusion Monster|Fusion]] counterpart: "[[Pupating Larvae Moth]]".
  * This is one of the few cards to have no 8-digit code on its bottom-left corner.
  * This is the weakest [[Special Summon-only monster]] without any other effect. It is also the weakest evolution of "[[Petit Moth]]" equipped with "[[Cocoon of Evolution]]".
  * The [[Larvae Moth (Bandai)|Bandai]] version of this card is [[Level 1]] and has 600 [[ATK]], whereas the Konami version is [[Level 2]] and has 500 [[ATK]].
  * The Spanish ''[[Metal Raiders]]'' print of this card lists itself and the name of "Petit Moth" as both "Petit Moth" and "Pequeño Moth", while the printed version of said card uses the former.
