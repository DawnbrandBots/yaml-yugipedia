title: Card Trivia:Chrysalis Dolphin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cocoon Party]]".
  * This monster is the "[[Chrysalis]]" form of "[[Neo-Spacian Aqua Dolphin]]".
  ** This is the only "Chrysalis" monster to have a different [[Type]] and  gender than its "[[Neo-Spacian]]" form.
  * This card was the first "Chrysalis" monster to be released.
