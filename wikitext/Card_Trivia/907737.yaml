title: Card Trivia:Despian Tragedy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Loss]]" and "[[Branded Opening]]".
  * This card is named after the [[wikipedia:Tragedy|tragedy]] genre.
  * This monster is based on the [[wikipedia:Sock and buskin|buskin]] (''cothurnus'', in Latin), a boot worn by the actors of a tragedy, in [[wikipedia:Ancient Greece|Ancient Greece]].
