title: Card Trivia:Gouki Finishing Move
wikitext: |-
  {{Navigation}}

  * "[[Gouki The Master Ogre]]" appears in this card's artwork.
  * This card's name is a reference to [[wikipedia:Professional wrestling holds|professional wrestling holds]], techniques performed by wrestlers that are designed to immobilize their opponents or force them into submission, sometimes used as finishing maneuvers.
  ** The attack "[[Gouki The Master Ogre]]" is shown performing in this art is very similar to the ''"Rider Kick"'', the finishing move of [[wikipedia:Kamen Rider|Kamen Rider]]. Kamen Rider is a masked fighter with a grasshopper design on his helmet, a motif element shared with several Main Deck "[[Gouki]]" monsters.
