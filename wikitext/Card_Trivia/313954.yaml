title: Card Trivia:Hidden Fangs of Revenge
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" appears in this card's artwork.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', [[Reginald "Shark" Kastle (Duel Links)|Reginald "Shark" Kastle]] refers to this card as "Secret Retaliation" in his English quotes (both in audio and text). This is likely due to the fact that Shark debuted in ''Duel Links'' in October 2020, after this card's Japanese release in the ''OCG'', but before its English release in the ''TCG''.
