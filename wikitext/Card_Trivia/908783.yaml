title: Card Trivia:Exosister Gibrine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Exosister Carpedivem]]".
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Exosister Irene]]".
  ** This card's name, "Gibrine", is a combination of "[[wikipedia:Jibril|Jibril]]" and "Irene".
  ** This card is the only "[[Exosister]]" Xyz Monster to not have 2000 more [[ATK]] than its [[Main Deck]] form.
