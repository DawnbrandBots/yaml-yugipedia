title: Card Trivia:Noh-P.U.N.K. Ogre Dance
wikitext: |-
  {{Navigation}}

  * This monster is "[[Noh-P.U.N.K. Ze Amin]]" wearing different clothing.
  * This card is named after [[wikipedia:Noh|Noh]], a major form of classical Japanese dance-drama that has been performed since the 14th century.
  * This monster is based on the ''Three Ogresses'' (三鬼女), a trio of nōgaku plays that features demonic women as main characters.
  ** The three nōgaku plays are ''Lady Aoi'' (葵上), ''Black Mound'' (黒塚), and ''Dōjō Temple'' (道成寺).
  ** All three plays are known to utilize ''[[wikipedia:Hannya|hannya]]'' masks.
  *** Fittingly, the demonic spirit that appears in the background of this card's artwork wears a similar mask.
  * "Number" (ナンバー ''Nanbā'') in this card's Japanese name refers to a musical [[wikipedia:Number (music)|number]].
