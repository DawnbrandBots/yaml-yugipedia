title: Card Trivia:Destiny HERO - Dynatag
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: Destiny Soldiers]]''/''[[Destiny Soldiers]]''.
  * This monster appears in the artworks of "[[D-Doom Dance]]" and "[[D-Soul Burst]]".
  * This monster is based on the English wrestler, [[wikipedia:Dynamite Kid|Dynamite Kid]], keeping in relation with the European theme of the "[[Destiny HERO]]" archetype.
  ** This monster's effect to [[send]] itself from the [[hand]] to the [[Graveyard]] during damage calculation and inflict damage to each player is a reference to one of Dynamite Kid's signature moves, [[wikipedia:Professional wrestling aerial techniques|Diving Headbutt]], which has been diagnosed as a likely cause to Dynamite Kid's spinal paralysis.
