title: Card Trivia:Element Valkyrie
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Valkyrie|valkyrie]], a host of female figures and handmaidens of [[wikipedia:Odin|Odin]] in Norse mythology, who chooses those destined to be slain in battle.
  ** Due to this monster's Japanese name, it is not a part of the "[[Valkyrie]]" [[archetype]].
  * Like the other members of the [[Element]] series, this monster and the background of its card artwork each depict their respective color scheme and environment which corresponds with the [[Attribute]]s mentioned in its effect. In this case, the listed Attributes are [[FIRE]] and [[WATER]].
  ** This monster's appearance consists of red hair, a red right eye, and red clothing (FIRE) and a blue left eye, a set of blue armor, and a blue cape (WATER). It is also depicted wielding a pole arm weapon with a flaming staff on one end and a blade covered with water on the other end.
  ** The background of this card's artwork depicts a set of three erupting volcanoes shooting geysers of lava into the air (FIRE) and a large body of water underneath this monster (WATER).
