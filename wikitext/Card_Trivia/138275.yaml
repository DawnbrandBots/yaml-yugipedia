title: Card Trivia:Second Booster
wikitext: |-
  {{Navigation}}

  * This card's artwork represents the [[wikipedia:SR-71 Blackbird|SR-71 Blackbird]] spy jet. Its effect represents the SR-71's ability to "power up" it's allies by providing them with [[ATK]] (or in the jet's case, hard to obtain information).
  * This monster appears in the artwork of "[[Magnetic Storm]]".
  * Pertaining to the ''[[Yu-Gi-Oh! 5D's]]'' anime, this card's name is likely a reference to this card being the second monster [[Yusei Fudo]] used that has the word "Booster" in its name--the first such monster being "[[Turbo Booster]]".
