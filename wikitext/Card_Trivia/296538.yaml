title: Card Trivia:Terrene Toothed Tsuchinoko
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ferret Flames]]".
  * This monster is based on the [[wikipedia:Tsuchinoko|tsuchinoko]], a legendary snake-like cryptid from Japan. Its name reads as "tsuchinoko", but instead of its usual writing (槌の子 - "hammer's child"), it is written as 土地鋸 ("land saw").
