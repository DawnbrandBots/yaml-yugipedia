title: Card Trivia:Bite Bug
wikitext: |-
  {{Navigation}}

  * This card's artwork and Japanese name are references to [[wikipedia:Pac-Man|Pac-Man]].
  * This card's English name is based on its second effect that activates after it [[Special Summon]]s itself via its first effect, which allows it to take a "bite" out of the [[ATK]] of an opponent's monster.
