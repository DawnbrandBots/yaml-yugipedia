title: Card Trivia:Diana the Light Spirit
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Diana (mythology)|Diana]], the Roman Goddess of the Hunt, the Moon, and Nature.
  * This card is the [[LIGHT]] [[counterpart]] of "[[Luna the Dark Spirit]]": both monsters have the same [[Level]]s, opposite [[Attribute]]s, opposite effects, mirrored poses, and are named after the same Roman goddess of the moon.
  ** This card also has 4 other [[Attribute Spirit]] [[counterpart]]s:
  *** [[WATER]]: "[[Aqua Spirit]]"
  *** [[FIRE]]: "[[Spirit of Flames]]"
  *** [[EARTH]]: "[[The Rock Spirit]]"
  *** [[WIND]]: "[[Garuda the Wind Spirit]]"
