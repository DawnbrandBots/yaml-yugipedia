title: Card Trivia:Triangle Warrior
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Triangle|triangle]], a geometrical polygon with three sides.
  ** This monster's interior angles are 60 degrees each, making it an [[wikipedia:Equilateral triangle|equilateral triangle]].
  ** This monster's effect to [[Special Summon]] "[[Triangle Token]]s" would feature a total of '''three''' triangle-themed monsters on the [[field]].
  * Ironically, the "Triangle Tokens" Special Summoned by this monster's effect have twice the [[ATK]] (1200) of this card (600), and all have the same [[DEF]] (1200).
