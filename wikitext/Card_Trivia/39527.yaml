title: Card Trivia:Hyper Hammerhead
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Lost World]]".
  * This monster's fossilized remains appear in the artwork of "[[Fossil Excavation]]".
  * This card's name reflects appearance of this monster's head; its "nose" resembles a hammer's head hitter and the spikes at the back of this monster's head resemble the hammer's "claw" (the part that removes hammered-in objects).
