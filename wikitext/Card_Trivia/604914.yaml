title: Card Trivia:Elborz, the Sacred Lands of Simorgh
wikitext: |-
  {{Navigation}}

  * "[[Simorgh, Lord of the Storm]]" appears in this card's artwork.
  * This card is named after [[wikipedia:Alborz|Alborz]], a mountain range in [[wikipedia:Iran|Iran]].
  ** This is fitting, as [[wikipedia:Simurgh|Simurgh]] originates in [[wikipedia:Iranian mythology|Iranian mythology]].
