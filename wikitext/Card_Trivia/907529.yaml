title: Card Trivia:Attron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Transmigration of Curiosity]]".
  * This monster's name is based on the ''[[wikipedia:Atto-|Atto-]]'', a [[wikipedia:Metric prefix|metric prefix]] meaning 10^−18.
  * Similar to the other "[[Tron (series)|tron]]" monsters used by [[Nail Saionji]], the number of leaves on this monster's head is the same as its [[Level]].
