title: Card Trivia:Bonfire
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * The bonfire in this card's artwork appears in the artwork of "[[Dyna Mondo]]".
  * This card's Japanese name (篝火, ''Kagaribi'') refers to a bonfire built inside an iron basket, which is depicted in its artwork.
