title: Card Trivia:Rose Bell of Revelation
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] 1 [[Plant]] [[monster]] with 2400 or more [[ATK]] from your hand, is based on the usage of the effect of the [[Spell Card]] "[[Cards from the Blessed Grass]]" in the Yu-Gi-Oh! 5D's chapter 12: "[[Yu-Gi-Oh! 5D's - Ride 012|Psychic Duelists!!]]". In this chapter, [[Akiza Izinski (manga)|Akiza Izinski]] uses the Spell to [[Tribute Summon]] "[[Queen Angel of Roses]]", after she [[add]]ed it to her hand with the effect of "Rose Bell of Revelation".
