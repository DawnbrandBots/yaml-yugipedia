title: Card Trivia:Gouki Face Turn
wikitext: |-
  {{Navigation}}

  * "[[Gouki The Great Ogre]]" and "[[Gouki Dark Mask]]"  appear in this card's artwork.
  * This card is named after a [[wikipedia:Glossary of professional wrestling terms#turn|face turn]], a term used in [[wikipedia:Professional wrestling|professional wrestling]] to define a wrestler's turn in alignment.
  ** This card's artwork depicts "The Great Ogre" throwing away his mask and revealing his identity, whose head is shaped similarly to its owner, [[George Gore]]. 
  *** Fittingly, in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, when George Gore [[activate]]d "Gouki Dark Mask", he donned a mask and assumed the heel identity "Grim Gore" during his Duel against [[Dr. Genome]]. In {{episode|VRAINS|24|ref}}, Gore used this card to [[destroy]] "Gouki Dark Mask", which in turn, destroyed his mask, representing his face turn.
