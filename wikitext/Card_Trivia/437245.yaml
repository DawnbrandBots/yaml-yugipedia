title: Card Trivia:Earthbound Beginnings
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The [[wikipedia:Nazca Lines|Nazca Line]] geoglyph of the Hummingbird appears in this card's artwork.
  * This card's activation condition is similar to that of "[[Offering to the Immortals]]", a card that supports the "[[Earthbound Immortal]]" [[archetype]]. This card's effect is also capable of supporting the "Earthbound Immortal" archetype indirectly, as their monsters require a [[Field Spell Card]] to be on the field.
  ** This is significant, as it reinforces the idea that the "[[Earthbound]]" cards used by [[Sergey Volkov]] (the Duelist that used this card in the ''[[Yu-Gi-Oh! ARC-V]]'' anime) reference the "Earthbound Immortal" monsters in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
