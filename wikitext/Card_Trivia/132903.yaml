title: Card Trivia:Meklord Fortress
wikitext: |-
  {{Navigation}}

  * This fortress appears in the artwork of "[[Reboot]]".
  * This card's artwork depicts the fortress being situated in the center of a highway resembling the [[Daedalus Bridge]], a setting in the ''[[Yu-Gi-Oh! 5D's]]'' anime. Also, the vertical rings in this card's artwork resemble the ''5D's'' version of the [[Synchro Summon]]ing rings, which reflects this card's anti-[[Synchro Monster|Synchro]] effect.
