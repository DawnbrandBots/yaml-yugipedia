title: Card Trivia:Gravelstorm
wikitext: |-
  {{Navigation}}

  * This card has the same targets as "[[Double Cyclone]]", but this card returns the selected Spell/Trap Cards to the owners' hands while Double Cyclone [[destroy]]s them.
  * The Japanese pronunciation of this card's name is a play on "hurricane".
  * This card is a weaker version of "[[Giant Trunade]]".
