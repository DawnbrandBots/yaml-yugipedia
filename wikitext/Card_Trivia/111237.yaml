title: Card Trivia:Spell Sanctuary
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's effect to allow the player to [[activate]] [[Spell Card]]s during the opponent's turn references the "[[Battle City Rules|Super Expert]]" rules during the [[Battle City]] tournament in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, which allowed the players to [[activate]] a [[Set]] Spell Card during their opponent's turn.
