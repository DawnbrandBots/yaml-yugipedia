title: Card Trivia:Masked HERO Anki
wikitext: |-
  {{Navigation}}

  * This monster is based on the archetypal black Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[DARK]], which is represented by a dark-colored circle.
  * This monster's pose references the ''"Rider Kick"'', a signature finishing move of multiple protagonists across the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' series.
  * This monster is tied with "[[Masked HERO Dian]]" for the highest [[original ATK]] (2800) of all "Masked HERO" monsters.
