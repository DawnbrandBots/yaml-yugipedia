title: Card Trivia:Burst Return
wikitext: |-
  {{Navigation}}

  * An angry "[[Elemental HERO Burstinatrix]]" appears in this card's artwork.
  ** In {{episode|GX|020|ref}}, after [[Jaden Yuki]] [[activate]]s this card, "[[Elemental Hero Burstinatrix (anime)|Elemental Hero Burstinatrix]]" angrily berates "[[Elemental Hero Avian (anime)|Avian]]" and "[[Elemental Hero Sparkman (anime)|Sparkman]]" upon catching them with "[[Maiden in Love (anime)|Maiden in Love]]".
  *** In the English dub specifically, she threatens to report "Sparkman's" shenanigans to one "Sparklady", this being the supposed character's only appearance albeit mentioned.
