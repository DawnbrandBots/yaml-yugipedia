title: Card Trivia:Trance Archfiend
wikitext: |-
  {{Navigation}}

  * "[[Genex Ally Birdman]]" and "[[Dimensional Fissure]]" appear in this card's artwork.
  * The card's artwork reflects its effect; it can add a [[Banish|banished]] [[DARK]] monster back to your hand, like "Genex Ally Birdman" (which can be banished by its own effect, or by the "Dimensional Fissure" pictured).
