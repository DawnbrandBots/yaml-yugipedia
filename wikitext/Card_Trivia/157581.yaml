  * This card's name is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Fool (Tarot card)|The Fool]].
  ** This card's effect to reduce [[battle damage]] to 0 is based on how The Fool is typically un-numbered or sometimes numbered as 0.
