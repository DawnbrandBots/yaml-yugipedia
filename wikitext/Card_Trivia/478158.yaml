title: Card Trivia:Master Spirit Tech Force - Pendulum Ruler
wikitext: |-
  {{Navigation}}

  * This is the first [[Fusion Pendulum Monster]] and the first [[Level 12]] [[Pendulum Monster]] that debuted in the "[[Yu-Gi-Oh! ARC-V]]" anime.
  ** It is also the first [[Extra Deck]] [[Pendulum Monster]] to be used by someone other than [[Yuya Sakaki]] in the anime (in this case, being [[Leo Akaba]]).
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[destroy]] an opponent's card twice per turn and inflict 1600 damage to them is an alteration of its effect in the anime, which allows the player to [[Tribute]] a "[[Spirit Gem]]" monster and apply that monster's effect up to twice and double any effect damage inflicted by this effect. In {{episode|Yu-Gi-Oh! ARC-V|129|ref}}, Leo used this monster's effect to Tribute "[[Spirit Gem - Silpheed Core]]", whose effect can destroy an opponent's [[Spell]]/[[Trap Card]] and inflict 800 damage to them, and applied it twice to destroy one Spell/Trap controlled by both [[Declan Akaba]] and [[Yuya Sakaki]], and inflict 1600 damage total to each player.
  ** This monster's ''OCG''/''TCG'' effect to destroy any opponent's card, not just Spell/Trap Cards, also incorporates the effect of "[[Spirit Gem - Salamander Core]]", whose effect could instead destroy an opponent's monster and inflict 800 damage to them.
