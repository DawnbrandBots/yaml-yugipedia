title: Card Trivia:Hi-Speedroid Rubber Band Shooter
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Rubber band gun|rubber band gun]], a toy gun used to shoot rubber bands.
  ** This monster's Japanese name, "GOM Gun" ({{Ruby|Ｇ|ジー}}{{Ruby|Ｏ|オー}}{{Ruby|Ｍ|エム}}ガン, ''Jī Ō Emu Gan''), is also a pun on "''gomu''" (ゴム), the Japanese word for "rubber".
