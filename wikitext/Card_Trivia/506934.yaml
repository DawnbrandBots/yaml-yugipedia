title: Card Trivia:Victory Dragon
wikitext: |-
  {{Navigation}}

  * A four-headed version of this monster appears in the artwork of "[[Victoria]]".
  * This was the [[Yu-Gi-Oh! World Championship prize cards|prize card]] from the first [[Yu-Gi-Oh! World Championship 2003|''Yu-Gi-Oh!'' World Championship]] held in 2003.
  * This is the first [[Match winner]] to be released, as well as the only Match winner that is not [[Illegal]] (instead being [[Forbidden]]).
  ** This is also the first [[DARK]] Match winner, as well as the first [[Dragon]] Match winner.
