title: Card Trivia:Hecahands Dandalos
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a combined [[Fusion Monster|Fusion]] form of "[[Hecahands Gaigas]]" and "[[Hecahands Godos]]".
  * This monster is named after [[wikipedia:Tantalus|Tantalus]], a Greek mythological figure famous for his punishment in [[wikipedia:Tartarus|Tartarus]].
