title: Card Trivia:Gabrion, the Timelord
wikitext: |-
  {{Navigation}}

  * This monster is named after the Judaic archangel, [[wikipedia:Gabriel (archangel)|Gabriel]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Gabriel is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Yesod|Yesod]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Yesod is the ninth of the ten Sefira of the Tree of Life, and this was the ninth "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
