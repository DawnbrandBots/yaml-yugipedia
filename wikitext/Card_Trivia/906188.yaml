title: Card Trivia:Dark Beckoning Beast
wikitext: |-
  {{Navigation}}

  * This monster is a physical amalgam of the three "[[Sacred Beast]]s", including the head and wings of "[[Hamon, Lord of Striking Thunder]]", the torso and legs of "[[Uria, Lord of Searing Flames]]", and the tail of "[[Raviel, Lord of Phantasms]]".
