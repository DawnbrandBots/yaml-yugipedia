title: Card Trivia:Malefic Truth Dragon
wikitext: |-
  {{Navigation}}

  * This monster appearances in the artwork of "[[Malefic Paradigm Shift]]".
  ** This monster's ''[[OCG]]''/''[[TCG]]'' [[Special Summon]]ing effect is based on the effect of "Malefic Paradigm Shift", which allows the player to pay half their [[Life Point]]s to Special Summon it after a  "[[Malefic]]" monster (other than this monster) is [[destroy]]ed by the opponent.
  * This monster's Japanese name, "Sin Truth Dragon" ({{Ruby|Ｓｉｎ|シン}} トゥルース・ドラゴン, ''Shin Turūsu Doragon'') initially appears redundant, since the Japanese name of the "Malefic" [[archetype]], "Sin" (シン, ''shin'') shares a similar pronunciation with the Japanese word for "true" (真, ''shin''); however, [[Kazuki Takahashi]] has stated that the word ''shin'' is intended as a pun on the Japanese words for "sin" and "truth".
  ** This monster's ''TCG'' name likely refers to the truth of malignant forces capable of causing harm and destruction. This references how [[Paradox]], this monster's owner, is revealed to be a survivor of the [[Meklord Emperor Genocide]], which caused the extinction of humanity and destroyed the world in the future in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This is the only "Malefic" monster that does not have a black-and-white color scheme.
  * This monster's relationship with "[[Malefic Paradox Dragon]]" references the nature of a [[wikipedia:Paradox|paradox]], a statement that appears to be impossible but also likely true.
  ** Both are the only draconic "Malefic" monsters that do not feature black-and-white armor in their designs.
  ** Both monsters' color schemes are based on the design of their owner, Paradox; this monster's golden color scheme is based on Paradox's hair, while "Malefic Paradox Dragon's" black-and-white color scheme is based on his mask.
  ** In ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'', when "[[Malefic Paradox Dragon (anime)|Malefic Paradox Dragon]]" was [[destroy]]ed, it allowed Paradox to [[activate]] "Malefic Paradigm Shift" to Special Summon [[Malefic Truth Dragon (anime)|this monster]]. This references how a paradox (the state that appears impossible but is also likely true) undergoes the process of a [[Wikipedia:Paradigm shift|paradigm shift]] (the shift of a commonly-held belief to a new belief by mass consensus), which is then changed into the truth.
  *** This monster's design also references the concept of a paradigm shift as well, which appears to be the shifted design of "Malefic Paradox Dragon": Its head and its wings appear to be upside-down as opposed to being right-side up, its feet appear backward as opposed to forward, and its tail appears from its back as opposed to its thigh area.
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) and [[original DEF]] (5000, tied with [[5000 DEF Monster Cards|other monsters]]) of all [[legal]] monsters in the ''OCG''/''TCG''.
  * In the anime, this monster's cry is similar to that of "[[Slifer the Sky Dragon (anime)|Slifer the Sky Dragon]]".
  * This is the [[signature card]] of Paradox in the ''Yu-Gi-Oh! 3D Bonds Beyond Time'' movie.
