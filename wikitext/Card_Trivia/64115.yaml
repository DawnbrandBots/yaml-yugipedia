title: Card Trivia:EN Shuffle
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Avian]]" and "[[Neo-Spacian Aqua Dolphin]]" appear in this card's artwork.
  ** Both cards were the first "[[Elemental HERO]]" and "[[Neo-Spacian]]" monsters to appear in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * The initials "EN" references both the "Elemental HERO" and "Neo-Spacian" [[archetype]]s.
  * This card's anime effect to [[return]] an "Elemental HERO" monster to the [[Deck]] and [[Special Summon]] a "Neo-Spacian" monster from the Deck with its effects [[negate]]d is similar to the first effect of "[[Cross Change]]", but the monsters must have a [[Level]] equal to the returned monster's. Fittingly, both "Elemental HERO Avian" and "Neo-Spacian Aqua Dolphin" also appear in the artwork of both cards.
  * In the Latin American Spanish dub, this card was mistranslated as "'''E y Barajo'''" ''(lit. "'''E and I Shuffle'''")'', understanding the "N" in this card's name as '''"and"'''.
