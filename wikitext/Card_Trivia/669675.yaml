title: Card Trivia:Jack-o-Bolan
wikitext: |-
  {{Navigation}}

  * "[[Pumpking the King of Ghosts]]" appears in this card's artwork, as part of this monster's body.
  * This monster is based on a [[wikipedia:Jack-o'-lantern|jack-o'-lantern]], a carved lantern most commonly made from a hollowed-out pumpkin and is greatly associated with [[wikipedia:Halloween|Halloween]]. Fittingly, this monster was released in the Japanese release of ''[[Ignition Assault]]'' in October 12th, 2019.
