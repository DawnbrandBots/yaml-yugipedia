title: Card Trivia:Neiroy, the Dream Mirror Disciple
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Oneiros|Oneiroi]], the personifications of dreams in [[wikipedia:Greek mythology|Greek mythology]].
  * This monster has a [[DARK]] [[counterpart]]: "[[Neiroy, the Dream Mirror Traitor]]".
  ** Both have the same [[Level]] (3) and [[ATK]]/[[DEF]] (1000/1000), but opposite [[Attribute]]s and [[Type]]s ([[Fairy]] and [[Fiend]]).
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Oneiros, the Dream Mirror Erlking]]".
