title: Card Trivia:Odd-Eyes Rebellion Xyz Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Monstrous Revenge]]'' and ''[[Essential Selection 01]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Pendulum Monster|Xyz Pendulum]] form of "[[Odd-Eyes Pendulum Dragon]]" and "[[Arc Rebellion Xyz Dragon]]".
  ** This monster's Japanese title, "Supreme King Black Dragon", references the black card frame of [[Xyz Monster]]s.
  ** This monster is an "[[Xyz Dragon]]" [[counterpart]] of "[[Odd-Eyes Rebellion Dragon]]".
  * This is the first "[[Odd-Eyes]]" Extra Deck Pendulum Monster that can be Summoned by the effect of "[[Soul of the Supreme King]]".
