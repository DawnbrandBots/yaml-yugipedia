title: Card Trivia:Gem-Knight Lapis
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zefra Providence]]".
  ** According to the ''[[Master Guide 5 card storylines]]'', the soul of "Lapis" ("[[Shaddoll Construct]]") was trapped inside one of the vacuum tubes of the "[[Infernoid]]s", while her soulless body was reborn as "[[El Shaddoll Construct]]".
  *** After most of her life energy was corrupted, her soul was reborn as "[[Darktellarknight Batlamyus]]".
  * This monster is named after [[wikipedia:Lapis lazuli|lapis lazuli]], a semi-precious mineral known for its deep-blue pigment.
  ** The rocks scattered around this monster in the card's artwork are [[wikipedia:Pyrite|pyrite]], an inclusion commonly found in lapis lazuli.
  * This monster is the twin sister of "[[Gem-Knight Lazuli]]". The 'Pyroxene' (the crystal within their chest) went to "Lapis" when they split up after birth, leaving "Lazuli" as the only "[[Gem-Knight]]" without a 'Pyroxene'.
  ** Both of them are named after lapis lazuli.
  ** This monster is a [[Normal Monster]] while "Lazuli" is an [[Effect Monster]].
  ** Both of them have upgraded "[[tellarknight]]" forms of opposing [[Attribute]]s ([[DARK]]/[[LIGHT]]).
  * This monster has a retrained counterpart: "[[Gem-Knight Nepyrim]]".
