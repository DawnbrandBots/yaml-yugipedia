title: Card Trivia:Formula Synchron
wikitext: |-
  {{Navigation}}

  * This monster's design is based on a [[wikipedia:Formula One car|Formula One racecar]].
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, [[Formula Synchron (anime)|this card]] is the second [[Tuner Synchro Monster]] to appear after "[[T.G. Wonder Magician (anime)|T.G. Wonder Magician]]"; in the ''[[OCG]]'' and ''[[TCG]]'', the order is reversed, with this card being released first and "[[T.G. Wonder Magician]]" being released second.
  * This is the first [[Level 2]] [[Synchro Monster]].
  * This monster could be an [[Card evolutions|upgraded]] version of "[[Turbo Synchron]]".
  ** Both cards are based on a racecar, and "Turbo Synchron" is a "[[Synchron]]" monster whose Level is low enough to be used as a [[Synchro Material]] for the [[Synchro Summon]] of this card, along with "[[Changer Synchron]]" and "[[Mono Synchron]]"; the effect of "Mono Synchron" can easily [[Summon]] this card.
  ** This monster could also be the combined form of "Turbo Synchron" and "[[Tuningware]]"; both are [[Machine]] monsters, and this card's [[ATK]] is the combined total of the two (100 + 100 = 200), and its [[DEF]] is the product of one card's DEF multiplied by the first number of the other monster's DEF (300 x 5 or 500 x 3 = 1500). This card also shares the effect of "Tuningware" to [[draw a card]].
