title: Card Trivia:Red Nova (card)
wikitext: |-
  {{Navigation|Red Nova}}

  * This card may be a "[[Red Dragon Archfiend (archetype)|Red Dragon Archfiend]]" [[counterpart]] to "[[Stardust Xiaolong]]".
  ** This card has an effect that can [[Special Summon]] itself from the [[hand]] if a [[Level]] 8 or higher [[Dragon]] [[Synchro Monster]] is on the field, which includes "[[Red Dragon Archfiend]]"; "Stardust Xiaolong" has an effect that can [[Special Summon]] itself from the Graveyard when "[[Stardust Dragon]]" is [[Synchro Summon]]ed.
  ** Both cards are [[Level]] 1, and are used by [[Jack Atlas]] and his rival [[Yusei Fudo]] respectively in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This card shares its name with [[Red Nova]], and fittingly can be used to Summon "[[Red Nova Dragon]]".
