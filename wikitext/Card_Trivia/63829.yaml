title: Card Trivia:Disgraceful Charity
wikitext: |-
  {{Navigation|mode=nonGame}}

  * A recolored "[[Darklord Marie]]" (using her appearance from her Japanese card artwork) appears in this card's artwork.
  * This card is an [[anime-only|anime-exclusive]] [[Trap Card]] [[counterpart]] of "[[Graceful Charity]]".
  ** Fittingly, this card's effect is designed to counter the effects of "Graceful Charity", which can [[add]] the two [[discard]]ed cards from the player's [[Graveyard]] to their [[hand]].
  * This is one of multiple anime-exclusive cards to have appeared in two different ''Yu-Gi-Oh!'' anime series, the others being "[[Baggy Pants Lavasaurus]]", "[[Defense Wall]]", "[[Magnet Chameleon]]", "[[Offensive Guard]]", and "[[Pompadour Blizzardon]]".
  * When this card appears in the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'', it uses the old card layout from the first ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime series.
  * In the Brazilian Portuguese dubbed version of the ''Yu-Gi-Oh!'' anime, this card's name is incorrectly translated as "''Misericórdia Maldita''" (meaning "Damned Mercy"); however, in the Brazilian Portuguese dubbed version of the ''Yu-Gi-Oh! GX'' anime, this card is correctly translated as "''Caridade Vergonhosa''".
