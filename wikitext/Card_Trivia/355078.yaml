title: Card Trivia:Super Soldier Ritual
wikitext: |-
  {{Navigation}}

  [[File:BlackLusterRitual-JP-Manga-DM-NC.png|thumb|right|250px|"[[Gaia The Fierce Knight]]" during "[[Black Luster Ritual (manga)|Black Luster Ritual]]" with "[[Kuriboh (manga)|Kuriboh]]" and "[[Griffore (manga)|Griffore]]" offering as Tributes in the manga]]

  * "[[Gaia The Fierce Knight]]", "[[Griffore]]", "[[Kuriboh]]", two arrays of "[[Dark Magical Circle]]" (one of which is reversed), and the ceremonial rods from the artwork of "[[Black Magic Ritual]]" appear in this card's artwork.
  ** This card's artwork is based on a panel from {{chapter|Yu-Gi-Oh!|118|ref}}, where [[Dark Yugi (manga)|Dark Yugi]] offered "[[Kuriboh (manga)|Kuriboh]]", "[[Griffore (manga)|Griffore]]", and "[[Gaia the Fierce Knight (manga)|Gaia the Fierce Knight]]" as [[Tribute]]s with "[[Black Luster Ritual (manga)|Black Luster Ritual]]" to [[Ritual Summon]] "[[Black Luster Soldier (manga)|Black Luster Soldier]]", during his [[Duel]] against [[Mai Kujaku (manga)|Mai Kujaku]].
  ** Ironically, in the ''[[OCG]]''/''[[TCG]]'', a [[Ritual Monster]] cannot be Summoned with this card and the aforementioned monsters, (without first changing their [[Level]]s with an effect), as the total Level of the three monsters is 12, and this card's effect requires the total Levels of the Tributes to be exactly 8.

