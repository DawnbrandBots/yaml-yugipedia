title: Card Trivia:Geargiattacker
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Duelist Set: Version Machine-Gear Troopers]]'' (Japanese version).
  * "[[Geargiano Mk-III]]" appears in this card's artwork (flying inside the jet).
  * The number ''04'' is displayed on the tail of the jet.
  ** The number represents that this card is the 4th released Level 4 "[[Geargia]]" monster.
