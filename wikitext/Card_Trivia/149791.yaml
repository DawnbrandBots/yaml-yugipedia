title: Card Trivia:Genex Spare
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fabled Topi]]" (only its head, being held by that monster), "[[Genex Doctor]]", "[[Evilswarm Coppelia]]" and "[[Final Gesture]]".
  * This monster's design resembles "[[Genex Controller]]" and "[[Genex Recycled]]".
  ** Parts of this monster are combined with "Controller" to form "[[Repaired Genex Controller]]".
  * According to the [[Duel Terminal Master Guide card storylines|Duel Terminal Master Guide card storylines]], this monster was used to control "[[Ally of Justice Field Marshal]]", who sacrificed itself to defeat many of the invading "[[Worm]]s". Since the [[Ally of Justice|Allies of Justice]] didn't have the technology to fix it, it was [[Final Gesture|left behind]].
