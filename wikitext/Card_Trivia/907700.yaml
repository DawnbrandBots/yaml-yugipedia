title: Card Trivia:Arc Rebellion Xyz Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Phantom Rage]]''.
  ** This monster is the cover card of the second [[Core Booster]] of [[Series 11]] (which has a [[Booster Pack Rainbow|yellow cover color]]), like how "Dark Rebellion Xyz Dragon" is the cover card of [[Series 9]]'s second Core Booster, ''[[The New Challengers]]''.
  * The crest that appears in the artwork of "[[Phantom Knights' Rank-Up-Magic Force]]" is based on the symbol on the base of this monster's neck, the red circles on its chest, and its horns.
  * This monster is an "Arc" [[Card evolutions|upgraded]] form of "[[Dark Rebellion Xyz Dragon]]".
  ** Visually, this monster is a combination of "Dark Rebellion Xyz Dragon" and "[[Raidraptor - Rise Falcon]]".
  *** This monster's effect to gain [[ATK]] equal to the ATK of all other monsters on the field is a reference to the effect of "[[Raidraptor - Rise Falcon (anime)|Raidraptor - Rise Falcon]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's name is also likely a reference to the ''Yu-Gi-Oh! ARC-V'' anime.
  * This monster has a counterpart combined with "[[Odd-Eyes Pendulum Dragon]]": "[[Odd-Eyes Rebellion Xyz Dragon]]".
