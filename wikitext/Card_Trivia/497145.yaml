title: Card Trivia:Subterror Behemoth Speleogeist
wikitext: |-
  {{Navigation}}

  * "[[Subterror Fiendess]]" appears in this card's artwork (in the bottom-right corner).
  * This monster appears in the artwork of "[[Subterror Final Battle]]".
  * This monster's Japanese name, "Subterror Malice Alegeist", is a reference to the [[wikipedia:Aegean Sea|Aegean Sea]], keeping with the [[wikipedia:Mediterranean Sea|Mediterranean Sea]] theme of the Japanese names of the "[[Subterror Behemoth]]" monsters.
  * This is the first and currently only [[Level 11]] [[Flip monster]].
