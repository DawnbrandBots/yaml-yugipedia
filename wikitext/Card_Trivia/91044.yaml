title: Card Trivia:Darkness
wikitext: |-
  {{Navigation|mode=nonGame}}

  * [[Nightshroud]] and the [[World of Darkness]] appear in this card's artwork.
  ** This card is based on the World of Darkness in the ''[[Yu-Gi-Oh! GX]]'' anime, which served as Nightshroud's realm of origin.
  ** This card's effect to [[Set]] "[[Zero]]", "[[Infinity (card)|Infinity]]", and the "[[Darkness (archetype)|Darkness]]" [[Continuous Trap Card]]s is based on how [[Yusuke Fujiwara]] (while possessed by Nightshroud) described the World of Darkness as both "zero" and an "infinite world" in {{episode|GX|175|ref}}.
  * This is the only [[Field Spell Card]] to be shown in [[face-down]] position in the anime.
  * In the ''Yu-Gi-Oh! GX'' anime, when Nightshroud activated this card, it turned his white wings black, which he used as his [[Duel Disk]].
