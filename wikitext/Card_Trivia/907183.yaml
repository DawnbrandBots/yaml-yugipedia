title: Card Trivia:Icejade Curse
wikitext: |-
  {{Navigation}}

  * "[[Icejade Aegirine]]" and the remains of "[[Icejade Kosmochlor]]" appear in this card's artwork.
  ** According to the [[The Valuable Book EX 2 card storylines]], this card's artwork depicts "Kosmochlor" disintegrating after she and "[[Swordsoul Supreme Sovereign - Chengying]]" gave all their remaining power to "[[Albion the Shrouded Dragon]]" so that it could [[Card evolutions|turn]] into "[[Mirrorjade the Iceblade Dragon]]" to defeat "[[Aluber the Jester of Despia]]".
  *** Fittingly, this card is the only "[[Icejade]]" anti-[[support]] card.
