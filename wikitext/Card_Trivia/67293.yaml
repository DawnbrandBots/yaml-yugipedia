title: Card Trivia:GEM Burst
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The purple letter "G" from the artwork of "[[G Force]]", the red letter "E" from the artwork of "[[E Force]]", and the green letter "M" from the artwork of "[[M Force]]" appear in this card's artwork, arranged to spell out the word "GEM".
  * This card has an "[[Elemental HERO]]" counterpart: "[[Hero Flash!!]]".
