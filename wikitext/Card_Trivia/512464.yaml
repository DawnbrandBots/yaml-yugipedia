title: Card Trivia:Red-Eyes Black Metal Dragon
wikitext: |-
  {{Navigation}}

  * This monster is the [[Metal counterpart]] of "[[Red-Eyes Black Dragon]]".
  ** This monster's [[original ATK and DEF]] (2800/2400) is based on the appearance of "[[Red-Eyes Black Dragon (manga)|Red-Eyes Black Dragon]]" while [[equip]]ped with "[[Metalmorph (manga)|Metalmorph]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ("[[Magic Metal Force]]" in the [[Yu-Gi-Oh! (anime)|anime]]), increasing its 2400 [[ATK]]/2000 [[DEF]] by 400.
  * This monster has an [[Card evolutions|upgraded]] form: "[[Red-Eyes Black Fullmetal Dragon]]".
  * This is the first variation of "Red-Eyes Black Dragon" that did not abbreviate "Black" with "B." prior to its [[Card Errata:Red-Eyes Black Dragon|errata]].
  * This monster has the same original ATK and DEF as the other "[[Red-Eyes]]" Metal counterparts, "[[Red-Eyes Darkness Metal Dragon]]" and "[[Red-Eyes Flare Metal Dragon]]".
  ** This monster and "Red-Eyes Darkness Metal Dragon" are the only "Red-Eyes" monsters whose Japanese names are written without kanji.
  ** Out of the three aforementioned "Red-Eyes" Metal counterparts, this is the only monster whose [[Type]] is [[Machine]] instead of [[Dragon]].
  * This card's second ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|122|ref}}, specifically from the panel showing "Red-Eyes Black Dragon" being equipped with "Metalmorph".
