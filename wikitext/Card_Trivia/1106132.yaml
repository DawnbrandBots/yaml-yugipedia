  * This monster is the combined form of "[[Diabellstar Vengeance]]" and "[[Poplar of the White Forest]]".
  * This monster is a [[Synchro Monster|Synchro]] [[counterpart]] of "[[Snake-Eyes Flamberge Dragon]]" and "[[Snake-Eyes Doomed Dragon]]".
