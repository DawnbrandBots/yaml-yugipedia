title: Card Trivia:Diabellstar the Black Witch
wikitext: |-
  {{Navigation}}
  * This monster appears in the artworks of "[[Azamina Debtors]]", "[[Dramatic Snake-Eye Chase]]", "[[Goblin Bikers Gone Bonkers]]", "[[Goblin Biker Grand Crisis]]", "[[Goblin Biker Grand Entrance]]", "[[Goblin Biker Grand Breakout]]", "[[Guilt of the Sinful Spoils]]", "[[Original Sinful Spoils - Snake-Eye]]", "[[Filia Diabell]]", "[[Sinful Spoils of Betrayal - Silvera]]", "[[Sinful Spoils of Doom - Rciela]]", "[[Sinful Spoils of Slumber - Morrian]]", "[[Sinful Spoils Sanctification]]", and "[[Startling Stare of the Snake-Eyes]]".
  ** A younger version of this monster appears in the artwork of "[[Like the Diabell]]".
  *** "[[Astellar of the White Forest]]" is an even younger form.
  ** A wanted poster of this monster appears in the artwork of "[[WANTED: Seeker of Sinful Spoils]]" and "[[Goblin Biker Grand Bash]]".
  * "[[Diabellstar Vengeance]]" is this monster merged with "Rciela" and "Silvera". It then further merges with "[[Poplar of the White Forest]]" into "[[Snake-Eyes Vengeance Dragon]]".
  * This monster has an opposing [[counterpart]]: "[[Diabellze the Original Sinkeeper]]".
  ** Both share the same ATK and DEF (2500/2000).
  ** Both have opposite [[Attribute]]s (DARK and [[LIGHT]]).
  ** Both are associated with their own "[[Sinful Spoils]]" artifacts.
  ** This monster has black clothing with red accents, while "Diabellze" has white clothing with blue accents.
  ** Both monsters were part of the "[[White Forest]]" as children, with "Diabellze" being the adult version of "[[Elzette of the White Forest]]".
  * This monster appears to be inspired by the [[signature card]]s of the protagonists in the ''[[Yu-Gi-Oh!]]'' anime and manga series, especially "[[Dark Magician]]", being a [[Level]] 7 [[DARK]] [[Spellcaster]] with 2500 [[ATK]] and 2000 [[DEF]].
  ** This mirrors "[[Snake-Eyes Flamberge Dragon]]", which is inspired by the rivals' signature cards, especially the [[-Eyes Dragon]] monsters, being a Level 8 [[Dragon]] monster with 3000 ATK and 2500 DEF.
  * This monster's name appears to be a reference to the real outlaw [[wikipedia:Belle Starr|Belle Starr]].
  [[File:DiabellstartheBlackWitch-ConceptArt.png|thumb|right|250|Concept art.]]
  * This monster's concept art notes the following:
  ** Her right eye turns green only when using the "Sinful Spoils".
  ** Her removable mask is named "Omen".
  ** Her backpack contains a variety of items.
  ** When her hood is not in use, it is tucked inside her skirt (although the illustration seems to indicate the jacket instead).
  ** "Rciela" and "Silvera" (depicted as a batwing-like cape and a fur scarf respectively) are attached to her body, remaining on her even when her clothes are removed.
  ** "Rciela" and "Silvera" each have their own personalities: the former is overprotective and the latter is stylish. As examples of this, small illustrations show "Rciela" draping a blanket over a sleeping "Diabellstar", "Silvera" painting this monster's nails, and both expressing dislike over her bodybuilding.
  *** This is later revealed to be because they are the mutated souls of "[[Rucia of the White Forest]]" and "[[Silvy of the White Forest]]", this monster's adoptive elder sisters.
  [[File:DiabellstartheBlackWitch-ConceptArt-2.png|thumb|right|250|Second artwork's concept art.]]
  * This monster's second artwork's concept art notes the following:
  ** The artwork depicts "Diabellstar" after the end of the "Sinful Spoil" storyline.
  ** "Diabellstar" has become a ''[[wikipedia:Kamishibai|kamishibai]]'' performer who tells others the story of her life as if it was a fairy tale; this explains why the artworks of the "White Forest" Spells/Traps depict stick puppets over stylized backgrounds instead of actual scenes.
  ** Although not explicitly stated, the yellow cat that accompanied "Diabellstar" is implied to be the "Diabellze" after she lost her human body due to the overusage of "Sinful Spoils".
