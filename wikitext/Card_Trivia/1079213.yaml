title: Card Trivia:Argostars - Slayer Eteo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Argostars - Giantslaying]]".
  * This monster is named after [[wikipedia:Eteoclus|Eteoclus]], one of the [[wikipedia:Seven against Thebes|Seven against Thebes]].
  ** The kanji ''toryū'' (屠龍, lit. "dragonslayer") in this monster's Japanese name is named after the [[wikipedia:Kawasaki Ki-45|Kawasaki Ki-45 ''Toryū'']] fighter aircraft.
