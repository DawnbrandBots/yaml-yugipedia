title: Card Trivia:Gouki The Tyrant Ogre
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded form of "[[Gouki The Great Ogre]]", fused with "[[Dinowrestler Chimera T Wrextle]]", taking place after the events of "[[Gouki Gameface]]".
  ** This is based on how [[George Gore]]/The Gore primarily used the "[[Gouki]]" and the "[[Dinowrestler]]" [[archetype]]s in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** This monster's name further references "Dinowrestler Chimera T Wrextle", which is based on the ''[[wikipedia:Tyrannosaurus|Tyrannosaurus rex]]'', whose scientific name translates to "tyrant lizard king".
  ** This monster's secondary [[Fusion Material]] requiring a [[Cyberse]] monster is based on how The Gore used "[[G Golem Crystal Heart (anime)|G Golem Crystal Heart]]" while implanted with [[Earth (character)|Earth's]] [[A.I. Dueling Chip]] in the ''Yu-Gi-Oh! VRAINS'' anime.
