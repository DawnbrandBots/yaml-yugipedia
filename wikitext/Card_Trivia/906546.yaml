title: Card Trivia:Card Revitalization
wikitext: |-
  {{Navigation}}

  * The hand of "[[Dark Ruler Ha Des]]" and the cards "[[Hilt, the Bearer of Noble Arms]]", "[[Severing Psychic Wall]]", and "[[The Power Up]]" appear in this card's artwork.
  ** In this card's international artwork, "The Power Up" is replaced with "[[Wind Spirit's Protection]]".

  * This card is a [[counterpart]] to "[[Card Destruction (Rush Duel)|Card Destruction]]".
  ** The pose of this card's artwork is mirrored to that of "Card Destruction".
