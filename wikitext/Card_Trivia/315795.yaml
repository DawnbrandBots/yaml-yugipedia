title: Card Trivia:Cir, Malebranche of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * The [[wikipedia:Malebranche (Divine Comedy)|Malebranche]] were demonic characters in Dante's ''The Divine Comedy'' the fifth Bolgia of Malebolge, the Eighth Circle of Hell. They are known for their ruthless cruelty, and are responsible for the punishment of corrupt politicians by holding them under a boiling lake of pitch.
  ** Of the 12 named Malebranche, this card specifically represents the demon "Ciriatto," the "wild hog", whose name is reflected in this card's pig-like appearance.
  ** Also, when formally named in ''Inferno'', Ciriatto is introduced in a pair with Graffiacane, whose [[Graff, Malebranche of the Burning Abyss|card counterpart]] was released in the same set as "Cir."
  * This monster resembles Ganon from the ''Legend Of Zelda'' series.
