title: Card Trivia:Sage of Strength - Akash
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from ''ākāś'', the word for "sky" in several [[wikipedia:Indo-Aryan languages|Indo-Aryan languages]] (which is rendered as "akash" in the [[wikipedia:ITRANS|ITRANS]] romanization system).
  * This is the [[Monster Card]] counterpart of [[Akash]], a character featured in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|2|ref}}, specifically from the panel where the character destroys several [[Spectra Union]] drones.
