title: Card Trivia:Scareclaw Astra
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[New World Stars]]", "[[Primitive Planet Reichphobia]]", "[[Scareclaw Alternative]]", and "[[Scareclaw Arrival]]".
  * This card is named after [[wikipedia:Astraphobia|astraphobia]], the fear of thunder and lightning.
  ** Fittingly, this monster has lightning orbs on its back, tail, and front paws.
