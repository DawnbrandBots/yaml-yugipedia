title: Card Trivia:Dogulce Jomont Blanc
wikitext: |-
  {{Navigation}}

  * This card's name and appearance are a combination of the following:
  ** ''[[wikipedia:Dogū|Dogū]]'', a figurine from ancient Japan shaped like a small humanoid.
  ** ''[[wiktionary:Dolce|Dolce]]'', the Italian word for "dessert", fitting the dessert-themed [[Deck]] used by [[Prioria Sweetalina]].
  ** [[wikipedia:Jōmon period|Jōmon period]], the time in Japanese prehistory where they began to create items like tools and pottery, including the ''dogū''.
  ** [[wikipedia:Mont Blanc (dessert)|Mont Blanc]], a dessert of of sweetened chestnut purée in the form of vermicelli noodles, reflecting this monster's noodle-like appearance.
