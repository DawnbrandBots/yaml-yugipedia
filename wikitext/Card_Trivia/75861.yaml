title: Card Trivia:Ground Collapse
wikitext: |-
  {{Navigation}}

  * This card's artwork features elements from similar artworks as those of "[[Yellow Luster Shield]]", "[[Negate Attack]]" and "[[Fusion Gate]]".
  * This card has a [[Spell]] and [[Trap Card]] counterpart: "[[Xing Zhen Hu]]".
  * The Spanish lore of this card has a typo, as "''Ning'''u'''n jugador puede usar...''" should be "''Ning'''ú'''n jugador puede usar...''" ("''Neither player can use...''") instead.
