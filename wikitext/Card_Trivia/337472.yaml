title: Card Trivia:Double-Rank-Up-Magic Utopia Force
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The sealed form of "[[Number 39: Utopia]]" appears in this card's artwork.
  * This is the first of two "[[Rank-Up-Magic]]" cards to Special Summon 2 Xyz Monsters simultaneously; the second being "[[Rank-Up-Magic Dark Force]]".
