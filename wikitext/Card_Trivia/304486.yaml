title: 'Card Trivia:Number 4: Stealth Kragen'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * The number "04" appears on this monster's right claw.
  * "Kragen" is a portmanteau of the Japanese word for "[[wikipedia:Jellyfish|jellyfish]]" (海月, ''kurage'') and "[[wikipedia:Kraken|kraken]]" (クラーケン ''kurāken'').
  * This is the first [[Aqua]] "[[Number]]" monster.
  * This monster's sealed form resembles a [[wikipedia:Polyp (zoology)|polyp]], a stage in the lifecycle of jellyfish.
  * This monster's effect to [[Special Summon]] "[[Stealth Kragen Spawn]]" (and the effect of "Stealth Kragen Spawn" to Special Summon this monster) upon being [[destroy]]ed is based on the [[wikipedia:Transdifferentiation|transdifferentiation process]] of the ''[[wikipedia:Turritopsis dohrnii|Turritopsis dohrnii]]'', which is also known as the "immortal jellyfish". This particular species of jellyfish is known for being the only species in the animal kingdom to reverse its biotic cycle by reverting to a younger [[wikipedia:Polyp (zoology)|polyp]] in response to physical damage.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to change the [[Attribute]]s of all monsters on the [[field]] to [[WATER]] is based on "[[Jelly Rain]]", a [[Spell Card]] that was used together with this monster by [[Chironex]] in {{episode|ZEXAL|115|ref}}.
  * In the Japanese ''OCG'', this card's name renders the digit "04" in a different typeface to the one normally used for numerals in the Japanese names of "[[Number]]" cards. The digits are rendered in the typeface DF LeiSho Semi-Bold (the typeface normally used for letters in the Japanese names of "Number" cards) instead of DF Kaku Tai Hi (the typeface normally used for numerals in the Japanese names of "Number" cards).
