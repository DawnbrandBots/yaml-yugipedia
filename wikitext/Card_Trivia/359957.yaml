title: Card Trivia:Return of the Dragon Lords
wikitext: |-
  {{Navigation}}

  * "[[Paladin of Felgrand]]" and the statue from the artwork of "[[Ruins of the Divine Dragon Lords]]" appear in this card's artwork. 
  ** However, the statue (which originally portrayed "[[Felgrand Dragon]]") has changed to resemble "[[Divine Dragon Lord Felgrand]]" as evidenced by the two tassels stemming from the head which the original statue and "Felgrand Dragon" lacks.
  * This card's ''[[TCG]]'' name references ''[[Structure Deck: Rise of the Dragon Lords]]'', playing on the fact that the ''[[Rise of the True Dragons Structure Deck]]'' is an expansion of the former [[Structure Deck]].
