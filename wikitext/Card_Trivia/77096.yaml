title: Card Trivia:Promotion
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Promotion (chess)|promotion]], a mechanic in the game of [[wikipedia:Chess|chess]] where a [[wikipedia:Pawn (chess)|pawn]] that reaches the last rank farthest from its original square can be replaced with another piece (e.g. a [[wikipedia:Queen (chess)|queen]] or a [[wikipedia:Rook (chess)|rook]]).
  ** Fittingly, the ''[[OCG]]''/''[[TCG]]'' effect of "[[Puppet Pawn]]" can [[add]] this card from the [[Deck]] to the [[hand]] after inflicting battle damage to the opponent, which allows for the [[Special Summon]] of "[[Puppet Rook]]", "[[Puppet Queen]]", or "[[Puppet King]]" via this card.
  *** Promoting to a king is not possible in modern chess play, though under an older rule this would theoretically be possible due to its broad wording.
