title: Card Trivia:Blue on Blue
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is based on "[[wikipedia:Friendly fire|friendly fire]]", a military term for the accidental or unintentional attacks by a military force on their troops that results in damage or casualties, whereas the term "blue on blue" is applied to friendly fire towards an allied [[wikipedia:NATO|NATO]] military force.
