title: Card Trivia:Hallo-Ween!
wikitext: |-
  {{Navigation}}

  * "[[Hallo, the Spirit of Tricks]]" and "[[Ween, the Spirit of Treats]]" appear in this card's artwork.
  * This card's Japanese name is based on "[[wikipedia:Trick-or-treating#The interjection "Trick or treat!"|Trick or treat!]]", a phrase commonly used on [[wikipedia:Halloween|Halloween]] where costumed people travel to different houses and ask for "treats" (mostly candy and other sweet confections) or fall victim to their "tricks" (usually in the form of mischievous pranks).
  ** Fittingly, this card, along with the aforementioned monsters, debuted in the Japanese release of ''[[Supreme Darkness]]'' on October 26th, 2024, five days before Halloween (given that Halloween is typically celebrated on October 31st).
