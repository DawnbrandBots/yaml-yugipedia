title: Card Trivia:Skiel Attack 3
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Sky A3]]".
  ** This monster's video game [[Special Summon]]ing effect is based on the effect of "Sky A3", which can Special Summon itself from the player's [[hand]] by [[Tribute|Tributing]] "[[Skiel Attack]]".
  * The number "3" in this monster's name represents its [[Level]] (3).
  * This monster is based on a [[wikipedia:Dragonfly|dragonfly]], keeping in relation with the "flying animal" design of the "[[Skiel]]" [[archetype]].
