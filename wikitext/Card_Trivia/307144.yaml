title: Card Trivia:Sylvan Komushroomo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Sylvan Blessing]]", "[[Sylvan Charity]]", "[[Sylvan Waterslide]]", and "[[Flourishing Frolic]]".
  * This monster is based on a [[wikipedia:Fly agaric|fly agaric]] mushroom, as evidenced by its red cap with white spots.
  * This monster's base Japanese title (影胞子) is a portmanteau of the words "silhouette" (影法師) and "spore" (胞子).
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "''[[wikipedia:Komusō|Komusō]]''" and "mushroom".
  *** The ''Komusō'' were wandering non-monastic lay Buddhists from the warrior-class, such as the samurai and the ronin. Fittingly, this monster's cap resembles the straw basket hoods worn by the ''Komusō'' while it wields a ''[[wikipedia:Khakkhara|khakkhara]]'', a staff traditionally carried by Buddhist monks.
