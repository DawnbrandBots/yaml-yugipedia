title: Card Trivia:Flip Flop Frog
wikitext: |-
  {{Navigation}}

  * A ''[[Yu-Gi-Oh!]]'' card appears in this card's artwork, being whirled around at the end of this monster's tongue.
  * This monster's Japanese name, "Reverse Frog" (裏返る, ''uragaeru''), is a pun on the Japanese term meaning "to be turned inside-out", which reflects its effect to [[Set]] itself in [[face-down]] [[Defense Position]].
  ** This monster's ''[[TCG]]'' name is a reference to its flipped appearance and its effect to [[flip]] itself into face-down Defense Position.
