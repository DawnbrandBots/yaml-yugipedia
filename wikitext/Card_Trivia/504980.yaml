title: Card Trivia:White Process - Albedo
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is one of four cards that represents the four stages of the ''[[wikipedia:Magnum opus (alchemy)|Magnum opus]]'' process. ("[[Black Process - Negledo]]" > "'''White Process - Albedo'''" > "[[Yellow Process - Kitolenics]]" > "[[Red Process - Rubedo]]")
  ** In this card's case, it is based on [[wikipedia:Albedo|albedo]] (or '''whiteness'''), the second step of the process representing purification and refinement.
  *** Fittingly, this is the second "Process" card used by [[Lyman Banner|Amnael]] during his [[Duel]] against [[Jaden Yuki]] in {{episode|GX|045|ref}}.
  *** This card's artwork depicts the primary colors of light (red, green, blue), along with the colors obtained by mixing either of these colors (red + blue → magenta; green + blue → cyan; and red + green → yellow). When the three primary colors are mixed together, it creates the color white.
  *** In alchemy, the process of whiteness is the second step in the pathway to the [[wikipedia:Philosopher's stone|philosopher's stone]] following the chaotic process of nigredo, which can wash away the impurities via ''[[wikipedia:Aqua vitae|aqua vitae]]''. Since this process is associated with the philosopher's stone, which is said to transmutate lesser metals into gold, this is reflected in this card's effect to [[Special Summon]] "[[Golden Homunculus]]".
