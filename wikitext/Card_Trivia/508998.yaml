title: Card Trivia:Dimension Explosion
wikitext: |-
  {{Navigation}}

  * "[[Blue-Eyes White Dragon]]", "[[Dark Magician]]", "[[Elemental HERO Air Neos]]", "[[Gearfried the Iron Knight]]", "[[Ojama King]]", "[[Skyscraper]]", "[[Skyscraper 2 - Hero City]]", and "[[Steam Gyroid]]", appear in this card's artwork.
  ** These aforementioned monsters are references to [[Seto Kaiba]], [[Yugi Muto]], [[Jaden Yuki]], [[Joey Wheeler]], [[Chazz Princeton]], and [[Syrus Truesdale]], respectively. As a result of their positioning on the artwork, it seems like a battle between ''[[Yu-Gi-Oh! GX]]'' and the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh]]'' anime.
  * The monsters in this card's artwork are positioned to correlate to each other.
  ** Both "Elemental HERO Air Neos" and "Dark Magician" have 2500 [[ATK]].
  ** "Steam Gyroid" and "Gearfried the Iron Knight" both have 1600 [[DEF]].
  ** "Blue-Eyes White Dragon" has 3000 ATK to match the 3000 DEF of "Ojama King" (alternately, the ATK of "Ojama King" has been increased by 3000 by "[[Ojamuscle]]").
