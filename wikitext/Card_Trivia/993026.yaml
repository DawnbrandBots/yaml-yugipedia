title: Card Trivia:T.G. Glaive Blaster
wikitext: |-
  {{Navigation}}

  * Three [[Synchro Summon]]ing rings appear in this card's artwork.
  ** This is a reference to the minimum number of [[Synchro Material]]s for this card's Synchro Summon.
  * This monster's design and color scheme is based on the [[Team 5D's]] pit crew uniform worn by [[Bruno]], the alternate alias of Antinomy who uses the "[[T.G.]]" [[archetype]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster is an upgraded form of "[[T.G. Blade Blaster]]", and a counterpart to "[[T.G. Halberd Cannon]]".
  ** Both monsters are named after polearm weapons wielded by these monsters. In this monster's case, it is named after a [[wikipedia:Glaive|glaive]], a polearm with a large blade fixed on the end, the edge of which is on the outside curve.
  ** This monster's first effect to banish a monster [[Special Summoned]] from the [[Extra Deck]] is an alteration of the [[Summon]] [[negate|negation]] effect of "T.G. Halberd Cannon". Furthermore, the first effect can be applied up to the number of non-[[Tuner Synchro Monster]]s used as [[Synchro Material]], similar to the effect of "[[T.G. Halberd Cannon (anime)|T.G. Halberd Cannon]]" in the anime.
  ** This monster's second effect to Special Summon a banished monster to the player's field, [[ignoring its Summoning conditions]], references how "T.G. Halberd Cannon" is designed to counter [[Accel Synchro]] monsters in the anime, with the effect to negate an effect that makes an opponent's monster [[leave the field]] and have it lose 800 ATK.
