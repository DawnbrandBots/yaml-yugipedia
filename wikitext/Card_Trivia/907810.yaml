title: Card Trivia:Evil★Twin's Trouble Sunny
wikitext: |-
  {{Navigation}}

  * According to this monster's concept art, the names of the two girls featured in its artwork are "Luna" and "Sunny" respectively.
  ** Sunny (presumably as her online avatar) appears in the artwork of "[[Live☆Twin Sunny's Snitch]]", suggesting they are rivals of "[[Evil★Twins Ki-sikil & Lil-la]]".
  ** Luna (also as what appears to be her avatar) appears in the artwork of "[[Lil-la Rap]]".
  *** Both monsters' gaming avatars appear in the alternate artwork of "[[Called by the Grave]]", although Sunny is only identifiable by her icon and her gloved hand reaching out from the hole.
  * The following appears in this card's artwork:
  ** Various ads featuring "[[Live☆Twin Ki-sikil]]" and "[[Live☆Twin Lil-la|Lil-la]]", including:
  *** A pair of advertisements (in the upper-right corner) featuring "[[Monster Assortment]]", with "Live☆Twin Ki-sikil" and "Lil-la" cosplaying as "[[Zombina]]" and "[[Zombino]]".
  *** An advertisement (in the middle of the right side) featuring "[[Nutrient Z]]" in a different container, with "Live☆Twin Ki-sikil" and "Lil-la".
  *** An advertisement (in the bottom-left corner) parodying the artwork of "[[Rikka Glamour]]", featuring "Live☆Twin Ki-sikil" and "Lil-la" cosplaying as the "[[Rikka]]" monsters featured in it.
  ** An advertisement (in the middle of the left side) featuring "[[Instant Fusion]]", with "[[M-Warrior 1|M-Warrior #1]]" and "[[M-Warrior 2|M-Warrior #2]]".
  *** This is likely a reference to how "Instant Fusion" can Special Summon "[[Karbonala Warrior]]", which uses those two monsters as [[Fusion Material]]s.
  * This monster has the highest [[original ATK]] (3300) of all [[Link-4]] monsters.
