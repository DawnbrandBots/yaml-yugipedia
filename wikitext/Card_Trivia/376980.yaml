title: Card Trivia:Zefraniu, Secret of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chosen of Zefra]]".

  * This monster's name references [[wikipedia:zh:囚牛|Qiúniú]] (zh: 囚牛 ''qiúniú''), one of the [[wikipedia:Nine sons of the dragon|nine sons]] of the [[wikipedia:Dragon King|Dragon King]] who is depicted as a dragon.
  ** According to Chinese mythology, Qiúniú loves music and is historically adorned on many musical instruments.

  * This monster features the same black sphere as "[[Qliphort Shell]]" and "[[Infernoid Harmadik]]".
