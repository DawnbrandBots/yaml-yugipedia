title: Card Trivia:Kappa's River Flow
wikitext: |-
  {{Navigation}}

  * This card's name comes from a proverb "A kappa swept away by the river" (directly translated as "Kappa's River Flow"), meaning that even someone who's an expert at something can fail at it at times.
  * "[[Kappa Emperor River Slider]]" appears in the artwork of this card.
