  [[File:Mizar seals Tachyon Dragon.png|thumb|300px|Mizar seals Galaxy-Eyes Tachyon Dragon into a card.]]

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * [[Mizar]] appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|082|ref}} where Mizar seals [[Number 107: Galaxy-Eyes Tachyon Dragon (character)|Number 107: Galaxy-Eyes Tachyon Dragon]] into its [[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|card form]].

