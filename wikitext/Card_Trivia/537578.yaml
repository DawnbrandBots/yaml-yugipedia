  * The goblins and "[[Sheep Token]]s" in this card's artwork also appear in the artwork of "[[Token Feastevil]]", "[[Token Sundae]]" and "[[Oh Tokenbaum!]]", with the goblins likely harvesting the "Sheep Tokens" for the events depicted in those cards.
