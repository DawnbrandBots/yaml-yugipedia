title: Card Trivia:Transonic Bird
wikitext: |-
  {{Navigation}}

  * Blueprints of this monster's jetpack appear in the artwork of "[[Sonic Tracker]]".
  * According to ''[[The Valuable Book EX 2 card storylines#One who Exists Beyond the Speed of Sound|The Valuable Book EX 2 card storylines]]'', this monster is the son of "[[Sonic Bird]]" and built the jetpack he wears from the blueprint his father left behind after his disappearance.
  ** This monster's [[DEF]] (2400) is equal to the combined [[ATK]] and DEF of "Sonic Bird" (1400/1000).
  * According, once again, to ''The Valuable Book EX 2 card storylines'', this monster managed to create this new technology of his jetpack by taking inspiration from the legends of a divine bird that inhabits a sacred mountain. Based on the ring that appears on the back of this monster, this addition might refer to "[[Simorgh, Bird of Divinity]]" who inhabits "[[Elborz, the Sacred Lands of Simorgh]]".
  ** Considering the color of this ring (silver instead of gold) and the [[DARK]] [[Attribute]] of this monster, it could instead refer to "[[Dark Simorgh]]", which is a [[Card evolutions|counterpart]] to "Simorgh, Bird of Divinity". This would be especially fitting because the original "Sonic Bird" is a [[WIND]] monster as well.
