title: Card Trivia:Slip Stream
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card is based on a "[[Wikipedia:Slipstream|slipstream]]", an area of decreased air and wind resistance behind a vehicle moving at high speeds. This phenomenon is commonly associated with [[Wikipedia:Drafting (aerodynamics)|drafting]] in motorsports, where a race car can use the slipstream created from behind the leading race car to close the gap between them.
  ** This is reflected in this card's effect to have the player's [[Speed Counter]]s become equal to the opponent's Speed Counters if the latter has more Speed Counters than the former, allowing the player to "close the gap between" them and their opponent.
  * The race car depicted performing the slipstream in this card's artwork resembles the [[wikipedia:Porsche 917|Porsche 917]], a sports prototype race car developed in 1969 designed to exploit the regulations regarding the construction of 5-litre sports cars, which later dominated motorsports racing in the early 1970s.
