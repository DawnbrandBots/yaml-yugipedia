title: Card Trivia:Noble Knight Peredur
wikitext: |-
  {{Navigation}}

  * This monster is based on the knight, [[wikipedia:Percival|Sir Percival]]. This is supported by the fact that "[[Noble Knight Gwalchavad]]" and "[[Noble Knight Borz]]" appear in this card's artwork, which are based on [[wikipedia:Galahad|Sir Galahad]] and [[wikipedia:Bors|Sir Bors the Younger]], respectively, both of whom quested for the [[wikipedia:Holy Grail|Holy Grail]] along with Sir Percival.
  * This monster appears in the artwork of "[[Noble Knights of the Round Table]]".
