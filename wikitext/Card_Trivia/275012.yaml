title: Card Trivia:Brotherhood of the Fire Fist - Leopard
wikitext: |-
  {{Navigation}}

  * In the ''OCG'', this monster is named after ''[[wikipedia:Dai Zong|Dai Zong]]'' (read in Japanese as Tai Sō) and "leopard" (hyō).
  ** ''Dai Zong'' ranks 20th of the 36 Heavenly Spirits of the 108 [[wikipedia:Water Margin|Liangshan heroes]] and is nicknamed "Magic Traveller".
  ** Despite its name, it shows a cheetah instead of a leopard.
  * The kanji 速 on this monster's belt and the cheetah in this card's artwork means "speed/swiftness".
  * This monster appears in the artwork of "[[Fire Formation - Gyokkou]]".
