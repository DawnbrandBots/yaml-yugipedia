title: Card Trivia:Silhouhatte Trick
wikitext: |-
  {{Navigation}}

  * "[[Silhouhatte Rabbit]]" appears in this card's artwork.
  ** The magician wearing the dark green vest in this card's artwork appears in the artwork of "Silhouhatte Rabbit".
  ** Fittingly, the effect of "Silhouhatte Rabbit" can [[Set]] this card, as it is a [[Trap Monster]].
  * This is the first [[Illusion]] Trap Monster.
  * This card's Japanese name is a play on the word 影法師 (''Kagebōshi'', "silhouette"), substituting parts of the word for the homophonous 帽子 (''bōshi'', "hat").
