title: Card Trivia:Goddess Bow
wikitext: |-
  {{Navigation}}

  * The silhouette of "[[Queen's Knight]]" appears in this card's artwork.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster was created by fusing "Queen's Knight" with "[[The Claw of Hermos]]".
  ** This monster shares the same [[Attribute]], [[Level]], [[Type]], and [[original ATK and DEF]] as "Queen's Knight".
  * This monster is based on the bow used by [[wikipedia:Artemis|Artemis]], the goddess of the hunt in [[wikipedia:Greek mythology|Greek mythology]].
  * This is the only "[[The Claw of Hermos]]" [[Fusion Monster]] that was not used by [[Joey Wheeler]] in the ''Yu-Gi-Oh!'' anime.
  ** It is also the last "The Claw of Hermos" Fusion Monster to appear in the ''Yu-Gi-Oh!'' anime, as well as the last "[[Legendary Dragon]]" Fusion Monster to be used by [[Yami Yugi]].
  * Unlike other ''[[TCG]]'' names which are translated from the English name, this monster's French name is translated more directly from the Japanese name, "Holy Bow of the Goddess - Artemis".
