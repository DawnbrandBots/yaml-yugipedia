title: Card Trivia:Guardian Eatos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Guardian Formation]]".
  * This monster's name is a play on "air" (romanized as ''ea'' in Japanese) and ''aetós'' (αετός, the Greek word for "eagle").
  * This monster has the longest gap between its debut in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and the ''[[OCG]]''/''[[TCG]]'' of all the [[Equip Spell Card|Equip Spell]] "[[Guardian]]" monsters. It is also the only one whose [[Celestial Sword - Eatos|corresponding]] Equip Spell Card was not released at the same time it was and thus one of two such "Guardian"s that does not need that Equip Spell [[face-up]] to be Summoned.
  ** This monster and "[[Guardian Dreadscythe]]" (the only other "Guardian" to not have this [[Summoning condition]]) are the only two such "Guardian" monsters not to have their correlating Equip Spell weapon visible in their artwork.
