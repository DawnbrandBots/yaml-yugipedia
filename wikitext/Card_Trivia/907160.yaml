title: Card Trivia:Swordsoul Blackout
wikitext: |-
  {{Navigation}}

  * "[[Swordsoul Strategist Longyuan]]" and "[[Ad Libitum of Despia]]" appear in this card's artwork.
  ** Rather than depicting them fighting, this card's artwork seems to depict "Ad Libitum" proposing a secret deal to "Long Yuan", who appears to have accepted and betrayed the "[[Swordsoul]]s", as it eventually became "[[Swordsoul Sinister Sovereign - Qixing Longyuan]]".
  * This card's name is a reference to the blackout that occurs in scene transitions in theatrical productions.
  ** The theatrical theme of the name is similar to that of the "[[Despia]]" archetype.
