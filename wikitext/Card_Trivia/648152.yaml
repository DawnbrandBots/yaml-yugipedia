title: Card Trivia:Dream Mirror of Joy
wikitext: |-
  {{Navigation}}

  * The buildings in this card's artwork appear in the artwork of "[[Dream Mirror of Chaos]]".
  * The border of this card's artwork is based on the mirrors of the [[LIGHT]] "[[Dream Mirror]]" monsters.
  * This card has a [[DARK]] [[counterpart]]: "[[Dream Mirror of Terror]]".
  ** Both card artworks have opposite light/dark color schemes.
  ** This card's effect requires a LIGHT "Dream Mirror" monster, while "Dream Mirror of Terror" requires a DARK "Dream Mirror" monster.
  * This card represents good [[wikipedia:Dream|dreams]], as the "Dream Mirror" [[archetype]] is based on dreams.
