title: Card Trivia:Driving Snow
wikitext: |-
  {{Navigation}}

  * The man in this card's artwork also appears in the artwork of "[[Blizzard]]".
  * This card has a [[counterpart]] with the same effect that works when [[Spell Cards|Spells]], rather than [[Trap Cards|Traps]] are destroyed: "[[Gust]]".
  ** Coincidentally, both cards were used by [[Crump]] in the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
