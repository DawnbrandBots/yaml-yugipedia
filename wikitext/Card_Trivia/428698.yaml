title: Card Trivia:Supreme King Gate Zero
wikitext: |-
  {{Navigation}}

  * This is the first [[Pendulum Monster]] with a [[Pendulum Scale]] of 0.
  * This monster's name is based on "zero", whereas this monster resembles the number "0".
  ** This monster's name also references its Pendulum Scale, which allows the player to [[Pendulum Summon]] monsters with every [[Level]], and its [[Pendulum Effect]] to reduce any damage to zero.
  *** In the anime, this monster's Pendulum Effect also prevented the player from Pendulum Summoning if they controlled a monster, thereby giving them "zero" monsters to Pendulum Summon; however, this anime Pendulum Effect is implemented in the ''[[OCG]]''/''[[TCG]]'' Pendulum Effect of "[[Supreme King Gate Infinity]]".
  * This monster and "Supreme King Gate Infinity" both reference the similarly-named cards, "[[Infinity (card)|Infinity]]" and "[[Zero]]".
  ** Both cards are used by their respective anime series' final antagonists; the "[[Supreme King Gate]]" monsters are used by [[Z-ARC]] in ''[[Yu-Gi-Oh! ARC-V]]'', while "Infinity" and "Zero" are used by [[Nightshroud]] in ''[[Yu-Gi-Oh! GX]]''.
  ** Both cards require one another to utilize their [[Deck]]s' field control strategy; the "Supreme King Gate" monsters [[support]] "[[Supreme King Z-ARC]]", while "Infinity" and "Zero" support the "[[Darkness (archetype)|Darkness]]" [[Continuous Trap Card]]s.
  ** Both cards can be placed in certain [[Zone]]s on both sides of the player's [[field]] and allow them to use their main "weapon" in between them; the "Supreme King Gate" monsters are placed in the [[Pendulum Zone]]s to Pendulum Summon monsters, while "Infinity" and "Zero" can be placed in the [[Spell & Trap Zone]] and activate all of the "Darkness" Continuous Trap Cards between them.
  * This monster's ''OCG''/''TCG'' effect to [[Special Summon]] a [[Dragon]] [[Fusion Monster|Fusion]] or [[Synchro Monster]] references how [[Yuri]] merges with [[Yugo]] in the ''Yu-Gi-Oh! ARC-V'' anime.
