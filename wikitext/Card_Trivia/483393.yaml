title: Card Trivia:Clashing Souls
wikitext: |-
  {{Navigation}}

  [[File:5Dx154 Junk Warrior VS Red Dragon Archfiend.jpg|thumb|300px|"[[Junk Warrior (anime)|Junk Warrior]]" and "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]".]]
  * "[[Junk Warrior]]" and "[[Red Dragon Archfiend]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|5D's|154|ref}} where [[Yusei Fudo]]'s "[[Junk Warrior (anime)|Junk Warrior]]" battles [[Jack Atlas]]' "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" and defeats it, winning Yusei the Duel.
  ** This card's name shares its name with {{episode|5D's|153|ref}} , which also references the ideology of Jack Atlas who, in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime, believed that Dueling is a "clash of souls", which is reflected in its effect to make the player pay multiples of 500 [[Life Point]]s to increase their monster's [[ATK]] by the same amount.
  ** This card was created to honor the aforementioned episode and {{episode|5D's|152|ref}}, which won ''[[Shueisha]]'s [[V Jump]]'' magazine's [http://vjump.shueisha.co.jp/yugioh_20th_duel/keka.html fan favorite ''Yu-Gi-Oh! 5D's'' Duel poll]. The Duel was split between the two episodes but the episode nominated was episode 152, whilst this card references episode 153.

