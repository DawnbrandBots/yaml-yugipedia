title: Card Trivia:Destruction Sword Memories
wikitext: |-
  {{Navigation}}

  * "[[Buster Blader, the Destruction Swordmaster]]" and "[[Buster Whelp of the Destruction Swordsman]]" appears in this card's artwork.
  ** This card's artworks is a continuation of the events depicted in the artwork of "[[Karma of the Destruction Swordsman]]", where "Buster Blader" remembers "Buster Whelp" after he is forced to kill its corrupted form, "[[Buster Dragon]]".
  ** The events in this card's artwork are continued in the artwork of "[[Destruction Swordsman Fusion]]".
