title: Card Trivia:Darkness Approaches
wikitext: |-
  {{Navigation}}

  * The man in this card's artwork also appears in the artworks of "[[Rut Trap]]" and "[[The Destructor's Force]]".
  * The ''[[Rush Duel]]'' version of this card appears in the artwork of the ''Rush Duel'' version of "[[Card Destruction (Rush Duel)|Card Destruction]]".
  * Until its errata 15 years after its initial release, this was the only card in the ''[[OCG]]''/''[[TCG]]'' that could place a monster in [[face-down]] [[Attack Position]].
