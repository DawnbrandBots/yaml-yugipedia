title: Card Trivia:Arcana Force VIII - The Strength
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster appears in the artworks of "[[Reverse Reborn]]" and "[[The Spiritual Lord]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Strength (tarot card)|Strength]].
  ** This monster's number "VIII" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (1800) reference how Strength is the eighth trump card of the Majora Arcana Tarot.
  * The Major Arcana Strength and [[wikipedia:Justice (Tarot card)|Justice]] swap numbers in certain tarot decks. Traditionally Strength is XI and Justice is VIII, but the [[wikipedia:Rider-Waite tarot deck|Rider-Waite tarot deck]] switched the places of the two cards, and now both numberings are common. This monster uses the numbering introduced by the Rider-Waite tarot deck.
  * This monster's appearance is based on the Lovecraftian monster, the [[wikipedia:Shoggoth|shoggoth]], keeping in relation with the extraterrestrial theme of the "[[Arcana Force]]" [[archetype]].
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, a shoggoth is depicted on [[Sartorius]]' regular Strength Tarot card, which is used to represent [[Tyranno Hassleberry]], whom Satorius Duels using this monster in {{episode|GX|073|ref}}.
