title: Card Trivia:Evil Eye of Gorgoneio
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a reference to the [[wikipedia:Gorgoneion|Gorgoneion]], a protective amulet from [[wikipedia:Greek mythology|Greek mythology]], showing the [[wikipedia:Gorgon|Gorgon]] head.
  * This eye appears in the artworks of "[[Gorgon, Empress of the Evil Eyed]]" and "[[Evil Eyes Unleashed]]".
  * The head of "[[Medusa, Watcher of the Evil Eye]]" appears in this card's artwork.
