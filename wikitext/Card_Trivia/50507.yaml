title: Card Trivia:Symmetry Rorschach
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the [[wikipedia:Rorschach inkblot test|Rorschach inkblot test]], a psychological test in which the patient is asked what they see when they look at inkblots.
  ** The word "Symmetry" in this monster's name is based on the quality of being made up of exactly similar parts facing each other, which is reflected in this monster's symmetrical appearance, the symmetrical background of this card's artwork, and its [[equal ATK and DEF|equal]] [[original ATK and DEF]] (1200/1200). Also, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster is Summoned, it takes the appearance of an opponent's monster, albeit with a different color scheme, thus making both monsters appear "symmetrical" with each other.
  * This is one of several cards that allows cards to be [[face-up]] in the [[Main Deck]], the others being "[[Convulsion of Nature]]", "[[Grave Lure]]", "[[Parasite Paracide]]", "[[Pharaoh's Treasure]]", and the anime effect of "[[Wiretap (anime)|Wiretap]]".
