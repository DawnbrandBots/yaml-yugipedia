title: Card Trivia:Infernoble Knight Turpin
wikitext: |-
  {{Navigation}}

  * An assembled "[["Infernoble Arms - Almace"]]" appears in this card's artwork.
  * This monster is based on [[wikipedia:Tilpin|Tilpin]], a bishop who was regarded as the author of the legendary [[wikipedia:Historia Caroli Magni|Historia Caroli Magni]], a 12th-century Latin chronicle consisting of legendary material about [[wikipedia:Charlemagne|Charlemagne's]] campaigns in Spain.
