title: Card Trivia:Splitting Planarian
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Planarian|planarian]], a type of non-parasitic flatworm famous for its extraordinary regenerative abilities.
  ** Fittingly, this monster's effect is modeled after the planarian's oft-cited feat of regenerating into multiple individuals when divided lengthwise.
  * This card has one of the shortest time spans between its release in the ''[[OCG]]'' and its importation into the ''[[TCG]]'', with it being imported more than two weeks after its official release.
