title: Card Trivia:Raidraptor - Final Fortress Falcon
wikitext: |-
  {{Navigation}}

  * This is the first [[Rank 12 Monster Cards|Rank 12]] [[Winged Beast]] monster.
  * This monster's appearance mimics that of the boss monster [[wikia:w:c:finalfantasy:Emerald Weapon|Emerald Weapon]] from ''[[wikipedia:Final Fantasy VII|Final Fantasy VII]]'', while its color scheme is more reminiscent to that of another boss from the same game, [[wikia:w:c:finalfantasy:Ruby Weapon|Ruby Weapon]].
  ** Interestingly enough, this monster's name, "Final Fortress", shares the same initials of the ''[[wikipedia:Final Fantasy|Final Fantasy]]'' franchise: "FF".
  ** These facts may not be coincidental, as the attack animation of "[[Raidraptor - Satellite Cannon Falcon (anime)|Raidraptor - Satellite Cannon Falcon]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime parallels the summoning and attacking sequence of [[wikia:w:c:finalfantasy:Bahamut ZERO|Bahamut ZERO]] from ''Final Fantasy VII''.
