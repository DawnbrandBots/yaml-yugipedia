title: Card Trivia:One Year Broom
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hero of the Sweep]]", as one of its weapons.
  * This monster is based on [https://en.m.wikipedia.org/wiki/Tsukumogami tsukumogami]; tools that have obtained a soul due to existing for a long time. The monster’s name only attributes an age of one year to the broom, seemingly as a parody of tsukumogami existing for 99 years or more before obtaining a soul in many such stories.
