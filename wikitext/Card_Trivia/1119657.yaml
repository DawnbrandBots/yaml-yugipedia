title: Card Trivia:Sevens Knight the Multistrike Dragon Knight
wikitext: |-
  {{Navigation}}

  * This monster is a [[Strike Dragon]] [[counterpart]] of "[[Sevensgias the Magical Dragon Knight]]".

  * This card's artwork features seven cross-shaped symbols, referencing the seven motif of the Sevens Road series.
  ** This symbol is the same as the symbol from the artwork of "[[Sevens Road Magician]]" (colored purple instead of orange).

  * Fitting the "Dark Magician" homage of its [[Sevens Road Magician|base form]], this monster is a homage to "[[Red-Eyes Dark Dragoon]]", the upgrade form of "Dark Magician" [[Fusion Monster|fused]] with "Red-Eyes Black Dragon", a Dragon monster.
