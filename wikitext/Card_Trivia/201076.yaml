title: Card Trivia:Madolche Butlerusk
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of "Butler" and "Rusk", a type of twice-baked biscuit.
  * This monster appears in the artwork of "[[Madolchepalooza]]", "[[Madolche Tea Break]]" and "[[Xyz Reception]]".
  * Like all "[[Madolche]]" monsters, this card's artwork depicts the monster atop a sweet food in the shape of a jigsaw puzzle piece (in this case, a waffle).
