title: Card Trivia:Diceversity
wikitext: |-
  {{Navigation}}

  * "[[Terrorking Archfiend]]" and "[[Snipe Hunter]]" appears in this card artwork, following the events of "[[Dice-nied]]" and "[[That Six]]".
  * This card's name is very similar to "[[Dice Re-Roll]]".
  ** Fittingly, both cards are [[Trap Card]]s whose effects concern [[die roll]]s.
