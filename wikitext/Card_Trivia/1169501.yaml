title: Card Trivia:Clear Wing Synchro Dragon of the Four Heavenly Dragons
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Clear Wing Synchro Dragon]]".
  ** This monster's name is a reference to how "Clear Wing Synchro Dragon" is one of the [[Four Dimensional Dragons]], which are also known as the "Four Heavenly Dragons" in the original Japanese version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's [[archetype condition]] to treat it as a "[[Speedroid]]" monster references how "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]" is primarily used by [[Yugo]], who uses the "Speedroid" [[archetype]].
  * This is the first "Speedroid" [[Extra Deck]] monster that is not a "[[Hi-Speedroid]]" monster. It is also the first "Speedroid" monster that is not a [[Machine]] monster.
