title: Card Trivia:Roc from the Valley of Haze
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Mist Valley Baby Roc]]".
  * This monster is an older form of "Mist Valley Baby Roc".
  * This card is named after the [[wikipedia:Roc (mythology)|Roc]] (or Rukh) from [[wikipedia:Religion in pre-Islamic Arabia|Arabian mythology]], a giant bird able to seize elephants. It was believed to create the winds by flapping its wings.
