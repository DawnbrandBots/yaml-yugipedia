title: Card Trivia:Mokusatsu
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Sillva, Warlord of Dark World]]" appears in this card's artwork.
  * This card's name is a pun, as "''Mokusatsu''" is a Japanese expression meaning "ignoring" and "refusing even to comment on", but it is written with the characters of "to see" and "to kill".
