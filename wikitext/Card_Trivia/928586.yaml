title: Card Trivia:Vanquish Soul Dr. Mad Love
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vanquish Soul Trinity Burst]]".
  * This monster resembles the "zoner" character archetype in [[wikipedia: Fighting game|fighting games]], specifically the "projectile zoner" sub-archetype  (e.g. [[wikipedia:Guile (Street Fighter)|Guile]] and [[wikipedia:Dhalsim|Dhalsim]] from ''[[wikipedia:Street Fighter|Street Fighter]]'', [[wikipedia:Nu-13|Nu-13]] from ''[[wikipedia:Blazblue|Blazblue]]'', Peacock from ''[[wikipedia:Skullgirls|Skullgirls]]'', etc.). Gameplay-wise, these characters make heavy use of projectile-based attacks and sometimes long-reaching physical attacks to keep a safe distance from the opponent while still maintaining a significant offense.
  ** This basis can be seen in both halves of its effect to [[reveal]] a monster as a [[cost]], reflecting such characters [[Your opponent's monsters lose ATK|indirectly]] [[Your opponent's monsters lose DEF|affecting]] [[Returns from field to hand|the opponent]] to make the conditions more manageable for the player. Doubly so for this card's artwork, where this monster is depicted wielding a variety of contraptions and weapons which can all believably be used for projectile- and/or extension-based combat.
