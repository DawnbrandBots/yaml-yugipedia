title: Card Trivia:Super Quantal Mech Beast Lusterrex
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Super Quantal Alphancall Appeal]]".
  * This monster's name is a portmanteau of the words "luster" (a gentle sheen or soft glow) and "rex" (short for ''[[wikipedia:Tyrannosaurus|Tyrannosaurus rex]]'', a genus of large carnivorous theropod dinosaurs).
  * This monster forms the body and legs of (and lends its own tail to) "[[Neo Super Quantal Mech King Blaster Magna]]".
