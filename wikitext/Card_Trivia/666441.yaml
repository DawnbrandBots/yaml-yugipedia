title: Card Trivia:Dream Mirror Hypnagogia
wikitext: |-
  {{Navigation}}

  * "[[Ikelos, the Dream Mirror Mara]]" and "[[Ikelos, the Dream Mirror Sprite]]" appear in this card's artwork.
  * This card is named after [[wikipedia:Hypnagogia|hypnagogia]], the experience of the transitional state from wakefulness to sleep.
