title: Card Trivia:Boot Sector Launch
wikitext: |-
  {{Navigation}}

  * "[[Anesthrokket Dragon]]" and "[[Autorokket Dragon]]" appear in this card's artwork.
  * The same area in this card's artwork appears in the artwork of "[[Borrel Regenerator]]".
  * This card is named after a [[wikipedia:Boot sector|boot sector]], a region of a computer storage disc that contains machine code used to load a program.
