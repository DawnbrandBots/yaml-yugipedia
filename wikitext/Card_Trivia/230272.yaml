title: Card Trivia:Spellbook of the Master
wikitext: |-
  {{Navigation}}

  * This card is named after the ''[[wikipedia:Sefer Yetzirah|Sefer Yetzirah]]'', the earliest [[wikipedia:extant literature|extant book]] on [[wikipedia:Jews|Jewish]] [[wikipedia:Western esotericism|esotericism]].
  * "[[Fool of Prophecy]]" appears in this card's artwork.
  ** This card's artwork shows "Fool of Prophecy" being corrupted by the black magic of this book and becoming "[[Reaper of Prophecy]]".
  * This "[[Spellbook]]" has the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]] on its cover.
