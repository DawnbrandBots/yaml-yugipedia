title: Card Trivia:Damage = Reptile
wikitext: |-
  {{Navigation}}

  * A [[Slifer Red]] [[Duelist]] appears in this card's artwork.
  * This is the first card to feature an equals sign in its ''[[TCG]]'' names. However, it is currently the only card to use it for its proper meaning, as currently the only other ''TCG'' example ("[[Sky Striker Ace = Zero]]"), as well as all other cards with one in their ''OCG'' names, use it as a [[wikipedia:double hyphen|double hyphen]] instead.
