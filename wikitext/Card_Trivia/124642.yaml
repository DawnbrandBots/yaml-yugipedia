title: Card Trivia:Ookazi
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name, "Ookazi" translates to "Great Fire". The kanji (大火事) can be romanized as ''ookazi'' in certain systems, though the standard and most widely used system would romanize it as ''ōkaji''.
  * This card has four weaker counterparts: "[[Sparks]]" , "[[Raimei]]", "[[Hinotama]]" and "[[Final Flame]]", which inflict 200, 300, 500 and 600 points of damage respectively.
  * This card has a polar opposite [[counterpart]]: "[[Soul of the Pure]]".
