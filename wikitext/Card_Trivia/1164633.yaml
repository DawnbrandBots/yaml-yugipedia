title: Card Trivia:Odd-Eyes Pendulum Dragon of the Four Heavenly Dragons
wikitext: |-
  {{Navigation}}

  * The [[Pendulum Summon]]ing portal from the ''[[Yu-Gi-Oh! ARC-V]]'' anime appears in this card's artwork.
  * This monster is a [[retrained]] counterpart of "[[Odd-Eyes Pendulum Dragon]]".
  ** This monster's name is a reference to how "Odd-Eyes Pendulum Dragon" is one of the [[Four Dimensional Dragons]], which are also known as the "Four Heavenly Dragons" in the original Japanese version of the ''Yu-Gi-Oh! ARC-V'' anime.
  * This monster is the only retrained counterpart of the Four Dimensional Dragons that does not have an archetype condition that includes it in other archetypes.
