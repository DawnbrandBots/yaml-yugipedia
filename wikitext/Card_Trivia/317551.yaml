title: Card Trivia:Edge Imp Sabres
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Frightfur Factory]]" and "[[Frightfur Patchwork]]".
  * This monster is based on [[wikipedia:Scissors|scissors]], a tool consisting of two overlapping blades fastened together in the middle, often used to cut material.
  ** This card's ''[[TCG]]'' name is based on a [[wikipedia:Sabre|sabre]], a backsword with a curved blade and a single cutting edge, which resembles the blade of a pair of scissors.
