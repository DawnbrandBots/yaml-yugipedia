title: Card Trivia:Auram the World Chalice Blademaster
wikitext: |-
  {{Navigation}}

  * "[[Chosen by the World Chalice]]" → "Auram the World Chalice Blademaster" → "[[Mekk-Knight Avram]]" → "[[Crusadia Maximus]]" → "[[Crusadia Equimax]]" → "[[Mekk-Knight Crusadia Avramax]]".
  ** This monster is "Chosen by the World Chalice" powered up by the "[[World Legacy - "World Chalice"]]" artifact.
  * This monster appears in the artwork of "[[World Legacy Landmark]]", "[[World Legacy Clash]]", "[[World Legacy Trap Globe]]", and "[[World Legacy Scars]]".
  * This card was the first [[FIRE]] [[Link Monster]] and FIRE [[Cyberse]] monster.
  ** It is also the only "World Chalice" Link Monster whose Type is different than [[Psychic|its base form]].
