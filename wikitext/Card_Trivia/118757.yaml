title: Card Trivia:Genex Undine
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Undine|undine]], the elemental being of water.
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster]] version: "[[Hydro Genex]]".
  * This monster has a retrained "[[R-Genex]]" form: "[[R-Genex Undine]]".
  * In the Spanish ''[[TCG]]'', this monster's name is left untranslated. Its Spanish name would have been "''Genex Ondina''".
