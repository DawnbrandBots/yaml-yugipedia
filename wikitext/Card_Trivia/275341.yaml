title: Card Trivia:Beelzeus of the Diabolic Dragons
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Beelzebub|Beelzebub]]" (one of the seven princes of [[wikipedia:Hell|Hell]] in Christian religion) and "[[wikipedia:Zeus|Zeus]]" (the god of thunder and the sky in [[wikipedia:Greek mythology|Greek mythology]]).
  ** This monster's central body resembles the head of a fly, which is used as a typical representation of the head of Beelzebub.
  ** In the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, this monster was played by [[Sect Ijuin]], who uses an [[Insect]] Deck.
  *** During his second [[Duel]] with [[Yusei Fudo (manga)|Yusei Fudo]], Sect controlled this monster on the field alongside "[[Great Poseidon Beetle (manga)|Great Poseidon Beetle]]" and "[[Giant Hades Stag Beetle]]". This is a reference to Zeus and his two brothers, [[wikipedia:Poseidon|Poseidon]] and [[wikipedia:Hades|Hades]], who each received the sky, the sea and the underworld after defeating the [[wikipedia:Titans|Titans]].
  * This monster features a female humanoid torso atop the central body between its two dragon heads.
  * This monster is an [[Card evolutions|evolution]] of "[[Beelze of the Diabolic Dragons]]".
