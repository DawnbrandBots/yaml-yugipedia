title: Card Trivia:Limit Reverse
wikitext: |-
  {{Navigation}}

  * "[[Swordsman of Landstar]]" and a [[Duel Disk#Academy Duel Disk|Duel Academy Duel Disk]] appear in this card's artwork.
  * This second portion of this card's Japanese name contains the kanji「リバース」(''Ribāsu''), which can be translated to either "Rebirth" or "Reverse", both of which were most likely intended.
