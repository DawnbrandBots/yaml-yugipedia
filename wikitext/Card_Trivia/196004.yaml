title: Card Trivia:The Mask of Remnants
wikitext: |-
  {{Navigation}}

  * This mask appears in the artwork of "[[Masquerade]]".
  * This card has a ''[[Rush Duel]]'' [[Noodle Mask]] parody: "[[Noodle Mask of Spiciness]]".
  * This card likely represents an evil spirit left behind by "[[Masked Beast Des Gardius]]".
  ** In voodoo magic, evil spirits tend to possess other bodies to prolong their stay among the living, which is supported by the fact that this card can be [[activate]]d when "Masked Beast Des Gardius" is [[destroy]]ed.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! Duelist|130|ref}}, specifically from the panel where [[Mask of Possession|this mask]] first materializes, albeit with minor differences in detailing.
