title: Card Trivia:The Traveler and the Burning Abyss
wikitext: |-
  {{Navigation}}

  * "[[Dante, Traveler of the Burning Abyss]]" appears in this card's artwork.
  * This card's art depicts a critical scene from the beginning of Dante's ''[[wikipedia:Inferno (Dante)|Inferno]]'' where the author, after being assailed by wild beasts in a dark forest, finds himself at the gate leading into Hell. The gate as Dante describes it is famous for having a nine-line poetic inscription ending with the famous phrase, "Lasciate ogne speranza, voi ch'intrate", or "Abandon all hope, ye who enter here."
