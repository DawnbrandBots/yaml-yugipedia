title: Card Trivia:Senior Silver Ninja
wikitext: |-
  {{Navigation}}
  * This card can be seen at the background of "[[Ninja Grandmaster Hanzo]]" at the top of the same house at the same pose like the artwork of his card (you can see him at the top right corner of the card of "[[Ninja Grandmaster Hanzo]]").
  * This card also has a slight resemblance to Jean-Pierre Polnareff's Stand, "Silver Chariot", from the Shonen Jump series ''JoJo's Bizarre Adventure''.
  * This card and "[[Upstart Golden Ninja]]" have a similar effect of summoning "[[Ninja]]" monsters.
  ** Coincidentally, both cards have the same set number--031.
