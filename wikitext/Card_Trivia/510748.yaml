title: Card Trivia:Wingweaver
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Returning Light]]".
  * This monster is likely based on a [[wikipedia:Seraph|seraph]], a fifth-rank angel in the Jewish angel hierarchy, as it has six wings.
  * This card's ''[[OCG]]'' artwork depicts a halo on this monster's head; however, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster's halo was not depicted when it was on the [[field]].
