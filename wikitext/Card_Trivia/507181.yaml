title: Card Trivia:Winged Cleaver
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart]]: "[[Bladefly]]".
  * This card has one of the largest gap of time from its first and only ''[[OCG]]'' release to its original ''[[TCG]]'' release, separated by a period of 20 years. The card was first printed in February 1999 in the ''[[Vol.1]]'', while the first print of the card in the ''TCG'' was in August 2019 in the ''[[Speed Duel Starter Decks: Ultimate Predators]]'' Booster Pack.
