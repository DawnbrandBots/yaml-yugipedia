title: Card Trivia:Power Bond
wikitext: |-
  {{Navigation}}

  * This card appears in the artworks of "[[Banish Reactor]]" and "[[Three of a Kind]]".
  * The welding torch in this card's artwork appears in the artwork of "[[Power Return]]".
  * This is the [[signature card]] of [[Zane Truesdale]] and [[Syrus Truesdale]], which also represents the bond between the Truesdale brothers in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This card's artwork depicts two separate pieces of metal being melded together via the process of [[wikipedia:Welding|welding]], reflecting this card's effect of [[Fusion Summon]]ing a [[Machine]] [[Fusion Monster]].
  ** The welding appears to be done using an [[wikipedia:Oxy-fuel welding and cutting|oxy-acetylene torch]], which is unusual as it is used to cut metal instead of welding it, though it is still used for welding thicker metal together. This possibly explains the reason why this card doubles the [[ATK]] of monsters Summoned by this card's effect.
  * This card has a [[Skill Card]] [[counterpart]]: "[[Power Bond (Skill Card)|Power Bond]]".
  * This card has a [[Tamabot (series)|Tamabot]] counterpart: "[[Tama Bond]]".
  * This is the first card in ''[[Yu-Gi-Oh! Rush Duel]]'' other than "[[Fusion (Rush Duel)|Fusion]]" to perform a Fusion Summon.
