title: Card Trivia:Donpen & Donko
wikitext: |-
  {{Navigation}}

  * Donpen and Donko are dressed as "[[Dark Magician (Rush Duel)|Dark Magician]]" and "[[Dark Magician Girl (Rush Duel)|Dark Magician Girl]]", respectively.
  * This card is based on the mascot characters of the discount chain store [[wikipedia:Don Quijote (store)|Don Quijote]].
