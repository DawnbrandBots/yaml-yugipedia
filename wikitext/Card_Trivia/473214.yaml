title: Card Trivia:Heavy Mech Support Armor
wikitext: |-
  {{Navigation}}

  * This monster is the [[LIGHT]] counterpart of "[[Heavy Mech Support Platform]]".
  ** Both monsters' Japanese names, "Heavy Armor" and "Heavy Weapon" respectively, make it clear that this monster is focused on protecting the [[equip]]ped monster while "Platform" is focused on strengthening it.
