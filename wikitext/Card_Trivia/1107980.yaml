title: Card Trivia:Red-Eyes Jupiter Dragon
wikitext: |-
  {{Navigation}}

  * This monster is named after the planet [[wikipedia:Jupiter|Jupiter]], the fifth planet in the [[wikipedia:Solar System|Solar System]].
  ** This monster's name is also based on the [[Guardian Star]] Jupiter, the second Guardian Star of "[[B. Skull Dragon (FMR)|Black Skull Dragon]]" in ''[[Yu-Gi-Oh! Forbidden Memories]]''.
  ** This monster's base kanji name, "Thunder Dragon with Crimson Eyes" (真紅眼の雷竜), references how the planet Jupiter is named after [[wikipedia:Jupiter (mythology)|the Roman god of thunder]]. 
  *** This is further referenced by the lightning originating from this monster and the [[Wikipedia:Thunderbolt|thunderbolt]] patterns on its body, as the Roman god Jupiter is strongly associated with and often depicted wielding thunderbolts.
