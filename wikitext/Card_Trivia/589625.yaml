title: Card Trivia:Morphing Jar
wikitext: |-
  {{Navigation}}

  * This card has a [[Normal Monster]] [[recolored counterpart]]: "[[Ancient Jar]]".
  * This card has an [[Card evolutions#Alternate cards|alternate counterpart]]: "[[Morphing Jar 2|Morphing Jar #2]]".
  * This card is the first [[Flip monster]] [[Summon]]ed in the ''[[Yu-Gi-Oh!]]'' anime.
  ** This is also the first [[Effect Monster]] to activate its effect in the anime, as well as the first Flip monster to activate its effect.
