title: Card Trivia:Karakuri Watchdog mdl 313 "Saizan"
wikitext: |-
  {{Navigation}}

  * The '''313''' of this card's name represents a multiplication problem: 3 x 1 = 3.
  ** The number is also written in Japanese on this monster's left front leg: 参壱参.
  * "[[Karakuri Showdown Castle]]" appears in this card's artwork.
