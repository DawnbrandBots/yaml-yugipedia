title: Card Trivia:Sky Striker Ace - Camellia
wikitext: |-
  {{Navigation}}

  * This is the [[Monster Card]] version of [[Camellia]], a character in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This card's artwork is taken  from {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|9|ref}}, specifically from the panel where Camellia uses the "[[Sky Striker]]" technology for the first time and prepares to fight [[Solferina]].
  ** This monster's effect to [[Special Summon]] itself on the opponent's [[field]] and send a targeted monster to the [[Graveyard]], while also shifting its [[control]] back to the owner during the [[End Phase]], reference how in the manga Camellia fakes her defeat at the hands of her allies and seemingly defects to [[Kama]], only to kill [[Himmel]] and [[Akash]] before revealing herself to be a double agent.
