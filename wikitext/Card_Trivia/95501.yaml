title: Card Trivia:A Major Upset
wikitext: |-
  {{Navigation}}

  * An enraged "[[Mokey Mokey]]" and "[[Dark Armed Dragon]]" appear in this card's artwork.
  * This card's name is a multi-layered pun:
  ** "Mokey Mokey" is shown becoming majorly upset, as similarly depicted in the card artwork of "[[Mokey Mokey Smackdown]]".
  ** An "upset" refers to an unexpected result, with a common example being competitions where a player or team defeats an opponent considered to be much stronger.
  *** This is reflected by the card artwork, which depicts "Dark Armed Dragon" being defeated by "Mokey Mokey", as well as the effect to [[Tribute]] 1 [[face-up]] [[Attack Position]] [[Level 2]] or lower monster and return all [[Level 7]] or higher [[Special Summoned]] [[monster]]s to the [[hand]].
