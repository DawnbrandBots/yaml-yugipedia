title: Card Trivia:Regenesis Code
wikitext: |-
  {{Navigation}}

  * "[[Regenesis Warrior]]" appears in this card's artwork.
  * This card's Japanese name is based on the [[wikipedia:Torah|Torah]], a compilation of the first five books of the [[wikipedia:Hebrew Bible|Hebrew Bible]].
  ** The word "Code" in this card's English name is in the sense of a [[wikipedia:List of ancient legal codes|legal code]] from ancient times, of which the [[wikipedia:Law of Moses|Mosaic Law]] (Torah) is one prominent example.
