title: Card Trivia:Brotherhood of the Fire Fist - Coyote
wikitext: |-
  {{Navigation}}

  * In the OCG, this card is named after ''[[wikipedia:Wu Yong|Wu Yong]]'' (read in Japanese as Go Yō) and "coyote" (koyōte).
  ** ''Wu Yong'' ranks 3rd of the 36 Heavenly Spirits of the 108 [[wikipedia:Water Margin|Liangshan heroes]] and is nicknamed "Knowledgeable Star".
  * This monster is the first World Premiere "[[Fire Fist]]" monster released.
  * This monster appears in the artworks of "[[Fire Formation - Tenken]]" and "[[Ultimate Fire Formation - Sinto]]".
