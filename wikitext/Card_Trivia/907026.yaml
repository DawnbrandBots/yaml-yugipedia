title: Card Trivia:Magikey World
wikitext: |-
  {{Navigation}}

  * "[[Clavkiys, the Magikey Skyblaster]]" and the pistol from "[[Magikey Maftea]]" appear in this card's artwork.
  * This card's Japanese name contains the phrase 「施解」, which literally loose means "unlocking", but is homophonous with 「世界」, meaning "world".
