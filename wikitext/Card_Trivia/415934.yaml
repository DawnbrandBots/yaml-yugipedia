title: Card Trivia:Red-Eyes Toon Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the box of ''[[Legendary Duelists: Season 1]]''.
  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Red-Eyes Black Dragon]]".
  ** This monster's pose is based on the first ''[[OCG]]''/''[[TCG]]'' artwork of "Red-Eyes Black Dragon", albeit with a mirrored pose.
  ** This monster's effect to [[Special Summon]] a Toon monster from the [[hand]] is a reference to the effect of "[[Red-Eyes Darkness Metal Dragon]]".
