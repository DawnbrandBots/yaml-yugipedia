title: Card Trivia:Celestial Wolf Lord, Blue Sirius
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.8]]''.
  * This monster appears in the artwork of "[[Battle Tuning]]" and "[[Synchro Drive]]".
  * This card appears in the artwork of "[[Banquet of Millions]]".
  * This monster is named after [[wikipedia:Sirius|Sirius]], the brightest star of the night sky, and a part of the [[wikipedia:Canis Major|Canis Major]] (or the "Greater Dog") constellation.
  ** This monster's Japanese name is based on its Greek name, "Seirios".
  ** The Chinese name for Sirius is ''Tiānlángxīng'' (天狼星, lit. "heavenly wolf star"), which is similar to the first part of this monster's Japanese name, "Heavenly Wolf Lord" (天狼王, ''Tenrōō'').
  ** This monster's effect upon being destroyed and sent to the [[Graveyard]] references the [[wikipedia:Pawnee people|Pawnee]] [[wikipedia:Wolves in folklore, religion and mythology|creation myth]], in which the wolf was the first creature to experience death.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|020|ref}}, specifically from the panel showing [[Celestial Wolf Lord, Blue Sirius (manga)|this monster]] being Summoned.
