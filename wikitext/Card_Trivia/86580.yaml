title: Card Trivia:Chimera the Flying Mythical Beast
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Chimera (mythology)|chimera]], a creature in [[wikipedia:Greek mythology|Greek mythology]] whose body consists of parts of different animals.
  ** This monster's design and [[Fusion Material]]s are based on the earliest design of the chimera, which is often depicted with the head of lion (reflected by "[[Gazelle the King of Mythical Beasts]]", a monster resembling a lion despite its name) and the head of a goat (reflected by "[[Berfomet]]", a monster based on the winged [[wikipedia:Baphomet|Baphoment]], who is depicted with the head of a goat).
  * This monster has a [[retrained]] counterpart: "[[Chimera the King of Phantom Beasts]]".
  * In the Spanish dubbed version of {{episode|Yu-Gi-Oh!|196|ref}}, this monster was mistakenly named "Quimera, la Bestia Mecanica Voladora" ("Chimera the Flying Mechanical Beast") instead of "Quimera, la Bestia Voladora Mítica".
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|Yu-Gi-Oh!|153|ref}} showing [[Chimera the Flying Mythical Beast (manga)|this monster]] being Summoned.
