title: Card Trivia:Gift Card
wikitext: |-
  {{Navigation}}

  * Multiple "[[Winged Kuriboh]]s" appear in this card's artwork, adorned on the gift card.
  ** This is likely a reference to [[Jaden Yuki]] being given "[[Winged Kuriboh (anime)|Winged Kuriboh]]" as a "gift" from [[Yugi Muto]] in {{episode|GX|001|ref}}.
  * This card's name features a multilingual pun: In English, the word "gift" refers to a generous present, as reflected in this card's "generous" effect to increase the opponent's [[Life Point]]s by 3000; however, in German and Swedish, the same word "gift" translates to "poison", possibly reflected by this card's intended use in an [[Anti-Cure]] Deck.
  * This card has a [[counterpart]]: "[[Present Card]]".
  ** This is supported by the fact that the "card" features multiple "[[Kuribon]]s" adorned on it, English words written on it in [[wikipedia:Cursive|cursive]], and an effect that benefits the opponent.
  * Strangely, the hexagrams in the background of this card's artwork were not censored in its international artwork, likely due to their resemblance to snowflakes.
