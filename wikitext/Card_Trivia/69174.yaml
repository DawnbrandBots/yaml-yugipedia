title: Card Trivia:Shinato's Ark
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card was used as [[Noah Kaiba]]'s Deck Master, which is a pun on [[wikipedia:Noah's Ark|Noah's Ark]], a massive ship built by [[wikipedia:Noah|Noah]] in the [[wikipedia:Bible|Bible]].
  ** In {{episode|Yu-Gi-Oh!|114|ref}}, this card was used in conjunction with the [[Spell Card]] "[[Giant Flood]]", where a flash flood sweeps away all of the monsters in the [[field]] and into the ship's hull. This is a reference to the story of Noah's Ark where Noah built the ship upon instructions from [[wikipedia:God in Abrahamic religions|God]] to save himself, his family, and the world's animals from the [[wikipedia:Genesis flood narrative|Biblical flood]].
