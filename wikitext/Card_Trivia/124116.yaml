title: Card Trivia:Advanced Crystal Beast Ruby Carbuncle
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Crystal Revenge]]''.
  * This monster appears in the ''[[OCG]]''/''[[TCG]]'' artwork of "[[Advanced Dark]]".
  * This monster is the "[[Advanced Crystal Beast]]" counterpart of "[[Crystal Beast Ruby Carbuncle]]".
  * This is the only "Advanced Crystal Beast" monster that lacks visible armor.
