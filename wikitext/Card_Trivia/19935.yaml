title: Card Trivia:Dark Ruler Ha Des
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Struggle of Chaos]]'' and the box of ''[[Duelist Legacy Volume.5]]''.
  * This monster appears in the artworks of "[[A Deal with Dark Ruler]]", "[[Bark of Dark Ruler]]", "[[Demotion]]", "[[Destruct Potion]]", "[[Flash Effect]]", "[[Hate Buster]]", "[[Leading Question]]", "[[Mind Trust]]", "[[Order to Smash]]", "[[Sinister Yorishiro]]", "[[Skill Drain]]", "[[The Puppet Magic of Dark Ruler]]", "[[Trading Places]]", and "[[Victim Barrier]]".
  ** This monster's hand appears in the artworks of "[[Card Restoration]]", "[[Card Revitalization]]", "[[Soul Demolition]]" and the [[Yu-Gi-Oh! Rush Duel|Rush Duel]] artwork of "[[Card Destruction (Rush Duel)|Card Destruction]]".
  ** Based on many artworks that depicts its storyline, this monster is the enemy of "[[Dark King of the Abyss]]".
  * The "Ha Des" in this card's name is a pun on "[[wikipedia:Hades|Hades]]", the name of the Greek god of death and the underworld (which is called "Hades" as well).
  ** This card's Japanese name,「冥界の魔王　ハ・デス」, contains an interpunct 「・」 between "Ha" 「ハ」 and "Des" 「デス」, showing that they are actually two words. This was probably intended to be a pun, because the Japanese spelling of the word "death" is "des" (which is also used in "[[Desrook Archfiend]]" and "[[Des Lacooda]]").
  * This card has a [[Synchro Monster|Synchro]] [[Zombie counterpart]]: "[[Revived King Ha Des]]".
  * This monster is the ''boss'' of "[[Opticlops]]" (see the card's lore), "[[Winged Minion]]" (see "Victim Barrier" and the ''[[OCG]]'' name of "Winged Minion"), "[[Dark Resonator]]" (see "Mind Trust"), and "[[Berserk Dragon]]" (see "A Deal with Dark Ruler").
  ** After turning into the [[Zombie]] "Revived King Ha Des", this monster also gained power over "[[Archfiend Zombie-Skull]]" (see "[[Reanimation Wave]]").
