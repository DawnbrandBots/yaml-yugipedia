title: Card Trivia:Cross Target
wikitext: |-
  {{Navigation}}

  * "[[Handy Girl]]" and "[[Handy Lady]]" appear in this card's artwork.
  * This card's base kanji subtitle, "Encounter with the Unknown" (未知との邂逅) is a play on the Japanese title of the 1977 American science fiction film, ''[[wikipedia:Close Encounters of the Third Kind|Close Encounters of the Third Kind]]'', which is known as ''An Encounter with the Unknown'' in Japan.
