title: Card Trivia:Gimmick Puppet Gear Changer
wikitext: |-
  {{Navigation}}

  * This monster's gear-like mechanisms appears in the artwork of "[[Gimmick Puppet Gigantes Doll]]".
  * This monster's name is similar to that of "[[Gear Changer]]", another [[EARTH]] [[Machine]] monster whose design features gear-like mechanisms in their design and features an effect that can change their [[Level]]s depending on the Level of a monster on the [[field]].
