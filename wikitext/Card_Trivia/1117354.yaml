title: Card Trivia:Enigmaster Packbit
wikitext: |-
  {{Navigation}}

  * The first portion of this monster's name is based on the "[[wikipedia:Enigma machine|Enigma machine]]", a cipher device used by Germany in World War II.
  ** The second portion of this monster's name is based on "[[wikipedia:PackBits|PackBits]]", a fast, simple lossless compression scheme for run-length encoding of data.
