title: Card Trivia:Clorless, Chaos King of Dark World
wikitext: |-
  {{Navigation}}

  * This monster's appearance resembles a statue of [[wikipedia:The Buddha|Buddha]].
  ** Fittingly, in the ''[[Yu-Gi-Oh! GX]]'' anime, this monster was intended to be Summoned through the effect of "[[Wicked Canon]]", which is named similarly to the Japanese term for the [[wikipedia:Buddhist texts|Buddhist texts]].
  * This monster's staff features five orbs with darkness radiating out of them, referencing the five "[[Sinister Doctrine]]" cards required to [[Fusion Summon]] this monster in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This is the first "[[Dark World]]" [[Fusion Monster]], as well as the first "Dark World" monster that has an effect not shown; however, this is the second "Dark World" Fusion Monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This is one of two Fusion Monsters that requires "[[Super Polymerization (anime)|Super Polymerization]]" for its Summoning in the anime, the other being "[[Super Fusion God]]".
  ** Both are also Fusion Monsters that were mentioned but [[List of unseen cards|never actually seen]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * Despite its name, the only solid color depicted in this card's artwork is the color black, while also featuring faint colors of the rainbow. In a [[wikipedia:RGB color model|RGB color model]], the color black is made up of all colors and creates the absence of white, which is made up of all colors.
  ** Fittingly, this monster requires "[[Reign-Beaux, Overlord of Dark World]]" as [[Fusion Material]], and the "Dark World" [[archetype]] consists of [[Fiend]] monsters whose names are based on a different color, which would make up all the colors to create the color black.
  * This monster's ''OCG''/''TCG'' Fusion Materials are based on a scene in {{episode|GX|136|ref}}. After [[Brron, Mad King of Dark World (character)|Brron, Mad King of Dark World]] failed to Fusion Summon this monster, he controlled "[[Reign-Beaux, Overlord of Dark World (anime)|Reign-Beaux, Overlord of Dark World]]" and "[[Zure, Knight of Dark World (anime)|Zure, Knight of Dark World]]" at the end of the turn, while [[Jaden Yuki]] [[control]]led two "[[Dark Token]]s" (a [[Fiend]] [[Token]]) [[Special Summon]]ed by the effect of Brron's "[[Darkness Half]]".
