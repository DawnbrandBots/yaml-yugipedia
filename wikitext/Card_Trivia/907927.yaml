title: Card Trivia:Over Fusion
wikitext: |-
  {{Navigation}}

  [[File:Neos_purifies_Rainbow_Dark_Dragon.png|thumb|right|250|"[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" purifies "[[Rainbow Dark Dragon (anime)|Rainbow Dark Dragon]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.]]

  * "[[Elemental HERO Neos]]" and "[[Rainbow Dragon]]" appear in this card's artwork.
  * This card's artwork is based on a scene of {{episode|GX|152|ref}}, where [[Jaden Yuki]] [[activate]]d "[[Super Polymerization (anime)|Super Polymerization]]" and used "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" and "[[Rainbow Dark Dragon (anime)|Rainbow Dark Dragon]]" as [[Fusion Material]] to [[Fusion Summon]] "[[Rainbow Neos (anime)|Rainbow Neos]]", purifying "[[Rainbow Dragon (anime)|Rainbow Dragon]]", during his [[Duel]] against [[Jesse Anderson]] (who was possessed by [[Yubel (character)|Yubel]]).
  ** The kanji for this card's Japanese name, "Fusion Over" can be read as "Fusion Super Vortex" (融合超渦 ''Yūgō Chōuzu''), referencing the Japanese name for "[[Super Polymerization]]" ({{Ruby|超|ちょう}}{{Ruby|融|ゆう}}{{Ruby|合|ごう}} ''Chōyūgō'', "Super Fusion").
  * This card's effect to reveal a monster from the [[hand]], [[Deck]], or [[Extra Deck]] and change its name when using it as a [[Fusion Material]] is based on the effect of "[[Elemental HERO Prisma]]".
  ** Additionally, this card's effect to send the revealed monster, including a [[Level 10]] monster, to the [[Graveyard]] if the player "[[Elemental HERO Neos]]" reference a scene in {{episode|GX|154|ref}}, where Jaden uses the effect of "[[Elemental Hero Prisma (anime)|Elemental Hero Prisma]]" send the Level 10 "Rainbow Dragon" to the Graveyard and change its name to the sent monster's name while he controlled "Neos".

