title: Card Trivia:Eternal Sunshine
wikitext: |-
  {{Navigation}}

  * "[[Ancient Fairy Dragon]]" (equipped with "[[Pain to Power]]") and "[[Earthbound Immortal Cusillu]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|5D's|050|ref}}, where "[[Ancient Fairy Dragon (anime)|Ancient Fairy Dragon]]" battles "[[Earthbound Immortal Cusillu (anime)|Earthbound Immortal Cusillu]]", in which the former monster attacks the latter by making its body glow brightly.
  * This card's name is the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "Ancient Fairy Dragon" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
