title: Card Trivia:Curse of Thorns
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on ''[[wikipedia:Sleeping Beauty|Sleeping Beauty]]'', specifically [[wikipedia:Charles Perrault|Charles Perrault's]] version of the fairy tale.
  ** This card's [[Continuous Spell Card]] type and effect of negating the effects of an [[Effect Monster]] in the opponent's [[Graveyard]] reference the sleeping princess' curse after pricking her finger on the spindle, where her castle was surrounded by a forest of thorns and brambles while she slept for one hundred years.
