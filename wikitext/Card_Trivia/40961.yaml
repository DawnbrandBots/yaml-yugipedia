title: Card Trivia:Victoria
wikitext: |-
  {{Navigation}}

  * A four-headed version of "[[Victory Dragon]]" appears in this card's artwork.
  ** Fittingly, this card is named for [[wikipedia:Victoria (mythology)|Victoria]], the Roman goddess of victory, in turn referencing the [[Match winner]] effect of "Victory Dragon".
  ** Additionally, the amount of heads "Victory Dragon" has in this card's artwork reflects the maximum number of [[Dragon]] monsters that can be [[Special Summon]]ed with this card's effect.
  * This monster is based on [[wikipedia:File:Brandenburg Gate Quadriga at Night.jpg|the Quadriga]] positioned on top of the [[wikipedia:Brandenburg Gate|Brandenburg Gate]].
  * This card may be a [[counterpart]] of "[[Herald of Creation]]".
  ** Both monsters have the same [[ATK]], wield a staff, have a similar armor and long hair.
  ** Each one also has an effect related with Dragon-[[Type]] monsters: the effect of "Herald" can be used for [[Level]] 7 and higher Dragon monsters, and this card takes [[control]] of an opponent's Dragon monster in the [[Graveyard]].
  * This card's unusual ''[[OCG]]'' name, "Wicktoria", is most likely due to a printing error, leaving off the [[wikipedia:Dakuten|dakuten]] of the first letter.
