title: Card Trivia:Yosenju Kama 1
wikitext: |-
  {{Navigation}}

  * This card, along "[[Yosenju Kama 2]]" and "[[Yosenju Kama 3]]", are based on the Japanese yōkai [[wikipedia:Kamaitachi|Kamaitachi]], a weasel monster which rode atop whirlwinds to slice at passers-by.
  ** This trio in particular appears to be modeled on the Hida Province's tradition regarding the Kamaitachi. According to this version of the myth, the Kamaitachi consists of three brother Gods who traveled in a group. The first would knock a person down, the second cuts them, and the final pours medicine in the wound to remove the pain. Correspondingly "Kama 1" represents the first member of this trinity, shown in its art to be taking an upward swipe, as if to knock a person over.
  ** These three monsters appear in the artworks of "[[Yosenjus' Secret Move]]", "[[Yosen Training Grounds]]", and "[[Yosenju Wind Worship]]".
  ** There's a pun in their Japanese names: the "i" in "Kamaitachi" can be understood as "one"; the "ni" in "Kamanitachi" means "two", and the "mi" in "Kamamitachi", "three".
  ** This card's name also contains "鎌" (''[[wikipedia:Kama (weapon)|kama]]'' "[[wikipedia:Sickle|sickle]]") and 太刀 (''[[wikipedia:Tachi|tachi]]'' "great sword").
