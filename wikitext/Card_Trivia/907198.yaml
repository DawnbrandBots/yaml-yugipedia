title: Card Trivia:Delirium Lampyris
wikitext: |-
  {{Navigation}}

  * This monster appears in both artworks of "[[Invitation to a Delirious Dream]]".
  * This monster's design is based on the [[wikipedia:Firefly|firefly]], with its name being the ancient Greek word for it, "lampyris".
  * This is the first card in ''[[Yu-Gi-Oh! Rush Duel]]'' to feature an effect that changes [[control]] of monsters.
