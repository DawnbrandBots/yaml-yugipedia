title: Card Trivia:Endoll
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Psykickoff Concert]]".
  * This monster's Japanese name (アンドール, ''Andōru'') is a portmanteau of the words "encore" (アンコール, ''Ankōru'') and "doll" (ドール, ''Dōru'').
  ** This monster's name reflects its effect to allow the player to play an "encore"  with the concert-themed "[[Climax Finale]]" and "[[Psychic Introduction]]".
