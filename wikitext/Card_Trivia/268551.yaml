title: Card Trivia:Chow Chow Chan
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Chow Chow|Chow Chow]], a breed of dog that originated from [[wikipedia:China|China]].
  ** This monster's name may also be a pun on [[wikipedia:Cao Cao|Cao Cao]], a notable tactician, general, and leader during China's [[wikipedia:Three Kingdoms|Three Kingdoms]] period.
  * This monster is depicted wearing the outfit worn by a [[wikipedia:Shinto priest|Shinto priest]], while the background of this card's artwork features ''[[wikipedia:Shide (Shinto)|shide]]'' paper streamers and ''[[wikipedia:Magatama|magatama]]'' symbols.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect, which specifically [[activate]]s when the opponent [[activate]]s a [[Normal Trap Card]] in response to the player's attack, is an alteration of its effect in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, where its effect simply activates in response to the activation of an opponent's [[Trap Card]]. In {{episode|ZEXAL|107|ref}}, [[Yuma Tsukumo]] activated this monster's effect when [[Ponta]] (while possessing [[Girag]]'s body) activates the Normal Trap Card "[[Raccoon Reversal]]" in response to an attack on "[[Number 64: Ronin Raccoon Sandayu (anime)|Number 64: Ronin Raccoon Sandayu]]" by Yuma's "[[Dododo Swordsman (anime)|Dododo Swordsman]]".
