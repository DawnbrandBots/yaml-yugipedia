title: Card Trivia:Rod of Silence - Kay'est
wikitext: |-
  {{Navigation}}

  * This rod appears in the artworks of "[[Guardian Kay'est]]", "[[Power of the Guardians]]" and "[[Really Eternal Rest]]".
  * The altar beneath the weapon and the light descending upon it (in this card's artwork) is similar to other "[[Guardian]]" related weapons:
  ** "[[Butterfly Dagger - Elma]]"
  ** "[[Gravity Axe - Grarl]]"
  ** "[[Twin Swords of Flashing Light - Tryce]]"
  ** "[[Wicked-Breaking Flamberge - Baou]]"
  ** "[[Shooting Star Bow - Ceal]]"
