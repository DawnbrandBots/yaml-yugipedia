title: Card Trivia:Planet Pollutant Virus
wikitext: |-
  {{Navigation}}

  * Seven [[A-Counter]]s appear in this card's artwork.
  * This card is an "[[Alien]]"-[[support]] member of the [[Virus]] [[series]].
  ** This card shares the qualities of the Virus cards, including an alliterative naming scheme, an [[activation condition]] requiring a specific monster to [[Tribute]], and a negative [[Lingering Effect]] against the opponent that lasts until the end of the third turn.
