title: Card Trivia:Cubed Hydradrive Lord
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is named after a [[wikipedia:Cube|cube]], a three-dimensional analogue of a square in geometry.
  ** This concept is reflected in this monster's [[Link Rating]] (3), its [[Summoning condition]] requiring three "[[Hydradrive]]" [[Link Monster]]s as [[material]], its effect surrounding three different [[Attribute]]s.
