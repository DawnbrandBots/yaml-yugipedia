title: Card Trivia:Cockroach Knight
wikitext: |-
  {{Navigation}}

  * This monster's shield features the design of a [[wikipedia:No symbol|general prohibit sign]] over the silhouette of a cockroach, similar to the symbols found on insect repellant spray cans.
  ** This likely references "[[Eradicating Aerosol]]", an [[Insect]] [[anti-support]] card that features an artwork of an insect-repellant spray can, which can work in conjunction with this monster's Insect [[Type]] and effect.
  * This monster's effect reflects the nature of the [[wikipedia:cockroach|cockroach]], which are known to survive almost anything, including decapitation, freezing temperatures, and according to the popular urban myth, a nuclear war.
  * The Spanish print of this card uses the word "''enviada''" instead of "''mandada''", which is the official term for "''[[sent]]''" in that ''[[TCG]]'' branch.
