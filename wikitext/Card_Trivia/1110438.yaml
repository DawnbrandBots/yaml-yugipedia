title: Card Trivia:Cyber Dragon Rakete
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "''rakete''", the German word for "rocket".
  ** This is one of several [[Cyber Dragon (Rush Duel series)|Cyber Dragon]] monsters that features German words in their names, referencing how in the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime and the [[Yu-Gi-Oh! GX (manga)|manga]], [[Zane Truesdale]] (who uses the "[[Cyber]]" [[archetype]]) was referred to by the title of "Kaiser", the German word for "emperor".
