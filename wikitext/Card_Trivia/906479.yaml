title: Card Trivia:Raider's Unbreakable Mind
wikitext: |-
  {{Navigation}}

  * "[[Dark Rebellion Xyz Dragon]]", "[[Raidraptor - Revolution Falcon]]", several "[[Ancient Gear Knight]]s", and the [[Heartland Tower]] appear in this card's artwork.
  ** This card's artwork references the [[Invasion of Xyz Dimension|invasion]] of the [[Xyz Dimension]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * The initials in this card's name ('''R''', '''U''', and '''M''') are a reference to the "[[Rank-Up-Magic]]" [[archetype]], used by both [[Yuto]] and [[Shay Obsidian]] in the anime.
