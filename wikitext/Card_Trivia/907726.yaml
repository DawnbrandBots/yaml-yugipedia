title: Card Trivia:Hatsugai
wikitext: |-
  {{Navigation}}

  * Toy versions of  "[[Block Dragon]]", "[[Doll Monster Bear-Bear]]", "[[F.A. Shining Star GT]]", and the sword of "[[Shiranui Shogunsaga]]", as well as a shirt with the image of "[[Scrap Kong]]", appear in this card's artwork.
  ** Boxes printed with pictures of "[[Marshmallon]]" and "[[Eldlich the Golden Lord]]" can also be seen showcased in the background.
  * The goblins in this card's artwork appear to be the same featured in the artwork of "[[Gift Exchange]]", minus the young goblin with the "Scrap Kong" shirt.
  ** "[[Bunny Ear Enthusiast]]", a card featured in the same set, features the aforementioned goblin wearing the "Scrap Kong" shirt in its artwork. The card's effect implies the goblin kid was unable to join his friend in buying the toys due to being occupied with the bunny themed event.
  ** The adult goblin in this card's artwork has the same "Scrap Kong" shirt; possibly, it is the same goblin as an adult.
  * This card is based on "''hatsugai''" (初買い, lit. "first purchase") a Japanese expression used to refer to going shopping on January 2nd, the same day this card was revealed by Konami in 2023.<ref>{{Cite tweet |author=【公式】遊戯王OCG |user=YuGiOh_OCG_INFO |number=1609882326812577796 |date=January 2, 2023 |title=𝐂𝐘𝐁𝐄𝐑𝐒𝐓𝐎𝐑𝐌 𝐀𝐂𝐂𝐄𝐒𝐒 収録カード公開‼️ ◤初買い◢ |trans-title=𝐂𝐘𝐁𝐄𝐑𝐒𝐓𝐎𝐑𝐌 𝐀𝐂𝐂𝐄𝐒𝐒 Included card revealed‼️ ◤Hatsugai◢ |language=ja}}</ref>

