title: Card Trivia:Black Luster Jersitual
wikitext: |-
  {{Navigation}}

  * This card is a ''[[Rush Duel]]'' [[Jersey]] parody of "[[Black Luster Ritual (Rush Duel)|Black Luster Ritual]]".
  ** This card's activation and effect to [[Special Summon]] "[[Black Luster Soljersey]]" from the [[hand]] is a reference to [[Ritual Summon]]ing, which requires the player to [[Tribute]] monsters equal to the [[Ritual Monster]]'s [[Level]].
  *** More specifically, this card's effect to Special Summon "Black Luster Soljersey" is a reference to how "Black Luster Ritual" can Ritual Summon "[[Black Luster Soldier (Rush Duel)|Black Luster Soldier]]".
  *** Also, this card's activation requirement is also a reference to the first usage of "Black Luster Ritual" in the original [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'']] manga and [[Yu-Gi-Oh! (anime)|anime]], when [[Yami Yugi]] [[Tributed]] his "[[Gaia The Fierce Knight (anime)|Gaia The Fierce Knight]]" and his "[[Kuriboh (anime)|Kuriboh]]" on his [[field]].
  ** This card's additional effect after Special Summoning "Black Luster Soljersey" and "[[Black Luster Soljersey - Envoy of the Drying]]" will increase their respective [[ATK]] from 2500 to 3000, referencing "Black Luster Soldier's" and "[[Black Luster Soldier - Envoy of the Beginning]]'s" 3000 ATK in the ''[[OCG]]''/''[[TCG]]''.
