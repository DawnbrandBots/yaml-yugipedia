title: Card Trivia:Parasite Paranoid
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] counterpart of "[[Parasite Paracide]]".
  ** Similar to the Japanese artwork of "Paracide", this monster is depicted infecting a human soldier by burrowing into their skin.
  * This card's effects reference the appearance of "Parasite Paracide" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where its "parasitizing" effect to change a monster's [[Type]] to [[Insect]] was treated as an [[equip]]-based effect, which is why it was [[negate]]d by the effect of "[[Gearfried the Iron Knight]]". This card can equip itself to a monster and treat it as an Insect monster, and is thus unable to use against most members of the "[[Gearfried]]" [[archetype]].
