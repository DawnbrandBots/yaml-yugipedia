title: Card Trivia:Dream Mirror Recap
wikitext: |-
  {{Navigation}}

  * A chibi version of "[[Morpheus, the Dream Mirror Black Knight]]", and the little girl from "[[Dream Mirror Fantasy]]" and "[[Dream Mirror Oneiromancy]]", as well as the dog from the latter, appear in this card's artwork.
  ** The little girl possesses the same ribbon and a similar hairstyle as "[[Ikelos, the Dream Mirror Sprite]]".
  ** According to this card's artwork, the brother dreamt himself as "[[Morpheus, the Dream Mirror Black Knight]]".
  ** The dog's fur has a similar coat as "[[Phantasos, the Dream Mirror Friend]]".
