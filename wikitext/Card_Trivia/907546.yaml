title: Card Trivia:Parametalfoes Melcaster
wikitext: |-
  {{Navigation}}

  * This card's name is a combination of the element "[[wikipedia:Mercury (element)|Mercury]]" and "Spellcaster".
  ** Specifically, this card may be named after the [https://www.mecholic.com/2017/05/mercast-process-applications-advantages.html?m=1 mercasting/mercast process], an [[wikipedia:Investment casting|investment casting]] method that involves mercury.
  * This card has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Parametalfoes Azortless]]".
