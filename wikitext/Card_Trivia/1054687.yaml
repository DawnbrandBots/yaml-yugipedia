title: Card Trivia:Riskrack Burst Lance
wikitext: |-
  {{Navigation|mode=nongame}}

  * The hilt of the lance in this card's artwork is shaped like the head of "[[Blue-Fang Burst Dragon]]".
  * This card's name is a pun on "risk and luck", referring to its drawback of leaving the equipped monster vulnerable during the opponent's turn.
