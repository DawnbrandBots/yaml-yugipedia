title: Card Trivia:Barrage Blast
wikitext: |-
  {{Navigation}}

  * "[[Number 81: Superdreadnought Rail Cannon Super Dora]]", "[[Superdreadnought Rail Cannon Juggernaut Liebe]]", and "[[Superdreadnought Rail Cannon Gustav Max]]" appear in this card's artwork.
  * This card's Japanese name, "Sweeping Special Attack" (掃射特攻, ''Sōshatokkō'') features the Japanese word for "strafing" (掃射, ''sōsha''), which is a pun on the Japanese term for "train operation" (''Sōsha'').
