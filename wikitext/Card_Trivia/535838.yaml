title: Card Trivia:Gemini Imps
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rise of the Immaculate Imps]]".
  * These monsters are adult forms of the imps from the artwork of "[[Delinquent Duo]]", which can, fittingly, be [[negate]]d by this monster's effect.
  * This monster appears to be a counterpart of "[[Gemini Elf]]", which also depicts twin monsters with blue and purple color schemes.
