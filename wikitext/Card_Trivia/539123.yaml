title: Card Trivia:Berserk Gorilla
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Beast Rising]]", "[[Berserking]]", "[[Brutal Beast Battle]]", "[[Dances with Beasts]]", "[[Lightning Clinch]]", "[[Rage of the Beasts]]", "[[RGB Rainbowlution]]", "[[Sneak Exploder]]", "[[Wild Nature's Release]]", and "[[Zero Sprite]]".
  * In the Italian version of this card, the word "OSCURITÀ" ([[DARK]]) was misprinted as the [[Attribute]] of this card, but the circle is brown as for [[EARTH]]-[[Attribute]] monsters.
  * This monster is likely based on the [[fandom:w:c:dragonball:Great Ape|Great Apes]] from the ''[[wikipedia:Dragon Ball|Dragon Ball]]'' series. Both are large apes, can fire blasts out of their mouths, and show extreme aggression.
