title: Card Trivia:Evenly Matched
wikitext: |-
  {{Navigation}}

  * "[[Enishi, Shien's Chancellor]]", "[[Grandmaster of the Six Samurai]]", "[[Hand of the Six Samurai]]", "[[Great Shogun Shien]]", and "[[Shadow of the Six Samurai - Shien]]" appear in this card's artwork.
  ** The event in this card's artwork appears to be the continuation of the events depicted in the artwork of "[[Face-Off]]".
  ** "Shadow of the Six Samurai - Shien" eventually emerged as the victor of this battle, and "Great Shogun Shien" was defeated and became "[[Legendary Secret of the Six Samurai]]".
  * This card's reveal date ([https://twitter.com/YuGiOh_OCG_INFO/status/877464359634522114 on Twitter] on June 21, 2017) is a reference to the [[wikipedia:Honnō-ji Incident|Honnō-ji Incident]] that occurred on 21 June 1582, when Japanese daimyo [[wikipedia:Oda Nobunaga|Oda Nobunaga]] was betrayed by his general [[wikipedia:Akechi Mitsuhide|Akechi Mitsuhide]], leading to Nobunaga's death.
  ** This card's artwork is also based on the Honnō-ji Incident, with "Great Shogun Shien" being betrayed and attacked by his former subordinate "Shadow of the Six Samurai - Shien".
