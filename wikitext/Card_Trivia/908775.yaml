title: Card Trivia:Astral Kuriboh
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023]]''.
  * This monster is the [[Astral World|Astral]] [[counterpart]] of "[[Rainbow Kuriboh]]".
  ** This monster and "Rainbow Kuriboh" are currently the only [[Level 1]] "[[Kuriboh (archetype)|Kuriboh]]" monsters released that do not have an [[original ATK and DEF]] of 300/200.
  ** This monster's appearance is shared with other members of the "[[Astral (archetype)|Astral]]" [[archetype]] used by [[Astral (manga)|Astral]] in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, as each monster is a counterpart of monsters used by [[Yuma Tsukumo (manga)|Yuma Tsukumo]] in the manga.
