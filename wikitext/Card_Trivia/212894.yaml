title: Card Trivia:Superdimensional Robot Galaxy Destroyer
wikitext: |-
  {{Navigation}}

  * This monster's design features the English letters "G" and "D" on its chest plate, which stands for "Galaxy Destroyer".
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
