title: Card Trivia:Regenesis Dragon
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is based on ''Wayiqra'', which is the Jewish name for the [[wikipedia:Book of Leviticus|Book of Leviticus]], the third book in the [[wikipedia:Torah|Torah]], and which translates to "And He Called".
  ** Fittingly, this monster was listed as the third "[[Regenesis]]" monster to be released in ''[[Alliance Insight]]''.
