title: Card Trivia:Parasite Worm
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, this card's name was unknown while its [[destroy|destruction]] effect depicts the opponent's monster exploding in response to their attack, while in the [[Yu-Gi-Oh! (anime)|anime]], this card's name was given its name while its effect, when [[activate]]d, depicts a worm-like monster that attacks and destroys the opponent's monsters in response to their attack.
