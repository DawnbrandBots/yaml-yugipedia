title: Card Trivia:Malefic Territory
wikitext: |-
  {{Navigation}}

  [[File:Malefic.png|thumb|right|250|[[Paradox]] with "[[Malefic Rainbow Dragon (anime)|Malefic Rainbow Dragon]]" and "[[Malefic Cyber End Dragon (anime)|Malefic Cyber End Dragon]]", with "[[Malefic World (anime)|Malefic World]]" activated, in the ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' movie.]]

  * "[[Malefic Cyber End Dragon]]", "[[Malefic Rainbow Dragon]]", and "[[Malefic World]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' movie, where [[Paradox]] controlled "[[Malefic World (anime)|Malefic World]]", "[[Malefic Cyber End Dragon (anime)|Malefic Cyber End Dragon]]" and "[[Malefic Rainbow Dragon (anime)|Malefic Rainbow Dragon]]", during his [[Duel]] against [[Yami Yugi]], [[Jaden Yuki]], and [[Yusei Fudo]].
  * This card's effects are based on how "[[Malefic]]" monsters were used in the ''Bonds Beyond Time'' movie.
  ** Its effect to change the "Malefic" [[monster effect]], "There can only be 1 face-up "Malefic" monster on the field" to "There can only be 1 face-up "Malefic" monster on the field with the same name", is based on the fact that Paradox used multiple "Malefic" monsters at once in the movie.
  ** Its effect to [[negate]] the effects of face-up "Malefic" monsters on the field during the [[Battle Phase]] is designed to negate the effect of "Malefic" monsters that prevents other monsters from attacking, which did not exist in the movie as multiple "Malefic" monsters were shown attacking in the same turn.

  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the other "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").

