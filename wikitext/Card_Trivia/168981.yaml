title: Card Trivia:Cosmic Blazar Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Creation Pack 01]]''.
  * Three [[Synchro Summon]]ing rings from the ''[[Yu-Gi-Oh! 5D's]]'' anime appear in this card's artwork.
  ** This is a reference to the minimum number of [[Synchro Material]]s for this monster's Synchro Summon.
  * This monster is named after a [[wikipedia:Blazar|blazar]], a subclass of a super bright celestial object powered by a [[wikipedia:Supermassive black hole|supermassive black hole]] in the center of a [[wikipedia:Galaxy|galaxy]].
  * This monster is an [[Card evolutions|upgraded]] [[Delta Accel Synchro Monster|Delta Accel Synchro]] form of "[[Stardust Dragon]]".
  * This monster has a [[Limit Over Accel Synchro Monster|Limit Over Accel Synchro]] [[counterpart]]: "[[Shooting Quasar Dragon]]".
  ** Both are named after a subclass of an [[Wikipedia:Active galactic nucleus|active galactic nucleus]].
  ** Both share the same [[Level]] (12), [[Type]] ([[Dragon]]), [[Monster card type]] ([[Accel Synchro Monster]]), [[equal ATK and DEF|equal]] [[original ATK and DEF]] (4000), and [[Summoning condition]]s (1 [[Tuner Synchro Monster]] + 2+ non-[[Tuner monster|Tuner]] [[Synchro Monster]]s).
  ** Both are depicted in opposite poses in their respective card artworks: this monster is depicted going down to the left, with its head turned to the right, while "Shooting Quasar Dragon" is depicted going up to the right, with its head turned to the left.
  ** This is the ultimate [[signature card]] of [[Yusei Fudo]] in the original timeline of the ''Yu-Gi-Oh! 5D's'' anime, while "[[Shooting Quasar Dragon (anime)|Shooting Quasar Dragon]]" was his ultimate signature card in the new timeline.
  *** However, unlike "Shooting Quasar Dragon", this is a [[WIND]] monster like "Stardust Dragon".
  ** These two monsters share a retrain: "[[Cosmic Quasar Dragon]]"
  * This monster has the highest Level (12) and original [[ATK]] (4000) of all WIND monsters.
  ** This monster also has the highest original [[DEF]] (4000) of all WIND monsters (tied with "[[CXyz Skypalace Babylon]]").
  * This is the first [[List of unseen cards|unseen card]] in the anime or manga to be released in the ''[[OCG]]''/''[[TCG]]''.
