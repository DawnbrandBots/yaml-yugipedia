title: Card Trivia:Dark Fusion
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Avian]]", "[[Elemental HERO Burstinatrix]]", and "[[Evil HERO Inferno Wing]]" appear in this card's artwork.
  * This is the [[signature card]] of [[The Supreme King]].
  * This card is the "[[Evil HERO]]" counterpart of "[[Polymerization]]".
  * This card's invulnerability effect entitled to the Summoned [[Fusion Monster]] are similar to those of "[[Vehicroid Connection Zone]]".
