title: Card Trivia:Magical Mallet
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Custom Pack 01]]''.
  * This card's Japanese name "{{translated name|Magical Mallet|ja}}" ({{name|Magical Mallet|ja}}, ''{{romanized name|Magical Mallet|ja}}'') is identical to the "[[wikipedia:Uchide no kozuchi|uchide no kozuchi]]", a legendary Japanese magic mallet that is said to grant any wish with one swing.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Magical Mallet]]".
  * In {{episode|Yu-Gi-Oh! GX|004|ref}}, [[Chazz Princeton]] described this card as one of the "rare cards" that [[Vellian Crowler|Dr. Vellian Crowler]] gave him.
