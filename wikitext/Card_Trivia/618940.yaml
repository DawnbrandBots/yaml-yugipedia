title: Card Trivia:Speedburst Dragon
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name and the design of its shoulders and the end of its tail are based on a [[wikipedia:Speedloader#Cylindrical_reloaders|cylindrical speedloader]], a device used to reduce the time and effort needed to reload a firearm, in this case, a [[wikipedia:Revolvers|revolver]].
