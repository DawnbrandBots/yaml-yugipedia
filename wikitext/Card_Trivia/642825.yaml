title: Card Trivia:A.I.dle Reborn
wikitext: |-
  {{Navigation}}

  * [[Ai]]'s arm appears in this card's artwork.
  * This card's name is wordplay on "[[wikipedia:Idle (CPU)|idling]]", the term used for a computer processor when it is not used by any other program.
  ** This card's Japanese name (Ａｉドリング・ボーン, ''Aidoringu Bōn'') is a wordplay on "idling" and "reborn", the latter word reflecting its effect to [[Special Summon]] an "[[@Ignister]]" monster from the [[Graveyard]].
