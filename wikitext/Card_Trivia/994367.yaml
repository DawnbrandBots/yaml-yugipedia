title: Card Trivia:Exceed the Pendulum
wikitext: |-
  {{Navigation}}

  * The red and blue [[Pendulum Scale]] crystals appear in this card's artwork.
  ** This monster's eyes, hairstyle, coattails, as well as the background of thic card's artwork, also have the same colors in reference to them.
  * Visually, this monster appears to be based on [[Ray Akaba]], the co-creator of [[Pendulum Monster]]s along with [[Z-ARC]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Beyond the Pendulum]]".
  ** This monster's kanji subtitle, "Magical Swordswoman of Miracles" (奇跡の魔導剣士, ''Kiseki no Madōkenshi'') is similar to that of "[[Enlightenment Paladin]]" (覚醒の魔導剣士, ''Kakusei no Madōkenshi'', "Magical Swordsman of Awakening") and "[[Nirvana High Paladin]]" (涅槃の超魔導剣士, ''Nehan no Chōmadōkenshi'', "Super Magical Swordsman of Nirvana"), two [[Spellcaster]] [[Synchro Monster]]s used by [[Yuya Sakaki]] in the ''Yu-Gi-Oh! ARC-V'' anime.
