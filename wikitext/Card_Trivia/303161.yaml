title: Card Trivia:Artifact Ignition
wikitext: |-
  {{Navigation}}

  * This card appears to be an unknown "[[Artifact]]" monster activating.
  ** More specifically the dark black circle in the center of all of the "Artifacts" lighting up with the "Artifact" emblem as they change from the dormant form depicted in "[[Artifact Sanctum]]" into the activated form depicted in the individual [[Effect Monster]] card art.
