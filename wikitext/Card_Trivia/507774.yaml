title: Card Trivia:The Paths of Destiny
wikitext: |-
  {{Navigation}}

  * "[[Warrior Dai Grepher]]" appears in this card's artwork.
  * This card's heal-or-burn effect is a reference to the storyline of "Warrior Dai Grepher", in which he gets lost in the woods and comes to the fork in the road depicted in the artwork.
  ** If he chooses the brighter path, he will encounter "[[Spirit Ryu]]", who will transform him into "[[Ryu Senshi]]". 
  ** If he chooses the darkened path, he will instead find two more paths ("[[Painful Return]]"). In one he encounters and defeats "[[Guardian Baou]]" and takes his "[[Wicked-Breaking Flamberge - Baou|Wicked-Breaking Flamberge]]" ("[[Morale Boost]]") unaware that the sword ''is'' "Baou", resulting in his possession and corruption into the "[[Dark Lucius]]" monsters ("[[Falling Down]]"). Meanwhile if he takes the second path he transforms into "[[Dark Grepher]]" ("[[Darklight]]").
