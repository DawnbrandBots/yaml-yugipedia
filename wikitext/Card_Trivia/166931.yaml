title: Card Trivia:Pixie Knight
wikitext: |-
  {{Navigation}}

  * This card's effect is a watered-down version of the banned "[[Magician of Faith]]". Both are [[Spellcaster]]s, although "Pixie Knight" is stronger than "Magician of Faith".
  * Despite this card's name, it is neither a [[Fairy]] nor a [[Warrior]].
  * Just like "[[Fairy Guardian]]", this card has "Pixie" in its name (OCG name only for "Fairy Guardian"), also both have effect that deals with Spell card, and both have soldier-like appearance.
