title: Card Trivia:Sevens Road Magician
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck Yuga - Cut Through! Sevens Road!!]]'' and ''[[Half Deck: Spellcaster Type]]'', as well as one of the cover cards of ''[[Starter Deck Set - Yuga vs. Luke]]'', ''[[Deck Mod Pack: Hyperspeed Rush Road!!]]'', and ''[[Megaroad Pack]]''.
  * This monster appears in the artworks of "[[Mighty Gaze of the Sky Emperor]]", "[[Road Magic - Explosion]]", "[[Road Magic - Flowback]]", "[[Road Magic - Tectonic Shift]]", "[[Road Magic - Tempest]]", "[[Road Magic - Uplifter]]", "[[Seven Crossroad]]", "[[Sevens Combine]]", "[[Sevens Glory]]", "[[Sevens Paranormal Fusion]]", "[[Sevens Road Boost]]", "[[Sevens Road Force]]", "[[Sevens Road Presence]]", and "[[Sevens Twin Burst]]", as well as in both artworks of "[[Sevens Wonder Fusion]]".
  ** This monster's dark form appears in the artworks of "[[Darkness Deal]]", "[[Darkness Divine]]", "[[Darkness Greed]]", "[[Darkness Reborn]]", "[[Darkness Restraint]]", and "[[Road Magic - Dark Twilight]]".
  ** A costume of this monster appears in both artworks of "[[Necromaid Stitch]]".
  ** The designs of the three hats in the artwork of "[[Magical Hat Trick]]" are based on this monster's design.
  * This card's artwork features seven cross-shaped symbols, referencing the "7" motif of the [[Sevens Road]] [[series]].
  ** This monster corresponds to the center symbol in the Sevens Road crest, seen in the design of "Master of the Sevens Road".
  ** This symbol also appears in the artworks of "Darkness Reborn", "Majesty of the Sevens Road", "Master of the Sevens Road", "[[Sevens Chariot]]", "Sevens Combine", "Sevens Road Presence", "Sevens Twin Burst", "Strong Boy Sevens Road", and the six [[Road Magic]] Spells featuring this monster.
  *** A blue version of this symbol also appears in the artworks of "Sevens Paladin" and "Sevensgias the Magical Dragon Knight".
  *** A purple version of this symbol also appears in the artworks of "[[Roadstar Gladimagia]]" and "[[Sevens Knight the Multistrike Dragon Knight]]".
  * This monster has eight alternate forms:
  ** An [[wikipedia:April Fools' Day|April Fools' Day]] [[counterpart]]: "[[Strong Boy Sevens Road]]".
  ** A [[retrained]] counterpart: "[[Sevens Fear Magician]]".
  ** Six [[Fusion Monster|Fusion]] forms:
  *** With "[[Darkness Zerorogue]]": "[[Magician of Dark Sevens]]".
  *** With "[[Gearpold the Magically Armored Beast]]": "[[Sevens Chariot]]".
  *** With "[[Multistrike Dragon Dragias]]": "[[Sevensgias the Magical Dragon Knight]]" and "[[Sevens Knight the Multistrike Dragon Knight]]".
  *** With "[[Sevens Road Witch]]": "[[Master of the Sevens Road]]".
  *** With "[[Swordsman of Roadstar]]": "[[Sevens Paladin]]"
  * This monster has a [[Celeb Rose]] counterpart: "[[Celeb Rose Magician]]".
  ** Both monsters share the same [[Level]] (7), [[Type]] (Spellcaster), and [[original ATK and DEF]] (2100/1500).
  * This is the [[signature card]] of [[Yuga Ohdo]] in the ''[[Yu-Gi-Oh! SEVENS]]'' and ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, as well as his [[Yuga Ohdo (manga)|manga counterpart]] in the ''[[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!]]'' manga.
  * This monster is similar to "[[Decode Talker]]", one of the ace monsters of the protagonist of the [[Yu-Gi-Oh! VRAINS|previous anime series]], [[Yusaku Fujiki]].
  ** Both monsters are visually similar, being dark-colored with golden highlights and wielding a sword.
  ** Both monsters are DARK [[Attribute]].
  ** Both monsters have effects to increase their own [[ATK]].
  ** Both are the only signature cards of a main protagonist not to have 2500 ATK
  ** "Sevens Road Magician" and "Decode Talker" each represent their owner's connection to another character ([[Otes]] and [[Ai]], respectively).
  ** This is also the first protagonist signature card to be used in another anime and by [[Yuna Goha|another character]] other than Yuga and Otes, since [[Dimitri]] used "[[Dark Magician (anime)|Dark Magician]]" in ''[[Yu-Gi-Oh! GX]]''.
  * Like many cards used by Yuga, this monster and "Sevens Road Witch" are homages to cards used by [[Yugi Muto]], in this case "[[Dark Magician]]" and "[[Dark Magician Girl]]", respectively.
  ** This monster and "Dark Magician" are both Level 7 [[DARK]] [[Attribute]] [[Spellcaster]] [[Type]] monsters used as the main ace monster by their respective protagonist.
  ** This monster and "Sevens Road Witch" break from the visual theming used by all other Sevens Road monsters; they wear similar clothing in the same colors as each-other's, rather than matching their background.
  * As of 2025, long after the end of the ''Yu-Gi-Oh! SEVENS'' era, this is the first signature card of a main protagonist not to have any [[signature move]] card associated with it.
