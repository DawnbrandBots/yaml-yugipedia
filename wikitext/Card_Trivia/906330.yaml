title: Card Trivia:Scareclaw Belone
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Primitive Planet Reichphobia]]", "[[Scareclaw Alternative]]", and "[[Scareclaw Arrival]]".
  * This card is named after [[wikipedia:Aichmophobia|belonephobia]], the fear of sharp objects.
  ** Fittingly, this monster carries sharp needles on its sides.
