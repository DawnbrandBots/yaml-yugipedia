title: Card Trivia:Noble Arms - Arfeudutyr
wikitext: |-
  {{Navigation}}

  * This sword appears in the artworks of "[[Ignoble Knight of Black Laundsallyn]]" and "[[Noble Arms Museum]]".
  ** A red version of this sword appears in the artwork of "[[Ignoble Knight of High Laundsallyn]]".
  *** This is fitting, since this card's name is (presumably) a Welsh spelling/pronunciation of Arondight, which is the sword of [[wikipedia:Lancelot|Lancelot]].
  **** The stone's carving looks like a heart, which is pierced by the sword, following along with Lancelot's legend.
  * As depicted in the artwork of "Ignoble Knight of High Laundsallyn", this sword's blade appears to be composed of light, with metal parts near the tip.
  ** This contrasts slightly with its [[:File:NobleArmsArfeudutyr-JP-Manga-DZ-NC.png|manga appearance]], which had no metal parts near the tip of the blade, and lacked the arrowhead-shape appearance on the tip.
