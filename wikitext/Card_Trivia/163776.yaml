title: Card Trivia:Lavalval Dragun
wikitext: |-
  {{Navigation}}

  * This card's artwork seems to be based on [[Wikipedia:Quetzalcoatlus|Quetzalcoatlus]].
  * [[Wikipedia:Dragoon|Dragoon]] is not a [[Wikipedia:Dragon|Dragon]] - The word dragoon originally meant mounted infantry, who were trained in horse riding as well as infantry fighting skills. However, usage altered over time and during the 18th century, dragoons evolved into conventional light cavalry units and personnel.
  * This monster may be a grown version of "[[Laval Coatl]]" with "[[Laval Blaster]]" riding on it.
  ** These two above cards' Levels add up to this card's Level.
  * This is the second "Laval" [[Dragon]]-[[Type]] monster. The first one was "[[Lavalval Dragon]]".
