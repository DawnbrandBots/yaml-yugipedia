title: Card Trivia:Strength of Prophecy
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Strength (Tarot card)|Strength]], which can be either the eighth or eleventh  [[wikipedia:Major Arcana|Major Arcana]] card, depending on the Tarot deck.
  ** This card's Japanese name is from the [[wikipedia:Tarot of Marseilles|Tarot of Marseilles]]' name for the "Strength" arcana, "''La Force''."
  ** The woman in the Strength tarot card is often accompanied by a lion, which is why this monster wields an axe shaped like a lion's head.
  * This monster's axe appears in the artwork of "[[World of Prophecy]]".
