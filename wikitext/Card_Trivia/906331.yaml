title: Card Trivia:Kashtiratheosis
wikitext: |-
  {{Navigation}}

  * "[[Kashtira Riseheart]]" appears in this card's artwork.
  ** This card's artwork seems to depict "Kashtira Riseheart" transforming into "[[Kashtira Arise-Heart]]".
  * This card's name is a portmanteau of the words "Kashtira" and "Apotheosis", which is reflected in its depiction of "Kashtira Riseheart" transforming into a divine form.
