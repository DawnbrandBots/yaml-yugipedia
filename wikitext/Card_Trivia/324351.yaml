title: Card Trivia:Dark Contract with the Swamp King
wikitext: |-
  {{Navigation}}

  * "[[King of the Swamp]]" appears in this card's artwork.
  ** Fittingly, this card's name matches with that of "King of the Swamp", and both cards' effects allow the player to easily perform a [[Fusion Summon]].
  * This card has an [[Card evolutions|upgraded]] version: "[[Forbidden Dark Contract with the Swamp King]]".
