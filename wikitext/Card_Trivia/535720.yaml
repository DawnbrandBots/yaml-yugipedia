title: Card Trivia:Horus the Black Flame Dragon LV6
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Level Up!]]".
  * "[[Dark Magical Circle]]", with an [[Eye of Wdjat]] in its center, appears in this card's artwork.
  * This monster is the [[Card evolutions|upgraded]] form of "[[Horus the Black Flame Dragon LV4]]" and has an upgraded form: "[[Horus the Black Flame Dragon LV8]]".
  ** The artwork of "Level Up!" depicts this monster's transformation into "Horus the Black Flame Dragon LV8", which also reveals that the arms of its "LV8" form are inside this monster's chest.
  * This monster has a "[[Metaphys]]" [[Synchro Monster|Synchro]] counterpart: "[[Metaphys Horus]]".
