title: Card Trivia:Ultimate Leo Utopia Ray
wikitext: |-
  {{Navigation}}

  [[File:ZWLeoArms-JP-Anime-ZX-NC-2.jpg|thumb|right|300|"[[Number C39: Utopia Ray (anime)|Number C39: Utopia Ray]]" [[equip]]ped with "[[ZW - Leo Arms (anime)|ZW - Leo Arms]]" as seen in the anime.]]

  * This is one of the [[cover card]]s of ''[[Animation Chronicle 2021]]''.
  * This monster appears in the artwork of "[[ZW - Leo Arms]]".
  * This monster is a [[retrained]] counterpart of "[[Number C39: Utopia Ray]]".
  ** Visually, this monster is a combination of "Utopia Ray" and "ZW - Leo Arms".
  *** This monster's effect is based on the anime effect of "[[ZW - Leo Arms (anime)|ZW - Leo Arms]]", which negated the effects of a monster on the [[field]] and halved its [[ATK]] during either player's turn, while "Leo Arms" was equipped to a monster.
  * Along with "[[Ultimate Dragonic Utopia Ray]]", this is one of the two "[[Utopia (archetype)|Utopia]]" [[Xyz Monster]]s which do not have "[[Number]]" in its printed name.
  ** This is also of the two "[[Number]]" monsters which have a [[name condition]] that treats them as being part of the archetype.
  * This monster is the first ''OCG/TCG'' original monster to receive a Summoning animation in ''[[Yu-Gi-Oh! Duel Links]]''.

