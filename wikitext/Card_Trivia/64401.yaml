title: Card Trivia:Gladiator Beast Heraklinos
wikitext: |-
  {{Navigation}}
  * This card is named after [[wikipedia:Heracles|Heracles]], the Greek name of the hero [[wikipedia:Hercules|Hercules]], a demi-god and a great figure of mythology.
  * This is one of the few [[Gladiator Beast]]s that does not have the ability to return to the Deck after battling.
  * A portion of most "[[Gladiator Beast]]s" can be seen on [[Gladiator Beast Heraklinos]] making it a [[Wikipedia:Chimera (mythology)|Chimera]] Warrior. There are:
  ** [[Gladiator Beast Alexander]]'s wings and hair.
  ** [[Gladiator Beast Spartacus]]' lower body, tail, bone fragments and halberd
  ** [[Gladiator Beast Murmillo]]'s upper waist armor piece
  ** [[Gladiator Beast Hoplomus]]'s plates as the shield
  ** [[Gladiator Beast Dimacari]]'s upper body and accessories as leg-guards.
  ** [[Gladiator Beast Bestiari]]'s chest armor piece, wing armguards, and spearhead attached on Spartacus' halberd.
  ** [[Gladiator Beast Laquari]]'s face, shoulders, waist armor pieces, and "dragoons/options" attached at the bottom of Spartacus' halberd next to Bestiari's spearhead.
  ** [[Gladiator Beast Secutor]]'s cannons mounted on the shield and waist armor piece.
  ** [[Gladiator Beast Darius]]'s upper legs.
  ** [[Gladiator Beast Samnite]]'s upper wings.
