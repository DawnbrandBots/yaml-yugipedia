title: Card Trivia:Flower Cardian Maple with Deer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Flower Stacking]]", "[[Fraud Check]]", "[[Recardination]]", and "[[Super All In!]]".
  * "[[Valerifawn, Mystical Beast of the Forest]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Maple with Deer", one of the special cards in the "Maple" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (10) references how the "Maple with Deer" card falls under the month of October, the tenth month of the year.
  ** This monster's [[original ATK and DEF]] (1000/1000) references how the "Maple with Deer" card is a ''tane'' card, which is worth ten points.
