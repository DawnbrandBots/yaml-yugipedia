  * "[[Number C65: King Overfiend]]", "[[Number C102: Archfiend Seraph]]", and "[[Number C104: Umbral Horror Masquerade]]" appear in this card's artwork.
  ** Fittingly, this card is used by [[Vector]] to [[Special Summon]] the above-mentioned "[[Number C10X]]" monsters while he controlled "King Overfiend" in {{episode|ZEXAL|136|ref}}.
