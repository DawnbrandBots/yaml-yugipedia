title: Card Trivia:Inzektor Exa-Stag
wikitext: |-
  {{Navigation}}

  * Seeing as "[[Inzektor Exa-Beetle]]" is based on [[wikipedia:Kamen Rider Kabuto (character)|Kamen Rider Kabuto]], this card may be themed on [[wikipedia:Kamen Rider Gatack|Gatack]] whose motif is a [[wikipedia:stag beetle|stag beetle]].
  ** This is further supported by the fact that Gatack was Kabuto's partner. Thus it makes sense that both would be the [[Xyz Monsters]] of their Archetype, and also why this monster is one Rank lower than "Exa-Beetle".
  *** Also, this monster is colored silver and "Exa-Beetle" is colored gold, which usually associates with ranking 2nd and 1st place respectively.
  * This monster appears in the artwork of "[[Zekt Conversion]]" and "[[Xyz Discharge]]".
  * Much like Exa-Beetle, this card may also be based on the other Shell God from ''B-Fighter Kabuto'', Kuwaga Titan. (Known in America as Boron from ''Beetleborg Metallix''.)
  * Another similarity this card has to the "Beetleborg Metallix" show is the fact that it's silver just like the character "Titanium Silver Borg" whom is also based off of a Stag Beetle.
  * For some reason, the Spanish name for this card is the same as "[[Inzektor Exa-Beetle]]" but in inverse order: "Exa-Escarabajo Inzektor" for "Exa-Beetle" and "Inzektor Exa-Escarabajo" for "Exa-Stag".
  * When this card's name and the name "Exa Beetle" are combined, it spells "Inzektor Exa-Stag Beetle"
  ** A stag beetle is a type of beetle, much like these cards are thought to be.
