title: Card Trivia:Zap Mustung
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a portmanteau of "[[wikipedia:Mustang|mustang]]" and "[[wikipedia:Stun gun|stun gun]]", which reflects this monster's appearance.
  ** "Stun gun" is reflected by the fact that this monster has two metal prods on its forehead, as well as electricity running throughout its body.
