title: Card Trivia:Chimera Hydradrive Dragrid
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is the first [[Link Rating|Link]]-5 [[Link Monster]] (other than [[Illegal]] [[Match winner]]s).
  ** Also, in {{episode|VRAINS|099|ref}}, [[Ai]] confirmed that this was the first in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, as there was no Link-5 Link Monster in all of [[LINK VRAINS]] before [[Bohman]] created this card.
  * This monster's heads each represent one of the six [[Attribute]]s and their corresponding [[Ignis]] (except for the center head):
  ** Purple: [[DARK]] - (Ai)
  ** Red: [[FIRE]] - [[Flame (character)|Flame]]
  ** Blue: [[WATER]] - [[Aqua (character)|Aqua]]
  ** Orange: [[EARTH]] - [[Earth (character)|Earth]]
  ** Green: [[WIND]] - [[Windy]]
  ** Yellow: [[LIGHT]] - [[Lightning]]
  * This card has two alternate "[[Chimera Hydradrive Draghead]]" forms:
  ** FIRE - Flame: "[[Chimera Hydradrive Draghead - Flame]]"
  ** WATER - Aqua: "[[Chimera Hydradrive Draghead - Aqua]]"
  ** This card's effect allows the player to [[Special Summon]] a "Chimera Hydradrive Draghead" monster for each Attribute, but [[List of unseen cards#4 other "Chimera Hydradrive Draghead" monsters|those other cards]] were never created in the anime as Bohman's [[Neuron Link]] was eventually stopped.
