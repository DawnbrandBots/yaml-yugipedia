title: Card Trivia:Litmus Doom Swordsman
wikitext: |-
  {{Navigation}}

  * The monster's name is derived from the [[wikipedia:Litmus|Litmus test]], a method used to test the [[wikipedia:pH|pH]] (or "potential of hydrogen") of a chemical by exposing a solution or piece of paper containing dyes extracted from [[wikipedia:Lichen|lichens]], which change color to indicate the chemical's acidity level.
  ** Fittingly, when this monster debuted in {{episode|GX|021|ref}}, it was [[Ritual Summon]]ed by [[Tribute|Tributing]] two copies of "[[Hydrogeddon (anime)|Hydrogeddon]]", which is based on the element [[wikipedia:Hydrogen|hydrogen]].
  ** The colors shown in litmus dyes to indicate the lowest and highest pH levels are red and blue respectively, which are also the respective border colors of [[Trap Card]]s and [[Ritual Monster]]s. This is reflected in the background of this card's artwork, which features a divided red and blue color scheme, as well as this monster's Ritual type and effects centered around Trap Cards.
