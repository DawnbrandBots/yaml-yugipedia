title: Card Trivia:Perfectron Hydradrive Dragon
wikitext: |-
  {{Navigation}}

  * [[Lightning|Lightning's]] crest appears on this monster's torso.
  * This is the first "[[Hydradrive]]" monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) of all [[legal]] monsters in the ''OCG''/''TCG''.
  ** This monster, along with "[[Five-Headed Link Dragon]]" has the highest original [[ATK]] of all [[Link Monster]]s.
  *** This monster's original ATK of 5000 in the ''OCG''/''TCG'' is a reference to its first effect in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, where it gains five [[Hydradrive Counter]]s after it is [[Special Summon]]ed from the [[Extra Deck]] and gains 1000 ATK for each Hydradrive Counter.
  * This monster's ''OCG''/''TCG'' effect that allows it to be simultaneously [[EARTH]], [[WATER]], [[FIRE]], [[WIND]] and [[LIGHT]] [[Attribute]] is a reference to how its user, [[Bohman]], has absorbed five of the six [[Ignis]], who each represented one of the different Attributes ([[Earth (character)|Earth]], [[Aqua (character)|Aqua]], [[Flame]], [[Windy]] and Lightning).
  ** This monster's [[Link Rating]] of 5 likely also represents the total number of Ignis that Bohman had absorbed into himself, while also representing the number of Attributes this monster can be treated as, which is a gimmick among the [[Link 2 Monster Cards|Link-2]] or higher "Hydradrive" [[Link Monster]]s.
  ** This monster's ''OCG''/''TCG'' effect to become unaffected by the effects of opponent's monsters with the same Attribute is a reference to the main gimmick of the "Hydradrive" Link Monsters, in which they feature [[anti-support]] effects against an opponent's monster with the same Attribute. Ironically, this monster's [[Perfectron Hydradrive Dragon (anime)|anime counterpart]] is the only [[Link 2 Monster Cards|Link-2]] or higher "Hydradrive" Link Monster to not possess any Attribute-related effect.
  ** The fact that this monster cannot become [[DARK]] Attribute is due to the fact that the DARK Ignis, [[Ai]], was the only Ignis that was not absorbed by Bohman in the anime.
