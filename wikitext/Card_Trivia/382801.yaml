title: Card Trivia:Metalfoes Adamante
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Adamant|Adamant]], a mythical metal of incredible hardness.
  * This monster is a [[Counterpart|Fusion counterpart]] to "[[Metalfoes Steelen]]" after the effects of "[[Metalfoes Fusion]]".
  * This monster appears on the artwork to "[[Metalfoes Combination]]."
