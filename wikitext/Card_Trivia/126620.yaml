title: Card Trivia:The Third Sarcophagus
wikitext: |-
  {{Navigation}}

  * The [[Eye of Wdjat]] appears in this card's artwork.
  * This card is based off of the [[wikipedia:Ancient Egyptian Burial customs|real-world structure of ancient Egyptian sarcophagi]] where the mummified body would be held inside of multiple, consecutively smaller coffins made of different materials and styles. This card depicts an ornate gold-and-wood coffin, which would rest inside of [[The Second Sarcophagus|another wooden coffin]]. These coffins tended to be highly ornate and reflected the economic status of the deceased in their decoration; ranging from merely bright-painted wood for common people to gold-and-jewel inlay for royalty.
  ** The design of this sarcophagus in particular is likely based on the famous tomb of [[wikipedia:Tutankhamun|Tutankhamun]], an ancient Egyptian pharaoh who was killed in his later teenage years and placed in a golden ornate sarcophagus.
  * The "[[Spirit of the Pharaoh]]" is likely inside this sarcophagus, given how it resembles the aforementioned monster's overall design. This also reflects how this card is the final [[Sarcophagus]] card required to [[Special Summon]] "Spirit of the Pharaoh".
