title: Card Trivia:The Unstoppable Exodia Incarnate
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[The Infinite Forbidden]]''.
  * This monster appears in the artwork of "[[Obliterate!!! Blaze]]".
  * "[[Millennium Ankh]]" appears on this monster's chest.
  * This monster is a [[retrained]] [[Fusion Monster|Fusion]] counterpart of "[[The Legendary Exodia Incarnate]]".
  * This monster's Japanese name, "Phantom Summoned God Exodia", is taken from {{chapter|Yu-Gi-Oh!|38|ref}} and {{chapter|Yu-Gi-Oh!|39|ref}}, where [[Sugoroku Mutou (manga)|Sugoroku Mutou]] and [[Dark Yugi (manga)|Dark Yugi]] each use the name to describe the complete "Exodia". (In the official English manga, these instances are translated as "Summoned God, Exodia" and "Forgotten God, Exodia", respectively.)
  ** The name is also mentioned during [[Yami Yugi]]'s internal dialogue in {{episode|Yu-Gi-Oh!|1|ref}} while looking at his [[hand]], which contained the four "[[Forbidden One]]" [[Normal Monster]]s before he [[draw|drew]] his last card, as he considers the "[[Exodia the Forbidden One]]" the only way out of his situation against [[Seto Kaiba]]'s three "[[Blue-Eyes White Dragon]]s".
  ** Its English name, "The Unstoppable Exodia Incarnate", is derived from two separate scenes from the English dub of {{episode|Yu-Gi-Oh!|1|ref}}. One is from a flashback where [[Solomon Muto]] explains to [[Yugi Muto]] that "''[[Duel Monsters]]'' contains only one unstoppable monster: Exodia", and the other is after Yami Yugi draws his last card, declaring "My grandpa's Deck has no pathetic cards, Kaiba. But it does contain... the unstoppable Exodia."
  * This monster's effects to gain [[ATK]] equal to its controller's [[Life Points]] and make its controller lose 1000 Life Points during each of their [[Standby Phase]]s reference how [[Exodia the Forbidden One (character)|Exodia the Forbidden One]] drew ''[[ba]]'' (or life force) from [[Shimon Muran]] during the battle against [[Zorc Necrophades]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
