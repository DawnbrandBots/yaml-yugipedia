title: Card Trivia:Zoodiac Whiptail
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zodiac Sign]]".
  * This monster is based on the [[wikipedia:Chinese zodiac|Chinese zodiac]] sign of the [[wikipedia:Snake (zodiac)|Snake]].
  ** This monster's first effect to [[attach]] itself to a [[Beast-Warrior]] [[Xyz Monster]] during either player's turn references how in The Great Race, the Snake hitched a ride on one of the Horse's hooves.
  ** This monster's second effect to grant a Beast-Warrior Xyz Monster it is attached to the ability to [[banish]] a monster that it battles references how the Snake startled the Horse and the Snake slithered across the finish line to become the sixth animal in the Chinese Zodiac.
  * This monster's whip is wielded by "[[Metaltron XII, the True Dracombatant]]".
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018412339498582024 Bilibili] and [https://weibo.com/7406309913/5119032845669741 Weibo] at 10:00 AM (China Standard Time) on January 4, 2025, which was the fourth quarter of the Si hour in the traditional Chinese timekeeping system.
