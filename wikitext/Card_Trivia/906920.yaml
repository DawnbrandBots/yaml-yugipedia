title: Card Trivia:G Golem Pebble Dog
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "pebble" and "[[wikipedia:Bulldog|Bulldog]]".
  * This monster's effect to [[add]] to the [[hand]] or [[Special Summon]] another copy of itself references how dogs often hunt together in packs.
