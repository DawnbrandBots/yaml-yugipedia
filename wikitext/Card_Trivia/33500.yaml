title: Card Trivia:Spacegate
wikitext: |-
  {{Navigation}}

  * This card's artwork reference a scene from ''[[wikipedia:2001: A Space Odyssey|2001: A Space Odyssey]]'', in which Dave Bowman approaches the mysterious monolith near Jupiter and suddenly finds himself travelling through a vortex of lights.
  ** This card's Japanese name, "Stargate", references the science fiction media franchise, ''[[wikipedia:Stargate|Stargate]]'', which features the titular portal device which opens a wormhole to instantly travel across the cosmos.
  *** This card's Japanese naming scheme is reflected in this card's effect to place [[Gate Counter]]s on it, which resembles twinkling stars. Fittingly, this card's effect can also [[Special Summon]] a monster from the [[hand]] with a [[Level]] (represented by stars) equal to or less than the number of Gate Counters on it.
