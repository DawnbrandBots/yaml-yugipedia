title: Card Trivia:Double Interlock
wikitext: |-
  {{Navigation}}

  * "[[Autorokket Dragon]]", "[[Borreload Riot Dragon]]", and "[[Magnarokket Dragon]]" appear in this card's artwork.
  ** This card's name, artwork, and effects reference "[[Rapid Trigger]]" and "[[Heavy Interlock]]" (known as "Heavy Trigger" in Japanese). The artworks of those three [[Spell Card]]s depict a scene: "Heavy Interlock" depicts "Borreload Riot Dragon" charging an attack; this card depicts "Riot Dragon" firing "Autorokket Dragon" and "Magnarokket Dragon"; and "Rapid Trigger" depicts the two "[[Rokket]]" monsters spiraling forward.
