title: Card Trivia:Vishwar Lambadi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Party Up]]".
  * This monster is a ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] of "[[Vishwar Randi (Rush Duel)|Vishwar Randi]]".
  ** The Japanese pronunciation of "Lambadi" (ランバディ ''Ranbadi'') is a portmanteau of "Randi" (ランディー ''Randī'') and "[[wikipedia:Lambada|lambada]]" (ランバダ ''Rambada'').
