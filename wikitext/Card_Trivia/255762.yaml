title: Card Trivia:Line Promotion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Line World]]" and four pieces used in the game of [[Wikipedia:Shogi|shogi]] ("promoted pawn", "promoted silver", "promoted lance" and "promoted rook") appear in this card's artwork.
  ** This card's artwork and effect are based on the [[wikipedia:Shogi#Promotion|promotion]] gameplay mechanic in the game of shogi where a piece gets promoted into a more powerful piece when they reach the promotion zones, which allows them to increase their range of movements, similar to how this card's effect allows the effect of "[[No. 72: Line Monster Chariot Hisha (manga)|No. 72: Line Monster Chariot Hisha]]" (the only known "[[Line Monster]]" affected by this effect) to [[destroy]] up to two additional monsters the opponent [[control]]s.
