title: Card Trivia:Arcana Force VI - The Lovers
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Arcana Call]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Lovers|The Lovers]].
  ** This monster's number "VI" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (1600) reference how The Lovers is the sixth trump card of the Major Arcana Tarot.
  * This monster's appearance resembles the [[wikipedia:Flatwoods Monster|Flatwoods Monster]], a supposed UFO-related entity sighted in Flatwoods, West Virginia, keeping in relation with the extraterrestrial theme of the "[[Arcana Force]]" archetype.
