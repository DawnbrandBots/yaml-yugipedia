title: Card Trivia:Decode Destruction
wikitext: |-
  {{Navigation}}

  [[File:Vrains_005.png|thumb|right|200|"[[Decode Talker (anime)|Decode Talker]]" after striking down "[[Gouki The Great Ogre (anime)|Gouki The Great Ogre]]".]]

  * "[[Decode Talker]]" appears in this card's artwork.
  ** This card's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! VRAINS|attack name]] of "[[Decode Talker (anime)|Decode Talker]]" in the ''[[Yu-Gi-Oh! VRAINS]]'' anime: "Decode End" (original) / "Decode Destruction" (English dub).
  ** "Decode Talker's" pose and angle in this card's artwork are taken from {{episode|VRAINS|005|ref}}, specifically from the scene where [[Yusaku Fujiki|Playmaker]] [[attack]]ed and [[destroy]]ed "[[Gouki The Great Ogre (anime)|Gouki The Great Ogre]]" with "Decode Talker", winning his [[Speed Duel]] against [[George Gore|The Gore]].
  * This card is the first [[signature move]] [[counterpart]] related to a monster from the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
