title: Card Trivia:Starving Venom Fusion Dragon of the Four Heavenly Dragons
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Starving Venom Fusion Dragon]]".
  ** This monster's name is a reference to how "Starving Venom Fusion Dragon" is one of the [[Four Dimensional Dragons]], which are also known as the "Four Heavenly Dragons" in the original Japanese version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's [[archetype condition]] to treat it as a "[[Predaplant]]" monster references how "[[Starving Venom Fusion Dragon (anime)|Starving Venom Fusion Dragon]]" is primarily used by [[Yuri]], who uses the "Predaplant" [[archetype]].
  ** This monster's effect to [[Fusion Summon]] a [[DARK]] monster using materials from either field including itself references "[[Super Polymerization]]", another card used by Yuri.
