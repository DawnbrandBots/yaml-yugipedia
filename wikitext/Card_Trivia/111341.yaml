title: Card Trivia:Fallen Paradise
wikitext: |-
  {{Navigation}}

  * The foreground in this card's artwork appears in the artworks of "[[Divine Abyss of the Sacred Beast]]" and "[[Fallen Paradise of the Sacred Beasts]]".
  * This card references the [[wikipedia:Fall of man|Fall of Man]], an event depicted early in the [[Wikipedia:Bible|Christian Bible]], in which [[wikipedia:Adam and Eve|Adam and Eve]] are banished from the [[wikipedia:Garden of Eden|Garden of Eden]] for disobeying [[Wikipedia:God in Christianity|God in Christianity]].
  ** This card's name references ''[[wikipedia:Paradise Lost|Paradise Lost]]'', an epic poem written by [[wikipedia:John Milton|John Milton]], which recounts the Fall of Man from the Garden of Eden.
  ** This card's artwork features a barren wasteland, a dead tree, and a single apple on the ground. This references how Adam and Eve disobeyed God by eating the [[wikipedia:Forbidden fruit|forbidden fruit]] from the [[wikipedia:Tree of the knowledge of good and evil|Tree of the Knowledge of Good and Evil]] (which is traditionally depicted as an apple), and are banished from the Garden of Eden and forced to live out the rest of their mortal lives outside of Paradise.
  *** This card's [[activation condition]] in the anime requires the opponent to have an active [[Field Spell Card]], which (prior to the year 2014) would [[send]] that opponent's Field Spell to the [[Graveyard]] and replace it with this card, further referencing the banishment of Adam and Eve into the barren wastelands outside Paradise.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect, allowing the player to [[draw]] two cards if they control any of the [[Sacred Beast]]s, is an alteration of its effect in the anime, which allows the player to [[add]] two cards from their [[Deck]] to their [[hand]]. In the anime, this effect was used while [[Kagemaru]] [[control]]led the Sacred Beasts.
  * This card has a [[Retrained]] "[[Sacred Beast]]" [[counterpart]]: "[[Fallen Paradise of the Sacred Beasts]]".
