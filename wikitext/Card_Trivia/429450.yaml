title: Card Trivia:Shiranui Style Samsara
wikitext: |-
  {{Navigation}}

  * "[[Shiranui Sunsaga]]" and "[[Shiranui Spectralsword]]" appear in this card's artwork.
  * This card depicts a ''[[wikipedia:Torii|shime torii]]'', the simplest type of the iconic Japanese gate, through which the transition from the profane to the sacred is symbolically marked.
  * The location depicted in this card's artwork appears to be the same one as in the artwork of "[[Mayakashi Return]]".
