title: Card Trivia:Deck Destruction Virus
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card has "DDV" as its initials, the same as "[[Deck Devastation Virus]]", which is considered to be a "[[Virus Card]]".
  * This card's English name may be a nod to the original Japanese name of "[[Crush Card Virus]]".
  * Despite saying it activates when a DARK Fiend-Type monster is destroyed, this card was used with Peten The Dark Clown which is a Spellcaster-Type monster.
