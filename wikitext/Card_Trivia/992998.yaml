title: Card Trivia:Xyz Armor Fortress
wikitext: |-
  {{Navigation}}

  [[File:BlackRayLancer-JP-Anime-ZX-NC-SharkFortress.png|thumb|250px|"[[Black Ray Lancer (anime)|Black Ray Lancer]]", being given a second attack by the effect of "[[Shark Fortress (anime)|Shark Fortress]]".]]

  * This monster is an "[[Armored Xyz (archetype)|Armored Xyz]]" retrain of "[[Shark Fortress]]".
  ** This monster's armor is based on the armor appearing in the artwork of "[[Full-Armored Xyz]]".
  * This monster's rocket launcher likely references the scene in {{episode|ZEXAL|84|ref}} in which "[[Black Ray Lancer (anime)|Black Ray Lancer]]" is given a similar weapon by the effect of "[[Shark Fortress (anime)|Shark Fortress]]".
