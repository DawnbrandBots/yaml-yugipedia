title: Card Trivia:Total Defense Shogun
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Collectible Tins 2004]]''.
  * This monster appears in the artworks of "[[Defender's Mind]]" and "[[Guard Off]]".
  * This is the first card that features an effect that allows the monster to attack while in [[Defense Position]].
