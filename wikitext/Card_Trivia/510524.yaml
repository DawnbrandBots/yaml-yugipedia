title: Card Trivia:Elemental HERO Avian
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cross Change]]", "[[Dark Fusion]]", "[[EN Shuffle]]", "[[Feather Shot]]", "[[Fifth Hope]]", "[[Feather Storm]]", "[[Generation Next]]", "[[Hero Mask]]", "[[H.E.R.O. Flash!]]", "[[HERO's Bond]]", "[[Mirage Tube]]", the fourth artwork of "[[Polymerization]]", "[[Power Charger]]", "[[Soul Union]]", and "[[Spiritual Fusion]]".
  * This card is one of the [[cover card]]s of ''[[Starter Deck 2006]]''.
  * This monster is likely based on the DC Comics superhero, [[wikipedia:Hawkman|Hawkman]] and/or the Marvel comics superhero [[wikipedia:Warren Worthington III|Archangel]], keeping in relation with the Western comics design of the "Elemental HERO" archetype.
  ** This monster is also likely based on the DC Comics superhero, [[wikipedia:Nightwing|Nightwing]] due to their respective masked bird-themed costumes and nomenclature. It can also be argued that "Avian's" presumed position as the leader of his group which consists of "[[Elemental HERO Burstinatrix|Burstinatrix]]", "[[Elemental HERO Bubbleman|Bubbleman]]", "[[Elemental HERO Sparkman|Sparkman]]", and "[[Elemental HERO Clayman|Clayman]]" as seen in the artwork of "[[Fifth Hope]]", which mirrors Nightwing's as the leader of the [[wikipedia:Teen Titans|Teen Titans]].
