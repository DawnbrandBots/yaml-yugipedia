title: Card Trivia:Chronomaly Sol Monolith
wikitext: |-
  {{Navigation}}

  * This monster is likely based on the [[wikipedia:Aztec sun stone|Aztec sun stone]], a late post-classic [[wikipedia:Mexica|Mexica]] sculpture that was discovered underneath [[wikipedia:Zócalo|Zócalo]], the main square of [[wikipedia:Mexico City|Mexico City]] during the repair of the Mexico City Cathedral. The sun stone was used by the [[wikipedia:Aztec|Aztecs]] to record a cyclical solar year, which consisted of thirteen twenty-day months, with each day named and associated with a cardinal compass direction.
