title: Card Trivia:Checkmate
wikitext: |-
  {{Navigation}}

  * "[[Infernalqueen Archfiend]]" and "[[Terrorking Archfiend]]" appear in this card's artwork.
  * Some of the "[[Archfiend]]" monsters share a common theme of paying LP during the Standby Phase, all of which are [[wikipedia:Chess|chess]] themed, which includes the monsters shown in this card's artwork. This card's ''[[TCG]]'' name is based on the [[wikipedia:Checkmate|checkmate]] game position in chess.
  ** However, this card's ''[[OCG]]'' name is based on the "[[wikipedia:Discovered attack|discovered attack]]", a chess tactic which moves a chess piece out of the way to reveal an attack on an opposing chess piece. This card's effect reflects this, as it can [[Tribute]] an "Archfiend" monster to allow "Terrorking Archfiend" to attack directly.
  *** Despite this, this card's artwork and effect depicts "Terrorking Archfiend" to be the one to be declaring a direct attack, which [[wikipedia:King (chess)|kings]] are incapable of doing in chess.
