title: Card Trivia:Twilight Ninja Nichirin, the Chunin
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the Japanese word for "sun" (ニチリン, ''Nichirin''), which appears in the background of this card's artwork.
  ** This monster's title is based on "''chūnin''", a middle rank of [[wikipedia:Ninja|ninja]] who have demonstrated their capability to supervise or train the lower rank of ninjas, or ''genin''.
