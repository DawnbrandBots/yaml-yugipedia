title: Card Trivia:Kitchen Dragonmaid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragonmaid Hospitality]]", "[[Dragonmaid Downtime]]", "[[Dragonmaid Send-Off]]", "[[Dragonmaid Tidying]]", and "[[Sweet Roommaid]]".
  * This monster is the maid form of "[[Dragonmaid Tinkhec]]".
  ** This monster's Japanese name is based on a [[wikipedia:Still room|still room]], a room in large houses used to prepare compounds.
