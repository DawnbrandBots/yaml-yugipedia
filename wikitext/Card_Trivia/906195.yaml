title: Card Trivia:Performage Trapeze High Magician
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Animation Chronicle 2024]]'' and ''[[Maze of the Master]]''.
  * This monster is based on a [[Wikipedia:Trapeze|trapeze artist]], a circus performer who performs acrobatic and aerialist stunts with a trapeze, a short horizontal bar hung by ropes from a ceiling support.
  ** This monster's appearance is likely based on the [[Wikipedia:Ringmaster (circus)|ringmaster]], a signature performer in circus performances who serves as the master of ceremonies, often depicted wearing a large top hat and a bright waistcoat. The ringmaster is sometimes the owner and the artistic director of the circus, which reflects how this monster has the highest [[original ATK and DEF]] (2700/2200) of all "[[Performage]]" monsters.
  * This monster is the [[Ranked-Up]] form of "[[Performage Trapeze Magician]]".
