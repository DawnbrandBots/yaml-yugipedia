  * This is one of the [[cover card]]s of ''[[Special Summon Evolution]]''.
  * This monster is named after [[wikipedia:Shuten-dōji|Shuten-dōji]], a mythical leader of the ''[[wikipedia:Oni|oni]]'' in [[wikipedia:Ōeyama (mountain range)|Mt. Ooe]] in [[wikipedia:Japanese mythology|Japanese mythology]].
