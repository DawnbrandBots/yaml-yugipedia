title: Card Trivia:Hidden Springs of the Far East
wikitext: |-
  {{Navigation}}

  * "[[Shien's Footsoldier]]", "[[Shien's Squire]]", "[[Acrobat Monkey]]", and "[[Hero of the East]]" appear in this card's artwork.
  ** The first three monsters are likely a reference to the popular phenomenon of [[wikipedia:Jigokudani Monkey Park|Japanese monkeys bathing in hot springs]].
