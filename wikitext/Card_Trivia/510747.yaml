title: Card Trivia:Shining Friendship
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Beckoning Light]]", "[[Lightwave Tuning]]", "[[Ray of Hope]]", "[[Shimmering Friendship]]", and "[[Speed Spell - Ignition]]".
  * This card has a [[recolored counterpart]]: "[[Petit Angel]]".
  * This card has a [[retrained]] [[counterpart]]: "[[Shining Piecephilia]]".
  * In the international version of ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', while it is [[face-up]], this monster wears a crown over its head in place of its halo, like "Petit Angel".
