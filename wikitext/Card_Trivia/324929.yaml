title: Card Trivia:Infernoid Seitsemas
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Baal (demon)|Baal]], one of the seven princes of Hell.
  * ''Seitsemäs'' translates as ''seventh'' in Finnish, referring to this monster's Level.
  * This monster appears in the artwork of "[[Void Launch]]".
  * The tip of this monster's staff resembles the signature helix imagery seen in the "[[Qli]]" monsters.
