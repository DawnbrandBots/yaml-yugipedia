title: Card Trivia:Destiny HERO - Double Dude
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Dr. Jekyll and Mr. Hyde (character)|Dr. Jekyll and Mr. Hyde]], the main characters from the ''[[wikipedia:Strange Case of Dr Jekyll and Mr Hyde|Strange Case of Dr Jekyll and Mr Hyde]]'', keeping in relation with the British theme of the "[[Destiny HERO]]" archetype.
  ** In the novel, Dr. Henry Jekyll is an English doctor who suppresses evil impulses, so he creates a serum to hide this, only to transform into the monstrous manifestation of his inner evil, Edward Hyde. This monster's design and appearance in the ''[[Yu-Gi-Oh! GX]]'' anime reflects this, as this monster can transform from a gentlemanly monster into a brutish monster, who unleashes its violence with its second attack.
  * According to a [http://www.pojo.biz/board/showthread.php?p=4497988#post4497988 Pojo post] by Dan Scheidegger (an Upper Deck Entertainment employee), this card was very likely to be named "Destiny Hero - Double Doctor" in its ''[[Power of the Duelist]]'' release if it weren't for "some scripts [having] to be written before the cards come out," which was presumably the 4Kids Entertainment script for {{episode|GX|068|ref}}.
