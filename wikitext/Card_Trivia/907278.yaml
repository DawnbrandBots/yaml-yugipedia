title: Card Trivia:Branded Loss
wikitext: |-
  {{Navigation}}

  * "[[Despian Tragedy]]", "[[Incredible Ecclesia, the Virtuous]]", "[[Ad Libitum of Despia]]", "[[Swordsoul Auspice Chunjun]]", and "[[Despian Comedy]]" appear in this card's artwork.
  ** The "[[Despia]]" monster in the right side of this card's artwork also appears in the artwork of "[[Branded Opening]]".
  ** The fireball seen in the background is possibly the forming of "[[Alba-Lenatus the Abyss Dragon]]", as ''[[The Valuable Book EX 2 card storylines]]'' mentions the fight taking place in the artwork of "[[Branded Fusion]]" created a "mass of energy almost like the sun", from which "Alba-Lenatus" emerged.
