title: Card Trivia:Infernoble Knight Oliver
wikitext: |-
  {{Navigation}}

  * This monster is based on the legendary paladin [[wikipedia:Oliver (paladin)|Oliver]].
  * This card has a [[Synchro Monster]] counterpart: "[[Infernoble Knight Captain Oliver]]".
  * A flaming version of "[["Infernoble Arms - Hauteclere"]]" appears in this card's artwork. This is fitting, as [[wikipedia:Hauteclere|Hauteclere]] was Oliver's sword.
