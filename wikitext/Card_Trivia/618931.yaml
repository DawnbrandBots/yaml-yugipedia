title: 'Card Trivia:Number 60: Dugares the Timeless'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This card's name is a pun on "Duodecim" (the Latin word for 12, which is a reference to the number of hours on a clock face) and "[[wikipedia:Agares|Agares]]" (a demon whose is sometimes described as an old man carrying a hawk on his fist).
  ** Fittingly, this card has 1200 [[ATK]] and [[DEF]].
  ** This card's number (60) is also a reference to the number of seconds in a minute, and the number of minutes in an hour.
  ** 12 flames appears at this monster's feet in this card's artwork.
  ** This card's effect is meant to reflect its control over time, allowing a player to both go back and forth, but at a cost on the next turn.
