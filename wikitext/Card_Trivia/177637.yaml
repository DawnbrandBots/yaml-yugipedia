title: Card Trivia:Statue Dark Magician Girl
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is a "[[Statue]]" version of "[[Dark Magician Girl]]".
  * This card is the only "Statue" monster that is based off of an [[Effect Monster]].
  * Due to the nature of this archetype, the [[effect]] of the original "Dark Magician Girl" isn't used by this card.
