title: Card Trivia:The Legendary Fisherman II
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[The Legendary Fisherman]]", and has an upgraded form itself, "[[The Legendary Fisherman III]]".
  ** Just as "The Legendary Fisherman" resembles [[Mako's father]], this monster resembles [[Mako Tsunami]], sharing his slender figure, younger appearance (when compared to base "The Legendary Fisherman") and hairstyle; the only difference between the two, however, is the headband: Mako's is blue with white waves printed on it, while this monster's headband is red.
