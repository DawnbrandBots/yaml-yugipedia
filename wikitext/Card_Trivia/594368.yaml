title: Card Trivia:Witchcrafter Potterie
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Witchcrafter Celebration]]", "[[Witchcrafter Confusion Confession]]", "[[Witchcrafter Creation]]", "[[Witchcrafter Patronus]]", "[[Witchcrafter Pupils]]", and "[[Witchcrafter Walpurgis]]".
  * This monster's name is derived from "''poterie''", the French word for "pottery".
  * This monster has a [[retrained]] counterpart: "[[Witchcrafter Terracottan]]".
