title: Card Trivia:Centur-Ion Auxila
wikitext: |-
  {{Navigation}}

  * This monster is a [[Card evolutions|combined]] [[Synchro Monster|Synchro]] form of "[[Centur-Ion Atrii]]", "[[Centur-Ion Chimerea]]", and "[[Centur-Ion Gargoyle II]]".
  * This monster is named after an [[wikipedia:Auxilia|Auxilia]], a non-Roman citizen who served in the Roman army.
  * This monster's draconic motif references how it was released in the [[wikipedia:Year of the Dragon|Year of the Dragon]], like "[[Centur-Ion Legatia]]", a monster with rabbit motif, was released in the [[wikipedia:Year of the Rabbit|Year of the Rabbit]].
