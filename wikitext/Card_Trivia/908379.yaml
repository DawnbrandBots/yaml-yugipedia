title: Card Trivia:Runick Tip
wikitext: |-
  {{Navigation}}

  * The crystal from the artwork of "[[Runick Allure]]" appears in this card's artwork.
  ** The proto-Germanic rune [[wikipedia:Tiwaz (rune)|Tiwaz]] (ᛏ) also appears in this card's artwork, under the red sword icon and on the gemstone on the sword.
  ** According to this card's concept art, the crystal that appears in this card's artwork is the pointed tip of [[wikipedia:Gungnir|Gungnir]], the spear of the god [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** This card's artwork seems to be based on a [[wikipedia:Glossary of video game terms|skill tree]] from [[wikipedia:Role-playing video game|RPG]] videogames.
