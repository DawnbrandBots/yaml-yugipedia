title: Card Trivia:Night's End Sorcerer
wikitext: |-
  {{Navigation}}

  * This monster's scythe and bats appear in the artwork of "[[Tempest Magician]]".
  ** "Tempest Magician" is "[[Magical Exemplar]]" holding this monster's scythe, and the former can be [[Synchro Summon]]ed by using the latter two monsters as [[Synchro Material]].
  *** Fittingly, all three monsters debuted as [[TCG exclusive|''TCG''-exclusive]] cards in 2008.
  *** While this monster's scythe is depicted as transparent in this card's artwork, its sprite in the ''[[Yu-Gi-Oh! World Championship]]'' video games such as ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'' show it as opaque.
  * "[[Night's End Administrator]]" is an [[Card evolutions|upgraded]] Synchro [[counterpart]] of this monster, as indicated by its Synchro Material requirement, which specifically lists this monster, in addition to their similar names, appearances, and effects.
  * This monster appears to be an older counterpart of the rabbit-like boy in the artwork of "[[Droll & Lock Bird]]".
