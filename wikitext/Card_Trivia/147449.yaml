title: Card Trivia:Raging Sacred Curse
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on Leyding, one of the three [[wikipedia:Legcuffs|fetters]] used by the [[Aesir|Nordic Gods]] to restrain the wolf creature [[wikipedia:Fenrir|Fenrir]] along with [[Gleipnir, the Fetters of Fenrir|Gleipnir]] and [[Dromi the Sacred Shackles|Dromi]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** This card's English name is likely a translation error of the Japanese pronunciation of "Layding" (''Rējingu''), which is pronounced similarly to the word "raging".
