title: Card Trivia:Terrors of the Overroot
wikitext: |-
  {{Navigation}}

  * An [[Card evolutions|older]] form of "[[Red Blossoms from Underroot]]" appears in this card's artwork.
  * This card's Japanese name, "Detachment from the Living World" (現世離レ ''Utsushiyobanare''), is a pun on the Japanese idiom for "otherworldliness" or "detachment from the real world" (浮き世離れ ''Ukiyobanare'').
