title: Card Trivia:Metal Illusionist
wikitext: |-
  {{Navigation}}

  * This monster is the [[Metal counterpart]] of "[[Copycat]]".
  ** The faint image of the metal monster from the artwork of "[[Metalmorph]]" appears in this monster's mirror.
  *** This, and this monster's effect to [[support]] the "[[Metalmorph (archetype)|Metalmorph]]" [[archetype]], reference the scene in {{chapter|Yu-Gi-Oh!|122|ref}} (and its [[Yu-Gi-Oh! (anime)|anime]] [[Yu-Gi-Oh! - Episode 031|adaptation]]) where "[[Copycat (manga)|Copycat]]" was used to copy the effect of "[[Metalmorph (manga)|Metalmorph]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ("[[Magic Metal Force]]" in the [[Yu-Gi-Oh! (anime)|anime]]).
  ** This monster's effect to increase its [[Level]] by 4 during the opponent's turn is based on the fact that "[[Copycat (anime)|Copycat]]" is a [[Level 5]] monster in the ''Yu-Gi-Oh!'' anime.
