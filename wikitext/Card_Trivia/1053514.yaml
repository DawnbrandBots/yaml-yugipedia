title: Card Trivia:Woes of the White Forest
wikitext: |-
  {{Navigation}}

  * Monstrous caricatures of "[[Diabell, Queen of the White Forest]]", "[[Rciela, Sinister Soul of the White Forest]]", and "[[Silvera, Wolf Tamer of the White Forest]]" appear in this card's artwork.
  ** All of them are "[[White Forest]]" [[Synchro Monster]]s that can be [[Synchro Summon]]ed with this card's effect.
