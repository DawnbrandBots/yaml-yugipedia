title: Card Trivia:Shining Sarcophagus
wikitext: |-
  {{Navigation}}

  * This card is a [[retrain]]ed counterpart of "[[Gold Sarcophagus]]".
  ** This card's [[Continuous Spell Card]] property is based on how "[[Gold Sarcophagus (manga)|Gold Sarcophagus]]" remains on the [[field]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, while in the [[Yu-Gi-Oh! (anime)|anime]], its [[Gold Sarcophagus (anime)|anime counterpart]] is treated as a Continuous Spell Card.
  ** This card's first effect is based on the fact that the effect of "[[Gandora the Dragon of Destruction (manga)|Gandora the Dragon of Destruction]]" in the manga only destroyed monsters on the field, which meant "[[Gold Sarcophagus (manga)|Gold Sarcophagus]]" remained on the [[field]] after "Gandora" used its effect. The effect of "[[Gandora the Dragon of Destruction]]" and most of its retrains in the ''[[OCG]]''/''[[TCG]]'' destroy all other cards on the field, so this effect allows this card to remain on the field after those monsters use their effects.
  ** This card's second effect is based on the effect of "Gold Sarcophagus" in the ''OCG''/''TCG'', which [[add]]s any card from the [[Deck]] to the [[hand]] (after two turns), while this card can add a card from the Deck to the hand that mentions this card's name.
  ** This card's third effect and artwork are based on a scene during the [[Rite of the Duel]] in the manga (the [[Battle Ritual]] in the anime), where [[Yugi Mutou (manga)|Yugi Mutou]] (and his [[Yugi Muto|anime counterpart]]) opens the "Gold Sarcophagus" to [[reveal]] the "[[Monster Reborn (manga)|Monster Reborn]]" (and its [[Monster Reborn (anime)|anime counterpart]]) he had previously [[banish]]ed with its effect. This allows him to [[negate]] [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in anime)'s own "Monster Reborn" when the latter attempts to use it to [[Special Summon]] "[[Slifer the Sky Dragon (manga)|Slifer the Sky Dragon]]" (and its [[Slifer the Sky Dragon (anime)|anime counterpart]]) from his [[Graveyard]]; this negation is depicted as if "Slifer" is [[sent]] to the Graveyard after being Summoned.
