  * "[[Scareclaw Tri-Heart]]" and "[[Visas Starfrost]]" appear in this card's artwork.
  ** This card's artwork may depict "Scareclaw Tri-Heart" transforming into "[[Scareclaw Light-Heart]]", after "Visas Starfrost" dealed him a decisive blow thereby purging the evil within its heart.
