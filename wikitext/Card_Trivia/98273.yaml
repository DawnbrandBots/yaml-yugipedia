title: Card Trivia:Soul Devouring Bamboo Sword
wikitext: |-
  {{Navigation}}

  * This card's effect is based on that of the [[Forbidden]] card "[[Yata-Garasu]]", which requires a "[[Bamboo Sword]]" [[Equip Spell Card]] to [[activate]].
  ** Similarly, the effect of "[[Golden Bamboo Sword]]" is based on that of the Forbidden card "[[Pot of Greed]]", which has a similar [[activation condition]].
