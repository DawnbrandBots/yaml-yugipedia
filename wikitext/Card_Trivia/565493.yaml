title: Card Trivia:Galaxy-Eyes Solflare Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Galaxy Trance]]".
  * This card's name is a reference to [[wikipedia:Solar flare|solar flare]].
  * This monster is a [[Card evolutions|downgraded]] [[Link Monster|Link]] form of "[[Galaxy-Eyes Photon Dragon]]".
  * This card is the rival [[counterpart]] of "[[Galaxy Satellite Dragon]]".
  ** Both cards are [[Link Rating|Link]]-2 Link Monsters with 2000 [[ATK]].
  ** Both have the same [[Link Arrow]]s ([[Bottom-Left]] and [[Bottom-Right]]).
  ** This monster is a downgraded form of "Galaxy-Eyes Photon Dragon", while "Galaxy Satellite Dragon" is a downgraded form of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]".
