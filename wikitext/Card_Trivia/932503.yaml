title: Card Trivia:Roaring Firestorm Volcalize Phoenix (L)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Volcalize Compound]]" and "[[Volcalizing Salamandeus]]".
  ** This monster appears in the artworks of "[[Chemicalize Devil Burst]]" and "[[Chemicalize Tropos Rapier]]" in [[Maximum Mode]] (together with "[[Roaring Firestorm Volcalize Phoenix]]" and "[[Roaring Firestorm Volcalize Phoenix (R)|Roaring Firestorm Volcalize Phoenix [R]]]").
  * This card, along with "Volcalize Phoenix" and "Volcalize Phoenix [R]", are the first [[Maximum Monster]]s to have different [[Type]]s among each other; this card is [[Thunder]] Type, while the aforementioned monsters are [[Pyro]] Type and [[Aqua]] Type, respectively.
