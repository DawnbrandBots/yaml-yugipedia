title: Card Trivia:Kaiser Vorse Raider
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] counterpart of "[[Vorse Raider]]".
  ** This monster is "[[Vorse Raider]]" with the skin color of "[[Kaiser Sea Horse]]". Both are regular monsters of [[Kaiba]].
  ** This monster's green skin and red armor may be a reference to how "Vorse Raider" was depicted in ''[[Yu-Gi-Oh! 5D's]]'' and ''[[Yu-Gi-Oh! ARC-V]]''.
  * This card appears to incorporate the effects of "[[Slate Warrior]]", another monster used by Kaiba.
