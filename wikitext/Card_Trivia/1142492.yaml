title: Card Trivia:Dedicated Gaia The Fierce Knight
wikitext: |-
  {{Navigation}}

  * The object in the artwork of "[[Chaos Ceremonial Object]]" appears in this card's artwork.
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Gaia The Fierce Knight (Rush Duel)|Gaia The Fierce Knight]]".
  ** This monster references a scene in {{chapter|Yu-Gi-Oh!|118|ref}} where "[[Gaia the Fierce Knight (manga)|Gaia the Fierce Knight]]" was transformed with "[[Black Luster Ritual (manga)|Black Luster Ritual]]" to [[Ritual Summon]] "[[Black Luster Soldier (manga)|Black Luster Soldier]]".
