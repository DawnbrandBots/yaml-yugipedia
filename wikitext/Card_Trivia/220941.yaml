title: Card Trivia:Constellar Star Cradle
wikitext: |-
  {{Navigation}}

  * "[[Constellar Pollux]]", "[[Constellar Rasalhague]]", "[[Evilswarm Castor]]" and "[[Gem-Knight Seraphinite]]" appear in this card's artwork.
  ** "Evilswarm Castor" is depicted missing the red "[[Evilswarm]]" emblem from his hip plate. According to the [[Duel Terminal Master Guide card storylines#"Gem-Knight Seraphinite" and "Constellar Rasalhague" Successfully Revive "Pollux" and "Castor"|Duel Terminal Master Guide card storylines]] "Evilswarm Castor" and "Constellar Pollux" killed each other in combat, but "Gem-Knight Seraphinite" and "Constellar Rasalhague" were able to resurrect him and purge the virus from his body before the virus could corrupt "Pollux".
  *** The inclusion of "Constellar Rasalhague" in this card's artwork and in the storyline references the legend of [[wikipedia:Asclepius|Asclepius]], the god of medicine and healing in [[wikipedia:Greek mythology|Greek mythology]] who ascended to godhood after he began resurrecting souls, but was smote for the crime against nature.
  * This card's Japanese name features the pronunciation of "Super-Rebirth" (超新生 ''Chōshinsei''), which is a pun on the Japanese word for "supernova" (超新星 ''Chōshinsei'').
