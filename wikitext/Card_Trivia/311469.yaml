title: Card Trivia:Dragon Horn Hunter
wikitext: |-
  {{Navigation}}

  * This card has an older counterpart: "[[Dragon Core Hexer]]".
  * This monster appears in the artwork of "[[Revenge Rally]]", which seems to depict the events after this card's flavor text
  ** Judging by the events of that card, the [[Dragon]] corpse that appears in this card's artwork might be "[[Masked Dragon]]".
  * The card was the first ''[[TCG]]''-exclusive [[Pendulum Monster]].
  * This card was the first Pendulum Monster to [[support]] [[Normal Monster]]s.
  * This monster's armor bears a strong resemblance to the ones worn by "[[Dark Blade]]" and "[[Underworld Fighter Balmung]]".
  ** All three of them are related to [[Dragon]]s: This monsters hunts them, "[[Dark Blade]]" tames them, and "[[Underworld Fighter Balmung]]" is named after a dragonslayer sword, [[wikipedia:Balmung|Balmung]].
