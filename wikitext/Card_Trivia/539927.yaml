title: Card Trivia:Ectoplasmer
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Volcanic Cyclone]]".
  * This card's name is derived from [[wikipedia:ectoplasm (cell biology)|ectoplasm]], which generally refers to the outer part of a cell's [[wikipedia:cytoplasm|cytoplasm]]. It can also refer to the physical substance that supposedly manifests as a result of "[[wikipedia:Energy (esotericism)|spiritual energy]]" or "[[wikipedia:Parapsychology|psychic phenomenon]]".
