title: Card Trivia:Galaxy Serpent
wikitext: |-
  {{Navigation}}

  * This card is the first "[[Galaxy]]" card that was first released only in the ''[[TCG]]''.
  ** This is also the first "Galaxy" [[Tuner monster]] and the first "Galaxy" [[Normal Monster]] to be released.
  * A [[wikipedia:constellation|constellation]] appears on this monster's body - specifically, what appears to be an adjusted version of the [[wikipedia:Hydra (constellation)|Hydra]] constellation.
  ** This, combined with the phrase "Sea of Stars" in this card's descriptive text, lends support to the idea that "serpent" in this card's name is taken from "[[wikipedia:sea serpent|sea serpent]]".
