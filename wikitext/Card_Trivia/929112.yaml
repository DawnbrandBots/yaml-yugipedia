title: Card Trivia:Burning Dragon
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Special Summon]]ing [[Activation condition|condition]] is based on the effect of "[[Dragon's Scent]]", a [[Spell Card]] used by [[Chazz Princeton (manga)|Chazz Princeton]] to Special Summon [[Burning Dragon (manga)|this monster]] from his since his opponents [[control]]led at least two monsters in {{chapter|GX|048|ref}}.
  * This card's artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, specifically from the panel showing [[Burning Dragon (manga)|this monster]] being Summoned.
