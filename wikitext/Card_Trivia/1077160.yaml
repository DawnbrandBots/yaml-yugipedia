title: Card Trivia:Maximum Gadget the Moving Fortress
wikitext: |-
  {{Navigation}}

  * "[[Green Gadget (Rush Duel)|Green Gadget]]" appears in this card's artwork.
  * This monster appears in the artworks of "[[Boot-Up Pulverize - Gear Crusher]]" and "[[Mobile Deployment Gear Start]]" in [[Maximum Mode]] (together with "[[Maximum Gadget the Moving Fortress (L)|Maximum Gadget the Moving Fortress [L]]]" and "[[Maximum Gadget the Moving Fortress (R)|Maximum Gadget the Moving Fortress [R]]]").
  * This monster is a ''[[Rush Duel]]'' [[counterpart]] of "[[Stronghold the Moving Fortress]]".
  * This is the first [[Maximum Monster]] whose effect does not make it [[Level]] [[Level 10 Monster Cards|10]], even when in Maximum Mode. It is likely a reference to how "Stronghold the Moving Fortress" is a Level [[Level 4 Monster Cards|4]] monster capable of having 3000 [[ATK]].
