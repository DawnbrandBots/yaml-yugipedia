title: Card Trivia:Everlasting Alloy
wikitext: |-
  {{Navigation}}

  * "[[Jinzo]]" appears in this card's artwork.
  ** This card's name and effect are based on a scene during [[Katsuya Jonouchi and Esper Roba's Duel (manga)|Katsuya Jonouchi and Esper Roba's Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (and its counterpart in the [[Yu-Gi-Oh! (anime)|anime]]) where [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] attempted to age [[Esper Roba (manga)|Esper Roba's]] "[[Jinzo (manga)|Jinzo]]" via the effect of "[[Time Wizard (manga)|Time Wizard]]" but failed due to the special alloys in the armor of "Jinzo". It may also more generally reference the innate immunity to "magical attacks and effects" that [[Machine]] monsters are said to have in the original series.

