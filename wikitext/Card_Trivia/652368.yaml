title: Card Trivia:Salamangreat Zebroid X
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Zebroid|zebroid]], the offspring of any cross between a [[wikipedia:Zebra|zebra]] and any other [[wikipedia:Equus (genus)|equine]].
  * The "X" in this card's name is a reference to [[Xyz Monster]]s, the monster type supported by its effect.
  * When this card was released in the ''[[TCG]]'' in April 2020, there were no valid Xyz Monsters that could be Summoned with its effect, as the only Rank 4 "Salamangreat" Xyz Monster in the ''[[OCG]]'', "[[Salamangreat Blaze Dragon]]", had not yet been released in the ''TCG''. "Salamangreat Blaze Dragon" was not released in the ''TCG'' until May 2022, in ''[[Ghosts From the Past: The 2nd Haunting]]''.
