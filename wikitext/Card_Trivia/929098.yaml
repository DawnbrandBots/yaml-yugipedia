title: Card Trivia:Last Day of the Pretty☆Witch
wikitext: |-
  {{Navigation}}

  * "[[Dian Keto the Security Master]]", "[[Sparkhearts Girl]]", and "[[Whispering Fairy]]" appear in this card's artwork.
  ** This card's artwork depicts "Dian Keto the Secutiy Master" pursuing "Sparkhearts Girl" and "Whispering Fairy", the former monster and the latter two monsters which are used by [[Mimi Imimi]] and [[Yuga Ohdo]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime, respectively, referencing Mimi's role as a minor antagonist who uses the [[Bubble Era]] [[series]].
  * This card's name is a play on "[[Last Day of Witch]]", another [[Spellcaster]] anti-support card.
