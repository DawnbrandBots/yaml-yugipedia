title: Card Trivia:Power Bond (Skill Card)
wikitext: |-
  {{Navigation}}

  * This is the [[Skill Card]] version of "[[Power Bond]]".
  ** This Skill Card is a [[Zane]]-[[Type]] and it corresponds with [[Syrus Truesdale]]'s Deck in ''[[Speed Duel GX: Midterm Paradox]]'', despite the fact that none of Zane's cards appear in the set. This references how Zane gives Syrus "Power Bond" in the ''[[Yu-Gi-Oh! GX]]'' anime.
