title: Card Trivia:Future Fusion Nova
wikitext: |-
  {{Navigation}}

  * "[[Cyber End Dragon]]" appears in this card's artwork.
  * This card is a [[retrained]] "[[Cyber Dragon (archetype)|Cyber Dragon]]" counterpart of "[[Future Fusion]]".
  ** This card's effect to [[Fusion Summon]] using monsters from the [[Deck]] is a reference to the original effect of "[[Future Fusion (anime)|Future Fusion]]" in the ''[[Yu-Gi-Oh! GX]]'' anime. 
  *** Additionally, its effect to Fusion Summon a [[LIGHT]] [[Machine]] [[Fusion Monster]] and specifically mentioning "[[Cyber Dragon]]" among the monsters [[sent]] from the [[Deck]] to the [[Graveyard]] is based on the multiple instances in the ''Yu-Gi-Oh! GX'' anime when [[Zane Truesdale]] used "Future Fusion" to Fusion Summon "[[Cyber End Dragon (later anime)|Cyber End Dragon]]" by sending his three copies of "[[Cyber Dragon (later anime)|Cyber Dragon]]" to the Graveyard.
  * This is the first [[Spell Card]] revealed to have [[extended art]].
