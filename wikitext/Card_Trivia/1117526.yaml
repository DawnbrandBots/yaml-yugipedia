title: Card Trivia:Leo Wizard the Dark Fiend
wikitext: |-
  {{Navigation}}

  [[File:LeoWizard-DM4-JP-VG.png|thumb|200px|The artwork and stats of "[[Leo Wizard (DM4)|Leo Wizard]]" in ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]''.]]
  * This monster is a [[retrained]] counterpart of "[[Leo Wizard]]".
  ** This monster's artwork is a redrawn version of the artwork of "[[Leo Wizard (DM2)|Leo Wizard]]" in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series.
  *** This monster is also depicted overlapping a white border, referencing the presentation of cards in the earlier ''Duel Monsters'' installments.
  ** This monster's [[DARK]] [[Attribute]] and effect to [[destroy]] a [[LIGHT]] monster without [[damage calculation]] during the [[Damage Step]] reference how "Leo Wizard" is a [[Dark (Alignment)|Dark]] [[Alignment]] monster, which is strong against the [[Light (Alignment)|Light]] Alignment in the ''Duel Monsters'' video games.
  ** This monster's first effect references the gameplay of ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'', where monsters with more than 1350 [[ATK]] and/or [[DEF]] are all [[Level 5]] or higher, and require a [[Tribute]].
