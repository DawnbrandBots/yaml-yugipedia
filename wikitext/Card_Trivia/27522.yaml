title: Card Trivia:Blue-Eyes Toon Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Pegasus]]'' and the box of ''[[Legendary Duelists: Season 1]]''.
  * This monster appears in the artwork of "[[Dragonic Stitch]]".
  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Blue-Eyes White Dragon]]".
  * In the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]], [[Seto Kaiba]] dislikes this monster, as he sees it as a disgrace to the original "Blue Eyes White Dragon".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|109|ref}}, specifically from the panel where [[Blue-Eyes Toon Dragon (manga)|this monster]] takes form.
