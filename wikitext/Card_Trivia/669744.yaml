title: Card Trivia:Sky Striker Ace - Kaina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sky Striker Maneuver - Scissors Cross]]".
  ** Pieces of this monster also appear in the alternate artwork of "[[Sky Striker Mecha - Widow Anchor]]".
  * This monster's name is derived from "''kaina''", the Japanese word for "arm", reflecting this monster's close-combat mechanical limbs.
