title: Card Trivia:Plasma Eel
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster and "[[Holding Arms (anime)|Holding Arms]]" serve as replacements for "[[Viser Des (manga)|Viser Des]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** All three monsters share the same [[Attribute]] ([[DARK]]), [[Level]] (4), and [[original ATK and DEF]] (500/1200) and are used by [[Yami Marik]].
  *** This monster shares the same [[Machine]] [[Type]] as "Viser Des" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  ** All three monsters feature a similar effect that [[target]]s an opponent's monster and prevent them from being [[destroyed by battle]].
