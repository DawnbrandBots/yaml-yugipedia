title: Card Trivia:Bujingi Crow
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Three-legged crow|Yatagarasu]], or the three-legged crow, of East Asian mythology.
  ** It also carries the [[wikipedia:Yata no Kagami|Yata no Kagami]] (Mirror of Yata) on its chest, referring to its name.
  * This monster serves as the shield for "[[Bujintei Kagutsuchi]]", as supported by the artwork of "[[Bujin Regalia - The Mirror]]".
