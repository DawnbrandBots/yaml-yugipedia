title: Card Trivia:Raider's Knight
wikitext: |-
  {{Navigation}}

  * This monster seems to be an [[Card evolutions|upgraded]] form of "[[The Phantom Knights of Break Sword]]".
  ** Both are "[[The Phantom Knights]]" [[Xyz Monster]]s who feature an [[original ATK]] of 2000 and feature effects to [[destroy]] cards and [[Xyz Summon]] another Xyz Monsters.
  * This is the only "[[Raidraptor]]" monster to not be a [[Winged Beast]] monster, being a [[Warrior]] instead.
  ** This mirrors "[[Raider's Wing]]", which is the only "The Phantom Knights" monster to not be a Warrior monster, being Winged Beast instead.
