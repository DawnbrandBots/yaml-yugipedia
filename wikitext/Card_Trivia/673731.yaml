title: Card Trivia:Five-Headed Link Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Overload]]''.
  * This monster is a [[retrained]] [[Link Monster|Link]] counterpart of "[[Five-Headed Dragon]]".
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  * This monster along with [[Perfectron Hydradrive Dragon]] has the highest [[ATK]] of all [[Link Monster]]s.
  * This monster has the highest number of [[Link Material]]s required for its [[Link Summon]] in the ''OCG''/''TCG'', at any 5 monsters.
  * This monster has a [[Link Arrow]] on the forehead of each of its 5 dragon heads, referencing its [[Link Rating]] (5).
  * This monster's destruction effect that can be activated if this monster is [[Link Summon]]ed using only non-[[LIGHT]]/[[DIVINE]] monsters references the [[Ritual Summon]] of "[[Mythic Dragon (anime)|Mythic Dragon]]" with "[[Dragon Revival Ritual]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime: "Mythic Dragon" was an early [[Ritual Monster]] adaptation of "[[Five-Headed Dragon (anime)|Five-Headed Dragon]]" which had an effect that destroyed all of the opponent's cards when Ritual Summoned.
