title: Card Trivia:Noble Knight Gwalchavad
wikitext: |-
  {{Navigation}}

  * "[[Noble Arms of Destiny]]" appear in this card's artwork.
  * This monster is based on [[wikipedia:Galahad|Sir Galahad]], who is the knight who claimed the [[wikipedia:Holy Grail|Holy Grail]] (in most versions of the myth) and the illegitimate son of [[wikipedia:Lancelot|Lancelot]] ("[[Ignoble Knight of Black Laundsallyn]]").
  ** The reddish glow around this monster may allude to this, as it is similar to the red glow on "Laundsallyn".
  ** 'Gwalchavad' is the original Welsh version of 'Galahad'.
  * This card is similar to the [[Gemini monster]]s, except that it needs to be equipped with an [[Equip Spell Card]] instead of needing a [[Gemini Summon]] to gain its effect, much like "[[Noble Knight Medraut]]".
  * This card's Equip Spell Card destruction effect varies slightly from that of "Noble Knight Medraut" in that it needs to destroy a "[[Noble Arms]]" card.
  * This monster appears in the artworks of "[[Noble Knight Peredur]]" and "[[Noble Knights of the Round Table]]".
