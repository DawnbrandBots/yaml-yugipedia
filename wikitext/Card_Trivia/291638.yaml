title: Card Trivia:Galaxy Stealth Dragon
wikitext: |-
  {{Navigation}}

  * Two after-images of this monster appears in this card's artwork, reflecting its effect to [[Special Summon]] up to two [[Dragon]] monsters from the player's [[hand]].
  * This monster has a rival [[LIGHT]] [[counterpart]]: "[[Galaxy Photon Dragon]]".
  * This is the first [[DARK]] Dragon "[[Galaxy]]" monster that is not a "[[Galaxy-Eyes]]" monster, as well as the first [[Rank 4]] "Galaxy" [[Xyz Monster]].
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster was [[Xyz Summon]]ed through the galaxy-like [[Overlay Network]] of the "[[Number]]" monsters, instead of the portals of non-"Number" Xyz Monsters.
