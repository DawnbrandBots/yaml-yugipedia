title: Card Trivia:Dream Cicada
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Suiminmin" (スイミンミン, ''Suiminmin'') is a portmanteau of the Japanese words for "sleep" (睡眠, ''suimin'') and the ''[[wikipedia:Hyalessa maculaticollis|Hyalessa maculaticollis]]'' (ミンミンゼミ, ''minminzemi'').
  ** ''Minminzemi'' is also the Japanese term for the "min-min cicada", which is named after the sound it makes, whereas the sound is often used as an effect in anime.
  * This monster is based on a [[wikipedia:Cicada|cicada nymph]], the first stage of a cicada's life-cycle.
