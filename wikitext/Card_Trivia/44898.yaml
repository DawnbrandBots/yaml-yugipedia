title: Card Trivia:Killer Needle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Verdant Sanctuary]]".
  * This is the only card whose ''[[TCG]]'' and English dubbed anime name features the word "Killer" instead of having it censored.
  ** Despite this, this card's name was changed from "Killer Bee" to "Killer Needle," most likely to avoid association with the real-life insect.
  * This card's flavor text explains that this monster is a bee; however, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, [[Weevil Underwood]] called it a wasp.
  * In the original Japanese version of {{episode|5D's|011|ref}}, one of the programs that [[Blister]] hacked was called "Anti-virus Killer Bee."
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|Yu-Gi-Oh!|065|ref}} showing [[Killer Needle (manga)|this monster]] being Summoned.
