title: Card Trivia:Cipher Etranger
wikitext: |-
  {{Navigation}}

  * "[[wiktionary:étranger|étranger]]" is a French word meaning "stranger" or "foreigner".
  ** "Etranger" in this card's name is left untranslated from French in English, German, Korean, and Japanese ruby text; but uses the native word in Italian, Spanish, Portuguese, and the Japanese kanji.
