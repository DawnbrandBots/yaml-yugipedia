title: Card Trivia:Morphtronic Scopen
wikitext: |-
  {{Navigation}}

  * This monster is based on a microscope, which appears in the background of this card's artwork.
  ** The background of this card's artwork features a circular frame, which is a reference to the typical view when looking through the eyepiece of a microscope.
  ** This card's effect of [[Special Summon]]ing a "[[Morphtronic]]" monster from the [[hand]] is a reference to how a real-life microscope works, which is able to search anything unseen by the naked eye.
  * This card, along with "[[Morphtronic Remoten]]", are the first "Morphtronic" [[Tuner monster]]s, both of which were released in ''[[Raging Battle]]''.
