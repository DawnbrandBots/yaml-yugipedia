title: Card Trivia:Spiritual Beast Tamer Lara
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Terminal World (set)|Terminal World]]''.
  * This monster is an older form of "[[Ritual Beast Tamer Lara]]" combined with "[[Ritual Beast Ulti-Gaiapelio]]".
  ** This monster is the only non-[[WIND]] "[[Ritual Beast Tamer]]" monster, as it shares the [[LIGHT]] [[Attribute]] of "Gaiapelio".
  ** "[[Ritual Beast Inheritance]]" appears to depict the transformation of "Lara" into this monster.
  * This monster has two upgraded forms combined with a purified "[[Taotie, Shadow of the Yang Zing]]":
  ** [[LIGHT]] [[Wyrm]] [[Fusion Monster|Fusion]]: "[[Ritual Beast Ulti-Nochiudrago]]"
  ** [[WIND]] [[Psychic]] [[Link Monster|Link]]: "[[Ritual Beast Ulti-Reirautari]]"
