title: Card Trivia:Krebons
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Battle Teleportation]]".
  * This card's name appears to be a corruption of the word "clairvoyance", which references it being a [[Psychic]]-[[Type]] monster.
  * This card's design features a computing theme. This monster's costume features a circuit board pattern, while its visor feature the digital mathematical inequality symbols, "≥" and "≤", and semicolons. The background of this card's artwork also features multiple 0s and 1s, which is primarily used as [[wikipedia:binary code|binary code]].
  ** This monster appears to be juggling [[wikipedia:polycube|polycubes]], solid three-dimensionasl figure formed by joining equal-sided cubes face to face. Furthermore, two of the polycubes resembles the T-shaped [[wikipedia:tetromino|tetromino]], a geometric shape composed of four squares which is prominently used in the ''[[wikipedia:Tetris|Tetris]]'' video game series.
  * This is the first Psychic-Type monster to appear in the anime.
  * This monster bears a somewhat resemblance to "[[Jester Lord]]".
  ** Both cards have similar ways of attacking in the ''[[Yu-Gi-Oh! 5D's]]'' anime by throwing their juggling items at the opponent.
