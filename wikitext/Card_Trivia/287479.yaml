title: 'Card Trivia:Number C69: Heraldry Crest of Horror'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * The number "69" is located on this monster's left horn.
  * This monster is a "[[Number C]]" [[Card evolutions|upgraded]] form of "[[Number 69: Heraldry Crest]]".
  ** This monster's purple and gold color scheme may be derived from "Heraldry Crest's" upgraded forms in the anime; its [[Number 69: Heraldry Crest - Shatter Stream |second form]] features a purple color scheme, while its [[Number 69: Heraldry Crest - Dark Matter Demolition |true form]] features a gold color scheme.
  *** Since the color of gold is closely associated with the color yellow, this monster's color scheme fits the opposing color scheme of "Heraldry Crest", as the colors yellow and purple are complimentary colors, located on the opposite sides of a [[wikipedia:Color wheel|color wheel]].
  ** This monster's [[original ATK]] (4000) is the combined total of the [[original ATK and DEF]] of "Number 69: Heraldry Crest" (2600/1400).
  ** This monster's first effect to [[destroy]] all of the opponent's monsters when they declare an attack is a more powerful version of the anime effect of "[[Number 69: Heraldry Crest (anime)|Number 69: Heraldry Crest]]", which can destroy the opponent's attacking monster by [[detach]]ing one [[Xyz Material]].
  * This is the first [[Psychic]] "[[Number C]]" monster.
  * This monster has the highest original ATK (4000) of all Psychic monsters.
  ** This monster also has the highest original ATK of all [[Rank 5]] monsters.
  * This is the first "Number C" monster to be Summoned by the effect of "[[Chaos Field (ZEXAL)|Chaos Field]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster, alongside "[[Number C92: Heart-eartH Chaos Dragon]]", are the only two "Number C" monsters in the anime that were Summoned using their base forms, but not their original owners. In this monster's case, it was Summoned by [[Number 96]] while its base form was originally owned by [[Vetrix]].
