title: Card Trivia:Altergeist Meluseek
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Altergeist Manifestation]]" and "[[Altergeist Protocol]]".
  * This monster's name is a portmanteau of "[[wikipedia:Melusine|Melusine]]" and "[[wikipedia:Zero seek|zero seek]]".
  ** Melusine is a female spirit of fresh water in European folklore, who is often depicted as a woman with the lower half of a fish, similar to a [[wikipedia:Mermaid|mermaid]].
  ** Zero seek is a mechanical engineering design component of most computer-controlled data storage devices.
