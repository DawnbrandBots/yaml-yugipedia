  * "DBF" is an acronym for [[wikipedia:.dbf|database file]], which is often abbreviated as ".dbf".
  ** Fittingly, this monster's effect [[support]]s "[[Dragons Boost Fusion]]" and "[[Dragons Burst Fusion]]", both cards with names that have the initials "DBF".
