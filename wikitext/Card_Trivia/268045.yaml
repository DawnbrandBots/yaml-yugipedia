title: Card Trivia:Legendary Atlantean Tridon
wikitext: |-
  {{Navigation}}

  * "[[A Legendary Ocean]]" appears in the background of this card's artwork.
  * This card is named after [[wikipedia:Triton (mythology)|Triton]], the son of [[wikipedia:Poseidon (mythology)|Poseidon]], the Greek god of the sea.
  ** This monster is likely a younger version of "[[Poseidra, the Atlantean Dragon]]", which is also based on Poseidon.
  ** The pronunciation of this card's name, "True Sea Emperor" (真海皇 トライドン ''Shinkaiō'') features the word "''shinkai''", which is a pun on the word for "deep sea".
  * This monster appears to be wearing the same golden neckband worn by "Poseidra" in many card artworks but this is in fact an error.
  ** According to ''[[Master Guide 4 card storylines|Master Guide 4]]'', this monster preyed upon "[[Lost Blue Breaker]]" and grew into "Poseidra". Only afterwards he obtained the aforementioned treasure from the "[[Mermail]]s" (as confirmed by [[Gagaga Academy Tospedia card storylines|Gagaga Academy Tospedia]]), so he shouldn't be wearing it yet in this form.
  ** This inconsistency may be due to a double [[Wikipedia:Retroactive continuity|retcon]], for the aforementioned [[Card Trivia:Call of the Atlanteans|Spell Card]] and this monster itself, but it's unlikely. Thus, it can be rather assumed to be an error occurred in the design phase, since this monster is based on "Poseidra, the Atlantean Dragon" appearance but ignoring any narrative events that would have connected them (both ''Master Guide 4'' and the corresponding chapter on Gagaga Academy Tospedia were published after this card release in the ''[[OCG]]''/''[[TCG]]'').
  * Thematically, this monster is an "[[Atlantean]]" counterpart of "[[Legendary Fire King Ponix]]".
  ** Both cards feature the word "Legendary" (in Japanese, 真 ''Shin'', lit. "True") before their own [[archetype]] names and are the youngest version of those archetypes' boss monsters, despite having different names from them.
