title: Card Trivia:Replicard LAD
wikitext: |-
  {{Navigation}}

  * The first portion of this monster's name is a portmanteau of the words "replica" and "card", which reflects its effect to [[Special Summon]] a [[Monster Card]] from the [[Deck]] with a "replica" of two of the [[target]]ed monster's [[Level]], [[ATK]] and/or [[DEF]].
  ** The second portion of this monster's name references "[[wikipedia:Rapid application development|Rapid Application Development]]" (RAD), an adaptive software development that focuses on rapid prototyping and iterative development instead of lengthy planning stages. This reflects its effects to "rapidly" Special Summon itself from the [[hand]] and another monster from the Deck on the same turn, at the cost of not being able to [[activate]] that monster's effects (if any) that turn.
  *** The second portion of this card's name is also the first letters of each of the three properties mentioned in this card's Special Summoning effect: '''L'''evel, '''A'''TK, and/or '''D'''EF.
