title: Card Trivia:Springans Interluder
wikitext: |-
  {{Navigation}}

  * "[[Springans Branga]]", "[[Springans Pedor]]", "[[Springans Rockey]]", "[[The Golden Swordsoul]]", "[[The Iris Swordsoul]]", and "[[Tri-Brigade Mercourier]]" appear in this card's artwork.
  ** "The Golden Swordsoul" was released after this card, explaining why they're merely featureless silhouettes compared to "Iris" being detailed.
  *** These two "Swordsoul" monsters were later combined into "[[The Three Brave Swordsouls]]", which features them in a similar composition as this card, with [[Fleurdelis]] front and center and [[Adin]] and [[Theo (CARD GAME THE CHRONICLES)|Theo]] behind.
  * This card's artwork appears in one of the bubbles in the artwork of "[[Icejade Tremora]]".
  ** It was also adapted into one of the scenes of {{episode|CARD GAME THE CHRONICLES|8|ref}}.
  * This card's name is a portmanteau of the words "interlude" and "intruder".
