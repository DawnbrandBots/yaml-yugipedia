title: Card Trivia:Witchcrafter Walpurgis
wikitext: |-
  {{Navigation}}

  * "[[Witchcrafter Edel]]", "[[Witchcrafter Genni]]", "[[Witchcrafter Haine]]", "[[Witchcrafter Madame Rilliona]]", "[[Witchcrafter Pittore]]", "[[Witchcrafter Potterie]]" and "[[Witchcrafter Schmietta]]" appear in this card's artwork.
