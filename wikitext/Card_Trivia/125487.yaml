title: Card Trivia:Rubble King
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is similar to "[[Blasting the Ruins]]".
  ** The artwork of "Blasting the Ruins" depicts ruins and this monster is depicted as a king of rubble, which ruins become once they are blasted.
  ** In addition, this card was used to play "[[Blasting the Ruins (anime)|Blasting the Ruins]]" from the [[hand]] in the ''[[Yu-Gi-Oh! 5D's]]''; its effect also has the same [[cost]] as that of "Blasting the Ruins".
  * This is the only card out of the 40 card [[Deck]] constructed by [[Yusei Fudo]] in {{episode|5D's|009|ref}} that has not been released in the ''[[TCG]]''/''[[OCG]]''.
