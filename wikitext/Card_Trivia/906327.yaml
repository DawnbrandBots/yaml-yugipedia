title: Card Trivia:Blast Held by Destiny
wikitext: |-
  {{Navigation}}
  [[File:Obelisk_explodes.png|thumb|right|250px|[[Ishizu Ishtar (manga)|Ishizu Ishtar]] foresees [[Seto Kaiba (manga)|Seto Kaiba]]'s "[[The God of the Obelisk]]" being destroyed by the effect of her "[[Blast Held by a Tribute (manga)|Blast Held by a Tribute]]" the moment it attacks.]]

  * "[[Obelisk the Tormentor]]" appears in this card's artwork.
  * This card is a [[retrained]] [[counterpart]] of "[[Blast Held by a Tribute]]".
  ** This card's artwork and effect are based on a scene from {{chapter|Yu-Gi-Oh!|228|ref}} where [[Ishizu Ishtar (manga)|Ishizu Ishtar]] foresees [[Seto Kaiba (manga)|Seto Kaiba's]] "[[The God of the Obelisk]]" being destroyed by the effect of her "[[Blast Held by a Tribute (manga)|Blast Held by a Tribute]]" the moment it attacks.

