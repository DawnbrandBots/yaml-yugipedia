title: Card Trivia:Chaos Barrier Field
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card appears in the international artwork of "[[Trap Sluzer]]".
  * This card's artwork is very similar to "[[Shield and Sword]]", which depicts two colored circles (one red and the other blue) with text-arrow notations in front of a humanoid figure.
  ** The featured kanji in this card's artwork are「弱」(meaning "weak") and「強」(meaning "strong"). The direction the arrow pointing to the kanji for "weak" reflects this card's effect to force the opponent's strongest monster to battle their weakest monster.
