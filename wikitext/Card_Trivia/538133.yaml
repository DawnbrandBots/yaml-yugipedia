title: Card Trivia:Twister
wikitext: |-
  {{Navigation}}

  * "[[Anti Raigeki]]", "[[Fairy's Hand Mirror]]", "[[Graceful Dice]]", "[[Needle Ceiling]]", "[[Skull Dice]]", "[[Toon World]]", the ceremonial rods from the artwork of either "[[Black Magic Ritual]]" or "[[Curse of Fiend]]", and the purple carpet from the artwork of "[[Fusion Recycling Plant]]" appear in this card's artwork.
  ** The dice in this card's artwork  are larger than the dice in the artwork of "[[Dice Re-Roll]]", as seen in the artwork of "Fusion Recycling Plant".
  ** The purple carpet from the artwork of "Fusion Recycling Plant" appears alongside most of the above listed items, indicating that the location featured in that card's artwork is the ultimate fate of these items.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Twister]]".
  * The first Spanish and Italian prints of this card both featured the name "''Tornado''". The following prints had respectively "''Torbellino''" and "''Turbine''" as its name instead, "''Tornado''" being the name of the [[Tornado|card with the same name]] in English.
