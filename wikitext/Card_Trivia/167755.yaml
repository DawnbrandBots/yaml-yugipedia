title: Card Trivia:Aquamirror Illusion
wikitext: |-
  {{Navigation}}

  * "[[Gishki Emilia]]" and "[[Gishki Noellia]]" appear in this card's artwork.
  ** This card's artwork depicts "Emilia" being unwillingly made a part of a "[[Gishki]]" ritual conducted by her mother "Noellia" that eventually leads to her death, as indicated by how "Emilia" is depicted grasping at her throat. 
  *** This depiction suggests that not only are the Tributes for the "Gishki" rituals are involuntarily offered, but this card's effect to conduct an improper [[Ritual Summon]] suggests that this was a failed ritual experiment resulting in the death of "Emilia".
  *** The artwork of "[[Aquamirror Cycle]]" is a continuation of the events depicted in this card's artwork, in which the deceased "Emilia" is resurrected as a [[Spirit Monster|Spirit]]. Additionally, this card's effect to [[return]] a [[Special Summon]]ed "Gishki" [[Ritual Monster]] to the [[hand]] during the [[End Phase]] is similar to the effect of "Gishki Emilia's" Spirit monster sub-type.
  * This is the first [[Trap Card]] to feature an effect to Summon [[Ritual Monster]]s.
