title: Card Trivia:Dark Matter Mist
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dark Matter Decision]]".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Dark Matter Enigmata]]".
  * This monster is an [[Dark Matter (series)|Dark Matter]] [[counterpart]] of "[[Sevens Road Magician]]".
  ** This Monster's [[Level]] (7), [[Attribute]] (DARK), and [[ATK]] (2100) are similar to "Sevens Road Magician". This Monster's appearance is also reminiscent of "Sevens Road Magician", especially the fire coming out of its head.
  *** This may refer to [[Yuamu Ohdo]]'s desire to secure [[Yuga Ohdo]]'s future and prioritize Yuga's happiness over herself in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * This is the first card in ''[[Yu-Gi-Oh! Rush Duel]]'' whose name was mentioned in card effects before it was officially revealed in the anime (and then released physically). Its name was first mentioned in {{episode|GO RUSH!!|104|ref}} and did not physically appear until {{episode|GO RUSH!!|114|ref}}. 
  ** Also, the first [[Dark Matter (series)|Dark Matter]] cards (including the monsters that mention this card's name in their effects) debuted in ''[[Burst Rex of Awakening]]'', while this card would not debut until the next [[booster pack]], ''[[Dark Matter of Phantoms]]''.
  * This monster could be seen as a prototype to "[[OuTerverSe]]" in (initially) being a non-existent card that was still important for effects and material. This monster was used by Yuamu Ohdo who wanted to become [[Otes]] to secure Yuga Ohdo's future timeline, while the real Otes later "used" "OuTerverSe" in the ''Yu-Gi-Oh! GO RUSH!!'' anime. As such, it is possible the similar situations of these two cards is intentional.
