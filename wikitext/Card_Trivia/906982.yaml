title: Card Trivia:Amaze Attraction Rapid Racing
wikitext: |-
  {{Navigation}}

  * "[[Amaze Attraction Horror House]]", 2 "[[F.A. Sonic Meister]]s" (one of which is driven by "[[Amazement Administrator Arlekino]]"), and "[[F.A. Shining Star GT]]" appear in this card's artwork.
  ** This card's first bulleted effect is likely based on the card "[[F.A. Test Run]]".
  ** This card's second bulleted effect, which increases the [[Level]] of the equipped monster, is based on the general mechanic of "[[F.A.]]" monsters of increasing their own Levels.
  * This [[wikipedia:Go-kart|go-kart racing track]] appears in the artwork of "[[Amazement Precious Park]]".
