  * "[[Archfiend Marmot of Nefariousness]]", "[[Fox Fire]]", "[[Gigobyte]]", and "[[Petit Dragon]]" appear in this card's artwork.
  ** These monsters are the familiars of the original "[[Charmer]]" monsters, which this card can support.
