title: Card Trivia:Drillroid
wikitext: |-
  {{Navigation}}

  * This card appears in the original anime artwork of "[[Montage Dragon]]".
  * This monster is based on a [[wikipedia:Drilling rig|drilling rig]], a vehicle designed to drill into the earth, which reflects its effect to [[destroy]] an opponent's defense by "drilling" away their [[Defense Position]] monsters.
  * This is the only "[[roid]]" monster to be listed as a [[Fusion Material]] for more than one "[[Vehicroid]]" monster.
