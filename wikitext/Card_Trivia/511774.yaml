title: Card Trivia:End of the World
wikitext: |-
  {{Navigation}}

  * "[[Demise, King of Armageddon]]" appears in the background of this card's artwork, depicted rising from the ground.
  * The city in this card's artwork also appears in the artwork of "[[Turning of the World]]".
  * This is the first [[Ritual Spell Card]] that can be used to [[Ritual Summon]] more than one specific [[Ritual Monster]].
