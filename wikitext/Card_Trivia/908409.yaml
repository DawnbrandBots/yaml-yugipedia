title: Card Trivia:Doki Doki Hexenhaus
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of the following:
  ** ''[[wikipedia:Jōmon pottery|Doki]]'', the Japanese word for "pottery", usually referring to their ancient earthenware pottery.
  ** ''Dokidoki'', the Japanese onomatopoeia for the sound of heartbeats.
  ** ''Hexenhaus'', a type of gingerbread house decorated with candies, reflecting this monster's appearance. ''Hexenhaus'' is also the German word for "witch house", commonly associated with the gingerbread house inhabited by the old witch in the German fairy tale, "[[wikipedia:Hansel and Gretel|Hansel and Gretel]]".
