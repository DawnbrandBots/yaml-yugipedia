title: Card Trivia:Gimmick Puppet Fantasix Machinix
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Puppet Shark]]".
  * This monster's name is a portmanteau of "fantastic" and ''deus ex machina'', the Latin phrase for "god from the machine".
  * This monster is based on [[Quattro]], who uses the "[[Gimmick Puppet]]" [[archetype]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster has Quattro's [[crest]] on its chest, while the blades on its wrists resembles Quattro's [[Duel Disk]].
  ** This monster's gentleman-like appearance represents how Quattro disguises himself as a well-mannered man who interacts with people with a polite demeanor when he is not [[Duel]]ing, as seen in {{episode|ZEXAL|033|ref}}.
  ** This monster's [[original ATK and DEF]] (1500/3100) references Quattro's Japanese codename, IV: its 1500 [[ATK]] has the numbers 1 (I in Roman numbers) and 5 (V in Roman numbers); its 3100 [[DEF]] has the numbers 3 and 1, which can be added up to 4.
  * This monster has a "[[CXyz]]" [[Ranked-Up]] form: "[[CXyz Gimmick Puppet Fanatix Machinix]]".
  * This monster is a non-"[[Number]]" [[counterpart]] of "[[Number 15: Gimmick Puppet Giant Grinder]]".
  ** Both have the same ATK (1500) and a higher DEF, while their evolutions have the same ATK/DEF of the respective base form but swapped.
  ** Both have opposite color schemes: this monster has a white body with gold ornaments and a red cape, while "Giant Grinder" has a black body with a violet backrest and red hair.
  * The first portion of this monster's name and the first portion of the name of "[[Service Puppet Play]]" (released in ''[[The Infinite Forbidden]]'' as well) make up the word "fanservice" (ファンサービス ''Fansābisu''), the trademark slogan used by Quattro in the original Japanese version of the ''Yu-Gi-Oh! ZEXAL'' anime.
  ** This card's ''[[Special Pack: Stamp Edition]]''/''[[Rarity Collection 5]]'' artwork includes "fanservice" to reference its connection to Quattro.
  * This monster's effects to [[add]] a "[[Rank-Up-Magic]]" card from the [[Deck]] to the [[hand]], and later add a "Rank-Up-Magic" card from the [[Graveyard]] to the hand is based on how Quattro repeatedly used "[[Rank-Up-Magic Argent Chaos Force (anime)|Rank-Up-Magic Argent Chaos Force]]" during his Duel against [[Reginald Kastle|Nash]] in the ''Yu-Gi-Oh! ZEXAL'' anime.
  ** The former effect is based on how Quattro drew "Argent Chaos Force" from his Deck, while the latter effect is based on how Quattro added "Argent Chaos Force" from his Graveyard to his hand via the effect of "[[Banish Reactor]]".
