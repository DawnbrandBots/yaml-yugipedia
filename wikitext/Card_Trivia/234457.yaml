title: Card Trivia:Fossil Hammer
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is similar to "[[Hammer Shot]]" and "[[Smashing Ground]]", except it chooses the highest level instead of the highest [[ATK]]/[[DEF]].
  ** Also, unlike the two aforementioned cards, it allows the opponent to [[Special Summon]] a monster from the [[Graveyard]].
