title: Card Trivia:Alice the Wandering Doll
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Released Curse]]".
  * This monster is based on [[wikipedia:Alice (Alice's Adventures in Wonderland)|Alice]], the main protagonist of ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]''.
  ** This monster's name references the beginning of Alice's second adventure in Wonderland in ''[[wikipedia:Through the Looking Glass|Through the Looking Glass]]'' where she steps through a mirror into an alternate world and wanders around Wonderland, which is reflected by its effect to switch [[control]] of itself to an opponent's [[field]].
  ** This monster's Japanese name, "Alice the Wandering Bisque Doll", features the word "[[wikipedia:Bisque (pottery)|bisque]]", a type of porcelain which is white in color but not glazed, usually used in the creation of dolls in the 19th century.
