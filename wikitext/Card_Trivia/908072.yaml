title: Card Trivia:Cranked to Ten!!
wikitext: |-
  {{Navigation}}

  * "[[Supreme Machine Magnum Overlord]]" appears in this card's artwork in [[Maximum Mode]] (together with "[[Supreme Machine Magnum Overlord (L)|Supreme Machine Magnum Overlord [L]]]" and "[[Supreme Machine Magnum Overlord (R)|Supreme Machine Magnum Overlord [R]]]").
  * This card's Japanese name, "10sion MAX!!!", and additional effect reference how "Magnum Overlord" is a [[Level 10]] [[Maximum Monster]].
  ** This card's English name and additional effect reference to how volume dials on certain devices (e.g. an electronic amplifier) can be "cranked" up to the "maximum" volume of 10.
  * This card's artwork is most likely a reference to the "Brave Perspective", a pose originally used in the anime ''[[wikipedia: Brave Exkaiser|Brave Exkaiser]]'' that has since been traced and referenced in many series, primarily in mecha anime.
