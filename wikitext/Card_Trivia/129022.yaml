title: Card Trivia:Ojama Delta Hurricane!!
wikitext: |-
  {{Navigation}}

  * "[[Ojama Black]]", "[[Ojama Green]]", and "[[Ojama Yellow]]" appear in this card's artwork.
  * The first part of the term "Delta Hurricane" is based on the Greek uppercase letter "delta" (Δ), which is often depicted as a three-pointed triangle; this card's [[activation]] requires the player to [[control]] the three aforementioned "[[Ojama]]" monsters, who are depicted creating the destructive hurricane from triangle-shaped energy while in a triangular position.
  * This is one of three cards that can only be activated while there are three specific monsters on the [[field]], with the other two being "[[Huge Revolution]]" and "[[Triangle O]]".
