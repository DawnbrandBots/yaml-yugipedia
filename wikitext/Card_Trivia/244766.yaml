title: Card Trivia:Burning Land
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a massive fire burning and searing the land, which is reflected in this card's effect of destroying [[Field Spell Card]]s. The additional effect of damaging the turn player is likely a reference to how a massive fire can linger until there is nothing left.
  ** This card's effect to destroy Field Spell Cards is based on its original effect in the manga, of which it destroys a portion of the [[Battle Box]] field's terrain, robbing [[Field Power Bonus]] from monsters.
