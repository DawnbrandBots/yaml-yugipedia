title: Card Trivia:Ultra C
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Baby Tiragon]]" appears in this card's manga and anime artworks.
  ** "[[Shadow Tamer]]" appears in this card's anime artwork.
  ** Both artworks depict "Baby Tiragon" being trained for a [[wikipedia:Circus|circus act]], which reflects how this card's owner, [[Tokunosuke Hyori (manga)|Tokunosuke Hyori]] (and his anime counterpart, [[Flip Turner]]) used "Baby Tiragon" as part of his act to take [[control]] of an opponent's [[Xyz Monster]]. 
  * This card's Japanese name (ウラトラＣ, ''Uratora Shī'') features multiple layers of puns and wordplay on "[[wikipedia:Ultra C|Ultra C]]", a Japanese term used for athletes to perform on a level beyond the best score, or to give "110%".
  ** The word "''ura''" (ウラ) is the Japanese word for "reverse side", which is associated with Flip Turner, who mainly uses [[Flip monster]]s (which are known in Japanese as "Reverse monsters") and has a philosophy that everything has a hidden "reverse side". That word is also present in Flip's Japanese surname, "Tokunosuke Omote'''ura'''", and is used as his verbal tic in the Japanese version of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime
  *** The word "''ura''" is also used in "uragiri" (裏切り), the Japanese word for "betrayal", which reflects this card's effect to [[Special Summon]] an opponent's Xyz Monster from their [[Extra Deck]] to the player's [[field]], thereby making monster "betray" their owner. This is also a reference to how a younger Flip was "betrayed" by the older kids who took his cards under the pretenses of teaching him to Duel when he was younger, as well as how Flip "betrayed" his friendship with [[Yuma Tsukumo]] by using a "betrayed" "[[Baby Tiragon (anime)|Baby Tiragon]]" to take control of "[[Number 39: Utopia (anime)|Number 39: Utopia]]".
  ** The word "''tora''" (トラ) is the Japanese word for "tiger", which is present in the Japanese name for "Baby Tiragon" (ベビー・'''トラ'''ゴン, ''Bebī '''Tora'''gon''), whose [[Xyz Summon]]ing is required to [[Xyz Summon]] to [[activate]] this card.
