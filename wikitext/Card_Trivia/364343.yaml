title: Card Trivia:Unpossessed
wikitext: |-
  {{Navigation}}

  * "[[Fox Fire]]", "[[Archfiend Marmot of Nefariousness]]", "[[Petit Dragon]]", and "[[Gagagigo]]" appear in this card's artwork, using their alternate designs from those of "[[Familiar-Possessed - Hiita]]", "[[Familiar-Possessed - Aussa|Aussa]]", "[[Familiar-Possessed - Wynn|Wynn]]", and "[[Familiar-Possessed - Eria|Eria]]" respectively.
  * The original Korean print of this card misspelled the "[[Charmer]]" archetype's name "령사" (''Ryeongsa'') as "령수사" (''Ryeong'''su'''sa''), which refers to the "[[Ritual Beast Tamer]]" archetype instead.
