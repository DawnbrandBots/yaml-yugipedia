title: Card Trivia:Mad Hacker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bot Herder]]" and "[[Maliss C MTP-07]]".
  * This monster is based on the [[wikipedia:Hatter (Alice's Adventures in Wonderland)|Mad Hatter]], a character in the 19th century fantasy novel, ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]'', who is depicted with a signature top hat and a mad personality.
  ** This monster was revealed on Twitter on October 6, 2021, a day unofficially celebrated as "Mad Hatter Day" in reference to the 10/6 notation popularly associated with the character's hat (which is itself a reference to 10 shillings and 6 pence, the price of a hat in those days). The 10/6 is further referenced in this monster's [[original ATK and DEF]] (1000/600).
