title: Card Trivia:Tualatin
wikitext: |-
  {{Navigation}}

  * Like most of the characters that debut in the ''[[Yu-Gi-Oh! R]]'' manga, this monster is named after a microprocessor– in this case the Intel Pentium III processor core. By extension the card is also named for the [[wikipedia:Tualatin Valley|Tualatin Valley]] in Oregon, where several of Intel's facilities are located.
  * In the ''Yu-Gi-Oh! R'' special chapter "[[Summon The Dark Ruler!!]]", this card is the rival of "[[Van'Dalgyon the Dark Dragon Lord]]"
  ** This is evidenced by the fact that both cards are [[Level 8]] [[Effect Monster]]s with 2800 [[ATK]] and 2500 [[DEF]], but they also have opposing [[Attribute]]s, with this card being a [[LIGHT]] monster and "Van'Dalgyon" being a [[DARK]] monster. Lastly, both cards' effects allow them to [[Special Summon]] themselves in certain conditions.
  * In the manga, this monster is hued in the colors blue and gold, instead of silver and yellow.
