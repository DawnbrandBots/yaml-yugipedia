title: Card Trivia:Rainbow Gravity
wikitext: |-
  {{Navigation}}

  * Either "[[Rainbow Dragon]]" or "[[Rainbow Dark Dragon]]" appears in this card's artwork.
  ** This card's name and artwork is a half-truth, as rainbows are a source of light (namely the solar rays from the sun refracted into different visible wavelengths) which cannot be affected by gravity due to their speed; however, in the case of "Rainbow Dark Dragon", its appearance in this card's artwork is likely a reference to a [[wikipedia:Black hole|black hole]], a cosmic phenomena where its intense gravitational pull prevents light from escaping it.
