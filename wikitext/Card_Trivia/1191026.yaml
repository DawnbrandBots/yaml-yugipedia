title: Card Trivia:Fata Dragna
wikitext: |-
  {{Navigation}}

  * This monster's name and slender, wispy body are likely based on the [[wikipedia:Fata Morgana (mirage)|Fata Morgana]], a rare optical illusion caused by strong atmospheric temperature inversions where warm air sits over cold air, causing distant objects to appear like they are floating in midair.
  ** Additionally, that name is derived from that of [[wikipedia:Morgan le Fay|Morgan le Fay]], an enchantress from the legends of [[wikipedia:King Arthur|King Arthur]] who is sometimes depicted as a fairy. Fittingly, multiple fairies are depicted surrounding this monster.
