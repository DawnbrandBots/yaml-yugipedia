title: Card Trivia:Galaxy-Eyes Tachyon Primal
wikitext: |-
  {{Navigation}}

  [[File:Number107GalaxyEyesTachyonDragon-JP-Anime-ZX-NC-Hidden.png|thumb|250px|The first appearance of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]" in ''[[Unbreakable Heart]]''.]]

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is a [[Main Deck]] [[counterpart]] of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]".
  ** Visually, this monster is based on the obscured appearance of "[[Number 107: Galaxy-Eyes Tachyon Dragon (anime)|Number 107: Galaxy-Eyes Tachyon Dragon]]" in the first version of the fourth opening of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, ''[[Unbreakable Heart]]'', prior to its first reveal in {{episode|ZEXAL|082|ref}}, with most of its features replaced with a galaxy-like texture.
  * This monster's name likely references the ''[[Primal Origin]]'' [[Core Booster]], which features both "[[Galaxy]]" and "[[Tachyon]]" cards.

