title: Card Trivia:A Shattered, Colorless Realm
wikitext: |-
  {{Navigation}}

  * "[[Visas Starfrost]]" (with the wings of "[[Vicious Astraloud]]") appears in this card's artwork.
  * This card's Japanese name, "A Broken World of Infinite Consciousness" ({{Ruby|識|しき}}{{Ruby|無|む}}{{Ruby|辺|へん}}{{Ruby|世|せ}}{{Ruby|壊|かい}}, ''Shikimuhensekai'') is a pun on the concept of the ''[[wikipedia:Buddhist cosmology#Formless Realm (Ārūpyadhātu)|Vijñānānantyāyatana]]'' (識無辺処, ''shkimuhenjo''; lit. "Sphere of Infinite Consciousness") in Buddhist mythology.
