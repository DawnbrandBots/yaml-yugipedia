title: Card Trivia:Cardcar D
wikitext: |-
  {{Navigation}}

  * This card's name is derived from the word "card" used twice and stylized to reflect its artwork, which depicts a "card-shaped car" from a narrowing angle; its effect also allows the player to [[draw]] two cards.
  * The "D" in this card's name could be a reference to "[[wikipedia:Initial D|Initial D]]".
  * This card resembles a [[wikipedia:Ford Thunderbird|Ford Thunderbird]], specifically a model from the [[wikipedia:Ford Thunderbird (sixth generation)|sixth]], [[wikipedia:Ford Thunderbird (seventh generation)|seventh]], or [[wikipedia:Ford Thunderbird (eighth generation)|eighth]] generation. The design of the hood seems to be a "Screaming Chicken" design, a hood decal made popular on the "[[wikipedia:Pontiac Firebird|1970's Pontiac Firebirds]]".
