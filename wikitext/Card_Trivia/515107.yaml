title: Card Trivia:Vampiric Koala
wikitext: |-
  {{Navigation}}

  * This monster is likely based on the [[wikipedia:Drop bear|drop bear]], a carnivorous koala from [[wikipedia:Australian folklore|Australian folklore]].
  * This monster's name, design, and effect are based on a [[wikipedia:Vampire|vampire]], a mythical creature who feeds in the blood of their victims; however, due to its name, it is not a member of the "[[Vampire]]" [[archetype]].
  ** The castle in the background of this card's artwork resembles Dracula's Castle, the main setting of [[Konami]]'s video game series, ''[[wikipedia:Castlevania|Castlevania]]'', which mainly revolves around the vampire sorcerer [[wikipedia:Dracula (Castlevania)|Dracula]] as the series's main antagonist.
