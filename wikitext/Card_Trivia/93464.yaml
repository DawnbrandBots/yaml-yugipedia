title: Card Trivia:Advance Force
wikitext: |-
  {{Navigation}}

  * "[[Vice Dragon]]" appears in this card's artwork.
  ** This card's artwork depicts "Vice Dragon" being divided into two, reflecting this card's effect to have a [[Level 5]] monster (i.e. "Vice Dragon") be used to [[Tribute Summon]] a [[Level 7]] or higher monster, which normally requires two monsters to [[Tribute]].
  * This card's name refers to the fact that Tribute Summons are called "Advanced Summons" in the Japanese version.
