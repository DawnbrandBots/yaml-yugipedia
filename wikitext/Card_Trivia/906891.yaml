title: Card Trivia:Awakening of the Sacred Beasts
wikitext: |-
  {{Navigation}}

  * "[[Hamon, Lord of Striking Thunder]]", "[[Raviel, Lord of Phantasms]]", and "[[Uria, Lord of Searing Flames]]" appear in this card's artwork.
  ** The specific pose of "Raviel" is taken from a scene in {{episode|GX|127|ref}}, when "Raviel" rises to its full height after the Sacred Beasts' manifestation causes "[[Cloudian - Eye of the Typhoon (anime)|Cloudian - Eye of the Typhoon]]" to dissipate.
  *** This scene was also present in [[Yu-Gi-Oh! GX - Episode 126|the previous episode]] (during the next episode preview segment at the end of the episode), but instead depicted "Raviel" with an enhanced red glow in its eyes.
  ** The yellow glow around the monsters and the glowing orbs surrounding them are based on a scene from {{episode|GX|049|ref}}, where the [[Sacred Beasts]] glow yellow from draining the spirit energy from ''[[Duel Monsters]]'' cards around the world.

