title: Card Trivia:Des Croaking
wikitext: |-
  {{Navigation}}

  * Three "[[Des Frog]]s" and five musical notes based on the back patterns of  "[[T.A.D.P.O.L.E.]]" appear in this card's artwork.
  * This card's English name is a pun on the word "croaking", which is the sound effect produced by frogs, as well as a slang term for dying.
