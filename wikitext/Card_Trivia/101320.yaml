title: Card Trivia:Core Reinforcement
wikitext: |-
  {{Navigation}}

  * The remains of "[[Koa'ki Meiru Speeder]]" appears in this card's artwork.
  * According to the [[Master Guide 3 card storylines#Darkworld (Makai) History: Invidia 49th XXXX|Master Guide 3 card storylines]], "[[Iron Core of Koa'ki Meiru]]" was taken out of "[[Koa'ki Meiru Valafar]]" to be reinforced (as depicted by this card's artwork), due to the deteriorative effect that monster had on it.
