title: Card Trivia:Kiryu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork "[[Formation Union]]".
  ** A discolored version of this monster appears in the artwork of "[[Flying Dragon Whirl]]".
  * While treated as an [[Equip Spell Card]] by its effect, this is the only other [[Spell Card]] with an effect that [[Tribute]]s itself; the other being "[[Trial of the Princesses]]".
  * This monster shares multiple similarities with "[[Curse of Dragon]]":
  ** Both monsters share the same [[Attribute]] ([[DARK]]), [[Level]] (5), [[Type]] ([[Dragon]]) and [[original ATK and DEF]] (2000/1500).
  ** Both monsters serve as the mount for a certain [[Warrior]] [[Normal Monster]]; this monster can serve as the mount of "[[Dark Blade]]" by [[equip]]ping itself to the latter monster, while "Curse of Dragon" serves as the mount for "[[Gaia The Fierce Knight]]" (as "[[Gaia the Dragon Champion]]").
