title: Card Trivia:Poseidon Wave
wikitext: |-
  {{Navigation}}

  * The humanoid figure in this card's artwork also appears in the artwork of "[[Edict of Atlantis]]".
  * This card is named after [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea and earthquakes, who is often depicted wielding his signature weapon, the trident.
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card was renamed "[[Zeus' Breath]]" and its artwork was redrawn with clouds in place of waves. In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, this card was renamed "[[Poseidon Wind]]".
  *** This was likely to avoid reminders to the [[wikipedia:2011 Tōhoku earthquake and tsunami|Tōhoku earthquake and tsunami]]. An undersea [[wikipedia:Megathrust earthquake|megathrust earthquake]] measured at 9.1 on the Richter scale occurred in March 2011, around the time that ''Yu-Gi-Oh! ZEXAL'' was in production. The earthquake was later followed with a powerful tsunami, which caused the deaths of nearly 20,000 people and over 2,500 people missing.
