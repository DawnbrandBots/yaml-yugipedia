title: Card Trivia:Gunkan Suship Catch-of-the-Day
wikitext: |-
  {{Navigation}}

  * The artwork of "[[Gunkan Suship Uni-class Super-Dreadnought]]" and the specials board from "[[Gunkan Suship Daily Special]]" appear in this card's artwork.
  ** The plates from the artwork of "[[Gunkan Suship Ikura]]", "[[Gunkan Suship Shirauo]]", and "[[Gunkan Suship Uni]]" also appear in this card's artwork.
  ** The red vinegar from the artwork of "[[Sour Scheduling - Red Vinegar Vamoose]]" also appears in this card's artwork.
  * The flag reads 「海せん」 ''Kaisen'', indicating that this card's artwork is located within "[[Gunkan Sushipyard Seaside Supper Spot]]" (軍貫処『海せん』).
  * The specials written on the specials board that appears in this card's artwork read, from left to right:
  ** An illegible panel
  ** "Medium" (中) for an obscured price.
  ** "Large" (大ー) for an obscured price.
  ** [[wikipedia:Japanese amberjack|Japanese amberjack]] (ぶり ''Buri'') for an obscured three-digit price.
  ** [[wikipedia:Tomalley|Tomalley]] (かにみそ ''Kanimiso'') for an obscured three-digit price.
  ** [[wikipedia:Tobiko|Flying fish roe]] (とびこ ''Tobiko'') for an obscured price.
  ** [[wikipedia:ja:えんがわ|Fin-base fish meat]] (えんがわ ''Engawa'') for an obscured price.
  ** [[wikipedia:Japanese quail|Japanese quail]] (うずら ''Uzura'') for an illegible two-digit price.
  ** [[wikipedia:Corn|Corn]] (コーン ''Kōn'') for an illegible three-digit price.
  ** [[wikipedia:Nattō|Natto]] (なっとう ''Nattō'') for 170.
  ** [[wikipedia:Roe|Roe]] (いくら ''Ikura'') for 300—corresponding to "[[Gunkan Suship Ikura]]", which has 300 [[DEF]].
  ** [[wikipedia:Sea urchin|Urchin]] (うに ''Uni'') for 500—corresponding to "[[Gunkan Suship Uni]]", which has 500 [[DEF]].
  ** [[wikipedia:Salangidae|Icefish]] (しらうお ''Shirauo'') for 250—corresponding to "[[Gunkan Suship Shirauo]]", which has 250 [[DEF]].
  ** [[wikipedia:Adductor muscles (bivalve)|Adductor muscle]] (貝柱 ''Kaibashira'') for 200.
  * This card's effect is based on offering a customer the dish of the day at a restaurant. The player takes on the role of the chef, showing the opponent, the customer, the dish of the day (revealing a Suship Xyz monster, all of which name a Main Deck monster for the opponent to read). They can decline and order something else, if they know what's available on the menu (if they know the name of a different Suship monster that they'd prefer for be added to the hand). When it's destroyed, they must pay the bill - 500 LP for each dish (Suship monster) they've ordered (added from the Deck to the hand).
