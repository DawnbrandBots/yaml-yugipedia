title: Card Trivia:Necromaid Re:D
wikitext: |-
  {{Navigation}}

  * This monster appears to be "[[Necromaid Nana]]" [[cosplay]]ing as "[[CAN - Re:D]]".
  ** This monster has the same [[Level]] (7) and [[original ATK]] (2500) as "CAN - Re:D".
  *** This monster's effect to [[return]] an opponent's monster to the [[hand]] is based on the effect of "CAN - Re:D" to return the player's monster to the hand.
  ** This monster has the same [[original DEF]] (700) as "Necromaid Nana".
  ** This monster was revealed two days before Halloween 2025, tying into its dress-up theme.
