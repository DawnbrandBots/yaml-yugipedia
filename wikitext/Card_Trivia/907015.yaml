title: Card Trivia:Magikey Mechmusket - Batosbuster
wikitext: |-
  {{Navigation}}

  * "[[Clavkiys, the Magikey Skyblaster]]" appears in this card's artwork.
  * This monster's name is derived from [[wikipedia:Barbatos|Barbatos]], one of the Dukes of Hell featured in ''[[wikipedia:The Lesser Key of Solomon|The Lesser Key of Solomon]]''.
  * This monster's weapon is based on the [[wikipedia:M134 Minigun|M134 Minigun]], a [[wikipedia:Gatling gun|Gatling]]-style rotary machine gun known for its immense firepower.
  * This is the first [[Ritual Monster]] that is also a [[Tuner monster]].
