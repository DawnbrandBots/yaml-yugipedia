title: Card Trivia:Red-Eyes Slash Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duelist Pack: Legend Duelist]]''/''[[Legendary Duelists]]''.
  * This monster is a [[Fusion Monster|Fusion]] of "[[Red-Eyes Black Dragon]]" and "[[Gearfried the Red-Eyes Iron Knight]]".
  * This card shares the same [[Attribute]], [[Type]], [[ATK]] and [[DEF]] as "[[Red-Eyes Darkness Metal Dragon]]" and "[[Red-Eyes Flare Metal Dragon]]".
  * According to an [https://ygorganization.com/legendscollectorsandspecialsohmy/ article] published by Konami, this monster's [[Equip]] [[effect]] takes fallen monsters as riders.
