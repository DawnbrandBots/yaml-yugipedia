title: Card Trivia:Icejade Creation Aegirocassis
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Icejade Manifestation]]".
  * This monster is the evolved "[[Icejade]]" version of "[[Swordsoul of Mo Ye]]".
  * This card is named after the ''[[wikipedia:Aegirocassis|Aegirocassis]]''.
  ** The name is similar to [[wikipedia:Aegirine|aegirine]] (the namesake of "[[Icejade Gymir Aegirine]]").
