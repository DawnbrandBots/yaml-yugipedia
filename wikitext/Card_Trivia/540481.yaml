title: Card Trivia:Inferno Fire Blast
wikitext: |-
  {{Navigation}}

  * "[[Red-Eyes Black Dragon]]" appears in this card's artwork.
  ** This card's name is a reference to the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "[[Red-Eyes B. Dragon (anime)|Red-Eyes Black Dragon]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and [[Yu-Gi-Oh! (manga)|manga]]: "Inferno Fire Blast" ({{Ruby|黒|こく}}{{Ruby|炎|えん}}{{Ruby|弾|だん}} ''Kokuendan'', "Black Flame Blast").
  * This card has a "[[Blue-Eyes]]"-related [[counterpart]]: "[[Burst Stream of Destruction]]".
