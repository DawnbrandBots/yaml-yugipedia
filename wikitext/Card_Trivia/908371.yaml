title: Card Trivia:Thunderforce Attack
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Egyptian God Deck: Slifer the Sky Dragon]]'', as well as one of the cover cards of ''[[Structure Deck: Egyptian Gods' Advent: Slifer the Sky Dragon & Obelisk the Tormentor]]''.
  * "[[Slifer the Sky Dragon]]" appears in this card's artwork.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "[[Slifer the Sky Dragon (anime)|Slifer the Sky Dragon]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
