title: Card Trivia:Blue Dragon Summoner
wikitext: |-
  {{Navigation}}

  * "[[Ventdra, the Empowered Warrior]]" appears in this card's artwork.
  * This card is named after the [[wikipedia:Azure Dragon|Azure Dragon]], one of the [[wikipedia:Four Symbols (China)|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]] that represents the [[wikipedia:East|East]] and the [[wikipedia:Spring (season)|Spring season]].
