title: Card Trivia:Helixx Necro Darwin
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Charles Darwin|Charles Darwin]], a 19h century English biologist who is credited for the first comprehensive description of [[wikipedia:evolution|evolution]] through [[wikipedia:natural selection|natural selection]], keeping in relation with the [[wikipedia:genetics|genetics]] theme of the "[[Helixx]]" [[archetype]].
