title: Card Trivia:Speedroid Pachingo-Kart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Speedlift]]" and "[[Speedroid Wheel]]".
  * This monster's name is a portmanteau of "[[wikipedia:Pachinko|pachinko]]" and "[[wikipedia:Go-kart|go-kart]]".
  ** This monster's design is a combination of the aforementioned words: it features the frame and body of a go-kart with the metallic balls found in pachinko machines serving as its wheels.
