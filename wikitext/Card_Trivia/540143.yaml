title: Card Trivia:Anthrosaurus
wikitext: |-
  {{Navigation}}

  * This monster is likely based on the [[wikipedia:Dinosauroid|Dinosauroid]], a hypothetical species proposed by [[wikipedia:Dale Russell|Dale A. Russell]] in 1982.
  ** This monster's ''[[TCG]]'' name is a portmanteau of the Greek words, ''anthro'' (meaning "human" or "man") and ''saurous'' (meaning "lizard", commonly used to identify dinosaurs).
  ** This monster's ''TCG'' name is also based on this card's Japanese name, "Dinosaur Man".
  * This monster has a [[recolored counterpart]]: "[[Krokodilus]]".
  * This is the first [[Dinosaur]] monster to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This is one of eight of [[Joey Wheeler]]'s [[Normal Monster]]s introduced in the ''TCG'' in ''[[Legendary Collection 4: Joey's World Mega Pack]]'' that have their English [[flavor text]]s written in his [[wikipedia:Brooklyn|Brooklyn]] accent. The other seven are "[[Hero of the East]]", "[[Kageningen]]", "[[Little D]]", "[[Meotoko]]", "[[Skull Stalker]]", "[[Stone Armadiller]]", and "[[Wolf]]". ("[[Alligator's Sword]]", which is included in ''Legendary Collection 4: Joey's World Mega Pack'' but debuted in the ''TCG'' previously, also has this kind of English flavor text.)
  ** All of these monsters are seen in Joey's very first [[Deck]], except for "Hero of the East" (which is only seen when Joey has a dream of himself with his inexperienced Deck) and "Little D" (which has not appeared in the anime).
  ** In Italian, Portuguese and Spanish, these cards' flavor texts are also written in [[wikipedia:Eye dialect|eye dialect]] for the sake of humor. Apart from the French text which is translated more directly from the Japanese text in a little more serious way, texts in other ''TCG'' languages appear to be translated from the English text.
