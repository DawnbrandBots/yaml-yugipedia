title: Card Trivia:Kaminote Blow
wikitext: |-
  {{Navigation}}

  * "[[Master Monk]]" and the destroyed remains of "[[Millennium Shield]]" appear in this card's artwork.
  ** This is ironic, as the [[flavor text]] of "Millennium Shield" states that it can withstand any strong attack.
  * The word "Kaminote" in this card's ''[[TCG]]'' name translates to a portion of its Japanese name, "God Hand", which is derived from the Japanese words for "God's" (神の, ''Kami no'') and "hand" (手 ''te'').
