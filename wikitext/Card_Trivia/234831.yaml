title: Card Trivia:Legendary Dragon of White
wikitext: |-
  {{Navigation}}

  * This card is an [[Xyz Monster|Xyz]] and [[Match winner]] version of "[[Blue-Eyes White Dragon]]".
  ** It has the same [[ATK]], [[DEF]], [[Rank]]/[[Level]], [[Type]], and [[Attribute]].
  ** It is drawn in a pose similar to the first ''OCG/TCG'' artwork of "Blue-Eyes".
  ** "[[Dark Magician]]" also received an Xyz Match winner version, "[[Legendary Magician of Dark]]".
  * While this card was almost impossible to obtain in the ''[[TCG]]'' (it was exclusively available to [[World Championship]] participants, until it was released in [[World Superstars]]), it has been released publicly in the ''[[OCG]]'' through the ''[[Extra Pack: Sword of Knights]]'' set, albeit as a difficult-to-pull [[Extra Secret Rare]] card. All top World Championship prize cards, such as the following "[[Grandopolis, The Eternal Golden City]]", would receive the same "rarity drop".
