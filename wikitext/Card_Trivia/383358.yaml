title: Card Trivia:Miracle Mirror
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The card "[[Solemn Scolding]]" appears in this card's artwork.
  * This card's Japanese name is a pun: it uses the kanji for "miracle" (奇跡, ''Kiseki''), but if substituted for its English equivalent in Japanese, it would become 「ミラクル」 (''Mirakuru''), which is a modified [[wikipedia:Palindrome|palindrome]] of the rest of its name 「クール・ミラー」 (''Kūru Mirā'').
  ** This references the presence of the word "mirror" in this card's name, as well as this card's mirror-like effect to protect a monster by [[banish]]ing another card that [[negate]]d a monster's destruction.
