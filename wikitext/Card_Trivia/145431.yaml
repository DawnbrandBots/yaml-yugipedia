title: Card Trivia:Abyss Ruler Mictlancoatl
wikitext: |-
  {{Navigation}}

  * This monster's name is a wordplay on [[wikipedia:Mictlāntēcutli|Mictlāntēcutli]], the Aztec deity of the dead.
  ** This monster's name is also a portmanteau of "[[wikipedia:Mictlān|Mictlān]]" (the name of the [[wikipedia:Underworld|underworld]] in [[wikipedia:Aztec mythology|Aztec mythology]]) and "coatl" (the [[wikipedia:Nahuatl|Nahuatl]] word for "serpent").
