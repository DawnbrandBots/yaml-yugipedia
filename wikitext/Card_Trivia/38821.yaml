  * The monster in this card's artwork can also be seen in the artwork of "[[Trap Hole]]", "[[Treacherous Trap Hole]]", "[[Fissure]]", "[[Oh F!sh!]]", and "[[Traptrix Trap Hole Nightmare]]". The monsters from "[[Bottomless Trap Hole]]" and "[[Acid Trap Hole]]" can also be seen in this card.
