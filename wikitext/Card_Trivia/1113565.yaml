title: Card Trivia:Treasures of the Kings
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * The statue from the artwork of "[[Judgment of Anubis]]" appears in this card's artwork.
  * This card is a retrained, evolved counterpart of "[[Temple of the Kings]]".
  ** Either this temple or "Temple of the Kings" appears in the artwork of "[[The Man with the Mark]]".
  ** This card's name is based on a statement made by [[Rishid (manga)|Rishid]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ([[Odion]] in the [[Yu-Gi-Oh! (anime)|anime]]) where he declares that the "[[Royal Temple]]" is a sanctuary for the "'''king's treasures'''".
  ** This card's artwork is based on the artwork of "Royal Temple" (which the anime artwork of "Temple of the Kings" was based on as well).
  ** This card's [[Field Spell]] subcategory is based on how "[[Temple of the Kings (anime)|Temple of the Kings]]" is a Field Spell Card in the ''Yu-Gi-Oh!'' anime.
  ** This card's effect to [[Set]] an "[[Apophis]]" [[Trap Card]] from the [[Deck]] upon [[activate|activation]] is based on how Rishid quickly Set two of his three copies of "[[Embodiment of Apophis (manga)|Embodiment of Apophis]]" while he [[control]]led "Royal Temple".
