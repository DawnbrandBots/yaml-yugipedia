title: Card Trivia:Heraldic Beast Twin-Headed Eagle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Charged-Up Heraldry]]".
  * This monster is based on the [[wikipedia:Double-headed eagle|double-headed eagle]] used as a [[wikipedia:Heraldry|heraldry]] [[wikipedia:Charge (heraldry)|charge]] to symbolize the union of the imperial dignity of the [[wikipedia:Holy Roman Empire|Holy Roman Empire]] with the [[wikipedia:Monarchy of Spain|Spanish Monarchy]] in the 16th century.
