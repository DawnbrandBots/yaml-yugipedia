title: Card Trivia:Brotherhood of the Fire Fist - Peacock
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Fists of the Gadgets]]''.
  * This monster appears in the artwork of "[[Fire Formation - Ingen]]".
  * This card's Japanese name, "Bright Flame Star - Hu Sanque" ({{Ruby|慧|けい}}{{Ruby|炎|えん}}{{Ruby|星|せい}}－コサンジャク ''Keiensei - Kosanjaku''), is based on [[wikipedia:Hu Sanniang|Hu Sanniang]].
  ** ''Yan Qing'' ranks 59th among the 108 [[wikipedia:108 Stars of Destiny|Liangshan heroes]] and 23rd among the 72 [[wikipedia:Water Margin|Earthly Fiends]], and is nicknamed "Ten Feet of Blue".
  *** Based on her story, she was initially fighting the Liangshan heroes. She used to fight with a pair of sabres and/or lasso. She used to use her lasso to capture enemies, resembling her effect. But later on, when pursuing [[wikipedia:Song Jiang|Song Jiang]], she was defeated and captured by [[wikipedia:Lin Chong|Lin Chong]] and then later she joined the Liangshan heroes.
  * This card is the first "[[Fire Fist]]" female monster.
