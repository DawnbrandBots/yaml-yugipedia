title: Card Trivia:Cyberse Clock Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Soul Fusion]]'', as well as one of the cover cards of ''[[Mega Pack 02]]''.
  * This monster's name references [[wikipedia:Clock rate|clock rates]], a rate of time it takes a computer processor to perform basic functions via frequencies generated by the clock generator of the processor.
  * This is the first [[Cyberse]] [[Fusion Monster]], as well as the first Fusion Monster, to be [[Fusion Summon]]ed in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  * This is the first Fusion Monster to list a [[Link Monster]] as [[Fusion Material]].
  * This monster is the [[Card evolutions|evolved]] Fusion form of "[[Clock Wyvern]]".
  * This monster has several similarities to "[[Cyberse Magician]]" and "[[Cyberse Quantum Dragon]]".
  ** "Cyberse Magician"
  *** Both monsters feature an effect that allows them to gain a minimum of 1000 [[ATK]].
  *** Both monsters feature an effect that can add a card type ([[Spell Card|Spell]] and [[Monster Card|Monster]], respectively) from the Deck to the hand when they are sent to the Graveyard by an opponent's card effect.
  ** "Cyberse Quantum Dragon"
  *** Both monsters are [[Dragon]]-themed [[Extra Deck]] monsters.
  ** "Cyberse Magician" and "Cyberse Quantum Dragon"
  *** They are the first Cyberse monsters of their respective monster card types (Fusion, [[Ritual Monster|Ritual]] and [[Synchro Monster|Synchro]], respectively).
  *** They all share the same [[Attribute]] ([[DARK]]), [[Level]] (7), [[Type]] (Cyberse), and [[original ATK and DEF]] (2500/2000).
  *** They all have an effect that protects their controller's other monsters from being targeted by an opponent's attack or card effect while a Link Monster is also on their field.
  * This card has the longest single [[monster effect]] of any [[Effect Monster]] in the English ''[[TCG]]'', with 130 words and 706 characters.
  * Much like how "[[Firewall Dragon]]" opposes "[[Borreload Dragon]]", this card appears to likewise oppose "[[Borreload Furious Dragon]]", indicating a rivalry with the two cards.
