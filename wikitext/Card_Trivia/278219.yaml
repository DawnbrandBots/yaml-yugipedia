title: Card Trivia:Shadow Concealing Darkness
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name and artwork, and second effect are an ironical paradox, as its artwork depicts a shadow ''without'' the presence of light, but shadows cannot exist without the light.
  ** Also, this card's artwork features red, blue, and green spotlights, representing the [[wikipedia:RGB color model|RGB color model]], an additive color model where the red, green, and blue primary colors of light are added together to create a colorful array of colors, which further adds to the paradox; however, when the colors of the RGB color model are at the range of '''0''', it can create a black color, which is often represented as the darkness.
