title: Card Trivia:Naturia Mosquito
wikitext: |-
  {{Navigation}}

  * In this card's artwork, "Naturia Mosquito"'s feminine-like appearance, along with the pink heart, are allegorical to real-life mosquitoes in that only the females of each species feed on mammalian blood; "Naturia Mosquito" is assumingly preparing to do such in this card's artwork.
