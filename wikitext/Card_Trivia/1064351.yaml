title: Card Trivia:Max Metalmorph
wikitext: |-
  {{Navigation}}

  * This card is a [[retrain]]ed counterpart of "[[Metalmorph]]".
  ** This card's artwork is based on the artwork of "[[Rare Metalmorph]]", another retrained counterpart of "Metalmorph".
  ** This card's bulleted effect is based on the effect of "[[Metalmorph (manga)|Metalmorph]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ("[[Magic Metal Force]]" in the [[Yu-Gi-Oh! (anime)|anime]]), which increases the [[equip]]ped monster's [[ATK]]/[[DEF]] by 400 and makes it immune to destruction by [[Spell Card]]s and magical attacks.
