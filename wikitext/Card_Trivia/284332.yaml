title: 'Card Trivia:Number C43: High Manipulator of Chaos'
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Soul-Puppeteering Demon God - Chaos Marionetter", is based on [[wikipedia:Marionette|Marionette]]-style puppetry, where a jointed doll or dolls is controlled from above by a living puppeteer.
  * This card is the "[[Number C]]" [[Card evolutions|upgraded]] form of [[Number 43: Manipulator of Souls]]".
  * This card is one of four "Number C" monsters to have the same [[ATK]]/[[DEF]] as their base form, the other three being "[[Number C5: Chaos Chimera Dragon]]", "[[Number C39: Utopia Ray]]", and "[[Number C32: Shark Drake Veiss]]".
  * This card has the lowest ATK of any "Number C" monster, tied with "Number C5: Chaos Chimera Dragon" and "[[Number C80: Requiem in Berserk]]".
  ** This card also has the lowest DEF of any "Number C" monster, tied with "[[Number C92: Heart-eartH Chaos Dragon]]".
