title: Card Trivia:Centerfrog
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Sleep Frog" (ねガエル, ''negaeru'') is a pun on the Japanese term meaning "to switch sides and betray".
  ** This monster's Japanese name and effect to change it into [[Defense Position]] reflects this, as it is depicted sleeping on its side, which is typically the position of Defense Position monsters.
  ** This monster's effect of switching [[control]] of the opponent's monsters reflects the term as well, as the two copies of this monster will allow the opponent's monster to "betray" their owner by switching to the player's sides.
  *** The word "Center" in this monster's English name also reflects this effect, as it can allow the player to take control of the opponents' monsters who are placed in the "center" between the two copies of this monster on their [[field]].
  ** This monster's design featuring a black circle on its belly and this card's effect is also a reference to the [[wikipedia:Reversi|reversi board game]], where the player can capture an opponent's pieces by switching over the sides of the pieces from white to black and vice-versa, whereas this monster can "capture" the opponent's monsters by switching them to the player's sides.
