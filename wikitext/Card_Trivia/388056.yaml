title: Card Trivia:Metamorformation
wikitext: |-
  {{Navigation}}

  * "[[Metalfoes Goldriver]]", "[[Metalfoes Steelen]]", and "[[Master Peace, the True Dracoslayer]]" appear in this card's artwork.
  * Like the other Field Spells of archetypes related to the "[[Dracoslayer]]" storyline ("[[Ignition Phoenix]]", "[[Dinomic Powerload]]", "[[Majesty's Pegasus]]", "[[Amorphous Persona]]", "[[Crystolic Potential]]", "[[Zodiac Sign]]", and "[[Dragonic Diagram]]"):
  ** They are Field Spells that feature a member of the "Dracoslayer" archetype in its artwork.
  ** They support their respective archetype, but are not part of the archetype themselves (they do not have the archetype in their name).
  ** Their Japanese names each have a word abbreviated with an English letter with Furigana. In this card's case, "Formation" is written as a "F".
