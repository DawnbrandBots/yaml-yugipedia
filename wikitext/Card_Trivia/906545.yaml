title: Card Trivia:Elemental HERO Flame Wingman - Infernal Rage
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Nature Pack: Blazing Heroes]]''.
  * "[[Skyscraper]]" appears in this card's artwork.
  * This monster is the [[signature move]] [[counterpart]] of "[[Elemental HERO Flame Wingman]]".
  ** Its [[Level]] (8) references how "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" was a [[Level 8]] monster in the first season of the Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Its [[Fusion Material]]s requiring two "[[Elemental HERO]]" monsters with different [[Attribute]]s reference how "Flame Wingman" requires the [[WIND]] "[[Elemental HERO Avian]]" and the [[FIRE]] "[[Elemental HERO Burstinatrix]]" as [[material]].
  ** Its effect to [[search]] for a "[[Favorite]]" card is based on how [[Jaden Yuki]] frequently calls "Flame Wingman" his "favorite" card in the ''Yu-Gi-Oh! GX'' anime.
  ** Its effect to [[Special Summon]] a [[Level 7]] or lower "[[Elemental HERO]]" monster from the [[Extra Deck]] [[ignoring the Summoning conditions]] is based on how "Flame Wingman" is released in the ''[[OCG]]''/''[[TCG]]'' as a [[Level 6]] [[Nomi]] monster.
