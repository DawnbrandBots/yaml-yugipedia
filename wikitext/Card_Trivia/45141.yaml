title: Card Trivia:Satellite Cannon
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Satellite|satellite]], a space craft placed into orbit around a celestial body.
  ** Fittingly, in the anime, when this monster was Summoned, it appeared in [[wikipedia:Outer space|outer space]].
  ** Its effect to prevent it from being [[destroyed by battle]] with a [[Level 7]] or lower monster is based on how other monsters were often out of the range to attack it, which is depicted in the anime.
  ** This monster's effects to gain 1000 [[ATK]] during the player's [[End Phase]]s and return its increased ATK to 0 after [[damage calculation]] if it attacks are based on how a satellite can collect [[wikipedia:Solar power|solar power]] or some similar form of [[wikipedia:Energy|energy]], and then release its energy in the form of a [[wikipedia:Laser|laser]].
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Satellite Laser Balsam (anime)|Satellite Laser Balsam]]".
