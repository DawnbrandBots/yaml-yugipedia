title: Card Trivia:Ameba
wikitext: |-
  {{Navigation}}

  * This card is named after an [[wikipedia:amoeba|amoeba]], a single-celled organism that has the ability to change its shape.
  * This monster is depicted engulfing a humanoid figure, with the figure's hands sticking out of it at the top.
  * This card's effect is the opposite to that of "[[Griggle]]".
