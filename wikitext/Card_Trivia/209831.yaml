title: Card Trivia:Xyz Unit
wikitext: |-
  {{Navigation}}

  * "[[Shining Elf]]" appears in this card's artwork.
  * The word "Unit" in this card's name references the [[Yu-Gi-Oh! ZEXAL|anime]]'s term for [[Xyz Material]]s, "Overlay Units".
  ** The ring of light in this card's artwork matches the anime's depiction of an "Overlay Unit", reflecting this card's effect to be used as an extra Xyz Material to be [[detach]]ed.
