title: Card Trivia:Grasschopper
wikitext: |-
  {{Navigation}}

  * Though this card's English name is a portmanteau of "[[wikipedia:Grasshopper|grasshopper]]" (a type of insect) and "chopper" (alluding to its large sickle-shaped forelimbs), this monster more closely resembles a [[wikipedia:Mantis|mantis]].
