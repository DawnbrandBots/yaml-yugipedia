title: Card Trivia:Hi-Speed Re-Level
wikitext: |-
  {{Navigation}}

  * "[[Ghostrick Nekomusume]]", "[[Rock Ogre Grotto 1|Rock Ogre Grotto #1]]", and "[[Speedroid Tri-Eyed Dice]]" appear in this card's artwork.
  ** This card's artwork is based on its effect in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, which [[banish]]es a "[[Speedroid]]" or "[[Hi-Speedroid]]" monster from the [[Graveyard]] to changes the [[Level]]s of all monsters on the [[field]] to the Level of the banished monster's. In the ''[[OCG]]''/''[[TCG]]'', this effect is altered so it is applied only to a [[Synchro Monster]] the player controls, in addition to increasing its [[ATK]] by 500 multiplied by the banished "Speedroid" monster's Level.
