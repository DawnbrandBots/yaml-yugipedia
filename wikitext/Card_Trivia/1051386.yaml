title: Card Trivia:Toichi the Nefarious Debt Collector
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name references a Japanese term (十一, ''Toichi'') for a type of illegal loan that charges 10% interest every 10 days.
  * The kanji in this card's artwork (借用書, ''Shakuyōsho'') translates to "[[wikipedia:Promissory_note|promissory note]]".
  ** This, along with the text "1000P" written on the papers in the background of this card's artwork, reflect the fact that this monster can inflict 1000 damage for each "[[Loan Token]]" on the [[field]].
