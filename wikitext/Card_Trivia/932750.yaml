title: Card Trivia:Altergeist Adminia
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Adrasteia|Adrasteia]]" and "[[wikipedia:Administration|administration]]".
  ** Adrasteia is the Greek goddess of "inevitable fate", representing "pressing necessity", and the inescapability of punishment.
  ** "Administration" is likely based on either [[wikipedia:Network management|network administration]] (the configuration of a computer network) or [[wikipedia:System administrator|system administrator]] (the upkeep of computer systems).
