title: Card Trivia:Blackwing - Backlash
wikitext: |-
  {{Navigation}}

  * "[[Blackwing - Blizzard the Far North]]", "[[Blackwing - Gale the Whirlwind]]", "[[Blackwing - Mistral the Silver Shield]]", "[[Blackwing - Sirocco the Dawn]]", and "[[Blackwing Armed Wing]]" appear in this card's artwork.
  ** The five "[[Blackwing]]" monsters depicted in this card's artwork are creating an explosion to, presumably, blow up the opponent's monsters from the [[Graveyard]], which is reflected in this card's artwork.
