title: 'Card Trivia:Number C107: Neo Galaxy-Eyes Tachyon Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Chaos Hundred Universe]]", "[[Saga of the Dragon Emperor]]", "[[Neutrino Dowsing]]", and "[[Tachyon Chaos Hole]]".
  * This monster is an [[Card evolutions|upgraded]] "[[Number C]]" form of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]".
  ** Like "[[Number C39: Utopia Ray]]" and "[[Number C32: Shark Drake Veiss]]", this monster's color scheme is the reverse of that of its base form: this monster is light-yellow, while "Galaxy-Eyes Tachyon Dragon" is dark-purple.
  * A [[wikipedia:Tachyon|tachyon]] is a hypothetical particle described in quantum physics to be capable of traveling over light speed, resulting in time travel.
  ** Fittingly, this card's effect symbolize the reversing of time.
  *** Furthermore, when this card first activated its [[Rank-Up]] effect in {{episode|ZEXAL|128|ref}}, the soundtrack was played in reverse.
  * This is the first Dragon "Number C" monster.
  * This is the first "Number C" Summoned by "[[Rank-Up-Magic Barian's Force (anime)|Rank-Up-Magic Barian's Force]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This was also the first monster Summoned by "Barian's Force" to not be a "[[CXyz]]" monster.
  ** Ironically, out of all "Number C" monsters, this card has its effect kept unrevealed for the longest time: it was first Summoned in {{episode|ZEXAL|083|ref}} and its effect was not used until {{episode|ZEXAL|128|ref}}.
  * This monster's initial appearance in the anime bears a resemblance to the [[The Winged Dragon of Ra - Immortal Phoenix|phoenix mode]] of "[[The Winged Dragon of Ra (original)|The Winged Dragon of Ra]]".
  * Just as "Number 107: Galaxy-Eyes Tachyon Dragon" is very similar to "[[Galaxy-Eyes Photon Dragon]]" and "[[Galaxy-Eyes Cipher Dragon]]", this monster shares some similarities with "[[Neo Galaxy-Eyes Photon Dragon]]" and "[[Neo Galaxy-Eyes Cipher Dragon]]".
  ** All have three heads.
  ** All have "Neo" in their names in addition to their base form's one.
  * This card and "Neo Galaxy-Eyes Photon Dragon" both activate their effects during the [[Main Phase]], unlike their original counterparts which activate their effects during the [[Battle Phase]].
  * This monster has the highest [[original ATK]] (4500) of all "Number C" monsters.
  ** This monster is also tied with "[[Number 22: Zombiestein]]" for the highest original ATK of all "[[Number]]" monsters.
  *** Additionally, this monster has the highest [[ATK]] difference from its original form, at 1500 ATK.
  * This monster and "[[Number C39: Utopia Ray V]]" are so far the only card to belong to ten supported archetypes: "[[C (archetype)|C]]", "Number", "Number C", "[[Number 10X]]", "[[Number C10X]]", "[[Galaxy]]", "Galaxy-Eyes", "[[Tachyon]]", "[[Tachyon Dragon]]" and "[[Galaxy-Eyes Tachyon Dragon]]".
  ** Although "Number C", "Number 10X", "Number C10X", "Galaxy-Eyes", "Tachyon Dragon", and "Galaxy-Eyes Tachyon Dragon" are sub-archetypes of "Chaos", "Number", "Number C", "Number 10X", "Galaxy", "Galaxy-Eyes", "Tachyon" and "Tachyon Dragon" respectively, they have specific support.
