title: Card Trivia:Mementomictlan Tecuhtlica - Creation King
wikitext: |-
  {{Navigation}}

  * A mural depicting this monster appears in the artwork of "[[Mementomictlan]]".
  * This is the first [[Illusion]] monster whose design does not feature the [[Eye of Wdjat]].
  ** This is also the first Illusion monster not to feature either the Eye of Wdjat or the effect to prevent monsters from being [[destroyed by battle]]s involving itself, as both "[[Jongleur-Ghoul Illusionist]]" and "[[Diabellze the Original Sinkeeper]]", the first Illusion monster and Illusion [[Effect Monster]] respectively to lack the aforementioned effect, do feature the Eye of Wdjat in their designs.
