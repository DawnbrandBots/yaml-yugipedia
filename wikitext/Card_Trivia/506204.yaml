title: Card Trivia:Mystical Sheep 2
wikitext: |-
  {{Navigation|Mystical Sheep #2}}

  * This monster appears in the artwork of "[[Night Before the Big March]]" and "[[The Big March of Animals]]".
  * This monster has a [[recolored counterpart]]: "[[Mystical Sheep 1|Mystical Sheep #1]]".
  ** Both monsters' Japanese names and designs are based on [[wikipedia:Counting sheep|counting sheep]], a mental exercise used to put oneself to sleep.
  ** Despite their international names, "Mystical Sheep #1" was released in the ''[[TCG]]'' after this card.
  ** Interestingly, this monster is a [[Fusion Material]] for "[[Fusionist]]", while "Mystical Sheep #1" card is a [[Fusion Substitute Monster]].
  * This card has a "[[Memento]]" counterpart: "[[Mementotlan Shleepy]]".
  * This card's Spanish print uses the numero sign (nº) instead of the usual [[wikipedia:Number sign|number sign]] (#).
