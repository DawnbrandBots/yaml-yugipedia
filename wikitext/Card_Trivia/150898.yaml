title: Card Trivia:Legendary Jujitsu Master
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Showdown of the Secret Sense Scroll Techniques]]".
  * An enlarged image of this monster's face encompasses the background of this card's artwork. This is a classic trope in [[wikipedia:Fighting game|fighting video games]], which is present in the artworks of all "[[Vanquish Soul]]" monsters, which are based on the same genre.
  * The kanji on this monster's eyepatch (柔) is the "ju" in "jujitsu", meaning "soft", "flexible", or "yielding." Appropriately, jujitsu itself is a martial art that relies on weaponizing these qualities to use the opponent's strength against them.
