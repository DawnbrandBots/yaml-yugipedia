title: Card Trivia:Stardust Synchron
wikitext: |-
  {{Navigation}}

  * A [[Planetary Particle]] appears in this monster's chest.
  ** This is a reference to [[Dr. Fudo]], the inventor of the Planetary Particle in the ''[[Yu-Gi-Oh! 5D's]]'' anime. Dr. Fudo, in turn, would later name his son [[Yusei Fudo]] after the Planetary Particle (遊星粒子, ''Yūsei Ryūshi''), who would later use the "[[Stardust (archetype)|Stardust]]" and "[[Synchron]]" [[archetype]]s in the anime.
  * This monster is a "Synchron" counterpart of "[[Stardust Dragon]]".
  ** This monster's [[Level]] (4) is half of that of "Stardust Dragon's" (8).
  ** This monster's [[original ATK and DEF]] (1500/1000) are 1000 lower than those of "Stardust Dragon's" (2500/2000).
  * This monster is a "Synchron" [[counterpart]] of "[[Crimson Resonator]]".
  * This is the first "Stardust" [[Machine]] monster.
  * This is the first and currently only "Synchron" monster that cannot be used to [[Synchro Summon]] its corresponding "[[Warrior (archetype)|Warrior]]" [[Synchro Monster]], "[[Stardust Warrior]]", as it requires a [[Synchro Tuner Monster]] and a non-[[Tuner]] Synchro Monster as [[Synchro Material]].
  ** But this card can be used to [[Synchro Summon]] "[[Stardust Assault Warrior]]" and "[[Stardust Charge Warrior]]". Both monster are [[counterpart]] of "[[Stardust Warrior]]".
