title: Card Trivia:Good & Evil in the Burning Abyss
wikitext: |-
  {{Navigation}}

  * This is the first "[[Burning Abyss]]" [[Spell Card]] to be released.
  * Both "[[Dante, Traveler of the Burning Abyss]]" and "[[Malacoda, Netherlord of the Burning Abyss]]" appear in this card's artwork.
  ** This card's artwork depicts "Dante" creating "Malacoda" in his own mind, as [[wikipedia:Malacoda|Malacoda]] was actually a character created by [[wikipedia:Dante Alighieri|Dante]] himself.
