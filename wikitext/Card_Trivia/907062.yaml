title: Card Trivia:Virtual World Kyubi - Shenshen
wikitext: |-
  {{Navigation}}

  * Visually, this monster is based on a [[wikipedia:Nine-Tailed Fox|Nine-Tailed Fox]] (zh: 九尾狐 ''jiǔwěihú'').
  * This card's name is a [[wikipedia:reduplication|reduplication]] of the Chinese character ''xiān'' (仙; "[[wikipedia:Xian (Taoism)|immortal]]"). It's possibly taken from 狐仙 (''húxiān'', lit. Fox Immortal).
