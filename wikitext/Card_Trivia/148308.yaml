title: Card Trivia:Meklord Factory
wikitext: |-
  {{Navigation}}

  * The device shown in this card's artwork resembles a [[wikipedia:Guillotine|guillotine]].
  * The device's color scheme are based off the color schemes of the "[[Meklord]]"/"[[Meklord Army]]" monsters. The device is blue like "[[Meklord Emperor Skiel]]"/"[[Meklord Army of Skiel]]", the body is white like "[[Meklord Emperor Wisel]]"/"[[Meklord Army of Wisel]]" and the base is orange-brown like "[[Meklord Emperor Granel]]"/"[[Meklord Army of Granel]]".
