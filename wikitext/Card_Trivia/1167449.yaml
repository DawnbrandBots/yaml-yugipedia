title: Card Trivia:Oracle of the Sun
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Villac Umu|Villac Umu]], the High Priests of the Sun in the [[wikipedia:Inca Empire|Inca Empire]] who worshipped the Inca sun god, [[wikipedia:Inti|Inti]].
  ** Fittingly, this monster was used as [[Synchro Material]] to [[Synchro Summon]] "[[Sun Dragon Inti]]" (which is based on Inti) in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
