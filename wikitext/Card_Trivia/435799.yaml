title: Card Trivia:Performapal Sleight Hand Magician
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starter Deck 2016]]''/''[[Starter Deck: Yuya]]''.
  * This monster appears in the artwork of "[[Performapal Dramatic Theater]]" and "[[Performapal Show Down]]".
  * This monster is based on "[[Performapal Sky Magician]]", the ace monster of [[Yusho Sakaki]], the father of [[Yuya Sakaki]].
  ** Both monsters are [[Level]] 7 [[Spellcaster]]s like "[[Dark Magician]]", the ace monster of [[Yami Yugi|another protagonist]], and share the same [[original ATK and DEF]] (2500/2000) with most of the latter's [[counterpart]]s.
  ** Both monsters are "[[Performapal]]" Magicians with a body structure featuring a humanoid upper half with a masked face and a downward isosceles triangular shape as the bottom half.
  ** "Sleight Hand" (スライハンド, ''Suraihando'') in this monster's name references {{episode|ARC-V|132|ref}}, in which the card of "Performapal Sky Magician" was fully revealed and used.
  * This monster's appearance features various motifs: the arced blade-like frames of "[[Timegazer Magician]]", the various line-interconnected blue gems/beads of "[[Stargazer Magician]]", and [[Yuya's pendant]].
  ** Regarding Yuya's pendant specifically, the bottom half of this monster resembles the pendant with the wings unfurled, while the head of this monster's staff is based on the head of the pendant.
