title: Card Trivia:Full-Speed Warrior
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Speed Warrior]]".
  ** This monster is named after "full speed", the term used for the highest possible speed or rate of movement. 
  ** This monster is depicted wearing a white scarf similar to that worn by "[[Junk Synchron]]" and "[[Junk Warrior]]", both of which "Speed Warrior" is commonly associated with in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's effect to increase the [[ATK]] of the player's monsters that mention "Junk Warrior" during their [[Battle Phase]], including this monster, is based on the effect of "Speed Warrior", which doubles its 900 [[ATK]] to 1800 during the turn it is [[Normal Summon]]ed until the end of the Battle Phase. 
  *** Additionally, its effect to increase the ATK of the player's "[[Warrior (archetype)|Warrior]]" [[Synchro Monster]] by 900 during their Battle Phase only references the effect of "Junk Warrior", which allows it to gain ATK equal to the combined ATK of all [[Level 2]] or lower monsters the player controls. In the ''Yu-Gi-Oh! 5D's'' anime, this effect was commonly used in conjunction with "Speed Warrior".
  ** This monster's pose is based on the pose struck by "Speed Warrior" when it was first Summoned in {{episode|5D's|001|ref}}.
