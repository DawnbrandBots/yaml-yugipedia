title: Card Trivia:Black Fang Magician
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Magician]]" form of "[[Dark Rebellion Xyz Dragon]]".
  ** This card's name, "Black Fang", is a reference to the dark color scheme of "Dark Rebellion" and its [[Summon chants in Yu-Gi-Oh! ARC-V#Yuto|Summon chant]] in the Japanese version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime: ''From the black darkness, the fangs of rebellion that fight against the powers of stupidity descend!'' ({{Ruby|漆|しっ}}{{Ruby|黒|こく}}の{{Ruby|闇|やみ}}より{{Ruby|愚|ぐ}}{{Ruby|鈍|どん}}なる{{Ruby|力|ちから}}に{{Ruby|抗|あらが}}う{{Ruby|反|はん}}{{Ruby|逆|ぎゃく}}の{{Ruby|牙|きば}}！ ''Shikkoku no yami yori gudon'naru chikara ni aragau hangyaku no kiba!'').
  ** This card is a [[Level]] 4 monster, so it can be used as [[Xyz Material]] to [[Xyz Summon]] "Dark Rebellion".
  ** This card's [[Pendulum Effect]] to halve the [[ATK]] of an opponent's monster is based on the effect of "Dark Rebellion" to [[detach]] an Xyz Material to halve the ATK of an opponent's monster and gain the lost ATK.
  ** This card's [[monster effect]] to [[Special Summon]] a [[DARK]] [[Spellcaster]] monster from the [[Graveyard]] is a reference to the effect of "[[Dark Requiem Xyz Dragon]]" to Special Summon an Xyz Monster from the Graveyard.
  ** This monster's clothes are based on "Dark Rebellion".
