title: Card Trivia:Shadow Spell
wikitext: |-
  {{Navigation}}

  * This card appears in the video game artwork of "[[Release Restraint Wave]]".
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, [[Yu-Gi-Oh! (anime)|anime]], and some video games, this card was a [[Spell Card]] instead of a [[Trap Card]].
  * This card shares similarities with "[[Fiendish Chain]]".
  ** Both are [[Continuous Trap Card]]s that depict chains in their artworks.
  ** Both feature a negative effect against the opponent's monster, prevent the [[target]]ed monster from attacking, and a self-destruction effect.
  ** Both are used by the main rivals of their respective debut series; this card is used by [[Seto Kaiba]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], while "Fiendish Chain" is used by [[Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime. Also, in a flashback sequence in {{episode|5D's|002|ref}}, Jack Atlas used this card to defeat [[Yusei Fudo]].
