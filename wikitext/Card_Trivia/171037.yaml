title: Card Trivia:Power Giant
wikitext: |-
  {{Navigation}}

  * This monster shares similarities with "[[Power Invader]]":
  ** Both monsters feature the word "Power" in their names.
  ** Both monsters share the same [[original ATK and DEF]].
  ** Both monsters feature an effect that allows them to be easily Summoned.
  ** Both monsters are used by [[Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
