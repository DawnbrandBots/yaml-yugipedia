title: Card Trivia:Queen's Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Court of Cards]]", "[[Face Card Fusion]]", and "[[Joker's Straight]]".
  ** This monster's silhouette appears in the artwork of "[[Goddess Bow]]", which was formed by fusing this monster and "[[The Claw of Hermos]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  *** The above-mentioned fact is reflected by how this monster shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (4), [[Type]] ([[Warrior]]), and [[original ATK and DEF]] (1500/1600) as "Goddess Bow".
  * This monster is based on the playing card, [[wikipedia:Queen (playing card)|the Queen]].
  * In the ''Yu-Gi-Oh!'' anime, this monster appears to be holding its sword in its right hand and its shield in its left hand, despite its artwork depicting it holding its sword and shield in opposite hands.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|252|ref}}, specifically from the panel where [[Queen's Knight (manga)|this monster]] is shown being Summoned.
