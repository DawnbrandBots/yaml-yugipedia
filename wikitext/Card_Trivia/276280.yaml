title: 'Card Trivia:Number 64: Ronin Raccoon Sandayu'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * A "[[Kagemusha Raccoon Token]]" appears in this card's artwork.
  * This monster's silhouette appears in the artwork of "[[Number 75: Bamboozling Gossip Shadow]]".
  * This monster is named after [[wikipedia:ja:百地三太夫|Sandayu Momochi]], one of the three Iga ninja leaders during the [[wikipedia:Sengoku period|Sengoku period]].
  * "[[Number]]" monsters often take the form reflecting their owners and/or their original desires. In this case, this [[Mythyrian Number]] represents this monster's original owner, [[Girag]] (known as Souhachi Kiraku in his past life), and its [[Number Guardian]], [[Ponta]].
  ** This monster's Japanese name, "Veteran Tanuki Sandayu", reflects Girag's past life as a highly-respected [[wikipedia:Veteran|veteran]] military commander and warrior.
  ** This monster's English name is derived from "''[[wikipedia:Rōnin|ronin]]''", a term for [[wikipedia:Samurai|samurai]] that have no masters to serve under. This reflects how Ponta lost his master Girag in his past life.
  ** This monster's appearance is based on a ''[[wikipedia:Bake-danuki|bake-danuki]]'', a mythical [[wikipedia:Japanese raccoon dog|Japanese raccoon dog]] (or ''tanuki'') ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore capable of using shape-shifting powers. Ponta was a ''tanuki'' whose [[Deck]] features "[[Raccoon]]" cards, and this monster's effect can [[Special Summon]] a "Kagemusha Raccoon Token" which takes the form of an opponent's monster and copies its [[ATK]].
  *** This monster's sealed form is a [[wikipedia:Kama (Japanese tea ceremony)|chagama]], which is based on the Japanese folktale ''[[wikipedia:Bunbuku Chagama|Bunbuku Chagama]]'' about a ''tanuki'' that uses its shape-shifting powers to transform itself into a teapot.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this was the only [[Mythyrian Number]] whose debut [[Duel]] only lasted for one episode, while all the other Mythyrian Numbers had their debut Duels last for two episodes.
