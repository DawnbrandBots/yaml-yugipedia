  * The depiction of [[Yugi Mutou (manga)|Yugi Mutou]] in this card's artwork is based on his appearance in {{chapter|Yu-Gi-Oh! Millennium World|49|ref}}, specifically from the panel showing him declaring his turn, before he draws "[[Gandora the Dragon of Destruction (manga)|Gandora the Dragon of Destruction]]".
