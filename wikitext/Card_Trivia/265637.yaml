title: Card Trivia:Scramble!! Scramble!!
wikitext: |-
  {{Navigation}}

  * "[[Mecha Phantom Beast Tetherwolf]]", "[[Mecha Phantom Beast Stealthray]]", "[[Mecha Phantom Beast Megaraptor]]", "[[Mecha Phantom Beast Blackfalcon]]" and "[[Phantom Fortress Enterblathnir]]" appear in this card's artwork.
  * [[wikipedia:scrambling (military)|Scrambling]] is the act of quickly getting military aircraft airborne to react to an immediate threat, usually to intercept hostile aircraft.
  * This card appears in the artwork of "[[Reverse Breaker]]".
  * This is the only card in the game that includes the word "outnumber" in its text.
