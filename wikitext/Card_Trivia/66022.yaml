title: Card Trivia:Rocket Warrior
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Collectible Tins 2005]]''.
  * This monster appears in the artwork of "[[Power Gift]]".
  ** This monster's silhouette appears in the artwork of "[[Rocket Hermos Cannon]]".
  *** Fittingly, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, "Rocket Hermos Cannon" was formed by [[Fusion|fusing]] this card with "[[The Claw of Hermos]]" together.
  *** Both cards also share the same [[Attribute]] ([[LIGHT]]), [[Level]] (4), [[Type]] ([[Warrior]]), and [[original ATK and DEF]] (1500/1300).
  * This card appears in the artwork of "[[Jelly Hole]]".
  * This monster has an [[Equip Spell]] counterpart: "[[Rocket Pilder]]".
  * This monster has a ''[[Rush Duel]]'' counterpart: "[[Rocket Medic]]".
