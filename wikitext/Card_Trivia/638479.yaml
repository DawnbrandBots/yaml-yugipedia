title: Card Trivia:Appliancer Breakerbuncle
wikitext: |-
  {{Navigation}}

  * This monster's head appears in the artwork of "[[Appliancer Reuse]]".
  * This monster is based on a [[wikipedia:Carbuncle (legendary creature)|carbuncle]], a legendary long-eared mammalian creature with a [[wikipedia: Carbuncle (gemstone)|similarly-named gemstone]] on its forehead.
  ** This monster's name and design are based on a [[wikipedia:Circuit breaker|circuit breaker]], an electrical safety device designed to protect an electrical circuit from damage caused by overcurrent, which features a manual control lever designed to safely switch off and reset the circuit breaker.
