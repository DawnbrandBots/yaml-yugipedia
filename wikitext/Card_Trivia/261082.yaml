title: Card Trivia:Black Dragon Collapserpent
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the words "[[wikipedia:collapsar|collapsar]]" and "[[wikipedia:snake|serpent]]".
  * This card is the [[DARK]] counterpart of "[[White Dragon Wyverburster]]".
  ** Both have "[[Chaos]]"-style Summoning requirements.
  ** This card's effect can search "[[White Dragon Wyverburster]]" when sent from the field to the GY.
  ** This monster seems to be a smaller/younger version of "[[Darkflare Dragon]]" while "[[White Dragon Wyverburster]]" being smaller/younger version of "[[Lightpulsar Dragon]]".
