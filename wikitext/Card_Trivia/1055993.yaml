title: Card Trivia:Ragnaraika Samurai Beetle
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|蕾禍|ライカ}}ノ{{Ruby|矢筈天牛|ヤハズカミキリ}}, ''Raika no Yahazu Kamikiri'') is based on the Japanese name of the ''[[wikipedia:Uraecha bimaculata|uraecha bimaculata]]'' (ヤハズカミキリ, ''yahazukamikiri''), a species of beetle.
  ** This monster's Japanese name is also a play on「{{Ruby|矢筈斬り|やはずきり}}」 (''yahazukiri'', lit. "arrow-notch slash"), a term that refers to a lightning-fast sword swing.
