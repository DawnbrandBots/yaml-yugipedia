title: Card Trivia:Sunavalon Daphne
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Daphne|Daphne]], a [[wikipedia:naiad|naiad]] from [[wikipedia:Greek mythology|Greek mythology]] who invoked her father, the river god [[wikipedia:Ladon (river)|Ladon]], to transform her into a tree in order to escape the infatuated sun god, [[wikipedia:Apollo|Apollo]].
