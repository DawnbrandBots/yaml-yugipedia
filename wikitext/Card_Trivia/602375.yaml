title: Card Trivia:Apollousa, Bow of the Goddess
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]'' and ''[[Mega Pack 03]]''.
  * This monster appears in the artworks of "[[Ultimate Slayer]]" and "[[Titanocider]]".
  ** This monster seems to be ambidextrous, as seen in the artwork of "Titanocider" and in this card's original artwork.
  * This card's name is based on ''Thea Apollousa'', which is a Greek name for [[wikipedia:Artemis|Artemis]], a goddess and the twin sister of [[wikipedia:Apollo|Apollo]]. ''Thea apollousa'' signifies that Artemis and Apollo as divinities represent the same ideas.
  ** "Bow of the Goddess" in this card's name is based on the bow and arrow, both of which are Artemis' symbols.
  * This card is the first [[Link Monster]] with ? [[ATK]].
