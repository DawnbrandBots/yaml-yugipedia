title: Card Trivia:Earthbound Resonance
wikitext: |-
  {{Navigation}}

  * "[[Moon Dragon Quilla]]" appears in this card's artwork.
  * This card's second ''[[OCG]]''/''[[TCG]]'' effect is based on one of the manga effects of "[[Ultimate God Ultimaya Tzolkin (manga)|Ultimate God Ultimaya Tzolkin]]", which this card was used alongside in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  ** In {{chapter|5D's|063|ref}}, when "[[Divine Spark Dragon Stardust Sifr (manga)|Divine Spark Dragon Stardust Sifr]]" attacked "Ultimate God Ultimaya Tzolkin", [[Rex Goodwin (manga)|Rex Goodwin]] used the latter monster's effect to destroy an opponent's [[Set]] card when it is attacked, and also [[activate]]d this card in anticipation of "Stardust Sifr" being destroyed by that battle. (This is the only time this effect of "Ultimaya Tzolkin" is used in the manga.) In the ''OCG''/''TCG'', "[[Ultimaya Tzolkin]]" does not have this effect; instead, this card has an effect to destroy a card on the field when a [[DARK]] [[Synchro Monster]] [[Special Summon]]ed from the [[Extra Deck]] is [[target]]ed for an attack.
