title: Card Trivia:Bond Between Teacher and Student
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Dark Magician]]" and "[[Dark Magician Girl]]" appears in this card's artwork.
  * This card is a reference to [[Mahad]] and [[Mana]]'s relationship as teacher and student in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], both of whom resemble "Dark Magician" and "Dark Magician Girl".
  * This card's effect is the opposite of "[[Sage's Stone]]"; this card can [[Special Summon]] "Dark Magician Girl", while "Sage's Stone" can Special Summon "Dark Magician".
