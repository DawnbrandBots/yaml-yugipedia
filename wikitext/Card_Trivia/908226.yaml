title: Card Trivia:Virtual World Kirin - Lili
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Qilin|Qilin]], a mythical hooved chimerical creature known in East Asian cultures.
  * This card's name is a [[wikipedia:reduplication|reduplication]] of the Chinese character ''lín'' (麟), a character used in the Chinese word for Qilin, ''qílín'' (麒麟).
