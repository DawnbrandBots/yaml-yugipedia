title: Card Trivia:Wynn the Wind Charmer
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Over Rush Pack 4]]'', ''[[Structure Deck: Spirit Charmers]]''/''[[Structure Deck: Masters of the Spiritual Arts]]'', ''[[Structure Deck: Masters of the Spiritual Arts Spirit Art Awakening Pack]]'', and ''[[Structure Deck: Masters of the Spiritual Arts - The Legend of Duelist Quarter Century Edition]]''.
  * This monster appears in the artworks of "[[Grand Spiritual Art - Ichirin]]", "[[Spirit Charmers]]", "[[Spiritual Power Recovery Potion]]", and "[[Spiritual Wind Art - Miyabi]]" (although the former two may be featuring "[[Wynn the Wind Charmer, Verdant]]" instead).
  * "[[Petit Dragon]]" appears in this card's artworks, serving as this monster's familiar.
  ** "[[Gora Turtle]]", "[[Pakupakuchu]]", and "[[Trap Mole‎]]" also appear in this card's [[Full Over Rush Rare]] artwork.
  *** The first is a reference to {{episode|CARD GAME THE CHRONICLES|10|ref}} and {{episode|CARD GAME THE CHRONICLES|11|ref}}, where [[Wynn]] temporarily adopts a baby Gora Turtle that appeared to be lost.
  * This monster's name, "Wynn" (ウィン ''Win''), is derived from the word "wind" (ウィンド ''Windo'').
  * "[[Familiar-Possessed - Wynn]]", "[[Wynn the Wind Charmer, Verdant]]", "[[Wynn the Wind Channeler]]", "[[Possessed Resonance - Wynn]]", and "[[Wynn the Wind Spiritualist]]" are powered-up forms of this monster, while "[[Storming Wynn]]" is her adult version.
  * According to the ''[[Duel Terminal Master Guide card storylines#Series Introduction: The Gusto Family Tree|Duel Terminal Master Guide]]'', this monster is the younger sister of "[[Winda, Priestess of Gusto]]" and daughter of "[[Windaar, Sage of Gusto]]". She disliked being bound by her family lineage and left for the outside world. Despite this, she doesn't have the cross-shaped pupils of the rest of her family.
  ** Since this card was released 5 years before the debut of the "[[Gusto]]" theme, she was most likely used as inspiration for the visual design of its human members.
  * This is the only one of the original four "[[Charmer]]" monsters to be shown carrying another item in her coat's pockets in addition to vials, having a stuffed bunny doll. It is implied to be a memento of her family since "Winda" has a very similar-looking doll in her own pocket.
