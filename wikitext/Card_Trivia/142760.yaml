title: Card Trivia:Element Doom
wikitext: |-
  {{Navigation}}

  * The [[Element]] monsters have a color scheme and a card artwork that correspond to the [[Attribute]]s they gain their effects from; in this monster's case, they are [[EARTH]] and [[WIND]].
  ** This monster's color scheme features a primarily brown body (EARTH) and green horns, wings, belly, lower left leg, and tail end (WIND).
  ** This card's artwork depicts this monster on a solid ground (EARTH) and being surrounded by huge gusts of air (WIND).
