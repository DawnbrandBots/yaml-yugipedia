title: Card Trivia:Chillin' Outback
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on [[Chumley Huffington]]'s lazy personality and his Australian [[Deck]].
  ** This first portion of this card's name is also likely a pun on the lyrics to the English opening of the ''[[Yu-Gi-Oh! GX]]'' anime ('''''Chillin' out''' with the crew in the school yard...'')
  ** The second portion of this card's name is based on the Australian Outback where the rock formation "Ayers Rock" is located, which inspired Chunley to create "[[Ayers Rock Sunrise]]".
