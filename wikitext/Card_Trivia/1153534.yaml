title: Card Trivia:Exosister Karmael
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Exosister Betrayal]]".
  ** According to ''[[The Valuable Book EX 6 card storylines#No. 12: Exosister|The Valuable Book EX 6]]'', she is also the armored figure in "[[Exosister Returnia]]".
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Exosister Martha]]".
  * This is the first "[[Exosister]]" monster whose [[Attribute]] is not [[LIGHT]], and whose [[Type]] is neither [[Spellcaster]] nor [[Warrior]].
  * This monster's name may be derived from one or more of the following:
  ** The Hebrew word "Karmel", which can be loosely translated to "god's vineyard" or "garden land".
  ** [[wikipedia:Mount Carmel|Mount Carmel]], which in the Bible is the site where the prophet [[wikipedia:Elijah|Elijah]] battled with the prophets of [[wikipedia:Baal|Baal]]. This fits with "Martha" being stated to have went missing during battle with demons, and ''The Valuable Book EX 6'' establishing that [[wikipedia:Asmodeus|Asmodeus]] is currently possessing her and turning her into this form.
  ** [[wikipedia:Camael|Camael]], an archangel not recognized by the Catholic church due to his name not coming from the Bible.
  ** [[wikipedia:Karma|Karma]], the religious principle of past deeds leading to present consequences.
  * "Martha" used to be the senior partner of "[[Exosister Elis]]" before her aforementioned disappearance, following which "Elis" chose "[[Exosister Stella]]" as her junior. Fitting this, this monster mirrors "[[Exosister Mikailis]]" (the Xyz form of "Elis") in many ways:
  ** "Karmael" appears to be landing from mid-air, whereas "Mikailis" appears to be jumping.
  ** Both monsters are swordswomen, but "Karmael" holds her sword in her right hand, while "Mikailis" holds hers in her left hand.
  ** "Karmael" is conjuring slime with her left hand, and "Mikailis" is producing holy water from her right hand.
  ** "Karmael" has smoke-like wings of darkness, "Mikailis" has fiery wings of light.
  *** The fact both "Martha" and "Stella" are partners of "Elis" may be why this monster appears to be threatening "[[Exosister Kaspitell]]" (the Xyz form of "Stella") in the artwork of "Exosister Betrayal".
  ** Additonally, this monster also contrasts all other [[Rank]] 4 "Exosister" Xyz Monsters in these aspects:
  *** The [[Attribute]] of "Karmael" is [[DARK]] while that of the others is [[LIGHT]].
  *** The slime of "Karmael" forms a lemniscate-shaped halo, but the holy water of the others forms a hair ribbon.
  *** The white pupils of "Martha" become black as this monster, while the others have white pupils in place of their base forms' black ones.
  *** This monster does not have any protection against monsters [[Special Summon]]ed from the [[Graveyard]].
