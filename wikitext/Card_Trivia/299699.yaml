title: Card Trivia:Ghostrick Parade
wikitext: |-
  {{Navigation}}

  * "[[Ghostrick Alucard]]", "[[Ghostrick Doll]]", "[[Ghostrick Dullahan]]", "[[Ghostrick Fairy]]", "[[Ghostrick Jackfrost]]", "[[Ghostrick Jiangshi]]", "[[Ghostrick Lantern]]", "[[Ghostrick Mary]]", "[[Ghostrick Mummy]]", "[[Ghostrick Nekomusume]]", "[[Ghostrick Skeleton]]", "[[Ghostrick Socuteboss]]", "[[Ghostrick Specter]]", "[[Ghostrick Stein]]", "[[Ghostrick Warwolf]]", "[[Ghostrick Witch]]", and "[[Ghostrick Yuki-onna]]" appear in this card's artwork.
  * This card is probably a reference to the [[wikipedia:New York's Village Halloween Parade|New York Halloween Parade]], an annual event performed every year in New York City's Greenwich Village neighborhood. The parade is famous for including oversized "Puppet" costumes, and draws huge crowds of costumed participants and spectators– making it one of the largest public events in the United States.
