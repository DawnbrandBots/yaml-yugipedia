title: Card Trivia:Ultimate Dragon of Pride and Soul
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] [[counterpart]] of "[[Dragon of Pride and Soul]]".
  ** Like its base form, this monster is themed around the number 25, referencing the 25th anniversary of the ''[[Yu-Gi-Oh!]]'' ''[[OCG]]''/''[[TCG]]''.
  ** This monster is based on "[[Blue-Eyes Ultimate Dragon]]".
  * "[[Dragon Master Lords]]" is the combined form of this monster and "[[Paladins of Bonds and Unity]]".
