title: Card Trivia:Odd-Eyes Twin Tail Cat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Lost Cat]]" and "[[Scaredy Cats]]".
  * This monster is a ''[[Rush Duel]]'' [[Cat (Rush Duel series)|Cat]] parody of "[[Odd-Eyes Pendulum Dragon]]".
  ** Oddly, this card is an [[EARTH]] monster ([[LIGHT]] in the anime) while "Odd-Eyes Pendulum Dragon" is a [[DARK]] monster.
  ** This monster's pose closely resembles the [[Card Artworks:Odd-Eyes Pendulum Dragon#/media/File:OddEyesPendulumDragon-LOD2-JP-VG-artwork.png|first ''OCG''/''TCG'']] pose of "Odd-Eyes Pendulum Dragon".
