title: Card Trivia:Nuvia the Wicked
wikitext: |-
  {{Navigation}}

  * This card's name is likely derived from [[wikipedia:Nubia|Nubia]], a region along the Nile river in Egypt, keeping in relation with the Egyptian theme of the original ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]] series.
  * This card has a [[retrained]] [[Bubble Actress]] ''[[Yu-Gi-Oh! Rush Duel]]'' counterpart: "[[Nuvia the Mischievous]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' and ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]''  artwork is taken from {{chapter|Yu-Gi-Oh!|187|ref}}, specifically from the panel where [[Nuvia the Wicked (manga)|this monster]] is shown being Summoned.
