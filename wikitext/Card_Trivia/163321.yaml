title: Card Trivia:Flipangutan
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on an [[wikipedia:Orangutan|orangutan]], a species of great ape known for their orange fur.
  ** This monster's Japanese name, "Uratan" (ウラウータン ''Uraūtan'') is a portmanteau of "ura" (the Japanese word for "reverse side", reflecting its [[Flip monster]] status), and "orangutan".
