title: Card Trivia:Outrigger Extension
wikitext: |-
  {{Navigation}}

  * "[[Infinitrack Crab Crane]]" appears in this card's artwork.
  ** Ironically, "Crab Crane" can neither receive protection from this card (more than likely the shield depicted in this card's artwork) nor be targeted by its second effect, as it is not an [[Xyz Monster]]. Instead, "Crab Crane" searches this card.
