title: Card Trivia:Lyna the Light Charmer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spiritual Light Art - Hijiri]]".
  * "[[Happy Lover]]" appears in this card's artwork, serving as this monster's familiar.
  * This monster's name, "Lyna" (ライナ ''Raina''), is derived from the word "light" (ライト, ''Raito'').
  * This monster has four [[Card evolutions|upgraded]] [[counterpart]]s: 
  ** A "[[Familiar-Possessed]]" counterpart: "[[Familiar-Possessed - Lyna]]".
  ** A [[Link Monster|Link]] counterpart: "[[Lyna the Light Charmer, Lustrous]]".
  ** Due to Portuguese cards being discontinued between 2005 and 2012, this card had to be printed in that language in 2020, which was 3 years ''after'' the release of "Familiar-Possessed - Lyna".
  * This monster and "[[Dharc the Dark Charmer]]" are the only "[[Charmer]]" monsters to have handcuffs on their left wrists, suggesting a relationship between them.
  ** This monster was released in ''[[The Shining Darkness]]'' (the last set of [[Series 6]]), while "Dharc" was released in ''[[The Duelist Genesis]]'' (the first set of Series 6).
  ** "Familiar-Possessed - "Lyna" can also [[add]] [[Spellcaster]] monsters with 1500 [[DEF]] such as "Dharc" to the [[hand]], while "[[Familiar-Possessed - Dharc]]" can also add [[LIGHT]] monsters like "Lyna" to the hand.
  * This monster's French ''[[TCG]]'' name is different from the rest of the "Charmers"; the rest of the "Charmers" are '''"la Charmeuse"''', and "Lyna" is '''"l'Invocatrice"'''. "Invocatrice" is the French word for a (female) summoner, while "Charmeuse" is more akin to a (female) hypnotist.
