title: Card Trivia:Barrel Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the ''[[OCG]]'' version of ''[[Metal Raiders (Japanese)|Metal Raiders]]''.
  * This monster appears in the artwork of "[[Proton Blast]]".
  * This monster is based on the [[wikipedia:Russian roulette|Russian roulette]], a lethal game of chance using a [[wikipedia:Revolver|revolver]].
  ** This monster's effect to [[Coin toss|toss a coin]] three times and [[destroy]] an opponent's monster if at least two of the results are heads is also based on Russian roulette.
  *** Also, this monster's effect in the ''[[OCG]]''/''[[TCG]]'' effect is based on a scene from {{chapter|Yu-Gi-Oh!|121|ref}} (and its [[Yu-Gi-Oh! (anime)|anime]] [[Yu-Gi-Oh! - Episode 031|adaptation]]) where [[Keith Howard (manga)|Bandit Keith Howard]] used a Russian roulette-style effect to spin the three barrels of this monster's revolver-like head cannon and arm sub-cannons and destroy a monster if they hit or miss. This monster's head cannon and right arm sub-cannon landed on hit, allowing it to destroy [[Katsuya Jonouchi (manga)|Katsuya Jonouchi's]] "[[Axe Raider (manga)|Axe Raider]]" and "[[Garoozis (manga)|Garoozis]]".
  ** In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, Bandit Keith claimed to have played Russian roulette at least once, during his slump after losing to [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]]. Fittingly, after his loss to Katsuya Jonouchi, Pegasus later inflicted a [[Penalty Game]] where he transformed Keith's hand into a gun and held it to his head Russian roulette-style, killing him instantly.
  * This monster has a "[[Toon]]" [[counterpart]]: "[[Toon Barrel Dragon]]".
  * This monster has an upgraded counterpart: "[[Desperado Barrel Dragon]]".
  * This monster has a ''[[Rush Duel]]'' [[Normal Monster]] counterpart: "[[Ice Barrel Dragon]]".
  * This is the [[signature card]] of [[Bandit Keith]] in the ''Yu-Gi-Oh!'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This is the first card to feature a coin toss effect in ''[[Yu-Gi-Oh! Rush Duel]]''.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|121|ref}}, specifically from the panel showing [[Barrel Dragon (manga)|this monster]] with its [[ATK]] and [[DEF]] decreased, after being affected by the effect of "[[Time Wizard (manga)|Time Wizard]]".
