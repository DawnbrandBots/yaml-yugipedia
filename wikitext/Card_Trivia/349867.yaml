title: Card Trivia:Elder Entity Norden
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Summon Gate]]".
  * This card is named after [[wikipedia:Nodens (Cthulhu Mythos)|Nodens]], an [[wikipedia:Cthulhu Mythos deities|Elder God]] from [[wikipedia:H. P. Lovecraft|H.P. Lovecraft's]] [[wikipedia:Cthulhu Mythos|Cthulhu Mythos]], which in turn is based on [[wikipedia:Nodens|Nodens]], a [[wikipedia:Celtic deities|Celtic deity]] associated with healing, the sea, hunting and dogs.
  * The creature pulling this monster's chariot appears to be a [[wikipedia:Hippocampus (mythology)|hippocampus]], also known as a Water Horse.
  * This card has the highest DEF of any Level 4 or lower [[Fusion Monster]].
  * This was the first Fusion monster that lists an [[Xyz Monster]] as a [[Fusion Material]].
  * This card's relation with [[Synchro Monster|Synchro]] and Xyz Monsters may be reinforced by the fact you can use its effect to Special Summon a Level 4 monster, in order to Summon a Rank 4 Xyz Monster, as well as to Special Summon a Tuner monster, that generally has a Level lower than 4, and perform a Synchro Summon.
