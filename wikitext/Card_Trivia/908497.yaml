title: Card Trivia:Meteor Rush - Monochroid
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "monochrome" and "[[roid]]".
  ** This monster's monochrome motif references ''[[wikipedia:Gomoku|gomoku]]'', an abstract board game played on a grid-like board using black and white stones, both of which are depicted in this card's artwork.
  *** This monster's [[Summoning condition]] requiring five or more attacks declared on the same turn reference the goal of ''gomoku'', where the player must line up an unbroken sequence of their pieces in a row, column, or diagonal line.
  * This monster's title and pose reference the "Pegasus Meteor Fist", the signature special attack of [[wikipedia:Pegasus Seiya|Pegasus Seiya]], the main protagonist of the ''[[wikipedia:Saint Seiya|Saint Seiya]]'' franchise.
