title: Card Trivia:Michion, the Timelord
wikitext: |-
  {{Navigation}}

  * This monster is named after the Judaic archangel, [[wikipedia:Michael (archangel)|Michael]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Michael is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Tiferet|Tiferet]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Tiferet is the sixth of the ten Sefira of the Tree of Life, and this was the sixth "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This is the only "Timelord" monster to not have limbs, having wings instead.
