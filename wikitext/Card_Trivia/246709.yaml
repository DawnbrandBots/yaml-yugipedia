title: Card Trivia:Pyrorex the Elemental Lord
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of "pyro" and "rex", the latter referring to a ''[[wikipedia:Tyrannosaurus|Tyrannosaurus rex]]''.
  ** It is also possibly a pun on ''[[wikipedia:Black powder substitute|Pyrodex]]'', the first black powder substitute.
  * Like the other "[[Elemental Lord]]" cards, this monster's given name is in a unique Western language, in this case Latin (pyro is Greek for fire, while "rex" is Latin for king).
  * Like the other "Elemental Lords", this monster's summon-triggered effect is reminiscent of a (previously) banned card, in this case: "[[Ring of Destruction]]".
  ** It is the only such effect that is explicitly weaker than the card it's based on, only inflicting half damage. It also can only target opponent's monsters, which was, coincidentally, one of the restrictions later incorporated into Ring's functional [[errata]].
