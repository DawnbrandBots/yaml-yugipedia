title: Card Trivia:Fortune Fairy Hikari
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Miracle Stone]]" and "[[Unacceptable Result]]".
  * This monster's name is based on "''hikari''", the Japanese word for "light".
  * This monster has a "[[Fortune Lady]]" [[counterpart]]: "[[Fortune Lady Light]]".
