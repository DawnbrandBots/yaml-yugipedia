title: Card Trivia:Converging Wills Dragon
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on the [[Crimson Dragon]] and the [[wikipedia:resplendent quetzal|resplendent quetzal]].
  ** This is enforced by the fact that, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, "[[Majestic Dragon]]" (which this monster is based on and a [[counterpart]] of) was said to be the embodiment of the Crimson Dragon as a card.
  *** Fittingly, in the ''[[Dawn of Majesty]]'' commercial, the [[Synchro Summon]]ing animation depicting this monster being used as [[material]] is identical to that of "Majestic Dragon" in the ''Yu-Gi-Oh! 5D's'' anime.
  * This monster's name is based on the terms featured in [[Yusei Fudo]]'s [[Summon chants in Yu-Gi-Oh! 5D's#Yusei Fudo|Synchro Summoning chants]] in the original Japanese version of the ''Yu-Gi-Oh! 5D's'' anime: 「{{Ruby|集|つど}}いし」 (''Tsudoishi'', lit. "converging") and「{{Ruby|想|おも}}い」 (''Omoi'', lit. "thought").
  ** In the ''Dawn of Majesty'' commercial, this monster's name is featured in the first passage for the Synchro Summoning chant for "[[Shooting Majestic Star Dragon]]": '''''Gathering thoughts''', call upon a shining miracle!''  (集いし想いが、輝く奇跡を呼び起こす！, ''Tsudoishi omoi ga, kagayaku kiseki o yobiokosu!'')
