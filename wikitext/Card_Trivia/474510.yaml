title: Card Trivia:Amazoness Pet Liger
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Liger|liger]], a hybrid cross of a male lion and female tiger.
  ** In addition to its [[Fusion Material]]s, this implies that this monster is a hybrid offspring of "[[Amazoness Tiger]]".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Amazoness Pet Liger King]]".
