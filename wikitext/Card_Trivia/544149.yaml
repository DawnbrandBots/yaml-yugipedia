title: Card Trivia:Gladiator Beast's Valor
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Gladiator Beast Dimacari]]" and "[[Gladiator Beast Tygerius]]" appear in this card's artwork.
  * This card's Japanese name, "Virtus of Gladial Beast", is based on ''[[wikipedia:Virtus|virtus]]'', a specific virtue in [[wikipedia:Ancient Rome|Ancient Rome]] that carries connotations that are perceived as masculine strengths, including valor, manliness excellence, courage, character, and worth.
