title: Card Trivia:Ancient Dragon
wikitext: |-
  {{Navigation}}

  * This card shares its name with the unrelated [[anime-only|anime-exclusive]] card, "[[Ancient Dragon (DM anime)|Ancient Dragon]]".
  * Despite this monster being a reptilian dragon, its design features a navel, a physical trait solely possessed by placental mammals.
  * This card's artwork was created by [[wikipedia:Chile|Chilean]] artist [http://genzoman.deviantart.com Gonzalo Ordóñez Arias], also known as Genzoman, making this one of the only cards whose artwork was not drawn by a Japanese artist.
  ** Genzoman also did the coloring for "[[Noble Knight Artorigus]]", while the artwork was done by Joe Ng. Both cards were done in collaboration with the Canadian art studio and publisher company, [[wikipedia:Udon Entertainment|Udon Entertainment]].
