title: Card Trivia:Link Disciple
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] to "[[Link Devotee]]":
  ** Both are [[Link-1]] [[Cyberse]] monsters that require a [[Level 4]] or lower Cyberse monster to [[Link Summon]].
  ** Both share a similar naming pattern, which starts with the word "Link", followed by another word synonymous with a strong believer in a particular religion.
  ** Both monsters feature opposite [[Link Arrow]]s, allowing them to use their effects in tandem: this monster requires [[Tributing]] a monster while "Link Devotee" requires being Tributed while [[co-linked]].
  *** This was demonstrated in their debut episode, {{episode|VRAINS|035|ref}}, when [[Yusaku Fujiki|Playmaker]] Tributed "Link Devotee" to [[activate]] this monster's effect.
