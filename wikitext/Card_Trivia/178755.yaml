title: Card Trivia:Darkflare Dragon
wikitext: |-
  {{Navigation}}

  * This card is the Dark counterpart to "[[Lightpulsar Dragon]]".
  ** Both have "[[Chaos]]"-style Summoning requirements.
  ** This card can be Special Summoned by the effect of "Lightpulsar Dragon".
  ** Moreover, both monsters depict space phenomena: a [[wikipedia:Pulsar|pulsar]] for "Lightpulsar Dragon" and a [[wikipedia:Solar flare|solar flare]] for "Darkflare Dragon".
  ** Both monsters appear in the artwork of "[[Dragon's Rebirth]]".
  ** [[Eclipse Wyvern]] would appear to be an adolescent fusion of this card and "Lightpulsar Dragon".
  ** Both of them have younger counterparts. "[[Black Dragon Collapserpent]]" for this one and "[[White Dragon Wyverburster]]" for "Lightpulsar Dragon".
  * This is one of the [[cover card]]s of ''[[Structure Deck: Dragonic Legion]]''/''[[Dragons Collide Structure Deck]]'' and ''[[Starter Deck 2020]]''.
  * This card currently has the lowest Level of any cover card for a [[Structure Deck]].
  * This card is similar to "[[Darkblaze Dragon]]", having similar names, the same Type, a very similar physical appearance (just with darker colors) and having the same [[ATK]] (once "Darkblaze Dragon" is [[Special Summon]]ed from the [[Graveyard]], and has its ATK doubled).
