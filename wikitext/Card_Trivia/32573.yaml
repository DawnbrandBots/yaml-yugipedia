title: Card Trivia:Insect Costume
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Girochin Kuwagata]]", and "[[Pinch Hopper]]" appear in this card's artwork.
  * This card's Japanese name (闘虫仮装, ''Tōchūkasō'') is a pun on ''tōchūkasō'' (冬虫夏草, "''winter-insect, summer-grass''"), the Japanese name for the ''[[wikipedia:Ophiocordyceps sinensis|Ophiocordyceps sinensis]]'', a species of fungus resembling caterpillars that grows on certain species of insects. The pores of the fungus lie dormant inside the insect during the winter, then spring to life in the summer.
