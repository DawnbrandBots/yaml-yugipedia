title: Card Trivia:Armed Dragon LV3
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Level Change]]".
  * "Armed Dragon LV3" → "[[Armed Dragon LV5]]" → "[[Armed Dragon LV7]]" → "[[Armed Dragon LV10]]"
  ** This is the only "[[Armed Dragon]]" "[[LV]]" monster whose design doesn't feature green eyes and crimson skin.
  ** This is also the only "Armed Dragon" monster that does not have an effect that involves destroying monsters.
  * This monster has two [[retrained]] counterparts: "[[Armed Dragon Thunder LV3]]" and "[[Drill Armed Dragon]]".
  * This is the only base "LV" monster with the sole effect of [[Summon]]ing its higher "LV" form.
