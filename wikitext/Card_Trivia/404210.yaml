title: Card Trivia:Bujingi Swallow
wikitext: |-
  {{Navigation}}

  * The effect of this card could be a reference to the mythical sword technique from Japanese legend, the Tsubame Gaeshi (or the Turning Swallow Cut). Much like this card can grant a monster two attacks, this technique could be understood as two movements: a dividing slash of the blade downwards, before steeply turning the blade back upwards at an angle.
