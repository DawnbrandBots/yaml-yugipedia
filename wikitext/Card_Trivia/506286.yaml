title: Card Trivia:Cyberdark Edge
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cyberdark Impact!]]"  and "[[Cyberdark Realm]]".
  * This monster forms the wings of "[[Cyberdark Dragon]]", "[[Cyberdarkness Dragon]]" and "[[Cyberdark Chimera]]"; however, its wings are reversed in the artwork of "Cyberdark Chimera".
  * This card's name, "Edge", is likely a reference to the sharp edges of this monster's wingtips.
