title: Card Trivia:Toon Kingdom
wikitext: |-
  {{Navigation}}

  * This card's name is likely based on the [[Duelist Kingdom]] tournament hosted by [[Maximillion Pegasus]], who used the "[[Toon]]" [[archetype]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This card's effects are based on those of "[[Toon World]]" in the ''Yu-Gi-Oh!'' manga and anime, which required no [[Life Point]] payment to [[activate]] it and granted [[Toon monster]]s the same abilities they had in the original series, including preventing them from being [[destroyed by battle]] and [[target]]ed by card effects.
