title: Card Trivia:Fallen of Albaz
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Albaz the Shrouded]]", "[[Branded in White]]", "[[Dogmatika Encounter]]", "[[Dogmatikacism]]", "[[Sprind the Irondash Dragon]]", "[[Springans Blast!]]", "[[Springans Booty]]", "[[Springans Call!]]", "[[Springans Watch]]", "[[The Fallen & The Virtuous]]", "[[Tri-Brigade Oath]]", "[[Tri-Brigade Stand-Off]]", and "[[Tri-Brigade Rendezvous]]".
  * "[[Aluber the Jester of Despia]]" appears in this card's third artwork.
  * "[[Albaz the Ashen]]" is this monster after losing his ability to transform into a dragon, as evidenced by him missing the white gems on this monster's body and the lack of a [[Fusion Summon]]ing effect.
  * "[[Aluber the Jester of Despia]]" is the "[[Despia]]" counterpart of this monster.
  ** The artwork of "Aluber the Dogmatic" depicts "Aluber" unmasked, revealing that he is identical to this monster except for the hair colors being switched (white with red streaks for "Albaz", red with white streaks for "Aluber").
  ** Both monsters share the same [[Level]] (4) and [[original ATK and DEF]] (1800/0).
  ** Both monsters feature a similar effect focused on [[Fusion Summon]]ing, and they have opposite associated [[Spell Card]]s that can Summon their [[Albaz Dragon|draconic]] [[Fusion Monster|Fusion]] forms: "[[Branded in White]]" for this monster and "[[Branded in Red]]" for "Aluber".
  ** Unlike most of the other "Despia" monsters, "Aluber" is not a corrupted version: the [[flavor text]] of "[[Aluber the Dogmatic]]" implies that this monster is an 'other half', as it describes "Aluber" as 'a thing separated by the Abyss'. The word 「落胤」 (''Rakuin'', lit. "Fallen Child") in this card's Japanese name may refer to how this monster is the abandoned half of "Aluber".
  *** This kanji is also a homophone of that for "[[Branded]]"  (烙印 ''Rakuin''), the [[archetype]] that supports the playstyles of both monsters.
  * This monster's Japanese name, "Albus", is the Latin word for "white".
  ** The flavor text of "[[Ecclesia the Exiled]]" states that she gave him that name because he is amnesiac, inspired by his 'pure white heart'. The fact that three of his dragonic forms (see below) are named "Albion" implies that may be his true name.
  * This monster has multiple draconic forms: "[[Titaniklad the Ash Dragon]]", "[[The Dragon that Devours the Dogma]]", "[[Brigrand the Glory Dragon]]", "[[Albion the Branded Dragon]]", "[[Albion the Shrouded Dragon]]", "[[Mirrorjade the Iceblade Dragon]]", "[[Alba-Lenatus the Abyss Dragon]]", and "[[Albion the Sanctifire Dragon]]".
  ** Despite most of these being [[Fusion Monster]]s, according to lore, the forms they represent are generally "Albaz" merely transforming himself; this ability is seemingly influenced the presence or absorption of certain kinds of powers, hence the varied results. The only 'true' fusions among them are "Alba-Lenatus" (with "Aluber") and "Sanctifire" (with "Ecclesia").
  *** While supporting the "[[Dogmatika]]" archetype in gameplay, "Titaniklad" is unrelated story-wise, as "Albaz" appeared in the skies above "[[Dogmatika Nation]]" already transformed into it, as shown in the ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'' promotional video and {{Episode|CARD GAME THE CHRONICLES|003|ref}}. It may instead be influenced by the energy of the Hole portals, from which he emerged.
  *** Similarly, "Brigrand" supports the "[[Tri-Brigade]]" archetype but is the result of absorbing the stigmata of "[[Dogmatika Ecclesia, the Virtuous]]" and the Hole attack of "[[Dogmatika Ashiyan]]", as shown in {{episode|CARD GAME THE CHRONICLES|4|ref}} and evidenced by his Japanese title being "the Stigmatavorous Dragon" as well as his artwork depicting him with with a stigmata-like mark on his foreheard and cradling an unconscious "Ecclesia" (whose own stigmata looks burned off). 
  **** "The Dragon that Devours the Dogma" is "Albaz" in the middle of this transformation; its additional support of "Dogmatika" cards and requirement of 3 Fusion Materials instead of 2 better reflect this context.
  *** "Branded Albion" is him driven mad by the intense energy radiated from the body of "[[Supreme Sovereign Serpent of Golgonda]]".
  *** "Shrouded Albion" appears to be his default dragon form, as it resembles his human one the most and is not a Fusion Monster. In the lore, "Branded Dragon" turns into it after "Ecclesia" calms him down.
  *** "Mirrorjade" is the result of gaining the powers of "[[Icejade Kosmochlor]]" and "[[Swordsoul Supreme Sovereign - Chengying]]".
  ** Despite "[[Lubellion the Searing Dragon]]" requiring this card as material, it is one of the dragon forms of "Aluber" instead.
  ** "[[Alba System Dogmatikalamity]]" also resembles one, though the relationship between it and "Albaz" is completely unknown as of yet.
  * This monster bears a scar over his left eye and is usually depicted with it closed. The ''CARD GAME THE CHRONICLES'' promotional video and episode 3 show that it is a wound caused by "[[Dogmatika Fleurdelis, the Knighted]]" striking "Titaniklad" across the face in "[[Dogmatika Punishment]]", gouging the eye. It is seen open in this card's second artwork, implying that it healed by the end of the story.
