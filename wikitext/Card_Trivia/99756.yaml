title: Card Trivia:Dragunity Knight - Vajrayana
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Limited Edition 16]]''.
  * This monster appears in the artwork of "[[Dragunity Legion]]".
  * The knight riding this monster appears to be "[[Dragunity Militum]]", and it is riding a grown-up "[[Dragunity Partisan]]".
  * This monster is named after ''Vajuranda'', a [[wikipedia:Spear|spear]] which appears in the Ancient Indian Epic ''[[wikipedia:Ramayana|Rāmāyana]]'' (Sanskrit: रामायण).
  ** "[[wikipedia:Vajra|Vajra]]" is a Sanskrit word meaning both "thunderbolt" and "diamond".
  ** [[wikipedia:Vajrayana|Vajrayana]] (translated as "Thunderbolt Way" or "Diamond Way") is also one of the three major branches of [[wikipedia:Buddhism|Buddhism]].
  ** Additionally, the sword [[fandom:w:c:castlevania:Vjaya|Vjaya]] is found in some of [[wikipedia:Konami|Konami]]'s ''[[wikipedia:Castlevania|Castlevania]]'' videogames.
