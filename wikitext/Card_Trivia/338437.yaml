title: Card Trivia:Performapal Monkeyboard
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Acrobatic Tower]]".
  ** A coloured outline of this monster appears in the artwork of "[[Performapal Duelist Extraordinaire]]".
  * This card's name is a portmanteau of "monkey" and "keyboard".
  * The blue and red stars on this monster's cheeks are based on the colors of the [[Pendulum Scale]].
  * This is the first "[[Performapal]]" [[Pendulum Monster]] with a [[Pendulum Scale]] of 1.
  * This is the first "Performapal" monster to become [[Forbidden]].
