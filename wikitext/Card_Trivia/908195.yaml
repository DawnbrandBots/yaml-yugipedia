  [[File:Blue-Eyes_White_Dragon_summoned_Duel_086.png|thumb|right|250px|"[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" summoned.]]

  * "[[Blue-Eyes White Dragon]]" appears in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|086|ref}} where [[Seto Kaiba (manga)|Seto Kaiba]] Summons "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" during his Duel against [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]].
  * This card's effects are based on the rules associated with the first-generation [[Duel Disk]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], where a monster in the "main card stage" could be replaced with a monster from the "sub card stage".

