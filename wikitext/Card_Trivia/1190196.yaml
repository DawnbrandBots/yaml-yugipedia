title: Card Trivia:Witchcrafter Pupils
wikitext: |-
  {{Navigation}}

  * "[[Witchcrafter Potterie]]", "[[Witchcrafter Schmietta]]", "[[Witchcrafter Pittore]]", and a colorful version of "[[Witchcrafter Terracottan]]" appear in this card's artwork.
  ** This card's name is a reference to the former three being the youngest among the apprentices of "[[Witchcrafter Madame Verre]]".
  *** This makes it a counterpart to "[[Witchcrafter Vice-Madame]]", which features her older apprentices instead ("[[Witchcrafter Edel]]", "[[Witchcrafter Haine]]", and "[[Witchcrafter Genni]]").

  * This card's artwork mirrors that of "[[Witchcrafter Unveiling]]", implying that the colorful "Terracottan" is a collaborative creation of "Potterie", "Schmietta", and "Pittore" just as "[[Witchcrafter Golem Aruru]]" was built together by "Edel", "Haine", and "Verre" (as shown in "[[Witchcrafter Masterpiece]]"). It's likely that "Potterie" created the body ("Terracottan" itself), "Pittore" painted it, and "Schmietta" gave it its golden accessories.
