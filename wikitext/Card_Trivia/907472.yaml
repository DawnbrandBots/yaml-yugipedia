title: Card Trivia:Vaylantz World - Shinra Bansho
wikitext: |-
  {{Navigation}}

  * A [[New Master Rule]] [[playmat]] appears in this card's artwork.
  * The kanji 「真羅万象」 (''Shinrabanshō'', "Whole of Creation") in this card's Japanese name is a pun on 「森羅万象」 (''Shinrabanshō'', "everything").
  ** 「森羅」(''Shinra'') is also the Japanese name of the "[[Sylvan]]" [[archetype]], drawing on the same idea. Since this card's name uses different kanji to produce the pun, it does not need an [[archetype-exclusion condition]].
  * This card is a [[counterpart]] of "[[Vaylantz World - Konig Wissen]]".
  ** Both are "[[Vaylantz]]" [[Field Spell Card]]s.
  ** This card's artwork depicts a traditional Japanese landscape, with a right diagonal view, while the artwork of "Konig Wissen" depicts a highly futuristic city with a left diagonal view.
