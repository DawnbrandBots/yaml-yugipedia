title: Card Trivia:Dracotail Pan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dracotail Horn]]".
  * This monster is based on the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Capricorn (constellation)|Capricorn]].
  ** The [[Wikipedia:Astrological sign|astrological sign]] for [[wikipedia:Capricorn (astrology)|Capricorn]] appears in the jewel on this monster's head, while the constellation of Capricorn appears in the background of this card's artwork.
  ** This monster's design features as set of goat-like horns, referencing how Capricorn is also known as the "goat" constellation.
  * This monster's name is derived from [[wikipedia:Pan (god)|Pan]], a goat-legged and horned deity in [[wikipedia:Greek mythology|Greek mythology]].
  * "[[Dracotail Arthalion]]" is the combined [[Fusion Monster|Fusion]] form of this monster and "[[Dracotail Lukias]]".
