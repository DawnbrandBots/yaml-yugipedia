title: Card Trivia:Backfire
wikitext: |-
  {{Navigation}}

  * "[[Blazing Inpachi]]" and "[[Chopman the Desperate Outlaw]]" appear in this card's artwork.
  * This card's name and effect is a pun, as it causes the destruction of a [[FIRE]] monster(s) to ''backfire'' on the opponent by inflicting 500 points of damage.
  * The effect and artwork of "[[Kickfire]]" are based on this card.
  ** The artwork of "Kickfire" depicts "[[The Kick Man]]" (similar in design and effect to "Chopman the Desperate Outlaw") destroying "[[Woodborg Inpachi]]".
  ** The first effect of "Kickfire" places a [[counter]] for each FIRE monster that is destroyed; the second effect sends "Kickfire" to the [[Graveyard]] to inflict damage for each of those counters.
