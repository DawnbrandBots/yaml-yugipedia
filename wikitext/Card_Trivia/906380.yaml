title: Card Trivia:Welcome Labrynth
wikitext: |-
  {{Navigation}}

  * "[[Labrynth Cooclock]]", "[[Labrynth Chandraglier]]", and "[[Labrynth Stovie Torbie]]" appear in this card's artwork.
  * A chibi version of the knight that appears in this card's artwork appears in the artworks of "[[Farewelcome Labrynth]]" and "[[Labrynth Barrage]]".
  ** A plushie of the knight that appears in this card's artwork also appears in the artwork of "[[Lovely Labrynth of the Silver Castle]]".
