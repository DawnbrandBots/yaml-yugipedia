title: Card Trivia:Reversal Box
wikitext: |-
  {{Navigation}}

  * "[[Alligator's Sword]]" and "[[Rocket Warrior]]" appear in this card's artwork.
  ** The monsters' poses reference the two times "[[Fairy Box (manga)|Fairy Box]]" was activated in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]]. The pose of "Alligator's Sword" references {{chapter|Yu-Gi-Oh!|179|ref}}, where "[[Alligator's Sword (manga)|Alligator's Sword]]" leaps out of the box and counterattacks "[[Amphibian Beast (manga)|Amphibian Beast]]" after the latter's [[ATK]] was quartered with "[[Skull Dice (manga)|Skull Dice]]". The pose of "Rocket Warrior" references {{chapter|Yu-Gi-Oh!|211|ref}}, where an attacking "[[Rocket Warrior (manga)|Rocket Warrior]]" is controlled by the effect of [[Rishid (manga)|Rishid's]] "[[Will of the Wadjet]]" and attempts to attack "Alligator's Sword" while it is hiding in the "Fairy Box", only for "Rocket Warrior" to attack an incorrect hole and look around in confusion afterwards.
  * This card is a [[retrained]] [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart of "[[Fairy Box]]".
  ** This card's effect to place a maximum number of six [[counter]]s on it is a reference to how "Fairy Box" has six holes in it, which gives the opponent a chance of their monster either hitting or missing their [[attack target]], as depicted in the ''Yu-Gi-Oh!'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This is the first card to incorporate both [[die roll]] and [[coin toss]] effects.
