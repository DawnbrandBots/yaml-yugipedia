title: Card Trivia:Magistus Chorozo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2026]]''.
  * This monster appears in the artwork of "[[Crowley, the Gifted Magistus]]".
  * This is the [[Monster Card]] version of [[Chorozo]], a character in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  * The name "Chorozo" is derived from [[wikipedia:Choronzon|Choronzon]], a demon in [[wikipedia:Thelema|Thelema]], which the "[[Magistus]]" cards are thematically based on.
