title: Card Trivia:Stardust Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[The Duelist Genesis]]'', and is also one of the cover cards of ''[[Collectible Tins 2008 Wave 1]]'', ''[[Duelist Edition Volume 3]]'', ''[[Duelist Pack Collection Tin 2009]]'', ''[[Duelist Pack: Yusei]]'', ''[[Duelist Saga]]'', ''[[Duel Power]]'', ''[[Prismatic Art Collection]]'', ''[[25th Anniversary Tin: Dueling Heroes]]'', and ''[[Synergy Pack 01: Syncro Acceleration]]''.
  * This monster appears in the artworks of "[[Cosmic Flare]]", "[[Crimson Dragon Quetzacoatl]]", "[[Duelist Genesis]]", "[[Emerging Awakening]]", "[[Junk Signal]]", "[[Miracle Synchro Fusion]]", "[[Rage Resynchro]]", "[[Scrap-Iron Statue]]", "[[Shooting Star]]", "[[Stardust Flash]]", "[[Stardust Illumination]]", "[[Stardust Mirage]]", "[[Stardust Wish]]", and "[[Starlight Road]]".
  ** "[[Meklord Emperor Wisel - Synchro Absorption]]" is also [[equip]]ped with this monster.
  * This card appears in the artwork of "[[E☆HERO Pit Boss]]".
  * This monster has several forms.
  ** [[Card evolutions|Evolutions]]:
  *** An "[[/Assault Mode]]" form: "[[Stardust Dragon/Assault Mode]]".
  *** 2 "[[Majestic]]" forms: "[[Majestic Star Dragon]]" and "[[Shooting Majestic Star Dragon]]".
  *** 2 [[Accel Synchro Monster|Accel Synchro]] forms: "[[Shooting Star Dragon]]" and "[[Shooting Star Dragon T.G. EX]]".
  *** A [[Delta Accel Synchro Monster|Delta Accel Synchro]] form: "[[Cosmic Blazar Dragon]]".
  *** 2 [[Limit Over Accel Synchro Monster|Limit Over Accel Synchro]] forms: "[[Shooting Quasar Dragon]]" and "[[Cosmic Quasar Dragon]]".
  ** Counterparts:
  *** A "[[Malefic]]" counterpart: "[[Malefic Stardust Dragon]]".
  *** A [[Duel Dragon]] manga counterpart: "[[Stardust Spark Dragon]]".
  *** A [[retrained]] counterpart: "[[Accel Synchro Stardust Dragon]]".
  *** A [[signature move]] counterpart: "[[Stardust Dragon - Victim Sanctuary]]"
  * This is the [[signature card]] of [[Yusei Fudo]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This card's effect of [[Tributing]] itself to [[negate]] an effect that destroys cards reflects Yusei's willingness to risk his own life for other people.
  ** This card has the same [[ATK]] (2500) as the signature cards of the other main protagonists in the ''[[Yu-Gi-Oh!]]'' anime (with the exception of [[Yuga Ohdo]]'s "[[Sevens Road Magician (anime)|Sevens Road Magician]]"): [[Yugi Muto]]'s "[[Dark Magician (anime)|Dark Magician]]", [[Jaden Yuki]]'s "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]", [[Yuma Tsukumo]]'s "[[Number 39: Utopia (anime)|Number 39: Utopia]]", [[Yuya Sakaki]]'s "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]", [[Yusaku Fujiki]]'s "[[Firewall Dragon (anime)|Firewall Dragon]]" and [[Yudias Velgear]]'s "[[Galactica Oblivion (anime)|Galactica Oblivion]]".
  ** This card has the following distinctions from the other signature monsters of the main protagonists in the anime:
  *** It is the only one to not be either [[LIGHT]] or [[DARK]]; however, this card's [[Yu-Gi-Oh! 5D's (manga)|manga]] counterpart, "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]", is a LIGHT monster.
  *** It is the only one whose [[Level]] is not 7.
  * This monster is the opposite of "[[Red Dragon Archfiend]]".
  ** Both monsters have mirrored poses in their card artworks, and opposite color-schemes as well.
  ** This monster focuses on preventing other monsters from being [[destroy]]ed, while "Red Dragon Archfiend" focuses on destroying the opponent's monsters. This reflects the rivalry between Yusei Fudo and [[Jack Atlas]] in the ''Yu-Gi-Oh! 5D's'' anime.
  * This monster is similar to "[[Clear Wing Synchro Dragon]]".
  ** Both are [[WIND]] [[Dragon]] [[Synchro Monster]]s with 2500 ATK and 2000 DEF.
  ** Both are the signature cards of protagonists from anime series that prominently featured [[Turbo Duel]]s: "[[Stardust Dragon (anime)|Stardust Dragon]]" was used by Yusei Fudo in ''Yu-Gi-Oh! 5D's'', while "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]" was used by [[Yugo]] in ''[[Yu-Gi-Oh! ARC-V]]''
  ** Both can negate a card's effect and destroy it.
  * This monster was designed by [[Kazuki Takahashi]] himself.
  ** In ''Duel Art'', he explained that he designed this monster with the intent of being different from a standard dragon design, giving it a clear humanoid physique so that it would be able to "strike a pose".
  * Oddly, this monster did not appear as a statue in {{episode|ZEXAL|015|ref}} alongside the other "legendary monsters".
  * This is the first [[Signer Dragon]] to be a featured card of a ''Yu-Gi-Oh! 5D's'' episode.
  * This is the first Signer Dragon to be printed as a [[Gold Rare]] (in ''[[Gold Series 3]]'').
  * In the anime, this card was ironically the only Signer Dragon to not be used as a [[Synchro Material]] to [[Limit Over Accel Synchro Summon]] "[[Shooting Quasar Dragon (anime)|Shooting Quasar Dragon]]".
  * In the ''[[TCG]]'', this card has been printed in all rarities, except for [[Parallel Rare]] (however, it has been printed in Duel Terminal Parallel Rare in the ''[[OCG]]'').
  * "[[wikia:c:socialempires:Star Dragon|Star Dragon]]" from the Facebook game ''Social Empires'' is based on this monster.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this monster flies across the bridge when the dock in the Gate area of Duel World (''5D's'') is interacted with, also rewarding Gems.
