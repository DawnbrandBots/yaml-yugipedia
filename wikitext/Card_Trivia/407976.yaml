title: Card Trivia:Kozmoll Wickedwitch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Kozmo Lightsword]]".
  * This monster is a combination of the [[wikipedia:Wicked Witch of the East|Wicked Witch of the East]] from ''[[wikipedia:The Wizard of Oz (1939 film)|The Wizard of Oz]]'' and [[wikipedia:Darth Maul|Darth Maul]] from ''[[wikipedia:Star Wars: Episode I – The Phantom Menace|Star Wars: Episode I – The Phantom Menace]]'', both of whom serve as crucial antagonists in their respective films.
  ** This monster's Japanese name, "Dark Rose" references the novel and musical ''[[wikipedia:Wicked (Maguire novel)|Wicked]]'', in which the Wicked Witch of the East's name is Nessarose.
  ** This monster wields a dual-bladed red lightsword, similar to how Darth Maul wields a double-bladed red [[wikipedia:Lightsaber|lightsaber]].
  ** This monster is wearing [https://yugiohblog.konami.com/articles/?p=7474 silver boots], referencing the novel ''[[wikipedia:The Wonderful Wizard of Oz|The Wonderful Wizard of Oz]]'' where the Wicked Witch of the East was the previous owner of the [[wikipedia:Silver Shoes|Silver Shoes]] before they were given to [[wikipedia:Dorothy Gale|Dorothy Gale]]. The design of the boots also references the robotic prosthetic legs worn by Darth Maul in ''Star Wars'' media after ''The Phantom Menace''.
