title: Card Trivia:Super Rush Headlong
wikitext: |-
  {{Navigation}}

  * "[[Behemoth the King of All Animals]]" and the boar from "[[Rush Recklessly]]" appear in the artwork of this card.
  * The Spanish printed card name has the word "''headlong''" translated as just "''head''", aside from using the word "''apuro''", a word used in some Spanish-speaking American countries for "''haste''".
  * The French version mistakenly allows its effect to be activated every time ("if the target battles a monster with an Attribute" instead of "if the target battles a monster with that Attribute").
