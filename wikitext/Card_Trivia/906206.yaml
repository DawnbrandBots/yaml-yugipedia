title: Card Trivia:XYZ Combine
wikitext: |-
  {{Navigation}}

  * "[[X-Head Cannon]]", "[[Y-Dragon Head]]", and "[[Z-Metal Tank]]" appear in this card's artwork, combining into "[[XYZ-Dragon Cannon]]".
  ** This card's name and artwork are a reference to the [[Contact Fusion]] animation of "[[XYZ-Dragon Cannon (anime)|XYZ-Dragon Cannon]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.

