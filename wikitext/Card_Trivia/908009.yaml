title: Card Trivia:N.As.H. Knight
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Duelists of the Abyss]]''.
  * This monster's Japanese name, "'''N'''aphil '''As'''ylum '''H'''eth Knight", is a [[wikipedia:backronym|backronym]] of "Nash", the [[Barian]] name of [[Reginald Kastle]].
  ** "Naphil" is Hebrew for "fallen one"; Nash was the former leader of the [[Seven Barian Emperors]], and became Reginald "Shark" Kastle after being cast out of the [[Barian World]], opposing [[Yuma Tsukumo]] and his allies once he regained his memories of this.
  ** "Asylum" is taken from the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|effect name]] of "[[Number 101: Silent Honor ARK (anime)|Number 101: Silent Honor ARK]]" in the Japanese version of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: "Eternal Soul Asylum".
  ** "[[wikipedia:Heth|Heth]]" is the name of the Hebrew letter "ח", which has a silent pronunciation similar to the Latin "H", referencing the name of "Silent Honor ARK".
  ** As a whole, it parallels the acronym of "Silent Honor ARK", which is based on "Shark", Nash's human nickname.
  * Visually, this monster is a combination of "Number 101: Silent Honor ARK" and "[[Number C32: Shark Drake Veiss]]".
  ** This monster's chariot-like appearance is based on one of the French names of the [[wikipedia:Big Dipper|Big Dipper]] asterism (which the Seven Barian Emperors are based on): "Grand Chariot".
  *** This monster's appearance and color scheme are based on "Number C32: Shark Drake Veiss", which may also be a reference to Shark's motorbike (whose color scheme matches "Number 32: Shark Drake").
  ** The crest of the [[United Lands of the Poseidon Ocean]] and the [[Barian Emblem]] also appear on the front and the side of this monster, respectively.
  * This monster is the base form of "[[CXyz N.As.Ch. Knight]]".
  ** "N.As.Ch. Knight" is the pilot of this monster, as shown in this monster's concept art, like "[[Number C101: Silent Honor DARK]]" is the pilot of its base form.
  ** This monster's effects are the opposites of those of "N.As.Ch. Knight".
  *** This monster cannot be [[destroyed by battle]] while a "[[Number]]" monster is on the [[field]], while "N.As.Ch. Knight" cannot be [[destroy]]ed by card effects.
  *** This monster can [[attach]] a "[[Number 10X]]" monster to itself as the [[Xyz Material]], while "N.As.Ch. Knight" can [[Xyz Summon]] a "Number 10X" monster by using itself as [[material]].
