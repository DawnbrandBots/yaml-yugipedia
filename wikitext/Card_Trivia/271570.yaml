title: Card Trivia:Spell Recycler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dimensional U-Turn]]".
  * The Spanish ''Yu-Gi-Oh!'' Card Database shows its name as "''Reciclador de Conjuros''" instead of "''Reciclador de Magias''", its printed name.
  ** Though the official term in the Spanish ''[[TCG]]'' for [[Spell Card]]s is "Carta Mágica", the word "''conjuro''" ("''spell''") is sometimes used in video games and anime dubbings, as well as in cards which deal with Spell Cards in their effects and/or use the word "Spell" in its ''TCG'' name, such as "[[Spell Chronicle]]" (known in the Spanish ''TCG'' as "''Crónica de Conjuros''").
