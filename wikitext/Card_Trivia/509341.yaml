  {{Navigation}}

  * This monster appears in the artwork of "[[Ninjitsu Art of Decoy]]".
  * This monster's name references the [[wikipedia:Bodhi Tree|Bodhi Tree]] in Buddhism, under which the Buddha reached enlightenment.
  * This monster has a [[recolored counterpart]]: "[[Trent]]".
