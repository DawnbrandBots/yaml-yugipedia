title: Card Trivia:Rare Metalmorph
wikitext: |-
  {{Navigation}}

  * This card has two counterparts: "[[Metalmorph]]" and "[[Max Metalmorph]]".
  * This card's effect is based on the effect of "[[Metalmorph (manga)|Metalmorph]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ("[[Magic Metal Force]]" in the [[Yu-Gi-Oh! (anime)|anime]]), which increases the [[equip]]ped monster's [[ATK]] and makes it immune to destruction by [[Spell Card]]s and magical attacks.
