title: Card Trivia:Duoterion
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Deuterium|deuterium]], a stable isotope of [[wikipedia:Hydrogen|hydrogen]] with approximately twice the mass than the usual isotope.
  ** This monster resembles "Hydrogeddon", which is based on the hydrogen molecule. This monster having one [[Level]] and 400 more [[ATK]] and [[DEF]] references how deuterium is hydrogen with one higher neutron count and increased mass.
  ** This monster's ''[[TCG]]'' name contains the word "duo", which often refers to a pair, further referencing how deuterium has twice the mass of hydrogen, and is also represented by the chemical formula "D<sub>2".
