title: Card Trivia:Red-Eyes Archfiend of Lightning
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Red-Eyes Fusion]]".
  * This monster is a "[[Red-Eyes]]" [[Gemini Monster|Gemini]] [[counterpart]] of "[[Summoned Skull]]" and "[[Skull Archfiend of Lightning]]".
  ** This monster's Gemini effect is based on "[[Makiu, the Magical Mist]]", a [[Spell Card]] that [[support]]s "Summoned Skull", which [[destroy]]s all of the opponent's monsters whose [[DEF]] lower than its [[ATK]].
  * This is the first and currently only "Red-Eyes" [[Fiend]] monster.
