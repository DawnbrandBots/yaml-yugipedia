title: Card Trivia:Duel (card)
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is a reference to the fact that, prior to the 2014 ''[[OCG]]'' rule changes, both players' [[hand]]s had '''six''' cards at the beginning of the [[Duel]] (during their respective first turns).
  * This card has an identical effect to the anime and manga version of "[[Card of Sanctity (anime)|Card of Sanctity]]".
