title: Card Trivia:Dark World Grimoire
wikitext: |-
  {{Navigation}}

  * This book appears in the artwork of "[[Dark World Archives]]".
  * This card's ''[[TCG]]'' name is based on a [[wikipedia:Grimoire|grimoire]], a textbook containing magic spells.
  * This book is likely based on the [[wikipedia:The Necromincon|Necronomicon]], a fictional tome also known as "The Book of the Dead" that can summon greater forces, reflecting this card's effect of [[Special Summon]]ing a "[[Dark World]]" monster from the [[Graveyard]].
  * The book appears to be set in right-to-left fashion, referencing the reading fashion in Japan, the country in which ''[[Yu-Gi-Oh!]]'' originates from.
