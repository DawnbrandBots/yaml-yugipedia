title: Card Trivia:Stop Defense
wikitext: |-
  {{Navigation}}

  * This card has a counterpart, "[[Block Attack]]", and a retrained [[Anime-only|anime-exclusive]] version, "[[Negate Defense]]".
  * This card's effect was incorporated into "[[Incoming Machine!]]", referencing a move made by [[Keith Howard (manga)|Keith Howard]] against [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] during their first duel.
