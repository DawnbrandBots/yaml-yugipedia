title: Card Trivia:Noble Knight Drystan
wikitext: |-
  {{Navigation}}

  * This knight is based upon the character, [[wikipedia:Tristan|Tristan]], a member of the [[wikipedia:Round Table|Knights of the Round Table]], who fell in love with the maiden [[wikipedia:Iseult|Iseult]] when they consumed a love potion by mistake.
  ** This card's name alludes to this as "Drystan" is the Welsh name for [[wikipedia:Tristan (name)|Tristan]].
  * This monster appears in the artwork of "[[Noble Knights of the Round Table]]".
