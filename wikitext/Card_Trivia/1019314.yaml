title: Card Trivia:Asset Mountis
wikitext: |-
  {{Navigation}}

  * "Mountis" is a portmanteau of the words "mounting" (a Japanese ''wasei-eigo'' term meaning "to show off one's superiority or wealth") and "[[wikipedia:Praying mantis|mantis]]".
  ** Fittingly, this monster is depicted sitting atop a mountain of [[wikipedia:Gold bar|gold bars]], which serve as its personal assets.
