title: Card Trivia:Genex Ally Axel
wikitext: |-
  {{Navigation}}

  * This monster is likely based on Kamen Rider Accel, a character from the Japanese ''tokusatsu'' drama ''[[wikipedia:Kamen Rider W|Kamen Rider W]]'', whose design is based on the physical features of a motorcycle.
  ** This monster's ''[[TCG]]'' name is likely a mistranslation of the word "accel" (アクセル ''Akuseru''), and is instead based on the [[wikipedia:Axle|axle]], a central shaft for rotating wheels, including the one on this monster's boots.
  * This monster's design features a [[Duel Disk]] on its left arm, with a card sticking out of the slot.
