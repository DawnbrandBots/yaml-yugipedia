title: Card Trivia:Genex Ally Solid
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Charge of the Genex!!]]''.
  * According to the [[Duel Terminal Master Guide card storylines|Duel Terminal Master Guide card storylines]], this monster is modeled after the "[[Ice Barrier]]" [[archetype]].
  ** This monster's name and effect [[support]]ing [[WATER]] monsters reference how ice is the solidified form of liquid when frozen.
  ** This monster's [[draw]]ing effect references how the "Ice Barrier" archetype features a playstyle revolving around [[hand]] advantages.
