title: Card Trivia:Big Eye
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Free-Range Monsters]]" and "[[Mirror Labyrinth]]".
  * This monster bears a resemblance to "[[Hiro's Shadow Scout]]" and "[[Meotoko]]".
  * This card shares a name with "[[Number 11: Big Eye]]", albeit not in all language versions.
  * Earlier Spanish prints of this card features several typos.
