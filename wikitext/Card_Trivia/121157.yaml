title: Card Trivia:Tribute to The Doomed
wikitext: |-
  {{Navigation}}

  * This card appears in the anime artwork of "[[Destruction of Destiny]]".
  * This card has four [[counterpart]]s.
  ** A [[banish]] counterpart: "[[Dark Core]]".
  ** A [[Quick-Play Spell]] counterpart: "[[Offerings to the Doomed]]".
  ** A [[Normal Trap]] counterpart: "[[Raigeki Break]]".
  ** A "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Tribute to The Doomed]]".
  * This card, "[[Alpha The Magnet Warrior]]", "[[Beta The Magnet Warrior]]", and "[[Gamma The Magnet Warrior]]" were not [[reprint]]ed in the American ''[[TCG]]'' with the "The" capitalized for the most time.
