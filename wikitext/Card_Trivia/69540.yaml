title: Card Trivia:Skreech
wikitext: |-
  {{Navigation}}

  * This is one of three monsters designed by fans in the ''Yu-Gi-Oh! Design Your Destiny Card Contest'' held by [[Upper Deck Entertainment]] and [[4Kids]] that were made as real cards featured in ''[[Gladiator's Assault]]'', the other two being "[[Dragon Ice]]" and "[[Tongue Twister]]".
  ** Only the artworks were submitted by fans, as confirmed in a [https://www.pojo.biz/board/showthread.php?p=16346698#post16346698 Pojo post] by Jerome McHale.
  ** This monster was the winner of the 8-12 age division in that contest. The artist was Krystian L. of W Halls, Tennessee.
  * This monster's appearance is based on the [http://silenthill.wikia.com/wiki/Numb_Body Numb Body], an enemy from the [[Konami]] video game, ''[[wikipedia:Silent Hill 3|Silent Hill 3]]''.
