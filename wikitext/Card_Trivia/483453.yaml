title: 'Card Trivia:Number F0: Utopic Future Slash'
wikitext: |-
  {{Navigation}}

  * This card's effect reflects "[[Number F0: Utopic Future]]" affected by the effect of "[[Memories of Courage]]" when it was used by [[Yuma Tsukumo]] in his final Duel against [[Astral]] in the anime.
  * This card was created to honor ''[[Yu-Gi-Oh! ZEXAL]]'' [[Yu-Gi-Oh! ZEXAL - Episode 146|episode 146]], which won [http://vjump.shueisha.co.jp/yugioh_20th_duel/keka.html Shueisha's V Jump magazine's fan favourite Yu-Gi-Oh! Zexal duel] poll.
  * This pose this monster takes in its artwork is the same as that of "[[Number 39: Utopia]]".
  * This monster sometimes appears in the pack opener in ''[[Yu-Gi-Oh! Master Duel]]''.
