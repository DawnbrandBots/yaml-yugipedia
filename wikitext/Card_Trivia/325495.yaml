title: Card Trivia:D/D/D Doom King Armageddon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: Raging Masters]]''.
  * This monster appears in the artwork of "[[Dimension Drape]]".
  * This is the [[signature card]] of [[Declan Akaba]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This card has the same [[ATK]] (3000) as the signature cards of the rivals of the other ''[[Master Duel]]'' anime series: [[Seto Kaiba]]'s "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]", [[Chazz Princeton]]'s "[[Armed Dragon LV10 (anime)|Armed Dragon LV10]]", [[Jack Atlas]]'s "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]", [[Kite Tenjo]]'s "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]", and [[Roken Kogami|Varis]]'s "[[Borreload Dragon (anime)|Borreload Dragon]]".
  ** This is the first and one of two signature cards of an anime rival to not be a [[Dragon]] monster, the other being [[Zuwijo Zwil Velgear]]'s "[[Voidvelg Requiem (anime)|Voidvelg Requiem]]".
  ** This monster's Japanese title, "Death Great King" ({{Ruby|死|し}}{{Ruby|偉|い}}{{Ruby|王|おう}}, ''Shiiō'') is a homophone of "[[wikipedia:Chief executive officer|CEO]]" ("Chief Executive Officer"), the highest officer charged with the management of an organization.
  *** Fittingly, in the ''Yu-Gi-Oh! ARC-V'' anime, Declan Akaba was the CEO of [[Leo Corporation]].
  * This monster has 4 [[Card evolutions|upgraded]] [[Extra Deck]] forms.
  ** [[Fusion Monster|Fusion]]: "[[D/D/D Super Doom King Purple Armageddon]]"
  ** [[Synchro Monster|Synchro]]: "[[D/D/D Super Doom King Bright Armageddon]]"
  ** [[Xyz Monster|Xyz]]: "[[D/D/D Super Doom King Dark Armageddon]]"
  ** [[Unity Summon|Unity]]: "[[D/D/D/D Dimensional King Arc Crisis]]"
