title: Card Trivia:Dark Anthelion Dragon
wikitext: |-
  {{Navigation}}

  * This monster is named after an [[wikipedia:Anthelion|anthelion]], a rare optical phenomenon appearing on the parhelic circle opposite to the sun as a faint white halo.
  * This monster is the manga [[counterpart]] of "[[Dark Rebellion Xyz Dragon]]".
  ** This monster is [[Yuto (manga)|Yuto's]] true [[ace monster]] in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, after his initial signature card was "[[Dark Rebellion Xyz Dragon (manga)|Dark Rebellion Xyz Dragon]]".
  ** This monster may be a transformed [[Pendulum Monster|Pendulum]] version of "Dark Rebellion Xyz Dragon", as in the ''Yu-Gi-Oh! ARC-V'' manga, the latter appeared to have been permanently transformed into this monster.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|016|ref}}, specifically from the panel showing [[Dark Anthelion Dragon (manga)|this monster]] being Summoned.
