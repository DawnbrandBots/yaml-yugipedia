title: Card Trivia:Harpie's Feather Duster
wikitext: |-
  {{Navigation}}

  * The card "[[House of Adhesive Tape]]" appears in this card's first ''[[OCG]]''/''[[TCG]]'' artwork, oddly using the design of a [[Monster Card]].
  ** The text in this artwork appears to be "Hoi Hoi House" (ホイホイハウス, ''Hoi Hoi Hausu''). This likely references Hoy Hoy, the Japanese brand of cockroach glue traps.
  ** "[[Harpie Lady 1]]" of the "[[Harpie Lady Sisters]]" appears in this card's third ''OCG''/''TCG'' artwork.
  *** This card's third ''OCG''/''TCG'' artwork is based on the fact that it was used alongside "[[Harpie Lady]]" while equipped with "[[Cyber Shield]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  *** This card's third ''OCG''/''TCG'' artwork is similar to a shot of "Harpie Lady" attacking with "[[Rose Whip]]" in {{episode|Yu-Gi-Oh!|025|ref}}.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Harpie's Feather Duster]]".
  * This is one of four cards to feature a card(s) that were designed to counter this card specifically in its effects, the other three being "[[Dark Hole]]", "[[Monster Reborn]]", and "[[Raigeki]]"; in this card's case, it is "[[Gryphon Wing]]".
  * This is one of the first cards ever to be Forbidden in both the ''[[OCG]]'' and ''[[TCG]]'' (in [[March 2004 Lists|March]] and [[August 2004 Lists|October 2004]] respectively). It was the second-to-last card Forbidden at those times to have the status lifted.
  ** In the ''OCG'', it did not come off of the list until [[January 2015 Lists (OCG)|January 2015]], ten years and ten months later, while in the ''TCG'' it remained Forbidden up until [[September 2020 Lists|September 2020]], after almost 16 years.
  * This card's effect is one of the four long-[[Forbidden]] cards whose effect was used one of the effects of "[[Fuh-Rin-Ka-Zan]]" and the effect of "[[Windrose the Elemental Lord]]".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card has a special animation when activated: this feather duster sweeps across the opponent's field, destroying their [[Spell]]/[[Trap Card]]s afterward.
