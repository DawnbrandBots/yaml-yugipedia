title: Card Trivia:Deskbot 009
wikitext: |-
  {{Navigation}}

  * This monster appears to be comprised of many different pieces of the other "[[Deskbot]]" monsters, including:
  ** an upgraded version of [[Deskbot 001|001's]] Sidearm
  ** [[Deskbot 002|002's]] Erasers (feet)
  ** [[Deskbot 003|003's]] Compass (right shoulder)
  ** [[Deskbot 004|004's]] Colored pencils and Paint Brushes
  ** [[Deskbot 005|005's]] Tape Rolls (hips)
  ** [[Deskbot 006|006's]] Stapler (left shoulder)
  ** [[Deskbot 007|007's]] Scissor Blades (now combined)
