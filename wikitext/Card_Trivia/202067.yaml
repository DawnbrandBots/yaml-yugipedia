title: Card Trivia:Lionhearted Locomotive
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Revolving Switchyard]]".
  * This monster references the children's story, ''[[wikipedia:The Little Engine That Could|The Little Engine That Could]]'', in which an anthropomorphic locomotive must pull another broken-down locomotive after it is stranded in a high mountain.
  ** This monster's Japanese name, "Courageous Locomotive" (勇気機関車, ''Yūkikikansha'') is a pun on the Japanese term for "steam locomotive" (蒸気機関車, ''jōkikikansha''); also, its name, "Poppo" is the Japanese onomatopoeia for the puffing of a steam train.
