title: Card Trivia:Catnipped Kitty
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cat Meeting]]" and "[[Catnip Turbine]]".
  * This monster has [[wikipedia:Heterochromia iridum|heterochromia iridum]], a genetic condition where each eye features a different color of the iris. This condition is well-documented in cats (with affected recipients being referred to as [[wikipedia:Odd-eyed cat|odd-eyed cats]]), manifesting in the form of one blue eye and one eye that is either green, yellow, amber, or brown; however, this monster has one purple eye and one green eye.
