title: Card Trivia:Dueltaining
wikitext: |-
  {{Navigation}}

  * "[[Performapal Sky Magician]]" appears in this card's artwork.
  * This card's name references the [[Dueltainer|Dueltaining]] (''Entame Dyerui'', "Entertainment Duel" in the Japanese version) philosophies of [[Yuya Sakaki]] and his father, [[Yusho Sakaki]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This card's bulleted effects revolving around the number "5" references the title of the ''Yu-Gi-Oh! ARC-V'' anime, which is commonly read as "Arc Five". This is reinforced by the fact that the English letter "V" is derived from the Roman numeral of the number "5".
