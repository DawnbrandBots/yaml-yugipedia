title: Card Trivia:Fossil Dyna Pachycephalo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Nature Pack: Courageous Zoodiacs]]''.
  * This monster is based on the fossilized skeleton of a ''[[wikipedia:Pachycephalosaurus|Pachycephalosaurus]]''.
  * This is one of three [[Rock]] monsters based on the fossilized skeletons of dinosaurs, the other two being "[[Flint Cragger]]" and "[[Fossil Dragon Skullgios]]".
  ** Fittingly, all three monsters were used by [[Jim Crocodile Cook]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
