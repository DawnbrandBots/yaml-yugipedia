title: Card Trivia:Gazelle the King of Mythical Beasts
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chimera Fusion]]" and "[[Double Summon]]".
  * This card appears in the artwork of "[[Brave Attack]]".
  * Despite this card's name, this monster better resembles a [[wikipedia:Lion|lion]], which is known for hunting [[wikipedia:gazelle|gazelles]].
  * This card has a [[retrained]] counterpart: "[[Gazelle the King of Mythical Claws]]".
  * This card has a [[Rush Duel]] [[WIND]] counterpart: "[[Fazuzu the King of Mythical Wind Beasts]]"
  * Interestingly, despite having four claws on its front paws in its artwork, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster is often depicted with only three claws, though this sometimes changes. Even in the same episode, the number of claws it has can change between shots, such as during [[Yami Yugi]]'s Duel with [[Arkana]].
