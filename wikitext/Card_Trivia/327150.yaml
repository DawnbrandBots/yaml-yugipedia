title: Card Trivia:U.A. Midfielder
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Midfielder|midfielder]] in [[wikipedia:Association football|soccer/football]].
  * This monster appears in the artworks of "[[Defense Zone]]", "[[Loss Time]]", and "[[U.A. Locker Room]]".
  * "Midfielder" is the driver for "[[F.A. Sonic Meister]]" and "[[F.A. Dawn Dragster]]".
