title: Card Trivia:Tour Guide From the Underworld
wikitext: |-
  {{Navigation}}

  * "[[Tour Bus From the Underworld]]" appears in this card's first artwork.
  ** "[[Sangan]]" and "[[Tardy Orc]]" appear in this card's alternate artwork.
  * This monster appears in the artwork of "Tour Bus From the Underworld".
  * This monster is possibly a reference to [[wikipedia:Virgil|Virgil]], a character from [[wikipedia:Dante Alighieri|Dante Alighieri's]] ''[[wikipedia:Divine Comedy|Divine Comedy]]'' who guides Dante to the [[wikipedia:Underworld|Underworld]].
  ** This is further enhanced by this monster's strong synergy with the "[[Burning Abyss]]" [[archetype]], which is also based on the ''Divine Comedy''.
  * This monster is the basis for [[Anna Des]] in the ''[[Yu-Gi-Oh! OCG Structures]]'' manga, as both share a similar design (red hair tied into pigtails, wearing white gloves, and both have a fang when the mouth is open), and Des has been called "Ms. Guide" to her chagrin.
