  {{Navigation}}

  * This monster is based on the [[wikipedia:Sebastiscus marmoratus|Sebastiscus marmoratus]], a species of fish that is commonly known as the "marbled rockfish".
  * This monster appears in the artworks of "[[Marincess Cascade]]" and "[[Marincess Battle Ocean]]".
