title: Card Trivia:Timeater
wikitext: |-
  {{Navigation}}

  * This monster's name reflects its effect when it destroys an opponent's monster by battle, which "eats" a portion of the opponent's "time" (that being their [[Main Phase 1]]).
  * In certain ''Yu-Gi-Oh!'' video games with three-dimensional models, such as ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster is depicted as an ogre with a clock for a stomach.
