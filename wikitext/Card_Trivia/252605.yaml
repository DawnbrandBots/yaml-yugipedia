title: Card Trivia:Fire Formation - Gyokkou
wikitext: |-
  {{Navigation}}

  * This card was named after the ''[[wikipedia:Epsilon Ursae Majoris|Epsilon Ursae Majoris]]''.
  * "[[Brotherhood of the Fire Fist - Leopard]]" and "[[Brotherhood of the Fire Fist - Wolf|Wolf]]" appear in this card's artwork.
  * Like other "[[Fire Formation]]" cards, this card's effect is a variant on an existing Spell/Trap card, in this case "[[Xing Zhen Hu Replica]]".
