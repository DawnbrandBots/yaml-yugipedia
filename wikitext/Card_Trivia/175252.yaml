title: Card Trivia:Sealing Ceremony of Mokuton
wikitext: |-
  {{Navigation}}

  * "[[Armed Ninja]]" appears in this card's artwork.
  * This card could be a reference to the fact that both "Armed Ninja" and the "Sheep Tokens", which originated from "[[Scapegoat]]", are both [[EARTH]] Attribute monsters.
  ** Also, there are 4 "[[Sheep Token]]s" dressed like ninjas in this card's artwork, which makes sense with "Scapegoat", since it [[Special Summon]]s 4 "Sheep Tokens".
  * The term "Mokuton" refers to a mythological ninja technique based on hiding in foliage.
  * This is the only "[[Sealing Ceremony]]" card that features Tokens that can be used as cost.
