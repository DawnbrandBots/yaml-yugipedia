title: Card Trivia:Bacha the Melodious Maestra
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Johann Sebastian Bach|Johann Sebastian Bach]], a German composer and musician of the late Baroque period.
  ** The background of this card's artwork features an [[wikipedia:Organ (music)|organ]], referencing how Johann Sebastian Bach is known for his compositions by organ, including the [[wikipedia:Toccata and Fugue in D minor, BWV 565|Toccata and Fugue in D minor]].
