title: Card Trivia:Spiderweb Castle
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The castle in this card's artwork is likely based on [[wikipedia:Osaka Castle|Osaka Castle]], a landmark castle located in Osaka, Japan.
  * The Japanese pronunciation of this card's name (蜘蛛の巣城 ''Kumonosujō'') likely references the title of the 1957 Japanese period drama film, ''[[wikipedia:Throne of Blood|The Castle of Spider's Web]]''.
