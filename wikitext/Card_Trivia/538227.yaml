title: Card Trivia:The Emperor's Holiday
wikitext: |-
  {{Navigation}}

  * This card was based on the fairytale ''[[wikipedia:The Emperor's New Clothes|The Emperor’s New Clothes]]''; in the Japanese artwork, the emperor's chest is bare and the name of the card is the Japanese title for ''The Emperor’s New Clothes''.
  * The emperor from this card appears in the artwork of "[[Tyrant's Temper]]", "[[Tyrant's Tirade]]", "[[Tyrant's Tantrum]]", "[[Tyrant's Tummyache]]", "[[Tyrant's Throes]]", "[[Double Payback]]", "[[The Huge Revolution is Over]]", "[[Asleep at the Switch]]", "[[Turnabout]]", "[[Retort]]" and "[[Clear Robe]]".
  * Four of the snickering people in this card's artwork also appear in "Retort".
