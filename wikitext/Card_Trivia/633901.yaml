title: Card Trivia:Mathmech Billionblade Nayuta
wikitext: |-
  {{Navigation}}

  * "[[Geomathmech Magma]]" appears in this card's artwork.
  * In the traditional Japanese number system, "[[wiktionary:那由他#Japanese|Nayuta]]" means "one [[wiktionary:novemdecillion|novemdecillion]]" or 10<sup>60</sup> in the American system.
