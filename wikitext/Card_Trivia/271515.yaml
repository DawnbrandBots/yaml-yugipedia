title: Card Trivia:Armades, Keeper of Boundaries
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Black and White Wave]]".
  * This monster is the [[Synchro Monster|Synchro]] [[counterpart]] of "[[Tiras, Keeper of Genesis]]" and "[[Adreus, Keeper of Armageddon]]".
  ** It shares the [[LIGHT]] [[Attribute]] with "Tiras", and the [[Fiend]] [[Type]] with "Adreus".
  ** It is also a [[Level 5]], while "Tiras" and "Adreus" are both [[Rank 5]] monsters.
