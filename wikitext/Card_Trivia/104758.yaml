title: Card Trivia:Parasite Mind
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The cards "[[Jam Breeding Machine]]" and "[[Nightmare Wheel]]" appear in this card's artwork.
  ** Fittingly, both cards were used by [[Dark Marik (manga)|Dark Marik]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ([[Yami Marik]] in the [[Yu-Gi-Oh! (anime)|anime]]).
  * This card is named after [[Parasite Mind (ability)|Parasite Mind]], an ability [[Zorc Necrophades]], [[Bandit King Bakura]], and [[Yami Bakura]] to seal their souls into certain objects.
