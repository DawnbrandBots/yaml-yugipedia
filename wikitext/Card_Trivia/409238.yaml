title: Card Trivia:Dowsing Fusion
wikitext: |-
  {{Navigation}}

  * [[Yuya's pendant]] appears in this card's artwork.
  * This card's name is based on [[wikipedia:Dowsing|dowsing]], a type of divination employed in attempts to locate objects and materials buried underground without the use of scientific apparatus.
  ** Dowsing also employs the use of a pendulum to locate the objects and materials, reflecting this card's effect to [[banish]] [[Pendulum Monster]]s from the [[Graveyard]] as [[Fusion Material]].
