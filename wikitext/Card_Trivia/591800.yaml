title: Card Trivia:Cubic Dharma
wikitext: |-
  {{Navigation}}

  * This card's name is based [[wikipedia:Dharma|Dharma]], a concept in Hinduism which signifies behaviors that are considered virtuous and right.
  * This card's first effect references one of the rules of [[Dimension Summon]]ing, a Summoning method used in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'', which prevents the [[control]]ler of a Dimension Summoned monster from taking [[battle damage]].
