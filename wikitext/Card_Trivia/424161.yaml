title: Card Trivia:Karma of the Destruction Swordsman
wikitext: |-
  {{Navigation}}

  * "[[Buster Blader, the Destruction Swordmaster]]" and "[[Buster Dragon]]" appear in this card's artwork.
  ** This card's artwork depicts "Buster Blader" fighting "Buster Dragon", the corrupted form of his companion, "[[Buster Whelp of the Destruction Swordsman]]", being forced to kill it.
  ** The events in this card's artwork are continued in the artwork of "[[Destruction Sword Memories]]".
