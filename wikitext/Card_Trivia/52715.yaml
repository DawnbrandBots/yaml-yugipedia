title: Card Trivia:Archlord Kristya
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Celestial Rage]]".
  * Th second portion of this monster's Japanese name, "Archangel Christia", is based on the Latin word meaning "follower of [[wikipedia:Jesus|Christ]]".
  * This monster shares the same [[Level]] (8) and [[original ATK and DEF]] (2800/2300) as "[[Archlord Zerato]]" and [[Zera|its counterparts]].
  * In the English version of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this monster's original ATK and DEF was erroneously listed as 2400/1800.
  * In the ''[[OCG]]'', this is the only card that was printed only in [[Gold Rare]] without any previously released counterpart from a [[booster pack]].
  * This card's ''OCG''/''[[TCG]]'' artwork is taken from {{chapter|GX|036|ref}}, specifically from the panel showing [[Archlord Kristya (manga)|this monster]] being Summoned.
