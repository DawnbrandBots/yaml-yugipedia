title: Card Trivia:Winda, Priestess of Gusto
wikitext: |-
  {{Navigation}}

  * According to the Duel Terminal Master Guide, this monster is the older sister of "[[Wynn the Wind Charmer]]", hence their resemblance and their similar outfits, and "[[Windaar, Sage of Gusto]]" is their father.
  ** This monster has a yellow stuffed rabbit in her coat, while "Wynn" has a pink stuffed rabbit in her coat.
  * This monster appears in the artworks of "[[Whirlwind of Gusto]]", "[[Contact with Gusto]]", "[[Daigusto Gulldos]]", "[[Shrine of Mist Valley]]" and a younger version of it in "[[After the Storm]]".
  * A younger version of "[[Gusto Gulldo]]" appears in this card's artwork.
  ** A slightly older version of the "Gusto Gulldo" in this card's artwork also appears in the artwork of "Whirlwind of Gusto".
  ** This is supported by the fact that this monster is riding "Gusto Gulldo" in the artwork of "Daigusto Gulldos".
  * "[[Kamui, Hope of Gusto]]" is this card's male counterpart.
  ** It has the same Type, Attribute, Level and the same effect (albeit with different activation requirement).
  * This card's puppet form (or her re-animated corpse) is depicted in the artwork of "[[El Shaddoll Winda]]", "[[El Shaddoll Fusion]]" and "[[Nephe Shaddoll Fusion]]".
  * "[[Spiritual Beast Tamer Winda]]" is an older version of this monster.
  * According to Master Guide 5, this monster was killed during the revival of "[[Sophia, Goddess of Rebirth]]", but was revived as "El Shaddoll Winda" by "[[Tierra, Source of Destruction]]".
