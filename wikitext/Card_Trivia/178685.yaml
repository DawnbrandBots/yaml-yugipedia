title: Card Trivia:Evilswarm Ophion
wikitext: |-
  {{Navigation}}

  * This monster is the "[[lswarm]]" counterpart of "[[Gungnir, Dragon of the Ice Barrier]]".
  * Like "[[Evilswarm Bahamut]]" and "[[Evilswarm Ouroboros]]", it has 50 more [[ATK]] and 50 less [[DEF]] than its counterpart.
  * This monster is named after [[wikipedia:Ophion|Ophioneus]], the [[wikipedia:serpent (symbolism)|serpent]] of [[wikipedia:Greek mythology|Greek mythology]] that ruled the [[wikipedia:world|world]] before [[wikipedia:Cronus|Cronus]] and [[wikipedia:Rhea (mythology)|Rhea]].
