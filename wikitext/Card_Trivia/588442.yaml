title: Card Trivia:Omni Dragon Brotaur
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Balaur|balaur]], a creature in Romanian folklore, similar to a European dragon.
  * This card is a counterpart to "[[Chaos Dragon Levianeer]]", "[[Iron Dragon Tiamaton]]", "[[Mana Dragon Zirnitron]]", and "[[Fantastical Dragon Phantazmay]]"—all [[DARK]] [[Dragon]]s based on mythic dragons.
