title: Card Trivia:Candelato, the Beast of Light
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[EN - Engage Neo Space]]".
  * This card appears in the [[:File:MontageDragon-OW.png|original anime artwork]] of "[[Montage Dragon]]".
  * [[Neo Space (location)|Neo Space]] (more specifically, the shores of [[Io]], the moon orbiting the planet [[wikipedia:Jupiter|Jupiter]]) appear in this card's artwork.
  ** This is a reference to {{episode|GX|062|ref}}, the episode in which this monster debuted, which takes place on the shores of Io.
  * This monster's name is a reference to the [[wikipedia:Candela|candela]], the SI unit of measurement for luminous intensity.
  ** This monster's Japanese title, 「光幻獣」 (''kōgenjū'', "Phantom Beast of Light") is a homophone of 「光源獣」 (''kōgenjū'', "light source beast"). Due to the lack of official Japanese subtitles for the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's Japanese name was misunderstood as "Candelato, the Light-Source Beast" for many years.
  * This monster shares similarities with "[[Slifer the Sky Dragon]]"
  ** Both feature a similar design, including a draconian appearance, a red color scheme, and two fanged mouths.
  ** Both feature an effect that allows them to gain 1000 [[ATK]]/[[DEF]] for each card in the player's hand.
  ** Both are attacked by "[[Elemental HERO Neos]]" during its first and last appearance in the ''[[Yu-Gi-Oh! GX]]'' anime, where this monster is the first monster attacked, while "Slifer" is the last monster attacked.
  * This monster is tied with "[[Gladiator Beast Claudius]]" for the highest [[Level]] (12) of all [[Beast]] monsters.
  * This monster's ''OCG''/''TCG'' effect to [[add]] a card with a [[coin toss]]ing effect from the [[Deck]] to the [[hand]] may be a reference to the "[[Arcana Force]]" [[archetype]], which, along with this monster, features an extraterrestrial design and debuted during the [[Society of Light (arc)|Society of Light]] arc in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** In the anime, this monster's twin-headed dragon design foreshadows the appearance of "[[Arcana Force EX - The Light Ruler]]" at the end of the second season, which in turn foreshadows the appearance of "[[Yubel - The Ultimate Nightmare]]" the following season. [[Sartorius]]' evil personality shows [[Jaden Yuki]] a vision of "Yubel - The Ultimate Nightmare" in {{episode|GX|103|ref}}, the same duel he uses "The Light Ruler" against Jaden.
  * This monster's ''OCG''/''TCG'' [[Quick Effect]] to [[negate]] effects that adds a card from the Deck to the hand is a reference to its anime effect, which forces the player to skip their [[Draw Phase]].
