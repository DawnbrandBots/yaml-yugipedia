title: Card Trivia:Performapal Laugh Maker
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, when this card attacked, it showed one of the "[[Smile World]]" icons.
  * In the ''Yu-Gi-Oh! ARC-V'' anime, while most monsters feature voice lines with grunting, roaring, or shouting, this monster's voice lines features laughing instead.
