title: Card Trivia:Dragunity Brandistock
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Brandistock|brandistock]], a 16th to 19th-century Italian polearm that functions as a short spear with retractable three-pronged blades. Fittingly, this monster's design features three prongs on its head: one on its forehead, and two smaller ones on the side of its head.
