title: Card Trivia:Magnet Fusion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Magnet Eagle Delta]]", "[[Magnet Ape Epsilon]]" and "[[Magnet Crocodile Zeta]]" appear in this card's artwork.
  * This card is the only [[Spell Card]] that [[Fusion Summon]]s a [[Fusion Monster]], but requires the [[Fusion Material Monster]]s to be [[Tributed]] instead of being [[sent]] to the [[Graveyard]] or [[banish]]ed.
