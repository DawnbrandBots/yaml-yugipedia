title: Card Trivia:Sacred Phoenix of Nephthys
wikitext: |-
  {{Navigation}}

  * This monster is the [[cover card]] for ''[[Flaming Eternity]]'' and ''[[Expert Edition Volume 3]]''/''[[Dark Revelation Volume 3]]''.
  * This monster appears in the artwork of "[[Phoenix Wing Wind Blast]]".
  ** This monster's feather appears in the artwork of "[[A Feather of the Phoenix]]".
  * "[[Dark Magical Circle]]" appears in the background of this card's artwork.
  * This monster's effect to [[Special Summon]] itself from the [[Graveyard]] references its namesakes:
  ** This monster is named after [[wikipedia:Nephthys|Nephthys]], the Egyptian goddess associated with birth and death in [[wikipedia:Egyptian mythology|Egyptian mythology]].
  ** This monster is based on a [[wikipedia:Phoenix (mythology)|phoenix]], a mythological firebird known for being immortal, where they will burst into flames when they die and are reborn from the ashes.
  * This monster has several [[counterparts]]:
  ** A [[Dark counterpart]]: "[[Dark Nephthys]]".
  ** A "[[Metaphys]]" counterpart: "[[Metaphys Nephthys]]".
  ** A "[[Chaos]]" counterpart: "[[Chaos Nephthys]]".
  ** A [[Link Monster|Link]] counterpart: "[[Nephthys, the Sacred Flame]]".
  ** A [[Ritual Monster|Ritual]] counterpart: "[[Cerulean Sacred Phoenix of Nephthys]]".
  * This monster, "[[Horus the Black Flame Dragon LV8]]", and "[[The Creator]]" are possibly connected to each other:
  ** They are all representations of Egyptian deities.
  ** They all share similar physical traits, including a mechanical appearance and a blue gemstone.
  ** They all have Dark counterparts: "[[Dark Horus]]", "[[The Dark Creator]]", and "Dark Nephthys".
  ** They were released as the [[cover card]]s for the consectuive [[Series 4]] [[Core Booster|Core Booster packs]]: ''[[Soul of the Duelist]]'' ("Horus the Black Flame Dragon LV8"), ''[[Rise of Destiny]]'' ("The Creator"), and ''[[Flaming Eternity]]'' (this monster).
  ** They each have a support monster first released in the same Core Booster packs they debuted in that have a humanoid design: "[[Horus' Servant]]", "[[The Creator Incarnate]]", and "[[Hand of Nephthys]]".
