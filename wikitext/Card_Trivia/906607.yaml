title: Card Trivia:Moray of Avarice
wikitext: |-
  {{Navigation}}

  * "[[Pot of Avarice]]" appears in this card's artwork.
  * This card's Japanese name is a pun on the words ''Utsubo'' ("eel") and ''Tsubo'' ("pot").
  * This card is the "Pot of Avarice" counterpart to "[[Moray of Greed]]" (which is based on "[[Pot of Greed]]").
