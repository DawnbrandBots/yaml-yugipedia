title: Card Trivia:OuTerverSe Byugyuwazzo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[OuTerverSe Eccentric Panic]]".
  * This monster is based on the parallel universe observed by [[Yudias Velgear]] through [[Kuaidul Velgear]] in {{episode|GO RUSH!!|135|ref}}, in which civilization exists without the ability to cast reflections unless seen through the [[Velgearian]] war painter Byugyuwazzo, which highly resembles [[wikipedia:Cubism|cubism]] portraits painted by [[wikipedia:Pablo Picasso|Pablo Picasso]].
  ** Fittingly, this monster resembles Yudias as a cubism portrait in that episode. This is further reinforced by this monster's appearance in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime when its  [[Type]] becomes [[Galaxy]], allowing it to take on Yudias's color scheme.
