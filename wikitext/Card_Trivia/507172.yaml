title: Card Trivia:Crow Goblin
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name and appearance are based on the ''[[wikipedia:Tengu|Karasu-Tengu]]'', a legendary ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore.
  ** This monster's Japanese name is shared with "[[Crow Tengu (manga)|Crow Tengu]]" in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, another monster based on the ''Karasu-Tengu''.
  * This monster has a [[recolored counterpart]]: "[[Spirit of the Books]]".
