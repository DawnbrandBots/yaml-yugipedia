title: Card Trivia:Leotaur
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Leontaurus" (レオンタウロス, ''Reontaurosu'') is a portmanteau of the romanized Greek words "''[[wikipedia:Lion|liontári]]''" (レオンタリ, ''Reontari'' lit. "lion") and "''[[wikipedia:Centaur|kéntauros]]''"  (ケンタウル, ''kentaurosu'' lit. "centaur").
  * This monster has a counterpart: "[[Caninetaur]]".
