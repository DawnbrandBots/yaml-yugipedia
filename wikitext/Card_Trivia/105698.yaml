title: Card Trivia:Rebirth Tablet
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The tablet in this card's artwork depicts an [[wikipedia:Ankh|ankh]], an ancient Egyptian hieroglyphic character represents the concept of eternal life, which reflects this card's effect to [[Special Summon]] a monster from the player's [[Graveyard]].
  * This card is a "[[Wedju]]" [[counterpart]] to "[[Monster Reborn]]".
