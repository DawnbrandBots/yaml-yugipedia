title: Card Trivia:Mermail Abyssgunde
wikitext: |-
  {{Navigation}}

  * This monster appears to be half [[wikipedia:Ocellaris clownfish|ocellaris clownfish]], better known as the common clownfish.
  * This monster appears in the artwork of "[[Abyss-squall]]" and "[[Deep Sea Aria]]".
  * This monster is based on one of the [[wikipedia:Rhinemaidens|Rhinemaidens]], specifically Wellgunde. The other corresponding "[[Mermail]]" monsters are "[[Mermail Abysslinde]]" and "[[Mermail Abysshilde]]".
  ** This is supported by the appearance of all of those monsters in the artwork of "Abyss-squall".
