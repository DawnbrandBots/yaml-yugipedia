title: Card Trivia:Mother Spider Splitter
wikitext: |-
  {{Navigation}}

  * This monster's name in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga is the same as "[[Mother Spider]]". Its English name is identical, while its Japanese name only differs by an [[wikipedia:interpunct|interpunct]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] "[[Baby Spider]]s" is based on [[Mother Spider (ZEXAL)|this monster's]] effect in the ''Yu-Gi-Oh! ZEXAL'' manga; the part of the effect that changes the Summoned monsters to [[Level 5]] is instead based on the manga effect of "[[Baby Spider (manga)|Baby Spider]]", which changes its Level to 5 when Special Summoned by this monster's effect.
  * This card's artwork is taken from {{chapter|ZEXAL|044|ref}}, specifically from the panel showing [[Mother Spider (manga)|this monster]] being Summoned.
