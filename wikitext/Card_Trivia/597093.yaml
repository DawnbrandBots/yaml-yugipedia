title: Card Trivia:Aqua Spirit
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name "Aqueria the Water Spirit", is based on [[wikipedia:Aquarius (astrology)|Aquarius]], the eleventh [[wikipedia:Astrological sign|astrological sign]] of the [[wikipedia:Zodiac|Zodiac]], which is also known as "the Water-Bearer".
  * This monster has five [[Attribute Spirit]] [[counterpart]]s:
  ** [[FIRE]]: "[[Spirit of Flames]]"
  ** [[EARTH]]: "[[The Rock Spirit]]"
  ** [[WIND]]": "[[Garuda the Wind Spirit]]"
  ** [[DARK]]: "[[Luna the Dark Spirit]]"
  ** [[LIGHT]]: "[[Diana the Light Spirit]]
