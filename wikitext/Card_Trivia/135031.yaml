title: Card Trivia:Tyrant's Temper
wikitext: |-
  {{Navigation}}

  * The kneeling wounded warrior is "[[Motivating Captain]]" (previously depicted as battle damaged in "[[The Warrior Returning Alive]]").
  * The emperor from this card appears in the artwork of "[[The Emperor's Holiday]]", "[[Tyrant's Tirade]]", "[[Tyrant's Tantrum]]", "[[Tyrant's Tummyache]]", "[[Tyrant's Throes]]", "[[Double Payback]]", "[[The Huge Revolution is Over]]", "[[Asleep at the Switch]]", "[[Turnabout]]", "[[Retort]]" and "[[Clear Robe]]".
