title: Card Trivia:Wind-Up Zenmaister
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Collectible Tins 2011 Wave 1]]''.
  * This card is the first [[Machine]] [[Xyz Monster]], and the first "[[Wind-Up]]" Xyz Monster.
  * This card's name is a portmanteau of "Zenmai", the Japanese name for the "Wind-Up" [[archetype]], and "Meister", the German word for "master".
  * This is the first "Wind-Up" monster to appear in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster is based on an aerial war vehicle, as shown by the jet wings on its shoulders and the four jet turbines on the bottom half of its lower section.
  ** This mirrors the other "Wind-Up" Xyz Monsters, "[[Wind-Up Zenmaines]]" and "[[Wind-Up Carrier Zenmaity]]", both of which are based on land war and naval war vehicles, respectively. The boss monster, "[[Wind-Up Arsenal Zenmaioh]]", can be viewed as the "general" of the archetype.
