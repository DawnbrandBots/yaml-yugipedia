title: Card Trivia:Golden Land Forever!
wikitext: |-
  {{Navigation}}

  * "[[Eldlich the Golden Lord]]" appears in this card's artwork.
  ** The pose assumed by "Eldlich" in this card's artwork depicts him slouching on the throne while holding a glass of wine. This is a reference to Dracula's iconic pose from ''[[wikipedia:Castlevania: Rondo of Blood|Castlevania: Rondo of Blood]]'' and ''[[wikipedia:Castlevania: Symphony of the Night|Castlevania: Symphony of the Night]]''.
