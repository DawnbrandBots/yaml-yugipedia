title: Card Trivia:Goka, the Pyre of Malice
wikitext: |-
  {{Navigation}}

  * Multiple "[[Fireball Token]]s" appear in this card's artwork.
  * In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this monster is a [[Fusion Monster]] that requires three "Fireball Tokens" as [[Fusion Material]]s.
  ** This card's manga incarnation is the only Fusion Monster to require [[Token Monster]]s as Fusion Materials.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|005|ref}}, specifically from the panel showing [[Goka, the Pyre of Malice (manga)|this monster]] being Summoned.
