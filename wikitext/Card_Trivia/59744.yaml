title: Card Trivia:Moja
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Beastborg Fusioner]]" and "[[Shateki]]" (on a fan).
  * This monster has an adult form: "[[King of the Beasts]]".
  * This card is the first ''[[TCG]]'' [[TCG-only|World Premiere]] card to be released before its [[booster pack]] (''[[Raging Battle]]'') or its Sneak Preview date.
  * According to ''[[Yu-Gi-Oh! 5D's World Championship 2011 - Over the Nexus]]'', this monster has a habit of saying "ss" before its sentences, similar to [[Larry]].
