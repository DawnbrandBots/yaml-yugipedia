title: Card Trivia:Aurora Draw
wikitext: |-
  {{Navigation}}

  * The two shining stars in this card's artwork represents the two cards the player can draw via its effect.
  * This card's video game effect requiring the player to [[control]] a "[[Meklord Emperor]]" monster in addition to its [[activation condition]] is based on its appearance in {{episode|5D's|141|ref}} where [[Aporia]] uses [[Aurora Draw (anime)|this card]] while he controlled "[[Meklord Army of Wisel (anime)|Meklord Army of Wisel]]" and "[[Meklord Army of Skiel (anime)|Meklord Army of Skiel]]".
