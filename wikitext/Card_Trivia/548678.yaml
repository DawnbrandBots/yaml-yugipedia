title: Card Trivia:Trickstar Maribold
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Trickstar Mandrake]]" and "[[Trickstar Nightshade]]" appear in this card's artwork.
  * This card's name is a play on the ''[[wikipedia:Tagetes|Tagetes]]'', a genus of annual or perennial flowers that are also known as "marigolds".
