title: Card Trivia:Quick Charger
wikitext: |-
  {{Navigation}}

  * "[[Batteryman Charger]]" appears in this card's artwork.
  ** Ironically, "Batteryman Charger" cannot be recycled by this card's effect.
  * This card's effect is similar to "[[Recycling Batteries]]". While "Quick Charger" is a [[Quick-Play]] Spell, "Recycling Batteries" allows any [[Thunder]]-type monsters with under 1500 ATK to be retrieved, and as there is no Level 4 "Batteryman" monster with more than 1500 ATK, there is nothing "Quick Charger" can target that "Recycling Batteries" cannot.
