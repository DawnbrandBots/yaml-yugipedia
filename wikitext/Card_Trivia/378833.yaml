title: Card Trivia:Kozmo Goodwitch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Kozmo Lightsword]]" and "[[Kozmourning]]".
  * This monster is a combination of the [[wikipedia:Good Witch of the North|Glinda, the Good Witch of the North]] from ''[[wikipedia:The Wizard of Oz (1939 film)|The Wizard of Oz]]'' and [[wikipedia:Obi-Wan Kenobi|Obi-Wan Kenobi]] from ''[[wikipedia:Star Wars|Star Wars]]'', both of whom serve as the mentor to the main protagonist of their respective films.
  ** Based on the artwork of "Kozmo Lightsword", this monster is likely also based on [[wikipedia:Qui-Gon Jinn|Qui-Gon Jinn]], the mentor of Obi-Wan Kenobi in the [[wikipedia:Star Wars prequel trilogy|''Star Wars'' prequel trilogy]].
