title: Card Trivia:Vishwar Randi
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart]]: "[[Succubus Knight]]"
  * This monster has a ''[[Rush Duel]]'' [[Bubble Era]] counterpart: "[[Vishwar Lambadi]]".
  * The name comes from the Hindi words विश्व (''vishva'' "world") and रंडी (''randi'' "whore"), hence a "worldly whore." ''Randi'' is an unusually vulgar word even for the ''OCG'', though its vulgarity is masked by its foreignness.
