title: Card Trivia:Caam, Serenity of Gusto
wikitext: |-
  {{Navigation}}

  * This card's name ''"Caam''" is a play on the word "calm," which means "serenity".
  * This monster appears in the artwork of "[[Poisonous Winds]]", "[[Blessings for Gusto]]" and "[[After the Storm]]".
  * Some players claim this card is a short-printed card in ''[[Hidden Arsenal 5: Steelswarm Invasion]]'', due to difficulties in obtaining it; this was also claimed regarding "[[Brionac, Dragon of the Ice Barrier]]", "[[Mist Wurm]]" and "[[Ally of Justice Catastor]]" in the other ''[[Hidden Arsenal]]'' sets.
