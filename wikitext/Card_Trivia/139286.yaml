title: Card Trivia:Castle Gate
wikitext: |-
  {{Navigation}}

  * This card appears in the original anime artwork of "[[Montage Dragon]]".
  * In the ''[[Yu-Gi-Oh! R]]'' manga, when this monster activates its effect, it reveals a cannon behind its gate and launches the [[Tribute]]d monster from the cannon towards the opponent.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|R|003|ref}}, specifically from the panel showing [[Castle Gate (manga)|this monster]] being Summoned, albeit with its right arm opening the right side of the gate.
