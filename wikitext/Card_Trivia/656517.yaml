title: Card Trivia:Nibiru, the Primal Being
wikitext: |-
  {{Navigation}}

  * A "[[Primal Being Token]]" appears in this card's artwork.
  * This monster is named after [[wikipedia:Nibiru cataclysm|Nibiru]], a supposed planetary object that some doomsday theorists believed would collide with Earth in the early 21st century.
  * This monster is a [[counterpart]] of "[[Theia, the Primal Being]]", who seems to be inspired by the figure depicted in the artwork of "Primal Being Token".
  ** Both share the same [[Level]] (11), [[Type]] ([[Rock]]), and [[original ATK and DEF]] (3000/600).
  ** Both have opposite [[Attribute]]s: this monster's Attribute is [[LIGHT]], while the Attribute of "Theia" is [[DARK]].
  ** Both were originally released as [[Prismatic Secret Rare]] [[TCG-only|World Premiere]] cards in a [[Mega-Tin]].
  ** This monster's effects are designed to work either in tandem or opposition with the effects of "Theia, the Primal Being".
  * It would be six years since this card's initial release in the ''[[TCG]]'' for it to receive an alternative artwork that would reveal what this monster fully looks like underneath its rocky shell, a form similar to "Theia, the Primal Being". Whether "Theia" is a more buffed version of this creature with a new name after it landed or a related entity carried by the same meteor is unknown.
