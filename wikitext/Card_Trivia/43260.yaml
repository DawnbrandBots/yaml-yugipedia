title: Card Trivia:Samsara Kaiser
wikitext: |-
  {{Navigation}}

  * This monster's armor is similar to the armor worn by the [[Monarch]] monsters. Fittingly, its effect is designed to facilitate the [[Tribute Summon]]ing of the Monarch monsters and their effects upon being Tribute Summoned.
  ** This monster's name is based on ''[[wikipedia:Kaiser|Kaiser]]'', the German word for "emperor", where the Japanese name for the Monarch series is "Emperor".
  *** This monster's ''[[TCG]]'' name is based on ''[[wikipedia:Saṃsāra|Samsara]]'', the concept of the cycle of birth and reincarnation after death in Hindu and Buddhist religions, which reflects this monster's effect to [[add]] itself from the [[Graveyard]] to the [[hand]] after it is [[Tribute]]d for a Tribute Summon.
  * This monster has a retrained ''[[Rush Duel]]'' counterpart: "[[Tribute Kaiser]]".
