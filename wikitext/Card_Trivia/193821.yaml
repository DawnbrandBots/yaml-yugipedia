title: Card Trivia:Inzektor Crossbow - Zektarrow
wikitext: |-
  {{Navigation}}

  * "[[Inzektor Exa-Stag]]" appears in this artwork.
  * This card represents a "crossbow."
  * Much like the other "Inzektor" cards which are based on Kamen Riders, this card seems to be based on the weapon of Kamen Rider Kuuga Pegasus Form, whose weapon is a crossbow.
