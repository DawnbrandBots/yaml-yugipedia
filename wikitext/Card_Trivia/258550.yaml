title: Card Trivia:Fencing Fire Ferret
wikitext: |-
  {{Navigation}}

  * This card's ''OCG'' name (火舞太刀, ''kamai tachi'') is a pun on ''[[wikipedia:Kamaitachi|kamaitachi]]'' (鎌鼬, literally "scythe-weasel"), which is a type of Japanese [[wikipedia:Yōkai|yōkai]] (supernatural creature). The two words are pronounced identically, but 火舞太刀 translates to "flame-dance long sword" rather than "scythe-weasel". Both of these meanings are reflected in this monster's design and artwork.
  ** This card's ''TCG'' name is based on a different kind of wordplay, alliterating the [[wikipedia:Ferret|ferret]], a type of mammal, and [[wikipedia:Fencing|fencing]], a sport involving sword combat. The monster's tail also appears to be sword-like.
  * This monster appears in the artwork of "[[Ferret Flames]]".
