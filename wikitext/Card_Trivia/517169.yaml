title: 'Card Trivia:Number 86: Heroic Champion - Rhongomyniad'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[World Superstars]]''.
  * This monster is named after [[wikipedia:Rhongomyniad|Rhongomyniad]], the spear used by [[wikipedia:King Arthur|King Arthur]] in medieval literature.
  * This is the first "[[Heroic Champion]]" "[[Number]]" monster.
  ** This is also the first "Number" monster released in [[Series 9]].
  * This monster can be seen as a [[counterpart]] of "[[Heroic Champion - Excalibur]]":
  ** Both monsters are named after the weapons used by King Arthur; this monster is named after the spear used by King Arthur, while "Excalibur" is named after the mythical sword used by King Arthur.
  ** Both monsters' [[Attribute]]s are polar opposites of each other; this monster's Attribute is [[DARK]], while "Excalibur's" Attribute is [[LIGHT]].
  ** Both monsters feature an effect that can double their [[original ATK]] by using two [[Xyz Material]]s.
