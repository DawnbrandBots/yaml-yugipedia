title: Card Trivia:Pinecono
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mini-Guts]]" and "[[Xyz Pieces]]".
  * The pronunciation of this card's Japanese name, "Pinecone Fairy" (マツボックル ''Matsubokkuru'') is a portmanteau of the Japanese word for "pinecone" (松ぼっくり ''matsubokkuri''), and [[wikipedia:Koro-pok-guru|korobokkuru]], a race of small people in Ainu folklore.
