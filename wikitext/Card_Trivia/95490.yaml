title: Card Trivia:Destiny HERO - Dread Servant
wikitext: |-
  {{Navigation}}

  * This monster has a retrained [[counterpart]]: "[[Destiny HERO - Dreadnought Servant]]".
  * This card's name and effect reflects how this monster is a servant to "[[Destiny HERO - Dreadmaster]]".
  * This is one of the few "[[Destiny HERO]]" monsters whose Japanese name does not feature the suffix "-guy", the others being "[[Destiny HERO - Dark Angel]]" and "[[Destiny HERO - Plasma]]".
  ** It is also the only one of the three to not be directly related to "Plasma", as "Dark Angel" was created to counter the former.
  * The monster sprite for "[[Freed the Matchless General]]" (in ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', and in later video games) uses this monster's legs as the basis for "Freed's" legs.
