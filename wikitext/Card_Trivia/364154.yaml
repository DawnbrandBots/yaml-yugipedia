title: Card Trivia:Digital Bug Cocoondenser
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bug Matrix]]" and "[[Bug Signal]]".
  * This monster's name and appearance are puns on "[[wikipedia:Pupa#cocoon|cocoon]]" (a silky case spun by insects to protect them during their larvae stage) and "[[wikipedia:Capacitor|condenser]]" (a device used to store an electric charge, consisting of one or more pairs of conductors separated by an insulator).
  * This monster shares the same [[Level]] (3), [[Type]] ([[Insect]]), and [[original ATK and DEF]] (0/2000) as another cocoon-themed monster, "[[Cocoon of Evolution]]".
