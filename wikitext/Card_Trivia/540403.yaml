title: Card Trivia:Loge's Flame
wikitext: |-
  {{Navigation}}

  * '''Loge''' is an invented Germanized name for the god '[[wikipedia:Loki|Loki]]' in the operas '[[wikipedia:Das Rheingold|Das Rheingold]]' and '[[wikipedia:Die Walküre|Die Walküre]]' by '[[wikipedia:Richard Wagner|Richard Wagner]]' and in works derived from them and in commentary on them. The form derives from scholarly speculation that 'Loki' and 'Logi' in [[wikipedia:Norse mythology|Norse mythology]] may have been identical originally.
  ** In '[[wikipedia:Die Walküre|Die Walküre]]', the wall of flame created by Loge serves as a prison for Brünnhilde as a punishment by Wotan, which she is freed from by the title character of the sequel, '[[wikipedia:Siegfried|Sigfried]]'. The second effect of this card (summoning "[[Valkyrie Brunhilde]]" by destroying this card in the [[Loge's Flame (anime)|anime]] version of this card) is symbolic of this.
