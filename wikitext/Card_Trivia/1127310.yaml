title: Card Trivia:D/D Defense Soldier
wikitext: |-
  {{Navigation}}

  * This monster and "[[D/D Lance Soldier]]" are named after the [[Lancers]], short for '''Lance Defense Soldiers''' (ランス・ディフェンス・ソルジャーズ ''Ransu Difensu Sorujāzu''), the organized group of [[Standard Dimension]] [[Duelist]]s led by [[Declan Akaba]] who defend the dimension from invaders from other dimensions.
  ** This monster's lion-like design is based on the [[Leo Corporation]], the gaming company of which Declan Akaba is [[wikipedia:CEO|CEO]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, with "leo" being the Latin word for "lion".
  ** This monster's shield is based on the design of Declan Akaba's [[Duel Disk#Standard Dimension|Duel Disk]].
