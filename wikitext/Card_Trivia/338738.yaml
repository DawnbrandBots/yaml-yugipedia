title: Card Trivia:Marksman Heiji Type 0
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The "[[Vigilante]]" monster are based on [[wikipedia:Zenigata Heiji|Zenigata Heiji]], a fictional Japanese policeman who captured criminals using a jutte and old-fashioned coins. Together, the names of this monster, "[[Vigilante Zeni]]", and "[[Vigilante Gata]]" form "Zenigata Heiji".
