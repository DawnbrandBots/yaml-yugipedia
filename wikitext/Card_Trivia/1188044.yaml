title: Card Trivia:Reporter Wars Scoopies (L)
wikitext: |-
  {{Navigation}}

  * "[[Rampaging Machine Headhorn]]" and "[[Reporter Recorder]]" appear in this card's artwork.
  * This monster, along with "[[Reporter Wars Scoopies]]" and "[[Reporter Wars Scoopies (R)|Reporter Wars Scoopies [R]]]", reference the [[Newspaper Club]] from the ''[[Yu-Gi-Oh! SEVENS]]'' anime, which was formed by [[Scoop Pitman]], [[Masa]], and [[Cub]], who were in charge of producing biased content in the form of newspaper articles.
