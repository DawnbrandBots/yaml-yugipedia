title: Card Trivia:Melffy Staring Contest
wikitext: |-
  {{Navigation}}

  * "[[Melffy Rabby]]" appears in this card's artwork, appropiately staring at the card's viewer.
  * This card's name, "Staring Contest", reflects its effect of allowing the player to [[reveal]] any number of "[[Melffy]]" monsters in their [[hand]] and keep them revealed during the [[Battle Phase]], at the start of the opponent's Battle Phase, to make monsters the opponent controls lose [[ATK]] equal to the combined ATK and [[DEF]] of all monsters revealed by its effect.
