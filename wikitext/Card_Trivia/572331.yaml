title: Card Trivia:Harpie Lady Elegance
wikitext: |-
  {{Navigation}}

  * "[[Harpie Lady Sisters]]" appear in this card's artwork.
  * This card appears in the artwork of "[[Dark Time Wizard]]".
  * This card's Japanese name, "Elegant Harpie Lady", is based on the Japanese name of {{episode|Yu-Gi-Oh!|6|ref}}, which features the anime debut of "Harpie Lady Sisters".
  * The design of "Harpie Lady Sisters" in this card's artwork is reused in the artwork of "[[Token (Mai and "Harpie Lady Sisters")]]".
