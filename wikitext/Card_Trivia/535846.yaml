title: Card Trivia:Destruction of Destiny
wikitext: |-
  {{Navigation}}

  * An [[Academy Duel Disk]] (with 3 cards being [[sent]] to the [[Graveyard]]) appears in this card's artwork.
  ** The [[Duel Disk]] that appears in this card's artwork is similar to the one that appears in the artwork of "[[Destiny Draw]]".
  ** "[[Archfiend of Gilfer]]", "[[Call of the Haunted]]", "[[Helpoemer]]", "[[Return Zombie]]", and "[[Tribute to The Doomed]]" appear in this card's anime artwork.
  *** "[[Exarion Universe]]" appears in this card's English anime artwork.
