title: Card Trivia:Slot Machine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Heavy Metal Raiders]]".
  * This monster has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Slot Machine PG-7]]".
  * According to this card's [[flavor text]], the name, artwork, and effect of "[[7 Completed]]" reflects this monster's slots landing on a favorable outcome.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster serves as [[Keith (DOR)|Keith's]] [[Deck Leader]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|122|ref}}, specifically from the panel showing [[Slot Machine (manga)|this monster]] being Summoned.
