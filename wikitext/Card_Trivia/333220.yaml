title: Card Trivia:Double Ancient Gear Hunting Hound
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Ancient Gear Hunting Hound]]".
  ** This monster also has an upgraded form: "[[Triple Ancient Gear Hunting Hound]]".
  * This monster's appearance and [[Fusion Material]]s are based on the [[wikipedia:Orthrus|orthrus]], a canine monster in [[wikipedia:Greek mythology|Greek mythology]] with two dog heads.
