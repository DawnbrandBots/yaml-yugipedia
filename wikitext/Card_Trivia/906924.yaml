title: Card Trivia:Constellar Caduceus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Constellar Tellarknights]]".
  * This monster's name is based on the [[wikipedia:Caduceus|caduceus]], a staff entwined by two serpents that is sometimes surmounted by wings, which this monster wields.
  * This monster is likely the upgraded "[[Constellar]]" form of "[[Evilswarm Kerykeion]]", the fused form of "[[Constellar Rasalhague]]" who used the power of "[[Gishki Aquamirror]]" to fuse itself with the three corrupted "[[Ice Barrier]]" dragons to become "[[Evilswarm Kerykeion]]" in order to defeat "[[Sophia, Goddess of Rebirth]]" together with "[[Constellar Sombre]]".
  ** This is based on how both monsters highly resemble each other, how they are named after [[wikipedia:Caduceus|the staff entwined with two serpents]], and how the upper portion of the staff wielded by this monster highly resembles the logo of the "[[lswarm]]" [[archetype]].
  * This monster has a "[[Tellarknight]]" [[Xyz Monster]] form (combined with "[[Tellarknight Altairan]]" and "[[Tellarknight Lyran]]"): "[[Tellarknight Constellar Caduceus]]".
