title: Card Trivia:Striping Partner
wikitext: |-
  {{Navigation}}

  * This card's name is based on [[wikipedia:Data striping|data striping]], a technique of segmenting logically sequential data, such as a file, so that consecutive segments are stored on different physical storage devices.
  * The tip of this monster's tail resembles the plug of a Micro-B [[wikipedia:USB|USB]] cable.
