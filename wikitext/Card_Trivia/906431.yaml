title: Card Trivia:The Breaking Ruin God
wikitext: |-
  {{Navigation}}
  [[File:Obelisk_defeats_Rare_Hunters.png|thumb|right|250px|"[[The God of the Obelisk]]" defeats the [[Rare Hunter Tag]].]]

  * "[[Obelisk the Tormentor]]" appears in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|177|ref}} where [[Seto Kaiba (manga)|Seto Kaiba]] uses "[[The God of the Obelisk]]" to defeat the [[Rare Hunter Tag]].
  *** This card's artwork depicts "Obelisk the Tormentor" punching through a glowing barrier, likely referencing the anime version of that scene in {{episode|Yu-Gi-Oh!|068|ref}}, where "Obelisk" punched through the glowing barrier created by "[[Mirror Force (anime)|Mirror Force]]".
  * This card's Japanese name is a reference to how "The God of the Obelisk" is called the "God of Destruction" (破壊神, ''Hakaishin'') in {{chapter|Yu-Gi-Oh!|255|ref}}.
  * This card has [[counterpart]]s for the other [[Egyptian God]] cards:
  ** "[[Slifer the Sky Dragon]]": "[[The Revived Sky God]]"
  ** "[[The Winged Dragon of Ra]]": "[[The True Sun God]]"

