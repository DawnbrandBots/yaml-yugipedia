title: Card Trivia:Rising Sun Slash
wikitext: |-
  {{Navigation}}

  * This card's name is based on the [[attack name]] of "[[Number 39: Utopia]]". Fittingly, said monster appears in this card's artwork.
  ** However, the Italian names do not match. The TCG one means "Rising Sun Strike", while the anime one ("Fendente Spada della Speranza") is a direct translation of the Japanese name, "Hope Sword Slash".
