title: Card Trivia:Drytron Gamma Eltanin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Drytron Fafnir]]".
  * This monster's name is based on the [[wikipedia:Gamma Draconis|Eltanin]], the brightest star located in the northern constellation of [[wikipedia:Draco (constellation)|Draco]], which is also designated as "Gamma Draconis".
