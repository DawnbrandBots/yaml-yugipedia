title: Card Trivia:Fire King Avatar Garunix
wikitext: |-
  {{Navigation}}

  * "[[Fire King High Avatar Garunix]]" appears in this card's artwork.
  ** This monster is the younger form of "High Avatar Garunix". Ironically, it cannot [[Special Summon]] "High Avatar Garunix" with its effect.
  * This monster is the older form of "[[Legendary Fire King Ponix]]".
