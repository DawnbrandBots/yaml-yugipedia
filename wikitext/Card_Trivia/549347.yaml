title: Card Trivia:Segmental Dragon
wikitext: |-
  {{Navigation}}

  * This monster is one of the [[cover card]]s of the ''[[TCG]]'' version of ''[[Structure Deck: Powercode Link]]''.
  * This card is named after "[[wikipedia:Segmentation fault|segmentation fault]]", a fault or failure condition caused by hardware with memory protection. It notifies the operative system that the software has attempted to read or write memory addresses it is not allowed to access, leading the memory protection to terminate the process for safety reasons.
