title: Card Trivia:Dragunity Javelin
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Javelin|Javelin]], a light spear primarily used a ranged weapon.
  ** The weapon [http://castlevania.wikia.com/wiki/Javelin Javelin] is found in some of the [[Konami]]'s ''Castlevania'' Games.
  * This card bears a resemblance to "[[Dragunity Arma Mystletainn]]".
