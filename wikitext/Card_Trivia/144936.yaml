title: Card Trivia:Karakuri Shogun mdl 00 "Burei"
wikitext: |-
  {{Navigation}}

  * This card has an [[Card evolutions|upgraded]] form: "[[Karakuri Steel Shogun mdl 00X "Bureido"]]".
  * This card appears in the artwork of "[[Blustering Winds]]".
  * This is the first "[[Karakuri]]" monster (excluding "[[Karakuri Spider]]") that does not have the effects 'This card must attack if able' and 'When this face-up Attack Position card on the field is selected as an attack target, change it to Defense Position'.
  * This monster's weapon resembles the ''Bansho Fan'', an artifact from ''"Journey to the West"''. It had the power to create massive gusts with each wave of the fan, which could also symbolize "Burei's" ability to change monster positions on the field. The fan is also a common tool used by commanders to direct troops in much the same manner as a pointer.
  * The combined ATK and DEF of both this card and "Karakuri Steel Shogun mdl 00X "Bureido"" is equal 4500.
  * This monster resembles ''[[wikipedia:Takeda Shingen|Takeda Shingen]]'' from the [[wikipedia:Sengoku period|Sengoku period]] in Japan. The fan in the artwork is similar to the one he is commonly depicted wielding in various portraits and video games.
  * The kanji 零 that serves as this monster's headpiece is Japanese for 0.
