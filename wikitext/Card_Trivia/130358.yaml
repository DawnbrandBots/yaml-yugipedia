title: Card Trivia:Amazoness Chain Master
wikitext: |-
  {{Navigation}}

  * This monster has a younger counterpart: "[[Amazoness Trainee]]".
  * This monster's hairdo is similar to [[Mai Valentine]]'s, who used this card in the ''[[Yu-Gi-Oh!]]'' anime and manga.
  * This card, "[[Battlin' Boxer Cheat Commissioner]]", and "[[Exchange]]" are the only cards in the ''[[OCG]]''/''[[TCG]]'' that allow the player to take a card from the opponent's hand
