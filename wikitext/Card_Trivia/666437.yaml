title: Card Trivia:Dream Mirror Oneiromancy
wikitext: |-
  {{Navigation}}

  * This card's artwork appears in the artwork of "[[Dream Mirror Phantasms]]".
  ** The little girl in this card's artwork also appears in the artworks of "[[Dream Mirror Fantasy]]" and "[[Dream Mirror Recap]]".
  * The mirror shining upon the little girl in this card's artwork is held by "[[Neiroy, the Dream Mirror Disciple]]", according to its [https://twitter.com/YuGiOh_TCG/status/1354444051848695811/ reference artwork].
  * This card is named after [[wikipedia:Oneiromancy|oneiromancy]], a form of [[wikipedia:Divination|divination]] that uses dreams to predict the future.
