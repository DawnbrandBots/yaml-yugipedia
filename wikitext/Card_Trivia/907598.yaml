title: Card Trivia:Virtual World Shell - Jaja
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Black Turtle-Snake|Black Turtle-Snake]], one of the [[wikipedia:Four Symbols|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]].
  * This card's name is a [[wikipedia:reduplication|reduplication]] of the Chinese character ''jiǎ'' (甲; "shell").
  * This monster appears in the artwork of "[[Virtual World Gate - Xuanwu]]".
