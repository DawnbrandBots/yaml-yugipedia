title: Card Trivia:Infernal Blasthound
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name, "Hell Gundog" is based on a [[wikipedia:Gun dog|gun dog]], a type of hunting dog bred to work with hunters using loud firearms.
  ** This card's international name is based on a [[wikipedia:Hound|hound dog]], a type of hunting dog used by hunters to track or chase prey.
  * This card shares the same Japanese naming scheme and [[Special Summon]]ing effect with "[[Assault Dog]]", whose Japanese name is "Assault Gundog".
