title: Card Trivia:Cyber Barrier Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cyber Network]]".
  * This monster is named after the Barrier power-up from the [[Konami]] video game series, ''[[wikipedia:Contra (video game)|Contra]]''.
  ** In ''Contra'', the Barrier is known for protecting the player from one hit, which is reflected in this monster's effect to [[negate]] the opponent's next attack.
  * This monster has an offensive counterpart: "[[Cyber Laser Dragon]]".
  ** Both monsters are named after power-ups from the ''Contra'' video game series.
  ** Both monsters can be [[Special Summon]]ed using a specific [[Spell]]/[[Trap Card]] that requires a "[[Cyber Dragon]](s)" to be [[Tribute]]d.
  * This monster has a [[retrained]] ''[[Rush Duel]]'' counterpart: "[[Cyber Stealth Dragon]]".
