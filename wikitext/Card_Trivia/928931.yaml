title: Card Trivia:Water Leviathan @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located on the orb in this monster's forehead.
  * This monster represents the [[WATER]] [[Ignis]], [[Aqua (character)|Aqua]].
  ** This monster's WATER [[Attribute]] and effects reference how the WATER monsters feature effects involving [[add]]ing cards to the [[hand]], [[ATK]]-modification, and battle.
  ** This monster is based on a [[wikipedia:Leviathan|Leviathan]], a mythical sea serpent, reflecting the sea creature theme of Aqua's "[[Marincess]]" [[archetype]].
  ** This monster is based on the cards each respectively used by Aqua and [[Skye Zaizen|Blue Maiden]] and [[Bohman]] during their Duel: "[[Marincess Wonder Heart]]" and "[[Marincess Battle Ocean]]", and "[[Tesseract Hydradrive Monarch]]".
  *** This monster's anime effects reference the ''[[OCG]]''/''[[TCG]]'' effects of "Marincess Battle Ocean", both in terms of affecting [[Link Monster]]s in the [[Graveyard]] and changing a monster's ATK in multiples of 600. This monster can decrease an opponent's monster's ATK by returning Link Monsters to the [[Extra Deck]], while "Marincess Battle Ocean" increases the ATK of "Marincess" [[Link Monster]]s by [[equip]]ping it with any number of "Marincess" Link Monsters from the Graveyard.
  *** This monster's serpentine design and [[Ritual Monster]] type is based on "Tesseract Hydradrive Monarch", a Link Monster (whose card features a blue color scheme similar to Ritual Monster cards) used by Bohman which defeated Blue Maiden and Aqua.
  * This is the last Ritual Monster to be [[Ritual Summon]]ed in ''[[Yu-Gi-Oh! VRAINS]]''.
