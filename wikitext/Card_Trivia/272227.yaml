title: Card Trivia:Sargasso Lighthouse
wikitext: |-
  {{Navigation}}

  * "[[Sargasso the D.D. Battlefield]]" appears in this card's artwork.
  ** This card further alludes to how "Sargasso the D.D. Battlefield" is a reference to the [[wikipedia:Sargasso Sea|Sargasso Sea]], which is known for being the location of many shipwrecks.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this card is [[sent]] to the [[Graveyard]], this lighthouse in "Sargasso" glowed in a similar fashion to a typical lighthouse. This caused the lightning corresponding with the damaging effect of "[[Sargasso the D.D. Battlefield (anime)|Sargasso the D.D. Battlefield]]" to follow the light from the lighthouse into the Graveyard.
