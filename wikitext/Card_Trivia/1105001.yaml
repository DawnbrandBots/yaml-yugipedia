title: Card Trivia:Hieratic Chant
wikitext: |-
  {{Navigation}}

  * This [[Skill Card]]'s name and effect are based on the [[Spell Card]] "[[Ancient Chant]]".
  ** This card references the [[Summon chant#Marik Ishtar|summoning chant]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh! manga]]'' and [[Yu-Gi-Oh! (anime)|anime]], which was required to change "[[The Sun Dragon Ra (character)|The Winged Dragon of Ra]]" from its [[The Winged Dragon of Ra - Sphere Mode|sphere form]] to its [[The Winged Dragon of Ra|full form]].
