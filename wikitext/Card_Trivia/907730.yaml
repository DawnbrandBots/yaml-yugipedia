title: Card Trivia:7 Chance
wikitext: |-
  {{Navigation}}

  * Chibi slot illustrations of "[[Draco the Tiny]]", "[[Dragon Bat]]", "[[Dragorite]]", "[[Multistrike Dragon Dragias]]", and "[[Treasure Dragon]]" appear in this card's artwork.
  ** This card's artwork depicts "Dragias" being the "7" symbol on two of the reels, which reflects its [[Level]] (7) and this card's effect [[support]]ing [[Level 7]] monsters.
  * This card's name and effect are based on a [[wikipedia:Slot machine|slot machine]], a gambling machine that creates a game of chance for customers.
  ** The objective of the slot machine is to match three of the same images on the reels to win a prize, where two "lucky sevens" are considered a winning combination while three "lucky sevens" will reward the customer with a special prize. This reflects this card's effect to [[draw]] three cards and "reward" the player for drawing at least two Level 7 monsters with 1500 [[Life Point]]s.
