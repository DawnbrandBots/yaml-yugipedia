  {{Navigation}}

  * The person on this card is wearing a male school uniform similar to the ones worn at [[Yugi Muto|Yugi's]] school, [[Domino High School]].
  ** The [[Duelist]] is wielding a generic [[Duel Disk#Standard Duel Disks|New Domino City Duel Disk]].
  * The person on this card looks like Vegeta from ''Dragon Ball Z'' in his Super Saiyan form with a [[Duel Disk]].
