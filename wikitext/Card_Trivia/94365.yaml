title: Card Trivia:Statue of the Wicked
wikitext: |-
  {{Navigation}}

  * A "[[Wicked Token]]" appears in this card's artwork.
  * This card and "[[Dark Coffin]]", simultaneously released in ''[[Pharaonic Guardian (Japanese)|Pharaonic Guardian]]'', were the first Trap Cards in the ''[[OCG]]''/''[[TCG]]'' that are incapable of being activated, and instead only activate their effects when destroyed while [[Set]] on the field.
