title: Card Trivia:Self-Mummification
wikitext: |-
  {{Navigation}}

  * This card's artwork possibly portrays the origin of "[[Skull Servant]]".
  ** The stance of the monster in this card's artwork is exactly the same as that of "Skull Servant" in its own artwork.
  * The same "Skull Servant" as in this card's artwork appears in the artwork of "[[Celestial Strings]]".
  * This card refers to [[wikipedia:Sokushinbutsu|sokushinbutsu]], a practice performed by some Buddhist monks in the past.
