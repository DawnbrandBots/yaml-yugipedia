title: Card Trivia:Discord Counter
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Colossal Fighter]]", "[[Silent Swordsman LV5]]", and "[[Tune Warrior]]" appear in this card's artwork.
  * This card's name is based on the musical term "[[wikipedia:Consonance and dissonance|discord]]", which describes a chord or a series of tones that are "unstable", or out of synchronization.
  ** This is reflected in this card's effect to "counter" an opponent's [[Synchro Monster]] by returning it to the [[Extra Deck]] and make the synchronization "unstable" by [[Special Summon]]ing the monsters used to [[Synchro Summon]] it and prevent the opponent from Summoning a monster on their next turn.
  * This card is a Synchro-based [[Normal Trap Card]] [[counterpart]] of "[[De-Fusion]]".
  * This card's Spanish name was mistranslated from English, since "Contador" refers to something or someone that counts.
