title: Card Trivia:Harmonic Oscillation
wikitext: |-
  {{Navigation}}

  * The pendulums and the floor pattern that appear in this card's artwork also appear in the artwork of "[[Pendulum Scale (card)|Pendulum Scale]]".
  * This card is named after [[wikipedia:Simple harmonic motion|harmonic oscillation]].
  ** This card's name is a reference to its effect of supporting the [[Pendulum Summon]], as a pendulum is a type of [[wikipedia:Harmonic oscillator|harmonic oscillator]].
