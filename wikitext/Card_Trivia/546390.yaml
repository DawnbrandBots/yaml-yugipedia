title: Card Trivia:Iron Dragon Tiamaton
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Iron Thunder]]".
  * This monster's name is based on [[wikipedia:Tiamat|Tiamat]], the Babylonian primordial goddess of the salt sea, who turned into a dragon to avenge for the death of her husband Abzu.
  * This monster is a counterpart to "[[Chaos Dragon Levianeer]]", "[[Omni Dragon Brotaur]]", "[[Mana Dragon Zirnitron]]" and "[[Fantastical Dragon Phantazmay]]", all [[DARK]] [[Dragon]]s based on mythic dragons.
