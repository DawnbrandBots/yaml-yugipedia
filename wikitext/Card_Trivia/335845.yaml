title: Card Trivia:Elder Entity N'tss
wikitext: |-
  {{Navigation}}

  * This monster's statue appears in the artwork of "[[Dreamland]]".
  * This monster is based on [http://arcana.wikidot.com/n-tse-kaambl N'tse Kaambl], an [[wikipedia:Cthulhu Mythos deities|Elder God]] from [[wikipedia:H. P. Lovecraft|H. P. Lovecraft]]'s ''[[wikipedia:Cthulhu Mythos|Cthulhu Mythos]]''. N'tse Kaambl is thought to have invented the Elder Sign as a mean of protection against the [[wikipedia:Cthulhu Mythos deities|Great Old Ones]] and their minions.
  ** "N'tss" in this card's name is pronounced as "nə-TISS".
  * This card is tied with "[[Giant Kozaky]]" for the highest [[original ATK]] of all [[Level 4]] monsters.
