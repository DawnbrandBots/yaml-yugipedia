title: Card Trivia:Koa'ki Meiru Valafar
wikitext: |-
  {{Navigation}}

  * This card has at least 3 [[Koa'ki Meiru]] markings, possibly up to 5 based on their positioning (i.e. knees and elbows).
  * This card and "[[Koa'ki Meiru Maximus]]" have the highest [[ATK]] of all "Koa'ki Meiru" monsters.
  ** They are the only "Koa'ki Meiru" monsters whose maintenance costs don't include revealing a card.
  * [[wikipedia:Valefar|Valefar]] is the name of a demon lord who tempts mortals to commit acts of thievery, only to betray them in the end.
  * This card's artwork bears a striking resemblance to the Felguard of the Warcraft universe.
