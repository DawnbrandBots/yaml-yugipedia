title: Card Trivia:Hard-sellin' Goblin
wikitext: |-
  {{Navigation}}

  * This card has a counterpart called "[[Hard-sellin' Zombie]]", which is the goblin depicted in this card as a zombie, and selling some odd creatures.  Both of these cards are the conceptual opposites of "[[Robbin' Goblin]]" and "[[Robbin' Zombie]]".  Instead of "robbing" the opponent's hand or deck, these cards "sell" their own cards back to them by returning them to their hand or deck.
  * The character featured in this card's artwork is the same character featured in "[[Robbin' Goblin]]".
