title: Card Trivia:Deskbot 004
wikitext: |-
  {{Navigation}}

  * Following the trend that all "[[Deskbot]]" monsters wield desktop items as weapons, this monster consists of items used for coloring, such as multi-tip pens/colored pencils as a sword and gun, brushes in a container on the back, tubes of paint for upper legs and paint rollers for feet, watercolor trays for chest and hip armor, and its visor resembling a painting palette.
  * The number "004" can be seen on the upper-left part of the monster's helmet, corresponding to its [[Level]] and order of release in the "Deskbot" archetype.
  * This monster appears in the artwork of "[[Link Hole]]" and "[[Deskbot Jet]]", seen on the lower platform.
