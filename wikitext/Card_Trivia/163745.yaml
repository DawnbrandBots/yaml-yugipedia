title: Card Trivia:Evigishki Gustkraken
wikitext: |-
  {{Navigation}}

  * According to the ''[[Duel Terminal Master Guide card storylines|Duel Terminal Master Guide]]'', this monster was created from the soulless body of "[[Gishki Emilia]]".
  * The name of this monster is a portmanteau of "gāst" (an Old English word for "ghost") and "[[wikipedia:Kraken|kraken]]" (a legendary [[wikipedia:Sea monster|sea monster]] commonly depicted as a giant squid). This naming scheme parallels with the naming scheme of "[[Evigishki Merrowgeist]]".
  ** The spelling of the English name of this card, "Evigishki '''Gust'''kraken", implies a possible connection to the "[[Gusto]]" tribe, similar to "Evigishki Merrowgeist".
