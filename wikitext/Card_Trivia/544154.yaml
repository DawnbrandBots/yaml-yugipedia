title: Card Trivia:Gladiator Beast's Assault Fort
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Two "[[Gladiator Beast Fort]]s" appears in this card's artwork.
  * This is the first card to list its own lore and the lore of a separate card in one.
  ** Because of that, this card has the longest text of any card in the series.
