title: Card Trivia:Morale Boost
wikitext: |-
  {{Navigation}}

  * "[[Warrior Dai Grepher]]" and "[[Wicked-Breaking Flamberge - Baou]]" appear in this card's artwork.
  ** This card's artwork depicts "Dai Grepher" wielding "Baou"; the sword's darkness corrupts and ultimately transforms him into "[[Dark Lucius LV4]]".
  * The ''[[Dark Crisis]]'' print of this card used the phrase "inflict 1000 [[Effect damage|damage]]" before the wording was rendered official in ''[[Power of the Duelist]]''.
