title: Card Trivia:Masked HERO Koga
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[HERO Strike Structure Deck]]''.
  * This monster's mask appears in the artwork of "[[Mask Change II]]".
  * This monster is based on the archetypal white Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[LIGHT]], which is represented by a bright-colored circle.
  * This monster along with "[[Masked HERO Goka]]" are the only "[[HERO]]" monsters to have their Japanese names contain [[wikipedia:Kanji|kanji]].
