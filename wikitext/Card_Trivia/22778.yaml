title: Card Trivia:Picador Fiend
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the [[wikipedia:Bullfighter|picador]], a horseman who enters the arena first to stab the bull in the back of its neck, which weakens the bull in preparation for the [[wikipedia:Bullfighter|matador]] and the [[wikipedia:Banderillero|banderilleros]].
  ** This monster's effect to attack the opponent directly while the player controls "[[Dark Arena]]" reflects this, as it can attack the opponent directly which is seen as a "first blood" maneuver in bullfighting, which mainly takes place in an arena. Also, in the ''[[Yu-Gi-Oh! GX]]'' anime, this monster is the first bullfighting-themed monster used by [[Titan]] in his [[Duel]] against [[Alexis Rhodes]].

  * The appearance of "[[Evil HERO Infernal Rider]]" is based on this monster's.
