title: Card Trivia:Gravekeeper's Stele
wikitext: |-
  {{Navigation}}

  * "[[Gravekeeper's Descendant]]" appears in this card's artwork.
  * This card is probably a reference to the steles that were erected during pharaonic Egypt.  These steles were covered in hieroglyphs and were meant to commemorate an important act (such as battle, dedication to a temple) by a pharaoh.
  ** This stele often appears in the original Yu-Gi-Oh! Duel Monsters Season 2, where Priest Seto first sees it and later during Season 5 when Yugi and his friends travel through the past where Atem originally lived.
