title: Card Trivia:Sonic Chick
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Scramble Egg]]", "[[Synchro Fellowship]]", and the second artwork of "[[One for One]]".
  * This monster's Japanese name is based on a "[[wikipedia:Geococcyx|Roadrunner]]", a species of bird known for its impressive land speed, which was popularized by the ''[[wikipedia:Looney Tunes|Looney Tunes]]'' character, [[wikipedia:Wile E. Coyote and Road Runner|Road Runner]].
  ** This monster's French name, "Bip Bip", is the French name of the ''Looney Tunes'' character, which is based on how the character often uses the "beep beep" soundtrack. 
  * This monster has a [[retrained]] counterpart: "[[Crossroad Sonic Chick]]".
  * This monster appears on a special ''Yu-Gi-Oh!'' 10th Anniversary coin, released as a Japanese promotion.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this monster appears running through the highway if the player interacts with the fountain in the Gate screen.
