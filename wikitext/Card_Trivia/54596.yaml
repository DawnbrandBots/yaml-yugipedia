title: Card Trivia:Worm Victory
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on its design, as it is depicted giving the [[wikipedia:V sign|V sign]] hand gesture with all six of its hands, which is commonly used to symbolize victory.
  * This monster is tied with "[[Fog King]]" and "[[Regenerating Rose]]" for the lowest [[original ATK]] (0) of all [[Level 7]] monsters.
  * This card's Spanish print features an error, as it refers to the name of the "[[Worm]]" [[archetype]] name as "''Gusano/a''" instead of "''Gusano''".
