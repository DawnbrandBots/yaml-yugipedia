title: Card Trivia:Gouki Headbatt
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gouki Grit]]" and "[[Gouki Unity]]".
  * This monster is named after the [[wikipedia:Headbutt|headbutt]], a technique in [[wikipedia:Professional wrestling|professional wrestling]] which involves striking the opponent with their head.
  ** This monster's Japanese name (ヘッドバット, ''Heddobatto'') is a wordplay on "headbutt" and "bat" (バット, ''batto''), which this monster's design is based on.
