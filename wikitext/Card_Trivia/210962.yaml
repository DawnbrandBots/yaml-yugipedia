title: Card Trivia:Wind-Up Shark
wikitext: |-
  {{Navigation}}

  * This is the first [[Main Deck]] "[[Wind-Up]]" monster whose effect is not limited to being activated once while it is [[face-up]].
  ** This card's [[Level]]-changing effect may be based on the wind-up key depicted on this monster's torso, which can be turned either clockwise or counter-clockwise.
  * This card's Italian print lacks the "or [[Special Summon]]ed" portion in its effect text.
