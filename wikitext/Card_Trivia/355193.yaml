title: Card Trivia:Evening Twilight Knight
wikitext: |-
  {{Navigation}}

  * This monster appears to be a [[wikipedia:Chibi (term)|chibi]] version of "[[Black Luster Soldier - Envoy of the Evening Twilight]]".
  ** The bulleted effects that this monster grants the [[Ritual Summon]]ed "[[Black Luster Soldier (archetype)|Black Luster Soldier]]" monster are based on those of "Envoy of the Evening Twilight".
  * This monster has a [[LIGHT]] [[counterpart]] based on "[[Black Luster Soldier - Envoy of the Beginning]]": "[[Beginning Knight]]".
