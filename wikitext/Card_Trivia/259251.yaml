title: Card Trivia:Indestructible Airship Hindenkraft
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster is based on the ''[[wikipedia:LZ 129 Hindenburg|Hindenburg]]'', a passenger-carrying airship that was [[wikipedia:Hindenburg disaster|destroyed in an accident]] while attempting to dock at New Jersey on May 6, 1937.
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster was paired with "[[Unsinkable Titanica]]", a monster based on the ''[[wikipedia:RMS Titanic|Titanic]]'' which [[wikipedia:Sinking of the Titanic|sank on its maiden voyage]] after striking an iceberg.
  *** Both monsters' adjective titles reflects the irony of the real-life passenger-carrying transporters that were destroyed in an infamous disaster.
  * This monster's video game [[Special Summon]]ing effect is based on its first appearance in {{episode|ZEXAL|092|ref}}, when it was Summoned by [[Tribute|Tributing]] two "[[Balloon Token]]s".
  ** Also, this monster's video game effect to change the [[DEF]] of a [[Defense Position]] monster to 0 is based on the effect of "[[Iceberg Ocean]]", which was used alongside this monster in the same episode.
