title: Card Trivia:Twin Photon Lizard
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Photon Shock]]".
  * This card is the first [[Fusion Monster]] from ''[[Yu-Gi-Oh! ZEXAL]]'' to be released in the ''[[OCG]]''/''[[TCG]]''.
  ** This card is also the first and only "[[Photon]]" Fusion Monster.
  * This card's physical appearance contains the three [[wikipedia:Primary color|Primary colors]]: its left side is red, its right side is yellow, and its tail is blue.
  * Both physically and thematically, this card is similar to "[[Twin-Headed Thunder Dragon]]" and "[[Cyber Twin Dragon]]".
