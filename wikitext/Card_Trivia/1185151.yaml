title: Card Trivia:Witchcrafter Terracottan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Witchcrafter Pupils]]".
  * This monster is a [[retrained]] counterpart of "[[Witchcrafter Potterie]]".
  ** This monster's name is derived from "[[wikipedia:Terracotta|terracotta]]", a type of fired clay baked at low heat used in pottery, decoration, and architectural elements.
