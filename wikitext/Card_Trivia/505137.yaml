title: Card Trivia:Last Day of Witch
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]'' artwork and effect are based on real world [[wikipedia:Witch hunt|witch hunts]], where individuals even suspected of sorcery and witchcraft were sent to trial and often (though not always) sentenced to execution, most notably by immolation.
  * This card has several [[counterpart]]s that destroy a specific [[Type]] of [[monster]]:
  ** [[Insect]]: "[[Eradicating Aerosol]]"
  ** [[Fiend]]: "[[Exile of the Wicked]]"
  ** [[Fish]]: "[[Eternal Drought]]"
  ** [[Machine]]: "[[Acid Rain]]"
  ** [[Rock]]: "[[Breath of Light]]"
  ** [[Warrior]]: "[[Warrior Elimination]]"
