title: Card Trivia:Rice Terrace Ripple
wikitext: |-
  {{Navigation}}

  * This monster has a counterpart: "[[Rice Terrace Secure]]".
  ** Both monsters are named after a [[wikipedia:Terrace (earthworks)|terrace]], a sloped plane cut into flat surfaces, designed for effective farming, including the farming of rice, which appear in the background of both cards' artworks.
