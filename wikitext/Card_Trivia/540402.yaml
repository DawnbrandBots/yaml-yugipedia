title: Card Trivia:Swan Maiden
wikitext: |-
  {{Navigation|mode=nonGame}}

  * A '''[[wikipedia:Swan maiden|Swan Maiden]]''' is a mythical creature capable of shapeshifting from human form to swan form.
  * In the poem [[wikipedia:Völundarkviða|Völundarkviða]], Völundr and his brothers marry [[valkyrie]]s, who dress in swan skins.
