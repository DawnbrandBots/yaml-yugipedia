title: Card Trivia:Ally of Justice Clausolas
wikitext: |-
  {{Navigation}}

  * This card's name is based on ''[[wikipedia:Claíomh Solais|Claíomh Solais]]'', the legendary "Sword of Light" in [[wikipedia:Celtic mythology|Celtic mythology]]; its English name ("Clausolas") is derived from the Japanese pronunciation of "Claiomh Solais" (''Kurau Sorasu'').
  * This card is the only "[[Ally of Justice]]" [[Normal Monster]].
  * This card has a "[[Mist Valley]]" [[counterpart]], as hinted by its [[flavor text]]: "[[Mist Bird Clausolas]]".
  ** This card's [[ATK]] and [[DEF]] are the opposite of those of "[[Nekroz of Clausolas]]", another counterpart of "Mist Bird Clausolas".
