title: Card Trivia:Dora of Fate
wikitext: |-
  {{Navigation}}

  * This card's artwork appears to depict a "dead wall" in the game of [[wikipedia:Japanese Mahjong|Japanese mahjong]], with a single "''dora'' indicator" tile flipped, although the position of the indicator is different from usual.
  ** The "''dora''" is a special tile worth extra points in Japanese mahjong, and is the tile that is one higher than the "''dora'' indicator". For example, if the indicator is "three of circles", then the ''dora'' is "four of circles".
  *** This is reflected in this card's effect, which inflicts damage if the opponent's monster's [[Level]] is the ''dora'' of the player's [[Normal Summon]]ed monster.
  * "[[Uradora of Fate]]" is a parody of this card's name and artwork.
