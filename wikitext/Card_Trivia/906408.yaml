title: Card Trivia:Shadow's Light
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this card could only [[Special Summon]] from the [[Main Deck]], and was used to Special Summon "[[Light End Dragon (manga)|Light End Dragon]]" from [[Chazz Princeton (manga)|Chazz Princeton]]'s Main Deck by [[Tribute|Tributing]] "[[Dark End Dragon (manga)|Dark End Dragon]]" (which are both Main Deck monsters in the manga). In the ''[[OCG]]''/''[[TCG]]'', this card can Special Summon from either the Main Deck or [[Extra Deck]], since "Dark End Dragon" and "Light End Dragon" are [[Synchro Monster]]s in the ''OCG''/''TCG'', and so they cannot exist in the Main Deck.
