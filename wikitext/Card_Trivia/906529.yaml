  * This monster appears in the artwork of "[[Stained Glass of Light & Dark]]".
  * This monster's name is based on the ''Liber Loagaeth'' by [[wikipedia:John Dee|John Dee]] and [[wikipedia:Edward Kelley|Edward Kelley]], a book purportedly containing the [[wikipedia:Enochian|Enochian]] alphabet.
