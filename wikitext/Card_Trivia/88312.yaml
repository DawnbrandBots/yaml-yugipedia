title: Card Trivia:Gozuki
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Ox-Head and Horse-Face|Ox-Head]], the ox-headed humanoid guardian of the [[wikipedia:Diyu|underworld]] in [[wikipedia:Chinese mythology|Chinese mythology]], who is also known as "Gozu" in [[wikipedia:Japanese mythology|Japanese mythology]].
  ** This monster shares its [[Level]] (4), [[Type]] ([[Zombie]]) and [[original ATK and DEF]] (1700/800) with "[[Mezuki]]", a monster based on Horse-Face, who is depicted alongside Ox-Head as guardians of the underworld in Chinese mythology.
