title: Card Trivia:Careless Twin Magic
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Straynge Cat]]" appears in this card's artwork.
  * The Japanese pronunciation of "Careless" (やさぐれ ''Yasagure'') is a slang term for "to be apathetic" or "to be careless towards something", in a sulky or peevish way.
  ** This is reflected in this card's artwork, which depicts "Straynge Cat" and another cat monster with a sulky expression.
