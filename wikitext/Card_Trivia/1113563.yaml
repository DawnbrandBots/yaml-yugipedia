title: Card Trivia:Anubis the Last Judge
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is based on [[wikipedia:Anubis|Anubis]], the [[wikipedia:Egyptian god|Egyptian god]] of death and embalming who is depicted with the head of a jackal. 
  ** This monster's title as "Judge" is a reference to how in [[wikipedia:Egyptian mythology|Egyptian mythology]], Anubis attended the [[Weighing of the Heart]], a ritual that determined whether a dead person's soul may pass into the afterlife or be fed to the soul-eating deity, [[Ammit]].
  * This monster's Japanese name is similar to the English name of "[[Judgment of Anubis]]".
