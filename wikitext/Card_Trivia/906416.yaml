  * The magic circles that appear in this card's artwork are similar to those that appear in the artwork of "[[Risebell the Star Adjuster]]" and "[[Risebell the Star Psycher]]".
  * This card has the same [[Attribute]] ([[WIND]]), [[Type]] ([[Psychic]]), [[Level]] (4), [[ATK]] (1500), and [[DEF]] (1500) as "Risebell the Star Psycher".
