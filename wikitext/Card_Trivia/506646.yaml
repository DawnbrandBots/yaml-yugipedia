title: Card Trivia:Gaap the Divine Soldier
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Gaap|Gaap]], a demon described as a prince in human form who incites love, and is one of the four cardinal spirits: the spirit of the south according to ''[[wikipedia:The Lesser Key of Solomon|The Lesser Key of Solomon]]'', and the spirit of the west according to ''[[wikipedia:Pseudomonarchia Daemonum|Pseudomonarchia Daemonum]]''.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[reveal]] a number of [[Fiend]] monsters in the player's [[hand]] and gain 300 [[ATK]] for each revealed monster is an alteration of its effect in the ''[[Yu-Gi-Oh! R]]'' manga, which allowed it to gain 300 ATK for each [[Divine-Beast]] monster the player reveals in their hand.
  ** This monster's manga effect is designed to work with the [[Wicked God]]s, which were Divine-Beast monsters in the manga. This monster's effect was changed to reflect their release as Fiend monsters in the ''OCG''/''TCG''.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|R|039|ref}}, specifically from the panel showing [[Gaap the Divine Soldier (manga)|this monster]] being Summoned.
