title: Card Trivia:Criosphinx
wikitext: |-
  {{Navigation}}

  * This monster is based on a criosphinx, a creature in [[wikipedia:Egyptian mythology|Egyptian mythology]] who is depicted with the head of a ram and the body of a lion.
  * This monster has an offensive [[counterpart]]: "[[Hieracosphinx]]".
  ** Both share the same [[Attribute]] ([[EARTH]]), [[Level]] (6), and [[Type]] ([[Rock]]), and have an inverted [[original ATK and DEF]] (1200/2400).
