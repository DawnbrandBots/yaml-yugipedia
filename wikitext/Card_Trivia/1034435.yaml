title: Card Trivia:Refrain the Melodious Songstress
wikitext: |-
  {{Navigation}}

  * This monster's name is based on a [[wikipedia:Refrain|refrain]], the old French term for a group of lyrics that are repeated in a song, similar to a chorus.
  ** In music, a refrain or a chorus is sometimes connected by a couplet, which reflects this monster's relationship with its fellow "[[Melodious]]" [[Pendulum Monster]], "[[Couplet the Melodious Songstress]]".
  * This monster is wearing a double-banded bracelet, referencing [[Zuzu's bracelet|the bracelet]] worn by [[Zuzu Boyle]], who used the "[[Melodious]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
