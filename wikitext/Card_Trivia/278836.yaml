title: Card Trivia:Bujingi Turtle
wikitext: |-
  {{Navigation}}

  * This monster, whose Japanese name is Bujingi Hetsuka appears to be based on Hetsukagami (Mirror of the Shore), which was possibly a mirror that brought glory. This is reflected in the design of the card, which features a turtle-like animal, which could live by the shore, with a mirror on its back.
  * This monster appears in its armament form in "[[Bujincarnation]]" and "[[Bujintei Susanowo]]".
