title: Card Trivia:Kumootoko
wikitext: |-
  {{Navigation}}

  * This monster has a counterpart: "[[Hunter Spider]]".
  * This monster appears in the artwork of "[[Giant Ballpark]]".
  * The Japanese name of this card is "Spiderman", which may be the reason why this card wasn't translated into English for the American release of this card, due to potential copyright issues.
