title: Card Trivia:Fossil Dig
wikitext: |-
  {{Navigation}}

  * "[[Aitsu]]", "[[Doitsu]]", "[[Koitsu]]", and "[[Soitsu]]", united as "[[A-Team: Trap Disposal Unit]]", appear in this card's artwork.
  * The events in this card's artwork continue in the artwork of "[[Fossil Excavation]]".
