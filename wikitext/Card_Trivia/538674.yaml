title: Card Trivia:Fox Fire
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Hiita the Fire Channeler]]", "[[Hiita the Fire Charmer]]", "[[Home of the Charmers]]", "[[Spiritual Art Familiars]]", and "[[Volcanic Curse]]".
  ** Fittingly, this monster serves as the familiar of "Hiita the Fire Charmer" and is the only familiar related to the "[[Charmer]]" [[archetype]] to be an [[Effect Monster]].
  * This monster is based on the ''[[wikipedia:Kitsune|kitsune]]'', a fox ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore capable of generating fire.
  * This monster has an advanced form: "[[Inari Fire]]".
  * This monster has a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Familiar of the Fire Spiritualist]]".
