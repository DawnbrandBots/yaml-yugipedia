title: Card Trivia:Chartres the Skysavior Shining Light
wikitext: |-
  {{Navigation}}

  * This monster's [[Attribute]] ([[LIGHT]]), [[Level]] (9), [[Type]] ([[Celestial Warrior]]), and effect preventing either player from [[Special Summon]]ing monsters are similar to those of "[[Yamiterasu the Divine Ruler]]".
  ** This monster is a spiritual [[Skysavior]] [[counterpart]] of "Yamiterasu the Divine Ruler", referencing the fact that both the Skysavior and the [[Three Rulers]] [[series]] are compatible in ''[[Yu-Gi-Oh! Rush Duel]]'', with both series consisting of [[Warrior]] and [[Fairy]] Type monsters and are focused on [[Fusion Summon]]ing Celestial Warrior Type monsters.
