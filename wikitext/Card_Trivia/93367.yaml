title: Card Trivia:Wing Eagle
wikitext: |-
  {{Navigation}}

  * There is some irony to the card description. In the [[Falsebound Kingdom]], it is possible for Wing Eagle to miss its target on rare occasions.
  * In the Falsebound Kingdom, this card fuses with [[Mavelus]] to become [[Crimson Sunbird]].
  * This is the only card in [[Booster R3]] to remain [[OCG-only]].
