title: Card Trivia:Shiranui Token
wikitext: |-
  {{Navigation}}

  * In ''[[Yu-Gi-Oh! Duel Links]]'', this [[Token Monster|Token]] has the same monster sprite as "[[Shiranui Spectralsword Shade (Duel Links)|Shiranui Spectralsword Shade]]", except slightly smaller and without the sword depicted.
  ** In ''[[Yu-Gi-Oh! Master Duel]]'', this Token's artwork is the same as that of "[[Shiranui Swordsaga]]". When it was first added to the game, it had the artwork of "[[Shiranui Squiresaga]]" instead.
