title: Card Trivia:Matching Outfits
wikitext: |-
  {{Navigation}}

  * The shirts worn by the goblins in this card's artwork have the artwork of "[[Scrap Kong]]" printed on them.
  * The event depicted in this card's artwork takes place after the events of "[[Gift Exchange]]".
  ** The goblin child, having received the unwanted "Scrap Kong" shirt, begrudgingly wears it in public. However, he runs into another child and his father; the father is wearing the same "Scrap Kong" shirt and notices, embarrassing the first goblin.
