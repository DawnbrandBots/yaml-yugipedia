title: Card Trivia:Fusion (Rush Duel)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Extra Transcend Enhancement Pack]]''.
  * "[[Lua the Skysavior Angel]]" and "[[Soleil the Skysavior Angel]]" appear in this card's third artwork.
  * This card is the [[field]]-only [[Fusion Material]]-exclusive ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart of "[[Polymerization]]".
  ** This card's effect requirement references the way "Polymerization" was used in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], where monsters needed to be on the field ([[face-up]]) before they could be merged.
  * This is the first card to be introduced to ''Yu-Gi-Oh! Rush Duel'' that can [[Performs a Fusion Summon|perform a Fusion Summon]].
  ** The second card that can perform a Fusion Summon in ''Rush Duel'', "[[Power Bond (Rush Duel)|Power Bond]]" was released over a year later.
