title: Card Trivia:Performapal Celestial Magician
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Magician]]" form of "[[Supreme King Z-ARC]]".
  ** This monster resembles [[Z-ARC]], who used "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  *** This monster's blades are based on the large, curved, golden sections of armor of "Supreme King Z-ARC".
  *** This monster's wings are based on the wings Z-ARC had when he possessed [[Yuya Sakaki]] in the ''Yu-Gi-Oh! ARC-V'' anime.
  ** This card's name, "Celestial Magician" references one of the alternate names of the [[Four Dimensional Dragons]] in the original Japanese version of the ''Yu-Gi-Oh! ARC-V'' anime, "Four Heavenly Dragons".
  ** This card's [[Pendulum Effect]] to [[Special Summon]] one [[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], or [[Xyz Monster]] from the [[Graveyard]] references Z-ARC's desire to unite with "[[Starving Venom Fusion Dragon]]", "[[Clear Wing Synchro Dragon]]", and "[[Dark Rebellion Xyz Dragon]]" in the ''Yu-GI-Oh! ARC-V'' anime and [[Astrograph Sorcerer (anime)|Astrograph Sorcerer's]] anime effect.
  * This card's [[monster effect]]s are based on the effects of each of the Four Dimensional Dragons:
  ** "Starving Venom Fusion Dragon" can [[destroy]] all of the opponent's Special Summoned monsters if it is destroyed and was [[Fusion Summon]]ed, allowing the player to possibly attack the opponent directly.
  ** "Clear Wing Synchro Dragon" can [[negate]] the effects of another [[Level]] 5 or higher monster, or a monster effect that [[target]]s 1 Level 5 or higher monster on the [[field]] (and no other cards), and destroy those cards.
  ** "Dark Rebellion Xyz Dragon" can [[detach]] an [[Xyz Material]] to target a [[face-up]] monster the opponent [[control]]s, make its ATK become half its current ATK, and gain that lost ATK.
  ** "[[Odd-Eyes Pendulum Dragon]]" can add a Pendulum Monster with 1500 or less ATK from the player's Deck to their hand during the End Phase ([[Pendulum Effect]]).
