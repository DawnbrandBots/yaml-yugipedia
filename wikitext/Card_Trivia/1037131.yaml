title: Card Trivia:Intel from the "Cosmos"
wikitext: |-
  {{Navigation}}

  * This card's name and effect are based on [[Espa Roba|Espa Roba's]] fake psychic powers trick in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], where he claimed to be able to see the cards in his opponent's [[hand]] by channeling the cosmos. In reality, he was being told what they were via a hidden earpiece, by his younger brothers, who were spying on his opponent's hand.
