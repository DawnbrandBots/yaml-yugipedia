title: Card Trivia:Garakarasu
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is a combination of the Japanese words for "gala" (ガラ, ''gara'') and "crow" (カラス, ''karasu'').
  * In {{chapter|ZEXAL|011|ref}}, when this monster was [[Special Summon]]ed, its effect [[destroy]]ed the [[Field Spell Card]] "[[Corn Parade]]", which is depicted as a cornfield. This references how crows are known destroying cornfields in the process of eating corn.
