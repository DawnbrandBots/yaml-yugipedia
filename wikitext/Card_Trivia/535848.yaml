title: Card Trivia:Arcana Force EX - The Light Ruler
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Speed Duel GX: Midterm Destruction]]''.
  * This monster appears in the artwork of "[[Decisive Power of Absolute Destiny]]".
  * This monster is the [[signature card]] of [[Sartorius]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This monster and "[[Arcana Force EX - The Dark Ruler]]" are the only "[[Arcana Force]]" monsters that are not based on tarot cards.
  ** These monsters' names feature the English letters "EX", which stand for "Extra", referencing how both monsters are "extra" additions to the "Arcana Force" archetype.
  ** These are also the only "Arcana Force" monsters that have a positive effect regardless of the result of the [[coin toss]].
  ** Despite not being based on a real tarot card, this monster represents how this its owner, Sartorius is fully consumed by the [[The Light of Destruction|Light of Destruction]] in the ''Yu-Gi-Oh! GX'' anime.
  *** This fact is further referenced by the background of this card's artwork, which features a [[wikipedia:white hole|white hole]], which released The Light of Destruction.
  * This is the first "Arcana Force" monster to feature a [[Nomi]] effect.
  * This is the first "Arcana Force" monster to be released in the ''[[OCG]]'', but the last to be released in the ''[[TCG]]''.
  ** These traits are shared with "[[Meklord Emperor Wisel]]", the first "[[Meklord Emperor]]" monster released in the ''OCG'' and the last to be released for the ''TCG''.
  * This monster, "Arcana Force EX - The Dark Ruler", "[[Odin, Father of the Aesir]]", "[[Sandaion, the Timelord]]", and "[[Sephylon, the Ultimate Timelord]]", have the highest [[original DEF]] (4000) of all Fairy monsters in the ''OCG''/''TCG''.''.
  * In the twelfth issue of [[Shonen Jump Vol. 6, Issue 12 promotional card|''Shonen Jump'' Vol. 6]], this monster's English name contains a typo, as the "X" in "EX" and the "T" in "The" were printed in lowercase font.
