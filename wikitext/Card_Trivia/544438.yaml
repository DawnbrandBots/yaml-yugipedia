title: Card Trivia:Trickstar Perennial
wikitext: |-
  {{Navigation}}

  * "[[Trickstar Black Catbat]]" and "[[Trickstar Holly Angel]]" appears in this card's artwork.
  * This card's name is based on a [[wikipedia:Perennial plant|perennial plant]], a type of plant that lives for more than two years, which reflects this card's effect of preventing a "[[Trickstar]]" [[Link Monster]] from being destroyed by battle so it would remain on the [[field]] for at least two turns.
