title: Card Trivia:Depth Biter
wikitext: |-
  {{Navigation|mode=NonGame}}

  * This monster is based on the ''[[wikipedia:Black swallower|Chiasmodon niger]]'', a species of deep sea fish also known as the "black swallower" known for their blackish-brown color scheme, their serpentine bodies, their wide jaws, and their distensible stomach.
