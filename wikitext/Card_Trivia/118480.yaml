title: Card Trivia:Gravekeeper's Descendant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gravekeeper's Stele]]".
  * This card is one of several "[[Gravekeeper's]] monsters released in the ''[[Yu-Gi-Oh! 5D's]]'' era whose designs are based off of the [[Ishtar]] family. In this monster's case, it bears resemblance to [[Marik Ishtar]].
  ** This card's name and effect reflects this, as Marik Ishtar is a descendant of the [[Tomb Keeper]]s who sacrificed his clan's existence for the sake of obtaining destructive power.
  ** Coincidentally, this card was reprinted in the ''[[TCG]]'' release of ''[[Structure Deck: Marik (TCG)|Structure Deck: Marik]]''.
  * This monster appears be wielding the same scepter as "[[Gravekeeper's Chief]]", "[[Gravekeeper's Commandant]]", "[[Gravekeeper's Priestess]]", "[[Gravekeeper's Visionary]]" and "[[Gravekeeper's Oracle]]".
  * This monster is the younger form of "[[Gravekeeper's Oracle]]".
  * This card has the opposite [[ATK]] and [[DEF]] of "[[Gravekeeper's Recruiter]]".
