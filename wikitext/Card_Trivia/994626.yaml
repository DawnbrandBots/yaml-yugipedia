title: Card Trivia:Master Tao the Chanter
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[Illusion]] counterpart of "[[Tao the Chanter]]".
  ** This monster's Illusion [[Type]] references how in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' and ''[[Yu-Gi-Oh! True Duel Monsters]]'' video game series, "[[Tao the Chanter (DM2)|Tao the Chanter]]" belonged to the [[Dreams]] [[Alignment]], which is known in the Japanese version as "Illusion Magic" (げんそうま, Gensōma) or "Illusion" (げん{{Ruby|想|そう}}, ''Gensō'').
  * This is the first [[EARTH]] Illusion monster.
