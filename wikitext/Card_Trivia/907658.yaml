title: Card Trivia:Dogmatikamacabre
wikitext: |-
  {{Navigation}}

  * "[[Dramaturge of Despia]]", "[[The Iris Swordsoul]]", "[[The Golden Swordsoul]]", and "[[Despia, Theater of the Branded]]" appear in this card's artwork.
  ** The events in this card's artwork are continued in the artwork of "[[Branded Retribution]]", which depicts the battle between "The Iris Swordsoul" and "Dramaturge of Despia".
  * The kanji 「凶導の葬列」 in this card's Japanese name can be translated as "Heretical Funeral", and is related to the kanji in the Japanese name of "[[White Relic of Dogmatika]]" (凶導の白聖骸, "Heretical White Holy Corpse").
  * This card is a [[counterpart]] of "[[Dogmatikalamity]]".
  ** Both are "[[Dogmatika]]" [[Ritual Spell Card]]s whose name is listed on a "[[Dogmatika]]" [[Ritual Monster]]: "[[White Relic of Dogmatika]]" for this card and "[[White Knight of Dogmatika]]" for "Dogmatikalamity".
  ** Both have the kanji 「{{Ruby|凶|きょう}}{{Ruby|導|どう}}」 (''Kyōdō'', "Heretical") in their Japanese names, instead of kanji 「{{Ruby|教|きょう}}{{Ruby|導|どう}}」 (''Kyōdō'', "Dogmatic") in the Japanese name of the other "Dogmatika" monsters.
  *** This likely reflects the true wicked nature of the "Dogmatika" Church, who turned out to be a facade for the "[[Despia]]" monster.
  ** Their artworks depict the same monster: "[[Dogmatika Maximus]]" for "Dogmatikalamity" and his corrupted form "[[Dramaturge of Despia]]" for this card.
