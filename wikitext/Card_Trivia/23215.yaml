title: Card Trivia:Crystal Beast Cobalt Eagle
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Jesse Anderson]]''.
  * This monster appears in the artworks of  "[[Crystal Aegis]]", "[[Crystal Beacon]]", "[[Crystal Conclave]]", "[[Jesse Anderson - Bonder with the Crystal Beasts]]", and "[[Rainbow Bridge of the Heart]]".
  ** This monster's crystal form appears in the artworks of "[[Counter Gem]]", "[[Crystal Abundance]]", "[[Crystal Beast Token]]", "[[Crystal Keeper]]", "[[Crystal Master]]", "[[Crystal Raigeki]]", "[[Crystal Release]]", and "[[Ultimate Crystal Magic]]".
  * This monster is based on [[wikipedia:Cobalt|cobalt]], a metallic mineral that is not technically a gemstone, but is possibly confused with the gemstones [[wikipedia:Copal|copal]] or [[wikipedia:Coral (precious)|coral]].
  ** This monster is also likely based on [[wikipedia:Cobalt blue|cobalt blue]], a transitional metal salt with a blue pigment made of cobalt, [[wikipedia:Aluminium|aluminium]], and [[wikipedia:Oxygen|oxygen]] which features a crystalline structure.
  * This monster has an "[[Advanced Crystal Beast]]" [[counterpart]]: "[[Advanced Crystal Beast Cobalt Eagle]]".
  * In the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's voice, mannerisms, and various phrases are based on Maxwell Smart, the main protagonist of the 1960's TV series ''[[wikipedia:Get Smart|Get Smart]]''.
  * Despite being [[Summon]]ed in five different [[Duel]]s in the ''Yu-Gi-Oh! GX'' anime, this monster's first effect was only [[activate]]d once, 66 episodes after its first appearance in {{episode|GX|106|ref}}.
  * In the Spanish print of ''[[Force of the Breaker]]'', this card's text features the word "regresar" instead of "devolver", which is the official Spanish term for "return".
