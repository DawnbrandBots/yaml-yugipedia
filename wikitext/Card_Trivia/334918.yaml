title: Card Trivia:Dragon Capture Jar
wikitext: |-
  {{Navigation}}

  * This is the first [[Continuous Trap Card]] released in the ''[[OCG]]''/''[[TCG]]''.
  * In games such as ''[[Yu-Gi-Oh! Forbidden Memories]]'', this card functions as a [[Normal Spell Card]], and is applied similarly to cards such as "[[Exile of the Wicked]]" and "[[Eternal Drought]]", destroying all [[Dragon]] monsters on the field.
