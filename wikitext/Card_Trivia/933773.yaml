title: Card Trivia:Battlin' Boxer Uppercutter
wikitext: |-
  {{Navigation}}

  * This monster's name is based on an [[wikipedia:Uppercut|uppercut]], a type of punch used in the sport of [[wikipedia:Boxing|boxing]] where the boxer will deliver a straight vertical jab at the opponent's chin or solar plexus.
  ** This monster's design features two blades on its forearms resembling [[wikipedia:Paper cutter|paper cutter blades]]; therefore this monster is depicted performing an uppercut while also "cutting" with its blades in an "upwards" motion.
