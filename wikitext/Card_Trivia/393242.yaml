title: Card Trivia:Speedroid Maliciousmagnet
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Magnetix|Magnetix]], a magnetic construction toy set consisting of smaller plastic parts with [[wikipedia:Neodymium magnet|neodymium magnets]] and steel bearing balls.
  ** This monster's Japanese name, "Demonmagne" (アクマグネ, ''Akumagune'') is a portmanteau of the words for "demon" (悪魔, ''akuma'') and "Magnet" (マグネ, ''magune'').
  *** This monster's design also features two [[wikipedia:Horseshoe magnet|horseshoe magnets]] on the side of its "head", which serve as its horns.
  * This monster's "fiendish" theme, along with "[[Speedroid Skull Marbles]]", are based on how they were both used while [[Yugo]] was under the influence of [[Z-ARC]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
