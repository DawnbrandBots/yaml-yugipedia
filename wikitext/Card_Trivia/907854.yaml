title: Card Trivia:Imaginary Actor
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Extra Transcend Enhancement Pack]]''.
  * This monster appears in the artworks of "[[Imaginary Arc Actor]]", "[[Imaginary Arc Turbo]]", "[[Imaginary Arc Turbulence]]", and "[[Imaginary Arc Turret]]".
  ** This monster's core appears in the artworks of "[[Imaginary Leading Actor]]" and "[[Metarion Fusion]]".
  * The Japanese spelling and pronunciation of "Actor" (アクター ''Akutā'') shares a similar naming scheme with the [[Metarion|Imaginary Arc]] [[Spell Card|Spell]]/[[Trap Card]]s, albeit space with an interpunct in between the syllables (アーク・タ ''Āku Tā'').
