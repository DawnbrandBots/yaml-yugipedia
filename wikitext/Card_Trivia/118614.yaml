title: Card Trivia:Gem-Knight Tourmaline
wikitext: |-
  {{Navigation}}

  * This card is named after the mineral [[wikipedia:Tourmaline|tourmaline]].
  * This card's [[ATK]] and [[DEF]] share a relation to that of the other "Gem-Knight" [[Normal Monster]]s released in ''[[Duel Terminal - Vylon Descends!!|Duel Terminal 9]]'': each are 300 lower than that of "[[Gem-Knight Garnet]]" and "[[Gem-Knight Sapphire]]", respectively.
