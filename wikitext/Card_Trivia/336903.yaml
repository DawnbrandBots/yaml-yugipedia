title: Card Trivia:Sun Shower
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name and effect are derived from the stereotypical weakness of undead beings (such as vampires) to sunlight.
  * This card has 6 [[counterpart]]s: "[[Warrior Elimination]]", "[[Acid Rain]]", "[[Last Day of Witch]]", "[[Eternal Drought]]", "[[Exile of the Wicked]]" and "[[Eradicating Aerosol]]".
  ** Unlike the others, this card is a [[Trap Card]] instead of a [[Spell Card]], and is exclusive to the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
