title: Card Trivia:M-Warrior 1
wikitext: |-
  {{Navigation|M-Warrior #1}}

  * This monster appears in the artworks of "[[Dino Domain]]", "[[Evil★Twin's Trouble Sunny]]", and "[[Live☆Twin Sunny's Snitch]]".
  ** Despite this monster wearing briefs in its ''[[OCG]]''/''[[TCG]]'' artwork, in the anime and the artwork of "Dino Domain", it is portrayed wearing shorts instead.
  ** In the artwork of "Evil★Twin's Trouble Sunny", this monster appears on a billboard alongside its counterpart, "[[M-Warrior 2|M-Warrior #2]]", as part of a billboard advertisement for "[[Instant Fusion]]".
  *** This is likely related to the fact that the two monsters are the [[Fusion Material]]s for "[[Karbonala Warrior]]", a [[Fusion Monster]] which can be [[Special Summoned]] by the effect of "Instant Fusion".
  * The letter ''M'' in this card's ''TCG'' name stands for ''Magnets''.
  * This card's [[ATK]] (1000) and [[DEF]] (500) are the reversed ATK and DEF of "M-Warrior #2".
  * The Canadian-French prints of this card and "M-Warrior #2" from ''[[Legend of Blue Eyes White Dragon]]'' have their name contain the lowercase letter ''n'' for the [[wikipedia:Numero sign|numero sign]] (nº), instead of the usual uppercase ''N'' (Nº).
  ** The Spanish prints of this card and "M-Warrior #2" in ''Legend of Blue Eyes White Dragon'' also uses the numero sign (nº) instead of the usual superscripted [[wikipedia:Number sign|number sign]] (#).
