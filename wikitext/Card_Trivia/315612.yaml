title: Card Trivia:Rank-Up Spider Web
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is the first "[[Rank-Up]]" card revealed in the [[Yu-Gi-Oh! ZEXAL|manga]].
  ** It is also the first Continuous "Rank-Up" Spell Card.
  * Similar to how "[[Rank-Up-Magic]]" cards show different emblems in their artworks, this card's artwork displays the same spider-like emblem that is present on the front of [[Kyoji Yagumo]]'s clothing.
  * This card's artwork has the same background artwork as that of the manga version of "[[No. 35: Ravenous Tarantula (manga)|No. 35: Ravenous Tarantula]]".
