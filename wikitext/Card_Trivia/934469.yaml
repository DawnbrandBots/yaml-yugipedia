title: Card Trivia:Dragons Boost Fusion
wikitext: |-
  {{Navigation}}

  * "[[Booster Wyvern]]" and "[[Red-Boot Boost Dragon]]" appear in this card's artwork.
  * The first letters of each word in this card's name is "DBF", an acronym for [[wikipedia:.dbf|database file]], which is often abbreviated as ".dbf".
  ** This card shares this naming scheme with "[[Dragons Burst Fusion]]" and can it be [[support]]ed by "[[DBF Rebuildra]]".
