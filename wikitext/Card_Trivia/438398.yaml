title: Card Trivia:Performapal Kuribohble
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name, "Kuribohble" is a portmanteau of "[[Kuriboh]]" and "[[wikipedia:Christmas ornament|bauble]]".
  ** A bauble is synonymous to a Christmas ornament, reflected on the red-and-green striped patterns on this monster's cap and tail, which is commonly associated with the [[wikipedia:Christmas|Christmas]] holiday.
  *** Fittingly, this card was first released in the ''TCG'' in the [[Yu-Gi-Oh! Advent Calendar (2019)|''Yu-Gi-Oh!'' 2019 Advent Calendar]], with its set number, [[AC19-EN024]], representing [[wikipedia:Christmas Eve|Christmas Eve]].
  * Following the tradition of every protagonist having his own "[[Kuriboh (archetype)|Kuriboh]]" monster, this is [[Yuya Sakaki (manga)|Yuya Sakaki's]] personal "Kuriboh" card to debut, while also being a member of the "[[Performapal]]" [[archetype]].
