title: Card Trivia:Digital Bug Corebage
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bug Emergency]]" and "[[Bug Matrix]]".
  * This monster's name and appearance are puns on "cabbage" (short for "[[wikipedia:Pieris rapae|cabbage white]]", a species of small-to-medium-sized butterfly known for their white-colored wings) and "core" (short for "[[wikipedia:Multi-core processor|multi-core processor]]", a single integrated circuit containing multiple independent processing units that can execute instructions simultaneously, which are featured on this monster's wings).
  * This monster cannot be [[Xyz Summon]]ed traditionally, since there are currently no [[LIGHT]] [[Level 5]] [[Insect]] monsters in the ''[[OCG]]''/''[[TCG]]''; however, it can only be Xyz Summoned using its alternate [[Summoning condition]].
