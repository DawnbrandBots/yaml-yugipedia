title: 'Card Trivia:WANTED: Seeker of Sinful Spoils'
wikitext: |-
  {{Navigation}}

  * A wanted poster of "[[Diabellstar the Black Witch]]" appears in this card's artwork.
  ** The top line says "$1,000,000 Reward", with the "1,0" part being amended from a space that took up a standard digit width, implying that her bounty was increased from a 6-digit figure of "$?00,000".
  ** The text under "Diabellstar"'s portrait reads as "Zaiho-Gari", meaning "[[Sinful Spoils]] Hunter".
  ** The wanted poster is vandalized: the word "Alive" is scribbled out, and the word "Dead" is circled and also written repeatedly over parts of the poster, implying a grudge on the vandal's part.
