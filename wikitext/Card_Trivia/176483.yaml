title: Card Trivia:Divine Dragon Apocralyph
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]'' named is based on the [[wikipedia:Apocalypse|Apocalypse]].
  * This card has a [[counterpart]]: "[[Divine Dragon Ragnarok]]".
  ** Both are named after terms for the end of the world.
  ** Both [[Level]] 4, have opposite [[ATK]], [[DEF]], and [[Attribute]]s ([[LIGHT]] and [[DARK]], respectively).
  ** Both have a merged form with another monster: "Apocralyph" has a combined form with "[[Lady of D.]]", "[[Queen Dragun Djinn]]", while "Ragnarok" has a combined form with "[[Lord of D.]]", "[[King Dragun]]".
  * This monster (with a blue color-scheme instead of an orange one) makes up the right head of "[[Divine Dragon Titanomakhia]]".
