title: Card Trivia:Chronomaly Aztec Mask Golem
wikitext: |-
  {{Navigation}}

  * This monster's mask is based on the stone masks used during religious ceremonies in the ancient [[wikipedia:Aztec|Aztec]] cultures.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card is given to [[Trey]] by [[Vetrix|his father]] and considers it to be his favorite card.
  ** However, in {{episode|ZEXAL|047|ref}}, when Trey is taken over by his dark side, he lost respect for it and purposefully [[destroy]]ed it with the effect of "[[Chronomaly Cabrera Trebuchet (anime)|Chronomaly Cabrera Trebuchet]]".
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster was [[Special Summon]]ed by its effect, five orbs colored blue, red, white, green, and yellow descended from the sky and rapidly orbiting around a fixed point before merging together to form this monster's body. Afterwards, a green beam of light burst through the ground underneath this monster, forming a green ball of light that moved to a point above this monster's chest, creating its head.
