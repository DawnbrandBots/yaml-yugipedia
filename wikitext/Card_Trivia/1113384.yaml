title: Card Trivia:Fleur de Buzz the Shadow Flower Heavenly Orchid
wikitext: |-
  {{Navigation|mode=nongame}}

  * The Japanese name for "Heavenly Orchid" ({{Ruby|天|てん}}{{Ruby|蘭|らん}}, ''Tenran'') is a pun on the names of [[Tenten Nanahoshi]] ({{Ruby|天|てん}}, ''Ten'') and [[Ranran Nanahoshi]] ({{Ruby|蘭|らん}}, ''Ran'').
  ** Fittingly, this monster is a [[Fusion Monster|Fusion]] form of "[[Blanc the Snowing Shadow Flower]]" and "[[Evasive Chaos Ninsect Crimson Blade Nanahoshi]]", both of which are the [[signature card]]s of Ranran and Tenten, respectively.
