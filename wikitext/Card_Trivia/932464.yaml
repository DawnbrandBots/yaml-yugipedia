title: Card Trivia:Wilhel the Wisdom Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[By Order of the Monarch]]", "[[The Emperor Realm]]", and "[[Machinations of the Monarchs]]".
  * This monster is named after [[wikipedia:Wilhelm Schickard|Wilhelm Schickard]], a German professor who came up with the calculating clock, one of the earliest ideas of a computer.
  * This monster has an [[Counterpart|upgraded]] Mega Monarch form: "[[Wilhel the Mega Monarch]]".
  * This monster has a Vassal counterpart: "[[Zuse the Wisdom Vassal]]".
