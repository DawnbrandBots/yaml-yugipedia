title: Card Trivia:Silent Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Silent Burning]]".
  * This monster is the [[Spellcaster]] counterpart of "[[Silent Swordsman]]".
  ** Both monsters share the same [[Attribute]] ([[LIGHT]]), [[Level]] (4), and [[original ATK and DEF]] (1000/1000).
  ** Both monsters cannot be [[Normal Summon]]ed/[[Set]], and must be [[Special Summon]]ed from the [[hand]] by [[Tribute|Tributing]] a monster of the same [[Type]].
  ** Both monsters share the same effects, which allow them to gain 500 ATK during the Standby Phase and [[negate]]s the [[activate|activation]] of a [[Spell Card]] [[once per turn]].
  ** Both monsters share an effect that can Special Summon a monster in the same [[archetype]] as themselves upon being destroyed, ignoring any [[Summoning condition]]s.
