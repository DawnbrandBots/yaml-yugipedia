title: Card Trivia:Ritual of the Ultimate Forbidden Lord
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Exodius the Ultimate Forbidden Lord]]" appears in this card's artwork.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, the first time a player ever activated this card, they had to sacrifice the human life of a person close to them.
  * Despite having the word "Ritual" in its name and an effect similar to performing a [[Ritual Summon]], this card is not a [[Ritual Spell Card]].
  ** This card is likely named this way as it is based on "Contract With Exodia" which is a Ritual Spell in the anime.
