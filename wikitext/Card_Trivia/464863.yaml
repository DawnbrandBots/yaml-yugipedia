title: Card Trivia:Crystron Quariongandrax
wikitext: |-
  {{Navigation}}

  * This monster appears to be formed from "[[Crystron Citree]]", "[[Crystron Quan]]",  "[[Crystron Rion]]", and "[[Crystron Sulfefnir]]".
  ** Ironically, the total [[Level]] (11) of these monsters is not equal to the Level (9) of this monster; however, if "Citree" is not considered (as it is not reflected in this monster's name unlike the other two) this becomes a valid [[Synchro Summon]]ing.
  * This monster and "[[Crystron Phoenix]]" each represent [[Double Tuning]] and [[Accel Synchro Summon]], respectively, the highest forms of non-[[Pendulum Summon|Pendulum]]-related Synchro Summoning used in the ''[[Yu-Gi-Oh! 5D's]]'' and ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster forms the main body of "[[Metaltron XII, the True Dracombatant]]."
