title: Card Trivia:Gizmek Orochi, the Serpentron Sky Slasher
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of the [[wikipedia:Yamata no Orochi|Yamata no Orochi]] and ''Ame-no-Murakumo-no-Tsurugi''.
  ** This monster is likely based on the tale of the ''[[wikipedia:Kusanagi|Kusanagi-no-Tsurugi]]''. According to legend, the [[wikipedia:Shinto|Shinto]] god [[wikipedia:Susanoo-no-Mikoto|Susanoo]] slew a Yamata no Orochi by cutting off all of its 8 heads while it was drinking from 8 vats of [[wikipedia:Sake|sake]]. He then proceeded to cut off all 8 of the creature's tails, where he discovered a great sword in the fourth tail, which he named ''Ame-no-Murakumo-no-Tsurugi''. He later renamed this sword to ''Kusanagi-no-Tsurugi''.
  ** This card's Level and first effect (that banishes the top 8 cards from your Deck face-down) are possibly a reference to the 8 heads of the Yamata no Orochi. This card's second effect (that banishes 3 random cards from your Extra Deck face-down) is possibly a reference to the [[wikipedia:Imperial Regalia of Japan|Imperial Regalia of Japan]], 3 legendary items from Japan's history, one of which is the ''Kusanagi-no-Tsurugi''.
