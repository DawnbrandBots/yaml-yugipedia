title: Card Trivia:The Weather Painter Aurora
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[The Weather Auroral Canvas]]", "[[The Weather Forecast]]", and "[[The Weather Rainbowed Canvas]]".
  * This card is the only [[Main Deck]] "[[The Weather]]" monster to not be [[Level]] 3.
  ** It is also the only Main Deck "The Weather" monster that has 3 effects instead of 2 (and a [[Continuous Effect]], as well).
  * This card is based on the [[wikipedia:Aurora Borealis|Aurora Borealis]], which is a night-time event (reflected by this card's [[DARK]] [[Attribute]]) and relates to weather and the Sun.
  * This monster's Japanese name, "Lambla", is a reference to [[wikipedia:Carbon_black#Pigment|Lampblack]], a black pigment for ink used in painting and calligraphy.
