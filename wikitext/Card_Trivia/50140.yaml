title: Card Trivia:Hyper Psychic Blaster/Assault Mode
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Assault Teleport]]".
  * This monster is the [[Card evolutions|upgraded]] "[[/Assault Mode]]" form of "[[Hyper Psychic Blaster]]".
  ** This monster's wings appear in the design of this card's original counterpart, albeit folded.
  * This monster has an upgraded [[Fusion Monster|Fusion]] form combined with "[[Silent Psychic Magician]]": "[[Axon Kicker Oracle]]".
  * This monster is tied with "[[Hyper Psychic Blaster/Assault Mode]]", "[[Absolute Axon Kicker]]" and "[[Psychic End Punisher]]" for having the highest [[Level]] (11) of all [[Psychic]] monsters.
