title: Card Trivia:Roaring Firestorm Volcalize Phoenix (R)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Volcalize Compound]]" and "[[Volcalizing Salamandeus]]".
  ** This monster appears in the artworks of "[[Chemicalize Devil Burst]]" and "[[Chemicalize Tropos Rapier]]" in [[Maximum Mode]] (together with "[[Roaring Firestorm Volcalize Phoenix (L)|Roaring Firestorm Volcalize Phoenix [L]]]" and "[[Roaring Firestorm Volcalize Phoenix]]").
  * This card, along with "Volcalize Phoenix [L]" and "Volcalize Phoenix", are the first [[Maximum Monster]]s to have different [[Type]]s among each other; this card is [[Aqua]] Type, while the aforementioned monsters are [[Thunder]] Type and [[Pyro]] Type, respectively.
