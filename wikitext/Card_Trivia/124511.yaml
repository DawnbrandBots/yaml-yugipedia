title: Card Trivia:Black-Winged Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[The Shining Darkness]]'', and is also one of the cover cards of ''[[Duelist Edition Volume 4]]'', ''[[Collectible Tins 2010 Wave 1]]'', and ''[[Synergy Pack 01: Syncro Acceleration]]''.
  * This monster appears in the artwork of "[[Synchro Overtop]]".
  * This monster's name parallels the naming scheme of the "[[Blackwing]]" [[archetype]] ("Black Feather" in Japanese). Despite this and its relation with the archetype, this monster is not a member of the archetype.
  * This monster resembles the [[wikipedia:Amphiptere|Amphiptere]], a winged [[wikipedia:dragon|dragon]] in [[wikipedia:heraldry#National styles|European heraldry]] that is depicted without legs.
  * This monster has a [[Duel Dragon]] [[counterpart]]: "[[Blackfeather Darkrage Dragon]]".
  * This monster has an upgraded form: "[[Black-Winged Assault Dragon]]".
  * This is the [[signature card]] of [[Crow Hogan]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster has the same [[original ATK]] (2800) as the signature cards of the tritagonists from the [[NAS]] anime series, including [[Joey Wheeler]]'s "[[Gilford the Lightning (anime)|Gilford the Lightning]]" from ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'', [[Reginald Kastle|Reginald "Shark" Kastle's]] "[[Number 32: Shark Drake (anime)|Number 32: Shark Drake]]" from ''[[Yu-Gi-Oh! ZEXAL]]'', and [[Theodore Hamilton|Soulburner's]] "[[Salamangreat Pyro Phoenix (anime)|Salamangreat Pyro Phoenix]]" from ''[[Yu-Gi-Oh! VRAINS]]''.
  ** This monster's effect to place [[Black Feather Counter]]s on it and reduce its [[ATK]] by a certain amount references Crow and its previous owner, [[Robert Pearson]]'s determination to protect their loved ones, going as far as sacrificing themselves, not unlike [[Yusei Fudo]] and his "[[Stardust Dragon (anime)|Stardust Dragon]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to lose 700 ATK for each Black Feather Counter is an alteration of its initial effect in the ''Yu-Gi-Oh! 5D's'' anime, where it loses ATK equal to the amount of damage inflicted by a card effect. In {{episode|5D's|095|ref}}, Crow performed a looping combination where this monster lost ATK equal to the '''400''' damage inflicted by the effect of his "[[Blackwing - Zephyros the Elite (anime)|Blackwing - Zephyros the Elite]]" and the '''300''' damage inflicted by the effect of [[Bolton]]'s "[[Crimson Mefist]]". 
  * In the ''Yu-Gi-Oh! 5D's'' anime, this monster's feathers are mostly depicted white. Each time it gains a Black Feather Counter via its effect, its feathers turn black with a glowing red stripe on the bottom half of each feather.
  * This is the only [[Signer Dragon]] to have the same [[Attribute]] ([[DARK]]) as another Signer Dragon ("[[Red Dragon Archfiend]]").
  * This is one of four Signer Dragons that technically never got an upgrade throughout the ''Yu-Gi-Oh! 5D's'' series; the other three being "[[Ancient Fairy Dragon]]", "[[Black Rose Dragon]]", and "[[Life Stream Dragon]]".
