title: Card Trivia:Fabled Ragin
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to [[wikipedia:Legion (demons)|Legion]].
  * The small creatures in this card's background also appear on the artworks of "[[The Fabled Cerburrel]]" (Malice) and "[[The Fabled Nozoochee]]" (Glud).
  * This card has a "[[lswarm]]" counterpart, "[[Evilswarm Thanatos]]".
  ** In "Thanatos" atwork, this card is mounted in a "lswarm" counterpart of "[[The Fabled Unicore]]".
