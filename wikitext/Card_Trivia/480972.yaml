title: Card Trivia:D/D/D Super Doom King Purple Armageddon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[D/D/D Doom King Armageddon]]".
  ** This monster's name is a reference to the fact that Fusion Monsters have purple card frames.
  * Like the other "Super Doom King" monsters that resemble the final antagonists from the previous anime series, this monster references [[Zorc Necrophades]] and [[Nightshroud]], the final antagonists of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' and ''[[Yu-Gi-Oh! GX]]'' anime, respectively. Fittingly, this monster is also an allusion to the fact that both ''Yu-Gi-Oh!'' and ''Yu-Gi-Oh! GX'' were the eras where Fusion Monsters were played frequently, and [[Fusion Summon]]ing was the only available [[Extra Deck]] Summoning method.
  ** This monster's largest wings are similar to those of Zorc's, while its smaller two pairs of wings greatly resemble Nightshroud's wings, which he used as his [[Duel Disk]].
  ** This monster's dragon head tail is similar to the dragon head protruding from between Zorc's legs (or his stomach in the international dubbed version).
  ** This monster's effect to [[destroy]] an opponent's monster and inflict damage equal to its [[ATK]] references the "effect" displayed when Zorc destroyed monsters Summoned via a Duel Disk.
  * This is the only "Super Doom King" monster that doesn't have a protection effect for monsters the player [[control]]s in the ''[[OCG]]''/''[[TCG]]''.
