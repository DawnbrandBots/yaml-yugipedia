title: Card Trivia:Evolsaur Terias
wikitext: |-
  {{Navigation}}

  * This card is named after the ''[[wikipedia:Epanterias|Epanterias]]'', a genus of theropod dinosaur.
  * This monster appears in the artwork of "[[Degen-Force]]" and "[[Evo-Price]]".
  * So far, this card is the only "Evolsaur" with a negative effect.
