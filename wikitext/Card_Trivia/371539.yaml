title: Card Trivia:Super Quantal Mech Beast Magnaliger
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Super Quantal Mech Ship Magnacarrier]]" and "[[Super Quantal Union - Magnaformation]]".
  * This monster's name is a portmanteau of the words "magna" and "[[wikipedia:Liger|liger]]" (the hybrid offspring of a male lion and a female tiger).
  * This monster forms the head and body of "[[Super Quantal Mech King Great Magnus]]", as well as the head and shoulders of "[[Neo Super Quantal Mech King Blaster Magna]]".
