title: Card Trivia:Brotherhood of the Fire Fist - Hawk
wikitext: |-
  {{Navigation}}

  * In the ''OCG'', this monster is named after ''[[wikipedia:Hua Rong|Hua Rong]]'' (read in Japanese as Ka Ei) and "hawk" (hōku).
  ** ''Hua Rong'' ranks 9th of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "Little Li Guang".
  * The kanji 英 on this monster's belt and the hawk in this card's artwork means "noble [cause]".
  * This monster appears in the artwork of "[[Fire Formation - Tenki]]".
