title: Card Trivia:D/D Ark
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Noah's Ark|Noah's Ark]], a massive ship built by [[wikipedia:Noah|Noah]] upon instructions from [[wikipedia:God in Abrahamic religions|God]] to save himself, his family, and the world's animals from the [[wikipedia:Genesis flood narrative|Biblical flood]].
  ** This monster's name, when combining the naming scheme of the "[[D/D]]" [[archetype]] with "Ark", could be read as "dark", reflecting its [[DARK]] [[Attribute]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' monster effect to [[Special Summon]] 1 face-up "[[D/D]]" [[Pendulum Monster]] from the [[Extra Deck]] references its [[Pendulum Effect]] in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, which allowed the player to [[Pendulum Summon]] 1 monster regardless of the [[Pendulum Scale]]s of Pendulum Monsters in the [[Pendulum Zone]]s.
