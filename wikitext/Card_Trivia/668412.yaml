title: Card Trivia:Assault Blackwing - Kunisada the White Rainbow
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is based on the art name Kunifusa from the [[wikipedia:Utagawa school|Utagawa school]] of [[wikipedia:Woodblock printing|woodblock printing]].
  ** This fact is shared by the other "White Rainbow" "[[Assault Blackwing]]" monsters: "[[Assault Blackwing - Kunifusa the White Rainbow|Kunifusa]]" and "[[Assault Blackwing - Kuniyoshi the White Rainbow|Kuniyoshi]]".
  ** The second portion of this monster's name is based on a [[wikipedia:Fog bow|fog bow]], a phenomenon similar to the rainbow where the refraction occurs in a fog instead of rain.
