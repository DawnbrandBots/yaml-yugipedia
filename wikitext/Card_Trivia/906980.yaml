title: Card Trivia:Amaze Attraction Horror House
wikitext: |-
  {{Navigation}}

  * "[[Amazement Administrator Arlekino]]", "[[Ghostrick Lantern]]" and "[[Ghostrick Specter]]" appear in this card's artwork.
  * This card's artwork takes inspiration from the "[[Ghostrick]]" [[archetype]].
  ** "Arlechino" is cosplaying as "[[Ghostrick Alucard]]".
  ** The location appears to be based on the house seen in the artwork of "[[Ghostrick Renovation]]".
  ** The exclamation mark is the same as in the artwork of "[[Ghostrick Scare]]".
  ** Several of the objects present in the artwork alude to different "Ghostrick" monsters:
  *** The banner with "Ghostrick Specter" and "Ghostrick Lantern".
  *** The costume of "Ghostrick Specter" is hanging on the chandelier.
  *** Several copies of the paper talisman of "[[Ghostrick Jiangshi]]".
  *** A portrait of "Ghostrick Alucard", and the bats seen in its artwork.
  *** The mirror of "[[Ghostrick Mary]]".
  *** The hand of "[[Ghostrick Ghoul]]".
  ** This card's second bulleted effect is based on the general mechanic of "[[Ghostrick]]" monsters [[flip]]ping themselves [[face-down]].
  * This [[wikipedia:Haunted attraction (simulated)|haunted house]] appears in the artwork of "[[Amazement Precious Park]]".
