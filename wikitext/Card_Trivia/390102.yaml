title: Card Trivia:Flower Cardian Clover with Boar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fraud Check]]", "[[Super All In!]]", and "[[Super Koi Koi]]".
  * "[[Boar Soldier]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Clover with Boar", one of the special cards in the "Clover" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (7) references how the "Clover with Boar" card falls under the month of July, the seventh month of the year.
  ** This monster's [[original ATK and DEF]] (1000/1000) reflects how the "Clover with Boar" card is a ''tane'' card, which is worth ten points.
