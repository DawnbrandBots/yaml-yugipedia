title: Card Trivia:Knight of Pentacles
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Pentacle of Ace]]" appears in the background of this card's artwork.
  * This monster is based on the [[wikipedia:Minor Arcana|Minor Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Knight of Coins|The Knight of Coins]], also known as the Knight of Pentacles.
  ** This is the only monster that is based on the Minor Arcana.
  * This is the only monster [[Summon]]ed by [[Sartorius]] whose original [[Attribute]]/[[Type]] are not [[LIGHT]]/[[Fairy]], instead being an [[EARTH]]/[[Warrior]] monster.
