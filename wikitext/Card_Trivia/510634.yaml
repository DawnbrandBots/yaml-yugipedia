title: Card Trivia:Pharaoh's Servant (card)
wikitext: |-
  {{Navigation|Pharaoh's Servant}}

  * This monster appears in the artwork of "[[Thousand Energy]]".
  * This monster shares its name with the ''[[TCG]]'' [[Booster Pack]], ''[[Pharaoh's Servant]]''.
  * This is one of the two cards designed to be [[Special Summon]]ed with "[[Spirit of the Pharaoh]]", with the other being "[[Pharaonic Protector]]".
  ** Both monsters share their name with ''[[OCG]]''/''TCG'' Booster Packs.
