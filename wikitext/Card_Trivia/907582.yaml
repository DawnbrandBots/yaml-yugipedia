title: Card Trivia:Armored Basic Insect with Laser Cannon
wikitext: |-
  {{Navigation}}

  [[File:ArmoredBasicInsectwithLaserCannon-JP-Manga-DM-NC.png|thumb|right|303|"Basic Insect" equipped with "Insect Gun Armor" in the ''Yu-Gi-Oh!'' manga]]

  * This card is based on "[[Basic Insect (manga)|Basic Insect]]" [[equip]]ped with "[[Insect Gun Armor]]" in the [[Yu-Gi-Oh! (manga)|''Yu-Gi-Oh!'' manga]].
  ** The ''[[OCG]]''/''[[TCG]]'' card, "[[Bio-Insect Armor]]" is also based on this monster and both aforementioned cards.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|060|ref}}, specifically from the panel where "[[Basic Insect (manga)|Basic Insect]]" is [[equip]]ped with "[[Insect Gun Armor]]".
