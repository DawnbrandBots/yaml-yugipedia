title: Card Trivia:Generation Force (card)
wikitext: |-
  {{Navigation|Generation Force}}

  * This card shares its name with the ''OCG'' [[Booster Pack]], ''[[Generation Force]]''.
  ** ''Generation Force'' was the first Booster Pack to include members of the "[[Xyz (archetype)|Xyz]]" archetype, which this card supports.
  * "[[Number 39: Utopia]]" is featured on this card's art.
  * This card's artwork looks like the artwork for "[[Xyz Energy]]", which is searchable by this card.
  ** Both cards also feature "Number 39: Utopia".
