  * This monster appears in the artwork of "[[OuTerverSe Diversity Scream]]".
  * This monster is based on the parallel universe observed by [[Yudias Velgear]] through [[Kuaidul Velgear]] in {{episode|GO RUSH!!|135|ref}}, in which civilization must survive the spikes sticking out around them.
