title: Card Trivia:Genni, the Maid of Endymion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2026]]''.
  * The butterfly from the artwork of "[[Verre, the Maid of Endymion]]" appears in this card's artwork.
  * This monster is based on [[Genni]] disguised as one of [[Endymion (character)|Endymion]]'s maids in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh! OCG Stories|Great Magic War|1|ref}}, specifically from the panel where Genni reverts from her mouse transformation, albeit with some changes in her design.
  ** This monster's effect to [[Special Summon]] a "[[Witchcrafter]]" monster from the [[Deck]] is designed to Special Summon "Verre, the Maid of Endymion", a monster that treats itself as a "Witchcrafter" monster, referencing how Genni summons [[Verre]] to Endymion Castle disguised as a maid in the aforementioned chapter.
  * This monster is a second "[[Endymion]]" counterpart of "[[Witchcrafter Genni]]", after "[[Servant of Endymion]]".
