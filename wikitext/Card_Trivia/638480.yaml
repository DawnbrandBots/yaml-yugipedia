title: Card Trivia:TA.I. Strike
wikitext: |-
  {{Navigation}}

  * [[Ai]] appears in this card's artwork.
  * This card's Japanese name is a portmanteau of "Ai" and 「相打ち」 (''aiuchi'', "tie/draw"), a reference to this card's effect that makes the [[ATK]] of the target of its effect equal to its opponent that it battles.
  ** This pun is translated into this card's English name as a portmanteau of "tie" and "Ai".
  * This card's protection effect is based on the anime effect of "[[Dark Templar @Ignister (anime)|Dark Templar @Ignister]]" that prevents it from destroyed by battle with a monster that has equal ATK.
  ** This is supported by the fact that this card was activated 3 times in ''[[Yu-Gi-Oh! VRAINS]]'', two of which involved this card.
