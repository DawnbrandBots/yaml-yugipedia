title: Card Trivia:Infernoble Knight Captain Oliver
wikitext: |-
  {{Navigation}}

  * This monster is based on the legendary paladin [[wikipedia:Oliver (paladin)|Oliver]].
  * This card is a [[Synchro Monster]] counterpart of "[[Infernoble Knight Oliver]]".
  * "[["Infernoble Arms - Hauteclere"]]" appears in this card's artwork. This is fitting, as [[wikipedia:Hauteclere|Hauteclere]] was Oliver's sword.
