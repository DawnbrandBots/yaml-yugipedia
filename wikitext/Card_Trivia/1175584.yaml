title: Card Trivia:Great Mammoth of the Netherworld
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Great Mammoth of Goldfine]]".
  ** This monster's design is based on a scene from {{episode|Yu-Gi-Oh!|079|ref}} where "[[Great Mammoth of Goldfine (anime)|Great Mammoth of Goldfine]]" is Summoned.
  ** This monster's association with the [[Call of the Haunted (series)|Call of the Haunted]] [[series]] references how "Great Mammoth of Goldfine" was used by [[Bonz]] (who used "[[Call of the Haunted (anime)|Call of the Haunted]]" during the [[Duelist Kingdom (arc)|Duelist Kingdom arc]]) in the aforementioned episode of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.

