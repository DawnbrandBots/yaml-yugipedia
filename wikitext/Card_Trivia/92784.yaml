title: Card Trivia:Fire Whip
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on the fiery whip used by the [[wikipedia:Balrog|Balrog]] in ''[[wikipedia:The Lord of the Rings|The Lord of the Rings]]'' by [[wikipedia:J. R. R. Tolkien|J. R. R. Tolkien]].
  ** Fittingly, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card was used in conjunction with "[[Gorlag]]", a monster based on the Balrog.
  * In the original Japanese version of the anime, this whip's flame was colored orange; however, in the English dubbed version, this whip's flame was colored blue, likely to distance it from J. R. R. Tolkein and avoid legal issues.
