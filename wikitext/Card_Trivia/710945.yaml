title: Card Trivia:Vahram, the Magistus Divinity Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Genesis Impactors]]''/''[[Genesis Impact]]''.
  * This card is likely named after the [[Wikipedia:Atash Behram|Atash-Behram]], which is considered the strongest and most sacred class of fire in [[Wikipedia:Zoroastrianism|Zoroastrianism]].
  ** This is supported by this card being [[FIRE]]-[[Attribute]] and that "Vahram" is a variant of "Behram".
  * Visually, "[[Zoroa, the Magistus Conflagrant Calamity]]" is this monster combined with "[[Zoroa, the Magistus of Flame]]".
  ** "Zoroa, the Magistus Conflagrant Calamity" also has the same [[Level]], [[Attribute]] and [[card type]] as this card, and [[ATK]] equal to this card's [[DEF]].
  * This monster appears in the artwork of "[[Magistus Vritra]]".
