title: Card Trivia:Ghoulish Gal
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Hanako-san|Hanako-san]], the ghost of a young girl who is often depicted with a bobbed haircut and a red skirt. According to Japanese urban legend, Hanako-san died in the toilet on the third floor of a school, and later haunts the girls' restroom on that floor.
