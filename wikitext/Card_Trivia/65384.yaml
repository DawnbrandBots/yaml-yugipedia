title: Card Trivia:Return of the Doomed
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a different perspective of "[[Silent Doom]]".
  * The man in this card's artwork appears in the artwork of "[[Card of Safe Return]]".
  * This card has an improved version, "[[Monster Reincarnation]]", which is also a [[Normal Spell Card]] with the same effect but a less specific cost and no other activation requirements.
  * This card, "[[Crimson Sentry]]", "[[Lady Panther]]", and "[[The Forgiving Maiden]]" feature very similar effects, and made their debuts in the ''[[OCG]]''/''[[TCG]]'' in the same [[Booster Pack]]s (''[[Spell of Mask]]'' and ''[[Labyrinth of Nightmare]]'', respectively).
