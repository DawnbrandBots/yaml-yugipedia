title: Card Trivia:Knight Armed Dragon, the Armored Knight Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed [[counterpart]] of "[[Armed Dragon, the Armored Dragon]]" and "[[Dragonic Knight]]".
  ** This monster's [[original ATK and DEF]] (1400/1900) are the inverse of the original [[ATK]] and [[DEF]] of "Armed Dragon, the Armored Dragon" (1900/1400).
