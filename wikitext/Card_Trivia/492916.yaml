title: Card Trivia:Cracking Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Air Cracking Storm]]".
  * This monster is named after cracking, the act of breaking into a computer system to steal, corrupt, or view data without permission.
  * In ''[[Yu-Gi-Oh! VRAINS]]'', the [[Knights of Hanoi]] use this monster in their assault on "[[LINK VRAINS]]" as part of their attempt to destroy "[[Cyberse (world)|Cyberse]]".
