title: Card Trivia:Ice Master
wikitext: |-
  {{Navigation}}

  * This is one of the [[signature card]]s of [[Alexis Rhodes (manga)|Alexis Rhodes]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  * This monster bears resemblance to [[Alexis Rhodes]] while brainwashed as a member of the [[Society of Light]] in the ''[[Yu-Gi-Oh! GX]]'' anime. 
  ** Fittingly, Alexis used an ice-themed [[Deck]] while she was brainwashed in the anime, while her manga counterpart uses an ice-themed Deck, which includes this monster.
