title: Card Trivia:Rinyan, Lightsworn Rogue
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of the Japanese words for "lightning" (''raikō'') and "''nyan''" (the Japanese onomatopoeia for a cat meowing).
  * This monster's title of "rogue" ("thief" in its Japanese name) reflects its [[Flip effect]] to "steal" a "[[Lightsworn]]" monster from the [[Graveyard]] and [[shuffle]] it into the [[Deck]], which goes against the overall gameplay of the "Lightsworn" [[archetype]] to make the player [[send]] cards from the Deck to the Graveyard.
  * According to the lore of the "Lightsworns", this monster is the pet cat of "[[Lumina, Lightsworn Summoner]]". <ref>[http://www.ygorganization.com/geargia-lightsworn-lore/ YGOrganization] - [OCG] Lore on the Geargias and Lightsworn!</ref> This is further supported by the fact that this monster is adorned with the headdress, necklace, and the armband of "Lumina", both feature effects that can retrieve "Lightsworn" monsters from the Graveyard, and both have an identical green background in their card artworks.

