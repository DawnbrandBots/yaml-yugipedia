title: Card Trivia:Spellbook of Miracles
wikitext: |-
  {{Navigation}}

  * "[[Reaper of Prophecy]]", "[[Empress of Prophecy]]" and "[[Hierophant of Prophecy]]" appear in this card's artwork.
  ** This card's artwork depicts the aftermath of "[[Spellbook of Judgment]]", as well as the transformation of "[[Reaper of Prophecy]]" into "[[World of Prophecy]]".
