title: Card Trivia:Hungreed Burger
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Hungry Burger (Rush Duel)|Hungry Burger]]".
  * This monster is a reference to Deluxe or Premium burgers like the [[wikipedia:Angus burger|Angus Burger]], which are usually burgers that are better prepared and more exquisite than the common burger.
  ** The term "Greed" in the monster's name alludes to this type of hamburger, which is usually expensive and prestigious among wealthy people.
  ** The [[Artwork|alternate artwork]] of this monster is based on the [[wikipedia:Kuro Burger|Kuro Burger]], a type of hamburger made with black ingredients due to its preparation recipe, which is only available at [[wikipedia:Burger King|Burger King]] fast food restaurants in Japan.
