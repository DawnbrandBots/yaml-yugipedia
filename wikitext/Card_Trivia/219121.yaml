title: Card Trivia:Hierophant of Prophecy
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * This monster appears in the artwork of "[[Spellbook of Judgment]]" and "[[Spellbook of Miracles]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Hierophant|The Hierophant]].
  ** This monster's Japanese name, "Hieron", is derived from the French word for "hierophant", ''hiérophante''.
  * This monster's scepter bears a resemblance to the [[Emperor's Key]]. It shares the trait of having such an item with two other "[[Prophecy]]" monsters - "[[Emperor of Prophecy]]" and "[[Empress of Prophecy]]".
  ** These three monsters appear to be in the same "room". The thrones of this "Emperor" and "Empress" face each other, while this monster's throne is between them.
