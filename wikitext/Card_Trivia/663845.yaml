title: Card Trivia:Karakuri Gama mdl 4624 "Shirokunishi"
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Karakuri Gama Oil]]".
  * The 4624 of this card's name represents a multiplication problem: 4 x 6 = 24.
  ** The number is also written in Japanese on this monster's barrel: 四六弐四.
  * This monster is based on the [[wikipedia:Japanese common toad|Japanese common toad]] of [[wikipedia:Mount Tsukuba|Mount Tsukuba]]. It is locally known for having 4 fingers on its forefeet and 6 on its hindfeet, but in actuality, it has 5 on both.
