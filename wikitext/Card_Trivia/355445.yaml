title: Card Trivia:Infinite Dismissal
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Messiah's Antlion Pit" (メサイアの蟻地獄 ''Mesaia no Arijigoku''), is based on an [[wikipedia:Antlion|antlion]], a species of predatory insect larvae whose later stages resemble a [[wikipedia:Dragonfly|dragonfly]].
  ** This card's Japanese name features the colloquial name for the antlion larva (蟻地獄 ''Arijigoku''), which translates to "ant hell", based on how the antlion larva creates conical pits used to trap weaker insect prey, including ants.
  *** ''Arijigoku'' is also used to describe a situation where someone has fallen into inevitable doom and must languish while awaiting disaster, which reflects this card's effect to destroy [[Level 3]] or lower monsters at the end of the turn that they are Summoned.
  * This card has a [[retrain]]ed [[Monster Card]] counterpart: "[[Infinite Antlion]]".
  * This is the first [[Trap Card]] played in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
