title: Card Trivia:Giant Scorpion of the Tundra
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart]]: "[[Nightmare Scorpion]]".
  * In the ''[[Yu-Gi-Oh! Tag Force]]'' series, characters such as [[Maki Kirioka]], [[Odelia]] and [[Tasha]] have a copy of this card in their [[Deck]]s, despite it not fitting any of their strategies.
  ** This is a pun on "tsundere", a character development process that depicts a character with an initially harsh personality who gradually reveals a warmer, friendlier side over time, and this monster's Japanese romanized name: "Tsundora no Oosasori".
  ** In ''[[Yu-Gi-Oh! 5D's Tag Force 5]]'', there is a special downloadable banlist in which this is the only [[Forbidden]] card, and no other cards are restricted in any way.
