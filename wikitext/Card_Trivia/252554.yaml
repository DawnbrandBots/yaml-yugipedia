title: Card Trivia:Cornfused
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name ({{name|Cornfused|ja}}, ''{{romanized name|Cornfused|ja}}'') is a portmanteau of「コーン」(''kōn'', lit. "corn") and「こんがらかる」(''kongaragaru'', lit. "to get entangled"), reflecting how the corn monster is depicted getting "entangled" in a net.
  ** This card's English name is a portmanteau of the words "corn" and "confused", reflecting the confused expression of the corn monster in this card's artwork.
