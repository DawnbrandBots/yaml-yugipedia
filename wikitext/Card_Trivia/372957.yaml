title: Card Trivia:Edge Imp Frightfuloid
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Edge Imp DT Imitation", features the letters "DT", which are the initials for "Death-Toy", the Japanese name of the "[[Frightfur]]" [[archetype]].
  ** This monster's ''[[TCG]]'' name, "Frightfuloid", features the suffix "-oid", which refers to something resembling a specified object or having a specified quality. 
  ** The above-mentioned facts reflect this monster's name and appearance, stats, and [[archetype condition]], which treats it as a "Frightfur" monster.
  *** If this monster's name were simply "Edge Imp Frightfuroid", it would be a "[[roid]]" monster and would thus require an [[archetype-exclusion condition]] instead.
