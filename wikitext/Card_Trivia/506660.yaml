title: Card Trivia:Leraje the God of Archery
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monsteris based on [[wikipedia:Leraje|Leraje]], a demon described in ''[[wikipedia:The Lesser Key of Solomon|The Lesser Key of Solomon]]'', ''[[wikipedia:Pseudomonarchia Daemonum|Pseudomonarchia Daemonum]]'', and ''[[wikipedia:Dictionnaire Infernal|Dictionnaire Infernal]]'': Leraje is an archer who starts battles and putrefies arrow wounds.
  ** This monster's effect to reduce the [[DEF]] of another [[face-up]] monster by an amount equal to this card's [[ATK]], [[destroy]]ing it if the target's DEF becomes 0, may be based on its descriptions in demonology as putrefying arrow wounds.
