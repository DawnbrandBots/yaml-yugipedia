title: Card Trivia:Sangan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Level Retuner]]", "[[Mistake]]", "[[Mistaken Accusation]]", "[[Mistaken Arrest]]", "[[Shared Ride]]", "[[Tour Bus From the Underworld]]", "[[Tour Bus To Forbidden Realms]]" and the alternate artwork of "[[Tour Guide From the Underworld]]".
  ** A chibi-version of this monster appears in the artwork of "[[Sanwitch]]", which uses this card as its [[Fusion Material]].
  ** The last six cards mentioned above are part of this monster's storyline. <ref>[http://www.ygorganization.com/monsterstories/ YGOrganization] - [OCG] Master Guide 4 - Monster Stories</ref> While making a tour trip to his homeland, the Underworld, "Sangan" ended up on the wrong bus and is picked on by the monsters from "[[Tribe-Infecting Virus]]". After fleeing from the bus, "Sangan" shared a taxi ride with the angel from "[[Graceful Charity]]". Unbeknownst to him, the driver, an imp from "[[Delinquent Duo]]", was illegally transporting a "[[Pot of Greed]]", and when stopped at a checkpoint, he and the angel were arrested as accomplices. When last seen, "Sangan" was in a holding cell with "[[Witch of the Black Forest]]", sobbing while clinging to the bars and pleading with the guard.
  * This card's ''[[TCG]]'' name is the Japanese word for "three eyes" (三眼 ''sangan'').
  ** This card was part of a trend in the beginning of the ''TCG'' card game to give Japanese names to cards with English names in the ''[[OCG]]''. In this monster's case, it's original Japanese name is "Critter".
  * This is the first monster to be Summoned in [[Defense Position]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** This is also the first monster to be placed in [[face-down]] Defense Position in the ''Yu-Gi-Oh!'' anime.
  * This card has a conceptual counterpart: "[[Witch of the Black Forest]]".
  ** Both cards are used as Fusion Materials for "Sanwitch".
  ** Both cards can [[add]] a monster with a fixed value of 1500 from the [[Deck]] to the [[hand]] when [[sent]] from the [[field]] to the [[Graveyard]].
  ** Both cards also underwent an [[errata]] change to prevent the players from [[activate|activating]] the effects of cards with the same name as the added monster for the rest of the turn.
  * The [[Summon]]-[[Trigger Effect]] of "[[Umbramirage the Elemental Lord]]" is based on this card.
  * "Sangan" appears to be related to "[[Kuriboh]]":
  ** Both monsters have similar designs, featuring the same color fur and limbs.
  ** The Japanese name of "Sangan" is "''Kurittā''", which is similar to "''Kuribō''".
  ** In the original manga appearance of "Kuriboh" it's limbs were the same as those of "Sangan".
  ** Most notably, the original manga card artwork for "Kuriboh" and "Sangan" share the exact same pose and angle, as well as the same two trees in the background.

