title: Card Trivia:White Magical Hat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fighting Dirty]]"
  * This monster's design, along with its effect to force the opponent to [[discard]] a card from their [[hand]], references the "[[wikipedia:Gentleman thief|gentleman thief]]", a stock thief character who robs their targets in a charming and nonviolent manner while wearing a refined suit with a top hat, a cape, and a monocle.
  * This monster has two [[counterpart]]s: "[[The Bewitching Phantom Thief]]" and "[[Great Phantom Thief]]".
  * This is the first monster to feature an effect that can interact with the opponent's hand.
