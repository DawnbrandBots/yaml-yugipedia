title: Card Trivia:Elemental HERO Inferno
wikitext: |-
  {{Navigation}}

  * This card's ATK is equal to the combined ATK and DEF of "[[Elemental HERO Lady Heat]]", while this monster’s DEF is equal to the original ATK of "[[Elemental HERO Heat]]".
  * This monster shares a similar appearance with "[[Elemental HERO Nova Master]]"
  ** In the ''[[Yu-Gi-Oh! GX]]'' manga, this monster was supposed to be the [[FIRE]] [[Fusion Monster|Fusion]] counterpart to the other [[Attribute]]-based "[[Elemental HERO]]" [[Fusion Monster]]s; however, when this trend of monsters started forming, this card was already released, requiring "[[Elemental HERO Lady Heat]]" and "[[Elemental HERO Heat]]" as materials. As a result, another FIRE Fusion "HERO" monster has to be made, which is "Nova Master", which explains why they are similar in appearance.
  * The concept of "Elemental HERO Inferno" seems very similar to "[[Super Robolady]]"/"[[Super Roboyarou]]".
  ** Both are a Fusion of their male and female [[Fusion Material]]s.
  ** Both have an effect that increases their ATK by 1000 during the [[Damage Step]] only.
  * This monster is likely based on the Marvel comics supervillain, [[wikipedia:Pyro (comics)|Pyro]], keeping in relation with the Western comics design of the "Elemental HERO" archetype.
  * This monster's ''[[OCG]]''/''[[TCG]]''  artwork is taken from {{chapter|GX|009|ref}}, specifically from the panel showing [[Elemental Hero Inferno (manga)|this monster]] being Summoned.
