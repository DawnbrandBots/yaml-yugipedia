title: Card Trivia:Soul Energy MAX!!!
wikitext: |-
  {{Navigation}}

  [[File:Yu-Gi-Oh! Duel 275 - bunkoban - JP - color.png|thumb|right|250px|[[Dark Yugi (manga)|Dark Yugi]] Tributing "[[Metal Reflect Slime (manga)|Metal Reflect Slime]]" and "[[Revival Jam (manga)|Revival Jam]]" to activate the effect of "[[The God of the Obelisk]]".]]

  * "[[Jam Defender]]", "[[Metal Reflect Slime]]", and "[[Obelisk the Tormentor]]" appear in this card's artwork.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh!|infinite ATK effect]] of "Obelisk the Tormentor", called "Soul Energy MAX", in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]. However, its effects are based on another one called "Fist of Fate", where "Obelisk" would [[Tribute|require]] two monsters to destroy the opponent's monsters and inflict 4000 damage to them.
  ** This card's artwork is taken from a scene from {{chapter|Yu-Gi-Oh!|275|ref}} during [[Dark Yugi and Dark Marik's Battle City Duel (manga)|Dark Yugi and Dark Marik's Battle City Duel]], when "Soul Energy MAX" is shown for the first time. [[Dark Yugi (manga)|Dark Yugi]] combined the effects of "[[The God of the Obelisk]]" and "[[Soul Taker (manga)|Soul Taker]]" to Tribute [[Dark Marik (manga)|Dark Marik's]] "[[Immortal God Slime (manga)|Immortal God Slime]]", treated as two monsters (its Fusion Materials, "[[Jam Defender (manga)|Jam Defender]]" and "[[Metal Reflect Slime (manga)|Metal Reflect Slime]]"), and increase its [[ATK]] to [[∞]].

