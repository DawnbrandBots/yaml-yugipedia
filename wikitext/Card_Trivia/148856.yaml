title: Card Trivia:Steelswarm Girastag
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Raid of the Inverz!!]]''.
  * Following the [[Card evolutions|evolution]] of each "[[Steelswarm]]" monster that needs at least one [[Tribute]], this monster has 200 more [[ATK]] and 1 more [[Level]] than the previous one.
  * This card is based on the [[wikipedia:Prosopocoilus giraffa|giraffe stag-beetle]]. This card's name is a combination of "Giraffe" and "Stag" (Gira-stag), and this monster's mandibles greatly resemble those of the giraffe stag-beetle.
