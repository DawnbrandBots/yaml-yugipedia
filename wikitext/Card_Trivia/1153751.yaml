title: Card Trivia:Ecclesia and the Dark Dragon
wikitext: |-
  {{Navigation}}

  * "[[Albion the Shrouded Dragon]]" and "[[Incredible Ecclesia, the Virtuous]]" appear in this card's artwork.
  ** The appearance of both monsters in this card's artwork and its [[Synchro Monster|Synchro]] [[card type|type]] reference how they were accepted as allies by the "[[Swordsoul]]" (an [[archetype]] that revolves around [[Synchro Summon]]ing), as depicted in the artwork of "[[Swordsoul Assessment]]".
  ** These monsters cannot be used to Synchro Summon this monster, due to "Albion" being Level 8; however his other forms "[[Fallen of Albaz]]" and "[[Fallen of the White Dragon]]" can be used alongside "Incredible Ecclesia".
  * This monster is a Synchro [[counterpart]] of "[[Fallen of the White Dragon]]".
  * This monster is also a Synchro counterpart of "[[Granguignol the Dusk Dragon]]".
  ** Both monsters have the same ATK, DEF, [[Attribute]], [[Type]] and [[Level]].
  ** Both monsters possess a GY effect reminiscent of the "[[Albaz Dragon]]" series, of which neither is a proper member.
