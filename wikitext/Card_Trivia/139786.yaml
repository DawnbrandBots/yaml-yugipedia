title: Card Trivia:Mind on Air
wikitext: |-
  {{Navigation}}

  [[File:Mind_on_Air_Penalty_Game.png|thumb|right|175px|[[Dark Yugi (manga)|Dark Yugi]] punishing the [[ZTV producer]] with the "Mind on Air" [[Penalty Game (manga)|Penalty Game]].]]

  * This monster's name, pose, and effect is a reference to the [[Penalty Game (manga)|Penalty Game]] of the same name from {{chapter|Yu-Gi-Oh!|042|ref}}, where [[Dark Yugi (manga)|Dark Yugi]] inflicted this penalty on the [[ZTV producer]], causing the recipient to show his inner greed on live TV.

