title: Card Trivia:Tristan, Knight of the Underworld
wikitext: |-
  {{Navigation}}

  * This monster is based on the character [[wikipedia:Tristan|Tristan]] of the Celtic legend of  ''[[wikipedia:Tristan and Iseult|Tristan and Iseult]]'', which is cited as an influence on the romance between [[wikipedia:Lancelot|Lancelot]] and [[wikipedia:Guinevere|Guinevere]].
  ** This is further supported by this monster and "[[Isolde, Belle of the Underworld]]" being ideal [[Xyz Material]] for "[[Number 23: Lancelot, Dark Knight of the Underworld]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|039|ref}}, specifically from the panel showing [[Tristan, Knight of the Underworld (manga)|this monster]] being Summoned.
