title: Card Trivia:Spell Chronicle
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts five connected points on the chronicle, reflecting its effect to allow the player to [[banish]] five cards from their [[Deck]].
  * This card has a [[Card evolutions|retrained]] counterpart: "[[Mature Chronicle]]".
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, when this card's effect places a [[Chronicle Counter]] on itself, the orange circle (likely representing the sun) and the yellow crescent shape within the black circle (likely representing a waxing crescent) glow with each Chronicle Counter in that order.
  * Even though this card's damaging effect is a non-[[activate]]d [[Continuous-like Effect]], its errata in ''[[Structure Deck: Sacred Beasts]]'' uses a colon as if it were a mandatory [[Trigger-like Effect]].
