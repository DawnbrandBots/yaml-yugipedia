title: Card Trivia:Gishki Emilia
wikitext: |-
  {{Navigation}}

  * This card was the second [[Spirit monster]] to be part of an [[archetype]], after "[[Sacred Spirit of the Ice Barrier]]". Both, plus "[[Gishki Natalia]]", are deceased characters part of [[WATER]] archetypes from the ''[[Duel Terminal]]'' storyline.
  * This monster is the daughter of "[[Gishki Noellia]]".
  * "[[Gishki Aquamirror]]" appears in this card's artwork as part of the monster's staff.
  * This monster appears in the artworks of "[[Aquamirror Cycle]]", "[[Aquamirror Illusion]]", "[[Spell Wall]]", and "[[Sacred Serpent's Wake]]". She also appears as a child in "[[Winds Over the Ice Barrier]]" and "[[After the Storm]]".
  ** The scene depicted in "Aquamirror Illusion" shows the ritual that leads to her death.
  ** The scene depicted in "Aquamirror Cycle" shows her being brought back to life by Noellia after she was freed from the "[[lswarm]]" virus.
  ** The scene depicted in "Spell Wall" immediately follows "Aquamirror Cycle". "Noellia" uses the last of her strength to protect "Avance" and the revived "Emilia", and destroys "[[Gishki Zielgigas]]".
  * This monster has two older counterparts: "[[Emilia, Dance Priestess of the Nekroz]]" and "[[Dance Princess of the Nekroz]]".
  ** All three monsters have a seashell hanging from their left hip. "[[Pilica, Descendant of Gusto]]" wears a similar one as a hairband, which according to ''[[Master Guide 4 card storylines#The Little Protector in the Great Marshland|Master Guide 4]]'', was given to her by "her best friend from the "Gishki"" as a symbol of peace between their tribes.
