title: Card Trivia:Servant of Endymion
wikitext: |-
  {{Navigation}}

  * This monster has [[Spell Counter]]s attached to her robes.
  ** In total, there are 12 Spell Counters visible on this monster.
  * This monster is "[[Witchcrafter Genni]]" before she moved to the "[[Witchcrafter]]" guild according to the [[Master Guide 6 card storylines]]. Both also have the same Type and Attribute, and this card's stats (ATK, DEF, and Level) are each three times more than Genni.
