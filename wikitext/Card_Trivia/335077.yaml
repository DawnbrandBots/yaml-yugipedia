title: Card Trivia:Performapal Secondonkey
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the words "second" and "donkey".
  ** This card is the "second donkey" referencing "[[Performapal Friendonkey]]", the first "Performapal" donkey-themed monster with a similar effect in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
