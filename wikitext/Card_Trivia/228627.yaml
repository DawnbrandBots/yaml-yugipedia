title: Card Trivia:Acorno
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mini-Guts]]" and "[[Xyz Pieces]]".
  * The pronunciation of this card's Japanese name, "Acorn Fairy" (コロボックリ ''Korobokkuri'') is a portmanteau of the Japanese word for "acorn" (ドングリ ''donguri''), and "[[wikipedia:Koro-pok-guru|korobokkuru]]", a race of small people in Ainu folklore.
