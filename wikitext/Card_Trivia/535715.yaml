title: Card Trivia:Nubian Guard
wikitext: |-
  {{Navigation}}

  * This monster's name is a reference to [[wikipedia:Nubia|Nubia]], an area which was once an independent kingdom, but now comprises parts of southern Egypt and northern Sudan.
  * This monster has a [[counterpart]] with the same [[original ATK and DEF]] that [[return]]s [[Trap Card]]s: "[[Aswan Apparition]]".
