title: Card Trivia:The Twin Kings, Founders of the Empire
wikitext: |-
  {{Navigation}}

  * This card refers to [[wikipedia:Romulus and Remus|Romulus and Remus]], two brothers who, according to a legend, were raised by a she-wolf. The former also founded Rome, which grew into the Roman Empire.
  ** This card, along with its accompanying [[Match winner]] "[[Leonardo's Silver Skyship]]", share a common Italian theme. This is fitting, as it was first given out at the [[World Championship 2014]], which was held in [[wikipedia:Rimini|Rimini]], Italy.
  * This card, along with "Leonardo's Silver Skyship", are the first [[Pendulum Monster]] [[Match winner]]s.
  ** It is also the first card to have two separate [[Match]]-[[Victory condition|winning]] effects.
