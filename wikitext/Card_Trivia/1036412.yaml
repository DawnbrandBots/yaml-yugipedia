title: Card Trivia:Epsilon The Magnet Warrior
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Epsilon|epsilon]] (ε), the fifth letter of the [[wikipedia:Greek alphabet|Greek alphabet]].
  * This monster's design features the letter "N", referencing the north pole of a magnet.
  * This monster and "[[Delta The Magnet Warrior]]" are currently the only "[[Magnet Warrior]]" monsters to not have an "Electromagnet Warrior" [[counterpart]].
