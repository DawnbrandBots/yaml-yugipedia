title: Card Trivia:Assault Synchron
wikitext: |-
  {{Navigation}}

  * This monster references the "[[Blackwing]]" [[archetype]], in terms of naming scheme and appearance.
  ** The black feathers in this card's artwork reference the Japanese name of the "Blackwing" archetype: "Black Feather".
  ** This monster's name references the "[[Assault Blackwing]]" sub-archetype and "[[Black-Winged Assault Dragon]]".
  ** This monster's 700 [[burn]] damage likely references the effect of "[[Black-Winged Dragon]]" to negate [[effect damage]], in exchange for a [[Black Feather Counter]] and 700 ATK.
  * This monster's jet-like body is based on the [[wikipedia:Lockheed SR-71 Blackbird|Lockheed SR-71 Blackbird]], the long-range high-altitude reconnaissance aircraft that reaches speeds of up to Mach 3.
  ** Fittingly, ''[[Blackbird]]'' is the name of the [[Duel Runner]] used by [[Crow Hogan]], who uses the "Blackwing" archetype in the anime.
