title: Card Trivia:Shadowknight Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Pandemonium]]".
  * This card is one of the six [[wikipedia:chess|chess]]-themed "[[Archfiend]]" cards that debuted in ''[[Threat of the Dark Demon World]]'' in the ''[[OCG]]'' and ''[[Dark Crisis]]'' in the ''[[TCG]]'', each one featuring [[wikipedia:chessboard|chessboard]] background, all of whom are based on a [[wikipedia:chess piece|chess piece]]. In this monster's case, it is based on the [[wikipedia:Knight (chess)|knight]], a horse-shaped chess piece, as this monster's design features a horse skull chestplate and horse-like legs.
  * This monster's shield and sword is similar to that of "[[Vilepawn Archfiend]]", albeit with different color.
