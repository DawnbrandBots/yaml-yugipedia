title: Card Trivia:Arcana Force III - The Empress
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Arcana Call]]" and "[[The Material Lord]]".
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Empress (Tarot card)|The Empress]].
  ** This monster's number "III" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (1300) reference how The Empress is the third trump card of the Major Arcana Tarot.
