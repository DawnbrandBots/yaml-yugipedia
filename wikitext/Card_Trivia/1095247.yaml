title: Card Trivia:Roadstar Gladimagia
wikitext: |-
  {{Navigation}}

  * There are 7 cross-shaped symbols in this card's artwork, referencing the 7 motif of the [[Sevens Road]] series.
  ** This symbol is the same as the symbol from the artwork of "[[Sevens Road Magician]]" (colored purple instead of orange).
  * This monster is a [[Contact Fusion]] counterpart of "[[Sevens Paladin]]".
  * This is the first Contact Fusion monster in ''[[Yu-Gi-Oh! Rush Duel]]'' to have a "hybrid" [[Type]] (which is thematically based on the two Types used as its [[Fusion Material]]s) exclusive to the format.
