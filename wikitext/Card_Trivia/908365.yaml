title: Card Trivia:Blaze Cannon
wikitext: |-
  {{Navigation}}
  [[File:Ra_attacks_Metal_Fiend_Token.png|thumb|right|250px|"[[The Sun Dragon Ra]]" attacks "[[Metal Fiend Token (manga)|Metal Fiend Token]]".]]

  * "[[The Winged Dragon of Ra]]" appears in this card's artwork.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "The Winged Dragon of Ra" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This card's bulleted effects are based on "Instant Attack", one of the effects of "The Winged Dragon of Ra" in the ''Yu-Gi-Oh!'' manga and anime.
  ** Its first bulleted effect is based on how "Instant Attack" allowed "Ra" to attack and make it unaffected by the opponent's card effects.
  ** Its second bulleted effect is based on how the player could [[Tribute]] their other monsters to make "Ra" gain their combined [[ATK]]/[[DEF]].
  ** Its third bulleted effect is based on how "Ra" could attack all of the opponent's monsters once each.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|270|ref}}, specifically from the panel where [[Dark Marik (manga)|Dark Marik]] attacked "[[Metal Fiend Token (manga)|Metal Fiend Token]]" with "[[The Sun Dragon Ra]]" (which he was fused with via [[Point-to-Point Transfer]]); however, this card's artwork depicts his body obscured by flames surrounding the top of "Ra's" head.

