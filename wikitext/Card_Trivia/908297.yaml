title: 'Card Trivia:Number 99: Utopia Dragonar'
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Overlay Universe]]'' and the box of ''[[Brothers of Legend]]''.
  * This monster appears in the artwork of "[[Unbreakable Xyz Barrier]]". 
  ** This monster's [[neutral form]] appears in the artwork of "[[Hyper Rank-Up-Magic Utopiforce]]".
  * This monster is a [[Rank-Up#Hyper Rank-Up|Hyper Ranked-Up]] form of "[[Number 39: Utopia Beyond]]".
  ** This monster has visual traits of both "Number 39: Utopia Beyond" and "[[Number 99: Utopic Dragon]]".
  *** This monster's effect to [[Special Summon]] a "[[Number]]" monster from the [[Extra Deck]] is a reference to the effect of "Utopic Dragon", while its effect to reduce the [[ATK]] of a monster to 0 is a reference to the effect of "Utopia Beyond".
  *** This monster was referred to as ''the end of the "Numbers"'' in promotional material for ''Structure Deck: Overlay Universe'', like "[[Number 99: Utopic Dragon (anime)|Number 99: Utopic Dragon]]" was called ''the end and the apex of the "Numbers"'' by [[Astral]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This is the only upgraded "Number" monster to have a different number than its base form.
  * This monster shares similarities with "[[Number 93: Utopia Kaiser]]":
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Rank]] (12) and [[Type]] ([[Warrior]]).
  ** Both are the ultimate forms of "Number 39: Utopia" with different numerals from the number "39".
  ** Both share an effect to Special Summon a "Number" monster from the Extra Deck with limitations.
