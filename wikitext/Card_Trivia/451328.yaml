title: Card Trivia:Kozmourning
wikitext: |-
  {{Navigation}}

  * "[[Kozmo Farmgirl]]," [[Kozmo Goodwitch]]," and an unmasked "[[Kozmoll Dark Lady]]" appear in this card's artwork.
  * The scene is a dual reference to the deaths of the two characters "Kozmoll Dark Lady" is based on, [[wikipedia:Wicked Witch of the West|Wicked Witch of the West]] in ''The Wizard of Oz'' and [[wikipedia:Darth Vader|Darth Vader]] in ''Star Wars''. This card's Japanese name, "Kozmo - Epilogue", implies this scene represents the end of the Kozmo story and the heroes' victory, but at tragic cost.
  ** In ''Star Wars'', Darth Vader was revealed to be [[wikipedia:Luke Skywalker|Luke Skywalker's]] father. It is possible that "Kozmoll Dark Lady" could be related to "Kozmo Farmgirl".
