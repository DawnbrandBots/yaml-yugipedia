title: Card Trivia:Protective Soul Ailin
wikitext: |-
  {{Navigation}}

  * This card is [https://www.facebook.com/L8onK/posts/10210654439052572 based on] Ailin Kurashima, the son of former UDE Product Manager Leighton Kurashima, who passed away hours after birth. The card "[[Indomitable Fighter Lei Lei]]", which it equips to, is based on Leighton, as his nickname is "Lei Lei".
  * This card features similarities with "[[Second Goblin]]", as both cards are [[Union monster]]s that can be equipped to specific monsters ("[[Giant Orc]]" for "Second Goblin", and "Indomitable Fighter Lei Lei" for this card), both of which features identical effects.
