title: Card Trivia:Puppet Queen
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Queen (chess)|queen]], the most powerful [[wikipedia:Chess piece|chess piece]] resembling a pointed crown.
  ** This monster's ''[[OCG]]''/''[[TCG]]'' effect supporting "[[Puppet King]]" references how the game of [[wikipedia:Chess|chess]] starts with the queen and [[wikipedia:King (chess)|king]] placed together in the center rank.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|R|019|ref}}, specifically from the panel showing [[Puppet Queen (manga)|this monster]] being Summoned.
