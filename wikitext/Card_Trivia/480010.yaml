title: Card Trivia:En Moon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The uppercase [[wikipedia:Greek letter|Greek letter]] [[wikipedia:sigma|sigma]] (Σ) appears in this card's artwork.
  ** The sigma symbol is a [[wikipedia:Mathematics|mathematical]] symbol used to indicate the [[wikipedia:Summation|sum]], which is reflected in this card's effect relating to [[Fusion Monster]]s, which are the "sum" of their [[Fusion Material]]s. Fittingly, this card was also used to create [[Celina's bracelet]], which represents [[Fusion Summon]]ing.
  ** The sigma can also be seen as the number "4", correlating to the "=" in the artwork of "[[En Flowers]]", as part of the mathematical formula for the number [[wikipedia:Pi|pi]].
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this was the card that created [[Celina]] and [[Yuri]] when [[Ray Akaba]] and [[Z-ARC]] separated their personalities.
  * This card's effect to [[negate]] the effects of all Fusion Monsters is a reference to the fact that it was created to counter "[[Starving Venom Fusion Dragon (anime)|Starving Venom Fusion Dragon]]" in the anime.
