title: Card Trivia:Destiny Board
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s for ''[[Duelist Legacy Volume.3]]'' and the Japanese version of ''[[Labyrinth of Nightmare (Japanese)|Labyrinth of Nightmare]]''.
  * The board in the Japanese version of this card's artwork appears in the artwork of "[[Sentence of Doom]]".
  * The hand of "[[Dark Necrofear]]" appears in this card's Japanese artwork.
  * This card is based on a [[wikipedia:Ouija|Ouija board]], a flat board used in a séance to communicate with the spirits of the dead, which consists of the English alphabet, the numbers "0" through "9", and the words "yes", "no", "hello", and "goodbye".
  ** A Ouija board requires a [[wikipedia:Planchette|planchette]] (a small heart-shaped piece of wood or plastic) to be used as a movable indicator for spirits to spell out messages. In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], the planchette is used by the ghost of "Dark Necrofear" to spell out the letters featured in this card's artwork and the artworks of the "[[Spirit Message]]" cards.
  * In Japanese, this card and the "Spirit Message" cards collectively spell out the English word, "DEATH", while in all other languages, they spell out the English word, "FINAL".
  * This card and its "Spirit Messages" can be considered comparable to "[[Exodia the Forbidden One]]" and the "[[Forbidden One]]" monsters:
  ** Both feature a [[victory condition]] that involves five specific cards.
  ** The "Forbidden One" cards are all [[Monster Card]]s, while this card and the "Spirit Message" cards are all [[Spell]]/[[Trap Card]]s, both with subcategories of their respective [[card type]]s.
  *** Specifically, the cards that list the victory condition are different from their related cards, with "Exodia the Forbidden one" being an [[Effect Monster]] while the other "Forbidden One" monsters are [[Normal Monster]]s, and "Destiny Board" is a [[Continuous Trap Card]] while the "Spirit Message" cards are [[Continuous Spell Card]]s).
  *** Another interesting fact is that they represent a specific monster, with "The Forbidden One" cards representing "Exodia" and "Destiny Board" representing "Dark Necrofear". The former belonged to [[Yugi Muto]]/[[Yami Yugi]] and the latter belonged to [[Bakura Ryou]]/[[Yami Bakura]], both of which are major characters who are vessels of spirits residing in different [[Millennium Items]] in the ''Yu-Gi-Oh!'' manga and anime.
  * In the ''Yu-Gi-Oh!'' video games, this card's victory condition features different special animation sequences:
  ** In the ''[[Yu-Gi-Oh! Tag Force]]'' series, "Dark Necrofear" rises from the darkness to complete the board's message before the sequence ends with a bright flash.
  ** In ''[[Yu-Gi-Oh! Duel Links]]'', "Dark Necrofear" (as depicted its card artwork) appears behind the board's message.
  ** In ''[[Yu-Gi-Oh! Master Duel]]'', the sequence uses an animated version of the artwork of "Sentence of Doom".
  * This card's Japanese artwork is taken from {{chapter|Yu-Gi-Oh!|205|ref}}, specifically from the panel where the letter "D" materializes in midair, albeit with minor changes in details.
