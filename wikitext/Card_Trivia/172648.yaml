title: Card Trivia:Novox's Prayer
wikitext: |-
  {{Navigation}}

  * "[[Lo, the Prayers of the Voiceless Voice]]" appears in this card's artwork.
  ** This card marks the first appearance of "Lo, the Prayers of the Voiceless Voice" over 22 years and 7 months in the Japanese ''[[OCG]]'' before its release in ''[[Phantom Nightmare]]''.
