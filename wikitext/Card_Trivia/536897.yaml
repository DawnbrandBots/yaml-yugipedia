title: Card Trivia:Vampire Genesis
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Zombie Madness]]'', and is also one of the cover cards of ''[[Structure Deck: Special Set]]''.
  * This monster appears in the artworks of "[[Genesis Crisis]]" and "[[Zombie World]]".
  * This monster's name is likely derived from the original legend behind Dracula, who is believed to have attained his vampire-hood by striking a deal with the Devil for immortality; this may also explain the demonic appearance of this monster.
