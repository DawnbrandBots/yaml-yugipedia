title: Card Trivia:Carrier Manta Ray
wikitext: |-
  {{Navigation}}

  * Multiple "[[Charge Remora]]" appear in this card's artwork.
  ** This references the real-life [[wikipedia:Symbiotic relationship|symbiotic relationship]] between [[wikipedia:Manta ray|manta ray]]s and [[wikipedia:Remora|remora]]s, where remoras will remove [[wikipedia:ectoparasite|ectoparasites]] from their manta ray hosts, while the manta rays help remoras gain better access to food and shelter.
  * This monster appears in the artwork of "[[Fish Missile Launcher]]".
