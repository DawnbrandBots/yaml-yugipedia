title: Card Trivia:Fallen Paradise of the Sacred Beasts
wikitext: |-
  {{Navigation}}

  * "[[Hamon, Lord of Striking Thunder]]", the foreground from the artwork of "[[Fallen Paradise]]", and three of the [[Spirit Gates]] appear in this card's artwork.
  * This card is a [[retrained]] "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] counterpart of "Fallen Paradise".
  ** This card's first effect is a reference to the [[Summoning condition]]s of the three Sacred Beasts, who can only be [[Special Summon]]ed by [[send]]ing three cards of the same type to the [[Graveyard]]: [[Monster]] (used to Summon "[[Raviel, Lord of Phantasms]]"), [[Spell]] (used to Summon "Hamon, Lord of Striking Thunder"), and [[Trap]] (used to Summon "[[Uria, Lord of Searing Flames]]").
  *** The last part of this effect that makes the summoned "Sacred Beast" monster [[unaffected]] by the opponent's activated Spell/Trap effects is based on the effect of "[[Uria, Lord of Searing Flames (anime)|Uria, Lord of Searing Flames]]", "[[Hamon, Lord of Striking Thunder (anime)|Hamon, Lord of Striking Thunder]]", and "[[Raviel, Lord of Phantasms (anime)|Raviel, Lord of Phantasms]]" in the ''[[Yu-Gi-Oh! GX]]'' anime, which makes them unaffected by the effects of Trap Cards, and only affected by the effects of Spell Cards during the turn they are activated.
  ** This card's effect to [[draw]] two cards if the player [[control]]s a "Sacred Beast" monster whose original [[Level]] is 10 is based on the effect of "Fallen Paradise", which allows the player to draw two cards if they control "Uria, Lord of Searing Flames", "Hamon, Lord of Striking Thunder", and/or "Raviel, Lord of Phantasms", whose Levels are 10.
  *** The ''[[OCG]]''/''[[TCG]]'' effect of "Fallen Paradise" also mentions "[[Armityle the Chaos Phantasm]]"; however, in the context of this card's [[condition]], in the ''Yu-Gi-Oh! GX'' anime, [[Kagemaru]] controlled "[[Fallen Paradise (anime)|Fallen Paradise]]" and the three Sacred Beasts, which predate the first appearance of "[[Chaos Phantasm Armityle]]".
  *** This effect also works alongside "[[Phantasmal Sacred Beasts of Chaos]]", a [[Level 10]] "Sacred Beast" [[Fusion Monster]] that depicts the three Sacred Beasts, referencing a scene in {{episode|GX|049|ref}} where Kagemaru controls all three Sacred Beasts while also controlling "Fallen Paradise".
