title: Card Trivia:Jelly Hole
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Jellyfish]]", and the cards "[[Anti Raigeki]]", "[[Mystical Moon]]", and "[[Rocket Warrior]]" appear in this card's artwork.
  ** The aforementioned cards reference the cards used in [[Mako Tsunami]]'s two major [[Duel]]s during the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  *** "Anti Raigeki" and "Mystical Moon" reference Mako's Duel against [[Yugi Muto]] during the [[Duelist Kingdom]] tournament. "[[Jellyfish (anime)|Jellyfish]]" demonstrated its power to nullify lightning-based attacks (similar to "Anti Raigeki's" effect to counter the lightning-based "[[Raigeki]]"), while Yugi's "[[Full Moon]]" played a key role in Mako's defeat for its effect on the in-game tides.
  *** "Rocket Warrior" references Mako's Duel against [[Joey Wheeler]] in the [[Battle City]] tournament, in which "[[Rocket Warrior (anime)|Rocket Warrior]]" made its debut. In the same turn of the Duel, Mako Tributed "Jellyfish" and "[[Great White (anime)|Great White]]" to [[Ritual Summon]] "[[Fortress Whale (anime)|Fortress Whale]]", and then attacked and destroyed "Rocket Warrior" with "[[The Legendary Fisherman (anime)|The Legendary Fisherman]]".
