title: Card Trivia:Vouiburial, the Dragon Undertaker
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "[[wikipedia:Guivre|voivre]]" and "burial".
  ** "Vouivre" is the alternate spelling of "guivre", a serpentine dragon from European folklore who possessed a venomous breath and prowled the countryside of Medieval France.
  * This is the first ''[[TCG]]''-[[TCG-only|exclusive]] [[Illusion]] monster.
