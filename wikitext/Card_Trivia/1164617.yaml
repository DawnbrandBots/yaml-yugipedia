title: Card Trivia:Blue-Eyes White Dragon, the White Phantom Beast
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Blue-Eyes White Dragon]]".
  ** This monster's effect to [[destroy]] all monsters on the opponent's field references "[[Burst Stream of Destruction]]", which destroys all monsters on the opponent's field if the player [[control]]s "Blue-Eyes White Dragon".
  ** This monster's effect to protect it from being [[target]]ed may be a reference to "[[Blue-Eyes Shining Dragon]]."
  * This monster is a counterpart to "[[Dark Magician the Magician of Black Magic]]". Each of their names is a combination of the original card they are based on ("Blue-Eyes White Dragon" and "[[Dark Magician]]") and the term used for their respective ''[[ka]]'' in the hieroglyphs on the [[Tablet of Lost Memories]] ("White Phantom Beast" and "Magician of Black Magic").
  ** The terms are first mentioned in {{chapter|Yu-Gi-Oh!|146|ref}}, which is later adapted in the ''[[Yu-Gi-Oh! Forbidden Memories]]'' manual and {{episode|Yu-Gi-Oh!|52|ref}}.
  ** "White Phantom Beast" (白き幻獣) is localized in English as "White Dragon" in the manga and "Mystic White Beast" in the ''Forbidden Memories'' manual. No equivalent term is used in the English anime.
