title: Card Trivia:Chow Len the Prophet
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[War of the Giants Reinforcements]]'' and ''[[War of the Giants: Round 2]]''.
  * This monster shares a relationship with "[[Anarchist Monk Ranshin]]" and "[[Kycoo the Ghost Destroyer]]".
  ** All monsters are monk-like figures with spiritual connotations who wear masks on different parts of their faces.
  ** All monsters share the same [[Level]] (4), [[Type]] ([[Spellcaster]]), and [[original ATK]] (1800).
