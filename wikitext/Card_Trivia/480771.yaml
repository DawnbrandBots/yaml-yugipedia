title: Card Trivia:B.E.S. Big Core MK-3
wikitext: |-
  {{Navigation}}

  * "[[Falchionβ]]" appears in this card's artwork.
  * The [[B.E.S.|Bacterium Empire Series]] are the main bosses in [[Konami]]'s ''[[wikipedia:Gradius (series)|Gradius]]'' video games. "Big Core" serves as the standardized design, with [[B.E.S.|every other ship]] following the same principles: A central power core protected by a set of [[wikipedia:ablative armor|ablative]] barriers. Sometimes following a famous on-screen prompt to "SHOOT THE CORE!", the [[Gradius|player's]] [[Victory Viper XX03|ship]] must destroy the barriers, then the power core, in order to defeat the boss, all while dodging enough weapon's fire to typically fill the game screen.
  ** In this case, this card is based on the [[fandom:w:c:gradius:Big Core MK III|Big Core MK III]], the third boss to be dubbed "Big Core" that debuted in ''Gradius III''. This card's artwork depicts the initial attack patterns of "Big Core MK III" which involves giant lasers shooting out of its wings and reflective lasers that bounce off the lasers.
  * This card is the upgraded and powerful version of "[[B.E.S. Big Core]]".
  * This is the only "B.E.S." monster that gains counters both when [[Normal Summon]]ed and [[Special Summoned]].
  * This card's first effect may be a nod to the [[Anime-only|anime-exclusive]] "[[B.E.S. Assault Core]]", as both cards are [[LIGHT]] [[Attribute]] "B.E.S." monsters that can Special Summon themselves when you control no monsters but your opponent does.
  ** His effect of returning all "B.E.S." Monsters back to the Deck might be a nod to Lorenzo having "[[Pot of Avarice]]" on his Deck.
