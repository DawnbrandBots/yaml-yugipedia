title: Card Trivia:Vande the Electric Lion
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Robert J. Van de Graaff|Robert J. Van de Graaff]], the inventor of the [[wikipedia:Van de Graaff generator|Van de Graaff generator]], an electrostatic generator that uses a hollow metal globe to produce static electricity, which appears on this monster's chest.
  ** This monster's Japanese title, "Electric Lion" (電獅子, ''Denshishi'') is a portmanteau of the words "electron" (電子, ''denshi'') and "lion" (獅子, ''shishi'').
