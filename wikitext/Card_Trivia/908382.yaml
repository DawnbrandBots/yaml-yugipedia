title: Card Trivia:Dogmatika Punishment
wikitext: |-
  {{Navigation}}

  * "[[Dogmatika Fleurdelis, the Knighted]]" and "[[Titaniklad the Ash Dragon]]" appear in this card's artwork.
  ** The events in this card's artwork are continued from the artwork of "[[Nadir Servant]]": after "[[Fallen of Albaz]]" has crashed in the "[[Dogmatika Nation]]" as "Titaniklad", it is defeated and knocked down by "Fleurdelis" with a lightning strike. The events in this card's artwork are continued in the artwork of "[[Dogmatika Encounter]]".
  ** In ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'', it is revealed that this event resulted into "Fallen of Albaz" losing his left eye.
