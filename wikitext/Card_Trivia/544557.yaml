title: Card Trivia:Trickstar Bella Madonna
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the ''[[wikipedia:Atropa belladonna|Atropa belladonna]]'', a species of toxic perennial herbaceous plants, which appears as the symbols on the corners of this card's artwork.
  ** This monster's name is also based on [[wikipedia:Madonna (art)|Madonna]], a representation of the [[wikipedia:Mary, mother of Jesus|Virgin Mary]] who is commonly used as iconography in Catholic and Orthodox churches.
