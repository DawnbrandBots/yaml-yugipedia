title: Card Trivia:Sorcerer of Sebek
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Sobek|Sebek]], the ancient Egyptian god who is depicted with the head of a crocodile.
  ** This monster is depicted carrying the same staff and mirror as the crocodilian entity depicted in the artwork of "[[Sebek's Blessing]]", which also shares the same effect increasing the player's [[Life Point]]s equal to the amount of [[battle damage]] inflicted to the opponent.
