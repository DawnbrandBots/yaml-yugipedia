title: Card Trivia:Key Mace 2
wikitext: |-
  {{Navigation|Key Mace #2}}

  * This card has two counterparts: "[[Key Mace]]" and the character [[Gate Mace]].
  ** This relationship is further supported by the English translation of this card's Japanese name, "Lock Mace".
  * This monster appears in the artwork of "[[Speed Spell - Ignition]]".
