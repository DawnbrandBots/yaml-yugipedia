title: Card Trivia:Desert Twister
wikitext: |-
  {{Navigation}}

  * This monster may be based on [[wikipedia:dust devil|dust devils]], a twister that forms in the desert, which are usually weaker than even the lowest-strength [[wikipedia:tornado|tornadoes]].
  ** This monster's appearance and [[Fiend]] [[Type]] are puns on the name of the dust devil.
  * This monster has a [[WATER]] and [[FIRE]] [[counterpart]] that destroys [[Monster Card]]s: "[[Frost and Flame Dragon]]".
