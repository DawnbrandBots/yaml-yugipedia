title: 'Card Trivia:Number XX: Utopic Dark Infinity'
wikitext: |-
  {{Navigation}}

  * This is the first "[[Number]]" monster to lack an actual number in its name.
  ** Similar to how the other "Number" monsters have their number depicted somewhere in their design, this monster has two English letters "X" on its shield depicted in the [[Barian glyphs|Barian glyph]] style.
  *** The English letter "X" is used in [[wikipedia:Mathematics|mathematics]] to represent an unknown value or number, which reflects how this monster is its own "Number".
  *** The English letter "X" is also the Roman numeral for the number "10", which reflects its [[Rank]] (10).
  * This is the first "Number" monster to debut outside the ''Yu-Gi-Oh! ZEXAL'' [[Yu-Gi-Oh! ZEXAL|anime]] and [[Yu-Gi-Oh! ZEXAL (manga)|manga]], debuting in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
  * In the ''Yu-Gi-Oh! ARC-V'' manga, [[No. XX Infinity Dark Hope (manga)|this card]] has its Rank strangely aligned to the right side instead of its left side. 
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|ARC-V|033|ref}} showing this monster being Summoned, while the design of its head facing the player is taken from a a panel from the same chapter showing this monster standing alongside "[[Phantasm Emperor Trilojig (manga)|Phantasm Emperor Trilojig]]", and "[[Timelord Progenitor Vorpgate (manga)|Timelord Progenitor Vorpgate]]".
