title: Card Trivia:Hazy Flame Sphynx
wikitext: |-
  {{Navigation}}

  * This card's effect is reminiscent of the effect of "[[Ordeal of a Traveler]]".
  * This monster is based on the female [[wikipedia:Sphinx|Sphinx]] of [[wikipedia:Greek mythology|Greek mythology]].
  * In {{episode|Yu-Gi-Oh! ARC-V|126|ref}}, this monster was shown to have the [[wikipedia:Thermoregulation|body temperature]] of 29.7 °[[wikipedia:Celsius|C]] (85.46 °[[wikipedia:Fahrenheit|F]]).
