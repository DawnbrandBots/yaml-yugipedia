title: Card Trivia:Stumbling
wikitext: |-
  {{Navigation}}

  * This card has non-WATER counterpart: [[Eisbahn]]
  * The monster featured on the card "Stumbling" is "[[Gagagigo]]".
  * "Gagagigo" appears to be stepping in the jaw of a skeletal "[[Berserk Gorilla]]". Berserk Gorilla is destroyed if it's faceup in defense mode, so this card would destroy it.
  * The valley of skulls he's walking through may be related to why he became so determined to stop "[[Invader of Darkness]]" that he was willing to corrupt himself with cybernetics and, later on, truly lose his heart to the darkness - a common arc for characters who base their quest on stopping a figure of evil.
