title: Card Trivia:Battle of the Elements
wikitext: |-
  {{Navigation}}

  * "[[Blizzard Warrior]]" and "[[Flamvell Archer]]" appear in this card's artwork.
  ** This card's artwork suggests a conflict between the "[[Flamvell]]" [[archetype]] and the "[[Ice Barrier]]" archetype, referencing how both archetypes are themed after the opposing [[Attribute]]s of [[FIRE]] and [[WATER]].
