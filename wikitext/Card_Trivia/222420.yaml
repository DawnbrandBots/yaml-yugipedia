title: Card Trivia:Mogmole
wikitext: |-
  {{Navigation}}

  * This card's name is a combination of ''Mogura'' (Japanese for "[[wikipedia:Mole (animal)|mole]]") and ''Mole''.
  * The card shares the same Attribute, Level, ATK and DEF as "[[Quillbolt Hedgehog]]".
  ** They both are also based on a certain type of rodent: "Quillbolt Hedgehog" being a hedgehog and "Mogmole" being a mole.
  * This monster may be inspired by Simon of the anime "[[wikipedia:Tengen Toppa Gurren Lagann|Gurren Lagann]]", who started off in the show wearing a pair of large red goggles, and carried a hand-held drill similar to this card. Also, Simon's companion, Buuta, is a mole-like creature known as a Pig Mole.
