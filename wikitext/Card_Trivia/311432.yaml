title: Card Trivia:Hexatellarknight
wikitext: |-
  {{Navigation}}

  * "[[Stellarknight Triverr]]" and "[[Stellarknight Delteros]]" appear in this card's artwork, using a barrier in the shape of the [[wikipedia:Winter Hexagon|Winter Hexagon]] against some "[[Shaddoll]]" monsters.
  ** The green mass in the background at left could belong to "[[Naturia Sacred Tree]]", suggesting that Trihiver and Delteros are defending it from the Shaddoll forces.
