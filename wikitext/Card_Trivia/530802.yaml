title: Card Trivia:Linkerbell
wikitext: |-
  {{Navigation}}

  * This card's pixie-like appearance, name and bell-hat reflect a wordplay based on "[[wikipedia:Tinker Bell|Tinker Bell]]".
  * The position of the 2 red tips over this monster's legs (lower right, lower left) is the same as the position of its [[Link Arrow]]s.
  * This monster appears in the artwork of "[[Link Back]]".
