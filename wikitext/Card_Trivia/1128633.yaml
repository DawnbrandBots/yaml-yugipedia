title: Card Trivia:Xyz Bento
wikitext: |-
  {{Navigation}}

  * This card is based on a ''[[wikipedia:Bento|bento]]'', a Japanese-style single-portion take-out or home-packed meal, which typically includes rice, and is packaged in a box with a lid.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to change the [[battle position]] of a monster [[Special Summon]]ed from the [[Extra Deck]] is specifically designed to supplement the [[negate|negation]] effect of "[[Number 22: Zombiestein]]", which renders it vulnerable by changing to [[Defense Position]], possessing only 1000 [[DEF]] in contrast to its 4500 [[ATK]].
  ** This references a scene in {{chapter|ZEXAL|017|ref}}, where [[Cologne]] uses [[Xyz Bento (manga)|this card]] to attach an [[Xyz Material]] to "[[No. 22: Zombiestein (manga)|No. 22: Zombiestein]]". In the manga, the effect of "Zombiestein" did not need to change itself to Defense Position to negate card effects.
