title: Card Trivia:Cupid Volley
wikitext: |-
  {{Navigation}}

  * This monster's name and design reference the sport of [[wikipedia:Volleyball|volleyball]], with this monster's outfit being based on that worn by volleyball players, and the [[wikipedia:Volleyball (ball)|volleyball]] being used as the tip of this monster's arrow.
  ** This monster's name is also a pun on "[[wikipedia:Volley fire|volley fire]]", a military tactic where soldiers shoot in the same direction en masse, whereas this monster's case is a bow and arrows.
  ** This monster's Japanese name, "High Cupit" (ハイ・キューピット, ''Hai Kyūpitto'') is a play on the Japanese name of "volleyball" (排球, ''haikyū'').
