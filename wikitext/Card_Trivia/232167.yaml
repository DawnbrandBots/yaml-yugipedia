title: Card Trivia:Brotherhood of the Fire Fist - Dragon
wikitext: |-
  {{Navigation}}

  * In the ''[[OCG]]'', this card is named after ''[[wikipedia:Shi Jin|Shi Jin]]'' (read in Japanese as Shi Shin) and "dragon" (ryū).
  ** ''Shi Jin'' ranks 23rd of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "Nine tattooed Dragons".
  * The kanji 微 on this monster's belt and the dragon in this card's artwork means "faint/dim."
  * The [[Duelist League 18 participation cards]] Spanish prints of this card have their name in Portuguese ("''Irmandade do Punho de Fogo - Dragão''") instead of in Spanish ("''Hermandad del Puño de Fuego - Dragón''").
  * This monster appears in the artwork of "[[Fire Formation - Tensen]]".
