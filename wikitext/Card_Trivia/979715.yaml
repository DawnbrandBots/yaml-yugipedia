title: Card Trivia:Duamutef, Blessing of Horus
wikitext: |-
  {{Navigation}}

  * A carving of this monster appears in the artwork of "[[Walls of the Imperial Tomb]]".
  * This monster is named after a [[wikipedia:Four sons of Horus|Duamutef]], one of the four sons of [[wikipedia:Horus|Horus]] depicted with the head of a jackal, who represents the [[wikipedia:Canopic jar|canopic jar]] of the stomach in [[wikipedia:Egyptian mythology|Egyptian mythology]].
  ** According to Egyptian mythology, Duamutef is under the protection of [[wikipedia:Neith|Neith]], the Egyptian goddess of water, which reflects this monster's [[WATER]] [[Attribute]].
  ** This monster shares its [[original ATK and DEF]] (0/0) with "[[Nunu, the Ogdoadic Remnant]]", a monster based on [[wikipedia:Nu (mythology)|Nu]], the ancient personification of the primordial waters of chaos.
