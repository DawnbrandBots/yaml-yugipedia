  * The design of [[Maximillion J. Pegasus]] in this card's artwork is taken from his Summoning cut-in/victory pose from ''[[Yu-Gi-Oh! Duel Links]]'', while the design of "[[Toon World]]" (located beneath "[[Toon Summoned Skull]]") is taken from its first ''[[OCG]]''/''[[TCG]]'' artwork.
