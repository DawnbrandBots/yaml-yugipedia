title: Card Trivia:Vic Viper Type-L
wikitext: |-
  {{Navigation}}

  * This monster is based on the spacefighter of the same name appearing in ''{{wikia|gradius|Salamander III}}'', a spin-off of Konami's ''[[wikipedia:Gradius|Gradius]]'' series, which was released in August 2025 as part of ''{{wikia|gradius|Gradius Origins}}'' compilation.
  ** Alongside ''Gradius Origins'', the expansion of the "[[B.E.S.]]" [[archetype]] in ''[[Burst Protocol]]'' and the debut of "[[Gradius (Rush Duel)|Gradius]]" in ''[[Yu-Gi-Oh! Rush Duel]]'' all celebrate the 40th anniversary of the ''Gradius'' franchise.
