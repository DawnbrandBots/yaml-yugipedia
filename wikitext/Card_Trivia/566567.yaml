title: Card Trivia:Red-Eyes Zombie Necro Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Undead World]]'', as well as one of the cover cards of ''[[Structure Deck: Zombie Horde]]''.
  * This monster appears in the artworks of "[[Zombie Necronize]]" and "[[Zombie Power Struggle]]".
  * "[[Soul-Absorbing Bone Tower]]" and "[[Zombie World]]" appear in this card's artwork.
  * This monster is a [[retrained]] [[Synchro Monster|Synchro]] counterpart of "[[Red-Eyes Zombie Dragon]]".
  ** This monster is the [[Zombie counterpart]] of "[[Red-Eyes Darkness Dragon]]".
  ** According to the [[Master Guide 6 card storylines#File No. 06: The World of the Immortal Undead Is in the Midst of a Constant Struggle for Supremacy...|Master Guide 6 card storylines]], "Red-Eyes Zombie Dragon" transformed into this monster by absorbing the miasma that fills the air of "Zombie World", which may be the blue flames surrounding this monster's body, in order to defeat "[[Doomking Balerdroch]]".
  * This monster has an [[Card evolutions|upgraded]] form, combined with "Doomking Balerdroch": "[[Red-Eyes Zombie Dragon Lord]]".
  ** "Red-Eyes Zombie Dragon" likely managed to defeat "Balerdroch" and took its power, after their battle described in Master Guide 6.
