title: Card Trivia:Sky Striker Ace Token
wikitext: |-
  {{Navigation|mode=Token}}

  * "[[Sky Striker Ace - Raye]]" appears in this card's artwork.
  ** This card's artwork depicts the drones from the artwork of "[[Sky Striker Mecha - Hornet Drones]]" projecting a holographic image of "Sky Striker Ace - Raye" in an extremely similar way to the "quantum decoy" technology employed by "[[Mecha Phantom Beast]]" monsters to generate their own "[[Mecha Phantom Beast Token]]s".
