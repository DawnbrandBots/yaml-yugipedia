title: Card Trivia:Eliminating the League
wikitext: |-
  {{Navigation}}

  * The 3 "[[Ojama Yellow]]s" from the artworks of "[[The League of Uniform Nomenclature]]" and "[[Treaty on Uniform Nomenclature]]" appear in this card's artwork.
  ** The effects of all three cards involve multiples copies of a card.
  * This card's Japanese name references "[[wikipedia:Criminal punishment in Edo-period Japan|confiscation of property]]" (お家取り潰し) in [[wikipedia:Japan|Japan]] during the [[wikipedia:Edo Period|Edo Period]], a form of legal punishment where one's house and assets would be confiscated if one committed a crime.
