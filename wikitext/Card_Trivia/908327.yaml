  [[File:Duel Tower landscape - manga.png|thumb|right|200|[[KaibaCorp Island Duel Tower|Duel Tower]], as seen in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]''.
  * The [[KaibaCorp Island Duel Tower]] appears in this card's artwork.
  ** This card's first effect to make both players [[reveal]] and [[banish]] a monster from their [[Deck]] references the method used to determine the turn order in the [[Battle City battle royal (manga)|Battle Royal]] during the [[Battle City]] finals, which took place in the Duel Tower in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (manga)|anime]]: before the Battle Royal, each player chose a monster to remove from their Deck, with the player who chose the monster with the highest [[ATK]] going first followed by each player in descending order of their monster's ATK.
  ** This card's last effect to [[destroy]] all cards on the [[field]] on the player's next [[End Phase]] after activation is a reference to a scene in {{chapter|Yu-Gi-Oh!|277|ref}} and {{episode|Yu-Gi-Oh!|143|ref}}, where [[Seto Kaiba]] announced that, at the end of the Battle City finals, the Duel Tower would have been detonated in one hour, giving [[Yugi Muto]] and his friends the time to escape. Kaiba later followed up with the detonation in order to put his memories of [[Gozaburo Kaiba]] behind him.

