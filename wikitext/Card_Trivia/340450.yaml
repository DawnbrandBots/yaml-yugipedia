title: Card Trivia:Junkuriboh
wikitext: |-
  {{Navigation}}

  * This monster's appearance features a [[criminal mark]], similar to the one worn by its owner, [[Yusei Fudo (manga)|Yusei Fudo]].
  * This is the only "[[Kuriboh (archetype)|Kuriboh]]" monster whose [[Attribute]] is neither [[DARK]] nor [[LIGHT]], instead being [[EARTH]].
  * Before this monster's debut in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, [[Yusei Fudo]] was the only protagonist not to possess a "Kuriboh" monster, breaking the tradition of every protagonist possessing their own "Kuriboh" monster. [[Yugi Muto]] had "[[Kuriboh (anime)|Kuriboh]]", [[Jaden Yuki]] had "[[Winged Kuriboh (archetype)|Winged Kuriboh]]" and [[Yuma Tsukumo]] had "[[Rainbow Kuriboh]]".
  ** This is also the first "Kuriboh" monster used by the protagonist to have its anime/manga effect altered upon release in the ''[[OCG]]''/''[[TCG]]''. In the manga, this monster's effect could [[negate]] [[battle damage]] and [[effect damage]] that would reduce the player's [[Life Point]]s to 0, while in the ''OCG''/''TCG'', it is conditioned to negate the [[activate|activation]] of an opponent's card that would be inflict effect damage.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh! 5D's - Ride SP2|ref}}, specifically from the panel showing [[Junkuriboh (manga)|this monster]] materializing while using its effect.
