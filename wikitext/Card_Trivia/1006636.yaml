title: Card Trivia:Doll Monster Bear-Bear, Customized
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Kumacchi", features the honorific "-chi", which is used to describe someone or something in a "cuter" way.
  * This monster is the [[Card evolutions|customized]] form of "[[Doll Monster Bear-Bear]]".
  ** Visually, this monster is "Doll Monster Bear-Bear" with the leg of "[[Doll Monster Mr. Dragon]]" sewn onto its head.
  * This monster has a re-customized form: "[[Doll Monster Bear-Bear, Re-Customized]]".
