title: Card Trivia:Oh F!sh!
wikitext: |-
  {{Navigation}}

  * "[[Fly-Fang]]" and the goblin from the artworks of "[[Trap Hole]]", "[[Treacherous Trap Hole]]", "[[Giant Trap Hole]]" and "[[Traptrix Trap Hole Nightmare]]" appear in this card's artwork.
  * This card's English name references profanity.
  ** The "!" replaces the "i" in "fish" similar to how vulgarities are censored by replacing some or all letters with symbols.
  ** "Fish" is a commonly-used substitute for a vulgarity.
  * This card's Japanese name is a pun between "shock/fright" and "fish", which can both be pronounced ギョッ ''gyo''.
  ** It may also reference the Japanese horror manga [[wikipedia:Gyo|Gyo]], in which fish begin to crawl on land thanks to machines powered by their internal gases. In a famous scene, the main characters are attacked by a shark on dry land.
