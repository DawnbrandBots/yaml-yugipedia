title: Card Trivia:Qliphort Stealth
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Qliphort Alias" ({{name|Qliphort Stealth|ja}}, ''{{romanized name|Qliphort Stealth|ja}}'') is a pun on "alias" (referencing [[wikipedia:Aliasing (computing)|computing aliasing]], a situation in which a data location in memory can be accessed through different symbolic names in the program) and "Iweleth" (エーイーリー ''Ēīrī'', lit. "stupidity"), the second [[wikipedia:Qliphoth|Qliphoth]] emanation which is associated with the [[wikipedia:Devil|Devil]] [[wikipedia:Beelzebub|Beelzebub]].
