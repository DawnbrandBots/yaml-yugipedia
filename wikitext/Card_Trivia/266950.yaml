title: Card Trivia:Duck Fighter
wikitext: |-
  {{Navigation}}

  * This card is specifically designed to work with the "[[Mecha Phantom Beast]]" archetype, as it is a [[Machine]]-[[Type]] [[WIND]] monster that uses [[Token]]s for its effect.
  ** This relationship is also supported by the fact that this monster is based on an animal (like all "Mecha Phantom Beast" monsters). In this case, this monster is modeled after a [[wikipedia:Duck|duck]].
  ** This card's name is a pun on the word "dogfight".
  ** It could also be a reference to the word ''canard'', meaning the front-mounted flying surfaces of an airplane, which is also the French word for duck.
