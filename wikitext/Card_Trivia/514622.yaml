title: Card Trivia:Genex Ally Triforce
wikitext: |-
  {{Navigation}}

  * This monster's name uses the prefix "tri-", which is commonly associated with the number "3", which reflects this monster's triple-barreled blaster weapon and its effect listing three specific [[Attribute]]s.
  * This monster is a polar opposite [[counterpart]] of "[[Genex Ally Triarm]]":
  ** Both feature opposite color schemes; this monster's armor is white, while "Triarm's" armor is black.
  ** Both wear their blaster weapons on opposite arms; this monster wears it on its right arm, while "Triarm" wears it on its left arm.
  ** Both have different effects that depend on opposite Attributes; this monster uses the [[EARTH]], [[FIRE]] and [[LIGHT]] Attributes, while "Triforce" uses the [[WIND]], [[WATER]], and [[DARK]] Attributes.
