title: Card Trivia:Ancient Chant
wikitext: |-
  {{Navigation}}

  * "[[The Winged Dragon of Ra]]" appears in this card's artwork, transforming from its "[[The Winged Dragon of Ra - Sphere Mode|sphere form]]".
  ** This card references the [[summon chant|summoning chant]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which was required to change "Ra" from its sphere form to its full form.
  * This card's [[ATK]]/[[DEF]] effect is based on the effect of "Ra" in the ''Yu-Gi-Oh!'' manga and anime, which allows it to gain ATK/DEF equal to the combined ATK/DEF of the monsters used to [[Tribute Summon]] it.
  * The [[Skill Card]]s "[[Hieratic Chant]]" and "[[Advent of Ra]]" are based on this card's first and second effect, respectively.
