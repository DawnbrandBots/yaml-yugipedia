title: Card Trivia:Ancient Gear Gadjiltron Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Machine Re-Volt]]''.
  * A remodeled version of this monster appears in the artwork of "[[Special Schedule]]".
  * This monster has a [[Card evolutions|retrained]] counterpart: "[[Ancient Gear Reactor Dragon]]"
  * This monster features a segment with three empty gear slots around its neck, referencing the three listed "[[Gadget]]" monsters required to [[Tribute Summon]] it.
