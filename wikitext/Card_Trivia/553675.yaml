  * This monster appears in the artwork of "[[Vampire's Desire]]". Also, several "[[Vampire Familiar]]s" appear in this card's artwork.
  * This monster's design is similar to that of [[wikipedia:Alucard (Castlevania)|Alucard]] from [[Konami]]'s ''[[wikipedia:Castlevania: Symphony of the Night|Castlevania: Symphony of the Night]]''.
