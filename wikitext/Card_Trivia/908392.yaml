title: Card Trivia:Exosister Returnia
wikitext: |-
  {{Navigation}}

  * "[[Exosister Kaspitell]]" and "[[Exosister Mikailis]]" appear in this card's artwork.
  ** These two monsters appear together in the artwork of "[[Exosisters Magnifica]]". In reference to the archetype's theme of [[Xyz Summon]]ing its [[Xyz Monster]]s during the opponent's turn, this card's effect to [[Xyz Summon]] an "[[Exosister]]" Xyz Monster is the only in archetype way to summon "[[Exosisters Magnifica]]" during the opponent's turn.
  ** According to ''[[Yu-Gi-Oh! Card Game Art Works]]'', the demon they are fighting is [[wikipedia:Asmodeus|Asmodeus]], and ''[[The Valuable Book EX 6 card storylines#No. 12: Exosister|The Valuable Book EX 6]]'' establishes that it is actually "[[Exosister Karmael]]" wearing an armor and possessed by the real Asmodeus.
