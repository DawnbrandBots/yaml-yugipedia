title: Card Trivia:Cloudian - Ghost Fog
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Fog|fog]], the visible evaporation of moisture suspended in the air above the Earth's surface.
  ** This monster's effect of placing [[Fog Counter]]s equal to the [[Level]] of the monster that destroyed it by battle reflects this, as fog is commonly formed when the dew point is less than 2.5 °C (4.5 °F).
