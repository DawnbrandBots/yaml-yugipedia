  {{Navigation|mode=nonGame}}

  * This card's name refers to [[wikipedia:Negative (photography)|negative]] and [[wikipedia:Positive (photography)|positive]] photographic imaging.
  ** ''Nega'' and ''Poji'' are shortened versions of the ''rōmaji'' for ''"Negative"'' and ''"Positive"'', respectively.
