title: Card Trivia:Woodborg Inpachi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Kickfire]]", being ultimately destroyed by "[[The Kick Man]]".
  * "[[Kozaky]]" appears in the bottom-right corner of this card's artwork.
  ** The size of this monster compared to "Kozaky" would suggest that "Kozaky" and, by extension, "[[Giant Kozaky]]" are much smaller than it would seem.
  * "[[Inpachi]]" > "[[Blazing Inpachi]]" > "[[Charcoal Inpachi]]" > "'''[[Woodborg Inpachi]]'''"
  ** This card is the final form in the [[Inpachi (series)|Inpachi]] series. This form of "Inpachi" was upgraded by "Kozaky", similar to "[[Giga Gagagigo]]". Incidentally, they are both the strongest in their own respective fields ([[ATK]] for "Gagagigo" and [[DEF]] for "Inpachi") and the same [[Level]].
  * This monster appears to have been repaired after being sliced in half. This may be due to "Inpachi" receiving its scar from "[[Marauding Captain]]" as depicted in the artwork of "[[Double Attack]]."
