title: Card Trivia:Carat Idol
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster's Japanese name is based on "null", a word synonymous with "non-existence".
  * This monster is based on the ''[[wikipedia:Dogū|dogū]]'', a small humanoid figurine made during the later part of the [[wikipedia:Jōmon period|Jōmon period]] of prehistoric Japan.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', the icon for [[Immortal]] monsters is based on this monster's head.
