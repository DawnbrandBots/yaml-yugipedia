title: 'Card Trivia:New Order 4: Etheric Anubis'
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's silhouette appears in the artwork of "[[Rank Domination]]".
  * This monster is based on [[wikipedia:Anubis|Anubis]], the Egyptian deity of death, who is often depicted with the head of a jackal.
  ** This monster's name reflects its [[Rank]], which is also reflected in the '''four''' glowing gems in this monster's glyphs.
