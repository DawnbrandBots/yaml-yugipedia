title: Card Trivia:Vic Viper Ripple Laser
wikitext: |-
  {{Navigation}}

  * "[[Gradius' Option (Rush Duel)|Gradius' Option]]" appears in this card's artwork.
  * This monster is based on the [[wikia:w:c:gradius:Laser#Ripple Laser|Ripple Laser]], a Laser weapon in the ''[[wikipedia:Gradius|Gradius]]'' video game series that spreads out to hit multiple enemies, reflecting its effect to reduce two monsters' ATK.
  ** This monster appears to be firing some sort of [[wikia:w:c:gradius:Missile|Missile]] weapon simultaneously with its Ripple Laser. In the ''Gradius'' video game series, Missiles are a ship's secondary weapon that fires downwards; while originally fired using a separate button from its primary Laser weapon, later releases have a button to fire both weapons at once.
