title: Card Trivia:Barbaroid, the Ultimate Battle Machine
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ultimate Machine Union]]".
  * This is the first [[Level 12]] [[EARTH]] monster.
  * This is the [[signature card]] of [[Syrus Truesdale (manga)|Syrus Truesdale]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  * This monster has the highest [[Level]] (12) and [[original ATK]] (4000) of all "[[roid]]" monsters.
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Fusion Material]]s references the five monsters used to [[Fusion Summon]] it in the ''Yu-Gi-Oh! GX'' manga: "[[Einroid]]", "[[Zweiroid]]", "[[Dreiroid]]", "[[Vierroid]]", and "[[Fünfroid]]", whose names are based on the German words for the numbers "1" through "5".
  ** This monster's ''OCG''/''TCG'' Fusion Materials requiring [[Machine]] "roid" monsters as was most likely done to avoid using non-Machine "roid" monsters (such as "[[Dark Jeroid]]", "[[Elemental HERO Necroid Shaman]]", "[[Magical Android]]", and "[[Salamangreat Zebroid X]]") as Fusion Material.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|GX|057|ref}}, specifically from the panel showing [[Barbaroid, the Ultimate Battle Machine (manga)|this monster]] being Summoned.
