title: Card Trivia:Fossil Dragon Skullgios
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Speed Duel GX: Midterm Destruction]]''.
  * This monster is based on the fossilized skeleton of a ''[[wikipedia:Tyrannosaurus|Tyrannosaurus]]''.
  ** Fittingly, in {{episode|GX|110|ref}}, this monster was first [[Fusion Summon]]ed by using "[[Ultimate Tyranno]]", a [[Level 8]] monster based on the ''Tyrannosaurus'', as [[Fusion Material]].
  * This is one of three [[Rock]] monsters based on the fossilized skeletons of dinosaurs, the other two being "[[Flint Cragger]]" and "[[Fossil Dyna Pachycephalo]]".
  ** Fittingly, all three monsters were used by [[Jim Crocodile Cook]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
