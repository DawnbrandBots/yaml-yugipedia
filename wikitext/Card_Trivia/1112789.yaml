title: Card Trivia:James the Steam Swallow
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:James Watt|James Watt]], the inventor of the [[wikipedia:Watt steam engine|Watt steam engine]], the first efficient steam engine used in the [[wikipedia:Industrial Revolution|Industrial Revolution]], whereas a smokestack billowing out steam appears in this monster's design.
