title: Card Trivia:Dolphin's Treasure Chest
wikitext: |-
  {{Navigation}}

  * [[Iruman]] appears in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|SEVENS|055|ref}} where Iruman gives [[Yujin Goha]] a treasure chest containing a [[Sea Serpent]] [[Deck]].
  * This card has 3 [[Attribute]] counterparts, each corresponding to one of the [[Goha Six]]:
  ** [[WIND]], for [[Yuro Goha]]: "[[Atrium's Wind]]"
  ** [[FIRE]], for [[Yuka Goha]]: "[[Heavy Roller]]"
  ** [[EARTH]], for [[Yuran Goha]]: "[[Telegraphed Strike]]"

