title: Card Trivia:Dark Magician, the Pharaoh's Servant
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Dark Magician]]".
  ** This monster's name is a reference to how "Dark Magician" was commonly called "My greatest servant" by [[Dark Yugi (manga)| Pharaoh Atem]], and how it was created by fusing the spirit of his servant, [[Mahado (manga)|Mahado]], with his ''[[ka]]'', the [[Magus of Illusion]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's [[Quick Effect]] is a reference to "[[Dark Magic Attack]]", which [[destroy]]s all of the opponent's [[Spell]]/[[Trap Card]]s while the player [[control]]s "Dark Magician".
