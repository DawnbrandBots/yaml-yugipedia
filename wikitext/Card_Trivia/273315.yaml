  * This card's artwork is a continuation of the events depicted in the artwork of "[[Regretful Rebirth]]".
  ** Fittingly, the final effect of "Regretful Rebirth" [[destroy]]s the monster [[Special Summon]]ed by its effect, which can be used to fulfill this card's [[activation requirement]].
