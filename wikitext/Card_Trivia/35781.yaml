title: Card Trivia:Ansatsu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Elimigate]]".
  * This card's English name, "Ansatsu", is Japanese for "assassinate" (暗殺).
  ** Despite having its name censored to avoid the word "assassin", this card's [[flavor text]] still contains that word.
  * This card has a [[retrained]] counterpart: "[[Strike Ninja]]".
