title: Card Trivia:Fairywitch
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart|recolored]] [[Effect Monster]] [[counterpart]]: "[[Witch's Apprentice]]".
  * This monster has a [[retrain]]ed "[[Memento]]" counterpart: "[[Mementotlan Angwitch]]".
  * In some ''[[Yu-Gi-Oh!]]'' video games, this card is called "Angelwitch".
  ** This is due to the fact that some monsters with the English word "Fairy" in their names are called "Angel" in Japanese.
