title: Card Trivia:Salvage Wolfish
wikitext: |-
  {{Navigation}}

  * Multiple "[[Unidentified Mysterious Urchin]]" appear in this card's artwork.
  * This card is based on the [[wikipedia:Atlantic wolffish|Atlantic wolffish]], a well-known natural predator of the [[wikipedia:Sea urchin|sea urchin]], which the aforementioned "Unidentified Mysterious Urchin" is based on.
