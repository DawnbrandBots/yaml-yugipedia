title: Card Trivia:W Nebula Meteorite
wikitext: |-
  {{Navigation}}

  * This meteorite appears to contain what would eventually become "[[Worm Zero]]".
  * This meteorite is mentioned in the [[flavor text]] of "[[Ally Mind]]".
  * The English letter "W" in this card's name stands for "[[Worm]]".
  ** The Spanish name of this card left the "W" untranslated. Furthermore, it adapted the word "nebula" to "nébula", which is a word that does not exist in Spanish.
  ** The Spanish lore of "Ally Mind" refered to this card's name as "Meteoro [de la] Nébula Gusano". A correct name would have been "Meteorito de la Nebulosa G" instead of "Meteorito de la Nébula W".
