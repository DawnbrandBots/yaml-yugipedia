title: Card Trivia:Performage Hat Tricker
wikitext: |-
  {{Navigation}}

  * This monster's name is based on a [[wikipedia:Hat-trick (magic trick)|hat trick]], a circus performance that involves producing an object out of an empty hat.
  ** This monster's name is also a pun on the term "[[wikipedia:Hat-trick|hat trick]]", an act in a sport in which a player accomplishes three of the same kinds of action in succession. This reflects its [[Special Summon]]ing effect (which allows the player to control '''three''' monsters), as well as its effect to make its [[ATK]]/[[DEF]] become '''3300''' ('''three''' times its original ATK/DEF) when '''three''' [[Performage Counter]]s are placed on it.
