title: Card Trivia:Artmage Graflare
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Artmage Academic Arcane Arts Acropolis]]", "[[Artmage Masterwork -Succession-]]", "[[Artmage Movement -Pedigree-]]", "[[Artmage Peripeteia -Turmoil-]]", "[[DoomZ Change]]", "[[DoomZ Command "A.D.R.A.S.T.E.I.A."]]", "[[DoomZ Destruction]]", "[[Elfnotes: A Plea for Help]]", "[[Elfnotes: Welcome Home]]", "[[Theorealize]]", and "[[Theorealize Overdrive]]".
  * This monster has a "[[DoomZ]]" [[counterpart]] (combined with "[[DoomZ XII Zero - Drastea]]"): "[[DoomZ XIII Over - Graflareio]]".
  * This monster is heavily hinted and implied, through related card artworks and [https://ygorganization.com/doom-z-lore-intro/ supplementary] [https://ygorganization.com/reference-art-doom-z-monsters/ material], to be the younger brother of "[[DoomZ XII Zero - Drastea]]" and to have a connection and history with "[[DoomZ]]" and the "D.O.O.M.D.U.R.G" empire they hail from. This relationship was confirmed in ''Valuable Book EX6''.
  ** Both monsters have similar facial features.
  ** Both monsters mirror each other in their single long horns on either side of their head and a short horn on the other, [[DoomZ V Five - Amalthe|contrasting]] [[DoomZ VII Seven - Elara|other]] "[[DoomZ Raiders|DoomZ]]" who have two symmetrical horns on both sides of their heads.
  ** "Graflare", in a moment of desperation during the "DoomZ" assault on the "[[Artmage Academic Arcane Arts Acropolis]]", [[Artmage Movement -Pedigree-|revealed he had one of the mass-produced, manufactured]] "[[Power Patron DoomZ]]s" in his possession. [https://ygorganization.com/doom-z-lore-intro/ This is the same one that is the source for] "[[Medius the Pure]]" becoming "[[DoomZ Break - Diactorus]]", in an effort by "Medius" to prevent his [[Theorealize Overdrive|vision]] of "Graflare" using it and going berserk from happening.
