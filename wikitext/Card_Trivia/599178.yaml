title: Card Trivia:Salamangreat Shrine
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Salamangreat Pyro Phoenix]]" appears in this card's artwork.
  * This card's Japanese name is a reference to [[wikipedia:Sangha|Sangha]], a word used in [[wikipedia:Buddhism|Buddhism]] to refer to a monastic community of Buddhist nuns and monks.
