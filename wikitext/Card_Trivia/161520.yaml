title: Card Trivia:Shining Elf
wikitext: |-
  {{Navigation}}

  * This monster is an advanced version of "[[Flelf]]".
  ** This is supported by the facts that they have equal Levels/Ranks, they both are [[WIND]] [[Spellcaster]]-[[Type]] monsters, and they have similar appearances.
  * This monster appears in the artworks of "[[Xyz Unit]]" and "[[Xyz Revival]]".
