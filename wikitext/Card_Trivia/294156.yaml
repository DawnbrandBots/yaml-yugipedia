title: Card Trivia:Full Armored Crystalzero Lancer
wikitext: |-
  {{Navigation}}

  [[File:Number94Crystalzero-JP-Anime-ZX-NC-FullArmoredXyz.png|thumb|right|200px|"[[Number 94: Crystalzero (anime)|Number 94: Crystalzero]]" [[equip]]ped with "[[Black Ray Lancer (anime)|Black Ray Lancer]]" via "[[Full Armored Xyz (anime)|Full Armored Xyz]]", in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.]]

  * This monster is an [[Card evolutions|upgraded]] "[[Full Armored]]" form of "[[Number 94: Crystalzero]]", [[equip]]ped with "[[Black Ray Lancer]]".
  ** This monster's appearance is based on a scene of {{episode|ZEXAL|109|ref}}, where [[Reginald Kastle]] equipped "[[Number 94: Crystalzero (anime)|Number 94: Crystalzero]]" with "[[Black Ray Lancer (anime)|Black Ray Lancer]]" using the effect of "[[Full Armored Xyz (anime)|Full Armored Xyz]]", during his [[Duel]] against [[Abyss (character)|Abyss]].
  * This monster and "[[Astraltopia]]" are the only two monsters to have a "[[Number]]" symbol on their body, despite not being part of the "Number" archetype.

