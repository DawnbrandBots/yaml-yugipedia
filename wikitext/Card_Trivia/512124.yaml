title: Card Trivia:Roll Out!
wikitext: |-
  {{Navigation}}

  * "[[Perfect Machine King]]", [[equip]]ped with "[[Heavy Mech Support Platform]]", appears in this card's artwork.
  * This card's Japanese name, "Get Ride!" is a reference to ''[[wikipedia:AM Driver|Get Ride! AM Driver]]'', a toy franchise and anime series also produced by [[Konami]].
  ** This card's English name is a reference to ''[[wikipedia:Transformers|Transformers]]'', another toy franchise where a recurring phrase used by the [[wikipedia:Autobot|Autobots]] is "transform and roll out!"
