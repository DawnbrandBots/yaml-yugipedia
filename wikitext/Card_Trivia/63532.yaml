title: Card Trivia:Blue-Eyes Ultimate Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Duelist Pack: Kaiba]]'', ''[[Premium Pack 3]]'', ''[[Premium Pack Vol.1]]'', and ''[[Structure Deck: The Ultimate Blue-Eyed Legend]]''.
  * This monster appears in the artworks of "[[Dragon Master Knight]]", "[[Dragon Master Magia]]", "[[Neutron Blast]]", and "[[The Ultimate Creature of Destruction]]", as well as in both artworks of "[[The Ultimate Blue-Eyed Legend]]".
  ** Also, the bingo machine in the artwork of "[[Bingo Machine, Go!!!]]", the electric guitar "[[The King of D.]]" is holding, and the flute of "[[Absolute Lord of D.]]" are modeled after this monster.
  * This card appears in the artwork of "[[E☆HERO Pit Boss]]".
  * This is the first [[Level 12]] monster to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, and the first [[Fusion Monster]] in the anime with [[Fusion Material]]s that share the same [[Level]] (8) and [[original ATK and DEF]] (3000/2500).
  ** This monster's Level and original ATK and DEF are all equal to those of three copies of "[[Blue-Eyes White Dragon]]" added up and then divided in half, respectively, though the DEF is rounded up to the nearest hundred.
  * This monster has the highest original ATK and DEF of all [[non-Effect Monster]]s.
  * This monster has several [[counterpart]]s:
  ** A [[Bandai]] counterpart: "[[Blue-Eyes White Dragon's 3-Body Connection]]".
  ** A "[[Toon]]" counterpart: "[[Blue-Eyes Toon Ultimate Dragon]]".
  ** A "[[Statue]]" counterpart: "[[Blue-Eyes Ultimate Statue Dragon]]".
  ** Two [[retrained]] counterparts: "[[Neo Blue-Eyes Ultimate Dragon]]" and "[[Blue-Eyes Alternative Ultimate Dragon]]".
  ** A [[Synchro Monster|Synchro]] counterpart: "[[Blue-Eyes Ultimate Spirit Dragon]]".
  ** A 25th anniversary counterpart: "[[Ultimate Dragon of Pride and Soul]]".
  * "[[Blue-Eyes Shining Dragon]]", which needs this monster for its [[Special Summon]], was first released in the ''[[TCG]]'' in August 2004, while this card would not be available in the ''TCG'' until late 2005. This meant that for nearly a year and a half, it was impossible to Summon "Blue-Eyes Shining Dragon" even though it was legal for tournament use.
  * In some of the ''Yu-Gi-Oh!'' video games, such as ''[[Yu-Gi-Oh! Forbidden Memories|Forbidden Memories]]'' and ''[[Yu-Gi-Oh! The Duelists of the Roses|The Duelists of the Roses]]'', this monster is listed as [[DIVINE]] and requires the [[Ritual Spell Card]] "[[Ultimate Dragon]]" to Summon.
  * This card's [[reprint]] in ''[[Premium Gold]]'', ''[[Duelist Pack: Rivals of the Pharaoh]]'', and ''[[Legendary Decks II]]'' does not have its 8-digit [[password]].
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from the title page of {{chapter|Yu-Gi-Oh!|104|ref}}.
  ** This card's ''[[Yu-Gi-Oh! Dark Duel Stories]]'' and ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'' artworks are taken from the title page of {{chapter|Yu-Gi-Oh!|203|ref}}.
