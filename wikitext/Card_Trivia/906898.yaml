title: Card Trivia:Trishula, Zero Dragon of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Ice Barrier of the Frozen Prison]]''/''[[Structure Deck: Freezing Chains]]'' and ''[[Structure Deck: Ice Barrier of the Frozen Prison Melting Destiny Pack]]''.
  * This card is a [[retrained]] counterpart of "[[Trishula, Dragon of the Ice Barrier]]".
  * The second artwork of "[[Nekroz of Trishula]]" features "[[Shurit, Strategist of the Nekroz]]" wearing an armor based on this monster.
  * This card has the highest level of all "[[Ice Barrier]]" monsters.
