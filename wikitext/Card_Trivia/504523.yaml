title: Card Trivia:D/D/D Supersight King Zero Maxwell
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:James Clerk Maxwell|James Clerk Maxwell]], a Scottish scientist who was responsible for discovering electromagnetic radiation.
  ** This monster's [[Fiend]] [[Type]] references "[[wikipedia:Maxwell's demon|Maxwell's demon]]", an imaginary creature created by Maxwell to contradict the second law of thermodynamics. In this thought experiment, the demon controls the door to two chambers, allowing the fast-moving gas molecules to pass through one direction while the slow-moving gas molecules pass through the other direction, causing one chamber to heat up and the other to cool down.
  * Part of this monster's Japanese name ({{Ruby|超|ちょう}}{{Ruby|視|し}}{{Ruby|王|おう}}, ''Chōshiō'') is similar to the Japanese naming scheme of the three "[[D/D/D Super Doom King Bright Armageddon|Super]] [[D/D/D Super Doom King Dark Armageddon|Doom]] [[D/D/D Super Doom King Purple Armageddon|Kings]]" ({{Ruby|超|ちょう}}{{Ruby|死|し}}{{Ruby|偉|い}}{{Ruby|王|おう}}, ''Chōshi'iō'').
  * This is the [[signature card]] of [[Reiji Akaba (manga)|Reiji Akaba]] in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga.
  ** This monster, "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]", and "[[The King of Divine Punishment, Dark Highlander|Dark Highlander]] are the only signature cards of the rivals in the manga to not have an [[original ATK]] of 3000, having 2800 [[ATK]] instead, but still have 2500 DEF, while [[D/D/D Doom King Armageddon (anime)|D/D/D Doom King Armageddon]] still has 3000 ATK but has only 1000 DEF.
  *** This monster and Dark Highlander are also the only rival signature cards that aren't level 8, being level 7 instead.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|016|ref}}, specifically from the panel showing [[D/D/D Supersight King Zero Maxwell (manga)|this monster]] being Summoned.
