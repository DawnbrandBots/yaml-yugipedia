  * This is one of the [[cover card]]s of ''[[Duelist Pack: Legend Duelist 5]]''/''[[Legendary Duelists: Immortal Destiny]]'' and ''[[Legendary Duelists: Season 3]]''.
  * This monster appears in the artwork of "[[Dark Spirit's Mastery]]".
  * This monster is a [[retrained]] counterpart of "[[Dark Necrofear]]", with reversed [[ATK]]/[[DEF]].
