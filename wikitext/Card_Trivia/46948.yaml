title: Card Trivia:Mist Valley Baby Roc
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Catastrophe Draw]]".
  * "[[Roc from the Valley of Haze]]" appears in this card's artwork.
  ** This monster is a younger form of "Roc from the Valley of Haze"
  * This card is named after the [[wikipedia:Roc (mythology)|Roc]] (or Rukh) from [[wikipedia:Religion in pre-Islamic Arabia|Arabian mythology]], a giant bird able to seize elephants. It was believed to create the winds by flapping its wings.
