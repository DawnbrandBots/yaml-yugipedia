title: Card Trivia:Statue Zone
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Statue Dark Magician]]", "[[Blue-Eyes Statue Dragon]]" and "[[Red-Eyes Statue Dragon]]" appear in this card's artwork.
  * This card's Japanese name is a pun; "B2 Zone" is pronounced similarly to "Butsu Zone," homage to the name of [[wikipedia:Butsu Zone|a 1997 manga serialized at the same time as Yu-Gi-Oh!]] which centered around the idea of the spirit of a Buddha reappearing on Earth through statues.
