title: Card Trivia:Petit Moth
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rage and Conspiracy]]" and "[[Verdant Sanctuary]]".
  * This card appears in the ''[[Rush Duel]]'' artwork of "[[Card Destruction (Rush Duel)|Card Destruction]]".
  * "Petit" is the French word for "small" or "tiny", which is reflected in this monster's [[Level]] (1) and [[original ATK and DEF]] (300/200).
  * This monster has a [[recolored counterpart]]: "[[Acid Crawler]]".
  * This monster has a [[retrained]] ''[[Rush Duel]]'' [[counterpart]]: "[[Petit Moth of Evolution]]".
