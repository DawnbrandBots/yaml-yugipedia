title: Card Trivia:Lightning Rod Lord
wikitext: |-
  {{Navigation}}

  * This card is a [[Monster Card|monster]] [[counterpart]] of "[[Anti Raigeki]]".
  ** The monster in this card's artwork is based on the lightning rod featured in the artwork of "Anti Raigeki".
  ** The Japanese name of "Anti Raigeki" is "Lightning Rod".
  ** Both cards' Japanese names are pronounced very similarly to each other.
