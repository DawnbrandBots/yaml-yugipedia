title: Card Trivia:Morphtronic Smartfon
wikitext: |-
  {{Navigation}}

  * An incomplete 3D model of this monster appears in the artwork of "[[Morphtronic Scannen]]".
  * This monster is based on a smartphone, which appears in the background of this card's artwork.
  * This card's effects are enhanced versions of the effects of "[[Morphtronic Celfon]]", albeit with a [[Summoning condition]] added.
  ** This card's Summoning condition is a reference to how real-life cellphones were phased out in favor of smartphones.
  ** This card's Summoning condition is likely to make the clause of the effect of "Celfon" that [[Ignoring the Summoning conditions|ignores the Summoning conditions]] relevant.
