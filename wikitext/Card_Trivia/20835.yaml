title: Card Trivia:Skill Drain
wikitext: |-
  {{Navigation}}

  * "[[Dark Ruler Ha Des]]" appears in this card's artwork.
  ** "[[Demotion]]" > "[[Abyssal Designator]]" > "[[Herald of the Abyss]]" > "[[Hate Buster]]" > "[[Mind Drain]]" (presumably '''"Skill Drain"''' and "[[Soul Drain]]" as well)  > "[[Skill Prisoner]]" > "[[Destruct Potion]]" > "[[Fake Life]]" > "[[Call of the Archfiend]]" > "[[Reject Reborn]]" > "[[Powerful Rebirth]]" > "[[Dark Ruler No More]]"
  * This card has two counterparts: "[[Soul Drain]]" and "[[Mind Drain]]".
  ** The [[Zombie counterpart]] of "Dark Ruler", "[[Revived King Ha Des]]", appears in both cards' artworks.
  * A stone tablet form of this card appears in the artwork of "[[Trap Pause]]".
