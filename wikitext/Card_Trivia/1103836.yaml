title: Card Trivia:Futsu no Mitama no Mitsurugi
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legendary Modern Decks 2026]]''.
  * An illustration of this monster appears in the artwork of "[[Mitsurugi Great Purification]]".
  * This monster is named after the ''[[wikipedia:Totsuka-no-Tsurugi|Futsunomitama-no-tsurugi]]'', the sword wielded by ''[[wikipedia:Takemikazuchi|Takemikazuchi]]'', the god of thunder in [[wikipedia:Japanese mythology|Japanese mythology]].
  * This monster and "[[Ame no Murakumo no Mitsurugi]]" are the first [[Reptile]] [[Ritual Monster]]s.
  * This monster has the highest [[original DEF]] (3400) of all Reptile monsters.
  * This monster's [[original ATK and DEF]] (2000/3400) is twice that of "[[Mitsurugi no Mikoto, Saji]]"; also, they share the same color scheme and the sword "Saji" holds appears in the background of this card's artwork.
