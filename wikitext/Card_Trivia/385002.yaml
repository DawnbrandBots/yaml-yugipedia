title: Card Trivia:Curry Pot
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card's effect to [[Special Summon]] "[[Curry Fiend Roo]]" after "[[Carrotman]]", "[[Onionman]]", and "[[Potatoman]]" are [[banish]]ed is a reference to how cooking [[wikipedia:Curry|curry]] requires the use of carrots, onions, and potatoes.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, when monsters get destroyed while this card on the field, they get either get sliced or turned into chunks and go into the pot.
  ** Also, when this card's [[activation requirement]]s are met, before this card can Summon "Curry Fiend Roo", the remaining monsters on the field are transformed into bony chunks of meat and go into the pot.
