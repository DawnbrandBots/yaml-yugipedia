title: Card Trivia:Geargiagear
wikitext: |-
  {{Navigation}}

  * All monsters in the "[[Geargia]]" archetype (except for "[[Geargiano Mk-III]]" and "[[Geargiattacker]]"), along with "[[Gear Gigant X]]", appear in this card's artwork.
  ** "[[Geargiano]]" is on the left, "[[Geargiano Mk-II]]" is on the right, "[[Geargiaccelerator]]" is in the "1" slot, "[[Geargiarmor]]" is in the "3" slot, "[[Geargiarsenal]]" is in the "2" slot, "Gear Gigant X" is in the bed of the truck, while "[[Geargiagear Gigant XG]]" is the truck.
