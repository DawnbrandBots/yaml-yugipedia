title: Card Trivia:Stake your Soul!
wikitext: |-
  {{Navigation}}

  * "[[Vanquish Soul Caesar Valius]]" and "[[Vanquish Soul Pantera]]" appear in this card's artwork.
  ** Both monsters share the [[EARTH]] [[Attribute]], allowing this card to reveal one of them to Special Summon the other.
  * This card's artwork resembles the "Versus/V.S." screen in fighting games, which are shown prior to the beginning of said games' fights/matches to introduce the combatting characters, evidenced by the lightning in the middle forming the letters "VS".
  ** Additionally, its name can be seen as a line from an in-game announcer (such as the "Now! Fight your rival!" announcement in ''[[wikipedia:Street Fighter|Street Fighter]]'').
