title: Card Trivia:White Stingray
wikitext: |-
  {{Navigation}}

  * Despite its name, this monster is actually based on the [[wikipedia:Manta ray|manta ray]], which can be identified by the presence of its horn-shaped cephalic fins.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|020|ref}}, specifically from the panel showing [[White Stingray (manga)|this monster]] being Summoned.
