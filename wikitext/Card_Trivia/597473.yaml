title: Card Trivia:Catche Eve L2
wikitext: |-
  {{Navigation}}

  * This monster's name and design is a combination of a [[wikipedia:Catgirl|catgirl]] and [[wikipedia:CPU cache|L2 CPU caches]].
  ** This monster's name is similar to "[[L2 Cachevalier]]", which is also related to L2 CPU caches.
  ** The L2 in this card's name is also a reference to this monster's [[Level]] and its effect that reduces the Level of a Level 3 or higher monster by 2.
