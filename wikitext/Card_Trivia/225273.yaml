title: Card Trivia:Brotherhood of the Fire Fist - Rooster
wikitext: |-
  {{Navigation}}

  * This card is named after ''[[wikipedia:Dong Ping|Dong Ping]]'' (read in Japanese as Tō Hei) and "chicken" (kei).
  ** ''Dong Ping'' ranks 15th of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "General of Double Spears".
  *** ''Dong Ping'' rank matches the [[ATK]] of "Brotherhood's", '''15'''00.
  * This monster appears in the artwork of "[[Five Brothers Explosion]]".
  ** Although still being in an OCG card, this monster first appearance in the TCG was in this card's artwork.
  * This card is the first "Fire Fist" monster to be Limited, in the OCG.
