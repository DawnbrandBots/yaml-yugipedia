title: Card Trivia:Ethyl the Fire Genie of the Lamp
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Jinn|jinnī]], an Arabian spiritual being made of smoke or flames.
  ** This monster is coming out of [[wikipedia:Alcohol burner|alcohol burner]] (also known as a spirit lamp), a type of open flame source used in laboratories. This is a reference to Arabian folk tales such as ''[[wikipedia:Aladdin|Aladdin and the Wonderful Lamp]]'', where ''jinn'' are known to be sealed within objects like bottles or lamps.
  * The name "Ethyl" is derived from [[wikipedia:Ethanol|ethyl alcohol]], a type of alcohol used as fuel. "Ethyl" also refers to an [[wikipedia:Ethyl group|ethyl group]], a molecular structure derived from [[wikipedia:Ethane|ethane]].
  * This card has a re-coloured counterpart in "[[Methyl the Fire Genie of the Lamp]]".
