  {{Navigation}}

  * This monster has a [[recolored counterpart|recolored]] [[Normal Monster]] [[counterpart]]: "[[Fairywitch]]"
  * This monster has a [[Link Monster]] counterpart: "[[Wee Witch's Apprentice]]".
  * This monster's effect is opposite to that of "[[Hoshiningen]]", which instead increases the [[ATK]] of all [[LIGHT]] monsters and decreases the ATK of all [[DARK]] monsters.
