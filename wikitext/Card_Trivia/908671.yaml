title: Card Trivia:Infernity Doom Archfiend
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] counterpart of "[[Infernity Archfiend]]".
  ** Both monsters share the same [[Attribute]] ([[DARK]]) and [[Type]] ([[Fiend]]), while this monster is 2 [[Level]]s higher and has 400 more [[ATK]]/[[DEF]].
  * According to promotional materials when this card was revealed in Japan, its [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] is "Infernity Hell Pressure".
  ** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, the Japanese attack name of "[[Infernity Archfiend (anime)|Infernity Archfiend]]" is "Hell Pressure".
