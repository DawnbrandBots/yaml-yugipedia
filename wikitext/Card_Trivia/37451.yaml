title: Card Trivia:Lucky Iron Axe
wikitext: |-
  {{Navigation}}

  * This card’s artwork references the woodsman's axe featured in [[wikipedia:Aesop's Fables|Aesop's Fable]], "[[wikipedia:The Honest Woodcutter|The Honest Woodcutter]]", which serves as a cautionary tale about cultivating honesty.
  ** This card's artwork depicts the axe emerging from a body of water. This references the story of the fable where the woodcutter loses his axe into a river. The Greek god [[wikipedia:Hermes|Hermes]] (sometimes depicted as his Roman counterpart, [[wikipedia:Mercury (mythology)|Mercury]]) offers up a golden axe and a silver axe from the river as a test of honesty, the woodcutter refused. After Hermes retrieves the dropped axe from the river, which the woodcutter claims, Hermes rewards him with all three axes for his honesty.
