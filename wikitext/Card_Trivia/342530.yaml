title: Card Trivia:Red-Eyes Retro Dragon
wikitext: |-
  {{Navigation}}

  [[File:Red-Eyes_Black_Metal_Dragon_revived.png|thumb|right|250|"[[Red-Eyes Black Metal Dragon (manga)|Red-Eyes Black Metal Dragon]]" revived by the effect of "[[Time Machine (manga)|Time Machine]]".]]

  * "[[Time Machine]]" appears in this card's artwork.
  ** This card is based on a scene from {{chapter|Yu-Gi-Oh!|123|ref}} and {{Episode|Yu-Gi-Oh!|032|ref}}, in which "[[Time Machine (manga)|Time Machine]]" was used to [[return]] "[[Red-Eyes Black Metal Dragon (manga)|Red-Eyes Black Metal Dragon]]" to the [[field]].
  * This monster's ''[[TCG]]'' name references the [[wikipedia:Retro style|retro time period]], which takes place 20-30 years prior to the present time from 1979 to 1998. Fittingly, "[[Red-Eyes Black Dragon]]" debuted in the ''Yu-Gi-Oh!'' manga and was released the [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai card game]] during the year 1998.

