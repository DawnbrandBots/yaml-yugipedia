title: Card Trivia:Mass Driver
wikitext: |-
  {{Navigation}}

  * Two "[[Cannon Soldier]]s" appear in this card's artwork.
  ** "[[Linear Accelerator Cannon]]" is implicitly a more advanced version of the cannon in this card's artwork.
  * A [[wikipedia:mass driver|mass driver]] is a [[wikipedia:linear motor|linear motor]] that can accelerate a projectile to high velocity. The driver depicted  in this card's artwork doesn't reflect a typical [[wikipedia:Coilgun|coilgun]] (a weaponized mass driver), as their barrels are usually longer in comparison to their projectiles.
  * This card has a [[Trap Card]] and [[Spell]]-fueled counterpart: "[[Type Zero Magic Crusher]]".
