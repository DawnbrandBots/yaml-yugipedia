title: Card Trivia:Majesty Hyperion
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Lost Sanctuary]]''.
  * The [[wikipedia:Solar System|Solar System]] appears in this card's artwork (although only the six planets known in antiquity are depicted).
  * This monster is based on the [[wikipedia:Sun|Sun]] and [[wikipedia:Hyperion (Titan)|Hyperion]], the titan of light in [[wikipedia:Greek mythology|Greek mythology]].
  ** In Greek mythology, Hyperion is the father of [[wikipedia:Helios|Helios]], the god of the Sun. In [[wikipedia:Homer|Homer]]'s ''[[wikipedia:Iliad|Iliad]]'', the sun god is referred to as Hyperion, although otherwise the two are always distinguished.
  * This card is a [[DARK]] [[counterpart]] of "[[Master Hyperion]]"
  ** Both cards have opposite [[ATK]] and [[DEF]]: this card has 2100 ATK and 2700 DEF, while "Master Hyperion" has 2700 ATK and 2100 DEF.
  * This monster has a [[Card evolutions|combined]] [[Synchro Monster|Synchro]] form with "Master Hyperion": "[[Masterflare Hyperion]]".
