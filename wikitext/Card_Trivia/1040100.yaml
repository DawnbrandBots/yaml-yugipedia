title: Card Trivia:Selettrice Vaalmonica
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vaalmonica Creation]]", "[[Vaalmonica Invitare]]", and "[[Vaalmonica Scelta]]".
  ** Her hands can also be seen in the artwork of "[[Vaalmonica Versare]]".
  * This monster's name, "Selettrice", is the feminine form of the Italian word for "selector".
  * This monster has an [[Card evolutions|upgraded]] [[Link Monster|Link]] form: "[[Varar, Vaalmonican Concord]]".
