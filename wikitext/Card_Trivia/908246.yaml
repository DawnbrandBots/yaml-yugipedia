title: Card Trivia:Clavkiys, the Magikey Skyblaster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Magikey Duo]]", "[[Magikey Battle]]", "[[Magikey Mechmusket - Batosbuster]]", "[[Magikey Mechmortar - Garesglasser]]", "[[Magikey Beast - Ansyalabolas]]", "[[Magikey Dragon - Andrabime]]", "[[Magikey Locking]]", "[[Magikey Unlocking]]", and "[[Magikey World]]".
  * This monster's name is derived from "''clāvis''", the Latin word for "key".
  * This monster has two [[Card evolutions|transformed]] versions: "[[Magikey Fiend - Transfurlmine]]" and "[[Magikey Spirit - Vepartu]]".
  * This monster has the highest combined [[ATK]] and [[DEF]] of all [[Level 4]] or lower [[Normal Monster]]s.
