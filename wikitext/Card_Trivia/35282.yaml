title: Card Trivia:Cup of Ace
wikitext: |-
  {{Navigation}}

  * This cup appears in the artwork of "[[Couple of Aces]]".
  * This card is based on the [[wikipedia:Minor Arcana|Minor Arcana]] [[wikipedia:Tarot|Tarot]] card, the [[wikipedia:Ace of Cups|Ace of Cups]].
  * This card's Spanish name features a mistranslation, as it was printed as "''Golpe de Ases''" ("''Coup of Aces''"), instead of its literal translation, "''As de Copas''".
