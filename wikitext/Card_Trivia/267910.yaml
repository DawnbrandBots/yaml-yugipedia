title: Card Trivia:Green Duston
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] appears in the artworks of "[[Duston Roller]]", "[[House Duston]]", "[[Magicalized Duston Mop]]", "[[Performapal Guard Dance]]", "[[Starduston]]", "[[Frontline Disturbance]]", "[[Trickstar Live Stage]]", and "[[Two-for-One Team]]".
  ** It is also depicted as an illustration on the bedspread in the artwork of "[[Ojama Pajama]]".
