title: Card Trivia:D.D. Sprite
wikitext: |-
  {{Navigation}}

  * This card's effect is similar that of "[[Synchro Soldier]]" in that they both [[banish]] a monster and bring it back in your next [[Standby Phase]].  This card is used by [[Yusei Fudo]], whereas "Synchro Soldier" is used by his rival [[Jack Atlas]].
  * This monster looks similar to "Gatchan" from [[wikipedia:Dr. Slump|Dr. Slump]].
