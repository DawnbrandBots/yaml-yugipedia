title: Card Trivia:Anti-Glare Shield
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This [[Skill]]'s name is based on a scene from {{episode|VRAINS|011|ref}} where [[Varis]] activates the anti-glare shield over his visor as his "[[Borreload Dragon (anime)|Borreload Dragon]]" prepares to attack, which is depicted using a bright flash as it fires its barrel cannon from its mouth.
  ** This Skill's [[LIGHT]] [[anti-support]] effect further references how Varis's anti-glare shield protects his eyes from the bright flash of "Borreload Dragon's" attack, as well as being designed to counter the LIGHT [[Attribute]] "[[Firewall Dragon]]", which was used by his rival, [[Yusaku Fujiki|Playmaker]] to destroy "Borreload Dragon" and defeat Varis in {{episode|VRAINS|012|ref}}.
