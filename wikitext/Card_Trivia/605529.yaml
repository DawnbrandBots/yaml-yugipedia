title: Card Trivia:Sextet Summon
wikitext: |-
  {{Navigation}}

  * The six flames of different colors in this card's artwork represent the 6 summoning mechanics used in this card's effect and their respective card background color. Going clockwise from the top flame:
  ** Dark Blue - [[Link Monster]]
  ** Green - [[Pendulum Monster]]
  ** Black - [[Xyz Monster]]
  ** White - [[Synchro Monster]]
  ** Purple - [[Fusion Monster]]
  ** Blue - [[Ritual Monster]]
