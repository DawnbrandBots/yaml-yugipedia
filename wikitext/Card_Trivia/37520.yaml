title: Card Trivia:Mucus Yolk
wikitext: |-
  {{Navigation}}

  * This monster has two somewhat more efficient counterparts: "[[Raging Flame Sprite]]" and "[[Drill Barnacle]]".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's yolk changes color, rotating between pink and blue.
  ** It is also the only [[Immortal]]-[[Type]] monster in the game (aside from "[[Carat Idol]]", who is exclusive only to that game) whose entire form can be seen in its card artwork.
