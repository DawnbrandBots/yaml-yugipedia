title: Card Trivia:Muscle Medic
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Back to the Front]]" and "[[First-Aid Squad]]".
  * This monster's pose is an homage to "[[Marauding Captain]]", who also strikes the same pose in its own card artwork. Also, "Marauding Captain" appears in the artworks of the aforementioned cards.
