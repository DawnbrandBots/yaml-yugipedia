title: Card Trivia:Double Exposure
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Multiple exposure|double exposure]], the superimposition of the same photographic film twice in order to blend two scenes in one composite image, which reflects this card's effects to "superimpose" the [[Level]]s of two [[Level 6]] or lower monsters with the same name with each other, or "superimpose" the name of a monster on the [[field]] with that of another monster's.
