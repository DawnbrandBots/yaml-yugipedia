title: Card Trivia:Greed Grado
wikitext: |-
  {{Navigation}}

  * "[[Pot of Greed]]", six [[Level]] stars, and six [[Synchro Summon]]ing rings from the ''[[Yu-Gi-Oh! 5D's]]'' anime appear in this card's artwork.
  * "Grado" is based on the Spanish and Italian words for "grade" or "level", the latter of which references how [[Synchro Monster]]s require certain monsters of certain Levels to Synchro Summon them.
  ** "Grado" is also likely based on [[wikipedia:Grado Labs|Grado Labs]], a company that manufactures headphones, a pair of earphones joined by a band designed to capture sound or synchronicity, referencing this card's association with Synchro Monsters.
