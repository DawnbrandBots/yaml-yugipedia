title: Card Trivia:Butterflyoke
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name, "Butterflyoke", is a portmanteau of [[wikipedia:Butterfly|butterfly]] and [[wikipedia:Yoke|yoke]].
  ** A yoke is a a wooden beam normally used to connect load-bearing animals, including oxes, referencing the theme of this card's Japanese name, "Insect Scales of Servitude".
