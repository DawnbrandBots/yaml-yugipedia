title: Card Trivia:U.A. Libero Spiker
wikitext: |-
  {{Navigation}}

  * This monster is based on [https://en.wikipedia.org/wiki/Volleyball#Libero libero] and various "hitter" positions in [https://en.wikipedia.org/wiki/Volleyball volleyball].
  ** This card's name is contradictive as the libero isn't allowed to block or attack the ball when it is above net height; instead being a purely defensive position, typically remaining in the back-row to intercept the opponent's spikes.
  ** This card's effect is based on the special ruling in volleyball where the libero can sub-in for any back-row player during a set, which does not count towards the team's substitution limit for the set. Other players, once subbed-in for a player, can only sub-in/out with that same player for the rest of the set.
