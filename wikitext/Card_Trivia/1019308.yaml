title: Card Trivia:Three-Eyed Ghost
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect is based on its appearance in {{chapter|GX|062|ref}}, when [[Three-Eyed Ghost (manga)|this monster]]'s effect is used to [[add]] the [[Level 10]] "[[The Supremacy Sun (manga)|The Supremacy Sun]]" from the [[Deck]] to the [[hand]].
  ** Also, this monster's ''OCG''/''TCG'' effect can be used to [[search]] for "[[Tragoedia]]", a Level 10 DARK monster based on [[Tragoedia (character)|the main antagonist]] of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, who used both this and the above-mentioned monster.
