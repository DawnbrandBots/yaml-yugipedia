title: Card Trivia:Boss on Parade
wikitext: |-
  {{Navigation}}

  * "[[B.E.S. Big Core MK-2]]" and "[[B.E.S. Covered Core]]" appear in this card's artwork.
  ** This card is a reference to the {{wikia|gradius|Boss Rush (Gradius III)|Boss Rush stage}} in the arcade and SNES versions of ''[[wikipedia:Gradius III|Gradius III]]'', in which both {{wikia|gradius|Big Core MK II|Big Core MK II}} and {{wikia|gradius|Covered Core|Covered Core}} appear as bosses, with the final boss being {{wikia|gradius|Dellinger Core|Dellinger Core}}. Fittingly, this card debuted alongside "[[B.E.S. Derringer Core]]" in ''[[Burst Protocol]]''.
