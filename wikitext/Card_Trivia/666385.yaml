title: Card Trivia:Megalith Aratron
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Aratron|Aratron]], one of the seven [[wikipedia:Olympian spirits|Olympian spirits]].
  * This monster appears in the artworks of "[[Megalith Emergence]]" and "[[Megalith Unformed]]" (albeit only its shattered pieces).
  * This monster is emerging from the bottom of the base of "[[Megalith Och]]", as shown in "[[Megalith Emergence]]".
