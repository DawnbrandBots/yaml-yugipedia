title: Card Trivia:Battlin' Boxer Sparrer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Battlin' Boxing Spirits]]".
  * This monster's name is based on [[wikipedia:Sparring|sparring]], a form of practice commonly associated with combat sports.
  ** This monster's design features Thai pads, a type of [[wikipedia:Focus mitt|focus mitt]] attached to the arms on an opponent that is commonly used in sparring.
