title: Card Trivia:Hero of the East
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hidden Springs of the Far East]]".
  * The kanji (忠 ''chū'') on this monster's armor translates to "loyalty".
  * This monster has a ''[[Rush Duel]]'' counterpart: "[[Hero of the Yeast]]".
  * This is one of eight of [[Joey Wheeler]]'s [[Normal Monster]]s introduced to the ''[[TCG]]'' in ''[[Legendary Collection 4: Joey's World Mega Pack]]'' that have their English [[flavor text]]s written in his [[wikipedia:Brooklyn|Brooklyn]] accent. The other seven are "[[Anthrosaurus]]", "[[Kageningen]]", "[[Little D]]", "[[Meotoko]]", "[[Skull Stalker]]", "[[Stone Armadiller]]", and "[[Wolf]]". ("[[Alligator's Sword]]", which is included in ''Legendary Collection 4: Joey's World Mega Pack'' but debuted in the ''TCG'' previously, also has this kind of English flavor text.)
  ** All of these monsters are seen in Joey's very first [[Deck]], except for "Hero of the East" (which is only seen when Joey has a dream of himself with his inexperienced Deck) and "Little D" (which has not appeared in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime).
  ** In Italian, Portuguese and Spanish, these cards' flavor texts are also written in [[wikipedia:Eye dialect|eye dialect]] for the sake of humor. Apart from the French text which is translated more directly from the Japanese text in a little more serious way, texts in other ''TCG'' languages appear to be translated from the English text.
