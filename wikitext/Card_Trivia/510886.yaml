title: Card Trivia:Cloudian - Turbulence
wikitext: |-
  {{Navigation}}

  * "[[Cloudian - Smoke Ball]]" appears in this card's artwork.
  ** Fittingly, this monster's effect allows the player to [[Special Summon]] "Smoke Ball" from the [[Deck]] or [[Graveyard]].
  * This monster's design is based on a [[wikipedia:Tornado|tornado]], a violently rotating column of clouds and air which causes significant [[wikipedia:Turbulence|turbulence]] in the air.
