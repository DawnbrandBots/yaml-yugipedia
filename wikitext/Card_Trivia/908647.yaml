title: Card Trivia:Dogmatika Adin, the Enlightened
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Swordsoul Emergence]]".
  ** The left member of "[[The Golden Swordsoul]]" is this monster after he left the "[[Dogmatika Nation]]" with "[[Dogmatika Fleurdelis, the Knighted]]" and joined the "[[Swordsoul]]" tribe, having abandoned his old "[[Dogmatika]]" clothing and magical tome.
