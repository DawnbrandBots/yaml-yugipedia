title: Card Trivia:Elemental HERO Shining Neos Wingman
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Power of the Elements]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Elemental HERO Neos]]", fused with "[[Elemental HERO Shining Flare Wingman]]".
  ** This monster's [[Fusion Summon]] is depicted in the artwork of "[[Favorite Contact]]".
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, "[[Elemental Hero Neos (anime)|Elemental HERO Neos]]" is [[Jaden Yuki]]'s [[signature card]], but he also describes "[[Elemental Hero Flame Wingman (anime)|Elemental HERO Flame Wingman]]" as his "favorite [[HERO|hero]] of all time" (namely in ''[[Yu-Gi-Oh! Duel Links]]'' as [[Jaden/Yubel]]).
  * This is the only "[[Elemental HERO]]" monster with an [[original ATK]] of 3100.
