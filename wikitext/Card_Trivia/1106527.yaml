title: Card Trivia:Beast of Talwar - The Sword Summit
wikitext: |-
  {{Navigation}}

  * This monster is the [[retrained]] counterpart of "[[Beast of Talwar]]".
  ** This monster's [[Level]] is 7, referencing how "Beast of Talwar" is a [[Level 7]] monster in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)| Yu-Gi-Oh! Duel Monsters]]'' video game series.
  ** This monster was released exclusively to the ''[[TCG]]'' version of ''[[Supreme Darkness]]'', similar to how "Beast of Talwar" was released in the ''TCG'' version of ''[[Pharaoh's Servant]]''.
  ** This monster's effect, which prevents players from [[target]]ing monsters other than itself with [[Equip Card]]s and effects, is a reference to the [[flavor text]] of "Beast of Talwar", which states "''Only the master of the sword among [[Fiend]]-[[Type]] monsters is permitted to hold the Talwar''", thus not giving any other monster permission to use weapons or other equipment.
