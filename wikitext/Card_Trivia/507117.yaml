title: Card Trivia:Empress Judge
wikitext: |-
  {{Navigation}}

  * This card has a [[Normal Monster]] [[recolored counterpart]]: "[[Gyakutenno Megami]]".
  * This card is one of the first [[Fusion Monster]]s to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, along with "[[Giltia the D. Knight]]", "[[Labyrinth Tank]]", "[[Punished Eagle]]", "[[Roaring Ocean Snake]]", and "[[Skelgon]]".
  * In ''[[Yu-Gi-Oh! Duelists of the Roses]]'', this monsters' 3D model features elbow pads, but does not in this card's artwork.
