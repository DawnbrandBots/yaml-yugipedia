title: Card Trivia:Millennium Golem
wikitext: |-
  {{Navigation}}

  * The [[Eye of Wdjat]] appears in this card's artwork, depicted as this monster's eye.
  * A stone tablet of this monster appears in the artwork of "[[Wedju Temple]]".
  * This monster has a [[retrained]] counterpart: "[[Golem that Guards the Millennium Treasures]]".
  * This is the first [[Rock]] monster to appear in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
