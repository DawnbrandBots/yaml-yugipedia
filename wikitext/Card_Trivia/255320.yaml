title: Card Trivia:Ice Fire Egg
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[High Tide Gyojin]]" appears in this card's artwork.
  * This card's Japanese name, "Oval Ice Fire" (オーバル・アイス・ファイヤー, ''Ōbaru Aisu Faiyā'') features the base kanji「氷炎の卵」(''Hien no Tamago'', lit. "Ice Flame Egg"), where its translation serves as its international name.
