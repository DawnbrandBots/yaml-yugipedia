title: Card Trivia:Garbage Collection
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Gear Gigant X]]", "[[Scrap Worm]]", and "[[Scrap Shark]]" appear in this card's artwork.
  ** Although this card's [[activate|activation]] requires [[banish]]ing two [[Machine]] monsters, the [[Type]]s of "Scrap Worm" and "Scrap Shark" (the monsters being depicted as the cost) are actually [[Insect]] and [[Fish]], respectively, despite their mechanical appearances.
