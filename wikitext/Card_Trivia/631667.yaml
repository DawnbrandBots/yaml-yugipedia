title: Card Trivia:Appliancer Reuse
wikitext: |-
  {{Navigation}}

  * 7 unassembled "[[Appliancer Socketroll]]s" and the head of "[[Appliancer Breakerbuncle]]" appear in this card's artwork.
  * This card, "[[Appliancer Reduction]]", and "[[Appliancer Recycling]]" are likely a collective reference to the phrase "reduce, reuse, recycle".
