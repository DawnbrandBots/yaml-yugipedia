title: Card Trivia:DMZ Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name is based on a [[wikipedia:Demilitarized zone|demilitarized zone]], an area in which treaties between states forbid military groups.
  ** This definition is also used as the [[wikipedia:DMZ (computing)|computing term]] for a physical or logical subnet that separates a local area network from other untrusted networks, like the public Internet. Fittingly, this naming scheme reflects its owner, [[Roken Kogami|Varis]], who uses monsters based on weapons or computing terms.
