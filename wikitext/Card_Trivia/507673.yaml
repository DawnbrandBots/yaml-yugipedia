title: Card Trivia:Penalty Game!
wikitext: |-
  {{Navigation}}

  [[File:Mind_on_Air_Penalty_Game.png|thumb|right|250|[[Dark Yugi (manga)|Dark Yugi]] punishing the [[ZTV producer]] with the "Mind on Air" [[Penalty Game (manga)|Penalty Game]].]]

  * "[[Invader of Darkness]]" and an [[Eye of Wdjat]] appears in this card's artwork.
  ** This card's name and artwork reference the [[Penalty Game]], a punishment given to the loser of a [[Shadow Game]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]. In most instances, the Shadow Game involved at least one player who wielded a [[Millennium Item]], who inflicts the Penalty game on the opponent by using the magic of the Eye of Wdjat and pointing at them.
  * This card's bulleted effects are based on the effects of two cards that have each spent an extended period of time on the [[Forbidden & Limited List]]: "[[Time Seal]]" and "[[Cold Wave]]". Of the two, "[[Time Seal]]" has since been made [[Unlimited]].

