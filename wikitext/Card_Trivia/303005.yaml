title: Card Trivia:Artifact Failnaught
wikitext: |-
  {{Navigation}}

  * This monster's name is a corruption of "fail-not", the bow used by [[wikipedia:Tristan|Tristan]] in [[wikipedia:King Arthur|Arthurian legend]].
  ** Naught is a synonym for 'zero' or 'nothing'. Thus this card's name is "fail-zero" which is technically still "fail not".
  * This artifact appears on the card "[[Artifact Sanctum]]".
