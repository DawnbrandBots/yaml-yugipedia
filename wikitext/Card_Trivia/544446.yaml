title: Card Trivia:Dark Mummy Surgical Forceps
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is the first [[Zombie]] [[Link Monster]] to appear in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, and the first shown in any ''Yu-Gi-Oh!'' media.
  * Forceps (also known as tweezers) are a type of tool used to grasp small items, and are often used in surgical environments.
