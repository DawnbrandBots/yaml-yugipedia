title: Card Trivia:Electro Blaster
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2024]]''.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to increase the [[ATK]] of all [[FIRE]] monsters by 300 when a [[Spell Card]] is [[activate]]d is based on "[[Electronic Motor]]", a [[Continuous Spell Card]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga that increases the ATK of all Machine monsters on its player's [[field]] by 300. In {{chapter|GX|048|ref}}, [[Axel Brodie (manga)|Axel Brodie]] activated "Electronic Motor" while he controlled "[[Electro Gunner (manga)|Electro Gunner]]".
  * This monster's ''OCG''/''TCG'' effect to [[send]] a [[Level 8]] [[Pyro]] monster from the [[Deck]] to the [[Graveyard]] is designed to work in conjunction with "[[The Blazing Mars]]", a card used by Axel Brodie in the ''Yu-Gi-Oh! GX'' manga, which can be [[Special Summon]]ed from the Graveyard via its effect.
  ** This effect is also likely designed to work with the "[[Volcanic]]" [[archetype]], which is used by [[Axel Brodie]] in the ''[[Yu-Gi-Oh! GX]]'' anime, since it can also send the [[Level 8]] "[[Volcanic Emperor]]" to the Graveyard, whose effects can Special Summon itself from the Graveyard.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''Yu-Gi-Oh! GX'' manga, specifically from the panel showing this monster being Summoned.
