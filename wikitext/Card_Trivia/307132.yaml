title: Card Trivia:Nikitama
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''nigi-mitama'', the calm and tranquil side of the ''[[wikipedia:Mitama|mitama]]'', a whole, complete spirit in the [[wikipedia:Shinto|Shinto religion]].
  * This monster is related to "[[Aratama]]" and "[[Sakitama]]", as they are also based on the different aspects of the ''mitama'', in addition to featuring effects involving [[add]]ing cards to the [[hand]].
