title: Card Trivia:White Hole
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Old Mind]]".
  * This card is based on a [[wikipedia:White hole|white hole]], a hypothetical region of spacetime and singularity which acts as the exact opposite of a black hole and can continually expel matter rather than pull it in; this is the basis for its effect to counter "[[Dark Hole]]".
  * This card is one of several cards that were created to counter one specific card, each of which have been [[Limited]] or [[Forbidden]] at some point. The others are "[[Gryphon Wing]]", "[[Anti Raigeki]]", "[[Jar Robber]]", "[[Call of the Grave]]" and "[[Call of Darkness]]".
