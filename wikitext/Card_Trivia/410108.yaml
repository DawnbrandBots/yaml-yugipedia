title: Card Trivia:Sakyo, Swordmaster of the Far East
wikitext: |-
  {{Navigation}}

  * The blue and red colors on this monster's helmet, [[wikipedia:Sashimono|sashimono]], its horse's "breastplate", as well as this monster's [[wikipedia:Heterochromia iridum|heterochromatic]] eyes, represent [[Pendulum Scale]]s.
  * This card and accompanying Match winner "[[Kuzunoha, the Onmyojin]]" share a common Japanese theme, as well as motifs based on Pendulum Scales, and were first given out at the [[World Championship 2015]], which was held in [[wikipedia:Kyoto|Kyoto]], Japan.
