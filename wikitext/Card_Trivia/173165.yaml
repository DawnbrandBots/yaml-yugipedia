title: Card Trivia:Photon Generator Unit
wikitext: |-
  {{Navigation}}

  * While this card is part of the "[[Photon]]" [[archetype]], its effect has no further relation with the archetype.
  * This card has a [[Trap]] counterpart, "[[Attack Reflector Unit]]", and a ''[[Rush Duel]]'' counterpart, "[[Multiple Adapter Unit]]".
  * This is the only card that pluralizes a monster card's name.
