  * This monster is an [[Counterpart|upgraded]] [[Contact Fusion]] form of "[[Voidvelg Requiem]]".
  ** This is the first Contact Fusion form of "Requiem" to not require a [[Dark Matter (series)|Dark Matter]] monster as [[Fusion Material]].
