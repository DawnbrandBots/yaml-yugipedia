title: Card Trivia:Dice Demon
wikitext: |-
  {{Navigation}}

  * This is the ''[[Rush Duel]]'' [[Monster Card]] version of "[[Skull Dice (Rush Duel)|Skull Dice]]".
  ** This monster's Japanese name (サイコロの悪魔, ''Saikoro no Akuma'') is an inversion of the Japanese name for "Skull Dice", "Demon's Dice" (悪魔のサイコロ, ''Akuma no Saikoro'').
  * This monster has an [[Card evolutions|upgraded]] version: "[[Dice Archdemon]]".
  * This monster has an [[ATK]]/[[DEF]]-increasing [[counterpart]]: "[[Dice Angel]]".

