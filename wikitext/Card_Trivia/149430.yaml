title: Card Trivia:Odin's Eye
wikitext: |-
  {{Navigation}}

  * This card is based on how, in [[wikipedia:Norse mythology|Norse mythology]], [[wikipedia:Odin|Odin]] gave up one of his eyes in order to drink from the well of [[wikipedia:Mímir|Mímir]] and gain wisdom and insight.
  ** Fittingly, this card's effect allows the player to [[target]] an "[[Aesir]]" monster they [[control]], [[negate]] its effects until the end of the turn, and look at all cards in the opponent's [[hand]] and all [[Set]] cards they control.
