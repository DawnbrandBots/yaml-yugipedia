title: Card Trivia:Bikuribot
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Tandem bicycle|tandem bicycle]], a twin bicycle designed to be ridden by more than one person. 
  ** This monster's name is a portmanteau of the words "bi-" (the Latin word for the number "2"), "[[wikipedia:Bicycle|bike]]", and "[[Kuribot]]", which reflects its appearance as a twin bicycle with a design that includes the main bodies and the physical features of the two copies of "Kuribot" used as [[Fusion Material]].
