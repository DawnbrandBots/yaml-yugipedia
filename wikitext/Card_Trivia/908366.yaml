title: Card Trivia:Magistus Theurgy
wikitext: |-
  {{Navigation}}

  * This card's name is based on ''[[wikipedia:Theologia Germanica|Theologia Germanica]]''.
  * "[[Endymion, the Magistus of Mastery]]", "[[Crowley, the Magistus of Grimoires]]", "[[Zoroa, the Magistus of Flame]]", and "[[Rilliona, the Magistus of Verre]]" appear in this card's artwork.
  * A drawing of this magic circle appears in the artwork of "[[Trismagistus]]".
  ** The symbol at the centre of the magic circle appears to be similar to a [[Spell Counter]].
