title: Card Trivia:Hitodenchak
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Brinegir]]".
  * This card's Japanese name, "Hitodenchak" (ヒトデンチャク ''Hitodenchaku'') is a portmanteau of ''Hitoden'' (ヒトデ, "Starfish"), and ''Isoginchaku'' (イソギンチャク, "Sea anemone").
  * This card has a [[recolored counterpart]]: "[[Armored Starfish]]".
