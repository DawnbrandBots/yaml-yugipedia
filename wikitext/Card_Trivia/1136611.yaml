title: Card Trivia:Dispatchparazzi
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Paparazzi|paparazzi]], independent photographers who take pictures of high-profile people (e.g. actors, musicians, athletes, politicians, influences, content creators, etc.) who go about their daily life routines.
  ** In terms of their ''modus operandi'', the paparazzi are infamous for their relentless venery of pursuing each of their celebrity target(s) and frequently being noticed by the subject of their scrutiny, which reflects this monster's effect to redirect the opponent's monster attacks to itself to "garner" the attention of the opponent's.
  ** Furthermore, as this kind of video photography is their line of work to make a living on, any unflattering, intimate or scandalous moments a paparazzo's camera may catch, which can negatively affect the celebrity's career or personal life whilst conversely boosting the profits of the photographer(s) depending on the headlines their digital content might result in. This reflects this monster's effect to [[destroy]] the opponent's monster upon being [[destroyed by battle]] by that monster, which will result in the player receiving a "financial gain" in the form of half the [[ATK]] of the monster that destroyed this monster by battle.
  ** This monster's [[DARK]] [[Attribute]] and [[Fiend]] [[Type]] may reflect the stigmatized "low-hanging" fruit behaviors of many paparazzi.
  ** Coincidentally, this monster's left and right [[Link Arrows]] due allows multiple copies of this monster to be [[co-linked]] to each other in the [[Main Monster Zone]]s without the aide of other [[Link Monster]]s or the [[Extra Monster Zone]], which may reference how real-life paparazzi often travel in groups.
