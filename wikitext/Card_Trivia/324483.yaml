title: Card Trivia:Starlight Junktion
wikitext: |-
  {{Navigation}}

  * This card's name is a pun of "junk" and "junction".
  * This card depicts the [[Daedalus Bridge]] junction from [[New Domino City]]. This junction also appears in [[-OZONE-]], the third Japanese ending of ''[[Yu-Gi-Oh! 5D's]]''.
