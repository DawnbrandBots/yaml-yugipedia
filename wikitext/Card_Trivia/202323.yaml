title: Card Trivia:Papa-Corn
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "{{translated name|Papa-Corn|ja}}" ({{name|Papa-Corn|ja}}, ''{{romanized name|Papa-Corn|ja}}'') is a portmanteau of「親子」(''oyako'', lit. "parent-and-child") and「コーン」(''kōn'', lit. "corn").
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "[[wikipedia:Popcorn|popcorn]]", "papa", and "corn".
  *** Both names reflect the two monsters depicted in this card's artwork, depicting a fatherly corn cob and a young corn kernel.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|011|ref}}, specifically from the panel showing [[Pappycorn|this monster]] being Summoned.
