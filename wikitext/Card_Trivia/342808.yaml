title: Card Trivia:Noble Knight Brothers
wikitext: |-
  {{Navigation}}

  * This monster is likely based on [[wikipedia:Agravain|Sir Agravain]], [[wikipedia:Gaheris|Sir Gaheris]], and [[wikipedia:Gareth|Sir Gareth]], the brothers of [[wikipedia:Gawain|Sir Gawain]] and half-brothers of [[wikipedia:Mordred|Sir Mordred]]. This can be supported by these facts: the three men in this card's artwork are seen next to both in the artwork of "[[Noble Knights of the Round Table]]", they greatly resemble both "[[Noble Knight Gawayn]]" and "[[Noble Knight Medraut]]", and they all wear sashes that are also seen in the artworks of "Gawayn" and "Medraut". Furthermore, they also wear a similar armor as "Gawayn". Something to note is that "Medraut's" sash is red, whereas the others have green sashes, likely referencing "Medraut" not being their full-brother. This might also be the reason behind "Medraut's" distinct armor being silver rather than gold and having a different design.
  ** Alternatively, this monster might be based on [[wikipedia:Knights of the Round Table#Breunor|Sir Breunor]], [[wikipedia:Knights of the Round Table#Dinadan|Sir Dinadan]] and [[wikipedia:Daniel von dem blühenden Tal|Sir Daniel]].
  * In other ''[[TCG]]'' languages, the names can be translated as follows:
  ** French: "Brothers Noble Knight"
  ** German: "Noble Knight Troop"
  ** Italian: "Brothers Noble Knights"
  ** Spanish: "Brothers of the Noble Knight"
  :: As seen above, with the exception of the Italian name, no plural form of the phrase "Noble Knight" is used, to not exclude this card from the "[[Noble Knight]]" archetype. Also see ''[[Noble Knight#Naming in the TCG]]''.
