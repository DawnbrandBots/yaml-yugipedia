  * This card has an illegal counterpart: "[[Tomohiro the Mountain Warrior]]".
  * In some games, such as ''[[Yu-Gi-Oh! The Sacred Cards]]'', ''[[Yu-Gi-Oh! Dark Duel Stories]]'' and ''[[Yu-Gi-Oh! Reshef of Destruction]]'', this monster is required to be on the field for "[[Yamadron Ritual]]".
