title: Card Trivia:Dragon Ice
wikitext: |-
  {{Navigation}}

  * This is one of three monsters designed by fans in the ''Yu-Gi-Oh! Design Your Destiny Card Contest'' held by [[Upper Deck Entertainment]] and [[4Kids]] that were made as real cards featured in ''[[Gladiator's Assault]]'', the other two being "[[Tongue Twister]]" and "[[Skreech]]".
  ** Only the artworks were submitted, and nothing else, as confirmed in [http://www.pojo.biz/board/showthread.php?p=16346698#post16346698 a post] by Jerome McHale.
  ** This monster was the winner of the 13-17 age division in that contest. The artist was Adam V. of Haverhill, Massachusetts.
  * A [[misprint]] of [https://yugipedia.com/wiki/File:DragonIce-GLAS-EN-ScR-1E-Misprint.jpg this card] replaces its name with that of "[[Super Vehicroid - Stealth Union]]".
