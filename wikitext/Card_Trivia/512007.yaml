title: Card Trivia:Draining Shield
wikitext: |-
  {{Navigation}}

  * "[[Freed the Brave Wanderer]]" and "[[Giga Gagagigo]]" appear in this card's artwork.
  ** The events depicted in this card's artwork continue in the artwork of "[[Dimensional Prison]]".
  * The shield in this card's artwork appears in the artwork of "[[Nomadic Force]]".
  * This card has an [[anime-exclusive]] [[counterpart]]: "[[Fake Life]]".
  * This card's effect is the opposite of "[[Magic Cylinder]]"; this card increases the player's [[Life Points]] equal to the opponent's monster's [[ATK]], while "Magic Cylinder" damages the opponent equal to their monster's ATK instead.
