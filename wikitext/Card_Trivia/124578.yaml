title: Card Trivia:Dragunity Militum
wikitext: |-
  {{Navigation}}

  * In Roman army, ''Militum'' is referring to "[https://en.wikipedia.org/wiki/Military_tribune tribunus militum]" under the [https://en.wikipedia.org/wiki/Military_tribune military tribune].
  * The role of [https://en.wikipedia.org/wiki/Military_tribune tribunus militum] serves to assist [https://en.wikipedia.org/wiki/Dux dux] in Roman army.
  * According to DT (Duel Terminal) Master Guide, "[[Dragunity Militum]]" is the female soldier who assists "[[Dragunity Dux]]"  - The highest commander of roman legions.
  * "[[Dragunity Knight - Vajrayana]]" appears to be this monster riding an evolved version of "[[Dragunity Aklys]]".
  * This monster appears riding an evolved form of "[[Dragunity Phalanx]]", in the artwork of "[[Dragon Mastery]]".
