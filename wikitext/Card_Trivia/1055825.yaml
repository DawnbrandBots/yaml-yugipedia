title: Card Trivia:Silhouhatte Rabbit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Silhouhatte Trick]]".
  ** The magician wearing the dark green vest in the artwork of "Silhouhatte Trick" appears in this card's artwork. Fittingly, this monster's effect allows it to [[Set]] "Silhouhatte Trick", as it is a [[Trap Monster]].
  * This is the first [[Illusion]] [[Link Monster]].
