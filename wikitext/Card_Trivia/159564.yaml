title: Card Trivia:Contact with the Aquamirror
wikitext: |-
  {{Navigation}}

  * The staff of "[[Gishki Noellia]]" (containing a "[[Gishki Aquamirror]]") and two basket-like frames that appear in the artwork of "[[Aquamirror Meditation]]" appear in this card's artwork.
  * This was the first "[[Gishki]]"-related card to be released in the TCG.
