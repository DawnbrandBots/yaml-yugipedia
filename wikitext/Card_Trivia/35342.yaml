title: Card Trivia:Metal Reflect Slime
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Soul Energy MAX!!!]]".
  * This card appears in the artwork of "[[Card of Last Will]]".
  * This card has the highest [[Level]] and [[DEF]] of any [[Trap Monster]], tied with "[[You're Finished]]".
  * This monster's design is inspired by the video game concept of the [http://tvtropes.org/pmwiki/pmwiki.php/Main/MetalSlime "metal slime"]: a randomly spawning variant of a common monster that features absurdly high defense and a body of liquid metal.
  * [[Reactor Slime]]'s appearance is a combination of this monster, "[[Jam Breeding Machine]]", and "[[Humanoid Slime]]".
  * In the ''Yu-Gi-Oh!'' anime and manga, this was the only card that had an effect which give monters DEF 3/4 of another value.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|271|ref}}, specifically from the panel where this card [[Special Summon]]ed a "[[Slime Token (manga)|Slime Token]]".
