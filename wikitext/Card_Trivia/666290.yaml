title: Card Trivia:Ancient Warriors - Virtuous Liu Xuan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ancient Warriors Saga - Three Visits]]" and "[[Ancient Warriors Oath - Double Dragon Lords]]".
  * This monster is based on [[wikipedia:Liu Bei|Liu Bei]] ([[wikipedia:Courtesy name|courtesy name]]: Xuande), from the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'': an imperial kingsman, he would found the [[wikipedia:Shu Han|Shu]] State and become its First Ruler during the Three Kingdoms Period. Fittingly, since he was a descendant from the Imperial family he had both [[wikipedia:Liu Bei|long ears]] (a known trait of both him and the [[wikipedia:List of emperors of the Han dynasty|Liu]] clan, the clan of the Imperial family) and a [[wikipedia:Chinese Dragon|dragon]] motif.
  ** "Virtuous" in this card's name is a reference to Liu Xuan having "[[wikipedia:De (Chinese)|Virtue]]" to [[wikipedia:Mandate of Heaven|rule over]] China and thus being the legitimate successor to the Han Rule, in contrast with [[wikipedia:Cao Cao|Cao Cao]] (which "[[Ancient Warriors - Ambitious Cao De]]" is based on), who was considered to be "Ambitious" and is traditionally considered as the usurper of the Han dinasty in the same vein as [[wikipedia:Wang Mang|Wang Mang]].
