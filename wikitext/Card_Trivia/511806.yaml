title: Card Trivia:Goblin Attack Force
wikitext: |-
  {{Navigation}}

  * This monster(s) appear in the artwork of "[[3D Bio Scanner]]", "[[Assault on GHQ]]", "[[Attraffic Control]]", "[[Attention!]]", "[[Back to Square One]]", "[[Backup Squad]]", "[[Ballista Squad]]", "[[Cell Explosion Virus]]", "[[Disposable Learner Device]]", "[[Earthquake]]", "[[Eisbahn]]", "[[Gemini Trap Hole]]", "[[Gravity Gain]]", "[[Hammer Shot]]", "[[Imperial Manners]]", "[[Lose 1 Turn]]", "[[Mass Hypnosis]]", "[[Medusa Worm]]", "[[Massivemorph]]", "[[Micro Ray]]", "[[Non-Spellcasting Area]]", "[[Power Gift]]", "[[Prepare to Strike Back]]", "[[Raccoon Reversal]]", "[[Soul-Absorbing Bone Tower]]", "[[Supply Squad]]", and "[[Tyrant's Tantrum]]".
  ** In most of these cards' artworks, the goblins are often used as the butt of jokes, usually receiving detrimental effects or being attacked. They are also often drawn in a more cartoonish style. This is likely a reference to the vulnerability of "Goblin Attack Force" after attacking.
  * This card appears in the artwork of "[[Snatch Drone]]".
  * This card has several counterparts, including "[[Toon Goblin Attack Force]]", the "[[Goblin Elite Attack Force]]", the "[[Goblin Recon Squad]]", the "[[Goblin Black Ops]]", the "[[Goblin Decoy Squad]]", "[[Goblin Marauding Squad]]" and the [[Anime-only|anime-exclusive]] "[[Goblin Dancers]]".
  * This card shares the same [[Attribute]], [[Level]], [[ATK]], [[DEF]], and effect with "[[Indomitable Fighter Lei Lei]]".
  * The artworks of "Assault on GHQ" and "Prepare to Strike Back" indicate that this monster(s) and "[[Marauding Captain]]" are enemies.
  * In the [[Goblin Attack Force (anime)|anime]] and in the artwork of "Prepare to Strike Back", when this monster(s) uses its effect to switch into [[Defense Position]] at the end of the [[Battle Phase]], they fall asleep after attacking, which reflects this card's 0 DEF.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', the monster sprite for this card uses the left leg of "[[Robbin' Goblin]]" (from the viewer's perspective) as the model for the goblins' legs.
