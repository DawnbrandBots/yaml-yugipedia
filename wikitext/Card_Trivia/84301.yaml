title: Card Trivia:Kairyu-Shin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fury of Kairyu-Shin]]", "[[Kairyu-Shin's Dark Reef]]", and "[[Rage of Kairyu-Shin]]".
  * This monster's Japanese name is derived from the [[wikipedia:Leviathan|leviathan]], a mythical sea serpent appearing in the [[wikipedia:Hebrew Bible|Hebrew Bible]].
  ** The kanji 「海竜神」 (''Kairyū-Shin'') in this monster's Japanese name means "Ocean Dragon God", but is read as 「リバイアサン」 (''Ribaiasan'' "Leviathan") instead.
  * This monster has a [[recolored counterpart]]: "[[Yormungarde]]".
  ** This monster's appearance in games such as [[:File:KairyuShin-DULI-EN-VG-NC.png|''Yu-Gi-Oh! Duel Link'']] and [[:File:KairyuShin-WC10-EN-VG-NC.png|''Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia'']] were made using the artwork of "Yormungarde".
  * This monster has a [[retrained]] [[counterpart]]: "[[Ocean Dragon Lord - Kairyu-Shin]]".
  * This is the only [[Sea Serpent]] monster featured in ''[[Yu-Gi-Oh! Nightmare Troubadour]]''.
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from {{chapter|Yu-Gi-Oh!|072|ref}}, specifically from the panel showing [[Leviathan (manga)|this monster]] being Summoned.
