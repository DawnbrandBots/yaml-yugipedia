title: Card Trivia:Vorse Raider
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Collectible Tins 2005]]''.
  * This monster appears in the artworks of "[[Card of Reversal]]", "[[Convert Contact]]", "[[Damage Capture]]", and "[[Grapple Chain]]".
  ** This card (with its [[Card Artworks:Vorse Raider|first artwork]]) appears in the original anime artwork of "[[Montage Dragon (anime)|Montage Dragon]]".
  * This card has two [[counterpart]]s.
  ** A [[retrained]] counterpart: "[[Kaiser Vorse Raider]]".
  *** "Kaiser Vorse Raider" is based on the appearance of this monster's alternate color scheme in the ''[[Yu-Gi-Oh! 5D's]]'' and ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** An "[[X-Saber]]" counterpart: "[[XX-Saber Boggart Knight]]", which itself has a "[[lswarm]]" counterpart, "[[Evilswarm Nightmare]]".
  * This card, "[[Alien Shocktrooper (Rush Duel)|Alien Shocktrooper]]", "[[Luster Dragon (Rush Duel)|Luster Dragon]]", and "[[Archfiend Soldier (Rush Duel)|Archfiend Soldier]]" have the highest [[ATK]] (1900) of all [[Level]] 4 or lower monsters in ''[[Yu-Gi-Oh! Rush Duel]]''; naturally, all four cards are [[Legend Card]]s as well.
  * Despite this card having [[flavor text]] in the ''[[TCG]]'' as early as 2005, its translated ''[[OCG]]'' flavor text was still used in many ''[[Yu-Gi-Oh!]]'' console and handheld games.
  * This card's Spanish name, "Jinete Vorse", mistakenly translates to "Vorse Rider", confusing "Rider" with "Raider".
  * This card's first ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|185|ref}}, specifically from the panel showing [[Vorse Raider (manga)|this monster]] being Summoned.
  ** This card's second ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|225|ref}}, specifically from the panel where it was shown attacking "[[Keldo (manga)|Keldo]]".
