title: Card Trivia:Horoscope Sorcerer, the Stargazer Magician
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Stargazer Magician]]".
  ** This monster is named after a [[wikipedia:Horoscope|horoscope]], an astrological forecast of a person's future based on the position of the stars and the planets at the time of their birth. It is also likely named after the horoscope-themed [[Attack and effect names in Yu-Gi-Oh! ARC-V|attack and effect names]] of "[[Stargazer Magician (anime)|Stargazer Magician]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's [[Pendulum Effect]] to [[negate]] the [[activate|activation]] of an opponent's [[Spell Card]] is based on the Pendulum Effect of "Stargazer Magician" in the ''Yu-Gi-Oh! ARC-V'' anime, which negates the activation of a Spell Card during each player's [[Battle Step]].
