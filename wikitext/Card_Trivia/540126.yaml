title: Card Trivia:Metalmorph
wikitext: |-
  {{Navigation}}

  * This card has an upgraded version: "[[Rare Metalmorph]]".
  ** This card also has a [[retrain]]ed counterpart: "[[Max Metalmorph]]".
  * In the ''[[Premium Pack (TCG)|Premium Pack]]'' [[alternate art]] print of this card, the armor has two pairs of eyes while the old artwork only had one; its claws and shape are different. This card was also misprinted as a [[Continuous Trap Card]].
  * In ''[[Yu-Gi-Oh! The Sacred Cards]]'' and ''[[Yu-Gi-Oh! Forbidden Memories]]'', this card is a [[Spell Card]].
