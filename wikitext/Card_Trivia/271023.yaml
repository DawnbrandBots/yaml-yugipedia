title: 'Card Trivia:Number C39: Utopia Ray V'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Starter Deck 2013]]''.
  * This monster appears in the artwork of "[[Future Drive]]".
  * The "V" in this card's name probably refers to the fact that this is a [[Barian]] version of "[[Number 39: Utopia (anime)|Utopia]]" (which is spelled "Varian" in Japanese - "Utopia Ray Varian").
  ** It also foreshadows the idea that [[Yuma Tsukumo]] replaces this card with "[[Number C39: Utopia Ray Victory (anime)|Number C39: Utopia Ray Victory]]", the "V" standing for "Victory".
  * This monster's sealed form looks very similar to the [[Barian Emblem]]. It is also released from the same [[The Door|door]] as the other "[[Number C]]" monsters used by the Barians, due to the fact that "[[Rank-Up-Magic Limited Barian's Force (anime)|Rank-Up-Magic Limited Barian's Force]]" was used to Summon it.
  * This card is the only form of "Number 39: Utopia" that evolved via the power of the [[Barian World]].
  * This is the first Ranked-Up "Number C" monster that is not part of the "[[Number 10X]]" archetype.
  * When the number of this monster appeared on its body during its Summon scene, it had an orange color, despite both the monster and the number that appeared on the screen previously being red. This was likely an animation error.
  * This card and "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]" are so far the only cards to belong to ten supported archetypes: "[[C (archetype)|C]]", "[[Number]]", "Number C", "[[Number C39]]", "[[Utopia (archetype)|Utopia]]", "[[Number 39: Utopia (archetype)|Number 39: Utopia]]", "[[Number C39: Utopia Ray (archetype)|Number C39: Utopia Ray]]", "[[V (archetype)]]", "[[V (GX archetype)]]" and "[[Hope]]". Although "Number 39: Utopia", "Utopia", "Number C", "Number C39" and "Number C39: Utopia Ray" are sub-archetypes of "Chaos", "Number", "Number C", "Number C39", "Number 39: Utopia", "Utopia" and "Hope" respectively, they have specific support cards.
  * This is the only "Utopia" monster that does not have red eyes, instead having yellow eyes.
  * In the anime, this card and "[[Number C73: Abyss Supra Splash (anime)|Number C73: Abyss Supra Splash]]" are the only Ranked-Up "Number C" that has no effect that is linked to its "Number" counterpart and the only Ranked-Up "Number C" that does not gain an effect when Xyz Summoned by Ranking-Up said "Number" counterpart.
