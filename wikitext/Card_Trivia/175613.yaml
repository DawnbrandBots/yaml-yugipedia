title: 'Card Trivia:Number 83: Galaxy Queen'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Galaxy Queen's Light]]".
  * The number "83" appears on this monster's upper chest.
  * This card represents its original owner, [[Nelson Andrews]], in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's appearance is based on Nelson's mother, [[Mrs. Andrews]], reflecting Nelson's desire to follow and exceed his mother's expectations.
  ** This monster's appearance is also based on the Galaxy Queen, the character Mrs. Andrews played in Nelson's TV show, ''The Sparrow'', which reflects Nelson's starring role as the titular character and his [[Sparrow Family]] Deck.
  * This card is the first [[Spellcaster]] [[Xyz Monster]].
  * This card is the first female "Number" monster.
  * This card is the first "Number" monster whose both neutral and full forms were not rendered in 3D graphics in the anime.
  * This card is the only "Number" monster that [[Yuma Tsukumo]] obtained without destroying it in a [[Duel]].
  * In the anime, when this monster was in [[Defense Position]], her dress color was black, as seen in its card artwork. When she was in [[Attack Position]], her dress color was instead white.
  ** This may be a reference to the plot of ''The Sparrow'': in Nelson's TV show, the Galaxy Queen was under the possession of Furious Max, like while this monster was [[equip]]ped with "[[Furious Max's Curse]]", she was in Defense Position. In Nelson's TV show, when Galaxy Queen had the white dress, she was no longer under any possession, like when "Furious Max's Curse" was [[destroy]]ed, this monster switched to Attack Position and became white-colored.
  * In the anime, when this monster [[detach]]ed an [[Xyz Material]], she absorbed it through her staff.
  * This monster's neutral form was a purple glowing jewel surrounded by a gold chandelier-like structure with a purple rotating skirt underneath that has gold points. When it transformed, the jewel turned into the body as the structures became her clothing and jewelry.
