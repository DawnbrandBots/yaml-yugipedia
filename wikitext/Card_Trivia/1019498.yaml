title: Card Trivia:Gias x Gias
wikitext: |-
  {{Navigation}}

  * "[[Illusion Strike Dragon Miragias]]" and "[[Multistrike Dragon Dragias]]" appear in both of this card's artworks.
  ** This card's effect to decrease an opponent's monster's [[ATK]] by 1500 and allow the player's monster to make a second attack is based on the effect of "Miragias", which decreases ATK by the same amount as this card and allow itself to attack twice if it destroys a monster by battle.
  * This card's artwork is based on a scene from {{episode|SEVENS|027|ref}}, where [[Lucidien Kallister|Luke]]'s "[[Illusion Strike Dragon Miragias (anime)|Illusion Strike Dragon Miragias]]" attacks Phantom Luke's "[[Multistrike Dragon Dragias (anime)|Multistrike Dragon Dragias]]".
