title: Card Trivia:30,000-Year White Turtle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Big Wave Small Wave]]".
  * In ''[[Yu-Gi-Oh! Forbidden Memories]]'', this card can be obtained by fusing [[Spellcaster]] monsters with turtle-themed monsters.
  * In ''[[Yu-Gi-Oh! Dark Duel Stories]]'', this card can be used to [[Ritual Summon]] "[[Crab Turtle]]".
