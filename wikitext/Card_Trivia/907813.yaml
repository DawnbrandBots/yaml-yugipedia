  * "[[Ni-Ni the Mirror Mikanko]]" appears in this card's artwork.
  * This card is based on [[wikipedia:Arabesque (ballet position)|arabesque]], a body position in [[wikipedia:Ballet|ballet]] in which the dancer stands on one leg while extending the other leg behind the body.
