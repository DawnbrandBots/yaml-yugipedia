title: Card Trivia:Transcendosaurus Drillygnathus
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Transcendosaurus]] [[Xyz Monster|Xyz]] form of "[[Lancephorhynchus]]".
  ** This monster's name is a portmanteau of "drill" and ''[[wikipedia:Dorygnathus|Dorygnathus]]'', a pterosaur from the genus that "Lancephorynchus" is based on.
