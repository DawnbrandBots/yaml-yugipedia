title: Card Trivia:Bluebeard, the Plunder Patroll Shipwright
wikitext: |-
  {{Navigation}}

  * This monster's name is possibly based on the French folktale character [[wikipedia:Bluebeard|Bluebeard]].
  * This monster appears in the artworks of "[[Plunder Patroll Shipyarrrd]]", "[[Plunder Patroll Shipshape Ships Shipping]]", and "[[Plunder Patroll Parrrty]]".
  ** "[[Whitebeard, the Plunder Patroll Helm]]", "[[Redbeard, the Plunder Patroll Matey]]", and "[[Emblem of the Plunder Patroll]]" appear in this card's artwork.
