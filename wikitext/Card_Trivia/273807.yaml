title: Card Trivia:Absorbing Kid from the Sky
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (吸収天児, ''Kyūshūtenji'') is a pun based on the Japanese phrase "九州男児" ("Kyūshū danji") which literally translates to "[[wikipedia:Kyushu|Kyushu]] man" which is a stereotype conveying a man who is strong and brave, but short-tempered or self-centered (i.e. "macho").
  ** 吸収 ("kyūshū") means "absorption"/"assimilation", hence this monster's effect to gain LP by destroying monsters in battle.
  ** 天児 ("tenji") means "heaven child", hence this monster's appearance of an angel.
