title: Card Trivia:Indiora Doom Volt the Cubic Emperor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cubic Wave]]".
  * This monster is based on [[wikipedia:Indra|Indra]], the king of the ''[[wikipedia:Deva (Hindusim)|devas]]'' in [[wikipedia:Hindusim|Hindusim]] who wields a lightning bolt.
  * This is the [[signature card]] of [[Aigami]] in the ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'' movie.
