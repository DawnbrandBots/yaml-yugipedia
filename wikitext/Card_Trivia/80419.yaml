title: Card Trivia:Two-Headed King Rex
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster Chronicle]]''.
  * This monster appears in the artwork of "[[Jurassic Power]]".
  * This monster has a retrained counterpart: "[[Double-Headed Dino King Rex]]".
  ** This monster also has an evolved counterpart: "[[Mighty Dino King Rex]]".
  * This is the first [[Dinosaur]] monster to be Summoned in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** In the English dubbed version of the ''Yu-Gi-Oh!'' anime, this monster and "[[Blue-Eyes White Dragon]]" used each other's Japanese roar sound effects.
  * This monster shares the same subcategory ([[Normal Monster]]), [[Attribute]] ([[EARTH]]) and [[original ATK and DEF]] (1600/1200) as "[[Crawling Dragon #2]]".
  ** Both monsters are also [[Fusion Material]] for "[[Bracchio-raidus]]".
  * The [[Two-Headed King Rex (Bandai)|Bandai]] version of this card is [[Level 5]] with 2500 [[ATK]] and 800 [[DEF]], whereas the Konami version is [[Level 4]] with 1600 ATK and 1200 DEF.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|060|ref}}, specifically from the panel showing [[Two-Headed King Rex (manga)|this monster]] being Summoned.
