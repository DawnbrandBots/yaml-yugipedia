title: Card Trivia:Reporter Wars Scoopies
wikitext: |-
  {{Navigation}}

  * "[[Reporter Raccoon]]" appears in this card's artwork.
  * This monster, along with "[[Reporter Wars Scoopies (L)|Reporter Wars Scoopies [L]]]" and "[[Reporter Wars Scoopies (R)|Reporter Wars Scoopies [R]]]", reference the [[Newspaper Club]] from the ''[[Yu-Gi-Oh! SEVENS]]'' anime, which was formed by [[Scoop Pitman]], [[Masa]], and [[Cub]], who were in charge of producing biased content in the form of newspaper articles.
  ** Fittingly, Scoop Pitman is the leader of the Newspaper Club and used "[[Reporter Raccoon (anime)|Reporter Raccoon]]" in the anime, whereas this monster, which depicts "Reporter Raccoon", serves as the central leader of its other two components when [[Maximum Summon]]ed.
