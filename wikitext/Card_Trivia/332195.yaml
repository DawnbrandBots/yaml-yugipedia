title: Card Trivia:Crossover
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name may be a reference to the fact that, with the [[Lancers]] entering the [[Synchro Dimension|Synchro]], [[Xyz Dimension|Xyz]], and [[Fusion Dimension]], the ''[[Yu-Gi-Oh! ARC-V]]'' anime became a [[wikipedia:Fictional crossover|crossover]] with the other anime series (''[[Yu-Gi-Oh! 5D's]]'', ''[[Yu-Gi-Oh! ZEXAL]]'', and ''[[Yu-Gi-Oh! GX]]'', respectively).
  * This card has a [[Turbo Duel]] [[counterpart]]: "[[Crossover Acceleration]]".
  * In the anime, this was the first [[Field Spell]] [[Action Card]] to not be [[activate]]d with a large Solid Vision Projector; it was instead activated simply within the owner's [[Duel Disk]], thus it could only create a few boards where [[Duelist]]s could step on.
