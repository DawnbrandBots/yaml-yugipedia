title: Card Trivia:Dragolithia Kunzite
wikitext: |-
  {{Navigation}}

  * The first portion of this monster's name is a portmanteau of the words "dragon" and "lithia", which is derived from the Greek word ''líthos'' meaning "stone".
  ** The second portion of this monster's name is based on [[wikipedia:Spodumene#Kunzite|kunzite]], a purple-colored gemstone variety of the pyroxene mineral spodumene.
