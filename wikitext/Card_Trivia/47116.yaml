title: Card Trivia:The White Stone of Legend
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Cards of Consonance]]".
  * This monster has 3 [[counterpart]]s.
  ** A "[[Red-Eyes]]" counterpart: "[[The Black Stone of Legend]]"
  ** A ''[[Rush Duel]]'' counterpart: "[[The Origin Stone of Legend]]"
  ** A retrained counterpart: "[[The White Stone of Ancients]]".
  * This monster is the egg of "[[Blue-Eyes White Dragon]]".
  ** This monster has one-tenth (300/250) of the [[ATK]]/[[DEF]] of "[[Blue-Eyes White Dragon]]" (3000/2500).
  ** Unlike "[[Red-Eyes Black Dragon]]", "Blue-Eyes White Dragon" does not have a baby form hatched from this monster yet.
