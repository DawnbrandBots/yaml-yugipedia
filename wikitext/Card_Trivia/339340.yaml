title: Card Trivia:Odd-Eyes Vortex Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[WIND]] [[Fusion Monster|Fusion]] form of "[[Odd-Eyes Dragon]]".
  ** Fittingly, this monster has a green color scheme, which is associated with the WIND [[Attribute]].
  * This is the first "[[Odd-Eyes]]" Fusion Monster.
  * This monster has an opposite [[counterpart]]: "[[Odd-Eyes Gravity Dragon]]".
  ** This monster is a WIND Fusion Monster, while "Odd-Eyes Gravity Dragon" is an [[EARTH]] [[Ritual Monster]].
  ** This monster has its left eye surrounded by a metallic coat, while "Gravity Dragon" has its right eye surrounded by a furry spike.
  ** Both monsters have mirrored poses in their card artworks.
  ** Both have anti-[[Spell]]/[[Trap Card]] effects. This monster can [[negate]] a Spell/Trap effect upon [[activate|activation]] and [[destroy]] it, by shuffling a face [[Pendulum Monster]] from the [[Extra Deck]] to the [[Deck]], while "Gravity Dragon" [[return]]s the opponent's Spells/Traps on the [[field]] to their [[hand]] upon its [[Special Summon]] for no cost.
  *** In addition, both affect different types of cards upon being Summoned. This monster switches an opponent's monster from [[Attack Position]] to [[face-up]] [[Defense Position]], while "Gravity Dragon" returns Spells/Traps on the opponent's field to the hand.
  * This card's Spanish print features a typo in its [[card text]], as its [[Fusion Material]]s are written as "1 monstruo'''s''' "Ojos Anómalos"" ("1 "Odd-Eyes" monster'''s'''"), instead of "1 monstruo "Ojos Anómalos"" ("1 "Odd-Eyes" monster").
