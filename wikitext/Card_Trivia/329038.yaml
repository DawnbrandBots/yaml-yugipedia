title: Card Trivia:Metaphys Horus
wikitext: |-
  {{Navigation}}

  * The "[[Yang Zing]]" crest appears on this monster's pelvic section.
  * This card is the "[[Metaphys]]" [[Synchro Monster|Synchro]] [[counterpart]] of "[[Horus the Black Flame Dragon LV6]]".
  * This card is the first Synchro Monster to support [[Pendulum Monster]]s.
  ** Additionally, this card is also the first [[Wyrm]] Synchro Monster not to be a "Yang Zing" monster.
  * The effects this card gains depending on the non-[[Tuner monster]]s used as [[Synchro Material]] for its [[Synchro Summon]] are based on the effects of the "[[Horus the Black Flame Dragon]]" monsters.
  ** [[Normal Monster]]: Its effect to make itself [[unaffected]] by other card effects for a turn is based on the effect of "Horus the Black Flame Dragon LV6" to be unaffected by [[Spell Card]]s.
  ** [[Effect Monster]]: Its effect to [[negate]] the effect of another [[face-up]] card is based on the effect of "[[Horus the Black Flame Dragon LV8]]" to negate the activation of a Spell Card.
  ** Pendulum Monster: Its effect to force the opponent to give the player the [[control]] of one of their monsters is based on the effect of "[[Horus the Black Flame Dragon LV4]]" to not allow its control to be switched.
