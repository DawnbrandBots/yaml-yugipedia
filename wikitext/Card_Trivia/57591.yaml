  * This monster is based on the ''[[wikipedia:Velociraptor|Velociraptor]]'', a genus of the [[wikipedia:Dromaeosauridae|dromaeosauridae]] family, a group of small and carnivorous bipedal dinosaurs known for their sickled claws and feathers.
