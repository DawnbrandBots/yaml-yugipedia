title: Card Trivia:Dark Tuner Catastrogue
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "catastrophe" and "rogue".
  * This is the first [[Dark Tuner monster]] revealed.
  ** This is the first Dark Tuner monster to be a [[featured card]] in the anime, having been featured in {{episode|5D's|027|ref}}; however, it was also a featured card in {{episode|5D's|032|ref}}, despite not appearing in that episode.
  * This monster and "[[Dark Tuner Nightmare Hand]]" are the first "[[Dark Tuner (archetype)|Dark Tuner]]" monsters to be released in the ''[[OCG]]''/''[[TCG]]''.
