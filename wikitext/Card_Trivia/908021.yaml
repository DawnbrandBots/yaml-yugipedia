title: Card Trivia:Abyss Shark
wikitext: |-
  {{Navigation}}

  * This card is a "[[Shark (archetype)|Shark]]" [[counterpart]] of "[[Number 73: Abyss Splash]]".
  ** This monster's name and appearance are based on "Abyss Splash".
  ** This monster's [[Level]] (5) matches the [[Rank]] of "Abyss Splash".
  ** This monster's [[original ATK and DEF]] (1200/700) are half of those of "Abyss Splash" (2400/1400).
  ** This monster's effect to double the [[battle damage]] caused by a "[[Number]]" monster is the opposite of the effect of "Abyss Splash".
  * This monsters is a counterpart of "[[Crystal Shark]]", which is based on "[[Number 94: Crystalzero]]".
  ** Both monsters are depicted with mirrored poses in their card artworks.
  ** Both monsters share the same [[Attribute]] ([[WATER]]), Level (5), and [[Type]] ([[Fish]]), as well as the same combined [[ATK]] and [[DEF]] (1900).
