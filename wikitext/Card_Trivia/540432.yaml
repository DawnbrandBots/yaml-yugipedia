title: Card Trivia:Gladiator Beast's Battle Gladius
wikitext: |-
  {{Navigation}}

  * The [[wikipedia:Gladius|gladius]] was the primary sword used by Ancient Roman foot soldiers. In fact, the term "gladiator" comes from "gladius".
  * "Gladius" means "sword" in Latin.
  * This card is the "[[Gladiator Beast]]" version of "[[Butterfly Dagger - Elma]]".
  * The monster that appears in this card's artwork also appears in the artworks of "[[Gladiator Beast's Battle Manica]]" and "[[Gladiator Beast's Battle Halberd]]".
