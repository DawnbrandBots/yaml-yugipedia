title: Card Trivia:Final Bringer of the End Times
wikitext: |-
  {{Navigation}}

  * This card's name references "[[Varudras, the Final Bringer of the End Times]]".
  ** This card's artwork depicts the same energy attack used by "Varudas" as depicted in its card artwork. Fittingly, both cards have an effect that can [[destroy]] monsters, while this card's effect can facilitate the final destruction effect of "Varudas".
  ** This card's Japanese name, "Decanelogue", references the [[wikipedia:Ten Commandments|Ten Commandments]], a set of biblical principals used in Judaism, Christianity, and Islamic religions, which is also known as "Decalogue".
