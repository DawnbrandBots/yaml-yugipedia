title: Card Trivia:Ariel, Priestess of the Nekroz
wikitext: |-
  {{Navigation}}

  * "[[Gishki Aquamirror]]" and "[[Nekroz Mirror]]" appear in this card's artwork.
  * This monster is an older version of "[[Gishki Ariel]]".
  * This card is the first [[Psychic]] "[[Nekroz]]" monster.
  * This card is the only "Nekroz" [[Effect Monster]] that does not have any Ritual counterparts.
