title: Card Trivia:Geomathmech Final Sigma
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Mystic Fighters]]''/''[[Mystic Fighters]]''.
  * This monster appears in the artwork of "[[Mathmech Induction]]".
  * This monster is an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form of "[[Mathmech Sigma]]", combined with "[[Mathmech Addition]]" and "[[Mathmech Subtraction]]".
  ** This monster is based on the word-final form of the Greek letter [[wikipedia:Sigma|sigma]] (ς), a lowercase sigma used when it is the last letter of a word.
  *** While uppercase sigma (Σ) is used in mathematics to represent [[wikipedia:Summation|summation]], the word-final form of lowercase sigma is not used as a mathematical operator.
  *** Fittingly, the cross-guard on this monster's sword is shaped like the summation operator (Σ).
  * This card is the first [[Level]] 12 [[Cyberse]] monster.
  ** This card also has the highest Level (12) of all [[Cyberse]] monsters.
