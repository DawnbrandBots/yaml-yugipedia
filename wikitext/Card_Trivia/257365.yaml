title: Card Trivia:Junk Puppet
wikitext: |-
  {{Navigation}}

  * "[[Gimmick Puppet Dreary Doll]]" and the [[Graveyard]] portal from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime appear in this card's artwork.
  ** Fittingly, "Gimmick Puppet Dreary Doll" was the monster [[Special Summon]]ed with this card's effect in {{episode|ZEXAL|043|ref}}.
  ** This card's artwork is referenced in the artwork of "[[Perform Puppet]]", which depicts "Dreary Doll" being pulled out of its coffin (or box) in a similar fashion.
