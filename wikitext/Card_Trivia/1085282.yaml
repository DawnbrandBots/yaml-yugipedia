title: Card Trivia:Template Skipper
wikitext: |-
  {{Navigation}}

  * This monster is a [[DARK]] [[counterpart]] of "[[Formud Skipper]]".
  ** Both share the same [[Level]] (1), [[Type]] ([[Cyberse]]), and [[original ATK and DEF]] (0/0).
  ** Both have an effect that allows them to be treated with a different name when used as [[Link Material]]: "Formud Skipper" copies the name of a [[Link Monster]] in the [[Extra Deck]], while this monster copies the name of a Cyberse monster in the [[hand]] or [[Graveyard]].
