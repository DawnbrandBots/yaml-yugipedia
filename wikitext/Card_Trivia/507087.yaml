title: Card Trivia:Weather Control
wikitext: |-
  {{Navigation}}

  * This card has a [[Flip monster|Flip Effect]] [[recolored counterpart]]: "[[Weather Report]]".
  * The doll hanging off of this monster's umbrella is a [[wikipedia:teru teru bōzu|teru teru bōzu]], a good-luck charm in Japanese culture that is said to bring clear, sunny days if hung from the window during the night before.
