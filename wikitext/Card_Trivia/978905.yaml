title: Card Trivia:No One Suspects the Dark Scorpion Gang!
wikitext: |-
  {{Navigation}}

  * This card's name likely references the series of "[[wikipedia:Monty Python's Flying Circus|Monty Python]]" sketches titled "[[wikipedia:The Spanish Inquisition (Monty Python)|The Spanish Inquisition]]", in which members of [[wikipedia:Spanish Inquisition|the Spanish Inquisition]] comically storm into locations in response to characters making an annoyed remark along the lines of: "I wasn't expecting a Spanish Inquisition!". After which the Inquisition's leader, [[wikipedia:Francisco Jiménez de Cisneros|Ximénez]] proclaims: "Nobody expects the Spanish Inquisition!"
  ** The comedic, absurd tone of the sketch (as well as "Monty Python's" other outings) is befitting of the [[Dark Scorpion]]'s own nature in the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, which is known for exacerbating outlandish aspects of the source material to via its writing and voice direction.
  * This card's effect is based on the effect of "[[Dark Scorpion Combination]]".
