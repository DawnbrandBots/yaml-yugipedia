title: Card Trivia:Zaborg the Mega Monarch
wikitext: |-
  {{Navigation}}

  * This is the Mega Monarch version of "[[Zaborg the Thunder Monarch]]".
  * This monster appears in the artwork of "[[Strike of the Monarchs]]".
  * The 'horns' around the shoulders of this card resemble the horns of "[[Thunder End Dragon]]" (which are better seen in the artwork of "[[Xyz Burst]]").
  ** Although the above is plausible, it is more likely that the horns came from "[[Shrine of Mist Valley]]". This is further reinforced by the fact that the horns of "Thunder End Dragon" are too small and too thin to be what is on Mega Zaborgs shoulder
  * This monster strongly resembles "[[Emperor of Lightning]]," also a [[Level 8]] [[Card Evolutions|Enhanced]] counterpart to "Zaborg."
  * This card is most likely based on the Japanese legend of the Oni, ogres who often wore tigers skin clothing.
  * The highest number of cards this card can send from the [[Extra Deck]] to the [[GY]] is 26, 13 from each player, by destroying "[[Number iC1000: Numerounius Numerounia]]", a [[LIGHT]] [[Rank 13 Monster Cards|Rank 13]] monster.
