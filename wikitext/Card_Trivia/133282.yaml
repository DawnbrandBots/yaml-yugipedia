title: Card Trivia:Gishki Ariel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Aquamirror Meditation]]".
  * "[[Gishki Aquamirror]]" appears in this card's artwork, at the top of this monster's staff.
  * This monster has a younger form: "[[Speaker for the Ice Barriers]]".
  ** This monster has two older forms: "[[Naelshaddoll Ariel]]" and "[[Ariel, Priestess of the Nekroz]]".
  ** This monster has two [[Ritual Monster]] forms: "[[Evigishki Mind Augus]]" and "[[Evigishki Neremanas]]".
  * According to the ''[[Duel Terminal Master Guide card storylines|Duel Terminal Master Guide]]'', this monster was orphaned by a rampaging "[[Trishula, Dragon of the Ice Barrier]]" during the war with the "[[Fabled]]" monsters, and was taken in by "[[Gishki Noellia]]", as depicted in the artwork of "[[After the Storm]]".
  * This monster is very similar to "[[Eria the Water Charmer]]" in both name (especially in Japanese, where this card is called "Erial") and appearance, implying that the two may be associated in some way, similar to "[[Wynn the Wind Charmer]]" and "[[Winda, Priestess of Gusto]]" being sisters according to the ''[[Duel Terminal Master Guide card storylines#The Main House|Duel Terminal Master Guide]]''.
