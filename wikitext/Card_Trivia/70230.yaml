title: Card Trivia:Makiu, the Magical Mist
wikitext: |-
  {{Navigation}}

  * This card has multiple ''[[Rush Duel]]'' counterparts: "[[Majinrai, the Striking Storm]]" (based on "[[Skull Archfiend of Lightning]]") and "[[Masenkou, the Lashing Light]]".
  * This card's effect to [[target]] "[[Summoned Skull]]" and [[Thunder]] monsters reference how "[[Summoned Skull (manga)|Summoned Skull]]" could attack with lightning in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * In ''[[Yu-Gi-Oh! Worldwide Edition: Stairway to the Destined Duel]]'', this card's effect mistakenly listed "[[Left Arm of the Forbidden One]]" instead of "Summoned Skull".
