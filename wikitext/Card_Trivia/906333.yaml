title: Card Trivia:Imperial Bower
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[King's Court]]''.
  * This monster is named after the ''[[wikipedia:Joker (playing card)|Imperial Bower]]'', the first illustrated ''Best Bower'' card (the highest trump used in [[wikipedia:Euchre|Euchre]]) in 1863, the earliest form of the [[wikipedia:Joker (playing card)|Joker]] playing card.
  ** These monsters are based on the ''Right Bower'' and the ''Left Bower'', the two highest ranking cards used in Euchre before the introduction of the ''Best Bower'' that ranks above both, that being the Joker playing card. Fittingly, these monsters resemble weaker versions of "[[Joker's Knight]]", which "outranks" this card in terms of stats.
  *** The ''Right Bower'' (the [[wikipedia:Jack (playing card)|Jack]] of the trump suit) is the highest trump, while the ''Left Bower'' (the Jack of the same color but different suit) is the second-highest ranking card, reflecting how these monsters' spears are paired with the [[wikipedia:Playing card suit|playing card suits]] of the same color.
