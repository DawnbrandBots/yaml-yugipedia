title: Card Trivia:Blast Examiner
wikitext: |-
  {{Navigation}}

  * This card's English ''[[Yu-Gi-Oh! Duel Links|Duel Links]]'' text mistakenly refers to the monster as "he", even though it visually appears to be female in its artwork and in the anime. [[Maddox Sogetsu]]'s voice lines in the game properly refer to the monster as a "she".
