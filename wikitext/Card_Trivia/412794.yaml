title: Card Trivia:Kozmo Forerunner
wikitext: |-
  {{Navigation}}

  * "[[Kozmo Sliprider]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Kozmotown]]".
  * This monster's design is based on the [[wikipedia:Millennium Falcon|Millennium Falcon]] from the ''[[wikipedia:Star Wars|Star Wars]]'' films; however, its function as a larger ship with the ability to launch smaller ships like "Sliprider"<ref>{{cite web | url = https://yugiohblog.konami.com/articles/?p=7294 | title = You’ve Never Heard of the Forerunner? | author = Jerome McHale | publisher = Konami | date = July 15, 2015 | accessdate = June 16, 2024}}</ref> resembles that of a capital ship.
  ** This monster's artwork may be a reference to a scene at the end of ''[[wikipedia:The Empire Strikes Back|Star Wars: Episode V – The Empire Strikes Back]]'', where the Millennium Falcon launches from the medical frigate [[wikia:w:c:starwars:Redemption|Redemption]] and departs to parts unknown.

