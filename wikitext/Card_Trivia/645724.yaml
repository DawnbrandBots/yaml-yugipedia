title: Card Trivia:Altergeist Multifaker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Altergeist Failover]]".
  * This monster's name is a portmanteau of "[[wikipedia:Fairy|fairy]]" and "[[wikipedia:Computer multitasking|multitasking]]".
  ** A [[fairy]] is a mythological spirit in [[wikipedia:European folklore|European folklore]] who often takes the form of a human with insect-like wings.
  ** Multtasking is the running of multiple programs (sets of instructions) in one computer at the same time
