title: Card Trivia:Hoshiningen
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name, is a portmanteau of the Japanese words for "star" (''hoshi'') and "person" (''ningen'').
  ** This monster's name may also be a pun on the word "shining" ("Ho'''shining'''en").
  * This monster has an [[Card evolutions|upgraded]] [[Link Monster]] [[counterpart]]: "[[Hip Hoshiningen]]".
