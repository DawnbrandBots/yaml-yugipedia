title: Card Trivia:Heroic Challenger - Double Lance
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Heroic Advance]]".
  ** This monster's weapons appear in the artwork of "[[Heroic Retribution Sword]]".
  * This monster's name and weapon are based on a [[wikipedia:Lance|lance]], a polearm consisting of steel blade or head mounted on a long shaft. This, along with this monster's usage of two lances, reflect its effect to use a "double" of itself to [[Xyz Summon]].
  * This is the first card to feature an effect that could treat a monster as two [[material]]s for the Xyz Summon of an Xyz Monster.
  ** Until the release of "[[Drake Shark]]" in ''[[Rage of the Abyss]]'', this effect was commonly used among cards used in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime; however, many of them had their effects changed to instead [[Summon]] other monsters when they were adapted for the ''[[OCG]]''/''[[TCG]]'', much akin to this card, if this effect was not excised in adaptation altogether.
