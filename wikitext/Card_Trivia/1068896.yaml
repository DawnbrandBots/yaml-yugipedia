title: Card Trivia:Azamina Debtors
wikitext: |-
  {{Navigation}}

  * "[[Azamina Mu Rcielago]]", "[[Azamina Ilia Silvia]]", and "[[Diabellstar the Black Witch]]" appear in this card's artwork.

  * This card's Japanese name is based on ''Ofeiletis'', a Greek word that literally translates to "debtor".
