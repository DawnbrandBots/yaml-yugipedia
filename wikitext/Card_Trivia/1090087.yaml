title: Card Trivia:Delta of Invitation
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:river delta|river delta]], a triangular-shaped landform that forms when a river empties into a body of water and deposits sediment, with the term derived from the uppercase Greek letter [[wikipedia:Delta (letter)|delta]] (Δ).
  ** While there are many cards with the word "Delta" in their names, this one is the first to include the Greek letter "Δ" in its Japanese name.
  * This card's artwork likely depicts a location within "[[Zombie World]]". This is reinforced with the artwork depicting the river's red color with the craggy landscape around it and the stormy purple sky above it, as well this card's [[Zombie]] [[support]] effect.
