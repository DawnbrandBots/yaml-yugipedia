title: Card Trivia:Sacred Spirit of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This monster is "[[Prior of the Ice Barrier]]" revived as a [[Spirit]].
  * This monster appears in the artworks of "[[Void Trap Hole]]" and "[[Dragunity Oubliette]]".
  * This card was the first [[WATER]] [[Zombie]]-[[Type]] monster to exist in the game, and the only one until the reveal of "[[Sea Monster of Theseus]]" more than 7 years later.
  * This card was the first Spirit monster to be part of any [[archetype]]. It was also the first Spirit monster that is not based off any figure from Japanese Mythology.
  ** This card's artwork reflects its effect to stay on the field by freezing the portal to the Spirit World if you control another "Ice Barrier" monster.
  * This is currently the only Spirit monster that does not necessarily have to return to its owner's hand without another card's effect.
  * This card and "[[Dark Dust Spirit]]", both Zombie-Type monsters, are so far the only Spirit monsters who titularly have the word "Spirit" in their names as well.
