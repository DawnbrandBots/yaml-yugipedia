title: Card Trivia:Constellar Castor
wikitext: |-
  {{Navigation}}
  * "[[Constellar Pollux]]" appears in this card's artwork.
  ** According to the [[Duel Terminal Master Guide card storylines|''Duel Terminal Master Guide'' card storylines]], "Castor" and "Pollux" are brothers who govern the constellation [[wikipedia:Gemini (constellation)|Gemini]] together.
  * This monster is based on [[wikipedia:Castor (star)|Castor]], the second-brightest star in the constellation of Gemini.
  ** The constellation and the astrological sign for [[wikipedia:Gemini (astrology)|Gemini]] (♊︎︎) appears in the background of this card's artwork, with the location of Castor denoted by the encircled star in the constellation.
  * This monster is the purified form of "[[Evilswarm Castor]]".
  ** Unlike the original form of "Castor" that appears in "[[Constellar Meteor]]", this monster retains similar features as "Evilswarm Castor" (an altered horn, curved spikes, and facial scars).
