title: Card Trivia:Eucalyptus Mole
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster's name and [[Plant]] [[Type]] are based on the [[wikipedia:Eucalyptus|eucalyptus]], a genus of flowering trees native to [[wikipedia:Australia|Australia]].
  ** Despite this monster's name, it visually resembles an [[wikipedia:Echidna|echidna]], a species of spiny egg-laying mammals native to Australia.
  ** This monster's effect to [[Special Summon]] a "[[Koala]]" monster references how eucalyptus leaves are a primary food source for koalas.
  * This monster's ''[[OCG]]''/''[[TCG]]'' bulleted effect [[support]]ing [[Non-Effect]] [[Beast]] monsters references a scene in {{episode|GX|050|ref}} where [[Eucalyptus Mole (anime)|this monster's]] effect allowed [[Chumley Huffington]] to Special Summon "[[Big Koala (anime)|Big Koala]]", a Beast [[Normal Monster]], from his [[Deck]] when it was [[destroyed by battle]].
  ** This monster's ''OCG''/''TCG'' bulleted effect to allow the player's non-Effect Beast monster to gain [[ATK]] equal to their [[original DEF]] until the end of the player's next turn references Chumley's next turn after this monster was [[destroy]]ed, where he used "[[Wild Nature's Release (anime)|Wild Nature's Release]]" to allow "Big Koala" to gain ATK equal to its [[DEF]] until the end of his turn. 
  ** The lack of negative drawbacks references how Chumley later used the effect of "[[Beast Soul Swap (anime)|Beast Soul Swap]]" to [[return]] the "Big Koala" affected by "Wild Nature's Release" to his [[hand]] and Special Summon another copy of "Big Koala" from his hand, preventing the first "Big Koala" from being destroyed by the final effect of "Wild Nature's Release".
