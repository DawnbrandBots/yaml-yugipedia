title: Card Trivia:"Invitation" to the Society
wikitext: |-
  {{Navigation}}

  * This card's name and its usage of quotation marks references how [[Chazz Princeton]], while brainwashed as a member of the [[Society of Light]], "invited" [[Alexis Rhodes]], [[Bastion Misawa]], and other [[Obelisk Blue]] students at [[Duel Academy]] to join the society in by brainwashing them in the ''[[Yu-Gi-Oh! GX]]'' anime.
