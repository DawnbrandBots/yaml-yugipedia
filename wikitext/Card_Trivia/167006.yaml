title: Card Trivia:Infinite Light
wikitext: |-
  {{Navigation}}

  * This card's name references [[wikipedia:Ohr|Ohr Ein Sof]], the [[wikipedia:Kabbalah|Jewish Kabbalistic]] term representing the concept of infinite light.
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this card is activated, it transforms into the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]], a diagram used in the [[wikipedia:Kabbalah|Jewish Kabbalah]] to illustrate the ten [[wikipedia:Sephirot|sefirot]], a series of emanations or attributes representing the manifesting essence of God (or [[wikipedia:Da'at|Da'at]]).
  ** Fittingly, this card's final effect requires the first ten "[[Timelord]]" monsters (with each member representing one of the sefirot of the Tree of Life) to be Summoned to activate it, in order to [[Special Summon]] "[[Sephylon, the Ultimate Timelord (anime)|Sephylon, the Ultimate Timelord]]", a monster who represents the mystical state of the sephirah combined into a divine being.
  ** This card's ''[[OCG]]''/''[[TCG]]'' effect to Special Summon up to three "Timelord" monsters with different names from the [[hand]], [[Deck]], and [[Graveyard]] references the anime effect of "Sephylon the Ultimate Timelord" to Special Summon as many "Timelord" monsters as possible from the hand, Deck, and Graveyard.
  ** This card's ''OCG''/''TCG'' effect to [[Ignoring the Summoning conditions|ignore the Summoning conditions]] when Special Summoning "Timelord" monsters also allows it to Special Summon "[[Sephylon, the Ultimate Timelord]]", as [[Z-one]] did in {{episode|5D's|151|ref}}.
