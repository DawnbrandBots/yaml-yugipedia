title: Card Trivia:Worm Drake
wikitext: |-
  {{Navigation}}

  * With the introduction of the "[[Worm]]" [[archetype]] (which consists of [[LIGHT]] [[Reptile]] monsters and pertains to the [[support]] of the archetype's members of the [[Type]]), this is the first "Worm" monster.
  ** It is also the only [[Normal Monster]], as well as the only [[EARTH]] monster in the archetype.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from Yu-Gi-Oh! Duelist Duel 112: "[[Yu-Gi-Oh! Duelist - Duel 112|Fight of the Millennium]]", specifically from the panel showing [[Worm Drake (manga)|this monster]] being Summoned.
