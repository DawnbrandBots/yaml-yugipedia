title: Card Trivia:Crystal Beast Rainbow Dragon
wikitext: |-
  {{Navigation}}

  [[File:Rainbow_Dragon's_silhouette.png|thumb|right|250|The silhouette of "[[Rainbow Dragon (anime)|Rainbow Dragon]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.]]

  * This monster is a "[[Crystal Beast]]" downgraded form of "[[Rainbow Dragon]]".
  ** This monster's name and [[Special Summon]]ing effect are both based on a scene from {{episode|GX|107|ref}}: During the first Duel between [[Jaden Yuki]] and Jesse Anderson, when Jaden's "[[Elemental Hero Air Neos (anime)|Elemental Hero Air Neos]]" attacks Jesse's "[[Crystal Beast Amber Mammoth (anime)|Crystal Beast Amber Mammoth]]", Jesse bluffs that he would [[Special Summon]] "Crystal Beast Rainbow Dragon".
  ** This monster's appearance is based on the silhouette of "[[Rainbow Dragon (anime)|Rainbow Dragon]]" in the aforementioned scene, which has a much different design before the first official appearance of "Rainbow Dragon" in {{episode|GX|130|ref}}, including a furred chest and wings, a more pronounced jaw, and no horns and head fins.
  * This monster's inner wings feature the same blue color scheme as Jesse Anderson's hair.

