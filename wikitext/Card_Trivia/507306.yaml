title: Card Trivia:Cosmo Queen
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Battle Constant]]".
  * This monster has two [[retrain]]ed [[counterpart]]s: "[[Cosmo Brain]]" and "[[Cosmo Queen the Queen of Prayers]]".
  * This monster has a ''[[Rush Duel]]'' [[Bubble Actress]] counterpart: "[[Cosmo Clean]]".
  * This monster has the highest [[original ATK]] (2900) and combined [[original ATK and DEF]] of all [[Spellcaster]] [[Normal Monster]]s.
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster is a [[Fusion Monster]] with its [[Fusion Material]]s being "[[Dark Elf]]" and "[[Mystical Elf]]". In other video games, it is a [[Ritual Monster]], which can be [[Ritual Summon]]ed using the corresponding [[Ritual Spell Card]], "[[Cosmo Queen's Prayer]]".
  ** In ''[[Yu-Gi-Oh! Forbidden Memories]]'', the monsters required to [[Ritual Summon]] this monster are "[[Princess of Tsurugi (FMR)|Princess of Tsurugi]]", "[[Queen's Double (FMR)|Queen's Double]]", and "[[Queen of Autumn Leaves (FMR)|Queen of Autumn Leaves]]".
  ** In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', the monsters required to Ritual Summon this monster are "[[Princess of Tsurugi (DOR)|Princess of Tsurugi]]", "[[Dark Elf (DOR)|Dark Elf]]" and "[[Queen of Autumn Leaves (DOR)|Queen of Autumn Leaves]]".
