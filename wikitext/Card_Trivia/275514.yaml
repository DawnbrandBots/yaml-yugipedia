title: Card Trivia:Armageddon Designator
wikitext: |-
  {{Navigation}}

  * "[[Armageddon Knight]]" and the land from the artwork of "[[Demise of the Land]]" appear in this card's artwork.
  * This card has an [[Effect Monster]] [[counterpart]], "[[Psi-Blocker]]", and a [[Spell Card]] counterpart, "[[Prohibition]]".
  * The Spanish name of this card was mistranslated as "Armageddon Designer" ("Diseñador del Armagedón").
