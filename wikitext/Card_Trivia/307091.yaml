title: Card Trivia:Ghostrick Skeleton
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ghostrick Festival]]", "[[Ghostrick-Go-Round]]", "[[Ghostrick Museum]]", "[[Ghostrick Night]]", "[[Ghostrick Parade]]", and "[[Ghostrick Renovation]]".
  * This monster is based on the [[wikipedia:Grim Reaper|Grim Reaper]], the personification of Death who is often depicted as a cloaked skeleton wielding a scythe.
  * This monster's cloak features a clasp with the letters "GST", possibly an abbreviation for "[[Ghostrick]]".
