title: Card Trivia:The Agent of Mystery - Earth
wikitext: |-
  {{Navigation}}

  * "[[Mystical Shine Ball]]" possibly appears in this card's artwork, as the head of this monster's staff.
  * This monster is based on the planet [[wikipedia:Earth|Earth]], which appears in the background of this card's artwork.
  ** This monster may also be based on [[wikipedia:Terra (mythology)|Terra]] (also known as Mother Earth), the Roman goddess of Earth.
  * This card is the only "[[The Agent]]" monster to be [[Limited]] or [[Semi-Limited]].
