title: Card Trivia:Maliss C GWC-06
wikitext: |-
  {{Navigation}}

  * The faces of "[[Maliss P Chessy Cat|Maliss <nowiki><P></nowiki> Chessy Cat]]" appear in this card's artwork.
  * This card's name is a reference to Chapter 6 of ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]''.
  ** "GWC" is an acronym of a phrase from the chapter, "'''G'''rin '''W'''ithout a '''C'''at".
