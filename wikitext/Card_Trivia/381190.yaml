title: Card Trivia:Frightfur Leo
wikitext: |-
  {{Navigation}}

  * At first glance, Frightfur Leo's arms don't actually appear attached to its body, due to the large buzzsaw making up it's torso. However, close examination shows that the arms are attached to its head.
  * This monster appears in the artworks of "[[Designer Frightfur]]" and "[[Frightfur March]]".
  ** Multiple copies of this monster appear in the artwork of "[[Frightfur Parade]]".
