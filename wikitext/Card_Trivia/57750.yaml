title: Card Trivia:Dark Chimera
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Amazoness Substitution]]".
  * This is one of several monsters whose [[ATK]] or [[DEF]] is [[not divisible by 50]], the others being "[[Number S39: Utopia Prime]]", "[[Sword Arm of Dragon]]", and [[PaniK's monsters]]: "[[Barox]]", "[[Castle of Dark Illusions]]", "[[King of Yamimakai]]", and "[[Reaper of the Cards]]".
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and ''[[Yu-Gi-Oh! The Sacred Cards]]'', this monster's [[original ATK and DEF]] were 2100/1600.
