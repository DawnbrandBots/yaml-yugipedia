title: Card Trivia:Odd-Eyes Wizard Dragon
wikitext: |-
  {{Navigation}}
  [[File:PendulumSummon.png|thumb|right|250px|A [[Pendulum Summon]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.]]
  * The [[Pendulum Summon]]ing portal from the ''[[Yu-Gi-Oh! ARC-V]]'' anime appears in this card's artwork.
  * This monster is an [[Card evolutions|upgraded]] [[DARK]] form of "[[Odd-Eyes Dragon]]".
  ** Fittingly, this monster has a black color scheme, which is the same color scheme as the DARK [[Attribute]]. 
  * This monster is a [[counterpart]] of "[[Odd-Eyes Pendulum Dragon]]".
  ** This is the only [[Four Dimensional Dragons#"Odd-Eyes Dragon's" elemental evolutions|elemental upgraded form]] of "Odd-Eyes Dragon" to also be a counterpart of "Odd-Eyes Pendulum Dragon".
  * This card has a [[LIGHT]] counterpart: "[[Odd-Eyes Saber Dragon]]".
  ** Both are depicted with mirrored poses in their card artworks.
  ** Both can be [[Special Summon]]ed from the [[hand]] by [[Tributing]] a monster with the same Attribute and [[send]]ing "Odd-Eyes Dragon" from the hand, [[Deck]], or [[field]] to the [[Graveyard]].
