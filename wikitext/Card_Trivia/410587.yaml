title: Card Trivia:Flower Cardian Moonflowerviewing
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''Tsukimi-zake'' ("Moonviewing with Sake") and ''Hanami-zake'' ("Flowerviewing with Sake") card combinations in the ''[[wikipedia:Hanafuda|hanafuda]]'' card game, ''[[wikipedia:Koi-Koi|Koi-Koi]]''. These combinations require the "Chrysanthemum and Sake Cup" ''tane'' card with a specific ''hikari'' card: "Zebra Grass with Full Moon" for ''Tsukimi-zake'' or "Cherry Blossom with Curtain" for ''Hanami-zake''.
  ** Images of the chrysanthemum suit, sake cup, full moon, and curtain appear in the background of this card's artwork.
