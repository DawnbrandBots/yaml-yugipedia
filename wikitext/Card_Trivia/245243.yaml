title: Card Trivia:Zen Garden
wikitext: |-
  {{Navigation|mode=otherGame}}

  * A [[wikipedia:Japanese rock garden|zen garden]] is a miniature, stylized landscape through carefully composed arrangements of rocks, water features, moss, pruned trees and bushes, and uses gravel or sand that is raked to represent ripples in water. They were intended to imitate the intimate essence of nature, not its actual appearance, and to serve an aid to meditation about the true meaning of life.
