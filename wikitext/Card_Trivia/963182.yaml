title: Card Trivia:Kataomoiruka
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the Japanese word for "unrequited love" (片思い ''katomoi'') and "dolphin" (イルカ ''iruka'').
  ** Fittingly, this monster is depicted displaying a one-sided affection for the pufferfish, represented by the heart-shaped air bubbles blown from its spout.
