title: Card Trivia:Cyberse Contract Witch
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Cyberse Witch]]".
  ** This monster's name is derived from the Japanese [[Summon chants in Yu-Gi-Oh! VRAINS#Yusaku Fujiki (Playmaker)|Summon chant]] of "[[Cyberse Magician (anime)|Cyberse Magician]]" in {{episode|VRAINS|048|ref}}, which features the debut appearance of "[[Cyberse Witch (anime)|Cyberse Witch]]" and "Cyberse Magician": ''"The contract has been made."''
