title: Card Trivia:Call of the Reaper
wikitext: |-
  {{Navigation}}

  * Two "[[Fire Ant Ascator]]s" and the ghostly version of "[[Apocatequil]]" appear in this card's artwork.
  * The background of this card's artwork features ''[[wikipedia:Chullpa|chullpas]]'', a series of funerary towers originally constructed for members of nobility located in central [[wikipedia:South America|South America]].
