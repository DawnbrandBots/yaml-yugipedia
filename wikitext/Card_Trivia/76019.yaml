title: Card Trivia:Machine King
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Faulty Fire]]".
  * "[[Machine King - 3000 B.C.]]" > "[[Machine King Prototype]]" > "'''Machine King'''" > "[[Perfect Machine King]]"
  ** This is the only "[[Machine King (archetype)|Machine King]]" monster that counts for its own [[ATK]]-increasing effect.
  * This monster has at least three notable servants as mentioned in their [[flavor text]]: "[[Mechanicalchaser]]", "[[Robotic Knight]]", and "[[Cyber Soldier]]". Additionally, "[[Cannon Soldier]]", "[[Brave Scizzar]]" and "[[Guardian of the Throne Room]]" are depicted as allies of "Mechanicalchaser" in multiple card artworks, implicitly tying them to the "Machine King".
  * The ''[[Duelist League Series 4 participation card|Duelist League 4]]'' variant of this card has its name printed in white text.
