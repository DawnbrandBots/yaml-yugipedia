title: Card Trivia:Laplace the Fiend Mathematician
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is based on [[wikipedia:Pierre-Simon Laplace|Pierre-Simon Laplace]], an influential French scholar whose work was important to the development of mathematics, statistics, physics and astronomy.
  ** This monster's name, design, and [[Fiend]] [[Type]] (or "Demon" in Japan) reference "[[wikipedia:Laplace's demon|Laplace's demon]]", an imaginary creature created by Laplace to explain casual determinism. According to Laplace, if someone (like the demon) knows the precise location and momentum of every atom in the universe, their past and future values for any given time are determined.
  *** This is reflected in this monster's effect which [[activate]]s when it leaves the [[field]], where its damaging effect is determined by the number of cards on the field prior to leaving the field, and the multiples of 300 damage it will inflict onto the opponent for each card after leaving the field.
