title: Card Trivia:Brotherhood of the Fire Fist - Eland
wikitext: |-
  {{Navigation}}

  * This card is named after ''[[wikipedia:Yan Qing|Yan Qing]]''.
  ** ''Yan Qing'' ranks 36th of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "Prodigal" / "Wanderer".
  *** Based on his story,  he was orphaned as a child. He was raised by the wealthy squire [[Brotherhood of the Fire Fist - Kirin|Lu Junyi]], who lives in Daming Prefecture. To repay Lu Junyi's kindness, Yan Qing serves as one of his stewards and shows unwavering loyalty towards his master. Hence, their team up in "[[Fire Formation - Domei]]".
  * This is the first "[[Fire Fist]]" [[Ritual Monster]].
  * This monster appears in the artwork of "Fire Formation - Domei".
