title: Card Trivia:Master of the Flaming Dragonswords
wikitext: |-
  {{Navigation}}

  * This card shares a lot of similarities with "[[Flame Swordsman]]". They both have the same [[ATK]], [[attribute]], and [[type]].
  ** Like this card, "Flame Swordsman" also wields a [[Salamandra|dragon flame sword]].
  * This card appears to look somewhat similar to Lion-O from Thundercats.
