title: Card Trivia:R-Genex Turing
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Alan Turing|Alan Turing]], an English mathematician who is considered the pioneer of modern computer science.
  * This monster is the [[retrain]]ed counterpart of "[[R-Genex Oracle]]".
  ** This monster has twice the [[Level]] (2) and [[original ATK and DEF]] (600/600) as "Oracle".
