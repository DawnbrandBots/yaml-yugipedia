title: Card Trivia:Scatter Fusion
wikitext: |-
  {{Navigation}}

  * The silhouetted heads of "[[Gem-Knight Amethyst]]", "[[Gem-Knight Aquamarine]]", "[[Gem-Knight Citrine]]", "[[Gem-Knight Lady Rose Diamond]]", "[[Gem-Knight Prismaura]]", "[[Gem-Knight Ruby]]", "[[Gem-Knight Seraphinite]]", and "[[Gem-Knight Topaz]]" appear in the diamond in this card's artwork.
  ** All of the aforementioned monsters can also be [[Fusion Summon]]ed with this card's effect.
  * This card is named after [[Wikipedia:Scattering|scattering]], the process in which light is deflected from its original path by a medium and spread through different directions. Scattering often occurs when light passes through [[wikipedia:Gemstone|gemstones]], which is reflected in this card's artwork depicting different colored lights being deflected off the gemstones.
