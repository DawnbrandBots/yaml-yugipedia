title: Card Trivia:Final Offering
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name reflects its appearance in {{episode|ZEXAL|012|ref}}; before the "final" ("last") turn of the [[Tag-Team Duel]] between [[Reginald Kastle|Reginald "Shark" Kastle]] and [[Yuma Tsukumo]] against [[Scorch]] and [[Chills]], Shark used this card to "offer" ("entrust") his "[[Armored Xyz (anime)|Armored Xyz]]" card to Yuma for him to use.
