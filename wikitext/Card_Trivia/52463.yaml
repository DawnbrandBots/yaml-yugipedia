title: Card Trivia:Earthbound Immortal Uru
wikitext: |-
  {{Navigation}}

  * This card appears in the international artwork of "[[Doom Gazer]]".
  * This monster is based on the spider [[wikipedia:Geoglyph|geoglyph]] of the [[wikipedia:Nazca Lines|Nazca Lines]].
  ** This monster's name is derived from the [[wikipedia:Quechuan languages|Quechua]] word meaning "spider".
  *** This monster's name is also derived from the [[wikipedia:Uru people|Uru people]] who live on the man-made totora islets in [[wikipedia:Lake Titicaca|Lake Titicaca]], which is said to be the origin of the Inca Empire.
  * This monster is tied with "[[Earthbound Immortal Red Nova]]" for the highest [[original DEF]] (3000) of all "[[Earthbound Immortal]]" monsters.
  ** This monster also has the highest original [[DEF]] of all [[Insect]] monsters, tied with "[[Perfectly Ultimate Great Moth]]" and "[[Deus X-Krawler]]".
  * "Earthbound Immortal" monsters often represent their owner and their initial ambitions and desires; in this monster's case, it represents [[Roman Goodwin]], the leader of the [[Dark Signer]]s, who uses the "[[Spider]]" [[archetype]].
  ** This monster represents Roman's leadership of the Dark Signers, with this card and the [[Mark of the Dark Signer|Mark of the Spider]] being a codename for the [[Old Ener-D]] reactor, while the other Dark Signer marks (except the whale and condor) are the control units that the Ener-D reactor relies on.
  ** This monster's effect to take [[control]] of an opponent's monster references Roman's ability to use spiders to brainwash his victims. It also references how Roman switched himself out of his [[Duel]] against [[Yusei Fudo]] and forced his friend, [[Rally Dawson]], to Duel in his stead.
