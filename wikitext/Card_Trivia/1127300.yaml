title: Card Trivia:D/D/D/D Dimensional King Arc Crisis
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Doom of Dimensions]]''.
  * This monster is an upgraded form of "[[D/D/D Doom King Armageddon]]", combined with "[[D/D/D Flame King Genghis]]", "[[D/D/D Gust King Alexander]]", and "[[D/D/D Wave King Caesar]]".
  ** "Armageddon": This monster's head and crystal-like torso.
  ** "Genghis": This monster's lower leg armor and the lower half of its double-bladed sword.
  ** "Alexander": This monster's cape, shoulder and waist armor, and the outer edge/knuckle-bow of its double-bladed sword.
  ** "Caesar": This monster's armor, back spikes, and the upper half of its double-blade sword.
  * This monster is based on [[Leo Akaba]], the father of [[Declan Akaba]] (who used the "[[D/D]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime and [[Yu-Gi-Oh! ARC-V (manga)|manga]]) as well as the co-creator of the [[Solid Vision|ARC System]] and planner of the [[Arc Project]], both of which this monster is named after.
  ** This monster's design is reminiscent of Leo Akaba's purple militaristic outfit with several buttons and a long cape.
  ** This monster's title of "Great Dimension King" ({{Ruby|偉|い}}{{Ruby|次|じ}}{{Ruby|元|げん}}{{Ruby|王|おう}}, ''Ijigen'ō'') and its [[Fusion Monster]] [[card type]] reference Leo Akaba's narrative role in the ''Yu-Gi-Oh! ARC-V'' anime, who took control over the entire [[Fusion Dimension]] after gaining the leadership of the [[Duel Academy (ARC-V)|Duel Academy]].
  *** "Great Dimension" ({{Ruby|偉|い}}{{Ruby|次|じ}}{{Ruby|元|げん}}, ''Ijigen'') is also a homophone of one of the Japanese names of the Different Dimension ([[D.D.]]) [[series]] ({{Ruby|異|い}}{{Ruby|次|じ}}{{Ruby|元|げん}}, ''Ijigen'').
  ** "D/D/D/D" in this monster's name is a reference to the Arc Project, which involves using the [[Fusion Summon|Fusion]] power to merge the [[Four Dimensions]].
  * This monster is a "[[D/D]]" [[counterpart]] of "[[Supreme King Z-ARC]]".
  ** Both share the same [[Attribute]] ([[DARK]]), [[Level]] (12), and [[original ATK and DEF]] (4000/4000).
  ** Both feature the word "Arc" (ァーク, ''Āku'') in their names, referencing their [[Pendulum Monster]] type, as well as the name of the ''Yu-Gi-Oh! ARC-V'' anime.
  *** This monster's name also references ''[[Maximum Crisis]]'', the [[Core Booster]] which featured "Supreme King Z-ARC" as the cover card. 
  ** Both are [[Fusion Pendulum Monster]]s with a similar [[Fusion Material]] requirement (4 monsters, including 1 Fusion, 1 [[Synchro Monster|Synchro]], 1 [[Xyz Monster|Xyz]], and 1 [[Pendulum Monster|Pendulum]] of a specific [[Type]]).
  ** Both monsters' designs feature glowing green accents on their bodies.
  ** Both monsters have an effect that hinders the opponent's [[field]] when they are [[Special Summon]]ed, an effect that places themselves in the [[Pendulum Zone]] when they are destroyed, and an effect to Special Summon other monsters from the [[Deck]] or [[Extra Deck]].
  ** This monster's alternative [[Summoning condition]] references the one of "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]" in the anime, where it could only be Special Summoned by [[banish]]ing the [[Four Dimensional Dragons]] with the effect of "[[Astrograph Sorcerer (anime)|Astrograph Sorcerer]]". 
  * This monster is also a counterpart of "[[Odd-Eyes Arcray Dragon]]", which is also a counterpart of "Supreme King Z-ARC".
  ** Both are the ''[[OCG]]''/''[[TCG]]''-original ultimate forms of the [[signature card]]s of the main rivals of the ''Yu-Gi-Oh! ARC-V'' anime, which are Pendulum Monsters combined with a Fusion, Synchro, and Xyz Monster belonging to their respective themes: This monster is the ultimate form of "D/D/D Doom King Armageddon", the signature card of Declan Akaba, combined with the first three [[Extra Deck]] monsters belonging to the "D/D" archetype, while "Odd-Eyes Arcray Dragon" is the ultimate form of "[[Odd-Eyes Pendulum Dragon]]", the signature card of [[Yuya Sakaki]], combined with the Extra Deck members of the [[Four Dimensional Dragons]] [[series]].
  ** Both share the same Level (12) and original [[ATK]] and [[DEF]] (4000/4000), but opposite Attributes ([[LIGHT]] and DARK).
  ** Both feature the word "Arc" (ァーク, ''Āku'') in their names, referencing their Pendulum Monster type and the name of the ''Yu-Gi-Oh! ARC-V'' anime; however, while the name of "Odd-Eyes Arcray Dragon" is a reference to [[Ray Akaba]], this monster's name is a reference to [[Z-ARC]].
  ** Both are Fusion Pendulum Monsters with a similar Fusion Material requirement (4 monsters, including 1 Fusion, 1 Synchro, 1 Xyz, and 1 Pendulum of a specific Type).
  ** Both share the same Pendulum Scale (13).
  ** Both monsters' designs feature glowing green accents, with their tone corresponding with the background of their card artworks: This monster's green accents are dark to correspond with the dark and stormy background, while the green accents of "Odd-Eyes Arcray Dragon" are light to correspond with the bright and shiny background.
  * This is the first [[Pendulum Scale 13]] "D/D" monster.
  * This monster has the highest [[original ATK and DEF]] (4000/4000) of all "D/D" monsters.
  * This is the first "D/D" Fusion Monster that can use non-"D/D" monsters as Fusion Material.
