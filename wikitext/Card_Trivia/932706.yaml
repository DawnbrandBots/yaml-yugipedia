title: Card Trivia:Ghost Lancer, the Underworld Spearman
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Monstrous Revenge]]''.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to prevent itself from being [[destroyed by battle]], except for monsters [[Special Summon]]ed from the [[Extra Deck]], is based on this card's appearance in {{chapter|5D's|002|ref}}, where this card is destroyed in battle by [[Yusei Fudo (manga)|Yusei Fudo's]] [[Synchro Monster]], "[[Mighty Warrior (manga)|Mighty Warrior]]".
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, specifically from the panel showing [[Hellfire Spearman Ghost Lancer (manga)|this monster]] being Summoned.
