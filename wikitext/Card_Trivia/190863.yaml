title: 'Card Trivia:Number 30: Acid Golem of Destruction'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * This monster appears in the artwork of "[[Overlay Regen]]".
  * So far, this card has the highest ATK and DEF among [[Rank 3]] [[Xyz Monster]]s.
  * This card is the first [[WATER]] Rock-Type monster.
  * The right side of this monster's torso is an exposed part of its rib cage, likely burnt by its own acidic properties.
  * Fitting the trend of [[Kite Tenjo|Kite]]'s "[[Number]]s", this card's number is a multiple of 10, a wordplay on his surname "'''Ten'''jo".
  ** This is the third "Number" used by Kite on-screen, fittingly being the 3rd divisible by 10 number.
  * The 3 in the number 30 is most likely referenced by this card's ATK, [[DEF]], [[Rank]] and, as stated above, order of appearance among Kite's "Numbers".
  ** The number 3, which reflects most of this card's traits, can also be read as "san" in Japanese, which is the same pronunciation as "Acid" (酸 ''San'').
  * This was the last promotional card for [[Shonen Jump]] monthly magazine before it converted to the digital [[Weekly Shonen Jump Alpha]].
  * This card is most likely a reference to "[[Lava Golem]]", both being a high ATK golem whose effect hurts its controller instead of helping them.
