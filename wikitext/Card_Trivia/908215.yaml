title: Card Trivia:Virtual World Dragon - Longlong
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Virtual World Gate - Qinglong]]".
  * This card's name is a [[wikipedia:Reduplication|reduplication]] of the Chinese character ''lóng'' (龍/龙; "dragon").
  * This is currently the only [[Xyz Monster]] that [[requires Type specific Xyz Materials]] to not specify the [[Type]] of its [[Xyz Material]]s.
