title: Card Trivia:Cry Havoc!
wikitext: |-
  {{Navigation}}

  * "[[Dragon Manipulator]]", "[[Warrior Dai Grepher]]", "[[The Hunter with 7 Weapons]]", and the man from the artworks of "[[The A. Forces]]" and "[[Marmiting Captain]]" appear in this card's artwork.
  ** Ironically, out of the monsters featured in the artwork, "Warrior Dai Grepher" is the only [[Normal Monster]] among them.
  * This card's ''[[TCG]]'' name is based on "cry havoc", which can defined as a military order permitting the seizure of spoil after a victory.
  ** This card's ''TCG'' name is also a reference to a quotation from [[wikipedia:William Shakespeare|William Shakespeare's]] ''[[wikipedia:Julius Caesar (play)|Julius Caesar]]'': "Cry 'Havoc!', and let slip the dogs of war."
  * The German version of this card has a mistake in its effect text; in that any monster, not just normal monsters, can be summoned by this cards effect.
