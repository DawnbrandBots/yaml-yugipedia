title: Card Trivia:Dark Dust Spirit
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Japanese mythology|Japanese mythology]] [[wikipedia:Death (personification)|death]] representation ''[[wikipedia:Death god (Japan)|shinigami]]'' which means "death god".
  ** Its appearance, however, does seem to match that of an ''[[wikipedia:oni|oni]]'', or mythical Japanese ogre-demon. It may also be the skin removing demoness [[wikipedia:Datsue-ba|Datsue-ba]].
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator|Yu-Gi-Oh! 5D's Stardust Accelerator]]'', the word "flipped" is spelled "fliipped" by mistake.
  * This card and "[[Sacred Spirit of the Ice Barrier]]" are so far the only Spirit monsters who titularly have the word "Spirit" in their names.
