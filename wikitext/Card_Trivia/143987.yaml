title: Card Trivia:Blackwing - Brisote the Tailwind
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is derived from "Alizé", the French word for "[[wikipedia:Trade wind|trade winds]]".
  ** This monster's ''[[TCG]]'' name is derived from [[wikipedia:Brisote|brisote]], a northeastern trade wind that blows stronger than usual on Cuba.
  ** This monster's title is named after a [[wikipedia:Tailwind|tailwind]], a type of wind current that blows in the rear direction of an aircraft and used by birds when flying in a swarm.
