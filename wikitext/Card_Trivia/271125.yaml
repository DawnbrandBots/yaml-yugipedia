title: Card Trivia:Creator of Hope
wikitext: |-
  {{Navigation}}

  * This monster is based on [[ZEXAL (power)|ZEXAL]], a power used by [[Yuma Tsukumo]] and [[Astral]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's pose and effect to place a card on top of the player's [[Deck]] is based on [[Shining Draw]], an ability used by ZEXAL which allows a Duelist to draw any card they wish, even creating a new card during a Duel.
  ** This monster's effect requiring the player to [[declare]] "I'm [[feeling the flow]]!" is based on Yuma's catchphrase in the anime.
  * This is the first card that requires the player to verbally activate its effect.
