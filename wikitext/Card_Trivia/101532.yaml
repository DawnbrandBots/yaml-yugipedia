title: Card Trivia:Half Straight
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Slate Warrior]]", "[[Rigorous Reaver]]", and a small "[[Red Ogre]]" appear in this card's artwork.
  ** The shrunken "Red Ogre" is depicted sneaking past both "Slate Warrior" and "Rigorous Reaver"; this mirrors this card's effect, as the halved [[ATK]] of "Red Ogre" would be 1400 under normal circumstances, which is lower than the [[original ATK]] of both "Slate Warrior" and "Rigorous Reaver".
  ** This card's artwork depicts "Rigorous Reaver" with an eye in its mouth.
  * This card's name is based on its effect, which cuts the player's monster's ATK in ''half'' and allows it to potentially avoid the opponent's monster with the highest ATK, letting it advance ''straight'' to [[Direct attack|attacking directly]].
