  * This monster is a [[retrained]] counterpart of "[[Sonic Warrior]]".
  ** This monster is depicted wearing a white scarf similar to that worn by "[[Junk Synchron]]" and "[[Junk Warrior]]", both of which "Sonic Warrior" is associated with in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
