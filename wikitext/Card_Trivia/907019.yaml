title: Card Trivia:Magikey Spirit - Vepartu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Simul Archfiends]]".
  * This monster appears to be a possessed form of "[[Clavkiys, the Magikey Skyblaster]]".
  * This monster is likely named after ''[[wikipedia:List of demons in the Ars Goetia|Vepar]]'', one of the Demon Dukes of Hell from the ''[[wikipedia:The Lesser Key of Solomon|Ars Goetia]]''.
