title: Card Trivia:Lacrima the Crimson Tears
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fiendsmith Kyrie]]".
  ** This monster appears as a ghost in the artworks of "[[Fiendsmith's Lacrima]]" and "[[Fiendsmith's Rextremende]]".
  * This monster is named after the ''[[wikipedia:Lacrimosa|Lacrimosa]]'', a portion of the "[[wikipedia:Dies irae|Dies irae]]" poem used for the [[wikipedia:Funeral|funeral]] or the [[wikipedia:Requiem|Requiem Mass]] for the dead.
  * This monster may be based on the character [[wikia:w:c:devilmaycry:Trish|Trish]] from the ''[[wikipedia:Devil May Cry|Devil May Cry]]'' series.
  ** Both have a similar appearance, are of demonic descent and abilities, and act as allies to their respective lead characters.
