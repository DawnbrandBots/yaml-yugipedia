title: Card Trivia:Construction Train Signal Red
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Revolving Switchyard]]".
  * This monster's design features [[wikipedia:Railway signalling|red-colored light signals]], which is often used on [[wikipedia:Rail transport|railroads]] to signal the train driver to stop the engine.
  ** This monster's design also features [[wikipedia:Buffer (rail transport)|buffers]], which is a part of the [[wikipedia:Buffers and chain coupler|buffer and chain coupling system]] which can be used with a [[wikipedia:buffer stop|buffer stop]] to prevent the trains from going past the end of a track.
  *** The above-mentioned facts reflect this monster's effect, which can ''stop'' an opponent's attacking monster, ''signal'' it to attack this card, and use a ''buffer stop'' to prevent it from being [[destroyed by battle]].
