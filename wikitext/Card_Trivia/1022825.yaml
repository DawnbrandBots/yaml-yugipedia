title: Card Trivia:Demolition Wyvern Blasthurricane
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Demolition Dust Storm]]".
  * This monster's Japanese name (バクハリケーン, ''Bakuharikēn'') is a portmanteau of the Japanese words "''Bakuha''" (爆破, lit. "Destructive Explosion") and "''Harikēn''" (ハリケーン, lit. "Hurricane"), with the latter word reflecting its effect to [[return]] [[Spell]]/[[Trap Card]]s to their owner's [[hand]].
