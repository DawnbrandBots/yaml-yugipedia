title: Card Trivia:Monarchic Perfection
wikitext: |-
  {{Navigation}}

  * "[[Eidos the Underworld Monarch]]" appears in this card's artwork.
  * The six bulleted effects reference the effects of the original six [[Monarch]] monsters:
  ** [[Destroy]] 1 monster on the [[field]]: "[[Zaborg the Thunder Monarch]]"
  ** Destroy up to 2 [[Spell]]/[[Trap Card]]s on the field: "[[Mobius the Frost Monarch]]"
  ** [[Discard]] 1 random card from your opponent's [[hand]]: "[[Thestalos the Firestorm Monarch]]"
  ** Destroy 1 [[face-down]] card on the field: "[[Granmarg the Rock Monarch]]"
  ** [[Return]] 1 card on the field to the top of the [[Deck]]: "[[Raiza the Storm Monarch]]"
  ** Banish 1 card on the field: "[[Caius the Shadow Monarch]]"
