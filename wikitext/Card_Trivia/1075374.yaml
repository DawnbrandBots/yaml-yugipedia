title: Card Trivia:Maliss Q Red Ransom
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Red Queen (Through the Looking-Glass)|Red Queen]] from ''[[wikipedia:Through the Looking-Glass|Through the Looking-Glass]]'' and consequently the [[wikipedia:Queen (chess)|queen]] piece in the game of [[wikipedia:Chess|chess]].
  ** This monster's remote weaponry resembles [[wikipedia:Pawn (chess)|pawn]] pieces in the game of chess.
  * This monster is named after [[wikipedia:Ransomware|ransomware]], a type of malware that permanently blocks access to the victim's personal data unless payment is received.
  * This monster appears in the artwork of "[[Maliss in the Mirror]]".
  * This monster has a counterpart in "[[Maliss Q White Binder]]".
  ** This monster is based on the Red Queen from ''Through the Looking-Glass'', while "WHITE BINDER" is based on the [[wikipedia:White Queen (Through the Looking-Glass)|White Queen]], with both characters having an antagonistic relationship towards each other.
  ** Both monsters are depicted in mirrored poses in their card artworks, and their respective [[Link Arrow]]s are mirrored versions of each other.
  ** Both are [[Link-3]] monsters with 2300 [[ATK]], and both require 2 or more [[Link Material]]s to be [[Link Summon]]ed, including a "[[Maliss]]" monster.
  ** This monster has a [[Trigger Effect]] that allows its controller to [[add]] a "Maliss" [[Spell Card]] from their [[Deck]] to their [[hand]], while "WHITE BINDER" has an [[Ignition Effect]] that lets its controller [[Set]] a "Maliss" [[Trap Card]] from their Deck or [[Graveyard]] to their [[field]].
