title: Card Trivia:Ritual Beast Ulti-Kimunfalcos
wikitext: |-
  {{Navigation}}

  * "[[Ritual Beast Tamer Elder]]" appears in this card's artwork.
  * This monster is the combined [[Link Monster|Link]] form of "[[Spiritual Beast Tamer Winda]]" and the older form of "[[Gusto Falco]]" shown in "[[Daigusto Falcos]]".
  ** "Elder" ("[[Kamui, Hope of Gusto]]") watching over them is a reference to "Falco" being the original partner of "Kamui".
  ** The 600 ATK/DEF increasing effect is also a reference to the similar effect of "[[Daigusto Falcos]]".
  * This card's name is a portmanteau of キム ''kim'' (the [[wikipedia:Ainu language|Ainu]] word for "mountain", several of which appear in the card's background) and "falcos" (from "Daigusto Falcos").
