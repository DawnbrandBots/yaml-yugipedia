title: Card Trivia:Red-Eyes Darkness Metal Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Premium Pack Vol.4]]'', ''[[Premium Pack Vol.15]]'', and ''[[Limited Edition 11]]'', as well as one of the [[cover card]]s of the box of ''[[Legendary Duelists: Season 1]]''.
  * This card is the [[Metalmorph (archetype)|Metal counterpart]] of "[[Red-Eyes Darkness Dragon]]".
  ** This card shares the same [[ATK]] and [[DEF]] as its fellow "[[Red-Eyes]]" Metal counterpart, "[[Red-Eyes Black Metal Dragon]]".
  *** However, unlike "Red-Eyes Black Metal Dragon", this card is a [[Dragon]]-[[Type]] monster and not a [[Machine]]-Type monster.
  *** Also, unlike other "[[Red-Eyes]]" monsters, the direct relation of this card's printed version to them is its name and artwork, since the requirement of a "Red-Eyes" monster to [[Special Summon]] it was completely removed, rather than altered.
  * This card has a [[Link Monster|Link]] [[counterpart]]: "[[Darkness Metal, the Dragon of Dark Steel]]".
  * This card has a [[Zombie counterpart]]: "[[Red-Eyes Zombie Dragon Lord]]".
  * This card's 2nd ''[[OCG]]''/''[[TCG]]'' artwork features the [[Spirit Keys]] underneath its feet, referencing its appearance in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This card's [[summoning condition]]s in the ''Yu-Gi-Oh! GX'' anime are similar to that of "Red-Eyes Black Metal Dragon" in [[OCG]]/[[TCG]], since both cards require a specific "Red-Eyes" monster [[equip]]ped with a specific [[Trap Card]] as [[Tribute]]: this card requires "[[Red-Eyes Darkness Dragon (anime)|Red-Eyes Darkness Dragon]]" equipped with "[[Metal Plus]]", and "[[Red-Eyes Black Metal Dragon]]" requires "[[Red-Eyes Black Dragon]]" equipped with "[[Metalmorph]]".
  ** Also, in both instances, the Trap Cards they were equipped with featured "Magic-Reflection Armor" in their Japanese names.
  * This card and "[[Dandylion]]" were the [[Shonen Jump February 2009 subscription bonus|2009 Shonen Jump subscription promos]]. They were released together in ''[[Absolute Powerforce: Special Edition]]''.
  ** This status is also possibly why its printed effect was made from the ground up rather than adapt the anime version, as to be used on its own without requiring specific cards to function.
  * This monster notably has taken prominence over "Red-Eyes Darkness Dragon" due to its usefulness in the real life card game, receiving a retrain, alternative art that references "Red-Eyes Darkness Dragon's" debut in the [[Seven Stars (arc)|Seven Stars]] arc (despite itself not debuting until the [[Darkness (arc)|Darkness]] arc) and a ''[[Rush Duel]]'' adaptation, while "Red-Eyes Darkness Dragon" has been mostly forgotten after ''GX''.

  * This card is nicknamed 「レダメ」 (''Redame'') by the OCG community. The TCG community nicknames it "REDMD", and due to "MD" being an abbreviation for "Medical Doctor" in other contexts, it spawned the nickname of "Doctor Red" as well. These nicknames for the card were acknowledged in ''[[Yu-Gi-Oh! 5D's World Championship 2011: Over the Nexus]]'', where [[Red-Eyes Darkness Metal Dragon (character)|Red-Eyes Darkness Metal Dragon]] appears as an opponent and its Deck is titled after the nicknames.
