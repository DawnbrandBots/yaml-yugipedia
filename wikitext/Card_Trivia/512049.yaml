title: Card Trivia:Hane-Hane
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Soul Absorption]]".
  * This monster has a [[retrained]] version, "[[Hade-Hane]]", which is [[Level 5]] and possesses triple the effect and twice the [[ATK]] and [[DEF]].
  * This card is one of the first five [[Effect Monster]]s to be released in the ''[[OCG]]'', the other four being "[[Armed Ninja]]", "[[Man-Eater Bug]]", "[[Reaper of the Cards]]", and "[[Skelengel]]".
