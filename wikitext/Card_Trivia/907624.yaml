title: Card Trivia:Cosmos Channelling
wikitext: |-
  {{Navigation}}

  * A silhouette of [[Espa Roba]] appears in this card's artwork.
  * This card's effects likely reference Espa's actions during the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This card's first effect references when Espa used "[[Mind Control (manga)|Mind Control]]" and "[[Brain Control (manga)|Brain Control]]" to take control of [[Joey Wheeler]]'s monsters, so that he could [[Tribute]] them to [[Tribute Summon]] "[[Jinzo (manga)|Jinzo]]".
  ** This card's second effect references Espa's trick during his Duel with Joey, where he claimed to be able to see the cards in Joey's [[hand]] with his psychic powers. In reality, he was being told what they were via a hidden earpiece, by his younger brothers, who were spying on Joey's hand. Espa took the pose depicted in this card's artwork while listening to his brothers, while claiming he was instead channeling the cosmos.
