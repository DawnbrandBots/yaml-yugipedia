title: 'Card Trivia:Number 57: Tri-Head Dust Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears to be more [[wikipedia:cloud|cloud]]-like in terms of appearance.  Moreover, the center mass of which the three heads come out of bears a striking resemblance to a [[wikipedia:Cumulus cloud|cumulus cloud]].
  * This card's Japanese name, "Tresragoon", is the portmanteau of the word "Tres" (Three) and "Dragoon".
  ** "Impetuous" and "Dust" are both read as ''Funjin'' in Japanese, albeit the two words use different kanjis.
  * The "explosions" around this monster share the same color scheme and gestalt as [[Level]] Stars.
  ** This is fitting given that this card is an [[Xyz Monster]]: every said monster depends on Levels for their ''de facto'' Summons.
  ** There are 12 definite "explosions" in total visible in the card art, which may reference the total Level of the materials required. A 13th can be implied, but is too far out of frame to confirm.
  * Though hard to see, there is a green "57" inside the orange sphere on this monster's main body.
