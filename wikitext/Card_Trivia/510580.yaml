title: Card Trivia:Supercharge
wikitext: |-
  {{Navigation}}

  * The monster appearing in this card's artwork is a cartoon version of the [[wikipedia:Volkswagen Beetle|Volkswagen Beetle]] vehicle.
  ** Oddly, there is currently no "[[roid]]" monster that is based on the Volkswagen Beetle.
  * In {{episode|GX|078|ref}} and [[Yu-Gi-Oh! GX - Episode 079|the following episode]], the vehicle in this card's artwork serves as [[Syrus Truesdale]]'s avatar while his mind was trapped in the [[Virtual World Facility]].
