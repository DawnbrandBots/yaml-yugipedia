title: 'Card Trivia:Number 52: Diamond Crab King'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster is based on the [[wikipedia:Cancer irroratus|rock crab]], a species of [[wikipedia:Crab|crab]] who live on the eastern coast of North America.
  ** This monster's name, appearance, and [[Rock]] [[Type]] are puns on the name of the rock crab, as this monster's appearance is based on a crab with a diamond carapace, and it is a [[Rock]] monster.
  ** This monster's name is also likely based on the [[wikipedia:King crab|king crab]], a superfamily of crustaceans that live in the cold seas and are well-known for their edible meat.
  * This card has the highest [[original DEF]] (3000) of all [[Rank 4]] [[Xyz Monster]]s.
  * This is the only "[[Number]]" monster that features an effect allowing the player to [[control only one]] copy of that monster.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|034|ref}}, specifically from the panel showing [[No. 52: Diamond Crab King (manga)|this monster]] being Summoned.
