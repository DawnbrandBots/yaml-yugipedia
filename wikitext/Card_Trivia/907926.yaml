title: 'Card Trivia:Number C62: Neo Galaxy-Eyes Prime Photon Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is the [[cover card]] of ''[[Photon Hypernova]]''.
  * This monster is a "[[Number C]]" [[Card evolutions|upgraded]] form of "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]".
  * This monsters shares several similarities with "[[Neo Galaxy-Eyes Photon Dragon]]".
  ** Both monsters are three-headed dragons whose bodies are made of red iridescent light.
  ** Both monsters feature an effect that can only be [[activate]]d if they have "[[Galaxy-Eyes Photon Dragon]]" as [[Xyz Material]].
  ** Both monsters feature an effect that allows them to attack multiple times during the [[Battle Phase]] in a turn.
  *** This monster's effect to attack three times during the Battle Phase is also similar to the effect of "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]".
  * This monster shares multiple similarities with "[[Number C39: Utopia Ray]]" and "[[Number C32: Shark Drake Veiss]]".
  ** They are the "Number C" upgraded forms of the [[signature card]]s of the three main characters of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: [[Yuma Tsukumo]] for "Utopia Ray", [[Kite Tenjo]] for this monster, and [[Reginald Kastle]] for "Shark Drake Veiss".
  ** They can be [[Xyz Summon]]ed by using their base form as Xyz Material.
  *** Unlike "Utopia Ray" and "Shark Drake Veiss", this monster's effect doesn't require the player's [[Life Point]]s to be 1000 or less to use it.
  ** They require one more Xyz Material than their base forms, and also require materials of the same [[Attribute]] as themselves: [[LIGHT]] for this monster and "Utopia Ray", and [[WATER]] for "Shark Drake Veiss".
  ** They have the same [[Rank]], [[ATK]], and [[DEF]] as their base forms, unlike the other "Number C" monsters, which are Summoned by using a "[[Rank-Up-Magic]]" [[Spell Card]].
  * This is the only "Neo Galaxy-Eyes" monster to not have an [[original ATK]] of 4500.
