title: Card Trivia:Cyberdark Wurm
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Cyberdark]]" version of "[[Cyber Dragon]]" modeled after "[[Infernal Dragon]]".
  ** This monster's snout is the same as that of "Cyber Dragon", whereas its entire body structure is the same as that of "Infernal Dragon", with a single blade attached to its snout and each of its knees, as well as a [[wikipedia:Trident|trident]]-like weapon at the tip of its tail.
  ** This monster shares the same [[Level]] (5) with "Cyber Dragon", its [[DEF]] is the same as the [[ATK]] (2100) of "Cyber Dragon", and its effect treats itself as "Cyber Dragon" while on the [[field]] or in the [[Graveyard]].
  *** In particular, this [[name condition]] makes the contrary (i.e. being an "Infernal Dragon" modelled "[[Cyber Dragon (archetype)|Cyber Dragon]]" monster in a similar way to the one depicted in "[[Cybernetic Hidden Technology]]") unlikely.
  * This monster's color scheme with a green armor and blue orbs is the same as those of "[[Cyberdark Edge]]".
  * This monster has the same [[original ATK and DEF]] as "[[Cyberdark Chimera]]", with their ATK (800) being also the same as "Cyberdark Edge", [[Cyberdark Horn]]", and "[[Cyberdark Keel]]", and their DEF (2100) being the same as "[[Cyber Jormungardr]]", another "Cyberdark"-related "[[Cyber]]" monster released in the same set as this card.
