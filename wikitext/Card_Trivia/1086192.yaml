title: Card Trivia:Queen Azamina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Azamina Aphes]]".
  * This monster has two upgraded [[Fusion Monster|Fusion]] forms: "[[Saint Azamina]]" (combined with "[[The Hallowed Azamina]]") and "[[Azamina (card)|Azamina]]" (her true form, revealed after casting off the body of "Diabell").
  * This monster is the "[[Azamina]]" counterpart of "[[Diabell, Queen of the White Forest]]", being her body under the possession of "Azamina".
  ** Both share the same [[Level]] (8), [[Type]] ([[Illusion]]), and [[original ATK and DEF]] (2500/2000).
  ** Both have opposite [[Attribute]]s: This monster's Attribute is [[DARK]], while the Attribute of "Diabell" is [[LIGHT]].
  ** Both feature the word "Apparition" (妖魔, ''Yōma'') in their Japanese names.
