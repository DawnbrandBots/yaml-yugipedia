title: Card Trivia:Dragunity Aklys
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragon Ravine]]".
  ** This is confirmed in ''[[Yu-Gi-Oh! 5D's Tag Force 5]]'' and ''[[Yu-Gi-Oh! 5D's Tag Force 6]]'', where this monster can be seen clearly in the animated [[field]] background.
  * This monster is named after the ''[[wikipedia:Aklys|aklys]]'', a Roman javelin thrown with the aid of a leather strap. Fittingly, this monster's design features a short spear on its head, which was the original design of the javelin.
  * This monster has an "[[lswarm]]" counterpart: "[[Evilswarm Zahak]]".
