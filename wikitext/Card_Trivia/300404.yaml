title: Card Trivia:Blizzard Thunderbird
wikitext: |-
  {{Navigation}}

  * This monster's appearance is similar to that of "[[Ice Princess Zereort]]".
  ** Both cards are [[WATER]] [[Winged-Beast]] monsters used by [[Rio Kastle|Rio Kastle/Marin]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster is based on the [[wikipedia:Thunderbird (mythology)|thunderbird]], a legendary creature in North American indigenous peoples' mythology, said to be a powerful spirit taking the form of a giant bird. According to mythology, the thunderbird creates thunder by flapping its large wings, create lightning by flashing its eyes, and command storm clouds to rain.
