title: Card Trivia:My Body as a Shield
wikitext: |-
  {{Navigation}}
  [[File:Dark_Yugi_protects_Jonouchi_and_Mai.png|thumb|right|250|[[Dark Yugi (manga)|Dark Yugi]] protects [[Jonouchi Katsuya]] and [[Mai Kujaku]] from the attack of "[[The Winged Dragon of Ra (manga)|The Winged Dragon of Ra]]".]]

  * "[[Gagagigo]]" and "[[Marauding Captain]]" appear in this card's artwork.
  ** The event in this card's artwork takes place shortly after the events in the artwork of "[[Two-Man Cell Battle]]": "Marauding Captain" is protecting "Gagagigo" from the attack of "[[Blazing Inpachi]]".
  * This is one of two [[Spell Card]]s that can [[negate]] the activation of cards or effects, the other being "[[Ancient City - Rainbow Ruins]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - My Body as a Shield]]".
  * This card's artwork is likely inspired by a scene in {{chapter|Yu-Gi-Oh!|224|ref}}, where [[Dark Yugi (manga)|Dark Yugi]] protects [[Jonouchi Katsuya]] and [[Mai Kujaku]] from the attack of "[[The Winged Dragon of Ra (manga)|The Winged Dragon of Ra]]".
  ** "Marauding Captain" and Dark Yugi both have their right eyes closed, and the protected shielding their gazes are using their left arms.

