title: Card Trivia:Time to Stand Up
wikitext: |-
  {{Navigation}}

  [[File:Majestic_Red_Dragon_attacks_the_fake_Red_Dragon_Archfiends.png|thumb|right|250|"[[Majestic Red Dragon (anime)|Majestic Red Dragon]]" attacks the counterfeit "[[Red Dragon Archfiend (anime)|Red Dragon Archfiends]]", in the ''[[Yu-Gi-Oh! 5D's]]'' anime.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * "[[Majestic Red Dragon]]" and three counterfeit "[[Red Dragon Archfiend]]s" (one purple, one yellow, and one blue) appear in this card's artwork.
  * This card's artwork is based on a scene from {{episode|5D's|084|ref}} where [[Jack Atlas]] attacked and [[destroy]]ed the three counterfeit "[[Red Dragon Archfiend (anime)|Red Dragon Archfiends]]" with "[[Majestic Red Dragon (anime)|Majestic Red Dragon]]", during his [[Duel]] against [[Fake Jack Atlas]].
  ** This card's Japanese name, "The Great Soul" ({{Ruby|大|おお}}いなる{{Ruby|魂|たましい}} ''Ōinaru Tamashī''), is a reference to the [[Summon chants in Yu-Gi-Oh! 5D's#Jack Atlas|Summon chant]] of "Majestic Red Dragon" in the Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime: ''The great soul, "Savior Demon Dragon"!'' (大いなる魂、セイヴァー・デモン・ドラゴン！ ''Ōinaru Tamashī, Seivā Demon Doragon!'').
  ** This card's ''[[TCG]]'' name, "Time to Stand Up", is a reference to the English titles of {{episode|5D's|083|ref}}, and {{episode|5D's|084|ref}}. Jack himself declares that it's time for the real Jack Atlas to stand up before launching the depicted attack.

