title: Card Trivia:Steel Mech Lord Mirror Innovator
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Destined Power Destruction!!]]''.
  * This monster appears in the artwork of "[[Triangle Reborn]]".
  * This card's Japanese name is a pun on the Japanese word for "curiosity" ({{Ruby|好|こう}}{{Ruby|奇|き}}{{Ruby|心|しん}} ''Kōkishin''), reflecting how [[Yuga Ohdo]] first used it against [[Asana Mutsuba]], who favored tradition, in the ''[[Yu-Gi-Oh! SEVENS]]'' anime. In addition, its [[Attack and effect names in Yu-Gi-Oh! SEVENS|effect name]] in the anime is "Curious Innovation".
