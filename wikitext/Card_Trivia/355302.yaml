title: Card Trivia:Masked HERO Divine Wind
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s for ''[[HERO Strike Structure Deck]]''.
  * This monster's mask appears in the artwork of "[[Mask Change II]]".
  * This monster is based on the archetypal green Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[WIND]], which is represented by a green-colored circle.
  * This monster's Japanese name is based on ''[[wikipedia:Kamikaze|kamikaze]]'', the Japanese word meaning "divine wind", which became infamous for its use during [[wikipedia:World War II|World War II]], where it referred to Japanese fighter pilots who were assigned to carry out suicide attacks on Allied warships using airplanes filled with explosives.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to force the opponent to attack using only one monster is based on the effect of "[[Emergency Bulkhead]]", which was used alongside [[Masked Hero Divine Wind (manga)|this monster]] in {{chapter|Yu-Gi-Oh! GX - Chapter SP1|ref}}.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, specifically from the panel showing this monster being Summoned.
