  * "[[Artmage Finmel]]", "[[Artmage Graflare]]", "[[Artmage Litera]]", and "[[Medius the Pure]]" appear in this card's artwork.
  ** This card's artwork depicts the vision of "Medius" in which he saw "Glaflare" attempting to activate his red copy of "[[Power Patron DoomZ]]" and going berserk, transforming into a draconic creature.
