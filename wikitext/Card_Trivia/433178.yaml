title: Card Trivia:Pantheism of the Monarchs
wikitext: |-
  {{Navigation}}

  * "[[Erebus the Underworld Monarch]]" and "[[Ehther the Heavenly Monarch]]" appear in this card's artwork.
  * The Spanish lore of this card shows the term "''add''" as "''agregar''" instead of "''añadir''", which is the most common translation for that term in that TCG branch.
  * The Master Duel storyline "[[Master Duel card storylines#The Absolute Monarch|The Absolute Monarch]]" describes Erebus as embodying destruction/death, and Ehther embodying creation/rebirth. This references themes of cycles of destruction/death and creation/rebirth common in mythological and religious cosmology (e.g. [[Wikipedia:Saṃsāra (Hinduism)|Samsara in Hinduism]], [[Wikipedia:Zoroastrian cosmology|Angra Mainyu/Ahura Mazda in Zoroastrianism]], etc). This is seen in this card's art, with Erebus behind a burning city, and Ehther behind a city with regenerating ecology.
  * [[Wikipedia:Pantheism|Pantheism]] in philosophy is roughly the idea that "god is the universe" or "god is everything". This is the same as the god in Einstein's famous quote "''I believe in [[Wikipedia:Baruch Spinoza|'Spinoza's God']]''".
