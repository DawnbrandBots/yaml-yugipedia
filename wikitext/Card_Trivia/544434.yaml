title: Card Trivia:Gladiator Beast Dragases
wikitext: |-
  {{Navigation}}

  * This card is the first [[Winged Beast]] [[Link Monster]].
  * This monster appears in the artwork of "[[Link Recovery]]".
  * This monster's name is a reference to [[wikipedia:Constantine XI Palaiologos|Constantine XI Dragases Palaiologos]], the last reigning [[wikipedia:List of Roman emperors|Roman]] and [[wikipedia:List of Byzantine emperors|Byzantine emperor]].
  * This monster's appearance is based on a [[wikipedia:Bald eagle|bald eagle]].
