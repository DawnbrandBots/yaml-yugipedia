title: Card Trivia:Karakuri Bushi mdl 6318 "Muzanichiha"
wikitext: |-
  {{Navigation}}

  * The '''6318''' of this card's name represents a multiplication problem: 6 x 3 = 18.
  ** The number is also written in Japanese on this monster's right arm: 六参壱八.
  * This monster appears in the artwork of "[[Karakuri Cash Inn]]".
