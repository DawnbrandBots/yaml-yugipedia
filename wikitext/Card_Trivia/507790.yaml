title: Card Trivia:Uria, Lord of Searing Flames
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Collectible Tins 2006 Wave 2]]'', ''[[Maze of Muertos]]'', ''[[Structure Deck: Sacred Beasts of Chaos]]''/''[[Structure Deck: Sacred Beasts]]'', and ''[[Speed Duel GX: Duelists of Shadows]]''.
  * This monster appears in the artworks of "[[Awakening of the Sacred Beasts]]", "[[Dimension Fusion Destruction]]", "[[Divine Abyss of the Sacred Beast]]" (as a silhouette), "[[Hyper Blaze]]", "[[Phantasmal Martyrs]]", "[[Phantasmal Sacred Beasts of Chaos]]", and "[[Phantom of Chaos]]".
  * This card appears in the artwork of "[[Unleashing the Sacred Beasts]]".
  * This monster is named after [[wikipedia:Uriel|Uriel]], an angel who is depicted as a guardian cherub of the gate to the [[wikipedia:Garden of Eden|Garden of Eden]] wielding a flaming sword.
  * This monster has a [[retrained]] "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] counterpart: "[[Uria, Lord of Searing Flames - Sacred Beast of Cataclysmic Fire]]".
  * This monster is the [[Sacred Beast]] counterpart of "[[Slifer the Sky Dragon]]".
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, and on it's matching [[illegal]] print, this card had a red border, similar to that of "[[Slifer the Sky Dragon (anime)|Slifer the Sky Dragon]]".
  ** This monster has a fire theme, while "Slifer the Sky Dragon" has a lightning theme. These traits are inverted with those of "[[The Winged Dragon of Ra]]" and "[[Hamon, Lord of Striking Thunder]]", respectively.
  * This is the only Sacred Beast to not have 4000 [[ATK]]/[[DEF]].
  * The [[Spirit Keys]] appear in the background of this and the two other [[Sacred Beasts]] card's artwork.
