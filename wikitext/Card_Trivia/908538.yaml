  * This is one of the [[cover card]]s of ''[[Mega Pack 07]]''.
  * This monster is tied with "[[Hyper Psychic Blaster/Assault Mode]]", and "[[Absolute Axon Kicker]]" for having the highest [[Level]] (11) of all [[Psychic]] monsters.
  ** This monster has the highest [[original DEF]] (3500) of all Psychic monsters
