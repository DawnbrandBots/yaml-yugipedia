title: Card Trivia:Draconnection
wikitext: |-
  {{Navigation}}

  * "[[Dark Armed Dragon]]" and "[[White Dragon Ninja]]" appear in this card's artwork.
  ** Fittingly, the effect of "Draconnection" can be used to swap 1 monster for the other.
  ** "Dark Armed Dragon" is being Summoned by "White Dragon Ninja" to block an attack, as explained by a [https://www.pojo.biz/board/showpost.php?p=24270147&postcount=78 post] from [[Jerome McHale]].
  * This card's name is a portmanteau of the words "draco" and "connection".
