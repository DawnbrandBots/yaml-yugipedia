title: Card Trivia:Prometeor, the Burning Star
wikitext: |-
  {{Navigation}}

  * This card's name references [[wikipedia:Prometheus|Prometheus]] and a [[wikipedia:Meteoroid|meteoroid]]. Meteoroids are a small rocky or metallic body in [[wikipedia:Outer space|outer space]] that range in size from small grains to one-meter-wide objects.
  ** This card's name may also be a reference to an [[wikipedia:Asteroid|asteroid]] called [[wikipedia:1809 Prometheus|1809 Prometheus]].
  ** This card's effect that allows it to attack multiple times may be a reference to a [[wikipedia:Meteoroid|meteor shower]], where an object, such as those mentioned above, travels through a planet's [[wikipedia:Atmosphere|atmosphere]] at extremely high speeds, resulting in the object being superheated by [[wikipedia:Friction|friction]] and shattering into multiple pieces. These are commonly referred to as [[wikipedia:Shooting Star|shooting stars]].
  ** This card's effect that renders [[Monster Zone]]s unusable if it destroys a monster in that zone by battle is likely a reference to an [[wikipedia:Impact crater|impact crater]], created by astronomical objects, such as those mentioned above, travelling at extremely high speeds and impacting the ground.
