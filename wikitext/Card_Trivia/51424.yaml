title: Card Trivia:Speed Spell - Power Baton
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Swordstalker]]" appears in this card's artwork.
  ** This card's artwork and effect reference the effect of "Swordstalker" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which allows it to gain [[ATK]] equal to a fraction of a monster's ATK in the player's [[Graveyard]].
