title: Card Trivia:Gearbreed
wikitext: |-
  {{Navigation}}

  * Cartoon icons of "[["Infernoble Arms - Durendal"]]" (set ablaze, as depicted in the artwork of "[[Infernoble Knight Captain Roland]]") and "[["Infernoble Arms - Hauteclere"]]" (silhouetted) appear in this card's artwork.
  ** While this is fitting, since this card's effects [[support]] both [[Equip Spell]]s and [[FIRE]] [[Warrior]] monsters, it is also interesting since none of the above-named cards existed until their release in ''[[Rise of the Duelist]]'' at least six months after this card was released.
  *** However, "[[Infernoble Knight - Roland]]" did debut alongside "Gearbreed" in the release of ''[[Structure Deck R: Warriors' Strike]]'', with a fiery representation of "Durendal" appearing in that monster's artwork.
  ** This card's artwork appears to be based on a [[wikipedia:Glossary of video game terms|skill tree]] from RPG games or a crafting tree from crafting games.
  *** The selected sword is ""Infernoble Arms - Durendal"", and the sword in the bottom-middle is ""Infernoble Arms - Hauteclere"".
  *** The sword in the top-left corner appears to be based on the [https://finalfantasy.fandom.com/wiki/Buster_Sword Buster Sword], the weapon used by [[Wikipedia:Cloud Strife|Cloud Strife]], the main protagonist of ''[[Wikipedia:Final Fantasy VII|FInal Fantasy VII]]''.
  * This card's name is a reference to the name of the [[Gearfried]] [[series]], which features a playstyle revolving around [[Warrior]] monsters and [[Equip Spell]]s.
