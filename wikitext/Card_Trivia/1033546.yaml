title: Card Trivia:Linear Equation Cannon
wikitext: |-
  {{Navigation}}

  * This card is named after a [[wikipedia:Linear equation|linear equation]], an equation used for calculating data on a graph.
  ** This card's Japanese name (壱時砲固定式, ''Ichijihō Koteishiki'') is a play on the Japanese word for "linear equation" (一次方程式, ''Ichiji Hōteishiki''), where homophonous or partially homophonous ''kanji'' with different meanings were used to obfuscate the original word.
  ** This card requires players to solve the equation <code>Ax + B = C for x</code>, where:
  *** "A" is the [[Effect Monster]]'s [[Level]]
  *** "B" is the number of cards controlled by the opponent
  *** "C" is the number of cards in the [[Graveyard]]
  *** "x" is the declared number
  * This card has a retrained counterpart: "[[Simultaneous Equation Cannons]]".
