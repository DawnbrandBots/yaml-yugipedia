title: Card Trivia:Joruri-P.U.N.K. Nashiwari Surprise
wikitext: |-
  {{Navigation}}

  * "[[Joruri-P.U.N.K. Madame Spider]]" appears in this card's artwork (with a slightly different head and colors).
  * ''[[wikipedia:Jōruri (music)|Jōruri]]'' is a form of traditional Japanese narrative music, and ''[[wikipedia:Bunraku|Ningyō jōruri]]'' is a form of traditional Japanese puppet theatre.
  ** This monster is based on Nashiwari, a ''ningyō jōruri'' puppet.
