title: Card Trivia:Good Hero
wikitext: |-
  {{Navigation}}

  * The "H" insignia from the artwork of "[[Hero Signal]]" appears in this card's artwork.
  * The 良い (''Yoi'') of this card's Japanese name can also be read as ''Ii'', the same pronunciation for the English letter "E"; when read this way, the Japanese name of this card can be read as "E Hero", the same way that "[[Elemental HERO]]" monsters have their name written in Japanese (Ｅ・ＨＥＲＯ).
