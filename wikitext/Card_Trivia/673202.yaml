title: Card Trivia:Smile Action
wikitext: |-
  {{Navigation}}

  * This card's artwork is a reference to [[Action Duel]]s, with the white card explosion representing when the Action Duel begins and [[Action Card]]s are spread across the field.
  ** This card's effect is also a reference to Action Cards, which were almost always [[Spell Card]]s and were randomly obtained during an Action Duel in the ''[[Yu-Gi-Oh! ARC-V]]'' anime. The Action Card that appeared most frequently in the anime was "[[Evasion]]", which allowed a player to [[negate]] an [[attack]], which is likely the inspiration behind this card's effect to negate an attack.
