title: Card Trivia:Charmer Quartet in Bloom
wikitext: |-
  {{Navigation}}

  * "[[Aussa the Earth Charmer, Immovable]]", "[[Eria the Water Charmer, Gentle]]", "[[Hiita the Fire Charmer, Ablaze]]", and "[[Wynn the Wind Charmer, Verdant]]" appear in this card's artwork.
  * This card's Japanese name is derived from the idiom 「百花繚乱」 (''hyakkaryōran'', lit. "hundreds of flowers in profuse bloom"), which refers to a group of beautiful women or talented people.
