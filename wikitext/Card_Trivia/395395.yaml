title: Card Trivia:Abyss Actor - Twinkle Little Star
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abyss Actors' Curtain Call]]", "[[Abyss Actors' Dress Rehearsal]]", "[[Abyss Playhouse - Fantastic Theater]]", "[[Set Rotation]]", and "[[Stand In]]".
  * This monster is wearing a hat resembling the hairstyle of "[[Abyss Actor - Superstar]]".
  * This card's name is based on the popular English lullaby, "[[wikipedia:Twinkle, Twinkle, Little Star|Twinkle, Twinkle, Little Star]]".
  * This card is based on a [[wikipedia:Child actor|child actor]], a term used in [[wikipedia:acting|acting]] to describe a child acting in theatre or television.
