title: Card Trivia:Subterror Behemoth Phospheroglacier
wikitext: |-
  {{Navigation}}

  * "[[Subterror Fiendess]]" appears in this card's artwork (in front of this monster's right leg).
  * This monster's English name is a portmanteau of the words "[[wikipedia:Phosphorescence|phosphorescence]]" (the emission of light without combustion or heat) and "[[wikipedia:Glacier|glacier]]" (a large ice mass that flows downhill underneath its own weight).
  ** This monster's Japanese name, "Subterror Malice Glaioath", is a portmanteau of "glacier" and "Io" (referencing the [[wikipedia:Ionian Sea|Ionian Sea]], keeping with the [[wikipedia:Mediterranean Sea|Mediterranean Sea]] theme of the Japanese names of the "[[Subterror Behemoth]]" monsters).
  * This is the first and currently only [[Level 8]] [[Flip monster]].
