  {{Navigation}}
  [[File:Three_Musketeers_pose_Episode_174.png|thumb|right|250px|"[[King's Knight (anime)|King's Knight]]", "[[Jack's Knight (anime)|Jack's Knight]]", and "[[Queen's Knight (anime)|Queen's Knight]]" strike a pose before attacking "[[Guardian Grarl (anime)|Guardian Grarl]]".]]

  * "[[Jack's Knight]]", "[[Queen's Knight]]", and "[[King's Knight]]" appear in this card's artwork.
  ** This card's artwork is based on the scenes in {{episode|Yu-Gi-Oh!|174|ref}} and {{episode|Yu-Gi-Oh!|198|ref}}, where "[[Jack's Knight (anime)|Jack's Knight]]", "[[Queen's Knight (anime)|Queen's Knight]]", and "[[King's Knight (anime)|King's Knight]]" and they struck a similar pose after they were all [[Summon]]ed together on the [[field]].

