title: Card Trivia:Destiny HERO - Death Dogma
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[counterpart]] of "[[Destiny HERO - Dogma]]".
  ** The weapon on this monster's right arm is based on "[[Cyclone Blade]]".
  * This monster references the friendship between [[Aster Phoenix]] and [[Sartorius]] in the ''[[Yu-Gi-Oh! GX]]'' anime. 
  ** This monster's long blue hair resembles Sartorius' hair.
  ** This monster has more pronounced devil horns than "Dogma", reflecting the ruinous future Sartorius foretold for himself through The Devil [[wikipedia:Tarot|Tarot]] card, which he asked Aster's help in overcoming.
  ** In {{episode|GX|101|ref}}, Aster and Sartorius teamed up against the latter's evil personality, and Aster used the effect of "[[D - Burst (anime) |D - Burst]]" (featuring "Dogma" in the artwork) during their final turn of the duel. "Cyclone Blade", a monster equipped with "Cyclone Blade", and "Dogma" can all viably be paired with the TCG/OCG effect of "[[D - Burst]]".
