title: Card Trivia:D/D/D Wave High King Caesar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[D/D/D Advance]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[D/D/D Wave King Caesar]]".
  ** Unlike the other [[D/D/D Flame High King Genghis|High]] [[D/D/D Gust High King Alexander|King]] "[[D/D/D]]" monsters, this monster  cannot be Summoned using its base form as [[material]], since it does not have an effect to do so. The "[[D/D/D]]" archetype also lacks a card that allows "Wave King Caesar" to be used as material for this card. However, a player can use "[[Rank-Up-Magic Astral Force]]" to do this.
  * This is the only High King "D/D/D" monster with an effect related to "[[Dark Contract]]" cards.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to increase the [[ATK]] of itself and one other "[[D/D]]" monster by 1800 reference [[D/D/D Wave High King Caesar (anime)|its appearance and effect]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, where its ATK increases by the ATK of the monster whose [[Special Summon]] was [[negate]]d.
  ** In {{episode|ARC-V|140|ref}}, [[Declan Akaba]] used this effect to negate the Special Summoning of "[[Supreme King Dragon Darkwurm (anime)|Supreme King Dragon Darkwurm]]" and increase this monster's ATK by 1800 (the ATK of "Darkwurm").
