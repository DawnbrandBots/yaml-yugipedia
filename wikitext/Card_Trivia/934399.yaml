title: Card Trivia:Gouki The Solid Ogre
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Dwayne Johnson|Dwayne Johnson]], an American [[wikipedia:Professional wrestling|professional wrestler]] who is known by his ring name, "The Rock", whereas a rock is known for its solid surface.
  ** This monster's name also reflects its effect to "solidify" its defense by preventing it from being [[destroyed by battle]] or by card effects while pointing to a "[[Gouki]]" monster.
