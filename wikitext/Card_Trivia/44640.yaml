title: Card Trivia:Sage's Stone
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This card's Japanese name, "Sage's Jewel" (賢者の宝石 ''Kenja no Hōseki''), is based on the Japanese name of the Philosopher's Stone (賢者の石 ''Kenja no Ishi'').
  * This card's effect is the opposite of "[[Bond Between Teacher and Student]]": this card can [[Special Summon]] "Dark Magician", while "Bond Between Teacher and Student" can Special Summon "Dark Magician Girl".
  * In ''[[Yu-Gi-Oh! Nightmare Troubadour]]'' , this card's name reads '''Sage's Jewel''' in the card menu and '''Sage's Stone''' on the card itself, thus having two names in the game.
  * This card has a ''[[Rush Duel]]'' counterpart: "[[Stone of the Dark Magicians]]".
