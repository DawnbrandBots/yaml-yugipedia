title: Card Trivia:Familiar-Possessed - Aussa
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Awakening of the Possessed]]", "[[Awakening of the Possessed - Nefariouser Archfiend]]", and "[[Possessed Partnerships]]".
  * This monster is a powered-up form of "[[Aussa the Earth Charmer]]".
  * The familiar in this card's alternate artwork is likely meant to be "[[Archfiend Marmot of Nefariousness]]", with the difference in design being due to its release 9 years after this card's. However, the old design was still reused for "[[Unpossessed]]".
