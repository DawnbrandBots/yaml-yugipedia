title: Card Trivia:Mausoleum of White
wikitext: |-
  {{Navigation}}

  * "[[Master with Eyes of Blue]]", "[[Priestess with Eyes of Blue]]", "[[Sage with Eyes of Blue]]", "[[Protector with Eyes of Blue]]", and a statue of a "[[Blue-Eyes]]" monster ("[[Spirit with Eyes of Blue]]") appear in this card's artwork.
  ** The monument the statue is perched on appears to be somewhat based on the tower that appears in the artwork of the ''[[Anniversary Pack]]'' [[:File:BlueEyesWhiteDragon-TF05-JP-VG-5-artwork.png|reprint]] of "[[Blue-Eyes White Dragon]]".
