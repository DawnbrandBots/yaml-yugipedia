title: Card Trivia:Bachibachibachi
wikitext: |-
  {{Navigation}}
  [[File:ZXx074 Drawing Contest Winner Bachibachibachi.png|thumb]]

  * This monster's name is a pun on the Japanese words for "bee" (バチ ''bachi'') and the onomatopoeia of "buzzing" made by a bee (バチバチ ''bachibachi'').
  ** ''Bachibachi'' is also the onomatopoeia of getting zapped by electricity, which is reflected in the lightning motif in this monster's design and in this card's artwork.
  * This is one of three [[Fan-Made Cards]] that won the ''Yu-Gi-Oh! ZEXAL Draw Contest'', the other two being "[[Dotedotengu]]" and "[[Tatakawa Knight]]".
  * This is the only monster [[Special Summon]]ed by the effect of "[[Goblindbergh (anime)|Goblindbergh]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime whose [[Level]] is not 4, being a [[Level 3]] monster instead.
