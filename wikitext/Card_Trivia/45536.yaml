title: Card Trivia:Magic Reflector
wikitext: |-
  {{Navigation}}

  * This is the first card in the ''[[OCG]]''/''[[TCG]]'' to feature an effect to place [[counter]]s on cards.
  * This card shares a relationship with "[[Magic Deflector]]", "[[Spell Canceller]]", and "[[Virus Cannon]]".
  ** All cards' artwork feature a device that share similar designs, including spiked legs, purple orbs, visible circuity and mechanical insides.
  ** All cards feature an effect related to [[Spell Card]]s, although this card is a Spell [[support]] card, while the others are Spell [[anti-support]] cards.
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', this card's effect places a [[Spell Counter]] on the Spell Card, instead of a normal counter.
