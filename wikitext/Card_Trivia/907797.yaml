title: Card Trivia:Traptrix Cularia
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Utricularia|Utricularia]]'', or bladderwort, a genus of carnivorous plant that captures small organisms by means of bladder-like traps.
  * The small transparent creatures around this monster may be [[wikipedia:Rotifer|Rotifers]], a common prey animal of Utricularia. Albeit heavily stylized to look like a rabbit to match with this monster's "rabbit ears".
