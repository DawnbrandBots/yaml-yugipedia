title: Card Trivia:Power Meter
wikitext: |-
  {{Navigation}}

  * This card is based on the Power Meter, one of the main gameplay mechanics of the ''[[wikipedia:Gradius|Gradius]]'' video game series that allows the player to customize their fighter with different weapons or defensive capabilities.
  ** This card's artwork depicts the "SPEED", "MISSILE" and "DOUBLE" options, which are the basic options that Power Meter offers starting from ''[[wikipedia:Gradius II|Gradius II]]''.
  ** This card's effect to [[Fusion Summon]] a [[Level 4]] [[Machine]] [[Type]] monster with 800 [[DEF]] references the customization ability in the ''Gradius'' video game series, in which the player has to improve their ship, whereas in ''[[Yu-Gi-Oh! Rush Duel]]'', the "[[Gradius (Rush Duel series)|Gradius]]" features [[Fusion Monster]]s that are [[Card evolutions|upgraded]] forms of "[[Gradius (Rush Duel)|Gradius]]".
