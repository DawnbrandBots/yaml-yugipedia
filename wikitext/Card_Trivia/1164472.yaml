title: Card Trivia:Princess Adena's Protection
wikitext: |-
  {{Navigation}}

  * This Skill's effect [[support]]ing "[[Mystical Elf (Duel Links)|Mystical Elf]]" references how [[Princess Adena]], a character in the [[Legendary Heroes]] video game featured in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, is revealed to be "[[Mystical Elf (anime)|Mystical Elf]]". 
  ** In ''[[Yu-Gi-Oh! Duel Links]]'', this Skill was released alongside [[Mokuba Kaiba (Duel Links)|Mokuba Kaiba]] (including in his Princess Adena disguise), referencing how Princess Adena was modeled after Mokuba.
