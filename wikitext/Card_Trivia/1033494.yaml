title: Card Trivia:Energy Controller
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' parody of "[[Enemy Controller]]".
  ** When this card was played in {{episode|GO RUSH!!|089|ref}}, the button combination said by [[Energy Copyko]] is the same as the [[Konami Code]], which the original version of "[[Enemy Controller (manga)|Enemy Controller]]" referenced.
  * This card's name is based on Energy Copyko, who transforms into this card in {{episode|GO RUSH!!|085|ref}}, and is officially considered her [[signature card]].
