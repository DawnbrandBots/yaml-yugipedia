title: Card Trivia:Light-Calling Griffore
wikitext: |-
  {{Navigation}}

  * The object in the artwork of "[[Chaos Ceremonial Object]]" appears in this card's artwork.
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Griffore (Rush Duel)|Griffore]]".
  ** This monster references a scene in {{chapter|Yu-Gi-Oh!|118|ref}} where the soul of "[[Griffore (manga)|Griffore]]" was offered to the [[LIGHT|light]] as part of the [[Tribute]] with "[[Black Luster Ritual (manga)|Black Luster Ritual]]" to [[Ritual Summon]] "[[Black Luster Soldier (manga)|Black Luster Soldier]]".
