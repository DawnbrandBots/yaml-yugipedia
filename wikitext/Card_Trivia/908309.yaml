title: Card Trivia:Ultimate Great Insect
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Great Moth]]" and "[[Insect Queen]]".
  ** This monster's Japanese name, "Perfect Form - Great Insect", references the Japanese name of "[[Perfectly Ultimate Great Moth]]" ("Ultimate Perfect Form - Great Moth"), an [[Card evolutions|upgraded]] form of "Great Moth".
  ** This monster's [[Fusion Material]]s reference the [[Level]]s of "Great Moth" and "Insect Queen", which are [[Level 8|8]] and [[Level 7|7]] respectively.
  ** This monster's alternative [[Special Summoning condition]] references the Special Summoning condition of "Great Moth" by [[Tribute|Tributing]] "[[Petit Moth]]" [[equip]]ped with the 2000 [[DEF]] "[[Cocoon of Evolution]]".
  ** This monster's [[effect]] to [[destroy]] all monsters on the opponent's field during the [[Battle Phase]] likely references a scene in {{chapter|Yu-Gi-Oh!|068|ref}}, where [[Insector Haga (manga)|Insector Haga's]] "[[Great Moth (manga)|Great Moth]]" attacks all of [[Dark Yugi (manga)|Dark Yugi's]] land-based monsters at once.
