title: Card Trivia:Skiel Attack 5
wikitext: |-
  {{Navigation|mode=nongame}}

  * The number "5" in this monster's name represents its [[Level]] (5).
  * This monster resembles a [[wikipedia:Grasshopper|grasshopper]], keeping in relation with the "flying animal" design of the "[[Skiel]]" [[archetype]].
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster has the highest [[original ATK]] (1400) of all "Skiel" monsters.
