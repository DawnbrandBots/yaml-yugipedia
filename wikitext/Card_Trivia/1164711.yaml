title: Card Trivia:Predaplant Bal Teah
wikitext: |-
  {{Navigation}}

  * This monster is a combination of the [[wikipedia:Ibicella lutea|Devil's claw]] plant (''Ibicella lutea'') and [[wikipedia:Beelzebub|Beelzebub]] (Ba'al Zabub).
  ** This monster's appearance references how Beelzebub is also commonly known as the "Lord of the Flies" in the ''[[wikipedia:Dictionnaire Infernal|Dictionnaire Infernal]]''.
  * This is the first "[[Predaplant]]" [[Synchro Monster]], as well as the first "Predaplant" [[Synchro Tuner Monster]].
