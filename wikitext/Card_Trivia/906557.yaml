title: Card Trivia:Marincess Sleepy Maiden
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Valenciennea strigata|Valenciennea strigata]]'', a species of fish that is commonly known as the "golden-head sleeper goby".
  ** This card's name is also a reference to Blue Maiden, one of [[Skye Zaizen]]'s account names and aliases in [[LINK VRAINS]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
