title: Card Trivia:Ice Pillar Token
wikitext: |-
  {{Navigation|mode=token}}

  * This Token's [[Level]] (4) and [[ATK]] (1900) are based on those of "[[Frost Tiger]]".
  ** This is a reference to a scene in {{chapter|GX|019|ref}}, in which [[Alexis Rhodes (manga)|Alexis Rhodes]] activates "[[Twin Pillars of Ice (manga)|Twin Pillars of Ice]]" to create two [[Ice Pillar]]s, then used the effect of "[[Soul Infusing Sculptor]]" to turn one of them into a copy of "[[Frost Tiger]]" (albeit with 0 ATK and [[DEF]]).
