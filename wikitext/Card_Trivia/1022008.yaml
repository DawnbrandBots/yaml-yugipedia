title: Card Trivia:Great Multistrike Dragon Dragias Burst
wikitext: |-
  {{Navigation}}

  * This is a [[Maximum Monster|Maximum]] version of "[[Multistrike Dragon Dragias]]".
  * Along with "[[Great Multistrike Dragon Dragias Burst (L)|Great Multistrike Dragon Dragias Burst [L]]]" and "[[Great Multistrike Dragon Dragias Burst (R)|Great Multistrike Dragon Dragias Burst [R]]]", this is the first and last Maximum Monster to be [[Maximum Summon]]ed in the ''[[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!]]'' manga.
