title: Card Trivia:Elemental HERO Necroid Shaman
wikitext: |-
  {{Navigation}}

  * This card is the first [[DARK]] [[Attribute]] "[[Elemental HERO]]" [[Fusion Monster]].
  * This card shares physical traits with its Fusion Materials, "Elemental HERO Wildheart" and "[[Elemental HERO Necroshade]]".
  ** "Wildheart": This monster's physical design is similar to that of "Wildheart".
  ** "Necroshade": This monster's DARK Attribute, markings, gauntlet design, and red hair coloration are similar to that of "Necroshade"; also, this monster's [[Graveyard]] effect is similar to that of "Necroshade".
  * This monster has the following distinctions from the other "HERO" Fusion Monsters that require "Elemental HERO Wildheart" as [[Fusion Material]]:
  ** It is a DARK monster instead of an [[EARTH]] monster.
  ** It has 1800 [[DEF]] instead of 2300 DEF.
  ** It is [[Level 6]] instead of [[Level 8]].
  * This monster is wielding a [[wikipedia:khakkhara|khakkhara]], a Buddhist ringed staff primarily used in prayer or combat.
