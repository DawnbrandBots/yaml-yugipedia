title: Card Trivia:Ghostrick Alucard
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amaze Attraction Horror House]]" (as a portrait and a cosplay of "[[Amazement Administrator Arlekino]]"), "[[Ghostrick Festival]]", "[[Ghostrick Mansion]]", "[[Ghostrick Parade]]", "[[Ghostrick Renovation]]", "[[Ghostrick Shot]]", and "[[Ghostrick Vanish]]".
  * This monster is based on [[wikipedia:Count Dracula|Count Dracula]], a legendary vampire appearing in [[wikipedia:Bram Stoker|Bram Stoker's]] 1897 horror novel, ''[[wikipedia:Dracula|Dracula]]'', who assumed the identity of "Alucard" in the 1943 horror film ''[[wikipedia:Son of Dracula (1943 film)|Son of Dracula]]''.
  ** This monster is also likely based on [[wikipedia:Alucard (Castlevania)|Adrian Fahrenheit Țepeș]], the estranged half-human half-vampire son of Dracula who assumes the identity of "Alucard" in Konami's ''[[wikipedia:Castlevania|Castlevania]]'' video game series.
  *According to the lore Alucard owns the [[Ghostrick Mansion]], but is constantly vexed by the others being [[Ghostrick Shot|reckless]] and [[Ghostrick Museum|clumsy]]; which is why he [[Ghostrick Vanish|hides out in the cemetery]] for peace.
  **The only time they're ever away is for the Parade during the Festival, where they Trick or Treat
