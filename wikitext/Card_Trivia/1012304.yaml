title: Card Trivia:White Reincarnation
wikitext: |-
  {{Navigation}}

  * "[[White Aura Whale]]" appears in this card's artwork.
  ** This card's second and third effects are based on the effects of the [[White Aura Whale (manga)|manga version of "White Aura Whale"]], which allows it to attack a second time (even directly) after destroying a monster by battle, and [[destroy]] all the opponent's monsters when it is [[Special Summon]]ed (not just when it is [[Synchro Summon]]ed), even during the [[Damage Step]].
  * This card's name references the phrase [[Ren]] used in {{chapter|ARC-V|12|ref}}, after he Synchro Summoned "White Aura Whale": "My Synchros remain in continual flux! It's called Reincarnation Synchro!".
