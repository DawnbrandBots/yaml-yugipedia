  {{Navigation}}

  * "[[Cloudian - Smoke Ball]]" and a ''[[Yu-Gi-Oh! 5D's]]'' version of the [[Synchro Summon]]ing ring appears in this card's artwork.
  * This card is a [[Normal Monster]] counterpart of "[[Lightwave Tuning]]". Ironically, the artwork of "Lightwave Tuning" features "[[Shining Friendship]]", yet the monster [[target]]ed for its effect does not need to be a [[Normal Monster]].
