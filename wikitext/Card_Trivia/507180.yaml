title: Card Trivia:Fusionist
wikitext: |-
  {{Navigation}}
  * This is one of the first five Fusion monsters released in the card game. True to its name, it is a fusion of two arbitrarily selected monsters.
  * This monster has a [[recolored counterpart|recolored]] [[Effect Monster]] [[counterpart]]: "[[Little Chimera]]".
  * This monster has the lowest combined [[original ATK and DEF]] (1600) of all [[Non-Effect Monster|Non-Effect]] [[Fusion Monster]].
