title: Card Trivia:Danger! Disturbance! Disorder!
wikitext: |-
  {{Navigation}}

  * "[[Danger! Bigfoot!]]", "[[Danger! Nessie!]]", the scientist team in "[[Danger! Response Team]]" and "[[Realm of Danger!]]" appear in this card's artwork.
  * This is the only "[[Danger!]]" card to be an ''[[OCG]]'' premiere, instead of a ''[[TCG]]'' one.
