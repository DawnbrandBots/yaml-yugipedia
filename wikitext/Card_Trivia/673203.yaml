title: Card Trivia:Future Drive
wikitext: |-
  {{Navigation}}

  * "[[Number F0: Utopic Future]]", and the silhouettes of "[[Number 39: Utopia Beyond]]", "[[Number C39: Utopia Ray V]]", "[[Number C39: Utopia Ray]]", "[[Number C39: Utopia Ray Victory]]", "[[Number 39: Utopia Roots]]", and "[[Number 39: Utopia]]" (going clockwise from the top-left, respectively) appear in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|ZEXAL|146|ref}}, when [[Yuma Tsukumo]] used "[[Memories of Courage]]" on "Utopic Future" in order for it to gain 500 ATK for every "[[Number]]" monster in either player's [[Graveyard]], which was surrounded by the silhouettes of the "[[Utopia]]" monsters mentioned above. "[[Number 32: Shark Drake (anime)|Number 32: Shark Drake]]" and "[[Number 62: Galaxy-Eyes Prime Photon Dragon (anime)|Number 62: Galaxy-Eyes Prime Photon Dragon]]" are not present in this card's artwork

