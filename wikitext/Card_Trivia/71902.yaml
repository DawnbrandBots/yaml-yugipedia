title: Card Trivia:Dragon Revival Ritual
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is one of two [[Ritual Spell Card]]s in the [[Yu-Gi-Oh! (anime)|Yu-Gi-Oh! anime]] whose effect does not depend on the Levels of the Tributed monsters, the other being "[[Red-Eyes Transmigration (anime)|Red-Eyes Transmigration]]".
  ** In this card's case, its anime effect can Ritual Summon "[[Mythic Dragon (anime)|Mythic Dragon]]" by [[Tribute|Tributing]] one [[DARK]], [[EARTH]], [[FIRE]], [[WATER]], and [[WIND]] monster.
