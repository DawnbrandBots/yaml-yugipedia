title: Card Trivia:Trickstar Holly Angel
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[LINK VRAINS Box]]''.
  * This monster appears in the artworks of "[[Trickstar Light Stage]]", "[[Trickstar Perennial]]", "[[Trickstar Reincarnation]]", "[[Trickstar Scatter]]", "[[Trickstar Temptation]]", and "[[Trickstar Treat]]".
  ** This monster's shadow can be seen cast upon the stage in the artwork of "[[Trickstar Light Arena]]".
  * This monster's name is based on the ''[[wikipedia:Alcea|Alcea]]'', a genus of flowering plants that is commonly known as "hollyhocks", which appears as the symbol on the corners of this card's artwork.
  ** This naming scheme references this monster's owner, [[Skye Zaizen]], whose Japanese name, "Aoi" (葵) is translated to "hollyhock". Also, this monster's name references Skye's initial [[LINK VRAINS]] alias, "Blue Angel".
  ** This monster's name is also based on [[wikipedia:Holly|holly]], a genus of watering plants that are known for producing red and bulbous toxic berries, which the red ball of this monster's flail highly resembles.
  * This monster has a retrained [[counterpart]]: "[[Trickstar Noble Angel]]".
  * This is the first [[Fairy]] [[Link Monster]].
  * This is the [[signature card]] of [[Blue Angel]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** Like the signature cards of many of the other ''Yu-Gi-Oh!'' heroines, this card is performance-themed. In this case, this monster is based on a pop idol.
  * In the ''Yu-Gi-Oh! VRAINS'' anime, this monster has a white undershirt, despite the Japanese artwork depicting it with a cleavage window.
  ** This makes it one of the few cases where the monster is censored in the Japanese version of the anime, but not in the ''[[OCG]]''.
