title: Card Trivia:Umi
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:sea|sea]], a large body of water inhabited by [[fish]], [[Sea Serpent|mythical sea serpents]], and other [[aqua]]tic creatures.
  ** This card's effect supporting [[Thunder]] likely references how water acts as a conductor for lightning and electricity
  ** This card's [[Pyro]] and [[Machine]] anti-support effect references how water can respectively extinguish fires and rust up/short out machines.
  ** This card is also based on the [[Ocean]] [[terrain]] in the original ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * "[[A Legendary Ocean]]", "[[Forgotten Temple of the Deep]]", "[[Lemuria, the Forgotten City]]", "[[Magellanica, the Deep Sea City]]", "[[Maiden of the Aqua]]", and "[[Pacifis, the Phantasm City]]" feature effects that allows them to be treated as "Umi" while face-up on the [[field]].
  ** "A Legendary Ocean", "Lemuria, the Forgotten City", "Pacifis, the Phantasm City", and "Magellanica, the Deep Sea City" are also [[Field Spell Card]]s featuring effects that allows them to ''always'' be treated as "Umi".
  * This card has a [[Skill Card]] counterpart: "[[Mythic Depths]]".
  * This card's official Chinese name has been mentioned in card text of a few other cards, but so far, no official Chinese prints of it have been released.
