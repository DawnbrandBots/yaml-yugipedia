title: Card Trivia:Loan Token
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Endless Loan]]"
  * The stone weight in this card's artwork depicts the text "1000P" written over an arrow pointing downwards, reflecting the fact that this monster is used in conjunction with the effect of "[[Toichi the Nefarious Debt Collector]]" to lower the opponent's [[Life Point]]s by 1000.
