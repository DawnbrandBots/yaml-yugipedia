title: Card Trivia:Gandora-X the Dragon of Demolition
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Gandora the Dragon of Destruction]]".
  * This is the only "[[Gandora (archetype)|Gandora]]" monster:
  ** To not have an effect that [[banish]]es other cards.
  ** That inflict [[effect damage]] to the opponent.
  ** Whose [[Life Point]]-halving effect is mandatory rather than a cost.
  * In December 2023, this card's text was updated to specify "[[original ATK]]" instead of just "ATK",<ref name="YGOrg 12-17-23">{{cite web | url = https://ygorganization.com/gandora-x-ocg-errata/ | title = Gandora X OCG Errata | author = Satchmo | website = The Organization | date = December 17, 2023 | accessdate = December 19, 2023}}</ref> aligning it with what its effect had been in the ''[[TCG]]'' since its ''TCG'' debut in July 2016.
  ** The discrepancy between the card effects in the ''OCG'' and ''TCG'' is significant enough that it was Forbidden in the ''OCG'' only.
  ** This card received this [[errata]] in ''[[Yu-Gi-Oh! Duel Links]]'' and ''[[Yu-Gi-Oh! Master Duel]]'' before the ''OCG''. In ''Duel Links'', its effect was changed to match its ''TCG'' text from its ''Duel Links'' debut in March 2022 (as part of the [[Determination to Fight]] Skill). In ''Master Duel'', its effect was changed in October 2023, though its [[Forbidden]] status was not changed until November 2024.<ref name="YGOrg 10-27-23">{{cite web | url = https://ygorganization.com/master-duel-gandora-x-text-updated/ | title = [Master Duel] Gandora-X Text Updated | author = Ness | website = The Organization | date = October 27, 2023 | accessdate = December 29, 2023}}</ref><ref name="YGOrg 11-5-24">{{cite web | url = https://ygorganization.com/master-duel-upcoming-fl-list-and-new-packs/ | title = [Master Duel] Upcoming F&L List and New Packs | author = Ness | website = The Organization | date = November 5, 2024 | accessdate = November 5, 2024}}</ref>

