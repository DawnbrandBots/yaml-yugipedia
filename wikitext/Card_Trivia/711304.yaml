title: Card Trivia:Myutant Mutant
wikitext: |-
  {{Navigation}}

  * This is the first "[[Myutant]]" card to debut in the ''[[OCG]]'' instead of the ''[[TCG]]''.
  * This monster appears to be a premutated form of "[[Myutant M-05]]".
  ** This card is 1 [[Level]] lower than "M-05".
  ** However, despite this card's artwork specifically depicting this monster similar to "M-05", its name and  implies that this monster is the progenitor of all low-Level "Myutant" monsters.
  ** Specifically, this card seems to be the organism's initial discovery,  "[[Myutant M-05]]" taking place after it is taken to a facility for research upon which it breaks containment as shown in "[[Myutant ST-46]]" and "[[Myutant GB-88]]".
