title: Card Trivia:One-Shot Wand
wikitext: |-
  {{Navigation}}

  * This card's name reflects its effect, as the [[equip]]ped monster will get one attack (or "one shot") before this card is [[destroy]]ed for its [[draw]]ing effect.
  * This card has two counterparts: "[[Wonder Wand]]" and "[[Bound Wand]]".
