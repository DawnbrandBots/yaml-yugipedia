title: Card Trivia:Magna-Slash Dragon
wikitext: |-
  {{Navigation}}

  * This card has a [[counterpart]]: "[[Gravi-Crush Dragon]]".
  ** Both cards share the same [[Level]], [[ATK]], [[DEF]], and [[Type]], with opposite [[Attribute]]s; both cards also have effects that send a face-up [[Continuous Spell Card]] you control to the [[GY]] to destroy cards.
  ** Both cards were released in the same [[Booster Pack]], ''[[Force of the Breaker]]''; the "[[Crystal Beast]]" [[archetype]] is introduced in the same pack, and "Crystal Beast" monsters share an effect that turns them into a Continuous Spell Card when they are destroyed in a [[Monster Zone]].
