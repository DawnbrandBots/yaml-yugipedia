title: Card Trivia:Ghost Ogre & Snow Rabbit
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * "[[Live☆Twin Ki-sikil]]" cosplays as this monster in the artwork of "[[Live☆Twin Channel]]".
  * This monster's Japanese name (幽鬼うさぎ, ''Yuki Usagi'') is a pun on the Japanese name for the [[wikipedia:Mountain hare|mountain hare]] (ユキウサギ, ''yukiusagi'' lit. "snow rabbit") where the kana for "snow" (ユキ, ''yuki'') is replaced with the base kanji for "ghost" (幽鬼, ''yūki'').
  * Unlike all other [[Yo-kai Girl]]s, this monster [[send]]s itself from the [[hand]] or [[field]] to the [[Graveyard]] instead of [[discard]]ing itself to use its effect, where it cannot be [[activate]]d when effects that [[banish]] cards that would be sent to the Graveyard are applied.
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this monster has a special animation when [[activate]]d, in which the spirits from its artwork surround the activated card before [[destroy]]ing it.
