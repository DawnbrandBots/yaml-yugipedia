title: Card Trivia:Silver's Cry
wikitext: |-
  {{Navigation}}

  * "[[Azure-Eyes Silver Dragon]]" appears in this card's artwork.
  ** Fittingly, "Azure-Eyes Silver Dragon" features the effect to [[Special Summon]] a [[Dragon]] [[Normal Monster]] (or in its case any Normal Monster) from the [[Graveyard]].
  * In ''[[Yu-Gi-Oh! Rush Duel]]'', [[Silver's Cry (Rush Duel)|this card]] was released as a [[Normal Spell Card]] instead of a [[Quick-Play Spell Card]], since the latter does not currently exist in ''Rush Duel''.
