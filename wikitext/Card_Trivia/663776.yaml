title: Card Trivia:Time Thief Retrograde
wikitext: |-
  {{Navigation}}

  * "[[Time Thief Winder]]", "[[Time Thief Redoer|Redoer]]", "[[Time Thief Perpetua|Perpetua]]", and "[[Time Thief Bezel Ship|Bezel Ship]]" (as a [[wikipedia:Wire-frame model|wire-frame model]]) appear in this card's artwork.
  * The "Time Hack" of "SUN 20 MAY 2012 AM 11:57:00" pictured on the display in this card's artwork is the same date as "20/5 2012 11:57:00 AM" on the screen of "[[Time Thief Regulator]]".
  * Both dates pictured on the display in this card's artwork, [[wikipedia:Solar eclipse of May 20, 2012|May 20, 2012]] and [[wikipedia:Solar eclipse of October 25, 2041|October 25, 2041]], are dates of an annular [[wikipedia:Solar eclipse|solar eclipse]].
