title: Card Trivia:Volcanic Rat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Volcanic Curse]]".
  * This card is the only "[[Volcanic]]" [[Normal Monster]].
  * Although this card's name suggests that it is a [[wikipedia:Rat|rat]], its lore refers to it as a [[wikipedia:Mouse|mouse]].
  * This card and "[[Shadow Specter]]" are tied for the highest printed [[original ATK]] (500) of a [[Level 1]] Normal Monster.
  * This card does not appear in either ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'' or ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]''.
