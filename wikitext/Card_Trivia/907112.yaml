title: Card Trivia:Myutant Arsenal
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Myutant Clash]]".
  * This monster is a mutated form of "[[Myutant ST-46]]".
  ** "Myutant ST-46" appears in this monster's chest.
  *** This is fitting, as the "ST" in "Myutant ST-46's" name refers to its effect to [[search]] the "[[Myutant]]" [[Spell]]s and [[Trap]]s.
  ** This card being [[Machine]]-[[Type]] and [[FIRE]]-[[Attribute]] reflects its connection to its associated [[card type]], the purple-framed [[Trap Card]].
  ** This card can be considered the Trap-associated counterpart of "[[Myutant Mist]]", which references [[Spell Card]]s instead.
