title: Card Trivia:Gaia the Magical Knight of Dragons
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Rise of the Duelist]]''.
  * This monster appears in the artworks of "[[Spiral Discharge]]" and "[[Spiral Reborn]]".
  * This monster is a [[retrained]] counterpart of "[[Gaia the Dragon Champion]]".
  ** Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Gaia the Magical Knight]]" and "[[Curse of Dragon, the Cursed Dragon]]".
  * This monster has a [[Curse of Dragon (series)|Curse of Dragon]] counterpart: "[[Curse of Dragon, the Magical Knight Dragon]]".
  * This monster has an [[Card evolutions|upgraded]] Fusion counterpart with "[[Dark Magician]]": "[[Dark Magician the Knight of Dragon Magic]]".
