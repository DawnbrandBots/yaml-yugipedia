title: Card Trivia:Dharma Cannon
wikitext: |-
  {{Navigation}}

  * A mechanized version of this monster appears in the artwork of "[[Destructive Daruma Karma Cannon]]".
  * This monster is based on a [[wikipedia:Daruma doll|daruma doll]], a Japanese traditional doll modeled after [[wikipedia:Bodhidharma|Bodhidharma]], a Buddhist monk who reached enlightenment after nine years of meditation.
  * This card's artwork was censored in in the ''[[Yu-Gi-Oh! Tag Force]]'' series, but was not censored in the ''[[TCG]]''.
