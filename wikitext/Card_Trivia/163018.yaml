title: Card Trivia:Goblindbergh
wikitext: |-
  {{Navigation}}

  * This monster appear in the artwork of "[[Spirit Foresight]]" and "[[Goblin Freefall Squad]]".
  * This monster's name is a portmanteau of "[[Goblin]]" and [[wikipedia:Charles Lindbergh|Charles Lindbergh]].
  ** Charles Lindbergh was an American aviator who piloted his high-wing monoplane, the ''[[wikipedia:Spirit of St. Louis|Spirit of St. Louis]]'' on the first solo nonstop transatlantic flight from Long Island, New York, to Paris, France.
  * This monster has a "[[Gogogo]]" [[counterpart]]: "[[Gogogo Goblindbergh]]".
  * Despite being depicted as a single monster, in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and manga, four copies of this monster appear when its effect activates. This reflects its [[Level]] (4) and effect to [[Special Summon]] a [[Level 4]] or lower monster from the [[hand]].
  ** When this monster's effect is activated in the ''Yu-Gi-Oh! ZEXAL'' anime and manga, four copies of this monster fly in and carry a hexagonal container lifted up by the cables on the underside of their airplanes. The cables then snap off, and the container falls to the ground, opening up to reveal a Level 4 or lower monster inside.
