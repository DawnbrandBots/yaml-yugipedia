title: Card Trivia:Souleating Oviraptor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ryu-Ge Realm - Dino Domains]]".
  * This monster is based on the ''[[wikipedia:Oviraptor|Oviraptor]]'', a genus of dinosaur. It also resembles the ''[[wikipedia:Pachycephalosauria|Pachycephalosaurus]]'' due to its enlarged, dome-like skull.
  ** Due to its malicious appearance, this monster may also be based on "Anzu", a relative of the ''Oviraptor'' which is often referred to as "The Chicken from Hell".
