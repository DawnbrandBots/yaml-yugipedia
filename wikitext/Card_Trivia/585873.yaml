title: Card Trivia:World Chalice Guardragon Almarduke
wikitext: |-
  {{Navigation}}

  * "[[World Chalice Guardragon]]" → "[[Imduk the World Chalice Dragon]]" → "[[Crusadia Draco]]" → "[[Guardragon Andrake]]" → "World Chalice Guardragon Almarduke" / "[[World Legacy Guardragon Mardark]]"
  ** This card has the same [[Type]], [[Level]], and [[Attribute]] as "World Legacy Guardragon Mardark", but their [[ATK]] and [[DEF]] are opposite to each other.
  *** Both monsters seem to be the two halves of "Guardragon Andrake" split apart. "Almarduk" seems to represent the 'good' side of "Andrake".
  * This monster appears in the artwork of "[[Crusadia Testament]]".
  * This card's name might be a reference to ''[[wikipedia:Marduk|Marduk]]'', a god from Mesopotamian mythology and patron deity of the Babylonians.
