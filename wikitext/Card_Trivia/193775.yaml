title: Card Trivia:Ancient Telescope
wikitext: |-
  {{Navigation}}

  * This telescope appears in the artworks of "[[Fusion Recycling Plant]]" (being held by the soldier from "[[Supply]]"), "[[Geological Survey]]", "[[Philan Dwarf]]", and "[[Twin Twisters]]".
  * This card has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[Dark Matter (series)|Dark Matter]] [[counterpart]]: "[[Dark Matter Telescope]]".
  * The Spanish lore of this card has an small typo, as it says "'''''la''' Deck''" instead of "'''''el''' Deck''".
