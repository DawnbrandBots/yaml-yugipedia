title: Card Trivia:Amusi Annoyance
wikitext: |-
  {{Navigation}}

  * "[[Amusi Howling Performer]]", "[[Rhythmical Performer]]", and "[[Speedy Performer]]" appear in both of this card's artworks.
  * This card's name is based on [[wikipedia:Amusia|amusia]], a musical disorder that is also known as being "tone deaf", in which someone is unable to recognize or produce musical tones.
  ** Fittingly, this card's artwork depicts "Amusi Howling Performer" as tone deaf, as evidenced by the broken musical notes and the reactions of "Rhythmical Performer" and "Speedy Performer" to her singing.
