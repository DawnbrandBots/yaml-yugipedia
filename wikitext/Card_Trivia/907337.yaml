title: Card Trivia:Confiras de Nouvelles
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the demon [[wikipedia:Foras|Foras]] and the French cooking technique [[wikipedia:Confit|confit]] (to cook in oil/rendered fat at low temperatures for preservation and flavor).
  ** "Foras" is described as a president of Hell whom bears a serpent's tail, a large seal, and a sharp weapon (all of which this monster has in some fashion). He is also said to bestow enlightenment and clarity to those who communicate with him, likely represented through this monster's effect to [[Tribute]] itself and another [[Attack Position]] monster to Special Summon a Level 3 or 4 "[[Nouvelles]]" [[Ritual Monster]] from the hand or Deck (though this effect is shared with the majority of "Nouvelles" Ritual Monsters).
