title: Card Trivia:Darkness Raincrow
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster resembles the [[wikipedia:Grim Reaper|Grim Reaper]], the personification of death who is often depicted as a dark-cloaked skeleton wielding a large scythe.
  ** Fittingly, this monster also resembles the final form of its owner, [[Nightshroud]], who is depicted in the ''[[Yu-Gi-Oh! GX]]'' anime as a cloaked skeleton resembling a Grim Reaper.
  * This monster's effect is incorporated into the ''[[OCG]]''/''[[TCG]]'' release of "[[Darkness Neosphere]]", which this monster can [[Special Summon]] in the anime.
