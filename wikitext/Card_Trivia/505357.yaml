title: Card Trivia:Heart of the Underdog
wikitext: |-
  {{Navigation}}

  * The man appearing in this card's artwork also appears in the artwork of "[[Common Charity]]".
  * This card appears in the artwork of "[[Chain Material]]".
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, during the [[Grand Championship (arc)|Grand Championship]] arc (in which this card appeared), this card reminds [[Yugi Muto]] of [[Joey Wheeler]] because he is considered to be the underdog, which becomes a running gag throughout the arc.
  ** This card's Japanese name, "''Bonkotsu no Iji''", further reinforces this running gag, as in the original Japanese version of the ''Yu-Gi-Oh!'' anime, [[Seto Kaiba]] uses the word "''bonkotsu''" to insult Joey repeatedly.
  ** An interesting correlation between Joey and the Heart of the Underdog card is in episode 2 of season 1; as a novice Joey is asking Yugi for advice on how to improve at the game. Subsequently Yugi looks through Joey's deck to find nothing but monster cards in his deck. The deck of the young boy whom Yugi gives the Heart of the Underdog card to, Rick, was also seemingly filled with nothing but monster cards.
