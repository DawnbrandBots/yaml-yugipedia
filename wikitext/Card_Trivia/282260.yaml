title: 'Card Trivia:Number 28: Titanic Moth'
wikitext: |-
  {{Navigation}}

  * Like other "[[Number]]" monsters associated with [[Kyoji Yagumo]], this card is related to one of the [[wikipedia:Seven deadly sins|seven deadly sins]]; more specifically, it is related to the [[wikipedia:Envy|deadly sin of envy]].
  ** In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, this card was given to [[Haruto Tenjo (manga)|Haruto Tenjo]] by Kyoji, to be used against [[Kaito Tenjo (manga)|Kaito Tenjo]], who Kyoji was envious of because Kaito still had the relationship to his brother, while Kyoji did not, as [[Yuji Yagumo|his own brother]] was murdered. In particular, Yuji was murdered by someone envious of Kyoji's success, who impersonated Yuji in order to take advantage of Kyoji's position.
  * "Number" monsters often take a form that reflects their owners and/or their original desires. In this case, this "Number" represents its original owner, Haruto Tenjo.
  ** This monster's appearance reflects Haruto and Kaito's past, which is often represented by butterflies and associated with the fact that they used to hunt butterflies together. Fittingly, this monster was also [[Xyz Summon]]ed using two copies of "[[Primitive Butterfly]]".
  * This monster is likely based on the [[wikipedia:Mothman|Mothman]], a [[wikipedia:Cryptid|cryptid]] said to herald disasters.
  ** This monster might also be based on the ''[[wikipedia:Hyalophora cecropia|Hyalophora cecropia]]'', or the ''[[wikipedia:Attacus atlas|Attacus atlas]]'', since it shares many of their features, such as a feathery antennae and striped abdomens. Both the aforementioned moths are also known for their large size, which may be the inspiration behind this monster's name: "''Titanic'' Moth".
