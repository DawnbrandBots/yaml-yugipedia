title: Card Trivia:Dragunity Knight - Gae Bulg
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Synchro Sonic]]" and "[[Dragunity Legion]]".
  * This monster is comprised of "[[Dragunity Dux]]" riding a mature "[[Dragunity Phalanx]]".
  * This is the [[cover card]] for ''[[Hidden Arsenal 3]]'' and ''[[Duel Terminal - Dragunity of the Hurricane!!]]''.
  * This card's name is based on the spear [[wikipedia:Gáe Bulg|Gae Bulg]] used by [[wikipedia:Cú Chulainn|Cú Chulainn]] from [[wikipedia:Celtic mythology|Celtic mythology]].
