title: Card Trivia:Blackwing - Gust the Backblast
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Wind gust|wind gust]], the brief increase of wind speeds that happens in a short period of time.
  * This is one of the few "[[Blackwing]]" monsters released during the ''[[Yu-Gi-Oh! 5D's]]'' era (excluding the manga), along with "[[Blackwing - Breeze the Zephyr]]" and "[[Blackwing - Jin the Rain Shadow]]" to not be played in the anime; however, this card is played during the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
