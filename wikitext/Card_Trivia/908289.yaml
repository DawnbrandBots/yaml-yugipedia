title: Card Trivia:Horn of Olifant
wikitext: |-
  {{Navigation}}

  * "[[Infernoble Knight - Roland]]" and "[["Infernoble Arms - Durendal"]]" appear in this card's artwork.
  * The "[[wikipedia:Olifant (instrument)|olifant]]" was the name applied in the [[wikipedia:Middle Ages|Middle Ages]] to ivory hunting horns made from elephants' tusks.
  * This card's effect to destroy a "[[Roland (archetype)|Roland]]" monster the player controls, then Summoning other monsters, reflects the role of the olifant horn in ''[[wikipedia:The Song of Roland|The Song of Roland]]''; Roland blew on the horn with such intensity that he suffered a hemorrhage, but the horn's call was loud enough to alert [[wikipedia:Charlemagne|Emperor Charles]]' forces to the impending Saracen invasion and called forth reinforcements.
