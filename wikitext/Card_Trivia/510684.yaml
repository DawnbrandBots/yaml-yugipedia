title: Card Trivia:Shadow Tamer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ultra C]]".
  * This monster has a [[Dragon]] counterpart: "[[Dragon Manipulator]]".
  * Though the international artwork of this card was edited to cover her cleavage and stomach, this monster's stomach is still visible in both versions of {{episode|Yu-Gi-Oh!|145|ref}} in the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
