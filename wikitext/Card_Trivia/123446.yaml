title: Card Trivia:Familiar-Possessed - Hiita
wikitext: |-
  {{Navigation}}

  * This monster is a powered-up form of "[[Hiita the Fire Charmer]]".
  * This monster appears in the artworks of "[[Awakening of the Possessed]]", "[[Awakening of the Possessed - Greater Inari Fire]]", and "[[Possessed Partnerships]]".
  * The familiar in this card's artwork is likely meant to be "[[Inari Fire]]", with the difference in design being due to its release 7 years after this card's. However, the old design was still reused for "[[Unpossessed]]".
