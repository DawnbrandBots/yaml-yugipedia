title: Card Trivia:Paladins of Bonds and Unity
wikitext: |-
  {{Navigation}}

  * The [[Eye of Wdjat]] appears in the background of this card's artwork.
  * This monster is an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form of "[[Magicians of Bonds and Unity]]".
  ** Like its base form, this monster is themed around the number 25, referencing the 25th anniversary of the ''[[Yu-Gi-Oh!]]'' ''[[OCG]]''/''[[TCG]]''.
  ** This is the first Synchro Monster to be related to the "[[Dark Magician (archetype)|Dark Magician]]" [[archetype]].
  * This monster has a "[[Blue-Eyes White Dragon]]"-based counterpart: "[[Ultimate Dragon of Pride and Soul]]".
  ** Fittingly, this monster's effects prevent it from being [[destroy]]ed by the destruction effect of "Ultimate Dragon of Pride and Soul".
  ** "[[Dragon Master Lords]]" is the combined form of this monster and "Ultimate Dragon of Pride and Soul".
  * This monster shares similarities with "[[Dark Paladin]]".
  ** Both have the word "Paladin" in their names.
  ** Both are [[Spellcaster]] [[Extra Deck]] monsters with 2900 [[ATK]], and are related to the "Dark Magician" archetype.
  ** Both have a conditional effect that allows them to gain ATK based on the number of cards on the [[field]] and in the [[Graveyard]]s; this monster gains 100 ATK for each card on the field and in the Graveyards if the player has 25 or more cards in their Graveyard, while "Dark Paladin" gains 500 ATK for each [[Dragon]] monster on the field or in the Graveyards.
  ** Both have a [[Quick Effect]] that can [[negate]] the activation and destroy a [[Spell Card]].
