title: Card Trivia:Windwitch - Diamond Bell
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Icy Breeze Refrain]]".
  * This card is the pure [[Synchro Monster|Synchro]] [[Card evolutions|upgraded]] form of "[[Windwitch - Winter Bell]]".
  ** This card is a counterpart to the [[Fusion Parasite (anime)|corrupted]] [[Fusion Monster|Fusion]] upgrade of "Winter Bell": "[[Windwitch - Crystal Bell]]".
  *** Fittingly, this monster's pose in this card's artwork is mirrored compared to that of "Crystal Bell".
  *** Their perspectives in the artwork are also opposite: this monster is uplifting, whereas "Crystal Bell" is downfacing.
