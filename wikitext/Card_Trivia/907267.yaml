title: Card Trivia:Icejade Cradle
wikitext: |-
  {{Navigation}}

  * "[[Dogmatika Fleurdelis, the Thunderbolt]]" and "[[Icejade Tremora]]" appear in this card's artwork.
  ** [[Fleurdelis]] appears to be in the process of being purified from the power of her stigmata, after she was almost corrupted by them into a "[[Despia]]" and before becoming "[[The Iris Swordsoul]]".
