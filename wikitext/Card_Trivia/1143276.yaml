title: Card Trivia:Crossroad Sonic Chick
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Sonic Chick]]".
  ** This monster's Japanese name, "Crossroadrunner", is a portmanteau of the words "crossroad" (an intersection of two or more roads) and "Roadrunner" (the Japanese name of "Sonic Chick").
  ** This monster is depicted wearing a white scarf similar to that worn by "[[Junk Synchron]]" and "[[Junk Warrior]]", both of which "Sonic Chick" is commonly associated with in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's effect to change all monsters the opponent controls with 1900 or more [[ATK]] to [[Defense Position]] is based in the effect of "Sonic Chick", which prevents it from being [[destroyed by battle]] with a monster that has 1900 or more ATK.
