title: Card Trivia:Fissure
wikitext: |-
  {{Navigation}}

  * The arm of the monster from the artwork of "[[Trap Hole]]" appears in this card's artwork.
  * This card has a [[counterpart]]: "[[Smashing Ground]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Fissure]]".
  * This card and "Trap Hole" were the first cards to ever debut in the ''[[OCG]]'' without appearing in another medium first.
  * In the Spanish dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card's name was left untranslated.
