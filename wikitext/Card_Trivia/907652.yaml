  * This card is an [[Astral World|Astral]] [[counterpart]] of "[[Number 39: Utopia]]".
  * This monster and "[[Full Armored Crystalzero Lancer]]" are the only two monsters to have a "[[Number]]" symbol on their body, despite not being part of the "Number" archetype.
