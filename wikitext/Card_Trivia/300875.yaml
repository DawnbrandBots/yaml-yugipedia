title: Card Trivia:Cicada Illusion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Number 3: Cicada King]]" appears in this card's artwork.
  * "Utsusemi" refers to a [[wikipedia:cicada|cicada]] casting off its shell, i.e. [[wikipedia:Ecdysis|molting]], which is represented as multiple illusions of "Number 3: Cicada King" in this card's artwork.
