title: Card Trivia:Toon Alligator
wikitext: |-
  {{Navigation}}

  * This is the only "[[Toon]]" monster that is not also a [[Toon monster]].
  * This is one of four monsters used by [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]] that is treated as a Toon monster in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', the others including "[[Bickuribox (DOR)|Bickuribox]]", "[[Dark Rabbit (DOR)|Dark Rabbit]]", and "[[Parrot Dragon (DOR)|Parrot Dragon]]".
  ** Additionally, in ''Duelist of the Roses'', this monster's [[Type]] is [[List of Comic monsters|Comic]], allowing it to gain a power bonus from the [[Toon (terrain)|Toon terrain]].
  * This card's Spanish prints feature a typo, as the word "''monstruo''" ("''monster''") is misspelled as "''monsturo''".
