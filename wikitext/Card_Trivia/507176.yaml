  * This monster is a combination of [[wikipedia:Anubis|Anubis]] (the Ancient Egyptian deity of the dead who is depicted with the head of a jackal) and the [[wikipedia:Sphinx|Sphinx]].
  * According to the now-defunct Metagame.com, only two official copies of this card were printed.<ref>{{cite web | url = http://kperovic.com/metagame/yugioha9df.html?tabid=61&EventId=5 | archive-url = https://web.archive.org/web/20121105040507/http://kperovic.com/metagame/yugioha9df.html?tabid=61&EventId=5 | title = Metagame.com - Take Your Game to the Next Level | website = Metagame.com | date = July 29, 2004 | archive-date = November 5, 2012 | accessdate = May 20, 2024}}</ref>

