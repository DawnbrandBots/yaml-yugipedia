title: Card Trivia:Power Capsule Blue
wikitext: |-
  {{Navigation}}

  * This card is based on the Blue Power Capsule, a power-up item from the ''[[wikipedia:Gradius (video game)|Gradius]]'' video game series.
  ** In the ''Gradius'' series, the Blue Power Capsule automatically destroys all minor enemies onscreen when picked up and damages larger enemies and stations, which is reflected in this card's effect to [[destroy]] up to three of the opponent's monsters whose total [[Level]]s are 8 or lower.
