title: Card Trivia:Blackwing - Chinook the Snow Blast
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Chinook wind|Chinook winds]], two different types of prevailing warm, generally westerly winds in western North America, which are warm enough to evaporate falling snow before it has a chance to melt.
  ** Fittingly, this card's artwork depicts a fiery whirlwind and snowflakes, both of which reflect the aforementioned facts.
  * This is one of the few "[[Blackwing]]" monsters that does not feature any black feathers in its design, along with "[[Blackwing - Breeze the Zephyr]]" and "[[Blackwing - Gale the Whirlwind]]".
