title: Card Trivia:Tuning Magician
wikitext: |-
  {{Navigation}}

  * This monster has a [[retrained]] [[Pendulum Monster|Pendulum]] counterpart: "[[Harmonizing Magician]]".
  * This is the first "[[Magician]]" monster introduced in the ''[[Yu-Gi-Oh! ARC-V]]'' anime to not be a Pendulum Monster.
  ** However, in {{episode|ARC-V|001|ref}}, before [[Yuya Sakaki]]'s "[[Timegazer Magician (anime)|Timegazer Magician]]" and "[[Stargazer Magician (anime)|Stargazer Magician]]" were originally regular [[Effect Monster]]s before his [[Yuya's pendant|pendant]] transformed them into Pendulum Monsters.
  * This monster's staff is a combination of a [[wikipedia:Tuning fork|tuning fork]] and a [[wikipedia:Mallet percussion|mallet]], reflecting its name and status as a [[Tuner monster]].
  ** The tuning fork and mallets are also similar to those wielded by the members of the "[[Resonator]]" [[archetype]], which this monster's original owner, [[Jack Atlas (ARC-V)|Jack Atlas]], uses in the ''Yu-Gi-Oh! ARC-V'' anime.
  * This monster's outfit is similar to the initial design and color scheme of the [[Psychic]] [[Type]] monsters. 
  ** Fittingly, this monster debuted in the [[Friendship Cup (arc)|Friendship Cup]] arc of the ''Yu-Gi-Oh! ARC-V'' anime, which takes place in the [[Synchro Dimension]], which features multiple references to the ''[[Yu-Gi-Oh! 5D's]]'' era when the Psychic Type was first introduced.
