title: Card Trivia:Training Wheels
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Cycroid]]" appears in this card's artwork.
  ** Fittingly, this card is referenced in the [[flavor text]] of "Cycroid": ''"It can arm itself with training wheels!"''
  * This card is based on [[wikipedia:Training wheels|training wheels]], an extra pair of wheels attacked to the rear axel of a bicycle used for beginners to ride a [[wikipedia:Bicycle|bicycle]], which reflects how this card can only be [[equip]]ped to "Cycroid".
