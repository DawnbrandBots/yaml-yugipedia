title: Card Trivia:Sleepy Beauty
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Diva Adriana]]" appears in this card's artwork.
  * This monster's name is a pun on ''[[wikipedia:Sleeping Beauty|Sleeping Beauty]]'', a fairy tale about a princess who is cursed by an evil fairy to sleep for a hundred years before being awakened by a handsome prince.
