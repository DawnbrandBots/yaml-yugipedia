title: Card Trivia:Toon Harpie Lady
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2020]]''.
  * This monster is the [[Toon monster|Toon]] counterpart of "[[Harpie Lady]]"; however, her appearance is based on "[[Harpie Lady 1]]".
  ** This monster's effect to [[destroy]] a [[Spell]]/[[Trap Card]] when Summoned is based on the effect of "[[Harpie's Hunting Ground]]".
