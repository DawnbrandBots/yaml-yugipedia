title: Card Trivia:Cosmic Sucker
wikitext: |-
  {{Navigation}}

  * This card's effect to gain 300 LP and then be able to gain 3000 LP if the total original Levels of the face-up monsters on your opponent's field is 30 or higher is based on its [[Cosmic Sucker (anime)|effect]] in {{episode|GO RUSH!!|151|ref}}, where [[Yudias Velgear]] used it to gain 3300 LP thanks to the three copies of "[[Majesty of OuTerverSe]]" in [[Otes]]' field, where each one is a Level 11 Ritual Monster.
