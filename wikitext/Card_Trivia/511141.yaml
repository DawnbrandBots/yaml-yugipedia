title: Card Trivia:Axe Raider
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster Chronicle]]''.
  * This monster appears in the artworks of "[[Incoming Machine!]]", "[[Crossline Counter]]", "[[Flat Lv 4]]", and "[[Summoning Clock]]".
  * This monster has an upgraded ''[[Rush Duel]]'' counterpart: "[[Max Raider]]".
  * The [[Axe Raider (Bandai)|Bandai version]] of this card is [[Level]] 6 and has 2300 [[ATK]] & 1500 [[DEF]], whereas the [[Axe Raider|Konami version]] of this card is [[Level]] 4 and has 1700 [[ATK]] & 1150 [[DEF]]. Moreover, the Bandai version has less color.
  * This card's Bandai artwork is taken directly from {{chapter|Yu-Gi-Oh!|093|ref}}, specifically from the panel showing [[Axe Raider (manga)|this monster]] being Summoned, albeit with minor changes in detailing.
