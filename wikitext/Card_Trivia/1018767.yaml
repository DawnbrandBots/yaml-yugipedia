title: Card Trivia:Shield in the Right Hand
wikitext: |-
  {{Navigation}}

  * This monster is based on the shield appearing in the artworks of "[[Shield & Sword (Rush Duel)|Shield & Sword]]" and "[[Sword & Shield]]".
  ** This monster's name is based on the first portion of the Japanese name of "Shield & Sword": "Shield in the Right Hand, Sword in the Left Hand".

  == See also ==
  * [[List of monsters that appeared in another card's artwork before their own debut]]
