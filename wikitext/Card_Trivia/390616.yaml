title: Card Trivia:Hot Red Dragon Archfiend Abyss
wikitext: |-
  {{Navigation}}

  * This card is an [[Card evolutions|upgraded]] form of "[[Hot Red Dragon Archfiend]]".
  ** This card is based on the [[wikipedia:Abyss (religion)|Abyss]], a region of Hell that is often perceived as a bottomless pit in religious mythology.
  ** The names of "Hot Red Dragon Archfiend's" evolutions are spelled in a consecutive alphabetic order, to symbolize the monster's growth: first there is this card, "'''A'''byss", then "[[Hot Red Dragon Archfiend Bane|'''B'''ane]]", and finally "[[Hot Red Dragon Archfiend King Calamity|King '''C'''alamity]]", which further underlines these cards' status as consecutive evolution steps.
  * This card is the first evolved form of "Hot Red Dragon Archfiend" to appear in the [[Yu-Gi-Oh! 5D's (manga)|manga]].
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! 5D's - Ride SP2|ref}}, specifically from the panel showing [[Red Dragon Archfiend Abyss|this monster]] being Summoned.
