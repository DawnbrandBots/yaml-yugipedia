title: Card Trivia:Light Wing Bumper
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name in both English and Japanese refers to the [[attack name|name]] of the attack negation effect of "[[Number 39: Utopia]]" in the anime, "Light Wing Shield" ("Moon Barrier" in Japan).
  ** Fittingly, this card's artwork depicts "Utopia" attempting to activate its effect.
