title: Card Trivia:Card Defender
wikitext: |-
  {{Navigation}}

  * This monster shares the same [[Attribute]] ([[EARTH]]), [[Level]] (3), and [[Type]] ([[Warrior]]), visual design, and naming scheme with "[[Armor Breaker]]", "[[Card Blocker]]", and "[[Spell Striker]]", a trio of chibi-like monsters used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Jaden Yuki uses the "[[Elemental HERO]]" [[archetype]], while this monster's effect supports its ''[[Rush Duel]]'' [[Elemental HERO (Rush Duel)|counterpart]], both of which primarily consists of Warrior [[Normal Monster]]s and [[Fusion Monster]]s.
