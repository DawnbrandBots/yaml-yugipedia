title: Card Trivia:Dark Contact
wikitext: |-
  {{Navigation}}

  [[File:Supreme King Mirrors.png|thumb|The Supreme King talks to Jaden from within his mind.]]
  * "[[Elemental HERO Neos]]" appears in this card's artwork.
  ** The blue swirling patterns and the electrical bursts in the background of this card's artwork are based on those from the artwork of "[[Super Polymerization]]".
  ** The mirrors in the background of this card's artwork reference [[Jaden Yuki]]'s mental state under the influence of [[The Supreme King]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** Due to this, this card's artwork likely depicts "Elemental HERO Neos" [[Card evolutions|transforming]] into "[[Evil HERO Neos Lord]]".
  * This card shares similarities with "[[Dark Calling]]" and "[[Miracle Contact]]".
  ** This card's name is a combination of both the aforementioned cards' names.
  ** Like "Dark Calling", this card's first effect can [[Fusion Summon]] a monster that must be [[Special Summon]]ed with "[[Dark Fusion]]", treating the Summon as a Fusion Summon with "Dark Fusion".
  ** Like "Miracle Contact", this card's artwork depicts "Elemental HERO Neos", and its first effect Special Summons a [[Fusion Monster]] by shuffling its [[Fusion Material]]s into the [[Deck]].
