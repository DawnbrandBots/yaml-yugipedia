title: Card Trivia:Galaxy Satellite Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from [[wikipedia:Satellite galaxy|satellite galaxies]], a smaller companion galaxy that orbits a more massive and luminous host galaxy.
  * This monster is a [[Card evolutions|downgraded]] [[Link Monster|Link]] form of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]".
  ** This monster's effect to place a card on top of the player's [[Deck]] references the [[Chaos Draw]] ability, which allowed the [[Seven Barian Emperors]] to [[draw]] "[[Rank-Up-Magic - The Seventh One (anime)|Rank-Up-Magic - The Seventh One]]" during a [[Duel]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster is the rival counterpart of "[[Galaxy-Eyes Solflare Dragon]]".
  ** Both monsters are [[Link Rating|Link]]-2 Link Monsters with 2000 [[ATK]].
  ** Both monsters have the same [[Link Arrow]]s ([[Bottom-Left]] and [[Bottom-Right]]).
  ** This monster is a downgraded form of "Number 107: Galaxy-Eyes Tachyon Dragon", while "Galaxy-Eyes Solflare Dragon" is a downgraded form of "[[Galaxy-Eyes Photon Dragon]]".
