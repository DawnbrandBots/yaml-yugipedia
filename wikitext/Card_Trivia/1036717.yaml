title: Card Trivia:Gravekeeper's Headman
wikitext: |-
  {{Navigation}}

  * Like several "[[Gravekeeper's]]" monsters released from the ''[[Yu-Gi-Oh! 5D's]]'' era onwards, this monster's design is based on a character from the original ''Yu-Gi-Oh!'' manga and anime. In this monster's case, it resembles [[Shadi]].
