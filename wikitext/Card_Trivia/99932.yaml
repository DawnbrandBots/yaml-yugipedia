title: Card Trivia:Supremacy Berry
wikitext: |-
  {{Navigation}}

  * This card's artwork is based on the biblical story, [[wikipedia:Noah's Ark|Noah's Ark]]. 10 months after the flood began, Noah sent out a raven and then a dove to find land. The dove returned with a fresh olive leaf (or, in some versions, an olive branch) in her beak.
  * It may also reference C.S. Lewis' story, [[wikipedia:The Voyage of the Dawn Treader|The Voyage of the Dawn Treader]], where a "retired" star (taking the appearance of an old man) regains some of his youth every morning by eating a "fire-berry" brought to him in the beak of a large white bird.
