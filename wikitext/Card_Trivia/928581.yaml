title: Card Trivia:Vanquish Soul Pantera
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Stake your Soul!]]".
  * This monster resembles the "rushdown" character archetype in [[wikipedia: Fighting game|fighting games]] (e.g. [[wikipedia:Felicia_(Darkstalkers)|Felicia]] from "[[wikipedia:Darkstalkers|Darkstalkers]]", [[wikipedia:Cammy (Street Fighter)|Cammy]] from "[[wikipedia:Street Fighter|Street Fighter]]", [[wikipedia:Mai Shiranui|Mai Shiranui]] from "[[wikipedia:Fatal Fury|Fatal Fury]]" and "[[wikipedia:The King of Fighters|King of Fighters]]", etc.). Gameplay-wise, these characters have fast and aggressive attack patterns and movesets intended to easily move in on the opponent with a difficult-to-escape onslaught. The speed and nature of their attacks can be used to bait the opponent into making punishable mistakes (also known as "poking" within the community), therefore enabling the aforementioned offense.
  ** This basis can be seen in its [[Special Summons itself from your hand|Summoning effect]] viable while its owner's [[Main Monster Zone|Main Monster Zones]] are empty reflecting the speedy nature of such characters, as well as both halves of its effect which [[reveal]] a monster(s) as [[cost]] reflecting the aforementioned abilities to [[Cannot be destroyed by battle|get in on the opponent]] before they are able to [[Destroys Spell Cards|properly]] [[Destroys Trap Cards|respond]] to such actions.
