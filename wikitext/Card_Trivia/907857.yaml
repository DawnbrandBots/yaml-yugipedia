title: Card Trivia:Stars Align across the Milky Way
wikitext: |-
  {{Navigation}}

  * "[[Shinobaron Peacock]]", "[[Shinobaroness Peacock]]", and "[[Shinobird Token]]" appear in this card's artwork.
  ** Appropriately for this card's effect, the two [[Ritual Monster]]s shown have the same [[Level]].
  * This card is a reference to the meeting of ''Orihime'' and ''Hikoboshi'' during the ''[[wikipedia:Tanabata|Tanabata]]'' festival.
