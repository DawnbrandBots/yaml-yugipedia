title: Card Trivia:Chronomaly Esperanza Glyph
wikitext: |-
  {{Navigation}}

  * "[[Chronomaly Golden Jet]]" and "[[Chronomaly Moai]]" appear in this card's artwork.
  ** Ironically, both monsters cannot be used with this card's effect, as they are [[Level 4]] and [[Level 5]] monsters, respectively.
  * This card is based on the [[wikipedia:Esperanza Stone|Esperanza Stone]], a large inscribed stone found in the valley of the Yaqui, Mexico.
