title: Card Trivia:Fire Formation - Tenken
wikitext: |-
  {{Navigation}}

  * This card is named for ''[[wikipedia:Delta Ursae Majoris|Delta Ursae Majoris]]''.
  * "[[Brotherhood of the Fire Fist - Swallow]]" and "[[Brotherhood of the Fire Fist - Coyote|Coyote]]" appear in this card's artwork.
  ** Interestingly, the latter monster was not released or spoiled at the time of this card's release.
  * Like other "[[Fire Formation]]" cards, this card's effect is a variant on an existing [[Spell]] or [[Trap Card]] (or in this case, two cards): "[[Forbidden Chalice]]" and "[[Forbidden Lance]]".
