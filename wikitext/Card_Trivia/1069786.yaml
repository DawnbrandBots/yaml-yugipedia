title: Card Trivia:Maiden of White
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Advent of the Eyes of Blue]]''/''[[Structure Deck: Blue-Eyes White Destiny]]'' and ''[[Structure Deck: Advent of the Eyes of Blue Legendary Majesty Inheritance Pack]]''.
  * "[[Dragon Shrine]]" appears in the background of this card's artwork.
  * This monster is a retrained [[counterpart]] of "[[Maiden with Eyes of Blue]]".
  ** Like "Maiden with Eyes of Blue", this monster is based on [[Kisara]], who carries the ''[[ka]]'' of [[Blue-Eyes White Dragon (character)|Blue-Eyes White Dragon]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** The dragon designs on this monster's dress resemble "[[Blue-Eyes Spirit Dragon]]", while the dragon designs on the dress of "Maiden with Eyes of Blue" resemble "[[Blue-Eyes White Dragon]]".
  ** This monster's effect to place "[[True Light]]" from the player's [[hand]], [[Deck]], or [[Graveyard]] [[face-up]] in the [[Spell & Trap Zone]] further references how Kisara carries the spirit of Blue-Eyes White Dragon, which was eventually sealed away in a stone tablet in [[Priest Seto]]'s possession, allowing him to Summon it on his command.
