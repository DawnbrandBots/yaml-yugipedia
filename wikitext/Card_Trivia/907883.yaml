title: Card Trivia:Penguin Brave
wikitext: |-
  {{Navigation}}

  [[File:PenguinBrave-ConceptArt.png|thumb|right|250|This monster's concept art.]]

  * "[[Penguin Cleric]]", "[[Penguin Ninja]]", and "[[Penguin Squire]]" appear in this card's artwork.
  ** This card marks the first appearance of the aforementioned "[[Penguin]]" monsters nearly 11 months in the Japanese ''[[OCG]]'' before its release in ''[[Burst of Destiny]]''.
  * According to this card's concept art, each penguin depicted is based on a different species of penguin.
  ** Martial artist: [[wikipedia:Rockhopper penguin|rockhopper penguin]]
  ** Ninja: [[wikipedia:African penguin|cape penguin]]
  ** Hero: [[wikipedia:Macaroni penguin|macaroni penguin]]
  ** Cleric: [[wikipedia:Gentoo penguin|gentoo penguin]]
  ** Spellcaster: [[wikipedia:Emperor penguin|emperor penguin]]
  ** The penguins that appear in this card's artwork seem to be based on the classes/jobs from the ''[[wikipedia:Dragon Quest|Dragon Quest]]'' video games.
  * This card's Spanish name was mistranslated as "Bravo Pingüino" ("Bravo Penguin"); a more fitting name could have been "Pingüino Valiente".

