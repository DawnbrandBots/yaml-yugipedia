title: Card Trivia:Infernity Doom Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Infernity Barrier]]".
  * This monster is the counterpart to "[[Hundred Eyes Dragon]]" and the  [[Yu-Gi-Oh! 5D's|anime]] counterpart to "[[Void Ogre Dragon]]".
  ** All three monsters are [[Kalin Kessler]]'s [[signature card]]s in their various continuities.
  ** All three monsters require a [[DARK]] [[Tuner monster]], feature demonic motifs, and share an [[original ATK]] of 3000.
  * There appears to be a portion of this monster's brain revealed in between the various prongs that circulate its head (the small pink matter cluster visible directly above its eyes).
  ** As revealed in the art of "[[Infernity Barrier]]", this monster actually has a perfectly round ridge of "horns", with the brain placed perfectly in the middle - this may imply that the "horns" of this monster are, in fact, sections of its skull that are opened up, surrounding the brain.
  * This monster somewhat breaks the theme of many "[[Infernity]]" monsters taking after classical American [[wikipedia:Western (genre)|Western themes]] - [[wikipedia:cowboy|cowboys]], [[wikipedia:Native Americans in the United States|Native Americans]] and the like, though some also resemble European knights and demons - but still fits in by way of resembling a daemonic, somewhat twisted interpretation of a usual concept (in this case a dragon), much like the other "Infernity" monsters appear to be twisted, demonic versions of [[wikipedia:Spaghetti Western|Spaghetti Western]] stereotypes.
  ** In fact, this monster is easily one of the most abstract looking dragons in the game, resembling, in equal measures, a classical dragon, an insect, some type of horned biped, and a [[wikipedia:Alien (creature in Alien franchise)|Xenomorph]] from the ''[[wikipedia:Alien (franchise)|Alien]]'' series.
