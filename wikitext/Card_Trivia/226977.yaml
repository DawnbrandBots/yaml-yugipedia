title: Card Trivia:Torrential Reborn
wikitext: |-
  {{Navigation}}

  * "[[Atlantean Attack Squad]]" or "[[Atlantean Pikeman]]" appears in this card's artwork.
  * This card's name is a combination of those of "[[Torrential Tribute]]" and "[[Monster Reborn]]".
  ** Fittingly, this card's effect [[Special Summon]]s a monster from the [[Graveyard]] like "Monster Reborn", but only when said monster is [[destroy]]ed by a card's effect, thus it can be [[trigger]]ed by "Torrential Tribute".
