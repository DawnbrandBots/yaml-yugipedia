title: Card Trivia:Bending Destiny
wikitext: |-
  {{Navigation}}

  * This card's artwork is similar to the artwork of "[[Divination of Fate]]".
  ** Fittingly, both cards are used by different antagonistic characters who use fortune-telling [[Deck]]s in the anime. This card is used by [[Carly Carmine]], who uses the "[[Fortune Lady]]" [[Deck]] in ''[[Yu-Gi-Oh! 5D's]]'', while "Divination of Fate" is used by [[Sartorius]], who uses the "[[Arcana Force]]" Deck in ''[[Yu-Gi-Oh! GX]]''.
