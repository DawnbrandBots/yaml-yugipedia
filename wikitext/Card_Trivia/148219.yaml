title: Card Trivia:Amazoness Willpower
wikitext: |-
  {{Navigation}}

  * "[[Amazoness Paladin]]" appears in this card's artwork.
  * This card's effect is the "[[Amazoness]]" version of "[[Call of the Haunted]]".
  * This card's artwork is similar to that of "[[The Warrior Returning Alive]]". Both monsters in the artworks are doing similar stances and both are battle-scarred.
