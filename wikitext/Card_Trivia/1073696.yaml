title: Card Trivia:Fake Hero
wikitext: |-
  {{Navigation}}

  * "[[Fake Neos]]" is the character that appears in this card's artwork (albeit in costume).
  ** The artwork also depicts the helmet, gloves, and scarf (on the table), the bodysuit and cape (on the wall hanger), and the boots (on the floor below the wall hanger) from the costume that "Fake Neos" wears.
