title: Card Trivia:Spirit with Eyes of Blue
wikitext: |-
  {{Navigation}}

  * This monster is the statue of "[[Blue-Eyes White Dragon]]" that appears in the artwork of "[[Mausoleum of White]]" animated by unknown means.
  ** This monster's appearance is based on that of "Blue-Eyes White Dragon" in its 7th ''[[OCG]]'' artwork, drawn by [[Kazuki Takahashi]].
  ** The floating energy orbs that appear in the artwork of "Mausoleum of White" also appear in this card's artwork.
  * This monster has one-tenth of the [[original ATK]] of "Blue-Eyes White Dragon", similar to "[[The White Stone of Legend]]".
  * This is the first [[Extra Deck]] [[with Eyes of Blue]] monster.
