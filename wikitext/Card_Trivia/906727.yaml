title: Card Trivia:Ignis Phoenix, the Dracoslayer
wikitext: |-
  {{Navigation}}

  * This monster has a "[[True Draco]]" form: "[[Ignis Heat, the True Dracowarrior]]".
  * The "Phoenix" in this monster's name is taken from "[[Ignition Phoenix]]".
  * The crest on this monster's chest is the same symbol as the crown on "[[Mariamne, the True Dracophoenix]]".
