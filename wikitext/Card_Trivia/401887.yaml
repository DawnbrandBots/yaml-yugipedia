title: Card Trivia:Lector Pendulum, the Dracoverlord
wikitext: |-
  {{Navigation}}

  * This monster is the upgraded version of "[[Vector Pendulum, the Dracoverlord]]".
  ** This card has a higher [[ATK]] and [[Pendulum Scale]] than "Vector", but features the same [[Attribute]] ([[DARK]]), [[Level]] (4), [[Type]] ([[Dragon]]) and [[DEF]] (0).
  ** "Vector" is depicted folding its wings to form a robe and hide its armor underneath.
  * This monster is the DARK counterpart of "[[Master Pendulum, the Dracoslayer]]".
  ** Both cards are [[Pendulum Monster]]s who share the same Level (4), Type (Dragon), and [[original ATK and DEF]] (1950/0).
