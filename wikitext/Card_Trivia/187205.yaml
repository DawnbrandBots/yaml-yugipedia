title: Card Trivia:Antikythira Gear
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on the [[wikipedia:Antikythera mechanism|Antikythera mechanism]], an ancient machine discovered in the [[wikipedia:Greece|Greek]] island of [[wikipedia:Antikythea|Antikythera]], which could be used to calculate the positions of astronomical objects and eclipses decades in advance.
