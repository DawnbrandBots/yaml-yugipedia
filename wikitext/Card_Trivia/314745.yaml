title: Card Trivia:Sylvan Hermitree
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mount Sylvania]]", "[[Sylvan Lotuswain]]", and "[[Sylvan Mikorange]]".
  * This card's name, "Hermitree", is a portmanteau of "Hermit" and "Tree".
  * This monster is based on the ''[[wikipedia:Delonix regia|Delonix regia]]'' tree.
  ** This monster also seems to be based on a ''[[wikipedia:Yorishiro|Yorishiro]]'', as there is a ''[[wikipedia:Shimenawa|shimenawa]]'' decorated with ''[[wikipedia:Shide (Shinto)|shide]]'' surrounding its wrist.
