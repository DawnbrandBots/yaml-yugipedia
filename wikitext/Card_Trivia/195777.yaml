title: Card Trivia:Amores of Prophecy
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Lovers (Tarot card)|The Lovers]], the sixth of the [[wikipedia:Major Arcana|Major Arcana]].
  ** This card's Japanese name comes from the French word for love, ''l'amour'' and the French name for "The Lovers" tarot card, ''"L'Amoureux."''
  ** This card's English name comes from the plural form of the Spanish word for love, ''amores''.
  * This monster's bow appears in the artwork of "[[World of Prophecy]]".
