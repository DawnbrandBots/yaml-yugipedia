title: Card Trivia:Gagagaguard
wikitext: |-
  {{Navigation}}

  * "[[Gagaga Magician]]" and "[[Gagaga Girl]]" appear in this card's artwork, posed in a manner similar to delinquents or thugs as often depicted in Japanese media.
  * The character 我 (which can mean "me", "myself" or "I") can be seen in this card's artwork.
