title: Card Trivia:Reporter Raccoon
wikitext: |-
  {{Navigation}}

  * This monster's "furry" form appears in the artwork of "[[Hot Off the Press]]", while its human form appears in those of "[[Extra! Extra! Hot Off the Press]]", "[[Happy Journal]]", "[[Premium Printing Presser]]", "[[Reporter Wars Scoopies]]", and "[[Soul of a Reporter]]".
  * This monster is based on a ''[[wikipedia:Bake-danuki|bake-danuki]]'', a mythical [[wikipedia:Japanese raccoon dog|Japanese raccoon dog]] (a.k.a. tanuki) ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore capable of using shape-shifting powers, including transforming into human form, similar to how this monster has two forms.
  ** This monster's Japanese name, "Mike-tan", is a wordplay on the shortened form of "microphone" ("mike") and the Japanese honorific ''-tan'' (an affectionate variant of the Japanese honorific ''-chan''). The latter, in turn, is a play on tanuki.

