title: Card Trivia:Elepsychic Amp Up
wikitext: |-
  {{Navigation}}

  * The first portion of this card's name is a portmanteau of the words "electric (guitar)" and "[[psychic]]".
  ** The second portion of this card's Japanese name, "Ampoule", is a pun on the words "[[wikipedia:Guitar amplifier|guitar amplifier (amp)]]" and "[[wikipedia:ampoule|ampoule]]".
  *** An ampoule is a sealed glass capsule containing liquid, usually medicine, prepared for injection; this and the above-mentioned fact reflect this card's effect to gain [[Life Point]]s equal to the player's low-[[Level]] Psychic [[Normal Monster]]s' combined [[ATK]], where the [[Type]] is centered around the rock and roll genre in ''[[Yu-Gi-Oh! Rush Duel]]''.
