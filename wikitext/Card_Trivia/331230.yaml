title: Card Trivia:Ant Barrier
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Blue Duston]]", "[[Red Duston]]" and "[[Yellow Duston]]" appear in this card's artwork.
  * This card's Japanese name (アリバリア ''Aribaria'') is a [[wikipedia:Palindrome|palindrome]], as it reads the same forwards and backwards.
  ** This card's name is also a pun on its artwork, which depicts a colony of ants creating a protective barrier around the anthill to prevent the attacks from the aforementioned "[[Duston]]" monsters.
