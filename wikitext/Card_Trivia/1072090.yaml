title: Card Trivia:Battlewasp - Rapier the Onslaught
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Battlewasp Wind]]".
  * This monster is named after the [[wikipedia:Rapier|rapier]], a type of one-handed sword known for its straight and slender two-edged long blade with a curved knuckle guard on the hilt. Fittingly, this monster's stinger is designed to resemble the rapier, which includes the curved knuckle guard.
