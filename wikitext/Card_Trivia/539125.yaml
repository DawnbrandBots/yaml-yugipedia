title: Card Trivia:Dragonic Knight
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Limited Edition 9: Ultimate Seven Pack]]''.
  * This monster appears in the artworks of "[[Damage Rebound]]" and "[[Dragons Unite]]".
  * Visually, this monster is an upgraded version of "[[Armed Dragon, the Armored Dragon]]".
  ** In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this monster is the combined form of "Armed Dragon, the Armored Dragon" and "[[Dragonic Warrior]]" via the effect of "[[Dragon Unit Ritual]]".
  * This monster has a combined form with "Armed Dragon, the Armored Dragon": "[[Knight Armed Dragon, the Armored Knight Dragon]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|002|ref}}, specifically from the panel showing [[Dragonic Knight (manga)|this monster]] being Summoned.
