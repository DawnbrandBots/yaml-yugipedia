title: Card Trivia:Cyber Jormungardr
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Jörmungandr|Jörmungandr]], the sea serpent child of [[wikipedia:Loki|Loki]] and [[wikipedia:Angrboða|Angrboða]] in [[wikipedia:Norse mythology|Norse mythology]] who is commonly depicted wrapped around the Earth and holding its tail in its mouth.
  * This monster is a "[[Cyber Dragon (archetype)|Cyber Dragon]]" monster enhanced with "[[Cyberdark]]" technology.
  ** This monster references the "Cyberdark" [[archetype]] in terms of design and effect, featuring the monster-ensnaring cables used by the "Cyberdark" monsters and being able to [[equip]] "[[Cyber Dragon]]" to itself upon Summon.
  ** This monster has the same [[ATK]] (1000) as "[[Cyberdark Dragon]]" and the same [[DEF]] (2100) as both "[[Cyberdark Chimera]]" and "[[Cyberdark Wurm]]', which are other [[counterpart]]s of "Cyberdark Dragon" and "Cyber Dragon" respectively.
