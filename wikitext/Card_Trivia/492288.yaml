title: Card Trivia:Recall
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]", "[[Pot of Duality]]", and "[[Pot of Desires]]" appear in this card's artwork.
  ** The events depicted in this card's artwork take place after the event in the artwork of "[[Single Purchase]]": "Goblin of Greed" is attempting to get a refund for his "Pot of Duality" from the same seller he purchased it from, presumably unhappy about the 'defective' product (as seen by the damaged handle of "Pot of Duality"); the sales goblin is offering him a "Pot of Desires" as compensation.
  ** This card is named after a [[wikipedia:Product recall|product recall]], which is meant to prevent broken or defective products (like the depicted "Pot of Duality") from being sold.
  * This card has a [[Spell]]/[[Trap]]-negating [[counterpart]]: "[[Dark Bribe]]".
