title: Card Trivia:Dragunity Primus Pilus
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Primus Pilus|Primus Pilus]], the senior centurion of a Roman legion, as reflected by its attire.
  * Silhouettes of "[[Dragunity Brandistock]]", and "[[Dragunity Javelin]]" can be seen in the background of this card's artwork.
  * According to DT Master Guide, this card appears to be riding an evolved form of [[Dragunity Javelin|Dragunity Javelin]] to make [[Dragunity Knight - Trident]]
