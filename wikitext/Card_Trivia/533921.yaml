title: Card Trivia:Gouki Poison Mist
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Gouki Twistcobra]]" appears in this card's artwork.
  * This card is a reference to the [[wikipedia:Professional wrestling strikes#Asian mist|Asian mist]], an illegal maneuver in professional wrestling involving spitting a colored liquid in the opponent's face.
  ** This card's name and artwork also reference the [[wikipedia:Spitting cobra|spitting cobra]], which consists of several species of [[wikipedia:Cobra|cobra]] who can defensively shoot venom from their fangs.
