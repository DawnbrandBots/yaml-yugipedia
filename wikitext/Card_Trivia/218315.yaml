title: Card Trivia:Charioteer of Prophecy
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Chariot (Tarot card)|The Chariot]], the seventh of the [[wikipedia:Major Arcana|Major Arcana]].
  ** This card's Japanese name is based on the French pronunciation of the word chariot, which is pronounced ''"shario."''
  * This monster's sword appears in the artwork of "[[World of Prophecy]]".
  * Despite the name, the horse in this card's artwork doesn't pull any chariot.
