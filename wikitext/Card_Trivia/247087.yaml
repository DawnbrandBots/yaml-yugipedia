title: 'Card Trivia:Number 63: Shamoji Soldier'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s for ''[[Collectors Pack: ZEXAL Version]]''/''[[Number Hunters]]''.
  * A ''[[wikipedia:Shamoji|shamoji]]'' is a large flat spoon, typically used in Japanese cuisine to stir and serve rice.
  ** The "o" appended to ''shamoji'' in this card's Japanese name serves to denote a sense of respect and honor.
  ** This monster is possibly a ''[[wikipedia:Tsukumogami|tsukumogami]]'' of a ''shamoji'', as indicated by the spoon being used as its head, as well as its lower body resembling a bowl of rice and the monster wielding a pair of [[wikipedia:Chopsticks|chopsticks]].
  *** These details reflect its [[Number 63's holder|owner]]'s occupation as a restaurant owner, as it was molded from his desire for his restaurant to be popular, ever since opening the restaurant 20 years ago.
