title: Card Trivia:Counterattack Beacon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Blade Knight]]", "[[Marauding Captain]]" and "[[Terrorking Archfiend]]" appear in this card's artwork.
  ** This card's artwork is a continuation of the events depicted in the artwork of "[[Battle-Scarred]]", in which "Blade Knight" held "Marauding Captain" after he was injured by "Terrorking Archfiend".
