title: Card Trivia:Jacuzzi Bath
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Vacuum Fairy Lily]]" appears in this card's artwork.
  * The katakana in the first portion of this card's Japanese name (ジャグチー ''jaguchī'') is a corruption of the word for "jacuzzi" (ジャグジー ''jagujī''), with the former being a pun on "faucet" (蛇口 ''jaguchi'').
