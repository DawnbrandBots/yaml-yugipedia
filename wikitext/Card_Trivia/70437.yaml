title: Card Trivia:Gigaplant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Nature's Invasion]] and "[[Tyrant Farm]]" (albeit a very young version of this monster).
  * This monster bears a resemblance to [[/index.php?title=W:c:godzilla:Biollante&action=edit&redlink=1|Biollante]], an enemy of [[wikipedia:Godzilla|Godzilla]].
  * This card has two [[Gemini monster]] [[counterpart]]s, "[[Doom Shaman]]" and "[[Il Blud]]". However, its [[Card effect|effect]] is far superior to either, as the monsters it summons are not [[destroy]]ed when this card is removed from the field, and it affects two monster Type instead of one. It can also summon another copy of itself (something "Doom Shaman" cannot do) and has a respectable [[ATK]] for a [[Level]] 6 monster ("Il Blud" only has 2100, somewhat sub-par for a monster of its Level). It is inferior to its counterparts in one regard, though; it can only [[Special Summon]] monsters from its controller's [[Graveyard]], whereas "Doom Shaman" and "Il Blud" can Special Summon monsters from either player's Graveyard.
  * This card and "[[Amazon of the Seas]]" appeared in a ''MAD'' cartoon sketch, "Yu-Gi-Bear!"
