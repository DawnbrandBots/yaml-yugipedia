title: Card Trivia:Infernoid Decatron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Void Imagination]]" and "[[Ritual Beast Return]]".
  * This card's name is derived from the [[wikipedia:Dekatron|Dekatron]].
  * This monster is the severed head of "[[Infernoid Devyaty]]" equipped with the colored canisters from other "[[Infernoid]]" Main Deck monsters.
  ** In counterclockwise order from the top, the canisters attached are "[[Infernoid Pirmais]]" (white), "[[Infernoid Antra]]" (gray, immediately next to "Pirmais'" canister), "[[Infernoid Piaty]]" (red), "[[Infernoid Seitsemas]]" (green), "Devyaty" (purple, on chin), "[[Infernoid Attondel]]" (orange), "[[Infernoid Sjette]]" (yellow), "[[Infernoid Onuncu]]" (multicolored), "[[Infernoid Patrulea]]" (blue, barely visible), and "[[Infernoid Harmadik]]" (black, immediately next to "Patrulea's" canister).
  * A humanoid figure can be seen trapped in the green canister of this monster, which, according to the ''[[Master Guide 5 card storylines]]'', is '[[Gem-Knight Lapis]]", whose life energy has been converted into the [[qli]]phot system.
  * This is the first "Infernoid" monster whose number of canisters doesn't correspond to its [[Level]].
  * This is the first and only "Infernoid" monster that can be [[Normal Summon]]ed.
