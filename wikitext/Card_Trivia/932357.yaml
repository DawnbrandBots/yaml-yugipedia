title: Card Trivia:Chimera the King of Phantom Beasts
wikitext: |-
  {{Navigation}}

  * This monster is the [[retrained]] counterpart of "[[Chimera the Flying Mythical Beast]]".
  ** Likewise, this monster is visually the combination of "[[Big-Winged Berfomet]]" and "[[Gazelle the King of Mythical Claws]]", the retrained counterparts of the [[Fusion Material]]s of the original "Chimera".
  * This monster has an upgraded [[Illusion]] form combined with "[[Cornfield Coatl]]" and "[[Mirror Swordknight]]": "[[Chimera the Illusion Beast]]".
  * This monster's second effect references the Duel between [[Yugi Muto]] and the [[Seeker|Rare Hunter]], which was the first Duel to feature "[[Chimera the Flying Mythical Beast (anime)|Chimera the Flying Mythical Beast]]". In {{chapter|Yu-Gi-Oh!|154|ref}} and {{episode|Yu-Gi-Oh!|057|ref}}, Yugi uses "[[Lightforce Sword (anime)|Lightforce Sword]]" to remove "[[Right Arm of the Forbidden One (anime)|Right Arm of the Forbidden One]]" from the Rare Hunter's [[hand]] after he attacks with "Chimera the Flying Mythical Beast."
  ** In both the manga and anime, Yugi activates a card at the start of the Rare Hunter's turn before he can draw a card ("[[Lightforce Sword (manga)|Lightforce Sword]]" in the manga and "[[Time Seal (anime)|Time Seal]]" in the anime), which isn't possible in the ''[[OCG]]''/''[[TCG]]''. This card's second effect recreates Yugi's play by discarding the card at the [[End Phase]] instead.
