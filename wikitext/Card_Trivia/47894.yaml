title: Card Trivia:Fog King
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Royal Sword]]".
  * This monster's name and [[WATER]] [[Attribute]] are derived from "mist" or "fog", both of which are terms for a visible aerosol consisting of tiny water droplets or ice crystals suspended in the air at or near the Earth's surface.
  ** This monster is a reference to its owner, [[Adrian Gecko]], who uses the "[[Cloudian]]" [[archetype]] (which consists of monsters based on clouds, the aerosol form of evaporated water) and desires to rule over the [[Duel Monsters Spirit World]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** In the ''Yu-Gi-Oh! GX'' anime, when this monster battles an opponent's monster and uses its third effect to make the [[ATK]] of both battling monsters become 1, this monster causes the opponent's monster to dissipate into an aerosol vapor.
  * This monster is tied with "[[Regenerating Rose]]" and "[[Worm Victory]]" for the lowest [[original ATK]] (0) of all [[Level 7]] monsters.
