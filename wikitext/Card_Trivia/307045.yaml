title: Card Trivia:Augmented Heraldry
wikitext: |-
  {{Navigation}}

  * "[[Number 18: Heraldry Patriarch]]" and [[Vetrix]]'s [[crest]] appear in this card's artwork.
  * The two unknown crests in this card's artwork appear in the artwork of "[[Marshalling Field]]."
  * This card is named after "[[wikipedia:Augmentation of honour|augmentation of honour]]", a modification or addition to a [[wikipedia:Coat of arms|coat of arms]], typically given by a monarch as either a mere mark of favor, or a reward or recognition for some meritorious act.
