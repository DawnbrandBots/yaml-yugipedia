title: Card Trivia:Performage Overlay Juggler
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Juggling|juggler]], a circus performer who continuously tosses and catches objects in the air and throws at least one object in the air while handling the others.
  ** This monster's appearance features two large hoops above its body, each outfitted with a large yellow orb. These hoops resemble the [[Xyz Material]] of an [[Xyz Monster]], which is commonly depicted in the anime as a glowing orb looping around that monster's body and leaving behind a circular trail of light.
