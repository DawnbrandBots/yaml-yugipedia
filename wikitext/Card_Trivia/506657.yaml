title: Card Trivia:Votis
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023 2nd Wave]]''.
  * This card is based on [[wikipedia:Botis|Botis]] (also known as Otis), a demon described in ''[[wikipedia:The Lesser Key of Solomon|The Lesser Key of Solomon]]'' and ''[[wikipedia:Pseudomonarchia Daemonum|Pseudomonarchia Daemonum]]''. Botis is a viper that can transform into a humanoid shape with big teeth and two horns, carrying a sharp and bright sword.
  ** This card's Japanese name (ボティス ''Botisu''), is the exact same as Botis's name. However, because the letters "B" and "V" are typically represented by the same sound in loanwords within Japanese, its Japanese name could be interpreted as either "Votis" or "Botis" without context.
