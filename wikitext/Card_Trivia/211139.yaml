title: Card Trivia:Aquamirror Cycle
wikitext: |-
  {{Navigation}}

  * "[[Gishki Avance]]", "[[Gishki Emilia]]", and "[[Gishki Noellia]]" are featured in this card's artwork.
  * This card depicts the revival of "Emilia" after her death in "[[Aquamirror Illusion]]". "Emilia" was killed during the previous ritual (thus becoming a [[Spirit monster|Spirit]]), and "Noellia" is using her magic to revive her.
  ** These events occurred after "Noelia" was freed from "[[Evilswarm]]" control in "[[Constellar Meteor]]".
