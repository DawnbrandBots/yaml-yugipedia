title: Card Trivia:Brotherhood of the Fire Fist - Eagle
wikitext: |-
  {{Navigation}}

  * The Japanese name of this card is based on [[wikipedia:List of Water Margin characters|Taoist Luo]] (Japanese name: ''Ra Shinjin'', "Luo the True One") and eagle (''washi'').
  ** Although being a part of the story, Taoist Luo is not part of the [[wikipedia:Water Margin|108 Liangshan Heroes]], but he is a Taoist sorcerer and the master of [[wikipedia:Gongsun Sheng|Gongsun Sheng]], which "[[Brotherhood of the Fire Fist - Cardinal]]" is based on.
