title: Card Trivia:Flash Knight
wikitext: |-
  {{Navigation}}

  * This card and "[[Foucault's Cannon]]" were the first [[Pendulum Monster|Pendulum]] [[Normal Monster]]s to be released.
  ** It is also the first Pendulum Monster to not have a Pendulum Effect. Its status as a Normal Monster thus makes it the first Pendulum Monster to not have any effects at all.
  * This monster appears in the artwork of "[[Pendulum Rising]]".
  * This card's name is a [[wikipedia:word play|play]] on "flash light".
  * This card bears some similarities to the Dawn Knight character, from the popular MMO known as Maplestory.
