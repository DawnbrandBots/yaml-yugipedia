title: Card Trivia:Parasomnia Pillow
wikitext: |-
  {{Navigation}}

  * Stuffed toys of "[[Dark Desertapir]]", "[[Desertapir]]", and the pink "[[Sheep Token]]" appear in this card's artwork.
  * This card is based on the ''[[wikipedia:Baku (mythology)|baku]]'', a Japanese supernatural creature that is said to devour nightmares. The term ''baku'' may also refer to the [[wikipedia:Malayan tapir|Malayan tapir]].
