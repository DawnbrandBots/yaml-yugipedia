title: Card Trivia:Chronomaly Mud Golem
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Dogū|dogū]]'', a small humanoid figurine made during the later part of the [[wikipedia:Jōmon period|Jōmon period]] of prehistoric Japan.
  ** More specifically, this monster is based on the ''[[wikipedia:Dogū#Shakōkidogū|Shakōkidogū]]'', a humanoid figurine known for its facial structure resembling [[wikipedia:Snow goggles|Inuit snow goggles]], which appears on this monster's torso.
