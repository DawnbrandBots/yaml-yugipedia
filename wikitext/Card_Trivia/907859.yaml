title: Card Trivia:Lyrilusc - Phantom Feathers
wikitext: |-
  {{Navigation}}

  * "[[Lyrilusc - Assembled Nightingale]]" appears in this card's artwork.
  * This card's ''[[OCG]]'' name is a reference to "比翼の鳥", an expression of two birds with one wing each in Asian culture that refers to inseparable lovers.
  ** This is likely a reference to the relationship between [[Lulu Obsidian]], the user of the "[[Lyrilusc]]" archetype in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, and [[Yuto]], as despite all the tragedy of separation and losing their physical bodies, they ultimately survived and lived on within their main counterparts, [[Zuzu Boyle]] and [[Yuya Sakaki]], respectively.
  *** Ironically, this card's first effect of changing opponent monster's [[Level]]s/[[Rank]]s to 1 is similar to the effects of the "[[Predaplant]]" monsters involving [[Predator Counter]]s. The "Predaplant" monsters were used by [[Yuri]] in the anime, who belonged to [[Fusion Dimension]]'s [[Duel Academy (ARC-V)|Duel Academy]] (which [[Invasion of Xyz Dimension|invaded]] and almost destroyed the [[Xyz Dimension]]) and was even responsible for kidnapping Lulu.
  *** Additionally, this card's ''[[TCG]]'' name, "'''Phantom''' Feathers", may be a reference to the "[[Phantom Knights]]" archetype used by Yuto.
  * This card's artwork is a reference to the attack animation of "[[Lyrilusc - Assembled Nightingale (anime)|Lyrilusc - Assembled Nightingale]]" in the ''Yu-Gi-Oh! ARC-V'' anime.
