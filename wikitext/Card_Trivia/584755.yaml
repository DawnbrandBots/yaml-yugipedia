title: Card Trivia:Clock Spartoi
wikitext: |-
  {{Navigation}}

  * This monster's name references [[wikipedia:Clock rate|clock rates]], a rate of time it takes a computer processor to perform basic functions via frequencies generated by the clock generator of the processor.
  ** This monster's name and design are based on the [[wikipedia:Spartoi|Spartoi]], an army fierce warriors grown from the sown teeth of a sacred dragon slain by [[wikipedia:Cadmus|Cadmus]] in [[wikipedia:Greek mythology|Greek mythology]].
  *** This monster's name, design, and effect to [[add]] "[[Cynet Fusion]]" to the [[hand]] further reference the Greek myth of the Spartoi grown from the dragon's teeth, whereas its effect can facilitate the Summoning of "[[Cyberse Clock Dragon]]", a [[Dragon]]-themed [[Fusion Monster]].
  * This monster shares several similarities to "[[Cyberse Witch]]" and "[[Cyberse Wicckid]]".
  ** "Cyberse Witch"
  *** Both monsters feature an effect that can add a specific "[[Cynet]]" [[Spell Card]] ("Cynet Fusion" and "[[Cynet Ritual]]", respectively) from the [[Deck]] to the hand.
  *** Both monsters feature an effect that can [[Special Summon]] a [[Level 4]] or lower [[Cyberse]] monster from the [[Graveyard]] when a monster is Special Summoned to a zone it points to.
  ** "Cyberse Wicckid"
  *** Both monsters feature [[Bottom-Center Link Arrow cards|Bottom-Center]] and [[Bottom-Right Link Arrow cards|Bottom-Right]] [[Link Arrow]]s.
  ** "Cyberse Witch" and "Cyberse Wicckid"
  *** They all share the same [[Attribute]] ([[DARK]]), [[Type]] (Cyberse), [[ATK]] (800), and [[Link Rating]] (2).
  *** They all feature a Bottom-Center Link Arrow.
  *** They all require two Cyberse monsters to be [[Link Summon]]ed.
  *** They all feature an effect that activates when a monster is Special Summoned to a zone it points to (except during the Damage Step).
  *** They all feature an effect that can add a card used for a different type of Summoning ([[Fusion Summon|Fusion]], [[Ritual Summon|Ritual]] and [[Synchro Summon|Synchro]], respectively) from the Deck to the hand.
  * This is the last [[Link Monster]] that [[Yusaku Fujiki|Yusaku]] obtains from a [[Data Storm]] on-screen in the anime.
