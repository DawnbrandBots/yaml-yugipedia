title: Card Trivia:Fushioh Richie
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the Japanese version of ''[[Pharaonic Guardian (Japanese)|Pharaonic Guardian]]'' and ''[[Duelist Legacy Volume.5]]''.
  * This card's Japanese name is a combination of "[[wikipedia:Nosferatu (word)|Nosferatu]]", an archaic Romanian word synonymous with "vampire", and "[[wikipedia:Lich|lich]]", an undead [[spellcaster]] (i.e. "[[Great Dezard]]") who uses necromancy or [[dark]] magic to achieve immortality.
  * This card's English name is based on a romanization of this card's Japanese name, but with a normal reading of the kanji in its name; "Fushioh" (不死王 ''fushiō'') means "Undead King" in Japanese, while "Lich" is normally spelled 「リッチ」 in Japanese, but in this card's Japanese name it is spelled 「リッチー」, which is the Japanese spelling of the name "[[wikipedia:Richie|Richie]]".
  * This monster appears in the artwork of "[[Certain Death Promotion]]".
  * The ''[[Beginner's Edition 2 (2011)]]'' reprint lacks the slash between the word "[[DEF]]" and its DEF stat.
