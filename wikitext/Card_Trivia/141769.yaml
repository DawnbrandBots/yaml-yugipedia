title: Card Trivia:Meklord Emperor Skiel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Infinite Feast]]".
  * This monster has a "[[Meklord Army]]" [[counterpart]]: "[[Meklord Army of Skiel]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' appearance is based on the appearance the five "[[Skiel]]" monsters take when on field together the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's [[Special Summon]]ing effect and [[original ATK and DEF]] (2200/2200) are based on how in the anime, the main components of this monster are intended to be [[Special Summon]]ed all at once by the effect of "[[Sky Core]]" and the middle piece gains the total [[ATK]] and [[DEF]] of all the others.
  ** This monster's [[direct attack]] effect is based on the anime effect of "[[Skiel Attack 3 (anime)|Skiel Attack 3]]" and "[[Skiel Attack 5 (anime)|Skiel Attack 5]]", which allows all "Skiel" monsters to attack directly.
  * This is the [[signature card]] of [[Lester]] in the ''Yu-Gi-Oh! 5D's'' anime.
  ** This monster appears to be the smallest-sized member of the "[[Meklord Emperor]]s", reflecting how Lester is the shortest member of the [[Three Pure Nobles]].
  * This is the only "Meklord Emperor" monster that was not used in a [[Duel]] against [[Yusei Fudo]] in the anime, as Lester is the only member of the Three Pure Nobles that never Dueled Yusei.
  ** This is also the only "Meklord Emperor" monster that did not have an [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] in the anime.
  * This is the only "Meklord Emperor" monster to not feature a red screen around its face.
  ** This is the only "Meklord Emperor" monster that did not have a part of its body glowing red when it was [[Summon]]ed in the anime; however, before it was used by Lester, this monster as a whole originally glowed with a red hue.
  * This is the only "Meklord Emperor" to be released in a ''TCG'' set instead of as a promo card.
  * The three "Meklord Emperors" likely represent the concept of the mind, body, and spirit, with this monster representing the spirit, as well as the sky. This is reflected in this monster's [[WIND]] [[Attribute]].
