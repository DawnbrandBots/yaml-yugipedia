title: Card Trivia:Sky Striker Ace - Raye
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023]]''.
  * This monster appears in the artworks of "[[Sky Striker Ace - Hayate]]", "[[Sky Striker Ace - Kagari]]", "[[Sky Striker Ace - Kaina]]", "[[Sky Striker Ace - Shizuku]]", "[[Sky Striker Mecha - Eagle Booster]]", "[[Sky Striker Mecha - Hornet Drones]]", "[[Sky Striker Mecha - Shark Cannon]]", "[[Sky Striker Mecha - Widow Anchor]]", "[[Sky Striker Mecha Modules - Multirole]]", "[[Sky Striker Mobilize - Engage!]]", "[[Sky Striker Mobilize - Linkage!]]", and "[[Prototype Sky Striker Ace - Amatsu]]", as well as the third artwork of "[[Reinforcement of the Army]]" and the second artwork of "[[Ritual Sanctuary]]".
  * A silhouetted "[[Surgical Striker - H.A.M.P.]]" appears in this card's third artwork.
  * "[[Live☆Twin Ki-sikil]]" cosplays as this monster in the artwork of "[[Live☆Twin Sunny's Snitch]]".
  * This monster's name is reference to the [[wikipedia:Mitsubishi A6M Zero|Mitsubishi A6M "Zero"]], an Imperial Japanese fighter aircraft ("zero" in Japanese being "rei").
  ** Fittingly, this monster's rival, "[[Sky Striker Ace - Roze]]", is named after an anagram of "zero", and both fuse into "[[Sky Striker Ace = Zero]]".
  * This card's second artwork is based on a promotional illustration of the monster's [[Raye (manga)|manga incarnation]] by [[Naohito Miyoshi]], which was also used for the title page of {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|1|ref}}.
