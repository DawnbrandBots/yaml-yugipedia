title: Card Trivia:Fighting Flame Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * This monster is an upgraded  [[Fusion Monster|Fusion]] form of "[[Salamandra, the Flying Flame Dragon]]" (a retrained [[Effect Monster]] [[counterpart]] of "[[Salamandra]]").
  ** This monster's effect to [[equip]] itself to a [[Warrior]] [[Fusion Monster]], and increase that monster's [[ATK]] by 700, is based on the status of "Salamandra" as an [[Equip Spell Card]], which was commonly equipped to "[[Flame Swordsman]]" (a Warrior Fusion Monster in the ''[[OCG]]''/''[[TCG]]'' only) and increased its ATK by 700 during the [[Duelist Kingdom (manga arc)|Duelist]] [[Duelist Kingdom (arc)|Kingdom]] arc of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This monster's name is likely based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Flame Swordsman" in the English translated version of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga: "Fighting Spirit Flame Slash Sword".
