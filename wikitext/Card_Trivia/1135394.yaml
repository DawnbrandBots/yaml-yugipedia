title: Card Trivia:Hecahands Yadel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Hecahands Bait]]" and "[[Ib'al-Hecahands]]".
  * This monster has a combined form with "[[Hecahands Ibtel]]": "[[Hecahands Mankibuel]]".
  * This monster's name is derived from ''Yad'' (يد), the Arabic term for "hand".
