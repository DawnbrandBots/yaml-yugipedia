title: Card Trivia:Elemental HERO Wildedge
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Wake Up Your Elemental HERO]]".
  * This monster is a [[Fusion Monster|Fusion]] form of "[[Elemental HERO Wildheart]]" and "[[Elemental HERO Bladedge]]".
  ** In the ''[[Duelist Pack: Jaden Yuki 2]]'' print of this card, "Elemental HERO Bladedge" was mistakenly listed as "Elemental HERO Edgeman" (the Japanese name of "Bladedge") in this monster's listed [[Fusion Material]]s.
  * This monster has an "[[Evil HERO]]" [[counterpart]]: "[[Evil HERO Malicious Fiend]]".
  ** This monster is a Fusion form of "Elemental HERO Bladedge", while "Evil HERO Malicious Fiend" is a Fusion form of "[[Evil HERO Malicious Edge]]".
  ** This monster can [[attack]] all monsters the opponent [[control]]s, while "Evil HERO Malicious Fiend" forces all monsters the opponent controls to attack it, if able.
  * This monster has the following distinctions from the other "[[HERO]]" Fusion Monsters that require "Elemental HERO Wildheart" as Fusion Material:
  ** It has 2600 [[ATK]] instead of 1900 ATK.
  ** It does not have tattoos on its body.
  ** It does not have an effect that involves [[destroy]]ing cards.
