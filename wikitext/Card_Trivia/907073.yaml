title: Card Trivia:Link Token
wikitext: |-
  {{Navigation}}

  * When [[Playmaker]] uses the effect of "[[Metal Molephosis]]" to make 2 "Link Token"s into [[DARK]] [[Dragon]] monsters, they resembled the "[[Dragonoid Token]]s" used by [[Roken Kogami|Varis]]. Ironically, the "Dragonoid Token"s were [[Machine]]s not Dragons.
