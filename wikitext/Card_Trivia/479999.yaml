title: Card Trivia:En Flowers
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The lowercase [[wikipedia:Greek letter|Greek letter]] [[wikipedia:Pi (letter)|pi]] (π) appears in this card's artwork.
  ** Pi is a [[wikipedia:Mathematics|mathematical]] symbol used in the calculation of an arc, which is reflected by the "arc" motif of [[Pendulum Summon]]ing.
  *** This card's activation requirement is based on pi's approximate value of 3.14, as each number of pi corresponds with the other [[Four Nature Cards]], which are related to the [[Fusion Summon|Fusion]], [[Synchro Summon|Synchro]], and [[Xyz Summon]]ing mechanics. This is a reference to how [[Zuzu's bracelet]] contained all of the [[Summoning mechanics]], including Pendulum Summon.
  * In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this was the card that created [[Zuzu Boyle]] and [[Yuya Sakaki]] when [[Ray Akaba]] and [[Z-ARC]] separated their personalities.
  * This card's effect to [[negate]] the effects of all monsters and [[destroy]]ing them is a reference to how it was created in the anime to counter "[[Odd-Eyes Dragon (anime)|Odd-Eyes Dragon]]" (as suggested by that monster's overlaid profile when this card was activated in the anime).
