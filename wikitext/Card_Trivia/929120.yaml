title: Card Trivia:Beast Gear Emperor Catapult Kong
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Apocalypse - Legend of the Warrior]]" and "[[Apocalypse - The Unstoppable Beast-Warrior]]".
  * In the Japanese dub of [[Yu-Gi-Oh! SEVENS - Episode 020]], while pummeling "[[LaMoon the Party Princess]]", this monster can be heard shouting "Ora, ora, ora, ora, ora!" in a voice similar to Daisuke Ono's potrayal of [[fandom:w:c:jojo:Jotaro Kujo|Jotaro Kujo]].
