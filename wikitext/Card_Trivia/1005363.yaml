title: Card Trivia:Secret Investigation Mobile Thunderbird
wikitext: |-
  {{Navigation}}

  * "[[Agent Miscast]]" and "[[Agent Mislead]]" appear in this card's artwork.
  * The Japanese name for "Thunderbird" (サンダーバード, ''Sandābādo'') contains the katakana for the number "3" (サン, ''san'') in its name, reflecting [[Terza Flatwood]]'s naming conventions of referencing the number throughout her cards.
