title: Card Trivia:Shell of Chaos
wikitext: |-
  {{Navigation}}

  * "[[Core of Chaos]]" appears in this card's artwork.
  * This card shares the same [[Attribute]] ([[DARK]]), [[Type]] ([[Machine]]), and [[ATK]]/[[DEF]] (1600/0), name, and appearance with "[[Sphere of Chaos]]".
  ** This monster is also possibly the unsealed form of "Sphere of Chaos".
