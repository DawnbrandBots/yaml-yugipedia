title: Card Trivia:Majespecter Raccoon - Bunbuku
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Majespecter Tornado]]" and "[[Majesty's Pegasus]]".
  * This card is based on [[wikipedia:Bunbuku Chagama|Bunbuku Chagama]], a ''[[wikipedia:Bake-danuki|tanuki]]'' who uses its shapeshifting powers to reward its rescuer for his kindness in Japanese folklore.
