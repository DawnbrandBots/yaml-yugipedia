title: Card Trivia:Phantom Knights' Rank-Up-Magic Force
wikitext: |-
  {{Navigation}}

  * The crest that appears in this card's artwork is based on physical features of "[[Arc Rebellion Xyz Dragon]]", including the symbol on the base of its neck, the red circles on its chest, and its horns.
  * This is the first ''[[OCG]]''/''[[TCG]]''-original "[[Rank-Up-Magic]]" card.
