title: Card Trivia:Cagna, Malebranche of the Burning Abyss
wikitext: |-
  {{Navigation}}

  * The [[wikipedia:Malebranche (Divine Comedy)|Malebranche]] were demonic characters in Dante's ''The Divine Comedy'' who guard the fifth Bolgia of Malebolge, the Eighth Circle of Hell. They are known for their ruthless cruelty, and are responsible for the punishment of corrupt politicians by holding them under a boiling lake of pitch.
  ** Of the 12 named Malebranche, this card specifically represents the demon "Cagnazzo," the "Nasty Dog"– whose name is reflected in this card's canine appearance.
  ** He also appears under the name [http://castlevania.wikia.com/wiki/Cagnazzo Cagnazzo] in [[Konami]]'s Castlevania games.
  * Cagna in Italiani means bitch, which in English means female dog, alluding to the fact that this card is a female dog.
