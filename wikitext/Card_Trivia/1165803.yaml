title: Card Trivia:Mitsurugi no Mikoto, Aramasa
wikitext: |-
  {{Navigation}}

  * This monster is named after ''Worochi-no-Aramasa'', one of the names of ''Ame no Habakiri no Tsurugi'', the ''[[wikipedia:Totsuka-no-Tsurugi|Totsuka-no-Tsurugi]]'' used by the god [[wikipedia:Susanoo-no-Mikoto|Susanoo]] to kill the eight-headed dragon/serpent [[wikipedia:Yamata no Orochi|Yamata no Orochi]].
