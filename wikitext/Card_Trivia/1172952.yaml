title: Card Trivia:Shrine Rhynchus
wikitext: |-
  {{Navigation}}

  * This monster's name and Egyptian-like appearance are likely based on [[wikipedia:Oxyrhynchus|Oxyrhynchus]], an ancient city located in Middle Egypt that worshipped the [[wikipedia:Medjed (fish)|medjed]], a type of [[wikipedia:Mormyridae|elephantfish]] that, according to [[wikipedia:Egyptian mythology|Egyptian mythology]], ate the genitalia of the dismembered god [[wikipedia:Osiris|Osiris]], thereby preventing his resurrection and resulting in him becoming the [[wikipedia:Ancient Egyptian deities|Egyptian god]] of death.
