title: Card Trivia:Meklord Astro Dragon Triskelion
wikitext: |-
  {{Navigation}}

  * This monster's heads are based on the design of the ''[[Trinidart Ouroboros]]'', whiles its wings are based on the arc-like [[Duel Disk]] used by its owner, [[Aporia]], who uses the "[[Meklord]]" [[archetype]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster is named after the [[wikipedia:Triskelion|triskelion]], a triple spiral motif which exhibits rotational symmetry.
  ** This monster's central body features a spiral of three colors, each to represent a "[[Meklord Emperor]]" and their respective "[[Meklord Army]]" monsters: blue for "[[Skiel]]", white for "[[Wisel]]", and orange for "[[Granel]]".
  ** The motif centered around the number "3" reflects this monster's '''three''' heads, the '''three''' "Meklord" monsters required to [[Special Summon]] this monster, the '''three''' attacks it can make when [[equipped]] with a [[Synchro Monster]], and its [[original ATK]] of 3000.
  * This is the first "Meklord" monster to feature an effect that equips a monster from the opponent's [[Extra Deck]], as well as the first to not be restricted to equipping Synchro Monsters with its effects.
