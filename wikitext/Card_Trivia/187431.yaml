title: Card Trivia:Silver Dollar
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on a [[wikipedia:Silver dollar|silver dollar]], a [[wikipedia:Dollar coin (United States)|dollar coin]] made of silver or any white metal.
  * This card's effect is based on an urban legend surrounding a coin in someone's shirt pocket, which can stop a bullet that should have killed them, similar to how this card protects weaker monsters from being [[destroyed by battle]] and prevents [[battle damage]].
  ** In {{episode|Yu-Gi-Oh!|191|ref}}, this urban myth is demonstrated when  "[[Valkyrie Erste (anime)|Valkyrie Erste]]" attacks "[[Sasuke Samurai (anime)|Sasuke Samurai]]". The silver dollar manifests on the latter monster's chest just as the former monster's sword is about to pierce it, but the sword pierces the silver dollar instead, thereby preventing the latter monster from being destroyed by battle.
