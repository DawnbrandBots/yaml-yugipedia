title: Card Trivia:Infection Medium
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Ceruli, Guru of Dark World]]" and five "[[Infection Bug Token]]s" appear in this card's artwork.
  ** This card's artwork draws a parallel to that of "[[One for One]]", which also depicts [[Level 1]] monsters emerging from the body of a "[[Dark World]]" monster.
  * Despite this card's text, in its appearance in {{episode|ZEXAL|123|ref}}, its final effect [[activate]]d not when this card itself is [[destroy]]ed, but rather when an "Infection Bug Token" is destroyed.
