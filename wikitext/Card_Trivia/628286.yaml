title: Card Trivia:Supreme King's Castle
wikitext: |-
  {{Navigation}}

  [[File:Supreme_King's_castle.png|thumb|right|300|[[The Supreme King]]'s castle as seen in the [[Yu-Gi-Oh! GX|anime]].]]

  * This card is based on the [[Supreme King's castle (location)|Supreme King's castle]] from the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This castle appears in the artwork of "[[Evil HERO Adusted Gold]]" and "[[Evil HERO Inferno Wing - Backfire]]".
  * This card's first effect is likely a reference to {{episode|GX|140|ref}} and {{episode|GX|143|ref}}, where [[The Supreme King]] used "[[Super Polymerization (anime)|Super Polymerization]]" to [[Special Summon]] "[[Evil Hero Dark Gaia (anime)|Evil HERO Dark Gaia]]" and "[[Evil Hero Malicious Fiend (anime)|Evil Hero Malicious Fiend]]" respectively, despite both monsters only being able to be Special Summoned by the effect of "[[Dark Fusion (anime)|Dark Fusion]]". In both episodes, the Duels take place at The Supreme King's castle.
