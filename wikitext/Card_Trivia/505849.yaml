title: Card Trivia:Koitsu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[A-Team: Trap Disposal Unit]]", "[[Fossil Dig]]", "[[Fossil Excavation]]", "[[Geological Survey]]", and "[[Gravity Collapse]]".
  * This card is based on the blue playable character in ''[[wikipedia:Sexy Parodius|Sexy Parodius]]'', a parody of the ''[[wikipedia:Gradius series|Gradius]]'' video game series produced by [[Konami]].
  ** When translated, the names "[[Aitsu]]", "Koitsu", "[[Soitsu]]", and "[[Doitsu]]" mean "This Guy", "That Guy", "That Other Guy" and "Which Guy?" respectively. The names are whimsical and are not meant to be taken literally. To keep the flavor, an appropriate translation might be "Eeney", "Meeney", "Miney", and "Moe".
  ** This card and its association with "Aitsu" is based on their appearance in Konami's ''[[wikipedia:Castlevania: Portrait of Ruin|Castlevania: Portrait of Ruin]]'' and ''[[wikipedia:Castlevania: Harmony of Despair|Castlevania: Harmony of Despair]]'' as the main character, Jonathan Morris's subweapon, "Paper Airplane" when he reaches levels 5 - 8. When the player reaches the maximum level of 9, both "Aitsu" and "Koitsu" can be seen riding on the paper airplane individually or together.
  * This card has the highest [[Level]] of all [[Union monster]]s, as well as being the first and only Level 10 Union monster.
  ** This card also has the highest [[ATK]] increase (3000) in its effect for the monster it can be [[equip]]ped to, "Aitsu".
