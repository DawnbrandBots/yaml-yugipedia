title: Card Trivia:Noble Knight Iyvanne
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Ywain|Ywain]], one of the [[wikipedia:Knights of the Round Table|Knights of the Round Table]] in [[wikipedia:Arthurian legend|Arthurian legend]].
  ** The lion in this card's background artwork is a reference to the lion Ywain saved from a giant serpent, which became his loyal companion as a result.
  *** This is also reflected in this card's effect that Special Summons a "Noble Knight Token", whose monster sprite in ''[[Yu-Gi-Oh! Duel Links]]'' is represented by the lion in this card's artwork.
  ** This monster is wearing a star-shaped pendant, with one of the star's "arms" being a different color than the others. "[[Morgan, the Enchantress of Avalon]]" also has a similarly-shaded star in the orb of her staff.
  *** This is likely a reference to how Ywain is typically portrayed as the son of [[wikipedia:Morgan le Fay|Morgan le Fay]] in Arthurian legend.
