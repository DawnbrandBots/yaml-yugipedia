title: Card Trivia:Exodia Necross
wikitext: |-
  {{Navigation}}

  [[File:Exodia_summoned_manga.png|thumb|right|250|[[Dark Yugi (manga)|Dark Yugi]] summons "[[Exodia the Forbidden One (manga)|Exodia the Forbidden One]]".]]

  * This is the [[cover card]] for ''[[Dark Crisis]]'' and ''[[Power of the Guardian]]''.
  * This monster's [[original ATK]] (1800) is equal to the combined [[ATK]] of the "[[Forbidden One]]" monsters.
  * Despite its [[Type]] being [[Spellcaster]], this monster can be considered an "undead" or "[[Zombie]]" version of Exodia.
  ** "Necross" is based on "''nekrós''" (νεκρός), the Greek word meaning "dead" (as an adjective) or "corpse" (as a noun).
  ** This monster requires all "Forbidden One" monsters to be in the [[Graveyard]] to be Summoned and remain on the [[field]].
  ** This monster features 0 [[DEF]], similar to several [[Zombie counterpart]] monsters.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|039|ref}}, specifically from the panel showing "[[Exodia the Forbidden One (manga)|Exodia the Forbidden One]]" completely Summoned.
  ** This card's artwork provided by Yugioh.com appears to be based on the ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' artwork of "[[Summoned Lord Exodia]]".
  * In the Yu-Gi-Oh! anime, despite being Summoned with a [[Ritual Spell Card]], instead of the blue-colored frame of [[Ritual Monster]]s, this card had the orange-colored frame of a Main Deck Effect Monster, which was how it was later released in OCG/TCG.

