title: Card Trivia:Seyanen the Blazing Conqueror
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|燃|ねん}}{{Ruby|将|しょう}}セヤネン, ''Nenshō Seyanen'') is a wordplay on "seya" (せや), a contracted form of "sō da" (そうだ), which is used to indicate what something seems like, combined with the particle "nen" (ねん), which is used to indicate emphasis, both of which originate from [[wikipedia:Kansai_dialect|Kansai Japanese dialect]]. 
  ** Adding its Japanese title, "''nenshō''" (燃将, lit. "burning commander"), which is a play on "''nenshō''" (燃焼, lit. combustion), this monster's name could be translated as "That really seems like combustion".
  * This monster shares similarities with "[[Nandes the Fire Awakener]]".
  ** Both monsters share the same [[Attribute]] ([[FIRE]]), [[Level]] (4), [[Type]] ([[Warrior]]), and swapped [[original ATK and DEF]].
  ** Both monsters share a similar wordplay in their respective Japanese names.
