title: Card Trivia:Freed the Brave Wanderer
wikitext: |-
  {{Navigation|other=[[Freed the Brave Wanderer (character)|Character]]}}

  * This monster appears in the artworkd of "[[Chivalry]]", "[[Common Sacrifice]]", "[[D.D. Borderline]]", "[[Dimensional Prison]]", "[[Draining Shield]]", and "[[Subspace Battle]]".
  * This monster has a stronger form: "[[Freed the Matchless General]]".
  * This monster is often thought to be the rival of "[[Gagagigo]]", due to being frequently depicted battling with him in card artworks.
