title: Card Trivia:Chaofeng, Phantom of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:zh:嘲风|Cháofēng]] (zh: 嘲风｜嘲風 ''cháofēng''), a modern name for one of the [[wikipedia:Nine sons of the dragon|nine sons]] of the [[wikipedia:Dragon King|Dragon King]] who is depicted as a hybrid of a dragon and a phoenix. 
  ** According to Chinese mythology, Cháofēng likes to adventure and his image is historically placed on the four corners of rooftops to frighten away evil spirits and avert calamity.
