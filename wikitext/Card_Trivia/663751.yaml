title: Card Trivia:Time Thief Regulator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Time Thief Adjuster]]" and "[[Time Thief Startup]]".
  * The date "20/5 2012 11:57:00 AM" on the screen of this card's artwork is the same as the "Time Hack" of "SUN 20 MAY 2012 AM 11:57:00" pictured on the display in the artwork of "[[Time Thief Retrograde]]".
  ** The date pictured on the screen in this card's artwork, [[wikipedia:Solar eclipse of May 20, 2012|May 20, 2012]], is the date of an annular [[wikipedia:Solar eclipse|solar eclipse]].
