title: Card Trivia:Mecha Phantom Beast Token
wikitext: |-
  {{Navigation}}

  * "Mecha Phantom Beast Tokens" are depicted as holograms copying "[[Mecha Phantom Beast]]" monsters in their own artworks.
  * This is the first [[Token Monster|Token card]] to have Type, Attribute, Level, ATK and DEF printed on it.
  ** Also it has lore text other than "This card can be used as any Token."
