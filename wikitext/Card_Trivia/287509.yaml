title: Card Trivia:Overlay Burglary
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Gagagigo the Risen]]" and "[[Sword Breaker]]" appear in this card's artwork.
  * This card's artwork and effect are similar to those of "[[Overlay Capture]]".
  * This card's name reflects its effect to "burglarize" an [[Xyz Material]] from an opponent's [[Xyz Monster]] and [[attach]] it to the player's Xyz Monster.
