title: Card Trivia:Lode Crusher
wikitext: |-
  {{Navigation|mode=nongame}}

  * The seven colored lights in this card's artwork represent the seven members of the [[Sevens Road]] [[series]].
  * This card's English name is based on "[[wikipedia:Lode|lode]]", a vein of metal ore embedded in the earth.
  ** Given its Japanese spelling and pronunciation (ロード ''Rōdo'') and effect, this card was designed to counter the Seven Road series, which centers around the [[Summon]]ing and [[Graveyard]] effect of the [[Level 7]] "[[Sevens Road Magician]]".
