title: Card Trivia:Swordsoul Emergence
wikitext: |-
  {{Navigation}}

  * "[[Dogmatika Adin, the Enlightened]]", "[[Dogmatika Fleurdelis, the Thunderbolt]]", "[[Dogmatika Theo, the Iron Punch]]", "[[Swordsoul Grandmaster - Chixiao]]", "[[Swordsoul of Mo Ye]]", and "[[Swordsoul of Taia]]" appear in this card's artwork.
  ** This card's artwork depicts the first encounter between the three members of "[[Dogmatika]]", who fled from the "[[Dogmatika Nation]]", and the "[[Swordsoul]]" monsters, who would eventually accept them in their tribe.
