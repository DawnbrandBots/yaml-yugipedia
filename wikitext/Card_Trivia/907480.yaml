title: Card Trivia:Garmr the Lone Wolf
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Judgment of the Rising Light]]".
  * The necklace in this card's artwork is in the shape of the staff of "[[Rising Light Angel Essel]]".
  * This card's English name is based on [[wikipedia:Garmr|Garmr]], or Garm (Old Norse: Garmr [ˈɡɑrmz̠]; "rag"), a wolf or dog in Norse mythology associated with both [[wikipedia:Hel (mythological being)|the goddess Hel]] and [[wikipedia:Ragnarök|Ragnarök]] and described as a blood-stained guardian of Hel's gate.
