title: Card Trivia:Shien's Scheme
wikitext: |-
  {{Navigation}}

  * "[[Tenkabito Shien]]" and the armor of "[[Legendary Six Samurai - Shi En]]" appear in this card's artwork.
  ** This means that they are the one and the same, as supported by the [[Master Guide 3 card storylines#Legendary Six Samurai - Shi En|Master Guide 3 card storylines]].
  ** This card's artwork is similar to the artworks of "[[Enishi, Shien's Chancellor]]" and "[[Hand of the Six Samurai]]", since they both feature their owners outside of their armor.
  ** The haze near the bottom of this card's artwork may indicate that "Shien" is inside "[[Shien's Castle of Mist]]".
  *** It is also possible that "[[Shien's Advisor]]" is involved in this scene, as the candles are the same in both cards' artworks and there is a haze in both cards' artworks.
