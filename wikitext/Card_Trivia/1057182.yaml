title: Card Trivia:Hero Dice
wikitext: |-
  {{Navigation}}

  * In {{episode|GX|096|ref}}, [[Jaden Yuki]] uses this card during his Duel against [[Dr. Eisenstein]], who is based on the real-life theoretical physicist, [[Wikipedia:Albert Einstein|Albert Einstein]]. This is a reference to Einstein's famous quote regarding his dissatisfaction with the randomness of the nature of quantum mechanics: "I am convinced that [God] does not throw dice", which Dr. Eisentein quotes in the original Japanese version of the aforementioned episode.
