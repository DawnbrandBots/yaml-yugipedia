title: Card Trivia:Heroic Call
wikitext: |-
  {{Navigation}}

  * "[[Heroic Challenger - Spartan]]" and "[[Heroic Challenger - War Hammer]]" appear in this card's artwork.
  * This card's ''[[OCG]]''/''[[TCG]]'' 500 [[Life Point]] [[activation condition]] references the initial gameplay of the "[[Heroic]]" [[archetype]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime where certain cards required activation condition of 500 or less Life Points.
