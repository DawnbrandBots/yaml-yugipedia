title: Card Trivia:Abyss Actors' Curtain Call
wikitext: |-
  {{Navigation}}

  * "[[Abyss Actor - Comic Relief]]", "[[Abyss Actor - Curtain Raiser]]", "[[Abyss Actor - Evil Heel]]", "[[Abyss Actor - Extras]]", "[[Abyss Actor - Funky Comedian]]", "[[Abyss Actor - Leading Lady]]", "[[Abyss Actor - Mellow Madonna]]", "[[Abyss Actor - Sassy Rookie]]", "[[Abyss Actor - Superstar]]", "[[Abyss Actor - Trendy Understudy]]", "[[Abyss Actor - Twinkle Little Star]]", and "[[Abyss Actor - Wild Hope]]" appear in this card's artwork.
  * This card's name is based on a [[wikipedia:Curtain call|curtain call]], a term used in [[wikipedia:acting|acting]] to describe an act revolving around all the performers and staff to take the stage and be recognized and acknowledged at the end of the performance, which is depicted in this card's artwork.
