title: Card Trivia:Fatal Abacus
wikitext: |-
  {{Navigation}}

  * The device in this card's artwork appears in the artworks of "[[Fruits of Kozaky's Studies]]", "[[Good Goblin Housekeeping]]", and "[[Spell Economics]]".
  * This card is based on an [[wikipedia:abacus|abacus]], an ancient hand-operated calculating tool used in ancient times that used beads for counting.
  ** This card's artwork depicts the abacus using nineteen visible eyeballs instead of the counting beads.
  ** According to the [[Master Guide 2 card storylines]], this abacus is a high-performance computer-calculator that exists in Darkworld, which can perform any equation possible as long as the user remembers the equations.
