title: Card Trivia:Nerva the Power Patron of Creation
wikitext: |-
  {{Navigation}}

  * The outline of this monster appears in the artwork of "[[Artmage Pact -Awakening-]]", and "[[Prohibited Power Patron Portal - Terminus]]".
  * This monster is based on [[wikipedia:Minerva|Minerva]], the Roman goddess of wisdom, who is also a sponsor of the arts, which reflects its association with the art-themed "[[Artmage]]" [[archetype]].
  ** This monster can be [[Fusion Summon]]ed with "[[Artmage Power Patron]]", whose design is based on an owl, the sacred animal of Minerva.
  * "[[Artmage Diactorus]]" is "[[Medius the Pure]]" having inherited the power of this monster.
