title: Card Trivia:Reborn Pattern
wikitext: |-
  {{Navigation}}

  * This card's name is based on a "revival pattern", a style of gameplay pioneered by the ''[[wikipedia:Gradius|Gradius]]'' series in which the player can easily turn losing a life and power-ups into an advantage, which reflects its effect to [[Special Summon]] "[[Gradius (Rush Duel)|Gradius]]" or a [[Level 4]] [[Machine]] [[Type]] [[Fusion Monster]] with 800 [[DEF]] from the [[Graveyard]] of the player's monster is [[destroy]]ed by the opponent.
