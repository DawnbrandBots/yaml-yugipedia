title: Card Trivia:Interstellar Change
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is the first card in ''[[Yu-Gi-Oh! Rush Duel]]'' to have an effect that involves changing players, although it has not yet been released in the physical game.
  ** This is also the second such card to appear in the anime, the first being "[[Partner Change]]" in ''[[Yu-Gi-Oh! GX]]''.
