title: Card Trivia:Discord
wikitext: |-
  {{Navigation}}

  * This card's name is based on the musical term "[[wikipedia:Consonance and dissonance|discord]]", which describes a chord or a series of tones that are "unstable", or out of synchronization. Fittingly, this card's effect prevents [[Synchro Summon]]ing, while its artwork depicts two men that are having difficulty "synchronizing" with each others' singing voices.
