title: Card Trivia:Vanquish Soul Razen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Vanquish Soul Dust Devil]]" and "[[Vanquish Soul Trinity Burst]]".
  * This monster resembles the "all rounder" or "shotokan" character archetype in [[wikipedia: Fighting game|fighting games]] (e.g.[[wikipedia:Ryu (Street Fighter)|Ryu]] from "[[wikipedia:Street Fighter|Street Fighter]]", [[wikipedia:Kyo Kusanagi|Kyo Kusanagi]] from "[[wikipedia:The King of Fighters|King of Fighters]]", [[wikipedia:Sol Badguy|Sol Badguy]] from "[[wikipedia:Guilty Gear|Guilty Gear]]" etc.), which quite often have the role of starter characters or protagonists in the lore of said games. Gameplay-wise, these characters are known for movesets and attack properties that are seen as beginner-friendly and easily adaptable to virtually any opponent or situation with the proper execution.
  ** This basis can be seen in this card's effects to [[Searching effects|search]] for fellow members of its [[archetype]], as well as in its abilities to [[Cannot be destroyed by card effects|take]] and [[Destroys Monster Cards|deal]] destructive effects, all in all making it well-rounded in support, defense, and offense.
