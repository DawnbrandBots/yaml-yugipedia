title: Card Trivia:Accel Synchro Stardust Dragon
wikitext: |-
  {{Navigation}}

  [[File:Stardust Dragon used as Accel Synchro Material.png|thumb|250px|[[Yusei]] uses [[Stardust Dragon (anime)|Stardust Dragon]] as material for an [[Accel Synchro Summon]].]]
  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * [[Yusei Fudo]] (riding the [[Yusei Go]]) appears in this card's artwork.
  * This monster is a retrained [[counterpart]] of "[[Stardust Dragon]]".
  ** This monster's name and appearance is based on "[[Stardust Dragon (anime)|Stardust Dragon]]" while undergoing [[Accel Synchro Summon]]ing, a Summoning method used to evolve it into "[[Shooting Star Dragon (anime)|Shooting Star Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's effects are based on the [[Summoning condition]]s of the Accel Synchro Summoning of "Stardust Dragon's" evolved counterparts, which requires "Stardust Dragon" and a [[Level 2]] or lower [[Tuner Synchro Monster]], where the latter's [[Quick Effect]] can [[Synchro Summon]] a monster during the opponent's [[Main Phase]].
  * This monster can be considered the rival counterpart of "[[Scarred Dragon Archfiend]]".
  ** Both monsters are named after the method where their original counterparts evolve into their [[Cosmic Synchro Monster]] counterparts in the ''Yu-Gi-Oh! 5D's'' anime.
  ** Both monsters can [[Special Summon]] their original counterparts from the [[Extra Deck]] after fulfilling a certain condition, which is also treated as a Synchro Summon.

