title: Card Trivia:Bonze Alone
wikitext: |-
  {{Navigation}}

  * A [[wiktionary:bonze|bonze]] is a [[wikipedia:Buddhism|Buddhist]] monk or priest in East Asia.
  ** Fittingly, this monster is wielding a [[wikipedia:Khakkhara|khakkhara]], a staff typically carried by Buddhist monks.
  * This card's Japanese name is likely a pun on ''Hitori Bocchi'' (一人ぼっち), the Japanese word for "solitude" or "being alone", as this monster is depicted in a derelict setting as a timid-looking ''boushi'' (法師), a Buddhist priest.
