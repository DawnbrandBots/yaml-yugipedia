title: Card Trivia:Sky Striker Ace = Zero
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sky Striker Special Maneuver - Lemnisgate!]]", and in the second artwork of "[[Sky Striker Mobilize - Linkage!]]".
  * This monster is a combined version of "[[Sky Striker Ace - Raye]]" and "[[Sky Striker Ace - Roze]]".
  ** The [[wikipedia:Double hyphen|double hyphen]] in this monster's name is a reference to this, as both monsters' names feature a normal one.
  ** Fittingly, both monsters are named after [[wikipedia:Mitsubishi A6M Zero|Mitsubishi A6M "Zero"]], an Imperial Japanese fighter aircraft.
