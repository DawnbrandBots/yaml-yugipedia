title: Card Trivia:Hydro Cannon Big Bluefin
wikitext: |-
  {{Navigation}}

  * Four copies of "[[Hydro Blaster Mini Bluefin]]" appear in this card's artwork.
  * A [[Praime]] [[counterpart]] of this monster appears in the artwork of "[[Praime Bluetron Revenge]]".
  * This monster's Japanese name (マグロム, ''Maguromu'') is a portmanteau of the Japanese words for "tuna" (マグロ, ''maguro'') and "magnum" (マグナム, ''magunamu'').
