title: Card Trivia:Infernity Randomizer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Infernity Suppression]]".
  * This monster's Japanese design and effect are based on [[wikipedia:Russian roulette|Russian roulette]], a risky game of chance where a player places a single bullet in a single chamber in the cylinder of a [[wikipedia:Revolver|revolver]] and places the muzzle against their head or body. If the loaded cylinder aligns with the muzzle, the player will be severely injured or killed.
  * In the Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime, [[Kalin Kessler]] mistakenly referred to this card as a [[Tuner monster]].
