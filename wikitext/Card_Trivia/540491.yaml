title: Card Trivia:Fiend Skull Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Burst Breath]]" and "[[The A. Forces]]".
  * This monster shares similarities with "[[Dark Balter the Terrible]]" and "[[Ryu Senshi]]".
  ** All three are [[Fusion Monster]]s who share the same [[original ATK and DEF]] (2000/1200).
  ** All three monsters feature effects that [[negate]] the [[activate|activation]] of certain [[card type]]s.
  ** All three monsters are the physical amalgams of their [[Fusion Material]]s. In this monster's case, it is an amalgam of "[[Cave Dragon]]" and "[[Lesser Fiend]]".
  *** "Cave Dragon": This monster's [[Dragon]] [[Type]], draconian appearance, and color scheme are similar to that of "Cave Dragon's".
  *** "Lesser Fiend": This monster's horns, wings, and four arms are similar to that of "Lesser Fiend's" Japanese artwork.
  **** This monster is likely the result of "Cave Dragon" after being possessed and mutated by "Lesser Fiend".
  * This monster shares similarities with "[[Black Skull Dragon]]".
  ** Both monster are also Fusion Monsters who features the word "Skull" in their names, and their required Fusion Materials are a Dragon and [[Fiend]] monsters.
  * Despite this monster's appearance in ''[[Yu-Gi-Oh! GX Spirit Caller]]'', neither of its Fusion Materials appear in that game.
