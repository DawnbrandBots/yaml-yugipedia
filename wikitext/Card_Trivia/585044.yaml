title: Card Trivia:Duel Link Dragon, the Duel Dragon
wikitext: |-
  {{Navigation}}

  [[File:Crimson Dragon's seal.jpg|thumb|right|250|The [[Crimson Dragon]]'s original seal.]]
  * This monster is a [[retrained]] [[Link Monster|Link]] [[counterpart]] of "[[Ultimaya Tzolkin]]".
  ** This monster is based on the [[Crimson Dragon]].
  *** This monster's pose in this card's artwork is also based on the Crimson Dragon's seal.
  * This is the first Link Monster to require a [[Synchro Monster]] as [[Link Material]].
  * This was the last ''[[Yu-Gi-Oh! Championship Series]]'' prize card to be an [[Effect Monster]].
