  * At the time of its release, this card was tied with "[[Skull Servant]]" for both the lowest [[ATK]] and the lowest [[DEF]] among [[Normal Monster]]s.
  ** This still holds to today among the [[Level 1]] [[Normal Monster]]s outside of "[[Thousand-Eyes Idol]]".
