title: Card Trivia:Poison Draw Frog
wikitext: |-
  {{Navigation}}

  * A ''[[Yu-Gi-Oh!]]'' card appears in this card's artwork, depicted getting caught at the end of this monster's tongue.
  * This monster appears in the artworks of "[[Rain of Frogs]]".
  ** This monster is depicted in the illustration that appears on the body of "[[Flower Cardian Willow with Calligrapher]]".
  * This monster's Japanese name, "Draw Frog" (うらガエル, ''hikigaeru''), is a pun on the Japanese word for "toad" (ヒキガエル, ''hikigaeru'').
  ** This monster's English name is derived from the [[wikipedia:Poison dart frog|poison dart frog]], which, ironically, does not feature the same colorations of a real-life poison dart frog.
