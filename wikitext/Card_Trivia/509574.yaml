title: Card Trivia:Giant Rat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mirror Prison]]", "[[Night Before the Big March]]", and "[[The Big March of Animals]]".
  * This monster has five [[Attribute Summoner]] [[counterpart]]s:
  ** [[WIND]]: "[[Flying Kamakiri 1|Flying Kamakiri #1]]".
  ** [[FIRE]]: "[[UFO Turtle]]".
  ** [[WATER]]: "[[Mother Grizzly]]".
  ** [[DARK]]: "[[Mystic Tomato]]".
  ** [[LIGHT]] "[[Shining Angel]]".
  ** This monster has the highest [[original DEF]] (1450) of all the Attribute Summoners.
