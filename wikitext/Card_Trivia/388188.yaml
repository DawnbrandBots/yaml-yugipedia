title: Card Trivia:Gagaga Guardian
wikitext: |-
  {{Navigation}}

  * This monster can be seen as a [[counterpart]] to "[[Gagaga Gardna]]".
  ** Both are "[[Gagaga]]" monsters who share the same [[Attribute]] ([[EARTH]]), [[Type]] ([[Warrior]]), and [[original DEF]] (2000).
  ** Both share an effect that can [[Special Summon]] themselves from the player's [[hand]] when the opponent's monster declares a direct attack: This monster Special Summons itself in [[Defense Position]], while "Gagaga Gardna" Special Summons itself in [[Attack Position]].
  * This is the only "Gagaga" monster from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime that is not yet released in the ''[[OCG]]''/''[[TCG]]''.
