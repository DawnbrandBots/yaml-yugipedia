title: Card Trivia:Brotherhood of the Fire Fist - Panda
wikitext: |-
  {{Navigation}}
  * This card is named after ''[[wikipedia:Li Jun (Water Margin)|Li Jun]]''.
  ** ''Li Jun'' ranks 26th of the 36 [[wikipedia:Water Margin|Heavenly Spirits]] of the 108 Liangshan heroes and is nicknamed "River Dragon".
  *** Based on his story, it's said that ''Li Jun'' traveled with another person and protect ''[[wikipedia:Song Jiang|Song Jiang]]'' various times, hence its effect to protect "[[Fire Fist]]" monsters and when it's Special Summoned with its own effect, it is accompanied by another "Fire Fist".
