title: Card Trivia:Motor Shell
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on "motor" and "[[wikipedia:Mortar shell|mortar shell]]".
  * In the ''[[Yu-Gi-Oh! R]]'' manga, this card's text specified that its effect [[activate]]s when it is [[destroy]]ed; in the ''[[OCG]]''/''[[TCG]]'', its effect was changed to activate when it is sent to the [[Graveyard]]. 
  ** In the manga, the only time this monster's effect was used was when it was [[destroyed by battle]] by "[[Divine Knight Ishzark (manga)|Divine Knight Ishzark]]"; in the ''OCG''/''TCG'' (but not in the manga), "[[Divine Knight Ishzark]]" has an effect that [[banish]]es any monster that it destroys by battle. As such, in the ''OCG''/''TCG'', it would not be possible to activate this monster's effect if it is destroyed by battle with "Divine Knight Ishzark".
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|R|033|ref}}, specifically from the panel showing [[Motor Shell (manga)|this monster]] being Summoned.
