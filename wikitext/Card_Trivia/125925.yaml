title: Card Trivia:Amazoness Trainee
wikitext: |-
  {{Navigation}}

  * This monster is a younger version of "[[Amazoness Chain Master]]", which is supported by the following:
  ** Both monsters share the same [[Attribute]], [[Level]], [[Type]], [[ATK]] and [[DEF]].
  ** Both monsters share the same clothing color pattern and hairstyle (along with hair color).
  ** Both monsters wield chain-related weaponry.
  * This monster appears in the artwork of "[[Queen's Pawn]]".
