title: Card Trivia:Brave-Eyes Pendulum Dragon
wikitext: |-
  {{Navigation}}

  * Each "[[Pendulum Dragon]]" [[Fusion Monster]] is Summoned utilizing a [[Type]] of monster [[Yuya Sakaki]] used in his Deck, with this card using [[Warrior]] monsters.
  ** Ironically, despite being called "Pendulum Dragon", this card is not a [[Pendulum Monster]], but a [[Fusion Monster]] made up of "[[Odd-Eyes Pendulum Dragon]]" and a Warrior monster. This makes this card (and its counterparts) differ from the other 'normal' evolutions of the [[Four Dimensional Dragons]], as all of them are of the [[card type]] featured in their name.
  * This card has two counterparts:
  ** A [[Spellcaster]]-based counterpart: "[[Rune-Eyes Pendulum Dragon]]".
  ** A [[Beast]]-based counterpart: "[[Beast-Eyes Pendulum Dragon]]".
  * This monster's roar in the ''[[Yu-Gi-Oh! ARC-V]]'' anime is a modified version of the [[Crimson Dragon]]'s roar from the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * In the anime, this card is one of extremely few monsters, if not the only, to have an effect that activated and resolved just before it was Summoned instead of after.
