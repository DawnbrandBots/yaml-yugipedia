title: Card Trivia:Pandemonium
wikitext: |-
  {{Navigation}}

  * In counterclockwise order, "[[Shadowknight Archfiend]]", "[[Infernalqueen Archfiend]]", "[[Terrorking Archfiend]]", "[[Darkbishop Archfiend]]", and "[[Desrook Archfiend]]" appear in this card's artwork.
  * This field appears in the artworks of "[[Altar for Tribute]]", "[[Archfiend General]]", and "[[Mazera DeVille]]".
  * The card's name is a reference to the demonic city in [[wikipedia:John Milton|John Milton]]'s [[wikipedia:Paradise Lost|Paradise Lost]].
