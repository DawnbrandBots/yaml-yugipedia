title: Card Trivia:Machine King Prototype
wikitext: |-
  {{Navigation}}

  * This card follows a four-staged evolution: "[[Machine King - 3000 B.C.]]" > '''Machine King Prototype''' > "[[Machine King]]" > "[[Perfect Machine King]]"
  * As its name and effect suggests, this monster is the prototype of "[[Machine King]]" and "[[Perfect Machine King]]".
