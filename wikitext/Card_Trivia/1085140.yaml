  * "[[Injection Fairy Lily (Rush Duel)|Injection Fairy Lily]]" appears in this card's artwork.

  * This card's artwork seems to be based on a scene from ''[[Yu-Gi-Oh! The Movie: Pyramid of Light]]'' in which "[[Injection Fairy Lily (anime)|Injection Fairy Lily]]" appears to attack [[Joey Wheeler]] (despite the Duel still being on the first turn).
