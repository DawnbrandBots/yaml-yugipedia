title: Card Trivia:Reporter Wars Scoopies (R)
wikitext: |-
  {{Navigation}}

  * "[[High-Speed Machine ENG]]" and "[[Reporter Lilim]]" appear in this card's artwork.
  * This monster, along with "[[Reporter Wars Scoopies]]" and "[[Reporter Wars Scoopies (L)|Reporter Wars Scoopies [L]]]", reference the [[Newspaper Club]] from the ''[[Yu-Gi-Oh! SEVENS]]'' anime, which was formed by [[Scoop Pitman]], [[Masa]], and [[Cub]], who were in charge of producing biased content in the form of newspaper articles.
