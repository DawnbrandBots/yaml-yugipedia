title: Card Trivia:Nitro Warrior
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Yusei]]''.
  * This monster appears in the artworks of "[[Grapple Chain]]", "[[Overflowing Treasure]]", and "[[Synchro Emergency]]".
  * This card is the first [[Level 7]] [[Synchro Monster]].
  * Unlike the other "[[Warrior (archetype)|Warrior]]" Synchro Monsters, this monster does not resemble its "[[Synchron]]" counterpart or any of the other "Warrior" Synchro Monsters.
  * In the English edition of ''[[Duel Terminal 1]]'', this card's Attribute is [[misprint]]ed as [[WIND]] instead of its correct [[FIRE]] Attribute.
  ** This card is one of only two monsters to be erroneously printed with two different [[Attribute]]s, with the other being "[[Cipher Soldier]]".
