title: Card Trivia:Gouki Moonsault
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Moonsault|moonsault]], a technique in [[wikipedia:Professional wrestling|professional wrestling]] which involves performing a backflip and landing on an opponent while facing away from them.
  ** This monster's name and rabbit-like appearance reference the legend of the [[wikipedia:Moon rabbit|Moon rabbit]], a mythical figure in East Asian folklore who is identified by the dark markings on the surface of the [[wikipedia:Moon|Moon]].
