title: Card Trivia:Prediction Princess Coinorma
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "[[wikipedia:Coin|coin]]" (a flat and sometimes round piece of metal used as money and in the method of [[wikipedia:Methods of divination|numismatomancy]] in [[wikipedia:Divination|divination]]) and "[[wikipedia:Gnome|gnome]]" (the elemental of earth in [[wikipedia:Alchemy|alchemy]]).
