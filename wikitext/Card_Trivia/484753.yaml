title: Card Trivia:Sea Monster of Theseus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Return of the Zombies]]".
  * This monster is likely based on the sea monster that appears in the story of [[wikipedia:Theseus|Theseus and his Six Labours]], in which an elderly robber named [[wikipedia:Sciron|Sciron]] would force his victims traveling near [[wikipedia:Megara|Megara]] to walk along a pathway on a narrow cliff-face in order to wash his feet, then kick those travelers off the cliff during the washing so that they were eaten by a sea monster; however, when Theseus encountered Sciron, he managed to push the robber off the cliff instead.
  * This is the first [[Fusion Monster|Fusion]] [[Tuner monster]], as well as the first Fusion Monster to require Tuner monsters as [[Fusion Material]].
  * This card has the shortest [[card text]] of any card by word count, consisting of only two words.
  ** This card's Italian print has the shortest card text of any card by character count, being only seven characters long.
  * The non-English ''[[TCG]]'' prints of this card erroneously omitted its status as a Fusion Monster and a Tuner monster from its card text; Konami later released a notice highlighting the error, with an offer for players to send in their misprinted copies of the card to receive a correctly printed replacement.
