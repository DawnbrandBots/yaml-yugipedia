title: Card Trivia:Superdreadnought Rail Cannon Gustav Max
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Barrage Blast]]" and "[[Upgrade]]".
  * This monster is based on the ''[[wikipedia:Schwerer Gustav|Schwerer Gustav]]'', a German railway gun developed in [[wikipedia:World War II|World War II]].
  ** This monster is also likely based on the ''[[wikipedia:Schwerer Gustav#Langer Gustav|Langer Gustav]]'', a larger German railway gun developed around the same period, but was never completed due to being damaged from bombing raids mid-construction.
  ** This monster's name, "Superdreadnought", is based on the [[wikipedia:Dreadnought#Super-dreadnought|super-dreadnought]] battleship, a more powerful class of dreadnought battleship with larger guns and more armor. This references how railway guns were often armed with surplus naval cannons, especially those of battleships.
  * This monster has a [[retrained]] counterpart: "[[Superdreadnought Rail Cannon Gustav Rocket]]".
  * This is the first [[Rank 10]] [[Xyz Monster]] to be revealed and released in the ''[[OCG]]''/''[[TCG]]''.
  * This is the [[signature card]] of [[Anna Kaboom]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
