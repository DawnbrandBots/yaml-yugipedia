title: Card Trivia:Tohushaddoll Grysta
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Nekroz Cycle]]", "[[Saqlifice]]", and "[[Stellarnova Bonds]]".
  * The prefix "Tohu" in "Tohushaddoll" is derived from the Hebrew word meaning "void".
  * This monster is the damaged form of "[[El Shaddoll Grysta]]".
  * The coined word 影雄 (possible reading: ''eiyū'') in this card's Japanese name is a pun on 英雄 (''eiyū'', "hero"), substituting the character 英 for the homophonous 影 (''ei'', "shadow").
