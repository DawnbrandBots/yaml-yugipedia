title: Card Trivia:Sylvan Princessprite
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Flourishing Frolic]]".
  * This monster's Japanese base name (姫芽宮) is a portmanteau of the words "bud" (芽) and "palace princess" (姫宮).
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "princess" and "sprite".
  * This monster is an [[Xyz Monster|Xyz]] [[counterpart]] of "[[Sylvan Princessprout]]".
  * Unlike the other "[[Sylvan]]" Xyz Monsters ("[[Orea, the Sylvan High Arbiter]]" and "[[Alsei, the Sylvan High Protector]]"), this monster is not based on any of the [[wikipedia:Four Symbols (China)|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]].
