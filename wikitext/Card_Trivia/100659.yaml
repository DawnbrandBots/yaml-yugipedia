title: Card Trivia:Majestic Star Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Stardust Overdrive]]'', as well as one of the cover cards of ''[[Collectible Tins 2009 Wave 2]]''.
  * This monster appears in the artwork of "[[Majestic Absorption]]".
  * This monster is an [[Card evolutions|upgraded]] "[[Majestic]]" form of "[[Stardust Dragon]]".
  * This is the first [[Synchro Monster]] to require another [[Synchro Monster]] as [[Synchro Material]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime and in the ''[[OCG]]''/''[[TCG]]''.
