title: Card Trivia:Stardust Shimmer
wikitext: |-
  {{Navigation}}

  * Judging from the shape of the head and legs, the stardust in this card's artwork appears to form a silhouette of "[[Stardust Dragon]]" or "[[Shooting Star Dragon]]".
  ** The silhouette appears to be made out of plasma and light matter, the same materials that galaxies and nebulae are made of, which reflect the celestial motif that monsters related to "Stardust Dragon" share.
  * This card's effect is somewhat similar to a [[Ritual Summon]] but with a few exceptions:
  ** This card [[target]]s.
  ** This card [[Special Summon]]s the targeted Dragon-Type [[Synchro Monster]] from your [[Graveyard]].
  ** The [[Level]] of the monsters [[banish]]ed by this effect must [[add]] up to the [[Level]] of the [[Dragon]]-[[Type]] [[Synchro Monster]] in the [[Graveyard]].
  * This card is has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Stardust Shimmer]]".
