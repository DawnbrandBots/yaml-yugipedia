title: Card Trivia:Light Dragon @Ignister
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Ignition Assault]]''.
  * This monster appears in the artwork of "[[A.I.'s Show]]".
  * The "[[@Ignister]]" logo is located on the gem on this monster's chest.
  * This monster represents the [[LIGHT]] [[Ignis]], [[Lightning]].
  ** This monster's LIGHT [[Attribute]] and monster-destruction effects reference how certain cards with lightning-themed artwork have effects that [[destroy]] monsters, such as "[[Raigeki]]" and "[[Zaborg the Thunder Monarch]]".
  ** This monster's effects are based on the effects of the two monsters each respectively used by Lightning and [[Varis]] during their Duel: "[[Armatos Legio Magnus Dux]]" and "[[Borreload eXcharge Dragon (anime)|Borreload eXcharge Dragon]]".
  *** This monster and "Magnus Dux" share a similar effect of removing cards from the [[field]] equal to a certain number of monsters: this monster can destroy the opponent's cards equal to the number of "[[@Ignister]]" monsters the player controls, while "Magnus Dux" returns any player's field cards to the hand equal to the number of monsters [[co-linked]] to it.
  **** This monster's ''[[OCG]]''/''[[TCG]]'' protection effect is likely a reference to "[[Armatos Legio Decurion]]", a [[Link Monster]] used by Lightning which protected his monsters by sending it to the [[Graveyard]].
  *** This monster and "Borreload eXcharge Dragon" are both [[Rank 4]] [[Xyz Monster]]s with a draconic appearance and an effect to [[Special Summon]] certain [[Extra Deck]] monsters from the [[Graveyard]]: this monster can Special Summon a Link Monster while "Borreload eXcharge Dragon" can Special Summon a "[[Borrel]]" monster. 
  *** This monster's Special Summon and protection effects are ironic, given how Lightning was the most selfish of the Ignis and his machinations led to their demise.
  * This monster shares a similar design theme with "[[Cyberse Quantum Dragon]]" and "[[Cyberse Clock Dragon]]", as they are all digital dragon-liken monsters with four eyes.
  * This is the only Xyz Monster used in the ''[[Yu-Gi-Oh! VRAINS]]'' anime whose Attribute is not [[DARK]] or [[FIRE]].
