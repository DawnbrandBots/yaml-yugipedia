title: Card Trivia:Destiny HERO - Dunker
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Basketball|basketball player]], where the sport was introduced in England immediately after it was invented, keeping in relation with the European theme of the "[[Destiny HERO]]" [[archetype]].
  ** This monster's name is based on a [[wikipedia:Slam dunk|slam dunk]], a term used for a basketball shot in which the player jumps and scores by forcefully shoving the basketball down through the basket. This is reflected in this monster's appearance, which features springs around its legs and boosters on the soles of its shoes, presumably used to help it jump high and perform a slam dunk.
  ** This monster's effect is a pun on a slam dunk, in which the player must make "dunk" a "[[Destiny HERO]]" monster from the [[hand]] to the [[Graveyard]] in order to "slam dunk" 500 damage to the opponent.
