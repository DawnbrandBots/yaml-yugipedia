title: Card Trivia:Mikanko Shinbu - Noble Twins
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * "[[Uzuhime the Manifested Mikanko]]" and "[[Arahime the Manifested Mikanko]]" appear in this card's artwork.
  * This card's Japanese name is a play on 「{{Ruby|三貴子|みはしらのうずのみこ}}」 (''Mihashira no Uzu no Miko'', lit. "The Three Noble Children"), an expression referring to the three main gods of Japanese mythology: [[wikipedia:Amaterasu|Amaterasu]], [[wikipedia:Tsukuyomi-no-Mikoto|Tsukuyomi]], and [[wikipedia:Susanoo-no-Mikoto|Susanoo]].
