title: Card Trivia:Introduction to Gallantry
wikitext: |-
  {{Navigation}}

  * This card's name is a reference to "[[Goe Goe the Gallant Ninja]]".
  ** This card is similar to "[[Secrets of the Gallant]]", another [[Trap Card]] that references "Goe Goe the Gallant Ninja" and features a conditional effect that forces the opponent to [[discard]] random cards.
