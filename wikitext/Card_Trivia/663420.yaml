title: Card Trivia:A.I.'s Show
wikitext: |-
  {{Navigation}}

  * [[Ai]], "[[Earth Golem @Ignister]]", "[[Light Dragon @Ignister]]", and "[[Wind Pegasus @Ignister]]" appear in this card's artwork.
  ** Fittingly, the three "[[@Ignister]]" monsters mentioned above were the monsters [[Special Summon]]ed by this card's effect in {{episode|VRAINS|118|ref}}.
  * This card's name, artwork, and effect to Special Summon "@Ignister" monsters from the [[Extra Deck]] parody the [[You Show Duel School]] and the [[Pendulum Summon]]ing mechanic from ''[[Yu-Gi-Oh! ARC-V]]''.
  ** This card's artwork features rays of light appearing from the top, referencing how in the ''Yu-Gi-Oh! ARC-V'' anime, Pendulum Summoned monsters appear from an arc-shaped portal in the sky.
  ** This card's effect to Special Summon "@Ignister" monsters from the Extra Deck references how Pendulum Summoning can allow face-up [[Pendulum Monster]]s in the Extra Deck to be Pendulum Summoned in multiples all at once.
