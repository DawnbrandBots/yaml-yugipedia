title: Card Trivia:SPYRAL Sleeper
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[SPYRAL GEAR - Last Resort]]", "[[SPYRAL GEAR - Fully Armed]]", and "[[SPYRAL MISSION - Rescue]]".
  * "SPYRAL GEAR - Fully Armed" appears in this card's artwork.
  * This card's name is a reference to the concept of [[wikipedia:Sleeper agent|sleeper agents]], primarily a sleeper agent in the [[SPYRAL]] organization, as shown by the anti-SPYRAL image shown on his computer screens and access to their technology.
  ** Its effects are reminiscent of sleeper agent tropes. In order: it snuffs out other SPYRALS to make itself more heard, it uses the destruction of its true allies resources to maintain cover and silence or destroy SPYRAL assets, and its endgame leaves the SPYRAL organization in shambles while the prodigal [[SPYRAL Super Agent|agent]] is left to finish the mission.
