title: Card Trivia:Fife and Drum Corps
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Nine copies of "[[Toy Soldier (Tag Force Special)|Toy Soldier]]s" (two of which are only visible by their feet) appear in this card's artwork.
  * This card is based on the [[wikipedia:fife and drum corps|Fife and drum corps]], a military field music ensemble consisting of soldiers who play the fifes and rope tension drums to the march.
