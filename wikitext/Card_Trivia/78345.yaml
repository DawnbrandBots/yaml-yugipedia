title: Card Trivia:Zombie Warrior
wikitext: |-
  {{Navigation}}

  * This card shares the same [[Level]] (3) [[Type]] ([[Zombie]]), [[ATK]] (1200), and [[DEF]] (900) with "[[The 13th Grave]]".
  ** Both cards are [[non-Effect Monster]]s, although this card is a [[Fusion Monster]] and "The 13th Grave" is a [[Normal Monster]].
  * This card, "[[Barox]]", "[[Bickuribox]]", "[[Flame Swordsman]]", "[[Giltia the D. Knight]]", and "[[Labyrinth Tank]]" are the only [[Normal Monster]]s whose [[Monster Card|Monster]] [[Card type]]s were changed to Fusion Monster upon their release in the ''[[OCG]]''/''[[TCG]]''.
  ** Notably, these are all monsters [[Summon]]ed in the [[Duelist Kingdom (arc)|Duelist Kingdom arc]] in the original [[Yu-Gi-Oh! (manga)|Yu-Gi-Oh! manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  ** This is also the only Normal Monster Summoned by [[Yugi Muto]] whose card type was changed to Fusion Monster type in the ''OCG''/''TCG''.
