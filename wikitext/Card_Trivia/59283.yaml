title: Card Trivia:Dimension Dice
wikitext: |-
  {{Navigation}}

  * "[[Orgoth the Relentless]]" appears in this card's artwork.
  * This card's name is based on the phrase "Dimension the Dice!", which was used prominently in ''[[Dungeon Dice Monsters]]'' when a player Summoned a monster by unfolding their die into a cube net, as depicted in this card's artwork.
  * This card has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any [[Normal Spell Card]], released over 20 years after its first appearance in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime on May 14, 2002.
