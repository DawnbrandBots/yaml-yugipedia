title: Card Trivia:Valkyrie Erda
wikitext: |-
  {{Navigation}}

  * This card is named after Erda from ''[[wikipedia:Der Ring des Nibelungen|Der Ring des Nibelungen]]'', who is based on [[wikipedia:Jörð|Jörð]], the [[wikipedia:Norse mythology|Norse]] Goddess of the Earth.
  * This is one of the [[cover card]]s of ''[[Extra Pack 2019]]''.
