title: Card Trivia:Cipher Wing
wikitext: |-
  {{Navigation}}

  * This monster can be considered the "emblem" or "symbol" of the "[[Cipher]]" [[archetype]], as it appears on their "[[Rank-Up-Magic]]" [[Spell Card]]s: "[[Rank-Up-Magic Cipher Ascension|Cipher Ascension]]", "[[Rank-Up-Magic Cipher Pursuit|Cipher Pursuit]]", and "[[Rank-Up-Magic Cipher Shock|Cipher Shock]]".
