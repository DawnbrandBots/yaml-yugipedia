title: Card Trivia:Windwitch Chimes
wikitext: |-
  {{Navigation}}

  * "[[Windwitch - Ice Bell]]" and "[[Windwitch - Glass Bell]]" appear in this card's artwork.
  * This card's effect and Japanese name are similar to a hybrid of the [[Yu-Gi-Oh! ARC-V|anime-exclusive]] cards: "[[Call of the Windwitch]]" and "[[Chime of the Wind]]".
  ** This card's artwork closely resembles "Call of the Windwitch".
