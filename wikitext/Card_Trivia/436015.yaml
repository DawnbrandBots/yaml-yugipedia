title: Card Trivia:Zoodiac Ramram
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zodiac Sign]]" and "[[Zoodiac Barrage]]".
  * This monster is based on the [[wikipedia:Chinese Zodiac|Chinese Zodiac]] sign of the [[wikipedia:Goat (zodiac)|Goat]].
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018474187030790181 Bilibili] and [https://weibo.com/7406309913/5119093242072514 Weibo] at 2:00 PM (China Standard Time) on January 4, 2025, which was the fourth quarter of the Wei hour in the traditional Chinese timekeeping system.
