title: Card Trivia:Showering Seaferno
wikitext: |-
  {{Navigation}}

  * This monster's name is likely a pun on the name of the 1974 American disaster film, ''[[wikipedia:The Towering Inferno|The Towering Inferno]]''.
  ** Fittingly, this card's artwork features flames, which was created by an electrical short in the film.
