title: Card Trivia:Digital Bug Scaradiator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bug Matrix]]".
  * This monster's name and appearance are puns on "[[wikipedia:Scarabaeidae|scarab]]" (a family of over 30,000 species of [[wikipedia:Beetle|beetles]]) and "[[wikipedia:Radiator#Electronics and computers|radiator]]" (a heat exchanger used for the purpose of cooling electronics, including computers, whereas this monster's appearance is based on a small radiator made up of a [[wikipedia:Computer fan|computer fan]] combined with a [[wikipedia:Heat sink|heat sink]]).
