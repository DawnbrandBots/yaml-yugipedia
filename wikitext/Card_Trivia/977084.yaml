title: Card Trivia:Horned Saurus
wikitext: |-
  {{Navigation}}

  * The required [[Type]]s for this monster's secondary [[Fusion Material]] in the ''[[OCG]]''/''[[TCG]]'' reference how the traditional Japanese word for "dragon" (竜, ''ryu'') is featured in the Japanese name of the [[Dinosaur]] Type (恐竜, ''Kyōryū'' lit. "Fearsome Dragon"), as opposed to the name of the [[Dragon]] Type (ドラゴン, ''Doragon'').
  ** This also references [[Rex Raptor]], whose Japanese name, "Dinosaur Ryuzaki" contains the kanji ''ryū'' (竜) and uses a Dinosaur/Dragon [[Deck]] during the [[Waking the Dragons]] arc in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This monster's ''OCG''/''TCG'' effect to place a [[Field Spell Card]] into the [[Field Zone]] is designed to allow it to be played alongside "[[The Seal of Orichalcos]]", despite that card's restrictions, since it was used alongside it in {{episode|Yu-Gi-Oh!|161|ref}}. In the episode, Rex Raptor [[Fusion Summon]]ed [[Horned Saurus (anime)|this monster]] while he controlled "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]", which is the only time in the anime that a character Fusion Summoned while controlling "The Seal of Orichalcos".
  ** In the ''OCG''/''TCG'', "The Seal of Orichalcos" [[destroy]]s all [[Special Summon]]ed monsters when [[activate]]d, and prevents its controller from Special Summoning from the [[Extra Deck]] while active (the latter inspired by the fact that most Duelists did not Fusion Summon while controlling it in the anime).<ref>{{cite web | url = https://yugiohblog.konami.com/articles/?p=4229 | title = Yu-Gi-Oh! TRADING CARD GAME » The Seal of Orichalcos: The Fourth & Fifth Lines | author = [[Kevin Tewart]] | website = yugiohblog.konami.com | publisher = Konami | date = September 7, 2012 | accessdate = March 30, 2025}}</ref> This effect allows "Horned Saurus" and "The Seal of Orichalcos" to be on the [[field]] together, as the effect of "The Seal of Orichalcos" to destroy Special Summoned monsters does not apply if it is placed on the field rather than being activated; however, it is still not possible to Fusion Summon "Horned Saurus" while "The Seal of Orichalcos" is active, as Rex did in the anime.
  * This monster has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of all Extra Deck monsters, released nearly 20 years after its first appearance in the ''Yu-Gi-Oh!'' anime on June 24, 2003.

