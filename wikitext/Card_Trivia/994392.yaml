  * This card is a ''[[Rush Duel]]'' [[Masked Noodle]] parody of "[[The Masked Beast]]".
  ** When this card is [[Special Summon]]ed by the [[effect]] of "[[Curse of the Masked Feast]]", its [[ATK]] increases to 3200, the same amount as "The Masked Beast".
