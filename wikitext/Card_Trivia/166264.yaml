title: Card Trivia:Gem-Knight Iolite
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Iolite|iolite]], also known as cordierite.
  * This card, along with "[[Gem-Knight Amber]]", are the first "[[Gem-Knight]]" [[Gemini monster]]s.
  ** The effects of this card and "Gem-Knight Amber" effects are designed meant to work in tandem, as each can recycle "[[Gem-Knight]]" monsters that were sent  to the [[Graveyard]] or [[banished]] for the cost of the other monster's effect.
  * This card, along with "Gem-Knight Amber", are the fourth and fifth Gemini monsters to be part of an [[Archetype]]. The others are "[[Alien Hypno]]", "[[Ancient Gear Knight]]" and "[[Elemental HERO Neos Alius]]".
  ** They also are the first non-reprint Gemini monsters released in [[Duel Terminals|Duel Terminal]], as well as the first Gemini monsters to be a part of a Duel Terminal archetype.
