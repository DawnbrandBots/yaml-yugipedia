title: Card Trivia:Elemental HERO Terra Firma
wikitext: |-
  {{Navigation}}

  * This card is based on the planet [[wikipedia:Earth|Earth]], the third planet in the [[wikipedia:Solar System|Solar System]].
  ** This card's ''[[TCG]]'' name, "Terra Firma", is the Latin phrase for "solid earth", further referencing the planet Earth.
  * This is the [[signature card]] of [[Jaden Yuki (manga)|Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  ** This card is also the manga counterpart to "[[Elemental HERO Neos]]", the signature card of [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** Both monsters are [[Warrior]] monsters with 2500 [[ATK]] and 2000 [[DEF]].
  *** Both monsters are centered around [[Fusion Summon]]ing, as this card is a [[Fusion Monster]], and "Neos" can create [[Contact Fusion]] monsters.
  *** Both monsters feature a space theme, as this card represents the planet Earth, and "Neos" represents outer space.
  ** As a [[Fusion Monster]], it is the first signature card of a main protagonist to originate from the [[Extra Deck]] instead of the [[Main Deck]].
  * This card's [[Fusion Material]]s are a reference to how the planet Earth primarily consists of two elements: [[WATER]], and [[EARTH]].
  ** Fittingly, this card's [[ATK]] is the combined of the WATER "[[Elemental HERO Ocean]]" and the EARTH "[[Elemental HERO Woodsman]]".
  * This card has the same [[ATK]] of 2500 as the signature cards of other main manga protagonists, which are [[Yugi Mutou (manga)|Yugi Mutou]]'s "[[Dark Magician (manga)|Dark Magician]]", [[Yusei Fudo (manga)|Yusei Fudo]]'s "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]", [[Yuma Tsukumo (manga)|Yuma Tsukumo]]'s "[[No. 39: Utopia (manga)|No. 39: Utopia]]", [[Yuya Sakaki (manga)|Yuya Sakaki]]'s "[[Odd-Eyes Phantom Dragon (manga)|Odd-Eyes Phantom Dragon]]", [[Tatsuhisa Kamijo (manga)|Tatsuhisa Kamijo]]'s "[[Multistrike Dragon Dragias (manga)|Multistrike Dragon Dragias]]" and [[Yudias Velgear (manga)|Yudias Velgear]]'s "[[Galactica Oblivion (manga)|Galactica Oblivion]]". Among them, this is the only one whose Attribute is EARTH and not [[LIGHT]] or [[DARK]].
  * This is the first member of the [[Legendary Planet]] series to appear in the manga.
  ** This is also the only Legendary Planet to be a Fusion Monster, whereas the others are [[Effect Monster]]s.
  ** This is also the only Legendary Planet to belong to an [[archetype]], that being the "[[Elemental HERO]]" archetype.
  ** This is also the only Legendary Planet to not have its name in the Japanese version written exclusively in English alphabet characters and punctuation.
  ** This is also the only Legendary Planet to have its name deviate from the standard naming pattern. In the ''[[OCG]]'', the naming patterns features "The (adjective) (planet name)" while this card's ''TCG'' name doesn't feature such a naming pattern. Following that pattern, this card would have been named "The E-HERO EARTH" in the ''OCG'' and "Elemental HERO Earth" in the ''TCG''.
  * This card has an upgraded form: "[[Elemental HERO Core]]".
  ** It has a similar design and color scheme as this card, as well as the same [[Attribute]] and [[Type]], but with 1 [[Level]] higher and 200 more ATK and [[DEF]].
  ** This card's final effect can be used to [[Special Summon]] this card from the [[Graveyard]].
  ** Additionally, "Core" and "Terra Firma" are both played by [[Koyo Hibiki]] in the ''Yu-Gi-Oh! GX'' [[Yu-Gi-Oh! GX - Chapter SP1|sequel chapter]].
  ** Also, since this card is part of the Legendary Planet series and its name refers to the planet Earth, "Core", is a reference to the Earth's [[wikipedia:Inner core|inner core]].
  * This card is the polar opposite counterpart of its fellow Legendary Planet, "[[The Grand Jupiter (manga)|The Grand Jupiter]]".
  ** Both monsters feature opposite color schemes and their respective planetary spheres in their artworks. This monster features a white color scheme and features the planet Earth in the background of this card's artwork, while "Jupiter" features a darker color scheme and the planet [[wikipedia:Jupiter|Jupiter]] inside its body.
  ** Both cards feature completely opposite effect. While this card can willingly sacrifice an "[[Elemental HERO]]" monster to gain its [[ATK]] and an advantage, "Jupiter"  can equip an opponent's monster allows its owner to forcefully gain an advantage.
  ** Both cards' respective owners in the manga are rivals with opposing personalities, with this card being owned by Jaden Yuki, while "Jupiter" is owned by [[Aster Phoenix (manga)|Aster Phoenix]]. Additionally, each character uses a "[[HERO]]" Deck of a different playing style and having personalities at odds with one another, reinforcing the opposite concepts of this monster and "Jupiter", despite both belonging to the Legendary Planet series.
  ** Finally, this monster and the "Masked HERO" monsters used by Jaden in the manga is based on the ''[[wikipedia:Kamen Rider Series|Kamen Rider]]'' franchise while "Jupiter" is based on [https://powerrangers.fandom.com/wiki/Thunder_Megazord_(Mighty_Morphin) Thunder Megazord]/[https://powerrangers.fandom.com/wiki/Gosei_Gattai_Dairen'Oh Gosei Gattai Dairen'Oh] from the ''[[wikipedia:Power Rangers|Power Rangers]]''/''[[wikipedia:Super Sentai|Super Sentai]]'' series (specifically the sphere on the body and the head).
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|GX|003|ref}}, specifically from the panel showing [[Elemental Hero Terra Firma (manga)|this monster]] being Summoned, albeit with its legs spread apart.
