title: Card Trivia:The Winged Dragon of Ra - Immortal Phoenix
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Millennium Pack]]'' and ''[[Millennium Pack: Lite Edition]]''.
  * This monster is based on the Phoenix Mode of "[[The Winged Dragon of Ra]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  ** The monster's effect to [[Special Summon]] itself from the [[Graveyard]] references the same overall strategy of [[Dark Marik (manga)|Dark Marik]] ([[Yami Marik]] in the anime), where he would regularly send "[[The Sun Dragon Ra]]" ("[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]" in the anime) to the [[Graveyard]] by various card effects, and then Special Summon it using "[[Monster Reborn (manga)|Monster Reborn]]" (and its [[Monster Reborn (anime)|anime counterpart]]), and transform it into its Phoenix Mode.
  ** This monster's effect to Special Summon "[[The Winged Dragon of Ra - Sphere Mode]]" by [[send]]ing itself to the Graveyard at the [[End Phase]] references a scene during [[Dark Yugi and Dark Marik's Duel (manga)|Dark Yugi and Dark Marik's Duel]] and its [[Yami Yugi and Yami Marik's Duel|anime adaptation]] in the ''Yu-Gi-Oh!'' manga and anime, where Marik [[activate]]s "[[Surprise Attack from the Darkness (manga)|Surprise Attack from the Darkness]]" ("[[Surprise Attack from Beyond]]" in the anime) to repeat his [[Battle Phase]] at the End Phase (during which "Ra", in its Phoenix Mode, is sent to the Graveyard as it was Special Summoned) and Special Summon "Ra" back in its Sphere Mode.
  * Despite how the names of the other "[[The Winged Dragon of Ra (archetype)|The Winged Dragon of Ra]]" monsters were translated in the ''[[TCG]]'' keeping the names used in the English dub of the ''Yu-Gi-Oh!'' anime, this monster's name was translated as "Immortal Phoenix" when it was released in the ''TCG'' in 2016, as opposed to keeping "Egyptian God Phoenix" from the dub.
