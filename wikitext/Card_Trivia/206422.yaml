title: Card Trivia:Neverending Nightmare
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Dark Assailant]]" and "[[Laval Lancelord]]" appear in this card's artwork.
  * This card's Japanese name, "The One Crawling into Naraku", is derived from [[wikipedia:Naraka (Buddhism)|Naraka]], a term in [[wikipedia:Buddhist cosmology|Buddhist cosmology]] often equivocated to "layer of hell" or "purgatory" in English. A being is only born into a Naraka as a direct result of accumulated karma rather than a divine judgment or punishment, and will only remain in that Naraka for a finite (albeit incomprehensibly long) period of time before its rebirth.
