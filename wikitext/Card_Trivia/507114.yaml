  * This monster is the "[[Evil HERO]]" counterpart to "[[Elemental HERO Rampart Blaster]]".
  ** Both monsters share the same [[Level]] (6), [[original ATK and DEF]] (2000/2500), and an effect focused on dealing damage while in [[Defense Position]].
