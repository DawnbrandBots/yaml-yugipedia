title: Card Trivia:Return of the Red-Eyes
wikitext: |-
  {{Navigation}}

  * "[[Black Metal Dragon]]" and "[[Red-Eyes Black Flare Dragon]]" appear in this card's artwork.
  ** This card's artwork depicts "Red-Eyes Black Flare Dragon" fusing with "Black Metal Dragon" to become "[[Red-Eyes Flare Metal Dragon]]".
  ** This is supported by the pun in this card's Japanese name: 「凱旋」 (''gaisen'') means "triumphant return," but this card uses 「鎧旋」 (''gaisen'') in its name, replacing the "''gai''" with a "''gai''" meaning "armor."
