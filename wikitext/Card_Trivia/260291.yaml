title: Card Trivia:Armored Kappa
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Power Stream]]".
  * The background of this card's artwork features green cascading texts, similar to the [[wikipedia:Matrix digital rain|Matrix digital rain]] in the [[wikipedia:The Matrix (franchise)|''Matrix'' franchise]].
  * This monster is the [[retrained]] [[Xyz Monster]] [[counterpart]] of "[[Psychic Kappa]]".
  ** This monster's [[Psychic]] [[Type]] references the naming scheme of "Psychic Kappa".
  ** Also, "Psychic Kappa" can be used as this monster's [[Xyz Material]].
  * This is the first [[Rank 2]] [[WATER]] Xyz Monster.
  * This is the first Xyz Monster to feature an effect that can be activated [[only once per Duel]].
  * This card's Spanish print features a small typo, as the line "''los monstruos que controles no pueden ser destruido en batalla''" ("''monsters you control cannot be destroyed by battle''") should be "''los monstruos que controles no pueden ser destruido'''s''' en batalla''" instead.
