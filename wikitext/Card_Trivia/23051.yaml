title: Card Trivia:Bracchio-raidus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cold Wave]]", "[[Heat Wave]]", and "[[Lost World]]".
  * This monster is based on the ''[[wikipedia:Brachiosaurus|Brachiosaurus]]'', a genus of four-legged sauropod dinosaur known for its long neck.
  * This is the first [[WATER]] [[Dinosaur]] monster in the ''[[OCG]]''; in the ''[[TCG]]'', however, it is "[[Kabazauls]]".
  * In the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game series, this monster's [[flavor text]] mentions that it attacks by stomping; however, in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', it attacks with a tail swipe.
