  * This card's artwork depicts the inside of "[[Prank-Kids Place]]". The mild-mannered form of "[[Prank-Kids Battle Butler]]" and a large number of "[[Prank-Kids Lampsies]]", "[[Prank-Kids Fansies]]", and "[[Prank-Kids Dropsies]]" also appear in it.
