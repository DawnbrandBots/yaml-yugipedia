title: Card Trivia:Buster Whelp of the Destruction Swordsman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Destruction Sword Memories]]", "[[Dragon Buster Destruction Sword]]", "[[Prologue of the Destruction Swordsman]]", "[[Robot Buster Destruction Sword]]", and "[[Wizard Buster Destruction Sword]]"
  * This monster is a younger version of "[[Buster Dragon]]".
  * This monster has a retrained [[Link Monster|Link]] version: "[[Protector Whelp of the Destruction Swordsman]]".
