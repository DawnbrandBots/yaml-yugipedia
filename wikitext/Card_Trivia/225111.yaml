title: Card Trivia:Brotherhood of the Fire Fist - Horse Prince
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is based on ''[[wikipedia:List of Water Margin characters|Hong Xin]]'' (read in Japanese as Kō Shin) and "horse" (hōsu).
  ** ''[[wikipedia:Emperor Renzong|Emperor Renzong]]'' sent ''Hong Xin'' to seek Celestial Master Zhang to help them in combating a plague. After completing his mission and before returning to the capital, he visits the temple near where the Master resides and unsuspecting releases 108 demons trapped in a secret chamber for centuries.
  *** This explains the beginning of the "[[Fire Fist]]" archetype, "Hoshin" being the first monster being released; ''Hong Xin'' released the 108 [[wikipedia:Water Margin|Liangshan heroes]].
  ** On the other hand, this card's Chinese name contains the character 進 (''jìn'') which references to other characters, probably [[wikipedia:Chai Jin|Chai Jin]], [[wikipedia:Shi Jin|Shi Jin]] or [[wikipedia:List of Water Margin characters|Wang Jin]].
  * This was the 1st of the 3 Magazine Promo "Fire Fist" monsters to be revealed; the 2nd was "[[Brotherhood of the Fire Fist - Lion Emperor]]"; and the 3rd was "[[Brotherhood of the Fire Fist - Spirit]]".
  ** Unlike the rest of the "Fire Fist" monsters, these 3 cards are not members of the 108 Liangshan heroes, however they are still characters in the novel.
  * This monster appears in the artwork of "[[Grisaille Prison]]".
