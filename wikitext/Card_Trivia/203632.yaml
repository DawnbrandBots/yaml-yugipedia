title: Card Trivia:Message in a Bottle
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts three bright shining stars, which reflects the three monsters [[Special Summon]]ed by this card's effect.
  * This card's ''[[TCG]]'' name is based on a [[wikipedia:Message in a bottle|message in a bottle]], a form of communication whereby a written message is sealed in a container and released into the sea or ocean.
