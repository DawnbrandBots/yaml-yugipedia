title: Card Trivia:D-Scale Battle Coela
wikitext: |-
  {{Navigation|mode=NonGame}}

  * This monster is based on the [[wikipedia:Coelacanth|coelacanth]], a species of large [[wikipedia:Preadatory fish|predatory fish]].
  ** Ironically, despite the "[[D-Scale]]" [[Link Monster]]s being based on extinct species of predatory fish, the coelacanth was thought to have been extinct until its discovery in 1938.
