title: Card Trivia:Xing Zhen Hu Replica
wikitext: |-
  {{Navigation}}

  * This card is a [[counterpart]] of "[[Xing Zhen Hu]]".
  ** This card is based on the [[soul-eating jar]], an item featured in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, which contains the cursed [[Dragon Cards]]. 
  *** This card's artwork is taken from the omake page of {{chapter|Yu-Gi-Oh!|046|ref}} showing the soul-eating jar.
  *** This card's name (心鎮壷 - ''Xīn Zhēn Hú'') is Chinese for "Jar of Soul Suppression", and it being a "replica" references how its effect to "replicate" the effect of "Xing Zhen Hu" to "suppress" the [[activate|activation]] of a [[Spell]]/[[Trap Card]]s on the [[field]].
  * "''Shin tsen fū''" (''xin zhen hu'') is an example of Japanese readings highly approximating to Chinese readings, more than [[wikipedia:On'yomi|on'yomi]]. Other Chinese-style-read Japanese words have been known so far include "''kyonshī''" ("[[Master Kyonshee]]"), "''nyan''" ("[[Thunder Nyan Nyan]]"), "''wanfū''" ("[[King Tiger Wanghu]]"), and "''xiaolong''" ("[[Stardust Xiaolong]]").
