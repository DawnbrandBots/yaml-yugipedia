title: Card Trivia:Shafu, the Wheeled Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[How Did Dai Get Here?]]".
  * This monster is the human form of ''[[wikipedia:Oboroguruma|Oboroguruma]]'', a ''[[wikipedia:Yōkai|yōkai]]'' in [[wikipedia:Japanese folklore|Japanese folklore]] that takes the form of a ghostly oxcart with a face on it. This monster's name is based on the Japanese word for "coachman" (しゃふ, ''shafu'').
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form: "[[Oboro-Guruma, the Wheeled Mayakashi]]".
