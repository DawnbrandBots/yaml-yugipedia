title: Card Trivia:Bujintei Kagutsuchi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bujintervention]]" and "[[Bujinunity]]".
  * This monster is based on ''[[wikipedia:Kagu-tsuchi|Kagutsuchi]]'', the [[wikipedia:Shinto|Shinto]] god of fire.
  * This monster is "[[Bujin Mikazuchi]]" [[equip]]ped with "[[Bujingi Ibis]]" (as its sword), "[[Bujingi Crow]]" (as its shield), "[[Bujingi Boar]]" (as its armor), and "[[Bujingi Centipede]]" (as its wings).
  ** Curiously, this monster cannot be Summoned by any combination of those monsters without [[Type]]-changing cards.
