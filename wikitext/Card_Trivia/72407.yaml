title: Card Trivia:Magic Jammer
wikitext: |-
  {{Navigation}}

  * A circle of 4 mirror images of the top right quarter of the "[[Dark Magical Circle]]" appears in this card's artwork.
  * This card has a [[Trap Card]]-negating counterpart, "[[Trap Jammer]]", but it requires no cost to activate and can only be activated during the [[Battle Phase]].
