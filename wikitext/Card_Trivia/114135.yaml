title: Card Trivia:For Our Dreams
wikitext: |-
  {{Navigation|mode=othergame}}

  * "[[Guardian Angel Joan]]" and two copies of "[[The Wandering Doomed]]" appear in this card's artwork.
  ** This card's artwork is a reference to "[[wikipedia:Liberty Leading the People|La Liberté guidant le peuple]]" ("Freedom leading the people" in French) a famous painting by Eugène Delacroix depicting the July Revolution of 1830.
  * This card's video game effect requiring the player to [[Tribute]] a [[Warrior]] monster to prevent another Warrior monster from beind [[destroyed by battle]] is an alteration of its effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which allows the player to Tribute a monster they control to prevent another monster they control from being destroyed by battle. In {{episode|5D's|072|ref}}, this card's effect was used to Tribute "[[Apprentice Knight]]" and prevent "[[Fleur de Chevalier (anime)|Fleur de Chavalier]]" from being destroyed by battle, both of which are Warrior monsters.
