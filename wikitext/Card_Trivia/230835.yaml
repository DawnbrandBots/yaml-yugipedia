title: Card Trivia:Heraldic Beast Aberconway
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Advanced Heraldry Art]]" and "[[Heraldry Change]]".
  * This monster is based on the dragon used as a [[wikipedia:Heraldry|heraldry]] [[wikipedia:Charge (heraldry)|charge]], which is often depicted as a winged, horned serpent who breathes fire.
  ** This monster's name is likely based on the [[wikipedia:Baron Aberconway|Baron Aberconway]], a title in the [[wikipedia:Peerage of the United Kingdom|Peerage of the United Kingdom]].
  * A variant of the [[wikipedia:Maltese cross|Maltese cross]] symbol appears on this monster's snout.
