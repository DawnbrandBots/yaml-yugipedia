title: Card Trivia:Raidraptor - Arsenal Falcon
wikitext: |-
  {{Navigation}}

  * "[[Raidraptor - Fuzzy Lanius]]", "[[Raidraptor - Pain Lanius]]", "[[Raidraptor - Sharp Lanius]]", "[[Raidraptor - Singing Lanius]]", "[[Raidraptor - Tribute Lanius]]", and "[[Raidraptor - Vanishing Lanius]]" appear in this card's artwork.
  ** All of the aforementioned monsters (except "Pain Lanius") can be [[Summon]]ed with this card's effect to [[Special Summon]] a [[Level 4]] [[Winged Beast]] monster from the player's [[Deck]].
  * This monster is based on an [[wikipedia:Airborne aircraft carrier|airborne aircraft carrier]], a type of mother ship aircraft which can carry, launch, retrieve and support other smaller aircraft.
