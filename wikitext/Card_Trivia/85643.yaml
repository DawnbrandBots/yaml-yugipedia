title: Card Trivia:Rare Fish
wikitext: |-
  {{Navigation}}

  * This monster has a [[recolored counterpart]]: "[[Marine Beast]]".
  ** Both are [[Fusion Monster]]s that are recolored counterparts of each other.
  ** Both are the last remaining Non-Effect Fusion Monsters to be imported to the ''[[TCG]]'', via tournament packs.
  * This is the first Fusion Monster to list another Fusion Monster as a [[Fusion Material]].
