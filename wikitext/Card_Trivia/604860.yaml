title: Card Trivia:Wynn the Wind Charmer, Verdant
wikitext: |-
  {{Navigation}}

  * This card is a [[Link Monster|Link]] [[counterpart]] of "[[Wynn the Wind Charmer]]".
  * Either this monster or "Wynn the Wind Charmer" appears in the artworks of "[[Charmer Quartet in Bloom]]", "[[Grand Spiritual Art - Ichirin]]", and "[[Spirit Charmers]]".
  ** This monster's familiar also appears in the artwork of "[[Wynn the Wind Channeler]]".
