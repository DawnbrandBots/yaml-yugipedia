title: Card Trivia:Roaring Firestorm Volcalize Phoenix
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Phoenix of the Roaring Flame]]''.
  * This monster appears in the artwork "[[Maximum Flare Fusion]]".
  ** This monster appears in the artworks of "[[Chemicalize Devil Burst]]" and "[[Chemicalize Tropos Rapier]]" in [[Maximum Mode]] (together with "[[Roaring Firestorm Volcalize Phoenix (L)|Roaring Firestorm Volcalize Phoenix [L]]]" and "[[Roaring Firestorm Volcalize Phoenix (R)|Roaring Firestorm Volcalize Phoenix [R]]]").
  * This monster's Japanese title (''Kagōran'ō'') is a pun on the Japanese term for a "chemical compound" (''kagōbutsu''), reflecting how this monster and its components are [[Maximum Monster]]s that combines three different [[Monster Card]] [[Type]]s: [[Pyro]], [[Thunder]], and [[Aqua]].
  ** In this sense, this monster, along with "Volcalize Phoenix [L]" and "Volcalize Phoenix [R]", are the first Maximum Monsters to have different Types among each other; this monster is Pyro Type, while the aforementioned monsters are Thunder Type and Aqua Type, respectively.
