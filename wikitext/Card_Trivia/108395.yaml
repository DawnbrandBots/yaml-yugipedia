title: Card Trivia:Codarus
wikitext: |-
  {{Navigation}}

  * This card is an "infant" version of "[[Levia-Dragon - Daedalus]]".
  ** "Daedalus"'s Japanese name is "Daidalos", and "dai" happens to be an [[wikipedia:Kanji|on'yomi]] of the kanji 大 meaning "big". This is the basis of "Codarus"'s Japanese name, "Kodalos", which is a pun on 小 (''ko'' "small") or 子 (''ko'' "child") and "dalos".
