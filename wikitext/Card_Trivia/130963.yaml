title: Card Trivia:D2 Shield
wikitext: |-
  {{Navigation}}

  * "[[Twin-Shield Defender]]" appears in this card's artwork.
  ** Despite the aforementioned monster being used by [[Jack Atlas]], in the ''[[Yu-Gi-Oh! 5D's]]'' anime, this card was used by his rival, [[Yusei Fudo]].
  * This card's name is a double pun, as it '''doubles''' a monster's [[DEF]], and its artwork depicts the aforementioned "'''Twin-Shield''' Defender".
