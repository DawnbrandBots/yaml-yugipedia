title: Card Trivia:Familiar-Possessed - Wynn
wikitext: |-
  {{Navigation}}

  * This monster is a powered-up form of "[[Wynn the Wind Charmer]]".
  * This monster appears in the artworks of "[[Awakening of the Possessed]]", "[[Awakening of the Possessed - Rasenryu]]", and, "[[Possessed Partnerships]]".
  * "[[Ranryu]]" appears in this card's artwork as the monster's familiar.
