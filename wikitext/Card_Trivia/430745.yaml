title: Card Trivia:Fortissimo
wikitext: |-
  {{Navigation}}

  * "[[Soprano the Melodious Songstress]]" appears in this card's artwork.
  * This card is named after "fortissimo", a [[wikipedia:Dynamics (music)|musical dynamic]] that indicates something should be played "very loud."
  ** The "ff" in this card's artwork is based on the symbol of the contracted form of "fortissimo".
