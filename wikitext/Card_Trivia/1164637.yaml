  {{Navigation}}

  * This monster is the [[signature move]] counterpart of "[[Neo Galaxy-Eyes Photon Dragon]]".
  ** This monster's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|effect name]] of "[[Neo Galaxy-Eyes Photon Dragon (anime)|Neo Galaxy-Eyes Photon Dragon]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime: "Photon Howling".
