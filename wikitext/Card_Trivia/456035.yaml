title: Card Trivia:Torque Tune Gear
wikitext: |-
  {{Navigation}}

  * This is the first [[Tuner monster|Tuner]] that is also a [[Union monster]].
  * The visible coloured gears on this monster imply a relationship between it and the "[[Geargiano]]" monsters.
  ** This is confirmed by the fact that this monster appears in the artwork of "[[Transmission Gear]]" ('equipped' to "[[Geargiaccelerator]]").
