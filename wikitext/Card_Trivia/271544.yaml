title: 'Card Trivia:Number 102: Star Seraph Sentry'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Star Seraph Starstream]]".
  * This card's Japanese name, "Holy Lightning - Glorious Halo", is based on the [[wikipedia:Halo (religious iconography)|halo]], a mythological ring of light surrounding or associated with holy figures.
  * This card has a "[[Number C10X]]" [[Card evolutions|upgraded]] form: "[[Number C102: Archfiend Seraph]]".
  * This is the [[signature card]] of [[Dumon]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
