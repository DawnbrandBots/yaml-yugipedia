title: Card Trivia:Fiendsmith's Lacrima
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fiendsmith in Paradise]]".
  * A ghostly image of "[[Lacrima the Crimson Tears]]" (on the upper right corner) appears in this card's artwork.
  ** This monster is likely the combined form of "[[Fiendsmith Engraver]]" and "Lacrima the Crimson Tears". This is supported by both its name and the "[[Fiendsmith]]" lore.
  * This monster is named after the ''[[wikipedia:Lacrimosa|Lacrimosa]]'', a portion of the "[[wikipedia:Dies irae|Dies irae]]" poem used for the [[wikipedia:Funeral|funeral]] or the [[wikipedia:Requiem|Requiem Mass]] for the dead.
  * This card currently holds the record of being the card that became [[Forbidden]] the quickest after its release (not counting cards that were Forbidden immediately upon their release such as "[[Temple of the Kings]]"), being legal for only 46 days after its release in the ''[[TCG]]''.
