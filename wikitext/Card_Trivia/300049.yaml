title: Card Trivia:Foaming Beauty
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Foaming Beauty - Champagne", is based on [[wikipedia:Champagne|champagne]], a luxurious sparkling wine famous for its foaminess.
  ** While the references of this monster's Japanese name has been dropped in the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's English name, "Foaming Beauty" is a reference to the foaming quality of champagne.
