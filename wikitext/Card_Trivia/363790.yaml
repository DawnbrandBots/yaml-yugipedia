title: Card Trivia:Caius the Mega Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Tenacity of the Monarchs]]".
  * This monster is the Mega Monarch version of "[[Caius the Shadow Monarch]]".
  * Before the release of "[[Erebus the Underworld Monarch]]" and subsequently "[[Domain of the True Monarchs]]", this monster was believed to be the silhouette appearing in the artwork of "[[The First Monarch]]" by a part of the community.
