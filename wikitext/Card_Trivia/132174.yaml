title: Card Trivia:Absurd Stealer
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This is the only monster used by the [[Three Pure Nobles]] that isn't related to the "[[Meklord]]" [[archetype]].
  * This card's name reflects the "absurdity" of its effect, as this monster reduces an opponent's monster's [[ATK]], but "steals" that monster's [[DEF]] as its ATK.
