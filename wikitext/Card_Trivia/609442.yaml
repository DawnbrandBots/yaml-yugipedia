title: Card Trivia:Puzzlomino, the Drop-n-Deleter
wikitext: |-
  {{Navigation}}

  * This monster's name and appearance are a reference to [[wikipedia:Tetris|Tetris]].
  ** The "Puzzlomino" section of this card's name is a portmanteau of the words [[wikipedia:Puzzle|puzzle]] and [[wikipedia:Tetrominoes|tetrominoes]], the shapes used in Tetris.
  ** The "Drop-n-Deleter" section of this card's name is a reference to the scoring method in Tetris: when a tetromino is "dropped" into a row and that row has no gaps, it is "deleted" and points are scored.
