title: Card Trivia:Battle Warrior
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Draw Muscle]]", "[[Fusion Draft]]", "[[Small Stopper]]", and "[[Sneak Exploder]]".
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from {{chapter|Yu-Gi-Oh!|091|ref}}, specifically from the panel showing [[Kung Fu Fighter Ultimator|this monster]] [[attack]]ing and [[destroy]]ing "[[Dragon Zombie (manga)|Dragon Zombie]]".
