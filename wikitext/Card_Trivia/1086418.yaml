title: Card Trivia:Abysstrite, the Atlantean Spirit
wikitext: |-
  {{Navigation}}

  * "[[Abyss-sting Triaina]]" appears in this card's artwork, wielded by this monster.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Mermail Abysstrite]]".
  ** Visually, this monster is "Mermail Abysstrite" merged with "[[Abyssrhine, the Atlantean Spirit]]".
  ** According to [[The Valuable Book EX 5 card storylines#No. 15: The Decisive Battle Surging Around the Lone Flaming Seas Island|''The Valuable Book EX 5'' card storylines]], "Abysstrite" transformed into this form after having made a covenant with "Abyssrhine".
