title: Card Trivia:Azamina Moa Regina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Azamina Determination]]".
  * This monster's name is a portmanteau of "[[Wikipedia:Moa|moa]]" (an extinct species of flightless bird) and "''regina''" (the Latin word for "queen").
  * This monster is the [[counterpart|upgraded]] "[[Azamina]]" [[Fusion Monster|Fusion]] counterpart of "[[Morgana the Witch of Eyes]]".
  * This monster has a "[[Sinful Spoils]]" [[Trap Card]] counterpart: "[[Sinful Spoils of Slumber - Morrian]]".
