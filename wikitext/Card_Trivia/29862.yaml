title: Card Trivia:Vampire's Curse
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Limited Edition 7]]''.
  * This card's effect to pay 500 [[LP]] during the [[Standby Phase]] of the turn after it was destroyed in [[battle]] in order to [[Special Summon]] itself from the [[Graveyard]] and gain 500 [[ATK]] is based on the vampire's folkloric ability to gain strength from drinking blood.
  ** In ''[[Yu-Gi-Oh! R]]'', this effect's activation is depicted as [[Vampire's Curse (manga)|this monster]] biting into its owner's neck during [[Tilla Mook]]'s duel against [[Dark Yugi (manga)|Yugi]].
  * This card bears a resemblance to Meier Link, a vampire noble in ''Vampire Hunter D Bloodlust'' with a similar appearance and ability to transform his hands into claws.
