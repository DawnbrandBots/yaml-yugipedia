title: Card Trivia:Revoke Fusion
wikitext: |-
  {{Navigation}}

  * The artwork of "[[Polymerization]]" appears in this card's artwork.
  ** The artwork depicts "Polymerization" with a large crack; thus, this card's effects are an inverse of those of "Polymerization".
  * This card represents [[Jaden Yuki]]'s loss of faith in [[Fusion Summon]]ing in the ''[[Yu-Gi-Oh! GX]]'' anime after his friends were sacrificed to create "[[Super Polymerization (anime)|Super Polymerization]]" and after he was broken from the influence of [[The Supreme King]], who utilized darker methods of Fusion Summoning with a [[Fusion Monster]]-oriented archetype, the "[[Evil HERO]]"; thus, this card represents his "revoking" his use of "Polymerization" and other "[[Fusion (archetype)|Fusion]]"-related cards.
  * This card shares some similarities with "[[Synchro Deception]]".
  ** Both cards share an effect to send an [[Extra Deck]] monster to the [[Graveyard]] and supports monsters that can be used to Summon it.
  ** Both cards were used by the main protagonist of their respective anime series who became reluctant to utilize their series' Summoning methods: This card was used by Jaden Yuki, while "Synchro Deception" was used by [[Yusei Fudo]].
  * In ''[[Yu-Gi-Oh! Master Duel]]'' and ''[[Yu-Gi-Oh! Duel Links]]'', this card had a bug where, on resolution, instead of Summoning the [[Fusion Material]] from the hand, it would instead Summon a "Polymerization" if possible, as a [[Type]]-less, [[Attribute]]-less, [[Level]]-less [[Normal Monster]] with 0 [[ATK]] and [[DEF]].
