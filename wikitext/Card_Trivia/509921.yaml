title: Card Trivia:Exodia the Forbidden One
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Limited Pack World Championship 2025]]'', as well as one of the cover cards of ''[[Beginner's Edition 1 (2011)]]'', ''[[Phantom God]]'', ''[[Duelist Legacy Volume.2]]'', and ''[[25th Anniversary Tin: Dueling Heroes]]''.
  * This monster appears in the artwork of "[[Contract with Exodia]]" and "[[Draw of Fate]]".
  * This card appears in the artworks of "[[Damaging Hand]]" and "[[Exchange]]".
  ** The stone tablet version of this card appears in the artwork of "[[Wedju Temple]]".
  * Part of the international version of "[[Spellbinding Circle]]" appears in this card's international artwork.
  * This monster has a chibi parody: "[[True Exodia]]".
  * This is the first card, as well as the first [[Effect Monster]], to feature an [[Duel winner|automatic winning]] condition.
  ** This is also the first Effect Monster not to feature a [[Flip Effect]].
  ** This is the only card that can allow a victory before either player has a turn.
  ** This is also the first card that can only be used to its full effect if a set of cards is gathered in the player's [[hand]].
  ** This was also the only card whose effect text contained either of the words "victory" or "automatic". The phrase was later [[Card Errata:Exodia the Forbidden One|errata'd]], along with any other [[Duel winner]] cards at the time, from "automatic victory" to "You win the [[Duel]]".
  * This is the first Effect Monster to use its effect in the original ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], as well as the first Effect Monster used by [[Yami Yugi]].
  * This monster and the "[[Forbidden One]]" [[Normal Monster]]s reference the myth of [[wikipedia:Osiris|Osiris]], the [[wikipedia:Ancient Egyptian deities|Egyptian god]] of death, rebirth, and judgment who was killed by his brother, [[wikipedia:Set (deity)|Set]] and dismembered into pieces. Osiris's wife [[wikipedia:Isis|Isis]] found all of the pieces and put him back together, enabling him to return to life.
  ** This monster's victory condition reflects this legend, as obtaining all five "Forbidden One" monsters will allow the player to Summon this monster and bestow "judgment" on the opponent by automatically winning the Duel.
  * Because the "Forbidden One" monsters consist of this monster and the four limbs, its full body cannot be seen within their card forms; however, its complete form is seen within its [[counterpart]]s: "[[Exodia Necross]]", "[[Exodius the Ultimate Forbidden Lord]]", "[[The Legendary Exodia Incarnate]]", "[[The Unstoppable Exodia Incarnate]]", and "[[Exxod, Master of The Guard]]".
  * In the English dubbed version of the ''Yu-Gi-Oh'' anime, this monster was nicknamed the "Exodia Head", since it is mostly depicted as a close-up of its head. In the anime, this monster's non-card form was only its head.
  * This monster, along with the other "Forbidden One" monsters, has kept the same status on the [[Forbidden]] & [[Limited]] Lists longer than any other card in the game. They have all been Limited since the [[April 2000 Lists]] in the ''[[OCG]]'' and the [[May 2002 Lists (TCG)|May 2002 Lists]] in the ''[[TCG]]''.
  * The [[Exodia the Forbidden One (Bandai)|Bandai]] version of this card is [[Level]] 8, the Konami version is [[Level]] 3.
  * The ''[[Master Collection Volume 1]]'' release of this card had a typo that missed the "r" letter in "your", which resulted in the text requiring all 5 "Forbidden One" monsters to be in "you hand".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster had to be on the [[field]] in order for the player to win.
  * In ''[[Yu-Gi-Oh! Duel Generation]]'', when this card's [[victory condition]] is achieved, the winning player will declare either "Exodia Finale" or "Face the Unstoppable!".
  * In multiple video games up until ''[[Yu-Gi-Oh! 7 Trials to Glory: World Championship Tournament 2005]]'', there was a glitch where drawing all five "Exodia" pieces with a card like "[[Graceful Charity]]", followed by discarding one of the pieces, would cause the game to play the "Exodia" victory animation followed by ending the Duel as a [[DRAW]].<ref>https://www.youtube.com/watch?v=4e9lMSzaprU</ref>

