title: Card Trivia:Ogdoadic Calling
wikitext: |-
  {{Navigation}}

  * "[[Flogos, the Ogdoadic Boundless]]" and "[[Zohah, the Ogdoadic Boundless]]" appear in this card's artwork.
  * The part of this card's effect that requires to have 8 or more differently named "Ogdoadic" monsters in the [[GY]] is likely a reference to the fact that there were 8 members to the Egyptian [[wikipedia:Ogdoad (Egyptian)|Ogdoad]], which is the basis of the "[[Ogdoadic]]" archetype.
