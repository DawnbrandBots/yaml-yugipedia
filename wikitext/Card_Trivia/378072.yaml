title: Card Trivia:Eternal Soul
wikitext: |-
  {{Navigation}}

  [[File:Eternal Soul.png|thumb|250px|The [[Mahado (manga)|Dark Magician]]'s stone slab.]]

  * An engraving of "[[Dark Magician]]" appears in this card's artwork.
  * This card has a "[[Blue-Eyes White Dragon]]" counterpart: "[[True Light]]".
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|293|ref}}, specifically from the panel where [[Dark Yugi (manga)|Atem]] gazed upon the "[[Illusion Magician]]"-infused tablet and [[Mahad]] silently pledged his "eternal soul" to the pharaoh.

