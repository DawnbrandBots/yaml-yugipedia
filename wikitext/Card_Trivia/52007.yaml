title: Card Trivia:UFO Turtle
wikitext: |-
  {{Navigation}}

  * This card has five [[counterpart]]s, each one for a different [[Attribute]]: "[[Giant Rat]]" for [[EARTH]], "[[Flying Kamakiri 1|Flying Kamakiri #1]]" for [[WIND]], "[[Mother Grizzly]]" for [[WATER]], "[[Mystic Tomato]]" for [[DARK]], and "[[Shining Angel]]" for [[LIGHT]].
  * This card has a [[Zombie counterpart]], with inverted [[ATK]]/[[DEF]]: "[[Pyramid Turtle]]".
