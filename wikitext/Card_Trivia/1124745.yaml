title: Card Trivia:Dedicated Protorion
wikitext: |-
  {{Navigation}}

  * The ceremonial torches from the artwork of "[[Black Magic Ritual (Rush Duel)|Black Magic Ritual]]" appear in this card's artwork.
  * This monster is a [[Dark Magician (Rush Duel series)|Dark Magician]] [[counterpart]] of "[[Protorion the Magna Warrior]]".
  ** This monster references a scene in {{episode|Yu-Gi-Oh!|118|ref}}, where "[[Valkyrion the Magna Warrior (anime)|Valkyrion the Magna Warrior]]" (which "Protorion" is based on) was offered as [[Tribute]] with "[[Dark Magic Ritual (anime)|Dark Magic Ritual]]" to [[Ritual Summon]] "[[Magician of Black Chaos (anime)|Magician of Black Chaos]]".
