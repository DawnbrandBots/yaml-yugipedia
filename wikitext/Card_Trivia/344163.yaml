title: Card Trivia:Raptor's Storm
wikitext: |-
  {{Navigation}}

  * This card's effect is a stronger version of the anime version of "[[Raptor's Gust (anime)|Raptor's Gust]]".
  ** Fittingly, both cards debuted in {{episode|ARC-V|034|ref}}.
  ** When "Raptor's Gust" was released in the ''[[OCG]]''/''[[TCG]]'', it had the same effect (but slightly different [[activation requirement]]) as this card.
