title: Card Trivia:Crystron Entry
wikitext: |-
  {{Navigation}}

  * "[[Crystron Smiger]]" and "[[Crystron Quan]]" appear in this card's artwork.
  ** This card depicts both [[Synchro Summon|merging]] into "[[Crystron Quandax]]".
  * This card may be a reference to the anime GaoGaiGar,[https://en.wikipedia.org/wiki/The_King_of_Braves_GaoGaiGar] as one of the main mecha in the series, Gaigar, has a pilot jumping and merging with Galeon, a mechanical lion just like [[Crystron Smiger]], not to mention that [[Crystron Quandax]] bears a striking resemblance to Gaigar.
