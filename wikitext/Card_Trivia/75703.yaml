title: Card Trivia:Viser Des
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Thumbscrew (torture)|thumbscrew]], a torture device taking the form of a [[wikipedia:Vise|vise]], which is used to lower the clamp with the intention of crushing the victim's limbs or body.
  * This monster has a counterpart: "[[Byser Shock]]".
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster was replaced by "[[Holding Arms (anime)|Holding Arms]]" and "[[Plasma Eel]]".
  ** All three monsters share the same [[Attribute]] ([[DARK]]), [[Level]] (4), and [[original ATK and DEF]] (500/1200) and are used by [[Yami Marik]].
  *** This monster shares the same [[Machine]] [[Type]] as "Plasma Eel" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, and the same [[Fiend]] [[Type]] as "Holding Legs" in the anime and the ''[[OCG]]''/''[[TCG]]''.
  ** All three monsters feature a similar effect that [[target]]s an opponent's monster and prevent them from being [[destroyed by battle]].
  *** Also, this monster and "Holding Legs" are depicted as torturous restraints in their respective debut media, designed to prevent the opponent from moving when combined with their counterparts ("[[Viser Shock (manga)|Viser Shock]]" in the manga, "[[Holding Legs (anime)|Holding Legs]]" in the anime).
  * This card's second ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|244|ref}}, specifically from the panel showing [[Viser Des (manga)|this monster]] being Summoned.
