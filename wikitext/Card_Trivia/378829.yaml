title: Card Trivia:Kozmo DOG Fighter
wikitext: |-
  {{Navigation}}

  * This card's effect could be reference to the strategy used by the [[wikia:w:c:starwars:TIE/LN starfighter|TIE/line starfighter]] In the Star Wars franchise, where multiples of the ship would overwhelm in large numbers.
  * Several copies of this monster (or possibly "[[DOG Fighter Token]]") appear in the artworks of "[[Kozmo Dark Eclipser]]" and/or "[[Kozmo Delta Shuttle]]".
  * This card's name could be a pun on [[wikipedia:dogfight|dogfighting]], a situation where multiple small and agile fighter craft engage in very close range combat, trying to shoot at each other with short range weapons like guns, while at the same time maneuvering to avoid enemy fire.
