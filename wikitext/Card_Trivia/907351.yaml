title: Card Trivia:Baelgrill de Nouvelles
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Wild Survivors]]''.
  * This monster's name is a portmanteau of the demon [[wikipedia:Bael (demon)|Baal]] and Griller (to cook food, especially meats, over an open flame).
  ** "Bael" is described as a demonic king who takes many forms including - but not limited to - a man, toad, or cat (represented by this monster's crown-like chef hat, scepter, and amalgamous appearance unlike the more humanoid higher-Level "[[Nouvelles]]" [[Ritual Monster]]s). His powers are described as devastating and absolute, able to easily control and manipulate others as well as grant invisibility (represented by this monster's effect to [[negate]] all of the opponent's face-up cards and subsequently [[Tribute]] their monsters if it was [[Special Summon]]ed by the effect of a "Nouvelles" monster, not to mention its [[Quick Effect]] to target an opponent's [[Attack Position]] monster to Tribute and Special Summon "[[Hungry Burger]]" from hand or Deck).
