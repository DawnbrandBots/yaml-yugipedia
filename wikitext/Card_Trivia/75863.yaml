title: Card Trivia:Negate Attack
wikitext: |-
  {{Navigation}}

  * The bright, swirling portal in this card's artwork appears in both artworks of "[[Negatwor Dragon]]".
  ** The bright swirling portal also makes up an element of the artwork of "[[Ground Collapse]]".
  * This card appears in the artwork of "[[Absolute Buster]]".
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], this was a [[Quick-Play Spell Card]] instead of a [[Counter Trap Card]].
  ** In the first Japanese ending theme for the ''[[Yu-Gi-Oh! GX]]'' anime, ''[[Borderline Battle]]'', this card appears among the many other cards from the first ''Yu-Gi-Oh!'' anime series moving along in the background. This portion is also shown in the English opening theme, ''[[Get Your Game On! (song)|Get Your Game On!]]''. In both cases, this card appears as a Spell Card.
  * In ''[[Yu-Gi-Oh! Rush Duel]]'', this card was released as a [[Normal Trap Card]] instead of a Counter Trap Card, becoming the first ''[[OCG]]'' imported cards to have its [[card type]] changed in ''Rush Duel''.
