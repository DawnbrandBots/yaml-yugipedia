title: Card Trivia:Tenmataitei
wikitext: |-
  {{Navigation}}

  * This is the only "[[Monarch]]" monster that does not have an effect that activates when it is [[Tribute Summon]]ed.
  * There could be a pun in this card's Japanese name : the Kanji 天魔 (Sky Demon) pronounces Tenma, the same as 天馬 (Sky Horse), a creature similar to [[wikipedia:Pegasus|Pegasus]] in Eastern mythology, the same creature this monster is riding.
