title: Card Trivia:Blade Knight
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Speed Duel: Attack from the Deep]]'', and one of the cover cards of ''[[Starter Deck: Kaiba Reloaded]]'', ''[[Dark Beginning 2]]'', ''[[Beginner's Edition 2]]'', ''[[Beginner's Edition 2 (2011)]]'', ''[[Deck Custom Pack 01]]'', and the ''[[Collectible Tins 2004]]''.
  * This monster appears in the artworks of "[[Accellight]]", "[[Counterattack Beacon]]", and "[[Dark Sacrifice]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|241|ref}}, specifically from the panel showing [[Blade Knight (manga)|this monster]] attacking [[Dark Marik (manga)|Dark Marik]] directly.
