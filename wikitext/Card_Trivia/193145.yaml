title: Card Trivia:Gem-Knight Lazuli
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Zefra Providence]]" and the second artwork of "[[Gem-Knight Fusion]]"
  ** A toy version of this monster appears in the artwork of "[[Gift Exchange]]".
  ** According to the [[Duel Terminal Master Guide card storylines#"The "Gem-Knights" Rush to the Sides of the Outnumbered "Constellars"|''Duel Terminal Master Guide'' card storylines]], "Lazuli" fuses with "[[Constellar Virgo]]" to become "[[Gem-Knight Seraphinite]]". Afterwards, "Lazuli" uses the sword of "[[Gem-Knight Master Diamond]]" to transform into "[[Constellar Sombre]]" by fusing with the 12 "[[Constellar]]s" (excluding "[[Constellar Rasalhague]]") and the crystallized power of 'Creation' from "[[Sophia, Goddess of Rebirth]]".
  *** According to the [[Master Guide 5 card storylines#Star-Guiding Knight|''Master Guide 5'' card storylines]], "Sombre" later transforms into "[[Tellarknight Ptolemaeus]]" after fusing with "[[Stellarknight Constellar Diamond]]" and all of the other remaining "[[tellarknight]]s".
  * This monster is named after [[wikipedia:Lapis lazuli|lapis lazuli]], a semi-precious mineral known for its deep-blue pigment.
  ** The rocks scattered around this monster in the card's artwork are [[wikipedia:Pyrite|pyrite]], an inclusion commonly found in lapis lazuli.
  * This monster is the twin sister of "[[Gem-Knight Lapis]]". The crystal core within this monster's chest went to "Lapis" when they split up after birth, leaving it the only "[[Gem-Knight]]" without a crystal core.
  ** Both of them are named after lapis lazuli.
  ** This monster is an [[Effect Monster]] while "Lapis" is a [[Normal Monster]].
  ** Both of them have upgraded "[[tellarknight]]" forms of opposing [[Attribute]]s ([[LIGHT]]/[[DARK]]).
  * This monster and "Gem-Knight Seraphinite" are the first [[female]] "Gem-Knight" monsters, and by extension the first female "Gem-Knight" [[Effect Monsters]] to be released in the ''[[OCG]]''/''[[TCG]]''.
  ** This monster is also the first female [[Main Deck]] "Gem-Knight" monster to be released in the ''OCG''/''TCG''.
