title: Card Trivia:Centur-Ion Legatia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Centur-Ion True Awakening]]".
  * This monster is a [[Card evolutions|combined]] [[Synchro Monster|Synchro]] form of "[[Centur-Ion Primera]]", "[[Centur-Ion Trudea]]" and "[[Centur-Ion Emeth VI]]".
  * This monster is similar to Strelizia, the mech from the ''[[wikipedia:Darling in the Franxx|Darling in the Franxx]]'' series piloted by the main protagonists of the series; both have a feminine appearance and a white-and-red color scheme.
