title: Card Trivia:Amazoness Queen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Amazoness Hall]]" and "[[Queen's Pawn]]".
  * This monster has a younger counterpart: "[[Amazoness Princess]]".
  * A group of "Amazoness" monsters appear in the background of this card's artwork. Among them may be "[[Amazoness Paladin]]" and "[[Amazoness Chain Master]]", judging from the similarity of hair styles and weapons.
  * While this and the other "[[Amazoness]]" monsters were based on the Greek Amazons, this card in particular may also be based on Amanirenas, or "The One-Eyed Kandake". Both are warrior queens who have lost an eye in battle and are depicted using a sword(s) as their weapons. Amanirenas was said to have become more courageous when she lost her eye, and defeated Rome when it tried to annex Kush. This may have been the inspiration for the effect "Amazoness Queen".
  ** Although more vague, they also have a connection with wildcats. This card goes hand in hand with "[[Amazoness Tiger]]", and so did "[[Amazoness Empress]]" and "[[Amazoness Pet Liger]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime. In one Kushite carving, Amanirenas was depicted feeding prisoners of war to her pet lion.
