title: Card Trivia:Hercules Beetle
wikitext: |-
  {{Navigation}}

  * This monster has a [[retrain]]ed ''[[Rush Duel]]'' [[counterpart]]: "[[Scissor Hercules]]".
  * This monster is based on the [[Wikipedia:Hercules beetle|Hercules beetle]],  a species of the [[Wikipedia:Rhinoceros beetle|Rhinoceros beetle]].
  ** This card's English, German and Spanish names are based on the beetle's names which in turn are based on the Roman hero [[wikipedia:Hercules|Hercules]].
  *** Its Italian name literally translates to "Herculean Scarab".
  ** The ''[[OCG]]'' names are based on the beetle's English name, and its names in Japanese and Korean (ヘラクレスオオカブト ''Herakuresu Ookabuto'' and 헤라클레스 장수 풍뎅이 ''Herakeulleseu Jangsu Pungdeng-i'') which in turn are based on Hercules's Greek counterpart, [[wikipedia:Heracles|Heracles]].
  * This card's ''OCG''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! Duelist|007|ref}}, specifically from the panel where this monster is Summoned.
