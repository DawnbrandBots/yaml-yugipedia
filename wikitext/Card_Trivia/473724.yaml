title: Card Trivia:Majesty with Eyes of Blue
wikitext: |-
  {{Navigation}}

  * "[[Blue-Eyes White Dragon]]" appears in this card's artwork.
  * This card is a [[with Eyes of Blue]] [[counterpart]] of "[[Red-Eyes Insight]]".
  ** Both are [[Spell Card]]s with similar [[activation condition]]s, and can only be [[activate]]d [[once per turn]].
  ** The pose of "Blue-Eyes White Dragon" in this card's artwork mirrors that of "[[Red-Eyes Black Dragon]]" in the artwork of "Red-Eyes Insight".
