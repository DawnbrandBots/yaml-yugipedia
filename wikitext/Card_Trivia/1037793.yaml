title: Card Trivia:Snake-Eyes Diabellstar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Goblin Biker Grand Pileup]]".
  * This monster is the [[Card evolutions|combined]] form of "[[Diabellstar the Black Witch]]" and "[[Snake-Eyes Poplar]]" (after the latter absorbed "[[Goblin's Crazy Beast]]").
  * This monster has the same [[Level]] (8) and [[original ATK and DEF]] (2800/2600) as "[[Magician of Black Chaos]]", like "Diabellastar the Black Witch" has the same stats as "[[Dark Magician]]".
