title: Card Trivia:Bacon Saver
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is actually a triple pun: ''Tasukeru'' stands for ''to save'' (as the pun used on "[[Card Trivia:Tasuke Knight|Tasuke Knight]]"), ''Ton'' stands for ''pork'', and ''sukeruton'' stands for ''skeleton''.
  ** This card's English name could be a pun of the phrase "to save somebody's bacon", which is to save someone from failure or difficulties, which reflects how this card's effect can save the player from a potentially devastating attack.
  ** Additionally, this monster is a pig, an animal whose meat is often used for bacon.
  * This card appears in the artwork of "[[Overtake Summon]]".
