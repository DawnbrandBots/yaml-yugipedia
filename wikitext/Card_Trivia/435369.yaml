title: Card Trivia:B.E.F. Zelos
wikitext: |-
  {{Navigation}}

  * "[[DUCKER Mobile Cannon]]" and "[[Lord British Space Fighter]]" appear in this card's artwork.
  * "B.E.F." is an acronym for "Bacterian Empire Fortress", as this card is based on the Zelos fortress.
  ** Zelos Force also appears in this card's artwork.
