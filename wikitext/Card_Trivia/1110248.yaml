title: Card Trivia:Dracotail Faimena
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rahu Dracotail]]".
  * This monster is based on the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Aquarius (constellation)|Aquarius]].
  ** The [[Wikipedia:Astrological sign|astrological sign]] for [[wikipedia:Aquarius (astrology)|Aquarius]] appears hanging from this monster's belt and in the center of the zodiac wheel within its vase.
  ** This monster's [[WATER]] [[Attribute]] and usage of a large vase reference how Aquarius is also known as the "water-bearer" constellation, who is depicted carrying a large vase of water.
  * This monster's name is possibly derived from ''[https://www.theoi.com/Text/AratusPhaenomena.html Phaenomena]'', an Ancient Greek poem written by the poet [[wikipedia:Aratus|Aratus]], which describes the constellations and other celestial phenomena.
  * "[[Dracotail Gulamel]]" is the combined [[Fusion Monster|Fusion]] form of this monster and "[[Dracotail Urgula]]".
