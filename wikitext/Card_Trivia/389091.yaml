title: Card Trivia:Performapal Rain Goat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Performapal Pendulum Art & Clean]]".
  * This card's name is a portmanteau of the words "[[wikipedia:Raincoat|raincoat]]" and "goat", which serves as the basis for this monster's appearance.
  ** In {{episode|ARC-V|061|ref}}, when this card's effect was [[activate]]d to reduce the damaging effect of "[[Flower Cardian Lightshower (anime)|Flower Cardian Lightshower]]" to 0, this monster manifested over [[Yuya Sakaki]] and shielded him from getting struck by "Lightshower's" rainstorm of falling lights. This reflects the general function of a raincoat to protect the wearer against the rain.
