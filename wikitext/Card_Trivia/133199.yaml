title: Card Trivia:Swift Scarecrow
wikitext: |-
  {{Navigation}}

  * This card is similar to "[[Scrap-Iron Scarecrow]]".
  ** However, this card's effect is identical to "[[Battle Fader]]", except for discarding in place of summoning.
  ** Coincidentally, this card is used by [[Yusei Fudo]] while "Battle Fader" is used by [[Jack Atlas]].
