title: Card Trivia:Traptrix Nepenthes
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Nepenthes|Nepenthes]]'' (Japanese: {{Ruby|靫|ウツボ}}{{Ruby|葛|カズラ}} ''Utsubokazura''), a carnivorous plant that lures its prey to the pitchers at the end of its leaves.
  ** "[[Traptrix Pudica]]", who is based on the same family of plants, has an appearance similar to this monster’s.
  * This monster appears in the artwork of "[[Traptrix Trap Hole Nightmare]]" and "[[Traptrix Rafflesia]]".
  ** Judging by the artwork of "Traptrix Trap Hole Nightmare", it either depicts the true form of this monster or its pet.
