title: Card Trivia:Twin Swords of Flashing Light - Tryce
wikitext: |-
  {{Navigation}}

  * These swords appear in the artworks of "[[Guardian Tryce]]" (not only being wielded by the monster, but as an image on the back of its shirt), "[[Arsenal Robber]]", "[[Really Eternal Rest]]" and "[[Swords at Dawn]]".
  * On the Italian lore of this card, it is written that the ATK of the equipped monster "aumenta" (which means increases) instead of "diminuisce" (which means decreases).
  * The altar beneath the weapon and the light descending above is similar to the other "[[Guardian]]"-related weapons:
  ** "[[Butterfly Dagger - Elma]]"
  ** "[[Gravity Axe - Grarl]]"
  ** "[[Rod of Silence - Kay'est]]"
  ** "[[Wicked-Breaking Flamberge - Baou]]"
  ** "[[Shooting Star Bow - Ceal]]"
