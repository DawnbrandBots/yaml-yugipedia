title: Card Trivia:Intensive Magician
wikitext: |-
  {{Navigation}}

  * This monster's design includes elements from the artwork of "[[Mage Power (Rush Duel)|Mage Power]]", including the same green cloak and the three bracelets on its left worn by the mages in the artwork of "Mage Power", the design of its mask based on the design of the pendants worn by the same mages, and the design on its hood based on the goat skull emblem adorning the altar depicted in the artwork of "Mage Power".
