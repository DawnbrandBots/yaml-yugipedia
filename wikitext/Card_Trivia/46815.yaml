title: Card Trivia:Hanewata
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Shining Rebirth]]".
  * This monster is a winged form of "[[Watapon]]".
  ** This card's name, "Hanewata" (ハネワタ ''Hanewata''), translates to "Winged Cotton" in Japanese, with ''Wata'' being a reference to "Watapon".
  ** However, this monster has an orange color scheme, while "Watapon" has a white color scheme.
  * This card is a [[LIGHT]] [[Fairy]] [[counterpart]] of  "[[Kuriboh]]":
  ** This card prevents the player from taking [[effect damage]], while "Kuriboh" prevents the player from taking [[battle damage]].
  ** Both are also [[Level]] 1 monsters with opposite [[ATK]]/[[DEF]]: this card has 200 ATK and 300 DEF, while "Kuriboh" has 300 ATK and 200 DEF.
