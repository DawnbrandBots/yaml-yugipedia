title: Card Trivia:Koalo-Koala
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Brutal Beast Battle]]", "[[Cattle Call]]", and "[[Dances with Beasts]]" (as a silhouette).
  * This monster's Japanese name, "Koarakkoala", is a [[wikipedia:portmanteau|portmanteau]] of its [[Fusion Material]]s' Japanese names: "[[Sea Koala]]" ("Koarakko") and "[[Tree Otter]]" ("Rakkoara").
  ** This monster's [[original ATK and DEF]] (2800/200) is equal to the combined [[ATK]] and [[DEF]] of its Fusion Materials; in this monster's case, its ATK is the combination of "Sea Koala's" DEF (1600) and "Tree Otter's" ATK (1200), while its DEF is the combination of the former's ATK (100) and the latter's DEF (100).
