title: Card Trivia:Contract with Exodia
wikitext: |-
  {{Navigation}}

  * "[[Exodia the Forbidden One]]" appears in this card's artwork.
  * This card's artwork depicts exactly five tombstones, each representing a member of the "[[Forbidden One]]" [[archetype]].
  * This is one of the few cards whose anime counterpart is weaker than its ''[[OCG]]''/''[[TCG]]'' version, which requires no [[Life Point]] [[cost]] to [[activate]]. This may have been to balance it with the stronger anime effects of "[[Exodia Necross (anime)|Exodia Necross]]".
