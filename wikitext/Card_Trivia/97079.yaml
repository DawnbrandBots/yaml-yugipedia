title: Card Trivia:Ally of Justice Reverse Break
wikitext: |-
  {{Navigation}}

  * The letters "Ａ Ｏ Ｊ" (standing for "[[Ally of Justice]]") can be seen on the left side of this monster.
  * This is the first "Ally of Justice" monster that has a negative effect if a [[LIGHT]] monster is on the field.
  ** This card's name alludes to both effects: "''Reverse'' Break" is designed to counter "[[Worm]]" [[Flip monster]]s by using its effect to [[destroy]] them while they are still in face-down [[Defense Position]].
  * In "[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]", this card is called '''"Ally of Justice Reverse Brake"'''.
  * The Hidden Arsenal 2 Spanish edition of this card is missing an article in its effect, reading as "''Si hay monstruo...''" ("''If there's monster''...") instead of "''Si hay un monstruo...''" (''If there's a monster...''").
