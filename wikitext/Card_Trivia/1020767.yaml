title: Card Trivia:Phantasmal Summoning Beast
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a "[[Phantasmal Martyr Token]]" (as seen by the wings) with the legs of "[[Raviel, Lord of Phantasms]]", torso of "[[Hamon, Lord of Striking Thunder]]", and the tail of "[[Uria, Lord of Searing Flames]]".
  * This monster's effect to [[Special Summon]] a [[Level 10]] [[Pyro]], [[Thunder]], or [[Fiend]] monster with equal [[original ATK and DEF]] rather than the [[Sacred Beast]]s specifically is likely to facilitate the use of "[[Yubel]]" in a Sacred Beast [[Deck]].
  ** This would reference how, in the ''[[Yu-Gi-Oh! GX]]'' anime, [[Yubel (character)|Yubel]] used a joint Deck build featuring both their [[Yubel (anime)|card form]] and the Sacred Beasts during their Duel against [[Adrian Gecko]].
  ** Additionally, whilst possessing [[Marcel Bonaparte]], Yubel made use of the card "[[Dimension Fusion Destruction (anime)|Dimension Fusion Destruction]]" (which this monster's effect [[search]]es for) to [[Fusion Summon|fuse]] the Sacred Beasts into "[[Chaos Phantasm Armityle]]".
