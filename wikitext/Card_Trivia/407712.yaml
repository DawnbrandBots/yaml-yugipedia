title: Card Trivia:Performapal Revue Dancer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magician's Restage]]".
  * This monster's name is based on a [[wikipedia:Revue|revue]], a popular theatrical entertainment that combines music, dance, and comedy sketches.
  ** "Revue" (レビュー, ''Rebyū'') is phonetically similar to "[[Level]]" (レベル, ''Reberu''), reflecting this monster's effects to quickly [[Tribute Summon]] a high-[[Level]] "[[Performapal]]" monster.
  ** This monster is based on the [[wikipedia:Magician's assistant|magician's assistant]], a performer in a [[wikipedia:Magic (illusion)|magic act]] whose role is to assist the magician. This further references this monster's effect to quickly Tribute Summon a high-Level "Performapal" monster; more specifically (as seen in the ''[[Yu-Gi-Oh! ARC-V]]'' anime), the Tribute Summon of "[[Performapal Sky Magician]]", which serves as the "[[Signature card|main act]]" of [[Yusho Sakaki]]'s [[Deck]].
