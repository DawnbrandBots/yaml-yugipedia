title: Card Trivia:Artifact Achilleshield
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Achilles|Achilles]] was the Greek warrior who fought for [[wikipedia:Agamemnon|King Agamemnon]] to save [[wikipedia:Helen of Troy|Helen]]. The shield is a reference to the [[wikipedia:Shield of Achilles|Shield]] that [[wikipedia:Hephaestus|Hephaestus]] made for Achilles.
  * This card's English name can be heard as "Achilles hiel(d)", a reference to [[wikipedia:Achilles heel|Achilles' heel]].
  * This [[Monster Card|monster]] and "[[Artifact Aegis]]" are the only two shields among the "[[Artifact]]" monsters and both can protect "Artifact" monsters and have the same total combined sum of [[ATK]] and [[DEF]].
