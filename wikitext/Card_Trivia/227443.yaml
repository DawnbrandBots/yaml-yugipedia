title: Card Trivia:Noble Knight Gawayn
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Extra Pack: Sword of Knights]]''.
  * This monster appears in the artwork of "[[Artorigus, King of the Noble Knights]]" and "[[Noble Knights of the Round Table]]".
  * This card is based on [[wikipedia:Gawain|Gawain]], a [[wikipedia:Round Table|Knight of the Round Table]] who was known for his bravery. He honored a deal he made with the enigmatic [[wikipedia:Green Knight|Green Knight]], even though he was led to believe it would result in his death.
  ** This act of bravery is reflected in the card's effect, as it [[Special Summon]]s itself in [[Defense Position]], even though its [[ATK]] is far higher than its [[DEF]].  As such, this card can be seen as, like its namesake, offering its life to the enemy as an act of honor and courage.
  ** This monster's green sash is a reference to the end of the story, where all the Knights of the Round Table wore a green sash in recognition of Gawain's adventure.
  ** 'Gawayn' is the original Welsh spelling of 'Gawain'.
  ** In legends, Gawain possesses superhuman strength connected to a day and night cycle, he is an invincible swordsman around noon, when the sun is at its height. This is reflected in this monster's [[LIGHT]] [[Attribute]], its effect involving a LIGHT [[Normal Monster]], and the sun in this card's artwork.
  * "[[Noble Arms - Gallatin]]" appears in this card's artwork.
  ** In Arthurian lore, Gawain was said to grow weaker as days went on, being weaker at night than he was in the morning. This is reflected in "Gallatin" as a reduction by 200 ATK during each of the controller's [[Standby Phase]]s.
