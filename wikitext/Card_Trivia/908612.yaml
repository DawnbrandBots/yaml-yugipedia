title: Card Trivia:Exosister Mikailis
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Tactical-Try Deck: Exosister]]''.
  * This monster appears in the artwork of "[[Exosister Arment]]".
  ** This monster makes up "[[Exosisters Magnifica]]", together with "[[Exosister Kaspitell]]".
  *** These two monsters also appear together in the artwork of "[[Exosister Returnia]]".
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Exosister Elis]]".
  ** This card's name is a combination of the angel [[wikipedia:Michael (archangel)|Michael]] and "Elise".
  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Grand Creators]]''/''[[The Grand Creators]]''.
