title: Card Trivia:Corroding Shark
wikitext: |-
  {{Navigation}}

  * This monster has a skeletal structure: since this monster is referred to as a ''[[zombie]] shark'' in this card's [[flavor text]], this is inaccurate, as shark bones are made of [[wikipedia:Cartilage|cartilage]], which decays after death.
  ** This might be because, according to [[The Valuable Book 1]], there's a creature living inside of the shark's body.
