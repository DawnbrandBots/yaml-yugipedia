title: Card Trivia:Earthbound Immortal Chacu Challhua
wikitext: |-
  {{Navigation}}

  * This monster is based on the orca [[wikipedia:Geoglyph|geoglyph]] of the [[wikipedia:Nazca Lines|Nazca Lines]].
  ** This monster's name is derived from ''[https://qu.wikipedia.org/wiki/Chuqi_challwa chuqi challwa]'', the [[wikipedia:Quechua|Quechua]] word for [[wikipedia:anchovy|anchovy]], where the [[wikipedia:Peruvian anchoveta|Peruvian anchoveta]] is common in Peru.
  * This monster is tied with "[[White Aura Bihamut]]" for the highest [[Level]] (10) of all [[Fish]] monsters.
  * This is the first and so far only "[[Earthbound Immortal]]" monster to have two unique effects.
  * "Earthbound Immortal" monsters often represent their owner and their initial ambitions and desires; in this monster's case, it represents [[Greiger]] and the children he looked after in his home country.
  ** This monster is based on a whale, a marine mammal that commonly inhabits the sea, which reflects the various sea-themed monsters used by Greiger while he was a [[Dark Signer]], including "[[Dark Flattop (anime)|Dark Flattop]]", "[[Dark Tuner Doom Submarine (anime)|Dark Tuner Doom Submarine]]", "[[Darksea Float (anime)|Darksea Float]]", and "[[Darksea Rescue (anime)|Darksea Rescue]]".
  ** Whales are known for having large families and traveling in groups, which reflects Greiger's bond with his younger siblings [[Annie]] and [[Max]], and the large group of orphaned children in his village.
  ** Orcas (more commonly known as "killer whales") are aggressive creatures that are known for fiercely hunting their prey. This reflects how Greiger initially wanted to kill [[Rex Goodwin]] for being responsible for destroying his village and killing his family. This was later proven to be untrue, as this monster is revealed to be responsible for the destruction of the village and the absorption of the children's souls.
  * This is the only card with six individual effects, based on the text of the Simplified Chinese format.
