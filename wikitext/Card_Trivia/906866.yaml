  {{Navigation}}
  [[File:Kaiba_tributing_Obelisk_and_Gadget_Soldier.png|thumb|right|250px|[[Seto Kaiba (manga)|Kaiba]] tributing "[[The God of Obelisk]]" and "[[Gadget Soldier (manga)|Gadget Soldier]]".]]

  * "[[Blue-Eyes White Dragon]]" and a silhouette of "[[Obelisk the Tormentor]]" appear in this card's artwork.
  ** This card's artwork is a reference to the end of [[Seto Kaiba and Ishizu Ishtar's Duel (manga)|Seto Kaiba and Ishizu Ishtar's Duel]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga (and its [[Seto Kaiba and Ishizu Ishtar's Duel|anime counterpart]]) where Kaiba [[Tribute]]d "[[The God of the Obelisk]]" and "[[Gadget Soldier (manga)|Gadget Soldier]]" to [[Tribute Summon]] "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]". Kaiba only attacked with "Blue-Eyes" that turn, reflecting this card's effect restricting the player to attack with only one monster the turn this card was [[activate]]d.

