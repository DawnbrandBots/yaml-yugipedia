title: Card Trivia:Dark Rabbit
wikitext: |-
  {{Navigation}}

  * This monster appears on the cover of "[[Toon World]]" in the artwork of "[[Shine Palace]]" and "[[Toon World the Perfect World]]".
  * This monster is based on [[Funny Bunny]], the favorite cartoon character of [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  * This monster has a [[retrained]] counterpart: "[[Funny Dark Rabbit]]".
  * This is one of four monsters used by Pegasus in the ''Yu-Gi-Oh!'' manga and anime that is treated as a [[Toon monster]] in ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', the others including "[[Bickuribox (DOR)|Bickuribox]]", "[[Parrot Dragon (DOR)|Parrot Dragon]]", and "[[Toon Alligator (DOR)|Toon Alligator]]".
  ** Additionally, in ''Duelist of the Roses'', this monster's [[Type]] is [[List of Comic monsters|Comic]], allowing it to gain a power bonus from the [[Toon (terrain)|Toon terrain]].
