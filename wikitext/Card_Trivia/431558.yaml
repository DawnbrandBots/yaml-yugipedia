title: Card Trivia:Solemn Strike
wikitext: |-
  {{Navigation}}

  * The woman from the artworks of the "[[Forbidden (archetype)|Forbidden]]" [[archetype]] and the man from the [[Solemn]] [[series]] appear in this card's artwork.
  ** This may depict the transformation of the woman into "[[Condemned Maiden]]" after being punished in "[[Solemn Scolding]]", as shown by the red spikes and dark feathers.
