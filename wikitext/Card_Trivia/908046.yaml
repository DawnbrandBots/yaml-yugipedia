  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Fortissimo of the Whirlwinds!!]]''.
  * This monster appears in the artworks of "[[Beginning of Lyre Thief]]" and "[[Early Bard Fortithief]]".
  ** A figure of this monster appears in the artwork of "[[Condurglar the Assisting Anthem]]".
  * This monster is a [[Shaman Bandit]] [[counterpart]] of "[[Esperaid the Smashing Superstar]]".
