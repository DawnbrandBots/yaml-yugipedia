title: Card Trivia:Performapal Hid Hippo
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is a [[counterpart]] of "[[Performapal Hip Hippo]]" and "[[Performapal Flip Hippo]]".
  ** All three monster feature a similar Japanese naming scheme which features the word "cover", used as a pun for the Japanese word for "hippo" (カバ ''kaba'').
  *** In this monster's case, its Japanese name, "Undercover" is a portmanteau of the Japanese pronunciation of "undercover" (アンダーカバー ''Andākabā'') and the Japanese word for "hippo".
