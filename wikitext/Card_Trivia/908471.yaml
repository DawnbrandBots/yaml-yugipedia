title: Card Trivia:DoSolfachord Coolia
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Ancient Guardians]]''/''[[Ancient Guardians]]''.
  * This monster appears in the artworks of "[[Solfachord Musica]]" and "[[Solfachord Scale]]".
  ** This monster's chibi avatar appears in the artwork of "[[Solfachord Harmonia]]".
  * This monster is based on "''Do''", the eighth syllable of the [[wikipedia:Solfège|solfège]], which reflects its [[Level]] (8).
  ** "Coolia" starts with the English letter "C", which is based on the [[wikipedia:C (musical note)|eighth musical note]] of the [[wikipedia:C major|C major scale]] in the fixed solfège.
  * This monster has an [[Card evolutions|upgraded]] [[Link Monster|Link]] form: "[[GranSolfachord Coolia]]".
