title: Card Trivia:Ritual Beast Tamer Zeframpilica
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chosen of Zefra]]", "[[Ritual Beast Inheritance]]", "[[Ritual Beast Return]]", "[[Ritual Beast Ulti-Reirautari]]", and "[[Ultimate Providence]]".
  * This monster's name is a portmanteau of the names of the "[[Zefra]]" [[archetype]], "[[Spiritual Beast Rampengu]]", and "[[Pilica, Descendant of Gusto]]". 
  ** Accordingly, this monster is a "[[Ritual Beast]]"/"[[Zefra]]" [[counterpart]] of "Pilica", depicted riding "Rampengu"; both are the only "Ritual Beast" monsters not to have a "[[Ritual Beast Ulti]]" form.
  * This monster has an opposite [[counterpart]]: "[[Ritual Beast Tamer Zefrawendi]]".
  ** Fittingly, the names of both monsters' base counterparts, "Pilica, Descendant of Gusto", and "[[Spirit Beast Tamer Wen]]", are derived from the [[wikipedia:Ainu language|Ainu]] words for "good" and "evil", respectively.
