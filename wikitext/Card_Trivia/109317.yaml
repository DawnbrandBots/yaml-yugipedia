title: Card Trivia:Chevalier de Fleur
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name, "Chevalier de Fleur", is French for "Flower Knight".
  ** This card's Japanese name, "Fleur de Chevalier" (フルール・ド・シュヴァリエ ''Furūru Do Shuvarie''), is French for "Flower of the Knight".
  ** This card's name is also a reference to the French [[wikipedia:Nobiliary particle|nobility particle]] "de".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Baronne de Fleur]]".
  * This monster has the same shield as "[[Centaur Mina]]" (with different colors).
  ** Fittingly, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, [[Sherry LeBlanc]] used "[[Centaur Mina (anime)|Centaur Mina]]" as [[Synchro Material]] to [[Synchro Summon]] this monster twice.
  * The petals on this monster are similar to those of "[[Fleur Guard]]".
  * This is the [[signature card]] of Sherry LeBlanc in the ''Yu-Gi-Oh! 5D's'' anime.
