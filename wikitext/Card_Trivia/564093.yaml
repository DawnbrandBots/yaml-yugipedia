title: Card Trivia:Contact Gate
wikitext: |-
  {{Navigation}}

  * "[[Neo-Spacian Grand Mole]]" appears in this card's artwork.
  * Each of the six beams of light that appear in this card's artwork represents a "[[Neo-Spacian]]" monster, based on its [[Attribute]].
  ** Green: "[[Neo-Spacian Air Hummingbird|Air Hummingbird]]" ([[WIND]]).
  ** Blue: "[[Neo-Spacian Aqua Dolphin|Aqua Dolphin]]" ([[WATER]]).
  ** Yellow: "Grand Mole" ([[EARTH]]).
  ** Red: "[[Neo-Spacian Flare Scarab|Flare Scarab]]" ([[FIRE]]).
  ** White: "[[Neo-Spacian Glow Moss|Glow Moss]]" ([[LIGHT]]).
  ** Purple: "[[Neo-Spacian Dark Panther|Dark Panther]]" ([[DARK]]).
