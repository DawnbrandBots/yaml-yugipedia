title: Card Trivia:Rainbow Bridge of the Heart
wikitext: |-
  {{Navigation}}

  [[File:Crystal_Beasts_and_Rainbow_Dragon_protect_Jesse.png|thumb|right|250|The Crystal Beasts and Rainbow Dragon protect Jesse Anderson.]]

  * This is the [[cover card]] of ''[[Structure Deck: Legend of the Crystals Light of Transcending Bonds Pack]]''.
  * "[[Crystal Beast Amber Mammoth]]", "[[Crystal Beast Amethyst Cat]]", "[[Crystal Beast Cobalt Eagle]]", "[[Crystal Beast Emerald Tortoise]]", "[[Crystal Beast Ruby Carbuncle]]", "[[Crystal Beast Sapphire Pegasus]]", "[[Crystal Beast Topaz Tiger]]", "[[Rainbow Dragon]]", and [[Jesse Anderson]] appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|175|ref}} where [[Yusuke Fujiwara]] (possessed by [[Nightshroud]]) attempts to probe into the light of Jesse's mind to find his inner darkness, but is intercepted by the "Crystal Beasts" and "Rainbow Dragon". The positions of the "Crystal Beasts" in this card's artwork are mirrored in comparison to that scene.

