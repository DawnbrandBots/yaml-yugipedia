title: Card Trivia:Beyond the Pendulum
wikitext: |-
  {{Navigation}}

  * The red and blue [[Pendulum Scale]] crystals appear in this card's artwork.
  ** This monster's eyes, armbands, and coattails, as well as its background artwork, also have the same colors in reference to them.
  * Visually, this monster appears to be based on [[Ray Akaba]], the co-creator of [[Pendulum Monster]]s in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster's name originates from {{episode|ARC-V|013|ref}} where [[Declan Akaba]] declares that there were further possibilities for [[Pendulum Summon]]ing, which [[Yuya Sakaki]] paraphrased in [[Yu-Gi-Oh! ARC-V - Episode 014|the next episode]] as Declan trying to go "beyond the Pendulum" (with this dialogue taking place after Yuya regained his cards taken by "[[Exchanging Notes]]"). Over time in the anime, the phrase has been understood to refer to using Pendulum Summoned monsters as material for [[Fusion Summon|Fusion]], [[Synchro Summon|Synchro]], and [[Xyz Summon]]s.
  ** The phrase "beyond the Pendulum" is also repeated in the following episodes:
  *** {{episode|ARC-V|021|ref}}: This phrase is not uttered in the episode, but rather, is used as the episode's Japanese title (ペンデュラムのその先に, ''Pendyuramu no Sono Saki ni''). The episode focuses on Yuya's frustration with trying to understand what Declan meant by his declaration in the above-mentioned episode, and culminates in Yuya obtaining the card "[[Polymerization (anime)|Polymerization]]" at the end of the episode.
  *** {{episode|ARC-V|051|ref}}: After Yuya ends his turn (having Xyz Summoned "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]" using Pendulum Summoned monsters that turn), Declan tells Yuya that he has seen what's "beyond (your) Pendulum" and wonders whose bond did Yuya's Pendulum Xyz Summoning originate from, based on how Yuya's Pendulum Fusion Summoning originated from his bond with [[Zuzu Boyle]].
  ** The kanji in this monster's Japanese name, "Tracks Magician" (軌跡の魔術師, ''Kiseki no Majutsushi'') references the "[[Magician]]" archetype (which is strongly associated with Pendulum Monsters) as well as the Japanese title of {{episode|ARC-V|001|ref}}: "The '''Tracks''' of Light, Pendulum Summon".
  *** This monster has the same [[original ATK]] (1200) as "[[Timegazer Magician]]" and "[[Stargazer Magician]]" have, which both debuted in that episode as the first "Magician" Pendulum Monsters and the first Pendulum Monsters ever used as "Pendulum Scales".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Exceed the Pendulum]]".
