title: Card Trivia:Crystron Sulfador
wikitext: |-
  {{Navigation}}

  * This monster appears to be "[[Crystron Sulfefnir]]" after absorbing an orb containing the power of "[[True King Bahrastos, the Fathomer]]".
  ** This monster's horns and wings closely resemble that of "Bahrastos".
  ** This monster's [[original ATK and DEF]] (1900/2250) are half of the combined total of the ATK and DEF of "Sulfefnir" (2000/1500) and "Bahrastos" (1800/3000).
  ** Both the orb and "Bahrastos" appear in the artwork of "[[Crystron Inclusion]]".
