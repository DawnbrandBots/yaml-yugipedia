title: Card Trivia:Superheavy Samurai Hexagon
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Rokka-9" (ロッカ－９, ''Rokka-Ku'') is a pun on "''rokkaku''" (六角), the Japanese word for "hexagonal".
  ** This monster's [[Level]] (6) and [[original ATK]] (600) reference how the shape of a hexagon contains six sides.
