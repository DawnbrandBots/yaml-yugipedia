title: Card Trivia:Zoodiac Combo
wikitext: |-
  {{Navigation}}

  * "[[True King Lithosagym, the Disaster]]", "[[Zoodiac Boarbow]]", "[[Zoodiac Broadbull]]", and "[[Zoodiac Ratpier]]" appear in this card's artwork.
  ** Fittingly, the animals of the [[wikipedia:Chinese zodiac|Chinese zodiac]] that the aforementioned "[[Zoodiac]]" monsters are based on ([[wikipedia:Pig (zodiac)|Pig]], [[wikipedia:Ox (zodiac)|Ox]], and [[wikipedia:Rat (zodiac)|Rat]], respectively) represent the "North" direction and the "Winter" season.
