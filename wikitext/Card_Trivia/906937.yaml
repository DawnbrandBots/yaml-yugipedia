title: Card Trivia:Merry Melffys
wikitext: |-
  {{Navigation}}

  * "[[Melffy Catty]]", "[[Melffy Fenny]]", "[[Melffy Rabby]]", "[[Melffy Pinny]]", and "[[Melffy Puppy]]" appear in this card's artwork.
  * This monster's Japanese name features the word "''Ukiuki''" (うきうき), which figuratively means "merry", but literally means "buoyant" or "floating", which reflects how "Melffy Pinny" is depicted floating on a tube in the water.
