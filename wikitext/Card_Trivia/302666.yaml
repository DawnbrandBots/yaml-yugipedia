title: Card Trivia:Xyz Encore
wikitext: |-
  {{Navigation}}

  * "[[Maestroke the Symphony Djinn]]" appears in this card's artwork.
  ** Fittingly, if this card's effect is used on "Maestroke", the other "[[Djinn]]" monsters can be [[Xyz Summon]]ed using the monsters [[Special Summon]]ed by this card's effect as [[Xyz Material]], as their [[Rank]]s are all 1 lower than the Rank of "Maestroke".
  * This card is the [[Xyz Monster|Xyz]] counterpart of "[[De-Fusion]]" and "[[De-Synchro]]".
  ** However, considering its effect, this card can only [[target]] the opponent's monsters.
