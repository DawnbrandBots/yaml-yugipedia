title: Card Trivia:Shark Caesar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Depth Eruption]]".
  * This is the first [[4 Xyz Materials|4-Material Xyz Monster]] to have been Summoned in the anime without the use of alternative Summon methods such as [[Xyz Evolution#Chaos Xyz Evolution|Chaos Xyz Evolution]].
  ** This is also the first [[Rank]] 3 monster to require 4 Xyz materials.
  * The dorsal head of this monster resembles the head of "[[Number 32: Shark Drake]]"
  ** Fittingly, both cards are owned by [[Reginald Kastle|Shark]].
  * The body of this monster looks like a mix of an [[wikipedia:anglerfish|anglerfish]] and a [[wikipedia:plesiosaurus|plesiosaurus]].
  * This card's maximum ATK in the anime after using its effect the maximum number of times, with no outside effects, is 11800.
  * Unlike most "Kaiser"/"Caesar" monsters, this card's name is written as "カイゼル" instead of "カイザー".
  * This monster has a unique [[Overlay Network]]. It looks like the spiral Overlay Network used by non-Number Xyz monsters, only blue.
