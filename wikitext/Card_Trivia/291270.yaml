title: Card Trivia:Deepsea Macrotrema
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Depth Eruption]]".
  * This card has the same background artwork as "[[Winged Minion]]", albeit green and with slightly different positioning.
  * This monster is based on the ''[[wikipedia:Macrotrema caligans|Macrotrema caligans]]'', a species of swamp eel native to Malaysia and Thailand.
