title: Card Trivia:Eidos the Underworld Squire
wikitext: |-
  {{Navigation}}

  * This monster's name is based on ''[[wikipedia:Theory of forms#Forms|eidos]]'' the Greek word meaning "visible form".
  * While this monster is not a member of the [[Vassal]] [[series]], its [[original ATK and DEF]] (800/1000) and effect supporting [[Tribute Summon]]ing are similar to the other members of the series.
  * This monster has a [[Monarch]] [[counterpart]]: "[[Eidos the Underworld Monarch]]".
