title: Card Trivia:Vampire Vamp
wikitext: |-
  {{Navigation}}

  * The word "Vamp" in this monster's name refer to the monster being a [[wikipedia:Vampire|vampire]], as well as a ''[[wikipedia:femme fatale|femme fatale]]'' (or "vamp"), an archetype of fictional character that plays the role of seductress to hypnotizes and charm her targets, which is alluded to in her effect.
  ** In the Konami article "[https://yugiohblog.konami.com/articles/?p=6208 PRIO Preview: A Vampiric Revamp]", its first effect is described as "mesmerizing any opposing monster".
  *** Coincidentally, the said effect can also refer another iconic vampiric practice, namely the habit of [[wikipedia: Clinical vampirism|sucking]] blood from a person's veins, due to the community [[List of unofficial terms|slang]]. [[Equip]]ping an opponent's monster to one of the player's monsters is sometimes referred to as "sucking", likely because the first monster to do so, "[[Relinquished]]", sucked the opponent's monster into its body in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This is the first [[Level 7]] "[[Vampire]]" monster to be released.
  * This monster bears a resemblance to the [[wikipedia:Succubus|succubus]] monsters seen in the ''[[wikipedia:Castlevania|Castlevania]]'' video game series.
