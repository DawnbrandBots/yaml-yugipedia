title: Card Trivia:Ravenous Vendread
wikitext: |-
  {{Navigation}}

  * "[[Avendread Savior]]" and "[[Vendread Scavenger]]" appear in this card's artwork.
  * The rather bizzare and specific exclusion of "[[Vendread Scavenger]]" in this card's effect is likely to allow this card to utilise "[[Pre-Preparation of Rites]]", as it technically lists said ritual monster by name.
  ** As a result, this is likely the only card to have exclusion text be a benefical part of its effect.
