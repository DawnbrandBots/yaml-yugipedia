title: Card Trivia:Naturia Exterio
wikitext: |-
  {{Navigation}}

  * "[[Naturia Beast]]" and the head and scales of "[[Naturia Barkion]]" appear in this card's artwork.
  ** Both are [[Fusion Material]]s required to [[Fusion Summon]] this card: this monster's [[cost]] and effect are a combination of both the costs and effects of "Beast" and "Barkion", which can negate [[Spell]]/[[Trap Card]]s, which requires [[send]]ing the top card of the [[Deck]] and [[banish]]ing cards from the [[Graveyard]], respectively.
  * The fang of this monster appears in the artwork of "[[Exterio's Fang]]".
  ** "Exterio's Fang" also has an effect to negate Spell/Trap Cards that is similar to this monster's effect.
  * This is the first "[[Naturia]]" [[Fusion Monster]].
  * This is the first Fusion Monster to require a [[Synchro Monster]] as Fusion Material.
