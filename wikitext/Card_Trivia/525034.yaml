title: Card Trivia:Space Dragster
wikitext: |-
  {{Navigation}}

  * The [[Synchro Summon]]ing rings from the ''[[Yu-Gi-Oh! ARC-V]]'' anime appear in this card's artwork.
  * This monster, "[[King Scarlet]]," and "[[Shapesister]]" are the only [[Trap Monster]]s in the ''[[OCG]]''/''[[TCG]]'' that can Summon themselves as [[Tuner monster]]s.
  * This monster shares similarities with "[[Formula Synchron]]."
  ** Both are based on race car models: This monster is based on a dragstsr, while "Formula Synchron" is based on a [[wikipedia:Formula One|Formula One]] race car.
  ** Both are [[Machine]] Tuner monsters that can only be [[Special Summon]]ed.
