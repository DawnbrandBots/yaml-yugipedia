title: Card Trivia:Guardragon Justicia
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "Iustitia", the virtue of [[wikipedia:Justice (virtue)|Justice]].
  * This monster appears in the artwork of "[[Guardragon Corewakening]]" and "[[Guardragon Reincarnation]]".
  * This monster is the "[[Guardragon]]" form of "[[World Legacy - "World Chalice"]], infused with the soul of [[Crowned by the World Chalice|Ib]].
  ** This card has the same [[Attribute]], [[Level]], [[ATK]] and [[DEF]] as "[[Crowned by the World Chalice]]", and is also a [[Normal Monster]]. This is fitting as "Ib the World Chalice Justiciar", which as previously stated has a connection to this card, is an older version of "Crowned by the World Chalice".
  ** This card has a combined form with "Crowned by the World Chalice": "[[Ib the World Chalice Justiciar]]".
