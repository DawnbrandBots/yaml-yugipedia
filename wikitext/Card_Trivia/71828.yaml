title: Card Trivia:Sacred Crane
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Wing Requital]]".
  * This monster is based on the [[wikipedia:Red-crowned crane|red-crowned crane]], which is considered a sacred bird and a symbol of immortality in Japan.
  * This monster shares the same [[original ATK and DEF]] (1600/400) and [[draw]]ing effect as "[[Molten Zombie]]".
  ** The only difference is that "Molten Zombie" must be [[Special Summoned]] from the [[Graveyard]] in order to [[activate]] its drawing effect.
