title: Card Trivia:Drag 'n Drop
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Red-Boot Boost Dragon]]" appears in this card's artwork.
  * This card's name is a portmanteau of "dragon" and "[[wikipedia:Drag and drop|drag and drop]]", a computer function which allows the user to click and "drag" a virtual object to another location.
