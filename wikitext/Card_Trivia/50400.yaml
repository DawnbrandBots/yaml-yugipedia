title: Card Trivia:Arcane Apprentice
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Type Change Beam]]".
  * The armor of "[[Arcanite Magician/Assault Mode]]" appears in this card's artwork.
  * The word "philo" in this monster's Japanese name, "Arcane Philo" is based on the Greek word, "filos" (φίλος), which means "lover of" or "friend".
  * This monster shares similarities with "[[Psi-Reflector]]".
  ** Both are [[Tuner monster]]s that can [[add]] "[[Assault Mode Activate]]" from the player's [[Deck]] to the [[hand]].
  ** Both are related to a [[Synchro Monster]] with an "[[/Assault Mode]]" [[counterpart]].
