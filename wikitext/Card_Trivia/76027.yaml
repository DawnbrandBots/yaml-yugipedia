title: Card Trivia:Zoma the Spirit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Return of the Zombies]]" and "[[Zombie World]]".
  ** This monster's ectoplasmic form appears in the artwork of "[[Turn Silence]]".
  * This card has a [[retrained]] counterpart: "[[Zoma the Earthbound Spirit]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|307|ref}}, specifically from the panel showing [[Death Spirit Zoma (manga)|this monster]] being Summoned.
