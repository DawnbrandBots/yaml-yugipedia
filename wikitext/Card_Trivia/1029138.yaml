title: Card Trivia:Moon of the Closed Heaven
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2025]]''.
  * This monster's Japanese name, "Saros-Nanna", is a combination of "[[wikipedia:Saros (astronomy)|Saros]]" (a cycle of exactly 223 lunar months, or a little over 18 years, that can be used to predict both solar and lunar eclipses) and "[[wikipedia:Geshtinanna|Nanna]]" (a minor [[wikipedia:Mesopotamia|Mesopotamian]] goddess).
  ** This monster's Japanese name also likely references [[wikipedia:Inanna|Inanna]], the Mesopotamian goddess of the moon.
  * This monster is a younger form of "[[Underworld Goddess of the Closed World]]".
  * This is the only [[Link-2]] [[Link Monster]] to have both the [[Top-Center Link Arrow cards|Top-Center]] and [[Top-Right Link Arrow cards|Top-Right]] [[Link Arrow]]s.
