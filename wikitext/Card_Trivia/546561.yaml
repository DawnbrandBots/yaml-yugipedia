title: Card Trivia:Phosphorage the Elemental Lord
wikitext: |-
  {{Navigation}}

  * Like the other "[[Elemental Lord]]s," this monster's summon-triggered effect is reminiscent of a (previously) banned card, in this case "[[Raigeki]]."
  * This monster's name is fittingly a portmanteau of the french words "Force" and "Orage" (Thunderstorm), as "Raigeki" (the card whose effect it copies) is called "Thunderbolt" in Japan.
