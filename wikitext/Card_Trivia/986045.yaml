title: Card Trivia:Rock Train Rockomotive
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Ballast Balance Shot]]".
  * This monster's name is a portmanteau of "''Dekoichi''" and the Japanese word for "stone" (石 ''ishi'').
  ** ''Dekoichi'' is the alternate name of the [[wikipedia:JNR Class D51|JNR Class D51]], a model of steam locomotive that was used in Japan during [[wikipedia:World War II|World War II]].
