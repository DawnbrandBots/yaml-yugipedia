  * This is one of the [[cover card]]s of ''[[Legendary Duelists: Season 3]]''.
  * This card and "[[Satellite Synchron]]" reference the city of [[Satellite]], the home of [[Yusei Fudo]] from the ''[[Yu-Gi-Oh! 5D's]]'' anime who uses the "[[Warrior (archetype)|Warrior]]" [[archetype]].
