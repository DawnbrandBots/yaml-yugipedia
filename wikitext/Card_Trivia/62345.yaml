title: Card Trivia:Dice Dungeon
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the ''[[Dungeon Dice Monsters]]'' arena appearing in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** This card's anime artwork features a very simplified version of the same arena, lacking any ''Dungeon Dice Monsters''-specific details seen in this card's later ''[[OCG]]''/''[[TCG]]'' artwork.
  ** This card's ''OCG''/''TCG'' artwork also depicts a white die with its Summoning Crest face-up, indicating that it is about to summon a [[Spellcaster]] monster. This reflects this card's effect to [[add]] "[[Dimension Dice]]" from the player's [[Deck]] to the [[hand]], which can [[Special Summon]] a monster from the hand or Deck with an effect that requires a die roll.
  * This card has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any [[Field Spell Card]], released over 20 years after its first appearance in the ''Yu-Gi-Oh!'' anime on May 14, 2002.
