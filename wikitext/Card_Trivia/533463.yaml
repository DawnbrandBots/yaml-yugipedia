title: Card Trivia:Metalrokket Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Borrel Regenerator]]".
  * The design of this monster's head is based on the ammunition fired by a [[wikipedia:Sniper rifle|sniper rifle]], a high-precision, long-range rifle designed for making accurate shots at extended distances. The shots fired by a sniper rifle will usually have extreme accuracy and penetrative power capable to striking the target an anything line up in the shot, reflecting this monster's effect to [[destroy]] all cards in one [[column]].
