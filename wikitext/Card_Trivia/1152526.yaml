title: Card Trivia:Revenge Sacrifice
wikitext: |-
  {{Navigation}}

  * This card's artwork was originally sketched by [[Shuji Maruyama]], one of the key animators for {{episode|Yu-Gi-Oh!|103|ref}} (the episode this card debuted in), which was confirmed in a [[wikipedia:Tweet (social media)|tweet]], as well as a second tweet in the comments for his first tweet.<ref>{{Cite tweet  |author=[[Shuji Maruyama]]  |user=masyuu_nemunemu  |number=1977036764775956683  |title=それワシのデザインしたカードやないか～い！  |date=October 11, 2025  |access-date=October 11, 2025  |language=ja}}</ref><ref>{{Cite tweet  |author=[[Shuji Maruyama]]  |user=masyuu_nemunemu  |number=1977037748877115695  |title=DM103話で珍しくアニメオリジナルカードが必要になってそこのカットを担当した自分がカードのイラストをやることになったのでシーンの内容でこんな感じかなーと描いたものを仕上げの有尾さんが彩色してくれたんですよね  |date=October 11, 2025  |access-date=October 11, 2025  |language=ja}}</ref>
  ** In the second tweet, he confirmed that "Ario-san" colored the artwork, which likely refers to Ario Yukiko, the color coordinator for the same episode.

