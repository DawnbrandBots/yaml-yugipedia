title: Card Trivia:Spectral Ice Floe
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Hellfire Dragon, Ghost Wyvern]]" appears in this card's artwork.
  * In the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, this card was used alongside "[[Underworld Flood Dragon Dragocutos (manga)|Underworld Flood Dragon Dragocutos]]", a monster named after [[wikipedia:Cocytus|Cocytus]], one of the five rivers of the [[wikipedia:Greek underworld|Greek underworld]] in [[wikipedia:Greek mythology|Greek mythology]].
  ** According to ''[[wikipedia:Inferno (Dante)|Inferno]]'', the first ''cantica'' of [[wikipedia:Dante Alighieri|Dante Aligheri]]'s ''[[wikipedia:Divine Comedy|Divine Comedy]]'', Cocytus is the ninth and lowest circle of [[wikipedia:Hell|Hell]] where the condemned souls of traitors are sent to a frozen lake and buried in ice in a varying degree, depending on the types of traitorous deeds they committed in life.
