title: Card Trivia:Ashened to Endlessness
wikitext: |-
  {{Navigation}}

  * "[[Veidos the Dragon of Endless Darkness]]" and various "[[Ashened]]" warriors/soldiers appear in this card's artwork, with the former depicted draining the souls of the latter.
  ** In reference to this card's effect to [[Fusion Summon]] using [[Pyro]] monsters on either field, including "[[Veidos the Eruption Dragon of Extinction]]", this card's artwork possibly depicts "Veidos the Eruption Dragon of Extinction" transforming into the titular "Endlessness" in "Veidos the Dragon of Endless Darkness" from absorbing the souls of the warriors/soldiers of "[[Obsidim, the Ashened City]]".
