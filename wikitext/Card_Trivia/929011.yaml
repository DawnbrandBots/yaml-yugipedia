title: Card Trivia:Alchemy Beast - Leon the Lead
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is named after [[wikipedia:Lead|lead]], one of the seven planetary metals used in alchemy.
  * This monster is based on a [[wikipedia:Lion|lion]], which represents many alchemical symbols and processes in alchemy, including the process of [[wikipedia:Aqua regia|dissolving the noble metals gold and platinum]].
