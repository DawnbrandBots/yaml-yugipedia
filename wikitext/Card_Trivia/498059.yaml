title: Card Trivia:Borreload Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Circuit Break]]'', and is also one of the cover cards of ''[[LINK VRAINS Box]]'' and ''[[Mega Pack 01]]''.
  * This monster appears in the artworks of "[[Borrel Buster Barrier]]", "[[Borrel Reboot]]", "[[Execute Protocols]]", "[[Forge a New Future]]", "[[Quick Launch]]", and "[[Tactical Exchanger]]".
  * This is the [[signature card]] of [[Varis]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** This card has the same [[ATK]] (3000) as the signature cards of the rivals of the other ''[[Master Duel]]'' anime series: [[Seto Kaiba]]'s "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]", [[Chazz Princeton]]'s "[[Armed Dragon LV10 (anime)|Armed Dragon LV10]]", [[Jack Atlas]]'s "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]", [[Kite Tenjo]]'s "[[Galaxy-Eyes Photon Dragon (anime)|Galaxy-Eyes Photon Dragon]]", and [[Declan Akaba]]'s "[[D/D/D Doom King Armageddon (anime)|D/D/D Doom King Armageddon]]".
  * This is the first [[Link Monster]] that requires a minimum of 3 monsters as [[Link Material]]s.
  * This was the first draconic monster used by the [[Knights of Hanoi]] in the ''Yu-Gi-Oh! VRAINS'' anime to actually be [[Dragon]].
  * This monster has multiple gun-like features, such as its main torso resembling the cylinder of an actual revolver handgun and its forearms being modeled after revolver barrels.
  ** In the ''Yu-Gi-Oh! VRAINS'' anime, whenever a "[[Rokket]]" monster's effect was used, they became 'bullets' for this monster, which were inserted into its cylinder and then fired out of its barrel-like mouth.
  * This is the rival counterpart of "[[Firewall Dragon]]".
  ** Both monsters have opposing poses and color schemes similarly to "[[Red Dragon Archfiend]]" and "[[Stardust Dragon]]".
  ** Furthermore, their effects also oppose each other, as "Firewall Dragon" protects other monsters, while this monster forcefully controls other monsters before sending them to the [[Graveyard]].
  * This monster has 8 alternate forms.
  ** [[Card evolutions|Upgraded]] [[Link-5]]: "[[Borrelend Dragon]]" and "[[Borrelshroud Dragon]]"
  ** [[Ritual Monster|Ritual]]: "[[Borreload Riot Dragon]]"
  ** [[Fusion Monster|Fusion]]: "[[Borreload Furious Dragon]]" and "[[Borreload Fatalflare Dragon]]"
  ** [[Synchro Monster|Synchro]]: "[[Borreload Savage Dragon]]"
  ** [[Xyz Monster|Xyz]]: "[[Borreload eXcharge Dragon]]"
  ** [[Link Monster|Link]]: "[[Borreload Liberator Dragon]]"
