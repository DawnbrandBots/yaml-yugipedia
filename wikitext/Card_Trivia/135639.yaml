title: Card Trivia:Mataza the Zapper
wikitext: |-
  {{Navigation}}

  * This monster is likely based on [[wikipedia:Maeda Toshiie|Maeda Toshiie]], a general from the [[wikipedia:Sengoku period|Sengoku period]] who is also known as Matazaemon.
  * In ''[[Dark Revelation Volume 2]]'', this card was [[misprint]]ed, as the [[Attribute]] was mistakenly written in the [[wikipedia:Zapf Dingbats|Zapf Dingbats]] typeface.
