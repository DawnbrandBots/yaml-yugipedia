title: 'Card Trivia:Number C1000: Numerounius'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Numeron Storm]]".
  ** This monster's silhouette appears in the artwork of "[[Numeron Chaos Ritual]]".
  * The number "1000" appears on this monster's right upper thigh.
  ** The number references [[Don Thousand]], who uses this monster in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This is the first "[[Number]]" monster whose number contains more than three digits.
  * This monster has an [[Card evolutions|upgraded]] "[[Number C#Number iC (Chaos Imaginary Number)|Number iC]]" form: "[[Number iC1000: Numerounius Numerounia]]".
  * This is the first [[Rank 12]] "Number" monster to be revealed in the anime.
  * This is the first "[[Number C]]" monster whose base "Number" form is unknown.
  ** This is also the first "Number C" monster to be [[Xyz Summon]]ed without performing an [[Xyz Evolution]] in the anime.
  ** This is also the final "Number C" monster to be revealed in the anime.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, this is the first monster with an [[original ATK]] of 10,000, as well as the first monster with an original ATK that has five digits.
  ** In the anime, this monster has the largest difference between finite [[ATK]] and [[DEF]] (9000) of all monsters.
  ** In the anime, this monster's original ATK and DEF (10,000/1000) are both ten times those of the four "[[Numeron Gate]]" monsters (1000/100), which were used to Xyz Summon this monster.
  *** In the ''[[OCG]]''/''[[TCG]]'', if this monster is Xyz Summoned by the effect of "[[Numeron Chaos Ritual]]", its ATK and DEF become the same as its original ATK and DEF in the anime.
