title: Card Trivia:Crimson Nova the Dark Cubic Lord
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Shiva|Shiva]], one of the principal deities in [[wikipedia:Hindusim|Hindusim]] who represents destruction.
  ** This monster can be seen as a [[counterpart]] of "[[Vijam the Cubic Seed]]", another DARK Fiend "[[Cubic]]" monster which is based on [[wikipedia:Vishnu|Vishnu]], the Hindu god of preservation who opposes Shiva, representing the cycle of life and death.
  *** This is reflected in the difference between both monsters; this monster's ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] requires the player to [[reveal]] three "Cubic" monsters with different names in their [[hand]], while the Summoning conditions of most other "Cubic" monsters (except for "[[Duza the Meteor Cubic Vessel]]") require multiple "Cubic" monsters to be [[send|sent]] from the [[field]] to the [[Graveyard]] (which can be facilitated with "Vijam"). In addition, the "Cubic" monsters that mention "Vijam" in their effects directly interact with a specific "Cubic" monster in the [[Deck]], while no other "Cubic" card in the [[Main Deck]] directly interacts with this card.
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Crimson Nova Trinity the Dark Cubic Lord]]".
  * This monster can be considered the [[DARK]] [[Fiend]] counterpart of "[[Blue-Eyes White Dragon]]".
  ** Both have an [[original ATK]] of 3000.
  ** Both are [[Fusion Material]]s of specific [[Fusion Monster]]s with 4500 [[ATK]] using three copies of the same monster: "Crimson Nova Trinity the Dark Cubic Lord" for this card, "[[Blue-Eyes Ultimate Dragon]]" for "Blue-Eyes White Dragon".
  ** Both monsters' owners expressed some form of obsession in the storyline of the ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'' movie: this monster's owner, [[Aigami]], is obsessed with moving to a better world, while the owner of "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]", [[Seto Kaiba (manga)|Seto Kaiba]], is obsessed with wanting to Duel [[Pharaoh Atem]] again.
