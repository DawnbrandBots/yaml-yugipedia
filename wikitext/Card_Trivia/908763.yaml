title: Card Trivia:Kuribotorero
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Kuribot]]".
  ** Visually, this monster is "Kuribot" with the hat, cape, pauldrons, sword, and [[wikipedia:Muleta|muleta]] used by "[[Siesta Torero]]".
  * This is the first "[[Kuriboh (archetype)|Kuriboh]]" Fusion Monster.
