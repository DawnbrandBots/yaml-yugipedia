title: Card Trivia:Necro Dollmeister
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The "Meister" in this card's name is the German word for "master".
  * This card references the anime, ''[[wikipedia:Rozen Maiden|Rozen Maiden]]'', where the hands depicted in this card's artwork belongs to the dollmaker, Rozen, who is seen working on dolls that resemble Hinaichigo, Souseiseki, Suiseiseki, and Kanaria.
  ** Fittingly, this card was played by its owner, [[Alice]] while she played her [[Field Spell Card|Field Spell]], "[[Cursed Dollhouse]]", both of which reference ''Rozen Maiden''.
