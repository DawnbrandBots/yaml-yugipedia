title: Card Trivia:Jowgen the Spiritualist
wikitext: |-
  {{Navigation}}

  * This monster is a reference to Genjō, or [[wikipedia:Xuanzang|Xuanzang]], a Buddhist monk, who appeared in [[wikipedia:Wu Cheng'en|Wu Cheng'en]]'s ''[[wikipedia:Journey to the West|Journey to the West]]''.
  ** This card's Chinese name (奘玄 ''Zàngxuán'') is simply an [[wikipedia:Anagram|anagram]] of the monk's name (玄奘 ''Xuánzàng'').
  * This card has a [[Spell Card]] [[counterpart]], "[[Special Hurricane]]".
  * This card is similar to "[[Fossil Dyna Pachycephalo]]", as both cards have the same [[DEF]] and features [[Special Summon]] [[anti-support]] effects, including the effect that prevents Special Summoning.
