title: Card Trivia:Reanimation Wave
wikitext: |-
  {{Navigation}}

  * "[[Archfiend Zombie-Skull]]" and "[[Revived King Ha Des]]" appear in this card's artwork.
  ** This card's artwork depicts "Revived King Ha Des", following the transformation and revival of "[[Dark Ruler Ha Des]]", gaining power over "[[Skull Archfiend of Lightning]]" by reviving its corpse and turning him into its [[Zombie counterpart]], "Archfiend Zombie-Skull".
