title: Card Trivia:Hraesvelgr, the Desperate Doom Eagle
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Hræsvelgr|Hræsvelgr]] (Old Norse for "corpse-swallower"), a ''jotunn'' in [[wikipedia:Norse mythology|Norse mythology]] who takes the form of an [[wikipedia:Eagle|eagle]].
  ** This card's effect to [[target]] a monster in the opponent's [[Graveyard]] and [[shuffle]] it into the [[Deck]] is derived from its translated name.
