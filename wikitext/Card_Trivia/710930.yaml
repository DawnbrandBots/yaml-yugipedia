title: Card Trivia:Vaylantz Genesis Grand Duke
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vaylantz Wave - Master Phase]]".
  ** A chibi minifigure of this monster appears in the artwork of "[[Vaylantz Wars - The Place of Beginning]]".
  * This card's name is based on the aristocratic title of [[wikipedia:Grand duke|grand duke]].
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Vaylantz Dominator Duke]]".
  * This card has a [[WATER]] [[counterpart]]: "[[Mamonaka the Vaylantz United]]".
  ** Both are [[Level]] 10 "[[Vaylantz]]" [[Fusion Pendulum Monster]]s.
  * This card is the first [[Extra Deck]] [[Pendulum Monster]] that does not have an effect to place itself in the [[Pendulum Zone]] when it is [[destroy]]ed.
