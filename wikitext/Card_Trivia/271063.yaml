title: Card Trivia:Mistake
wikitext: |-
  {{Navigation}}

  * "[[Sangan]]", "[[Tardy Orc]]", "[[Tour Bus To Forbidden Realms]]", and "[[Tour Bus From the Underworld]]" appear in this card's artwork.
  ** "Tardy Orc" is depicted missing "Tour Bus From the Underworld".
  ** "Sangan" is depicted mistakenly boarding "Tour Bus To Forbidden Realms" without realizing that he is boarding the wrong bus, meaning that "Tardy Orc" was luckier.
  *** This is a reference to "Sangan" becoming [[Forbidden]] as of the [[March 2013 Lists|March 1, 2013]] Forbidden Lists, which was more than 4 months before this card debuted in ''[[Shadow Specters]]''.
