title: Card Trivia:Flower Cardian Pine with Crane
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Flower Stacking]]", "[[Fraud Check]]", and "[[Super All In!]]".
  * "[[Crane Crane]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Pine with Crane", one of the special cards in the "Pine" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (1) references how the "Pine with Crane" card falls under the month of January, the first month of the year.
  ** This monster's [[original ATK and DEF]] (2000/2000) references how the "Pine with Crane" card is a ''hikari'' card, which is worth twenty points.
