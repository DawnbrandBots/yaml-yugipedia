title: Card Trivia:Winged Dragon, Guardian of the Fortress 1
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Stage of Destiny]]".
  * This monster has a [[recolored counterpart]] with 200 less [[ATK]] and [[DEF]]: "[[Winged Dragon, Guardian of the Fortress 2|Winged Dragon, Guardian of the Fortress #2]]".
  ** Like "Guardian of the Fortress #2", this monster is based on a [[wikipedia:Wyvern|wyvern]], a creature from [[wikipedia:European mythology|European mythology]] who is depicted as a winged dragon without forearms.
  ** In Italian, this monster is named "Drago Alato #1" while "Winged Dragon, Guardian of the Fortress #2" is named "Dragone Alato, Custode della Fortezza #2".
  * This monster has a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Winged Dragon of Chaos]]".
  * This is the first monster [[Summon]]ed by [[Yami Yugi]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** This is also the first [[WIND]] monster to be Summoned in the anime.
  * Despite this card's WIND [[Attribute]] and its [[flavor text]] stating this monster's signature attack is a sweeping dive, in the anime, this monster attacks by breathing a fireball.
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] artwork is taken from {{chapter|Yu-Gi-Oh!|081|ref}}, specifically from the panel showing Dark Yugi switching [[Winged Dragon, Guardian of the Fortress (manga)|this monster]] into [[Attack Position]].
