title: Card Trivia:Odd-Eyes Advance Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Deck 2020]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Odd-Eyes Dragon]]".
  ** This monster's name references the Japanese term for [[Tribute Summon]], "Advance Summon".
  *** This monster shares the same naming scheme of the [[Four Dimensional Dragons]], all of which are named after a [[Summoning mechanic]].
  * This monster is the [[Standard Dimension]] [[counterpart]] of "[[Dark Requiem Xyz Dragon]]", "[[Crystal Wing Synchro Dragon]]", and "[[Greedy Venom Fusion Dragon]]".
