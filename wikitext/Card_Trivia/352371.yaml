title: Card Trivia:Wavering Eyes
wikitext: |-
  {{Navigation}}

  * "[[Hypnosister]]", "[[Risebell the Summoner]]", and "[[Saambell the Summoner]]" appear in this card's artwork.
  ** This card's artwork may possibly depict the transformation of "Risebell the Summoner" into "[[Risebell the Star Adjuster]]".
  * The events in this card's artwork are followed by that of "[[Unwavering Bond]]", in which "Risebell" is attempting to resist the mind control of "Hypnosister" by remembering his bond with "Saambell".
