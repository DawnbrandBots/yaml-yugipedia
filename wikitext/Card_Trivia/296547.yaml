title: Card Trivia:Swarm of Crows
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the formation of the crows positioned to resemble a giant crow.
  * This is the only member of the [[Swarm of]] series to not be a [[Level 3]] [[Insect]] monster with an [[original ATK and DEF]] divisible by 500, being a [[Level 5]] [[Winged Beast]] monster with 1200 [[ATK]]/800 [[DEF]] instead.
