title: Card Trivia:Frostosaurus
wikitext: |-
  {{Navigation}}

  * An [[wikipedia:Aurora|aurora]] appears in this card's artwork.
  * This card has the highest [[ATK]] of all [[Level 6]] [[Normal Monster]]s, tied with "[[Trance the Magic Swordsman]]" and "[[Light Bringer Lucifer]]".
  ** This card is also tied with the other two cards for the highest ATK of all Level 6 monsters without a [[Summoning condition]].
  * This card is possibly a reference to the artwork of "[[Cold Wave]]", and may be the result of "[[Bracchio-raidus]]" surviving the blizzard and transforming into this monster.
  ** This is supported by "Bracchio-raidus" having the same [[Attribute]], [[Type]], and [[Level]] as this card.
  * This monster has an upgraded [[Transcendosaurus]] [[Synchro Monster|Synchro]] form: "[[Transcendosaurus Glaciasaurus]]".
