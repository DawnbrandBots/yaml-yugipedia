title: Card Trivia:Mobius Glacier
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Electric Lizard]]", "[[Kaitoptera]]", "[[Leghul]]", "[[Mystic Tomato]]" (as depicted in its ''[[OCG]]'' card artwork), and "[[Yata-Garasu]]" appear in this card's artwork.
  ** This card's artwork depicts "Yata-Garasu" is depicted with two legs instead of its three.
  ** This card's specific [[Type]] [[anti-support]] effect is based on the effects of cold temperatures on organisms, where certain animals (including [[beast]]s, [[Winged Beast|birds]], [[reptile]]s, and [[insect]]s) enter a state of hibernation, while most [[plant]]s will wither away.
  *** "Electric Lizard" and "Yata-Garasu" are not valid [[target]]s for this card's effect, as their Types are [[Thunder]] and [[Fiend]] respectively, but both monsters are each mistaken as [[Reptile]] and Winged Beast monsters due to their appearance.
