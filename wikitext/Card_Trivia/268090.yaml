title: Card Trivia:Summon Breaker
wikitext: |-
  {{Navigation}}

  * "[[Summon Limit]]" and a crude version of "[[Dark Magical Circle]]" appear in this card's artwork.
  ** "Summon Limit" has a similar effect to this card, that prevents a third [[Summon]] completely rather than penalizing a successful one.
  ** The events depicted in this card's artwork are continued in the artwork of "[[Summon Over]]".
  * This card is based on a [[wikipedia:Circuit breaker|circuit breaker]], an electronic component that opens (shuts down) a circuit when too much electrical current has gone through it.
  ** Fittingly, this card's effect ends a [[player]]'s [[turn]] after they successfully conduct their third Summon.
