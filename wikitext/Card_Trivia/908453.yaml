title: Card Trivia:Ultimate Crystal Rainbow Dragon Overdrive
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Legend of the Crystals]]''/''[[Structure Deck: Legend of the Crystal Beasts]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Rainbow Dragon]]".
  ** This monster's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! GX|effect name]] of "[[Rainbow Dragon (anime)|Rainbow Dragon]]" in the ''[[Yu-Gi-Oh! GX]]'' anime: "Rainbow Overdrive".
  ** This monster's effect to gain 7000 [[ATK]] while the player has 7 or more [[banish]]ed "[[Crystal Beast]]" monsters with different names is also a reference to the effect of "Rainbow Dragon" to [[send]] all "Crystal Beast" monsters the player [[control]]s to the [[Graveyard]] and gain 1000 ATK for each monster sent.
  * This monster is a [[counterpart]] of "[[Rainbow Overdragon]]".
  ** Both are [[Level 12]] Fusion Monsters with 4000 ATK and 0 [[DEF]].
  ** Both are upgraded forms of "Rainbow Dragon".
  ** Both require 7 "Crystal Beast" monsters as [[Fusion Material]]s; this monster also requires an "[[Ultimate Crystal]]" monster as [[material]].
  ** This monster's name is based on the effect name of "Rainbow Dragon" in the ''Yu-Gi-Oh! GX'' anime, while the name of "Rainbow Overdragon" is based on the Japanese attack name of "Rainbow Dragon", "Over the Rainbow" (オーバー・ザ・レインボー ''Ōbā za Reinbō'').
  * This monster has the highest specific number of [[Fusion Material]]s (8) of all Fusion Monsters in the ''[[OCG]]''/''[[TCG]]''.
  * This is the first "[[Ultimate Crystal]]" monster not to have an [[archetype condition]] in the ''TCG''.
