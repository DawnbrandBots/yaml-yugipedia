title: Card Trivia:Aqua Story - Urashima
wikitext: |-
  {{Navigation}}

  * This card references the Japanese fable of [[wikipedia:Urashima Tarō|Urashima Tarō]]. The story recalls the legend of a fisherman (for whom the story is named), who is given the privilege to visit the undersea palace of the Dragon God [[wikipedia:Ryūjin|Ryūjin]] for three days.
  ** This card's effect and artwork specifically reference the ending of the story. After returning from the palace Tarō discovers that, while for him only three days have passed, in the real world he has been gone for 300 years. Struck with grief, he accidentally opens a box (depicted in this card's artwork) Ryūjin's daughter had given him (which he had been told to never open), and is immediately rendered old and feeble (reflected in this card's effect: reduces ATK, DEF and negates effects).
