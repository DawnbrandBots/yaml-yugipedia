title: Card Trivia:Clay Wrap
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Elemental HERO Clayman]]" appears in this card's artwork.
  * This card's name is a pun on ''[https://www.kureha.co.jp/en/business/polymer/kurewrap.html Krewrap]'', the name of Japan's first [[wikipedia:Plastic wrap|plastic wrap]] product.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, when "[[Elemental Hero Clayman (anime)|Elemental Hero Clayman]]" is [[equip]]ped with this card, it is enveloped in a hazy transparent coating.
