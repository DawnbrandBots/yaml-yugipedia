title: Card Trivia:Legendary Six Samurai - Enishi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Shien's Dojo]]" and "[[Six Strike - Triple Impact]]".
  * This monster has an upgraded counterpart: "[[Legendary Lord Six Samurai - Enishi]]".
  * This monster is a younger version of "[[Enishi, Shien's Chancellor]]".
  ** Both monsters share the same [[Attribute]] ([[LIGHT]]).
  ** This monster's armor appears in the artwork of "Enishi, Shien's Chancellor".
  ** This monster's first effect cost is similar to the [[summoning condition]] of "Enishi, Shien's Chancellor".
  ** This monster's second effect raises its [[ATK]] and [[DEF]] to 2200/1200, the [[original ATK and DEF]] of "Enishi, Shien's Chancellor".
