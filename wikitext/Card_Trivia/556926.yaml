title: Card Trivia:F.A. Dark Dragster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[F.A. Dead Heat]]" and "[[F.A. Overheat]]".
  * This card's [[Summoning condition]] appears to reference this monster's status as a rival, since it can only be Summoned if a [[Level]] 7 or higher "[[F.A.]]" monster is on the [[field]].
  ** This is also supported by this monster's "dark" theme, as indicated by its unique [[DARK]] [[Attribute]] and color scheme among the "F.A." monsters.
