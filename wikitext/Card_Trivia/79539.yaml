title: Card Trivia:Terraforming
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts [[wikipedia:Mars|Mars]] being [[wikipedia:Terraforming|terraformed]] into an [[wikipedia:Earth|Earth]]-like planet.
  ** This is based on an actual project that people hope will make Mars (and other inhospitable planetary environments, like [[wikipedia:Venus|Venus]]) able to support human life and habitats.
  * This card has an [[Effect Monster]] counterpart: "[[Planet Pathfinder]]".
