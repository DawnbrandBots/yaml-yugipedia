title: Card Trivia:Ruddy Rose Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Basal Rose Shoot]]".
  * This monster's ''[[TCG]]'' name is based on "ruddy", a healthy red color, which is used for this monster's red color scheme.
  ** "Ruddy" is also the informal British-English euphemism for "bloody", which references this monster's Japanese name, "Blood Rose Dragon".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Black Rose Dragon]]".
  ** This is the first upgraded form of a [[Signer Dragon]] that is not "[[Stardust Dragon]]" or "[[Red Dragon Archfiend]]".
  ** This monster's first effect to [[destroy]] all cards on the [[field]] except itself likely references how [[Akiza Izinski]] finally masters her psychic powers at their fullest in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's second effect to [[Tribute]] itself to negate the activation of an opponent's destructive card or effect is based on the effect of "Stardust Dragon". Fittingly, the owner of "Stardust Dragon", [[Yusei Fudo]], had a big impact on Akiza's growth in the anime.
