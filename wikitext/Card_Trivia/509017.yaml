title: Card Trivia:Petit Angel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Beckoning Light]]", "[[Next to be Lost]]", "[[Perfect Counter Code 123]]", "[[Ray of Hope]]", and "[[Sprite's Blessing]]".
  * This monster has a [[recolored counterpart]]: "[[Shining Friendship]]".
  * This monster has a "[[Cyber]]" counterpart: "[[Cyber Petit Angel]]".
  * Despite this card initially featuring a halo in its first ''[[TCG]]'' artwork in its release in ''[[Spell Ruler]]'', it was later removed in its international release in ''[[Legend of Blue Eyes White Dragon]]".''
  ** In the international version of the most video games, the halo is removed from this card's artwork; however, the international version of ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' features this monster depicted with a crown in place of the halo.
