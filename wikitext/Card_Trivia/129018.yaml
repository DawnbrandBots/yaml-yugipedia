title: Card Trivia:House of Sand
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The structure in this card's artwork appears in the artwork of "[[Rainbow Bridge of Salvation]]".
  * This card is based on a [[wikipedia:Ziggurat|ziggurat]], a stepped pyramidal structure built in ancient [[wikipedia:Mesopotamia|Mesopotamia]] which is believed to be the dwelling place of each Mesopotamian city's patron deity.
  ** This card's name and artwork is also based on the [[wikipedia:Ziggurat of Ur|Ziggurat of Ur]], a temple dedicated to the patron deity of [[wikipedia:Ur|Ur]], where its Sumerian name, "Etemenniguru", translates to "temple whose foundation creates aura".
