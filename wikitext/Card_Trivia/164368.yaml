title: Card Trivia:Jawsman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Infinity Tooth]]".
  * This monster's name is a pun on its appearance, as it is a humanoid creature whose design consists of multiple sets of jaws that resemble those of a shark's.
  ** Similar to "[[Big Jaws]]" (which was used to [[Tribute Summon]] this monster in ''[[Yu-Gi-Oh! ZEXAL]]'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]]), this monster's name is based on the American thriller film, ''[[wikipedia:Jaws (film)|Jaws]]'', which is primarily centered around a [[wikipedia:Great white shark|great white shark]]; however, the end of this monster's right arm resembles the head of a [[wikipedia:Hammerhead shark|hammerhead shark]].
  * This is the first monster to be [[Tribute Summon]]ed in the ''Yu-Gi-Oh! ZEXAL'' anime and manga.
  * Despite its appearance as a [[Fish]] monster, this monster's [[Type]] is [[Beast-Warrior]].
