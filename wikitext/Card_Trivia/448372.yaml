title: Card Trivia:F.A. Sonic Meister
wikitext: |-
  {{Navigation}}

  * This monster's design is based on a Formula One car.
  * "[[U.A. Midfielder]]" is the one driving "Sonic Meister".
  * This monster appears in the artworks of "[[Amaze Attraction Rapid Racing]]", ""[[Consolation Prize]]" (where it is shown being redesigned into "[[F.A. Dawn Dragster]]"), "[[F.A. Circuit Grand Prix]]", "[[F.A. City Grand Prix]]", "[[F.A. Downforce]]", "[[F.A. Motorhome Transport]]", and "[[F.A. Pit Stop]]".
