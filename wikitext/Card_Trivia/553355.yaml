title: Card Trivia:Gouki The Master Ogre
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gouki Finishing Move]]" and "[[Gouki Roar]]".
  * This monster's name is based on [[wikipedia:Antonio Inoki|Antonio Inoki]], a Japanese [[wikipedia:Professional wrestling|professional wrestler]] and politician who was known for his time in [[wikipedia:New Japan Pro-Wrestling|New Japan Pro Wrestling]].
