title: Card Trivia:Wattkid
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster Chronicle]]''.
  * This monster appears in the artwork of "[[Judgment of Thunder]]".
  * This monster has two [[counterparts]]:
  ** A [[recolored counterpart]]: "[[Oscillo Hero]]"
  ** A ''[[Rush Duel]]'' counterpart: "[[Wattkiss]]"
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|61|ref}}, specifically from the panel showing [[Oscillo Hero 2 (manga)|this monster]] being Summoned.
