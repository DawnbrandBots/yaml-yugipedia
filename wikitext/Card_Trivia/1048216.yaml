title: Card Trivia:Fiendsmith's Requiem
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fiendsmith's Tract]]" and "[[Fiendsmith Engraver]]".
  * This monster has two [[Card evolutions|upgraded]] forms: "[[Fiendsmith's Sequence]]" and "[[Fiendsmith's Agnumday]]".
  * This monster is named after a [[wikipedia:Requiem|Requiem]], a funeral mass of the [[wikipedia:Catholic Church|Catholic Church]] offered for the repose of the souls of the dead in Christian religion.
  ** Fittingly, this monster resembles a [[wikipedia:Coffin|coffin]], a funerary box used to contain or view the corpse used for burial or cremation. Also, this monster's base Japanese name is "Engraved Demon's Requiem Coffin" (刻まれし魔の鎮魂棺 ''Kizamareshi Ma no Chinkonkan'').
