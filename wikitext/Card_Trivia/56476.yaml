title: Card Trivia:Fabled Grimro
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duel Terminal - Demon Roar God Revival!!]]''.
  * When this card is scanned in the [[Duel Terminal]], a 3D model of it throws a kiss to the player.
  * This card's name is derived from [[wikipedia:Gemory|Gemory]], one of the seventy-two demons of the [[wikipedia:Key of Solomon|Key of Solomon]].
