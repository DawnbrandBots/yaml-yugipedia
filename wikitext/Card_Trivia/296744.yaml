title: Card Trivia:Magicalized Duston Mop
wikitext: |-
  {{Navigation}}

  * "[[Helping Robo for Combat]]", "[[Blue Duston]]", "[[White Duston]]", "[[Green Duston]]", "[[Red Duston]]", "[[Yellow Duston]]" and other currently unknown "[[Duston]]" monsters are featured in this card's artwork.
  * This mop appears in the artworks of "[[Top Share]]" and "[[Two-for-One Team]]".
  * A monster [[equip]]ped with this card basically gains the negative effects of the "Duston" monsters.
