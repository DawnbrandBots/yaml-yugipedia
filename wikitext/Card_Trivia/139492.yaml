title: Card Trivia:Radiant Spirit
wikitext: |-
  {{Navigation}}

  * This card's [[EARTH]], [[WATER]], [[WIND]], [[DARK]], and [[FIRE]] counterparts are "[[Raging Earth]]", "[[Silent Abyss]]", "[[Destruction Cyclone]]", "[[Umbral Soul]]" and "[[Firestorm Prominence]]", respectively. Their effects apply to their respective [[Attribute]]s.
  * This card and its counterparts are All Reptile-Type monsters.
  * This card is based off of a tortoise. According to the "Book of Ceremonies" in Chinese culture, the tortoise is one of the four entities that possesses spirit.
