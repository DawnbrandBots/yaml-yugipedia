title: Card Trivia:Skeletal Swarm
wikitext: |-
  {{Navigation}}

  * Five copies of "[[Skull Servant (Rush Duel)|Skull Servant]]" appear in this card's artwork.
  ** Contrarily to the many [[Spell]]/[[Trap Card]]s depicting "[[Skull Servant]]" in the ''[[OCG]]/[[TCG]]'', there is no doubt about this card depicting it rather than its lookalike, "[[King of the Skull Servants]]", because this card's effect only counts the copies of "Skull Servant" and "[[King of the Skull Servants (Rush Duel)|King of the Skull Servants]]" has no effect that treats its name as "Skull Servant".
