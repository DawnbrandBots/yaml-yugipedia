title: Card Trivia:Utchatzimime Token
wikitext: |-
  {{Navigation|mode=token}}

  * This monster's name is a portmanteau of "[[Eye of Wdjat|Wdjat]]" (romanized as ''utchat'') and "Tzitzimimeh" (the plural form of "[[wikipedia:Tzitzimitl|Tzitzimitl]]", a celestial deity in [[wikipedia:Aztec mythology|Aztec mythology]]). 
  * This monster's Japanese name has a forced reading of "Utchatzimime" in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga; in the ''[[OCG]]'', it uses the standard reading of its kanji.
  * This card's artwork is taken from {{chapter|5D's|064|ref}}, specifically from the panel showing [[Uchatsuimiime Token (manga)|this monster]] being Summoned.
