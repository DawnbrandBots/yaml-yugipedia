title: Card Trivia:Underworld Fighter Balmung
wikitext: |-
  {{Navigation}}

  * According to Norse mythology, [[wikipedia:Odin|Odin]] struck the [[wikipedia:Barnstokkr|Barnstokkr]] tree with a sword named [[wikipedia:Balmung|Balmung]]. Odin later destroyed the sword after it was pulled from the tree.
  * This monster bears a strong resemblance to "[[Dark Blade]]". Both have the same [[Type]], [[Level]], [[Attribute]], and they wear similar armor.
  ** They both have "Makai" in their OCG names.
