title: Card Trivia:Bandijo the Battle Ballad
wikitext: |-
  {{Navigation}}

  * This is one of the cover cards of ''[[Deck Mod Pack: Fortissimo of the Whirlwinds!!]]''.
  * This monster appears in the artworks of "[[Heist At Midnight]]", "[[Looter Force]]", "[[Pickup Strum]]", and "[[Psyquip Fusion]]".
  ** A figure of this monster appears in the artwork of "[[Condurglar the Assisting Anthem]]".
  * "[[Heavy Arms - Double Nexcalibur]]" is based on this monster's banjo.
  * This monster's name is a portmanteau of the words "[[wikipedia:Bandit|bandit]]" and "[[wikipedia:Banjo|banjo]]".
  * This monster has a [[Praime]] [[counterpart]]: "[[Praime Bandijo]]".
  * This monster has an evolved [[Fusion Monster|Fusion]] form: "[[Bandiva the Ballistic Battle Ballad]]".
