title: Card Trivia:Magnarokket Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Double Interlock]]", "[[Quick Launch]]", "[[Rapid Trigger]]", and "[[Rokket Barrage]]".
  * This monster's name is based on a [[wikipedia:List of Magnum cartridges|magnum cartridge]], a firearm cartridge with a typically larger case size than a standard cartridge of the same bullet caliber, resulting in both higher powder capacity and increased velocity and power.
  ** The design of this monster's head is based on a [[wikipedia:Hollow-point bullet|hollow-point bullet]], a type of ammunition designed with a cavity in the bullet's tip, causing it to expand upon impact with a target.
