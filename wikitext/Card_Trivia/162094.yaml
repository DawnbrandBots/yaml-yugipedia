title: Card Trivia:Class System
wikitext: |-
  {{Navigation}}

  * This card is based on a [[Wikipedia:Caste system|caste system]], a social hierarchy that ranks people into different classes based on ancestry and other traits.
  * In {{episode|Yu-Gi-Oh!|140|ref}}, this card was used to prevent "[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]" from being [[destroyed by battle]] by "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]". This was designed to emulate the manga effect of "[[The Sun Dragon Ra]]", which prevents it from being destroyed by the other [[Egyptian God]]s of a lower [[Hierarchy]], as seen in {{chapter|Yu-Gi-Oh!|275|ref}} when "Ra" was not destroyed by the attack of "[[The God of the Obelisk]]".
