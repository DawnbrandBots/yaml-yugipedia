title: Card Trivia:All-Eyes Phantom Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[G.O.D. (series)|G.O.D.]] form of "[[Odd-Eyes Phantom Dragon]]".
  * This monster can be considered the [[Yu-Gi-Oh! ARC-V (manga)|manga]] [[counterpart]] of "[[Supreme King Z-ARC]]", "[[Odd-Eyes Arcray Dragon]]" and "[[Odd-Eyes Revolution Dragon]]".
  ** It is [[Yuya Sakaki (manga)|Yuya Sakaki]]'s ultimate [[signature card]] in the ''Yu-Gi-Oh! ARC-V'' manga.
  ** Similar to how "Z-ARC", "Arcray" and "Revolution Dragon" are the final combination of the [[Four Dimensional Dragons]], this monster was [[Summon]]ed by [[Tributing]] all four of their manga counterparts, the signature cards of Yuya and [[Yuri (manga)|his]] [[Yugo (manga)|three]] [[Yuto (manga)|brothers]]: "[[Starving Venemy Dragon (manga)|Starving Venemy Dragon]]", "[[Clearwing Fast Dragon (manga)|Clearwing Fast Dragon]]", "[[Dark Anthelion Dragon (manga)|Dark Anthelion Dragon]]", and "[[Odd-Eyes Phantom Dragon (manga)|Odd-Eyes Phantom Dragon]]".
  * Among the G.O.D. cards, this monster represents the manipulation of time.
  ** This monster's effect allows it to skip the opponent's turn and go straight to the next [[Battle Phase]] (in the ''[[OCG]]''/''[[TCG]]'', it does not possess this effect, but retains its ability to negate the effects of [[Spell]]/[[Trap Card]]s). In addition, this monster can increase its [[ATK]] depending on the number of monsters [[Tribute]]d for its [[Special Summon]] (in the ''OCG''/''TCG'', it doubles its ATK).
  ** This monster's ''OCG''/''TCG'' [[Pendulum Effect]] allows a monster to attack twice, a toned-down version of its manga version's monster effect to skip to the next Battle Phase.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|ARC-V|038|ref}}, specifically from the panel showing [[G.O.D.-Eyes Phantom Dragon (manga)|this monster]] being Summoned.
