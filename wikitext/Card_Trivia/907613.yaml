title: Card Trivia:Archfiend Marmot of Deliciousness
wikitext: |-
  {{Navigation}}

  * This monster is a counterpart to "[[Archfiend Marmot of Nefariousness]]".
  ** Its Japanese name is a combination of the Japanese name of "Archfiend Marmot of Nefariousness", "Daemon Beaver" (デーモン・ビーバー ''Dēmon Bībā''), and "[[wikipedia:Galbi|Galbi]]" (カルビ ''Karubi''), which are Korean-style marinated barbecued ribs.
