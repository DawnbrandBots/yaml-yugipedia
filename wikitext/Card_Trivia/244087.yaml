title: Card Trivia:Bull Blader
wikitext: |-
  {{Navigation}}

  * Despite having a resemblance to [[Beast-Warrior]]s like "[[Battle Steer]]" and "[[Battle Ox]]", this card is a [[Warrior]] monster.
  * Just as [[Yuma Tsukumo|Yuma]]'s "[[Gagaga Magician]]" can be comparable to [[Yugi Muto|Yugi]]'s "[[Dark Magician]]", this card can be comparable to "[[Buster Blader]]". Both have the same [[Attribute]] and [[Type]], both are 3 [[Level]]s lower and have 1000 less [[ATK]] than their respective counterparts, and both have the word "Blader" in their names.
  * This card is based on the [[wikipedia:Minotaur|Minotaur]].
