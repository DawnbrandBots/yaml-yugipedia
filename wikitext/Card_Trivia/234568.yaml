title: Card Trivia:Tomato King
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster's empowered form appears in the background of this card's artwork.
  * This monster's Japanese anime name, "Dred King" (ドレッドキング, ''Doreddo Kingu'') and Japanese video game name, "Redread King" (レッドレッドキング, ''Reddoreddo Kingu'') are portmanteaus of the words "red" (レッド, ''Reddo'') and "dread" (ドレッド, ''Doreddo''), both of which reflect this monster's red color scheme and the "dreadful" appearance it assumes when using its [[ATK]]-doubling effect.
