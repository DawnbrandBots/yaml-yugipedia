title: Card Trivia:Timebreaker Magician
wikitext: |-
  {{Navigation}}

  * This monster's armor looks similar to "[[Timegazer Magician]]".
  ** It also has the same [[Level]], [[Type]] and [[Attribute]] as "Timegazer", as well as its [[Pendulum Effect]] being a counterpart to the [[monster effect]] of "Timegazer".
  * This monster appears to be an younger, [[Pendulum Monster|Pendulum]] version of "[[Enlightenment Paladin]]".
  ** This is supported by the 2 monsters' similar hairstyles, swords, and blade-like arcs on their bodies, as well as the fact that this card was used for the first [[Synchro Summon]] of "[[Enlightenment Paladin (anime)|Enlightment Paladin]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This card was the first "Magician" Pendulum Monster to not be thematically paired with another.
