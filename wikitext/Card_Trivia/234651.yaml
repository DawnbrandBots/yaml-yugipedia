title: Card Trivia:Mask of Weakness
wikitext: |-
  {{Navigation}}

  * The kanji (弱) on this mask translates to "weakness".
  * This card has a ''[[Rush Duel]]'' [[Noodle Mask]] parody: "[[Noodle Mask of Disgust]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|187|ref}}, specifically from the panel showing [[Mask of Weakness (manga)|this mask]] affecting "[[Nuvia the Wicked (manga)|Nuvia the Wicked]]", albeit with minor differences in detailing.
