title: Card Trivia:Snake-Eyes Flamberge Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Sinful Spoils of Betrayal - Silvera]]" and "[[Startling Stare of the Snake-Eyes]]".
  ** The artwork of "[[Original Sinful Spoils - Snake-Eye]]" depicts the transformation of "[[Sinful Spoils of Subversion - Snake-Eye]]" into this monster.
  * This monster appears to be inspired by the [[signature card]]s of the rivals in the ''Yu-Gi-Oh!'' anime and manga series, especially the [[-Eyes Dragon]] monsters, being a [[Level 8]] [[Dragon]] monster with an [[original ATK and DEF]] of 3000/2500.
  ** This mirrors "[[Diabellstar the Black Witch]]", which is instead inspired by most of the protagonists' signature cards, especially "[[Dark Magician]]", being a [[Level 7]] [[DARK]] [[Spellcaster]] monster with 2500 [[ATK]].
  ** This is the first -Eyes Dragon monster to not be related to an [[archetype]] that appeared in a ''Yu-Gi-Oh!'' anime or manga.

  * This monster has two counterparts:
  ** A [[Fusion Monster]] counterpart: "[[Snake-Eyes Doomed Dragon]]".
  ** A [[Synchro Monster]] counterpart: "[[Snake-Eyes Vengeance Dragon]]".
