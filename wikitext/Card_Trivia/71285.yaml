title: Card Trivia:Summoning Clock
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Axe Raider]]", "[[Celtic Guardian]]", and "[[Harpie Lady]]" appear in this card's artwork.
  ** Interestingly, in the international versions of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, "Harpie Lady's" bust in this card's artwork was not censored.
  * The clock in this card's artwork features an error: the Roman numeral sequence should be read as "I, II, III, '''IV''', V"; however, the Roman numeral for four is replaced by the Roman numeral for three, thus the sequence is "I, II, III, '''III''', V".
