title: Card Trivia:Holactie the Creator of Light
wikitext: |-
  {{Navigation}}

  * In [[wikipedia:Egyptian mythology|Egyptian mythology]], '''[[wikipedia:Re-Hor-achti|Ra-Horakhty]]''' was more of a title, or manifestation, than a composite god. It translates as "Ra (who is) Horus of the Horizons". It was intended to link Horakhty (as a sunrise-orientated aspect of Horus) to Ra. It has been suggested that Ra-Horakhty simply refers to the sun's journey from horizon to horizon as Ra, or that it means to show Ra as a symbolic god of hope and rebirth. This link was probably encouraged by Ra and Horus' common link to the sun and the Pharaoh.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster's [[attack name]] was "Djeser", which means "holy" in ancient Egyptian language. The [[wikipedia:Mortuary Temple of Hatshepsut|Mortuary Temple of Queen Hatshepsut]] is named "Djeser-Djeseru" (roughly "Holiest of Holies").
  ** It is likely that "[[Obelisk the Tormentor]]", "[[Slifer the Sky Dragon]]" and "[[Winged Dragon of Ra]]" are manifestations of this monster, given that they were [[Tribute]]d to form it.
  * [[Kazuki Takahashi]] posted the artwork for this card in the [http://studio-dice.com/#/yugioh/gallery gallery] on his website before its ''[[OCG]]'' release was announced.
  * This card has a "[[Sacred Beast]]" [[Fusion Monster|Fusion]] [[counterpart]]: "[[Armityle the Chaos Phantasm]]".
  ** Both are [[Level]] 12 and have difficult [[Summoning conditions]] relying on 3 monsters.
  * This is the only card to have a five-letter/number set abbreviation in its [[Card Number]].
  * This card is the only [[DIVINE]] monster that isn't [[Divine-Beast]]-[[Type]]. Instead, it was given its own new Type, the [[Creator God]]-Type.
  ** This is also the only [[DIVINE]] monster to not be Level 10.
  * This is the first non-[[DARK]] monster in the ''OCG'' to be a [[Duel winner]].
  * This is the first monster with ? [[ATK]] and [[DEF]] that does not have an effect that determines its ATK/DEF values, followed by "[[The Winged Dragon of Ra - Sphere Mode]]".
  ** This is because this card cannot battle, as the player will always automatically win when they successfully [[Summon]] this card.
  * This is the first card to be based off a [[Egyptian Spirit Monster|monster spirit]], as opposed to the reverse.
  * Only 10,000 copies of this card have been released in Japan.
  * The icon for Creator God-Type monsters in ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'' is based on the [[The Creator of Light (character)|character version]] of this card.
