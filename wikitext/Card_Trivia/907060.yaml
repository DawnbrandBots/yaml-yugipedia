title: Card Trivia:Wing Captain
wikitext: |-
  {{Navigation}}

  [[File:Play_Soccer-1-.jpg|thumb|right|250|The back of "Wing Captain", showing its uniform number 5]]

  * This monster is based on a [[wikipedia:Captain (association football)|team captain]], a [[wikipedia:Association football|soccer player]] who serves as the on-pitch leader of their team.
  ** This monster's name is also derived from [[wikipedia:Winger (association football)|winger]], a midfield soccer player who is stationed in a wide position.
  * This monster's [[wikipedia:uniform number|uniform number]] is "5", as shown in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
