title: Card Trivia:World Legacy Bestowal
wikitext: |-
  {{Navigation}}

  * "[[Mekk-Knight Crusadia Avramax]]" and the human form of "[[Lee the World Chalice Fairy]]", both inside "[[World Gears of Theurlogical Demiurgy]]", appear in this card's artwork.
  ** This card's effect represents the choice "Avramax" has to make at this point of the lore: he can either destroy "World Gears of Theurlogical Demiurgy" and preserve the current world, or merge with them using the power of the "[[World Legacy]]" to become "[[Avida, Rebuilder of Worlds]]".
