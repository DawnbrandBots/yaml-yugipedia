title: Card Trivia:Ominous Ogre of Yamimakai
wikitext: |-
  {{Navigation}}

  * This monster is a retrained ''[[Rush Duel]]'' [[counterpart]] of "[[King of Yamimakai]]".
  ** This monster's [[ATK]]/[[DEF]] are the stats of the [[King of Yamimakai (manga)|manga version]] of the monster reduced by 1000.
  ** This monster's inclusion in the [[Zera (Rush Duel)|Zera]] [[series]] references how "[[King of Yamimakai (FMR)|King of Yamimakai]]" was required to [[Ritual Summon]] "[[Zera The Mant (FMR)|Zera the Mant]]" in ''[[Yu-Gi-Oh! Forbidden Memories]]''.
