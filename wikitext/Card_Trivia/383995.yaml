title: Card Trivia:Void Purification
wikitext: |-
  {{Navigation}}

  * "[[Dragunity Divine Lance]]" appears in this card's artwork.
  * This card's artwork follows the events depicted in "[[Zefra Divine Strike]]"; the lance, having been fired from the bow of "[[Tellarknight Ptolemaeus]]", is shown piercing and destroying the body of "[[El Shaddoll Anoyatyllis]]".
