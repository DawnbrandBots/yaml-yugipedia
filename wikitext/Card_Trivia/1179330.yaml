title: Card Trivia:Hamon, Lord of Striking Thunder - Sacred Beast of Sinful 
  Catastrophe
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] counterpart of "[[Hamon, Lord of Striking Thunder]]".
  ** This monster's pose is based on the pose assumed by "[[Hamon, Lord of Striking Thunder (Duel Links)|Hamon, Lord of Striking Thunder]]" during its Summoning cutscene in ''[[Yu-Gi-Oh! Duel Links]]''.
  ** This monster's effect to inflict 1000 damage to the opponent when a monster is [[sent]] to their [[Graveyard]] [[once per turn]] is based on the effect of "[[Hamon, Lord of Striking Thunder (anime)|Hamon, Lord of Striking Thunder]]" in the ''[[Yu-Gi-Oh! GX]]'' anime, which inflicts 1000 damage to the opponent each time it [[destroy]]s a monster by battle. Its "once per turn" effect is based on how "Hamon" destroyed an opponent's monster by battle once per turn.
  ** This monster's effect to prevent the player from taking damage the turn it is [[destroy]]ed and sent to the Graveyard are based on the additional effect of "Hamon, Lord of Striking Thunder" in the ''Yu-Gi-Oh! GX'' anime, which prevents the player from taking damage when it is destroyed in [[Defense Position]].
