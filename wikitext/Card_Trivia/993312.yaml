title: Card Trivia:Zuttomozaurus
wikitext: |-
  {{Navigation}}

  * "Zuttomo" (ずっ友) is the abbreviated form of the Japanese phrase meaning "best friends forever" (ずっと友達 ''Zutto Tomodachi'').
  * This monster is a [[retrain]]ed [[counterpart]] of "[[Tomozaurus]]".
  ** This card's artwork parodies that of "Tomozaurus", depicting this monster being overly friendly with the other dinosaur in the artwork rather than attacking it, referencing the aforementioned Japanese phrase.
  ** The aggressive and backstabbing nature of this monster is reflected in its two card effects: its first effect to prevent itself from being attacked while the player controls another [[Dinosaur]] monster is parallel to using its "friends" as a shield, while its effect to [[destroy]] another card the player controls is a parallel to it attacking its own kind.
