title: Card Trivia:Elemental HERO Nebula Neos
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[2018 Mega-Tins]]''.
  * This monster is a [[Triple Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Grand Mole]]" and "[[Neo-Spacian Dark Panther]]".
  ** This monster's [[Fusion Material]]s reference the elements that make up a nebula: a cloud of ionized gas and dust (represented by the [[EARTH]] [[Attribute]] "Grand Mole") in the void of space (represented by the [[DARK]] Attribute "Dark Panther").
  ** This monster's name is likely based on the [[Attack and effect names in Yu-Gi-Oh! GX|effect name]] of "[[Elemental Hero Grand Neos (anime)|Elemental HERO Grand Neos]]" in the ''[[Yu-Gi-Oh! GX]]'' anime: "Nebulous Hole".
  ** This monster's design features four claws in its left hand, similar to "Dark Panther", while it wields a gauntlet with twin drill weapons on its right hand, similar to "Grand Mole".
  * This is the first and currently only ''[[OCG]]''/''[[TCG]]''-original Triple Contact Fusion "[[Neos]]" monster.
