title: Card Trivia:XX-Saber Fulhelmknight
wikitext: |-
  {{Navigation}}

  * This monster's weapon bears a resemblance to that belonging to [[wikipedia:Ivy Valentine|Ivy Valentine]], a character from the 2002 fighting video game, ''[[wikipedia:Soul Calibur II|Soul Calibur II]]''.
  ** Fittingly, according to the ''Duel Terminal'' storyline, this monster is the reincarnation of "[[X-Saber Anu Piranha]]", who uses the same weapon.
  * This is the only "[[XX-Saber]]" monster to also be a [[Tuner monster]].
