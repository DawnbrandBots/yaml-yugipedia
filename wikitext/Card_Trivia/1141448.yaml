title: Card Trivia:Bot Herder
wikitext: |-
  {{Navigation}}

  * "[[Mad Hacker]]" appears in this card's artwork.
  * This card's name is based on a [[wikipedia:Bot herder|bot herder]], a hacker who uses automated techniques to scan specific network ranges and find vulnerable systems, such as machines without current security patches, and install bot programs to carry out a cyberattack.
