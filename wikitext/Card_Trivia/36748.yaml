title: Card Trivia:Armoroid
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Space Shuttle|Space Shuttle]], a low-orbiting spacecraft that operated from 1981 until its discontinuation in 2011.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|009|ref}}, specifically from the panel showing [[Armoroid (manga)|this monster]] being Summoned.
