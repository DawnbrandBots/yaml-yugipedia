title: Card Trivia:Mammoth Graveyard
wikitext: |-
  {{Navigation}}

  * This monster is based on the legend of the [[wikipedia:Elephants' graveyard|elephants' graveyard]], a location where elderly elephants will instinctively direct themselves from its group and die alone.
  * This monster has a [[Fusion Monster|Fusion]] [[recolored counterpart]]: "[[Great Mammoth of Goldfine]]".
  * This is one of two [[Dinosaur]] monsters owned by [[Yugi Muto]], the other being "[[King Rex]]".
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, this monster was a [[DARK]] [[Zombie]] monster, which was an important plot point as [[Dark Yugi (manga)|Dark Yugi]] took advantage of its DARK [[Attribute]] to weaken "[[Blue-Eyes Ultimate Dragon]]" when the two fused together. 
  ** In the manga, if two monsters with "opposing Attributes" were fused, the [[Fusion Monster]] would degrade over time as per the Attribute repulsion mechanic. This plot point is also used in the [[Yu-Gi-Oh! (anime)|anime]], even though this monster uses its ''[[OCG]]''/''[[TCG]]'' stats as an [[EARTH]] [[Dinosaur]].
  * This monster's ''OCG''/''TCG'' pose is taken from a panel from {{chapter|Yu-Gi-Oh!|065|ref}} showing [[Mammoth Graveyard (manga)|this monster]] being Summoned.
