title: Card Trivia:Branded in White
wikitext: |-
  {{Navigation}}

  * This card's artwork appears in one of the bubbles in the artwork of "[[Icejade Tremora]]".
  * The crest that appears in this card's artwork also appears in the artwork of "[[Alba-Lenatus the Abyss Dragon]]".
  ** The crest closely resembles [[wikipedia:William Blake|William Blake's]] diagram of the relationship of [[wikipedia:Vala, or The Four Zoas|the four Zoas]] (the four divine aspects divided from the primordial man [[wikipedia:Albion (Blake)|Albion]]).
  * The silhouette of "[[Fallen of Albaz]]" appears in this card's artwork.
  ** Oddly, "Albaz" is depicted with his two eyes open, despite being shown with his left eye closed in all his other appearances in card artworks (possibly having been scarred).
  * This card has a [[counterpart]]: "[[Branded in Red]]".
  ** Both depict "Fallen of Albaz"/"[[Aluber the Jester of Despia]]" in their card artworks.
  ** Both are [[Spell Card]]s that can [[Fusion Summon]] an [[Card evolutions|enpowered]] [[Fusion Monster|Fusion]] form of their respective monster: "[[Albion the Branded Dragon]]" for this card and "[[Masquerade the Blazing Dragon]]" for "Branded in Red".
  ** Both represent opposite '[[Branded|Stigmata]]' marks' powers.
