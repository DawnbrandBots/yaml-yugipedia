title: Card Trivia:Alkyl the Flame Emperor of the Lamp
wikitext: |-
  {{Navigation}}

  * The name "Alco" is derived from [[wikipedia:Alcohol (chemistry)|alcohol]], a type of organic compound that carries at least one [[wikipedia:Hydroxy group|hydroxyl group]] bound to a saturated [[wikipedia:Carbon|carbon]] atom (such as an [[wikipedia:Ethyl group|ethyl group]] or a [[wikipedia:Methyl group|methyl group]]).
  * This monster and its effect to [[Special Summon]] "[[Ethyl the Fire Genie of the Lamp]]" or "[[Methyl the Fire Genie of the Lamp]]" are based on the titular main character of ''[[wikipedia:Aladdin|Aladdin and the Wonderful Lamp]]''.
