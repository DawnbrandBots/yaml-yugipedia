title: Card Trivia:Noble Arms - Caliburn
wikitext: |-
  {{Navigation}}

  * This sword appears in the artworks of "[[Avalon]]", "[[Artorigus, King of the Noble Knights]]", "[[Morgan, the Enchantress of Avalon]]", "[[Noble Arms Museum]]", "[[Noble Knight Artorigus]]", "[[Sacred Noble Knight of King Artorigus]]", and "[[Until Noble Arms are Needed Once Again]]".
  ** Even though there are golden lines extending from this sword's hilt in the artwork of "[[Noble Knight Artorigus]]", both swords have the same hilt and are embedded in the same rock formation. This is used to reveal each side of this sword.
  *** This sword is similar to the one depicted in the artwork of "Noble Knight Artorigus", albeit drawn at a different angle and with more detail. The gold lines are still there, but are obscured by the blue lines of light on the blade of the sword.
  * This sword and "[[Noble Arms - Excaliburn]]" are both based on [[wikipedia:Excalibur|Excalibur]], the legendary sword belonging to [[wikipedia:King Arthur|King Arthur]]
  ** This card's name is a Latinized version of the sword's Welsh name, Caledfwlch. After the legend of King Arthur was introduced into French literature, "Caliburn" was translated to "Excalibur".
  ** The fact that this card and "Excaliburn" are different cards likely reference how the sword in the stone is not Excalibur, but merely his father's sword to serve as proof of his being Uther's son.
