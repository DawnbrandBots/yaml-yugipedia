title: Card Trivia:Evil 1
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The eye in the artwork looks very similar to [[Vector]]'s left eye.
  * This card is likely a reference to the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, specifically the [[Shadow Duel]] between [[Yami Yugi]] and [[Yami Marik]] during the [[Battle City Finals]]. Due to the [[Shadow Game]], the Duelist's host's body disappeared as they lost Life Points; this card is specifically a reference to the appearance of Yami Marik as a single eye, after he was forced to switch places with Marik Ishtar to become the sacrifice while Marik only had 1 Life Point remaining.
  ** The 1 LP corresponds to this card's first effect, while this card's artwork also features a single eye.
