title: Card Trivia:ZW - Dragonic Halberd
wikitext: |-
  {{Navigation}}

  [[File:ZW_-_Dragonic_Halberd_TV_Tokyo.png|thumb|right|317|"ZW - Leo Arms" on TV Tokyo's website, named "ZW - Dragonic Halberd"]]

  * This monster's name and [[Attribute]] reference the original name and Attribute of "[[ZW - Leo Arms]]" that were [[List of unseen cards#"ZW - Dragonic Halberd"|posted]] on the [[TV Tokyo]] website's list of notable monsters from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** Like the description of the card on TV Tokyo's website, this monster is [[Rank 5]], has an [[original ATK and DEF]] of 3000/1200, and can be [[equip]]ped to "[[Number C39: Utopia Ray]]" to grant it 3000 [[ATK]].
  * This monster shares similarities with "ZW - Leo Arms".
  ** Both monster share the same [[Rank]] (5) and original ATK and [[DEF]] (3000/1200).
  ** Both monsters are tied for having the highest original ATK (3000) of all Rank 5 monsters that require only two [[Xyz Material]]s.
  ** Both monsters have similar red and yellow color schemes, referencing that of the [[ZEXAL (power)|ZEXAL]] armor.
  ** When equipped to a "[[Utopia (archetype)|Utopia]]" monster, both monsters grant 3000 ATK, the most ATK of any "[[ZW -]]" monsters.
  ** Both monsters have an "Equipped Union" form with "[[Number C39: Utopia Ray]]", which depicts the latter equipped with the armor form of either monster. In this monster's case, it is "[[Ultimate Dragonic Utopia Ray]]".
  * This is the only [[DARK]] "ZW -" monster, other than the corrupted "[[DZW - Chimera Clad]]".
  * This monster's wings ressemble those of "[[Number 99: Utopic Dragon]]".
