title: Card Trivia:Infernoid Harmadik
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Infernoid Lucifugus", is derived from [[wikipedia:Lucifuge Rofocale|Lucifuge Rofocale]], the demon in charge of Hell's government by order of Lucifer.
  ** This monster's ''[[TCG]]'' name is derived from "''harmadik''", the Hungarian word for "third", reflecting its [[Level]] (3).
