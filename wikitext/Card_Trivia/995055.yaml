title: Card Trivia:Mighty Dino King Rex
wikitext: |-
  {{Navigation}}

  * This monster is an evolved version of "[[Two-Headed King Rex]]".
  ** This monster's pose is based on the artwork of "[[Two-Headed King Rex (manga)|Two-Headed King Rex]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  ** This monster has double the [[original ATK]] (3200) and the same [[DEF]] (1200) as "Two-Headed King Rex" (1600/1200).
  * This is one of the few [[legal]] monsters to completely break the unwritten [[Conventions of 3000 ATK and DEF|convention of 3000 ATK]]: this card has over 3000 [[ATK]], can be [[Normal Summon]]ed without any restrictions, and has no negative [[effect]]s.
