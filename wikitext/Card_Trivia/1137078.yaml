title: Card Trivia:Trap of the Poisonous Scorpion
wikitext: |-
  {{Navigation}}

  * This card is a reference to the "[[coin in sneaker]]" [[Shadow Game]] from {{chapter|Yu-Gi-Oh!|8|ref}}, where [[Dark Yugi (manga)|Dark Yugi]] and the [[Junky Scorpion owner]] took turns grabbing coins from inside a shoe, which had [[Junky Scorpion owner's scorpion|the owner's pet scorpion]] inside. The player who grabbed the most coins won.
  ** The card's effect to [[destroy]] an opponent's monster upon declaring an attack and inflict damage is based on the results of this game: Before his second turn, the owner asked if anything was fair as long as he stuck his hand in the shoe to grab coins, which Dark Yugi affirmed. The owner then took a knife and stabbed it into the middle of the shoe, trying to kill the scorpion, and then stuck his hand in and tried to grab all the remaining coins. However, his hand became stuck in the shoe due to grabbing all the coins, and he had missed the scorpion with the knife; it proceeded to sting him, badly poisoning him and ending the game in victory for Dark Yugi.
