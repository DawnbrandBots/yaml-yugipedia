title: Card Trivia:Nekroz of Brionac
wikitext: |-
  {{Navigation}}

  * This monster is "[[Shurit, Strategist of the Nekroz]]" wearing armor based on "[[Brionac, Dragon of the Ice Barrier]]".
  ** This monster shares the same [[Attribute]], [[Level]], [[ATK]], [[DEF]] as the aforementioned monster, and also has a similar [[effect]].
  ** Shurit appears to be the older in this card's artwork. It is unknown whether this is because time has passed, or because the power of the monster this armor is based off of is having an effect on his body.
  * "[[Nekroz Mirror]]" appears in this card's artwork as the hilt of his sword, the same as his previous form.
