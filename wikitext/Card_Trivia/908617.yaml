title: Card Trivia:Helshaddoll Hollow
wikitext: |-
  {{Navigation}}

  * "[[Gem-Knight Hollowcore]]" is the fully materialized form of this monster.
  * This monster shares the same [[Attribute]] ([[FIRE]]), [[Level]] (9), [[Type]] ([[Fiend]]), and [[original ATK and DEF]] (2900/2900) as "[[Infernoid Devyaty]]".
  ** The word "Hel" in "Helshaddoll", is derived from the name of the location in the afterlife where souls are punished after death, which the "[[Infernoid]]" [[archetype]] is designed after. This monster's Japanese name, "Helshaddoll Void", is a reference to the "[[Void]]" archetype, which [[support]]s the "Infernoid" archetype.
