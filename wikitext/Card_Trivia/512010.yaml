title: Card Trivia:Gilford the Legend
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Warrior's Triumph]]''.
  * This monster's sword has the same hilt as "[[Legendary Sword]]".
  * This monster is depicted being equipped with many weapons, which reflects its effect to [[equip]] a [[Warrior]] monster(s) with [[Equip Spell Card]]s from the [[Graveyard]].
  * This monster has two [[counterpart]]s.
  ** Retrained: "[[Gilford the Lightning]]".
  ** ''[[Rush Duel]]'' exclusive: "[[Gilford the Rising]]".
