title: Card Trivia:Voidvelg Requiem
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Requiem of Destruction!!]]''.
  * This monster appears in the artworks of "[[Galaxy Chaos Fusion]]", "[[Instinct Voidvelg]]", "[[Requiem Strike Back]]", "[[Void Dust Fusion]]", "[[Void Magnify Requiem]]", and "[[Worm Void Hole]]", as well as in the fourth artwork of "[[Galactica Oblivion]]".
  ** The black hole in this card's artwork also appears in the artwork of "[[Transamvelg Linac]]".
  ** Two black holes similar to the one in this card's artwork appear in the artwork of "[[Dark Matter Voiroad]]".
  * This monster is named after a [[wikipedia:Requiem|Requiem]], a funeral mass of the [[wikipedia:Catholic Church|Catholic Church]] offered for the repose of the souls of the dead in Christian religion.
  * This is the [[signature card]] of [[Zuwijo Zwil Velgear]] (and his [[Zuwijo Zwil Velgear (manga)|manga counterpart]]) in the ''Yu-Gi-Oh! GO RUSH!!'' [[Yu-Gi-Oh! GO RUSH!!|anime]] and [[Yu-Gi-Oh! GO RUSH!! (manga)|manga]].
  ** This is the one of the two signature cards of an anime rival to not be a [[Dragon]] monster, the other being [[Declan Akaba]]'s "[[D/D/D Doom King Armageddon (anime)|D/D/D Doom King Armageddon]]" from ''[[Yu-Gi-Oh! ARC-V]]''.
  ** It is also one of the two to have 2500 [[ATK]] instead of 3000, the other being [[Lucidien Kallister]]'s "[[Multistrike Dragon Dragias (anime)|Multistrike Dragon Dragias]]" from ''[[Yu-Gi-Oh! SEVENS]]''.
  ** Zuwijo refers to this monster as "myself" when he [[equip]]s it with [[Equip Spell]]s, in a similar manner to how [[Seto Kaiba]], [[Jack Atlas]], and [[Kite Tenjo]] often called their ace monsters "my soul".
  * This monster has 8 alternate forms.
  ** A [[God Tribute Summon]] form: "[[Voidvelg God Requiem]]".
  ** 4 [[Fusion Monster|Fusion]] forms:
  *** Standard upgrade: "[[Eternum Voidvelg Requiem]]".
  *** With "[[Voidvelg Chrysaor]]": "[[Voidvelg Gigantomachia]]".
  *** With "[[Abysslayer Leviaknight]]": "[[Voidvelg Chaosmachia]]".
  *** With "[[Voidvelg Hecatoncheir]]": "[[Voidvelg Gehennamagia]]".
  ** 3 [[Contact Fusion]] forms: 
  *** With "[[Contact Darkmatter Explorer]]": "[[Dark Matter Requiem]]". 
  *** With "[[Contact Dark Matter Omega Voyager]]": "[[Dark Matter Requiem Omega]]".
  *** With "[[Voidvelg Palerider]]": "[[Voidvelg Forbidden Requiem]]".
  * "[[Transamvelg Linac]]" and "[[Galactica Chaos Oblivion]]" are "[[Transam Linac]]" and "[[Galactica Oblivion]]" fused with this monster (respectively), representing the bond [[Zuwijo]] has with [[Yudias]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
