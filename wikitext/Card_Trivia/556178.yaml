title: Card Trivia:Borrel Regenerator
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the same area as the artwork of "[[Boot Sector Launch]]", with two additional "[[Rokket]]" monsters inside the revolving cylinder.
  ** Going clockwise, "[[Autorokket Dragon]]", "[[Anesthrokket Dragon]]", "[[Metalrokket Dragon]]", and "[[Shelrokket Dragon]]" appear in this card's artwork.
