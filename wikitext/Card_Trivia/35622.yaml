title: Card Trivia:Oyster Meister
wikitext: |-
  {{Navigation}}

  * "'''Oyster Meister'''" is a special qualification awarded to professional oyster handlers by the [http://oysters.jp/pc.php Japan Oyster Association].
  * "Meister" is German for master.
  * This monster appears in the artwork of "[[Hydro Pressure Cannon]]".
