title: Card Trivia:Hero Kid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Kid Guard]]", "[[Miracle Kids]]", "[[Wake Up Your Elemental HERO]]" and "[[Weak Anger]]".
  * This monster has an "[[Evil HERO]]" [[counterpart]]: "[[Evil HERO Infernal Prodigy]]".
  ** Both monsters share the same [[Level]] (2) and [[original ATK and DEF]] (300/600).
  ** Both monsters' names contain words that are synonymous to "child".
  ** Both monsters feature an effect related to [[Special Summon]]ing.
  * This monster has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Hero Boy]]".
  * This monster is the only non-"[[Elemental HERO]]" monster used by [[Jaden Yuki]] to have a counterpart that is part of its respective "[[HERO]]" archetype.
