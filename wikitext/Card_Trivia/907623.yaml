title: Card Trivia:Branded Banishment
wikitext: |-
  {{Navigation}}

  * "[[Granguignol the Dusk Dragon]]", "[[The Iris Swordsoul]]", "[[White Relic of Dogmatika]]", and a slime-like appendage similar to "[[Dramaturge of Despia]]" appear in this card's artwork.
  ** According to [[The Valuable Book EX 2 card storylines#Facing the Main Culprit: Branded Retribution|The Valuable Book EX 2 card storylines]], the "Dramaturge of Despia" that "The Iris Swordsoul" struck down in the artwork of "[[Branded Retribution]]" was actually "[[Despian Quaeritis]]".
  ** The events depicted in this card's artwork are continued in the artwork of "[[Branded in Central Dogmatika]]".
