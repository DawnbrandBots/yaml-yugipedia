title: 'Card Trivia:Number C102: Archfiend Seraph'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * This monster appears in the artworks of "[[Chaos Caller]]", "[[Chaos Hundred Universe]]" and "[[Duo of the Seven Emperors]]".
  * This monster's Japanese name, "Noble Daemon", reflects its owner [[Dumon]], one of the antagonists of the second season of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. Dumon, while serving under an antagonist, isn't inherently evil and fights for a just cause.
  * This is the first [[Fairy]] "[[Archfiend]]" monster, as well as the first "Archfiend" [[Xyz Monster]].
