title: Card Trivia:Pyramid Turtle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Curse of the Ancient Turtle]]".
  * This card has a [[FIRE]]-searching [[Machine]] counterpart with inverted [[ATK]]/[[DEF]]: "[[UFO Turtle]]".
  * This monster has more tortoise-like characteristics. Turtles have webbed feet and live in aquatic environments, but tortoises can live in arid environments such as deserts. Also, tortoises normally have taller shells while turtles need slimmer shells to swim, something a pyramid would handicap significantly.
