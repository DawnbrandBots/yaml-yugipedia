title: Card Trivia:Acid Rain
wikitext: |-
  {{Navigation}}

  * This card's name and artwork effect are based on [[wikipedia:Acid rain|acid rain]], a weather phenomenon where pollutants in gaseous form precipitates into acidic rain, which damages the environment; [[wikipedia:Corrosive substance|acidic]] liquid can also cause rusting and/or corrosion upon contact with metal.
  * This card has several [[counterpart]]s that destroy a specific [[Type]] of [[monster]]:
  ** [[Fiend]]: "[[Exile of the Wicked]]"
  ** [[Fish]]: "[[Eternal Drought]]"
  ** [[Insect]]: "[[Eradicating Aerosol]]"
  ** [[Rock]]: "[[Breath of Light]]"
  ** [[Spellcaster]]: "[[Last Day of Witch]]"
  ** [[Warrior]]: "[[Warrior Elimination]]"
