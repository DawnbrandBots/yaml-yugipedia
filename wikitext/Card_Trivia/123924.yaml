title: Card Trivia:Guardian Baou
wikitext: |-
  {{Navigation}}

  * "[[Wicked-Breaking Flamberge - Baou]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Dark Supremacy]]".
  * In "[[Warrior Dai Grepher]]'s" storyline, it is revealed that this card is the false body of "Wicked-Breaking Flamberge - Baou", which possesses whoever claims it.
  ** When this monster takes control of "Warrior Dai Grepher", it corrupts him and transforms him into the "[[Dark Lucius]]" monsters, where each members' effects negates the effects of the opponent's destroyed monsters. This card's actual body, "Wicked-Breaking Flamberge - Baou", features the same effect, which strongly implies that he is possessing the equipped Monster.
