title: Card Trivia:Stare of the Snake Hair
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[The Snake Hair]]".
  ** This monster's design is based on a scene from {{episode|Yu-Gi-Oh!|079|ref}} where "[[The Snake Hair (anime)|The Snake Hair]]" attacks by shooting an electrical beam from its eyes.
  ** This monster's effect to prevent the opponent's monster from attacking, using its effects, and being used as [[material]] for a [[Fusion Summon|Fusion]], [[Synchro Summon|Synchro]], [[Xyz Summon|Xyz]], or [[Link Summon]] is a reference to how "The Snake Hair" is based on [[wikipedia:Medusa|Medusa]], a half-human half-snake female monster in [[wikipedia:Greek mythology|Greek mythology]], whose petrifying gaze turns her victims to stone.
  ** This monster's association with the [[Call of the Haunted (series)|Call of the Haunted]] [[series]] references how "The Snake Hair" was used by [[Bonz]] (who used "[[Call of the Haunted (anime)|Call of the Haunted]]" during the [[Duelist Kingdom (arc)|Duelist Kingdom arc]]) in the aforementioned episode of the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]].

