title: Card Trivia:DoomZ Break - Diactorus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[DoomZ Destruction]]".
  * This monster's name is based on "diaktoros" (διάκτορος), the Greek word for "guide".
  * This monster is an upgraded Xyz form of "[[Medius the Pure]]" after inheriting the power of "[[Jupiter the Power Patron of Destruction]]".
  * This monster has an "[[Artmage]]" counterpart: "[[Artmage Diactorus]]".
