title: Card Trivia:Surprise Fusion
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect to change a monster's [[Attribute]] before performing a [[Fusion Summon]] is a reference to its appearance in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, where it was used to Fusion Summon "[[Starving Venemy Dragon (manga)|Starving Venemy Dragon]]" using "[[Clearwing Fast Dragon (manga)|Clearwing Fast Dragon]]" and a "[[Speedroid Token (manga)|Speedroid Token]]" as [[material]]. In the ''Yu-Gi-Oh! ARC-V'' manga, the materials for "Starving Venemy Dragon" aren't specifically listed, but its ''OCG''/''TCG'' counterpart lists a DARK monster, and "[[Speedroid Token]]" is [[WIND]], so it would not be normally possible to Fusion Summon "[[Starving Venemy Dragon]]" with these two materials in real life. This additional effect can change the Attribute of that "Speedroid Token" to DARK, allowing it and "[[Clear Wing Fast Dragon]]" (a [[Pendulum Monster]]) to meet the [[Fusion Material]] requirements for "Starving Venemy Dragon".
  * In the ''Yu-Gi-Oh! ARC-V'' manga, the two "[[Surprise Token (manga)|Surprise Token]]s" [[Special Summon]]ed by this card's effect were used to [[Xyz Summon]] "[[Dark Anthelion Dragon (manga)|Dark Anthelion Dragon]]", despite the fact that [[Token]]s cannot be used as [[Xyz Material]] by game mechanics.
