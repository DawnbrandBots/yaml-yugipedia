title: Card Trivia:Iron Knight of Revolution
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Industrial Revolution|Industrial Revolution]].
  ** This monster may be a reference to the legend of [[wikipedia:Saint George and the Dragon|Saint George and the Dragon]], with this card representing [[wikipedia:Saint George|Saint George]] himself.
  ** This card, along with its accompanying [[Match winner]], "[[Sanctity of Dragon]]", share a common English theme, which fits with the original intention to hold the [[World Championship 2017]] in [[wikipedia:London|London, England]] before it was moved to [[wikipedia:Tokyo|Tokyo, Japan]].
  * This card and "Sanctity of Dragon" are the first Match winners that are Link Monsters.
  ** They are also both the first [[Nomi]] and [[TCG exclusive]] Link Monsters.
