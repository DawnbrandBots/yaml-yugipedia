title: Card Trivia:Yamato-no-Kami
wikitext: |-
  {{Navigation}}

  * This card's name is translated to "God of Yamato", with "Yamato" (大和) being an ancient name for Japan.
  * This card is the first [[Spirit monster]] that can, and must, be [[Special Summon]]ed.
  * The protrusions on this monster's arms and the appearance of the jointed limbs on his back look similar to the skin of "[[Yamata Dragon]]".
