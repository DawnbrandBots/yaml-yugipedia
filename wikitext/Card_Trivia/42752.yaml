title: Card Trivia:Archfiend of Gilfer
wikitext: |-
  {{Navigation}}

  * This monster is one of the [[cover card]]s for ''[[Retro Pack 2]]'' and ''[[Structure Deck: Yugi]]''.
  * This card appears in the anime artwork of "[[Destruction of Destiny]]".
  * In the English dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster is named "Beast of Gilfer".
  * In the ''Yu-Gi-Oh!'' anime, when this monster's effect is [[activate]]d, its remains turn into debris and plunges into the opposing monster, causing it to react painfully as a dark aura briefly wafts from it and its [[ATK]] decreases by 500.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, when this monster's effect is activated, it restrains the opponent's monster from behind, causing its ATK to decrease by 500.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|196|ref}}, specifically from the panel where [[Archfiend of Gilfer (manga)|this monster]] is shown being Summoned.
