title: Card Trivia:Celeb Rose Mage
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Scattered Rose Runway]]", as well as in the second artwork of "[[The Secret of Manifestation]]".
  * This monster is a [[Celeb Rose]] [[counterpart]] of "[[Sevens Road Mage]]".
  ** Both monsters share the same [[Level]] (2), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (800/800).
