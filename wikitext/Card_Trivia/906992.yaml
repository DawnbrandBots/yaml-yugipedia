title: Card Trivia:Vanishing Heliacal Riser
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Yudias - Shining Velgariva]]''.
  * This monster appears in the artwork of "[[Vanishing Attack]]".
  * This card is named after "[[wikipedia:Heliacal rising|heliacal rising]]", a phenomenon when a celestial body first becomes visible above the eastern horizon at dawn, just before sunrise.
  * This monster has an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form: "[[Resurrection Heliacal Riser]]".
