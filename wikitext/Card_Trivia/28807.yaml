title: Card Trivia:Diabound Kernel
wikitext: |-
  {{Navigation}}

  * This card (with its original anime artwork) appears in the original anime artwork of "[[Montage Dragon]]".
  * This is the [[Monster Card]] counterpart of [[Bandit King Bakura]]'s ''[[Ka]]'', [[Diabound]].
  ** This monster's name is based on kernel, the central or most important part of something, reflecting how this monster is a fragment of Diabound and its power.
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, [[Yami Bakura]] used this card to destroy [[Seto Kaiba]]'s "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" in a Duel. This allowed it to gain "Blue-Eyes White Dragon's" [[attack and effect names in Yu-Gi-Oh!|signature attack]], which is said to rival that of an [[Egyptian God Card|Egyptian God]]. Bakura intended to later use that attack in another Duel to gain an advantage against [[Pharaoh Atem]] during the [[Dark RPG]].
