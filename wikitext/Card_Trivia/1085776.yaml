title: Card Trivia:Like the Diabell
wikitext: |-
  {{Navigation}}

  * An older form of "[[Astellar of the White Forest]]", but younger than "[[Diabellstar the Black Witch]]", as well as the inert form of "[[Sinful Spoils of Betrayal - Silvera]]" and "[[Sinful Spoils of Doom - Rciela]]" appears in this card's artwork.
  ** This card's artwork appears to depict her fending for herself during her growth from "Astellar" to "Diabellstar".
