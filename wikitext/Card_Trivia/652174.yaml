title: Card Trivia:Armatos Legio Eques Flamma
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's name is a combination of ''[[wikipedia:Equites|eques]]'', a member of the equestrian order in the [[wikipedia:Roman army|Roman army]] (hence the [[wikipedia:Crop (implement)|riding crop]] in this monster's hand), and [[wikipedia:Secutor|Flamma]], a historical [[wikipedia:Secutor|secutor]], known for his numerous fights and his refusal to stop being a [[wikipedia:Gladiator|gladiator]].
