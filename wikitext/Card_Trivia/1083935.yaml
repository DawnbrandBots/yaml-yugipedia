title: Card Trivia:Heavy Cavalry of the Indestructible Insects
wikitext: |-
  {{Navigation}}

  * The scorpion-like creature in this card's artwork appears in the artwork of "[[Supply Soldier of the Indestructible Insects]]".
  * This monster is a [[Fusion Monster|Fusion]] form of "[[Insect Knight]]", fused with "Supply Soldier of the Indestructible Insects".
  ** This monster's [[original ATK and DEF]] are respectively equal to the sum of the ATK and DEF of the aforementioned monsters, which are valid [[Fusion Material]]s for this monster's [[Fusion Summon]].
