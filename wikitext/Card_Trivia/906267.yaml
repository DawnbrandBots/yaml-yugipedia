title: Card Trivia:Machina Irradiator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Machina Defense Perimeter]]".
  * This card, "[[Machina Megaform]]", "[[Machina Air Raider]]" and "[[Machina Fortress]]" all have a total combined stat of 4100.
  ** This reference the fact that this card was created as a support unit for "[[Machina Fortress]]" as depicted in "Machina Defense Perimeter".
