title: Card Trivia:Blackwing - Sudri the Phantom Glimmer
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Norðri, Suðri, Austri and Vestri|Suðri]], one of the four dwarves in the ''[[wikipedia:Prose Edda|Prose Edda]]'' book ''[[wikipedia:Gylfaginning|Gylfaginning]]'' who each support one of the four [[wikipedia:Cardinal points|cardinal points]], with Suðri representing the southern wind.
