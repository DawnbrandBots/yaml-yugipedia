title: Card Trivia:Big One Warrior
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duelist Pack: Yusei 3]]'' and ''[[Duelist Pack Collection Tin 2011]]''.
  * This monster has a number one on his mask, is pointing out one finger, has 100 [[ATK]], is [[Level 1]] and its effect revolves around discarding a Level 1 monster, similar to "[[Maximum Six]]" and its six-based effects.
  * This monster's name and design resemble Big One from [https://en.wikipedia.org/wiki/J.A.K.Q._Dengekitai J. A. K. Q. Dengekitai].
