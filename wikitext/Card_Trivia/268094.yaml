title: "Card Trivia:Number C105: Battlin' Boxer Comet Cestus"
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Battlin' Boxing Cross Counter]]", "[[Chaos Barrier]]", and "[[Chaos Hundred Universe]]".
  * This monster is the upgraded "[[Number C]]" form of "[[Number 105: Battlin' Boxer Star Cestus]]".
  ** This monster's Japanese name uses the word "Caestus", which is an alternate spelling of "[[wikipedia:Cestus (boxing)|cestus]]", a battle glove that was sometimes used in Roman gladiatorial events.
  *** As this monster is an upgrade form of "Star Cestus" (whose Japanese name is "Meteor Cestus"), its naming scheme likely references the "Pegasus Comet Fist", the more powerful version of the "Pegasus Meteor Fist", the signature technique of Pegasus Seiya in the ''[[wikipedia:Saint Seiya|Saint Seiya]]'' manga and anime franchise.
  ** Similar to "Star Cestus", this monster represents its owner, [[Alito]], who is an expert boxer. The naming scheme references Alito's past life as a powerful gladiator who was known for battling with his bare knuckles and won every battle he participated in.
  * The four protrusions on this monster's back likely refers to the four [[Xyz Material]]s needed to [[Xyz Summon]] it.
  ** Also, in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster uses its effect, it absorbs an Overlay Unit into one of the protrusions, which then travels down into its chest.
  * This is the first "Number C" monster released in the ''[[OCG]]''/''[[TCG]]'' to not be a [[cover card]].
  ** It is also the first "Number C" monster to be released in the same [[Core Booster|Core]] [[Booster pack|Booster pack]] as its base form.
  * Amongst the humanoid members of the "[[Number C10X]]" [[archetype]], this is the only monster whose fighting style has not changed from its base form, as both monsters did not use a weapon and instead used their fists.
