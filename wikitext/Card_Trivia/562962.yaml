title: Card Trivia:Abyss Actor - Mellow Madonna
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Abyss Actors' Curtain Call]]", "[[Abyss Playhouse - Fantastic Theater]]", and "[[Abyss Script - Dramatic Story]]".
  * This card's name is based on a [[wikipedia:prima donna|prima donna]], a term used in [[wikipedia:acting|acting]] to describe the leading female singer in [[wikipedia:opera|opera]] who is given the primary role.
