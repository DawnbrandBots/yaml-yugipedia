title: Card Trivia:Raigeki Bottle
wikitext: |-
  {{Navigation}}

  * This card's name, artwork, and effects are based on "[[Raigeki]]".
  ** This card's Japanese name, "{{translated name|Raigeki Bottle|ja}}" (サンダー・ボ'''トル''', ''Sandā Bo'''toru''''') is based on the Japanese name of "Raigeki", "{{translated name|Raigeki|ja}}" (サンダー・ボ'''ルト''', ''Sandā Bo'''ruto'''''), with the order of the last two characters switched around.
  ** This card is possibly a pun on the idiom "catching lightning in a bottle", which means to accomplish something extraordinary difficult or achieve rare success, as this card's artwork depicts lightning (presumably from the artwork of "Raigeki") being caught in the bottle.
  * This card shares similarities with "[[Shard of Greed]]", as both are [[Continuous Card]]s that use [[counter]]s to replicate the effects of the cards they are based on that were [[Forbidden]] in the [[Advanced Format]].
