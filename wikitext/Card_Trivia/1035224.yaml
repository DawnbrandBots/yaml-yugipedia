title: Card Trivia:Dragon Master Magia
wikitext: |-
  {{Navigation}}

  [[File:DragonMasterKnight5000ATK4000DEF.png|thumb|350px|"[[Dragon Master Knight (anime)|Dragon Master Knight]]" with 5000 ATK and 4000 DEF.]]

  * This is the [[cover card]] of ''[[Battles of Legend: Terminal Revenge]]''.
  * This monster is a [[retrained]] counterpart of "[[Dragon Master Knight]]".
  ** "[[Magician of Black Chaos]]" replaces "[[Black Luster Soldier]]" as the rider of "[[Blue-Eyes Ultimate Dragon]]".
  ** This monster is named after ''magia'', the Latin word for "magic", reflecting how "Magician of Black Chaos" is a [[Spellcaster]] monster, as opposed to "Black Luster Soldier" being a [[Warrior]] monster.
  ** This monster's [[ATK]]/[[DEF]] (5000/4000) are based on those of "Dragon Master Knight" during its first appearance in {{episode|Yu-Gi-Oh!|045|ref}}.
  * This monster's effect to [[Special Summon]] one "[[Blue-Eyes]]" monster, or one "[[Chaos]]" or "[[Black Luster Soldier]]" [[Ritual Monster]] from the [[Extra Deck]] or [[Graveyard]] when it [[leaves the field]] due to the opponent, references a scene in [[Yami Yugi, Seto Kaiba and Dartz's Duel]], where [[Yami Yugi]] [[activate]]s "[[De-Fusion (anime)|De-Fusion]]" on "Dragon Master Knight" to prevent its destruction due to "[[Orichalcos Deuteros]]" and Special Summon both "[[Blue-Eyes Ultimate Dragon (anime)|Blue-Eyes Ultimate Dragon]]" and "[[Black Luster Soldier (anime)|Black Luster Soldier]]".
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
