title: Card Trivia:Naturia Ladybug
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Naturia Forest]]", "[[Naturia Landoise]]" and "[[Naturia White Oak]]".
  * The flowers that appear in the artwork of "Naturia White Oak" (the same ones that "Naturia White Oak" uses to attack with, as seen in [[Duel Terminal]] gameplay) also appear in this card's artwork.
