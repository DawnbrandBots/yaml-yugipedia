title: Card Trivia:Amorphage Lechery
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Amorphous Persona]]".
  * The artwork of "[[Amorphage Infection]]" depicts a scorpion transforming into this monster.
  * This monster's Japanese name, "Amorphage Lux" is short for "''luxuria''", the Latin word for "lust".
