title: Card Trivia:Invigoration
wikitext: |-
  {{Navigation}}

  * This card's artwork appears in the background of "[[Solar Ray]]", albeit with inverted colors.
  * This card has five [[Attribute]] counterparts: "[[Burning Spear]]" (for [[FIRE]] monsters), "[[Elf's Light]]" (for [[LIGHT]] monsters), "[[Gust Fan]]" (for [[WIND]] monsters), "[[Steel Shell]]" (for [[WATER]] monsters), and "[[Sword of Dark Destruction]]" (for [[DARK]] monsters).
