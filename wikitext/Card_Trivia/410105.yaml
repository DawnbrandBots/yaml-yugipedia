title: Card Trivia:Kuzunoha, the Onmyojin
wikitext: |-
  {{Navigation}}

  * This card is based off of ''[[wikipedia:Kuzunoha|Kuzunoha]]'' from Japanese folklore.
  * This card's name references ''[[wikipedia:Onmyōdō|Onmyōdō]]'', a traditional Japanese esoteric cosmology.
  * The blue and red flames in this card's artwork represent [[Pendulum Scale]]s.
  * This card and accompanying Match winner "[[Sakyo, Swordmaster of the Far East]]" share a common Japanese theme, as well as motifs based on Pendulum Scales, and were first given out at the [[World Championship 2015]], which was held in [[wikipedia:Kyoto|Kyoto]], Japan.
