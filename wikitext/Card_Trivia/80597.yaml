title: Card Trivia:KC-1 Crayton
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The "KC" in this card's name and artwork is an abbreviation for "[[KaibaCorp]]", which suggests that it has been created by that company.
  * This monster's appearance is based on the [[wikipedia:M1 Abrams|M1 Abrams]] main battle tank, while its name is derived from US General [[wikipedia:Creighton Abrams|Creighton Abrams]], the namesake of the M1 Abrams tank.
  ** While the original Japanese name used the exact same katagana pronounciation of Abrams' first name (クレイトン, ''Kureiton''), the 4Kids dub corrupted the spelling into "Crayton", pursumably to avoid reference to the real-life figure.
