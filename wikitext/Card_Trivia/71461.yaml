title: Card Trivia:Rainbow Veil
wikitext: |-
  {{Navigation}}

  * "[[Dunames Dark Witch]]" appears in this card's artwork.
  ** Interestingly, the bust of "Dunames Dark Witch" is covered in this card's Japanese and international artworks, despite the fact that the artwork of "Dunames Dark Witch" features a revealing bust that was edited for international release.
  *** Additionally, the skirt of "Dunames Dark Witch" is lengthened in this card's international artwork, despite how the length of the aforementioned monster's skirt remains the same in its Japanese and international artworks.
