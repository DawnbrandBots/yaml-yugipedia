title: Card Trivia:Adamancipator Risen - Dragite
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Secret Slayers]]''/''[[Secret Slayers]]''.
  * This monster appears in the artworks of "[[Adamancipator Resonance]]" and "[[Adamancipator Friends]]".
  ** "[[Adamancipator Analyzer]]" appears in this card's artwork.
  * "[[Adamancipator Crystal - Dragite]]" is the crystal form of this monster.
