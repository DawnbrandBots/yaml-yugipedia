title: Card Trivia:Nemeses Adrastea
wikitext: |-
  {{Navigation}}

  * This card is possibly named after [[wikipedia:Adrasteia|Adrasteia]], a [[wikipedia:Nymph|nymph]] from [[wikipedia:Greek mythology|Greek mythology]], who was charged with nurturing the infant [[wikipedia:Zeus|Zeus]] in secret, in order to protect him from his father [[wikipedia:Cronus|Cronus]].
  * "[[Archnemeses Eschatos]]" appears in this card's artwork.
