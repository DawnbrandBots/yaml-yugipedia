title: 'Card Trivia:Number 49: Fortune Tune'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Cattle Call]]" and "[[Dances with Beasts]]" (as a silhouette).
  * This monster's appearance is based on a [[wikipedia:Bird of Paradise|bird-of-paradise]], specifically ''[[wikipedia:Paradisaea rudolphi|Paradisaea rudolphi]]''.
  * This is the first [[Winged Beast]] "[[Number]]" monster.
  * This monster's [[ATK]] and [[DEF]] values match the first and the second digit of this card's number, respectively ('''4'''00 and '''9'''00).
  * Similar to "[[Number 7: Lucky Straight]]", whose number is on the cane it is holding rather than on the monster itself, this card's number is on the tree branch it is holding with its mouth.
  ** Interestingly, the number of this card "49" is the square of "7", which is usually considered a lucky number and the number of "Lucky Straight".
  * In several ''[[Yu-Gi-Oh!]]'' video games, [[Tori Meadows]] uses this card; this likely references how her Japanese name, Kotori, translates to "little bird".
