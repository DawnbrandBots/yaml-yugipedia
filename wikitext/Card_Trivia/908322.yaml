title: Card Trivia:Gold Pride - Star Leon
wikitext: |-
  {{Navigation}}

  * This is the upgraded form of "[[Gold Pride - Leon]]".
  * "[[Gold Pride - Captain Carrie]]" appears in this card's artwork.
  ** Fittingly, this monster's Level (6) is the combined result of both the aforementioned Leon and Captain Carrie's levels (both are 3).
