title: Card Trivia:Divine Arsenal AA-ZEUS - Sky Thunder
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Mega Pack 05]]'' and ''[[2-Player Starter Set]]''.
  * This monster is based on [[wikipedia:Zeus|Zeus]], the Greek god of the sky and the ruler of [[wikipedia:Mount Olympus|Mount Olympus]].
  ** According to [[The Valuable Book EX card storylines#The Ultimate Weapon that can Slay Even the Gods|''The Valuable Book EX'' card storylines]], this monster is the 12th weapon in a series of weapons created to fight against humanity's fate and slay the gods. This number references the [[wikipedia:Twelve Olympians|Twelve Olympians]] that Zeus rules over.
  * This monster's Japanese kana title is "Negalogia" (ネガロギア, ''Negarogia''), which is a combination of the words "nega" (a prefix denoting an antithesis, or the polar opposite of something) and "''[[wikipedia:Logia|logia]]''" (the Greek term for communications of divine origin), referencing how this monster stands in opposition against the fate determined by the gods.
  * This monster has a [[DARK]] [[Fiend]] [[counterpart]]: "[[Super Starslayer TY-PHON - Sky Crisis]]".
  ** Fittingly, the Greek monster [[wikipedia:Typhon|Typhon]] ("TY-PHON") was originally birthed to oppose and overthrow the sky god Zeus.
  ** The Japanese kana title for "TY-PHON" is "Logiastella" (ロギアステラ, ''Rogiasutera''), which can be interpreted as "the divine word of the stars", opposite to the kana title "Negalogia".
  ** Both monsters are depicted in mirrored poses in their respective card artworks.
  ** This monster is depicted destroying "TY-PHON" in its alternate artwork.
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this is the first monster with animations for both its Summon and effect.
  ** The animation of its effect to [[send]] all other cards to the [[Graveyard]] is taken from the "The Divine Arsenal AA-Zeus - Sky Thunder" animation from ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'', specifically from the scene where this monster destroys a fleet of spaceships in its introduction.
