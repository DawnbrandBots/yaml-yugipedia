title: Card Trivia:Alexandrite Dragon
wikitext: |-
  {{Navigation}}

  * A younger form of this monster appears in the artwork of "[[Primite Roar]]".
  * This monster is based on "alexandrite", the gem variety of the mineral [[wikipedia:Chrysoberyl|chrysoberyl]] which appears in different colors under different forms of light.
  ** The alexandrite is named in honor of [[wikipedia:Alexander II of Russia|Czar Alexander II]], who is known for emancipating Russia's serfs. In the late 19th century, the newly-discovered mineral was presented to Alexander II when it was mistakenly identified as an emerald upon discovery.
  ** The [[flavor text]] mentions the "czars' lost jewels", referencing the [[wikipedia:Imperial Crown of_Russia|Russian Crown Jewels]] which were last used to crown Czar Nicolas II and his wife, Empress Alexandra. The jewels went missing for a time after the USSR used them as collateral for a loan from Ireland, which was subsequently thrown into its own revolution.
  * This is the first [[Normal Monster]] to serve as a promotional card for a ''[[TCG]]'' Sneak Peek event.
  ** According to an article posted on Konami's ''TCG'' blog website, this monster was specifically designed with the ''TCG'' contents of ''[[Photon Shockwave]]'' in mind.<ref>[https://yugiohblog.konami.com/articles/?p=3246 Konami TCG Strategy Site]: Photon Shockwave Previews! Alexandrite Dragon</ref>

