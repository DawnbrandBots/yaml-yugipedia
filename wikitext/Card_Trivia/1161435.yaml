title: Card Trivia:Exceptional Schedule
wikitext: |-
  {{Navigation}}

  * The [[Graveyard]] portals from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and the green-lit signal from the artworks of "[[Special Schedule]]" and "[[Urgent Schedule]]" appear in this card's artwork.
  * This card's Japanese name, which translates to ''Special Schedule'', is the same as the TCG name for "Special Schedule" (whose OCG name translates to ''Temporary Schedule'').
