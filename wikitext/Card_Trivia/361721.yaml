title: Card Trivia:Radian, the Multidimensional Kaiju
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Kaiju Capture Mission]]".
  ** An image of this monster also appears in the artwork of "[[The Kaiju Files]]".
  * This monster is based on many different [[wikipedia:kaiju|kaiju]].
  ** Its name is derived from [//wikizilla.org/wiki/Rodan Rodan]'s original Japanese name, Radon.
  ** Its head is loosely based on [//wikizilla.org/wiki/Gyaos Gyaos], the monster most often seen opposing [[wikipedia:Gamera|Gamera]]. This enmity is referenced in the art of "Kaiju Capture Mission".
  ** Most of its body is based on many of the dark giants that have appeared in the ''[[wikipedia:Ultra Series|Ultraman]]'' franchise, most notably [[wikia:w:c:ultraman:Ultraman Belial|Ultraman Belial]] (claws and eyes) and [[wikia:w:c:ultraman:Dark Lugiel|Dark Lugiel]] (color, body spikes).
  ** Its self-copy ability (seen being used in the art of "Kaiju Capture Mission") is based on a similar ability used by the [[wikia:w:c:ultraman:Alien Baltan|Baltans]], aliens which appeared frequently in the ''Ultraman'' franchise.
