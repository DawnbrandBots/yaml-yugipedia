title: Card Trivia:Vaalmonica, the Agathokakological Voice
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a [[wikipedia:Glass harmonica|glass harmonica]], a type of musical instrument that uses a series of glass bowls or goblets of different sizes to produce musical tones using friction.
  ** The glass harmonica in this card's artwork also appears in the artwork of "[[Vaalmonica Intonare]]" and "[[Vaalmonica Invitare]]".
  ** The angelic glass goblet in this card's artwork also appears in the artwork of "Vaalmonica Intonare".
  ** The demonic glass goblet in this card's artwork also appears in the artwork of "[[Vaalmonica Versare]]".
  * This card's ''[[TCG]]'' name features the word "agathokakological", an adjective which describes something composed of both good and evil, which reflects the angelic and demonic theme of the "[[Vaalmonica]]" [[archetype]].
