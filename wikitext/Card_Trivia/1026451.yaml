title: Card Trivia:Mira Match
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on the term "mirror match", which reflects its effect to [[negate]] an opponent's card by "matching" it with a card that "mirrors" its name, and "[[wikipedia:Match|match]]" (a tool used for starting a fire), which is reflected in its [[FIRE]] [[Attribute]].
  ** This monster's Japanese name, 「ミラァと{{Ruby|燐寸之仔|マッチノコ}}」(''Miraa to Macchinoko'') also includes a portmanteau of "match" and "[[wikipedia:Tsuchinoko|tsuchinoko]]", a snake-like cryptid with a wide torso from Japanese folklore, which is reflected in this monster's appearance as a flaming tsuchinoko.
