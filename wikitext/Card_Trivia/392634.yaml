title: Card Trivia:Ancient Gear Catapult
wikitext: |-
  {{Navigation}}

  * "[[Ancient Gear Golem]]", multiple "[[Ancient Gear Knight]]s" and two "[[Ancient Gear Soldier]]s" (one mounted on the "[[Ancient Gear Tank]]") appear in this card's artwork.
  * This catapult appears in the artwork of "[[Ancient Gear Advance]]".
  * Curiously, despite this card's ability to Special Summon "Ancient Gear Golem", the artwork reveals that the size of the "Catapult" is at best the same to that of "Golem" bent on its knees.
