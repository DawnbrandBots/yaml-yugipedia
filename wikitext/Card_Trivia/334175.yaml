title: Card Trivia:Onomatopia
wikitext: |-
  {{Navigation}}

  * "[[Dododo Warrior]]", "[[Gagaga Magician]]", "[[Gogogo Golem]]", "[[Number 39: Utopia]]", "[[Zubaba Knight]]", and the buildings of [[Astral World]] appear in this card's artwork.
  * This card's name is a portmanteau of the words "[[Onomatopoeia]]" and "[[Utopia]]".
  ** This card's Japanese name, "Hope Land" ({{Ruby|希|き}}{{Ruby|望|ぼう}}{{Ruby|郷|きょう}}, ''Kibōkyō''), references the Japanese name of the "[[Utopic]]" [[archetype]], "Hope" (希望, ''Kibō'').
  * The Japanese and English names of the [[Hi-Five the Sky Counter]]s (かっとビングカウンター, ''Kattobingu Counters'') both reference [[Yuma Tsukumo]]'s [[Kattobingu|signature catchphrase]] in the Japanese and English versions of the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
