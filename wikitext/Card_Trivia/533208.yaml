title: Card Trivia:Crystron Halqifibrax
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Overload]]''.
  * This monster's Japanese name (ハリファイバー ''Harifaibā'') is a combination of ''hari'' (玻璃, lit. "glass") and ''faibā'' ("fiber"), referring to [[wikipedia:Glass fiber|glass fibers]].
  * This card is the first [[Link Monster]] that requires a [[Tuner]] as Link Material.
  * This monster appears to be an amalgamation of "[[Crystron Quan]]", "[[Crystron Citree]]", and "[[Crystron Rion]]".
  ** This card's 1500 [[ATK]] is equal to the combined ATK (500) of all three of those monsters.
  * This monster has an upgraded, [[Link 3 Monster Cards|Link-3]] [[counterpart]]: "[[Crystron Halqifibrax Prism]]".
