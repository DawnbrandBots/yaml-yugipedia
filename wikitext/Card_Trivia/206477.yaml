title: Card Trivia:Zombowwow
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|腐|フ}}{{Ruby|乱|ラン}}{{Ruby|犬|ケン}}, ''Furanken'') references the name of [[wikipedia:Frankenstein's monster|Frankenstein's monster]].
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "[[zombie]]" and "bow wow" (the English onomatopoeia of a dog barking).
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from {{chapter|ZEXAL|017|ref}}, specifically from the panel showing [[Zombie Dog|this monster]] being Summoned.
