title: Card Trivia:Heart of the Blue-Eyes
wikitext: |-
  {{Navigation}}

  [[File:Heart of the Blue-Eyes.png|thumb|250px|[[Dark Yugi (manga)|Dark Yugi]] Summoning [[Sugoroku Mutou (manga)|Sugoroku Mutou]]'s stolen "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" from [[Seto Kaiba (manga)|Seto Kaiba]]'s [[Graveyard]] with "[[Monster Reborn (manga)|Monster Reborn]]".]]

  * This monster is a "[[Millennium]]" [[counterpart]] of "[[Blue-Eyes White Dragon]]".
  ** This monster is based on the fourth copy of "Blue-Eyes White Dragon" owned by [[Sugoroku Mutou (manga)|Sugoroku Mutou]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ([[Solomon Muto]] in the [[Yu-Gi-Oh! (anime)|anime]]).
  *** This monster's name and second effect to prevent its [[control]] from being switched references Sugoroku Mutou's speech to [[Seto Kaiba (manga)|Seto Kaiba]] in {{chapter|Yu-Gi-Oh!|009|ref}} when the former refused to sell his copy of "Blue-Eyes White Dragon" to the latter because of its sentimental value. Sugoroku proceeded to tell Kaiba that if he treasured something, it would grow a "heart" its own, including his copy of the "Blue-Eyes White Dragon".
  **** This monster's ''[[TCG]]'' name is a reference to the [[Heart of the Cards]] philosophy mentioned by Sugoroku in those scenes.
  *** This monster's third effect references a scene in {{chapter|Yu-Gi-Oh!|010|ref}}, where Sugoroku's copy of "Blue-Eyes White Dragon" (a [[Level 8]] monster with 3000 [[ATK]]), which was stolen by Seto Kaiba and used in his Duel against [[Dark Yugi (manga)|Dark Yugi]], refused to attack and [[destroy]]ed itself. Dark Yugi then [[Special Summon]]ed that copy of "Blue-Eyes White Dragon" from Kaiba's [[Graveyard]] with "[[Monster Reborn (manga)|Monster Reborn]]", as part of his winning move.
  **** This monster's pose is taken from a panel from the aforementioned chapter showing "Blue-Eyes White Dragon" being Special Summoned to Dark Yugi's [[field]].
  **** This effect being activated [[only once per Duel]] references the fact that Sugoroku only had one copy of "Blue-Eyes White Dragon".

