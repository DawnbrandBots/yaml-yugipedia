title: Card Trivia:Harpie Lady 2
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Hysteric Party]]" and "[[Triangle Ecstasy Spark]]", as well as in the second ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' artwork of "[[Harpie Lady (Rush Duel)|Harpie Lady]]".
  * This monster represents one of the duplicates of "[[Harpie Lady]]" created by "[[Elegant Egotist]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** The numbering of the two duplicates that do not keep the original monster's appearance are inverted in the [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai card game]], making this monster the number 3 in it. It also has 1800 [[ATK]] and is depicted wearing "[[Cyber Shield (Bandai)|Cyber Shield]]", making it conceptually similar to "[[Cyber Harpie Lady]]".
  * When this monster was released in ''Rush Duel'', its effect was changed so it would prevent the [[activation]] of [[Trap Card]]s when it attacks instead of [[negating]] the effects of [[Flip monster]]s it destroys by battle due to how there are no Flip monsters in the format.
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster is named Ocupete, likely in reference to the mythological harpy [[wikipedia:Ocypete|Ocypete]].
