title: Card Trivia:Ancient Warriors - Rebellious Lu Feng
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ancient Warriors Saga - Deception and Betrayal]]".
  ** The red horse that appears in this card's artwork also appears in the artwork of "[[Ancient Warriors Saga - Chivalrous Path]]", ridden by "[[Ancient Warriors - Loyal Guan Yun]]".
  * This monster is based on [[wikipedia:Lü Bu|Lü Bu]] ([[wikipedia:Courtesy name|courtesy name]]: Fengxian), from the historical novel ''[[wikipedia:Romance of the Three Kingdoms|Romance of the Three Kingdoms]]'', a powerful yet temperamental warlord who sadly suffered from poor management skills and freely switched allegiances. He also sports a type of chinese [[wikipedia:Pole weapon|polearm]] (often translated as Halberd) known as [[wikipedia:Ji (polearm)|Ji]], more concretly he wields a "Fangtian Ji" (Square Sky Ji) which had a spear tip with crescent blades on both sides, likely to be the legendary "[[wikipedia:Lü Bu|Fang Tian Hua Ji]]" (literally "Evened Heaven Stroking Halberd" often translated and known in the novel as "Sky Piercer"), the signature weapon of Lü Bu.
  ** Fittingly, this monster is riding a red horse, which is likely based on the [[wikipedia:Red Hare|Red Hare]], a famous horsed owned by Lü Bu that previously served as the basis for "[[Red Hared Hasty Horse]]".
  ** This card's [[Special Summon]]ing condition, [[DARK]] [[Attribute]] and second effect to give control of itself to the opponent if they control a monster with higher [[ATK]] reflects how Lü Bu betrayed and killed his masters and foster fathers [[wikipedia:Ding Yuan|Ding Yuan]] and [[wikipedia:Dong Zhuo|Dong Zhuo]] to join their enemies (who had more political power than them).
