title: Card Trivia:Draw of Fate
wikitext: |-
  {{Navigation}}
  [[File:Yugi_draws_Exodia.png|thumb|right|200px|[[Dark Yugi (manga)|Dark Yugi]] draws his final card: "[[Exodia the Forbidden One (manga)|Exodia the Forbidden One]]".]]

  * [[Yami Yugi]]'s hand and the silhouettes of "[[Dark Magician]]", "[[Exodia the Forbidden One]]", and "[[Black Luster Soldier]]" appear in this card's artwork. Each one represents a crucial victory in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where Yugi was able to draw the aforementioned cards at a crucial moment:
  ** In {{chapter|Yu-Gi-Oh!|039|ref}} and {{episode|Yu-Gi-Oh!|001|ref}}, "[[Exodia the Forbidden One]]" was drawn to win the game against Seto Kaiba.
  ** In {{chapter|Yu-Gi-Oh!|118|ref}} and {{episode|Yu-Gi-Oh!|030|ref}}", [[Black Luster Soldier]]" was summoned by drawing "[[Black Luster Ritual]]", winning the Duel against Mai Valentine.
  * This card is partly based on the [[Destiny Draw (rule)|Destiny Draw]] mechanic used in some video games, which places valuable cards at the top of players' Decks when they are in disadvantageous positions.

