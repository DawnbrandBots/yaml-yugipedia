title: Card Trivia:Gouki Thunder Ogre
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Star Pack VRAINS]]''.
  * This monster appears in the artworks of "[[Gouki Cage Match]]" and "[[Gouki Serpent Splash]]".
  * This monster's name and design are based on [[wikipedia:Jushin Liger|Keiichi Yamada]], a Japanese [[wikipedia:Professional wrestling|professional wrestler]] who is known by his ring name, "Jushin Thunder Liger".
