title: Card Trivia:Dverg of the Nordic Alfar
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from [[wikipedia:Norse dwarves|dvergar]], a race of dwarves in [[wikipedia:Norse mythology|Norse mythology]] known for residing in the mountains.
  ** This monster, being a [[Warrior]] monster instead of a [[Spellcaster]] like the rest of the "[[Nordic Alfar]]" monsters, is a reference to how dwarves are depicted as warriors.
  ** This monster's effect to [[add]] a "[[Nordic Relic]]" card from the [[Graveyard]] to the [[hand]] is a reference to how dwarves are depicted as great craftsmen, whereas the members of the "Nordic Relic" [[archetype]] are based on weapons forged by dwarves in Norse mythology.
  * This is the first monster to feature that allows the player to [[Normal Summon]] another monster the turn it was Normal Summoned, as confirmed by a [http://www.konami.com/yugioh/articles/?p=4956 Konami article].
