title: Card Trivia:Gagagaga Girl
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] counterpart of "[[Gagaga Girl]]".
  ** This monster appears to have a more modern phone compared to "Gagaga Girl", with the "Gagagaga Girl" icon in ''Master Duel'' explaining that "Gagaga Girl" became an Xyz monster thanks to the evolution of cell phones.
  * This monster's bulleted effect to allow a "[[Utopic Future]]" Xyz Monster to perform a second attack is based on a scene in {{episode|ZEXAL|146|ref}} where [[Yuma Tsukumo]] uses the effect of "[[Memories of Courage]]" to allow "[[Number F0: Utopic Future (anime)|Number F0: Utopic Future]]" make a second attack.
  ** This monster's bulleted effect is designed to work in conjunction with that of "[[Gagagaga Magician]]", which allows that "Utopic Future" Xyz Monster's [[ATK]] to become 4000 and also [[negate]]s its effects, referencing how in that scene, Yuma [[activate]]d "[[Hi-Five the Sky (anime)|Hi-Five the Sky]]" to negate the effects of "Utopic Future" before he activated "Memories of Courage", which increased the ATK of "Utopic Future" by 500 for every "[[Number]]" monster in each player's [[Graveyard]] until the end of the turn. At the time, there were 8 "Number" monsters; therefore, its ATK is increased from 0 to 4000.
