title: Card Trivia:Wiretap
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Telephone tapping|wiretapping]] (or telephone tapping), the act of intercepting and monitoring telephone and internet-based conversation, typically for espionage purposes.
  ** The card's effect reflects this, as it can "intercept" the [[activate|activation]] of the opponent's [[Trap Card]] by [[negate|negating]] its effects and [[shuffle|shuffling]] it into the [[Deck]].
  * This card's anime effect is one of several that allows cards to be [[face-up]] in the [[Main Deck]], the others being "[[Convulsion of Nature]]", "[[Grave Lure]]", "[[Parasite Paracide]]", "[[Pharaoh's Treasure]]", and "[[Symmetry Rorschach]]".
