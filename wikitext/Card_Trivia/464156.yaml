title: Card Trivia:Invocation
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Selection 5]]''.
  * "[[Aleister the Invoker]]", "[[Invoked Cocytus]]", and "[[The Book of the Law]]" appear in this card's first artwork.
  ** "[[Invoked Magistus Omega]]" appears in this card's second artwork.
  * This was the first card in the ''[[OCG]]''/''[[TCG]]'' that can [[Fusion Summon]] using monsters in the opponent's [[Graveyard]] as [[Fusion Material]]s.
  ** In the anime and video games, "[[Fossil Fusion]]" and "[[Ancient Gear Scrap Fusion]]" could also use monsters in the opponent's Graveyard as Fusion Material. However, "Fossil Fusion" was not released in the ''OCG'' or ''TCG'' until after the release of "Invocation"; "Ancient Gear Scrap Fusion" has never been released in the ''OCG''/''TCG''.
