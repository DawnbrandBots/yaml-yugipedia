title: Card Trivia:Evilswarm Thanatos
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Thanatos|Thanatos]], the personification of death and mortality in [[wikipedia:Greek mythology|Greek mythology]], commonly known as a harbinger of peaceful death that brings eternal sleep to the world whilst more violent gods were responsible for harsher death.
  * This monster is the "[[Evilswarm]]" [[counterpart]] of "[[The Fabled Unicore]]" mounted with "[[Fabled Ragin]]".
  ** This monster has 50 more [[ATK]] than both "Unicore" and "Ragin" and 50 less [[DEF]] than the average of the DEF of "Unicore" and "Ragin".
  ** The Japanese name for the "[[Fabled]]" [[archetype]] is "Demon Roar God", which is likely the reason why this monster is named after a mythological figure comparable to a god.
  ** This card's artwork depicts Gludd, Gree and Malice, the imp-like creatures that appears in the artwork of "Unicore" and "Ragin".
  *** Amusingly, the three imps are depicted not subjected to the "[[lswarm]]" infection and are shown trying to 'win back' "Ragin" and "Unicore", even wearing pots and silverware to look like they were infected.
  ** Ironically, despite this card's artwork depicts "Ragin" 'laying over' "Unicore", they cannot be used to [[Xyz Summon]] this monster due to "Ragin's" [[Level]] (5). 
  * This monster can be considered a counterpart of "[[Constellar Omega]]".
  ** Both are [[Xyz Monster]]s belonging to the ''[[Duel Terminal]]'' lore.
  ** Both require monsters with the same [[Attribute]] as their owns as [[material]]s .
  ** Both have [[Quick Effect]]s that make them unaffected by other card effects.
  *** Furthermore, they are complementary, as this monster's effect concern monster effects while "Omega's" concerns [[Spell]]/[[Trap]] effects.
  ** They have similar designs, with a humanoid torso on top of a quadrupede body ("Omega" is a [[wikipedia:centaur|centaur]] though, rather than an actual rider on top of a borse), and mirroring poses.
  ** They have similar ATKs (only differing by the 50 points peculiar of the "Evilswarm" monsters).
