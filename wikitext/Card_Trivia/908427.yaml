title: Card Trivia:Alghoul Mazera
wikitext: |-
  {{Navigation}}

  * "[[Zombie World]]" (including "[[Soul-Absorbing Bone Tower]]") appears in the background of this card's artwork.
  * This monster is a [[Zombie counterpart]] of "[[Warrior of Zera]]".
  ** This monster shares its [[Level]] (8), as well as its [[original ATK and DEF]] (2800/2300), with other [[Zera]] monsters.
  ** "Mazera" is also used in the name of "[[Mazera DeVille]]", another Zera monster.
  ** This monster's effect to [[Special Summon]] itself when it is [[banish]]ed from the [[hand]] or [[Graveyard]] is similar to the effect of "[[Angel of Zera]]", which Special Summons itself during the [[Standby Phase]] of the next turn after it was banished.
