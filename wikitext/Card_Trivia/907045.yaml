title: Card Trivia:Looter Force
wikitext: |-
  {{Navigation}}

  * "[[Bandijo the Battle Ballad]]" and "[[Prophecy Phrase the Colors of the Wind]]" appear in this card's artwork.
  * The treasure in this card's artwork appears in the artwork of "[[Condurglar the Assisting Anthem]]".
  * This card's Japanese name is derived from 「火事場泥棒」 (''Kajiba Dorobō'', lit. "thief at the scene of a fire"), an expression used to refer to looters and other people who commit crimes during a crisis situation.
