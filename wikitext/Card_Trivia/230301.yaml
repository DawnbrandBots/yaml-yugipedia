title: Card Trivia:After the Storm
wikitext: |-
  {{Navigation}}

  * "[[Revealer of the Ice Barrier]]", "[[Shrine of Mist Valley]]", "[[Speaker for the Ice Barriers]]", and the younger versions of "[[Caam, Serenity of Gusto]]", "[[Gishki Avance]]", "[[Gishki Emilia]]" (behind "Revealer"), "[[Reeze, Whirlwind of Gusto]]", and "[[Winda, Priestess of Gusto]]" appear in this card's artwork.
  ** The body of "[[Ancient Flamvell Deity]]" also appears behind the other characters. According to the official [[Duel Terminal]] story, it was defeated by "[[Trishula, Dragon of the Ice Barrier]]".
  * The events depicted in this card's artwork take place right after the war with the "[[Fabled]]" after the "[[Ice Barrier]]" tribe unleashed "Trishula, Dragon of the Ice Barrier", who crushed the "Fabled" and ended the war, albeit with mass casualties.
  ** This card predates the formation of the "[[Gishki]]" tribe when "Noellia" was still a member of the "Ice Barrier" tribe as "Revealer", which is why there are no hostilities between the "Noellia" and the "[[Gusto]]s".
