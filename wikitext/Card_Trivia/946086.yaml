  * This is the only monster used by [[Dark Marik (manga)|Dark Marik]] (and his [[Yami Marik|anime counterpart]]) that is not released in the ''[[OCG]]''/''[[TCG]]''.
  ** This is likely because its unique effect to attack during the first turn of a Duel is incompatible with the lack of a [[Battle Phase]] on that turn.
