title: Card Trivia:Universal Adapter
wikitext: |-
  {{Navigation}}

  * "[[Batteryman AA]]", "[[Batteryman AAA]]", "[[Batteryman C]]" and "[[Batteryman D]]" appear in this card's artwork.
  ** This is a play on how the first two kanji (単一, ''tan'ichi'') of "Standardization"—this card's Japanese name—are also used in the Japanese term for the D battery.
