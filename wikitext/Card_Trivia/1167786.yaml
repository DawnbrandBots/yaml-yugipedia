title: Card Trivia:Vidolium the Unstable Power Patron of Unity
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dead-End Power Patron Realm - Viraia‎]]" and "[[Plundered Power Patron Plane - Vidolia]]".
  * This monster is a combination of "[[Nerva the Power Patron of Creation]]", "[[Jupiter the Power Patron of Destruction]]", "[[Junora the Power Patron of Tuning]]" and "[[Medius the Pure]]", as depicted in "[[Prohibited Power Patron Portal - Terminus]]".
  ** This monster's design includes pieces and remnants of the three "Power Patron" monsters, including the two hands at the top belonging to "Nerva the Power Patron of Creation", the two hands in the middle belonging to "Jupiter the Power Patron of Destruction", and the two hands at the bottom belonging to "Junora the Power Patron of Tuning".
  ** This monster shares the same [[Attribute]] ([[DARK]]) and [[Type]] ([[Fairy]]) as "Medius the Pure".
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  ** This monster also has the highest original [[ATK]] of all [[Pendulum Monster]]s and the first Pendulum Monster to have 5000 ATK.
  * This is the first [[Pendulum Scale 11 Monster Cards|Scale 11]] Pendulum Monster with a positive [[Pendulum Effect]].
  ** Consequently, this is also the first Scale 11 Pendulum Monster that can be used generically.
  * This card currently has the longest card text in Japanese, with 401 characters in total, being the first Japanese card to have more than 400 characters in its card text.
