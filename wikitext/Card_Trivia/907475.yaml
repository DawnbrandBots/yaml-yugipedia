title: Card Trivia:Granguignol the Dusk Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a fusion of "[[Blazing Cartesia, the Virtuous]]" and "[[Despian Quaeritis]]".
  ** Its wings' stained glass-like design reflects those monsters' relationship with the church-themed "[[Dogmatika]]" [[archetype]], as both are the result of its 666 Virtuous Vestals (called Saints in the ''OCG'') having their souls corrupted and merged; stained glass is usually associated with churches' windows.
  *** These wings appear on "Cartesia" in her alternate artwork and on "[[Branded Befallen]]".
  * "[[Incredible Ecclesia, the Virtuous]]" sports smaller and simpler versions of this monster's wings and wields a hammer based on its head in her alternate artwork.
  * This card's name a reference to ''[[wikipedia:Grand Guignol|Le Théâtre du Grand-Guignol]]'' ("The Theatre of the Great Puppet", also simply known as Grand Guignol), a Paris theatre that specialized in naturalistic horror shows. Its name is also used as a general term for a genre of horror entertainment based on the theatre's themes.
  * This is the first [[Fusion Monster]] in the ''[[OCG]]''/''[[TCG]]'' to mention a specific [[Tuner monster]] as [[Fusion Material]].
