title: Card Trivia:Phantasm Spiral Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Phantasm Spiral Assault]]", "[[Phantasm Spiral Crash]]", "[[Phantasm Spiral Grip]]",  "[[Phantasm Spiral Power]]", and "[[Phantasm Spiral Wave]]".
  * This monster is the [[Wyrm]] [[counterpart]] of "[[Spiral Serpent]]".
  * This is the first ''[[OCG]]'' card released in the ''[[Yu-Gi-Oh! ARC-V]]'' era to be printed in ''[[Yu-Gi-Oh! Rush Duel]]''.
