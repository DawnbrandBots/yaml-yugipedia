title: Card Trivia:Blackwing - Kochi the Daybreak
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Crow]]''.
  * This monster appears in the artwork of "[[Blackwing - Twin Shadow]]".
  * This monster is named after "[[wikipedia:Dongfeng|Kochi]]", the Japanese translation for the Chinese name, "Dongfeng", which means "[[wikipedia:east wind|east wind]]".
