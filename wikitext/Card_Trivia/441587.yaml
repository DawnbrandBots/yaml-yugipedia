title: Card Trivia:Blue-Eyes Chaos MAX Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legendary Duelists: Season 2]]''.
  * This monster's name references the [[Attack and effect names|effect name]] of "[[Obelisk the Tormentor]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]]: "[[Soul Energy MAX]]".
  ** Both monsters are used by [[Seto Kaiba (manga)|Seto Kaiba]].
  ** Both monsters' cards feature a blue-colored border; this monster's border is based on the blue color scheme of [[Ritual Monster]]s, while the original version of "[[Obelisk the Tormentor (original)|Obelisk]]" features a deeper blue color scheme.
  ** Both monsters share the same [[original ATK]] (4000) and effects that protect it from the opponent's card effects.
  * This monster is an upgraded "[[Chaos]]" and Ritual version of "[[Blue-Eyes White Dragon]]".
  ** This is also the first "[[Blue-Eyes]]" Ritual Monster.
  ** Similar to how "Blue-Eyes White Dragon" is a rival to "[[Dark Magician]]", this monster can be considered a rival to "[[Magician of Black Chaos MAX]]".
  * This monster has an [[Xyz]] counterpart: "[[Indigo-Eyes Silver Dragon]]".
  * This monster's pose is similar to the pose as "[[Blue-Eyes Spirit Dragon]]", albeit mirrored.
  * This monster is tied with "[[Liberator Eto]]" and "[[Soul Drain Dragon]]" for having the highest original ATK (4000) of all [[Main Deck]] [[Level 8]] monsters.
  * This monster can be considered a rival to "[[Palladium Oracle Mahad]]".
  ** Both monsters debuted in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]''.
  ** Both monsters are the retrained counterparts of "Blue-Eyes White Dragon" and "Dark Magician", both of which are rival monsters in the ''Yu-Gi-Oh!'' manga.
  ** Both monsters feature opposite [[Attribute]]s of each other, which are the opposite Attributes of their original counterparts; this monster is a [[DARK]] monster while "Blue-Eyes" is a [[LIGHT]] monster, while "Mahad" is a LIGHT monster and "Dark Magician" is a DARK monster.
  ** Both monsters are depicted in mirrored poses; this monster is depicted facing right at an upwards angle, while "Mahad" is depicted facing left at a downwards angle.
