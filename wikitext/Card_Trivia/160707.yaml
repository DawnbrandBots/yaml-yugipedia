title: Card Trivia:Forbidden Beast Nibunu
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is the only one out of all "[[Forbidden Beast]]" monsters used so far in the manga, that does not need "[[Forbidden Mantra]]" to be on the field for its effect to activate.
  ** Also, this is the only one to have four limbs, instead of traditional two.
  * Nibunu shares its Japanese name with [https://w.atwiki.jp/occultfantasy/pages/1360.html a creator-goddess of Taiwanese mythology], named [https://zh.wikipedia.org/wiki/%E5%A6%AE%E8%8A%99%E5%8A%AA 妮芙努] ''Nivnu''. Its name appears to be written in Taiwanese kana, a phonetic system imposed on the country during Japanese rule.
