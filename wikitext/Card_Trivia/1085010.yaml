title: Card Trivia:Tempura of Fortune - EBI
wikitext: |-
  {{Navigation}}

  * This monster is based on ''[[wikipedia:Fried shrimp#ebi tempura|ebi tempura]]'' (海老天ぷら), a Japanese dish of crispy fried shrimp coated in a light, bubbly batter.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, ''ebi tempura'' is [[Jaden Yuki]]'s favorite food. Fittingly, this monster was released in ''[[Supreme Darkness]]'', which features support for the "[[Evil HERO]]" [[archetype]] used by [[The Supreme King]], Jaden's past incarnation in the anime.
  * The kanji 「運否の天賦羅」 (''Unpu no Tenpura'', "Tempura of Chance") in this monster's Japanese name is a pun on 「運否天賦」 (''unputenpu'', "leaving it to chance") and 「天麩羅」 (''tenpura'', "[[wikipedia:Tempura|tempura]]")
  * This monster's [[flavor text]] is written in the style of a food critic's appraisal, similar to the text of "[[Gunkan Suship Shari]]".
  ** The flavor text mentions that this monster is located in EDO-FRONT, the location from which [[Sour Scheduling - Red Vinegar Vamoose|the red vinegar]] for "[[Gunkan Suship Shari Red]]" is imported.
  ** The flavor text grants EDO-FRONT a three-star rating, referencing this monster's [[Level]] (3).
  ** The flavor text mentioning that the monster in question is a disappointment after waiting for more than a year after coming to the Suship Harbor EDO-FRONT and not receiving anything is a reference to the last [[Suship]] card [[Gunkan Suship Catch-of-the-Day]] being printed in [[Cyberstorm Access]], or more than one year ago, and this card despite its Type, Attribute and Flavor Text, is not a [[Suship]] card or support for [[Suship]], thus being a disappointment to the writer/reader for not meeting expectations.
  ** The Pendulum effect is a reference to the controller either successfully taking the tempura and thereby summoning it, or failing and getting burned in the process. It is also referenced in the flavor text as the writer, despite his wishes, fails to actually see the tempura.
  ** The line regarding the tempura's large scale earning it the name "Golden Tempura" likely references the monster's high [[Pendulum Scale]] of 8.
