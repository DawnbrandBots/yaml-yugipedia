title: Card Trivia:Shield of the Millennium Dynasty
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Millennium Shield]]".
  ** This card's artwork is similar to the original artwork of "Millenium Shield", as both monsters are facing forward and are surrounded by glowing light.
  ** This monster's first effect to prevent it from being [[destroy]]ed by [[Spell]]/[[Trap Card]]s references the [[flavor text]] of "Millennium Shield", which states that it can block any strong attack.
  *** Despite this, "Millenium Shield" is depicted being destroyed in the artworks of "[[Kaminote Blow]]" and "[[Shield Crush]]". However, this monster's [[original DEF]] (3000) and effect prevent it from being destroyed by most attacks and the effects of the aforementioned cards.
