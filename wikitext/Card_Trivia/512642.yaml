title: Card Trivia:Elemental Absorber
wikitext: |-
  {{Navigation}}

  * The triangles in this card's artwork are the traditional [[wikipedia:alchemical symbol|alchemical symbols]] for [[wikipedia:Air (classical element)|air]], [[wikipedia:Fire (classical element)|fire]], [[wikipedia:Earth (classical element)|earth]], and [[wikipedia:Water (classical element)|water]] (in clockwise order).
  ** Fittingly, this card is used by [[Lyman Banner]], an alchemist who uses an Alchemy Deck in the ''[[Yu-Gi-Oh! GX]]'' anime.
