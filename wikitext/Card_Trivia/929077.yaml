title: Card Trivia:Learning Elf
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2026]]''.
  * This monster appears in the artwork of "[[Mirror Barrier]]" and "[[Silent Learning]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Set]] a [[Trap Card]] with an effect that [[equip]]s itself to a monster when [[Summon]]ed may be a reference to the fact that both times [[Learning Elf (manga)|this monster]] was Summoned in the ''[[Yu-Gi-Oh! R]]'' manga, [[Gekko Tenma]] immediately Set two [[Spell]]/Trap Cards afterwards, of which at least one was an [[Equip Trap Card]] that was subsequently equipped to this monster.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|R|017|ref}}, specifically from the panel showing this monster being Summoned.
