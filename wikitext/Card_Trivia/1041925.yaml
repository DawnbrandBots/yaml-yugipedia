title: Card Trivia:Hi-Speedroid Clear Wing Rider
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Speedroid Clear Wing Wonder]]".
  * The silhouette of "[[Clear Wing Synchro Dragon]]" appears in this card's artwork.
  * This monster is based on a [[wikipedia:Radio-controlled car|radio-controlled motorbike]], a miniature model of a motorbike that can be controlled from a distance using a specialized transmitter or remote.
  ** This monster's Japanese name features the first English letters of the words "[[roid]]" and "[[Clear]]" separated by a slash (Ｒ／Ｃ), which spells the English abbreviation of "radio-controlled".
  *** The word "Rider" in the last portion of this monster's name references the name of the Special [[Booster pack]] that introduced the "[[Speedroid]]" [[archetype]]: ''[[Booster SP: High-Speed Riders]]''.
  ** Visually, this monster is also based on [[Yugo]]'s [[Duel Runner]], the ''[[TK2000PS]]'', modified to visually resemble "Clear Wing Synchro Dragon".
  *** This monster's effect to [[Special Summon]] up to 2 [[Level 7]] [[WIND]] [[Synchro Monster]]s with different names from the [[Extra Deck]] reference "Clear Wing Synchro Dragon" and "[[Clear Wing Fast Dragon]]", the signature monsters used by Yugo respectively in the ''[[Yu-Gi-Oh! ARC-V]]'' anime and [[Yu-Gi-Oh! ARC-V (manga)|manga]].
  * This monster has the highest [[Level]] (11) and [[original ATK]] (3500) of all "Speedroid" monsters.
