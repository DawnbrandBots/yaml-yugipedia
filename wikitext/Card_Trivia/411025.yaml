title: Card Trivia:Majester Paladin, the Ascending Dracoslayer
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a evolved combination of "[[Luster Pendulum, the Dracoslayer]]" and "[[Majespecter Unicorn - Kirin]]".
  ** This monster's [[Type]] ([[Dragon]]) and [[original ATK]] (1850) is the same as "Luster Pendulum", while its [[Attribute]] ([[WIND]]) and [[DEF]] (2000) is the same as "Kirin".
  ** Despite this, "Kirin" cannot be used to [[Xyz Summon]] this monster without using a [[Level]]-manipulation effect beforehand.
  * This is the first [[Xyz Monster]] to list a [[Pendulum Monster]] as [[Xyz Material]].
  * The Spanish prints of this card have a small typo, as the lore does not follow the typical Material wording: it's printed as "''2 Monstruos de Péndulo Nivel 4''" instead of "''2 Monstruos de Péndulo '''de''' Nivel 4''".
