title: Card Trivia:Dragunity Dux
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragunity Draft]]" and "[[Dragunity Whirlwind]]".
  ** This monster appears to be part of "[[Dragunity Knight - Ascalon]]".
  * [[wikipedia:Dux|Dux]] is Latin for leader (from the verb ducere, 'to lead') and later for Duke. In the era of Republican Rome, dux could refer to anyone who commanded troops, such as tribal leaders.
  ** With a name like this, it is possible that "[[Dragunity Dux|Dux]]" is the commander of the [[Dragunity]] tribe, or at least a section of it.
  ** Due to "Duce" (Italianization of "Dux") being used as the title of [[wikipedia:Benito Musssolini|Benito Mussolini]], the leader of [[wikipedia:Fascism|Fascists]], this card's Italian name uses "Condottiero" (meaning in fact "Troop leader") instead, to avoid negative connotations.
