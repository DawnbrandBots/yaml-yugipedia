title: Card Trivia:Moon Dragon Quilla
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Earthbound Resonance]]".
  * This monster is based on [[wikipedia:Mama Quilla|Mama Quilla]], the goddess of the [[wikipedia:Moon|Moon]] in [[wikipedia:Inca mythology|Inca mythology]].
  * This monster is the [[DARK]] [[counterpart]] of "[[Sun Dragon Inti]]".
  ** Both are named after the deities of the [[wikipedia:Sun|Sun]] and Moon in Inca mythology.
  ** Both are depicted with opposite color schemes and poses in their card artworks.
  ** Both monsters' [[Special Summon]]ing effects resemble the cycle of the sun and the moon.
  ** This monster's effect increases [[Life Points]], while the effect of "Inti" inflicts damage.
  ** This monster was a [[Dark Synchro Monster]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, while "Inti" was a [[Synchro Monster]].
  * This is the only Dark Synchro Monster released in the ''[[OCG]]''/''[[TCG]]'' that does not require any DARK [[Tuner monster]] as [[Synchro Material]], instead specifically requiring "[[Supay]]", an [[EARTH]] monster.
  ** This is also the only original Dark Synchro Monster released in the ''OCG''/''TCG'' to have no [[Type]] restrictions with the other non-Tuner Synchro Materials.
  * This is the first Dark Synchro Monster to be released in a [[Core Booster|Core Booster pack]] as a Synchro Monster.
