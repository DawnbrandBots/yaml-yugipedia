title: Card Trivia:Mirage of Nightmare
wikitext: |-
  {{Navigation}}

  * "[[Wandering Mummy]]" appear in this card's artwork.
  * The events in this card's artwork seem to continue in the artwork of "[[Graverobber's Retribution]]".
  ** Both cards' artworks are based on a recurring trope in zombie fiction, in which a horde of zombies corner their victim and brutally murder them.
  * In the anime, this card's [[discard]]ing effect was never used since it was sent to the [[Graveyard]] with "[[Emergency Provisions (anime)|Emergency Provisions]]" before the player's next [[Standby Phase]].
  ** This combination was first used in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime and was frequently used in the first season of the ''[[Yu-Gi-Oh! GX]]'' anime until its last usage in {{episode|GX|030|ref}}. It was around the time of the episode in April 2005 that this card was [[Forbidden]] in the ''[[OCG]]'' and it has remained Forbidden since.
  * In ''[[Yu-Gi-Oh! The Dawn of Destiny]]'', the player still has to discard cards even if they [[destroy]] this card with "[[Mystical Space Typhoon]]" before the next Standby Phase.
