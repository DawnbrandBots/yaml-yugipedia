title: Card Trivia:Performapal Ladyange
wikitext: |-
  {{Navigation}}

  * This card and "[[Performapal Gentrude]]" reference [[Yuya Sakaki]]'s catchphrase in the ''[[Yu-Gi-Oh! ARC-V]]'' anime: ''Ladies and Gentlemen!'' (レディース＆アンドジェントルメン！ ''Redīsu ando Jentorumen!'')
  ** Fittingly, this card's [[monster effect]] mentions "Gentrude", and "Gentrude's" [[Pendulum Effect]] mentions this card.
  ** Visually, the monster bears resemblance to "[[Zuzu Boyle]]", Yuya's close friend and possible romantic interest, sharing the same eye color, eye shape, and hair's front bang as her.
