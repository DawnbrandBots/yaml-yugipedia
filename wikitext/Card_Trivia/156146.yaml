title: Card Trivia:Daidara-Bocchi
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2023 2nd Wave]]''.
  * This monster is based on [[wikipedia:Daidarabotchi|Daidarabotchi]], a giant ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore who takes on the form of a shadowy humanoid with his tongue sticking out of his mouth.
  * This monster has the highest [[Level]] (10) and [[original ATK and DEF]] (2900/2500) of all [[Yokai]] monsters.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|047|ref}}, specifically from the panel showing [[Daidara-Bocchi (manga)|this monster]] being Summoned.
