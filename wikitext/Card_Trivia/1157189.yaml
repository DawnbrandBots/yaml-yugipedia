title: Card Trivia:Vic Viper Full Custom
wikitext: |-
  {{Navigation}}

  * Four "[[Gradius' Option (Rush Duel)|Gradius' Option]]" appear in this card's artwork.
  ** Fittingly, in most entries in the ''[[wikipedia:Gradius|Gradius]]'' video game series, a player can have up to four [[wikia:w:c:gradius:Option|Options]] at a time.
  ** The Options are arranged with two on each side of the main ship, referencing the Formation Option weapon type, which uses similar positioning for the Options.
  * This monster is based on the "Edit Mode" introduced in ''[[wikipedia:Gradius III|Gradius III]]'', which allows a player to customize which type of each power-up to receive from power capsules. Its name, "Full Custom", implies that this monster has collected enough power-ups to upgrade those customized weapons to maximum power.
  * This monster has the highest [[original ATK]] (3200) of all [[Level 4]] monsters.
