title: Card Trivia:Necro Synchron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Dilemma]]".
  * This monster is a [[Card evolutions|combined]] form of "[[Fleur Synchron]]" and "[[Necro Fleur]]".
  ** This monster's [[Attribute]] is [[DARK]], while the Attribute of "Fleur Synchron" is [[LIGHT]].
  ** This monster's [[original ATK and DEF]] (200/400) is an inversion of the original [[ATK]] and [[DEF]] of "Fleur Synchron" (400/200).
