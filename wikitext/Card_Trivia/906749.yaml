title: Card Trivia:Counter (card)
wikitext: |-
  {{Navigation}}

  * "[[B.E.S. Big Core]]" appears in this card's artwork.
  ** The artwork is a reference to [[Konami]]'s ''[[wikipedia:Gradius (series)|Gradius]]'' video games, where "Big Core" appeared as a recurring boss within the series. "Big Core" has three barriers protecting its core as a weakspot that player has to shoot at, which is represented by three [[Counter (counter)|counters]] in ''Yu-Gi-Oh!'' adaptations.
