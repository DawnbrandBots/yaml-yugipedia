title: Card Trivia:Ignition Phoenix
wikitext: |-
  {{Navigation}}

  * "[[Igknight Squire]]", "[[Igknight Crusader]]", "[[Igknight Templar]]", "[[Igknight Paladin]]" and "[[Ignister Prominence, the Blasting Dracoslayer]]" appear in this card's artwork, hinting at a relationship between the "[[Dracoslayer]]" and "[[Igknight]]" archetypes.
  * Like the other Field Spells of archetypes related to the "[[Dracoslayer]]" storyline ("[[Dynamic Powerload]]", "[[Majesty's Pegasus]]", "[[Amorphous Persona]]", "[[Crystolic Potential]]",  "[[Metamorformation]]", "[[Zodiac Sign]]", and "[[Dragonic Diagram]]"):
  ** They are Field Spells that feature a member of the "Dracoslayer" archetype in its artwork.
  ** They support their respective archetype, but are not part of the archetype themselves (they do not have the archetype in their name).
  ** Their Japanese names each have a word abbreviated with an English letter with Furigana. In this card's case, "Phoenix" is written as a "P" with the Furigana "Fenikkusu", similar to how "Pendulum"  is written as a "P" with the Furigana "Pendyuramu" in Japanese.
  * The Spanish name of this card has the word "''Phoenix''" (in Spanish, "''Fénix''") untranslated, thus being printed as "''Phoenix de la Ignición''".
