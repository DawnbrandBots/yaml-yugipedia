title: Card Trivia:Tearlaments Kitkallos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Tearlaments Cryme]]", "[[Tearlaments Grief]]", "[[Tearlaments Kaleido-Heart]]", and "[[Tearlaments Sulliek]]".
  * This card is named after ''[[wikipedia:Chaetoceros|Chaetoceros]]'', a [[wikipedia:Genus|genus]] of marine [[wikipedia:Plankton|planktonic]] [[wikipedia:Diatom|diatoms]].
  ** This card's name may also be a reference to how, according to the tragic fairy tale ''[[wikipedia:The Little Mermaid|The Little Mermaid]]'', [[wikipedia:Mermaid|mermaids]] turn into sea foam upon death, as marine planktons are one of the main components of sea foam.
  * This monster has 3 alternate forms
  ** Upgraded: "[[Tearlaments Rulkallos]]".
  ** Corrupted "[[Kashtira]]": "[[Tearlaments Kashtira]]"
  ** Purified "[[Mannadium]]": "[[Mannadium Trisukta]]"
