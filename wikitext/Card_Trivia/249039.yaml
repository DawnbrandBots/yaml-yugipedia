title: Card Trivia:Fairy Cheer Girl
wikitext: |-
  {{Navigation}}

  * This is the [[signature card]] of [[Tori Meadows]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's name and appearance reflect how Tori mainly cheers for [[Yuma Tsukumo]] and his friends during their Duels in the anime.
  ** Like the signature cards of many of the other ''Yu-Gi-Oh!'' heroines, this card is performance-themed. In this case, this monster is based on a cheerleader.
  * This monster has a [[Ranked-Up]] "[[CXyz]]" form: "[[CXyz Dark Fairy Cheer Girl]]".
  * This is the first [[Xyz Monster]] to require [[Fairy]] monsters as [[Xyz Material]]s.
