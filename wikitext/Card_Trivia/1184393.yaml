title: Card Trivia:Plasma Blast
wikitext: |-
  {{Navigation}}

  * "[[Plasma Warrior Eitom]]" appears in this card's artwork.
  * This card's effect [[support]]ing [[Thunder]] or [[Rock]] monsters is a reference to [[Bastion Misawa|Bastion Misawa's]] usage of "[[Plasma Warrior Eitom (anime)|Plasma Warrior Eitom]]" (a Thunder monster) and the "[[Magnet Warrior]]" [[archetype]] (which consists of Rock monsters) in {{episode|GX|082|ref}}.
