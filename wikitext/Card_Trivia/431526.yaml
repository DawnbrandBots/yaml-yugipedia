title: Card Trivia:Dinomic Powerload
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts "[[Luster Pendulum, the Dracoslayer]]" fusing with "[[Dinomist Plesios]]" and "[[Dinomist Stegosaur]]" to become "[[Dinoster Power, the Mighty Dracoslayer]]".
  * Like the other Field Spells of archetypes related to the "[[Dracoslayer]]" storyline ("[[Ignition Phoenix]]", "[[Majesty's Pegasus]]", "[[Amorphous Persona]]", "[[Crystolic Potential]]",  "[[Metamorformation]]", "[[Zodiac Sign]]", and "[[Dragonic Diagram]]"):
  ** They are Field Spells that feature a member of the "Dracoslayer" archetype in its artwork.
  ** They support their respective archetype, but are not part of the archetype themselves (they do not have the archetype in their name).
  ** Their Japanese names each have a word abbreviated with an English letter with Furigana. In this card's case, "Powerload" is written as a "P" with the Furigana "Pawārōdo", similar to how "Pendulum" is written as a "P" with the Furigana "Pendyuramu" in Japanese.
