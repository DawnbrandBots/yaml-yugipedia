title: Card Trivia:Archeonys
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the ''[[wikipedia:Archaeopteryx|Archaeopteryx]]'', a genus of bird-like dinosaurs from the [[wikipedia:Late Jurassic|Late Jurassic period]], known for being the missing link in the evolutionary transition between dinosaurs and modern birds, possessing both reptilian features and avian features.
