title: Card Trivia:Amorphous Barrier
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name and artwork is based on an [[wikipedia:Amorphous solid|amorphous solid]], a non-crystalline solid that does not organize the atoms and molecules in a definite lattice pattern.
  ** Fittingly, in {{episode|GX|012|ref}}, when this card is [[activate]]d, it creates a protective glass barrier, which falls under the category of an amorphous solid.
