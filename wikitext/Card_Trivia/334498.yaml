title: Card Trivia:Sinister Shadow Games
wikitext: |-
  {{Navigation}}

  * "[[Pulao, Wind of the Yang Zing]]", "[[Suanni, Fire of the Yang Zing]]", and the shadows of "[[Shaddoll Dragon]]" and the dragon of "[[El Shaddoll Winda]]" appear in this card's artwork.
  * This seems to imply that the "[[Shaddoll]]" monsters are copies of the originals, not corrupted versions of the monsters themselves.
  ** The "Shaddoll" monsters may also be the deceased copies of their originals, as "[[Apoqliphort Towers]]" is shown destroying "Pulao" and "Suanni" in the artwork of "[[Laser Qlip]]". This is supported by "[[Shaddoll Falco]]", as "[[Gusto Falco]]" had been killed in the war against the "[[Gishki]]" beforehand.<ref>http://ygorganization.wpengine.com/monsterstories/ "However, he lost his life in the Great War while protecting “Kamui”."</ref>
  * Despite the fact that most of the original series' conflicts are connected to the [[Shadow Games]] in some fashion as well as that GX featured numerous [[Shadow Games]], this is the first card to have "Shadow Game" in its name.

