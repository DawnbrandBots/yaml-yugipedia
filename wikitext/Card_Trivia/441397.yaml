title: Card Trivia:Fire Reaper
wikitext: |-
  {{Navigation}}

  * This card has one of the [[List of cards with the longest OCG to TCG import times|longest import times]] between its initial ''[[OCG]]'' release and its ''[[TCG]]'' debut, with a gap of 20 years and nearly 6 months between its first ''[[Vol.1]]'' print in February 1999 and its August 2019 release in the ''[[Speed Duel: Scars of Battle]]'' booster pack.
