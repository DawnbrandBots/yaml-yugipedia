title: Card Trivia:S-Force Nightchaser
wikitext: |-
  {{Navigation}}

  * This monster is implied to be related to "[[S-Force Rappa Chiyomaru]]".
  ** Both share the same ninja motifs, similar outfit design elements, and [[original ATK]] (800).
  ** The artwork of "[[Small Scuffle]]" depicts both monsters facing each other.
  ** Both monsters' effects are the opposite of each other: This monster [[Special Summon]]s a [[banish]]ed "[[S-Force]]" monster to the [[field]] by [[shuffling]] another into the [[Deck]], while "Rappa Chiyomaru" Special Summons an "S-Force" monster from the Deck by banishing another "S-Force" card from the [[hand]].
  ** The description of the player icon of this monster in ''[[Yu-Gi-Oh! Master Duel]]'' confirms it is an android programmed to kill "[[I:P Masquerena]]".
  * This card's artwork is adapted into ''[[Underground Data Courier]]'' in ''Yu-Gi-Oh! Master Duel'', specifically the scene where [[Nightchaser]] begins her assault on [[I:P Masquerena (character)|I:P Masquerena]].
