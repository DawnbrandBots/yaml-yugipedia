title: Card Trivia:Delta Attacker
wikitext: |-
  {{Navigation}}

  * Three "[[Fiend Scorpion]]s" appear in this card's artwork.
  * This card's name is based on the Greek letter [[wikipedia:Delta (letter)|delta]], where its uppercase form is shaped like a triangle (Δ).
  ** Fittingly, this card's artworks depicts three "Fiend Scorpions" in a triangle, and its effect allows three [[Normal Monster]]s to [[attack]] the opponent [[Direct attack|directly]].
