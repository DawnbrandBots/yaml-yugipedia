title: Card Trivia:Old Entity Hastorr
wikitext: |-
  {{Navigation}}

  * This card's name and art is a reference to [[wikipedia:Hastur|Hastur]], a fictional deity from the works of American horror writer [[wikipedia:H. P. Lovecraft|H. P. Lovecraft]] (though he was actually created by [[wikipedia:Ambrose Bierce|Ambrose Bierce]], in whose works Hastur originated as a benevolent deity of shepherds). [[wikipedia:August Derleth|August Derleth]] developed Hastur into a [[wikipedia:Cthulhu Mythos deities|Great Old One]], along with describing ''[[wikipedia:The King in Yellow|The King in Yellow]]'' as one of Hastur's avatars, in which form Hastur appears in the artwork of this card.
  ** The larger shadowy monster in the artwork of this card may be a reference to The Feaster from Afar; another avatar of Hastur depicted as a black, shriveled, flying monstrosity with tentacles tipped with razor-sharp talons that can pierce a victim's skull and siphon out the brain.
  * This card has the highest ATK among Level 4 [[Synchro Monster]]s, tied with "[[The Fabled Unicore]]".
  * This card's last effect may be a reference to the debilitating insanity with which many who encounter the creatures from Lovecraft's work are subsequently afflicted.
