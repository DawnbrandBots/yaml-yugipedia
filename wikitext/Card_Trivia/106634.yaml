title: Card Trivia:Minefieldriller
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name, "Minefieldriller" is a portmanteau of "Minefield" and "Driller".
  ** This card's name is a reference to its effect of [[add]]ing ("mining") to the [[hand]] a [[Field Spell]] in the [[Graveyard]], when this [[face-up]] card [[leaves the field]] while.
  * This monster is based on three [[wikipedia:Steam locomotive|steam locomotives]] with a mounted [[wikipedia:Drill|drill]].
