title: Card Trivia:Goblin Thief
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]", the cart of "[[Supply]]" and "[[Jar of Greed]]" appear in this card's artwork.
  * The events of this card continue in "[[The Forceful Checkpoint]]", which shows "Goblin of Greed" hiding in the cart of "Supply" while the latter is trying to enter a castle.
