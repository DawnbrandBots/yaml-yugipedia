title: Card Trivia:Voidvelg Gigantomachia
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Voidvelg Requiem]]".
  * This monster is named after the [[wikipedia:Giants (Greek mythology)|Gigantomachy]], the battle fought between the Giants and the Olympian gods for supremacy of the cosmos in Greek mythology.
