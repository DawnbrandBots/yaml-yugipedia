title: Card Trivia:Ghost Belle & Haunted Mansion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * This monster's Japanese name, ({{name|Ghost Belle & Haunted Mansion|ja}}, ''{{romanized name|Ghost Belle & Haunted Mansion|ja}}'') is a pun on "''yashiki''" (屋敷, lit. "mansion"), and "''[[wikipedia:Zashiki-warashi|zashiki-warashi]]''" (座敷童子 lit. "guestroom child"), with the latter word being the name of a ''[[wikipedia:Yokai|yokai]]'' that lives in parlors or storage rooms.
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this monster has two special animations when its effect is [[activate]]d, based on its individual artworks: If it uses its original artwork, the card this monster's effect [[negate]]d is surrounded by a dark aura; however, if its alternate artwork is used, this monster additionally appears above the negated card.
