title: Card Trivia:Changing Destiny
wikitext: |-
  {{Navigation}}

  * In the [[Yu-Gi-Oh! 5D's|anime]], this card is used to negate an attack caused by [[Carly Carmine]]'s "[[Enlightenment (anime)|Enlightenment]]", whose Japanese name translates to "Prophecy of a Future King". This prevented [[Jack Atlas]] from losing the [[Duel]], thus "changing" the apocalyptic future foretold by Carly's fortune telling in which Jack reigns as dark king.
  * The red and blue doors in the card are possibly a reference to the movie [[wikipedia:The Matrix|The Matrix]].  The main protagonist, Neo, is given the choice of "changing" his destiny by selecting either a red pill or a blue pill to ingest.
  * This card's effects are halved counterparts of "[[Draining Shield]]" and "[[Magic Cylinder]]" which generally benefit the player instead of the opponent.
