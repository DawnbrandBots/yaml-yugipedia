title: Card Trivia:Evil HERO Malicious Fiend
wikitext: |-
  {{Navigation}}

  * This monster is a [[Fusion Monster|Fusion]] form of "[[Evil HERO Malicious Edge]]".
  * This monster has the highest [[original ATK]] (3500) of all "[[Evil HERO]]" monsters.
  ** This monster also has the highest original [[ATK]] of all "[[HERO]]" monsters (tied with "[[Elemental HERO Cosmo Neos]]").
  * This was the first Fusion Monster to require a [[Fusion Material]] with a specific [[Level]] (1 [[Level 6]] or higher [[Fiend]] monster).
