title: Card Trivia:Mud Max
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Elemental HERO Clayman]]" appears in this card's artwork.
  * This card's name is a pun on the 1979 Australian dystopian film franchise, ''[[wikipedia:Mad Max|Mad Max]]''.
  ** This card's artwork depicts "Clayman" driving a rocket-powered vehicle, referencing how the ''Mad Max'' franchise is mainly centered around high-powered vehicles.
