title: Card Trivia:Ringowurm, the Dragon Guarding the Hundred Apples
wikitext: |-
  {{Navigation}}

  * The name of this card is a portmanteau of the Japanese word ''ringo'' (林檎, "apple") and [[wikipedia:Lindworm|Lindworm]], a legendary serpent from European folklore.
  * This monster is a reference to [[wikipedia:Ladon (mythology)|Ladon]], a hundred-headed dragon in [[wikipedia:Greek mythology|Greek mythology]] that guards the golden apples in the [[wikipedia:Hesperides|Garden of the Hesperides]].
