title: Card Trivia:Tyrant's Tantrum
wikitext: |-
  {{Navigation}}

  * The Emperor and "[[Goblin Attack Force]]" are shown in this card's artwork.
  * This card is a Spell-preventing version of "[[Tyrant's Tirade]]" and "[[Tyrant's Temper]]", which both deal with monster effects and Traps respectively. The scene on the card seems to be a continuation of the scene which began in the previous two cards.
  * The emperor from this card appears in the artwork of "[[The Emperor's Holiday]]", "Tyrant's Temper", "Tyrant's Tirade", "[[Tyrant's Tummyache]]", "[[Tyrant's Throes]]", "[[Double Payback]]", "[[The Huge Revolution is Over]]", "[[Asleep at the Switch]]", "[[Turnabout]]", "[[Retort]]" and "[[Clear Robe]]".
