title: Card Trivia:Gagaga Head
wikitext: |-
  {{Navigation}}

  * This is the only "[[Gagaga]]" [[Main Deck]] monster whose [[Level]]/[[Rank]] is not 4 or lower.
  ** As a result, this is the only "Gagaga" monster to require being [[Tribute Summon]]ed.
  * This monster has the highest [[Level]] (6) and [[original ATK]] (2100) of all "Gagaga" monsters.
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Normal Summon]]ing condition is an alteration of its manga Summoning condition, which requires it to have two or more monsters in the player's [[Graveyard]] to Normal Summon it without [[Tribute|Tributing]]. In {{chapter|ZEXAL|054|ref}}, this monster was Normal Summoned while [[Yuma Tsukumo (manga)|Yuma Tsukumo]] [[control]]led no monsters while [[Astral (manga)|Astral]] controlled monsters.
  ** This monster's ''OCG''/''TCG'' effect to Normal Summon it as a [[Level 4]] monster is based on how in the manga, it was used to [[Xyz Summon]] "[[No. 39: Utopia (manga)|No. 39: Utopia]]", a [[Rank 4]] monster.
  ** This monster's ''OCG''/''TCG'' effect to [[Special Summon]] up to two "Gagaga" monsters from the player's [[Graveyard]] is an alteration of its manga effect to Special Summon as many "Gagaga" monsters from the player's Graveyard. In the aforementioned chapter, Yuma Tsukumo had only "[[Gagaga Girl (manga)|Gagaga Girl]]" and "[[Gagaga Magician (manga)|Gagaga Magician]]" in his Graveyard.
  * This card's artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, specifically from the panel showing [[Gagaga Head (manga)|this monster]] being Summoned.
