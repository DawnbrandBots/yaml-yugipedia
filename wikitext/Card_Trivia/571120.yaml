title: Card Trivia:F.A. Dawn Dragster
wikitext: |-
  {{Navigation}}

  * The driver of "Dawn Dragster" is "[[U.A. Midfielder]]".
  * This monster appears in the artworks of "[[F.A. Winners]]", "[[F.A. Test Run]]", "[[F.A. Dead Heat]]", and "[[F.A. Overheat]]".
  ** The process of "[[F.A. Sonic Meister]]" being remodeled into "Dawn Dragster" is shown in the artwork of "[[Consolation Prize]]", where a holographic schematic of this vehicle can also be seen.
