title: Card Trivia:Mirror Mail
wikitext: |-
  {{Navigation}}

  * This card's Japanese name ({{name|Mirror Mail|ja}}, ''{{romanized name|Mirror Mail|ja}}'') is a reference to the Japanese name of "[[Mirror Force]]" ({{name|Mirror Force|ja}}, ''{{romanized name|Mirror Force|ja}}'').
  * This card's Spanish name, "'''''Correo Espejo'''''", features a translation error, as "''correo''" is the Spanish word for "mail", but is synonymous with the words "post" or "parcel" in this context. A more fitting name would be "''Armadura de Espejo''".
