title: Card Trivia:Power of the Guardians
wikitext: |-
  {{Navigation}}

  * "[[Butterfly Dagger - Elma]]", "[[Gravity Axe - Grarl]]", "[[Rod of Silence - Kay'est]]", "[[Shooting Star Bow - Ceal]]", "[[Twin Swords of Flashing Light - Tryce]]", and "[[Wicked-Breaking Flamberge - Baou]]" appear in this card's artwork.
  ** All of these cards were originally released in the ''[[OCG]]'' [[Booster Pack]] ''[[Power of the Guardian]]'', which this card is named after. "[[Celestial Sword - Eatos]]" and "[[Reaper Scythe - Dreadscythe]]" are the only "[[Guardian]]" [[Equip Spell]]s that do not appear in this card's artwork, having been released much later (in ''[[Dragons of Legend]]'').
