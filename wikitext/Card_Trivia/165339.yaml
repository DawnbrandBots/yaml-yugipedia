title: Card Trivia:Gem-Knight Amber
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Amber|Amber]].
  * This card along with "[[Gem-Knight Iolite]]" are the first "[[Gem-Knight]]" [[Gemini monster]]s
  ** This card and "Gem-Knight Iolite's" effects are also meant to work in tandem, recycling [[Gem-Knight]] monsters from your [[hand]], [[Graveyard]], and that are banished.
  * This card along with "Gem-Knight Iolite" are also the 4th Gemini monster to be part of an [[Archetype]]. The other being "[[Alien Hypno]]", "[[Ancient Gear Knight]]" and "[[Elemental HERO Neos Alius]]".
  ** They also are the first non-reprint Gemini monsters released in [[Duel Terminals|Duel Terminal]], as well as the first Gemini monsters to be a part of Duel Terminal Archetype.
  * This card may be a reference to [[Elemental HERO Sparkman]].
  ** Both cards have lightning or electricity shown in both their hands.
  ** They are both level 4 monsters
  ** They have the same [[ATK]] and [[DEF]]
  ** They both have orbs shown on the palms of their hands.
