title: Card Trivia:Upstart Goblin
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" appears in this card's artwork.
  ** This card's artwork is an ironic role reversal of "[[Second Coin Toss]]", in which a human is dropping coins for "Goblin of Greed" to pick up.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Upstart Goblin]]".
  * This card has been infamously connected to professional player  Patrick Hoban, who popularized the use of three copies in every [[Deck]] to "max out on profits".
