title: Card Trivia:Geminize Lord Golknight
wikitext: |-
  {{Navigation}}

  * The kanji for this monster's Japanese title, "Dualize Lord" (重起士道 ''jūkishidō'') is homophonous with the Japanese words for "heavy equipment" (重機 ''jūki'') and "chivalry" (騎士道 ''kishidō'').
  * This monster is based on a ''shogi'' piece, indicated by its shogi chess piece shaped parts on its wheel accessories.
  * This is the first card to feature an effect that can [[search]] for other cards based on a string of text, where the text is not a specifically listed monster name.
