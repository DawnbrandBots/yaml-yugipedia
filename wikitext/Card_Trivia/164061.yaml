title: Card Trivia:Power Tool Mecha Dragon
wikitext: |-
  {{Navigation}}

  * This monster's silhouette appears in the artwork of "[[Duel Dragon Token]]".
  * This monster is the [[Duel Dragon]] [[counterpart]] of "[[Power Tool Dragon]]".
  ** This is the only Duel Dragon to not be [[Dragon]] monster.
  ** This is the only Duel Dragon related to the ''[[Yu-Gi-Oh! 5D's]]'' anime to not be the counterpart of a Signer Dragon (although "[[Life Stream Dragon]]" is the [[Card evolutions|true form]] of "Power Tool Dragon").
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|022|ref}}, specifically from the panel showing [[Power Tool Mecha Dragon (manga)|this monster]] alongside "[[Ancient Pixie Dragon (manga)|Ancient Pixie Dragon]]".
  * This is the [[signature card]] of [[Leo (manga)|Leo]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
