title: Card Trivia:Hyozanryu
wikitext: |-
  {{Navigation}}

  * This monster's English name is derived from the Japanese compound word for "iceberg dragon" (氷山竜, ''Hyōzanryū''). This is most likely a mistranslation, based on its Japanese name, "Diamond Dragon", and its [[flavor text]]. 
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster could be [[Special Summon]]ed via the effect of "[[Carboneddon (anime)|Carboneddon]]" after it is stacked underneath ten cards in the [[Graveyard]]. This is a reference to the process of [[wikipedia:Carbon|carbon]] transforming into [[wikipedia:Diamond|diamond]] after millions of years under pressure and heat.
  ** The effect of "[[Carboneddon]]" in the ''[[OCG]]''/''[[TCG]]'' to Special Summon a [[Level 7]] or lower [[Dragon]] [[Normal Monster]] is based on its anime effect to Special Summon this monster.
