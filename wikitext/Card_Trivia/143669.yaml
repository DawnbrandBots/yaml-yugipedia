title: Card Trivia:Rose Bud
wikitext: |-
  {{Navigation}}

  * This card has the head of "[[Elemental HERO Knospe]]" in the middle and has the buds from "[[Elemental HERO Poison Rose]]" buds around it. This symbolizes "Knospe" turning into "Poison Rose".
  * This card's Japanese name, Blumenblatt, is the German word for "petal".
