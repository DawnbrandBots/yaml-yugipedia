  * "[[Battledrone General]]" appears in this card's artwork.
  ** This is fitting, as the aircraft it is based on, the [[wikipedia:Lockheed SR-71 Blackbird|Lockheed SR-71 Blackbird]], was designed around the  shape and materials of a [[wikipedia:Stealth aircraft|stealth aircraft]].
