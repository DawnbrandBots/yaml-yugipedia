  * This monster is based on the legendary sword [[wikipedia:Totsuka-no-Tsurugi|Ame-no-Ohabari]], which the [[wikipedia:Shinto|Shinto]] god [[wikipedia:Izanagi|Izanagi]] used to behead [[wikipedia:Kagu-tsuchi|Kagutsuchi]].
