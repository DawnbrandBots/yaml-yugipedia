title: Card Trivia:Legendary Lord Six Samurai - Kizan
wikitext: |-
  {{Navigation}}

  * This monster is the [[Synchro Monster|Synchro]] counterpart of "[[Legendary Six Samurai - Kizan]]".
  * This monster is wielding the same weapon (a [[wikipedia:Kama-yari|kama-yari]]) that appears in the artwork of "[[Grandmaster of the Six Samurai]]". Fittingly, this monster is a younger version of "Grandmaster".
