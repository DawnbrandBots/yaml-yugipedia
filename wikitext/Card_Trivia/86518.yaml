title: Card Trivia:Toon Gemini Elf
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Pegasus]]''.
  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Gemini Elf]]".
  ** Similar to "Gemini Elf", this monster's Portuguese name ("Elfos Gêmeos Toon") is male-gendered, despite the fact that both elves are depicted as female.
  * This is the first Toon monster with an additional effect that the original monster doesn't have, other than its generic Toon effects, despite the fact that "Gemini Elf" is a [[Normal Monster]]. This trend was followed by "[[Red-Eyes Toon Dragon]]" and "[[Toon Dark Magician]]".
