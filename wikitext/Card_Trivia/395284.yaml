title: Card Trivia:Shiranui Spectralsword
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Shiranui Samuraisaga]]", "[[Shiranui Shogunsaga]]", "[[Shiranui Style Samsara]]", "[[Shiranui Style Swallow's Slash]]", "[[Shiranui Style Synthesis]]", "[[Shiranui Sunsaga]]", and "[[Shiranui Swordsaga]]".
  * "Shiranui Sunsaga" is the physical manifestation of the soul within this monster.
  ** According to the [[Master Guide 6 card storylines]] and the lore in the ''[[Yu-Gi-Oh! Master Duel]]'' video game, this monster was a samurai who studied various swordsmanship styles and exorcism to develop the "[[Shiranui]]" style method in order to combat the "[[Mayakashi]]" monsters along with other like-minded people, while he was still alive. He was eventually overwhelmed and his spirit was trapped in his sword.
  * This card is the first [[FIRE]] [[Zombie]] [[Tuner monster]].
  * This card and "[[Blackwing - Vayu the Emblem of Honor]]" are the only Tuner monsters that can [[Synchro Summon]] [[Synchro Monster]]s from the [[Extra Deck]] while they are in the [[Graveyard]].
