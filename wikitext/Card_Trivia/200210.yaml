title: Card Trivia:Hieratic Seal of the Dragon King
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Hieratic Seal of Creation]]" and "[[Hieratic Seal of the Heavenly Spheres]]".
  * This card is the sealed form of "[[Hieratic Dragon King of Atum]]".
  * This card is the first and currently only "[[Hieratic]]" [[Gemini monster]].
  * This card is the first [[Gemini monster]] with 0 [[ATK]] and [[DEF]].
