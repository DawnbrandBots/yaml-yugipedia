title: Card Trivia:Darkness Jointech Tyrant
wikitext: |-
  {{Navigation}}

  * This monster is the true form of "[[Jointech Nesstrydar Tank]]".
  ** This monster's name is an [[wikipedia:Anagram|anagram]] of "Jointech Nesstrydar Tank".
  *** This is reflected in this monster's effect, which allows it to treat itself as "Jointech Nesstrydar Tank", facilitating the [[Fusion Summon]]ing of "[[Jointech Tridynabase]]".
  * This monster has a younger [[counterpart]]: "[[Jointech Baby Tyrant]]".
