title: Card Trivia:Ignition Beast Volcannon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Extra Fusion]]" and "[[Fusion Charge]]".
  * This monster is similar to "[[Blaze Fenix, the Burning Bombardment Bird]]".
  ** Both monsters require a [[Machine]] and [[Pyro]] monster as [[Fusion Material]]s.
  ** Both monsters feature an effect that inflicts [[effect damage]].
  ** Both monsters are used by [[Greiger (manga)|Greiger]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|009|ref}}, specifically from the panel showing [[Ignition Beast Volcanon (manga)|this monster]] being Summoned.
