title: Card Trivia:Marauding Captain
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Custom Pack 01]]''.
  * This monster appears in the artworks of "[[Advance]]", "[[Assault on GHQ]]", "[[Back-Up Rider]]", "[[Baton of the Hero]]", "[[Battle-Scarred]]", "[[Common Sacrifice]]", "[[Counterattack Beacon]]", "[[Dimensional Barrier]]", "[[Double Attack]]", "[[First-Aid Squad]]", " [[Link Hole]]", "[[Memory of an Adversary]]", "[[My Body as a Shield]]", "[[Oath of Companionship]]", "[[Pestilence]]", "[[Prepare to Strike Back]]", " [[Reinforcement of the Army]]", "[[Reinforcement of the Army's Troops]]", " [[Resonance Device]]", "[[Staunch Defender]]", " [[Subspace Battle]]", "[[The Warrior Returning Alive]]", "[[Trumpet Charge]]", "[[Two-Man Cell Battle]]", "[[Tyrant's Temper]]", "[[Unified Front]]", and "[[Warrior's Devotion]]".
  * This monster has two [[counterpart]]s: "[[Marmiting Captain]]" and "[[Motivating Captain]]".
  * This monster is normally depicted along with "[[Gagagigo]]" in card artworks, fighting an unseen enemy together as part of [[Gigo|the latter's storyline]]; this enemy is revealed to be "[[Invader of Darkness]]" in some card artworks.
  ** This monster has also fought "[[Despair from the Dark]]" (as seen in the artwork of "Staunch Defender"), "[[Terrorking Archfiend]]" ("Battle-Scarred", "Counterattack Beacon", and "Subspace Battle"), "[[Inpachi]]" ("Double Attack"), "[[Blazing Inpachi]]" ("Two-Man Cell Battle"), "[[Goblin Attack Force]]" ("Assault on GHQ"), and "[[Reign-Beaux, Overlord of Dark World]]" ("Common Sacrifice").
  *** This monster's left eye was likely scarred after the events depicted in the artwork of "Battle-Scarred".
  *** In the artwork of "The Warrior Returning Alive", this monster is depicted with only one sword; the artwork of "Battle-Scarred" depicts one of this monster's swords being shattered.
  * This monster's pose is mimicked by one of the "[[Goblin]]" monsters of "[[Goblin Marauding Squad]]".
  * The ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' card "[[Goblin Digging Captain]]" is based on this monster and "[[Goblin Pothole Squad]]".
  ** The front Goblin's pose is based on this monster's pose from the artwork of "The Warrior Returning Alive".
  * This is one of the few cards to appear in every ''[[Yu-Gi-Oh!]]'' [[NAS]] anime series, along with "[[Mirror Force]]".
