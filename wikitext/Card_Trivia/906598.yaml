title: Card Trivia:Trias Hierarchia
wikitext: |-
  {{Navigation}}

  * "Trias Hierarchia" roughly means "a hierarchy of three" in [[wikipedia:Latin|Latin]], likely a reference to this card's effect.
  * This monster bears some resemblance to [https://finalfantasy.fandom.com/wiki/Ultima_(Final_Fantasy_XII_boss) Ultima], an enemy from [[wikipedia:Square Enix|Square Enix]]'s [[wikipedia:Final Fantasy XII|Final Fantasy XII]].
