  * "[[Witchcrafter Haine]]", "[[Witchcrafter Madame Verre]]" and the disappearing hat of "[[Witchcrafter Madame Rilliona]]" appear in this card's artwork.
  ** This card's artwork appears to depict "Madame Rilliona" reverting back to "Madame Verre".
