title: Card Trivia:Ursarctic Drytron
wikitext: |-
  {{Navigation}}

  * "[[Ultimate Flagship Ursatron]]", "[[Ursarctic Polari]]", and "[[Drytron Alpha Thuban]]" appear in this card's artwork.
  * The kanji 「{{Ruby|天斗輝巧極|ベアルクティ・ドライトロン}}」 (''Tentokikōkyoku'', read as ''Bearukuti Doraitoron'', "Bearcti Drytron") in this card's Japanese name can be translated as "Celestial Dipper Bright Machine Polar".
  * This card's effect to [[Special Summon]] "[[Ultimate Flagship Ursatron]]" by [[banish]]ing either "[[Ursarctic Big Dipper]]" or "[[Drytron Fafnir]]" from the [[Deck]] if "[[Ursarctic Polari]]" or "[[Drytron Alpha Thuban]]" is on the field is a reference to the fact that [[wikipedia:Thuban|Thuban]] was the [[wikipedia:Pole star|polar star]] from the 4th to 2nd millennium BCE, while in modern days it is now [[wikipedia:Polaris|Polaris]].
  * This card's effect emulates "Fusing" two [[Spell Card]]s together.
