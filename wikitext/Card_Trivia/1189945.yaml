title: Card Trivia:Wollow, Founder of the Drudge Dragons
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of "[[Officiator of Doom Samuel]]".
  ** Both are [[Xyz Monster]]s that were released in the ''[[TCG]]'' as [[Core Booster]] [[Super Rare]]s.
  ** Both share the same [[Attribute]] ([[DARK]]), [[Rank]] (6), and [[Type]] ([[Zombie]]), as well as the same combined [[original ATK and DEF]] (3700).
  ** Both have similar designs, almost identical heads, opposite colors, and mirrored poses.
