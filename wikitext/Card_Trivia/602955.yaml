title: Card Trivia:Trickstar Magical Laurel
wikitext: |-
  {{Navigation}}

  * This card depicts a [[wikipedia:Laurel wreath|laurel wreath]], a ring or horseshoe shape of branches and leaves (traditionally of the [[wikipedia:Laurus nobilis|bay laurel]], hence the name). Its ''TCG'' names are based on this.
  ** This card's Japanese name references the "corolla" instead, the structure made up by a flower's petals. It can be likened to a crown, which wreaths are used as.
