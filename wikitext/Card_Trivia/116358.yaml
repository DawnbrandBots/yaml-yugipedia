title: Card Trivia:Meteor Flare
wikitext: |-
  {{Navigation}}

  * This card's artwork is similar to the artworks of "[[Burgeoning Whirlflame]]" and "[[Dromi the Sacred Shackles]]".
  ** The 3 flames moving to the center in the artwork of this card are also akin to the spinning pattern on the artwork of "[[Negate Attack]]".
  * This card has the same [[Life Point]] limit as "[[Meteor of Destruction]]" albeit the ''opponent'' is required to have more than 3000 [[LP]].
  * This is the only [[Trap Card]] that allows it to be added to the owner's hand from the [[Graveyard]] instead of drawing during the [[Draw Phase]].
