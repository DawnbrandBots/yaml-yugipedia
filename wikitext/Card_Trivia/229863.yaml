title: Card Trivia:Gimmick Puppet Egg Head
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Mansion of the Dreadful Dolls]]".
  * This monster resembles the English nursery rhyme character, [[wikipedia:Humpty Dumpty|Humpty Dumpty]], who is typically portrayed as an anthropomorphic egg.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect that requires a "Gimmick Puppet" monster to be [[discard]]ed is based on its appearance in {{episode|ZEXAL|042|ref}} where its damaging effect was [[activate]]d by discarding "[[Gimmick Puppet Dreary Doll (anime)|Gimmick Puppet Dreary Doll]]".
  ** This monster's ''OCG''/''TCG'' effect to change its [[Level]] to 8 is based on "[[Level Doubler]]", a [[Spell Card]] used by [[Quattro]] in the same episode where he discarded a second copy of "Gimmick Puppet Dreary Doll" to double this monster's Level.
