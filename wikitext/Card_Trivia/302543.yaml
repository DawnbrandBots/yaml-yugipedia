title: Card Trivia:Ergosphere
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Schwarzschild Limit Dragon]]" appears in this card's artwork.
  ** This card's artwork depicts "Schwarzschild Limit Dragon" devouring its own tail in a manner resembling the [[wikipedia:Ouroboros|ouroboros]].
  * This card is named after an [[wikipedia:Ergosphere|ergosphere]], the region around a [[wikipedia:Black hole|black hole]] in which matter starts to be sucked in.
  ** This is further reinforced by this card's effect supporting "Schwarzschild Limit Dragon", which is named after the [[wikipedia:Schwarzschild radius|Schwarzschild radius]], another term related to a black hole.
