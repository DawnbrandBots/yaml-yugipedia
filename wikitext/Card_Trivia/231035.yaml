title: Card Trivia:Dice-nied
wikitext: |-
  {{Navigation}}

  [[File:ZTV_Director_die_splits_in_two.png|thumb|right|150px|The die rolled by the [[ZTV director]] is revealed to have split in two, with the two results being 1 and 6.]]

  * "[[Terrorking Archfiend]]" and "[[Snipe Hunter]]" appear in this card's artwork.
  ** Both monsters feature [[die roll]] effects, which are hindered by the results of the broken die.
  ** The events of this card's artwork are followed by the events depicted in the artwork of "[[Diceversity]]", and are somehow connected with the events depicted in the artwork of "[[That Six]]".

  * The card's Japanese name is a pun on the Japanese words 「出目」 (''deme'', "dice-roll outcome") and 「駄目出し」 (''damedashi'', "judging someone (negatively) and urging them to improve").
  ** This card's ''[[TCG]]'' name is a portmanteau of the words "dice" and "denied", which reflects this card's effect to "deny" the opponent from [[Special Summon]]ing monsters with a Level from either 1 through 6, depending on the result.
  * The split die in this card's artwork references a scene from {{chapter|Yu-Gi-Oh!|002|ref}} where the [[ZTV director]] throws a die at [[Dark Yugi (manga)|Dark Yugi]], who uses the tip of his [[Millennium Puzzle (manga)|Millennium Puzzle]] to defend himself, causing the die to split in two with the 1 and 6 sides of the die as results.
