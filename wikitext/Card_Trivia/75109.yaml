title: Card Trivia:Dark Eruption
wikitext: |-
  {{Navigation}}

  * "[[Skull Servant]]" appears in this card's artwork.
  * This card has a very similar background to "[[Zombie Master]]".
  * This card's effect is similar to "[[Salvage]]", "[[Recycling Batteries]]" and "[[Recurring Nightmare]]".
  * The events depicted in this card's artwork appear to take place directly after "[[Graceful Revival]]", as "Skull Servant" is being carried away by angels.
