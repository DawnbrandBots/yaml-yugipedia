title: Card Trivia:Turbo Warrior
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectible Tins 2008 Wave 2]]''.
  * This monster appears in the artwork of "[[Synchro Emergency]]".
  * The shape of this monster's hood on its head resembles a [[wikipedia:Pompadour (hairstyle)|pompadour]], a hairstyle that is worn stereotypically by gang members and thugs in modern [[wikipedia:Japanese popular culture|Japanese popular culture]].
  * This monster has a red color scheme while its corresponding [[Tuner monster]], "[[Turbo Synchron]]", has a green color scheme. Similarly, "[[Nitro Warrior]]" has a green color scheme while its corresponding Tuner monster, "[[Nitro Synchron]]", has a red color scheme.
  * This is the only [[Synchro Monster]] that cannot be [[equip]]ped to the "[[Meklord Emperor]]" monsters, as this monster's effects prevents the opponent's [[Level 6]] or lower monsters from [[target]]ing it with effects, while the "Meklord Emperor" monsters are [[Level 1]] monsters that must target a Synchro Monster in order to equip it to them. Despite this, this card was never used against the "Meklord Emperor" monsters in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
