title: Card Trivia:Mirror Stage of Discipline
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Tamagushi the Righteous]]" appears in this card's artwork.
  ** This card's artwork depicts "Tamagushi" with its ''[[wikipedia:Hakama|hakama]]'' shortened (which occurs when its [[ATK]] becomes 0 via its effect) while the reflections in the mirrors depict "Tamagushi's" ''hakama'' restored to its full length (reflecting this card's effect to restore its [[original ATK]]). Fittingly, this instance occurs in {{episode|ZEXAL|077|ref}}.
