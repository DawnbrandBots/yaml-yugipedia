title: Card Trivia:Doll Monster Bear-Bear, Re-Customized
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Kumacchi", features the honorific "-chi", which is used to describe someone or something in a "cuter" way.
  * This monster is the [[Card evolutions|re-customized]] form of "[[Doll Monster Bear-Bear, Customized]]".
  ** Visually, this monster is "[[Doll Monster Bear-Bear]]" with the leg and muzzle of "[[Doll Monster Mr. Dragon]]" sewn into its head and right torso, respectively, and the arm of "[[Doll Monster Rob Robot]]" attached to its left shoulder.
