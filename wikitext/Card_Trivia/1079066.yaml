title: Card Trivia:Speedroid Wing Synchron
wikitext: |-
  {{Navigation}}

  * Visually, this monster is based on "[[Clear Wing Synchro Dragon]]".
  ** This monster's [[original ATK and DEF]] (1500/1000) are each 1000 less than those of "Clear Wing Synchro Dragon" (2500/2000).
  * This is the first "[[Speedroid]]" "[[Synchron]]" monster.
  * This monster is similar to "[[Stardust Synchron]]":
  ** Both monsters highly resemble the signature [[Dragon]] monsters of their respective users ("Clear Wing Synchro Dragon" for [[Yugo]], and "[[Stardust Dragon]]" for [[Yusei Fudo]]).
  ** Both monsters' original ATK and DEF (1500/1000) are each 1000 less than those of the monsters they are visually based on.
