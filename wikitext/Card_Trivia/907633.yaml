title: Card Trivia:One by One
wikitext: |-
  {{Navigation}}

  * "[[Sinister Serpent]]", "[[Pot of Greed]]", and "[[Spirit of the Pot of Greed]]" appear in this card's artwork.
  ** This card's artwork possibly references "[[Goblin Circus]]", whose artwork also features "Sinister Serpent" emerging from "Pot of Greed".
  * This card's name, artwork, and effect are a reference to those of "[[One for One]]".
