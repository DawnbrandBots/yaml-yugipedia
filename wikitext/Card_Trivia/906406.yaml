title: Card Trivia:Tri-Brigade Mercourier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded in High Spirits]]", "[[Ecclesia the Exiled]]", "[[Springans Booty]]", "[[Springans Interluder]]", "[[Springans Watch]]", "[[New Frontier]]", "[[Tri-Brigade Arms Bucephalus II]]", "[[Tri-Brigade (card)|Tri-Brigade]]", "[[Tri-Brigade Showdown]]", "[[Tri-Brigade Oath]]", "[[Tri-Brigade Rendezvous]]", and "[[Tri-Brigade Shuraig the Ominous Omen]]".
  * In concept art, this monster is referred to as "mecha-[[wikipedia:shrike|shrike]]".
  * In {{episode|CARD GAME THE CHRONICLES|5|ref}}, this is shown to be a "[[Tri-Brigade]]" communication device, probably inspired by [[wikipedia:Homing pigeon|homing pigeons]].
