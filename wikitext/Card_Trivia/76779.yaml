title: Card Trivia:Scab Scar Knight
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster appears in the artworks of "[[Scab Blast]]" and "[[Scab Scream]]".
  * This monster's name and effect to prevent itself from being [[destroyed by battle]] is based on a [[wikipedia:Scab|scab]], the dry protective crust that forms over a cut or wound during the healing process.
  ** This monster's effect to distribute [[Scab Counter]]s on the opponent's monster is based on the verbal definition of a scab, which encrusts the opponent's monsters with scabs of this monster's armor, as seen in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This monster resembles the [[wikia:w:c:evangelion:Evangelion Unit-01|Evangelion Unit-01]] from the Japanese mecha anime series, ''[[wikipedia:Neon Genesis Evangelion|Neon Genesis Evangelion]]''.
