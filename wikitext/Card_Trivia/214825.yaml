title: Card Trivia:Silver Sentinel
wikitext: |-
  {{Navigation}}

  * This monster has an [[Card evolutions|upgraded]] form, "[[Sunlit Sentinel]]", as supported by the following:
  ** They both wear the same damaged blue [[wikipedia:Ushanka|ushanka]].
  ** They both have effects that can [[Set]] themselves as [[Spell Card]]s in the [[Spell & Trap Zone]], and can Special Summon themselves from the Graveyard to destroy an opponent's card(s).
  ** Their Japanese names only differ by 1 syllable:
  *** 白'''銀'''のスナイパー (''Haku'''gin''' no Sunaipā'', lit. "Snow-Silver Sniper"), localized as "Silver Sentinel".
  *** 白'''昼'''のスナイパー (''Haku'''chū''' no Sunaipā'', lit. "Midday Sniper"), localized as "Sunlit Sentinel".
  * This card's effect reflects its sniper motifs: it can "hide" as a face-down Spell Card in the Spell & Trap Zone, only "emerging" when it is destroyed and destroying an opponent's card in turn after it [[Special Summon]]s itself.
  * Before the advent of "[[Artifact]]" monsters in ''[[Primal Origin]]'', this card and "[[Toy Magician]]" were the only monsters that could Set themselves to the Spell & Trap Zone as a Spell Card, with "Toy Magician" predating this card's release by more than 6 years.
