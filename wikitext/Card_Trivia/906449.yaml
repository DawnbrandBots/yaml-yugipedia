title: Card Trivia:Springans Ship - Exblowrer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded in High Spirits]]", "[[Great Sand Sea - Gold Golgonda]]", "[[Springans Blast!]]", and "[[Tri-Brigade Kitt]]".
  * This monster's name is a portmanteau of "Explorer" (referencing how the "[[Springans]]" monsters travel around "Great Sand Sea - Gold Golgonda") and "Blow" (referencing the "Springans'" explosive theme).
  * "[[Springans Captain Sargas]]" has an upgraded [[Xyz Monster|Xyz]] form combined with this monster and "[[Therion "King" Regulus]]": "[[Gigantic "Champion" Sargas]]".
  * This card's effect works like how a cannon fire its shell, it will damage the target as well as the area around the target.
