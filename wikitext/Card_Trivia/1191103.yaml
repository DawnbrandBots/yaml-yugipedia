title: Card Trivia:Foolish Graverobber
wikitext: |-
  {{Navigation}}

  * The character from the artwork of "[[Graverobber]]" and the card "[[Foolish Burial]]" appears in this card's artwork.
  ** This card's artwork depicts the character from "Graverobber" carrying the cross-shaped gravestone depicted in the artwork of "Foolish Burial" instead of the usual gravestone depicted in its respective card artwork.
  * This card is a [[retrained]] [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart of "[[Graverobber]]".
  ** This card is a reference to a scene during [[Katsuya Jonouchi and Rishid's Duel (manga)|Katsuya Jonouchi and Rishid's Duel]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] (and its [[Yu-Gi-Oh! (anime)|anime]] [[Joey Wheeler and Odion's Duel|adaptation]]), in which [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] ([[Joey Wheeler]] in the anime) uses "[[Foolish Burial (manga)|Foolish Burial]]" (and its [[Foolish Burial (anime)|anime counterpart]]) to [[send]] "[[Jinzo (manga)|Jinzo]]" (and its [[Jinzo (anime)|anime counterpart]]) to [[Rishid (manga)|Rishid's]] [[Graveyard]] ([[Odion]] in the anime), and then uses "[[Graverobber (manga)|Graverobber]]" (and its [[Graverobber (anime)|anime counterpart]]) to [[Special Summon]] it from Rishid's Graveyard to his own [[field]]. Fittingly, this card's effect can recreate this scene by sending "[[Jinzo - Energy Shocker]]" to the player's Graveyard and then Special Summon it from either Graveyard.
