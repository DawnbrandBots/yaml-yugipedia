title: Card Trivia:Beast Machine King Barbaros Ür
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a combination of "[[Beast King Barbaros]]" and "[[Machine Lord Ür]]".
  ** In the ''[[Yu-Gi-Oh! R]]'' manga, this monster was a [[Fusion Monster|Fusion]] of "[[Beast King Barbaros (manga)|Beast King Barbaros]]" and "[[Machine Lord Ür (manga)|Machine Lord Ür]]".
  ** This monster's name is a combination of the names of its two [[Fusion Material]]s in the manga; however, its name has the furigana ''Uru'' ({{Ruby|Ｕｒ|ウル}}, "Ür"), while the Japanese name of "Machine Lord Ür" uses the katakana ''Uru'' (ウル, "Ür").
  * This monster is tied with "[[Lunalight Liger Dancer]]" for the highest [[original ATK]] (3800) of all [[Beast-Warrior]] monsters.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|R|044|ref}}, specifically from the panel showing [[Beast Machine King Barbaros Ür (manga)|this monster]] being Summoned.
