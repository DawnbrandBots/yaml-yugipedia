title: Card Trivia:Arcana Reading
wikitext: |-
  {{Navigation}}

  * The arm of [[Sartorius]] and the [[Arcana Force Tarot readings|Tarot cards]] he used in the ''[[Yu-Gi-Oh! GX]]'' anime appear in this card's artwork.
  ** The sickly white aura emanating from the Tarot card Sartorius is holding in this card's artwork is also a reference to the aura of the [[The Light of Destruction|Light of Destruction]] in the anime.
