title: Card Trivia:Evil HERO Lightning Golem
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Evil HERO]]" [[counterpart]] of "[[Elemental HERO Thunder Giant]]".
  ** Both have the same [[Attribute]] ([[LIGHT]]), [[Level]] (6), [[original ATK and DEF]] (2400/1600), and an effect that [[destroy]]s an opponent's monster.
  ** Of the four "Evil HERO" [[Fusion Monster]]s that are counterpart of an "[[Elemental HERO]]" monster, this is the only one without an additional effect.
