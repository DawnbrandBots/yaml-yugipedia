title: Card Trivia:Hand of Nephthys
wikitext: |-
  {{Navigation}}

  * Visually, this monster appears to be a younger version of "[[Matriarch of Nephthys]]", as they both have the same clothing (to a certain extent) and same-colored hair.
  ** They also have the same headress, although "Matriarch of Nephthys" has hers by her waist.
  * This monster has "[[A Feather of the Phoenix]]" in her headdress.
