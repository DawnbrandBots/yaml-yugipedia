title: Card Trivia:Red-Eyes Dark Dragoon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Dark Magician]]" [[Fusion Monster|fused]] with "[[Red-Eyes Black Dragon]]".
  ** This is likely a reference to the friendship between the owners of "[[Dark Magician (anime)|Dark Magician]]" and "[[Red-Eyes Black Dragon (anime)|Red-Eyes Black Dragon]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]: [[Yami Yugi]]/[[Yugi Muto]] and [[Joey Wheeler]], respectively.
  ** The teeth on this monster's staff resemble those of "[[Red-Eyes Black Dragon Sword]]", another Fusion Monster that requires "Red-Eyes Black Dragon" as [[Fusion Material]].
  * This card can be considered a [[counterpart]] of "[[Dark Paladin]]".
  ** Both have an effect to allow the player to [[discard]] a card to negate a card effect(s).
  ** Both have an effect to gain [[ATK]].
  ** Both monsters have similar armors and weapons.
  ** Both have mirrored poses in their card artworks.
