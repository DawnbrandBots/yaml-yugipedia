title: Card Trivia:Torpedo Fish
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Big Wave Small Wave]]", "[[Fish Rain]]", "[[Ghost Salvage]]", and "[[Orca Mega-Fortress of Darkness]]".
  * This card's Japanese pronunciation (魚雷魚 ''Gyoraigyo'') is a joke on the Japanese word for "torpedo" (魚雷 ''Gyorai''), which also translates to "fish lightning".
