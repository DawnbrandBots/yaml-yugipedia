title: Card Trivia:Predaplant Dragostapelia
wikitext: |-
  {{Navigation}}

  * This monster is a combination of the ''[[wikipedia:Stapelia|Stapelia]]'' plant and the [[wikipedia:Dragon|dragon]].
  * This monster has an [[Card evolutions|upgraded]] form: "[[Predaplant Triphyoverutum]]".
  * This monster resembles "[[Greedy Venom Fusion Dragon]]";
  ** Both have serpentine bodies and flower-like bulbs on the tip of their wings with thorns.
  ** Both can be [[Summon]]ed using "[[Starving Venom Fusion Dragon]]" as a [[Fusion Material]].
  ** This monster also has 100 less [[ATK]] and [[DEF]] than "Starving Venom Fusion Dragon".
