title: Card Trivia:Odd-Eyes Advent
wikitext: |-
  {{Navigation}}

  * The designs of the altars on this card resemble the weapons of "[[Timegazer Magician]]" and "[[Stargazer Magician]]" with their flames colored red and blue, referencing the [[Pendulum Scale]]s and the eye colors of "[[Odd-Eyes Gravity Dragon]]" which can be summoned by the card.
  * This is the first [[Ritual Spell Card]] card that Summon monsters based on their [[Type]].
  * This card's theme is reminiscent of "[[Hymn of Light]]" and "[[Sprite's Blessing]]", also featuring what appears to be a place of worship of some kind.
