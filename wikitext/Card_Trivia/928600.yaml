title: Card Trivia:Jurassic Power
wikitext: |-
  {{Navigation}}

  * "[[Sword Arm of Dragon]]" and "[[Two-Headed King Rex]]" appear in this card's artwork.
  * This card's effect allowing the player to [[Normal Summon]] [[Level 5]] or higher [[Dinosaur]] monsters without [[Tribute|Tributing]] monsters references the Standard rules of ''[[Duel Monsters]]'' during the [[Duelist Kingdom (arc)|Duelist Kingdom]] arc in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], which allowed players to Normal Summon high-[[Level]] monsters without Tributing monsters.
