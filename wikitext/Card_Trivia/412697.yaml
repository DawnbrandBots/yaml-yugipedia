title: Card Trivia:Windwitch - Crystal Bell
wikitext: |-
  {{Navigation}}

  * This monster is the [[Fusion Parasite (anime)|corrupted]] [[Fusion Monster|Fusion]] [[Card evolutions|upgraded]] form of "[[Windwitch - Winter Bell]]".
  * This monster has a [[Synchro Monster|Synchro]] counterpart: "[[Windwitch - Diamond Bell]]".
  ** Fittingly, both monsters' poses are mirrored, where this monster is depicted facing right at a downward angle while "Diamond Bell" is depicted facing left at an upward angle.
  * This monster can be seen as an opposite and fake counterpart of "[[Crystal Wing Synchro Dragon]]", due to their naming theme, their [[card type]] ([[Fusion Monster]]s were used by the antagonist [[Duel Academy (ARC-V)|Duel Academy]] and their associates in the ''[[Yu-Gi-Oh! ARC-V]]'' anime), as well as this card being used against the latter at one point in the anime. 
  ** In the original Japanese version of {{episode|ARC-V|117|ref}},[[Yugo]] noted this, declaring that he would smash the fake "[[Windwitch - Crystal Bell (anime)|Crystal Bell]]" with his real "[[Crystal Wing Synchro Dragon (anime)|Crystal Wings]]".
  * In the ''Yu-Gi-Oh! ARC-V'' anime, when this monster was [[equip]]ped with "[[Fusion Parasite (anime)|Fusion Parasite]]", the glyph on its body turned red.
