title: Card Trivia:Summon Over
wikitext: |-
  {{Navigation}}

  * "[[Summon Breaker]]", "[[Summon Limit]]" and a crude version of "[[Dark Magical Circle]]" with six [[counter]]s around it appear in this card's artwork.
  ** This card's artwork reflects its effects and continues the events depicted in the artworks of "Summon Limit" and "Summon Breaker": the summoned dragon attempts to break free from the net of "Summon Limit" with the aid of the devil monster, causing "Summon Breaker" to malfunction, while the angel attempts to reset the breaker.
