title: Card Trivia:Venom Serpent
wikitext: |-
  {{Navigation}}

  * This monster's design featuring two heads and a bifurcated tail reflects its effect; unlike other "[[Venom]]" monsters, this monster can place a [[Venom Counter]] and attack in the same turn.
  ** This monster's two-headed design references how snakes have the highest chance of being born with [[wikipedia:Polycephaly|polycephaly]], a condition in which animals are born with more than one head.
  * This is the only [[Reptile]] "Venom" monster whose [[Attribute]] is not [[EARTH]].
