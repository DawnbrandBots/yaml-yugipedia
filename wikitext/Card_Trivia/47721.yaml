title: Card Trivia:Immortal Homeostasis
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Maha Vailo]]" appears in this card's artwork.
  ** Ironically, "Maha Valio" would gain [[ATK]] through its effect when [[equip]]ped with this card, causing its controller to lose [[Life Point]]s each turn.
  * This card's name is derived from [[wikipedia:Homeostasis|homeostasis]], a systemic property in which all balances of a system– mechanical or biological– are stable and relatively constant. In biological systems, a homeostatic imbalance (such as low sodium, high body temperature, etc.) triggers emotional feedback aimed at restoring the balance (like, respectively, craving salty food or the desire to move to a cooler location).
  ** This card's name as a whole reflects this card's effects, as the equipped monster becomes "immortal" through being indestructible in battle, as long as its ATK remains constant. If the equipped monster's ATK changes, this card would inflict damage to encourage the player to "restore balance".
