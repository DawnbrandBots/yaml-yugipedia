title: Card Trivia:Extox Hydra
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the box of ''[[Battles of Legend: Monstrous Revenge]]''.
  * This card's name "Extox" is the portmanteau of [[Extra Deck]] and [[wikipedia:Toxin|Toxin]]
  ** The monster's five heads correspond to each of the Extra Deck card types, with the heads having colored stripes, eyes, teeth, and emitting breath clouds that all match the color for the borders of each card: purple for [[Fusion Monster]]s, white for [[Synchro Monster]]s, black for [[Xyz Monster]]s, green for [[Pendulum Monster]]s, and blue for [[Link Monster]]s.
