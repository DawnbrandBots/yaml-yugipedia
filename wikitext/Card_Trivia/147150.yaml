title: Card Trivia:TGX3-DX2
wikitext: |-
  {{Navigation}}

  * This card's name its effect to [[shuffle]] three "[[T.G.]]" monsters from the [[Graveyard]] to the [[Deck]] and [[draw]]ing two cards.
  ** "TG" stands for "T.G.", the "X3" represents the three "T.G." monsters to shuffle from the Graveyard, the "D" stands for draw, and the "X2" represents the two cards drawn.
