title: Card Trivia:Parasite Queen
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's design resembles "[[Insect Queen]]".
  ** Both monsters gain ATK based on the number of cards that support them ([[Fusion Parasite]]/Insect monster). In addition, the strategy used by [[Lulu Obsidian]] and [[Celina]] to power up this card in the last turn by swarming the field with 6 copies of "Fusion Parasite" treated as 12 is reminiscing of [[Weevil Underwood]]'s, who powered up his [[Insect Queen]] with 10 "[[Army Ant Token]]"s.
  * This monster appears in the artwork of "[[Parasite Factory]]".
