title: Card Trivia:Legendary Six Samurai - Kizan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[One Day of Peace]]", "[[Shien's Dojo]]", and "[[Six Strike - Triple Impact]]".
  * This monster is the younger version of "[[Grandmaster of the Six Samurai]]", as supported by the [[Master Guide 3 card storylines#Legendary Six Samurai - Kizan|Master Guide 3 card storylines]].
  ** This is also supported by the facts both are [[EARTH]] [[Warrior]] monsters, they both can be [[Special Summon]]ed in similar ways, and this monster's [[original ATK and DEF]] (1800/500) become equal to those of "Grandmaster of the Six Samurai" (2100/800) when its effect is applied.
  * This monster has a [[Synchro Monster|Synchro]] counterpart: "[[Legendary Lord Six Samurai - Kizan]]".
