title: Card Trivia:Familiar-Possessed - Eria
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Awakening of the Possessed]]", "[[Awakening of the Possessed - Gagigobyte]]", and "[[Possessed Partnerships]]".
  * "[[Gagagigo]]" appears in this card's first artwork.
  ** "[[Jigabyte]]" appears in this card's second artwork.
  * This monster is an [[Card evolutions|upgraded]] "[[Familiar-Possessed]]" form of "[[Eria the Water Charmer]]".
  ** While "Eria the Water Charmer" is depicted wielding her staff in her right hand, this monster is depicted holding her staff in her left hand, suggesting she may be [[wikipedia:Ambidexterity|ambidextrous]].
