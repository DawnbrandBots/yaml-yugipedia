title: Card Trivia:Maliss P White Rabbit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Maliss in Underground]]".
  * This monster is based on the [[wikipedia:White Rabbit|White Rabbit]], a character from ''[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]'' who is depicted as a white-furred rabbit wearing a waistcoat and carrying a pocket watch.
  ** This monster also references "[[wikipedia:Ransomware#Bad Rabbit|Bad Rabbit]]", a form of ransomware that targeted large organizations in October 2017, which encrypted the victims' file tables and demanded payment via [[wikipedia:Bitcoin|Bitcoin]] to decrypt.
  * The symbol in the background of this card's artwork is based on the suit of [[wikipedia:Hearts (suit)|Hearts]], referencing the [[wikipedia:Playing card|playing card]] theme of ''Alice's Adventures in Wonderland''.
  * The English letter "P" stands for "pawn", referencing the [[wikipedia:Pawn (chess)|pawn]] piece used in the game of  [[wikipedia:Chess|chess]], which is the theme of ''[[wikipedia:Through the Looking-Glass|Through the Looking-Glass]]''.
