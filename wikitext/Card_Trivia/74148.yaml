title: Card Trivia:Doriado's Blessing
wikitext: |-
  {{Navigation}}

  * "[[Doriado]]" appears in this card's artwork.
  ** The two cards' Japanese names appears to derive from ''dryade'', the French spelling of "dryad". However, [[Dan Scheidegger]] claimed in a [http://www.pojo.biz/board/showthread.php?p=1943645#post1943645 post on Pojo] that it is indeed meant to be "Doriado", that being the monster's given name.
