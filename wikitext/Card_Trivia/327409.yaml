title: Card Trivia:Card Chute
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The card "[[Trap Dustshoot]]" appears in this card's artwork.
  ** This is a pun on this card's name, as the Japanese name of "Trap Dustshoot" is "Dust Chute".
  * This card's Japanese name (カイシュート ''Kaishūto'') is a portmanteau of the Japanese words for "collect" (回復 ''Kaishū'') and "chute" (シュート ''Shūto'') for "chute".
  ** The first portion of this card's Japanese reflects its effect to "collect" or "recover" the first "[[Quiz]]" monster [[target]]ed by its effect.
