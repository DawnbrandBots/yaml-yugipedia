title: Card Trivia:Cameraclops
wikitext: |-
  {{Navigation}}

  * This card's name is a [[wikipedia:Portmanteau|portmanteau]] of "camera" and "cyclops"; this monster has a single camera lens as its "eye".
  ** This card's Japanese name, "Scoop Shooter" (スクープ・シューター ''Sukūpu Shūtā''), can also be seen as a pun: ''Shūtā'' can be meant as in a "photo ''shoot''", and the whole name can be seen as a play on "[[wikipedia:Marksman|sharpshooter]]".
