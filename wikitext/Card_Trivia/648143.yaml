title: Card Trivia:Ikelos, the Dream Mirror Mara
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dream Mirror Hypnagogia]]".
  * The back of "Ikelos, the Dream Mirror Sprite" appear in the mirror in this card's artwork.
  * This monster is named after [[wikipedia:Phobetor|Ikelos]], one of the thousand sons of [[wikipedia:Somnus|Somnus]], the personification of sleep from [[wikipedia:Roman mythology|Roman mythology]], from [[wikipedia:Ovid|Ovid]]'s ''[[wikipedia:Metamorphoses|Metamorphoses]]''.
  ** It is also named after a [[wikipedia:Mare (folklore)|mare]] (''mara'' in [[wikipedia:Old High German|Old High German]] and [[wikipedia:Old Norse|Old Norse]]), a malicious entity in [[wikipedia:Germanic folklore|Germanic]] and [[wikipedia:Slavic folklore|Slavic]] [[wikipedia:Folklore|folklore]] that rides on people's chests while they sleep, bringing on bad dreams (or [[wikipedia:Nightmare|nightmares]]).
  * This monster has a [[LIGHT]] [[counterpart]]: "[[Ikelos, the Dream Mirror Sprite]]".
  ** Both have the same [[Level]] (1) and [[Type]] ([[Fairy]]), but opposite [[Attribute]]s and [[ATK]]/[[DEF]].
