title: Card Trivia:The Phantom Knights of Shadow Veil
wikitext: |-
  {{Navigation}}

  * This card has a [[retrained]] counterpart: "[[The Phantom Knights of Umbrage Veil]]".
  * This is the first [[Spell Monster]] from the anime to be released in the ''[[OCG]]''/''[[TCG]]'', though it became a [[Trap Monster]] upon release.
  * This is the first Trap Monster released that does not simultaneously treat itself as a [[Trap Card]].
  * This is the first non-[[Monster Card]] that can [[Special Summon]] itself from the [[Graveyard]].
