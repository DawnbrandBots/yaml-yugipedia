title: Card Trivia:Full-Speed Penetrate
wikitext: |-
  {{Navigation|mode=nongame}}

  * A [[Praime]] [[counterpart]] of "[[Speed Intruder]]" appears in this card's artwork.
  * This card's name is a reference to a [[wikipedia:Penetrator (aircraft)|penetrator]], a military aircraft designed to intrude against and penetrate enemy defenses, which reflects the appearance of the Praime counterpart of "Speed Intruder" in this card's artwork, and its effect to "penetrate" the opponent's defenses and inflict [[piercing]] [[battle damage]].
