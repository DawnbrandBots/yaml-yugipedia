title: Card Trivia:Altergeist Kunquery
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Kuntilanak|Kuntilanak]]" and "query".
  ** Kuntilanak is a mythological female spirit in the cultures of Indonesia, Malaysia and Singapore that takes the form of a pregnant woman unable to give birth to a child.
  *** Despite this, this monster is based on the [[wikipedia:Centaurides|centaurides]], the female equivalent of the half-human, half-horse [[wikipedia:Centaur|centaur]] in [[wikipedia:Greek mythology|Greek mythology]].
  ** "Query" is based on the [[wikipedia:Query language|query computer languages]] used to make queries in databases and information systems.
