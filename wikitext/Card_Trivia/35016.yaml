title: Card Trivia:Kunoichi
wikitext: |-
  {{Navigation}}

  * "Kunoichi" is the Japanese word for "female ninja".
  ** This card's Japanese name writes "Kunoichi" in a very peculiar way: "Ku" is written in Hiragana, "no" is written in Katakana, and "ichi" is written in Kanji.
  * The sunglasses worn by the monster in this card's artwork are a reference to the anime ''[[wikipedia:Tengen Toppa Gurren Lagann|Tengen Toppa Gurren Lagann]]'', which had a game for the Nintendo DS developed and published by [[Konami]] at the time of this card's release.
