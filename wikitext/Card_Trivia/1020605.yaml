title: Card Trivia:Winged Kuriboh LV6
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded "[[LV]]" form of "[[Winged Kuriboh]]".
  ** This monster's [[Summoning condition]] and [[effect]] are based on those of "[[Winged Kuriboh LV10]]".
  * This monster's armor and wings are based on those of "[[Elemental HERO Flame Wingman]]".
  ** This monster's [[Level]] (6) and its destructive and damaging [[Quick Effect]] are based on those of "Flame Wingman's".
  ** This monster's [[archetype condition]] treating it as a "[[Favorite]]" monster is based on how [[Jaden Yuki]] frequently calls "Flame Wingman" his "favorite" card in the ''[[Yu-Gi-Oh! GX]]'' anime.
  *** The above-mentioned fact also references how "Winged Kuriboh" was Jaden's main [[Spirit Partner]] in the ''Yu-Gi-Oh! GX'' anime and [[Yu-Gi-Oh! GX (manga)|manga]].
  * This is the first [[Fairy]] "[[HERO]]" monster.
  * This monster is part of six different [[archetype]]s ("[[Winged Kuriboh]]", "[[Kuriboh]]", "[[LV]]", "[[Elemental HERO]]", "[[HERO]]", and "[[Favorite]]"). This is more usable archetypes than any other card in the game.
  ** Some monsters are members of more than six archetypes, but no more than five of them are usable. "[[Number C39: Utopia Ray]]" (and all "[[Number C39]]" monsters), "[[Number C62: Neo Galaxy-Eyes Prime Photon Dragon]]", and "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]" are each members of seven archetypes, but their membership in the "[[Number (Spell/Trap archetype)|Number]]" ([[Spell]]/[[Trap]] archetype) and "[[Chaos]]" archetypes have no functional effect as the support for those archetypes is exclusively for Spell/Trap Cards (outside of the [[field]]) and [[Synchro Monster|Synchro]] or [[Ritual Monster]]s, respectively, so they are effectively only members of 5 archetypes each.
