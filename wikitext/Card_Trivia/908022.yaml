title: Card Trivia:Swordsoul Strategist Longyuan
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Swordsoul Blackout]]" and "[[Icejade Erosion]]" (wielding the sword of "[[Swordsoul of Mo Ye]]").
  * This monster is based on [[wikipedia:zh:龍泉劍|Longyuan]] (which roughly translates as "Dragon Gulf") which was a legendary sword created by the legendary sword-makers of [[wikipedia:Spring and Autumn period|Ancient China]], [[wikipedia:Ou Yezi|Ou Yezi]] and [[wikipedia:Gan Jiang and Mo Ye|Gan Jiang]]. The sword, which, according to legend, was made bringing stream water from Cishan Mountain to the seven ponds around the sword-making fireplace (which were said to resemble the Big Dipper) and looked ethereal and profound as if you were looking at a gulf or valley where a dragon lived (hence the name), was gifted to [[wikipedia:Goujian|King Goujian]] of the ancient State of [[wikipedia:Yue (state)|Yue]].
  ** Fittingly, this monster has dragon-like features such as a scaled tail and claws adorning his armor.
  ** The sword (Qixing) Longyuan is said to represent integrity.
  *** ironically, this monster betrayed the "[[Swordsoul]]s".
  * This card has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form: "[[Swordsoul Sinister Sovereign - Qixing Longyuan]]".
  ** It is this monster after accepting the secret deal with the "[[Despia]]s" and betraying the "[[Swordsoul]]s", as seen in "[[Swordsoul Blackout]]" and "[[Swordsoul Strife]]".
  ** This monster may have also taken the sword of "[[Swordsoul of Mo Ye]]" (which has 1700 [[ATK]]) before turning into "Qixing Longyuan".
  *** This is supported by "Qixing Longyuan" having 1700 more ATK than this card, despite having the same [[DEF]].
  *** The artwork of "Icejade Erosion" also depicts "Longyuan" wielding two swords, his own and "Mo Ye's" one.
  * This card's effect to inflict 1200 [[effect damage]] is a reference to its ATK.
