title: Card Trivia:Veda Kalanta
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Loka Samsara]]", "[[Realm Elegy]]", and "[[Realm Eulogy]]".
  * This monster has an upgraded [[Pendulum Monster|Pendulum]] form: "[[Veda Kalarcanum]]".
  * This monster's name is a reference to the [[wikipedia:Vedas|Vedas]], which are Sanskrit religious texts, and [[wikipedia:Kāla|Kālá]] which means time or death in Sanskrit.
