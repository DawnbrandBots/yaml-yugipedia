title: Card Trivia:Chronomaly Temple - Trilithon
wikitext: |-
  {{Navigation}}

  * This card is based on a [[wikipedia:Trilithon|trilithon]], a structure consisting of two large vertical stones supporting a third stone set horizontally across the top.
  ** Despite its name, this card's artwork actually depicts three carved columns, similar to those found in the [[wikipedia:Ancient Greek temple|temples in Ancient Greece]]. 
  *** However, this card's name, along with the design of the columns with the base underneath and the entablature above, reference the namesake of [[Trey]] (whose Japanese name is written in the Roman numeral "III"), who uses the "[[Chronomaly]]" [[archetype]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
