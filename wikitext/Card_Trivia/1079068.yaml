title: Card Trivia:Speedroid Clear Wing Wonder
wikitext: |-
  {{Navigation}}

  [[File:Clear Wing Burn.png|thumb|right|250|Shot of ''[[Burn!]]'' with [[Yugo]] on the ''[[TK2000PS]]'' with a silhouetted "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]" in the background.]]

  * "[[Hi-Speedroid Clear Wing Rider]]" and the silhouette of "[[Clear Wing Synchro Dragon]]" appear in this card's artwork.
  ** This card's artwork is based on a shot from ''[[Burn!]]'', the second Japanese opening theme of the ''[[Yu-Gi-Oh! ARC-V]]'' anime, showing [[Yugo]] performing a spin with his [[Duel Runner]], the ''[[TK2000PS]]'', in front of the glowing silhouette of "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]" in the background.
  ** This card's artwork also references the "Akira Slide", one of the most famous scenes from the 1988 Japanese animated cyberpunk action film ''[[Wikipedia:Akira (1988 film)|Akira]]''.
  * The English letters "WW" in this card's base Japanese name (ＳＲ／ＣＷＷ) reference the "[[Windwitch]]" [[archetype]] used by [[Rin]], Yugo's close friend in the ''Yu-Gi-Oh! ARC-V'' anime, where the archetype's base Japanese name uses the two English letters "WW".

