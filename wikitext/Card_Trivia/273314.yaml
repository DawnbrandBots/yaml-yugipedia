title: Card Trivia:V Gnome
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card appears in the anime artwork of "[[Vain Betrayer]]".
  * This monster is based on a [[wikipedia:Gnome|gnome]], a mythological spirit representing the elemental spirit of the earth that was introduced by the 16th-century alchemist [[wikipedia:Paracelsus|Paracelsus]].
  * This is one of very few [[Effect Monster]]s in the anime, along with "[[Camouflage Gardna]]", "[[Smile Angel]]", "[[V Sylph]]" and "[[V Undine]]", that has its effect never activated or even mentioned at all.
