title: Card Trivia:Ultimate Flame Swordsman
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2024]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Flame Swordsman]]".
  ** This monster's sword is inscribed with the kanji 「極炎」 (''Kyokuen'', "extreme flame"), referencing its name.
  *** This is also a reference to "Flame Swordsman", as its sword is inscribed with the kanji 「炎」 (''Hōno'', "flame").
