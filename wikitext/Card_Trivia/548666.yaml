title: Card Trivia:World Legacy's Nightmare
wikitext: |-
  {{Navigation}}

  * "[[Beckoned by the World Chalice]]", "[[Knightmare Cerberus]]", "[[Knightmare Goblin]]", "[[Knightmare Gryphon]]", "[[Knightmare Phoenix]]", "[[Knightmare Unicorn]]", "[[Mekk-Knight Avram]]", "[[World Chalice Guardragon]]", and "[[World Legacy - "World Lance"]]", appear in this card's artwork.
  ** This card's artwork depicts the scene right after [[Beckoned by the World Chalice|Ningirsu]] instantly defeats "[[Knightmare Mermaid]]" in one go, drawing the attention of the rest of the Knightmares and allowing Avram to continue pursuing [[Knightmare Corruptor Iblee|Iblee]] in the distance.
  ** The positions of "Knightmare" monster in the artwork is also their standard [[Co-link|co-linked]] formation, with "Phoenix", "Gryphon", "Goblin" and "Cerberus" from left-to-right, and "Unicorn" in the [[Extra Monster Zone]] co-linked with "Gryphon". If "Mermaid" was still alive, it would be co-linked with "Cerberus" and create an [[Extra Link]].
  * This is the first "[[World Legacy]]" [[Field Spell Card]] that does not increase the [[ATK]]/[[DEF]] of the monsters of the [[archetype]] it [[support]]s.
