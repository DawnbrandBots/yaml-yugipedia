title: Card Trivia:Brain Golem
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[fandom:w:c:gradius:Brain Golem|Brain Golem]], an enemy from the ''[[wikipedia:Gradius|Gradius]]'' video game series by [[Konami]].
  ** This monster can negate the effects of [[face-up]] [[LIGHT]] monsters, and it can attack again in a row if it destroys a LIGHT monster by battle. Fittingly, all the [[Konami Arcade Games]] monsters based on ''Gradius'' are LIGHT, which makes them vulnerable to this monster's effects.
