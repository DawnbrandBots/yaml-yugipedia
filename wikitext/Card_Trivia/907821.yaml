title: Card Trivia:Zoroa, the Magistus Conflagrant Calamity
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a combination of "[[Zoroa, the Magistus of Flame]]" and "[[Vahram, the Magistus Divinity Dragon]]".
  ** This card also has the same [[DEF]] and [[Type]] as "Zoroa", the same [[Level]], [[Attribute]] and [[card type]] as "Vahram", and [[ATK]] equal to "Vahram's" [[DEF]].
