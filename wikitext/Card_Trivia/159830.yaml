title: Card Trivia:Nordic Relic Megingjord
wikitext: |-
  {{Navigation}}

  * In Norse mythology, [[wikipedia:megingjörð|megingjörð]] is a belt worn by the god [[Thor, Lord of the Aesir|Thor]]. When worn, the belt is described as doubling Thor's godly strength, hence the first effect of this card.
  ** Interestingly enough, Thor's hammer Mjollnir is named "Divine Relic", while Megingjörð is considered a "Nordic Relic", despite both items being used by the same god.
  ** Both items are also associated with doubling a monster aspect. Megingjörð doubles strength, while Mjollnir doubles the number of attacks a monster can have.
