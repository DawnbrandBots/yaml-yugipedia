title: Card Trivia:Bountiful Artemis
wikitext: |-
  {{Navigation}}

  * In [[wikipedia:Greek mythology|Greek mythology]], [[wikipedia:Artemis|Artemis]] was the goddess of the [[wikipedia:moon|moon]] and [[wikipedia:hunting|hunt]]. People would pray to her for a good hunt, much like how this card grants additional hand advantage with its effect.
  * This monster appears in the artwork of "[[Lumenize]]".
  ** A small, weathered statue of this monster appears in the artwork of "[[Secret Sanctuary of the Spellcasters]]".
