title: Card Trivia:Phoenix Gearblade
wikitext: |-
  {{Navigation}}

  * This card's name is based on "[[Phoenix Gearfried]]", which this card was [[equip]]ped to in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  * This card shares several similarities with "[[Divine Sword - Phoenix Blade]]."
  ** Both cards are [[Equip Spell Card|Equip Spells]] with similar names.
  ** Both cards can give the equipped monster 300 [[ATK]].
  ** Both "Divine Sword - Phoenix Blade" and this card's [[Phoenix Gearblade (anime)|anime counterpart]] can only be equipped to Warrior monsters.
  ** Both cards have an effect that can add themselves from the [[Graveyard]] to the hand.
  ** Both "Divine Sword - Phoenix Blade" and the aforementioned "Phoenix Gearfried" this card is named after were released in the ''[[Warriors' Strike Structure Deck]]''.
