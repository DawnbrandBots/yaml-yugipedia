title: Card Trivia:Armored Cybern
wikitext: |-
  {{Navigation}}

  * This monster's name is a [[wikipedia:Portmanteau|portmanteau]] of the words "cyber" and "wyvern".
  ** This is supported by the fact that the Japanese pronunciation of this monster's name treats the letters "b" and "v" as sounding the same.
  * This monster is likely related to "[[Attachment Cybern]]".
  ** Both monsters feature a similar naming scheme.
  ** Both monsters feature effects that [[equip]] themselves to another monster.
  ** Both monsters [[support]] "[[Cyber Dragon]]", although "Attachment Cybern" does it indirectly via supporting the "[[Cyber]]" archetype.
  * This monster and "[[Des Dendle]]" have the highest [[original DEF]] (2000) of all [[Union monster]]s.
