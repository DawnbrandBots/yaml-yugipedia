title: Card Trivia:Bad Luck Blast
wikitext: |-
  {{Navigation}}

  * This is the first ''[[TCG]]'' card artwork to feature an uncensored spherical bomb.
  * This card is related to "[[Secret Blast]]", as both cards feature the presence of goblins and a bomb in both of their artworks, as well as featuring effects that inflict damage and includes an additional effect that activates when an opponent's card destroys both cards.
