title: Card Trivia:Dragunity Knight - Luin
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragunity Legion]]".
  * This monster is named after [[wikipedia:Lúin of Celtchar|''Lúin'' of Celtchar]], a fiery polearm featured in [[wikipedia:Irish mythology|Irish mythology]].
  * Visually, this monster is "[[Dragunity Senatus]]" riding "[[Dragunity Couse]]" as its mount.
