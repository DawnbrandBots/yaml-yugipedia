title: Card Trivia:Angel of Zera
wikitext: |-
  {{Navigation}}

  * This card is a [[Synchro Monster|Synchro]] version of "[[Archlord Zerato]]".
  ** "[[The Sanctuary in the Sky]]" also appears in both cards' artworks.
  ** This card could be considered what "[[Warrior of Zera]]" would be like before he became the "Archlord".
