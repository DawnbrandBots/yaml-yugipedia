title: Card Trivia:Overlay World
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's artwork depicts six streams of light that occur when a monster is used as [[Xyz Material]], which are colored after the corresponding [[Attribute]]s: [[EARTH]] (represented by the color orange), [[WIND]] (represented by the color green), [[FIRE]] (represented by the color red), [[WATER]] (represented by the color blue), [[LIGHT]] (represented by the color yellow), and [[DARK]] (represented by the color purple).
