title: Card Trivia:King Fog
wikitext: |-
  {{Navigation}}

  * The Italian, Spanish and German names for this card is the same as "[[Fog King]]".
  * This monster's crown was used for the ''[[TCG]]'' artwork of "[[Skelengel]]".
  * This monster remains the only [[Starter Box]] retail exclusive to be reprinted in Japan.
  ** This card was printed in overseas territories along with "[[Kageningen]]".
