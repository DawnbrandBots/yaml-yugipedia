title: Card Trivia:K9-66a Jokul
wikitext: |-
  {{Navigation}}

  * "[["A Case for K9"]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[K9-EW Special Release Experiment]]".
  * This monster is named after ''[[wiktionary:jökull|jökull]]'', the Icelandic word for "glacier". It is also named after "Jack", referring to [[wikipedia:Jack Frost|Jack Frost]], the personification of frost in English folklore.
  * This monster has an upgraded [[Xyz Monster|Xyz]] form combined with "[[K9-66b Lantern]]": "[[K9-66X "Jacks"]]".
