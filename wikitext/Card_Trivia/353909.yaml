title: Card Trivia:Flower Gathering
wikitext: |-
  {{Navigation}}

  * "[[Flower Cardian Paulownia]]", "[[Flower Cardian Pine]]", "[[Flower Cardian Willow]]", and "[[Flower Cardian Zebra Grass]]" appear in this card's artwork.
  * This card's Japanese name is based on ''[http://duarcain.blogspot.com.br/2012/05/hana-awase-rules.html Hana Awase]'', a game played with ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
