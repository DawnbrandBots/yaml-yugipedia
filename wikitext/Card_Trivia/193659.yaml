title: Card Trivia:Reverse Buster
wikitext: |-
  {{Navigation}}

  * This card's name is derived from the effects of cards that activate when they are flipped face-up, known as "Reverse" effects in the [[OCG]].
  ** It may also be a Japanese pun, as the second syllable of "''Reverse''" and the first syllable of "''Buster''" use similar characters (バース and バス), and thus sound similar.
