title: Card Trivia:Prima Guitarna the Shining Superstar
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Romin - Psychic Beat]]'', as well as one of the cover cards of ''[[Megaroad Pack 2]]''.
  * This monster appears in the artworks of "[[Climax Finale]]", "[[Dream Ticket]]", "[[Psychic Introduction]]", "[[Psykickoff Concert]]", "[[Shining Superstar Riff]]" and "[[Superstar Session]]".
  ** This monster's outfit appears in the artwork of "[[Concert Costume Creator]]", fitted to a [[wikipedia:Dress form|dress form]].
  ** This monster's guitar appears in the artwork of "[[Star's Hand Roadie]]".
  ** A costume of this monster appears in both artworks of "[[Necromaid Stitch]]".
  * This is the [[signature card]] of [[Romin Kassidy]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime and [[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!|manga]].
  ** Like the signature cards of many of the other ''Yu-Gi-Oh!'' heroines, this card is performance-themed. In this case, this monster is based on a rock star.
  * This monster has the following forms:
  ** A [[Normal Monster|Normal]] counterpart: "[[Prima Guitarna]]".
  ** Two [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] forms:
  *** [[LIGHT]]: "[[Princess Omega the Shining Megastar]]".
  *** [[DARK]]: "[[Omega Guitarna the Shining Megastar]]".
  * This card has a [[WIND]] [[Shaman Bandit]] [[counterpart]]: "[[Prophecy Phrase the Colors of the Wind]]".
  ** Both cards share the same [[Level]] (7), [[Type]] ([[Psychic]]), [[original ATK and DEF]] (2200/0), and an effect that requires paying 1000 [[Life Point]]s to be [[activate]]d.
  * In the ''[[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!]]'' manga, this monster's necktie is replaced with a necktie-shaped cleavage window instead.
