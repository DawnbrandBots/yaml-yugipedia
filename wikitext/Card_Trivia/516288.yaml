title: Card Trivia:Infernity Zero
wikitext: |-
  {{Navigation}}

  * The symbol for infinity and the number zero appear in this card's background.
  * This monster resembles a [[wikipedia:Totem pole|totem pole]], a monumental carved from the trees by the indigenous North American people, keeping in relation with the Wild Western design of the "[[Infernity]]" [[archetype]].
  * This is one of five cards to feature an effect that prevents a player from losing a Duel when their [[Life Point]]s reach 0, the other four being "[[Divine Serpent Geh (anime)|Divine Serpent Geh]]", "[[Morphtronic Lantron (anime)|Morphtronic Lantron]]", "[[Relay Soul (anime)|Relay Soul]]", and "[[Zero Gate of the Void]]".
  ** When this card is released as a playable card in ''[[Yu-Gi-Oh! 5D's Tag Force 5]]'' (predating the debut of "Morphtronic Lantron" in {{episode|5D's|142|ref}}), it was the only one of the aforementioned five cards to be playable.
