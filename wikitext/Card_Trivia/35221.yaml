title: Card Trivia:Cabrera Stone
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Triangle O]]".
  * This monster is based on the [[wikipedia:Ica stones|Ica stones]], a series of large stones discovered in [[wikipedia:Peru|Peru]] and popularized by Peruvian physician Javier Cabrera. The stones are known for their engraved depictions of dinosaurs, humans, and advanced technology; however, the Ica stones are considered to be hoaxes.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[add]] "[[Triangle O]]" from the [[Deck]] to the [[hand]] after it is Summoned is based on its appearance in {{episode|5D's|007|ref}}, when [[Yusei Fudo]] [[activate]]s "[[Triangle O (anime)|Triangle O]]" after it was [[Normal Summon]]ed.
