title: Card Trivia:Grace Princess Hina
wikitext: |-
  {{Navigation}}

  * "[[Grace Princess Kana]]" appears in this card's artwork.
  * This monster appears in the artworks of "[[Grace Hakama Fitting Ceremony]]" and "[[Grace Kamioki]]", as well as in the second artwork of "[[Grace Happiness Diary]]".
  ** A painting of this monster appears in the artwork of "[[Grace Princess Emaki]]".
  * This monster has an [[Counterpart|upgraded]] [[Ritual Monster|Ritual]] form: "[[Ever-Grace Princess Hina]]".
