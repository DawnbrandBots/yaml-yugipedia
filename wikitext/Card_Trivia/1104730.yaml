  * This monster is based on the toy version of a [[wikipedia:Flying saucer|flying saucer]].
  ** This monster's name and appearance reflect its [[Pendulum Scale]] (6), as it is a [[wikipedia:Hexagon|hexagon-shaped]] flying saucer based on a six-sided [[wikipedia:Polygon|polygon]] with six electrical orbs surrounding.
