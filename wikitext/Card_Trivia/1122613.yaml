title: Card Trivia:Kaibaman the Legend
wikitext: |-
  {{Navigation}}

  * "[[Blue-Eyes White Dragon]]" and three copies of its card form appear in this card's artwork.
  ** This references the fact that [[Seto Kaiba]] and [[Kaibaman (character)|Kaibaman]] owned three copies of "[[Blue-Eyes White Dragon (anime)|Blue-Eyes White Dragon]]" in the anime and manga.
  * This monster is the [[retrained]] [[Tuner]] counterpart of "[[Kaibaman]]".
