title: Card Trivia:Tenyi Spirit - Ashuna
wikitext: |-
  {{Navigation}}

  * "[[Monk of the Tenyi]]" and "[[Shaman of the Tenyi]]" appear in this card's artwork.
  * This monster appears in the artwork of "[[Draco Masters of the Tenyi]]".
  * This card's name is based on the [[wikipedia:Chakra|Chakra]] [[wikipedia:Ajna|Ajna]], which is associated with light and dreams, hence this card's [[Attribute]] of [[LIGHT]].
