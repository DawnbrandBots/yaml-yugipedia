title: Card Trivia:Metamorphosed Insect Queen
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Insect Queen]]".
  * This monster's Japanese title, "Ultimate Mutated Form" (究極変異態, ''Kyūkyoku Hen'itai''), is based on the Japanese title of "[[Perfectly Ultimate Great Moth]]" (究極完全態, ''Kyūkyoku Kanzentai'').
