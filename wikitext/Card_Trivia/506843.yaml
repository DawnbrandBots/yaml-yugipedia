title: Card Trivia:Mystic Tomato
wikitext: |-
  {{Navigation}}

  * This monster's Japanese design is based on a [[wikipedia:Jack-o'-lantern|jack-o'-lantern]], a carved lantern most commonly made from a hollowed-out pumpkin and is greatly associated with [[wikipedia:Halloween|Halloween]].
  ** This monster's Japanese design appears in the artworks of "[[Mobius Glacier]]" and "[[Wonder Clover]]".
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster is used by [[Arkana]], which serves as a replacement for the [[List of unnamed cards#Pandora's monster|unnamed pumpkin-headed monster]] used by Arkana's [[Pandora (manga)|manga counterpart]] due to their jack-o'-lantern design.
  * This monster's Japanese name, "Killer Tomato", likely references the 1978 American parody film, ''[[Wikipedia: Attack of the Killer Tomatoes|Attack of the Killer Tomatoes]]''.
  * This monster has a counterpart: "[[Mystic Potato]]".
  * This monster is one of six [[Attribute Summoner]]s, with each one representing a different [[Attribute]]. The others are: "[[Giant Rat]]" for [[EARTH]], "[[Flying Kamakiri#1|Flying Kamakiri #1]]" for [[WIND]], "[[UFO Turtle]]" for [[FIRE]], "[[Mother Grizzly]]" for [[WATER]], and "[[Shining Angel]]" for [[LIGHT]].
