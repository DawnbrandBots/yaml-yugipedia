title: Card Trivia:Evolution End Burst
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * "[[Chimeratech Overdragon]]" appears in this card's artwork.
  ** This card's name in the ''OCG'' is a reference to the [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Chimeratech Overdragon (anime)|Chimeratech Overdragon]]" in the ''[[Yu-Gi-Oh! GX]]'' anime: "Evolution Result Burst" (エヴォリューション・レザルト・バースト ''Evoryūshon Rezaruto Bāsuto'').
  ** This card's artwork is a reference to a scene of {{episode|GX|065|ref}}, where [[Zane Truesdale]] [[attack]]ed and [[destroy]]ed all of [[Mad Dog]]'s monsters with "Chimeratech Overdragon", winning the [[Duel]] against him.
  *** The cage where [[Zane Truesdale]] and [[Mad Dog]] duel in the anime appears in the background of this card’s artwork.
  *** This card's effect to allow a [[Fusion Monster]] that was [[Fusion Summon]]ed using at least 6 [[Fusion Material]]s to [[attack]] a number of times each [[Battle Phase]] up to the number of [[material]]s used for its Summon is also a reference to a scene of the aforementioned episode, where Zane Fusion Summoned "Chimeratech Overdragon" using 6 Fusion Materials.
  ** In its debut episode, the effect of "Overdragon" that allows it to attack multiple times per turn was not restricted to only attacking monsters. Similarly, this card also lacks this restriction.

