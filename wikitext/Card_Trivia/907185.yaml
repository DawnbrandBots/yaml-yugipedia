title: Card Trivia:Reptilianne Nyami
wikitext: |-
  {{Navigation}}

  * This card's name is based on [[wikipedia:Nyami Nyami|Nyami Nyami]], the serpentine god of the [[wikipedia:Zambezi|Zambezi]] river.
  * This monster is based on a [[wikipedia:Yellow-bellied sea snake|yellow-bellied sea snake]], a venomous species of sea snake found in tropical oceanic water throughout the Indo-Pacific region.
