title: Card Trivia:Battlewasp - Halberd the Charge
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Voulge the Charge", is based on a [[wikipedia:Voulge|voulge]], a pointed cleaver weapon at the end of a polearm.
  ** This monster's ''[[TCG]]'' name is based on the [[wikipedia:Halberd|halberd]], a two-handed polearm consisting of an axe blade topped with a spike mounted on a long shaft.
