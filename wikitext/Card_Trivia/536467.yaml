title: Card Trivia:Wall Shadow
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Labyrinth Wall Shadow]]" (in its shadow form).
  * This monster is the result of "[[Shadow Ghoul]]" fused with "[[Labyrinth Wall]]", as shown in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** Fittingly, this card has the [[ATK]] of "Shadow Ghoul" and the [[DEF]] of "Labyrinth Wall".
  ** Oddly, despite "Shadow Ghoul" and "Labyrinth Wall" being [[Zombie]] and [[Rock]] monsters respectively, this card is a [[Warrior]] monster.
  * In the video game ''[[Yu-Gi-Oh! World Championship Tournament 2004]]'', this card's description incorrectly lists "[[Magical Labyrinth|Spellal Labyrinth]]" as the [[Equip Spell Card]] needed to Summon this card.
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|093|ref}}, specifically from the panel showing [[Wall Shadow (manga)|this monster]] emerging to attack "[[Beaver Warrior (manga)|Beaver Warrior]]", albeit with some minor changes in detail.
