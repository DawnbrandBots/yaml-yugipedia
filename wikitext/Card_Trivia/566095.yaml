title: Card Trivia:Longirsu, the Orcust Orchestrator
wikitext: |-
  {{Navigation}}

  * "[[Beckoned by the World Chalice]]" → "[[Ningirsu the World Chalice Warrior]]" → "Longirsu, the Orcust Orchestrator" → "[[Dingirsu, the Orcust of the Evening Star]]" → "[[Girsu, the Orcust Mekk-Knight]]".
  ** This card is an older version of "Ningirsu the World Chalice Warrior". This is reflected by several similarities between this card and "Ningirsu", such as 2500 [[ATK]], a [[Link Rating]] of 3, and an [[effect]] to send cards from the field to the [[Graveyard]].
  * This monster appears in the artworks of "[[Orcustrated Attack]]", "[[Orcustrated Release]]", and "[[Orcust Crescendo]]".
  * The colours on this monster, and their location, reference the three "[[World Legacy|World Legacies]]" that were in the possession of, and were reworked by "Ningirsu" to react with "[[World Legacy - "World Wand"|World Wand]]", activating it;
  ** The red on this monster's shoulder, chest, and legs: "[[World Legacy - "World Armor"|World Armor]]".
  ** The orange on this monster's shield: "[[World Legacy - "World Shield"|World Shield]]".
  ** The purple on this monster's lance: "[[World Legacy - "World Lance"|World Lance]]".
