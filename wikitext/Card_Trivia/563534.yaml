title: Card Trivia:Trickstar Divaridis
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Trickstar Festival]]" and "[[Trickstar Live Stage]]".
  * This monster's name is based on the ''[[wikipedia:Psychotria viridis|Psychotria viridis]]'', a species of hallucinogenic perennial shrubby flowering plants, which appears as the symbols on the corners of this card's artwork.
  ** This monster's name is also based on a [[wikipedia:Diva|diva]], a term used for women with outstanding talents in the arts, including music and acting. It is derived from the feminine form of the Latin word ''divus'', which describes someone who is deified after their death, keeping in relation with the religious figure-themed naming of the "[[Trickstar]]" [[Link Monster]]s.
