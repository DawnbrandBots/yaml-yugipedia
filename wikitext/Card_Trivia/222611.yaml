title: Card Trivia:Different Dimension Deepsea Trench
wikitext: |-
  {{Navigation}}

  * The artwork on this card is similar to the artwork of "[[Eternal Drought]]".
  ** Incidentally, both cards are also [[Spell Card]]s whose effects deal with removing aquatic-related monsters from the field (this card [[banishes]] a [[WATER]]-[[Attribute]] monster whereas "Eternal Drought" [[destroy]]s all [[Fish]]-[[type]] monsters on the [[field]].)
