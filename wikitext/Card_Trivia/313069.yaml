title: Card Trivia:Infernoid Onuncu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Eye of the Void]]".
  * This card's Japanese name, "Nehemoth", is based on [[wikipedia:Naamah (demon)|Na'amah]], a powerful [[wikipedia:Demon|demon]] in [[wikipedia:Jewish mysticism|Jewish mysticism]].
  ** Alternatively, it might also reference the Hebrew word "נחמות" (''Na-kha-mote''), meaning "consolations" or "redemption".
  * ''Onuncu'' means "tenth" in Turkish and Azerbaijani, referring to this card's [[Level]].
  * This monster's pose, card artwork, and destruction effect resemble those of "[[Fire King High Avatar Garunix]]".
  * This card can be considered the opposite [[counterpart]] of "[[Infernoid Devyaty]]".
  ** They have nearly identical [[ATK]]/[[DEF]], the same [[Summoning condition]] and effects that respectively [[destroy]] all monsters or all [[Spell]]/[[Trap]]s when [[Summon]]ed. Both cards can also [[Tribute]] a monster to respectively [[negate]] Spell/Traps or a [[monster effect]].
  ** Both also share several similarities: the two monsters are [[wikipedia:Serpent (symbolism)|serpentine]] creatures, and they are two of the [[Fusion Material]]s of "[[Infernoid Tierra]]".
  *** This may be a reference to the fact that the demons on which the two monsters are based are cohorts in mythology.
