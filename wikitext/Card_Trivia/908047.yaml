title: Card Trivia:Fiery Infernleon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Circle of Wrath]]".
  * The second portion of this monster's Japanese name, "Hot Infernleon" (ホット・カエンレオン, ''Hotto Kaenreon'') is a portmanteau of the Japanese words for "flame" (火炎, ''kaen'') and "chameleon" (カメレオン, ''kamereon'').
