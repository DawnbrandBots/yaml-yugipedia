title: Card Trivia:Beastly Mirror Ritual
wikitext: |-
  {{Navigation}}

  * This card's ''OCG'' and ''TCG'' release are separated by nearly 13 years. This card was originally printed in the ''OCG'' in ''[[Premium Pack 2 (Japanese)|Premium Pack 2]]'', released on December 12, 1999. The ''TCG'' print was released on March 20, 2012.
