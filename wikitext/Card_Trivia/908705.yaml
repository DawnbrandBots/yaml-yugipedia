title: Card Trivia:Laevatein, Generaider Boss of Shadows
wikitext: |-
  {{Navigation}}

  * This card is named after ''[[wikipedia:Lævateinn|Lævateinn]]'' (lit. "Wounding Wand"), a legendary wand or sword in Norse mythology. According to the ''[[wikipedia:Fjölsvinnsmál|Fjölsvinnsmál]]'', it was forged by [[wikipedia:Loki|Loki]] within ''[[wikipedia:Hel (location)|Helheim]]''.
  ** ''Lævateinn'' is sometimes interpreted as the flaming sword held by [[wikipedia:Surtr|Surtr]] during the events of ''[[wikipedia:Ragnarök|Ragnarök]]''.
  * This monster is the upgraded form of "[[Loptr, Shadow of the Generaider Bosses]]".
