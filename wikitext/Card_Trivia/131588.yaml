title: Card Trivia:Fool's Dice
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The die in this card's artwork features multiples of 200 on each side, ranging from 200 to 2400. This reflects this card's damaging effect, which can inflict 200 damage multiplied by the [[Level]] of the opponent's monster that [[Leaves the field|left the field]] (which ranges from 1 to 12).
