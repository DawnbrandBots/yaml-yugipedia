  * This monster is depicted in the illustration that appears on the body of "[[Flower Cardian Paulownia with Phoenix]]".
  * This monster is based on ''[[wikipedia:Fenghuang|Fenghuang]]'', the Chinese version of the [[wikipedia:Phoenix|phoenix]], a mythological bird associated with fire, immortality, and rebirth.
