title: Card Trivia:Bye Bye Damage
wikitext: |-
  {{Navigation}}

  * This card's name is a play on the words "bye-bye" and the Japanese word for "double" (倍, ''bai'').
  ** This is reflected in this card's effect, which allows the player to "say bye-bye" to the damage they receive by inflicting twice that amount to their opponent.
