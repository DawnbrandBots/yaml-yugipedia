title: Card Trivia:Coevolutionary Miracle
wikitext: |-
  {{Navigation}}

  * "[[Little D (Rush Duel)|Little D]]" and "[[Megazowler (Rush Duel)|Megazowler]]" appear in this card's artwork.
  ** This card's artwork depicts "Little D" transforming into "[[Super King Rex]]".
  * This card is based on [[wikipedia:Coevolution|coevolution]], a biological term for when two or more species reciprocally affect each other's evolution through the process of natural selection.
