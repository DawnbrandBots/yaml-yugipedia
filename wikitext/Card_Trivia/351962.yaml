title: Card Trivia:Humid Winds
wikitext: |-
  {{Navigation}}

  * "[[Aromage Jasmine]]" and "[[Aromage Rosemary]]" appears in this card's artwork.
  * This card's name is most likely derived from the sensible quality of [[wikipedia:dryness|dryness]] among [[wikipedia:Aristotle|Aristotle]]'s classical elements. In his treatise ''[[wikipedia:On Generation and Corruption|On Generation and Corruption]]'', Aristotle defined each of the four [[wikipedia:Classical element|classical elements]] ([[wikipedia:Fire (classical element)|fire]], [[wikipedia:Air (classical element)|air]], [[wikipedia:Water (classical element)|water]], and [[wikipedia:Earth (classical element)|earth]]) as being composed between two sensible qualities (wetness, dryness, hotness, and coldness).
  ** The monsters depicted in this card's artwork are respectively [[WATER]] and [[LIGHT]] (standing in for air) [[Attribute]], the two classical elements whose shared sensible quality is wetness/moisture.
