  * "[[Speed Warrior]]" appears in this card's artwork.
  ** Fittingly, "Speed Warrior" was the monster [[Special Summon]]ed by this card's effect in {{episode|5D's|001|ref}}.
  * This is the first [[Speed Spell Card]] to be used in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
