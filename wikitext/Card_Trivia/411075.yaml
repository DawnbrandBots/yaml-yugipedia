title: Card Trivia:Token (Yami Yugi and Dark Magician)
wikitext: |-
  {{Navigation}}
  [[File:LC01-Side2.png|thumb|right|250px]]

  * This card's quote "Don't get too hasty... the game has just begun!" (あせるなよ・・・ゲームは始まったばかりだぜ！) is from {{chapter|Yu-Gi-Oh! Duelist|193|ref}}, when [[Dark Yugi (manga)|Dark Yugi]] used "[[Lightforce Sword (manga)|Lightforce Sword]]" to stop [[Seto Kaiba (manga)|Seto Kaiba]] from Summoning "[[The God of the Obelisk]]".
  ** It is also used in {{episode|Yu-Gi-Oh!|129|ref}}, the episode based on this chapter.
  * This design of [[Yami Yugi]] in this card's first artwork is taken from the Gameboard from ''[[Legendary Collection: Gameboard Edition]]'', while the design of "[[Dark Magician]]" is taken from its fourth ''[[OCG]]''/third ''[[TCG]]'' artwork.
