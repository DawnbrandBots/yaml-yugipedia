title: Card Trivia:Soul Union
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * "[[Elemental HERO Sparkman]]" and the silhouette of "[[Elemental HERO Avian]]" appear in this card's artwork.
  ** This card's name, artwork, and effect reflect how the soul of the fallen "Avian" united with the soul of "Sparkman" and increased its strength.
