title: Card Trivia:Amazing Dealer
wikitext: |-
  {{Navigation}}

  * This monster is a counterpart to "[[Mystic Dealer]]". They have the same [[Attribute]], [[Type]], [[Level]], and reversed [[ATK]]/[[DEF]].
  ** Both allow monsters' effects allow the player to cycle through the cards in their hands, with "Mystic Dealer" being more specific on what can be cycled from the hand ([[Spellcaster]]) and only 1 at a time, whereas "Amazing Dealer" allowing any 3 cards at once at a more strenuous window of opportunity (only while the player has 3 or fewer Monsters in their Graveyard).
