title: Card Trivia:Zombie (card)
wikitext: |-
  {{Navigation|Zombie|mode=nonGame}}

  * This is the first card to be played in ''[[Yu-Gi-Oh!]]''.
  ** This is also the first monster to be [[Summon]]ed in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, as well as the first monster to be [[Normal Summon]]ed in the manga.
  *** This is also the first monster to be Summoned by [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] in the manga.
  ** This is also the first monster to be [[destroyed by battle]] in the manga, being destroyed by "[[Blackland Fire Dragon (manga)|Blackland Fire Dragon]]".
  *** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster is replaced with "[[Kagemusha of the Blue Flame (anime)|Kagemusha of the Blue Flame]]", which was also the first monster to be Summoned and Normal Summoned, to be Summoned by [[Joey Wheeler]], and to be destroyed by battle by "[[Blackland Fire Dragon (anime)|Blackland Fire Dragon]]".
  ** This is also the first [[List of unseen cards|unseen card]] to appear in the manga; however, it can be seen in the ''[[Yu-Gi-Oh! (Toei anime)|Yu-Gi-Oh!]]'' [[Toei]] anime and in associated merchandise.
