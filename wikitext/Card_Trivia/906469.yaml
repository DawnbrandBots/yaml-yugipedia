title: Card Trivia:Dinomorphia Frenzy
wikitext: |-
  {{Navigation}}

  * "[[Dinomorphia Diplos]]", "[[Dinomorphia Kentregina]]", "[[Dinomorphia Rexterm]]", and "[[Dinomorphia Therizia]]"  appear in this card's artwork.
  ** The way the three humanoid members of the archetype stand in front of a Tyrannosaurus-based mech bears striking similarity to a shot from the opening sequences of ''[[wikipedia:Bakuryū Sentai Abaranger|Bakuryū Sentai Abaranger]]'' and its English counterpart ''[[wikipedia:Power Rangers Dino Thunder|Power Rangers Dino Thunder]]'', featuring the three main Rangers walking in front of their dinosaur-like Zords, including a Tyrannosaur one.
