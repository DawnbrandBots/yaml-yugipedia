title: Card Trivia:Hi-Speedroid Cork Shooter
wikitext: |-
  {{Navigation}}

  * This monster is based on a cork gun, a toy gun which uses air pressure to fire a small tethered cork from the barrel.
  ** This monster's Japanese name, "Cork-10" (コルク－{{Ruby|１０|ジュウ}}, ''Koruku-Jū'') features the word ''Jū'', which can be translated as the number 10 (十) and the word "gun" (銃).
  * This is the first "[[Speedroid]]" [[Tuner Synchro Monster]].
