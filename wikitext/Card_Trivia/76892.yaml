title: Card Trivia:Rain Storm
wikitext: |-
  {{Navigation}}

  * This card's name is based on a [[wikipedia:Rain|rain storm]], in which vapor clouds condense into tiny water droplets until they are heavy enough to fall under Earth's gravity, causing precipitation.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect of reducing the [[ATK]] of a "[[Cloudian]]" monster's ATK by either 1000 or 2000 is a reference to this card's appearance in the ''[[Yu-Gi-Oh! GX]]'' anime where [[Adrian Gecko]] used this card to reduce the ATK of "[[Cloudian - Nimbusman (anime)|Cloudian - Nimbusman]]" by 3000, which is the combined total of the amount of ATK required to activate this card.
  ** This card's variable destruction effects in the ''OCG''/''TCG'' is also a reference to this card's appearance in the ''Yu-Gi-Oh! GX'' anime where this card was used to destroy three cards on [[Chazz Princeton]]'s field, which included his "[[VWXYZ-Dragon Catapult Cannon (anime)|VWXYZ-Dragon Catapult Cannon]]", "[[Hyper Coat]]", and "[[Different Dimension Hangar]]".
  * In ''[[Yu-Gi-Oh! World Championship 2008]]'', ''[[Yu-Gi-Oh! GX Tag Force]]'' and ''[[Yu-Gi-Oh! GX Tag Force 2]]'' this card has the text of "[[Elemental HERO Chaos Neos]]".
