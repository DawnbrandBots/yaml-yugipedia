title: Card Trivia:Stardust Wurm
wikitext: |-
  {{Navigation}}

  * This monster is based on "[[Stardust Dragon]]".
  * This card has the same [[Attribute]], [[Level]], [[Type]], [[ATK]], and [[DEF]] as "[[Majestic Dragon]]".
  ** Fittingly, this card can [[Special Summon]] "Majestic Dragon" and "[[Stardust Xiaolong]]", the 2 monsters that [[Yusei Fudo]] initially used as [[Synchro Material]]s with "[[Stardust Dragon (anime)|Stardust Dragon]]" to Summon "[[Majestic Star Dragon (anime)|Majestic Star Dragon]]" in ''[[Yu-Gi-Oh! 5D's]]''.
  *** This monster's wyvern-like appearance is also similar to that of "[[Majestic Star Dragon]]", although this monster does not have legs.
