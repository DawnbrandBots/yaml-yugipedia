title: Card Trivia:Dark-Eyes Breakstar Cat
wikitext: |-
  {{Navigation}}

  * This monster's name is a reference to [[wikipedia:Black hole|black hole]]s, which form when a massive star is unable to maintain fusion reactions and prevent its own collapse, thus "breaking down".
  ** Appropriately, a black hole appears inside this monster's mouth, as well as silhouettes of them around its eyes and on its chest.
