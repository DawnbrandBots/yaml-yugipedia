title: Card Trivia:Vampire Fraulein
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Vampire Awakening]]" and "[[Blockout Curtain]]".
  * Several "[[Vampire Familiar]]s" appear in this card's artwork.
  * This monster's name is based on the German language honorific used for unmarried women, ''[[wikipedia:Fräulein|Fräulein]]'', comparable to the usage of "Miss" in English or ''Mademoiselle'' in French.
  * Interestingly, this monster is depicted not casting a shadow, but her umbrella is. This is based on the common belief that a vampire cannot cast a shadow.
