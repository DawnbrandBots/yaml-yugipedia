title: Card Trivia:Stage of Destiny
wikitext: |-
  {{Navigation}}

  * "[[Blackland Fire Dragon]]", "[[Hitotsu-Me Giant]]", "[[Ryu-Kishin]]", and "[[Winged Dragon, Guardian of the Fortress 1|Winged Dragon, Guardian of the Fortress #1]]" appear in this card's artwork.
  ** This card's artwork is a reference to the monsters used during the [[Yu-Gi-Oh! - Duel 009|first]] and [[Yu-Gi-Oh! - Duel 036|second]] Duels between [[Dark Yugi (manga)|Dark Yugi]] and [[Seto Kaiba (manga)|Seto Kaiba]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, in which they both Summoned the above-mentioned monsters during the beginning of their Duels.
