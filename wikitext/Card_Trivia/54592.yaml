title: Card Trivia:Garuda the Wind Spirit
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Garuda|Garuda]], a being from Hindu and Buddhist mythology who is described as a man with bird-like features, including wings and a bird head.
  * This monster has five [[Attribute Spirit]] [[counterpart]]s:
  ** [[FIRE]]: "[[Spirit of Flames]]"
  ** [[EARTH]]: "[[The Rock Spirit]]"
  ** [[WATER]]: "[[Aqua Spirit]]"
  ** [[DARK]]: "[[Luna the Dark Spirit]]"
  ** [[LIGHT]]: "[[Diana the Light Spirit]]
