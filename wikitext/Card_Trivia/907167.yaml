title: Card Trivia:The Executor of the Underworld - Pluto
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Dwarf planet|dwarf planet]] [[wikipedia:Pluto|Pluto]], which appears in the background of this card's artwork.
  ** The appearance of Pluto in this card's artwork appears to be based on its [[wikipedia:File:Pluto-01 Stern 03 Pluto Color TXT.jpg|color-enhanced picture]] taken in 2015; however, the true colors of Pluto's surface are less distinct than how they are depicted in this card's artwork.
  ** This monster may also be based on [[wikipedia:Dis Pater|Pluto]], the Roman god of the dead and the ruler of the underworld, which serves as the namesake of the dwarf planet.
  ** This monster's [[archetype condition]] to always be treated as a "[[The Agent]]" card references how Pluto was formerly considered a planet until it was redefined as a dwarf planet 2006.
  * This monster has the highest [[original ATK]] (2300) of all [[Level 5]] [[Tuner monster]]s.
