title: Card Trivia:Elemental HERO Shining Flare Wingman
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Elemental Energy]]'' and ''[[Collectible Tins 2006 Wave 2]]'', and is also one of the cover cards of ''[[Expert Edition Volume 4]]''/''[[Dark Revelation Volume 4]]''.
  * This monster appears in the artworks of "[[Double Hero Attack]]", "[[Favorite Contact]]", and "[[Wake Up Your Elemental HERO]]".
  * This monster is an [[Card evolutions|upgraded]] form of "[[Elemental HERO Flame Wingman]]", [[Fusion Monster|fused]] with "[[Elemental HERO Sparkman]]".
  ** This monster's [[original ATK]], if it is Summoned step-by-step using "[[Polymerization]]" (i.e. [[Fusion Summon]]ing "Elemental HERO Flame Wingman" with "[[Elemental HERO Avian]]" and "[[Elemental HERO Burstinatrix]]", and then using it and "[[Elemental HERO Sparkman]]" to Summon this card) is equal to the combined [[ATK]] of its Fusion Materials, "Flame Wingman" and "Sparkman", being at least 3700, since there will be at least four "Elemental HERO" monsters in the [[Graveyard]].
  ** This monster's [[LIGHT]] [[Attribute]] is a reference to the fact that [[wikipedia:Flare|flares]] are used primarily to give off [[wikipedia:Light|light]].
  * This monster has a [[counterpart]]: "[[Elemental HERO Shining Phoenix Enforcer]]".
  * This monster has a retrained counterpart: "[[Favorite HERO Shining Flare Wingman]]".
  * This monster has a Fusion with "[[Elemental HERO Neos]]": "[[Elemental HERO Shining Neos Wingman]]".
  * This monster is similar to "[[Blue-Eyes Shining Dragon]]".
  ** Both feature the word "Shining" in their names.
  ** Both share an effect that allows them to gain 300 [[ATK]] for each specific monster in the [[Graveyard]].
  * This monster has the same [[original ATK and DEF]] (2500/2100) as "[[Dark Magician (anime)|Dark Magician]]", the [[signature card]] of [[Yugi Muto]] in the [[Yu-Gi-Oh! (anime)|anime]], implying that this monster was Jaden's signature card before the debut of "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]".
