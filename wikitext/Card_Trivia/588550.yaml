title: Card Trivia:Transaction Rollback
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * A [[wikipedia:Database transaction|transaction]] is a unit of work in database management in which multiple changes can be made to the database. A [[wikipedia:Rollback (data management)|transaction rollback]] is a means of reverting all changes made in the single transaction, effectively restoring things to a previous state, which reflects this card's effect to copy and [[activate]] the effect of a previously-used [[Normal Trap Card]] in either player's [[Graveyard]].
  * This card's Italian name ("Transazione Rollback") has the words in an incorrect order: the current wording implies that "rollback" is a type of transaction instead of an action. "Rollback di Transazione" would be more appropriate.
