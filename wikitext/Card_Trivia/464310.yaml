title: Card Trivia:Dragoncaller Magician
wikitext: |-
  {{Navigation}}

  * This card's name may be a pun in Japanese, as the Descend Dragon portion of her name ({{Ruby|降|こう}}{{Ruby|竜|りゅう}}, ''Kōryū'') is a homophone for the Japanese for the [[wikipedia:Yellow Dragon|Yellow Dragon of the Centre]] ({{Ruby|黃|こう}}{{Ruby|龍|りゅう}}, ''Kōryū'').
  ** Per this, the end of this monster's staff is a golden color.
  * This card is the only "[[Magician]]" [[Pendulum Monster]] to support [[Fusion Summon]]ing.
  * This card may be based on "[[Dark Magician]]" and "[[Dark Magician Girl]]" as it is a [[Level]] 7 [[DARK]] monster and in the anime, it is shown to have a serious expression like the former.
  ** Its synergy with [[Dragon]] monsters also alludes to how both "Dark Magician" and "Dark Magician Girl" can be used in such Decks to summon "[[Amulet Dragon]]" and "[[Dark Magician Girl the Dragon Knight]]". In fact, this card's effect lets you use ''it'' to Fusion Summon those Monsters.
  ** Most of the above cards have synergy with "[[Buster Blader (archetype)|Buster Blader]]" Decks as well.
  ** Also, to some extent, its armor and hat resemble "[[Dark Requiem Xyz Dragon]]".
