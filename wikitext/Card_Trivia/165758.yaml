title: Card Trivia:Kaitoptera
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * This monster appears in the artworks of "[[Judgment Sword]]" and "[[Mobius Glacier]]".
  * This monster's Japanese name, "Hellkiteptera" (ヘルカイトプテラ ''Herukaitoputera''), is a portmanteau of "hellkite", "kite", and ''[[wikipedia:Pteranodon|pteranodon]]''.
  ** "Hellkite" is a word describing someone wicked and cruel, reflecting how [[Rex Raptor]] becomes even more callous after joining [[Paradius]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** "Kite" is a common name for a species of small- or medium-sized [[wikipedia:Bird of prey|birds of prey]], which are known for swooping down and catching their prey in their talons, similar to how the ''pteranodon'' is often (incorrectly) depicted in popular culture.
  *** This monster's English name seems to be the same, but with "hell" removed and "kite" left in its Japanese pronuciation.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[add]] "[[Polymerization]]" to the [[hand]] is based on its appearance in {{episode|Yu-Gi-Oh!|161|ref}} where Rex Raptor [[draw]]s "[[Polymerization (anime)|Polymerization]]" while controlling this monster and uses it to fuse this card with "[[Gilasaurus (anime)|Gilasaurus]]" into "[[Horned Saurus (anime)|Horned Saurus]]".
