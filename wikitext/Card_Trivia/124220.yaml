title: Card Trivia:Malefic World
wikitext: |-
  {{Navigation}}

  * The city in this card's artwork appears in the artwork of "[[Malefic Territory]]".
  * This card's artwork is based on a scene from ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]''; when [[Paradox]] first [[activate]]d this card, a skyward shot of the buildings in [[Domino City Plaza]] appears as the field is changed into a colorful galaxy-like aesthetic.
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the other "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
