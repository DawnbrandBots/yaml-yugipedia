title: Card Trivia:Southern Stars
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card is based on the [[wikipedia:Crux|Southern Cross]], a four-star asterism in the [[wikipedia:Southern Sky|Southern Sky]].
  ** This card's Japanese name is simply "Southern Cross".
  ** This card has a counterpart based on the [[wikipedia:Northern Cross (asterism)|Northern Cross]]: "[[Northern Crossfire]]".
  * This card's artwork depicts ten [[Level]] stars in a cross-shaped arrangement, similar to the Southern Cross. This, along with this card's effect [[support]]ing [[Level 10]] monsters, is a reference to how the [[wikipedia:kanji|kanji]] for the number 10 is shaped like a cross (十).
