title: Card Trivia:Shell Knight
wikitext: |-
  {{Navigation}}

  * This monster is a composition of [[wikipedia:Shell|seashell]]s, a hard, protective outer layer usually created by an organism that lives in the sea, including mollusks and bivalves.
  ** The background of this card's artwork resembles the surface of water, referencing how seashells are often found underwater.
  ** This monster's [[Rock]] [[Type]] and ''[[OCG]]''/''[[TCG]]'' association with the "[[Fossil]]" [[archetype]] reference how seashells undergo the process of fossilization.
  * This monster's ''OCG''/''TCG'' effect to change it to [[Defense Position]] after being [[Normal Summon]]ed is based on its appearance in {{episode|GX|139|ref}}, where it was Normal Summoned in Defense Position.
  ** Also, this monster's ''OCG''/''TCG'' effect to inflict 500 damage after being changed to Defense Position is an alteration of its anime effect, which inflicts 500 damage after it is Summoned. In the aforementioned episode, when this monster was Normal Summoned in Defense Position, its effect [[activate]]d, inflicting 500 damage to the opponent.

  * This monster's effect to add a Level 8 Rock monster from the deck to the hand references "[[Gaia Plate the Earth Giant]]", which was also played by [[Jim Crocodile Cook]] during his duel with [[The Supreme King]].
