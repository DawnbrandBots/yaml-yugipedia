title: Card Trivia:Tricolor Illusion
wikitext: |-
  {{Navigation}}

  * The colors of the three eyes' irises in this card's artwork each represent the colored borders of a [[Main Deck]] [[card type]].
  ** In clockwise order, the top eye's orange iris represents the orange-colored [[Effect Monster|Effect Monster Card]]; the right eye's green iris represents the green-colored [[Spell Card]]; and the left eye's pink iris represents the pink-colored [[Trap Card]].
