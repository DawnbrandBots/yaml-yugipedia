title: Card Trivia:Gernia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sun God Unification]]".
  * This monster's appearance is similar to that of "[[Goblin Zombie]]".
  ** It also has a striking resemblance to "[[Shadow Ghoul]]" and "[[Wall Shadow]]".
  * In [[Yu-Gi-Oh! GX Tag Force 2]], this card's name is "Ghelnia Ghoul".
  * [[Shonen Jump]] Magazine Magazine revealed this card to be in [[Champion Pack: Game Four]] with the name "Ghelnia Ghoul" though this name wasn't given for the final result of the English card's release.{{fact}}
