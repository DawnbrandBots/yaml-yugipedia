title: Card Trivia:Snow Plow Hustle Rustle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Revolving Switchyard]]".
  * This monster is based on a [[wikipedia:Rotary snowplow|rotary snowplow]], a locomotive with snow-fighting equipment, consisting of circular blades which cut through the snow on the railroad tracks.
  ** This monster's name is based on the "Russell snowplow", a type of wedged [[wikipedia:Snowplow|snowplow]] built on the front of locomotives to clear the snow off of the railroad tracks.
