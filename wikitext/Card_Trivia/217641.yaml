title: Card Trivia:Hieratic Dragon of Sutekh
wikitext: |-
  {{Navigation}}

  * This card's name comes from the Egyptian God, [[wikipedia:Set (mythology)|Set]].
  ** The head gear of this card is comparable to the squared-off ears of the deity Set, further promoting a link between the two.
  * This card's effect of banishing monsters to Special Summon itself is similar to the [[Chaos]] archetype, which may reference [[wikipedia:Set (mythology)|Set]] being the god of Chaos in Egyptian Mythology.
  ** Also, the [[Summoning Condition]] of this card is similar to the conditions of the [[Sacred Beasts]], [[Wicked Gods]] and [[Egyptian Gods]].
  * This is the strongest non-[[Xyz Monster]] in the "[[Hieratic]]" [[archetype]], and the second strongest "Hieratic" monster after "[[Hieratic Sun Dragon Overlord of Heliopolis]]".
  * This card's [[Summoning Condition]] and [[effect]] are similar to that of "[[Dark Armed Dragon]]"
