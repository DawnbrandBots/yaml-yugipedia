title: Card Trivia:Chronomaly Crystal Chrononaut
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chronomaly Pyramid Eye Tablet]]" and "[[Orichalcum Mirage]]".
  * This monster is based on the [[wikipedia:Ancient astronaut|ancient astronaut]], a pseudoscientific hypothesis that intelligent extraterrestrial beings visited Earth and made contact with humans during antiquity and prehistoric times. The ancient astronauts are said to have influenced the development of modern cultures, technologies, religions, and human biology.
  ** This monster's ''[[TCG]]'' name, "Chrononaut" is a portmanteau of the Greek word for "time" (χρόνος ''chronos'') and "sailor" (ναύτης ''nautes''), which combined, would mean "[[wikipedia:time travel|time travel]]er". This reflects the general theme of the "[[Chronomaly]]" [[archetype]], where its members are based on artifacts found in a very unusual or apparently impossible archaeological context which would challenge conventional historiography and chronology if authentic.
  * This monster features a mirror in its chest, referencing how it can "reflect" any [[battle damage]] it would take from an opponent's attacking monster back at the opponent.
  * This is the first [[Psychic]] [[Xyz Monster]].
  ** This is the only "Chronomaly" monster that is not a [[Rock]] or [[Machine]] monster.
  * This monster is likely the enhanced, combined form of "[[Chronomaly Crystal Skull]]" and "[[Chronomaly Crystal Bones]]", due to its namesake and appearance.
  ** Fittingly, in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster is first [[Xyz Summon]]ed using the two aforementioned monsters as [[Xyz Material]].
  * This monster isn't part of the "[[Alien]]" archetype, due to its name written different in katakana (エ<u>イ</u>リアン) than the existing "Alien" cards (エ<u>ー</u>リアン).
  * This monster's ''[[OCG]]''/''TCG'' pose is based on a scene from {{episode|ZEXAL|034|ref}} where [[Chronomaly Crystal Chrononaut (anime)|this monster]] is Summoned.
