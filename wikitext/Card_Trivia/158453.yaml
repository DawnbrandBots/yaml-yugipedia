title: Card Trivia:Watthydra
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Eleckirimu", is based on the "kirimu", a dragon-like beast mentioned in the [[wikipedia:Mwindo epic|''Mwindo'' epic]], an oral tale told by the Nyanga people of the Congo River region, in which it is described having seven heads with seven horns and seven eyes, which reflects this monster's [[Level]] (7).
  ** This monster's effect may be a reference to an incident in the epic, where Kirimu descends from a mountain and eats the people of a village, but is later slain and the people are found alive in its stomach, similar how this monster can "eat" (or [[banish]]) a card from the player's [[Deck]], which can be retrieved later on.
  * This monster's ''[[TCG]]'' name is based on the [[wikipedia:Lernaean Hydra|Hydra]], a multi-headed serpentine lake monster in [[wikipedia:Greek mythology|Greek mythology]] who had the ability to reproduce two heads when one was cut off.
