title: Card Trivia:Trickstar Aqua Angel
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]'' and ''[[2025 Mega-Pack Tin]]''.
  * This monster's name, design, and [[Attribute]] are based on [[Aqua (character)|Aqua]], the [[WATER]] [[Ignis]] from the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  ** The flower symbols in the corners of this card's artwork are based on the ''[[wikipedia:Monochoria korsakowii|Monochoria korsakowii]]'' (known in Japan by the name ''mizuaoi''), a species of annual flowing plant from the [[wikipedia:Pontederiaceae|Pontederiaceae]] family of [[wikipedia:Aquatic plant|aquatic plants]].
  *** The first part of the name ''mizuaoi'' is based on the Japanese word for "water" (水, ''mizu''), while the second part is based on the Japanese name for "hollyhock" (葵, ''aoi''), the same kanji as [[Skye Zaizen]]'s first name in the original Japanese version of the ''Yu-Gi-Oh! VRAINS'' anime, '''Aoi''' Zaizen.
  ** This monster's [[archetype condition]] is based on how Skye Zaizen uses the "[[Trickstar]]" [[archetype]] before meeting Aqua; after which, she uses the "[[Marincess]]" archetype in the later seasons of the ''Yu-Gi-Oh! VRAINS'' anime.
  ** This monster's third effect of looking at the opponent's [[hand]] and [[face-down]] cards references Aqua's ability to read minds, which allows her to distinguish between truth and lies.
  * This is the only "Trickstar" monster to be a WATER monster.
  ** This is also the only "Marincess" monster to not be a [[Cyberse]] monster.
