title: Card Trivia:Magikey Dragon - Andrabime
wikitext: |-
  {{Navigation}}

  * This card's name is based on ''[[wikipedia:List of demons in the Ars Goetia|Andromalius]]'', one of the Demon Lords of Hell from the ''[[wikipedia:Key of Solomon|Key of Solomon]]''.
  * "[[Clavkiys, the Magikey Skyblaster]]" and the pistol from "[[Magikey Maftea]]" appear in this card's artwork.
