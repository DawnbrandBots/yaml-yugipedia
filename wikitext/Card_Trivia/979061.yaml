title: Card Trivia:Archfiend's Promotion
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Promotion (chess)|promotion]], a mechanic in the game of [[wikipedia:Chess|chess]] where a [[wikipedia:Pawn (chess)|pawn]] that reaches the last rank farthest from its original square can be replaced with another piece (e.g. a [[wikipedia:Queen (chess)|queen]] or a [[wikipedia:Rook (chess)|rook]]).
  ** This is reflected by this card's effect to [[Tribute]] "[[Vilepawn Archfiend]]" and [[Special Summon]] one of the listed chess-themed "[[Archfiend]]" monsters to replace it.
