title: Card Trivia:Curtain of the Dark Ones
wikitext: |-
  {{Navigation}}

  * This monster is depicted in the illustration that appears on the body of "[[Flower Cardian Cherry Blossom with Curtain]]".
  * This card's Japanese name, "Curtain of the Black-Magic Tribe" (黒魔族のカーテン ''Kuromazoku no Kāten'') is extremely similar to that of "[[Dark Magic Curtain]]" (黒魔術のカーテン ''Kuromajutsu no Kāten''), with only one kanji of difference.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster is shown to hang off a wooden board; in ''[[Yu-Gi-Oh! Duel Links]]'', it is instead depicted hanging off of a frame.
