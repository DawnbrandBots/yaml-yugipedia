title: Card Trivia:Green Turtle Summoner
wikitext: |-
  {{Navigation}}

  * "[[Hydrotortoise, the Empowered Warrior]]" appears in this card's artwork.
  ** While Hydrotortoise wears the shield on his right arm in his own card's artwork, he wears it on his left arm here.
  * This card is named after the [[wikipedia:Black Turtle-Snake|Black Turtle-Snake]], one of the Four Symbols of the Chinese constellations ans that represents the North and the Winter season.
