title: Card Trivia:Mei-Kou, Master of Barriers
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Twilight Dance]]".
  * This monster's name is likely based on the Japanese reading of Kongming (''Kōmei''), the courtesy name of Chinese statesman [[wikipedia:Zhuge Liang|Zhuge Liang]], who has connections to Taoist folklores.
  * The symbol on this monster's barrier is a [[wikipedia:Triquetra|triquetra]], a symbol found in Celtic art and European runestones, albeit upside-down.
