title: Card Trivia:Right-Hand Shark
wikitext: |-
  {{Navigation}}

  * This monster features five fins distributed as if they were fingers, resembling a right hand.
  ** This physical trait is shared with its opposite [[counterpart]], "[[Left-Hand Shark]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|019|ref}}, specifically from the panel showing [[Right-Hand Shark (manga)|this monster]] being Summoned.
