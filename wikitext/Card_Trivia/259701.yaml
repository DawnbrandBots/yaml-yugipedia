title: Card Trivia:Battlin' Boxer Cheat Commissioner
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Phantom Knights' Possession]]".
  * This monster is based on the stereotypical sleazy manager in the sport of [[wikipedia:Boxing|boxing]], who will do anything to make sure their boxers fight and win.
  ** This reflects [[Alito]]'s change in personality due to [[Don Thousand]]'s influence in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, who will do anything to win, even resorting to dirty tricks. This is also reflected in this monster's effect to force the opponent's monster to attack.
  ** This monster's glasses, mustache, and large smile give it a particular resemblance to the real-life promoter [[wikipedia:Don King|Don King]].
