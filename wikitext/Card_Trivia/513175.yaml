title: Card Trivia:Elemental HERO Dark Neos
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Power of the Duelist]]'', ''[[Precious Pack Volume 1]]'', and ''[[Duelist Pack: Jaden Yuki 2]]''.
  * This monster appears in the artwork of "[[Instant Contact]]".
  * This monster is a [[Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Dark Panther]]".
  ** This monster has 4 claws in both of its two hands, like "Dark Panther".
  * In ''[[Yu-Gi-Oh! GX Tag Force]]'', this is the only "[[Neos]]" [[Fusion Monster]] that cannot be obtained from a Booster Pack in the game, along with "Neo-Spacian Dark Panther"; rather, it can only be obtained from using the Card Converter in the lab and convert 99 cards with it.
