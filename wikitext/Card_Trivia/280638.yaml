title: Card Trivia:Gravekeeper's Heretic
wikitext: |-
  {{Navigation}}

  * Similar to how the "[[Gravekeeper's]]" monsters released in the ''[[Yu-Gi-Oh! 5D's]]'' era whose designs are based on characters from the [[Ishtar]] family from the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], this monster (which was released in the ''[[Yu-Gi-Oh! ZEXAL]]'' era) is based on [[Marik Ishtar (manga)|Marik Ishtar]], who became a "heretic" by defying the Ishtar family's [[Tomb Keeper]] traditions by murdering [[Ishtar forefather (manga)|his father]] and leaving the tomb.
  ** This monster's design also resembles [[Thief King Bakura (manga)|Thief King Bakura]], whose physical features include the white hair and similarly torn clothes, and committed "heresy" by robbing the tomb of [[Akhenamkhanen (manga)|Pharaoh Akhenamkhanen]]. The ruins in the background of this card's artwork could also be a reference to the ruins of Bakura's village, [[Kul Elna]].
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Gravekeeper's Supernaturalist]]".
  * This is the only "Gravekeeper's" monster without any hieroglyphic symbols in the background of its artwork.
