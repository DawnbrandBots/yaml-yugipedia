title: Card Trivia:Kamionwizard
wikitext: |-
  {{Navigation}}

  * "Kamion" in this monster's ''[[TCG]]'' name is an anagram of "[[Konami]]".
  * This is retroactively the first "[[Chaos]]" monster to be released in the ''[[OCG]]''/''TCG''.
  ** Like most early [[Non-Effect]] [[Fusion Monster]]s, this monster was arbitrarily selected as a Fusion Monster, using the first of the many monster combinations used to [[Fusion Summon]] those monsters in the first ''[[Yu-Gi-Oh! Duel Monsters (video game)|Yu-Gi-Oh! Duel Monsters]]'' video game.
  *** Coincidentally, this monster's status as a "Chaos" monster is reflected in the [[Attribute]]s of its [[Fusion Material]]s: the [[LIGHT]] "[[Mystical Elf]]" and the [[DARK]] "[[Curtain of the Dark Ones]]".
  ** This monster's Japanese name, "Chaos Wizard", and its [[Fusion Material]]s make it a member of the "Chaos" [[archetype]] or [[series]], despite being the only member to not feature an [[archetype condition]] or an effect that revolves around [[support]]ing the "Chaos" [[Ritual Monster]]s or LIGHT and DARK monsters.
