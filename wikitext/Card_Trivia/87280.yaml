title: Card Trivia:Gyroid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Emergeroid Call]]" and "[[Roid Reinforcements]]".
  * This card appears in the original anime artwork of "[[Montage Dragon]]".
  * This monster is based on a [[wikipedia:Autogyro|gyrocopter]], a rotorcraft which allows the vehicle to fly in the air by lifting.
  * This is the first monster to feature an effect that couldn't be destroyed by battle with a '''once per turn''' restriction imposed on its effect.
