title: Card Trivia:Earthbound Immortal Revival
wikitext: |-
  {{Navigation}}

  * The heart of an "[[Earthbound Immortal]]" appears in this card's artwork.
  ** This card's artwork depicts the [[Summon]]ing of an "Earthbound Immortal" in the ''[[Yu-Gi-Oh! 5D's]]'' anime, where the heart is absorbing purple lights, which are the souls of the victims who are near or within the [[Nazca Lines|geoglyph]] representing the "Earthbound Immortal".
