title: Card Trivia:Punished Eagle
wikitext: |-
  {{Navigation}}

  * This is one of the first [[WIND]] monsters to appear in the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'']] anime, along with "[[Air Eater (anime)|Air Eater]]" and "[[Monstrous Bird (anime)|Monstrous Bird]]".
  ** This is also one of the first [[Winged Beast]] monsters to appear in the anime, along with "Monstrous Bird".
  ** This is also one of the first [[Fusion Monster]]s to appear in the anime, along with "[[Empress Judge]]", "[[Giltia the D. Knight]]", "[[Labyrinth Tank]], "[[Roaring Ocean Snake]]", and "[[Skelgon]]".
