title: Card Trivia:Z-Zillion Tank
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is a [[retrain]]ed counterpart of "[[Z-Metal Tank]]".
  ** This monster's name is based on "zillion", a slang term used to describe an extremely large quantity instead of an actual number.
