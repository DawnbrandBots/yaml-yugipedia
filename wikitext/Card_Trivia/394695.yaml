title: Card Trivia:Invoked Purgatrio
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Omega Summon]]".
  * "Purgatorio" (in this card's Japanese name) is Italian for "[[wikipedia:purgatory|purgatory]]", as well as the name of the [[wikipedia:Purgatorio|second act]] of the ''[[wikipedia:Divine Comedy|Divine Comedy]]'', set in the same place.
  ** "Purgatrio" in this card's ''TCG'' names is a portmanteau of the words "purgatory" and "trio", which is fitting, as this monster is composed of three creatures.
