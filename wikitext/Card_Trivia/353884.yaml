title: Card Trivia:Flower Cardian Cherry Blossom with Curtain
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Flower Stacking]]" and "[[Recardination]]".
  * "[[Curtain of the Dark Ones]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Cherry Blossom with Curtain", one of the special cards in the "Cherry Blossom" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (3) references how the "Cherry Blossom with Curtain" card falls under the month of March, the third month of the year.
  ** This monster's [[original ATK and DEF]] (2000/2000) references how the "Cherry Blossom with Curtain" card is a ''hikari'' card, which is worth twenty points.
  * This monster is tied with "[[Arsenal Bug]]" for the highest original ATK and DEF of all [[Level 3]] monsters.
  * This is the only [[Main Deck]] "[[Flower Cardian]]" monster used in the ''[[Yu-Gi-Oh! ARC-V]]'' anime to not to feature its base form revealed (not counting "[[Flower Cardian Maple with Deer]]", which falls under a different set of criteria due to what set of cards it is based on).
