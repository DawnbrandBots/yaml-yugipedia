title: Card Trivia:Sphinx of the Cycle
wikitext: |-
  {{Navigation}}

  * This monster is named after ''[[wikipedia:Chakravarti (Sanskrit term)|Chakravarti]]'', an ideal universal ruler in [[wikipedia:Indian religions|Indian religions]].
  ** This monster's base Japanese name (転輪, ''Tenrin'') translates to "wheel", which makes up the Japanese name for the ''Chakravarti'', the "King of the Wheel" (転輪王, ''Tenrin'ō''). The wheel sometimes refers to the cycle of the [[wikipedia:Sun|Sun]] and the [[wikipedia:Moon|Moon]], which reflects this monster's effect to [[Set]] "[[Book of Taiyou]]" and/or "[[Book of Moon]]" from the player's [[Deck]] and/or [[Graveyard]].
