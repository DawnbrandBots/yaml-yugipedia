title: Card Trivia:Bad Aim
wikitext: |-
  {{Navigation}}

  * "[[Igknight Veteran]]", "[[Igknight Cavalier]]", "[[Igknight Templar]]", "[[Igknight Margrave]]", and "[[Igknight Paladin]]" (in clockwise order from center) appear in this card's artwork.
  ** The events depicted reflect the flavor text of "Cavalier" and "Veteran": "Cavalier" has a tendency to attack her own comrades very frequently (most likely due to their treatment of her), while "Veteran" (who acts like a bodyguard to Cavalier) is one of the few concerned about her recklessness; in the artwork, "Veteran" is the only one trying to stop her assault, while "Paladin" seems to be 'blinded by love'.
  *** The events shown in the artwork of "[[Oops!]]" may be the aftermath of this.
