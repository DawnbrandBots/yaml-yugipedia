title: Card Trivia:Elemental HERO Burstinatrix
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Deck 2006]]''.
  * This monster appears in the artwork of "[[Burst Impact]]", "[[Burst Return]]", "[[Dark Fusion]]", "[[Elemental Recharge]]", "[[Fifth Hope]]", "[[Fire Ejection]]", "[[Generation Next]]", "[[H.E.R.O. Flash!]]", "[[HERO's Bond]]", "[[Hero's Backup]]", the fourth artwork of "[[Polymerization]]", and "[[Spiritual Fusion]]".
  * This card's original [[flavor text]] says that this monster is the only female "[[Elemental HERO]]" monster. While this was correct at time of its first print (which was with the release of ''[[The Lost Millennium]]''), with the release of fellow female "Elemental HERO" monsters "[[Elemental HERO Lady Heat|Lady Heat]]", "[[Elemental HERO Poison Rose|Poison Rose]]", "[[Elemental HERO Rampart Blaster|Rampart Blaster]]", and "[[Elemental HERO Shadow Mist|Shadow Mist]]", this is no longer the case.
  ** This card's flavor text was [[Card Errata:Elemental HERO Burstinatrix|changed]] as of ''[[Legendary Collection 2: The Duel Academy Years Mega Pack]]'' to say that this monster is the first female "Elemental HERO".
  [[File:KingofCopycatsDVD.png|thumb|right|250px|"Elemental HERO Burstinatrix" depicted in her slightly-modified original outfit on the "King of Copycats" DVD]]
  * On the cover of "The King of Copycats" DVD for the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this monster is depicted wearing a modified version of her original Japanese costume (albeit with a slightly more covered chest area) compared to the more modest, edited version she wears in the ''[[TCG]]'' and international dubbed versions.
  * Unlike the other members of the original [[Main Deck]] members of the "Elemental HERO" [[archetype]], this monster has no [[Fusion Monster]] that lists itself and "[[Elemental HERO Sparkman]]" as [[Fusion Material]]s.
