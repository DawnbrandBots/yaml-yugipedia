title: Card Trivia:Superheavy Samurai Big Benkei
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rise to Full Height]]".
  * This monster is based on [[wikipedia:Benkei|Benkei]], a warrior monk in Japanese folklore known for dying a standing death while guarding [[wikipedia:Minamoto no Yoshitsune|Minamoto no Yoshitsune]] during their final day.
  * This monster has a [[Pendulum Monster|Pendulum]] [[counterpart]]: "[[Superheavy Samurai Monk Big Benkei]]".
  * This is the initial [[signature card]] of [[Gong Strong]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This is the first monster to be [[Normal Summon]]ed and [[Tribute Summon]]ed in the ''Yu-Gi-Oh! ARC-V'' anime.
  * Along with "Superheavy Samurai Monk Big Benkei", this is the only [[legal]] monster to completely break the unwritten [[Conventions of 3000 ATK and DEF|convention of 3000 DEF]]: this monster has over 3000 [[DEF]], can be [[Normal Summon]]ed without conditions, and has no negative [[effect]]s.
  ** This monster also technically breaks the convention of 3000 ATK, as it can use its DEF when attacking.
