title: Card Trivia:Performapal Odd-Eyes Synchron
wikitext: |-
  {{Navigation}}

  * This card is the only "[[Synchron]]" monster to be revealed in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** It is also the first [[Spellcaster]] "Synchron" monster.
  ** It is also the first "[[Performapal]]" and "Synchron"  [[Tuner Pendulum Monster]].
  * This card's ''[[OCG]]''/''[[TCG]]'' [[Pendulum Effect]] is a reference to the anime card "[[Odd-Eyes Synchrogate]]", which enabled "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]" to be treated as a [[Level]] 1 [[Tuner monster]] for the [[Synchro Summon]] of "[[Odd-Eyes Wing Dragon (anime)|Odd-Eyes Wing Dragon]]".
