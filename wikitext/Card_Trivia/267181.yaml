title: Card Trivia:Super Vehicroid Jumbo Drill
wikitext: |-
  {{Navigation}}

  * In the anime, the propeller of "[[Submarineroid]]" can be seen on the back of this monster.
  * In the ''[[TCG]]'', this is the only "[[Vehicroid]]" monster to not feature a hyphen ("-") in its name while the other "Vehicroid" monsters feature the hyphen.
  * This is the [[signature card]] of [[Syrus Truesdale]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
