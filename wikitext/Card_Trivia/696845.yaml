title: Card Trivia:Traptrix Allomerus
wikitext: |-
  {{Navigation}}

  * "[[Traptrix Mantis]]" and "[[Traptrix Sera]]" appear in this card's artwork.
  * This monster is based on the ''[[wikipedia:Allomerus decemarticulatus|Allomerus decemarticulatus]]'', a species of small ants known for their symbiosis with the plant species ''[[wikipedia:Hirtella physophora|Hirtella physophora]]''. The ants construct traps on their host plant where they can ambush large insect prey.
