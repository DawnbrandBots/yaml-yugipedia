title: Card Trivia:Desert Protector
wikitext: |-
  {{Navigation}}

  * This card is the first monster card to have "Guardna" as the Japanese name yet the English name wasn't "Gardna".
  * This card loosely resembles an Acklay from the Star Wars series.
  * This card bears a resemblance with "[[Earthbound Immortal Uru]]" and "[[Beetron-3 Spider Base]]"
  * In the (remote) chance that every Spell and Trap, Field and Pendulum Zones on the field are occupied, this card would boost an astounding 1000 + 300 x (5 + 5 + 4 + 2) = 5800 DEF.
