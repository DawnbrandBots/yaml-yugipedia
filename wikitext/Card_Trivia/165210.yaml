title: Card Trivia:Ma'at
wikitext: |-
  {{Navigation}}

  * The seven [[Millennium Items]] appear in this card's artwork.
  * This monster is named after [[wikipedia:Ma'at|Ma'at]], the goddess of order, justice, and truth, representing the harmony of the universe in [[wikipedia:Egyptian mythology|Egyptian mythology]]. She is best known for her role in the judging of souls, in which the [[Feather of Ma'at]] would be placed on a scale and weighed against the heart of the person to be judged. If the heart was not weighed down by sin, it could progress into the afterlife; if it was, the demon [[Ammit]] would devour it.
  ** In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this monster's [[Fusion Material]]s, "[[Winged Kuriboh (manga)|Winged Kuriboh]]" and "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]", both had the Feather of Ma'at within them at some point in time.
  * This monster is the manga counterpart of "[[Neos Wiseman]]".
  ** Both monsters were originally [[Fusion Monster]]s in the ''[[Yu-Gi-Oh! GX]]'' anime and manga, but they were released as [[Main Deck]] [[Effect Monster]]s in the ''[[OCG]]''/''[[TCG]]''.
  ** Both monsters have similar [[Summoning condition]]s: this monster must be [[Special Summon]]ed from the [[hand]] by [[send]]ing a [[LIGHT]] [[Dragon]] monster and a LIGHT [[Fairy]] monster the player [[control]]s to the [[Graveyard]], while "Neos Wiseman" must be Special Summoned from the hand by sending a [[face-up]] "Elemental HERO Neos" and a face-up "Yubel" the player controls to the Graveyard.
  ** Both monsters were used by Jaden Yuki during his Duel against the final antagonist of the anime and manga; both were also [[Fusion Summon]]ed using two signature cards: "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]" and "[[Winged Kuriboh (manga)|Winged Kuriboh]]" for this monster, and "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" and "[[Yubel (anime)|Yubel]]" for "[[Neos Wiseman (anime)|Neos Wiseman]]".
  * This monster's ''OCG''/''TCG'' [[Summoning condition]] requiring the player to send one LIGHT Fairy monster and one LIGHT Dragon monster to the Graveyard references how it was Fusion Summoned using "Winged Kuriboh" (a LIGHT Fairy monster) and "Light and Darkness Dragon" (a LIGHT Dragon monster) in the manga.
  ** This monster's ''OCG''/''TCG'' effect to [[declare]] three card names, [[excavate]] the top three cards, and [[add]] any of the named cards to the hand is an alteration of its effect in the ''Yu-Gi-Oh! GX'' manga, which allows the player to declare a card name and [[draw]], use the card if guessed correctly, and [[activate]] the effect once again. In {{chapter|GX|064|ref}}, [[Jaden Yuki (manga)|Jaden Yuki]] used this effect six times, which is twice the amount than its real-life effect.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''Yu-Gi-Oh! GX'' manga, specifically from the panel showing [[Ma'at (manga)|this monster]] being Summoned.
