title: Card Trivia:D/D/D Wave King Caesar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[D/D/D Advance]]".
  * This card appears in the artwork of "[[Extra Recovery]]".
  * This monster's name is based on [[wikipedia:Julius Caesar|Gaius Julius Caesar]], the ruler of the [[wikipedia:Roman Empire|Roman Empire]] who launched military campaigns to expand his empire across [[wikipedia:Europe|Europe]] and the northern and western parts of [[wikipedia:Africa|Africa]].
  ** This is also the first monster to have the katakana 「シーザー」 (''Shīzā'') in its Japanese name, which is the anglicized pronunciation of "Caesar", read as "see-zar". The cards released before it instead used 「カイザー」 (''Kaīzā''), the original Roman/Greek/German pronunciation of "Caesar", read as "kai-zer".
  *** This is likely a play on the anglicized Japanese word for "sea" (シー ''Shī''), reflecting this monster's [[WATER]] [[Attribute]].
  * This is the first "[[D/D/D]]" [[Xyz Monster]].
  * This monster has an [[Card evolutions|upgraded]] form: "[[D/D/D Wave High King Caesar]]".
  * "[[D/D/D Wave Oblivion King Caesar Ragnarok]]" is a [[Fusion Monster|Fusion]] of "[[D/D/D Oblivion King Abyss Ragnarok]]" and this monster.
