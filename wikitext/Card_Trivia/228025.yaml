title: Card Trivia:CXyz Comics Hero Legend Arthur
wikitext: |-
  {{Navigation}}

  * This monster is the "[[CXyz]]" [[Card evolutions|evolution]] of "[[Comics Hero King Arthur]]".
  ** This monster is based on [[wikipedia:King Arthur|King Arthur]], the legendary king of [[wikipedia:Great Britain|Great Britain]] who is regarded as a central figure in medieval literature.
  *** The Japanese pronunciation of "Arthur" (アーサー, ''Āsā'') also sounds similar to "author", which reflects this monster's owner, [[Art Stanley]], who is the author of his comic book in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** Unlike other "CXyz" monsters, which bear little resemblance to their base form, this monster appears to visually be a corrupted version of "Comics Hero King Arthur" merged with a castle-like structure, given that bits of its white armor and locks of blonde hair are featured in this monster's design.
  * This is the first "CXyz" monster to not use all, if any, of its [[Xyz Material#In the anime|Chaos Overlay Units]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
