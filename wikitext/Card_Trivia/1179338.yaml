title: Card Trivia:Divine Abyss of the Sacred Beast
wikitext: |-
  {{Navigation}}

  * "[[Winged Kuriboh]]", the silhouette of "[[Uria, Lord of Searing Flames]]", and the foreground from the artwork of "[[Fallen Paradise]]" appear in this card's artwork.
  ** This card's artwork is a reference to a scene from {{episode|GX|049|ref}} where "[[Winged Kuriboh (later anime)|Winged Kuriboh]]" is attacked by "[[Uria, Lord of Searing Flames (anime)|Uria, Lord of Searing Flames]]" while the [[Field Spell Card]] "[[Fallen Paradise (anime)|Fallen Paradise]]" is active.
  * This card's first effect is based on the effect of the [[Continuous Trap Card]], "[[Delta Barrier]]", which was used to Summon "Uria, Lord of Searing Flames" in {{episode|GX|149|ref}}.
