title: Card Trivia:Blackwing Armed Wing
wikitext: |-
  {{Navigation}}

  * This monster appears to be wielding a [[wikipedia:shotgun|shotgun]] equipped with a [[wikipedia:bayonet|bayonet]].
  * This monster shares a similar orange-colored hair in its design and [[piercing]] effect as "[[Blackwing - Bora the Spear]]".
  ** Fittingly, this monster was first [[Synchro Summon]]ed using "Bora the Spear" in {{episode|5D's|044|ref}}.
  * In the English dubbed version of {{episode|5D's|095|ref}}, [[Crow]] mistakenly calls this card, "[[Blackwing Armor Master]]".
  * In the English edition of the ''[[Raging Battle]]'' set, this card's name features a double space between "Blackwing" and "Armed", implying that a hyphen ("-") was intended in that space similar to the naming scheme of the [[Main Deck]] "[[Blackwing]]" monsters, but was mistakenly omitted. In the English edition of ''[[Gold Series 3]]'', the double space was changed into a single space for the sake of consistent card names.
