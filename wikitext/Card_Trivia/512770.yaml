title: Card Trivia:Neo Aqua Madoor
wikitext: |-
  {{Navigation}}

  * This card is an enhanced version of "[[Aqua Madoor]]".
  * This monster has the highest [[DEF]] (3000) of all [[Spellcaster]] [[Normal Monster]]s.
  * This card has two counterparts:
  ** A [[Card evolutions|retrained]] counterpart, "[[Glacier Aqua Madoor]]"
  ** A [[Lightray]] counterpart: "[[Lightray Madoor]]".
  * This card's lore mentions an "ice wall" being conjured, while its original version features a liquid wall behind it.
