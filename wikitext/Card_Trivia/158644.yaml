title: Card Trivia:Force Resonator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Resonator Call]]".
  * This is the only "[[Resonator]]" monster to not be depicted wielding a tuning fork.
  * This monster's name and design is based on [[wikipedia:The Force|the Force]], a metaphysical power featured in the ''[[wikipedia:Star Wars|Star Wars]]'' franchise.
  ** This monster features lighting coming from its fingers, referencing the [[wikipedia:Sith|Sith emperor]] [[wikipedia:Palpatine|Palpatine]], who is known for attacking using Force lightning.
  *** Likewise, the object carried on this monster's back features markings that slightly resemblance the vent mouthpiece of [[wikipedia:Darth Vader|Darth Vader]]'s helmet, who serves as Palpatine's servant in the [[wikipedia:Star Wars original trilogy|''Star Wars'' original trilogy]].
  * The band on the orb is similar to the magical headband worn by [[wikipedia:Sun Wukong|Sun Wukong]], the legendary Monkey King in the classical Chinese epic novel ''[[wikipedia:Journey to the West|Journey to the West]]''.
