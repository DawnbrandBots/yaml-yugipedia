title: Card Trivia:True King of All Calamities
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Parametalfoes Fusion]]", "[[True Draco Apocalypse]]" and "[[True King's Return]]".
  * The English letters "V.F.D." in this monster's base Japanese name encompasses the other three "[[True King]]" monsters: "[[True King Agnimazud, the Vanisher|Agnimazud, the Vanisher]]", "[[True King Bahrastos, the Fathomer|Bahrastos, the Fathomer]]" ("'''F'''ührer" in its Japanese name), and "[[True King Lithosagym, the Disaster|Lithosagym, the Disaster]]". The English name less directly encompasses all of them by using the phrase "All Calamities" instead.
  ** This monster's Simplified Chinese name's "V.F.D." equivalent 「神子灾兽」 also includes one character each from the Simplified Chinese names of the other three "True King" monsters.
  ** "V.F.D." likely references the Latin phrase ''[[wikipedia:Vicarius Filii Dei|Vicarius Filii Dei]]'' ("Representative of the Son of God"), a phrase constructed by opponents of the [[wikipedia:Pope|Pope]] to associate him with the Beast. Extracting and summing the Roman numerals in this phrase (V + I + C + I + V + I + L + I + I + D + I), where "U" is taken as "V", results in 666, [[wikipedia:Number of the beast|the number of the beast]]. This aligns with use of "The Beast" as [[wikipedia:furigana|furigana]] for those letters.
  ** In Yu-Gi-Oh community, "V.F.D." is considered stand ironically for "Very Fun Dragon" due to its floodgate effects.
  * This monster's body possesses several eye-like incisions akin to those found on the "[[Amorphage]]" and "[[Dracoverlord]]" monsters.
