title: Card Trivia:The Hidden City
wikitext: |-
  {{Navigation}}

  * This city appears in the artwork of "[[Terrors in the Hidden City]]".
  * This card is based on [[wikipedia:Shambhala|Shambhala]].
  * Part of this card's Japanese name 「地中界」 (''Chichūkai'') is an homophone of 「地中海」, the Japanese name of the [[wikipedia:Mediterranean Sea|Mediterranean Sea]], with the kanji for "world" replacing the one for "sea". This ties into the the Japanese names of the "[[Subterror Behemoth]]s" being wordplays on parts and places of the latter.
