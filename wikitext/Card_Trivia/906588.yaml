title: Card Trivia:Metarion Vritrastar
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Extra Transcend Enhancement Pack]]''.
  * This monster appears in the artwork of "[[Imaginary Arc Surge]]".
  * This monster is based on [[wikipedia:Vritra|Vritra]], a legendary dragon from Hinduism that represents the embodiment of drough.
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Fullmetarion Vritrastar]]".
