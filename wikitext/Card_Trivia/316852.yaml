title: Card Trivia:Superheavy Samurai Warlord Susanowo
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Susanoo-no-Mikoto|Susanoo-no-Mikoto]], the god of the sea, storms, and fields in [[wikipedia: Japanese mythology|Japanese mythology]].
  ** This monster's Japanese title is based on "[[wikipedia:Kōjin|Kōjin]]", the god of the fire, the hearth, and the kitchen who represents the violent forces that can be controlled and used for a good purpose in Japanese mythology.
  * This is the first "[[Superheavy Samurai]]" [[Synchro Monster]].
  * This is the current [[signature card]] of [[Gong Strong]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This is the first monster to possess an [[archetype condition]] in the ''Yu-Gi-Oh! ARC-V'' anime.
  ** This monster, like "[[Number 39: Utopia Beyond]]", had its archetype condition reflected in a name change when released in the ''[[TCG]]''.
