title: Card Trivia:Kurivolt
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Re-Xyz]]" and "[[Voltage Summon]]".
  * The red lightning bolt on this monster's forehead resembles the red-spiked hairstyle of [[Yuma Tsukumo]], who used this card in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
