title: Card Trivia:Cyber Gymnast
wikitext: |-
  {{Navigation}}

  * This monster is based on a gymnast, an athlete who trains in [[wikipedia: Gymnastics|gymnastics]], a sport focusing on strength, balance, agility, and coordination.
  ** This monster's Japanese name, "Cyber Gymnatics", is a portmanteau of the words "gymnast" and "gymnastics".
