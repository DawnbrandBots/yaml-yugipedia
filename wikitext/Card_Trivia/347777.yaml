title: Card Trivia:The Winged Dragon of Ra - Sphere Mode
wikitext: |-
  {{Navigation}}

  * This monster is based on the Sphere Mode of "[[The Winged Dragon of Ra]]" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's [[Summoning condition]] allowing it to be [[Tribute Summon]]ed from either side of the field references a scene during [[Mai Kujaku and Dark Marik's Duel (manga)|Mai Kujaku and Dark Marik's Duel]] and its anime adaptation, where Mai took "[[The Sun Dragon Ra]]" ("[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]" in the anime) from Marik's [[hand]] with the effect of "[[Amazoness Chain Master (manga)|Amazoness Chain Master]]" (and its [[Amazoness Chain Master (anime)|anime counterpart]]) and Tribute Summoned it.
  ** This monster's effect preventing it from attacking references how Mai was unable to attack with "Ra" due to it being locked in Sphere Mode.
  ** This monster's effect to shift [[control]] to its [[owner]] and [[Special Summon]] "The Winged Dragon of Ra" from the hand or [[Deck]], [[Ignoring the Summoning conditions|ignoring its Summoning conditions]], references how Marik took control of "Ra" from Mai by during his turn by chanting the [[hieratic text]] on the card, allowing him to unlock "Ra" from its Sphere Mode.
  *** This monster's effect to make the Special Summoned "The Winged Dragon of Ra" gain 4000 [[ATK]]/[[DEF]] is a reference to its appearance in the ''[[Yu-Gi-Oh! Reshef of Destruction]]'' video game, where the player must first unlock the [[The Winged Dragon of Ra (Sphere Mode)|Sphere Mode]] and then its [[The Winged Dragon of Ra (Battle Mode)|Battle Mode]], which has 4000 ATK.
  * "[[Sphere Kuriboh]]" is based on this monster.
  * This is the first monster that can be [[Normal Summon]]ed to the opponent's field.
  * This is one of the two only monsters with an [[original ATK and DEF]] of ? to not have an effect to calculate its ATK and DEF (making them both 0), the other being "[[Holactie the Creator of Light]]".
  * This is one of the very few [[legal]] cards to not have a [[password]] at all, even considering those coded into video games.
  ** This is also the only ''TCG'' card to not have a password as of August 2023.
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|Yu-Gi-Oh!|221|ref}} showing [[Mai Kujaku (manga)|Mai Kujaku]] Tribute Summoning "[[The Sun Dragon Ra]]".
  ** This monster's ''Yu-Gi-Oh! Reshef of Destruction'' pose is taken from the title page of {{chapter|Yu-Gi-Oh!|222|ref}} showing "The Sun Dragon Ra" in its Sphere Mode.
