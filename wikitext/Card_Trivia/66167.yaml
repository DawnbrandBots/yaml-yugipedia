title: Card Trivia:Offering to the Snake Deity
wikitext: |-
  {{Navigation}}

  * "[[Vennominon the King of Poisonous Snakes]]" appears in this card's artwork.
  * This card was made for the effect of "[[Rise of the Snake Deity]]", as suggested by its name and having "Vennominon" featured as the "offering" ("Vennominon" being essential for the effect of the said card).
  * The German name of this card is "Opfer für den Schlangengott", however this translates into "Offering to the Snake God", meaning that the translators did not recognize the "snake deity" as "[[Vennominaga the Deity of Poisonous Snakes]]" and created a card name which implicates something is offered as a tribute '''to''' "Vennominon", not that "Vennominon" is sacrificed himself. The correct title would be "Opfer für die Schlangen'''gottheit'''", since "Vennominaga" is also called "'''Gottheit''' der giftigen Schlangen".
