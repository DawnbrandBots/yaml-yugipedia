title: Card Trivia:Dian Keto the Cure Master
wikitext: |-
  {{Navigation}}

  * The woman in this card's artwork appears in the artworks of "[[Healing Wind]]" and "[[Master's Cure]]" (dressed in the robe from the card's international artwork).
  * This card is likely based on [[wikipedia:Dian Cecht|Dian Cecht]] (pronounced ''Dian Kehito'' in Japanese), the god of healing in [[wikipedia:Irish mythology|Irish mythology]].
  * This card has six younger ''[[Rush Duel]]'' [[Monster Card]] counterparts: "[[Dian Keto the Boogie Master]]", "[[Dian Keto the Security Master]]", "[[Dian Keto the Cooking Master]]", "[[Dian Keto the Cure Prodigy]]", "[[Dian Keto the Food Prodigy]]", and "[[Dian Keto the Cleaning Prodigy]]".
  * In the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, this card's Japanese artwork was used instead of its ''[[TCG]]'' artwork.
  * In [[Yu-Gi-Oh! ARC-V - Episode 001|the first]] and [[Yu-Gi-Oh! ARC-V - Episode 003|third]] of the ''[[Yu-Gi-Oh! ARC-V]]'' anime, the advertisements depict the woman in this card's artwork wearing a business suit.
  * This card's Spanish name is "Dian Keto el Señora de la Curación". This is odd, since the article "el" in Spanish refers to male, and "Dian Keto" is female, as "Señora" is translated to "woman" or "madam".
