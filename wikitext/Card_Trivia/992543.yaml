title: Card Trivia:Earth Pressure Explosion
wikitext: |-
  {{Navigation}}

  * "[[Magmassage]]" appears in this card's artwork.
  * The Japanese word for "Earth Pressure" (ちあつ, ''Chiatsu'') is similar to the pronunciation of ''[[wikipedia:Shiatsu|shiatsu]]'', a form of massage that utilizes the hands, thumb, or other body parts, to apply direct pressure on various points or channels in the body.
