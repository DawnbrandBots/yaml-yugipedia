title: Card Trivia:Witchcrafter Madame Rilliona
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Revolution Booster: Toon / Witchcrafter / Unchained]]''.
  * This monster appears in the artworks of "[[Witchcrafter Celebration]]" and "[[Witchcrafter Walpurgis]]".
  ** A highly-stylized portrait resembling her also appears in the artwork of "[[Witchcrafter Patronus]]".
  * This monster is the true form of "[[Witchcrafter Madame Verre]]", having regained the adult appearance she originally had as "[[Rilliona, the Magistus of Verre]]".
  ** This regaining of her former appearance is likely the reason for her disappearance in "[[Witchcrafter Confusion Confession]]" and subsequent return in "Witchcrafter Celebration".
  ** "[[Witchcrafter Distortion]]" appears to depict her reverting back into "Verre", likely suggesting the hat she wears is responsible for said appearance (or at least the ability to maintain it).
