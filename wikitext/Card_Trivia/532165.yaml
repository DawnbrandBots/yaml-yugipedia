title: Card Trivia:Dai Dance
wikitext: |-
  {{Navigation}}

  * "[[D.D. Warrior Lady]]" and "[[Warrior Dai Grepher]]" appear in this card's artwork.
  ** Fittingly, "D.D. Warrior Lady" can [[banish]] herself into the "[[Different Dimension]]", and "Warrior Dai Grepher" has appeared in numerous "[[Different Dimension Ground|Different Dimension]]" [[Dimension Wall|related]] [[Dimensional Inversion|cards]].
  ** Furthermore, the two monsters are often depicted as rivals: they are seen battling in "[[Simultaneous Loss]]" (with "D.D. Warrior Lady" in her [[Warrior Lady of the Wasteland|previous form]]), "Dimension Wall" and "Different Dimension Ground" (after "Dai Grepher" became "[[Dark Lucius LV4]]"). Here, he attempts to court her, much to her visible chagrin.
  ** This card's artwork suggests this scene occurs right after the one in "[[Unexpected Dai]]".
  * This card's name is a pun on ''guidance''; its effect "guides" the opponent's [[Summon]]ed monster to a zone chosen by the player who [[activate]]d this card.
