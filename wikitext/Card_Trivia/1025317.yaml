  * This card is a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[Normal Trap]] counterpart of "[[De-Fusion]]".
  ** Just like the name of "[[Fusion (Rush Duel)|Fusion]]" is a direct translation of the Japanese name of "[[Polymerization]]", this card's name is a direct translation of the Japanese name of "De-Fusion".
