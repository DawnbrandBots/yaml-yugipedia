title: Card Trivia:Manticore of Smashing
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Manticore of Darkness]]", depicted performing the action in the artwork of "[[Smashing Ground]]".
  ** Both aforementioned cards debuted in the same [[Core Booster|Core Booster pack]]: ''[[Invader of Darkness (set)|Invader of Darkness]]'' (''[[OCG]]'') / ''[[Invasion of Chaos]]'' (''[[TCG]]'').
