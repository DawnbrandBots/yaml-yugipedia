title: Card Trivia:Vylon Sigma
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duel Terminal - Vylon Descends!!]]''.
  * This card has an evolved Xyz version: "[[Vylon Disigma]]".
  * [[wikipedia:Sigma|Sigma]] is the eighteenth letter of the Greek alphabet.
  ** The Roman numerals engraved on its chest (XVIII) indicates this order.
  ** This card also has 1800 ATK, which also indicates the statements above.
  * This card's body also slightly resembles an uppercase Sigma "Σ" when viewed from the side, while the golden rings on its back and around its arms are shaped like a lowercase Sigma "σ".
  * This card is the first [[Synchro Monster]] to require all of the Synchro Material Monsters to be [[LIGHT]] Attribute. "[[Light End Dragon]]" along with "[[Vylon Delta]]" requires non-Tuner LIGHT Monsters and "[[Ancient Sacred Wyvern]]", along with "[[Vylon Epsilon]]",  requires a LIGHT Tuner to Synchro Summon it.
  * This card's summoning requirements almost match that of "[[Trident Dragion]]", except that this card requires all [[LIGHT]]-Attribute Synchro Material Monsters instead of Dragon-type Synchro Material Monsters.
  ** Both this card and "[[Trident Dragion]]" also have effects that can facilitate [[One Turn Kill]] strategy.
  * This card is one of the few (if not only) monsters that can equip an Equip Spell Card without actually 'activating' it, and also with the ability of equipping cards straight from the Deck without adding it to the hand first.
  * This card is also one of the few monsters that can only activate its effect while it is the only monster the player controls (as opposed to most archetype-related monsters).
