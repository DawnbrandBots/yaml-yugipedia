title: Card Trivia:Immortal Dragon
wikitext: |-
  {{Navigation}}

  * This monster is the [[Zombie counterpart]] of "[[Coral Dragon]]", and thus the [[Card evolutions|adult]] form of "[[Tatsunecro]]" (who is the Zombie counterpart of "[[Tatsunoko]]"). As with its earlier form, its [[ATK]]/[[DEF]] values are the reverse of its counterpart.
