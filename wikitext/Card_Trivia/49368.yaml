title: Card Trivia:Speed Spell - Zero Reverse
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Coach Goblin]]" appears in this card's artwork.
  * This card has an identical name to [[Zero Reverse|the disastrous event]] caused by an intentional overload to the [[Ener-D]] system, which resulted in [[New Domino City]] being split into two prior to the beginning of the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** The lead developers of the Ener-D system by [[Yusei Fudo]]'s parents, who were among the victims of the Zero Reverse disaster. Ironically, this card was used by Yusei himself, and its effect [[Special Summon]]s a monster from the [[Graveyard]] instead of [[destroy]]ing a card.
  *** The name "Zero Reverse" in Japanese (ゼロ・リバース, ''Zero Ribāsu'') can also be read as "Zero Rebirth", corresponding to this card's effect of Special Summoning a monster from the Graveyard and making its [[ATK]] 0.
  * Non-Japanese translations for this card in the localized video games neglect to mention that its effect can only Special Summon one monster that was destroyed by a card effect that turn.
