title: Card Trivia:Corruption Cell "A"
wikitext: |-
  {{Navigation}}

  * The creature in this card's artwork serves as an [[A-Counter]], which takes the form of a gelatinous cell.
  ** This cell appears in the artwork of "[["A" Cell Recombination Device]]", "[["A" Cell Scatter Burst]]", "[[Mass Hypnosis]]", and "[[Planet Pollutant Virus]]".
