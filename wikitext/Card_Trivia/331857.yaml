title: Card Trivia:Speedroid Taketomborg
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Bamboo-copter|bamboo-copter]], a toy helicopter rotor made of bamboo that can fly up when its shaft is rapidly spun.
  ** This monster's Japanese name (タケトンボーグ, ''Taketonbōgu'') is a portmanteau of the words for "bamboo-copter" (竹蜻蛉, ''taketombo'') and "(cy)borg" (ボーグ, ''bōgu'').
