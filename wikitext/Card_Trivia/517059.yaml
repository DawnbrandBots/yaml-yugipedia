title: Card Trivia:Giant Hades Stag Beetle
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is based on [[wikipedia:Hades|Hades]], the Greek god of the dead and the king of the underworld in [[wikipedia:Greek mythology|Greek mythology]].
  ** This monster is also also based on the [[wikipedia:Stag beetle|stag beetle]], a species of beetle where the males are known for their branched pincers resembling the antlers of a [[wikipedia:Stag|stag]], a male deer.
  ** In the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, this monster was used by [[Sect Ijuin]] during his second [[Duel]] with [[Yusei Fudo (manga)|Yusei Fudo]] alongside "[[Archfiend Uber Dragon Beelzeus (manga)|Beelzeus of the Diabolic Dragons]]" and "[[Great Poseidon Beetle (manga)|Great Poseidon Beetle]]". This is a reference to Hades [[wikipedia:Zeus|Zeus]] and his two brothers, [[wikipedia:Poseidon|Poseidon]] and Hades, who each received the sky, the sea, and the underworld after defeating the [[wikipedia:Titans|Titans]].
  *** Ironically, despite the above-mentioned facts, this monster's appearance is female.
