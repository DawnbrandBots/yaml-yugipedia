title: Card Trivia:Extra Pendulum
wikitext: |-
  {{Navigation}}

  * "[[Odd-Eyes Rebellion Dragon]]", "[[Xiangke Magician]]", and "[[Xiangsheng Magician]]" appear in this card's artwork.
  ** This card's artwork is a reference to how [[Yuya Sakaki]] often used the [[Pendulum Effect]]s of "[[Xiangke Magician (anime)|Xiangke Magician]]" and "[[Xiangsheng Magician (anime)|Xiangsheng Magician]]" to change the [[Rank]] of "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]" from 4 to [[Level]] 7, and then used it and "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]" as [[Xyz Material]]s to [[Xyz Summon]] "[[Odd-Eyes Rebellion Dragon (anime)|Odd-Eyes Rebellion Dragon]]".
  *** However, despite this card's artwork, Yuya never [[Pendulum Summon]]ed "Odd-Eyes Rebellion Dragon" with "Xiangke Magician" and "Xiangsheng Magician" in the Pendulum Scale; this card's artwork likely depicts the Pendulum Summon of "Odd-Eyes Rebellion Dragon" with this card's effect.
  * This card's name, "Extra Pendulum", reflects its effect to allow the player to conduct a [[Pendulum Summon]] of a monster from the [[Extra Deck]], in addition to their Pendulum Summon.
  ** Its Japanese name, "EXP", is a portmanteau of the shorthand terms "EX" and "P", both used in Japanese card text to refer to the Extra Deck and "Pendulum" respectively.
