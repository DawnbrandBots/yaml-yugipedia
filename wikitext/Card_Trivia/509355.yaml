title: Card Trivia:Arsenal Robber
wikitext: |-
  {{Navigation}}

  * "[[Twin Swords of Flashing Light - Tryce]]" appears in this card's artwork.
  * The thief in this card's artwork also appears in the artwork of "[[Arsenal Audit]]".
  * The robber very much resembles a [[fandom:w:c:https://starwars.fandom.com/wiki/Jawa:Jawa|Jawa]] from Star Wars. The depiction of a Jawa would make sense, as Jawas are scavengers.
