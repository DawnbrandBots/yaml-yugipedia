title: Card Trivia:Gamble
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the hand holding the coin with two cards on their side, reflecting this card's [[activation condition]], while the other side of the table features five cards, reflecting the number of cards the player can [[draw]] if they call the [[coin toss]] correctly.
  * This card's Spanish features an errata, as the Spanish word for "skip" ("''s'''á'''ltate''") is written as "''s'''a'''ltate''". Likewise, it shares with many old cards of the ''[[TCG]]'' Spanish branch the lack of a diacritic acute accent in the word "''s'''o'''lo''" ("only", currently rendered as "''s'''ó'''lo''").
