title: Card Trivia:Level Down!?
wikitext: |-
  {{Navigation}}

  * "[[Armed Dragon LV7]]" and the spectral form of "[[Armed Dragon LV10]]" appear in this card's artowrk.
  ** This card's artwork depicts "Armed Dragon LV10" being downgraded to "Armed Dragon LV7".
  * This card's name and effect are the opposite of those of "[[Level Up!]]".
  ** This card's name is nearly identical to that of [[Anime-only|anime-exclusive]] "[[Level Down!]]", another card that [[support]]s the "[[LV]]" [[archetype]].
  * This is the first card to use an [[wikipedia:Interrobang|interrobang]], a punctuation mark that combines the functions of both a [[wikipedia:Question mark|question mark]] and an [[wikipedia:Exclamation mark|exclamation mark]], in its name.
