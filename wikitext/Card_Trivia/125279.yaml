title: Card Trivia:Quick Summon
wikitext: |-
  {{Navigation}}

  * This card is a [[Quick-Play Spell Card|Quick-Play]] version of "[[Double Summon]]".
  ** A key difference between both cards is that "Double Summon" changes the maximum number of [[Normal Summon]]s/[[Set]]s the player can conduct in the turn it is [[activate]]d, whereas this card simply causes a player to Normal Summon via card effect without using their regular Normal Summon/Set for the turn (or any additional such Summons granted by effects like "Double Summon").
