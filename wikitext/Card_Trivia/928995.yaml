title: Card Trivia:CAN:D ALL
wikitext: |-
  {{Navigation}}

  * This monster is an adult version of "[[CAN:D]]".
  ** This monster's name is a portmanteau of "CAN:D" (which is itself a spelling of "candy" using the smiling [[wikipedia:emoticon|emoticon]] ":D") and "doll".
  * This monster is a [[LIGHT]] counterpart to "[[Amabear Lilith]]".
  ** Both monster share the same [[Level]] (4), [[Type]] ([[Psychic]]), [[ATK]] (2000) and [[DEF]] (1500).
  ** Both monsters are [[Fusion Monster]]s that use "[[Ice Pop Bear]]" as [[Fusion Material]].
  ** Both monsters' artwork feature the same background (with different colors).
