title: Card Trivia:Rank-Up-Magic Zexal Force
wikitext: |-
  {{Navigation}}

  * The "X" from the ''[[Yu-Gi-Oh! ZEXAL]]'' logo appears in this card's artwork.
  ** The background of this card's artwork also features the red and blue colors, each respectively assumed by [[Yuma Tsukumo]] and [[Astral]] when they [[Overlay Network|Overlay]] themselves into their [[ZEXAL (power)|ZEXAL]] forms in the anime.
  * This card's effects, allowing the player to place a "[[ZW -]]" or "[[ZS -]]" monster on the top of their [[Deck]] and its additional [[draw]]ing effect, references [[Shining Draw]], an ability used by Yuma and Astral in their ZEXAL forms to draw the members of the aforementioned [[archetype]]s.
