title: Card Trivia:Stadium of Dreams
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on a [[wikipedia:Football pitch|soccer stadium]] (or "football pitch"), a playing field in which the game of [[wikipedia:Association football|soccer]] takes place.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this card is used in an [[Augmented Reality Duel]], it not only transforms the surrounding area into a soccer stadium, but also changes the appearances of the Duelists, spectators, and monsters, including:
  ** Transforming the opponent's outfit into a soccer player uniform (in the case of [[Yuma Tsukumo]]).
  ** Transforming the spectators' outfits into cheerleaders (in the case of [[Tori Meadows]], who is accompanied by holograms of her friends, [[Jen]] and [[Summer (character)|Summer]]) or commentators (in the case of [[Caswell Francis]] and [[Cathy Katherine]]).
  ** Giving the non-[[Soccer]] monsters a soccer player uniform (unless they already have one) and removing their weapons; instead, monsters attack by kicking a soccer ball rather than using their normal attacks.
