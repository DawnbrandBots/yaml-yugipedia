title: Card Trivia:Galaxy-Eyes Full Armor Photon Dragon
wikitext: |-
  {{Navigation}}

  * This monster has the same ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] as "[[Number 95: Galaxy-Eyes Dark Matter Dragon]]".
  ** Both monsters' Japanese names are written without kanji.
  ** Both monsters were used by [[Kaito Tenjo (manga)|Kaito Tenjo]] in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  * This card's artwork is taken from {{chapter|ZEXAL|037|ref}}, specifically from the panel showing [[Galaxy-Eyes Full Armor Photon Dragon (manga)|this monster]] being Summoned.
