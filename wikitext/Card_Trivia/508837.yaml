title: Card Trivia:Scarr, Scout of Dark World
wikitext: |-
  {{Navigation|other=[[Scarr, Scout of Dark World (character)|Character]]}}

  * This monster appears in the artwork of "[[One for One]]", "[[The Forces of Darkness]]", and "[[Thousand Buster]]".
  * This card's name is the "[[Dark World]]" color pun for the word [[wikipedia:scarlet (color)|scarlet]].
  * This card's Chinese name, 猩紅卡, is a combination of 猩紅 ("scarlet") and 卡 ''kǎ'' ([[wikipedia:Transcription into Chinese characters|transcription]] of the [[wikipedia:Phoneme|phoneme]] sequence /kɑː/ as in ''s'''car'''let'').
  * This card and "[[Cobal, Excavator of Dark World]]" are the two only "[[Dark World]]" monsters whose [[Card effect|effect]] doesn't involve [[discard]]ing cards or have their effects [[activate]]d when discarded, excluding "[[Clorless, Chaos King of Dark World]]" as its effects were never shown in the anime.
