title: Card Trivia:Time Magic Hammer
wikitext: |-
  {{Navigation}}

  * The silhouette of "[[Time Wizard]]" appears in this card's artwork.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster was created by fusing "Time Wizard" with "[[The Claw of Hermos]]".
  *** Fittingly, this monster shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (2), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (500/400) as "Time Wizard".
  *** Also, in the ''Yu-Gi-Oh!'' anime, this monster's effect is referred to as being able to send the monsters it affects to the future, similar to the time-based anime effects of "Time Wizard".
  * This is the first:
  ** "The Claw of Hermos" [[Fusion Monster]] to appear in the ''Yu-Gi-Oh!'' anime.
  ** [[Level 2]] Fusion Monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  ** Card to include the phrase "Nth" in its card text.
