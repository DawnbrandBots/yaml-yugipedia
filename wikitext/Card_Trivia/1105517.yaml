  {{Navigation}}

  * This monster's name is Latin for "Daughter of the King."
  * This monster, "[[NT8000 - SIRIUS]]", and "[[Juraishin, the Cursed Thunder God]]" were announced one after the other<ref>{{cite web | url = https://x.com/YuGiOh_OCG_INFO/status/1872975794768621630 | title = вӢ…вӢҶвӢ„вң§рқҳјрқҷҮрқҷҮрқҷ„рқҳјрқҷүрқҳҫрқҷҖ рқҷ„рқҷүрқҷҺрқҷ„рқҷӮрқҷғрқҷҸ рқҹҗрқҹҺрқҹҗрқҹ“.рқҹҸ.рқҹҗрқҹ“ рқҗ’рқҗҡрқҗӯ вң§вӢ„вӢҶвӢ… в—ҶеҸҺйҢІгӮ«гғјгғүе…¬й–Ӣв—Ҷ в—ӨNTпјҳпјҗпјҗпјҗпјҚSIRIUSв—ў еҸҺйҢІвқ—пёҸ | publisher = е…¬ејҸгҖ‘йҒҠжҲҜзҺӢOCG (X) {{icon|jp}} | accessdate = December 31, 2024 | date = December 28, 2024 }}</ref><ref>{{cite web | url = https://x.com/YuGiOh_OCG_INFO/status/1873338178897326276 | title = вӢ…вӢҶвӢ„вң§рқҳјрқҷҮрқҷҮрқҷ„рқҳјрқҷүрқҳҫрқҷҖ рқҷ„рқҷүрқҷҺрқҷ„рқҷӮрқҷғрқҷҸ рқҹҗрқҹҺрқҹҗрқҹ“.рқҹҸ.рқҹҗрқҹ“ рқҗ’рқҗҡрқҗӯ вң§вӢ„вӢҶвӢ… вңҰеҸҺйҢІгӮ«гғјгғүе…¬й–ӢвңҰ в—ӨеҰ–з«ңгҒ®зҰҒе§«в—ў еҸҺйҢІвқ—пёҸ | publisher = е…¬ејҸгҖ‘йҒҠжҲҜзҺӢOCG (X) {{icon|jp}} | accessdate = December 31, 2024 | date = December 29, 2024 }}</ref><ref>{{cite web | url = https://x.com/YuGiOh_OCG_INFO/status/1874002560853364808 | title = вӢ…вӢҶвӢ„вң§рқҳјрқҷҮрқҷҮрқҷ„рқҳјрқҷүрқҳҫрқҷҖ рқҷ„рқҷүрқҷҺрқҷ„рқҷӮрқҷғрқҷҸ рқҹҗрқҹҺрқҹҗрқҹ“.рқҹҸ.рқҹҗрқҹ“ рқҗ’рқҗҡрқҗӯ вң§вӢ„вӢҶвӢ… вңҰеҸҺйҢІгӮ«гғјгғүе…¬й–ӢвңҰ в—Өе‘Әйӣ·зҘһгӮёгғҘгғ©в—ў еҸҺйҢІвқ—пёҸ | publisher = е…¬ејҸгҖ‘йҒҠжҲҜзҺӢOCG (X) {{icon|jp}} | accessdate = December 31, 2024 | date = December 31, 2024 }}</ref>, and are likely meant to tie in with the themes featured in the ''[[Quarter Century Trinity Box]]''. This monster, due to being a [[Dragon]] [[Fusion Monster]] with effects that rely on [[return]]ing Dragon monsters from the [[field]] to the [[hand]], is an indirect support to the "[[Dragonmaid]]" [[archetype]].

