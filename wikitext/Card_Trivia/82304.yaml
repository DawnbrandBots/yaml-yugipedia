title: Card Trivia:Wrath of Neos
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Neos]]" appears in this card's artwork.
  ** This card's name is a reference to the [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "[[Elemental Hero Neos (anime)|Elemental HERO Neos]]" in the Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime: "Wrath of Neos". In the English dubbed version, it's known as "Cosmic Crush".
