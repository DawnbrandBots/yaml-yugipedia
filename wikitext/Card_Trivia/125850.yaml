title: Card Trivia:Gachi Battle
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The robots in this card's artwork is likely based on [[wikipedia:Rock 'Em Sock 'Em Robots|Rock 'Em Sock 'Em Robots]].
  ** The two robots on this card reference [[wikipedia:Gigantor|Gigantor]] and [[wikipedia:Astro Boy|Astro Boy]], as they share similarities in design.
  ** Also, the pose featured on this card is a recurring pose used in anime, first appearing in a battle between Goku and Vegeta in ''[[wikipedia:Dragonball Z|Dragonball Z]]'', but it has been referenced to many times in other anime.
