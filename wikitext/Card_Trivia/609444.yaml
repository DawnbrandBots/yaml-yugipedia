title: Card Trivia:Saryuja Skull Dread
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Mega Pack 01]]''.
  * The artwork and effect of "[[Saryuja's Shackles]]" are based on this card.
  ** The baby dragon that appears in that card's artwork is possibly "Saryuja" before it was corrupted.
