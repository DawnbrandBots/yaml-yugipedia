title: Card Trivia:Branded Fusion
wikitext: |-
  {{Navigation}}

  * "[[Lubellion the Searing Dragon]]" and "[[Mirrorjade the Iceblade Dragon]]" appear in this card's artwork.
  ** The events in this card's artwork are a continuation of those depicted in the artwork of "[[Branded Lost]]": "[[Albion the Shrouded Dragon]]" ("[[Fallen of Albaz]]") has absorbed the power of "[[Icejade Kosmochlor]]" and "[[Swordsoul Supreme Sovereign - Chengying]]", transforming into "Mirrorjade" to fight "[[Aluber the Jester of Despia]]" (who himself turned into "Lubellion"), with their clashes eventually causing them to fuse into "[[Alba-Lenatus the Abyss Dragon]]".
  ** The poses of the two above-mentioned monsters in this card's artwork is similar to those of the two figures appearing in the [[Polymerization (alternate password)|alternate password]] version of "[[Polymerization]]", in which both cards' artworks depict two monsters spiraling around each other until they fuse together.
