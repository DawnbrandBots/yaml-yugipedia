title: Card Trivia:Speedroid Razorang
wikitext: |-
  {{Navigation}}

  * This monster's [[Defense Position]] form appears in the artwork of "[[Speed Turn (ARC-V)|Speed Turn]]".
  * This monster is based on a [[wikipedia:Boomerang|boomerang]], a flat curved piece of wood that can be thrown so that it will return to the thrower.
  ** This monster's Japanese name, "Shave Boomerang" (シェイブー・メラン, ''Sheibū Meran'') is a portmanteau of "shave" (シェイブ, ''sheibu'') and "boomerang" (ブーメラン ''būmeran''), the former word reflecting its effect to "shave" off a monster's [[ATK]] by 800.
  * While in Defense Position, this monster folds its arms against its upper torso, changing into a large boomerang. This transformation resembles that of the "[[Morphtronic]]" monsters, which also change from robotic monsters into household objects when turned to Defense Position.
