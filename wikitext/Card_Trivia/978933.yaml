title: Card Trivia:Amusi Howling Performer
wikitext: |-
  {{Navigation}}

  * This monster appears in both artworks of "[[Amusi Annoyance]]".
  * This monster's name is based on [[wikipedia:Amusia|amusia]], a musical disorder that is also known as being "tone deaf", in which someone is unable to recognize or produce musical tones.
  ** Fittingly, this card's artwork indicates that this monster as tone deaf, as evidenced by the broken musical notes in the artwork.
