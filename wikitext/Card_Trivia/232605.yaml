title: 'Card Trivia:Number 42: Galaxy Tomahawk'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster is based on the [[wikipedia:Northrop B-2 Spirit|Northrop B-2 Spirit]], an American heavy strategic bomber aircraft that is also known as the Stealth Bomber.
  * This is the first [[WIND]] "[[Number]]" monster.
  * This is the first [[Xyz Monster]] that can [[Special Summon]] [[Token]]s.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|023|ref}}, specifically from the panel showing [[No. 42: Galaxy Tomahawk (manga)|this monster]] being Summoned.
