title: Card Trivia:Gishki Natalia
wikitext: |-
  {{Navigation}}

  * This monster appears in "[[Trial and Tribulation]]" as a tearful "[[Gishki Noellia]]" holds the dying "Natalia" in her arms (possibly before she returns as a spirit) before being consumed by the evil of the "Steelswarms".
  ** According to the Duel Terminal Master Guide, "Natalia" was the childhood friend of "[[Gishki Noellia]]", and also the mother of "[[Gishki Avance]]". She lost her life when she and "Noellia" tried to use [[Steelswarm|demons]] to fight their [[Fabled|enemies]].
  * This monster is the "[[Gishki]]" counterpart of "[[Judge of the Ice Barrier]]".
