title: Card Trivia:Gatebridgeo the Waterfront Warbeast
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Tokyo Gate Bridge|Tokyo Gate Bridge]], a truss cantilever bridge spanning across Tokyo Bay in Kōtō, Tokyo, Japan.
  * This is the only [[Match winner]] runner-up card to have the same [[Level]] (7) and [[original ATK]] (2500) as its corresponding champion card ("[[Masterful Magician, Servant of the Sanctuary]]").
