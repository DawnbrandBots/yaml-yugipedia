title: Card Trivia:Gouki Tagpartner
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gouki Roar]]" and "[[Gouki Unity]]".
  * This monster's name is a reference to [[wikipedia:Tag team|tag team wrestling]], a type of [[wikipedia:Professional wrestling|professional wrestling]] where multiple wrestlers work together as partners during matches, mostly in teams of two.
  ** In tag-team matches, each tag-team partner can switch out with their partner outside of the ring, which allows them to perform [[wikipedia:professional wrestling double-team maneuvers|double-team maneuvers]]. This reflects how this monster's effect [[activate]]s when it is "switched out" with a "[[Gouki]]" [[Link Monster]] it is used to [[Link Summon]], allowing it to gain an additional 1000 [[ATK]].
