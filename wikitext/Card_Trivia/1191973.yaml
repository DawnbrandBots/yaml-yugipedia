title: Card Trivia:Zapper Shrimp
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Alpheidae|pistol shrimp]], a shrimp that has an enlarged claw capable of making powerful snaps that can generate [[wikipedia:Cavitation|cavitation]] bubbles launched at high speeds. 
  ** For this monster, its enlarged claw has been replaced with a [[wikipedia:Railgun|railgun]], a linear motor device that uses electromagnetic force to launch projectiles at high speeds, hence its ''[[TCG]]'' ("Zapper Shrimp") and ''[[OCG]]'' (''Denjiebi'', "Electromagnetic Shrimp") names.
