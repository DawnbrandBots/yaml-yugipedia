title: Card Trivia:Firewall Saber Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[Synchro Monster|Synchro]] [[counterpart]] of "[[Firewall Dragon]]".
  ** The "S" in this monster's Japanese name and its white electronic lines further reference its Synchro Monster [[card type]].
  * This monster is the rival counterpart of "[[Borreload Savage Dragon]]".
  ** Both are Synchro counterparts of [[Yusaku Fujiki]] and [[Ryoken Kogami|Varis]]' [[signature card]]s.
  ** Both have a common naming scheme where the "S" in their Japanese names stands for another word.
  * This monster's armor and its purple color scheme are similar to "[[Dark Templar @Ignister]]", which fits how this monster [[support]]s the "[[A.I.]]" [[archetype]], which in turn supports the "[[@Ignister]]" archetype. 
  ** This monster's name references how "Dark Templar @Ignister" and "[[Decode Talker]]" each used a sword as their weapon, while this monster's design includes metal blades for its wings, elbows, and tail tips.
