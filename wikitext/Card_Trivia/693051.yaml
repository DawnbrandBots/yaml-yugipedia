title: Card Trivia:Bujinki Ahashima
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bujincandescence]]".
  * This monster is named after ''[[wikipedia:Kuniumi|Awashima]]'', one of the children of the gods ''[[wikipedia:Izanagi|Izanagi]]'' and ''[[wikipedia:Izanami|Izanami]]'' from [[wikipedia:Japanese mythology|Japanese mythology]].
  ** Awashima, along with ''[[wikipedia:Ebisu|Hiruko]]'', are often referred as "the failed children" of Izanagi and Izanami. Awashima was born after Hiruko, which makes her the younger sister of Hiruko.
  ** This monster's Japanese name is written using [[wikipedia:Historical kana orthography|historical ''kana'' orthography]], which renders the ''wa'' syllable with 「ハ」, read as ''ha'' in current usage.
  ** Similar to the [[Level 4]] [[Beast-Warrior]] "[[Bujin]]" monsters, this monster resembles a character from the ''[[Yu-Gi-Oh! GX]]'' anime: [[Sarina]], who is also fittingly the younger sister of [[Sartorius]] (depicted as "[[Bujin Hiruko]]".)
