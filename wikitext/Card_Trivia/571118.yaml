title: Card Trivia:F.A. Whip Crosser
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[F.A. Off-Road Grand Prix]]" and "[[F.A. Winners]]".
  * "[[U.A. Dreadnought Dunker]]" is the driver of the bike in this card's artwork.
  * In [[wikipedia:Dirt jumping|dirt jumping]], a "whip" typically refers to a bike rider keeping the front of their bike stationary while pivoting the back of their bike in one direction, in the middle of a jump.
  ** Fittingly, this monster is doing a "whip" in this card's artwork.
