title: Card Trivia:Ninjitsu Art of Mosquito Combustion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Number 2: Ninja Shadow Mosquito]]" appears in this card's artwork.
  * This card's Japanese name, "Mosquito Science Ninjitsu - Mosquito Combustion" (蚊学忍法・蚊炎蚊射 ''Kagaku Ninpō Kaen Hōsha'') features the word "''kagaku''", the Japanese word for "science" with the first kanji ''ka'' (化) replaced with the similar-sounding kanji ''ka'' (蚊) meaning "mosquito". This naming scheme references the "Science Ninja Art" from the 1972 anime series, ''[[wikipedia:Science Ninja Team Gatchaman|Science Ninja Team Gatchaman]]''.
  ** "Mosquito Combustion" is also given a kanji subtitle that reads ''Kaen Hōsha'' (蚊炎蚊射), which is replaced with the similar-sounding kanji ''Kaenhōsha'' (火炎放射), the Japanese word for "flamethrower".
