title: Card Trivia:Ashura King
wikitext: |-
  {{Navigation}}

  * This monster is based on an [[wikipedia:Asura (Buddhism)|asura]], a demigod or titan in [[wikipedia:Buddhism|Buddhism]].
  ** This card's Japanese name, 「{{Ruby|亜種羅王|アシュラオウ}}」 (''Ashuraou'', "Asura-Oh") is a pun on 「亜種」 (''ashu'', "subspecies") and 「阿修羅」 (''ashura'', "asura").
