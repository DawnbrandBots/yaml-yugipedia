title: 'Card Trivia:Number 40: Gimmick Puppet of Strings'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster's shadow appears in the artwork of "[[Perform Puppet]]".
  * The number 40 appears on the top of this monster's wing.
  * This monster has a [[Ranked-Up]] "[[Number C]]" form: "[[Number C40: Gimmick Puppet of Dark Strings]]".
  * This is the first [[Xyz Monster]] to use [[counter]]s for its effects.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster, "[[Number 15: Gimmick Puppet Giant Grinder (anime)|Number 15: Gimmick Puppet Giant Grinder]]", and "[[Number 33: Chronomaly Machu Mech (anime)|Number 33: Chronomaly Machu Mech]]", were the first "[[Number]]" monsters that [[Astral]] or [[Kite Tenjo]] did not obtain despite defeating [[Trey|their]] [[Quattro|owners]] in a [[Duel]], due to the power of their owners' [[crest]]s.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[detach]]ed an [[Xyz Material]], it absorbed it into its sword.
  ** When this monster [[activate]]d its effect, it played the strings on its chest with its sword like a harp, then red glowing puppet strings came down from a portal and attached to every other monster on the [[field]].
