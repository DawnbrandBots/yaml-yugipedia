title: Card Trivia:Gladiator Beast Nerokius
wikitext: |-
  {{Navigation}}

  * This card derives its name from [[wikipedia:Nero|Nero]], [[wikipedia:Roman emperor|Roman Emperor]] from 54 AD-68 AD.
  * This monster is based on a species of [[wikipedia:Bat|Bat]].
  ** The "kius" part of this monster's name could come from the Latin English equivalent of the Greek compound word "χείρπτερόν" (''chiroptera'', literally meaning "hand-wing", referring to how a bat's hands can be found at the end of a its wings), adapted to make it suitable as a suffix here.
  *** This combination of a Roman Emperor's name and a Greek-style suffix can be seen as somewhat suitable here, since it acts as some kind of fusion between two civilizations, possibly referencing this card's status as a [[Fusion Monster]].
