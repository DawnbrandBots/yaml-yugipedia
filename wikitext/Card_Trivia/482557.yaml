title: Card Trivia:Performapal Odd-Eyes Seer
wikitext: |-
  {{Navigation}}

  * This is one of the final [[Pendulum Monster]]s to be Pendulum Summoned in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, along with "[[Odd-Eyes Venom Dragon]]", "[[Odd-Eyes Wing Dragon]]", and "[[Performapal Ignition Eagle]]".
  * In the original airing of {{episode|ARC-V|147|ref}}, this card had a [[Pendulum Scale]] of 3 despite Yuya using it and the Scale 10 "[[Performapal Ignition Eagle]]" to [[Pendulum Summon]] "[[Performapal Odd-Eyes Synchron]]", a [[Level 2]] monster. In subsequent airings, this was fixed to show it having a Pendulum Scale of 1.
