title: Card Trivia:Assault Blackwing - Kunai the Drizzle
wikitext: |-
  {{Navigation}}

  * This monster is named after the ''[[wikipedia:Kunai|kunai]]'', a Japanese tool that is commonly used as a tool for ninjas.
  ** Fittingly, this monster's design resembles a ninja; also, this monster wields gauntlets embedded with multiple kunai for claws.
  * This is the only non-[[Synchro Monster]] member of the "[[Assault Blackwing]]" sub-[[archetype]].
