title: Card Trivia:Dark End Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Limited Edition 12]]''.
  * This monster appears in the artwork of "[[Wicked Rebirth]]".
  ** One of this monster's wings appears in the artwork of "[[Duality]]".
  * This monster has a [[retrained]] [[Main Deck]] counterpart: "[[Dark End Evaporation Dragon]]".
  * This monster has a [[LIGHT]] [[counterpart]]: "[[Light End Dragon]]".
  ** Both share the same [[Level]] (8), [[Type]] ([[Dragon]]), and [[original ATK and DEF]] (2600/2100).
  ** Both are the components of "[[Light and Darkness Dragon (manga)|Light and Darkness Dragon]]" in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  ** Both are  [[Effect Monster]] in the ''Yu-Gi-Oh!'' manga; however, in the ''[[OCG]]''/''[[TCG]]'', they were released as [[Synchro Monster]]s instead, though they also got retrained Main Deck counterparts.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|GX|026|ref}}, specifically from the panel showing [[Dark End Dragon (manga)|this monster]] being Summoned.
