  [[File:La_Jinn_attacks_and_destroys_Swords_of_Revealing_Light.png|thumb|right|250|"[[La Jinn the Mystical Genie of the Lamp (manga)|La Jinn the Mystical Genie of the Lamp]]" attacks and destroys "[[Swords of Revealing Light (manga)|Swords of Revealing Light]]".]]


  * "[[La Jinn the Mystical Genie of the Lamp]]" appears in this card's artwork.
  * This card's artwork and effect are based on a scene in {{chapter|Yu-Gi-Oh!|102|ref}}, when "La Jinn the Mystical Genie of the Lamp" attacks "[[Swords of Revealing Light]]", a [[Spell Card]].
  * This card is a member of a series of Spell Cards in ''[[Yu-Gi-Oh! Rush Duel]]'' that depict a monsters from the ''[[OCG]]''/''[[TCG]]'' attacking, and removes a Spell/[[Trap]] from the field if the player controls a monster with the same [[Type]] as the monster depicted. Other cards in this series include:
  ** "[[Magical Stream]]": [[Spellcaster]], with "[[Aqua Madoor]]"
  ** "[[Dragon's Inferno]]": [[Dragon]], with "[[Blaster, Dragon Ruler of Infernos]]"
  ** "[[Psychic Divergence]]": [[Psychic]], with "[[Esper Girl]]"
  ** "[[Fiery Blaze]]": [[Pyro]], with two "[[Royal Firestorm Guards]]"
  ** "[[Primal Howling]]": [[Wyrm]], with "[[Metaphys Armed Dragon]]"
  ** "[[Nature's Invasion]]": [[Plant]], with "[[Gigaplant]]"
  ** "[[Angel Judge]]": [[Fairy]], with "[[Dark Witch]]"
  ** "[[Rage of the Beasts]]": [[Beast]] and [[Beast-Warrior]], with "[[Battle Ox]]" and "[[Berserk Gorilla]]"
  ** "[[Stream of Elimination]]": [[Sea Serpent]], with "[[Lost Blue Breaker]]"

