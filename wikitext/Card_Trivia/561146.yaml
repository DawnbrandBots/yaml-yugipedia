title: Card Trivia:Excess Lesser Linker
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Boar Soldier]]", "[[Garoozis]]", "[[Gene-Warped Warwolf]]", "[[Linkuriboh]]", "[[Rude Kaiser]]", and either "[[Battle Ox]]" or "[[Rabid Horseman]]" appear in this card's artwork.
  ** The monsters depicted facing "Linkuriboh" are all [[Beast-Warrior]] monsters.
  ** The ambiguity of "Rabid Horseman" and "Battle Ox" is because in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, "[[Battle Ox (anime)|Battle Ox]]" was commonly depicted with a purple breastplate (like that of "Rabid Horseman") when it was materialized as a monster, contrary to the red breastplate depicted in its card artwork.
  <!--Do not remove the above trivia. "Toy Parade", which originated as an anime card, depicts "Bickuribox" with its unique anime color scheme, which supports this ambiguity here.-->
