title: Card Trivia:Cybernetic Cyclopean
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Monster Assortment]]" (as a cookie).
  * This monster is a "[[Cybernetic]]" [[counterpart]] of "[[Hitotsu-Me Giant]]".
  ** Both share the same [[Attribute]] ([[EARTH]]), [[Level]] (4) [[EARTH]], and [[Type]] ([[Beast-Warrior]]).
  ** Both share the same muscular humanoid body with green skin, and this monster's helmet resembles the single eye of "Hitotsu-Me Giant".
  ** In Japanese, "Hitotsu-Me Giant" is called "Cyclops" (サイクロプス, ''Saikuropusu'') while this monster is literally called "Cybernetic Cyclops" (サイバネティック・サイクロプス, ''Saibanetikku Saikuropusu'').
