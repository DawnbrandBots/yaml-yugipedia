title: Card Trivia:Masahiro the Dark Clown
wikitext: |-
  {{Navigation}}

  * This monster is based on "[[Saggi the Dark Clown]]" with Masahiro Okamoto's face instead of "Saggi's". It was awarded to him as a prize for winning Japan's Second National Convention on March 19, 2000.
  ** This card's artwork is extremely similar to the original manga artwork of "[[Saggi the Dark Clown (manga)|Saggi the Dark Clown]]".
