title: Card Trivia:Red Gadget
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[All-Out Attacks]]", "[[Boot-Up Order - Gear Charge]]", "[[Boot-Up Order - Gear Force]]", "[[Boot-Up Pulverize - Gear Crusher]]", "[[Maximum Gadget the Moving Fortress (R)|Maximum Gadget the Moving Fortress [R]]]", "[[Mobile Deployment Gear Start]]", and "[[Stronghold the Moving Fortress]]".
  * This monster has a combined [[retrain]]ed counterpart with "[[Green Gadget]]", and "[[Yellow Gadget]]": "[[Gadget Trio]]".
  * The green "mist" surrounding this monster references how this monster can be [[add]]ed from the player's [[Deck]] to the [[hand]] by the effect of "[[Green Gadget]]", while the yellow gears in the background of this card's artwork, as well as the yellow coloration of this monster's irises is a reference to how it can add "[[Yellow Gadget]]" from the player's Deck to the hand.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|339|ref}}, specifically from the panel showing [[Red Gadget (manga)|this monster]] being [[Summon]]ed.
