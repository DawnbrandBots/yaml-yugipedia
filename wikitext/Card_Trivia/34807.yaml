title: Card Trivia:Factory of 100 Machines
wikitext: |-
  {{Navigation}}

  * "[[Jinzo]]" and the silhouettes of "[[Morphtronic Celfon]]" and "[[Morphtronic Magnen]]" appear in this card's artwork.
  * This card's name is a reference to the [[wikipedia:Hyakki Yagyō|Hyakki Yakō]] (Night Parade of One Hundred Demons), whose name is pronounced the same way as this card's.
