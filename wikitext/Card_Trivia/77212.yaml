title: Card Trivia:Solemn Judgment
wikitext: |-
  {{Navigation}}

  * The man in this card's artwork (God) also appears in the artworks of "[[Darklord Rebellion]]", "[[Forbidden Scripture]]", "[[Solemn Authority]]", "[[Solemn Scolding]]", and "[[Witch's Strike]]".
  * The English name is possibly an intentional play on "[[wikipedia:Judgment of Solomon|Judgment of Solomon]]".
  * This card appears in the artwork of "[[Last Chance]]".
  * This is the first [[Trap Card]] ever to be released as [[Ghost Rare]].
  ** The art of the Ghost Rare edition of this card is edited slightly. The focus of the picture is moved slightly, cutting off the lower girl's nose and showing the shoulder of the other girl.
  * This card is treated as a monster in ''[[Yu-Gi-Oh! BAM]]''.
  * This card has a [[Normal Monster]]-oriented counterpart: "[[Champion's Vigilance]]".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card has a special animation when activated: the old man in the artwork thrusts his hand forward, accompanied by a flash of light.
