title: Card Trivia:Ragnaraika Mantis Monk
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ragnaraika Hunting Dance]]".
  * This monster's Japanese name ({{Ruby|蕾禍|ライカ}}ノ{{Ruby|御拝神主|オオガミヌシ}}, ''Raika-no Ōgaminushi'') is a portmanteau of 「御」 (''o-'', an honorific prefix in Japanese), 「大神主」 (''ōkannushi'', "grand Shinto priest"), and 「拝み虫」 (''ogamimushi'', lit. "praying bug"), a dialectal name for the praying mantis - although the verb 「拝む」 (''ogamu'') specifically references the [[wikipedia:Añjali Mudrā|Buddhist praying gesture]], not the Christian one. The praying mantis is also known in Japanese as 「鎌切」 (''kamakiri'', lit. "cutter with a sickle"), which reflects the scythe wielded by this monster.
