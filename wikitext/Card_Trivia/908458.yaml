title: Card Trivia:Wing Requital
wikitext: |-
  {{Navigation}}

  * "[[Sacred Crane]]" appears in this card's artwork.
  ** This card's Japanese name and artwork is based on ''[[wikipedia:Tsuru no Ongaeshi|Tsuru no Ongaeshi]]'', a story from Japanese folklore about a man who saves a crane which later transforms into a woman and becomes his wife to repay him.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect [[activation condition]] requiring two [[Winged Beast]] monsters with different names is based on this card's appearance in {{episode|GX|132|ref}}, when [[Sky Scout (character)|Sky Scout]] [[activate]]d this card while he [[control]]led both "[[Simorgh, Bird of Divinity (anime)|Simorgh, Bird of Divinity]]" and "[[Tornado Bird (anime)|Tornado Bird]]" at the time.
  ** Also, this card's ''OCG''/''TCG'' effect to draw two cards is an alteration of its anime effect, which allows the player to draw one card for each Winged Beast monster the player controls. In the aforementioned episode, when Sky Scout controlled the two aforementioned Winged Beast monsters, he drew one card for each, resulting in drawing two cards.
