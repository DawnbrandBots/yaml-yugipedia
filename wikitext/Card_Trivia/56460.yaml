title: Card Trivia:Rai-Mei
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Trust Chain]]".
  * This card's name is based on "Raimei", the Japanese word for "thunder", with a hyphen to distinguish it from "[[Raimei]]".
  * This is one of the few cards whose Japanese name consists only of English alphabetical characters and punctuation.
