title: Card Trivia:Gokipole
wikitext: |-
  {{Navigation}}

  * Four "[[Gokibore]]" appear in this card's artwork, stacked on top of each other in the shape of a pole before the bottom one is swatted down.
  * The pronunciation of this card's Japanese name, "Roachpole" (ゴキポール ''Gokipōru''), is a portmanteau of the Japanese words for "roach" (ゴキブリ ''Gokiburi'') and "pole" (ポール ''Pōru'').
  ** The kanji for this card's name and "Gokibore" (ゴキボール ''Gokibōru'') are very similar in writing, with the slight difference being that the kanjis ''Bō'' ('''ボ''') and ''Pō'' ('''ポ''').
