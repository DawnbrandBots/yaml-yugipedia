title: Card Trivia:Key Mouse
wikitext: |-
  {{Navigation}}

  * This monster's name, design, and effects are synergetic with "[[Lock Cat]]", both of which make up a lock and key combination.
  ** This monster's effect can add one [[Level 3]] or lower [[Beast]] monster from the [[Deck]] to the [[hand]], including "Lock Cat", whose effect in turn can [[Special Summon]] this monster from the [[Graveyard]].
  *** The above-mentioned monsters are also synergetic with "[[Chain Dog]]", whose effect can Special Summon itself from the Graveyard when there are exactly two Beast monsters on the [[field]], including this monster and "Lock Cat". This, along with the above-mentioned monsters, creates a key, lock, and chain connection.
