title: Card Trivia:Sky Striker Mobilize - Engage!
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Selection 5]]''.
  * "[[Sky Striker Ace - Raye]]" appears in this card's artwork.
  ** "[[Sky Striker Ace - Roze]]" appears in this card's alternate artwork.
  ** This card's first artwork was adapted into a panel of {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|1|ref}}, where [[Raye (manga)|Raye]] activates the "[[Sky Striker]]" technology for the first time.
