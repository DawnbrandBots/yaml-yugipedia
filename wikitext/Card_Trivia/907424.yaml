title: Card Trivia:Doyon @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located on the tip of this monster's tail.
  * This monster and "[[Dark Templar @Ignister]]" represent [[Ai]], the [[DARK]] [[Ignis]].
  ** This monster's name is based on "''doyon''"  the Japanese onomatopoeia for "gloominess", referencing Ai's sadness for being the last Ignis.
  *** This monster's design also features a downward crescent-shaped marking on the top of its body resembling a frowning face, further referencing Ai's sadness.
  ** This monster's body resembles an upside-down version of Ai's head in his Ignis form.
  ** This monster's effect to [[add]] an "@Ignister" monster from the [[Graveyard]] to the [[hand]] reflects Ai's desire to see his fallen Ignis friends again.
