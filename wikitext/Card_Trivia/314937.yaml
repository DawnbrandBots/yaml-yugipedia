title: 'Card Trivia:Number 14: Greedy Sarameya'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * Like other "[[Number]]" monsters associated with [[Kyoji Yagumo]], this monster is related to one of the [[wikipedia:Seven deadly sins|seven deadly sins]], more specifically, the [[wikipedia:Greed|deadly sin of greed]].
  * This monster is based on the [[wikipedia:Sarama|Sarameya]], the sons of Sarama (a dog belonging to [[wikipedia:Indra|Indra]] and other [[wikipedia:Deva (Hinduism)|Devas]]), who serve as watch dogs for [[wikipedia:Yama (Hinduism)|Yama]] in [[wikipedia:Hindu mythology|Hindu mythology]]. They are a pair of four-eyed brindled hounds who guard the pathway leading to the Realm of the Dead, and conduct the souls of the dead to their destination.
  ** Fittingly, in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, when this monster was on the [[field]] while the [[Field Spell Card]] "[[Court Battle]]" was in effect, Yama presided as the backdrop.
  ** Also, this monster's appearance is also based on [[wikipedia:Cerberus|Cerberus]], the three-headed dog in [[wikipedia:Greek mythology|Greek mythology]] who guards the gates to the [[wikipedia:Greek underworld|Underworld]] and serves as the watchdog for [[wikipedia:Hades|Hades]].
  * As with all the other "Number" monsters used by Kyoji Yagumo, this monster was molded to the situation at hand; in this monster's case, it was molded to counter the damage-dealing effect of "[[No. 82: Heart Monster Heartlandraco (manga)|No. 82: Heart Monster Heartlandraco]]" in the manga.
  * This is the only [[Evolving Numbers|Evolving "Number"]] monster [[Special Summon]]ed via [[Rank-Up]] in the manga to not feature an effect in the ''[[OCG]]''/''[[TCG]]'' to Special Summon itself by using an [[Xyz Monster]] on the [[field]] with a lower [[Rank]].
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|ZEXAL|034|ref}}, specifically from the panel showing [[No. 14: Greedy Sarameya (manga)|this monster]] being Summoned.
