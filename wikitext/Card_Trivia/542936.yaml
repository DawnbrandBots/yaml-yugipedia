title: Card Trivia:Performapal Hip Hippo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abysmal Entertainment]]", "[[Acrobatic Tower]]", "[[Command Performance]]", "[[Dragon's Shadow Performance]]", "[[Last Minute Cancel]]", "[[Performance Exchange]]", "[[Performance Pirouette]]", "[[Performapal Big Support]]", "[[Performapal Curtain Call]]", "[[Performapal Dramatic Theater]]", "[[Performapal Guard Dance]]", "[[Performapal Popperup]]", "[[Performapal Recasting]]", "[[Super Hippo Carnival]]", and "[[Team Performapal's Bonds]]".
  ** A colored outline of this monster appears in the artwork of "[[Performapal Duelist Extraordinaire]]".
  * This monster is a [[counterpart]] of "[[Performapal Flip Hippo]]" and "[[Performapal Hid Hippo]]".
  ** All three monsters feature a similar Japanese naming scheme which features the word "cover", used as a pun for the Japanese word for "hippo" (カバ ''kaba'').
  *** In this monster's case, its Japanese name, "Discover" is a portmanteau of the Japanese pronunciation of "discover" (ディスカバー ''Disukabā'') and the Japanese word for "hippo".
