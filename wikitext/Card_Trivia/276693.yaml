title: Card Trivia:Take a Chance (card)
wikitext: |-
  {{Navigation|mode=nonGame|Take a Chance}}

  * This card appears to depict a gambler playing either [[wikipedia:Roulette|roulette]] (as indicated by the numbers on the table) or [[wikipedia:Craps|craps]] (befitting this card's effect which rewards unlikely dice rolls). Both are extremely high-risk games of pure chance played in casinos.
