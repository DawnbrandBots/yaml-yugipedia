title: Card Trivia:Nightmare's Steelcage
wikitext: |-
  {{Navigation}}

  * In the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' series, [[Marik Ishtar|Marik]] played this card through [[Strings]] and imprisoned [[Yami Yugi]] within it. The same occurred when [[Bonz]] used this card against [[Yami Bakura]].
  ** However, in ''[[Yu-Gi-Oh! 5D's]]'', [[Yusei Fudo]] used this card and imprisoned himself within it for protection.
