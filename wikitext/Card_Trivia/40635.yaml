title: Card Trivia:Summon Reactor・SK
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Delta Reactor]]".
  * This monster's suffixed letters spell out the first of the three-part naming scheme of "[[Flying Fortress SKY FIRE]]", which can be [[Special Summon]]ed by this monster's effect.
  * The orange-colored explosion in the background of this card's artwork reference how [[Main Deck]] [[Effect Monster Card]]s feature an orange-colored card border.
  ** The orange-colored explosion appears in the artwork of "Flying Fortress SKY FIRE".
