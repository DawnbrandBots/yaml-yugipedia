title: Card Trivia:Sun God Unification
wikitext: |-
  {{Navigation}}

  [[File:Ra_attacks_Dark_Bakura.png|thumb|"[[The Sun Dragon Ra]]" attacks [[Dark Bakura (manga)|Dark Bakura]].]]

  * "[[Dark Necrofear]]", "[[Gernia]]", "[[Headless Knight]]", "[[Puppet Master]]", and "[[The Winged Dragon of Ra]]"  appear in this card's artwork.
  ** This card's artwork is based on {{chapter|Yu-Gi-Oh!|237|ref}}, specifically from the panel where [[Dark Marik (manga)|Dark Marik]] attacked [[Dark Bakura (manga)|Dark Bakura]] directly with "[[The Winged Dragon of Ra (manga)|The Winged Dragon of Ra]]" to win the [[Duel]].
  * This card's effects are based on [[Point-to-Point Transfer]], one of the effects of "[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This card's [[Life Point]] payment effect to increase the [[ATK]]/[[DEF]] of the [[Special Summon]]ed "The Winged Dragon of Ra" by the paid amount reference how Point-to-Point Transfer functioned in the manga; in the ''[[OCG]]''/''[[TCG]]'', "Ra" can only use this effect when it is [[Normal Summon]]ed.
  ** Its second effect of [[Tributing]] "Ra" to make the player gain [[Life Point]]s equal to its ATK on the [[field]] is based on how, in the manga and anime, a player could use "[[De-Fusion (anime)|De-Fusion]]" to separate themselves or an opponent from "Ra" after using Point-to-Point Transfer, reducing the ATK/DEF of "Ra" to 0 and regaining Life Points equal to the ATK lost.
  * This card and "[[Egyptian God Slime]]" are the first cards in the English ''TCG'' to use the word "god", while this card is the first game-original card to do so.

