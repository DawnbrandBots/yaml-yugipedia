title: Card Trivia:Evigishki Mind Augus
wikitext: |-
  {{Navigation}}

  * This monster appears to be an upgraded [[Ritual Monster|Ritual]] form of "[[Gishki Ariel]]", combined with an unknown fish monster.
  ** The fish half of this monster is based on a [[wikipedia:Triglidae|gurnard]], a family of ray-finned fish known for their modified spines that resemble legs.
  * This monster has a "[[Shaddoll]]" [[counterpart]]: "[[El Shaddoll Apkallone]]".
