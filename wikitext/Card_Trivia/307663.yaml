title: Card Trivia:Numeron Chaos Ritual
wikitext: |-
  {{Navigation}}

  * The silhouette of "[[Number C1000: Numeronius]]" appears in this card's artwork.
  * This card, "[[Armed Dragon Thunder LV10]]", "[[Armityle the Chaos Phantasm]]", and "[[Ten Thousand Dragon]]" are the only ones that refer to an [[ATK]] with 5 digits (10,000 ATK).
  ** This card's ''[[OCG]]''/''[[TCG]]'' effect to make the ATK/[[DEF]] of "Number C1000: Numeronius" 10,000/1000 is a reference to the [[original ATK and DEF]] of "[[Number C1000: Numeronius (anime)|Number C1000: Numeronius]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
