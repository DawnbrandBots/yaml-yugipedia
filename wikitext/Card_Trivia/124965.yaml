title: Card Trivia:Neo-Spacian Air Hummingbird
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Starter Deck 2007]]''.
  * This monster appears in the artworks of  "[[Contact Out]]", "[[Hope for the Future]]", "[[NEX]]", and "[[NEXT]]".
  * This monster has a "[[Chrysalis]]" form: "[[Chrysalis Chicky]]".
  * This monster has two [[Contact Fusion]]s with "[[Elemental HERO Neos]]": "[[Elemental HERO Air Neos]]" in the ''[[OCG]]''/''[[TCG]]'', and "[[Elemental HERO Sky Neos]]" in ''[[Rush Duel]]''.
  ** This monster has a [[Triple Contact Fusion]] with "Neos" and "[[Neo-Spacian Aqua Dolphin]]": "[[Elemental HERO Storm Neos]]".
  ** This monster has an [[Contact Fusion#Ultimate Contact Fusion|Ultimate Contact Fusion]] with "Neos" and all the other "[[Neo-Spacian]]" monsters: "[[Elemental HERO Divine Neos]]".
  * The initials "NS" on this monster's belt are a reference to the "Neo-Spacian" archetype, and were more visible in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * In 2025, it was found that "Elemental HERO Air Neos" was subject to a copyright infringement lawsuit in 2008, where [[wikipedia:Beyond Comics|Beyond Comics]] sued against [[Konami]] Digital Entertainment Co., Nihon Ad Systems (NAS), [[4Kids Entertainment]], and [[Upper Deck Company]] (among other companies), claiming that it had unlawfully copied the design of its character Ravedactyl.<ref name="Lawsuit">{{cite web | url = https://trellis.law/doc/district/4831479/beyond-comics-inc-v-konami-corp | title = Legal Document: Beyond Comics Inc v Konami Corp | website = Trellis Law | accessdate = April 18, 2025}}</ref> It is theorized that this is the reason "Air Neos" has not been rereleased in modern card packs and videogames. However, if true, it is unclear how the case did not affect this monster despite having a similar design to "Air Neos" and thus could also be considered a possible infringement on Ravedactly's design.

