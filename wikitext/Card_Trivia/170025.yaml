title: Card Trivia:Vylon Pentachloro
wikitext: |-
  {{Navigation}}

  * This card appears to be a corrupted version of "[[Vylon Tetra]]".
  ** This could also be a sign that after the defeat of the [[Steelswarm]], the [[Vylon]] [[Archetype]] became corrupted and separated from their allies.
  * As "[[Vylon Tesseract]]" is the 4-Dimensional version of "[[Vylon Cube]]", this card appears to be the 4-Dimensional version of "Vylon Tetra". It is based on a [[wikipedia:5-cell|pentachoron]].
  * Similar to "[[Vylon Tesseract]]", this cards number of claws reflect the shape on which it is based. This cards sides are triangular, which means they have three points, and it has three claws, while a Tesseract is made up of four squares, having four points, and thusly has four claws.
  * This monster, along with "[[Vylon Stigma]]" and "[[Vylon Tesseract]]", is a part of "[[Vylon Disigma]]".
