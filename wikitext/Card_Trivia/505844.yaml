title: Card Trivia:Aitsu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[A-Team: Trap Disposal Unit]]", "[[Fossil Dig]]", "[[Fossil Excavation]]", "[[Geological Survey]]", "[[Gravity Collapse]]", and "[[Skydiving Field]]".
  * This card is based on the red playable character in ''[[wikipedia:Sexy Parodius|Sexy Parodius]]'', a parody of the ''[[wikipedia:Gradius series|Gradius]]'' video game series produced by [[Konami]].
  ** When translated, the names "Aitsu", "[[Koitsu]]", "[[Soitsu]]", and "[[Doitsu]]" mean "This Guy", "That Guy", "That Other Guy" and "Which Guy?" respectively. The names are whimsical and are not meant to be taken literally. To keep the flavor, an appropriate translation might be "Eeney", "Meeney", "Miney", and "Moe".
  ** This card and its association with "Koitsu" is based on their appearance in Konami's ''[[wikipedia:Castlevania: Portrait of Ruin|Castlevania: Portrait of Ruin]]'' and ''[[wikipedia:Castlevania: Harmony of Despair|Castlevania: Harmony of Despair]]'' as the main character, Jonathan Morris's subweapon, "Paper Airplane" when he reaches levels 5 - 8. When the player reaches the maximum level of 9, both "Aitsu" and "Koitsu" can be seen riding on the paper airplane individually or together.
  * This card is the first ''Sexy Parodius'' monster to be released in ''[[Rush Duel]]''.
  ** This is a reference to [[Yuga Ohdo]]'s nickname of "That Guy" (アイツ ''Aitsu'') in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
