title: Card Trivia:Simorgh, Bird of Divinity
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Lord of the Storm]]''.
  * This monster is based on [[wikipedia:Simurgh|Simurgh]], a benevolent deity associated with healing and fertility in Persian mythology.
  ** According to Persian mythology, Simurgh is depicted as a giant bird with the head of a dog and claws of a lion, thought to be a representation of divinity. This monster's appearance, however, is based on a [[wikipedia:Roc (mythology)|roc]], another giant mythological bird in other cultures comparable to that of Simurgh.
  * The rings seen on the staff of "[[Herald of Creation]]" also appear on the back of this monster, and also on the backs of "[[The Creator]]" and "[[The Creator Incarnate]]".
  * This monsted has a [[Dark counterpart]]: "[[Dark Simorgh]]".
  * This monster has an upgraded [[Card evolutions|counterpart]] form: "[[Simorgh, Lord of the Storm]]".
  * This monster has a younger version: "[[Simorgh, Bird of Beginning]]".
  * This monster's [[Summoning condition]] is similar to that of "[[Diabolos, King of the Abyss]]", except that the [[Tribute]]d monsters must be [[WIND]], not [[DARK]].
