title: Card Trivia:Doll House
wikitext: |-
  {{Navigation}}

  * "[[Doll Monster Miss Mädchen]]", "[[Grandpa Demetto (card)|Grandpa Demetto]]", and "[[Princess Cologne (card)|Princess Cologne]]" appear in this card's artwork.
  * This house appears in the artwork of "[[Doll Happiness]]" and "Grandpa Demetto".
  * This card's first ''[[OCG]]''/''[[TCG]]'' effect is an alteration of its effect in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, which allowed [[Cologne]] to [[Special Summon]] the "Customized" versions of her "[[Doll Monster]]s" whose [[Level]]s are two higher than the "Doll Monsters" [[destroy]]ed the previous turn.
  ** The additional effect to change the Special Summoned Normal Monsters' [[Attribute]] to [[DARK]] is based on how the destroyed "Doll Monsters" are fixed up by [[Grandpa Demetto]], causing them to take on more hideous and gothic appearances.
  ** This card's final ''OCG''/''TCG'' effect to [[attach]] "Grandpa Demetto" to "Princess Cologne" references a scene in {{chapter|ZEXAL|018|ref}} where Grandpa Demetto rescues [[Cologne]] from the burning "Doll House" and transfers his soul into her body in order to keep her alive.
  * This card's artwork is taken from {{chapter|ZEXAL|016|ref}}, specifically from the panel showing the dollhouse where [[Yuma Tsukumo (manga)|Yuma Tsukumo]] and his friends first encounter Cologne walking down the stairs, albeit with changes in detail, including removing the aforementioned characters.
  ** The background of this card's artwork is taken from {{chapter|ZEXAL|017|ref}}, specifically from the panel showing Cologne and Grandpa Demetto on the roof of the dollhouse.
