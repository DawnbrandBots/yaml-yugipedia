title: Card Trivia:Ghost Sleeper, the Underworld Princess
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2022]]''.
  * This monster is based on the princess from the fairy tale, ''[[wikipedia:Sleeping Beauty|Sleeping Beauty]]'', who is cursed by an evil fairy to sleep for 100 years before being awakened by a handsome prince.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|002|ref}}, specifically from the panel showing [[Hellfire Sleeping Beauty, Ghost Sleeper (manga)|this monster]] being Summoned, albeit reversed.
