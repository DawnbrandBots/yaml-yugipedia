  * This card is a [[counterpart]] of "[[Vanity's Fiend]]".
  ** Both are [[Level]] 6 [[Fiend]]-[[Type]] monsters with 2400 [[ATK]] that cannot be [[Special Summon]]ed, and both have in their Japanese names the word 「{{Ruby|魔人|デビル}}」 (''Debiru'', "devil").
