title: Card Trivia:Harpie Lady 1 & 2 & 3
wikitext: |-
  {{Navigation}}

  * "[[Harpie Lady 1 (Rush Duel)|Harpie Lady 1]]", "[[Harpie Lady 2 (Rush Duel)|Harpie Lady 2]]", and "[[Harpie Lady 3 (Rush Duel)|Harpie Lady 3]]" appear in this card's artwork.
  ** This monster's pose is based on the artwork of "[[Harpie Lady Sister (DM2)|Harpie Lady Sisters]]" in ''[[Yu-Gi-Oh! Duel Monsters (video game)|Yu-Gi-Oh! Duel Monsters]]'' and ''[[Yu-Gi-Oh! Duel Monsters II: Dark Duel Stories]]''.
  * This is the first monster with an [[original ATK]] of [[3900 ATK Monster Cards|3900]].
  * This is the first [[Fusion Monster]] in ''[[Yu-Gi-Oh! Rush Duel]]'' to be placed in the [[Forbidden]]/[[Limited]] Lists.
