title: Card Trivia:Fishborg Doctor
wikitext: |-
  {{Navigation}}

  * Like [[Fishborg Archer|other]] [[Fishborg Launcher|"Fishborg"]] [[Fishborg Planter|monsters]], the monster piloting this machine is not a fish, despite being [[Fish]]-[[Type]].
  ** In fact, the monster inside the cockpit of "Fishborg Doctor" appears to be the unknown professor from the artwork of "[[Iron Core Specimen Lab]]" and "[[Compulsory Escape Device]]".
