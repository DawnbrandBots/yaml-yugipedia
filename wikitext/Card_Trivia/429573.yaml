title: Card Trivia:Yosenju Magat
wikitext: |-
  {{Navigation}}

  * This card, like several other [[Yosenju]] monsters, is based on the Japanese yōkai [[wikipedia:Kamaitachi|Kamaitachi]], a weasel monster which rode atop whirlwinds to slice at passers-by.
  * This monster's Japanese name, "凶旋嵐/Magatsusenran" roughly means "evil spinning storm". However, the last two characters are a homophone for "戦乱" meaning "war"
