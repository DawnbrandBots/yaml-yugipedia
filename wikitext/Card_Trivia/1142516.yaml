title: Card Trivia:Princess Cosmos the Trickster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Princess Cosmos Stirs]]", "[[Princess Cosmos' Astronomical Observation]]", and "[[Princess Cosmos' Beauty Sleep]]", as well as in both artworks of "[[Post-Stellar Shower Princess Cosmos]]" and "[[Princess Cosmos' Jest]]".
  * This monster has an [[Counterpart|upgraded]] [[Fusion Monster|Fusion]] form: "[[Princess Cosmos the Cosmic Trickster]]".

