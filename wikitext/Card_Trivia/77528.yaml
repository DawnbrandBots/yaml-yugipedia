title: Card Trivia:Command Knight
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the ''[[Collectible Tins 2004]]'' and the box of ''[[Duelist Legacy Volume.4]]''.
  * This monster appears in the artworks of "[[Attribute Gravity]]", "[[Big Volcano]]", "[[Bounzer Guard]]", "[[Cyclone Wing]]", "[[The Unchosen One]]", and "[[Vengeful Servant]]".
  * This card appears in the artwork of "[[Snatch Drone]]".
  * This monster has an [[Card evolutions|upgraded]] form: "[[Valkyrian Knight]]".
  * This monster has a [[Fairy]] counterpart: "[[Freya, Spirit of Victory]]".
