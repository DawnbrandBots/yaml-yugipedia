title: Card Trivia:Gimmick Puppet Fiendish Knight
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster is known as "[[Fiendish Knight]]", which made it the first and only non-"[[Gimmick Puppet]]" monster used by [[Quattro]] on-screen.
  ** In the anime, Quattro did not always say the "Gimmick Puppet" portion of his monsters' names, which left it open to interpretation whether or not this monster was a member of the "Gimmick Puppet" [[archetype]]. This was later confirmed when it was announced that this monster would be released in ''[[Animation Chronicle 2024]]''. However, at the time the anime was aired, yugioh.com still had it [https://www.yugioh.com/cards/fiendish-knight listed only as "Fiendish Knight"].
