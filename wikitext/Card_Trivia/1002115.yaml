title: Card Trivia:New World Formation
wikitext: |-
  {{Navigation}}

  * This card's artwork features the cherry blossom tree depicted in the artworks of the "[[Mannadium]]" cards on top of the hill, and the landscapes at the bottom resemble the scenery depicted in the different [[Broken World]]s:
  ** The cliffs and forests from "[[Primitive Planet Reichphobia]]"
  ** The layered lakes from "[[Primeval Planet Perlereino]]"
  ** The red buildings from "[[Pressured Planet Wraitsoth]]"
  * This card is likely all the Broken Worlds united as one as a result of the events depicted in the artwork of "[[Realm Resonance]]". The ball of light from the sky is likely "[[Visas Starfrost]]" transforming into "[[Visas Amritara]]".
