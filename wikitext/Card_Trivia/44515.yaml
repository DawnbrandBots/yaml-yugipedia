title: Card Trivia:Swarm of Scarabs
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Asleep at the Switch]]".
  * This monster has two [[counterpart]]s: "[[Swarm of Centipedes]]" and "[[Swarm of Locusts]]".
  ** All three monsters are [[Level 3]] [[DARK]] [[Insect]] monsters who share the same effect to [[flip]]-related effects and an [[original ATK and DEF]] divisible by 500.
  ** This monster and "Swarm of Locusts" both have reversed [[ATK]]/[[DEF]] (500/1000), feature an effect to [[destroy]] an opponent's card on the [[field]] when [[Flip Summon]]ed, and flip themselves [[face-down]].
