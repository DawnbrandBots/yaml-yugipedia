title: Card Trivia:Mecha Phantom Beast Sabre Hawk
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:RQ-4 Global Hawk|RQ-4 Global Hawk]] and the [[wikipedia:Saber-toothed cat|saber-toothed cat]].
  * This monster, "[[Mecha Phantom Beast Concoruda]]", and "[[Mecha Phantom Beast Turtletracer]]" are the only "Mecha Phantom Beast" monsters without effects that Special Summon "[[Mecha Phantom Beast Token]]s".
  ** Fittingly, their artworks reflect this with "Mecha Phantom Beast Tokens" being nonexistent in them.
  * Part of this card's Japanese name is a pun, as "Sābaru" can be read as "Sable" or "Sabre."
  ** "[[wikipedia:Sable (heraldry)|Sable]]" is another word for black, which is reflected by the color of this monster.
