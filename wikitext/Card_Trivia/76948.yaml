title: Card Trivia:Tomozaurus
wikitext: |-
  {{Navigation}}

  * "Tomo" (トモ) is the abbreviation form of the Japanese word meaning "cannibalism" (共食い ''Tomogui''). Tomo can also mean friend, leaving some irony that a creature called "Friendsaurus" attacks and eats its own kind. 
  * This card has a [[recolored counterpart]]: "[[Little D]]".
  ** This is made clear by the 3D models of the two monsters in ''[[Yu-Gi-Oh! Forbidden Memories]]''.
  * This card has a [[retrain]]ed [[counterpart]]: "[[Zuttomozaurus]]".
