title: Card Trivia:Helpoemer
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for the international version of ''[[Pharaonic Guardian]]'' and ''[[The New Ruler]]''.
  * This card appears in the anime artwork of "[[Destruction of Destiny]]".
  * This card's name could be said as "''Hell Poem-er''", which may allude to its Japanese name "''Hell Poet''" (with "''Poem-er''" meaning "''Poet''").
  * This monster is attached to a cross, keeping in relation with the "torture" theme of [[Yami Marik]]'s [[Deck]].
  ** Despite the ''[[TCG]]'' removing crosses and other religious connotation from other card artworks, this card still features a cross in its artwork.
  * This monster has a counterpart: "[[Grave Protector]]".
  ** Even though the two monsters are counterparts in terms of design, their effects seem to counter each other.
  * This card's ''[[OCG]]''/''TCG'' artwork is taken from the title page of {{chapter|Yu-Gi-Oh!|244|ref}}.
