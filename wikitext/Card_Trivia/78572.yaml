title: Card Trivia:Detonate
wikitext: |-
  {{Navigation}}

  * Multiple "[[Kuriboh]]" or "[[Kuriboh Token]]s" appear in this card's artwork.
  * This card's name and effect are based on the effect of "Kuriboh" during the [[Duelist Kingdom (manga arc)|Duelist Kingdom arc]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], where it self-destructed upon contact with the opponent's monsters. In {{chapter|Yu-Gi-Oh!|131|ref}} (and its [[Yu-Gi-Oh! - Episode 039|anime adaptation]]), [[Dark Yugi (manga)|Dark Yugi]] used this effect against [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus's]]" "[[Thousand-Eyes Restrict (manga)|Thousand-Eyes Restrict]]", causing him to take damage equal to the [[original ATK]] of "Kuriboh", but also resulting in "Thousand-Eyes Restrict" being unable to use its effect.
