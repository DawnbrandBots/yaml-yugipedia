title: Card Trivia:Wings of Light
wikitext: |-
  {{Navigation}}

  * "[[Supreme King Dragon Lightwurm]]" and the chestpiece of "[[Odd-Eyes Arcray Dragon]]" appear in this card's artwork.
  * This card's name is a reference to a passage of the [[Summon chants in Yu-Gi-Oh! ARC-V#Z-ARC|Summoning chant]] of "[[Supreme King Dragon Clear Wing (anime)|Supreme King Dragon Clear Wing]]" in the original Japanese version of the ''[[Yu-Gi-Oh! ARC-V]]'' anime:  "''Kin with wings of light''".
  ** This card's Japanese name, "The Light-Winged Dragon", references the Japanese name of {{episode|ARC-V|138|ref}}: "The Shadow-Winged Dragon". 
  ** This card's [[Quick-Play Spell]] property, along with the status of "Lightwurm" as a [[Tuner monster]] and its effect to [[Synchro Summon]] a "[[Supreme King]]" monster, reference a scene in the above-mentioned episode where [[Z-ARC]] Synchro Summons "Supreme King Dragon Clear Wing" by using two copies of "[[Supreme King Dragon Darkwurm (anime)|Supreme King Dragon Darkwurm]]" as [[Synchro Material]], after treating one copy of "Darkwurm" as a Tuner monster during his opponent's turn.
