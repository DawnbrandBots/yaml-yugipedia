title: Card Trivia:Madolche Queen Tiaramisu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Madolche Promenade]]", "[[Madolche Ticket]]", and "[[Madolchepalooza]]".
  * This monster's name is a portmanteau of "[[wikipedia:Tiara|tiara]]" and "[[wikipedia:Tiramisu|tiramisu]]".
  ** The first portion of its name is based on a "tiara", a jeweled head ornament typically worn by women within the royal court, including the queen, which is worn by this monster.
  ** The second portion of its name is based on tiramisu, an Italian dessert consisting of layers of ladyfinger pastries dipped in coffee and a whipped mixture of eggs, sugar, and mascarpone, and flavored with cocoa. Fittingly, the design of this monster's dress and its jigsaw puzzle-piece platform are based on the tiramisu.
  * This monster has a [[Ranked-Up]] form: "[[Madolche Queen Tiarafraise]]".
  * This monster is likely the mother of "[[Madolche Puddingcess]]", given how their naming schemes are puns on the royal titles of "queen" and "princess".
