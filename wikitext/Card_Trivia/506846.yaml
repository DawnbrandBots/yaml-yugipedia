title: Card Trivia:Card of Safe Return
wikitext: |-
  {{Navigation}}

  * The man in this card's artwork and the yellow energy emanating from him appears in the artwork of "[[Return of the Doomed]]".
  * This card's artwork depicts three cards, which is the amount of cards drawn by this card's effect in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This card is currently the only [[Forbidden]] member of the [[Treasure Card]] series.
