title: Card Trivia:Odd-Eyes Arcray Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Age of Overlord]]''.
  * This monster's chestpiece appears in the artwork of "[[Wings of Light]]".
  * This card appears in the artwork of "[[Miracle of the Supreme King]]".
  * This monster is the [[LIGHT]] [[Card evolutions|counterpart]] of "[[Supreme King Z-ARC]]".
  ** This monster's name references the characters [[Z-ARC]] and [[Ray Akaba]] from the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster's effect to [[Special Summon]] itself from the [[Pendulum Zone]] is based on the [[Pendulum Effect]] of "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]" in the anime.
  * Similar to "Supreme King Z-ARC", this monster is the combined form of "[[Odd-Eyes Dragon]]"/"[[Odd-Eyes Pendulum Dragon]]", "[[Dark Rebellion Xyz Dragon]]", "[[Clear Wing Synchro Dragon]]", and "[[Starving Venom Fusion Dragon]]", but features more added details from each of its base forms, including:
  ** The head shape, the eye colors, and the blue orbs of "Odd-Eyes Pendulum Dragon".
  ** The horns, the red-and-black patterned belly, and the purple orbs of "Dark Rebellion Xyz Dragon".
  ** The serpentine body and the green shield-like wings of "Clear Wing Synchro Dragon".
  ** The red and yellow orbs, and the tusks resembling the horns of "Starving Venom Fusion Dragon".
  * This monster is also a [[counterpart]] of "[[D/D/D/D Dimensional King Arc Crisis]]", which is also a counterpart of "Supreme King Z-ARC".
  ** Both are the ''[[OCG]]''/''[[TCG]]''-original ultimate forms of the [[signature card]]s of the main rivals of the ''Yu-Gi-Oh! ARC-V'' anime, which are [[Pendulum Monster]]s combined with a [[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], and [[Xyz Monster]] belonging to their respective themes: This monster is the ultimate form of "Odd-Eyes Pendulum Dragon", the signature card of [[Yuya Sakaki]], combined with the Extra Deck members of the [[Four Dimensional Dragons]] [[series]], while "Arc Crisis" is the ultimate form of "[[D/D/D Doom King Armageddon]]", the signature card of [[Declan Akaba]], combined with the first three [[Extra Deck]] monsters belonging to the "[[D/D]]" [[archetype]].
  ** Both share the same Level (12) and original [[ATK]] and [[DEF]] (4000/4000), but opposite Attributes ([[LIGHT]] and DARK).
  ** Both feature the word "Arc" (ァーク, ''Āku'') in their names, referencing their Pendulum Monster type and the name of the ''Yu-Gi-Oh! ARC-V'' anime; however, while the name of "Arc Crisis" is a reference to Z-ARC, this monster's name is a reference to Ray Akaba.
  ** Both are [[Fusion Pendulum Monster]]s with a similar [[Fusion Material]] requirement (4 monsters, including 1 Fusion, 1 Synchro, 1 Xyz, and 1 Pendulum of a specific [[Type]]).
  ** Both share the same [[Pendulum Scale]] (13).
  ** Both monsters' designs feature glowing green accents, with their tone corresponding with the background of their card artworks: This monster's green accents are light to correspond with the bright and shiny background, while the green accents of "Arc Crisis" are dark to correspond with the dark and stormy background.
