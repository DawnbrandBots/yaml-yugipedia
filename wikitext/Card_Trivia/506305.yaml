title: Card Trivia:Mystical Sheep 1
wikitext: |-
  {{Navigation|Mystical Sheep #1}}

  * This monster has a [[recolored counterpart]]: "[[Mystical Sheep 2|Mystical Sheep #2]]".
  ** Both monsters' Japanese names and designs are based on [[wikipedia:Counting sheep|counting sheep]], a mental exercise used to put oneself to sleep.
  ** Despite their international names, this card was released in the ''[[TCG]]'' after "Mystical Sheep #2".
  ** Interestingly, "Mystical Sheep #2" is a [[Fusion Material Monster]] for "[[Fusionist]]", while this monster is a [[Fusion Substitute Monster]].
