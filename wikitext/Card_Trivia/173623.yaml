title: Card Trivia:Dragon Nails
wikitext: |-
  {{Navigation}}

  * These nails appear in the artwork of "[[Red-Eyes Black Fullmetal Dragon]]" and "[[Red-Eyes Metal Claws Dragon]]".
  * This card has a ''[[Rush Duel]]'' [[counterpart]]: "[[Meteor Dragon's Nails]]".
  * This card's additional effects in the ''[[OCG]]''/''[[TCG]]'' are based on its appearance during [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] and [[Keith Howard (manga)|Bandit Keith Howard's]] Duel in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] (and its [[Yu-Gi-Oh! (anime)|anime]] [[Joey Wheeler and Bandit Keith's Duel|adaptation]]).
  ** This card's effect to prevent the [[equip]]ped monster from being destroyed by card effects is based on a scene where Jonouchi ([[Joey Wheeler]] in the anime) uses this card to protect "[[Red-Eyes Black Metal Dragon (manga)|Red-Eyes Black Metal Dragon]]" from being destroyed by the self-destruction effect of "[[Blast Sphere (manga)|Blast Sphere]]", by increasing his monster's [[ATK]] to become greater than the 2900 ATK of "Blast Sphere".
  *** In the manga, when "Blast Sphere" self-destructs at the end of Jonouchi's turn, Jonouchi managed to draw [[Dragon Nails (manga)|this card]] at the start of that turn. In the anime, when "[[Blast Sphere (anime)|Blast Sphere]]" self-destructs at the end of [[Bandit Keith|Bandit Keith's]], Joey had [[Set]] [[Dragon Nails (anime)|this card]] during his turn.
  ** This card being able to equip any [[DARK]] monster, rather than just DARK [[Dragon]] monsters, is due to "[[Red-Eyes Black Metal Dragon]]" being a [[Machine]] monster in the ''OCG''/''TCG'' (though this card had also been altered to be equipped to any monster regardless of [[Type]] or [[Attribute]] in later editions of the manga).
  ** This card's second effect to [[Special Summon]] the equipped monster from the [[Graveyard]] after it is destroyed by battle, and then re-equipping this card to it, is based on a scene from later in the same Duel: Jonouchi uses "[[Time Machine (manga)|Time Machine]]" to bring back "Red-Eyes Black Metal Dragon" after it was destroyed by battle with "[[Slot Machine (manga)|Slot Machine]]", and Summons it exactly as it was at the start of that turn, when it was equipped with this card.
  * This card has the [[List of cards with the longest OCG import times|longest ''OCG'' import time]] of any [[Equip Spell Card]], released over 23 years after its first appearance in the ''Yu-Gi-Oh!'' manga on March 29, 1999.
