title: Card Trivia:Ritual of Destruction
wikitext: |-
  {{Navigation}}

  * This was the second [[Ritual Spell Card]] to have an effect besides [[Ritual Summon]]ing a [[Ritual Monster]]. The first one was "[[Ritual of Grace]]".
  * The altar in this card's artwork appears to be the opposite of "[[Ritual of Grace]]".
  * The black matter held by various chains seems to be a dormant or sealed/imprisoned form of "[[Garlandolf, King of Destruction]]".
  ** Additionally, the "gold-chained plate" design in the center on the black mass bears a resemblance to the [http://www.betaarchive.co.uk/imageupload/1260655031.or.063715.png locks] found on boss doors in some Legend of Zelda games.
  ** It also looks like the stone Ganondorf was sent though to the Realm of Twilight after his failed execution.
  * This card seems to have been inspired or inspired the locked form of the Kishin [[W:c:souleater:Asura|Asura]] in [[wikipedia:Soul Eater (manga)|Soul Eater]].
