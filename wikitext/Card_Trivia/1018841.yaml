  * This monster is a ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] of "[[Lady of Faith]]".
  ** This monster's Japanese name, "High-Hee Priestess", is a portmanteau of "high-heels" and the Japanese name of "Lady of Faith", "High Priestess".
