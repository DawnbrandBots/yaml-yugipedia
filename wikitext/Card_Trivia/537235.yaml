title: Card Trivia:Destiny HERO - Doom Lord
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[D - Counter]]", "[[D - Shield]]", "[[D - Tactics]]", "[[D-Doom Dance]]", and "[[Destiny Mirage]]".
  * This monster has a retrained [[counterpart]]: "[[Destiny HERO - Doom Liege]]".
  * This monster resembles the Image Comics antihero, [[wikipedia:Spawn (character)|Spawn]]. In the titular comics, one of the earliest Hellspawns, Sir John of York, was an English mid-15th century knight who took up the nomenclature of "Spawn", keeping in relation with the European theme of the "[[Destiny HERO]]" [[archetype]].
  ** In the titular comics, Al Simmons, the current Spawn, strikes a deal with the demon Malebogia to return him to the living world to see his ex-wife, but is sent five years into the future instead. This monster's effect reflects this, as it can [[banish]] an opponent's monster from the [[field]] for only two turns.
