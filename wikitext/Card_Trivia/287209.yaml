title: 'Card Trivia:Number 5: Doom Chimera Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This card's number matches its [[Rank]].
  * This card is named after the [[wikipedia:Chimera|Chimera]], a creature from [[wikipedia:Greek mythology|Greek mythology]] made up of several different animals fused together.
  ** This is reflected in this card's [[ATK]]-increasing effect for each [[Xyz Material]] attached to it.
  * This is one of the few cards that was mentioned by name in the anime, [[List of unseen cards|but did not appear]] until its release in the ''[[OCG]]''/''[[TCG]]''.
  * This card has a "[[Number C]]" [[Card evolutions|upgraded]] form: "[[Number C5: Chaos Chimera Dragon]]".
  ** This is the only "[[Number]]" monster whose "Number C" form appeared in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime but did not appear itself. Thus, this was also the first "Number C" monster that did not use its corresponding "Number" monster as [[material]] for its [[Xyz Summon]].
