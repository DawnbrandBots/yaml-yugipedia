title: Card Trivia:Cyber Dragon Sieger
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cyber Revsystem]]" and "[[Cybernetic Overflow]]".
  ** This monster appears to be "[[Cyber Dragon Herz]]" clad in the armor of "[[Cyber Dragon]]" (with the added detail of the "disk" on its head as well as longer neck spikes), as depicted in the artwork of "Revsystem".
  * This monster's name is based on "''sieger''", the German word for the number "winner" or "victor".
  ** This is one of several "[[Cyber Dragon (archetype)|Cyber Dragon]]" monsters that features German words in their names, referencing how in the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime and the [[Yu-Gi-Oh! GX (manga)|manga]], [[Zane Truesdale]] (who uses the "[[Cyber]]" [[archetype]]) was referred to by the title of "Kaiser", the German word for "emperor".
