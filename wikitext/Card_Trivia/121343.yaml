title: Card Trivia:Silent Swordsman LV7
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|340|ref}}, specifically from the panel showing [[Silent Swordsman LV3 (manga)|the end result]] of "[[Silent Swordsman LV0 (manga)|Silent Swordsman LV0]]" being affected by "[[Turn Jump (manga)|Turn Jump]]".
  * The first Spanish print of this card had an typo, as it said "''en el tu Campo''" ("''in it your field"'').
