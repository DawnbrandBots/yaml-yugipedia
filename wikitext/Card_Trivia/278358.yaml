title: Card Trivia:Five Brothers Explosion
wikitext: |-
  {{Navigation}}

  * "[[Brotherhood of the Fire Fist - Rooster]]", "[[Brotherhood of the Fire Fist - Gorilla|Gorilla]]", "[[Brotherhood of the Fire Fist - Swallow|Swallow]]", "[[Brotherhood of the Fire Fist - Caribou|Caribou]]" and "[[Brotherhood of the Fire Fist - Snake|Snake]]" appear in this card's artwork.
  * This card's name is a reference to the [[wikipedia:Five Tiger Generals|Five Tiger Generals]], a phrase used in popular Chinese culture (namely literature and plays) for any five military generals serving under a ruler. In historical contexts, these were usually the five best generals.
  ** The characters that the monsters in this card's artwork are based on are known as the Five Tiger Generals in the novel in which they appear: the [[wikipedia:Water Margin|Water Margin]] .
