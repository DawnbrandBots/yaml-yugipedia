title: Card Trivia:Hate Buster
wikitext: |-
  {{Navigation}}

  * "[[Dark King of the Abyss]]" and "[[Dark Ruler Ha Des]]" appears in this card's artwork.
  ** The bomb "Dark King" is holding appears to be one of those that "[[Blast Asmodian]]" possesses.
  ** Both of these monsters appear in several other cards' artworks that tell the story of the former's fall:
  *** "[[Demotion]]" > "[[Abyssal Designator]]" > "[[Herald of the Abyss]]" > '''"Hate Buster"''' > "[[Mind Drain]]" (presumably "[[Skill Drain]]" and "[[Soul Drain]]" as well)  > "[[Skill Prisoner]]" > "[[Destruct Potion]]" > "[[Fake Life]]" > "[[Call of the Archfiend]]" > "[[Reject Reborn]]" > "[[Powerful Rebirth]]" > "[[Dark Ruler No More]]"
  *** In this card's artwork, "Dark King of the Abyss" seems to be desperately retaliating against "Dark Ruler Ha Des" after being relegated to the Abyss in "Demotion" and "Abyssal Designator".
  *** This confrontation likely resulted in the death of "Ha Des", after which it came back as "[[Revived King Ha Des]]".
