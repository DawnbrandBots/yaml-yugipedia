title: Card Trivia:Core Blast
wikitext: |-
  {{Navigation}}

  * This card's effect is similar to "[[Pineapple Blast]]'s".
  ** When "[[Kozaky]]" and "[[Magical Scientist]]" were making the [[Koa'ki Meiru]], they probably made equipment to protect their new species (possibly based off existing technology). If this was true, then it would explain the similarity of "[[Core Blast]]" and "[[Pineapple Blast]]".
  * This card looks like the bottom of "[[Nega-Ton Corepanel]]" exploding.
