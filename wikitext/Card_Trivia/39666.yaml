title: Card Trivia:Ancient Gear Factory
wikitext: |-
  {{Navigation}}

  * "[[Ancient Gear Soldier]]" appears in this card's artwork.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, when this card is used, the stars on the bucket at the top of the "factory" continue to light up until the number of lit stars equal twice the [[Level]] of the selected "[[Ancient Gear]]" monster, at which point the gates of the "factory" open and the "Ancient Gear" monster is [[Normal Summon]]ed.
  ** There are only sixteen stars shown on the bucket, because prior to the reveal of "[[Ancient Gear Reactor Dragon]]", there was no "Ancient Gear" monster higher than Level 8 that could be Normal Summoned.
