title: Card Trivia:Salvage
wikitext: |-
  {{Navigation}}

  * "[[Amphibious Bugroth MK-3]]", "[[Orca Mega-Fortress of Darkness]]", and three copies of "[[Cannonball Spear Shellfish]]" appear in this card's artwork.
  ** The events depicted in this card's artwork are continued in the artwork of "[[Heartless Drop Off]]".
  * This card has three counterparts for monsters of a specific [[Attribute]]/[[Type]]:
  ** [[FIRE]]: "[[Oil]]"
  ** [[DARK]]: "[[Recurring Nightmare]]"
  ** [[Thunder]]: "[[Recycling Batteries]]"
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Salvage]]".
