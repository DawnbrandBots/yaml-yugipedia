title: Card Trivia:A.I. Contact
wikitext: |-
  {{Navigation}}

  * [[Ai]] appears in this card's artwork.
  * This card's name is a wordplay on "[[wikipedia:Eye contact|eye contact]]", the instance where two humans or non-human animals look at each other's eyes at the same time.
  ** This card's artwork depicts Ai making "eye contact" with the opponent. This reflects its effect to have the opponent make "eye contact" by making the player [[reveal]] a copy of "[[Ignister A.I.Land]]" in their [[hand]].
