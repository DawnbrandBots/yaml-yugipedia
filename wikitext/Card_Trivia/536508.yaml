title: Card Trivia:Evil HERO Inferno Wing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dark Fusion]]", "[[Evil Mind]]", and "[[Spiritual Fusion]]".
  * This monster has two "[[Elemental HERO]]" [[counterpart]]s that require "[[Elemental HERO Avian]]" and "[[Elemental HERO Burstinatrix]]" as [[Fusion Material]]:
  ** An original counterpart: "[[Elemental HERO Flame Wingman]]".
  ** An [[Aster Phoenix]]-based counterpart: "[[Elemental HERO Phoenix Enforcer]]".
  * This monster has a [[signature move]] counterpart: "[[Evil HERO Inferno Wing - Backfire]]".
  * This is the first "[[Evil HERO]]" monster to appear in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This is the first card in the ''[[OCG]]''/''[[TCG]]'' whose [[card text]] refers to higher [[ATK]]/[[DEF]], instead of only ATK or DEF.
