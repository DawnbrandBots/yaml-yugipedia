title: Card Trivia:Icejade Kosmochlor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Icejade Cenote Enion Cradle]]" and "[[Swordsoul Strife]]".
  ** Its remains appears in the artwork of "[[Icejade Curse]]".
  *** This monster is depicted in its card artwork with the pattern on its body already grown out. As mentioned in their concept artwork, the "[[Icejade]]" monsters become the metal which is later used to forge the sword of the "[[Swordsoul]]" monsters, once their pattern has covered their entire body.
  * This card is named after [[wikipedia:Kosmochlor|kosmochlor]], a rare green mineral.
