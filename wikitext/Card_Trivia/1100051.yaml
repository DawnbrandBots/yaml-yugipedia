title: 'Card Trivia:Number S38: Titanic Galaxy'
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2025]]''.
  * This monster is a "[[Number S]]" [[Card evolutions|upgraded]] form of "[[Number 38: Hope Harbinger Dragon Titanic Galaxy]]".
  ** This monster is based on how in {{chapter|ZEXAL|051|ref}}, "[[No. 38: Hope Harbinger Dragon Titanic Galaxy (manga)|No. 38: Hope Harbinger Dragon Titanic Galaxy]]" was treated as a "Number S" monster with its [[Rank]] increased by 1 via the effect of "[[Shining Hope Road (manga)|Shining Hope Road]]" before being used to [[Xyz Summon]] "[[No. S0: Hope ZEXAL (manga)|Number S0: Hope ZEXAL]]". In this scene, its name was rendered in shorthand form, as "No. S38: Titanic Galaxy".
  ** This monster' effect to attack directly is reminiscent of "[[Number 28: Titanic Moth]]", which was transformed into "Number 38: Hope Harbinger Dragon Titanic Galaxy" in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  * This monster and "[[Number S37: Spider Shark]]" are the first ''[[OCG]]''/''[[TCG]]''-original "Number S" monsters, as well as the first "Number S" monsters not to be "[[Utopia (archetype)|Utopia]]/[[Utopic]]" monsters.
  * This card's artwork is taken from {{chapter|ZEXAL|049|ref}}, specifically from the panel showing "No. 38: Hope Harbinger Dragon Titanic Galaxy" returning to [[Kaito Tenjo (manga)|Kaito Tenjo's]] [[field]] via the effect of "[[Galaxy Journey (manga)|Galaxy Journey]]".

