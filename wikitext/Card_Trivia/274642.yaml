title: Card Trivia:Spike Seadra
wikitext: |-
  {{Navigation}}

  * This is the first [[Sea Serpent]] monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * "Seadra" is possibly a portmanteau of "sea" and either "dragon" or "[[wikipedia:Lernaean Hydra|hydra]]", the latter term being a serpentine water monster in Greek and Roman mythology.
