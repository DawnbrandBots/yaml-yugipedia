  * "[[Folgo, Justice Fur Hire]]" and "[[Rafale, Champion Fur Hire]]" appear in this card's artwork.
  ** Fittingly, both are currently the only valid [[Link-3]] or higher and [[Level 8]] or higher "[[Fur Hire]]" monsters, respectively, to use with this card's additional effects.
