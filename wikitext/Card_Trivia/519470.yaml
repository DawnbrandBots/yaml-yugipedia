title: Card Trivia:Gearfried the Red-Eyes Iron Knight
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Legend Duelist]]''/''[[Legendary Duelists]]''.
  * A silhouette of a "[[Red-Eyes]]" monster's head appears in the background of this card's artwork.
  * This is the first "Red-Eyes" [[Warrior]]-[[Type]] monster.
  * This card is a "Red-Eyes" counterpart to "[[Gearfried the Iron Knight]]", sharing its [[Level]], [[ATK]], [[DEF]], and an effect that destroys [[Equip Card]]s.
  ** This card can also be seen as a Warrior-Type counterpart to "[[Red-Eyes Wyvern]]", as both cards share the same Level, ATK, and DEF, and feature effects that [[Special Summon]] "Red-Eyes" monsters from the [[Graveyard]].
