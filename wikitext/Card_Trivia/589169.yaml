title: Card Trivia:Cubic Causality
wikitext: |-
  {{Navigation}}

  * "[[Buster Gundil the Cubic Behemoth]]" appears in this card's artwork.
  * This card's second effect references one of the rules of [[Dimension Summon]]ing, a Summoning method used in ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'', where any Dimension Summoned monster that is [[destroyed by battle]] will inflict its [[ATK]] as damage to that monster's [[control]]ler.
