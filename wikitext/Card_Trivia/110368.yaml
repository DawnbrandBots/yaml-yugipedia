title: Card Trivia:Wisel Attack 3
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Majestic Absorption]]" and "[[Wise A3]]".
  ** This monster's video game [[Special Summon]]ing effect is based on the effect of "Wise A3", which can Special Summon itself from the player's [[hand]] by [[Tribute|Tributing]] "[[Wisel Attack]]".
  * The number "3" in this monster's name represents its [[Level]] (3).
  * This monster and its base form, "Wisel Attack", serve the left arm of "[[Meklord Emperor Wisel]]" with a blade at the back of its wrist, reflecting how this monster's owner, [[Primo]], uses his left hand to wield his sword.
