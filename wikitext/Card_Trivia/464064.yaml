title: Card Trivia:Greedy Venom Fusion Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Booster SP: Fusion Enforcers]]''/''[[Fusion Enforcers]]''.
  * This monster is an [[Card evolutions|upgraded]] form of "[[Starving Venom Fusion Dragon]]".
  * This monster has an "[[Odd-Eyes]]" [[Fusion Pendulum Monster|Fusion Pendulum]] [[counterpart]]: "[[Odd-Eyes Venom Dragon]]".
  * This monster has a "[[Predaplant]]" counterpart: "[[Starving Venom Predapower Fusion Dragon]]".
  * This monster is the [[Fusion Dimension]] counterpart of "[[Dark Requiem Xyz Dragon]]" and "[[Crystal Wing Synchro Dragon]]".
  ** They are all evolved form of one of the [[Four Dimensional Dragons]]: "Starving Venom Fusion Dragon" for this card, "[[Dark Rebellion Xyz Dragon]]" for "Dark Requiem", and "[[Clear Wing Synchro Dragon]]" for "Crystal Wing".
  ** Like the other forms of "Starving Venom Fusion Dragon" (except "[[Starving Venemy Dragon]]"), this monster has higher [[Level]]/[[Rank]] (10) and [[ATK]] (3300) than the corresponding forms of "Dark Rebellion" and "Clear Wing".
  ** In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, they all debuted during a [[Duel]] against someone from the Fusion Dimension that took place in their corresponding [[Four Dimensions|dimension]].
  *** This monster debuted in [[Yuri]]'s Duel against Aster Phoenix, [[Kite Tenjo (ARC-V)|Kite Tenjo]], and [[Yugo]] in the Fusion Dimension, in {{episode|ARC-V|130|ref}}.
  *** "[[Dark Requiem Xyz Dragon (anime)|Dark Requiem Xyz Dragon]]" debuted in [[Yuya Sakaki]]/[[Yuto]]'s Duel against [[Aster Phoenix (ARC-V)|Aster Phoenix]] in the [[Xyz Dimension]], in {{episode|ARC-V|110|ref}}.
  *** "[[Crystal Wing Synchro Dragon (anime)|Crystal Wing Synchro Dragon]]" debuted in Yugo's Duel against [[Celina]] in the [[Synchro Dimension]], in {{episode|ARC-V|085|ref}}.
  ** They were all created when Yuya entered a state of mind with one of his [[dimensional counterparts]].
  *** "Crystal Wing" was created after Yuya [[Synchronize (ability)|synchronized]] with Yugo.
  *** "Dark Requiem" was created after Yuya was possessed by Yuto.
  *** This card was created by Yuri on his own but Yuya was [[awakened]] in the meantime.
  ** In the anime, they were Summoned using their corresponding base form and a card of the [[archetype]]s their owner used.
  *** "[[Predaplant Sarraceniant (anime)|Predaplant Sarraceniant]]" of the "Predaplant" archetype for this card, via "[[Super Polymerization (later anime)|Super Polymerization]]".
  *** "[[The Phantom Knights' Rank-Up-Magic Launch (anime)|The Phantom Knights' Rank-Up-Magic Launch]]" of the "[[The Phantom Knights]]" archetype for "Dark Requiem".
  *** "[[Speedroid Red-Eyed Dice (anime)|Speedroid Red-Eyed Dice]]" of the "[[Speedroid]]" archetype for "Crystal Wing".
  * This monster is the only upgraded form of one of the Four Dimensional Dragons to specifically require a monster from the archetype its owner used as [[material]]: in this case, Yuri's "Predaplant" monsters.
  ** Also, like "Starving Venom Fusion Dragon", this card did not have an [[Attack and effect names in Yu-Gi-Oh! ARC-V|attack or effect name]] in the anime.
  * This monster is one of two upgraded forms of the Four Dimensional Dragons that were not used by Yuya Sakaki in the anime, the other being "Crystal Wing Synchro Dragon".
  ** However, Yuri Summoned this monster on his own, in {{episode|ARC-V|130|ref}}, while Yugo first Summoned "Crystal Wing" while he was synchronized with Yuya, in {{episode|ARC-V|085|ref}}.
