title: Card Trivia:Last Will
wikitext: |-
  {{Navigation}}

  * The Spanish prints of this card use the word "''enviar''" in the lore instead of "''mandar''", which is the official term in the Spanish ''[[TCG]]'' for "''send''".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Last Will]]".
  * The Japanese text on the card artwork reads "遺言状" (''Igonjō''), literally translating to "Will".
  ** The Mandarin Chinese reading of 遺言, ''yíyán'', means "words of the deceased", or "last words of the dying",
