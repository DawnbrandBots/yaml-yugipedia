title: Card Trivia:Oil
wikitext: |-
  {{Navigation}}

  * This card is based on an [[wikipedia:Oil well|oil well]], a drill hole boring into the Earth that is designed to bring petroleum oil to the surface.
  ** Petroleum oil is known for being a flammable substance. This, along with the aforementioned fact, reflects this card's effect to [[add]] two [[Level 4]] or lower [[FIRE]] monsters from the [[Graveyard]] to the [[hand]]
  * This card has three counterparts for monsters of a specific [[Attribute]]/[[Type]]:
  ** [[WATER]]: "[[Salvage]]"
  ** [[DARK]]: "[[Recurring Nightmare]]"
  ** [[Thunder]]: "[[Recycling Batteries]]"
