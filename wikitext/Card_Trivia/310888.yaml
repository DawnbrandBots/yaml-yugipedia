title: Card Trivia:Prediction Princess Astromorrigan
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Oujimorrigan", is a portmanteau of the words "[[wikipedia:Ouija|ouija]]" (a flat board used to communicate with spirits) and "[[wikipedia:The Morrígan|Morrígan]]" (the goddess of battle, strife, and sovereignty in [[wikipedia:Celtic mythology|Celtic mythology]]).
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "[[wikipedia:Astrology|astrology]]" (the study of the positioning of celestial objects in [[wikipedia:Divination|divination]]) and "Morrígan".
  ** The first portion of this monster's names reflect the Sun and Moon in this monster's design and in the background of its artwork: The Sun and the Moon are featured on a ouija board, and they are celestial objects used in astrology.
