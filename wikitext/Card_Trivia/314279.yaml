title: Card Trivia:Minerva, Lightsworn Maiden
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Alliance: Deluxe Edition]]'' and ''[[Duelist Set: Version Lightlord Judgment]]''.
  * This monster and its owl are references to the [[wikipedia:Minerva|Goddess Minerva]] and the [[wikipedia:Owl of Athena|Owl of Minerva]].
  * According to the "[[Lightsworn]]" lore, Minerva is a young mage in the midst of her apprenticeship, accompanied by her white owl familiar. Though she is still inexperienced in the ways of magic. She has wings as-white-as-snow that show she'll one day become a guardian angel.<ref>[http://www.ygorganization.com/geargia-lightsworn-lore/ YGOrganization] - [OCG] Lore on the Geargias and Lightsworn!</ref>
  ** In line with this lore, this monster eventually becomes "[[Minerva, the Exalted Lightsworn]]", as shown in the artwork of "[[Lightsworn Sanctuary]]".

