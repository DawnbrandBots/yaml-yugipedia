title: Card Trivia:Supreme Arcanite Magician
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This card is an upgraded [[Fusion]] [[counterpart]] of "[[Arcanite Magician]]".
  ** This card has 1000 more [[ATK]]/[[DEF]] than "Arcanite Magician", and 500 more than "[[Arcanite Magician/Assault Mode]]"; this also applies after each card's ATK is boosted by their respective effects.
  ** Like the other forms of "Arcanite Magician", this card's artwork depicts the monster with a color scheme that matches its [[card type]] (in this case, purple).
