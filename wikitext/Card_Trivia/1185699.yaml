title: Card Trivia:Kewl Tune Track Maker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Kewl Tune Loudness War]]".
  * This is the only "[[Kewl Tune]]" [[Synchro Monster]] that is not an [[Card evolutions|upgraded]] Synchro version of a "Kewl Tune" [[Main Deck]] monster.
  * This monster is the narrator of the "Kewl Tune" storyline from ''[[The Valuable Book EX 6]]''.
