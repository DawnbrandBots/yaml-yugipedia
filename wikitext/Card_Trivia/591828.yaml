title: Card Trivia:Tsuchigumo, the Poisonous Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Mayakashi Mayhem]]".
  * This monster is based on the ''[[wikipedia:Tsuchigumo|Tsuchigumo]]'', a ''[[wikipedia:Yōkai|yōkai]]'' in [[wikipedia:Japanese folklore|Japanese folklore]] that takes the form of a giant monstrous spider.
  * This monster is an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form of "[[Tsukahagi, the Poisonous Mayakashi]]".
