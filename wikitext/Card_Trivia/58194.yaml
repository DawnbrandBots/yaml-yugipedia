title: Card Trivia:Endymion, the Master Magician
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the ''[[Structure Deck: Lord of Magician]]''/''[[Spellcaster's Command Structure Deck]]''.
  * This card is named after the Greek mythological figure of [[wikipedia:Endymion (mythology)|Endymion]], who was beloved by the moon goddess Selene and put to sleep forever.
  * This monster appears in the artwork of "[[Spell Power Grasp]]".
  ** This monster's staff appears in the artwork of "[[Chain Dispel]]".
  * As told in the [[Gagaga Academy Tospedia card storylines#"The Fool's Bizarre Adventure" Edition|Gagaga Academy Tospedia card storylines]], "Endymion" led an invasion on "[[The Grand Spellbook Tower]]", seeking the unification of all knowledge of magic. However, his forces were abruptly stopped by the attack of "[[Reaper of Prophecy]]", forcing him to withdraw.
  * This monster has [[Spell Counter]]s on the ring around his back, one in the center of his staff, and if you look closely; there are Spell Counters attached to his outfit.
  ** Following the pattern on the ring on the back of this monster (symbol, Spell Counter, symbol, etc.), there are a total of 8 (4 are partly visible) Spell Counters.
  * This card has a [[retrained]] and a younger counterpart: "[[Endymion, the Mighty Master of Magic]]" and "[[Endymion, the Magistus of Mastery]]".
  * The costume design of this monster bears a great resemblance to "[[Explosive Magician]]", which also debuted in the same [[booster pack]] as this card (''[[Stardust Overdrive]]'').
