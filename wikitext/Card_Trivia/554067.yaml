title: Card Trivia:Spin-Headed Behemoth
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster a [[counterpart]] to "[[Twin-Headed Behemoth]]".
  ** The Japanese name of "Twin-Headed Behemoth", "''Dol Dora''" (ドル・ドラ), is contained in this card's Japanese name, "''Spindle Dora''" (スピン'''ドル・ドラ''').
  * In computing contexts, a ''spindle'' is the fixed axis component around which the disk of a [[wikipedia:Hard disk drive|hard disk drive]] spins.
