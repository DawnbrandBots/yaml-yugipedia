title: Card Trivia:Infernoid Antra
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Infernoid Beelzebul", is derived from [[wikipedia:Beelzebub|Beelzebub]], the patron deity of the [[wikipedia:Philistines|Philistine]] city of [[wikipedia:Ekron|Ekron]] who was later depicted as a major demon in in [[wikipedia:Abrahamic religions|Abrahamic religions]] such as [[wikipedia:Christianity|Christianity]], [[wikipedia:Judaism|Judaism]], and [[wikipedia:Islam|Islam]].
  ** This monster's ''[[TCG]]'' name is derived from "''antra''", the Lithuanian word for "second", which reflects its [[Level]] (2).
