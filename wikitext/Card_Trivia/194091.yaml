title: Card Trivia:Stealthroid (manga)
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the [[wikipedia:Northrop Grumman B-2 Spirit|Northrop Grumman B-2 Spirit]], an American heavy strategic bomber that's also known as the "Stealth Bomber".
  * This card shares the same name as the ''[[OCG]]''/''[[TCG]]'' card, "[[Stealthroid]]", but features completely different stats and effects.
  * In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, although this card's effect [[target]]s [[face-down]] monsters, the monsters it targeted are not [[Set]], but [[Normal Summon]]ed in [[face-up]] [[Defense Position]].
