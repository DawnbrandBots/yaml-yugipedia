title: Card Trivia:Power Change Barrier
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Kachi Kochi Dragon]]" appears in this card's artwork.
  * The humanoid energy being that appears via this card's effect in the anime appears in the artwork of "[[Shield Fin]]".
  ** Fittingly, both cards feature an effect that prevents a monster from being [[destroy]]ed at the cost of their [[ATK]].
  * This card's effect is incorporated into the ''[[OCG]]''/''[[TCG]]'' protective and ATK-lowering effect of "[[Gogogo Golem - Golden Form]]".
