title: Card Trivia:Widespread Ruin
wikitext: |-
  {{Navigation}}

  * The device in this card's alternate artwork appears in the artworks of "[[Chain Burst]]", "[[Saber Slash]]", and "[[Widespread Dud]]".
  * This card appears in the artworks of "[[Card Destruction]]", "[[Dragged Down into the Grave]]", and the original Japanese version of "[[Exchange]]".
  * This card's Japanese name and alternate artwork are a reference to the [[wikipedia:M18 Claymore mine|M18 Claymore]], an [[wikipedia:anti-personnel mine|anti-personnel mine]].
