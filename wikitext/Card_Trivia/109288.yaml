title: Card Trivia:Centaur Mina
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on a [[wikipedia:Centaur|centaur]], a half-human, half-horse creature in [[wikipedia:Greek mythology|Greek mythology]].
  ** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster required the human-like "[[Sacred Knight's Spearholder (anime)|Sacred Knight's Spearholder]]" and "[[Horse of the Floral Knights (anime)|Horse of the Floral Knights]]" as [[Fusion Material]]s. In the ''[[OCG]]''/''[[TCG]]'', this monster requires one [[LIGHT]] [[Warrior]] monster ("[[Noble Knight's Spearholder]]") and one [[Beast]] monster ("[[Horse of the Floral Knights]]").
  * This monster's Japanese name (ケンタウルミナ, ''Kentaurumina'') is a portmanteau of the romanized Greek word "''[[wikipedia:Centaur|kéntauros]]''" (ケンタウル, ''kentaurosu'' lit. "centaur") and the Latin word "''lumina''" (ルミナ, ''rumina'').
  ** "Lumina" is the variation of ''lumen'' the Latin word for "light", which reflects its LIGHT [[Attribute]].
  * This is the first [[Fusion Monster]] to be released in ''[[Yu-Gi-Oh! Duel Links]]'' before the ''OCG''/''TCG''.
  * This is the final Fusion Monster debuting in the ''Yu-Gi-Oh! 5D's'' anime to be released in the ''OCG''/''TCG''.
  * This monster's ''OCG''/''TCG'' effect activation when used as [[Synchro Material]] for the [[Synchro Summon]] of a [[WIND]] Warrior [[Synchro Monster]] is based on how [[Sherry LeBlanc]] used this monster to Synchro Summon "[[Fleur de Chevalier (anime)|Fleur de Chevalier]]" twice in the ''Yu-Gi-Oh! 5D's'' anime.
