title: Card Trivia:Yosenjus' Secret Move
wikitext: |-
  {{Navigation}}

  * "[[Yosenju Kama 1]]", "[[Yosenju Kama 2]]", and "[[Yosenju Kama 3]]" are featured on this card's artwork.
  * This card's artwork is a reference to one version of the Kamaitachi myth. The monsters attack in groups of 3; the first stuns the victim ("Kamaitachi"/"Kama 1") , the second cuts the victim ("Kamanitachi"/"Kama 2") and the last heals the wound and stops the bleeding ("Kamamitachi"/Kama 3")
