title: Card Trivia:Shield Recovery
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card replaces the ablative shielding used by the [[B.E.S.]] ships; however, the only Core warship to exhibit this ability was in the Gameboy Advance Game, "Gradius Generations", and has yet to have a card counterpart.
  * This card's artwork resembles the scene in [[wikipedia:Star Wars Episode I: The Phantom Menace|Star Wars Episode 1]] where [[wikipedia:R2-D2|R2-D2]] repairs the shields of the Naboo Royal Cruiser.
