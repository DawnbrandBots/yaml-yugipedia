title: Card Trivia:Metaphys Executor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Metaphys Dimension]]" and "[[Metaphys Ascension]]".
  * This monster is currently the only "[[Metaphys]]" monster that is not a counterpart of any known monster, making it the only "pure" "Metaphys" monster.
  * This monster has the same insignia as the "[[Yang Zing]]" monsters on its forehead, save for no outline on the triangle, and the "spikes" touching the "core".
