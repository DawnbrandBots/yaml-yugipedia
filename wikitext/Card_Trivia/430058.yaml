title: Card Trivia:Electric Snake
wikitext: |-
  {{Navigation}}

  * This card is similar to "[[Lightserpent]]":
  ** Both monsters are based on snakes, specifically the cobra.
  ** Both have effects that [[activate]] when they are [[discard]]ed from the [[hand]].
  ** Both are [[LIGHT]]-[[Attribute]] monsters.
  * The icon for [[Reptile]] monsters in ''[[Yu-Gi-Oh! ARC-V Tag Force Special]]'' is based on this monster.
  ** Ironically, this card is a [[Thunder]] monster in the ''[[OCG]]''/''[[TCG]]''.
