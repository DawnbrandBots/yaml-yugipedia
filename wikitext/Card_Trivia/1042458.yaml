title: Card Trivia:Maiden of the Millennium Moon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[Illusion]] counterpart of "[[Maiden of the Moonlight]]".
  ** This monster's Illusion [[Type]] references how in the ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' and ''[[Yu-Gi-Oh! True Duel Monsters]]'' video game series, "[[Maiden of the Moon|Maiden of the Moonlight]]" belonged to the [[Dreams]] [[Alignment]], which is known in the Japanese version as "Illusion Magic" (げんそうま, Gensōma) or "Illusion" (げん{{Ruby|想|そう}}, ''Gensō'').
  ** This monster's effect to [[support]] [[Spellcaster]] monsters references how "Maiden of the Moonlight" is a Spellcaster monster in the ''[[OCG]]''/''[[TCG]]'' and in the ''Yu-Gi-Oh! Duel Monsters'' video game series.
