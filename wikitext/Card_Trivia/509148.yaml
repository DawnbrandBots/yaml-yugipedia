title: Card Trivia:Dimensional Fissure
wikitext: |-
  {{Navigation}}

  * The dimensional rift in this card's artwork also appears in the artwork of "[[Chain Summoning]]", "[[D.D. Crow]]", "[[D/D/D Fusion]]", "[[D/D/D Synchro]]", "[[D/D/D Xyz]]", "[[Dimensional Prison]]", "[[Shadow Severing Strike]]" and "[[Trance Archfiend]]".
  ** The dimensional rift is also strongly reminiscent of those seen in the artwork of "[[Dimension Equilibrium]]".
  * The Spanish ''[[Ra Yellow Mega Pack]]'' and ''[[Duelist Saga]]'' prints of this card use the words "''en vez''" instead of "''en su lugar''" ("''instead''").
