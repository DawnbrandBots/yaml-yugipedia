title: Card Trivia:Gold Moon Coin
wikitext: |-
  {{Navigation}}

  * "[[Mystical Elf]]" appears on the face of the coin in this card's artwork.
  ** Its ''[[TCG]]'' name is also embossed three times around the sides of the coin's face.
  * This card's Japanese name, "Gold Coin of the Stars", is based on the Japanese translation of the fairy tale, ''[[wikipedia:The Star Money|The Star Money]]'', in which a poor but kindhearted orphan girl wanders the countryside, gives her bread to a hungry beggar and her clothes to poor children. She is later rewarded for her kindness when the stars fall and transform into silver coins, making her wealthy.
  ** This card's effect reflects the story, as the player can give away two cards from their [[hand]] to the opponent's hand, and is "rewarded" by [[draw]]ing two cards.
