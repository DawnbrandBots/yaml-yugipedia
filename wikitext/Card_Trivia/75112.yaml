title: Card Trivia:Sphinx Teleia
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Sphinx|gynosphinx]], one of the many depictions of the sphinx in [[wikipedia:Greek mythology|Greek mythology]], in which it is depicted as a lion with the head or face of a woman.
  ** This monster is also likely based on the sphinx from the tale of [[wikipedia:Oedipus|Oedipus]], who kills and devours travelers who fail to answer her riddle. Fittingly, this monster's [[Attack and effect names in Yu-Gi-Oh!|attack name]] in the Japanese version of the ''[[Yu-Gi-Oh! The Movie: Pyramid of Light]]'' is "Question of the Trial".
  ** In the English dubbed version of the ''Yu-Gi-Oh! The Movie: Pyramid of Light'' anime, this monster's name was mistakenly stated as "Gynosphinx" in the card text of "[[Theinen the Great Sphinx (anime)|Theinen the Great Sphinx]]", whose Japanese name is "Sphinx Androgynous".
  * The word "Teleia" in this monster's name is Greek for "perfect".
