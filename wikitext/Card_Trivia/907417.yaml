title: Card Trivia:Penguin Cleric
wikitext: |-
  {{Navigation}}

  [[File:PenguinBrave-ConceptArt.png|thumb|right|250|"[[Penguin Brave]]" concept art]]

  * This monster appears in the artwork of "[[Penguin Brave]]".
  * The design of the characters that comprise "Penguin Brave", including this monster, appears to be based on the classes/jobs from the ''[[wikipedia:Dragon Quest|Dragon Quest]]'' games.
  ** In addition, this monster's effect to recover [[Life Point]]s and boost [[ATK]] references the "Priest Class" from ''Dragon Quest'' which focuses on healing and fortifying spells rather than being offensive.
  * Based on concept art for "Penguin Brave", this monster is a [[wikipedia:Gentoo penguin|gentoo penguin]].
