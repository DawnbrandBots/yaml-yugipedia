title: Card Trivia:Meowseclick
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (ニャータリング, ''Nyātaringu'') is a portmanteau of the words "meow" (ニャー, ''Nyā'') and "[[wikipedia:Switch#Contact bounce|chattering]]" (チャタリング, ''Chataringu'').
  ** This monster's ''[[TCG]]'' name is a portmanteau of the words "meow" and "mouse click".
