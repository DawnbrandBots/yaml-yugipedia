title: Card Trivia:Solving for Pendulum
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Point (geometry)|moving point]] concept in geometry:
  ** This card's artwork features an anthropomorphic letter "P" being chased by an anthropomorphic letter "Q" on lines that resemble the x-axis and the y-axis of a two-dimensional [[wikipedia:Cartesian coordinate system|Cartesian coordinate system]].
  ** The starting position of the [[Pendulum Monster]] in the [[Main Monster Zone]] as the center of coordinate system combined with the final position of that monster after moving and the opponent's monster in the same column resulted in the triangle-shaped geometry as depicted in the artwork.
  ** The [[T Counter]] is a reference to the variable "t", often used to represent "time" or "turn".
  ** This card's effects requiring [[Xyz Monster]]s and/or [[Fusion Monster]]s further references the x-axis and the y-axis of the two-dimensional Cartesian coordinate system, where Xyz Monsters represent "X" and Fusion Monsters (''Yūgō Monsutā'' in Japanese) represent "Y".
