title: Card Trivia:Evolsaur Pelta
wikitext: |-
  {{Navigation}}

  * This card is based on the dinosaur ''[[wikipedia:Sauropelta|Sauropelta]]''.
  * This is the first [[TCG Exclusive]] "[[Evolsaur]]" card and the second [[TCG Exclusive]] "[[Evol]]" card.
  * This card is the "Evolsaur" version of "[[Evoltile Odonto]]".
  * This monster appears in the artwork of "[[Evo-Instant]]".
