title: Card Trivia:Transam Buster Linac
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Transam Linac]]".
  ** This monster holds the weapons of "[[Transam Assault Linac]]" and "[[Transam Power Linac]]", which [[Yudias Velgear]] first used along with "[[Transam Linac (anime)|Transam Linac]]" to [[Fusion Summon]] [[Transam Buster Linac (anime)|this card]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * This monster's name is similar to that of "[[Buster Blader (Rush Duel)|Buster Blader]]".
  ** This monster's pose is also mirrored compared to that of "Buster Blader".
