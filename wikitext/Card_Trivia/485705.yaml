title: Card Trivia:D/D Savant Dirac
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[wikipedia:Paul Dirac|Paul Dirac]].
  * This monster also makes its anime debut alongside [[D/D Savant Schrödinger]], as reference to their real life counterparts, who, together, had claimed their Nobel Prize in physics in 1933.
