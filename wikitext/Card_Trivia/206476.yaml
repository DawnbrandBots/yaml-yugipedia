title: Card Trivia:Magma Field
wikitext: |-
  {{Navigation|mode=nonGame}}

  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this card's effect [[activate]]s, a number of "[[Solar Flare Dragon]]s" appear corresponding to the number of [[WATER]] [[Attribute]] monsters [[Summon]]ed during that turn; however, this effect never resolved.
  ** This card and "[[Jungle Field]]" are the only [[Field Spell Card]]s used in the anime where their effects were never successfully activated.
