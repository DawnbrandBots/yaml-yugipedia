title: Card Trivia:The Flute of Summoning Dragon
wikitext: |-
  {{Navigation}}

  * The flute in this card's artwork appears in the artwork of "[[King Dragun]]".
  * This card has a [[counterpart]]: "[[The Melody of Awakening Dragon]]".
  * This card has a [[retrain]]ed counterpart: "[[The Flute of Guiding Dragon]]".
  * This card has a "[[Kuriboh (archetype)|Kuriboh]]" counterpart: "[[The Flute of Summoning Kuriboh]]".
  * This card has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[Fiend]] counterpart: "[[Archfiend's Summoning Flute]]".
  * "[[Queen Dragun Djinn]]" wields a [[wikipedia:lyre|lyre]] modeled after this flute.
