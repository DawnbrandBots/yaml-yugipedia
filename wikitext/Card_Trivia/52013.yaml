title: Card Trivia:Fabled Leviathan
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Champion of Chaos!!]]''.
  * This monster appears in the artwork of "[[Fabled Treason]]".
  ** The small creatures in the background of this card's artwork also appear on the artworks of "[[The Fabled Catsith]]" (Heresy), "[[The Fabled Chawa]]" (Breach), and "[[The Fabled Ganashia]]" (Vio).
  ** This monster's throne appears in the artwork of "[[Infestation Pandemic]]".
  * This monster is named after the [[wikipedia:Leviathan|Leviathan]], a demon and legendary creature of Hebrew folklore.
  * This monster has a retrained [[counterpart]]: "[[Fabled Levilazebul]]".
