title: Card Trivia:Sacred Noble Knight of King Artorigus
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Extra Pack: Knights of Order]]''.
  * "[[Noble Arms - Caliburn]]" and "[[Noble Arms - Excaliburn]]" appear in this card's artwork.
  * This card is a more powerful form of "[[Artorigus, King of the Noble Knights]]".
  ** The article on "Excaliburn" from Konami's blog implies that "Artorigus" gained power by acquiring "Excaliburn". This interpretation is supported by the effect of "Excaliburn" that allows "Artorigus" to perform an [[Xyz Evolution]] into this card.
  * This monster has exactly 200 more ATK and DEF than "Artorigus, King of the Noble Knights", which in turn has 200 more ATK and DEF than "[[Noble Knight Artorigus]]".
  * This card's English name may be somewhat misleading: the phrase "Sacred Noble Knight '''of''' King Artorigus" suggests that the monster is a "Sacred Noble Knight" under the command of "King Artorigus"; however, the card's artwork, backstory, and Japanese name clearly show that this monster is "[[Artorigus, King of the Noble Knights|King Artorigus]]" himself, as an upgraded "Sacred Noble Knight".
  * This monster appears in the artworks of "[[Avalon]]" and "[[Heritage of the Chalice]]".
