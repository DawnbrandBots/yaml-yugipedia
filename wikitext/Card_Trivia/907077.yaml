title: Card Trivia:Dual Avatar Fists - Armored Ah-Gyo
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]'' name is a combination of "Gai" (Japanese word for "armor") and "A", the first half of ''"[[wikipedia:A-un|A-un]]''". The term is used in Shinto and Buddhist architecture to describe the paired statues common in Japanese religious settings, most notably the [[wikipedia:Niō|Niō]] and the ''[[wikipedia:Komainu|komainu]]''.
  ** This monster's ''[[TCG]]'' name is based on ''agyō'', the generic name for ''[[wikipedia:Komainu|Komainu]]'' statues with an open mouth.
  * This monster appears in the artwork of "[[Perfect Sync - A-Un]]" and "[[Dual Avatar Return]]".
  ** This monster's animal spirit appears in the artworks of "[[Dual Avatar Compact]]" and "[[Dual Avatar Invitation]]".
