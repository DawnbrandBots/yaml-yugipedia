title: Card Trivia:Bujingi Centipede
wikitext: |-
  {{Navigation}}

  * Much like the rest of the "[[Bujin]]" archetype, this monster is a [[Beast]]-Type despite its [[Insect]]-Type appearance.
  * This monster serves as the basis for the 4 wings of "[[Bujintei Kagutsuchi]]".
  * This monster is based on a legendary scarf known as ''Hachi no Hire'', or the ''Wasp Scarf'', which protects the bearer against bees and centipedes.
