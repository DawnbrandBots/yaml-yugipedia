  * This card's name and effect [[support]]ing "[[Wonder Wand (Duel Links)|Wonder Wand]]", "[[Bound Wand (Duel Links)|Bound Wand]]", and "[[One-Shot Wand (Duel Links)|One-Shot Wand]]" is based on a scene from {{episode|ARC-V|057|ref}} where [[Dennis McField]] juggles the aforementioned cards as part of his magic show to entertain the crowd.
