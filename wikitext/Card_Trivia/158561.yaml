title: Card Trivia:Jar Turtle
wikitext: |-
  {{Navigation}}

  * This monster is an avatar form of "[[Jar of Greed]]".
  * This monster has two [[counterpart]]s: "[[Avatar of The Pot]]" and "[[Spirit of the Pot of Greed]]".
  * This monster's Japanese name ({{Ruby|瓶|かめ}}{{Ruby|亀|がめ}}, ''Kamegame'') is a pun on the words for "pot"/"jar" and "turtle"/"tortoise," which are spelt with the exact same kana sequence,「かめ」(''kame''), with the difference being both words' [[wikipedia:Japanese pitch accent|pitch accent]]s are different so they are not exact homophones.
  ** In the case of this monster's name, the Japanese word for "turtle"/"tortoise", ''kame'', is predictably voiced as ''game'' in a compound, similar to "[[Giant Tortoise of Greed]]".
