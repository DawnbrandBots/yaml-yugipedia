title: Card Trivia:Cyber Dragon Zwei
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cyber Network]]".
  * This card appears in the artwork of "[[Three of a Kind]]".
  * This monster's name is based on "''zwei''", the German word for the number "two".
  ** This is one of several "[[Cyber Dragon (archetype)|Cyber Dragon]]" monsters that features German words in their names, referencing how in the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime and the [[Yu-Gi-Oh! GX (manga)|manga]], [[Zane Truesdale]] (who uses the "[[Cyber]]" [[archetype]]) was referred to by the title of "Kaiser", the German word for "emperor".
  * This monster serves as one of the heads of "[[Chimeratech Rampage Dragon]]".
  * This monster's [[original ATK and DEF]] (1500/1000) are 600 less than those of "[[Cyber Dragon]]" (2100/1600).
  * In ''[[Absolute Powerforce]]'', this card was a [[Short Print]] [[Rarity]], which made it difficult to find.
