title: Card Trivia:Troposphere
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Troposphere|troposphere]], the lowest layer of Earth's atmosphere, in which almost all meteorologically significant events take place.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|053|ref}}, specifically from the panel showing [[Troposphere (manga)|this monster]] being Summoned.
