title: Card Trivia:Archfiend Soldier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Death and Rebirth]]", "[[Judgment Sword]]", and "[[Spell Summon Stopper]]".
  * This monster's decapitated head appears in the artwork of "[[Nefarious Archfiend Eater of Nefariousness]]".
  * This monster has a ''[[Rush Duel]]'' counterpart: "[[Archfiend Warrior]]".
  * This card, "[[Vorse Raider (Rush Duel)|Vorse Raider]]", "[[Alien Shocktrooper (Rush Duel)|Alien Shocktrooper]]", and "[[Luster Dragon (Rush Duel)|Luster Dragon]]" have the highest [[ATK]] (1900) of all [[Level]] 4 or lower monsters in ''Rush Duel'' (despite the 1500 ATK [[Level 4 ATK and DEF conventions]] in the game).
  ** Due to this, all four cards are [[Legend Card]]s in ''Rush Duel''.
