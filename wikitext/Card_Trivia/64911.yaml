title: Card Trivia:Mirage Dragon
wikitext: |-
  {{Navigation}}

  * This monster's design is based on the armor of "[[Mirage Knight]]".
  * This monster has a [[Chaos (series)|Chaos]] [[Counterpart|counterpart]]: "[[Chaos Mirage Dragon]]".
  * This monster shares the same [[Level]] (4), [[original ATK and DEF]] (1600/600), and effect with "[[Pitch-Black Warwolf]]".
  ** Both were released in the ''[[Rise of Destiny]]'' [[Core Booster|Core Booster pack]].
  ** Both were owned by [[Atticus Rhodes]] in the ''[[Yu-Gi-Oh! GX]]'' anime, with this monster being used while Atticus was under the control of [[Nightshroud]].
