title: Card Trivia:Transam Linac
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Saikyo Starter Deck]]'', as well as one of the cover cards of ''[[Rush Duel Card Game Gum]]''.
  * This monster appears in the artworks of "[[Lifeline Linac]]", "[[Maniac You Die]]", "[[Transam Alive]]", "[[Transam Lightning]]", "[[Transam Lionheart]]", "[[Transam Nebula Fusion]]", "[[Transam Rising]]", "[[Transam Transcend]]", and "[[Transam Warcry]]".
  * This monster's appearance is based on the [[wikipedia:Entacmaea quadricolor|bubble-tip anemone]].
  * This is one of the [[signature card]]s of [[Yudias Velgear]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  ** In the anime, this card was created by [[Yuga Ohdo]] and modeled after the Milky Way galaxy, which also served as the inspiration when [[The Creator (GO RUSH!! character)|The Creator]] modeled Yudias himself.
  * This is the first [[Galaxy (Type)|Galaxy]] [[Type]] monster.
  * This is the first [[Level 4]] or lower non-[[Legend Card|Legend]] monster in ''[[Yu-Gi-Oh! Rush Duel]]'' to have more than 1500 [[ATK]], at 1600 ATK; the previous [[Level 4 ATK and DEF conventions]] in ''Rush Duel'' had been for a maximum of 1500 ATK.
  ** This is noted in {{episode|GO RUSH!!|1|ref}}, as [[Yuhi Ohdo]] is shocked by the notion of a Level 4 monster with more than 1500 ATK.
  * This monster has 9 forms.
  ** A [[signature move]] [[counterpart]]: "[[Transam Linac - Fight for the Light!]]".
  ** An upgraded [[Effect Monster|Effect]] form: "[[Transam Linac Overwrite]]".
  ** 6 [[Fusion Monster|Fusion]] forms:
  *** With "[[Sevens Road Magician]]": "[[Transam Road Linac]]".
  *** With "[[Voidvelg Requiem]]": "[[Transamvelg Linac]]".
  *** With "[[Galactica Reminiscences]]": "[[Transam Valuable Linac]]".
  *** With "[[Transam Ephyrai]]": "[[Transam Power Linac]]".
  *** With "[[Transam Lika]]": "[[Transam Assault Linac]]".
  *** With "Power Linac" and "Assault Linac": "[[Transam Buster Linac]]".
  ** A [[Ritual Monster|Ritual]] form: "[[Transam Diskarma Linac]]".
  * "[[Dark Matter Transcend Dragon]]" is "[[Dark Matter Dragon]]" fused with this monster and "[[Contact Dark Matter Wyvern]]", and has the same pose as this monster. 
  * According to the ''Yu-Gi-Oh! GO RUSH!!'' manga, this monster's Japanese [[flavor text]] and [[Attack and effect names in Yu-Gi-Oh! GO RUSH!!|attack name]], "War To Zen! Maniac You Die!" (ウォー・トゥ・ゼン！マニアック・ユウ・ダイ！ ''Wō Tu Zen! Maniakku Yuu Dai!'') is a pun on the phrase "All aliens are brothers" ({{Ruby|宇|う}}{{Ruby|宙|ちゅう}}{{Ruby|人|じん}}{{Ruby|皆|みな}}{{Ruby|兄|きょう}}{{Ruby|弟|だい}}, ''Uchūjin mina kyōdai'').
