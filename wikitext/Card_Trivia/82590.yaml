title: Card Trivia:Gorgon
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster is based on the [[wikipedia:Gorgon|Gorgon]], a half-human half-snake female monster in [[wikipedia:Greek mythology|Greek mythology]] who are known for having sharp fangs, venomous snakes for hair, and their petrifying gaze, which turns their victims to stone.
  * This monster has the highest [[original DEF]] (3500) of all [[Level 6]] monsters.
