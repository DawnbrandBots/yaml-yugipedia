title: Card Trivia:Ragnaraika Bloom
wikitext: |-
  {{Navigation}}

  * Three copies of "[[Ragnaraika the Evil Seed]]" and the sword used by "[[Ragnaraika Skeletal Soldier]]" appear in this card's artwork.
  * This card's Japanese name,「{{Ruby|蕾禍|ライカ}}{{Ruby|繚|リョウ}}{{Ruby|乱|ラン}}{{Ruby|狂|クルイ}}{{Ruby|咲|ザキ}}」(''Raika Ryōran Kuruizaki''), is based on the expressions「百花繚乱」(''hyakka ryōran''), which describes flowers blooming in profusion, and「狂い咲き」(''kuruizaki''), which describes out-of-season blooming.
