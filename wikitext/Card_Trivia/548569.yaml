title: Card Trivia:Called by the Grave
wikitext: |-
  {{Navigation}}

  * The old man from the artwork of "[[Dragged Down into the Grave]]" appears in this card's first artwork.
  ** The green arm in this card's first artwork also appears in the artwork of "[[Gravedigger's Trap Hole]]" and "[[Psychic Burial]]".
  *** The arm in this card's first artwork is related to the one depicted in the artwork of "[[Foolish Burial Goods]]", as both appear in the artwork of "[[Extra-Foolish Burial]]", have earth built up around them, ridges, and pointed fingernails.
  *** In ''[[Yu-Gi-Oh! Master Duel]]'', this card's first artwork has a special animation sequence when [[activate]]d: the arm emerges from the center of the field and points its finger towards the opponent's [[Graveyard]].
  **** The animation for this card's second artwork depicts the cavewoman avatars of Luna, "Ki-sikil," and "Lil-la" surrounding the trapped Sunny around the opponent's Graveyard, while the actual "Ki-sikil" and "Lil-la" are playing the game and enjoying a laugh at the bottom left corner of the screen.
  * "[[Live☆Twin Ki-sikil]]", "[[Live☆Twin Lil-la]]", and game avatars of the two women in the artwork of "[[Evil★Twin's Trouble Sunny]]" appear in this card's alternate artwork.
  ** This card's alternate artwork depicts a live-streaming video game collaboration between the aforementioned monsters, which is a common activity among VTubers. The artwork is designed after a live-streaming webpage which includes a section for the video game footage, a section for chat messages from viewers on the bottom-right, and the avatars of "Ki-sikil" and "Lil-la" in the foreground.
  *** The video game footage depicts Sunny, the blonde girl in "Trouble Sunny", as an icon on the top left corner and the gloved hand reaching out of the hole (both indicated by the same set of symbols to identify her name), which relates to this card's name and effect.
  **** Next to the icon of Sunny appears to be a shovel, implying she has it equipped, dug the hole as a trap, and then fell in herself (as further implied by the health indicator underneath her name, which is red and shorter in contrast to the others', which are green and longer, indicating that she is low on health from the damage taken when falling in).
  *** Luna, the gray-haired woman in "Trouble Sunny", appears to be wearing an outfit resembling that of [[wikipedia:Fred Flintstone|Fred Flintstone]].
  *** The top-right of the artwork has a red ⏵ "play" symbol and a rectangle with symbols in it; these symbols are identical to the first half of the symbols above "Ki-sikil" in the artwork of "[[Live☆Twin Home]]", implying that they represent the word "LIVE". Streaming sites such as Twitch often have such a rectangle with the word "LIVE" on the top-right to indicate that the video being watched is being streamed live.
  *** The bottom of the artwork contains video controls for the livestream:
  **** The teal bar resembles a playback seeker, which allows a watcher to watch older footage; it is all the way to the right to indicate the artwork is depicting live footage.
  **** The controls on the bottom-left depict a star (possibly a "favorite" option), a right arrow (resembling the "share" icon on many sites), and three vertical bars with ascending heights (possibly to depict the watcher's connection to the streaming service).
  **** The controls on the bottom-right depict a music note (possibly a "volume" option), a small rectangle in the bottom-left of a larger one (resembling the "theater mode" option on YouTube, possibly a "full screen" option), and a wrench (possibly for other video settings).
