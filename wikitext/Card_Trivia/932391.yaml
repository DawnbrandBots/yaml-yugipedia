title: Card Trivia:Celeb Rose Sorcerer
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Scattered Rose Runway]]", as well as in the second artwork of "[[The Secret of Manifestation]]".
  * This monster is a [[Celeb Rose]] [[counterpart]] of "[[Sevens Road Sorcerer]]".
  ** Both monsters share the same [[Level]] (4), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (1300/100).
