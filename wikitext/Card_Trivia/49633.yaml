title: Card Trivia:Dark Creator
wikitext: |-
  {{Navigation}}

  * During the "Today's Strongest Card" segment at the end of {{episode|Yu-Gi-Oh! GX|079|ref}}, this card was revealed to be a [[Fan-Made Cards|Fan-Made Card]], whose anime card artwork was based on an illustration by Toshiki Nakayama, submitted for a Japanese card illustration contest held while the ''[[Yu-Gi-Oh! GX]]'' anime was airing.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster's owner, [[Sarina]], uses mirrors in her fortunetelling, and as such, uses a [[Deck]] themed around mirrors. While this monster's name is not based on mirrors, its effects and its association with "[[Infinite Fiend Mirror (anime)|Infinite Fiend Mirror]]" is thematically tied in with the Deck.
  ** The effect of "Infinite Fiend Mirror" can [[Special Summon]] any number of "[[Dark Creator Token (anime)|Dark Creator Token]]s", which serve as a "reflection" of this monster's name, appearance, and stats.
  ** This monster's effect, restricting it to attacking monsters, is also based on the concept of a mirror; this monster cannot attack without facing a monster, similar to how a mirror cannot cast a reflection of anything that isn't facing it.
  ** This monster's effect to inflict 700 damage to the opponent after destroying a monster by battle references the common superstition of mirrors, where breaking it will result in seven years' bad luck.
  * In the ''[[Yu-Gi-Oh! Tag Force]]'' video game series, this monster's name is changed from "Dark Creator" to "Load of Darkness".
  ** This may be due to the existence of the similarly named "[[The Dark Creator]]" in the ''[[TCG]]''.
  ** This naming scheme may be due to a misspelling of "''Lord'' of Darkness" (given how the Japanese pronunciation of ''Rōdo'' (ロード) is phonetically similar), or a deliberate pun on this monster's blob-like appearance.
  * This monster's ''[[OCG]]''/''TCG'' effect to Special Summon itself from the [[hand]] by [[Tribute|Tributing]] two [[Fiend]] and/or [[Fairy]] monsters is a reference to Sarina's usage of the [[Shikigami]] [[series]], which primarily consists of Fiend and Fairy monsters.
  ** This monster's second ''OCG''/''TCG'' effect to Special Summon as many "Dark Creator Tokens" as possible is based on the effect of "[[Infinite Fiend Mirror (anime)|Infinite Fiend Mirror]]", which was used alongside this monster in the anime. The Tokens being unable to be destroyed by battle and unable to attack directly are due to the Tokens copying this monster's effect preventing itself from attack directly in the anime.
