title: Card Trivia:Sky Iris
wikitext: |-
  {{Navigation}}

  * "[[Odd-Eyes Dragon]]", [[Yuya Sakaki|Yuya Sakaki's]] [[Yuya's pendant|pendant]], and the [[Pendulum Summon]]ing portal from the ''[[Yu-Gi-Oh! ARC-V]]'' anime appear in this card's artwork.
  * This card's Japanese name ({{name|Sky Iris|ja}}, ''{{romanized name|Sky Iris|ja}}'') is based on Yuya Sakaki's Pendulum Summoning [[Summon chants in Yu-Gi-Oh! ARC-V|chant]] in the original Japanese version of the ''Yu-Gi-Oh! ARC-V'' anime: ''Draw an '''arc of light in the sky!''''' (天空に描け光のアーク！ ''Tenkū ni egake hikari no āku!'').
