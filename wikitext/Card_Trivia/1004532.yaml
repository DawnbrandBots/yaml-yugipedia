  * This card is based on the [[wikipedia:Athena Parthenos|Athena Parthenos]], a sculpture of [[wikipedia:Athena|Athena]], the Greek goddess of wisdom and warfare.
  ** This card's alternate artwork depicts a [[wikipedia:Gorgoneion|gorgoneion]] on the statue's shield, similar to Athena's [[wikipedia:Aegis|aegis]].
