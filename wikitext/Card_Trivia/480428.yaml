title: Card Trivia:Gouki Twistcobra
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gouki Poison Mist]]", "[[Gouki Re-Match]]", and "[[Gouki Roar]]".
  * This monster is named after the [[wikipedia:Professional wrestling holds|cobra twist]], a technique in [[wikipedia:Professional wrestling|professional wrestling]] which involves twisting an opponent's neck and spinal column. Fittingly, this monster's design is based on a [[wikipedia:Cobra|cobra]].
