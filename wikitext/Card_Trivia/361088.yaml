title: Card Trivia:Revival Swarm
wikitext: |-
  {{Navigation}}

  * "[[Battlewasp - Arbalest the Rapidfire]]" appears in this card's artwork.
  * This card's Japanese name, "Bee Jewel of Rebirth" (蘇生の蜂玉 ''Sosei no Hōgyoku'') is a play on the word for "jewel" (宝玉 ''hōgyoku''), with the first kanji replaced with the kanji for "bee" (蜂).
