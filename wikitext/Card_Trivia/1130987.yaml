title: Card Trivia:Gouki Sheik Ogre
wikitext: |-
  {{Navigation}}

  * This monster's name and design are based on [[Wikipedia:The Sheik (wrestler)|Edward George Farhat]], an American [[wikipedia:Professional wrestling|professional wrestler]] known by his ring name "The Sheik".
  ** This monster's design features flames coming from its palms, referencing The Sheik's notorious usage of impromptu flamethrowers during his matches. 
  *** Additionally, its fiery aura likely references the Fire Tag-Team Death Match between The Sheik and his nephew Sabu, and Atsushi Onita and Tarzan Goto, where the ring ropes were replaced with flaming barbed wire. During the match, The Sheik suffered third-degree burns and went into a near-fatal coma.
