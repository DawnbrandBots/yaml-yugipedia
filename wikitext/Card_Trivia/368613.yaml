title: Card Trivia:Metalfoes Volflame
wikitext: |-
  {{Navigation}}

  * This card's name is derived from the metal [[wikipedia:Tungsten|Tungsten]], also known as Wolfram.
  * "[[Metalfoes Crimsonite]]" is a [[Counterpart|Fusion counterpart]] of this card.
  * This card's flavor text references "[[True King Agnimazud, the Vanisher]]".
