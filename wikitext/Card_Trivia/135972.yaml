title: Card Trivia:Battle Constant
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Brain Dragon]]", and the cards "[[Cosmo Queen]]", "[[D.D. Borderline]]" and "[[Spatial Collapse]]" appear in this card's Japanese anime artwork.
  ** "[[Dimensionhole]]" and "[[D - Counter]]" appear in the international anime artwork, each replacing "D.D. Borderline" and "Spatial Collapse" respectively.
  *** This is ironic, as this card's effect requires a [[Continuous Spell Card]] and [[Continuous Trap Card]], while "Dimensionhole" and "D - Counter" are both [[Normal Spell]] and [[Normal Trap Card]]s.
