title: Card Trivia:Ultimaya Tzolkin
wikitext: |-
  {{Navigation}}

  * This monster is based on the true form of the [[Ultimate God]] entity in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, which is also the first [[Dark Synchro Monster]] to appear in the manga.
  ** This monster can be considered the manga [[counterpart]] of "[[Crimson Dragon (card)|Crimson Dragon]]", which is based on the [[Crimson Dragon]] from the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This monster's ''[[OCG]]''/''[[TCG]]'' [[Summoning conditions]] are based on [[Ultimate God Ultimaya Tzolkin (manga)|its appearance]] in the ''Yu-Gi-Oh! 5D's'' manga, where it requires a [[Dark Tuner monster]] and non-[[Tuner monster]] of the same level that are at least [[Level 5]] or higher. During its first appearance in {{chapter|5D's|059|ref}}, this monster was [[Dark Synchro Summon]]ed using two copies of the [[Level 8]] "[[Wicked Priest Chilam Sabak (manga)|Wicked Priest Chilam Sabak]]", with one copy treated as a Dark Tuner monster.
  ** This monster's title of "Ultimate God" ({{Ruby|究|きゅう}}{{Ruby|極|きょく}}{{Ruby|神|しん}}) in the manga includes the Japanese name of the "[[Aesir]]" [[archetype]] ({{Ruby|極|きょく}}{{Ruby|神|しん}}). The title was removed upon its release in the ''OCG''/''TCG'' to prevent it from being part of the "Aesir" archetype.
  * This monster's name may be derived from [[wikipedia:Tzolkʼin|Tzolkʼin]], the basic cycle of the Mesoamerican Maya calendar that figures preeminently in the society and rituals of the ancient and modern [[wikipedia:Maya peoples|Maya peoples]].
  * This monster has an [[Card evolutions|evolved]] form: "[[Phantasmal Lord Ultimitl Bishbaalkin]]".
  * This monster has a [[Link Monster|Link]] counterpart: "[[Duel Link Dragon, the Duel Dragon]]".
  * This is the first [[Synchro Monster]] that cannot be [[Synchro Summon]]ed.
  * This is the first [[Level 0]] [[Monster Card]], and the second monster (other than a Token) to be printed with 0 [[Level]]/[[Rank]] "stars" after "[[Number F0: Utopic Future]]".
  ** "Utopic Future" also has 0 [[ATK]]/[[DEF]] and a condition that treats it as having a specific Level/Rank other than 0.
  ** Both monsters also appeared in the final battles of their respective series.
  * Due to its ''OCG''/''TCG'' effect, this monster cannot [[Summon]] all of the [[Duel Dragon]]s with its effect. It cannot Summon "[[Ascension Sky Dragon]]", "[[Beelzeus of the Diabolic Dragons]]" and "[[Dragocytos Corrupted Nethersoul Dragon]]" (which are [[Level]] 10), or "[[Dragonecro Nethersoul Dragon]]" (which is a [[Fusion Monster]]); however, it can Summon all of the [[Signer Dragon]]s and their Duel Dragon counterparts.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''Yu-Gi-Oh! 5D's'' manga, specifically from the panel showing this monster being Summoned.
