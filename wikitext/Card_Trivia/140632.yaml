title: Card Trivia:White Elephant's Gift
wikitext: |-
  {{Navigation}}

  * The bone in this card's artwork features an etched design resembling ''[[wikipedia:Henohenomoheji|henohenomoheji]]'', a face drawn by Japanese schoolchildren using higarana characters.
  * This card's Japanese name, "Horse's Bone Compensation", is a term commonly used by [[Seto Kaiba (manga)|Seto Kaiba]] to insult [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] in the Japanese version of the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' and [[Yu-Gi-Oh! (anime)|anime]], which is also referenced by its inclusion in [[Joey Wheeler (Duel Arena)|Joey Wheeler's]] [[Side Deck]] in ''[[Yu-Gi-Oh! Duel Arena]]''.
  * This card's ''[[TCG]]'' name is derived from a "[[wikipedia:White elephant|white elephant gift]]", the colloquial term referring to a gift that its owner cannot dispose of without extreme difficulty, while ts cost of maintenance outweighs its value. This card's effect could be interpreted as getting rid of the burdensome "white elephant gift" by [[send]]ing the player's [[face-up]] [[non-Effect Monster]] to the [[Graveyard]] in exchange for compensation by [[draw]]ing two cards.
