title: Card Trivia:Cocopudding the Princess of Happiness
wikitext: |-
  {{Navigation}}

  * This monster is based on the [https://www.cocos-jpn.co.jp/menu/grand/dessert/pudding_cocos2203.html CoCo Pudding], a menu item offered by the Japanese branch of ''[[Wikipedia:Coco's Bakery|Coco's Bakery]]''.
  ** This monster's color scheme is similar to that of the CoCo Pudding.
  ** The [[flavor text]] naming this monster's kingdom as "Coco" is an allusion to ''Coco's'', and the servants "Caramel" and "Whip" reference how the CoCo Pudding is served with caramel sauce and a dollop of whipped cream.
