title: Card Trivia:Nephe Shaddoll Fusion
wikitext: |-
  {{Navigation}}

  * "[[Qliphort Scout]]" appears in this card's artwork.
  ** The "[[Qli]]" ''Tree of Death'' (attached to the roots of "[[Naturia Sacred Tree]]"), and the rider of "[[El Shaddoll Winda]]" (who appears to be bound to the canisters seen on the body of "[[Infernoid Sjette]]") also appear in this card's artwork.
  * "Nephe" in this card's name is based on ''[[wikipedia:Nephesh|nephesh]]'', the Hebrew word for "soul".
  * This is the first [[Equip Spell Card]] that can [[Fusion Summon]] a [[Fusion Monster]].
