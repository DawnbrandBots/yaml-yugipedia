title: Card Trivia:Hamon, Lord of Striking Thunder
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Collectible Tins 2006 Wave 2]]'', ''[[Structure Deck: Sacred Beasts of Chaos]]''/''[[Structure Deck: Sacred Beasts]]'', and ''[[Speed Duel GX: Duelists of Shadows]]''.
  * This monster appears in the artworks of "[[Awakening of the Sacred Beasts]]",  "[[Cerulean Skyfire]]", "[[Dimension Fusion Destruction]]", "[[Fallen Paradise of the Sacred Beasts]]", "[[Phantasmal Martyrs]]", "[[Phantasmal Sacred Beasts of Chaos]]", and "[[Skyfire of the Sacred Beast]]".
  * This card appears in the artwork of "[[Unleashing the Sacred Beasts]]".
  * This monster is named after Hamon, the alternate name of the archangel [[wikipedia:Gabriel|Gabriel]] in the [[wikipedia:Book of Enoch|Book of Enoch]] in Judeo-Christian religions.
  * This monster has a [[retrained]] "[[Sacred Beast (archetype)|Sacred Beast]]" [[archetype]] counterpart: "[[Hamon, Lord of Striking Thunder - Sacred Beast of Sinful Catastrophe]]".
  * This monster is the [[Sacred Beast]] counterpart of "[[The Winged Dragon of Ra]]".
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this card had a yellow border, similar to that of "[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]".
  ** This monster has a lightning motif, while "The Winged Dragon of Ra" has a fire motif. These traits are inverted with those of "[[Slifer the Sky Dragon]]" and "[[Uria, Lord of Searing Flames]]", respectively.
  * This monster has the highest [[original ATK and DEF]] (4000/4000) of all [[Thunder]] monsters.
  * This monster is tied with "[[Thunder Dragon Titan]]" and "[[Prank-Kids Battle Butler]]" for the highest [[Level]] (10) of all Thunder monsters.
  * The [[Spirit Keys]] appear in the background of this and the two other [[Sacred Beasts]] card's artwork.
