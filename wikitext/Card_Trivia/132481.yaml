title: Card Trivia:Dragunity Arma Mystletainn
wikitext: |-
  {{Navigation}}

  * This card's name comes from the [[wikipedia:Mistilteinn|Mistilteinn]], a sword of Norse mythology.
  ** The sword [http://castlevania.wikia.com/wiki/Mystletain Mystletain] is also found on some of the [[Konami]]'s Castlevania games.
  * This card is most likely a younger version of "[[Dragunity Arma Leyvaten]]" since they have similar effects and designs.
