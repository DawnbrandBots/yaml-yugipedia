title: Card Trivia:Needle Soldier
wikitext: |-
  {{Navigation}}

  * This monster is a counterpart of "[[Lancer Archfiend]]".
  ** Both are depicted in a similar stance in their respective artwork.
  ** Both are named after piercing objects, which reflect their effect to make a monster inflict [[piercing]] [[battle damage]].
  ** Both are used by the main rivals of the ''[[Yu-Gi-Oh! 5D's]]'' anime (this monster was used by [[Yusei Fudo]], while "Lancer Archfiend" was used by [[Jack Atlas]]).
