title: Card Trivia:Sylvan Lotuswain
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Sylvan Waterslide]]" and "[[Sylvan Charity]]".
  * "[[Sylvan Hermitree]]", "[[Sylvan Marshalleaf]]", and "[[Sylvan Sagequoia]]" appear in this card's artwork.
  * This card's name, "Lotuswain", is a portmanteau of "[[wikipedia:Nelumbo nucifera|Lotus]]" and "[[wikipedia:Coxswain|Coxswain]]".
