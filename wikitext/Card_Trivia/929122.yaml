title: Card Trivia:Aeropixthree
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Aeropixi" (エアロピ{{Ruby|Ξ|クシー}} ''Earopiku-Shī'') is a portmanteau of "aerobics" (エアロビクス, ''earobikusu''), "pixie" (ピクシー, ''pikushī''), and the Greek letter ''xi'', Ξ (クシー ''kushī''), which resembles the Chinese and Japanese numeral for "three" (三).
  ** This monster's ''[[TCG]]'' name is a combination of the words "aerobics", "pixie", and "three", the latter referencing the three monsters in this card's artwork.
  ** This monster's card-moving effect references side-to-side aerobic movements, and the [[Burnup Counter]] placed by this monster's effect, along with the 200 [[ATK]]/[[DEF]] loss of monsters with Burnup Counters, reflects how aerobics can help burn calories.
