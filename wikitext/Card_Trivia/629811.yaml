title: Card Trivia:Predaprime Fusion
wikitext: |-
  {{Navigation}}

  * "[[Predaplant Flytrap]]", "[[Predaplant Moray Nepenthes]]", and the silhouette of "[[Starving Venom Fusion Dragon]]" (in a pose based on [[Card Artworks:Starving Venom Fusion Dragon|its first artwork]]) appear in this card's artwork.
  ** This card's artwork is a reference to how "[[Predaplant Flytrap (anime)|Predaplant Flytrap]]" and "[[Predaplant Moray Nepenthes (anime)|Predaplant Moray Nepenthes]]" were repeatedly used to [[Fusion Summon]] "[[Starving Venom Fusion Dragon (anime)|Starving Venom Fusion Dragon]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** Ironically, "Starving Venom Fusion Dragon" cannot take advantage of this card's full effect, as the two [[DARK]] monsters required from the player's [[field]] fulfills its [[Fusion Material]] requirements before they can use any monsters their opponent [[control]]s.
