title: Card Trivia:Fire King High Avatar Garunix
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Onslaught of the Fire Kings]]''/''[[Onslaught of the Fire Kings Structure Deck]]''.
  * This monster appears in the artworks of "[[Phantasm Spiral Assault]]", "[[Onslaught of the Fire Kings]]", "[[High Tide on Fire Island]]", "[[Fire King Island]]", and "[[Phantasm Spiral Wave]]".
  ** This monster's deceased body appears in the artwork of "[[Circle of the Fire Kings]]", being reborn into "Legendary Fire King Ponix".
  ** A fiery form of this monster appears in the artwork of "[[Echelon of the Fire Kings]]".
  * This monster has 4 forms.
  ** A baby form: "[[Legendary Fire King Ponix]]".
  ** A younger form: "[[Fire King Avatar Garunix]]".
  ** A [[retrained]] counterpart: "[[Sacred Fire King Garunix]]".
  ** An upgraded form: "[[Garunix Eternity, Hyang of the Fire Kings]]".
  * This card's name is a portmanteau of "[[wikipedia:Garuda|Garuda]]" and "[[wikipedia:Phoenix (mythology)|Phoenix]]", two creatures from Hindu and Greek mythology, respectively.
  ** This card's effect to [[Special Summon]] itself after being destroyed by card effects is a reference to the ability of the phoenix to rise from the ashes after death.
  ** This monster's appearance bears a strong resemblance to the Phoenix from Greek mythology and the [[wikipedia:Firebird (Slavic folklore)|Firebird]] from Slavic mythology.
  ** This monster's feathers are based on the [[wikipedia:Fenghuang|Fenghuang]], the Chinese version of the Phoenix.
  ** This monster has a bird-like body, while the Garuda, the Hindu and Buddhist version of the Phoenix, is often depicted with a birdman-like body.
  ** This monster has teeth in its beak, just like Balinese Garuda.
