title: Card Trivia:Jinzo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Joey]]'', ''[[Deck Custom Pack 01]]'', ''[[Legendary Collection 4: Joey's World]]'', and ''[[Speed Duel: Streets of Battle City]]''.
  * This monster appears in the artworks of "[[Amplifier]]","[[Cyber Energy Shock]]", "[[Everlasting Alloy]]", "[[Factory of 100 Machines]]", "[[Judgment Sword]]", "[[Psychic Shockwave]]", and "[[Psychic Wave]]".
  * This monster's ''[[TCG]]'' name is based on the base kanji meaning "artificial" (人造, ''Jinzō''), which makes up its Japanese name, "Android - Psycho Shocker" (人造人間－サイコ・ショッカー, ''Jinzōningen - Saiko Shokkā''). The base kanji making up the word "android" (人造人間) can be read as "artificial human".
  ** An android is a humanoid robot or a synthetic organism commonly used in the science fiction genre. They are designed to imitate or resemble a human being, which reflects this monster's [[Machine]] [[Type]].
  * The background of this card's artwork is pink, referencing the pink-colored borders of [[Trap Card]]s, which this monster serves as its [[anti-support]].
  * This is the [[signature card]] of [[Esper Roba (manga)|Esper Roba]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] ([[Espa Roba]] in the [[Yu-Gi-Oh! (anime)|anime]]).
  * This monster has several versions:
  ** An [[Card evolutions|upgraded]] version: "[[Jinzo - Lord]]"
  ** A weaker version: "[[Jinzo - Returner]]"
  ** 2 [[retrained]] versions: "[[Jinzo the Machine Menace]]" and "[[Jinzo - Energy Shocker]]"
  ** An [[Xyz Monster]] version: "[[Jinzo - Layered]]"
  ** A retrained ''[[Rush Duel]]'' version: "[[Jinzo - Amplified]]"
  * This monster has a [[Spell Card]]-negating counterpart: "[[Spell Canceller]]".
  * This monster has a Trap Card counterpart: "[[Royal Decree]]".
  * This is the first [[Legend Card|Legend]] [[Effect Monster]] to be released in ''Yu-Gi-Oh! Rush Duel''.
  ** This is the first card in ''Yu-Gi-Oh! Rush Duel'' that can negate another effect.
  * The [[DARK]] [[Fiend]] effect of "[[Sky Scourge Invicil]]" is directly based on this monster's effect.
  * In {{episode|ZEXAL|015|ref}}, this monster appears as a statue in the [[Duel Sanctuary]].
  * In the ''Yu-Gi-Oh!'' manga and anime, this monster could [[destroy]] Trap Cards instead of negating them. This effect is implemented in the release of "Jinzo the Machine Menace".
  ** In the anime, during the [[Virtual World (arc)|Virtual World arc]], [[Leichter]] takes the form of "Jinzo" to act as his [[Deck Master]], whose Deck Master ability allows him to destroy all of the opponent's Trap Cards while leaving his own unaffected.
  *** Ironically, Leichter's opponent was [[Seto Kaiba]] while [[Johnson]], who took the form of "[[Judge Man]]" to act as his Deck Master, was [[Joey Wheeler]]'s opponent. Both were used by the other one's opponent, feature a Deck Master ability that destroys a certain type of the opponent's cards on the field, and share the same [[Level]] (6) and [[original DEF]] (1500).
  * This monster's ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game pose is taken from a panel from {{chapter|Yu-Gi-Oh!|158|ref}} showing [[Jinzo (manga)|this monster]] being Summoned.
