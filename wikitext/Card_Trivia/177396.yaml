title: Card Trivia:Queen Nereia the Silvercrown
wikitext: |-
  {{Navigation}}

  * This card's male counterpart is "[[King Landia the Goldfang]]".
  ** They both have similar name pattern: '''King''' and '''Queen'''; '''Gold'''fang and '''Silver'''crown.
  ** They both belong to the [[Match winner]] series.
  * As do the other cards in the Match winner series, this card needs three monsters to be Summoned.
  ** This is the first Match winner that does not need a specific Type of monster to be Summoned initially, along with "King Landia the Goldfang". However, they both require a specific Type of Xyz Material to win the Match by their effects.
  * The word "Silver" in this card's name may be a reference to the fact that it was awarded to the 2nd, 3rd, and 4th place finishers in [[Yu-Gi-Oh! World Championship 2011]], in contrast to "King Landia the '''Gold'''fang, which was awarded to the tournament's winner.
  * This monster's name is derived from the [[wikipedia:Nereid|Nereids]], sea nymphs from Greek mythology.
  * This card is the first [[Plant]]-Type Xyz Monster revealed.
  ** This is also the first Rank 6 Xyz Monster revealed.
  * This card is similar to "[[Fairy King Albverdich]]", as both are pale, have red-and-white color schemes, are Plant-Type, and are royalty.
