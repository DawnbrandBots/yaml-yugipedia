title: Card Trivia:Zero Gate of the Void
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Void Ogre Dragon]]" appears in this card's artwork.
  * This is the fifth of five cards that prevent the user from losing when their [[Life Point]]s hit zero, the other four being "[[Relay Soul]]", "[[Divine Serpent Geh]]", "[[Infernity Zero]]", and the anime effect of "[[Morphtronic Lantron]]".
  ** This is the second of these five to be played by [[Kalin Kessler]], along with "[[Infernity Zero]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime and this card in the [[Yu-Gi-Oh! 5D's (manga)|manga]].
  * This is the only card with effects that specifically prevents [[automatic win]]s.
