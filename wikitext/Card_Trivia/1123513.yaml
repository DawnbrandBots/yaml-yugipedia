title: Card Trivia:Vanquish Soul Rocks
wikitext: |-
  {{Navigation}}

  * This monster is the humanoid form of "[[Rock of the Vanquisher]]".
  * This monster's Simplified Chinese given name, 项 (Xiàng), is likely based on equivalent to the "rock" word, 虚像 (xūxiàng, "Empty Statue") in the Simplified Chinese name of "[[Rock of the Vanquisher]]", 斗神的虚像.
