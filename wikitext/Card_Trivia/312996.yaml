title: Card Trivia:Different Dimension Encounter
wikitext: |-
  {{Navigation}}

  * "[[Dark Lucius LV4]]" and "[[Knight Day Grepher]]" appear in this card's artwork.
  ** Both monsters are the alternate future forms of "[[Warrior Dai Grepher]]", each taking either the "dark" or "light" paths of depicted in the artwork of "[[The Paths of Destiny]]".
  ** This card's artwork likely depicts the aftermath of the events depicted in the artwork of "[[Different Dimension Ground]]".
