title: Card Trivia:Crowning of the Emperor
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card's name and effect ([[Tribute|Tributing]] a "[[Toy Soldier (Tag Force Special)|Toy Soldier]]" to [[Special Summon]] "[[Toy Emperor]]") reference the rise of [[wikipedia:Napoleon Bonaparte|Napoleon Bonaparte]] from military commander to the emperor of France.
  * Despite this card's video game lore stating that the "Toy Soldier" must be [[face-up]] to be Tributed for its effect, in ''[[Yu-Gi-Oh! GX Tag Force 2]]'', a [[face-down]] "Toy Soldier" can also be Tributed.
