title: Card Trivia:The First Sarcophagus
wikitext: |-
  {{Navigation}}

  * This card appears in the Japanese artwork of "[[Trap Sluzer]]".
  * "[[The Second Sarcophagus]]" appears inside the coffin in this card's artwork.
  * This card is based off of the [[wikipedia:Ancient Egyptian Burial customs|real-world structure of ancient Egyptian sarcophagi]] where the mummified body would be held inside of multiple, consecutively smaller coffins made of different materials and styles. This card depicts a stone coffin, the most common type used for an outer coffin by the wealthy.
  * This card is somewhat similar to "[[Destiny Board]]", as both are [[Continuous Trap Card]]s that place specific [[Continuous Spell Card]]s on the [[field]] for a single effect.
