  * This is the first "[[Rank-Up-Magic]]" card to appear in the [[Yu-Gi-Oh! ZEXAL (manga)|''Yu-Gi-Oh! ZEXAL'' manga]].
  * This card can be seen as the manga counterpart to "[[Rank-Up-Magic Numeron Force]]".
  * This card depicts the [[Emperor's Key]].
