title: Card Trivia:Battlin' Boxer Counterpunch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Jolt Counter]]".
  * This monster's name is based on "[[wikipedia:Counterpunch (boxing)|counterpunching]]", a move used in the sport of [[wikipedia:Boxing|boxing]] that immediately follows an attack launched by an opponent to exploit their guard.
  ** This is reflected in this monster's effects to "counter" an opponent's attack during the [[Damage Step]]: In the anime, it can [[activate]] the effect of an opponent's [[Trap Card]] from their [[Graveyard]], while in the ''[[OCG]]''/''[[TCG]]'', it can make a "[[Battlin' Boxer]]" gain 1000 [[ATK]], both of which can be activated by [[banish]]ing itself.
