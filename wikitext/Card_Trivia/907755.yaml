title: Card Trivia:Ecdysis Caesarleon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Storming Wrath]]" and "[[Wrath of Light]]".
  * The first portion of this monster's name is based on "[[wikipedia:Ecdysis|ecdysis]]" the process of shedding old skin in reptiles, which is reflected by this monster's appearance.
  ** The second portion of this monster's Japanese name, "Caliguleon" is a portmanteau of "[[wikipedia:Caligula|Caligula]]" and "chameleon", while its English name is a portmanteau of "[[wikipedia:Caesar (title)|Caesar]]" and "chameleon".
  *** Both names reference the Roman emperors Caligula and [[wikipedia:Julius Caesar|Julius Caesar]]. Caligula is also known for his insane tyranny and his cruelty, while Caesar is also known for being power-hungry, both of which are reflected in the cruel and power-hungry personality of this monster's owner, [[Yuga Goha]].
