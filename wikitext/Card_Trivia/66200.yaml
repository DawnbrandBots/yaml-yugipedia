title: Card Trivia:D.D. Survivor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[D/D/D Headhunt]]", "[[Dimension Reversion]]", and "[[Escape from the Dark Dimension]]".
  * This monster is "[[Chain Thrasher]]" after he became lost in the [[Different Dimension]], with the bandages on his right limbs replaced by a robotic arm and a robotic leg brace, similar to "[[Warrior Lady of the Wasteland]]" and "[[D.D. Warrior Lady]]".
