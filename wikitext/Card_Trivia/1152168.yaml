title: Card Trivia:Elfnote Lucina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Artmage Impasto -Recapture-]]", "[[Elfnotes: A Plea for Help]]", "[[Elfnotes: Aristeia of Trust]]", "[[Elfnotes: Quatrain of Succession]]", "[[Elfnotes: Rhapsodia of Madness]]" and "[[June Pride - Elfnotes]]".
  * This monster has a corrupted [[Synchro Monster|Synchro]] form after merging with the Grand Spirit who took on the power of "[[Elfnote Power Patron]]": "[[Elfnote Seraphim Strelitzia]]".
  * This monster is named after [[wikipedia:Lucina (mythology)|Lucina]], the Roman goddess of childbirth. ''Lucina'' is also an epithet given to [[wikipedia:Juno (mythology)|Juno]], the queen of the gods, in her role as a goddess of childbirth.
