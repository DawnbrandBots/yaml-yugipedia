title: Card Trivia:Ritzy King Rex
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Upstart King Rex" (ナリキング・レックス ''Narikingu Rekkusu''), is a play on the Japanese name of "[[Upstart Goblin (Rush Duel)|Upstart Goblin]]" (成金ゴブリン ''Narikin Goburin'').
  * This monster is the [[Nouveau Riche Dinosaur]] counterpart of "[[Super King Rex]]".
