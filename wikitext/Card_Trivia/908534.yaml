title: Card Trivia:Ad Libitum of Despia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Etude of the Branded]]", "[[Branded Loss]]", and "[[Swordsoul Blackout]]".
  * This card is named after the Latin phrase "[[wikipedia:Ad libitum|ad libitum]]", the Latin phrase for "as you desire" which is commonly known as "ad-libbing" where actors make up unscripted lines during a performance.
  ** The "Ad Libitum" part in this card's name might reference a lie told by this monster to "[[Swordsoul Strategist Longyuan]]", in order to convince it to [[Swordsoul Sinister Sovereign - Qixing Longyuan|betray]] the "[[Swordsoul]]s".
  * This monster is "[[Dogmatika Ashiyan]]" corrupted by the power of the Hole.
  ** This card's [[Level]] is the same as that of "Ashiyan", while its [[ATK]]/[[DEF]] are reversed.
