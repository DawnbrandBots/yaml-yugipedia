title: Card Trivia:Gravekeeper's Commandant
wikitext: |-
  {{Navigation}}

  * This card is the only "[[Gravekeeper's]]" monster whose [[Attribute]] isn't [[DARK]].
  * This monster is wearing a mask of a jackal, the beast-head commonly associated with [[wikipedia:Anubis|Anubis]], the Egyptian god associated with embalmment and death, keeping in relation with the theme of the "Gravekeeper's" archetype.
