title: Card Trivia:Gizmek Makami, the Ferocious Fanged Fortress
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]'' name is a combination of ''[[wikipedia:Japanese_wolf|Ōkami]]'' (the Japanese word for "Wolf"), ''[[wikipedia:Tsukuyomi-no-Mikoto|Tsukuyomi-no-Mikoto]]'' (the Moon God in [[wikipedia:Shinto|Shinto]] and [[wikipedia:Japanese mythology|Japanese mythology]]) and ''Makami'' (divine beasts in Japanese mythology that are often used to ward of evil and typically appear in the form of a wolf).
