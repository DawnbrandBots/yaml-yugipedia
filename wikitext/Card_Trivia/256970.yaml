title: Card Trivia:Ghostrick Specter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amaze Attraction Horror House]]", "[[Ghostrick Festival]]", "[[Ghostrick-Go-Round]]", "[[Ghostrick Mansion]]", "[[Ghostrick Night]]", "[[Ghostrick Parade]]", "[[Ghostrick Renovation]]", "[[Ghostrick Scare]]", "[[Ghostrick Shot]]", "[[Jack-In-The-Hand]]", and "[[Shateki]]" (as a toy).
  * This monster is based on a [[wikipedia:Ghost|ghost]], the soul of the deceased who appears among the living, who are often depicted wearing sheets.
