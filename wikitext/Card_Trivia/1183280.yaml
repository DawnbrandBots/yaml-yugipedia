title: Card Trivia:Summer
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the season [[wikipedia:Summer (season)|summer]] in a Japanese setting (featuring moonlit sky and fireflies). 
  * The Japanese text featured in this card's artwork 「夏は夜」 (lit. "In Summer the Nights") is the opening line for the second paragraph of ''[[wikipedia:The Pillow Book|The Pillow Book]]''.
  ** This reflects this card being printed after "[[Spring]]", which features the first line of ''The Pillow Book'' in its artwork.
