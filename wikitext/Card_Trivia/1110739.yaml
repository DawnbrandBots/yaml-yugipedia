title: Card Trivia:Gogogo Goblindbergh
wikitext: |-
  {{Navigation}}

  * "[[Gogogo Golem]]" appears in this card's artwork.
  * This monster is a "[[Gogogo]]" counterpart of "[[Goblindbergh]]".
  ** Two copies of this monster are depicted carrying a container with "Gogogo Golem" inside, referencing how, in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and manga, the effect of "Goblindbergh" is depicted as multiple copies of itself carrying the same container, inside of which is the monster its effect [[Special Summon]]s from the [[hand]].
