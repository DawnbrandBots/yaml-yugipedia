title: Card Trivia:Card Advance
wikitext: |-
  {{Navigation}}

  * "[[Tyrant Dragon]]" appears in this card's artwork.
  * The word "Advance" in this card's name may be a reference to Advance Summon, the ''[[OCG]]'' term for [[Tribute Summon]] (which this card supports).
  ** Another example of such a card is "[[Advance Zone]]". Curiously, both were released in the ''[[TCG]]'' before the ''OCG'', even though their original name refers to an ''OCG''-exclusive term.
  * In sealed play for [[Battle Pack 3: Monster League]], there exists only one monster that can be Tribute Summoned, that being "[[Stegocyber]]", which can be [[Special Summon]]ed with its own effect anyway and has poor attack. Thus it's incredibly unlikely for the second part of this card's effect to be applied in the sealed format.
