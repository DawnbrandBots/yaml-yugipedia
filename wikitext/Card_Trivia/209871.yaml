title: Card Trivia:Spiritual Light Art - Hijiri
wikitext: |-
  {{Navigation}}

  * "[[Lyna the Light Charmer]]" appears in this card's artwork.
  * The kanji for "holy" (聖) appears in the background of this card's artwork.
  * This card is similar to "[[Dark Spirit Art - Greed]]".
  ** Both are "[[Spirit Art]]" cards that [[support]]s opposite [[Attribute]]s.
  ** Both can be [[negate]]d if the opponent [[reveal]]s a certain type of card in their [[hand]].
