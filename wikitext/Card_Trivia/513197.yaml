title: Card Trivia:Zombie Master
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Return of the Zombies]]" and "[[Uni-Song Tuning]]".
  * "[[Reborn Zombie]]" and "[[Skull Servant]]" appears in this card's artwork.
  * This monster has a [[Skill Card]] counterpart: "[[Zombie Master (Skill Card)|Zombie Master]]".
  * This monster has a "[[Wight]]" [[Continuous Spell Card]] counterpart: "[[Wight Reanimator]]".
  ** A silhouette of this monster appears in that card's artwork.
