title: Card Trivia:Jurrac Tyrannus
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Tyrannosaurus|Tyrannosaurus]]'', a species of large and bipedal predatory dinosaur from the [[wikipedia:Late Cretaceous|Late Cretaceous]] period.
  ** This monster's effect to gain 300 [[ATK]] when it [[destroy]]s an opponent's monster by battle and sends it to the [[Graveyard]] references the predatory nature of the ''Tyrannosaurus'' to devour its prey.
