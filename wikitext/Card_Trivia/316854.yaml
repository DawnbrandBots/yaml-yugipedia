title: Card Trivia:D/D Savant Galilei
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Galileo Galilei|Galileo Galilei]].
  ** This is further expressed in the design of the card, which has multiple switches operating a massive telescoping lens. Galilei discovered that the planets of the [[wikipedia:Solar System|Solar System]] did not revolve around the [[wikipedia:Earth|Earth]], but around the [[wikipedia:Sun|Sun]] instead, proving the works of [[wikipedia:Johannes Kepler|Johannes Kepler]].
  * This card is a polar opposite to "[[D/D Savant Kepler]]" in terms of its Level, [[Pendulum Scale]] and [[Pendulum Effect]].
  ** In the anime, the initial Pendulum Scale-increasing effect of this card is explained by this card being an unstable [[Pendulum Monster]] prototype.
