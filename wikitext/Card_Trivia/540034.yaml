title: Card Trivia:Great Angus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abduction]]" and "[[Beast Soul Swap]]".
  * This monster's name is derived from "Angus", the given name of a breed of hornless cattle that is commonly used  in the production of beef.
  * Although this monster is depicted as a creature similar to a type of wild boar, in the ''Yu-Gi-Oh!'' video games, it is depicted with a build similar to that of "[[Hitotsu-Me Giant]]".
