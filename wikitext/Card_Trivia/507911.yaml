title: Card Trivia:Neo-Spacian Dark Panther
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Contact Out]]", "[[NEX]]", and "[[NEXT]]".
  * This monster has a "[[Chrysalis]]" form: "[[Chrysalis Pantail]]".
  * This monster has a [[Contact Fusion]] with "[[Elemental HERO Neos]]": "[[Elemental HERO Dark Neos]]".
  ** This monster has two [[Triple Contact Fusion]]s with "Neos":
  *** With "[[Neo-Spacian Glow Moss]]": "[[Elemental HERO Chaos Neos]]".
  *** With "[[Neo-Spacian Grand Mole]]": "[[Elemental HERO Nebula Neos]]".
  ** This monster has an [[Contact Fusion#Ultimate Contact Fusion|Ultimate Contact Fusion]] with "Neos" and all the other "[[Neo-Spacian]]" monsters: "[[Elemental HERO Divine Neos]]".
  * The initials "NS" on this monster's collar are a reference to the "Neo-Spacian" archetype.
  ** Concept art of this monster featured in the ''[[20th Anniversary Monster Art Box]]'' bears the initials "EH", likely referencing the "[[Elemental HERO]]" archetype.
  * This monster has the highest [[original ATK]] (1000) of all the "Neo-Spacian" monsters.
