title: Card Trivia:Dark Witch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Angel Judge]]" and "[[Dark Contract with the Witch]]".
  * This card's Japanese name, "Valkyrie", is named for a [[wikipedia:Valkyrie|valkyrie]], a host of female figures who choose those who live in battle and those who die in battle.
  ** This card's ''[[TCG]]'' name, "Dark Witch", is likely based on the perception of valkyries changing from deities to witches during the Middle Ages, as opposed to its [[attribute]] ([[LIGHT]])
  * This card has a [[recolored counterpart]]: "[[LaMoon]]".
