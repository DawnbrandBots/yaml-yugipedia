title: Card Trivia:Nekroz of Clausolas
wikitext: |-
  {{Navigation}}

  * This monster is "[[Shurit, Strategist of the Nekroz]]" wearing armor based on "[[Mist Bird Clausolas]]".
  ** This card has the same [[Level]] as and a similar [[effect]] to the aforementioned monster, but its [[ATK]] and [[DEF]] are instead the reverse of "[[Ally of Justice Clausolas]]", another version of the aforementioned monster.
  * "[[Nekroz Mirror]]" appears in this card's artwork as the hilt of his sword, the same as his previous form.
  * Despite this card mentioning them, there are currently no "[[Nekroz]]" [[Trap Card]]s.
