title: Card Trivia:Rainbow Snake Eingana
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[wikipedia:Eingana|Eingana]], the serpentine creator of goddess and the mother of all [[water]], animals, and humans in Australian Aboriginal mythology.
  ** According to the Australian Aboriginal mythology, Eingana is the goddess of death, bearing a link of sinew connected to each living thing that, when she severs it, causes it to immediately die. This is reflected in this card's effect, as when it is [[sent]] to the [[Graveyard]], it "severs its ties" with the opponent's monsters by [[destroy]]ing them.
