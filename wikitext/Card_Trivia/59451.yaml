title: Card Trivia:Five Star Twilight
wikitext: |-
  {{Navigation}}

  * "[[Kuribah]]", "[[Kuribee]]", "[[Kuribeh]]", "[[Kuriboh]]", and "[[Kuriboo]]" appear in this card's artwork.
  * In context of this card's Japanese name, "Twinkle Five-Star", the usage of "Twilight" in its ''[[TCG]]'' name may have been intended as a portmanteau of the words "twinkle" and "light".
  * The terminal vowels of the five "[[Kuriboh (archetype)|Kuriboh]]" brothers' names listed in this card's text follow the Japanese ''[[wikipedia:Gojūon|gojūon]]'' alphabetical ordering (a i u e o / あ い う え お).
  * This card's activation cost to [[Tribute]] a [[Level 5]] monster references the total number (as well as their total [[Level]]s) of the five "Kuriboh" brothers.
  * The way "Kuriboh" is riding its yellow star in this card's artwork is likely a reference to Kirby and his Warp Star.
