title: Card Trivia:Man-Thro' Tro'
wikitext: |-
  {{Navigation}}

  * "[[Ojama Yellow]]" appears in this card's artwork.
  * This monster appears in the artworks of "[[Back to Square One]]", "[[Lose 1 Turn]]" and "[[The Big Cattle Drive]]".
  * This card's English name is a contraction of "man-throwing troll", which its Japanese name roughly translates to.
