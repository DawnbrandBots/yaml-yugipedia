title: Card Trivia:Tenpai Dragon Genroku
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Sangen Furo]]".

  * This monster's name is a reference to ''genroku-tsumi'', or ''genroku'' loading, a cheating technique in [[wikipedia:Japanese mahjong|Japanese mahjong]] where a player stacks the wall such that they are able to easily draw the correct tile to complete a ''[[wikipedia:Yaku|yaku]]''.
  ** This monster's effect further reflects the ''genroku'' technique, as it can [[Special Summon]] itself and increase its [[Level]] by 1, allowing the player to easily facilitate the [[Synchro Summon]]ing of the "[[Sangen]]" [[Synchro Monster]]s, which are based on different ''yaku''.
