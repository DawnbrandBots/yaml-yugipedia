title: Card Trivia:Mecha Phantom Beast Warbluran
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Buran spacecraft|Buran spacecraft]] (the Soviet analogue to the [[wikipedia:Space Shuttle|space shuttle]]) and the [[wikipedia:Warbler|warbler]].
  ** This explains why this monster is being carried on top of "Mecha Phantom Beast Dracossack", as the Antonov An-225 Mriya was originally conceived to carry the Buran spacecraft for the Soviet space program.
  * This monster appears in the artworks of "[[Mecha Phantom Beast Dracossack]]" and "[[Xyz Override]]".
