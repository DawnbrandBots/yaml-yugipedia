title: Card Trivia:Perfect Counter Code 123
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Ebon Magician Curran]]", "[[Leghul]]", and "[[Petit Angel]]" appear in this card's artwork.
  ** The aforementioned monsters in this card's artwork reflect its name and effect requiring three monsters whose [[Level]]s are 1, 2, and 3; as such, "Leghul" is a [[Level 1]] monster, "Ebon Magician Curran" is a [[Level 2]] monster, and "Petit Angel" is a [[Level 3]] monster.
