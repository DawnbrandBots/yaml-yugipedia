title: Card Trivia:Achacha Chanbara
wikitext: |-
  {{Navigation}}

  * Chanbara is a term to refer to sword fighting movies, or "[[wikipedia:Samurai cinema|Samurai Cinema]]". It literally means "Sword Fight". However, considering the sound trend in [[Yuma Tsukumo|Yuma]]'s Deck, it most likely refers to the sound of two swords clashing.
  ** The fact that it is holding two swords might also be related to its name.
