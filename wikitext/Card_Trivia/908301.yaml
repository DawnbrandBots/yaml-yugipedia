title: Card Trivia:Dark Auction
wikitext: |-
  {{Navigation}}

  * This card is based on an [[wikipedia:auction|auction]], where goods are put up for bid and are  sold to the person with the highest bid for said goods.
  ** In the case of this card, it is likely based on an auction in the [[wikipedia:black market|black market]] where they put up a bid for illegally-obtained goods. This reflects this card's effect to [[return]] a monster with a [[Prey Counter]] to its [[owner]]'s [[hand]] at the "highest bid" of their [[Life Point]]s equal to that monster's [[ATK]].
