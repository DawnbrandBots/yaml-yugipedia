title: Card Trivia:ZW - Lightning Blade
wikitext: |-
  {{Navigation}}

  * This monster's equip form appears in the background of this card's artwork.
  * This monster is based on the [[wikipedia:White Tiger (mythology)|White Tiger]], one of the [[wikipedia:Four Symbols|Four Symbols]] in Chinese astrology.
  ** This is one of three [[Main Deck]] "[[ZW -]]" monsters whose ''[[TCG]]'' name does not include the name of the animal it depicts, a trait shared only by the other two Main Deck "ZW -" monsters that debuted in ''[[Cosmo Blazer]]'': "[[ZW - Tornado Bringer|Tornado Bringer]]" and "[[ZW - Ultimate Shield|Ultimate Shield]]".
