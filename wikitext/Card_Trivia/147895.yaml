title: Card Trivia:The Suppression Pluto
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Pluto|Pluto]], the most famous of the [[wikipedia:dwarf planet|dwarf planet]]s in the [[wikipedia:Solar System|Solar System]]. At the time of this monster's debut in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh GX]]'' manga, Pluto was still considered a full planet and the ninth planet in the Solar System.
  ** This monster's name is derived from "supression", the act of preventing or restraining an action by force, which is reflected in its effect to take [[control]] of an opponent's monster or their [[Spell]]/[[Trap Card]]s.
  ** This monster's status as a [[DARK]] [[Fiend]] monster is a reference to how Pluto is named after the [[wikipedia:Pluto (mythology)|Roman god of the underworld]], which is commonly depicted as a realm inhabited by demons in mythology.
  * This is the [[signature card]] of [[Atticus Rhodes (manga)|Atticus Rhodes]] in the ''Yu-Gi-Oh! GX'' manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|059|ref}}, specifically from the panel showing [[The Suppression Pluto (manga)|this monster]] being Summoned.
