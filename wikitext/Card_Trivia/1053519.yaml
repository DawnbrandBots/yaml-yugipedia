title: Card Trivia:Diabell, Queen of the White Forest
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sinful Spoils Sanctification]]".
  ** The silhouette of this monster appears in the artworks of "[[Scourge of the White Forest]]" and "[[Sinful Spoils of the White Forest]]".
  ** The silhouette of this monster's right hand also appears in the artworks of "[[Beware the White Forest]]" and "[[Woes of the White Forest]]".
  * This monster has various similarities with both "[[Diabellstar the Black Witch]]" and "[[Diabellze the Original Sinkeeper]]".
  ** The latter two monsters' names start with "Diabell-".
  ** This monster shares the same [[original ATK and DEF]] (2500/2000) as "Diabellstar" and "Diabellze".
  ** This monster shares the same [[Attribute]] ([[LIGHT]]) and [[Type]] ([[Illusion]]) as "Diabellze".
  ** This monster has [[Wikipedia:Heterochromia iridum|heterochromia iridum]], having a green right eye and left purple eye, coinciding with the mismatched eye colors of "Diabellstar" and "Diabellze", respectively.
  ** The colors of this monster's clothing are a combination of the colors of the clothing of "Diabellstar" (black) and "Diabellze" (white).
  ** The colors of this monster's energy are a combination of the colors of the "[[Sinful Spoils]]" of "Diabellstar" (green) and "Diabellze" (purple).
  * This monster is the "[[White Forest]]" counterpart of "[[Queen Azamina]]".
  ** Both are [[Level 8 Monster Cards|Level 8]] [[Illusion]] monsters with the same [[original ATK and DEF]] (2500/2000).
  ** They have opposite [[Attribute]]s ([[LIGHT]] and [[DARK]]).
  ** Both have ''Yōma'' (妖魔, "Apparition") in their Japanese names.
  ** They share similar designs with mirrored poses.
  * This is the first [[Illusion]] [[Synchro Monster]].
