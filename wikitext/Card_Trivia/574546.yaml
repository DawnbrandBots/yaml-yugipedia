title: Card Trivia:Neos Fusion
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Neos]]", "[[Neo Space]]", and "[[Neo-Spacian Aqua Dolphin]]" appear in this card's artwork.
  ** This card's artwork is based on a scene in {{episode|GX|067|ref}}, where "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" and "[[Neo-Spacian Aqua Dolphin (anime)|Neo-Spacian Aqua Dolphin]]" performed [[Contact Fusion]] to [[Special Summon]] "[[Elemental Hero Aqua Neos (anime)|Elemental Hero Aqua Neos]]".
