title: Card Trivia:Hero's Guild
wikitext: |-
  {{Navigation|mode=nonGame}}

  * Either "[[Celtic Guardian]]" or "[[Obnoxious Celtic Guard]]" and either "[[Gaia The Fierce Knight]]" or "[[Swift Gaia the Fierce Knight]]" appear in this card's artwork.
  ** The corridor in which both above-mentioned monsters are depicted crouching appears to correspond with the slot on a [[Duel Disk]] designed to hold the [[Deck]], as a player's hand is depicted reaching inside to retrieve them, which reflects this card's effect to allow the turn player to reach for their Deck until they retrieve a [[Warrior]] monster.
