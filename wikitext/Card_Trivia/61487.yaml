title: Card Trivia:Carrierroid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Megaroid City]]".
  * This monster is based on an [[wikipedia:Aircraft carrier|aircraft carrier]], a warship that carries seaborne aerial fighter vehicles.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|009|ref}}, specifically from the panel showing [[Carrierroid (manga)|this monster]] being Summoned.
