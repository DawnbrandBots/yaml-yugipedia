title: Card Trivia:Lindbloom
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a pun based on the fact that "wurm" (ブルム, ''burumu''), part of the German name for [[wikipedia:lindworm|lindworm]] ("lindwurm"), sounds similar to "bloom" (ブルーム, ''burūmu'').
  * The flowers that cover this monster back are ''[[wikipedia:gentiana|gentianas]]''.
