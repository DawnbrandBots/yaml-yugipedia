title: Card Trivia:Majespecter Unicorn - Kirin
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Theme Pack: Dragon Sword Trail]]''.
  * This monster appears in the artworks of "[[Majesty's Pegasus]]", "[[Majespecter Draco - Ryu]]", "[[Majester Paladin, the Ascending Dracoslayer]]", and "[[Majespecter Gust]]".
  * This monster is based on the ''[[wikipedia:Qilin|kirin]]'', a mythological Eastern Asian creature with the head and the body of a dragon, and the hooves and horn of a [[wikipedia:Unicorn|unicorn]].
  * This monster has a retrained "[[Dracoslayer]]" [[counterpart]]: "[[Wind Unicorn Parallel, the Dracoslayer]]".
