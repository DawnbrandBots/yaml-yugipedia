title: Card Trivia:Waffling the Hero Beast
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's Japanese name ({{Ruby|英|えい}}{{Ruby|雄|ゆう}}{{Ruby|獣|じゅう}}フダン, ''Eiyūjū Fudan'') is a pun on the Japanese words for "heroic beast" ({{Ruby|英|えい}}{{Ruby|雄|ゆう}}{{Ruby|獣|じゅう}}, ''Eiyūjū'') and "indecisiveness" ({{Ruby|優|ゆう}}{{Ruby|柔|じゅう}}{{Ruby|不|ふ}}{{Ruby|断|だん}}, ''Yūjūfudan'').
