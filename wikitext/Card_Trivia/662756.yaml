title: Card Trivia:Splash Mage
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on [[wikipedia:Splash screen|splash page]], a graphical control element consisting of a window containing an image, a logo, and the current version of the software.
  ** This monster's name and [[WATER]] [[Attribute]] are also puns on "splash", the onomatopoeia associated with the sound of something striking or falling into liquid.
