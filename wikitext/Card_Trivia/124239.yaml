title: Card Trivia:Mask Change
wikitext: |-
  {{Navigation}}

  * "[[Masked HERO Inferno]]" appears in this card's first artwork, depicted performing a [[Transformation Summon]].
  ** "[[Elemental HERO Absolute Zero]]" and "[[Masked HERO Acid]]" appear in this card's second artwork.
  *** The card's second artwork is taken from {{chapter|GX|033|ref}}, specifically from the panel showing "Elemental HERO Absolute Zero" attacking directly, with "Masked HERO Acid" added to the background.
  *** The presence of the aforementioned monsters in this card's second artwork references the "Absolute Acid" combo, where "Acid" is Summoned using this card targeting "Absolute Zero", activating both monsters' effects upon being Summoned and [[sent]] to the [[Graveyard]] respectively to [[destroy]] all of the opponent's cards on [[field]].
