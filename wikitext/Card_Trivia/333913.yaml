  * The silhouettes of the [[Seven Barian Emperors]] in their human forms appear in this cards artwork.
  ** The order in which the Barian Emperors are standing in this card's artwork is the same order as when they appeared in {{episode|Yu-Gi-Oh! ZEXAL|124|ref}}.
