title: Card Trivia:Invocation "Sword"
wikitext: |-
  {{Navigation}}

  * "[[Invoked Sorath]]" and "[[Aleister the Reminiscent]]" appear in this card's artwork.
  * The sword in this card's artwork appears in the artwork of "[[Spirit Sword Aiwass]]".
  * This card's name is a reference to ''The Sword of Song'', a collection of poems written by [[wikipedia:Aleister Crowley|Aleister Crowley]].
