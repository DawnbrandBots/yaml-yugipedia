title: Card Trivia:Morphtronic Videon
wikitext: |-
  {{Navigation}}

  * As seen in the background of this card's artwork, this monster's alternative form is a video camera.
  * This card's effect is similar to the [[ATK]]-gaining effects of "[[Maha Vailo]]" and "[[Vylon Charger]]".
  ** Also, this card and "Vylon Charger" have the same [[Level]], ATK, and [[DEF]].
