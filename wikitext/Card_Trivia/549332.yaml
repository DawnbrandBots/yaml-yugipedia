title: Card Trivia:Quintet Magician
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  ** There are five circles around this monster's body and another five depicted on its robe, mirroring its name and required [[Fusion Material]]s.
  * This is the [[Spellcaster]] counterpart of "[[Five-Headed Dragon]]", another [[DARK]] [[Level 12]] [[Fusion Monster]] that requires five monsters with the same [[Type]] as Fusion Materials.
  ** Additionally, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, "Five-Headed Dragon" (as "[[Mythic Dragon (anime)|Mythic Dragon]]") also features an effect that [[destroy]]ed all cards the opponent controlled when it was Summoned.
  * This monster has the highest [[Level]] (12) and [[original ATK and DEF]] (4500/4500) of all Spellcaster monsters.
  ** This is also the first Level 12 Spellcaster monster.
  ** This is also the first monster with 4500 [[DEF]].
