title: Card Trivia:Jormungandr, Generaider Boss of Eternity
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Mystic Fighters]]''/''[[Mystic Fighters]]''.
  * This monster appears in the artwork of "[[Generaider Boss Bite]]".
  * The symbol from "[[Generaider Boss Stage]]" appears in this card's artwork, albeit the center circle is highlighted white. This circle represents [[wikipedia:Midgard|Midgard]], home of humans, and the world that Jörmungandr encircles.
  * This monster is based on [[wikipedia:Jörmungandr|Jörmungandr]], a giant serpent from [[wikipedia:Norse mythology|Norse mythology]].
