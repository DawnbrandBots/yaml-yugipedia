title: Card Trivia:Reeshaddoll Wendikurhu
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Terminal World 3]]''.
  * This monster appears to be a merged form of "[[Reeshaddoll Wendi]]" and "[[Spiritual Beast Pettlephin]]", with this monster sharing the [[WIND]] [[Attribute]] with both and the [[Psychic]] [[Type]] with the former.
  ** Its [[Level]] (6) and [[original ATK and DEF]] (200/2800) are the same as "[[Ritual Beast Ulti-Pettlephin]]" and "[[El Shaddoll Wendigo]]", which are both depicted as "Pettlephin" together with the original form of "Wendi", "[[Ritual Beast Tamer Wen]]", but not physically merged. "Wendigo" being the original WIND "[[Shaddoll]]" [[Fusion Monster]], this card can be considered a retrained version of it.
  * This is the first "Shaddoll" Fusion Monster to not have the title "''El'' Shaddoll".
