title: Card Trivia:Soul Binding Gate
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this card is [[activate]]d, a giant winged skeleton is Summoned. The giant skeleton grabs its [[owner]] by the head with one hand, attaches itself to the gate, and restrains the owner's body with the other hand.
  ** Also, in the anime, when this card's [[destroy|destruction]] and [[effect damage|damaging]] effects are activated, the giant demonic skull at the top of the gate shoots lightning blasts from its eyes to destroy the monster and then strike all of the Duelists, including its owner.
  * This card's ''[[OCG]]''/''[[TCG]]'' [[activation requirement]]s, and the effect requiring "[[Z-ONE]]" to be in the player's [[Graveyard]], are based on its activation in {{episode|5D's|140|ref}}, when "[[Z-ONE (anime)|Z-ONE]]" was destroyed by [[Akiza Izinski]]'s "[[Black Rose Dragon (anime)|Black Rose Dragon]]" while it was [[face-down]] on [[Sherry LeBlanc]]'s [[field]], enabling her to [[banish]] [[Soul Binding Gate (anime)|this card]] and replicate its name and effects with "Z-ONE".
  * This card shares similarities with "[[Illusion Gate]]", as both cards depicts gates to the underworld, feature effects that destroys monsters and deducts their users' [[Life Point]]s, and ultimately turn on their respective users after their defeat in the Duel they were used.
