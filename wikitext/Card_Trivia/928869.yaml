title: Card Trivia:Drytron Nova
wikitext: |-
  {{Navigation}}

  * "[[Drytron Beta Rastaban]]" appears in this card's artwork.
  * This card is named after a [[wikipedia:Nova|nova]], an astronomical event where a star shows a sudden brightness and eventually returns to its original state.
  ** The kanji in this card's Japanese name (極超の竜輝巧 ''Kyokuchō no Ryūkikō'') can be translated to "Ultra-Zenith Drytron".
