title: Card Trivia:Elemental Mistress Doriado
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ritual Cage]]".
  * This monster is the [[retrained]] version of "[[Doriado]]", as implied by her appearance in the artwork of "[[Doriado's Blessing]]".
  ** This monster also has an enhanced form: "[[Elemental Grace Doriado]]".
  ** These cards' Japanese names appear to derive from ''dryade'', the French spelling of "dryad". However, [[Dan Scheidegger]] claimed in a [http://www.pojo.biz/board/showthread.php?p=1943645#post1943645 post on Pojo] that it is indeed meant to be "Doriado", that being the monsters' given name.
  * This is the first [[Level]] 3 [[Ritual Monster]].
  * The first Spanish print of this card contains an error, as part of its card text read "''Este monstruo s'''o'''lo puede ser Invocad'''a'''''" instead of "Este monstruo s'''ó'''lo puede ser Invocad'''o'''"; this was fixed in the second print.
