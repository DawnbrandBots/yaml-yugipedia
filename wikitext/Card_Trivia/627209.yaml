  [[File:Evil HERO Infero Wing flashback.png|thumb|250px|"[[Evil Hero Inferno Wing (anime)|Evil Hero Inferno Wing]]" among the burning flames.]]
  * "[[Evil HERO Inferno Wing]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|146|ref}} where [[Jaden Yuki]] remembers how he, as the [[The Supreme King|Supreme King]], used "[[Evil Hero Inferno Wing (anime)|Evil Hero Inferno Wing]]" to attack and destroy a number of his friends, allies, and villagers ("send to the stars" in the English dubbed version) by making them disappear in a burst of golden dust and burning the villages to the ground.
  *** However, the flames in the background of this card's artwork are colored blue similar to how the scene was shown in the English dubbed version of the anime, unlike the original Japanese anime, where the flames were orange and red.

