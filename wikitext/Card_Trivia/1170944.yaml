  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2026]]''.
  * This monster appears in the artwork of "[[GMX 55th Experiment Report‎]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[GMX Chairman Kimridge‎]]", whose transformation into this monster is depicted in the artwork of "[[GMX Applied Experiment 55]]".
