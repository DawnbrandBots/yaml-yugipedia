title: Card Trivia:Chthonian Polymer
wikitext: |-
  {{Navigation}}

  * This card appears in the international artwork of "[[Trap Sluzer]]".
  * Despite this card being a [[Counter Trap]] in early episodes of the ''[[Yu-Gi-Oh! GX]]'' anime, it was released in the ''[[OCG]]''/''[[TCG]]'' as a [[Normal Trap]].
  * This card's name is likely derived from the ''[[TCG]]'' name for the Spell Card "Fusion" ("[[Polymerization]]"), which is used to Fusion Summon [[Fusion Monsters]].
