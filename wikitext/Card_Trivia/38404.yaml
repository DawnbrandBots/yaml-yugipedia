title: Card Trivia:Mark of the Rose
wikitext: |-
  {{Navigation}}

  * "[[Vampire Lord]]" appears in this card's artwork.
  ** This may be a reference to [[wikipedia:Bram Stoker|Bram Stoker]]'s ''[[wikipedia:Dracula|Dracula]]'' since it was described in the book that one of a [[wikipedia:vampire|vampire]]'s many weaknesses was the [[wikipedia:mountain rose|mountain rose]], which if placed upon a vampire's [[wikipedia:coffin|coffin]] could keep it imprisoned until removed.
