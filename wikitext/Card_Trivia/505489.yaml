title: Card Trivia:Doll of Demise
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This monster is based on a [[wikipedia:Haunted doll|haunted doll]], a doll that is claimed to be possessed by spirits.
  ** This monster is also based on [[wikipedia:ventriloquism|ventriloquist dummies]] that are often used for stage performances, reflecting how its owner [[Arkana]] was formerly a stage performer in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This monster has a [[retrain]]ed ''[[OCG]]''/''[[TCG]]'' counterpart: "[[Malice Doll of Demise]]".
