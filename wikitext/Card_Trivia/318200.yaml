title: Card Trivia:Stellarknight Constellar Diamond
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Eye of the Void]]".
  * This monster's name is based on the [[wikipedia:Winter Hexagon|Winter Hexagon]], a prominent winter asterism comprised of the stars [[wikipedia:Rigel|Rigel]], [[wikipedia:Aldebaran|Aldebaran]], [[wikipedia:Capella (star)|Capella]], [[wikipedia:Pollux (star)|Pollux]], [[wikipedia:Sirius|Sirius]], and [[wikipedia:Procyon|Procyon]] forming a hexagon, which appears in the background of this card's artwork.
  ** This monster's membership in both the "[[Constellar]]" and "[[tellarknight]]" [[archetype]]s reference how the monsters in both archetypes are based on the above-mentioned stars that make up the Winter Hexagon, which includes the "Constellar" monsters, "[[Constellar Aldebaran]]" and "[[Constellar Pollux]]", and the "tellarknight" monsters, "[[Satellarknight Capella]]", "[[Satellarknight Procyon]]", "[[Satellarknight Rigel]]", and "[[Satellarknight Sirius]]".
  * This monster's name and appearance are a combination of "[[Constellar Ptolemy M7]]" and "[[Gem-Knight Master Diamond]]".
  ** This monster's armor is also a combination of the armor of the following monsters, who are based on the stars comprising the Winter Hexagon.
  *** "Satellarknight Sirius": Its helmet, shoulders, and upper legs are located on this monster's head, shoulders, and upper leg portions of its body.
  *** "Constellar Aldebaran": Its horns, chest-plate, and metallic leg braces are located on its head, chest, and first two segments of its tail, respectively
  *** "Constellar Pollux": Its chestplate, sword, right leg, and right forearm spikes all make up this monster's tail.
  *** "Satellarknight Capella": The wheels of its chariot are located at the base of this monster's wings.
  *** "Satellarknight Rigel": Its weapon is located near the tip of its tail above its right foot.
  * This is the first [[Wyrm]] [[Xyz Monster]].
  ** This is also the first non-[[Warrior]] "tellarknight" monster.
  * This monster's effects is designed to specifically counter the "[[Shaddoll]]" archetype, which is comprised of [[DARK]] monsters whose playstyle revolves around [[send]]ing "Shaddoll" monsters from the [[Deck]] to the [[Graveyard]] for a [[cost]], whereas the effects of their Fusion Monsters and "[[Shaddoll Core]]" can [[add]] "Shaddoll" [[Spell]]/[[Trap Card]]s from the Graveyard back to the [[hand]].
