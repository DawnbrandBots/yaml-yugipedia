title: Card Trivia:Witness of Dragon Destroyer
wikitext: |-
  {{Navigation}}

  * "[[Emblem of Dragon Destroyer]]" appears in this card's artwork, held in this monster's left hand.
  ** This card's effect is similar to that of "Emblem of Dragon Destroyer".
  * This monster appears in the artwork of "[[Beacon of Dragon Destroyer]]".
  * Visually, this monster resembles "[[Skilled White Magician]]", another monster that supports "[[Buster Blader]]".
