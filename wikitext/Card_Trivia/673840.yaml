title: Card Trivia:Shooting Star Dragon T.G. EX
wikitext: |-
  {{Navigation}}

  * Three [[Synchro Summon]]ing rings appear in this card's artwork.
  * This monster is a "[[T.G.]]" [[counterpart]] of "[[Shooting Star Dragon]]".
  ** Visually, this monster is a combination of "Shooting Star Dragon" and "[[T.G. Blade Blaster]]".
  *** This monster represents the bond between [[Yusei Fudo]] and [[Bruno]]. This is further enforced during the ''[[Jump Festa 2020: Yusei Fudo vs. Jack Atlas|Jump Festa 2020]]'' [[scripted Duel]] between [[Yusei Fudo]] and [[Jack Atlas]] where Yusei uses a common phrase used by Bruno ("C'mon!") while Summoning this monster.
