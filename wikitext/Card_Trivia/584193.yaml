title: 'Card Trivia:Number 39: Utopia Double'
wikitext: |-
  {{Navigation}}

  * The slot machine from the artwork of "[[Double or Nothing!]]" appears in this card's artwork.
  * This monster is a [[retrained]] [[counterpart]] of "[[Number 39: Utopia]]".
  ** This monster's name and effect to [[add]] "Double or Nothing!" from the [[Deck]] to the [[hand]] reference [[Yuma Tsukumo]]'s strategy in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, where he utilizes the effect of "[[Double or Nothing! (anime)|Double or Nothing!]]" to double the [[ATK]] of "[[Number 39: Utopia (anime)|Number 39: Utopia]]", after "Utopia" has [[negate]]d its own [[attack]].
