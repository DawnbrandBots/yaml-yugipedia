title: Card Trivia:Dragon Master Lords
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of "[[Dragon Master Knight]]".
  ** This monster is the combined form of "[[Paladins of Bonds and Unity]]" and "[[Ultimate Dragon of Pride and Soul]]".
  *** Fittingly, this monster can be [[Xyz Summon]]ed by using both monsters as [[Xyz Material]], both of which are [[Level 12]] monsters.
  * This is the first [[Rank 12]] [[Dragon]] monster, as well as the first Rank 12 [[Xyz Monster]] with an [[equal ATK and DEF|equal]] [[original ATK and DEF]] of 5000.
  * This monster has the highest original [[ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) and original [[DEF]] (5000, tied with [[5000 DEF Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  * This is the final card to be released exclusively in the [[Quarter Century Secret Rare]] rarity in the ''TCG''.
