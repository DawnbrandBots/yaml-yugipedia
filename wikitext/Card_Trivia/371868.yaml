title: Card Trivia:Frightfur Sheep
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Frightfur Defender]]" and "[[Frightfur March]]".
  ** This card's real life effect achieves roughly the same goal as "Frightfur Defender", in both cases allowing it to survive destruction and gain 800 [[ATK]].
  * The copper-colored appendages above this monster's body bear a strong resemblance to [[wikipedia:cymbal|cymbals]].
  ** Specially, they most jointly coincide with looking like [[wikipedia:hi-hat|hi-hats]], a type of cymbal usually associated with a [[wikipedia:drum kit|drum kit]] with a distinctive top and a "sandwich"-like appearance.
