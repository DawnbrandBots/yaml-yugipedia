title: Card Trivia:Infernoid Pirmais
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Infernoid Shaitan", is derived from the Arabic name for [[wikipedia:Satan|Satan]], the personification of evil and temptation featured in [[wikipedia:Abrahamic religions|Abrahamic religions]] such as [[wikipedia:Christianity|Christianity]], [[wikipedia:Judaism|Judaism]], and [[wikipedia:Islam|Islam]].
  ** This monster's ''[[TCG]]'' name is derived from "''pirmais''", the Latvian word for "first", which reflects its [[Level]] (1).
