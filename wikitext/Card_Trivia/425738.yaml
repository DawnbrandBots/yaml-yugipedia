title: Card Trivia:Gladiator Beast Andabata
wikitext: |-
  {{Navigation}}

  * This monster has the lowest original ATK of all "[[Gladiator Beast]]" Fusion Monsters.
  * This is the only "Gladiator Beast" monster to be based on a type of ancient Roman fighter that already exist as a "Gladiator Beast" monster - "[[Gladiator Beast Andal]]" is the first one to be based on "[[wikipedia:List of Roman gladiator types|andabatae]]".
  * This is the only "Gladiator Beast" Fusion Monster with a named [[Fusion Material]] to not resemble its named material visually, nor share the same original type.
  * This monster's appearance is based on a [[wikipedia:Hadrosaurid|Hadrosaurid]].
