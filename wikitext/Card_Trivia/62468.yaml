title: Card Trivia:Gandora the Dragon of Destruction
wikitext: |-
  {{Navigation}}

  * This monster's name is an anagram for the Japanese pronunciation of the word "dragon" (''doragon'').
  * This monster has three [[Card evolutions|retrained]] [[counterpart]]s: "[[Gandora-X the Dragon of Demolition]]", "[[Gigarays Gandora the Dragon of Destruction]]", and "[[Gandora-G the Dragon of Destruction]]".
  * This is the [[signature card]] of [[Yugi Mutou (manga)|Yugi Mutou]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] (and his [[Yu-Gi-Oh! (anime)|anime]] [[Yugi Muto|counterpart]]) after separating from [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in the anime).
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|341|ref}}, specifically from the panel showing [[Gandora the Dragon of Destruction (manga)|this monster]] being Summoned.
