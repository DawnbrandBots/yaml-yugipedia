title: Card Trivia:DoomZ XII End - Drastrius
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Artmage Movement -Pedigree-]]", "[[Artmage Peripeteia -Turmoil-]]", and "[[DoomZ Destruction]]".
  * This monster is the upgraded [[Xyz Monster|Xyz]] form of "[[DoomZ XII Zero - Drastea]]", after using the power of "[[Power Patron DoomZ]]".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this monster's Summoning animation depicts it laughing maniacally.
