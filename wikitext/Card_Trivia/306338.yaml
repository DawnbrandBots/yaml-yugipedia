title: Card Trivia:The First Monarch
wikitext: |-
  {{Navigation}}

  * This card's artwork is a silhouetted version of "[[Erebus the Underworld Monarch]]".
  ** Notably, the design shown in this card predates the reveal of "Erebus" by almost two years. This prototype design is missing a few defining traits, such as the spikes cresting his shoulders. Before this, many assumed the depicted monster was "[[Caius the Mega Monarch]]", or an unnamed but lost figure that predated all of the Monarch monsters and now gave them commands from a higher plane. Furthermore, as this monster is a [[Fiend]] and "Erebus" is a [[Zombie]], it is implied that his current incarnation is a resurrected form of the monster in this card.
  * As a monster, this card's [[original ATK and DEF]] are the inverse of that of all non-"[[Monarch (series)|Mega Monarchs]]", and its original [[Level]] is also the same as all non-"Mega Monarchs" (except "[[Zaborg the Thunder Monarch]]").
  * "[[The Prime Monarch]]" could be considered to be a counterpart of this card: both cards are [[Continuous Trap Card]]s with similar names that can be [[Special Summoned]] as monsters with the same ATK and DEF, and one is [[DARK]] [[Fiend]]-[[Type]] while the other is [[LIGHT]] [[Fairy]]-[[Type]].

