title: Card Trivia:Pot of Avarice
wikitext: |-
  {{Navigation}}

  * This pot appears in the artworks of "[[Extra Buck]]", "[[Moray of Avarice]]", "[[Progress Potter]]", and "[[Treasure Dragon]]".
  * "[[Pot of Dichotomy]]" and "[[Pot of Desires]]" are melded versions of this pot together with "[[Pot of Benevolence]]" and "[[Pot of Greed]]", respectively.
  * This card has a [[Trap Card|Trap]] [[counterpart]]: "[[Jar of Avarice]]".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Pot of Avarice]]".
