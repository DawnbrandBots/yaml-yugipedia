title: Card Trivia:Demolition Soldier Ashiba Bikke
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on the Japanese term ''bike ashiba'' (ビケ足場), the common name for wedge-tensioned scaffolds, which are constructed by using steel pipes with regularly spaced tensioning sections as supports and wedging handrails, braces, etc. into the tensioning sections of the supports.
