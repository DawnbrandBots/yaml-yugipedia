title: Card Trivia:Predaplant Dheadevil
wikitext: |-
  {{Navigation}}

  * This monster is a combination of the [[wikipedia:Chiranthodendron|devil's hand tree]] (''Chiranthodendron'') and the [[wikipedia:Devil|Devil]].
  ** This monster's name is also a pun on "daredevil", a person who enjoys doing dangerous things and taking risks.
