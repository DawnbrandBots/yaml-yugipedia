title: Card Trivia:Fabled Levilazebul
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Terminal World 2]]''.
  * This monster appears in the artwork of "[[Fabled Realm's Revival]]".
  * This monster is "[[Fabled Leviathan]]" wearing the mask of "[[Fabled Gammajin]]".
  ** According to ''[[The Valuable Book EX 5 card storylines#No. 14: "Duel Terminal" World Side Story - The Fomenting Schemes of the Fabled|The Valuable Book EX 5]]'', the mask is cursed, and after the death of "Gammajin", it absorbed his power to summon the souls of those who died in sin and coalesced them into "[[Steelswarm Origin]]", leading to the birth of the "[[lswarm|Evilswarm]]" corruption. However, "[[Fabled Lurrie]]" managed to retrieve it and gave it to "Leviathan", who became "Levilazebul" after wearing it and resisting its influence.
  *** Fittingly, this monster's Japanese name ("Leverzebul") is a portmanteau of "[[wikipedia:Leviathan|Leviathan]]", "Verz" (the ''OCG'' name of the "lswarm" archetype), and "[[wikipedia:Beelzebub|Beelzebul]]"; and it has 50 more [[ATK]] and 50 less [[DEF]] than "Fabled Leviathan", with ATK/DEF ending in 50 being a trait of "Evilswarm" monsters.
  * This is the first monster with 3050 ATK.
