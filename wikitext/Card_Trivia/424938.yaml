title: Card Trivia:Assault Blackwing - Kusanagi the Gathering Storm
wikitext: |-
  {{Navigation}}

  * This monster is named after the "[[wikipedia:Kusanagi no Tsurugi|Kusanagi no Tsurugi]]", a legendary Japanese sword that was originally known as the "Ame-no-Murakumo-no-Tsurugi" (天叢雲剣, "Heavenly Sword of Gathering Clouds").
  ** Ironically, despite this monster's name, it is depicted wielding the [[wikipedia:Seven-Branched Sword|Seven-Branched Sword]].
