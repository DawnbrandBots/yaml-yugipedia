title: Card Trivia:The Phantom Knights' Rank-Up-Magic Requiem
wikitext: |-
  {{Navigation}}

  * The crest that appears in this card's artwork is based on the physical features of "[[Dark Requiem Xyz Dragon]]" (which this card's name is derived from), including the skeletal design of its chest, the base of its wings, and the curved blades attached to its wrists.
