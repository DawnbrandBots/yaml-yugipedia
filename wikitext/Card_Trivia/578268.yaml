title: Card Trivia:D/D/D Abyss King Gilgamesh
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ("Bilgameš") is an alternative spelling of [[wikipedia:Gilgamesh|Gilgamesh]], one that is more accurate to the original Sumerian pronunciation.
  ** The overall appearance of this monster, particularly its use of multiple weapons, seems to be based on the recurring character Gilgamesh from the ''[[wikipedia:Final Fantasy|Final Fantasy]]'' series and/or the Gilgamesh from the ''Fate'' series.
  * This monster's Japanese title, "Abyss King" ({{Ruby|深|しん}}{{Ruby|淵|えん}}{{Ruby|王|おう}}, ''Shin'en'ō'') is a homophone of [[wikipedia:Chief networking officer|CNO]] ("Chief Networking Officer"), an executive-level position responsible for managing a company's internal and external networking activities.
  ** A network is a number of interconnected computers, machines, or operations, which references how this monster is the first "[[D/D]]" [[Link Monster]].
