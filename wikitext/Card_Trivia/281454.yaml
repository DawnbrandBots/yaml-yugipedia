title: Card Trivia:Line World
wikitext: |-
  {{Navigation|mode=nongame}}

  * The world in this card's artwork appears in the artwork of "[[Line Promotion]]".
  * This card is based on the playing board used in the game of [[wikipedia:Shogi|shogi]].
  ** This card's effect to [[send]] the opponent's cards the player [[destroy]]ed to their [[Graveyard]] reflects the gameplay of shogi, in which each player must strategically capture the opponent's pieces.
