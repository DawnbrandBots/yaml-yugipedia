title: Card Trivia:Igknight Cavalier
wikitext: |-
  {{Navigation}}

  * This monster is modeled after a [[wikipedia:kunoichi|kunoichi]], with her armor vaguely shaped like stereotypical ninja garb and her weapons shaped like [[wikipedia:Kunai|kunai]], a typical ninja weapon. The card's name is derived from the [[wikipedia:Derringer|Derringer]], the smallest usable handgun of a given caliber. They were frequently used by women, because they are easily concealable in a purse or as a stocking gun.
  ** This card's flavor text alludes to the latter via her status as the only female "Igknight" monster.
  ** The romanized Japanese name, Igunaito Derinjā, is a portmanteau of "Derringer" and "ninja".
  * This card appears in the artwork of "[[Bad Aim]]" and "[[Igknights Unite]]".
  * The Spanish name of this card uses "Jineta", which is used for the common genet; a female horse rider is an "amazona" (literally, "amazon").
