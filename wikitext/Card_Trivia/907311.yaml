title: Card Trivia:Swordsoul Strife
wikitext: |-
  {{Navigation}}

  * "[[Icejade Creation Kingfisher]]", "[[Icejade Kosmochlor]]", "[[Swordsoul Sinister Sovereign - Qixing Longyuan]]", and "[[Swordsoul Supreme Sovereign - Chengying]]" appear in this card's artwork.
  ** This card's artwork depicts the betrayal and revolt of "[[Swordsoul Strategist Longyuan]]" towards the "[[Swordsoul]]" monsters, after it accepted the deal with "[[Ad Libitum of Despia]]", as depicted in the artwork of "[[Swordsoul Blackout]]".
