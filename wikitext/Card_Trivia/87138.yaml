title: Card Trivia:Miracle Contact
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Neos]]" appears in this card's artwork.
  * This card's name references [[Contact Fusion]], the [[Special Summon]]ing method used to Summon "[[Neos]]" [[Fusion Monsters]].
  ** The galaxy in this card's artwork appears to be the same one that is depicted when "[[Elemental Hero Neos (anime)|Elemental HERO Neos]]" performs [[Contact Fusion]] in the ''[[Yu-Gi-Oh! GX]]'' anime. As such, the galaxy in this card's anime artwork also appears in the artwork of "[[Infinity (card)|Infinity]]".
  ** This card's artwork implies that "Neos" is attempting to contact "[[Neo Space]]" so that a "[[Neo-Spacian]]" will send their essence to him, allowing them to fuse together and create a "Neos" Contact Fusion Monster. Without "Neo Space" on the [[field]], this Fusion only lasts for one turn, after which "Neos" loses his power-up and becomes incapacitated, which explains why the "Neos" Contact Fusion Monsters [[return]] to the [[Extra Deck]] without leaving "Neos" behind.
  * This card is a "[[Contact (series)|Contact]]" [[counterpart]] of "[[Miracle Fusion]]".
  ** Both cards can [[Special Summon]] an "[[Elemental HERO]]" Fusion Monster using monsters in the player's [[Graveyard]].
