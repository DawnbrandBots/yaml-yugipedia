title: Card Trivia:Permilind Hicrotron
wikitext: |-
  {{Navigation}}

  * The first portion of this monster's name is a portmanteau of the words "permill" (meaning "parts per thousand") and "[[wikipedia:Lindworm|lindworm]]" (a type of mythical dragon-like creature).
  ** The second portion of this monster's name is a portmanteau of the words "high", "''[[wikipedia:Croton (plant)|croton]]''" (a plant genus of the [[wikipedia:Euphorbiaceae|spurge]] family), and "[[Tron (series)|tron]]".
  * The number of leaves on this monster's head and the number of rings on this monster's body is the same as its [[Level]] (8).
