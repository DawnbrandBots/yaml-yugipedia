title: Card Trivia:Malefic Paradigm Dragon
wikitext: |-
  {{Navigation}}

  * This is an [[Effect Monster]] [[counterpart]] of "[[Malefic Paradox Dragon]]".
  ** Visually, this monster appears to be "Malefic Paradox Dragon" wearing the black-and-white armor featured in the designs of the draconian "[[Malefic]]" monsters (except "[[Malefic Truth Dragon]]").
  ** This monster's name is based on a [[wikipedia:Paradigm|paradigm]], a typical example or a pattern of a thing; it is likely derived from "[[Malefic Paradigm Shift]]", a [[Trap Card]] which could only be [[activate]]d when "Malefic Paradox Dragon" is [[destroy]]ed.
  ** This monster's effect to [[return]] the player's [[banish]]ed [[Level 8]] [[Synchro Monster]] to the [[Extra Deck]] and then [[Special Summon]] that monster is based on a scene from ''[[Yu-Gi-Oh! 3D Bonds Beyond Time]]'' where [[Paradox]] activated the effect of "[[Malefic Paradox Dragon (anime)|Malefic Paradox Dragon]]" to Special Summon "[[Stardust Dragon (anime)|Stardust Dragon]]" from his [[Graveyard]] [[ignoring the Summoning conditions]], having sent it there earlier to Special Summon "[[Malefic Stardust Dragon (anime)|Malefic Stardust Dragon]]". In the ''[[OCG]]''/''[[TCG]]'', this is impossible to accomplish since not only would "[[Stardust Dragon]]" be banished from the Extra Deck to Special Summon the ''OCG''/''TCG'' version of "[[Malefic Stardust Dragon]]" instead of being [[sent]] to the Graveyard, it cannot be Special Summoned afterwards as it was not properly [[Synchro Summon]]ed, even for card effects that ignore Summoning conditions.
