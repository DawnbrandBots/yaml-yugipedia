title: Card Trivia:Mementotlan Ghattic
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] "[[Memento]]" [[counterpart]] of "[[Wretched Ghost of the Attic]]".
  ** This monster's Japanese name, ''Memento Uramon'', is derived from a [[wikipedia:Clipped compound|clipped compound]] of the Japanese name for "Wretched Ghost of the Attic", ''Yane'''ura''' no '''Mon'''onoke''. Similarly, its English name is a clipped compound of "Wretched '''Gh'''ost of the '''Attic'''".
