title: Card Trivia:Brain Crusher
wikitext: |-
  {{Navigation}}

  * This monster and its effect are based on the [[wikipedia:Parasitoid wasp|parasitoid wasp]], a species of wasp known for having a stinger containing a venom that brainwashes the host into protecting the wasp's eggs until they hatch inside the host's body, after which time, the host will be devoured by the larvae.
