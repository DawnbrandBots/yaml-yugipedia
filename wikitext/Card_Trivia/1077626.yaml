title: Card Trivia:Mobile Deployment Gear Start
wikitext: |-
  {{Navigation}}

  * "[[Green Gadget (Rush Duel)|Green Gadget]]", "[[Maximum Gadget the Moving Fortress]]" in [[Maximum Mode]] (together with "[[Maximum Gadget the Moving Fortress (L)|Maximum Gadget the Moving Fortress [L]]]" and "[[Maximum Gadget the Moving Fortress (R)|Maximum Gadget the Moving Fortress [R]]]"), "[[Red Gadget (Rush Duel)|Red Gadget]]", and "[[Yellow Gadget (Rush Duel)|Yellow Gadget]]" appear in this card's artwork.
  ** This card's artwork is based on a panel from {{chapter|Millennium World|61|ref}}, where "[[Green Gadget (manga)|Green Gadget]]", "[[Red Gadget (manga)|Red Gadget]]", and "[[Yellow Gadget (manga)|Yellow Gadget]]" are deployed and become gears for "[[Stronghold the Moving Fortress (manga)|Stronghold the Moving Fortress]]".
