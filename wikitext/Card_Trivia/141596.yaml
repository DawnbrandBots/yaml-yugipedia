title: Card Trivia:Blackwing - Oroshi the Squall
wikitext: |-
  {{Navigation}}

  * This monster is named after an "[[wikipedia:Oroshi|oroshi]]", the Japanese term for strong gusts of wind blowing down a mountain slope that can cause damage in Japan.
  ** This monster's title is derived from a [[wikipedia:Squall|squall]], a sudden and sharp increase of wind speed that lasts longer than [[wikipedia:wind gust|wind gusts]].
