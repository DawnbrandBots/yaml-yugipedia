title: Card Trivia:Pyrotech Mech - Shiryu
wikitext: |-
  {{Navigation}}

  * This card is the [[FIRE]] [[Pyro]] counterpart of "[[Majestic Mech - Goryu]]". They both have the same [[Level]], [[ATK]], [[DEF]], [[Summoning condition]]s, and [[piercing]] effect. They also have a negative effect that activates during the [[End Phase]] when [[Tribute Summon]]ed with 1 [[Tribute]].
