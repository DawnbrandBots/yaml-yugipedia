title: Card Trivia:Rocket Hermos Cannon
wikitext: |-
  {{Navigation}}

  * The silhouette of "[[Rocket Warrior]]" appears in this card's artwork.
  ** In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster was created by fusing "Rocket Warrior" with "[[The Claw of Hermos]]".
  ** This monster shares the same [[Attribute]], [[Level]], [[Type]], and [[original ATK and DEF]] as "Rocket Warrior".
  * This is the first "[[Legendary Dragon]]" [[Fusion Monster]] whose name includes the name of its corresponding "Legendary Dragon".
  * In the Spanish ''[[TCG]]'', the Spanish printed name of "Rocket Warrior" is "''Guerrero Cohete''"; however, this monster's Spanish printed name, "''Cañón Rocket Hermos''", left the word "Rocket" untranslated.
  ** This is likely because this monster's Spanish printed name keeps its name from the American Spanish dubbed version of the ''Yu-Gi-Oh!'' anime.
