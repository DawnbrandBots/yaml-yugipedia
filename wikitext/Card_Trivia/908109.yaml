title: Card Trivia:Thunderbeetle Storm
wikitext: |-
  {{Navigation}}

  * "[[Thunderbeetle Bassdrum]]", "[[Thunderbeetle Highhat]]", and "[[Thunderbeetle Snare]]" appear in this card's artwork.
  * This card's Japanese name is a wordplay on 「嵐を呼ぶ」 (''Arashi wo Yobu'', "to cause a commotion"), as a reference to the musical theme of the "[[Thunderbeetle]]" monsters.
