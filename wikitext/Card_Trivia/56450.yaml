title: Card Trivia:Rai-Jin
wikitext: |-
  {{Navigation}}

  * This card's name is based on [[wikipedia:Raijin|Raijin]], the Shinto god of thunder and lightning in Japanese mythology.
  * This is one of the few cards whose Japanese name consists entirely of English alphabetical characters and punctuation.
  * This is the first card with [[?]] [[ATK]] or [[DEF]] that does not have an effect to directly increase its own ATK or set it to a specific value, though it does gain ATK from its effect to increase the ATK of all [[LIGHT]] monsters on the controller's field by 100 for each LIGHT monster in their [[Graveyard]].
  ** This is also the first card with ? [[ATK]] and a non-zero, non-variable DEF.
