title: Card Trivia:Yoko, the Graceful Mayakashi
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s for ''[[Deck-Build Pack: Hidden Summoners]]''/''[[Hidden Summoners]]'' and ''[[Nature Pack: Blazing Heroes]]''.
  * This monster appears in the artworks of "[[Mayakashi Metamorphosis]]", "[[Fateful Hour]]", "[[Ghost Meets Girl - A Mayakashi's Manuscript]]", and "[[Ghost Meets Girl - A Masterful Mayakashi Shiranui Saga]]".
  * This monster shares many similarities with "[[Nine-Tailed Fox]]", as they are both based on the [[wikipedia:Kitsune|kitsune]], a kind of youkai.
  ** Additionally, this card's original [[Level]] 9 is likely a reference to this monster being a nine-tailed fox.
  * This monster is a [[Synchro Monster|Synchro]] [[counterpart]] of "[[Dakki, the Graceful Mayakashi]]".
  ** This is fitting, as it is said that nine-tailed foxes can disguise themselves as beautiful women.
