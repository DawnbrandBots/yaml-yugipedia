title: Card Trivia:Superheavy Samurai Beast Kyubi
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Kyu-B" (キュウ－Ｂ, ''Kyū-Bī'') is a pun on "''kyūbi''" (九尾), a nine-tailed fox spirit who is also known as the "''kyūbi no kitsune''" (九尾の狐) in Japanese folklore.
  ** This monster's name reflects its [[Level]] (9) and effect to increase its [[DEF]] by 900, as "''kyu''" is the Japanese word for the number "9".
