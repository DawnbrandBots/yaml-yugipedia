title: Card Trivia:Pazuzule
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Pazuzu|Pazuzu]], a demon from [[wikipedia:Ancient Mesopotamian religion|Ancient Mesopotamian religion]] that is made up of both human and animal body parts, which usually includes a human body, two pairs of wings and a scorpion's tail. His depictions also represent him with his right hand up and his left hand down, as in this card's artwork.
  * This card's name is a [[wikipedia:Portmanteau|portmanteau]] of "puzzle" and "Pazuzu".
  ** This is supported by the fact that this monster's wings are composed of [[wikipedia:Jigsaw puzzle|jigsaw puzzle]] pieces.
