title: Card Trivia:Supply Squad
wikitext: |-
  {{Navigation}}

  * "[[Goblin Attack Force]]" and a member of the "[[Goblin Elite Attack Force]]" appear in this card's artwork.
  * This card is the "[[Goblin]]" [[Continuous Spell Card]] version of "[[Supply]]".
  * The events in this card's artwork continues in the artwork of "[[Backup Squad]]".
  ** Also, both cards are Continuous Spell Cards that allow the player to draw cards when a usually hindering condition is met.
