title: Card Trivia:Jutte Fighter
wikitext: |-
  {{Navigation}}

  * A ''[[wikipedia:Jitte|jutte]]'' (十手、commonly read as "Jitte") is a hybrid weapon that combines a baton and sword-breaker, and was used by the [[wikipedia:Yoriki|Yoriki]] and [[wikipedia:Edo period police|Doshin]], the police force of the [[wikipedia:Edo period|Edo period]].
  * This card appears to have a [[counterpart]] in "[[Samurai Sword Baron]]".
  ** Both cards are used by [[Tetsu Trudge]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, and have effects to change the [[battle position]] of an opponent's monster that each target a different battle position.
