title: Card Trivia:Lovely Labrynth of the Silver Castle
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Tactical Masters]]''/''[[Tactical Masters]]''.
  * This monster appears in the artworks of "[[Big Welcome Labrynth]]" and "[[Trap Holic]]".
  * A plushie of the knight from the artwork of "[[Welcome Labrynth]]" appears in the bottom right corner of this card's artwork.
  * "[[Lady Labrynth of the Silver Castle]]" is this monster's "combat mode".
