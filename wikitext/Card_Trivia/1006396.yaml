title: Card Trivia:Performapal Signal
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts a [[wikipedia:Railway signal|railway signal]], which is used to signal a railroad engineer to stop or proceed. This reflects this card's effect to signal an opponent's monster to either proceed with the attack, or stop if the player [[sent]] card a [[Monster Card]].
  ** Fittingly, in {{episode|ARC-V|143|ref}}, this card was used to [[negate]] the attack of "[[Superheavy Samurai Steam Train King (anime)|Superheavy Samurai Steam Train King]]", a [[Synchro Monster]] based on the [[wikipedia:Steam locomotive|steam locomotive]], which further reflects the railroad-themed connection between both cards.
