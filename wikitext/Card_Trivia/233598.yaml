title: Card Trivia:Battlecruiser Dianthus
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Raging-Flower Gunboat Nadeshiko", is based on the ''[[wikipedia:Dianthus superbus|dianthus superbus]]'', a species of the ''[[wikipedia:Dianthus|dianthus]]'' genus of watering plants that is also known as the ''nadeshiko'' in Japan.
  ** This monster's design is based on the ''[[wikipedia:Yamato nadeshiko|Yamato nadeshiko]]'', the Japanese term for the "ideal Japanese woman", usually portrayed as a calm and collected housewife with a kimono, which reflects its owner, [[Lotus Hanazoe]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  *** Interestingly, "Yamato" is also the name of a battleship, similar to this monster's name and design.
  * This monster has a "[[CXyz]]" [[Card evolutions|evolution]]: "[[CXyz Battleship Cherry Blossom]]".
