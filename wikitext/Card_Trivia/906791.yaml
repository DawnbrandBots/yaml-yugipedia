title: Card Trivia:Speedroid Fuki-Modoshi Piper
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''fukimodoshi'', the Japanese word for "[[wikipedia:Party horn|party horn]]", a horn crated from a paper tube which this monster is depicted wielding.
  ** This monster's Japanese name ({{Ruby|吹|ふき}}{{Ruby|持|も}}{{Ruby|童|どう}}{{Ruby|子|じ}}, ''Fukimodōji'') is a portmanteau of 「吹き戻し」(''fukimodoshi'', lit. "party horn") and 「どうじ」(''dōji'', lit. "young child").
