title: Card Trivia:The League of Uniform Nomenclature
wikitext: |-
  {{Navigation}}

  * Three copies of "[[Mokey Mokey]]" and "[[Ojama Yellow]]" appear in this card's artwork.
  * This card's name features the word "nomenclature", which is the devising or choosing of names for things in a science or other discipline, reflecting its effect to [[Special Summon]] two copies of a [[Level 2]] or lower [[Normal Monster]] with the same name the player [[control]]s from their [[Deck]].
  * This card's name and artwork are referenced by "[[Treaty on Uniform Nomenclature]]", "[[Eliminating the League]]", and "[[The League of Uniform Nomenclature Strikes]]".
