title: Card Trivia:Performage Damage Juggler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Performance Mage Hurricane]]".
  * This monster is based on a [[wikipedia:Juggling|juggler]], a circus performer who continuously tosses and catches objects in the air and throws at least one object in the air while handling the others.
  ** This monster's design features four stars (three on its hat, one on its eye), four rings around its lower half, and is depicted juggling four balls, reflecting its [[Level]] (4).
  * This is one of the first two "[[Performage]]" monsters to become [[Forbidden]], the other being "[[Performage Plushfire]]".
  ** This monster, along with "Performage Plushfire" and "[[Tellarknight Ptolemaeus]]", was simultaneously the fourth, fifth, and sixth of only six cards to be banned during the middle of a banlist cycle, instead of during the new banlist announcements. It was preceded by "[[Cyber-Stein]]", "[[Dimension Fusion]]", and "[[Temple of the Kings]]"
