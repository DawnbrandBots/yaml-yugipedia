title: Card Trivia:Virtual World Xiezhi - Jiji
wikitext: |-
  {{Navigation}}

  * This monster is based on a ''[[wikipedia:Xiezhi|Xiezhi]]'', a mythical goat-like creature that could distinguish between the innocent and the guilty.
  * This card's name is a [[wikipedia:reduplication|reduplication]] of the Chinese character ''zhì'' (豸), a character used in the Chinese word for Xiezhi, ''xièzhì'' (獬豸).
