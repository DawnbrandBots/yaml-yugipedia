title: Card Trivia:Drytron Meteonis Draconids
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Genesis Impactors]]''/''[[Genesis Impact]]''.
  * This monster appears in the artworks of "[[Drytron Meteor Shower]]" and "[[Meteonis Drytron]]".
  * This monster's name is based on the [[wikipedia:Draconids|Draconids]], a meteor shower that seemingly originates from the northern constellation of [[wikipedia:Draco (constellation)|Draco]].
  * This monster has an [[Card evolutions|evolved]] form: "[[Drytron Meteonis DA Draconids]]".
  * This is the first [[Machine]] [[Ritual Monster]].
