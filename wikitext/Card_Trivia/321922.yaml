title: Card Trivia:Denko Sekka
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sekka's Light]]".
  * This monster's name is a pun on "''denkōsekka''" (電光石火), the Japanese term meaning "lightning speed", which reflects its [[Thunder]] [[Type]] and its depiction of wielding a sword charged with electricity.
  ** This monster's Japanese name (電光雪花) translates to "lightning snowflake", whereas this monster's outfit features snowflake-like patterns, and the background of its artwork features falling snowflakes.
