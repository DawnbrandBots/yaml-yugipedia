title: Card Trivia:Here There Be Dragons
wikitext: |-
  {{Navigation}}

  * "[[Chasma, Dragon Ruler of Auroras]]" and "[[Eclipse, Dragon Ruler of Catastrophes]]" appear in this card's artwork.
  * This card's Japanese name is a reference to the "[[Dragon Ruler]]" clip of ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'', which was titled ''"Dragon Rulers" the Paranormal Calamity''.
  ** This card's ''[[TCG]]'' name is a reference to ''[[wikipedia:Here There Be Dragons|Here There Be Dragons]]'', a children's book written by [[wikipedia:Roger Zelazny|Roger Zelazny]].
