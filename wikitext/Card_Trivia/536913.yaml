title: Card Trivia:Big Wave Small Wave
wikitext: |-
  {{Navigation}}

  * "[[30,000-Year White Turtle]]", "[[Akihiron]]", "[[Armored Starfish]]", "[[Crazy Fish]]", "[[Levia-Dragon - Daedalus]]", "[[Orca Mega-Fortress of Darkness]]", "[[Psychic Kappa]]", "[[Sentinel of the Seas]]", "[[Torpedo Fish]]", and "[[Twin Long Rods 2|Twin Long Rods #2]]" appear in this card's artwork.
  * This card's Japanese name (おおなみこなみ, ''Oonami Konami'') is a pun on [[Konami]], the name of the company that produces the ''[[Yu-Gi-Oh!]]'' card game.
