title: Card Trivia:Butterfly Dagger - Elma
wikitext: |-
  {{Navigation}}

  * The dagger in this card’s artwork appears in the artworks of "[[Arsenal Summoner]]", "[[Guardian Elma]]", "[[Power of the Guardians]]" and "[[Really Eternal Rest]]".
  * This card is named for the [[wikipedia:Balisong (knife)|balisong]], a type of folding knife which is also known as a "butterfly dagger" or more commonly as a "butterfly knife".
  * The altar beneath the weapon and the light descending above is similar to other "[[Guardian]]"-related [[Equip Card]]s.
