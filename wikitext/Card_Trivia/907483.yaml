title: Card Trivia:Supreme King's Followers
wikitext: |-
  {{Navigation}}

  * The monsters mentioned by this Skill's effect - "[[Chaos Sorcerer (Duel Links)|Chaos Sorcerer]]", "[[Guardian Baou (Duel Links)|Guardian Baou]]", "[[Skilled Dark Magician (Duel Links)|Skilled Dark Magician]]", "[[Skilled White Magician (Duel Links)|Skilled White Magician]]", and "[[Skull Knight (Duel Links)|Skull Knight]]" - are based on the members of [[The Duelists of Death|Duelists of Death]], the most powerful followers of [[The Supreme King|the Supreme King]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** The inclusion of "[[Ancient Brain (Duel Links)|Ancient Brain]]" references how [[Skull Knight (character)|Skull Knight]] disguised himself as the aforementioned monster in {{episode|GX|141|ref}}.
  ** The inclusion of "[[Demise, King of Armageddon (Duel Links)|Demise, King of Armageddon]]" references how [[Demise, King of Armageddon (character)|its character version]] masqueraded as [[Skilled Dark Magician (character)|Skilled Dark Magician]] and [[Skilled White Magician (character)|Skilled White Magician]] before he [[Ritual Summon]]ed himself with "[[End of the World (anime)|End of the World]]" and [[Tribute]]d both Magicians in {{episode|GX|143|ref}}.
