title: Card Trivia:Abyss Actor - Trendy Understudy
wikitext: |-
  {{Navigation}}

  * In the ''[[TCG]]'', this card is named after the [[wikipedia:theatre|theatrical]] term '''[[wikipedia:understudy|understudy]]''' which refer in [[wikipedia:opera|opera]] as '''cover''' or '''covering''', is a [[wikipedia:performer|performer]] who learns the lines and [[wikipedia:blocking (stage)|blocking]] or choreography of a regular actor or actress in a [[wikipedia:play (theatre)|play]].
  * This monster appears in the artworks of "[[Abyss Actors Back Stage]]", "[[Abyss Actors' Curtain Call]]", and "[[Stand In]]".
