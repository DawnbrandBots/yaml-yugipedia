title: Card Trivia:Gagaga Girl
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gagaga Utopic Tactics]]", "[[Gagagadraw]]", "[[Gagagaguard]]", "[[Gagagatag]]" and "[[Gagagawind]]".
  * The "[[Gagaga]]" crest appears on this monster's necklace.
  * This monster has an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] counterpart: "[[Gagagaga Girl]]".
  * This monster has a [[signature move]] counterpart: "[[Gagaga Girl - Cell Phone Subtraction]]".
  * This monster shares similarities with "[[Dark Magician Girl]]".
  ** Both are the female apprentices of the signature [[Spellcaster]] monsters used by the protagonists of their respective ''Yu-Gi-Oh!'' series: This monster is the apprentice of "[[Gagaga Magician]]" used by [[Yuma Tsukumo]] while "Dark Magician Girl" is the apprentice of "[[Dark Magician]]" used by [[Yugi Muto]]/[[Yami Yugi]].
  *** This monster and "Gagaga Magician" are both three [[Level]]s and 1000 [[ATK]] less than "Dark Magician Girl" and "Dark Magician".
  * This is the first monster with an effect that only activates when it is used with a specific monster of a certain [[archetype]] - in this case, the "Gagaga" archetype - as [[Xyz Material]].
  * This is the first card that can give a [[non-Effect Monster]] an effect.
  * In ''[[Yu-Gi-Oh! ZEXAL World Duel Carnival]]'', this monster appears on the loading screen. Sometimes, she is replaced by [[Tori Meadows]] cosplaying as her.
