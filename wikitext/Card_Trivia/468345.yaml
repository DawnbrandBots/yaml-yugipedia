title: 'Card Trivia:Number 24: Dragulas the Vampiric Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This card is the first [[Wyrm]] "[[Number]]", despite the fact that the Type was introduced after ''[[Yu-Gi-Oh! ZEXAL]]''.
  * This card is named after [[wikipedia:Count Dracula|Count Dracula]].
  * This card's Japanese epithet 「竜血鬼」 (''Ryūketsuki'') is a portmanteau of 「吸血鬼」 (''kyūketsuki'', vampire) and 「竜」 (''ryū'', dragon).
  * This monster is the first [[Extra Deck]] monster (and, as a result, the first [[Xyz Monster]]) to have an effect that can activate when it is flipped face-up.
