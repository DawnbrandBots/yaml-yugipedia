title: Card Trivia:Steam Gyroid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dimension Explosion]]".
  * This is the first "[[roid]]" [[Fusion Monster]], as well as the only [[Non-Effect Monster|non-Effect]] "roid" Fusion Monster.
  * In {{episode|Yu-Gi-Oh! GX|007|ref}}, after [[Steam Gyroid (anime)|this monster]] is destroyed by the effect of [[Jaden Yuki]]'s "[[Elemental Hero Thunder Giant (anime)|Elemental Hero Thunder Giant]]", [[Syrus Truesdale]] exclaims that it is his favorite card.
