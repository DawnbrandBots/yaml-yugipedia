title: Card Trivia:Kozmoll Dark Lady
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Kozmojo]]" and "[[Kozmourning]]".
  * "[[Kozmo Delta Shuttle]]" and "[[Kozmo Soartroopers]]" appear in this card's artwork.
  * This monster is a combination of the [[wikipedia:Wicked Witch of the West|Wicked Witch of the West]] from ''[[wikipedia:The Wizard of Oz (1939 film)|The Wizard of Oz]]'' and [[wikipedia:Darth Vader|Darth Vader]] from ''[[wikipedia:Star Wars (1977 film)|Star Wars]]'', both of whom serve as the main antagonists of their respective films.
  ** This monster's name references Darth Vader's title as "Dark Lord of the Sith", with "lady" being the feminine equivalent of the title of "lord".
  *** This monster's Japanese name, "Dark Elphaiber" references the novel and musical ''[[wikipedia:Wicked (Maguire novel)|Wicked]]'', in which the Wicked Witch of the West's name is Elphaba.
  ** The artwork of "Kozmourning" depicts "[[Kozmo Farmgirl]]" and "[[Kozmo Goodwitch]]" mourning over this monster's death. This references how Darth Vader is revealed to be the father of [[wikipedia:Luke Skywalker|Luke Skywalker]] (whom "Kozmo Farmgirl" is based on), which was alluded by [[wikipedia:Obi-Wan Kenobi|Obi-Wan Kenobi]] (whom "Kozmo Goodwitch" is based on) in the [[wikipedia:Star Wars prequel trilogy|''Star Wars'' prequel trilogy]].
  *** Furthermore, the artwork of "Kozmourning" depicts this monster without her mask on. This references the death of Darth Vader in ''[[wikipedia:Star Wars Episode VI - Return of the Jedi|Star Wars Episode VI - Return of the Jedi]]'', where Luke Skywalker removes Darth Vader's mask to reveal the face of his father, Anakin Skywalker before he passes away from his injuries sustained by [[wikipedia:Palpatine|Palpatine's]] force lightning. Unlike Vader, her face is not scarred or deformed, but actually beautiful.
