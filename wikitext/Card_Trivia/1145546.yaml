title: Card Trivia:Darklord Eveningstar
wikitext: |-
  {{Navigation}}

  * The transformation of "[[Darklord Morningstar]]" into this monster is depicted in "[[Forbidden Crown]]".
  ** According to Valuable Book EX 6, this monster is the empowered form of "Morningstar", resulting from "[[Condemned Darklord]]" gifting the "Forbidden Crown" to him to aid him in defeating [[Solemn|God]].
  * This monster is based on [[wikipedia:Lucifer|Lucifer]], a religious figure who is usually associated with [[wikipedia:Satan|Satan]] and was the first fallen angel.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Darklord Morningstar]]" and a downgraded form of "[[The First Darklord]]".
