title: Card Trivia:Vanquish Soul Heavy Borger
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Vanquish Soul Trinity Burst]]".
  * This monster resembles the "grappler" character archetype in [[wikipedia: Fighting game|fighting games]] (e.g. [[wikipedia:Zangief|Zangief]] from "[[wikipedia:Street Fighter|Street Fighter]]", [[wikipedia:King (Tekken)|King]] from "[[wikipedia:Tekken|Tekken]]", [[wikipedia:Potemkin (Guilty Gear)|Potemkin]] from "[[wikipedia:Guilty Gear|Guilty Gear]]", etc.). Gameplay-wise, these characters are known for having slow yet immensely powerful attacks that focus chiefly on close-range strikes and special moves that can grab and throw opponents in unique ways (or "command grabs", as they are known in the said games community).
  ** This basis can be seen in its [[Damages your opponent|burn effect]] reflecting the power/damage-based nature of said characters, as well as its [[Quick Effect|quick]] [[Special Summons itself from your hand|Summoning effect]] that [[Returns from field to hand for Special Summon|returns]] a "[[Vanquish Soul]]" monster to the [[hand]] reflecting their defensive/supportive role (especially in tag team-based fighting games) by protecting the player's other characters via tagging in to easily absorb hits and retaliate with a powerful technique of their own.
