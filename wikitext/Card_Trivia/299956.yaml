title: Card Trivia:Artifacts Unleashed
wikitext: |-
  {{Navigation}}

  * The artwork of this card shows "[[Artifact Beagalltach]]" and "[[Artifact Moralltach]]" in the process of being disassembled, presumably to be remade into "[[Artifact Durandal]]".
  ** The spirit of "Durandal" appears in the artwork as well, further reinforcing this. Also, this artwork suggests that the spirits of "Beagalltach" and "Moralltach" are somehow merged, and that the spirit of "Durandal" is actually a fusion of them.
