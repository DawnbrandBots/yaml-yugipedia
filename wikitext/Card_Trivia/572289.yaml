title: Card Trivia:Shiranui Squiresaga
wikitext: |-
  {{Navigation}}

  * This card's Japanese name is a reference to an [[wikipedia:Ayakashi (yōkai)|Ayakashi]], a spirit from Japanese folklore.
  ** This is also the origin of the name of the [[Mayakashi]] archetype, which is fitting, as both of these archetypes are related to each other via several card artworks.
  * This monster is "[[Shiranui Squire]]" wielding "[[Shiranui Spectralsword Shade]]."
