title: Card Trivia:Ostinato
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Ostinato|Ostinato]] is a musical motif or phrase that keeps repeating throughout the song in the same voice.
  ** In Italian, it is also an adjective meaning "stubborn."
  ** The expression text in this card's artwork spells out "[[wikipedia:Riff|riff]]," which is another term for a repeating pattern in music.
  * "[[Bloom Diva the Melodious Choir]]" appears in this card's artwork.
