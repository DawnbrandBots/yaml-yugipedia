title: Card Trivia:Medusa, Watcher of the Evil Eye
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Medusa|Medusa]], a monster from [[wikipedia:Greek mythology|Greek mythology]], who had the ability to turn people into stone simply by having them look into her eyes.
  * This monster appears in the artworks of "[[Evil Eye Awakening]]", "[[Evil Eye Confrontation]]", "[[Evil Eye Defeat]]", and "[[Evil Eye of Gorgoneio]]".
  * This card has an evolved counterpart: "[[Gorgon, Empress of the Evil Eyed]]".
