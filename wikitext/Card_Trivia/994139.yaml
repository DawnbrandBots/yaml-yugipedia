title: Card Trivia:Break the Destiny
wikitext: |-
  {{Navigation}}

  [[File:Plasma attacks a second time.png|thumb|right|300px|"[[Destiny HERO - Plasma (anime)|Destiny HERO - Plasma]]" attacks a second time.]]
  * "[[Destiny HERO - Plasma]]" appears in this card's artwork.
  ** This card's name and artwork are based on a scene in {{episode|GX|101|ref}} where [[Aster Phoenix]] attacks [[Sartorius]] directly with "[[Destiny Hero - Plasma (anime)|Destiny Hero - Plasma]]" a second time via the effect of "[[D - Burst]]". In the original Japanese version of the episode, right before "Plasma" performs the second attack Aster shouts "Break destiny!"
  ** This card's effect to skip the opponent's next [[Main Phase 1]] is based on the effect of "[[Drain Time]]", a card that requires the player to [[control]] "Plasma" and skip both player's [[phase]]s of their choosing; however, in both times it was used in the ''[[Yu-Gi-Oh! GX]]'' anime, it was never used to skip their Main Phase 1.

