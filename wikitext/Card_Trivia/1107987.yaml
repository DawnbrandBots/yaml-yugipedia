  * "[[Yamiruler]]" appears in this card's artwork.
  * This card is based on a ''[[wikipedia:Gunbai|gunbai]]'', a Japanese war-fan often held by military leaders to commune with their troops in [[wikipedia:History of Japan#Feudal Japan|feudal Japan]].
