  * This monster appears in the artwork of "[[Parallel Teleport]]".
  ** This monster's appearance in "Parallel Teleport" predates this card's release by 3 months. 
  * This monster is an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form of "[[Serene Psychic Witch]]".

