title: Card Trivia:Safe Zone
wikitext: |-
  {{Navigation}}

  * "[[Gradius]]" and "[[B.E.S. Crystal Core]]" appear in this card's artwork.
  * The name of this card is derived from any position on screen in the video game genre of [[wikipedia:Shoot 'em up|Shoot em' ups]] (to which the ''[[Konami Arcade Games|Gradius]]'' series of games belongs) at which the player character is safe from all forms of attack. The card's artwork references a safe spot that the boss Crystal Core has, in which the player can fly in between the warship's tentacles. This causes the boss to infinitely loop between moving up and down slightly, allowing the player ship to slip between its lasers without fear of being hit.
  * Contrary to this card's effect, being in the safe spot on any ''[[wikipedia:Gradius|Gradius]]'' game is the best way for the ships to attack the cores directly.
