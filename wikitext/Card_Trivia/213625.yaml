title: Card Trivia:Heroic Champion - Excalibur
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Return of the Duelist]]'', and is also one of the cover cards of ''[[Collectible Tins 2012 Wave 1]]''.
  * This monster appears in the artworks of "[[Heroic Chance]]", "[[Heroic Change]]", "[[Heroic Growth]]", "[[Return of the Duelist (card)|Return of the Duelist]]" "[[Xyz Pieces]]", and "[[Xyz Shift]]".
  * This monster is named after [[wikipedia:Excalibur|Excalibur]], the mythical sword used by [[wikipedia:King Arthur|King Arthur]] in medieval literature which possesses magical powers and is associated with the rightful sovereignty of [[wikipedia:Great Britain|Britain]].
  * This was [[Nistro]]'s [[signature card]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, before he gave it to [[Yuma Tsukumo]].
  * This monster has a retrained [[counterpart]]: "[[Heroic Champion - Magnum Excalibur]]".
  * This monster can be seen as a [[counterpart]] of "[[Number 86: Heroic Champion - Rhongomyniad]]":
  ** Both monsters are named after the weapons used by King Arthur; this monster is named after the sword used by King Arthur, while "Rhongomyniad" is named after the spear used by King Arthur.
  ** Both monsters' [[Attribute]]s are polar opposites of each other; this monster's Attribute is [[LIGHT]], while "Rhongomyniad's" Attribute is [[DARK]].
  ** Both monsters feature an effect that can double their [[original ATK]] by using two [[Xyz Material]]s.

  * In the ''[[TCG]]'', this card debuted in ''[[Collectible Tins 2012 Wave 1]]'' four days prior to the release of ''[[Return of the Duelist]]''. Thus, outside of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh! Duel Monsters]]'' era, this is the only card to be featured in a [[Core Booster|Core]] [[Booster pack]] while already released, prior to the use of preview cards as promos since ''[[Judgment of the Light: Deluxe Edition]]''.
