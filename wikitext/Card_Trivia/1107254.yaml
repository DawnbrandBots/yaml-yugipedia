  * This monster is an [[Card evolutions|upgraded]] form of "[[Red-Eyes Black Dragon]]", [[equip]]ped with "[[Dragon Nails]]".
  ** This monster's appearance is based on a scene from {{episode|Yu-Gi-Oh!|012|ref}} where [[Rex Raptor]] equips "[[Red-Eyes B. Dragon (anime)|Red-Eyes Black Dragon]]" with "[[Dragon Nails (anime)|Dragon Nails]]".

