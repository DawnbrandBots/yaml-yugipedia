title: Card Trivia:Poisonous Winds
wikitext: |-
  {{Navigation}}

  * "[[Caam, Serenity of Gusto]]" appears in this card's artwork.
  * This card showcases the events of "[[Gishki Noellia]]'s" plan to drive the "Gusto" out of their lands, by flooding it with poisonous winds so that they either escape, or die. This is due to their land being rich in resources, therefore was a primary location for the "[[Gishki]]" tribe to take over.
  ** From the events of the Duel Terminal world, this card could also be showing the herald of the approaching "[[lswarm]]" threat to the "[[Gusto]]" clan and the sickness it brings.
