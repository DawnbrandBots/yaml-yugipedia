title: Card Trivia:Spherous Lady
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Lamia|Lamia]], a creature depicted as half-woman and half-serpent in [[wikipedia:Greek mythology|Greek mythology]], despite its [[flavor text]] describing it as a vampire. 
  * This monster originally debuted as a constructed card in ''[[Yu-Gi-Oh! Dark Duel Stories]]'', and is also one of five constructible cards to be released in the ''[[OCG]]''/''[[TCG]]''. It is a [[List of significant constructed cards#Standard combinations|matched constructed card]] using the 18th upper and lower body [[card part]]s, "[[Spherus]]" and "[[Lady]]".
  ** This is also one of [[List of significant constructed cards#Became regular cards|seven originally constructible cards]] to appear as a regular card in the game's sequel, ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'', as well as the first to be released in the ''OCG''/''TCG''.
