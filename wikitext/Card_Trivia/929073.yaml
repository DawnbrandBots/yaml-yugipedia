title: Card Trivia:Mystic Dealer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[All For Naught - Bubble Burst]]".
  * The appearance of "[[Trick Pigeon]]" is based on this monster's design.
  * This monster has a [[counterpart]]: "[[Amazing Dealer]]".
  ** Both monsters share the same [[Attribute]] ([[WATER]]), [[Level]] (3), [[Type]] ([[Spellcaster]]), reversed [[ATK]]/[[DEF]], and effects to [[send]] cards from the [[hand]] to the [[Graveyard]] and [[draw]] the same number.
  * This monster has a combined counterpart with "[[Phoenix Dragon]]": "[[Phoenix Dealer]]".
  * This card is a member of a series of monsters in ''[[Yu-Gi-Oh! Rush Duel]]'' who share the same Level (3), [[original ATK and DEF]] (1000/0), and effect to draw a card by sending a monster with its same Type from the hand to the Graveyard. Other cards in this series include:
  ** "[[Cobalt Cobolt]]" for [[Fiend]]
  ** "[[Crafter Drone]]" for [[Machine]]
  ** "[[Dramoth Caterpillar]]" for [[Insect]]
  ** "[[Mech Therizinoraptor]]" for [[Dinosaur]]
