title: Card Trivia:Voidvelg God Requiem
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[God Tribute Summon]] form of "[[Voidvelg Requiem]]".
  ** This monster's [[Level]] (10) and requirement of 3 [[Tribute]]s reference the [[Egyptian God]]s.
  ** In the ''[[Yu-Gi-Oh! GO RUSH!! (manga)|Yu-Gi-Oh! GO RUSH!!]]'', [[Zuwijo Zwil Velgear (manga)|Zuwijo Zwil Velgear]] repeats verbatim to [[Yuhi Ohdo (manga)|Yuhi Ohdo]] a phrase said by [[Marik Ishtar (manga)|Marik Ishtar]] to [[Dark Yugi (manga)|Dark Yugi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and by [[Seto Kaiba (manga)|Seto Kaiba]] to [[Aigami]] in the ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'' movie: ''It's no monster, it's a god!''
  * This monster has a rival [[Galactica]] [[counterpart]]: "[[Galactica God Oblivion]]".
