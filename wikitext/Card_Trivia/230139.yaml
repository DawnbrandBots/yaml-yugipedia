title: Card Trivia:ZW - Leo Arms
wikitext: |-
  {{Navigation}}

  * "[[Ultimate Leo Utopia Ray]]" appears in this card's artwork.
  * This monster's color scheme is based on the appearance of [[Yuma Tsukumo]] after undergoing his transformation into his [[ZEXAL (power)|ZEXAL]] form, which features a white spandex, red armor, and golden spiky hair.

  * This monster shares similarities with "[[ZW - Dragonic Halberd]]".
  ** Both monsters share the same [[Rank]] (5) and [[original ATK and DEF]] (3000/1200).
  ** Both monsters are tied for having the highest original [[ATK]] (3000) of all Rank 5 monsters that require only two [[Xyz Material]]s.
  ** Both monsters have similar red, white, and yellow color schemes, referencing that of the ZEXAL armor.
  ** When equipped to a "[[Utopia (archetype)|Utopia]]" monster, both monsters grant 3000 ATK, the most ATK of all "[[ZW -]]" monsters.
  ** Both monsters have an "Equipped Union" form with "[[Number C39: Utopia Ray]]", which depicts the latter equipped with the armor form of either monster. In this monster's case, it is "[[Ultimate Leo Utopia Ray]]".
  * This is the only card in the anime that grants a monster the ability to attack outside the [[Battle Phase]].
  * Originally, this monster was called "ZEXAL Weapon - Dragonic Halberd" and was stated to be a [[DARK]] monster on a [[TV Tokyo]] website [[List of unseen cards#"ZW - Dragonic Halberd"|post]]. The post was later updated to the current name and [[Attribute]]. Over eight years later, the same exact name and Attribute were reused for [[ZW - Dragonic Halberd|another "ZW -" Xyz Monster]] in ''[[Lightning Overdrive]]''.
