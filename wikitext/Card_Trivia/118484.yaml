title: Card Trivia:Gravekeeper's Visionary
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legacy of the Valiant: Deluxe Edition]]''.
  * This monster is wielding the same scepter as "[[Gravekeeper's Chief]]", "[[Gravekeeper's Descendant]]", "[[Gravekeeper's Oracle]]", and "[[Gravekeeper's Priestess]]".
  ** This monster is also sitting on the same throne as "Gravekeeper's Oracle".
  * This card is one of several "[[Gravekeeper's]] monsters released in the ''[[Yu-Gi-Oh! 5D's]]'' era whose designs are based on the [[Ishtar]] family. In this monster's case, it bears resemblance to the [[Ishtar forefather]].
  * This monster is wearing a mask of a jackal, the beast-head commonly associated with [[wikipedia:Anubis|Anubis]], the Egyptian god associated with embalmment and death, keeping in relation with the theme of the "Gravekeeper's" archetype.
  * This card is tied with "[[Gravekeeper's Oracle]]" for the highest [[ATK]] for a "[[Gravekeeper's]]" monster.
