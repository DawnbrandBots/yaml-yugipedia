title: Card Trivia:Darklord Tezcatlipoca
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Tezcatlipoca|Tezcatlipoca]] was a central deity in [[wikipedia:Aztec religion|Aztec religion]], he is associated with a wide range of concepts, including the [[wikipedia:night sky|night sky]], the night winds, [[wikipedia:Tropical cyclone|hurricanes]], the north, the [[wikipedia:earth|earth]], [[wikipedia:obsidian|obsidian]], [[wikipedia:enemy|enmity]], discord, rulership, [[wikipedia:divination|divination]], [[wikipedia:temptation|temptation]], [[wikipedia:Jaguars in Mesoamerican cultures|jaguars]], sorcery, [[wikipedia:beauty|beauty]], [[wikipedia:war|war]] and strife.
  * This monster appears in the artwork of "[[Banishment of the Darklords]]".
