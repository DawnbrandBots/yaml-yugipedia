title: Card Trivia:Evil HERO Vicious Claws
wikitext: |-
  {{Navigation}}

  * This monster references "[[Vicious Claw]]", an [[Equip Spell Card]] used by the [[The Supreme King|Supreme King]], who uses the "[[Evil HERO]]" [[archetype]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Visually, this monster is the masked and caped villain with the metallic claw that appears in the artwork of "Vicious Claw", wearing the armored bodysuit of the "[[Evil Token]]" that it can [[Special Summon]].
  *** This monster shares the same [[Attribute]] ([[DARK]]), [[Level]] (7), [[Type]] ([[Fiend]]) and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (2500/2500) as the "Evil Token".
  ** This monster's effects are based on the effects and appearance of "[[Vicious Claw (anime)|Vicious Claw]]" in {{episode|GX|143|ref}}.
  *** This monster's first effect to Special Summon itself from the [[hand]] allows it to place itself on the [[field]], similar to how "Vicious Claw" can be [[activate]]d from the hand and placed on the field.
  *** This monster's effect to increase the [[ATK]] of the [[target]]ed "[[HERO]]" monster by 300 after being Special Summoned is based on the first effect of "Vicious Claw", which increases the [[equip]]ped monster's ATK by 300. In the episode, "Vicious Claw" was equipped to "[[Evil Hero Malicious Edge (anime)|Evil Hero Malicious Edge]]".
  *** This monster's second effect to Special Summon itself from the [[Graveyard]] when a monster is [[destroy]]ed and destroy a card on the field if the player has a monster in the Graveyard that mentions "[[Dark Fusion]]" is based on the other effects of "Vicious Claw", which [[return]]s itself to the [[hand]] if the equipped monster would be destroyed, destroys a monster on the field, and Special Summons an "Evil Token" to the field. In the episode, these effects were activated while "[[Evil Hero Infernal Sniper (anime)|Evil Hero Infernal Sniper]]" was in the Supreme King's Graveyard.
