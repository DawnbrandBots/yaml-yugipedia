title: Card Trivia:Soul Arena
wikitext: |-
  {{Navigation}}

  * The souls that appear in this card's artwork also appear in the artwork of "[[Number 95: Galaxy-Eyes Dark Matter Dragon]]", which was used by [[Kaito Tenjo (manga)|Kaito Tenjo]] in his Duel against [[Yuma Tsukumo (manga)|Yuma Tsukumo]] during the same time this card was played in the manga.
  * In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, when [[Kyoji Yagumo]] used this card against [[Ryoga Kamishiro (manga)|Ryoga Kamishiro]], it had a bizarre effect on the spectators, apparently hypnotizing/possessing them and making them into mindless, blood-crazed fanatics.
  * This card can be considered the manga counterpart of "[[Sphere Field (card)|Sphere Field]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, as both are [[Field Spell Card]]s used by principal antagonists, support the "[[Number]]" archetype, were used atop of the [[Heartland Tower]] (technically [[Heartland New Tower]] in the manga, since Kaito blew up the original), and featured magical/supernatural power outside of the Duels.
