title: Card Trivia:Galactica Lost Oblivion
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Galactica Oblivion]]".
  ** This monster is adorned with [[Dark Matter (series)|Dark Matter]] orbs on its back and tail, reflecting how [[Yudias Velgear]] first used "[[Galactica Oblivion (anime)|Galactica Oblivion]]" and "[[Dark Matter Pressure Wurm]]" to [[Fusion Summon]] it, in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
