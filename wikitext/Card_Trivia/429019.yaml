title: Card Trivia:Light Wing Shield
wikitext: |-
  {{Navigation}}

  * "[[Number 39: Utopia]]" appears in this card's artwork.
  ** This card's name is based on the [[Attack and effect names in Yu-Gi-Oh! ZEXAL|effect name]] of "Number 39: Utopia" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This card's second bulleted effect is based on "[[Double or Nothing!]]", a card that is used in combination with "Number 39: Utopia" after it has [[negate]]d its own [[attack]], which doubles its [[ATK]].
