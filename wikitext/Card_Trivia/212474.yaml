title: Card Trivia:Temperance of Prophecy
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:Temperance (Tarot card)|Temperance]], the fourteenth of the [[wikipedia:Major Arcana|Major Arcana]].
  ** This card's Japanese name, Temper, is a reference to the Tarot card, Temperance.
  ** This card's artwork also features "Temperance of Prophecy" holding two cups just as the Tarot card does.
  * This monster appears in the artwork of the card "[[Spellbook of Life]]" where she is using the book to revive or summon "[[Divine Grace - Northwemko]]". Her face is also partly visible compared to this card's artwork where it is hidden behind her hood.
  ** This monster also appears in the artwork of "[[Spellbook of Knowledge]]".
