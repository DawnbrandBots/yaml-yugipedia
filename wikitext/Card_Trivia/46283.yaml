title: Card Trivia:Time Machine
wikitext: |-
  {{Navigation}}

  * This machine appears in the artwork of "[[Red-Eyes Retro Dragon]]" and "[[Time Engine]]".
  ** The aforementioned cards reflect the fact that in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], this card was used to [[return]] "[[Red-Eyes Black Metal Dragon]]" ([[equip]]ped with "[[Dragon Nails]]") to the [[field]] after it was [[destroyed by battle]].
  * This card, along with "[[Multiply]]", were released in the ''[[TCG]]'' almost a decade after it was released in the ''[[OCG]]''.
  * In the original ''OCG'' print, this card's effect did not treat this as a [[Special Summon]], but rather an effect that returns a monster to the field. Later ''OCG'' prints would changed this card's effect to Special Summon that monster.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|122|ref}}, specifically from the panel where [[Time Machine (manga)|this machine]] manifests itself.
  * In ''[[Yu-Gi-Oh! Rush Duel]]'', this card is the only card that can summon a [[Maximum Monster]] in [[Maximum Mode]] from a place other than the hand.
