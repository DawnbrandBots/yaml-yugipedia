title: Card Trivia:Space Yggdrago
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Deep Warning Fusion]]".
  ** A device shaped like this monster's head appears in the artwork of "[[Space Call]]".
  * This monster is a [[Space]] [[counterpart]] of "[[Yggdrago the Sky Emperor]]" in [[Maximum Mode]].
  * This monster has two [[Card Evolutions|upgraded]] [[Fusion Monster|Fusion]] forms: "[[Dual Space Yggdrago]]" and "[[Deep Space Yggdrago]]".
  * This is the [[signature card]] of [[Zaion]] in the ''[[Yu-Gi-Oh! GO RUSH]]'' anime.
