title: Card Trivia:Red Lotus King, Flame Crime
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2024]]''.
  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Special Summon]]ing effect is based on a scene in {{chapter|5D's|005|ref}}, where [[Jack Atlas (manga)|Jack Atlas]] Special Summons [[Red Lotus King, Flame Crime (manga)|this monster]] via the effect of "[[Dark Flare]]" during [[Yusei Fudo (manga)|Yusei Fudo's]] turn after he Special Summons "[[Junk Forward (manga)|Junk Forward]]". Additionally, Jack also controlled "[[Dust Lord Ash Gash (manga)|Dust Lord Ash Gash]]", which was a [[Tuner monster]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''Yu-Gi-Oh! 5D's'' manga, specifically from the panel showing this monster being Summoned, albeit reversed.
