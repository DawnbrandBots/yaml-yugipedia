title: Card Trivia:Kuribeh
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Brothers of Legend]]''.
  * This monster appears in the artwork of "[[Five Star Twilight]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' effect supporting "[[Kuribandit]]" and immediately [[Normal Summon]]ing a [[Fiend]] monster is an altered version of its effect to [[Special Summon]] "Kuribandit" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, as at the time, this card had not been released in the ''OCG''/''TCG'' around the same time as "Kuribandit".
  * This card's ''OCG''/''TCG'' [[Quick Effect]] effect of [[discard]]ing itself and increasing a "[[Kuriboh (archetype)|Kuriboh]]" monster's [[ATK]] by 1500 reference the effect of "[[Pump Up]]", which was used on "[[Kuribabylon (anime)|Kuribabylon]]" in {{episode|Yu-Gi-Oh!|156|ref}} to double its ATK from 1500 to 3000. Ironically, in the ''OCG''/''TCG'', this card's effect cannot be used on "[[Kuribabylon]]", as it is not a "Kuriboh" monster.
