title: Card Trivia:Black Luster Soljersey
wikitext: |-
  {{Navigation}}

  * This monster is a ''[[Rush Duel]]'' [[Jersey]] parody of "[[Black Luster Soldier (Rush Duel)|Black Luster Soldier]]".
  ** This monster's [[Normal Monster]] [[card type]] references how "Black Luster Soldier" is a [[Non-Effect Monster|Non-Effect]] [[Ritual Monster]], as well as [[Black Luster Soldier (Normal)|its Normal Monster version]].
  ** "Black Luster Soldier" has 3000 [[ATK]] in the ''[[OCG]]''/''[[TCG]]'', and this monster's [[ATK]] can be increased to 3000 via the effect of "[[Black Luster Jersitual]]".
  * This monster has a retrained counterpart: "[[Black Luster Soljersey - Envoy of the Drying]]", which itself is a ''Rush Duel'' parody of "[[Black Luster Soldier - Envoy of the Beginning]]".
  * This is the [[signature card]] of [[George Jersey]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
