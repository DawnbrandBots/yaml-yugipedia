title: Card Trivia:Mementotlan Fusion
wikitext: |-
  {{Navigation}}

  * Various parts of "[[Memento]]" monsters appear in this card's artwork:
  ** The crystal heart of "[[Mementoal Tecuhtlica - Combined Creation]]".
  ** The crystal brooch and one of the crystal claws of "[[Mementotlan-Horned Dragon]]".
  ** The crystal brooch, the lower jaw, and the crystal horn of "[[Mementotlan Goblin]]".
  ** The skull of "[[Mementotlan Mace]]".
  ** The skull, a piece of leg armor, and a crystal from the mane of "[[Mementotlan Tatsunootoshigo]]".
  ** Various shards of crystal also share similar colors with the crystals of the other "Memento" monsters.
