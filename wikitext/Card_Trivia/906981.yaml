title: Card Trivia:Amazement Assistant Delia
wikitext: |-
  {{Navigation}}

  * Several "[[Amazing Time Ticket]]s" appear in this card's artwork.
  * This card's name, "Delia", is based on "commedia dell'arte" ("comedy of the profession"), a form of Italian theatre that was popular in Europe over the 16th-18th centuries.
  * This card is the opposite [[counterpart]] of "[[Amazement Attendant Comica]]".
  ** Both have a mirrored appearance.
  ** Both have opposite [[ATK]] and [[DEF]].
