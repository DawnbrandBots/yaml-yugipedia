title: Card Trivia:Evil HERO Dark Gaia
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Creation Pack 06]]'', ''[[Duelist Edition Volume 2]]'', ''[[Duelist Pack Collection Tin: Jaden Yuki]]'', and ''[[Duelist Pack: Jaden Yuki 3]]''.
  * This is one of the only "[[HERO]]" [[Fusion Monster]]s with [[Fusion Material]] that does not include a "HERO" monster, with the other being "[[Evil HERO Darkest Knight]]"&mdash;this does not count "[[Masked HERO]]" monsters, which can only be [[Special Summon]]ed from the [[Extra Deck]] with "[[Mask Change]]".
  * Theoretically, the highest amount this monster's [[ATK]] can reach via its own effect is 9000 if "[[Dystopia the Despondent]]" (5000) and "[[Imperion Magnum the Superconductive Battlebot]]" (4000) are used as its Fusion Materials.
