title: Card Trivia:Leodrake's Mane
wikitext: |-
  {{Navigation}}

  * The leaf on the artwork of this card is part of "[[Naturia Leodrake]]".
  ** Incidentally, this card's effect to raise the monster's ATK to 3000 is representative of "Naturia Leodrake's" 3000 ATK points.
  ** It also reflects "Leodrake's" lack of an effect by negating the effect of the boosted monster.
