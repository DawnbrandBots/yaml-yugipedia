title: Card Trivia:Sunavalon Dryatrentiay
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Sunseed Genius Loci]]" → "[[Sunavalon Dryas]]" → "[[Sunavalon Dryades]]" → "[[Sunavalon Dryanome]]" → "'''Sunavalon Dryatrentiay'''"
  * This is one of the [[cover card]]s of ''[[Selection 10]]''.
  * This monster appears in the artwork of "[[Sunavalon Bloom]]".
  ** A petrified version of this monster appears in the artwork of "[[Sunavalon Cursed Rebirth]]".
  * This card's name is a portmanteau of "[[wikipedia:Dryad|Dryad]]", "[[wikipedia:Atlanteia|Atlanteia]]", and "[[wikipedia:Thriae|Thriae]]".
  ** "Atlanteia" is a [[wikipedia:Hamadryad|hamadryad]] a half-[[wikipedia:Nymph|nymph]] half-dryad being in [[wikipedia:Greek mythology|Greek mythology]] who consorted [[wikipedia:Danaus|King Danaus]] of [[wikipedia:Libya|Libya]].
  ** "Thrai" is a triad of three prophetic nymph sisters, Melania, Kelodora, and Daphnis, who also serve as the patron gods of bees.
  * The monster resembles a [[wikipedia:Cherry blossom|cherry blossom]] tree.
  * Despite this monster still bearing "fruits" and having the highest [[Link Rating]] of the "[[Sunavalon]]" [[Link Monster]]s, this card lacks the archetype's signature ability of allowing the controller to regain their [[Life Points]] after receiving damage and [[Special Summon]]ing a "[[Sunvine]]" Link Monster.
  * This is the [[signature card]] of [[Spectre]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
