title: Card Trivia:Spellbook Organization
wikitext: |-
  {{Navigation}}

  * The library that appears in the artwork of "[[Hidden Spellbook]]" appears in this card's artwork.
  ** The books from the artwork of "[[Hidden Spellbook]]" also appears in this card's artwork.
  ** The three books in this card's artwork are likely a reference to the number of cards at the top of the [[Deck]] that this card's effects allows the player to look at and return to the top of the Deck in any order.
  * This card's English name was "Pigeonholing Books of Spell", until its reprint in ''[[Gold Series: Haunted Mine]]''.
  ** This card was renamed because its Japanese name made it a member of the "[[Spellbook]]" archetype (which released in ''[[Return of the Duelist]]''), despite being released many years before.
  * This card has a ''[[Rush Duel]]'' counterpart: "[[Spellbook Rejection]]".
