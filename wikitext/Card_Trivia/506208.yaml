title: Card Trivia:Cyber Shadow Gardna
wikitext: |-
  {{Navigation}}

  * This card's name and effect reflect its effect to create a "shadow" of an opponent's attacking monster in terms of [[ATK]] and [[DEF]]. In the ''[[Yu-Gi-Oh! GX]]'' anime, this is demonstrated when this card transforms into the "shadow" version of the opponent's attacking monster.
  * This is the only [[Trap Monster]] that '''must be [[Set]]''' after being [[Special Summon]]ed, unless its effects are [[negate]]d or "[[Light of Intervention]]" is [[face-up]] on the [[field]].
