title: Card Trivia:Forbidden Dress
wikitext: |-
  {{Navigation}}

  * This card makes reference to the "[[wikipedia:Seamless robe of Jesus|Seamless Robe of Jesus]]", the tunic [[wikipedia:Jesus|Jesus]] was wearing when he was crucified in the Bible.
  * This is a Quick-Play version of "[[Safe Zone]]", sans the "cannot be destroyed by battle" clause.
  * A part of "[[The Sanctuary in the Sky]]" appears in the background of this card.
