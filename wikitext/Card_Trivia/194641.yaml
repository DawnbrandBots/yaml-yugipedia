title: Card Trivia:Inzektor Hornet
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Zektrike Kou-ou]]".
  * This monster is based on a [[wikipedia:Wasp|wasp]].
  ** This card's effect is based on a hornet's sting, as it can be reused offensively over and over by [[equip]]ping this card to other "[[Inzektor]]" monsters, such as in the "[[Inzektor Dragonfly]]" or "[[Inzektor Centipede]]" combo.
  * This monster bears a resemblance to [[wikipedia:Kamen Rider TheBee|Kamen Rider TheBee]], as they are both based on wasps and carry weapons around their wrist area.
  * This card and "Inzektor Dragonfly" are among the first "Inzektor" cards to be [[Limited]].
