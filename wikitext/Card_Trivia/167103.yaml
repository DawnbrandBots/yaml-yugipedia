title: Card Trivia:Zaphion, the Timelord
wikitext: |-
  {{Navigation}}

  * This monster is named after the Judaic archangel, [[wikipedia:Zaphkiel|Zaphkiel]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Zaphkiel is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Binah|Binah]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Binah is the third of the ten Sefira of the Tree of Life, and this was the third "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  *** In the Jewish Kabbalah, Binah is said to be the source of primordial feminine energy, which is reflected in this monster's feminine appearance.
