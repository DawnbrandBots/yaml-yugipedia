title: Card Trivia:Supreme Sovereign Serpent of Golgonda
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Judgment of the Branded]]" and "[[Screams of the Branded]]".
  * This monster is the former sovereign of the "[[Swordsoul]]", expelled from their land by "[[Swordsoul Supreme Sovereign - Chengying]]".
  * "[[The Abyss Dragon Swordsoul]]" is this monster combined with "[[Swordsoul Sinister Sovereign - Qixing Longyuan]]".
  * Several dark "Hole" mark appears on this monster's body, suggesting that the "[[Dogmatika]]" Church is responsible for its possible corruption. Another "Hole" mark also appears in this card's artwork, emerging from the sand, and this monster is depicted coming out from that portal.
  * This card is possibly named after the Indian city of [[wikipedia:Golconda Fort|Golkonda]].
  ** It is also possible that "[[Great Sand Sea - Gold Golgonda]]" is named after this monster, which seems to be the 'ruler' of the desert.
