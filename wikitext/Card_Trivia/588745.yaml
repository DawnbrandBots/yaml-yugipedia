title: Card Trivia:Ghost Sister & Spooky Dogwood
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * This monster's Japanese name (儚無みずき, ''Hana Mizuki'') is a pun on the Japanese name for the [[wikipedia:Cornus florida|flowering dogwood]] (ハナミズキ, ''Hanamizuki'') where the kana for "flower" (ハナ, ''hana'') is replaced with the kanji for "fleeting nothingness" (儚無, ''hana'').
  ** This monster's Christian theme is likely based on a Christian legend which claims that the cross used to crucify [[wikipedia:Jesus|Jesus Christ]] was constructed of dogwood.
  ** The second portion of the name, "Spooky Dogwood" is a visual pun, as this monster is depicted being accompanied by the ghost of a dog.
