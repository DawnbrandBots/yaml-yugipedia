title: Card Trivia:Dragunity Darkspear
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Spear|spear]], a polearm consisting of a long shaft and a pointed tip, usually made of metal. Fittingly, the design of this monster's head resembles a metallic spearhead.
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form combined with "[[Dragunity Legionnaire]]": "[[Dragunity Knight - Gae Dearg]]".
  * The monster appears on the poster for the [[World Racing Grand Prix]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
