title: Card Trivia:Neo Kaiser Sea Horse
wikitext: |-
  {{Navigation}}

  * This monster is a "[[Blue-Eyes]]"-themed [[retrained]] counterpart of "[[Kaiser Sea Horse]]".
  ** This card's release in ''[[Structure Deck: Advent of the Eyes of Blue]]'' references how "Kaiser Sea Horse" was first released in the ''[[OCG]]'' in ''[[Structure Deck: Kaiba]]'', which also featured a "Blue-Eyes" monster as its [[cover card]].
  *** Due to the etymology of "Kaiser Sea Horse", this monster can be considered to represent [[Seto Kaiba]], like "[[Maiden of White]]" is based on [[Kisara]], who was the carrier of the ''[[ka]]'' of [[Blue-Eyes White Dragon (character)|Blue-Eyes White Dragon]] and the love interest of [[Seto|Seto's past incarnation]].
