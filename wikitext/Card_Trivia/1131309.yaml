title: Card Trivia:Wicked Dragon with the Ominous Head
wikitext: |-
  {{Navigation}}

  * This monster is a retrained ''[[Rush Duel]]'' [[counterpart]] of "[[Wicked Dragon with the Ersatz Head]]".
  ** This monster's inclusion in the [[Zera (Rush Duel)|Zera]] [[series]] references how "[[Wicked Dragon with the Ersatz Head (FMR)|Wicked Dragon with the Ersatz Head]]" was required to [[Ritual Summon]] "[[Zera The Mant (FMR)|Zera the Mant]]" in ''[[Yu-Gi-Oh! Forbidden Memories]]''.
