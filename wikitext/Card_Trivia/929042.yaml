title: Card Trivia:Yamata no Tsurugi
wikitext: |-
  {{Navigation}}

  * This card is based on ''[[wikipedia:Yamata no Orochi|Yamata no Orochi]]'' (a legendary eight-headed and eight-tailed dragon from Japanese mythology, which is also referenced by this card's effect working with Level 8 monsters) and ''[[wikipedia:Totsuka-no-Tsurugi|Totsuka-no-Tsurugi]]'' (the sword used to slay ''Orochi'').
