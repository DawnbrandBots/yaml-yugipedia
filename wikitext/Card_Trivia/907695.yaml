title: Card Trivia:Ichiroku's Ledger Book
wikitext: |-
  {{Navigation}}

  * This card's name "Ichiroku" is a reference to the phrase "[https://ja.wiktionary.org/wiki/%E4%B8%80%E5%85%AD%E9%8A%80%E8%A1%8C 一六銀行]" (Ichiroku Ginkō), a colloquial phrase for "pawnshop".
  * Illustrations of "[[Luster Dragon]]" and "[[Haniwa]]" appear in this card's artwork.
