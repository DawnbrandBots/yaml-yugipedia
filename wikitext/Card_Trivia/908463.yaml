title: Card Trivia:The Dragiastar
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Double Star of the Assault!!]]''.
  * This monster is [[The]] [[Counterpart]] to "[[Hyperstrike Dragon Dragiastar F]]".
  * This is the [[signature card]] of [[The☆Luug (manga)|The☆Luug]] in the ''[[Yu-Gi-Oh! GO RUSH!! (manga)|Yu-Gi-Oh! GO RUSH!!]]'' manga.
  * This is the first [[Fusion Monster]] to be [[Fusion Summon]]ed, as well as the first monster [[Special Summoned]] from the [[Extra Deck]], in the ''Yu-Gi-Oh! GO RUSH!!'' manga.
