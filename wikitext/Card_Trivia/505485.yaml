title: Card Trivia:Strike Ninja
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Barrier Ninjitsu Art of Transcription]]" and "[[Fuhma Shuriken]]".
  * This monster is a [[retrained]] counterpart of "[[Ansatsu]]".
  * This monster has a "[[Dragon Ninja]]" counterpart: "[[Black Dragon Ninja]]".
  ** Coincidentally, "Black Dragon Ninja" can be [[Special Summon]]ed using this monster and "[[Ninjitsu Art of Transformation]]".
  * In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, this monster was created as a ''[[Dungeon Dice Monsters]]'' piece, and was exclusive to that game before it was released as a card in the ''[[OCG]]''/''[[TCG]]''.
  ** In the ''Yu-Gi-Oh!'' manga, this monster's [[original ATK and DEF]] is 350/220. In the anime version of this card, this monster's original [[ATK]] and [[DEF]] is 2350/2200.
  ** This monster's [[Quick Effect]] to [[banish]] two [[DARK]] monsters from the [[Graveyard]] and banish itself until the [[End Phase]] references its ''Dungeon Dice Monsters'' effect, which requires the player to remove three [[Magic Crest]]s to make itself invisible.
  * This monster and "[[Ninja Grandmaster Sasuke]]" have a closer resemblance to Japanese ''[[wikipedia:Tokusatsu|tokusatsu]]'' heroes than traditional [[wikipedia:Ninja|ninjas]].
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|140|ref}}, specifically from the panel showing [[Black Ninja|this monster]] moving towards [[Ryuji Otogi (manga)|Ryuji Otogi's]] "[[Monster Lord]]".
