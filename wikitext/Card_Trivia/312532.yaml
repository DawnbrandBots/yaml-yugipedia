title: Card Trivia:Shurit, Strategist of the Nekroz
wikitext: |-
  {{Navigation}}

  * This monster appears to be the child of "[[Gishki Avance]]" and "[[Gishki Emilia]]"; this monster's hair is a layered combination of the white and red hair of "Avance" and "Emilia", respectively. He also has one blue eye (like "Avance") and one red eye (like "Emilia").
  ** This makes sense, as "Avance" and "Emilia" were last seen in the conclusion of the ''[[Duel Terminal]]'' storyline (seen in "[[Sacred Serpent's Wake]]"), looking off into the distance together as the last survivors of the war. The duo are also featured on several other "[[Nekroz]]" cards, implying that the archetype represents the pair's new family after some time has passed.
  ** Similar to how the hilt of his father's sword resembles a "[[Gishki Aquamirror]]", the hilt of this monster's sword appears to be a "[[Nekroz Mirror]]".
  * "[[Nekroz of Brionac]]", "[[Nekroz of Trishula]]", and "[[Nekroz of Areadbhair]]" appear to be older versions of this monster. Their swords have similar designs and both bear the "Nekroz Mirror", as well as the same layered red and white hair (the helmet of "Brionac" would cover the white bangs of "Shurit"). They all also have the same red-green heterochromia– the same as "Shurit".
  ** This monster also has an enhanced form in "[[Nekroz of Clausolas]]".
  * This monster appears in the artwork of "[[Nekroz Kaleidoscope]]".
  ** Oddly enough, "[[Shurit, Strategist of the Nekroz]]" does not don armor based off "[[Gungnir, Dragon of the Ice Barrier]]" despite what this card may imply. However, his mother, "[[Dance Princess of the Nekroz]]", wields it instead.
