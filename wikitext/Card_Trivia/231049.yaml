title: Card Trivia:Red Duston
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] appears in the artworks of "[[Duston Roller]]", "[[House Duston]]", "[[Magicalized Duston Mop]]", "[[Starduston]]", "[[Ant Barrier]]", "[[Frontline Disturbance]]", "[[Trickstar Live Stage]]", and "[[Two-for-One Team]]".
  ** It is also depicted as an illustration on the bedspread in the artwork of "[[Ojama Pajama]]".
  * The Spanish name of this card uses the English-archetype name instead of its Spanish one ("''Particulines''"). and its color is not in plural ("''Rojo''" instead of "''Rojos''").
