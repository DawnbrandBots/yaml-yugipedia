title: Card Trivia:Doom Ray
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Doom's Ray", is a portmanteau of the words "doom" (reflecting its damaging effect), "doomsday" (a time or event of crisis or great danger), and "ray" (the purple rays of light in its artwork).
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this is a "shadow card" created by [[Primo]], which features special powers that allows it to manifest in the real world.
  ** In this card's case, it can cause an explosion that not only inflicts severe burns to any player that takes damage from its effect, but releases purple souls that swarm the player within the explosion.
