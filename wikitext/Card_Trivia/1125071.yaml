title: Card Trivia:Shipping Error
wikitext: |-
  {{Navigation}}

  * Two "[[Mokey Mokey]]" (with one in its normal state and one in its enraged state) and "[[Scrounging Goblin]]" appear in this card's artwork.
  ** Many boxes depicting "Mokey Mokey" in either of its forms are also shown in this card's artwork, labeled according to their intended contents.
  *** The shipment error referenced by this card's name results in a calm "Mokey Mokey" peeking out of a box with an enraged "Mokey Mokey" label, while an enraged "Mokey Mokey" is emerging from a box with a normal "Mokey Mokey" label. "Scrounging Goblin" is loading up the truck with boxes that have normal "Mokey Mokey" labels, completely unaware of the error. This leads to the events shown in the artwork of "[[Surprise Chain]]".
  *** The scene on this card may be intended as a continuation of the scene on "[[Dark Factory of More Production]]"
