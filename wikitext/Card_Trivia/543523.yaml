title: Card Trivia:Hyper-Rank-Up-Magic Ultimate Force
wikitext: |-
  {{Navigation}}

  * The emblem in this card's artwork closely resembles the [[Emperor's Key]].
  * This card has a [[counterpart]]: "[[Hyper Rank-Up-Magic Utopiforce]]".
  * This is the last "[[Rank-Up-Magic]]" card to be used in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * In the ''[[OCG]]''/''[[TCG]]'', "[[Number 99: Utopic Dragon]]" (the monster this card was used to Summon in the anime) has a Summoning procedure to allow it to be Summoned by discarding a "[[Rank-Up-Magic]]" Spell Card and using a "[[Utopia (archetype)|Utopia]]" monster as [[Xyz Material]], effectively integrating this card's role into its own effect.
  * This card's ''OCG''/''TCG'' effect when [[attach]]ed to a "[[Number 99]]" monster as [[Xyz Material]] that allows the monster to [[destroy]] all of the opponent's monsters is based on the anime effect of "[[Number 99: Utopic Dragon (anime)|Number 99: Utopic Dragon]]". In the ''OCG''/''TCG'', when "Number 99: Utopic Dragon" negates the activation of a monster effect, it only destroys that negated monster; in the anime, it negates the effect and destroys all other monsters on the field.
  ** The activation requirement that the monster effect be activated during the [[Battle Phase]] is based on the usage of "Utopic Dragon's" effect in {{episode|Yu-Gi-Oh! ZEXAL|146|ref}}, with its effect being activated in response to a monster effect activated during the Battle Phase.
