title: Card Trivia:Zefra Providence
wikitext: |-
  {{Navigation}}

  * "[[Great Sorcerer of the Nekroz]]", "[[Dance Princess of the Nekroz]]", "[[Gem-Knight Crystal]]" (with "[[Gem-Knight Lapis]]" on its back), and "[[Gem-Knight Lazuli]]" appear in this card's artwork.
  ** "[[Gem-Knight Pearl]]", "[[Gishki Natalia]]", and "[[Gishki Noellia]]" appear on the other side immersed in light, seemingly taking "Crystal" and "Lapis" to the afterlife.
  * This card's artwork is a reference to "[[Sacred Serpent's Wake]]".
  ** The [[Zefraath|hero]] ([[Evilswarm Kerykeion|or]] [[Constellar Sombre|heroes]]) who have [[Jewels of the Valiant|just]] [[Zefra War|defeated]] their respective [[Sophia, Goddess of Rebirth|Goddess]] of [[Tierra, Source of Destruction|Rebirth]] is shown departing in a weaker form, off into the distance, in the center of the screen.
  ** "[[Gishki Avance]]" and "[[Gishki Emilia]]" are together on the left.
  ** An ally and [[Steelswarm Roach|member]] of the hero's archetype is on the right, partially out of the frame.
