title: Card Trivia:Chaotic Elements
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts an unknown "[[Tistina]]" monster being surrounded by the purple flames emitted by "[[Veidos the Eruption Dragon of Extinction]]". Fittingly, this card's effect is designed to support both the "Tistina" and "[[Ashened]]" [[archetype]]s, as they each consist of [[LIGHT]] [[Aqua]] monsters and [[DARK]] [[Pyro]] monsters, respectively.
  * This card's name reflects its effect to [[support]] LIGHT and DARK monsters (both of which are essential to the [[Chaos (series)|Chaos]] [[series]]) and Aqua and Pyro monsters (both of which are based on the opposing "elements" of [[WATER|water]] and [[FIRE|fire]], respectively).
