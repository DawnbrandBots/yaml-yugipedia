title: Card Trivia:Way Where There's a Will
wikitext: |-
  {{Navigation}}

  * The athletes from the artwork of "[[Backup Team]]" appear in this card's artwork.
  * This card's English name refers to the idiom "[[wiktionary:where there is a will there is a way|where there's a will, there's a way]]".
  * This card's artwork is a reference to ''[[wikipedia:Eyeshield 21|Eyeshield 21]]'', an [[wikipedia:American football|American football]]-themed manga and anime. More specifically, it depicts the point of view from the main protagonist as he finds the opening between the opponent's formation to score a touchdown.
  ** Coincidentally, the anime adaptation of ''Eyeshield 21'' was produced by [[Studio Gallop]], the same studio that produced all ''Yu-Gi-Oh!'' anime from ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' to ''[[Yu-Gi-Oh! VRAINS]]''.
