title: Card Trivia:Flying Red Carp
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Koi|koi]], a domesticated variety of the [[wikipedia:Carp|common carp]] known for their distinctive patterns and their color schemes, which are also famously used as ornamental fish for koi ponds and water gardens.
  ** This monster's name is based on the [[wikipedia:Silver carp|silver carp]], a species of carp that is also sometimes known as the "flying carp", which are known for being strong swimmers that can swim upstream and easily leap out of water and over barriers.
  * This monster's effects are based on the [[wikipedia:Longmen (mythology)|Dragon Gate]] myth in [[wikipedia:Chinese mythology|Chinese mythology]].
  ** This monster's [[Quick Effect]] is based on how many carp attempt to swim upstream against the strong currents and leap over the falls of the [[wikipedia:Yellow River|Yellow River]] and pass through the Dragon Gate in the [[wikipedia:Mount Longmen (Shanxi)|Longmen mountains]]. This is used as an idiom for students to succeed by working hard and persevering, similar to how this monster can succeed against an opponent's strong monster by gaining [[ATK]] via [[discard]]ing multiple [[WATER]] monsters.
  ** This monster's second effect is based on how only a few carp will successfully pass through the Dragon Gate, allowing them to transform into a dragon, similar to how this monster can "transform" itself into a [[Fish]], [[Sea Serpent]], and [[Aqua]] monster after successfully destroying an opponent's monster by battle. Notably, the Japanese name for the Sea Serpent [[Type]] is "Sea Dragon" (海竜, ''Kairyū'').
