title: Card Trivia:Destiny HERO - Captain Tenacious
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[D - Tactics]]".
  * This monster's Japanese name, "Die Hard Guy" references the British army officer [[wikipedia:William Inglis (British Army officer)|Sir William Inglis]], and his historic phrase, "[[wikipedia:Die hard (phrase)|Die hard 57th, Die hard!]]", keeping in relation with the European theme of the "[[Destiny HERO]]" [[archetype]].
  ** This monster's effect to [[Special Summon]] a "[[Destiny HERO]]" monster that was [[destroyed by battle]] during the player's next [[Standby Phase]] references the [[wikipedia:Battle of Albuera|Battle of Albuera]], in which Inglis, as leader of the [[wikipedia:57th (West Middlesex) Regiment of Foot|57th Regiment of Foot]], was wounded by a canister shot, but refused to retire the battle. He encouraged his men to fight on with the chant, "Die hard 57th, Die hard!".
  * This monster's ''[[TCG]]'' name likely references the American comedy rock duo, [[wikipedia:Tenacious D|Tenacious D]].
  ** Fittingly, in the English dubbed version of the ''[[Yu-Gi-Oh! GX]]'' anime, [[The D]]'s actual name is Kyle Jables, whose name is a combination of the band members' names: [[wikipedia:Kyle Gass|Kyle Gass]] and [[wikipedia:Jack Black|Jack Black (nicknamed "Jables")]]. The D is the legal guardian of [[Aster Phoenix]] in ''Yu-Gi-Oh! GX'', who in turn uses [[Destiny Hero - Captain Tenacious (anime)|this card]] in the anime.
