title: Card Trivia:Triple Threat Thunder
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "3K Bolt", references the three characteristics in men starting with the letter "K" that, during the [[wikipedia:Japanese asset price bubble|Bubble era]], were popularly believed to be what women looked for in a man: ''Kōshinchō'' (tall), ''Kōgakureki'' (well-educated), and ''Kōshūnyū'' (high income).
