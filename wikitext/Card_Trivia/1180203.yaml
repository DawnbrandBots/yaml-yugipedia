title: Card Trivia:Frost Tiger
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are based on its appearance in {{chapter|GX|019|ref}}.
  ** This monster's effect to [[add]] "[[Twin Pillars of Ice]]" from the player's [[Deck]] to the [[hand]] is a reference to how [[Alexis Rhodes (manga)|Alexis Rhodes]] used "[[Twin Pillars of Ice (manga)|Twin Pillars of Ice]]" alongside [[Frost Tiger (manga)|this monster]].
  ** This monster's effect to add a [[Level 5]] or higher [[WATER]] [[Spellcaster]] monster references a scene where Alexis [[Tribute]]d this monster and one of the [[Ice Pillar]]s to [[Tribute Summon]] "[[Ice Queen (manga)|Ice Queen]]", a [[Level 8]] WATER Spellcaster monster.
  ** This monster's pose in its ''OCG''/''TCG'' artwork is taken from a panel from the aforementioned chapter of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga where one of the Ice Pillars is sculpted into this monster via the effect of "[[Soul Infusing Sculptor]]" before being Tributed.
