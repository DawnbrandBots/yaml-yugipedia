title: Card Trivia:Fire Phoenix @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located on the gem on this monster's chest.
  * This monster has a "[[Salamangreat]]" counterpart: "[[Salamangreat Raging Phoenix]]".
  * This monster represents the [[FIRE]] [[Ignis]], [[Flame (character)|Flame]].
  ** This monster's FIRE [[Attribute]] and damaging effects reference how certain cards with fire-themed artwork feature [[effect damage|burn damage effects]] such as "[[Hinotama]]", "[[Sparks]]", and "[[Thestalos the Firestorm Monarch]]".
  *** This monster is based on "[[Salamangreat Pyro Phoenix]]", a [[Link Monster]] used by [[Soulburner]] during his Duel against [[Bohman]] to honor the sacrifice Flame made to save Soulburner from [[Windy]] (an act that ended in Flame's demise).
  **** Both monsters are named and designed after the phoenix motif. This monster resembles a cybernetic phoenix, while "Pyro Phoenix" wears armor themed after a phoenix.
  **** Both monsters' [[Link Arrow]]s are positioned at the [[Middle-Left Link Arrow cards|middle-left]], [[Bottom-Center Link Arrow cards|bottom-center]], and [[Middle-Right Link Arrow cards|middle-right]].
  ***** Coincidentally, the position of the Link Arrows of "Fire Phoenix" are the Link Arrows of "[[Paradox Hydradrive Atlas]]" rotated counter-clockwise. "Atlas" was to responsible for the destruction of the [[Cyberse (world)|Cyberse world]] that Flame swore vengeance on, but ultimately failed to do so during its debut Duel.
  **** Both monsters feature a [[Special Summon]]ing effect from the [[Graveyard]], referencing the phoenix's resurrection motif. This monster can revive itself while "Pyro Phoenix" can Special Summon an opponent's Link Monster from their Graveyard.
  ***** Also, this monster's Special Summon effect is a reference to the [[Reincarnation Link Summon]]ing method used exclusively in the "Salamangreat" [[archetype]] used by Soulburner.
  **** Both monsters share an effect inflicting effect damage to the opponent. This monster inflicts damage equal to its own [[ATK]], while "Pyro Phoenix" inflicts damage after an opponent's Link Monster is Special Summoned to their field.
