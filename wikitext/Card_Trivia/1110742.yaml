title: Card Trivia:Heroic Champion - Magnum Excalibur
wikitext: |-
  {{Navigation}}
  [[File:MagnumShield-JP-Anime-ZX-NC-2.jpg|thumb|250px|"[[Heroic Champion - Excalibur (anime)|Heroic Champion - Excalibur]]" [[equip]]ped with "[[Magnum Shield (anime)|Magnum Shield]]".]]
  * "[[Magnum Shield]]" appears in this card's artwork.
  * This monster is a retrained [[counterpart]] of "[[Heroic Champion - Excalibur]]".
  ** This monster's appearance is based on a scene from {{episode|ZEXAL|084|ref}} where "[[Heroic Champion - Excalibur (anime)|Heroic Champion - Excalibur]]" is [[equip]]ped with "[[Magnum Shield (anime)|Magnum Shield]]", increasing its [[ATK]] by its [[DEF]].
  ** This monster's first effect is based on the second effect of "Heroic Challenger - Excalibur" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, which [[detach]]es all [[Xyz Material]] from "Excalibur" when it [[battle]]s to double its ATK until the end of the [[Battle Phase]].

