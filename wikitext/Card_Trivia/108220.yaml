title: Card Trivia:Gadget Hauler
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Semi-trailer truck|semi-trailer truck]], a tractor unit designed to "haul" cargo hitched to the tractor.
  ** This monster is depicted transforming into a cannon, reflecting the transformation theme of the "[[Morphtronic]]" [[archetype]], which this this monster [[support]]s.
