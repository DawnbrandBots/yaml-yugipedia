title: Card Trivia:Akashic Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Arrivalrivals]]", "[[Staring Contest]]", and "[[Get Out!]]".
  * This monster's name is derived from ''[[wikipedia:Akasha|Akasha]]'' (Sanskrit ''ākāśa'', आकाश), which is the Sanskrit word for "aether", "sky" or "atmosphere".
