title: Card Trivia:Earthbound Immortal Ccarayhua
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Roar of the Earthbound Immortal]]".
  ** This monster's [[wikipedia:geoglyph|geoglyph]] appears in the artwork of "[[Reptilianne Recoil]]".
  * This monster is based on the lizard geoglyph of the [[wikipedia:Nazca Lines|Nazca Lines]].
  ** This monster's name is derived from ''qaraywa'', the [[wikipedia:Quechuan languages|Quechua]] word meaning "lizard".
  * This is the only "[[Earthbound Immortal]]" monster that was not destroyed in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * "Earthbound Immortal" monsters often represent their card's owner and their initial ambitions and desires; in this card's case, it represents [[Misty Tredwell]] and her transformation into a [[Dark Signer]] following her younger brother, [[Toby Tredwell]]'s death.
  ** This monster's repulsive appearance represents how Misty, who was adored for her charm and beauty, was given a very wicked appearance when she transformed into a [[Dark Signer]]; this is also reflected in her "[[Reptilianne]]" [[Deck]], which features [[Reptile]] monsters based on evil reptile entities in [[wikipedia:Greek mythology|Greek mythology]].
  ** This monster's destruction effect triggered by being [[destroy]]ed by a card effect references Misty's misguided vengeance on [[Akiza Izinski]], who she believed was responsible for Toby's death, and is thus used as a countermeasure against Akiza's "[[Black Rose Dragon]]" and its destructive effect. However, during Misty and Akiza's final [[Duel]], this monster's effect was never [[activate]]d, as it was never destroyed.
