title: Card Trivia:Bahamut Shark
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Bahamut|Bahamut]], a giant primordial fish in [[wikipedia:Religion in pre-Islamic Arabia|Arabian mythology]] who helps support the Earth and is suspended in water for its stability.
  * This is the [[signature card]] of [[Ryoga Kamishiro (manga)|Ryoga Kamishiro]] in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  * This monster is the manga [[counterpart]] of "[[Number 32: Shark Drake]]".
  ** Both share the same [[Attribute]] ([[WATER]]), [[DEF]] (2100), [[Rank]] (4), and [[Type]] ([[Sea Serpent]]).
  * This is the first card that can [[Summon]] an Xyz Monster from the [[Extra Deck]] without properly [[Xyz Summon]]ing it.
  * This card's artwork is taken from {{chapter|ZEXAL|019|ref}}, specifically from the panel showing [[Bahamut Shark (manga)|this monster]] being Summoned.
