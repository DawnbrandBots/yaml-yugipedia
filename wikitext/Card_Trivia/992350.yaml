title: Card Trivia:Original Sinful Spoils - Snake-Eye
wikitext: |-
  {{Navigation}}

  * "[[Diabellstar the Black Witch]]" and "[[Sinful Spoils of Subversion - Snake-Eye]]" atop "[[Snake-Eyes Flamberge Dragon]]" appear in this card's artwork.
  ** According to [[The Valuable Book EX 4 card storylines#No. 15: The Hidden Sinful Spoils|''The Valuable Book EX 4'' card storylines]], this card's artwork depicts "[[Snake-Eyes Poplar]]" emerging from the "Snake-Eye" after the defeat of "Snake-Eyes Flamberge Dragon".
