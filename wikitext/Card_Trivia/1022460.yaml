title: Card Trivia:Darkness Doom Giant
wikitext: |-
  {{Navigation}}

  * This monster's name is based on a [[wikipedia:Giant star|giant star]], a star of relatively large size and high luminosity.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Darkness Dwarf]]".
  * This monster has a [[Praime]] [[counterpart]]: "[[Praime Pierce Giant]]".
