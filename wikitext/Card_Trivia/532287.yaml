title: Card Trivia:Desmanian Devil
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on the [[wikipedia:Tasmanian devil|Tasmanian devil]].
  * This monster is part of a trend of [[Beast]] monsters based on marsupials whose name start with the word "Des", the others being "[[Des Kangaroo]]", "[[Des Koala]]", and "[[Des Wombat]]".
