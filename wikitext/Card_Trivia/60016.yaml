title: Card Trivia:The Immortal Bushi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Immortal Bushi Mourns the Mortal Body]]".
  * "Bushi" is a Japanese term used to refer to a Japanese historical warrior, synonymous with "[[wikipedia:samurai|samurai]]" in modern usage.
  ** This monster's Japanese name (ふしぶし, ''Fushibushi'') is a rhyming scheme of the words for "immortal" (ふし, ''fushi'') and "warrior" (ぶし, ''bushi''). It is also a pun on 「節々」(''fushibushi''), the Japanese word for "joints"; this is supported by the Japanese name of "The Immortal Bushi Mourns the Mortal Body", "Mourning of the Immortal Warrior" ({{Ruby|不|ふ}}{{Ruby|死|し}}{{Ruby|武|ぶ}}{{Ruby|士|し}}の{{Ruby|悼|いた}}み, ''fushibushi no itami''), which is a pun on 「{{Ruby|節々|ふしぶし}}の{{Ruby|痛|いた}}み」(''fushibushi no itami''), the Japanese term for "joint pain".
