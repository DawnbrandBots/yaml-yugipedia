title: Card Trivia:Morphtronic Boomboxen
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Demon Roar God Revival!!]]''.
  * This monster appears in the artworks of "[[Morphtronic Impact Return]]", "[[Morphtronic Map]]" (in its object form), and "[[Remake Puzzle]]".
  * This monster is based on a radio cassette player, as indicated by its appearance and Japanese name.
  * Like the other "[[Morphtronic]]" monsters, "Boomboxen" resembles a Transformer - in this case, [[wikia:w:c:transformers:Blaster (G1)|Blaster]].
  * Although this card can attack twice per turn, [[Leo]] never utilized or mentioned this effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
