title: Card Trivia:Scrap Recycler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Iron Call]]" and "[[Scrap Factory]]".
  * The forearm of "[[Machina Soldier]]" and the sidewheels of "[[Machina Peacekeeper]]" appear as part of this monster's design.
  ** Fittingly, this monster debuted in ''[[Structure Deck: Machiners Command]]''/''[[Machina Mayhem Structure Deck]]'', which is themed after the "[[Machina]]" [[archetype]] and also contains "Soldier" and "Peacekeeper".
  * Despite being a member of the "[[Scrap]]" archetype, this monster does not look similar to any of the other members of the archetype, due to it bring released before such an archetype had been visualized.
