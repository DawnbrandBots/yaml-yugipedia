title: Card Trivia:Burning Sonic
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card could possibly be a reference to the Japanese [[Attack and effect names in Yu-Gi-Oh! 5D's|Attack names]] of two of [[Yusei Fudo]] and [[Jack Atlas]]' [[Signature card|Ace monsters]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime. The '''Shooting Sonic''' of "[[Stardust Dragon (anime)|Stardust Dragon]]" and the '''Burning Soul''' of "[[Red Nova Dragon (anime)|Red Nova Dragon]]".
