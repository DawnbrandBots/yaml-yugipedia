title: Card Trivia:Naturia Rosewhip
wikitext: |-
  {{Navigation}}

  * "[[Naturia Dragonfly]]" and "[[Naturia Rock]]" appear in this card's artwork.
  * This monster's name appears to be a pun on "[[wikipedia:Rose hip|rose hip]]" (an accessory fruit from the different of the various species of [[wikipedia:Rose|rose]] plant), as well its design as an anthropomorphic rose plant using its thorny vines as whips.
