title: Card Trivia:Flash Effect
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Dark Ruler Ha Des]]" and "[[Terrorking Archfiend]]" appear in this card's artwork.
  ** This is one of the few cards depicting "Dark Ruler Ha Des" in its artwork that was not censored in the international versions to remove its horns; other cards include "[[Leading Question]]", "[[Mind Trust]]", and "[[Victim Barrier]]".
