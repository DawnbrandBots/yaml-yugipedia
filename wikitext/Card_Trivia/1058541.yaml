title: Card Trivia:LeVirtue Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Virtue Stream]]".
  * This monster is a non-"[[Number]]" [[retrained]] counterpart of "[[Number 17: Leviathan Dragon]]".
  ** This monster's name is a portmanteau of the words "[[Wikipedia:Leviathan|Leviathan]]" and "virtue", where the latter is defined as the quality of doing what is right and avoiding what is wrong.
  *** Fittingly, the Japanese name for "Leviathan Dragon", "Levice Dragon", is a portmanteau of the words "Leviathan" and "vice", which is defined as the quality of doing what is wrong, the opposite of "virtue". This is further reinforced by this monster's effect to [[search]] for "Virtue Stream", whose name is the opposite of the Japanese [[Attack and effect names in Yu-Gi-Oh! ZEXAL|attack name]] of "[[Number 17: Leviathan Dragon (anime)|Number 17: Leviathan Dragon]]": "Vice Stream".
  * When this card's text was initially revealed on the [https://web.archive.org/web/20240514033132/https://yu-gi-oh.jp/news_detail.php?page=details&id=1930 YU-GI-OH.jp website], the text stated that [[detach]]ing an [[Xyz Material]] for its first bulleted effect was a cost, rather than part of the effect. The text was corrected the next day, with the [https://x.com/yu_gi_oh_jp/status/1790662768015917207 YU-GI-OH.jp X account] stating that several cards in the article initially had incorrect effects listed.
