title: Card Trivia:D/D Orthros
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Orthrus|Orthros]]. In [[wikipedia:Greek mythology|Greek mythology]], Orthros was a two-headed [[wikipedia:dog|dog]] who guarded [[wikipedia:Geryon|Geryon]]'s cattle and was killed by [[wikipedia:Heracles|Heracles]]. He was the offspring of the monsters [[wikipedia:Echidna (mythology)|Echidna]] and [[wikipedia:Typhon|Typhon]], and the brother of [[wikipedia:Cerberus|Cerberus]].
  ** Fittingly, this card shares the same [[Level]], [[Attribute]] and [[Type]] as "[[D/D Cerberus]]", while its [[ATK]] and [[DEF]] are reversed.
  * This card shares its name with "[[Scrap Orthros]]". Both monsters happen to be Level 4 [[Tuner monster]]s.
