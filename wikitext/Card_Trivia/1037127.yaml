title: Card Trivia:Spell Proof Armor
wikitext: |-
  {{Navigation}}

  * This card's name and first bulleted effect are based on a scene [[Joey Wheeler and Bandit Keith's Duel]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime where [[Bandit Keith]] explains that his [[Machine]] monsters are outfitted with armor that protects them from being [[destroy]]ed by magical and non-physical attacks.
