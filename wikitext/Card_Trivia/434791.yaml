title: Card Trivia:Odd-Eyes Mirage Dragon
wikitext: |-
  {{Navigation}}

  * This monster's head resembles that of "[[Dark Rebellion Xyz Dragon]]", the signature card of [[Yuto (manga)|Yuto]], one of [[Yuya Sakaki (manga)|Yuya Sakaki's]] alternate persona.
  * This monster shares the same [[Attribute]] ([[DARK]]), [[Level]] (3), [[original ATK and DEF]] (1200/600) and  [[Pendulum Scale]] (8) with "[[Timegazer Magician]]".
  ** Fittingly, this monster, along with "[[Odd-Eyes Persona Dragon]]", are the first two [[Pendulum Monster]]s to be used by [[Yuya Sakaki]] in his anime and manga incarnations.
  * The colors of the three "[[Odd-Eyes]]" [[Dragon]] monsters that debuted in the manga represent the three colors the [[wikipedia:human eye|human eye]] perceives light: Red for "Odd-Eyes Persona Dragon", blue for "[[Odd-Eyes Phantom Dragon]]", and green for this monster.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|003|ref}}, specifically from the panel showing [[Odd-Eyes Mirage Dragon (manga)|this monster]] manifesting via the effect of "[[Odd-Eyes Phantom Dragon (manga)|Odd-Eyes Phantom Dragon]]", albeit mirrored.
