title: Card Trivia:The True Sun God
wikitext: |-
  {{Navigation}}

  [[File:The True Sun God.png|thumb|right|250px|"[[The Sun Dragon Ra]]" transforming into its [[God Phoenix (manga)|God Phoenix]] form.]]

  * "[[The Winged Dragon of Ra]]" (transforming into "[[The Winged Dragon of Ra - Immortal Phoenix]]") appears in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|248|ref}} showing "[[The Sun Dragon Ra]]" transforming into its "[[God Phoenix (manga)|God Phoenix]]" form.
  *** This card's effect to prevents monsters (except "Ra") from attacking during the same turn they are [[Special Summon]]ed references the [[Battle City Rules|Super Expert Rules]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga where monsters Special Summoned from the [[Graveyard]] could not declare an attack during the same turn, with "Ra" being the only monster [[Instant Attack|capable of doing so]].
  * This card has [[counterpart]]s for the other [[Egyptian God]] cards:
  ** "[[Obelisk the Tormentor]]": "[[The Breaking Ruin God]]"
  ** "[[Slifer the Sky Dragon]]": "[[The Revived Sky God]]"

