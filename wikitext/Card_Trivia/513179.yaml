title: Card Trivia:Elemental HERO Steam Healer
wikitext: |-
  {{Navigation}}

  * This monster is the [[cover card]] for ''[[Duelist Pack: Jaden Yuki]]''.
  * This monster's [[Fusion Material]]s is a reference to the two elements that make up steam: [[WATER]] and [[FIRE]] (representing the intense heat that vaporizes water into steam).
  * This card's effect is a reference to how steam can be used for health benefits.
  * This card's effect is the exact opposite to "[[Elemental HERO Flame Wingman]]":
  ** Both cards are "[[Elemental HERO]]" Fusion Monsters that require "Elemental HERO Burstinatrix" as Fusion Material.
  ** Both monsters are used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
