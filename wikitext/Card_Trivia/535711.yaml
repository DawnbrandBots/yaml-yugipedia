title: Card Trivia:The Agent of Wisdom - Mercury
wikitext: |-
  {{Navigation}}

  * This monster is based on the planet [[wikipedia:Mercury (planet)|Mercury]], which appears in the background of this card's artwork.
  ** The background of this card's artwork also features the [[wikipedia:Sun|Sun]], which the planet Mercury is closest to in the [[wikipedia:Solar System|Solar System]].
  ** This monster may also be based on [[wikipedia:Mercury (mythology)|Mercury]], the messenger of the Roman gods, which serves as the namesake of the planet.
  * This monster's pose (including its wings and outstretched arm) in this card's artwork is the exact same as that of "[[The Agent of Force - Mars]]", except mirrored.
