title: Card Trivia:Timegazer Magician
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of the ''[[Space-Time Showdown Power Box]]'', and is also one of the cover cards of ''[[Super Starter: Space-Time Showdown]]'' and ''[[Star Pack ARC-V]]''.
  * This monster appears in the artworks of "[[Amazing Pendulum]]", "[[Pendulum Back]]", "[[Pendulum Storm]]", "[[Pendulum Switch]]", and "[[Soul Pendulum]]".
  ** Additionally, the arced blade-like frame on this monster's arm appears in the artwork of "[[Pendulum Impenetrable]]".
  * This card appears in the artwork of "[[Pendulum Begins]]".
  * This monster has a counterpart: "[[Stargazer Magician]]".
  ** This card represents the concept of [[wikipedia:time|time]], while "Stargazer Magician" represents the concept of [[wikipedia:space|space]].
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form: "[[Enlightenment Paladin]]".
  ** This is supported by the same arced blade-like frames on their bodies, the similar clock symbols in the background of their artworks, and their similar hairstyles.
  ** Additionally, "[[Timebreaker Magician]]" also appear to be related to this monster, due to their similar names, and their similar effects (this card's Monster Effect and the [[Pendulum Effect]] of "Timebreaker Magician").
  * This monster has three combined forms with "Stargazer Magician".
  ** "[[Astrograph Sorcerer]]" (referencing "Stargazer Magician")
  ** "[[Chronograph Sorcerer]]" (referencing this card)
  ** "[[Timestar Magician]]" (referencing both "Stargazer Magician" and this card, even though it resembles "Stargazer Magician" more)
  * Despite [[Yuya Sakaki]]'s copies of [[Timegazer Magician (anime)|this card]] and "[[Stargazer Magician (anime)|Stargazer Magician]]" being of [[Rare]] rarity in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, such rarity of these cards has not been released in the ''[[OCG]]''/''[[TCG]]''.
