title: Card Trivia:Favorite Contact
wikitext: |-
  {{Navigation}}

  * "[[Elemental HERO Neos]]" and "[[Elemental HERO Shining Flare Wingman]]" appear in this card's artwork.
  ** This card's artwork likely depicts the [[Fusion Summon]] of "[[Elemental HERO Shining Neos Wingman]]".
  * This card's name is a combination of both [[Contact Fusion]] and "favorite hero", which [[Jaden Yuki]] often called "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" in the ''[[Yu-Gi-Oh! GX]]'' anime.
