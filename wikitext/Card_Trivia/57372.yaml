title: Card Trivia:Magical Citadel of Endymion
wikitext: |-
  {{Navigation}}

  * This citadel appears in the artworks of "[[Fusion Recycling Plant]]" and "[[Mythical Institution]]".
  * The "[[Endymion]]" cards are named after the Greek mythological figure of [[wikipedia:Endymion (mythology)|Endymion]], who was beloved by the moon goddess Selene and put to sleep forever.
  * This citadel has a striking similarities to the town of Geffen in the online RPG game ''Ragnarok Online''. Both have a circular perimeter, a tall tower in the center, Victorian architecture buildings, and both are a town of spellcasters (mages and wizards in ''Ragnarok'').
