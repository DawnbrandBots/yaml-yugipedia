title: Card Trivia:Shooting Star Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Starstrike Blast]]'', as well as one of the cover cards of ''[[Collectible Tins 2010 Wave 2]]''.
  ** In the ''[[TCG]]'', this card and "Red Nova Dragon" were released before their corresponding [[Core Booster]]s, in ''Collectible Tins 2010 Wave 2''.
  * This monster appears in the artworks of "[[Red Dragon Archfiend's Chain]]" and "[[T.G. Close]]".
  * This monster is named after a shooting star, the term used for a [[wikipedia:Meteor|meteor]], a small chunk of debris from outer space which burns up upon entering the [[wikipedia:Earth|Earth's]] atmosphere, causing it to appear to be a streak of light in the sky.
  ** This monster's effect to attack multiple times is also a reference to [[wikipedia:Meteor shower|meteor showers]], a cosmic event where multiple meteors can be observed from the night sky.
  * This monster is an [[Card evolutions|upgraded]] [[Accel Synchro Monster|Accel Synchro]] form of "[[Stardust Dragon]]".
  * This monster has multiple forms:
  ** A younger [[Tuner Synchro Monster|Tuner Synchro]] form: "[[Shooting Riser Dragon]]".
  ** A [[Duel Dragon]] [[Yu-Gi-Oh! 5D's (manga)|manga]] [[counterpart]]: "[[Stardust Chronicle Spark Dragon]]".
  ** A "[[T.G.]]" counterpart: "[[Shooting Star Dragon T.G. EX]]".
  ** Three upgraded forms:
  *** "[[Majestic]]": "[[Shooting Majestic Star Dragon]]".
  *** [[Delta Accel Synchro Monster|Delta Accel Synchro]]: "[[Cosmic Blazar Dragon]]".
  *** [[Limit Over Accel Synchro Monster|Limit Over Accel Synchro]]: "[[Shooting Quasar Dragon]]".
  * This monster is the rival counterpart of "[[Red Nova Dragon]]".
  ** Both are the upgraded forms of the [[signature card#Yu-Gi-Oh! 5D's anime|ace monsters]] of the main rivals of the ''[[Yu-Gi-Oh! 5D's]]'' anime ([[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]" for this monster and [[Jack Atlas]]'s "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" for "[[Red Nova Dragon (anime)|Red Nova Dragon]]").
  ** Both are Summoned via an upgraded [[Synchro Summon]]ing mechanic introduced in the ''Yu-Gi-Oh! 5D's'' anime: this monster was Summoned via [[Accel Synchro Summon]], while "Red Nova Dragon" was Summoned via [[Double Tuning]].
  ** Both were obtained by the main rivals of the ''Yu-Gi-Oh! 5D's'' anime, who received them upon encountering two different antagonists who originated from opposite time periods: This monster was given to Yusei by a futuristic god ([[Z-one]]), while "Red Nova Dragon" was created by Jack by sealing an ancient deity ([[Red Nova]]).
  *** Yusei obtained this monster while he was in a [[Clear Mind]] state, whereas "Red Nova Dragon" was acquired by Jack when he proved that he had a [[Blazing Soul]]. Both Yusei and Jack also said that the states of Clear Mind and Blazing Soul are opposite concepts and weapons to defeat [[Iliaster]] in {{episode|5D's|113|ref}}.
  *** Yusei obtained this monster during a [[Turbo Duel]], while Jack obtained "Red Nova Dragon" during a Ground Duel.
  ** This monster can attack multiple times based on the number of [[Tuner monster]]s [[excavate]]d from the [[Deck]] (representing the future), while "Red Nova Dragon" gains [[ATK]] based on the number of Tuner monsters in the [[Graveyard]] (representing the past).
  ** Both have a [[Quick Effect]] to [[banish]] themselves from the [[field]] to [[negate]] an attack and [[Special Summon]] themselves during the [[End Phase]].
  ** Both monsters have mirrored poses in their respective card artworks.
  * This is the first Accel Synchro Monster to be released in the ''[[OCG]]''/''[[TCG]]''.
  * In ''[[Yu-Gi-Oh! Duel Links]]'', when [[Yusei Fudo (Duel Links)|Yusei Fudo]] Synchro Summons this monster, there is a Summoning cutscene where the [[Mark of the Dragon|Marks of the Dragon]] appear before the [[Crimson Dragon]]'s seal briefly flashes on screen. This is a reference to a scene from {{episode|5D's|109|ref}}, where Yusei first Summoned this monster during his Duel against [[Primo]].
