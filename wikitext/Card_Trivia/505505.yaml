title: Card Trivia:Helios Trice Megistus
wikitext: |-
  {{Navigation}}

  * This is the third of the three "[[Helios]]" monsters ("[[Helios - The Primordial Sun]]" > "[[Helios Duo Megistus]]" > '''"Helios Trice Megistus"''').
  ** "Megistus" is derived from the Greek word "''megisti''", which means "biggest" or "greatest", reflecting how this monster is larger in appearance compared to "The Primordial Sun" and "Duo Megistus".
  ** This monster's name is a play on "[[Wikipedia:Hermes Trismegistus|Hermes Trismegistus]]", who is said to be the author of the [[wikipedia:Emerald Tablet|Emerald Tablet]], an ancient alchemical text, which also serves as the inspiration for [[Lyman Banner|Amnael's]] [[Shadow Charm]].
  *** Like "Duo Megistus", this monster's name is also a pun on ''Helios Megistos'', the term used for the theological concept in Ancient Greek literature and philosophy, which claims that all of the elements were ruled by [[Wikipedia:Helios|Helios]], the god of the Sun in [[Wikipedia:Greek mythology|Greek mythology]].
  * This is the only "Helios" monster not to have its bustline edited for its ''[[TCG]]'' release.
