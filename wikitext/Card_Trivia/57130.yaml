title: Card Trivia:Gungnir, Dragon of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Champion of Chaos!!]]'', ''[[Structure Deck: Ice Barrier of the Frozen Prison]]''/''[[Structure Deck: Freezing Chains]]'', and ''[[Structure Deck: Ice Barrier of the Frozen Prison Melting Destiny Pack]]''.
  ** This is the only "[[Ice Barrier]]" [[Synchro Monster]] that is not a cover card for a ''[[Hidden Arsenal]]'' pack, and the only one to not be on the [[Forbidden]] [[Semi-Limited|and]] [[Limited]] list since it was released.
  ** This is also the only "Dragon of the Ice Barrier" monster not to be placed on the Forbidden list as of [[March 2013 Lists|March 1, 2013]].
  * This monster appears in the artworks of "[[Dragunity Glow]]", "[[Dragunity Oubliette]]", "[[Nekroz Kaleidoscope]]", "[[Synchro Baton]]", and "[[Void Trap Hole]]".
  * This monster's name is derived from [[wikipedia:Gungnir|Gungnir]], the spear wielded by [[wikipedia:Odin|Odin]] in [[wikipedia:Norse mythology|Norse mythology]].
  ** This monster's Chinese name, "天槍", literally translates to "Heavenly Spear".
  ** Fittingly, in ''[[Yu-Gi-Oh! 5D's Duel Transer]]'', the game's true antagonist [[Odin]] uses this monster in his [[Deck]] while Dueling him in [[Yggdrasil]] 4F.
  * This monster has an "[[lswarm]]" [[counterpart]]: "[[Evilswarm Ophion]]".
  * This monster has a "[[Nekroz]]" counterpart: "[[Nekroz of Gungnir]]".
  ** This is the only "Dragon of the Ice Barrier" monster that "[[Shurit, Strategist of the Nekroz]]" does not have a "Nekroz" [[Ritual Monster|Ritual]] counterpart based off of.
  * In the French release of ''[[Hidden Arsenal 3]]'', this card featured a major translation error, as its effect text states, "you can [[discard]] up to two cards to the [[Graveyard]] to [[select]] a number of cards equal to '''the number of cards your opponent controls'''." instead of "you can discard up to 2 cards to the Graveyard to select '''the same number of cards your opponent controls'''." This error has since been fixed in the French release of ''[[Hidden Arsenal 5: Steelswarm Invasion: Special Edition]]''.
