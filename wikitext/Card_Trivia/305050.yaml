title: Card Trivia:Gwenhwyfar, Queen of Noble Arms
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Guinevere|Guinevere]], the legendary Queen consort of [[wikipedia:King Arthur|King Arthur]].
  ** The fact that this card can equip onto [[DARK]] "[[Noble Knight]]s" may be a reference to Guinevere's affair with [[wikipedia:Lancelot|Lancelot]], as it means that "Gwenhwyfar" can be equipped to "[[Ignoble Knight of Black Laundsallyn]]".
  * "[[Noble Arms - Excaliburn]]" appears in this card's artwork.
  * This monster appears in the artworks of "[[Avalon]]" and "[[Heritage of the Chalice]]".
  * This is the first "[[Noble Arms]]" card that is a monster instead of an [[Equip Spell Card]] (although it can turn into an Equip Spell Card by its effect).
  * In the Konami article "[https://yugiohblog.konami.com/articles/?p=5800 A Very Noble New Year]", certain aspects of this card were given a backstory.
  ** The 300 [[ATK]] boost was described as, "She provides a 300 ATK boost in morale."
  ** The "Noble Knight" targeting requirement was described as, "And she equips to Noble Knights only, much like Noble Arms - Excaliburn, recognizing their worth and deeds even if they’re transformed into [[Zombie]]s or [[Beast-Warrior]]s".
  ** Her [[LIGHT]]-based effect was described as, "She can shield LIGHT Knights from deadly [[Spell Card|Spells]], [[Trap Card|Traps]], and [[monster effect]]s".
  ** Her DARK-based effect was described as, "[She can] sneakily assassinate the enemies of DARK Knights".
