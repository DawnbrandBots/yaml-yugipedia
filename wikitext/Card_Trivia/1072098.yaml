title: Card Trivia:Abyss-sting Triaina
wikitext: |-
  {{Navigation}}

  * "[[Neptabyss, the Atlantean Prince]]" appears in this card's artwork.
  * This trident appears in the artworks of "[[Abysstrite, the Atlantean Spirit]]", "[[Mermail Abyssalacia]]", "[[Mermail Abyssgaios]]", "[[Mermail Abysstrite]]", "Neptabyss, the Atlantean Prince", and "[[Mermail King - Neptabyss]]".
  ** Fittingly, the trident is a symbol associated with the Greek sea god [[wikipedia:Poseidon|Poseidon]] ("Abyssgaios") and his Roman counterpart, [[wikipedia:Neptune (mythology)|Neptune]] ("Neptabyss").
  ** The design of this trident is based on the three-pronged tail of "[[Poseidra, the Atlantean Dragon]]".
  * This card's name is based on ''tríaina'' (τρῐ́αινᾰ), the Greek word for "trident".
