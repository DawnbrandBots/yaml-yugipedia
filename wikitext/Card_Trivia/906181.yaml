title: Card Trivia:Max Raider
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Advance Block]]", "[[Battle Demotion]]", "[[Delight of the Mighty]]", "[[Dragonic Disorder]]", "[[Revenge MAX]]", "[[Tribute Ban]]", "[[Tribute Lock]]", and "[[Trick Guard]]".
  * This monster is the upgraded ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart of "[[Axe Raider]]", as indicated by their [[flavor text]], design, and usage of axes.
