  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * This monster is named after a [[wikipedia:Delta wing|delta wing]], the wing on an aircraft shaped in the form of a triangle, which is also named after its resemblance with the Greek uppercase letter "delta" (Δ).
