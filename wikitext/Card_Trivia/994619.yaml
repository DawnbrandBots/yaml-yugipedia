title: Card Trivia:Tao the Chanter
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Tao|tao]], the concept of the natural way of the universe in Eastern Asian philosophy and religion, which is usually symbolized by [[wikipedia:Ying and yang|yin and yang]], the interaction and balance of two opposing yet interconnected forces, whereas the symbols themselves appear as part of this monster's design.
  * This monster has a [[retrained]] [[Illusion]] counterpart: "[[Master Tao the Chanter]]".
