title: Card Trivia:Reptilianne Naga
wikitext: |-
  {{Navigation}}

  * The "Naga" in this card's name is derived from the [[wikipedia:Nāga|nāga]], a race of half-human half-snake creatures from Hindu mythology.
  ** The "Naja" in this card's Japanese name, "Reptiless Naja", is derived from ''[[wikipedia:Naja|Naja]]'', a genus of venomous elapid snakes known as cobras, reflected in this monster's appearance.
