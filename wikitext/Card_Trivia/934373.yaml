title: Card Trivia:Seventh Force
wikitext: |-
  {{Navigation}}

  * "[[Number 105: Battlin' Boxer Star Cestus]]", a Barian [[Sphere Field]], and the arm of [[Alito]] in his [[Barian Battlemorph]] form (holding what appears to be "[[Rank-Up-Magic Barian's Force]]") appear in this card's artwork.
  ** This card's artwork is based on a scene from {{Episode|ZEXAL|086|ref}} where Alito uses "[[Rank-Up-Magic Barian's Force (anime)|Rank-Up-Magic Barian's Force]]" to [[Rank Up]] "[[Number 105: Battlin' Boxer Star Cestus (anime)|Number 105: Battlin' Boxer Star Cestus]]" and [[Xyz Summon]] "[[Number C105: Battlin' Boxer Comet Cestus (anime)|Number C105: Battlin' Boxer Comet Cestus]]" for the first time.

