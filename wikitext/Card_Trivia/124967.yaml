title: Card Trivia:Draw Paradox
wikitext: |-
  {{Navigation|mode=nonGame}}

  * An [[Obelisk Blue]] student appears in this card's artwork.
  * This card is based on a [[Wikipedia:Paradox|paradox]], a logically self-contradictory statement or a statement that runs contrary to one's expectation. This reflects this card's effect to allow the turn player's opponent to [[draw a card]] during the turn player's [[Draw Phase]].
