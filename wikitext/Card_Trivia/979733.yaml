title: Card Trivia:Imsety, Glory of Horus
wikitext: |-
  {{Navigation}}

  * A carving of this monster appears in the artwork of "[[Walls of the Imperial Tomb]]".
  * This monster is named after a [[wikipedia:Four sons of Horus|Imsety]], one of the four sons of [[wikipedia:Horus|Horus]] depicted with the head of a human, who represents the [[wikipedia:Canopic jar|canopic jar]] of the liver in [[wikipedia:Egyptian mythology|Egyptian mythology]].
  ** Fittingly, this monster shares its [[original ATK and DEF]] (3000/1800) with "[[Horus the Black Flame Dragon LV8]]" and its [[retrain]]ed counterpart, "[[Horus the Black Flame Deity]]", both of which are based on Horus.
