title: Card Trivia:Fossil Dragon Skullgar
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name references the [[wikipedia:Cenozoic|Cenozoic Era]], the third and most recent geological period in Earth's history. This era is also known as the "Era of Mammals" for the enormous proliferation of mammalian life on earth– including humankind. This era is so recent it has only been subdivided into three periods; [[wikipedia:Neogene|the Neogene]], [[wikipedia:Paleogene|Paleogene]], and [[wikipedia:Quaternary|the current age- the Quaternary Period]].
