title: Card Trivia:Therion "Bull" Ain
wikitext: |-
  {{Navigation}}

  * This monster's weapons appear in the artwork of "[[Therion Charge]]".
  * This monster is named after Ain, the formal name of [[wikipedia:Epsilon Tauri|Epsilon Tauri]], a star in the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Taurus (constellation)|Taurus]].
  ** This monster's design features bull-like horns on its helmet and a tail, referencing how Taurus is also known as the "bull" constellation.
  ** This monster's name is also a pun on the words "bullseye" and "ainrad", the German word for "unicycle", which make up this monster's lower half.
