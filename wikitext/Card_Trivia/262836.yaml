title: Card Trivia:Job-Change Mirror
wikitext: |-
  {{Navigation}}

  * This monster has a ''[[Rush Duel]]'' counterpart: "[[Class-Change Mirror]]".
  * In ''[[Yu-Gi-Oh! Forbidden Memories]]'' and ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', fusing this monster with "[[Time Wizard]]" or any [[Fiend]] with 2500 [[ATK]] or less will create "[[Summoned Skull]]". The exception is "[[Fungi of the Musk]]", which fuses with this monster to create "[[Darkworld Thorns]]".
