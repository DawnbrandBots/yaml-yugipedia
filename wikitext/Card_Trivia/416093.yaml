title: Card Trivia:Skydive Scorcher
wikitext: |-
  {{Navigation}}

  [[File:Flame_Wingman_atop_Skyscraper.png|thumb|right|250|"[[Elemental Hero Flame Wingman (anime)|Elemental HERO Flame Wingman]]" atop "[[Skyscraper (anime)|Skyscraper]]".]]

  * "[[Elemental HERO Flame Wingman]]" and "[[Skyscraper]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|GX|001|ref}} where "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" is depicted standing on the needle of the tallest building of "[[Skyscraper (anime)|Skyscraper]]" after [[Jaden Yuki]] activated the latter.
  ** This card shares its name with the [[Attack and effect names in Yu-Gi-Oh! GX|signature attack]] of "Flame Wingman" while affected by "Skyscraper" in the ''[[Yu-Gi-Oh! GX]]'' anime.

