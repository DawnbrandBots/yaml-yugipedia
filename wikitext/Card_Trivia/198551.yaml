title: Card Trivia:Darkness 1
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's artwork depicts a certain point of view of the [[World of Darkness]].
  ** This, along with this card's relationship with "[[Darkness]]", "[[Zero]]", "[[Infinity (card)|Infinity]]", and the other "[[Darkness (archetype)|Darkness]]" [[Continuous Trap Card]]s is based on how [[Yusuke Fujiwara]] (while possessed by [[Nightshroud]]) described the World of Darkness as both "zero" and an "infinite world" in {{episode|GX|175|ref}}.
