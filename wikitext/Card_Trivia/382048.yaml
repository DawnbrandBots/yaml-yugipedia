title: Card Trivia:Dragong
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Pendulum Hole]]" and "[[Pendulum Treasure]]".
  ** It also appears in the artwork of "[[Uradora of Fate]]", which is fitting, as its Japanese name is translated as "Dora Dragon".
  * This card has a [[counterpart]]: "[[Mandragon]]".
  * This monster's name and appearance are a combination of a dragon and a [[wikipedia:Gong|gong]], the latter being reflected by this card's [[Machine]] [[Type]].
