title: Card Trivia:Mokomoko
wikitext: |-
  {{Navigation}}

  * This is the first [[WATER]] [[Illusion]] monster and Illusion [[Flip monster]].
  * This monster's Japanese is derived from "もこもこ" (''mokomoko'') and "モッコ" (''mokko'').
  ** "もこもこ" is a Japanese onomatopoeia for something bulgingly poofy and fluffy
  ** "モッコ" is a term in the Akita dialect for monsters and scary things.
