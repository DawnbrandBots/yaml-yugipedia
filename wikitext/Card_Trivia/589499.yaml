title: Card Trivia:Ankuriboh
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Palladium Oracle Mana]]".
  * This card's artwork was drawn by [[Kazuki Takahashi]].
  * This card's name is a portmanteau of "[[wikipedia:Ankh|Ankh]]" and "[[Kuriboh (archetype)|Kuriboh]]".
  ** The ankh is an [[wikipedia:Ancient Egypt|ancient Egyptian]] [[wikipedia:Egyptian hieroglyphs|hieroglyph]], representing the word for "life". This, along with this card's effect to [[Special Summon]] a monster from either player's [[Graveyard]], reference "[[Monster Reborn]]", which features an ankh in its original ''[[OCG]]'' artwork.
  *** Additionally, sending the Special Summoned monster to the Graveyard during the [[End Phase]] likely references the [[Egyptian God]]s in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], where each member featured the same restriction and were frequently Special Summoned by "Monster Reborn".
