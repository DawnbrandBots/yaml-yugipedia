title: Card Trivia:The Crimson King
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Blazing Dominion]]''.
  * This monster is a retrained [[counterpart]] of "[[Red Dragon Archfiend]]".
  ** This monster's name is a reference to [[Jack Atlas]], who is also known as "King" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime, in which his [[signature card]] is "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]".
  ** This monster's right fist being surrounded by fire is a reference to [[Blazing Soul]], an ability that Jack used to seal [[Red Nova]] into a card to create "[[Red Nova Dragon (anime)|Red Nova Dragon]]"; while its left hand being pointed towards the sky is a reference to Jack's signature pose during his introductions before engaging in a [[Turbo Duel]], where he holds up one arm and points to the sky before he proclaims, "There can only be one King!"
  * This monster shares similarities with "[[Armed Dragon Thunder LV10]]":
  ** Both are retrained counterparts of the signature cards of an anime rival; Jack Atlas and "Red Dragon Archfiend" in ''Yu-Gi-Oh! 5D's'', and [[Chazz Princeton]] and "[[Armed Dragon LV10]]" in ''[[Yu-Gi-Oh! GX]]''.
  ** Both are depicted striking the signature pose of their respective owners in their artworks. 
  ** Both are the cover cards of their [[Core Boosters]], both of which start with the word "Blazing"; ''Blazing Dominion'' and ''[[Blazing Vortex]]'', respectively.
