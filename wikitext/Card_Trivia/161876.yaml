title: Card Trivia:Vengeful Bog Spirit
wikitext: |-
  {{Navigation}}

  * This card's effect resembles the concept of "Summoning Sickness" from other trading card games like ''Magic: the Gathering'' and ''Duel Masters'', in which most monsters cannot attack on the turn that they are summoned.
  ** Its use in the anime also replicates the "Summoning Sickness" concept that is actually used in the original manga's [[Super Expert Rules]] during the [[Battle City Finals]], specifically done to showcase the ability of "[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]" being able to bypass this restriction.
