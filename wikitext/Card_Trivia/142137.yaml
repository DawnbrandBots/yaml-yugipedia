title: Card Trivia:Skiel Carrier 3
wikitext: |-
  {{Navigation|mode=nongame}}

  * The number "3" in this card's name represents its [[Level]] (3).
  * This monster resembles a [[wikipedia:Praying mantis|praying mantis]], keeping in relation with the "flying animal" design of the "[[Skiel]]" [[archetype]].
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this card was never used by its original owner, [[Lester]]; instead, it is only seen when [[Primo]] stole it to use against [[Yusei Fudo]].
  ** This card and "[[Skiel Carrier 5 (anime)|Skiel Carrier 5]]" changed color when they attached themselves to "[[Meklord Emperor Wisel ∞|Meklord Emperor Wisel]]". Presumably, this would be the case for any "Meklord Emperor" parts that were used on a different "Meklord Emperor" from their "normal" user.
  * This card, "Skiel Carrier 5", and "[[Skiel Guard]]" are the only "Skiel" monsters that doesn't feature 0 [[DEF]].
