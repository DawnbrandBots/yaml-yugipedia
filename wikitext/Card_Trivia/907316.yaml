title: Card Trivia:Despian Comedy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Loss]]" and "[[Branded Opening]]".
  * This card is named after the [[wikipedia:Comedy|comedy]] genre.
  ** This monster is based on the [[wikipedia:Sock and buskin|sock]] (''soccus'', in Latin), a shoe with a tiny sole worn by comedic actors in [[wikipedia:Ancient Greece|Ancient Greece]].
