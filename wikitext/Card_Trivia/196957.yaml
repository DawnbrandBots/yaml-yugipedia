title: Card Trivia:Chronomaly Cabrera Trebuchet
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Ica stones|Ica stones]], a series of large stones discovered in [[wikipedia:Peru|Peru]] and popularized by Peruvian physician [[wikipedia:Javier Cabrera|Javier Cabrera]]. The stones are known for their engraved depictions of dinosaurs, humans, and advanced technology; however, the Ica stones are considered to be hoaxes.
  * This monster seems to symbolize [[Trey]]'s evil side, as it is the first "[[Chronomaly]]" monster in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime to feature an unsettling appearance. When Trey [[activate]]s this monster's effect, it crushes the [[Tribute]]d monsters, causing them great pain as they are transformed into spherical projectiles.
  ** This is most evident when Trey repeatedly Tributed "[[Chronomaly Aztec Mask Golem (anime)|Chronomaly Aztec Mask Golem]]" to activate this card's effect. In {{episode|ZEXAL|046|ref}}, Trey considers "Aztec Mask Golem" his favorite card; however, in [[Yu-Gi-Oh! ZEXAL - Episode 047|the following episode]], when Trey is taken over by his dark side, he purposefully destroyed it with this card's effect, symbolizing his loss of respect for the card.
