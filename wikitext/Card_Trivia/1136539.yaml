title: Card Trivia:Bramble Rose Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[Plant]] [[counterpart]] of "[[Black Rose Dragon]]".
  ** This monster's appearance is based on "[[Black Rose Dragon (anime)|Black Rose Dragon]]" while [[equip]]ped with "[[Thorn of Malice]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster's effects reference the different combinations used by [[Akiza Izinski]] during her earlier appearances in the ''Yu-Gi-Oh! 5D's'' anime:
  ** This monster's effect to inflict 600 damage to the opponent references Akiza's combo involving "[[Rose Tentacles (anime)|Rose Tentacles]]" and "[[Ivy Token (anime)|Ivy Tokens]]", where the former would gain an additional attack and inflict 300 damage to the opponent for each Plant monster on their [[field]] (using the "Ivy Tokens" she herself would Summon to their field).
  ** This monster's effect to reduce the opponent's monster's [[ATK]] by 600 after the above effect is applied references Akiza's usage of "Thorn of Malice", which reduces the opponent's monster's ATK by the same amount when it attacks that monster and prevents that monster from being destroyed by battle.
  * This monster has two [[counterpart]]s: "[[Scarred Dragon Archfiend]]" and "[[Accel Synchro Stardust Dragon]]".
  ** All three monsters feature an effect that [[Special Summon]]s the [[Signer Dragon]] of which they are retrains of and treat their Summoning as a [[Synchro Summon]].
  *** However, out of the three aforementioned monsters, this is the only one of them whose [[Type]] is not [[Dragon]] like their original counterparts. Coincidentally, "Black Rose Dragon" is the only Signer Dragon that has an effect mentioning a monster [[Type]], that being Plant.
  * This is the first "[[Rose Dragon]]" monster whose Type is [[Plant]] instead of Dragon.
