  * This monster is a caricature promo version of "[[Skull Knight]]" with different [[Fusion Material]]s listed.
  * This is the only [[Fusion Monster]]:
  ** In the ''[[OCG]]''/''[[TCG]]'' to have a [[Spell]] or [[Trap Card]] explicitly listed as a Fusion Material.
  ** To be [[Illegal]] in the ''OCG''.
