title: Card Trivia:Bujintervention
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * "[[Bujintei Susanowo]]", "[[Bujintei Kagutsuchi]]", "[[Bujintei Tsukuyomi]]" and "[[Bujinki Amaterasu]]" appear in this card's artwork.
  ** "Susanowo", "Kagutsuchi", and "Tsukuyomi" are missing "[[Bujingi Quilin]]", "[[Bujingi Crow]]", and "[[Bujingi Peacock]]" from their respective sets of armor ("Quilin" as the second sword of "Susanowo", "Crow" as the shield of "Kagutsuchi", and "Peacock" as the wings of "Tukuyomi"). As reflected by the "[[Bujin]]" storyline, these items were instead wielded by the corrupted "Amaterasu" in the forms of "[[Bujingi Sinyou]]", "[[Bujingi Raven]]" and "[[Bujingi Pavo]]".
