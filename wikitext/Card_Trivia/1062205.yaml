  * This card's anime artwork is taken from the original Japanese version of {{chapter|Yu-Gi-Oh!|163|ref}}, specifically from the panel showing [[Nightmare Chains (manga)|this cross]] manifesting, albeit with changes in the detail, including removing the skeletons from the cross and adding longer chain links in the areas of the cross where the chains are wrapped around.
