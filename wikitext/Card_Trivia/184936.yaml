title: Card Trivia:Hammer Shark
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Hammerhead shark|hammerhead shark]], which is also a visual pun, as its design features the head of a hammer for its head.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect is based on this card's first appearance in {{episode|ZEXAL|034|ref}}; after [[Reginald Kastle|Reginald "Shark" Kastle]] [[Normal Summon]]s this card and reduces its [[Level]] by 1 via the effect of "[[Falling Current (anime)|Falling Current]]", he [[Special Summon]]s the [[Level 3]] "[[Big Jaws (anime)|Big Jaws]]" from his [[hand]] via its effect since he [[activate]]d a [[Normal Spell Card]].
