title: Card Trivia:The True Name
wikitext: |-
  {{Navigation}}

  [[File:The True Name.png|thumb|right|250px|[[Atem (manga)|Atem]] remembering and declaring his own name.]]

  * This card's artwork is taken from {{chapter|Yu-Gi-Oh! Millennium World|55|ref}}, specifically from the panel where [[Dark Yugi (manga)|Dark Yugi]] declares his true name, Atem (albeit with minor changes in artwork details).
  ** Yugi is holding his [[cartouche]] here, which [[Téa Gardner|Téa]] had given to him (before he entered the [[World of Memories]]) so that he could inscribe his name on it when he remembered it.
  * This card's effect is also based on [[Yami Yugi]]'s ability to "influence fate" by his willpower in the [[Yu-Gi-Oh! (anime)|anime]], enabling him to draw the cards he visualized during his ceremonial duel with [[Yugi Muto]].
  ** This was shown as he declared he would draw "[[Big Shield Gardna (anime)|Big Shield Gardna]]", before drawing it and playing it on the field without looking at it. This was also repeated for "[[Dark Magic Curtain (manga)|Dark Magic Curtain]]", "[[Thousand Knives (anime)|Thousand Knives]]", and "[[Dark Spear]]" (although he drew those cards first, declared their names, then played them on the field immediately each time, all without looking at them).

