title: Card Trivia:Zeta Reticulant
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Limited Edition 9: Ultimate Seven Pack]]''.
  * This monster's name is based on the [[wikipedia:Zeta Reticuli|Zeta Reticuli]], a star system in the southern constellation of [[wikipedia:Reticulum|Reticuli]].
  ** This monster's name and alien-like appearance reference the "[[wikipedia:Barney and Betty Hill incident|Zeta Reticuli Incident]]", in which American couple Barney and Betty Hill were claimed to have been abducted from their home by extraterrestrials and taken to the Zeta Reticuli star system.
  * The Japanese name of the "[[Eva Token]]", "EBE Token" is based on the abbreviation for "Extraterrestrial Biological Entity".
  ** The international name of the "Eva Token" is likely based on the abbreviation for "Extraterrestrial Visitor Alien".
