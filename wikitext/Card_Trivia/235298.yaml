title: Card Trivia:Lightning Chidori
wikitext: |-
  {{Navigation}}

  * This card is the first [[Thunder]]-[[Type]] [[Xyz Monster]] to be released.
  * The name "Chidori" comes from a story about famous samurai [[wikipedia:Tachibana Dōsetsu|Tachibana Dōsetsu]] (立花道雪 ''Tachibana Dōsetsu'') (April 22, 1513 – November 2, 1585). Tachibana was in possession of a famous sword called "A Thousand Birds" (千鳥 ''Chidori''). One day, while he was still a young man, he was taking shelter under a tree, as it was raining. Suddenly, a bolt of lightning struck him. However, Tachibana used his Chidori to cut the [[wikipedia:Raijin|Thunder God]] inside the lightning bolt, allowing him to survive. After this incident, he renamed his Chidori to "Lightning Cutter" (雷切 ''Raikiri'').
  ** The artwork of this card is perhaps referring to this origin, as it shows a sword in the back and the monster is shaped as a bird.
