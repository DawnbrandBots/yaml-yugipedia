title: Card Trivia:Riryoku
wikitext: |-
  {{Navigation}}

  * This card's ''[[TCG]]'' name is likely derived from 「理力」, an early Japanese term for the concept of the [[wikipedia:The Force|Force]], as seen in the ''[[wikipedia:Star Wars|Star Wars]]'' franchise, with this card's Japanese name being "Force".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Riryoku]]".
  * This card has a [[retrained]] counterpart: "[[Riryoku Guardian]]".
