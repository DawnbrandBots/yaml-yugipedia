title: Card Trivia:Xiangke Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Extra Pendulum]]".
  * This monster's Japanese name, "Antithesis Magician", is based on the term describing something that is a direct contrast or complete opposite of another.
  ** This monster's ''[[TCG]]'' name is derived from the ''xiāngkè'' (相克), the destructive cycle in [[wikipedia:Wuxing (Chinese philosophy)|Wuxing]], a fivefold conceptual scheme in [[wikipedia:Chinese philosophy|Chinese philosophy]] that describes how each of the five elements ([[wikipedia:Wood (wuxing)|wood]], [[wikipedia:Earth (wuxing)|earth]], [[wikipedia:Water (wuxing)|water]], [[wikipedia:Fire (wuxing)|fire]], and [[wikipedia:Metal (wuxing)|metal]]) interact with each other; in the ''xiāngkè'', one of those elements breaks down or overcomes the other.
  ** The above-mentioned facts reflect this monster's [[Pendulum Effect]], which "opposes" or "breaks down" an [[Xyz Monster]]'s quality by treating its [[Rank]] with having a [[Level]].
  *** The above-mentioned facts also reflect the fact that this monster highly resembles [[Z-ARC]], the original incarnation of [[Yuya Sakaki]] and his [[dimensional counterparts]] who destroyed the [[Original Dimension]] and opposed [[Ray Akaba]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster has a [[counterpart]]: "[[Xiangsheng Magician]]".
  * This is the first card in the ''[[OCG]]''/''TCG'' to have an effect that allows [[Xyz Monster]]s to have a [[Level]].
