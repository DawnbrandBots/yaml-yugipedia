title: Card Trivia:Draluvice the Diabolic Dragon Fortress
wikitext: |-
  {{Navigation}}

  * This monster appears to be a fully corrupted version of "[[Dragon Core Hexer]]", based on it's [[flavor text]] and it being a [[Normal Monster|Normal]] [[Tuner monster]] with the same [[Attribute]] ([[DARK]]) and [[original ATK]] (2300).
  ** This monster is also tied with "Dragon Core Hexer" for the highest original [[ATK]] (2300) of all Normal Tuner monsters.
  * This is the first [[Level 7]] Normal Tuner monster.
