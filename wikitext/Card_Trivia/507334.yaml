title: Card Trivia:Legendary Knight Timaeus
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Dragons of Legend]]''.
  * This monster is the "[[Legendary Knight]]" [[counterpart]] of "[[The Eye of Timaeus]]".
  ** This monster bears a resemblance to [[Yami Yugi]] with a scar over one eye, who used "[[The Eye of Timaeus (anime)|The Eye of Timaeus]]" in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime. Fittingly, this monster's voice actor is the same as Yami Yugi's.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[banish]] a [[Spell]]/[[Trap Card]] upon being Summoned is a reference to the final anime effect of "[[Legend of Heart (anime)|Legend of Heart]]" to [[destroy]] "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]" after Summoning the Legendary Knights. In the ''OCG''/''TCG'', this banishing effect is designed to effectively [[remove]] "[[The Seal of Orichalcos]]" from the [[field]], since its effect prevents it from being destroyed by card effects [[once per turn]].
