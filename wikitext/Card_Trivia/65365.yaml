title: Card Trivia:Memory Crusher
wikitext: |-
  {{Navigation}}

  * This monster has a [[counterpart]] called "[[Memory Crush King]]". Both monster's effect inflict damage according to the number of Extra Deck monsters the opponent has.
  ** Interestingly, while this monster has its horns removed in the ''[[TCG]]'', its counterpart did not have its horns removed.
