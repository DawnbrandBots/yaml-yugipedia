title: Card Trivia:Scramble Egg
wikitext: |-
  {{Navigation}}

  * "[[Sonic Chick]]" appears in this card's artwork.
  * This card's name is a pun on "[[wikipedia:Scrambled eggs|scrambled eggs]]" and "scramble", the military term used for the act of urgently deploying military aircraft, which reflects this card's effect to "scramble" "Sonic Chick" to the [[field]] when the player's monster is [[destroyed]].
  * This card has a similar effect to "[[Limiter Overload]]", another card used by [[Yusei Fudo]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime. Fittingly, both cards correspond to a monster used by Yusei Fudo that debuted in {{episode|5D's|001|ref}} ("Sonic Chick" and "[[Speed Warrior]]", respectively).
