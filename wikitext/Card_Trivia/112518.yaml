title: Card Trivia:Sword of Dark Destruction
wikitext: |-
  {{Navigation}}

  * This card has five [[Attribute]] counterparts: "[[Burning Spear]]" (for [[FIRE]] monsters), "[[Elf's Light]]" (for [[LIGHT]] monsters), "[[Gust Fan]]" (for [[WIND]] monsters), "[[Invigoration]]" (for [[EARTH]] monsters), and "[[Steel Shell]]" (for [[WATER]] monsters).
  * This card shares similarities with "[[Soul Devouring Bamboo Sword]]", as both cards are [[Equip Spell Card]]s that feature evil-esque names, backgrounds, and coral-colored blades with macabre-looking grips.
