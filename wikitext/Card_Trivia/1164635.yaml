title: Card Trivia:Cyber End Dragon the Decisive Strike Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Cyber End Dragon]]".
  ** This monster's name is a reference to ''[[Tactical-Try Deck: Decisive Strike Cyber Dragon]]'', which features "Cyber End Dragon" as the [[cover card]].
  ** This monster is based on how [[Zane Truesdale]] utilized "Cyber End Dragon" in {{episode|GX|052|ref}}, in which he used "[[Power Bond (anime)|Power Bond]]" and "[[Limiter Removal (anime)|Limiter Removal]]" to greatly bolster the [[ATK]] of "Cyber End Dragon" at the risk of losing on the next turn from loss of [[Life Points]].
