title: Card Trivia:Monoceros
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the Greek word for "[[unicorn]]".
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster is used to [[Synchro Summon]] "[[Thunder Unicorn]]", another monster based on the [[wikipedia:Unicorn|unicorn]] whose anime effects can [[Special Summon]] itself from the [[Graveyard]].
