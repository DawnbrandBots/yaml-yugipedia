title: Card Trivia:Floodgate Trap Hole
wikitext: |-
  {{Navigation}}

  * "[[Mokey Mokey]]" and the goblin that appears in the artworks of "[[D.D. Trap Hole]]", "[[Giant Trap Hole]]", "[[Adhesion Trap Hole]]", "[[Bottomless Trap Hole]]", "[[Treacherous Trap Hole]]", and "[[Traptrix Trap Hole Nightmare]]" appear in this card's artwork.
  ** This card's artwork depicts a scene similar to the one depicted in the artwork of "[[D.D. Trap Hole]]".
  * This is the second "[[Trap Hole]]" card that doesn't destroy/banish a monster. The first being "Adhesion Trap Hole".
