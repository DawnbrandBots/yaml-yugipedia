title: Card Trivia:Greed Quasar
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Quasar|quasar]], a subclass of a super bright celestial object powered by a [[wikipedia:Supermassive black hole|supermassive black hole]] in the center of a [[wikipedia:Galaxy|galaxy]].
  ** The word "Greed" in this monster's name reflects its effect to make its [[original ATK and DEF]] become 300 multiplied by its [[Level]], and its effect to increase its Level by that of a monster it [[destroy]]s by battle.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|R|023|ref}}, specifically from the panel showing [[Greed Quasar (manga)|this monster]] being Summoned.
