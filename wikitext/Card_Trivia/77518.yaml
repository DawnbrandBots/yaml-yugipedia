title: Card Trivia:Switch Off
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Little-Winguard]]" appears in this card's artwork.
  ** Fittingly, both cards feature an effect that changes [[battle position]]s.
  * This card's name is a dual-layered pun, as this card's effect can "switch off" the effects of an opponent's [[Continuous Spell]]/[[Continuous Trap Card|Trap Card]]s, as well as "switch" an opponent's [[Defense Position]] monster to [[Attack Position]].
