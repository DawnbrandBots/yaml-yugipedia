title: Card Trivia:Submarineroid
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Emergeroid Call]]".
  * This monster is based on a [[wikipedia:submarine|submarine]], a watercraft capable of diving and being piloted underwater.
  ** The torpedo in this monster's and its effects reference how a submarine can launch a long-range attack with its torpedo (represented by its effect to attack directly) before it submerges underwater (represented by how its switches to [[Defense Position]] after it battles).
