title: Card Trivia:Dogmatika Nexus
wikitext: |-
  {{Navigation}}

  * This monster appears in the "[[Dogmatika]]" crest.
  * This monster has a "[[Despia]]" [[counterpart]], "[[Despian Proskenion]]", and a "[[Bystial]]" counterpart, "[[The Bystial Alba Los]]".
  * This monster's Japanese name, "Tetradragma, the Dogmatic Nexus" ({{Ruby|教|きょう}}{{Ruby|導|どう}}{{Ruby|枢|すう}}{{Ruby|機|き}}テトラドラグマ ''Kyōdō Sūki Tetoradoraguma''), is a portmanteau of "[[wikipedia:Tetragrammaton|Tetragrammaton]]" (テトラグラマトン ''Tetoraguramaton'') and "Dragma" (ドラグマ ''Doraguma''), the Japanese name of the "Dogmatika" [[archetype]].
