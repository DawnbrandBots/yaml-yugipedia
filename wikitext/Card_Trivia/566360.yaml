title: Card Trivia:Orcust Brass Bombard
wikitext: |-
  {{Navigation}}

  * The cathedral-like insides of "[[Orcustrion]]" seem to provide the background for this card's artwork.
  * This monster appears in the artworks of "[[Orcustrated Einsatz]]" and "[[Guardragon Shield]]".
  * This card's Japanese name is a pun on [[wikipedia:Canon (music)|canon]] and [[wikipedia:cannon|cannons]], while the English one plays on the "Bombard" homonyms (an [[wikipedia:Bombard (weapon)|artillery piece]] and a [[wikipedia:Bombard (music)|musical instrument]]).
