title: Card Trivia:Hyper Psychic Blaster
wikitext: |-
  {{Navigation}}

  * This monster's armor and weapons appear in the artwork of "[[Psi-Reflector]]".
  * This monster has an [[Card evolutions|upgraded]] "[[/Assault Mode]]" form of "[[Hyper Psychic Blaster/Assault Mode]]".
  ** This monster's wings appear also appear in the designs of its "Assault Mode" counterpart, albeit unfurled.
  * This monster has a downgraded counterpart: "[[Prototype Psychic Blaster]]".
  * This monster has a [[retrained]] counterpart: "[[Psychic Blaster Mk-II]]".
  * This monster's blasters feature an "X" and "O" shape at the end of each barrel, with each shape representing its [[piercing]] damage and [[Life Point]]-gaining effects respectively.
  * This is the first [[Level 9]] [[Synchro Monster]] to not require at least two non-[[Tuner monster]]s.
