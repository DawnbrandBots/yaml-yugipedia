title: Card Trivia:Ursarctic Septentrion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Ancient Guardians]]''/''[[Ancient Guardians]]''.
  * This monster appears in the artworks of "[[Ursarctic Quint Charge]]" and "[[Ursarctic Radiation]]".
  * This monster's name is based on the Latin word "Septentrion", which refers to the seven stars of the [[wikipedia:Big Dipper|Big Dipper]].
  ** Fittingly, the structure of this monster's weapon is based on the Big Dipper [[wikipedia:Asterism|asterism]].
  * This monster has the highest [[original ATK]] (3000) of all [[Level 7]] monsters. 
  ** It is also the first [[legal]] Level 7 monster to have more than 2800 [[ATK]].
