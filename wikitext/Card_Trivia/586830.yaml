title: Card Trivia:Binary Blader
wikitext: |-
  {{Navigation}}

  * This card's name refers to a [[wikipedia:Binary code|binary code]], which is further reinforced with this monster having 2 [[Link Arrow]]s (binary codes use 2 numbers: 1 and 0).
  ** In this monster's Japanese name, "Binal" means "double" or "twofold" which is likely a reference to this card's first effect (which allows it to attack twice).
