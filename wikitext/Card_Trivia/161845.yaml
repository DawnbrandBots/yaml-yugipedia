title: Card Trivia:Rabidragon
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "rabbit" and "dragon". It is also a pun on the word "rabid", which is often defined as violent and rage-filled.
  ** This monster's name reflects its appearance, as it is a combination of a rabbit and a dragon with a raging expression. This monster's design also features red eyes, which is often associated with rabid and rage-filled violence.
  ** Also, the word "rabid" is associated with [[wikipedia:Rabies|rabies]], a viral disease which can induce violence in its host.
  ** This monster's Chinese name (兔龍) literally translates to "Rabbit Dragon".
  * This monster shares several similarities with "[[Blue-Eyes White Dragon]]":
  ** Both share the same [[Attribute]] ([[LIGHT]]), [[Level]] (8), [[Type]] ([[Dragon]]) and [[Monster Card]] [[Card type|type]] ([[Normal Monster]]).
  ** The horns on the sides of this monster's mouth are similar to those of "Blue-Eyes White Dragon".
  ** This monster has a near-identical pose to "Blue-Eyes White Dragon" in its fourth card artwork.
  * This monster has the highest combined [[ATK]] and [[DEF]] of all [[Normal Monster]]s, with a total of 5850.
