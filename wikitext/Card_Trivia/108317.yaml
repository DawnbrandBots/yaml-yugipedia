title: Card Trivia:Wolf in Sheep's Clothing
wikitext: |-
  {{Navigation}}
  * This card's name has Biblical origins; a possible reference an idiom spoken by Jesus Christ in the New Testament (Matthew 7:15).
  * This card's artwork is similar to that of the artwork of "[[Evil Eye of Coercion]]".
  ** The eyes in this card's artwork are also similar to those in the artwork of "[[Disaster Conspiracy]]".
  *** Fittingly, both cards are [[Trap Card]]s.
  *** Moreover, these cards have both been separately used by main antagonists in the anime whom were members of a faction and were direct subordinates of someone else (this card is used by [[Roman Goodwin]], who was a [[Dark Signer]] and served the [[King of the Netherworld]] and "Disaster Conspiracy" is used by [[Vector]], who is a [[Barian]] and serves [[Don Thousand]]).
