title: Card Trivia:Masked HERO Furnace
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Masked HERO Atomic]]".
  ** Both are the first ''[[OCG]]''/''[[TCG]]''-original "[[Masked HERO]]" monsters to be released.
  * This monster, along with "[[Masked HERO Atomic]]", are likely based on ''[[wikipedia:Marvel Comics|Marvel]]'' superhero ''[[wikipedia:Iron Man|Iron Man]]''.
  **"Furnace" is based on the Mark I armor suit while "Atomic" is based on the Mark LXXXV armor suit.
  * This monster and "[[Masked HERO Dusk Crow]]" are the first [[Main Deck]] "Masked HERO" monsters to be released.
