title: Card Trivia:Parsec, the Interstellar Dragon
wikitext: |-
  {{Navigation}}

  * This monster's name is based on a [[wikipedia:parsec|parsec]], a [[wikipedia:unit of length|unit of length]] used in [[wikipedia:astronomy|astronomy]] that is measured by 3.26 [[wikipedia:light-year|light-years]] (which is about 30.9 trillion (3.09×10<sup>13</sup>) [[wikipedia:kilometre|kilometres]] or about 19.2 trillion (1.92×10<sup>13</sup>) [[wikipedia:mile|miles]]).
