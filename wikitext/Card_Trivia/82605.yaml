title: Card Trivia:Legend of Heart
wikitext: |-
  {{Navigation}}

  * "[[The Claw of Hermos]]", "[[The Eye of Timaeus]]", and "[[The Fang of Critias]]" appear in this card's artwork.
  ** This card's effect does not actually require the "[[Legendary Dragon]]" card to correspond to the "[[Legendary Knight]]" card, simply requiring the number of cards to be the same.
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this is the only card that can destroy "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]" upon its [[activate|activation]], similar to how "The Seal of Orichalcos" can destroy a card that was combined with "[[Eye of Timaeus|The Eye of Timeaus]]", "[[Fang of Critias|The Fang of Critias]]", or "[[Claw of Hermos|The Claw of Hermos]]" upon its activation.
