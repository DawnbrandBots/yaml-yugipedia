title: Card Trivia:Fraud Freeze
wikitext: |-
  {{Navigation}}

  * "[[Flower Cardian Zebra Grass]]" appears in this card's artwork.
  ** The man who appears in the artworks of "[[Fraud Check]]" and "[[Super All In!]]" and the mustached man who appears in the artworks of "[[Dark Bribe]]", "Fraud Check", "[[Sneaky Sleeve]]", "Super All-In!" and "[[Super Koi Koi]]" appear in this card's artwork.
  * This card's artwork depicts the enraged man reprimanding the mustached man for cheating, which reflects its Japanese name, "No Cheaters Allowed", and its effect to [[return]] all the opponent's monsters [[Special Summon]]ed from the [[hand]], thereby preventing them from making unlawful moves.
  ** This card's Japanese name and artwork (depicting the man illegally [[add]]ing card to his hand) references how its owner, [[Chojiro Tokumatsu]], was caught and imprisoned for cheating by [[draw]]ing a card underneath the top card of his [[Deck]] during a [[Duel]].
