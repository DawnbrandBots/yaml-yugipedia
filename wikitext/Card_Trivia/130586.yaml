title: Card Trivia:Gaia Drake, the Universal Force
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[D.D.D. - Different Dimension Derby]]" and "[[Tri-and-Guess]]".
  * This monster's name may be a play on "[[Gaia Knight, the Force of Earth]]" and "[[Naturia Leodrake]]". This would be fitting, due to the fact that those monsters could be used as [[Fusion Material]]s.
  ** Also, "Gaia Knight" is a [[Warrior]] monster and "Leodrake" is a [[Beast]] monster, which reflects this monster's [[Beast-Warrior]] [[Type]].
  ** "Gaia Knight", "Leodrake", and "[[Scrap Archfiend]]" are the only monsters that can be used as Fusion Materials for this monster.
  * This monster has three other [[Extra Deck]] counterparts:
  ** [[Link Monster|Link]]: "[[Gaia Saber, the Lightning Shadow]]"
  ** [[Synchro Monster|Synchro]]: "Gaia Knight, the Force of Earth"
  ** [[Xyz Monster|Xyz]]: "[[Gaia Dragon, the Thunder Charger]]"
  * This monster and "[[Gaia Prominence, the Fierce Force]]" are tied for having the highest [[original ATK]] (3500) of all [[Gaia Knight]] monsters.
  ** Coincidentally, both are Fusion Monsters that require a specific Gaia Knight Synchro Monster as one of their Fusion Materials.
