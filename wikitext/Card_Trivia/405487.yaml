title: Card Trivia:Buster Blader, the Destruction Swordmaster
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Destruction Sword Memories]]", "[[Destruction Swordsman Fusion]]", "[[Karma of the Destruction Swordsman]]", and "[[Prologue of the Destruction Swordsman]]".
  * This card is a [[Card evolutions|retrained]] version of "[[Buster Blader]]".
  ** This monster's design resembles "Buster Blader" from its second ''[[OCG]]''/''[[TCG]]'' artwork.
  * This monster has an upgraded [[Fusion Monster|Fusion]] [[counterpart]]: "[[Buster Blader, the Dragon Destroyer Swordsman]]".
