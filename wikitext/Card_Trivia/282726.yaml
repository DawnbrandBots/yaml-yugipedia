title: Card Trivia:Dododo Witch
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Yuma 2: Gogogo & Dododo]]''.
  * This monster appears in the artworks of "[[Dododo Driver]]" and "[[Dodododraw]]".
  * While this monster does not resemble a witch, this monster's staff features a tip resembling a crow's head, which is also known for being a witch's familiar or pet.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card was a [[Spellcaster]] monster.
  ** In the ''[[OCG]]''/''[[TCG]]'', however, this card's [[Type]] was changed to [[Warrior]].
