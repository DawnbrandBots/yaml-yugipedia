title: Card Trivia:Magi Magi ☆ Magician Gal
wikitext: |-
  {{Navigation}}

  * This monster is an [[Xyz Monster|Xyz]] [[counterpart]] of "[[Dark Magician Girl]]".
  ** This card's artwork is based on a 10th anniversary illustration of "Dark Magician Girl" drawn by [[Kazuki Takahashi]]. According to his ''[[Duel Art]]'' artbook, this was originally intended to be an alternate artwork for "Dark Magician Girl" matching the [[Card Artworks:Dark Magician#10th anniversary artwork|10th anniversary artwork]] of "[[Dark Magician]]".
  * An [[wikipedia:Ankh|ankh]] appears on this monster's chest, likely in reference to her second effect and "[[Monster Reborn]]".
  * This monster's name and appearance are a reference to ''[[wikipedia:Gyaru|gyaru]]'', a Japanese fashion style with an emphasis on elements viewed as "foreign" by Japanese culture, most notably heavy makeup, bleached/dyed hair, and tanned skin.
  * The letters on the magic circle in this card's artwork are [[wikipedia:Cyrillic script|Cyrillic]].
  * This is the only legal card without a [[password]] (in any medium) that is not a [[DIVINE]] monster.
