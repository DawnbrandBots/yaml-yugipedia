title: Card Trivia:Parasitic Ticky
wikitext: |-
  {{Navigation}}

  * This card is likely based on an [[wikipedia:Sarcoptes scabiei|itch mite]], a microscopic parasite that burrows into the skin of its host and causes unbearable itching.
  ** This card's Japanese name includes the word "Danī", the Japanese name for mites that infest old and unkempt [[wikipedia:tatami|tatami mats]].
