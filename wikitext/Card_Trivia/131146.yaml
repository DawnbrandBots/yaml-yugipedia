title: Card Trivia:Dragunity Arma Leyvaten
wikitext: |-
  {{Navigation}}

  * This is the [[Cover card]] of ''[[Structure Deck: Dragunity Drive]]''/''[[Dragunity Legion Structure Deck]]''.
  * This card's name comes from the [[wikipedia:Lævateinn|Lævateinn]], a sword of Norse mythology.
  ** The sword [http://castlevania.wikia.com/wiki/Laevatain Laevatain] is also found in some of the [[Konami]]'s Castlevania games.
  * "[[Dragunity Arma Gram]]" is a [[Card evolutions|retrained version]] of this card.
