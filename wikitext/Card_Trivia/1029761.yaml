title: Card Trivia:Advanced Explosion Ascension
wikitext: |-
  {{Navigation|mode=nongame}}

  * The first part of this card's Japanese name (バクハンスド, ''Bakuhansudo'') is a portmanteau of the Japanese words "''Bakuha''" (爆破, lit. "Destructive Explosion") and "''Adobansudo''" (アドバンスド, lit. "Advanced").
  ** The Japanese word "''Bakuha''" (爆破, lit. "Destructive Explosion") is also featured in the Japanese names of "[[Demolition Wyvern Blasthurricane]]" and "[[Destructor Wyrm Bakhamut]]", the [[Signature card|ace monsters]] of [[Asaka Mutsuba]], who transforms into this card in {{episode|GO RUSH!!|85|ref}}.
