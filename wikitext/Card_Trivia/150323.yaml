title: Card Trivia:Temple of the Six
wikitext: |-
  {{Navigation}}

  * This card can also be seen as a "[[Six Samurai]]" [[counterpart]] to "[[Realm of Light]]", seeing as how both cards involve [[Counter]]s accumulating when an action occurs, and both have monsters' [[ATK]] increase/decrease by 100 per Counter.  Both cards' artworks also appear to depict the "homelands" of each respective [[archetype]] that they support.
  * "[[Gateway of the Six]]" and "[[Shien's Castle of Mist]]" appear in this card's artwork.
  * Despite this card seemingly being a different building/location, this card's artwork is actually the front view of "[[Shien's Dojo]]".
  * This is one of the [[cover card]]s for ''[[Samurai Warlords Structure Deck]]''.
