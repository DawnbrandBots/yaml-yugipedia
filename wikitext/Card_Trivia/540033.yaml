title: Card Trivia:Seiyaryu
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragon's Bind]]" and "[[Dragon's Mind]]".
  * This monster's ''[[TCG]]'' name, "Seiyaryū" (聖夜竜) translates to "Holy Night Dragon", which serves as the basis for this card's Japanese name.
  ** As this monster's Japanese name suggests, this is the [[LIGHT]] "good" counterpart of "[[Serpent Night Dragon]]".
  * This monster has a [[retrained]] counterpart: "[[Starry Night, Starry Dragon]]".
