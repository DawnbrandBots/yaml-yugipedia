title: Card Trivia:Rilliona, the Wondrous Magistus Witch Wardrobe
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Cendrillon, the Magistus Witch" ({{Ruby|結晶の魔女|マギストス・ウィッチ}}サンドリヨン ''Magisutosu Wicchi Sandoriyon''), is based on ''[[wikipedia:Cinderella|Cendrillon ou la petite pantoufle de verre]]'', the French name of ''[[wikipedia:Cinderella|Cinderella]]'', a popular European fairy tale.
  * This card's ''[[TCG]]'' name, "Ril'''lion'''a, the Wondrous Magistus '''Witch''' '''Wardrobe'''", is a reference to ''[[wikipedia:The Lion, the Witch and the Wardrobe|The Lion, the Witch and the Wardrobe]]'', a popular fantasy novel.
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Rilliona, the Magistus of Verre]]".
  * This monster seems to be an older form of "[[Witchcrafter Madame Verre]]".
  ** Both have a similar appearance.
  ** Both cards have the same [[Attribute]], [[Type]], [[ATK]], and [[DEF]].
  ** Both cards have an effect that negates the effects of a monster(s) the opponent controls.
  * This is the only Xyz Monster that requires some sort of difference in its materials (requiring different Attributes, in this card's case).
