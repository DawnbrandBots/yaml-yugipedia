title: Card Trivia:Inzektor Axe - Zektahawk
wikitext: |-
  {{Navigation}}

  * "[[Inzektor Exa-Beetle]]" appears in this card's artwork.
  ** "Exa-Beetle" may also be holding "[[Inzektor Sword - Zektkaliber]]" in its other hand outside of this artwork's view.
  * This card's name is a portmanteau of "[[Inzektor]]" and "tomahawk", a type of small axe used by Indigenous Americans.
  * This card is the first [[Equip Spell Card]] to be a ''[[TCG]]'' [[Sneak Preview]] promo.
  * Unlike other "Inzektor" cards, this card does not seem to be based on anything of the ''Kamen Rider'' series, though it does loosely Getter Dragon's Double Tomahawk Boomerang.
