title: Card Trivia:Sage of Silence
wikitext: |-
  {{Navigation}}

  * This card has a [[counterpart]]: "[[Sage of Stillness]]".
  * This card has a [[Psychic]] counterpart: "[[Serene Psychic Witch]]".
  * This card's effect and name are a reference to silence, a status effect common in RPGs. Much like the silence of those games prevents the opponent from using magic, this card prevents the opponent from using [[Spell Card]]s.
