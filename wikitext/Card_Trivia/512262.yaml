title: Card Trivia:Zorc
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[Dark Master Zorc]], the ''[[Monster World]]'' avatar of [[Dark Bakura (manga)|Dark Bakura]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * This card's surface is holofoil, similar to that of [[Normal Parallel Rare]] cards, but without the relief pattern.
