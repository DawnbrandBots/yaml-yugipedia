title: Card Trivia:Starving Venom Wing Dragon
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Starving Venom Fusion Dragon]]" and "[[Clear Wing Synchro Dragon]]".
  ** This monster represents how [[Yuri]] absorbs [[Yugo]] and uses both "[[Starving Venom Fusion Dragon (anime)|Starving Venom Fusion Dragon]]" and "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]" in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster is a parallel to "[[Odd-Eyes Rebellion Dragon]]", the combination of "[[Odd-Eyes Pendulum Dragon]]" and "[[Dark Rebellion Xyz Dragon]]", the [[Four Dimensional Dragons|Dimensional Dragons]] of [[Yuya]] and [[Yuto]], respectively.
  *** Ironically, this monster should not even be treated as a [[Pendulum Monster]] due to it being a combination of a Fusion Monster and [[Synchro Monster]].
