title: Card Trivia:Artillery Catapult Turtle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spiral Discharge]]".
  * This monster is a [[retrained]] counterpart of "[[Catapult Turtle]]".
  ** This monster's [[Level]] ([[Level 4|4]]) is a reference to "[[Catapult Turtle (manga)|Catapult Turtle]]" being a [[Level 4 Monster Cards|Level 4 Monster]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  ** This monster's effect to [[Special Summon]] a "[[Gaia The Fierce Knight (archetype)|Gaia The Fierce Knight]]" monster or a [[Level 5]] [[Dragon]] monster from the [[hand]] or [[Deck]] references a scene during [[Dark Yugi and the Player Killer of Darkness' Duel (manga)|Dark Yugi and the Player Killer of Darkness' Duel]] in the ''Yu-Gi-Oh!'' manga (and its [[Yu-Gi-Oh! (anime)|anime]] [[Yami Yugi and PaniK's Duel|adaptation]]) where [[Dark Yugi (manga)|Dark Yugi]] used "[[Catapult Turtle (manga)|Catapult Turtle]]" in combination with "[[Gaia the Dragon Champion (manga)|Gaia the Dragon Champion]]" (whose [[Fusion Material]]s are "[[Gaia The Fierce Knight (manga)|Gaia The Fierce Knight]]" and "[[Curse of Dragon (manga)|Curse of Dragon]]").
