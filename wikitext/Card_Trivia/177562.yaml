title: Card Trivia:King Landia the Goldfang
wikitext: |-
  {{Navigation}}

  * This card's female counterpart is "[[Queen Nereia the Silvercrown]]".
  ** Both are [[Match winner]]s with a similar name pattern ('''King''' and '''Queen'''; '''Gold'''fang and '''Silver'''crown).
  * This card and "Queen Nereia the Silvercrown" were the first Match winners to not need a specific Type of monster to be initially Summoned; however, they do require a specific Type of [[Xyz Material]] to win the [[Match]] by their effects.
  ** This would later be standard for all [[Xyz Monster]] Match winners.
  * The word "Gold" in this card's name may be a reference to the fact that it was awarded to the winner of the [[Yu-Gi-Oh! World Championship 2011]], in contrast to "Queen Nereia the '''Silver'''crown, which was awarded to the tournament's 2nd, 3rd, and 4th place finishers.
  * This card shares many similarities with "[[Number 88: Gimmick Puppet of Leo]]".
  ** Both are [[Rank]] 8 Xyz Monsters that require 3 [[Level]] 8 monsters to [[Xyz Summon]].
  ** Both are based off a lion and a king.
  ** The effect of "Landia" involves winning the [[Match]], while the effect of "Leo" effect involves winning the [[Duel]].
