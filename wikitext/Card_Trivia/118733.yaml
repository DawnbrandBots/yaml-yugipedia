title: Card Trivia:Ally of Justice Core Destroyer
wikitext: |-
  {{Navigation}}

  * This card resembles a smaller version of "[[Ally of Justice Catastor]]". Its [[ATK]] and [[DEF]] are each 1000 points lower than that card's.
  * This is the first "[[Ally of Justice]]" to appear in a normal booster in the [[OCG]] and also the first to be of the [[Normal Rare]] rarity.
