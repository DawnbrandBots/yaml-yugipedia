title: Card Trivia:Darktellarknight Batlamyus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Purushaddoll Aeon]]".
  ** According to the ''[[Master Guide 5 card storylines#Knight of Tierra|Master Guide 5 card storylines]]'', this monster was created by "[[Infernoid Tierra]]" by reviving the soul of "[[Gem-Knight Lapis]]" ("[[Shaddoll Construct]]"). As a result of being a mirror image of "[[Gem-Knight Lazuli]]", "Lapis" also has access to the power of 'Creation' that "Lazuli" possesses.
  *** "Tierra" later absorbs "Batlamyus" in order to gain the power of 'Creation', transforming into "[[Tierra, Source of Destruction]]".
  * This card is named after ''Baṭlumyus'' (بَطْلُمْيوس), the Arabic name of the astronomer [[wikipedia:Ptolemy|Ptolemy]].
  * This card is the first [[DARK]] "[[tellarknight]]" monster.
  * This card is a watered-down counterpart of "[[Tellarknight Ptolemaeus]]".
  ** This card's [[Attribute]] ([[DARK]]) is the opposite of the Attribute ([[LIGHT]]) of "Ptolemaeus".
  ** This card's [[ATK]]/[[DEF]] (2600/550) are inverted with the ATK/DEF (550/2600) of "Ptolemaeus"
  ** Both cards are named after Ptolemy.
  ** Both cards have effects that require 7 other cards for the [[activation]].
  ** According to the ''[[Master Guide 5 card storylines#Knight of Tierra|Master Guide 5 card storylines]]'', "Ptolemaeus" is the upgraded form of "Gem-Knight Lazuli", the twin sister of "Batlamyus" ("Gem-Knight Lapis").
