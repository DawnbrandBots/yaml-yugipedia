title: Card Trivia:Vaylantz Dominator Duke
wikitext: |-
  {{Navigation}}

  * A chibi minifigure of this monster appears in the artwork of "[[Vaylantz Wars - The Place of Beginning]]".
  * This card's name is based on the aristocratic title of [[wikipedia:Duke|duke]].
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Vaylantz Genesis Grand Duke]]".
