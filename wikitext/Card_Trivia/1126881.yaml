title: Card Trivia:Masked HERO Atomic
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]'' and ''[[Tactical-Try Pack: Dark Magic / HERO / Mikanko]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Masked HERO Furnace]]".
  ** Both are the first ''[[OCG]]''/''[[TCG]]''-original "[[Masked HERO]]" monsters to be released.
  * This monster, along with "[[Masked HERO Furnace]]", are likely based on ''[[wikipedia:Marvel Comics|Marvel]]'' superhero ''[[wikipedia:Iron Man|Iron Man]]''.
  **"Furnace" is based on the Mark I armor suit while "Atomic" is based on the Mark LXXXV armor suit.
