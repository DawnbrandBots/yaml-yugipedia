title: Card Trivia:Insect Princess
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Insect Pheromone]]".
  * This monster appears to be a younger version/daughter of "[[Insect Queen]]".
  * This is one of a few [[Insect]] monsters that features an Insect [[anti-support]] effect, the others being "Insect Queen" and "[[Armored Centipede]]". This monster's second effect is also similar to that of "Armored Centipede's".
  ** This monster's Insect anti-support effects is likely a reference to its royalty-based superiority over weaker insects. This is reflected in this monster's fiendish hidden dark side depicted in the background of this card's artwork.
