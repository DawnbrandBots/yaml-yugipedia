title: Card Trivia:Gatling Ogre
wikitext: |-
  {{Navigation}}

  * This monster's weapon is based on a [[wikipedia:Gatling gun|Gatling gun]], a rapid-firing, multi-barrel firearm invented by [[wikipedia:Richard Jordan Gatling|Richard Jordan Gatling]], which debuted during the [[wikipedia:American Civil War|American Civil War]] era.
  ** The Gatling gun's power is reflected in this monster's effect and ability to perform a [[First Turn Kill]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, where players start with 4000 [[Life Points]] as opposed to 8000.
  * This monster's ''[[OCG]]''/''[[TCG]]'' limit to [[activate]] its first damaging effect up to thrice per turn is a reference to how, in {{episode|5D's|091|ref}}, this monster's damaging effect was used or considered a maximum of three non-consecutive times in one turn.
  ** On [[Lawton]]'s first turn, its effect was used in two sequences (five cards the first time, then [[Kalin Kessler]] interrupted the second time with "[[Infernity Doom Slinger (anime)|Infernity Doom Slinger]]"). 
  ** On Lawton's second turn, its effect was used in two sequences (the first was interrupted by "[[Dodge Roll]]", and the second was interrupted by "[[Half Shield]]"). Lawton considered using this monster's effect a third time, but this would have caused him to lose the Duel during Kalin's next [[Battle Phase]].
  * This monster's ''OCG''/''TCG'' effect to inflict 500 damage for each of the opponent's [[Attack Position]] monsters and end the Battle Phase is based on "[[Back Attack Ambush]]", a [[Trap Card]] used by Lawton in the above-mentioned in response to this monster being attacked, which allowed him to end the Battle Phase, [[Special Summon]] any number of "[[Ambush Token]]s" for each Attack Position monster the opponent [[control]]s, then [[Tribute]] each "Ambush Token" and inflict 500 damage to the opponent.
