title: Card Trivia:Prank-Kids Place
wikitext: |-
  {{Navigation}}

  * This house can be seen from the outside in the artworks of "[[Prank-Kids Meow-Meow-Mu]]" and "[[Prank-Kids Rocket Ride]]".
  ** The inside is depicted in the artworks of "[[Prank-Kids Weather Washer]]", "[[Prank-Kids Dodo-Doodle-Doo]]", "[[Prank-Kids Bow-Wow-Bark]]", "[[Prank-Kids Rip-Roarin-Roaster]]", "[[Prank-Kids Pranks]]", "[[Prank-Kids Pandemonium]]", and "[[Prank-Kids Plan]]".
