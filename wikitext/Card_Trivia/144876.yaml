title: Card Trivia:Gem-Knight Emerald
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:emerald|emerald]], a type of [[wikipedia:gemstone|gemstone]].
  * This card has a "[[lswarm]]" counterpart, "[[Evilswarm Heliotrope]]".
  * According to the [[Duel Terminal Master Guide card storylines]], this monster has a combined [[WIND]] "[[Daigusto]]" [[Xyz]] [[retrain]] with an unnamed [[Gusto]] monster: "[[Daigusto Emeral]]".
  ** Both are [[Rock-Type]].
  ** Both have [[1800 ATK Monster Cards|1800 ATK]]/[[800 DEF Monster Cards|800 DEF]].
  ** This monster ([[Level 4]]) can be used as [[Xyz Material|material]] for the [[Xyz Summon]] of "Daigusto Emeral]] ([[Rank 4]]).
