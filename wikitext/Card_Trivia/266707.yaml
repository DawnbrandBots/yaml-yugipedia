title: Card Trivia:Interplanetarypurplythorny Beast
wikitext: |-
  {{Navigation}}

  * This is the 2nd "Interplanetarypurplythorny" monster to be released; the 1st was the [[TCG]]-exclusive "[[Interplanetarypurplythorny Dragon]]".
  * This card is a [[counterpart]] to "Interplanetarypurplythorny Dragon".
  ** "Beast" has inverted [[ATK]] and [[DEF]] values compared to those of "Dragon".
  ** While "Dragon" is Summoned from the hand, "Beast" is Summoned from the [[Graveyard]].
  ** Also, "Beast" can only be Summoned after a monster you control is destroyed by battle, whereas "Dragon" can be Summoned after a monster you control is destroyed by either battle or card effect.
