title: Card Trivia:Goblin's Secret Remedy
wikitext: |-
  {{Navigation}}

  * This card has a polar opposite counterpart: "[[Final Flame]]".
  * In its re-release in the German and Spanish versions of the [[Legend of Blue Eyes White Dragon (25th Anniversary Edition)|25th Anniversary Edition]] of the ''[[Legend of Blue Eyes White Dragon]]'' [[booster pack]], this card is given an [[archetype condition]] that treats it as a "[[Goblin]]" card. This is due to how prior to the first introduction of the "Goblin" archetype, the German and Spanish words for "goblin" are "''kobolds''" and "''trasgo''".
