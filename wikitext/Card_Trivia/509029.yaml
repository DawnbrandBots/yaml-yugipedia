title: Card Trivia:Brainwashing Beam
wikitext: |-
  {{Navigation}}

  * "[[Alien Grey]]" appears in this card's artwork.
  * This card's effects are similar to that of "[[Alien Hypno]]".
  * This card's effect removing an [[A-Counter]], and its self-destruction effect likely reference the eventual abating of the "brainwashing" until the affected monster breaks free.
