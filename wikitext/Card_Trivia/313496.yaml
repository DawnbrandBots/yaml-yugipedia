title: Card Trivia:Leonardo's Silver Skyship
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Leonardo da Vinci|Leonardo da Vinci]]'s flying ship design shown in the [[wikipedia:Codex Atlanticus|Codex Atlanticus]], on [http://www.museoscienza.org/english/leonardo/models/macchina-leo.asp?id_macchina=25 folio 860].
  ** This card, along with "[[The Twin Kings, Founders of the Empire]]", have a common Italian theme, as they were first given out at the [[World Championship 2014]], which was held in [[wikipedia:Rimini|Rimini]], Italy.
  * This card, along with "The Twin Kings, Founders of the Empire", are the first [[Match winner]] [[Pendulum Monster]]s.
  * This card and "The Twin Kings, Founders of the Empire" are the first [[Main Deck]] Match winners that can be Special Summoned.
  * This is the first Match winner [[Normal Monster]].
  ** It is also the first [[illegal]] Normal Monster in the ''[[TCG]]'', while it is the second illegal Normal Monster in the ''[[OCG]]'', the first being "[[Black Luster Soldier (Normal)|Black Luster Soldier]]".
  * This is the first and currently only [[WIND]] Match winner.
  * This card has the highest [[Pendulum Scale]] (10) without any negative [[Pendulum Effect]] or restrictions on what monsters can be [[Pendulum Summon]]ed with it as a Pendulum Scale.
  * This card has the lowest [[ATK]] (0) of all Match winner monsters.
  ** This card is also the only Match winner that does not require itself to attack directly and reduce the opponent's [[Life Point]]s to 0 to win the [[Match]].
