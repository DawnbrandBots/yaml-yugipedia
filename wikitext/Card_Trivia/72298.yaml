title: Card Trivia:The Second Sarcophagus
wikitext: |-
  {{Navigation}}

  * "[[The Third Sarcophagus]]" appears inside the coffin in this card's artwork.
  * This card is based off of the [[wikipedia:Ancient Egyptian Burial customs|real-world structure of ancient Egyptian sarcophagi]] where the mummified body would be held inside of multiple, consecutively smaller coffins made of different materials and styles. This card depicts a wooden coffin , which would rest inside of [[The First Sarcophagus|a protective stone coffin]]. These coffins tended to be highly ornate and depict the deceased persons' face, wig and collar, with the image of winged scarabs over the body, which is depicted in this card's artwork.
