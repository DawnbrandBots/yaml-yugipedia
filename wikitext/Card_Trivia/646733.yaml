title: Card Trivia:Marincess Great Bubble Reef
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Sea foam|Sea foam]].
  * This card's name is a reference to the [[wikipedia:Great Barrier Reef|Great Barrier Reef]].
  * This monster appears in the artwork of "[[Marincess Circulation]]".
  * This monster's appearance is based on [[Miyu Sugisaki]], the origin of [[Aqua (character)|Aqua]], and the childhood friend of [[Skye Zaizen]], who wielded a "[[Marincess]]" [[Deck]] during the later episodes of the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
