title: Card Trivia:Lyrilusc - Ensemblue Robin
wikitext: |-
  {{Navigation}}

  * Visually, this monster is based on [[Lulu Obsidian]], who used the "[[Lyrilusc]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This monster is also based on the [[wikipedia:Siberian blue robin|Siberian blue robin]], where its Japanese name is "''koruri''" (コルリ), whereas "''ruri''" references the original Japanese name of Lulu Obsidian, "Ruri Kurosaki".
  ** This monster is also wearing a wing-shaped barrette in its hair, similar to Lulu's wing-shaped barrette.
