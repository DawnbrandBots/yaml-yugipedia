title: Card Trivia:Ushi Oni
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Ushi-oni|ushi-oni]], a ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore who is depicted as a bovine-headed demon.
  * This monster has an [[Card evolutions|upgraded]] version: "[[Giant Ushi Oni]]".
  * In ''[[Yu-Gi-Oh! Forbidden Memories]]'', this monster can be summoned with one [[Jar]] (or any pot-like) monster and [[DARK]] [[Spellcaster]] monster.
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', [[Bolt Tanner (World Championship)|Bolt Tanner]] gives this card to the protagonist and show it to the owner of the bar [[Bootleg]]; however, the player cannot use this card in Duels.
