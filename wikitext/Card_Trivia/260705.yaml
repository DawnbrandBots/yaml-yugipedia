title: Card Trivia:Xyz Reception
wikitext: |-
  {{Navigation}}

  * "[[Adreus, Keeper of Armageddon]]", "[[Madolche Butlerusk]]" and "[[Madolche Magileine]]" appear in this card's artwork.
  ** "Magileine" is [[target]]ed by this card's effect, while "Butlerusk", who shares the same [[Level]] (4) as "Magileine", is [[Special Summon]]ed from the hand. The opposing "Adreus" fulfills this card's anime activation requirement.
