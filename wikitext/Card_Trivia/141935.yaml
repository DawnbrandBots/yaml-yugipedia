title: Card Trivia:Star Boy
wikitext: |-
  {{Navigation}}

  * This card has an [[Card evolutions|upgraded]] [[Link Monster]] version: "[[Mistar Boy]]".
  * This card's effect is opposite to that of "[[Little Chimera]]".
  * This card's French [[Metal Raiders]] print mistakenly uses "[[Muka Muka]]'s" lore. An erratum [http://web.archive.org/web/20040613011649/http://www.upperdeckentertainment.com/yugioh/fr/forbidden.htm was issued] on [[Upper Deck Entertainment]]'s official site to correct this, and it was fixed in all later reprints.
