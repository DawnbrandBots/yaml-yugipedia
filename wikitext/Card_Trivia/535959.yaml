title: Card Trivia:Spirit of the Pharaoh
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Pharaoh's Inheritance]]''.
  * This monster appears in the artwork of "[[Delta Barrier]]".
  * The [[Eye of Wdjat]] appears in this card's artwork.
  * This monster is based on a [[wikipedia:Pharaoh|pharaoh]], the term for a monarch in ancient Egypt.
  ** This monster's pauldrons features the heads of the Egyptian gods [[wikipedia:Ra|Ra]] and [[wikipedia:Anubis|Anubis]] on the pauldrons on his shoulders.
  *** In ancient Egyptian mythology, Ra was the Egyptian god of the sun (reflected by this monster's [[LIGHT]] [[Attribute]]), while Anubis was the Egyptian god of death (reflected by this monster's [[Zombie]] [[Type]]).
  ** This monster's design features the image of a [[wikipedia:Scarab|scarab]] on the pleated section of this monster's kilt. In ancient Egyptian mythology, the scarab is considered the symbol of resurrection, reflecting this monster's effect to [[Special Summon]] [[Level 2]] or lower [[Zombie]] [[Normal Monster]]s from the [[Graveyard]].
  * This is the [[signature card]] of [[Abidos the Third]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
