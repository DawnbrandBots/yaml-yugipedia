title: Card Trivia:Eria the Water Channeler
wikitext: |-
  {{Navigation}}

  * "[[Gigobyte]]" and the familiar of "[[Eria the Water Charmer, Gentle]]" appear in this card's artwork.
  * This monster is an [[Card evolutions|older]] form of "[[Eria the Water Charmer]]".
  * The familiar that appears in this card's artwork is similar to the ''[[wikipedia:Glaucus atlanticus|Glaucus atlanticus]]'', a species of sea slug with a blue color scheme and highly venomous appendages.
  ** The familiar in this card's artwork also appears in the artwork of "[[Eria the Water Charmer, Gentle]]".
