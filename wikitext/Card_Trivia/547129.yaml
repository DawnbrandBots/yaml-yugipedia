title: Card Trivia:Booster Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Tactical Exchanger]]".
  * A [[wikipedia:List of laser applications|laser sight]] is attached to this monster's head.
  * This card is a [[counterpart]] of "[[Security Dragon]]".
  ** Both are younger forms of the [[ace monster]]s of the protagonist and main rival in the ''[[Yu-Gi-Oh! VRAINS]]'' anime: [[Roken Kogami]]'s "[[Borreload Dragon (anime)|Borreload Dragon]]" for this card and [[Yusaku Fujiki]]'s "[[Firewall Dragon (anime)|Firewall Dragon]]" for "Security Dragon".
  *** The combined [[Link Arrow]]s of this card and "[[Overburst Dragon]]" are the same as those of "[[Borreload Dragon]]".
