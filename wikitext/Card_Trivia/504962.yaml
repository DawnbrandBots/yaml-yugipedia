title: Card Trivia:Red Process - Rubedo
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is one of four cards that represents the four stages of the ''[[wikipedia:Magnum opus (alchemy)|Magnum opus]]'' process. ("[[Black Process - Negledo]]" > "[[White Process - Albedo]]" > "[[Yellow Process - Kitolenics]]" > "'''Red Process - Rubedo'''")
  ** In this card's case, it is based on [[wikipedia:Rubedo|rubedo]] (or '''redness'''), which represents alchemical success and the end of the great work.
  *** Fittingly, this was the fourth and final "Process" card used by [[Lyman Banner|Amnael]] during his [[Duel]] against [[Jaden Yuki]] in {{episode|GX|046|ref}}.
  *** In alchemy, the process of redness is the fourth and final step in the pathway to the [[wikipedia:Philosopher's Stone|philosopher's stone]], which represents the achievement of enlightened consciousness and the total fusion of spirit and matter. The process of redness is also symbolized by the [[wikipedia:Phoenix (mythology)|phoenix]], reflecting this card's effect to [[Tribute]] "[[Helios Duo Megistus]]" to [[Special Summon]] "[[Helios Trice Megistus]]", whose attack can transform its solar flare into the shape of a phoenix.
