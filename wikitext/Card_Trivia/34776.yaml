title: Card Trivia:Big Piece Golem
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Call]]".
  * This monster has a [[DARK]] [[Fiend]] "[[Fiendish Golem]]"-based [[counterpart]]: "[[Fiend Piece Golem]]".
  * This is the only [[Piece Golem]] monster to feature a mouth in its design.
  * The progression of "[[Small Piece Golem]]", "[[Medium Piece Golem]]", and this monster shows an increase of exactly 500 ATK and 1 [[Level]] at each step.
