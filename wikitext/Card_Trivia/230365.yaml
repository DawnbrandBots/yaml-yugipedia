title: Card Trivia:Advance Zone
wikitext: |-
  {{Navigation}}

  * "[[Steelswarm Roach]]" and "[[Steelswarm Sentinel]]" appear in this card's artwork.
  ** This card's artwork likely references to how "Roach" is the adult form of "Sentinel".
  *** The ring surrounding "Sentinel" resembles a "[[Vylon]]" artifact.
  * "Advance" a reference to "'''Advance''' Summoning", the ''[[OCG]]'' term for [[Tribute Summon]]ing.
  ** Oddly, this card (and therefore its name) was first released in the ''[[TCG]]'', not the ''OCG''.
  * This card shares similarities with "[[Trial and Tribulation]]".
  ** Both are [[Spell Card]]s with three-bulleted effects that are dependent on the number of monsters [[Tribute]]d by the player, include [[draw]]ing 1 card and resolve in the [[End Phase]].
  ** Both were first released as [[Secret Rare]] ''TCG'' exclusive cards.
