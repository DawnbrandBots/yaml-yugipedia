title: 'Card Trivia:Number 1: Numeron Gate Ekam'
wikitext: |-
  {{Navigation}}

  * This monster's negative appears in the artwork of "[[Numeron Calling]]".
  * This monster's name is based on "''ekam''", the Sanskrit word for the number "one", matching its numerical value of this card and [[Rank]].
  * This monster has a "[[Number C]]" [[Card evolutions|upgraded]] form: "[[Number C1: Numeron Chaos Gate Sunya]]".
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when the other "[[Numeron Gate]]" monsters combined with this monster attacked, this monster Summoned a crocodile-like monster from its gate-like chest.
