title: Card Trivia:Praying Mantis
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are based on the [[Spell]]/[[Trap Card]]s used alongside it in {{chapter|R|012|ref}}.
  ** This monster's effect to [[return]] an opponent's attacking monster to the [[hand]] is based on "[[Forced Withdrawal]]", a Trap Card used by [[Mendo Cino]] while he controlled [[Praying Mantis (manga)|this monster]]. This effect's cost of [[send]]ing a card from the [[Spell & Trap Zone]] to the [[Graveyard]] references how "Forced Withdrawal" was activated from the Spell & Trap Zone, which would be sent to the Graveyard after it resolves.
  ** This monster's effect to [[Special Summon]] "[[Baby Mantis Token]]s" are based on the effect of "[[Mantis Egg]]", a [[Field Spell Card]] Mendo used while he controlled this monster, which can Special Summon a "Baby Mantis Token" during its controller's [[Standby Phase]]. The effect to Special Summon a "Baby Mantis Token" by [[banish]]ing this card from the [[Graveyard]] references how Mendo used the effect of "Mantis Egg" after he [[Tributed]] this card.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! R]]'' manga, specifically from the panel showing this monster being Summoned.
