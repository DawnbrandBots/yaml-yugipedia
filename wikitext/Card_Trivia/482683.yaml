title: Card Trivia:Performance Coliseum
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This Action Field resembles one setting from the opening, [[LIGHT OF HOPE]]. It also resembles "[[Acrobatic Circus]]" where [[Yuya Sakaki|Yuya]] and [[Declan Akaba|Declan]] first Dueled each other and is now Dueling each other on this field.
  * This is the last Action Field to be used in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
