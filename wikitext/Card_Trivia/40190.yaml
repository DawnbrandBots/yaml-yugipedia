title: Card Trivia:Dokurorider
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Revival of Dokurorider]]".
  * The word "dokuro" in this monster's ''[[TCG]]'' name is Japanese for "skull". This follows the pattern of many early monsters that included English words in their Japanese names being given Japanese words in their English names.
  * This is the first [[Ritual Monster]] to be released in the ''[[OCG]]'', first released in ''[[The Valuable Book 1]]''.
  ** This was also the only [[Zombie]] Ritual Monster in the ''OCG''/''TCG'' until the release of "[[Revendread Slayer]]" 18 years later.
  * This is one of the cards designed by [[Kazuki Takahashi]] that did not appear in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga. A rough sketch was included in {{Volume|Yu-Gi-Oh!|18|ref}}.
