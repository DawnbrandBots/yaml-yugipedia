title: Card Trivia:Tilting Entrainment
wikitext: |-
  {{Navigation}}

  * The red and blue [[Pendulum Scale]] crystals appear in this card's artwork as train decorations.
  * This monster's name and appearance features multiple puns:
  ** "Entrainment" is the physics term used to apply to a situation in which two or more oscillators match period, sometimes using pendulum clocks as an example. This is used as a pun on this monster, which appear as a pair of "trains" decorated with Pendulum Scale crystals, and features an effect that [[support]]s [[Pendulum Monster]]s.
  ** This monster is based on a [[wikipedia:Tilting train|tilting train]], a train with a mechanism that enables increased speed on a regular rail track. The first concept for this kind of tilting train carriage was called the "pendulum car", which further reflects this monster's Pendulum Monster support effect.
