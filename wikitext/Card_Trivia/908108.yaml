title: Card Trivia:Ni-Ni the Mirror Mikanko
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Mikanko Water Arabesque]]", "[[Mikanko Reflection Rondo]]", "[[Mikanko Rivalry]]", and "[[Mikanko Kagura]]".
  ** A younger version of this monster appears in the artworks of "[[Mikanko Promise]]" and "[[The Great Mikanko Ceremony]]".
  * This monster is named after ''[[wikipedia:Ninigi-no-Mikoto|Ninigi-no-Mikoto]]'' (瓊瓊杵尊), the grandson of the goddess ''[[wikipedia:Amaterasu|Amaterasu]]'' in Japanese mythology and an ancestor of the [[wikipedia:Emperor of Japan|Japanese imperial lineage]].
  * The cat motif of this monster is based on the ''[[wikipedia:Nekomata|nekomata]]'', a two-tailed cat ''[[wikipedia:Yōkai|yōkai]]'' from Japanese folklore.
  * The mirrors of this monster are based on the ''[[wikipedia:Yata no Kagami|Yata-no-Kagami]]'', a sacred bronze mirror and one of the three [[wikipedia:Imperial Regalia of Japan|Imperial Regalia of Japan]].
  ** According to ''[[The Valuable Book EX 3 card storylines#No. 07: Mikanko|The Valuable Book EX 3 card storylines]]'', this monster is from the 'Mikagami' branch family, named after the ''Yata-no-Kagami''.
  * This monster's design and the names of its associated [[Equip Spell Card|Equip Spells]] ("Mikanko Water Arabesque" and "Mikanko Reflection Rondo") are a reference to [[wikipedia:Rhythmic gymnastics|rhythmic gymnastics]] and [[wikipedia:Ballet|ballet]].
