title: Card Trivia:Alpacaribou, Mystical Beast of the Forest
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of ''[[wikipedia:Alpaca|alpaca]]'' and ''[[wikipedia:Caribou|caribou]]''.
  ** This monster's appearance also takes after the appearance of the two said mammals.
  * This card bears a powerful resemblance to the Great Forest Spirit from the 1997 anime film [[wikipedia:Princess Mononoke|Princess Mononoke]], including its caribou-like form and massive size, as well as its status as protector of a forest.
