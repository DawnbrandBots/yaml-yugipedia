title: Card Trivia:Kuribon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Present Card]]", "[[Trick Buster (manga)|Trick Buster]]", and "[[World of Spirits]]".
  * This monster's name is a portmanteau of "[[Kuriboh]]" and "ribbon".
  ** This monster is depicted wearing a ribbon, while the background of its artwork depicts colorful ribbon-like patterns.
  * This monster has a retrained [[counterpart]]: "[[Kuribon the Fairy Spirit]]".
  * This is the only monster related to the "[[Kuriboh (archetype)|Kuriboh]]" [[archetype]] to be a female.
  ** However, in the dubbed version of {{episode|5D's|018|ref}}, [[Professor Frank]] mistakenly referred to this monster as a "he", despite its feminine appearance.
  * This is the first monster related to the "Kuriboh" archetype that was not used by the main protagonist of the anime.
  * This is one of the few cards printed in Spanish that has the word "regresar" in its [[card text]] instead of "devolver" for the term "return".
