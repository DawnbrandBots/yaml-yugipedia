title: Card Trivia:Star Staring Starling
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (星向鳥, ''Hoshimukudori'') is a pun on the Japanese name of the [[wikipedia:common starling|common starling]] (星椋鳥, ''hoshimukutori'').
  ** This monster's name is also a pun on its appearance, as it is a common starling with breasts and a belly with a glittering pattern similar to a starry night sky. It is also depicted "staring" at the different berries that resemble [[Level]] stars.
  * The positioning and the clustering of the Level star-like berries in this card's artwork correspond with the number of Levels it will gain with its effect based on its position in the different [[Main Monster Zone]]s (from left to right: 4-1-2-1-3).
