title: Card Trivia:Mermail Abysslung
wikitext: |-
  {{Navigation}}

  * This card is very similar to "[[Command Knight]]".
  ** Both have the same [[ATK]] and [[Level]].
  ** Both have effects that restrict which monsters your opponent can target for attacks
  ** Both increase the [[ATK]] of certain monsters.
  ** This card has only 100 [[DEF]] less than "Command Knight".
  * This monster's name and design may be taken from Lungfish. Lungfish (also known as salamanderfish) are freshwater fish belonging to the subclass Dipnoi. Lungfish are best known for retaining characteristics primitive within the Osteichthyes, including the ability to breathe air, and structures primitive within Sarcopterygii, including the presence of lobed fins with a well-developed internal skeleton.
  * As the name may probably suggest, the chest part of this card where the lungs are residing is protected with tough armor, such as the nose part of [[Mermail Abyssnose]].
