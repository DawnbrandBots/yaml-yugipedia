title: Card Trivia:Xyz Entrust
wikitext: |-
  {{Navigation}}

  * "[[Black Ray Lancer]]" and "[[Number 39: Utopia]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|012|ref}} where [[Yuma Tsukumo]] [[equip]]s [[Reginald Kastle]]'s "[[Black Ray Lancer (anime)|Black Ray Lancer]]" with "[[Number 39: Utopia (anime)|Number 39: Utopia]]" via the effect of "[[Armored Xyz (anime)|Armored Xyz]]".
  ** This card's name references an earlier scene from the same episode where Shark "entrusts" Yuma with the victory in their [[Tag-Team Duel]] against [[Scorch]] and [[Chills]] by giving him "Armored Xyz" via the effect of "[[Final Offering]]" (known as "Last Entrust" in Japanese).

