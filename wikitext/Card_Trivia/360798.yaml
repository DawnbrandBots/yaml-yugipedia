title: Card Trivia:Rise to Full Height
wikitext: |-
  {{Navigation}}

  * "[[Superheavy Samurai Big Benkei]]" appears in this card's artwork.
  * This card's Japanese name refers to ''[[wikipedia:Benkei|Benkei]]'', the human that "Big Benkei" is based on, who died standing still in a daunting pose. The pose is also the basis for the Japanese artwork of the card "[[Armed Samurai - Ben Kei]]".
  ** The part where he died while remaining in the daunting pose might be referred by the "DEF becomes 0 at the end of turn" part of this card's effect, as the monster remains in Defense Position despite no longer having any defensive strength.
