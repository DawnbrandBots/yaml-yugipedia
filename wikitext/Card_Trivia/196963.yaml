title: Card Trivia:Chronomaly City Babylon
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Babylon|Babylon]], the capital city of the ancient [[wikipedia:Babylonian empire|Babylonian empire]].
  * This is the first [[Field Spell Card]] to [[support]] the "[[Chronomaly]]" [[archetype]] released in the ''[[OCG]]''/''[[TCG]]''.
  ** However, it is the second Field Spell Card to support the "Chronomaly" archetype to be revealed in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, with the first being "[[Sunken Kingdom]]".
