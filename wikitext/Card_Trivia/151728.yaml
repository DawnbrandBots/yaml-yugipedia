title: Card Trivia:Blackwing - Pinaki the Waxing Moon
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Shiva Dhanush|Pinaka]], the celestial bow wielded by [[wikipedia:Shiva|Shiva]], the Hindu god of destruction.
  ** This monster's title is named after the waxing crescent, the second [[wikipedia:Lunar phase|lunar phase]] of the moon, where the sunlight hits a rightmost portion of the moon after the "new moon", making the moonlight appear crescent-shaped.
  *** Fittingly, in [[wikipedia:Hinduism|Hindusim]], Shiva is represented by a crescent moon, which he wears on his head to represent his status as the master of time and to represent how he is a timeless deity.
  * This monster's pose mirrors that of "[[Blackwing - Sharnga the Waning Moon]]".
  ** Both are named after bows wielded by [[wikipedia:Hindu deities|Hindu deities]] and different lunar phases that face opposite directions.
  * This is the first "[[Blackwing]]" monster Summoned in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|014|ref}}, specifically from the panel showing [[Blackwing - Pinaki the Waxing Moon (manga)|this monster]] being Summoned, albeit with its eyes turned towards the viewer.
