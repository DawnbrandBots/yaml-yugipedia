title: Card Trivia:Treasure Dragon
wikitext: |-
  {{Navigation}}

  * "[[Pot of Avarice]]", "[[Sacred Sword of Seven Stars]]", and the statuette of "[[Felgrand Dragon]]" from the artwork of "[[Trade-In (Rush Duel)|Trade-In]]" appear in this card's artwork.
  ** Fittingly, all these cards allow the player to [[Draw a card|draw]] cards, like this card does.
  * A chibi version of this monster appears in the artwork of "[[7 Chance]]".
