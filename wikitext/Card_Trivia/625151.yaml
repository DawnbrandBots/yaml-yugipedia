title: Card Trivia:Evil HERO Adusted Gold
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legendary Duelists: Season 3]]''.
  * The comet from the [[Dimension World]] arc of the ''[[Yu-Gi-Oh! GX]]'' anime appears in this card's artwork, glowing blue as it did when [[The Supreme King]] was active.
  * This monster is the "[[Evil HERO]]" [[counterpart]] of  "[[Elemental HERO Captain Gold]]".
  ** Both share a similar [[Attribute]] ([[LIGHT]]), [[Level]] (4), and [[original ATK and DEF]] (2100/800).
  ** Both are game-original members of their respective "[[HERO]]" [[archetype]]s.
  ** Both have an effect where they can be [[discard]]ed to [[search]] of a specific [[Spell Card]] from the player's [[Deck]].
