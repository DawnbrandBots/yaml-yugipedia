title: Card Trivia:Masked Ninja Ebisu
wikitext: |-
  {{Navigation}}

  * This monster is based on Ebisumaru, the pudgy ninja character from the Konami video game series, ''[[wikipedia:Ganbare Goemon|Ganbare Goemon]]''.
  ** This monster is wearing a smiling mask, which is a possible reference to [[wikipedia:Ebisu (mythology)|Ebisu]], a god from [[wikipedia:Japanese mythology|Japanese mythology]] who is commonly depicted smiling.
  ** This monster is depicted standing on a roof with its left arm raised up high, similar to how "[[Goe Goe the Gallant Ninja]]" (who is specifically mentioned by this monster's effect and is based on the titular Goemon from the ''Ganbare Goemon'' series) is depicted in its own artwork.
  ** This monster's effect to [[return]] an opponent's [[Spell]]/[[Trap Card]]s is similar to that of "[[Lady Ninja Yae]]", who is also based on the character Yae from the ''Ganbare Goemon'' series.
