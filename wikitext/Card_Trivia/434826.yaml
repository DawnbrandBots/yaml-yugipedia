title: Card Trivia:The Legendary Exodia Incarnate
wikitext: |-
  {{Navigation}}

  [[File:Yu-Gi-Oh!_-_Duel_038_-_Exodia.png|thumb|right|369|Panel from Chapter 38, showing Sugoroku describing "Exodia" to Yugi.]]

  * This is the [[cover card]] of ''[[Millennium Deck]]'', and is also one of the cover cards of ''[[Millennium Box Gold Edition]]''.
  * This monster appears in the artworks of "[[Exxod Fires of Rage]]" and "[[Obliterate!!!]]".
  * This monster's Japanese name, "Summoned God Exodia", references a panel from {{chapter|Yu-Gi-Oh!|038|ref}}, where [[Yugi Mutou (manga)|Yugi Mutou]] has a flashback during his duel with [[Seto Kaiba (manga)|Seto Kaiba]], to the time that [[Sugoroku Mutou (manga)|Sugoroku Mutou]] told him about "Exodia". In the flashback, Sugoroku told Yugi: "In other words, no one has ever seen the mythical summoned god, Exodia... even me!".
  * This monster has a retrained [[Fusion Monster|Fusion]] [[counterpart]]: "[[The Unstoppable Exodia Incarnate]]".
  * This monster is the completed form of "[[Exodia the Forbidden One]]", as depicted by the "[[Forbidden One]]" cards.
  ** Its [[effect]]s parallel the effects of the other completed forms of "Exodia": "[[Exodia Necross]]" and "[[Exodius the Ultimate Forbidden Lord]]".
  ** This monster's immunity to card effects is a stronger form of the immunity of "Exodia Necross" to [[Spell Card|Spell]] and [[Trap Card]] effects and [[Destroyed by battle|destruction by battle]]. While "Exodia Necross" gains power the longer it remains on the [[field]], this monster loses power the longer it remains on the field. "Exodia Necross" requires all five "Forbidden One" cards to be in the [[Graveyard]] to stay in play; this monster [[return]]s the pieces from the Graveyard to the [[hand]].
  ** "Exodius the Ultimate Forbidden Lord" gains 1000 [[ATK]] for each [[Normal Monster]] in the player's Graveyard (for each "Forbidden One" card [[Exodius the Ultimate Forbidden Lord (anime)|in the anime]]), and can [[send]] a new monster to the Graveyard each time it attacks; this monster gains 1000 ATK for each "Forbidden One" monster in the player's Graveyard, and returns one of them to the hand each turn. The effect of "Exodius" allows the player to instantly win the game once it has [[battle]]d five times to send each "Forbidden One" monster to the Graveyard; this monster would need five turns to return all five "Forbidden One" monsters from the Graveyard to the hand, which would then trigger the [[victory condition]] of "Exodia the Forbidden One". "Exodius" in the anime is unaffected by the opponent's card effects; this monster is unaffected by all other card effects. Both are also [[Level 10]] monsters.
  * This is the only "Exodia" monster not to have the [[wikipedia:Ankh|ankh]] modified in its ''[[TCG]]'' card artwork.
  * This is one of the few cards to debut in a video game (''[[Yu-Gi-Oh! The Duelists of the Roses]]'') before being released as a physical card; in ''Yu-Gi-Oh! The Duelists of the Roses'' is not a playable card; instead, it appears in the library of a player who performs an "Exodia" instant win.
