title: Card Trivia:T.G. Halberd Cannon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[T.G. Close]]".
  * Three [[Synchro Summon]]ing rings appear in this card's artwork.
  ** This is a reference to the minimum number of [[Synchro Material]]s for this card's Synchro Summon.
  ** As such, this is the first [[Synchro Monster]] to require at least three Synchro Monsters as its Synchro Materials.
  * The letters "MA" in this monster's Japanese anime name (MAXXX-∞) references its [[Machine]] [[Type]], while the letters "XXX" is a reference to its [[Delta Accel Synchro Monster]] [[card type]].
  ** Additionally, "∞" in this monster's Japanese anime name is a reference to [[Antinomy]]'s allegiance to [[Iliaster]], where the other members use an infinity motif; [[Z-one]] uses "[[Endless Emptiness|Infinte Machine]]" and "[[Infinite Light (anime)|Infinite Light]]", [[Aporia]] and his [[Three Pure Nobles|embodiments]] use the "[[∞ (archetype)|∞]]" [[archetype]], and [[Paradox]] uses "[[Malefic Paradox Dragon (anime)|Malefic Paradox Dragon]]", whose tail features a design resembling the infinity symbol.
  * This monster is the [[Card evolutions|upgraded]] Delta Accel Synchro form of "[[T.G. Blade Blaster]]".
  * This monster has an upgraded "[[/Assault Mode]]" form: "[[T.G. Halberd Cannon/Assault Mode]]".
  * This monster has a counterpart: "[[T.G. Glaive Blaster]]".
  ** Both monsters are named after the polearm weapons they wield. In this monster's case, it is named after a [[wikipedia:Halberd|halberd]], a polearm consisting of an axe blade topped with a spike mounted on a long shaft.
  * This is the [[signature card]] of [[Antinomy]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This is the only signature card of the [[Iliaster's Four Stars of Destruction]] to be a Synchro Monster; the other three are [[Effect Monster]]s (Aporia's "[[Meklord Astro Mekanikle (anime)|Meklord Astro Mekanikle]]", [[Paradox]]'s "[[Malefic Truth Dragon (anime)|Malefic Truth Dragon]]", and Z-one's "[[Sephylon, the Ultimate Timelord (anime)|Sephylon, the Ultimate Timelord]]").
  * In the ''Yu-Gi-Oh! 5D's'' anime, this monster and "T.G. Blade Blaster" were the only "[[T.G.]]" monsters to not be treated also as [[Machine]] monsters, since their original [[Type]] is already Machine.
  * In {{episode|5D's|144|ref}}, during this monster's Summoning animation, a star turned into a supernova, and after it exploded, a giant black hole formed.
  ** This could be a reference to Z-one's future, where the excessive amount of Synchro Summons (the [[Delta Accel Synchro Summon]]) caused the [[Ener-D]] to go out of control, leading to the [[Meklord Emperor Genocide|destruction of the humanity]] (the supernova), and leaving in its place a lifeless ruined world (the black hole).
