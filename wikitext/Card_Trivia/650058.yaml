title: Card Trivia:Dragonmaid Ernus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragonmaid Welcome]]".
  * This monster is the dragon form of "[[Nurse Dragonmaid]]".
  ** This monster's ''[[TCG]]'' name is an anagram of "Nurse".
  ** This monster's Japanese name, "Erde", is the German word for "soil", reflecting its [[EARTH]] [[Attribute]].
