title: Card Trivia:Escalation of the Monarchs
wikitext: |-
  {{Navigation}}

  * "[[Thestalos the Mega Monarch]]" and "[[Mobius the Mega Monarch]]" appear in this card's artwork.
  * This card's artwork pays a homage to ''[[wikipedia:Dragon Ball Z|Dragon Ball Z]]'', with "Thestalos the Mega Monarch", which is red in color, working together with "Mobius the Mega Monarch", who is blue, to create an energy attack, just like [[W:c:dragonball:Jeice|Jeice]] and [[W:c:dragonball:Burter|Burter]] did when performing their [[W:c:dragonball:Purple Comet Attack|Purple Comet Attack]].
