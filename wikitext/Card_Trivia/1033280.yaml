title: Card Trivia:White Panda Without White Tail
wikitext: |-
  {{Navigation}}

  * This monster is a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[Without White Tail]] [[counterpart]] of "[[Frenzied Panda (Rush Duel)|Frenzied Panda]]".
  ** This monster's name serves as a joke, as [[wikipedia:Giant panda|pandas]] do not have tails that are naturally black; only the fur on its ears, limbs, shoulders, and around its eyes is naturally black.
  * This monster has a [[Praime]] counterpart: "[[Praime White Panda (later anime)|Praime White Panda]]".
