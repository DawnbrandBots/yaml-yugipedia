title: Card Trivia:Panzer Dragon
wikitext: |-
  {{Navigation}}

  * ''[[wikipedia:Panzer|Panzer]]'' (an abbreviated noun for ''Panzerkampfwagen'') is a German word for ''tank'' or ''armor''. It became a synonym for any [[wikipedia:tank|tank]] used by [[wikipedia:Germany|Germany]] during [[wikipedia:World War II|World War II]].
  * This monster's name, appearance, effect, and the fact that this card's a [[Fusion Monster]] may all be visual odes to the "[[A-to-Z]]" series, notably the original "Dragon Cannon"/"Tank Dragon"/"Tank Cannon" Fusion Monsters.
  ** Fittingly with this monster's [[Fusion Material]]s, [[Seto Kaiba]] (the first user of the "A-to-Z" series in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]) had both a [[Machine]] Deck and a [[Dragon]] Deck.
  * The device from the artwork "[[Parallel Panzer]]" seems to be modeled after this monster.
