title: Card Trivia:Mandragon
wikitext: |-
  {{Navigation}}

  * This monster is based off of the [[wikipedia:Mandrake (plant)|Mandragora]], commonly known as the "Mandrake". The plant is a powerful hallucinogen that was said to have its roots in the form of a small child that, upon being pulled from its earthen home, would emit a scream so terrible, it would kill anyone who heard it.
  ** In addition, this monster incorporates a musical instrument resembling a [[wikipedia:Mandolin|Mandolin]] or [[wikipedia:Mandore (instrument)|Mandore]] into its body– visible on its belly and head. This form also supports the monster's [[Plant]]-[[Type]], given that these instruments are traditionally made out of wood.
  * This card is the first Plant-Type [[Pendulum Monster]].
  * This card is tied with "[[Cyber-Tech Alligator]]" for the highest ATK of all Level 5 Normal Monsters.
  * This card has a counterpart: "[[Dragong]]".
