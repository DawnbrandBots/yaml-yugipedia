title: Card Trivia:Myutant M-05
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Myutant Beast]]".
  * This monster is a mutated form of "[[Myutant Mutant]]".
  ** This monster also has a mutated form: "[[Myutant Beast]]".
  *** Fittingly, the "M" in this card's name likely refers to its effect to [[search]] "[[Myutant]]" monsters from the [[Deck]].
