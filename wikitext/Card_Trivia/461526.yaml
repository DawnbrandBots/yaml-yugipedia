title: Card Trivia:Abyss Actor - Superstar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abyss Actor's Injury]]", "[[Abyss Actors Back Stage]]", "[[Abyss Actors' Curtain Call]]", "[[Abyss Actors' Dress Rehearsal]]", "[[Abyss Improv]]", "[[Abyss Script - Romantic Terror]]", "[[Set Rotation]]", and "[[Stand In]]".
  ** The statue in the artwork of "[[Abyss Playhouse - Fantastic Theater]]" is modeled after this monster.
  ** This monster's hairstyle serves as the design for the hat worn by "[[Abyss Actor - Twinkle Little Star]]".
  * This card's name is based on a [[wikipedia:Superstar|superstar]], a term used in [[wikipedia:acting|acting]] to describe an actor with great popular appeal and is widely known in the field of acting.
  * This is the [[signature card]] of [[Sylvio Sawatari]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
