title: Card Trivia:Heavy Freight Train Derricrane
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Revolving Switchyard]]".
  * This monster is based on the [[wikipedia:JNR Class DD51|JNR Class DD51]], a diesel-hydraulic locomotive type operated in Japan since 1962.
  ** This monster's appearance features a [[wikipedia:Derrick|derrick]], a type of [[wikipedia:Crane|crane]] with a movable pivoted arm used for moving or lifting heavy weights.
