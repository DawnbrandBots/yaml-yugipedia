title: Card Trivia:Giant Tortoise of Greed
wikitext: |-
  {{Navigation}}

  * The appearance of this tortoise's head and shell are based on "[[Pot of Greed]]" and "[[Jar of Greed]]", respectively.
  * This card's name and artwork is a pun on the words for "pot"/"jar" and "turtle"/"tortoise," which are spelt with the exact same kana sequence,「かめ」(''kame''), with the difference being both words' [[wikipedia:Japanese pitch accent|pitch accent]]s are different so they are not exact homophones.
  ** In the case of this card's name, the Japanese word for "turtle"/"tortoise", ''kame'', is predictably voiced as ''game'' in a compound, similar to "[[Jar Turtle]]".
