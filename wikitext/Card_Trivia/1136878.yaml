title: Card Trivia:Dogmatika Fleurdelis, the Thunderbolt
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Icejade Cradle]]" and "[[Swordsoul Emergence]]".
  * This monster is "[[Dogmatika Fleurdelis, the Knighted]]" after escaping imprisonment by the "[[Dogmatika]]", having had her left eye and stigmata half-transformed into '[[Despia|brands]]' by "[[Dogmatika Ashiyan]]", and before joining the "[[Swordsoul]]" as "[[The Iris Swordsoul]]".
  ** The latter's Japanese name, "{{Translated name|The Iris Swordsoul|ja}}", is a reference to this monster's corrupted left eye.
  ** According to concept art, the shackles on this monster are the same as those used for the "[[Bystial]]s".
