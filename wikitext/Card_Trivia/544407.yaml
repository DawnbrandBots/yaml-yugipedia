  * "[[Crystal Beast Ruby Carbuncle]]" and [[Jesse Anderson]] appear in this card's artwork.
  ** This card's artwork and effect is reference to the bond between Jesse and his "[[Crystal Beast]]" monsters, with [[Crystal Beast Ruby Carbuncle (character)|Ruby Carbuncle]] serving as Jesse's [[Spirit Partner]].
