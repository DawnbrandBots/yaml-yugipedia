title: Card Trivia:Abyssal Dragon Lord Abyss Poseidra (L)
wikitext: |-
  {{Navigation}}

  * One of the creatures in this card's artwork appears in the artwork of "[[Abysslayer Leviaknight]]".
  * This monster is based on the [[wikipedia:Hippocampus (mythology)|hippocampus]], a sea creature from [[wikipedia:Greek mythology|Greek mythology]] who is depicted with the upper body of a horse, and the lower body of a fish.
  ** According to Greek mythology, [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea, drives a chariot drawn by a group of hippocampi. This is reflected in this monster's association with "[[Abyssal Dragon Lord Abyss Poseidra]]", a [[Maximum Monster]] based on Poseidon.
