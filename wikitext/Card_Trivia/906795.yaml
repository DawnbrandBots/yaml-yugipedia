title: Card Trivia:Cyber Eternity Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Legendary Duelists: Season 2]]''.
  * This monster is a [[counterpart]] to "[[Cyber End Dragon]]".
  ** Both monsters require 3 Fusion Materials exactly.
  ** This card's ATK/DEF are the inverse of the ATK/DEF of "Cyber End Dragon".
  ** "Eternity" is a concept that contradicts the concept of an "end."
  ** "'''Eternal''' Evolution Burst" is the Japanese [[Attack and effect names in Yu-Gi-Oh! GX|attack name]] of "Cyber End Dragon" in the [[Yu-Gi-Oh! GX|anime]].
