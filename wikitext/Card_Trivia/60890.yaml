title: Card Trivia:Arduous Decision
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name reflects its effect, as it allows the player's opponent to choose one of the two player's cards at random, putting the opponent in a critical situation.
  * This card shares similarities with "[[Painful Choice]]":
  ** Both cards are [[Normal Spell Card]]s.
  ** Both cards share part of their Japanese names (''Kujū no Ketsudan'' for this card, and ''Kujū no Sentaku'' for "Painful Choice")
  ** Both cards feature artworks depicting people standing with at least one person shown to be in distress
  ** Both cards feature effects allowing the opponent to choose one card the player takes from the [[Deck]].
  ** Also, both cards debuted during [[Yu-Gi-Oh! - Episode 105|the same episode]] in the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
