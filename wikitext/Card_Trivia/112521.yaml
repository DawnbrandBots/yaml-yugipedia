title: Card Trivia:Burning Spear
wikitext: |-
  {{Navigation}}

  * This card has five [[Attribute]] counterparts: "[[Elf's Light]]" (for [[LIGHT]] monsters), "[[Gust Fan]]" (for [[WIND]] monsters), "[[Invigoration]]" (for [[EARTH]] monsters), "[[Steel Shell]]" (for [[WATER]] monsters), and "[[Sword of Dark Destruction]]" (for [[DARK]] monsters).
  * The Spanish printed name of this card lacks a capital letter in the word "''Burning''" ("''Ardiente''").
