title: Card Trivia:Noah's Arc
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on [[wikipedia:Noah's Ark|Noah's Ark]], a massive ship built by [[wikipedia:Noah|Noah]] upon instructions from [[wikipedia:God in Abrahamic religions|God]] to save himself, his family, and the world's animals from the [[wikipedia:Genesis flood narrative|Biblical flood]].
  ** This pun extends to [[Noah Kaiba]], who used "[[Shinato's Ark]]" as his [[Deck Master]] during the [[Virtual World (arc)|Virtual World arc]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This is the only Skill Card to not use art from either the ''[[Yu-Gi-Oh! Tag Force]]'' series or ''[[Yu-Gi-Oh! Duel Links]]''.
