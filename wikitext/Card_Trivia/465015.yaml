title: Card Trivia:Hymn of Light
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * The location depicted in this card's artwork also appears in the artwork of "[[Sprite's Blessing]]", hinting a connection between "[[Sauravis, the Ancient and Ascended]]" and "[[Saffira, Queen of Dragons]]", before both monsters got their "[[Voiceless Voice]]" retrained forms years later.
