title: Card Trivia:Sword Breaker
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Freezing Point]]", "[[Overlay Burglary]]", "[[Overlay Capture]]", and "[[Stoic Challenge]]" .
  * This monster's design features twenty-four visible weapons, including a [[wikipedia:morning star (weapon)|morning star mace]], a ''[[wikipedia:katana|katana]]'', a [[wikipedia:sabre|saber]], several [[wikipedia:kunai|kunai]], three [[wikipedia:grenade|grenades]], a bandolier of what appears to be [[wikipedia:shotgun shell|shotgun shells]], a [[wikipedia:shuriken|shuriken]], a [[wikipedia:battle axe|battle-axe]], a [[wikipedia:missile|missile]], [[wikipedia:drill bit|drill bits]] on its shoulder pads, a [[wikipedia:trident|trident]], a [[wikipedia:bow and arrow|bow]] and a few glowing spikes on its shoulder pads.
  * This monster appears to be an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[The Hunter with 7 Weapons]]", which features more weapons in its design, higher [[original ATK and DEF]], and a similar effect that [[activate]]s when battling a monster of the [[declare]]d [[Type]].
