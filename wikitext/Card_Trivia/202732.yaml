title: Card Trivia:Synchro Creed
wikitext: |-
  {{Navigation}}

  * "[[Naturia Barkion]]", "[[Naturia Landoise]]" and "[[Naturia Leodrake]]" appear in this card's artwork.
  * The word "Creed" is a pun on the [[Greed (series)|Greed]] [[series]] and its most famous member "[[Pot of Greed]]", which lets you [[draw]] two cards similarly to how this card can allow the player to draw up to two cards if there are at least three [[Synchro Monster]]s on the [[field]].
