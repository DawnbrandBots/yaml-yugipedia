title: Card Trivia:Surprising Zomvictory
wikitext: |-
  {{Navigation}}

  * "[[Uni-Zombie]]" appears in this card's artwork.
  ** The concept of a surprising victory may also refer to "[[Three-Legged Zombies]]", the card "Uni-Zombie" is a [[Card Evolutions|retrain]] of. In a [[wikipedia:Three-legged race|three-legged race]], a team with only 2 working legs winning would be a very surprising result. The photo that makes up this card's artwork could show the result of the pair winning their race and becoming friends, eventually becoming "Uni-Zombie" as a result.
