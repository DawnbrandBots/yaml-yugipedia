title: Card Trivia:Prank-Kids Pandemonium
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the inside of "[[Prank-Kids Place]]". The early, "unpossessed" forms of "[[Prank-Kids Battle Butler]]", "[[Prank-Kids Rocket Ride]]", and "[[Prank-Kids Weather Washer]]" also appear in this card's artwork, as well as a large number of "[[Prank-Kids Fansies]]", "[[Prank-Kids Lampsies]]", and "[[Prank-Kids Dropsies]]".
