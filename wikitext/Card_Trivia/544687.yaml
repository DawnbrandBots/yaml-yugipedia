title: Card Trivia:Inzektor Picofalena
wikitext: |-
  {{Navigation}}

  * This is the first "[[Inzektor]]" [[Link Monster]].
  * This card is based on the [[wikipedia:Dryocampa rubicunda|rosy maple moth]].
  * "Picofalena" is a combination of ''"piccola"'' and ''"falena"'', which are Italian for ''"small"'' and ''"moth"'', respectively.
