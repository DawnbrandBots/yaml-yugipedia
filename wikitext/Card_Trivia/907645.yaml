title: Card Trivia:Dramatic Rescue
wikitext: |-
  {{Navigation}}

  * This card appears in the international artwork of "[[Trap Sluzer]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' effect [[support]]ing the "[[Amazoness]]" [[archetype]] reference this card's appearances in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]] when [[Mai Kujaku (manga)|Mai Kujaku]] ([[Mai Valentine]] in the anime) used this card on "[[Amazoness Fighter]]" during her Duel against [[Dark Marik (manga)|Dark Marik]] ([[Yami Marik]] in the anime).
