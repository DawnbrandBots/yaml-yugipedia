title: Card Trivia:Dragunity Corsesca
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Corseque|corseque]] (or ''corsesca''), a 16th-century European pole weapon characterized by a long central spear-like blade flanked by two shorter, curved blades. Fittingly, this monster's design features a similar three-pronged formation on its head.
