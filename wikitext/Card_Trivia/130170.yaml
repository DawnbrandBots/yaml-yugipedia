title: Card Trivia:Blizzed, Defender of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This card has an almost identical name to fellow "[[Ice Barrier]]" monster "[[Defender of the Ice Barrier]]".
  ** Ironically, despite this card also being a "Defender of the Ice Barrier" and appearing to be in a defensive stance in the artwork, this card's effect does not involve any means of safeguarding or protection in fact, its effect activates when its ''[[destroy]]ed''.  "Defender of the Ice Barrier" on the other hand, does have such an effect, in that it bars certain monsters from [[attack]]ing.
