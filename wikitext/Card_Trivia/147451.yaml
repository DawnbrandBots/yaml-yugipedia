title: Card Trivia:Dromi the Sacred Shackles
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is based on Dromi, one of the three [[wikipedia:Legcuffs|fetters]] used by the [[Aesir|Nordic Gods]] to restrain the wolf creature [[wikipedia:Fenrir|Fenrir]] along with [[Gleipnir, the Fetters of Fenrir|Gleipnir]] and [[Raging Sacred Curse|Leyding]] in [[wikipedia:Norse mythology|Norse mythology]].
