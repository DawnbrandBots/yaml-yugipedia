title: Card Trivia:Cloudian - Altus
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Altostratus cloud|altostratus cloud]], the middle-altitude variation of the [[wikipedia:stratus cloud|stratus clouds]].
  ** This monster's thick design and the dark cloudy background in this card's artwork is likely a reference to how altostratus clouds thicken when producing precipitation, which turns them darker.
