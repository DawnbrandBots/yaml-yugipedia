title: Card Trivia:Backup Team
wikitext: |-
  {{Navigation}}

  * Three of the athletes from the artwork of "[[Way Where There's a Will]]" appear in this card's artwork.
  * The background in this card's artwork features the ULTRA logo used by "[[U.A.]]" monsters.
  ** The monster in the middle is holding the same type of [[wikipedia:Baseball bat|baseball bat]] as "[[U.A. Mighty Slugger]]" and "[[U.A. Player Manager]]".
  ** The monster on the right is holding the same type of [[wikipedia:Ball (gridiron_football)|American football]] as "[[U.A. Playmaker]]".
  * The athletes in this card's artwork are posed in the same manner as the warriors in the artwork of "[[Backup Soldier]]", which also shares a similar name with this card.
