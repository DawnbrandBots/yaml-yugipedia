title: Card Trivia:Supreme Machine Magnum Overlord
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Strongest Battle Deck Yuga - Hyper Machine Road]]'', as well as one of the cover cards of ''[[Maximum Ultra Enhancement Pack]]''.
  * This monster appears in the artwork of "[[Cranked to Ten!!]]" in [[Maximum Mode]] (together with "[[Supreme Machine Magnum Overlord (L)|Supreme Machine Magnum Overlord [L]]]" and "[[Supreme Machine Magnum Overlord (R)|Supreme Machine Magnum Overlord [R]]]").
  * This monster has three [[counterpart]]s: "[[Supreme Beasteam Magnum Overlord]]", "[[Supreme Railartillery Magnum Overlord]]", and "[[Supreme Skystream Magnum Overlord]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (10), [[Type]] ([[Machine]]), [[original ATK and DEF]] (1900/0), and [[MAXIMUM ATK]] (4000) with the above-mentioned monsters.
