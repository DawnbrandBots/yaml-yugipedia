title: Card Trivia:Vilepawn Salmon Token
wikitext: |-
  {{Navigation|mode=token}}

  * The ''[[OCG]]''/''[[TCG]]'' names of this token are based on those of "[[Vilepawn Archfiend]]".
  ** Similarly, the other "Salmon" cards' names correspond to the chess-themed "Archfiend" cards, i.e. "[[Terrorking Salmon]]" to "[[Terrorking Archfiend]]", and "[[Infernalqueen Salmon]]" to "[[Infernalqueen Archfiend]]".
