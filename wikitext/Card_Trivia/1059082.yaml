title: Card Trivia:Elemental HERO Burst Wingman
wikitext: |-
  {{Navigation}}

  * This monster is a ''[[Rush Duel]]''-exclusive [[counterpart]] of "[[Elemental HERO Flame Wingman]]".
  ** This is also the first ''Rush Duel''-exclusive [[Elemental HERO (Rush Duel)|Elemental HERO]] [[Fusion Monster]].
  * This monster is similar to "[[Elemental HERO Phoenix Enforcer]]".
  ** Both are [[FIRE]] alternate counterparts of "Elemental HERO Flame Wingman".
  ** This monster has the body of "[[Elemental HERO Avian (Rush Duel)|Elemental HERO Avian]]" with a pair of wings made of the flames of "[[Elemental HERO Burstinatrix (Rush Duel)|Elemental HERO Burstinatrix]]", while the body of "Phoenix Enforcer" is mainly based on "[[Elemental HERO Burstinatrix]]" with the wings of "[[Elemental HERO Avian]]"; like "Flame Wingman", this monster has only one arm based on "Burstinatrix", but it is the left arm instead of the right.
  * This monster and "[[Elemental HERO Flame Wingman (Rush Duel)|Elemental HERO Flame Wingman]]" are the first Elemental HERO Fusion Monsters in ''Yu-Gi-Oh! Rush Duel''.
