title: Card Trivia:Basilius, Familiar of the Evil Eye
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Evil Eye Awakening]]", "[[Evil Eye Confrontation]]", "[[Evil Eye Defeat]]", "[[Evil Eye Mesmerism]]", and "[[Imprudent Intrusion]]".
  ** This monster's spectral form appears in the artwork of "[[Evil Eye Reemergence]]".
  * This monster is based on the [[wikipedia:Basilisk|Basilisk]], a large serpent that could cause death with a single glance.
