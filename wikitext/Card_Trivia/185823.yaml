title: Card Trivia:Chronomaly Colossal Head
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chronomaly Pyramid Eye Tablet]]" and "[[Chronomaly Resonance]]".
  * This monster is based on the [[wikipedia:Olmec colossal heads|Olmec colossal heads]], a series of human heads carved out of large basalt boulders dating back to the [[wikipedia:Olmecs|Olmec]] civilization of ancient [[wikipedia:Mesoamerica|Mesoamerica]].
