title: Card Trivia:Fantastic Striborg
wikitext: |-
  {{Navigation}}

  * "Striborg" in this card's name is a portmanteau of the word "[[wikipedia:Cyborg|cyborg]]" and the name [[wikipedia:Stribog|Stribog]], the latter being the name of the god of winds and storms in Slavic mythology.
  ** Furthermore, this card's Japanese name of "Whirlwind Machine" (旋風機 ''Senpūki'') is a pun on the Japanese term for "electric fan" (扇風機 ''Senpūki'').
  ** "Fantastic" in this card's English name is a pun, since the adjective contains the word "fan" in it.
