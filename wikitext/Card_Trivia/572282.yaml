title: Card Trivia:Ghost Meets Girl - A Shiranui's Story
wikitext: |-
  {{Navigation}}

  * "[[Shiranui Squire]]" and "[[Dakki, the Graceful Mayakashi]]" appear in this card's artwork.
  * This card has a similar name to "[[Ghost Meets Girl - A Mayakashi's Manuscript]]", and their artworks also depict events from the same storyline. Specifically, "A Mayakashi's Manuscript" appears to show "[[Yuki-Onna, the Ice Mayakashi]]" attacking "Squire" ("[[Shiranui Skillsaga Supremacy]]") for having befriended "Dakki"/"[[Yoko, the Graceful Mayakashi]]" (as shown in this card's artwork), despite supposedly being enemies.
