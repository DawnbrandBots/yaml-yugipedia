title: Card Trivia:Thestalos the Mega Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Escalation of the Monarchs]]" and "[[The Monarchs Erupt]]".
  * This monster is an [[Card evolutions|upgraded]] Mega Monarch form of "[[Thestalos the Firestorm Monarch]]".
  * This monster has a combined form with "[[Caius the Shadow Monarch]]": "[[Thestalos the Shadowfire Monarch]]".
  * This card was featured in "[[Attack of the Giant Card!!]]" at a side event of the Origins Game Fair in Ohio on July 13, 2014, along with "[[Vampire Vamp]]", and "[[Gladiator Beast Nerokius]]".
