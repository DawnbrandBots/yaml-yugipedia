title: Card Trivia:Predaplast
wikitext: |-
  {{Navigation}}

  * "[[Predaplant Drosophyllum Hydra]]", "[[Predaplant Flytrap]]", "[[Predaplant Moray Nepenthes]]", "[[Predaplant Sarraceniant]]", and "[[Predaplant Squid Drosera]]" appear in this card's artwork.
  * This card's name features the word "plast", which refers to a [[wikipedia:Plastid|plastid]], a membrane-bound organelle found in the cells of plants.
