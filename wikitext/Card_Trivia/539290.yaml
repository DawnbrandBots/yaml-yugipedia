title: Card Trivia:The Kick Man
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Abare Ushioni]]" and "[[Kickfire]]".
  * This monster is likely a [[counterpart]] to "[[Chopman the Desperate Outlaw]]".
  ** Both are themed around a common type of combat move: this card depicts a monster with "'''I ♥ KICK'''" printed on his forehead, and "Chopman the Desperate Outlaw" is depicted with "'''I ♥ CHOP'''" on his forehead.
  ** Both cards have a similar effect that [[equip]]s an [[Equip Spell Card]] in the [[Graveyard]] to them when [[Summoned]].
  ** This monster's appearance in the card artwork of "Kickfire" parallels the role of "Chopman" in the artwork of "[[Backfire]]"; both "Backfire" and "Kickfire" are [[Continuous Trap Card]]s with damage-inflicting effects that require [[FIRE]] monsters to be destroyed.
