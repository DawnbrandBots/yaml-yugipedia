  * This monster is named after [[wikipedia:Caspar (magua)|Balthazar]], one of the three [[wikipedia:Biblical Magi|Biblical Magi]] who gave the gift of [[wikipedia:Frankincense|frankincense]] to the newly born [[wikipedia:Jesus|Jesus]].
