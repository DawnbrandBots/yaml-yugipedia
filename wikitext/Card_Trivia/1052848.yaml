title: Card Trivia:Photon Advancer
wikitext: |-
  {{Navigation}}

  * This monster's name reflects its effect to "advance" to the [[field]] by [[Special Summon]]ing itself from the [[hand]] when the player controls a "[[Photon]]" monster.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect allows it to gain 1000 [[ATK]] if there is another "Photon" monster on the field, making its ATK become 2000. This is an alteration of its effect in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, which allows its to gain ATK equal to the ATKs of all other "[[Photon Advancer (manga)|Photon Advancer]]" on the field, which is 1000. In the ''Yu-Gi-Oh! ZEXAL'' manga, two copies of this monster were Summoned, thus their ATK became 2000.
  * This card's artwork is taken from {{chapter|ZEXAL|037|ref}}, specifically from the panel showing this monster using its effect to Special Summon another copy of itself.
