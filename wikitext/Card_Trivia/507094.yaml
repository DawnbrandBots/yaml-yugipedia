title: Card Trivia:Amphibious Bugroth
wikitext: |-
  {{Navigation}}

  * This monster has three [[counterpart]]s: "[[Amphibious Bugroth MK-3]]", "[[Amphibious Bugroth MK-11]]", and "[[Ground Attacker Bugroth]]".
  ** This monster's name and its [[WATER]] [[Attribute]] are based on the [[flavor text]] of "Ground Attacker Bugroth", which refers to potential sea warfare capabilities.
  *** Fittingly, "Amphibious Bugroth" requires the [[EARTH]] "Ground Attacker Bugroth" and the WATER "[[Sentinel of the Seas]]" (mistakenly listed as "Sentinel of the Sea") as [[Fusion Material]]s.
  *** While the Japanese [[flavor text]] of "Ground Attacker Bugroth" indicates that it is going to ''become'' "Amphibious Bugroth" (陸上戦闘ロボット。今はダメだが、海でも使えたらしい。 ''A surface battle robot. It is no good now, but it seems that it could be used in the sea.''), its English flavor text indicates that it was ''previously'' "Amphibious Bugroth" (''A surface battle robot that was once used for sea warfare.'').
  *** In some earlier ''[[Yu-Gi-Oh!]]'' video games where it appears as a non-[[Fusion Monster]], this card's lore states that this monster is "Ground Attacker Bugroth" retrofitted with new technology to improve its capabilities.
