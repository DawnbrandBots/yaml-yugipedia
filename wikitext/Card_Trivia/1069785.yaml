title: Card Trivia:Wishes for Eyes of Blue
wikitext: |-
  {{Navigation}}

  [[File:Azure-Eyes and Maiden Chronicles.png|thumb|300px|"[[Maiden with Eyes of Blue]]" summons "[[Azure-Eyes Silver Dragon]]" in ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]''.]]

  * "[[Azure-Eyes Silver Dragon]]", "[[Dragon Shrine]]", and "[[Maiden with Eyes of Blue]]" appear in this card's artwork.
  ** This card's artwork is based on the short clip "Maiden with Eyes of Blue and Azure-Eyes Silver Dragon" from ''[[Yu-Gi-Oh! CARD GAME THE CHRONICLES (promotional video)|Yu-Gi-Oh! CARD GAME THE CHRONICLES]]'', where "Maiden with Eyes of Blue" summons "Azure-Eyes Silver Dragon" by praying at "Dragon Shrine".
  * This card's effect to [[equip]] a "[[Blue-Eyes White Dragon]]" with a "[[Blue-Eyes]]" monster from the [[Extra Deck]] and increase its 400 by [[ATK]] appears to be a reference to "[[Blue-Eyes Tyrant Dragon]]", who has 3400 ATK and can be Summoned via this method.

