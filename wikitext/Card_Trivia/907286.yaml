title: Card Trivia:Class-Change Mirror
wikitext: |-
  {{Navigation}}

  * This monster is the ''[[Rush Duel]]'' counterpart of "[[Job-Change Mirror]]".
  ** This monster's [[original ATK and DEF]] (1300/800) is an inversion of those of "Job-Change Mirror's" original [[ATK]] and [[DEF]] (800/1300).
  ** This monster's effect [[support]]ing "[[Summoned Skull (Rush Duel)|Summoned Skull]]" likely references its appearance in the ''[[Yu-Gi-Oh! Forbidden Memories]]'' and ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' video games, in which [[Job-Change Mirror (FMR)|this]] [[Job-Change Mirror (DOR)|monster]] can Summon "[[Summoned Skull (DOR)|Summoned Skull]]" by fusing it with another [[Fiend]] monster.
