title: Card Trivia:Dark Requiem Xyz Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] form of "[[Dark Rebellion Xyz Dragon]]".
  ** This monster is named after a [[wikipedia:Requiem|requiem]], a [[wikipedia:Mass (liturgy)|Mass]] in the [[wikipedia:Catholic Church|Catholic Church]] offered for the repose of the soul or souls of one or more deceased persons.
  *** Fittingly, this monster's wings feature a [[wikipedia:Stained glass|stained glass]] pattern, similar to the windows of churches and other religious buildings.
  *** This monster represents [[Yuto]]'s grief for leaving his friends of [[The Resistance]] to the mercy of [[Duel Academy (ARC-V)|Duel Academy]], who [[Human Sealing Technology|turned many of them into cards]] as a result, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** This is the only upgraded form of the [[Four Dimensional Dragons]] to have a different name ("Requiem") than its base form, instead of a different adjective.
  * This monster has an "[[Odd-Eyes]]" [[Xyz Pendulum Monster|Xyz Pendulum]] [[counterpart]]: "[[Odd-Eyes Rebellion Dragon]]".
  * This monster is the [[Xyz Dimension]] counterpart of "[[Crystal Wing Synchro Dragon]]" and "[[Greedy Venom Fusion Dragon]]".
  ** They are the evolved form of one of the [[Four Dimensional Dragons]]: "Dark Rebellion Xyz Dragon" for this monster, "[[Clear Wing Synchro Dragon]]" for "Crystal Wing", and "[[Starving Venom Fusion Dragon]]" for "Greedy Venom".
  ** They are one [[Level]]/[[Rank]] higher than their base form, and have 3000 [[ATK]] and 2500 [[DEF]], except "Greedy Venom", which is two Levels higher and has 3300 ATK.
  ** They have effects that increase their ATK equal to an opponent's monster's ATK, except "Greedy Venom", which decreases the opponent's monster's ATK.
  ** In the ''Yu-Gi-Oh! ARC-V'' anime, they all debuted during a [[Duel]] against someone from the [[Fusion Dimension]] that took place in their corresponding [[Four Dimensions|dimension]].
  *** This monster debuted in [[Yuya Sakaki]]/Yuto's Duel against [[Aster Phoenix (ARC-V)|Aster Phoenix]] in the Xyz Dimension in {{episode|ARC-V|110|ref}}.
  *** "[[Crystal Wing Synchro Dragon (anime)|Crystal Wing Synchro Dragon]]" debuted in [[Yugo]]'s Duel against [[Celina]] in the [[Synchro Dimension]] in {{episode|ARC-V|085|ref}}.
  *** "[[Greedy Venom Fusion Dragon (anime)|Greedy Venom Fusion Dragon]]" debuted in [[Yuri]]'s Duel against Aster Phoenix, [[Kite Tenjo (ARC-V)|Kite Tenjo]], and Yugo in the Fusion Dimension in {{episode|ARC-V|130|ref}}.
  ** They were all created when Yuya entered a state of mind with one of his [[dimensional counterparts]].
  *** This monster was created after Yuya was possessed by Yuto.
  *** "Crystal Wing" was created after Yuya [[Synchronize (ability)|synchronized]] with Yugo.
  *** "Greedy Venom" was created by Yuri on his own, although Yuya was [[awakened]] at the time.
  ** In the anime, they were Summoned using their corresponding base form and a card of the archetypes their owner used.
  *** "[[The Phantom Knights' Rank-Up-Magic Launch (anime)|The Phantom Knights' Rank-Up-Magic Launch]]" of the "[[The Phantom Knights]]" monsters for this monster.
  *** "[[Speedroid Red-Eyed Dice (anime)|Speedroid Red-Eyed Dice]]" of the "[[Speedroid]]" monsters for "Crystal Wing".
  *** "[[Predaplant Sarraceniant (anime)|Predaplant Sarraceniant]]" of the "[[Predaplant]]" monsters for "Greedy Venom", via "[[Super Polymerization (later anime)|Super Polymerization]]".
  * This is the first [[Rank 5]] [[Dragon]] [[Xyz Monster]].
  * In the anime, this monster required 2 Level 5 monsters as [[Xyz Material]]s, while in the ''[[OCG]]''/''[[TCG]]'', this card requires 3 Level 5 monsters, to reflect how [[Rank-Up]] upgraded forms require one more [[material]] than their base form.
