title: Card Trivia:Karakuri Klock
wikitext: |-
  {{Navigation}}

  * This is an upgraded "[[Karakuri]]" version of "[[Justi-Break]]" or "[[Froggy Forcefield]]", as it destroys all of your opponent's monsters regardless of battle position and which side of the field the monster is on.
  * The symbols on the clock are for the 12 animals of the Chinese Zodiac instead of the numbers 1-12.
