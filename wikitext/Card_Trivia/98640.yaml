title: Card Trivia:D - Spirit
wikitext: |-
  {{Navigation}}

  * The buildings from "[[Dark City]]" appear in this card's artwork.
  ** This card's artwork is a reference to its effect, as the defenseless person activating the wristwatch with the "[[Destiny HERO]]" insignia on it is either calling for help from the "Destiny HEROs" or transforming into one, reflecting this card's effect of Special Summoning a "Destiny HERO" monster from the hand while the player has no "Destiny HERO" monsters.
  * This card is the "Destiny HERO" version of the "[[Elemental HERO]]" support card, "[[Fake Hero]]", but without the cost of sending the monster back to the hand.
