title: Card Trivia:Stardust Sifr Divine Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Phantasmal Lord Ultimitl Bishbaalkin]]".
  * "Sifr" (صفر) is Arabic for the number 0, and is also the origin for the word "cipher".
  * This card is a [[Duel Dragon]] counterpart to "[[Shooting Quasar Dragon]]". Just as "Quasar" was Summoned by combining all of the [[Signer Dragon]]s, this card was Summoned by combining all of the [[Duel Dragons]].
  ** It should be noted however that this card bears more physical resemblance to "[[Shooting Star Dragon]]"; with the exception of the wings, the two dragons are otherwise similar in appearance.
  * This card strongly resembles the multiple winged dragon at the end of [[Future Colors]].
