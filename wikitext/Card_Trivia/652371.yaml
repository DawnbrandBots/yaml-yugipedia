title: Card Trivia:Appliancer Kappa Scale
wikitext: |-
  {{Navigation}}

  * This monster is based on a ''[[wikipedia:Kappa (folklore)|kappa]]'', a river creature in Japanese folklore who is depicted with a humanoid reptilian body with a dish on its head.
  ** This card's artwork features a bunch of fresh cucumbers, which are known to be a kappa's favorite food in Japanese folklore.
  ** This monster's name and design are based on a [[wikipedia:Weighing scale|weighing scale]], a device designed to measure the weight and mass of an object.
