title: Card Trivia:Krystal Avatar
wikitext: |-
  {{Navigation}}

  * This card is similar in many ways to "[[Aura Armor]]". Both are Trap Cards which respond to a direct attack and summon a humanoid entity to protect the player (this card summons itself, while "Aura Armor" creates a "[[Player Token]]") which has ATK determined by the player's LP.
  ** Like "Aura Armor", the anime version also requires the player to have 2000 LP or less in order to activate it.
