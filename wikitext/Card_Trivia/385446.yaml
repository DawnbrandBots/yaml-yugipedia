title: Card Trivia:Divine Dragon Lord Felgrand
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Revival of the Great Divine Dragon]]''/''[[Rise of the True Dragons Structure Deck]]''.
  * This monster is a [[retrained]] counterpart of "[[Felgrand Dragon]]".
  ** The statue of "Felgrand Dragon" that appears in the artwork of "[[Ruins of the Divine Dragon Lords]]" is depicted transforming into this monster in the artwork of "[[Return of the Dragon Lords]]".
  * This monster has a [[Zombie counterpart]]: "[[Skeletal Dragon Felgrand]]".
