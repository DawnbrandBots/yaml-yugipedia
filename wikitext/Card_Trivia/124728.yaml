title: Card Trivia:Attachment Dragon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card shares many parallels to the "[[Dragunity]]" [[archetype]] despite a four year gap between this card's appearance in the ''[[Yu-Gi-Oh! GX]]'' anime and the ''[[OCG]]'' [[Duel Terminal - Dragunity of the Hurricane!!|Duel Terminal that the archetype first debuted in]]. Like most of the archetype, this card is a [[WIND]]-[[Attribute]] [[Dragon]]-[[Type]] monster that can equip itself onto a monster, endowing it with its effect.
