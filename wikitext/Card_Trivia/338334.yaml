title: Card Trivia:Brain Dragon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Battle Constant]]".
  * This monster's effect references the Magic: The Gathering card "[https://gatherer.wizards.com/pages/card/Details.aspx?multiverseid=2497 Brainstorm.]" Like Brain Dragon, Brainstorm allows the player to draw three cards, then place two cards from their hand onto the top of their deck.
