title: Card Trivia:Primite Dragon Nether Berzelius
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Primite Fusion]]".
  * This monster is the [[Retrain|upgraded]] [[Fusion Monster|Fusion]] form of "[[Primite Dragon Ether Beryl]]".
  ** Fittingly, "Ether Beryl" is a suitable [[Fusion Material]] for the [[Fusion Summon]] of this monster. 
  ** The transformation of "Ether Beryl" into this monster is depicted in the artwork of "[[Primite Scream]]".
  * This monster is named after [[wikipedia:Jöns Jacob Berzelius|Jöns Jacob Berzelius]], a Swedish chemist credited with the discovery of the chemical element [[wikipedia:Silicon|silicon]] and the namesake of the mineral [[wikipedia:Berzelianite|berzelianite]].
  ** [[wikipedia:Beryl|Beryl]], the mineral from which the name of this monster's non-Fusion form "Ether Beryl" is partially derived, is a silicate mineral (i.e. a mineral at least partly consisting of silicon).
