title: Card Trivia:Mudora
wikitext: |-
  {{Navigation}}

  * This monster has a [[retrained]] counterpart: "[[Mudora the Sword Oracle]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|226|ref}}, specifically from the panel depicting [[Mudora (manga)|this monster]] attacking "[[Vorse Raider (manga)|Vorse Raider]]" while equipped with "[[Sword of Dogra (manga)|Sword of Dogra]]". However, this monster is depicted wielding one sword in its artwork instead of the two weapons that serve as "Sword of Dogra".
