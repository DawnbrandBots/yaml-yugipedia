title: Card Trivia:Twin-Headed Behemoth
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is based on the [[wikipedia:Behemoth|Behemoth]], an ancient beast first described in the Book of Job.
  * This is the first card to feature an effect that could only be used once per [[Duel]].
  * This was once the only [[Dragon]] monster to be [[Limited]].
  ** Unlike most other [[Forbidden]], [[Limited]] and [[Semi-Limited]] cards, this monster ''was'' Limited not because of its power, but because of its once per Duel restriction. Before the ruling and text change which would make it apply to all copies of the card, the restriction applied only to individual copies, so it would be impossible to keep track of which copy had used its effect already if any were shuffled back into the Deck and drawn again. It was Limited to prevent this.
  * This monster has two counterparts.
  ** A [[DARK]] counterpart: "[[Spin-Headed Behemoth]]".
  ** A retrained counterpart: "[[Triple-Headed Behemoth]]".
  * This card's number featured on this card from ''[[Rise of the Dragon Lords Structure Deck]]'' reads "[[SDRL-EN0010]]" instead of "[[SDRL-EN010]]".
