title: Card Trivia:Wind Pegasus @Ignister
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[A.I.'s Show]]".
  * The "[[@Ignister]]" logo is located in the orb within this monster's chest.
  * This monster represents the [[WIND]] [[Ignis]], [[Windy]].
  ** This monster's WIND [[Attribute]] and [[Spell]]/[[Trap]]-destruction effects reference how certain cards with Spell/Trap removal effects feature storm-themed artworks, including "[[Mystical Space Typhoon]]", "[[Heavy Storm]]", and "[[Raiza the Storm Monarch]]".
  *** This monster is based on the monsters each respectively used by Windy during his Duels against [[Varis]] and [[Soulburner]]: "[[Stormriderflagship Custom Bahamut Bomber]]", "[[Borreload Savage Dragon]]", and "[[Salamangreat Miragestallio]]".
  **** This monster's Spell/Trap destruction effect is a reference to Windy's Dueling style of getting rid of the opponent's Spell and Traps, as well as the effect of "Custom Bahamut Blaster" to destroy any number of Spell/Traps. This monster can destroy any number of cards up to the number of "@Ignister" monsters the player controls, while "Custom Bahamut Blaster" destroys as many cards as possible and inflicts 500 damage to the opponent for each card destroyed.
  *** This monster's [[Synchro Monster|Synchro]] type is a reference to "Borreload Savage Dragon", a Synchro Monster that debuted during [[Varis]]'s Duel against Windy, which resulted in his defeat and subsequent crippling from a virus that Windy was never able to fully recover from.
  *** This monster's winged equine design is a reference to "Salamangreat Miragestallio", a fiery-winged equine [[Xyz Monster]] used by [[Soulburner]] that contributed to Windy's downfall in his final Duel, which resulted in [[Flame]] absorbing Windy's data until their termination.
