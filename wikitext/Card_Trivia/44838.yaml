title: Card Trivia:Darkfire Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears similar to the dragon around the sword depicted in the artwork of "[[Salamandra]]".
  ** It is also similar to one of the heads of "[[Five-Headed Dragon]]".
  * While this card is available in ''[[Yu-Gi-Oh! World Championship 2008]]'', one of its [[Fusion Material]]s, "[[Firegrass]]", cannot be obtained.
