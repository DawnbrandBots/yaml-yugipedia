title: Card Trivia:Fire Formation - Kaiyo
wikitext: |-
  {{Navigation}}

  * This card is named after the ''[[wikipedia:Zeta Ursae Majoris|Zeta Ursae Majoris]]''.
  * "[[Brotherhood of the Fire Fist - Rhino]]" and "[[Brotherhood of the Fire Fist - Buffalo|Buffalo]]" appear in this card's artwork.
  * Like other "[[Fire Formation]]" cards, this card's effect is a variant on an existing Spell/Trap card, in this case "[[Meteorain]]".
