title: Card Trivia:Raise Body Heat
wikitext: |-
  {{Navigation}}

  * This the first [[Spell Card]] to feature a monster in its artwork.
  ** Ironically, despite this card's effect to increase a [[Dinosaur]] monster's [[ATK]], the monster in this card's artwork resembles a [[Fiend]] monster.
  * This card has a ''[[Rush Duel]]'' [[counterpart]]: "[[Dyna Body Heat]]".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this card's effect features a typo, as it can increase a [[Dragon]] and [[Reptile]] monster's ATK instead of a Dinosaur and Reptile monster's ATK.
