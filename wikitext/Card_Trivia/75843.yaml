title: Card Trivia:Burden of the Mighty
wikitext: |-
  {{Navigation}}

  * The crown of "[[King's Knight]]" (albeit turned upside down and holding the nest of baby birds) appears in this card's artwork.
  * This card appears in the artworks of "[[Number Spell Caster]]", "[[Photon Hurricane]]", and "[[Scarlet Security]]".
  * This card's name reflects the scene depicted in its artwork, which depicts the human hand reaching for the eggs in the bird's nest; however, the hand produces a sweat drop, likely indicating that the human is nervous about handling the baby birds while reaching for the eggs, forcing them to assume the "burden" of withholding their full strength to be more careful around handling both. 
  ** This reflects this card's effect to force the opponent's monsters to assume the "burden" of withholding their full "mighty" strength by lowering their [[ATK]] by 100 for each of their [[Level]]s.
  ** The artwork of "[[Delight of the Mighty]]" likely depicts the aftermath of the scene in this card's artwork, in which "[[Max Raider]]" successfully retrieves one of the eggs from the nest. Additionally, this card's name and effects are also referenced by "Delight of the Mighty".
