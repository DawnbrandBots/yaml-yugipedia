title: Card Trivia:Gradius' Option
wikitext: |-
  {{Navigation}}

  * "[[DUCKER Mobile Cannon]]" appears in this card's artwork.
  * This monster is based on an [[wikia:w:c:gradius:Option|Option]], a weapon featured in the ''[[wikipedia:Gradius|Gradius]]'' video game series.
  ** This monster's effect to [[Special Summon]] itself from the player's hand by [[target]]ing the [[face-up]] "[[Gradius]]" they [[control]] references how the Option can be deployed alongside the main playable spacecraft.
  ** This monster's effect to make its [[ATK]]/[[DEF]] the same as "Gradius" references how the Option uses the same weapons as the main playable spacecraft and provides them with additional firepower.
  ** This monster's effect to [[destroy]] itself if "Gradius" leaves the field references how the Options are indestructible, but can be automatically destroyed if the main playable ship is destroyed.
  * This is the first [[Monster Card]] with [[?]] ATK/DEF.
