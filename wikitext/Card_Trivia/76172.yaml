title: Card Trivia:Crow Tengu
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Tengu|Karasu-Tengu]]'', a legendary ''[[wikipedia:Yōkai|yōkai]]'' in [[wikipedia:Japanese folklore|Japanese folklore]] who is depicted as a robed humanoid spirit with the physical features of a crow.
  ** This monster's Japanese name in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga is shared with "[[Crow Goblin]]", another monster based on the ''Karasu-Tengu''.
  * This monster's ''[[OCG]]''/''[[TCG]]'' pose is taken from a panel from {{chapter|GX|022|ref}} showing [[Crow Tengu (manga)|this monster]] being Summoned.
