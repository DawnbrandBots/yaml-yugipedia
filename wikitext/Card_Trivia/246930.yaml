title: Card Trivia:Battlin' Boxer Glassjaw
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Battlin' Boxing Spirits]]", "[[Flaming Knockout]]", "[[Gouki Serpent Splash]]", and "[[Jolt Counter]]".
  * This monster's name is based on "[[wikipedia:Chin (combat sports)|glass jaw]]", a term used in the sport of [[wikipedia:Boxing|boxing]] referring to fighters with the limited ability to absorb punishment to the chin or jaw.
  ** This is further reflected with this monster's first effect, which immediately [[destroy]]s when [[target]]ed for an attack. Also, this monster's appearance is a visual pun on the term, as it features a jaw made of literal glass.
