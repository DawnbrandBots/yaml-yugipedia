title: Card Trivia:Witchcrafter Patronus
wikitext: |-
  {{Navigation}}

  * "[[Witchcrafter Edel]]", "[[Witchcrafter Pittore]]", "[[Witchcrafter Potterie]]", "[[Witchcrafter Schmietta]]", and a highly-stylized portrait of "[[Witchcrafter Madame Rilliona]]" appear in this card's artwork.
  ** In {{chapter|OCG Stories|Great Magic War|5|ref}}, which was released before "Madame Rilliona", the portrait is replaced with one that more accurately depicts [[Rilliona|the character]] as "[[Rilliona, the Magistus of Verre]]" instead, together with [[Emba]].
  * The word "Patronus" in this card's name is the Latin word for "patron" or "protector".
