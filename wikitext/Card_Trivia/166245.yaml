title: Card Trivia:Talisman of Reversal
wikitext: |-
  {{Navigation}}

  * This card is one of the few cards that allow the player to draw more than 2 cards. In the anime, these cards are "[[Card of Sanctity]]", "[[Card of Demise]]","[[Hope for Escape]]", "[[Boon of the Meklord Emperor]]", and "[[Fallen Paradise]]" (which gives a net gain of more than 1 card after the first turn). In real life, there are only three legal cards that have a similar effect, "[[Morphing Jar]]" and [[The Beginning of the End]]. Additionally, [[Hope for Escape]] has the potential to draw 3 or more cards.
  ** Also, "[[Lucky Punch]]" has the potential to draw 3 cards in one shot, "[[Mirage of Nightmare]]" up to four, and "[[Gamble]]" up to 5, although all three have negative and potentially detrimental trade-offs.
