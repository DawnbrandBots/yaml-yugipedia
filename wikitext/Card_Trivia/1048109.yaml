title: Card Trivia:Split Mirror of the Underworld
wikitext: |-
  {{Navigation}}

  * This card's effects are reminiscent of the effect of "[[Gorz the Emissary of Darkness]]" (whose Japanese name is "Gorz the Emissary of Hades" to further allude to this card's naming scheme), which [[activate]]s when the player takes [[battle damage]] or [[effect damage]].
  ** Battle damage: This effect to [[Special Summon]] a monster from the [[Graveyard]] with an [[original ATK]] less than or equal to the battle damage inflicted is reminiscent of the Special Summoning effect of "Gorz", which can Special Summon an "[[Emissary of Darkness Token]]", which gains ATK and [[DEF]] equal to the battle damage.
  ** Effect damage: This effect to inflict double the effect damage to the opponent inflicted to the player is reminiscent of the damaging effect of "Gorz", which can inflict damage to the opponent equal to the effect damage inflicted to the player.
