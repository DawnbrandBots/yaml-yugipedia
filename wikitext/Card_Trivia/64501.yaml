title: Card Trivia:Divine Dragon Ragnarok
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Damage Rebound]]" and "[[Subspace Battle]]".
  * This monster is named after [[wikipedia:Ragnarök|Ragnarök]], the battle at the end of the world in [[wikipedia:Norse mythology|Norse mythology]]. This is reflected in this card's [[flavor text]], which says ''[...] Legends say that if provoked, the whole world will sink beneath the sea.''. Ironically, this card has only 1500 [[ATK]], which is relatively weak for a [[Dragon]] monster.
  * This card has a [[counterpart]]: "[[Divine Dragon Apocralyph]]".
  ** Both are named after terms for the end of the world.
  ** Both [[Level]] 4, have opposite [[ATK]], [[DEF]], and [[Attribute]]s ([[DARK]] and [[LIGHT]], respectively).
  ** Both have a merged form with another monster: "Ragnarok" has a combined form with "[[Lord of D.]]", "[[King Dragun]]", while "Apocralyph" has a combined form with "[[Lady of D.]]", "[[Queen Dragun Djinn]]".
  * This card has a "[[Metaphys]]" counterpart: "[[Metaphys Ragnarok]]".
  * This monster makes up the central head of "[[Divine Dragon Titanomakhia]]".
  * This card is not available in ''[[Yu-Gi-Oh! World Championship 2008]]'', despite being listed as a [[Fusion Material]] for "[[King Dragun]]".
