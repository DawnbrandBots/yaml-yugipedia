title: Card Trivia:Cyclon Laser
wikitext: |-
  {{Navigation}}

  * This card is based on the Cyclone Laser, an upgraded version of the standard laser weapon featured in ''[[wikipedia:Gradius III|Gradius III]]''.
  ** In the ''[[Gradius]]'' video game series, the laser weapon and its upgrades allows the player to increase their damage output per hitbox and it can pierce through the enemy's shield, which is reflected in this card's effect to increase the [[ATK]] of "[[Gradius]]" and inflict [[piercing]] [[battle damage]] when attacking an opponent's [[Defense Position]] monster.
