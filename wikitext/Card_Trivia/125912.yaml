title: Card Trivia:Relay Soul
wikitext: |-
  {{Navigation}}

  * This is one of five cards to feature an effect that prevents a player from losing a Duel when their [[Life Point]]s reach 0, the other four being "[[Divine Serpent Geh (anime)|Divine Serpent Geh]]", "[[Infernity Zero (anime)|Infernity Zero]]", "[[Morphtronic Lantron (anime)|Morphtronic Lantron]]", and "[[Zero Gate of the Void]]".
