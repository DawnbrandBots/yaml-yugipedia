title: Card Trivia:Setuppercut
wikitext: |-
  {{Navigation}}

  * "[[Behemoth the King of All Animals]]" and "[[Super-Nimble Mega Hamster]]" appear in this card's artwork.
  * This card's name is a portmanteau of "set up" and "[[wikipedia:Uppercut|uppercut]]. This is referenced in this card's artwork, where "Mega Hamster" "sets up" "Behemoth" using multiple strikes, before finishing it off with an "uppercut".
