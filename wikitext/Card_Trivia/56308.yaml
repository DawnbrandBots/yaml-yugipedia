title: Card Trivia:Genex Controller
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Divergence]]", "[[Final Gesture]]" and "[[Machine Assembly Line]]".
  ** A corrupted version of this monster appears in the artwork of "[[Evilswarm Coppelia]]".
  * "[[Genex Recycled]]" and "[[Genex Spare]]" are based off the design of this monster.
  ** This monster has a [[Link Monster|Link]] form combined with "Genex Spare": "[[Repaired Genex Controller]]".
  * This is the first and currently only "[[Genex]]" [[Normal Monster]].
  * This monster has the second highest number of associated Synchro Monsters that require a specific Tuner monster behind "[[Junk Warrior]]", with five associated Synchro Monsters ("[[Genex Ally Triarm]]", "[[Geo Genex]]", "[[Hydro Genex]]", "[[Thermal Genex]]", and "[[Windmill Genex]]").
  ** The [[Attribute]]s of the latter four Synchro Monsters that specifically require this monster are based on the four classical elements: "Geo" ([[EARTH]]), "Hydro" ([[WATER]]), "Thermal" ([[FIRE]]), and "Windmill" ([[WIND]]).
