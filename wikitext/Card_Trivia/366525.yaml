title: Card Trivia:Paleozoic Opabinia
wikitext: |-
  {{Navigation}}

  * This card derives its name from ''[[wikipedia:Opabinia|Opabinia]]'', a [[wikipedia:genus|genus]] of extinct [[wikipedia:Cambrian|Cambrian]] animal found as [[wikipedia:fossil|fossils]] in the [[wikipedia:Burgess Shale|Burgess Shale Formation]] in the [[wikipedia:Canadian Rockies|Canadian Rockies]] of [[wikipedia:British Columbia|British Columbia]], [[wikipedia:Canada|Canada]].
  * Opabinia is theorized to have five eyes, not for the usage of finding food, but to evade predators like [[wikipedia:Anomalocaris|Anomalocaris]]. This can be reflected in the game as this card has 2400 DEF, and is also unaffected by the effects of "[[Paleozoic Anomalocaris]]"
