title: Card Trivia:Faulty Fire
wikitext: |-
  {{Navigation}}

  * "[[Cannon Soldier (Rush Duel)|Cannon Soldier]]" and "[[Machine King]]" appear in this card's artwork.
  * This card's artwork parodies the artwork of "[[Covering Fire]]", where "[[Cannon Soldier]]" fires a shot to protect "[[Mechanicalchaser]]"; in this card's artwork, "Cannon Soldier" fires and strikes "Machine King" in the back.
