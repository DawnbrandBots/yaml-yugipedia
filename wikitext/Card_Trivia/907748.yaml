title: Card Trivia:Convert Ghost
wikitext: |-
  {{Navigation}}

  * This card's name and artwork reflects its anime effect, which can "convert" an opponent's card effect to the "ghost" of the player's monster in their [[Graveyard]].
  ** This card's video game effect [[activation requirement]] is based on its appearance in {{episode|5D's|078|ref}} where [[Convert Ghost (anime)|this card]] was [[activate]]d while [[Lester]] [[control]]led "[[Meklord Emperor Skiel (anime)|Meklord Emperor Skiel]]".
  *** Furthermore, its effect to [[banish]] a [[Machine]] monster to [[negate]] that card effect is based on how Lester changed the [[target]] of [[Leo]]'s [[Defense Position]] "[[Morphtronic Vacuumen (anime)|Morphtronic Vacuumen]]" to [[equip]] "[[Absurd Stealer (anime)|Absurd Stealer]]" (a Machine monster) from his Graveyard.
