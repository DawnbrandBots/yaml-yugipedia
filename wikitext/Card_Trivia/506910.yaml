title: Card Trivia:Obnoxious Celtic Guard
wikitext: |-
  {{Navigation}}

  [[File:Celtic Guardian and Dark Yugi.png|thumb|right|250px|"[[Celtic Guardian (manga)|Celtic Guardian]]" with [[Dark Yugi (manga)|Dark Yugi]].]]

  * This is one of the [[cover card]]s for ''[[Structure Deck: Yugi]]'', ''[[Dark Beginning 2]]'', ''[[Beginner's Edition 2]]'', ''[[Beginner's Edition 2 (2011)]]'', ''[[Collectible Tins 2004]]'', and the box of ''[[Duelist Legacy Volume.4]]''.
  * This monster appears in the artwork of "[[Brave Attack]]".
  * This monster is a [[retrained]] counterpart of "[[Celtic Guardian]]".
  ** This monster's Japanese name, "{{translated name|Obnoxious Celtic Guard|ja}}" ({{name|Obnoxious Celtic Guard|ja}}, ''{{romanized name|Obnoxious Celtic Guard|ja}}'') is derived from the [[flavor text]] of "Celtic Guardian": 『{{ruby|剣|けん}}{{ruby|術|じゅつ}}を{{ruby|学|まな}}んだエルフ。{{ruby|素|す}}{{ruby|早|ばや}}い{{ruby|攻|こう}}{{ruby|撃|げき}}で{{ruby|敵|てき}}を'''{{ruby|翻|ほん}}{{ruby|弄|ろう}}する'''。』 ("{{hardcoded query|{{ #show: Celtic Guardian |?Translated Japanese lore }}}}")
  *** This monster's ''[[TCG]]'' title, "Obnoxious", likely references to its effect that prevents it from being [[destroyed by battle]] with a monster that has 1900 or more [[ATK]].
  **** The reason this monster is not named "Obnoxious Celtic ''Guardian''" is to avoid further confusion with other "[[Guardian]]" monsters.
  **** The common definition for the term "retrained" is derived from an early fan name for this monster before it was released in the ''TCG'', "Retrained Elven Swordsman".<ref>{{Cite web|url=https://www.edo-hrzic.com/archive/Yugi_ys.txt|title=YUGI MUTOU STRUCTURE DECK|website=Edo's Yu-Gi-Oh! Page!|date=2002-03-19|access-date=2024-11-02}}</ref>
  * This card was misprinted in some French versions of with the name "G'''u'''ardien Celtique Recyclé", instead of "Gardien Celtique Recyclé", due to the fact that the English equivalent of "Gardien" is "G'''u'''ard" or "G'''u'''ardian".
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh!|105|ref}}, specifically from the panel showing "[[Celtic Guardian (manga)|Celtic Guardian]]" and [[Dark Yugi (manga)|Dark Yugi]] together (directly after the panel where [[Seto Kaiba (manga)|Seto Kaiba]] prompted Dark Yugi to attack him).

