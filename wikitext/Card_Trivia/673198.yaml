title: Card Trivia:Magistery Alchemist
wikitext: |-
  {{Navigation}}
  [[File:Electrum attacks Raviel.jpg|thumb|"Elemental HERO Electrum" attacking "Raviel, Lord of Phantasms"]]

  * "[[Elemental HERO Electrum]]" (wielding the blade-form of "[[Sabatiel - The Philosopher's Stone]]") and "[[Raviel, Lord of Phantasms]]" appear in this card's artwork.
  ** This card's name is a reference to both the attack name of "Electrum" in the Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime (''Fusionist Magistry''), and the fact that a [[wikipedia:Philosopher's stone|philosopher's stone]] is an item used in [[wikipedia:Alchemy|alchemy]] to transmute materials into other materials.
  ** This card's artwork is based on the scene from {{episode|GX|049|ref}} where [[Jaden Yuki]] uses "Electrum" to attack and destroy "Raviel" with the help of "Sabatiel", and win the Duel.
  ** This card's [[condition]] effect banishing [[EARTH]], [[WATER]], [[FIRE]], and [[WIND]] monsters references the [[Fusion Material]]s of "Electrum": "[[Elemental HERO Avian]]" (WIND) + "[[Elemental HERO Burstinatrix]]" (FIRE) + "[[Elemental HERO Clayman]]" (EARTH) + "[[Elemental HERO Bubbleman]]" (WATER).
  ** This card's effect to double the ATK of the Summoned monster is a reference to the anime effect of "Sabatiel", which multiplied the targeted monster's ATK by the number of monsters the opponent controls.

