title: Card Trivia:White Aura Whale
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[White Reincarnation]]".
  * This monster is likely based on [[wikipedia:Moby Dick (whale)|Moby Dick]], a fictional albino [[wikipedia:Sperm whale|sperm whale]] from [[wikipedia:Herman Melville|Herman Melville's]] novel, ''[[wikipedia:Moby-Dick|Moby-Dick]]'', in which it is also commonly referred to as the "Great White Whale".
  * This monster and "[[White Aura Dolphin]]" are the first [[Fish]] [[Synchro Monsters]].
  * This card's artwork is taken from {{chapter|ARC-V|012|ref}}, specifically from the panel showing [[White Aura Whale (manga)|this monster]] being Summoned.
