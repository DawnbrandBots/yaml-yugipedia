title: Card Trivia:Dentacle the Parasitic Extraterrestrial
wikitext: |-
  {{Navigation}}

  * According to a [https://www.youtube.com/shorts/Xy94x6C3xJU short] published on the official YouTube channel of ''[[Yu-Gi-Oh! Rush Duel]]'', ''[https://www.youtube.com/@rushduelTV Yu-Gi-Oh! Rush Duel TV]'', this monster is an space explorer whose mind is being controlled by something that infected her after she prickled herself on a flower's thorn while exploring a forest on an uninhabited planet. It relayed how, while being taken over, she described intense back pain, the sensation of something crawling inside her body, red shadows flickering at the edges of her visual field, and her lips becoming slack; her chest monitor also recording an irregular heartbeat.
  ** In its footage, the short teased the existence of this card's alternate artwork (depicting the explorer in a half-corrupted state), which was officially announced 5 days later.
  ** This monster's fully-human, pre-infection form appears in the artwork of "[[Planet Survey]]". In a [https://www.youtube.com/shorts/U87n1RQhQLo short] related to that card, it is revealed that this monster is the senior surveyor of another space explorer and that they were conducting a botanical survey of an uncharted planet in order to find resources and collect samples.
