title: Card Trivia:Magical Musket - Steady Hands
wikitext: |-
  {{Navigation}}

  * "[[Magical Musketeer Doc]]" appears in this card's artwork.
  * This card's Japanese name, "Magibullet - Never-Endorphin", is a reference to [[wikipedia:Endorphins|endorphins]], a group of hormones secreted within the brain and nervous system, which has a number of physiological functions.
  ** This card's name is likely changed in the ''[[TCG]]'' to remove or lessen implication of drug use, given the serum "Magical Musketeer Doc" appears to be consuming.
