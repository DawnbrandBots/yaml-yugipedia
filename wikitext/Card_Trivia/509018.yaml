title: Card Trivia:Chopman the Desperate Outlaw
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Backfire]]".
  * This monster is based on [[Chopman]], a character from the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga. Chopman was a serial killer hired by [[Seto Kaiba (manga)|Seto Kaiba]] to terrorize and ultimately murder [[Yugi Mutou (manga)|Yugi Mutou]] and his friends. He faced [[Katsuya Jounouchi (manga)|Katsuya Jounouchi]] in a life-and-death game, and was killed when Jounouchi tricked him into setting himself on fire.
  ** This monster's effect to [[equip]] itself with an [[Equip Spell Card]] from the player's [[Graveyard]] is likely based on the game he played against Jonouchi, where both players chose a weapon and used it to try and kill the other.
  ** This monster's appearance in the artwork of "Backfire" is a reference to Chopman's fiery death, where the aforementioned card depicts this monster being blasted by the "backfire" from chopping apart "[[Blazing Inpachi]]".
  * "[[The Kick Man]]" is likely a [[counterpart]] to this monster.
  ** Both are themed around a common type of combat move: this monster is depicted with "'''I ♥ CHOP'''" printed on its forehead, and "The Kick Man" is depicted with "'''I ♥ KICK'''" on his forehead.
  ** Both share a similar effect that equips themselves an Equip Spell Card from the player's [[Graveyard]] when they are Summoned.
  ** "The Kick Man" appears in the card artwork of "[[Kickfire]]" in a manner that parallels the role of this monster in the artwork of "Backfire"; both "Backfire" and "Kickfire" are [[Continuous Trap Card]]s with damage-inflicting effects that require [[FIRE]] monsters to be [[destroy]]ed.
