title: Card Trivia:Kagemusha of the Blue Flame
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Unification]]", albeit with a different color palette.
  * This monster's ''[[TCG]]'' name, "Blue Flame", is a literal translation of "[[Shien]]", while "Kagemusha" means "body double".
  * This is the first monster to be played in the ''[[Yu-Gi-Oh!]]'' anime.
  ** This is also the first [[EARTH]] monster to appear in the anime, as well as the first EARTH monster to be [[Summon]]ed.
  ** This is also the first [[Warrior]] monster to be Summoned in the anime.
  ** This is also the first [[Normal Monster]] to be Summoned in the anime.
  ** This is also the first monster to be [[Summon]]ed in the anime, as well as the first [[Normal Summon]]ed monster to appear.
  ** This is also the first monster to be destroyed by battle in the anime.
  *** In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, this monster is replaced with "[[Zombie (card)|Zombie]]", another monster that was destroyed by battle by "[[Blackland Fire Dragon]]".
