title: 'Card Trivia:Number C65: King Overfiend'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Chaos Caller]]".
  * The number "65" is located on the right side of the waist of its coat.
  * This monster is a "[[Number C]]" [[Card evolutions|upgraded]] form of "[[Number 65: Djinn Buster]]"
  ** This is the first "Number C" monster that is the upgraded form of a [[Mythyrian Number]], the second being "[[Number C73: Abyss Supra Splash]]".
  ** This monster's Japanese name, "Split-Decision Demon King - Nudge Devil" features "''saidan''" (裁断), the Japanese word meaning "cutting" and "judgment", reflecting this monster's scythe weapon and position as judge.
  *** This reflects [[Vector]]'s past life as a prince, who was corrupted by [[Don Thousand]] following the death of his [[Vector's mother|mother]] and [[Vector's father|father]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. Prior to Don Thousand's corruption, Vector wanted peace between kingdoms instead of engaging in meaningless war; however, after his corruption, he became cruel and unjustly executed his subjects (most likely with his sword to further connect with this monster's scythe weapon).
  * Unlike most other [[Rank-Up]] [[Xyz Monster]]s, this card's additional effect that it gains from using its base form as an [[Xyz Material]] does not require it to [[detach]], while its normal effect does.
