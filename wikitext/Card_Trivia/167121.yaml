title: Card Trivia:Kamion, the Timelord
wikitext: |-
  {{Navigation}}

  * This monster is named after the Judaic archangel, [[wikipedia:Camael|Camael]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Camael is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Gevurah|Gevurah]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Gevurah is the fifth of the ten Sefira of the Tree of Life, and this was the fifth "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
