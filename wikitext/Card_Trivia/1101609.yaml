title: Card Trivia:Heaven, Earth, and People
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This [[Skill]]'s name and bulleted effects are based on how the "[[Meklord Emperor]]s" represent the concept of the sky, the earth, and humanity, with "[[Meklord Emperor Skiel]]" representing the sky, "[[Meklord Emperor Granel]]" representing the earth, and "[[Meklord Emperor Wisel]]" representing the humans.
