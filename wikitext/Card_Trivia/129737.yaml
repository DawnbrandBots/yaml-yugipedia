title: Card Trivia:Light Effigy
wikitext: |-
  {{Navigation}}

  * This card's [[DARK]], [[WIND]], and [[EARTH]] counterparts are "[[Dark Effigy]]", "[[Wind Effigy]]" and "[[Earth Effigy]]", respectively. As their names say, their effects go with their respective [[Attributes]].
  * The artwork of this card resembles the [[Overlay Unit]]s surrounding an [[Xyz Monster]] from [[Yu-Gi-Oh! ZEXAL]] series.
