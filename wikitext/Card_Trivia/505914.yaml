title: Card Trivia:Black Luster Soldier
wikitext: |-
  {{Navigation|other=[[Black Luster Soldier (Normal)|Normal version]]}}

  * This is the [[cover card]] of ''[[Dark Ceremony Edition]]'', ''[[Over Rush Pack 3]]'', ''[[Starter Deck: Yugi Evolution]]'', and the Japanese version of ''[[Premium Pack 2 (Japanese)|Premium Pack 2]]''.
  * This monster appears in the artworks of "[[Draw of Fate]]", "[[Super Soldier Radiance]]", "[[Super Soldier Strike]]" and the second artwork of "[[Pre-Preparation of Rites]]". 
  ** This monster also appears in the artwork of "[[Super Soldier Rebirth]]", transforming into "[[Black Luster Soldier - Super Soldier]]".
  * This monster's Japanese name, "Chaos Soldier" (カオス・ソルジャー ''Kaosu Sorujā''), reflects its original appearance in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, where a [[LIGHT]] and [[DARK]] monsters were using as [[Tribute]]s to [[Ritual Summon]] this monster in with "[[Black Luster Ritual (manga)|Black Luster Ritual]]"; a "[[Gateway to Chaos]]" was then created, which "[[Gaia the Fierce Knight (manga)|Gaia the Fierce Knight]]" charged through to become this monster.
  * This monster has several [[retrained]] [[counterpart]]s:
  ** Three [[Effect Monster]]s: "[[Black Luster Soldier - Envoy of the Beginning]]", "[[Black Luster Soldier - Envoy of the Evening Twilight]]", and "[[Black Luster Soldier - Sacred Soldier]]".
  ** Three [[Ritual Monster]]s: "[[Black Luster Soldier - Super Soldier]]", "[[Black Luster Soldier - Legendary Swordsman]]" and "[[Black Luster Soldier - Soldier of Light and Darkness]]".
  ** A [[Link Monster]]: "[[Black Luster Soldier - Soldier of Chaos]]".
  ** A [[Normal Monster]]: "[[Black Luster Soldier (Normal)|Black Luster Soldier]]".
  ** A [[Toon monster]]: "[[Toon Black Luster Soldier]]".
  ** A ''[[Rush Duel]]'' [[Jersey]] parody: "[[Black Luster Soljersey]]".
  ** Additionally, this monster has one [[Fusion Monster|Fusion]] each with "[[Dark Magician]]" and "[[Blue-Eyes Ultimate Dragon]]": "[[Master of Chaos]]" and "[[Dragon Master Knight]]", respectively.
  * In some video games, this monster's [[Attribute]] is DARK, instead of [[EARTH]] like in the ''[[OCG]]''/''[[TCG]]''.
  * In most video game texts and in this monster's Normal Monster counterpart's [[flavor text]], it is stated to be on the same level of power as "[[Blue-Eyes White Dragon]]", most likely due to the fact that this monster has the same [[Level]] (8) and [[original ATK and DEF]] (3000/2500) as "Blue-Eyes White Dragon".
  ** This also suggests a partnership or rivalry between this monster and "Blue-Eyes White Dragon", the same relation between [[Yami Yugi]] and [[Seto Kaiba]] in the ''Yu-Gi-Oh!'' anime: despite being rivals, sometimes they worked together using this monster and "[[Blue-Eyes Ultimate Dragon (anime)|Blue-Eyes Ultimate Dragon]]" to [[Fusion Summon]] "[[Dragon Master Knight (anime)|Dragon Master Knight]]".
  * In the ''Yu-Gi-Oh!'' anime, [[Pharaoh Atem]] probably carried the spirit of this monster, as he became this monster and fused with Seto Kaiba's "Blue-Eyes Ultimate Dragon" to form "Dragon Master Knight" during the final battle with [[Zorc Necrophades]].
  * This was one of the very few cards that did not have an 8-digit [[passcode]] in the bottom left corner, until its [[reprint]] in ''[[Legendary Collection 3: Yugi's World Mega Pack]]''. However, this card's reprint in ''[[Duelist Pack: Battle City]]'' lacks the code once again.
