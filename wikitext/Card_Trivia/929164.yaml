title: Card Trivia:Upgrade Goblin
wikitext: |-
  {{Navigation}}

  * This monster is a counterpart to "[[Goblin of Greed]]".
  * This monster's Japanese name ({{Ruby|成|なり}}{{Ruby|銀|きん}}ゴブリン, ''Narigin Goburin'') is a play on that of "[[Upstart Goblin (Rush Duel)|Upstart Goblin]]" ({{Ruby|成|なり}}{{Ruby|金|きん}}ゴブリン,  ''Narikin Goburin''), replacing the kanji for "gold" (金) with the kanji for "silver" (銀).
  ** 「{{Ruby|成|なり}}{{Ruby|銀|きん}}」 also refers to a "promoted silver general" in the game of [[wikipedia:Shogi|shogi]], which explains why a board and several pieces of that game appear in this card's artwork.
