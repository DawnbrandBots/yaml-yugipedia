title: Card Trivia:Heartless Hound Apex Katana Danbiramatian
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (ダンビラメシアン, ''Danbirameshian'') is a portmanteau of the Japanese words "''danbira''" (ダンビラ) and "[[wikipedia:Dalmatian dog|Dalmatian]]" (ダルメシアン, ''Darumeshian'').
  ** Fittingly, this monster is a Dalmatian dog wielding a ''[[wikipedia:Katana|katana]]'', a Japanese sword, whereas "''danbira''" is the Japanese catch-all nickname given to swords.
