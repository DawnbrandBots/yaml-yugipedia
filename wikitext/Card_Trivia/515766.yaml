title: Card Trivia:Cocoon of Evolution
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Verdant Sanctuary]]".
  * This monster has a retrained [[Quick-Play Spell]] [[counterpart]]: "[[Cocoon of Ultra Evolution]]"
  * This monster has a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Pulsating Cocoon of Evolution]]".
  * This is one of the few cards that doesn't have an 8-digit passcode on the bottom-left corner.
