title: Card Trivia:OuTerverSe Burst Oblivion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[OuTerverSe Flare Flux]]" and "[[OuTerverSe Unity Guard]]".
  * This monster is based on one of the parallel universes observed by [[Yudias Velgear]] through [[Kuaidul Velgear]] in {{episode|GO RUSH!!|135|ref}}, in which the instant [[Earth (planet)|Earth]] achieved world peace, it was destroyed by a [[wikipedia:Gamma-ray burst|gamma-ray burst]].
  * This monster has an upgraded [[Fusion Monster|Fusion]] form: "[[OuTerverSe Endless Doom Oblivion]]".
  * This monster is an [[OuTerverSe (series)|OuTerverSe]] [[counterpart]] of "[[Galactica Oblivion]]".
  ** This monster shares its [[Level]] (7) and [[original ATK and DEF]] (2500/2500) with "Galactica Oblivion".
  ** In the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, when this monster's [[Type]] becomes [[Galaxy]], it takes on the color scheme of "Galactica Oblivion".
  * This monster's [[effect]] may be based on [[Secret Order]], whose second artwork features Galactica Oblivion.
  * This monster's [[Summon chants in Yu-Gi-Oh! GO RUSH!!|Summon chant]] in the ''GO RUSH!!'' anime is based on a Japanese poem that describes the personalities of the three warlords of the [[wikipedia:Sengoku period|Sengoku period]]: [[wikipedia:Oda Nobunaga|Oda Nobunaga]], [[wikipedia:Toyotomi Hideyoshi|Toyotomi Hideyoshi]], and [[wikipedia:Tokugawa Ieyasu|Tokugawa Ieyasu]]. The last part of the chant is also based on the death poem of Tokugawa Ieyasu.
