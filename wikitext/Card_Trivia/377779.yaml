title: Card Trivia:Zefraxi, Treasure of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chosen of Zefra]]".

  * This monster's name is based on [[wikipedia:zh:負屭|Fùxì]] (zh: 负屃｜負屭 ''fùxì''), a modern name for one of the [[wikipedia:Nine sons of the dragon|nine sons]] of the [[wikipedia:Dragon King|Dragon King]] who is depicted as a smaller dragon.
  ** According to Chinese mythology, Fùxì is associated with literature and is historically placed on the sides of grave monuments.

  * This monster features the same blue sphere as "[[Qliphort Disk]]" and "[[Infernoid Patrulea]]".

  * This is the first [[Wyrm]] [[Pendulum Monster]] to be released in the ''[[OCG]]''/''[[TCG]]''.
