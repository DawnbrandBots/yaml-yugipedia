title: Card Trivia:Black Luster Soldier - Envoy of the Evening Twilight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Chaos Seed]]".
  * This monster is a [[retrained]] counterpart of "[[Black Luster Soldier]]".
  ** This monster is the [[DARK]] counterpart of "[[Black Luster Soldier - Envoy of the Beginning]]".
  *** The armor worn by "[[Black Luster Soldier - Sacred Soldier]]" is a completely white version of the armor worn by this monster.
  * This monster has a younger counterpart: "[[Evening Twilight Knight]]".
  * Between this card's ''[[TCG]]'' release in 2014 and ''[[Magnificent Mavens]]'' in 2022, this card had the longest English card name at 52 characters, including spaces. This record would be taken by "[[Ghost Meets Girl - A Masterful Mayakashi Shiranui Saga]]" from the latter set.
