title: Card Trivia:Batteryman D
wikitext: |-
  {{Navigation}}

  * This monster appears on the artworks of "[[Broken Line]]", "[[Super-Electromagnetic Voltech Dragon]]", and "[[Universal Adapter]]".
  * This monster is based on a [[wikipedia:D battery|D battery]], the largest standardized size of a cylindrical [[wikipedia:Dry cell|dry cell battery]] used in large-drain applications.
  ** The number "1" on this monster's chest reflects its [[Level]] (1), which also corresponds with the Japanese name for the D battery (単一形, ''Tan'itsu katachi'').
