title: Card Trivia:Fossil Fusion
wikitext: |-
  {{Navigation}}

  * The skeletons featured in this card's artwork resemble an ''[[wikipedia:Allosaurus|Allosaurus]]'' and an ''[[wikipedia:Ichthyosaur|Ichthyosaur]]''.
  * The background from the artwork of "[[Polymerization]]" appear in this card's artwork.
  * This is the first card to [[Fusion Summon]] a [[Fusion Monster]] using monsters from the opponent's [[Graveyard]], the second being "[[Invocation]]", but is also the second ''[[OCG]]''/''[[TCG]]'' card to do so.
