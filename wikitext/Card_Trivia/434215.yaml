title: Card Trivia:Supreme King Dragon Darkwurm
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Miracle of the Supreme King]]".
  * This monster is the "[[Supreme King Dragon]]" counterpart of "[[Supreme King Z-ARC]]".
  * This monster has a [[LIGHT]] counterpart, "[[Supreme King Dragon Lightwurm]]", with an inverted [[original ATK and DEF]] (1800/1200).
