title: Card Trivia:Ties That Bind
wikitext: |-
  {{Navigation}}

  * "[[Gandora-G the Dragon of Destruction]]", "[[Moremarshmallon]]", "[[Silent Magician Zero]]", "[[Silent Swordsman Zero]]" and "[[Stronghold the Hidden Fortress]]" appear in this card's artwork.
  ** This card's artwork is based on [[Kazuki Takahashi]]'s illustration in ''[[Duel Art]]'', which depicts [[Yugi Mutou (manga)|Yugi Mutou]] alongside his "[[Gandora the Dragon of Destruction (manga)|Gandora the Dragon of Destruction]]", "[[Marshmallon (manga)|Marshmallon]]", "[[Silent Magician (manga)|Silent Magician]]", "[[Silent Swordsman LV0 (manga)|Silent Swordsman LV0]]", and "[[Stronghold the Moving Fortress (manga)|Stronghold the Moving Fortress]]".
  * This card's name and [[Special Summon]]ing effect are based on "[[Ties of the Brethren]]", a [[Spell Card]] used by Yugi Muto in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] (and his [[Yu-Gi-Oh! (anime)|anime]] [[Yugi Muto|counterpart]]), which allowed him to Special Summon two monsters with the same stats but with different names from his [[Deck]].
  ** This card's English name is based on the English title of {{chapter|Yu-Gi-Oh!|340|ref}}.
