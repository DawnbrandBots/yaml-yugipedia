title: Card Trivia:The Grand Spellbook Tower
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Tower (Tarot card)|The Tower]], the sixteenth of the [[wikipedia:Major Arcana|Major Arcana]].
  ** This card's OCG name, La Maison, is from the name of "The Tower" in the [[wikipedia:Tarot of Marseilles|Tarot of Marseilles]], a French version of Tarot decks. It is called "''La Maison Dieu''" or "''The House of God''."
  * "[[Spellbook Library of the Crescent]]", "[[Spellbook Library of the Heliosphere]]" and "[[Spellbook Star Hall]]" are all rooms located inside "The Grand Spellbook Tower".
  * This card bears a strong resemblance to "[[Magical Citadel of Endymion]]".
