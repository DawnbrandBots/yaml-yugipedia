title: Card Trivia:Wattbetta
wikitext: |-
  {{Navigation}}

  * This card's OCG name is comprised of "Ere" for "electric", and "Kingyo" which means "goldfish". The English name is composed of "[[Watt]]" and "Betta", which is a nickname for ''Betta Splendens'', a fish commonly sold in pet stores as a "Siamese Fighting Fish".
  * "[[Wattberyx]]" and this card both look like a fish (not in type) and both have the effect of discarding cards from your opponent's hand.
