title: Card Trivia:Imperial Iron Wall
wikitext: |-
  {{Navigation}}

  * The king wearing the pointed crown, red robes, and violet mantle in this card's artwork appears in the artworks of "[[Conscription]]" and "[[Royal Decree]]".
  * The castle in this card's artwork appears in the artworks of "[[Catapult Zone]]", "[[Rock Bombardment]]", "Royal Decree", "[[Royal Surrender]]", and "[[The Huge Revolution is Over]]".
