title: Card Trivia:Scareclaw Tri-Heart
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Scareclaw Sclash]]".
  * This monster is an [[Card evolutions|upgraded]] [[Link Monster|Link]] form of "[[Scareclaw Reichheart]]".
  ** "Tri-Heart" (トライヒ ''Toraihi'', "Trich") in this card's name is a portmanteau of "[[wiktionary:tri-|tri-]]" (the prefix for "three") and "[[wikipedia:Reich|reich]]" (the German word for "realm").
  *** Fittingly, this card is a [[Link Rating|Link]]-3 [[Link Monster]] with 3000 [[ATK]] that requires 3 [[Effect Monster]]s as [[Link Material]]s; this monster also has three beast-like heads.
  *** This card's name may also be a reference to the [[Level]] (3) of the 3 "[[Scareclaw]]" [[Main Deck]] monsters.
  * This card has three [[Heart]] counterparts:
  ** "[[Tearlaments]]" [[Fusion Monster|Fusion]]: "[[Tearlaments Kaleido-Heart]]"
  ** "[[Kashtira]]" [[Xyz Monster|Xyz]]: "[[Kashtira Arise-Heart]]"
  ** [[LIGHT]] "[[Mannadium]]" [[Synchro Monster|Synchro]]: "[[Mannadium Prime-Heart]]"
  ** This card also has a "[[Visas Starfrost]]"-oriented Fusion counterpart: "[[Vicious Astraloud]]"
