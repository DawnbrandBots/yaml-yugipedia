title: Card Trivia:Helixx Marmotroll
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is a portmanteau of the words "[[wikipedia:Marmot|marmot]]" and "[[wikipedia:Troll|troll]]".
  ** Fittingly, this monster is an amalgamation "[[Archfiend Marmot of Nefariousness]]", "[[Feral Imp]]", and "[[Granite Battleguard]]", presumably created through gene splicing, keeping in relation with the [[wikipedia:genetics|genetics]] theme of the "[[Helixx]]" [[archetype]].
