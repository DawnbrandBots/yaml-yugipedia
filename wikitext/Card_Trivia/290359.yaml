title: Card Trivia:Sand Doodlebug
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on the "doodlebug", a common nickname for the larval form of the [[wikipedia:Antlion|antlion]], which is known for its long, sidewinding trails that its movements leave in the sand, resembling crude drawings.
  ** This monster's effect to destroy [[Level 3]] or lower monsters is likely based on the fact that some doodlebugs create pits to trap weaker prey.
  *** It also likely a reference to "[[Infinite Dismissal]]", whose effect also destroys Level 3 or lower monsters and whose Japanese name is translated as "Messiah's Antlion Larva" (メサイアの蟻地獄, ''Mesaia no Arijigoku'').
  ** This monster's effect to [[negate]] one attack while "[[Desert (card)|Desert]]" is on the [[field]] is based on the popular depiction of doodlebugs making sandpits in the desert, which is reflected in its appearance in the ''[[Yu-Gi-Oh! GX]]'' anime.
