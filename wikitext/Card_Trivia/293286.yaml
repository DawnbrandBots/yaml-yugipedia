title: 'Card Trivia:Number 2: Numeron Gate Dve'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * This monster's negative appears in the artwork of "[[Numeron Calling]]".
  * This monster's name is based on "''dve''", the Sanskrit word for the number "two", matching its numerical value.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster attacked when combined with the other "[[Numeron Gate]]" monsters, it Summoned a crocodile-like monster from the gate-like chest of "[[Number 1: Numeron Gate Ekam (anime)|Number 1: Numeron Gate Ekam]]".
