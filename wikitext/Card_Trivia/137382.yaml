title: Card Trivia:Karakuri Merchant mdl 177 "Inashichi"
wikitext: |-
  {{Navigation}}

  * The '''177''' of this card's name represents a multiplication problem: 1 x 7 = 7.
  * This monster appears in the artworks of "[[Karakuri Cash Shed]]", "[[Karakuri Cash Cache]]", "[[Runaway Karakuri]]", "[[Karakuri Gama Oil]]", and "[[Karakuri Cash Inn]]".
