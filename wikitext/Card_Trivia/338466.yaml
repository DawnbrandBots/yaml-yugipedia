title: Card Trivia:Odd-Eyes Meteorburst Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Master of Pendulum Structure Deck]]'' and the Korean edition of ''[[Structure Deck: Master of Pendulum]]''.
  * This card appears in the artwork of "[[Dueltain Ultimate Party]]".
  * This monster is an [[Card evolutions|upgraded]] [[FIRE]] [[Synchro Monster|Synchro]] form of "[[Odd-Eyes Dragon]]".
  ** Fittingly, this monster has a red color scheme, which is associated with the FIRE [[Attribute]].
  * This monster has a [[Synchro Tuner Monster|Synchro Tuner]] form: "[[Odd-Eyes Solblaze Dragon]]".
  * This monster has an opposite [[counterpart]]: "[[Odd-Eyes Absolute Dragon]]".
  ** This monster is a FIRE Synchro Monster, while "Absolute Dragon" is a [[WATER]] [[Xyz Monster]].
  ** This monster has its right eye highlighted by a golden flame, while "Absolute Dragon" has its left eye surrounded by an icicle spike.
  ** Both are depicted with mirrored poses in their card artworks.
  ** Both have effects that can [[Special Summon]] other monsters. "Meteorburst Dragon" can Summon a [[Pendulum Monster]] from the [[Pendulum Zone]] when it is Special Summoned. "Absolute Dragon" can either [[detach]] an [[Xyz Material]] to negate a monster's attack and Summon an "[[Odd-Eyes]]" monster from the [[hand]] or [[Graveyard]]; or it can Summon any "Odd-Eyes" monster from the [[Extra Deck]], when it is sent from the [[field]] to the Graveyard.
