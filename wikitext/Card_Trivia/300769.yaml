title: Card Trivia:Noble Arms - Excaliburn
wikitext: |-
  {{Navigation}}

  * This is a [[cover card]] of ''[[Extra Pack: Knights of Order]]''.
  * This sword appears in the artworks of "[[Avalon]]", "[[Gwenhwyfar, Queen of Noble Arms]]", "[[Ignoble Knight of High Laundsallyn]]", "[[Lady of the Lake]]", "[[Last Chapter of the Noble Knights]]", "[[Morgan, the Enchantress of Avalon]]", "[[Noble Arms Museum]]", "[[Noble Knight Bedwyr]]", and "[[Sacred Noble Knight of King Artorigus]]".
  ** The blue light in this sword's blade references the light in the armor of "[[Artorigus, King of the Noble Knights]]", while the red light refers to the light in the armor of "Ignoble Knight of High Laundsallyn". This is specially notable due to the artwork of "High Laundsallyn", which shows him wielding this sword, and both sides of the blade form "Excaliburn" have red lights like those of his armor. Similarly, when "Sacred Noble Knight of King Artorigus" wields "Excaliburn", both lights are blue.
  * This sword and "[[Noble Arms - Caliburn]]" are both based on [[wikipedia:Excalibur|Excalibur]], the legendary sword belonging to [[wikipedia:King Arthur|King Arthur]]
  ** This card's name is a Latinized version of the sword's Welsh name, Caledfwlch. After the legend of King Arthur was introduced into French literature, "Caliburn" was translated to "Excalibur".
  ** The fact that this card and "Excaliburn" are different cards likely reference how the sword in the stone is not Excalibur, but merely his father's sword to serve as proof of his being Uther's son.
  * This card's first effect preventing it from being [[target]]ed by the opponent's card effects is likely based on certain depictions of Excalibur's scabbard, which was said to have the ability to shield life, making it a near necessity on the battlefield.
  * This is the first and so far only "[[Noble Arms]]" Equip Spell that doesn't prevent the player from controlling more than one.
  ** It also lacks the effect which lets it re-equip itself to a "[[Noble Knight]]" when it's destroyed, a trait shared by all the other "Noble Arms".
