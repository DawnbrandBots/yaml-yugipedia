title: Card Trivia:Tri-Brigade Arms Bucephalus II
wikitext: |-
  {{Navigation}}

  * "[[Tri-Brigade Mercourier]]" appears in this card's artwork.
  * This monster appears in the artwork of "[[Tri-Brigade Roar]]".
  * The red and blue beam in the artwork of "[[Gigantic Thundercross]]" appears to be fired by this monster.
  * This monster is an upgraded form of "[[Tri-Brigade Shuraig the Ominous Omen]]".
  * This card is named after ''[[wikipedia:Bull-headed shrike|Lanius bucephalus]]'', the scientific name of the bull-headed shrike.
