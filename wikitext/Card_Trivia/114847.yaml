title: Card Trivia:Ghost Fusion
wikitext: |-
  {{Navigation}}

  * The Japanese kanji for "Ghost Fusion" (幽合 ''Yūgō''), is a combination of the kanji for "ghost" (幽 ''Yū'') and "[[fusion]]" (融合 ''Yūgō'').
  * This card's ''[[OCG]]''/''[[TCG]]'' [[activate|activation]] [[condition]], requiring the player to have lower [[Life Point]]s than the opponent to use [[Zombie]] monsters in the [[Deck]] or [[Graveyard]] as [[Fusion Material]], is based on this card's appearance in {{chapter|5D's|003|ref}} when the [[Skeleton Knight]] activated this card while his Life Points were lower than [[Yusei Fudo (manga)|Yusei Fudo's]] during their first [[Duel]].
