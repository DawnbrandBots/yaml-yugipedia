title: Card Trivia:Voidvelg Transi
wikitext: |-
  {{Navigation}}

  * This monster is named after a [[wikipedia:Cadaver monument|transi]], a type of church monument to a dead person that depicts their dead body.
  * This monster has a rival [[Galactica]] [[counterpart]]: "[[Galactica Reminiscences]]".
  ** Both are based on the [[signature card]]s of their respective users: [[Zuwijo zir Velgear]]'s "[[Voidvelg Requiem]]" for this card and [[Yudias Velgear]]'s "[[Galactica Oblivion]]" for "Galactica Reminiscences".
