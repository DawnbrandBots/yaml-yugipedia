title: Card Trivia:Saint Azamina
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Filia Diabell]]".
  * This monster is an upgraded [[Fusion Monster|Fusion]] form of "[[Queen Azamina]]" combined with "[[The Hallowed Azamina]]".
  * This monster has an upgraded form: "[[Azamina (card)|Azamina]]".
  * This monster is tied with "Azamina" for the highest [[original DEF]] (4000) of all [[Illusion]] monsters.
