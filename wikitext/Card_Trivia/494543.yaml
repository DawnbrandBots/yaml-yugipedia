title: Card Trivia:Rage of Kairyu-Shin
wikitext: |-
  {{Navigation}}

  [[File:D-013 Wrath of Leviathan.png|thumb|right|"[[Leviathan (manga)|Leviathan]]" floods the field.]]
  * "[[Kairyu-Shin]]" appears in this card's artwork.
  ** This card's artwork is based on a scene from {{chapter|Yu-Gi-Oh!|072|ref}} where [[Ryota Kajiki (manga)|Ryota Kajiki's]] "[[Leviathan (manga)|Leviathan]]" attacks [[Dark Yugi (manga)|Dark Yugi's]] "[[Silver Fang (manga)|Silver Fang]]" with a tidal wave.
  * This card's effects are based on the aforementioned scene in the manga, in which the attack is [[Attack and effect names in Yu-Gi-Oh!|named]] "Rage of Leviathan".
  ** This card's [[activation condition]] requiring "[[Umi]]" to be on the [[field]] is based on how "Leviathan" uses the power of the [[Ocean]] terrain to perform its tidal wave attack.
  ** This card's effect to [[destroy]] an opponent's monster equal to the number of the player's [[WATER]] monsters with an original [[Level]] of 5 or higher is based on how "Leviathan" (whose Level is 6 in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and 5 in the ''[[OCG]]''/''[[TCG]]'') destroys "Silver Fang" with its tidal wave attack, whereas both monsters were the only ones [[control]]led at the time by Kajiki and Dark Yugi, respectively.
  ** This card's final effect to restrict the opponent's [[Monster Zone]] where their monster was destroyed by the above effect is based on how "Leviathan's" tidal wave attack flooded Dark Yugi's field, submerging every zone, except for the one in the [[Wasteland]] terrain.

