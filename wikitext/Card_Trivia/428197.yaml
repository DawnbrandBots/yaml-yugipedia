title: Card Trivia:Supreme King Gate Infinity
wikitext: |-
  {{Navigation}}

  * This is the first [[Pendulum Monster]] with a [[Pendulum Scale]] of 13.
  * This monster's name is based on "infinity", whereas its appearance resembles the infinity symbol (∞) turned vertically.
  ** This monster's name also references its Pendulum Scale, which allows the player to [[Pendulum Summon]] monsters with every [[Level]], and its [[Pendulum Effect]] to increase the player's [[Life Point]]s without any limit.
  *** Ironically, despite the above fact, this monster's ''[[OCG]]''/''[[TCG]]'' Pendulum Effect prevents the player from Pendulum Summoning if they control a monster, which was used in the anime Pendulum Effect of "[[Supreme King Gate Zero (anime)|Supreme King Gate Zero]]".
  * This monster and "[[Supreme King Gate Zero]]" both reference the similarly-named cards, "[[Infinity (card)|Infinity]]" and "[[Zero]]".
  ** Both cards are used by their respective anime series' final antagonists; the "[[Supreme King Gate]]" monsters are used by [[Z-ARC]] in ''[[Yu-Gi-Oh! ARC-V]]'', while "Infinity" and "Zero" are used by [[Nightshroud]] in ''[[Yu-Gi-Oh! GX]]''.
  ** Both cards require one another to utilize their [[Deck]]s' field control strategy; the "Supreme King Gate" monsters [[support]] "[[Supreme King Z-ARC]]", while "Infinity" and "Zero" support the "[[Darkness (archetype)|Darkness]]" [[Continuous Trap Card]]s.
  ** Both cards can be placed in certain [[Zone]]s on both sides of the player's [[field]] and allow them to use their main "weapon" in between them; the "Supreme King Gate" monsters are placed in the [[Pendulum Zone]]s to Pendulum Summon monsters, while "Infinity" and "Zero" can be placed in the [[Spell & Trap Zone]] and activate all of the "Darkness" Continuous Trap Cards between them.
  * This monster's ''OCG''/''TCG'' effect to [[Special Summon]] a [[Dragon]] [[Xyz Monster|Xyz]] or Pendulum Monster references how [[Yuto]] merges with [[Yuya Sakaki]] in the ''Yu-Gi-Oh! ARC-V'' anime.
