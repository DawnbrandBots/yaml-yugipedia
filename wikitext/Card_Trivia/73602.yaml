title: Card Trivia:Mushroom Man 2
wikitext: |-
  {{Navigation}}

  * This card has a [[recolored counterpart]]: "[[Mushroom Man]]".
  ** Ironically, this card was released in the ''[[TCG]]'' before "Mushroom Man".
  * This card's Japanese name, "Matango" comes from the film, ''[[wikipedia:Matango|Matango]]'', which features people who mutate into humanoid mushroom creatures.
  * This is one of the few cards which has a Spanish printed version with the word ''oponente'' instead of ''adversario'', which is the official word used for the term "opponent" in that ''[[TCG]]'' branch.
