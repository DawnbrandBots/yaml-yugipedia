title: Card Trivia:Avatar of The Pot
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Goblin Circus]]".
  * "[[Pot of Greed]]" appears in this card's artwork as the head of the monster.
  ** According to the [[Master Guide 2 card storylines#This mysterious pot often explodes|Master Guide 2 card storylines]], this monster is the "adult form" of "Pot of Greed".
