title: Card Trivia:Extra Hundred
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name, "Hundred Over" refers directly to its effect to increase the attacked monster's [[ATK]] to '''100 over''' the ATK of the attacking monster. Its localized name is similar but slightly less direct.
  ** This card's Japanese name may also be a reference to the [[Barian]]s' "[[Number]]" monsters, referred to as "[[Number 10X|Over-Hundred Numbers]]" in the anime.
