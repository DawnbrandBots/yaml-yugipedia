  * This monster is a [[Card evolutions|retrained]] counterpart of "[[Grave Squirmer]]".
  ** This monster features the [[Devil Arm]], albeit with red claws, referencing how "Grave Squirmer" was used by [[Yubel (character)|Yubel]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
