title: Card Trivia:Vylon Disigma
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Forced Release]]" and "[[Xyz Reversal]]".
  * This is one of the [[Cover card]]s of ''[[Duel Terminal - Xyz Startup!!]]''.
  * According to the [[Duel Terminal Master Guide card storylines#The Vylon Go on a Rampage, and the Anti-"Vylon" Alliance Forms|Master Guide entry on Duel Terminal]], this monster is the combination of "[[Vylon Stigma]]", "[[Vylon Tesseract]]" and "[[Vylon Pentachloro]]", after the "[[Vylon]]" were corrupted by the thoughts of the "[[Steelswarm]]" due to the influence of "[[Gishki Noellia]]". "Disigma" then goes on to attack the "[[Gem-Knight]]", "[[Gusto]]", "[[Gishki]]", and "[[Laval]]" tribes. After absorbing several of its warriors, this monster is ultimately defeated by "[[Gem-Knight Pearl]]".
  ** This monster's ability to absorb others is reflected in its effect. It is also designed to counter the other ''[[Duel Terminal]]'' [[archetype]]s, which are all [[Attribute]]-based.
  ** This monster's defeat by "Gem-Knight Pearl" is also reflected in its effect, since "Pearl" is a [[Non-Effect Monster]], and its [[ATK]] is higher than this card's.
  ** This monster's [[material]]s also match the storyline, since it was formed by three monsters, all of which are [[Level]] 4. The animation of ''Duel Terminal'' shows them stacking themselves above each other, with "Stigma" on the top, "Pentachloro" at the bottom, and "Tesseract" in between.
  * This is the first "Vylon" Xyz Monster to be released as well as being the first Xyz Monster to be released as a member of any ''[[Duel Terminal]]'' archetype.
  * This card's name comes from ''Disigma'' (also known as [[wikipedia:Sampi|Sampi]]); an archaic letter of the [[wikipedia:Greek alphabet|Greek alphabet]] which stands for the "ss" or "ts" sound.
  ** The monster's arms also resemble the letter.
  ** The letters "CM" appear on this monster's chest; CM is the Roman numeral for 900, the Disigma's value in the Greek numeral system.
  * Although not easily seen on the card's artwork due to the frontal perspective, this monster actually has a beak. This can be more easily be seen in {{episode|ZEXAL|051|ref}}, where this monster is shown at an angle.
