title: Card Trivia:Karakuri Gama Oil
wikitext: |-
  {{Navigation}}

  * "[[Karakuri Gama mdl 4624 "Shirokunishi"]]" and "[[Karakuri Merchant mdl 177 "Inashichi"]]" appear in this card's artwork.
  ** This card's Japanese name is written on the ''[[wikipedia:Sashimono|sashimono]]'' on the back of "Merchant "Inashichi"".
  * This card is likely based on the cure-all toad-oil made and sold by the locals of [[wikipedia:Mount Tsukuba|Mount Tsukuba]], made from the sweat of the [[wikipedia:Japanese common toad|Japanese common toad]].
