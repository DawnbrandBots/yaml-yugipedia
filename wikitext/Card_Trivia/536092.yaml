title: Card Trivia:Bubble Crash
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" appears in this card's artwork.
  * In economic terms, a '[[wikipedia:economic bubble|bubble]]' refers to the trade of products or assets at ever-inflating prices, and can culminate in a '[[wikipedia:stock market crash|crash]]', or sudden loss of value and investments therein; this card's effect alludes to this, as it punishes players for having too many cards.
