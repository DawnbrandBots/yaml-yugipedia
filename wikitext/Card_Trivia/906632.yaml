title: Card Trivia:Fengli the Soldrapom
wikitext: |-
  {{Navigation}}

  * This monster's design is based on a [[wikipedia:Pineapple|pineapple]], a tropical plant that produces edible fruit.
  ** The word "Fengli" in this monster's name is the romanization of "凤梨", one of the Chinese names for the pineapple.
  ** This monster's title, "Soldrapom", is a portmanteau of the words "sol" (the Latin word for "sun"), "dragon", and "pomme" (the French word for "apple", referring to the second half of the word "pineapple"). 
  *** The base kanji for this monster's Japanese title (陽竜果) literally means "sun-dragon-fruit".
