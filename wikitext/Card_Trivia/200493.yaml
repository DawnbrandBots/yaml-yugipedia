title: Card Trivia:Tardy Orc
wikitext: |-
  {{Navigation}}

  * "[[Tour Bus From the Underworld]]", "[[Giant Orc]]", and "[[Coach Goblin]]" appear in this card's artwork.
  ** Because of the latter's presence, this supports the fact that this card is a [[Card evolutions|retrained]] version of "Giant Orc", along with the fact that these two cards have the same ATK, DEF, Level, Attribute, Type and clothes.
  * This card's name is a play on the fact that the previous pack's abbreviation is [[ORCS]], yet there were no "orcs" in it (quoted by Konami, at the bottom of [https://www.yugioh-card.com/en/products/past_products/gaov/ this page]).
  * This monster appears in the artworks of "[[Tour Guide From the Underworld]]" (alternate artwork only), "[[Trickstar Treat]]", and "[[Mistake]]" (which appears to continue the events in this card's artwork).
