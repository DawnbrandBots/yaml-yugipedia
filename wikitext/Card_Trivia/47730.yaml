title: Card Trivia:Brionac, Dragon of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Hidden Arsenal]]'' and ''[[Speed Start Deck Synchro Edition]]'', as well as one of the cover cards of ''[[Structure Deck: Ice Barrier of the Frozen Prison]]''/''[[Structure Deck: Freezing Chains]]'' and ''[[Structure Deck: Ice Barrier of the Frozen Prison Melting Destiny Pack]]''.
  ** This card was the first [[Sea Serpent]] [[monster]] to be a cover card on a [[Booster Pack]].
  * This card is the only "Dragon of the Ice Barrier" to not be named after an actual mythological weapon. This is due to confusion in Japan from various JRPGs purporting "Brionac" as a legitimate name for [[wikipedia:Lugh|Lugh's spear]], which in reality had no name until the 17th century, when it was cited as "Areadbhair" in a narrative version of [[wikipedia:Lugh|Lugh]]'s mythology titled ''The Fate of the Children of Tuireann''.
  ** It is also the only "Dragon of the Ice Barrier" that is not [[Dragon]].
  * This card and "[[Goyo Guardian]]" were the first [[Synchro Monster]]s to become [[Limited]].
  ** This card was also the first Sea Serpent-Type monster to become Limited and [[Forbidden]].
  * This card has an "[[lswarm]]" counterpart, "[[Evilswarm Bahamut]]", and a "[[Nekroz]]" counterpart, "[[Nekroz of Brionac]]".
  * This card has a retrained counterpart: "[[Brionac, the Magical Ice Dragon]]".
  * This monster appears in the artworks of the following cards:
  ** [[Dragunity Oubliette]] (interestingly, it depicts this card fighting "[[Dragunity Knight - Areadbhair]]")
  ** [[Medium of the Ice Barrier]]
  ** [[Nekroz Kaleidoscope]]
  ** [[Respect Synchron]]
  ** [[Synchro Baton]]
  ** [[Synchro Control]]
  ** [[Void Trap Hole]]
