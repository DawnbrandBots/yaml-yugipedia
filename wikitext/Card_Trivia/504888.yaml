title: Card Trivia:Twin-Headed Thunder Dragon
wikitext: |-
  {{Navigation}}

  * This monster has a [[Normal Monster]] [[recolored counterpart]]: "[[Two-Mouth Darkruler]]".
  * This monster has a "[[Memento]]" counterpart: "[[Mementotlan Twin Dragon]]".
  * "[[Thunder Dragonduo]]" appears to be an upgraded counterpart of this monster, having the same [[original ATK]] (2800) and also being an entity composed of two "[[Thunder Dragon (archetype)|Thunder Dragon]]" monsters.
  * This was the first monster [[Summon]]ed in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster was also treated as a [[Dragon]] monster as it was affected by "[[Dragon's Rage (anime)|Dragon's Rage]]" in {{episode|Yu-Gi-Oh!|115|ref}}.
  ** Also, in the anime, this monster is depicted with two distinct heads and a pair of wings, neither of which are featured in its ''[[OCG]]''/''[[TCG]]'' card artwork.
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster's [[Fusion Material]]s are "[[Two-Headed King Rex]]" and "[[Thunder Dragon]]", likely due to the game's inability to use two copies of the same monster.
