title: Card Trivia:Adamancipator Resonance
wikitext: |-
  {{Navigation}}

  * "[[Adamancipator Analyzer]]" and "[[Adamancipator Risen - Dragite]]" appear in this card's artwork.
  * The kanji 「{{Ruby|魔|ま}}{{Ruby|救|きゅう}}{{Ruby|共|きょう}}{{Ruby|振|しん}}{{Ruby|撃|げき}}」 (''Makyū Kyōshingeki'', read as "Adamassiah Resonance") in this card's Japanese name can be translated as "Adamancipator Resonance Strike".
