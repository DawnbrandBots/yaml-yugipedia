title: Card Trivia:Armed Dragon Blitz
wikitext: |-
  {{Navigation}}

  * "[[Armed Dragon LV5]]" and "[[Armed Dragon Thunder LV5]]" appears in this card's artwork.
  ** The two monsters are depicted mimicking [[Chazz Princeton]]'s common pose of pointing one arm toward the sky in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This card's artwork resembles the artwork of "[[Level Copy]]", which was also used to [[Special Summon]] a second "[[Armed Dragon LV5 (anime)|Armed Dragon LV5]]" in the anime.
