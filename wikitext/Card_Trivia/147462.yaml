title: Card Trivia:Labyrinth of Kline
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card's name and artwork is a reference to a [[wikipedia:Klein bottle|Klein bottle]], a non-orientable one-sided surface which, when traveled upon, allows the traveler to the return to its point of original while flipping the traveler upside-down.
  ** This card's effect reflects this, as after the opponent's monster "travels" to the player's field, by negating the attack, the monster returns to its point of origin with its [[ATK]] and [[DEF]] flipped around.
  ** The color of the pathways in this card's artwork strongly resemble a shade of blue known as [[wikipedia:International Klein Blue|International Klein Blue]].
