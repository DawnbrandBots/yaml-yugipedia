title: Card Trivia:Aratama
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''ara-mitama'', the rough and violent side of the ''[[wikipedia:Mitama|mitama]]'', a whole, complete spirit in the [[wikipedia:Shinto|Shinto religion]].
  * This monster is related to "[[Nikitama]]" and "[[Sakitama]]", as they are also based on the different aspects of the ''mitama'', in addition to featuring effects involving [[add]]ing cards to the [[hand]].
