title: Card Trivia:Sadion, the Timelord
wikitext: |-
  {{Navigation}}

  * This monster is named after the Judaic archangel, [[wikipedia:Zadkiel|Zadkiel]].
  ** In the [[wikipedia:Kabbalah|Kabbalah]] of the Jewish religion, Zadkiel is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Chesed|Chesed]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Chesed is the fourth of the ten Sefira of the Tree of Life, and this was the fourth "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  *** In Jewish and Christian angelology, Zadkiel is known for being merciful to those who deserve it, which is reflected in this monster's effect to restore the player's [[Life Point]]s to 4000.
