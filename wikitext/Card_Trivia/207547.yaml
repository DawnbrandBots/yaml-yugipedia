title: Card Trivia:Photon Caesar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Photon Trade]]".
  * This monster's ''[[TCG]]'' name is based on [[wikipedia:Julius Caesar|Julius Caesar]], who is often regarded as the first emperor of Rome.
  ** This monster's Japanese name, "Photon Kaiser", is based on "[[wikipedia:Kaiser|kaiser]]", the German word for "emperor". Additionally, "Caesar" is pronounced "Kaisar" in Greek.
  * This monster has a [[retrained]] [[counterpart]]: "[[Photon Emperor]]".
