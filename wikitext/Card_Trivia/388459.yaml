title: Card Trivia:Chocolate Magician Girl
wikitext: |-
  {{Navigation}}

  * Parts of "[[Dark Magical Circle]]" appear in this card's artwork.
  * This card has the same [[Level]] (4), [[Type]] ([[Spellcaster]]), [[ATK]] (1600), and [[DEF]] (1000) as "[[Breaker the Magical Warrior]]".
  ** Both cards were also used by [[Yugi Muto]] and [[Yami Yugi]], respectively, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  * This card is the only flavor-themed "[[Magician Girl]]" monster to be named after a candy instead of a fruit.
