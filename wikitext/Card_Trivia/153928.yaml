title: Card Trivia:Corridor of Agony
wikitext: |-
  {{Navigation}}

  * This is the first card in the ''[[TCG]]'' to read "[[Main Deck]]" instead of "[[Deck]]".
  * This card's Spanish print features a typo in the line "''los monstruos Invocados de Modo Especial desde el Deck Principal no puede activar sus efectos''". It should be "''los monstruos Invocados de Modo Especial desde el Deck Principal no puede'''n''' activar sus efectos''" instead.
