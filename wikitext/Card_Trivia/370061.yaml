title: Card Trivia:Cyber Raider
wikitext: |-
  {{Navigation}}

  * This card's anime [[flavor text]] is nearly identical to the Japanese flavor text of "[[Battle Warrior]]".
  * This monster's ''[[OCG]]''/''[[TCG]]'' and ''[[Yu-Gi-Oh! Duel Monsters (video game series)|Yu-Gi-Oh! Duel Monsters]]'' video game poses are taken from a panel from {{chapter|Yu-Gi-Oh!|156|ref}} showing [[Cyber Raider (manga)|this monster]] being Summoned, albeit with minor differences in details.
