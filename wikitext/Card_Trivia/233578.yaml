title: Card Trivia:Golden Form
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Gogogo Golem]]" appears in this card's artwork.
  ** Fittingly, in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, "Gogogo Golem" was the monster [[target]]ed by this card's effect.
  * "[[Gogogo Golem - Golden Form]]" is based on the appearance of "Gogogo Golem" after its [[ATK]] is doubled by this card in {{episode|ZEXAL|062|ref}}.
  ** This card's ATK-doubling effect is also incorporated into the ''[[OCG]]''/''[[TCG]]'' release of "Gogogo Golem - Golden Form".
