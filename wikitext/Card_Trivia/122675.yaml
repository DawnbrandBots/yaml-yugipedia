title: Card Trivia:Infernity Doom Slinger
wikitext: |-
  {{Navigation}}

  * This monster's effect is based on [[wikipedia:Russian roulette|Russian roulette]], a deadly, high-stakes game of chance where a single bullet is placed in the revolver, spins the cylinder, points it at someone's head, and pulls the trigger. 
  ** The person with the barrel pointed at their head will have a 1-in-6 chance of death if the loaded chamber aligns with the barrel, which reflects this monster's first bulleted effect to give a 1-in-3 chance of defeat if the player [[draw]]s a monster. This is reinforced in the ''[[Yu-Gi-Oh! 5D's]]'' anime, in which this monster is depicted pointing its revolver at the opponent's head.
  * This monster's first ''[[OCG]]''/''[[TCG]]'' bulleted effect that causes the player to take 4000 damage if they don't [[reveal]] a monster is based on its appearance in {{episode|5D's|091|ref}}, in which if the opponent chooses to have the player [[reveal]] the top card of their [[Deck]] for this monster's effect and the player reveals a Spell/Trap card, then the player takes damage equal to total effect damage they have already received that turn. In the aforementioned episode, [[Kalin Kessler]] activates this effect after taking damage from the effect of [[Lawton]]'s "[[Gatling Ogre (anime)|Gatling Ogre]]" earlier that turn, meaning he would have taken 4000 damage if he had revealed a [[Spell]]/[[Trap Card]] with this monster's effect.
  * In the ''Yu-Gi-Oh! 5D's'' anime, when this monster is played, [[Kalin Kessler]] says, "I've honestly forgotten how many [[Monster Cards]] I have in my Deck", as a homage to the film ''[[wikipedia:Dirty Harry|Dirty Harry]]'', in which the titular character claims he's forgotten how many bullets he's fired from his pistol. Like in the film, where Harry's gun is empty when he first uses the line and loaded the second time, the top of Kalin's Deck is a non-monster the first time he uses the effect and a monster the second time.
