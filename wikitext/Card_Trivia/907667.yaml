title: Card Trivia:Uradora of Fate
wikitext: |-
  {{Navigation}}

  * "[[Dragong]]" and "[[Poki Draco]]" appear in this card's artwork.
  ** Both monsters feature the word "''dora''" in their Japanese names ("''Dora Dora''gon" and "Poki ''Dora''", respectively).
  * This card's name and artwork is a parody of "[[Dora of Fate]]".
  * An "''uradora''" (or "reverse dora") is an additional "''dora''" indicator in [[wikipedia:Japanese Mahjong|Japanese mahjong]] underneath the normal "''dora''" indicator that is accessed by a player completing their hand after declaring "riichi". The "''dora''" is a special tile worth extra points in the game of Japanese mahjong, and are determined based on what the "''dora''" indicators are.
  ** The [[Type]]s of monster required for this card's additional draw effect ([[Dragon]], [[Dinosaur]], [[Sea Serpent]], or [[Wyrm]]) are a portmanteau of the words "dragon" ('''''dora'''gon'') and "''dora''", as all four of these Types are named as different kinds of "dragon" in Japanese.
  ** When declaring "''riichi''" in Japanese mahjong, a player must pay 1000 points, which is represented by this card's 1000 [[Life Point]] cost. The additional effect being [[activate]]d when the monster destroys another monster by battle represents the monster "winning" a game after declaring "''riichi''", and thus getting access to the "''uradora''" indicators.
  ** Since "''uradora''" indicators are revealed by picking up the appropriate stack(s) and looking at the tile on the bottom (as depicted in this card's artwork), it is represented by revealing the bottom card of the Deck.
