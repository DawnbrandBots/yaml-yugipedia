title: Card Trivia:Crystal Boon
wikitext: |-
  {{Navigation}}

  * "[[Crystal Beast Ruby Carbuncle]]", and the crystal forms of "[[Crystal Beast Amber Mammoth]]" and "[[Crystal Beast Sapphire Pegasus]]", appear in this card's artwork.
  ** This card's artwork depicts "Crystal Beast Ruby Carbuncle" [[activate|activating]] its effect to [[Special Summon]] the "[[Crystal Beast]]" monsters from the [[Spell & Trap Zone]], as depicted in the ''[[Yu-Gi-Oh! GX]]'' anime.
