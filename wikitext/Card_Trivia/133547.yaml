title: Card Trivia:Battle Fusion
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect [[support]]ing the player's [[Fusion Monster]] is an alteration of its effect in the ''[[Yu-Gi-Oh! GX]]'' anime, which allows the player's monster to gain [[ATK]] equal to an opponent's monster that it battles. In {{episode|GX|052|ref}}, this card was used alongside the Fusion Monsters "[[Cyber End Dragon (anime)|Cyber End Dragon]]" and "[[Elemental Hero Shining Flare Wingman (anime)|Elemental Hero Shining Flare Wingman]]".
