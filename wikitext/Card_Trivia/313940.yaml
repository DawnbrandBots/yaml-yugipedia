title: Card Trivia:Mayosenju Daibak
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: Tribe Force]]''/''[[The Secret Forces]]''.
  * Like several other members of the "[[Yosenju]]" archetype, "Daibak" is based on the "[[wikipedia:Kamaitachi|Kamaitachi]]", a monster from [[wikipedia:Japanese folklore|Japanese folklore]]. These creatures are said to resemble weasels, and ride on whirlwinds while trying to cut passers-by. It is to this interpretation that this monster owes its weasel-like form.
  * This card's Japanese name, "大刃禍是/Daibakaze", is a play on words. As written, the characters roughly mean "large sword calamity righteousness". But "場風/bakaze", meaning "like the wind" is a term originating from mahjong that refers to a spiraling pattern or motion, like a whirlwind. Therefore, this card's name is also a homophone for "large whirlwind"
