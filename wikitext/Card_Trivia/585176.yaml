title: Card Trivia:Gimmick Puppet Chimera Doll
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Chimera (mythology)|chimera]], a creature in [[wikipedia:Greek mythology|Greek mythology]] whose body consists of parts of different animals.
  ** This monster's appearance consists of different doll parts, with the white doll torsos resembling the heads of a goat, a lion, and a snake, each of them typically depicted as the animal parts that commonly make up the chimera.
