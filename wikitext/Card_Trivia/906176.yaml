title: Card Trivia:Exchange of Despair and Hope
wikitext: |-
  {{Navigation}}
  [[File:Soul_Crossing.png|thumb|right|250px|[[Seto Kaiba (manga)|Kaiba]] uses "[[Soul Exchange (manga)|Soul Exchange]]" to Tribute "[[Agido (manga)|Agido]]", "[[Kelbek (manga)|Kelbek]]", and "[[Zolga (manga)|Zolga]]" to [[Tribute Summon]] "[[The God of the Obelisk]]".]]

  * "[[Agido]]", "[[Kelbek]]", "[[Obelisk the Tormentor]]", and "[[Zolga]]" appear in this card's artwork.
  ** The aforementioned monsters are based on {{chapter|Yu-Gi-Oh!|228|ref}} and {{episode|Yu-Gi-Oh!|094|ref}} where [[Seto Kaiba]] uses "[[Soul Exchange (anime)|Soul Exchange]]" to Tribute "Agido", "Kelbek", and "Zolga" to [[Tribute Summon]] "Obelisk the Tormentor."
  * This card is a [[counterpart]] of "[[Exchange of the Spirit]]".
  ** This card's artwork is based on that of "Exchange of the Spirit".

  == See also ==
