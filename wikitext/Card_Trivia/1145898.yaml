title: Card Trivia:Necromaid Lurker
wikitext: |-
  {{Navigation}}

  * This monster appears to be "[[Necromaid Nana]]" [[cosplay]]ing as "[[Wicked Shadow Dark Lurker]]".
  ** This monster has the same [[Level]] (7) and [[original DEF]] (2600) as "Dark Lurker".
  *** This monster's effect to [[destroy]] an opponent's card and inflict burn damage is based on the effect of "Dark Lurker".
  ** This monster has the same [[original ATK]] (1100) as "Necromaid Nana".
  ** This monster was revealed two days before Halloween 2025, tying into its dress-up theme.
