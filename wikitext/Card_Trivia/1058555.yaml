title: Card Trivia:Xyz Poseidon Splash
wikitext: |-
  {{Navigation}}

  * [[Abyss (character)|Abyss]] appears in this card's artwork.
  ** This card's name is also a reference to "[[Number 73: Abyss Splash]]", which is [[Number Guardian|guarded]] by Abyss in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This card's name and artwork both reference "[[Poseidon Wave]]", a [[Trap Card]] which depicts the shaded figure of a humanoid manipulating large tsunamis, most likely based on [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea. In the anime, it was replaced with "[[Zeus' Breath]]" and was used by [[Reginald Kastle|Reginald "Shark" Kastle]].
