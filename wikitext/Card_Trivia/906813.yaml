title: Card Trivia:Transam Road Linac
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck Mod Pack: Double Star of the Assault!!]]''.
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form of "[[Transam Linac]]", fused with "[[Sevens Road Magician]]".
  ** This card represents the bond between [[Yudias Velgear]] and [[Yuga Ohdo]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
