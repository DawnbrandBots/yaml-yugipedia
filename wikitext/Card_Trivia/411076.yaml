title: Card Trivia:Toon Barrel Dragon
wikitext: |-
  {{Navigation}}

  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Barrel Dragon]]".
  ** This monster's appearance is different from its original counterpart, as it features visible cartoonish eyes, a bright color scheme (similar to "Barrel Dragon's" ''[[TCG]]'' artwork), and it shoots pellets from its cannons instead of bullets.
  ** This monster's [[coin toss]] effect to [[destroy]] any card on the [[field]] if they flip at least two heads is a reference to the effect of "Barrel Dragon", which can destroy the opponent's monsters with he same results.
