title: Card Trivia:Wedju Temple
wikitext: |-
  {{Navigation}}

  * Stone tablets of "[[Beaver Warrior]]", "[[Curse of Dragon]]", "[[Exodia the Forbidden One]]", "[[Feral Imp]]", "[[Horn Imp]]", "[[Left Arm of the Forbidden One]]", "[[Left Leg of the Forbidden One]]", "[[Maiden of the Moonlight]]", "[[Millennium Golem]]", "[[Mystical Elf]]", "[[Right Arm of the Forbidden One]]", "[[Right Leg of the Forbidden One]]", "[[Time Wizard]]" and "[[Watapon]]" appear in this card's artwork.
  ** Among these monsters, only two of them have "[[Millennium]]" [[Effect Monster|Effect]] [[counterpart]]s: "[[Golem that Guards the Millennium Treasures]]" and "[[Maiden of the Millennium Moon ]]".
  * This card is based on the [[Shrine of Wedju (location)|Shrine of Wedju]], a location in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]] which contains the stone slabs used to contain monster ''[[ka]]''.
