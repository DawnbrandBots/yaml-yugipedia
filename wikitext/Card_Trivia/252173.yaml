title: Card Trivia:Spellbook Library of the Heliosphere
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Sun (Tarot card)|The Sun]], the nineteenth of the [[wikipedia:Major Arcana|Major Arcana]].
  ** Fittingly, the [[wikipedia:heliosphere|heliosphere]] is the region surrounding the [[wikipedia:Sun|Sun]] where its [[wikipedia:Solar wind|wind]] is strong enough to push back the [[wikipedia:interstellar medium|gas]] filling the [[wikipedia:Milky Way|Milky Way]], sometimes pointed out as a way to define the border between its domain (i.e. the [[wikipedia:Solar System|Solar System]]) and [[wikipedia:Outer space|interstellar space]].
  * "[[Spellbook Library of the Crescent]]", "[[Spellbook Library of the Heliosphere]]" and "[[Spellbook Star Hall]]" are all rooms located inside "[[The Grand Spellbook Tower]]".
