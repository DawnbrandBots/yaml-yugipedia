title: Card Trivia:Kewl Tune Loudness War
wikitext: |-
  {{Navigation}}
  * "[[Kewl Tune Track Maker]]" appears in this card's artwork.
  * This monster's name is derived from "[[wikipedia:Loudness war|loudness war]]", a trend in music production where audio levels are increased competitively that results in reduced dynamic range and often sacrificing sound quality for perceived loudness, which is especially emphasized in the styles of music played at clubs and raves.
