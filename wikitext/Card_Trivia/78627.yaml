title: Card Trivia:Elemental HERO Divine Neos
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.6]]''.
  * This monster is an [[Contact Fusion|Ultimate Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with the six "[[Neo-Spacian]]" monsters: "[[Neo-Spacian Air Hummingbird|Air Hummingbird]]", "[[Neo-Spacian Aqua Dolphin|Aqua Dolphin]]", "[[Neo-Spacian Dark Panther|Dark Panther]]", "[[Neo-Spacian Flare Scarab|Flare Scarab]]", "[[Neo-Spacian Glow Moss|Glow Moss]]", and "[[Neo-Spacian Grand Mole|Grand Mole]]".
  ** This monster represents the ultimate unknown power dwelling in "Neos", as hinted in the latter's [[flavor text]].
  ** "[[Elemental HERO Cosmo Neos]]" is similar to this monster, as it is a combination of "[[Elemental HERO Chaos Neos]]", "[[Elemental HERO Magma Neos|Magma Neos]]", and "[[Elemental HERO Storm Neos|Storm Neos]]"; by extension, it is also a Fusion of "Neos" and all six "Neo-Spacian" monsters, since each of the three aforementioned Fusion Monsters requires two different "Neo-Spacian" monsters as [[Fusion Material]]s: "Flare Scarab" and "Grand Mole" for "Magma Neos", "Dark Panther" and "Glow Moss" for "Chaos Neos", and "Air Hummingbird" and "Aqua Dolphin" for "Storm Neos".
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster had the highest specific number of Fusion Materials (7) of all [[Fusion Monster]]s.
  * In the ''Yu-Gi-Oh! GX'' anime, this monsters'  [[original ATK]] was 3000; in the ''OCG''/''TCG'', its ATK was changed to 2500.
  * This monster, "[[Evil HERO Neos Lord]]", "[[Armed Neos]]" and "[[Rainbow Neos]]" are the only "[[Neos]]" Fusion Monsters that cannot be [[Special Summon]]ed with "[[Miracle Contact]]", as this monster does not list "Elemental HERO Neos" as a Fusion Material, while the other three are not "[[Elemental HERO]]" monsters.
