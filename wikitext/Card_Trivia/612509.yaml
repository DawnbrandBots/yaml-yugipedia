title: Card Trivia:Sunlight Unicorn
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[add]] an [[excavate]]d [[Equip Spell Card]] to the player's [[hand]] is an alteration of its anime effect to add a [[Spell Card]] [[reveal]]ed from the top of the [[Deck]] to the player's hand. In {{episode|5D's|018|ref}}, this monster's effect added the Equip Spell Card "[[Horn of the Unicorn (later anime)|Horn of the Unicorn]]" to [[Luna]]'s hand.
  ** Fittingly, this monster's effect is designed to work in conjunction with the effect of "[[Horn of the Unicorn]]", which can [[return]] itself to the top of the player's Deck when it is [[sent]] from the [[field]] to the [[Graveyard]].
