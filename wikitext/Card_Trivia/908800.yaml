title: Card Trivia:Supreme Beasteam Magnum Overlord
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[B.B.B. - Beast Brave Brandish]]" in [[Maximum Mode]] (together with "[[Supreme Beasteam Magnum Overlord (L)|Supreme Beasteam Magnum Overlord [L]]]" and "[[Supreme Beasteam Magnum Overlord (R)|Supreme Beasteam Magnum Overlord [R]]]").
  * This is the first [[Maximum Monster]] to have three [[Continuous Effect]]s.
  * This monster has three [[counterpart]]s: "[[Supreme Machine Magnum Overlord]]", "[[Supreme Railartillery Magnum Overlord]]", and "[[Supreme Skystream Magnum Overlord]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (10), [[Type]] ([[Machine]]), [[original ATK and DEF]] (1900/0), and [[MAXIMUM ATK]] (4000) with the above-mentioned monsters.
  * Along with "Supreme Beasteam Magnum Overlord [L]" and "Supreme Beasteam Magnum Overlord [R]", this is the only [[Magnum Overlord]] monster to appear in the manga instead of the anime.
