title: Card Trivia:Wall of Illusion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Slip Summon]]".
  * This is the only [[Effect Monster]] to originally include the word "creature".
  * This card is based on an [[Wikipedia:Onryō|Onryō]], a mythological spirit from Japanese folklore that clings to the physical world to seek vengeance.
