title: 'Card Trivia:Number 95: Galaxy-Eyes Dark Matter Dragon'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.10]]''.
  * This monster is named after [[wikipedia:Dark matter|dark matter]], hypothetical form of matter that does not interact with light or other electromagnetic radiation.
  * This monster has a [[LIGHT]] [[counterpart]]: "[[Galaxy-Eyes Antimatter Dragon]]".
  * This is the first "[[Galaxy-Eyes]]" monster used by [[Kaito Tenjo (manga)|Kaito Tenjo]] to not be part of the "[[Photon]]" archetype, as well as the first to be [[DARK]].
  * Like the other "[[Number]]" monsters associated with Kyoji, this monster is related to one of the [[wikipedia:Seven deadly sins|seven deadly sins]], specifically, the [[wikipedia:Pride (deadly sin)|deadly sin of pride]].
  ** In the ''Yu-Gi-Oh! ZEXAL'' manga, this monster was given by Kyoji to Kaito, who is known for having a prideful personality, in terms of his [[Duel]]ing ability, his usage of "Galaxy-Eyes" monsters, and his mission to collect the "Number" monsters to heal his brother [[Haruto Tenjo (manga)|Haruto Tenjo's]] condition.
  * This monster has the same ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] as "[[Galaxy-Eyes Full Armor Photon Dragon]]".
  ** Both monsters' Japanese names are written without kanji.
  ** Both monsters were used by Kaito Tenjo in the ''Yu-Gi-Oh! ZEXAL'' manga.
  ** In the manga, this monster had 0 ATK and an effect of gaining ATK equal to the ATK of its materials; during Kaito's second Duel against [[Yuma Tsukumo (manga)|Yuma Tsukumo]], this monster gained the 4000 ATK of "Full Armor Photon Dragon". This serves as the basis for its 4000 [[original ATK]] in its ''OCG''/''TCG'' release.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|ZEXAL|042|ref}}, specifically from the panel showing [[No. 95: Galaxy Eyes Dark Matter Dragon (manga)|this monster]] being Summoned, with the pose turned vertically.
  ** The souls that appear in this card's artwork also appear in the artwork of "[[Soul Arena]]", which was used by [[Kyoji Yagumo]] in his Duel against [[Ryoga Kamishiro (manga)|Ryoga Kamishiro]] during the same time this card was played in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
