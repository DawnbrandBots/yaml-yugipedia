title: Card Trivia:Time Thief Startup
wikitext: |-
  {{Navigation}}

  * "[[Time Thief Perpetua]]", "[[Time Thief Regulator]]",  and "[[Time Thief Chronocorder]]" appear in this card's artwork.
  ** "Perpetua" shares the pose she made in the artwork of "Time Thief Perpetua".
  * The left and right-handed gadget gloves on the table in this card's artwork are suggested to be the gloves used by "[[Time Thief Redoer]]" and "[[Time Thief Winder]]".
  * This woman in this card's artwork bears a striking resemblance to [[fandom:w:c:kiseki:Erika Russell|Erika Russell]], another engineer from the [[fandom:w:c:kiseki|"The Legend of Heroes"]] video game series.
