title: Card Trivia:Road Synchron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Overtake]]".
  * The monster's design is reminiscent of EI-06, an enemy mecha monster from ''[[wikipedia: The King of Braves GaoGaiGar|The King of Braves GaoGaiGar]]'' that steamrolled over small cars, smashing them and absorbing their matter.
  * This monster shares the same [[Attribute]] ([[LIGHT]]), [[Level]] (4), [[Type]] ([[Machine]]/[[Tuner]]), and [[original ATK and DEF]] (1600/800) as "[[Hyper Synchron]]".
  ** Both are tied for the highest original [[ATK]] (1600) of all "[[Synchron]]" monsters.
  * This monster and "[[Junk Synchron]]" are the only "Synchron" monsters that are named '''Sincronizador''' in the Spanish ''[[TCG]]'', while the other "Synchron" monsters are named '''Sincrón'''.
