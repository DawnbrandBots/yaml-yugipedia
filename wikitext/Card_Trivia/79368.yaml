title: Card Trivia:Archfiend General
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Archfiend Emperor, the First Lord of Horror]]".
  * This card, due to its relation to the "Chess [[Archfiends]]" and "[[Pandemonium]]", seems to be based on the Gold and Silver Generals of Shogi, which is also known as Japanese or General's chess.
  * This card has one Fairy counterpart, "[[Zeradias, Herald of Heaven]]", and one "[[Elemental HERO]]" counterpart, "[[Elemental HERO Captain Gold]]". They each share the same Level, ATK, DEF and abilities to be discarded to Summon a specific Field Card, and be destroyed if that card isn't on the field when they are.
  * The Spanish print of this card uses the word "''agregar''" instead of "''añadir''", which is the official translation for the term "''add''".
