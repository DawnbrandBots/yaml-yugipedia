title: Card Trivia:Torna the Windweaver
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Eye of the Storm]]" and "[[Wind Spirit's Protection]]", as well as in the second artwork of "[[Over Rush Storm]]".
  * This monster's name is the shortened form of the word "tornado".
  ** This monster has a [[counterpart]] with a similar naming scheme: "[[Cyc the Child of Wind]]".
