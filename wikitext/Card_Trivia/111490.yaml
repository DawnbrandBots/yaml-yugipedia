title: Card Trivia:Hysteric Fairy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Surprise Inspection]]".
  * This monster's book features an ''[[wikipedia:ankh|ankh]]'', the ancient Egyptian symbol for life.
  * In the English dubbed version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster is referred to by its Japanese name, "Hysteric Angel".
  * This monster's appearance in the ''Yu-Gi-Oh!'' anime and ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'' is slightly different. In the anime, this monster wears socks, whereas in the video game, it wears leggings.
