title: Card Trivia:Fiend's Mirror
wikitext: |-
  {{Navigation}}

  * This monster has a [[retrain]]ed ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Absorbing Fiend's Mirror]]".
  * This card's ''[[OCG]]'' /''[[TCG]]'' release are separated by nearly 13 years. This card was originally printed in the ''OCG'' in ''[[Premium Pack 2 (Japanese)|Premium Pack 2]]'', released on December 12, 1999 and was not printed in the ''TCG'' until March 20, 2012.
