title: Card Trivia:Lady Labrynth of the Silver Castle
wikitext: |-
  {{Navigation}}

  * Statues of "[[Ariane the Labrynth Servant]]", "[[Arianna the Labrynth Servant]]", "[[Arias the Labrynth Butler]]", and the unnamed "[[Labrynth]]" monster in the artwork of "[[Big Welcome Labrynth]]" appear in this card's alternate artwork.
  * This card's first artwork depicts "[[Lovely Labrynth of the Silver Castle]]" in a more combat-oriented outfit.
