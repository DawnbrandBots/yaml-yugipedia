title: Card Trivia:Pentacle of Ace
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The pentacle in this card's artwork appears in the artwork of "[[Knight of Pentacles]]".
  * This card is based on a [[wikipedia:Minor Arcana|Minor Arcana]] card, the [[wikipedia:Ace of Coins|Ace of Coins]], which is also known as the Ace of Pentacles.
