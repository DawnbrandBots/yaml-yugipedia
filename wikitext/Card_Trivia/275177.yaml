title: 'Card Trivia:Number 65: Djinn Buster'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * The number "65" is located on the right side of this monster's chest.
  * This monster has a [[Ranked-Up]] "[[Number C]]" form: "[[Number C65: King Overfiend]]".
  ** This is the first [[Mythyrian Number]] to have a "Number C" form.
  * This is the only Mythyrian Number to have never manifested as a [[Monster Spirit]] in the anime.
  * This is the first [[Rank 2]] [[Xyz Monster]] in the ''[[OCG]]''/''[[TCG]]'' to require specific [[Xyz Material]]s.
  * "[[Number]]" monsters often take the form reflecting their owners and/or their original desires. In this case, this Mythyrian Number represents this monster's original owner, [[Vector]].
  ** This monster's Japanese name, "Split-Decision Djinn - Judge Buster" features "''saidan''" (裁断), the Japanese word meaning "cutting" and "judgment", reflecting this monster's bladed weapons and position as judge.
  *** Fittingly, in the anime, this monster's [[neutral form]] was similar to a pair of scissors.
  *** This reflects [[Vector]]'s past life as a prince, who was corrupted by [[Don Thousand]] following the death of his [[Vector's mother|mother]] and [[Vector's father|father]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. Prior to Don Thousand's corruption, Vector wanted peace between kingdoms instead of engaging in meaningless war; however, after his corruption, he became cruel and unjustly executed his subjects (most likely with his sword to further connect with this monster's bladed design).
  ** This monster may also be inspired by [[wikipedia:Minos|Minos]], a mythical king of the island of Crete, whose actions led to the birth of the [[wikipedia:Minotaur|Minotaur]] and who became a judge of the underworld after his death.
  *** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster was guarded by [[Battle Ox (character)|Battle Ox]], a monster based on the Minotaur.
