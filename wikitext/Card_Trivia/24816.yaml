title: Card Trivia:Genghis Ghan the Emperor Dragon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is named after [[wikipedia:Genghis Khan|Genghis Khan]], the warlord of the [[wikipedia:Mongol Empire|Mongol Empire]] who is famously known for his conquests to expand his empire across the Eurasian continents.
  ** The pronunciation of "Ghan" is also a pun, as it has a similar pronunciation to the word "gun". This is reflected in the realistic cannon in this monster's mouth, which it uses to attack in the ''[[Yu-Gi-Oh! GX]]'' anime.
