title: Card Trivia:Donyoribo @Ignister
wikitext: |-
  {{Navigation}}

  * This monster's horn resembles [[Ai]]'s head in his [[Ignis]] form.
  * The "[[@Ignister]]" logo is located on this monster's tuft, likely serving as the eye.
  * This monster's name is a portmanteau of the Japanese words "''donyori''" (ドンヨリ) and "[[Kuriboh]]" (クリボー).
  ** "''Donyori''" is the Japanese onomatopoeia for "depressing", referencing Ai's sadness for being the last remaining Ignis in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
  *** This monster's appearance features a tuft and yellow lines that resemble a thunder cloud, which is often used in media to represent a character's depression in media, further reinforcing this monster's namesake.
  *** The above-mentioned fact and this monster's relationship with the "[[Kuriboh (archetype)|Kuriboh]]" [[archetype]] is based on how "[[Linkuriboh]]" adopts a more darker look as "[[Linguriboh]]" during Ai's depressive state.
