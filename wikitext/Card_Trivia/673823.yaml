title: Card Trivia:Predaplant Verte Anaconda
wikitext: |-
  {{Navigation}}

  * This monster is a combination of the ''[[wikipedia:Solanum opacum|Solanum opacum]]'' plant (also known as the "morelle verte") and the [[wikipedia:Green anaconda|green anaconda]].
  * This is the first and currently only "[[Predaplant]]" [[Link Monster]], as well as the first non-Fusion [[Extra Deck]] "Predaplant" monster.
