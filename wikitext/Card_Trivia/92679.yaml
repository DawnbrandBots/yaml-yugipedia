title: Card Trivia:Trojan Blast
wikitext: |-
  {{Navigation}}

  * "[[The Trojan Horse]]" appears in this card's artwork.
  ** This and this card's effect both reference the [[wikipedia:Trojan War|Trojan War]] where the Greeks attempted to lay a final assault to the city of [[wikipedia:Troy|Troy]] by hiding in a giant wooden horse that was brought within the city.
