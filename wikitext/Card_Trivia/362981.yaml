title: Card Trivia:Lose 1 Turn
wikitext: |-
  {{Navigation}}

  * "[[Goblin Attack Force]]", "[[Giant Orc]]", "[[Rescue Cat]]", "[[Man-Thro' Tro']]", and the green creatures from the international artwork of "[[Taunt]]" appear in this card's artwork.
  ** The inclusion of "Goblin Attack Force" and "Giant Orc" reflects this card's effects, as both cards feature an effect that switches them to [[Defense Position]].
  * This card's artwork continues the events of "[[Back to Square One]]", which also depicts a board game based on ''[[wikipedia:The Game of Life|The Game of Life]]''. Unlike this card's name and artwork, however, the real-life game does not feature a space that makes the player "lose 1 turn".
