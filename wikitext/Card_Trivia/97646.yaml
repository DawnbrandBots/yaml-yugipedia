title: Card Trivia:Shiny Black "C"
wikitext: |-
  {{Navigation}}

  * In ''[[Yu-Gi-Oh! 5D's World Championship 2010: Reverse of Arcadia]]'', this monster is [[:File:ShinyBlackC-WC10.png|shown as a cockroach]]. The "[["C"]]" in this monster's English name stands for "cockroach" - the Japanese name uses "G" for "gokiburi", the Japanese word for "cockroach".
  * This card's artwork references its effect - it "hides" in the [[Graveyard]] between the other cards, and becomes a nuisance when the opponent least expects it by [[banish]]ing itself.
