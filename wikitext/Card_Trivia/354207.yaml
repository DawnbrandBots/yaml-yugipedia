title: Card Trivia:Masked HERO Blast
wikitext: |-
  {{Navigation}}

  * This monster is based on the archetypal green Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[WIND]], which is represented by a green-colored circle.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! GX - Chapter SP1|ref}}, specifically from the panel showing [[Masked HERO Blast (manga)|this monster]] being Summoned.
