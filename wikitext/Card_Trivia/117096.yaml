title: Card Trivia:X-Saber Pashuul
wikitext: |-
  {{Navigation}}

  * This monster is likely named after [[wikipedia:Perceval|Sir Perceval]] (or Percival), one of the [[wikipedia:Knights of the Round Table|Knights of the Round Table]].
  * This card's Spanish print in ''[[Turbo Pack: Booster Seven]]'' features a typo, in which the portion of the lore that reads "You take 1000 damage" not only includes the word "you" (which is almost always omitted in other card lores), but is also written as "tu" ("your") instead of "tú".
