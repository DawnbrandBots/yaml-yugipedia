title: Card Trivia:Flower Cardian Paulownia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Flower Gathering]]", "[[Fraud Check]]", "[[Super All In!]]", and "[[Super Koi Koi]]".
  * "[[Tentacle Plant]]" appears in this card's artwork, depicted by this monster.
  * This monster is based on the "Paulownia" suit of ''[[wikipedia:Hanafuda|hanafuda]]'' playing cards.
  ** This monster's [[Level]] (12) references how the "Paulownia" suit falls under the month of December, the twelfth month of the year.
  ** This monster's [[original ATK and DEF]] (100/100) references how the "Paulownia" card is a ''kasu'' card, which is worth one point.
  * This is the first [[Level 12]] [[Normal Summon Monster]].
