title: Card Trivia:Motivating Captain
wikitext: |-
  {{Navigation}}

  * This card is a [[retrained]] [[counterpart]] of "[[Marauding Captain]]", with inverted [[original ATK and DEF]].
  * "[[Field-Commander Rahz]]" appears in this card's artwork, along the same warrior that appears in the artworks of "[[Marmiting Captain]]", "[[The A. Forces]]" and "[[Cry Havoc!]]".
  * This card's artwork probably continues the events of "[[The Warrior Returning Alive]]".
