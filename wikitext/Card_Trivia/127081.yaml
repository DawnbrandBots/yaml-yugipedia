title: Card Trivia:Light of Intervention
wikitext: |-
  {{Navigation}}

  * This card's artwork is similar to that of "[[Luminous Spark]]"; both depict a red winged demon shielding itself away from the light.
  * This is the only card to feature an effect that allows monsters to be [[Normal Summon]]ed in [[face-up]] [[Defense Position]].
  * This card's Spanish print in ''[[Starter Deck: Kaiba Evolution]]'' features a typo, as it says "'''''Posicón''' de Defensa''" instead of "'''''Posición''' de Defensa''" ("''Defense Position''").
