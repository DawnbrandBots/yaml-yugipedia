title: Card Trivia:Emperor's Key (card)
wikitext: |-
  {{Navigation}}

  * The [[Emperor's Key]] and various [[Astral glyphs]] appear in this card's artwork, as well as the blue background with the cubes and curved grid that is present during the first two scenes that play with lyrics during "[[My Quest]]" (the first Japanese ending theme for the ''[[Yu-Gi-Oh! ZEXAL]]'' anime).
  ** The Astral glyphs can be translated as the following:
  *** In the upper-left corner, [[File:Symbol-Astral-a.svg|Symbol-Astral-a.svg|20px]][[File:Symbol-Astral-su.svg|Symbol-Astral-su.svg|20px]][[File:Symbol-Astral-to.svg|Symbol-Astral-to.svg|20px]][[File:Symbol-Astral-ra.svg|Symbol-Astral-ra.svg|20px]][[File:Symbol-Astral-ru.svg|Symbol-Astral-ru.svg|20px]] translates to 「アストラル」 (''Asutoraru'', "Astral"), referencing [[Astral]].
  *** In the bottom-left corner, [[File:Symbol-Astral-ze.svg|Symbol-Astral-ze.svg|20px]][[File:Symbol-Astral-a.svg|Symbol-Astral-a.svg|20px]][[File:Symbol-Astral-ru.svg|Symbol-Astral-ru.svg|20px]] translates to 「ゼアル」 (''Zearu'', "ZEXAL"), referencing [[ZEXAL (power)|ZEXAL]].
  *** In the upper-right corner, [[File:Symbol-Astral-yu.svg|Symbol-Astral-yu.svg|20px]][[File:Symbol-Astral-u.svg|Symbol-Astral-u.svg|20px]][[File:Symbol-Astral-ma.svg|Symbol-Astral-ma.svg|20px]] (with all the glyphs rotated 90 degrees counterclockwise, read from the bottom up) translates to 「ユウマ」 (''Yuuma'', "Yuma"), referencing [[Yuma Tsukumo]].
  *** Slightly above the bottom-right corner, [[File:Symbol-Astral-o.svg|20px]][[File:Symbol-Astral-u.svg|20px]][[File:Symbol-Astral-no.svg|20px]][[File:Symbol-Astral-ka.svg|20px]][[File:Symbol-Astral-gi.svg|20px]] translates to 「おうのかぎ」 (''Ou no Kagi'', "Emperor's Key"), referencing the [[Emperor's Key]].
  *** In the bottom-right corner, [[File:Symbol-Astral-ka.svg|20px]][[File:Symbol-Astral-tsu.svg|10px]]<!--This is deliberately a small "tsu"-->[[File:Symbol-Astral-to.svg|20px]][[File:Symbol-Astral-bi.svg|20px]][[File:Symbol-Astral-n.svg|20px]][[File:Symbol-Astral-gu.svg|20px]] translates to 「かっとビング」 (''Kattobingu''), referencing [[kattobingu]].
  * This is the first card that can be used as a [[Token]] or a [[counter]].
