title: Card Trivia:Etoile Cyber
wikitext: |-
  {{Navigation}}

  * This card (with its original anime artwork) appears in the background of the original anime artwork of "[[Montage Dragon (anime)|Montage Dragon]]".
  * This monster's name is based on ''[[wikipedia:Danseur étoile|danseuse étoile]]'', a French term meaning "star dancer", which is used to signify the highest rank a female ballerina can reach at the [[wikipedia:Paris Opera Ballet|Paris Opera Ballet]].
  * Interestingly, when this card was released in the ''[[OCG]]''/''[[TCG]]'', the ATK boost its effect provides was slightly reduced from the anime, increasing by only 500 instead of 600.
  * This is the only [[Cyber Girl]] monster to have the word "Cyber" as the second word of its name instead of the first.
