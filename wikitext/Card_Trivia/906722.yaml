title: Card Trivia:Dark Magician the Knight of Dragon Magic
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Monstrous Revenge]]''.
  * "[[Dark Magical Circle]]" and "[[Dark Spear]]" appear in this card's artwork.
  * Visually, this monster is a [[Fusion Monster|Fusion]] of "[[Dark Magician]]" and "[[Gaia the Magical Knight of Dragons]]".
  ** This monster's [[Fusion Materials]] reference how both "Dark Magician" and "[[Gaia the Dragon Champion]]" are used by [[Dark Yugi (manga)|Dark Yugi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's [[piercing]] effect is based on the two cards that support its Fusion Materials ("Dark Spear" for "Dark Magician" and "[[Spiral Spear Strike]]" for "Gaia the Dragon Champion").

  * This monster has a "[[Gaia The Fierce Knight]]" counterpart: "[[Dark Cavalry]]".
  ** Both are depicted riding their steeds in mirrored poses in their respective card artworks.
