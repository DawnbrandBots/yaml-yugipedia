title: Card Trivia:Fairy Tail - Matchgiru
wikitext: |-
  {{Navigation}}

  * This monster is based on the fairy tale ''[[wikipedia:The Little Match Girl|The Little Match Girl]]''.
  ** This monster's effect to make an opponent's monster become "Fairy Prince" by paying 500 [[Life Points]] references the plot of the tale, where a child, dying of cold, burns the matches she is selling in the street to warm herself and see comforting visions in the flames—the last of which is her grandmother, the only person who ever showed her love in life.
