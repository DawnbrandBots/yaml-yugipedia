title: Card Trivia:Double Sensorship
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is a pun on the word "censorship", which is the '''suppression''' of speech, public communication or other information which may be considered objectionable. Suppression in this case is stopping an attack.
  * Censorship is applied to copy off an existing work, in this case two monsters with the same name.
