title: Card Trivia:Ship of Seven Treasures
wikitext: |-
  {{Navigation}}

  * "[[Deity of Seven Treasures - Ryozai]]" appears in this card's second artwork.
  * This card is based on the [[wikipedia:Takarabune|Takarabune]], a sacred ship from Japanese mythology, said to be loaded with various treasures and piloted by the [[wikipedia:Seven Lucky Gods|Seven Lucky Gods]]. An alternate reading of the ship's name ("Hōsen") is used for this card's name.
