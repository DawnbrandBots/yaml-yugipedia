title: 'Card Trivia:Number 34: Terror-Byte'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}
  * This is the first [[Machine]]-[[Type]] [[Xyz Monster]].
  * This is the first [[Rank]] 3 Xyz Monster that requires 3 [[Xyz Material]]s.
  * The number "34" can be seen on this monster's right shoulder plate.
  ** Oddly, the number "3" on this monster is shaped differently compared to the "3"s on all the other "[[Number]]" monsters.
  *** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this different "3" also appeared on [[Mr. Kay]] and during this monster's Summoning sequence.
  ** Additionally, the number "4" on this monster also appears to be slightly different compared to the other two variants of "4" displayed on the other "Number" monsters: the bottom dot seems to be wider (as shown in the anime Summoning sequence)
  * "Number" monsters often take the form reflecting their owners and/or their original desires. In the case of this card's original owner, Mr. Kay, this card's Machine-Type and effect of taking [[control]] of an opponent's monster is the result of Mr. Kay's desire to take control of [[Heartland City]]'s mainframe and create a giant virtual "[[Crashbug (card)|Crashbug]]".
  ** The "Tera-Byte" in this card's Japanese name is a reference to [[wikipedia:Byte|Terabyte]], a unit of computer storage, while this card's English name is a portmanteau of "terror" and "terabyte". This reflects Mr. Kay's computer hacking skills and ability to implant computer viruses, as well as his [[Deck]], which featured cards themed around computer hacking and viruses.
  ** This monster slightly resembles an insect, likely reflecting how computer errors are usually referred to as "bugs", as well as its compatibility with the "[[Crashbug]]" series, where each monster is a reference to computer "bugs" and viruses.
  ** Also, this monster represents how Mr. Kay did not wish to do any real harm, reflected in this card's effect of returning the opponent's monsters the player takes control of, as well as its 0 [[ATK]] and 2900 [[DEF]].
  * This is the first card of the "Number" archetype, and the first card of the ''Yu-Gi-Oh! ZEXAL'' anime, that possess two different artworks (one version in the ''[[Generation Force]]'' expansion, and another version with a different artwork in the ''[[V Jump promotional cards|V-Jump]]'').
  ** This is also the first Xyz Monster to be reprinted as a promotional card and have an [[alternate artwork]].
