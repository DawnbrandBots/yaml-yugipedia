title: Card Trivia:Cyber Slash Harpie Lady
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Chapter 1]]''.
  * This monster is the [[signature move]] [[Synchro Monster|Synchro]] [[counterpart]] of "[[Cyber Harpie Lady]]".
  ** This monster's Japanese name, "Harpie Lady Scratch Clash", references the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "[[Cyber Harpie (anime)|Cyber Harpie Lady]]" in the Japanese version of the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime: "Scratch Clash". It also has the Latin letters "SC" in its Japanese name, compared to the former monster having "SB" in its Japanese name.
  *** This monster's ''[[TCG]]'' name, "Cyber Slash Harpie Lady", references the attack name of "[[Harpie Lady (anime)|Harpie Lady]]" in the English dubbed version of ''Yu-Gi-Oh!'' anime: "Cyber Slash".
  ** This monster's [[original ATK]] (2600) is double the original ATK (1300) of "[[Harpie Lady]]".
