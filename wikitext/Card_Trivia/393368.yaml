title: Card Trivia:Speedroid Skull Marbles
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on a part of a [[wikipedia:Rolling ball sculpture|marble run]], a toy consisting of a track with bends and obstacles that [[wikipedia:Marble (toy)|marbles]] can be made to run down.
  ** This monster's Japanese name (ビードロ・ドクロ, ''Bīdoro Dokuro'') appears to be a portmanteau of the Japanese words for "glass" (ビードロ, ''Bīdoro'') and "skull" (髑髏, ''Dokuro'').
  *** "''Bīdoro''" is an archaic Japanese word used for "glass", which is derived from the Portuguese word "vidro" of the same meaning. As such, this monster's English name references how marbles are made of composite materials, including glass.
  * This monster's "fiendish" theme, along with "[[Speedroid Maliciousmagnet]]", are based on how they were both used while [[Yugo]] was under the influence of [[Z-ARC]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
