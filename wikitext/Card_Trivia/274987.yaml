title: Card Trivia:Hide and Shark
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name and artwork is a pun on the children's game, "[[wikipedia:Hide-and-seek|hide-and-seek]]".
  ** The above-mentioned fact reflects this card's effect to "hide" a "[[Shark (archetype)|Shark]]" monster from an opponent's attack by [[banish]]ing it.
