title: Card Trivia:Fairy Tail - Sleeper
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Fairy Tail Ball]]", "[[Fairy Tale Tails]]", and "[[Weaver of Fairy Tails]]".
  ** This monster's tail appears in the artwork of "[[Tails of the Fairy Tails]]".
  * This card appears in the artwork of "[[Draw Discharge]]".
  * This monster is based on the fairy tale ''[[wikipedia:Sleeping Beauty|Sleeping Beauty]]''.
  ** This monster's Japanese name "Talia" is based on the name of the princess in ''[[wikipedia:Sun, Moon, and Talia|Sun, Moon, and Talia]]'', the Italian version of ''Sleeping Beauty'' by [[wikipedia:Giambattista Basile|Giambattista Basile]].
  ** This monster's effect, to change the effect of the opponent's [[Spell]]/[[Trap Card]]s to [[flip]] itself [[face-down]], references how in the tale, the princess was put into a deep sleep by an evil curse.
  ** This monster's [[Special Summon]]ing [[Flip effect]] references how a prince would eventually arrive and awaken her.
