title: Card Trivia:Vampire Baby
wikitext: |-
  {{Navigation}}

  * The red moon in this card's background may be a nod to one effect of a [[wikipedia:Lunar eclipse|lunar eclipse]] which can causes the moon to appear red. This is due to the intensities of the [[wikipedia:Visible spectrum|visible spectrum]] not being able to reach the Moon with the Earth in between it and the sun, with the exception of reddish hues (which have the longest wavelengths and thus, can travel a greater distance).
  ** This phenomenon is commonly nicknamed a "blood moon", which may be the basis for a "[[Vampire]]"-themed pun in the card's original English name ("Red Moon Baby").
