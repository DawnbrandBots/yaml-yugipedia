title: Card Trivia:Pressured Planet Wraitsoth
wikitext: |-
  {{Navigation}}

  * "[[Kashtira Arise-Heart]]" and "[[Visas Starfrost]]" appear in this card's artwork.
  ** "[[Scareclaw Light-Heart]]" possibly appears as the weapon "Visas Starfrost" is wielding.
  * The planet appears in the artwork of "[[Kashtira Shangri-Ira]]", being encased by the aforementioned monster.
  * A miniature version of this land appears in the artwork of "[[Mannadium Torrid]]".
  * This card's Japanese name, "Paraisos" is based on the Portuguese word for "Paradises".
