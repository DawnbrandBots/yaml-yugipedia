title: Card Trivia:Revival of Sennen Genjin
wikitext: |-
  {{Navigation}}

  * "[[Sengenjin]]" is treated as a [[Ritual Monster]] in several video games, with this card as its respective [[Ritual Spell Card]]. In the ''[[OCG]]''/''[[TCG]]'', "Sengenjin" is a [[Normal Monster]].
  * In this card's artwork, "Sengenjin" is depicted with pink skin and green hair, while in its own artwork it has blue skin and orange hair.
