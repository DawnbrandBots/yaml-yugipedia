title: Card Trivia:Blackwing - Jul the New Moon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The first portion of this monster's name is based on a [[wikipedia:Katar (dagger)|Jur]], a handled push dagger used in the Indian subcontinent.
  ** The second portion of this monster's name is based on a "new moon", the moon's first [[wikipedia:Lunar phase|lunar phase]], where the sunlight hits the moon's far side while facing the same direction towards Earth, making it appear dark and invisible to the naked eye.
