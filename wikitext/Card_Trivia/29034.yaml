title: Card Trivia:Indomitable Fighter Lei Lei
wikitext: |-
  {{Navigation}}

  * This card shares the same [[Attribute]], [[Level]], [[ATK]], [[DEF]], and effect with "[[Goblin Attack Force]]".
  * This monster is based on Leighton Kurashima, a former UDE Product Manager. According to a [http://www.pojo.biz/board/showthread.php?p=2216462#post2216462 Pojo post] by [[Kevin Tewart]], Kurashima's nickname is "Lei Lei".
  ** Kurashima also runs his Twitter account [https://twitter.com/Indom_LeiLei @Indom_LeiLei], which somewhat role-plays the character.
