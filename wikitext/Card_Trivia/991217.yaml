title: Card Trivia:Poisonous Viper
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Pit viper|pit viper]], a species of venomous snake known for its ability to sense infrared and heat.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] itself to the opponent's side of the [[field]] is based on the effect of the [[Continuous Spell Card]] "[[Swamp of the Dragon Snake]]", which was used to Special Summon this monster to the opponent's side of the field in {{chapter|GX|020|ref}}.
