title: Card Trivia:Guardian Tryce
wikitext: |-
  {{Navigation}}

  * Note that each of the Guardians are holding their signature Equip Spell Cards; this explains why this card cannot be on the field without the presence of "[[Twin Swords of Flashing Light - Tryce]]".
  * This monster has an image of his "Twin Swords of Flashing Light - Tryce" on the back of his shirt.
