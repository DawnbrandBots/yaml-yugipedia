  * This card is similiar to a combination of "[[DNA Transplant]]" and the [[DARK]] [[attribute]] anime effect of "[[Clear World (anime)|Clear World]]". The latter of the two used by an [[Yusuke Fujiwara|antagonist]] in season 4 of [[Yu-Gi-Oh! GX]].
