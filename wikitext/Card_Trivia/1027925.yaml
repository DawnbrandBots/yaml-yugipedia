title: Card Trivia:Engine of Destruction
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[High-Grade Collection]]''.
  * "[[Blue-Eyes Bright Dragon]]" appears in this card's artwork.
  * This card's name is a reference to the English [[flavor text]] of "[[Blue-Eyes White Dragon (Rush Duel)|Blue-Eyes White Dragon]]", which refers to it as a "powerful engine of destruction".
