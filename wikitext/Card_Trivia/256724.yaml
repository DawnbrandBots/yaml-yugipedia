title: Card Trivia:Germ Infection
wikitext: |-
  {{Navigation}}

  * This effect is referring to that of [[Machine]]-[[Type]] monsters as they aren't living things and wouldn't be affected, whereas the other Types consist of living things that would be affected.
  * The Spanish print of this card has a typo - the word "''G'''é'''rmenes''" ("Germ") has no diacritical mark.
