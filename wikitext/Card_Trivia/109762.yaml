title: Card Trivia:Wave Force
wikitext: |-
  {{Navigation|mode=nongame}}

  * This is a [[Synchro Monster]]-[[support]] version of "[[Mirror Force]]".
  * This card's name is similar to the Japanese name of another "[[Mirror Force]]"-like [[Trap Card]], "[[Drowning Mirror Force]]", which is "Rippling Barrier '''Wave Force'''".
