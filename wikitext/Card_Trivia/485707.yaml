title: Card Trivia:D/D Savant Schrödinger
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[wikipedia:Erwin Schrödinger|Erwin Schrödinger]].
  * This monster also makes its anime debut alongside [[D/D Savant Dirac]], as reference to their real life counterparts, who, together, had claimed their Nobel Prize in physics in 1933.
