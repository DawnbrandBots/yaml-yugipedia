title: Card Trivia:Masked HERO Dusk Crow
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster appears in the artwork for "[[Double Attack (Team Strike)]]".
  * This monster is based on the archetypal black Kamen Rider featured in the ''[[wikipedia:Kamen Rider|Kamen Rider]]'' franchise. Fittingly, this monster's [[Attribute]] is [[DARK]], which is represented by a dark-colored circle.
  * This monster shares a similar naming convention with "[[Masked HERO Dark Law]]", as their Japanese names contain the characters 「クロウ」 (''kurou''), which sound similar to the Japanese word for the color black (黒, ''kuro''), relating to their DARK Attribute and color scheme.
  * This monster and "[[Masked HERO Furnace]]" are the first [[Main Deck]] "[[Masked HERO]]" monsters to be released.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|051|ref}}, specifically from the panel showing [[Masked Hero Dusk Crow (manga)|this monster]] being Summoned.
