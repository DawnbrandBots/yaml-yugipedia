title: Card Trivia:Altergeist Pookuery
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Púca|púca]]" and "query".
  ** The púca is a creature in [[wikipedia:Celtic mythology|Celtic]] or [[wikipedia:English folklore|English]] folklore who takes the form of a human-like shape.
  ** "Query" is based on the [[wikipedia:Query language|query computer languages]] used to make queries in databases and information systems.
