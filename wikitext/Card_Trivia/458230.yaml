title: Card Trivia:Cyber Angel Vrash
wikitext: |-
  {{Navigation}}

  * This monster is based on '''[[wikipedia:Vishnu|Vishnu]],''' the [[wikipedia:Hindu deities|Hindu God]] who is the preserver and protector of all [[wikipedia:Ex nihilo|creation]]. He is the embodiment of mercy and goodness, who wields four attributes or weapons in each of his four hands.
  ** In the ''[[TCG]]'', however, this monster's name was changed from "Vishnu" to "Vrash" to avoid religious connotation.
  * This is [[Alexis Rhodes (ARC-V)|Alexis Rhodes]]' signature card in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[destroy]] monsters [[Special Summon]]ed from the [[Extra Deck]] is a reference to its effect to destroy [[Fusion Monster]]s in the ''Yu-Gi-Oh! ARC-V'' anime.
