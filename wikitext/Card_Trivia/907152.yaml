title: Card Trivia:Branded Lost
wikitext: |-
  {{Navigation}}

  * "[[Albion the Shrouded Dragon]]" and "[[Aluber the Jester of Despia]]" appear in this card's artwork.
  ** The events in this card's artwork are the continuation of those depicted in the artwork of "[[Branded Disciple]]": "Aluber" is fighting "Albion" with the power of the "Hole", after their first confrontation.
  *** According to [[The Valuable Book EX 2 card storylines]], this card's artwork depicts "Aluber" stealing the power of "[[Fallen of Albaz]]" to turn into a [[Albaz Dragon|draconic form]], which he then uses to transform into "[[Lubellion the Searing Dragon]]".
  ** The events in this card's artwork are continued in the artwork of "[[Branded Fusion]]".
