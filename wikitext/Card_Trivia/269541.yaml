title: Card Trivia:Alien Psychic
wikitext: |-
  {{Navigation}}

  * This card bears a resemblance to the [[wikipedia:Alien (creature in Alien franchise)|Facehuggers]] from the Alien franchise.
  * The Spanish printed name of this card is "''Psíquico Alien''" despite the Spanish name of the "[[Alien]]" archtype being "''Alienígena''". This mistake was corrected on the Card Database, its name now shown as "''Psíquico Alienígena''".
