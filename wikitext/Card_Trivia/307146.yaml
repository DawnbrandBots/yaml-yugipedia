title: Card Trivia:Sylvan Flowerknight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Sylvan Charity]]" and "[[Sylvan Waterslide]]".
  * This monster is based on the [[wikipedia:Narcissus (plant)|Narcissus flower]], named for the [[wikipedia:Narcissus (mythology)|character]] in [[wikipedia:Greek mythology|Greek mythology]] who died from dehydration and vanity in equal measure.
