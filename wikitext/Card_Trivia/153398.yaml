title: Card Trivia:Vow of Tribe
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name, artwork, and effect are references to those of "[[The Regulation of Tribe]]".
  ** In terms of artwork, both cards feature a leader-figure, with numerous people on their knees and a desert city in the background.
  ** In terms of effect, both cards prevent monsters from attacking.
  * This card's second anime artwork is based on that of "[[Huge Revolution]]".
