title: Card Trivia:Carnot the Eternal Machine
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Carnot cycle|Carnot cycle]], an ideal [[wikipedia:thermodynamic cycle|thermodynamic cycle]] proposed by French physicist [[wikipedia:Sadi Carnot|Sadi Carnot]] in 1824, in which the working substance goes through the four successive operations of isothermal expansion to a desired point, adiabatic expansion to a desired point, isothermal compression, and adiabatic compression back to its initial state.
