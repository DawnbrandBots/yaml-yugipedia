title: Card Trivia:Altergeist Dragvirion
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "[[wikipedia:Gwyllion|Gwyllion]]" and "[[wikipedia:Drag and drop|drag and drop]]", with influence from "[[wikipedia:Computer virus|virus]]". 
  ** The gwyllion is a frightening and mischievious female spirit in [[wikipedia:Welsh folklore|Welsh folklore]] who haunts lonely roads in the Welsh mountains and lead travelers astray.
  ** "Drag and drop" is a computer function which allows the user to click and "drag" a virtual object to another location.
