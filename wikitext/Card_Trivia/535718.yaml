title: Card Trivia:Curse of Anubis
wikitext: |-
  {{Navigation|Curse of Anubis}}

  * The statue from the artwork of "[[Judgment of Anubis]]" appears in this card's artwork
  * This card is named after [[wikipedia:Anubis|Anubis]], the [[wikipedia:Egyptian god|Egyptian god]] of death and embalming whose role is to protect the Egyptian tombs.
  * This card shares its nomenclature with the ''[[OCG]]'' set, ''[[Curse of Anubis (set)|Curse of Anubis]]''.
