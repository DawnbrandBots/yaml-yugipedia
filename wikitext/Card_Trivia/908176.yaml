title: Card Trivia:Gold Pride - Nytro Head
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Gold Pride - Pedal to the Metal!]]", "[[Gold Pride - Start Your Engines!]]", "[[Gold Pride - The Crowd Goes Wild!]]".
  * This card's name and appearance may be loosely inspired by Machine Head, an antagonist from the movie [https://en.wikipedia.org/wiki/Redline_(2009_film) Redline], which has a similar premise to Gold Pride.
