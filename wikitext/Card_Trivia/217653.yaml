title: Card Trivia:Hieratic Dragon of Asar
wikitext: |-
  {{Navigation}}

  * This card's name comes from the Egyptian God, [[wikipedia:Osiris|Osiris]].
  ** Osiris was also the original Japanese name of "[[Slifer the Sky Dragon]]".
  * This card's design also reflects the appearance of Osiris, as he is shown to be green skined and has a feather on his crown (which is seen on "Asar's" head).
  * This card has a similar effect to "[[Gravekeeper's Visionary]]".
  * This card is the second strongest non-[[Xyz Monster|Xyz]] "[[Hieratic]]" monster; the first is "[[Hieratic Dragon of Sutekh]]".
  ** However, it is the third strongest "[[Hieratic]]" monster in general after "[[Hieratic Sun Dragon Overlord of Heliopolis]]" and "[[Hieratic Dragon of Sutekh]]" (the weakest being "[[Hieratic Dragon King of Atum]]").
  * The sealed form of this card appears in "[[Hieratic Seal of Convocation]]".
  * The effect of banishing dragons in the Graveyard may hint at Osiris' position as a god of death and the afterlife.
  ** The card's background with the moon also evoke the persona of Osiris as a god of death/rebirth.
