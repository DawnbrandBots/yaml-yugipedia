title: Card Trivia:The Tripper Mercury
wikitext: |-
  {{Navigation}}

  * This monster is based on the planet [[wikipedia:Mercury (planet)|Mercury]], the first planet in the [[wikipedia:Solar System|Solar System]].
  ** This monster's [[WATER]] [[Attribute]] and [[Aqua]] [[Type]] reference the Japanese name of Mercury, "Suisei" (水星), which translates to "Water Star".
  ** This monster's name is based on "tripper", a British slang term for someone going on a short excursion, referencing how Mercury is the smallest planet of the Solar System and the closest planet to the [[wikipedia:Sun|Sun]], which has the shortest duration of orbit around the Sun in eighty-eight days.
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the other [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to make a second attack during each [[Battle Phase]] is based on the effect of "[[Forbidden Substance]]", a [[Spell Card]] used by [[Jesse Anderson (manga)|Jesse Anderson]], which allowed [[The Tripper Mercury (manga)|this monster]] to attack twice in {{chapter|GX|057|ref}}.
