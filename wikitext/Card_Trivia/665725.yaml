title: Card Trivia:Arcjet Lightcraft
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the "[[wikipedia:Arcjet rocket|arcjet rocket]]" (a rocket that uses an electrical arc for propulsion), the "[[wikipedia:Lightcraft|Lightcraft]]" (a spacecraft driven by beam-powered propulsion), and the [[Vetrix Family|Arclight]] family name, more specifically [[Quinton]], who uses a spacecraft-themed Deck in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This card was first revealed on the ''[[OCG]]'' [https://twitter.com/YuGiOh_OCG_INFO/status/1178581495910416385 Twitter] page on the 30th September 2019, at 5:05 pm JST, which is another reference to Quinton, who is named after the number "5".
