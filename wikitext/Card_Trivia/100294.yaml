title: Card Trivia:Sinister Sprocket
wikitext: |-
  {{Navigation}}

  * This monster's name and appearance are based on a set of [[wikipedia:Derailleur gears|Derailleur gears]], a bicycle gearing system consisting of a chain, multiple sprockets of different sizes, and a mechanism to move the chain from one sprocket to another.
  * This card's Spanish lore features "''Monstruo Sincro''" instead of "''Monstruo de Sincronía''", the correct term for [[Synchro Monster]] used in the Spanish ''[[TCG]]''.
