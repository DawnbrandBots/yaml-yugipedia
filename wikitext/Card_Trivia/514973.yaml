title: Card Trivia:Danipon
wikitext: |-
  {{Navigation}}

  * This card's name is derived from "dani" (ダニ), the Japanese word for "tick".
  * This card has a counterpart: "[[Gokipon]]".
  ** Together, both cards feature weaker, [[Insect]]-based effects similar to "[[Witch of the Black Forest]]" and "[[Sangan]]" respectively.
