title: Card Trivia:Darkness Neosphere
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Limited Edition 15]]''.
  * "Neosphere" is the Greek word for "new orb", referencing [[Nightshroud]]'s desire to fold the entire world into the [[World of Darkness]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This monster's name makes it a member of the "[[Neos]]" [[archetype]]. Fittingly, the background of this card's artwork appears to be "[[Neo Space]]", referencing how Nightshroud used this card against [[Jaden Yuki]], who uses the "Neos" archetype in the ''Yu-Gi-Oh! GX'' anime.
  * This monster is likely the evolution of "[[Darkness Seed]]" and "[[Darkness Bramble]]".
  ** In the ''Yu-Gi-Oh! GX'' anime, [[Darkness Neosphere (anime)|this monster]], "Darkness Seed" and "Darkness Bramble" all share the same effect to increase the player's [[Life Points]] to 4000 during the [[End Phase]].
  ** Both this monster and "Darkness Bramble" in the anime also share a similar effect to look at the player's [[Set]] cards, ignoring the effect of "[[Darkness]]".
  ** "Darkness Bramble" was [[Tribute Summon]]ed by [[Tributing]] "Darkness Seed", while this monster was [[Special Summon]]ed via the effect of "[[Darkness Raincrow]]", which involves [[send]]ing "Darkness Bramble" to the [[Graveyard]].
  *** This monster's ''[[OCG]]''/''[[TCG]]'' [[Summoning condition]] is based on how was it Special Summoned via the effect of "Darkness Raincrow" by [[send]]ing it from the [[hand]] and "Darkness Bramble" from the [[field]] to the Graveyard in {{episode|GX|178|ref}}; however, "Darkness Bramble" is a [[Plant]] monster rather than a [[Fiend]] monster.
  * This monster's appearance may be a corrupt version of [[wikipedia:Themis|Themis]], the Greek goddess of justice who was blindfolded in order to be just.
  ** Like Themis, this monster has its normal eyes blindfolded, referencing how Nightshroud promised Jaden that he will be judged before their [[Duel]] began in {{episode|GX|177|ref}}.
  ** However, this monster's corruption is based on the eyeballs that appears on its body (seen mostly in the anime and its Japanese artwork), which seemingly mocks the idea of justice. This reflects Nightshroud's underhanded Dueling strategy, where he used his monsters to bypass the prohibiting effect of "[[Darkness]]" and look at his [[Set]] "[[Darkness (archetype)|Darkness]]" [[Continuous Trap Card]]s, claiming it to be his god-like power.
  * This monster's left claw likely references the myth of the left side of a person's body being considered evil, as being left-handed was frowned upon during the [[wikipedia:Middle Ages|Middle Ages]].
