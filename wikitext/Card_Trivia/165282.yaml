title: Card Trivia:Evigishki Merrowgeist
wikitext: |-
  {{Navigation}}

  * This is one of the [[Cover card]]s of ''[[Duel Terminal - Xyz Startup!!]]''.
  * "Geist" means "ghost" in German. This could refer to "[[Gishki Emilia]]", since she is a ghost herself.
  ** Fittingly, "[[wikipedia:Merrow|Merrow]]" is the the Scottish and Irish Gaelic equivalent of a [[wikipedia:Mermaid|mermaid]].
  * This card is the first [[WATER]] [[Aqua]]-[[Type]] [[Xyz Monster]].
  * This card is an indication that the "[[Gishki]]" and "[[Gusto]]" archetypes have joined forces to fight against their new enemy, the "[[Vylon]]" archetype.
  ** It can be noticed that the "Gishki" sign in the center of the "Gishki" [[Gishki Aquamirror]] staff that this monster is holding is replaced by a cross-like "Gusto" sign.
  ** This monster is likely flying over the sea surface, which is different from other "Gishki" [[Ritual Monster]]s, which are all under water. Moreover, the "Gishki" sign is at the back of this monster instead on the surface of the sea like the others. Those reasons refer that this monster is a hybrid between the "Gishki" and "Gusto" archetypes.
  ** According to the Duel Terminal Master Guide, this card is the [[Xyz Summon]] of "Gishki Emilia" and "[[Musto, Oracle of Gusto]]". Both of them are LV4 monsters, were released in the same set, and the cloth on this card's lower chest is very similar to those of "Musto". The staff that "Merrowgeist" uses looks like the combination of the staffs of "Emilia" and "Musto"; the staff "Musto" uses is wooden and filled with the kind of leaves that also appears on the staff of "Merrowgeist".
