title: Card Trivia:Zera the Mant
wikitext: |-
  {{Navigation|other=[[Zera the Mant (Normal)|Normal Monster version]]}}

  * This is one of the [[cover card]]s of ''[[Advance Pack: Devil's Ceremony]]''.
  * This monster appears in the artworks of "[[Jagged Claw Attack]]" and "[[Wicked Fire Blast of Zera]]".
  * This monster is a transformed version of "[[Warrior of Zera]]", which is implied by the latter appearing in the artwork of "[[Zera Ritual]]" (the [[Ritual Spell Card]] used to [[Ritual Summon]] this monster).
  ** This is supported by the fact that this monster's face serves as the design for the hilt of "[[The Sword of Zera]]", which "Warrior of Zera" is depicted wielding.
  * "Mant" may be derived from the word "[[wikipedia:Mantle (royal garment)|mantle]]", which is a term used for a long, loose cape-like cloak (which this monster is depicted wearing).
  * This monster has a [[retrained]] ''[[Rush Duel]]'' counterpart: "[[Zera the Evil Fiend]]".
  * This is the first card in ''Yu-Gi-Oh! Rush Duel'' without any card text.
  * This is one of the few cards that does not have a [[password]] printed in its lower-left corner.
