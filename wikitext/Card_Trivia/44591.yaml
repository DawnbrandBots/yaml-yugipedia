title: Card Trivia:Armory Arm
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Synchro Forceback]]".
  * This monster's name is a pun on its design and effects, as it is a mechanical "arm" with the ability to "arm" itself the [[target]]ed monster.
  ** This monster's Japanese name, "Arms Aid", reflects its effects to "aid" the [[equip]]ped monster by increasing its [[ATK]] by 1000.
  *** This monster's ''[[TCG]]'' name reflects how it is an ''armored'' arm that can act autonomously and be used as a weapon for the equipped monster.
  ** Fittingly, in the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster is equipped to the targeted monster via its effect, it is worn on the equipped monster's right "arm" like a gauntlet.
  * This is the first [[Machine]] [[Synchro Monster]], as well as the first [[Level 4]] Synchro Monster.
  * In the ''Yu-Gi-Oh! 5D's'' anime, this was the only Synchro Monster used by [[Yusei Fudo]] that did not have a [[Summon chants in Yu-Gi-Oh! 5D's#Yusei Fudo|Synchro Summon chant]].
