title: Card Trivia:Trickstar Treat
wikitext: |-
  {{Navigation}}

  * "[[Clown Zombie]]", "[[Ghoul with an Appetite]]", "[[Goblin Calligrapher]]", "[[Ojama Green]]", "[[Tardy Orc]]", "[[Trickstar Black Catbat]]", "[[Trickstar Candina]]", "[[Trickstar Holly Angel]]", and "[[Trickstar Lilybell]]" appear in this card's artwork.
  * This card's name and artwork is a play on "[[wikipedia:Trick-or-treating#The interjection "Trick or treat!"|Trick or treat!]]", a phrase commonly used on [[wikipedia:Halloween|Halloween]] where costumed people travel to different houses and ask for "treats" (mostly candy and other sweet confections) or fall victim to their "tricks" (usually in the form of mischievous pranks).
