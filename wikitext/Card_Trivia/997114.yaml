title: Card Trivia:Spooky Scary Tales Told Twice
wikitext: |-
  {{Navigation|mode=nongame}}

  * The books from the artworks of "[[Chilling Tales]]" and "[[Spooky Scary Tales]]" appear in this card's artwork.
  * This card's effect to make a [[WATER]] monster gain 4600 [[ATK]] is a pun on its Japanese name "''Yomikaeshite mo Omoshirokunai Manga''", as it features the word "''shiroku''", which is a homophone for the numbers "4" (''shi'') and "6" (''roku''), which make up the number "46".
