title: Card Trivia:Frightfur Sadmarine
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name, "Sadomarin" (サドマリン), is a portmanteau of the Japanese word for "sadistic" (サド ''Sado''), and "submarine" (サブマリン ''Sabumarin'').
  * This card's design, as a plastic toy rather than [[Sora Shiunin (manga)|Sora]]'s usual plush toys, reflects Sora's true personality in the manga, after regaining his memories. As someone from the future, his monster also gained a more futuristic design.
