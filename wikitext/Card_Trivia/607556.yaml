title: Card Trivia:Dillingerous Dragon
wikitext: |-
  {{Navigation}}

  * This monster's OCG name is a portmanteau of the words "dangerous" and "[[wikipedia:Derringer|derringer]]".
  ** This monster's TCG name replaces "derringer" for "dillinger", possibly a reference to [[wikipedia:John Dillinger|John Dillinger]].
