  * This card's name comes from the Egyptian God, [[wikipedia:Geb|Geb]].
  * This card and "[[Hieratic Dragon of Nuit]]" are the only [[Level]] 4 "[[Hieratic]]" monsters in the [[archetype]] and the only ones that does not require a [[Tribute]] to summon them.
