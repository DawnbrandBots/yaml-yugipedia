title: Card Trivia:Naturia Antjaw
wikitext: |-
  {{Navigation}}

  * This monster is based on an [[wikipedia:ant|ant]], a small insect with a stinger and mandibles who lives in colonies.
  ** A colony of ants are known for swarming areas, which reflects this monster's effect to "swarm" the [[field]] by [[Special Summon]]ing a [[Level]] 3 or lower "[[Naturia]]" monster, including a copy of this monster.
