title: Card Trivia:Odd-Eyes Absolute Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Master of Pendulum Structure Deck]]'' and the Korean edition of ''[[Structure Deck: Master of Pendulum]]''.
  * This monster's name is a reference to [[wikipedia:Absolute zero|absolute zero]], the lowest temperature theoretically possible.
  * This monster is an [[Card evolutions|upgraded]] [[WATER]] [[Xyz Monster|Xyz]] form of "[[Odd-Eyes Dragon]]".
  ** Fittingly, this monster has a blue color scheme, which is associated with the WATER [[Attribute]].
  * This monster has an opposite [[counterpart]]: "[[Odd-Eyes Meteorburst Dragon]]".
  ** This monster is a WATER Xyz Monster, while "Meteorburst Dragon" is a [[FIRE]] [[Synchro Monster]].
  ** This monster has its left eye surrounded by an icicle spike, while "Meteorburst Dragon" has its right eye highlighted by a golden flame.
  ** Both monsters have mirrored poses in their card artworks.
  ** Both have effects that can [[Special Summon]] other monsters. "Absolute Dragon" can either [[detach]] an [[Xyz Material]] to negate a monster's attack and Summon an "[[Odd-Eyes]]" monster from the [[hand]] or [[Graveyard]]; or it can Summon any "Odd-Eyes" monster from the [[Extra Deck]], when it is sent from the [[field]] to the Graveyard. "Meteorburst Dragon" can Summon a [[Pendulum Monster]] from the [[Pendulum Zone]] when it is Special Summoned.
  * Out of the four elemental evolution of "Odd Eyes Dragon" with different [[Monster Card]] [[Card type|types]] ("Absolute", "Meteorburst", "[[Odd-Eyes Vortex Dragon|Vortex]]", and "[[Odd-Eyes Gravity Dragon|Gravity]]"), this is the only one to not have an effect on Special Summon, instead it is the only one with an effect that activates when it is sent from the field to the Graveyard.
