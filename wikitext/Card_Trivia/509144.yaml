title: Card Trivia:Baby Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Soul Absorption]]".
  * The ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' version of this card appears in the artwork of the ''Rush Duel'' version of "[[Exchange (anime Rush Duel)|Exchange]]".
  * This monster has a "[[Red-Eyes]]" [[counterpart]]: "[[Red-Eyes Baby Dragon]]".
  * According to this card's [[flavor text]], this monster's ''incredible potential'' is shown in "[[Hundred Dragon]]", "[[Thousand Dragon]]", and possibly "[[Alligator's Sword Dragon]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|070|ref}}, specifically from the panel showing [[Baby Dragon (manga)|this monster]] being Summoned, albeit vertically.
