title: Card Trivia:Trap Lid
wikitext: |-
  {{Navigation}}

  * The monster in this card's artwork also appears in the artworks of "[[Acetic Acid Trap Hole]]", "[[Best Bite]]", "[[Inside Out Roll]]", "[[Jewelry Trap Hole]]", "[[Rolled Sticky Save]]", "[[Rolled Voltuna]]", "[[Rolling Cucopper]]", "[[The Noodle Art of Pottery]]", "[[The Noodle Art of Roastery]]", "[[The Noodle Art of Saucery]]", "[[The Noodle Art of Savory]]", and "[[Twin Hole]]".
  * This card's Japanese name refers to ''[[wikipedia:Otoshi buta|otoshi buta]]'', which are Japanese-style drop-lids for use in Japanese cooking.
  ** However, due to this card's similar artwork, its name is also a parody of "[[Trap Hole]]" ("Otoshiana" in Japanese).
