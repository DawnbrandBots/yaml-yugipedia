  * "[[Star Monarch Estrome]]" and "[[Wilhel the Wisdom Monarch]]" appear in this card's artwork.
  * This card's effect to increase the [[ATK]] of monsters with 1000 [[DEF]] by 400 references the 2400 [[original ATK]] of [[Monarch]] monsters in the ''[[OCG]]''/''[[TCG]]'', as [[Monarch (Rush Duel series)|Monarchs original to ''Rush Duel'']] have 400 less ATK than Monarchs of the same [[Level]] from the ''OCG''/''TCG''.
