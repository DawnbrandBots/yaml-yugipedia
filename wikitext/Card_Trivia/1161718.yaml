title: Card Trivia:Once Upon a Fairy Tail
wikitext: |-
  {{Navigation}}

  * "[[Teller of Fairy Tails]]" appears in this card's artwork.
  * ''Hajimari Hajimari'' (はじまりはじまり) is a common Japanese opening phrase used in fairy tales. The closest English equivalent to this phrase is "[[wikipedia:Once upon a time|Once upon a time]]".
