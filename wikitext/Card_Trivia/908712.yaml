title: Card Trivia:Sky Striker Mobilize - Linkage!
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Magnificent Mavens]]''.
  * "[[Sky Striker Ace - Raye]]" and "[[Sky Striker Ace - Roze]]" appear in this card's artwork.
  ** "[[Sky Striker Ace = Zero]]" appears in this card's second artwork.
  ** This card's first artwork was adapted into a panel in {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|19|ref}}, where [[Raye (manga)|Raye]] holds the exhausted [[Roze (manga)|Roze]] after they destroy [[Surgical Striker - S.P.E.C.T.R.A.|S.P.E.C.T.R.A.]] with their [[Combined Maneuver - Engage Zero!|combined attack]].
