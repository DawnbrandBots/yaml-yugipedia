title: Card Trivia:Miracle Ejector
wikitext: |-
  {{Navigation}}

  [[File:Card Ejector in Precious Time, Glory Days.jpg|thumb|right|250|[[Card Ejector]] as seen in "[[Precious Time, Glory Days]]"]]

  * This monster is a [[retrained]] counterpart of "[[Card Ejector]]".
  ** This monster's name references "[[Miracle Flipper]]", a monster similar in visual design to "Card Ejector", which were both used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** This monster's pose is based on the pose assumed by "Card Ejector" during a shot from the final Japanese opening theme of the ''Yu-Gi-Oh! GX'' anime, "''[[Precious Time, Glory Days]]''".
  ** This monster's relationship with the "[[Elemental HERO]]" and "[[Neo-Spacian]]" [[archetype]]s is a reference to how "Card Ejector" was used by [[Jaden Yuki]], who uses both archetypes in the ''Yu-Gi-Oh! GX'' anime. This relationship with the "Elemental HERO" archetype is further reinforced by its [[archetype condition]], as well as wearing a medal with a similar design to "[[Hero Medal]]" (a [[Trap Card]] also used by Jaden in the anime).

