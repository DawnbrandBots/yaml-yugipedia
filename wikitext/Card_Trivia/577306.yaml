title: Card Trivia:Guardragon Andrake
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Guardragon Corewakening]]".
  * "[[World Chalice Guardragon]]" → "[[Imduk the World Chalice Dragon]]" → "[[Crusadia Draco]]" → "Guardragon Andrake" → "[[World Chalice Guardragon Almarduke]]" / "[[World Legacy Guardragon Mardark]]"
  ** This monster appears to be a corrupted counterpart to "Crusadia Draco". Both monsters also have the same [[Level]], [[Attribute]] and [[Type]], and have mirrored [[ATK]]/[[DEF]].
  *** "Almarduke" and "Mardark" appear to be the two halves of "Andrake" split apart.
  * This monster's name is based on "Andreia", the virtue of [[wikipedia:Courage|Courage]].
