title: Card Trivia:Obelisk the Tormentor
wikitext: |-
  {{Navigation|other=[[Obelisk the Tormentor (original)|Original]] - [[Obelisk the Tormentor (DDM)|Dungeon Dice Monsters]]}}

  * This is one of the [[cover card]]s of ''[[2016 Mega-Tins]]'', ''[[Battle Pack 2: War of the Giants]]'', ''[[Millennium Box Gold Edition]]'', ''[[Speed Duel: Battle City Box]]'', and ''[[Legendary Collection: 25th Anniversary Edition]]''.
  * This monster appears in the artworks of "[[Blast Held by Destiny]], "[[Exchange of Despair and Hope]]", "[[Fist of Fate]]", "[[Quiz Panel - Obelisk 10]]", "[[Quiz Panel - Obelisk 20]]", "[[Quiz Panel - Obelisk 30]]", "[[Soul Crossing]]", "[[Soul Energy MAX!!!]]", "[[Successor Soul]]", and "[[The Breaking Ruin God]]".
  ** An engraving of this monster appears in the artworks of "[[Gravekeeper's Inscription]]" and "[[Gravekeeper's Oracle]]".
  * This monster is named after an [[wikipedia:Obelisk|obelisk]], which in [[wikipedia:Culture of Egypt|Egyptian culture]] is a tall, narrow, four-sided, tapering monument which ends in a pyramidal top.
  * This monster has a [[Wicked God]] [[counterpart]]: "[[The Wicked Dreadroot]]".
  * This monster has a [[Sacred Beast]] counterpart: "[[Raviel, Lord of Phantasms]]".
  * This is the first [[Egyptian God]] to appear in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]], as well as the first to be Summoned by [[Dark Yugi (manga)|Atem]] (and his [[Pharaoh Atem|anime counterpart]]) in ancient Egypt/the [[World of Memories]].
  ** It is also the first Egyptian God to be printed as a [[Legal]] card, and the first Legal [[DIVINE]] [[Divine-Beast]] monster in the ''[[OCG]]''/''[[TCG]]''.
  * This is the only Egyptian God that was not used in a [[Duel]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** In contrast, it is also the Egyptian God with the most appearances in the ''Yu-Gi-Oh!'' anime, counting Duels and battles, in series and movies.
  * This is the only card with a blue border that is not a [[Ritual Monster]] or a [[Link Monster]]; its blue color is also darker than that of both card types.
  * In the ''Yu-Gi-Oh!'' manga and anime, this monster was [[Tribute]]d by the two main characters, [[Dark Yugi (manga)|Dark Yugi]] ([[Yami Yugi]] in the anime), [[Seto Kaiba (manga)|Seto Kaiba]] (and his [[Seto Kaiba|anime counterpart]]), to Summon their [[Signature card|signature monsters]]: Kaiba Tributed this monster to [[Tribute Summon]] "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" (and its [[Blue-Eyes White Dragon (anime)|anime counterpart]]), while Yugi Tributed it to [[Special Summon]] "[[Dark Magician (manga)|Dark Magician]]" (and its [[Dark Magician (anime)|anime counterpart]]) via "[[Dimension Magic (manga)|Dimension Magic]]" ("[[Magical Dimension (anime)|Magical Dimension]]" in the anime).
  * This is the only Egyptian God monster to not have ? [[ATK]] and [[DEF]], as well as the only that cannot be targeted with card effects.
  ** It is also the only Egyptian God monster to not have a draconic appearance.
  * "[[Blue-Eyes Chaos MAX Dragon]]", another monster used by [[Seto Kaiba (manga)|Seto Kaiba]], is a possible reference to "Soul Energy MAX", which is this monster's [[Attack and effect names|effect name]] in the original Japanese version of the ''Yu-Gi-Oh!'' manga and anime.
  ** Both monsters also have 4000 [[ATK]], protection against card effects, and feature blue card borders (with this monster being an Egyptian God, and "Chaos MAX Dragon" being a Ritual Monster).
  * In the Japanese version of the ''Yu-Gi-Oh!'' manga and anime, the original version of this card and the other Egyptian Gods were in English, while still having their Japanese names; in the case of this monster, "Defense" was misspelled as "Difence" or "Defence" (only in the manga).
  ** In this card's first appearance in the Japanese version, the name "THE GOD OF OBELISK" was written smaller and in italic characters, and included the DIVINE-Attribute icon.
  ** In the English version, the first time it appeared as a card included only its [[Level]] and the [[DIVINE]] [[Attribute]] icon orb, but without the kanji for "god" (神, ''kami''), all of this inside the textbox. Also, its 4000 ATK and [[DEF]] values were not included.
  * In the ''Yu-Gi-Oh!'' anime, each time Yami Yugi Summoned this card (during his [[Duel]]s against [[Yami Marik]] and [[Yugi Muto]]), he Tribute Summoned this card using three copies of the same [[Monster Token|Token]] as Tributes ("[[Metal Fiend Token (anime)|Metal Fiend Token]]" and "[[Tricky Token (anime)|Tricky Token]]", respectively).
  * In the ''Yu-Gi-Oh!'' manga, as a ''[[ka]]'', this monster was also known as the "Giant God of the Palace" (王宮の巨神, ''Ōkyū no Kyoshin'').
  * The [[Effect Monster]] version of this card is one of the few cards to not have the 8-digit [[passcode]] in the bottom left corner and no border around its artwork.
  * This card's artwork for its original Illegal version (later used as an ''[[OCG]]''/''[[TCG]]'' artwork) is taken from {{chapter|Yu-Gi-Oh!|148|ref}}, specifically from the last panel of the chapter showing Seto Kaiba with [[The God of the Obelisk|this monster]].
  ** This card's unreleased artwork (used only in promotional material for ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'') is taken from {{chapter|Yu-Gi-Oh! Duelist|100|ref}}, specifically from the double-page spread showing this monster attacking and destroying [[Koji Nagumo (manga)|Koji Nagumo's]] [[List of unnamed cards#Nagumo's monster|unnamed monster]].
  ** This card's [[Kazuki Takahashi]] artwork is based on [[The God of the Obelisk (character)|this monster's appearance]] as a ''[[ka]]'' in the [[King's Memories]] arc, as well as its appearance as "[[Obelisk The Progenitor]]" in the ''[[Yu-Gi-Oh! R]]'' manga.
