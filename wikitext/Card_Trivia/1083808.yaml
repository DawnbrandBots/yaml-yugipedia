title: Card Trivia:Fiendsmith Kyrie
wikitext: |-
  {{Navigation}}

  * "[[Fiendsmith Engraver]]" and "[[Lacrima the Crimson Tears]]" appear in this card's artwork.
  * This card is named after ''[[wikipedia:Kyrie|Kyrie eleison]]'', a common name for an important prayer in Christian liturgy meaning "Lord, have mercy" in Latin, which in turn is used as the second section in [[wikipedia:Wolfgang Amadeus Mozart|Wolfgang Amadeus Mozart]]'s [[wikipedia:Requiem (Mozart)|Requiem]].
  ** Fittingly, in this card's artwork, "Lacrima" appears to plead "Engraver" for mercy, whom ultimately obliges and recruits her as an ally, as evidenced by this card's [[Graveyard]] effect to [[Fusion Summon]], which can be used to Summon their combined forms "[[Fiendsmith's Lacrima]]" and "[[Fiendsmith's Rextremende]]".
