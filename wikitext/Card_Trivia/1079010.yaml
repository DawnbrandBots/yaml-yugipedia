title: Card Trivia:Demolition Soldier Pokka
wikitext: |-
  {{Navigation}}

  * This monster's name, along with the name of "[[Demolition Soldier Nikka]]", makes up the word 「ニッカポッカ」 (''Nikka Pokka''), which are a type of traditional-style baggy work pants worn by construction workers in Japan and are popular in the country's construction industry.
