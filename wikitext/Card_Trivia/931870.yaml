title: Card Trivia:Million-Century Ice Prison
wikitext: |-
  {{Navigation}}

  * "[[Icejade Ran Aegirine]]" and a frozen "[[The Abyss Dragon Swordsoul]]" appear in this card's artwork.
  * In Japanese, "One Hundred Million Years" (億年 ''Okunen'') is an homophone of 憶念, "something one always remembers". This is likely in reference to the grudge "Aegirine" carries against "[[Swordsoul Strategist Longyuan]]", one of the components of "The Abyss Dragon Swordsoul", for killing all of her fellow "[[Icejade]]s", whom she avenged by freezing him.
