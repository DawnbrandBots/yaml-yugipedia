title: Card Trivia:Dhampir Vampire Sheridan
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Dark Saviors]]''/''[[Dark Saviors]]''.
  * This monster appears in the artwork of "[[Vampire Domination]]".
  * Several "[[Vampire Familiar]]s" appear in this card's artwork.
  * This card's name is a reference to [[wikipedia:Sheridan Le Fanu|Sheridan Le Fanu]], an Irish author who wrote the vampire short story ''Carmilla''.
  * A [[wikipedia:Dhampir|dhampir]] is a creature that is the result of a union between a vampire and a human.
  * The kanji 「{{Ruby|交血鬼|アルダンピール}}」 (''Kōketsuki'', "Cross-Blood Vampire", read as ''Aru Danpīru'', "Al Dhampir") is likely a portmanteau of 「高潔」 (''Kōketsu'', "Noble") and 「吸血鬼」 (''Kyūketsuki'', "Vampire"), with the kanji 「交」 (''Kō'', "Cross") being a homophone of 「高」.
