title: Card Trivia:Ghostrick Witch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ghostrick Festival]]", "[[Ghostrick Mansion]]", "[[Ghostrick Museum]]", "[[Ghostrick Parade]]", "[[Ghostrick Renovation]]", and "[[Ghostrick Shot]]".
  ** All these cards suggest that this monster is the leader of the "[[Ghostrick]]s", or at least the one who disciplines them.
  * This monster is based on a [[wikipedia:Witchcraft|witch]], a practitioner of witchcraft and dark magic who is often depicted wearing a cloak, a pointed hat, and rides on a flying broomstick.
