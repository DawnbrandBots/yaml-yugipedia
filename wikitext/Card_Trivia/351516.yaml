title: Card Trivia:Performage Shadow Maker
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster's name and appearance are based on the traditional Japanese performance of ''kage-e'' (lit. "shadow pictures"), in which participants create various figures using their fingers, hands, and sometimes arms.
  * This monster's name and design reflect its effect to [[Special Summon]] a copy of itself from the [[Extra Deck]], thus "making" a "shadow" of itself.
  ** In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this ability is demonstrated when this monster uses its pair of scissors to cut off a part of its body away and create a copy of itself.
