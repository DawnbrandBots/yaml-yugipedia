title: Card Trivia:T.G. Blade Blaster
wikitext: |-
  {{Navigation}}

  * Two [[Synchro Summon]]ing rings appear in this card's artwork.
  ** This is a reference to the minimum number of [[Synchro Material]]s required for this card's [[Synchro Summon]].
  * The letters "MA" in this monster's Japanese anime name (MAXX-1000) references its [[Machine]] [[Type]], while the letters "XX" is a reference to its [[Accel Synchro Monster]] [[card type]].
  * This monster has an [[Card evolutions|upgraded]] [[Delta Accel Synchro Monster|Delta Accel Synchro]] form: "[[T.G. Halberd Cannon]]".
  * This monster has an upgraded counterpart: "[[T.G. Glaive Blaster]]".
  * This is the first monster to be Summoned through [[Accel Synchro Summon]]ning in the ''[[Yu-Gi-Oh! 5D's]]'' anime, as well as the first monster to require two Synchro Monsters (1 [[Tuner Synchro Monster]] + 1 or more non-Tuner Synchro Monsters) as Synchro Materials.
  * In the ''Yu-Gi-Oh! 5D's'' anime, this monster and "[[T.G. Halberd Cannon (anime)|T.G. Halberd Cannon]]" were the only "[[T.G.]]" monsters to not be treated also as Machine monsters, since their original Type is already Machine.
  * This monster's effect is the opposite of that of "[[Shooting Star Dragon]]": its effect allows the player to [[negate]] the effect of an opponent's [[Spell]]/[[Trap Card]] that [[target]]s it by [[send]]ing a card from their [[hand]] to the [[Graveyard]], while the effect of "Shooting Star Dragon" can negate and destroy a card or effect that would [[destroy]] a card(s) on the [[field]].
