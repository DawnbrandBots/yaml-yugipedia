title: Card Trivia:Performapal Gold Fang
wikitext: |-
  {{Navigation}}

  * This monster's hairstyle resembles [[Yuya Sakaki]]'s hairstyle.
  * This card is a [[counterpart]] of "[[Performapal Silver Claw]]", another wolf-themed "[[Performapal]]" monster.
  ** Both cards share the same [[Level]] (4), [[Type]] ([[Beast]]), and [[ATK]] (1800).
  ** Both cards' [[Attribute]]s are polar opposites; this card is a [[LIGHT]] monster while "Silver Claw" is a [[DARK]] monster.
  ** Both monsters are depicted with poses that mirror each other in their respective card artworks.
  ** Both monsters' design feature a pointed part of a wolf's body it uses to attack, made of precious metals.
