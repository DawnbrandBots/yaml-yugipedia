title: Card Trivia:Totem Pole
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Millennia]]''.
  * This card is based on the [[wikipedia:Totem pole|totem poles]], a series of monumental sculptures carved from trees by a number of Indigenous cultures along the Pacific Northwest coast of [[wikipedia:North America|North America]].
  * The three faces on the totem pole in this card's artwork reference the number of times this card can [[negate]] attacks before it leaves the [[field]].
  ** The three faces on this totem pole are also similar to the [[Egyptian God]]s: the top yellow eagle is similar to "[[The Winged Dragon of Ra]]", the middle blue face is similar to the vicious face of "[[Obelisk the Tormentor]]", and the bottom red face has a similar color scheme to "[[Slifer the Sky Dragon]]".
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, despite [[Yusei Fudo]] receiving this card from [[Tenzen Yanagi]] in {{episode|5D's|010|ref}}, he was never seen using it.
