title: Card Trivia:Junk Berserker
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Extreme Victory]]''.
  ** This is the final [[Core Booster|Core Booster pack]] cover card released during the ''[[Yu-Gi-Oh! 5D's]]'' era.
  * This monster is based on a [[wikipedia:Berserker|berserker]], an ancient Norse warrior who wears a skin of a bear or a wolf as a coat and fights with a trance-like fury.
  ** In the ''Yu-Gi-Oh! 5D's'' anime, when this monster viewed a frontward angle, the design on its helmet features to additions to make it resemble the head of a bear, referencing how berserkers are often depicted wearing the head of a bear as a hood along with their bearskin coat.
  * This is the first [[WIND]] "[[Junk]]" monster.
  ** This is also the first "Junk" [[Synchro Monster]] to share the same [[Level]] (7) of another "Junk" Synchro Monster; in this case, "[[Junk Archer]]".
  * In the ''Yu-Gi-Oh! 5D's'' anime, this monster's [[original ATK]] is 2500 instead of 2700.
  * This is the first "Junk" monster to be printed as a [[Ghost Rare]].
  * In this monster's international design, the face on its codpiece was edited to be on its chest; however, this monster's Japanese design still appears in the international cover of ''Extreme Victory''.
  ** This is the second cover card to have its artwork altered, the first being "[[Dark Magician of Chaos]]" for the international release of ''[[Dark Revelation Volume 2]]''.
