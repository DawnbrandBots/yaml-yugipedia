title: Card Trivia:Shamisen Samsara Sorrowcat
wikitext: |-
  {{Navigation}}

  * This monster is based on a ''[[wikipedia:Nekomata|nekomata]]'', a Japanese cat ''[[wikipedia:Yōkai|yōkai]]'' with two tails.
  ** The design of this monster is based on an illustration published in the ''[[wikipedia:Hyakkai Zukan|Hyakkai-Zukan]]'', depicting a ''nekomata'' disguised as a woman playing a ''[[wikipedia:shamisen|shamisen]]'' (a 3-stringed traditional Japanese musical instrument).
  * "Mikeneko" ({{Ruby|三|み}}{{Ruby|弦|け}}{{Ruby|猫|ねこ}}, lit. "three strings cat"), the Japanese name of this monster, is a play on ''mikeneko'' ({{Ruby|三|み}}{{Ruby|毛|け}}{{Ruby|猫|ねこ}}, "three fur cat", Japanese name for a [[wikipedia:Calico cat|calico cat]]) and ''sangen'' ({{Ruby|三|さん}}{{Ruby|弦|げん}}, "three strings", another name for the ''shamisen'').
  ** The [[Level]] of this card is also 3.
