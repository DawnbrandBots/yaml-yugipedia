title: Card Trivia:Magical Trick Mirror
wikitext: |-
  {{Navigation}}

  * This card is an "[[Obelisk the Tormentor]]"-support [[counterpart]] of "[[Dark Spell Regeneration]]".
  ** This card can [[Special Summon]] "Obelisk the Tormentor", while "Dark Spell Regeneration" can Special Summon "[[The Winged Dragon of Ra]]".
  *** Both cards were used by [[Seto Kaiba]] and [[Yami Marik]], respectively, during their [[Yami Yugi and Seto Kaiba's Battle City Duel|their]] [[Yami Yugi and Yami Marik's Battle City Duel|Duels]] with [[Yami Yugi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This card's ''[[OCG]]''/''[[TCG]]'' effects are based on its usage in the ''Yu-Gi-Oh!'' manga and anime where Seto Kaiba uses this card to [[activate]] Yami Yugi's "[[Monster Reborn (anime)|Monster Reborn]]" from his [[Graveyard]] in order to [[Special Summon]] "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]" from his own Graveyard.
  ** This card's additional effect of switching attack targets to "Obelisk the Tormentor" during the opponent's turn references a particular property of Special Summoned monsters in the manga, in which summoning a monster in response to an attack would make the new monster the attack target.
