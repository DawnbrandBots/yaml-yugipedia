title: Card Trivia:Anteatereatingant
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on its artwork, which depicts a giant ant preparing to eat the anteater eating ants, the latter of which appears giant to the regular-sized ants.
  * This monster's design features an Aztec-style pattern design on its back with protruding pointed duds, similar to those of "[[Aztekipede, the Worm Warrior]]", "[[Chainsaw Insect]]", "[[Doom Dozer]]", and "[[Saber Beetle]]".
