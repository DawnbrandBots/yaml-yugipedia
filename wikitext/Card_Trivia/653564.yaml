title: Card Trivia:Fire Fortress atop Liang Peak
wikitext: |-
  {{Navigation}}

  * This card is a reference to [[wikipedia:Mount Liang|Mount Liang]], a mountain in [[wikipedia:China|China]] that is well known as the stronghold of the [[wikipedia:108 Stars of Destiny|108 Stars of Destiny]] (which the "[[Fire Fist]]" monsters are based on) in the Chinese classical novel ''[[wikipedia:Water Margin|Water Margin]]''.
  ** The stone pathway in this card's artwork is in the shape of [[wikipedia:Big Dipper|The Big Dipper]] constellation, with each corner lit with a torch representing one of the seven colors of the rainbow. Fittingly, the original seven "[[Fire Formation]]" cards are also based on the seven stars of the Big Dipper and the seven colors of the rainbow, while the 108 Stars of Destiny come from the Big Dipper.
