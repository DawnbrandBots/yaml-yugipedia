title: Card Trivia:Ryu Senshi
wikitext: |-
  {{Navigation}}

  * The seal from "[[Array of Revealing Light]]" appears in this card's artwork on this monster's hand.
  * This monster's Japanese name is "Dragon Warrior", which is the translation for this card's ''[[TCG]]'' name, "Ryu Senshi" (竜戦士 ''Ryūsenshi'') in Japanese.
  * This monster shares similarities with "[[Dark Balter the Terrible]]" and "[[Fiend Skull Dragon]]".
  ** All three are [[Fusion Monster]]s who share the same [[original ATK and DEF]] (2000/1200).
  ** All three monsters feature effects that [[negate]] the [[activate|activation]] of certain [[card type]]s.
  ** All three monsters are the physical amalgams of their [[Fusion Material]]s. In this monster's case, it is an amalgam of "[[Warrior Dai Grepher]]" and "[[Spirit Ryu]]".
  *** "Warrior Dai Grepher": This monster's [[Warrior]] [[Type]] and humanoid appearance are similar to that of "Warrior Dai Grepher's".
  *** "Spirit Ryu": This monster's armor shares the same violet color scheme and green forehead jewel as "Spirit Ryu".
  **** This monster is the result of "Warrior Dai Grepher" if he chooses the path of light in "[[The Paths of Destiny]]", instead of possibly becoming "[[Dark Grepher]]" or "[[Dark Lucius]]", uniting with "Spirit Ryu" through "Array of Revealing Light".
