title: 'Card Trivia:Number 11: Big Eye'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Battles of Legend: Chapter 1]]''.
  * The number "11" appears on the front of the outer ring around this monster.
  * This card's name is the same as the ''[[TCG]]'' name of "[[Big Eye]]".
  * "[[Number]]" monsters often take the form of their owners and/or their original desires; this card represents its original owner, [[Fortuno]].
  ** This monster's appearance as a large eyeball reflects Fortuno's precognitive abilities.
  ** This card's [[DARK]] [[Attribute]] and [[Spellcaster]] [[Type]] reflects Fortuno's "[[Shaman]]" [[Deck]].
  ** This card's effect of taking [[control]] of the opponent's monsters reflects Fortuno's ability to use [[wikipedia:Hypnosis|hypnosis]] on someone and take control of their will.
  *** This card's effect also reflects Fortuno's ability to steal his opponent's "Number" cards through [[Photon Hand]].
  ** This card was the original "Number" card Fortuno used, as he used it to win "[[Number 16: Shock Master (anime)|Number 16: Shock Master]]" from its [[Number 16's holder|original holder]].
  * This card was the first [[Rank]] 7 [[Xyz Monster]] to be released.
  * This card is the first "Number" monster to be [[Limited]], though only in the ''[[OCG]]''.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster [[detach]]ed an [[Xyz Material]], it absorbed it through its eye, which released waves at the [[target]]ed monster. A purple aura then shrouded the monster and switched its control.
  * In the anime, this monster's neutral form was an eye followed by a chain of nerves like biological tissues that form together. After the monster was formed together, it opened its eye and its unsealed appearance was then fully revealed.
  ** This monster's neutral form was not shown in the English dubbed version.
