title: Card Trivia:Level Retuner
wikitext: |-
  {{Navigation}}

  * "[[Sangan]]" appears in this card's artwork.
  ** Two of its [[Level]] stars are being destroyed, illustrating the card's effect.
  * This is the [[Trap Cards|trap]] and upgraded version of "[[Demotion]]".
  * This card has an upgraded form, "[[Mischief of the Yokai]]".
  * This card was released as one of the 3 [[Raging Battle]] preview promos released in the [[Duelist Pack Collection Tin 2009]] green tin.
