title: Card Trivia:Arcanic Force The Flipflopper
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's Japanese name (ドッチツカーズ, ''Dochitsukāzu'') is a pun on the Japanese phrase meaning "indecisive" or "noncommittal" (どっちつかず, ''dotchitsukazu'' ).
  * This monster's name and effect reference the "[[Arcana Force]]" [[archetype]], while the monster itself specifically resembles "[[Arcana Force XXI - The World]]".
  ** It has one lower [[Level]] and 1000 less [[original ATK and DEF]] (2100/2100) than "The World" (3100/3100), but if its [[coin toss]] effect lands on heads, it will have the same [[ATK]] as well.
