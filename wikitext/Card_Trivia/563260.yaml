title: Card Trivia:Glowing Crossbow
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Glowing Bowgun" (グローウィング・ボウガン ''Gurōwingu Bougan'') is a pun on [[Crow Hogan]]'s name.
  ** The color scheme of this bow is based on the color scheme of Crow's [[Duel Runner]], the ''[[Blackbird]]'', while the orange feathers on its arrow are based on the appearance and color scheme of Crow's hairstyle.
