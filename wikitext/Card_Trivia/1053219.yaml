title: Card Trivia:I.A.S. -Invasive Alien Species-
wikitext: |-
  {{Navigation}}

  * This monster's name and effect are designed after the concept of [[wikipedia:Invasive species|Invasive Alien Species]].
  ** This monster's effect benefits from an opponent having a card face-up in their [[Field Zone]], referencing how invasive species quickly adapt to new environments they are directly or indirectly introduced to and how that ends up causing ecological and/or environmental damage in the process and aftermath.
