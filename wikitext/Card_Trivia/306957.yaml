title: Card Trivia:Mobius the Mega Monarch
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Monarchs Awaken]]".
  * This card is an [[Mega Monarch|upgraded form]] of "[[Mobius the Frost Monarch]]".
  * This is the first [[Main Deck]] [[monster]] to be released as a [[Ghost Rare]] since ''[[Photon Shockwave]]''.
  ** Interestingly enough, like "[[Rainbow Dragon]]", "[[Galaxy-Eyes Photon Dragon]]", "[[Stardust Dragon]]" and "[[Honest]]", this card was originally released as a [[Ghost Rare]] but was later released as a [[Common]].
