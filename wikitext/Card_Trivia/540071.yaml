title: Card Trivia:Spirit of the Six Samurai
wikitext: |-
  {{Navigation}}

  * This is the first [[Union monster]] in a Generation 5 booster set.
  * This is the first and only [[Union monster]] of the "[[Six Samurai]]" [[archetype]].
  * This monster is an older, post-mortem version of "[[Legendary Six Samurai - Shinai]]", according to the [[Master Guide 3 card storylines#Legendary Six Samurai - Shinai|Master Guide 3 card storylines]].
  ** This is also supported by the fact that both monsters have the same armor, Type, Level, ATK and DEF (barring a difference of 1000 for each).
  * The Spanish [[Gladiator's Assault]] and [[Turbo Pack: Booster Five]] prints of this card have a typo, as the word "''Uni'''ó'''n''" is printed as "''Uni'''o'''n''". Its lore (in both cases) uses the correct spelling.
