title: Card Trivia:Yorishiro of the Lion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[War-Lion Ritual (Rush Duel)|War-Lion Ritual]]".
  ** This monster's appearance in "War-Lion Ritual" in the Japanese ''[[OCG]]'' predates this card's release by 25 years and 11 months.
  * This monster is named after a ''[[wikipedia:Yorishiro|yorishiro]]'', the [[wikipedia:Shinto|Shinto]] term for an object capable of attracting ''[[wikipedia:Kami|kami]]'' during religious ceremonies. In certain instances, a person can play the role of the ''yorishiro'' and allow themselves to be "possessed" by the ''kami''.
  ** In the context of this monster, "[[Super War-Lion (Rush Duel)|Super War-Lion]]" is likely a beast ''kami'', and this monster being its ''yorishiro'' is depicted in the artwork of "War-Lion Ritual" possessing the wolf to attract "Super War-Lion". Fittingly, this monster's effect also [[support]]s "War-Lion Ritual" and/or "[[War-Lion Assault]]", the two [[Ritual Spell Card]]s required to [[Ritual Summon]] "Super War-Lion".

