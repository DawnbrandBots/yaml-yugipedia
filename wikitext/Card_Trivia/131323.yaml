title: Card Trivia:Insect Pheromone
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Insect Princess]]" appears in this card's artwork.
  * This card's name and effect is a reference to how insects secrete special chemicals called pheromones to attract a mate, whereas this card "attracts" the opponent's [[Insect]]-[[Type]] monsters to attack "Insect Princess".
