title: Card Trivia:Cubic Mandala
wikitext: |-
  {{Navigation}}

  * The five larger cube-like shapes in this card's artwork represents the opponent's 5 [[Main Monster Zone]]s that this card's effect can take up by [[Special Summon]]ing their monsters that were [[destroy]]ed on the same turn.
  * This card is based on a [[wikipedia:Mandala|mandala]], a geometric configuration of symbols used for religious purposes, including Buddhism and Hinduism.
  ** This card's effect to Special Summon the opponent's monsters that were destroyed on the same turn from their [[Graveyard]] reflects how Buddhism and Hinduism are religions centered around the belief of death, rebirth, and reincarnation.
