title: Card Trivia:Basal Rose Shoot
wikitext: |-
  {{Navigation}}

  * "[[Ruddy Rose Dragon]]" appears in this card's artwork.
  ** This card's artwork is also similar to the animation of "[[Black Rose Dragon (anime)|Black Rose Dragon]]'s" second effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This card's name is a reference to [[wikipedia:basal shoot|basal shoots]], the term used for various kinds of growths from a bud at the base of a tree or shrub.
