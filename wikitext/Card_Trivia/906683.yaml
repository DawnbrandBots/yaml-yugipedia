title: Card Trivia:Dark Catapulter
wikitext: |-
  {{Navigation}}

  * This card is likely a spiritual successor to "[[Catapult Turtle]]".
  ** Both monsters are used by the protagonists of their respective anime series ([[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime, [[Yugi Muto]]/[[Yami Yugi]] in the ''[[Yu-Gi-Oh!]]'' anime and manga).
  ** Both cards share the same [[ATK]] and feature the word "catapult" in their card names.
  ** This card's effect of destroying [[Spell Card|Spells]] and [[Trap Card]]s is a reference to Yami Yugi's Duel against [[Mai Valentine]] in the ''Yu-Gi-Oh!'' anime and manga when Yami Yugi used "Catapult Turtle" to launch Mai's "[[Harpie's Pet Dragon]]" through her "[[Mirror Wall]]", which resulted in its destruction.
