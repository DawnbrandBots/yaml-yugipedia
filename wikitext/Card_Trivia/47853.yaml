title: Card Trivia:Flamvell Magician
wikitext: |-
  {{Navigation}}

  * This monster's effect bridges the support between the "[[Ally of Justice]]" and "[[Flamvell]]" monsters, despite them having very different overall strategies. This is derived from their card lore, as stated in the [[Master Guide 3 card storylines|''Master Guide 3'' card storylines]].
  * This is the only "Ally of Justice" support card that is not of the "Ally of Justice" archetype.
