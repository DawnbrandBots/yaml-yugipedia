title: Card Trivia:Fortuneterror
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is a pun on the word "fortuneteller", referencing [[Aura Sentia]]'s ability to predict the future.
  ** This is further enforced by the multiple artifacts and symbols used by fortunetellers, which includes crystal balls, Tarot cards, runes, and multiple motifs of Western astrology.
