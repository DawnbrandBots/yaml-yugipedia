title: Card Trivia:Cyberse Wizard
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Star Pack VRAINS]]''.
  * This monster appears in the artworks of "[[Doppler Phase Coating]]" and "[[Cyberse Pride]]".
  * This card has a [[Link Monster]] [[counterpart]]: "[[Cyberse Enchanter]]".
  * This monster has an "[[@Ignister]]" counterpart: "[[Wizard @Ignister]]".
  * Given the [[wikipedia:Information Technology|information technology]] (IT) theme of this monster, the "Wizard" part of this card's name may reference the same alternate name for [[wikipedia:Wizard (software)|setup assistants]]; user interfaces that present a user with dialog boxes which are meant to aid said user through a series of well-defined steps.
  ** "Wizard" was also a pre-1990s IT-term for a computer expert.
