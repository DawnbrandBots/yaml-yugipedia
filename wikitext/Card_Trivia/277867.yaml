title: Card Trivia:Mermail Abyssbalaen
wikitext: |-
  {{Navigation}}

  * This card's English name is derived from ''[[wikipedia:Balaenoptera|Balaenoptera]]'', a genus of whale.
  ** Specifically, this monster is based on a [[wikipedia:Blue whale|blue whale]], as indicated by its Japanese name, 「水精鱗－サルフアビス」, aka "Mermail - Sulfuabyss". This is because "sulphur bottom" (or "sulfur bottom") is another name for the blue whale.
