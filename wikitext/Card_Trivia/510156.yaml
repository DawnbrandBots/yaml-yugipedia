title: Card Trivia:Card Trooper
wikitext: |-
  {{Navigation}}

  * This monster's head is similar in appearance to [[wikipedia:Robot (Lost in Space)|B9]] from ''[[wikipedia:Lost in Space|Lost in Space]]''.
  * This monster has a defensive counterpart: "[[Card Blocker]]".
  ** This monster also shares the same [[Attribute]] ([[EARTH]]), [[Level]], (3), [[original ATK and DEF]] (400/400), and naming scheme as "Card Blocker" and "[[Card Ejector]]".
  *** Fittingly, the above-mentioned monsters were used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * The Spanish prints of this card (at least until [[Premium Gold: Return of the Bling]]) use the word "''enviada''" instead of "''mandada''", which is the official term in the Spanish ''[[TCG]]'' for "''sent''".
  * This monster exists in the world of the "[[HERO]]" monsters, being part of a team that supports the "HERO" monsters alongside the likes of "[[Wroughtweiler]]" and "[[Dandylion]]".<ref>[https://ygorganization.com/gxduelmemorialalbum000/ GX Duel Memorial Album: Extra Edition]</ref>

  * This card was involved in an [[wikipedia:April Fools' Day|April Fools]] joke letter from [[Upper Deck Company|Upper Deck Entertainment]], spelled out by the first letter of each paragraph.{{Citation needed}} The letter reads:
  <blockquote>"Dear Judges,

  This is a notification about some important rulings/text updates. The first pertains to the card "Card Trooper" from Duelist Pack: Jaden Yuki 2.

  '''A'''pparently the text on the card was mistranslated from Japanese, this mistranslation greatly changes the function of the card.

  '''P'''ractically speaking, had this change been noticed it would have greatly changed the outcome of many tournaments.

  '''R'''eally the text should read

  '''I'''n your Stand-by phase send 3 cards from your hand to the graveyard. This card gains 500 ATK points for each card sent to the graveyard this way, until the end of the turn. When this card on your side of the field is destroyed and sent to the graveyard, your opponent draws 1 card.

  '''L'''ike the text, a ruling for the card has been added: The first effect of "Card Trooper" is not optional, if "Card Trooper" is on your field during your stand-by phase, you must send three cards from your hand to the graveyard. If you are unable to do so "Card Trooper" is destroyed and your opponent draws 1 card.

  '''F'''ollowing this change is an update to Magical Stone Excavation. The text of the card is now [Add 1 spell card from your opponent's graveyard to your hand. After this, send 2 spell cards from your hand to the graveyard.]

  '''O'''riginally the card let you return a spell card from your graveyard and discarding two cards was a cost. The real text of the card only lets you return a spell from your opponent's graveyard and requires you to send 2 spell cards as part of the effect of the card.

  '''O'''verall we are very embarrassed by these mistranslations, mainly due to the fact that a lot of large tournaments would have had different outcomes had the cards been translated correctly.

  '''L'''egally we are not obligated to do anything however here at UDE we care very much about your customers and very soon we will initiate a system for the mistranslated cards to be exchanged for cards with correct text.

  '''S'''imply speaking, the system will most probably involve sending the cards to us and we will send the corrected cards back, like we have done in the past.

  Yours sincerely,

  Kevin Tewart
  Senior Game Designer
  UDE Yu-Gi-Oh! TCG R&D Lead
  Upper Deck Entertainment"</blockquote>
