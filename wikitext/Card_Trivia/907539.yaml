title: Card Trivia:Branded in Central Dogmatika
wikitext: |-
  {{Navigation}}

  * "[[Despian Proskenion]]", "[[Despian Quaeritis]]", "[[The Iris Swordsoul]]", "[[Incredible Ecclesia, the Virtuous]]", and "[[White Relic of Dogmatika]]" appear in this card's artwork.
  * This card's name is a reference to the [[wikipedia:Central dogma of molecular biology|central dogma of molecular biology]], an explanation of the flow of genetic information within a biological system.
  * This card's artwork continues the events from "[[Branded Banishment]]". "Ecclesia" mourns the death of "The Iris Swordsoul", just as "White Relic of Dogmatika" and "Despian Quaeritis" are about to possess her (as well as merge "Fleurdelis" in with them), transforming "Ecclesia" into "[[Blazing Cartesia, the Virtuous]]".
