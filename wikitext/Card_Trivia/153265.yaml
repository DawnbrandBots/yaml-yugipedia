title: Card Trivia:Gravekeeper's Recruiter
wikitext: |-
  {{Navigation}}

  * This card is one of several "[[Gravekeeper's]] monsters released in the ''[[Yu-Gi-Oh! 5D's]]'' era whose designs are based on the [[Ishtar]] family. In this monster's case, it bears resemblance to [[Odion]].
  * This card is similar to "[[Gravekeeper's Spy]]" in that it can search all but 3 "[[Gravekeeper's]]" monsters. Unlike "Gravekeeper's Spy", however, it searches based on [[DEF]] rather than [[ATK]], and adds the searched card to the hand, instead of [[Special Summon]]ing it to the field.
