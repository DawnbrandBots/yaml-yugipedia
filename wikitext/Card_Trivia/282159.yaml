  {{Navigation|mode=nonGame|Yu-Gi-Oh! ZEXAL}}

  * [[Anna Kaboom]], [[Astral]], [[Bronk Stone]], [[Caswell Francis]], [[Cathy Katherine]], [[Dr. Faker]], [[Flip Turner]], [[Hart Tenjo]], [[Haru Tsukumo]], [[Kari Tsukumo]], [[Kazuma Tsukumo]], [[Kite Tenjo]], [[Lillybot]], [[Mira Tsukumo]], [[Mr. Kay]], [[Nistro]], [[Orbital 7]], [[Quattro]], [[Quinton]], [[Reginald Kastle]], [[Rio Kastle]], [[Trey]], [[Vetrix]] and [[Yuma Tsukumo]], and the card version of "[[Number 39: Utopia]]" appears in this card's ''[[OCG]]'' artwork; also, [[Dextra]], [[Jen]], [[Kaze]], [[Nelson Andrews]], [[Roku]] and [[Summer (character)|Summer]] appear outside the boundary of this card's artwork.
  ** "[[Gagaga Girl]]", "[[Gagaga Magician]]", "[[Gogogo Golem]]", "[[Rainbow Kuriboh]]", "[[Number 39: Utopia]]" and "[[Zubaba Knight]]" appear in this card's anime artwork.
  ** This card's anime artwork is based on the ending scene in ''[[Challenge the GAME]]''.
