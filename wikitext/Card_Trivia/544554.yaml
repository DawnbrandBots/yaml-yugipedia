title: Card Trivia:Ojama Pajama
wikitext: |-
  {{Navigation}}

  * "[[Ojama Black]]", "[[Ojama Green]]", and "[[Ojama Yellow]]" appear in this card's artwork.
  ** "[[Blue Duston]]", "[[Green Duston]]","[[Red Duston]]", "[[White Duston]]", "[[Yellow Duston]]", and some of the unreleased "[[Duston]]" monsters from the artwork of "[[Magicalized Duston Mop]]" are depicted on the bedspread "Ojama Green" is lying on.
  ** The brand of sweets "Ojama Black" is depicted eating may be a reference to "[[Madolche Chateau]]".
  * The pajamas worn by "Ojama Yellow" in this card's artwork bear a resemblance to "[[White Potan]]".
  * This card's Japanese name is a pun on "[[wikipedia:Sleepover|pajama party]]", another term for a "sleepover".
