title: Card Trivia:7
wikitext: |-
  {{Navigation}}

  * A "[[Kuriboh Token]]", a pink "[[Sheep Token]]", and the [[Eye of Wdjat]] appear in this card's artwork.
  * This slot appears in the artwork of "[[Jackpot 7]]".
  * This card has the shortest name in the game, featuring only 1 character.
  * This card's name and effect are based on a [[wikipedia:Slot machine|slot machine]], a gambling machine that creates a game of chance for customers.
  ** The objective of the slot machine is to match three of the same images on the reels to win a prize, and the customer will be rewarded with a special prize if they match up the three "lucky sevens", which reflects this card's effect to "reward" the player by allowing them to [[draw]] three cards and allowing the player to gain '''700''' [[Life Point]]s when it is [[sent]] from the [[field]] to the [[Graveyard]].
