title: Card Trivia:Black and White Wave
wikitext: |-
  {{Navigation}}

  * "[[Adreus, Keeper of Armageddon]]" and "[[Armades, Keeper of Boundaries]]" appear in this card's artwork.
  * This card's name is a reference to the black and white card frames of [[Xyz Monster|Xyz]] and [[Synchro Monster]]s, respectively.
