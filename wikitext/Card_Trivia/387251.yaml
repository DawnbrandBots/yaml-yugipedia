title: Card Trivia:Amaterasu
wikitext: |-
  {{Navigation}}

  * "[[Sword of Kusanagi]]" appears in this card's artwork.
  * This monster is based on [[wikipedia:Amaterasu|Amaterasu]], the [[wikipedia:Shinto|Shinto]] goddess of the Sun.
  ** This monster's [[Flip]]-like effect is based on the legend of [[wikipedia:Amano-Iwato|Amano-Iwato]], the cave that Amaterasu sealed herself away inside following the unruly conduct of her brother, [[wikipedia:Susanoo-no-Mikoto|Susano'o]], the Shinto god of storms, and deprived the world of sunlight until she was tricked into coming out.
  ** The appearance of "Sword of Kusanagi" in this card's artwork references the legend of Susano'o, where he presented Amaterasu with the ''[[wikipedia:Kusanagi no Tsurugi|Kusanagi no Tsurugi]]'', the sword that slew the [[wikipedia:Yamata no Orochi|Yamata no Orochi]], as a reconciliatory gift.
  * This is the first [[Level 9]] [[Spirit monster]].
  * This monster is tied with "[[Shinobaron Peacock]]" and "[[Tsumuha-Kutsunagi the Lord of Swords]]" for having the highest [[original ATK]] (3000) of all Spirit monsters.
  * This is the first monster that cannot be [[Normal Summon|Normal]] nor [[Special Summon]]ed, except with effects that ignore [[Summoning condition]]s.
