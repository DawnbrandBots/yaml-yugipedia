title: Card Trivia:Poly-Chemicritter Hydragon
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Properties of water|water molecule]], or more specifically [[wikipedia:Dihydrogen monoxide hoax|dihydrogen monoxide]]. H<sub>2</sub>O''' '''is composed of an [[wikipedia:oxygen|oxygen]] atom ("[[Chemicritter Oxy Ox]]") and two [[wikipedia:hydrogen|hydrogen]] atoms ("[[Chemicritter Hydron Hawk]]").
  ** This card's name is a pun on "hydrogen" - "[[wikipedia:Lernaean Hydra|hydra]]" and "[[wikipedia:dragon|dragon]]".
  * This card has the highest DEF of all [[Gemini monster]]s.
