title: Card Trivia:Steamroid
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Steam locomotive|steam locomotive]], a steam-powered railway vehicle, which reflects 
  ** Fittingly, this monster's effect reflects the steam locomotive's speed, as it's unstoppable with forward momentum (represented by how it gains 500 [[ATK]] during the [[Damage Step]] when it attacks an opponent's monster), but they can also be pushed backwards on the tracks when not in motion (represented by how it loses 500 ATK during the Damage Step when attacked by an opponent's monster).
