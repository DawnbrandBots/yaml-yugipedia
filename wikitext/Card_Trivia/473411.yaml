title: Card Trivia:Silent Burning
wikitext: |-
  {{Navigation}}

  * "[[Silent Magician]]" appears in this card's artwork.
  * This card's effect to make each player [[draw]] until they have six cards in their [[hand]] during the [[Battle Phase]], if the player [[control]]s a "[[Silent Magician (archetype)|Silent Magician]]" monster and have more cards in their hand than the opponent, is a reference to the effect of "[[Card of Sanctity]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** Specifically, this card's effect is a reference to a scene of the [[Rite of the Duel]] in {{chapter|Yu-Gi-Oh!|342|ref}} and {{episode|Yu-Gi-Oh!|224|ref}}: during [[Dark Yugi (manga)|Pharaoh Atem]]'s [[Battle Phase]], [[Yugi Mutou (manga)|Yugi Mutou]] [[activate]]d "[[Card of Sanctity (manga)|Card of Sanctity]]" (via "[[Spell Textbook]]" in the anime), causing [[Yugi Muto|Yugi]] to draw six cards and Atem to draw 5. The effect of Yugi's "[[Silent Magician LV0]]" then activated, which increased its "[[LV]]" by one and its [[ATK]] by 500 for each card Atem drew ("Silent Magician LV0" → "[[Silent Magician LV5]]": 1000 → 3500/1000), enough to [[destroy]] [[Pharaoh Atem]]'s "[[Dark Magician (anime)|Dark Magician]]".
  *** However, the requirement of this card's effect to have more cards in the hand than the opponent is the opposite of Yugi drawing six cards and Atem drawing five.
  * This card has a "[[Shining Sarcophagus (series)|Shining Sarcophagus]]" counterpart: "[[Future Silence]]".
