title: Card Trivia:Unchained Soul of Shyama
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Sharvara and Shyama|Shyama]], one of the two Hindu mythological watchdogs belonging to [[wikipedia:Yama|Yama]].
  * This monster is the wolf form of "[[Unchained Ogre Shma]]". They have the same [[Attribute]] and opposite [[ATK]]/[[DEF]].
