title: Card Trivia:Jinzo - Returner
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Machine Inspector]]" and "[[Psychic Wave]]".
  * This monster's name reflects its effect of "[[return]]ing" "[[Jinzo]]" to the [[field]] from the [[Graveyard]], and then "returning" it to the Graveyard during the same turn's [[End Phase]] by [[destroy]]ing it.
  * This is the only "[[Jinzo (archetype)|Jinzo]]" monster that does not feature a mask covering its mouth.
