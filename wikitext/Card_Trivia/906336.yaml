title: Card Trivia:Rokket Caliber
wikitext: |-
  {{Navigation}}

  * This monster's name and design are based on [[wikipedia:Cartridge (firearms)|firearm cartridges]], a complete unit of ammunition that includes a bullet, gunpowder, a primer, and a case that holds everything together.
  * This monster's effect to [[Special Summon]] a [[DARK]] [[Machine]] monster from the player's [[hand]] references how [[Varis]] (the user of the "[[Rokket]]" [[archetype]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime) owned "[[Cracking Dragon (anime)|Cracking Dragon]]", a DARK Machine monster.
