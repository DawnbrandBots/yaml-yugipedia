title: Card Trivia:Heroic Challenger - War Hammer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Heroic Call]]".
  * This monster's name and weapon are based on the [[wikipedia:War hammer|war hammer]], a weapon used by foot soldiers and cavalry.
  * This monster has the highest [[Level]] (6) and [[original ATK]] (2100) of all "[[Heroic Challenger]]" monsters.
