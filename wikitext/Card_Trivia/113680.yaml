title: Card Trivia:Apocatequil
wikitext: |-
  {{Navigation}}

  * A ghostly version of this monster appears in the artwork of "[[Call of the Reaper]]".
  * This monster is based on [[wikipedia:Apocatequil|Apocatequil]], the Inca god of thunder and lightning, and the chief priest of the Inca moon goddess [[wikipedia:Mama Killa|Mama Quilla]]. 
  ** Fittingly, this monster's origin is shared with "[[Moon Dragon Quilla]]" (based on Mama Quilla), which can be [[Synchro Summon]]ed using this monster as [[Synchro Material]].
