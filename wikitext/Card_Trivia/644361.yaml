title: Card Trivia:A.I. Shadow
wikitext: |-
  {{Navigation}}

  * [[Ai]] appears in this card's artwork.

  * This card's name is a wordplay on "[[wikipedia:Eye shadow|eye shadow]]", a cosmetic applied primarily to the eyelids, which Ai is depicted wearing.
  ** This card's effect to manage the attack targets to an "[[@Ignister]]" monster the player controls references how the use of eyeshadow can attract attention to the wearer.
  ** This card's name and effect likely reference "[[Shadow of Eyes (manga)|Shadow of Eyes]]", another Trap Card from the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga with a similar effect.
