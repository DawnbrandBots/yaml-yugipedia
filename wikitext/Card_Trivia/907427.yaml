title: Card Trivia:Phantom Magician
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:The Adventures of Patsy|The Phantom Magician]], a masked swashbuckling character from the 1900s American comic strip, ''The Adventures of Patsy'', who is historically regarded as one of the earliest comic superheroes.
  * This monster can be considered a [[counterpart]] of "[[Wroughtweiler]]".
  ** Both [[support]] a "[[HERO]]" [[archetype]] without being a member of that archetype: "Wroughtweiler" supports the "[[Elemental HERO]]" archetype, while this monster supports all "HERO" monsters in the ''[[OCG]]''/''[[TCG]]'' and no specific archetype in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  *** Also, in the manga, this monster was used alongside the "[[Vision HERO]]" archetype, the manga counterpart of the "[[Destiny HERO]]" archetype, both of which are rivals of the "Elemental HERO" archetype in the manga and anime, respectively.
  ** Both share the same [[Level]] (3), have a higher [[DEF]] than their [[ATK]], and a [[Type]] that is not shared by any member of the archetype they support.
  ** Both have an effect that allows the player to move a "HERO" monster when they are [[destroy]]ed by battle and sent to the [[Graveyard]]: "Wroughtweiler" [[add]]s an "Elemental HERO" from the Graveyard to the [[hand]], while this monster [[Special Summon]]s a "HERO" monster from the [[Main Deck]].
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|GX|050|ref}}, specifically from the panel showing [[Mirage Magician (manga)|this monster]] being Summoned.
