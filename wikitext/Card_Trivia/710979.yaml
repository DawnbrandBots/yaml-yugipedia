title: Card Trivia:Princess of the Flock - Miss Mutton
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Beaming Bell Beam]]", "[[Exchange of the Meeeg]]", "[[Gateway to the Wooly Wunderworld]]", "[[Meet and Greed]]", and "[[Miss Mutton's Flocking Fanmail]]".
  * This monster does not appear in its third artwork. Instead, the artwork depicts [[Yuamu Ohdo]] [[cosplay]]ing as this monster, as seen in {{episode|GO RUSH!!|3|ref}}.
  ** Conversely, this makes said alternate artwork the only instance where a [[Monster Card]]'s own artwork does not actually depict its monster, but instead another character dressing up as it.
  * This monster's vocalizations are provided by professional cosplayer [[Enako]], who stated in an interview she had largely provided "bleats" and "baas" for the monster.<ref name="interview">{{cite web | url = https://ygorganization.com/go-rush-new-character-announced/ | title = [Go Rush!!] New Character Announced | author = NeoArkadia | website = The Organization | date = March 6, 2022 | accessdate = March 7, 2022}}</ref>
  * This is the [[signature card]] of [[Chupataro Kaburagi]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime, as well as his [[Yu-Gi-Oh! GO RUSH!! (manga)| manga]] [[Chupacabra Alien|counterpart]].
  * This monster has 2 forms: 
  ** A [[Maximum Monster|Maximum]] [[counterpart]]: "[[Super Princess of the Flock - Max Mutton]]".
  ** An upgraded [[Fusion Monster|Fusion]] form: "[[Royal Princess of the Wooly Wunderworld - Miss Mutton]]".

