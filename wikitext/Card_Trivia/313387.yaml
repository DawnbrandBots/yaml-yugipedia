title: Card Trivia:Nekroz of Gungnir
wikitext: |-
  {{Navigation}}

  * This monster is "[[Dance Princess of the Nekroz]]" wearing armor based on "[[Gungnir, Dragon of the Ice Barrier]]".
  ** This monster shares the same [[Attribute]], [[Level]], [[ATK]] and [[DEF]] as the aforementioned monster, and has a similar effect dealing with [[destroy]]ing cards by [[Discarding for a cost|discarding]].
  ** There seems to have been no noticeable change in the age of "Dance Princess" after donning the ritual armor, unlike "[[Shurit, Strategist of the Nekroz]]" and "[[Great Sorcerer of the Nekroz]]". This is perhaps because she is the only one who is dead and was revived thereafter.
  * This monster appears in the artwork of "[[Void Apocalypse]]".
  * "[[Nekroz Mirror]]" appears in this card's artwork, it is no longer on her forehead and is now instead replacing the "[[Gishki Aquamirror]]" that had formerly been on the staff of "Dance Princess".
