title: Card Trivia:Gem-Knight Dispersion
wikitext: |-
  {{Navigation}}

  * "[[Gem-Knight Master Diamond Dispersion]]" appears in this card's artwork.
  * This card's name is based on diamond dispersion, an optical phenomenon occurring in certain gemstones, like diamonds, where white light is separated into its component colors as it passes through the material, creating fiery or colorful sparkles.
