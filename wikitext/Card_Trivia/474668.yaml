title: Card Trivia:Subterror Behemoth Ultramafus
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Extra Pack 2017]]''.
  * This monster is possibly the same volcano that appears in the artwork of "[[The Hidden City]]".
  * "[[Subterror Nemesis Archer]]" and "[[Subterror Nemesis Warrior]]" appear in this card's artwork (in the upper-left corner).
  * This monster's Japanese name, "Subterror Malice Balesash", is a reference to the [[wikipedia:Balearic Islands|Balearic Islands]] or the [[wikipedia:Balearic Sea|Balearic Sea]], keeping with the [[wikipedia:Mediterranean Sea|Mediterranean Sea]] theme of the Japanese names of the "[[Subterror Behemoth]]" monsters.
  * This is the first and currently only [[Level 12]] [[Flip monster]], as well as the first Level 12 Pyro monster and the first Pyro Flip monster.
  ** This monster has the highest Level (12) and [[original ATK]] (4000) of all Flip monsters, as well as the highest Level of all Pyro monsters.
