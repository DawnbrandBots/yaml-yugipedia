title: Card Trivia:Dragons Burst Fusion
wikitext: |-
  {{Navigation}}

  * "[[Blue-Fang Burst Dragon]]" and "[[Booster Wyvern]]" appear in this card's artwork.
  * The first letters of each word in this card's name is "DBF", an acronym for [[wikipedia:.dbf|database file]], which is often abbreviated as ".dbf".
  ** This card shares this naming scheme with "[[Dragons Boost Fusion]]" and it can be [[support]]ed by "[[DBF Rebuildra]]".
