title: Card Trivia:Gussari @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" symbol is located on the handle of this monster's sword.
  * This monster's name is based on "''gussari''", the Japanese onomatopoeia for "striking", referencing this monster's sword, 3000 [[original ATK]], and battle-based effects.
  * While its in-universe inspiration is unknown, this monster likely represents [[Pandor]].
  ** This monster resembles certain members of Pandor's "[[Topologina]]" archetype, particularly "[[Topologina Gatsbee]]" and "[[Topologina Maybee]]".
  *** This monster's humanoid and lanky design likely references how Pandor is the most humanoid looking [[Ignis]] based AI.
  *** This monster's [[equal ATK and DEF|equal]] [[original ATK and DEF]] (3000) also mirror the [[ATK]] of Pandor's ace monster, "[[Topologic Bomber Dragon]]".
  ** This monster's sword resembles a bee's stinger, referencing the "Topologina" monsters' bee theme, as well as reference Pandor's purpose to kill rogue AIs.
  *** Adding to the latter point, this monster's [[ATK]] is higher than or equal to the base stats of all other "@Ignisters" (with "[[The Arrival Cyberse @Ignister]]" being at 3000 if [[Link Summon]]ed with the minimum of three [[material]]s it requires, or 0 if not Link Summoned), theoretically allowing this monster to destroy the other "@Ignisters" (even if it gets destroyed in the process).
