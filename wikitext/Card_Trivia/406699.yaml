title: Card Trivia:Spider Web (anime)
wikitext: |-
  {{Navigation}}

  * This card is based on a Japanese short story called [[wikipedia:The Spider's Thread|The Spider's Thread]]. The story tells of Buddha looking into a pool that shows him Hell, and his eyes fall on a criminal named Kandata, who had performed one good deed in life: choosing not to step on a spider. Moved by this, Buddha lowered a spider's thread into Hell for him to climb up and save himself.
