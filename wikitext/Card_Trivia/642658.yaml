title: Card Trivia:Aromage Laurel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Aroma Gardening]]".
  * This monster is named after the ''[[wikipedia:Laurus nobilis|Laurus nobilis]]'' (also known as the bay laurel or simply the laurel), an aromatic evergreen tree or large shrub with green, smooth leaves, which are used in cooking flavoring or in medical and aromatic purposes.
