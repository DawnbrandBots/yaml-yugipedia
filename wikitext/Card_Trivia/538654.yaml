title: Card Trivia:Injection Fairy Lily
wikitext: |-
  {{Navigation}}
  [[File:InjectionFairyLily-MA-JP-NR.png|thumb|250px|The version of this card's artwork that violates the Geneva Conventions]]
  * This monster appears in the artworks of "[[Fairy's Injection]]" and "[[Weed Out]]".
  ** This monster's syringe appears in the artwork of "[[Lily's Syringe]]".
  * This monster has a [[retrained]] version: "[[Counselor Lily]]".
  * This monster has 2 ''[[Rush Duel]]'' counterparts
  ** A [[Bubble Actress]] counterparts: "[[Vacuum Fairy Lily]]".
  ** A [[Beast-Warrior]]-[[Type]] counterpart: "[[Animal Doctor Lily]]".
  * This monster wears an adhesive bandage on the back of her left leg, as shown in the anime.
  * Despite this monster's Japanese and ''[[TCG]]'' names alluding to the [[Fairy]] Type, it is actually a [[Spellcaster]] monster.
  ** This monster's Japanese name is written 「お{{Ruby|注|ちゅう}}{{Ruby|射|しゃ}}{{Ruby|天|てん}}{{Ruby|使|し}}リリ」 where the kanji 「{{Ruby|天|てん}}{{Ruby|使|し}}」 is the Japanese word for "angel", which is translated into "Fairy" in the ''TCG''.
  ** This monster's retrained counterpart, "Counselor Lily" on the other hand, is a Fairy monster.
  * This card, along with "[[Spore]]" and "[[United We Stand]]", has spent the least amount of time on the [[Forbidden]] List, having only been on it for a total of one format.
  * This card's first few Japanese prints feature [[wikipedia:Emblems of the International Red Cross and Red Crescent Movement|Red Crosses]] in the artwork's background and on the monster's hat. This usage of the Red Cross symbol violates the [[wikipedia:Geneva Conventions|Geneva Conventions]], which strictly ban the use of the symbol outside of marking medical personnel, material, vehicles, and facilities in combat areas. These symbols were all replaced with red hearts for this card's international release, and the updated artwork was used for all subsequent Japanese releases, starting in ''[[Beginner's Edition 2]]''.
  ** The design featuring red crosses was also used in the Japanese versions of ''[[Yu-Gi-Oh! The Sacred Cards]]'' and ''[[Yu-Gi-Oh! Reshef of Destruction]]''. It was changed in the international version to use red hearts instead.
  * In the ''Yu-Gi-Oh!'' video games for the Nintendo DS (except ''[[Yu-Gi-Oh! GX Spirit Caller]]''), this monster's 3D graphic features brown hair as opposed to her pink hair in the card artwork.
