title: Card Trivia:Yoshitsune the Goblin of Beauty
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Minamoto no Yoshitsune|Minamoto no Yoshitsune]], one of the most famous samurai fighters in the history of Japan, keeping in relation with with [[Orlando]]'s ''[[wikipedia:Kanjinchō|Kanjinchō]]''-themed Deck.
  ** This monster's Japanese name, "Beautiful Tengu - Yoshi Tsune" is possibly based on the legend that Yoshitsune was taught by [[wikipedia:Sōjōbō|Sōjōbō]], the mythical king of the ''[[wikipedia:tengu|tengu]]''.
  ** This monster is depicted as a female, reflecting the theme of [[Orlando]]'s Deck; in traditional [[wikipedia:Kabuki|kabuki]] theater, male historic or mythological characters are depicted as women.
