title: Card Trivia:Shadow Specter
wikitext: |-
  {{Navigation}}

  * This monster and "[[Volcanic Rat]]" are tied for the highest [[original ATK]] (500) of all [[Level 1]] [[Normal Monster]]s.
  * This monster, "[[Giant Soldier of Stone (manga)|Giant Soldier of Stone]]", and "[[Summoned Skull (manga)|Summoned Skull]]" are among the first cards to appear in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's 3D model is depicted as a skull with spider-like legs underneath.
  * In ''[[Yu-Gi-Oh! Forbidden Memories]]'', this is the monster with the lowest [[ATK]] that can be Summoned by Fusion (excepting [[Glitch fusion|glitch fusions]] into [[Cocoon of Evolution (FMR)| Cocoon of Evolution]], which were unintended).
