title: Card Trivia:Heavy Mech Support Platform
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Roll Out!]]".
  ** The aforementioned card's artwork depicts this monster being [[equip]]ped to "[[Perfect Machine King]]" to give it cannons and either a new pair of legs or legs that support the equipment.
  ** This monster shares common design elements with "Perfect Machine King" and supplements its vulnerability to being destroyed, so this monster was likely designed to support it. They were also released in the same [[Core Booster]] [[Booster pack|pack]] ''[[Rise of Destiny]]'' and have adjacent numbers.
  * This monster is the [[DARK]] counterpart of "[[Heavy Mech Support Armor]]".
  ** Both monsters' Japanese names, "Heavy Weapon" and "Heavy Armor" respectively, make it clear that this monster is focused on strengthening the [[equip]]ped monster while "Armor" is focused on protecting it.
  * This is one of the few [[Union monster]]s that can equip itself to another copy of itself.
  * This is the first Union monster to destroy itself when the equipped monster would be destroyed by card effects (in addition to destroying itself instead of the equipped monster being [[destroyed by battle]]). This effect has now been added to even older Union monsters, such as "[[Y-Dragon Head]]".
