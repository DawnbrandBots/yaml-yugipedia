title: Card Trivia:Swamp Mirrorer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sudden Thunder Swamp‎]]".
  ** This appearance, along with this monster's Japanese name ("Mirror-Image Swampman"), indicate that this card is based on the "Swampman", the subject of a philosophical thought experiment introduced by [[wikipedia:Donald Davidson|Donald Davidson]], in which he is struck and disintegrated by a lightning bolt in a swamp, but an exact copy of Davidson, the Swampman, is created from a nearby tree and lives its life exactly as Davidson would have, indistinguishable from Davidson.
  * This card has a [[counterpart]]: "[[Quantum Cat]]".
  ** Both are [[Trap Monster]]s inspired by a real-world philosophical thought experiment.
  ** Both can be [[Special Summon]]ed as [[Normal Monster]]s with a fixed [[original ATK and DEF]], but customizable [[Type]] and [[Attribute]].
