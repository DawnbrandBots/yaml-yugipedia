  * '''Fricka''' is the name given to '''[[wikipedia:Frigg|Frigg]]''' in [[wikipedia:Der Ring des Nibelungen|Der Ring des Nibelungen]].
  * [[wikipedia:Frigg|Frigg]] in Norse mythology, is the goddess of fertility, love, household management, marriage, motherhood, and domestic arts.
