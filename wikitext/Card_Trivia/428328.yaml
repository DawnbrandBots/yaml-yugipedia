title: Card Trivia:Battlewasp - Ballista the Armageddon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bee Formation]]".
  * This monster is named after the [[wikipedia:Ballista|ballista]], the largest variation of the [[wikipedia:Crossbow|crossbow]] designed to shoot large stones or spears. Fittingly, this monster's wings are designed to resemble the curved mounted ends of the arbalest, attached to the bowstring pulled backwards with a large spear mounted.
  * This monster has the highest [[Level]] (12) of all [[Insect]] monsters (tied with "[[Battlewasp - Grand Partisan the Revolution]]").
  * This monster the highest Level (12) and [[original ATK]] (3000) of all "[[Battlewasp]]" monsters (tied with "Battlewasp - Grand Partisan the Revolution").
