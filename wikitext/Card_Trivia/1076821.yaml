title: Card Trivia:Maliss Q White Binder
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:White Queen (Through the Looking-Glass)|White Queen]] from ''[[wikipedia:Through the Looking-Glass|Through the Looking-Glass]]'' and consequently the [[wikipedia:Queen (chess)|queen]] piece in the game of [[wikipedia:Chess|chess]].
  ** The clock theme in this monster's design is a reference to how the White Queen is said to live backwards in time due to the fact that she lives through the looking glass.
  * This monster is named after a [[wikipedia:File binder|file binder]], a type of utility software that "binds" files into a single executable. File binders are often used by hackers to insert malware into otherwise harmless files to make them harder to detect.
  * This monster appears in the artwork of "[[Maliss in the Mirror]]".
  * This monster has a counterpart in "[[Maliss Q Red Ransom]]".
  ** This monster is based on the White Queen from ''Through the Looking-Glass'', while "RED RANSOM" is based on the [[wikipedia:Red Queen (Through the Looking-Glass)|Red Queen]], with both characters having an antagonistic relationship towards each other.
  ** Both monsters are depicted in mirrored poses in their card artworks, and their respective [[Link Arrow]]s are mirrored versions of each other.
  ** Both are [[Link-3]] monsters with 2300 [[ATK]], and both require 2 or more [[Link Material]]s to be [[Link Summon]]ed, including a "[[Maliss]]" monster.
  ** This monster has an [[Ignition Effect]] that lets its controller [[Set]] a "Maliss" [[Trap Card]] from their [[Deck]] or [[Graveyard]] to their [[field]], while "RED RANSOM" has a [[Trigger Effect]] that allows its controller to [[add]] a "Maliss" Spell from their Deck to their [[hand]].
