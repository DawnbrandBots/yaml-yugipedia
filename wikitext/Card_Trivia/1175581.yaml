title: Card Trivia:Vortex of Time
wikitext: |-
  {{Navigation}}

  * "[[Flame Swordsman]]" and "[[Time Wizard]]" appear in this card's artwork.
  ** This card's artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|90|ref}} showing "[[Time Wizard (manga)|Time Wizard]]" and "[[Flame Swordsman (manga)|Flame Swordsman]]" disappearing into a "vortex of time" after the effect of "Time Wizard" is unsuccessfully applied.
  * This card's [[activation condition]] requiring the opponent to [[activate]] a [[Normal Spell Card|Normal]] or [[Quick-Play Spell Card]]'s effect references how in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]], "Time Wizard" was a Normal Spell Card, while in the [[Yu-Gi-Oh! (anime)|anime]], it could be played as a Normal Spell Card.
  ** Furthermore, the activation condition requiring the player to [[control]] a [[Zombie]] monster and "[[Call of the Haunted]]" references how in the same chapter, [[Ghost Kozuka (manga)|Ghost Kozuka]] controlled "[[Call of the Haunted (manga)|Call of the Haunted]]" and his army of Zombie monsters.

