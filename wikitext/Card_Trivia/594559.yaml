title: Card Trivia:Salamangreat Performance
wikitext: |-
  {{Navigation|mode=nongame}}

  * The kanji of this card's Japanese name for "Performance", 炎奏, is a play on 演奏 (''ensō'', "performance", where 炎 and 演 have the same ''[[wikipedia:Kanji#On'yomi_(Sino-Japanese_reading)|onyomi]]'').
  * "[[Salamangreat Mole]]" appears in this card's artwork.
