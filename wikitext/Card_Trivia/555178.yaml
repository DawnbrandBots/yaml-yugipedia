title: Card Trivia:Dragunity Knight - Ascalon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragunity Whirlwind]]", "[[Ice Dragon's Prison]]", and "[[Winds Over the Ice Barrier]]".
  * "[[Dragon Ravine]]" can be seen in this card's background.
  * This card appears to be "[[Dragunity Dux]]" riding a large, living version of "[[Dragunity Divine Lance]]".
  ** Since "Dragunity Dux" is shown as the rider of the dragon, it is implied that "Ascalon" existed in the first arc of Duel Terminal lore, explaining that "Dragunity Divine Spear" is later created based on "Ascalon", not reversed.
  * This card is named after the lance with which [[wikipedia:Saint George|Saint George]] slew the dragon.
