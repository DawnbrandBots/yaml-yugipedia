title: Card Trivia:Baton of the Hero
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Freed the Brave Wanderer]]", "[[Marauding Captain]]", "[[Warrior Lady of the Wasteland]]" and either "[[Gaia The Fierce Knight]]" or "[[Swift Gaia the Fierce Knight]]" appear in this card's artwork.
  ** This artwork appears to show "Freed" between the stages of "Freed the Brave Wanderer" and "[[Freed the Matchless General]]"; he has a mustache in this artwork, but still retains his plain silver headband.
