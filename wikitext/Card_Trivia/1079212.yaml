title: Card Trivia:Argostars - Swift Capane
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Argostars - Giantslaying]]".
  * This monster is named after [[wikipedia:Capaneus|Capaneus]], one of the [[wikipedia:Seven against Thebes|Seven against Thebes]].
  ** The kanji ''hien'' (飛燕, lit. "flying swallow") in this monster's Japanese name is named after the [[wikipedia:Kawasaki Ki-61|Kawasaki Ki-61 ''Hien'']] fighter aircraft.
