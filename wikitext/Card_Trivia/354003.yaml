title: Card Trivia:Flower Cardian Lightshower
wikitext: |-
  {{Navigation}}

  * This monster is depicted in the illustration that appears on the body of "[[Flower Cardian Willow with Calligrapher]]".
  * This monster is based on ''Ame-Shikō'' ("Rainy Four Lights"), a card combination in the ''[[wikipedia:Hanafuda|hanafuda]]'' card game, ''[[wikipedia:Koi-Koi|Koi-Koi]]'', which uses the ''hikari'' card "Willow and [[wikipedia:Ono no Michikaze|Ono no Michikaze]]" with three other ''hikari'' cards.
  ** Fittingly, in {{episode|ARC-V|060|ref}}, this monster was first [[Synchro Summon]]ed using "[[Flower Cardian Paulownia with Phoenix (anime)|Flower Cardian Paulownia with Phoenix]]", "[[Flower Cardian Pine with Crane (anime)|Flower Cardian Pine with Crane]]", "[[Flower Cardian Willow with Calligrapher (anime)|Flower Cardian Willow with Calligrapher]]", and "[[Flower Cardian Zebra Grass with Moon (anime)|Flower Cardian Zebra Grass with Moon]]" as [[Synchro Material]]s, each representing four of the required five ''hikari'' cards. "Willow with Calligrapher" being a [[Tuner monster]] references how "Willow and Ono no Michikaze" is a required card in the combination.
  * This is the first [[Synchro Monster]] in the ''[[OCG]]''/''[[TCG]]'' to require exactly 3 non-[[Tuner monster]]s to Synchro Summon.
