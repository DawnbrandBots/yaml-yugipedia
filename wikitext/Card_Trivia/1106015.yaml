title: Card Trivia:Regenesis Sage
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Regenesis Commands]]".
  * This monster's Japanese name is based on ''Shemot'', which is the Jewish name for the [[wikipedia:Book of Exodus|Book of Exodus]], the second book in the [[wikipedia:Torah|Torah]], and which translates to "Names".
  ** Fittingly, this monster was listed as the second "[[Regenesis]]" monster to be released in ''[[Alliance Insight]]''.
