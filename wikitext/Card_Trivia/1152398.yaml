title: Card Trivia:Dragunity Knight - Areus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragunity Divine Wind]]".
  * This monster is named after [[wikipedia:Ares|Ares]], the god of war in [[wikipedia:Greek mythology|Greek mythology]].
  * This monster is the combined [[Synchro Monster|Synchro]] form of "[[Dragunity Falchion]]" and "[[Dragunity Remus]]" as mount components, with "[[Dragunity Quirinus]]" serving as the rider.
