title: Card Trivia:Spell Canceller
wikitext: |-
  {{Navigation}}

  * This card has a [[Trap]]-negating counterpart: "[[Jinzo]]".
  ** Additionally, one of the effects of "[[Sky Scourge Invicil]]" is directly based on this card, while its other effect is based on "Jinzo".
  * This monster shares a relationship with "[[Magic Deflector]]", "[[Magic Reflector]]", and "[[Virus Cannon]]".
  ** All cards' artwork feature a device that share similar designs, including spiked legs, purple orbs, visible circuity and mechanical insides.
  ** All cards feature an effect related to [[Spell Card]]s, although "Magic Reflector" is a Spell [[support]] card, while the others are Spell [[anti-support]] cards.
