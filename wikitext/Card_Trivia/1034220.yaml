title: Card Trivia:Cyber Dragon Nachster
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "''nächster''", the German word for "next".
  ** This monster's name reflects its appearance, as it design appears to be the "next" design and model of the "[[Cyber Dragon (archetype)|Cyber Dragons]]".
  ** This is one of several "Cyber Dragon" monsters that features German words in their names, referencing how in the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime and the [[Yu-Gi-Oh! GX (manga)|manga]], [[Zane Truesdale]] (who uses the "[[Cyber]]" [[archetype]]) was referred to by the title of "Kaiser", the German word for "emperor".
