title: Card Trivia:Starry Knight Arrival
wikitext: |-
  {{Navigation}}

  * "[[Starry Night, Starry Dragon]]" appears in this card's artwork.
  * This card's name is based on the [[wikipedia:Advent|Advent]], the beginning of the new year for the Christian churches, which is set four Sundays before [[wikipedia:Christmas|Christmas]], or before the birth of [[wikipedia:Jesus|Jesus Christ]].
