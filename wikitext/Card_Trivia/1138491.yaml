title: Card Trivia:Okiku's Dish Count
wikitext: |-
  {{Navigation}}

  * This card's name and effect are based after the Japanese ghost story, ''[[wikipedia:Banchō Sarayashiki|Banchō Sarayashiki]]'' (lit. "The Dish Mansion at Banchō"), where the main character named Okiku-san, a beautiful dishwashing servant who worked in [[wikipedia:Himeji Castle|Himeji Castle]], dies an unjust death in a situation revolving around nine dishes, but returns as a spirit who counts nine dishes in order.
  ** The same design motif is also used for the ''[[Yu-Gi-Oh! Rush Duel]]'' card, "[[The Cursed Cat Counting Dishes]]".
  * This card's Simplified Chinese name, "阿菊的如意算盘" (Pinyin: ā jú de rú yì suàn pán), literally translates to "Okiku's 'to-one's-desire abacus'", which is based on the [https://en.wiktionary.org/wiki/%E5%A6%82%E6%84%8F%E7%AE%97%E7%9B%A4 Chinese idiom] meaning "counting the chickens before they are hatched" or wishful thinking.
  ** "如意算盘" is likely also a pun on the ''Banchō Sarayashiki'' story, as the Chinese word "算盘" is composed of the characters "counting" and "dish", meaning the idiom can also be literally interpreted to mean "dish counting to one's desire".
