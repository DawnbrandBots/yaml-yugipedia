title: Card Trivia:Ogdoabyss, the Ogdoadic Overlord
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Ancient Guardians]]''/''[[Ancient Guardians]]''.
  * This monster is named after the [[wikipedia:Ogdoad (Egyptian)|Ogdoad]], the eight Egyptian primordial deities worshipped in [[wikipedia:Hermopolis|Hermopolis]].
  * This is one of the few [[legal]] monsters to completely break the unwritten [[Conventions of 3000 ATK and DEF|convention of 3000 ATK]]: this card has over 3000 [[ATK]], can be [[Normal Summon]]ed without any restrictions, and has no negative [[effect]]s.
