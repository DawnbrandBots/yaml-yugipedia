title: Card Trivia:Harpie Lady 3
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Triangle Ecstasy Spark]]" and "[[Hysteric Party]]", as well as in the second ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' artwork of "[[Harpie Lady (Rush Duel)|Harpie Lady]]".
  * This card represents one of the duplicates of "[[Harpie Lady]]" created by "[[Elegant Egotist]]" in the anime and manga.
  ** The numbering of the two duplicates that do not keep the original monster's appearance are inverted in the [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai card game]], making this monster the number 2 in it. It also has 1800 [[ATK]] and is depicted wearing "[[Cyber Shield (Bandai)|Cyber Shield]]", making it conceptually similar to "[[Cyber Harpie Lady]]".
  * In ''[[Yu-Gi-Oh! The Falsebound Kingdom]]'', this monster is named Keraino, likely in reference to the mythological harpy [[wikipedia:Celaeno|Celaeno]].
