title: Card Trivia:Underworld Circle
wikitext: |-
  {{Navigation}}

  * This card's Japanese name ({{Ruby|黄|よ}}{{Ruby|泉|み}}{{Ruby|天|てん}}{{Ruby|輪|りん}}, ''Yomi Tenrin'') is a reference to [[wikipedia:Yomi|Yomi]], the Japanese word for the land of the dead.
  * This card's ''[[OCG]]''/''[[TCG]]'' [[activation condition]] that requires both players to have five or more monsters in the [[Graveyard]]s is a reference to a scene in {{episode|Yu-Gi-Oh!|175|ref}}, where [[Yami Yugi]] [[activate]]s this card while he and [[Rafael]] each have five or more monsters in their Graveyard, with Rafael having exactly five monsters in his Graveyard ("[[Backup Gardna]]", "[[Guardian Eatos (anime)|Guardian Eatos]]", "[[Guardian Elma (anime)|Guardian Elma]]", "[[Guardian Grarl (anime)|Guardian Grarl]]", and "[[Guardian Kay'est (anime)|Guardian Kay'est]]").
  ** The last part of this card's first ''OCG''/''TCG'' effect to [[Special Summon]] a [[Normal Monster]] from the Graveyard is a reference to a scene in the same episode where Yami Yugi uses this card's effect to Special Summon the Normal Monster "[[Dark Magician (anime)|Dark Magician]]" with its effect during the turn it was activated.
  * This card has the longest [[List of cards with the longest OCG import times|''OCG'' import time]] of any card from the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'' anime]], being released in the ''OCG'' 22 years, 4 months, 13 days after its anime debut.
