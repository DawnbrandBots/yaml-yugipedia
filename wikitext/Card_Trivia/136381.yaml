title: Card Trivia:Urubonus, the Avatar of Malice
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Ouroboros|uroborus]] (an alternative spelling of ''ouroboros''), a symbol of a snake eating its own tail, representing infinity.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|020|ref}}, specifically from the panel showing [[Urubonus, the Avatar of Malice (manga)|this monster]] being Summoned, albeit with slight changes to the pose.
