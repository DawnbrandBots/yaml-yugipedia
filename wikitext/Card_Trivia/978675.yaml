title: Card Trivia:Visas Samsara
wikitext: |-
  {{Navigation}}

  * This card's artwork appears in the artworks of "[[Loka Samsara]]" and "[[Ages of Stars and Frost]]".
  * This monster is a transformed version of "[[Visas Amritara]]", after having been affected by the events of "[[Sharv Sarga]]".
  ** The "Samsara" in this card's name references the fact that "[[Visas Starfrost]]"/"Amritara" has been reborn into a new cycle with a new form.
  ** This card having a lower [[Level]] (4) than "Starfrost" (6) or "Amritara" (8) and a different [[Type]] ([[Fairy]]) from "Starfrost"/"Amritara" ([[Warrior]]) is a reference to the effect of "Sharv Sarga", wherein the owner of the monster shuffled into the Deck by its effect can add a monster with a different Type and a Level less than the Level/[[Rank]]/[[Link Rating]] of the shuffled monster's.
