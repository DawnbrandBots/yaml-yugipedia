title: Card Trivia:The Wicked Eraser
wikitext: |-
  {{Navigation}}

  * This monster is the [[Wicked God]] [[counterpart]] of "[[Slifer the Sky Dragon]]".
  ** This monster has two heads and a winged serpentine design with spikes, similar to those of "Slifer the Sky Dragon".
  ** This monster's effect to gain 1000 [[ATK]]/[[DEF]] for each card on the opponent's [[field]] is the opposite of that of "Slifer the Sky Dragon" to gain 1000 ATK/DEF for each card in the player's [[hand]].
  ** The effect of "Slifer" [[activate]]s only when another monster is added to the opponent's field and only affects said monster, while this card's effect activates when it is [[destroy]]ed (when sent to [[Graveyard]] by any means for its manga version) and affects all cards on the field.
  * In the ''[[Yu-Gi-Oh! R]]'' manga, this is the only Wicked God for which multiple copies are known to exist, with [[Keith Howard (manga)|Bandit Keith]] and [[Yako Tenma]] each owning a copy.
