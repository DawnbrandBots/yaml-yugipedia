title: Card Trivia:I'm Just Gonna Attack!
wikitext: |-
  {{Navigation}}

  * This card's name and effect to [[negate]] the [[activate|activation]] of the opponent's first [[Trap Card]] during the [[Battle Phase]] is based on [[Joey Wheeler]]'s Duel against [[Solomon Muto]] (while wearing a disguise and under the alias "Apdnarg Otum") in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, where the former repeatedly attempted to bypass the effect of the latter's Trap Card, "[[Ordeal of a Traveler]]", causing Joey to lose his patience while attempting to guess the random card in Solomon's [[hand]].
