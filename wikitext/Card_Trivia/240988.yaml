title: Card Trivia:Infernity Climber
wikitext: |-
  {{Navigation}}

  * This monster's name reflects its effect to "climb" out of the player's [[Graveyard]] and [[return]] to the top of their [[Deck]].
  * This monster's outfit resembles the outfit worn by barkeepers during the Wild West, keeping in relation with the Wild Western design of the "[[Infernity]]" [[archetype]].
