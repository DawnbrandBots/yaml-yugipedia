title: Card Trivia:Nutrient Z
wikitext: |-
  {{Navigation}}

  * The drink in this card's artwork appears in a different container on an advertising billboard in the artwork of "[[Evil★Twin's Trouble Sunny]]".
  * This card has a ''[[Rush Duel]]'' [[Spell]] counterpart: "[[Nutrient Zero]]".
  * This card is possibly related to "[[Damage Vaccine Ω MAX]]", as both cards share similar effects and feature the last letter of an alphabet in their names ("Z" and "Ω").
