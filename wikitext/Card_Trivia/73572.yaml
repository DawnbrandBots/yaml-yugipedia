title: Card Trivia:Dark Grepher
wikitext: |-
  {{Navigation}}

  * This card is the [[Dark counterpart]] of "[[Warrior Dai Grepher]]".
  * This monster appears in the artworks of "[[Darklight]]", "[[Painful Return]]", "[[Rivals Unite]]".
  * Promotional pictures of this card originally listed it as a [[Beast]], even after it was confirmed to be a [[Warrior]].
  ** Though on page 371 and 372 of Shonen Jump Vol. 6, Issue 3, this card does have its Type listed as Warrior and not Beast.
  * This monster was the Sneak Preview Participation Card for ''[[Phantom Darkness]]''.
