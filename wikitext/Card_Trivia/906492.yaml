title: Card Trivia:Despia, Theater of the Branded
wikitext: |-
  {{Navigation}}

  * This theater appears in the artworks of "[[Dogmatikamacabre]]", "[[Dogmatikamatrix]]", "[[Decisive Battle of Golgonda]]", and "[[Dogmatika Alba Zoa]]".
  * The kanji ''Gekijō'' (劇城, "Drama-Castle") in this card's Japanese name is a homophone of ''Gekijō'' (劇場, "Theater").
  * The theater resembles the [https://kirby.fandom.com/wiki/Jambastion Jambastion] from Kirby Star Allies.
