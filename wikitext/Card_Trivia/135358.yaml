title: Card Trivia:Dark Highlander
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[King's Consonance]]".
  * This monster's name is likely a reference to the 1986 film ''[[wikipedia:Highlander (film)|Highlander]]''. 
  ** This monster's effect to prevent any player from [[Synchro Summon]]ing may be based on the film's iconic tagline, "There can be only one", since this usually means it is the only [[Synchro Monster]] on the field.
  * This monster appears to be an antithesis to "[[Seven Swords Warrior]]".
  ** Both are [[Level 7]] Synchro Monsters.
  ** Both monsters feature effects that center around the usage of [[Equip Card]]s to inflict damage to the opponent; this monster [[destroy]]s Equip Cards, while "Seven Swords Warrior" [[support]]s them.
  ** Both monsters are used by the main rivals of the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga; this monster is used by [[Jack Atlas (manga)|Jack Atlas]], while "Seven Swords Warrior" is used by his rival [[Yusei Fudo (manga)|Yusei Fudo]].
