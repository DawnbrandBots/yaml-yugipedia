title: Card Trivia:Speedroid Tri-Eyed Dice
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hi-Speed Re-Level]]".
  * This monster is based on a [[wikipedia:Four-sided die|four-sided die]], a pyramid-shaped die consisting of four triangular faces.
  ** This monster's name reflects its design, where its visible faces features the archaic design of an "eye", which is the informal term for the [[wikipedia:Pip (counting)|pip]] on a die.
  *** This monster's name also reflects its motif surrounding the number "3"; it features three visible faces and is surrounded by three glowing orbs, its [[Level]] is 3, and its [[original ATK]] is 300.
