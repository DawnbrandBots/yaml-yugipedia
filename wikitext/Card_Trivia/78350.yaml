title: Card Trivia:Ryu Kokki
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fuhma Wave]]".
  * This card is based on Ryūkotsuki, the final boss of the Japan-exclusive Famicom game, ''[[wikipedia:Getsu Fūma Den|Getsu Fūma Den]]''. During the final boss battle, Ryūkotsuki transforms into its final form, which is a gigantic dragon-like demon, depicted in this card's artwork.
  ** This card's effect of destroying a [[Spellcaster]] or [[Warrior]] monster is a reference to Ryūkotsuki's rivalry with Getsu Fūma, the protagonist of ''Getsu Fūma Den'' who is a warrior with the ability to use magic. Furthermore, Getsu Fūma has a [[Getsu Fuhma|card form]] with a similar effect that destroys [[Fiend]] and [[Zombie]] monsters, further referencing the rivalry between both characters.
  ** This card's English name is a mistranslation of this name. The character つ (''tsu'') was apparently mistaken for the ''[[wikipedia:Sokuon|sokuon]]'' (っ), resulting in its name being interpreted as りゅうこっき (''ryūkokki'').
