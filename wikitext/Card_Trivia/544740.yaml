title: Card Trivia:Shaddoll Construct
wikitext: |-
  {{Navigation}}

  * According to the ''[[Master Guide 5 card storylines#Knight of Tierra|Master Guide 5 card storylines]]'', this monster is the soul of "[[Gem-Knight Lapis]]" trapped within one of the vacuum tubes of the "[[Infernoid]]s" (possibly "[[Infernoid Sjette]]"). Meanwhile, the soulless body of "Lapis" was reborn as "[[El Shaddoll Construct]]".
  ** After most of her life energy was converted from the '[[Zefra|Sefiroth]]' system to the '[[Qli|Qliphoth]]' system, the soul of "Lapis" was revived as "[[Darktellarknight Batlamyus]]".
  ** This card has the same ATK as "Gem-Knight Lapis".
