title: Card Trivia:Nephilabyss, the Ogdoadic Overlord
wikitext: |-
  {{Navigation}}

  * This monster has the highest [[original DEF]] (3100) of all [[Reptile]] monsters.
  * This monster is named after the ancient Egyptian god [[wikipedia:Nefertem|Nefertem]], who was associated with the water-lily.
  ** This is the only "[[Ogdoadic]]" monster that is not named after the [[wikipedia:Ogdoad (Egyptian)|Ogdoad]].
