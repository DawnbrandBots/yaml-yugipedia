title: Card Trivia:Righty Driver
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Junk Repair Heal]]".
  * This monster's weapon is based on a [[wikipedia:List of screw drives#Frearson|Frearson screwdriver]], a [[wikipedia:Screw drive|screw drive]] with a sharp cross-shaped and a large-angled "V" shape.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|5D's|010|ref}}, specifically from the panel showing [[Righty Driver (manga)|this monster]] using its effect to [[Special Summon]] "[[Lefty Driver (manga)|Lefty Driver]]".
