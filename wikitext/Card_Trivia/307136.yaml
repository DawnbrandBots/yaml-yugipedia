title: 'Card Trivia:Number 18: Heraldry Patriarch'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Augmented Heraldry]]".
  * The number "18" appears on this monster's outer blade ring.
  * This monster's Japanese name is based on a "plain coat", a term used in [[wikipedia:Heraldry|heraldry]] to describe a [[wikipedia:Coat of arms|coat of arms]] without any distinguishing features.
