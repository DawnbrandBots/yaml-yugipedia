title: Card Trivia:Doll Monster Bear-Bear
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2021]]''.
  * This monster appears in the artworks of "[[Box of Friends]]", "[[Hatsugai]]", and "[[Doll Happiness]]".
  * This monster's Japanese name, "Kumacchi", features the honorific "-chi", which is used to describe someone or something in a "cuter" way.
  * This monster has [[Card evolutions|customized]] and re-customized forms: "[[Doll Monster Bear-Bear, Customized]]" and "[[Doll Monster Bear-Bear, Re-Customized]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|016|ref}}, specifically from the panel showing [[Doll Monster Bear-Bear (manga)|this monster]] being Summoned.
