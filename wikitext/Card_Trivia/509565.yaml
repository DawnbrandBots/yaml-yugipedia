title: Card Trivia:Des Kangaroo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bunch of Beast Bodies]]", "[[Continuous Destruction Punch]]", "[[Cross Counter]]", "[[Crossline Counter]]", "[[Destruction Punch]]", and "[[The Big Cattle Drive]]".
  ** "Destruction Punch", "Cross Counter" and "Continuous Destruction Punch" grant this monster's effect to other monsters, while "Cross Counter" enhances this monster's effect by doubling the [[battle damage]] dealt.
  * This monster's design and boxing outfit are on the [[wikipedia:Boxing kangaroo|boxing kangaroo]], the national symbol of [[wikipedia:Australia|Australia]], which is often depicted wearing actual boxing gloves in media.
  * The word "DEATH" can be seen on the back of the monster's vest, referencing its Japanese name, "Death Kangaroo". It was not edited out in the international artwork, possibly due to it being partially obscured; however, it is replaced with the word "DES" in the [[Card Artworks:Cross Counter|artwork]] of "Cross Counter".
  * This monster is part of a trend of [[Beast]] monsters based on marsupials whose name start with the word "Des", the others being "[[Des Koala]]", "[[Des Wombat]]", and "[[Desmanian Devil]]".
