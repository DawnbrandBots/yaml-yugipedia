title: Card Trivia:Kimeterasu the Divine Luna
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rising Luna Radiant Luster]]".
  ** The artwork "[[Divine Transformation]]" depicts "[[Kimeluna the Dark Shifter]]" transforming into this monster.
  * This monster's name is a portmanteau of "Kimeluna" (this monster's [[Fusion Material]]) and [[wikipedia:Amaterasu|Amaterasu]], the Shinto goddess of the Sun in Japanese mythology.
