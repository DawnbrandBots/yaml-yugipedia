  * This card's effect name in the [[Yu-Gi-Oh! VRAINS|anime]], ''Hell Howling'', is the same as the attack name of "[[Infernity Beast (anime)|Infernity Beast]]" in the [[Yu-Gi-Oh! 5D's|anime]].
  * This monster appears in the artwork of "[[Tindangle Jhrelth]]" (as a silhouette).
