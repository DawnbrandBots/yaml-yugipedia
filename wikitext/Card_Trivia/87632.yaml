title: Card Trivia:Water Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Infernal Punisher]]".
  * This monster has a younger counterpart: "[[Light Water Dragon]]".
  * This monster has an upgraded counterpart: "[[Water Dragon Cluster]]".
  * This monster also has an [[Bastion's fire dragon|unnamed fire counterpart]] seen in the first Japanese opening of the ''[[Yu-Gi-Oh! GX]]'' anime, "[[Fine Weather Rising Hallelujah]]", and in the first and second season versions of the English dubbed opening, "[[Get Your Game On! (song)|Get Your Game On!]]"
  * This is the [[signature card]] of [[Bastion Misawa]] in the ''Yu-Gi-Oh! GX'' anime.
  * This monster's [[Summoning condition]] via "[[Bonding - H2O]]" is based on the chemical structure of water (H<sub>2</sub>O), which requires two [[wikipedia:Hydrogen|hydrogen]] molecules and one [[wikipedia:Oxygen|oxygen]] molecule.
  ** This monster's [[original ATK]] (2800) is 1000 points higher than the [[ATK]] of "[[Oxygeddon]]" and its [[original DEF]] (2600) is 1000 points higher than the ATK of "[[Hydrogeddon]]", both of which are required to [[activate]] the effect of "Bonding - H2O".
  ** This monster's final effect to [[Special Summon]] two copies of "Oxygeddon" and one "Hydrogeddon" from the [[Graveyard]] references the chemical breakdown of water back into its base components, oxygen and hydrogen.
  * This monster's effect to make the ATK of [[FIRE]] and [[Pyro]] monsters 0 references the effect of water on fire, which is commonly used to extinguish flames.
  * This monster, "[[Valkyrion the Magna Warrior]]", "[[Meklord Astro Mekanikle]]", "[[Gate Guardian]]", "[[Flying Fortress SKY FIRE]]", and "[[Machina Force]]" are the only combined monsters in the ''[[OCG]]''/''[[TCG]]'' that are neither [[Fusion Monster]]s, nor require their component monsters to be [[banish]]ed to Summon it (i.e. the [[A-to-Z]] [[series]] and "[[Armityle the Chaos Phantasm]]").
  ** Also, the aforementioned monsters are [[Special Summon Monster]]s with a similar Summoning condition, which requires three of their component monsters to be sent to the Graveyard to Summon them.
