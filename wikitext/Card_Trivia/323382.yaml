title: Card Trivia:Tribute Burial
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card was used to [[Tribute Summon]] a monster that only required one [[Tribute]] in order to be [[Normal Summon]]ed ("[[Helpoemer]]"), whereas in the ''[[OCG]]''/''[[TCG]]'', this card only allows a monster that required two Tributes to be Summoned.
  ** In fact, the only monsters [[Yami Marik]] was shown to use in the anime that require exactly two Tributes ("[[Masked Beast Des Gardius (anime)|Masked Beast Des Gardius]]" and "[[Lava Golem (anime)|Lava Golem]]") are [[Special Summon Monster]]s in the ''OCG''/''TCG'' (i.e. they cannot be Normal Summoned at all).
