title: Card Trivia:Inzektor Dragonfly
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Final Inzektion]]" and "[[Zektrike Kou-ou]]".
  * This monster is based on a [[wikipedia:Damselfly|damselfly]].
  ** Despite this, this card's ''[[TCG]]'' name is based on a [[wikipedia:Dragonfly|dragonfly]], even though dragonflies and damselflies are two different insects.
  *** However, this monster's appearance looks more similar to a dragonfly than a damselfly, since adult damselflies rest their wings parallel to their bodies, while dragonflies' wings form a cross-like shape with their bodies.
  * This monster bears a resemblance to [[wikia:c:kamenrider:Daisuke Kazama|Kamen Rider Drake]] from ''[[wikipedia:Kamen Rider Kabuto|Kamen Rider Kabuto]]'', as they both use guns and are based on dragonfly-like bugs.
  * This card and "[[Inzektor Hornet]]" are among the first "[[Inzektor]]" cards to be [[Limited]].
