title: Card Trivia:Dragunity Couse
wikitext: |-
  {{Navigation}}

  * This monster is named after a ''couse'', a polearm fitted with - large, curved blade. Fittingly, this monster' design features a large, curved blade on its head.
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form combined with "[[Dragunity Senatus]]": "[[Dragunity Knight - Luin]]".
