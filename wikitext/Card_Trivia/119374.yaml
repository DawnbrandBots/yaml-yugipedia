title: Card Trivia:Thunder Unicorn
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Unicorn Beacon]]".
  * This is the first of the three [[Unicorn]] monsters ('''"Thunder Unicorn"''' > "[[Voltic Bicorn]]" > "[[Lightning Tricorn]]").
  ** This monster features one horn and 300 [[ATK]] less than "Voltic Bicorn", and two horns and 600 ATK less than "Lightning Tricorn".
  * This monsters features the lowest [[original ATK]] (2200) out of the Unicorn [[Synchro Monster]]s, but its effects to [[Special Summon]] and [[banish]] itself in the anime allows it to become more versatile. This reflects its owner, [[Andre]], the weakest member of [[Team Unicorn]] whose genius [[Duel]]ing style and flexible strategies make up for his weakness.
