title: Card Trivia:Dimension Equilibrium
wikitext: |-
  {{Navigation}}

  * The dimensional rifts in this card's artwork strongly resemble the dimensional rift appearing in the artwork of "[[Dimensional Fissure]]".
  * This card's video game effect [[activate|activating]] when a [[Beast]] monster is [[destroyed by battle]] by an opponent's monster is an alteration of its effect in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which activates when the opponent's monster is destroyed by battle by the opponent's attacking monster. In {{episode|5D's|099|ref}}, [[Andre]] activated this card when his "[[Thunder Unicorn (anime)|Thunder Unicorn]]" (a Beast monster) was destroyed by battle.
