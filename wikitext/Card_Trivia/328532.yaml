title: Card Trivia:Gimmick Puppet Scissor Arms
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Perform Puppet]]".
  ** This monster's scissor blades appears in the artwork of "[[Gimmick Puppet Gigantes Doll]]".
  * This monster is likely based on [[wikipedia:Edward Scissorhands|Edward Scissorhands]], the main character of the titular 1990 American fantasy romance film. Edward is an artificial humanoid who wears a tight-fit black leather outfit with studs and buckles, and features scissors in place of his unfinished hands.
  ** Despite this monster's name, however, its design features a scissor blade at each wrist where its hands would normally be.
