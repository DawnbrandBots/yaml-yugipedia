title: Card Trivia:Lavalval Ignis
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Xyz Startup!!]]''.
  * "Ignis" is based on the Latin word meaning "fire".
  ** This card's name is also likely a reference to igneous rocks, the cooled and hardened form of lava.
  *** Fittingly, according to the [[Duel Terminal]] storyline, this monster is created by combining "[[Laval Lakeside Lady]]" (a member of the [[FIRE]] "[[Laval]]" [[archetype]]) and "[[Gem-Knight Obsidian]]" (a [[Rock]] member of the [[EARTH]] "[[Gem-Knight]]" archetype). Both cards share the same [[Level]] (3) and were released in the ''[[Duel Terminal - Xyz Startup!!]]'' pack, along with the other archetype combinations featured in the same pack.
