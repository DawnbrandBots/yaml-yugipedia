title: Card Trivia:Shiranui Skillsaga Supremacy
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Shiranui Style Success]]", "[[Fateful Hour]]", and "[[Ghost Meets Girl - A Mayakashi's Manuscript]]".
  * This monster is "[[Shiranui Squire]]" after she fused the yokai magic of the "[[Mayakashi]]" with her sword.
  * In the artwork of "Ghost Meets Girl - A Mayakashi's Manuscript", this monster's staff is taken away from it by "[[Yuki-Onna, the Ice Mayakashi]]", who then becomes "[[Yuki-Onna, the Absolute Zero Mayakashi]]".
