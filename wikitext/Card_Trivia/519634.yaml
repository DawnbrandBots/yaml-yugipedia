title: Card Trivia:Destrudo the Lost Dragon's Frisson
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dirge of the Lost Dragon]]".
  * '''[[wikipedia:Destrudo|Destrudo]]''' is a term introduced by Italian psychoanalyst [[wikipedia:Edoardo Weiss|Edoardo Weiss]] in 1935 to denote the [[wikipedia:energy (psychological)|energy]] of the [[wikipedia:death drive|death instinct]], on the analogy of [[wikipedia:libido|libido]] and thus to cover the energy of the destructive impulse in Freudian psychology.
  ** '''[[wikipedia:Frisson|Frisson]]''' (French for 'shiver') is a [[wikipedia:sensation (psychology)|sensation]] somewhat like [[wikipedia:shivering|shivering]], usually caused by stimuli other than cold. It is typically expressed as an overwhelming emotional response combined with piloerection (goosebumps). Stimuli that produce a response are specific to the individual.
