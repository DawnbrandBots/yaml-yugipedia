title: Card Trivia:Gimmick Puppet Cattle Scream
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Brazen bull|brazen bull]], a torture and execution device where victims are roasted alive in a hollow bull made of bronze.
  ** The trumpet on this monster's "snout" is a reference to how the head of the bull was purportedly designed to convert the screams of the victim into the bellows of an infuriated bull.
  * The Japanese pronunciation of "Cattle" (カトル, ''Katoru'') uses the same katakana transcription as ''quatre'', the French word for "four".
  ** This is a reference to [[Quattro]], who uses the "[[Gimmick Puppet]]" [[archetype]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This monster has the highest [[original ATK]] (2000) of all [[Main Deck]] "Gimmick Puppet" monsters.
  ** This monster is tied with "[[Gimmick Puppet Des Troy]]" and "[[Gimmick Puppet Nightmare]]" for the highest [[original DEF]] (2000) of all Main Deck "Gimmick Puppet" monsters.
