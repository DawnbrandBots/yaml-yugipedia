  * This monster based on the ''[https://web.archive.org/web/20230224060625/http://www.misarin.net/youkai/frame/kaisetu/200141.htm ashinigurai]'', a mythological giant bird creature said to live in volcanic areas, collect souls from trees, and place them in a hole where it will tread on them.
