title: Card Trivia:Grinning Grave Virus
wikitext: |-
  {{Navigation}}

  * This card has several counterparts: "[[Crush Card Virus]]", "[[Deck Devastation Virus]]", "[[Eradicator Epidemic Virus]]", and "[[Full Force Virus]]".
  ** Of the "[[Virus]]" [[Trap]]s, this card represents the letter "G" in the alphabetical alliteration pattern.
  * The kanji 悪 on the viruses in this card's artwork means "wicked".
  * The Japanese name of "[[Ahrima, the Wicked Warden]]" refers to this card.
