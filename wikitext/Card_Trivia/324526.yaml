title: Card Trivia:D/D/D Flame King Genghis
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: Raging Masters]]''.
  * This card appears in the artwork of "[[Extra Recovery]]".
  * This monster's name is based on [[wikipedia:Genghis Khan|Genghis Khan]], the founder of the [[wikipedia:Mongol Empire|Mongol Empire]] who launched a series of military campaigns and conquered large parts of China and Central Asia in the early 13th century.
  ** This monster's Japanese name is based on "Temujin", Genghis Khan's birth name.
  * This is the first "[[D/D/D]]" [[Fusion Monster]].
  * This monster has an [[Card evolutions|upgraded]] form: "[[D/D/D Flame High King Genghis]]".
