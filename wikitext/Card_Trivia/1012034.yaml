title: Card Trivia:Floowandereeze & Eglen
wikitext: |-
  {{Navigation}}

  * This monster's name and design is based on the [[wikipedia:Bald eagle|bald eagle]], a species of bird found in [[wikipedia:North America|North America]].
  ** Fittingly, the background of this card's artwork depicts a city marked on North America on the map appearing in the artwork of "[[Floowandereeze and the Magnificent Map]]".
