title: Card Trivia:Black Jack the Shadow-Armored Knight
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the gambling card game, [[wikipedia:Blackjack|blackjack]], while its effects are based on the rules of the game.
  ** This monster's [[Excavate|excavation]] effect [[activate]]s when the opponent places a card in their [[Spell & Trap Zone]], but doesn't specifically mention if those cards are placed [[face-up]] or [[face-down]]. In this context, the opponent plays the role as the dealer in blackjack, who will deal cards to themselves and the players face-up or face-down.
  ** This monster's effect excavates the top cards of the player's [[Deck]] until they excavate a monster and [[equip]] it to this monster, allowing it to gain 300 [[ATK]]/[[DEF]] multiplied by that monster's [[Level]]. This references how in blackjack, the player will receive cards from the dealer with different face values, in which the player must have the highest combined face values to beat the dealer.
  *** Furthermore, if the total Levels of the monsters equipped to this monster are over 21, it is [[destroy]]ed, similar to how in blackjack, the player automatically loses if the combined face values of the player's cards is over 21.
