title: Card Trivia:Toon Mermaid
wikitext: |-
  {{Navigation}}

  * This monster appears on the back cover of "[[Toon World]]" in its first ''[[OCG]]''/''[[TCG]]'' artwork.
  ** It appears on the cover of "Toon World" in the artwork of "[[Shadow Toon]]" and "[[Toon Page-Flip]]".
  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Red Archery Girl]]".
  ** Unlike other Toon monsters, this monster does not keep part of its base counterpart's name, "Red Archery Girl", albeit in the ''[[TCG]]'' (the ''[[OCG]]'' does not have this distinction as the Japanese version of "Red Archery Girl" is "Bow Wielding Mermaid").
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster was edited to have more clothing, similar to how "Red Archery Girl" was edited in the ''TCG''.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|127|ref}}, specifically from the panel where [[Maximillion J. Pegasus (manga)|Pegasus]] changes [[Toon Mermaid (manga)|this monster]] to Attack Position.
