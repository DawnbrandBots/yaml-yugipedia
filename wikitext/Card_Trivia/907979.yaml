title: Card Trivia:Bio-Insect Armor
wikitext: |-
  {{Navigation}}

  [[File:InsectArmorwithLaserCannon-JP-Anime-DM-NC.png|thumb|right|250|"[[Basic Insect]]" equipped with "[[Insect Armor with Laser Cannon]]" in the anime]]

  * This is a [[Monster Card]] [[counterpart]] of "[[Insect Armor with Laser Cannon]]".
  ** This monster is based on "[[Basic Insect]]" [[equip]]ped with "Insect Armor with Laser Cannon" in {{chapter|Yu-Gi-Oh!|060|ref}} and {{episode|Yu-Gi-Oh!|002|ref}}.
  ** This monster's [[Level]] (5) and [[original ATK and DEF]] (1500/2000), and second effect are based on the depictions of "[[Insect Gun Armor]]" and "[[Laser Cannon Armor (manga)|Laser Cannon Armor]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, in which "Insect Gun Armor" has five [[Level Star]]s and "Laser Cannon Armor" has 1500 [[ATK]] and 2000 [[DEF]], even though both cards are [[Spell Card]]s, and were both cards are equipped to "Basic Insect" in the manga and anime.
  * This card is similar to the [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai Carddass]] card, "[[Armored Basic Insect with Laser Cannon]]", which also features "Basic Insect" equipped with "Insect Armor with Laser Cannon".

