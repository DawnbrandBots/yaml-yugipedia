title: Card Trivia:Gagaga Caesar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gagagadraw]]".
  * This monster's Japanese name, "Gagaga Kaiser", is based on "''[[wikipedia:Kaiser|kaiser]]''", the German title for "[[wikipedia:Emperor|emperor]]". 
  ** This monster's ''[[TCG]]'' name is based on "[[wikipedia:Caesar (title)|Caesar]]", the title used for an imperial character in the [[wikipedia:Roman Empire|Roman Empire]], which serves as the root for the German title, "''kaiser''".
  * This is the only [[Main Deck]] [[Warrior]] "[[Gagaga]]" monster to not feature an effect that involves [[Special Summon]]ing itself.
