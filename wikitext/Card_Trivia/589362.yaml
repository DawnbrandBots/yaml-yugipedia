title: Card Trivia:Witchcrafter Schmietta
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Witchcrafter Celebration]]", "[[Witchcrafter Collaboration]]", "[[Witchcrafter Confusion Confession]]", "[[Witchcrafter Holiday]]", "[[Witchcrafter Patronus]]", "[[Witchcrafter Pupils]]", and "[[Witchcrafter Walpurgis]]".
  * This monster's name is derived from "''schmied''", the German word for "blacksmith".
