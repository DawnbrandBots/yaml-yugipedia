title: Card Trivia:Elemental HERO Mudballman
wikitext: |-
  {{Navigation}}

  * This monster is the [[Fusion Monster|Fusion]] form of "[[Elemental HERO Clayman]]" and "[[Elemental HERO Bubbleman]]".
  ** This monster's [[Fusion Material]]s reference the two elements that make up mud: soil (represented by the [[EARTH]] [[Attribute]] "Clayman") and water (represented by the [[WATER]] Attribute "Bubbleman").
  * This is the only "[[Elemental HERO]]" Fusion Monster to not feature any additional effect, as well as the only [[Extra Deck]] [[Effect Monster]] to not have an effect, with its text being a [[Summoning condition]].
  * This monster is tied with "[[Elemental HERO Cosmo Neos]]" for the highest [[original DEF]] (3000) of all "Elemental HERO" monsters.
