title: Card Trivia:Salamangreat Salamandra
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster's name is based on a ''[[wikipedia:Salamandra|salamandra]]'', a genus of [[wikipedia:Salamander|salamander]], potentially ''[[wikipedia:Fire salamander|Salamandra salamandra]]'', the '''fire''' salamander, specifically; while visually it is based on the [[wikipedia:Frilled lizard|frilled lizard]].
  ** In myth and legend, salamanders are typically associated with fire, which fits with this monster's [[FIRE]] [[Attribute]].
