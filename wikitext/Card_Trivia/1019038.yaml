title: Card Trivia:Arahime the Manifested Mikanko
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded [[Ritual Monster|Ritual]] form of "[[Hu-Li the Jewel Mikanko]]" possessed by "[[Ohime the Manifested Mikanko]]".
  * This monster's name is a portmanteau of ''[[wikipedia:Arahitogami|Arahitogami]]'' (現人神, "living god") and ''[[wikipedia:Amaterasu|Ōhime]]'' (大日女, another name for ''Amaterasu''). This references that "Arahime" is an incarnation of the goddess ''Ōhime'' ("Ohime") in the form of a living human ("Hu-Li").
  * The fox motif of this monster is based on the ''[[wikipedia:Nine-tailed fox|kyūbiko]]'', a mythological nine-tailed [[wikipedia:Fox spirit|fox spirit]] that originated from Chinese folklore.
  * The bejeweled sword and bejeweled mirror of this monster are based on the three [[wikipedia:Imperial Regalia of Japan|Imperial Regalia of Japan]]:
  ** ''[[wikipedia:Kusanagi no Tsurugi|Kusanagi-no-Tsurugi]]'' (sword)
  ** ''[[wikipedia:Magatama#Yasakani no Magatama|Yasakani-no-Magatama]]'' (jewel)
  ** ''[[wikipedia:Yata no Kagami|Yata-no-Kagami]]'' (mirror)
