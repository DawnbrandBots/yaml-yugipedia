title: Card Trivia:Iceblade Token
wikitext: |-
  {{Navigation|mode=token}}

  * Four copies of this monster appear in the artworks of "[[Mirrorjade the Iceblade Dragon]]" and "[[Branded Sword]]".
  ** In both cases, they are depicted containing the shadows of the four dragon forms of "[[Fallen of Albaz]]" released before "Mirrorjade": "[[Titaniklad the Ash Dragon]]", "[[Brigrand the Glory Dragon]]", "[[Sprind the Irondash Dragon]]", and "[[Albion the Branded Dragon]]"/"[[Albion the Shrouded Dragon]]".
