title: Card Trivia:Lava Battleguard
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Battleguard Echoes]]", "[[Battleguard Rage]]", "[[Ego Boost]]", "[[Feast of the Wild LV5]]", "[[Skill Successor]]", and "[[Spell of the Ruler]]".
  * This monster has a [[recolored counterpart]]: "[[Swamp Battleguard]]".
  ** Both monsters bear a resemblance to [http://gatherer.wizards.com/pages/card/Details.aspx?multiverseid=109723 Sol'kanar the Swamp King] from ''[[wikipedia:Magic: The Gathering|Magic: The Gathering]]''.
