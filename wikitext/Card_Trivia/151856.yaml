title: 'Card Trivia:Number 17: Leviathan Dragon'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This is the [[cover card]] for ''[[Generation Force]]'', as well as one of the cover cards of ''[[Collectible Tins 2011 Wave 1]]'' and ''[[Starter Pack Volume 3]]''.
  ** This is the first cover card for a [[Booster pack]] to debut in the manga medium since "[[X-Head Cannon]]", "[[Y-Dragon Head]]", and "[[Z-Metal Tank]]" debuted in ''[[Advent of Union]]'', a gap of over nine years.
  ** This is the first [[WATER]] monster to be a cover card of a [[Core Booster|Core Booster pack]], as well as the first WATER monster to be a [[Holographic Rare]]/[[Ghost Rare]].
  ** This is the first [[Xyz Monster]] to be the cover card of a Booster pack.
  * This monster appears in the artworks of "[[Xyz Veil]]", "[[Number Return]]" and "[[Purge Ray]]".
  * The number "17" is located on this monster's right horn.
  * This monster has a non-"[[Number]]" [[retrained]] counterpart: "[[LeVirtue Dragon]]".
  * This is the first [[Dragon]] Xyz Monster.
  * This is the first "[[Number]]" monster revealed in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and manga.
  * "[[Number]]" monsters often take the form reflecting their owners and/or their original desires. In this monster's case, it represents its owner, [[Reginald Kastle|Reginald "Shark" Kastle]].
  ** The first portion of this monster's Japanese name, "Levice Dragon", is a portmanteau of the words "[[wikipedia:Leviathan|Leviathan]]" and "vice".
  *** The Leviathan is a mythical sea serpent that is depicted in the [[Wikipedia:Hebrew Bible|Hebrew Bible]], which reflects the theme of Shark's Deck, featuring monsters that resemble monstrous versions of sea creatures.
  **** The Leviathan is also known as an embodiment of chaos who devours the condemned when their lives are over. This, along with the definition of "vice" describing the quality of doing wrong, which reflects how Shark was initially a bully in the beginning of ''Yu-Gi-Oh! ZEXAL''.
  *** The word "vice" features a similar pronunciation to the German word for the color "white" (Weiß), which reflects how this monster is depicted with a completely white color scheme in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga. This connection is furthered by "[[Number C32: Shark Drake Veiss]]". 
  ** This monster's Dragon [[Type]] and effect to increase its own [[ATK]] reflects Shark's initial desire to become stronger and more powerful.
  * "[[Number 71: Rebarian Shark]]" appears to be a counterpart of this monster.
  ** Both monsters' numbers are reversed: This monster's number is "17", while "Rebarian Shark's" number is "71".
  ** Both monsters share the same [[Attribute]] (WATER), [[Rank]] (3), [[Type]] ([[Dragon]]), and required [[Xyz Material]]s (2 [[Level 3]] monsters).
  ** Both monsters' [[ATK]] and [[DEF]] values are swapped: This monster features an [[original ATK and DEF]] of 2000 ATK/0 DEF, while "Rebarian Shark" features an original ATK and DEF of 0 ATK/2000 DEF.
  ** Both monsters are associated with [[Reginald Kastle|Reginald "Shark" Kastle]] and/or his Barian alter-ego, Nash. This monster was used by Shark in ''[[Yu-Gi-Oh! ZEXAL]]'', while "Rebarian Shark" resembles the artwork of "[[Rank-Up-Magic - The Seventh One]]", which is used by Nash.
  * In the original Japanese version of {{episode|ZEXAL|001|ref}}, this monster's cry was similar to that of "[[Stardust Dragon]]". This has changed following its appearance in later episodes.
  * This card and "[[Blue-Eyes White Dragon]]" are the only monsters to be released in every single rarity, except for [[Starfoil Rare]].
