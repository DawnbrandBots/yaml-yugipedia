title: Card Trivia:Mirrorjade the Iceblade Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Alba Strike]]''/''[[Structure Deck: Albaz Strike]]''.
  * This monster appears in the artworks of "[[Branded Sword]]" and "[[Branded Fusion]]".
  * Four "[[Iceblade Token]]s" appear in this card's artwork. The silhouettes of four [[Albaz Dragon]]s also appear inside each of them.
  ** Top-left: "[[Titaniklad the Ash Dragon]]".
  ** Bottom-left: "[[Brigrand the Glory Dragon]]".
  ** Top-right: "[[Sprind the Irondash Dragon]]".
  ** Bottom-right: "[[Albion the Branded Dragon]]".
  *** Fittingly, the "Iceblade Tokens" have the same [[Level]], [[Type]], [[ATK]], and [[DEF]] as the above cards. They also have effects that trigger in the End Phase if sent to the GY, making them good Extra Deck targets for this monster's effect.
  * This monster is a "[[Swordsoul]]"-oriented empowered form of "[[Albion the Shrouded Dragon]]" ("[[Fallen of Albaz]]").
  ** According to ''[[The Valuable Book EX 2 card storylines]]'', "Albaz" was only able to awaken the power of the "Swordsoul" after "[[Swordsoul Supreme Sovereign - Chengying]]" and "[[Icejade Kosmochlor]]" used their last bit of strength to help him.
  ** The kanji ''Hiken'' (氷剣, lit. "ice sword") in this card's Japanese name is a combination of the Japanese names of the "[[Icejade]]" (氷水 ''Hisui'') and "Swordsoul" (相剣 ''Sōken'') archetypes.
  *** This card's Japanese name, "Mirrorjade" (ミラジェイド ''Mirajeido''), is also a reference to the "Icejade" monsters and their reflective crystals. It is also a pun on the word "mirage" (ミラージ ''Mirāji''), reflecting this monster's [[Wyrm]] [[Type]] ("Phantom Dragon" in Japanese) and its ability to Summon the 'mirages' of the past draconic forms of "Albaz" as "Iceblade Tokens".
  ** This card is a Wyrm monster, like the "Swordsoul" monsters.
  ** This monster is depicted in the artwork "Branded Sword" fighting against "[[Swordsoul Sinister Sovereign - Qixing Longyuan]]", which is a valid Fusion Material for this card, as it is a [[Synchro Monster]].
  ** This card's [[banish]]ing effect is similar to that of the "Swordsoul" Synchro Monsters.
  *** This card is the first Albaz Dragon that does not support its related archetype by name.
  ** This monster's armor and swords are made from the crystals of the "Icejades", which are also used to forge the swords of the "Swordsouls".
  *** The design of this monster's armor bears close similarities with the armors of the "Swordsouls", such as the shoulder armor of "[[Swordsoul of Taia]]" and the crown of "[[Swordsoul Supreme Sovereign - Chengying]]".
  * This card is the opposite counterpart of "[[Lubellion the Searing Dragon]]".
  ** Both have opposite ATK/DEF, as well as opposite Attributes: this card is [[DARK]], like the other [[Albaz Dragon|draconic forms]] of "Albaz", while "Lubellion" is [[LIGHT]], like the "[[Despia]]" [[Fusion Monster]]s).
  ** This monster is an empowered form of "[[Fallen of Albaz]]", while "Lubellion" is an empowered form of "[[Aluber the Jester of Despia]]".
  ** Both have higher ATK/DEF than the previous dragonic forms: this card has 500 more ATK/DEF than the other Albaz Dragons, while "Lubellion" has 1000 more DEF than "[[Masquerade the Blazing Dragon]]".
  ** This monster has an ice theme, while "Lubellion" has a fire theme.
  ** Both are depicted fighting in the artwork of "Branded Fusion".
  ** Both monsters have mirrored poses in their card artworks.
