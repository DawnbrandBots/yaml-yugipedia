title: Card Trivia:White Night Dragon
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Blue-Ice White Nights Dragon", is a pun on the name of "[[Blue-Eyes White Dragon]]".
  ** Both monsters share the same [[Level]] (8), [[Type]] ([[Dragon]]) and [[original ATK and DEF]] (3000/2500).
  * This monster's name is derived from a "[[wikipedia:Midnight sun|white night]]", a phenomenon occurring in the summer months in the [[wikipedia:Arctic Circle|Arctic]] and [[wikipedia:Antarctic Circle|Antarctic Circles]] which occurs during the summer months where the sun remains above the horizon, causing the local regions to experience six months of continuous daylight.
  ** This monster and "[[White Night Queen]]" reflect how their owner, [[Alexis Rhodes]] was brainwashed into the [[Society of Light]] in the ''[[Yu-Gi-Oh! GX]]'' anime, where she is also represented by the midnight sun in [[Sartorius]]' [[Arcana Force Tarot readings|Tarot readings]].
