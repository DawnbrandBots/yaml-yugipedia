title: Card Trivia:Smoke Mirror
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's name is a reference to [[wikipedia:Tezcatlipoca|Tezcatlipoca]], a central deity in [[wikipedia:Aztec religion|Aztec religion]], whose name is translated to "smoking mirror" in the [[wikipedia:Nahuatl|Nahuatl]] language.
  ** According to [[wikipedia:Aztec mythology|Aztec mythology]], Tezcatlipoca is represented by the obsidian mirror. Fittingly, the smoke-like design around the mirror frame in this card's artwork is colored black, which is a color associated with the volcanic glass material [[wikipedia:Obsidian|obsidian]].
