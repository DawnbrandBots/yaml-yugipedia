title: Card Trivia:Crystal Slicer
wikitext: |-
  {{Navigation|mode=otherGame}}

  * The person in this card's artwork resembles either [[wikipedia:Sasuke Uchiha|Sasuke]] or [[wikipedia:Itachi Uchiha|Itachi Uchiha]] from the ''[[wikipedia:Naruto|Naruto]]'' franchise.
  * This card's artwork features a stone being sliced in half, revealing a raw ruby, representing "[[Crystal Beast Ruby Carbuncle]]".
