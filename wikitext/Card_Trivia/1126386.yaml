title: Card Trivia:Vanquish Soul Hollie Sue
wikitext: |-
  {{Navigation}}

  * This monster resembles the "Puppet" archetype of fighting game characters (e.g. Miss Fortune from ''[[wikipedia:Skullgirls|Skullgirls]]'', Zato from ''[[wikipedia:Guilty Gear|Guilty Gear]]'', Rosalina & Luma from ''[[wikipedia:Super Smash Bros.|Super Smash Bros.]]'', etc.). Gameplay-wise, these characters bear the unique ability of controlling a separate entity from themselves for extending range and combos, among other utilities.
  ** This resemblance is seen in this monster's effects to essentially "[[control]]" either an opponent's monster on [[field]] or its owner's "[[Vanquish Soul]]" monster from [[Deck]] to fight on its side.
