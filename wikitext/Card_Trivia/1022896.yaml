title: Card Trivia:Raidraptor - Noir Lanius
wikitext: |-
  {{Navigation}}

  * This monster's name features the word "noir", which is the French word for the color "black".
  ** This monster's name, alongside the name of "[[Raidraptor - Bloom Vulture]]" released in ''[[Phantom Nightmare]]'', both reference the user of the "[[Raidraptor]]" [[archetype]] in ''[[Yu-Gi-Oh! ARC-V]]'', [[Shay Obsidian]], also known as "Syun Kurosaki" in the original Japanese version, whose surname is translated to "black blossom".
