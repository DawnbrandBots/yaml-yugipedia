title: Card Trivia:1-Up
wikitext: |-
  {{Navigation}}

  * "[[Mokey Mokey (Rush Duel)|Mokey Mokey]]" appears in this card's artwork.
  * This card is based on the concept of the [[wikipedia:Life (video games)|extra life]] in video games, which is often indicated by the message "1-UP".
  ** This card's name, artwork, and effect further reference this concept, as it can bring a '''[[Level 1 Monster Cards|Level 1]]''' [[Normal Monster]] '''up''' from the [[Graveyard]].
