title: Card Trivia:Dreadscythe Harvester
wikitext: |-
  {{Navigation}}

  * This card's ''[[OCG]]''/''[[TCG]]'' effect of gaining 500 [[ATK]] by [[Tribute|Tributing]] 1 [[Insect]] monster is based on its manga effect to Tribute a monster to gain its ATK. In the manga, this effect was only used in {{chapter|R|013|ref}}, when this card Tributed "[[Baby Mantis Token]]s" (an Insect [[Token]] with 500 ATK) for its effect.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|R|012|ref}}, specifically from the panel showing [[Dreadscythe Harvester (manga)|this monster]] being Summoned.
