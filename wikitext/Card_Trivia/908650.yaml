title: Card Trivia:War Rock Meteoragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2021]]''.
  * This monster appears in the artworks of "[[War Rock Dignity]]", "[[War Rock Generations]]", and "[[War Rock Medium]]".
  * This monster is an older version of "[[War Rock Fortia]]".
  ** This monster's armor appears to be based on the dragon-like monster in the artwork of "[[War Rock Ordeal]]".
