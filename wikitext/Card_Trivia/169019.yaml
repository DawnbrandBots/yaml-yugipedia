title: Card Trivia:Baby Tiragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Yuma]]''.
  * This monster appears in the artworks of "[[Release, Reverse, Burst]]" and "[[Ultra C]]".
  * This monster's Japanese name, "Baby Tragon" (ベビー・トラゴン, ''Bebī Toragon''), is a portmanteau of the words "tiger" ({{Ruby|虎|とら}}, ''tora'') and "dragon" (ドラゴン, ''doragon'').
  * This is the first [[Rank 1]] [[Xyz Monster]].
  * In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga and [[Yu-Gi-Oh! ZEXAL|anime]], this monster was used by [[Tokunosuke Hyori (manga)|Tokunosuke Hyori]] (and his anime counterpart, [[Flip Turner]]) as part of a deceitful [[Ante Duel]] strategy, where he would give his target this monster so he would use it in conjunction with the effect of "Ultra C" to [[Special Summon]] their Xyz Monster from their [[Extra Deck]] to his [[field]].
  ** In the manga, during Tokunosuke's flashback, this monster was originally depicted with a smiling expression in its artwork. When Tokunosuke became unsettling, this monster's expression turned into a terrified one. Later, when Tokunosuke uses this monster to trick people with deceitful strategy, this monster's expression became saddened; however, after Tokunosuke and [[Yuma Tsukumo (manga)|Yuma Tsukumo]] became friends, this monster's expression was changed back to its original smiling one.
  * In the ''Yu-Gi-Oh! ZEXAL'' anime, when this monster [[detach]]es an [[Xyz Material|Overlay Unit]] to [[activate]] its effect, it swallows it whole.
  ** During each of the Duels in which this monster appeared in the anime, it accompanied the [[Level 1]] monster it [[target]]ed with its [[direct attack]] effect. In {{episode|ZEXAL|006|ref}}, the diminutive "[[Stinging Swordsman (anime)|Stinging Swordsman]]" rides on this monster's head, and in {{episode|ZEXAL|009|ref}}, this monster rides on the shoulder of "[[Gagaga Magician (anime)|Gagaga Magician]]" (while the latter uses its effect to change its [[Level]] to 1).
