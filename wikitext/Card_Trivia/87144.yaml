title: Card Trivia:Clear Sacrifice
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Clear Vice Dragon]]" appears in this card's artwork.
  ** Fittingly, "Clear Vice Dragon" was the monster Summoned by this card's effect in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** In the ''Yu-Gi-Oh! GX'' anime, in both times that this card was used, "[[Clear Phantom (anime)|Clear Phantom]]" and "[[Clear Rage Golem (anime)|Clear Rage Golem]]" were the monsters [[banish]]ed to Summon "Clear Vice Dragon".
