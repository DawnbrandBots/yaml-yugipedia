title: Card Trivia:Bubble Rod
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The hand of "[[Elemental HERO Bubbleman]]" appears in this card's artwork.
  * This card is one of four [[Spell Cards]] that support "[[Elemental HERO Bubbleman]]", the other three being "[[Bubble Blaster]]", "[[Bubble Illusion]]", and "[[Bubble Shuffle]]".
