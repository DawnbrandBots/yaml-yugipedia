title: Card Trivia:Testudo erat Numen
wikitext: |-
  {{Navigation}}

  * "[[Forgotten Temple of the Deep]]" appears in this card's artwork.
  * This monster is likely based on the real-world mythology where [[wikipedia:Turtle|turtles]] and/or [[wikipedia:Tortoise|tortoises]] are depicted as divine beings.
  ** This monster's Japanese name is a pun on the words for "turtle" (かめ, ''kame'') and "God" (かみ, ''kami''). Most Japanese puns tend to be wordplays, even if the translated sentence makes little sense.
  *** This monster's ''[[TCG]]'' name is the Latin term for "Tortoise was God"; however, its German name is the only version to not be written in Latin form, instead being written as "Die Schildkröte war göttlich" ("The turtle was divine").
  * This monster has a [[counterpart]]: "[[Numen erat Testudo]]"
