title: Card Trivia:Buster Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Karma of the Destruction Swordsman]]" and "[[Prologue of the Destruction Swordsman]]".
  ** This monster in its original white color scheme also appears in the artwork of "[[Destruction Swordsman Fusion]]".
  * This monster is the adult form of "[[Buster Whelp of the Destruction Swordsman]]".
  ** The artwork of "Karma of the Destruction Swordsman" depicts "[[Buster Blader, the Destruction Swordmaster]]" being forced to slay this monster after "Buster Whelp" turned evil.
  ** The artwork of "Destruction Swordsman Fusion" depicts "Buster Blader" purifying this monster's dead body and [[Fusion Monster|fusing]] it into his armor, becoming "[[Buster Blader, the Dragon Destroyer Swordsman]]".
  ** Despite being a corrupted form of "Buster Whelp", this card's effects still support "Buster Blader", possibly reflecting that "Buster Whelp's" good soul remained intact within this monster, thanks to the bond with "Buster Blader".
