title: Card Trivia:Tidal, Dragon Ruler of Waterfalls
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragoroar]]".
  * This monster is one of the [[Cover card]]s of ''[[2013 Collectible Tins Wave 1]]''.
  * This monster is the older version of "[[Stream, Dragon Ruler of Droplets]]".
  * This monster has a "[[True Draco]]" counterpart: "[[True King Bahrastos, the Fathomer]]"
  ** Both are [[WATER]] monsters with similar Summoning conditions, effects that activate when they are affected by card effects in a certain way (being banished by effect for "Tidal", being destroyed by effect for "Bahrastos") to replace themselves with another monster, and have effects relating to WATER monsters.
