title: Card Trivia:Vic Viper T301
wikitext: |-
  {{Navigation}}

  * This monster is based on the protagonist's ship of the same name from [[Konami]]'s ''[[wikipedia:Gradius V|Gradius V]]'' video game.
  ** In stages 2 and 8 of Gradius V, the T301 from stage 8 encounters a giant battleship that must be destroyed by two ships at once, and travels back in time, bringing the battleship with it, to enlist the T301 from stage 2's help. This card's effect reflects this storyline, as the T301 is capable of suddenly arriving (Special Summoning itself during either player's turn) from the past (the GY) or the future (the hand) to support its fellow space fighters in destroying things they would otherwise be unable to (add its own ATK to other LIGHT Machines).
  * Four "[[Option Token]]s" appear in this card's artwork.
  * This monster appears in the artwork of "[[B.E.S. Blaster Cannon Core]]".
