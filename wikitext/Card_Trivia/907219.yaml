title: Card Trivia:Marincess Springirl
wikitext: |-
  {{Navigation}}

  * This monster is based on the ''[[wikipedia:Chrysiptera springeri|Chrysiptera springeri]]'', a species of fish that is commonly known as "Springer's Damsel".
  ** This card's name is also a reference to Blue Girl, one of [[Skye Zaizen]]'s account names and aliases in [[LINK VRAINS]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
