title: Card Trivia:Dinowrestler King T Wrextle
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dino Roar]]" and "[[Dino Sense]]".
  * This monster's name is a portmanteau of "''[[wikipedia:Tyrannosaurus|Tyrannosaurus rex]]''" and "[[wikipedia:Wrestling|wrestle]]"
  ** This monster's title as "king" references the scientific name of the ''Tyrannosaurus rex'', which means "tyrant lizard king".
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Dinowrestler Chimera T Wrextle]]".
