title: Card Trivia:Downerd Magician
wikitext: |-
  {{Navigation}}

  * This card is "[[Slacker Magician]]", being more [[wikipedia:academia|academic]], as opposed to being a "[[wikipedia:slacker|slacker]]". It has its [[ATK]] and [[DEF]] reversed and its [[Attribute]] changed from [[LIGHT]] to [[DARK]].
  ** The fact that this card can be [[Xyz Summon]]ed by using "Slacker Magician" in the [[Main Phase 2]] can imply that it wanted to slack off and not do battle, but finally decided to be productive later.
  ** In one of the Master Guide 4 storylines, "Slacker Magician", this magician's former self, began to slack off and stay at home all day. "[[Alchemic Magician]]", her best friend, became concerned about her and tried several times to inspire her to work again. One of those attempts can be seen in the artwork of "[[Xyz Tribalrivals]]". Eventually, "Alchemic" succeeded. In this card's artwork, "Downerd" is smiling as she works on the potions.
  *** In this story, "Alchemic" claims that "Downerd" is gloomier than before. However, this magician's zealous smile and the fact that several of her potions invigorate the user both prove "Alchemic" wrong.
  ** The change in Attribute could reference how she originally lounged around all day, but now stays up working all night.
  * "Downerd" in this card's name is a portmanteau of the words "downer" and "nerd".
  ** The "nerd" part of its name references the Japanese name of "Slacker Magician" that includes a portmanteau of the word "[[wikipedia:NEET|NEET]]" (which is often associated with being "[[wikipedia:nerd|nerdy]]").
