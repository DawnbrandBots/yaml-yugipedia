title: Card Trivia:Metallizing Parasite - Lunatite
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "''luna''", the Latin word for the [[wikipedia:Moon|Moon]].
  * This is a [[Monster Card]] [[counterpart]] of "[[Metalmorph]]", as indicated by the following:
  ** Both cards are members of the "[[Metalmorph (archetype)|Metalmorph]]" [[archetype]] due to their Japanese names sharing the word "Metallizing" (メタル{{Ruby|化|か}}, ''Metaru-ka'').
  ** This card's artwork depicts a metallic monster with two pairs of red eyes and a pair of fangs, similar to the one depicted in the artwork of "Metalmorph".
  ** This card's effect to [[equip]] itself to a monster and render the equipped monster unaffected by [[Spell Card]] effects is similar to [[Metalmorph (manga)|the manga version]] of "Metalmorph".
  * This monster has a [[counterpart]]: "[[Metallizing Parasite - Soltite]]".
  ** Both are [[Union monster]]s who share the same [[Attribute]] ([[WATER]]), [[Level]] (7), [[Type]] ([[Aqua]]), and [[original ATK and DEF]] (1000/500).
  ** Both monsters' names are respectively based on the Latin words for the Moon and the Sun.
  * This card's Spanish print in ''[[Dark Revelation Volume 1]]'' print features a typo, as the word "''Uni'''ó'''n''" is printed as "''Uni'''o'''n''", while the former word is used correctly in the card text.
