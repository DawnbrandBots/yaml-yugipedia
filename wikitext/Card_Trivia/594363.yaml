title: Card Trivia:Witchcrafter Holiday
wikitext: |-
  {{Navigation}}

  * "[[Witchcrafter Edel]]", "[[Witchcrafter Madame Verre]]", and "[[Witchcrafter Schmietta]]" appear in this card's artwork.
  * This card's Japanese name, "Witchcraft Sabotage", is a play on the Japanese verb "''saboru''", which means "to be truant" or "sabotage by slowness".
