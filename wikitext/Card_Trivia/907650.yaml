title: Card Trivia:Speedroid Wheel
wikitext: |-
  {{Navigation}}

  * "[[Speedroid Pachingo-Kart]]" appears in this card's artwork.
  * This card is based on a [[wikipedia:Roulette wheel|roulette wheel]], a horizontal, spinning wheel used in the game of [[wikipedia:Roulette|roulette]] that features colored and numbered slots for the ball to land in.
  ** This card's artwork features a racetrack styled into a roulette wheel and "Speedroid Pachingo-Kart" (who is based on the balls used in [[wikipedia:Pachinko|pachinko]]) is depicted drifting around the center of the track, similar to how a ball spins around a rotating roulette wheel until it lands in one of the slots.
  ** The red-and-black slots in the center of the racetrack features designs resembling [[Level]] stars, with the patterns similar to those of the [[wikipedia:Pip (counting)#Dice|pips]] on the surfaces of [[wikipedia:Dice|dice]], reflecting its [[die roll]] effect.
