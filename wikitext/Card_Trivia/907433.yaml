title: Card Trivia:Belsectacle Mani
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Security Hole]]".
  * This monster is named after [[wikipedia:Máni|Máni]], the god of the [[wikipedia:Moon|Moon]] in [[wikipedia:Germanic mythology|Germanic mythology]].
  * This monster has a [[LIGHT]] counterpart: "[[Sigurstate Sol]]".
  ** Both share the same [[Level]] (7), [[Type]] ([[Cyberse]]), and [[original DEF]] (0).
  ** Both are named after the deities of the [[wikipedia:Sun|Sun]] and the Moon from Germanic mythology.
  ** Both monsters are depicted with mirrored poses and wearing similar armor, albeit with swapped colors to correspond to their respective [[Attribute]].
