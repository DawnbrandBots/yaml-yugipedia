title: Card Trivia:Speedy Performer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amusi Cheer]]", "[[Companions!]]", "[[Ego Rhythm]]", and "[[Rhythmical Performer]]", as well as in both artworks of "[[Amusi Annoyance]]".
  ** "Amusi Performer" and "Rhythmical Performer" appear in this card's artwork, whom this monster serves as a member of the trio.
  * This card's effect reflects its 400 original ATK, the same amount of ATK which can be used to increase another monster's ATK.

  == See also ==
  * [[List of monsters that appeared in another card's artwork before their own debut]]
