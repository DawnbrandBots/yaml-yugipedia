title: Card Trivia:Hungry Burger
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Hungry Greeting]]" and "[[Takeout Attack]]".
  * A small Japanese flag can be seen on this monster's top bun.
  * This monster has a [[retrained]] counterpart: "[[Angry Burger]]".
  * This monster has a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' counterpart: "[[Hungreed Burger]]".
  * Like most early [[Ritual Monster|Ritual]] and [[Fusion Monster]]s, this card lacks a [[password]].
  * In ''Yu-Gi-Oh! Rush Duel'', this monster has 1900 [[DEF]].
  * According to ''The Valuable Book EX 4'', this monster is an item on the children's menu at the [[Nouvelles]]' restaurant.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's [[Type]] is [[List of Comic monsters|Comic]], allowing it to gain a power bonus from the [[Toon (terrain)|Toon terrain]].
