title: Card Trivia:Release from Stone
wikitext: |-
  {{Navigation}}

  * An alternate lower angle of "[[Canyon]]" appears in this card's artwork.
  * This card has multiple [[counterparts]]:
  ** [[DARK]]: "[[Escape from the Dark Dimension]]"
  ** [[Fairy]]: "[[Miraculous Descent]]"
  ** [[Psychic]]: "[[Brain Hazard]]"
  * This card bears similarities to "[[Miracle Dig]]", another card which depicts a light source buried underneath rock and features an effect that [[return]]s monsters from [[banish]]ment.
