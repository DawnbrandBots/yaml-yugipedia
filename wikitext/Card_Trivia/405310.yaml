title: Card Trivia:Predaplant Darlingtonia Cobra
wikitext: |-
  {{Navigation}}

  * This monster is a combination of the ''[[wikipedia:Darlingtonia californica|Darlingtonia californica]]'' plant and the [[wikipedia:Cobra|cobra]].
  ** This monster's design is a reference to the common names of the ''Darlingtonia californica'', which are the "cobra lily" or the "cobra plant".
