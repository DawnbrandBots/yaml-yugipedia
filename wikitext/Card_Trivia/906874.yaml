title: Card Trivia:Cyberdark Realm
wikitext: |-
  {{Navigation}}

  * "[[Cyberdark Cannon]]", "[[Cyberdark Claw]]", "[[Cyberdark Edge]]", "[[Cyberdark Horn]]", and "[[Cyberdark Keel]]" appear in this card's artwork.
  * This card's effect to allow "[[Cyberdark]]" monsters to equip monsters from the opponent's [[Graveyard]] is based on their anime effects, which allowed them to equip [[Dragon]] monsters from either Graveyard to themselves.
