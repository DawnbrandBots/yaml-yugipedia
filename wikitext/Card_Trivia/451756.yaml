title: Card Trivia:Kozmo Scaredy Lion
wikitext: |-
  {{Navigation}}

  * The robotic canine belonging to "[[Kozmo Farmgirl]]" appears in this card's artwork.
  * This card's English name is a pun on "scaredy cat", a nickname often used to describe a cowardly person.
  ** The パーヴィッド (Paviddo) part of this card's Japanese name is the word ''[[wiktionary:pavid|pavid]]'', meaning "fearful" or "timid", referencing the '''Cowardly''' Lion.
  * This monster is a combination of the [[wikipedia:Cowardly Lion|Cowardly Lion]] from ''[[wikipedia:The Wizard of Oz (1939 film)|The Wizard of Oz]]'' and [[wikipedia:Chewbacca|Chewbacca]] from ''[[wikipedia:Star Wars|Star Wars]]''.
  ** This card's artwork depicts this monster getting scared by "Kozmo Farmgirl's" robotic canine. This is a reference a scene in ''The Wizard of Oz'' where the Cowardly Lion ambushes [[wikipedia:Dorothy Gale|Dorothy Gale]], the [[wikipedia:Scarecrow (Oz)|Scarecrow]], and the [[wikipedia:Tin Woodman|Tin Man]]. When the Cowardly Lion attacked Dorothy's barking dog [[wikipedia:Toto (Oz)|Toto]] (whom "Kozmo Farmgirl's" robotic canine is base on), Dorothy slaps the Cowardly Lion, causing him to cry and make his fearful personality known.
