title: Card Trivia:Rainbow Rod
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Sky Fossil Cambroraster]]" and "[[Sky Fossil Lyrarapax]]" appear in this card's artwork.
  * This card is named after a [[wikipedia:Rod (optical phenomenon)|rod]], an optical phenomenon in photographic images and video recordings in which they capture a moving object within the frame that appear elongated, which is also known as "skyfish".
