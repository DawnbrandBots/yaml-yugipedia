title: Card Trivia:Celeb Rose Fabulous Magician
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster appears in the artworks of "[[Celeb Revelation]]" and "[[Rose in Doom]]".
  * This monster is a [[Celeb Rose]] [[counterpart]] of "[[Master of the Sevens Road]]".
  ** Both monsters share the same [[Level]] (9), [[Type]] ([[Spellcaster]]), and [[original ATK and DEF]] (3000/2100).
