title: Card Trivia:Pinch Hopper
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Insect Costume]]".
  * The card's name is based on a [[wikipedia:Pinch hitter|pinch hitter]], a [[wikipedia:Baseball|baseball player]] who acts as the substitute batter in place of a teammate.
  ** This card's Japanese name, "Pinch Hitter Batter" (代打バッター ''Daida Battā'') features the word "batter", which is phonetically similar to the Japanese word for "grasshopper" (バッタ ''Batta'').
  ** This card's effect further reflects the role of the pinch hitter in the game of baseball, which can be "substituted" with another [[Insect]] monster from the [[hand]] once it is sent from the player's [[field]] to the [[Graveyard]].
  * The French name of this card simply omits the space from its English name. Its name in French would be "Pinçon Sauteur".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|167|ref}}, specifically from the panel showing [[Pinch Hopper (manga)|this monster]] being Summoned.
