title: Card Trivia:Gagaga Child
wikitext: |-
  {{Navigation}}

  * This monster appears to be a younger version of "[[Gagaga Magician]]".
  * This is the only male "[[Gagaga]]" monster whose face isn't covered up.
  * This monster is depicted holding a [[wikipedia:ice pop|popsicle]], most likely based on the Garigari-kun popsicles in Japan. 
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'', when this monster [[activate]]s its [[Level]]-changing effect, he quickly eats the popsicle, which reveals the added Level stars on the popsicle stick to match the Level of the other "Gagaga" monster.
  * For reasons unknown, in the English dubbed version of the ''Yu-Gi-Oh! ZEXAL'' anime, [[Yuma Tsukumo]] never refers to this monster by name, opting to call him "this little fella" every time he is Summoned. In ''[[Yu-Gi-Oh! Duel Links]]'', however, [[Yuma and Astral|Yuma]] refers to this monster by name.
