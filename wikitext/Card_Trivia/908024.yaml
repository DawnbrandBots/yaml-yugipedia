title: Card Trivia:Gold Pride - Leon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2023]]''.
  * This monster appears in the artworks of "[[Gold Pride - It's Neck and Neck!]]", "[[Gold Pride - Pedal to the Metal!]]", "[[Gold Pride - Start Your Engines!]]", "[[Gold Pride - That Came Out of Nowhere!]]", and "[[Gold Pride - The Crowd Goes Wild!]]".
  * This monster has an upgraded form: "[[Gold Pride - Star Leon]]".
