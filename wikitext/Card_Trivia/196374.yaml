title: Card Trivia:Evoltile Elginero
wikitext: |-
  {{Navigation}}

  * This card is the second TCG exclusive "[[Evoltile]]" card, first being "[[Evoltile Najasho]]".
  * This card is based on the early tetrapod ''[[wikipedia:Elginerpeton|Elginerpeton]].''
  * Also, this card searches out other "Evoltile" Monsters, giving further proof of this theory.
  ** This card is the second "Evoltile" monster that can't [[Special Summon]] an "[[Evolsaur]]" monster, the first being "[[Evoltile Lagosucho]]".
  * This card is a small version of "[[Primordial Soup]]".
  * This card resembles "[[Petit Dragon]]", since they both have the same level.
