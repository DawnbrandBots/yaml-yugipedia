title: Card Trivia:Standoff
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The man wearing the green ''kimono'' in this card's artwork appears in the artwork of "[[Reversal Sword]]".
  ** The man wielding a boat oar in this card's artwork is likely based on [[wikipedia:Miyamoto Musashi|Miyamoto Musashi]], a Japanese swordsman who used a wooden sword fashioned from a boat oar to battle and kill the swordsman, [[wikipedia:Sasaki Kojirō|Sasaki Kojirō]].
