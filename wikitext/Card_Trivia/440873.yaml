title: Card Trivia:Lunalight Wolf
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Lunalight Masquerade]]".
  * This is the only card in "[[Lunalight]]" [[archetype]] to be censored.
  * This card and "[[Lunalight Tiger]]" have the following differences from the other "Lunalight" monsters:
  ** They are the only members that are [[Pendulum Monster]]s.
  ** They are the only members that are not [[DARK]] [[Attribute]].
