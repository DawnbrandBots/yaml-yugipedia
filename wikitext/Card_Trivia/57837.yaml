title: Card Trivia:Blackwing - Gale the Whirlwind
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Edition Volume 3]]''.
  * This monster appears in the artworks of  "[[Black-Winged Strafe]]", "[[Blackwing - Backlash]]", "[[Blackwing - Delta Union]]", "[[Delta Crow - Anti Reverse]]", "[[Fake Feather]]", and "[[Raptor Wing Strike]]".
  * This monster's name and title are based on two types of powerful winds: a [[wikipedia:Gale|gale]] (a very strong [[wikipedia:wind|wind]]) and a [[wikipedia:Whirlwind|whirlwind]] (a powerful vortex of wind).
  * This is the first "[[Blackwing]]" [[Tuner monster]] to be Summoned in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This monster shares the same [[Attribute]] ([[DARK]]), [[Level]] (3), and [[ATK]] (1300) as "[[Junk Synchron]]" and "[[Dark Resonator]]".
  ** Fittingly, all three are the first [[Tuner monster]]s used by [[Crow Hogan]], [[Yusei Fudo]], and [[Jack Atlas]], respectively, in the ''Yu-Gi-Oh! 5D's'' anime.
  * This is one of the few "Blackwing" monsters that does not feature any black feathers in its design, along with "[[Blackwing - Breeze the Zephyr]]" and "[[Blackwing - Chinook the Snow Blast]]".
  * This is the first "Blackwing" monster to become [[Limited]].
