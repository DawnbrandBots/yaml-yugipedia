title: Card Trivia:Blackland Fire Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Stage of Destiny]]".
  ** A discolored version of this monster appears in the artwork of "[[Flying Dragon Whirl]]".
  * This is the first monster to be Summoned by [[Yugi Mutou (manga)|Yugi Mutou]] (and his [[Yugi Muto|anime counterpart]]) in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]].
  ** This is also the first [[Dragon]] monster to appear in the anime.
  ** This is also the first monster to declare an attack, as well as the first monster to [[destroy]] a monster by battle in the anime.
  * This monster's pose in its ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|009|ref}} showing [[Blackland Fire Dragon (manga)|this monster]] being Summoned.
