title: Card Trivia:Soul of the Supreme Celestial King
wikitext: |-
  {{Navigation}}

  * "[[Supreme King Gate Magician]]" appears in this card's artwork.
  ** This card's artwork references the multiple instances in the ''[[Yu-Gi-Oh! ARC-V]]'' anime where "[[Astrograph Sorcerer (anime)|Astrograph Sorcerer]]" created a magical circular pattern, which preceded the [[Unity Summon]] of "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]".
  *** This card's effect is based on the anime effect of "Astrograph Sorcerer", which can [[Special Summon]] "Supreme King Z-ARC" from the [[Extra Deck]] by [[Tribute|Tributing]] itself and [[banish]]ing the [[Four Dimensional Dragons]] ("[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]", "[[Dark Rebellion Xyz Dragon (anime)|Dark Rebellion Xyz Dragon]]", "[[Clear Wing Synchro Dragon (anime)|Clear Wing Synchro Dragon]]", and "[[Starving Venom Fusion Dragon (anime)|Starving Venom Fusion Dragon]]") from the [[Deck]], Extra Deck, [[field]], and/or [[Graveyard]].
  * This is the only card that allows the player to use monsters as [[Fusion Material]]s from five different places: the [[hand]], field, Deck, Extra Deck,  and/or Graveyard.
