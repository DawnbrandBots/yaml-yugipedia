title: Card Trivia:Ghost Charon, the Underworld Boatman
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Charon (mythology)|Charon]], the boatman of [[wikipedia:Greek underworld|Hades, the Greek underworld]] who ferries the deceased souls of those given funeral rites across the rivers [[wikipedia:Styx|Styx]] and [[wikipedia:Acheron|Acheron]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' effects are based on its appearance in {{chapter|5D's|049|ref}} when it uses itself and "[[Underworld Dragon Dragonecro (manga)|Underworld Dragon Dragonecro]]" (a [[Fusion Monster]]) to [[Synchro Summon]] the [[Dragon]] [[Synchro Monster]], "[[Underworld Flood Dragon Dragocutos (manga)|Underworld Flood Dragon Dragocutos]]" (whose [[Level]] is the combined total of both monsters' Levels used to Summon it).
  ** This card's ''OCG''/''TCG'' artwork is taken from the same chapter, specifically from the panel showing [[Hellfire Boat Guard - Ghost Charon|this monster]] being Summoned.
