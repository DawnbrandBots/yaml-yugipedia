title: Card Trivia:Beast of Forest Destruction
wikitext: |-
  {{Navigation|mode=Tip}}

  * This card was originally intended to be included in the [[Yu-Gi-Oh! Duel Monsters (video game)|''Yu-Gi-Oh! Duel Monsters'' video game]], as it was shown in the 1998 #36 issue of ''[[Weekly Shōnen Jump]]'' as one of the winners for its card-design contest. However, the card was ultimately not included in the video game when it was released. This is likely because the original artwork submission for this card was plagiarized from the artwork of "{{Fandom|moncolle|Chimaera}}", a card from the ''[[wikipedia:Monster Collection|Monster Collection]]'' trading card game (with "Chimaera" first being printed in the trading card game's original 362-card base set, released in 1997).
