title: Card Trivia:Darkness Samsara
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is named after "[[wikipedia:Saṃsāra|Saṃsāra]]", a word that describes the cycle of life in [[wikipedia:Sanskrit|Sanskrit]]. "Saṃsāra" also contains the katakana for the number "3" (サン, ''san''), reflecting [[Terza Flatwood]]'s naming conventions of referencing the number "3" in her [[Deck]].
