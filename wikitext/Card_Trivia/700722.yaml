title: Card Trivia:Gravedigger's Trap Hole
wikitext: |-
  {{Navigation}}

  * "[[Gravedigger Ghoul]]", the green arm from "[[Called by the Grave]]", and the two creatures from "[[The Shallow Grave]]" appear in this card's artwork.
  ** The two creatures from "The Shallow Grave" and "[[The Deep Grave]]" appear to have just emerged from a grave, with the green dragon having just finished dragging the former creature out from the deep hole depicted in "The Deep Grave".
  * This card's Japanese name, "Grave Hole" (墓穴ホール ''Boketsu Hōru'') is a pun on the phrase ''mizukara no boketsu wo hōru'' (lit. "digging your own grave").
  * This card's effect of inflicting 2000 damage is a reference to "[[Graverobber]]".
