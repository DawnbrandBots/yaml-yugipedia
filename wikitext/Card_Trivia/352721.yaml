title: Card Trivia:Mistaken Arrest
wikitext: |-
  {{Navigation}}

  * The red fiend from "[[Delinquent Duo]]", the angel from "[[Graceful Charity]]", "[[Pot of Greed]]", and "[[Sangan]]" appear in this card's artwork.
  * This card's artwork takes place after the events of "[[Shared Ride]]".
  ** Referencing the fact that the above cards (except for "Shared Ride") were on the [[Forbidden]] list at the time of this card's release, the scene depicts the fiend driver being arrested for having an illegal item ("Pot of Greed"); the angel and "Sangan" are being arrested as well, hence this card's name.
  *** This is continued in the card artwork of "[[Mistaken Accusation]]", though "Sangan" is the only monster from this card's artwork to make an appearance.
  ** The blue-skinned police officer appears again in the artwork of "[[Summon Gate]]".
