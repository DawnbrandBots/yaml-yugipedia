title: Card Trivia:Orea, the Sylvan High Arbiter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Sylvan Charity]]" and "[[Sylvan Sagequoia]]".
  * "[[Mount Sylvania]]" appears in this card's artwork.
  * This monster is based on ''[[wikipedia:Vermilion Bird|Suzaku]]'', the guardian of the South, one of the Four Symbols of the Chinese constellations.
