title: Card Trivia:Ritual Beast Ulti-Cannahawk
wikitext: |-
  {{Navigation}}

  * This monster is the combined [[Fusion Monster|Fusion]] form of "[[Ritual Beast Tamer Elder]]" and "[[Spiritual Beast Cannahawk]]".
  ** This card's alternate artwork depicts this monster as the combined form of "Cannahawk" and "[[Spiritual Beast Tamer Winda]]".
  * This monster appears in the artwork of "[[Ritual Beast Steeds]]".
  * Reflecting the fact that "Ritual Beast Tamer Elder" is an elder version of "[[Kamui, Hope of Gusto]]", the [[ATK]] of "Cannahawk" is the same as the ATK of "[[Daigusto Falcos]]", and is shown in its artwork in a mirrored position as "Falcos".
  * This monster was the first and the only "[[Ritual Beast]]" card to be [[Limited]] (as of [[November 2015 Lists]] in TCG). It has been [[Unlimited]] as per [[June 2020 Lists]].
