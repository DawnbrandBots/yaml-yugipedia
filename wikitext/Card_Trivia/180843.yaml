title: Card Trivia:Gusto Griffin
wikitext: |-
  {{Navigation}}

  * This card is based on the mythological tale of the beast which is part-lion and part-eagle the [[wikipedia:Griffin|griffin]].
  * This card slightly resembles "[[Gallis the Star Beast]]"; both are griffins (or griffin-like creatures), both are wearing armor with symbols on the chest, both have 800 [[ATK]], and their poses are similar.
