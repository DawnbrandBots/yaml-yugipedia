title: Card Trivia:Odd-Eyes Saber Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Entry Deck VS]]''/''[[2-Player Starter Deck: Yuya & Declan]]'' and ''[[Duelist Entry Deck VS: Saber Force]]''/''[[Saber Force Starter Deck]]''.
  * This monster is an [[Card evolutions|upgraded]] [[LIGHT]] form of "[[Odd-Eyes Dragon]]".
  ** Fittingly, this monster has a yellow color scheme, which is the same color scheme as the LIGHT [[Attribute]].
  * This monster has a [[DARK]] [[counterpart]]: "[[Odd-Eyes Wizard Dragon]]".
  ** Both are depicted with mirrored poses in their card artworks.
  ** Both can be [[Special Summon]]ed from the [[hand]] by [[Tributing]] a monster with the same Attribute and [[send]]ing "Odd-Eyes Dragon" from the hand, [[Deck]], or [[field]] to the [[Graveyard]].
  * This is the first LIGHT "[[Odd-Eyes]]" monster.
  * This is the only [[Four Dimensional Dragons#"Odd-Eyes Dragon's" elemental evolutions|elemental upgraded form]] of "Odd-Eyes Dragon" to appear in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
