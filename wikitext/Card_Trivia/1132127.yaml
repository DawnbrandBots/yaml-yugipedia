title: Card Trivia:R.B. Ga10 Driller
wikitext: |-
  {{Navigation}}

  * This monster (equipped to "[[R.B. The Brute Blues]]") appears in the artwork of "[[R.B. Stage Landing]]".
  * "Ga10" may be a word play on "''gaten''" (穿天), which translates to "heaven piercing", with this monster's full name being "R.B. Heaven-Piercing Driller" in that case. It may also be a play on the word "gaia" (Greek for earth), in reference to the EARTH Attribute of the "Ga10" monsters.
