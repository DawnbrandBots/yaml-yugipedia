title: Card Trivia:Harpie Cielo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Rush Duel Card Game Gum]]''.
  * This monster's name is derived from "''cielo''", the Italian word for "sky".
  * This monster has an [[counterpart|upgraded]] [[Fusion Monster|Fusion]] counterpart: "[[Harpie Cielo Light Skirt]]".
