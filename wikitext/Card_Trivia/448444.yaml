title: Card Trivia:F.A. Downforce
wikitext: |-
  {{Navigation}}

  * "[[F.A. Sonic Meister]]" appears in this card's artwork.
  * [[wikipedia:Downforce|Downforce]] refers to the downwards [[wikipedia:Lift force|lift force]] generated by a vehicle's aerodynamic features, which gives an automobile's tires more grip on the surface it's in contact with.
  ** This is reflected in this card's artwork, as the downforce allows "F.A. Sonic Meister" to travel across the ceiling of the tunnel.
