title: Card Trivia:Supreme Machine Magnum Overlord (L)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maximum Ultra Enhancement Pack]]''.
  * This monster appears in the artwork of "[[Cranked to Ten!!]]" in [[Maximum Mode]] (together with "[[Supreme Machine Magnum Overlord]]" and "[[Supreme Machine Magnum Overlord (R)|Supreme Machine Magnum Overlord [R]]]").
  * This monster has three [[counterpart]]s: "[[Supreme Beasteam Magnum Overlord (L)|Supreme Beasteam Magnum Overlord [L]]]", "[[Supreme Railartillery Magnum Overlord (L)|Supreme Railartillery Magnum Overlord [L]]]", and "[[Supreme Skystream Magnum Overlord (L)|Supreme Skystream Magnum Overlord [L]]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (4), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (800/0) with the above-mentioned monsters.
