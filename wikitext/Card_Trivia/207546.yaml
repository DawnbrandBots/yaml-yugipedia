title: Card Trivia:Black Illusion
wikitext: |-
  {{Navigation}}

  * The staff wielded by "[[Dark Magician]]" appears in this card's artwork.
  * This shield features the letters "B" and "M" which stands for "Black Magician", the Japanese name of "Dark Magician".
  ** This card's international release features the letter "D" replacing the letter "B" to easily identify the initials of "Dark Magician".
