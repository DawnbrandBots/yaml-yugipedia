title: Card Trivia:Pot of Riches
wikitext: |-
  {{Navigation}}

  * This pot appears in the artwork of "[[Extra Buck]]".
  ** This pot makes up half each of "[[Pot of Extravagance]]" and "[[Pot of Prosperity]]", with the other halves being "[[Pot of Greed]]" and "[[Pot of Generosity]]", respectively.
