title: Card Trivia:Where Arf Thou?
wikitext: |-
  {{Navigation}}

  * "[[Outstanding Dog Marron]]" appears in this card's artwork.
  ** The artwork for "Outstanding Dog Marron" appears on the missing dog posters.
  * The person in this card's artwork appears to be the owner of "Outstanding Dog Marron", still searching for him (and unaware that "Marron" is a few feet behind him).
  * This card's Japanese name is a pun on "wan", the Japanese onomatopoeia for a dog's bark, and "One", the [[Level]] of monsters affected by this card, including "Outstanding Dog Marron": both "wan" and "one" are written out in Japanese as 「ワン」 (''wan''). The owner is also calling out for "Marron" by the nickname "Wan-chan" (or "Doggy").
  ** This card's ''[[TCG]]'' name is a pun on the line, "Wherefore art thou Romeo?" from [[wikipedia:William Shakespeare|William Shakespeare's]] tragedy, ''[[wikipedia:Romeo and Juliet|Romeo and Juliet]]''.
