title: Card Trivia:Metal Coat
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's artwork depicts the man wearing the metal coat being protected by an invisible forcefield, which causes the three bolts of lightning to be deflected and neutralized.
  ** This reflects this card's effect to protect the [[equip]]ped monster from being [[destroy]]ed by card effects, as lightning is associated with cards with monster destruction effects, such as "[[Raigeki]]" or "[[Lightning Vortex]]".
  * When this card first appeared in the anime, it was missing the first two and a half sentences of its effect text. This was corrected in the DVD version.
