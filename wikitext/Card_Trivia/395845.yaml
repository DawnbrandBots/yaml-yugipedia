title: Card Trivia:Deskbot 006
wikitext: |-
  {{Navigation}}

  * Being a "[[Deskbot]]" monster, this monster is made up of various objects that can be found on/in desks, specifically with a [[wikipedia:Fastener|fastener]] theme:
  ** 2 [[wikipedia:Stapler|staplers]] (attached behind its shoulders)
  ** 2 [[wikipedia:Drawing pin|drawing pins / thumb tacks]] (attached to its knees)
  ** 2 containers of drawing pins with different heads, flat and spherical (attached to its waist)
  ** 2 [[wikipedia:Binder clip|binder clips]] (its feet)
  ** 2 [[wikipedia:Bulldog clip|bulldog clips]] (armoring its lower legs)
  ** A [[wikipedia:Hole punch|hole punch]] with a protruding paper guide (as its shield in its left hand)
  ** A [[wikipedia:Chopsticks|chopstick]] [[wikipedia:Rubber band gun|rubber band gun]] with a loaded [[wikipedia:Rubber band|rubber band]] (in its right hand)
  ** [[wikipedia:Paper clip|Paper clip]]s clinging to the sides of a [[wikipedia:Magnetism|magnetic]] paper clip holder (on its chest)
  ** 2 drawing pin cylindrical heads (attached on the left and right sides of its helmet)
  ** A [[wikipedia:Nail (fastener)|nail]]-pulling tool (covering its groin)
  ** This monster's fastener theme is also reinforced by the following details:
  *** Two symbols are visible on this monster's chest that resemble [[wikipedia:Staple (fastener)|paper staples]].
  *** A digital visual of 3 separate papers stacked over each other is present on this monster's visor, with the implied contextual need for fastening.
  * The number 006 can be seen on this monster's helmet.
  * This monster appears in the artwork of "[[Deskbot Jet]]", seen on the lower platform, near the frontal exhausts.
