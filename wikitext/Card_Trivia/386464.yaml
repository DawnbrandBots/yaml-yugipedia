title: Card Trivia:Premature Return
wikitext: |-
  {{Navigation}}

  * "[[Coach Goblin]]" (or "[[Second Goblin]]"), "[[D.D. Crazy Beast]]", "[[Esper Girl]]", "[[Gigobyte]]", and "[[Knight Day Grepher]]" appear in this card's artwork.
  ** The appearance of "Gigobyte" is based on the artwork of "[[Dimensional Prison]]", where "[[Gagagigo]]" is shown being [[banish]]ed.
  ** The appearance of "Coach Goblin" (or "Second Goblin") and "D.D. Crazy Beast" refers to the art-based storyline involving both monsters that begins in the artwork of "D.D. Crazy Beast", where it pulls the "Goblin" into the [[Different Dimension]].
  ** The appearance of "Esper Girl" refers to its effect that activates if it is [[Special Summoned]] while banished.
  ** The appearance of "Knight Day Grepher" refers its appearance in the artwork of "[[Different Dimension Encounter]]", a card with an effect that Special Summons banished monsters.
  *** It may also be based on the appearance of "[[Warrior Dai Grepher]]", which "Knight Day Grepher" is a counterpart of, alongside "[[D.D. Warrior Lady]]" in the artwork various cards, including some "Different Dimension"-related ones.
  * This card's artwork parodies those of "[[Return from the Different Dimension]]". It also closely resembles the artwork of "[[Weed Out]]", which similarly parodies that card.
