title: Card Trivia:PSY-Framegear Beta
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[PSY-Frame Circuit]]".
  * "[[PSY-Framelord Zeta]]" is this monster and "[[PSY-Framegear Alpha]]" equipped to "[[PSY-Frame Driver]]", while "[[PSY-Framelord Omega]]" also has both "PSY-Framegears" equipped, but with the addition of "[[PSY-Framegear Gamma]]", "[[PSY-Framegear Delta]]" and "[[PSY-Framegear Epsilon]]".
