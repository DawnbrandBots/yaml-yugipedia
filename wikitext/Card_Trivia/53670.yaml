title: Card Trivia:Forced Requisition
wikitext: |-
  {{Navigation}}

  * This card is the opposite counterpart of "[[Appropriate]]".
  * This card artwork looks very similar in situation to "[[Confiscation]]", except that in this context, the lady is not as desperate.
  * The Spanish lore of this card has an error, as it says "''n'''u'''mero''" instead of "''n'''ú'''mero''" ("''number''").
