title: Card Trivia:Fantastical Dragon Phantazmay
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Prismatic Art Collection]]''.
  * This monster's name is a portmanteau of the words "phantasm" and "[[wikipedia:Slavic dragon|zmei]]", a dragon in European mythology.
  * This monster is a [[counterpart]] of "[[Chaos Dragon Levianeer]]", "[[Iron Dragon Tiamaton]]", "[[Mana Dragon Zirnitron]]", and "[[Omni Dragon Brotaur]]".
  ** All of them are [[DARK]] [[Dragon]] monsters based on mythological dragons.
