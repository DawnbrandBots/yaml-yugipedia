title: Card Trivia:D/D/D Chaos King Apocalypse
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Pendulum Domination]]''/''[[Pendulum Domination Structure Deck]]''.
  * This monster's Japanese title, "Ultimate Wisdom King" ({{Ruby|極|きょく}}{{Ruby|智|ち}}{{Ruby|王|おう}}, ''Kyokuchiō'') is a pun on the Japanese term for "bureau director" ({{Ruby|局|きょく}}{{Ruby|長|ちょう}}, ''Kyokuchō''), a person from a group of managers who leads or supervises a particular area of a company.
