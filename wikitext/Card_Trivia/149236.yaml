title: Card Trivia:Catapult Warrior
wikitext: |-
  {{Navigation}}

  * In the [[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's manga]], when this card debuted in {{chapter|5D's|016|ref}}, it featured 2000 [[ATK]]; however, when it later appeared again during {{chapter|5D's|045|ref}}, its ATK was changed to 1000, just like in the ''[[OCG]]''/''[[TCG]]''.
  * This card's effect is similar to another catapult-themed monster: "[[Catapult Turtle]]", except this card's effect is restricted to [[Tribute|Tributing]] "[[Junk]]" monsters and deals damage equal to that monster's original ATK, rather than just half its ATK.
