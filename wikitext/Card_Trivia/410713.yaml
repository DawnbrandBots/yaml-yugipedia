title: Card Trivia:Chaos Ancient Gear Giant
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ancient Gear Scrap Fusion]]" and "[[Battle Royal Mode - Joining]]".
  * This monster is a [[Fusion Monster|Fusion]] of "[[Ancient Gear Hunting Hound]]", "[[Double Ancient Gear Hunting Hound]]", "[[Triple Ancient Gear Hunting Hound]]", and "[[Ultimate Ancient Gear Hunting Hound]]".
  ** This monster's [[Level]] (10) reflects the ten total dog heads of "Hunting Hound" and its Fusion [[Card evolutions|upgraded]] forms, which serve as this monster's feet, knees, arms, shoulders, chest, and head.
  ** This monster's ''[[OCG]]''/''[[TCG]]'' [[Fusion Material]]s (4 "[[Ancient Gear]]" monsters) reference the four aforementioned monsters, which were required to [[Fusion Summon]] it in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster's base Japanese name, 「古代の機械混沌巨人」 (''Kodai no Kikai Konton Kyojin''), is similar to the base Japanese name of "[[Ancient Gear Golem]]", 「古代の機械巨人」 (''Kodai no Kikai Kyojin'').
  * This monster has the highest [[ATK]] (4500) of all "Ancient Gear" monsters and [[Machine]] Fusion Monsters.
  ** This monster is tied with "[[Ultimate Ancient Gear Golem]]" for the highest Level (10) of all "Ancient Gear" monsters.
  * This is the first and currently only "Ancient Gear" [[DARK]] monster.
  * In the ''Yu-Gi-Oh! ARC-V'' anime, this monster was [[Duel Academy (ARC-V)|Duel Academy]]'s main weapon during their assault of [[Heartland City (ARC-V)|Heartland City]].
