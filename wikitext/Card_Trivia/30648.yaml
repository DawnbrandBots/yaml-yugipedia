title: Card Trivia:Evil HERO Infernal Prodigy
wikitext: |-
  {{Navigation}}

  * This monster is the "[[Evil HERO]]" [[counterpart]] of "[[Hero Kid]]".
  ** Both monsters share the same [[Level]] (2) and [[original ATK and DEF]] (300/600).
  ** Both monsters' names contain words that are synonymous to "child".
  ** Both monsters feature an effect related to [[Special Summon]]ing.
  * This monster has the lowest original [[ATK]] (300) of all [[Main Deck]] "Evil HERO" monsters.
  * In the ''[[Shonen Jump]]'' magazine, a preview of this card is accidentally displayed as a [[Level 10]] monster.{{citation needed}}
