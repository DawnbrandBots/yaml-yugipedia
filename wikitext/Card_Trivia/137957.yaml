title: Card Trivia:The Despair Uranus
wikitext: |-
  {{Navigation}}

  * This monster is based on the planet [[wikipedia:Uranus (planet)|Uranus]], the seventh planet in the [[wikipedia:Solar System|Solar System]].
  * This is the [[signature card]] of [[Adrian Gecko (manga)|Adrian Gecko]] in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga.
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Destiny HERO - Plasma]]", "[[Destiny End Dragoon]]", "[[Assault Revival]]", "[[NEX]]", "[[ZERO-MAX]]", and the other [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|055|ref}}, specifically from the panel showing [[The Despair Uranus (manga)|this monster]] being Summoned.
