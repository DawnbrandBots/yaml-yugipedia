title: Card Trivia:Book of Life
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of the Japanese version of ''[[Pharaonic Guardian (Japanese)|Pharaonic Guardian]]''.
  * This card is a reference to the real ancient Egyptian book, the [[wikipedia:Book of the Dead|Book of the Dead]]. This book supposedly helped people in their journey to the after-life. Thus, this card being the "Book of ''Life''" would similarly help people return to the world of the living.
  * This card has four [[counterpart]]s: "[[Book of Taiyou]]", "[[Book of Moon]]", "[[Book of Eclipse]]", and "[[Book of Lunar Eclipse]]". This is the only card out of the five that does not change the [[battle position]] of [[monsters]]. This card is also the only one with effect that affects only one specific [[Type]] - in this case, [[Zombie]].
  ** This card also has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Book of Life]]".
