title: Card Trivia:Exosister Kaspitell
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Exosister Betrayal]]".
  * This monster makes up "[[Exosisters Magnifica]]", together with "[[Exosister Mikailis]]".
  ** These two monsters also appear together in the artwork of "[[Exosister Returnia]]".
  * This monster is an [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form of "[[Exosister Stella]]".
  ** This card's name, "Kaspitell", is a combination of "[[wikipedia:Cassiel|Cassiel]]" and "Stella".
