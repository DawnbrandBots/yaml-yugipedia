title: 'Card Trivia:Number 10: Illumiknight'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Collectible Tins 2011 Wave 2]]''.
  * The number 10 appears on this monster's right shoulder plate.
  * This monster's ''[[TCG]]'' name is a portmanteau of "illuminate" and "knight".
  * This monster has a [[DARK]] [[Barian Number]] [[counterpart]]: [[Number 10: Dark Illumiknight]]. 
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster [[detach]]es an [[Xyz Material]], it absorbs it through its sword, causing it to glow bright green and sprinkle light particles from it. The lights cause the card that would be [[sent]] from the [[hand]] to the [[Graveyard]] to glow brightly.
  * In the anime, [[Number 10: Illumiknight (anime)|this monster]] and "[[Number 20: Giga-Brilliant (anime)|Number 20: Giga-Brilliant]]" are the first "[[Number]]" monsters that [[Yuma Tsukumo]] and [[Astral]] did not claim after they Dueled against their owner. This is due to how both monsters' owner, [[Kite Tenjo]], ended their Duel due to his brother [[Hart Tenjo|Hart]] collapsing from overuse of his power.
