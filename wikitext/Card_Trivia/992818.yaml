title: Card Trivia:Trident Warrior
wikitext: |-
  {{Navigation}}

  * This monster is likely based on [[wikipedia:Poseidon|Poseidon]], the Greek god of the sea who uses his [[wikipedia:Trident|trident]] as a weapon.
  * This card is themed around the number "3".
  ** This monster wields a trident, a '''three'''-pronged spear.
  ** This card features 1800 [[ATK]]/1200 [[DEF]], both of which are multiples of '''three'''.
  ** This card's effect can [[Special Summon]] a [[Level 3]] or lower monster from the [[hand]].
