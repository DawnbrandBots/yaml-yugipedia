title: Card Trivia:Voloferniges, the Darkest Dragon Doomrider
wikitext: |-
  {{Navigation}}

  * This card's name may be a portmanteau of the words "volcano" and "Hollófernyiges", a black dragon from the Hungarian folklore [http://palyazat.ujakropolisz.hu/vitez-janos-hollofernyiges Vitéz János és Hollófernyiges (Sir John and Hollófernyiges)] who is said to ride a five-legged magical horse.
