  * "[[Cyberse Gadget]]" and "[[Excode Talker]]" appear in this card's artwork.
  ** This card's artwork reflects its effect, which can be used to [[destroy]] "Excode Talker" (which is visually blowing up) to [[Special Summon]] "Cyberse Gadget" from the [[Graveyard]].
