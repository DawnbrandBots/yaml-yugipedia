title: Card Trivia:Road Magic - Uplifter
wikitext: |-
  {{Navigation}}

  * "[[Sevens Road Magician]]" appears in this card's artwork.
  * "Resaltar" in this card's Japanese name, "Road Magic - Resaltar" is the Spanish word for "highlight", which is reflected in this card's activation requirement to send a [[LIGHT]] monster from the [[hand]] to the [[Graveyard]].
