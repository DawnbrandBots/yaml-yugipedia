title: Card Trivia:Supay
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Supay, Duskwalker]]".
  * This monster is based on [[wikipedia:Supay|Supay]], the Incan god of death and the underworld.
  ** In Southern American mythologies, the ''supay'' is also a race of large-eyed horned demons, reflecting this monster's appearance and [[Fiend]] [[Type]].
  *** This monster's appearance also resembles the mask used in the [[wikipedia:Diablada|Diablada]], an Andean folk dance representing the battle between the angels and the ''supay''.
