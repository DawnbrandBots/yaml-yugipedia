title: Card Trivia:Qliphort Carrier
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Void Launch]]".
  * A blue and red [[Pendulum Scale]] appears on each side of this monster's face.
  * This monster's Japanese name, "Qliphort Archive" ({{name|Qliphort Carrier|ja}}, ''{{romanized name|Qliphort Carrier|ja}}'') is a pun on "archive" (a computer term for a collection of data used for long-term storage) and "Shakah" (ツァーカブ ''Tsākabu'', lit. "lust"), the seventh [[wikipedia:Qliphoth|Qliphoth]] emanation which is associated with the [[wikipedia:Devil|Devil]] [[wikipedia:Baal|Baal]].
  ** Given this monster's Japanese name and its appearance of a boat, it is a reference to [[wikipedia:Noah's Ark|Noah's Ark]], a massive ship built by [[wikipedia:Noah|Noah]] upon instructions from [[wikipedia:God in Abrahamic religions|God]] to save himself, his family, and the world's animals from the [[wikipedia:Genesis flood narrative|Biblical flood]].
