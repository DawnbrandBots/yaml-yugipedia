title: Card Trivia:Law of the Cosmos
wikitext: |-
  {{Navigation}}

  * A silhouette of [[Espa Roba]] appears in this card's artwork.
  ** This card's name is based on a phrase Espa Roba chanted during his [[Duel]] with [[Joey Wheeler]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and Japanese [[Yu-Gi-Oh! (anime)|anime]], in which he declared that his victory was "destiny... the law of the cosmos" a few times during the Duel.
