title: Card Trivia:Raidraptor - Force Strix
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Special Summon Evolution]]''.
  * This monster appears in the artwork of "[[Raidraptor - Lock Chain]]".
  * This monster is based on a strix, also known as ''[[wikipedia:True owl|Strigidae]]'', the scientific name for "true owls" or "typical owls". A "strix" is also a type of mythological owl said to bring ill omens and feed on human blood and flesh.
  * This monster has a [[Ranked-Up]] form: "[[Raidraptor - Brave Strix]]".
  * In Japan, this card, "[[Performapal Pendulum Sorcerer]]", "[[D/D/D Oblivion King Abyss Ragnarok]]", "[[Frightfur Tiger]]", "[[Superheavy Samurai Ogre Shutendoji]]", and "[[Hi-Speedroid Kendama]]" were printed with a different card size. Due to this issues, a Duelist card protector was used for these cards instead of a card sleeves for the official tournament.<ref name="cardsize">{{citeweb|url=http://www.yugioh-card.com/japan/notice/information/?10|title=カードサイズに関するお知らせ|publisher=Konami.com}}</ref>

