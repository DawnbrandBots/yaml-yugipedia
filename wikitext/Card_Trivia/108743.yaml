title: Card Trivia:Headless Knight
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Sun God Unification]]".
  * This monster is likely based on the [[wikipedia:Headless Horseman|Headless Horseman]], the main antagonist of the 1820 short story, ''[[wikipedia:The Legend of Sleepy Hollow|The Legend of Sleepy Hollow]]'' written by [[wikipedia:Washington Irving|Washington Irving]]. According to the legend, the Headless Horseman is the ghost of a [[wikipedia:Hessian|Hessian]] soldier who was decapitated in battle by a cannonball.
  * This monster has a [[Fusion Monster|Fusion]] form with "[[The Earl of Demise]]": "[[The Duke of Demise]]".
  * "[[Dark Spirit of Banishment]]" is a combination of this monster, "[[Dark Spirit of the Silent]]", and "[[The Gross Ghost of Fled Dreams]]".
