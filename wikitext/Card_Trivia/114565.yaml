title: Card Trivia:Bird of Roses
wikitext: |-
  {{Navigation}}

  * This card, along with "[[Drill Synchron]]", "[[Drill Warrior]]", "[[Splendid Rose]]", "[[Morphtronic Vacuumen]]" and "[[Chaos King Archfiend]]" were made into anime cards as a result of a drawing competition, as seen in the preview of [[Yu-Gi-Oh! 5D's - Episode 074|episode 74]], [[Yu-Gi-Oh! 5D's - Episode 075|episode 75]], [[Yu-Gi-Oh! 5D's - Episode 076|episode 76]], [[Yu-Gi-Oh! 5D's - Episode 077|episode 77]], and [[Yu-Gi-Oh! 5D's - Episode 078|episode 78]].
