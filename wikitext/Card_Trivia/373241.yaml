title: Card Trivia:Metalfoes Orichalc
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Orichalcum|Orichalcum]], a metal from ancient Greece.
  * This card is a [[Counterpart|Fusion counterpart]] to "[[Metalfoes Goldriver]]" after the effects of "[[Metalfoes Fusion]]".
  * This monster appears in the artwork of "[[Metalfoes Combination]]".
