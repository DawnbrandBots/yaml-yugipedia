title: Card Trivia:Mektimed Blast
wikitext: |-
  {{Navigation}}

  * "[[Meklord Emperor Wisel]]'s" body appears in this card's artwork.
  * This card has an [[Anime-only|anime-exclusive]] counterpart: "[[Twin Vortex]]".
  * This card's Japanese name is a portmanteau of {{Ruby|機|き}}{{Ruby|皇|こう}} (''Kikō'', "[[Meklord]]") and {{Ruby|時|じ}}{{Ruby|限|げん}}{{Ruby|爆|ばく}}{{Ruby|弾|だん}} (''jigen bakudan'', "time bomb").
