title: Card Trivia:Ojama Green
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Amaze Attraction Wonder Wheel]]" (as a face on the Ferris wheel), "[[Beast Rising]]", "[[Enchanting Fitting Room]]", "[[Ojama Delta Thunder!!]]", "[[Ojama Delta Wear]]", "[[Ojama Ride]]", "[[Ojamarble]]", "[[Ojamandala]]",  "[[Ojama Country]]", "[[Ojama Delta Hurricane!!]]", "[[Ojama Trio]]", "[[Ojamatch]]", "[[Ojamassimilation]]", "[[Ojamagic]]", "[[Ojamuscle]]", "[[Painful Decision]]", "[[Rival Crush]]", "[[Solidarity]]", "[[Super Team Buddy Force Unite!]]", "[[The Big Cattle Drive]]", "[[Three in One]]", "[[Trickstar Live Stage]]", and "[[Trickstar Treat]]".
  * "[[Ojama Yellow]]" and "[[Ojama Black]]" were released in ''[[Invasion of Chaos]]'', but this card was released in the previous pack, ''[[Dark Crisis]]''.
  * This card's flavor text is the same as "Ojama Yellow" and "Ojama Black". The only other group of cards that share the same flavor text is the "[[Magnet Warrior]]" Normal Monsters.
