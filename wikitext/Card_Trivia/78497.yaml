title: Card Trivia:Niwatori
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Rage and Conspiracy]]", "[[The Big Cattle Drive]]", and "[[Xyz Frame]]".
  * This monster's Japanese name, "Cluck" (コケ ''Koke'') is based on the  onomatopoeia for a rooster's crowing (''kokekokko'').
  ** This monster's English name is the Japanese word for "rooster".
  * This monster's design is similar to a [[wikipedia:Chocobo|Fat Chocobo]] from the ''[[wikipedia:Final Fantasy|Final Fantasy]]'' video game series.
  ** During the [[Legendary Heroes]] arc in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this monster was also used as a mount, similar to the role of the Chocobo in the ''Final Fantasy'' video game series.
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's [[Type]] is [[List of Comic monsters|Comic]], allowing it to gain a power bonus from the [[Toon (terrain)|Toon terrain]].
  * This card's German print features an error, as its Type ([[Winged Beast]]) is read as "Geflügeltes Ungeheuer" instead of "GEFLÜGELTES UNGEHEUER".
  ** This card's Spanish print features two errors, as its Type (Winged Beast) is read as "B'''é'''stia Alada" instead of "B'''e'''stia Alada", while the word "energy" in its [[flavor text]] is read as "energ'''i'''a", instead of "energ'''í'''a".
