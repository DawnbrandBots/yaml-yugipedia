title: Card Trivia:Chewbone Jr. Token
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Chewbone]]" appears in this card's artwork.
  ** This monster is a smaller version of "Chewbone", with the only other difference being that "Chewbone" has red horns.
  * This monster's Japanese name (チュウボーン ''Chuubōn'') is a portmanteau of "''chuuchuu''" (the Japanese onomatopoeia for a [[wikipedia:mouse|mouse's]] squeaking) and "bone".
  ** This monster's ''[[TCG]]'' name is homophonic with its Japanese name, with the first portion replaced with the word "chew", referencing a mouse's incisors, which are capable of chewing through any material.
