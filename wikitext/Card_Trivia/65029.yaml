title: Card Trivia:Harpie's Pet Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Pet Master Harpie Lady]]".
  ** A silhouette of what appears to be this monster appears in the artwork of "[[Alluring Mirror Split]]".
  * This monster has three [[counterparts]]:
  ** One younger version: "[[Harpie's Pet Baby Dragon]]".
  ** One [[Xyz Monster]] version: "[[Harpie's Pet Phantasmal Dragon]]".
  ** One [[signature move]] version: "[[Harpie's Pet Dragon - Fearsome Fire Blast]]".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'' and other video games, this card is a [[non-Effect Monster]], and "[[Harpie Lady]]" features the effect to increase its [[ATK]].
