title: Card Trivia:Surging-Wave Swordsman Onimaru Kunituna
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Surging-Wave Fish Slash]]".
  * This monster's name is a portmanteau of "Onimaru Kunitsuna", and the Japanese pronunciation of "[[wikipedia:Tuna|tuna]]" (ツナ ''tsuna'').
  ** Fittingly, this monster is wielding the "Onimaru Kunitsuna" sword, one of the five [[wikipedia:Tenka-Goken|Tenka-Goken]] [[wikipedia:Katana|katana]] serving as the [[wikipedia:List of National Treasures of Japan (crafts: swords)|National Treasures of Japan]].
