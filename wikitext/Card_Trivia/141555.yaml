title: Card Trivia:Bait Doll
wikitext: |-
  {{Navigation}}

  * The doll in this card's artwork is based on a [[wikipedia:Voodoo|voodoo]] doll, which is reflected in the nails and the hammer beside it.
  * This is the first card that can force-[[activate]] a card the opponent [[control]]s.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Bait Doll]]".
