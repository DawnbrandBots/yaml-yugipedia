title: Card Trivia:Prinzessin
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Cinderella|Cinderella]], the main character of the titular fairy tale.
  ** This monster's ''[[TCG]]'' name is based on the German word for "princess", reflecting the German nationality of the [[Wikipedia:Brothers Grimm|Brothers Grimm]], who adapted the fairy tale.
  ** This monster's effect to [[Special Summon]] "[[Pumpkin Carriage]]" and [[equip]] itself with "[[Glass Slippers]]" reference the story of Cinderella, who is mistreated by her stepmother and stepsisters. When a royal ball is held at the prince's castle, Cinderella's [[wikipedia:Fairy godmother|fairy godmother]] transforms her rags into a beautiful gown, gives her glass slippers on her feet, and transforms a pumpkin and six mice into a carriage drawn by six white horses.
  *** Fittingly, in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, when this monster is [[Summon]]ed, it is depicted wearing rags. A witch riding a broomstick (likely the fairy godmother) then uses her magic wand to transform this monster's rags into its gown before equipping it with "Glass Slippers" and Summoning "Pumpkin Carriage".
  *** This monster's ''[[OCG]]''/''TCG'' effect to equip it with "Glass Slippers" while "[[Golden Castle of Stromberg]]" is on the [[field]] references the prince's castle where the royal ball is held. Also, this effect is based on this monster's appearance in {{episode|Yu-Gi-Oh!|197|ref}} when [[Leon von Schroeder]] [[Special Summon]]ed this monster via the effect of "[[Golden Castle of Stromberg (anime)|Golden Castle of Stromberg]]" and used its effect to equip it with "[[Glass Slippers (anime)|Glass Slippers]]".
  ** This monster's effect to equip "Glass Slippers" to an opponent's monster after inflicting [[battle damage]] with a direct attack references how Cinderella, after dancing with the prince, rushes out of the castle at the stroke of midnight when the fairy godmother's spell is broken. While running out of the castle, one of her glass slippers is left behind.
