title: Card Trivia:Phantom Fortress Enterblathnir
wikitext: |-
  {{Navigation}}

  * "Enterblathnir" is a portmanteau of the ''[[wikipedia:USS Enterprise|U.S.S. Enterprise]]'' and [[wikipedia:Skíðblaðnir|Skithblathnir]].
  * This card was the first Rank 9 monster that was not a "[[Number]]" or "[[CXyz]]" monster, and the first Rank 9 monster that did not appear in the anime or manga.
  * "[[Mecha Phantom Beast Blackfalcon]]", "[[Mecha Phantom Beast Megaraptor]]", "[[Mecha Phantom Beast Harrliard]]" and "[[Mecha Phantom Beast Stealthray]]" appear in this card's artwork.
  * This monster appears in the artwork of "[[Scramble!! Scramble!!]]".
