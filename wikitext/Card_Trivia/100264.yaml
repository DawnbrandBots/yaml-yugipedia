title: Card Trivia:Dark Flattop
wikitext: |-
  {{Navigation}}

  * This monster is based on an [[wikipedia:Aircraft carrier|aircraft carrier]], a warship designed as a seafaring war base featuring a flight deck used for launching fighter aircraft.
  ** Fittingly, this monster is used by [[Greiger]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime along with the "[[Reactor]]" [[archetype]], which consists of monsters whose designs are based on [[wikipedia:World War II|World War II]] aircrafts.
  * This monster has the lowest [[original ATK]] (0) and the highest [[original DEF]] (3000) of all [[Dark Synchro Monster]]s.
