title: Card Trivia:Primitive Planet Reichphobia
wikitext: |-
  {{Navigation}}

  * "[[Scareclaw Acro]]", "[[Scareclaw Astra]]", "[[Scareclaw Belone]]", and "[[Scareclaw Reichheart]]" appear in this card's artwork.
  ** "[[Visas Starfrost]]" also likely appears in this card's artwork, as the blue meteor in the background.
  * This planet appears in the artwork of "[[Kashtira Shangri-Ira]]".
  ** The surface of the planet appears as the background of the artworks of multiple "[[Kashtira]]" cards, depicting a planetary invasion.
  ** A mimiature version of this land appears in the artwork of "[[Mannadium Fearless]]".
  * This card's name, "Reichphobia" (ライフォビア ''Raifobia'', "Reiphobia"), is a portmanteau of "[[wikipedia:Reich|reich]]" (the German word for "realm", and a reference to "Scareclaw Reichheart") and "[[wikipedia:Phobia|phobia]]" (referring to the fear theme of the "Scareclaw" monsters).
  ** The kanji 「{{Ruby|肆|し}}{{Ruby|世|せ}}{{Ruby|壊|かい}}」 (''Shisekai'') in this card's Japanese name can be translated as "Fourth World Destruction".
