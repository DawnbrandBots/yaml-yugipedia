title: Card Trivia:Black Dragon's Chick
wikitext: |-
  {{Navigation}}

  * This monster is a chick form of "[[Red-Eyes Black Dragon]]".
  ** This monster's [[original ATK and DEF]] (800/500) is each one-third and one-fourth of its adult form.
  ** This monster's effect is a reference to how it can eventually grow up into its adult form.
  * This monster has a ''[[Rush Duel]]'' counterpart: '[[Meteor Dragon's Chick]]".
  * This monster's effect is also similar to "[[Kaibaman]]", as they can [[Special Summon]] "Red-Eyes Black Dragon" and "[[Blue-Eyes White Dragon]]", respectively.
  * This is the first ''[[OCG]]'' [[Effect Monster]] to be released in ''[[Yu-Gi-Oh! Rush Duel]]''.
