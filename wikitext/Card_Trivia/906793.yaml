title: Card Trivia:Dual Coratlus
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of "[[wikipedia:Multi-core processor|dual core processor]]" and "coatl", the Aztec word for "snake".
  ** This monster is likely based on [[wikipedia:Quetzalcoatl|Quetzalcoatl]], a deity in Aztec culture who takes the form of a winged feathered serpent.
