title: Card Trivia:Zolga the Prophet
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Zolga]]".
  ** This monster's first effect to look at the top five cards of each player's [[Deck]] references the [[Millennium Necklace]]'s ability to allow the user to see into the future, which was used by [[Ishizu Ishtar]], who used "Zolga" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's second effect to [[destroy]] a monster when it was used to [[Tribute Summon]]is a reference to [[Seto Kaiba and Ishizu Ishtar's Duel (manga)|Seto Kaiba and Ishizu Ishtar's Duel]] in the manga (and its anime [[Seto Kaiba and Ishizu Ishtar's Duel|counterpart]]) where Ishizu used "[[Blast Held by a Tribute (manga)|Blast Held by a Tribute]]" to plant a bomb inside "[[Zolga (manga)|Zolga]]", which would detonate when a monster Tribute Summoned by using that monster as a [[Tribute]] declared an attack, and inflict damage equal to the destroyed monster's [[ATK]] to [[Seto Kaiba]].
  *** The bomb from "Blast Held by a Tribute" can also be seen in the center of this monster's body.
  *** In the anime and manga, the effect of "Blast Held by a Tribute" inflicts damage equal to the attacking monster's ATK; in this case, the Tribute Summoned monster was "[[Obelisk the Tormentor (manga)|Obelisk the Tormentor]]", so it would inflict 4000 damage.
  *** In the ''[[OCG]]''/''[[TCG]]'', "[[Blast Held by a Tribute]]" would inflict 1000 damage, while this monster inflicts 2000 damage, which is half the ATK of "Obelisk the Tormentor", and twice the damage that "Blast Held by a Tribute" would inflict.
