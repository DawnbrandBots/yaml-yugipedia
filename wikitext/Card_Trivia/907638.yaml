title: Card Trivia:Offside Trap
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Offside (association football)|offside trap]] tactic, a defensive tactic in the sport of [[wikipedia:Association football|soccer]] that is designed to force the attacking team into an [[wikipedia:Offside (association football)|offside]] position (where a soccer player is illegally positioned on the [[wikipedia:Football pitch|soccer field]]), thus triggering a penalty for that team.
  ** This is supported in the context of "[[Eye Contact]]", a card indicating communication between players, whose effect specifically retrieves this card from the Graveyard.
  ** The subsequent penalty for an acknowledged offside position (gameplay is stopped, with any play that occurred after the offside violation being nullified, and the infringed team being awarded a [[wikipedia:Free kick (association football)|free kick]]) is reflected by this card's effect Special Summoning the destroyed monster and negating any battle damage that was taken, as well as ending the opponent's turn.
