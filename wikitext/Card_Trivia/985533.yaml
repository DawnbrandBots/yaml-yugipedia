title: Card Trivia:Arashi the Skywind Star
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "''arashi''", the Japanese word for "storm", which is often accompanied by wind.
  ** Fittingly, in {{episode|ARC-V|042|ref}}, this monster is used to [[Fusion Summon]] "[[Fujin the Breakstorm Star]]", a monster based on the [[wikipedia:Raijin|Shinto deity of the wind]].
