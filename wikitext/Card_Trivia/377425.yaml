title: Card Trivia:Apple Magician Girl
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Magicians' Defense]]".
  * Parts of "[[Dark Magical Circle]]" appear in this card's artwork.
  * This card is the only "[[Magician Girl]]" monster that does not use a wand.
  * This card was the only [[FIRE]] monster used by [[Yugi Muto]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** However, in {{episode|Yu-Gi-Oh!|013|ref}} [[Joey Wheeler]] lent him "[[Flame Swordsman (anime)|Flame Swordsman]]"..
  * This card is similar to "[[Elemental HERO Burstinatrix]]":
  ** Both are female monsters.
  ** Both have the same [[Attribute]] (FIRE), [[Level]] (3), [[ATK]] (1200), and [[DEF]] (800).
  ** Both monsters have a primary red color scheme.
  ** This card was used by Yugi Muto in the ''Yu-Gi-Oh!'' anime, while "[[Apple Magician Girl (anime)|Apple Magician Girl]]" was used by him in the ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]'' movie.
