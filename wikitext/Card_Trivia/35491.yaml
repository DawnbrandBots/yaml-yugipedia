title: Card Trivia:Pot of Generosity
wikitext: |-
  {{Navigation}}

  * This pot appears in the artworks of "[[Asleep at the Switch]]", "[[Extra Buck]]", "[[Goblin Circus]]", and "[[Pot of Duality]]".
  * This card has a [[Trap]] counterpart: "[[Jar of Generosity]]".
  * This card is the opposite counterpart of "[[Pot of Greed]]", returning cards to the [[Deck]] instead of [[Draw a card|drawing]] them. This is also referenced by "Pot of Duality", which combines their effects.
  * This pot makes up half of "[[Pot of Prosperity]]", with the other half being "[[Pot of Riches]]".
  ** This pot also makes up half of "Pot of Duality", with the other half being "Pot of Greed".
