title: Card Trivia:Pulsating Cocoon of Evolution
wikitext: |-
  {{Navigation}}

  * "[[Petit Moth (Rush Duel)|Petit Moth]]" appear in this card's artwork.
  * This monster is a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]] of "[[Cocoon of Evolution (Rush Duel)|Cocoon of Evolution]]".
  ** This monster's [[Level]] (6) and its effect to [[Fusion Summon]] "[[Perfectly Ultimate Great Moth (Rush Duel)|Perfectly Ultimate Great Moth]]" reference the depiction of "Cocoon of Evolution" in ''[[Yu-Gi-Oh! Duel Monsters 4: Battle of Great Duelists]]'', in which it is a [[Level 6]] monster, and its [[flavor text]] states, "''It can take in an insect larva and make it evolve into maturity.''"
