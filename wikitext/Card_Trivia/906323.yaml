title: Card Trivia:Adamancipator Laputite
wikitext: |-
  {{Navigation}}

  * "[[Adamancipator Analyzer]]", "[[Adamancipator Researcher]]", and "[[Adamancipator Seeker]]" appear in this card's artwork.
  * The cavern and the characters in this card's artwork appear in the artwork of "[[Dwimmered Path]]".
  * This card's name is possibly a reference to [[wikipedia:Laputa|Laputa]] from ''[[wikipedia:Gulliver's Travels|Gulliver's Travels]]''. In the novel, Laputa is a flying island with an adamantine base.
  ** The card's Spanish name was translated as "Lapudita" rather than "Laputita" due to its resemblance to "la putita" (meaning "the little whore").
