title: Card Trivia:Underdog
wikitext: |-
  {{Navigation}}

  * "[[Super-Nimble Mega Hamster]]", "[[Rescue Rabbit]]", "[[Alpha, the Master of Beasts]]", and "[[Behemoth the King of All Animals]]" appear in this card's artwork.
  * This artwork appears to depict the aftermath of "[[Lucky Punch]]" and "[[Setuppercut]]", as "Behemoth" is afraid of "Rescue Rabbit" and "Mega Hamster" after getting beat up by both weaker Beasts and seems to be telling "Alpha" about them.
