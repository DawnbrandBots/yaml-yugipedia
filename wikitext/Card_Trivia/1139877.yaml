title: Card Trivia:ZW - Pegasus Twin Saber
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Pegasus|Pegasus]], a winged horse in [[wikipedia:Greek mythology|Greek mythology]], while its weapon form is based on a dual sided [[wikipedia:Sabre|saber]], curved swords used by early modern and Napoleonic era calvary.  
  ** This monster's design may be inspired by the first name of [[Yuma Tsukumo]] in Japanese, which means "horse", which is referenced multiple times in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. Also, the beginning of the Japanese [[Summon chants in Yu-Gi-Oh! ZEXAL#Yuma Tsukumo|Summon chant]] of Yuma's own "[[Number]]", "[[Number F0: Utopic Future (anime)|Number F0: Utopic Future]]", features the word "Pegasus" (天馬, ''Tenma''), which is also featured in this monster's base Japanese name (天馬双翼剣, ''Tenma Sōyokuken'').
