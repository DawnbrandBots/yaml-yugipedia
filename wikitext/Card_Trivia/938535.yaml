title: Card Trivia:Voidvelg Chrysaor
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Chrysaor|Chrysaor]], the twin brother of Pegasus born from Medusa's decapitated body in Greek mythology, who is sometimes depicted as a humanoid or a flying pig.
  * This monster has an [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form: "[[Voidvelg Theogonia]]".
