title: Card Trivia:Time Thief Power Reserve
wikitext: |-
  {{Navigation}}

  * "[[Time Thief Perpetua]]" and "[[Time Thief Temporwhal]]" appear in this card's artwork.
  ** Fittingly, this card shares its [[Type]] ([[Psychic]]) and [[original ATK and DEF]] (1900/2500) as "Perpetua"; also this card is a [[Level 4]] monster while "Perpetua" is a [[Rank 4]] monster.
  * This card's artwork depicts a development in "Perpetua's" role in the "[[Time Thief]]" [[The Valuable Book EX 4 card storylines#The Girl who Crossed Over Time|storyline]]; rather than being rescued by "[[Time Thief Winder|Winder]]" or "[[Time Thief Redoer|Redoer]]" [[Time Thief Hack|as in]] [[Time Thief Flyback|the past]], her abilities and tools attained from her experience with the pair have allowed her to combat those wanting to monopolize her knowledge and inventions on her own.
