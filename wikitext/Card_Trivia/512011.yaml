title: Card Trivia:Gilford the Lightning
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Half Deck: Warrior Type]]'', as well as one of the cover cards of ''[[Structure Deck: Joey Volume 2]]'', the ''[[Collectible Tins 2005]]'', and ''[[Legendary Collection 4: Joey's World]]''.
  * This monster has an alternate [[counterpart]]: "[[Gilford the Legend]]".
  * This monster has a ''[[Rush Duel]]''-exclusive counterpart: "[[Gilford the Rising]]".
  * This is one of the [[signature card]]s of [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ([[Joey Wheeler]] in the [[Yu-Gi-Oh! (anime)|anime]]).
  * This is the only non-[[Egyptian God]] monster in the ''Yu-Gi-Oh!'' manga and anime that was [[Tribute Summon]]ed using three [[Tribute]]s.
  ** This is the only monster in the ''Yu-Gi-Oh!'' manga and anime that can be Tribute Summoned using three Tributes that does not also require three Tributes to be Tribute Summoned.
  ** This monster's ''[[OCG]]''/''[[TCG]]'' effect to be Tribute Summoned by Tributing three monsters is a reference to the [[Battle City Rules]], where the player can Tribute Summon [[Level 10]] or higher monsters by Tributing three monsters, whereas this monster was Summoned through this method during the [[Battle City (manga arc)|Battle City]] arc.
  * This monster's pose in this card's second ''OCG'' artwork and first ''TCG'' artwork are taken from a panel from {{chapter|Yu-Gi-Oh!|248|ref}} showing [[Gilford the Lightning (manga)|this monster]] attacking [[Dark Marik (manga)|Dark Marik]] directly.
