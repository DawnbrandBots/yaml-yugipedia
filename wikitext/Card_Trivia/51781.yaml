title: Card Trivia:Arcana Force XVIII - The Moon
wikitext: |-
  {{Navigation}}

  * A "[[Moon Token]]" appears in this card's artwork.
  * This monster is based on the [[wikipedia:Major Arcana|Major Arcana]] [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The Moon (tarot card)|The Moon]].
  ** This monster's number "XVIII" and [[equal ATK and DEF|equal]] [[original ATK and DEF]] (2800) reference how The Moon is the eighteenth trump card of the Majora Arcana Tarot.
  * This monster's appearance is based on the Lovecraftian deity, Glaaki from the short story "[[wikipedia:The Inhabitant of the Lake and Less Welcome Tenants|The Inhabitant of the Lake]]" by Ramsey Campbell, keeping in relation with the extraterrestrial theme of the "[[Arcana Force]]" [[archetype]].
  ** According to the short story, Glaaki is a slug-like entity that arrived on Earth inside a meteor, with metallic spines that alter those they touch into zombified followers, similar to the "Moon Token" this monster can [[Special Summon]].
