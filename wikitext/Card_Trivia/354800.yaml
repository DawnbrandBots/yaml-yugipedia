title: Card Trivia:Igknight Champion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Igknight Burst]]" and "[[Oops!]]".
  * This card's name is derived from the [[wikipedia:FIM-92 Stinger|FIM-92 Stinger]], a portable infrared homing surface-to-air missile, which can be adapted to fire from ground vehicles or helicopters.
