title: Card Trivia:Quill Pen of Gulldos
wikitext: |-
  {{Navigation}}

  * This is "[[Daigusto Gulldos]]'s" feather.
  ** This card could be continuing the theme of Duel Terminal Spell/Trap support in the form of an item belonging to a boss monster, similar to "[[Leodrake's Mane]]", "[[Barkion's Bark]]", "[[Landoise's Luminous Moss]]" and "[[Exterio's Fang]]".
