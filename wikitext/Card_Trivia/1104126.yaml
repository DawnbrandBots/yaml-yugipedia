title: Card Trivia:Live☆Twin Lil-la Sweet
wikitext: |-
  {{Navigation}}

  * Visually, this monster is a [[wikipedia:Valentine's Day|Valentine's Day]]-themed version of "[[Live☆Twin Lil-la]]".
  ** Given its white color scheme, it may also be based on [[wikipedia:White Day|White Day]], a holiday in Japan taking place a full month after Valentine's Day where people gift those whom have gifted them on Valentine's Day as thanks.
