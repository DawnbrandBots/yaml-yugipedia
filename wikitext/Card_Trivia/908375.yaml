title: Card Trivia:Tri-Brigade Shuraig the Ominous Omen
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Opening]]", "[[New Frontier]]", "[[Tri-Brigade (card)|Tri-Brigade]]", "[[Tri-Brigade Airborne Assault]]", "[[Tri-Brigade Showdown]]", "[[Tri-Brigade Oath]]", and "[[Triple Tactics Thrust]]" (2nd artwork).
  * Two "[[Tri-Brigade Mercourier]]" appear in this card's artwork.
  * This monster has an upgraded form: "[[Tri-Brigade Arms Bucephalus II]]".
  * This monster is based on a [[wikipedia:Shrike|shrike]], a carnivorous bird most known for its behaviour of using thorns to impale its prey.
  * This monster's concept art notes the following:
  ** He owns a pet mechanical shrike: "[[Tri-Brigade Mercourier]]".
  ** He is the commander of the "Tri-Brigade" army.
  ** His left wing is mechanical, owing to his original name, "Tri-Brigade Shuraig, the '''One-Winged'''".
