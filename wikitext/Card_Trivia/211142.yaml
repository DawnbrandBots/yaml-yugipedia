title: Card Trivia:Evolsaur Darwino
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Darwinopterus|Darwinopterus]], a missing link and an example of evolution in action.
  ** Darwinopterus means "Darwin's wing"; this refers to [[wikipedia:Charles Darwin|Charles Darwin]], an English naturalist known for his theories regarding '''[[evol]]'''[[wikipedia:evolution|ution]].
  * This card is the third feathered [[Dinosaur]]; the others are "[[Black Veloci]]" and "[[Dark Driceratops]]".
  * This monster appears in the artwork of "[[Evo-Price]]".
