title: Card Trivia:Pendulum Treasure
wikitext: |-
  {{Navigation}}

  * A damaged "[[Dragong]]" and a gem resembling the red (right) [[Pendulum Scale]] appear in this card's artwork.
  ** This card's name and artwork reference the practice of using [[wikipedia:Dowsing|dowsing]] to find treasure, which includes the usage of a pendulum.
  ** The pendulum and its afterimages total seven, possibly referencing the Pendulum Scale of "Dragong" (7).
