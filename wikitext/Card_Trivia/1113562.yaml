title: Card Trivia:Merciless Scorpion of Serket
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is a [[counterpart|retrained]] counterpart of "[[Mystical Beast of Serket]]".
  ** This monster's [[Summoning condition]] requiring the player to [[banish]] a [[Level 10]] from the [[hand]] or [[Deck]] while they [[control]] "[[Temple of the Kings]]" is based on a scene from {{chapter|Yu-Gi-Oh!|213|ref}} (and its [[Yu-Gi-Oh! - Episode 087|anime counterpart]]) where [[Rishid (manga)|Rishid]] uses the effect of the "[[Royal Temple]]" to "seal away" the Level 10 "[[The Sun Dragon Ra]]" from his hand inside the temple's ark, planning to Summon it when the time was right. This occurs before Rishid Summons "[[Mystical Beast Selket (manga)|Mystical Beast Selket]]".
  ** This monster's effect to [[destroy]] an opponent's monster when it battles during the [[Damage Step]] and gain [[ATK]] equal to half the [[original ATK]] of that opponent's monster is based on the effect of "Mystical Beast Selket" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga ("[[Mystical Beast Serket (anime)|Mystical Beast Serket]]" in the [[Yu-Gi-Oh! (anime)|anime]]).
  *** This monster's pose is based on that of "Serket" after it destroys an opponent's monster by battle and gains half of that destroyed monster's ATK, causing it to stand upright as depicted in the manga and anime.
