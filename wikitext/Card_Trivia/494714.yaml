title: Card Trivia:Amazoness Princess
wikitext: |-
  {{Navigation}}

  * This monster is likely the daughter of "[[Amazoness Queen]]". This is reflected in this card's [[Level]] (3), [[ATK]] (1200), and [[DEF]] (900) being half of those of "Amazoness Queen", as well as featuring the effect of being treated as "Amazoness Queen" while it's on the field or in the [[Graveyard]].
  ** This monster is also likely the younger version of "[[Amazoness Empress]]" due to both monsters' designs featuring white hair, as well as "Amazoness Empress" being [[Fusion Summon]]ed using "Amazoness Queen" as [[Fusion Material]].
