title: Card Trivia:Makyura the Destructor
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Macula of retina|macula]], the part of the retina located in the back of the human eyeball responsible for processing what people see in front of them, including central vision, color, and finer detail. Fittingly, this monster's central "eye" is [[The Eye of Wdjat]].
  * This is the first card to feature an effect that can [[activate]] [[Trap Card]]s from the [[hand]].
  * In the Spanish print of ''[[Battle Pack: Epic Dawn]]'', this card uses its English name instead of its standard Spanish name, "Makyura el Destructor".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|219|ref}}, specifically from the panel showing [[Makyura the Destructor (manga)|this monster]] being Summoned.
  * This is the first card to go directly from [[Semi-Limited]] to [[Forbidden]], though only in the ''[[OCG]]''.
