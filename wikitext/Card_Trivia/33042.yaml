title: Card Trivia:Book of Eclipse
wikitext: |-
  {{Navigation}}

  * This card has four counterparts: "[[Book of Taiyou]]", "[[Book of Life]]", "[[Book of Moon]]" and "[[Book of Lunar Eclipse]]".
  ** This card is a mixture of "Taiyou" and "Moon" in its artwork and effect.
  * The Spanish ''[[Battle Pack 3: Monster League]]'' card has a small errata, as it says "''voltea boca arriba a todos monstruos''" instead of "''voltea boca arriba a todos '''los''' monstruos''".
