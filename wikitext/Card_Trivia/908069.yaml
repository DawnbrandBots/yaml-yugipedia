title: Card Trivia:Aileron
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:aileron|aileron]], a hinged flight control surface on a fixed-wing aircraft that usually forms part of the trailing edge of each wing.
  * This is the [[Monster Card]] counterpart of [[Aileron (character)|Aileron]], a character featured in the ''[[Yu-Gi-Oh! OCG Stories]]'' manga.
