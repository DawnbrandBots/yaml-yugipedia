title: Card Trivia:Change of Dessert
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Bye-Bye Strawberries]]", "[[Freshberry Collaboration]]", and "[[Hunting Strawberries]]".
  * This monster is a ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] of the woman from "[[Change of Heart]]".
  ** This monster's Japanese name, "Change of Nata de Coco-Heart" (ナタ・デ・ココロガワリ, ''Nata de Kokorogawari'') is a portmanteau of the Japanese name of "Change of Heart" (心変わり, ''Kokorogawari'') and "[[wikipedia:Nata de coco|Nata de coco]]" (ナタ・デ・ココ, ''Nata de Koko'').

