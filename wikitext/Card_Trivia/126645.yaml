title: Card Trivia:Ground Spider
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Lair Wire]]".

  * This monster is possibly a spider in the genus ''[[wikipedia:Myrmarachne|Myrmarachne]]'' (which is known for its ant-mimicking spiders), as indicated by its longer-than-normal [[wikipedia:Spider anatomy#Pedicel|pedicel]].
  ** Its teethed [[wikipedia:Mandible (arthropod mouthpart)|mandibles]] also contribute to its ant-like appearance.
  ** This is further supported by the existence of "[[Relinquished Spider]]"; not only does that monster's appearance resemble that of a [[wikipedia:Honeypot ant|honeypot ant]], but also both this monster and "Relinquished Spider" were used by [[Roman Goodwin]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
