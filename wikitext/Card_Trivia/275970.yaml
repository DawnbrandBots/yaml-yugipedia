title: 'Card Trivia:Number 44: Sky Pegasus'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * The number "44" is located on this monster's right shoulder.
  * This is the first [[Mythyrian Number]] revealed.
  * "[[Number]]" monsters often take the form reflecting their owners and/or their original desires. In this case, this [[Mythyrian Number]] represents this its original owner, [[Dumon]], and its [[Number Guardian]], [[Mach]].
  ** This monster is based on the [[wikipedia:Pegasus|Pegasus]], the winged horse from [[wikipedia:Greek mythology|Greek mythology]] who became known for carrying the legendary Greek hero, [[wikipedia:Perseus|Perseus]]. This is reflected in the legend of Dumon's past life as a legendary hero who rode the Pegasus, Mach as his trusted steed.
  ** This monster's effect to allow the opponent to choose between paying 1000 [[Life Point]]s or [[destroy]]ing their monster references the death of Dumon and Mach at the hands of their fellow knights. After Dumon and Mach returned to their homeland and learned of their comrades plotting to usurp the king, Dumon intercepted them but refused to kill them, leading to his and Mach's death.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this is the first "Number" monster that can [[equip]] itself to other "Numbers"; however, this effect was never used. 
  ** This effect potentially alludes to how Mach was the steed of Dumon in their prior lives. Being equipped to another monster could be interpreted as this monster being ridden by another monster, befitting a steed animal. 
  ** This effect to make the equipped monster make a second attack is likely designed to counter the protective effects of Dumon's "[[Number 10X]]" monster, "[[Number 102: Star Seraph Sentry (anime)|Number 102: Star Seraph Sentry]]", or his "[[Number C10X]]" monster, "[[Number C102: Archfiend Seraph (anime)|Number C102: Archfiend Seraph]]", both of which can [[detach]] all of their [[Xyz Material]]s to prevent them from being [[destroyed by battle]].
  * This is the only Mythyrian Number that never got into the possession of a [[Seven Barian Emperors|Barian Emperor]], as well as the only Mythyrian Number that was not used during a Duel that a Barian Emperor participated in.
