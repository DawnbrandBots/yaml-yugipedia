title: Card Trivia:Blackwing - Vata the Emblem of Wandering
wikitext: |-
  {{Navigation}}

  * This monster's name is based on "vata", the Sanskrit word for "wind".
  * This monster is a [[Card evolutions|counterpart]] of "[[Blackwing - Vayu the Emblem of Honor]]".
  ** Both monsters feature the same red emblem in the background of their respective cards' artwork.
  ** Both monsters share the same [[original ATK and DEF]] (800/0) and feature effects that can [[Special Summon]] a [[Synchro Monster]] from the [[Extra Deck]].
  ** Both monsters feature inverted color schemes; this monster features a white coat, black feathers, and blue hair, while "Vayu" features a black coat, white feathers, and red hair.
