title: Card Trivia:Thunder King Rai-Oh
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is "Raio" spelled in katakana.
  ** The "Thunder King" in this monster's English name is a literal translation of "Rai-Oh" (essentially making the name "Thunder King Thunder King").
  ** "Rai-Oh" coincidentally sounds like the Spanish word "rayo" and the Portuguese word "raio", which can be translated as "ray" or "thunderbolt".
  * This monster, "[[Alector, Sovereign of Birds]]", "[[Elemental HERO Absolute Zero]]", and "[[Kachi Kochi Dragon]]" are the only promotional cards for a manga volume in which they did not appear.
  ** This is the promotional card of [[Yu-Gi-Oh! GX - Volume 002|the second volume]] of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, but it did not appear until the second chapter of the [[Yu-Gi-Oh! GX - Volume 002|the third volume]]. 
  * This card's first ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|020|ref}}, specifically from the panel showing [[Rai-Oh (manga)|this monster]] being Summoned.
