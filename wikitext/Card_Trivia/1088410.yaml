title: Card Trivia:Ween, the Spirit of Treats
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Hallo-Ween!]]".
  * This monster's name, along with the name of "[[Hallo, the Spirit of Tricks]]" make up the name of [[wikipedia:Halloween|Halloween]], the holiday celebrated on October 31st. Fittingly, both monsters, along with "Hallo-Ween!", are released in the Japanese release of ''[[Supreme Darkness]]'' in October 26th, 2024.
  ** Also, both monsters' titles make up "[[wikipedia:Trick-or-treating#The interjection "Trick or treat!"|Trick or treat!]]", a phrase commonly used in Halloween, with this monster's title referencing the "treats", mostly candy and other sweet confections, given out to trick-or-treaters.
