title: Card Trivia:Krawler Axon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[World Legacy in Shadow]]" and "[[World Legacy Clash]]".
  * This card is named after the [[wikipedia:axon|axon]]—the long, stem-like part of [[wikipedia:neuron|neurons]].
  * The Spanish lore of this card has a typo, as it refers to how the player "''can Special Summon 2 "Krawler Axon" monsters with different names''" instead of "''2 "Krawler" monsters''".
