title: Card Trivia:Abysslayer Leviaknight
wikitext: |-
  {{Navigation}}

  * One of the water creatures that make up "[[Abyssal Dragon Lord Abyss Poseidra (L)|Abyssal Dragon Lord Abyss Poseidra [L]]]" appears in this card's artwork.
  * This monster is named after the [[wikipedia:Leviathan|Leviathan]], a mythical sea serpent that is depicted in the [[Wikipedia:Hebrew Bible|Hebrew Bible]].
  * "[[Voidvelg Chaosmachia]]", is "[[Voidvelg Requiem]]" [[Fusion Summon|fused]] with this monster. 
  * This monster's armor color scheme resembles [[The Secrecy]] uniform, of which this card's user [[Phaser Ryugu]] is the commander of in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' anime.
  * This is one of the [[signature card]]s for Phaser Ryugu in the ''Yu-Gi-Oh! GO RUSH!!'' anime, and the one most associated with him.
