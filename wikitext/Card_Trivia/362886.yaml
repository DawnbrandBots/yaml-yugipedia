title: Card Trivia:Performapal Longphone Bull
wikitext: |-
  {{Navigation}}

  * This card's name is a play on "longhorn bull", which is pronounced "''ronguhōn''" (ロングホーン) in Japanese. The letters "f" and "h" have similar pronunciations in Japanese.
  ** "Bull", pronounced "buru" (ブル) in Japanese, sounds similar to "blue" (ブルー ''burū''), reflecting this monster's blue color scheme.
