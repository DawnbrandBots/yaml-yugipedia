title: Card Trivia:Malice Doll of Demise
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Doll Hammer]]", "[[Silent Pain]]", "[[Silent Space]]", and "[[Silent Torment]]".
  * This monster is the [[retrain]]ed ''[[OCG]]''/''[[TCG]]'' counterpart of "[[Doll of Demise]]".
  ** This monster's effect is based on how [[Arkana]] [[Tribute]]d "Doll of Demise" using the effect of "[[Ectoplasmer (manga)|Ectoplasmer]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]]. Fittingly, this monster's effect is designed to work with "[[Ectoplasmer]]" (a [[Continuous Spell Card]]) which is demonstrated in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This monster's artwork depicts it with one hand having blades attached to it's fingers. In the Yu-Gi-Oh! GX anime, as well as in every card artwork this monster appears in, this detail is omitted.
