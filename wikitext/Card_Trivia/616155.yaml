title: Card Trivia:Gimmick Puppet Gigantes Doll
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the [[wikipedia:Giants (Greek mythology)|Gigantes]], a race of giants in [[wikipedia:Greek mythology|Greek mythology]].
  * This monster contains parts from other "[[Gimmick Puppet]]" monsters, including:
  ** The gear-like mechanism of "[[Gimmick Puppet Gear Changer]]";
  ** The head of "[[Gimmick Puppet Humpty Dumpty]]";
  ** The scissor blades used by "[[Gimmick Puppet Scissor Arms]]"; and
  ** The scythe-like arm of "[[Gimmick Puppet Twilight Joker]]".
  * This is the first ''[[OCG]]''/''[[TCG]]''-original "Gimmick Puppet" [[Xyz Monster]], as well as the first [[Rank 4]] "Gimmick Puppet" Xyz Monster.
  ** This card is also the first "Gimmick Puppet" Xyz Monster that is not a "[[Number]]" monster.
