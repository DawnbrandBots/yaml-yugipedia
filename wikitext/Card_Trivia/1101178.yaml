title: Card Trivia:Switcheroo
wikitext: |-
  {{Navigation}}

  * This card's name and effect are based on the scenes [[Joey Wheeler and Bandit Keith's Duel]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime where [[Bandit Keith]] cheats by switching the top cards of his [[Deck]] with one of the two copies of "[[7 Completed]]" each hidden in his wristbands.
