title: Card Trivia:SZW - Fenrir Sword
wikitext: |-
  {{Navigation}}

  * This is the only "Shining ZEXAL Weapon" card.
  ** This card is one of two cards that has a modifier in front of "ZW", the other being "[[DZW - Chimera Clad]]".
  * This card was the first ''TCG''/''OCG''-original "ZW -" card.
