title: Card Trivia:Blue-Eyes Blazing Bright Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an upgraded [[Fusion]] form of "[[Blue-Eyes Bright Dragon]]".
  ** This is supported by the fact that this monster can be [[Fusion Summon]]ed by using two copies of "Blue-Eyes Bright Dragon" as [[Fusion Material]] due to it being a [[Level 8]] [[LIGHT]] [[Attribute]] [[Dragon]] [[Type]] monster", and its two separate effects that change its name to "[[Blue-Eyes White Dragon]]" while in the hand, or on the field, respectively.
