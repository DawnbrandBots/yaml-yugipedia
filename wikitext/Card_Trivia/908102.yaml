title: Card Trivia:Doll of Dread
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Haunted doll|Okiku doll]], a doll inhabiting the spirit of a young girl where its hair continuously grows.
  ** This monster's Japanese name, "Okiku Doll of the Witching Hour" and the hammer and nails it wields reference the [[wikipedia:Ushi no toki mairi|Ushi no toki mairi]], a traditional Japanese method of placing a curse on a target by nailing an effigy to a sacred tree near a Shinto shrine during the [[wikipedia:Ox (zodiac)#Hour of the Ox|hour of the Ox]], which takes place between 1:00 and 3:00 am, similar to the [[wikipedia:Witching hour|witching hour]] in Western culture.
