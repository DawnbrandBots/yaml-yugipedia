title: Card Trivia:Bujin Mikazuchi
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * This monster is named after [[wikipedia:Takemikazuchi|Takemikazuchi]], the [[wikipedia:Shinto|Shinto]] deity of thunder. Fittingly, multiple lightning bolts appear in the background of this card's artwork.
  * The [[Main Deck]] "[[Bujin]]" [[Beast-Warrior]] monsters resemble characters appearing in the ''[[Yu-Gi-Oh! GX]]'' anime through their head shapes and color schemes. In this case, this monster resembles [[Chazz Princeton]], while its blue color scheme is a reference to how Chazz initially wore a blue uniform belonging to the [[Obelisk Blue]] dorm.
  ** The lightning in this card's artwork is both a reference to both Take-Mikazuchi and Chazz's nickname in the original Japanese version of ''Yu-Gi-Oh! GX'', "Manjoume Thunder", which is also used in his original catchphrase: "''Ichi, jū, hyaku, sen, Manjōme-sandā''" (一、十、百、千、万丈目サンダー meaning "one, ten, hundred, thousand, Manjome Thunder", with "man" meaning "10000").
