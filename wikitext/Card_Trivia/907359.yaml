title: Card Trivia:Ninjitsu Art Tool - Iron Digger
wikitext: |-
  {{Navigation}}

  * "[[Mitsu the Insect Ninja]]" appears this card's artwork.
  * This card's Japanese name (カナムグラ, ''Kanamugura'') is based on the Japanese name of [[wikipedia:Humulus japonicus|Japanese hop]], a strong-vined garden plant.
  ** This card's name is inspired by the Japanese name for the [[wikipedia:Mole (animal)|mole]] (むぐら, ''mugura''), which is also used to to refer to an internal spy of an intelligence or governmental organisation who betrays that organisation and reveals its secrets from within. This is reflected by this card's effect to [[equip]] itself to the opponent's monster, treat is a "[[Ninja]]" monster, and use that card to the player's advantage.
