title: Card Trivia:Steel Ogre Grotto 1
wikitext: |-
  {{Navigation}}

  * This card has a [[recolored counterpart]]: "[[Rock Ogre Grotto 1|Rock Ogre Grotto #1]]".
  * The French name for this card misses "Grotto", calling it "Ogre d'Acier N°1". But its TCG name counterpart "[[Steel Ogre Grotto 2|Steel Ogre Grotto #2]]" has "Grotto" in its name, caling it "Ogre d'Acier Grotto N°2".
  ** However, this card is unrelated to "Steel Ogre Grotto #2", since their Japanese names and appearances are different.
