title: Card Trivia:Ferocious Flame Swordsman
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Overload]]''.
  * The kanji (剛炎) on the swords in this card's artwork translates to "mighty flame".
  * This card is a [[Card evolutions|retrained]] [[Link Monster]] counterpart of "[[Flame Swordsman]]".
  ** This card starts with 1300 ATK, but its own effect will raise its [[ATK]] to 1800, the same as "Flame Swordsman".
  ** This card's effect of [[Special Summon]]ing a non-Link [[Warrior]]-[[Type]] monster from the [[Graveyard]] when it is destroyed is similar to that of "[[Blue Flame Swordsman]]".
