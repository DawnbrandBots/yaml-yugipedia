title: Card Trivia:Apex Predation
wikitext: |-
  {{Navigation}}

  * "[[Steelswarm Hercules]]" appears in this card's artwork.
  ** This card's effect to [[destroy]] all [[Special Summon]]ed monsters on the field if the player controls a [[Normal Summon]]ed/[[Set]] monster is the opposite of the first effect of "[[Vylon Omega]]", the antagonist of "Hercules" in the ''[[Duel Terminal]]'' lore, to destroy all [[face-up]] monsters that were Normal Summoned/Set when it is [[Synchro Summon]]ed.
