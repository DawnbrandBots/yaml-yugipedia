title: 'Card Trivia:Number C80: Requiem in Berserk'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This card is named after the [[wikipedia:Requiem|Requiem]], a Catholic service celebrating the souls of one or more recently departed persons where the masses are accompanied by a soulful or somber music composed specifically for the ceremony.
  ** This contrasts with the name of this card's base form, "[[Number 80: Rhapsody in Berserk]]", which is named after the [[wikipedia:Rhapsody|Rhapsody]], a single-movement instrumental piece that has an irregular, spontaneous and free-form composition.
  * This card is the first [[Rank 5]] [[Xyz Monster]] and "[[Number C]]" monster to have 0 [[ATK]].
  ** This card also has the lowest ATK of any "Number C" monster, tied with "[[Number C5: Chaos Chimera Dragon]]" and "[[Number C43: High Manipulator of Chaos]]".
