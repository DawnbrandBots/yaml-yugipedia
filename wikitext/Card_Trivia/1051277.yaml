title: Card Trivia:Rogue of the Ring
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The headpiece and halo of "[[Darkness Zerorogue]]" appear in this card's artwork.
  * This card's name is a pun on the title of [[wikipedia:J. R. R. Tolkien|J. R. R. Tolkien's]] epic high fantasy novel, ''[[wikipedia:The Lord of the Rings|The Lord of the Rings]]''.
