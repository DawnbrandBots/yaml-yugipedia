title: Card Trivia:Trust Guardian
wikitext: |-
  {{Navigation}}

  * This card and "[[Flare Resonator]]" are thematic opposites: "Flare Resonator" is a [[Level]] 3 [[Fiend]]-[[Type]] [[Tuner]] that increases the ATK of a Synchro Monster that used it as [[Synchro Material]] (symbolizing pure power), while this card is a Level 3 [[Fairy]]-Type Tuner that protects a Synchro Monster that used it as Synchro Material from being destroyed by battle by reducing its ATK (symbolizing friendship).
  ** This is more emphasized in their appearances in [[Yu-Gi-Oh! 5D's - Episode 084|episode 84]] of the ''[[Yu-Gi-Oh! 5D's]]'' anime, where "Trust Guardian" was used by [[Jack Atlas]], while "Flare Resonator" was used by the [[Fake Jack Atlas]].
