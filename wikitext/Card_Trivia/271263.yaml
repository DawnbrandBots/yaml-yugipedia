title: Card Trivia:Mist Valley Shaman
wikitext: |-
  {{Navigation}}

  * This card is the only female "[[Mist Valley]]" monster.
  * This card's effect is similar to that of "[[Mist Valley Thunder Lord]]".
  ** This card [[return]]s one other monster the player [[control]]s to the [[hand]] to gain 500 [[ATK]] until the [[End Phase]], while "Thunder Lord" returns any other card the player controls to the hand to gain 500 ATK until the End Phase.
