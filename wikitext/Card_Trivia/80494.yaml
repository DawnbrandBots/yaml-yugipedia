title: Card Trivia:Kazejin
wikitext: |-
  {{Navigation}}

  * The kanji on this monster's body (風) translates to "wind", reflecting its [[WIND]] [[Attribute]].
  * This monster is one of the components of "[[Gate Guardian]]" which makes up the stomach.
  ** This the only component whose [[Type]] does not refer to its element: "[[Suijin]]" is the "Water God" and an [[Aqua]] monster, and "[[Sanga of the Thunder]]" is the "Thunder God" and a [[Thunder]] monster.
  ** This monster is the smallest part of "Gate Guardian", with its [[ATK]] being exactly 100 less than "Suijin" and 200 less than "Sanga of the Thunder".
  * This monster is depicted with bulbous yellow shoulder pads, which are absent in other card artworks and animated depictions.
  * Originally, when this monster became part of "Gate Guardian", its arms vanished. Its modern depictions as parts of "[[Gate Guardian of Thunder and Wind]]", "[[Gate Guardian of Wind and Water]]" and "[[Gate Guardians Combined]]", show this monster's arms can shrink and grow in the combinations and keep them displayed.
  * Oddly, during the Summoning animation of "Gate Guardian" in ''[[Yu-Gi-Oh! Duel Links]]'', this monster is missing its mouth.
  * The [[Kazejin (Bandai)|Bandai]] version of this card is [[Level 6]] "Black Magic" monster (which can be considered a [[DARK]] [[Spellcaster]]), whereas the Konami version is a [[Level 7]] WIND Spellcaster monster.
  * In the [[Yu-Gi-Oh! (Toei anime)|''Yu-Gi-Oh!'' Toei anime]], this card is called "Wind God" and has 2500 ATK and 1200 [[DEF]].
