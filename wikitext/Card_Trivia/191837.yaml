title: Card Trivia:Synchro Call
wikitext: |-
  {{Navigation}}

  * "[[Big Piece Golem]]" and "[[Dark Resonator]]" appear in this card's artwork.
  ** Although this card is used by [[Jack Atlas (manga)|Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, both of the aforementioned monsters were used by his [[Jack Atlas|anime counterpart]] instead.
  ** This card's artwork is a reference to how Jack Atlas often used "[[Big Piece Golem (anime)|Big Piece Golem]]" and [[Dark Resonator (anime)|Dark Resonator]]" to [[Synchro Summon]] "[[Red Dragon Archfiend (anime)|Red Dragon Archfiend]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
