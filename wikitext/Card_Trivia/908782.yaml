  [[File:HolyBurstStream.png|thumb|200px|"[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" attacks while strengthened by "[[Mystical Elf (manga)|Mystical Elf]]".]]

  * "[[Blue-Eyes White Dragon]]" appears in this card's artwork.
  * This monster is the [[signature move]] [[counterpart]] of "[[Mystical Elf]]".
  ** This monster's Japanese name, "Holy Elf - Holy Burst Stream", is based on "Holy Burst Stream", the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "[[Blue-Eyes White Dragon (manga)|Blue-Eyes White Dragon]]" while strengthened by "[[Mystical Elf (manga)|Mystical Elf]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  *** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|076|ref}}, specifically from the panel showing "Mystical Elf" chanting a spell to transfer its 800 [[ATK]] to "Blue-Eyes White Dragon", which attacks the [[Ventriloquist of the Dead]]'s copy of "Blue-Eyes White Dragon".
  *** In the English dubbed version of the ''Yu-Gi-Oh!'' anime, the attack name was changed to "Obliterate", which was also the attack name of "[[Exodia the Forbidden One (anime)|Exodia the Forbidden One]]"; the ''[[TCG]]'' release changed the name to "White Lightning", the normal attack name for "Blue-Eyes White Dragon" in the dub.

