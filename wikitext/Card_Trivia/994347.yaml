title: Card Trivia:Unbreakable Barrier
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's Japanese name is a pun on the Japanese phrase for "I will not lose!" ({{Ruby|絶|ぜっ}}{{Ruby|耐|たい}}{{Ruby|負|ま}}けない！ ''Zettai Makenai!''), said by [[Lucidien Kallister]] before [[activate|activating]] it.
