  * This is based on the [[wikipedia:Splendid alfonsino|splendid alfonsino]], a species of the genus [[wikipedia:Beryx|Beryx]].
  * Like "[[Wattbetta]]", this card is related to a fish. Additionally, both cards' effects involves the opponent [[discard]]ing from their hand.
