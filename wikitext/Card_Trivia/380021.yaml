title: Card Trivia:Secret Blast
wikitext: |-
  {{Navigation}}

  * "[[Goblin Pothole Squad]]" and "[[Aitsu]]", "[[Doitsu]]", "[[Koitsu]]", and "[[Soitsu]]", united as "[[A-Team: Trap Disposal Unit]]", appear in this card's artwork.
  * The events in this card's artwork continues in the artwork of "[[Backup Squad]]".
  ** This card's second effect inflicts exactly 1000 [[Effect damage|damage]], which is what is needed to trigger the effect of "Backup Squad". Also, the aforementioned effect is only triggered when "Secret Blast" is destroyed, which means that it'd triggers "[[Supply Squad]]", another card whose events are continued in the artwork of "Backup Squad".
  * This card is related to "[[Bad Luck Blast]]". This is supported by the presence of the [[Goblin|goblins]] and a bomb in both of their artworks, as well as them having effects that inflict damage.
