title: Card Trivia:Level Warrior
wikitext: |-
  {{Navigation}}

  * This monster's design features three stars in a vertical alignment, reflecting its original [[Level]] (3), which is represented by stars.
  ** In the ''[[Yu-Gi-Oh! 5D's]]'' anime, when this monster is [[Special Summon]]ed as a [[Level 4]] monster via its own effect, it gains an additional star above its head.
