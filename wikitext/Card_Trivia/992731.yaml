title: Card Trivia:Mementotlan Angwitch
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] "[[Memento]]" [[counterpart]] of "[[Fairywitch]]".
  ** Unlike other "Memento" monsters, however, which are depicted in similar poses to their original counterparts, this monster's pose instead resembles that of "[[Mystical Sand]]".
