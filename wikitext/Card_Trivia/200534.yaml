title: Card Trivia:Bounzer Guard
wikitext: |-
  {{Navigation}}

  * "[[Blade Bounzer]]" and "[[Command Knight]]" appear in this card's artwork.
  * This card's effect is similar to the effects of "[[Butterspy Courage]]".
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, both cards are used in a [[Tag-Team Duel]] involving [[Nistro]] and [[Dextra]] where both characters used their respective [[Trap Card]]s to protect their partner, which causes their [[Life Point]]s to be reduced to 0.
