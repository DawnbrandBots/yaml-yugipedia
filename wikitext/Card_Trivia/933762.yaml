title: Card Trivia:Battlin' Boxer Promoter
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Promoter (entertainment)|promoter]] in the sport of [[wikipedia:Boxing|boxing]], who often enters the boxing ring and announces the two fighters before the start of a match.
  ** This monster's effects further reference the promoter's role in combat sports: The promoter will enter the ring ([[Special Summon]]ing itself from the [[hand]]) to announce the two fighters before the start of the match before exiting the ring ([[Tribute|Tributing]] itself to Special Summon two "[[Battlin' Boxer]]" monsters with different names from the [[Deck]]).
