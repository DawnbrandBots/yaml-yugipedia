title: Card Trivia:Fabled Gammajin
wikitext: |-
  {{Navigation}}

  * This monster is based on ''[[wikipedia:Gamigin|Gamigin]]''.

  * This monster's mask also appears in the artwork of "[[Fabled Levilazebul]]", as well as the second artwork of "[[Fabled Lurrie]]".
  ** According to ''[[The Valuable Book EX 5 card storylines#No. 14: "Duel Terminal" World Side Story - The Fomenting Schemes of the Fabled|The Valuable Book EX 5]]'', the mask is cursed, and after the death of "Gammajin", it absorbed his power to summon the souls of those who died in sin and coalesced them into "[[Steelswarm Origin]]", leading to the birth of the "[[lswarm|Evilswarm]]" corruption. However, "Lurrie" managed to retrieve it and gave it to "[[Fabled Leviathan]]", who became "Levilazebul" after wearing it and resisting its influence.
