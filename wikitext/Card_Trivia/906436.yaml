title: Card Trivia:Stained Glass of Light & Dark
wikitext: |-
  {{Navigation}}

  * Stained-glass images depicting "[[Protecting Spirit Loagaeth]]" and an unknown monster appear in this card's artwork.
  * This card's bulleted effects reference two [[Spell Card]]s that are [[Forbidden]] in the ''[[OCG]]''/''[[TCG]]'' (at the time of its release): "[[Graceful Charity]]" and "[[Delinquent Duo]]".
  ** "Graceful Charity": This card allows the player to draw three cards and remove two cards from the [[hand]]; also, that card's artwork features an angelic being represented by the [[Fairy]] [[Type]].
  ** "Delinquent Duo": This card allows the opponent to discard up to two cards; also, that card's artwork features two demonic beings represented by the [[Fiend]] Type.
