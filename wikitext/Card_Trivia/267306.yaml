title: "Card Trivia:Number 105: Battlin' Boxer Star Cestus"
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Numbers Overlay Boost]]" and "[[Seventh Force]]".
  * This monster is named after a [[wikipedia:Cestus|cestus]], a spiked glove, similar to boxing gloves, worn by ancient Greeks during [[wikipedia:Pankration|pankration]], a sporting event featuring empty-hand submission combat, and mixes boxing and wrestling techniques.
  * This monster has a "[[Number C10X]]" [[Card evolutions|upgraded]] form "[[Number C105: Battlin' Boxer Comet Cestus]]".
  * This is the [[signature card]] of [[Alito]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  * This is the only "[[Number 10X]]" monster to support a specific [[archetype]] with its effect.
  * This is the only "Number 10X" monster to never be animated in CGI in the ''Yu-Gi-Oh! ZEXAL'' anime.
