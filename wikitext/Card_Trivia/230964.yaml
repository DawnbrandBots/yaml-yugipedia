title: Card Trivia:Blue Dragon Ninja
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ninjitsu Art of Shadow Sealing]]".
  * This card is the [[Dragon Ninja]] [[counterpart]] of "[[Armed Ninja]]" (whose Japanese translated name is "Blue Ninja").
  ** Fittingly, this card can be [[Summon]]ed using that monster and "[[Ninjitsu Art of Super-Transformation]]".
  * This card was released in the set preceding ''[[Abyss Rising]]'', which is centered around [[WATER]] monsters, just like "[[Red Dragon Ninja]]" was released in the set preceding ''[[Cosmo Blazer]]'', which is centered around [[FIRE]] monsters.
