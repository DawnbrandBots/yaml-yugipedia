title: Card Trivia:SIMM Tablir
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:SIMM|SIMM]] (Single in-line memory module), a type of memory module, Tablus, Inc., a data security company, and a [[wikipedia:Tapir|Tapir]] (''[[TCG]]'' only), which this monster's appearance is based on.
