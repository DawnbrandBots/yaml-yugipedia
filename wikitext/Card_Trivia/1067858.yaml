title: Card Trivia:Galactica Reminiscences
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Reminiscence|Reminiscence]], the act of recollecting past experiences or events.
  * This monster has a rival [[Voidvelg]] [[counterpart]]: "[[Voidvelg Transi]]".
  ** Both are based on the [[signature card]]s of their respective users: [[Yudias Velgear]]'s "[[Galactica Oblivion]]" for this card and [[Zuwijo Zwil Velgear]]'s "[[Voidvelg Requiem]]" for "Voidvelg Transi".
