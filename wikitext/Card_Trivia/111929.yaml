title: Card Trivia:Koa'ki Meiru Ghoulungulate
wikitext: |-
  {{Navigation}}

  * In English, "Ghoul" means a ghost or deceased spirit, while an ''Ungulate'' is a "hoofed animal", hence the portmanteau "Ghoulungulate".
  * With an [[ATK]] of 2500, this is the second strongest [[Zombie]]-[[Type]] [[Monster Cards|monster]] you can [[Special Summon]] with "[[Pyramid Turtle]]'s" effect, the strongest being "[[Skull Flame]]".
  * This card bears a small resemblance to "[[Temple of Skulls]]".
