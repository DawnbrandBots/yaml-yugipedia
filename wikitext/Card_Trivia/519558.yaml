title: Card Trivia:X-Krawler Qualiark
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:qualia|qualia]], which are thought by some philosophers and psychologists to be single instances of subjective, conscious experience.
  * This card, "[[X-Krawler Neurogos|Neurogos]]", and "[[X-Krawler Synaphysis|Synaphysis]]" were the first [[Insect]]-[[Type]] [[Link Monster]]s.
  ** However, this card was revealed first.
  * This is the first monster, and the first card overall, whose effect is dependent upon the player controlling 6 or more monsters, which only became possible with the introduction of the [[Extra Monster Zone]]s and Link Monsters.
