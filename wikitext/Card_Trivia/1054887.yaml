title: Card Trivia:Battleguard Echoes
wikitext: |-
  {{Navigation}}

  * "[[Lava Battleguard]]" and "[[Swamp Battleguard]]" appear in this card's artwork.
  ** This card's effect to [[add]] "[[Battleguard Rage]]" or "[[Battleguard Howling]]" is based on how each card's artwork depicts one of the aforementioned monsters bellowing a powerful roar similar to how they are depicted in this card's artwork.
