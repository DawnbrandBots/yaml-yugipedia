title: Card Trivia:Bird of Paradise Lost
wikitext: |-
  {{Navigation}}

  * This card's name is based on both the [[wikipedia:Bird-of-paradise|Bird-of-paradise]] and the epic poem ''[[wikipedia:Paradise Lost|Paradise Lost]]'' by [[wikipedia:John Milton|John Milton]].
  ** This card's Japanese name, ''Gokurakuchō'' (獄落鳥, lit. "Hell Fallen Bird"), is a homophone of ''Gokurakuchō'' (極楽鳥, lit. "paradise bird").
  * The background of this card's artwork is similar to those of the "[[Burning Abyss]]" cards.
