title: Card Trivia:Advanced Heraldry Art
wikitext: |-
  {{Navigation}}

  * "[[Heraldic Beast Aberconway]]", "[[Heraldic Beast Berners Falcon]]", and two international artwork versions of "[[Spellbinding Circle]]" appear in this card's artwork.
  ** Fittingly, both "Aberconway" and "Berners Falcon" were the monsters targeted by this card's effect during their first appearance in {{episode|ZEXAL|054|ref}}.
