title: Card Trivia:Superheavy Samurai Warchief Heavystrong
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's Japanese name, "Superheavy War God Fudomyo-O" (超重武神フドウミョウ－Ｏ, ''Chōjūbushin Fudōmyō-Ō'') is a pun on [[wikipedia:Acala|Fudō Myōō]], the wrathful and protective deity in [[wikipedia:Buddhism in Japan|Japanese Buddihsm]].
  ** This monster's name references the "Heavystrong Style", an [[Action Duel#Action Duel Styles|Action Duel Style]] used by [[Gong Strong]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime where the Duelist remains stationary and doesn't move, even when receiving a monster's attack. Its Japanese name features the word "Fudo" in "'''Fudo'''myo-O", which is based on the original Japanese name of the Action Duel Style, "'''''Fudo''' no Dyueru''".
