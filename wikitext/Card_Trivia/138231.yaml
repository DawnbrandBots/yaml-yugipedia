title: Card Trivia:Accumulated Fortune
wikitext: |-
  {{Navigation}}

  * The background of this card looks vaguely similar to "[[Book of Taiyou]]".
  * Like "[[Miraculous Rebirth]]", this card replicates the effect of a [[Forbidden]] card (in this case, "[[Pot of Greed]]"), but requires a Chain Link of 4 or higher to activate.
