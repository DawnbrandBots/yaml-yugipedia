title: Card Trivia:Dominus Purge
wikitext: |-
  {{Navigation}}

  * The red-haired girl and the creature in this card's artwork appear in the artwork of "[[Songs of the Dominators]]".
  * This card is the [[counterpart]] of "[[Dominus Impulse]]":
  ** Both can be [[activate]]d from the player's [[hand]] if their opponent [[control]]s a card to [[negate]] an effect.
  ** Both can [[destroy]] the negated cards if the player has a [[Trap Card]] in their [[Graveyard]].
  ** Both prevent the player from activating the effects of monsters with three [[Attribute]]s for the rest of the [[Duel]] if activated from the hand; in this card's case, the three Attributes are [[DARK]], [[WATER]], and [[FIRE]].
