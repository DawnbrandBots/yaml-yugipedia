title: Card Trivia:Jurrac Dino
wikitext: |-
  {{Navigation}}

  * This card's name is based off of the dinosaur [[wikipedia:Deinonychus|Deinonychus]]. However, it is missing the large toe claw seen on the real animal, and in some respects, it resembles more of a [[wikipedia:Ceratosaurus|Ceratosaurus]].
