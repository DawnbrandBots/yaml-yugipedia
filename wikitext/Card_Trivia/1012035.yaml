title: Card Trivia:Floowandereeze & Toccan
wikitext: |-
  {{Navigation}}

  * This monster's name and design is based on the [[wikipedia:Toco toucan|toco toucan]], a species of bird found in [[wikipedia:South America|South America]].
  ** Fittingly, the background of this card's artwork depicts the [[wikipedia:Amazon River|Amazon River]] marked on South America on the map appearing in the artwork of "[[Floowandereeze and the Magnificent Map]]".
