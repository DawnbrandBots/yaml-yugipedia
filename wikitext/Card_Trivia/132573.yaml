title: Card Trivia:Mirror of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * The 3 heads of "[[Trishula, Dragon of the Ice Barrier]]" appear on the mirror's frame in this card's artwork.
  * This card's effect refers to the fact that it is a mirror; if your opponent banishes 1 of your cards, this card banishes 2 of their cards in return.
  * Even though this card directly counters the effect of "Trishula, Dragon of the Ice Barrier", the "Mirror" fails against the monster, as explained in the [[Master Guide 3 card storylines#And the World...|Master Guide 3 card storylines]].
  * While it can be applied to other situations, this is the first card designed to hinder another card within its own archetype.
  * This mirror is part of a staff, which is being wielded in the artwork of "[[Prior of the Ice Barrier]]".
  * This mirror, broken and warped, can be found on the tail of "[[Evilswarm Ouroboros]]".
