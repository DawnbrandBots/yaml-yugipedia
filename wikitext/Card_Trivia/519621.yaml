title: Card Trivia:X-Krawler Synaphysis
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[World Legacy Clash]]" and "[[World Legacy Pawns]]".
  * This card is named after [[wikipedia:synapse|synapses]], the connections between [[wikipedia:neuron|neurons]].
  * This card, "[[X-Krawler Neurogos|Neurogos]]", and "[[X-Krawler Qualiark|Qualiark]]" were the first [[Insect]]-[[Type]] [[Link Monster]]s.
  ** However, "Qualiark" was revealed first.
