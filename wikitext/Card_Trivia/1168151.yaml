title: Card Trivia:Necro Shot
wikitext: |-
  {{Navigation}}

  * This card is similar to "[[Spark Blaster]]", as they are both [[Equip Spell Card]]s that destroy themselves after their effects have been used 3 times.
  ** Coincidentally, both cards were used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
