title: Card Trivia:Witty Phantom
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Djinn Death-Satan", is based on [[wikipedia:Satan|Satan]], an entity in the Abrahamic religions that seduces humans into sin or falsehood.
  ** In the ''[[Yu-Gi-Oh!]]'' anime, this monster's [[Witty Phantom (character)|character version]] within [[KaibaCorp]]'s ''[[Legendary Heroes]]'' game is a sadist who likes to mock and torture his prisoners not unlike other characters in the Satanic archetype, although he is primarily based on [[Maximillion Pegasus]].
