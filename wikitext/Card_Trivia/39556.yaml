title: Card Trivia:Dandylion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Beginner's Edition 2 (2011)]]'', ''[[Deck Custom Pack 01]]'', and ''[[Starter Pack Volume 3]]''.
  * This monster appears in the artwork of "[[Fragrance Storm]]".
  * This monster's name is a portmanteau of the words "[[wikipedia:Taraxacum|dandelion]]", "dandy", and "[[wikipedia:Lion|lion]]".
  ** This monster is a combination of a dandelion and a lion, with its yellow petals serving as its mane. The word "dandelion" is also derived from the French "''dent de lion''", meaning "lion's tooth".
  ** This monster's [[WIND]] [[Attribute]] and effect to [[Special Summon]] two "[[Fluff Token]]s" if it is [[sent]] to the [[Graveyard]] is a reference to how a dandelion disperses its fluffy seeds, which can be carried along with the wind.
  * This monster has a [[retrained]] counterpart: "[[Dandy Whitelion]]".
  * This monster shares similarities with "[[Horseytail]]":
  ** Both of their names are puns based on real-life plants.
  ** Both have an effects revolving around Summoning [[Plant]] [[Token Monster]]s when sent to the Graveyard.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster was designed by [[Jaden Yuki]] for a contest hosted by [[Kaiba Corp]].
  * This monster is male, as confirmed in [http://www.pojo.biz/board/showpost.php?p=17686026&postcount=61 a post] by [[Kevin Tewart]].
  * According to the ''GX Duel Memorial Album: Extra Edition'', this monster exists in the world of the "[[HERO]]" monsters, being part of a team that supports the "HERO" monsters alongside the likes of "[[Wroughtweiler]]" and "[[Card Trooper]]".<ref>[https://ygorganization.com/gxduelmemorialalbum000/ GX Duel Memorial Album: Extra Edition]</ref>
