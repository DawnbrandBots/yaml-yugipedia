title: Card Trivia:Graceful Charity
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster Chronicle]]''.
  * The angel in this card's artwork also appears in the artworks of "[[Enervating Mist]]", "[[Graceful Tear]]", "[[Mistaken Arrest]]", "[[Peeking Goblin]]", and "[[Shared Ride]]".
  * This card has an [[anime-only]] [[Trap Card|Trap]] [[counterpart]]: "[[Disgraceful Charity]]".
  ** This card's Over Rush Rare artwork is based on the artwork of "Disgraceful Charity".
  * This card has a [[Bubble Actress]] counterpart: "[[Cornful Charity]]".
  ** This card also has a [[Celeb Rose]] counterpart: "[[Celeb Charity]]".
