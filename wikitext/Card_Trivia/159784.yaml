title: Card Trivia:Psychic Nightmare
wikitext: |-
  {{Navigation}}

  * Excluding "[[Gusto]]" monsters, this card is one of the few existing [[Psychic]]-Type monsters which do not require you to pay [[Life Points]] to activate its effects.
  * This card's effect is related to its Type, as you have to guess what card is in your opponent's hand. [[wikipedia:Psychic|Psychic]] is a term used for people who have mind powers.
  * This monster's appearance resembles that of a manticore.
  * The Spanish print of this card has an error in its lore, as it says "''...y adivinar '''que''' tipo...''" instead of "''...y adivinar '''qué''' tipo...''"
