title: Card Trivia:Icicle Token
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This [[Token]] monster resembles an ice sculpture of a [[wikipedia:Moai|Moai]], a series of monolithic stone human figures located on [[wikipedia:Easter Island|Easter Island]]. They are often seen with their heads above the surface of the ground while the rest of the body is buried underneath the Earth.
