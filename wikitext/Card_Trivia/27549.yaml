title: Card Trivia:Witch Doctor of Sparta
wikitext: |-
  {{Navigation}}

  * This card's name references the ancient Greek City-State, Sparta, which at one point in time happened to be part of the Roman Empire. This ties in with this card's use in [[Gladiator Beast]] decks, which reference ancient Rome heavily.
  * This card's art and name are somewhat similar to "[[Witch Doctor of Chaos]]".
