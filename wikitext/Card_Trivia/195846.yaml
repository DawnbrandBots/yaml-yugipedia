title: Card Trivia:Revival of Dokurorider
wikitext: |-
  {{Navigation}}

  * "[[Dokurorider]]" and "[[Wasteland]]" appear in this card's artwork.
  ** The flag held by "Dokurorider" features the kanji「怒苦露」written on it, which is an ''[[wikipedia:Ateji|ateji]]'' rendering of the word "''dokuro''", the Japanese word for "skull".
  * This is the first [[Ritual Spell Card]] released in the ''[[OCG]]''.
