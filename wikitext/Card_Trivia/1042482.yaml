title: Card Trivia:Millennium Ankh
wikitext: |-
  {{Navigation}}

  * This cross appears on the chest of "[[The Unstoppable Exodia Incarnate]]".
  * This card is based on the [[Millennium Key]], which is used by [[Shimon Muran]] to Summon "[[Exodia]]" and battle [[Zorc Necrophades]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** Similar to the Millennium Key, this cross is based on an [[wikipedia:Ankh|ankh]], the Ancient Egyptian symbol of life; however, its design features the [[Eye of Wdjat]] instead of a typical loop. This likely references how the Millennium Key is the only [[Millennium Item]] to not feature the Eye of Wdjat in its design.
