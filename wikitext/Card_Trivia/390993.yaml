title: Card Trivia:Invoked Caliga
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Omega Summon]]".
  * This monster is named after the [[wikipedia:Roman emperor|Roman emperor]] [[wikipedia:Caligula|Caligula]].
  ** Caligula is identified with one of the seven heads of the [[wikipedia:The Beast (Revelation)|Beast of Revelation]], as well as the number "616" (an alternative to "666" as the [[wikipedia:Number of the beast|number of the beast]]).
  *** This refers to how [[wikipedia:Aleister Crowley|Aleister Crowley]] identified himself as "[[wikipedia:Therion (Thelema)|The Beast 666]]".
  * This card has the same [[Level]], [[Attribute]], [[ATK]] and [[DEF]] as "[[Aleister the Invoker]]".
  ** This monster has a similar cloth patterns with "Aleister", which can assumed that this monster is a mutated version of "Aleister".
  ** The artwork of "[[Aleister the Invoker of Madness]]" depicts the transformation of "Aleister" into this monster.
