title: Card Trivia:Cyberse Wicckid
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of [[wikipedia:Wicca|Wicca]], [[wikipedia:Wickedness|wicked]], and [[wikipedia:Child|kid]].
  * This card has several similarities to "[[Cyberse Witch]]" and "[[Clock Spartoi]]".
  ** "Cyberse Witch"
  *** They both have an effect that can add a different [[Cyberse]] monster card type ([[Tuner monster|Tuner]] and [[Ritual Monster|Ritual]], respectively) from the Deck to the hand by banishing a card type (Cyberse monster and [[Spell Card|Spell]], respectively) from the Graveyard when a monster is Special Summoned to a zone it points to.
  ** "Clock Spartoi"
  *** They both have [[Bottom-Center Link Arrow cards|Bottom-Center]] and [[Bottom-Right Link Arrow cards|Bottom-Right]] [[Link Arrow]]s.
  ** "Cyberse Witch" and "Clock Spartoi"
  *** They all share the same [[ATK]], [[Link Rating]], [[Type]], and [[Attribute]].
  *** They all have a Bottom-Center Link Arrow.
  *** They all require 2 Cyberse monsters to be [[Link Summon]]ed.
  *** They all have an effect that activates when a monster is Special Summoned to a zone it points to (except during the Damage Step).
  *** They all have an effect that can add a card used for a different type of Summoning ([[Synchro Summon|Synchro]], [[Ritual Summon|Ritual]] and [[Fusion Summon|Fusion]], respectively) from the Deck to the hand.
