title: Card Trivia:Dice Key Nel
wikitext: |-
  {{Navigation}}

  * "[[Dice Key Kuu]]" appears in this card's artwork.
  * This monster's Japanese name (ネル, ''Neru'') is a pun on the word "sleep" ({{Ruby|寝|ね}}る, ''Neru''), which reflects this monster's sleepy expression and the set of pajamas it is wearing.
