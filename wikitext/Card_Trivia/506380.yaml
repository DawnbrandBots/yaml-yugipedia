title: Card Trivia:Yomi Ship
wikitext: |-
  {{Navigation}}

  <!--Not to be confused with, or mislabeled as, a solar barge. Solar barges are a different shape. Also, Ancient Egyptian royal ships is a poor fit, since there are many model boats that do not resemble said uncovered boats-->
  * This monster is based on an [[wikipedia:Ancient Egyptian funerary practices|ancient Egyptian funerary boat]], as indicated by the following:
  ** [[wikipedia:Yomi|Yomi]] in this card's name is the Japanese word for the [[wikipedia:Underworld|land of the dead]].
  ** Jackal-headed figures are depicted rowing the ship. In ancient Egypt, [[wikipedia:Jackal|jackals]] were closely associated with the underworld, as those animals were observed roaming cemeteries and burial grounds.
  ** An [[wikipedia:Ancient Egyptian coffins|rectangular ancient Egyptian coffin]] is located under a canopy on the ship.
  ** The ship has a single steering oar lashed to a post<!--There are many ways to describe this, such as steering-post, rudder-post, stanchion, sternpost, etc., but no single agreed-upon term-->, alongside what is possibly a raised platform for a [[wikipedia:Helmsman|helmsman]] to guide the ship.
  *** The single steering oar possibly dates this ship's design to the [[wikipedia:Middle Kingdom of Egypt|Middle Kingdom of Egypt]].<ref>{{cite book |last=Reisner |first=George |date=1913 |title=Models of Ships and Boats |publisher=Le Caire: Institut Français d'Archéologie Orientale |location=Cairo, Egypt |page=''ix'' |quote=The models representing river boats of the later or Middle Empire type (Type II) all have the same general form of hull, marked by... the single steering oar.}}</ref>
  ** In {{episode|Yu-Gi-Oh!|220|ref}}, this card's artwork is overlaid in the background while [[Ishizu Ishtar]] explains that in ancient Egypt, it was believed that ships carried kings and people back to the gods, as they journeyed from the world of the living to the land of the dead.

