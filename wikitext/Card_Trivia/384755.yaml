title: Card Trivia:Assault Blackwing - Onimaru the Divine Thunder
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Black Feather Reversal]]".
  * This monster's name is based on the "Onimaru Kunitsuna", a famous Japanese sword used by the [[wikipedia:Hōjō clan|Hojo clan]] during the [[wikipedia:Kamakura period|Kamakura period]] of Japan.
  ** "Divine Thunder" is based on a [[wikipedia:thunderbolt|thunderbolt]], the symbolic representation of lightning accompanied by a thunderclap, which is reflected in this monster's lightning bolt design.
  * This monster has the highest [[Level]] (12) of all [[Winged Beast]] [[monster]]s.
  * This is the first Level 12 [[Synchro Monster]] that can be [[Synchro Summon]]ed by using generic [[Synchro Material]]s, including only one non-[[Tuner monster]].
  * This is the first Synchro Monster to feature a "[[Only once per Duel]]" effect.
