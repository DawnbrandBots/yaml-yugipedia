title: Card Trivia:Sea Stealth Attack
wikitext: |-
  {{Navigation}}

  [[File:Jonouchi locates the fisherman.png|thumb|250px|"[[The Legendary Fisherman (manga)|The Legendary Fisherman]]" about to attack "[[Panther Warrior (manga)|Panther Warrior]]".]]

  * This card appears in the artwork of "[[Dark Time Wizard]]".
  * "[[The Legendary Fisherman]]" and "[[Panther Warrior]]" appear in this card's artwork.
  ** This card's artwork is based on a panel from {{chapter|Yu-Gi-Oh!|181|ref}} where [[Ryota Kajiki (manga)|Ryota Kajiki]] uses his "Sea Stealth Attack" against [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]] during his final turn where he used "[[The Legendary Fisherman (manga)|The Legendary Fisherman]]" to [[attack]] Jonouchi's "[[Panther Warrior (manga)|Panther Warrior]]".
  *** This card's effect to [[banish]] a [[WATER]] monster the player [[control]]s for one turn while "[[Umi]]" is on the [[field]] is likely a reference to Ryota's strategy of having his monsters hide underwater in the [[Ocean]].
  * Strangely, in this card's international artwork, the harpoon wielded by "The Legendary Fisherman" was not edited.

