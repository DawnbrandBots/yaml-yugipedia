title: Card Trivia:Assault Dog
wikitext: |-
  {{Navigation}}

  * This monster's design is based on a [[wikipedia:Doberman Pinscher|Doberman Pincher]], a breed of dog that is most often used in police forces, keeping in relation with the law enforcement theme of [[Tetsu Trudge]]'s [[Deck]].
  * This monster shares the same Japanese naming scheme and [[Special Summon]]ing effect with "[[Infernal Blasthound]]", whose Japanese name is "Hell Gundog".
