  {{Navigation}}

  * [[wikipedia:Secutor|Secutore]] is a kind of fighter which was a variant of the [[wikipedia:Murmillo|Murmillo]], designed specially to be paired against [[wikipedia:Retiarius|Retiarii]] [[wikipedia:gladiator|gladiators]].
  * This monster appears in the artwork of "[[Gladiator's Return]]".
