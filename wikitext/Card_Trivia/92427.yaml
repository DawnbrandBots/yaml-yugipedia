title: Card Trivia:Destiny End Dragoon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Fusion Destiny]]".
  * This monster is based on a [[wikipedia:Dragoon|dragoon]], a class of [[wikipedia:Mounted infantry|mounted infantry]] that was trained in the use of [[wikipedia:Firearm|firearms]], specifically a one-handed type of blunderbuss reputedly called a "dragon"; this firearm may be the basis for the design of the dragon-headed weapon on this monster's left arm.
  * This monster's Japanese name, "Dragoon D-END", and its ''[[OCG]]'' names are a pun on "The End"; in the ''[[Yu-Gi-Oh! GX]]'' anime, this was known as the "Final D Card" and was the last "[[Destiny HERO]]"-related card to appear in the anime, additionally marking the ''end'' of the "[[Destiny HERO]]" [[archetype]] in the ''Yu-Gi-Oh! GX'' era.
  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * This monster is the "Destiny HERO" [[counterpart]] of "[[Elemental HERO Flame Wingman]]".
  ** Both are [[Fusion Monster]]s that served as the [[signature card]]s of [[Aster Phoenix]] and [[Jaden Yuki]] respectively in the ''Yu-Gi-Oh! GX'' anime.
  ** Both monsters have an arm cannon shaped like the head of a dragon, with the cannon of "Flame Wingman" being on its right arm and the cannon of "Destiny End Dragoon" being on its left arm.
  ** Both monsters have an effect that inflicts [[damage]] to the opponent equal to the [[destroy]]ed monster's [[ATK]]; however, "Destiny End Dragoon" prevents the player from conducting their [[Battle Phase]] when it destroys a monster this way, while the effect of "Flame Wingman" only activates when it destroys a monster in battle.
  * This monster shares the same [[Attribute]] ([[DARK]]), [[Level]] (10), [[Type]] ([[Warrior]]), and [[original ATK and DEF]] (3000/3000) as "[[Destiny HERO - Dusktopia]]".
  ** Both monsters were used by Aster Phoenix and his [[Aster Phoenix (ARC-V)|alternate dimension counterpart]] in the ''Yu-Gi-Oh! GX'' anime and the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  ** In addition, both monsters have opposite effects: this monster's effect can destroy monsters and inflict damage equal to the [[ATK]] of that monster on the field, while the effects of "Dusktopia" can protect monsters from destruction and prevent [[battle damage]] from battles involving that monster.
