title: Card Trivia:Nekroz of Areadbhair
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Selection 10]]''.
  * This monster is an adult version of "[[Shurit, Strategist of the Nekroz]]", wearing armor styled after "[[Dragunity Knight - Areadbhair]]".
  ** This appears to be the oldest version among his [[Ritual Monster]] forms ("[[Nekroz of Clausolas|Clausolas]]", "[[Nekroz of Brionac|Brionac]]", and "[[Nekroz of Trishula|Trishula]]").
  * This monster has the highest [[ATK]] (3300) and [[DEF]] (3200) of all [[WATER]] monsters.
  ** It is tied with "[[Nekroz of Decisive Armor]]" and "[[White Aura Bihamut]]" for the highest ATK of all WATER monsters.
  * This monster is the only Ritual Monster form of "[[Shurit, Strategist of the Nekroz]]" whose Level is not divisible by 3.
