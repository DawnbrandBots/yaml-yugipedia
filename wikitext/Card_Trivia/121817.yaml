title: Card Trivia:Attrition
wikitext: |-
  {{Navigation|mode=NonGame}}

  * This card's artwork is similar to those of "[[Polymerization]]" and other similar "[[Fusion (archetype)|Fusion]]" [[Spell Card]]s.
  * This card's name is a reference to [[wikipedia:Attrition warfare|attrition warfare]], a military strategy consisting of multiple attempts to win the war by wearing down enemy troops, which is reflected in this card's effect.
