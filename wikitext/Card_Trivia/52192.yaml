title: Card Trivia:Tempest Magician
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Endymion's Lab]]" and "[[That Wacky Magic!]]"
  * This monster is "[[Magical Exemplar]]" wielding the scythe of "[[Night's End Sorcerer]]". The bats in the artwork of "Night's End Sorcerer" are also present in the art of this card.
  ** This appears to imply the "Tempest Magician" is canonically Synchro Summoned using "Magical Exemplar" and "Night's End Sorcerer" as Synchro Material (which would be valid as the sole Synchro Materials for its Synchro Summon).
  ** These three cards all debuted as [[TCG exclusive|TCG-exclusive]] cards in 2008.
  * This is the first [[Synchro Monster]] to be released as a promotional card in a [[Special Edition]] product. It was a promotional card in ''[[Stardust Overdrive: Special Edition]]''.
