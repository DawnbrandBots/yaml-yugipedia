title: Card Trivia:Fusion Destiny
wikitext: |-
  {{Navigation}}

  * "[[Destiny End Dragoon]]", "[[Destiny HERO - Dogma]]", and "[[Destiny HERO - Plasma]]" appear in this card's artwork.
  * This card's effect that limits the player from [[Special Summon]]ing anything but [[DARK]] "[[HERO]]" monsters after resolving is likely based on the fact that [[Aster Phoenix]] uses "[[Destiny HERO]]" monsters by in the ''[[Yu-Gi-Oh! GX]]'' and ''[[Yu-Gi-Oh! ARC-V]]'' anime, and also uses "[[Vision HERO]]" monsters in the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga. Both [[archetype]]s contain DARK [[Attribute]] monsters and are very compatible with other "HERO" [[Deck]]s.
