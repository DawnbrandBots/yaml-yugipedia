title: Card Trivia:Invader of Darkness
wikitext: |-
  {{Navigation|Invader of Darkness}}

  * This monster appears in the artwork of several cards, commonly depicting his battle against "[[Marauding Captain]]" and "[[Gagagigo]]":
  ** "[[Absolute End]]"
  ** "[[Spirit Barrier]]" (where he is shown attacking one of the men of "Marauding Captain", but "Gagagigo" is standing in the way).
  ** "[[Penalty Game!]]"
  ** "[[Memory of an Adversary]]" (apparently having been defeated by "[[Gogiga Gagagigo]]")
  ** "[[Unified Front]]" (fighting "Gagagigo" and "Marauding Captain", alongside "[[Blazing Inpachi]]")
  * The appearance of the "Invader of Darkness" loosely resembles the [[wikipedia:Fantastic Four|Fantastic Four]]'s archenemy, [[wikipedia:Doctor Doom|Dr. Doom]].
  * This card shares its name with the ''OCG'' [[Booster Pack]] it was released in, ''[[Invader of Darkness (set)|Invader of Darkness]]''.
