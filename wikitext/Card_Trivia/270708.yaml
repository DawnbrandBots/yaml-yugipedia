title: Card Trivia:Brotherhood of the Fire Fist - Caribou
wikitext: |-
  {{Navigation}}

  * In the OCG, this card is named after ''[[wikipedia:Qin Ming|Qin Ming]]'' (read in Japanese as Shin Mei), "banteng" (banten) and "reindeer" (reindia).
  ** ''Qin Ming'' ranks 7th of the 36 Heavenly Spirits of the 108 [[wikipedia:Water Margin|Liangshan heroes]] and is nicknamed "Fiery Thunderbolt".
  * This monster appears in "[[Fire Formation - Yoko]]"  and "[[Five Brothers Explosion]]".
  ** Although still being in an OCG card, this monster first appearance in the TCG was in this card's artwork.
