title: Card Trivia:Back to Square One
wikitext: |-
  {{Navigation}}

  * "[[Goblin Attack Force]]", "[[Man-Thro' Tro']]", and the green creatures from the international artwork of "[[Taunt]]" appear in this card's artwork.
  ** "Man-Thro' Tro'" is depicted holding a baby bundle, likely because it landed on a "child is born" space.
  * This card's artwork depicts a board game based on ''[[wikipedia:The Game of Life|The Game of Life]]''.
  ** The events in this card's artwork are continued in the artwork of "[[Lose 1 Turn]]".
  * This card's name is based on its effect to place a monster to the top of a player's [[Deck]], which can be considered "square one".
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Back to Square One]]".
