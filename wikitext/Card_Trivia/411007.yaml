title: Card Trivia:Blazing Mirror Force
wikitext: |-
  {{Navigation}}

  * This card's artwork is the complete opposite of that of "[[Storming Mirror Force]]".  Not only are their positions mirrored, but this card's one has a wind attack striking a fire barrier, while "Storming Mirror Force's" one has a fire attack striking a wind barrier.
  * This card's [[effect]] to inflict [[damage]] to both players is probably based on "[[Ring of Destruction]]".
