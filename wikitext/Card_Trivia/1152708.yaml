title: Card Trivia:End of the World Ruler
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[counterpart]] of "[[Demise, Supreme King of Armageddon]]" wearing armor based on "[[Ruin, Supreme Queen of Oblivion]]".
  ** This monster's Japanese base name, "Ruler of Destruction and Armageddon", is a reference to the names of the two aforementioned [[Ritual Monster]]s. 
  ** Fittingly, this monster's [[original ATK and DEF]] (3000/2900) are an inverse of "Ruin, Supreme Queen of Oblivion", which makes this monster have the same [[ATK]] as "Demise, Supreme King of Armageddon".
  ** This monster's effect to gain 2900 ATK is likely based on the effect shared by all three forms of "[[Ruin & Demise|Ruin]]" to gain a second attack, whereas attacking after it gains ATK basically means to emulate an additional attack dealt by "Ruin, Supreme Queen of Oblivion" in terms of total [[damage]].
  * Given its release in ''[[Duelist Box: Prismatic Summon]]'', a product meant to celebrate historically iconic monsters from each Summoning method, this monster is likely based on the classic [[Demise OTK]], which used "[[Advanced Ritual Art]]" to [[Ritual Summon]] the original "Demise, King of Armageddon" by sending [[Insect]] [[Normal Monster]]s to the [[Graveyard]], which combined with "[[Doom Dozer]]" and "[[Megamorph]]", would result in an [[OTK]].
  ** This monster's effect allows it to achieve the same by copying "Advanced Ritual Art" from the Deck, and does not require "Megamorph" to perform the OTK, since this monster's ATK increase combined with "Doom Dozer" deals enough damage on its own.
