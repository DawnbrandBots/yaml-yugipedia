title: Card Trivia:Evolzar Laggia
wikitext: |-
  {{Navigation}}

  * This card's name 'Laggia' comes from the dinosaur genus ''[[wikipedia:Unenlagia|Unenlagia]]''.
  * This card's effect is similar to the effect of "[[Solemn Judgment]]", except that it can't [[negate]] [[Flip Summon]]s and [[Counter Trap Card]]s.
  ** As "Evolzar Laggia" is the Xyz version of "Solemn Judgment", "[[Evolzar Dolkka]]" is the Xyz Version of "[[Divine Wrath]]" and "[[Evolzar Solda]]" seems to be the Xyz version of "[[Black Horn of Heaven]]".
  * This is the first card to be able to detach all of its [[Xyz Material]]s at once.
  * This is the first [[Dragon]]-[[Type]] monster to support the Dinosaur-Type.
  * This is the first "[[Evolzar]]" monster; second being "Evolzar Dolkka" and the third being "Evolzar Solda".
  ** This card's title 'Evolzar' comes from the words "Evol" and "Czar", the latter being the Russian equivalent of a [[wikipedia:Monarch|king]]. Hence, this card and the others "Evolzars" are the Kings of the "Evol" monsters.
  * This monster appears in the artworks of "[[Xyz Frame]]" and "[[Evo-Singularity]]".
  * In the bottom-right corner of this card's artwork is what appears to be a depiction of [[wikipedia:human evolution|human evolution]].
