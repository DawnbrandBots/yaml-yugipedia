title: Card Trivia:Subsurface Stage Divers
wikitext: |-
  {{Navigation}}

  * Three copies of "[[Beautunaful Princess]]" and "[[Nimble Manta]]" appear in this card's artwork.
  * This card's Japanese name, "{{translated name|Subsurface Stage Divers|ja}}" ({{name|Subsurface Stage Divers|ja}}, ''{{romanized name|Subsurface Stage Divers|ja}}'') is a variation of the idiom "the early bird gets the worm".
