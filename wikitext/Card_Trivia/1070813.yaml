title: Card Trivia:Kuebiko
wikitext: |-
  {{Navigation}}

  * This card is based on ''[[wikipedia:Kuebiko|Kuebiko]]'', the [[wikipedia:Shinto|Shinto]] deity of folk wisdom, knowledge, and agriculture—typically depicted as a scarecrow that cannot walk but has comprehensive awareness.
  * This card is similar to "[[Scrap-Iron Scarecrow]]", another scarecrow-themed [[Trap Card]] that can disrupt an opponent's monster, [[Set]] itself after [[activate|activation]], and can only be activated [[once per turn]].
