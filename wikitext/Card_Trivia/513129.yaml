title: Card Trivia:Skull Knight
wikitext: |-
  {{Navigation|other=[[Skull Knight (character)|Character]]}}

  * This monster appears in the artwork of "[[Dark Supremacy]]".
  * This monster has a promotional caricature [[counterpart]]: "[[Yasushi the Skull Knight]]".
  * Despite its ''[[TCG]]'' name, this monster is not a counterpart of "[[Skull Knight 2|Skull Knight #2]]".
  ** This monster's Japanese name is "Skull Bishop" (スカルビショップ ''Sukaru Bishoppu''), while the Japanese name of "Skull Knight #2" is "Skull Knight" (スカル・ナイト ''Sukaru Naito''); both also have different [[Type]]s, [[ATK]], and [[DEF]].
  * This is the first [[Fusion Monster]] to not share a Type with either of its [[Fusion Material]]s.
