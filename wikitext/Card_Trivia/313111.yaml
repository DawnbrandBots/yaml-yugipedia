title: Card Trivia:Yang Zing Brutality
wikitext: |-
  {{Navigation}}

  * This card's artwork shows "[[Taotie, Shadow of the Yang Zing]]" merging with "[[Jiaotu, Darkness of the Yang Zing]]" (or at least its armor from "[[Shaddoll Squamata]]") to form "[[Yazi, Evil of the Yang Zing]]".
  ** This is accurate to the real game, as "Yazi" can be [[Synchro Summon]]ed by using "Jiaotu" and "Taotie" as [[Synchro Material Monster|materials]].
  * The golden snake-like object that was formerly coiled around "Shaddoll Squamata" and then Jiaotu is shown to be coiling around Taotie's tail and is present there still after its transformation into Yazi.
