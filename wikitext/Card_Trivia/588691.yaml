title: Card Trivia:Deus X-Krawler
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[World Legacy Monstrosity]]".
  * This card has the highest [[DEF]] of all [[Insect]] monsters (tied with "[[Perfectly Ultimate Great Moth]]" and "[[Earthbound Immortal Uru]]").
  * This card's name is based on the [[wikipedia:Deus ex machina|Deus ex machina]].
  * The kanji сђїТЕЪТђфуЦъсђЇ (''Kikaishin'', "Machine Strange God"; read as "Deus") in this card's Japanese name is a pun on сђїТЕЪТб░уЦъсђЇ (''Kikaishin'', "Machine God"), with the kanji сђїТђфсђЇ (''Kai'', "strange"; has connotations of "monster") being a homophone of сђїТб░сђЇ (''Kai'', "Machine").
