title: Card Trivia:Einvy the Irreverent
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "[[Wikipedia:Envy|envy]]" and "[[Wikipedia:Hedera|ivy]]".
  ** "Envy" is an emotion characterized by resentment toward another person's qualities, skills, or possessions and desire to possess them. The emotion is commonly associated with the color green (i.e., "green with envy," which describes someone who is jealous), reflecting this monster's green color scheme.
