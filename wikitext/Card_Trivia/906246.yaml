title: Card Trivia:Sylvan Dancepione
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Pione (grape)|Pione]], a grape that grows in [[wikipedia:Japan|Japan]].
  ** The kanji ''Butōko'' ({{Ruby|舞|ぶ}}{{Ruby|踏|とう}}{{Ruby|娘|こ}}) in this card's Japanese name is a pun on ''Butō'' ({{Ruby|舞|ぶ}}{{Ruby|踏|とう}}, "dance") and ''Budou'' (ブドウ, "grape").
  * This card's [[ATK]] (1200) and reveal date ([https://twitter.com/YuGiOh_OCG_INFO/status/1476931215408214019 on Twitter] at midnight on Saturday, January 1, 2022 [[wikipedia:Japan Standard Time|JST]]) are a reference to the New Year's tradition of the [[wikipedia:Twelve Grapes|Twelve Grapes]] in Spain, which involves eating twelve grapes at midnight, one at each chime of the clock, for each month of the year to come, to bring good luck and prosperity.
