title: Card Trivia:Golden Flying Fish
wikitext: |-
  {{Navigation}}

  * This monster is possibly based on the Golden Fish from the Russian fairy tale, ''[[wikipedia:The Tale of the Fisherman and the Fish|The Tale of the Fisherman and the Fish]]''.
  * This is the first [[LIGHT]] [[Fish]] monster.
  * This monster is related to "[[Metabo-Shark]]" and "[[Royal Swamp Eel]]", as they are all [[Level 4]] Fish monsters who originally debuted as ''[[TCG]]''-[[TCG exclusive|exclusive]] [[Super Rare]] cards in different [[Core Booster|Core Booster packs]] with the same [[set number]], that being "????-EN086".
