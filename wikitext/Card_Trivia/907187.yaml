title: Card Trivia:Heavy Roller
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Roller (agricultural tool)|rollers]] used in some sports to flatten the ground of the playing field between or during matches.
  * This card has 3 [[Attribute]] counterparts, each corresponding to one of the [[Goha Six]]:
  ** [[WIND]], for [[Yuro Goha]]: "[[Atrium's Wind]]"
  ** [[WATER]], for [[Yujin Goha]]: "[[Dolphin's Treasure Chest]]"
  ** [[EARTH]], for [[Yuran Goha]]: "[[Telegraphed Strike]]"
