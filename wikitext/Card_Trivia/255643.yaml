title: Card Trivia:Burner, Dragon Ruler of Sparks
wikitext: |-
  {{Navigation}}

  * This monster is the minor/lesser form of "[[Blaster, Dragon Ruler of Infernos]]".
  ** Being actually its reincarnation, this monster is the light coming from the volcano in "[[Dragoncarnation]]"
  * This is the first revealed Level 3 "[[Dragon Ruler]]".
