title: Card Trivia:Valkyrie Erste
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ride of the Valkyries]]" and "[[Valkyrie's Embrace]]".
  * "Erste" is the German word for "the first".
  * This card's Japanese name is '''Walkure Alteste''', which is German for '''Oldest Valkyrie'''.
