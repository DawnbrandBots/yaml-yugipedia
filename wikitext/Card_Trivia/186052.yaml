title: Card Trivia:Gishki Photomirror
wikitext: |-
  {{Navigation}}

  * This is the first [[Ritual Spell Card]] that requires you to pay [[Life Points]] in order to [[Ritual Summon]] a [[Ritual Monster]] instead of tributing Monsters.
  ** It is also the first card that requires you to pay Life Points as part of an effect and not a cost.
  * The mirror appears in the chest and in the background of "[[Evigishki Levianima]]"'s artwork.
