title: Card Trivia:Crusader of Endymion
wikitext: |-
  {{Navigation}}

  * This card, like "[[Endymion, the Master Magician]]" and "[[Magical Citadel of Endymion]]", are named for the Greek mythological figure of [[wikipedia:Endymion (mythology)|Endymion]] who was beloved by the moon goddess Selene and put to sleep forever.
