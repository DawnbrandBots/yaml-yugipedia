title: Card Trivia:Yosenju Oroshi Channeling
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Oroshi|Oroshi]] (颪 lit, down wind) is the Japanese term for a wind blowing strong down the slope of a mountain, occasionally as strong gusts of wind which can cause damage.
  * "[[Yosenju Shinchu L]]", "[[Yosenju Shinchu R]]" and "[[Yosenju Oyam]]" appear in this card's artwork.
