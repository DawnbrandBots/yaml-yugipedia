title: Card Trivia:The Supremacy Sun
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Sun|Sun]], the central star of the [[wikipedia:Solar System|Solar System]].
  ** Ironically, despite the Sun being a source of light and life, this is a [[DARK]] [[Fiend]] monster, while the background of its card artwork depicts a [[wikipedia:Solar eclipse|solar eclipse]].
  *** In the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, this monster was used by the main antagonist, [[Tragoedia (character)|Tragoedia]], the ''[[ka]]'' of an Ancient Egyptian astrologer, created out of his hatred towards them because of the court of [[Akhenamkhanen (manga)|Pharaoh Akhenamkhanen]]'s involvement in the [[Kul Elna massacre|massacre]] of his home village [[Kul Elna]]. It was created by Tragoedia (while possessing [[Mr. Phoenix]]) out of spite for the [[High Priests]] who worshipped the sun and sealed him away in his tablet, reflecting its stats and this monster's dark color scheme.
  ** This monster's effect references the daily cycle of the sun, where it sets and disappears from the horizon (reflected by this monster's effect that [[activate]]s when it is [[destroy]]ed) but will eventually arise and appear on the next day (reflected by this monster's effect to [[Special Summon]] itself from the [[Graveyard]] during the next [[Standby Phase]]). This is further explained and illustrated in the ''Yu-Gi-Oh! GX'' manga.

  * This is one of several cards where its Japanese name consists of only English alphabetical characters and punctuation, excluding furigana characters. The others are "[[Assault Revival]]", "[[Destiny End Dragoon]]", "[[Destiny HERO - Plasma]]", "[[NEX]]", "[[NEXT]]", "[[ZERO-MAX]]", the "[[Malefic]]" [[Spell]]/[[Trap Card]]s, and the other [[Legendary Planet]] cards (except "[[Elemental HERO Terra Firma]]").
  * This monster has the highest [[original ATK and DEF]] (3000/3000) of all the Legendary Planets.
  * This monster shares some similarities with "[[Tragoedia]]", the [[Monster Card]] version of the main antagonist of the ''Yu-Gi-Oh! GX'' manga.
  ** Both are [[Level 10]] DARK Fiend monsters.
  ** Both share an effect to Special Summon themselves.
  ** Both share an effect that allows the player to [[discard]] for a [[cost]].
