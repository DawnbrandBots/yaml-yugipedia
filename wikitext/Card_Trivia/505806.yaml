title: Card Trivia:Premature Burial
wikitext: |-
  {{Navigation}}

  * "[[Dark Magical Circle]]" appears in the international version of this card's artwork.
  * This card appears in the artwork of "[[Emergency Evasion]]".
  * The figure in this card's artwork also appears in the artworks of "[[D.D.R. - Different Dimension Reincarnation]]" and "[[Overdone Burial]]".
  * This card is based on a [[wikipedia:Premature burial|premature burial]], the act of burying someone while they're still alive.
