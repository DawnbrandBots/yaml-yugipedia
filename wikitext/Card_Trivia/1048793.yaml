title: Card Trivia:Dicemite Girl Laps
wikitext: |-
  {{Navigation}}

  * This monster's name references [[wikipedia:Craps|craps]], a dice game where players bet on the outcome of a pair of dice rolls.
  ** Fittingly, this monster's bulleted effects are based on the winning and losing results in the game of craps; rolling a 7 or 11 is a winning throw, rolling a 2, 3, or 12 is a losing throw, and any other throw must be repeated.
