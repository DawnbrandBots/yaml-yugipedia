title: Card Trivia:Infernalqueen Archfiend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Checkmate]]" and "[[Pandemonium]]".
  * This card appears in the original anime artwork of "[[Montage Dragon]]".
  * This card is one of the six [[wikipedia:chess|chess]]-themed "[[Archfiend]]" cards that debuted in ''[[Threat of the Dark Demon World]]'' in the ''[[OCG]]'' and ''[[Dark Crisis]]'' in the ''[[TCG]]'', each one featuring [[wikipedia:chessboard|chessboard]] background, all of whom are based on a [[wikipedia:chess piece|chess piece]]. In this monster's case, it is based on the [[wikipedia:Queen (chess)|queen]], a crown-shaped chess piece, as this monster features a crown on its head.
  ** This card's effect of allowing an "Archfiend" monster to gain 1000 [[ATK]] is a reference to the queen potentially being the most powerful piece in chess.
  * This card has a more powerful version: "[[Imprisoned Queen Archfiend]]".
