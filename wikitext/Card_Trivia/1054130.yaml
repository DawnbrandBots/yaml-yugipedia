title: Card Trivia:Schwarzschild Infinity Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is a retrained [[counterpart]] of "[[Schwarzschild Limit Dragon]]".
  ** Similar to "Limit Dragon", this monster is named after the [[wikipedia:Schwarzschild radius|Schwarzschild radius]], the limit at which an object becomes a [[wikipedia:Black hole|black hole]], two of which appear in this card's artwork
  ** This monster's naming scheme is a contrast to that of "Limit Dragon". This is reinforced by how this monster's body is twisted to resemble an [[wikipedia:Infinity symbol|infinity symbol]], which can also be interpreted as a sideways number "8" to represent its [[Level]].
  ** Visually, this monster is "Limit Dragon" wearing the armor of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]", which this monster can Summon. The two diamond-like protrusions around this monster feature a visual pattern similar to the wings of "Galaxy-Eyes Tachyon Dragon".
