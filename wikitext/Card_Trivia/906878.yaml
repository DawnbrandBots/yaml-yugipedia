  * This card is a [[retrained]] counterpart of "[[Maiden of the Aqua]]".
  ** In the Shinto belief, a [[wikipedia:Yorishiro|yorishiro]] is an object that can attract kami spirits, and give these kami a physical vessel to occupy during religious ceremonies.
