title: Card Trivia:The Great Mikanko Ceremony
wikitext: |-
  {{Navigation}}

  * Younger versions of "[[Ha-Re the Sword Mikanko]]", "[[Hu-Li the Jewel Mikanko]]","[[Ni-Ni the Mirror Mikanko]]", and "[[Sanaki the Mikanko Devotee]]" appear in this card's artwork.
  * The rooster in this card's artwork is regarded as the divine messenger of "[[Ohime the Manifested Mikanko]]" (who is based on the goddess ''[[wikipedia:Amaterasu|Amaterasu]]'' from Japanese mythology), referencing how the ''[[wikipedia:ja:天岩戸#古事記|Tokoyo-no-Naganakidori]]'' ("long-crowing chicken of Tokoyo") were used to help lure out the goddess from within ''[[wikipedia:Amano-Iwato|Ama-no-Iwato]]'' ("Heaven's Rock Cave").
