title: Card Trivia:Bujingi Warg
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * A [[wikipedia:Warg|"warg"]] (also known  as a vargr or varg) is a wolf monster of Norse mythology, in particular the wolf Fenrir and his sons Sköll and Hati.
  * This is the first "Bujin" ''[[TCG]]'' World Premiere monster to be released.
  * This monster has a counterpart: "[[Bujingi Wolf]]", though this monster has 100 less DEF and 100 more ATK than "Wolf".
