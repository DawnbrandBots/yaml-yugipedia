title: Card Trivia:Brain Reboot
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[D.D. Assailant]]", "[[D.D. Warrior]]", "[[D.D. Warrior Lady]]", and the hands and brain in the artwork of "[[Brain Control]]" appear in this card's artwork.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card was used by [[Alito]] to defeat the students who were brainwashed by [[Girag]], "rebooting" their brains in the process.
