title: Card Trivia:Pair Cycroid
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Tandem bicycle|tandem bicycle]], a twin bicycle designed to be ridden by more than one person.
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster required two copies of "[[Cycroid (anime)|Cycroid]]" as [[Fusion Material]], as its appearance, [[Level]] (6), and [[original ATK]] (1600) are the combination of the two "Cycroids". In the ''[[OCG]]''/''[[TCG]]'', this monster requires two [[Machine]] monsters with the same name as Fusion Material, referencing how it required the two "Cycroids" as Fusion Material and its "twin" design.
