title: Card Trivia:Elemental HERO Aqua Neos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Instant Contact]]".
  * This monster is a [[Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Aqua Dolphin]]".
  * This monster has an [[NEX|extended]] form: "[[Elemental HERO Marine Neos]]".
  * This monster has a ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Elemental HERO Pulse Neos]]".
  * This is the first "[[Neos]]" [[Fusion Monster]], as well as the first "Neos" Contact Fusion monster.
