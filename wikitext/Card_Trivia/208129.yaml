title: Card Trivia:Grave Protector
wikitext: |-
  {{Navigation}}

  * This monster's design, especially the mouths all over its body, closely resembles "[[Helpoemer]]".
  ** Even though the two monsters are counterparts in terms of design, their effects seem to counter each other: while the effect of "[[Helpoemer]]" activates when it's in the Graveyard, this card prevents cards from going to the Graveyard when destroyed by battle.
