  * This is the [[Monster Card]] version of [[Lillybot]], a character from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster's effect [[support]]ing "[[Orbital 7 (card)|Orbital 7]]" is based on the romantic relationship between Lillybot and [[Orbital 7]] in the anime.
