title: Card Trivia:Tearlaments Perlegia
wikitext: |-
  {{Navigation}}

  * "[[Tearlaments Havnis]]", "[[Tearlaments Merrli]]", and "[[Tearlaments Scheiren]]" appear in this card's artwork.
  * This card's artwork appears to depict "[[Primeval Planet Perlereino]]" after the defeat of "[[Tearlaments Reinoheart]]", or before his arrival.
  ** The "reino" in "Perlereino" is replaced with "regia" (Latin for "royal house").
  ** The three "Tearlament" monsters that appeared in this card's artwork have no padlocks on their chest, symbolizing the fact that they are free from the oppression of "Reinoheart".
