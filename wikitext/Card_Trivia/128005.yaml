title: Card Trivia:The Fountain in the Sky
wikitext: |-
  {{Navigation}}

  * This fountain appears in the artworks of "[[Fallen Sanctuary]]" and "[[Rebirth of Parshath]]".
  ** The artwork of "Fallen Sanctuary" shows that this fountain is located close to "[[The Sanctuary in the Sky]]".
  * This card may be based on the popular legend of the [[wikipedia:Fountain of Youth|Fountain of Youth]].
