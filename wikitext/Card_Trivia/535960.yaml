title: Card Trivia:Remove Trap
wikitext: |-
  {{Navigation}}

  * "[[Bear Trap]]" appears in this card's artwork.
  ** This makes this card one of the few cards that features a videogame-exclusive card in its artwork, along with "[[Trap Jammer]]", "[[A-Team: Trap Disposal Unit]]" and "[[Trap Booster]]".
  * This is one of the first [[Spell Card]]s seen on-screen in the original ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, along with "[[Block Attack]]", "[[Mooyan Curry]]", "[[Polymerization]]", and "[[Red Medicine]]".
  * In this card's text from ''[[Starter Box]]'' and ''[[EX Starter Box]]'', the furigana for [[Trap Card]] is ''Wana'', rather than ''Torappu''; however [[Trap Card]]s from these sets were still called ''Torappu Kādo''.
  * This card is called "[[Remove Spell]]" in ''[[Yu-Gi-Oh! BAM]]'' and its effect is changed to destroy [[Spell Card]]s, rather than Trap Cards, due to there being no Trap Cards in the game.
