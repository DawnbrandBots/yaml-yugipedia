title: Card Trivia:Elemental HERO Marine Neos
wikitext: |-
  {{Navigation}}

  * This monster is a [[Contact Fusion]] form of "[[Elemental HERO Neos]]", [[Fusion Monster|fused]] with "[[Neo-Spacian Marine Dolphin]]".
  ** This monster is an [[NEX|extended]] form of "[[Elemental HERO Aqua Neos]]".
  *** It has 300 more [[ATK]]/[[DEF]].
  *** Its effect does not have a [[cost]].
  *** It does not [[return]] to the [[Extra Deck]] during the [[End Phase]], so "[[Neo Space]]" is not required for this card to be on the [[field]] for more than one turn.
  ** This is the only Contact Fusion "Neos" monster to require a "[[Neo-Spacian]]" monster Summoned with "[[NEX]]" as a [[Fusion Material]], and the only "Neos" Fusion Monster to list a "Neo-Spacian" Fusion Monster as Fusion Material.
