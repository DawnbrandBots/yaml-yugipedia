title: Card Trivia:Orichalcos Tritos
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Orichalcos Deuteros]]" and "[[The Seal of Orichalcos]]" appear in this card's artwork.
  * This seal appears in the artwork of "[[Orichalcos Shunoros]]".
  * This card's name is based on "''tritos''" (τρίτος), the Greek word for "third", reflecting how it serves as the third layer of "The Seal of Orchalcos".
  * The runes around the outer rim of the seal are characters written in the [[wikipedia:Enochian|Enochian]] language, spelling out "OREICHALCOSTUATOSDAIAN" ("Oreichalcos Tritos") with unknown text at the end.
  ** In the original Japanese version of the [[Yu-Gi-Oh! (anime)|''Yu-Gi-Oh!'']] anime, the text on all "[[Orichalcos]]" cards are also written entirely in Enochian runes, except for "[[Orichalcos Sword of Sealing]]". Coincidentally, "Orichalos Sword of Sealing" is the only "Orichalcos" card to not be used by [[Dartz]], instead used by [[Rafael]].
