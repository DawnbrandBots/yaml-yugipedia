title: 'Card Trivia:Number 53: Heart-eartH'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * The number "53" is located on this monster's right horn.
  * "[[Number]]" monsters often take the form of their owner's initial ambitions and desires; in this monster's case, it represents its owner, [[Dr. Faker]].
  ** This monster's Japanese title, "Fake-Body God", references the name of Dr. Faker.
  *** It is also similar to the Japanese title of "[[Number 92: Heart-eartH Dragon]]". Fittingly, this monster is the fake form of "Heart-eartH Dragon", while both monsters' color schemes and the background of their card artworks are opposite of each other.
  ** The word "Heart" references [[Heartland City]], which was founded by Dr. Faker. Fittingly, the gemstone in the hollow section of this monster's chest resembles an upside-down human heart.
  *** The word "eartH" references the planet [[Earth (planet)|Earth]], which Dr. Faker planned to conquer by destroying the [[Astral World]]. The capitalization in "Heart-eartH" is likely due to the two words being anagrams.
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster was [[Xyz Summon]]ed by using three copies of "[[Garbage Lord (anime)|Garbage Lord]]" and [[equip]]ped itself with "[[Garbage Ogre (anime)|Garbage Ogre]]" to [[activate]] its effect. This reflects how Dr. Faker attacked the Astral World by transporting large amounts of garbage and using them as flaming explosive projectiles.
  * This is the first [[Xyz Monster]] that can [[Special Summon]] another [[Xyz Monster]] from the [[Extra Deck]] when it is destroyed by card effects.
