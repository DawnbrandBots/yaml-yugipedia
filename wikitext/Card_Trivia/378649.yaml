title: Card Trivia:Performapal Handsamuraiger
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of "handsome" (ハンサム, ''hansamu''), "samurai" (サムライ, ''samurai''), and "[[wikipedia:Liger|liger]]" (ライガー, ''raigā'').
  * This card's artwork is taken from {{chapter|ARC-V|008|ref}}, specifically from the panel showing [[Enter-Mate Handsome Liger (manga)|this monster]] being Summoned.
