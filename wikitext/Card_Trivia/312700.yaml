title: Card Trivia:Performapal Revival
wikitext: |-
  {{Navigation}}

  * "[[Performapal Turn Toad]]" appears in this card's artwork.
  * This card seems to be depicting the reveal of the same type of illusion as "[[Mystic Box]]", since there is what looks like an unfolded box with blades sticking through the sides under "Performapal Turn Toad".
  ** The blades were censored in the ''[[TCG]]'' print of this card.
