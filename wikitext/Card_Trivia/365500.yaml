title: Card Trivia:Symphonic Warrior Synthess
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Concentrating Current]]", "[[Generalprobe]]", "[[Symph Amplifire]]" and "[[Symphonic Warrior Rockks]]".
  * This monster is simultaneously based on two related electric instruments: a [[wikipedia:Keytar|keytar]] (which can be seen in its hands) and a [[wikipedia:Synthesizer|sound synthesizer]], which this monster's name and body are based on.
