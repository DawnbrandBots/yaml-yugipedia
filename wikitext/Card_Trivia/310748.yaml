title: Card Trivia:Battlin' Boxer Rib Gardna
wikitext: |-
  {{Navigation}}

  * This monster's name and design are based on a rib guard, a type of protective gear used in mixed martial arts and combat sports. This reflects this monster's high [[original DEF]] (1400) and its anime effect to change the attack target of an opponent's monster to another monster the player [[control]]s.
