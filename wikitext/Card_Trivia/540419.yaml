  * '''Wotan''' is a character in [[wikipedia:Richard Wagner|Richard Wagner's]] opera cycle [[wikipedia:Der Ring des Nibelungen|Der Ring des Nibelungen]].
  * Wotan or [[wikipedia:Wōden|Wōden]], is a head god of the West Germanic peoples, Wotan/Wōden corresponds with the Norse god Odin.
