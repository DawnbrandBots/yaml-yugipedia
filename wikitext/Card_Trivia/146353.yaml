title: Card Trivia:Rabid Horseman
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Avalanche]]".
  * This monster's Japanese name, "Minocentaur" is a portmanteau of the Japanese names of its [[Fusion Materials]], "Centaurus" ("[[Mystic Horseman]]") and "Minotaurus" ("[[Battle Ox]]").
  ** This monster's [[Fusion Material]]s are based on the [[wikipedia:Minotuar|minotaur]] and [[wikipedia:Centuar|centaur]] from [[wikipedia:Greek mythology|Greek mythology]], a detail pointed out by [[Seto Kaiba]] when he first [[Fusion Summon]]ed this card in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * This monster has a [[Yakiniku]] ''[[Rush Duel]]'' [[counterpart]]: "[[Prime Roast Beef Horseman]]".
  * In ''[[Yu-Gi-Oh! The Duelists of the Roses]]'', this monster's 3D model portrays it with the exact same armor as "Battle Ox" instead of a purple-colored one.
  * The Spanish ''[[Metal Raiders]]'' print of this card has its [[Type]] mispelled as "Guerrero B'''é'''stia" instead of "Guerrero'''-'''B'''e'''stia".
