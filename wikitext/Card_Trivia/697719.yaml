title: Card Trivia:Resonator Command
wikitext: |-
  {{Navigation}}

  * "[[Dark Resonator]]", "[[Mad Archfiend]]", "[[Ogre of the Scarlet Sorrow]]", and "[[Vice Berserker]]" appear in this card's artwork.
  ** All of these monsters were used by [[Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This card's artwork appears to continue the events in the artwork of "[[Mind Trust]]".
