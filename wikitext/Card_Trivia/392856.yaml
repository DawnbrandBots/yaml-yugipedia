title: Card Trivia:PSY-Framegear Alpha
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[PSY-Frame Circuit]]".
  * This monster's design is similar to that of "[[Viser Des]]".
  * "[[PSY-Framelord Zeta]]" is this monster and "[[PSY-Framegear Beta]]" equipped to "[[PSY-Frame Driver]]", while "[[PSY-Framelord Omega]]" also has both "PSY-Framegears" equipped, but with the addition of "[[PSY-Framegear Gamma]]", "[[PSY-Framegear Delta]]" and "[[PSY-Framegear Epsilon]]".
  * This monster's lowest belt forms the lowercase Greek letter [[wikipedia:alpha|alpha]] (α).
