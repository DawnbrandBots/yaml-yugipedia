title: Card Trivia:Gladiator Beast Laquari
wikitext: |-
  {{Navigation}}

  * The name "Laquari" is possibly derived from the [[wikipedia:Laquearius|Laquerarii]] who were [[wikipedia:Gladiator|Roman gladiators]] who fought with [[wikipedia:lasso|lassos]]. In the card artwork, "Laquari" is seen to be leaping through a ring of fire, perhaps referencing a lasso.
  * This monster appears in the artwork of "[[Double Tag Team]]".
