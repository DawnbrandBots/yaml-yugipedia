title: Card Trivia:Royal Rebel's Avant-garde
wikitext: |-
  {{Navigation}}

  * This monster is named after [[Wikipedia:Avant-garde metal|avant-garde metal]], a genre of music that experiments with unconventional methods and structure to produce innovative audio pieces, which reflects how its design is based on a girl in a rather inappropriate bondage scenario, which deviates from the typical design themes of the ''[[Rush Duel]]'' format.
  * This monster resembles [[Romin Kirishima (manga)|Romin Kirishima]], the cousin of [[Roa Kirishima (manga)|Roa Kirishima]] (in both ''[[Yu-Gi-Oh! SEVENS]]'' anime and [[Yu-Gi-Oh! SEVENS Luke! Explosive Supremacy Legend!!|manga]]) who used this monster in the manga.
