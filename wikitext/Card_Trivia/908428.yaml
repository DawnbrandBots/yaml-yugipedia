title: Card Trivia:Ninaruru, the Magistus Glass Goddess
wikitext: |-
  {{Navigation}}

  * This monster's name is a combination of [[wikipedia:Ninhursag|Ninhursag]], the ancient Sumerian mother goddess of the mountains, and the name of "[[Witchcrafter Golem Aruru]]".
  * This is currently the only [[Xyz Monster]] that [[requires Type specific Xyz Materials]] to have a different [[Type]] ([[Rock]]) than the one specified for its [[Xyz Material]]s ([[Spellcaster]]).
