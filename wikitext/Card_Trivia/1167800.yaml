title: Card Trivia:Artmage Impasto -Recapture-
wikitext: |-
  {{Navigation}}

  * "[[Artmage Litera]]", "[[Artmage Non-Finito]]", "[[Elfnote Lucina]]", and "[[Elfnote Seraphim Strelitzia]]" appear in this card's artwork.
  * This card's artwork, depicting "[[Artmage Finmel]]" (as "Artmage Non-Finito") performing a flurry of magical punches, is a reference to the "rush attack", an iconic attack involving a relentless, high-speed barrage of punches, which first appeared in the ''[[wikipedia:Fist of the North Star|Fist of the North Star]]'' manga and anime, and has later been used in other manga and anime ever since.
