title: Card Trivia:Xyz Soul
wikitext: |-
  {{Navigation}}

  * "[[Gem-Knight Pearl]]" and "[[Constellar Ptolemy M7]]" appear in this card's artwork.
  ** Judging from the picture, "Gem-Knight Pearl" seems as if he is protecting "Constellar Ptolemy M7", strengthening him as well since the "Gem-Knights" fight for justice.
  * Interestingly, other "[[Xyz (archetype)|Xyz]]" cards like "[[Xyz Territory]]" and "[[Xyz Unit]]" also increase an [[Xyz Monster]]'s attack by its [[Rank]] x 200.
  ** "[[Xyz Colosseum]]" also gives 200 ATK, but that number is fixed and not based on the [[Rank]] of the [[Xyz Monster]].
