title: Card Trivia:Angello Vaalmonica
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Valiant Smashers]]''/''[[Valiant Smashers]]''.
  * This monster appears in the artworks of "[[Vaalmonica Disarmonia]]", "[[Vaalmonica Ereditare]]", "[[Vaalmonica Intonare]]", and "[[Vaalmonica Scelta]]".
  * This monster is named after "angelo", the Italian word for "angel".
