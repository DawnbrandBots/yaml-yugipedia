title: Card Trivia:Vylon Element
wikitext: |-
  {{Navigation}}

  * According to the [[Duel Terminal]] storylines, the [[Vylon]]s are giving a portion of their power for each of the other elemental tribes to combat the [[Steelswarm]]s using this device, in this particular order:
  ** [[Gusto]]: "[[Reeze, Whirlwind of Gusto]]" + "[[Vylon Sphere]]" = "[[Daigusto Sphreez]]"
  ** [[Gishki]]: "[[Gishki Noellia]]" + "[[Vylon Tetra]]" = "[[Evigishki Tetrogre]]"
  ** [[Laval]]: "[[Laval Cannon]]" + "[[Vylon Stella]]" = "[[Laval Stennon]]"
  ** [[Gem-Knight]]: "[[Gem-Knight Crystal]]" + "[[Vylon Prism]]" = "[[Gem-Knight Prismaura]]"
  * However, this case seems odd, since this card's effect disallows the [[Vylon]] Tuner Summoned via this card's effect for Synchro Summoning monsters other than [[Vylon]] Synchro Monsters.
  * Also mentioned in the [[Duel Terminal]] storylines that "[[Vylon Omega]]" emerges from inside this device in order to engage in a final battle against "[[Steelswarm Hercules]]". This could be implying that this card is the only known reliable method for Synchro Summoning "[[Vylon Omega]]" in real-life duels.
