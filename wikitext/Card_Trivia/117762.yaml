title: Card Trivia:Jurrac Meteor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Jurrac Impact]]".
  ** "Jurrac Impact" has a similar effect to [[destroy]] all cards on the [[field]], and this monster is valid for its [[activation requirement]].
  * This monster is based on the [[wikipedia:Meteoroid#Meteor|meteor]] believed to have caused the [[wikipedia:Cretaceous–Paleogene extinction event|dinosaurs' extinction]].
  ** Fittingly, when this monster is [[Synchro Summon]]ed, it destroys all cards on the field.
  ** This monster, "[[Jurrac Astero]]", and "[[Jurrac Ptera]]" are the only "[[Jurrac]]" monsters to not be based on real-world [[wikipedia:Dinosaur|dinosaurs]].
  * According to the [[Duel Terminal Master Guide card storylines#They Used Magma to Turn Their Bodies into a Blazing Projectile|''Duel Terminal Master Guide'' card storylines]], this monster is an evolved form of "[[Jurrac Titano]]".
  ** Its transformation is depicted in the artwork of "[[Jurrac Volcano]]".
  ** This monster's alternate artwork from ''[[Terminal World 2]]'' visually resembles "Jurrac Titano".
  ** The "[[Neo Flamvell]]" monsters were born as a result of this monster's attack, as depicted in the artwork of "Jurrac Impact".
