title: Card Trivia:Finis Terrae, Tower of the Necroworld
wikitext: |-
  {{Navigation}}

  * "Finis Terrae" is based on the Latin word meaning "end of the earth".
  ** Furthermore, this card's name serves as the basis of [[wikipedia:Cape Finisterre|Cape Finisterre]], the rock-bound peninsula on the west coast of [[wikipedia:Galicia (Spain)|Galicia, Spain]] which the Romans believed was the end of the world and the door to the Underworld.
