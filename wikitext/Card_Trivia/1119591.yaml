title: Card Trivia:Inferno of the Ashened
wikitext: |-
  {{Navigation}}

  * "[[Shaman of the Ashened City]]" appears in this card's artwork.
  * This card's artwork appears to depict the moment where "the [[Ashened|defenders]] of Obsidim could not save their homes from the might of [[Veidos the Eruption Dragon of Extinction|Veidos]] and were reduced to ash along with their city" described in the set introduction of ''[[Phantom Nightmare]]'' for the ''[[TCG]]''.
  ** Fittingly, "Shaman of the Ashened City" seems to lack the light blue aura that she and the other monsters of the [[archetype]] sport in their own artworks, and this card's effect can place "[[Obsidim, the Ashened City]]" from the player's [[Main Deck]] [[face-up]] in either [[Field Zone]].
