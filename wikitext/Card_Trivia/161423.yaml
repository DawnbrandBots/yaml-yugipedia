title: Card Trivia:X-Saber Souza
wikitext: |-
  {{Navigation}}

  * [[wikipedia:Sousa (surname)|Souza]] is a family name of the [[wikipedia:Portuguese language|Portuguese language]] in its [[wikipedia:Archaism|archaic spelling]].
  * This monster has a younger form: "[[Commander Souza, Swordmaster]]".
  * This monster appears similar to "[[XX-Saber Gottoms]]", with its armor partially destroyed and the red cape commonly worn by the "[[XX-Saber]]" monsters.
  ** This monster's effect is also similar to "Gottoms", as it requires a "[[X-Saber]]" monster to be [[Tribute]]d.
  ** The swords it holds are the same sword held by "[[Commander Gottoms, Swordmaster]]" and in the artwork of "[[Saber Vault]]".
  * This is the tenth "X-Saber" monster; the original "X-Saber" monsters were known as the Ten Swordsmen in the ''[[Duel Terminal]]'' story line.
  * This is the first [[Synchro Monster]] to be used in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
