title: Card Trivia:Rock Plane Gravelindbergh
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster appears in the artwork of "[[Ballast Balance Shot]]".
  * This monster's name is a portmanteau of "gravel" and "[[wikipedia:Charles Lindbergh|Lindbergh]]".
  ** This monster's appearance is based on a high-wing monoplane, referencing the ''[[wikipedia:Spirit of St. Louis|Spirit of St. Louis]]'', the name of the monoplane piloted by American aviator, Charles Lindbergh, during the first solo nonstop transatlantic flight from Long Island, New York, to Paris, France.
