title: Card Trivia:Oscillo Hero
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Scrum Force]]".
  * This monster is named after an [[wikipedia:Oscilloscope|oscilloscope]], an electronic test instrument designed to display the waveforms of electrical voltage or currents on the screen of cathode ray tube.
  * This monster has a [[recolored counterpart]], "[[Wattkid]]", which is originally known as "Oscillo Hero #2".
  * This is the first usage of the Japanese word for "Hero" (ヒーロー) well before the introduction of the "[[HERO]]" ({{Ruby|ＨＥＲＯ|ヒーロー}}) [[archetype]].
