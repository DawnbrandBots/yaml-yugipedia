title: Card Trivia:Darklord Gulgolet
wikitext: |-
  {{Navigation}}

  * This monster is likely named after [[wikipedia:Calvary|Golgotha]], the place where Jesus was crucified.
  ** Additionally, this monster wields the seemingly blood-stained "[[Forbidden Lance]]" which is based on the [[wikipedia:Holy Lance|Holy Lance]], the weapon used to pierce the side of Jesus as he hung on the cross during his crucifixion.
  ** This monster's effect to [[Special Summon]] two "[[Darklord Token]]s" may be a subtle reference to the two thieves who were crucified alongside Jesus at Golgotha.
