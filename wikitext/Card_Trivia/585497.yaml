title: Card Trivia:Crealtar, the Impcantation Originator
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Impcantation Thanatosis]]".
  ** Parts of its inactive body can also be seen in the artworks of the other "[[Impcantation]]" cards.
  * "[[Impcantation Candoll]]", "[[Impcantation Talismandra]]", "[[Impcantation Bookstone]]", and "[[Impcantation Chalislime]]" appear in this card's artwork.
