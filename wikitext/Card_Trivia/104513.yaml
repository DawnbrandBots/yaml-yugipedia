title: Card Trivia:Mosaic Manticore
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Manticore|manticore]], a creature from [[wikipedia:Greek mythology|Greek mythology]] who is depicted with a the body of a lion, the wings of a bat, and the tail of a scorpion.
  ** The first portion of this monster's name is based on a [[wikipedia:Mosaic|mosaic]], a type of artwork created by placing many small pieces of different colored stones together in order to create a pattern or picture.
  *** Fittingly, in the ''[[Yu-Gi-Oh! R]]'' manga, this monster is a [[Fusion Monster]] and the combined form of its [[Fusion Material]]s, "[[Material Bat]]", "[[Material Lion]]", and "[[Material Scorpion]]", which are based on the aforementioned animals that make up the manticore's body.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Tribute]] it and [[Special Summon]] the monsters used to [[Tribute Summon]] it from the [[Graveyard]] during the next [[Standby Phase]] is based on its appearance in {{chapter|R|028|ref}}. In the chapter, [[Seto Kaiba (manga)|Seto Kaiba]], on the next turn after he [[Fusion Summons]] [[Mosaic Manticore (manga)|this monster]], undoes the fusion and Special Summons "Material Bat", "Material Lion" and "Material Scorpion".
  * This card's artwork is taken from the aforementioned chapter, specifically from the panel showing this monster being Summoned.
