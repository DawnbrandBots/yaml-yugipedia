title: Card Trivia:Over Boost
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artworks of "[[Armored Gravitation]]" and "[[Full Armor Gravitation]]".

  * Despite having been summoned four times in the anime over the course of two Duels, this card's printed effect of allowing all [[Armor Monster|Armor Monsters]] to attack directly was never applied.
