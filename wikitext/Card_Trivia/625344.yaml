title: Card Trivia:Supay, Duskwalker
wikitext: |-
  {{Navigation}}

  * "[[Supay]]" and the moon faces of "[[Moon Dragon Quilla]]" appear in this card's artwork.
  ** Fittingly, this monster's effect can [[Special Summon]] "Supay", which is required to [[Synchro Summon]] "Moon Dragon Quilla".
  * This monster is based on [[wikipedia:Mama Ocllo|Mama Ocllo]], the Incan goddess of motherhood and fertility in [[wikipedia:Inca mythology|Inca mythology]].
  ** The moon and the moon-like face appearing in this monster's design references the Incan moon goddess, [[wikipedia:Mama Killa|Mama Quilla]]. According to Inca mythology, Mama Ocllo is the daughter of Mama Quilla and the Incan sun god [[wikipedia:Inti|Inti]].
  *** This monster's origin is shared with "Moon Dragon Quilla" (based on Mama Quilla) and "[[Sun Dragon Inti]]" (based on Inti), both of which can be Synchro Summoned using this monster as [[Synchro Material]]. This is further emphasized with its Sun [[counterpart]], "[[Ascator, Dawnwalker]]", a monster based on Mama Ocllo's younger brother and husband, [[wikipedia:Manco Cápac|Manco Cápac]] whose effects can be used to quickly Synchro Summon the aforementioned [[Dragon]] monsters.
  * This card was first revealed on [https://twitter.com/YuGiOh_OCG_INFO/status/1131484916187844609 Twitter] at 6 PM Japan Standard Time, on the same day as its counterpart. This is a common estimate for the time the sun sets, referencing the moon theme of "Moon Dragon Quilla".
  * This card was the 10000th ''[[OCG]]''/''[[TCG]]'' card documented on [[Yugipedia]].
