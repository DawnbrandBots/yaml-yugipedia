title: Card Trivia:Amanokujaki
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (アマノクジャキ, ''Amanokujaki'') features multiple puns:
  ** The [[wikipedia:Amanojaku|Amanojaku]] (あまのじゃく) is a demon-like creature from Japanese folklore who is described as a being with a contrary nature, thought to be able to provoke a person's darkest desires.
  ** "''Kujaku''" (くじゃく) is the Japanese word for "[[wikipedia:Peafowl|peacock]]", a species of birds where the males are known for their plumage of vibrant feathers that feature eye-like patterns, similar to the patterns of this monster's wings.
  ** "''Jaki''" (じゃき) is the Japanese word for "evil spirit", which is often associated with demons, reflecting this monster's [[Fiend]] [[Type]].
