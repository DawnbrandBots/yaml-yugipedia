title: Card Trivia:Sharv Sarga
wikitext: |-
  {{Navigation}}

  * "[[Visas Amritara]]" and "[[Clear New World]]" appear in this card's artwork.
  * This card depicts the transformation of "Visas Amritara" into "[[Visas Samsara]]", and is a continuation of the events in "[[Realm Eulogy]]".
  ** Fittingly, if "Visas Amritara" were to be shuffled into the Deck by this card's effect, "Visas Samsara" is a valid monster to add to the hand, having a [[Level]] (4) that's lower than "Amritara" (8) and having a different [[Type]] ([[Fairy]]) than "Amritara" ([[Warrior]]).
