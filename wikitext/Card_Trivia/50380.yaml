title: Card Trivia:Stardust Dragon/Assault Mode
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Yusei 2]]'', ''[[Duelist Pack Collection Tin 2009]]'', and ''[[Duelist Pack Collection Tin 2010]]''.
  * This monster appears in the artwork of "[[Assault Reboot]]", "[[Assault Revival]]", and "[[Duel Evolution - Assault Zone]]".
  * This monster is the [[Card evolutions|upgraded]] "[[/Assault Mode]]" form of "[[Stardust Dragon]]".
  * This is the only "/Assault Mode" monster that was shown in a ''[[Yu-Gi-Oh! 5D's]]'' episode preview.
  * This monster's pose is the same pose as "[[Blue-Eyes White Dragon]]" in its second ''[[OCG]]''/''[[TCG]]'' artwork. Coincidentally, this monster shares the same [[original ATK and DEF]] (3000/2500) as "Blue-Eyes White Dragon".
  * This is one of the few promotional cards released as two different [[Rarity|rarities]] in the same [[Card Number]].
