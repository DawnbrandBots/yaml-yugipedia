title: Card Trivia:Bacchus Banquet
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Bacchus the Dizzy Deity]]" and "[[Big Vintage Magna Mutton]]" appear in this card's artwork.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this card's effect makes the opponent's monsters behave as though they were drunk.
