title: Card Trivia:Mathmech Nabla
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Mathmech Superfactorial]]".
  * This monster is based on the [[wikipedia:Derivative|differentiation]] operator [[wikipedia:Nabla symbol|nabla]] (∇).
  ** Fittingly, the inverted triangles on this monster's armor and weapon are shaped like the nabla.
  * This card is a [[counterpart]] of "[[Mathmech Sigma]]".
  ** This monster is based on differentiation, while "Sigma" is based on [[wikipedia:Summation|summation]] (which is involved in [[wikipedia:Integral|integration]]).
