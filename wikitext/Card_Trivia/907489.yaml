title: Card Trivia:Visas Starfrost
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[2-Player Starter Set]]''.
  * This monster appears in the artworks of "[[A Shattered, Colorless Realm]]", "[[Kashtira Akstra]]", "[[Kashtira Big Bang]]", "[[Pressured Planet Wraitsoth]]", "[[Realm Resonance]]", "[[Scareclaw Alternative]]", "[[Scareclaw Arrival]]", "[[Scareclaw Decline]]", "[[Scareclaw Light-Heart]]", "[[Scareclaw Sclash]]", "[[Scareclaw Straddle]]", "[[Scareclaw Twinsaw]]", "[[Tearlaments Cryme]]", "[[Tearlaments Grief]]", "[[Tearlaments Heartbeat]]", "[[Tearlaments Metanoise]]", "[[Tearlaments Sulliek]]", and "[[Trivikarma]]".
  ** This monster also likely appears in the artworks of "[[Primeval Planet Perlereino]]" and "[[Primitive Planet Reichphobia]]", as the blue meteor in the background.
  ** This card's artwork appears in the artwork of "[[Loka Samsara]]".
  * "[[Clear New World]]" appears in the background of this card's artwork and in this monster's right arm.
  ** This card's effect is similar to the effect of "Clear New World": this card can [[target]] a monster the player controls with a different [[Type]] and [[Attribute]] than this card, [[destroy]] it, and [[Special Summon]] itself from the [[hand]], while "Clear New World" can target a [[face-up]] monster the player controls, destroy it, and Special Summon a monster from the [[Deck]] in [[Defense Position]], with a different original Type and Attribute, whose [[Level]] is lower than that monster's [[original Level]].
  *** Both cards also have effects that can be used only [[once per turn]].
  * "[[wiktionary:visas|Visas]]" in this card's name is the Latvian word for "all" and the Lithuanian word for "the whole".
  ** "Starfrost" (スタフロスト ''Sutafurosuto'') in this card's name may also be a reference to the kanji ''Seisō'' ({{Ruby|星|せい}}{{Ruby|霜|そう}}, "years/time"), which is made up of 「{{Ruby|星|せい}}」 (''Sei'', "star") and 「{{Ruby|霜|そう}}」 (''Sō'', "frost").
  *** This card's name may be a pun on "all time".
  ** This card's Japanese name, 「ヴィサス＝スタフロスト」 (''Visasu = Sutafurosuto'', "Visas = Starfrost"), is also similar to the Japanese naming scheme of the [[Broken World]] [[Field Spell Card]]s: 「[Kanji epithet]＝[Katakana name]」.
  * This card has 4 [[Heart]] [[counterpart]]s:
  ** [[DARK]] "[[Scareclaw]]": "[[Scareclaw Reichheart]]"
  ** [[WATER]] "[[Tearlaments]]": "[[Tearlaments Reinoheart]]"
  ** [[FIRE]] "[[Kashtira]]": "[[Kashtira Riseheart]]"
  ** [[LIGHT]] "[[Mannadium]]": "[[Mannadium Riumheart]]"
  *** This card is a [[Warrior]] monster with 2100 [[ATK]] and 1500 [[DEF]], while the aforementioned cards are all Warrior monsters with 1500 ATK and 2100 DEF.
  * This monster has the following forms:
  ** An [[Card evolutions|upgraded]] [[Fusion Monster|Fusion]] form (combined with "Reichheart", "Reinoheart", and "Riseheart"): "[[Vicious Astraloud]]".
  ** An upgraded [[Synchro Monster|Synchro]] form: "[[Visas Amritara]]".
  ** A [[Fairy]] transformed form: "[[Visas Samsara]]".
  * Before this card was officially released in physical form in the [[Simplified Chinese]] [[OCG]], its Simplified Chinese name in [[Yu-Gi-Oh! Master Duel]] was "几星霜", which is identical to the Japanese name of "[[Ages of Stars and Frost]]".
