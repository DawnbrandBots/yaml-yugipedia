title: Card Trivia:Guardragon Reincarnation
wikitext: |-
  {{Navigation}}

  * "[[Guardragon Justicia]]", "[[Crowned by the World Chalice]]" and "[[Knightmare Incarnation Idlee]]" appear in this card's artwork.
  ** This card depicts the aftermath of the events in the card "[[Orcust Crescendo]]" which depicts the final battle between "Idlee" and "[[Longirsu, the Orcust Orchestrator]]". "Idlee" was killed by the spear of "[[Dingirsu, the Orcust of the Evening Star]]" thrown by "Longirsu".
  ** In this card's artwork, "Guardragon Justicia" recovered the body of "Crowned by the World Chalice" ("Ib") that was previously absorbed by "Idlee" from her corpse. They would be later fused into "[[Ib the World Chalice Justiciar]]", reviving "Ib" in the process.
  *** Ironically, this card cannot summon "Ib the World Chalice Justiciar" due to it being a [[Synchro Monster]].
