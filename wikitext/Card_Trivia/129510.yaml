title: Card Trivia:Insect Imitation
wikitext: |-
  {{Navigation}}

  * This card's artwork and Japanese name, "Hatching", features the eggs hatching, indicating that the insects inside are growing, which is reflected in this card's effect of [[Special Summon]]ing an [[Insect]] monster that is 1 [[Level]] higher.
  ** Despite this card's effect supporting Insect monsters, however, the eggs and nest in this card's artwork resemble bird eggs rather than an insect's eggs.
  ** Despite this card's ''[[TCG]]'' name, "Insect Imitation", its effect doesn't copy or imitate any card; however, it is likely based on the idea of insects imitating another creature's eggs for safety so that their eggs have a greater chance to hatch.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" [[counterpart]]: "[[Speed Spell - Insect Imitation]]".
