title: Card Trivia:Speed Spell - Dash Pilfer
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is a reference to the ''[[wikipedia:Eyeshield 21|Eyeshield 21]]'' manga and anime, in which the main character, [[Wikipedia:Sena Kobayakawa|Sena Kobayakawa]], joins an American football club and wears a helmet with an eyeshield to protect his identity.
  ** This card's artwork depicts an American football player who shares similarities with Kobayakawa, including the uniform design, the helmet with the eyeshield, and the ability to outrun their opponents.
