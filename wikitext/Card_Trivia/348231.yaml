title: Card Trivia:Raptor's Ultimate Mace
wikitext: |-
  {{Navigation}}

  * This card's artwork is similar to "[[Burning Spear]]" and "[[Speed Recovery]]".
  ** Also, both "Raptor's Ultimate Mace" and "Burning Spear" are [[Equip Spell Card]]s that increases the equipped monster's [[ATK]].
  * In every ''[[TCG]]'' language except Portuguese, the first letter of each word in this card's name is placed in the same order as the name for that language's translation of "[[Rank-Up-Magic]]":
  ** English: '''R'''aptor's '''U'''ltimate '''M'''ace - '''R'''ank-'''U'''p-'''M'''agic
  ** French: '''M'''assue '''R'''aptor '''P'''lus - '''M'''agie-'''R'''ang-'''P'''lus
  ** German: '''R'''aptors '''S'''uper-'''Z'''epter - '''R'''ang'''s'''teigerungs'''z'''auber
  ** Italian: '''A'''rma '''R'''aptor '''M'''assima - '''A'''lza-'''R'''ango-'''M'''agico
  ** Spanish: '''M'''aza '''S'''uperior del '''R'''apaz - '''M'''agia de '''S'''ubida de '''R'''ango
