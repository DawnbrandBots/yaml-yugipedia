title: Card Trivia:Double Trap Hole
wikitext: |-
  {{Navigation}}

  * This card has the same background artwork as "[[The League of Uniform Nomenclature]]" and "[[Treaty on Uniform Nomenclature]]" do, although only the latter has the same color scheme.
  * The green goblin from the artworks of "[[Adhesion Trap Hole]]", "[[Bottomless Trap Hole]]", "[[D.D. Trap Hole]]", "[[Giant Trap Hole]]", "[[Traptrix Trap Hole Nightmare]]" and "[[Treacherous Trap Hole]]" appears in this card's artwork, along with the orange goblin from the artworks of "Giant Trap Hole", "[[Trap Hole]]", "Treacherous Trap Hole" and "Traptrix Trap Hole Nightmare".
  ** In fact, these goblins appear to be emerging from "Treacherous Trap Hole" (which contains a doll as bait) to find this "Double Trap Hole" with similar bait (Japanese artwork only).
