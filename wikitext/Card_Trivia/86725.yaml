title: Card Trivia:Orichalcos Sword of Sealing
wikitext: |-
  {{Navigation}}

  * "[[The Seal of Orichalcos]]" appears in this card's artwork.
  * The sword in this card's artwork is based on the [[Sword of Kings]], a weapon used by [[Dartz]] to imprison the [[Legendary Dragon|dragon forms]] of [[Timaeus]], [[Critias]], and [[Hermos]] in their crystal forms during the [[Atlantis|Battle of Atlantis]].
  ** Fittingly, in {{episode|Yu-Gi-Oh!|176|ref}}, this card is used by [[Rafael]] to [[negate]] the effects of "[[Dark Magician Girl the Dragon Knight (anime)|Dark Magician Girl the Dragon Knight]]", a [[Fusion Monster]] that was [[Fusion Summon]]ed by using "[[The Eye of Timaeus (anime)|The Eye of Timaeus]]" as [[Fusion Material]].
  *** This card's ''[[OCG]]''/''[[TCG]]'' effect to give a monster the same effect as "[[Dark Magician Girl the Dragon Knight]]" is a reference to its effects in the anime, in which it can "rob" the equipped monster's effects, thus allowing the player to use the "stolen" effects. In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, the effect of "Dark Magician Girl the Dragon Knight" can only [[destroy]] the monster it battles, so Rafael would have had no reason to use the effect as his "[[Guardian Dreadscythe (anime)|Guardian Dreadscythe]]" had higher [[ATK]].
  * This is the only "[[Orichalcos]]" card that was not used by Dartz in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, instead being used by Rafael.
  * In the original Japanese version of the ''Yu-Gi-Oh!'' anime, the text on all "Orichalcos" cards is written entirely in Enochian runes, except for this card.
  ** In the dubbed version, this is the only "Orichalcos" card to appear using the regular dubbed [[card layout]] instead of a special layout with Enochian runes in the textbox, as with the other "Orichalcos" cards.
