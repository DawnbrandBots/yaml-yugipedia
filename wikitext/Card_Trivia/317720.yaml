title: Card Trivia:Qliphort Disk
wikitext: |-
  {{Navigation}}

  * This card's Japanese name contains ディスク ''disuku'', a pun on "disk" and "Adyeshach" (アディシェス ''Adishesu'' "apathy"), the fourth [[wikipedia:Qliphoth|Qliphoth]] emanation which is associated with the [[wikipedia:Devil|Devil]] [[wikipedia:Astaroth|Astaroth]].
  ** "Disk" could also refer to its similarity with a [[wikipedia:Flying saucer|Flying Saucer]] (a common type of [[wikipedia:Unidentified flying object|UFO]] sightings), which can also also be called "Flying Disc".
  * This monster bears a little resemblance to a [[wikipedia:Phonograph|gramophone]].
