title: Card Trivia:Heliosphere Dragon
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Heliosphere|heliosphere]], the vast, bubble-like region of space which surrounds and is created by the [[wikipedia:Sun|Sun]].
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect requires the opponent to have four or less cards in their [[hand]], in addition to this monster being the only one the player [[control]]s, to prevent the opponent from [[declare|declaring]] an attack. This references a scene during {{episode|ZEXAL|128|ref}}, where [[Mizar]] Summoned [[Heliosphere Dragon (anime)|this monster]], whose effect prevented [[Trey]] and [[Quinton]] from declaring an attack while Trey had four cards in his hand and Quinton had none.
