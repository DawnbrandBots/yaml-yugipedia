title: Card Trivia:Kiseitai
wikitext: |-
  {{Navigation}}

  * This monster's ''[[TCG]]'' name is based on the Japanese word for "[[wikipedia:parasite|parasite]]", which makes up the second portion of its Japanese name, "Mental Parasite" (''Seishin Kiseitai'').
  * This monster's effect to [[equip]] itself to the opponent's attacking monster when attacked in [[face-down]] [[Defense Position]] references the nature of the parasite, where it will be unknowingly contracted to its host and form a symbiotic relationship.
  ** This monster's effect to allow the player to gain [[Life Point]]s equal to half the equipped monster's [[ATK]] during each [[Standby Phase]] references how the parasite will drain its host's energy to maintain sustenance over time.
  * This monster shares similarities with "[[Brain Jacker]]":
  ** Both share a similar naming scheme and design.
  ** Both share the same [[Attribute]] ([[DARK]]), [[Level]] (2), and [[Type]] ([[Fiend]]); also the sum total of their [[original ATK and DEF]] is 1100.
  ** Both share a similar effect that [[activate]]s when they are in face-down Defense Position, equip themselves to the opponent's monster, and allows a player to gain Life Points during their Standby Phases.
