title: Card Trivia:Shinobi Insect Hagakuremino
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Phylliidae|leaf insect]], a type of insect that uses mimicry to resemble leaves to avoid predators.
  ** Appropriately, 葉隠れ蓑 (''hagakuremino'') roughly translates to "leaf camouflage coat".
  * This card's Japanese name is a play on {{Ruby|中|ちゅう}}{{Ruby|忍|にん}} (''Chūnin'', lit. "Middle Ninja") with the first kanji replaced with 虫, meaning "insect".
