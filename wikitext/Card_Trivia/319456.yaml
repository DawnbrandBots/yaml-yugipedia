title: Card Trivia:Raidraptor - Rise Falcon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Raidraptor - Rapid Xyz]]" and "[[Raidraptor's Phantom Knights Claw]]".
  ** In the latter's artwork, this monster is shown sheathed in an enormous cloak of flames, as it activates its effect.
  * The "[[Raidraptor]]" crest appears on the back of this monster's torso.
  * This is [[Shay Obsidian]]'s [[signature card]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * In the anime, this is the first card that can attack all [[Special Summon]]ed monsters the opponent controls, and only them, by its own effect.
  * This monster's cry in the anime is similar to that of "[[Earthbound Immortal Aslla piscu]]".
  * This monster represents the rise stage of a [[wikipedia:Rebellion|rebellion]].
  ** This is further supported by its effect and low [[ATK]], which reflects crippling a minor asset connected to a large oppressive order to symbolize and instil [[wikipedia:Hope|hope]].
  ** As a further reference, in the ''Yu-Gi-Oh! ARC-V'' anime, whenever Shay Obsidian Summons [[Raidraptor - Rise Falcon (anime)|this monster]], the opponent often underestimates it due to its low ATK, only to quickly be overwhelmed by its effect.
  * When this monster activates its effect while the opponent controls at least two monsters, it is sheathed in an enormous cloak of flames, during which time it resembles [[Egyptian God Phoenix]] (along with its potentially field-clearing ability).
  * "[[Arc Rebellion Xyz Dragon]]" is a [[Ranked-Up]] form of "[[Dark Rebellion Xyz Dragon]]" wearing this monster's pieces.
  * "[[Raidraptor - Rising Rebellion Falcon]]" (an upgraded form of "[[Raidraptor - Ultimate Falcon]]" combined with "[[Odd-Eyes Rebellion Dragon]]") also shares some of this monster's visual traits.
