title: Card Trivia:Poison Chain
wikitext: |-
  {{Navigation}}

  * "[[Iron Chain Coil]]" and "[[Iron Chain Snake]]", along with a standard New Domino City [[Duel Disk]], appear in this card's artwork.
  * "Iron Chain Coil" is holding up a 2 with its left hand, likely to show that 2 cards would be sent to the Graveyard, since there are 2 "Iron Chain" monsters.
