title: Card Trivia:Odd-Eyes Venom Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Collectors Pack 2017]]''/''[[Battles of Legend: Light's Revenge]]''.
  * This monster appears in the artwork of "[[Pendulum Dimension]]".
  * This monster is an [[Card evolutions|upgraded]] [[Fusion Pendulum Monster|Fusion Pendulum]] form of "[[Odd-Eyes Pendulum Dragon]]" and "[[Starving Venom Fusion Dragon]]".
  ** This monster's Japanese title, "Supreme King Violet Dragon" ({{Ruby|覇|は}}{{Ruby|王|おう}}{{Ruby|紫|し}}{{Ruby|竜|りゅう}} ''Haōshiryū''), references the purple card frame of [[Fusion Monster]]s.
  ** In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, [[Sora Perse]] and [[Alexis Rhodes (ARC-V)|Alexis Rhodes]] referred to [[Odd-Eyes Venom Dragon (anime)|this monster]] as a purified form of "[[Starving Venom Fusion Dragon (anime)|Starving Venom Fusion Dragon]]".
  * This monster is the Fusion [[counterpart]] of "[[Odd-Eyes Wing Dragon]]" and "[[Odd-Eyes Rebellion Dragon]]".
  ** Like the other forms of "Starving Venom Fusion Dragon" (except "[[Starving Venemy Dragon]]"), this monster has higher [[Level]]/[[Rank]] (10) and [[ATK]] (3300) than the corresponding forms of "[[Dark Rebellion Xyz Dragon]]" and "[[Clear Wing Synchro Dragon]]".
  * This is the first "[[Odd-Eyes]]" Fusion Pendulum Monster.
  ** It is also the first "[[Venom]]" [[Pendulum Monster]].
  ** It is also the first merged form of "Odd-Eyes Pendulum Dragon" and another [[Four Dimensional Dragons|Dimension Dragon]] to not require "Dark Rebellion Xyz Dragon" as [[material]].
  * This is the last Fusion Monster to be [[Fusion Summon]]ed in the ''Yu-Gi-Oh! ARC-V'' anime.
  ** This is also one of the last Pendulum Monsters to be [[Pendulum Summon]]ed in the ''Yu-Gi-Oh! ARC-V'' anime, along with "[[Odd-Eyes Wing Dragon (anime)|Odd-Eyes Wing Dragon]]", "[[Performapal Odd-Eyes Seer]]", and "[[Performapal Ignition Eagle]]".
