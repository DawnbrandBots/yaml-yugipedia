title: Card Trivia:St. Joan
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Joan of Arc|Joan of Arc]], a prominent figure in the [[wikipedia:Hundred Years' War|Hundred Years' War]] where she fought as a member of the French army disguised in a soldier's armor, who was captured, tried, and burned at the stake; she would later be canonized as a saint.
  ** This monster's [[Fusion Material]]s also reference Joan of Arc, who was also known as "The Maiden of Orléans" ("[[The Forgiving Maiden]]") and carried a banner bearing the words "Jhésus-Marie", the French names of [[wikipedia:Jesus|Jesus]] and [[wikipedia:Mary, mother of Jesus|Mary]] ("[[Darklord Marie]]").
  * This monster is a [[Fusion Monster|Fusion]] [[counterpart]] of "[[Noble Knight Joan]]".
  * This monster has a [[retrained]] counterpart: "[[Guardian Angel Joan]]".
  * This monster has a [[D/D/D]] counterpart: "[[D/D/D Oracle King d'Arc]]".
