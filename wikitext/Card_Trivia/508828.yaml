title: Card Trivia:Kahkki, Guerilla of Dark World
wikitext: |-
  {{Navigation}}

  * As with all "[[Dark World]]" monsters, Kahkki's name is a pun on a color (khaki). It could also refer to the color of some [[Monster Card]]s (e.g. [[Normal Monster]]s), which this card destroys.
  ** Khaki is derived from the Hindustani word ख़ाकी which literally means "soil-colored".
  * This card's Chinese name, 土黃其, is a combination of 土黃 (literally "soil-yellow") and 其 ''jī'' ([[wikipedia:Transcription into Chinese characters|transcription]] of the [[wikipedia:Phoneme|phoneme]] sequence /ki/ as in ''kha'''ki''''').
  * [[wikipedia:Guerilla warfare|Guerilla]] is a warfare style that consists of small groups that surround and attack larger, less mobile armies.
  * This monster appears in the artworks of "[[Dark Corridor]]", "[[Darkness Half]]", "[[Parasite Generator]]", and "[[Thousand Buster]]".
