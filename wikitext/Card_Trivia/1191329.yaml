title: Card Trivia:Jinzo - Energy Shocker
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart of "[[Jinzo]]".
  ** This monster's pose is taken from the first panel from {{chapter|Yu-Gi-Oh!|213|ref}} showing "[[Jinzo (manga)|Jinzo]]" standing alongside [[Katsuya Jonouchi (manga)|Katsuya Jonouchi]].
  ** This monster's Japanese name, "Psycho Energy Shocker", is derived from the Japanese name of "Jinzo" ("Android - Psycho Shocker") and the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Jinzo" in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] and [[Yu-Gi-Oh! (anime)|anime]]: "Cyber Energy Shock".
  ** This monster's [[Level]] (7) is based on the fact that "Jinzo" was [[Level 7]] in the manga, but is [[Level 6]] in the anime and the ''[[OCG]]''/''[[TCG]]''.
  ** This monster's second and third effects are derived from the effect of "Jinzo" in the manga and anime, which allowed the player to [[destroy]] all [[Trap Card]]s (including [[face-down]] ones) in addition to [[negating]] their [[effects]].
