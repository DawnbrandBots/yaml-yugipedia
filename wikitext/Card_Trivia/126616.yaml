title: Card Trivia:Familiar Knight
wikitext: |-
  {{Navigation}}

  * This monster is similar to "[[Marauding Captain]]" in several ways. For one, they're both [[Warrior]]-[[Type]] monsters that each have 1200 [[ATK]]. Physically, they both wear armor, have similar-looking hair in terms of color, and both wear capes. Both of them also allow a player to [[Special Summon]] monsters from the hand; "Marauding Captain" lets yourself do so as soon as it's Summoned, while the effect of "Familiar Knight" activates when it's destroyed in battle, and both players get to do so.
