title: Card Trivia:Hazy Flame Griffin
wikitext: |-
  {{Navigation}}

  * This card is named after the legendary creature ''[[wikipedia:Griffin|Griffin]]''.
  * This card has an advantageous effect over other cards which have a similar effect to this (in the style of "if there is a monster on the opponent's side of the field and you have none, Special Summon this monster to the field"), in which in the case of having any number of FIRE-attribute monsters on your side of the field does not deter you from Special Summoning this monster.
