title: Card Trivia:D/D/D Alfred the Divine Sage King
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Alfred the Great|Alfred the Great]], the last King of the West Saxons and the first King of the Anglo-Saxons, known for his social and educational reforms as well as his military successes against the [[wikipedia:Danes (tribe)|Danes]].
  ** This monster's pose is based on that of [[wikipedia:Statue of Alfred the Great, Winchester|the statue of Alfred the Great]] in [[wikipedia:Winchester|Winchester]], [[wikipedia:England|England]], as indicated by this monster holding its sword downwards with one hand while resting the other hand on the unworn shield.
  * This is the first "[[D/D/D]]" monster to break its naming convention in the ''[[TCG]]'', as it follows the [[archetype]]'s Japanese naming pattern "D/D/D (Name) the (Adjective) King" instead of "D/D/D (Adjective) King (Name)".
