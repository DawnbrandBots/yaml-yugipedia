title: Card Trivia:Destiny HERO - Dasher
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Spring Heeled Jack|Spring Heeled Jack]], a demonic entity from [[wikipedia:English folklore|English folklore]] during the [[wikipedia:Victorian era|Victorian era]].
  ** This monster's wheels on the heels of its boots are likely a reference to Spring Heeled Jack's ability to make a quick getaway using its high speeds.
  * This card may be the "[[Destiny HERO]]" [[counterpart]] of "[[Elemental HERO Necroshade]]".
  ** Both have similar effects: this card allows the player to [[reveal]] and [[Special Summon]] a monster they [[draw]]s while it is in the [[Graveyard]], whereas "Necroshade" allows the player to [[Normal Summon]] a [[Level]] 5 or higher "[[Elemental HERO]]" monster without [[Tributing]], if it is in the GY.
