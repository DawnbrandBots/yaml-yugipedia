title: Card Trivia:HEROES UNITE - FUSION!!
wikitext: |-
  {{Navigation}}

  * This card's effect to [[Fusion Summon]] with [[Uses cards in the player's Deck as Fusion Materials|monsters in the Deck]] may be a reference to "[[Chain Material]]", a card used by [[Yubel (character)|Yubel]] during {{episode|GX|155|ref}}, where they attempted to use it with "[[Super Polymerization (anime)|Super Polymerization]]" to Fusion Summon "[[Super Fusion God]]" using monsters of all numbered [[Level]]s from both their [[Deck]] and the [[field]], only to be intercepted by [[Jaden Yuki]]'s [[activate]]d [[Trap Card]] "[[Spiritual Fusion]]", allowing him to choose the used [[Fusion Material]] instead, thereby merging the two's souls and preventing the destruction of the twelve dimensions.
