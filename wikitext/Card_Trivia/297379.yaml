title: Card Trivia:Risebell the Star Psycher
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Unending Nightmare]]".
  * This monster is an [[Card evolutions|enhanced]] form of "Risebell the Star Adjuster".
  * Larger and more monstrous versions of the [[wikipedia:Jackal|jackal]]-like creature (as a pair) and [[wikipedia:Haniwa|Haniwa]]-like totem from the artwork of "[[Risebell the Star Adjuster]]" and "[[Saambell the Summoner]]" appear in this card's artwork.
