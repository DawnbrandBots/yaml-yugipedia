title: Card Trivia:Gunkan Suship Ikura-class Dreadnought
wikitext: |-
  {{Navigation}}

  * Several copies of this monster appear in the artwork of "[[Gunkan Sushipyard Seaside Supper Spot]]".
  * This monster is a [[Card evolutions|combined]] [[Xyz Monster|Xyz]] form of "[[Gunkan Suship Shari]]" and "[[Gunkan Suship Ikura]]".
  ** This monster is based on a [[wikipedia:Dreadnought|dreadnought]] and [[wikipedia:Sushi|sushi]] rice (しゃり ''Shari'') adorned with [[wikipedia:Red caviar|salmon roe]] (いくら ''Ikura'').
  ** The word 「いくら」 (''Ikura'') appears on the front of this monster.
  ** This card's [[ATK]]/[[DEF]] are equal to the combined ATK/DEF of "Shari" and "Ikura".
  ** Fittingly, this card's effects can be applied if it is [[Xyz Summon]]ed using both "Shari" and "Ikura" as [[Xyz Material]]s.
  ** This monster's cannons are based on soy sauce packets; this monster also has cucumber slices and [[wikipedia:Wasabi|wasabi]].
