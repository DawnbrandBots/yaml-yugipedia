title: Card Trivia:Dark Magic Mirror Force
wikitext: |-
  {{Navigation}}

  * "[[Dark Magician the Magician of Black Magic]]" appears in this card's artwork.
  * This card is a [[Shining Sarcophagus (series)|Shining Sarcophagus]] [[counterpart]] of "[[Mirror Force]]".
  ** This card's [[activation condition]] when an opponent's monster's [[destroy|destruction]] [[effect]] [[activate]]s references how in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]], "[[Mirror Force (manga)|Mirror Force]]" [[activate]]s when an opponent's monster activates an effect that is also treated as an attack.
  ** This card's damaging effect references the effect of "Mirror Force" during the [[Duelist Kingdom (manga arc)|Duelist Kingdom arc]] in the ''Yu-Gi-Oh!'' manga, which inflicts damage to the opponent's attacking monster and the opponent's other monsters.
  * This card's artwork and effect are based on a scene from {{chapter|Yu-Gi-Oh!|341|ref}}, where [[Dark Yugi (manga)|Atem]] uses "Mirror Force" to protect his "[[Dark Magician (manga)|Dark Magician]]" from the effect of [[Yugi Mutou (manga)|Yugi Mutou]]'s "[[Gandora the Dragon of Destruction (manga)|Gandora the Dragon of Destruction]]", which is also treated as an attack in the manga. In the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (anime)|anime]], the scene replaces "Mirror Force" with "[[Dark Illusion (anime)|Black Illusion]]".
