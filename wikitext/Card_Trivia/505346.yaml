title: Card Trivia:Nightmare Wheel
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Parasite Mind]]".
  * This card is based on the [[wikipedia:Breaking wheel|St. Catherine's Wheel]], a torture method that uses a wheel to break the victim's bones, then strapped to the wheel and displayed for public execution.
  * This card has a very similar effect to another [[Continuous Trap Card]], "[[Spellbinding Circle]]". It also has a similar effect to "[[Mask of the Accursed]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken specifically from {{chapter|Yu-Gi-Oh!|221|ref}}, specifically from the panel where [[Nightmare Wheel (manga)|this wheel]] is shown manifesting itself, albeit with the victim changed from "[[Amazoness Fighter (manga)|Amazoness Fighter]]" in the ''OCG''/''TCG''.
  * In the original anime, this card's Japanese name was censored from its Japanese manga name. In the manga, it was called "Torture Wheel" but the anime called it "Scratch Wheel" instead.
  ** This change was reverted in future anime series.
