title: Card Trivia:Primal Howling
wikitext: |-
  {{Navigation}}

  * "[[Metaphys Armed Dragon]]" appears in this card's artwork.
  ** This card's Japanese name, "Primal Phantom Howling", references "Metaphys Armed Dragon", which was released in ''[[Duelist Alliance]]'', the set which introduced the [[Wyrm]] [[Type]] to the ''[[OCG]]''/''[[TCG]]''. "Metaphys Armed Dragon" was therefore one of the first Wyrm monsters to be released, as well as the first "[[Metaphys]]" monster to be released.
  * This card is a member of a series of [[Spell Card]]s in ''[[Yu-Gi-Oh! Rush Duel]]'' that depict a monster from the ''OCG''/''TCG'' attacking, and removes a Spell/[[Trap]] from the [[field]] if the player controls a monster with the same [[Type]] as the monster depicted. Other cards in this series include:
  ** "[[Magical Stream]]": [[Spellcaster]], with "[[Aqua Madoor]]"
  ** "[[Dragon's Inferno]]": [[Dragon]], with "[[Blaster, Dragon Ruler of Infernos]]"
  ** "[[Genie's Fire Breath]]": [[Fiend]], with "[[La Jinn the Mystical Genie of the Lamp]]"
  ** "[[Psychic Divergence]]": [[Psychic]], with "[[Esper Girl]]"
  ** "[[Fiery Blaze]]": [[Pyro]], with two "[[Royal Firestorm Guards]]"
  ** "[[Nature's Invasion]]": [[Plant]], with "[[Gigaplant]]"
  ** "[[Angel Judge]]": [[Fairy]], with "[[Dark Witch]]"
  ** "[[Rage of the Beasts]]": [[Beast]] and [[Beast-Warrior]], with "[[Battle Ox]]" and "[[Berserk Gorilla]]"
  ** "[[Stream of Elimination]]": [[Sea Serpent]], with "[[Lost Blue Breaker]]"
