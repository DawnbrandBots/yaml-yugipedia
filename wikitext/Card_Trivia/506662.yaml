title: Card Trivia:Beast King Barbaros
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[2-Player Starter Set]]''.
  * This monster is based on [[wikipedia:Marbas|Barbas]] (also spelled "Marbas"), which is a [[wikipedia:Demon|demon]] described in the ''[[wikipedia:Lesser Key of Solomon|Ars Goetia]]'', a work of Christian [[wikipedia:Demonology|demonology]] and the first section of [[wikipedia:Solomon|King Solomon]]'s grimoirea. Barbas is depicted as a great lion that, under the conjurer's request, changes shape into a man.
  ** This card's name, "Barbaros", is Greek for [[wikipedia:Barbarian|barbarian]], and is also likely derived from Barbas; both names are also derived from "barba" (Latin "beard" or "[[wikipedia:Hellebore|hellebore]]", a plant used in [[wikipedia:Witchcraft|witchcraft]], especially to invoke demons).
  * This card has an [[Card evolutions|upgraded]] form: "[[Beast Machine King Barbaros Ür]]".
  * This card has a [[retrained]] [[counterpart]]: "[[King Beast Barbaros]]".
