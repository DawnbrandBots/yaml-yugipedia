title: Card Trivia:Taotie, Shadow of the Yang Zing
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Yang Zing Brutality]]", depicted transforming into "[[Yazi, Evil of the Yang Zing]]".
  ** A purified version of this monster has two combined forms with "[[Spiritual Beast Tamer Lara]]": "[[Ritual Beast Ulti-Nochiudrago]]" and "[[Ritual Beast Ulti-Reirautari]]".
  * This monster is based on ''[[wikipedia:zh:饕餮|Taotie]]'' (zh: 饕餮 ''tāotiè''), also known as ''Chaofeng'', one of the [[wikipedia:Nine sons of the dragon|sons]] of the [[wikipedia:Dragon King|Dragon King]] who is depicted as a ferocious, gluttonous beast.
  ** According to Chinese mythology, Taotie is a member of the "[[wikipedia:Four Perils|Four Perils]]", a group of malevolent beings serving as evil counterparts to the [[wikipedia:Four Symbols|Four Benevolent Animals]] and is historically placed on a sacrificial ritual bronze.
