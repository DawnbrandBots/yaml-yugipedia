title: Card Trivia:Diamond Core of Koa'ki Meiru
wikitext: |-
  {{Navigation}}

  * This core appears in the artwork of "[[Koa'ki Meiru Overload]]".
  * This card is based on the structural superiority of [[wikipedia:Diamond|diamond]] to [[wikipedia:Iron|iron]].
  ** This core is shaped like a typically-cut diamond.
  ** This core may be an [[Card evolutions|upgraded]] form of "[[Iron Core of Koa'ki Meiru]]", created after the explosion depicted in "[[Core Blast]]".
