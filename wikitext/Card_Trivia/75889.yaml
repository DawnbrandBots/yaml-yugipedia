title: Card Trivia:By Order of the Emperor
wikitext: |-
  {{Navigation}}

  * This card's effect is meant to supplement the "[[Monarch (series)|Monarchs]]", providing an alternate benefit to Summoning them besides their innate effects.
  ** "[[Raiza the Storm Monarch]]", "[[Caius the Shadow Monarch]]" and "[[Mobius the Frost Monarch]]" appears in this card's artwork.
  ** "Caius" appears to be the leader. This may be how he maintains his leadership, hence explaining the conflict.
  * This card's ''[[TCG]]'' name keeps the word ''Emperor'' from its Japanese name, despite the [[series]] it is related being known as the "Monarchs" in the ''TCG''. This is likely because this card does not count as a "Monarch", as it lacks the kanji in its original Japanese name.
