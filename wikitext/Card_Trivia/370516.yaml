title: Card Trivia:Phantasmal Lord Ultimitl Bishbaalkin
wikitext: |-
  {{Navigation}}

  * "[[Stardust Sifr Divine Dragon]]" and [[Rex Goodwin (manga)|Rex Goodwin]] appears in this card's ''[[OCG]]''/''[[TCG]]'' artwork.
  ** This card's ''OCG''/''TCG'' artwork is taken from {{chapter|5D's|064|ref}}, specifically the panel showing [[Ultimate Phantasm God Ultimitl Bishbaalkin (manga)|this monster]] being Summoned.
  * This monster is likely named after [[wikipedia:Xibalba|Xibalba]], the realm of the dead and the ninth and lowest level of the underworld in [[wikipedia:Maya mythology|Maya mythology]]; it may additionally be named for ''Mitnal'', the name for this realm in the language of the [[wikipedia:K'iche' people|K'iche']] people.
  * This monster is the [[Card evolutions|evolved]] form of "[[Ultimaya Tzolkin]]", as reflected in its appearance and Summoning condition.
  ** Visually, this monster resembles a mashup between the two forms of "Ultimaya Tzolkin": the [[Crimson Dragon]] form (which makes up most of the body and wings) and the "[[Ultimate God]]" form (which supplies the head, arms, and armor).
