title: Card Trivia:Inlet
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card is based on an [[wikipedia:Inlet|inlet]], a narrow indentation of a shoreline that connects the sea or ocean with a larger enclosed body of water.
  ** This is reflected in this card's [[Continuous Spell]] type, which has similar properties to a [[Field Spell Card]], similar to how an inlet has similar properties with the [[wikipedia:Sea|sea]]. 
  *** Also, its first effect can treat a [[face-up]] Field Spell Card(s) as "[[Umi]]", while its second effect to manipulate the [[Level]]s of [[WATER]] monsters are based on "[[A Legendary Ocean]]", both of which are Field Spell Cards based on the sea and [[wikipedia:Ocean|ocean]].
