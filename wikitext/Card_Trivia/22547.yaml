title: Card Trivia:Tenkabito Shien
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Shien's Scheme]]", "[[Spy Attack]]" and "[[Unification]]".
  * "[[Legendary Ebon Steed]]" appears in this card's artwork (though it cannot be equipped to this monster).
  * According to Master Guide 2, this monster is "[[Great Shogun Shien]]" without armor.
  * The term ''tenkabito'' ({{Ruby|天|てん}}{{Ruby|下|か}}{{Ruby|人|びと}}, "absolute ruler", lit. "person under heaven") is a title given to [[wikipedia:Oda Nobunaga|Oda Nobunaga]], unifier of Japan during the [[wikipedia:Sengoku period|Sengoku period]], when Japan was divided by civil wars and rebellions. Fittingly, as depicted in "Unification", "Shien" is the unifier of the country he rules over, which according to Master Guide 3 had been divided by civil war.
  * This monster and "[[Hand of the Six Samurai]]" bear the same mark on their foreheads.
  * The chest plate and arms armor pieces matches those of "[[Legendary Six Samurai - Shi En]]".
