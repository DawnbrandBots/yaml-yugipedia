title: Card Trivia:Chemical Cure Purple
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Shiny Shady]]" and "[[Shocking Comeback!!]]".
  * This monster is a physical amalgamation of its [[Fusion Material]]s, "[[Chemical Cure Blue]]" and "[[Chemical Cure Red]]".
  ** The assistant in this card's artwork is a physical amalgamation of the assistants appearing in the artworks of its Fusion Materials.
  ** This monster is depicted creating a purple-colored medicine, likely a combination of "[[Red Medicine (Rush Duel)|Red Medicine]]" and "[[Blue Medicine (Rush Duel)|Blue Medicine]]", which each of this monster's Fusion Materials can [[support]].
  *** Fittingly, this monster's [[original DEF]] and fixed [[Life Point]] amount (900) are equal to the combined total amount of its Fusion Materials' [[DEF]] and fixed Life Point amounts. Both Fusion Materials' amounts are also the combined total amount of Life Points gained by the effects of both "Red Medicine" and "Blue Medicine".
  ** This monster's name reflects its [[Fusion Monster]] [[type]], as Fusion Monster cards feature a purple-colored border, whereas the color purple is the combination of the colors red and blue.
  *** Fittingly, this monster's [[DARK]] [[Attribute]] is colored purple, whereas the Attributes of its Fusion Materials are [[FIRE]] and [[WATER]], which are each colored red and blue, respectively.
  *** This monster's [[original ATK and DEF]] (2600/900) are equal to the combined [[ATK]]/DEF of its Fusion Materials.
