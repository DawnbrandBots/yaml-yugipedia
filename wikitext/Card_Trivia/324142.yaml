title: Card Trivia:Accel Synchron
wikitext: |-
  {{Navigation}}

  [[File:YuseiD-Wheel.jpg|thumb|right|300|''Yusei Go'', Yusei's [[Duel Runner]].]]

  * This monster's body is based on  the ''[[Yusei Go]]'', [[Yusei Fudo]]'s Duel Runner the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This card's name and [[Quick Effect]] are also references to [[Accel Synchro Summon]].
  * This card shares many similarities with "[[Formula Synchron]]".
  ** Both are [[Synchro Tuner Monster]]s.
  ** Both are "[[Synchron]]" monsters.
  ** Their [[ATK]] is equal to their [[Level]] x 100.
  ** Both have the effect of [[Synchro Summon]]ing during the opponent's [[Main Phase]] by using themselves as [[material]].
  ** Both are based on high-speed vehicles.
  * This card has the highest [[DEF]] of all "Synchron" monsters.
  * The Synchro Summoning rings that appears in the background of this card's artwork are colored red instead of the usual green.
  ** Additionally, this card's artwork likely depicts this monster's Synchro Summon, as three are stars in between the two rings.
