title: Card Trivia:Lousy Luck
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card is based on ''[[wikipedia:O-mikuji|omikuji]]'', random fortunes written on strips of paper at Shinto shrines and Buddhist temples in Japan.
  * This is the last [[Action Card|Action]] [[Trap Card]] to be used in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
