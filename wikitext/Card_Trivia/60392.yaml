title: Card Trivia:Zeman the Ape King
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Zeman the Ape Demon King" (猿魔王ゼーマン ''Enmaō Zēman'') features the kanji "猿", which can be read as ''saru'', the Japanese word for "monkey" and "ape" in Chinese.
  ** Despite this translation, apes and monkeys are distinctly different from each other, and this monster is based on an ape.
  ** This monster's Japanese name can be read as ''Enmaō'', or "King Enma", the Japanese name for [[wikipedia:Yama (Buddhism)|Yama]], the God who rules over death, hell, and the cycle of rebirth in Buddhism and East Asian mythology.
  * This monster's weapon is based on a [[Cursed Needle|Minus Staff]], a weapon used by [[Zeman the Ape King (character)|Zeman the Ape King]] and his [[monkey troop|army]] to inflict the [[Minus Curse]] on the [[Duel Monsters Spirit World]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  * This is the only [[Dark Synchro Monster]] whose effects remained mostly unchanged when released as a [[Synchro Monster]] in the ''[[OCG]]''/''[[TCG]]'' (other than the required [[Synchro Material]]s).
