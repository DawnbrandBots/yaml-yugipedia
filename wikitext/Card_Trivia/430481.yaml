title: Card Trivia:Shinobaroness Peacock
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Shinobird Salvation]]" and "[[Stars Align across the Milky Way]]".
  * This card's Japanese name, "Esprit Lord - Peahen" (霊魂鳥神－姫孔雀 ''Esupuritto Rōdo - Himekujaku'') features the word "Himekujaku", the Japanese word for "Peacock Princess".
  * Along with "[[Shinobaron Peacock]]", this is the first [[Ritual Monster]] to have an [[ability]], being a [[Spirit monster]].
  ** They are also the first [[Winged Beast]] Ritual Monsters, as well as the first [[WIND]] Ritual Monsters.
  * As opposed to the blue-colored Spirit World background seen on most other Spirit monsters, this monster has a golden-colored one instead. This trait is shared with "Shinobaron Peacock".
