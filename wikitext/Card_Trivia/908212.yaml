title: Card Trivia:Wyrm Excavator the Heavy Cavalry Draco (L)
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bucket Wheel Force]]" in [[Maximum Mode]] (together with "[[Wyrm Excavator the Heavy Cavalry Draco]]" and "[[Wyrm Excavator the Heavy Cavalry Draco (R)|Wyrm Excavator the Heavy Cavalry Draco [R]]]").
  ** The upper portion of this monster's head appears in this artwork of "[[Constructor Arsenal Wyrmyard]]".
  * This monster has a combined [[Retrain|form]] (along with "[[Wyrm Excavator the Heavy Cavalry Draco]]" and "[[Wyrm Excavator the Heavy Cavalry Draco (R)|Wyrm Excavator the Heavy Cavalry Draco [R]]]") with "[[Constructor Wyrm Buildragon]]": "[[Infinite Heavy Cavalry Buildragoon]]".
  * "Wyrm Excavator the Heavy Cavalry Draco" and its pieces are based on a [[wikipedia:Bucket-wheel excavator|bucket-wheel excavator]].
  * This card is the first [[Maximum Monster]] to depict the main "center" of the combined monsters on the [L] card as opposed to the central card.
  * The combined [[Level]]s of this card and "Wyrm Excavator the Heavy Cavalry Draco [R]" add up to 6; their user in the anime, [[Asana Mutsuba]], attends [[Goha 6th Elementary]].
