title: Card Trivia:Dracotail Urgula
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dracotail Flame]]".
  * This monster is based on the [[wikipedia:Zodiac|Zodiac]] constellation of [[wikipedia:Leo (constellation)|Leo]].
  ** The [[Wikipedia:Astrological sign|astrological sign]] for [[wikipedia:Leo (astrology)|Leo]] appears in the jewel on this monster's head, while the constellation of Leo appears in the background of this card's artwork.
  ** This monster's design features a wild mane, which resembles that of a lion's mane, referencing how Leo is also known as the "lion" constellation.
  * The name "Urgula" is derived from the Sumerian 𒌨𒄖𒆷 which means "Lion".
  * "[[Dracotail Gulamel]]" is the combined [[Fusion Monster|Fusion]] form of this monster and "[[Dracotail Faimena]]".
