title: Card Trivia:Blue Expense Falcon
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's design is similar to that of a "[[Blackwing]]" monster.
  * This card is the second [[Tuner monster]] to feature a [[Dragon]] support effect, despites its different [[Type]], the first being "[[Hyper Synchron]]".
  ** Both cards are used by [[Yusei Fudo]] to [[Synchro Summon]] "[[Stardust Dragon (anime)|Stardust Dragon]]" in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
