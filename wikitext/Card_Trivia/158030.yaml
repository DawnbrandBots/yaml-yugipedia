title: Card Trivia:Hunter of Black Feathers
wikitext: |-
  {{Navigation}}

  * This card was designed to be a specific counter to the "[[Blackwing]]" [[archetype]]. This is supported by the following:
  ** This card was released when "Blackwing" [[Deck]]s were becoming popular in the meta.
  ** "Blackwing" Decks focus on [[swarm]]ing the [[field]] easily, and since all "Blackwing" monsters are [[Winged Beast]], this card's effect is useful against them.
  ** "Blackwing" monsters can be split into 2 design types: monsters that are birds, and humanoid monsters wearing avian outfits. This monster resembles the latter, except with actual avian features.
  ** This card's ''[[TCG]]'' name is based on "Black Feather", the ''[[OCG]]'' name of the "Blackwing" archetype.
  ** Additionally, "Blackwing" monsters are all [[DARK]]-[[Attribute]], while this monster is [[LIGHT]].
  * This monster appears in the artwork of "[[The Big Cattle Drive]]".
  ** Interestingly, "[[Blackwing - Breeze the Zephyr]]" also appears in that card's artwork.
