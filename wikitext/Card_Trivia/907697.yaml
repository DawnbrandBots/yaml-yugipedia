title: Card Trivia:Skysavior Symbol
wikitext: |-
  {{Navigation}}

  * The pendant in this card's artwork appears in the artworks of "[[Ciela the Skysavior Knight]]", "[[Claymont the Skysavior Advisor]]", "[[Dunkes the Skysavior Knight]]", "[[Ranga the Skysavior Knight]]", "[[Seir the Skysavior Knight]]", "[[Skysavior Oath]]" (worn by "Ciela" and "Dunkes"), "[[Skysavior Prayer]]" (worn by "Dunkes"), and "[[Skysavior Watch]]", as well as in both artworks of "[[Skysavior Wish]]" (worn by "Ciela").
