title: Card Trivia:Meteor Black Comet Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[counterpart]] of "[[Meteor Black Dragon]]".
  ** Both have the same [[Level]], [[Type]], [[ATK]] and [[DEF]] and are Summoned through the Fusion of a Level 7 "[[Red-Eyes]]" monster and a Level 6 [[Dragon]] monster.
  * Visually, this monster is a fusion of "[[Red-Eyes Black Flare Dragon]]" and "[[Meteor Dragon Red-Eyes Impact]]". Also, the latter's head and wings can be seen on this monster's chest.
  * This monster's name may be a reference to the [[flavor text]] of "[[Meteor Dragon (FMR)|Meteor Dragon]]"  in <i>[[Yu-Gi-Oh! Forbidden Memories]]</i>: "A dragon that arrived on earth by means of a <b>comet</b> that fell from the far reaches of space."
