title: Card Trivia:General Raiho of the Ice Barrier
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[War of the Giants Reinforcements]]'' and ''[[War of the Giants: Round 2]]''.
  * This monster appears in the artwork of "[[Magic Triangle of the Ice Barrier]]".
  * Ironically, "Raiho" can be translated as a combination of the Japanese words for "thunder" and "flame".
