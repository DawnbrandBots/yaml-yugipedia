title: Card Trivia:Parametalfoes Azortless
wikitext: |-
  {{Navigation}}

  * This card is named after [[wikipedia:Azoth|Azoth]], a mythical universal medication or solvent.
  ** The name Azoth is based on the Arabic word meaning "mercury" and has been used as an alternative poetic term to refer to mercury.
  * This monster is the Fusion counterpart of "[[Parametalfoes Melcaster]]".
  * This monster's armor is a combination of several armor pieces from other "[[Metalfoes]]" monsters:
  ** Chest: "[[Parametalfoes Melcaster]]".
  ** Wings and base: "[[Metalfoes Silverd]]".
  ** Right arm: "[[Metalfoes Crimsonite]]".
  ** Left arm: "[[Metalfoes Orichalc]]".
  ** Waist: "[[Raremetalfoes Bismugear]]".
  * This card is the first non-[[Main Deck]] [[Pendulum Monster]] that does not have any relation to an anime/manga theme.
