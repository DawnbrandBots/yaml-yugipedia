title: Card Trivia:Beginning of Heaven and Earth
wikitext: |-
  {{Navigation}}

  * "[[Envoy of Chaos]]" appears in this card's artwork.
  ** This card's artwork appears to be a different view of that of "[[Super Soldier Synthesis]]".
  * This card's Japanese name is a reference to the [[wikipedia:Japanese creation myth|Japanese creation myth]] (天地開闢, ''Tenchikaibyaku'', lit. "creation of heaven and earth").
