title: Card Trivia:Time Engine
wikitext: |-
  {{Navigation}}

  [[File:Time Engine.png|thumb|right|250px|"[[Red-Eyes Black Metal Dragon (manga)|Red-Eyes Black Metal Dragon]]" being Summoned with the effect of "[[Time Machine (manga)|Time Machine]]".]]

  * "[[Red-Eyes Black Fullmetal Dragon]]" and "[[Time Machine]]" appear in this card's artwork.
  ** This card's artwork references a scene from {{chapter|Yu-Gi-Oh!|123|ref}} (and its [[Yu-Gi-Oh! (anime)|anime]] [[Yu-Gi-Oh! - Episode 032|adaptation]]) where "[[Red-Eyes Black Metal Dragon (manga)|Red-Eyes Black Metal Dragon]]" ([[equip]]ped with "[[Dragon Nails (manga)|Dragon Nails]]") is [[return]]ed to his [[field]] via the effect of "[[Time Machine (manga)|Time Machine]]" ([[activated]] from [[Keith Howard (manga)|Bandit Keith Howard's]] [[Graveyard]] via the effect of "[[Graverobber (manga)|Graverobber]]"). "Red-Eyes Black Metal Dragon" would then attack Bandit Keith's "[[Slot Machine (manga)|Slot Machine]]", winning Jonouchi the Duel.
  * This card's effect to [[Special Summon]] a [[Level 5]] or higher [[Machine]] monster when it is [[destroyed by battle]] or by card effect is based on the effect of "Time Machine" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and anime, which was used to return Bandit Keith's [[Level 7]] "[[Barrel Dragon (manga)|Barrel Dragon]]" and Katsuya Jonouchi's [[Level 8]] "Red-Eyes Black Metal Dragon" (equipped with "Dragon Nails") to their fields after they were destroyed by battle.
  ** This card's effect to destroy the opponent's monster if a "[[Metalmorph (archetype)|Metalmorph]]" [[Trap Card]] is on the field or in the Graveyard is based on how the aforementioned monsters immediately attacked and destroyed the opponent's attacking monsters after they returned via the effect of "Time Machine". In both instances, "[[Metalmorph (manga)|Metalmorph]]" ("[[Magic Metal Force]]" in the anime) was in Bandit Keith's Graveyard.

