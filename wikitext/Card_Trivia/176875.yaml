title: Card Trivia:Evilswarm Nightmare
wikitext: |-
  {{Navigation}}

  * This is the "Evilswarm" counterpart of "[[XX-Saber Boggart Knight]]".
  ** The ナイト (Naito) in ナイトメア (Nightmare) can also be interpreted as "Knight", as a reference to "XX-Saber Boggart Knight".
  * This monster appears in the artworks of "[[Overlay Wedge]]" and "[[Xyz Battle Chain]]".
