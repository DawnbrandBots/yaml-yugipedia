title: Card Trivia:Basiltrice, Familiar of the Evil Eye
wikitext: |-
  {{Navigation}}

  * This monster is the combined form of "[[Basilius, Familiar of the Evil Eye]]" and "[[Catoblepas, Familiar of the Evil Eye]]".
  ** The [[ATK]] (1000) of this card is the combined total of the ATK (400) of "Basilius" and the ATK (600) of "Catoblepas".
  * This monster is based on the [[wikipedia:Cockatrice|cockatrice]], a [[wikipedia:Wyvern|wyvern]]-like creature with the head of a rooster. It is said to be able to kill any person it looks at with its gaze.
  ** "Basiltrice" is a portmanteau of "cockatrice" and "[[wikipedia:Basilisk|basilisk]]". The cockatrice and the basilisk are very similar creatures and are sometimes seen as synonymous with each other.
