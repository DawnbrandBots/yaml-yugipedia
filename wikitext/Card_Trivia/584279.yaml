title: Card Trivia:Shining Draw (card)
wikitext: |-
  {{Navigation}}

  [[File:Yuma's_Shining_Draw.png|thumb|right|250|[[Yuma Tsukumo]] performing a [[Shining Draw]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.]]

  * The silhouette of [[Yuma Tsukumo]] appears in this card's artwork.
  ** The sparkles in this card's artwork have the same "X" shape in the ''[[Yu-Gi-Oh! ZEXAL]]'' logo.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|121|ref}}, where Yuma performed a Shining Draw on his own for the first time during his [[Duel]] against [[Eliphas]].
  * This card's name references the [[Shining Draw]], an ability used by Yuma Tsukumo and [[Astral]], either separately or together in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This card's effects reference how in the ''Yu-Gi-Oh! ZEXAL'' anime, Yuma and/or Astral often performed a Shining Draw to [[draw]] a "[[ZW -]]" card or a card that allowed him to [[Xyz Summon]] a "[[Utopia (archetype)|Utopia]]" monster.
  ** This card's [[activation condition]], requiring the player to draw it for their [[normal draw]] in their [[Draw Phase]], [[reveal]] it, and keep it revealed until the [[Main Phase 1]], is the same as that of "[[Rank-Up-Magic - The Seventh One]]", the [[signature card]] of the [[Seven Barian Emperors]] that was always drawn through Chaos Draw in the ''Yu-Gi-Oh! ZEXAL'' anime.
  * This card is the [[Astral World|Astral]] [[counterpart]] of "[[Barian's Chaos Draw]]".
  ** Both are named after different special draws from the ''Yu-Gi-Oh! ZEXAL'' anime: Shining Draw and [[Chaos Draw]].
  ** The silhouette of the user of the said draw appears in their card artworks: Yuma Tsukumo for this card and Reginald Kastle/Nash for "Barian's Chaos Draw".

