title: Card Trivia:Yuki-Musume, the Ice Mayakashi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[How Did Dai Get Here?]]".
  * This monster is based on the ''yuki-musume'' ("snow daughter"), one of the alternate names of the ''[[wikipedia:Yuki-onna|yuki-onna]]'' ("snow woman"), a ''[[wikipedia:Yōkai|yōkai]]'' in [[wikipedia:Japanese folklore|Japanese folklore]] that takes the form of a beautiful woman with extremely pale skin and often wearing a kimono.
  * This monster has three [[Card evolutions|upgraded]] [[Link Monster|Link]] forms: "[[Yuki-Onna, the Ice Mayakashi]]", "[[Yuki-Onna, the Icicle Mayakashi]]", and "[[Yuki-Onna, the Absolute Zero Mayakashi]]".
