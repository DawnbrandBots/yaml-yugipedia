title: Card Trivia:Raijin the Breakbolt Star
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Raijin|Raijin]], the [[wikipedia:Shinto|Shinto]] god of the lightning and thunder who is often depicted as a yellow humanoid entity.
  ** Fittingly, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, this monster appears alongside "[[Fujin the Breakstorm Star]]", a monster based on the [[wikipedia:Fūjin|Shinto god of the wind]] who is often depicted alongside Raijin in [[wikipedia:Japanese mythology|Japanese mythology]].
