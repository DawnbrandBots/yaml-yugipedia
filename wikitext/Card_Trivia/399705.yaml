  [[File:WindwitchIceBell-JP-Anime-AV-NC-2.png|thumb|right|250|A second copy of this monster, in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.]]

  * This monster appears in the artwork of "[[Windwitch Chimes]]".
  * This monster is similar to [[Rio Kastle]] from the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** In {{episode|ARC-V|117|ref}}, when [[Rin]] Summoned two copies of this monster during her [[Duel]] against [[Yugo]], one of them had a similar color scheme to Rio's look-a-like [[Iris]].
  * This card has a [[counterpart]]: "[[Windwitch - Glass Bell]]".
