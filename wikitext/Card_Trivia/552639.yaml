title: Card Trivia:Ahrima, the Wicked Warden
wikitext: |-
  {{Navigation}}

  * This monster is named after Ahriman, the Middle Persian equivalent of [[wikipedia:Angra Mainyu|Angra Mainyu]].
  * This card's Japanese name translates to "Ahrima, the Wicked King", which corresponds with the Japanese name of one of the "[[Virus]]" [[Trap]]s, "[[Grinning Grave Virus]]".
