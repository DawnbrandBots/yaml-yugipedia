title: Card Trivia:Gladiator Beast Lanista
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gladiator Beast United]]".
  * This monster's name is based on the [[wikipedia:List of Roman gladiator types|lanista]] in the Roman gladiator system, which meant "manager of gladiators". The lanista would instruct the gladiators as well as providing the entertainment needed for the public. They had the power to decide if a gladiator would live or die, but socially they were on the same footing as servants and despised. The latter wouldn't to apply of those with good family, high status, and/or independent means.
  * This monster's wings are similar to those of "[[Gladiator Beast Alexander]]", "[[Gladiator Beast Bestiari]]", and "[[Gladiator Beast Gyzarus]]".
