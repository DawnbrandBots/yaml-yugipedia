title: Card Trivia:Starliege Paladynamo
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duelist Pack: Kite]]'' and the ''[[Zexal Collection Tin]]''.
  * This monster's name is a portmanteau of "paladin", usually a sacred or holy knight in fantasy stories, and "[[wikipedia:Dynamo|dynamo]]", a type of electric generator.
  * This monster has a [[counterpart]]: "[[Starliege Lord Galaxion]]".
  * This monster appears to be the opposite counterpart of "[[Heroic Champion - Excalibur]]".
  ** Both are [[Rank 4]] [[Xyz Monster]]s with 2000 [[ATK]] and an effect that requires [[detach]]ing 2 [[Xyz Material]]s to be [[activate]]d.
  ** This monster's effect decreases a monster's ATK to 0, while "Excalibur" doubles its own ATK.
  * This monster's shoulder-pad designs are similar to the ones of "[[Photon Strike Bounzer]]".
