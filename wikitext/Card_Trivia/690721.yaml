title: Card Trivia:Qadshaddoll Keios
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Resh Shaddoll Incarnation]]" and "[[Shaddoll Schism]]".
  * This card is a [[counterpart]] of "[[Shaddoll Zefranaga]]".
  ** Both have the same [[Type]], [[Level]], [[ATK]], and [[DEF]], as well as opposite [[Attribute]]s.
  ** This card is a transformed "[[Shaddoll]]" version of "[[Constellar Rasalhague]]"; fittingly, it is a [[LIGHT]] monster and has the same Type, Level, ATK, and DEF.
  * This monster is "[[Evilswarm Kerykeion]]" transforming into a doll-like "Shaddoll" monster, struggling to resist the corruption.
  * This monster is a "Shaddoll" form of "[[Constellar Caduceus]]"
  ** This card's name, "Qadshaddoll" (カドシャドール ''Kadoshadōru'') is based on the name of "Constellar Caduceus" (セイクリッド・'''カド'''ケウス ''Seikuriddo Kadokeusu'', "Sacred Caduceus").
  * The kanji 「聖なる影」 (''Seinaru Kage'') in this card's Japanese name translates to "Holy Shadow".
  ** This card's Japanese name reflects this monster not being fully transformed into a "Shaddoll" monster.
  ** The artwork of "Resh Shaddoll Incarnation" suggests that this monster gained the power of the "[[Zefra]]" monsters before he was fully transformed.
