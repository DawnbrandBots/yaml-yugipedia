title: Card Trivia:Gimmick Puppet Humpty Dumpty
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Gimmick Puppet Gigantes Doll]]", "[[Mansion of the Dreadful Dolls]]", and "[[Perform Puppet]]".
  * This monster is based on the English nursery rhyme character, [[wikipedia:Humpty Dumpty|Humpty Dumpty]], who is typically portrayed as an anthropomorphic egg.
