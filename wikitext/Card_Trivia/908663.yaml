title: Card Trivia:Dogmatika Genesis
wikitext: |-
  {{Navigation}}

  * "[[Dogmatika Maximus]]" and "[[Dogmatika Ashiyan]]" appear in this card's artwork.
  ** "Maximus" is appointing a replacement for "[[Dogmatika Ecclesia, the Virtuous]]" since her escape with "[[Fallen of Albaz]]" and the "[[Tri-Brigade]]" monsters.
  ** "[[White Relic of Dogmatika]]" is the girl in this card's artwork after having received the "[[Dogmatika]]" power of the 'Stigmata', becoming the next 'saint' of the "[[Dogmatika Nation]]".
