title: Card Trivia:Mask of the Accursed
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Spell of Mask]]''.
  * The kanji (呪) on this mask translates to "curse".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh! Duelist|126|ref}}, specifically from the panel showing this mask being equipped to "[[Beta the Magnet Warrior (manga)|Beta the Magnet Warrior]]".
