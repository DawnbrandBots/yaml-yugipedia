  [[File:DestinyBoard-JP-Manga-DM-NC.png|thumb|right|250px|Dark Necrofear and Destiny Board in the manga]]

  * "[[Dark Necrofear]]" and the [[wikipedia:Ouija board|ouija board]] from the Japanese version of "[[Destiny Board]]" appear in this card's artwork.
  ** This card's artwork is based on the appearance of "[[Destiny Board (manga)|Destiny Board]]" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga, where the ghost of "[[Dark Necrofear (manga)|Dark Necrofear]]" is depicted moving the [[wikipedia:Planchette|planchette]] over the letters on the board to spell out the word "DEATH".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card's artwork is used as the basis for the animation of the "Destiny Board" [[victory condition]].

