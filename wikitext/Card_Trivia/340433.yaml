title: Card Trivia:Performapal Skullcrobat Joker
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (ドクロバット, ''Dokurobatto'') is a portmanteau of the Japanese words for "skull" (ドクロ, ''dokuro'') and "acrobat" (アクロバット, ''akurobatto''). Fittingly, this monster's hat features a skull-like design.
  * This monster shares similarities with "[[Performapal Trump Witch]]".
  ** Both are [[DARK]] [[Spellcaster]] [[Pendulum Monster]]s.
  ** Both monsters' designs feature a [[wikipedia:Traditional animation|two dimensional]]-like appearance, blonde hair, black masks, a skull face on one of their accessories, at least one example of mismatching [[wikipedia:Patchwork|patchwork]] on their clothing, and the same-colored decorations hanging from their clothing: a pink heart, a green circle, a yellow [[wikipedia:Clubs (suit)|club]], and a purple [[wikipedia:Spades (suit)|spade]].
