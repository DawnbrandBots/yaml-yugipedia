title: Card Trivia:Hi-Speedroid Chanbara
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Booster SP: High-Speed Riders]]''/''[[High-Speed Riders]]''.
  * This monster is based on a toy version of a [[wikipedia:Sword|sword]].
  ** This monster's Japanese name, "Chanbarider" (チャンバライダー, ''Chanbaraidā'') is a portmanteau of "''chanbara''" (ちゃんばら, lit. "sword fighting") and "''raidā''" (ライダー, lit. "rider").
