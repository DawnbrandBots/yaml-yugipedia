title: Card Trivia:Dododo Driver
wikitext: |-
  {{Navigation}}

  * "[[Dododo Buster]]" and "[[Dododo Witch]]" appear in this card's artwork.
  ** This is appropriate as those two are the only "[[Dododo]]" monsters that can [[Special Summon]] this card.
  * This monster is based on a traditional [[wikipedia:Rickshaw|Rickshaw driver]].
  * "Dododo Driver" appears in the background of "[[Dododo Draw]]," apparently being punished by "Dododo Buster".
