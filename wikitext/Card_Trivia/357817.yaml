title: Card Trivia:Sky Dragoons of Draconia
wikitext: |-
  {{Navigation}}

  * This monster has two [[counterparts]]: "[[Dragoons of Draconia]]" and "[[Sea Dragoons of Draconia]]".
  * This is the first [[Winged Beast]] [[Pendulum Monster]] to be released in the ''[[TCG]]''.
  ** The first Winged Beast Pendulum Monster to be released in the ''[[OCG]]'' is "[[Performapal Odd-Eyes Light Phoenix]]".
  * The "Sky-State of Cxulub" mentioned in this card's [[flavor text]] is possibly derived from the [[wikipedia:Chicxulub crater|Chicxulub crater]], an impact crater popularly believed to have triggered the [[wikipedia:Cretaceous–Paleogene extinction event|Cretaceous–Paleogene extinction event]].
