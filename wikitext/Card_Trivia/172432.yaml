title: Card Trivia:Gagaga Magician
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Battle Pack: Epic Dawn]]'', ''[[Duelist Pack: Yuma]]'', and ''[[2-Player Starter Set]]''.
  * This monster appears in the artworks of "[[Fourcing]]", "[[Gagaga Illusion]]", "[[Gagaga Thunder]]", "[[Gagaga x Gagaga]]", "[[Gagagaback]]", "[[Gagagabolt]]", "[[Gagagaguard]]", "[[Gagagarevenge]]", "[[Gagagarush]]", "[[Gagagatag]]", "[[Onomatopaira]]", "[[Onomatopia]]", "[[Onomatopickup]]", and "[[Numbers Evocation]]".
  * This monster's name is derived from the Japanese sound effect for any kind of physical impact, similar to the English onomatopoeia for "pow". Fittingly, in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster's attacks are depicted as physical rather than magical.
  * This monster's belt features three diamonds that connect with each other, and eight outer points that light up depending on its [[Level]].
  * The "Gagaga" crest appears on the back of this monster's outfit. This is not only seen in the ''Yu-Gi-Oh! ZEXAL'' anime and manga, but also in the artwork of "Gagagaguard", along with "[[Gagaga Girl]]".
  * This monster has multiple forms:
  ** An "[[Astral (archetype)|Astral]]" [[counterpart]]: "[[Astral Magician]]".
  ** A [[signature move]] counterpart: "[[Gagaga Magician - Gagaga Magic]]"
  ** An [[Card evolutions|upgraded]] [[Xyz Monster|Xyz]] form: "[[Gagagaga Magician]]".
  ** A ''[[Rush Duel]]'' [[Baseball]] parody: "[[Gagaga Outfielder]]".
  * This monster shares similarities with "[[Dark Magician]]":
  ** Both are the signature [[Spellcaster]] monsters used by the protagonists of their respective ''Yu-Gi-Oh!'' series: This monster is used by [[Yuma Tsukumo]] while "Dark Magician" is used by [[Yugi Muto]]/[[Yami Yugi]].
  ** Both feature a female apprentice: This monster's apprentice is "Gagaga Girl" while the apprentice of "Dark Magician" is "[[Dark Magician Girl]]".
  *** This monster and "Gagaga Girl" are both three Levels and 1000 [[ATK]] less than "Dark Magician" and "Dark Magician Girl".
  * This is the only card which appeared as a [[Starfoil Rare]] in all sets that had that rarity (''Battle Pack: Epic Dawn'' and ''[[Star Pack 2013]]'').
