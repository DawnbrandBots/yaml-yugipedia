title: Card Trivia:King of Destruction - Xexex
wikitext: |-
  {{Navigation}}

  * Although this card has not been released in the OCG, its official Japanese name was first revealed in the ''[[The Valuable Book 9]]'', and later confirmed with its appearance in ''[[Yu-Gi-Oh! GX Tag Force]]''.
  * This card is named after the 1991 [[Konami]] arcade game, ''[[wikipedia:Xexex|Xexex]]''.
  ** "[[Flint Lock]]," "[[Flint]]," and "[[Flint Missile]]" are also based on this game.
