title: Card Trivia:Crimson Sentry
wikitext: |-
  {{Navigation}}

  * This monster has a very similar artwork to that of "[[Fire Princess]]".
  * This card, "[[Lady Panther]]", "[[Return of the Doomed]]", and "[[The Forgiving Maiden]]" feature very similar effects, and made their debuts in the ''[[OCG]]''/''[[TCG]]'' in the same [[Booster Pack]]s (''[[Spell of Mask]]'' and ''[[Labyrinth of Nightmare]]'', respectively).
