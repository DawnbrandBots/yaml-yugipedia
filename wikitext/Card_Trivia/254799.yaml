title: Card Trivia:Blaster, Dragon Ruler of Infernos
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dragon's Inferno]]" and "[[Dragoroar]]".
  * This is one of the [[cover card]]s of ''[[2013 Collectible Tins Wave 1]]''.
  * This monster is an older counterpart of "[[Burner, Dragon Ruler of Sparks]]".
  * This monster has an [[Xyz Monster]] [[retrained]] counterpart: "[[Blaze, Supreme Ruler of all Dragons]]".
  * This monster has a "[[True Draco]]" counterpart: "[[True King Agnimazud, the Vanisher]]".
  ** Both are [[FIRE]] monsters with similar [[Summoning conditions]], effects that activate when they are affected by card effects in a certain way (being banished by effect for "Blaster", being destroyed by effect for "Agnimazud") to replace themselves with another monster, and effects relating to FIRE monsters.
