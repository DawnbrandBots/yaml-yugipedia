title: Card Trivia:Dark Angel
wikitext: |-
  {{Navigation}}

  * Despite not being a "[[Trickstar]]" monster, the background and the art style of this card's artwork are the same as the members of the archetype, which likely references the fact that [[Skye Zaizen]], the user of the "Trickstar" archetype, was induced into using this card by the [[Knights of Hanoi]] in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
