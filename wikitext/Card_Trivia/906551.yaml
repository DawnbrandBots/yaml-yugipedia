title: Card Trivia:Pikari @Ignister
wikitext: |-
  {{Navigation}}

  * The "[[@Ignister]]" logo is located on this monster's hat.
  * This monster and "[[Light Dragon @Ignister]]" represent [[Lightning]], the [[LIGHT]] [[Ignis]].
  ** This monster's name is based on "''pika''", the Japanese onomatopoeia for "sparkling", which is also used to represent the flash of light from a lightning bolt.
  ** This monster's design features markings on its body resembling an evil grin, referencing Lightning's villainous nature.
  ** This monster's hat resembles that of "[[Armatos Legio Plumbum Trident]]", a monster used by Lightning.
  ** This monster's anime effect could only search for the [[Field Spell]] "[[Ignister A.I.Land (anime)|Ignister A.I.Land]]", referencing Lightning's [[Duel]]ing strategy revolving around the usage of the Field Spell, "[[Armatos Colosseum]]".
  ** This monster's ''[[OCG]]''/''[[TCG]]'' effect to change the [[Level]] of another "@Ignister" monster to 4 is designed to facilitate the [[Xyz Summon]]ing of the [[Rank 4]] "Light Dragon @Ignister".
