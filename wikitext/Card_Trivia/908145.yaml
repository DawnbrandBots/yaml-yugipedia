title: Card Trivia:Stellar Wind Wolfrayet
wikitext: |-
  {{Navigation}}

  * This monster is named after the [[wikipedia:Wolf–Rayet star|Wolf–Rayet star]], a class of extremely hot white stars nearing the end of their lives before they explode into a [[wikipedia:Supernova|supernova]].
  ** This reflects this monster's 2500 [[original ATK]] and its effect to gain 300 [[ATK]] while it is under 4000, which it can reach after it is applied five times, which simulates the short life-span of a Wolf-Rayet star. Once it reaches the 4000 ATK minimum, its effect [[shuffle]]s itself into the [[Extra Deck]] and all monsters the opponent [[control]]s into the opponent's [[Deck]], simulating how the Wolf-Rayet explodes into a supernova.
  * This monster bears a resemblance to Glaga, one of the final bosses of ''[[wikipedia:Mega Man Battle Network 6|Mega Man Battle Network 6]]''. Its winged appearance also gives it a resemblance to Glaga's upgraded form from the [[wikipedia:MegaMan NT Warrior|anime]], after Glaga absorbs its winged rival Falzar.
