title: Card Trivia:Sinful Spoils of Doom - Rciela
wikitext: |-
  {{Navigation}}

  * "[[Diabellstar the Black Witch]]", as well as the destroyed remains of "[[Snake-Eye Ash]]", "[[Snake-Eye Oak]]", and "[[Snake-Eye Birch]]", appear in this card's artwork.
  ** This card depicts the active form of the former's "cape", which is in actuality the soul of "[[Rucia of the White Forest]]", mutated after it was separated from her own body by "[[Azamina (card)|Azamina]]". The body itself mutated into "[[Azamina Mu Rcielago]]", which accordingly also has the word "death" in its Japanese name.
  *** "[[Guilt of the Sinful Spoils]]" depicts "Diabellstar" defeating "Rcielago" with "Rciela".
