title: Card Trivia:Zekt Conversion
wikitext: |-
  {{Navigation}}

  * "[[Inzektor Exa-Stag]]" and 3 copies of "[[Inzektor Ant]]" appear in this card's artwork.
  * This card seems to be a reference to a plot point in ''[[wikipedia:Kamen Rider Kabuto|Kamen Rider Kabuto]]'', in which the villains "native Worms" turned humans into more worms, by equipping them with alien necklaces.
