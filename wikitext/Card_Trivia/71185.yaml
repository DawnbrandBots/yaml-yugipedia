title: Card Trivia:Darkblaze Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Telepathic Power]]".
  * This monster has a [[retrained]] counterpart: "[[Arkbrave Dragon]]".
  * This monster is similar to "[[Red-Eyes Black Dragon]]".
  ** This monster has the same [[Level]] (7) as "Red-Eyes Black Dragon"; additionally, if this card is [[Special Summon]]ed with its own effect, its [[ATK]] and [[DEF]] become equal to those of "Red-Eyes" (2400/2000).
