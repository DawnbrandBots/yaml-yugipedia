title: Card Trivia:Morphtronic Datatron
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Morphtronic Slingen]]".
  * This monster is based on a [[wikipedia:Lighter|lighter]] (in its Japanese artwork) and a 2 gigabyte [[wikipedia:USB flash drive|USB flash drive]] (in its international artwork).
  * This card's Japanese name, "Chakkan", is the Japanese onomatopoeia of a lighter being lit.
  * This monster was not censored in the international version of the ''[[Yu-Gi-Oh! 5D's]]'' anime, though it is still called "Morphtronic Datatron", alluding to its edited ''TCG'' artwork.
  * The [[effect damage]] this card inflicts with its [[Attack Position]] effect is equal to half its [[ATK]], and the effect damage it inflicts in [[Defense Position]] is half its [[DEF]].
