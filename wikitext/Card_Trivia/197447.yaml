title: Card Trivia:Thousand Punisher
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Enraged Battle Ox]]", "[[Marshmallon]]" and "[[Master of Oz]]" appear in this card's artwork.
  ** It is unlikely to be identical-looking [[Normal Monster]] "[[Battle Ox]]", since the "Battle Ox" monster is depicted attacking a Defense Position "Marshmallon" (which can't be destroyed by battle), "Enraged Battle Ox" has an effect that allows it to inflict [[piercing]] battle damage, and this Spell Card potentially allows a monster to attack multiple times.
