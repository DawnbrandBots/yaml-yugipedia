title: Card Trivia:Soul of a Reporter
wikitext: |-
  {{Navigation}}

  * "[[Reporter Raccoon]]" appears in this card's artwork.
  * This card's Japanese name (報道魂, ''Hōdōdamashī'') may be a reference to "The Soul of the Press" (報道の魂, ''Hōdō no tamashī''), a late night news and documentary program on the Japanese TV station, [[wikipedia:TBS Television (Japan)|TBS]].
