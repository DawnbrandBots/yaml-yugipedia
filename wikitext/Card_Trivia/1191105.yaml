title: Card Trivia:Alligator's Sword Dragon Knight
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] [[Main Deck]] [[Dark Time Wizard (series)|Dark Time Wizard]] counterpart of "[[Alligator's Sword Dragon]]".
  ** This monster's pose is taken from a panel from {{chapter|Yu-Gi-Oh!|180|ref}} showing "[[Alligator Sword Dragon (manga)|Alligator Sword Dragon]]" attacking.
  ** This monster's [[direct attack]] effect is a reference to a scene during [[Katsuya Jonouchi and Ryota Kajiki's Duel (manga)|Katsuya Jonouchi and Ryota Kajiki's Duel]] in the ''Yu-Gi-Oh!'' [[Yu-Gi-Oh! (manga)|manga]] (and its [[Yu-Gi-Oh! (anime)|anime]] adaptation), in which [[Katsuya Jonouchi (manga)|Katsuya Jonouchi's]] ([[Joey Wheeler]] in the anime) "Alligator Sword Dragon" had the ability to fly, and as such, could cross over the sea cast by "[[Umi (manga)|Umi]]" and attack [[Ryota Kajiki (manga)|Ryota Kajiki]] ([[Mako Tsunami]] in the anime) directly, ignoring his hidden monsters.
  ** This monster being a Main Deck monster instead of a [[Fusion Monster]] is may reference an error in {{chapter|Yu-Gi-Oh!|180|ref}}, where "Alligator's Sword Dragon" attacks during the turn it is [[Fusion Summon|Fusion Summoned]], despite monsters being unable to attack during the turn they are Fusion Summoned under  the [[Battle City Rules]]; as a Main Deck monster, this monster wouldn't be subject to these restrictions.
