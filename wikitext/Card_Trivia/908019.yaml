title: Card Trivia:Tamabot
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Coin Tech Potbot]]", "[[Multidamaduplication]]", "[[Tamainabot]]", "[[Strike Tamabowling]]", "[[Tama Bond]]", "[[Tama Tama Gachance]]", "[[Tamabat]]", "[[Tamabit]]", "[[Tamalauncher]]", "[[Tamarolling]]", "[[Tamatamabangborn]]", "[[Tamatamadown]]", and "[[Tamatank Mk-II]]".
  * This is the [[signature card]] of [[Yuhi Ohdo]] and his [[Earthdama]] [[Damamu]] in the ''[[Yu-Gi-Oh! GO RUSH!!]]'' Anime and the former's [[Yu-Gi-Oh! GO RUSH!! (manga)|manga]] [[Yuhi Ohdo (manga)|incarnation]].
  * With no "[[Kuriboh]]" monster introduced in either the ''GO RUSH'' anime or manga, this monster seems to take its place as "cure mascot monster of a character" for that era.
  * This monster has the following Fusion forms.
  ** With "[[Blue-Fang Burst Dragon]]": "[[Tamabot Burst Dragon]]"
  ** With "[[Red-Boot Boost Dragon]]": "[[Tamabot Boost Dragon]]"
  ** With another "Tamabot": "Tamainabot"
  ** With 2 other "Tamabot": "[[Tamabot King Golem]]"
