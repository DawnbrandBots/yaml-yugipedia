title: Card Trivia:Otonari Thunder
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "OToNaRiThunder" ({{Ruby|ＯＴｏＮａＲｉ|オトナリ}}サンダー, ''Otonari Sandā'') is a portmanteau of the words "neighbor" (お隣さん, ''Otonari-san'') and "[[Thunder]]" (サンダー, ''Sandā'').
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to attach itself and another [[Level 4]] [[LIGHT]] [[Thunder]] monster to an [[Xyz Monster]] references the required [[Xyz Material]] for "[[No. 91: Thunder Spark Dragon (manga)|No. 91: Thunder Spark Dragon]]" in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, where it requires five Xyz Materials (instead of three in the ''OCG''/''TCG''). In {{chapter|ZEXAL|013|ref}}, immediately after Summoning "Otonari Thunder", [[Thunder Spark]] used five Level 4 LIGHT Thunder monsters, including "Otonari Thunder", as Xyz Material to Xyz Summon "No. 91: Thunder Spark Dragon".
  ** In the ''OCG''/''TCG'', "[[Number 91: Thunder Spark Dragon]]" can only be Xyz Summoned using three Xyz Materials, so if the player [[control]]s the five monsters Thunder Spark did in the manga, this monster's effect allows the remaining two monsters to be attached to "Thunder Spark Dragon" after it is Xyz Summoned, to give "Thunder Spark Dragon" the five Xyz Materials that are required in order to activate its second effect.
  * This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter, specifically from the panel showing [[Otonari Thunder (manga)|this monster]] being Summoned.
