title: Card Trivia:Jungle Dweller
wikitext: |-
  {{Navigation}}

  * This monster is a [[counterpart]] of "[[Abyss Dweller]]".
  ** Both share a similar naming scheme and artwork, in which they are depicted in the distant background of their environments.
  ** Both were released as ''[[TCG]]''-[[TCG-only|exclusive]] cards in their respective [[Core Booster]].
  ** This monster is [[Level 8]], which is twice the [[Rank]] (4) of "Abyss Dweller".
