title: Card Trivia:Speedroid Menko
wikitext: |-
  {{Navigation}}

  * This monster's appearance is based on ''[[wikipedia:Menko|Menko]]'', a type of Japanese card.
  ** This monster's Japanese name is a portmanteau of "''Menko''" (面子 or めんこ, ''menko'') and "coat" (コート, ''kōto'').
  ** This monster's effects references the game of ''Menko'', where a player throws down their cards while other players have their cards on field (reflected by its [[Special Summon]]ing effect) in an attempt to flip the other player's cards (reflected by its effect to change the opponent's [[face-up]] monsters to [[Defense Position]]).
