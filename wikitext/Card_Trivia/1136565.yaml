title: Card Trivia:Rage Rose Witch
wikitext: |-
  {{Navigation}}

  * A silhouette of "[[Black Rose Dragon]]" appear in this card's artwork.
  * This monster is based on [[Akiza Izinski]], who was initially known as the "Black Rose", who was known the "Black Rose Witch" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime, which is further referenced in this monster's base Japanese name, "Witch of Black Roses and Thorns" (黒薔薇と荊棘の魔女, ''Kurobara to Keikyoku no Majo''). 
  ** This monster's name references the hatred and rage surrounding Akiza, which she initially displayed towards humanity for discriminating her due to her violent use of [[Psychic Duelist|Psychic Dueling]] powers.
  *** This monster's Japanese name, "Hate Rose Witch", is also based on the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "[[Black Rose Dragon (anime)|Black Rose Dragon]]" while [[equip]]ped with "[[Thorn of Malice (anime)|Thorn of Malice]]" in the original Japanese version of the ''Yu-Gi-Oh! 5D's'' anime: "Hate Rose Whip".
  ** This monster's mask covers only the top portion of her face, leaving only the bottom half exposed, referencing a scene in {{episode|5D's|024|ref}} where Akiza's "Black Rose" mask breaks following her defeat to [[Yusei Fudo]].
  ** This monster's [[original ATK]] (1600) references the original Japanese name of Akiza, "Aki Izayoi", whose surname translates to "sixteen-day-old moon", which also references how Akiza was sixteen years old at the start of the ''Yu-Gi-Oh! 5D's'' anime.
  ** This monster's [[original DEF]] (2400) references the original [[ATK]] of "Black Rose Dragon", Akiza's [[signature card]] in the ''Yu-Gi-Oh! 5D's'' anime.
