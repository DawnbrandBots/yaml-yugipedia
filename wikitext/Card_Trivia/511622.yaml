title: Card Trivia:Dark Magician Girl
wikitext: |-
  {{Navigation|other=[[Dark Magician Girl (DDM)|Dungeon Dice Monsters]] - [[Dark Magician Girl (character)|Character]]}}

  * This is the [[cover card]] of "[[Over Rush Pack 2]]", as well as one of the cover cards of ''[[Ghosts From the Past: The 2nd Haunting]]'', ''[[Structure Deck: Yugi]]'', ''[[Premium Pack 4]]'', ''[[Collectible Tins 2005]]'', ''[[History Archive Collection]]'', and ''[[2-Player Starter Set]]''.
  * This monster appears in the artwork of "[[Bond Between Teacher and Student]]", "[[Dark Burning Attack]]", "[[Dark Burning Magic]]", "[[Dark Magical Curtain]]", "[[Dark Magic Expanded]]", "[[Dark Magic Inheritance]]", "[[Dark Magic Twin Burst]]", "[[Dark Resonance Burst]]", "[[Magicians' Combination]]", "[[Magicians' Defense]]", "[[Magician Navigation]]", and "[[Magician's Salvation]]".
  ** This monster's spiritual form appears in the artworks of "[[Magicians' Souls]]".
  ** This monster's hood and staff appear in the artwork of "[[Donpen & Donko]]", serving as cosplay worn by "Donko".
  * "[[Dark Magical Circle]]" appears in several versions of this card's artworks.
  * This monster is based on the [[wikipedia:Magical girl|magical girl]] manga and anime subgenre, while retaining a ''[[wikipedia:Shōnen|shonen]]'' undertone.
  * This monster is the apprentice and female [[counterpart]] of "[[Dark Magician]]".
  * This monster has several [[counterpart]]s:
  ** A [[retrained]] counterpart: "[[Apprentice Illusion Magician]]"
  ** An [[attack]]-preventing counterpart: "[[Magician's Valkyria]]"
  ** Two [[Fusion Monster]] counterparts:
  *** With "[[The Eye of Timaeus]]":   "[[Dark Magician Girl the Dragon Knight]]"
  *** With "Dark Magician": "[[The Dark Magicians]]"
  ** A [[Toon monster]] counterpart: "[[Toon Dark Magician Girl]]"
  ** A "[[Gagaga]]" counterpart: "[[Gagaga Girl]]"
  ** A "[[Statue]]" counterpart: "[[Statue Dark Magician Girl]]"
  ** An [[Xyz Monster]] counterpart: "[[Magi Magi ☆ Magician Gal]]"
  ** A "[[Palladium]]" counterpart: "[[Palladium Oracle Mana]]"
  ** An [[Illusion]] counterpart: "[[Nightmare Apprentice]]"
  ** A "[[Shining Sarcophagus (series)|Shining Sarcophagus]]" counterpart: "[[Dark Magician Girl the Magician's Apprentice]]"
  ** Two 25th anniversary counterparts:
  *** [[Yu-Gi-Oh! (manga)|Manga]] anniversary: "[[Chronicle Sorceress]]" (with "[[Blue-Eyes White Dragon]]")
  *** ''[[Yu-Gi-Oh! Official Card Game|OCG]]'' anniversary: "[[Magicians of Bonds and Unity]]" (with "Dark Magician")
  * The visual appearance of "[[Card Ejector]]" is based on this monster.
  ** In a similar fashion, "[[Miracle Flipper]]" (a monster used by [[Jaden Yuki]] in the ''[[Yu-Gi-Oh! GX]]'' anime, in addition to "Card Ejector") is based on "[[Dark Magician]]".
  * This is the [[signature card]] of [[Téa Gardner]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** This is the first [[Monster Card]] to speak in the anime, who first communicated with Téa in {{episode|Yu-Gi-Oh!|102|ref}}.
  * This monster's effect to gain 300 [[ATK]] for every "Dark Magician" or "Magician of Black Chaos" in the [[Graveyard]]s reference how [[Mana (manga)|Mana]] (and her [[Mana|anime counterpart]], this monster's original spirit owner, vowed to train hard and become stronger to honor the death of her teacher [[Mahado (manga)|Mahado]] ([[Mahad]] in anime) who gave his life to merge his ''[[ba]]'' with his ''[[ka]]'', the [[Magus of Illusion]] ([[Illusion Magician]] in anime) in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and anime.
  ** In ''[[Yu-Gi-Oh! Rush Duel]]'', [[Dark Magician Girl (Rush Duel)|this monster]] is based on its [[Dark Magician Girl (manga)|original version]] from the ''Yu-Gi-Oh!'' manga, with an effect to gain 500 ATK for each "Dark Magician" in either Graveyard.
  * Despite this card's effect mentioning "[[Magician of Black Chaos]]", this card was released in the ''[[TCG]]'' before "Magician of Black Chaos" was released in the ''TCG''. Ultimately, "Magician of Black Chaos" would be released about 4 years later in the ''TCG'', in ''[[Premium Pack (TCG)|Premium Pack]]''.
  * In ''[[Yu-Gi-Oh! World Championship Tournament 2004]]'', [[Dark Magician Girl (World Championship 2004)|this card]]'s text mentions "Dark Spellian" and "Spellian of Black Chaos". This is presumably due to a naive use of find-and-replace to rename "Magic" to "Spell" in card texts, as Magic Cards had just recently been renamed to [[Spell Card]]s in the ''TCG''.
  * This card was previously printed without a [[passcode]].
  ** In the Japanese ''[[OCG]]'', this card was printed with the [[Replica]] notice instead of a [[passcode]] (with the exception of the ''[[Anniversary Pack]]''), up until the release of the ''[[Yu-Gi-Oh! The Dark Side of Dimensions Movie Pack]]''.
  ** In the Korean ''OCG'', this card was printed with the Replica notice instead of a passcode in ''[[Millennium Deck]]'' and ''[[Duelist Pack: Battle City]]'' only.
  ** In the ''TCG'', this card was printed without a passcode from ''[[Duelist Pack: Yugi]]'' until ''[[Yugi's Legendary Decks]]'' (except in ''[[Legendary Collection 3: Yugi's World Mega Pack]]'').
  * Theoretically, this monster can attain a maximum of 12,800 ATK by its own effect, if each player has three copies of "Dark Magician", "Magician of Black Chaos", "[[Dark Magician the Dragon Knight]]", "[[Magician of Chaos]]", "[[Dark Magician of Destruction]]", and "[[Dark Magician, the Pharaoh's Servant]]" in their Graveyards. This is because the latter 4 monsters have their names become "Dark Magician" while they are in the Graveyard.
  ** As for its ''Rush Duel'' counterpart, the highest this monster's ATK can be under its own effect is 9000 if each player has one copy of "[[Dark Magician (Rush Duel)|Dark Magician]]" and three copies of "[[Magician of Black Chaos (Rush Duel)|Magician of Black Chaos]]" and "[[Dark Magician the Dragon Knight (Rush Duel)|Dark Magician the Dragon Knight]]" in their Graveyards. This is because the ''Rush Duel'' version of "Dark Magician" is a [[Legend Card]], which is limited to only one copy per player, and "Dark Magician the Dragon Knight" and the ''Rush Duel'' version of "Magician of Black Chaos" have their names become "Dark Magician" while they are in the Graveyard.
  * This monster's pose in this card's third ''OCG''/''TCG'' and second ''Rush Duel'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|174|ref}} showing this monster being Summoned.
