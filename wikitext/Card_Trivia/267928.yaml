title: Card Trivia:Dragoncarnation
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the words "dragon" and "incarnation".
  ** This card's Japanese name is a homophone of the phrase "画竜点睛" (garyōtensei), meaning "add the finishing touches" (literally "paint a dragon and dot the eyes").
  * According to the [[Gagaga Academy Tospedia card storylines#"The Four Dragon Rulers" Edition|Gagaga Academy Tospedia card storylines]], this card's artwork depicts the adult "Dragon Ruler" monsters reincarnating into the baby "Dragon Ruler" monsters.
  * The lights in this picture are coming from each of the baby dragons, based on their artworks:
  ** "[[Burner, Dragon Ruler of Sparks|Burner]]" is inside a volcano.
  ** "[[Stream, Dragon Ruler of Droplets|Stream]]" is at the base of a waterfall.
  ** "[[Reactan, Dragon Ruler of Pebbles|Reactan]]" is near some mountains.
  ** "[[Lightning, Dragon Ruler of Drafts|Lightning]]" is inside a vortex of clouds.
