title: Card Trivia:Performapal Duelist Extraordinaire
wikitext: |-
  {{Navigation}}

  [[File:Pendulum_Beat!_final_scene.png|thumb|right|250|The final scene of "[[Pendulum Beat!]]".]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]''.
  * The silhouette of [[Yuya Sakaki]], the colorful outlines of "[[Performapal Bowhopper]]", "[[Performapal Cheermole]]", "[[Performapal Elephammer]]", "[[Performapal Hip Hippo]]", "[[Performapal Monkeyboard]]", "[[Performapal Skeeter Skimmer]]" "[[Performapal Sword Fish]]", "[[Performapal Trampolynx]]", "[[Performapal Turn Toad]]", "[[Performapal Whip Snake]]", and the smiley faces from the artwork of "[[Smile World]]" appear in this card's artwork.
  ** This card's artwork is based on the final scene of "[[Pendulum Beat!]]", the sixth and final Japanese opening theme of the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This monster's name references Yuya's ambition to become the greatest [[Dueltainer]] in the ''Yu-Gi-Oh! ARC-V'' anime.
  * This monster's first [[monster effect]], [[add]]ing cards related to the [[Supreme King]] [[series]], references [[Z-ARC]]'s rise to power prior to the ''Yu-Gi-Oh! ARC-V'' anime. After Z-ARC accidentally injures an opponent during a [[Duel]], the audience cheers for his violent Dueling style, leading him to gradually become more violent. This eventually leads into his transformation into "[[Supreme King Z-ARC (anime)|Supreme King Z-ARC]]" before he is separated into his separated incarnations, including Yuya Sakaki.
  * This monster's effects reference the effects of common [[Action Card]]s that were used during [[Action Duel]]s in the ''Yu-Gi-Oh! ARC-V'' anime.
  ** Its [[Pendulum Effect]] to prevent a monster from being [[destroy]]ed by battle and reduce any [[battle damage]] from that battle is based on the effect of "[[Miracle]]".
  ** Its monster effect to negate a monster's attack by [[discard]]ing a [[Spell Card]] is based on the effect of "[[Evasion]]".

