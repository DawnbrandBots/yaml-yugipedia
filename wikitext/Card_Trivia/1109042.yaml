title: Card Trivia:Acceleratarasque
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is a portmanteau of "[[wikipedia:Tarasque|Tarasque]]" and "[[Wikipedia:Hardware acceleration|acceleration]]".
  ** The Tarasque is a creature from [[Wikipedia:French mythology|French mythology]] who is described as a combination of a dragon, a crocodile, and a snake, often depicted with the head of a lion and a tortoise-like shell.
  ** "Acceleration" is short for "hardware acceleration", the process of transferring computer processing work into inactive hardware sources. The word itself can also be defined as an increase in speed, which reflects how this monster's design includes a pair of wings and turbines, which are designed to help a jet aircraft accelerate at high speeds.
