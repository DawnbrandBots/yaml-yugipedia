title: Card Trivia:Duelist Genesis
wikitext: |-
  {{Navigation}}

  [[File:Stardust Dragon in the commercial.png|thumb|250px|"[[Stardust Dragon]]" in the commercial for ''[[The Duelist Genesis]]''.]]

  * "[[Stardust Dragon]]" appears in this card's artwork.
  * This card is named after ''[[The Duelist Genesis]]'', the first [[booster pack]] to feature [[Synchro Monster]]s.
  ** This card's artwork is based on a scene from the [https://www.youtube.com/watch?v=98c8eCOYo8k Japanese commercial] for ''The Duelist Genesis'', where "Stardust Dragon" is manifested out of the portal.
  * This card is the Synchro counterpart of "[[Generation Force (card)|Generation Force]]" and "[[Duelist Alliance (card)|Duelist Alliance]]".

