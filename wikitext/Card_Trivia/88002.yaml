title: Card Trivia:Warrior of Atlantis
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Deep Sea Aria]]".
  * "[[A Legendary Ocean]]" appears in this card's artwork.
  * The reason this card is called "Warrior of '''Atlantis'''" is that the Japanese name of "A Legendary Ocean" translates to "Legendary City Atlantis".
  * This is the only card to [[mention]] a card whose name is always treated exclusively<!--to exclude "The Eye of Timaeus"--> as a different card name via a [[name condition]].
