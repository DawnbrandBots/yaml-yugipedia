title: Card Trivia:Varudras, the Final Bringer of the End Times
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Decanelogue", references the [[wikipedia:Ten Commandments|Ten Commandments]], a set of biblical principles used in Judaism, Christianity, and Islamic religions. It is also referred in Latin as "Decalogue", which reflects how this is a [[Rank 10]] [[Xyz Monster]].
