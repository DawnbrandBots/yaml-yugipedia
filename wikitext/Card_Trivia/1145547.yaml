title: Card Trivia:Darklord Dance
wikitext: |-
  {{Navigation}}

  * "[[Indulged Darklord]]" and "[[Capricious Darklord]]" appear in this card's artwork.
  ** Despite both of these monsters being female, they cannot be used with this card for the [[Fusion Summon]] of any other female monster, as "[[Patissciel Couverture]]" requires [[Pendulum Monster]]s.
