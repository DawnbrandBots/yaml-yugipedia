title: Card Trivia:Speed Spell - Count Up
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts the monitor of a [[Duel Runner]] displayed during a [[Turbo Duel]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  ** This card's artwork depicts the monitor displaying six [[Speed Counter]]s, and two more were lit up more brightly than the others, which reflects this card's anime effect to increase the player's Speed Counters by two.
