title: Card Trivia:Forge of the True Dracos
wikitext: |-
  {{Navigation}}

  * "[[Master Pendulum, the Dracoslayer]]" and "[[Amorphactor Pain, the Imagination Dracoverlord]]" appear in this card's artwork.
  ** This card's artwork continues the events of "[[Amorphous Persona]]".
  * Considering the name of this card, the events in this card's artwork could lead to the creation of "[[Master Peace, the True Dracoslayer]]" and "[[True King Agnimazud, the Vanisher]]".
