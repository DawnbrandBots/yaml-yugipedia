title: Card Trivia:Ally of Justice Enemy Catcher
wikitext: |-
  {{Navigation}}

  * This card's image and feature look similar to a [[wikipedia:squid|squid]].
  * It is possible this card is a captured and modified "[[Worm Tentacles]]", given their similarity in appearance.
  * This monster's effect is parallel to the later goal of the "[[Ally of Justice]]" to study and analyze the "[[Worm]]s" (since most "Worm" monsters rely on [[Flip Effect]]s), as shown in the [[Master Guide 3 card storylines#The Invasion of the "Worms" Intensifies|Master Guide 3 card storylines]].
