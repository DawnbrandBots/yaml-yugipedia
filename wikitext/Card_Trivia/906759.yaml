title: Card Trivia:Adamancipator Friends
wikitext: |-
  {{Navigation}}

  * "[[Adamancipator Analyzer]]", "[[Adamancipator Researcher]]", "[[Adamancipator Risen - Raptite]]", "[[Adamancipator Risen - Leonite|Leonite]]", "[[Adamancipator Risen - Dragite|Dragite]]", and "[[Adamancipator Seeker]]" appear in this card's artwork.
  * The kanji 「{{Ruby|魔|ま}}{{Ruby|救|きゅう}}の{{Ruby|奇|き}}{{Ruby|縁|えん}}」 (''Makyū no Kien'', read as "Adamassiah Friends") in this card's Japanese name can be translated as "Adamancipator Fateful Bond".
