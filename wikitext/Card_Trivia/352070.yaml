title: Card Trivia:Necroid Synchro
wikitext: |-
  {{Navigation}}

  * "[[Junk Anchor]]" and "[[Junk Giant]]" appear in this card's artwork.
  ** This card's artwork depicts the above-mentioned monsters being used to [[Synchro Summon]] a [[Level 8]] [[Synchro Monster]]. Fittingly, "[[Stardust Dragon]]" and "[[Stardust Spark Dragon]]" are appropriate targets that can be Summoned with this card's effect.
  * This card's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] a "[[Stardust (archetype)|Stardust]]" Synchro Monster is based on a scene in {{chapter|Yu-Gi-Oh! 5D's - Ride SP1|ref}} where [[Yusei Fudo (manga)|Yusei Fudo]] used this card to [[Special Summon]] "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]".
