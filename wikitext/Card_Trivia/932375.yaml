title: Card Trivia:Moissa Knight, the Comet General
wikitext: |-
  {{Navigation}}

  * This monster's name is a pun on [[wikipedia:Moissanite|moissanite]], a rare silicon carbide mineral notable for being found in meteorites.
  ** This monster's Japanese name, "Onemore", likely references its effect to allow the player to conduct "one more" [[Pendulum Summon]].
  *** This naming scheme also reflects this monster's [[Level]] (1) and [[original ATK and DEF]] (100/100).
  * This is the first [[Pendulum Monster]] with a [[Pendulum Scale]] of 11 to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This monster has a "[[Wight]]" counterpart: "[[Moissa Wight]]".
