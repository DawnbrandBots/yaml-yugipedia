title: Card Trivia:Bujin Hiruko
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bujincandescence]]".
  ** This monster's silhouette appears in the artwork of "[[Bujincident]]", attempting to control "[[Bujin Hirume]]" as mentioned in its flavor text.
  *** Only the silhouette of "Hiruko" is visible, as this card had not yet been released at the time "Bujincident" was.
  * This monster is named after Hiruko, another name for [[wikipedia:Ebisu (mythology)|Ebisu]], one of the [[wikipedia:Seven Lucky Gods|Seven Lucky Gods]] in [[wikipedia:Japanese mythology|Japanese mythology]].
  * The [[Main Deck]] "[[Bujin]]" [[Beast-Warrior]] monsters resemble characters that appear in the ''[[Yu-Gi-Oh! GX]]'' anime through their head shapes and color schemes. In this case, this monster resembles [[Sartorius]].
  ** The [[flavor text]] states that this monster manipulated "Bujin Hirume" and transformed her into "[[Bujinki Amaterasu]]". As "Hirume" resembles [[Alexis Rhodes]], this is a reference to how Sartorius brainwashes Alexis into turning against her friends and join the [[Society of Light]].
  * This card's Spanish ''[[TCG]]'' lore features a mistranslation; the word "''eventually''" was translated as "''eventualmente''", which means "''by chance''" or "''temporarily''".

