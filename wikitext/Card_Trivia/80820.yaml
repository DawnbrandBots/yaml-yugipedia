title: Card Trivia:Seismic Crasher
wikitext: |-
  {{Navigation}}

  * This monster's two swords are colored green and purple, which are the same colors as the borders of [[Spell]] and [[Trap Cards]].
  * Before this card's Japanese release, when it was shown in an ad for ''[[V Jump]]'' and ''[[The Valuable Book 10 promotional cards|The Valuable Book 10]]'', it had a [[Card Artworks:Seismic Crasher|different artwork]] from its finalized artwork. This was noticed upon the card's release by Japanese players, and in response, Konami apologized in a future issue of ''V Jump''.
