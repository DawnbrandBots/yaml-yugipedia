title: Card Trivia:Yellow Duston
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] appears in the artworks of "[[Duston Roller]]", "[[House Duston]]", "[[Magicalized Duston Mop]]", "[[Starduston]]", "[[Ant Barrier]]", "[[Frontline Disturbance]]", and "[[Trickstar Live Stage]]".
  ** It is also depicted as an illustration on the bedspread in the artwork of "[[Ojama Pajama]]".
