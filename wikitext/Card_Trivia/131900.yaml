title: Card Trivia:4-Starred Ladybug of Doom
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Verdant Sanctuary]]".
  * This monster features four stars on its back, which reflects its effect to [[destroy]] the opponent's [[Level 4]] monsters.
  * This is considered to be one of the first [[Anti-Meta]] cards, meant to serve as a counter for the initial [[metagame]], as it featured [[Beatdown]] strategies utilizing Level 4 monsters.
