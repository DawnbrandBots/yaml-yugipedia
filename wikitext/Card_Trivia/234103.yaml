title: Card Trivia:Ferocious Flora
wikitext: |-
  {{Navigation|mode=otherGame}}

  * This card is based on the [[wikipedia:Impatiens balsamina|garden balsam]]; its phonetic name is the same as the flower's, but it uses the kanji for "artillery". This flower is also known as the "Touch me Not", because its seed pods explode on contact; this corresponds to its effect.
