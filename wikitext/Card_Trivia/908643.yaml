title: Card Trivia:Majesty Pegasus, the Dracoslayer
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Majespecter Draco - Ryu]]" and "[[Majespecter Wind]]".
  * The crest on this monster's chest and sword is the same symbol as the crown on "[[Mariamne, the True Dracophoenix]]".
  * This monster's name is taken from "[[Majesty's Pegasus]]".
  * This monster has a "[[True Draco]]" form: "[[Majesty Maiden, the True Dracocaster]]".
