title: Card Trivia:Agido
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Exchange of Despair and Hope]]" and "[[Soul Crossing]]".
  * The [[Eye of Wdjat]] appears on this monster's body.
  * This monster has a [[retrained]] [[counterpart]]: "[[Agido the Ancient Sentinel]]".
  * This monster's pose in its ''[[OCG]]''/''[[TCG]]'' artwork is taken from a panel from {{chapter|Yu-Gi-Oh!|228|ref}} showing [[Agido (manga)|this monster]] being Summoned, albeit with some minor changes in detail.
