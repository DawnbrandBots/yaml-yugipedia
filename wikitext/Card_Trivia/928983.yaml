title: Card Trivia:Gem-Knight Quartz
wikitext: |-
  {{Navigation}}

  * This card is named after the mineral [[wikipedia:Quartz|quartz]].
  * This monster is based on "[[Gem-Knight Lady Brilliant Diamond]]" and "[[Gem-Knight Lazuli]]".
  ** This monster is also based on [[Julia Krystal]], who used a "[[Gem-Knight]]" [[Deck]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  *** The pronunciation of "Quartz" (クォーツ ''Kwōtsu'') is similar to the pronunciation of Julia Krystal's Japanese surname, Masumi Koutsu ('''光津''' 真澄 '''''Kōtsu''' Masumi'').
  *** This card's [[Fairy]] [[Type]] is a reference to the "[[Melodious]]" archetype, which was used by [[Zuzu Boyle]] in the anime, who had a friendly rivalry with Julia.
  * This monster has a [[Fusion Monster|Fusion]] with "[[Brilliant Rose]]": "[[Gem-Knight Lady Rose Diamond]]".
