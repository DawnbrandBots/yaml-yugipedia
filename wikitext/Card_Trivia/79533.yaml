title: Card Trivia:Whirlwind Prodigy
wikitext: |-
  {{Navigation}}

  * The birds in this card's  artwork also appear in the artwork of "[[Updraft]]".
  * This card, along with "[[Raging Flame Sprite]]", are likely designed by Akina Fujiwara, who also did the designs for the "[[Charmer]]" cards.
  * This card has a [[WATER]] counterpart, "[[Unshaven Angler]]", and a [[FIRE]] counterpart, "[[Flame Ruler]]".
  ** All cards share the same [[Level]] (4), and [[original ATK and DEF]] (1500/1600).
  ** All cards share the effect that can be [[treated as multiple Tributes]] for a [[Tribute Summon]] of a monster with the same [[Attribute]].
