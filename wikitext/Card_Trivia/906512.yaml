title: Card Trivia:Tellarknight Lyran
wikitext: |-
  {{Navigation}}

  * This monster is a retrained counterpart of "[[Satellarknight Vega]]".
  * This card is named after the constellation [[wikipedia:Lyra|Lyra]], whose brightest star is [[wikipedia:Vega|Vega]].
  * This monster has two upgraded [[Xyz Monster|Xyz]] forms combined with other monsters:
  ** "[[Constellar Caduceus]]" and "[[Tellarknight Altairan]]": "[[Tellarknight Constellar Caduceus]]"
  ** "Tellarknight Altairan" and [[Tellarknight Cygnian]]": "[[Tellarknight Constellar Delteros]]"
