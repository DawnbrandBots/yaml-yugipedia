title: Card Trivia:Volcanic Emperor
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Volcanic Inferno]]".
  * This monster is an upgraded form of "[[Volcanic Doomfire]]".
  ** This monster's design features lines of surging flames around its body, similar to "[[Volcanic Queen]]".
  ** This monster is posed similar to the card artwork of "[[Volcanic Hammerer]]".
