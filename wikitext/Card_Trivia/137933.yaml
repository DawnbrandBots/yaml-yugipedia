title: Card Trivia:Trap Trip
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's artwork is based on the large sushi restaurants in Japan, which usually have a conveyor belt area with plates of food that people can pick off for themselves.
  ** This card's artwork depicts a person reaching for the dish with the mousetrap that has a piece of candy set on the trip, reflecting its name and effect to [[add]] a [[Trap Card]] from the [[Graveyard]] to the [[hand]].
