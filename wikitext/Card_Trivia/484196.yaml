title: Card Trivia:Supreme Faceoff
wikitext: |-
  {{Navigation|mode=NonGame}}

  * The silhouette of "[[Supreme King Z-ARC]]" and an "[[Attribute Knight]]" monster appears in this card's artwork.
  ** This card's artwork likely depicts the "Attribute Knight" being forced to attack "Z-ARC", who uses its eye beams to compel the knight to attack it. This reflects this card's effect forcing the opponent's monsters to battle "Z-ARC".
