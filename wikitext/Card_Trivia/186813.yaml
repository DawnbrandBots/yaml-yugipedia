title: Card Trivia:Chronomaly Crystal Skull
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Crystal skull|crystal skulls]], a series of human skull hardstone carvings made of clear or milky white quartz (also called "rock crystal") which were found in the Americas and believed to be of pre-Columbian origin; however, the crystal skulls are believed to be hoaxes.
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this monster's effect could [[Special Summon]] "[[Chronomaly Crystal Bones (anime)|Chronomaly Crystal Bones]]", likely referencing how the two monsters can make up for one body.
  ** "[[Chronomaly Crystal Chrononaut]]" is likely the enhanced and combined form of the two aforementioned monsters due to its namesake and appearance. This is more evident when the two monsters were used to first [[Xyz Summon]] "Crystal Chrononaut" in the ''Yu-Gi-Oh! ZEXAL'' anime.
