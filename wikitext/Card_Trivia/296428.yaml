title: 'Card Trivia:Number iC1000: Numerounius Numerounia'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * The number "1000" appears on this monster's right horn.
  ** This monster's number references its owner in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, [[Don Thousand]], whose forehead eye appears in this card's artwork.
  * The lowercase English letter "i" ("Imaginary") in this monster's name is a reference to the [[wikipedia:Imaginary unit|imaginary unit]] ''i'', a number whose value is defined as the principal square root of -1. The set of [[wikipedia:Imaginary number|imaginary numbers]] is disjoint from the set of [[wikipedia:Real number|real numbers]].
  ** "Imaginary" ("fictitious" or "existing only in the mind") is also a reference to this monster's Japanese title, "Hollow Light God of Illusion" ({{Ruby|夢|む}}{{Ruby|幻|げん}}{{Ruby|虚|きょ}}{{Ruby|光|こう}}{{Ruby|神|しん}}), and how its number, [[Rank]] (13), and its 100,000 [[ATK]]/[[DEF]] are so high and overpowering that they seem to be "delusional" or "dreamed-up".
  ** This is also the only monster to have a name that contains a full word [[Shortened and abbreviated card names and terms|abbreviated]] to a lowercase letter.
  * In the ''OCG''/''TCG'', this is the first monster to have a [[Level]]/Rank higher than 12.
  ** This monster and "[[Raidraptor - Rising Rebellion Falcon]]" have the highest printed [[Xyz Material]] requirements (5 Level 13 monsters) of all [[Xyz Monster]]s.
  * This is the only "[[C (archetype)|C]]" monster to neither be a "[[CXyz]]" nor a "[[Number C]]" monster.
  ** It is also the only "[[Number]]" and "C" monster to not be a "Number C" monster.
  * This monster is an [[Card evolutions|upgraded]] "[[Number C#Number iC (Chaos Imaginary Number)|Number iC]]" form of "[[Number C1000: Numerounius]]".
  * This monster is a [[Barian World|Barian]] [[counterpart]] of "[[New Order 13: Etheric Amon]]".
  ** Both monsters share the same [[Attribute]] ([[LIGHT]]) and Rank (13).
  ** Both monsters were [[Xyz Summon]]ed through different methods of [[Xyz Evolution]]; this monster was Summoned via [[Xyz Evolution#Chaos Xyz Evolution|Chaos Xyz Evolution]], while "Etheric Amon" was Summoned via [[Xyz Evolution#Rank-Up Xyz Evolution|Rank-Up Xyz Evolution]].
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, [[Number iC1000: Numeronius Numeronia (anime)|this monster]] had the highest finite ATK and DEF of all monsters (100,000/100,000); however, in the ''OCG''/''TCG'', this monster has the highest specific ATK and DEF gain of all cards.
  * This monster is similar to "[[Vennominaga the Deity of Poisonous Snakes]]":
  ** Both are the upgraded forms of the two [[ace monster]]s of an archetype: Both "[[Numeron]]" and "[[Number C]]" for this card, and "[[Venom]]" for "Vennominaga".
  *** Both are not actually monsters of their respective archetype, due to an alteration in their card names.
  **** This monster is not a "Number C" monster, as its ''TCG'' name contains an "i" between "Number" and "C", and its Japanese name contains 「{{Ruby|ｉ|イマジナリー}}」 (''Imajinarī'', "Imaginary") between 「{{Ruby|Ｃ|カオス}}」 (''Kaosu'', "Chaos") and 「{{Ruby|Ｎｏ．|ナンバーズ}}」 (''Nanbāzu'', "Numbers").
  ** Both can be Summoned when their base forms is [[destroy]]ed, and feature an automatic [[victory condition]].
