title: Card Trivia:Witchcrafter Edel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Witchcrafter Celebration]]", "[[Witchcrafter Confusion Confession]]", "[[Witchcrafter Holiday]]", "[[Witchcrafter Masterpiece]]", "[[Witchcrafter Patronus]]", "[[Witchcrafter Vice-Madame]]" and "[[Witchcrafter Walpurgis]]".
  * "[[Black Pendant]]" appears in this card's artwork (in the bottom-right corner, sealed inside a [[wikipedia:Picture frame|picture frame]]), positioned nearly-identically to its depiction in its own artwork.
  * This monster's name is likely short for "Edelstein"/"Edelsteen", the German/Dutch word for "gemstone".
  * This monster's weapon resembles a [[wikipedia:Calipers|caliper]], an instrument used to measure the dimensions of an object.
