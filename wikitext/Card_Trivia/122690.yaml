title: Card Trivia:Cold Fusion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is a reference to [[wikipedia:Cold fusion|cold fusion]], a hypothetical nuclear reaction that occurs at or near room temperature.
  ** This card's artwork is a pun on cold fusion, as it is similar to that of a "[[Fusion (archetype)|Fusion]]" card, with the  [[Fusion Material]]s being encased in ice. This also reflects its effect to [[destroy]] an opponent's [[Fusion Monster]] and place [[Ice Counter]]s on their [[Special Summon]]ed Fusion Materials.
