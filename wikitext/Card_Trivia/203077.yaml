title: Card Trivia:Terra Firma Gravity
wikitext: |-
  {{Navigation}}

  * The planet [[Earth (planet)|Earth]] appears in this card's artwork.
  ** Fittingly, this card is used as a support card for "[[Elemental HERO Terra Firma]]", an "[[Elemental HERO]]" [[Fusion Monster]] based on the Earth.
  * This card is the only "Elemental HERO" support card that supports one specific Fusion Monster, that being "Elemental HERO Terra Firma".
