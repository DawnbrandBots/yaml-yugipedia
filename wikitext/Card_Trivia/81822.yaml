title: Card Trivia:Tribe-Infecting Virus
wikitext: |-
  {{Navigation}}

  * The lizard-like creatures infected by the virus appear in the artwork of "[[Tour Bus To Forbidden Realms]]" and "[[Shared Ride]]".
  * This card doesn't show the virus itself, but the affected monsters. ''[[Yu-Gi-Oh! Nightmare Troubadour]]'' and later video games show the virus as an orange swirling circle of haze.
  * "[[Tribe-Shocking Virus]]" is a watered-down counterpart of this card.
  * In "[[Sangan]]'s" [https://ygorganization.com/monsterstories/ storyline], the creatures in this card's artwork thought him to be cute, and playfully teased him.
