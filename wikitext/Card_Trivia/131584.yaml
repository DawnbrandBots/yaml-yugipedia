title: Card Trivia:Dimension Jar
wikitext: |-
  {{Navigation}}

  * This monster appears to be an "opened" [[Wikipedia:Tesseract|tesseract]] or hypercube, the four-dimensional form of a cube.
  ** Coupling this with its effect makes this card's name a double pun--it is a shape with more than three dimensions and the shown "opened 4<sup>th</sup>" dimension appearing to show a portal, which gameplay-wise is associated with [[banish]]ing cards, hence its effect.
