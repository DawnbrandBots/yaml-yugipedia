title: Card Trivia:Voidvelg Hetairoi
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Worm Void Hole]]".
  * This monster is named after the ''[[wikipedia:Companion cavalry|hetairoi]]'', the elite cavalry of the [[wikipedia:Ancient Macedonian army|Ancient Macedonian army]] during the reigns of [[wikipedia:Philip II of Macedon|Philip II]] and [[wikipedia:Alexander the Great|Alexander the Great]].
