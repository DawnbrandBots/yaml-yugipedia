title: Card Trivia:Six Samurai United
wikitext: |-
  {{Navigation}}

  * "[[The Six Samurai - Irou]]", "[[The Six Samurai - Kamon]]", "[[The Six Samurai - Nisashi]]", "[[The Six Samurai - Yaichi]]", "[[The Six Samurai - Yariza]]", and "[[The Six Samurai - Zanji]]" appear in this card's artwork.
  * This card's artwork depicts the top row of the formation featuring the [[DARK]] "Irou", the [[WIND]] "Nisashi", and the [[WATER]] "Yaichi", while the bottom row features the [[FIRE]] "Kamon", the [[EARTH]] "Yariza" and the [[LIGHT]] "Zanji".
  ** Fittingly, the [[Attribute]]s of each of the monsters in both rows are listed in the effects of "[[Genex Ally Triarm]]" and "[[Genex Ally Triforce]]", "Genexy Ally Triarm"  gains effects based on the DARK, WIND, and WATER [[non-Tuner monster]]s, while "Genexy Ally Triforce" gains effects based on the FIRE, EARTH, and LIGHT non-Tuner monsters.
  * This is the first card to use [[Bushido Counter]]s.
  ** The Bushido Counters are based on the term ''bushido'', a samurai code of honor similar to the knights' chivalry.
  * This card has a "[[Karakuri]]" [[counterpart]]: "[[Karakuri Anatomy]]".
