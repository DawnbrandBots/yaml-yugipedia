title: Card Trivia:Rindbrumm the Striking Dragon
wikitext: |-
  {{Navigation}}

  * "[[Albaz the Ashen]]", "[[Springans Kitt]]", and "[[Springans Rockey]]" (in its soot form) appear in this card's artwork.
  ** Like "[[Sprind the Irondash Dragon]]", this monster is not a transformation of "Fallen of Albaz", as "Albaz" is riding on this monster's claw.
  * This monster is the combined form of "[[Sprind the Irondash Dragon]]" and "[[Tri-Brigade Bearbrumm the Rampant Rampager]]".
  * This card is named after the [[wikipedia:Lindworm|lindworm]], a mythical dragon in [[wikipedia:European folklore|European folklore]].
  * This monster appears in the artwork of "[[Branded Befallen]]".
