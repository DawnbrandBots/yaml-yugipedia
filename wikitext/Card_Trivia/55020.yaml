title: Card Trivia:X-Head Cannon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Advent of Union]]''.
  * This monster appears in the artwork of "[[Hyper Coat]]", "[[Union Controller]]", "[[Union Hangar]]", "[[Union Scramble]]", and "[[XYZ Combine]]".
  * This monster has a [[retrained]] [[Effect Monster|Effect]] counterpart: "[[X-Cross Cannon]]".
  ** This monster's conversion into "X-Cross Cannon" is depicted in the artwork of "[[Union Activation]]".
  * This monster, along with "[[V-Tiger Jet]]", are the only two [[Normal Monster]]s in the [[A-to-Z]] [[series]].
  ** Both are also topmost component in their respective [[Fusion Monster]]s: "[[XYZ-Dragon Cannon]]" and "[[VW-Tiger Catapult]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|252|ref}}, specifically from the panel showing [[X-Head Cannon (manga)|this monster]] being Summoned.
