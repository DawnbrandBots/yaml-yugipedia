title: Card Trivia:Superheavy Samurai Commander Shanawo
wikitext: |-
  {{Navigation}}

  * This monster appears to be named after Rushanao, the name the legendary swordsman [[wikipedia:Minamoto no Yoshitsune|Yoshitsune]] took on when he was a Buddhist monk in his younger years. Yoshitsune is well-known for his loyal vassal [[wikipedia:Benkei|Benkei]], who followed him after an initial confrontation.
  * This is the first "[[Superheavy Samurai]]" [[Synchro Pendulum Monster]].
  * This monster is an [[counterpart|upgraded]] [[Synchro Monster|Synchro]] form of "[[Superheavy Samurai Prodigy Wakaushi]]".
  ** Both monsters share the same [[Attribute]] ([[DARK]]) and the status as two non-[[EARTH]] "Superheavy Samurai" monsters. Also, this monster has twice the [[Level]] (8) and exactly 1000 more [[ATK]] and [[DEF]] than "Wakaushi".
  ** Both monsters feature a similar design, which includes a mainly green torso with identical legs, a similar sword (indicated by its hilt), and feature a similar head with heterochromic eyes.
  ** Both monsters are each based on the man who defeated Benkei in different ways, which parallels how Yuya defeated Gong in {{episode|ARC-V|026|ref}}.
