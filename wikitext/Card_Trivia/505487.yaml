title: Card Trivia:De-Spell
wikitext: |-
  {{Navigation}}

  * This card has a counterpart known as "[[Cursebreaker]]".
  * "De-Spell" is a play on the word '''Dispell'''.
  * All copies of this card found in ''[[Starter Deck: Kaiba Evolution]]'' have the word "Spell" not capitalized like the first part of its name.
  * The Spanish prints of this card have no capital letter in the word "''field''".
  ** This spelling -closer to the English terminology wording- was often used in early sets in this TCG branch.
