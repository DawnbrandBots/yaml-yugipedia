title: Card Trivia:Memory of an Adversary
wikitext: |-
  {{Navigation}}

  * "[[Gogiga Gagagigo]]", "[[Inpachi]]", "[[Invader of Darkness]]", "[[Marauding Captain]]" and "[[Freed the Matchless General]]" appear in this card's artwork.
  ** "Gogiga Gagagigo" (who is shown holding the head of "Inpachi" in his right hand and carrying "Invader of Darkness" with his left arm, implying that he defeated both of them) appears to have been battling "Freed", bringing him near to defeat. "Marauding Captain", recalling his and the [[My Body as a Shield|past cooperation]] of "Gogiga Gagagigo", appears to be trying to reason with "Gogiga Gagagigo".
  ** The events of this card are continued in "[[Oath of Companionship]]".
  ** This card's name in kanji is written as "好敵手の記憶", which means "''Memory of a Rival''"; however, the furigana is written as "とものきおく" (友の記憶), which means "''Memory of a Friend''", implying the complicated relationships that the characters in this card's artwork have with each other.
  * This is a "watered-down" version of "[[Dimensional Prison]]" with the added effect of summoning the [[banish]]ed monster to your field.
  ** "Dimensional Prison" also includes "[[Gagagigo]]" and "Freed the Brave Wanderer" in its artwork.
