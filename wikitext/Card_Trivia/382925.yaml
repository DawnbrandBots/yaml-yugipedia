title: Card Trivia:Dystopia the Despondent
wikitext: |-
  {{Navigation}}

  * This monster's name references [[E'Rah]], the Goddess of Despair and the central antagonist of the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, who used this card.
  ** This monster's naming scheme is the opposite of that of "[[Number 39: Utopia]]".
  *** Its Japanese name, "Anti-Hope", is the opposite of the one of "Utopia": "King of Wishes, Hope".
  *** Its ''TCG'' name is derived from "[[wikipedia:Dystopia|dystopia]]", a society with great suffering and injustice and the opposite of a [[wikipedia:Utopia|utopian]] society, as well as "Despondent", a word that means "without hope" and evokes its Japanese name, "Anti-Hope".
  * This monster has the highest [[original ATK]] (5000, tied with [[5000 ATK Monster Cards|other monsters]]) and [[original DEF]] (5000, tied with [[5000 DEF Monster Cards|other monsters]]) of all [[legal]] monsters in the ''[[OCG]]''/''[[TCG]]''.
  * This monster's  ''OCG''/''TCG'' [[Special Summon]]ing effects is based on its appearance in {{chapter|ZEXAL|050|ref}}, when E'Rah [[control]]ed the four [[Level 1]] monsters, "[[Anti the Abyss]]", "[[Anti the Earth]]", "[[Anti the Ray]]", and "[[Anti the Sky]]", then used the effect of "Anti the Ray" to Special Summon this monster and place the four Level 1 "[[Anti]]" monsters underneath it.
  ** This monster's ''OCG''/''TCG'' [[Battle Step]] effects are based on the effects of the "Anti" monsters [[activate]]d while placed underneath this monster in the same chapter: the first effect preventing it from being affected by card effects is based on "Anti the Ray", while the effect preventing it from being [[destroyed by battle]] is based on "Anti the Abyss" and "Anti the Earth".
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|ZEXAL|051|ref}}, specifically from the panel showing [[Anti-Hope, God of Despair (manga)|this monster]].
