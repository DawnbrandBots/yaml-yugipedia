title: Card Trivia:Red-Eyes Alternative Black Dragon
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrained]] counterpart of "[[Red-Eyes Black Dragon]]".
  * This monster has a "[[Blue-Eyes]]" counterpart: "[[Blue-Eyes Alternative White Dragon]]".
  * This card's artwork was drawn by [[Kazuki Takahashi]].
  * This monster's first English version refers to "Red-Eyes B. Dragon" as "Red-Eyes Black Dragon", which was before that card was officially renamed to "Red-Eyes Black Dragon".
