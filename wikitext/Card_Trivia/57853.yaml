title: Card Trivia:Ritual Raven
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Ascending Soul]]", "[[Pre-Preparation of Rites]]", "[[Preparation of Rites]]", "[[Readying of Rites]]", and "[[Urgent Ritual Art]]".
  * This monster can be considered a [[DARK]] counterpart of "[[Lo, the Prayers of the Voiceless Voice]]".
  ** Both monsters are [[Level 1]] [[Effect Monster]]s that can be used as the [[Can be used as entire Ritual Summon requirement|entire Ritual Summon requirement]] for a [[Ritual Monster]] of the same [[Attribute]].
  * This monster has a [[Pendulum Monster|Pendulum]] [[Ritual Monster]] counterpart: "[[Miracle Raven]]".
