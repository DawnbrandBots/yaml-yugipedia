title: Card Trivia:Gagaga Gardna
wikitext: |-
  {{Navigation}}

  * This card is the first [[EARTH]] [[Warrior]]-[[Type]] "[[Gagaga]]" monster.
  * This card's shield could be a lesser form of "[[Gagagashield]]", having some of the same colors as it.
  * This monster has the "Gagaga" crest on its back and shield.
  ** Curiously, it seems to not have it on its shield in ''[[Yu-Gi-Oh! D Team ZEXAL]]''.
