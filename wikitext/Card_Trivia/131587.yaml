title: Card Trivia:Dice Jar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Release Change]]".
  * The pips on the rightmost die in this card's artwork is incorrectly positioned. If one takes a die and rotate it to the same angle as the one on the left of the picture, the three sides that would match the depiction; however, if the die is rotated at the same angle as the die on the right, the artwork shows three pips on the side and five pips on top. A real die should have those numbers swapped.
  * This card has the highest "fixed" amount of [[effect damage]] (6000).
