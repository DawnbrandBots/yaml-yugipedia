title: Card Trivia:Canopic Protector
wikitext: |-
  {{Navigation}}

  * "[[Horus the Black Flame Dragon LV8]]" appears in this card's artwork.
  ** This card may represent the transformation of "Horus the Black Flame Dragon LV8" into "[[Horus the Black Flame Deity]]".
  * This card is named after [[wikipedia:Canopic jar|canopic jars]], containers that were used by the ancient Egyptians during the mummification process, to store and preserve the viscera of their owner for the afterlife.
