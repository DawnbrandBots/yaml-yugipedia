title: Card Trivia:Laval Miller
wikitext: |-
  {{Navigation}}

  * This card's effect is similar to "[[Skreech]]".
  * This card's English name "[[Laval Miller]]" is a pun, since it sends cards to the Graveyard, or "mills" them.
  ** It is also a reference to the wheel it is pushing, which can be used in a mill to grind wheat.
