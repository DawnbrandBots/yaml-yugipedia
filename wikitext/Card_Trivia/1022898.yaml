title: Card Trivia:Raidraptor - Bloom Vulture
wikitext: |-
  {{Navigation}}

  * This monster's name features the word "bloom", which is synonymous with the word "blossom".
  ** This monster's name, alongside the name of "[[Raidraptor - Noir Lanius]]" released in ''[[Phantom Nightmare]]'', both reference the user of the "[[Raidraptor]]" [[archetype]] in ''[[Yu-Gi-Oh! ARC-V]]'', [[Shay Obsidian]], also known as "Syun Kurosaki" in the original Japanese version, whose surname is translated to "black blossom".
