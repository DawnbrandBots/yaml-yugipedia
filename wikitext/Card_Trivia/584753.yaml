title: Card Trivia:Cyberse Witch
wikitext: |-
  {{Navigation}}

  * This monster's name may be a reference to the [[wikipedia:Harwell computer|Wolverhampton Instrument for Teaching Computing from Harwell]], an early British computer of the 1950s based on valves and relays that is also known as WITCH.
  * This monster has a [[retrained]] counterpart: "[[Cyberse Contract Witch]]".
  * This monster has several similarities to "[[Clock Spartoi]]" and "[[Cyberse Wicckid]]".
  ** "Clock Spartoi"
  *** Both have an effect that can [[add]] a specific "[[Cynet]]" [[Spell Card]] ("[[Cynet Ritual]]" and "[[Cynet Fusion]]", respectively) from the [[Deck]] to the [[hand]].
  *** Both have an effect that can [[Special Summon]] a [[Level]] 4 or lower [[Cyberse]] monster from the Graveyard when a monster is Special Summoned to a zone it points to.
  ** "Cyberse Wicckid"
  *** Both have an effect that can add a different Cyberse monster [[card type]] ([[Ritual Monster|Ritual]] and [[Tuner monster|Tuner]], respectively) from the Deck to the hand by [[banish]]ing a card type (Spell and Cyberse monster, respectively) from the [[Graveyard]] when a monster is [[Special Summon]]ed to a zone it points to.
  ** "Clock Spartoi" and "Cyberse Wicckid"
  *** They all share the same [[Attribute]] ([[DARK]]), [[Type]] (Cyberse), [[ATK]] (800), and [[Link Rating]] (2).
  *** They all have a [[Bottom-Center Link Arrow cards|Bottom-Center]] [[Link Arrow]].
  *** They all require two Cyberse monsters to be [[Link Summon]]ed.
  *** They all have an effect that activates when a monster is Special Summoned to a zone it points to (except during the [[Damage Step]]).
  *** They all have an effect that can add a card used for a different type of Summoning ([[Ritual Summon|Ritual]], [[Fusion Summon|Fusion]] and [[Synchro Summon|Synchro]], respectively) from the Deck to the hand.
