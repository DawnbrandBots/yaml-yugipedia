title: Card Trivia:Spirit of Flames
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Ifrit the Flame Spirit" is based on an [[wikipedia:Ifrit|ifrit]], a humanoid winged creature made entirely of fire in [[wikipedia:Arab culture|Arabic]] and [[wikipedia:Islamic culture|Islamic]] mythology.
  * This monster has five [[Attribute Spirit]] [[counterpart]]s:
  ** [[WATER]]: "[[Aqua Spirit]]"
  ** [[EARTH]]: "[[The Rock Spirit]]"
  ** [[WIND]]": "[[Garuda the Wind Spirit]]"
  ** [[DARK]]: "[[Luna the Dark Spirit]]"
  ** [[LIGHT]]: "[[Diana the Light Spirit]]"
