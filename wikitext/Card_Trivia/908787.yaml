  * "[[Fortress Whale]]" and the tornado waterspouts from the artwork of "[[Tornado Wall]]" appear in this card's artwork.
  * This card's name is a reference to the name of [[Ryota Kajiki (manga)|Ryota Kajiki's]] strategy in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This card's effect to prevent the opponent from [[target]]ing the player's [[WATER]] monster with non-WATER monster effects and [[Special Summon]] monsters that mentions "[[Umi]]" is a reference to Ryota's strategy of having his monsters hide underwater in the [[Ocean]].
  ** This card's artwork is based on two panels from the ''Yu-Gi-Oh!'' manga: first, the panel in which Ryota Kajiki declares an attack with "[[Fortress Whale (manga)|Fortress Whale]]" against [[Katsuya Jonouchi (manga)|Katsuya Jonouchi's]] "[[Rocket Warrior (manga)|Rocket Warrior]] in {{chapter|Yu-Gi-Oh!|181|ref}}, and second, the panel showing the [[List of unnamed cards#Ryota's monsters|unnamed monsters]] that would be [[Tribute]]d to Summon "Fortress Whale" hiding underwater in {{chapter|Yu-Gi-Oh!|180|ref}}.

