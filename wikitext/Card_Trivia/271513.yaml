title: Card Trivia:Puralis, the Purple Pyrotile
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Pyrausta|pyrallis]] and the [[wikipedia:Armadillo girdled lizard|armadillo girdled lizard]].
  * This is the first [[Tuner Synchro Monster]] to be released after the ''[[Yu-Gi-Oh! 5D's]]'' era, and therefore also the first to not have appeared in the anime beforehand.
