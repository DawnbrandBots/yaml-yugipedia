title: Card Trivia:The Black Stone of Legend
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cards of the Red Stone]]".
  * This card is a "[[Red-Eyes]]" counterpart to "[[The White Stone of Legend]]".
  ** This card and "The White Stone of Legend" have a ''[[Rush Duel]]'' counterpart: "[[The Origin Stone of Legend]]".
  * This monster appears to be in the process of hatching into "[[Black Dragon's Chick]]", sharing the same color shell and crack in the place where the head of "Chick" emerges from its eggshell.
