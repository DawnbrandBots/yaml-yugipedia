title: Card Trivia:Altergeist Primebanshee
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Altergeist Revitalization]]".
  ** The snake-like creatures attached to its torso appear in the artwork of "[[Personal Spoofing]]".
  * This monster's name is a portmanteau of "[[wikipedia:Prime number|prime number]]" and "[[wikipedia:Banshee|banshee]]".
  ** A prime number is a natural number greater than 1 that is not a product of two smaller natural numbers.
  ** A banshee is a female spirit in [[wikipedia:Irish folklore|Irish folklore]] whose scream heralds the death of a family member.
  * This is the [[signature card]] of [[Emma Bessho]]/Ghost Gal in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
