title: Card Trivia:Galaxy Dragon
wikitext: |-
  {{Navigation}}

  * This is the first "[[Galaxy]]" monster used by [[Kaito Tenjo (manga)|Kaito Tenjo]] other than "[[Galaxy-Eyes Photon Dragon (manga)|Galaxy-Eyes Photon Dragon]]" in the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga.
  ** Despite being a member of the "Galaxy" [[archetype]], this monster's effects are designed to counter "Galaxy-Eyes Photon Dragon" in the manga. In the ''[[OCG]]''/''[[TCG]]'', this monster's effect is designed to counter [[Dragon]] monsters, the same [[Type]] as "Galaxy-Eyes Photon Dragon".
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|ZEXAL|027|ref}}, specifically from the chapter showing [[Galaxy Dragun (manga)|this monster's]] [[ATK]] increasing via its effect.
