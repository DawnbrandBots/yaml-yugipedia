title: Card Trivia:Blackwing - Bora the Spear
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Champion of Chaos!!]]''.
  * This monster appears in the artworks of "[[Black Return]]" and "[[Blackwing - Twin Shadow]]".
  * This monster's ''[[TCG]]'' name is derived from the [[wikipedia:Bora (wind)|bora]], a northern to north-eastern autumnal [[wikipedia:Katabatic wind|katabatic wind]] that occurs near the Adriatic Sea.
  ** This monster shares its ''TCG'' name with the Japanese name of "[[Blackwing - Boreas the Sharp]]".
  * In the English dubbed version of {{episode|5D's|052|ref}}, this monster's [[Attribute]] is mistakenly displayed as [[EARTH]].
