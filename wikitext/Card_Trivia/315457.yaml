title: Card Trivia:Gem-Knight Lady Lapis Lazuli
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Lapis lazuli|lapis lazuli]], a [[wikipedia:Gemstone|semi-precious stone]] known for its intense blue color.
  ** The colors of this monster's armor are based on the three minerals that form lapis lazuli:
  *** Blue: [[wikipedia:Lazurite|lazurite]]
  *** White: [[wikipedia:Calcite|calcite]]
  *** Yellow: [[wikipedia:Pyrite|pyrite]]
  * This monster is the original form of both "[[Gem-Knight Lapis]]" and "[[Gem-Knight Lazuli]]". It was eventually split apart, which in turn gave "Lapis" their pyroxene while "Lazuli" was left without one.
  * This monster is similar to "[[El Shaddoll Construct]]".
  ** Both cards also have similar effects: this card [[send]]s a monster from the [[Main Deck]] or [[Extra Deck]] to the [[Graveyard]], while "Construct" sends a "[[Shaddoll]]" card to the Graveyard.
  ** Additionally, both "Gem-Knight Lazuli" (one of this card's [[Fusion Material]]s) and "Construct" can [[add]] to the [[hand]], respectively, a "Gem-Knight" [[Normal Monster]] or a "Shaddoll" [[Spell]]/[[Trap Card]] in the Graveyard (when sent to the Graveyard).
  * This is the first "[[Gem-Knight]]" [[Fusion Monster]] to appear in the [[Yu-Gi-Oh! ARC-V|anime]].
  * This card is the only "Gem-Knight" Fusion Monster that requires specifically named Fusion Materials to not be [[Level]] 6.
