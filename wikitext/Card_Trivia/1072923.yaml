title: Card Trivia:Rubysapphirus, the Adamant Jewel
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Ruby|ruby]] and the [[wikipedia:Sapphire|sapphire]], the two primary gem varieties of [[wikipedia:Corundum|corundum]].
  ** This monster's [[Rank]] (9) is a reference to corundum's hardness of 9 according to the [[wikipedia:Mohs scale|Mohs scale]].
  ** This monster's name is a portmanteau of the Latin words ''rubīnus'' ("ruby") and ''sapphīrus'' ("sapphire").
  ** The [[Attribute]]s listed in this monster's effects reference the colors associated with each gemstone. This monster's armaments also reflect its effects corresponding with the Attributes.
  *** [[FIRE]] has a red icon, the color of the ruby. This monster's red sword reflects its effect to double this monster's [[ATK]] while attacking an opponent's stronger monster.
  *** [[WATER]] has a blue icon, the color of the sapphire. This monster's blue shield reflects its effect to protect the player's card from an opponent's card effect.
  * The kanji ''shikō'' (至鋼) in this monster's Japanese name is a portmanteau on ''shikō'' (至高, "supreme") and ''kō'' (鋼, "steel").
