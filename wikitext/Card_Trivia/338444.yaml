title: Card Trivia:Wightprince
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Quarantine]]", "[[Shuffle Reborn]]", "[[There Can Be Only One]]" and "[[Wightprincess]]".
  * "[[King of the Skull Servants]]", "[[The Lady in Wight]]" and "[[Skull Dog Marron]]" appear in this card's artwork.
  * This monster is likely the son of "King of the Skull Servants" and "The Lady in Wight", hence its English name being "Wight''prince''".
