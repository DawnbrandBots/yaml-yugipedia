title: Card Trivia:March of the Dark Brigade
wikitext: |-
  {{Navigation}}

  * "[[Jain, Twilightsworn General]]", "[[Ryko, Twilightsworn Fighter]]", "[[Lumina, Twilightsworn Shaman]]", and "[[Lyla, Twilightsworn Enchantress]]" appear in this card's artwork.
  * This card is a counterpart to "[[Charge of the Light Brigade]]", due to its Japanese name and effect.
