title: Card Trivia:Quiz Sphinx
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name is a portmanteau of "[[wikipedia:sphinx|sphinx]]" and "[[wikipedia:quiz|quiz]]".
  * In [[wikipedia:Greek mythology|Greek mythology]], the sphinx guarded the city of [[wikipedia:Thebes, Greece|Thebes]], and the only those who could answer its riddles could pass. This is reflected in this card's effect, as you can only attack it when all other "[[Quiz]]" monsters are cleared from the field.
