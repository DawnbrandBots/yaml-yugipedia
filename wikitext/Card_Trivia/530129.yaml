title: Card Trivia:Defect Compiler
wikitext: |-
  {{Navigation}}

  * A [[wikipedia:Compiler|compiler]] is a computer program used to translate high-level programs into lower-level ones in order to make them easier to execute.
  ** This may refer to its effect, as it takes a high-level source program ([[effect damage]]), compiles it ([[Defect Counter]]) and then translates it into a lower-level program ([[ATK]] boost) for a computer ([[Cyberse]] monsters) to execute.
