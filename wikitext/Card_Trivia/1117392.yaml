title: Card Trivia:Dark-Guiding Kuriboh
wikitext: |-
  {{Navigation}}

  * The object in the artwork of "[[Chaos Ceremonial Object]]" appears in this card's artwork.
  * This monster is a retrained ''[[Rush Duel]]'' [[counterpart]] of "[[Kuriboh]]".
  ** This monster references a scene in {{chapter|Yu-Gi-Oh!|118|ref}} where the soul of "[[Kuriboh (manga)|Kuriboh]]" was offered to the [[DARK|dark]] as part of the [[Tribute]] with "[[Black Luster Ritual (manga)|Black Luster Ritual]]" to [[Ritual Summon]] "[[Black Luster Soldier (manga)|Black Luster Soldier]]".
