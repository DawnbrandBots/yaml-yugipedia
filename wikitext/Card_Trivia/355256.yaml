title: Card Trivia:Gogogo Aristera & Dexia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Golem's Clap]]".
  * "Aristera" and "Dexia" are the Greek words for "left" and "right", respectively, reflecting how this monster is depicted as both a left hand and a right hand.
  ** This monster shares a similar naming scheme and hand-like designs with "[[Orichalcos Aristeros]]" and "[[Orichalcos Dexia]]".
  * This card's artwork is taken from {{chapter|Yu-Gi-Oh! ZEXAL|37|ref}}, specifically from the panel showing "[[Gogogo Aristera (manga)|Gogogo Aristera]]" and "[[Gogogo Dexia (manga)|Gogogo Dexia]]" standing alongside each other after the former is [[Special Summon]]ed by the effect of "Golem's Clap".


