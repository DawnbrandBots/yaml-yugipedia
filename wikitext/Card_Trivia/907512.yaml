title: Card Trivia:Supreme Skystream Magnum Overlord (R)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maximum Ultra Evolution Pack]]''.
  * This monster appears in the artworks of "[[Super Electromagnetic Maximum]]", "[[Supreme Marine Fortress Magnum Overbase]]", and "[[Urgent Strike]]".
  * This monster has three [[counterpart]]s: "[[Supreme Beasteam Magnum Overlord (R)|Supreme Beasteam Magnum Overlord [R]]]", "[[Supreme Machine Magnum Overlord (R)|Supreme Machine Magnum Overlord [R]]]", and "[[Supreme Railartillery Magnum Overlord (R)|Supreme Railartillery Magnum Overlord [R]]]".
  ** This monster shares its [[Attribute]] ([[DARK]]), [[Level]] (3), [[Type]] ([[Machine]]), and [[original ATK and DEF]] (500/0) with the above-mentioned monsters.
