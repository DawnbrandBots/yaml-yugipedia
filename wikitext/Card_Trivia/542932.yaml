title: Card Trivia:Arnis, the Empowered Warrior
wikitext: |-
  {{Navigation}}

  * This monster is based on the [[wikipedia:Vermilion Bird|Vermilion Bird]], one of the [[wikipedia:Four Symbols (China)|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]] that represents the element of fire.
  * "Arnis" has two different meanings: one is derived from an umbrella term for the traditional martial arts of the Philippines (also known as ''[[wikipedia:Eskrima|eskrima]]'' and ''kali'') that emphasize weapon-based fighting with sticks, knives and other bladed weapons, and various improvised weapons. The other comes from "arnés", the Old Spanish for "armor" (used mainly for "harness" nowadays); this meaning is derived from the armor costumes used in [[wikipedia:Moros y cristianos|Moro-moro]] stage plays, where actors fought mock battles using wooden swords.
  * This monster appears in the artwork of "[[Red Sparrow Summoner]]".
