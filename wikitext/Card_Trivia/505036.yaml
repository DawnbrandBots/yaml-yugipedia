title: Card Trivia:Dark Blade
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Centrifugal Field]]", "[[Dark Contract with the Yamimakai]]", "[[Formation Union]]", "[[Frontline Base]]", "[[Fusion Deployment]]", and "[[Subspace Battle]]".
  * This monster is wearing "[[Metalsilver Armor]]".
  * This card has a retrained version: "[[Dark Blade the Captain of the Evil World]]".
  * This card has a "[[Memento]]" counterpart: "[[Mementotlan Dark Blade]]".
  * This is one of only two monsters that has two different [[Union monster]]s designed for its use, the other being "[[X-Head Cannon]]", which shares this card's [[Level]], [[ATK]]/[[DEF]], and [[Normal Monster]] [[card type]].
  ** The two monsters that are designed to be equipped to this monster are "[[Pitch-Dark Dragon]]" and "[[Kiryu]]".
  * Outside of the "[[A-to-Z]]" monsters, this is the only monster that is a [[Fusion Material Monster]] for a [[Fusion Monster]] ("[[Dark Blade the Dragon Knight]]") along with one of its Union monsters ("[[Pitch-Dark Dragon]]").
  * This card's English flavor text mentions "[[Dark World]]". This is a translation error, as its Japanese text instead references "Makai" (闇魔界), which implies that this monster serves "[[King of Yamimakai]]".
  * This monster bears a strong resemblance to "[[Underworld Fighter Balmung]]". Both have the same [[Type]], [[Level]], [[Attribute]], and they wear similar armor.
  ** They both have "Makai" in their OCG names.
  * In the [[D.D. Castle: Assault]] event of ''[[Yu-Gi-Oh! Duel Links]]'', [[Axel Brodie (Duel Links)|Axel Brodie]] disguises himself as this monster while infiltrating [[the Supreme King]]'s [[Supreme King's castle (location)|castle]] and acts as the castle guide accompanying [[Tour Guide From the Underworld (character)|Tour Guide From the Underworld]]. He sheds the disguise later on as he gets closer to the top.
