title: Card Trivia:Samsara Lotus
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[One for One]]".
  * This card's name references the cycle of rebirth in Hinduism, where the lotus flower (specifically the Padma) is an important symbol of the natural order of the world in Hinduism.
  * This monster has a [[Card evolutions|retrained]] [[Fiend]] counterpart: "[[Samsara D Lotus]]".
