title: Card Trivia:Goblin Bikers Gone Bonkers
wikitext: |-
  {{Navigation}}

  * "[[Diabellstar the Black Witch]]", "[[Goblin's Crazy Beast]]", "[[Goblin Biker Big Gabonga]]", "[[Goblin Biker Boom Mach]]", "[[Goblin Biker Clatter Sploder]]" (wielding the axe of "[[Azamina Sol Erysichthon]]"), "[[Goblin Biker Dugg Charger]]", "[[Goblin Biker Mean Merciless]]", and the mount of "[[Goblin Biker Troika Griare]]" appear in this card's artwork.
  * This monster is a "[[Goblin Biker]]" counterpart of "Diabellstar the Black Witch", having taken the mount of "Goblin Biker Troika Griare" and attached it to "Goblin's Crazy Beast".
  ** This monster has the same [[original ATK and DEF]] (2500/2000) as "Diabellstar the Black Witch".
  * The first half of "[[Goblin Bikers Gone Wild]]"'s Japanese name (天上天下), combined with the second half of this monster's Japanese name (唯我独尊), form the phrase 「天上天下唯我独尊」(''tenjōtenge yuigadokuson'', "throughout heaven and earth, I alone am exalted"), supposedly the [[wikipedia:The Buddha|Buddha's]] first words from birth according to the [[wikipedia:Dirgha Agama|Dirgha Agama]].
  ** The phrase is commonly associated with [[wikipedia:Bōsōzoku|Bōsōzoku]] slogans, a Japanese youth motorcycle subculture.
