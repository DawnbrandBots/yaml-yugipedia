title: Card Trivia:Griffore
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Super Soldier Ritual]]".
  * This monster has a retrained ''[[Yu-Gi-Oh! Rush Duel|Rush Duel]]'' [[counterpart]]: "[[Light-Calling Griffore]]".
  * This monster strikes a pose similar to that of "[[Tripwire Beast]]".
  ** In addition, despite neither monster being counterparts of one another, each share the same [[Attribute]] ([[EARTH]]), [[Level]] (4) and [[original ATK]] (1200).
  * "[[Gurifoh]]" is "[[Kuriboh]]" wearing a hood based on this monster.
