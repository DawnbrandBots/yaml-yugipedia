title: Card Trivia:El Shaddoll Grysta
wikitext: |-
  {{Navigation}}

  * "[[El Shaddoll Winda]]" appears in this card's artwork.
  * This monster has a damaged form: "[[Tohushaddoll Grysta]]".
  * According to the [[Master Guide 5 card storylines#Watchers of the Tree of Life|''Master Guide 5'' card storylines]], this monster is the evolved form of "[[Shaddoll Core]]" combined with the eight 'Cores' of the "[[Yang Zing]]" and the 'Pyroxene' of "[[El Shaddoll Construct]]" ("[[Gem-Knight Lapis]]").
  * This is the only "Shaddoll" [[Extra Deck]] monster that is not made up of at least one [[female]] entity.
