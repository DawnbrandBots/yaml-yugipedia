title: Card Trivia:Unwavering Bond
wikitext: |-
  {{Navigation}}

  * "[[Hypnosister]]", "[[Risebell the Star Adjuster]]", and "[[Saambell the Summoner]]" appear in this card's artwork.
  ** This card's artwork continues depicts "Risebell" after the events of "[[Wavering Eyes]]", attempting to resist the mind control of "Hypnosister" by remembering his bond with "Saambell".
