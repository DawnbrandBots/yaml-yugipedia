title: Card Trivia:Digital Bug Rhinosebus
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Bug Signal]]".
  * This monster's name and appearance are puns on "[[wikipedia:Rhinoceros|rhinoceros]]" (referencing the [[wikipedia:Dynastinae|rhinoceros beetle]], a species of [[wikipedia:Scarabaeidae|scarab beetle]] known for their singular horn) and "[[wikipedia:Bus (computing)|bus]]" (a form of [[wikipedia:Communications system|communication system]] that transfers [[wikipedia:data|data]] between [[wikipedia:Component-based software engineering|components]] inside a [[wikipedia:computer|computer]] or between computers, whereas this monster's design features bus card slots on its top horn).
