title: Card Trivia:D.D. Crazy Beast
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[D.D. Trainer]]" and "[[Premature Return]]".
  * This card's artwork depicts the monster "[[banish]]ing" "[[Coach Goblin]]" (or "[[Second Goblin]]") by pulling it into the [[Different Dimension]].
  ** The artwork of "D.D. Trainer" depicts the "Goblin" riding atop this monster after taming it.
  ** According to the [[Master Guide 1 card storylines]], this monster is rumored to have a connection to the "main universe" through its massive mouth, and only wants to eat "D.D. Trainer". "[[Different Dimension Dragon]]" is also said to be scared of this monster.
  * "[[Goblin's Crazy Beast]]" is a monster that is based on this card:
  ** Its ''[[TCG]]'' name is a reference to this monster's name.
  ** "Goblin's Crazy Beast" serves as a steed to the "[[Goblin Biker]]s" in the same way that this monster serves as a steed of "D.D. Trainer", the aforementioned "Coach/Second Goblin" (who is other unrelated to the "Goblin Biker" archetype).
