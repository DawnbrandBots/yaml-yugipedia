title: Card Trivia:Curious, the Lightsworn Dominion
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from ''[[wikipedia:Kyrios|kyrios]]'', the Greek word for "Lord", used in the [[wikipedia:Septuagint|Septuagint]] translation of the name of [[wikipedia:Yahweh|Yahweh]].
  * This is the first "[[Lightsworn]]" [[Link Monster]], as well as the third "Lightsworn" [[Extra Deck]] monster (after "[[Michael, the Arch-Lightsworn]]" and "[[Minerva, the Exalted Lightsworn]]").
  * Despite this monster's ''[[TCG]]'' names assuming that it is male, based on its androgynous design, its French name assumes that it is a female. This is based on the usage of the feminine form of the adjective for "curious", ''Curieuse'' (not ''Curieux''), and a feminine title, ''la Dominatrice'' (not ''le Dominateur'').
