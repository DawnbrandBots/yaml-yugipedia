title: Card Trivia:Goyo Emperor
wikitext: |-
  {{Navigation}}

  * This card has two distinctions from other "[[Goyo]]" monsters:
  ** It is the only one to be a [[Fusion Monster]].
  ** It is the only one to not wield a Jutte-like weapon.
  * This "Goyo" monster has the highest [[Level]] and [[ATK]].
