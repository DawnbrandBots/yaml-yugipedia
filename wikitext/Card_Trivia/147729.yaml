title: Card Trivia:Burgundy the Magic Elf
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster appears in the artwork of "[[Magic Elf Order]]".
  * This monster's name is based on [[wikipedia:Burgundy wine|Burgundy wine]], a type of wine made in the Burgundy region of eastern France named after its dark red-purplish color.
  ** This monster's naming scheme is shared with "[[Klaret the Elite Magic Elf]]", whose name is based on "claret", the term used for [[wikipedia:Bordeaux wine|bordeaux wine]] made in the Bordeaux region of southern France.
  *** Both monsters' naming schemes reflect their owner, [[Sherry LeBlanc (manga)|Sherry LeBlanc]], a female [[Turbo Duelist]] of French origin in ''[[Yu-Gi-Oh! 5D's]]''.
  *** Coincidentally, both monsters' names are shared with [[Burgundy]] and [[Claret]], the [[Duel Monster Spirit]]s of "[[Total Defense Shogun]]" and "[[Spirit of the Harp]]" respectively, who appeared in the ''[[Yu-Gi-Oh! GX]]'' anime.
