title: Card Trivia:Shining Rabbit
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster appears in the artwork of "[[Shining Bridge]]".
  * This monster resembles the [[wikipedia:White Rabbit|White Rabbit]], a character from "[[wikipedia:Alice's Adventures in Wonderland|Alice's Adventures in Wonderland]]" who is depicted as an anthropomorphic rabbit wearing an aristocratic outfit.
  ** This monster's white fur may also be a reference to the white rabbits used by magicians in [[wikipedia:Hat-trick (magic trick)|illusion tricks]].
  ** In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, when this monster attacks, a darker and slightly evil version of this monster appears. While this monster attacks and inflicts damage, the dark version [[destroy]]s an opponent's [[Spell]]/[[Trap Card]] on the [[field]]. 
  *** The above-mentioned facts represent the true nature of its owner, [[Vector|Ray Shadows]], whose bright and happy demeanor is an illusion trick and a façade for his darker and duplicitous nature.
