title: Card Trivia:Kunoichi Ayame the Ninja Girl
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on a [[wikipedia:Kunoichi|kunoichi]], a female ninja.
  ** Despite this card not being a member of the "[[Ninja]]" archetype due to its Japanese name, its usage in the anime was indistinguishable from [[Jean-Claude Magnum]]'s lower-Level "Ninja" monsters.
