title: Card Trivia:Kahyoreigetsu
wikitext: |-
  {{Navigation}}

  [[File:Four_Bracelets.png|thumb|right|200|The [[Four Dimension Bracelets]], as seen in "[[Speaking]]".]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * The arms of [[Celina]], [[Lulu Obsidian]], [[Rin]], and [[Zuzu Boyle]] (each wearing her own [[Four Dimension Bracelets|bracelet]]) appear in this card's artwork.
  ** This card's artwork is based on a shot from "[[Speaking]]", the 4th Japanese ending theme of the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
  * This card's name is a pun ''Kachōfūgetsu'' on ({{Ruby|花|か}}{{Ruby|鳥|ちょう}}{{Ruby|風|ふう}}{{Ruby|月|げつ}}, lit. "flowers, birds, wind, moon"), the Japanese concept of the "beauties of nature", which serve as the basis of Zuzu and her [[dimensional counterparts]], their [[Deck]]s, and their corresponding [[Four Nature Cards]]. 
  ** This card's name and the [[Type]]s of monsters that can be [[Special Summon]]ed with this card's effect reference the [[archetype]]s used by Zuzu and her counterparts in the anime, with Zuzu using the "[[Melodious]]" archetype (which consists of musical flower-themed [[Fairy]] monsters), Rin using the "[[Windwitch]]" archetype (which consists of ice-themed [[WIND]] [[Spellcaster]] monsters), Lulu using the "[[Lyrilusc]]" archetype (which consists of graceful [[Winged-Beast]] monsters), and Celina using the "[[Lunalight]]" archetype (which consists of moon-themed [[Beast-Warrior]] monsters).
  * This card's effect to [[return]] all [[Dragon]] monsters to the [[hand]] references [[Ray Akaba]]'s [[Duel]] against [[Z-ARC]] (who used the [[Four Dimensional Dragons]]) and the subsequent result of them splitting apart into four counterparts, as well as the [[Original Dimension]] splitting apart into the [[Four Dimensions]].
  * This card's effect to [[add]] a "[[Polymerization (archetype)|Polymerization]]" or "[[Fusion (archetype)|Fusion]]" [[Spell Card]], or "[[Fusion Parasite]]" from the Deck to the hand reference how Zuzu and her dimensional counterparts each played one or more of said cards in the anime.

