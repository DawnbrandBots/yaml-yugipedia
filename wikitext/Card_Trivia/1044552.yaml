  [[File:Yubel-Energy-Form-Episode-130.png|thumb|[[Yubel (character)|Yubel]]'s energy form in the ''[[Yu-Gi-Oh! GX]]'' anime.]]

  * This monster is a downgraded form of "[[Yubel]]".
  ** This monster's appearance is based on the energy form of [[Yubel (character)|Yubel]] as seen in {{episode|GX|130|ref}}, during the flashback sequence in which the atmospheric entry of the capsule containing Yubel's [[Yubel (anime)|card form]] into [[Earth (planet)|Earth]] caused their body to be destroyed, while their [[Devil Arm|left forearm]] remained intact.
  ** This monster's name is based on "[[Phantom of Chaos]]", a monster used by Yubel in the ''[[Yu-Gi-Oh! GX]]'' anime, who can be used as a [[Fusion Material]] for this monster's [[Fusion Summon]].
  ** This monster's [[Summoning condition]] is also similar to [[Contact Fusion]], a method of Fusion Summoning used by [[Jaden Yuki]] (whom Yubel pursues) upon obtaining both "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]" and the "[[Neo-Spacian]]" monsters in the ''Yu-Gi-Oh! GX'' anime.
