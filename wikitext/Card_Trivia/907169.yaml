title: Card Trivia:Shichirin Samurai - Kushiro the Skewer Master
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[B・B・Q]]".
  * "Shichirin" (七輪) is a small charcoal grill. "Harami" is a pun on "腹身", meaning "skirt steak", and "Kushiro" seems to be a pun on "Skewer" (串 ''Kushi'') and "Wolf" (狼 which can be read as ''Rou'').
  ** The first part of this monster's name is a reference to the Akira Kurosawa film [https://en.wikipedia.org/wiki/Seven_Samurai Seven Samurai]. The film's title is "Shichinin no Samurai" (七人の侍). This monster's name replaces the second character, to change "shichinin" (meaning "Seven People") to "shichirin".
