title: Card Trivia:Bujincident
wikitext: |-
  {{Navigation}}

  * "[[Bujin Hirume]]" and the silhouette of "[[Bujin Hiruko]]" appear in this card's artwork.
  ** "Hiruko" is shown corrupting "Hirume", who then becomes "[[Bujinki Amaterasu]]".
  ** "Bujin Hiruko" appears obscured in this card's artwork because "Hiruko" had not yet debuted at the time this card was released.
  * This card's English name is a portmanteau of the words "[[Bujin]]" and "incident."

  == See also ==
  * [[List of monsters that appeared in another card's artwork before their own debut]]
