title: Card Trivia:Apophis the Swamp Deity
wikitext: |-
  {{Navigation}}

  * This card is based on "Apophis" (alternatively [[wikipedia:Apep|Apep]]), a demonic personification of chaos in [[wikipedia:Egyptian mythology|Egyptian mythology]], often depicted as a massive serpent.
  * This card is a [[retrained]] version of "[[Embodiment of Apophis]]".
