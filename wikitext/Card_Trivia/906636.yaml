title: Card Trivia:Staysailor Romarin
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Premium Pack 2022]]''.
  * The first portion of this monster's name is a portmanteau of the words "[[Wikipedia:Staysail|staysail]]" (the triangular fore-and-aft sails held by this monster) and "[[wikipedia:School uniforms in Japan#Sailor fuku|sailor]]" (reflecting the female variant of the sailor suit worn by this monster).
  ** The second portion of this monster's name is a pun on "romarin", the French word for the [[Wikipedia:Rosemary|rosemary]] plant (where its leaves and flowers make up the design of this monster's outfit) and the word "marine" (reflecting this monster's marine-like motif).
