title: Card Trivia:Borreload Savage Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Savage Strike]]'', and is also one of the cover cards of ''[[Mega Pack 03]]''.
  * This monster appears in the artwork of "[[Execute Protocols]]".
  * This monster is a [[Synchro Monster|Synchro]] [[counterpart]] of "[[Borreload Dragon]]".
  ** The "S" in this monster's Japanese name and its white color scheme further reference its Synchro Monster [[card type]].
  * This monster is the rival counterpart of "[[Firewall Saber Dragon]]".
  ** Both are Synchro counterparts of [[Yusaku Fujiki]] and [[Ryoken Kogami|Varis]]' [[signature card]]s.
  ** Both have a common naming scheme where the "S" in their Japanese names stands for another word.
  * This was the first Synchro Monster to be [[Synchro Summon]]ed in the ''[[Yu-Gi-Oh! VRAINS]]'' anime.
