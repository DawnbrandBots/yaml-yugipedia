title: Card Trivia:Mara of the Nordic Alfar
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name is derived from [[wikipedia:Svartálfar|Svartálfar]], a race of dark elves in [[wikipedia:Norse mythology|Norse mythology]], who reside in the underground realm of ''Svartálfaheimr''.
  ** This monster's ''[[TCG]]'' name is derived from ''[[wikipedia:Mare (folklore)#Nordic folklore|mara]]'', a malevolent female entity in Norse mythology known for riding on their sleeping victim's chest and cause them to have bad dreams, which serves as the origin of the word "nightmare".
