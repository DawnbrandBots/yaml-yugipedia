title: Card Trivia:Hexe Trude
wikitext: |-
  {{Navigation}}

  * This card is based on [[wikipedia:Mother Trudy|Mother Trudy]] (called "Frau Trude" in the original German) from the titular fairy tale in which a rebellious little girl visits Frau Trude, despite her parents' warnings. When the girl sees that Frau Trude was the human witch disguise of the Devil, she is punished by being transformed into a piece of firewood and thrown into the fire, where Frau Trude commented how the girl made the fire bright.
