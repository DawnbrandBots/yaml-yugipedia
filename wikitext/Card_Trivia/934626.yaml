title: Card Trivia:Red Cocoon
wikitext: |-
  {{Navigation}}

  * The "Scar-Red" in this card's Japanese name is a reference to [[Red Nova]], a demon also known as "Scar-Red Nova" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime, whose power was used to create "[[Red Nova Dragon (anime)|Red Nova Dragon]]".
