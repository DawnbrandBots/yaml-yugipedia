title: Card Trivia:Zoodiac Drident
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Nature Pack: Courageous Zoodiacs]]''.
  * This monster appears in the artwork of "[[Zoodiac Gathering]]".
  * This monster is based on the [[wikipedia:Chinese zodiac|Chinese zodiac]] sign of the [[wikipedia:Dragon (zodiac)|Dragon]].
  * This monster's trident is wielded by "[[Metaltron XII, the True Dracombatant]]".
  * This card's Simplified Chinese version was revealed on [https://www.bilibili.com/opus/1018381415691059205 Bilibili] and [https://weibo.com/7406309913/5119002645104777 Weibo] at 8:00 AM (China Standard Time) on January 4, 2025, which was the fourth quarter of the Chen hour in the traditional Chinese timekeeping system.
