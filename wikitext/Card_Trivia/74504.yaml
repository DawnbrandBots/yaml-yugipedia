title: Card Trivia:Swamp Battleguard
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Battleguard Echoes]]", "[[Battleguard Howling]]", "[[Feast of the Wild LV5]]", "[[Skill Successor]]", and "[[Spell of the Ruler]]".
  * This monster has a [[recolored counterpart]]: "[[Lava Battleguard]]".
  ** Both monsters bear a resemblance to [http://gatherer.wizards.com/pages/card/Details.aspx?multiverseid=109723 Sol'kanar the Swamp King] from ''[[wikipedia:Magic: The Gathering|Magic: The Gathering]]''.
  * The [[Swamp Battleguard (Bandai)|Bandai]] version of this card is [[Level 6]] and has 2300 [[ATK]] & 900 [[DEF]], whereas the Konami version is [[Level 5]] and has 1800 ATK & 1500 DEF.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|Yu-Gi-Oh!|078|ref}}, specifically from the panel showing [[Swamp Battleguard (manga)|this monster]] being Summoned, albeit with minor changes in detailing.
