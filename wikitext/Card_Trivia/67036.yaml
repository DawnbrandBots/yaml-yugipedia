title: Card Trivia:Star Blaster
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The angel from the artwork of "[[Graceful Dice]]" and the demon from the artwork of "[[Skull Dice]]" appear in this card's artwork, depicted being combined into one being, divided down the middle between both characters.
  * This card's English name is likely a mistranslation of its Japanese name, "Star Pluster", which reflects its effect to [[Special Summon]] a monster whose [[Level]] is equal to the Level of the [[Tribute]]d monster '''plus''' the result of the [[die roll]].
