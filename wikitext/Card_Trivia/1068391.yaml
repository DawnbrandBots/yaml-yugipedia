title: Card Trivia:Sangen Furo
wikitext: |-
  {{Navigation}}

  * "[[Tenpai Dragon Genroku]]" and "[[Sangen Summoning]]" appear in this card's artwork.
  * This card's Japanese name, "Sealing Furnace" ({{Ruby|封炉|フーロ}}, ''Fūro''), is a wordplay on a [[wikipedia:Mahjong|Mahjong]] term with the same reading ({{Ruby|副露|フーロ}} ''Fūro'') meaning to call a discarded tile to complete a meld.
