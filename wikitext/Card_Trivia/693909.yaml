title: Card Trivia:Prediction Princess Crystaldine
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the words "[[wikipedia:Crystal gazing|crystallomancy]]" (the usage of a crystal ball in [[wikipedia:Divination|divination]]) and "[[wikipedia:Undine (alchemy)|undine]]" (the elemental of water in [[wikipedia:Alchemy|alchemy]]).
  * This is the first and only monster to have been [[Tribute Set]] in the anime.
