title: Card Trivia:Starry Dragon's Cycle
wikitext: |-
  {{Navigation}}

  * "[[Imduk the World Chalice Dragon]]" and "[[Lib the World Key Blademaster]]" appear in this card's artwork.
  * This card's Japanese name is a play on 生々流転 (either ''seiseiruten'' or ''shōjōruten''), the concept of "the endless transmigration circle of birth, death, and rebirth of all things".
