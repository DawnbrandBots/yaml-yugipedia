title: Card Trivia:The Six Samurai - Kamon
wikitext: |-
  {{Navigation}}

  * All "[[The Six Samurai|Six Samurai]]" monsters hold different weapons that have something to do with their effects. This one holds dynamite, while its armor also looks to be made of dynamite.
  * The model of this card is [[wikipedia:Gamō Ujisato|Gamō Ujisato]]
  * This monster appears in the artworks of "[[Double-Edge Sword Technique]]", "[[Six Samurai United]]" and "[[Backs to the Wall]]".
