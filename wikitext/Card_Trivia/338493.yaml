title: Card Trivia:Performance Hurricane
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The initials "EM" appear on the bass drum in this card's artwork, which references {{Ruby|ＥＭ|エンタメイト}} (''Entameito''), the Japanese name of the "[[Performapal]]" archetype that this card supports.
  * This card has a [[counterpart]] which supports the "[[Performage]]" [[archetype]]: "[[Performance Mage Hurricane]]"
