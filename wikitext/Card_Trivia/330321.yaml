title: Card Trivia:D/D Recruits
wikitext: |-
  {{Navigation}}

  * "[[D.D. Assailant]]", "[[D.D. Warrior]]", "[[D.D. Warrior Lady]]", "[[D.D.M. - Different Dimension Master]]", and the emperor from the artwork of "[[Imperial Order]]" (and other related [[Trap Card]]s) appear in this card's artwork.
  ** The reason for this is likely the monsters' name "D.D." which is written similarly to "[[D/D]]", with both themes being abbreviations of "Different Dimension".
  * This card's artwork appears to feature the contract that is eventually burned in the artwork of "[[Contract Laundering]]".
