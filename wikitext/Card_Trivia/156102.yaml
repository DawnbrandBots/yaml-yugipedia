title: Card Trivia:Nurikabe
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * This monster is based on the ''[[wikipedia:Nurikabe|nurikabe]]'', a ''[[wikipedia:Yōkai|yōkai]]'' in Japanese folklore who manifests as a wall to impede or misdirect travelers walking at night.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to [[Special Summon]] this monster and another [[Zombie]] monster from the [[Graveyard]] at the cost of 1000 [[Life Point]]s is based on the effect of "[[Ghostly Reinforcements]]", which was used to Special Summon [[Nurikabe (manga)|this monster]] and "[[Long-Tailed Black Horse (manga)|Long-Tailed Black Horse]]" from [[Bastion Misawa (manga)|Bastion Misawa's]] Graveyard in {{chapter|GX|047|ref}}.
  ** This card's ''OCG''/''TCG'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! GX (manga)|Yu-Gi-Oh! GX]]'' manga, specifically from the panel showing this monster being Summoned.
