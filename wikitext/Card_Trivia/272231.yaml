title: Card Trivia:Sargasso the D.D. Battlefield
wikitext: |-
  {{Navigation}}

  * This dimension appears in the artwork of "[[Sargasso Lighthouse]]".
  * This card is named after the [[wikipedia:Sargasso Sea|Sargasso Sea]], which is known for being the location of many shipwrecks.
  ** The floating ruins that appear in this card's artwork are also remnants of [[wikipedia:Battleship|battleships]] and [[wikipedia:Aircraft carrier|aircraft carriers]], reflecting how the sea's [[wikipedia:Ocean current|currents]] naturally create a high concentration of [[wikipedia:Marine debris|marine debris]].
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this dimension served as the location of three separate Duels: [[Yuma Tsukumo]] VS [[Vector]], [[Reginald Kastle]] VS [[Dumon]], and [[Kite Tenjo]] VS [[Mizar]].
  ** Also, in the anime, when this card's damaging effect is [[activate]]d, it shot lightning at the player who [[Xyz Summon]]ed and/or [[control]]led an [[Xyz Monster]].
