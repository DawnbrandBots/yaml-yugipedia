title: Card Trivia:Clown Zombie
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Army of the Haunted]]" and "[[Ectoplasmic Fortification]]".
  * This monster is the [[Zombie counterpart]] of "[[Crass Clown]]".
  ** In the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]], this monster was "Crass Clown" affected by "[[Call of the Haunted]]".
  * This monster, "[[Armored Zombie]]", and "[[Dragon Zombie]]" are the only Zombie counterparts to have two [[Level]]s less than their original counterparts.
  * This card's [[Yu-Gi-Oh! Bandai's Official Card Game|Bandai]] [[Clown Zombie (Bandai)|artwork]] is based on the manga artwork of "[[Crass Clown (manga)|Crass Clown]]".
