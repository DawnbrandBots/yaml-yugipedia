title: Card Trivia:Labrynth Stovie Torbie
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Farewelcome Labrynth]]", "[[Labrynth Set-Up]]", "[[Trap Holic]]", and "[[Welcome Labrynth]]".
  * This monster is based on a [[wikipedia:Stove|stove]] and a cat. A “torbie” is a cat with both tabby (striped) and tortoiseshell (patches of different colors) markings.
