title: Card Trivia:Sylvan Princessprout
wikitext: |-
  {{Navigation}}

  * This monster's Japanese base title (姫芽君) is a portmanteau of the words "bud" (芽) and "princess" (姫君).
  ** This monster's ''[[TCG]]'' name is a portmanteau of the word "princess" and its Japanese name, "Sprout".
  * This monster is the older version of "[[Sylvan Cherubsprout]]".
  ** This is supported by their white horn-like appendages on the head.
  * This monster has an [[Xyz Monster|Xyz]] [[counterpart]]: "[[Sylvan Princessprite]]".
