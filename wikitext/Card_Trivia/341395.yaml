title: Card Trivia:Lucius the Shadow Vassal
wikitext: |-
  {{Navigation}}

  * This monster is most likely named Lucius to keep with the naming scheme for its respective "[[Monarch]]", "[[Caius the Shadow Monarch]]", whose Japanese name is translated as "Gaius the Wicked Monarch". The names Gaius and Lucius were both popular [[wikipedia:Praenomen|praenomina]] in [[wikipedia:Ancient Rome|Ancient Rome]].
