title: Card Trivia:Superheavy Samurai Wagon
wikitext: |-
  {{Navigation}}

  * "[[Superheavy Samurai Soulclaw]]", "[[Superheavy Samurai Soulhorns]]", "[[Superheavy Samurai Soulpiercer]]" and "[[Superheavy Samurai Soulshield Wall]]" appear in this card's artwork.
  * This monster's Japanese name, "Dai-8" (ダイ－８ ''Dai-Hachi'') is a pun on "''daihachi guruma''" (大八車), a large two-wheeled wagon.
  * This monster and "[[Superheavy Samurai Swordmaster Musashi]]" are the first [[Effect Monster]]s to be released in ''[[Yu-Gi-Oh! Duel Links]]'' that were already available in the ''[[OCG]]'' but not the ''[[TCG]]''. Both were later released in the ''TCG'' version of ''[[Eternity Code]]''.
