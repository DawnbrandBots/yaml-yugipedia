title: Card Trivia:Elemental HERO Electrum
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Premium Pack Vol.2]]''.
  * This monster appears in the artwork of "[[Magistery Alchemist]]".
  * This monster is themed after the practice of [[wikipedia:Alchemy|alchemy]] and the [[wikipedia:Philosopher's stone|Philosopher's Stone]], a legendary alchemical substance that is said to transform base metals such as lead or tin into precious metals like gold and/or silver.
  ** Fittingly, this card can [[return]] all [[banish]]ed monsters to the [[Deck]].
  ** This monster's Japanese name, "Elemental HERO Elixirer" ({{Ruby|Ｅ・ＨＥＲＯ|エレメンタルヒーロー}} エリクシーラー ''Erementaru Hīrō Erikushīrā''), is derived from the [[wikipedia:Elixir of life|elixir of life]], which was reputed to additionally grant rejuvenation and even immortality, and used the Philosopher's Stone as an ingredient.
  ** This monster's ''[[TCG]]'' name is derived from [[wikipedia:Electrum|electrum]], an alloy of [[wikipedia:Gold|gold]] and [[wikipedia:Silver|silver]], which is also the basis for the monster's color scheme.
  ** This monster's [[Fusion Material]]s ("[[Elemental HERO Avian]]" + "[[Elemental HERO Burstinatrix]]" + "[[Elemental HERO Clayman]]" + "[[Elemental HERO Bubbleman]]") are based on the process of transmutation that converts the base ''elements'' into gold.
  *** The background of this card's artwork also reflects the four [[Attribute]]s that are both required for this monster's [[Fusion Summon]] and gained with gains with its effect: [[EARTH]], [[WIND]], [[FIRE]], and [[WATER]].
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, this monster was first [[Fusion Summon]]ed in {{episode|GX|046|ref}}, during [[Jaden Yuki]]'s [[Duel]] against the alchemist [[Lyman Banner]]. Additionally, in {{episode|GX|049|ref}}, this monster was used with the effect of "[[Sabatiel - The Philosopher's Stone (anime)|Sabatiel - The Philosopher's Stone]]".
  * This is the first [[Fusion Monster]] to require four specific monsters as Fusion Materials.
