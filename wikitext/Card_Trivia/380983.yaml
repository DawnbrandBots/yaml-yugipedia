title: Card Trivia:King Scarlet
wikitext: |-
  {{Navigation}}

  * This is the second [[Trap Monster]] which becomes a [[Tuner monster]] when [[Special Summon]]ed, the first being "[[Shapesister]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' effect, which [[activate]]s when a "[[Red Dragon Archfiend (archetype)|Red Dragon Archfiend]]" monster battles, is an alteration of its activation condition in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, which activates when a "[[Red]]" monster battles. In {{episode|ARC-V|097|ref}}, this card was used alongside "[[Scarlight Red Dragon Archfiend (anime)|Scarlight Red Dragon Archfiend]]".
