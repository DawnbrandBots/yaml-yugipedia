title: Card Trivia:Glife the Phantom Bird
wikitext: |-
  {{Navigation}}

  * This monster is based on the griffin from the titular fairy tale, [[wikipedia:The Griffin (fairy tale)|The Griffin]].
  ** "Glife" (グライフ ''Guraifu'') is the Japanese pronunciation of "Greif" derived from "Der Vogel Greif", the original German name for the fairy tale.
  ** This card's ''[[OCG]]''/''[[TCG]]'' effect [[search]]ing "[[Golden Castle of Stromberg]]" from the [[Deck]] is based on the griffin's castle from this tale, where the main protagonist Hans must retrieve the griffin's tail feather for the king in order to marry a princess he had saved from illness at the beginning.
