title: Card Trivia:Azure-Eyes Silver Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: The Blue-Eyed Dragon's Thundering Descent]]''/''[[Saga of Blue-Eyes White Dragon Structure Deck]]''.
  * This monster appears in the artworks of "[[Silver's Cry]]" and "[[Wishes for Eyes of Blue]]".
  * This monster is an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form of "[[Blue-Eyes White Dragon]]".
  ** This monster's [[original ATK and DEF]] (2500/3000) are the inverse of those of "Blue-Eyes White Dragon".
  ** This monster's [[Level]] (9) is the sum of the Levels of "Blue-Eyes White Dragon" (8) and "[[The White Stone of Legend]]"/"[[Maiden with Eyes of Blue]]" (1), which are appropriate [[Synchro Material]]s for this card's [[Synchro Summon]].
  * This monster has an [[Xyz Monster|Xyz]] [[counterpart]]: "[[Indigo-Eyes Silver Dragon]]".
  * Despite the similarities in the English names, this monster is not part of the "[[Blue-Eyes]]" [[archetype]], as its Japanese name has the kanji 「蒼眼」 (''Sōgan'') instead of 「ブルーアイズ」 (''Burūaizu'', "Blue-Eyes").
  * This monster's pose is almost identical to the pose of "Blue-Eyes White Dragon" in its second ''[[OCG]]''/''[[TCG]]'' artwork, which was also the cover card of the ''[[Legend of Blue Eyes White Dragon]]'' [[Core Booster]].
  * This card's Spanish print has an errata in its description, claiming the monster in the [[Graveyard]] must be [[Normal Summon]]ed.
