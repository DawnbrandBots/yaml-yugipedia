title: Card Trivia:Camouflage Gardna
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster is based on [[wikipedia:Camouflage|camouflage]], a combination of colors and materials used by animals to blend in with their environment and avoid detection.
  ** In the case of this monster, its design and color scheme are based on the application of camouflage for hunters, who wear hunting gear with greenish-brown colors designed to help them blend in with the forest and avoid detection from their prey.
  * This is one of very few [[Effect Monster]]s in the anime, along with "[[Smile Angel]]", "[[V Gnome]]", "[[V Sylph]]" and "[[V Undine]]", that has its effect never activated or even mentioned at all.
