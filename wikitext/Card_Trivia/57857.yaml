title: Card Trivia:Insect Armor with Laser Cannon
wikitext: |-
  {{Navigation}}

  * This card is an upgraded version of "[[Laser Cannon Armor]]".
  * This card has a ''[[Rush Duel]]'' [[Monster Card]] [[counterpart]] combined with "Laser Cannon Armor": "[[Double Cannon Armor]]".
  * This card has the longest [[List of cards with the longest OCG to TCG import times|''OCG'' to ''TCG'' import time]] of any [[Spell Card]], debuting in the ''[[TCG]]'' more than 14 years after its first ''[[OCG]]'' debut on July 8, 1999.
