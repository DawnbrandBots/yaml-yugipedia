title: Card Trivia:Spirit Barrier
wikitext: |-
  {{Navigation}}

  * "[[Gagagigo]]" and "[[Invader of Darkness]]" appear in this card's artwork.
  ** This card's artwork is a reversal of "[[My Body as a Shield]]" (in which "[[Marauding Captain]]" shields "Gagagigo" from an attack made by "[[Blazing Inpachi]]"), as "Gagagigo" shields one of the men from "Marauding Captain" by the attack of "Invader of Darkness".
  ** This card's artwork depicts a reverse angle shot of the artwork depicted in "[[Absolute End]]".
  * The ''[[Soul of the Duelist]]'' and ''[[Dark Revelation Volume 3]]'' version of this card has the "0" (zero) written as "O" (the 15th letter in the English alphabet). The reason for this is unknown, but this can easily be seen by comparing it with the "O" in the word "becomes" right next to it.
  ** There is one other card that has a similar mistake, "[[Pikeru's Circle of Enchantment]]".
