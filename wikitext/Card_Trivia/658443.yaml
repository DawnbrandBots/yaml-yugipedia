title: Card Trivia:Aussa the Earth Charmer, Immovable
wikitext: |-
  {{Navigation}}

  * This card is a [[Link Monster|Link]] [[counterpart]] of "[[Aussa the Earth Charmer]]".
  * Either this monster or "Aussa the Earth Charmer" appears in the artworks of "[[Charmer Quartet in Bloom]]", "[[Grand Spiritual Art - Ichirin]]", and "[[Spirit Charmers]]".
  ** This monster's familiar also appears in the artwork of "[[Aussa the Earth Channeler]]".
