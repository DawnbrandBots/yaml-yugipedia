title: Card Trivia:Mound of the Bound Creator
wikitext: |-
  {{Navigation}}

  * This card's artwork depicts three floating mounds, likely referencing the three [[Tribute]]s needed to [[Tribute Summon]] one of the [[Egyptian God]]s.
  * This is the first card in the ''[[OCG]]''/''[[TCG]]'' to support [[DIVINE]] monsters.
  * In the ''[[Yu-Gi-Oh! GX]]'' anime, this card was designed by [[Franz]] to control one of the Egyptian Gods, though it was a fake, without needing a tie to Ancient Egypt or one of the [[Millennium Items]]. When it was [[activate]]d, the chains shot out of the holes in the three floating mounds and ensnared the fake copy of "[[The Winged Dragon of Ra (anime)|The Winged Dragon of Ra]]", forcing it to do Franz's bidding.
  ** It is one of two cards that have demonstrated the ability to forcibly control the Egyptian Gods without being chosen by them, the other being "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]" from the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime. [[Gurimo]] was able to control "[[Obelisk the Tormentor (anime)|Obelisk the Tormentor]]" with it, though this also put a strain on him.
