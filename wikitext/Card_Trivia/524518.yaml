title: Card Trivia:Martial Metal Marcher
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name ({{Ruby|武力|ブリキ}}の{{Ruby|軍|ぐん}}{{Ruby|奏|そう}}, ''Buriki no Gunsō'') contains two puns:
  ** 「武力」 (''Buriki'') means "military force" and would normally be pronounced ''Buryoku'', but the [[wikipedia:Furigana|furigana]] above the characters indicates it is to be pronounced 「ブリキ」 (''Buriki''), which sounds like 「錻力」 (''Buriki''), meaning "tin" or "tinplate".
  ** 「軍奏」 (''Gun Sō'') is literally the words for "army" and "concert", but put together they sound like the one word 「軍曹」 (''Gunsō''), meaning "sergeant". Thus, this monster's name as printed means "Army Concert of Military Force", but when spoken aloud sounds like "Tin Sergeant".
  ** This monster's ''[[TCG]]'' name replaces the Japanese puns with a name based on an alliteration of the translations of the said puns.
