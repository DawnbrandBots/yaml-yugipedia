title: Card Trivia:Maestroke the Symphony Djinn
wikitext: |-
  {{Navigation}}
  * This card is the only [[Rank]] 4 music-themed "[[Djinn]]" [[Xyz Monster]].
  * This monster appears in the artworks of "[[Resurrection March]]" and "[[Xyz Encore]]".
  * This card's name is a portmanteau of the words "maestro" and "stroke", the former being a title given to master musicians with extreme respect and an Italian word for "teacher" or "master".
