title: Card Trivia:Elemental HERO Knospe
wikitext: |-
  {{Navigation}}

  * The "Knospe" in this card's name is the German word for "bud", reflecting this card being the younger counterpart of "[[Elemental HERO Poison Rose]]".
  * This card is the first non-[[Warrior]]-[[Type]] "[[Elemental HERO]]" monster, being a [[Plant]]-Type monster.
  * This card shares similarities with "[[Neo-Spacian Glow Moss]]".
  ** Both cards are [[Level 3]] [[Plant]]-[[Type]] monsters.
  ** Both cards are androgynous in appearance until their evolved forms are revealed to be female ("Elemental HERO Poison Rose" for "Knospe", "[[Neo-Spacian Twinkle Moss]]" for "Glow Moss").
  ** Both cards are owned by [[Jaden Yuki]] in his appearances in the "[[Yu-Gi-Oh! GX]]" anime and manga.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|4|ref}}, specifically from the panel showing [[Elemental Hero Knospe (manga)|this monster]] being Summoned.
