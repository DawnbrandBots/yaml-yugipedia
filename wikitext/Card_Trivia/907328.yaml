title: Card Trivia:Digit Jamming
wikitext: |-
  {{Navigation}}

  * "[[The Calculator]]" appears in this card's artwork.
  * The device in this card's artwork is based on a wireless signal jammer, a device designed to disrupt communication between a wireless device and its base station.
  * The first portion of this card's Japanese name ({{Ruby|無|む}}{{Ruby|千|せん}}ジャミング, ''Musen Jamingu''), is a pun on the words "wireless" ({{Ruby|無|む}}{{Ruby|線|せん}}, ''musen'') and "thousand" ({{Ruby|千|せん}}, ''sen'') with the first base kanji of each word combined to create 「無千」 meaning "without thousands", which reflects this card's effect to reduce the [[ATK]]/[[DEF]] of all monsters on the [[field]] by the thousands until they have less than 1000 ATK/DEF.
