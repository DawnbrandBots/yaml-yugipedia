title: Card Trivia:Broken Bamboo Sword
wikitext: |-
  {{Navigation}}

  * This card has five [[support]] cards: "[[Cursed Bamboo Sword]]", "[[Golden Bamboo Sword]]", "[[Soul Devouring Bamboo Sword]]", "[[Burning Bamboo Sword]]" and "[[Original Bamboo Sword]]".
  * This card and "[[Toon World]]" are the only [[Spell Card]]s without an additional effect on their own.
  ** It is also the only [[Equip Spell Card]] without an effect that impacts the overall gameplay, as a [[Monster Card|monster]] cannot "gain" 0 [[ATK]].
