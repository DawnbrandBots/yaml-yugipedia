title: Card Trivia:Passion of Baimasse
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is based on [[wikipedia:Plica plica#In tribal mythology|Vai-Mahse]], a type of humanoid fairy from [[wikipedia:Tucano people|Tucano Indian]] mythology, which appears in this card's artwork.
  * This card's video game [[activation condition]] requiring the player to [[control]] an "[[Earthbound Immortal]]" monster is an alteration of its activation condition in the anime, which doesn't require a specific monster. In {{episode|5D's|064|ref}}, this card was [[activate]]d by [[Rex Goodwin]] while he controlled "[[Earthbound Immortal Wiraqocha Rasca (anime)|Earthbound Immortal Wiraqocha Rasca]]".
