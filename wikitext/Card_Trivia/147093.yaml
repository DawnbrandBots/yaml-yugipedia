title: Card Trivia:Steelswarm Sting
wikitext: |-
  {{Navigation}}

  * This card's effect is designed to stop the Fusion, Ritual, and Synchro Monsters, and goes on to show that the "[[Steelswarm]]" are the enemies of those types of monsters.
  * This monster appears in the artwork of "[[Infestation Ripples]]".
  * This card's effect is a reference to a Bee Sting as when Bee's are threatened or killed they are likely to use their stinger.
