title: Card Trivia:Cyber Twin Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cyber Network]]" and "[[Cybernetic Revolution (card)|Cybernetic Revolution]]".
  * This monster's left head bears resemblance to "[[Cyber Dragon Zwei]]".
  * This monster's name reflects its two-headed appearance and effect, which allows it to attack twice.
  * This monster's [[original ATK and DEF]] are each 700 points higher than those of "[[Cyber Dragon]]".
  ** "[[Cyber Ogre 2]]" follows this pattern, with its original ATK and DEF each being 700 points higher than those of "[[Cyber Ogre]]".
  * This is the only "[[Cyber Dragon (archetype)|Cyber Dragon]]" monster to not have an [[alternate artwork]], as it was not copied by "[[Cyber Shadow Gardna (anime)|Cyber Shadow Gardna]]" during [[Zane Truesdale]]'s Duel against [[Chancellor Sheppard]].
  * Since October 5, 2017, this card's Spanish text listed on the ''Yu-Gi-Oh! Trading Card Game - Card Database'' is the Spanish text of "[[Cyber End Dragon]]".
