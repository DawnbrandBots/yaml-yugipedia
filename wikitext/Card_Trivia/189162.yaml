title: Card Trivia:Kagemucha Knight
wikitext: |-
  {{Navigation}}

  * The monster's name is likely a pun on "''kagemusha''" (lit. "shadow warrior"), a person who acts as a body double for Japanese warlords. This monster's appearance, [[Attribute]] ([[DARK]]), [[Type]] ([[Warrior]]), and manga effect to [[Special Summon]] itself when a [[Level 3]] Warrior monster is Summoned reflect its status as a "shadow warrior".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|009|ref}}, specifically from the panel showing [[Kagemucha Knight (manga)|this monster]] being Summoned.
