title: Card Trivia:Spiritual Fusion
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Elemental HERO Avian]]", "[[Elemental HERO Burstinatrix]]", "[[Elemental HERO Wildheart]]", "[[Evil HERO Inferno Wing]]", and "[[Evil HERO Wild Cyclone]]" appear in this card's artwork.
  ** This card's artwork depicts the decision the player must make for the opponent by choosing "Avian" and either "Burstinatrix" or "Wildheart" as [[Fusion Material]] to [[Fusion Summon]] either "Inferno Wing" or "Wild Cyclone", respectively, which can only happen if the opponent performs a Fusion Summoning via "[[Dark Fusion]]" or "[[Dark Calling]]".
  * In both versions of the ''[[Yu-Gi-Oh! GX]]'' anime, while this card is a [[Normal Trap Card]], [[Yubel (character)|Yubel]] refers to it as a [[Counter Trap Card]] instead.
  * This is the last card to be used in the English dubbed version of the ''Yu-Gi-Oh! GX'' anime.
