title: Card Trivia:Deck Devastation Virus
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s for ''[[Flaming Eternity]]''.
  * This card has several [[counterpart]]s: "[[Crush Card Virus]]", "[[Eradicator Epidemic Virus]]", "[[Full Force Virus]]", and "[[Grinning Grave Virus]]".
  ** Of the "[[Virus]]" [[Trap]]s, this card represents the letter "D" in the alphabetical alliteration pattern.
  * The kanji 魔 on the viruses in this card's artwork means "demon".
  * The Japanese name of "[[Diabolos, King of the Abyss]]" refers to this card.
  * "[[Deck Destruction Virus]]" also has "DDV" as its initials, but is separate, and not considered a [[Virus Card]].
