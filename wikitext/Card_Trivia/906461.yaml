title: Card Trivia:Krawler Soma
wikitext: |-
  {{Navigation}}

  * This card is named after the [[wikipedia:Soma (biology)|soma]], the section of a [[wikipedia:Neuron|neuron]] that contains the [[wikipedia:Cell nucleus|cell nucleus]].
  * Visually, this monster is based on "[[Crusadia Krawler]]" and "[[Mekk-Knight Blue Sky]]".
  ** This card also has the same [[ATK]] (2000) and [[DEF]] (2500) as "Mekk-Knight Blue Sky".
  ** This monster may be a version of "Crusadia Krawler" [[Card evolutions|recreated]] by "[[Avida, Rebuilder of Worlds]]", after He [[World Reassembly|reset the world]].
