title: Card Trivia:Wattgiraffe
wikitext: |-
  {{Navigation}}

  * The "ele" in this card's Japanese name means "electric", and "kirin" is Japanese for "giraffe", and thus, "Erekirin" translates to "Elegiraffe" (Electric Giraffe).
  * This monster appears in the artwork of "[[Wattrain]]".
  * Of all the Level 4 and lower monsters that can attack directly (due to their effects), this monster has the highest ATK without any negative effects or any required conditions to attack directly.
