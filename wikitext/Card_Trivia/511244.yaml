title: Card Trivia:Jar Robber
wikitext: |-
  {{Navigation}}

  * "[[Goblin of Greed]]" and "[[Pot of Greed]]" appear in this card's artwork.
  * The woman and the shopkeeper in this card's artwork also appear in the artwork of "[[Fine]]".
  ** The shopkeeper also appears in the artwork of "[[Cash Back]]".
  * This card is one of several cards that were created to counter one specific card, each of which have been [[Limited]] or [[Forbidden]] at some point. The others are "[[Gryphon Wing]]", "[[Anti Raigeki]]", "[[White Hole]]", "[[Call of the Grave]]" and "[[Call of Darkness]]".
  ** Unlike the above listed cards, this card is a Spell Card instead of a Trap Card.
