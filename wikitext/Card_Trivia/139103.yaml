title: Card Trivia:Egotistical Ape
wikitext: |-
  {{Navigation}}

  * This card's artwork is similar to that of "[[Kinka-byo]]", depicting a benign-looking animal with a menacing, spectral shadow.
  * Although this monster is identified as an [[wikipedia:ape|ape]], apes do not have tails, one of which is visible in this card's artwork.
  ** This is explained by this card's ''[[OCG]]'' name, "Giant Monkey of Vanity".
