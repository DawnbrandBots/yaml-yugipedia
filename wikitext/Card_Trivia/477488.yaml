title: Card Trivia:Predapruning
wikitext: |-
  {{Navigation}}

  * "[[Predaplant Squid Drosera]]" appears in this card's artwork.
  * This card's Japanese name, "Predator Graft", is a reference to [[wikipedia:Grafting|grafting]], a technique used in horticulture where plant tissues are joined together to continue their growth, similar to how this card's artwork depicts "Squid Drosera" being made of two different specimens (an older one for the stem, and a younger one for the branches) that are  together.
  ** This card's ''[[TCG]]'' name, "Predapruning", is a reference to [[wikipedia:Pruning|pruning]], a horticultural practice that trimming away dead overgrowth or tissue from crop and landscape plants, similar to how this card's artwork depicts the dead outer tissue of "Squid Drosera" being trimmed away to allow the younger tissue to grow.
