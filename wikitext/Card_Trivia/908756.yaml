title: Card Trivia:Armed Dragon Thunderbolt
wikitext: |-
  {{Navigation}}

  * "[[Armed Dragon Thunder LV10]]" appears in this card's artwork.
  ** The pose that "Armed Dragon Thunder LV10" is striking in this card's artwork appears to be a reference to the [[wikia:w:c:dragonball:Kamehameha|Kamehameha]] from the ''[[Wikipedia:Dragonball|Dragonball]]'' franchise, created by the late [[Wikipedia:Akira Toriyama|Akira Toriyama]], and the signature technique of the main protagonist; [[Wikipedia:Goku|Son Goku/Kakarot]].
