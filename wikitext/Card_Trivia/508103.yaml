title: Card Trivia:Felgrand Dragon
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Structure Deck: Revival of the Great Dragon]]'' and ''[[Rise of the Dragon Lords Structure Deck]]''.
  * A statue version of this monster appears in the artwork of "[[Trade-In]]" and "[[Treasure Dragon]]".
  ** A silhouette of this monster appears in the artwork of "[[Divine Dragon Knight Felgrand]]".
  * This monster's Japanese name, "Felgrant Dragon", is a combination of the words "fell" and "grant". 
  ** This monster's naming scheme reflects its effects, which [[activate]]s after it is "felled", or [[sent]] from the [[field]] to the [[Graveyard]], allowing it to be [[Special Summon]]ed from there and be "granted" [[ATK]] equal to the [[Level]] of the player's monster in the Graveyard multiplied by 200.
  * The appearances of "[[Herald of Creation]]", "[[Dragon Knight of Creation]]" and "Divine Dragon Knight Felgrand" are based on this monster.
  * This monster has a [[retrained]] counterpart: "[[Divine Dragon Lord Felgrand]]".
