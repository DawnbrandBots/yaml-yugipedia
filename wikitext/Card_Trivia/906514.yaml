title: Card Trivia:Tribe Drive
wikitext: |-
  {{Navigation}}

  * "[[Tri-Brigade Kitt]]", "[[Springans Pedor]]", "[[Springans Rockey]]", and the mechanical shrike from the artwork of "Tri-Brigade Kitt" appear in this card's artwork.
  ** Machine pieces that belong to "[[Tri-Brigade Bearbrumm the Rampant Rampager]]" and "[[Sprind the Irondash Dragon]]" also appear in this card's artwork.
  ** This card's artwork depicts "Kitt" forging her "[[Springans]]" armor, possibly using the pieces of "Sprind" and/or "Bearbrumm", becoming "[[Springans Kitt]]".
