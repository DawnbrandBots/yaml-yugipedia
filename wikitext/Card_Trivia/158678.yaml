title: Card Trivia:Laval the Greater
wikitext: |-
  {{Navigation}}

  * This card's blue flames are an indicator of the intensity of its fire. The color of the flame gets noticeably higher on the color spectrum as the intensity of the heat increases. Thus, a blue flame is hotter than a red one.
  * This card appears in the artwork of "[[Molten Whirlwind Wall]]".
  * This card's position is similar to "[[General Grunard of the Ice Barrier]]".
