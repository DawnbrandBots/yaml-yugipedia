title: Card Trivia:Magician's Valkyria
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Valkyrian Call]]" and "[[Valkyrian Guard]]".
  * "[[Dark Magical Circle]]" appears in this card's artwork.
  * This monster's name is based on a [[wikipedia:Valkyrie|valkyrie]], a host of female figures and handmaidens of [[wikipedia:Odin|Odin]] in Norse mythology, who chooses those destined to be slain in battle. This monster's effect reflects this, as this card can direct all attacks to it, so it can be the only [[Spellcaster]] monster to be destroyed in battle.
  * This monster's pose and the "Dark Magical Circle" mirror those of its counterpart, "[[Dark Magician Girl]]"; also, this monster is left-handed while "Dark Magician Girl" is right-handed.
  * This monster and "[[Miracle Flipper]]" are the only counterparts to "Dark Magician Girl" and "[[Dark Magician]]" respectively whose [[Attribute]]s are [[LIGHT]] instead of their usual [[DARK]] Attribute. Both monsters also feature effects that [[Prevents other cards being targeted for attacks|prevent other cards being targeted for attacks]].
