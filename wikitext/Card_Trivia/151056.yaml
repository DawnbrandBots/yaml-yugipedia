title: Card Trivia:Banishing Climb
wikitext: |-
  {{Navigation}}

  * "[[Arcanite Magician]]" and the hand that appears in the artworks of "[[Card Destruction]]" and "[[Raigeki Break]]" appears in this card's artwork.
  * This card's name is likely considered to be "ahead of its time", as "Banishing" is currently the ''[[TCG]]'' term for [[Banish|removed from play]].
