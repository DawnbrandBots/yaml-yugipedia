title: Card Trivia:Isolde, Belle of the Underworld
wikitext: |-
  {{Navigation}}

  * This monster is based on the character Iseult of the Celtic legend of ''[[wikipedia:Tristan and Iseult|Tristan and Iseult]]'', which is cited as an influence on the romance between [[wikipedia:Lancelot|Lancelot]] and [[wikipedia:Guinevere|Guinevere]].
  ** This is further supported by this monster and "[[Tristan, Knight of the Underworld]]" being ideal [[Xyz Material]] for "[[Number 23: Lancelot, Dark Knight of the Underworld]]". Fittingly, the former two monsters are used to Summon the latter in {{chapter|ZEXAL|039|ref}}.
  * This monster's design features a fox motif: she features long, sharp ears, her necklace and armbands are designed after a fox's head, and the end of her dress resembles a fox's tail.
  * This monster's ''[[OCG]]''/''[[TCG]]'' design is based on two different panels showing [[Isolde, Belle of the Underworld (manga)|this monster]] from the aforementioned chapter of the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga: the bodily pose is taken from the panel showing it being Summoned, while the design of the head is taken from the panel where it uses its [[Level]]-changing effect.
