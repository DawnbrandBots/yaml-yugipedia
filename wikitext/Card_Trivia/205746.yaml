title: Card Trivia:Field Barrier
wikitext: |-
  {{Navigation}}

  * The card protected by the barrier in this card's artwork resembles that of "[[The Seal of Orichalcos]]".
  ** This card's effect is also a reference to "The Seal of Orichalcos's" power to be impervious to removal; however, this was changed in the official ''[[OCG]]''/''[[TCG]]'' release.
