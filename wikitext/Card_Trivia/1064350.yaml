title: Card Trivia:Incoming Machine!
wikitext: |-
  {{Navigation}}

  [[File:Incoming Machine!.png|thumb|200px|"[[Metalzoa (manga)|Metalzoa]]" attacking "[[Axe Raider (manga)|Axe Raider]]".]]

  * "[[Axe Raider]]" and "[[Metalzoa]]" appear in this card's artwork.
  ** This card's artwork is taken from {{chapter|Yu-Gi-Oh!|120|ref}}, specifically from the panel showing [[Keith Howard (manga)|Bandit Keith Howard's]] "[[Metalzoa (manga)|Metalzoa]]" attacking [[Katsuya Jonouchi (manga)|Katsuya Jonouchi's]] "[[Axe Raider (manga)|Axe Raider]]".
  *** This card's final effect to change an opponent's [[Defense Position]] monster to [[Attack Position]] is based on a scene during the chapter where Bandit Keith uses the effect of "[[Stop Defense (manga)|Stop Defense]]" to change Jonouchi's Defense Position "Axe Raider" to Attack Position.
  ** This card's Japanese name is the same as the Japanese title of the next chapter, {{chapter|Yu-Gi-Oh!|121|ref}}, which depicted the aftermath of "Metalzoa" being destroyed by "[[Chasm of Spikes (manga)|Chasm of Spikes]]".

