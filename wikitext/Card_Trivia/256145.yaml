title: Card Trivia:Line World Revival
wikitext: |-
  {{Navigation|mode=nongame}}

  * The ''hisha'' piece used in the game of [[Wikipedia:Shogi|shogi]] appear in this card's artwork.
  ** This card's artwork and effect are based on the [[Wikipedia:Shogi#Drops|drop rules]] gameplay mechanic in the game of shogi, where instead of moving a piece, the turn player can place a captured piece on the board under their control, similar how this card's effect can [[Special Summon]] an opponent's monster from the player's [[Graveyard]] ([[sent]] there via the effect of "[[Line World]]") under their [[control]].
