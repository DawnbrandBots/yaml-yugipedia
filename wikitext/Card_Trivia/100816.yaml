title: Card Trivia:Snipe Hunter
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Dice It]]", "[[Dice-nied]]", "[[Diced Dice]]", "[[Diceversity]]", and "[[That Six]]".
  * This monster is named after a [[wikipedia:snipe hunt|snipe hunt]], a type of practical joke in North America where an unsuspecting newcomer is tricked into trying to catch an elusive, nonexistent animal called a ''snipe''.
  ** This monster's name is also based on a [[wikipedia:Sniper|sniper]], a highly-trained military marksman who can engage their targets from a concealed position from the distance of their target's detection. This reflects this monster's namesake and effect to "snipe" a [[target]]ed card on the [[field]] by [[destroy]]ing it.
  * The numbers on this monster's pistol correspond to the numbers on a die. Additionally, the numbers are in a roulette wheel, reflecting the gamble of [[activate|activating]] its destruction effect.
  ** Also, this card's artwork depicts the numbers "2", "3", "4", and "5", which corresponds with the preferred numbers required to activate its destruction effect. The number "5" is the number that the pistol's roulette lands on, thus allowing this monster to fire its pistol.
