title: Card Trivia:Swordsoul Auspice Chunjun
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Loss]]" and "[[Swordsoul Assessment]]".
  * This monster is based on "[[wikipedia:zh:纯钧|Chunjun]]" (zh: 纯钧 / 純鈞 ''chúnjūn'', roughly translates as "Purity") which was a legendary sword created by the legendary sword-maker of [[wikipedia:Spring and Autumn period|Ancient China]], [[wikipedia:Ou Yezi|Ou Yezi]]. The sword, whose patterns seemed to be like a constellation (and it is said to be the [[wikipedia:Sword of Goujian|Sword of Goujian]]), was gifted to [[wikipedia:Goujian|King Goujian]] of the ancient State of [[wikipedia:Yue (state)|Yue]].
  ** Additionally, this monster's effect to [[destroy]] both an opponent's monster and itself before [[damage calculation]] may be a reference to the fact that Ou Yezi was said to have died while making that sword.
