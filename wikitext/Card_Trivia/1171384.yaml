title: Card Trivia:Shipping Archfiend
wikitext: |-
  {{Navigation}}

  * This card's name and effects are based on [[wikipedia:shipping|shipping]], a practice in a fandom that pairs two or more characters/individuals as being in a romantic relationship.
  ** This monster is depicted wearing a ''[[wikipedia:Japanese_street_fashion#Jirai_Kei|Jirai Kei]]''-style outfit, which is often associated with the "hardcore" members of the fandom.
