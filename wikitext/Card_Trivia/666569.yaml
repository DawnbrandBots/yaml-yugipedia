title: Card Trivia:Lightning Storm
wikitext: |-
  {{Navigation}}

  * "[[Chimeratech Rampage Dragon]]" appears in this card's alternate artwork.
  ** Both cards share an effect that [[destroy]]s multiple [[Spell Card|Spell]]s/[[Trap Card|Trap]]s.
  * This card has a "[[High Tech Dragon]]" counterpart: "[[Dralightning Storm]]".
  * In ''[[Yu-Gi-Oh! Master Duel]]'', this card has a special animation when activated: the lightning bolt from the card's artwork streaks across the opponent's field, destroying their monsters or Spells/Traps.
