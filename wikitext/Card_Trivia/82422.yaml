title: Card Trivia:Dark Valkyria
wikitext: |-
  {{Navigation}}

  * This is the [[Dark counterpart]] of "[[Dunames Dark Witch]]" and "[[Power Angel Valkyria]]".
  ** This is strengthened by the fact that the Japanese name of "Dunames Dark Witch" literally translates to "Dunames Valkyria".
  ** This is the only Dark counterpart that is also a [[Gemini monster]].
  ** Despite being a Dark counterpart of "Dunames Dark Witch", her outfit has differences in both the skirt and chest armor.
