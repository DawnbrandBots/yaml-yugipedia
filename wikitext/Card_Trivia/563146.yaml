title: Card Trivia:Abyss Script - Shadow Spirit
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The smile of the [[wikipedia:Amanojaku|amanojaku]] in the artwork of "[[Reverse Trap]]" is depicted on the book in this card's artwork.
  ** In the ''[[Yu-Gi-Oh! ARC-V]]'' anime, after this card was activated, "[[Abyss Actor - Superstar (anime)|Abyss Actor - Superstar]]" took on the appearance of the same amanojaku.
