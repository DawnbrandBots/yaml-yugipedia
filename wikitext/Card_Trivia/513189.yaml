title: Card Trivia:Relinquished
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] for ''[[Magic Ruler (Japanese)|Magic Ruler]]'', ''[[Spell Ruler]]'', and ''[[Starter Deck: Pegasus]]'', and is also one of the cover cards of ''[[Duelist Legacy Volume.1]]''.
  * This monster appears in the artwork of "[[Relinquished Fusion]]".
  * This monster has a [[Link Monster|Link]] [[counterpart]]: "[[Relinquished Anima]]".
  ** The design of "Relinquished Anima" is the same as this monster, but upside down.
  * This is the [[signature card]] of [[Maximillion Pegasus]] in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  * This monster has the lowest [[Level]] (1), and [[original ATK and DEF]] (0/0) of all [[Ritual Monster]]s.
  ** Since its release in 2000 (''[[OCG]]'')/2002 (''[[TCG]]''), this was the only [[Level 1]] Ritual Monster until the release of "[[Cyberse Sage]]" in 2023.
  * This is the first Ritual [[Effect Monster]] to be released in the ''OCG''/''TCG''.
  ** Additionally, "[[Thousand-Eyes Restrict]]", which uses this monster as [[Fusion Material]], is the first [[Fusion Monster|Fusion]] Effect Monster in the ''OCG''/''TCG''.
  * The hilt of "[[Sword of Dark Rites]]" is based on this monster's design. This is fitting, since this monster's Japanese name is "Sacrifice", which serves as the basis of the Japanese name of "Sword of Dark Rites": "Sacrifice Sword".
  * In the ''Yu-Gi-Oh!'' manga, this monster is the combined form of "[[Dark-Eyes Illusionist (manga)|Dark-Eyes Illusionist]]" and an [[List of unnamed cards#Pegasus's monster|unnamed monster]].
  ** In the manga and anime, this monster's effect can [[equip]] itself with more than one monster [[once per turn]], which allows it to gain the combined [[ATK]] and [[DEF]] of the monsters it equips itself with.
  * In the ''OCG'', this card and "[[Black Illusion Ritual]]" have never been released together in the same [[Booster Pack]]. This card was released in ''[[Magic Ruler (Japanese)|Magic Ruler]]'', while "Black Illusion Ritual" was released as a [[The Valuable Book 2 promotional cards|promotional card]] for ''[[The Valuable Book 2]]''.
  * Until its release in ''[[Legendary Collection 3: Yugi's World]]'', this monster's effect did not state how to [[Summon]] it in the ''OCG''/''TCG''. The main reason is most likely the insufficient amount of space left in the card box to introduce the standard specification for a [[Ritual Summon]].
  * There is a [[misprint]]ed Italian print of this card called "Abb'''b''''andono". This card's real Italian name is "Abbandono".
  * In the English dubbed version of the ''Yu-Gi-Oh!'' anime and in some video games, this card's artwork depicts the [[Eye of Anubis]] featured in this monster's design red, while its other artworks depict it as yellowish-gold.
  ** In ''[[Yu-Gi-Oh! The Sacred Cards]]'', this monster's [[Attribute]] is [[DIVINE]], like all other Ritual Monsters included in the game, instead of [[DARK]].
  * This monster's Summoning cutscene in ''[[Yu-Gi-Oh! Duel Links]]'' features a dark cloudy setting, referencing how this monster was Ritual Summoned during Maximillion Pegasus's second [[Shadow Game]] against [[Yugi Muto]]/[[Yami Yugi]] in the [[Duelist Kingdom (arc)|Duelist Kingdom]] arc.
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|Yu-Gi-Oh!|129|ref}}, specifically from the panel showing [[Relinquished (manga)|this monster]] being Summoned.
