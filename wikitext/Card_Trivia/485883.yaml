  * This card is an [[Card evolutions|upgraded]] form of "[[D/D/D Gust King Alexander]]".
  * This card is the only [[D/D/D Flame High King Genghis|High]] [[D/D/D Wave High King Caesar|King]] "[[D/D/D]]" monster that lacks a [[negation]] effect as well as the only one to have generic [[material]]s.
