title: Card Trivia:Bujin Arasuda
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * This monster is named after the land of "Utaarasuda", a location in the [[wikipedia:Yamashiro Province|Yamashiro Province]] of Japan where the [[wikipedia:Tsukiyomi Shrine (Kyoto)|Tsukiyomi Shrine]] in [[wikipedia:Kyoto|Kyoto]] was built.
  ** The Tsukuyomi Shrine in Kyoto is known for enshrining [[wikipedia:Tsukuyomi|Tsukuyomi]], the [[wikipedia:Shinto|Shinto]] deity of the Moon. Fittingly, a full moon appears in the background of this card's artwork.
  * The [[Main Deck]] "[[Bujin]]" [[Beast-Warrior]] monsters resemble characters appearing in the ''[[Yu-Gi-Oh! GX]]'' anime through their head shapes and color schemes. In this case, this monster resembles [[Bastion Misawa]], while its yellow color scheme is a reference to how Bastion wore a yellow uniform belonging to the [[Ra Yellow]] dorm.
