title: Card Trivia:Drytron Eclipse
wikitext: |-
  {{Navigation}}

  * "[[Drytron Alpha Thuban]]" appears in this card's artwork.
  * This card is named after an [[wikipedia:Eclipse|eclipse]], an event where an astronomical object is temporarily obscured by the passing shadow of another astronomical event.
  ** The kanji in this card's Japanese name (喰光の竜輝巧 ''Kūkō no Ryukikō'') can be translated to "Light-Eating Drytron".
