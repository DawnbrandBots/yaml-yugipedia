title: Card Trivia:Elemental HERO Thunder Giant - Voltic Thunder
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]''.
  * "[[Skyscraper]]" appears in this card's artwork.
  * This monster is the [[signature move]] counterpart of "[[Elemental HERO Thunder Giant]]".
  ** Its [[Fusion Material]]s requiring two "[[Elemental HERO]]" monsters with different [[Attribute]]s reference how "Thunder Giant" requires the [[LIGHT]] "[[Elemental HERO Sparkman]]" and the [[EARTH]] "[[Elemental HERO Clayman]]" as [[material]]. 
  *** Also, this monster's [[Tribute]] effect can only be [[activate]]d if it is [[Fusion Summon]]ed using a [[Normal Monster]], referencing how both "Sparkman" and "Clayman" are both Normal Monsters.
  ** "[[Elemental Hero Thunder Giant (anime)|Elemental Hero Thunder Giant]]" is one of the two [[Fusion Monster]]s most commonly used by [[Jaden Yuki]] during the first season of the ''[[Yu-Gi-Oh! GX]]'' anime, the other being "[[Elemental Hero Flame Wingman (anime)|Elemental Hero Flame Wingman]]" (which also has a signature move counterpart, "[[Elemental HERO Flame Wingman - Infernal Rage]]").
