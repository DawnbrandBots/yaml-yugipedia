title: Card Trivia:Evil Assault
wikitext: |-
  {{Navigation}}

  [[File:Evil HERO Infernal Gainer returns.png|thumb|"[[Evil Hero Infernal Gainer (anime)|Evil Hero Infernal Gainer]]" returns to the [[The Supreme King|Supreme King's]] field.]]
  * "[[Evil HERO Infernal Gainer]]" appears in this card's artwork.
  ** This card's name and the artwork depicting the pose of "Infernal Gainer" both reference those of "[[Assault Armor]]", a card used by [[Jaden Yuki]], the reincarnation of the [[The Supreme King|Supreme King]] in the ''[[Yu-Gi-Oh! GX]]'' anime. It may also reference ''[[Gladiator's Assault]]'', the [[Core Booster]] [[Booster pack|Pack]] that introduced the "[[Evil HERO]]" [[archetype]] alongside the eponymous "[[Gladiator Beast]]" (whom also receives support in this card's set, ''[[Supreme Darkness]]''), in much of the same way "[[Raider's Wing]]'s" name references the core booster set ''[[Wing Raiders]]''.
  *** Fittingly, in {{episode|GX|136|ref}}, Jaden used "[[Assault Armor (anime)|Assault Armor]]" during his Duel against [[Brron, Mad King of Dark World (character)|Brron, Mad King of Dark World]]. During the aftermath of the Duel, in which Jaden's friends were either sacrificed to create "[[Super Polymerization (anime)|Super Polymerization]]" or have abandoned him, his mind was taken over by the spirit of the Supreme King.
  *** This card's artwork references a scene during {{episode|GX|140|ref}} where the second effect of "[[Evil Hero Infernal Gainer (anime)|Evil Hero Infernal Gainer]]" [[return]]s itself to the Supreme King's [[field]] after it was [[banish]]ed via its effect, at which point a bright red comet could be seen behind the Supreme King.
