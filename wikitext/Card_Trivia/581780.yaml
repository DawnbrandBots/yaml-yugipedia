title: Card Trivia:Superheavy Samurai Scarecrow
wikitext: |-
  {{Navigation}}

  * "[[Superheavy Samurai Soulpiercer]]" and "[[Superheavy Samurai Soulclaw]]" appear in this card's artwork.
  * This monster's Japanese name, "Kaka-C" (カカ－Ｃ, ''Kaka-Shī'') is a pun on "''kakashi''" (かかし), the Japanese word for "scarecrow".
