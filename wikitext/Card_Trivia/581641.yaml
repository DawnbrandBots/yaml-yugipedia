title: Card Trivia:Elemental HERO Grandmerge
wikitext: |-
  {{Navigation}}

  * This monster's costume is based on parts of the costumes of "[[Elemental HERO Sparkman]]", "[[Elemental HERO Burstinatrix]]", "[[Elemental HERO Clayman]]", and "[[Elemental HERO Avian]]", the original Normal "[[Elemental HERO]]" monsters.
  ** Fittingly, all of these monsters can be used as [[Fusion Material]]s for this card, as they are "[[HERO]]" [[Normal Monster]]s.
  * The position of this monster's front hand is a reference to the gesture that [[Jaden Yuki]] made the end of a Duel in the ''[[Yu-Gi-Oh! GX]]'' anime while saying his catchphrase ("Gotcha! That was a fun Duel" in the Japanese version and "That's game" in the English version).
  * This monster has the lowest [[original ATK]] (0) of all the "[[Elemental HERO]]" [[Fusion Monster]]s in the ''[[OCG]]''/''[[TCG]]''.
