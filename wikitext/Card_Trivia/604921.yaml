title: Card Trivia:Simorgh of Darkness
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Simorgh Onslaught]]", "[[Simorgh Repulsion]]", and "[[Simorgh Sky Battle]]".
  * This monster is the upgraded form of "[[Dark Simorgh]]", and by extension, the [[DARK]] counterpart of "[[Simorgh, Lord of the Storm]]" (the upgraded form of "[[Simorgh, Bird of Divinity]]", whom "Dark Simorgh" is a DARK counterpart of).
  * Visually, "[[Simorgh, Bird of Sovereignty]]" is a combination of this monster and "Simorgh, Lord of the Storm".
