title: 'Card Trivia:Number 104: Masquerade'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster appears in the artwork of "[[Glorious Numbers]]".
  * The number "104" is located on the right side of this monster's mask.
  * This is the [[signature card]] of [[Vector]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This card's name references Vector's role in the ''Yu-Gi-Oh! ZEXAL'' anime, where he "masqueraded" as "Ray Shadows", an ally of [[Yuma Tsukumo]] in order to achieve his goals.
  *** This card's Japanese name, "Masquerade Magician - Shining", makes it a member of the "[[Shining]]" [[archetype]], a series of [[LIGHT]] monsters used by Vector while disguising himself as Ray Shadows.
  **** This card's "[[Number C]]" counterpart is "[[Number C104: Umbral Horror Masquerade]]", a member of the "[[Umbral Horror]]" archetype, a series of [[DARK]] monsters used by Vector, which he Summons after revealing himself as the true identity of Ray Shadows.
  * The three rings this monster holds are [[wikipedia:Chinese linking rings|Chinese linking rings]], a classic illusion magic used by novice [[wikipedia:Magic (illusion)|magician]]s, which further reflects this card's Japanese name.
  ** The Chinese linking rings are part of the magician's act, which often involves deceiving and misdirecting the audience. This references how Vector deceived Yuma while under the guise of Ray Shadows, and misdirected him by using a clone to capture Ray and lure him to "[[Sargasso the D.D. Battlefield (anime)|Sargasso the D.D. Battlefield]]".
  * This monster's [[neutral form]] resembles a [[wikipedia:Fabergé egg|Fabergé egg]] with a golden left hand on top of it.
  * This is the only "[[Number 10X]]" monster that is never used in more than one [[Duel]].
