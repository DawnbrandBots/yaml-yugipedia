title: Card Trivia:Vortex the Whirlwind
wikitext: |-
  {{Navigation}}

  * This is the third Sneak Preview card to be a [[Synchro Monster]], as well as the 5th [[TCG]]-only [[Synchro Monster]] to released.
  * This card has a similar name to "[[Blackwing - Gale the Whirlwind]]".
  ** In-fact, this card's name is similar to that of a "[[Blackwing]]" name in general, taking off the "Blackwing -" part. The way it supports and Synchro Summons with [[Winged Beast]] monsters supports this fact.
  ** Konami's official strategy site actually jokes about this resemblance in an article about this monster; the card's picture contains the caption, "I tried out for the "Blackwings" and all I got was a funny hat with googly eyes."
  * This card shares similar traits to that of certain "Blackwing" monsters, such as a kunai chain like "[[Blackwing - Fane the Steel Chain]]", similar wing structure like "[[Blackwing - Sirocco the Dawn]]", arms like "[[Blackwing - Shura the Blue Flame]]", similar female traits to "[[Blackwing - Brisote the Tailwind]]" and of course feathers in the card artwork like the "Blackwing" [[Synchro Monsters]].
  * This is the first [[Winged Beast]]-[[Type]] [[Synchro Monster]] that doesn't belong to an archetype.
  * This monster appears in the artwork of "[[Cattle Call]]".
