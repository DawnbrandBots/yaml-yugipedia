title: Card Trivia:High Priestess of Prophecy
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Tarot|Tarot]] card, [[wikipedia:The High Priestess|The High Priestess]], the second of the [[wikipedia:Major Arcana|Major Arcana]].
  ** This card's Japanese name comes from the Swiss [[wikipedia:Troccas|Troccas]] tarot deck, which uses Juno or Junon in place of The High Priestess card.
  ** Another monster, "[[Lady of Faith]]", is also based on The High Priestess tarot card.
  * This card has the same [[Type]], [[ATK]], [[DEF]] and [[Level]] as "[[Dark Magician]]".
  ** Also, this card is the opposite gender and [[Attribute]] of "Dark Magician" and is an [[Effect Monster]], while "Dark Magician" is a [[Normal Monster]].
  * This is one of the [[cover card]]s of ''[[Judgment of the Light: Deluxe Edition]]''.
  * "[[Spellbook of Wisdom]]" appears in this card's artwork, and vice versa.
  * This card could be considered a counterpart of "[[Prophecy Destroyer]]"; both cards can be [[Special Summon]]ed if at least 3 "[[Spellbook]]" cards are in the right place ("High Priestess" requires them to be revealed in the hand, and "Destroyer" requires them to be [[banish]]ed from the [[Graveyard]]). Both cards also have 2500 ATK.
