title: Card Trivia:Big Belly Knight
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Triple-Belly Knight", is based on the fact that people with obesity have bellies with three folds of fat, which is featured in this monster's design.
  * This monster is the subject of a wordplay gag in {{chapter|ZEXAL|014|ref}} where [[Astral (manga)|Astral]] suggests to [[Yuma Tsukumo (manga)|Yuma Tsukumo]] that they use their own [[Thunder]] monster against [[Thunder Spark]], before urging Yuma to play this monster. This is a pun on this monster's Japanese name, "''Sandanbara Naito''" (三段腹ナイト) which contains "三段" (''sandan,'' meaning "three-stage"), which is homophonic for "サンダー" (pronounced "''Sanda''", the Japanese name of the "[[hunder]]" used by Thunder Spark). While the gag remains in the English version of the manga, the wordplay behind the pun is lost in translation.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from the aforementioned chapter of the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, specifically from the panel showing [[Knight Hunger Monger|this monster]] being Summoned.
