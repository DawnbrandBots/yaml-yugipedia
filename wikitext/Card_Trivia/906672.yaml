title: Card Trivia:Straynge Cat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Careless Twin Magic]]", "[[Cat-trois Choice]]", "[[Magical Sevens Fusion]]", "[[Magical Switch]]", "[[Miracle Copy Camera]]", "[[Recovery Force]]", "[[Scaredy Cats]]", "[[Straynge Cat Festival]]", "[[Straynge Cat Jealousy]]", "[[Straynge Cat Mantle]]", "[[Straynge Cat Signal]]", "[[Straynge Gathering]]", "[[Straynge Magical Pierce!!!]]", and "[[Widening Whisper]]".
  ** A balloon shaped like this monster appears in both artworks of "[[Balloon Butier]]".
  ** The ring in this card's artwork appears in the artworks of "[[Furtunate Cat]]", "[[Mr. Alchemy]]", and "[[Rolling x Rolling]]".
  * This card appears in the artwork of "[[High and Road]]".
