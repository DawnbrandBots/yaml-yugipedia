title: Card Trivia:Nopenguin
wikitext: |-
  {{Navigation}}

  * This card's name is a pun on the Japanese word ''kōtei'', which can be written as either 皇帝 ("emperor", as in the name of the [[wikipedia:emperor penguin|emperor penguin]]) or 肯定 ("affirmation"): the 否定 (''Hitei'') in this card's name literally means the opposite of the latter, "denial".
