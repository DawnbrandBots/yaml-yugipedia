title: Card Trivia:Armed Samurai - Ben Kei
wikitext: |-
  {{Navigation}}

  * This card appears in the artwork of "[[Monk Halberd]]" and "[[Supreme Disdain]]".
  * This card is based on [[wikipedia:Benkei|Benkei]], a Japanese warrior monk who went on a personal quest to obtain one thousand swords.
  ** This card's ''[[OCG]]'' artwork depicts this monster stuck with arrows, referencing Benkei's death, where he was killed after being pierced by arrows but died standing up.
  *** In {{episode|GX|086|ref}}, this monster was [[Special Summon]]ed by the effect of "[[Kabuki Stage - Big Bridge]]", referencing the bridge of the castle ''[[wikipedia:Battle of Koromo River|Koromogawa no tate]]'' where Benkei made his last stand against an army of soldiers while protecting his lord, [[wikipedia:Minamoto no Yoshitsune|Minamoto no Yoshitsune]].
  ** This card's [[Equip Card]] [[support]] effect further references Benkei's personal quest to obtain one thousand swords, while its multiple attack effect further references Benkei's final stand on the bridge of the castle ''Koromogawa no tate'' where he easily killed 300 skilled warriors of the opposing army.
  * The German "[[Flaming Eternity]]" version of this card has a typo in its effect text. The word '''ausgerüstet''' is mistyped as '''ausgerütet'''.
  * The "Ben Kei OTK" received renewed attention in July 2022, due to the deck seeing large competitive success in [[Master Duel]]'s [[Extra Zero Festival]].
