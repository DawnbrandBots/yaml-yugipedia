title: Card Trivia:Comic Field
wikitext: |-
  {{Navigation}}

  * This card's effect was built in to the real-life version of "[[Comics Hero King Arthur]]"; this card prevents its destruction by battle and gives it 500 ATK, then the [[Comics Hero King Arthur (anime)|anime version]] would detach an Xyz Material to inflict damage equal to that change in ATK. This would be equivalent to its real effect, detaching an Xyz Material to prevent its destruction by battle, give it 500 ATK, then inflict "that change in ATK" (500 damage).
