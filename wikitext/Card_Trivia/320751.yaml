title: Card Trivia:Nekroz of Decisive Armor
wikitext: |-
  {{Navigation}}

  * "[[Nekroz Mirror]]" appears in this card's artwork on this monster's chest, the same as his previous form.
  * This monster is "[[Exa, Enforcer of the Nekroz]]" wearing armor based on "[[Ally of Justice Decisive Armor]]".
  ** This card has the same [[Level]] and [[ATK]] as "[[Ally of Justice Decisive Armor]]" and has a similar effect that also deals with [[destroy]]ing a [[Set]] card.
  * This card has the highest [[ATK]] of all [[WATER]] monsters (3300), tied with "[[Nekroz of Areadbhair]]" and "[[White Aura Bihamut]]".
