title: Card Trivia:Bujin Regalia - The Mirror
wikitext: |-
  {{Navigation}}

  * "[[Bujingi Crow]]" appears in this card's artwork.
  ** This card is based on the [[wikipedia:Yata no Kagami|Yata no Kagami]] - literally, "Mirror of Yata", one of the three Imperial Regalia of Japan, also a reference to "Bujingi Crow" ("Bujingi Yata" in Japanese).
  ** Similarly to its "Bujin Regalia" [[Bujin Regalia - The Sword|counterpart]], "Crow" is transforming itself into its item form: a mirror.
