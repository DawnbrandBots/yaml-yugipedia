title: Card Trivia:Raidraptor - Retrofit Lanius
wikitext: |-
  {{Navigation}}

  * Along with the anime version of "[[Cipher Twin Raptor (anime)|Cipher Twin Raptor]]", this monster's effect to [[Treated as multiple Xyz Materials|treat itself as two materials]] for the [[Xyz Summon]] of an [[Xyz Monster]] references the fairly commonplace effect utilized throughout the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** Fittingly, both monsters are the only ones to feature this effect in the ''[[Yu-Gi-Oh! ARC-V]]'' anime. Also, both monsters were each used by [[Shay Obsidian]] and [[Kite Tenjo (ARC-V)|Kite Tenjo]], who come from the [[Xyz Dimension]], which features references to the elements featured in the ''Yu-Gi-Oh! ZEXAL'' anime.
