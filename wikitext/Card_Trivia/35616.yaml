title: Card Trivia:Magical Android
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Psychic Rejuvenation]]".
  * This is the first [[Synchro Monster]] to be printed with a [[Common]] [[rarity]] in a [[Core Booster|Core Booster pack]] (e.g. ''[[The Duelist Genesis]]'') in the ''[[OCG]]''; however, it was printed as a [[Super Rare]] monster in the ''[[TCG]]'', instead.
  ** The first Synchro Monster to be printed with a Common rarity in the ''TCG'' is "[[Laval Dual Slasher]]" in the international release of the ''[[Photon Shockwave]]'' Core Booster pack.
