title: Card Trivia:Snake-Eyes Poplar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Azamina Determination]]", "[[Azamina Aphes]]", "[[Dramatic Snake-Eye Chase]]", "[[Goblin Biker Grand Entrance]]", "[[Sinful Spoils of Slumber - Morrian]]", "[[Sinful Spoils Struggle]]", "[[Sinful Spoils Subdual]]", and "[[Witch of the White Forest]]".
  ** A poster of "[[Sinful Spoils of Subversion - Snake-Eye]]" appears in this card's artwork.
  * This monster is named after ''[[wikipedia:Populus|Populus]]'', a genus of deciduous trees native to most of the Northern Hemisphere.
  * This monster is a reborn form of "[[Snake-Eyes Flamberge Dragon]]" following its defeat by "[[Diabellstar the Black Witch]]".
  * This monster has two combined forms with "Diabellstar the Black Witch" ("[[Diabellstar Vengeance]]"): "[[Snake-Eyes Diabellstar]]" and "[[Snake-Eyes Vengeance Dragon]]".
  * This monster has a combined form with "[[Diabellze the Original Sinkeeper]]": "[[Snake-Eyes Doomed Dragon]]".
  * This monster has a "[[White Forest]]" [[Tuner Synchro Monster]] form: "[[Poplar of the White Forest]]".
  * According to its concept art, this monster originally had a red coloration. Its body turned pink after consuming the magical energy of "Diabellstar".
