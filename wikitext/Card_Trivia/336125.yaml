title: Card Trivia:Berlineth the Firestorm Vassal
wikitext: |-
  {{Navigation}}

  * This monster has a [[Monarch]] [[counterpart]]: "[[Thestalos the Firestorm Monarch]]".
  ** This monster's name is derived from the [[wikipedia:Ferrari Berlinetta Boxer|Ferrari Berlinetta Boxer]], a series of sports cars produced by Italian sports car manufacturer, [[wikipedia:Ferrari|Ferrari]]. The Ferrari Berlinetta Boxer was later succeeded by the [[wikipedia:Ferrari Testarossa|Ferrari Testarossa]], which serves as the basis of the Japanese name of "Thestalos" (''Tesutarosu'').
