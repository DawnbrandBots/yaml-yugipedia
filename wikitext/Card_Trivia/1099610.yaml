title: Card Trivia:D/D Count Surveyor
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' [[Pendulum Effect]] is an alteration of its Pendulum Effect in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga, which treats three of the opponent's monsters as a single monster and combining their [[ATK]]/[[DEF]]. In the ''OCG''/''TCG'', this monster's Pendulum Effect [[target]]s three monsters the opponent [[control]]s with the same [[Attribute]] or [[Type]], [[Tribute]]s two of them, and has the third monster gain their total ATK/DEF.
  ** This monster's ''OCG''/''TCG'' Pendulum effect [[activate]]s only when the player [[Pendulum Summon]]s a "[[D/D/D]]" monster. This references a scene in {{chapter|ARC-V|015|ref}}, in which [[Reiji Akaba (manga)|Reiji Akaba]] activates [[D/D Count Surveyor (manga)|this monster]]'s Pendulum Effect immediately after Pendulum Summoning "[[D/D/D Supersight King Zero Maxwell (manga)|D/D/D Supersight King Zero Maxwell]]", combining three copies of [[Yuya Sakaki (manga)|Yuya Sakaki]]'s  "[[Performapal Card Gardna (manga)|Performapal Card Gardna]]" into one monster, which was then attacked and [[destroy]]ed by "Zero Maxwell".
