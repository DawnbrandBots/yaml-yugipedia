title: Card Trivia:Ancient Warriors Oath - Double Dragon Lords
wikitext: |-
  {{Navigation}}

  * "[[Ancient Warriors - Virtuous Liu Xuan]]" and "[[Ancient Warriors - Ingenious Zhuge Kong]]" appear in this card's artwork.
  * This card is a reference to the team-up between [[wikipedia:Liu Bei|Liu Bei]], founder of the [[wikipedia:Shu Han|Shu]] state (Therefore considered a "Dragon Lord") and [[wikipedia:Zhuge Liang|Zhuge Liang]], the "Crouching Dragon", reknown strategist, prime minister and regent of said state.
