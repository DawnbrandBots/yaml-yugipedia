title: Card Trivia:Granel Attack 3
wikitext: |-
  {{Navigation}}

  * The number "3" in this card's name represents its [[Level]] (3).
  * This monster resembles a [[wikipedia:Piranha|piranha]], keeping in relation with the "aquatic animal" theme of the "[[Granel]]" [[archetype]].
  * This card has the highest [[original ATK]] (1800) of the "Granel" monsters.
  * This card is the only upgraded "[[Meklord]]" part that does not have an upgraded or a different effect compared to its predecessor, that being "[[Granel Attack]]".
