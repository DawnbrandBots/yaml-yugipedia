title: Card Trivia:D/D/D Deviser King Deus Machinex
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Creation Pack 09]]''.
  * This monster's name is derived from ''deus ex machina'', the Latin term meaning "God from the machine", which refers to a standard plot device in fiction where a difficult problem is solved in an unexpected, sudden manner.
  ** This is reflected in this monster's alternative [[Xyz Summon]]ing [[Summoning condition|condition]], which requires a "[[D/D/D]]" monster the player [[control]]s as [[material]], regardless of its [[card type]]. This Summoning condition works in synergy with "[[D/D/D Headhunt]]" (which also debuted in ''[[Battle of Chaos]]''), which can treat the opponent's monster it takes control of as a "D/D/D" monster if it was [[Special Summon]]ed from the [[Extra Deck]].
  * This monster's Japanese title, "Amnesty King" (赦俿王, ''Shachiō'') is a homophone to the Japanese term for "company president"/"manager"  (社長, ''Shachō'').
  ** This, along with the release of "[[Dark Contract with Patent License]]" (which references the [[Leo Corporation]] building) and "D/D/D Headhunt" (which is based on the recruitment strategy in business) in ''Battle of Chaos'' reference the role of [[Declan Akaba]] (who uses the "[[D/D]]" [[archetype]]) as the CEO of Leo Corporation in the ''[[Yu-Gi-Oh! ARC-V]]'' anime, where he succeeded [[Leo Akaba|his father]] after his resignation and disappearance.
  * This monster has a female [[counterpart]]: "[[D/D/D Zero Doom Queen Machinex]]".
  * This monster has the highest [[Rank]] (10) of all [[Xyz Pendulum Monster]]s.
  * This is the only "D/D/D" Extra Deck [[Pendulum Monster]] to not be an upgraded form of "[[D/D/D Doom King Armageddon]]".
