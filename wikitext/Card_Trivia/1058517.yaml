title: Card Trivia:Surfacing Big Jaws
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Aqua Jet Surface]]".
  * This monster is a retrained [[counterpart]] of "[[Big Jaws]]".
  ** The first portion of this monster's name is based on "[[Surface]]", a [[Spell Card]] used by [[Reginald Kastle|Reginald "Shark" Kastle]] to [[Special Summon]] "Big Jaws" from his [[Graveyard]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime and [[Yu-Gi-Oh! ZEXAL (manga)|manga]].
  ** This monster's Special Summoning effect is based on the anime effect of "[[Big Jaws (anime)|Big Jaws]]", which can be Special Summoned during the turn a Spell Card is [[activate]]d.
