title: Card Trivia:Albion the Sanctifire Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Brightest, Blazing, Branded King]]".
  * This monster is an [[Albaz Dragon|empowered form]] of "[[Albaz the Ashen]]" ("[[Fallen of Albaz]]"), as well as an upgraded form of "[[Albion the Branded Dragon]]" fused with "[[Incredible Ecclesia, the Virtuous]]". The latter is referenced in the requirement of 1 LIGHT Spellcaster monster as the second [[Fusion Material]] for this monster, which "Ecclesia" is.
  ** This monster is also a counterpart to "[[Lubellion the Searing Dragon]]".
  *** Both monsters are [[LIGHT]] [[Level]] 8 [[Fusion Monster]]s.
  *** Both monsters feature an inverted [[original ATK and DEF]]: This monster has 3000 [[ATK]]/2500 [[DEF]], while while "Lubellion" has 2500 ATK/3000 DEF.
  *** This monster's Japanese name features the kanji 「真炎」 (''Shin'en'', "True Flame"), which is a homophone of 「深淵」 ("Abyss"), as well as 「神炎」 ("God Flame") in the Japanese name of "Lubellion the Searing Dragon".
  ** This monster's horn is the icy dagger of "Albaz the Ashen".
  * The requirement of two monsters in the [[Extra Monster Zone]]s and two in the central [[Main Monster Zone]]s for this monster's effect is likely due to the shape they form, which can be interpreted as the diamond shape of the dimensional "holes" central to the Abyss storyline (which are also a core feature of the "[[Dogmatika]]" and "[[Despia]]" design motifs), as well as the interlocking rings representing the relationships of the "Zoas" in [[wikipedia:William Blake's mythology|William Blake's mythology]] (which appears to be the inspiration for the Abyss storyline).
