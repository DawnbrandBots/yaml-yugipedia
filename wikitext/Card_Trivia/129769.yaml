title: Card Trivia:Stardust Mirage
wikitext: |-
  {{Navigation}}

  * An ice sculpture of "[[Stardust Dragon]]" appears in this card's artwork.
  * This card's name is based on the [[Attack and effect names in Yu-Gi-Oh! 5D's|attack name]] of "[[Shooting Star Dragon (anime)|Shooting Star Dragon]]" in the original Japanese version of the ''[[Yu-Gi-Oh! 5D's]]'' anime.
