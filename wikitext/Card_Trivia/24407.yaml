title: Card Trivia:Crystal Skull
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Animation Chronicle 2022]]''.
  * This monster appears in the artwork of "[[Triangle O]]".
  * This monster is based on the [[wikipedia:Crystal skull|crystal skulls]], a series of human skull hardstone carvings made of clear or milky white quartz (also called "rock crystal") which were found in the Americas and believed to be of pre-Columbian origin; however, the crystal skulls are believed to be hoaxes.
  * This monster's ''[[OCG]]''/''[[TCG]]'' effect to switch itself from [[Attack Position]] to [[Defense Position]] is based on how this monster was [[Normal Summon]]ed in Defense Position in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
