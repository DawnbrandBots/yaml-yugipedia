title: Card Trivia:Bujin Regalia - The Sword
wikitext: |-
  {{Navigation}}

  * "[[Bujingi Quilin]]" appears in this card's artwork, transforming itself into a sword and thereby referencing this card's name.
  ** This card is based on the [[wikipedia:Kusanagi|Ame-no-Murakumo-no-Tsurugi]] - literally, "Sword of Gathering Clouds of Heaven", one of the three Imperial Regalia of Japan, also a refence to "Bujingi Quilin" ("Bujngi Murakumo" in Japanese).
