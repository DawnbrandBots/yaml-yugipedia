title: Card Trivia:Skilled Brown Magician
wikitext: |-
  {{Navigation}}

  * Four [[Spell Counter]]s appear in this card's artwork.
  * This monster is designed to [[support]] "[[Kuriboh]]", whom its armor is based on.
  ** This monster's Japanese name, "Skilled Chestnut Magician" references the Japanese name of "Kuriboh": "Chestnut Boy".
  ** This monster shares the same [[original ATK and DEF]] (300/200) as "Kuriboh".
  * This is the only [[Skilled Magician]] monster to not feature another [[counterpart]].
  ** It is also the only Skilled Magician monster whose effect does not require it to [[Tribute]] itself with three [[Spell Counter]]s to [[activate]].
