title: Card Trivia:Poeltis de Nouvelles
wikitext: |-
  {{Navigation}}

  * This monster's name is a portmanteau of the demon [[wikipedia:Botis|Botis]] and Poêlé, French for pan-fried foods.
  ** "Botis" is described as appearing as a serpent before revealing itself as a sword-bearing humanoid with viper-like features, which this monster appears to have. His abilities include clairvoyance and providing knowledge of events past, present, and especially future (likely represented in this monster's effect to blindly draw one card upon [[Special Summon]].
