title: Card Trivia:Thumbs Down
wikitext: |-
  {{Navigation|mode=nongame}}

  * "[[Gladiator Beast Andal]]" and "[[Gladiator Beast Torax]]" appear in this card's artwork.
  * ''[[wikipedia:Pollice verso|Pollice verso]]'' is a Latin phrase that refers to the [[wikipedia:Thumbs signal|thumbs signal]] used by Ancient Roman crowds to pass judgment on a defeated gladiator.
