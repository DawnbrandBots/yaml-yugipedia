title: Card Trivia:Left-Hand Shark
wikitext: |-
  {{Navigation}}

  * This monster features five fins distributed as if they were fingers, resembling a left hand.
  ** This physical trait is shared with its opposite [[counterpart]], "[[Right-Hand Shark]]".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|019|ref}}, specifically from the panel showing [[Left-Hand Shark (manga)|this monster]] being Summoned.
