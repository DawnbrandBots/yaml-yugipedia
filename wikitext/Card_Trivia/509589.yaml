title: Card Trivia:Cyber Esper
wikitext: |-
  {{Navigation}}

  * This monster bears a resemblance to "[[Cyber Shadow Gardna]]".
  ** Both cards are used by [[Chancellor Sheppard]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  * This card's name and effect is a reference to [[wikipedia:Extrasensory perception|extrasensory perception]], a "sixth sense" which enables anyone gifted with it to glimpse into the future or view obscured objects using their heightened cognitive abilities.
