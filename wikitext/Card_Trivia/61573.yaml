title: Card Trivia:Kinka-byo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Spiritual Entanglement]]".
  * This monster is based on the ''Kinkabyō'', or the "[https://ja.wikipedia.org/wiki/%E9%87%91%E8%8F%AF%E7%8C%AB Jinhua Cat]", a mythical cat from the folklore of the Chinese city of [[wikipedia:Jinhua|Jinhua]] who can absorb the power of the moon and transform into a monster. This monster's French ''[[TCG]]'' name is ''Chat Lunaire Kinka'' ("Kinka Lunar Cat"), which keeps in relation to this folklore.
  * This is the first and currently only [[Level 1]] [[Spirit monster]].
