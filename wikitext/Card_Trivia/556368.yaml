title: Card Trivia:Cyber Dragon Herz
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Cyber Revsystem]]", being clad in the armor of "[[Cyber Dragon]]" to create "[[Cyber Dragon Sieger]]".
  * This monster's name is based on "''herz''", the German word for "heart".
  ** This is one of several "[[Cyber Dragon (archetype)|Cyber Dragon]]" monsters that features German words in their names, referencing how in the original Japanese version of the ''[[Yu-Gi-Oh! GX]]'' anime and the [[Yu-Gi-Oh! GX (manga)|manga]], [[Zane Truesdale]] (who uses the "[[Cyber]]" [[archetype]]) was referred to by the title of "Kaiser", the German word for "emperor".
  ** "Herz" is also a homophone of "[[wikipedia:hertz|hertz]]", a unit of measure for cyclical actions which is defined as how many times an event occurs per second, which is used to measure heartbeats.
  * This monster is a counterpart to "[[Cyber Dragon Core]]", serving as an alternative in the process to create the "Cyber Dragons".
  ** Similar to how this monster is a part of "Cyber Dragon Sieger", "Cyber Dragon Core" is a part of "Cyber Dragon", as depicted in the artwork of "[[Cyber Repair Plant]]".
