title: Card Trivia:Half Life
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Spear Dragon]]" appears in this card's artwork.
  * A [[wikipedia:Half-life|half-life]] is the amount of time it takes for an element to decay. After one full half-life, 50% remains of the original quantity; 25% remains after two half-lives, etc.
  ** Specifically, this card is a reference to the half-life of C-14 atoms (which is 5730 years), as it is used in [[wikipedia:Radiocarbon dating|carbon dating]] archaeological items, keeping in relation with the archaeological theme of [[Jim Crocodile Cook]]'s [[Deck]].
