  {{Navigation}}

  * "[[Battle Ox]]"/"[[Enraged Battle Ox]]" and "[[Watapon]]" appear in this card's artwork.
  * This card is based on a [[wikipedia:Fairy ring|pixie circle]], a naturally occurring ring of mushrooms, which is said to have been caused by dancing fairies and pixies in [[wikipedia:Western Europe|Western European]] folklore.
