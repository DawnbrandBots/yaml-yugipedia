title: 'Card Trivia:Number 22: Zombiestein'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This monster appears in the artworks of "[[Number Karma]]" and "[[Spirit Xyz Spark]]".
  * The number "22" appears on the left side of this monster's shawl.
  * This monster is based on the [[wikipedia:Frankenstein's monster|Frankenstein's monster]] and possibly a [[wikipedia:Ken (doll)|Ken doll]].
  ** This monster's [[manga-only]] effect to not attack [[Gender|female]] monsters is a reference to the behavior of the Frankenstein's monster in ''[[wikipedia:Frankenstein|Frankenstein]]'', where he asked his creator, [[wikipedia:Victor Frankenstein|Victor Frankenstein]], to make him a female counterpart so he would not be lonely after he was rejected by the humans around him for his appearance.
  ** This monster's name ("Zombiestein"; {{Ruby|不|フ}}{{Ruby|乱|ラン}}{{Ruby|健|ケン}} ''Furan Ken'', "Franken") is similar to "[[Cyber-Stein]]" (デビル・フランケン ''Debiru Furanken'').
  *** The kanji 「不乱健」 (''Furanken'') in this monster's base Japanese name can be translated as "Un-Rebelling Strength", which reflects its muscular physique and its [[original ATK]] (4500).
  * This is the first [[Zombie]] [[Xyz Monster]], as well as the first [[Nomi]] Xyz Monster.
  * This monster has the highest original ATK (4500) of all Zombie monsters.
  ** This monster also has the highest original [[ATK]] of all "[[Number]]" monsters (tied with "[[Number C107: Neo Galaxy-Eyes Tachyon Dragon]]") and [[Rank 8]] monsters (tied with "[[Neo Galaxy-Eyes Photon Dragon]]" and "[[Neo Galaxy-Eyes Photon Dragon - Photon Howling]]"").
  * This is the first "Number" monster in the ''[[OCG]]''/''[[TCG]]'' to require monsters of a specific [[Attribute]] as [[Xyz Material]]s.
  ** However, "[[Number 96: Dark Mist (anime)|Number 96: Dark Mist]]" was the first "Number" monster in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime to require monsters of a specific Attribute as [[material]]s.
  * This is one of only two cards with a gender-specific effect (in the manga), the other being "[[Shadow of Eyes (anime)|Shadow of Eyes]]".
  * This card's ''OCG''/''TCG'' artwork is taken from {{chapter|ZEXAL|019|ref}}, specifically from the panel showing [[No. 22: Zombiestein (manga)|this monster]] being Summoned.
