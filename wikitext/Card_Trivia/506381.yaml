title: Card Trivia:Shadow of Eyes
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Shadow of Seduction" reflects this card's effect, as it can "seduce" an opponent's [[Set]] monster into switching to [[face-up]] [[Attack Position]].
  ** This card's ''[[TCG]]'' name and effect is likely a reference to [[wikipedia:eyeshadow|eyeshadow]], a type of make-up that is used to attract attention to the wearer.
  ** Fittingly, this reflects this card's owner, [[Mai Valentine]], who uses her beauty and seductive methods to manipulate her targets.
  * This card has an "[[A.I.]]" [[counterpart]]: "[[A.I. Shadow]]".
  * This card has an [[retrain]]ed ''[[Rush Duel]]'' [[counterpart]]: "[[Hysteric Eyes]]".
  * This card (in the [[Yu-Gi-Oh! (manga)|Yu-Gi-Oh! manga]] and [[Yu-Gi-Oh! (anime)|anime]]) is one of two cards to have an effect that targets a specific gender of monster, the other being the manga effect of "[[Number 22: Zombiestein]]".
