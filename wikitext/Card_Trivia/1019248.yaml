title: Card Trivia:A Card Entrusted
wikitext: |-
  {{Navigation}}

  * This [[Skill Card]]'s name is based on the English title of {{chapter|Yu-Gi-Oh!|264|ref}}.
  ** This Skill Card's effect to [[add]] "[[Fiend's Sanctuary]]" at the beginning of the [[Duel]] is based on a scene in the same chapter where [[Seto Kaiba|Kaiba]] entrusts "[[Fiend's Sanctuary (manga)|Fiend's Sanctuary]]" to [[Yami Yugi]] for his Duel against [[Yami Marik]].
