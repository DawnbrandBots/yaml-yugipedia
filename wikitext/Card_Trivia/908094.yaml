title: Card Trivia:Stardust Trail
wikitext: |-
  {{Navigation}}

  * This monster is based on the woman appearing in the artwork of "[[Converging Wishes]]", with her horns, dress, tail, and boots redesigned to resemble "[[Stardust Dragon]]".
  ** The falling stars from the artwork of "Converging Wishes" also appears in this card's artwork, which represent the [[Signer Dragons]] and were color-coded as followed (including as part of the effect of "Converging Wishes"):
  *** Red: "[[Red Dragon Archfiend]]"
  *** Green: "[[Ancient Fairy Dragon]]"
  *** Yellow: "[[Life Stream Dragon]]"
  *** Orange: "[[Black-Winged Dragon]]"
  *** Blue: "[[Stardust Dragon]]"
  *** Violet: "[[Black Rose Dragon]]"
