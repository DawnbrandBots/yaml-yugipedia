title: Card Trivia:Monster Slots
wikitext: |-
  {{Navigation}}

  * In [[wikipedia:Slot machine|slot machines]], if you get three of the same pattern, you win the jackpot. In this card's case, you need to get the same Level to win the "jackpot".
  ** In ''[[Yu-Gi-Oh! ZEXAL]]'', this card projects 3 slots: the first - the monster you control; the second - the monster you banished from your Graveyard; and the third - the card you draw.
