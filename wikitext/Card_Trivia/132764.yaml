title: Card Trivia:Scrap Twin Dragon
wikitext: |-
  {{Navigation}}

  * This monster is an [[Card evolutions|upgraded]] two-headed form of "[[Scrap Dragon]]".
  ** Its [[Level]] is 1 higher than that of "Scrap Dragon", with 200 more [[original ATK and DEF]].
  ** Its effect is based on the effect of "Scrap Dragon", and can [[target]] one of the opponent's cards for each 'head'.
  ** This card has another upgraded form in the three-headed "[[Atomic Scrap Dragon]]", which follows the trends above.
