  {{Navigation}}
  [[File:Black_Luster_soldier_summoned.png|thumb|right|250|"[[Black Luster Soldier (manga)|Black Luster Soldier]]" emerges from the gateway to chaos.]]

  * This card's artwork depicts "[[Black Luster Soldier - Envoy of the Beginning]]" discarding his armor and becoming "[[Black Luster Soldier - Super Soldier]]".
  * This card's artwork is inspired by the panel in {{chapter|Yu-Gi-Oh! Duelist|59|ref}} showing "[[Black Luster Soldier (manga)|Black Luster Soldier]]" being Summoned.

