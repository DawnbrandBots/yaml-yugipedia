title: Card Trivia:Alien Grey
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[["A" Cell Recombination Device]]" and "[[Brainwashing Beam]]".
  * This monster is based on a [[wikipedia:grey alien|grey alien]], an extraterrestrial being often described as a gray humanoid creature.
  * This monster's head is used as a visual representation of [[A-Counter]]s in various ''Yu-Gi-Oh!'' video games.
