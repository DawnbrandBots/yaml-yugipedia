title: Card Trivia:Tachyon Cloudragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of the Master]]''.
  * This monster is a younger form of "[[Number 107: Galaxy-Eyes Tachyon Dragon]]".
  ** This monster's [[ATK]] and [[DEF]] (300/250) are 1/10 of the [[original ATK and DEF]] of "Galaxy-Eyes Tachyon Dragon".
  * This monster is a "[[Tachyon]]" [[counterpart]] of "[[Galaxy-Eyes Cloudragon]]".
  ** However, this monster's [[Level]] is 4, while the Level of "Galaxy-Eyes Cloudragon" is 1.
