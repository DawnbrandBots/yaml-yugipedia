title: Card Trivia:Evilswarm Exciton Knight
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Verzbuth" (''Veruzubyūto''), is based on [[wikipedia:Beelzebub|Beelzebub]], the patron deity of the [[wikipedia:Philistines|Philistine]] city of [[wikipedia:Ekron|Ekron]] who was later adopted into [[wikipedia:Christian theology|Christian theology]] as a major demon.
  ** This monster's appearance references how Beelzebub is also commonly known as the "Lord of the Flies" in the ''[[wikipedia:Dictionnaire Infernal|Dictionnaire Infernal]]''.
  * This monster is the [[LIGHT]] [[counterpart]] of "[[Steelswarm Roach]]" after having joined the side of good, as depicted in the artwork of "[[Sacred Serpent's Wake]]".
  ** This monster's title is based on an "[[wikipedia:Exciton|exciton]]", an electrically neutral quasiparticle formed by the attraction of an [[wikipedia:Electron|electron]] and an [[wikipedia:Electron hole|electron hole]] via electromagnetism, which exists in condensed matter such as [[wikipedia:Insulator (electricity)|insulators]] and [[wikipedia:Superconductivity|superconductors]].
  *** Excitons are formed by the absorption of photons in superconductive substances, and can transmit energy without also transporting an electrical charge. This reflects how this monster was originally "Steelswarm Roach" (a [[DARK]] monster) before it absorbed light energy to transform into this monster.
  * This monster has a "[[tellarknight]]"/"[[Zefra]]" counterpart: "[[Stellarknight Zefraxciton]]".
  * This monster and "[[Steelswarm Origin]]" are the only "[[lswarm]]" monsters whose [[Attribute]]s are not DARK.
  * This monster's cloak features a black constellation pattern, similar to the ones depicted in the artworks of the [[Main Deck]] "[[Constellar]]" monsters.
