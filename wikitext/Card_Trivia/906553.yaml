title: Card Trivia:Masaki the Legendary Samurai
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Climax Clash]]" and "[[Engage and Strike!]]".
  * This card is the ''[[Rush Duel]]'' [[counterpart]] of "[[Masaki the Legendary Swordsman]]".
  ** This card's Japanese name is a pun on "Jishō" (侍将), written in this card's name as "Samurai General"; the word sounds exactly like another word read as "Jishō" (自称), but with the meaning of "self-proclaimed" or "would-be". The [[flavor text]] of this card is also phrased similarly to that of "Masaki the Legendary Swordsman".
  ** This monster has a croissant on the [[wikipedia:Kabuto|datemono]] of his kabuto, rather than a crescent moon as in the card artwork of "Masaki the Legendary Swordsman".
