title: Card Trivia:Battlewasp - Sachi the Ceremonial Bow
wikitext: |-
  {{Navigation}}

  * This monster is named after a colloquial Japanese word for the [[wikipedia:Bow and arrow|hunting bow]], "''sachiyumi''" ({{Ruby|幸弓|さちゆみ}}).
  ** The kanji 「{{Ruby|神|しん}}{{Ruby|事|じ}}{{Ruby|弓|きゅう}}」 (''Shinjikyū'', lit. "Ritual Bow") in this monster's Japanese name references [[Shinji Weber]], who used the "[[Battlewasp]]" [[archetype]] in the ''[[Yu-Gi-Oh! ARC-V]]'' anime. The design of this monster's helmet also resembles Shinji's hairstyle, while its armor shares the same color scheme as Shinji's hair.
