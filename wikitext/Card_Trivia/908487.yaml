title: Card Trivia:Abyss Actor - Liberty Dramatist
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Abyss Actors' Dress Rehearsal]]".
  * This monster's name is based on a [[wikipedia:Playwright|playwright]], a term used in [[wikipedia:acting|acting]] to describe someone who takes the "liberty" of writing "dramas", which is reflected in its [[Monster Effect]] to have the opponent [[Set]] an "[[Abyss Script]]" card to the player's [[field]], which are based on theatrical scripts.
