title: Card Trivia:Hieratic Sun Dragon Overlord of Heliopolis
wikitext: |-
  {{Navigation}}

  * This card's Japanese name comes from the theme of the "[[Hieratic]]" archetype, the [[wikipedia:Ennead|Ennead]], while its English name comes from the Ancient Egyptian city of [[wikipedia:Heliopolis (Ancient Egypt)|Heliopolis]].
  * While various "Hieratic" monsters have either the [[wikipedia:sun|sun]] or [[wikipedia:moon|moon]] in their backgrounds, this card has an [[wikipedia:eclipse|eclipse]] instead.
  * This monster may be based off the Egyptian sun god [[wikipedia:Ra|Ra]], as Heliopolis was the cult center for the deity.
  ** This monster bears a resemblance to a weaker version of "[[The Winged Dragon of Ra]]".
  * This is a [[cover card]] of the ''[[Collectible Tins 2012 Wave 2]]''.
  * This monster seems to be the unsealed form of "[[Hieratic Seal of the Sun Dragon Overlord]]".
  * This monster appears in "[[Hieratic Seal of Supremacy]]" and "[[Hieratic Seal From the Ashes]]".
  * This card bears many similarities to "[[Thunder End Dragon]]": [[Rank 8 Monster Cards|Rank 8]] [[LIGHT]] [[Dragon]]-[[Type]] [[Xyz Monster]]s with 3000 ATK and an effect that can destroy multiple cards. Both also require 2 Xyz Materials for an [[Xyz Summon]].
  * The design for the artwork is very similar to [[W:c:nanoha:Voltaire|Voltaire]], a dragon summon from the ''[[wikipedia:Magical Girl Lyrical Nanoha Strikers|Magical Girl Lyrical Nanoha StrikerS]]'' series.
  * This monster's design and pose resemble those of "[[The Creator]]".
