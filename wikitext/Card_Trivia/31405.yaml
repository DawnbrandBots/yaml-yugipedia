title: Card Trivia:Lineage of Destruction
wikitext: |-
  {{Navigation}}

  * "[[Giant Soldier of Stone]]" and "[[Mystical Elf]]" appear in this card's artwork.
  ** Both cards were used by [[Yugi Muto]] in the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime.
  ** Both cards are commonly played in [[Defense Position]] due to their 2000 [[DEF]].
