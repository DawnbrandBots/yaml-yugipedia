title: Card Trivia:Absolute King Back Jack
wikitext: |-
  {{Navigation}}

  * This monster is based on its owner, [[Jack Atlas (manga)|Jack Atlas]] in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, who holds the title of "king".
  ** This monster's name is likely a pun on "blackjack", "backpack", or the "back of Jack Atlas", which is reflected in this monster's pose.
  ** This monster's backpack is based on the design of Jack's [[Duel Runner]], the [[Phoenix Whirlwind]].
  ** In {{chapter|Yu-Gi-Oh! 5D's - Ride SP2|ref}}, when this monster was [[Summon]]ed, its frontal design features a large letter "A", the first letter of Jack Atlas' last name.
