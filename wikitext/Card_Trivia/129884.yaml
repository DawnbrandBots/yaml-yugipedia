title: Card Trivia:Dragon's Mirror
wikitext: |-
  {{Navigation}}

  * This card has two [[Type]]-specific [[counterpart]]s:
  ** "[[Magicalized Fusion]]" (for [[Spellcaster]]s)
  ** "[[Recycling Plant]]" (for [[Machine]]s).
  * This card's artwork is similar to the artwork of "Magicalized Fusion", which depicts a monster emerging from the mirror, albeit with a mirrored position.
