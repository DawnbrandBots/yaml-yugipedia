title: Card Trivia:Reptia Egg
wikitext: |-
  {{Navigation}}

  * This monster's ''[[OCG]]''/''[[TCG]]'' effect [[support]]ing [[Rock]] and/or [[Reptile]] monsters references the two [[archetype]]s used by different incarnations of Jim Crocodile Cook in the ''Yu-Gi-Oh! GX'' [[Yu-Gi-Oh! GX|anime]] and [[Yu-Gi-Oh! GX (manga)|manga]] that primarily consists of both respective [[Type]]s: "[[Fossil]]" (used by the [[Jim Crocodile Cook|anime incarnation]]) and "[[Alligator]]" (used by the [[Jim Crocodile Cook (manga)|manga incarnation]]).
