title: Card Trivia:Elemental HERO Flame Wingman
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck: Birth of Hero]]'', and is also one of the cover cards of ''[[Speed Duel GX: Duel Academy Box]]''.
  * This monster appears in the artworks of "[[Alternate Fusion]]", "[[Cross-Dimensional Duel]]", "[[Favorite Hero]]", "[[Fusion Tag]]", "[[Hero Ring]]", and "[[Skydive Scorcher]]".
  ** This monster's wing and dragon head arm cannon appear in the artwork of "[[Legacy of a HERO]]".
  *** "[[Winged Kuriboh LV6]]" wears armor based on this monster's wing and dragon head arm cannon.
  * This monster is the [[Fusion Monster|Fusion]] form of "[[Elemental HERO Avian]]" and "[[Elemental HERO Burstinatrix]]".
  * This monster has 5 [[counterpart]]s:
  ** An [[Aster Phoenix]]-based counterpart: "[[Elemental HERO Phoenix Enforcer]]".
  ** An "[[Evil HERO]]" counterpart: "[[Evil HERO Inferno Wing]]".
  ** A ''[[Rush Duel]]'' counterpart: "[[Elemental HERO Burst Wingman]]".
  ** A [[signature move]] counterpart: "[[Elemental HERO Flame Wingman - Infernal Rage]]".
  ** A retrained "[[Favorite]]" counterpart: "[[Favorite HERO Flame Wingman]]".
  * This monster has a "[[Destiny HERO]]" counterpart: "[[Destiny End Dragoon]]".
  ** Both are Fusion Monsters that served as [[signature card]]s of [[Jaden Yuki]] and [[Aster Phoenix]] respectively in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Both have a dragon head-shaped arm cannon, with this monster's arm cannon being on its right arm and the arm cannon of "Destiny End Dragoon" being on its left arm.
  *** "[[Destiny HERO - Plasma]]", the required Fusion Material for "Destiny End Dragoon", also shares this trait with this monster, as its right arm cannon resembles a demonic dragon head.
  ** Both feature an effect that can inflict damage to the opponent equal to the [[destroy]]ed monster's [[ATK]]; however, this monster's effect only [[activate]]s when it destroys a monster in battle, while "Destiny End Dragoon" destroys a monster with its effect, but it prevents the player from conducting their [[Battle Phase]].
  * This is the first "[[Elemental HERO]]" Fusion Monster, as well as the first "[[HERO]]" Fusion Monster.
  ** This monster and "Elemental HERO Burst Wingman" are the first [[Elemental HERO (Rush Duel)|Elemental HERO]] Fusion Monsters to be released in ''Yu-Gi-Oh! Rush Duel''.
  * In multiple instances in the ''Yu-Gi-Oh! GX'' anime, Jaden Yuki has called this card his "favorite".
