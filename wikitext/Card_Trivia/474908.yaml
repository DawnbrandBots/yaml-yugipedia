title: Card Trivia:Dark Tuner Nightmare Hand
wikitext: |-
  {{Navigation}}

  * This is the only [[Dark Tuner monster]] to not feature a black orb in its design.
  * This monster and "[[Dark Tuner Catastrogue]]" are the first "[[Dark Tuner (archetype)|Dark Tuner]]" monsters to be released in the ''[[OCG]]''/''[[TCG]]''.
  * This monster's ''OCG''/''TCG'' pose is based on a scene from {{episode|5D's|034|ref}} where [[Dark Tuner Nightmare Hand (anime)|this monster]] is Summoned.
