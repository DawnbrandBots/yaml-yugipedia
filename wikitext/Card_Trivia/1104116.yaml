title: Card Trivia:Spore the Fairy Seed
wikitext: |-
  {{Navigation}}

  * This monster is a retrained [[counterpart]] of "[[Spore]]".
  ** Both monsters feature an effect that allows them to increase their [[Level]]s.
  ** The expression of the "Spore" in the lower left corner of this card's artwork is based on a scene from {{episode|5D's|078|ref}}, where "Spore" activates its Level-increasing effect, albeit mirrored.
