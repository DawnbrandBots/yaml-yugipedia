title: Card Trivia:Performapal Flip Hippo
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Performapal Big Support]]".
  * This monster is a [[counterpart]] of "[[Performapal Hip Hippo]]" and "[[Performapal Hid Hippo]]".
  ** All three monsters feature a similar Japanese naming scheme which features the word "cover", used as a pun for the Japanese word for "hippo" (カバ ''kaba'').
  *** In this monster's case, its Japanese name, "Allcover" is a portmanteau of the Japanese pronunciation of "allcover" (オールカバー ''Orukabā'') and the Japanese word for "hippo".
  * This is the first "[[Performapal]]" monster to feature spades on its cheeks instead of stars.
