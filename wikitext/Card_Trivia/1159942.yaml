title: Card Trivia:Great Moth Alternative
wikitext: |-
  {{Navigation}}

  * This monster is a [[retrain]]ed ''[[Rush Duel]]'' [[Fusion Monster|Fusion]] [[counterpart]] of "[[Great Moth]]".
  * This monster appears to be based on [https://wikizilla.org/wiki/Mothra_Leo Aqua Mothra] and [https://wikizilla.org/wiki/Mothra_Leo Light Speed Mothra], especially in its bluish appearance and the movement depicted in its artwork, due to the similarities shared between the original "Great Moth" and Mothra.
