title: Card Trivia:Call of Darkness
wikitext: |-
  {{Navigation}}

  * The creature that appears in this card's artwork also appears in the artwork of "[[Call of the Grave]]" (which also specifically counters "[[Monster Reborn]]").
  * This card was originally a [[Normal Trap Card]] in the ''[[OCG]]'', but due to its effect of preventing "Monster Reborn" from being [[activate]]d as long as this card remains [[face-up]] on the [[field]], it was later changed to a [[Continuous Trap Card]].
