title: Card Trivia:Raging Cloudian
wikitext: |-
  {{Navigation}}

  * "[[Cloudian - Eye of the Typhoon]]" appears in this card's artwork.
  ** Its appearance is based on the form it takes [[Yu-Gi-Oh! GX|in the anime]] when it attacks and uses its battle-position-changing effect.
  * This is the only card in the ''[[OCG]]''/''[[TCG]]'' that specifically prevents battle position changes by a card effect.
