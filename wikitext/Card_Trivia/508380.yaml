title: Card Trivia:Cyber Dragon
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Ghosts From the Past: The 2nd Haunting]]'', the ''[[Collectible Tins 2006 Wave 1]]'', ''[[Duelist Saga]]'', ''[[Prismatic Art Collection]]'', ''[[25th Anniversary Tin: Dueling Heroes]]'', and ''[[2-Player Starter Set]]''.
  * This monster appears in the artworks of "[[Attack Reflector Unit]]", "[[Mutamorphosis]]", "[[Cyber Entry]]", "[[Cyber Network]]", "[[Cyber Repair Plant]]", "[[Cyber Rush Fusion]]", "[[Cyberload Fusion]]", "[[Cybernetic Hidden Technology]]", "[[Cybernetic Revolution (card)|Cybernetic Revolution]]", "[[Evolution Burst]]", and "[[Multiple Adapter Unit]]".
  * This card appears in the artwork of "[[Three of a Kind]]" and "[[Tribute Trade]]".
  * This monster is possibly based on the [[wikipedia:Chinese dragon|Chinese dragon]] and on the playable character from [[wikipedia: Saint Dragon|Saint Dragon]].
  * This card's name "Cyber Dragon" is listed in the text of more cards than any other card name in ''[[Yu-Gi-Oh!]]'', being listed on over 30 different cards.
  * This card has several [[counterpart]]s or [[Card evolutions|upgraded]] forms within the "[[Cyber]]" and "[[Cyber Dragon (archetype)|Cyber Dragon]]" archetypes:
  ** "[[Cyber Laser Dragon]]" and "[[Cyber Barrier Dragon]]" as upgraded counterparts, as their [[Summoning condition]]s explicitly mention this card.
  *** In terms of design, "[[Cyber Eltanin]]" could also fit in this category.
  ** "[[Cyber Twin Dragon]]", "[[Cyber End Dragon]]" and "[[Cyber Eternity Dragon]]" as [[Fusion Monster]] counterparts, the two former simply being amalgamations of 2 or 3 copies of this monster.
  ** "[[Chimeratech Overdragon]]", "[[Chimeratech Fortress Dragon]]", "[[Chimeratech Rampage Dragon]]" and "[[Chimeratech Megafleet Dragon]]" as [[DARK]] Fusion counterparts.
  ** "[[Cyber Dragon Nova]]" and "[[Cyber Dragon Infinity]]" as upgraded [[Xyz Monster]] counterparts.
  ** "[[Cyber Dragon Zwei]]", "[[Cyber Dragon Drei]]" and "[[Cyber Dragon Vier]]", whose names are the German words for "Two", "Three" and "Four", and have effects that change their names into "Cyber Dragon", making them watered-down or situational versions of this card.
  ** The design and effects of "[[Proto-Cyber Dragon]]", "[[Cyber Dragon Core]]", "[[Cyber Dragon Herz]]" and "[[Cyber Dragon Nächster]]" imply that they are forerunners to this monster, being gradually transformed into more complex forms.
  *** In terms of general appearance, "[[Cyber Valley]]" could also fit in this category.
  ** "[[Toon Cyber Dragon]]" as a [[Toon]] counterpart.
  ** "[[Cyber Dragon Sieger]]" as an upgraded [[Link Monster]] counterpart.
  ** "[[Cyberdark Wurm]]" as a "[[Cyberdark]]" counterpart.
  ** "[[Revolution Cyber Dragon]]" as a [[retrained]] counterpart.
  * This monster has an "[[Ancient Gear]]" counterpart: "[[Ancient Gear Dragon]]".
  * In ''[[Yu-Gi-Oh! World Championship 2007]]'' and ''[[Yu-Gi-Oh! World Championship 2008]]'', this monster's hologram uses its second ''[[OCG]]''/''[[TCG]]'' artwork.
