title: Card Trivia:Jester Puppet King Pantomime
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This monster's name is based on a [[wikipedia:Pantomime|pantomime]], a dramatic entertainment involving the usage of gestures and motions to convey thoughts and feelings without speech.
  ** One of the more well-known routines in pantomiming is the "mirror routine", where one entertainer copies the actions and motions of another person to near perfection, which reflects this monster's effect to change its [[original ATK]] to the [[ATK]] of an opponent's monster.
  *** Fittingly, in the ''[[Yu-Gi-Oh! 5D's (manga)|Yu-Gi-Oh! 5D's]]'' manga, when this monster uses its effect, its goggles create a brief flash of light before it "mirrors" the ATK and the appearance of the opponent's monster (albeit with a darker color scheme) and retains the eight shiny orbs surrounding it.
  * This is the first and only [[Ritual Monster]] to appear in the ''[[Yu-Gi-Oh! 5D's]]'' media.
  ** Before the airing of {{episode|ZEXAL|122|ref}}, this was also the first Ritual Monster to appear in the ''Yu-Gi-Oh!'' media since the end of the ''[[Yu-Gi-Oh! GX]]'' anime. The last time a Ritual Monster appeared in the media was in {{episode|GX|180|ref}} with the appearance of "[[Black Luster Soldier (anime)|Black Luster Soldier]]", which aired nearly five years before the release of {{chapter|5D's|043|ref}}, in which this monster debuted.
