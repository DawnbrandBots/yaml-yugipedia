title: Card Trivia:Garlandolf, King of Destruction
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Overlay Flash]]".
  * This monster's name and appearance are similar to the villain, Ganondorf, from ''[[wikipedia:The Legend of Zelda|The Legend of Zelda]]'' video games.
  ** This monster's name and armored appearance may also be a reference to the villain Garland from the ''[[wikipedia:Final Fantasy|Final Fantasy]]'' series.
  * This card is a [[counterpart]] of "[[Divine Grace - Northwemko]]".
  ** This card's effect [[destroy]]s monsters, while the effect of "Northwemko" prevents them from being destroyed.
  ** Both cards have opposite names, and the same total [[ATK]] and [[DEF]] (3900).
  * This card has a parallel counterpart: "[[Demise, King of Armageddon]]".
  ** Although both cards destroy monsters with their effects, this card can also gain ATK at the same time, and destroys a more specific [[card type]] on the [[field]].
  * This monster wears the same medallion as the [[Djinn of Rituals]] monsters.
