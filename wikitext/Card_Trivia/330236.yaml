title: Card Trivia:Superheavy Samurai Battleball
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name, "Tama-C" (タマ－Ｃ, ''Tama-Shī'') is a pun on the Japanese word for "soul" (魂, ''tamashī'').
  ** This monster's Japanese name is also a pun on ''tama'' (玉), the Japanese word for "ball", which is reflected in its spherical appearance.
  * This is the second non-[[EARTH]] "Superheavy Samurai" monster, with the first being "[[Superheavy Samurai Soulfire Suit]]".
