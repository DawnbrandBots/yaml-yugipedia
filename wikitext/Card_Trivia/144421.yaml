title: Card Trivia:Loki, Lord of the Aesir
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Loki|Loki]], the Nordic god of mischief in [[wikipedia:Norse mythology|Norse mythology]] who is renowned for his trickery and cunning. In the [[wikipedia:Poetic Edda|Eddic poem]], ''[[wikipedia:Reginsmál|Reginsmál]]'', Loki is depicted with a large nose and a large goatee beard, and wears a small pointed hat, which serve as the basis of this monster's appearance.
  ** The myth of Loki's status as a trickster god is reflected in this monster's effect to [[negate]] and [[destroy]] [[Trap Card]]s, and to [[add]] a Trap Card from the player's [[Graveyard]] to their [[hand]] after being [[Special Summon]]ed by its own effect.
  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this monster had the same [[Attribute]] ([[DIVINE]]) and [[Type]] ([[Divine-Beast]]) as "[[Thor, Lord of the Aesir (anime)|Thor, Lord of the Aesir]]" and "[[Odin, Father of the Aesir (anime)|Odin, Father of the Aesir]]".
  ** In the anime, this monster had the lowest specific [[ATK]] (3300) of all DIVINE monsters.
  ** In the anime, this monster was depicted as the shortest of the three "Aesir" monsters, while "Thor" was the second tallest, and "Odin" was the tallest.
  * This monster has the highest [[original ATK and DEF]] (3300/3000) of all [[Spellcaster]] [[Synchro Monster]]s.
