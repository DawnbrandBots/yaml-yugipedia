title: Card Trivia:Lindorm the Mega Monarch
wikitext: |-
  {{Navigation}}

  * This monster is the [[Counterpart|upgraded]] Mega Monarch form of "[[Lindorm the Dragon Monarch]]".
  * In both formats, this is the first [[Wyrm]] [[Type]] [[Monarch (Rush Duel series)|Monarch]] monster, and the first Mega Monarch monster to be revealed before its base form. 
  * This is the first card revealed in ''[[Yu-Gi-Oh! Rush Duel]]'' that requires no cards in the [[Extra Deck]] to trigger its [[effect]].
