title: Card Trivia:TGX300
wikitext: |-
  {{Navigation}}

  * This card's name reflects its effect to increase the player's monsters' [[ATK]] for each "[[T.G.]]" monster they control.
  ** "TG" stands for "T.G.", the "X" represents the variable number of "T.G." monsters on the field, and "300" represents the 300 ATK gained from this effect.
  *** Additionally, "X" is also a multiplication sign, which also reflects this card's effect of increasing a monster's ATK '''multiplied''' by the number of "T.G." monsters.
