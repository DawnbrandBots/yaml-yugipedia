title: Card Trivia:Silvervine Senri
wikitext: |-
  {{Navigation}}

  * This monster is based on ''[[wikipedia:Actinidia polygama|Matatabi]]'' ("Cat Powder"), and a type of cat ''[[wikipedia:Yōkai|yōkai]]'' that has 2 tails.
  ** This card's Japanese name, 「マタタビ{{Ruby|仙|せん}}{{Ruby|狸|り}}」  (''Matatabi Senri''), is a portmanteau of 「猫又」 (''[[wikipedia:Nekomata|Nekomata]]'') and 「仙狸」 (''[[wikipedia:Nekomata|Senri]]''), the Japanese and Chinese name of the ''yōkai'', respectively.
