title: Card Trivia:Raise the Woof
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's Japanese name is a pun: "Wan" is both the Japanese onomatopoeia for a dog barking as well as the pronunciation of the English word "one".
  ** This card's English name is a pun on "woof", the sound a dog makes, and the phrase "raise the roof".
  * 4 "[[Woof Token]]s" appear in this card's artwork.
