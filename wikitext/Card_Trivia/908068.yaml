title: Card Trivia:Road Magic - Tectonic Shift
wikitext: |-
  {{Navigation}}

  * "[[Sevens Road Magician]]" appears in this card's artwork.
  * [[wikipedia:Diastrophism|Diastrophism]] in this card's Japanese name, "Road Magic - Diastrophism" is the process of deformation of the Earth's crust, which is reflected in this card's activation requirement to send an [[EARTH]] monster from the [[hand]] to the [[Graveyard]].
