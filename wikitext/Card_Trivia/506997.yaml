title: Card Trivia:Unity
wikitext: |-
  {{Navigation}}

  * This card is one of the three official ''[[Yu-Gi-Oh! Trading Card Game|TCG]]''/''[[Yu-Gi-Oh! Official Card Game|OCG]]'' cards that feature characters from the anime or manga series (excluding [[The Valuable Book 3 promotional cards]]). [[Yugi Muto]], [[Téa Gardner]], [[Duke Devlin]] and [[Tristan Taylor]] are featured in the artwork of this card.
  ** The other two cards were released as part of the same promotion: "[[Yu-Jo Friendship]]" features Joey Wheeler and Yami Yugi, while "[[Judgment of the Pharaoh]]" features [[Pharaoh Atem]].
  * The scene pictured on this card is similar to the scene in {{chapter|Yu-Gi-Oh!|033|ref}} and {{episode|Yu-Gi-Oh!|001|ref}} when [[Téa Gardner]] drew the [[symbol of friendship]] on [[Yugi Muto|Yugi]], [[Joey Wheeler|Joey]], and [[Tristan Taylor|Tristan]]'s hands.
  ** [[Duke Devlin]], while shown on the artwork for this card, was not in that scene, nor the episode.
  * The effect of the Monster Card "[[Hand-Holding Genie]]" is similar to this card's effect.
