title: Card Trivia:Cyber Blader
wikitext: |-
  {{Navigation}}

  * This is one of the [[signature card]]s of [[Alexis Rhodes]] in the ''[[Yu-Gi-Oh! GX]]'' anime.
  ** Like the signature cards of many of the other ''Yu-Gi-Oh!'' heroines, this card is performance-themed. In this case, this monster is based on a [[wikipedia:Figure skating|figure skater]], a person who competes in the competitive sport of ice skating in prescribed patterns and choreographed free skating.
  *** This monster's [[Fusion Material]]s reflect the sport of figure skating, which is a combination of elegant dancing (reflected by "[[Etoile Cyber]]") and ice skating (reflected by "[[Blade Skater]]").
  * This monster's ''[[Yu-Gi-Oh! Duel Links]]'' Summoning cutscene features a lake at nighttime, referencing the Duel between [[Jaden Yuki]] and Alexis Rhodes that took place during the same setting in {{episode|GX|003|ref}}, the episode in which this monster debuted.
