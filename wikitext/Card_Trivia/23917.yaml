title: Card Trivia:The Flute of Summoning Kuriboh
wikitext: |-
  {{Navigation}}

  * "[[Kuriboh]]" and "[[Winged Kuriboh]]" appear in this card's artwork.
  * This card is a "Kuriboh" version of "[[The Flute of Summoning Dragon]]", designed to set up the effect of either "Kuriboh" or "Winged Kuriboh".
