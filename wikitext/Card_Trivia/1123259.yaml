title: Card Trivia:Chef de Nouvelles
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Chef's Special Recipe]]" and "[[Recette de Viande (Meat Recipe)]]".
  * This monster's [[Level]] (3) references the three stars awarded as the highest honors by the ''[[wikipedia:Michelin Guide|Michelin Guide]]'', a rating described as "exceptional cuisine, worth a journey for".
  * This monster is closely related to "[[Hungry Burger]]", and is depicted holding a hamburger in its artwork.
  ** Fittingly, this monster can use its monster effect to change its own Level to 6, making it a viable [[Tribute]] for the [[Ritual Summon]] of "Hungry Burger".
  ** "[[Hamburger Recipe]]" can be mimicked from the Deck by this card to perform the above Ritual Summon.
  ** The artwork of "Chef's Special Recipe" depicts this monster preparing a hamburger, and the card itself has an effect that can be activated if the controller [[Special Summon]]s "Hungry Burger".
