title: Card Trivia:The Agent of Miracles - Jupiter
wikitext: |-
  {{Navigation}}

  * This monster is based on the planet [[wikipedia:Jupiter|Jupiter]], which appears in the background of this card's artwork, with the [[wikipedia:Great Red Spot|Great Red Spot]] visible.
  ** The background of this card's artwork also features one of the moons of Jupiter, most likely [[wikipedia:Io (moon)|Io]], based on its orange color scheme.
  ** This monster may also be based on [[wikipedia:Jupiter (mythology)|Jupiter]], the Roman god of the sky and thunder, which serves as the namesake of the planet.
