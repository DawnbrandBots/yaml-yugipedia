title: Card Trivia:Hundred Divine Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dralight Format]]".
  * This monster's initials spell "HDD", which is an acronym for "[[wikipedia:Hard disk drive|hard disk drive]]", a non-volatile computer component that retrieves and stores data using small magnetic disks.
  ** Fittingly, this monster's design features a pair of disks for its wings, each being held together by an actuator and reading/writing heads.
