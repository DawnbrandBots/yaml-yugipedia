title: Card Trivia:Book of Flip
wikitext: |-
  {{Navigation|mode=nongame}}

  * This card's name is based on the name of its owner, [[Flip Turner]], who uses a [[Flip monster]] [[Deck]].
  ** This card's Japanese name (ウラのしょ ''Ura no Sho'') is based on Flip's Japanese name, "Tokunosuke Omote'''ura'''", and his habit of ending his sentences with "ura."
