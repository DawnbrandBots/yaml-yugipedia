title: Card Trivia:Dual Assembwurm
wikitext: |-
  {{Navigation}}

  * The second portion of this monster's name is a portmanteau of the words "assembly" and "[[wikipedia:lindwurm|lindwurm]]".
  ** "Assembly" references [[wikipedia:Assembly Language|assembly language]], a low-level computer programming language. Ironically, this monster's [[Level]] is 8, which is a high Level in the game.
  * This monster may be a rival [[counterpart]] of "[[Double Disruptor Dragon]]":
  ** Both are [[Level 8]] monsters whose names include a word related to the number two ("dual" and "double"). 
  ** Both monsters have split colour schemes: this monster has a blue left half and a red right half, while "Double Disruptor Dragon" has a blue left half and a purple right half.
  ** Both monsters are depicted with opposite poses: this monster's body is angled to its left, with its head angled slightly to its right, while "Double Disruptor Dragon" is angled to its right, with its head angled slightly to its left.
  ** Both monsters have angular wings which appear to be made of energy. 
  ** This is a [[Cyberse]] monster, a [[Type]] that was primarily used by [[Yusaku Fujiki]]/Playmaker in the ''[[Yu-Gi-Oh! VRAINS]]'' anime, and relies on Cyberse monsters to activate its effects. "Double Disruptor Dragon" is a [[Dragon]] monster and supports "Rokket" and "[[Borrel]]" monsters, which are [[archetype]]s consisting of Dragon monsters used by [[Roken Kogami]]/Varis in the ''Yu-Gi-Oh! VRAINS'' anime.
  *** This monster can [[Special Summon]] itself from the [[hand]] by [[banishing]] two Cyberse monsters from the hand and/or [[face-up]] on the player's [[field]], and requires banishing Cyberse monsters to activate its second effect, relying on those monsters to support itself; in contrast, "Double Disruptor Dragon" can Special Summon two "Rokket" monsters from the [[Graveyard]] at the cost of [[Tributing]] itself, and can banish itself from the Graveyard to [[add]] a [[Spell Card]] that supports the "Borrel" archetype to the player's hand, providing support to other monsters.
