title: Card Trivia:The 13th Grave
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Buried Soul Talisman]]".
  * This card shares the same [[Level]] (3) [[Type]] ([[Zombie]]), [[ATK]] (1200), and [[DEF]] (900) with "[[Zombie Warrior]]".
  ** Both cards are [[non-Effect Monster]]s, although this card is a [[Normal Monster]] and "Zombie Warrior" is a [[Fusion Monster]].
  * In the Japanese set ''[[Legend of Blue Eyes White Dragon]]'', this card's set number is [[LB-13]]. In common superstition, the number "[[wikipedia:13 (number)|13]]" is considered connected with bad luck, death, and the devil.
  ** This, united with this monster's undead and horror themes, may also be a visual pun on [[wikipedia:Triskaidekaphobia|triskaidekaphobia]], the fear of the number "13".
  * The Spanish print of this card has a typo in its lore, as it says "''una'' sepulcro" instead of "''un'' sepulcro".
