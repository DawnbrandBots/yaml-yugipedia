title: Card Trivia:Fusion Sword Murasame Blade
wikitext: |-
  {{Navigation}}

  * The name "Fusion Sword" may allude to this card's effect that prevents it from being [[destroy]]ed by other card effects by "fusing" with the equipped monster.
  * This card is technically a "[[Polymerization (archetype)|Polymerization]]" card, and not a "[[Fusion (archetype)|Fusion]]" card, but the distinction doesn't matter since the two archetypes share all relevant support.
