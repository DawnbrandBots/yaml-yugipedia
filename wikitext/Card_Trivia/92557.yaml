title: Card Trivia:People Running About
wikitext: |-
  {{Navigation}}

  * The blond man on the left appears in the artwork of "[[Huge Revolution]]".
  * This monster has a ''[[Rush Duel]]'' [[Gi-ant Revolution (series)|Gi-ant Revolution]] counterpart: "[[Ants Running About]]".
  * This card is part of the storyline depicting the specific stages leading up to the revolution ("[[Oppressed People]]" > '''People Running About''' > "[[United Resistance]]" > "Huge Revolution"). Each of the aforementioned cards' [[Level]]s increase, likely denoting the different stages leading up to the revolution.
  ** This card, "Oppressed People", and "United Resistance" have a symbolic shift in [[ATK]] and [[DEF]], symbolizing the people's shift from a defensive outlook towards an offensive outlook in the stages prior to the revolution.
  *** "Oppressed People" has 400 ATK/2000 DEF, this card has 600 ATK/DEF, and "United Resistance" has 1000 ATK and 400 DEF. "Oppressed People" is the defensive lead of the three cards with its highest [[original DEF]] while "United Resistance" represents the role of the aggressor with its highest [[original ATK]] and this card, symbolizing a state of confusion, has equal [[original ATK and DEF]] of 600.
  *** Also, the state of aggression is represented in the rising in the Levels of each card, starting with the [[Level 1]] "Oppressed People" and ending with [[Level 3]] "United Resistance". This depicts a peculiar pattern in the shift from "tolerance" to "revolution".
  * "[[Conscription]]" > "[[Spell-Stopping Statute]]" > "[[Imperial Iron Wall]]" > "[[Royal Decree]]" > "[[Imperial Order]]" > "[[Imperial Custom]]" > "[[The Emperor's Holiday]]" > "[[Royal Command]]" > "[[Royal Writ of Taxation]]" > "[[Royal Oppression]]" > "Oppressed People" > '''People Running About''' > "United Resistance" > "Huge Revolution" > "[[Rock Bombardment]]" > "[[Royal Surrender]]" > "[[The Huge Revolution is Over]]" > "[[Liberty at Last!]]"
  ** This card is part of the storyline of a kingdom ruled by a cruel emperor and their subject's revolution, resulting in the emperor being deposed and the subjects being freed.
