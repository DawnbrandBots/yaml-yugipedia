title: Card Trivia:Sky Striker Ace - Kagari
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Deck-Build Pack: Dark Saviors]]''/''[[Dark Saviors]]'' and ''[[Prismatic Art Collection]]''.
  * This monster appears in the artwork of "[[Sky Striker Maneuver - Afterburners!]]".
  ** Parts of this monster's armor also appear in the alternate artworks of "[[Reinforcement of the Army]]", "[[Sky Striker Ace - Hayate]]", and "[[Sky Striker Ace - Raye]]".
  * This monster is an [[Card evolutions|upgraded]] [[FIRE]] [[Link Monster|Link]] form of "[[Sky Striker Ace - Raye]]".
  ** This monster is named after ''kagari'', the Japanese word for "bonfire", reflecting its FIRE [[Attribute]].
  * This monster and "[[Sky Striker Ace - Shizuku]]" are the first [[Link Monster]]s with Top-diagonal [[Link Arrow]]s.
  * This card's first artwork was adapted into a panel in {{chapter|Yu-Gi-Oh! OCG Stories|Sky Striker Ace|5|ref}}, where [[Raye (manga)|Raye]] uses her "[[Sky Striker]]" technology to engage her "Kagari" Maneuver Weapon during her battle against [[Roze (manga)|Roze]].
