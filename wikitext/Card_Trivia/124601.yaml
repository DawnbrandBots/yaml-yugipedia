title: Card Trivia:Dragunity Tribus
wikitext: |-
  {{Navigation}}

  * This card seems to be based on the ''Tribulus'', the Latin term that refers to the [[wikipedia:Caltrop|Caltrop]], a spiked-weapon used to slow down the advance of enemy troops.
  * This monster appears to be part of "[[Dragunity Knight - Luin]]".
  ** It also appears to have a [[Card evolutions|retrained]] version: "[[Dragunity Senatus]]".
  ** Prior to the release of "[[Dragunity Couse]]", "Dragunity Senatus", and "Dragunity Knight - Luin", this monster was the only Winged Beast "Dragunity" monster that has no Dragon mount.
