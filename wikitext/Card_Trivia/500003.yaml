title: Card Trivia:One-Time Passcode
wikitext: |-
  {{Navigation}}

  * This card's name is based on [[wikipedia:One-time password|one-time passwords]], which are only valid for one login session or transaction.
  ** The "[[Security Token]]" summoned by this card could be a reference to [[wikipedia:Session ID|session tokens]], which websites use to track that a user is logged in. Alternatively, the card artwork could depict a physical [[wikipedia:Security token|security token]].
  * A "[[Sheep Token]]" appears on the security card featured in this card's artwork.
