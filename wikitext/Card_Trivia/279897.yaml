title: Card Trivia:Reverse Breaker
wikitext: |-
  {{Navigation}}

  * "[[Gogogo Golem]]" and the cards "[[Scramble!! Scramble!!]]" and "[[Sonic Boom]]" appear in this card's artwork.
  * This card's name reflects its effect, as it allows the [[equip]]ped monster to [[destroy]] (or "break") one of the opponent's [[Spell]]/[[Trap Card]]s (or "reverse cards" in the Japanese media) and prevent their [[activate|activation]]. 
  * This card's ''[[OCG]]''/''[[TCG]]'' condition to be equipped only to a "[[Utopia (archetype)|Utopia]]" monster is based on its appearance in {{episode|ZEXAL|118|ref}} where it was equipped to "[[Number 39: Utopia (anime)|Number 39: Utopia]]".
