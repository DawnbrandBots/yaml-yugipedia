title: Card Trivia:Raidraptor - Heel Eagle
wikitext: |-
  {{Navigation}}

  * Just like the other [[Level]]/[[Rank]] 3 "[[Raidraptor]]" monsters, this card's name is based on the [[wikipedia:Eagle|eagle]].
  ** Additionally, as the other monsters of that category mention [[Raidraptor - Fiend Eagle|the devil]] and [[Raidraptor - Skull Eagle|skulls]] in their names, this card's name also refers to the [[wikipedia:Heel (professional wrestling)|heel]], a type of wrestler that depicts a villainous character, often making use of the the aforementioned symbols.
