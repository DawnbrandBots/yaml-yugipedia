title: 'Card Trivia:Number 90: Galaxy-Eyes Photon Lord'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * This is one of the [[cover card]]s of ''[[Collectors Pack 2018]]''/''[[Battles of Legend: Relentless Revenge]]'' and ''[[Battles of Legend: Chapter 1]]''.
  * This monster's [[original ATK and DEF]] (2500/3000) are the inverse of those of "[[Galaxy-Eyes Photon Dragon]]".
  * This monster is wielding a weapon that appears to be made of a "feather" from  the wings of "Galaxy-Eyes Photon Dragon" and a shield that is somehow similar to the tail-like protrusions extending from the shoulders of "[[Number 62: Galaxy-Eyes Prime Photon Dragon]]", while its helmet visor displays the same  [[wikipedia:Spiral galaxy|spiral galaxy]] as the eyes of other "[[Galaxy-Eyes]]" monsters.
