title: Card Trivia:Divine Wind
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The English dub artwork for this card is the same as that of "[[Guardian Force]]".
  * This card has two weaker real-life counterparts; "[[Crimson Fire]]" (which requires you to control "[[Red Dragon Archfiend]]") and "[[Barrel Behind the Door]]" (which does not double the damage inflicted).
  * This card's Japanese name and artwork makes it seems like it's a counterpart of "[[Mirror Force]]".
