title: Card Trivia:Des Koala
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Night Before the Big March]]" and "[[The Big March of Animals]]".
  * This monster has an [[Card evolutions|evolved]] form: "[[Big Koala]]".
  ** The flavor text of "Big Koala" describes it as a larger species of this monster.
  * This monster is part of a trend of [[Beast]] monsters based on marsupials whose name start with the word "Des", the others being "[[Des Kangaroo]]", "[[Des Wombat]]", and "[[Desmanian Devil]]".
