title: Card Trivia:Pompadour Blizzardon
wikitext: |-
  {{Navigation|mode=nongame}}

  * This monster is named after a [[wikipedia:Pompadour (hairstyle)|pompadour]], a hairstyle where a large volume of hair swept upwards from the face and worn high over the forehead, which this monster's head crest resembles.
  ** In Japanese modern culture, this hairstyle is known as the "Regent" hairstyle and it is stereotypically associated with juvenile delinquents and gang members. This reflects this monster's owner, [[Chills]], who serves as one of the leaders of his gang along with [[Scorch]].
