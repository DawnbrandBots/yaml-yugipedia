title: Card Trivia:Pre-Preparation of Rites
wikitext: |-
  {{Navigation|mode=otherGame}}

  * "[[Ritual Raven]]" appears in this card's artwork.
  ** "[[Black Luster Soldier]]" and "[[Gaia The Fierce Knight]]" appear in this card's second artwork.
  * "Pre-Preparation of Rites" → "[[Preparation of Rites]]" → "[[Urgent Ritual Art]]" → "[[Advanced Ritual Art]]".
  ** The events in this card's artwork are continued in the artwork of "Preparation of Rites".
  ** This card's artwork depicts the future sacrifice victim ("Ritual Raven") being well fed and engorged before being offered as tribute for a higher being.
