title: Card Trivia:Mokey Mokey King
wikitext: |-
  {{Navigation}}

  * Eleven "[[Mokey Mokey]]" (not counting the "King") appear in this card's artwork.
  * This card has the same [[ATK]] and [[DEF]] as "Mokey Mokey", despite the outrageous size difference. The only difference gameplay-wise is the added effect and higher [[Level]].
