title: Card Trivia:Ice Dragon's Prison
wikitext: |-
  {{Navigation}}

  * "[[Dragunity Knight - Ascalon]]" and "[[Trishula, Dragon of the Ice Barrier]]" appear in this card's artwork.
  ** This card's banishing effect  mimics the effect of those [[Dragon|dragons]]. 
  * This card's artwork is similar to the artwork of "[[Infestation Terminus]]", where a "Trishula" dragon is fighting a yellow dragon.
  ** While the battle depicted in the artwork of "Infetation Terminus" takes place above the windy "[[Shrine of Mist Valley]]", this card, in contrast, shows the battle during a blizzard.
  ** 'Snow and Sky' might refer to the Attributes of "Trishula" and "Ascalon", which are WATER and WIND, respectively.
  * This card's Japanese name is based on the Japanese idiom [https://dictionary.goo.ne.jp/word/天牢雪獄/ 天牢雪獄] (''Tenrō Setsugoku''), meaning "the state of being buried in heavy snow and being unable to leave as you would in a prison created by heaven".
