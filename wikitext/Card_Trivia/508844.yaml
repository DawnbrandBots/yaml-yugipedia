title: Card Trivia:Broww, Huntsman of Dark World
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[The Forces of Darkness]]".
  * This card's name is the "[[Dark World]]" color pun for the color [[wikipedia:brown|brown]].
  ** Also, the "Broww" in this card's name is a pun on "brown" and "bow", this monster's weapon.
  ** This card's name and [[draw]]ing effect also references the fact that the color of the back of the cards is brown.
  * This card's Chinese name, 棕布勞, is a combination of 棕 ("brown") and 布勞 ''bùláo'' ([[wikipedia:Transcription into Chinese characters|a transcription]] of the [[wikipedia:Phoneme|phoneme]] sequence /braʊ/ as in '''''brow'''n'').
  * This monster's right hand appears completely different than the rest of his body, perhaps not belonging originally to him.
