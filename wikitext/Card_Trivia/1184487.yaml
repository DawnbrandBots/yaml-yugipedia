title: Card Trivia:Galactica Rising Oblivion
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Rising of the Aurora]]''.
  ** This is the first cover monster since the introduction of [[Over Rush Rare]]s in [[booster pack]]s that is a [[Super Rare]] and not receive an Over Rush Rare.
  * This monster is an upgraded [[Fusion Monster|Fusion]] form of "[[Galactica Oblivion]]", fused with "[[Vanishing Heliacal Riser]]".
