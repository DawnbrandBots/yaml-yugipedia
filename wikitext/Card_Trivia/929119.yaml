title: Card Trivia:Performapal Nightmare Knight
wikitext: |-
  {{Navigation}}

  * This monster and "[[Performapal Gatlinghoul]]" are the only "[[Performapal]]" monsters to be portrayed as "evil" monsters.
  ** Fittingly, both monsters were used by [[Yuya Sakaki]] while [[Z-ARC]] was [[Awakened|awakening]] from within his body in the ''[[Yu-Gi-Oh! ARC-V]]'' anime.
