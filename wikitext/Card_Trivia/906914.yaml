  * The clock and calendar in the artwork of this card depict 5:00 on Wednesday, July 21. This card was [https://twitter.com/YuGiOh_RUSHDUEL/status/1417756231029051395 revealed on Twitter] at 5 pm on Wednesday, July 21, 2021 ([[wikipedia:Japan Standard Time|JST]]).
