title: Card Trivia:Gagaga x Gagaga
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Gagaga Magician]]" appears in this card's artwork.
  ** Oddly, "Gagaga Magician" is the one member of the archetype this card couldn't be used on; it takes the name of the monster it copies, and you can only control 1 copy of "Gagaga Magician" as per its effect.
