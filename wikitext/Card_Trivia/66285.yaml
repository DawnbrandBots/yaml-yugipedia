title: Card Trivia:Dark Spirit Art - Greed
wikitext: |-
  {{Navigation}}

  * "[[Pot of Greed]]" appears in the background of this card's artwork.
  * The kanji within the circle in the foreground corresponds to the word "greed".
  * This is the only "[[Spiritual Art]]" card whose corresponding "[[Charmer]]" does not appear in the artwork (mainly since this card's [[Dharc the Dark Charmer|corresponding]] "[[Charmer]]" did not exist when this card was first printed).
  ** This card's English name format does not match the other "[[Spiritual Art]]" cards. It is the only one to translate rather than romanize the quoted word, and its name is formatted as "[Attribute] Spirit Art" instead of "Spiritual [Attribute] Art", which is not reflected in Japanese.
