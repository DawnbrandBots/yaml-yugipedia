title: Card Trivia:Elemental HERO Core
wikitext: |-
  {{Navigation}}

  * This card is considered the upgraded form of "[[Elemental HERO Terra Firma]]":
  ** This monster features a similar design and coloration to "Terra Firma", as well as the same [[Attribute]] and [[Type]], but with 1 [[Level]] higher and 200 more [[ATK]] and [[DEF]].
  ** This card's final effect can be used to [[Special Summon]] "Terra Firma" from the [[Graveyard]].
  ** Additionally, "Core" and "Terra Firma" are both played by [[Koyo Hibiki]] in the [[Yu-Gi-Oh! GX - Chapter SP1|Yu-Gi-Oh! GX sequel chapter]].
  ** Also, since "Terra Firma" is part of the "[[Legendary Planet]]" series and its name refers to the [[Earth (planet)|planet Earth]], this card's name, "Core", is a reference to the Earth's [[wikipedia:Inner core|inner core]].
  * This monster is likely based on [[wikipedia:Stan Lee|Stan Lee]] and [[wikipedia:Bones (studio)|Bones]]' ''[[wikipedia:Heroman|HEROMAN]]'', keeping in relation with the superhero comics design of the "Elemental HERO" archetype.
