title: Card Trivia:Gashadokuro, the Skeletal Mayakashi
wikitext: |-
  {{Navigation}}

  * This card is based on the [[wikipedia:Gashadokuro|Gashadokuro]].
  * This monster is the Synchro counterpart of "[[Yasha, the Skeletal Mayakashi]]".
  * This monster appears in the artwork of "[[Mayakashi Mayhem]]".
  * This monster has the highest Level among all [[Zombie]] monsters.
