title: Card Trivia:Aromaseraphy Angelica
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Aroma Gardening]]".
  * This monster is named after the ''[[wikipedia:Angelica archangelica|Angelica archangelica]]'' (commonly known as the angelica), a biennial plant cultivated for its sweetly scented edible stems and roots, where the essential oils extracted from the roots are used in aromatic and culinary uses.
  * This monster has a [[DARK]] counterpart: "[[Aromalilith Rosalina]]".
