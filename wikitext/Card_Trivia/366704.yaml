title: Card Trivia:Dark Burning Magic
wikitext: |-
  {{Navigation}}

  [[File:Dark Burning Magic.png|thumb|250px|"[[Dark Magician (manga)|Dark Magician]]" and "[[Dark Magician Girl (manga)|Dark Magician Girl]]" combining their attacks with "[[Dimension Magic (manga)|Dimension Magic]]".]]

  * "[[Dark Magician]]" and "[[Dark Magician Girl]]" appear in this card's artwork.
  ** "[[Dark Magical Circle]]" also appears in this card's Japanese and first Korean artworks.
  * This card is based on "Black Burning Magic", the combined attack of "[[Dark Magician (manga)|Dark Magician]]" and "[[Dark Magician Girl (manga)|Dark Magician Girl]]" in the [[Yu-Gi-Oh! (manga)|manga]], through the effect of "[[Dimension Magic (manga)|Dimension Magic]]".
  ** This card's artwork is taken from the scene in {{chapter|Yu-Gi-Oh! Duelist|216|ref}}, specifically from the panel where they destroy "[[The Sun Dragon Ra]]" with this attack.
  ** The attack is also used by the [[ka]], [[Mahado (manga)|Dark Magician]] and [[Dark Magician Girl (manga character)|Dark Magician Girl]], during [[Priests, Atem and Zorc Necrophades' Diaha (manga)|the ''Diaha'']] against [[Zorc Necrophades (manga)|Zorc Necrophades]].
  * This card is a combination of "[[Dark Magic Attack]]" and "[[Dark Burning Attack]]" in terms of name and effect.

