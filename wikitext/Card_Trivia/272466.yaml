title: Card Trivia:Madolche Nights
wikitext: |-
  {{Navigation}}

  * The kanji in this card's name, 魔導人形 ''madō ningyō'' (read as "Madolche" in kana), can be translated as "Magical Dolls".
  ** The above, coupled with the artwork of this card reveals that the "Madolche" monsters are actually dolls or plushies.
  * "[[Madolche Mewfeuille]]", "[[Madolche Puddingcess]]", "[[Madolche Magileine]]" and  "[[Madolche Chouxvalier]]" appear in this card's artwork.
  * Unlike other cards which include archetype names in their own ones, the Spanish prints of this card adapt the archetype name ("''Magidulces''" instead of "''Magidulce''", "''Madolche''") to conform with grammar rules of said language instead of leaving it "as is" to help denote that this card belongs to the "Madolche" archetype.
