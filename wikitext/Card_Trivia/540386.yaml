title: Card Trivia:Sonic Maid
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (音女, ''Otome'') is a portmanteau of the Japanese words for "maiden" (乙女, ''Otome'') and "sound" (音, ''Oto'').
  * This monster has a [[recolored counterpart]]: "[[Hibikime]]".
  * This monster has a ''[[Rush Duel]]'' [[Bubble Actress]] counterpart: "[[Gourmet Maid]]".
