title: Card Trivia:Card of Demise
wikitext: |-
  {{Navigation}}

  * The card "[[Reaper of the Cards]]" appears in this card's second [[Yu-Gi-Oh! (anime)|original anime]] artwork and ''[[OCG]]''/''[[TCG]]'' artworks.
  * The number of cards that the man drops in this card's artworks represents the size of the player's hand after [[Draw a card|drawing cards]] by this card's effect: 5 in the second artwork used in the fifth season of the original anime and ''[[Yu-Gi-Oh! The Movie: Pyramid of Light]]'', and 3 in the artwork used for the international release of the anime's fifth season and the ''[[OCG]]''/''[[TCG]]''.
  * This is the second [[Treasure Card]] to be [[Limited]] in the ''[[TCG]]'', with the first being "[[Card of Safe Return]]" (which is currently [[Forbidden]]).
