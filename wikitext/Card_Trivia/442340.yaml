title: Card Trivia:White Warrior - Snow the Rope Dart
wikitext: |-
  {{Navigation}}

  * This monster's name is based on [[wikipedia:Snow|snow]], an atmospheric water vapor frozen into ice crystals, either falling in white flakes or laying as a white layer in the ground.
  ** This monster's subtitle and weapon are based on the [[wikipedia: Rope dart|rope dart]], a metal dagger attached to a long thread of rope.
  * At the time of this monster's debut in the ''[[Yu-Gi-Oh! 5D's]]'' era, the maximum amount of [[ATK]] it would gain through its effect is 2100, whereas the minimum is 100.
