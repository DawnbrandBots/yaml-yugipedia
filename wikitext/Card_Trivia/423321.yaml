title: Card Trivia:Performapal Pararhino
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name is a portmanteau of the words "[[wikipedia:Series and parallel circuits|parallel circuit]]" and "[[wikipedia:Rhinoceros|rhino]]", which serve as the basis for this monster's design.
  ** A parallel circuit is an electrical path that branches so that the current divides and only part of it flows parallel to each other. This reflects this card's [[monster effect]] to [[Special Summon]] a "[[Performapal]]" monster from the [[hand]] and make its [[ATK]] "parallel" with the ATK of an opponent's monster.
