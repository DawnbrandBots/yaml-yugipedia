title: Card Trivia:Poissonniere de Nouvelles
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Concours de Cuisine (Culinary Confrontation)]]", "[[Recette de Poisson (Fish Recipe)]]", and "[[Voici la Carte (Today's Menu)]]".
  * This monster's name is based on ''poissonnière'', the French word for "[[wikipedia:fishwife|fishwife]]", a woman who sells fish.
  ** This monster is depicted holding a fish-shaped strawberry shortcake; this and the naming scheme likely reference ''poisson d'avril'', a French counterpart of April Fools' Day which is celebrated by eating various fish-shaped desserts and sweets.
  * This monster's [[Level]] (1) references the one star that is awarded with the first honor by the ''[[wikipedia:Michelin Guide|Michelin Guide]]'', which is described as "high quality food worth a stop for".
  * This monster is closely related to "[[Buerillabaisse de Nouvelles]]", which it can [[support]] via its Monster Effect.
  ** Fittingly, this monster is depicted in the artwork of "Recette de Poisson (Fish Recipe)" preparing the dish featured in the artwork of "Buerillabaisse".
  ** This monster also shares its Level with "Buerillabaisse", making the former a viable [[Tribute]] for [[Ritual Summon]]ing the latter.
  * This monster is a counterpart of "[[Patissciel Couverture]]".
  ** This monster's design features demonic wings, while the design of "Patissciel Couverture" features angelic wings.
  ** Both monsters share the same [[Attribute]] ([[DARK]]), [[Type]] ([[Fairy]]), and [[Pendulum Monster]] property.
  ** Both monsters feature an effect that place them in the [[Pendulum Zone]].
  ** Both monsters' [[original ATK and DEF]] are inverse of each other; this monster features 700 [[ATK]]/1700 [[DEF]], while "Patissciel Couverture" features 1700 ATK/700 DEF.
  ** Both monsters are depicted having a rivalry with each other, as seen in the artwork of "Concours de Cuisine (Culinary Confrontation)".
