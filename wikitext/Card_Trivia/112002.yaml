title: Card Trivia:Black Potan
wikitext: |-
  {{Navigation}}

  * This card is a counterpart to [[White Potan]]. Its life-point gain effect mirrors White Potan's burn damage; it is a DARK Fiend, whereas White Potan is a LIGHT Fairy; and the two have reversed [[ATK]]/[[DEF]] values.
  ** There is some sort of subversion on this, since it's usually the dark creature with horns that damage the opponent and the nice and fluffy white creature that gives you life points. This case is the polar opossite.
