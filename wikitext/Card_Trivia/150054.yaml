title: Card Trivia:Meklord Army of Skiel
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Meklord Astro the Eradicator]]".
  * This monster is the "[[Meklord Army]]" [[counterpart]] of "[[Meklord Emperor Skiel]]".
  ** This monster's design features a screen face with glowing red decals on it, while "Meklord Emperor Skiel" does not.
  * This is the only "Meklord Army" monster to not feature yellow diamond-shaped decals around its screen face.
  * Similar to its "[[Meklord Army of Granel|Granel]]" and "[[Meklord Army of Wisel|Wisel]]" counterparts, this monster's ''[[TCG]]'' name indicates a plural, similar to that of "[[Royal Firestorm Guards]]"; however, this card's artwork and the ''[[Yu-Gi-Oh! 5D's]]'' anime only depicts one monster.
