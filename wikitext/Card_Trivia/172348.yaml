title: Card Trivia:Hailon, the Timelord
wikitext: |-
  {{Navigation}}

  * This monster is named after the Judaic archangel, [[wikipedia:Haniel|Haniel]].
  ** In the [[wikipedia:Kabbalah|Jewish Kabbalah]], Haniel is the archangel that presides over the [[wikipedia:Sefirot|sefirot]] [[wikipedia:Netzach|Netzach]] in the [[wikipedia:Tree of life (Kabbalah)|Tree of Life]]. Fittingly, Netzach is the seventh of the ten Sefira of the Tree of Life, and this was the seventh "[[Timelord]]" monster Summoned by [[Z-one]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime.
  *** In Jewish and Christian angelology, Haniel is said to take the appearance of a woman, which is reflected in this monster's feminine appearance.
  * This is the only "Timelord" monster with more than one set of limbs, having four arms.
