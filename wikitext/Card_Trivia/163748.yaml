title: Card Trivia:Key Man the Key Warrior
wikitext: |-
  {{Navigation}}

  * This monster could be an indirect spoof of the Disney/Square Enix game ''[[wikipedia:Kingdom Hearts|Kingdom Hearts]]'', where the main character uses a key-like sword called the "Keyblade" as a weapon, which is similar to the sword wielded by this monster.
  ** Furthermore, this monster's armor resembles the armor worn by the Keyblade Wielders in ''[[wikipedia:Kingdom Hearts Birth By Sleep|Kingdom Hearts: Birth By Sleep]]'', more specifically, Master Eraqus's armor in terms of relative color scheme.
