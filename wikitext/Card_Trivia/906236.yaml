title: Card Trivia:Heavy Arms - Double Nexcalibur
wikitext: |-
  {{Navigation}}

  * The base of this weapon is based on the banjo held by "[[Bandijo the Battle Ballad]]".
  ** The green streaks of light in this card's artwork are the same as those in the artwork of "Bandijo".
  * This card's name is a portmanteau of "[[wikipedia:Multi-neck guitar|double-neck guitar]]" (a type of guitar with at least two fingerboard necks) and "[[wikipedia:Excalibur|Excalibur]]" (the legendary sword wielded by [[wikipedia:King Arthur|King Arthur]]).
