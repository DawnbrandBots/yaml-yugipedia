title: Card Trivia:Magical Blast
wikitext: |-
  {{Navigation}}

  * "[[Dark Eradicator Warlock]]" and "[[Mythical Beast Cerberus]]" appear in this card's artwork.
  * This card appears in the artwork of "[[Hand Configuration]]".
  * This card, along with "Mythical Beast Cerberus", are the first [[Structure Deck]]-exclusive cards to be in two different Structure Decks.
