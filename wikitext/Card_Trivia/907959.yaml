title: 'Card Trivia:Number 39: Utopia Rising'
wikitext: |-
  {{Navigation}}

  [[File:Utopia,_Abyss_Splash,_and_Numeron_Dragon.png|thumb|right|250|"[[Number 39: Utopia (anime)|Number 39: Utopia]]", "[[Number 73: Abyss Splash (anime)|Number 73: Abyss Splash]]", and "[[Number 100: Numeron Dragon (anime)|Number 100: Numeron Dragon]]" in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.]]

  * This is one of the [[cover card]]s of ''[[History Archive Collection]]'' and ''[[Maze of Memories]]''.
  * "[[Number 73: Abyss Splash]]" and "[[Number 100: Numeron Dragon]]" appear in this card's artwork.
  ** This card's artwork is based on a scene from {{episode|ZEXAL|141|ref}} where [[Yuma Tsukumo]] and [[Reginald Kastle|Nash]] declared the final attack with "[[Number 39: Utopia (anime)|Number 39: Utopia]]" (whose [[ATK]] was increased to 204 000 with the effects of "[[Number 73: Abyss Splash (anime)|Number 73: Abyss Splash]]", "[[Number 100: Numeron Dragon (anime)|Number 100: Numeron Dragon]]", and "[[Double or Nothing! (anime)|Double or Nothing!]]") during their [[Tag Team Duel]] against [[Don Thousand]].
  * This monster is a [[retrained]] [[counterpart]] of "[[Number 39: Utopia]]".
  ** This monster's name and second effect to [[Special Summon]] itself from the [[Graveyard]] if the player [[Xyz Summon]]s a monster reference the name and effect of "[[Utopia Rising]]", which Yuma used to make "Utopia" gain the effects of "Abyss Splash" and "Numeron Dragon" in {{episode|ZEXAL|140|ref}}.
  ** This monster's first effect to Special Summon another "[[Number]]" monster upon its own Special Summon and [[transfer]] its [[Xyz Material]]s to it reference the effect of "[[Bonds of Hope]]", which was used by Nash to Special Summon "Number 100: Numeron Dragon" and was [[attach]]ed along with the [[material]]s of "Number 73: Abyss Splash" to Yuma's "Number 39: Utopia" as materials in {{episode|ZEXAL|140|ref}}.

