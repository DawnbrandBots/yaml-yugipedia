title: Card Trivia:Artemis, the Magistus Moon Maiden
wikitext: |-
  {{Navigation}}

  * This monster is named after [[wikipedia:Artemis|Artemis]], Greek Goddess of the hunt, the wilderness, wild animals, the Moon, and chastity. Fittingly, this monster is a young girl sitting on a crescent moon.
  * This monster appears in the artworks of "[[Endymion, the Crescent Magistus]]".
  * This monster is a younger version of "[[Reflection of Endymion]]" and "[[Selene, Queen of the Master Magicians]]", the latter of which is named after [[wikipedia:Selene|another Greek Moon Goddess]].
