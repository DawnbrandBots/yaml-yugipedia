title: Card Trivia:Performapal Bubblebowwow
wikitext: |-
  {{Navigation}}

  * This card's Japanese name, "Bubbledog" is a portmanteau of "bubble" (バブル ''Baburu'') and "bulldog" (ブルドッグ ''Burudoggu'').
  * Along with "[[Pot of Desires]]", this is the first card whose English ''[[TCG]]'' name was revealed in a [[Scripted Duel]], in this case, [[North American WCQ 2016 Special: Yusei vs. Yuya]].
