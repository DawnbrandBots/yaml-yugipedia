title: Card Trivia:Brick Phone Nyan Nyan
wikitext: |-
  {{Navigation}}

  * This monster is the ''[[Rush Duel]]'' [[Bubble Era]] [[counterpart]] of "[[Thunder Nyan Nyan]]".
  ** The numbered drums around this monster are also styled after a [[wikipedia:Rotary dial|rotary dial]], a rotating number selector used as component for early [[wikipedia:Telephone|telephones]], complete with a finger stop.
