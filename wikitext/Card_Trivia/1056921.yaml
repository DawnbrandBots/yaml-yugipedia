title: Card Trivia:Maple Maiden
wikitext: |-
  {{Navigation}}

  * This monster's Japanese name (いろはもみじ, ''Irohamomiji'') is homophonic to the Japanese term for the ''[[wikipedia:Acer palmatum|acer palmatum]]'' (イロハモミジ, ''irohamomiji''), a species of woody plant native to Japan that is also commonly known as the "Japanese maple".
