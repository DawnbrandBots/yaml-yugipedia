title: Card Trivia:Cursed Bride Doll
wikitext: |-
  {{Navigation}}

  * This card's Japanese name's reading comes from the phrase 花嫁人形 (''hanayome ningyō'', "a bride doll"), but its spelling replaces the syllables with more mystical kanji, including 離 (''hana'', from the verb 離れる ''hanareru'' meaning "to leave"), 世 (''yo'', "the mortal world") and 召 (''me'', from the verb 召す '' mesu'' meaning "to summon"). Together, the kanji reads, "the summoned doll (召人形) that leaves the world (離世)." "To leave the world" (離世) is an expression that means to withdraw into reclusion and that is recorded in the book ''[[wikipedia:Zhuangzi (book)|Zhuangzi]]''.
  * A bride doll is a common type of Japanese doll in traditional bridal attire. This card is also based on the common literary trope of a murderous cursed doll particularly in Japanese literature. Its effects also reference related tropes such as the doll's hair (ATK) keeps growing, and it keeps coming back after you throw it away.
