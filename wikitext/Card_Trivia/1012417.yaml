title: Card Trivia:Speedroid Dominobutterfly
wikitext: |-
  {{Navigation}}

  * This monster's name and appearance are puns on the two types of [[wikipedia:Causality|causality]]: the [[wikipedia:Butterfly effect|butterfly effect]] (reflected by this monster's [[wikipedia:Butterfly|butterfly]]-like appearance) and the [[wikipedia:Domino effect|domino effect]] (reflected by the [[wikipedia:Domino|dominoes]] serving as this monster's wings).
  * This card's artwork is taken from {{chapter|ARC-V|012|ref}}, specifically from the panel showing [[Speedroid Domino Butterfly (manga)|this monster]] being Summoned.
