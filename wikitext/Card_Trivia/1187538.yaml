title: Card Trivia:Mind Scan (card)
wikitext: |-
  {{Navigation}}

  * "[[Dark-Eyes Illusionist Faceless Mage]]", the cards "[[Chaos Hats]]", "[[Gurifoh]]", "[[Mind Shuffle]]", and "[[Mystical Celtic Sage]]", and the [[Eye of Wdjat]] appear in this card's artwork.
  ** Fittingly, this card was revealed during the ''Yu-Gi-Oh! OCG Times'' livestream of April 17, 2026, which was centered around cards released in the ''[[Chaos Origins]]'' and ''[[Revolution Booster: Toon / Witchcrafter / Unchained]]'' [[booster pack]]s, which respectively feature [[retrain]]ed counterparts of cards used by [[Dark Yugi (manga)|Dark Yugi]] and [[Maximillion J. Pegasus (manga)|Maximillion J. Pegasus]] during their [[Duelist Kingdom (manga)|Duelist Kingdom]] Duel in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga.
  * This card is based on the [[Mind Scan]], one of the powers of the [[Millennium Eye (manga)|Millennium Eye]] used by Pegasus, which allows him to read his opponent's mind and see the cards in their [[hand]] and predict which cards they would play.
  ** This card's base Japanese name (心を見通す眼, ''Kokoro o Mitōsu Me'') translates to "the eye that reads the heart", which a reference to how Pegasus describes the power of the Millennium Eye in {{chapter|Yu-Gi-Oh!|062|ref}}.
  ** This card's artwork depicts "Dark-Eyes Illusionist Faceless Mage" (a combination of "[[Dark-Eyes Illusionist]]" and "[[Illusionist Faceless Mage]]", both of which were used by Pegasus) using the power of the Eye of Wdjat to look at the opponent's hand (which features retrained counterparts of cards used by Dark Yugi), similar to how Pegasus uses the power of the Millennium Eye to look at Dark Yugi's hand during the [[Duelist Kingdom (manga arc)|Duelist Kingdom]] arc in the ''Yu-Gi-Oh!'' manga.
  *** This card's artwork is a reference to a scene in {{chapter|Yu-Gi-Oh!|126|ref}}, where Pegasus uses his Mind Scan to see Dark Yugi's hand, which consists of "[[Celtic Guardian (manga)|Celtic Guardian]]", "[[Spellbinding Circle (manga)|Spellbinding Circle]]", "[[Magical Hats (manga)|Magical Hats]]", and "[[Imp (manga)|Imp]]". "Celtic Guardian" and "Magical Hats" are in the first and third positions from the left respectively, while their retrained counterparts "Mystical Celtic Sage" and "Chaos Hats" are in the same respective positions in this card's artwork.
  ** The appearance of "Chaos Hats", "Gurifoh", and "Mystical Celtic Sage" in this card's artwork is a reference to how Dark Yugi uses their respective original counterparts ("Magical Hats", "[[Kuriboh (manga)|Kuriboh]]", and "Celtic Guardian") during his and Pegasus's Duelist Kingdom Duel, while the appearance of "Mind Shuffle" is a reference to the [[Mind Shuffle (strategy)|strategy]] used by Dark Yugi and [[Yugi Mutou (manga)|Yugi Mutou]] to bypass the mind-reading power of Pegasus's Millennium Eye.
