title: Card Trivia:A.I.'s Hymn
wikitext: |-
  {{Navigation|mode=nongame}}

  * [[Ai]] appears in this card's artwork.
  * This card's Japanese name is a wordplay on the "[[wikipedia:Hymne à l'amour|Hymne à l'amour]]" (愛の讃歌, ''Ai no Sanka''), a 1949 French song by [[wikipedia:Édith Piaf|Édith Piaf]], which was adapted into Japanese by [[wikipedia:Fubuki Koshiji|Fubuki Koshiji]].
