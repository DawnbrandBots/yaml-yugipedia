title: Card Trivia:White Potan
wikitext: |-
  {{Navigation}}

  * This card is somewhat similar to "[[Marshmallon]]" in effects and appearance.
  * This card is the polar opposite of "[[Black Potan]]" in terms of their mirroring effects ("Black Potan" gives out [[Life Points]] while this card inflicts burn damage), reversed ATK and DEF points, Attributes, and color schemes.
  ** There is some sort of subversion to this trend, since it is usually the dark creature that damages the opponent, while the fluffy white creature restores Life Points. This case has the usual roles reversed.
  * The pajamas "[[Ojama Yellow]]" wears in the artwork of "[[Ojama Pajama]]" are modeled after this monster.
