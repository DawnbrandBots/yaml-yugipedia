title: Card Trivia:Traptrix Mantis
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Terrifying Trap Hole Nightmare]]", "[[Trap Trick]]", and "[[Traptrix Allomerus]]".
  * This card is based on the [[wikipedia:Hymenopus coronatus|orchid mantis]] (Japanese: {{Ruby|蘭|ラン}}{{Ruby|花|ハナ}}{{Ruby|蟷|カマ}}{{Ruby|螂|キリ}} ''<u>Ran</u>hana<u>ka</u>makiri''), a species of mantis that mimics an orchid and traps its prey with its hooked front legs.
