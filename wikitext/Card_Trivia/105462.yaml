title: Card Trivia:Meteor Wave
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Flamvell Uruquizas]]" appears in this card's artwork.
  ** This card's effect can be seen as a backwards version of the effect of "Flamvell Uruquizas"; this card gives 300 [[ATK]], and/then [[Piercing]] ability, while the [[Synchro Monster]] inflicts piercing to gain 300 ATK.
