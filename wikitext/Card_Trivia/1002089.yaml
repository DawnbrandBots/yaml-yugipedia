title: Card Trivia:Archfiend Mirror
wikitext: |-
  {{Navigation}}

  * This is one of the two earliest "Archfiend" cards released for the ''OCG''.
  ** Only [[Summoned Skull]] and its fusion, [[Black Skull Dragon]] predate this Monster by first appearance in any media.
  ** All four Monsters appeared in the first [[Yu-Gi-Oh! Duel Monsters (video game)|first ''Duel Monsters'' video game]], which predates the ''OCG''.
  * In early video games, this card was called "Wicked Mirror"
  ** The first game to feature the card with the new name was ''[[Tag Force 1]]''.
  ** The other card, [[Air Marmot of Nefariousness]], was already renamed to [[Archfiend Marmot of Nefariousness (World Championship 2006)|Archfiend Marmot of Nefariousness]] since [[Yu-Gi-Oh! Ultimate Masters: World Championship Tournament 2006|''World Championship Tournament 2006'']].
