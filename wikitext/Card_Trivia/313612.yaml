title: Card Trivia:Yosenju Kama 2
wikitext: |-
  {{Navigation}}

  * This card, along "[[Yosenju Kama 1]]" and "[[Yosenju Kama 3]]", are based on the Japanese yōkai [[wikipedia:Kamaitachi|Kamaitachi]], a weasel monster which rode atop whirlwinds to slice at passers-by.
  ** This trio in particular appears to be modeled on the Hida Province's tradition regarding the Kamaitachi. According to this version of the myth, the Kamaitachi consists of three brother Gods who traveled in a group. The first would knock a person down, the second cuts them, and the final pours medicine in the wound to remove the pain. Correspondingly "Kama 2" represents the second member of this trinity, shown in its art to be cutting at a target with its blade.
  ** Those three monsters are featured in the artworks of "[[Yosenjus' Secret Move]]", "[[Yosen Training Grounds]]", and "[[Yosenju Wind Worship]]".
  ** There's a pun in those cards' Japanese names: the "i" in "Kamaitachi" can be understood as "one"; the "ni" in "Kamanitachi" means "two", and the "mi" in "Kamamitachi", "three".
  ** This card's name also contains "鎌" (''[[wikipedia:Kama (weapon)|kama]]'' "[[wikipedia:Sickle|sickle]]") and 太刀 (''[[wikipedia:Tachi|tachi]]'' "great sword").
