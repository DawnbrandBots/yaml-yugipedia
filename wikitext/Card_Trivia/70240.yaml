title: Card Trivia:The Eye of Timaeus
wikitext: |-
  {{Navigation}}

  * The dragon in this card's artwork appears in the artwork of "[[Amulet Dragon]]", "[[Dark Magician the Dragon Knight]]", "[[Dark Magician Girl the Dragon Knight]]", "[[Legend of Heart]]", and "[[The Gaze of Timaeus]]".
  ** This card's ''[[OCG]]''/''[[TCG]]'' artwork appears to be based on the pose and appearance of the dragon in the artwork of "Legend of Heart".
  * This card is named after ''[[wikipedia:Timaeus (dialogue)|Timaeus]]'', the first part of [[wikipedia:Plato|Plato]]'s trilogy of dialogues, which serve as the source of myths pertaining to the lost city of [[wikipedia:Atlantis|Atlantis]].
  ** This card is based on the dragon form of [[Timaeus]], one of the three legendary knights of [[Atlantis]] who were weakened and transformed into dragons by [[Dartz]] during the Battle of Atlantis, and sealed away in crystal by sticking them with magic swords. In this case, Timaeus was sealed away with a sword sticking in its right eye.
  * This card has a:
  ** [[Monster Card]] form: "[[Timaeus the United Dragon]]".
  ** [[Quick-Play Spell Card]] counterpart: "[[The Gaze of Timaeus]]".
  * In the ''[[Yu-Gi-Oh! (anime)|Yu-Gi-Oh!]]'' anime, this card has the fewest associated [[Fusion Monster]]s out of the "[[Legendary Dragon]]s" with two ("Dark Magician Girl the Dragon Knight" and "Amulet Dragon").
  * This is the only "Legendary Dragon" card:
  ** To not have an associated Fusion Monster with another player's card in the ''Yu-Gi-Oh!'' anime ([[Joey Wheeler]] fused the "[[Claw of Hermos]]" with [[Valon]]'s "[[Big Bang Blow (anime)|Big Bang Blow]]" to form "[[Big Bang Dragon Blow]]" and [[Seto Kaiba]] fused the "[[Fang of Critias]]" with [[Yami Yugi]]'s "[[Mirror Force (anime)|Mirror Force]]" to form "[[Mirror Force Dragon (anime)|Mirror Force Dragon]]"), although Yami Yugi did attempt to fuse it with [[Weevil Underwood]]'s "[[Poison Butterfly]]" only to fail because he seemingly lost Timaeus' trust after using "[[The Seal of Orichalcos (anime)|The Seal of Orichalcos]]" in his previous Duel against [[Rafael]].
  ** To not have an associated Fusion Monster with an [[equip]] effect (each "Claw of Hermos" Fusion Monster has one and "The Fang of Critias" has "[[Tyrant Burst Dragon]]").
  ** Whose ''OCG''/''TCG'' effect can be used to [[Special Summon]] a Fusion Monster that does not specifically require a "Legendary Dragon" card as [[material]].
