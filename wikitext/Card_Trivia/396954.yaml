title: Card Trivia:Frightfur Patchwork
wikitext: |-
  {{Navigation}}

  * "[[Edge Imp Sabres]]" appears in this card's artwork, in addition to pieces of "[[Fluffal Dog]]", "[[Fluffal Owl]]", "[[Fluffal Leo]]", "[[Fluffal Bear]]" (pink arm attached on side), "[[Fluffal Cat]]" (tail), and "[[Fluffal Rabbit]]" (red-and-green bag next to Owl's head).
