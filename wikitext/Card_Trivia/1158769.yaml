title: Card Trivia:Red Nova Dragon/Assault Mode
wikitext: |-
  {{Navigation}}

  * This monster is the [[Card evolutions|upgraded]] "[[/Assault Mode]]" form of "[[Red Nova Dragon]]".
  * This monster is a counterpart to "[[Shooting Majestic Star Dragon]]".
  ** Both monsters are depicted with mirrored poses in their respective card artwork.
  ** Both monsters depict their counterparts going on different paths deeper into an evolution ("[[Majestic]]" and "/Assault Mode" respectively) that they both mutually obtained.
  * This monster is tied with "[[T.G. Halberd Cannon/Assault Mode]]" for the highest [[Level]] (12) of all "/Assault Mode" monsters.
  * This monster has the highest [[original ATK]] (4000) of all [[Main Deck]] "[[Red Dragon Archfiend (archetype)|Red Dragon Archfiend]]" monsters.
