title: Card Trivia:Ms. Judge
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Head Judging]]".
  * This card's name is a pun on "miss judge" (as in a woman in the occupation of a judge) and "misjudge" (which means to form an incorrect opinion about something). This card's mandatory effect to [[Coin toss|toss a coin]] if an opponent's card effect activates is also a pun, "judging" whether or not the opponent's card effect can resolve.
