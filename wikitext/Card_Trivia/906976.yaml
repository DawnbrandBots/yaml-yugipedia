  * One of the ghouls from "[[Vendread Revenants]]" appears in this card's artwork.
  * This monster is based on the [[wikia:w:c:residentevil:Nemesis-T Type|Nemesis]] from the ''[[wikipedia:Resident Evil|Resident Evil]]'' franchise.
  * This monster has an [[Card evolutions|upgraded]] [[Ritual Monster|Ritual]] form: "[[Vendread Scavenger]]".
