title: Card Trivia:Satellarknight Sirius
wikitext: |-
  {{Navigation}}

  * This card has a "[[Shaddoll]]" [[counterpart]]: "[[Shaddoll Hound]]".
  * This card is named after [[wikipedia:Sirius|Sirius]], the brightest [[wikipedia:star|star]] in the [[wikipedia:night sky|night sky]].
  ** The constellation [[wikipedia:Canis Major|Canis Major]] appears in the artwork of this card, with Sirius' location in said constellation denoted by an encircled star.
  ** Sirius, [[wikipedia:Procyon|Procyon]] and [[wikipedia:Betelgeuse|Betelgeuse]] are the three stars of the [[wikipedia:Asterism (astronomy)|asterism]] known as the Winter Triangle. Sirius and Procyon, along [[wikipedia:Pollux (star)|Pollux]], [[wikipedia:Aldebaran|Aldebaran]], [[wikipedia:Rigel|Rigel]] and [[wikipedia:Capella|Capella]]  are the stars of the asterism known as the [[wikipedia:Winter Hexagon|Winter Hexagon]].
  * This card and "[[Satellarknight Unukalhai]]" are the only "[[tellarknight]]" monsters to feature shadows in their card artwork. This is most likely reflective of the fact that both monsters have "Shaddoll" counterparts.
