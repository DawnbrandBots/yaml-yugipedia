title: Card Trivia:Falchionβ
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[B.E.S. Big Core MK-3]]".
  * This monster is based on the {{wikia|gradius|Falchion β}}, one of the main playable spaceships from [[Konami|Konami's]] shoot-em-up video game series, ''[[wikipedia:Gradius|Gradius]]'', first debuting in ''[[wikipedia:Gradius Gaiden|Gradius Gaiden]]''.
  * This is the only card in the ''[[TCG]]'' to include the Greek letter "beta" ([[wikipedia:β|β]]) in its name.
  ** In the ''TCG'', the German letter "eszett" ([[wikipedia:ß|ß]]) is used instead of the Greek letter "beta" (β). This is the case even for the German release of this card, despite the eszett still being used in other German card names, such as "[[Beast Fangs|Reißzähne]]" or "[[Big Eye|Großes Auge]]".
  ** The Greek alphabet is not supported by the [[wikipedia:Matrix (typeface)|Matrix typeface]] used for the names of ''TCG'' cards. However, other cards with Greek letters in their ''TCG'' names (such as "[[Kuwagata α]]" and "[[Fiendish Engine Ω]]") do use the Greek letters, but in a different font.
