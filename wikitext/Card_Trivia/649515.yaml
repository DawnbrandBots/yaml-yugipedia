title: Card Trivia:Dragonmaid Lorpar
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Dragonmaid Welcome]]".
  * This monster is the dragon form of "[[Parlor Dragonmaid]]".
  ** This monster's ''[[TCG]]'' name is an anagram of "Parlor".
  ** This monster's Japanese name, "Luft", is the German word for "air", reflecting its [[WIND]] [[Attribute]].
