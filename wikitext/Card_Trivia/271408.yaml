title: Card Trivia:Bujingi Quilin
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Primal Origin: Deluxe Edition]]''.
  * This [[monster]] is based on legendary sword [http://en.wikipedia.org/wiki/Kusanagi Kusanagi], which was originally called Ame-no-Murakumo-no-Tsurugi.
  ** Ame no Murakumo no Tsurugi (Sword of the Gathering Clouds of Heaven) was the legendary sword that Susanoo extracted from one of the tails of the eight-headed dragon Orochi. It was later owned by Yamato Takeru, who renamed it to Kusanagi-no-Tsurugi (Grass-Cutting Sword).
  * This monster's TCG name is named after the Qilin, sometimes also called "Asian unicorn".
  * This monster appears in its normal form in the artwork of "[[Bujin Regalia - The Sword]]", and in its armament form in "[[Bujincarnation]]", "[[Bujin Regalia - The Sword]]" and "[[Bujintei Susanowo]]".
