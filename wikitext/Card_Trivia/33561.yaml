title: Card Trivia:Demise of the Land
wikitext: |-
  {{Navigation}}

  * This devastated land in this card's artwork appears in the artwork of "[[Armageddon Designator]]".
  * This card's name reflects how its effect could activate the player's [[Field Spell Card]] by [[destroy]]ing an opponent's active Field Spell Card.
  ** Prior to the year 2014, only one Field Spell could only be on the [[field]], and the previous game mechanics would destroy another active Field Spell if another one was played. This was later changed so that each player could control a Field Spell on their field.
