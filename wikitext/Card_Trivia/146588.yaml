title: Card Trivia:Steelswarm Longhorn
wikitext: |-
  {{Navigation}}

  * Following the evolution of each [[Steelswarm]] monster that at least need one [[Tribute]], this monster has 200 more [[ATK]] and 1 more [[Level]] than the previous one.
  * This is the first Steelswarm that requires 2 Tributes whose name doesn't start with '''G''' (in the OCG).
