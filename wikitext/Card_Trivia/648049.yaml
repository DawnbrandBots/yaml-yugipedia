title: Card Trivia:Performapal Miss Director
wikitext: |-
  {{Navigation}}

  * This card's name is a portmanteau of the words "[[wikipedia:Miss|Miss]]", "misdirect", and "director".
  ** Fittingly, this monster resembles a female [[wikipedia:Film director|film director]] (who is holding a [[wikipedia:Clapperboard|clapperboard]] and a [[wikipedia:Megaphone|megaphone]], which are typically used by a film director), whose effect can "misdirect" an opponent's monster into attacking an "[[Odd-Eyes]]" monster instead of itself.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|033|ref}}, specifically from the panel showing [[Enter-Mate Miss Director (manga)|this monster]] being Summoned.
