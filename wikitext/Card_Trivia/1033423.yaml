title: Card Trivia:Dowsing Point
wikitext: |-
  {{Navigation|mode=nonGame}}

  * The person in this card's artwork is depicted holding a pair of L-shaped [[wikipedia:Dowsing|dowsing]] rods, which are tools used to locate objects and materials without the usage of scientific instruments.
  ** In {{episode|Yu-Gi-Oh! GX|077|ref}}, this card's effect allowed [[T-Bone]] to [[add]] the [[WATER]] [[Attribute]] "[[Mobius the Frost Monarch (anime)|Mobius the Frost Monarch]]" from his [[Deck]] to the [[hand]], which is a reference to how dowsing is used to search for [[wikipedia:Groundwater|groundwater]].
