title: Card Trivia:The Phantom Knights of Dark Gauntlets
wikitext: |-
  {{Navigation}}

  * This monster is based on a [[wikipedia:Gauntlet (glove)|gauntlet]], a type of glove that protects the hands and wrist of a combatant, which is reflected in this card's effect to protect itself by gaining 300 [[DEF]] for each "[[Phantom Knights]]" [[Spell]]/[[Trap Card]] in the player's [[Graveyard]].
  * This is the first [[Trap Monster]] that is not simultaneously treated as a Trap Card while [[Special Summon]]ed that is treated as an [[Effect Monster]] upon its Special Summoning, unlike all previous Trap Monsters that had this wording, which were treated as [[Normal Monster]]s.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ARC-V|002|ref}}, specifically from the panel where [[Phantom Knights Dark Gauntlet (manga)|this monster]] uses its effect to gain DEF.
