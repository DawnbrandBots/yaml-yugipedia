title: Card Trivia:Vision HERO Faris
wikitext: |-
  {{Navigation}}

  * This monster's name is derived from "Faris", an Arabic masculine given name translated to "knight", "horseman", or "cavalier".
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|GX|052|ref}}, specifically from the panel showing [[Vision Hero Faris (manga)|this monster]] being Summoned.
