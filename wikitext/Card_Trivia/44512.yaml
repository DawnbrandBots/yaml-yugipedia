title: Card Trivia:Swarm of Locusts
wikitext: |-
  {{Navigation}}

  * This monster has two [[counterpart]]s: "[[Swarm of Centipedes]]" and "[[Swarm of Scarabs]]".
  ** All three monsters are [[Level 3]] [[DARK]] [[Insect]] monsters who share the same effect to [[flip]]-related effects and an [[original ATK and DEF]] divisible by 500.
  ** This monster and "Swarm of Scarabs" both have reversed [[ATK]]/[[DEF]] (1000/500), feature an effect to [[destroy]] an opponent's card on the [[field]] when [[Flip Summon]]ed, and flip themselves [[face-down]].
