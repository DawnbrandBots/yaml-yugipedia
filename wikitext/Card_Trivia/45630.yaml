title: Card Trivia:Ally Mind
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Ally of Justice Catastor]]", "[[Ally of Justice Cosmic Gateway]]", "[[Ally of Justice Decisive Armor]]", "[[Ally of Justice Field Marshal]]", and "[[Ally of Justice Light Gazer]]", embedded in all of these monsters.
  ** However, this card cannot be used as a [[Tuner monster]] for the [[Synchro Summon]] of "Ally of Justice Catastor", without reducing its [[Level]] with an effect, despite this monster being embedded in "Catastor's" body.
  * According to this card's [[flavor text]], this monster and the other "[[Ally of Justice]]" monsters were built from the "[[W Nebula Meteor]]" and their original purpose was to defeat the "[[Worm]]" monsters, which is reflected by the "Ally of Justice" monsters having [[LIGHT]] [[anti-support]] effects to counter the LIGHT [[Reptile]] "Worm" monsters.
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', the word "Worm" in this card's flavor text is misspelled "Wyrm".
