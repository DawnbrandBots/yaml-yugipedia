title: Card Trivia:Dramaturge of Despia
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Retribution]]", "[[Dogmatikamacabre]]", and "[[Dogmatikaturgy]]".
  * "[[Dogmatika Maximus]]" → "Dramaturge of Despia" → "[[Dogmatika Alba Zoa]]" → "[[Bystial Dis Pater]]"
  ** This card is named after [[wikipedia:Dramaturgy|dramaturgy]], which studies dramatic composition and the representation of the main elements of drama on the stage.
  *** This card's name, "Dramaturge" ({{Ruby|大導劇神|ドラマトゥルギア}} ''Doramaturugīa'', "Dramaturgia"), reflects how "Dogmatika Maximus" was formerly the leader of the facade Church of the "[[Dogmatika Nation]]", as if he was writing the plot for a theatrical fiction.
  ** This card has the same [[Level]] (8) and opposite [[ATK]]/[[DEF]] (3000/1500) as "Maximus" (1500/3000).
