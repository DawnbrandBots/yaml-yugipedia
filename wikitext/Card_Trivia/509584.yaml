title: Card Trivia:Rescue Cat
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Cat Meeting]]", "[[Emerging Emergency Rescute Rescue]]", "[[Night Before the Big March]]", "[[The Big March of Animals]]", "[[Three of a Kind]]", and "[[Tour Bus To Forbidden Realms]]".
  * This is the one of three cards that were released twice in separate [[Turbo Pack]]s in different rarities ([[Rare]] and [[Super Rare]]), the other two being "[[Dark Hole]]" and "[[Gladiator Beast Laquari]]".
  * According to ''[[Yu-Gi-Oh! Duel Arena]]'', this monster is the boss of "[[Rescue Rabbit]]".
  * In ''[[Yu-Gi-Oh! Duel Links]]'', this monster is hidden in the trash can in the Card Studio screen.
