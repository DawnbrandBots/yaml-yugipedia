title: Card Trivia:Myutant Mist
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Myutant Blast]]".
  * This monster is a mutated form of "[[Myutant ST-46]]".
  ** "Myutant ST-46" appears in this monster's chest.
  *** This is fitting, as the "ST" in "Myutant ST-46's" name refers to its effect to [[search]] the "[[Myutant]]" [[Spell]]s and [[Trap]]s.
  ** This card being [[Spellcaster]]-[[Type]] and [[WIND]]-[[Attribute]] reflects its connection to its associated [[card type]], the green-framed [[Spell Card]].
  ** This card can be considered the Spell-associated counterpart of "[[Myutant Arsenal]]", which references [[Trap Card]]s instead.
