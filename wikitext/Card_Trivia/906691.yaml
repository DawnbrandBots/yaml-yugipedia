title: Card Trivia:Dragoness the Wicked Knight
wikitext: |-
  {{Navigation}}

  * This card is the first [[Fusion Monster]] in the ''[[OCG]]''/''[[TCG]]'' to feature [[Fusion Material]]s that share the same [[Level]], [[ATK]], and [[DEF]].
  ** This card is also the second Fusion Monster to appear in the [[Yu-Gi-Oh! (anime)|anime]] to feature this concept, with the first being "[[Blue-Eyes Ultimate Dragon (anime)|Blue-Eyes Ultimate Dragon]]"; however, "Dragoness" is the first Fusion Monster in the anime to feature ''different'' Fusion Materials with the same ATK, DEF and Level.
