title: Card Trivia:The Bystial Aluber
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Branded Beast]]" and "[[Etude of the Branded]]" (possessing the wings of "[[Masquerade the Blazing Dragon]]").
  ** This monster's throne appears in the artwork of "[[The Black Goat Laughs]]".
  * The red gem from the hilt of the sword of "[[Blazing Cartesia, the Virtuous]]" appear in this card's artwork.
  * This monster is a [[retrained]] "[[Bystial]]" counterpart of "[[Aluber the Jester of Despia]]".
  ** According to the reference artwork of "Aluber the Jester of Despia", the crack in the red gem in this monster's chest is a result of the events depicted in the artwork of "[[Branded Expulsion]]".
  ** The role of "Aluber" as a thematic opposite of "[[Fallen of Albaz]]" is reflected in this monster's effect, requiring the player to [[discard]] a card to [[Special Summon]] a [[Dragon]] monster.
  * This monster has an empowered form: "[[The Bystial Lubellion]]".
