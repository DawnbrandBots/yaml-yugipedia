title: Card Trivia:Songs of the Dominators
wikitext: |-
  {{Navigation}}

  * The red-haired girl and the creature from the artwork of "[[Dominus Purge]]" appear in this card's artwork.

  * This card's Japanese name ({{Card name|Songs of the Dominators|jp}} ''{{Romanized name|Songs of the Dominators|ja}}'') is a combination of those of the ''[[wikipedia:Books of Kings|Books of Kings]]'' ({{Ruby|列|れつ}}{{Ruby|王|おう}}{{Ruby|記|き}} ''Retsuōki'') and ''[[wikipedia:Psalms|Psalms]]'' ({{Ruby|詩|し}}{{Ruby|篇|へん}} ''Shihen'').
