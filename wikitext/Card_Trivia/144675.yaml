title: Card Trivia:Daigusto Gulldos
wikitext: |-
  {{Navigation}}

  * "[[Winda, Priestess of Gusto]]" appears in this card's artwork, riding a larger version of "[[Gusto Gulldo]]". Consequently, those two cards can be tuned to [[Synchro Summon]] this card.
  * The effect is a mirror version of the effect of "[[Daigusto Eguls]]", destroying face-up cards instead of face-down cards.
  * This monster has a "[[Shaddoll]]" counterpart, "[[El Shaddoll Winda]]".
