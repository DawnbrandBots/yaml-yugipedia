title: Card Trivia:Darkness Lode
wikitext: |-
  {{Navigation}}

  * This card's English name is based on "[[wikipedia:Lode|lode]]", a vein of metal ore embedded in the earth.
  ** Given its Japanese spelling and pronunciation (ロード ''Rōdo'') and effect, this card was designed to [[support]] the [[Sevens Road]] [[series]], which centers around [[DARK]] [[Spellcaster]] monsters and is associated with the [[Darkness (Rush Duel series)|Darkness]] series.
