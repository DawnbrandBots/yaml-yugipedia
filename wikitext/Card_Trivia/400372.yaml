title: Card Trivia:Angel Trumpeter
wikitext: |-
  {{Navigation}}

  * This monster is based on the highly toxic Angel Trumpets, a member of the ''[[wikipedia:Brugmansia|Brugmansia]]'' genus which is known to cause frightening hallucinations.
  * This card is the first [[Level 4]] [[Normal Monster|Normal]] [[Tuner monster]]. It was released in 2016, eight years after the debut of Tuner monsters and [[Synchro Monster]]s.
