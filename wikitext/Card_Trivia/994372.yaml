title: Card Trivia:Rescue Hedgehog
wikitext: |-
  {{Navigation}}

  * This monster appears to be the same hedgehog that was rescued in the artwork of "[[Emerging Emergency Rescute Rescue]]".

  * This card's effects is a combination of the effects of "[[Rescue Rabbit]]" (which [[banish]]es itself and [[Special Summon]]s [[Normal Monster]]s) and "[[Rescue Cat]]" (which Special Summons two [[Level 3]] or lower monsters).

  == See also ==
