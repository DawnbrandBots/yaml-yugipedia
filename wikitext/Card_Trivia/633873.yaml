title: Card Trivia:Mathmech Sigma
wikitext: |-
  {{Navigation}}

  * This monster's silhouette appears in the artwork of "[[Mathmech Equation]]".
  * This monster is based on the [[wikipedia:Summation|summation]] operator [[wikipedia:Sigma|sigma]] (Σ).
  ** Fittingly, the jagged edges of this monster's sword and the comb on its helmet are shaped like the sigma letter.
  * This monster has an [[Card evolutions|upgraded]] [[Synchro Monster|Synchro]] form: "[[Geomathmech Final Sigma]]".
  * This card is a [[counterpart]] of "[[Mathmech Nabla]]".
  ** This monster is based on summation (which is involved in [[wikipedia:Integral|integration]]), while "Nabla" is based on [[wikipedia:Derivative|differentiation]].
