title: Card Trivia:Galactica Oblivion
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Go Rush Deck - Galactica Arrive]]'' and ''[[Half Deck: Galaxy Type]]'', as well as one of the cover cards of ''[[Deck Mod Pack: Galaxy of Fate!!]]''.
  * "[[Galactica Xiphos]]" and "[[Voidvelg Requiem]]" appear in this card's fourth artwork.
  * This monster appears in the artworks of "[[Galactica Extravagant]]", "[[Galactica Force]]", "[[Galactica Rebuild Armor]]", "[[Galactica Repulsion]]", "[[Galactica Rise]]", "[[Galaxy Chaos Fusion]]", and "[[Recombination Galactica]]", as well as in the second artwork of "[[Secret Order]]".
  * This is the [[signature card]] of [[Yudias Velgear]] (and his [[Yudias Velgear (manga)|manga counterpart]]) in the ''Yu-Gi-Oh! GO RUSH!!'' [[Yu-Gi-Oh! GO RUSH!!|anime]] and [[Yu-Gi-Oh! GO RUSH!! (manga)|manga]].
  ** This card has the same [[ATK]] (2500) as the signature cards of the other anime protagonists (with the exception of [[Yuga Ohdo]]'s "[[Sevens Road Magician (anime)|Sevens Road Magician]]"): [[Yugi Muto]]'s "[[Dark Magician (anime)|Dark Magician]]", [[Jaden Yuki]]'s "[[Elemental Hero Neos (anime)|Elemental Hero Neos]]", [[Yusei Fudo]]'s "[[Stardust Dragon (anime)|Stardust Dragon]]", [[Yuma Tsukumo]]'s "[[Number 39: Utopia (anime)|Number 39: Utopia]]", [[Yuya Sakaki]]'s "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]", and [[Yusaku Fujiki]]'s "[[Firewall Dragon (anime)|Firewall Dragon]]".
  ** This card has the same [[Level]] (7) as the [[Main Deck]] signature cards of the other anime main protagonists: Yugi Muto's "Dark Magician", Jaden Yuki's "Elemental Hero Neos", Yuya Sakaki's "Odd-Eyes Pendulum Dragon", and Yuga Ohdo's "Sevens Road Magician".
  ** This card has the same ATK (2500) as the signature cards of the other manga protagonists: [[Yugi Mutou (manga)|Yugi Mutou]]'s "[[Dark Magician (manga)|Dark Magician]]", [[Jaden Yuki (manga)|Jaden Yuki]]'s "[[Elemental Hero Terra Firma (manga)|Elemental Hero Terra Firma]]", [[Yusei Fudo (manga)|Yusei Fudo]]'s "[[Stardust Spark Dragon (manga)|Stardust Spark Dragon]]", [[Yuma Tsukumo (manga)|Yuma Tsukumo]]'s "[[No. 39: Utopia (manga)|No. 39: Utopia]]", [[Yuya Sakaki (manga)|Yuya Sakaki]]'s "[[Odd-Eyes Phantom Dragon (manga)|Odd-Eyes Phantom Dragon]]" and [[Tatsuhisa Kamijo (manga)|Tatsuhisa Kamijo]]'s "[[Multistrike Dragon Dragias (manga)|Multistrike Dragon Dragias]]".
  ** This card has the same Level (7) as the Main Deck signature cards of the other manga protagonists: Yugi Muto's "Dark Magician", Yuya Sakaki's "Odd-Eyes Phantom Dragon", and Tatsuhisa Kamijo's "Multistrike Dragon Dragias". 
  ** This is the first signature card of an anime protagonist to be a [[Normal Monster]] since Jaden Yuki's "Elemental Hero Neos" in ''[[Yu-Gi-Oh! GX]]''.
  ** This monster has the highest [[DEF]] (2500) of all the protagonists' signature cards.
  * This monster has 10 alternate forms:
  ** A retrained [[Effect Monster|Effect]] [[counterpart]]: "[[Galactica Oblivion Ark]]".
  ** 2 [[OuTerverSe (series)|OuTerverSe]] forms: "[[OuTerverSe Burst Oblivion]]" and its upgrade "[[OuTerverSe Endless Doom Oblivion]]".
  ** A [[God Tribute Summon]] form: "[[Galactica God Oblivion]]".
  ** 5 [[Fusion Monster|Fusion]] forms:
  *** Standard upgrade: "[[Eternal Galactica Oblivion]]".
  *** With "[[Darkness Dwarf]]": "[[Darkness Galactica Oblivion]]".
  *** [[Dark Matter (series)|Dark Matter]] related: "[[Galactica Lost Oblivion]]".
  *** With "[[Voidvelg Requiem]]": "[[Galactica Chaos Oblivion]]".
  *** With "[[Vanishing Heliacal Riser]]": "[[Galactica Rising Oblivion]]".
  ** A special Fusion with "[[Blue-Fang Burst Dragon]]" and "[[Jointech Rex]]": "[[Ultimate Trinity Stargazer]]".
  * This is the last monster to declare an attack in the ''Yu-Gi-Oh! GO RUSH!!'' anime.
