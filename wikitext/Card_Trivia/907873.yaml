title: Card Trivia:Yggdrago the Sky Emperor (R)
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maximum Ultra Enhancement Pack]]''.
  * This monster appears in the artworks of "[[Mighty Gaze of the Sky Emperor]]" and "[[Transmigration of Curiosity]]" in [[Maximum Mode]] (together with "[[Yggdrago the Sky Emperor (L)|Yggdrago the Sky Emperor [L]]]" and "[[Yggdrago the Sky Emperor]]").
  * Along with "Yggdrago [L]" and "Yggdrago", this monster is based on [[wikipedia:Yggdrasil|Yggdrasil]], the immense tree that connects the [[wikipedia:Norse cosmology|Nine Worlds]] in [[wikipedia:Norse mythology|Norse mythology]].
  * This monster's Level and the Level of "Yggdrago [L]" add up to 7, referencing the series' title ''[[Yu-Gi-Oh! SEVENS]]''.
