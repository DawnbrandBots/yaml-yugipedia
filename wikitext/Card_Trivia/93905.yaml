title: Card Trivia:Dark Strike Fighter
wikitext: |-
  {{Navigation}}

  * The explosion depicted in this card's artwork is similar to those featured in the artworks of the "[[Reactor]]" monsters.
  ** Fittingly, this monster and the "Reactor" monsters were used by [[Greiger]] in the ''[[Yu-Gi-Oh! 5D's]]'' anime, which are depicted as partly-humanoid machines resembling [[wikipedia:World War II|World War II]] aircrafts.
  * This monster has a [[retrain]]ed counterpart: "[[Infernal Strike Fighter]]"
  * This is the first [[Synchro Monster]] to become [[Forbidden]]. It was followed by "[[Goyo Guardian]]", "[[Trishula, Dragon of the Ice Barrier]]", and "[[Brionac, Dragon of the Ice Barrier]]".
  ** This is the only monster to no longer be Forbidden and have a status other than [[Limited]], as it was eventually moved from Forbidden straight to [[Unlimited]] in the ''[[OCG]]'' with the [[April 2014 Lists (OCG)|April 2014 Lists]], but only due to an [[errata]] that completely changed the mechanic of its original effect.
