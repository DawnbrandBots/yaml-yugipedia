title: Card Trivia:Full-Armored Xyz
wikitext: |-
  {{Navigation}}

  * The red-and-white suit of armor from the artwork of "[[Armored Xyz]]" appears in this card's artwork.
  * The blue-and-gold suit of armor in this card's artwork serves as the armor worn by "[[Xyz Armor Fortress]]".
  * In the ''[[Yu-Gi-Oh! ZEXAL]]'' anime, this card was used on "[[Black Ray Lancer]]" and "[[Number 94: Crystalzero]]", both of which received [[retrained]] "[[Full Armored]]" counterparts in the ''[[OCG]]''/''[[TCG]]'', based on their appearance after being affected by this card: "[[Full Armored Black Ray Lancer]]" and "[[Full Armored Crystalzero Lancer]]".
