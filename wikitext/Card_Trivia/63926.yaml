title: Card Trivia:Destiny HERO - Departed
wikitext: |-
  {{Navigation}}

  * This [[Monster Card|monster]] appears in the artwork of "[[D-Faceoff]]".
  * This card bears a close resemblance to "[[Destiny HERO - Double Dude]]".
  * This monster's design and effect is a reference to many characters who either share the same design and/or [[Special Summon]] effect, keeping in relation with the European theme of the "[[Destiny HERO]]" archetype:
  ** This monster's design and effect is likely a reference to Gray, a character from '[[wikipedia:The Body Snatcher|The Body Snatcher]]' by Robert Louis Stevenson who was killed and dissected by Dr. Wolfe Macfarlane, but was later inexplicably reanimated one night while Dr. Macfarlane is graverobbing. The nighttime background in this card's artwork and effect reflects this, as it can be revived from the [[Graveyard]] to the opponent's field after it has been destroyed.
  ** This monster's design is likely a reference to [[wikipedia:Griffin (The Invisible Man)|Griffin]], also known as the [[wikipedia:The Invisible Man|The Invisible Man]] who is often seen wearing bandages around his body. The titular novel by [[wikipedia:H. G. Wells|H. G. Wells]] takes place in the village of Iping in West Sussex, England.
  ** This monster's design featuring a tuxedo and effect of Special Summoning itself from the Graveyard is also likely a reference to the [[wikipedia:DC Comics|DC Comics]] supervillain, [[wikipedia:Gentleman Ghost|Gentleman Ghost]], a British gentleman thief who was hanged for his crimes but came back as a ghost.
