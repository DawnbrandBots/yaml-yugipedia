title: Card Trivia:A.I. Challenge You
wikitext: |-
  {{Navigation}}

  * [[Ai]] (wielding the sword of "[[Dark Templar @Ignister]]") and [[Yusaku Fujiki|Playmaker]] appear in this card's artwork.
  ** This card's artwork is a reference to the final [[Duel]] between Ai and Playmaker, which took place inside a [[Data Storm]] from {{episode|VRAINS|117|ref}} to {{episode|VRAINS|120|ref}}.
  * This card's Japanese name (果たし－Ａｉ－) is a wordplay on "Duel" (果たし合い, ''hatashiai'').
  * This card, "[[A.I. Meet You]]", and "[[You and A.I.]]" all share in common the wordplay use of the words "You" and "I" in their ''[[TCG]]'' names, with "I" being substituted with "[[A.I.]]". Fittingly, all three cards were part of the "[[@Ignister]]" support released together in ''[[Lightning Overdrive]]''.
