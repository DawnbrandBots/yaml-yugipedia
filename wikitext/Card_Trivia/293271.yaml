title: Card Trivia:Noble Knight Borz
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Bors|Sir Bors the Younger]], who was one of the three knights of the [[wikipedia:Round Table|Round Table]] that achieved the [[wikipedia:Holy Grail|Holy Grail]] (which is also depicted in this card's artwork).
  ** He is a cousin of [[wikipedia:Lancelot|Lancelot]], which "[[Ignoble Knight of Black Laundsallyn]]" is based on.
  * The "''This card becomes DARK and its Level is increased by 1.''" effect of this card is the equivalent of this monster becoming corrupt, as supported by the following shown in a Konami article: "On his own, Noble Knight Borz is only a Normal Monster, but when equipped with a Noble Arms he succumbs to the dark side and reveals his true strength."<ref>http://www.yugioh-card.com/uk/nkshowcase/04_borz.html</ref>
  ** This effect is actually a reference to the actions of Bors and Lancelot in the betrayal of [[wikipedia:King Arthur|King Arthur]], and the subsequent downfall of his kingdom.
  * This knight appears in the artwork of "[[Noble Knight Peredur]]" and "[[Noble Knights of the Round Table]]".

