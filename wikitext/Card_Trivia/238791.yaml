title: Card Trivia:Clear Robe
wikitext: |-
  {{Navigation|mode=nonGame}}

  * This card's name and artwork is reflective of the fable, "[[wikipedia:The Emperor's New Clothes|The Emperor's New Clothes]]".
  * The emperor from this card appears in the artwork of "[[Tyrant's Temper]]", "[[Tyrant's Tirade]]", "[[Tyrant's Tantrum]]", "[[Tyrant's Tummyache]]", "[[Tyrant's Throes]]", "[[Double Payback]]", "[[The Huge Revolution is Over]]", "[[Asleep at the Switch]]", "[[Turnabout]]" and "[[Retort]]".
