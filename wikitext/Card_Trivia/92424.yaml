title: Card Trivia:Toon Cannon Soldier
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Structure Deck: Pegasus]]''.
  * This monster is the [[Toon monster|Toon]] [[counterpart]] of "[[Cannon Soldier]]".
  * This is the first Toon monster to become [[Forbidden]], though only in the ''[[OCG]]''.
  * This card's Spanish name, "''Soldado Cañon''", does not match the Spanish name of "Cannon Soldier", "''Soldado Cañón''", with the difference between them being the lack of the [[wikipedia:Acute accent|acute accent]] on the letter "o" in "Cañón".
