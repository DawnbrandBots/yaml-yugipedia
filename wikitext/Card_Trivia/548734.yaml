title: Card Trivia:World Legacy's Secret
wikitext: |-
  {{Navigation}}

  * "[[Ib the World Chalice Priestess]]" and corrupted versions of "[[Lee the World Chalice Fairy]]" and "[[World Legacy - "World Chalice"]]" appear in the artwork of this card.
  ** It is likely that this depicts the creation of "[[Knightmare Corruptor Iblee]]".
  * This card is the final card in a sequence of "[[World Legacy]]" [[Spell]]/[[Trap]] cards that depict "[[Lee the World Chalice Fairy]]" becoming corrupted. In the first card, "[[World Legacy Clash]]", "Lee" can be seen with one device projecting dark red light. The second card, "[[World Legacy Trap Globe]]", depicts the light from two of the devices having turned red. In "[[World Legacy Whispers]]", three lights have turned red. Finally, this card depicts Lee after becoming seemingly fully corrupted, with all four devices cracking with dark energy.
  * Visually, this card is a dark counterpart of "[[World Legacy's Heart]]".
