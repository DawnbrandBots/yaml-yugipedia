title: Card Trivia:Sea Koala
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Darkfall]]" and "[[Out of the Blue]]".
  * This monster has a [[counterpart]]: "[[Tree Otter]]".
  ** Both are named for the same pair of animals, the [[wikipedia:koala|koala]] and [[wikipedia:sea otter|sea otter]].
  *** Their Japanese names are based on a portmanteau of "koala" and "rakko" (Japanese for "sea otter"), while their English names are based on each animal inhabiting the other's environment.
  ** Both are hybrid creatures based on their namesakes; this monster is a koala with otter-like traits, reflecting the portmanteau used for its Japanese name that has the word for "koala" first.
  ** Both feature effects that alter the [[ATK]] of monsters on the [[field]] and requires the player to [[control]] another [[Beast]] monster in order to [[activate]] it.
  ** Both are [[Fusion Material]] for the [[Fusion Summon]]ing of "[[Koalo-Koala]]".
