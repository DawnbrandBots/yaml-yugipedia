title: Card Trivia:Yormungarde
wikitext: |-
  {{Navigation}}

  * This monster is based on [[wikipedia:Jörmungandr|Jörmungandr]], an enormous sea serpent in [[wikipedia:Nordic mythology|Norse mythology]] that grew so large, it encircled the Earth and grasped its own tail with its teeth.
  * This monster has a [[recolored counterpart]]: "[[Kairyu-Shin]]".
