title: Card Trivia:Knightmare Unicorn
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[World Legacy's Nightmare]]".
  * This card appears in the artwork of "[[Extra Recovery]]".
  * "[[Knightmare Corruptor Iblee]]" appears in this card's alternate artwork.
  * This monster is based on the [[wikipedia:Unicorn|unicorn]], a mythical creature depicted as a horse with a singular horn on top of its head.
  * The [[wikipedia:Sustain pedal|sustain pedal]] asterisk symbol can be seen on this monster's head.
  * This monster is a corrupted "[[Knightmare]]" [[counterpart]] of "[[Mekk-Knight Yellow Star]]".
  ** This monster's wing-like armor is similar to that of "Yellow Star".
  ** This monster also has the same [[original ATK]] (2200) as "Yellow Star".
