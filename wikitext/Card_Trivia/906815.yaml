title: Card Trivia:Sublimation Knight
wikitext: |-
  {{Navigation}}

  * This monster's name is based on the process of [[wikipedia:Sublimation (phase transition)|sublimation]], the transition of a substance directly from the solid state to the gas state, without passing through the liquid state.
  ** This monster's Japanese name, "Expaladin", is a portmanteau of the words "''exhalatio''" (the Latin word for "evaporation") and "''paladin''".
