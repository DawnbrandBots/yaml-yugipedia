title: 'Card Trivia:Number 37: Hope Woven Dragon Spider Shark'
wikitext: |-
  {{Navigation}}

  {{Numbers trivia}}

  * The number "37" is located on this monster's right fin.
  * This monster is a transformed version of "[[Number 70: Malevolent Sin]]".
  ** In the ''[[Yu-Gi-Oh! ZEXAL (manga)|Yu-Gi-Oh! ZEXAL]]'' manga, this monster was molded by [[Ryoga Kamishiro (manga)|Ryoga Kamishiro]] using [[Kyoji Yagumo]]'s "[[No. 70: Deadly Sin (manga)|No. 70: Deadly Sin]]", after Kyoji turned it [[Blank card|blank]] again.
  *** This monster's name and combined appearance of a spider and a shark reflects the bond between Kyoji and Shark, who used "[[Spider]]" and "[[Shark (archetype)|Shark]]" Decks in the manga, respectively.
  *** Also, "Hope" references [[Yuma Tsukumo (manga)|Yuma Tsukumo]] (whose [[signature card]] is "[[No. 39: Utopia (manga)|Number 39: Utopia]]", whose Japanese name is "King of Wishes, Hope") and [[Kaito Tenjo (manga)|Kaito Tenjo]] (whose signature card is "[[Galaxy-Eyes Photon Dragon]]") respectively, which implies that this monster represents the bond of all four Duelists together.
  * This monster has a "[[Number S]]" [[Card evolutions|upgraded form]]: "[[Number S37: Spider Shark]]".
  * This monster shares the same [[Attribute]] ([[WATER]]), [[Rank]] (4), [[Type]] ([[Sea Serpent]]), [[original ATK and DEF]] (2600/2100), and [[Xyz Material]] requirement as "[[Bahamut Shark]]", Ryoga's signature card in the manga.
  ** This monster has the the opposite number of "[[Number 73: Abyss Splash]]", which was used by [[Reginald Kastle|Reginald "Shark" Kastle]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime.
  ** This monster has the same white color scheme of "[[Number C32: Shark Drake Veiss]]", which was used by Shark in the anime.
  * This card's ''[[OCG]]''/''[[TCG]]'' artwork is taken from {{chapter|ZEXAL|048|ref}}, specifically from the panel showing [[No. 37: Hope Woven Dragon Spider Shark (manga)|this monster]] being Summoned.
