title: Card Trivia:Nekroz Kaleidoscope
wikitext: |-
  {{Navigation}}

  * "[[Shurit, Strategist of the Nekroz]]" and the silhouettes of "[[Brionac, Dragon of the Ice Barrier]]", "[[Gungnir, Dragon of the Ice Barrier]]" and "[[Trishula, Dragon of the Ice Barrier]]" appear in this card's artwork.
  ** This is odd, as "[[Nekroz of Gungnir]]" is actually created using "[[Dance Princess of the Nekroz]]".
  * This is the first, and currently only, [[Ritual Spell Card]] that can be used to [[Ritual Summon]] more than one [[Ritual Monster]] upon activation. It is also the first Ritual Spell Card that lets monsters be sent from your [[Extra Deck]] to the [[Graveyard]] to Ritual Summon.
