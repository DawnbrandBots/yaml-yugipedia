title: Card Trivia:Dimension Linker
wikitext: |-
  {{Navigation}}

  * This is the first non-[[Action Card]] to debut in ''[[Yu-Gi-Oh! Duel Links]]'' before appearing in any other medium.
  * The [[Duel World (Duel Links)#Gate|Gate]] from ''Yu-Gi-Oh! Duel Links'' appears in this monster's artwork.
  * The "nine dimensions" in this card's [[flavor text]] could be a reference to the nine Duel Worlds of ''Yu-Gi-Oh! Duel Links'', based on the eight anime series and ''[[Yu-Gi-Oh! The Dark Side of Dimensions]]''.
  * This card's [[flavor text]] makes references to elements seen in ''[[Yu-Gi-Oh! GO RUSH!!]]''.
  **  The line "''Her blade, wielded alongside countless Duelists, is not meant to sever, but to unite''", is a reference to [[Yudias Velgear]], who uses a sword and has an ideology of using [[Rush Duel]]s to forge friendships with other people, which puts him at odds with several characters throughout ''GO RUSH!!''
  ** The line "''People's hope link beyond time and space''", is a reference to several plot threads in ''GO RUSH!'', especially the existence of Rush Duels in a different time and space than that seen in ''[[Yu-Gi-Oh! SEVENS]]''.
  *** The line may also be an indirect reference to [[Yuga Ohdo|That Guy]], who appears in ''GO RUSH!!'' and meets Yudias Velgear, creating a friendship through Rush Duels where each one comes from a different world.
