title: Card Trivia:Giltia the D. Knight - Soul Spear
wikitext: |-
  {{Navigation}}

  * This monster is the [[signature move]] [[counterpart]] of "[[Giltia the D. Knight]]".
  ** This monster's name is based on the [[Attack and effect names in Yu-Gi-Oh!|attack name]] of "Giltia the D. Knight" in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga and [[Yu-Gi-Oh! (anime)|anime]].
  ** This monster's effect to [[Normal Summon]] itself without [[Tribute|Tributing]] is based on the appearance of "[[Giltia the D. Knight (manga)|Giltia the D. Knight]]" in the ''Yu-Gi-Oh!'' manga and anime, where it was Normal Summoned under the "[[Duel Monsters#Basic|Basic]]" rules of ''[[Duel Monsters]]'' that allow players to Normal Summon any monster from their [[hand]].
  ** This monster's effect to [[banish]] a monster when it is Normal Summoned is based on the appearance of "Giltia the D. Knight" during [[Katsuya Jonouchi and Esper Roba's Duel (manga)|Katsuya Jonouchi and Esper Roba's Duel]], where [[Katsuya Jonouchi]] Normal Summoned it without Tribute, not realizing that the [[Battle City Rules|Super Expert Rules]] required him to Tribute 1 monster; because this was an illegal action, "Giltia the D. Knight" was immediately removed from play.
  ** This monster's effect to [[add]] the bulleted monsters reference the monsters earned by Jonouchi, which includes "[[Red-Eyes Black Dragon]]" (a [[Level 7]] [[DARK]] [[Dragon]]), "[[Jinzo]]" (a [[Level 6]] DARK [[Machine]]), and "[[The Legendary Fisherman]]" (a [[Level 5]] [[WATER]] [[Warrior]]).
