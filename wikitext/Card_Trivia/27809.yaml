title: Card Trivia:Enemy Controller
wikitext: |-
  {{Navigation}}

  * The controller in this card's artwork appears in the artwork of "[[Union Controller]]".
  * The shape of the controller in this card's artwork appears similar to the [[wikipedia:Sega Genesis|Sega Mega Drive/Genesis]] controller or the [[wikipedia:Sega Saturn|Sega Saturn]] controller, but the cord location is that of a [[wikipedia:Dreamcast|Sega Dreamcast]] controller.
  * This card has a "[[Speed Spell (archetype)|Speed Spell]]" counterpart: "[[Speed Spell - Enemy Controller]]".
