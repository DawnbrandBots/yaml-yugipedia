title: Card Trivia:"Infernoble Arms - Hauteclere"
wikitext: |-
  {{Navigation}}

  * These swords appear in the artworks of "[[Gearbreed]]" and "[[Noble Arms Museum]]".
  * This card is based on [[wikipedia:Hauteclere|Hauteclere]], the sword of the paladin [[wikipedia:Oliver (paladin)|Oliver]].
  ** Fittingly, a flaming version of these swords appears in the artworks of "[[Infernoble Knight Oliver]]" and "[[Infernoble Knight Captain Oliver]]".
