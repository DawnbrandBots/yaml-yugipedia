title: Card Trivia:Secrets of the Gallant
wikitext: |-
  {{Navigation}}

  * This card's artwork and name are references to "[[Goe Goe the Gallant Ninja]]".
  ** This card is similar to "[[Introduction to Gallantry]]", another [[Trap Card]] that references "Goe Goe the Gallant Ninja" and features a conditional effect that forces the opponent to [[discard]] random cards.
  * In ''[[Yu-Gi-Oh! 5D's World Championship 2009: Stardust Accelerator]]'', when "Goe Goe the Gallant Ninja" is on the field, its non-card sprite appears to be standing on the box appearing in this card's artwork.
