title: Card Trivia:Blackwing - Delta Union
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Blackwing - Gale the Whirlwind]]", "[[Blackwing - Gram the Shining Star]]", "[[Blackwing Armor Master]]" and "[[The Wicked Avatar]]" appear in this card's artwork.
  ** This card's name, artwork, and effect reference a scene from {{chapter|R|040|ref}} where [[Dark Yugi (manga)|Dark Yugi]] attempted to overcome the effect of "[[The Wicked Avatar (manga)|The Wicked Avatar]]" using "[[Union Attack (manga)|Union Attack]]" (a [[Spell Card]] with a similar name and effect).
