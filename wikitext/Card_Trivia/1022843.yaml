title: Card Trivia:Celeb Robe - Death Wind
wikitext: |-
  {{Navigation}}

  * This card, along with "[[Celeb Blade - Death Wild]]", "[[Celeb Blouse - Death One Shoulder]]", and "[[Celeb Brace - Death Wise]]", contains a pun on "desu wa" (ですわ) in their names, which is a suffix that's typically used at the end of sentences by snobbish and high-class women, reflecting [[Yuna Goha]]'s character.
