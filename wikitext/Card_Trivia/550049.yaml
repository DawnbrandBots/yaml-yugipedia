title: Card Trivia:Darkest Diabolos, Lord of the Lair
wikitext: |-
  {{Navigation}}

  * This is the [[cover card]] of ''[[Structure Deck R: Curse of the Dark]]''/''[[Structure Deck: Lair of Darkness]]''.
  * This monster appears in the artwork of "[[Lair of Darkness]]".
  * This card's name is based on ''Diabolus'', the Greek word for the [[wikipedia:Devil|Devil]].
  ** This card's [[Dragon]] [[Type]] is based on the Devil assuming the form of a dragon while battling the archangel [[wikipedia:Michael (archangel)|Michael]] in the [[wikipedia:Bible|Bible]].
  * This monster is an [[Card evolutions|upgraded]] form of "[[Diabolos, King of the Abyss]]".
  * The monster's barbed tail and the red sigils on its scales are similar to those of the "[[Lady of Lament]]" monsters.
