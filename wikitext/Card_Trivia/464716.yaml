title: Card Trivia:Terminal World NEXT
wikitext: |-
  {{Navigation}}

  * This card is a counterpart of "[[Terminal World]]".
  ** This card is named after ''[[Duel Terminal NEXT]]'', an upgraded version of ''[[Duel Terminal]]'' released in Japan that could record player information.
  ** This card's effect references the [[Speed Duel (Duel Terminal)|Speed Duel]] format, which only allows the usage of three monster zones from the start.
