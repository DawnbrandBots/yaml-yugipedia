title: Card Trivia:Myutant Cry
wikitext: |-
  {{Navigation}}

  * One of the tendrils of "[[Myutant Ultimus]]" appears in this card's artwork.
  ** Judging by the flames in this card's artwork, and considering the size of the monster as shown in its card's artwork, it seems that "Ultimus" is the result of the "[[Myutant]]" experiment going out of control.
