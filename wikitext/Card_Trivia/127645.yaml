  * The armor of "[[Masked HERO Dark Law]]" appears in this card's artwork.
  ** This card's name and artwork are a reference to how most [[wikipedia:Kamen Rider|Kamen Riders]] from the [[wikipedia:Heisei|Heisei]] and [[wikipedia:Reiwa|Reiwa]] eras changed their form to gain advantage over their enemies.
