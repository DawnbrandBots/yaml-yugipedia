title: Card Trivia:Ritual Sanctuary
wikitext: |-
  {{Navigation}}

  * "[[Sky Striker Ace - Raye]]" and "[[Sky Striker Ace - Roze]]" appear in this card's alternate artwork.
  * This card's name and artwork is a reference to [[wikipedia:marriage|marriage]], a matrimonial "ritual" that mostly takes place inside a church (which is often referred to as "sanctuary").
  ** In the ''[[Yu-Gi-Oh! GX]]'' anime, when this card is [[activate]]d, the entire [[field]] would transform into the interior of a church steeple where marriages are often performed. 
  *** Fittingly, in {{episode|GX|047|ref}}, [[Alexis Rhodes]] first used this card during her Duel against a lovesick [[Chazz Princeton]], who [[control]]led "[[Ojama King]]" [[equip]]ped with "[[Dress Up]]", which resembled a wedding tuxedo, keeping in relation with the love theme of the episode.
  ** A [[Ritual Sanctuary (alternate password)|one-of-a-kind]] version of this card [[Gift for Hajime Syacho|was given to]] [[wikipedia:Hajime Syacho|Hajime Syacho]], the voice actor of [[Dohl]] in the ''[[Yu-Gi-Oh! SEVENS]]'' anime, as a wedding gift.
  *** This specific card features the unique [[password]] 20250830, matching the wedding date.
