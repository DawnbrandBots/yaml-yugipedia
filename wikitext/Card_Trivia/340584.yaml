title: Card Trivia:Red-Eyes Black Flare Dragon
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Red-Eyes Fusion]]" and "[[Return of the Red-Eyes]]".
  * This monster is a [[Gemini monster|Gemini]] [[counterpart]] of "[[Red-Eyes Black Dragon]]".
  ** This monster has a second pair of smaller wings and an extra "head" that makes up its jawline, likely referencing it being a Gemini monster.
  ** This monster's Gemini effect is based on "[[Inferno Fire Blast]]", a [[Spell Card]] that [[support]]s "Red-Eyes Black Dragon", which inflicts damage to the opponent equal to its [[original ATK]] (2400); however, unlike "Inferno Fire Blast", after it has been used, this monster's effect does not prevent it from attacking.
  * This monster has an [[Xyz Monster|Xyz]] [[Metal counterpart]]: "[[Red-Eyes Flare Metal Dragon]]".
