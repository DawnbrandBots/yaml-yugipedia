title: Card Trivia:Myutant Ultimus
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[World Premiere Pack 2021]]''.
  * This monster appears in the artwork of "[[Myutant Cry]]".
  * This monster is the [[Card evolutions|evolved]] form of "[[Myutant Synthesis]]".
  ** Judging by the additional eyes, this monster is the [[Fusion Monster|Fusion]] of "Synthesis" (which itself is the penultimate Fusion of "[[Myutant M-05]]", "[[Myutant ST-46|ST-46]]", and "[[Myutant GB-88|GB-88]]") with the other "[[Myutant]]s" shown in "[[Myutant Evolution Lab]]", which have been further assimilated by "Synthesis". Therefore, as its name implies, this monster is the ultimate mutated form of all "Myutant" monsters.
  * For comparison with the massive scale of this monster, a helicopter can be seen in the bottom-left corner of this card's artwork.
  ** Judging by the flames in the artwork of "Myutant Cry", and considering the size of this monster, it seems that this monster is the result of the "Myutant" experiment going out of control.
