title: 'Card Trivia:Number 67: Pair-a-Dice Smasher'
wikitext: |-
  {{Navigation}}
  {{Numbers trivia}}

  * This monster is a reference to the [[dice game]] [[Dark Yugi (manga)|Dark Yugi]] and the [[ZTV director]] play in {{chapter|Yu-Gi-Oh!|002|ref}}.
  ** This card's first effect causes both players to roll a die and imposes a penalty on the player with the higher total, referencing how the player who rolled the lowest number in the dice game won.
  ** This monster's hammer having a head which is a single die split in two, as well as its effect to treat a single die result as 7, may be a reference to how Dark Yugi wins the dice game in the ''[[Yu-Gi-Oh! (manga)|Yu-Gi-Oh!]]'' manga: after Dark Yugi rolled 6 on his die, the director assumed that he would win no matter what he rolled, and when Dark Yugi insisted he make his roll, the director threw the die at Dark Yugi's face; Dark Yugi deflected the die with the [[Millennium Puzzle]], causing the die to break in two, and both the 6 and 1 faces of each half were face-up, making the director's roll 7.
  * This monster's [[original ATK and DEF]] of 2100/2100 are based on the sum of all possible die rolls: 6 + 5 + 4 + 3 + 2 + 1 = 21.
