title: Card Trivia:Morgana the Witch of Eyes
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Play the Diabell]]" and "[[Sinful Spoils Awakening]]", both of which were released months before this card.
  * "[[Guilt-Gripping Morganite]]", "[[Succumbing-Song Morganite]]", and "[[Time-Tearing Morganite]]" appear in this card's artwork.
  * This monster has an [[counterpart|upgraded]] "[[Azamina]]" [[Fusion Monster|Fusion]] counterpart: "[[Azamina Moa Regina]]".

  == See also ==
