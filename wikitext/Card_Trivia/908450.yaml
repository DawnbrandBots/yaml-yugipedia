title: Card Trivia:Afterglow
wikitext: |-
  {{Navigation}}

  * In the ''[[Yu-Gi-Oh! 5D's]]'' anime, this card represented his hope for a better future, according to its owner [[Aporia]].
  ** This card's name reflects its artwork, which depicts a ruined city setting with the background featuring an [[wikipedia:Afterglow|afterglow]], the remaining light in the sky sometime after the sun has set.
  *** The ruined city is similar to the setting of the ruined future in the anime following the [[Meklord Emperor Genocide]], which Aporia originated from, and represents how he initially embodied despair until he first felt hope following the loss in his [[Duel]] against [[Jack Atlas]], [[Leo]], and [[Luna]] in {{episode|5D's|143|ref}}.
  ** "Afterglow" is also defined as a good feeling after a pleasurable or successful experience, which also represents Aporia's shift from despondence to hope for the future. This card's effect to inflict 4000 damage if the card you [[Draw a card|draw]] in the next [[Draw Phase]] is "Afterglow" reflects this meaning.
  *** Aporia uses this card once in the ''Yu-Gi-Oh! 5D's'' anime in his Duel against [[Z-one]] in {{episode|5D's|147|ref}}: despite initially ensuring that he would draw this card during his next Draw Phase, the effect of Z-one's "[[Lazion, the Timelord (anime)|Lazion the Timelord]]" [[shuffle]]s back his whole [[Deck]] from the [[Graveyard]]. This causes him to instead draw "[[Meklord Emperor Granel (anime)|Meklord Emperor Granel]]", the card that represented the very cause of his despair, which results in his defeat.
