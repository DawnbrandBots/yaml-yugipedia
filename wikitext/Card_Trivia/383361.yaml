title: Card Trivia:Lunalight White Rabbit
wikitext: |-
  {{Navigation}}

  * This monster appears in the artworks of "[[Lunalight Masquerade]]" and "[[Lunalight Reincarnation Dance]]".
  * This monster's design and being part of the "[[Lunalight]]" [[archetype]] reference the [[wikipedia:Moon rabbit|Moon rabbit]], a mythical figure in Eastern Asian and Indigenous American folklore based on the interpretations of the dark markings on the Moon resembling a rabbit.
  ** This monster's mallet is based on the myth of the Moon rabbit in Japanese folklore, where it lives on the Moon and pounds the ingredients for rice cake in a pestle with a mallet.
