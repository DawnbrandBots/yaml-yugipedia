title: Card Trivia:Naturia Barkion
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Duel Terminal - Champion of Chaos!!]]''.
  * This monster appears in the artworks of "[[Black Return]]", "[[Infinite Feast]]", "[[Naturia Forest]]", and "[[Synchro Creed]]".
  * This monster is based on the [[wikipedia:Azure Dragon|Seiryu]], the Azure Dragon, one of the [[wikipedia:Four Symbols|Four Symbols]] of the [[wikipedia:Chinese constellations|Chinese constellations]] that represents the cardinal direction of the east in [[wikipedia:Chinese mythology|Chinese mythology]].
  ** This is reinforced by this monster's connection with "[[Naturia Beast]]" and "[[Naturia Landoise]]", who are each based on the other two of the Four Symbols from Chinese mythology ([[wikipedia:White Tiger (mythology)|Byakko]] and [[wikipedia:Black Turtle-Snake|Genbu]] respectively), and they feature [[Quick Effect]]s that [[negate]] the [[activate|activation]] of a card of a specific [[Card type|type]].
