title: Card Trivia:Heroic Growth
wikitext: |-
  {{Navigation|mode=nonGame}}

  * "[[Heroic Champion - Excalibur]]" appears in this card's artwork.
  * This card is a [[Warrior]]-specific [[counterpart]] of "[[Megamorph]]".
  ** Both cards also have similar names: this card is named "Heroic Growth", while "Megamorph's" Japanese name translates to "Giant Growth".
