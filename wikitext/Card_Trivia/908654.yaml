title: Card Trivia:The Bystial Lubellion
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Branded Befallen]]" and "[[The Bystial Alba Los]]".
  ** This monster is the one controlling "Alba Los".
  * This monster is an empowered form of "[[The Bystial Aluber]]", gained by absorbing some of the power of "The Bystial Alba Los".
  ** This card is also a "[[Bystial]]" counterpart of "[[Lubellion the Searing Dragon]]".
  *** Both monsters have the same [[Attribute]] ([[LIGHT]]), [[Type]] ([[Dragon]]), [[Level]] (8), [[ATK]] (2500), and [[DEF]] (3000).
  ** This monster also bears the appearance of "[[Alba-Lenatus the Abyss Dragon]]", albeit armored.
  * This monster's metallic appearance is very similar to that of "[[Titaniklad the Ash Dragon]]".
