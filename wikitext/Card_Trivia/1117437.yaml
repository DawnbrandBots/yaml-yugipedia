title: Card Trivia:Uzuhime the Manifested Mikanko
wikitext: |-
  {{Navigation}}

  * This is one of the [[cover card]]s of ''[[Maze of Muertos]]'' and ''[[Tactical-Try Pack: Dark Magic / HERO / Mikanko]]''.
  * This monster appears in the artwork of "[[Mikanko Shinbu - Noble Twins]]".
  * This monster is named after [[wikipedia:Ame-no-Uzume|Ame-no-Uzume-no-Mikoto]], the Shinto goddess of dancing and happiness.
  * This monster is the upgraded combined form of "[[Ni-Ni the Mirror Mikanko]]" and "[[Ha-Re the Sword Mikanko]]".
