title: Card Trivia:Soul Levy
wikitext: |-
  {{Navigation}}

  * "[[Doomking Balerdroch]]" and "[[Soul-Absorbing Bone Tower]]" appear in this card's artwork.
  ** Fittingly, this card's effect is reminiscent of the effect of "Bone Tower".
  *** In addition, "Bone Tower" also appears behind "Doomking Balerdroch" in the latter card's artwork.
