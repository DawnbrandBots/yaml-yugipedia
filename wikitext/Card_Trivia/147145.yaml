title: Card Trivia:TG-SX1
wikitext: |-
  {{Navigation}}

  * Multiple [[Level]] stars and [[Synchro Summon]]ing rings appear in this card's artwork, in the canister on the lower left side.
  * This card's name reflects its effect to [[Special Summon]] a "[[T.G.]]" [[Synchro Monster]] from the [[Graveyard]].
  ** "TG" stands for "T.G.", "S" stands for "summon", and "X1" represents the one "T.G." "Synchro Monster" [[target]]ed by this card's effect, as "X" represents the "T.G." Synchro Monster [[card type]] in their Japanese anime name.
