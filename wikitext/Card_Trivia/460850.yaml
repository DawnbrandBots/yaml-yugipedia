title: Card Trivia:Toadally Awesome
wikitext: |-
  {{Navigation}}

  * This monster appears in the artwork of "[[Rain of Frogs]]", and "[[Two Toads with One Sting]]".
  * According to this monster's description in ''[[Yu-Gi-Oh! Master Duel]]'', the two toads are parent and child.
  ** They may also be a reference to not only this monster's [[Rank]], but also its required [[Xyz Material]]s.
  * This monster's Japanese name ({{Ruby|餅|もち}}カエル, ''Mochikaeru'') is a portmanteau of the words "''mochikaeru''" (持ち帰る, lit. "to take home"), "''mochi''" (餅, lit. [[wikipedia:mochi|mochi]]), and ''kaeru'' (かえる, lit. "frog").
  ** This monster's appearance is based on ''[[wikipedia:Kagami mochi|Kagami mochi]]'', a traditional [[wikipedia:Japanese New Year|Japanese New Year]] decoration consisting of two round ''mochi'' with the smaller placed on top of the larger, topped with a [[wikipedia:Bitter orange|bitter orange]].
  ** This monster's effect reflects "to take home", as it allows the player to "carry" another "[[Frog]]" monster from the [[Deck]] to the [[field]], as well as "carry" an opponent's [[negate]]d card effect to the player's "home" field [[face-down]].
  ** This monster's ''[[TCG]]'' name is a pun on the expression "totally awesome" and the word "Toad".
  * This is one of the few monsters in the ''TCG'' whose name does not include nouns, instead consisting of an adjective and an adverb.
