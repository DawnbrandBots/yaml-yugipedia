  | text         = 2 [[Level]] 4 [[Monster Card|monsters]]<br />This card is [[unaffected]] by Trap [[effect]]s while it has [[Xyz Material]]. "[[Traptrix]]" monsters you [[control]], except "Traptrix Rafflesia", cannot be [[destroyed by battle]] or card effects. Your opponent cannot [[target]] "Traptrix" monsters you control, except "Traptrix Rafflesia", with card effects. [[Once per turn]], during either player's turn: You can [[detach]] 1 Xyz Material from this card and [[send]] 1 "[[Hole (disambiguation)|Hole]]" [[Normal Trap Card]] that meets its [[Activation requirement|activation conditions]] from your [[Main Deck|Deck]] to the Graveyard; this effect becomes that Trap Card's effect when that card is [[activate]]d.
