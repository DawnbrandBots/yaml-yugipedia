  | text         = To [[activate]] this card, you must [[Draw a card|draw]] it for your [[normal draw]] in your [[Draw Phase]], [[reveal]] it, and keep it revealed until the start of [[Main Phase 1]]. At the start of your Main Phase 1 that same [[turn]], you can: [[Special Summon]], from your [[Extra Deck]] or [[Graveyard]], 1 [[Monster Card|monster]] that has a [[number]] between [[Number 10X|"Number 101" and "Number 107"]] in its name, except "[[Number C]]" monsters, then Xyz Summon, from your Extra Deck, 1 "Number C" monster with [[Number C10X|the same number in its name as the first monster]], by using it as the [[Xyz Material]]. You can only apply the [[effect]] of "Rank-Up-Magic - The Seventh One" once per [[Duel]].
