  | text         = You can [[send]] 1 [[Spellcaster]] [[monster]], or 1 [[Spell]]/[[Trap]] that mentions "[[Dark Magician (Duel Links)|Dark Magician]]", from your [[hand]] or [[face-up]] [[field]] to the [[Graveyard]]; [[Special Summon]] this card from your hand. During your [[Main Phase]]: You can [[Fusion Summon]] 1 [[Fusion Monster]] from your [[Extra Deck]], using monsters from your hand or field as [[material]], including a Spellcaster-Type monster. You can only use each [[effect]] of "Timaeus the United Dragon" [[once per turn]].
  | fr_text      = Vous pouvez envoyer 1 monstre Magicien, ou 1 Magie/Piège qui mentionne "Magicien Sombre", depuis votre main ou Terrain face recto au Cimetière ; Invoquez Spécialement cette carte depuis votre main. Durant votre Main Phase : vous pouvez Invoquer par Fusion 1 Monstre Fusion depuis votre Extra Deck, en utilisant des monstres depuis votre main ou Terrain comme Matériel (un monstre Magicien inclus). Vous ne pouvez utiliser chaque effet de "Timée le Dragon Uni" qu'une fois par tour.
  | de_text      = Du kannst 1 Hexer-Monster oder 1 Zauber/Falle, der oder die „Dunkler Magier“ erwähnt, von deiner Hand oder offen von deiner Spielfeldseite auf den Friedhof legen; beschwöre diese Karte als Spezialbeschwörung von deiner Hand. Während deiner Main Phase: Du kannst 1 Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck beschwören, verwende dafür Monster von deiner Hand oder Spielfeldseite als Material, darunter ein Hexer-Monster. Du kannst jeden Effekt von „Timaeus der vereinte Drache“ nur einmal pro Spielzug verwenden.
  | it_text      = Puoi mandare 1 mostro Incantatore, o 1 Magia/Trappola che menziona "Mago Nero", dalla tua mano o Terreno scoperto al Cimitero; Evoca Specialmente questa carta dalla tua mano. Durante la tua Main Phase: puoi Evocare tramite Fusione 1 Mostro Fusione dal tuo Extra Deck, utilizzando mostri dalla tua mano o Terreno come materiale, compreso un mostro Incantatore. Puoi utilizzare ogni effetto di "Timaeus il Drago Unito" una sola volta per turno.
  | es_text      = Puedes mandar al Cementerio 1 monstruo Lanzador de Conjuros o 1 Mágica/Trampa que mencione "Mago Oscuro", en tu mano o Campo boca arriba; Invoca esta carta de Modo Especial desde tu mano. Durante tu Main Phase: puedes Invocar por Fusión 1 Monstruo de Fusión desde tu Deck Extra, usando monstruos en tu mano o Campo como material, incluyendo un monstruo Lanzador de Conjuros. Sólo puedes usar cada efecto de "Timaeus el Dragón Unido" una vez por turno.
  | ja_text      = このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、自分の手札・フィールド（表側表示）から魔法使い族モンスター１体または「ブラック・マジシャン」のカード名が記された魔法・罠カード１枚を墓地へ送って発動できる。このカードを特殊召喚する。②：自分メインフェイズに発動できる。魔法使い族モンスターを含む、自分の手札・フィールドのモンスターを融合素材とし、融合モンスター１体を融合召喚する。
  | ko_text      = 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재할 경우, 자신의 패 / 필드(앞면 표시)에서 마법사족 몬스터 1장 또는 "블랙 매지션"의 카드명이 쓰여진 마법 / 함정 카드 1장을 묘지로 보내고 발동할 수 있다. 이 카드를 특수 소환한다. ②: 자신 메인 페이즈에 발동할 수 있다. 마법사족 몬스터를 포함하는, 자신의 패 / 필드의 몬스터를 융합 소재로 하고, 융합 몬스터 1장을 융합 소환한다.
