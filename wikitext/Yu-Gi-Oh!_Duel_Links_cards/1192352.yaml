  | text         = 1 "[[Shaddoll]]" [[Monster Card|monster]] + 1 [[FIRE]] monster<br />Must first be [[Fusion Summon]]ed. During either player's turn, when your opponent would [[Special Summon]] a monster(s) while you have a "Shaddoll" card in your [[hand]]: You can [[negate]] the [[Summon]], and if you do, [[destroy]] that monster, then [[send]] 1 "Shaddoll" card from your hand to the [[Graveyard]]. You can only use this [[effect]] of "El Shaddoll Grysta" [[once per turn]]. If this card is sent to the Graveyard: You can [[target]] 1 "Shaddoll" [[Spell Card|Spell]]/[[Trap Card]] in your Graveyard; [[Add a card|add]] it to your hand.
  | fr_text      = 1 monstre "Marionnette de l'Ombre" + 1 monstre FEU<br />Doit d'abord être Invoquée par Fusion. Durant le tour de chaque joueur, lorsque votre adversaire va Invoquer Spécialement un ou plusieurs monstres tant que vous avez une carte "Marionnette de l'Ombre" dans votre main : vous pouvez annuler l'Invocation, et si vous le faites, détruisez le monstre, puis envoyez 1 carte "Marionnette de l'Ombre" depuis votre main au Cimetière. Vous ne pouvez utiliser cet effet de "Grysta Marionnette de l'Ombre El" qu'une fois par tour. Si cette carte est envoyée au Cimetière : vous pouvez cibler 1 Carte Magie/Piège "Marionnette de l'Ombre" dans votre Cimetière ; ajoutez-la à votre main.
