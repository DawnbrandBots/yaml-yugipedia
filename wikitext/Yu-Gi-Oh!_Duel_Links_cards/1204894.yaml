  | fr_text               = 2 monstres de Niveau 7<br />Vous pouvez aussi Invoquer par Xyz cette carte en utilisant un Monstre Xyz "Rébellion" que vous contrôlez comme Matériel. (Transférez ses Matériels à cette carte.) Si vous pouvez effectuer une Invocation Pendule de Niveau 7, vous pouvez Invoquer par Pendulation cette carte face recto depuis votre Extra Deck. Cette carte, qui a été Invoquée par Xyz en utilisant un Monstre Xyz de Rang 7 comme Matériel, peut faire max. 3 attaques durant chaque Battle Phase. Si cette carte dans la Zone Monstre est détruite : vous pouvez placer cette carte dans votre Zone Pendule. Vous ne pouvez Invoquer Spécialement un ou plusieurs "Chef Suprême Dragon de la Rébellion aux Yeux Impairs" qu'une fois par tour.
