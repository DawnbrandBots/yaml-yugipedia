  | de_text   = ''Ein Zauberschwert, das sich selbst mithilfe einer Feuergeistpuppe führt. Es heißt, dass das Schwert denjenigen als seinen wahren Meister anerkennt, der den Flammengeist besiegen kann.''
  | it_text   = ''Una spada magica che usa una marionetta di uno spirito infuocato per brandirsi da sola. Si dice che la spada conceda il potere di brandirla a chi sa sconfiggere lo spirito infuocato.''
  | es_text   = ''Una espada mágica que usa un espíritu de fuego para blandirse. Dicen que reconocerá como su verdadero portador a quien venza al espíritu de fuego.''
  | ja_text   = 傀儡の炎魔に自身を振るわせる魔剣。炎魔との仕合に勝った者は、魔剣に真の使い手として認められるらしい。
  | ko_text   = 괴뢰의 염마에게 자신을 휘둘르는 마검. 염마와의 시합에서 이긴 자는, 마검에게 진정한 마스터로 인정받는 듯하다.
