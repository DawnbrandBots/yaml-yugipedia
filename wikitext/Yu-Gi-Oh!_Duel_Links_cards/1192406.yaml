  | text         = 3 [[Level]] 4 [[Monster Card|monsters]]<br />[[Once per turn]], you can also [[Xyz Summon]] "Zoodiac Tigermortar" by using 1 "[[Zoodiac]]" monster you [[control]] with a different name as [[Xyz Material]]. (If you used an [[Xyz Monster]], any Xyz Materials [[attach]]ed to it also become Xyz Materials on this card.) This card gains [[ATK]] and [[DEF]] equal to the ATK and DEF of all "Zoodiac" monsters attached to it as [[Material]]s. Once per turn: You can [[detach]] 1 Xyz Material from this card, then [[target]] 1 Xyz Monster you control and 1 "Zoodiac" monster in your [[Graveyard]]; attach that "Zoodiac" monster to that Xyz Monster as Xyz Material.
