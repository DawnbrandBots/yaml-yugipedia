  | text         = 5 [[Level]] 4 [[Monster Card|monsters]]<br />[[Once per turn]], you can also [[Xyz Summon]] "Zoodiac Boarbow" by using 1 "[[Zoodiac]]" monster you [[control]] with a different name as [[Xyz Material]]. (If you used an Xyz Monster, any Xyz Materials attached to it also become Xyz Materials on this card.) This card gains [[ATK]] and [[DEF]] equal to the ATK and DEF of all "Zoodiac" monsters attached to it as [[Material]]s. This card can [[attack]] your opponent [[Direct attack|directly]]. When this card inflicts [[battle damage]] to your opponent while it has 12 or more Xyz Materials: You can [[send]] as many cards as possible from your opponent's [[hand]] and [[field]] to the [[Graveyard]], then change this card to [[Defense Position]].
