  | text         = 4 [[Level]] 9 [[Monster Card|monsters]]<br />Must be [[Special Summon]]ed with a "[[Rank-Up-Magic]]" [[Spell]] [[target]]ing "[[Number 88: Gimmick Puppet of Leo (Duel Links)|Number 88: Gimmick Puppet of Leo]]". Neither player can target this card on the field with card [[effect]]s. [[Once per turn]]: You can [[detach]] 1 [[material]] from this card; inflict 500 [[Effect damage|damage]] to your opponent. During your [[End Phase]], if your opponent's [[LP]] are 2000 or less, and this card has no materials, you win the [[Duel]].
  | fr_text      = 4 monstres de Niveau 9<br />Uniquement Invocable Spécialement avec une Magie "Magie-Rang-Plus" ciblant "Numéro 88 : Poupée Truquée de Lion". Aucun joueur ne peut cibler cette carte sur le Terrain avec des effets de carte. Une fois par tour : vous pouvez détacher 1 Matériel de cette carte ; infligez 500 points de dommages à votre adversaire. Durant votre End Phase, si votre adversaire a max. 2000 LP et que cette carte n'a pas de Matériel, vous gagnez le Duel.
  | de_text      = 4 Monster der Stufe 9<br />Muss mit einem „Rangsteigerungszauber“-Zauber, der „Nummer 88: Gimmick-Marionette Leo“ als Ziel wählt, als Spezialbeschwörung beschworen werden. Kein Spieler kann diese Karte auf dem Spielfeld als Ziel für Karteneffekte wählen. Einmal pro Spielzug: Du kannst 1 Material von dieser Karte abhängen; füge deinem Gegner 500 Schaden zu. Während deiner End Phase, falls dein Gegner 2000 oder weniger LP und diese Karte kein Material hat, gewinnst du das Duell.
  | it_text      = 4 mostri di Livello 9<br />Deve essere Evocato Specialmente con una Magia "Alza-Rango-Magico" che sceglie come bersaglio "Numero 88: Burattino Arnese del Leone". Nessun giocatore può scegliere come bersaglio questa carta sul Terreno con gli effetti delle carte. Una volta per turno: puoi staccare 1 materiale da questa carta; infliggi 500 danni al tuo avversario. Durante la tua End Phase, se i LP del tuo avversario sono 2000 o inferiori e questa carta non ha materiali, vinci il Duello.
  | es_text      = 4 monstruos de Nivel 9<br />Debe ser Invocado de Modo Especial con una Mágica "Magia de Subida de Rango" que seleccione "Número 88: Marioneta Trucada de Leo". Ningún jugador puede seleccionar esta carta en el Campo con efectos de cartas. Una vez por turno: puedes desacoplar 1 material de esta carta; inflige 500 puntos de daño a tu adversario. Durante tu End Phase, si los LP de tu adversario son 2000 o menos y esta carta no tiene materiales, ganas el Duelo.
