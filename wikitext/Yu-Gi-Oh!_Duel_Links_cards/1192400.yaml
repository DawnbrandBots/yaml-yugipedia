  | text         = 2 "[[Tri-Brigade]]" [[Monster Card|monsters]]<br />You can [[discard]] 2 cards, then [[target]] 1 of your [[banish]]ed [[Level]] 4 or lower [[Beast]], [[Beast-Warrior]], or [[Winged Beast]]-Type monsters; [[Special Summon]] it. If this card is [[Send|sent]] to the [[Graveyard]]: You can [[Add a card|add]] 1 "Tri-Brigade" [[Spell Card|Spell]]/[[Trap Card|Trap]] from your [[Main Deck|Deck]] to your [[hand]], then, place 1 card from your hand on the bottom of the Deck, also you cannot Special Summon for the rest of this [[turn]], except "Tri-Brigade" monsters. You can only use each [[effect]] of "Tri-Brigade Bearbrumm the Rampant Rampager" [[once per turn]].
