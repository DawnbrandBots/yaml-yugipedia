  | text         = 2 or more [[Level]] 4 [[Monster Card|monsters]]<br />[[Once per turn]], you can also [[Xyz Summon]] "Zoodiac Chakanine" by using 1 "[[Zoodiac]]" monster you [[control]] with a different name as [[Xyz Material]]. (If you used an Xyz Monster, any Xyz Materials attached to it also become Xyz Materials on this card.) This card gains [[ATK]] and [[DEF]] equal to the ATK and DEF of all "Zoodiac" monsters attached to it as [[Material]]s. Once per turn: You can [[detach]] 1 Xyz Material from this card, then [[target]] 1 "Zoodiac" monster in your [[Graveyard]]; [[Special Summon]] it, but for the rest of this turn, its [[effect]]s are [[negate]]d, also it cannot be used as an Xyz Material for a Summon.
  | fr_text      = Min. 2 monstres de Niveau 4<br />Une fois par tour, vous pouvez aussi Invoquer par Xyz "Chakanine du Zoodiaque" en utilisant 1 monstre "Zoodiaque" que vous contrôlez de nom différent comme Matériel Xyz. (Si vous avez utilisé un Monstre Xyz, les Matériels Xyz qui lui sont attachés deviennent aussi des Matériels Xyz de cette carte.) Cette carte gagne une ATK/DEF égales à l'ATK/DEF de tous les monstres "Zoodiaque" qui lui sont attachés comme Matériels. Une fois par tour : vous pouvez détacher 1 Matériel Xyz de cette carte, puis ciblez 1 monstre "Zoodiaque" dans votre Cimetière ; Invoquez-le Spécialement, mais le reste de ce tour, ses effets sont annulés, et aussi, il ne peut pas être utilisé comme Matériel Xyz pour une Invocation.
