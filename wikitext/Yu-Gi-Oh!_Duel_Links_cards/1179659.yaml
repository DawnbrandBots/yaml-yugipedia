  | effect_types = Effect, Ignition-like
  | text         = [[Target]] 1 "[[Fossil]]" [[Fusion Monster]] you [[control]]; [[Tribute]] it, and if you do, [[Special Summon]] 1 "Fossil" Fusion Monster from your [[Extra Deck]], whose original [[Level]] is 2 higher than that monster's. (This is treated as a [[Fusion Summon]] with "[[Fossil Fusion (Duel Links)|Fossil Fusion]]".) During your [[Main Phase]], except the [[turn]] this card was [[sent]] to the [[GY]]: You can [[banish]] this card and 1 "Fossil" Fusion Monster from your GY, then target 1 "Fossil" Fusion Monster in your GY; Special Summon it.
  | fr_text      = Ciblez 1 Monstre Fusion "Fossile" que vous contrôlez ; Sacrifiez-le, et si vous le faites, Invoquez Spécialement 1 Monstre Fusion "Fossile" depuis votre Extra Deck, dont le Niveau d'origine est supérieur de 2 à celui du monstre. (Ceci est traité comme Invocation Fusion avec "Fusion Fossile".) Durant votre Main Phase, sauf le tour où cette carte a été envoyée au Cimetière : vous pouvez bannir cette carte et 1 Monstre Fusion "Fossile" depuis votre Cimetière, puis ciblez 1 Monstre Fusion "Fossile" dans votre Cimetière ; Invoquez-le Spécialement.
  | de_text      = Wähle 1 „Fossil“-Fusionsmonster, das du kontrollierst; biete es als Tribut an und falls du dies tust, beschwöre 1 „Fossil“-Fusionsmonster, dessen Grund-Stufe 2 höher als die jenes Monsters ist, als Spezialbeschwörung von deinem Extra Deck. (Dies wird als Fusionsbeschwörung mit „Fossilfusion“ behandelt.) Während deiner Main Phase, außer in dem Spielzug, in dem diese Karte auf den Friedhof gelegt wurde: Du kannst diese Karte und 1 „Fossil“-Fusionsmonster von deinem Friedhof verbannen und dann 1 „Fossil“-Fusionsmonster in deinem Friedhof wählen; beschwöre es als Spezialbeschwörung.
  | it_text      = Scegli come bersaglio 1 Mostro Fusione "Fossile" che controlli; offrilo come Tributo e, se lo fai, Evoca Specialmente dal tuo Extra Deck 1 Mostro Fusione "Fossile" con Livello originale superiore di 2 a quello di quel mostro. (Questa viene considerata come un'Evocazione tramite Fusione con "Fusione Fossile".) Durante la tua Main Phase, eccetto nel turno in cui questa carta è stata mandata al Cimitero: puoi bandire questa carta e 1 Mostro Fusione "Fossile" dal tuo Cimitero, poi scegliere come bersaglio 1 Mostro Fusione "Fossile" nel tuo Cimitero; Evocalo Specialmente.
  | es_text      = Selecciona 1 Monstruo de Fusión "Fósil" que controles; Sacrifícalo y, si lo haces, Invoca de Modo Especial, desde tu Deck Extra, 1 Monstruo de Fusión "Fósil" cuyo Nivel original sea 2 más que el de ese monstruo. (Esto se trata como una Invocación por Fusión usando "Fusión Fósil"). Durante tu Main Phase, excepto en el turno en el que esta carta fue mandada al Cementerio: puedes desterrar esta carta y 1 Monstruo de Fusión "Fósil" en tu Cementerio, y después seleccionar 1 Monstruo de Fusión "Fósil" en tu Cementerio; Invócalo de Modo Especial.
  | ja_text      = ①：自分フィールドの「化石」融合モンスター１体を対象として発動できる。そのモンスターをリリースし、そのモンスターより元々のレベルが２つ高い「化石」融合モンスター１体を、「化石融合－フォッシル・フュージョン」による融合召喚扱いとしてＥＸデッキから特殊召喚する。②：自分の墓地からこのカードと「化石」融合モンスター１体を除外し、自分の墓地の「化石」融合モンスター１体を対象として発動できる。そのモンスターを特殊召喚する。この効果はこのカードが墓地へ送られたターンには発動できない。
  | ko_text      = ①: 자신 필드의 "화석" 융합 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 릴리스하고, 그 몬스터보다 원래의 레벨이 2개 높은 "화석" 융합 몬스터 1장을, "화석융합－파슬 퓨전"에 의한 융합 소환으로 취급하여 엑스트라 덱에서 특수 소환한다. ②: 자신 묘지에서 "화석" 융합 몬스터 1장과 이 턴에 묘지로 보내져 있지 않은 이 카드를 제외하고, 자신 묘지의 "화석" 융합 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터를 특수 소환한다.
