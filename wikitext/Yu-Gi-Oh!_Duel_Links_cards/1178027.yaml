  | fr_text      = 3 monstres de Niveau 10<br />Au début de la Damage Step, si cette carte combat un monstre de votre adversaire : vous pouvez attacher le monstre à cette carte comme un Matériel Xyz face recto. Une fois par tour : vous pouvez infliger 150 points de dommages à votre adversaire pour chaque Matériel Xyz attaché à cette carte. Si cette carte a "Numéro 9 : Sphère Dyson" comme Matériel Xyz, elle gagne cet effet.<br />● Une fois par tour : vous pouvez détacher un nombre de votre choix de Matériels Xyz de cette carte ; infligez 400 points de dommages à votre adversaire pour chacun d'eux.
  | de_text      = 3 Monster der Stufe 10<br />Am Beginn des Damage Steps, falls diese Karte gegen ein Monster deines Gegners kämpft: Du kannst das Monster als offenes Xyz-Material an diese Karte anhängen. Einmal pro Spielzug: Du kannst deinem Gegner für jedes an diese Karte angehängte Xyz-Material 150 Schaden zufügen. Falls diese Karte „Nummer 9: Dyson-Sphäre“ als Xyz-Material hat, erhält sie diesen Effekt.<br />● Einmal pro Spielzug: Du kannst eine beliebige Anzahl Xyz-Material von dieser Karte abhängen; füge deinem Gegner für jedes 400 Schaden zu.
  | it_text      = 3 mostri di Livello 10<br />All'inizio del Damage Step, se questa carta combatte con un mostro dell'avversario: puoi attaccare quel mostro a questa carta come Materiale Xyz scoperto. Una volta per turno: puoi infliggere 150 danni al tuo avversario per ogni Materiale Xyz attaccato a questa carta. Se questa carta ha "Numero 9: Sfera Dyson" come Materiale Xyz, guadagna questo effetto.<br />● Una volta per turno: puoi staccare un qualsiasi numero di Materiali Xyz da questa carta; infliggi 400 danni al tuo avversario per ognuno.
