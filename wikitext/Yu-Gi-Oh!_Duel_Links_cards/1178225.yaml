  | text         = [[Add a card|Add]] 1 "[[The Winged Dragon of Ra (Duel Links)|The Winged Dragon of Ra]]" from your [[Main Deck|Deck]] or [[GY]] to your [[hand]], and if you do, you can [[Tribute Summon]] 1 [[Monster Card|monster]] during your [[Main Phase]] this [[turn]], in addition to your Normal Summon/Set. (You can only gain this [[effect]] [[once per turn]].) You can [[banish]] this card from your [[GY]]: If you Tribute Summon "The Winged Dragon of Ra" this turn, its [[Original ATK and DEF|original ATK/DEF]] become the combined original ATK/DEF of the monsters [[Tribute]]d for its Summon. You can only [[activate]] 1 "Ancient Chant" per turn.
  | fr_text      = Ajoutez 1 "Le Dragon Ailé de Râ" depuis votre Deck ou Cimetière à votre main, et si vous le faites, vous pouvez Invoquer par Sacrifice 1 monstre durant votre Main Phase ce tour, en plus de votre Invocation/Pose Normale. (Vous ne pouvez gagner cet effet qu'une fois par tour.) Vous pouvez bannir cette carte depuis votre Cimetière : si vous Invoquez par Sacrifice "Le Dragon Ailé de Râ" ce tour, son ATK/DEF d'origine deviennent la somme des ATK/DEF d'origine des monstres Sacrifiés pour son Invocation. Vous ne pouvez activer qu'1 "Chant Ancien" par tour.
  | de_text      = Füge deiner Hand 1 „Der geflügelte Drache von Ra“ von deinem Deck oder Friedhof hinzu und falls du dies tust, kannst du in diesem Spielzug während deiner Main Phase zusätzlich zu deiner Normalbeschwörung / deinem Setzen 1 Monster als Tributbeschwörung beschwören. (Du kannst diesen Effekt nur einmal pro Spielzug erhalten.) Du kannst diese Karte von deinem Friedhof verbannen: Falls du in diesem Spielzug „Der geflügelte Drache von Ra“ als Tributbeschwörung beschwörst, werden seine Grund-ATK/DEF gleich der Summe der Grund-ATK/DEF der Monster, die du für seine Beschwörung als Tribut angeboten hast. Du kannst nur 1 „Uralter Gesang“ pro Spielzug aktivieren.
  | it_text      = Aggiungi 1 "Drago Alato di Ra" dal tuo Deck o Cimitero alla tua mano e, se lo fai, puoi Evocare tramite Tributo 1 mostro durante la tua Main Phase in questo turno, in aggiunta alla tua Evocazione Normale/Posizionamento. (Puoi guadagnare questo effetto una sola volta per turno.) Puoi bandire questa carta dal tuo Cimitero: se Evochi tramite Tributo "Drago Alato di Ra" in questo turno, i suoi ATK/DEF originali diventano la somma degli ATK/DEF originali dei mostri offerti come Tributo per la sua Evocazione. Puoi attivare solo 1 "Canto Antico" per turno.
  | es_text      = Añade a tu mano 1 "El Dragón Alado de Ra" en tu Deck o Cementerio y, si lo haces, este turno durante tu Main Phase puedes Invocar 1 monstruo por Sacrificio, además de tu Invocación Normal/Colocación. (Sólo puedes ganar este efecto una vez por turno). Puedes desterrar esta carta en tu Cementerio: si este turno Invocas por Sacrificio "El Dragón Alado de Ra", su ATK/DEF originales se convierten en el ATK/DEF originales combinados de los monstruos Sacrificados para su Invocación. Sólo puedes activar 1 "Cántico Antiguo" por turno.
  | ja_text      = このカード名のカードは１ターンに１枚しか発動できない。①：自分のデッキ・墓地から「ラーの翼神竜」１体を手札に加え、このターン自分は通常召喚に加えて１度だけ、自分メインフェイズにＡ召喚できる。②：墓地のこのカードを除外して発動できる。発動後、このターン中に自分が「ラーの翼神竜」をＡ召喚した場合、その元々の攻撃力・守備力は、そのＡ召喚のためにリリースしたモンスターの元々の攻撃力・守備力をそれぞれ合計した数値になる。
  | ko_text      = 이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 자신의 덱 / 묘지에서 "라의 익신룡" 1장을 골라 패에 넣고, 이 턴에 자신은 통상 소환 외에도 1번만, 자신 메인 페이즈에 어드밴스 소환할 수 있다. ②: 묘지의 이 카드를 제외하고 발동할 수 있다. 발동 후, 이 턴 중에 자신이 "라의 익신룡"의 어드밴스 소환에 성공했을 경우, 그 원래의 공격력 / 수비력은, 그 어드밴스 소환을 위해 릴리스한 몬스터의 원래의 공격력 / 수비력을 각각 합계한 수치가 된다.
