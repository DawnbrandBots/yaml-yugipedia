  | text                = If you [[control]] a "[[Gutsmaster]]" [[Monster Card|monster]]: [[Draw a card|Draw]] 2 cards, and if you do, [[Add a card|add]] them to your opponent's [[hand]], then look at your opponent's hand and add 2 cards from their hand to your hand. If a monster(s) was exchanged by this [[Card effect|effect]], they cannot be [[Normal Summon|Normal]] or [[Special Summon]]ed this [[turn]], also skip this turn's [[Battle Phase]]. Cards exchanged by this effect are returned to their [[owner]]'s hand during the [[End Phase]] of this turn.
  | ja_text             = ①：自分フィールドに「ガッツマスター」モンスターが存在する場合に発動できる。自分はデッキから２枚ドローし、そのカードを相手の手札に加える。その後、自分は相手の手札２枚を選択して自分の手札に加える。この効果で交換したカードがモンスターカードだった場合、そのカードは召喚・特殊召喚できず、このターンのバトルフェイズをスキップする。また、この効果で交換したカードは、このターンのエンドフェイズに持ち主の手札に戻る。
  | ko_text             = ①:자신 필드에 "거츠마스터" 몬스터가 존재하는 경우에 발동할 수있다. 자신은 덱에서 2장을 드로우 하고, 그 카드를 상대의 패에 넣는다. 그 후, 자신은 상대의 패 2장을 선택해거 자신의 패에 넣는다. 이 효과로 교환한 카드가 몬스터 카드인 경우, 그 카드는 소환이나 특수 소환 할 수 없고, 이번 차례의 배틀 페이즈는 생략한다. 또한 이 효과로 교환한 카드는 이번 차례의 엔드 페이즈에 주인의 패로 돌아간다.
