  | effect_types             = 
  | text                     = If an [[Xyz Monster]] is [[Special Summon]]ed to your opponent's [[field]] with a "[[Rank-Up-Magic]]" [[Spell Card]]: [[Pay]] half your [[LP]], then [[target]] 1 Xyz Monster you [[control]]; Special Summon from your [[Extra Deck]], 1 Xyz Monster that is 1 [[Rank]] higher than that [[Monster Card|monster]] you control, by using it as the [[Xyz Material]], and if you do, the [[Summon]]ed monster's [[ATK]] becomes equal to its current ATK multiplied by the number of "Rank-Up-Magic" Spell Cards activated during this [[Duel]] until the end of this [[turn]]. (This Special Summon is treated as an [[Xyz Summon]]. Xyz Materials [[attach]]ed to it also become Xyz Materials on the Summoned monster.)
  | ja_text                  = ①：「{{Ruby|ＲＵＭ|ランクアップマジック}}」魔法カードの効果で相手フィールドに{{Ruby|Ｘ|エクシーズ}}モンスターが特殊召喚された場合、ＬＰを半分払い、自分フィールドの{{Ruby|Ｘ|エクシーズ}}モンスター１体を対象として発動できる。そのモンスターよりランクが１つ高い{{Ruby|Ｘ|エクシーズ}}モンスター１体を、対象のモンスターの上に重ねて{{Ruby|Ｘ|エクシーズ}}召喚扱いとしてエクストラデッキから特殊召喚する。この効果で特殊召喚したモンスターの攻撃力はターン終了時まで、その攻撃力にこのデュエル中に発動した「{{Ruby|ＲＵＭ|ランクアップマジック}}」魔法カードの数を掛けた数値になる。
