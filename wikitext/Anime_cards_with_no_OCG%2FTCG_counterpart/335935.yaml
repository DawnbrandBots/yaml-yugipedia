  | text               = After [[Activate|activation]], place 5 [[Beacon Counter]]s on this card. If 1 [[Monster Card|monster]] on your side of the [[field]] would be [[destroy]]ed, remove 1 Beacon Counter, move that monster to another [[Monster Zone|Monster Card Zone]], render the original Monster Card Zone it occupied unusable, and [[negate]] that monster's destruction. (If it's already occupied by a monster, you can destroy that card and render the Monster Card Zone unusable.) You can [[send]] this card with no Beacon Counters on it and all cards in your [[hand]] to the [[Graveyard]] to [[Target|select]] 4 cards in your Graveyard and [[Add a card|add]] them to your hand. You cannot conduct your [[Battle Phase]] during that [[turn]].
  | text_note          = <ref group="Note">Contrary to its written text, this card's effect of making Monster Card Zones unusable had to be applied each time a Beacon Counter was removed (one zone per counter), even by an effect other than this card's (such as "[[Crest Burn]]").</ref>
  | ja_text            = 発動後、このカードの上に楼閣カウンターを５つ置く。自分フィールド上のモンスター１体が破壊される場合、楼閣カウンターを１つ取り除き、そのモンスターを別のモンスターカードゾーンに移動させ、元々モンスターが存在したモンスターカードゾーンを使用不能にして、そのモンスターの破壊を無効にする。（モンスターが存在する場合、そのカードを破壊してモンスターカードゾーンを使用不能してもよい）楼閣カウンターが無くなったこのカードと手札を全て墓地へ送り墓地のカード４枚を選択し手札に加える事ができる。このターンバトルフェイズを行う事はできない。
