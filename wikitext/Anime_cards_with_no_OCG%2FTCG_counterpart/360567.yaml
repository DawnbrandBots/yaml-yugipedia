  | text                  = If you [[control]] "[[C/C Critical Eye]]": [[Target]] 1 [[Monster Card|monster]] your opponent controls; that target's [[Level]] becomes the following value until the [[End Phase]] of this [[turn]].<br />● Level 1-4 monster: Level 1.<br />● Level 5-6 monster: Level 3.<br />● Level 7 or higher monster: Level 5.<br />Then, treat this card as a monster, and its [[Type]], [[Attribute]], Level, [[ATK]], and [[DEF]] become the same as the targeted monster's, also 1 "C/C Critical Eye" you control is treated as a [[Tuner monster]], also its [[effect]]s are [[negate]]d. Then, immediately after this effect [[resolve]]s, [[Synchro Summon]] 1 [[Synchro Monster]], using only this card treated as a monster by this effect and the "C/C Critical Eye" treated as a Tuner monster, but [[destroy]] that Synchro Summoned monster during the End Phase.
  | ja_text               = ①：自分フィールドに「ＣＣ 隻眼のパスト・アイ」が存在する場合、相手フィールドのモンスター１体を対象として発動できる。その相手モンスターのレベルはこのターンのエンドフェイズまで、以下の数値になる。<br />●レベル１～４のモンスター：レベル１ ●レベル５～６のモンスター：レベル３<br />●レベル７以上のモンスター：レベル５<br />その後、このカードをモンスターとして扱い、このカードの種族・属性・レベル・攻撃力・守備力を対象のモンスターと同じにする。また、自分フィールドの「ＣＣ 隻眼のパスト・アイ」１体をチューナーとして扱い、その効果を無効にする。さらにその後、このカードの効果でモンスター扱いとしたこのカードとチューナー扱いとした「ＣＣ 隻眼のパスト・アイ」のみを素材として{{Ruby|Ｓ|シンクロ}}召喚する。この効果で{{Ruby|Ｓ|シンクロ}}召喚したモンスターはエンドフェイズに破壊される。
