  | text                = While [[face-up]] on the [[field]], this card is also [[WATER]], [[FIRE]], and [[WIND]]-[[Attribute]]. If a player would [[Normal Summon|Normal]] or [[Special Summon]] a [[Monster Card|monster]](s) with the same Attribute as this card, they must [[Summon]] it in [[Attack Position]]. Change the [[ATK]] of other monsters on the field with the same Attribute as this card to 0, also [[negate]] their [[effect]]s while they are [[face-up]] on the field. If this card is Special Summoned from the [[Extra Deck]] to your field: You can place 4 [[Hydradrive Counter]]s on this card. During the [[Main Phase]] ([[Quick Effect]]): You can remove 1 Hydradrive Counter from this card; roll a six-sided die, and if your opponent [[control]]s a face-up monster(s) in their [[Monster Zone]] with an Attribute that corresponds to the result, [[send]] as many of those monsters to the [[Graveyard|GY]] as possible, and if you do, inflict [[Effect damage|damage]] to your opponent equal to the number of monsters sent to the GY x 500.<br />● 1: [[EARTH]] ● 2: WATER ● 3: FIRE ● 4: WIND ● 5: [[LIGHT]] ● 6: [[DARK]]
  | text_note           = <ref group="Notes">Although not specified in the card's text, this card's die-roll effect seemed to be usable only once per turn, based on how it was utilized in the anime.</ref>
