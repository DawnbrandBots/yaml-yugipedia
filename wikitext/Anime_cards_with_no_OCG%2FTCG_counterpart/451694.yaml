  | text            = When an opponent's [[Monster Card|monster]] [[declare]]s an [[attack]]: Choose 1 monster and 1 [[Spell Card|Spell]]/[[Trap Card]] in your [[hand]]. [[Special Summon]] them as [[Normal Monster]]s ([[Spellcaster]]-[[Type]]/[[LIGHT]]/[[Level]] 1/[[ATK]] 0/[[DEF]] 0) in [[face-down]] [[Attack Position]], without [[reveal]]ing them. This [[turn]], your opponent can attack with only 1 monster. The cards Special Summoned from the hand by this [[card effect|effect]] are [[destroy]]ed at the end of the [[Battle Phase]], and cannot remain on the [[field]] except during this Battle Phase. When a card Special Summoned by this effect is attacked, during [[damage calculation]], reveal it and apply 1 of these effects.<br />● If it is a monster: Any [[battle damage]] a player takes from this [[battle]] becomes doubled.<br />● If it is a Spell/Trap Card: Neither player takes any battle damage from this battle.
  | ja_text         = ①：相手モンスターの直接攻撃宣言時に発動できる。モンスターカード１枚と魔法・罠カード１枚を非公開のまま手札から選び、そのカード２枚を通常モンスターカード扱い（魔法使い族・光・星１・攻／守０）として、自分のモンスターゾーンに裏側攻撃表示で特殊召喚する。このターン、相手はモンスター１体でしか攻撃できない。このカードの効果で手札から特殊召喚したカードはバトルフェイズの間しか存在できず、バトルフェイズ終了時に破壊される。また、そのカードが攻撃されたダメージ計算時にそのカードを確認して以下の効果を適用する。●モンスターカードだった場合：その戦闘で発生する戦闘ダメージは倍になる。●魔法・罠カードだった場合：その戦闘で発生する戦闘ダメージは０になる。
