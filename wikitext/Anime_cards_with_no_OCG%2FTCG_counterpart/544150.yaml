  | text                = [[Activate]] this card if you take [[battle damage]] from an [[attack]] involving a "[[Gladiator Beast]]" [[Monster Card|monster]]; [[destroy]] all cards you [[control]] other than "Gladiator Beast" cards (if any), also all other [[face-up]] "Gladiator Beast" cards currently in your [[Spell & Trap Zone]] become the [[Continuous Spell Card]] "[[Gladiator Beast Fort]]" (their original [[effect]]s are [[negate]]d), then place 1 "Gladiator Beast" monster from your [[Main Deck|Deck]] underneath each "Gladiator Beast Fort" you control. If this card is [[destroy]]ed: You can destroy as many cards you control as possible, and if you do, [[activate]] 1 "[[Gladiator Beast's Great Fortress]]" from your [[hand]], Deck, or [[Graveyard]].<hr />'''Effects of the [[Continuous Spell Card]] "[[Gladiator Beast Fort]]"'''<br />[[Once per turn]]: You can [[shuffle]] 1 card underneath this card into the [[Main Deck|Deck]]; inflict 1000 [[Effect damage|damage]] to your opponent. Once per [[turn]], if this card has no cards underneath it: You can place 1 "[[Gladiator Beast]]" [[Monster Card|monster]] from your Deck underneath this card. Once per turn, during either player's turn: You can [[target]] 1 "Gladiator Beast" monster you control, then [[activate]] 1 of these [[effect]]s;<br />● If the targeted monster [[battle]]s: It cannot be [[destroyed by battle|destroyed by that battle]], also you take no [[battle damage]] from that battle.<br />● If the targeted monster is targeted by a card effect: It cannot be destroyed by that effect.
  | ja_text             = ①：「剣闘獣」モンスターの戦闘で自分が戦闘ダメージを受けた場合にこのカードを発動できる。自分フィールドに「剣闘獣」カード以外のカードが存在する場合、そのカードを破壊する。このカード以外の自分の魔法・罠ゾーンに表側表示で存在する「剣闘獣」カードは永続魔法カード「剣闘獣の砦」になる。（それらのカードの元々の効果は無効化される。）その後、自分フィールドの「剣闘獣の砦」の数だけデッキから「剣闘獣」モンスターを選び、「剣闘獣の砦」の下に１枚ずつ重ねて置く。②：このカードが破壊された場合に発動できる。自分フィールドのカードを全て破壊し、自分の手札・デッキ・墓地から永続魔法カード「剣闘獣の大砦」１枚を発動する。<hr />永続魔法カード「剣闘獣の砦」の効果<br />①：１ターンに１度、このカードの下に重ねて置いたカード１枚をデッキに戻してこの効果を発動できる。相手に１０００ダメージを与える。②：１ターンに１度、このカードの下に重ねて置いたカードが無い場合にこの効果を発動できる。デッキから「剣闘獣」モンスターカード１枚を選んでこのカードの下に重ねて置く。③：１ターンに１度、自分フィールドの「剣闘獣」モンスター１体を対象とし、以下の効果から１つを選択してこの効果を発動できる。この効果は相手ターンでも発動できる。●対象のモンスターが戦闘を行う場合に発動できる。そのモンスターはその戦闘では破壊されず、その戦闘で発生する自分への戦闘ダメージは０になる。●対象のモンスターが効果の対象になった場合に発動できる。そのモンスターはその効果では破壊されない。
