  | text          = [[Target]] 1 [[face-up]] "[[Odd-Eyes Pendulum Dragon (anime)|Odd-Eyes Pendulum Dragon]]" in your [[Extra Deck]] and 1 [[Synchro Monster]] in your [[Graveyard]]; [[Special Summon]] them, but they have their [[Card effect|effects]] [[negate]]d (if any), also that "Odd-Eyes Pendulum Dragon" is treated as a [[Level]] 1 [[Tuner monster|Tuner]], then immediately after this effect [[resolve]]s, [[Synchro Summon]] 1 [[Synchro Pendulum Monster]] from your Extra Deck, using only the Summoned monsters as [[Synchro Material|Material]]s. This card remains on the [[field]] as long as a [[Monster Card|monster]] Synchro Summoned by this card's effect is on the field. If the monster Synchro Summoned by this card with the above effect is [[destroy]]ed: You can destroy this card, and if you do, [[Add a card|add]] 1 "[[Odd-Eyes Xyzgate]]" from your [[Main Deck|Deck]] to your [[hand]]. You cannot [[Pendulum Summon]] the [[turn]] you [[activate]] this card.
  | ja_text       = このカードを発動するターン、自分は{{Ruby|Ｐ|ペンデュラム}}召喚できない。このカードは発動後、このカードの①の効果で{{Ruby|Ｓ|シンクロ}}召喚したモンスターがモンスターゾーンに存在する限り、自分の魔法＆罠ゾーンに残り続ける。①：自分のエクストラデッキの表側表示の「オッドアイズ・ペンデュラム・ドラゴン」１体と自分の墓地の{{Ruby|Ｓ|シンクロ}}モンスター１体を対象としてこのカードを発動できる。そのモンスターを効果を無効にして特殊召喚する。この効果で特殊召喚した「オッドアイズ・ペンデュラム・ドラゴン」はレベル１チューナーとして扱う。その後、この効果で特殊召喚したモンスターのみを{{Ruby|Ｓ|シンクロ}}素材として{{Ruby|Ｓ|シンクロ}}／{{Ruby|Ｐ|ペンデュラム}}モンスター１体を{{Ruby|Ｓ|シンクロ}}召喚する。②：このカードの①の効果で{{Ruby|Ｓ|シンクロ}}召喚したモンスターが破壊された場合に発動できる。このカードを破壊し、デッキから「オッドアイズ・エクシーズゲート」１枚を手札に加える。
