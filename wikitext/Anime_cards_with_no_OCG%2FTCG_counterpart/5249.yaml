title: Anime-only
wikitext: |-
  There are {{hardcoded query|{{ #ask: <q>[[Category:Toei cards with no OCG/TCG counterpart]] [[Appears in::!Yu-Gi-Oh! Super Complete Book]]</q> OR [[Category:Anime cards with no OCG/TCG counterpart]] |format=count }}}} cards seen in the anime that do not currently exist in the ''[[OCG]]'' and ''[[TCG]]'', and {{hardcoded query|{{ #ask: [[Category:Anime Rush Duel cards with no printed Rush Duel counterpart]] |format=count }}}} ''Rush Duel'' cards seen in the anime that do not currently exist in ''[[Yu-Gi-Oh! Rush Duel]]''. While many anime cards have been released in the ''OCG'', ''TCG'', and ''Rush Duel'', there is no guarantee that any given anime card will eventually be released.

