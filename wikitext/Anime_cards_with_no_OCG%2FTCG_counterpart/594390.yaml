  | text_note     = <ref group="Notes">Contrary to its written text and based on how the characters explained it, this card's first effect is applied even when an opponent's monster equipped with it is battling the controller's monster. Furthermore, whose field the Tokens could be Summoned to seemed to be dependent on who controlled the equipped monster.</ref>
