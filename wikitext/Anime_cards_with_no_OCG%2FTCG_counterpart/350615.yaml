  | text                = When a non-"[[Speed Spell Card|Speed Spell]]" [[Spell Card]] is played, the player takes 2000 points of [[Effect damage|damage]]. During each player's [[Standby Phase]], each player places 1 [[Speed Counter]] of their own on this card (max. 12 each). Each player can remove a number of their Speed Counters to activate 1 of the following [[effect]]s:<br />● 4: Inflict 800 points of damage to your opponent for each "Speed Spell" card in your [[hand]].<br />● 7: [[Draw a card|Draw]] 1 card.<br />● 10: [[Destroy]] 1 card on the [[field]].
  | text_note           = <ref group="Note">This card's second effect didn't function during the first turn of a Duel. Speed Counters were always placed starting from the second turn onward.</ref>
