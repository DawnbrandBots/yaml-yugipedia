  | ja_text         = '''【条件】'''自分フィールドに表側表示モンスター（攻撃力０）がいる場合、相手がドローした時に発動できる。<br />'''【効果】'''相手フィールドの表側表示モンスター１体を持ち主の手札に戻す。その後、相手は手札からランダムに１枚カードを選び、選んだカードが戻したモンスターと同じ名前のモンスターだった場合、そのモンスターを特殊召喚する。違った場合、相手は１０００ダメージを受ける。
