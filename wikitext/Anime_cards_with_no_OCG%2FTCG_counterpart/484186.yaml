  | text                = Once per opponent's [[Battle Phase]], if you [[control]] a "[[Supreme King]]" [[Monster Card|monster]]: You can [[target]] 1 monster your opponent controls; that target must [[attack]] this [[turn]], if able. If it has already attacked this turn, it must make a second attack, if able. Once per turn, if a "Supreme King" monster you control [[battle]]s, during [[damage calculation]], OR when a card or [[Card effect|effect]] is [[activate]]d that would [[destroy]] a "Supreme King" card(s) you control: You can make that "Supreme King" card(s) unable to be [[Destroyed by battle|destroyed by that battle]] or effect. During your opponent's Battle Phase: You can [[send]] this [[face-up]] card to the [[Graveyard]]; all monsters your opponent controls that did not attack this turn must attack, if able. If they do, this card's controller chooses the [[attack target]]s for those attacks.
