  | ja_text         = '''Printed text'''<br /> ①：自分のモンスターが相手のモンスターの攻撃対象に選択された時、そのお互いのモンスターを対象として発動できる。そのモンスターはその戦闘では破壊されず、ダメージステップ終了時からそれぞれのプレイヤーのターンで数えて２ターン後のスタンバイフェイズまで、フィールドに存在しない扱いになる。その間対象のモンスターは攻撃できず、攻撃・効果の対象にならず、効果は無効化される。このカードの発動後２回目の相手スタンバイフェイズにこのカードは破壊される。<br />'''Millennium Memory text'''<br /> ①：自分モンスターが相手モンスターに攻撃された時発動できる。この戦闘でモンスターは破壊されない。戦闘したお互いのモンスターはそれぞれお互いのターンで２ターン後のスタンバイフェイズまで、フィールドに存在しない扱いとなる。（攻撃できず、効果を使えず、攻撃・効果の対象にならない）このカードは、発動後２回目の相手のスタンバイフェイズに破壊される。
