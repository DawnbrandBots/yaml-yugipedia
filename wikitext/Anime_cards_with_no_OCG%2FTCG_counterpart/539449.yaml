  | text                  = You can [[activate]] this card from the [[Graveyard]] if there is a total of 5 "[[Forbidden One]]" cards in your [[hand]] or Graveyard. [[Return]] all "Forbidden One" cards in your [[Graveyard]] to the [[Main Deck|Deck]]. Then, [[send]] 2 "Forbidden One" cards from your hand to the Graveyard, and [[Special Summon]] 1 "[[Exodius the Ultimate Forbidden Lord (anime)|Exodius the Ultimate Forbidden Lord]]" from your hand or Deck. (The Deck is then [[shuffle]]d.) If a "Forbidden One" card(s) would be sent to the Graveyard, except by the [[effect]] of "Exodius the Ultimate Forbidden Lord", return that card(s) to the Deck.
