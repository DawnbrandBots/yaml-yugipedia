  | text                  = '''[REQUIREMENT]''' When a [[Monster Card|monster]] [[declare]]s an [[attack]].<br />'''[EFFECT]''' Toss a coin. Heads: The attacking monster gains 1000 [[ATK]] until the end of this [[turn]]. Tails: The attacking monster loses 1000 ATK until the end of this turn. Then, if you have a [[Level]] 7 [[EARTH]] [[Attribute]] [[Machine]] [[Type]] monster in your [[Graveyard]], you can [[send]] 1 card from your [[hand]] to the Graveyard. If you do, [[Set]] this card instead of sending it to the Graveyard after [[Activate|activation]].
  | ja_text               = '''【条件】'''自分または相手モンスターの攻撃宣言時に発動できる。<br />'''【効果】'''コイントスを１回行う。表だった場合、攻撃するモンスターの攻撃力ターン終了時まで１０００アップする。裏だった場合、攻撃するモンスターの攻撃力はターン終了時まで１０００ダウンする。自分の墓地にモンスター（レベル７／地属性／機械族）がいる場合、さらに自分の手札１枚を選んで墓地へ送る事ができる。送った場合、発動後このカードは墓地へ送らず、そのままセットする。
