  | text_note        = <ref group="Note">Despite this card's text and [[Damon]]'s dialogue, during the same [[End Phase]] he activated this card, Damon was shown returning a card from his [[Spell & Trap Zone]] to the bottom of his Deck, and he was not explicitly shown shuffling his Deck afterward. It is also unknown if the returned card was actually "[[Drawber]]" (the card he drew by this card's effect) or "Card Loan" itself, since shortly before Damon returned the card, the hologram of "Card Loan" was shown disappearing from his side of the field, which had remained visible on his side of the field ever since Jaden shuffled his own cards into the Deck (earlier in the turn) due to "Drawber". However, it is possible that this was all simply a crude portrayal of this card's End Phase portion of its effect.</ref>
