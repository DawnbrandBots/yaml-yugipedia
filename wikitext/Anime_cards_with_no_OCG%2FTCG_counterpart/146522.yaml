  | text                = [[Activate]] only when an opponent's [[Monster Card|monster]] [[declare]]s an [[attack]]. [[Banish|Remove from play]] 1 "[[Blackwing]]" card from your [[Graveyard]] to [[negate]] the attacks of opponent's monsters with 2000 or more [[ATK]] this [[turn]]. If there are 2 "Black Wing" in your [[Graveyard]] (including this card), you can remove them from play to [[destroy]] 1 [[Synchro Monster]] you [[control]] and 1 monster your opponent [[control]]s, and inflict [[effect damage|damage]] to your opponent equal to the ATK of the opponent's destroyed monster.
  | ja_text             = 相手モンスターの攻撃宣言時に発動する事ができる。自分の墓地に存在する「ＢＦ」と名のついたカードをゲームから除外する事で、このターン攻撃力２０００以上の相手モンスターの攻撃を無効にする事ができる。また、このカードを含む「ブラック・ウィング」２枚が自分の墓地に存在する場合、それらのカードをゲームから除外する事で以下の効果を発動する事ができる。自分フィールド上に存在するシンクロモンスター１体と相手フィールド上に存在するモンスター１体を破壊し、破壊した相手モンスター１体の攻撃力分のダメージを相手ライフに与える。
  | es_text             = Esta carta sólo puede ser [[Activate|activada]] cuando un monstruo de tu adversario declara un [[attack|ataque]]. [[Banish|Retira del juego]] 1 carta "Alanegra" de tu [[Graveyard|Cementerio]] para negar el [[attack|ataque]] de un [[Monster Card|monstruo]] del adversario con 2000 [[ATK]] o más. Si esta carta se encuentra en tu [[Graveyard|Cementerio]], puedes [[remove from play|retirar del juego]] esta carta y otra "Ala Negra" en tu [[Graveyard|Cementerio]] para [[select|seleccionar]] 1 [[Monster Card|monstruo]] [[Face-up|boca arriba]] que controles y 1 monstruo [[face-up|boca arriba]] que controle tu adversario. (Puedes activar este efecto durante la [[End Phase]]). [[Destroy|Destruye]] esas cartas e inflige daño a tu adversario igual al [[ATK]] del monstruo destruido de tu adversario.
