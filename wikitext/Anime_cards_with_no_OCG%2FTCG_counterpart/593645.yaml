  | text                = All "[[Stormrider]]" [[Monster Card|monsters]] on the [[field]] gain 400 [[ATK]], and 300 ATK for each "Stormrider" [[Field Spell Card|Field Spell]] in your [[GY]]. While you [[control]] exactly 1 "Stormrider" [[Link Monster]], your opponent cannot [[target]] that Link Monster with [[card effect]]s, except with card effects [[activate]]d on the field, also [[negate]] the effects of opponent's Link Monsters with an equal or lower [[Link Rating]]. While you control a "Stormrider" Link Monster in the [[Extra Monster Zone]], your opponent's monsters must [[attack]] it, if able.
  | text_note           = <ref group="Notes">Contrary to its written text, this card's second effect is applied while the only monster the player controls is 1 "Stormrider" Link Monster (and no other monsters). Furthermore, its negation effect seemed to be applied only to the Link Monsters on the opponent's field.</ref>
