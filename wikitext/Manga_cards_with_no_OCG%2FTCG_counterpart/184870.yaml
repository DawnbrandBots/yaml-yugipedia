title: Manga-only
wikitext: |-
  There are {{hardcoded query|{{ #ask: [[Category:Manga cards with no OCG/TCG counterpart]] OR [[Category:Novel cards with no OCG/TCG counterpart]] OR <q>[[Appears in::Yu-Gi-Oh! Super Complete Book]] [[Category:Toei cards with no OCG/TCG counterpart]]</q> |format=count }}}} cards seen in the manga and books that do not currently exist in the ''[[Yu-Gi-Oh! Trading Card Game|TCG]]'' and ''[[Yu-Gi-Oh! Official Card Game|OCG]]''. While many manga cards have been released in the ''TCG'' and ''OCG'', there is no guarantee that any given manga card will eventually be released.

