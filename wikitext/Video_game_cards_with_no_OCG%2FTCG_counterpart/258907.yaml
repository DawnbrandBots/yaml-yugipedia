  | de_lore      = Du kannst diese Karte als Spezialbeschwörung (von deiner Hand) beschwören, indem du 2 Spielmarken als Tribut anbietest. Einmal pro Spielzug kannst du 1 Monster mit 0 DEF auf dem Spielfeld wählen; zerstöre es und falls du dies tust, füge deinem Gegner Schaden in Höhe der Hälfte der ATK des zerstörten Monsters (auf dem Spielfeld) zu.
  | it_lore      = Puoi Evocare Specialmente questa carta (dalla tua mano) offrendo come Tributo 2 Segna-Mostro. Una volta per turno, puoi scegliere come bersaglio 1 mostro con DEF 0 sul Terreno; distruggilo e, se lo fai, infliggi al tuo avversario danno pari alla metà dell'ATK (sul Terreno) del mostro distrutto.
  | es_lore      = Puedes Invocar esta carta de Modo Especial (desde tu mano) Sacrificando 2 Fichas. Una vez por turno, puedes seleccionar 1 monstruo con 0 DEF en el Campo; destrúyelo y, si lo haces, inflige daño a tu adversario igual a la mitad del ATK del monstruo destruido (en el Campo).
  | ja_lore      = このカードは自分フィールド上のトークン２体をリリースして手札から特殊召喚できる。１ターンに１度、フィールド上の守備力０のモンスター１体を選択して発動できる。選択したモンスターを破壊し、その攻撃力の半分のダメージを相手ライフに与える。
