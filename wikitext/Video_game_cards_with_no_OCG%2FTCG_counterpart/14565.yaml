title: Active Guard
wikitext: |-
  {{DBT card
  | ja_name      = アクティブガード・アーマー
  | romaji_name  = Akutibu Gādo Āmā
  | trans_name   = Active Guard Armor

  | attribute    = EARTH
  | types        = Machine / Armor
  | atk          = 0
  | def          = 2500
  | level        = 4
  | number       = 782
  | lore         = For each [[Armor monster]] on your [[Field]], this card gains a 500-point [[DEF]] bonus. On your turn, you may reduce all [[damage]] to the yourself to 0. [[Destroy]] this card at the end of the turn that you used this [[Card effect|effect]]. (Only one Armor monster can [[attack]] per turn. If there are 2 or more Armor monsters on your Field and an Armor monster is the [[Attack target|target]] of an [[attack]], the [[control]]ler of that Armor monster can change the target of the attack to any of the Armor monsters they control).

  | fr_name      = Protection d'Énérgie
  | de_name      = Aktive Deckung
  | it_name      = Guardia Attiva
  | es_name      = Guardia Activo

  | fr_lore      = Pour chaque Monstre Armure sur ton Terrain, cette carte bénéficie d'un bonus DEF de 500 points. Lors de ton tour, tu peux ramener tous les dommages subis à 0. Après ce tour, la carte est détruite. (Seul 1 monstre Armure peut attaquer par tour. Si 2 monstres Armures ou plus se trouvent sur ton Terrain et qu'un monstre Armure est la cible d'une attaque, le contrôleur de ce monstre Armure peut changer de cible d'attaque pour n'importe lequel des monstres Armures contrôlés.)
  | de_lore      = Mit dieser Karte bekommst du einen DEF-Bonus von 500 Punkten pro Panzermonster auf deinem Feld. Während deines Spielzugs kannst du alle dir zugefügten Schäden auf 0 reduzieren. Die Karte wird am Ende der Runde, in der du sie einsetzt, zerstört. (Es kann nur ein Panzermonster pro Runde angreifen. Wenn ein Spieler zwei oder mehr Panzermonster auf dem Feld hat und eins davon angegriffen wird, kann der Spieler den Angriff auf ein Panzermonster seiner Wahl umleiten).
  | it_lore      = Il valore DEF di questa Carta aumenta di 500 punti per ciascun Mostro Armatura presente nella tua parte di Campo. I danni che subisci durante il tuo turno sono ridotti a zero. Questa Carta viene distrutta alla fine del turno in cui hai attivato il suo effetto. Un solo Mostro Armatura può attaccare ad ogni turno. Se nella tua parte di Campo sono presenti 2 o più Mostri Armatura e uno di essi viene attaccato dal nemico, il suo possessore può far diventare bersaglio dell'attacco un altro dei Mostri Armatura sotto il suo controllo.
  | es_lore      = Por cada monstruo Blindado en tu Campo, esta carta gana una bonificación de 500 puntos de DEF. En tu turno, puedes reducir todo el daño a ti mismo a 0. Destruye esta carta al final del turno en el que utilizaste este efecto. (Sólo un monstruo Blindado puede atacar por turno. Si en tu Campo hay 2 o más monstruos Blindados y un monstruo Blindado es el blanco de un ataque, el controlador de ese monstruo Blindado puede cambiar el blanco del ataque a cualquiera de los monstruos Blindados que controla).
  | ja_lore      = 自分のフィールド上のアーマーモンスター１体につき、このカードの守備力は５００ポイントアップする。自分のターン中のプレイヤーへ発生する全てのダメージを０にする事ができる。この効果を使用したターンの終了時にこのカードを破壊する。（アーマーモンスターは１ターンに１体しか攻撃できない。また、２体以上のアーマーモンスターが自分のフィールド上に存在し、アーマーモンスターが攻撃対象にされた時、そのアーマーモンスターのコントローラーは攻撃対象を自分のコントロールする任意のアーマーモンスターに変更する事ができる。）

  | stat_change  = This card gains DEF
  | m/s/t        = Destroys itself
  | life_points  = Reduces battle damage
  | supports     = Armor monster
  }}

