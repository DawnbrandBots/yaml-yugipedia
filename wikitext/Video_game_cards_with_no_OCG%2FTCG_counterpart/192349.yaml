  | fr_lore      = Tous les monstres de Type Plante que vous contrôlez gagnent 200 ATK pour chaque monstre de Type Plante que vous contrôlez. Lorsqu'un ou plusieurs monstres de Type Plante sont Invoqués Normalement ou Spécialement depuis la main : le joueur qui a mené l'Invocation peut Invoquer Spécialement 1 "Tomatejeton" (Type Plante/TERRE/Niveau 1/ATK 0/DEF 0).
  | de_lore      = Alle Monster vom Typ Pflanze, die du kontrollierst, erhalten 200 ATK für jedes Monster vom Typ Pflanze, das du kontrollierst. Wenn Monster vom Typ Pflanze als Normal- oder Spezialbeschwörung von der Hand beschworen werden: Der Spieler, der die Beschwörung durchgeführt hat, kann 1 „Tomaten-Spielmarke“ (Typ Pflanze/ERDE/Stufe 1/ATK 0/DEF 0) als Spezialbeschwörung beschwören.
  | it_lore      = Tutti i mostri di Tipo Pianta che controlli guadagnano 200 ATK per ogni mostro di Tipo Pianta che controlli. Quando uno o più mostri di Tipo Pianta vengono Evocati Normalmente o Specialmente dalla mano: il giocatore che ha effettuato l'Evocazione può Evocare Specialmente 1 "Segna-Pomodoro"(Tipo Pianta/TERRA/Livello 1/ATK 0/DEF 0).
  | es_lore      = Todos los monstruos de Tipo Plata que controles ganan 200 ATK por cada monstruo de Tipo Planta que controles. Cuando uno o más monstruos de Tipo Planta son Invocados de Modo Normal o Especial desde la mano: el jugador que realizó la Invocación puede Invocar de Modo Especial 1 "Tomaficha" (Tipo Planta/TIERRA/Nivel 1/ATK 0/DEF 0).
  | ja_lore      = 自分フィールド上の植物族モンスターの攻撃力は、自分フィールド上の植物族モンスターの数×２００ポイントアップする。また、お互いのプレイヤーは植物族モンスターを手札から召喚・特殊召喚に成功した時、「トマトークン」(植物族・地・星１・攻／守０)１体を特殊召喚できる。
