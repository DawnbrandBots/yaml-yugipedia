  | lore         = You can [[Special Summon]] this card (from your [[hand]]) by [[Tributing]] 2 [[Token Monster|Token]]s. When a [[Level]] 10 or higher [[Monster Card|monster]](s) is [[Normal Summon|Normal]] or Special Summoned (except during the [[Damage Step]]): You can change all Level 9 or lower monsters on the [[field]] to [[face-up]] [[Defense Position]]. When a monster other than this card is changed from face-up [[Attack Position]] to face-up Defense Position; its [[DEF]] becomes 0.
  | fr_lore      = Vous pouvez Invoquer Spécialement cette carte (depuis votre main) en Sacrifiant 2 Jetons. Lorsqu'un ou plusieurs monstres de min. Niveau 10 sont Invoqués Normalement ou Spécialement (sauf durant la Damage Step) : vous pouvez changer tous les monstres de max. Niveau 9 sur le Terrain en Position de Défense face recto. Lorsqu'un monstre (cette carte exclue) est changé de Position d'Attaque face recto en Position de Défense face recto ; son DEF devient 0.
  | de_lore      = Du kannst diese Karte als Spezialbeschwörung (von deiner Hand) beschwören, indem du 2 Spielmarken als Tribut anbietest. Wenn Monster der Stufe 10 oder höher als Normal- oder Spezialbeschwörung beschworen werden (außer während des Damage Steps): Du kannst alle Monster der Stufe 9 oder niedriger auf dem Spielfeld in die offene Verteidigungsposition ändern. Wenn ein Monster außer dieser Karte aus der offenen Angriffsposition in die offene Verteidigungsposition geändert wird; werden seine DEF zu 0.
  | it_lore      = Puoi Evocare Specialmente questa carta (dalla tua mano) offrendo come Tributo 2 Segna-Mostro. Quando uno o più mostri di Livello 10 o superiore vengono Evocati Normalmente o Specialmente (eccetto durante il Damage Step): puoi mettere scoperti in Posizione di Difesa tutti i mostri di Livello 9 o inferiore sul Terreno. Quando un mostro diverso da questa carta viene messo da scoperto in Posizione di Attacco a scoperto in Posizione di Difesa; il suo DEF diventa 0.
  | es_lore      = Puedes Invocar esta carta de Modo Especial (desde tu mano) Sacrificando 2 Fichas. Cuando uno o más monstruos de Nivel 10 o mayor son Invocados de Modo Normal o Especial (excepto durante el Damage Step): puedes cambiar a Posición de Defensa boca arriba a todos los monstruos de Nivel 9 o menor en el Campo. Cuando un monstruo que no sea esta carta es cambiado de Posición de Ataque boca arriba a Posición de Defensa boca abajo; su DEF se convierte en 0.
  | ja_lore      = このカードは自分フィールド上のトークン２体をリリースして手札から特殊召喚できる。このカードがフィールド上に表側表示で存在し、レベル１０以上のモンスターが召喚・特殊召喚に成功した時、フィールド上のレベル９以下のモンスターを全て表側守備表示にできる。また、このカード以外のフィールド上のモンスターが表側攻撃表示から表側守備表示になった時、そのモンスターの守備力を０にする。
