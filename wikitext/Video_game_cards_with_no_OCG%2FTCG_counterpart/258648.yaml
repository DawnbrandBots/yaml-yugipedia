  | ja_name      = {{Ruby|超|ちょう}}{{Ruby|巨|きょ}}{{Ruby|大|だい}}{{Ruby|飛|ひ}}{{Ruby|行|こう}}{{Ruby|艇|てい}}ジャイアント・ヒンデンブルグ
  | romaji_name  = Chōkyodai Hikōtei Jaianto Hindenburugu
