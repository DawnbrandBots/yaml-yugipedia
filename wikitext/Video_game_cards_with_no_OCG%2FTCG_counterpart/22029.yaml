  | fr_lore      = Pour chaque Monstre Armure sur ton Terrain, cette carte reçoit un bonus DEF de 200 points. Si un monstre ennemi combat cette carte, l'ATK du monstre ennemi est réduite du nombre équivalent à l'ATK de cette carte. (Seul 1 Monstre Armure peut attaquer par tour. Si 2 Monstres Armures ou plus se trouvent sur ton Terrain et qu'un Monstre Armure est la cible d'une attaque, le contrôleur de ce Monstre Armure peut changer de cible d'attaque pour n'importe lequel des Monstres Armures contrôlés.)
  | de_lore      = Mit dieser Karte bekommst du pro Panzermonster auf deinem Feld einen ATK-Bonus von 200 Punkten. Greift ein gegnerisches Monster diese Karte an, wird dessen ATK-Wert um den ATK-Wert dieser Karte gemindert. (Es kann nur ein Panzermonster pro Runde angreifen. Wenn ein Spieler zwei oder mehr Panzermonster auf dem Feld hat und eins davon angegriffen wird, kann der Spieler den Angriff auf ein Panzermonster seiner Wahl umleiten).
  | it_lore      = Il valore ATK di questa Carta aumenta di 200 punti per ciascun Mostro Armatura presente nella tua parte di Campo. Se un Mostro nemico attacca questa Carta, il valore ATK dell'attaccante viene ridotto di un ammontare pari al valore ATK di questa Carta. Un solo Mostro Armatura può attaccare ad ogni turno. Se nella tua parte di Campo sono presenti 2 o più Mostri Armatura e uno di essi viene attaccato dal nemico, il suo possessore può far diventare bersaglio dell'attacco un altro dei Mostri Armatura sotto il suo controllo.
  | es_lore      = Por cada monstruo Blindado en tu Campo, esta carta recibe una bonificación de 200 puntos de ATQ. Si un monstruo enemigo combate contra esta carta, el ATQ del monstruo enemigo se reduce en una cantidad igual al ATQ de esta carta. (Sólo un monstruo Blindado puede atacar por turno. Si en tu Campo hay 2 o más monstruos Blindados y un monstruo Blindado es el blanco de un ataque, el controlador de ese monstruo Blindado puede cambiar el blanco del ataque a cualquiera de los monstruos Blindados que controla).

