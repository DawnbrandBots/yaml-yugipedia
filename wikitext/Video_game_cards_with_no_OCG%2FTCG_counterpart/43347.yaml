  | lore            = You can activate this card's effect when your opponent Synchro Summons a monster. Return that monster to the Extra Deck. Then Special Summon all of the monsters that were used for the Synchro Summon from your opponent's Graveyard to their side of the field. Your opponent cannot Summon a monster until the End Phase of their next turn.
  | ja_lore         = 相手がシンクロモンスターのシンクロ召喚に成功した時に発動する事ができる。そのモンスター１体をエクストラデッキに戻す。さらに、そのモンスターのシンクロ召喚に使用したモンスター一組を相手の墓地から相手フィールド上に特殊召喚する。相手は次の相手ターンのエンドフェイズ時までモンスターを召喚・反転召喚・特殊召喚する事はできない。
  }}
