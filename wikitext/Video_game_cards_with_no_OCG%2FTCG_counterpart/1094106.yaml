  | lore            = Must be activated from the [[Graveyard]]. If this card in your Graveyard: You can [[target]] 1 "[[Aesir]]" [[Monster Card|monster]] you [[control]]; this turn, it is unaffected by the effects of other Spell/Trap Cards. After activation, place this card from your Graveyard [[face-up]] in your [[Spell & Trap Card Zone]]. During your 3rd [[End Phase]] after activation, inflict [[Effect damage|damage]] to your opponent equal to the total [[ATK]] of all face-up monsters you control, and banish this card and all monsters you control.
