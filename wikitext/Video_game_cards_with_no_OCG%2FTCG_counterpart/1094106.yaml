  | ja_lore         = このカードは墓地からしか発動できない。自分フィールド上に表側表示で存在する「極神」と名のついたモンスター１体を選択して墓地から発動する事ができる。このターン選択したモンスターはこのカード以外の魔法・罠の効果を受けない。発動後このカードを墓地から表側表示で自分の魔法＆罠カードゾーンに置く。また、３回目の自分のエンドフェイズ時に自分フィールド上に表側表示で存在する全てのモンスターの攻撃力の合計分のダメージを相手ライフに与え、このカードと自分フィールド上に存在するモンスターを全てゲームから除外する。
