  | lore            = When a monster you control is destroyed and sent to the Graveyard, the Monster Card Zone that was occupied by that monster becomes unusable, and that monster is then Special Summoned. If this card's effect leaves you with no usable Monster Card Zones, you can send this card and your entire hand to the Graveyard to add up to 4 monsters from your Graveyard to your hand. You cannot conduct your Battle Phase during the turn you activate this effect.
