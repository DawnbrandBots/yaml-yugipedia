title: Over Boost
wikitext: |-
  {{DBT card
  | ja_name      = オーバーブースト・アーマー
  | romaji_name  = Ōbā Būsuto Āmā
  | trans_name   = Over Boost Armor

  | attribute    = EARTH
  | types        = Machine / Armor
  | level        = 4
  | atk          = 0
  | def          = 1000
  | number       = 784
  | lore         = When this card is on your [[Field]], [[Armor monster]]s can [[Direct attack|directly]] [[attack]] your opponent. If one or more Armor monsters attacks the opponent directly using this [[Card effect|effect]], [[destroy]] this card at the end of your turn. (Only one Armor monster can attack per turn. If there are 2 or more Armor monsters on your Field and an Armor monster is the [[Attack target|target]] of an [[attack]], the [[control]]ler of that Armor monster can change the target of the attack to any of the Armor monsters they control).

  | fr_name      = Accélération
  | de_name      = Über-Turbo
  | it_name      = Potenziamento Letale
  | es_name      = Sobrepropulsión

  | fr_lore      = Lorsque cette carte est sur ton Terrain, les Monstres Armure peuvent attaquer directement ton adversaire. Si un ou plusieurs Monstre Armure attaquent directement l'adversaire avec cet effet, cette carte est détruite à la fin de ton tour. (Seul 1 Monstre Armure peut attaquer par tour. Si 2 Monstres Armures ou plus se trouvent sur ton Terrain et qu'un Monstre Armure est la cible d'une attaque, le contrôleur de ce Monstre Armure peut changer de cible d'attaque pour n'importe lequel des Monstres Armures contrôlés.)
  | de_lore      = Befindet sich diese Karte auf deinem Feld, können Panzermonster deinen Gegner direkt angreifen. Greift mindestens ein Panzermonster den Gegner mit Hilfe dieses Effektes an, wird die Karte am Ende deines Spielzugs zerstört. (Es kann nur ein Panzermonster pro Runde angreifen. Wenn ein Spieler zwei oder mehr Panzermonster auf dem Feld hat und eins davon angegriffen wird, kann der Spieler den Angriff auf ein Panzermonster seiner Wahl umleiten).
  | it_lore      = Quando questa Carta è presente nella tua parte di Campo, i Mostri Armatura possono attaccare il tuo avversario direttamente. Se uno o più Mostri Armatura attaccano direttamente l'avversario usando l'effetto di questa Carta, essa viene distrutta alla fine del tuo turno. Un solo Mostro Armatura può attaccare ad ogni turno. Se nella tua parte di Campo sono presenti 2 o più Mostri Armatura e uno di essi viene attaccato dal nemico, il suo possessore può far diventare bersaglio dell'attacco un altro dei Mostri Armatura sotto il suo controllo.
  | es_lore      = Cuando esta carta está en tu Campo, los monstruos Blindados pueden atacar directamente a tu oponente. Si uno o más monstruos Blindados atacan directamente al oponente utilizando este efecto, destruye esta carta al final de tu turno. (Sólo un monstruo Blindado puede atacar por turno. Si en tu Campo hay 2 o más monstruos Blindados y un monstruo Blindado es el blanco de un ataque, el controlador de ese monstruo Blindado puede cambiar el blanco del ataque a cualquiera de los monstruos Blindados que controla).

  | m/s/t         = Destroys itself
  | supports      = Armor monster
  | attack        =
  * Allows direct attacks
  * Manage attack targets
  * Prevents attacks
  }}

