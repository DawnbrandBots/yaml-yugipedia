title: High and Low (Tag Force 6)
wikitext: |-
  {{Tag Force 6 card
  | card_type       = Trap
  | property        = Normal
  | rarity          = Common
  | internal_number = 3798
  | lore            = When a [[face-up]] [[monster]] you [[control]] is [[target]]ed for an [[attack]]: [[Send]] the top card of your [[Main Deck|Deck]] to the [[Graveyard]], and if it is a monster, the attack target gains ATK equal to the ATK of the monster sent to the Graveyard, until the [[End Phase]]. If the attack target's ATK becomes higher than the attacking monster's ATK, [[destroy]] the attack target. You can repeat this effect up to 3 times.
  | genres          = 
  * Destroy monster
  * Increase/Decrease ATK/DEF
  * Game Original
  * Send to Graveyard
  | ja_lore         = 自分フィールド上に表側表示で存在するモンスターが攻撃対象に選択された時に発動する事ができる。自分のデッキの一番上のカードを墓地へ送る。そのカードがモンスターだった場合、エンドフェイズ時まで攻撃対象モンスターの攻撃力は墓地へ送ったモンスターの攻撃力分だけアップする。攻撃対象モンスターの攻撃力が攻撃モンスターの攻撃力より上の場合、攻撃対象モンスターを破壊する。この効果を３回まで繰り返す事ができる。
  }}
