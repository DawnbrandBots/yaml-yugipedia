  | lore         = This card cannot be [[Summon]]ed without an [[Armor monster|Armor]] [[Monster Card|monster]] on your [[Field]]. For each Armor monster on your Field, this card receives a 200-point [[ATK]] bonus. When this card attacks a monster in [[Defense Position]], and the [[ATK]] of this card exceeds the [[DEF]] of the monster in Defense Position, then apply the difference to the opponent as [[LP|Life Point]] [[Battle damage|damage]]. (Only one Armor monster can [[attack]] per turn. If there are 2 or more Armor monsters on your Field and an Armor monster is the [[Attack target|target]] of an attack, the [[control]]ler of that Armor monster can change the target of the attack to any of the Armor monsters they control).

  | fr_name      = Gant de Désintégration.
  | de_name      = Knöchelknacker
  | it_name      = Colpo Vitale
  | es_name      = Nudillo Destrozador

  | fr_lore      = Cette carte ne peut pas être invoquée si un Monstre Armure n'est pas présent sur ton Terrain. Pour chaque Monstre Armure sur ton Terrain, cette carte reçoit un bonus d'ATK de 200 points. Si cette carte attaque un Monstre en Position de Défense et que son ATK est supérieure à la DEF de ce Monstre, soustrait la différence du nombre de Life Points de l'adversaire. (Seul 1 Monstre Armure peut attaquer par tour. Si 2 Monstres Armures ou plus se trouvent sur ton Terrain et qu'un Monstre Armure est la cible d'une attaque, le contrôleur de ce Monstre Armure peut changer de cible d'attaque pour n'importe lequel des Monstres Armures contrôlés.)
  | de_lore      = Diese Karte kann nur dann beschworen werden, wenn sich ein Panzermonster auf deinem Feld befindet. Mit dieser Karte bekommst du pro Panzermonster auf deinem Feld einen ATK-Bonus von 200 Punkten. Greift diese Karte ein Monster in Verteidigungsposition an, und übersteigt der ATK-Wert dieser Karte den DEF-Wert des Monsters, wird der Unterschied zwischen den beiden Zahlen von den LP des Gegners abgezogen. (Es kann nur ein Panzermonster pro Runde angreifen. Wenn ein Spieler zwei oder mehr Panzermonster auf dem Feld hat und eins davon angegriffen wird, kann der Spieler den Angriff auf ein Panzermonster seiner Wahl umleiten).
  | it_lore      = Questa Carta non può essere evocata se nella tua parte di Campo non sono presenti Mostri Armatura. Il valore ATK di questa Carta aumenta di 200 punti per ciascun Mostro Armatura presente nella tua parte di Campo. Quando questa Carta attacca un Mostro che si trova in Posizione Difensiva e il suo valore ATK è superiore al valore DEF del Mostro attaccato, i Punti Vita dell'avversario diminuiscono di un ammontare pari alla differenza tra il valore ATK dell'attaccante e il valore DEF del difensore. Un solo Mostro Armatura può attaccare ad ogni turno. Se nella tua parte di Campo sono presenti 2 o più Mostri Armatura e uno di essi viene attaccato dal nemico, il suo possessore può far diventare bersaglio dell'attacco un altro dei Mostri Armatura sotto il suo controllo.
  | es_lore      = Esta carta no puede ser Invocada sin un monstruo Blindado en tu Campo. Por cada Monstruo Blindado en tu Campo, esta carta recibe una bonificación de 200 puntos de ATQ. Cuando esta carta ataca a un monstruo en Posición de Defensa, y el ATQ de esta carta excede el DEF del monstruo en la Posición de Defensa entonces se aplica la diferencia al oponente como daño a los Puntos de Vida. (Sólo un monstruo Blindado puede atacar por turno. Si en tu Campo hay 2 o más monstruos Blindados y un monstruo Blindado es el blanco de un ataque, el controlador de ese monstruo Blindado puede cambiar el blanco del ataque a cualquiera de los monstruos Blindados que controla).

