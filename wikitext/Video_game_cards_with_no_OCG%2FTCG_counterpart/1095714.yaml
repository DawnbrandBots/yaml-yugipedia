  | lore            = While this card is [[face-up]] on the [[field]], you cannot [[activate]] any [[Spell Card|Spell]] or [[Trap Card]]s. Once during your opponent's [[End Phase]], you can [[select]] 1 Spell or Trap Card from your [[Main Deck|Deck]] and, after [[reveal]]ing the card, [[Set]] it in your [[Spell & Trap Card Zone]]. During your [[Main Phase]], [[send]] this card and all Trap and Spell Cards Set by its [[effect]] from your side of the [[field]] to the [[Graveyard]]. Then, based on the number of cards sent to the Graveyard, inflict the following amount of [[effect damage|damage]] to your opponent's [[Life Points]]:<br />●2 cards: 500 points<br />●3 cards: 1500 points<br />●4 cards: 3000 points<br />●5 cards: 6000 points
  | genres          = 
  * Search Deck
  * Reduce Life Points
  * Game Original
  | ja_lore         = このカードがフィールド上に表側表示で存在する限り、自分は魔法・罠カードを発動する事ができない。相手のエンドフェイズ時に１度、自分のデッキから魔法または罠カード１枚を選択し、お互い確認して自分の魔法＆罠カードゾーンにセットする事ができる。自分のメインフェイズ時自分フィールド上に存在するこのカードと、このカードの効果でセットした魔法・罠カードゾーンのカードを全て墓地へ送る事で、墓地に送った数によって以下の数値分のダメージを相手ライフに与える。<br/>●２枚：５００ポイント<br/>●３枚：１５００ポイント<br/>●４枚：３０００ポイント<br/>●５枚：６０００ポイント
  }}
