  | ja_lore         = フィールド上に存在するダークシンクロモンスターが戦闘またはカードの効果によって破壊された場合に発動する事ができる。自分フィールド上に「ダーク・マター・トークン」（悪魔族・闇・星１・攻／守０）２体を表側守備表示で特殊召喚する。このトークンは戦闘では破壊されず、次のターンのエンドフェイズ時に破壊される。
