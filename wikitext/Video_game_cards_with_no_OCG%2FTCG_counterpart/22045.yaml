  | fr_lore      = Au cours de ta Phase de Combat, les dégâts de combat reçus par cette carte sont ramenés à 0. Le monstre qui a combattu cette carte est détruit et 500 points de dégâts sont infligés au joueur adverse. (Seul 1 Monstre Armure peut attaquer par tour. Si 2 Monstres Armures ou plus se trouvent sur ton Terrain et qu'un Monstre Armure est la cible d'une attaque, le contrôleur de ce Monstre Armure peut changer de cible d'attaque pour n'importe lequel des Monstres Armures contrôlés.)
  | de_lore      = Die in deiner Kampfphase an dieser Karte entstandenen Schäden werden auf 0 reduziert. Das Monster, das gegen diese Karte angetreten ist, wird zerstört. Außerdem erleidet der gegnerische Spieler einen Schaden in Höhe von 500 Punkten. (Es kann nur ein Panzermonster pro Runde angreifen. Wenn ein Spieler zwei oder mehr Panzermonster auf dem Feld hat und eins davon angegriffen wird, kann der Spieler den Angriff auf ein Panzermonster seiner Wahl umleiten).
  | it_lore      = Durante la tua Fase di Battaglia, i danni di battaglia ricevuti da questa Carta vengono ridotti a zero. Il Mostro con cui questa Carta ha combattuto viene distrutto e l'avversario subisce 500 unità di danni ai propri Punti Vita. Se nella tua parte di Campo sono presenti 2 o più Mostri Armatura e uno di essi viene attaccato dal nemico, il suo possessore può far diventare bersaglio dell'attacco un altro dei Mostri Armatura sotto il suo controllo.
  | es_lore      = Durante tu Fase de Batalla, el daño de batalla recibido por esta carta se reduce a 0. El monstruo que peleó contra esta carta es destruido, y al jugador oponente se le ocasionan 500 puntos de daño. (Sólo un monstruo Blindado puede atacar por turno. Si en tu Campo hay 2 o más monstruos Blindados y un monstruo Blindado es el blanco de un ataque, el controlador de ese monstruo Blindado puede cambiar el blanco del ataque a cualquiera de los monstruos Blindados que controla).

