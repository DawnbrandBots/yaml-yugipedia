  | lore         = During your [[Battle Phase]], [[battle damage]] received by this card is reduced to 0. The [[Monster Card|monster]] that [[Battle|fought]] this card is [[destroy]]ed, and 500 points of [[Effect damage|damage]] is inflicted upon the opposing player. (Only one Armor monster can [[attack]] per turn. If there are 2 or more Armor monsters on your [[Field]] and an Armor monster is the [[Attack target|target]] of an attack, the [[control]]ler of that Armor monster can change the target of the attack to any of the Armor monsters they control).

  | fr_name      = Destruction Massive
  | de_name      = Pfahlknacker
