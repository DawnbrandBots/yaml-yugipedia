title: Video game-only
wikitext: |-
  There are several cards seen in video games that do not currently exist in the ''[[TCG]]'' and ''[[OCG]]''. While many video game cards have been released in the ''TCG'' and ''OCG'', there is no guarantee that any given video game card will eventually be released.

