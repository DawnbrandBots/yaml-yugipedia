  | lore         = You cannot [[Summon]] this [[Monster Card|monster]] without an [[Armor monster]] on your [[Field]]. This card cannot [[attack]]. (Only one Armor monster can attack per [[turn]]. If there are 2 or more Armor monsters on your Field and an Armor monster is the [[Attack target|target]] of an attack, the [[control]]ler of that Armor monster can change the target of the attack to any of the Armor monsters they control).

