  | fr_lore      = Tu ne peux pas invoquer ce monstre sans un Monstre Armure sur ton Terrain. Cette carte ne peut pas attaquer. (Seul 1 Monstre Armure peut attaquer par tour. Si 2 Monstres Armures ou plus se trouvent sur ton Terrain et qu'un Monstre Armure est la cible d'une attaque, le contrôleur de ce Monstre Armure peut changer de cible d'attaque pour n'importe lequel des Monstres Armures contrôlés.)
  | de_lore      = Du kannst dieses Monster nur dann beschwören, wenn du ein Panzermonster auf dem Feld hast. Diese Karte kann nicht angreifen. (Es kann nur ein Panzermonster pro Runde angreifen. Wenn ein Spieler zwei oder mehr Panzermonster auf dem Feld hat und eins davon angegriffen wird, kann der Spieler den Angriff auf ein Panzermonster seiner Wahl umleiten).
  | it_lore      = Non puoi evocare questo Mostro se nella tua parte di Campo non sono presenti Mostri Armatura. Questo Mostro non può attaccare. Un solo Mostro Armatura può attaccare ad ogni turno. Se nella tua parte di Campo sono presenti 2 o più Mostri Armatura e uno di essi viene attaccato dal nemico, il suo possessore può far diventare bersaglio dell'attacco un altro dei Mostri Armatura sotto il suo controllo.
  | es_lore      = No puedes Invocar a este monstruo sin un monstruo Blindado en tu campo. Esta carta no puede atacar. (Sólo un monstruo Blindado puede atacar por turno. Si en tu Campo hay 2 o más monstruos Blindados y un monstruo Blindado es el blanco de un ataque, el controlador de ese monstruo Blindado puede cambiar el blanco del ataque a cualquiera de los monstruos Blindados que controla).
  | ja_lore      = 自分のフィールド上にアーマーモンスターが存在しない場合、このカードは召喚する事ができない。このカードは攻撃に参加できない。（アーマーモンスターは１ターンに１体しか攻撃できない。また、２体以上のアーマーモンスターが自分のフィールド上に存在し、アーマーモンスターが攻撃対象にされた時、そのアーマーモンスターのコントローラーは攻撃を自分のコントロールする任意のアーマーモンスターに変更する事ができる。）

