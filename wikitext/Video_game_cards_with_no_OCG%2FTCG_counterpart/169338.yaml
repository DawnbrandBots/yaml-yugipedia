  | lore                  = When this card is [[Special Summon]]ed by the [[effect]] of "[[Stray Cat]]": [[Destroy]] all [[Level]] 4 or lower [[Monster Card|monster]]s your opponent [[control]]s, and if you do, inflict 800 [[Effect damage|damage]] to your opponent for each monster destroyed. Once per [[turn]]: You can [[target]] 1 "[[Stray Cat]]" or "[[Stray Cat Girl]]" in your [[Graveyard]]; [[Add a card|add]] that target to your [[hand]].
  | fr_lore               = Lorsque cette carte est Invoquée Spécialement par l'effet de "Chat Errant" : détruisez tous les monstres de max. Niveau 4 contrôlés par votre adversaire, et si vous le faites, infligez 800 points de dommages à votre adversaire pour chaque monstre détruit. Une fois par tour : vous pouvez cibler 1 "Chat Errant" ou "Fille Chat Errant" dans votre Cimetière ; ajoutez la cible à votre main.
  | de_lore               = Wenn diese Karte durch den Effekt von „Streunerkatze“ als Spezialbeschwörung beschworen wird: Zerstöre alle Monster der Stufe 4 oder niedriger, die dein Gegner kontrolliert, und falls du dies tust, füge deinem Gegner 800 Schaden für jedes zerstörte Monster zu. Einmal pro Spielzug: Du kannst 1 „Streunerkatze“ oder „Streunerkatzenmädchen“ in deinem Friedhof wählen; füge das gewählte Ziel deiner Hand hinzu.
  | it_lore               = Quando questa carta viene Evocata Specialmente dall'effetto di "Gatto Randagio": distruggi tutti i mostri di Livello 4 o inferiore controllati dal tuo avversario e, se lo fai, infliggi al tuo avversario 800 danni per ogni mostro distrutto. Una volta per turno: puoi scegliere come bersaglio 1 "Gatto Randagio" o "Ragazza Gatto Randagia" nel tuo Cimitero; aggiungi quel bersaglio alla tua mano.
  | es_lore               = Cuando esta carta es Invocada de Modo Especial por el efecto de "Gato Callejero": destruye todos los monstruos de Nivel 4 o menor que controle tu adversario y, si lo haces, inflige 800 puntos de daño a tu adversario por cada monstruo destruido. Una vez por turno: puedes seleccionar 1 "Gato Callejero" o "Chica Gato Extraviada" en tu Cementerio; añade ese objetivo a tu mano.
  | ja_lore               = このカードが「捨て猫」の効果によって特殊召喚に成功した時、相手フィールド上のレベル４以下のモンスターを全て破壊し、破壊したモンスターの数×８００ポイントダメージを相手ライフに与える。また、１ターンに１度、自分の墓地から「捨て猫」または「捨て猫娘」１体を選択して手札に加える事ができる。
