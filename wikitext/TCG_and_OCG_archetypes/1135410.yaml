  "'''DoomZ'''"<ref group="Note">Pronounced "doomz", not "doom zee/zed".</ref> (ドゥームズ ''Dūmuzu'') is an archetype of [[DARK]] [[Dragon]] monsters and [[WIND]] [[Machine]] monsters introduced in ''[[Doom of Dimensions]]''. It is connected to the "[[Power Patron]]", "[[Artmage]]", "[[Elfnote]]", and "[[Ars Magna]]" archetypes through the lore surrounding "[[Medius the Pure]]".

  == Lore ==
  {{Main|The Valuable Book EX 6 card storylines#No. 1: The Proxy War of the Gods}}

  == Design ==
  "DoomZ" monsters appear to be cyborgs with clock motifs. The theme's name, along with the associated kanji 「終刻」 (''shūkoku'', lit. "final hour"), references the [[wikipedia:Doomsday Clock|Doomsday Clock]], a hypothetical clock signifying the amount of time before the extinction of humanity.

  Main Deck members derive their names from the moons of [[wikipedia:Jupiter|Jupiter]]. Except for "Drastea", the number in the monster's name [[wikipedia:modulo|modulo]] 12 (consistent with the clock motif) matches the one assigned to the moon based on the order of discovery.

