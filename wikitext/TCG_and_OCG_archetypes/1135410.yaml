  == Playstyle ==
  "DoomZ" revolves around "[[Medius the Pure]]" (alongside its related "[[Power Patron]]" cards), [[Xyz Summon]]ing (both conventional and unique methods), [[Destroy|destruction]] (of the user's cards), and the use of [[Equip Spell Card]]s (and other [[Equip Card]]s). 

  The "DoomZ" Main Deck monsters include:
  *"[[DoomZ VII Seven - Elara]]" and "[[DoomZ V Five - Amalthe]]" serve as the main starters of "DoomZ" strategies as they can search "DoomZ" Spells/Traps and monsters upon their Normal/Special Summons (and destruction), respectively. 

  *"[[DoomZ XII Zero - Drastea]]" is an extender, being able to Special Summon itself by destroying a "DoomZ" card on the field and equipping any Equip Spell Card from the Deck to it.

  * "[[Power Patron DoomZ]]" can also enable use any Effect Monster to "Xyz Summon" any "DoomZ" Xyz Monster or "[[Jupiter the Power Patron of Destruction]]", then equipping itself to the newly summoned monster. Can search any "DoomZ" card upon destruction. 

  *The [[Pendulum Monster]] "[[Jupredo the Shademachine Power Patron]]" can either destroy itself to "Xyz Summon" "Jupiter" as its monster effect or for its [[Pendulum Effect]], it can destroy itself and 1 "DoomZ" monster in the hand to optionally destroy any card on the field. Either way, "Jupredo" can search for any "DoomZ" or "Power Patron" Spell/Trap if added to the face-up Extra Deck after being destroyed from the field.

  "Elara", "Amalthe" and "Drastea" share the Quick Effect which lets them "Xyz Summon" a "DoomZ" Xyz Monster with the same Rank as their Level while having Equip Cards.

  The archetype's Xyz Monsters' line-up includes:

  * "[[DoomZ Break - Diactorus]]" (Rank 4): Upon Special Summon, it can destroy any "DoomZ" card in the user's hand or face-up field, then it can destroy 1 monster on the field. Upon destruction (if it has a "DoomZ" or "[[Medius the Pure]]" as material), it can take any Equip Spell from the Deck and either add it to hand or send it to the GY.

  * "[[DoomZ XIII Over - Graflareio]]" (Rank 5): A central combo piece that can be easily "Xyz Summoned" by using another "DoomZ" Xyz Monster as material despite being a Rank 5. Can search any "DoomZ" Spell/Trap, then can destroy 1 card on the field. Upon its destruction, it can Special Summon any non-Xyz "DoomZ" monster from the Deck or GY.

  * "[[DoomZ XII End - Drastrius]]" (Rank 8): The archetype's main boss monster; it can equip any face-up monster to itself as an Equip Card, can negate any activated effect of a monster (that is on the field or GY) then equip any monster to it as an Equip Card. It also protects itself from a one-time battle or effect destruction per turn.

  * "[[Jupiter the Power Patron of Destruction]]" (Rank 10): The "Power Patron" Extra Deck representative of the Xyz-oriented "DoomZ", it can be easily "Xyz Summoned" using a monster with 3 or more Equip Cards. Upon Xyz Summon, it can equip up to 3 Equip Spells from the GY to itself, Special Summon a "DoomZ" monster from the GY. It gains 3000 ATK if it has an Xyz Monster to it as material, making it an OTK enabler.

  The archetype's supporting Spells and Traps are as follows:

  * "[[DoomZ Change]]": Destroys any "DoomZ" card on the field, hand or Deck. If destroyed by card effect, it can recur any "DoomZ" card from the GY to the hand, then Special Summon a "DoomZ" monster from the hand.

  * "[[DoomZ Raiders]]": Destroys a "DoomZ" card in the hand or face-up field to Special Summon a "DoomZ" monster from the Deck.

  * "[[DoomZ Command "D.O.O.M.D.U.R.G."]]": An Equip Spell that damages the controller of the equipped monster, but provides a "DoomZ" monster or a WIND Machine Xyz Monster with targetting protection, and the Quick Effect to destroy any face-up card the user controls for an ATK boost and the ability to attack directly. It has strong synergy when equipped directly from the Deck with "Drastea", which can Xyz Summon a "Drastrius" with this card as material, adding more difficultly for the opponent to get rid of this card.

  * "[[DoomZ Command "A.D.R.A.S.T.E.I.A."]]": An Equip Spell that destroys the equipped monster, then Special Summon a "DoomZ" monster from the hand, GY or banishment. It can also equip itself from the GY while taking some damage.

  * "[[DoomZ Destruction]]": A Normal Trap that equips itself to a "DoomZ" Xyz Monster and gives the effect that prevents the opponent from adding cards from the Main Deck to their hand. If destroyed by card effect, "Destruction" can equip any "DoomZ" monster from the Deck to any monster on the field.

  Most combos often make the Rank 4 "Break - Diactorus" Xyz Monster which can then be used as the sole material for Xyz Summoning "XIII Over - Graflareio" as an important combo piece. "Graflareio" can search any "DoomZ" Spell or Trap; this being usually "DoomZ Raiders", which in turn can destroy "Graflareio" to Summon a "DoomZ" monster from the Deck, (then proc the effect of "Graflareio" to Special Summon another non-Xyz "DoomZ" monster from the Deck or GY). Other archetypal combos include activating the first effect of "Change" and then using the Quick Effect of "Command D.O.O.M.D.U.R.G."" that its equipped monster gets to then destroy that face-up "Change"; then in the next chain, the second effect of "Change" can be activated to recover the "DoomZ" card destroyed by the first effect of "Change".

  Since many "DoomZ" cards can optionally destroy any card on the field, this lets the "DoomZ" user break their opponent's field, as they set up their own field. As "DoomZ" frequently destroy their own cards as part of gaining advantage, most "DoomZ" cards have effects that trigger upon their destruction.
   
  The addition of "[[Power Patron]]" cards and "[[Medius the Pure]]" provide additional combo routes for the "DoomZ" strategy. Namely, "Medius", "[[Vidolium the Unstable Power Patron of Unity]]", "[[Plundered Power Patron Plane - Vidolia]]" are able to search and/or Summon either "Power Patron DoomZ" or "Jupredo". The strategy can also accomodate a package of "[[Therion "King" Regulus]]", which can be accessed by "[[Springans Merrymaker]]" and "[[Gigantic "Champion" Sargas]]", serving as potent endboard pieces.

  === Sample combos ===
  {{Combo steps
  | opening = "[[DoomZ VII Seven - Elara]]" + 1 card in hand
  | end = "[[DoomZ XII End - Drastrius]]" + "[[Gigantic "Champion" Sargas]]" + "[[Therion "King" Regulus]]" + "[[Varudras, the Final Bringer of the End Times]]" + "[[DoomZ Destruction]]" + "[[DoomZ Raiders]]" + [[Plundered Power Patron Plane - Vidolia]]".
  | steps =
  # Normal Summon "Elara" and activate its effect to Set "[[DoomZ Command "A.D.R.A.S.T.E.I.A."]]" from Deck.
  # Activate "A.D.R.A.S.T.E.I.A." by equipping it to "Elara".
  # Activate the Quick Effect of "Elara" to "Xyz Summon" "[[DoomZ Break - Diactorus]]" with "Elara" and "A.D.R.A.S.T.E.I.A." as its [[Xyz Material]]s.
  # Use "Diactorus" as material to Xyz Summon "[[DoomZ XIII Over - Graflareio]]".
  # Activate the effect of "Graflareio" by detaching a material to add "[[DoomZ Raiders]]" from Deck to hand.
  # Activate "Raiders" then activate its on-field effect to destroy "Graflareio" and Special Summon "[[DoomZ V Five - Amalthe]]" from Deck.
  # Activate the effects of the destroyed "Graflerio" and the Summoned "Amalthe". The Chain resolves by "Amalthe" adding "[[DoomZ XII Zero - Drastea]]" from Deck to hand while the effect of "Graflareio" Special Summons "[[Power Patron DoomZ]]" from the Deck.
  # Activate the effect of "A.D.R.A.S.T.E.I.A." in the GY to equip to "Power Patron DoomZ" and take 100 damage.
  # Activate the on-field effect of "A.D.R.A.S.T.E.I.A." to destroy "Power Patron DoomZ" and Special Summon "Elara" from the GY.
  # Activate the effect of "Power Patron DoomZ" in the GY to add "[[DoomZ Change]]" from Deck to hand.
  # Use "Elara" and "Amalthe" to Xyz Summon "[[Springans Merrymaker]]".
  # Use "Merrymaker" to Xyz Summon "[[Gigantic "Champion" Sargas]]".
  # Activate the effect of "Sargas" to add "[[Therion "King" Regulus]]" from Deck to hand.
  # Activate the effect of "Regulus" to target any "DoomZ" [[Machine]] monster to Special Summon "Regulus" from the hand and equip the target to "Regulus".
  # Activate the effect of "Drastea" by targetting the "DoomZ" card equipped to "Regulus" to destroy the target, Special Summon "Drastea" and equip "[[DoomZ Command "D.O.O.M.D.U.R.G."]] to "Drastea".
  # Activate "Change", then activate the effect of "Drastea" (provided by "D.O.O.M.D.U.R.G") targetting "Change" in the same chain. The Chain resolves with the effect of "Drastea" destroying "Change" while "Change" destroys "[[DoomZ Destruction]]" from the Deck.
  # Activate the second effect of "Change" and the second effect of "Destruction" from the GY in a Chain. The Chain resolves by the effect of "Destruction" equipping "[[Jupredo the Shademachine Power Patron]]" from the Deck to either "Sargas" or "Regulus" (do not equip it to "Drastea") while the effect of "Change" adds "Destruction" from GY to hand.
  # Activate the Quick Effect of "Drastea" to "Xyz Summon" "[[DoomZ XII End - Drastrius]]" using "Drastea" and "D.O.O.M.D.U.R.G" as materials.
  # Activate the effect of "Drastrius" (provided by "D.O.O.M.D.U.R.G") to destroy "Jupredo".
  # Activate the effect of "Jupredo" in the face-up [[Extra Deck]] to add "[[Prohibited Power Patron Portal - Terminus]]" from Deck to hand.
  # Activate "Terminus" to send "Jupredo" from the face-up Extra Deck or Main Deck to the GY, then add "[[Vidolium the Unstable Power Patron of Unity]]" from Deck to hand.
  # Activate "Vidolium" in the [[Pendulum Zone]], then activate the [[Pendulum Effect]] of "Vidolium" to destroy itself and Special Summon "Jupredo" from the GY.
  # Activate the effect of the destroyed "Vidolium" in the face-up Extra Deck to add "[[Plundered Power Patron Plane - Vidolia]]" from Deck to hand.
  # Activate "Vidolia", then activate its on-field effect by revealing "[[Jupiter the Power Patron of Destruction]]" to banish 1 card from hand face-down, then Special Summon a 2nd copy of "Jupredo" from the Deck.
  # Use both copies of "Jupredo" to Xyz Summon "[[Varudras, the Final Bringer of the End Times]]".
  # Set "Destruction" then during the opponent's turn, activate it to equip to "Drastrius".
  }}

