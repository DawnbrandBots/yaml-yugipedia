  == Playstyle ==
  "DoomZ" revolves around "[[Medius the Pure]]", [[Xyz Summon]]ing, [[Destroy|destruction]], and the use of [[Equip Spell Card]]s (and other [[Equip Card]]s). While having an Equip Card, most "DoomZ" Main Deck monsters share the Quick Effect of "[[Xyz Summon]]ing" any "DoomZ" Xyz Monster with the same rank as their Level by using themselves and the Equip Card(s) as material. Most combos often make a "DoomZ" Xyz Monster which can then be used as the sole material for Xyz Summoning "[[DoomZ XIII Over - Graflareio]]" as an important combo piece. "Graflareio" can search any "DoomZ" Spell or Trap; this being usually "[[DoomZ Raiders]]", which in turn can destroy "Graflareio" to Summon other "DoomZ" monsters from the Deck (then proc the effect of "Graflareio" to Special Summon another non-Xyz "DoomZ" monster from the GY).  

  Since many "DoomZ" cards can optionally destroy any card on the field, this lets the "DoomZ" user break their opponent's field, as they set up their own field, making them competent while going second.

  The addition of "[[Power Patron]]" cards and "[[Medius the Pure]]" provide additional combo routes for the "DoomZ" strategy. The strategy can also accomodate a package of "[[Therion "King" Regulus]]", (which can be accessed by "[[Springans Merrymaker]]" and "[[Gigantic "Champion" Sargas]]"), serving as a potent endboard piece.

  === Sample combos ===
  {{Combo steps
  | opening = "[[DoomZ VII Seven - Elara]]" + 1 card in hand
  | end = "[[DoomZ XII End - Drastrius]]" + "[[Gigantic "Champion" Sargas]]" + "[[Therion "King" Regulus]]" + "[[Varudras, the Final Bringer of the End Times]]" + "[[DoomZ Destruction]]" + "[[DoomZ Raiders]]" + [[Plundered Power Patron Plane - Vidolia]]".
  | steps =
  # Normal Summon "Elara" and activate its effect to Set "[[DoomZ Command "A.D.R.A.S.T.E.I.A."]]" from Deck.
  # Activate "A.D.R.A.S.T.E.I.A." by equipping it to "Elara".
  # Activate the Quick Effect of "Elara" to "Xyz Summon" "[[DoomZ Break - Diactorus]]" with "Elara" and "A.D.R.A.S.T.E.I.A." as its [[Xyz Material]]s.
  # Use "Diactorus" as material to Xyz Summon "[[DoomZ XIII Over - Graflareio]]".
  # Activate the effect of "Graflareio" by detaching a material to add "[[DoomZ Raiders]]" from Deck to hand.
  # Activate "Raiders" then activate its on-field effect to destroy "Graflareio" and Special Summon "[[DoomZ V Five - Amalthe]]" from Deck.
  # Activate the effects of the destroyed "Graflerio" and the Summoned "Amalthe". The Chain resolves by "Amalthe" adding "[[DoomZ XII Zero - Drastea]]" from Deck to hand while the effect of "Graflareio" Special Summons "[[Power Patron DoomZ]]" from the Deck.
  # Activate the effect of "A.D.R.A.S.T.E.I.A." in the GY to equip to "Power Patron DoomZ" and take 100 damage.
  # Activate the on-field effect of "A.D.R.A.S.T.E.I.A." to destroy "Power Patron DoomZ" and Special Summon "Elara" from the GY.
  # Activate the effect of "Power Patron DoomZ" in the GY to add "[[DoomZ Change]]" from Deck to hand.
  # Use "Elara" and "Amalthe" to Xyz Summon "[[Springans Merrymaker]]".
  # Use "Merrymaker" to Xyz Summon "[[Gigantic "Champion" Sargas]]".
  # Activate the effect of "Sargas" to add "[[Therion "King" Regulus]]" from Deck to hand.
  # Activate the effect of "Regulus" to target any "DoomZ" [[Machine]] monster to Special Summon "Regulus" from the hand and equip the target to "Regulus".
  # Activate the effect of "Drastea" by targetting the "DoomZ" card equipped to "Regulus" to destroy the target, Special Summon "Drastea" and equip "[[DoomZ Command "D.O.O.M.D.U.R.G."]] to "Drastea".
  # Activate "Change", then activate the effect of "Drastea" (provided by "D.O.O.M.D.U.R.G") targetting "Change" in the same chain. The Chain resolves with the effect of "Drastea" destroying "Change" while "Change" destroys "[[DoomZ Destruction]]" from the Deck.
  # Activate the second effect of "Change" and the second effect of "Destruction" from the GY in a Chain. The Chain resolves by the effect of "Destruction" equipping "[[Jupredo the Shademachine Power Patron]]" from the Deck to either "Sargas" or "Regulus" (do not equip it to "Drastea") while the effect of "Change" adds "Destruction" from GY to hand.
  # Activate the Quick Effect of "Drastea" to "Xyz Summon" "[[DoomZ XII End - Drastrius]]" using "Drastea" and "D.O.O.M.D.U.R.G" as materials.
  # Activate the effect of "Drastrius" (provided by "D.O.O.M.D.U.R.G") to destroy "Jupredo".
  # Activate the effect of "Jupredo" in the face-up [[Extra Deck]] to add "[[Prohibited Power Patron Portal - Terminus]]" from Deck to hand.
  # Activate "Terminus" to send "Jupredo" from the face-up Extra Deck or Main Deck to the GY, then add "[[Vidolium the Unstable Power Patron of Unity]]" from Deck to hand.
  # Activate "Vidolium" in the [[Pendulum Zone]], then activate the [[Pendulum Effect]] of "Vidolium" to destroy itself and Special Summon "Jupredo" from the GY.
  # Activate the effect of the destroyed "Vidolium" in the face-up Extra Deck to add "[[Plundered Power Patron Plane - Vidolia]]" from Deck to hand.
  # Activate "Vidolia", then activate its on-field effect by revealing "[[Jupiter the Power Patron of Destruction]]" to banish 1 card from hand face-down, then Special Summon a 2nd copy of "Jupredo" from the Deck.
  # Use both copies of "Jupredo" to Xyz Summon "[[Varudras, the Final Bringer of the End Times]]".
  # Set "Destruction".
  }}

