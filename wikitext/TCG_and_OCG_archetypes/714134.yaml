  "'''Branded'''" ({{Ruby|烙|らく}}{{Ruby|印|いん}} ''Rakuin'') is an [[archetype]] introduced in ''[[Lightning Overdrive]]''.

  == Lore ==
  {{Main|The Valuable Book EX card storylines#No. 01: The Closed Land|The Valuable Book EX 2 card storylines#No. 01: The Land of the Abyss|The Valuable Book EX 3 card storylines#No. 01: The Decisive Battle of the Northern Land|Story of White card storylines|The Valuable Book EX 6 card storylines#No. 10: Branded - Side Stories}}

  == Design ==
  Similar to "[[World Legacy]]" throughout [[Series 10]], the "Branded" cards serve as a connecting narrative thread between many of the themes introduced throughout [[Series 11]] that are part of the [[The Valuable Book EX 2 card storylines|''The Fallen & The Virtuous'' storyline]] (such as "[[Dogmatika]]" and "[[Despia]]"), and detail major plot developments through their artworks.

  == Playing style ==
  === General ===
  Initially it was most common for "Branded" to be played as "Branded" "Despia", due to these two being the two ''The Fallen & The Virtuous'' archetypes with the most synergy, however as time went on more archetypes in the "Branded" storyline received interconnecting cards, resulting in "Branded" decks also implementing cards from the "[[Bystial]]", "[[Tri-Brigade]]", "[[Swordsoul]]", "[[Dogmatika]]", "[[Ecclesia (archetype)|Ecclesia]]", and "[[Springans]]" archetypes. The decks main interconnection often being that most cards mentioned "Fallen of Albaz" in their text.

  "Branded" is an archetype of primarily [[Spell Card|Spell]] and [[Trap Card]]s that support various cards related to "[[Fallen of Albaz]]" and Fusion Summoning. It also directly supports the "[[Despia]]" and "[[Bystial]]" archetypes:

  * Despia: "Branded" "Despia" is a Fusion-based decktype that uses the "Branded" cards as playmakers, with the "Albaz" Fusion Monsters forming the Deck's primary resource loop. Cards in either archetype can search each other out.
  * Bystial: The "Bystials" are generally supported by the "Branded" [[Continuous Spell Card|Continuous Spells]] and [[Continuous Trap Card|Continuous Traps]]. "[[The Bystial Lubellion]]" and "[[Branded Beast]]" can place such cards directly from the Deck or GY respectively.

  The primary ways of searching "Branded" Spell and Traps are "[[Aluber the Jester of Despia]]", "[[Springans Kitt]]" and "[[Albion the Branded Dragon]]". They can also be 'searched' by sending them to the GY via cards like "[[Albion the Shrouded Dragon]]" and "[[Bystial Saronir]]", then recovering them with "[[Branded Retribution]]" or "[[Despian Tragedy]]".

  Each of the "Branded" Spells & Traps that debuted in ''[[Lightning Overdrive]]'' share an effect to Set themselves to the [[field]] at the [[End Phase]] if it is sent to the GY to activate the effect of "Fallen of Albaz". Similarly, other "Branded" Spells and Traps can recur themselves back to the hand when a Fusion Monster is sent to the GY (eg. "[[Branded in High Spirits]]" and "[[Brightest, Blazing, Branded King]]").

  Finally, "[[Branded in Central Dogmatika]]" supports the Ritual-centric portion of "[[Dogmatika]]".

  === Overview ===
  Many "Branded" support cards generically support Level 8 or higher Fusion Monsters, though many different ''The Fallen & The Virous''-related archetype cards support "Fallen of Albaz"-related cards (and vice-versa). 

  The initial builds focus on "Despia" came form noteworthy "Branded" cards that specifically support "Despia" monsters include: "[[Branded Opening]]" (which can search or Special Summon a "Despia" monster from the Deck), "[[Branded in Red]]" (which can add a "Despia" monster or "Fallen of Albaz" from the GY to the hand, then can Fusion Summon a Level 8 or higher Fusion Monster by banishing monsters from the user's field or hand), "[[Branded Banishment]]" (which revives a "Despia" monster, then Fusion Summons a Level 8 or higher Fusion Monster by banishing monsters from either field).

  "[[Aluber the Jester of Despia]]" searches a "Branded" Spell/Trap when Normal or Special Summoned, making it a key starter of any "Branded" "Despia" strategy. The following three "Despia" Main Deck monsters provide "Branded" with advantage-generating Fusion Materials. Both "[[Dramaturge of Despia]]" and "[[Ad Libitum of Despia]]" each have Trigger Effects that generate advantage when they're sent to the [[GY]] or [[banish]]ed from the hand or field as a [[Fusion Material]] for a [[Fusion Summon]]; "Dramaturge" Special Summons itself while "Ad Libitum" can Special Summon back another "Despia" or a Level 8 or higher Fusion Monster from the GY or is banished. "[[Despian Tragedy]]", when banished or sent to the GY by any card effect, can search another "Despia" monster from the Deck, while also having the utility of banishing itself to recur "Branded" Spells/Traps from the GY. "[[Despian Comedy]]" can ward off against the opponent's effects that target a "Despia" monster, and can situationally Tribute a Fusion Monster to revive itself from the GY at any time.

  One of the main strategies of a "Branded" deck is to search the "[[Fusion (archetype)|Fusion]]" Spell "[[Branded Fusion]]". This can be achieved through many of the cards from the various archetypes that make up the deck. This card can Fusion Summon one of the many Fusion Monsters that mention "[[Fallen of Albaz]]" as material, as listed below:

