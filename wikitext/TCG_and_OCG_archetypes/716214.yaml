  "'''Phantasm'''" ({{Ruby|幻|げん}}{{Ruby|魔|ま}} ''Genma'') is an [[archetype]] related to the [[Sacred Beast]]s. Due to their Japanese names, the "[[Sacred Beast (archetype)|Sacred Beast]]" archetype is a sub-archetype of the "Phantasm" archetype, but because "Phantasm" support cards only support [[Fusion Monster]]s, this is not an issue.

  They are only supported by "[[Dimension Fusion Destruction]]" and "[[Destruction Chant of the Sacred Beast]]" which currently works with only four of the members: "[[Armityle the Chaos Phantasm]]", "[[Armityle the Chaos Phantasm - Phantom of Fury]]", "[[Phantasm Emperor Trilojig]]", and "[[Phantasmal Sacred Beasts of Chaos]]". "Armityle" is used by [[Yubel (character)|Yubel]] in the ''[[Yu-Gi-Oh! GX]]'' anime and is the merger of all three Sacred Beasts, while "Trilojig" is used by [[Eve]] in the ''[[Yu-Gi-Oh! ARC-V (manga)|Yu-Gi-Oh! ARC-V]]'' manga and was modelled after the Sacred Beasts. "Phantasmal Sacred Beasts of Chaos" features all three Sacred Beasts though they are not merged like "Armityle". Notably, all of these Fusion Monsters require or can use all three Sacred Beasts as [[Fusion Material]].

  A number of cards, such as "[[Phantasmal Lord Ultimitl Bishbaalkin]]", "[[Harpie's Pet Phantasmal Dragon]]", "[[Dream Mirror Phantasms]]", and the entire "[[Phantasm Spiral]]" archetype, include "Phantasm" in their English names but are not part of this archetype, as their Japanese names do not contain {{Ruby|幻|げん}}{{Ruby|魔|ま}}. However, because ''TCG''/''OCG'' support for this archetype only works on Fusion Monsters in the [[Extra Deck]], none are an issue.

  In the Japanese version of the ''Yu-Gi-Oh! GX'' anime, "[[Uria, Lord of Searing Flames (anime)|Uria, Lord of Searing Flames]]" and "[[Hamon, Lord of Striking Thunder (anime)|Hamon, Lord of Striking Thunder]]" are called Phantasms ({{Ruby|幻|げん}}{{Ruby|魔|ま}} ''Genma''), as the Sacred Beasts are collectively called the Three Phantasms ({{Ruby|三|さん}}{{Ruby|幻|げん}}{{Ruby|魔|ま}} ''Sangenma''), but they are not part of the "Phantasm" archetype.
