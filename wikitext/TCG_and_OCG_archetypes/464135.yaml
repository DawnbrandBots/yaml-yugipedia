  == Playing style ==
  The archetype is centered around Summoning "Invoked" Fusion monsters each turn, with Decks often relying on the constant resource loop provided by "[[Aleister the Invoker]]" and "[[Invocation]]", which works as follows:

  # "[[Aleister the Invoker]]", on Normal Summon or flipped face-up, searches "[[Invocation]]".
  # "Invocation's" field effect performs a Fusion Summon by banishing "Aleister" + another monster from hand, your field, or either GY.
  # "Invocation's" GY effect adds "Aleister" back to hand and shuffles itself to Deck, enabling the combo to be repeated each turn.

  The Fusions all have generic materials. For each Attribute, there is an "Invoked" monster that requires "Aleister the Invoker" + any monster of that Attribute. The following two ("[[Invoked Augoeides|Augoeides]]" and "[[Invoked Magistus Omega|Magistus Omega]]") each require "Aleister the Invoker" + a non-specific [[Extra Deck]] monster as material, and are similarly easy to Summon. Meanwhile, "[[Invoked Elysium|Elysium]]" requires an "Invoked" monster and a monster Special Summoned from the Extra Deck. Their effects vary from disruption ("[[Invoked Mechaba]]" and "[[Invoked Raidjin]]") to floodgating ("[[Invoked Caliga]]").

  Since "Invocation" can perform a Fusion Summon of an "Invoked" by banishing from your field or either GY, it is easy to get the correct Attributes needed for an "Invoked" Fusion - the opponent's monsters, [[hand trap]]s, or your [[Extra Deck]] monsters, especially LINK-1s, can all be used as material. Common LINK-1s include "Aleister the Invoker" → "[[Salamangreat Almiraj]]" (FIRE) → "[[Secure Gardna]]" (LIGHT) and "Aleister" → "[[Artemis, the Magistus Moon Maiden]]" (LIGHT), as the most desired payoff, "Invoked Mechaba", requires a LIGHT monster.

  The "Invoked" support in ''[[Chaos Origins]]'' alongside the introduction of the "[[Aleister]]" archetype further expands and compliments the original strategy with additional support. "[[Aiwass the Spirit of the Law]]" can search any "Aleister" monster, and can provide an additional Normal Summon of a Spellcaster, allowing another method of searching "Aleister the Invoker" then searching "Invocation" with its effect. It can also revive itself from the GY and then provide a Fusion Summon of an "Invoked" monster. "[[Aleister the Reminiscent]]" and "[[Virakam the Artificial Spirit]]" are both able to freely Special Summon themselves from the hand and are able to search "Invocation" or 1 Spell that mentions it. Among the new Spells, "[[Invocation "Sword"]]" can perform a Fusion Summon of an "Invoked" monster by returning banished monsters to the GY while "[[Spirit Sword Aiwass]]" can either Special Summon "Aiwass the Spirit of the Law", send or banish 1 "Aleister" monster from the Deck or banish 1 card from the opponent's Extra Deck. 

  The new "Invoked" Fusion Monsters ("[[Invoked Sorath|Sorath]]", "[[Invoked Babalon|Babalon]]" and "[[Invoked Okeanos|Okeanos]]") also simply require 1 "Aleister" monster and 1 monster with one of two Attributes whereas "[[Invoked Transcendence Aeon]]" requires 2+ Fusion Monsters with different Attributes, making them more flexible than the original "Invoked" line-up.

  "[[Magical Name - "Rosa Mundi"]]" is a Normal Trap searchable with "Invoked Babalon" that can cheat out an "Invoked" Fusion Monster from the Extra Deck that stays for one turn, and it can also revive a banished "Invoked" monster.

  In competitive play, "Invoked" was often splashed as an [[engine]] for Decks due to being compact, consistent, and great recursion for the time. It was mainly run in Decks that met the desired Attributes and/or did not need the Normal Summon, such as "[[Windwitch]]", "[[Shaddoll]]", "[[Dogmatika]]", and "[[Mekk-Knight]]".

