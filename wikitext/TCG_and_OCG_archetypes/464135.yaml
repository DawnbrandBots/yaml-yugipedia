  "'''Invoked'''", known as "'''Invoked Beast'''" ({{Ruby|召|しょう}}{{Ruby|喚|かん}}{{Ruby|獣|じゅう}} ''Shōkanjū'') in the [[OCG]], is an [[archetype]] of [[Fusion Monster]]s debuting in ''[[Booster SP: Fusion Enforcers]]''.

  == Lore ==
  {{Main|Master Guide 6 card storylines#The Threat of "La Maison" Opposing "Endymion"}}

  == Design ==
  Design-wise, the archetype consists of "Invoked" [[Fusion Monster]]s who are seemingly Summoned through [[Invocation|magic powers]] by [[Aleister the Invoker|sorcerers]].

  Individually, each "Invoked" (aside from "Augoeides", "Elysium" and "Magistus Omega") represents a different [[Attribute]], with their [[Fusion Material]]s being "[[Aleister the Invoker]]" plus one monster of their specific Attribute, and are named after historical or mythological elements related to said Attribute. They also contain the staff of "Aleister" somewhere in their artworks, but much brighter than the original.
