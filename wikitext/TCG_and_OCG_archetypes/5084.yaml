  ==Trivia==
  * The Sacred Beasts are often ordered as "[[Uria, Lord of Searing Flames]]", "[[Hamon, Lord of Striking Thunder]]", and "[[Raviel, Lord of Phantasms]]". They match the color scheme of [[Duel Academy]]'s three dorms, going from [[Slifer Red|red]] to [[Ra Yellow|yellow]] to [[Obelisk Blue|blue]].
  ** According to ''GX Memorial Album'', the ranking of the Sacred Beasts matches the dorms: being "Raviel" at the top, "Hamon" in the middle, and "Uria" at the bottom respectively.
