  "'''Kairyu-Shin'''", known as "'''Leviathan'''" (リバイアサン ''Ribaiasan'') in the ''[[OCG]]'', is an [[archetype]] of [[WATER]] [[Sea Serpent]] [[Monster Card|monsters]] and [[Spell]]/[[Trap Card]]s related to the [[Umi (series)|Umi]] [[series]]. It made its debut with the homonym card "[[Kairyu-Shin]]", released in ''[[Booster 6]]'' in the ''OCG'' and ''[[Speed Duel: Trials of the Kingdom]]'' in the ''[[TCG]]'', but only received its first support in ''[[Duelist Pack: Duelists of the Abyss]]'' / ''[[Legendary Duelists: Duels From the Deep]]''.

  {{-}}
  == Playing style ==
  The "Kairyu-Shin" archetype, alongside the "[[Sea Stealth]]" cards make up the core of an Umi-based strategy commonly referred to as "''Umi Control''". This Deck is a control Deck with a focus on using Summoning "[[Ocean Dragon Lord - Kairyu-Shin]]" by any means necessary (e.g. "[[A Legendary Ocean]]" decreasing its level, or "[[Icejade Tremora]]" summoning it from hand), which has a potent floodgate effect and can search out additional Umi-related cards to further strengthen the player's board. The Deck also features various interruptions by using "[[Electric Jellyfish]]" and "[[Doom Kraken]]" as a disruption, while also dodging opponent's removal via a combination of "[[Sea Stealth Attack]]" and "[[Sea Stealth II]]".

