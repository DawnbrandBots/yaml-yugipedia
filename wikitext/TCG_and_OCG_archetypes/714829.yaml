  "'''Evil‚òÖTwin'''" („Ç§„Éì„É´„ÉÑ„Ç§„É≥ ''Ibiru Tsuin'') is an [[archetype]] of [[DARK]] and [[LIGHT]] [[Fiend]] [[monster]]s which debuted in ''[[Deck-Build Pack: Genesis Impactors]]''. They share members with the "[[Ki-sikil]]" and "[[Lil-la]]" archetypes, and are also supported by the "[[Live‚òÜTwin]]" archetype.

  == Lore ==
  {{Main|The Valuable Book EX card storylines#No. 04: Live‚òÜTwin & Evil‚òÖTwin|The Valuable Book EX 3 card storylines#"Live‚òÜTwin" Livestream!|The Valuable Book EX 5 card storylines#No. 8: The Frustrations of the Live‚òÜTwins & Evil‚òÖTwins}}

  == Etymology ==
  Their name is likely a reference to [[wikipedia:Evil twin (wireless networks)|evil twin wireless networks]], a fraudulent Wi-Fi access point that appears to be legitimate but is set up to eavesdrop on wireless communications, usually to steal the passwords of unsuspecting users, either by monitoring their connections or by phishing, which involves setting up a fraudulent web site and luring people there.

  They also have a [[wikipedia:Palindrome#Semordnilap|play on the words]] ''evil'' and ''live'', with the "Evil‚òÖ" cards showing the real characters and the "Live‚òÜ" cards showing their digital personas.

  == Design ==
  The "Evil‚òÖTwin" and "Live‚òÜTwin" archetypes are inspired by [[wikipedia:VTuber|VTuber]] online entertainers. The "Live‚òÜTwin" monsters are the online appearances of "Ki-sikil" and "Lil-la", where they are comedic entertainers, while the "Evil‚òÖTwin" monsters are the real appearances of "Ki-sikil" and "Lil-la", who are [[wikipedia:Gentleman thief|phantom thieves]]. The ''[[wikipedia:Chibi (slang)|chibi]]'' art styles of the "Live‚òÜTwins" appear to be inspired by anime and cartoon shows such as ''[[wikipedia:Panty & Stocking with Garterbelt|Panty & Stocking with Garterbelt]]'' and ''[[wikipedia:Hi Hi Puffy AmiYumi|Hi Hi Puffy AmiYumi]]''.

  The individual names of "Ki-sikil" and "Lil-la" are a reference to "Ki-sikil-lil-la-ke", a Sumerian night-demon, who was possibly the origin of the name [[wikipedia:Lilith|Lilith]].
  "[[Evil‚òÖTwin's Trouble Sunny]]" depicts a rival entertainment duo to "Ki-sikil" and "Lil-la", who are named as Luna and Sunny in lore.

