  == Weakness ==
  * As the Deck relies heavily on [[Graveyard]] effects for its grind game, cards such as "[[Dimension Shifter]]", "[[D.D. Crow]]", or "[[Bystial]]" monsters hand hinders the deck's recoverability.
  * While "Evil‚òÖTwin's Trouble Sunny" provides good interruption during the opponent's turn, mass removal cards such as "[[Raigeki]]" or "[[Lightning Storm]]" can prove troublesome for the deck, as even if player tributed "Sunny" in response to the activation, the effects of "Ki-sikil" and "Lil-la" summoned by "Sunny's" effect will not activate upon chain resolution before both were destroyed, leaving the player vulnerable to opponent's counterplay.

