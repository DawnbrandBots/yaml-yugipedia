  "'''Diactorus'''", known as "'''Diaktoros'''" (ディアクトロス ''Diakutorosu'') in Japanese, is a small [[archetype]] of [[Extra Deck]] monsters composed of different forms of "[[Medius the Pure]]". It is part of the "[[Power Patron]]" [[Card storylines|storyline]].

  == Lore ==
  {{Main|The Valuable Book EX 6 card storylines#No. 1: The Proxy War of the Gods}}

  ==Etymology==
  The archetype's name is based on the Greek word for "guide", "διάκτορος". This reflects how "Medius the Pure" takes on the "Diactorus" forms to guide his friends away from [[Theorealize (archetype)|the disastrous futures he foresaw]].

