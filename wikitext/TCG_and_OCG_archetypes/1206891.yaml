  "'''Sennet'''", known as "'''Senet'''" (セネト ''Seneto'') in Japanese, is an archetype of [[Zombie]] monsters introduced in ''[[Deck-Build Pack: Glorious Victors]]''.

  Its strategy revolves around [[Ritual Summon]]ing its monsters by using [[Normal Monster]]s from the [[hand]], [[field]] and [[Deck]], and then gaining additional effects by [[equip]]ing said Normal Monsters.

  == Lore ==
  == Design ==
  === Etymology ===
  The name "Sennet" ("Senet" in the ''OCG'') refers to [[wikipedia:Senet|senet]], an ancient Egyptian board game.

  Despite the name and the artwork featuring a senet playset, the card "[[Senet Switch]]" is not a part of this archetype, as its Japanese name is "Position Change" transliterated.
  ===Members===
  Being a theme based on ancient Egyptian board game, members of the "Sennet" archetype features typical ancient Egyptian design, with the Main Deck monster being humans wielding a [[Duel Disk]]-like device and the Ritual monsters being various monsters that they summoned during the game.

  Along with the aforementioned senet motif, cards within this archetype also references the in-universe origin of the ''Yu-Gi-Oh!'' card game as shown in the [[Pharaoh's Memories]] arc, most prominently the aforementioned Duel Disk-like device.

