  "'''Sennet'''", known as "'''Senet'''" (セネト ''Seneto'') in Japanese, is an archetype of [[Zombie]] monsters introduced in ''[[Deck-Build Pack: Glorious Victors]]''.

  Its strategy revolves around [[Ritual Summon]]ing by using [[Normal Monster]]s, and then gaining additional effects by [[equip]]ping said Normal Monsters.

  == Lore ==
  == Design ==
  === Etymology ===
  The theme's name refers to [[wikipedia:Senet|senet]], an ancient Egyptian board game.

  Despite its name and the artwork featuring a senet playset, the card "[[Senet Switch]]" is not a part of this archetype, as in Japanese it is called "Position Change".

  ===Members===
  Being a theme based on ancient Egyptian board game, members of the "Sennet" archetype features the typical aesthetics associated with it, with the Main Deck monsters being humans in pharaonic garb wielding a [[Duel Disk]]-like device that projects a senet board, and the Ritual Monsters being various monsters that they Summon during the game.

  Along with the aforementioned senet motif, cards within this archetype also reference the in-universe origin of the ''Yu-Gi-Oh!'' card game as shown in the [[Pharaoh's Memories]] arc, most prominently the aforementioned Duel Disk-like device resembling the [[DiaDhank]]. In addition, senet matches were said to represent [[Ka]], just like [[Diaha]].

  == Playing style ==
  "Sennet" is a deck that focuses on bringing out its powerful boss monster "[[Sennetnakht Sphinx]]", or alternatively "[[Tausennet Wadjet]]", while also setting up its powerful Trap cards "[[Sennet Cataract]]" and "[[Sennet Thunderfall]]", which respectively allow for the negation of monsters in target zones and the negation of a Spell/Trap. The deck also aims to have either a Normal monster or a Fusion monster summoned by "[[Sennet Per Akh]]" in order to strengthen or gain additional effects from their cards.

  The decks key starters are "[[Sennet Prophet - Nefertari]]" and "Sennetnakht Sphinx".

  === External cards ===
  The "Sennet" cards can benefit heavily from incorporating a "[[Primite]]" package, thanks to both engines utilizing Normal monsters.

  Additional starters can also be found in the form of:
  *"[[Pumpking the King of Grave Ghosts]]" and its [[Call of the Haunted (series)|related]] [[Death (series)|cards]], which are able to both send and recover "Nefertari" without wasting the Normal Summon.
  *"[[Seventh Tachyon]]", which can search "Nefertari" by revealing "[[Number 102: Star Seraph Sentry]]" or "[[Number 104: Masquerade]]".

  The decks ability to search and summon Normal monsters and Non-Effect Fusions also allows it to incorporate Tuner monsters of both varieties to allow for Synchro plays.

