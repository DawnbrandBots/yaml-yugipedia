  "'''Dueling Equipment'''" ({{Ruby|闘|とう}}{{Ruby|器|き}} ''Tōki'') is an [[archetype]] of [[Equip Spell Card|Equip Spell]] [[support]] cards for the "[[Gladiator Beast]]" archetype that were released in ''[[Gladiator's Assault]]''.

  Though the ''TCG'' texts of "[[Gladiator Beast Spartacus]]" state that it searches for a "Gladiator Beast" Equip Spell Card, the Japanese and Korean ones instead call for ones with 「闘器」 and "투기" respectively, thus making this a separate archetype. The English name comes from the description of the ''[[Roar of the Gladiator Beasts]]'' [[Structure Deck]] in ''[[Yu-Gi-Oh! Master Duel]]''.

