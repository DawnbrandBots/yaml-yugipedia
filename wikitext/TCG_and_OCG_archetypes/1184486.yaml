  "'''Aleister'''" (アレイスター, ''Areisutā'') is an [[archetype]] of [[DARK]] [[Spellcaster]] monsters with 1800 ATK introduced in ''[[Booster SP: Fusion Enforcers]]''. It supports the "[[Invoked]]" archetype and some of its members, primarily "[[Aleister the Invoker]]", are supported by the "Invoked" archetype in return. The archetype received its first direct support in ''[[Chaos Origins]]''.

  == Lore ==
  {{Main|Master Guide 6 card storylines#The Threat of "La Maison" Opposing "Endymion"}}

  == Design ==
  === Etymology ===
  The archetype is named after English occultist [[wikipedia:Aleister Crowley|Aleister Crowley]].

