  ==Playing style==
  "Artmage" revolves around "[[Medius the Pure]]", [[Fusion Summon]]ing, and controlling multiple monster [[Type]]s to make use of their effects. Conventionally, the "Artmage" strategy primarily accesses the archetype's [[Field Spell Card]] "[[Artmage Academic Arcane Arts Acropolis]]" which can search any of the archetype's monsters by discarding 1 Spell/Trap (with the only restriction being that each "Artmage" monster can only be declared once in the same turn, also it prevents the user from Special Summoning, except "Artmage" monsters, "Medius the Pure", or from the Extra Deck). The Field Spell can easily be searched with "[[Artmage Varnish -Alteration-]]" (which can also search other "Artmage" cards if "Artmage Academic Arcane Arts Acropolis" is already in the Field Zone). Due to the discard costs required for the effect of "Artmage Academic Arcane Arts Acropolis", the Deck generally beneftis from running many Spells/Traps, especially those with useful secondary effects while in the GY such as most "Artmage", "[[Power Patron]]" and "[[Theorealize]]" cards.

  Once an "Artmage" card is present on the field, the three main "Artmage" monsters ("[[Artmage Finmel|Finmel]]", "[[Artmage Graflare|Graflare]]" and "[[Artmage Litera|Litera]]") can freely [[Special Summon]] themselves from the hand and provide advantages (draw 1 card, Set any "Artmage" Spell and recycle any "Artmage" card from the GY respectively). All three have various Quick Effects ranging from negating the effects of all the opposing monsters while halving their ATK, destroy an opponent's Spell/Trap and Special Summoning an "Artmage" monster from the GY and returning itself to the hand, respectively. Both "Finmel" and "Graflare" requires the player to control 3 or more different Monster Types to use their on-field effects (while the latter simply needs the requirement in order to use it as a Quick Effect).

  "[[Medius the Pure]]" is also another central card integral to the strategy as it can search or Special Summon a "Power Patron" monster from the Deck. The usual choice for this strategy is "[[Artmage Power Patron]]", which has the Quick Effect to perform a Fusion Summon of an "Artmage" Fusion Monster or "[[Nerva the Power Patron of Creation]]", and then netting advantage to search another "Artmage" Spell/Trap. Access to "Medius the Pure" within the "Artmage" archetype includes "[[Artmage Vandalism -Assault-]]", "[[Artmage Pact -Awakening-]]", "[[Prohibited Power Patron Portal - Terminus]]" and "[[Theorealize Past Lull]]".

  The Fusion Monsters include:
  * "[[Artmage Diactorus]]" ("Medius the Pure" + 1 "Artmage" monster): Can change a monster's battle position and negate the activation of an opponent's card or effect while controlling 3 or more different Monster Types.
  * "[[Artmage Non-Finito]]" (2 "Artmage" monsters or Tribute 1 Level 7+ "Artmage" monster and discard 1 Spell/Trap): Can set any "Artmage" Spell/Trap from the Deck upon Special Summon. Then it can perform a Fusion Summon during the opponent's turn as a Quick Effect. In particular, it can set the [[Counter Trap Card]] "[[Artmage Impasto -Recapture-]]", a monster negate (that can also return Spells and Traps the opponent controls) which is live immediately.
  * "Nerva the Power Patron of Creation" (3 "Artmage" monsters with different names or Tributing 3 monsters of different Types): The "Power Patron" Extra Deck boss monster of "Artmage", it can change any activated monster effect of an "Artmage" monster to destroy all cards on the opponent's field instead, making it potent with various "Artmage" monsters having Quick Effects. 

  The [[Pendulum Monster]] "[[Nervedo the Shadebeast Power Patron]]" offers protection against the user's activated effects of "Artmage" or "Power Patron" monsters at the cost of destroying itself. Its on field effect can be used to destroy itself to Summon "Nerva the Power Patron of Creation". After "Nervedo" is added to the face-up Extra Deck, it can Special Summon any "Artmage" or "Power Patron" monster from the Deck.

  In addition to their main archetypal disruptions, "Artmage" can also use the Fusion Summon effects of "Artmage Non-Finito" and the [[Quick-Play Spell Card]] "[[Artmage Masterwork -Succession-]]" to Fusion Summon various general Fusion Monsters such as "[[Azamina Ilia Silvia]]" (since "Litera" is a LIGHT [[Spellcaster]] and both "Artmage Power Patron", "Non-Finito" and "Nerva" are [[Illusion]] monsters) or "[[Guardian Chimera]]" (only with "Artmage Masterwork -Succession-") for more disruptions.

