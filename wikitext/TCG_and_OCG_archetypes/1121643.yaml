  "'''Artmage'''", known as "'''Artmegia'''" (アルトメギア ''Arutomegia'') in Japan, is an [[archetype]] of mostly [[LIGHT]] monsters introduced in ''[[Duelist's Advance]]''. It is connected to the "[[Power Patron]]", "[[DoomZ]]", "[[Elfnote]]", and "[[Ars Magna]]" archetypes through the lore surrounding "[[Medius the Pure]]".

  ==Lore==
  {{Main|The Valuable Book EX 6 card storylines#No. 1: The Proxy War of the Gods}}
  "[[Power Patron]]s" are gods living in the spirit world, which is cut off from the real world. In an era of chaos brought about by various nations vying for supremacy, there is one powerful nation that prospers with the power of the "Power Patrons": "[[Artmage Academic Arcane Arts Acropolis]]". It is an academy city-state that won wars against other nations with the power of "[[Nerva the Power Patron of Creation]]", one of the those gods. The academy, which was created for students to compete against each other learning art magic drawing magic power from "Nerva", eventually became a nation.

  "[[Medius the Pure]]" is someone who holds the destiny of "Artmage" in his hands with his power of prophetic vision, "[[Theorealize (archetype)|Theorealize]]". "[[Artmage Diactorus]]" is "Medius" who has inherited the power of "Nerva" directly.

  ==Design==
  ===Etymology===
  "Artmage" and "Artmegia" appear to be portmanteaus of "art", "media", and "mage".

