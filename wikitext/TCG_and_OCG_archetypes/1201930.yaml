  "'''Ashtra'''" (アシュトラ ''Ashutora'') is an archetype introduced in ''[[Beyond the Brave]]'', centered around manipulating [[face-down]] cards and using [[Tuner monster|Tuner]] [[Trap Monster]]s that can [[Synchro Summon]] during the opponent's turn.

  == Design ==
  === Etymology ===
  The archetype's name appears to be a portmanteau of ''[[wikipedia:Asura|asura]]'', a class of warlike demigods that appears in Hinduism and Buddhism, and ''ushitora'' (lit. "ox-tiger"), the northeast direction according to ''[[wikipedia:Feng shui|feng shui]]'' and ''[[wikipedia:Onmyōdō|Onmyōdō]]''. ''Ushitora'' is also referred to as ''kimon'' ("demon gate"), as the northeast is considered an ominous direction from which demons gather and pass through. Therefore, ''[[wikipedia:Oni|oni]]'' (a class of Japanese demons) are traditionally depicted with an ox's horns, a tiger's fangs, and a tiger-hide loincloth.

  The kanji used in the name of "[[Akasuna the Battle Ashtra]]" is shared with the name of ''[[wikipedia:Konjin|Konjin]]'' ("Golden Deity"), a powerful and violent ''kami'' in ''Onmyōdō''. He is an itinerant ''kami'' who travels through the compass directions, and whichever direction he currently resides is considered inauspicious. ''Ushitora-no-Konjin'' is feared as his most powerful manifestation when residing within the northeast direction.
  === Members ===
  The members of the archetype are based on ''oni'' from Japanese folklore, with the [[Main Deck]] monsters having more human-like appearances while the [[Synchro Monster]]s are more monstrous in appearance. The monsters are covered in golden scars that resemble ''[[wikipedia:Kintsugi|kintsugi]]'', the Japanese art of repairing broken pottery with gold lacquer.
