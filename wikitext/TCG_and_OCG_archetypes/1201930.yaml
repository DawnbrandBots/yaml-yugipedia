  ==Playing style==
  Ashtra is a Trap-focused Synchro archetype that sets cards (mainly Traps) as resource flow and disruptions. The Deck's gameplan mainly revolves around swarming the field with the Main Deck monsters, while setting multiple Traps for disruptions and quick Synchro Summons in the opponent's turn. 

  * The Main Deck monsters can all Special Summon themselves from the hand once per turn, by revealing 1 face-down card you control and returning it to the hand/Extra Deck. They can then gain additional card advantage with their other effects and stay on the Field as disruptions and/or Synchro material.
  * The Field Spell, "[[Ashtrashen - Gateway to the Worlds Beyond]]", lets the player search any number of other "Ashtra" cards with different names, by sending that many face-down cards to the GY. 
  * The Traps all have two effects that can be chosen from when activated, the first ones being Special Summoning themselves as Level 1 Normal Tuners and perform a Synchro Summon after they resolve.
  * The Synchro Monsters have Trigger effects as disruptions when Special Summoned, and effects that recycle resources from the GY/banishment.

  It is advised to strike a good balance of Monsters and Spells/Traps, as having a good amount of Spells/Traps is important for "Ashtra" cards to set up their board. It is also worth considering to add Traps that have additional effects in the GY for the Field Spell to send. Playing another side engine that Sets cards could also be beneficial.

