  "'''Asutra'''" (アシュトラ ''Ashutora'') is an archetype introduced in ''[[Beyond the Brave]]'', centered around manipulating [[face-down]] cards and using [[Tuner monster|Tuner]] [[Trap Monster]]s that can [[Synchro Summon]] during the opponent's turn.

  == Design ==
  === Etymology ===
  The archetype's name appears to be a portmanteau of ''[[wikipedia:Asura|asura]]'', a collection of power-hungry individuals or groups that serve as rivals to the peaceful Deva in Hinduism, and ''[[wikipedia:Sutra|sutra]]'', a genre of ancient and medieval Indian texts found in Hinduism, Buddhism, and Jainism.

