  "'''Sacred Beast'''", known as "'''Three Phantasms'''" ({{Ruby|三|さん}}{{Ruby|幻|げん}}{{Ruby|魔|ま}} ''Sangenma'') in the ''[[OCG]]'', is an [[archetype]] of cards based on the [[Sacred Beast]]s from the ''[[Yu-Gi-Oh! GX]]'' anime; however, the original Sacred Beasts ("[[Uria, Lord of Searing Flames]]", "[[Hamon, Lord of Striking Thunder]]", and "[[Raviel, Lord of Phantasms]]") are not members of this archetype and this archetype instead focuses on [[retrain]]ed versions of them, which debuted in ''[[Chaos Origins]]''. The only exception is "[[Awakening of the Sacred Beasts]]", which was released earlier as support for the original Sacred Beasts in ''[[Structure Deck: Sacred Beasts]]''.

  Due to their Japanese names, "Sacred Beast" is a sub-archetype of the "[[Phantasm]]" archetype; however, because "Phantasm" support cards only support [[Fusion Monster]]s, this is only relevant for "[[The Chaotic Phantasmal Sacred Beasts]]", and causes no conflicts otherwise.

  ==Design==
  {{main|Sacred Beast#Design}}
  The "Sacred Beast" cards are based on the [[Sacred Beast]]s from the ''[[Yu-Gi-Oh! GX]]'' anime. Many of the "Sacred Beast" cards are inspired by scenes from ''Yu-Gi-Oh! GX'' anime, particularly from when [[Kagemaru]] used the Sacred Beasts. The artworks of the retrained counterparts of the Sacred Beasts are taken from the poses they take when they are Summoned in ''[[Yu-Gi-Oh! Duel Links]]''.

