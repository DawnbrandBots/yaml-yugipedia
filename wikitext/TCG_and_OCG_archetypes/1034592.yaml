  "'''Sangen'''" ({{Ruby|燦|さん}}{{Ruby|幻|げん}}) is an [[archetype]] introduced in ''[[Legacy of Destruction]]''. It consists of [[FIRE]] [[Dragon]] [[Synchro Monster]]s as well as [[Spell Card|Spell]] and [[Trap Card]]s that support the related "[[Tenpai Dragon]]" archetype.

  ==Design==
  ===Etymology===
  The theme's name is taken from ''Sangenpai'' ({{Ruby|三|さん}}{{Ruby|元|げん}}{{Ruby|牌|ぱい}}), the Japanese term for a group of tiles in [[wikipedia:Japanese mahjong|Japanese mahjong]] also referred to as the "dragon tiles", but written with characters meaning "brilliant apparition​". The name of each "Sangen" monster is a reference on a specific ''[[wikipedia:Japanese mahjong yaku|yaku]]'', a hand pattern or condition that determines the value of a hand in that game. 

  ''Sangenpai'' in its Japanese form is derived from the original Chinese Mahjong, ''Máquè'' (麻雀), where it is written with the same 三元牌 Hanzì, pronounced ''sānyuán pái'' in Mandarin Chinese, meaning "Three Fundamental Tiles", sometimes called Dragon tiles. The hand they are most well-known for is often called 大三元 (dà sānyuán), or "Big Three Fundamentals", and consists of 红中 ''hóngzhōng'' (Red Centre), 發財 ''fācái'' (Find riches), and 白板 ''báibǎn'' (White slate). When scoring in the Chinese National Standard Mahjong (国标麻将 ''guóbiāo májiàng''), it is worth 88 points, among the highest possible. This is reflected in [[Sangenpai Transcendent Dragion]], being built around this etymology. 

  The "Sangen" Synchro Monsters appear to be inspired by "[[Trident Dragion]]", as indicated by the similar names, [[Attribute]], [[Type]], [[Synchro Material]] requirements, and [[Battle Phase]]-oriented effects.

