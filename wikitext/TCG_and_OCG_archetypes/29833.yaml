  "'''White Knight'''", known by the possessive form "'''White Knights''''" (ホワイトナイツ ''Howaito Naitsu'', written as {{Ruby|白騎士団の|ホワイトナイツ}} in the anime) in Japan, is an [[archetype]] of [[LIGHT]] [[Warrior]] [[Monster Card|monsters]] briefly used by [[Chazz Princeton]] while in the [[Society of Light]]. They were given to Chazz by [[Sartorius]]. Their [[Monster effect|effects]] are focused on supporting one another and Summoning their [[Signature card|ace card]], "[[White Knight Lord]]". All monsters of this archetype are [[Level]] 4, except for the Level 7 "White Knight Lord".

  Chazz easily defeats [[Pro League|pro]] Duelist [[Gelgo]] with them, and then proceeds to challenge [[Jaden Yuki]], who ends up using Chazz's own "[[Ojama]]" cards against him. When Jaden frees Chazz from the Society's influence, Chazz is confused to see himself using the "White Knight" cards and Jaden using his "Ojama" cards. Accusing Jaden of stealing his cards, Chazz manages to swap hands with Jaden during the Duel, reclaiming his "Ojamas", but loses in the process.

  The effects of these cards are identical to those of the "[[Phantom Beast]]" cards that were released as [[Yu-Gi-Oh! GX Tag Force promotional cards|pack-in]]s with the ''[[Yu-Gi-Oh! GX Tag Force]]'' video game. Though Chazz never uses the "Phantom Beast" cards in that game, a [[Deck Recipe]] for a "Phantom Beast" Deck can be obtained by beating the game with him as your partner.

  Due to their Japanese names, the "[[White Night]]" monsters technically part of this archetype as well.

