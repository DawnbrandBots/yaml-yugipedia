  == Playing style ==
  In the ''[[OCG]]''/''[[TCG]]'', the "Dark Tuner" archetype focuses on [[reveal]]ing themselves in the player's [[hand]], followed by immediately [[Normal Summon]]ing a "Dark Tuner" monster, and share the following effect:
  {{Quote|''Once per turn, if you [[control]] this Normal Summoned/[[Set]] card: You can [[Tribute]] both this face-up card and 1 face-up non-Tuner with a lower [[Level]], and if you do, [[Special Summon]] 1 [[Synchro Monster]] from your [[Extra Deck]] with a [[Level]] equal to the difference in Levels of those monsters (this is treated as a [[Synchro Summon]])''}}

