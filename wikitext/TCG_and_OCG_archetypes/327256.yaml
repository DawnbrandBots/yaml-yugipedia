  "'''Dark Tuner'''" ({{Ruby|ＤＴ|ダークチューナー}} ''Dākuchūnā'') is an [[archetype]] of [[DARK]] [[Monster Card|monsters]] used by the [[Dark Signer]]s in the ''[[Yu-Gi-Oh! 5D's]]'' anime and ''[[Yu-Gi-Oh! Tag Force]]'' video games. In the video games, "Dark Tuner" monsters cannot be used as a [[Synchro Material]], except for the [[Synchro Summon]] of a [[Dark Synchro Monster]].

