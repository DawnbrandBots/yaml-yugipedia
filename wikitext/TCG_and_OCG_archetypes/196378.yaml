  "'''Horus the Black Flame Dragon'''" (ホルスの{{Ruby|黒|こく}}{{Ruby|炎|えん}}{{Ruby|竜|りゅう}} ''Horusu no Kokuenryū'') is an [[archetype]] of three [[FIRE]] [[Dragon]] "[[LV]]" [[Monster Card|monsters]] first introduced in ''[[Soul of the Duelist]]'', and is a sub-archetype of the "[[Horus]]" archetype. This archetype is used by [[Daigo Sorano]] in the ''[[Yu-Gi-Oh! GX]]'' anime.

  == Design ==
  === Appearance ===
  The designs of the "Horus the Black Flame Dragon" monsters are similar in appearance to "[[The Winged Dragon of Ra]]", with both being draconian monsters with an avian appearance and are named after Egyptian deities. The background of the card artworks for each monster features "[[Dark Magical Circle]]" with the [[Eye of Wdjat]] in the center.

  The purpose of the archetype is that each individual monster would not turn against the player once it is on the [[field]], using effects that includes not switching [[control]], being unaffected by [[Spell Card]]s, and [[negate|negating]] the [[activate|activation]] of Spell Cards.

  "[[Dark Horus]]" was later introduced as a [[Dark counterpart]] to "[[Horus the Black Flame Dragon LV8]]". The "[[Metaphys]]" monster, "[[Metaphys Horus]]", was introduced as a [[Wyrm]] [[Synchro Monster]] counterpart of "[[Horus the Black Flame Dragon LV6]]".

  === Etymology ===
  The name of the archetype is derived from [[wikipedia:Horus|Horus]], the god of the sky in [[wikipedia:Egyptian mythology|Egyptian mythology]], who is depicted with the head of a [[wikipedia:Falcon|falcon]]. According to mythology, Horus was sometimes also known as Khemwar, meaning "the great black one", with both of these aspects reflecting the appearances of the archetype's monsters as mechanical falcons with black color schemes.

  == Playing style ==
  {{See also|Horus#Playing style}}

  The major draw of this "LV" family is "[[Horus the Black Flame Dragon LV8]]", which can (non [[once per turn]]) negate Spell Cards as long as its [[face-up]] on the field. The dreaded [[Horus Lockdown]] involves a combo of "Horus the Black Flame Dragon LV8" and "[[Royal Decree]]", which shuts down the effects of Spells and [[Trap Card|Traps]]. Other cards like "[[Destiny HERO - Plasma]]" and "[[Vylon Omega]]" can shut down monster effects. However, the "LV" mechanic is inherently slow and inconsistent, with "Plasma" and "Vylon Omega" also being hard to pull off.

  The "[[Hieratic]]" archetype can immediately Summon "Horus the Black Flame Dragon LV6" from the Deck (although with 0 ATK/DEF), then immediately use "[[Level Up!]]" to Summon "Horus the Black Flame Dragon LV8" quickly. "[[Ninja Grandmaster Hanzo]]", combined with "[[Ninjitsu Art of Super-Transformation]]", is an alternative.

