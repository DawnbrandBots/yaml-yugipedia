  "'''Blitzclique'''"(ブリッツクリーク ''Burittsukurīku'') an archetype of [[EARTH]] [[Thunder]] monsters introduced in ''[[Chaos Origins]]''.

  == Etymology ==
  The theme's name is a pun on [[wikipedia:blitzkrieg|blitzkrieg]] (lit. "flash war" in German), the concept of such an overwhelming invasion that the attacked country is utterly defeated within a few months at most. The Spell/Trap Cards superimpose it on the kanji 「雷盟」, which roughly means "lightning alliance"; that in itself would be a wordplay, as it reads as ''raimei'' just like 「雷鳴」 ("thundeclap").

  The Spells/Traps themselves are named after features of lightning strikes.

