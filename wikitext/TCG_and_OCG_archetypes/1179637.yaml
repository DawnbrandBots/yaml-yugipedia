  "'''Blitzclique'''" (ブリッツクリーク ''Burittsukurīku'') an archetype of [[EARTH]] [[Thunder]] monsters introduced in ''[[Chaos Origins]]''.

  == Etymology ==
  The theme's name is a pun on ''[[wikipedia:blitzkrieg|blitzkrieg]]'' (lit. "flash war" in German), the concept of such an overwhelming invasion that the attacked country is utterly defeated within a few months at most, and "clique", a social network of individuals who share the same interests or activities. The Spell/Trap Cards superimpose it on the kanji 「雷盟」, which roughly means "thunder alliance"; that in itself is a wordplay, as otherwise it would read as ''raimei'' just like 「雷鳴」 ("thunderclap").

  The single cards appear to be named after engineering terms and features of lightning strikes.

