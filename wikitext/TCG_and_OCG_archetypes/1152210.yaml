  "'''Elfnote'''", known as "'''Elfennotes'''" (エルフェンノーツ ''Erufennōtsu'') in Japan, is an archetype of Level 6 [[Spellcaster]] [[Effect Monster]]s of varying [[Attribute]]s and [[Synchro Monster]]s introduced in ''[[Burst Protocol]]''. It is connected to the "[[Power Patron]]", "[[Artmage]]", "[[DoomZ]]", and "[[Ars Magna]]" archetypes through the lore surrounding "Medius the Pure".

  == Lore ==
  {{Main|The Valuable Book EX 6 card storylines#No. 1: The Proxy War of the Gods}}

  == Design ==
  Most "Elfnote" monsters are female elves with fairy and flower motifs. "Strelitzia" is described as their Great [[wikipedia:Erlking|Erlking]], corrupted by "[[Junora the Power Patron of Tuning]]".

  Except for "[[Elfnote Power Patron]]", members of the archetype derived their names from flowers, with the elves' names also resembling those of Roman goddesses. They are also associated with different colors.

