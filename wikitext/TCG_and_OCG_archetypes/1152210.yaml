  == Playstyle ==
  "Elfnote" revolves around "[[Medius the Pure]]", [[Synchro Summon]]ing, and moving monsters to and from the center Main [[Monster Zone]]. Each of the [[Main Deck]] Elfnote monsters have specific effects based on whether they are in the center; their primary effects trigger while they are either in the center or (with "Elfnote Regina") Special Summoned there, and their secondary effects swap their position with the monster in the center.
  {| class="wikitable" style="text-align: center"
  ! Elfnote
  ! Primary Effect
  ! Center Zone Effect
  |-
  | [[Elfnote Lucina]] || Adds another "Elfnote" monster from your Deck to your hand.
  || Returns one [[Level]] 6 or lower monster from your opponent's field to the hand.
  |-
  | [[Elfnote Tinia]] || Places an "Elfnote" [[Continuous Spell]] from your Deck face-up in your Spell/Trap Zone. || [[Banish]]es one random card from your opponent's [[hand]] until the [[End Phase]].
  |-
  | [[Elfnote Fortuna]] || Places an "Elfnote" [[Continuous Trap]] from your Deck face-up in your Spell/Trap Zone. || Returns one face-up [[Spell]]/[[Trap]] on the field to the hand.
  |-
  | [[Elfnote Regina]] || Special Summons an "Elfnote" monster from your Deck. || Instead of an effect while in the Center Main Monster Zone, adds itself from the GY to your hand if used as Synchro [[Material]].
  |}
  Because "Elfnote" only restricts the user into using Synchro monsters, most competitive Decks rely on ending with generic Synchro monsters (such as "[[Crystal Wing Synchro Dragon]]") alongside the interruptions provided by the Main Deck "Elfnote" monsters and their Continuous Trap "[[Elfnotes: Rhapsodia of Madness]]".

  Like the other "[[Power Patron]]"-related themes, "Elfnote" greatly benefits from the use of their associated "Power Patrons" in conjunction with "Medius the Pure". "Medius the Pure" can Special Summon "Elfnote Power Patron" from the Deck, then be used with the Power Patron to Synchro Summon a Level 5 or 8 Synchro monster. Because the Power Patron was used as Synchro Material, it can search any "Elfnote" card, which starts the primary "Elfnote" combo lines.
