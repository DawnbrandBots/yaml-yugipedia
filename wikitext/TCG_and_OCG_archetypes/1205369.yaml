  "'''Medius'''" (メディウス ''Mediusu'') is a small [[archetype]] of [[DARK]] [[Fairy]] [[Monster Card|monsters]]. Its members are "[[Medius the Pure]]" and its different versions, all related to the "[[Power Patron]]" [[Card storylines|storyline]]. Its first member, "Medius the Pure", was released in ''[[Duelist's Advance]]'', and its first support was only released in ''[[Beyond the Brave]]''.

  Thanks to its synergy with the "Power Patron" archetype, this archetype is primarily meant to support the "[[Artmage]]", "[[DoomZ]]", "[[Elfnote]]" and "[[Ars Magna]]" archetypes, and is often used with the "[[Theorealize (archetype)|Theorealize]]" cards.

