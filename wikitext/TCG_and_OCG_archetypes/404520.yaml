  | end = "[[Crystal Wing Synchro Dragon]]" + "[[Starving Venom Wing Dragon]]" + "[[Predaplant Dragostapelia]]" or "[[Starving Venom Predapower Fusion Dragon]]" + "[[The Fallen & The Virtuous]]" + "[[Predaplant Bal Teah]]" (GY) + "[[Predaprimitive]]" (GY).
