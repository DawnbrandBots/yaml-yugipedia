  ==Playing style==
  "R.B." focuses on Summoning the archetype's Link Monsters and having them point to other members of the archetype.

  Every Main Deck monster has an effect which cost LP, can only be activated if the monster is [[linked]] to an "R.B." Link Monster, and destroys itself on resolution, but disrupts the opponent in some way. In addition, the non-"Lambda" monsters can Special Summon themselves if the player controls no face-up monsters other than "R.B." monsters (the "Lambda" monsters instead have effects when they're Summoned).

  For the Link monsters:
  * "[[R.B. VALCan Booster]]" can search an archetypal Spell, and Summon an "R.B." from hand or GY.
  * "[[R.B. The Brute Blues]]" can search any archetypal card. It is also the archetype's main finisher, as it gains ATK, a second attack, and destruction protection if linked to an "R.B." monster.
  * "[[R.B. Shepherd's Crook]]" can search an archetypal Trap by Setting it on field, and on the opponent's turn, revive an "R.B." Monster with a Level

  Because the Links can use any Machine as material and due to R.B. having no Normal Summon, "R.B." can synergize well with many other Machine engines/archetypes, thanks to [[Card Tips:R.B. VALCan Booster|any two Machines]] being able to be used as the material to summon "[[R.B. VALCan Booster]]". The most notable non-archetypal Machines (and support) that act as one card combos but do not generate any additional advantage include: "[[Speedroid Terrortop]]", "[[Sky Striker Mecha - Hornet Drones]]", "[[Pillar of the Future - Cyanos]]", "[[Mecha Phantom Beast]] [[Mecha Phantom Beast Tetherwolf|Tetherwolf]]/[[Mecha Phantom Beast O-Lion|O-Lion]]", and "[[Scrap Recycler]]", while those that both act as one card combos and have additional benefits include:
  * "[[Machina Gearframe]]", which sets up "[[Machina Citadel]]" in the GY, which is able to trigger itself off the EARTH Machine "R.B." monsters' effects.
  * "[[Girsu, the Orcust Mekk-Knight]]", which either can allow for "Orcust" plays, or simply adds "[[World Legacy - "World Crown"]]" to the endboard.
  * "[[Cyber Dragon Core]]", via searching "[[Cyberdark Realm]]", allowing the endboard to include "[[Heosvarog the Mechanical Dawn]]".
  "[[Planet Pathfinder]]" can also be utilized as a one-card combo by searching "[[R.B. Funk Dock]]", or if the player already has access to "R.B." plays, instead searching "[[Therion Discolosseum]]" to get access to "[[Therion "King" Regulus]]".

  The archetype can also be used to make a generic Rank 3-5 Xyz Monster without locks, due to the effects of "[[R.B. Funk Dock]]" and "[[Clockwork Knight]]". This can be used to search members of other archetypes, e.g., "[[Gear Gigant X]]" to search a Machine, or "[[K9-17 "Ripper"]]" to search a "[[K9]]" card.

  === Sample combos ===
  ;R.B. Stage Landing

  {{Combo steps
  | opening = "[[R.B. Stage Landing]]" or "[[R.B. Funk Dock]]".
  | end     = "[[R.B. The Brute Blues]]" pointing to "[[R.B. Ga10 Driller]]" and "[[R.B. Shepherd's Crook]]", a set "[[R.B. Next Phase]]", and "[[R.B. Funk Dock]]". After using "Driller"'s effect, "Brute Blues" pointing to "[[R.B. Lambda Blade]]" and "[[R.B. Ga10 Cutter]]". 
  | steps   = 
  # Activate "[[R.B. Stage Landing]]," summoning "[[R.B. The Brute Blues]]" to the Extra Monster Zone
  # Use the effect of "[[R.B. The Brute Blues]]," adding "[[R.B. Funk Dock]]" from deck to hand.
  # Activate "Funk Dock", searching a second copy of "Stage Landing". 
  # Activate "Stage Landing", Special Summon "[[R.B. Lambda Cannon]]" from your Deck to a zone "Brute Blues" points to. 
  # Activate the effect of "Lambda Cannon", destroying itself to check the opponent's hand, and Special Summon a monster if appropriate. 
  # Activate the second effect of "Funk Dock", Special Summon "[[R.B. Lambda Blade]]" from your Deck to a zone "Brute Blues" points to. 
  # Activate the first effect of "Lambda Blade", send "[[R.B. Ga10 Driller]]" from your Deck to GY. 
  # Link Summon "[[R.B. VALCan Booster]]" using "Blues" and "Blade" as material. 
  # Activate the first effect of "VALCan Booster", searching the final copy of "Stage Landing". 
  # Activate the second effect of "VALCan Booster", Special Summon "Lambda Cannon" from the GY. 
  # Activate the first effect of "Lambda Cannon", add "Ga10 Driller" from GY to hand. 
  # Link Summon a second copy of "Brute Blues", using "VALCan Booster" and "Lambda Cannon" as material.
  # Activate "Stage Landing", Special Summon "[[R.B. Shepherd's Crook]]" to the rightmost zone under "Brute Blues". 
  # Activate the first effect of "Shepherd Crook", set "[[R.B. Next Phase]]" from Deck to the S/T zone. 
  # Special Summon "Ga10 Driller" to your field, so "Brute Blues" points to it.
  # If appropriate, activate "Ga10 Driller"'s effect to destroy the monster summoned by "Lambda Cannon", using "Stage Landing"'s effect to prevent "Ga10 Driller" destruction.
  # On the opponent's Main Phase;
  # Activate "Ga10 Driller"'s effect, destroy one monster your opponent controls and "Ga10 Driller". 
  # Activate "Funk Dock"'s effect, Special Summon "[[R.B. Ga10 Cutter]]" from your Deck to any zone under "Brute Blues". 
  # Activate "Shepherd Crook"'s effect, Special Summon "Lambda Blade" from your GY to the remaining zone under "Brute Blues", returning "Lambda Cannon" and "Ga10 Driller" to the Deck. 
  }}


  While the archetype has an Extra Deck-affecting lock as a result of "Stage Landing" and "VALCan Booster", certain combos can play through the lock to achieve similar endboards, and grant the deck additional consistency. 

  ;2 Monsters

  {{Combo steps
  | opening = 2 Effect Monsters
  | end     = 2 Machine Monsters (see next combo)
  | steps   = 
  # Link Summon [[Sky Striker Ace - Camellia]] and use its effect to send [[Sky Striker Mecha - Hornet Drones]]
  # Link Camellia into [[Sky Striker Ace - Kagari]] and use its effect to recycle the Hornet Drones
  # Activate Hornet Drones to summon a [[Sky Striker Ace Token]]
  # Link Kagari into any Link-1 Sky Striker with a downwards pointing arrow (Amatsu, Hayate, or Kaina)
  # Link the token into another Link-1 Sky Striker
  # Proceed from here with the "2 Machine Monsters" combo
  }}

  {{Combo steps
  | opening = 2 Machine Monsters
  | end     = "[[R.B. The Brute Blues]]" pointing to "[[R.B. Ga10 Driller]]" and "[[R.B. Shepherd's Crook]]", a set "[[R.B. Next Phase]]", and "[[R.B. Funk Dock]]". After using "Driller"'s effect, "Brute Blues" pointing to "[[R.B. Lambda Blade]]" and "[[R.B. Ga10 Cutter]]". 
  | steps   = 
  # Link Summon "[[R.B. VALCan Booster]]", use its effect to search "[[R.B. Funk Dock]]".
  # Activate "Funk Dock", use its effect to search "[[R.B. Stage Landing]]".
  # Activate "Stage Landing", Special Summon "[[R.B. Lambda Cannon]]" to the zone "VALCan Booster" is pointing at.
  # Activate "Lambda Cannon", destroy "Lambda Cannon" and check the opponent's hand, Special Summon a monster if appropriate.
  # Activate "Funk Dock"'s effect, Special Summon "[[R.B. Lambda Blade]]" from your Deck.
  # Activate "Lambda Blade"'s effect, send "[[R.B. Ga10 Driller]]" from Deck to GY. 
  # Activate "VALCan Booster"'s effect, target "Lambda Cannon" in GY, Special Summon it.
  # Activate "Lambda Cannon"'s effect, target "Ga10 Driller" in GY, add it to hand. 
  # Link Summon "[[R.B. The Brute Blues]]" using "VALCan Booster" and "Lambda Blade".
  # Activate "Brute Blues"' effect to search a second copy of "Stage Landing".
  # Activate "Stage Landing", Special Summon "[[R.B. Shepherd's Crook]]" to the rightmost zone under "Brute Blues".
  # Activate "Brute Blues"' effect, Set "[[R.B. Next Phase]]" from your Deck to the S/T zone. 
  # Special Summon "Ga10 Driller" to your field, so "Brute Blues" points to it.
  # If appropriate, activate "Ga10 Driller"'s effect to destroy the monster summoned by "Lambda Cannon", using "Stage Landing"'s effect to prevent "Ga10 Driller" destruction.
  # On the opponent's Main Phase;
  # Activate "Ga10 Driller"'s effect, destroy one monster your opponent controls and "Ga10 Driller". 
  # Activate "Funk Dock"'s effect, Special Summon "[[R.B. Ga10 Cutter]]" from your Deck to any zone under "Brute Blues". 
  # Activate "Shepherd Crook"'s effect, Special Summon "Lambda Blade" from your GY to the remaining zone under "Brute Blues", returning "Lambda Cannon" and "Ga10 Driller" to the Deck. 

  }}

