  "'''R.B.'''", short for "'''Revol Bot'''" ({{Ruby|Ｒ．Ｂ．|リボルボット}} ''Riboru Botto''), is a [[TCG-only|World Premiere]] [[archetype]] of [[Machine]] monsters with 1500 or less [[ATK]] introduced in ''[[Duelist's Advance]]''.

  ==Members==
  Each Main Deck "R.B." monster has a unique effect while linked to an "R.B." Link Monster, which is activated by destroying itself and paying an LP cost that increases with its original Level.

