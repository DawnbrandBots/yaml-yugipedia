  === Weaknesses ===
  * Due to a large number of "R.B." Main Deck monsters being high Level and cannot Special Summon themselves, the Deck often has dead draws or bricked hands that hampers consistency.
  * Non-destruction removal, such as "[[S:P Little Knight]]" and "[[Ultimate Slayer]]", can be effective when used on the archetype's Link monsters, as the Main Deck monsters cannot activate their effects without an "R.B." Link pointing to them. Note that the GY effect of "[[R.B. Last Stand]]" can protect from targeting, though.
  ** Like all Machine archetypes, "[[Chimeratech Fortress Dragon]]" and "[[System Down]]" are especially effective at breaking their boards.
  * Anti-search cards, like "[[Droll & Lock Bird]]", are effective due to the Field Spell and two of the Link Monsters having a search effect.
  * The archetype has many board breaking effects, though most either target or destroy. Therefore, monsters that are immune to both, such as "[[Red-Eyes Dark Dragoon]]", can be hard to deal with.

