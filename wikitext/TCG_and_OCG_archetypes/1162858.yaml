  "'''Theorealize'''" (テオリアライズ ''Teoriaraizu'') is an [[archetype]] of [[Spell Card]]s that [[Mentions|mention]]  "[[Medius the Pure]]", introduced in ''[[Duelist's Advance]]''. It is connected to the "[[Power Patron]]", "[[Artmage]]", "[[DoomZ]]", and "[[Elfnote]]" archetypes through the lore surrounding "Medius the Pure". The archetype received its first support in ''[[Chaos Origins]]''.

  ==Lore==
  {{Main|The Valuable Book EX 6 card storylines#No. 1: The Proxy War of the Gods}}

  ==Etymology==
  "Theorealize" is likely a combination of the words "theory" and "realize". The artwork of each associated card depicts "[[Medius the Pure]]" having a vision of the future (this power being named "Theorealize"), and as described in the Valuable Book EX 6 (see "Lore"), Medius then attempts to prevent each vision from coming true. The word "Theorealize" also references this pattern of action. In addition, the Greek word "Theos" (meaning "god" or "divine") is loosely related, since Medius is later revealed to be the key to the god-like "[[Power Patron]]s" escaping their prison.

