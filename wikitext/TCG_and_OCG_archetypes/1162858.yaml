  "'''Theorealize'''" (テオリアライズ ''Teoriaraizu'') is an [[archetype]] of [[Spell Card]]s that [[Mentions|mention]]  "[[Medius the Pure]]", introduced in ''[[Duelist's Advance]]''. The archetype received its first support in ''[[Chaos Origins]]''.

