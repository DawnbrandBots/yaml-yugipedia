  "'''Angelechy'''" is a [[TCG-only|World Premiere]] [[archetype]] of [[LIGHT]] [[Fairy]] [[Synchro Monster]]s introduced in "[[Chaos Origins]]".

  == Design ==
  The archetype is based on [[wikipedia:chess|chess]] pieces and tactics. Its monsters are clad in all-white armor, as if to denote that they are the white pieces in a chess game. To further the chess theme, its monsters also have effects to banish an opponent's cards based on the capturing patterns of their corresponding pieces, and it includes Spell/Trap effects focusing on placing its monsters in the [[Spell & Trap Zone]] as [[Continuous Spell Card|Continuous Spells]] similar to the back rank of a chessboard, where they gain additional effects. The only monster without such an effect is "[[Angelechy Enlisted]]", which is based on the pawn and thus doesn't begin a chess game on the back rank; instead, it has an effect that allows it to "[[wikipedia:Promotion (chess)|promote]]" to another "Angelechy" monster when it successfully "captures" a monster.

