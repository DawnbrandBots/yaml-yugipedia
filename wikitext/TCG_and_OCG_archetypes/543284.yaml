  "'''Number 99'''", known as "'''Numbers 99'''" ({{Ruby|Ｎｏ．|ナンバーズ}}９９ ''Nanbāzu Kyūjūkyū'' in Japan and Korea, is a sub-[[archetype]] of the "[[Number]]" archetype based around "[[Number 99: Utopic Dragon]]", a card used by [[Astral]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. Currently, the only other member is "[[Number 99: Utopia Dragonar]]", a combined form of it and "[[Number 39: Utopia Beyond]]", and is only supported by "[[Hyper-Rank-Up-Magic Ultimate Force]]".

  Since all of the members are part of the "[[Utopia (archetype)|Utopia]]" or "[[Utopic]]" archetypes, they also benefit from [[support]] for those archetypes.

