  "'''Umbral Horror'''", known as "'''Umbral'''" (アンブラル ''Anburaru'') in the ''[[OCG]]'', is an [[archetype]] used by [[Vector]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. It is composed mostly of weak [[DARK]] [[Fiend]] [[Monster Card|monsters]] who revolve around [[Special Summon]]ing other "Umbral Horror" monsters for quick [[Xyz Summon]]s (with the exceptions of "[[Shining Umbral Horror]]" being of the [[LIGHT]] Attribute and "[[V Umbral Horror]]" and "[[Gorgonic Umbral Horror]]" being of the [[Spellcaster]] and [[Rock]] Type respectively).

  "[[wiktionary:umbra#English|Umbra]]" means "shadow", and comes from the [[wiktionary:umbra#Latin|Latin word of the same spelling]].

  == Design ==
  The "Umbral Horror" monsters used in the anime are creatures that are made of, or emerging from, the shadows, reflecting their name. Some of them are also based on apparitions of different kinds, such as [[wikipedia:ghoul|ghoul]]s and [[wikipedia:ghost|ghost]]s.

  Modern "Umbral Horror" monsters released in ''[[Beyond the Brave]]'', along with the associated support in the same Booster Pack, follow a different approach from the originals, and instead seek to reimagine multiple elements associated with [[Vector]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime as cards. "[[Shining Umbral Horror]]" and "[[Gorgonic Umbral Horror]]" are based on the other two archetypes used by Vector, "[[Shining]]" and "[[Gorgonic]]" (although the latter was only used by his past incarnation). "[[V Umbral Horror]]" resembles Vector's energy form, but now following the shadow motif of past "Umbral Horror" monsters, and also features the "[[V Call]]" symbol, a card given by Vector to [[Yuma]] that would later cement his betrayal.

  Some cards also seem to hint at an [[wikipedia:Parallel universes in fiction|alternate continuity]] from the events of the anime, one in which Vector succeeded in defeating Yuma, [[Don Thousand]] and [[Nash]] and taking their powers to himself, or one in which Vector was switched with Nash in the storyline, recieving the power of the other Barian Emperors and Don Thousand in the end. "[[Thousand Umbral Horror]]" features the design of Don Thousand as an "Umbral Horror" monster, as if implying the character's power was contained into a card for Vector to use, which resembles how [[Number 96 (character)|Number 96]] was used by Vector's "[[Number 43: Manipulator of Souls (anime)|Number 43: Manipulator of Souls]]" in the anime; its effect to place "[[Seventh Barian's]]" on the field during the opponent's turn is also reminiscent of Don Thousand's "[[Numeron Network (anime)|Numeron Network]]". Though, it simply can be a nod to Vector and Don Thousand's temporary partnership during the events of the anime, during which Don Thousand gave some of his power to Vector. During the Duel between Vector and Yuma, the latter uses "[[Number C39: Utopia Ray V]]" combined with the "[[V (archetype)|V]]" archetype, and achieves victory by evolving it to "[[Number C39: Utopia Ray Victory]]". The "[[Masquerade]]" monsters released in ''Beyond the Brave'' follow the same evolution, with "[[Number 104: Masquerade Vain]]" resembling "[[Number 104: Masquerade]]" equipped with "[[V Salamander]]", and its "victory" form "[[Number C104: Umbral Horror Masquerade Victory]]".

  "[[CXyz Chaos Barian Hope Dragon]]", although not an "Umbral Horror" or "Masquerade" monster, was also released in ''Beyond the Brave'' and serves as the Deck's de-facto boss monster. Its design is based on "[[Number C5: Chaos Chimera Dragon]]", Vector's ultimate monster in the anime created by using the power of 5 of the [[Seven Barian Emperors]]. After Nash and Yuma defeats Don Thousand and Nash receives the power of all Seven Barian Emperors, he creates the card "[[CXyz Barian Hope (anime)|CXyz Barian Hope]]". "Chaos Barian Hope Dragon" appears to be originated from the same process, although performed by Vector and not Nash, as evidenced by the parallels in their Japanese names and their Summoning conditions. In the anime, the [[Barian Emperor Onslaught]] concludes with the Duel between Nash and Yuma, in which "CXyz Barian Hope", whose Japanese name is "Chaos Xyz: King of Hope, Barian", battles Yuma's "Number 39: Utopia" ("Numbers 39: King of Wishes, Hope"). If the alternate continuity hypothesis holds true, the Duel that would conclude the onslaught would be between Vector and [[Astral]], which explains the parallels between "CXyz Chaos Barian Hope Dragon" ("Chaos Xyz: King Dragon of Hope, Chaos Barian Dragon") and Astral's "[[Number 99: Utopic Dragon (anime)|Number 99: Utopic Dragon]]" ("Numbers 99: King Dragon of Wishes, Hope Dragoon").

  Vector's summoning chant for "CXyz Chaos Barian Hope Dragon" also indicates that it has the power of all Seven Barian Emperors;
  :"''Oh Sinners of this Chaotic World! Unite the power of the Seven Emperors unto me! Curse and profane your most fervent wishes! Chaos Xyz Hope Emperor Dragon Chaos Barian Dragon!''"

  == Playing style ==
  "Umbral Horrors" have unique abilities to quickly swarm the field to allow for quick Xyz Summons. Because of their effective ways to Summon Rank 4 monsters, one can afford [[Rank-Up]] plays with the Deck. Thanks to most of them having 0 ATK or DEF, they benefit from running "[[Garbage Golem]]".

  They are capable of running almost any and all generic Rank 4 Xyz Monsters and Level 8 Synchro Monsters, thus the player can have as many options as they want to incorporate for any situation, making the deck incredibly versatile on its plays and responses.

  Prior to their support wave in ''[[Beyond the Brave]]'', their DEF at 0 made them an ideal target for cards such as "[[Masked Chameleon]]", "[[Secret Sect Druid Dru]]", that can revive most of them from the Graveyard at the expense of having their effects negated. However this can also allow for successive and constant Summons of Rank 4 Xyz monsters and Level 5 or Level 8 Synchros, thus being capable of Summoning powerful monsters with ease. "[[Recurring Nightmare]]" can be used with the "Umbral Horror" monsters, principally "[[Umbral Horror Ghoul]]" or "Druid Dru" and another "Umbral Horror" for an instant Rank 4 monster. Cards such as "[[Allure of Darkness]]" can be used easily for draw power. Furthermore considering the 0 ATK nature of "Umbral Horrors", including "Ghoul" through its own effect, "[[Reptilianne Vaskii]]" can be Summoned with ease, allowing potent field control through its effect. 

  Through the effect of "[[Umbral Horror Unform]]", it is entirely possible to Xyz Summon a Rank 4 that requires 3 materials with relative ease, and through Rank-Up one can easily Summon powerhouses such as "[[Number C39: Utopia Ray V]]", "[[Number 104: Masquerade]]" and its evolved form "[[Number C104: Umbral Horror Masquerade]]" and also "[[Number 105: Battlin' Boxer Star Cestus]]" and "[[Number C105: Battlin' Boxer Comet Cestus]]" for massive field control and brutal damage potential. The deck can also benefit from incorporating cards that facilitate [[Rank 5 Monster Cards|Rank 5]] plays (such as "[[K9]]") in order to use "[[N.As.H. Knight]]" to easily get to "Umbral Horror Masquerade".

