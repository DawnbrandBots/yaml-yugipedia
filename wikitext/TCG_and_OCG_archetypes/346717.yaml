  {{Combo steps
  | opening = "[[Lunalight Masquerade]]" + 1 card in hand
  | end = 2 "[[Lunalight Liger Dancer]]" + "[[S:P Little Knight]]", "[[Lunalight Silver Hound]]" in the [[Graveyard|GY]]
  | steps =
  # Activate "[[Lunalight Masquerade]]" then activate its first on-field effect to send "[[Lunalight Silver Hound]]" from Deck to GY.
  # Activate the effect of "Silver Hound" to Special Summon "[[Lunalight Gold Leo]]" from the Deck.
  # Activate the effect of "Gold Leo" to search "[[Lunalight Kaleido Chick]]" from Deck then discard 1 card other than "Kaleido Chick".
  # Normal Summon "Kaleido Chick" then activate the effect of "Kaleido Chick" by sending "[[Lunalight Black Sheep]]" from the Deck to GY.
  # Activate the second effect of "Gold Leo" to add "Black Sheep" from the GY to hand.
  # Activate the effect of "Black Sheep" by discarding itself to search "[[Polymerization]]" from the Deck. 
