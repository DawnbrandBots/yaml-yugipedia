  == Sample combos ==
  The following combos set up 1-2 copies of "[[Lunalight Liger Dancer]]" and "[[S:P Little Knight]]" as well as "[[Lunalight Silver Hound]]" in the GY as the main disruptions of most "Lunalight" decks.

  {{Combo steps
  | opening = "[[Lunalight Gold Leo]]"
  | end = 2 "[[Lunalight Liger Dancer]]" + "[[S:P Little Knight]]", "[[Lunalight Silver Hound]]" + "[[Lunalight Perfume Dancer]]" in the [[Graveyard|GY]]
  | steps =
  # [[Normal Summon]] "[[Lunalight Gold Leo]]" and activate its first effect to search "[[Lunalight Yellow Marten]]" from [[Deck]], then discard the added "Yellow Marten".
  # Activate the effect of "Yellow Marten" to search "[[Lunalight Masquerade]]" from Deck.
  # Activate "Masquerade", then activate its first on-field effect to send "[[Lunalight Silver Hound]]" from the Deck to the GY.
  # Activate the effect of "Silver Hound" to [[Special Summon]] "[[Lunalight Kaleido Chick]]" from Deck.
  # Activate the first effect of "Kaleido Chick" by sending "[[Lunalight Tiger]]" from Deck to GY.
  # Activate the second effect of "Gold Leo" to add the sent "Tiger" from the GY to [[hand]].
  # Activate the first effect of "Yellow Marten" in the GY by targetting "Kaleido Chick" to return the latter to the hand and Special Summon the former.
  # Use "Gold Leo" and "Yellow Marten" to [[Xyz Summon]] "[[Brotherhood of the Fire Fist - Tiger King]]", then activate its effect to [[Set]] "[[Fire Formation - Tenki]]" from the Deck.
  # Activate "Tenki" and search "[[Lunalight Black Sheep]]" from Deck.
  # Activate the effect of "Black Sheep" by discarding it to search "[[Polymerization]]".
  # Activate "Lunalight Tiger" in the [[Pendulum Zone]], then activate its [[Pendulum Effect]] by targetting "Black Sheep" to Summon it.
  # Activate "Polymerization", using both "Black Sheep" and "Kaleido Chick" as [[Fusion Material]] to [[Fusion Summon]] "[[Lunalight Perfume Dancer]]" into either the leftmost, central, or rightmost [[Main Monster Zone]].
  # Activate the [[Trigger Effect]]s of the following cards in a Chain: "Perfume Dancer" (Monster Zone), the effects of "Kaleido Chick" (targetting "Polymerization" in the GY) and "Black Sheep" that were used to Fusion Summon "Perfume Dancer". The Chain resolves by adding "Kaleido Chick" from GY to hand (effect of "Black Sheep"), adding "Polymerization" from GY to hand (effect of "Kaleido Chick"), and search "[[Luna Light Perfume]]" from Deck (effect of "Perfume Dancer").
  # Activate the second effect of "Perfume Dancer" targetting "Lunalight Tiger" to return "Tiger" to the hand, then Summon "Kaleido Chick" from hand.
  # Activate the effect of "Kaleido Chick" by sending "[[Lunalight Emerald Bird]]" from the Deck to the GY. 
  # Use "Kaleido Chick" and "Tiger King" to [[Link Summon]] to an [[Extra Monster Zone]] such that one of its [[Link Arrow]]s [[points to]] "Perfume Dancer".
  # Activate "Lunalight Tiger", and use its "Pendulum Effect" to Special Summon "Emerald Bird" from the GY to the other Main Monster Zone that "Cross-Sheep" points to.
  # Activate the effect of "Cross-Sheep" to Special Summon "Kaleido-Chick" from the GY.
  # Activate the effect of "Kaleido Chick" by sending "[[Lunalight Leo Dancer]]" from the [[Extra Deck]] to the GY.
  # Activate "Luna Light Perfume" to Special Summon "Black Sheep" from the GY.
  # Activate "Polymerization", using "Kaleido Chick" (now treated as "Lunalight Leo Dancer"), "Black Sheep", "Emerald Bird" and "Perfume Dancer" as Fusion Material to Fusion Summon "[[Lunalight Liger Dancer]]".
  # Activate the Triger Effects of the following cards: "Emerald Bird" (in GY, targetting "Kaleido Chick"), "Black Sheep" (in GY) and "Masquerade" (on field, third effect). The Chain resolves by adding "Polymerization" to the hand from GY ("Masquerade"), adding "Gold Leo" to hand ("Black Sheep"), and Special Summon "Kaleido Chick" ("Emerald Bird"). 
  # Activate the effect of "Kaleido Chick" by sending any "Lunalight" monster from the Deck.
  # Activate the effect of "Luna Light Perfume" by banishing it from the GY and discarding a card from hand (such as "Polymerization) to search "[[Lunalight Wolf]]" from Deck.
  # Activate "Wolf" into the other Pendulum Zone, then activate its Pendulum Effect to banish "Leo Dancer" and any three "Lunalight" monsters from the GY other than "Perfume Dancer" or "Silver Hound" to Fusion Summon a 2nd copy of "Liger Dancer".
  # [[Pendulum Summon]] "Gold Leo" from the hand.
  # Use "Gold Leo" and "Kaleido Chick" to Link Summon "[[I:P Masquerena]]".
  # Link Summon "[[S:P Little Knight]]" using "Cross-Sheep" and "I:P Masquerena" during the opponent's turn via the Quick Effect of the latter.
  * At step 26, if the player has another "Lunalight" monster in the hand in addition to "Gold Leo", it is possible to either have: a Rank 4 Xyz Monster of choice + "S:P Little Knight" in addition to 2 "Liger Dancer", or be able to Link Summon "S:P Little Knight" during the opponent's turn with "I:P Masquerena" + the additional "Lunalight" monster, which triggers the effect of "Cross-Sheep" to Summon any Level 4 or lower monster in the GY (such as "Lunalight Gold Leo", which can then activate its effect).
  }}

