  # Activate the first effect of "Kaleido Chick" by sending "[[Lunalight Black Sheep]]" from Deck to GY.
  # Activate the second effect of "Gold Leo" to add the sent "Black Sheep" from the GY to [[hand]].
  # Activate the effect of "Black Sheep" by discarding it to search "[[Polymerization]]".
  # Activate "Polymerization", using both "Gold Leo" and "Kaleido Chick" as [[Fusion Material]] to [[Fusion Summon]] "[[Lunalight Perfume Dancer]]".
  # Activate the [[Trigger Effect]]s of the following cards in a Chain: "Masquerade" (as Chain Link 1) and "Perfume Dancer" (as Chain Link 2). The Chain resolves by searching "[[Luna Light Perfume]]" from Deck (effect of "Perfume Dancer"), then adding "Polymerization" to hand and discard "Luna Light Perfume".
  # Activate the second effect of "Perfume Dancer" targetting "Masquerade" to return it to the hand.
  # Activate the second effect of "Luna Light Perfume" by banishing it from the GY and discarding "Masquerade" to search "[[Lunalight Tiger]]" from Deck.
  # Activate "Lunalight Tiger" into the [[Pendulum Zone]], then activate its Pendulum Effect to Special Summon "Kaleido Chick" from GY.
  # Activate the effect of "Kaleido Chick" by sending "[[Lunalight Leo Dancer]]" from [[Extra Deck]] to GY.
  # [[Link Summon]] "[[S:P Little Knight]]" using "Perfume Dancer" and "Kaleido Chick".
  # Activate the effect of "Yellow Marten" targetting "Lunalight Tiger" to return the latter to hand and Special Summon the former from GY.
  # Activate "Lunalight Tiger" into the Pendulum Zone, then activate its Pendulum Effect to Special Summon "Kaleido Chick" from GY.
  # Activate the effect of "Kaleido Chick" by sending any "Lunalight" monster from the Main Deck to the GY.
  # Use "Yellow Marten" and "Kaleido Chick" to Xyz Summon a Rank 4 Xyz Monster (e.g. "[[Number 41: Bagooska the Terribly Tired Tapir]]").
  # Activate "Polymerization" to banish "Leo Dancer" and 3 "Lunalight" monsters except "Perfume Dancer" or "Silver Hound" to Fusion Summon "[[Lunalight Liger Dancer]]". 
  }}

  {{Combo steps
  | opening = "[[Fire Formation - Tenki]]"
  | end = 2 "[[Lunalight Liger Dancer]]" + "[[S:P Little Knight]]", "[[Lunalight Silver Hound]]" in the [[Graveyard|GY]]
  | steps =
  # Activate "[[Fire Formation - Tenki]]" and search "[[Lunalight Gold Leo]]".
  # [[Normal Summon]] "Gold Leo" and activate its first effect to search "[[Lunalight Silver Hound]]" from [[Deck]], then discard the added "Silver Hound".
  # Activate the effect of "Silver Hound" to Special Summon "[[Lunalight Kaleido Chick]]" from the Deck.
  # Activate the effect of "Kaleido Chick" by sending "[[Lunalight Black Sheep]]" from the Deck to GY.
