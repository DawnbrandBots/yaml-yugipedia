  # Activate the effect of "Black Sheep" by discarding itself to search "[[Polymerization]]" from the Deck. 
  # Activate "Polymerization", using "Gold Leo" and "Kaleido Chick" as material to [[Fusion Summon]] "[[Lunalight Perfume Dancer]]".
  # Activate the effects of the following cards: "Perfume Dancer" and "Kaleido Chick". The Chain resolves by adding "Polymerization" from GY to the hand and search "[[Luna Light Perfume]]" from Deck.
