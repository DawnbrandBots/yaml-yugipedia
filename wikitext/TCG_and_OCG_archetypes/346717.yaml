  # Activate the second effect of "Perfume Dancer" to return "Kaleido Chick" to the hand, then Special Summon "Kaleido Chick" from the hand.
  # Activate the effect of "Kaleido Chick" by sending "[[Lunalight Yellow Marten]]" from Deck to GY.
  # Use "Kaleido Chick" and "Perfume Dancer" to Link Summon "[[Cross-Sheep]]".
  # Activate the second effect of "Luna Light Perfume" by banishing it from the GY and discarding any card from the hand (such as "Polymerization") to search "[[Lunalight Wolf]]".
  # Activate "Wolf" into the Pendulum Zone, then activate its Pendulum Effect to banish "Leo Dancer", "Perfume Dancer", "Black Sheep" and "Gold Leo" to Fusion Summon "[[Lunalight Liger Dancer]]" to a Main Monster Zone that "Cross-Sheep" [[points to]].
