  "'''Masquerade'''", known as "'''Masquerade Magician'''" ({{Ruby|仮面魔踏士|マスカレード・マジシャン}} ''Masukarēdo Majishan'') in Japanese, is an [[archetype]] of [[Xyz Monster]]s used by [[Vector]] in the ''[[Yu-Gi-Oh! ZEXAL]]'' anime. It is composed of the pair of "[[Number 10X]]" monsters "[[Number 104: Masquerade]]" and "[[Number C104: Umbral Horror Masquerade]]", as well as their retrained counterparts.

  While not being an archetype in its anime appearance, or in its original release in ''[[Judgment of the Light]]'', it would receive its first support over a decade later in ''[[Beyond the Brave]]'', establishing its gameplay style along with the "[[Umbral Horror]]" and "[[Barian's]]" archetypes.

  "[[Masquerade the Blazing Dragon]]" and "[[Lunalight Masquerade]]" are not members of this archetype due to their Japanese names, however since support for it only works on Xyz Monsters, this is not an issue.

