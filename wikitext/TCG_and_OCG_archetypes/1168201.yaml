  "'''Clown Crew'''", known as "'''Clown Clan'''" ({{Ruby|道化の一座|クラウン・クラン}} ''Kuraun Kuran'') in Japan, is an archetype of mostly [[LIGHT]] [[Beast-Warrior]] monsters introduced in ''[[Blazing Dominion]]''. It is the first archetype with a strategy that involves using monsters of all six major types ([[Ritual Monster|Ritual]], [[Fusion Monster|Fusion]], [[Synchro Monster|Synchro]], [[Xyz Monster|Xyz]], [[Pendulum Monster|Pendulum]], and [[Link Monster|Link]]), and the second one that includes at least one of each, after "[[Archfiend]]".

  == Lore ==
  {{Main|The Valuable Book EX 6 card storylines#No. 2: Clown Crew}}

  == Playing style ==
  "Clown Crew" focuses on Summoning monsters from the Deck or Extra Deck, then using them as [[Tribute]], particularly for the [[Tribute Summon]] of "[[Clown Crew Biancaviso]]". The archetype has many Tribute-related effects, the most common being:
  * Cards that can Summon "Clown Crew" monsters from the Deck or Extra Deck, ignoring their summoning conditions, but the player cannot activate the effects of monsters Special Summoned from the Deck or Extra Deck until the end of the next turn.
  * Monsters of each major type, which, when Tributed, can either shuffle all monsters of that type from field/GY to the Deck/Extra Deck, or have another beneficial effect, usually to Set a "Clown Crew" Spell or Trap. They also have [[Continuous Effect]]s that support Tribute Summoned monsters.

  It synergizes with archetypes that Tribute monsters, such as "[[Mitsurugi]]" and "[[Monarch]]".

