  '''White Night''' (ホワイトナイツ ''Howaito Naitsu'', lit. "White Nights") is an [[archetype]] of cards used by [[Alexis Rhodes]] in the ''[[Yu-Gi-Oh! GX]]'' anime. The members consist of powerful ice-themed [[Monster Card]]s.

  The names of each member are based on a "[[wikipedia:Midnight sun|white night]]", a phenomenon occurring in the summer months in the [[wikipedia:Arctic Circle|Arctic]] and [[wikipedia:Antarctic Circle|Antarctic Circles]] which occurs during the summer months where the sun remains above the horizon, causing the local regions to experience six months of continuous daylight. This parallels how Alexis was brainwashed into the [[Society of Light]], and is also represented by [[wikipedia:The Sun (Tarot card)|The Sun]] [[wikipedia:Tarot|Tarot]] card in [[Sartorius]]' [[Arcana Force Tarot readings|Tarot readings]], which depicts a midnight sun.

