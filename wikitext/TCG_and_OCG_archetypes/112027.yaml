  ==Playing style==
  "[[White Night Dragon]]" is a powerful and [[splashable]] beatstick that can easily be Special Summoned by "[[Big Wave Small Wave]]" or "[[Decoy Dragon]]", making it a very good option for any [[Dragon]] or [[WATER]] Deck. It is also immune to cards like "[[Compulsory Evacuation Device]]". It also has an ability to manage attack targets which can be used to protect monsters with low attack such as "[[Raging Flame Sprite]]" or low DEF such as "[[Dancing Fairy]]" or protect "White Night Queen".

  "[[White Night Queen]]" cannot be [[Special Summon]]ed, but can be [[Tribute Summon]]ed easily in combination with "[[Photon]]" support spells and "[[Gellenduo]]", "[[Kaiser Sea Horse]]" or "[[Star Blast]]" to [[summon]] it to the field quickly. The ability to destroy any face-down card each turn is powerful and can combo with "[[Anti-Spell Fragrance]]" or "[[Swords of Concealing Light]]" to control and destroy your opponent's cards or you can target your own "[[Dark Coffin]]" or "[[Statue of the Wicked]]".

