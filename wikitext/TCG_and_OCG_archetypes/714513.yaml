  == Playing style ==
  {{Main|Branded#Playing style}}
  The "Despia" archetype is primarily a [[Fusion Monster|Fusion]]-focused archetype. "Despia" is most commonly played as part of a "Branded" deck due to the synergies between the two archetypes. Within "Branded" "Despia", "Despia" provides the Deck's Main Deck starters and Fusion Material fodder. The "Despia"-centric Fusion Monsters utilized a "Branded" "Despia" include "[[Despian Quaeritis]]", "[[Despian Proskenion]]" and "[[Masquerade the Blazing Dragon]]", each requiring a "Despia" monster and a LIGHT or DARK monster (or both 1 LIGHT and 1 DARK in the case of "Proskenion"). "Quaeritis" can make all monsters except Level 8 or higher Fusion Monsters have 0 ATK, while floating into a "Despia" monster or "Fallen of Albaz", "Proskenion" can banish an opponent's Extra Deck monster from the GY (or even revive it to the user's field). Finally, "Masquerade" passively forces the opponent to pay 600 [[LP]] each time they wish to activate a card or effect and can revive itself from the GY in a pinch.

  Additionally, due to the "Despia" archetype being composed almost entirely out of DARK Fairy monsters, some "Despia" decks will instead be hybridized as part of a Fairy strategy, such as with "[[Darklord]]" - a fellow DARK Fairy Fusion archetype.

