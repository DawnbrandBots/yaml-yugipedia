title: Bane of Darkness
wikitext: |-
  {{Duel Links Skill
  | fr_name              = Fléau des Ténèbres
  | ja_name              = 闇を切り裂く力
  | romaji_name          = Yami o Kirisaku Chikara
  | translated_name      = The Power that Slices Darkness
  | text                 = You can only use this Skill's second and third effect once per Duel.<br />1: You can Normal Summon "[[Dark Magician (Duel Links)|Dark Magician]]" and "[[Buster Blader (Duel Links)|Buster Blader]]" without Tributing, but you cannot Special Summon Level 2 or higher monsters except for "[[Buster Blader (archetype)|Buster Blader]]" monsters and Level 6 or higher [[DARK]] [[Spellcaster]] monsters and Level 7 or higher DARK [[Dragon]] monsters with 2400 or less ATK.<br />2: Shuffle 1 card from your hand into the Deck, reveal 1 "Dark Magician" in your hand, and then play 1 "Buster Blader" from your hand or deck to your field in face-down Defense Position. (Its battle position can be changed.)<br />3: During a turn that you Normal Summoned "Dark Magician", add 1 "[[Polymerization (Duel Links)|Polymerization]]" and 1 "[[Diffusion Wave-Motion (Duel Links)|Diffusion Wave-Motion]]" from outside of your deck to your hand.
  | fr_text              = Vous pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Spécialement de monstres de Niveau 2 ou plus, sauf des monstres de Type Magicien TÉNÈBRES de Niveau 6 ou plus et des monstres "Buster Blader", mais vous pouvez Invoquer Normalement/Poser "Magicien Sombre" et "Buster Blader" sans Sacrifice.<br />2 : Mélangez 1 carte de votre main dans le Deck, révélez 1 "Magicien Sombre" dans votre main, puis jouez 1 "Buster Blader" de votre main ou Deck sur votre Terrain en position de Défense face verso. (Sa position de combat peut être modifiée.)<br />3 : Pendant le tour où vous avez Invoqué Normalement "Magicien Sombre", ajoutez 1 "Polymérisation" et 1 "Diffusion Ondulatoire" depuis l'extérieur de votre Deck à votre main.
  | ja_text              = このスキルの②③の効果はそれぞれデュエル中に１度しか使用できない。<br />①：自分は、「バスター・ブレイダー」モンスターとレベル６以上の魔法使い族・闇属性モンスターを除きレベル２以上のモンスターを特殊召喚できず、「ブラック・マジシャン」及び「バスター・ブレイダー」を通常召喚する場合に必要なリリースが無くなる。<br />②：手札１枚をデッキに戻し、手札の「ブラック・マジシャン」１体を相手に見せて発動できる。手札・デッキから「バスター・ブレイダー」１体を裏側守備表示で出す（表示形式変更可能）。<br />③：自分が「ブラック・マジシャン」を召喚したターンに発動できる。デッキ外から「融合」１枚と「拡散する波動」１枚を手札に加える。
