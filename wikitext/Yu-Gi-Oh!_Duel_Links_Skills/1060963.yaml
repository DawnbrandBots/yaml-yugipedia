  {{Duel Links Skill
  | fr_name             = Syntonisation Céleste
  | ja_name             = 天空の調律
  | romaji_name         = Tenkū no Chōritsu
  | text                = You can only use this Skill's second and third effects once per turn.<br />1: You cannot Normal or [[Special Summon]] monsters except for "[[The Agent]]" monsters, "[[Hyperion]]" monsters, Synchro Monsters, and Normal Monsters.<br />2: During your Main Phase, send 1 "The Agent" monster from your Deck to the Graveyard. Then, you can apply the following effect.
  * Shuffle 1 "Hyperion" monster or 1 "[[Mystical Shine Ball]]" from your hand into the Deck, and then add 1 "Hyperion" monster or 1 "[[The Agent of Creation - Venus]]" from your Deck to your hand.
  3: During your Main Phase, choose 1 [[Fairy]] monster on your field, and treat that monster as a [[Tuner monster|Tuner]].
  | fr_text             = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par tour.<br />1 : Vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des monstres "Agent", des monstres "Hypérion", des Monstres Synchro et des Monstres Normaux.<br />2 : Pendant votre Main Phase, envoyez 1 monstre "Agent" de votre Deck au Cimetière. Vous pouvez ensuite appliquer l'effet suivant.
  * Mélangez 1 monstre "Hypérion" ou 1 "Sphère Mystique Lumineuse" de votre main dans le Deck, puis ajoutez 1 monstre "Hypérion" ou 1 "Vénus, Agent de la Création" de votre Deck à votre main.
  3 : Pendant votre Main Phase, choisissez 1 monstre de Type Elfe sur votre Terrain, et traitez ce monstre comme un Syntoniseur.
  | ja_text             = このスキルの②③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：自分は「代行者」「ヒュペリオン」モンスター、シンクロモンスター、通常モンスターしか特殊召喚できない。<br />②：デッキから「代行者」モンスターを２体まで墓地へ送って発動できる。デッキ外から「天空の聖域』１枚をデッキに追加する。その後、以下の効果を適用できる。<br />●手札から「ヒュペリオン」モンスターか通常モンスター１体をデッキに戻し、デッキから「代行者」モンスターか「ヒュペリオン」モンスター１体を手札に加える。<br />③：自分の墓地のモンスター１体をデッキに戻して発動できる。自分フィールドの天使族モンスターを２体まで選ぶ。そのモンスターはチューナーになる。
