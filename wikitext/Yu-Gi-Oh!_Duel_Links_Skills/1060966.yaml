title: Sunavalon Luxuriance
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Abondance Solairavalon
  | ja_name             = 聖天樹の繁茂
  | romaji_name         = San Abaron no Hanmo
  | translated_name     = San Avalon Luxuriance
  | text                = You can only use this Skill's second effect once per turn.<br />1: At the beginning of the Duel, if all of the monsters in your [[Extra Deck]] are [[Link Monster|Link Monsters]] with different names, add 5 "[[Sunavalon]]" monsters with different names to your Extra Deck, also for the rest of this Duel, you cannot [[Special Summon]] monsters, except [[EARTH]] [[Plant]] monsters or Link Monsters.<br />2: Shuffle 1 "Sunavalon" card, "[[Sunvine]]" card , or "[[Sunseed]]" card from your hand into the Deck, then add 1 "[[Sunseed Genius Loci (Duel Links)|Sunseed Genius Loci]]" from your Deck, [[Graveyard]], or among your banished cards to your hand.
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par tour.<br />1 : Au début du Duel, si tous les monstres dans votre Extra Deck sont des Monstres Lien avec des noms différents, ajoutez 5 monstres "Solairavalon" avec des noms différents à votre Extra Deck. De plus, jusqu'à la fin de ce Duel, vous ne pouvez pas Invoquer Spécialement de monstres, excepté des monstres TERRE de Type Plante ou des Monstres Lien.<br />2 : Mélangez 1 Carte "Solairavalon", "Solairvigne" ou "Solairgraine" de votre main dans votre Deck, puis ajoutez 1 Carte "Astucieux Loci Solairgraine" de votre Deck, de votre Cimetière, ou parmi vos cartes bannies à votre main.
  | ja_text             = このスキルの②の効果は１ターンに１度しか使用できない。<br />①：デュエル開始時に発動する。このデュエル中、自分は植物族・地属性モンスターまたはリンクモンスターしか特殊召喚できない。自分のＥＸデッキがリンクモンスターのみで同名モンスターが存在しない場合、ＥＸデッキに「サンアバロン」モンスター５種類を追加する。<br />②：手札の「サンアバロン」「サンヴァイン」「サンシード」カードの内１枚をデッキに戻して発動できる。自分のデッキ・墓地・除外状態から「聖種の地霊」１体を手札に加える。
