title: Neos Fusion Trigger
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Amorce Fusion Néos
  | ja_name  = 
  | text     = 1: Once per Duel at the start of your Main Phase, if you have any "[[Neos]]" monsters in your hand, reveal 1 at random to your opponent to activate this effect. Shuffle that monster into the Deck, then add 4 "Neos" Fusion Monsters with different names from outside your Deck to your Extra Deck, and send 6 "[[Neo-Spacian]]" monsters with different names from outside your Deck to the Graveyard. Then, add 1 "[[Neos Fusion (Duel Links)|Neos Fusion]]" from your Deck to your hand.
  | fr_text  = 1 : Une fois par Duel au début de votre Main Phase, si vous avez des monstres "Néos" dans votre main, révélez-en 1 au hasard à votre adversaire pour activer cet effet. Mélangez ce monstre dans le Deck, puis ajoutez 4 Monstres Fusion "Néos" avec des noms différents depuis l'extérieur de votre Deck à votre Extra Deck, et envoyez 6 monstres "Néo-Spacien" avec des noms différents depuis l'extérieur de votre Deck au Cimetière. Puis, ajoutez 1 "Fusion Néos" de votre Deck à votre main.
