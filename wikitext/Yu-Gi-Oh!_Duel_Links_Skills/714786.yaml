title: Emperor Advent
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Avènement de l'empereur
  | ja_name             = 超帝降臨
  | text                = Select up to 3 "[[Cubic]]" monsters in your hand or Graveyard, and play them in Defense Position, but negate their effects. You cannot Summon any monsters except "[[Indiora Doom Volt the Cubic Emperor (Duel Links)|Indiora Doom Volt the Cubic Emperor]]" nor activate any effects other than "Indiora Doom Volt the Cubic Emperor" during the turn you activate this Skill.<br/>In addition, "Indiora Doom Volt the Cubic Emperor" Special Summoned on the turn you used this Skill gains 2400 ATK. Send all monsters other than "Indiora Doom Volt the Cubic Emperor" on your field to the Graveyard at the end of this turn.<br/>This Skill can only be used once per Duel.
  | fr_text             = Sélectionnez jusqu'à 3 monstres "Cubique" dans votre main ou votre Cimetière et jouez-les en Position de Défense, mais annulez leurs effets. Vous ne pouvez Invoquer aucun monstre à part "Indiora l'Empereur Cubique du Choc Mortel" ni activer les effets d'autres cartes que "Indiora l'Empereur Cubique du Choc Mortel" pendant le tour où vous activez cette Compétence.<br/>De plus, si la Carte "Indiora l'Empereur Cubique du Choc Mortel" est Invoquée Spécialement pendant le tour où vous utilisez cette Compétence, elle gagne 2 400 ATK. Envoyez tous les monstres autre que "Indiora l'Empereur Cubique du Choc Mortel" présents sur votre Terrain au Cimetière à la fin de ce tour.<br/>Cette Compétence ne peut être utilisée qu'une fois par Duel.
  | ja_text             = 自分の手札・墓地の「方界」モンスターを3体まで選び、自分フィールドに効果を無効化にして守備表示で出す。このスキルを使用したターン、自分は「方界超帝インディオラ・デス・ボルト」しか召喚・特殊召喚できず、自分は「方界超帝インディオラ・デス・ボルト」以外のカードの効果を発動できない。<br>
  また、このスキルを使用したターンに特殊召喚された「方界超帝インディオラ・デス・ボルト」の攻撃力は2400アップする。<br>
  このターン終了時、自分フィールドの「方界超帝インディオラ・デス・ボルト」以外の自分フィールドのモンスターを全て墓地へ送る。<br>
  このスキルはデュエル中1度のみ使用できる。
