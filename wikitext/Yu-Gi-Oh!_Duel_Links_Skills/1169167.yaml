title: Red-Eyes Armament
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Armement d'Yeux Rouges
  | ja_name               = レッドアイズ・アーマメント
  | romaji_name           = Reddoaizu Āmamento
  | text                  = You can use this Skill's first and second effects once per Duel if your Deck contains a total of 15 or more "[[Red-Eyes]]" cards and/or "[[Lord of the Red (Duel Links)|Lord of the Red]]".<br />1: Reveal 1 "[[Red-Eyes Black Dragon (Duel Links)|Red-Eyes Black Dragon]]", "Lord of the Red", or "[[Red-Eyes Transmigration (Duel Links)|Red-Eyes Transmigration]]" from your hand and add 1 "Lord of the Red" or "Red-Eyes Transmigration" from your Deck to your hand. Then, you can add 1 "Red-Eyes" card from your Deck to your hand.<br />2: If you control a "Red-Eyes" monster, or your opponent controls a monster, add 1 of the 5 monsters from outside your Deck to your hand, send the rest to the Graveyard, then add 1 "[[Polymerization (Duel Links)|Polymerization]]" from outside your Deck to your hand.
  | fr_text               = Vous ne pouvez utiliser le premier et le deuxième effet de cette Compétence une fois par Duel si votre Deck contient un total d'au moins 15 cartes "Yeux Rouges" et/ou "Seigneur du Rouge".<br />1 : Révélez 1 "Dragon Noir aux Yeux Rouges", "Seigneur du Rouge" ou "Transmigration des Yeux Rouges" de votre main et ajoutez 1 "Seigneur du Rouge" ou "Transmigration des Yeux Rouges" de votre Deck à votre main. Puis, vous pouvez ajouter 1 Carte "Yeux Rouges" de votre Deck à votre main.<br />2 : Si vous contrôlez un monstre "Yeux Rouges", ou que votre adversaire contrôle un monstre, ajoutez 1 des 5 monstres depuis l'extérieur de votre Deck à votre main, envoyez le reste au Cimetière, puis ajoutez 1 "Polymérisation" depuis l'extérieur de votre Deck à votre main.
  | ja_text               = このスキルの①②の効果は「レッドアイズ」カード及び「ロード・オブ・ザ・レッド」を合計１５枚以上入れているデッキでそれぞれデュエル中に１度ずつ使用できる。<br />①：手札の「真紅眼の黒竜」「ロード・オブ・ザ・レッド」「レッドアイズ・トランスマイグレーション」の内１枚を相手に見せて発動できる。デッキから「ロード・オブ・ザ・レッド」１体か「レッドアイズ・トランスマイグレーション」１枚を手札に加える。その後、デッキから「レッドアイズ」カード１枚を手札に加える事ができる。<br />②：自分フィールドに「レッドアイズ」モンスターが存在する場合または相手フィールドにモンスターが存在する場合に発動できる。デッキ外のモンスター５体の中から１体を手札に加え、残りを墓地へ送り、デッキ外の「融合」１枚を手札に加える。
