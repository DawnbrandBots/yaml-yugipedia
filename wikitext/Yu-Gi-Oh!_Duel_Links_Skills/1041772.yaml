  | text                 = During this Duel, you can [[Normal Summon]]/[[Normal Set|Set]] "[[Chronicle Magician (Duel Links)|Chronicle Magician]]" or a [[Normal Monster]] with 2500 [[ATK]] or [[DEF]] without [[Tribute|Tributing]], but you cannot Normal or [[Special Summon]] any [[Effect Monster]]s with [[Level]]s except for [[LIGHT]] or [[DARK]] [[Spellcaster]] Type monsters and LIGHT [[Dragon]] Type monsters.<br />You can use the following effect once per turn on a turn where "[[Chronicle Sorceress (Duel Links)|Chronicle Sorceress]]" or a Level 7 or higher monster is Summoned or [[Fusion Summon]]ed. Add 1 "[[Successor Soul (Duel Links)|Successor Soul]]" or [[Quick-Play Spell Card]] that mentions "[[Dark Magician (Duel Links)|Dark Magician]]" or "[[Blue-Eyes White Dragon (Duel Links)|Blue-Eyes White Dragon]]" from your [[Deck]] to your hand, and send 1 non-Effect Monster with a different name than the monsters on your field and in your [[Graveyard]] from your Deck or Extra Deck to your Graveyard.
  | fr_text              = Pendant ce Duel, vous pouvez Invoquer Normalement/Poser la Carte "Magicien Chronique" ou un Monstre Normal avec 2 500 ATK ou DEF sans Sacrifice, mais vous ne pouvez pas Invoquer Normalement ou Spécialement des Monstres à Effet avec des Niveaux à l'exception des monstres LUMIÈRE ou TÉNÈBRES de Type Magicien et des monstres LUMIÈRE de Type Dragon.<br />Vous pouvez utiliser l'effet suivant une fois par tour lors d'un tour où la Carte "Sorcière Chronique" ou un monstre de Niveau 7 ou plus est Invoqué ou Invoqué par Fusion. Ajoutez 1 "Âme du Successeur" ou 1 carte Magie Jeu-Rapide qui mentionne "Magicien Sombre" ou "Dragon Blanc aux Yeux Bleus" de votre Deck à votre main, et envoyez 1 Monstre sans Effet avec un nom différent des monstres sur votre Terrain et dans votre Cimetière de votre Deck ou votre Extra Deck à votre Cimetière.
  | ja_text               = このデュエル中、自分は「クロニクル・マジシャン」と攻撃力または守備力が２５００の通常モンスターを通常召喚する場合に必要なリリースが無くなり、魔法使い族の光・間属性モンスターとドラゴン族・光属性モンスターしかレベルを持つ効果モンスターを召喚・特殊召喚できない。<br />「クロニクル・ソーサレス」かレベル７以上のモンスターを召喚・融合召喚したターンに１ターンに１度使用できる。<br />デッキから「ブラック・マジシャン」「青眼の白龍」のカード名が記された速攻魔法カードまたは「受け継ぎし魂」１枚を手札に加え、デッキ・エクストラデッキから自分のフィールド・墓地に同名モンスターが存在しない効果モンスター以外のモンスター１体を墓地へ送る。
