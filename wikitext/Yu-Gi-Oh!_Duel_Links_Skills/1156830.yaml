  | text                = You can use this Skill's second and third effects once per turn if your Deck contains 8 or more "[[Libromancer]]" monsters with different names.<br/>1: During your turn, you cannot Normal or Special Summon any Effect Monsters except "Libromancer" monsters (excluding Special Summons from the Extra Deck).<br/>2: Reveal 1 "Libromancer" monster with 2000 or less ATK in your hand, then shuffle 1 card from your hand or field into the Deck. Add 1 Ritual Monster and 1 "Libromancer" monster from your Deck to your hand.<br/>3: "If only your opponent controls a monster, Set 1 "Libromancer" Spell/Trap from your Deck to your Field". (This card can be activated the same turn.).
