title: Destiny Draw of the One Marked by the Dragon
wikitext: |-
  {{Duel Links Skill
  | fr_name     = Pioche de la Destinée de l'Élu du Dragon
  | text        = You can only use this Skill's first and second effects once per Duel.<br />1: Can be used before your normal draw. Play 1 "[[Crimson Dragon (Duel Links)|Crimson Dragon]]" from your Extra Deck in face-down Defense Position. (Its battle position can be changed.) Your normal draw this turn will be 1 card from your Deck that mentions "Crimson Dragon", and for the rest of the Duel, you cannot Special Summon any monsters from your Extra Deck, except Synchro Monsters.<br />2: During your Main Phase, return 1 card from your hand to the bottom of your Deck or send it to the Graveyard. Then, draw 2 cards.
  | fr_text     = Vous ne pouvez utiliser le premier et le deuxième effet de cette Compétence qu'une seule fois par Duel.<br />1 : Peut être utilisée avant votre pioche normale. Jouez 1 "Dragon Cramoisi" depuis votre Extra Deck en Position de Défense face verso (sa position de combat peut être modifiée). Votre pioche normale ce tour sera 1 carte de votre Deck qui mentionne "Dragon Cramoisi" et pour le reste du Duel, vous ne pouvez Invoquer Spécialement aucun monstre de votre Extra Deck (Monstres Synchro exclus).<br />2 : Durant votre Main Phase, renvoyez 1 carte de votre main au-dessous de votre Deck ou envoyez-la au Cimetière. Puis, piochez 2 cartes.
