  | text                = You can use this Skill's first and second effects if your Extra Deck contains a [[WATER]] Fusion Monster.<br />1: At the beginning of the Duel, gain 1500 LP.<br />2: Once per turn, during your Main Phase, make 1 face-up monster you control gain 300 ATK until the end of this turn. It gains an additional 500 ATK until the end of this turn if there is a WATER Fusion Monster and/or a WATER monster and a Fusion Monster on your field and/or in your Graveyard.
  | fr_text             = Vous pouvez utiliser le premier et le deuxième effet de cette Compétence si votre Extra Deck contient un Monstre Fusion EAU.<br />1 : Au début du Duel, gagnez 1 500 LP.<br />2 : Une fois par tour, pendant votre Main Phase, faites qu'un monstre face recto que vous contrôlez gagne 300 ATK jusqu'à la fin de ce tour. Il gagne 500 ATK supplémentaire jusqu'à la fin du tour s'il y a un Monstre Fusion EAU et/ou un monstre EAU et un Monstre Fusion sur votre Terrain et/ou dans votre Cimetière.
  | ja_text             = このスキルの①②の効果はＥＸデッキに水属性の融合モンスターを入れている場合に使用できる。<br />①：デュエル開始時に発動する。自分は１５００ＬＰ回復する。<br />②：１ターンに１度、自分メインフェイズに発動できる。自分フィールドの表側表示モンスター１体を選び、その攻撃カをターン終了時まで３００アップする。自分のフィールド・墓地に水属性モンスター及び融合モンスターが存在する場合、さらに選んだモンスターの攻撃力はターン終了時まで５００アップする。
