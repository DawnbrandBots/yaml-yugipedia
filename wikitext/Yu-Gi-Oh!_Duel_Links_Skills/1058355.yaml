title: Xyz Lightraze
wikitext: |-
  {{Duel Links Skill
  | fr_name     = Éblouissement Xyz
  | ja_name     = エクシーズ・ライトレイズ
  | romaji_name = Ekushīzu Raitoreizu
  | text        = You can only use this Skill if your [[Extra Deck]] contains a [[LIGHT]] [[Xyz Monster]].<br />1. At the beginning of the Duel, gain 1500 Life Points.<br />2. Once per turn, during your Main Phase, you can choose 1 Xyz Monster on your field, and it gains 300 ATK until the end of this turn. If a LIGHT monster is on your field or in your Graveyard, the chosen monster gains an additional 300 ATK until the end of this turn.
  | fr_text     = Cette Compétence peut être utilisée si votre Extra Deck contient un Monstre Xyz LUMIÈRE.<br />1 : Gagnez 1 500 Life Points au début du Duel.<br />2 : Peut être utilisée une fois par tour pendant votre Main Phase. Choisissez 1 monstre face recto que vous contrôlez, et il gagne 300 ATK jusqu'à la fin du tour. Il gagne 500 ATK supplémentaires jusqu'à la fin du tour s'il y a un Monstre Xyz LUMIÈRE OU un monstre LUMIÈRE et un Monstre Xyz sur votre Terrain et/ou dans votre Cimetière.
  | ja_text     = このスキルはＥＸデッキに光属性エクシーズモンスターを入れている場合に使用できる。<br />①：デュエル開始時に発動する。自分は１５００ＬＰ回復する。<br />②：１ターンに１度、自分メインフェイズに発動できる。自分フィールドのエクシーズモンスター１体を選び、その攻撃カをターン終了時まで３００アップする。自分のフィールドまたは墓地に光属性モンスターが存在する場合、さらに選んだモンスターの攻撃力はターン終了時まで３００アップする。
