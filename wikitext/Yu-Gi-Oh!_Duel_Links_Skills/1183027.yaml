  | text     = 1: Activates at the beginning of your first turn. During this Duel, if you Xyz Summon "[[Number 32: Shark Drake (Duel Links)|Number 32: Shark Drake]]", you can also Xyz Summon by using 1 [[WATER]] "[[Number]]" Xyz Monster you control as material, excluding "[[Shark Drake]]" Xyz Monsters. When using a [[Fish]] monster you control as material to Xyz Summon, you can treat its Level as 3–5. During your Main Phase, you can Normal Summon 1 Fish monster in addition to your Normal Summon/Set.
  | fr_text  = 1 : S'active au début de votre premier tour. Lors de ce Duel, si vous Invoquez par Xyz "Numéro 32 : Requin Drakonien", vous pouvez aussi Invoquer par Xyz en utilisant 1 Monstre Xyz EAU "Numéro" que vous contrôlez comme Matériel, à l'exception des Monstres Xyz "Requin Drakonien". Quand vous utilisez un monstre Poisson que vous contrôlez comme Matériel d'Invocation Xyz, vous pouvez traiter son Niveau comme étant 3—5. Durant votre Main Phase, vous pouvez Invoquer Normalement 1 monstre Poisson en plus de votre Invocation Normale/Pose.
