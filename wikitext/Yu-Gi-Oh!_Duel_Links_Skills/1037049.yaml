title: Imperial Wrath Awakening
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Éveil de la Fureur impériale
  | ja_name               = 逆鱗の覚醒
  | romaji_name           = Gekirin no Kakusei
  | text                  = At the beginning of the Duel, add Pendulum Zones to your field and add 1 "[[Dark Rebellion Xyz Dragon (Duel Links)|Dark Rebellion Xyz Dragon]]" to your Extra Deck.<br />Also, you can use each of the following effects once in a Duel if you have 2 cards in your Pendulum Zone.
  * Return all the cards on your field to your Deck and place "[[Performapal Turn Toad (Duel Links)|Performapal Turn Toad]]" and "[[Performapal Cheermole (Duel Links)|Performapal Cheermole]]" from outside of the Deck in your Pendulum Zone. You can only Special Summon a Level or Rank 4 [[Dragon]]-Type or [[Beast]]-Type monster if you use this Skill in a Duel.
  * You can use this effect if there is a [[Fusion Monster]] on your opponent's field. Select 1 "Dark Rebellion Xyz Dragon" from your field and use the cards from your [[Pendulum Zone]] as Xyz Materials for that monster.
  | fr_text               = Au début du Duel, ajoutez des Zones Pendule sur votre Terrain et ajoutez 1 "Dragon Xyz de la Rébellion des Ténèbres" à votre Extra Deck.<br />De plus, vous pouvez utiliser chacun des effets suivants une fois par Duel si vous avez 2 cartes dans votre Zone Pendule.<br />●  Renvoyez toutes les cartes sur votre Terrain dans votre Deck et placez "Crapaud du Tour Potartiste" et "Pompomtaupe Potartiste" depuis l'extérieur du Deck dans votre Zone Pendule. Vous ne pouvez Invoquer Spécialement qu'un monstre de Type Bête ou de Type Dragon de Niveau ou de Rang 4 si vous utilisez cette Compétence dans un Duel.<br />● Cet effet peut être utilisé si un Monstre de Fusion se trouve sur le Terrain de votre adversaire. Sélectionnez 1 "Dragon Xyz de la Rébellion des Ténèbres" sur votre Terrain et utilisez les cartes de votre Zone Pendule comme Matériel Xyz pour ce monstre.
  | ja_text               = デュエル開始時に自分フィールドにペンデュラムゾーンを追加する。さらに、自分のエクストラデッキに「ダーク・リベリオン・エクシーズ・ドラゴン」を１枚追加する。また、自分のペンデュラムゾーンにカードが２枚存在する場合に、以下の効果をそれぞれ１度だけ使用できる。<br />●自分フィールドのカード全てをデッキに戻し、デッキ外から「ＥＭヒックリカエル」「ＥＭチアモール」を自分のペンデュラムゾーンに置く。このスキルを使用したデュエル中、自分はレベルまたはランクが４のドラゴン族・獣族モンスターしか特殊召喚できない。<br />●相手フィールドに融合モンスターが存在する場合に使用できる。自分フィールドの「ダーク・リベリオン・エクシーズ・ドラゴン」１体を選び、自分のペンデュラムゾーンのカードをそのモンスターのエクシーズ素材にする。
