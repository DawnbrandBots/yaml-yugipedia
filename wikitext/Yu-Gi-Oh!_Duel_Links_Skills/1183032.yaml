  | text     = You can use this Skill's second and third effects once per Duel.<br />1: You cannot Normal or Special Summon any monsters, except "[[Therion]]" monsters.<br />2: Reveal 1 "Therion" monster in your hand. Add 1 "Therion" card from your Deck to your hand or send it to the GY. Then, add 1 "[[Endless Engine Argyro System (Duel Links)|Endless Engine Argyro System]]" from outside of your Deck to your hand.<br />3: Can be activated from turn 2 onward. Add 1 "Therion" monster from your Deck to your hand, then send up to 3 "Therion" cards from your Deck to the GY.
  | fr_text  = Vous pouvez utiliser le deuxième et le troisième effet de cette Compétence qu'une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des monstres "Therion".<br />2 : Révélez 1 monstre "Therion" dans votre main. Ajoutez 1 carte "Therion" de votre Deck à votre main ou envoyez-la dans le Cimetière. Puis, ajoutez 1 "Moteur Infini Système Argyro" de l'extérieur de votre Deck à votre main.<br />3 : Peut être activée à partir du 2e tour. Ajoutez 1 monstre "Therion" de votre Deck à votre main, puis envoyez jusqu'à 3 cartes "Therion" depuis votre Deck au Cimetière.
