title: Therion Battle Royale
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Bataille Royale de Therion
  | ja_name  = 
  | text     = You can use this Skill's first and second effects once per Duel if your Deck (excluding the Extra Deck) contains 15 or more "[[Therion]]" cards.<br />1: Reveal 1 "Therion" monster in your hand. Add 1 "Therion" card from your Deck to your hand or send it to the GY. Then, add 1 "[[Endless Engine Argyro System (Duel Links)|Endless Engine Argyro System]]" from outside of your Deck to your hand.<br />2: If your opponent controls a card, add 1 "Therion" monster from your Deck to your hand, then send up to 3 "Therion" cards from your Deck to the GY.
  | fr_text  = Vous pouvez utiliser le premier et le second effet de cette Compétence une fois par Duel si votre Deck (hors Extra Deck) contient au moins 15 cartes "Therion".<br />1 : Révélez 1 monstre "Therion" dans votre main. Ajoutez 1 carte "Therion" de votre Deck à votre main ou envoyez-la dans le Cimetière. Puis, ajoutez 1 "Moteur Infini Système Argyro" de l'extérieur de votre Deck à votre main.<br />2 : Si votre adversaire contrôle une carte, ajoutez 1 monstre "Therion" de votre Deck à votre main, puis envoyez jusqu'à 3 cartes "Therion" depuis votre Deck au Cimetière.
