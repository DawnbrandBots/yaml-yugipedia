  | fr_name  = Contact Requiem
  | text     = '''[REQUIREMENT]''' Can be activated from turn 2 onward, if all of the monsters in your constructed Deck are [[DARK]] Attribute [[Galaxy (Type)|Galaxy]] Type monsters.<br />'''[EFFECT]''' Place 1 "[[Voidvelg Requiem (Duel Links)|Voidvelg Requiem]]" or Normal Monster from your Deck or Graveyard on top of your Deck. This turn, if you Tribute Summon "Voidvelg Requiem" in Attack Position, each monster on your field can each be treated as 2 Tributes. Then, you can draw 1 card. (Once per Duel.)
  | fr_text  = '''[CONDITION]''' Peut être activée à partir du 2e tour, si tous les monstres dans votre Deck construit sont des monstres d'Attribut TÉNÈBRES de Type Galaxie.<br />'''[EFFET]''' Placez 1 "Requiem de Videvelg" ou Monstre Normal depuis votre Deck ou Cimetière au-dessus de votre Deck. Ce tour, si vous Invoquez par Sacrifice "Requiem de Videvelg" en Position d'Attaque, chaque monstre sur votre Terrain peut être traité comme 2 Sacrifices. Puis, vous pouvez piocher 1 carte. (Une fois par Duel.)
