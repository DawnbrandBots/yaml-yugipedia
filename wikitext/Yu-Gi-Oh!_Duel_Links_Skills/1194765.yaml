title: Invincible Crimson Star
wikitext: |-
  {{Duel Links Skill
  | fr_name     = Étoile Pourpre Invicible
  | text        = You can only use this Skill's second and third effects once per Duel.<br />1: At the beginning of the Duel, add 2 Synchro Monsters to your Extra Deck. During this Duel, you can cannot Normal Summon or Special Summon any monsters, except [[DARK]] [[Dragon]] Synchro Monsters, Level 5 or lower Dragon or [[Fiend]] monsters, or "[[Crimson Dragon (Duel Links)|Crimson Dragon]]".<br />2: Send 1 card from your hand and 1 card you control to the Graveyard, then play 1 Level 8 "[[Red Dragon Archfiend (archetype)|Red Dragon Archfiend]]" monster from your Extra Deck in face-down Defense Position. (Its battle position can be changed.) If "[[Red Familiar (Duel Links)|Red Familiar]]" was sent to the Graveyard for this activation, you can also play up to 2 "[[Resonator]]" monsters from your Deck.<br />3: If you control "[[Red Nova Dragon (Duel Links)|Red Nova Dragon]]", or your opponent controls a monster, add 1 Dragon or Fiend Tuner from your Deck to your hand, then Set 1 "[[Fiendish Chain (Duel Links)|Fiendish Chain]]" from outside your Deck to your field. (This card can be activated the same turn.)
  | fr_text     = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Au début du Duel, ajoutez 2 Monstres Synchro à votre Extra Deck. Lors de ce Duel, vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des Monstres Synchro Dragon TÉNÈBRES de max. Niveau 5, des monstres Démon, ou "Dragon Cramoisi".<br />2 : Envoyez 1 carte de votre main et 1 carte que vous contrôlez au Cimetière, puis jouez 1 monstre "Dragon Rouge Archdémon" de Niveau 8 depuis votre Extra Deck en Position de Défense face verso (sa position de combat peut être modifiée). Si la Carte "Familier Rouge" a été envoyée au Cimetière pour cette activation, vous pouvez aussi jouer jusqu'à 2 monstres "Diapason" depuis votre Deck.<br />3 : Si vous contrôlez "Dragon Nova Rouge", ou si votre adversaire contrôle un monstre, ajoutez 1 Syntoniseur Dragon ou Démon depuis votre Deck à votre main, puis Posez 1 "Chaîne Démoniaque" depuis l'extérieur de votre Deck sur votre Terrain (cette carte peut être activée durant le même tour).
