title: Red-Eyes Reverse
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Inversement des Yeux Rouges
  | ja_name               = レッドアイズ・リバース
  | romaji_name           = Reddoaizu Ribāsu
  | text                  = You can only use this Skill's second effect once per turn, and the third effect once per Duel.<br />1: You cannot [[Special Summon]] any monsters, except "[[Red-Eyes]]" monsters (excluding Special Summons from the [[Extra Deck]]).<br />2: During your Main Phase, play 1 "[[Red-Eyes Black Dragon (Duel Links)|Red-Eyes Black Dragon]]" from your hand in [[Defense Position]]. (Its battle position can be changed.) (You cannot [[Normal Summon]] the turn you activate this effect.)<br />3: If you control a "Red-Eyes" monster, Set 1 "Red-Eyes" Spell/Trap from your Deck. This card can be activated the same turn.) If you control a Normal Monster, you can also draw 1 card.
  | fr_text               = Vous pouvez uniquement utiliser le deuxième effet de cette Compétence une fois par tour, et le troisième effet une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Spécialement de monstre, (hors Invocations Spéciales depuis l'Extra Deck), excepté des monstres "Yeux Rouges".<br />2 : Pendant votre Main Phase, jouez 1 "Dragon Noir aux Yeux Rouges" depuis votre main en Position de Défense face verso. (Sa position de combat peut être modifiée.) (Vous ne pouvez pas Invoquer Normalement le tour où vous activez cet effet.)<br />3 : Si vous contrôlez un monstre "Yeux Rouges", Posez 1 Carte Magie/Piège "Yeux Rouges" depuis votre Deck. (Cette carte peut être activée durant le même tour.) Si vous contrôlez un Monstre Normal, vous pouvez aussi piocher 1 carte.
  | ja_text               = デュエル開始時、デッキに「レッドアイズ」モンスターが７体以上存在する場合、このデュエル中、自分は「真紅眼の黒竜」を通常召喚する場合に必要なリリースが無くなり、「真紅眼の黒竜」を裏側守備表示で通常召喚したターンに表示形式の変更ができ、「レッドアイズ」モンスターしか特殊召喚できない。（エクストラデッキからの特殊召喚は除く）さらに以下の効果をデュエル中に１度だけ使用できるようになる。<br />自分フィールドに「レッドアイズ」モンスターが存在する場合、デッキから「レッドアイズ」魔法・罠カード１枚を自分フィールドにセットする。その後、自分フィールドに通常モンスターが存在しない場合、手札１枚をデッキに戻す。
