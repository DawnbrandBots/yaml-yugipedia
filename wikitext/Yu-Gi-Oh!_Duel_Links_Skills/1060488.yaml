  {{Duel Links Skill
  | fr_name     = Restauration Lien
  | ja_name     = リンク・レストレーション
  | romaji_name = Rinku Resutorēshon
  | text        = You can only use this Skill's first effect once per Duel.<br />1: During your Main Phase, return any number of Link Monsters whose total Link Arrows equals 4 or lower from your Graveyard to your Extra Deck. Then, you can make one monster your opponent controls lose ATK equal to the total of those Link Arrows x 100.
  | fr_text     = Vous ne pouvez utiliser l'effet de cette Compétence qu'une seule fois par Duel.<br />1 : Lors de votre Main Phase, renvoyez des Monstres Lien dont le nombre total de Flèches Lien est égal à 4 ou moins, de votre Cimetière dans votre Extra Deck. Ensuite, vous pouvez faire perdre à 1 monstre contrôlé par votre adversaire une ATK égale au total de ces Flèches Lien x 100.
  | ja_text     = このスキルの①の効果はデュエル中に１度しか使用できない。①：自分メインフェイズに発動できる。リンクマーカーの合計が４以下になるようにリンクモンスターを任意の数だけ自分の墓地からＥＸデッキに戻す。その後、戻したモンスターのリンクマーカーの合計×１００だけ相手フィールドのモンスター１体の攻撃カをダウンできる。
