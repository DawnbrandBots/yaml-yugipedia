title: "Destiny Draw: Humanity's Trump Card"
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Pioche de la Destinée : Carte maîtresse de l'Humanité
  | ja_name  = 
  | text     = You can only use this Skill's first and second effects once per Duel.<br />1. Can be used before your normal draw. Play 1 "[[Number 6: Chronomaly Atlandis|Number 6]]", "[[Number 9: Dyson Sphere (Duel Links)|Number 9]]", "[[Number 15: Gimmick Puppet Giant Grinder (Duel Links)|Number 15]]", "[[Number 40: Gimmick Puppet of Strings (Duel Links)|Number 40]]", or "[[Number 88: Gimmick Puppet of Leo (Duel Links)|Number 88]]" monster, except "[[Number C]]" monsters, from your Extra Deck or Graveyard in face-down Defense Position. (Its battle position can be changed.) Then, add 1 "Number C" monster with the same number to your Extra Deck. One of the cards from your normal draw this turn will be a "[[Rank-Up-Magic Argent Chaos Force (Duel Links)|Rank-Up-Magic Argent Chaos Force]]" from your Deck.<br />2. Reveal 1 Level 4-8 monster or 1 Spell Card from your hand, then either place that card on the bottom of your Deck or send it to the Graveyard. Then, draw 2 cards.
  | fr_text  = Vous pouvez utiliser le premier et le deuxième effet de cette Compétence qu'une seule fois par Duel.<br />1. Peut être utilisée avant votre pioche normale. Jouez 1 monstre "Numéro 6", "Numéro 9", "Numéro 15", "Numéro 40" ou "Numéro 88", à l'exception des monstres "Numéro C", depuis votre Extra Deck ou Cimetière en Position de Défense face verso. (Sa position de combat peut être modifiée.) Puis, ajoutez 1 monstre "Numéro C" avec le même numéro à votre Extra Deck. L'une des cartes de votre pioche normale de ce tour sera une Carte "Force Chaos d'Argent Magie-Rang-Plus" de votre Deck.<br />2. Révélez 1 monstre de Niveau 4-8 ou 1 Carte Magie de votre main, puis placez cette carte au-dessous de votre Deck ou envoyez-la au Cimetière. Puis, piochez 2 cartes.
