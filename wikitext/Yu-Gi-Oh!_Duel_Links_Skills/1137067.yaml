title: Omnipotent Divine Force
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Force Divine Omnipotente
  | ja_name               = 万物を司る神の力
  | romaji_name           = Banbutsu o Tsukasadoru Kami no Chikara
  | text                  = You can only use this Skill's second effect once per Duel.<br />1: You can Normal Summon 1 "[[The Winged Dragon of Ra (Duel Links)|The Winged Dragon of Ra]]" during your Main Phase in addition to your regular Normal Summon/Set.<br />2: From turn 2 onward, shuffle up to 3 cards from your hand into the Deck, then play the same number of "[[Ra's Disciple (Duel Links)|Ra's Disciple]]" from outside of your Deck. Then, you can add 1 "The Winged Dragon of Ra" from your Deck to your hand. Monsters played by this effect cannot change controllers. When monsters played by this effect leave the field, they are placed on the bottom of the Deck.
  | fr_text             = Vous ne pouvez utiliser le deuxième effet de cette Compétence qu'une fois par Duel.<br />1 : Pendant votre Main Phase, vous pouvez Invoquer Normalement 1 "Le Dragon Ailé de Râ" en plus de votre Invocation Normale/Pose habituelle.<br />2 : À partir du tour 2, mélangez jusqu'à 3 cartes de votre main dans le Deck, puis jouez le même nombre de "Disciple de Râ" depuis l'extérieur de votre Deck. Puis, vous pouvez ajouter 1 "Le Dragon Ailé de Râ" de votre Deck à votre main. Les monstres joués grâce à cet effet ne peuvent pas changer de contrôleur. Lorsque des monstres joués grâce à cet effet quittent le Terrain, ils sont placés au-dessous du Deck.
  | ja_text               = このスキルの②の効果はデュエル中に１度しか使用できない。<br />①：自分は通常召喚に加えて１度だけ、自分メインフェイズに「ラーの翼神竜」１体を召喚できる。<br />②：２ターン目以降に、手札を３枚までデッキに戻して発動できる。戻した数だけデッキ外から「ラーの使徒」を出す。その後、デッキから「ラーの翼神竜」１体を手札に加える事ができる。この効果で出したモンスターのコントロールは変更できず、フィールドから離れた場合にデッキの一番下に戻る。
