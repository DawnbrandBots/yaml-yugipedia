title: Treason Phantom
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Fantôme de trahison
  | ja_name             = トリーズン・ファントム
  | romaji_name         = Torīzun Fantomu
  | text                = The following effects can be used once per Duel.<br />Reveal a total of 2 "[[The Phantom Knights]]" monster and/or "[[Phantom Knights]]" Spell/Trap Card from your hand, return one of them to your Deck, and send 1 "The Phantom Knights" monster from your Deck to your Graveyard. During this turn, you can treat "The Phantom Knights" monsters as Level 4 monsters when you Xyz Summon "[[Dark Rebellion Xyz Dragon (Duel Links)|Dark Rebellion Xyz Dragon]]".<br />Remove 2 Xyz Materials from 1 "Dark Rebellion Xyz Dragon" you control, and increase its ATK by 500 until the end of the turn. During your opponent's next turn after you activate this effect, you can activate your Xyz Monster's effect only one time.
  | fr_text             = Les effets suivants peuvent être utilisés une fois par Duel.
  * Révélez un total de 2 monstres "Les Chevaliers Fantômes" et/ou Cartes Magie/Piège "Chevaliers Fantômes" depuis votre main, renvoyez-en une dans votre Deck, et envoyez 1 monstres "Les Chevaliers Fantômes" de votre Deck à votre Cimetière. Pendant ce tour, vous pouvez traiter les monstres "Les Chevaliers Fantômes" comme des monstres de Niveau 4 lorsque vous Invoquez par Xyz "Dragon Xyz de la Rébellion des Ténèbres."
  * Retirez 2 Matériels Xyz d'1 "Dragon Xyz de la Rébellion des Ténèbres" que vous contrôlez, et augmentez son ATK de 500 jusqu'à la fin du tour. Durant le prochain tour de votre adversaire après avoir activé cet effet, vous pouvez activer l'effet de votre Monstre Xyz une seule fois.
  | ja_text             = 以下の効果をデュエル中に１度ずつ使用できる。<br />●手札から「幻影騎士団」モンスターまたは「ファントム」魔法・罠カードを合計２枚相手に見せて、その内の１枚をデッキ戻し、デッキから「幻影騎士団」モンスター１体を墓地へ送る。このターン、自分が「ダーク・リベリオン・エクシーズ・ドラゴン」をエクシーズ召喚する場合、「幻影騎士団」モンスターのレベルを４として扱う事ができる。<br />●自分フィールドの「ダーク・リベリオン・エクシーズ・ドラゴン」１体からエクシーズ素材を２つ取り除き、そのモンスターの攻撃力を、ターン終了時まで５００アップする。次の相手ターン、自分はエクシーズモンスターの効果を１度しか発動できない。
