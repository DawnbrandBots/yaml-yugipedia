title: Shadow-Weaving Power
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Pouvoir de distorsion de l'ombre
  | ja_name             = 影を紡ぐ力
  | romaji_name         = Kage o Tsumugu Chikara
  | text                = This Skill's second effect can only be used once per Duel if all the monsters in your Deck (excluding Extra Deck) are "[[Shaddoll]]" monsters or [[Spellcaster]] monsters.<br />1. At the beginning of the Duel, choose 2 "Shaddoll" Trap Cards from your Deck at random and send them to the Graveyard, and add 1 "[[El Shaddoll Winda]]" to your Extra Deck, and 3 "[[Shaddoll Fusion]]" and 1 "[[Shaddoll Schism]]" to your Deck.<br />2. During your Main Phase, shuffle 1 "Shaddoll" card from your Graveyard or among your banished cards into the Deck.
  | fr_text             = Le deuxième effet de cette Compétence peut être utilisé une fois par Duel si tous les monstres dans votre Deck (hors Extra Deck) sont des monstres "Marionnette de l'Ombre" ou des monstres de Type Magicien.<br />1 : Au début du Duel, choisissez 2 Cartes Piège "Marionnette de l'Ombre" dans votre Deck au hasard et envoyez-les Cimetière, puis ajoutez 1 "Winda Marionnette de l'Ombre El" à votre Extra Deck, et 3 "Fusion Marionnette de l'Ombre" et 1 "Schisme Marionnette de l'Ombre" à votre Deck.<br />2 : Pendant votre Main Phase, mélangez 1 carte "Marionnette de l'Ombre" depuis votre Cimetière ou vos cartes bannies dans votre Deck.
  | ja_text             = デュエル開始時、エクストラデッキに「エルシャドール・ミドラーシュ」１枚を追加する。さらに、デッキに「影依融合」３枚と「影依の偽典」１枚を追加する。このデュエル中、自分は「シャドール」モンスターしか特殊召喚できない。（エクストラデッキからの特殊召喚は除く）<br />また、デュエル中に１度だけ使用できる。自分の墓地・除外状態の「シャドール」モンスター１体をデッキ・エクストラデッキに戻す。
