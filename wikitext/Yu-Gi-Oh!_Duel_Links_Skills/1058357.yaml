title: Performage Wand Juggling
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Jonglerie Mageartiste
  | ja_name             = Ｅｍワンド・ジャグリング
  | romaji_name         = Entameiji Wando Jaguringu
  | translated_name     = Entermage Wand Juggling
  | text                = You can only use this Skill's second effect once per turn and twice per Duel.<br />1. You cannot Special Summon (excluding Special Summons from the Extra Deck) monsters except for "[[Performage]]" and Level 4 [[Spellcaster]] monsters.<br />2. You can activate one of the following effects.
  * Add 1 "[[Wonder Wand (Duel Links)|Wonder Wand]]", 1 "[[Bound Wand (Duel Links)|Bound Wand]]", or 1 "[[One-Shot Wand (Duel Links)|One-Shot Wand]]" at random from outside of your Deck to your hand, and then place 1 "Performage" monster from your hand to the bottom of the Deck.
  * Add 1 "Performage" monster from your Deck to your hand, and then place 1 "Wonder Wand", 1 "Bound Wand", or 1 "One-Shot Wand" from your hand to the bottom of the Deck.
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par tour et deux fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Spécialement (hors Invocations Spéciales depuis l'Extra Deck) de monstres, sauf des monstres "Mageartiste" et des monstres de Type Magicien de Niveau 4.<br />2 : Vous pouvez activer un des effets suivants.<br />● Ajoutez 1 "Baguette Magique", 1 "Sceptre du Bond", ou 1 "Baguette à Tir Unique" au hasard depuis l'extérieur de votre Deck à votre main, puis placez 1 monstre "Mageartiste" de votre main en dessous du Deck.<br />● Ajoutez 1 monstre "Mageartiste" de votre Deck à votre main, puis placez 1 "Baguette Magique", 1 "Sceptre du Bond", ou 1 "Baguette à Tir Unique" de votre main en dessous du Deck.
  | ja_text             = このスキルの②の効果は１ターンに１度、デュエル中に２度まで使用できる。<br />①：自分は「Ｅｍ」モンスターまたは魔法使い族・レベル４モンスターしか特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。②：以下の効果から１つを選んで発動できる。<br />●「ワンダー・ワンド」「バウンド・ワンド」「ワンショット・ワンド」の内１枚をランダムにデッキ外から手札に加え、手札の「Ｅｍ」モンスター１体をデッキの一番下に戻す。<br />●デッキから「Ｅｍ」モンスター１体を手札に加え、「ワンダー・ワンド」「バウンド・ワンド」「ワンショット・ワンド」の内１枚を手札からデッキの一番下に戻す。
