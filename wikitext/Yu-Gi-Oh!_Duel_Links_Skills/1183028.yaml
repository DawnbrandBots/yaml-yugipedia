title: Hyper Cannon Activation
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Activation d'Hyper Canon
  | ja_name  = 
  | text     = You can use this Skill's second and third effects once per Duel if your Extra Deck contains "[[XYZ-Hyper Dragon Cannon (Duel Links)|XYZ-Hyper Dragon Cannon]]".<br />1: At the beginning of the Duel, add 3 [[LIGHT]] [[Machine]] Fusion Monsters to your Extra Deck and banish 3 monsters from outside of your Deck. During this Duel, you can only Normal or Special Summon "[[Obelisk the Tormentor (Duel Links)|Obelisk the Tormentor]]", "[[X-Cross Cannon (Duel Links)|X-Cross Cannon]]", or LIGHT Machine Normal or Union monsters (excluding Special Summons from the Extra Deck).<br />2: During your main phase, play 1 LIGHT Machine Union monster from your hand, then add 1 Level 4 LIGHT Machine monster from your Deck to your hand.<br />3: If you control a Level 8 or 9 LIGHT Machine Fusion Monster, or if your opponent controls a monster, set 1 Spell/Trap Card that mentions "Union monster" in its text from your Deck to your field. (This card can be activated the same turn.)
  | fr_text  = Vous pouvez utiliser le deuxième et le troisième effet de cette Compétence une fois par Duel si votre Extra Deck contient "Canon Dragon Hyper-XYZ".<br />1 : Au début du Duel, ajoutez 3 Monstres Fusion Machine LUMIÈRE à votre Extra Deck et bannissez 3 monstres depuis l'extérieur de votre Deck. Lors de ce Duel, vous pouvez uniquement Invoquer Normalement ou Spécialement "Obelisk, le Tourmenteur", "Canon Croix-X", ou des Monstres Normaux ou Union Machine LUMIÈRE (hors Invocations Spéciales depuis l'Extra Deck).<br />2 : Durant votre Main Phase, jouez 1 Monstre Union Machine LUMIÈRE depuis votre main, puis ajoutez 1 monstre Machine LUMIÈRE de Niveau 4 de votre Deck à votre main.<br />3 : Si vous contrôlez un Monstre Fusion Machine LUMIÈRE de Niveau 8 ou 9, ou si seul votre adversaire contrôle un monstre, Posez 1 Carte Magie/Piège qui mentionne "Monstre Union" dans son texte depuis votre Deck sur votre Terrain. (Cette carte peut être activée durant le même tour.)
