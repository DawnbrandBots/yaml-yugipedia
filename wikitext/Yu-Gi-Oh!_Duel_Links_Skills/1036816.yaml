title: Constellar Union
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Union Constellée
  | ja_name             = セイクリッド・ユニオン
  | romaji_name         = Seikuriddo Yunion
  | translated_name     = Sacred Union
  | text                = Reveal 1 "[[Constellar]]" monster in your hand to your opponent and send 2 "Constellar" monsters from your Deck to the Graveyard. If you Xyz Summon a "Constellar" monster during this Duel, you can treat it as a Level 3-6 "Constellar" monster and if you Normal Summon/Set a "Constellar" monster, the required Tribute is not needed. You can only Special Summon "Constellar" monsters while you are using this Skill (excluding Special Summons from your Extra Deck).<br />This Skill can only be used once in a Duel.
  | description         = Reveal 1 "Constellar" monster in your hand to your opponent and send 2 "Constellar" monsters from your Deck to the Graveyard. If you Xyz Summon a "Constellar" monster during this Duel, you can treat "Constellar" monsters you control as Level 3-6 monsters and if you Normal Summon/Set a "Constellar" monster, the required Tribute is not needed. You can only Special Summon "Constellar" monsters after you use this Skill (excluding Special Summons from your Extra Deck).<br />This Skill can only be used once in a Duel.
  | fr_text             = Révélez 1 monstre "Constellée" de votre main à votre adversaire et envoyez 2 monstres "Constellée" depuis votre Deck au Cimetière. Si vous Invoquer par Xyz un monstre "Constellée" pendant ce Duel, vous pouvez le traiter comme un monstre "Constellée" de Niveau 3-6 et si vous Invoquez Normalement/Posez un monstre "Constellée", le Sacrifice requis n'est pas nécessaire. Vous ne pouvez Invoquer Spécialement que des monstres "Constellée" pendant que vous utiliser cette Compétence (à l'exception des Invocations Spéciales de votre Extra Deck).<br />Cette Compétence ne peut être utilisée qu'une seule fois par Duel.
  | ja_text             = 手札の「セイクリッド」モンスター１体を相手に見せてデッキから「セイクリッド」モンスター２体を墓地へ送る。このデュエル中、自分が「セイクリッド」モンスターをエクシーズ召喚する場合、「セイクリッド」モンスターのレベルを３～６として扱う事ができ、「セイクリッド」モンスターを通常召喚する場合に必要なリリースが無くなる。このスキルを使用するデュエル中、自分は「セイクリッド」モンスターしか特殊召喚できない。（エクストラデッキからの特殊召喚は除く）<br />このスキルはデュエル中に１度だけ使用できる。
