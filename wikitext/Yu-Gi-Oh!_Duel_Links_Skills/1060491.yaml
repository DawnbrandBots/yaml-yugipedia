  | romaji_name = Rinku Dākureizu
  | text        = This Skill can be used if your Extra Deck contains a [[DARK]] [[Link Monster]].<br />1: Gain 1500 Life Points at the start of the Duel.<br />2: Can be used once per turn during your Main Phase. Choose 1 face-up monster you control, and it gains 300 ATK until the end of the turn. It gains an additional 500 ATK until the end of the turn if there is a DARK Link Monster or a DARK monster and a Link Monster on your field and/or in your Graveyard.
  | fr_text     = Cette Compétence peut être utilisée si votre Extra Deck contient un Monstre Lien TÉNÈBRES.<br />1 : Gagnez 1 500 Life Points au début du Duel.<br />2 : Peut être utilisé une fois par tour pendant votre Main Phase. Choisissez 1 monstre face recto que vous contrôlez, et il gagne 300 ATK jusqu'à la fin du tour. Il gagne 500 ATK supplémentaire jusqu'à la fin du tour s'il y a un Monstre Lien TÉNÈBRES OU un monstre TÉNÈBRES et un Monstre Lien sur votre Terrain et/ou dans votre Cimetière.
  | ja_text     = このスキルはＥＸデッキに闇属性リンクモンスターを入れている場合に使用できる。<br />①：デュエル開始時に発動する。自分は１５００ＬＰ回復する。<br />②：１ターンに１度、自分メインフェイズに発動できる。自分フィールドのリンクモンスター１体を選び、その攻撃力をターン終了時まで３００アップする。自分のフィールドか墓地に闇属性モンスターが存在する場合、さらに選んだモンスターの攻撃力はターン終了時まで３００アップする。
