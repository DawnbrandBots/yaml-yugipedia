title: Performage Showtime
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Spectacle Mageartiste
  | ja_name             = Ｅｍショータイム
  | romaji_name         = Entameiji Shōtaimu
  | translated_name     = Entermage Showtime
  | text                = You can only use this Skill's second, third, and fourth effects once per turn.<br />1. You cannot Special Summon (excluding Special Summons from the Extra Deck) monsters except for "[[Performage]]" and Level 4 [[Spellcaster]] monsters.<br />2. Send 1 "Performage" monster from your hand to the [[Graveyard]], and then add 1 "Performage" monster from your Deck to your hand.<br />3. Shuffle 1 monster on your field into the Deck, and then play 1 "Performage" monster from your Deck to your field in face-down Defense Position. (Its battle position can be changed.)<br />4. If you control a "Performage" [[Xyz Monster]], the ATK of 1 monster on your field becomes equal to the ATK of the monster your opponent controls with the highest ATK +1000, until the end of this turn.
  | fr_text             = Vous pouvez utiliser le deuxième, troisième et quatrième effet de cette Compétence une fois par tour.<br />1 : Vous ne pouvez pas Invoquer Spécialement (hors Invocations Spéciales depuis l'Extra Deck) de monstres, sauf des monstres "Mageartiste" et des monstres de Type Magicien de Niveau 4.<br />2 : Envoyez 1 monstre "Mageartiste" de votre main dans le Cimetière, puis ajoutez 1 monstre "Mageartiste" de votre Deck à votre main.<br />3 : Mélangez 1 monstre sur votre Terrain dans le Deck, puis jouez 1 monstre "Mageartiste" de votre Deck sur votre Terrain en Position de Défense face recto. (Sa position de combat peut être modifiée.)<br />4 : Si vous contrôlez un Monstre Xyz "Mageartiste", l'ATK de 1 monstre sur votre Terrain devient celle du monstre avec l'ATK la plus élevée contrôlé par votre adversaire +1000, jusqu'à la fin de ce tour.
  | ja_text             = このスキルの②③④の効果はそれぞれ１ターンに１度しか発動できない。<br />①：自分は「Ｅｍ」モンスターまたは魔法使い族・レベル４モンスターしか特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。<br />②：手札の「Ｅｍ」モンスター１体を墓地へ送って発動できる。デッキから「Ｅｍ」モンスター１体を手札に加える。<br />③：自分フィールドのモンスター１体をデッキに戻して発動できる。デッキから「Ｅｍ」モンスター１体を裏側守備表示で出す（表示形式変更可能）。<br />④：自分フィールドに「Ｅｍ」エクシーズモンスターが存在する場合に発動できる。自分フィールドのモンスター１体の攻撃力はターン終了時まで、相手フィールドの一番高い攻撃力＋１０００になる。
