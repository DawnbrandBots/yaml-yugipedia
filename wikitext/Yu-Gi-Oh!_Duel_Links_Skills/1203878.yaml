  | text        = You can only use this Skill's second and third effects once per Duel.<br/>1: You cannot Normal or Special Summon (excluding Special Summons from the Extra Deck) any monsters, except [[DARK]] [[Dragon]] monsters.<br/>2: Reveal 1 "[[Rokket Loader (Duel Links)|Rokket Loader]]" or "[[Boot Sector Launch (Duel Links)|Boot Sector Launch]]" from your hand and return 1 card from your hand to the Deck. Then, add up to 2 "[[Rokket]]" monsters, "[[Absorouter Dragon (Duel Links)|Absorouter Dragon]]", and/or "[[Quick Launch (Duel Links)|Quick Launch]]" from your Deck to your hand.<br/>3: If you control "[[Borrelend Dragon (Duel Links)|Borrelend Dragon]]", or if only your opponent controls a monster, play 1 "[[Borrel]]" monster with 3000 ATK from your Extra Deck or GY, or add 1 "[[Red Reboot (Duel Links)|Red Reboot]]" from outside your Deck to your hand.
