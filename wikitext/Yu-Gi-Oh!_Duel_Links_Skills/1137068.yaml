  | translated_name     = Destiny Draw of God's Chosen One
  | text                = You can only use this Skill's first and second effects once per Duel.<br />1: Before your normal draw, Set 1 "[[Metal Reflect Slime (Duel Links)|Metal Reflect Slime]]" from outside of your Deck. (This card can be activated the same turn.) One of the cards from your normal draw this turn will be 1 "[[Ancient Chant (Duel Links)|Ancient Chant]]" from your Deck.<br />2: Reveal 1 [[Divine-Beast]] monster in your hand, then either place that monster on the bottom of your Deck or send it to the Graveyard. Then, draw 1 card.
  | fr_text             = Vous ne pouvez utiliser le premier et le deuxième effet de cette Compétence qu'une seule fois par Duel.<br />1 : Avant votre pioche normale, Posez 1 "Slime Métallique" depuis l'extérieur de votre Deck. (Cette carte peut être activée durant le même tour.) L'une des cartes de votre pioche normale de ce tour sera 1 "Chant Ancien" depuis votre Deck.<br />2 : Révélez 1 monstre Bête Divine dans votre main, puis placez ce monstre au-dessous de votre Deck ou envoyez-le au Cimetière. Puis, piochez 1 carte.
  | ja_text             = このスキルの①②の効果はそれぞれデュエル中に１度しか使用できない。<br />①：自分の通常のドロー前に発動できる。デッキ外から「メタル・リフレクト・スライム」１枚を自分フィールドにセットし（このターンから発動可能）、このターンの通常のドロー１枚はデッキの「古の呪文」になる。<br />②：手札の幻神獣族モンスター１体を相手に見せて発動できる。そのカードをデッキの一番下に戻すか墓地へ送る。その後、自分は１枚ドローする。
