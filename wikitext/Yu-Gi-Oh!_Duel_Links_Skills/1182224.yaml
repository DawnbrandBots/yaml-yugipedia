title: Barian Battlemorph! The Power That Guides the World
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Tranformation de combat Barian ! Le pouvoir qui gouverne le monde
  | ja_name  = 
  | text     = You can use this Skill's first effect once per Duel if your [[Extra Deck]] contains "[[CXyz Barian Hope (Duel Links)|CXyz Barian Hope]]".<br/>1: Send 1 "[[Number]]" [[Xyz Monster]] from your Extra Deck to your [[Graveyard]]. [[Barian Battlemorph]]! Regain your true form! Play 1 "[[Number 101: Silent Honor ARK (Duel Links)|Number 101: Silent Honor ARK]]" from your Extra Deck in face-down Defense Position. (Its battle position can be changed.) Then, Set 1 "[[Barian Untopia (Duel Links)|Barian Untopia]]" from outside your Deck to your [[Field Zone]], and add 1 "[[Rank-Up-Magic Quick Chaos (Duel Links)|Rank-Up-Magic Quick Chaos]]" from outside your Deck to your hand. If your opponent controls no monsters, you cannot Special Summon a monster this turn.
  | fr_text  = Vous pouvez utiliser le premier effet de cette Compétence une fois par Duel si votre Extra Deck contient "Espoir Barian CXyz".<br/>1. Envoyez 1 Monstre Xyz "Numéro" depuis votre Extra Deck à votre Cimetière. Transformation de combat Barian ! Retrouve ta forme véritable ! Jouez 1 "Numéro 101 : Honneur Silencieux ARCHE" depuis votre Extra Deck en Position de Défense face recto. (Sa position de combat peut être modifiée.) Puis, Posez 1 "Antopie Barian" depuis l'extérieur de votre Deck dans votre Zone Terrain et ajoutez 1 "Chaos Rapide Magie-Rang-Plus" depuis l'extérieur de votre Deck à votre main. Si votre adversaire ne contrôle aucun monstre, vous ne pouvez pas Invoquer Spécialement de monstres ce tour.
