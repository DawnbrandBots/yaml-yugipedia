title: The Unsealed Forbidden Door
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Porte Interdite Révélée
  | ja_name  = 
  | text     = You can only use this Skill's second and third effects once per Duel.<br />1: At the beginning of your first turn, Set 1 "[[The Seal of Orichalcos (Duel Links)|The Seal of Orichalcos]]" from outside of your Deck to your field. During this Duel, any effect damage your cards would inflict to your opponent becomes 0, you cannot Special Summon monsters from the Extra Deck, and you can only Normal or Special Summon Machine monsters.<br />2: If you have activated "The Seal of Orichalcos" this Duel, reveal 1 Level 5 or higher [[Machine]] monster in your hand. Choose 3 Level 7 or higher Machine monsters with different names from your Deck. Add 1 of them to your hand, and send the rest to the GY.<br />3: Send up to 2 monsters from your field to the GY, and add that many number of Level 7 or higher Machine monsters with different names from your Deck to your hand.
  | fr_text  = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Au début de votre premier tour, Posez 1 "Le Sceau d'Orichalque" depuis l'extérieur de votre Deck sur votre Terrain. Lors de ce Duel, tous les dommages d'effets que vos cartes infligeraient normalement à votre adversaire tombent à 0, vous ne pouvez pas Invoquer Spécialement des monstres depuis l'Extra Deck et vous pouvez uniquement Invoquer Normalement ou Spécialement des monstres Machine.<br />2 : Si vous avez activé "Le Sceau d'Orichalque" lors de ce Duel, révélez 1 monstre Machine de min. Niveau 5 dans votre main. Choisissez 3 monstres Machine de min. Niveau 7 avec des noms différents depuis votre Deck. Ajoutez 1 d'entre eux à votre main et renvoyez le reste dans le Cimetière.<br />3 : Envoyez jusqu'à 2 monstres de votre Terrain au Cimetière, puis ajoutez le même nombre de monstres Machine de min. Niveau 7 avec des noms différents de votre Deck à votre main.
