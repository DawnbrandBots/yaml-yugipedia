title: The Power Leads to Destiny
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Le pouvoir mène à la destinée
  | ja_name               = 力の示す道
  | romaji_name           = Chikara no Shimesu Michi
  | translated_name       = The Path that Leads to Power
  | text                  = [[Reveal]] 1 card in your [[hand]] to the opponent. Depending on the card you have revealed, you can use each of the following effects once per Duel.<br />● [[Normal Spell Card]]: Send 3 "[[Evil HERO Malicious Edge (Duel Links)|Evil HERO Malicious Edge]]" from outside of your Deck to the [[Graveyard]]. During this Duel, you can [[Normal Summon]]/[[Normal Set|Set]] "Evil HERO Malicious Edge" without [[Tribute|Tributing]].<br />● "[[Super Polymerization (Duel Links)|Super Polymerization]]": Set 1 "[[Supreme King's Castle (Duel Links)|Supreme King's Castle]]" to your field from outside of your Deck and add 1 "[[Evil HERO Malicious Bane (Duel Links)|Evil HERO Malicious Bane]]" to your [[Extra Deck]].<br />This Skill will only activate if you begin the Duel with a Deck that contains at least 1 "Super Polymerization," at least 9 [[Monster Card|monsters]], and no monsters other than "[[Evil HERO]]" or "[[Elemental HERO]]" monsters, as well as an Extra Deck that contains at least 2 [[Fusion Monster]]s and no Fusion Monsters other than "Evil HERO" monsters.
  | fr_text               = Révélez 1 carte dans votre main à l'adversaire. Selon la carte que vous avez révélée, vous pouvez utiliser chacun des effets suivants une fois par Duel.
  * Carte Magie normale : envoyez 3 "Lame Malveillante, HÉROS du Mal" de l'extérieur de votre Deck au Cimetière. Lors de ce Duel, vous pouvez Invoquer Normalement/Poser "Lame Malveillante, HÉROS du Mal" sans Sacrifice.
  * "Super Polymérisation" : Posez 1 "Château du Roi Suprême" sur votre Terrain depuis l'extérieur de votre Deck et ajoutez 1 "Fléau Malveillant, HÉROS du Mal" à votre Extra Deck.
  Cette Compétence ne s'activera que si vous commencez le Duel avec un Deck qui contient au moins 1 "Super Polymérisation", au moins 9 monstres, et uniquement des monstres "HÉROS du Mal" ou "HÉROS élémentaire", ainsi qu'un Extra Deck contenant au moins 2 Monstres Fusion, et uniquement des Monstres Fusion "HÉROS maléfique".
  | ja_text               = 手札からカード１枚を当てに見せ、見せたカードによって以下の効果をデュエル中１度ずつ使用できる。<br />●通常魔法カード：デッキ外から「Ｅ－ＨＥＲＯ マリシャス・エッジ」３体を墓地へ送る。このデュエル中、「Ｅ－ＨＥＲＯ マリシャス・エッジ」を通常召喚する場合に必要なリリースが無くなる。<br />●「超融合」：デッキ外から、「覇王城」１枚を自分フィールド上にセットし、自分のエクストラデッキに「Ｅ－ＨＥＲＯ マリシャス・ベイン」１枚を追加する。<br />このスキルはデッキに「超融合」が１枚以上とモンスターが９枚以上存在し、その全てが「Ｅ－ＨＥＲＯ」、「Ｅ・ＨＥＲＯ」モンスターのデッキと融合モンスターが２枚以上存在し、その全てが「Ｅ－ＨＥＲＯ」モンスターのエクストラデッキを設定してデュエルを開始した場合に使用できる。
