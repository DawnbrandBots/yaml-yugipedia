title: Hard Rock Overture
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Ouverture Hard Rock
  | text     = '''[REQUIREMENT]''' Can be activated by sending 1 Level 7 or 8 monster from your hand to the Graveyard if all of the monsters in your Deck and Extra Deck are [[LIGHT]] Attribute [[Fiend]] Type monsters.<br />'''[EFFECT]''' Place up to 2 Level 7 or 8 monsters from your hand and/or Graveyard in face-up Defense Position. If it is turn 2 onwards, you can then also add 1 Level 7 or 8 monster from your Graveyard to your hand. (Once per Duel.) While the monsters placed on the field using this effect are face-up, their battle position<ins>s</ins> can only be changed by card effects. This turn, monsters with an original Level of 7 or higher can attack directly only once.
  | fr_text  = '''[CONDITION]''' Cette Compétence peut être activée en envoyant 1 monstre de Niveau 7 ou 8 de votre main au Cimetière, si tous les Monstres dans votre Deck et votre Extra Deck sont des Monstres de Type Démon d'Attribut LUMIÈRE.<br />'''[EFFET]''' Placez jusqu'à 2 monstres de Niveau 7 ou 8 depuis votre main et/ou Cimetière en Position de Défense face recto. À partir du 2e tour, vous pouvez aussi ajouter 1 monstre de Niveau 7 ou 8 depuis votre Cimetière à votre main. (Une fois par Duel.) Tant que les monstres placés sur le Terrain utilisant cet effet sont face recto, leur position de combat ne peut être changée que par un effet de carte. Ce tour, les monstres dont le Niveau d'origine est supérieur ou égal à 7 ne peuvent attaquer directement qu'une fois.
