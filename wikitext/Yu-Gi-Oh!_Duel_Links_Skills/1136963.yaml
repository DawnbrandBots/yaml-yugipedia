  | translated_name       = Sun God's Flame
  | text                  = You can only use this Skill's second effect once per turn, and the third effect once per Duel.<br />1: During your turn, you cannot Normal or Special Summon (excluding Special Summons from the Extra Deck) any monsters, except [[Divine-Beast]] and [[Aqua]] monsters.<br />2: Reveal 1 "[[The Winged Dragon of Ra (Duel Links)|The Winged Dragon of Ra]]" in your hand, then play 1 "[[Guardian Slime (Duel Links)|Guardian Slime]]" from your hand, Deck, or Graveyard, but negate its effects.<br />3: If you control a Divine-Beast monster or your opponent controls a monster, set your LP to 4100 and add 1 "[[Monster Reborn (Duel Links)|Monster Reborn]]" from outside of your Deck to your hand. If you control no cards, you can also add 1 "The Winged Dragon of Ra" or 1 card that mentions it from your Deck to your hand.
  | fr_text               = Vous pouvez uniquement utiliser le deuxième effet de cette Compétence une fois par tour, et le troisième effet une fois par Duel.<br />1 : Lors de votre tour, vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres (hors Invocations Spéciales depuis l'Extra Deck), excepté des monstres Bête Divine et Aqua.<br />2 : Révélez 1 Carte "Le Dragon Ailé de Râ" dans et jouez 1 Carte "Gardien Slime" votre main, Deck ou Cimetière mais annulez ses effets.<br />3 : Si vous contrôlez un monstre Bête Divine ou si votre adversaire contrôle un monstre, passez vos LP à 4 100 et ajoutez 1 "Monster Reborn" à votre main depuis l'extérieur de votre Deck. Si vous ne contrôlez aucune carte, vous pouvez aussi ajouter 1 "Le Dragon Ailé de Râ" ou 1 carte qui en fait mention depuis votre Deck dans votre main.
  |ja_text                = このスキルの②の効果は１ターンに１度、③の効果はデュエル中に１度しか使用できない。<br />①：このデュエル中、自分は幻神獣族・水族モンスターしか召喚・特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。<br />②：手札の「ラーの翼神竜」１体を相手に見せて発動できる。手札・デッキ・墓地から「ガーディアン・スライム」１体を効果を無効にして出す。<br />③：自分フィールドに幻神獣族モンスターが存在する場合、または相手フィールドにのみモンスターが存在する場合に発動できる。自分のＬＰを４１００にし、デッキ外から「死者蘇生」１枚を手札に加える。自分フィールドにカードが存在しない場合、さらに「ラーの翼神竜」またはそのカード名が記されたカード１枚をデッキから手札に加える事もできる。
