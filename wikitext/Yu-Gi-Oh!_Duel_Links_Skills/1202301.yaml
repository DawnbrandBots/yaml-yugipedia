title: Showdown in the Sky
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Affrontement Céleste
  | ja_name  = 
  | text     = You can only use this Skill's second and third effects once per turn.<br/>1: At the beginning of your first turn, set 1 "[[The Seal of Orichalcos (Duel Links)|The Seal of Orichalcos]]" from outside your Deck to your [[Field Zone]]. During this Duel, any effect damage your cards would inflict on your opponent becomes 0, and you cannot Normal Summon or Special Summon any monsters, except [[Warrior]] or [[Machine]] monsters.<br/>2: Shuffle 1 card from your hand into your Deck, then play up to 2 "[[Cyber Soldier of Darkworld (Duel Links)|Cyber Soldier of Darkworld]]", "[[Science Soldier (Duel Links)|Science Soldier]]", and/or "[[Cipher Soldier (Duel Links)|Cipher Soldier]]" from outside your Deck in face-down Defense Position. (Its battle position can be changed.)<br/>3: Send 3 monsters you control to the Graveyard, then play 1 Level 5 or higher [[WIND]] Machine monster that can be Normal Summoned from your Deck or Graveyard in face-down Defense Position. (Its battle position can be changed.)
  | fr_text  = Vous pouvez utiliser les deuxième et troisième effets de cette Compétence une fois par tour.<br />1 : Au début de votre premier tour, Posez 1 "Le Sceau d'Orichalque" depuis l'extérieur de votre Deck sur votre Terrain. Lors de ce Duel, tous les dommages d'effets que vos cartes infligent à votre adversaire tombent à 0, et vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des monstres Guerrier ou Machine.<br />2 : Mélangez 1 carte de votre main dans votre Deck, puis jouez jusqu'à 2 "Cybersoldat des Ténèbres", "Guerrier de la Science" et/ou "Soldat Cipher" depuis l'extérieur de votre Deck en Position de Défense face verso (sa position de combat peut être modifiée).<br />3 : Envoyez 3 monstres que vous contrôlez au Cimetière, puis jouez 1 monstre Machine VENT de min. Niveau 5 qui peut être Invoqué Normalement depuis votre Deck ou Cimetière en Position de Défense face verso (sa position de combat peut être modifiée).
