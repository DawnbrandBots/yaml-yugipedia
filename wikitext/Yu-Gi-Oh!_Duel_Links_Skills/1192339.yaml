  {{Duel Links Skill
  | fr_name  = Pioche de la Destinée : Dragons divins
  | text     = '''[REQUIREMENT]''' Can be activated from turn 2 onward before your normal draw. (Twice per Duel if going first, thrice per Duel if going second.)<br />'''[EFFECT]''' Place 1 "[[Eternity Ether Dragon (Duel Links)|Eternity Ether Dragon]]" from your Deck on top of your Deck. During the Draw Phase this turn, if you would draw until you have 5 cards for your normal draw, instead draw until you have 6 cards. This turn, if you Tribute Summon "Eternity Ether Dragon" in Attack Position, each monster on your field can be treated as 2 Tributes.
  | fr_text  = '''[CONDITION]''' Peut être activée à partir du 2e tour avant votre pioche normale. (Deux fois par Duel si vous commencez, trois fois par Duel si vous jouez en deuxième.)<br />'''[EFFET]''' Placez 1 "Dragon d'Éther Éternel" de votre Deck au-dessus de votre Deck. Dans la Draw Phase de ce tour, si vous deviez piocher jusqu'à avoir 5 cartes pour votre pioche normale, à la place piochez jusqu'à avoir 6 cartes. Ce tour, si vous Invoquez par Sacrifice "Dragon d'Éther Éternel" en Position d'Attaque, chaque monstre sur votre Terrain peut être traité comme 2 Sacrifices.
