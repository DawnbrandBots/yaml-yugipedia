title: Borreload Link
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Chargeborrelle Lien
  | ja_name             = ヴァレルロード・リンク
  | romaji_name         = Varerurōdo Rinku
  | translated_name     = Varrelload Link
  | text                = You can only use this Skill's second and third effects once per Duel.<br />1: During this Duel, you can Normal Summon/Set monsters whose sum of ATK and DEF equals 4000 without Tributing, but you cannot Normal or [[Special Summon]] monsters, except [[DARK]] [[Cyberse]] or DARK [[Dragon]] monsters.<br />2: Reveal 1 Level 7 or higher Dragon monster in your hand, and then send 2 Level 7 or higher Dragon monsters from your hand and/or Deck to the [[Graveyard]], and add 1 monster whose sum of ATK and DEF equals 4000 from your Deck to your hand. This turn, you cannot Special Summon monsters from the [[Extra Deck]], except [[Link Monster|Link Monsters]].<br />3: If a monster is on your opponent's field or in their Graveyard, play 1 Link-2 "[[Borrel]]" monster from your Extra Deck to your field.
  | fr_text             = Vous pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Lors de ce Duel, vous pouvez Invoquer Normalement/Poser sans Sacrifice des monstres dont la somme d'ATK et de DEF est égale à 4 000, mais vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des monstres de Type Cyberse TÉNÈBRES ou des monstres de Type Dragon TÉNÈBRES.<br />2 : Révélez 1 monstre de Type Dragon de Niveau 7 ou plus dans votre main, puis envoyez 2 monstres de Type Dragon de Niveau 7 ou plus de votre main et/ou votre Deck dans le Cimetière, et ajoutez 1 monstre dont la somme d'ATK et de DEF est égale à 4 000 de votre Deck à votre main. Pendant ce tour, vous ne pouvez pas Invoquer Spécialement de monstres de votre Extra Deck, excepté des Monstres Lien.<br />3 : S'il y a un monstre sur le Terrain ou dans le Cimetière de votre adversaire, jouez 1 Monstre Lien 2 "Borrelle" de votre Extra Deck sur votre Terrain.
  | ja_text             = このスキルの②③の効果はそれぞれデュエル中に１度しか使用できない。<br />①：自分はサイバース族・ドラゴン族の闇属性モンスターしか召喚・特殊召喚できず、攻撃力・守備力の合計が４０００のモンスターを通常召喚する場合に必要なリリースが無くなる。<br />②：手札からレベル７以上のドラゴン族モンスター１体を相手に見せて発動できる。手札・デッキからレベル７以上のドラゴン族モンスター２体を墓地へ送り、デッキから攻撃力・守備力の合計が４０００のモンスター１体を手札に加える。このターン、自分はリンクモンスターしかＥＸデッキから特殊召喚できない。<br />③：相手のフィールドか墓地にモンスターが存在する場合に発動できる。ＥＸデッキからリンク２の「ヴァレル」モンスター１体を出す。
