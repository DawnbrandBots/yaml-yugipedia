title: 'Spell Swap: Fire Formation - Tenki'
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Échange de Magie : Formation Feu - Tenki
  | ja_name             = 魔法交換：炎舞－「天璣」
  | romaji_name         = Mahō Kōkan: Enbu - "Tenki"
  | translated_name     = Magic Swap: Flame Dance - "Tenki"
  | text                = Return 1 "[[Fire Formation]]" Continuous Spell Card from your hand to the Deck, and add 1 "[[Fire Formation - Tenki (Duel Links)|Fire Formation - Tenki]]" from your Deck to your hand. You cannot Normal or Special Summon any monsters except [[Beast-Warrior]]-Type monsters during the Duel you activate this Skill (excluding Special Summons from the Extra Deck).<br />This Skill can only be used once per Duel.
  | fr_text             = Renvoyez 1 Carte Magie Continue "Formation Feu" de votre main à votre Deck, et ajoutez 1 "Formation Feu - Tenki" de votre Deck à votre main. Vous ne pouvez pas Invoquer Spécialement ou Normalement de monstres, à l'exception des monstres de Type Bête-Guerrier, pendant le Duel après avoir activé cette Compétence (hors Invocations Spéciales depuis l'Extra Deck).<br />Cette Compétence ne peut être utilisée qu'une fois par Duel.
  | ja_text             = 手札の「炎舞」永続魔法カード１枚をデッキに戻し、デッキから「炎舞－「天璣」」１枚を手札に加える。このスキルを使用するデュエル中、自分は戦士族モンスターしか召喚・特殊召喚できない。（エクストラデッキからの特殊召喚は除く）<br />このスキルはデュエル中に１度だけ使用できる。
