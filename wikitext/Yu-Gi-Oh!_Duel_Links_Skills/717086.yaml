title: The Phantom Knights Order
wikitext: |-
  {{Duel Links Skill
  | fr_name             = L'ordre des Chevaliers Fantômes
  | ja_name             = 幻影騎士団階位
  | text                = Can be used on turn 2 onward. Select up to 2 "[[The Phantom Knights]]" monsters on your field that have a Level. When Xyz Summoning a monster using these "The Phantom Knights" monsters as Xyz Materials during this turn, you can use them as Level 2-4 monsters.<br/>This Skill can only be used once per turn and twice per Duel.
  | fr_text             = Utilisable à partir du 2e tour. Sélectionnez jusqu'à 2 monstres "Les Chevaliers Fantômes" sur votre Terrain ayant un Niveau. Lorsque vous Invoquez un monstre par Xyz en utilisant ces monstres "Les Chevaliers Fantômes" comme Matériels Xyz pendant ce tour, vous pouvez les utiliser comme des monstres de Niveau 2-4.<br/>Cette Compétence ne peut être utilisée qu'une fois par tour et deux fois par Duel.
  | ja_text             = 2ターン目以降に使用できる。自分フィールド上のレベルを持つ「幻影騎士団」モンスターを2体まで選ぶ。このターン、その「幻影騎士団」モンスターをエクシーズ素材としてエクシーズ召喚する場合、そのレベルを2~4として扱うことができる。<br>
  このスキルは1ターンに1度、デュエル中2度まで使用できる。
