title: A Burning Roar
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Hurlement brûlant
  | ja_name         = バーニング・ロアー
  | text                = Add 1 "[[Salamangreat Heatleo (Duel Links)|Salamangreat Heatleo]]" and 1 "[[Salamangreat Sunlight Wolf (Duel Links)|Salamangreat Sunlight Wolf]]" to your Extra Deck at the beginning of the Duel.<br/>The following effect can be used once per turn. Until the end of this turn, all monsters on your field gain 100 ATK for each monster on your field.<br/>This Skill can only be used/applied if your Deck/Extra Deck contains 10 or more "Salamangreat" monsters including at least 1 "Salamangreat Heatleo".
  | fr_text             = Ajoutez 1 "Salamangrande Chaleurléo" et 1 "Salamangrande Loup du Soleil" à votre Extra Deck.<br/>L'effet suivant peut être utilisé une fois par tour. Jusqu'à la fin de ce tour, tous les monstres sur votre Terrain gagnent 100 ATK pour chaque monstre sur votre Terrain.<br/>Cette Compétence ne peut être utilisée/appliquée que si votre Deck/Extra Deck contient au moins 10 monstres "Salamangrande", dont au moins 1 "Salamangrande Chaleurléo".
  | ja_text             = デュエル開始時に、自分のエクストラデッキに「転生炎獣ヒートライオ」と「転生炎獣サンライトウルフ」を1枚ずつ追加する。<br>
  また、1ターンに1度だけ使用できる。自分フィールドのモンスター全ての攻撃力はターン終了時まで自分フィールドのモンスターの数x100アップする。<br>
  このスキルはデッキ（エクストラデッキを含む）に「転生炎獣ヒートライオ」を含む「サラマングレイト」カードが10枚以上存在するデッキを設定してデュエルを開始した場合に、使用と適用ができる。
