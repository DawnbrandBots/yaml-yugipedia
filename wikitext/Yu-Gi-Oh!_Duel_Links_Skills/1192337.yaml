  {{Duel Links Skill
  | fr_name  = Retour des Ténèbres
  | text     = '''[REQUIREMENT]''' Can be activated from turn 2 onward by revealing 1 "[[Dragon Knight of Darkness (Duel Links)|Dragon Knight of Darkness]]", "[[Evil Dragon of Darkness (Duel Links)|Evil Dragon of Darkness]]", or "[[Shadowbringer Dragon (Duel Links)|Shadowbringer Dragon]]" from your hand if all of the Level 7 or higher monsters in your constructed Deck are [[LIGHT]] or [[DARK]] Attribute [[Dragon]] Type with 2500 or 2000 ATK.<br />'''[EFFECT]''' Reveal 1 DARK Attribute [[High Dragon]] Type monster from your Extra Deck. Then, add 1 monster with a card name listed on it as material from your Deck or Graveyard to your hand. Then, you can send 1 card from your hand to the Graveyard. If you do, add 1 "[[Fusion (Duel Links)|Fusion]]" from your Deck or Graveyard to your hand.
  | fr_text  = '''[CONDITION]''' Cette Compétence peut être activée à partir du 2e tour en révélant 1 "Chevalier Dragon des Ténèbres", "Dragon Maléfique des Ténèbres", ou "Dragon Porteur d'Ombre" de votre main, si tous les monstres de min. Niveau 7 dans votre Deck construit sont de Type Dragon possédant l'Attribut LUMIÈRE ou TÉNÈBRES avec 2500 ou 2000 ATK.<br />'''[EFFET]''' Révélez 1 monstre de Type Grand Dragon possédant l'Attribut TÉNÈBRES depuis votre Extra Deck. Puis, ajoutez 1 monstre avec un nom de carte listé comme Matériel de votre Deck ou Cimetière à votre main. Vous pouvez ensuite envoyer 1 carte depuis votre main au Cimetière. Puis ajoutez 1 "Fusion" de votre Deck ou Cimetière à votre main.
