title: Barian Battlemorph! The Barians' White Shield
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Transformation de combat Barian ! Le Bouclier Blanc des Barians
  | ja_name             = バリアルフォーゼ －バリアンの白き盾－
  | romaji_name         = Bariarufōze -Barian no Shiroki Tate-
  | translated_name     = Barialphosis -The Barians' White Shield-
  | text                = You can only use this Skill's second effect once per turn, and the third effect once per Duel.<br />1: You can only Normal or Special Summon "[[Star Seraph]]" monsters (excluding Special Summons from the Extra Deck). Monsters on your field that include "Number 102" in the original card name can attack twice in each Battle Phase.<br />2: During your Main Phase, play "Star Seraph" monsters, 1 each from your Deck and hand to your field in face-down Defense Position. (Its battle position can be changed.)<br />3: If there is a card on your opponent's field, send 1 monster from your field to the Graveyard. [[Barian Battlemorph]]! Regain your true form! Play 1 "Star Seraph" monster from your Deck to your field in face-down Defense Position. (Its battle position can be changed.) Then, add 1 "[[Rank-Up-Magic Barian's Force (Duel Links)|Rank-Up-Magic Barian's Force]]" from outside of your Deck to your hand.
  | fr_text             = Vous pouvez uniquement utilisez le deuxième effet de cette Compétence une fois par tour, et le troisième effet une fois par Duel.<br />1 : Vous pouvez uniquement Invoquer Normalement ou Spécialement des monstres "Séraphin Étoile" (hors Invocations Spéciales depuis l'Extra Deck). Les monstres que vous contrôlez qui incluent "Numéro 102" dans leur nom de carte d'origine peuvent attaquer deux fois à chaque Battle Phase.<br />2 : Pendant votre Main Phase, jouez 1 "Séraphin Étoile" depuis votre Deck et 1 depuis votre main en Position de Défense face verso. (Leur position de combat peut être changée.)<br />3 : S'il y a une carte sur le Terrain de votre adversaire, envoyez 1 monstre de votre Terrain au Cimetière. Transformation de combat Barian ! Retrouve ta forme véritable ! Jouez 1 monstre "Séraphin Étoile" depuis votre Deck en Position de Défense face verso (sa position de combat peut être changée), puis ajoutez 1 "Force de Barian Magie-Rang-Plus" depuis l'extérieur de votre Deck à votre main.
  | ja_text             = このスキルの②③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：自分は「光天使」モンスターしか召喚・特殊召喚できず（ＥＸデッキからの特殊召喚を除く）、元々のカード名に「Ｎｏ．１０２」を含む自分フィールドのモンスターは１度のバトルフェイズ中に２回攻撃できる。<br />②：自分メインフェイズに発動できる。手札・デッキから「光天使」モンスターを１体ずつ裏側守備表示で出す（表示形式変更可能）。<br />③相手フィールドにカードが存在する場合、自分フィールドのモンスター１体を墓地へ送って発動できる。バリアルフォーゼし、真の姿になる！<br />デッキから「光天使」モンスター１体を裏側守備表示で出し（表示形式変更可能）、デッキ外から「ＲＵＭ－バリアンズ・フォース」１枚を手札に加える。
