  | romaji_name         = Akuseru Kauntā
  | text                = Return 1 card from your hand to the Deck, select 1 "[[Counter (archetype)|Counter]]" [[Counter Trap Card]] in your [[Graveyard]], and Set it to your field. If you control a [[FIRE]] [[Warrior]]-Type monster, and your opponent has activated a Counter Trap Card during the Duel, you may select 1 Counter Trap Card instead and Set it to your field. The card you Set with this Skill can also be activated this turn.<br />This Skill can only be used once per Duel.
  | fr_text             = Renvoyez 1 carte de votre main à votre Deck, sélectionnez 1 Carte Contre-Piège "Contre" dans votre Cimetière, et Posez-la sur votre Terrain. Si vous contrôlez un monstre de Type Guerrier FEU et que votre adversaire a activé une Carte Contre-Piège pendant le Duel, vous pouvez sélectionner 1 Carte Contre-Piège à la place et la Poser sur votre Terrain. La carte que vous Posez avec cette Compétence peut aussi être activée pendant ce tour.<br />Cette Compétence ne peut être utilisée qu'une fois par Duel.
  | ja_text             = 手札を１枚デッキに戻し、自分の墓地の「カウンター」カウンター罠カード１枚を選び、自分フィールドにセットする。自分フィールドに戦士族・炎属性モンスターが存在し、このデュエル中に相手がカウンター罠カードを発動している場合、代わりにカウンター罠カード１枚を選び、自分フィールドにセットする事もできる。このスキルでセットしたカードはセットしたターンでも発動できる。<br />このスキルはデュエル中１度のみ使用できる。
