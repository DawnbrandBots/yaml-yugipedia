title: 'Contract: Fabled'
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Contrat : Mythologique
  | ja_name             = コントラクト：魔轟神
  | romaji_name         = Kontorakuto: Magōshin
  | translated_name     = Contract: Demon Roar God
  | text                = You can only use this Skill's second effect once per turn and twice per Duel, and the third effect once per Duel.<br />1: You cannot Normal or Special Summon (excluding Special Summons from the Extra Deck) monsters except for "[[Fabled]]" monsters.<br />2: Send 1 monster from your hand or field to the Graveyard, and then add 1 "Fabled" card from your Graveyard to your hand.<br />3: Shuffle 1 "Fabled" card from your hand into the Deck, and then add 1 "Fabled" card from your Deck to your hand. During your Main Phase this turn, you can Normal Summon 1 "[[Fabled Grimro]]" in addition to your Normal Summon/Set.
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par tour et deux fois par Duel, et le toisième effet une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Normalement ou Spécialement (hors Invocations Spéciales depuis l'Extra Deck et le Cimetière de votre adversaire) de monstres, sauf des monstres "Mythologique".<br />2 : Envoyez 1 monstre de votre main ou Terrain au Cimetière, puis ajoutez 1 carte "Mythologique" de votre Cimetière à votre main.<br />3 : Mélangez 1 carte "Mythologique" de votre main dans le Deck, puis ajoutez 1 carte "Mythologique" de votre Deck à votre main. Pendant votre Main Phase de ce tour, vous pouvez Invoquer Normalement 1 "Grimro Mythologique" en plus de votre Invocation Normale/Pose.
  | ja_text             = このスキルの②の効果は１ターンに１度、デュエル中に２度まで使用でき、③の効果はデュエル中に１度しか使用できない。<br />①：自分は「魔神」モンスターしか召喚・特殊召喚できない（エクストラデッキからの特殊召喚を除く）。<br />②：自分の手札・フィールドからモンスター１体を墓地へ送って発動できる。自分の墓地から「魔神」カード１枚を手札に加える。③：手札から「魔神」カード１枚をデッキに戻して発動できる。デッキから「魔神」カード１枚を手札に加える。このターン、自分は通常召喚に加えて１度だけ、自分メインフェイズに「魔神グリムロ」１体を召喚できる。
