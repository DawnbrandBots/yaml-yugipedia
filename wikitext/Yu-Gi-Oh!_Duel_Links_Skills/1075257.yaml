title: Hope-Filled Chronomaly
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Chronomal plein d'espoir
  | ja_name             = 希望宿りし先史遺産
  | romaji_name         = Kibō Yadorishi Ōpātsu
  | translated_name     = Hope-Filled OOPArts
  | text                = You can only use this Skill's second effect once per Duel and its third effect once per turn.<br />1: You can only Normal or Special Summon "[[Chronomaly]]" monsters (excluding Special Summons from the Extra Deck).<br />2: Send 1 non-Level 4 "Chronomaly" monster from your hand to the [[Graveyard]], then add 1 non-Level 4 "Chronomaly" monster from your Deck to your hand, and add 4 "[[Number]]" monsters from outside of your Deck to your [[Extra Deck]].<br />3: Send 1 Rank 3-6 "Number" monster from your Extra Deck to the Graveyard, and the Level of each monster on your field becomes the same as the Rank of that monster.
  | fr_text             = Vous pouvez uniquement utiliser le deuxième effet de cette Compétence une fois par Duel, et son troisième effet une fois par tour.<br />1 : Vous pouvez uniquement Invoquer Normalement ou Spécialement des monstres "Chronomal" (hors Invocations Spéciales depuis l'Extra Deck).<br />2 : Envoyez 1 monstre "Chronomal" non Niveau 4 depuis votre main au Cimetière, puis ajoutez 1 monstre "Chronomal" non Niveau 4 de votre Deck à votre main, et ajoutez 4 monstres "Numéro" de l'extérieur de votre Deck à votre Extra Deck.<br />3 : Envoyez 1 monstre "Numéro" de Rang 3 à 6 de votre Extra Deck au Cimetière, et le Niveau de chaque monstre sur votre Terrain devient le même que le Rang de ce monstre.
  | ja_text             = このスキルの②の効果はデュエル中に１度しか使用できず、③の効果は１ターンに１度しか使用できない。<br />①：自分は「先史遺産」モンスターしか召喚・特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。<br />②：手札からレベル４以外の「先史遺産」モンスター１体を墓地へ送って発動できる。デッキからレベル４以外の「先史遺産」モンスター１体を手札に加え、デッキ外から「Ｎｏ．」モンスター４体をＥＸデッキに追加する。<br />③：ＥＸデッキからランク３～６の「Ｎｏ．」モンスター１体を墓地へ送って発動できる。自分フィールドの全てのモンスターのレベルは、墓地へ送ったモンスターのランクの数値と同じになる。
