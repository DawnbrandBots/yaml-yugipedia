title: D/D Secondment
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Affectation D/D
  | ja_name  = 
  | text     = You can only use this Skill's second and third effects once per Duel.<br />1: At the beginning of the Duel, add Pendulum Zones to your field, and add 6 "[[D/D/D]]" monsters to your Extra Deck. During this Duel, you cannot Special Summon any monsters, except "[[D/D]]" monsters (excluding Special Summons from the Extra Deck).<br />2: Reveal 1 Level 4 "D/D" Pendulum Monster from your hand, then take 2 "D/D" monsters from your Deck, add 1 of them to your hand, and send the other to your Graveyard.<br />3: If your opponent controls a monster, send up to 2 "D/D" monsters from your Deck or Extra Deck to the Graveyard. Then, Set 1 "D/D" Trap Card or 1 "[[Dark Contract]]" Trap Card from your hand to your field. (This card can be activated the same turn.)
  | fr_text  = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Au début du Duel, ajoutez des Zones Pendule sur votre Terrain et ajoutez 6 monstres "D/D/D" à votre Extra Deck. Lors de ce Duel, vous ne pouvez pas Invoquer Spécialement des monstres (hors Invocations Spéciales depuis l'Extra Deck), excepté des monstres "D/D".<br />2 : Révélez 1 Monstre Pendule "D/D" de Niveau 4 de votre main, puis prenez 2 monstres "D/D" de votre Deck, ajoutez 1 d'entre eux à votre main et envoyez l'autre au Cimetière.<br />3 : Si votre adversaire contrôle un monstre, envoyez jusqu'à 2 monstres "D/D" depuis votre Deck ou Extra Deck au Cimetière. Puis, posez 1 Carte Piège "D/D" ou 1 Carte Piège "Contrat des Ténèbres" depuis votre main sur votre Terrain. (Cette carte peut être activée durant le même tour.)
