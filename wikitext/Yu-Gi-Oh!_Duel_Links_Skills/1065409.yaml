title: Revolution des Fleurs
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Révolution des Fleurs
  | ja_name               = 革命の時花
  | romaji_name           = Kakumei no Jika
  | translated_name       = Seasonal Flowers of Revolution
  | text                  = You can use this Skill's first, second, and third effects once per Duel if your Deck (excluding Extra Deck) contains 6 or more [[Spellcaster]] monsters with 2900 ATK.<br />1: Activates at the start of your first turn. During this Duel, you can Normal Summon/Set [[DARK]] Spellcaster monsters with 2900 ATK without Tributing. If this Skill was activated on the 2nd turn, also play 1 "[[Necro Fleur (Duel Links)|Necro Fleur]]" from outside of your Deck in face-down Defense Position. (Its battle position can be changed.)<br />2: Shuffle 1 card from your hand into the Deck, then play 1 "[[Necro Synchron (Duel Links)|Necro Synchron]]" from your Deck. Then, you can decrease the Level of 1 monster on your field by 1 or 2.<br />3: Send 1 monster from your field to the [[Graveyard]], then play 1 "[[Sorciere de Fleur (Duel Links)|Sorciere de Fleur]]" from your Deck in face-down Defense Position. (Its battle position can be changed.)
  | fr_text               = Vous pouvez utiliser les premier, deuxième et troisième effets de cette Compétence une fois par Duel si votre Deck (hors Extra Deck) contient au moins 6 monstres de Type Magicien avec 2 900 ATK.<br />1 : S'active au début de votre premier tour. Pendant ce Duel, vous pouvez Invoquer Normalement/Poser des monstres de Type Magicien avec 2 900 ATK sans Sacrifice. Si vous avez activé cette Compétence au 2e tour, jouez aussi 1 "Fleur Nécro" depuis l'extérieur de votre Deck en Position de Défense face verso (Sa position de combat peut être modifiée.)<br />2 : Mélangez 1 carte de votre main dans le Deck, puis jouez 1 "Nécro Synchronique" depuis votre Deck. Puis, vous pouvez réduire le Niveau d'un monstre sur votre Terrain de 1 ou 2.<br />3 : Envoyez 1 monstre de votre Terrain au Cimetière, puis jouez 1 Carte "Sorcière des Fleurs" depuis votre Deck en Position de Défense face verso. (Sa position de combat peut être modifiée.)
  | ja_text               = このスキルの①②③の効果はデッキ（ＥＸデッキを除く）に攻撃力２９００の魔法使い族モンスターを６体以上入れているデッキでそれぞれデュエル中に１度ずつ使用できる。<br />①：最初の自分のターン開始時に発動する。このデュエル中、自分が攻撃力２９００の魔法使い族・闇属性モンスターを通常召喚する場合に必要なリリースは無くなる。２ターン目に発動した場合、さらにデッキ外から「死の花ネクロ・フルール」１体を出す。<br />②：手札１枚をデッキに戻して発動できる。デッキから「ネクロ・シンクロン」１体を出す。その後、自分フィールドのモンスターイ体のレベルを２つまで下げる事ができる。<br />③：自分フィールドのモンスター１体を墓地へ送って発動できる。デッキから「時花の魔女ーフルール・ド・ソルシエール」１体を出す。
