title: Bonds of the Converging Stars
wikitext: |-
  {{Duel Links Skill
  | fr_name     = Lien des Étoiles Convergentes
  | text        = You can only use this Skill's second and third effects once per Duel.<br />1: At the beginning of the Duel, add 5 Synchro Monsters to your Extra Deck. During this Duel, you can activate "[[Converging Wishes (Duel Links)|Converging Wishes]]" from your hand, but you cannot Normal or Special Summon any monsters, except [[Dragon]] Synchro Monsters, "[[Warrior]]" Synchro Monsters, "[[Junk]]" or "[[Stardust]]" monsters, or Tuners.<br />2: Shuffle 2 cards, including at least 1 Level 4 "Stardust" monster or "[[Shining Star Dragon (Duel Links)|Shining Star Dragon]]", from your hand into your Deck. Play 2 Level 4 "Stardust" monsters from your Deck, then add 1 Tuner from your Deck and 1 "[[Shooting Star (Duel Links)|Shooting Star]]" from outside your Deck to your hand and send 2 monsters from outside your Deck to the Graveyard. (These cards can be Special Summoned.)<br />3: If you control "[[Crimson Dragon (Duel Links)|Crimson Dragon]]", or your opponent controls a monster, out of the 5 [[Signer Dragon]]s from outside your Deck, play up to 3 and send the remaining cards to the Graveyard. (These cards can be Special Summoned.) Monsters played through this effect, except Tuners, will become Level 2.
  | fr_text     = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Au début du Duel, ajoutez 5 Monstres Synchro à votre Extra Deck. Lors de ce Duel, vous pouvez activer "Vœux de Convergence" depuis votre main, mais vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des Monstres Synchro Dragon, des Monstres Synchro "Guerrier", des monstres "Robot" ou "Poussière d'Étoile", ou des Syntoniseurs.<br />2 : Mélangez 2 cartes, dont au moins 1 monstre "Poussière d'Étoile" de Niveau 4 ou "Dragon de l'Étoile Brillante", de votre main à votre Deck. Jouez 2 monstres "Poussière d'Étoile" de Niveau 4 depuis votre Deck, puis ajoutez 1 Syntoniseur depuis votre Deck et 1 "Étoile Filante" depuis l'extérieur de votre Deck à votre main et envoyez 2 monstres depuis l'extérieur de votre Deck au Cimetière (ces cartes peuvent être Invoquées Spécialement).<br />3 : Si vous contrôlez "Dragon Cramoisi", ou si votre adversaire contrôle un monstre, parmi les 5 Dragons Pactisants depuis l'extérieur de votre Deck, jouez-en jusqu'à 3 et envoyez les cartes restantes au Cimetière (ces cartes peuvent être Invoquées Spécialement). Les monstres joués grâce à cet effet (Syntoniseurs exclus) deviendront de Niveau 2.
