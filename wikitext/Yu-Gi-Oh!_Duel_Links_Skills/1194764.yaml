title: Bonds of the Converging Stars
wikitext: |-
  {{Duel Links Skill
  | fr_name     = Lien des Étoiles Convergentes
  | text        = You can only use this Skill's second and third effects once per Duel.<br />1: At the beginning of the Duel, add 5 Synchro Monsters to your Extra Deck. During this Duel, you can activate "[[Converging Wishes (Duel Links)|Converging Wishes]]" from your hand, but you cannot Normal or Special Summon any monsters, except [[Dragon]] Synchro Monsters, "[[Warrior (archetype)|Warrior]]" Synchro Monsters, "[[Junk]]" or "[[Stardust]]" monsters, or Tuners.<br />2: Can be activated by shuffling 2 cards from your hand into the Deck, including a Level 4 "Stardust" monster or "[[Shining Star Dragon (Duel Links)|Shining Star Dragon]]". Play 2 Level 4 "Stardust" monsters from your Deck, then add 1 "Shining Star Dragon" from your Deck to your hand, and send 2 monsters from outside your Deck to the Graveyard. (These cards can be Special Summoned.)<br />3: If you control "[[Crimson Dragon (Duel Links)|Crimson Dragon]]", or if your opponent controls a monster, from among the 5 [[Signer Dragon]]s outside the Deck, play 2 non-Tuners (at random, but treat their Levels as 2) and 1 Tuner.
  | fr_text     = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Au début du Duel, ajoutez 5 Monstres Synchro à votre Extra Deck. Lors de ce Duel, vous pouvez activer "Vœux de Convergence" depuis votre main, mais vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des Monstres Synchro Dragon, des Monstres Synchro "Guerrier", des monstres "Robot" ou "Poussière d'Étoile", ou des Syntoniseurs.<br />2 : Peut être activée en mélangeant 2 cartes de votre main dans le Deck, dont un monstre "Poussière d'Étoile" de Niveau 4 ou "Dragon de l'Étoile Brillante". Jouez 2 monstres "Poussière d'Étoile" de Niveau 4 depuis votre Deck, ajoutez 1 "Dragon de l'Étoile Brillante" de votre Deck à votre main et envoyez 2 monstres depuis l'extérieur de votre Deck au Cimetière (ces cartes peuvent être Invoquées Spécialement).<br />3 : Si vous contrôlez "Dragon Cramoisi", ou si votre adversaire contrôle un monstre, parmi les 5 Dragons Pactisants depuis l'extérieur de votre Deck, jouez 2 monstres non-Syntoniseurs (au hasard, mais traitez-les comme étant de Niveau 2) et 1 monstre Syntoniseur.
