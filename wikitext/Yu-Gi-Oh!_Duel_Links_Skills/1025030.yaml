  | translated_name     = Awakening of the Spirit Arts
  | text                = Reveal 1 "[[Charmer]]" monster or "[[Familiar-Possessed]]" monster in your hand, return 1 card from your hand to the Deck, and Set 1 "[[Awakening of the Possessed (Duel Links)|Awakening of the Possessed]]" from outside of your Deck to the field.<br />This Skill can only be used if you begin the Duel with a Deck (excluding Extra Deck) that has "[[Familiar-Possessed - Aussa (Duel Links)|Familiar-Possessed - Aussa]]", "[[Familiar-Possessed - Eria (Duel Links)|Familiar-Possessed - Eria]]", "[[Familiar-Possessed - Hiita (Duel Links)|Familiar-Possessed - Hiita]]", and "[[Familiar-Possessed - Wynn (Duel Links)|Familiar-Possessed - Wynn]]". This Skill can only be used once per Duel.
  | fr_text             = Révélez 1 monstre "la Charmeuse" ou "Familier Possédé" dans votre main, renvoyez 1 carte de votre main dans le Deck, et Posez 1 "Éveil des Possédées" depuis l'extérieur de votre Deck sur votre Terrain.<br />Cette Compétence ne peut être utilisée que si vous commencez le Duel avec un Deck (hors Extra Deck) qui inclut "Aussa - Familier Possédé", "Eria - Familier Possédé", "Hiita - Familier Possédé" et "Wynn - Familier Possédé". Cette Compétence ne peut être utilisée qu'une fois par Duel.
  | ja_text             = 手札の「霊使い」モンスターまたは「憑依装着」モンスター１体を相手に見せ、手札１枚をデッキに戻し、デッキ外から「憑依覚醒」１枚を自分フィールドにセットする。<br />このスキルはデッキ（エクストラデッキを除く）に「憑依装着－アウス」「憑依装着－エリア」「憑依装着ーヒー夕」「憑依装着ーウィン」が存在するデッキを設定してデュエルを開始した場合に、デュエル中に１度だけ使用できる。
