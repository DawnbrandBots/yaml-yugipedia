  {{Duel Links Skill
  | fr_name  = Amorce Diapason
  | ja_name  = 
  | text     = 1: Once per Duel at the start of your Main Phase, if you have any [[Fiend]] monsters in your hand, reveal 1 at random to your opponent to activate this effect. Add 1 "[[Resonator Call (Duel Links)|Resonator Call]]" from outside your Deck to your hand. If you have any "[[Resonator]]" monsters in your hand, also reveal 1 at random to your opponent and add 1 "[[Resonator Command (Duel Links)|Resonator Command]]" from outside your Deck to your hand.
  | fr_text  = 1 : Une fois par Duel au début de votre Main Phase, si vous avez des monstres de type Démon dans votre main, révélez-en 1 au hasard à votre adversaire pour activer cet effet. Ajoutez 1 "Appel de Diapason" à votre main depuis l'extérieur de votre Deck. Si vous avez des monstres "Diapason" dans votre main, révélez-en 1 au hasard à votre adversaire et ajoutez 1 "Ordre du Diapason" depuis l'extérieur de votre Deck vers votre main.
