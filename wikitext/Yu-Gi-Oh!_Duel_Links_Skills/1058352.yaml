title: 'Draw Sense: Pendulum'
wikitext: |-
  {{Duel Links Skill
  | fr_name     = Pioche de Pendule
  | ja_name     = ドローセンス：ペンデュラム
  | romaji_name = Dorō Sensu: Pendyuramu
  | text        = You can only use this Skill if your Deck (excluding the Extra Deck) contains 9 or more monsters.<br />1: At the beginning of the Duel, add Pendulum Zones to your field.<br />2: Once per Duel, before your normal draw, if your opponent controls a monster and you control no monsters, you can change 1 of the cards from your normal draw this turn to a random [[Pendulum Monster]] from your Deck.
  | fr_text     = Vous pouvez utiliser cette Compétence si votre Deck (hors Extra Deck) contient min. 9 monstres.<br />1 : Au début du Duel, ajoutez des Zones Pendule à votre Terrain.<br />2 : Une fois par Duel, avant votre pioche normale, si votre adversaire contrôle un monstre et que vous n'en contrôlez aucun, vous pouvez changer 1 des cartes de votre pioche normale de ce tour par un Monstre Pendule au hasard de votre Deck.
  | ja_text     = このスキルはデッキ（ＥＸデッキを除く）にモンスター９体以上を入れているデッキで使用できる。<br />①：デュエル開始時に発動する。自分フィールドにペンデュラムゾーンを追加する。<br />②：デュエル中に１度、相手フィールドにのみモンスターが存在する場合、自分の通常のドロー前に発動できる。このターンの通常のドロー１枚はデッキからランダムに選んだぺンデュラムモンスターになる。
