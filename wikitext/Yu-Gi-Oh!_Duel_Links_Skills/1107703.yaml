  | text                = You can use this Skill’s second and third effects once per Duel if your Deck (excluding the Extra Deck) contains 8 or more different [[EARTH]]/[[WATER]]/[[FIRE]]/[[WIND]] “[[Dragonmaid]]” monsters.<br/>1: You cannot Normal or Special Summon monsters with a Level, except for “Dragonmaid” monsters and [[Dragon]] Fusion Monsters.<br/>2: Reveal 1 Dragon monster from your hand, then add 1 “Dragonmaid” monster from your Deck to your hand, then if you do, you can send 1 card from your hand to the Graveyard.<br/>3: If your opponent controls a card, Set 1 “[[Dragonmaid Downtime (Duel Links)|Dragonmaid Downtime]]” from outside your Deck. (This card can be activated the same turn.)
