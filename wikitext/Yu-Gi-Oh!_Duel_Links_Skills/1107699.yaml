  {{Duel Links Skill
  | fr_name             = Assaut de l'Air - Mobilisation - Contact
  | ja_name             = 閃刀起動－コンタクト
  | romaji_name         = Sentō Kidō - Kontakuto
  | translated_name     = Flash Sword Startup - Contact
  | text                = This Skill can be used if your Deck does not contain "[[Sky Striker Mobilize - Engage! (Duel Links)|Sky Striker Mobilize - Engage!]]".<br />1: At the start of the Duel, add 2 "[[Sky Striker Mobilize - Engage! (Duel Links)|Sky Striker Mobilize - Engage!]]" to your Deck and 1 each of the 4 different kinds of "[[Sky Striker Ace]]" Link Monsters not already in your Extra Deck. During this Duel, you cannot Normal or Special Summon any monsters except for "[[Sky Striker]]" monsters (excluding Special Summons from the Extra Deck and the opponent's Graveyard).
  | fr_text             = Cette Compétence peut être utilisée si votre Deck ne contient pas "Assaut de l'Air - Mobilisation - À l'Attaque !".<br />1 : Au début du Duel, ajoutez 2 "Assaut de l'Air - Mobilisation - À l'Attaque !" à votre Deck et 1 Monstre Lien "Assaut de l'Air - As" de chacune des 4 sortes qui ne sont pas déjà dans votre Extra Deck. Lors de ce Duel, vous ne pouvez pas Invoquer Normalement ni Spécialement de monstre, excepté des monstres "Assaut de l'Air" (hors Invocations Spéciales depuis l'Extra Deck et le Cimetière de l'adversaire).
  | ja_text             = このスキルはデッキに「関刀起動－エンゲージ」を入れていない場合に使用できる。<br />①：デュエル開始時に発動する。デッキに「閃刀起動－エンゲージ」２枚を追加し、「閃刀姫」リンクモンスター４種類のうちＥＸデッキに存在しないモンスターを１体ずつＥＸデッキに追加する。このデュエル中、自分は「閃刀」モンスターしか召喚・特殊召喚できない（ＥＸデッキ・相手の墓地からの特殊召喚を除く）。
