title: Number Galaxy
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Galaxie des Numéros
  | ja_name  = 
  | text     = You can only use this Skill's second and third effects once per Duel.<br />1. You can only Normal or Special Summon "[[Number]]", "[[Galaxy]]", or "[[Photon]]" monsters and Rank 4 Xyz Monsters. When using a "[[Galaxy-Eyes Photon Dragon (Duel Links)|Galaxy-Eyes Photon Dragon]]" or "[[Galaxy-Eyes Afterglow Dragon (Duel Links)|Galaxy-Eyes Afterglow Dragon]]" as material to Xyz Summon, you can treat its Level as 4.<br />2. During your Main Phase, play 1 "Galaxy-Eyes Photon Dragon" or "Galaxy-Eyes Afterglow Dragon" from your hand, then shuffle 1 card from your hand into your Deck. Then, add 1 "Galaxy" or "Photon" monster to your hand. If you played "Galaxy-Eyes Photon Dragon", you can add 2 cards to your hand instead.<br />3. If only your opponent controls a monster, play 1 "[[Number 90: Galaxy-Eyes Photon Lord (Duel Links)|Number 90: Galaxy-Eyes Photon Lord]]" from outside your Deck.
  | fr_text  = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1. Vous ne pouvez Invoquer Normalement ou Spécialement que des monstres "Numéro", "Galactique" ou "Photon" et des Monstres Xyz de Rang 4. Quand vous utiliser 1 "Dragon Photon aux Yeux Galactiques" ou "Dragon des Dernières Lueurs aux Yeux Galactiques" comme Matériels d'Invocation Xyz, vous pouvez traiter son Niveau comme étant 4.<br />2. Durant votre Main Phase, jouez 1 "Dragon Photon aux Yeux Galactiques" ou "Dragon des Dernières Lueurs aux Yeux Galactiques" dans votre main, puis mélangez 1 carte depuis votre main dans le Deck. Puis, ajoutez 1 monstre "Galactique" ou "Photon" à votre main. Si vous avez joué "Dragon Photon aux Yeux Galactiques", vous pouvez ajouter 2 cartes à votre main à la place.<br />3. Si seul votre adversaire contrôle un monstre, jouez 1 "Numéro 90 : Seigneur Photon aux Yeux Galactiques" depuis l'extérieur de votre Deck.
