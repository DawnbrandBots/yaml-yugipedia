  * Votre Extra Deck ne contient que des Monstres Xyz de Type Dragon.
  | ja_text         = 自分フィールドのモンスターがドラゴン族・光属性モンスター２体のみの場合に使用できる。自分フィールドのモンスター全てのレベルをターン終了時まで８にする。このスキルを使用したターン、自分はランク８・９のドラゴン族・光属性エクシーズモンスターしか特殊召喚できない。このスキルは以下の条件を満たしたデッキを設定してデュエルを開始した場合に、デュエル中１度のみ使用できる。<br />●デッキのモンスターがドラゴン族モンスターのみ<br />●エクストラデッキのモンスターがドラゴン族のエクシーズモンスターのみ
