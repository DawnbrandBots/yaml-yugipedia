  | fr_text         = Utilisable seulement si les seuls monstres sur votre Terrain sont 2 monstres de Type Dragon LUMIÈRE.<br />Le Niveau de tous les monstres sur votre Terrain passe à 8 jusqu'à la fin du tour.<br />Lors du tour pendant lequel vous utilisez cette Compétence, vous pouvez uniquement Invoquer Spécialement des Monstres Xyz de Type Dragon LUMIÈRE de Rang 8 et 9.<br />Si vous créez un Deck qui remplit les conditions suivantes et que vous commencez le Duel, cette Compétence ne peut être utilisée qu'une fois par Duel.
