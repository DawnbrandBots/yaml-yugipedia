  | text                = You can only use this Skill’s second and third effects once per turn.<br />1: You cannot Normal or Special Summon any monsters except [[Machine]] and [[Dragon]] "[[Cyber]]" monsters and Level 5 or higher [[LIGHT]] Machine monsters (excluding Special Summons from the Extra Deck).<br />2: During your End Phase, send 1 "[[Cyber Dragon (Duel Links)|Cyber Dragon]]" from your Deck to the Graveyard.<br />3: During your Main Phase, you can make all monsters you currently control Level 5 until the end of the turn.
