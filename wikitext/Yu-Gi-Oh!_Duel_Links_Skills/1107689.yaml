  | ja_text             = このスキルの②③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：自分はドラゴン族・機械族の「サイバー」モンスター及びレベル５以上の機械族・光属性モンスターしか召喚・特殊召喚できない（ＥＸデッキからの特殊召喚を除く）<br />②：自分メインフェィズに発動できる。デッキから「サイバー・ドラゴン」１体を墓地へ送る。<br />③：自分メインフェイズに発動できる。自分フィールドの全てのモンスターのレベルはターン終了時まで５になる。
