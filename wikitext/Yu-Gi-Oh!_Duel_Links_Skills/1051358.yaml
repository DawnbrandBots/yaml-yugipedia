title: Master of Advanced Rites
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Maître des rites complexes
  | ja_name  = 高等儀式の使い手
  | text     = Each of the following effects can be used once per Duel. If you use this Skill, you cannot Normal or Special Summon any monsters except Ritual Monsters until the end of your next turn.
  * Return 1 Normal Monster in your hand to the Deck. Then, add 1 "[[Advanced Ritual Art (Duel Links)|Advanced Ritual Art]]" from your Deck to your hand.
  * Select 1 Normal Monster and 1 Ritual Spell Card in your Graveyard and return them to your Deck.
  | fr_text  = Chacun des effets suivants peut être utilisé une fois par Duel. Si vous utilisez cette Compétence, vous ne pouvez pas Invoquer Normalement ou Spécialement des monstres, hormis des Monstres Rituels, jusqu'à la fin du tour de votre adversaire.
  * Renvoyez 1 Monstre Normal de votre main dans le Deck. Ensuite, ajoutez 1 "Art du Rituel Avancé" de votre Deck à votre main.
  * Sélectionnez 1 Monstre Normal et 1 Carte Magie Rituelle dans votre Cimetière et renvoyez-les dans votre Deck.
  | ja_text  = 以下の効果をデュエル中に1度ずつ使用できる。このスキルを使用した場合、次の自分ターン終了時まで自分は儀式モンスター以外のモンスターを召喚・特殊召喚できない。<br>
  ●自分の手札の通常モンスター1体をデッキに戻し、デッキから「高等儀式術」1枚を手札に加える。<br>
  ●自分の墓地から通常モンスターと儀式魔法を1枚ずつ選び、デッキに戻す。
  | releases = 
