title: 'The Power of D: Weaving the Future'
wikitext: |-
  {{Duel Links Skill
  | fr_name  = La Puissance de D: Tisser l'avenir
  | ja_name  = 
  | text     = You can only use this Skill's second and third effects once per Duel.<br />1: During your Main Phase, you can only Normal or Special Summon Level 8 or lower monsters that are [[DARK]], [[FIRE]], or [[WIND]] "[[HERO]]" monsters.<br />2: Reveal 1 "HERO" monster in your hand and shuffle 1 card from your hand into the Deck. Add up to 2 cards in total from your Deck to your hand, choosing from DARK "HERO" monsters and/or "[[Fusion Destiny (Duel Links)|Fusion Destiny]]", then add 1 "[[D - Force (Duel Links)|D - Force]]" from outside of your Deck to your hand. If your opponent controls a card, also play 1 "[[Destiny HERO - Doom Lord (Duel Links)|Destiny HERO - Doom Lord]]" from outside of your Deck in face-down Defense Position. (Its battle position can be changed.)<br />3: From turn 2 onward, place 1 "[[D - Tactics (Duel Links)|D - Tactics]]" from outside of your Deck face-up in your Spell & Trap Zone. During this Duel, unless you successfully Special Summon "[[Destiny End Dragoon (Duel Links)|Destiny End Dragoon]]", you cannot activate the effects of cards other than "[[Polymerization (Duel Links)|Polymerization]]" and "Fusion Destiny".
  | fr_text  = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Durant votre Main Phase, vous ne pouvez Invoquer Normalement ou Spécialement que des monstres de max. Niveau 8 qui sont des monstres "HÉROS" TÉNÈBRES, FEU ou VENT.<br />2 : Révélez 1 monstre "HÉROS" de votre main et mélangez 1 carte de votre main dans le Deck. Ajoutez jusqu'à 2 cartes au total de votre Deck à votre main, qui sont soit des monstres "HÉROS" TÉNÈBRES et/ou "Fusion de la Destinée", puis ajoutez 1 "Force D" depuis l'extérieur de votre Deck à votre main. Si votre adversaire contrôle une carte, jouez également 1 "Seigneur de la Damnation - HÉROS de la Destinée" depuis l'extérieur de votre Deck en Position de Défense face verso. (Sa position de combat peut être modifiée.)<br />3 : À partir du 2e tour, placez 1 "Tactiques D" face recto dans votre Zone Magie & Piège depuis l'extérieur de votre Deck. Lors de ce Duel, à moins que vous réussissiez à Invoquer Spécialement "Soldat Dragon de l'Ultime Destinée", vous ne pouvez pas activer les effets de cartes autres que "Polymérisation" et "Fusion de la Destinée".
