  | text                = You can only use this Skill's second effect once per turn.<br />1: You cannot Normal or Special Summon any monsters, except for [[Winged Beast]] monsters, and you cannot [[Special Summon]] any monsters from the [[Extra Deck]], except for [[DARK]] or [[WIND]] Xyz Monsters.<br />2: If your opponent has a card on their field or in their [[Graveyard]], reveal 1 Rank 8 or lower Winged Beast [[Xyz Monster]] in your Extra Deck, and then the Levels of all "[[Lyrilusc]]" monsters you control become equal to the Rank that revealed monster had, until the end of this turn.
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par tour.<br />1 : Vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des monstres Bête Ailée, et vous ne pouvez pas Invoquer Spécialement de monstres depuis l'Extra Deck, excepté des Monstres Xyz VENT ou TÉNÈBRES.<br />2 : Si votre adversaire a une carte sur son Terrain ou dans son Cimetière, révélez 1 Monstre Xyz Bête Ailée de max. Rang 8 dans votre Extra Deck, puis les Niveaux de tous les monstres "Lyrilusc" que vous contrôlez deviennent égaux au Rang que ce monstre révélé avait, jusqu'à la fin du tour.
  | ja_text             = このスキルの②の効果は１ターンに１度しか使用できない。<br />①：自分は鳥獣族モンスターしか召喚・特殊召喚できず、闇・風属性のエクシーズモンスターしかＥＸデッキから特殊召喚できない。<br />②：相手のフィールドか墓地にカードが存在する場合、ＥＸデッキのランク８以下の鳥獣族エクシーズモンスター１体を相手に見せて発動できる。自分フィールドの全ての「ＬＬ」モンスターのレベルはターン終了時まで、見せたモンスターのランクの数値と同じになる。
