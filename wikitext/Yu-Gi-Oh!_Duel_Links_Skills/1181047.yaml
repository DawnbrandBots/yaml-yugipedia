  | text                  = You can use 1 of the following effects once per turn. Each effect can only be used once per Duel.<br/>•Play "[[Number 39: Utopia (Duel Links)|Number 39: Utopia]]" (treated as an Xyz Summon) from outside your Deck onto your field, then attach "[[Gagaga Magician (Duel Links)|Gagaga Magician]]" and "[[Gagaga Girl (Duel Links)|Gagaga Girl]]" from outside your Deck as Xyz Materials. The, add 1 "[[ZW -]]" monster from outside your Deck to your hand.<br/>•All monsters you control gain ATK equal to the number of Xyz Materials on your field x 500.<br/>•All Xyz Monsters you control have their ATK tripled until the end of this turn.
  | fr_text               = Vous pouvez utiliser 1 des effets suivants une fois par tour. Chaque effet ne peut être utilisé qu'une fois par Duel.<br/>•Jouez "Numéro 39 : Utopie" (traité comme une Invocation Xyz) depuis l'extérieur de votre Deck sur votre Terrain, puis attachez "Magicien Gagaga" et "Fille Gagaga" depuis l'extérieur de votre Deck comme Matériels Xyz. Puis, ajoutez 1 monstre "ZW -" depuis l'extérieur de votre Deck à votre main.<br/>•Tous les monstres que vous contrôlez gagnent une ATK égale au [nombre de Matériels Xyz sur votre Terrain] x 500.<br/>•L'ATK de tous les Monstres Xyz que vous contrôlez est triplée jusqu'à la fin de ce tour.
