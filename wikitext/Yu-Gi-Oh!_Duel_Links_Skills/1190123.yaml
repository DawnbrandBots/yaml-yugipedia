title: Whispers of Good and Evil
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Murmures du bien et du mal
  | ja_name  = 
  | text     = You can only use this Skill's second and third effects once per Duel.<br />1: At the beginning of the Duel, add Pendulum Zones to your field. During this Duel, your opponent cannot target "[[Vaalmonica]]" in your Pendulum Zone with card effects.<br />2: Reveal 1 "Vaalmonica" monster from your hand and add 1 "Vaalmonica" card from your Deck to your hand.<br />3: If your opponent controls a card, Set 1 "Vaalmonica" Spell/Trap Card from your hand or Deck to your field. (This card can be activated the same turn.) If you Set the card from your hand, draw two cards and shuffle 1 card from your hand into your Deck.
  | fr_text  = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Au début du Duel, ajoutez des Zones Pendule sur votre Terrain. Lors de ce Duel, votre adversaire ne peut pas cibler "Vaalmonica" dans votre Zone Pendule avec des effets de carte.<br />2 : Révélez 1 monstre "Vaalmonica" de votre main et ajoutez 1 carte "Vaalmonica" de votre Deck à votre main.<br />3 : Si votre adversaire contrôle une carte, Posez 1 Carte Magie/Piège "Vaalmonica" de votre main ou Deck sur votre Terrain. (Cette carte peut être activée durant le même tour.) Si vous Posez la carte depuis votre main, piochez deux cartes et mélangez 1 carte de votre main dans votre Deck.
