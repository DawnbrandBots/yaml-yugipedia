title: Can't You Reduce My LP?
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Tu ne peux pas réduire mes LP ?
  | ja_name             = 私のライフを削り切る方法がないのですか？
  | romaji_name         = Watashi no Raifu o Kezurikiru Hōhō ga nai no desu ka?
  | translated_name     = Do You Have no Way to Reduce my Life?
  | text                = You can use this Skill's second effect once per turn and twice per Duel.<br />1: At the beginning of the Duel, if your Extra Deck contains "[[Sunavalon Dryatrentiay (Duel Links)|Sunavalon Dryatrentiay]]", add 5 types of "[[Sunavalon]]" monsters and 3 types of "[[Sunvine]]" monsters to your Extra Deck, and gain 1200 LP.<br />2: During a turn you have Normal or Special Summoned either a "[[Sunseed]]", "Sunvine", or "Sunavalon" monster, gain 1200 LP.
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par tour et deux fois par Duel.<br />1 : Au début du Duel, si votre Extra Deck contient "Dryarbre Solairavalon", ajoutez 5 types de monstres "Solairavalon" et 3 types de monstres "Solairvigne" à votre Extra Deck, et gagnez 1 200 LP.<br />2 : Pendant un tour où vous avez Invoqué Normalement ou Spécialement un monstre "Solairgraine", "Solairvigne" ou "Solairavalon", gagnez 1 200 LP.
  | ja_text             = このスキルの②の効果は１ターンに１度、デュエル中に２度まで使用できる。<br />①：自分のＥＸデッキに「聖天様の大母神」が存在する場合、デュエル開始時に発動する。「サンアバロン」モンスター５種類と「サンヴァイン」モンスター３種類を１体ずつＥＸデッキに追加し、自分は１２００ＬＰ回復する。<br />②：自分が「サンシード」「サンヴァイン」「サンアバロン」モンスターの内いずれかを召喚・特殊召喚したターンに発動できる。自分は１２００ＬＰ回復する。
