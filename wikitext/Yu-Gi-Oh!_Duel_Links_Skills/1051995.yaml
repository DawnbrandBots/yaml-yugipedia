title: Neostorm eXceed
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Surpassement Neostorm
  | ja_name               = ネオストーム・エクシード
  | romaji_name           = Neosutōmu Ekushīdo
  | text                  = You can use this Skill's second effect once per Duel.<br />1: You cannot Special Summon (excluding Special Summons from the Extra Deck) any monsters except LIGHT, DARK, and WIND [[Cyberse]] Type monsters.<br />2: If you control a Cyberse Type [[Link Monster]], send 1 "[[Firewall Dragon]]" from your Extra Deck to the Graveyard. (This card can be Special Summoned.) Then, you can apply the following effect.
  * Shuffle 1 card from your hand or field to your Deck, and then play 1 "[[Firewall Guardian (Duel Links)|Firewall Guardian]]" from your Deck to your field in face-down Defense Position. (Its battle position can be changed.)
  | fr_text               = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par Duel.<br />1 : Vous pouvez Invoquer Spécialement n'importe quel monstre (hors Invocations Spéciales depuis l'Extra Deck), excepté des Monstres LUMIÈRE, TÉNÈBRES et VENT de Type Cyberse.<br />2 : Si vous contrôlez un Monstre Lien de Type Cyberse, envoyez 1 "Dragon Pare-Feu" depuis votre Extra Deck au Cimetière. (Cette carte peut être Invoquée Spécialement.) Vous pouvez ensuite appliquer l'effet suivant.
  * Mélangez 1 carte de votre main ou Terrain dans votre Deck, puis jouez 1 "Gardien Pare-Feu" de votre Deck à votre Terrain en Position de Défense face verso. (Sa position de combat peut être modifiée.)
  | ja_text               = このスキルの②の効果はデュエル中に１度しか使用できない。<br />①：自分は光・闇・風属性のサイバース族モンスターしか特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。<br />②：自分フィールドにサイバース族リンクモンスターが存在する場合に発動できる。ＥＸデッキから「ファイアウォール・ドラゴン」１体を特殊召喚可能な状態で墓地へ送る。その後、以下の効果を適用できる。<br />●自分の手札・フィールドのカード１枚をデッキに戻し、デッキから「ファイアウォール・ガーディアン」１体を裏側守備表示で出す（表示形式変更可能）。
