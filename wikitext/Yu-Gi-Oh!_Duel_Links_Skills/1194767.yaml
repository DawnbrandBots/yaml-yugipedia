  {{Duel Links Skill
  | fr_name     = Le Courage d'Avancer
  | text        = You can only use this Skill's second and third effects once per Duel.<br />1: During your turn, you cannot Normal or Special Summon (excluding Special Summons from the Extra Deck) any monsters, except "[[Centur-Ion]]" monsters.<br />2: Reveal 1 "Centur-Ion" monster from your hand, then add 1 "Centur-Ion" card from your Deck to your hand.<br />3: If you control "[[Centur-Ion Legatia (Duel Links)|Centur-Ion Legatia]]", or your opponent controls a monster, add 1 "[[Emblema]]" card from your Deck to your hand. Then send 1 "Centur-Ion" monster from your Deck to the Graveyard or place it face-up in your Spell & Trap Zone as a Continuous Trap Card.
  | fr_text     = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Pendant votre tour, vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des monstres "Centur-Ion" (hors Invocations Spéciales depuis l'Extra Deck).<br />2 : Révélez 1 monstre "Centur-Ion" de votre main, puis ajoutez 1 carte "Centur-Ion" de votre Deck à votre main.<br />3 : Si vous contrôlez "Centur-Ion Legatia", ou si votre adversaire contrôle un monstre, ajoutez 1 carte "Emblema" de votre Deck à votre main. Puis, envoyez 1 monstre "Centur-Ion" depuis votre Deck au Cimetière ou placez-le face recto dans votre Zone Magie & Piège en tant que Carte Piège Continu.
