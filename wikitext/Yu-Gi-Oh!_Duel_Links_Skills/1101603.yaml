title: Starving Venom Invasion
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Invasion de Venin Affamé
  | ja_name               = スターヴ・ヴェノム・インヴェイジョン
  | romaji_name           = Sutāvu Venomu Inveijon
  | translated_name       = Starve Venom Invasion
  | text                  = You can only use this Skill's second and third effects once per Duel if your Extra Deck contains "[[Starving Venom Fusion Dragon]]".<br />1: You can only Normal or Special Summon "[[Predaplant]]" monsters (excluding Special Summons from the Extra Deck).<br />2: Reveal 2 cards from your hand, that are "[[Predap]]" cards, "[[Polymerization (archetype)|Polymerization]]" Spell Cards, and/or "[[Fusion (archetype)|Fusion]]" Spell Cards, then add 1 "[[Polymerization]]" from outside of your Deck and 1 "Predap" card from your Deck or [[Graveyard]] to your hand.<br />3: If only your opponent controls a monster, place 1 [[Predator Counter]] on a face-up monster your opponent controls, and if you do, any of those monsters that are Level 2 or higher become Level 1 as long as they have a Predator Counter.
  | fr_text               = Vous pouvez utiliser le deuxième et le troisième effet de cette Compétence une fois par Duel si votre Extra Deck contient "Dragon Fusion Venin Affamé".<br />1 : Vous pouvez uniquement Invoquer Normalement ou Spécialement des monstres "Prédaplante" (hors Invocations Spéciales depuis l'Extra Deck).<br />2 : Révélez 2 cartes de votre main qui sont des Cartes "Prédap", des Cartes Magie "Polymérisation" et/ou des Cartes Magie "Fusion", puis ajoutez 1 "Polymérisation" depuis l'extérieur de votre Deck et 1 Carte "Prédap" de votre Deck ou Cimetière dans votre main.<br />3 : Si seul votre adversaire contrôle un monstre, placez 1 Compteur Prédateur sur un monstre face recto que votre adversaire contrôle, et si vous le faites, n'importe lequel de ces monstres qui est de Niveau 2 ou plus devient Niveau 1 tant qu'il a un Compteur Prédateur.
  | ja_text               = このスキルの②③の効果はＥＸデッキに「スターヴ・ヴェノム・フュージョン・ドラゴン」を入れている場合にそれぞれデュエル中に１度ずつ使用できる。<br />①：自分は「捕食植物」モンスターしか召喚・特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。<br />②：手札の「プレデター」カード、「融合」魔法カード、「フュージョン」魔法カードを合計２枚相手に見せて発動できる。自分のデッキ・墓地の「プレデター」カード１枚とデッキ外の「融合」１枚を手札に加える。<br />③相手フィールドにのみモンスターが存在する場合に発動できる。相手フィールドの表側表示モンスター１体に捕食カウンターを１つ置く。捕食カウンターが置かれたレベル２以上のモンスターのレベルは１になる。
