title: Gouki's Comeback
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Le retour de Gouki
  | ja_name               = 剛鬼リターンマッチ
  | romaji_name           = Gōki Ritān Macchi
  | translated_name       = Strong Oni Return Match
  | text                  = You can use each of this Skill's first and second effects once per Duel if your Deck (excluding the Extra Deck) contains 9 or more "[[Gouki]]" monsters.<br />1: During your Main Phase, select 1 "Gouki" monster on your field or in your Graveyard and gain Life Points equal to its original ATK.<br />2: Can be used if your opponent controls a monster and you control no monsters. Add 1 non-Link "Gouki" monster from your Graveyard to your hand, and then shuffle 1 card from your hand to your Deck.
  | fr_text               = Vous pouvez utiliser le premier et le second effet de cette Compétence une fois par Duel si votre Deck (hors Extra Deck) contient au moins 9 monstres "Gouki".<br />1 : Pendant votre Main Phase, sélectionnez 1 monstre "Gouki" sur votre Terrain ou dans votre Cimetière et gagnez des Life Points équivalents à son ATK d'origine.<br />2 : Cette Compétence peut être utilisée si votre adversaire contrôle un monstre et que vous n'en contrôlez aucun. Ajoutez 1 monstre non-Lien "Gouki" de votre Cimetière à votre main, puis mélangez 1 carte de votre main dans votre Deck.
  | ja_text               = このスキルの①②の効果はデッキ（ＥＸデッキを除く）に「剛鬼」モンスター９体以上を入れている場合に、それぞれデュエル中に１度ずつ使用できる。<br />①：自分メインフェイズに発動できる。自分のフィールド・墓地から「剛鬼」モンスター１体を選び、その元々の攻撃力分だけ自分のＬＰを回復する。<br />②：相手フィールドにのみモンスターが存在する場合に発動できる。リンクモンスター以外の自分の墓地の「剛鬼」モンスター１体を手札に加え、自分の手札１枚をデッキに戻す。
