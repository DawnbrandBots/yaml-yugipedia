title: Proto-Cyber Trigger
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Amorce Cyber Proto
  | ja_name  = 
  | text     = 1: Once per Duel at the start of your Main Phase, if you have any "[[Cyber Dragon (archetype)|Cyber Dragon]]" monsters in your hand, reveal 1 at random to your opponent to activate this effect (if you have 3000 or less LP, activate this effect without revealing a card). Play 1 "[[Proto-Cyber Dragon (Duel Links)|Proto-Cyber Dragon]]" from outside your Deck in Attack Position. If you have 2000 or less LP, play 1 more in Attack Position. During this Duel, you can only Tribute Summon or Special Summon "Cyber Dragon" monsters and Fusion Monsters.
  | fr_text  = 1 : Une fois par Duel au début de votre Main Phase, si vous avez des monstres "Cyber Dragon" dans votre main, révélez-en 1 au hasard à votre adversaire pour activer cet effet (si vous avez max. 3000 LP, activez cet effet sans révéler de carte). Jouez 1 "Cyber Dragon Proto" depuis l'extérieur de votre Deck en Position d'Attaque. Si vous avez max. 2000 LP, jouez 1 carte supplémentaire en Position d'Attaque. Lors de ce Duel, vous ne pouvez Invoquer par Sacrifice ou Spécialement que des monstres "Cyber Dragon" et des Monstres Fusion.
