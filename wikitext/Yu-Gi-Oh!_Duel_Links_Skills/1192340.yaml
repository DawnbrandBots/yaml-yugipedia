title: Illusion of Execution
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Illusion de l'Exécution
  | text     = '''[REQUIREMENT]''' Can be activated from turn 2 onward by revealing 1 Level 5 or higher monster from your hand if all of the monsters in your constructed Deck are [[Spellcaster]] Type, and all Level 5 or higher monsters are "[[Dark Magician (Duel Links Rush Duel)|Dark Magician]]", "[[Dark Magician Girl (Duel Links Rush Duel)|Dark Magician Girl]]", or "[[Dark Eradicator Sorcerer (Duel Links)|Dark Eradicator Sorcerer]]".<br />'''[EFFECT]''' Excavate the top 3 cards of your Deck. You can add 1 Spell Card from the excavated cards to your hand, and send the remaining cards to your Graveyard. Then, you can send 1 "Dark Magician" from your Deck to the Graveyard. (Once per Duel.)
  | fr_text  = '''[CONDITION]''' Peut être activée à partir du 2e tour en révélant 1 monstre de min. Niveau 5 de votre main, si tous les monstres dans votre Deck construit sont de Type Magicien, et si tous les monstres de min. 5 sont des monstres "Magicien Sombre", "Magicienne des Ténèbres" ou "Sorcier Éradicateur des Ténèbres".<br />'''[EFFET]''' Dévoilez les 3 cartes du dessus de votre Deck. Vous pouvez ajouter 1 Carte Magie parmi les cartes dévoilées à votre main, et envoyer les cartes restantes dans votre Cimetière. Puis, vous pouvez envoyer 1 "Magicien Sombre" depuis votre Deck au Cimetière. (Une fois par Duel.)
