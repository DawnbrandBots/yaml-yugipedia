title: Train Uncoupling!
wikitext: |-
  {{Duel Links Skill
  | ja_name             = 列車解結！
  | romaji_name         = Ressha Kaiketsu!
  | text                = Can be used before your normal draw. Instead of conducting your normal draw, send 1 [[Level 10]] [[EARTH]] [[Machine]]-Type monster from your hand to the Graveyard. Then, add up to 2 [[Level 4]] or lower EARTH Machine-Type monsters from your Graveyard whose combined [[ATK]] is less than or equal to the ATK of the monster you sent to the Graveyard.
  This [[Skill]] will only activate if you begin the [[Duel]] with a [[Deck]] (excluding [[Extra Deck]]) that has 3 or more Level 10 EARTH Machine-Type monsters. This Skill can only be used once per Duel.
  | ja_text             = 自分の通常ドロー前に使用できる。ドローフェイズ時に通常のドローを行うかわりに、手札から機械族・地属性・レベル１０のモンスター１体を墓地へ送り、攻撃力の合計がそのモンスターの攻撃力以下になるように、墓地から機械族・地属性・レベル４以下のモンスターを２体まで手札に加える。<br />このスキルはデッキ（エクストラデッキは除く）に機械族・地属性・レベル１０のモンスターが３枚以上存在するデッキを設定してデュエルを開始した場合に、デュエル中１度のみ使用できる。
