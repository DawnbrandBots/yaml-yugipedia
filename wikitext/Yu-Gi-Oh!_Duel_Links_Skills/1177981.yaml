title: Dark Stirring of the Dreadful Dolls
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Sombre Tumulte des Épouvantables Marionnettes
  | ja_name  = 
  | text     = You can use this Skill's second and third effects once per Duel if your Deck contains "[[Rank-Up-Magic Argent Chaos Force (Duel Links)|Rank-Up-Magic Argent Chaos Force]]".<br />1. At the beginning of the Duel, add 3 "[[Mansion of the Dreadful Dolls]]" cards to your Deck, and 4 "[[Gimmick Puppet]]" Xyz Monsters to your Extra Deck. If you are going first, during the first turn, you cannot place monsters in your opponent's Main Monster Zone, and your opponent will take no effect damage from your effects.<br />2. Reveal 1 "[[Gimmick Puppet Rouge Doll]]" card from your hand, then shuffle 1 card from your hand into the Deck. Then, add 1 "Gimmick Puppet" monster or 1 "Mansion of the Dreadful Dolls" from your Deck to your hand.<br />3. If you control a "Gimmick Puppet" Xyz Monster, or if only your opponent controls a monster, Set 1 "[[Puppet]]" Trap Card or 1 "[[Xyz]]" Spell/Trap Card from your hand or Deck to your field. (This card can be activated the same turn.)
  | fr_text  = Vous pouvez utiliser le deuxième et le troisième effet de cette Compétence une fois par Duel si votre Deck contient "Force Chaos d'Argent Magie-Rang-Plus".<br />1. Au début du Duel, ajoutez 3 cartes "Manoir des Épouvantables Marionnettes" à votre Deck et 4 Monstres Xyz "Poupée Truquée" à votre Extra Deck. Si vous passez en premier, durant le premier tour, vous ne pouvez pas placer de monstres dans la Zone Monstre Main de votre adversaire, et votre adversaire ne subira pas de dommage d'effet de vos effets.<br />2. Révélez 1 carte "Poupée Truquée Rouge" depuis votre main, puis mélangez 1 carte de votre main dans votre Deck. Puis, ajoutez 1 monstre "Poupée Truquée" ou 1 "Manoir des Épouvantables Marionnettes" de votre Deck à votre main.<br />3. Si vous contrôlez un Monstre Xyz "Poupée Truquée" ou si seul votre adversaire contrôle un monstre, Posez 1 Carte Piège "Poupée" ou 1 Carte Magie/Piège "Xyz" depuis votre main ou Deck sur votre Terrain. (Cette carte peut être activée durant le même tour.)
