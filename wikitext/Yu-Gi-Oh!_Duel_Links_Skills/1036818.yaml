title: Lswarm Union
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Union de la Colonie
  | ja_name             = ヴェルズ・ユニオン
  | romaji_name         = Veruzu Yunion
  | translated_name     = Verz Union
  | text                = Send 2 "[[Lswarm]]" monsters (1 from your hand and one from your Deck) to the Graveyard and add 1 "Lswarm" monster from your Deck to your hand. During the Duel you use this Skill, you cannot Special Summon any monsters except "Lswarm" monsters (excluding Special Summons from your Extra Deck).<br />This Skill can be used once per Duel.
  | fr_text             = Envoyez 2 monstres "Colonie" (1 depuis votre main et 1 depuis votre Deck) au Cimetière et ajoutez 1 monstre "Colonie" depuis votre Deck à votre main. Lors du Duel pendant lequel vous utilisez cette Compétence, vous ne pouvez pas Invoquer Spécialement de monstres, excepté des monstres "Colonie" (hors Invocations Spéciales depuis votre Extra Deck).<br />Cette Compétence peut être utilisée une fois par Duel.
  | ja_text             = 自分の手札・デッキの「ヴェルズ」モンスターを１体ずつ墓地へ送り、デッキから「ヴェルズ」モンスター１体を手札に加える。このスキルを使用するデュエル中、自分は「ヴェルズ」モンスターしか特殊召喚できない。（エクストラデッキからの特殊召喚は除く）<br />このスキルはデッキ（エクストラデッキを除く）に「ヴェルズ」モンスターが１０体以上存在するデッキを設定してデュエルを開始した場合、デュエル中に１度だけ使用できる。
