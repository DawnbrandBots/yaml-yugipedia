  | ja_text         = 自分のライフポイントが相手より少ない場合に、自分の通常のドロー前に使用できる。このターンの通常のドロー１枚はデッキ内の「サイクロン」になる。<br />相手の魔法＆罠ゾーン及びフィールドゾーンにカードが３枚以上存在する場合、このスキルはライフポイントに関係なく使用できる。<br />このスキルはデュエル中に１度だけ使用できる。
