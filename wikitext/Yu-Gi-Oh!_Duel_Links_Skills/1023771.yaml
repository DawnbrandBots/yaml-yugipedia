  | text            = Can be used before your normal draw if your Life Points are lower than your opponent's. One of the cards from your normal draw this turn will be "[[Mystical Space Typhoon (Duel Links)|Mystical Space Typhoon]]".<br />This Skill can be used regardless of your Life Points if there are 3 or more cards in the opponent's Spell/Trap Zone and Field Zone.<br />This Skill can only be used once per Duel.
