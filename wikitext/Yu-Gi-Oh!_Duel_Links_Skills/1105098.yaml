title: Pendulum Rebellion
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Rébellion Pendule
  | ja_name             = ペンデュラム・リベリオン
  | text                = You can use this Skill's second effect once per turn and twice per Duel. During the Duel you activate the second effect, you cannot Normal or Special Summon monsters except for "[[Performapal]]", "[[Odd-Eyes]]", and "[[The Phantom Knights]]" monsters and "[[Magician]]" Pendulum Monsters (excluding Special Summons from the Extra Deck).<br/>1: At the beginning of the Duel, add Pendulum Zones to your field and add 2 "Odd-Eyes" Pendulum Monsters with different names from outside your Deck to your [[Extra Deck]] face-up. (These cards can be Special Summoned.)<br/>2: Shuffle 1 card from your hand or field into the Deck, then place 2 out of 4 "Magician" Pendulum Monsters with different names from outside your Deck in your Pendulum Zones.
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par tour et deux fois par Duel. Pendant le Duel où vous activez le deuxième effet, vous ne pouvez pas Invoquer Normalement ou Spécialement (hors Invocations Spéciales depuis l'Extra Deck) de monstres, sauf des monstres "Potartiste", "Yeux Impairs", "Les Chevaliers Fantômes", et des Monstres Pendule "Magicien".<br/>1 : Au début du Duel, ajoutez des Zones Pendule sur votre Terrain et ajoutez 2 Monstres Pendule "Yeux Impairs" avec des noms différents à votre Extra Deck face recto. (Ces cartes peuvent être Invoquées Spécialement.)<br/>2 : Renvoyez 1 carte depuis votre main ou votre Terrain dans le Deck, puis placez 2 des 4 Monstres Pendule "Magicien" portant des noms différents depuis l'extérieur de votre Deck dans vos Zones Pendule.
  | ja_text             = このスキルの②の効果は1ターンに1度、デュエル中に2度まで使用でき、この②の効果を発動するデュエル中、自分は「EM」「オッドアイズ」「幻影騎士団」モンスター及び「魔術師」ペンデュラムモンスターしか召喚・特殊召喚できない（EXデッキからの特殊召喚を除く）。<br>
  ①：デュエル開始時に発動する。自分フィールドにペンデュラムゾーンを追加し、デッキ外の「オッドアイズ」ペンデュラムモンスター2種類を1体ずつ特殊召喚可能な状態でEXデッキに表側で加える。<br>
  ②：自分の手札・フィールドのカード1枚をデッキに戻して発動できる。デッキ外の「魔術師」ペンデュラムモンスター4種類の中からカード名が異なるカードを2枚まで自分のペンデュラムゾーンに置く。
  | releases            = 
