title: 'Light and Dark: Reptile Type'
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Lumière et Ténèbres : Type Reptile
  | ja_name             = 光と闇の交換：爬虫類族
  | romaji_name         = Hikari to Yami no Kōkan: Hachūruizoku
  | translated_name     = Exchange of Light and Darkness: Reptile Race
  | text                = You can use this Skill's second effect once per Duel.<br />1: You cannot Special Summon (excluding Special Summons from the Extra Deck) any monsters except [[Reptile]] Type monsters.<br />2: Shuffle 1 [[LIGHT]] or [[DARK]] Reptile Type monster from your hand to your Deck, and then add 1 LIGHT or DARK Reptile Type monster with the same Level and a different Attribute from your Deck to your hand.
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Spécialement de monstre (hors Invocations Spéciales depuis l'Extra Deck), excepté des monstres de Type Reptile.<br />2 : Mélangez 1 Monstre LUMIÈRE ou TÉNÈBRES de Type Reptile de votre main dans votre Deck, puis ajoutez 1 Monstre LUMIÈRE ou TÉNÈBRES de Type Reptile avec le même Niveau et un Attribut différent de votre Deck à votre main.
  | ja_text             = このスキルの②の効果はデュエル中に１度しか使用できない。<br />①：自分は爬虫類族モンスターしか特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。<br />②：手札から光・闇属性の爬虫類族モンスター１体をデッキに戻して発動できる。そのモンスターとは属性が異なり、レベルが同じ光・闇属性の爬虫類族モンスター１体をデッキから手札に加える。
