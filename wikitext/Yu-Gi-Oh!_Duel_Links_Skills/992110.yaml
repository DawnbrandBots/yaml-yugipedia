title: Salamandra & Phoenix
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Salamandra et Phénix
  | ja_name               = サラマンドラ・アンド・フェニックス
  | romaji_name           = Saramandora Ando Fenikkusu
  | text                  = You can Normal Summon or Set "[[Immortal Phoenix Gearfried (Duel Links)|Immortal Phoenix Gearfried]]" and "[[Phoenix Gearfried (Duel Links)|Phoenix Gearfried]]" with one less Tribute during this Duel.<br />The following effect can be used once per Duel by revealing 1 "Immortal Phoenix Gearfried" from your hand. Set 1 "[[Salamandra (Duel Links)|Salamandra]]" from outside of your Deck, and send 1 "[[Legendary Sword (Duel Links)|Legendary Sword]]" from outside of your Deck to the Graveyard.<br />This Skill can be used/applied if you begin the Duel with a Deck (excluding Extra Deck) that contains at least 10 [[FIRE]] [[Warrior-Type]] monsters.
  | fr_text               = Lors de ce Duel, vous pouvez Invoquer Normalement ou Poser "Gearfried Phénix Immortel" et "Gearfried Phénix" sans Sacrifice.<br />L'effet suivant peut être utilisé une fois par Duel en révélant 1 "Gearfried Phénix Immortel" depuis votre main. Posez 1 "Salamandra" de l'extérieur de votre Deck et envoyez 1 "Épée Légendaire" depuis l'extérieur de votre Deck au Cimetière.<br />Cette Compétence peut être utilisée/appliquée si vous commencez le Duel avec un Deck (hors Extra Deck) contenant au moins 10 monstres FEU de Type Guerrier.
  | ja_text               = このデュエル中、自分は「フェニックス・ギア・フリード」を通常召喚する場合に必要なリリースが無くなる。また、手札の「ゴッドフェニックス・ギア・フリード」１体を相手に見せてデュエル中に１度だけ使用できる。デッキ外から「サラマンドラ」１枚をフィールドにセットし、デッキ外から「伝説の剣」１枚を墓地へ送る。<br />このスキルはデッキ（エクストラデッキを除く）に戦士族・炎属性モンスターが１０枚以上存在するデッキを設定してデュエルを開始した場合に、使用と適用ができる。
