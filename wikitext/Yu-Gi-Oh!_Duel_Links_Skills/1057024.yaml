  | text                = You can only use this Skill's second effect once per Duel if your Deck (excluding the Extra Deck) contains 9 or more "[[Altergeist]]" cards.<br />1. At the beginning of the Duel, gain 1000 Life Points.<br />2. From turn 2 onward, shuffle 1 monster from your field into the Deck, and then play 1 "[[Altergeist Fijialert (Duel Links)|Altergeist Fijialert]]" from outside of your Deck to your field in face-down Defense Position. (Its battle position can be changed.)
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par Duel si votre Deck (hors Extra Deck) contient min. 9 cartes "Altergeist".<br />1 : Au début du Duel, gagnez 1 000 Life Points.<br />2 : À partir du 2e tour, mélangez 1 monstre de votre Terrain dans le Deck, puis jouez 1 "Fijialerte Altergeist" depuis l'extérieur de votre Deck sur votre Terrain en Position de Défense face verso. (Sa position de combat peut être modifiée.)
  | ja_text             = このスキルの②の効果はデッキ（ＥＸデッキを除く）に「オルターガイスト」カード９枚以上を入れているデッキで、デュエル中に１度使用できる。<br />①：デュエル開始時に発動する。自分は１０００ＬＰ回復する。<br />②：２ターン目以降に発動できる。自分フィールドのモンスター１体をデッキに戻し、デッキ外から「オルターガイスト・フィジアラート」１体を裏側守備表示で出す（表示形式変更可能）。
