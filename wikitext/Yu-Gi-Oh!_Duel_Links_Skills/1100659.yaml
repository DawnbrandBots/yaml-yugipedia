title: Barian Battlemorph - Chaos Seraph
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Transformation de combat Barian - Séraphin Chaos
  | ja_name             = バリアルフォーゼ －カオス・ライトニング－
  | romaji_name         = Bariarufōze -Kaosu Raitoningu-
  | translated_name     = Barialphosis -Chaos Lightning-
  | text                = You can only use this Skill's second effect once per turn, and the third effect once per Duel.<br />1: You can only Normal or Special Summon "[[Star Seraph]]" monsters (excluding Special Summons from the Extra Deck).<br />2: During your Main Phase, play "Star Seraph" monsters, 1 each from your Deck and hand to your field in face-down Defense Position. (Its battle position can be changed.)<br />3: If there is a card on your opponent's field, send 1 monster from your field to the Graveyard. Barian Battlemorph! Regain your true form! Play 1 "Star Seraph" monster from your Deck in face-down Defense Position (its battle position can be changed), then add 1 "[[Rank-Up-Magic Barian's Force (Duel Links)|Rank-Up-Magic Barian's Force]]" from outside of your Deck to your hand. This turn, the battle damage your "[[Number C102: Archfiend Seraph]]" inflicts to your opponent is doubled.
  | fr_text             = Vous pouvez uniquement utiliser le deuxième effet de cette Compétence une fois par tour, et le troisième effet une fois par Duel.<br />1 : Vous pouvez uniquement Invoquer Normalement ou Spécialement des monstres "Séraphin Étoile" (hors Invocations Spéciales depuis l'Extra Deck).<br />2 : Pendant votre Main Phase, jouez des monstres "Séraphin Étoile", 1 depuis votre Deck et 1 depuis votre main sur votre Terrain en Position de Défense face verso. (Sa position de combat peut être modifiée.)<br />3 : S'il y a une carte sur le Terrain de votre adversaire, envoyez 1 monstre de votre Terrain au Cimetière. Transformation de combat Barian ! Retrouve ta forme véritable ! Jouez 1 monstre "Séraphin Étoile" depuis votre Deck en Position de Défense face verso (sa position de combat peut être changée), puis ajoutez 1 "Force de Barian Magie-Rang-Plus" depuis l'extérieur de votre Deck à votre main. Ce tour, les dommages de combat que votre "Numéro C102 : Séraphin Archdémon" inflige à votre adversaire sont doublés.
  | ja_text             = このスキルの②の効果は１ターンに１度しか使用できず、③の効果はデュエル中に１度しか使用できない。<br />①：自分は「光天使」モンスターしか召喚・特殊召喚できない（ＥＸデッキからの特殊召喫を除く）。<br />②：自分メインフェイズに発動できる。手札・デッキから「光天使」モンスターを１体ずつ裏側守備表示で出す表示形式変更可能）。<br />③：相手フィールドにカードが存在する場合、自分フィールドのモンスター１体を墓地へ送って発動できる。バリアルフォーゼし、真の姿になる！<br />デッキから「光天使」モンスター１体を裏側守備表示で出し（表示形式変更可能）、デッキ外から「ＲＵＭ－バリアンズ・フォース」１枚を手札に加える。このターン、自分の「ＣＮｏ．１０２ 光堕天使ノーブル・デーモン」が相手に与える戦闘ダメージは倍になる。
