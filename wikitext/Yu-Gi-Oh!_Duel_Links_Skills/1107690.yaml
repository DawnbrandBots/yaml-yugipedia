title: Ghostrick Invitation
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Invitation Fantôruse
  | ja_name = ゴーストリック・インビテーション
  | text                = You can only use this Skill's second effect once per turn.<br />1: You can only Normal or Special Summon "[[Ghostrick]]" monsters (excluding Special Summons from the Extra Deck).<br />2: Reveal either 1 "[[Ghostrick Witch (Duel Links)|Ghostrick Witch]]", 1 Level 1 "[[Ghostrick]]" monster, or 1 "[[Ghostrick]]" Field Spell Card in your hand (a card with the same name only once per Duel), and play 1 "[[Ghostrick]]" monster from your Deck in face-down Defense Position. (Its battle position can be changed.) Then, you can send 1 "[[Ghostrick]]" Spell/Trap Card from your Deck to your Graveyard. During the End Phase of this turn, you can change any number of monsters you control to face-down Defense Position.
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par tour.<br />1 : Vous pouvez uniquement Invoquer Normalement ou Spécialement des monstres "Fantôruse" (hors Invocations Spéciales depuis l'Extra Deck).<br />2 : Révélez 1 "Sorcière Fantôruse", 1 monstre "Fantôruse" de Niveau 1 ou 1 Carte Magie de Terrain "Fantôruse" dans votre main (une carte avec le même nom une seule fois par Duel), et jouez 1 monstre "Fantôruse" depuis votre Deck en Position de Défense face verso. (Sa position de combat peut être modifiée.) Puis, vous pouvez envoyer 1 Carte Magie/Piège "Fantôruse" de votre Deck au Cimetière. Pendant la End Phase de ce tour, vous pouvez changer n'importe quel nombre de monstres que vous contrôlez en Position de Défense face verso.
  | ja_text = このスキルの②の効果は1ターンに1度しか使用できない。<br>
  ①：自分は「ゴーストリック」モンスターしか召喚・特殊召喚できない（EXデッキからの特殊召喚を除く）。<br>
  ②：「ゴーストリックの魔女」、レベル1の「ゴーストリック」モンスター、「ゴーストリック」フィールド魔法カードの内1枚を手札から相手に見せて発動できる（同名カードはデュエル中に1度）。デッキから「ゴーストリック」モンスター1体を裏側守備表示で出す（表示形式変更可能）。その後、デッキから「ゴーストリック」魔法・罠カード1枚を墓地へ送る事ができる。このターンのエンドフェイズに、自分フィールドのモンスターを任意の数だけ裏側守備表示にできる。
