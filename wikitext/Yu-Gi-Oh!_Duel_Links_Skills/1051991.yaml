  | text                = You can use this Skill's second effect once per Duel if your Deck (excluding the Extra Deck) contains 8 or more "[[Gladiator Beast]]" monsters.<br />1: You cannot Special Summon (excluding Special Summons from the Extra Deck) any monsters except "Gladiator Beast" monsters.<br />2: Reveal 1 "Gladiator Beast" monster in your hand, and then place 1 "[[Gladiator Rejection (Duel Links)|Gladiator Rejection]]" from your Deck, Graveyard, or among your banished cards on your field face-down.
  | fr_text             = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par Duel si votre Deck (hors Extra Deck) contient au moins 8 monstres "Bête Gladiateur".<br />1 : Vous ne pouvez pas Invoquer Spécialement de monstre (hors Invocations Spéciales depuis l'Extra Deck), excepté des monstres "Bête Gladiateur" et des monstres de Type Bête.<br />2 : Révélez 1 monstre "Bête Gladiateur" dans votre main, puis placez 1 "Rejet du Gladiateur" depuis votre Deck, Cimetière, ou parmi vos cartes bannies sur votre Terrain face verso.
  | ja_text             = このスキルの②の効果はデッキ（ＥＸデッキを除く）に「剣闘」モンスター８体以上を入れているデッキで、デュエル中に１度だけ使用できる。<br />①：自分は「剣闘」モンスターまたは族モンスターしか特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。<br />②：手札の「剣闘」モンスター１体を相手に見せて発動できる。自分のデッキ・墓地・除外状態の「剣闘排斥波」１枚を自分フィールドに裏側表示で置く。
