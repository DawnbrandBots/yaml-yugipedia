  | fr_name  = Pioche de la Destinée : Le Roi Cramoisi
  | ja_name  = 
  | text     = You can only use this Skill's first and second effects once per Duel.<br />1: Can be used before your normal draw. Play 1 "[[Number 39: Utopia (Duel Links)|Number 39: Utopia]]" from your Extra Deck or GY in face-down Defense Position. (Its battle position can be changed.) Your normal draw this turn will be "[[Rank-Up-Magic Limited Barian's Force (Duel Links)|Rank-Up-Magic Limited Barian's Force]]" from your Deck, and any battle and effect damage your monsters whose original name is "[[Number C39: Utopia Ray V (Duel Links)|Number C39: Utopia Ray V]]" inflict to your opponent this turn is doubled.<br />2: Reveal 1 Level 4 monster or 1 Spell Card in your hand and either place it on the bottom of your Deck or send it to the GY. Then, draw 2 cards.
  | fr_text  = Vous ne pouvez utiliser le premier et le deuxième effet de cette Compétence qu'une seule fois par Duel.<br />1 : Peut être utilisée avant votre pioche normale. Jouez 1 "Numéro 39: Utopie" depuis votre Extra Deck ou Cimetière en Position de Défense face recto. (Sa position de combat peut être modifiée.) Votre pioche normale de ce tour sera "Force de Barian Restreinte Magie-Rang-Plus" de votre Deck, et tous les dommages de combat et d'effets de vos monstres dont le nom d'origine est "Numéro C39 : Rayon Utopie V" infligés à votre adversaire ce tour sont doublés.<br />2 : Révélez 1 monstre de Niveau 4 ou 1 Carte Magie de votre main, puis placez cette carte au-dessous de votre Deck ou envoyez-la au Cimetière. Puis, piochez 2 cartes.
