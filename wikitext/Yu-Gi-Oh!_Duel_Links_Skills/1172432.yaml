  | text     = You can only use this Skill's third effect once per Duel.<br/>1: At the beginning of the Duel, all "[[Rank-Up-Magic - The Seventh One (Duel Links)|Rank-Up-Magic - The Seventh One]]" cards in your Deck are placed at the bottom of the Deck.<br/>2: Can be used before your normal draw. [[Barian Battlemorph]]! Regain your true form! One of the cards from your normal draw this turn will be "Rank-Up-Magic - The Seventh One" from your Deck.<br/>3: During your Main Phase, either place 1 card from your hand on the bottom of your Deck or send it to the Graveyard. Then, draw 2 cards.
