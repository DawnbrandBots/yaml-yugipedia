title: Crystal Radiance
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Rayonnement du Cristal
  | ja_name = 宝玉の彩光
  | text     = You can only use this Skill's second and third effects once per Duel.<br />
  1: At the beginning of the Duel, add 7 different "[[Crystal Beast]]" monsters to your Deck. During all of your turns, you cannot Normal or Special Summon monsters, except "Crystal Beast" and "[[Ultimate Crystal]]" monsters (excluding Special Summons from the Extra Deck).<br />
  2: Send 2 "Crystal Beast" cards from your hand or face-up field to the Graveyard, then add 2 "[[Crystal]]" Spell/Trap Cards from your Deck to your hand, and send 2 "Crystal Beast" monsters from your Deck to your Graveyard.<br />
  3: If only your opponent controls a card, reveal 1 [[Crystal Beast Rainbow Dragon (Duel Links)|Crystal Beast Rainbow Dragon]] in your hand, then Set 1 "Crystal" Spell/Trap Card from your Deck. (This card can be activated the same turn. )
  | fr_text  = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br /> 1 : Au début du Duel, ajoutez 7 monstres "Bête Cristalline" différents à votre Deck. Lors de ce Duel, vous ne pouvez pas Invoquer Normalement ni Spécialement de monstres, excepté des monstres "Bête Cristalline" et "Cristal Ultime" (hors Invocations Spéciales depuis l'Extra Deck).<br /> 2 : Envoyez 2 cartes "Bête Cristalline" de votre main ou de votre Terrain face recto au Cimetière, puis ajoutez 2 Cartes Magie/Piège "Cristal" depuis votre Deck à votre main, et envoyez 2 monstres "Bête Cristalline" depuis votre Deck au Cimetière.<br /> 3 : Si seul votre adversaire contrôle une carte, révélez 1 "Bête Cristalline : Dragon Arc-en-Ciel" dans votre main, puis posez 1 Carte Magie/Piège "Cristal" depuis votre Deck. (Cette carte peut être activée durant le même tour.)
  | ja_text = このスキルの②③の効果はそれぞれデュエル中に1度しか使用できない。<br>
  ①：デュエル開始時に発動する。「宝玉獸」モンスター7種類を1体ずつデッキに追加する。このデュエル中、自分は「宝玉獸」「究極宝玉神」モンスターしか召喚・特殊召喚できない(EXデッキからの特殊召喚を除く）。<br>
  ②：自分の手札・フィールド（表側表示）の「宝玉獸」カード2枚を墓地へ送って発動できる。デッキから「宝玉」魔法・罠カード2枚を手札に加え、デッキから「宝玉獣」モンスター2体を墓地へ送る。<br>
  ③：相手フィールドにのみカードが存在する場合、手札の「究極宝玉 レインボー・ドラゴン」1体を相手に見せて発動できる。デッキから「宝玉」魔法・罠カード1枚を自分フィールドにセットする(このターンから発動可能）。
