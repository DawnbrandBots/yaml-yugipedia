  | translated_name       = A World Swallowed by Yomi
  | text                  = You can only use this Skill's second and third effects once per Duel.<br />1: You can only Normal or Special Summon "[[Earthbound Immortal Wiraqocha Rasca (Duel Links)|Earthbound Immortal Wiraqocha Rasca ]]", "[[Earthbound Greater Linewalker (Duel Links)|Earthbound Greater Linewalker]]", Level 5 [[Spellcaster]] monsters, [[Synchro Monster|Synchro Monsters]], and [[Tuner monster|Tuners]] and you cannot activate the effects of "[[Earthbound Immortal]]" monsters during the first turn of the Duel.<br />2: Reveal 1 Level 5 or higher monster in your hand and return 1 card from your hand to the Deck. Add 1 "[[Earthbound Geoglyph (Duel Links)|Earthbound Geoglyph]]" from outside of your Deck and 1 Level 5 or higher monster from your Deck to your hand. Then, add 4 Tuners from outside of your Deck to the [[Graveyard]]. (These cards can be Special Summoned.)<br />3: During your Main Phase, select 1 "Earthbound Immortal" monster on your field and increase its ATK by 3000 points.
  | fr_text               = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Vous pouvez uniquement Invoquer Normalement ou Spécialement "Esprit de la Terre Immortel Wiraqocha Rasca", "Esprit de la Terre Immortel Grand Linewalker", des monstres de Type Magicien de Niveau 5, des monstres Synchro et des Syntoniseurs, et vous ne pouvez pas activer les effets des monstres "Esprit de la Terre Immortel" pendant le premier tour du Duel.<br />2 : Révélez 1 monstre de min. Niveau 5 dans votre main et renvoyez 1 carte de votre main dans votre Deck. Ajoutez 1 "Esprit de la Terre Géoglyphe" depuis l'extérieur de votre Deck et 1 monstre de min. Niveau 5 de votre Deck à votre main. Puis, ajoutez 4 Syntoniseurs depuis l'extérieur de votre Deck à votre Deck et envoyez 2 Monstres Synchro depuis l'extérieur de votre Deck au Cimetière. (Ces cartes peuvent être Invoquées Spécialement.)<br />3 : Pendant votre Main Phase, sélectionnez 1 monstre "Esprit de la Terre Immortel" sur votre Terrain et augmentez son ATK de 3 000 points.
  | ja_text             = このスキルの②③の効果はデュエル中に１度しか使用できない。<br />①：我は「地縛神 Ｗｉｒａｑｏｃｈａ Ｒａｓｃａ」、「地縛超神官」、魔法使い族・レベル５モンスター、シンクロモンスター、チューナーしか召喚・特殊召喚できず、１ターン目の間、「地縛神」モンスターの効果を発動できない。<br />②：手札からレベル５以上のモンスター１体を相手に見せ、手札１枚をデッキに戻して発動できる。デッキ外の「地縛地上絵」１枚とデッキのレベル５以上のモンスター１体を手札に加える。その後、デッキ外からチューナー４体をデッキに加え、デッキ外からシンクロモンスター２体を特殊召喚可能な状態で墓地へ送る。<br />③：我のメインフェイズに発動できる。我のフィールドの「地縛神」モンスター１体を選び、その攻撃力を３０００アップする。
