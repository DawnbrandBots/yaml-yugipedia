title: Raging Pendulum
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Pendule enragé
  | ja_name             = レイジング・ペンデュラム
  | romaji_name         = Reijingu Pendyuramu
  | text                = At the beginning of the Duel, add Pendulum Zones to your field.<br />This Skill can be used only once per Duel by revealing 1 "[[Odd-Eyes Raging Dragon (Duel Links)|Odd-Eyes Raging Dragon]]" and 1 "[[Dark Rebellion Xyz Dragon (Duel Links)|Dark Rebellion Xyz Dragon]]" from your Extra Deck if you have 2 "[[Performapal]]", "[[Magician]]", or "[[Odd-Eyes]]" cards in your [[Pendulum Zone]]. Add 1 "[[Odd-Eyes Pendulum Dragon (Duel Links)|Odd-Eyes Pendulum Dragon]]" and 1 "Magician" Pendulum Monster from your hand or Deck to the Extra Deck. During this Duel, you can treat Xyz Monsters you control as Level 7 monsters when Xyz Summoning "Odd-Eyes Raging Dragon".
  | fr_text             = Au début du Duel, ajoutez des Zones Pendule à votre Terrain.<br />Cette Compétence peut être utilisée une fois par Duel en révélant 1 Carte "Dragon de Rage aux Yeux Impairs" et 1 "Dragon Xyz de la Rébellion des Ténèbres" de votre Extra Deck si vous avez 2 cartes "Potartiste", "Magicien" ou "Yeux Impairs" dans votre Zone Pendule. Ajoutez 1 "Dragon Pendule aux Yeux Impairs" et 1 Monstre Pendule "Magicien" de votre main ou Deck à l'Extra Deck. Pendant ce Duel, vous pouvez traiter les Monstres Xyz que vous contrôlez comme des monstres de Niveau 7 lorsque vous Invoquez par Xyz "Dragon de Rage aux Yeux Impairs".
  | ja_text             = デュエル開始時に自分フィールドにペンデュラムゾーンを追加する。<br />また、自分のペンデュラムゾーンに「ＥＭ」、「魔術師」、「オッドアイズ」カードが２枚存在する場合、エクストラデッキから「覇王烈竜オッドアイズ・レイジング・ドラゴン」と「ダーク・リベリオン・エクシーズ・ドラゴン」を１体ずつ相手に見せてデュエル中に１度だけ使用できる。デッキ外の「ＥＭ」モンスター３種類から１体をランダムで手札に加え、手札・デッキから「オッドアイズ・ペンデュラム・ドラゴン」１体と「魔術師」ペンデュラムモンスター１体をエクストラデッキに加える。このデュエル中、自分が「覇王烈竜オッドアイズ・レイジング・ドラゴン」をエクシーズ召喚する際、自分フィールドのエクシーズモンスターをレベル７のモンスターとして扱う事ができる。
