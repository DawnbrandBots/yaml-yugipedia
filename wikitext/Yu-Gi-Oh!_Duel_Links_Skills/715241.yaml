title: Hand Reloading
wikitext: |-
  {{Duel Links Skill
  | fr_name         = Recharge de main
  | ja_name         = ハンド・リロード
  | romaji_name     = Hando Rirōdo
  | translated_name = Hando Reload
  | text            = Can be used if your Life Points are 2000 or below. Select any number of the following monsters in your hand or Graveyard and return them to the Deck. Then add cards to your hand from the top of your Deck equal to the number of cards that you returned.
  * [[Magic Hand (Duel Links)|Magic Hand]]
  * [[Fire Hand (Duel Links)|Fire Hand]]
  * [[Ice Hand (Duel Links)|Ice Hand]]
  * [[Prominence Hand (Duel Links)|Prominence Hand]]
  * [[Number 106: Giant Hand (Duel Links)|Number 106: Giant Hand]]
  This Skill can only be used once per Duel.
  | fr_text         = Cette Compétence peut être utilisée si vos Life Points sont de 2 000 ou moins. Sélectionnez n'importe quel nombre des monstres suivants dans votre main ou Cimetière et renvoyez-les dans le Deck. Puis rajoutez un nombre de carte à votre main égal au nombre de cartes que vous avez renvoyées votre main.
  * Main Magique
  * Main de Feu
  * Main de Glace
  * Main de la Proéminence
  * Numéro 106 : Main de Géant
  Cette Compétence ne peut être utilisée qu'une fois par Duel.
  | ja_text         = 自分のライフポイントが２０００以下の時に使用できる。自分の手札・墓地の以下のモンスターを任意の枚数選びデッキに戻す。その後、手札から自分のデッキに戻した枚数分だけデッキの上からカードを手札に加える。<br />●マジック・ハンド<br />●ファイヤー・ハンド<br />●アイス・ハンド<br />●プロミネンス・ハンド<br />●Ｎｏ．１０６ 巨岩掌ジャイアント・ハンド<br />このスキルはデュエル中１度のみ使用できる。
