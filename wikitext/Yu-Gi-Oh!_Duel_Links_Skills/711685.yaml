  | romaji_name           = Efuda no Shōshū
  | translated_name       = Gathering of Face Cards
  | text                  = When you control "[[Queen's Knight (Duel Links)|Queen's Knight]]", you can Summon one of the following monsters during your Main Phase in addition to your regular Normal Summon/Set.<br />In addition, the following effect can be used once per Duel. Send 1 Level 10 non-[[DARK]] monster with ? ATK from the hand to the Graveyard, and add to your hand one of the following monsters or 1 monster whose text specifically lists all of the following monsters from your Deck. Then, add all of the following monsters from outside of your Deck to the bottom of the Deck. If you use this Skill, you can only Special Summon 1 monster from your Extra Deck until the end of the turn.<br />This Skill can only be used/applied if you begin the Duel with a Deck (excluding Extra Deck) that contains at least 10 [[LIGHT]] [[Warrior]]-Type monsters.
  * Queen's Knight
  * [[Jack's Knight (Duel Links)|Jack's Knight]]
  * [[King's Knight (Duel Links)|King's Knight]]
  | fr_text               = Lorsque vous contrôlez "Chevalier de la Reine", vous pouvez Invoquer un des monstres suivants pendant votre Main Phase en plus de votre Invocation/Pose Normale.<br />De plus, l'effet suivant peut être utilisé une fois par Duel. Envoyez 1 monstre non-TÉNÈBRES de Niveau 10 avec ? ATK depuis votre main au Cimetière, puis ajoutez à votre main un des monstres suivants ou 1 monstre dont le texte liste spécifiquement tous les monstres suivants depuis votre Deck. Ensuite, ajoutez tous les monstres suivants de l'extérieur de votre Deck sous votre Deck. Si vous utilisez cette Compétence, vous ne pouvez Invoquer Spécialement qu'un seul monstre depuis votre Extra Deck jusqu'à la fin du tour.<br />Cette Compétence ne peut être utilisée/appliquée que si vous commencez le Duel avec un Deck (hors Extra Deck) contenant au moins 10 monstres LUMIÈRE de Type Guerrier.<br />● Chevalier de la Reine<br />● Chevalier du Valet<br />● Chevalier du Roi
  | ja_text  = 自分フィールドに「クィーンズ・ナイト」が存在する場合、自分は通常召喚に加えて１度だけ、メインフェイズに以下のモンスター１体を召喚できる。<br />また、デュエル中に１度だけ使用できる。手札の闇属性以外の攻撃力？のレベル１０モンスター１体を墓地へ送り、デッキから以下のモンスター１体またはそのカード名が全て記されたモンスターを全てデッキの一番下に追加する。このスキルの使用後、ターン終了時まで自分は１回しかエクストラデッキからモンスターを特殊召喚できない。<br />このスキルはデッキ（エクストラデッキを除く）に戦士族・光属性モンスターが１０枚以上存在するデッキを設定してデュエルを開始した場合に、使用と適用ができる。<br />●《クィーンズ・ナイト》<br />●《ジャックス・ナイト》<br />●《キングス・ナイト》
