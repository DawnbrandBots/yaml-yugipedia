  | romaji_name           = Gureisufuru Bureido
  | text                  = This Skill can only be used once per turn. On the turn that you use this Skill, you cannot Special Summon (excluding Special Summons from the Extra Deck) any monsters except "[[Synchron]]" Tuner monsters and "[[Noble Knight]]" monsters with 800 ATK.<br />1: Send 1 "[[Noble Knight's Spearholder (Duel Links)|Noble Knight's Spearholder]]" from your hand to the Graveyard, then Set 1 "[[Polymerization (Duel Links)|Polymerization]]" from outside of your Deck to your field, and send 1 "[[Fleur Synchron (Duel Links)|Fleur Synchron]]" from outside of your Deck to your Graveyard. Then, you can add 1 "Noble Knight" monster with 800 ATK or 1 "[[Fleuret de Fleur (Duel Links)|Fleuret de Fleur]]" from your Deck or Graveyard to your hand.
  | fr_text               = Cette Compétence ne peut être utilisée qu'une fois par tour. Lors du tour pendant lequel vous utilisez cette Compétence, vous ne pouvez pas Invoquer Spécialement de monstres (hors Invocations Spéciales depuis l'Extra Deck), excepté des Monstres Syntoniseurs "Synchronique" et des monstres "Chevalier Noble" avec 800 ATK.<br />1 : Envoyez 1 "Lancier Chevalier Noble" de votre main au Cimetière, Posez 1 "Polymérisation" depuis l'extérieur de votre Deck sur votre Terrain, puis envoyez 1 "Fleur Synchronique" depuis l'extérieur de votre Deck à votre Cimetière. Ensuite, vous pouvez ajouter 1 monstre "Chevalier Noble" avec 800 ATK ou 1 "Fleuret de Fleur" depuis votre Deck ou Cimetière à votre main.
  | ja_text               = このスキルは１ターンに１度しか使用できず、このスキルを発動するターン、自分は「シンクロン」チューナーまたは攻撃力８００の「聖騎士」モンスターしか特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。<br />①手札の「聖騎士の槍持ち」１体を墓地へ送って発動できる。デッキ外から「融合」１枚を自分フィールドにセットし、デッキ外から「フルール・シンクロン」１体を墓地へ送る。その後、自分のデッキ・墓地から攻撃力８００の「聖騎士」モンスター１体または「フルール・ド・ヴェルティージュ」１枚を手札に加えることができる。
