  {{Duel Links Skill
  | fr_name               = Souvenirs entremêlés
  | ja_name               = 紡がれし記憶
  | romaji_name           = Tsumugareshi Kioku
  | text                  = You can use this Skill's second effect once per turn and twice per Duel.<br />1: You cannot Normal or Special Summon (excluding Special Summons from the Extra Deck) any monsters except for cards that mention "[[Fallen of Albaz (Duel Links)|Fallen of Albaz]]" or "Fallen of Albaz", or "[[Ecclesia (archetype)|Ecclesia]]", "[[Tri-Brigade]]", "[[Springans]]", "[[Swordsoul]]", or "[[Icejade]]" monsters. If your opponent has a card on their field or their Graveyard, you can Normal Summon 1 monster during your Main Phase in addition to your Normal Summon/Set.<br />2: Reveal 1 "Fallen of Albaz" or 1 monster that mentions it, then add a total of 2 cards among "Ecclesia", "Tri-Brigade", "Springans", "Swordsoul", "Icejade" cards and/or "[[Branded in High Spirits (Duel Links)|Branded in High Spirits]]" from your Deck to your hand.
  | fr_text               = Vous pouvez utiliser le deuxième effet de cette Compétence une fois par tour et deux fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres (hors Invocations Spéciales de l'Extra Deck), excepté des cartes qui mentionnent "Albaz le Déchu" ou "Albaz le Déchu", ou des monstres "Ecclésia", "Tri-Brigade", "Springans", "Âmépée" et "Jadeglace". Si votre adversaire a une carte sur son Terrain ou dans son Cimetière, vous pouvez Invoquer Normalement 1 monstre pendant votre Main Phase, en plus de votre Invocation Normale/Pose habituelle.<br />2 : Révélez 1 "Albaz le Déchu" ou 1 monstre qui en fait mention, puis ajoutez un total de 2 cartes parmi les cartes "Ecclésia", "Tri-Brigade", "Springans", "Âmépée", "Jadeglace" et/ou "Marqué de Bonne Humeur" de votre Deck à votre main.
  | ja_text               = このスキルの②の効果は１ターンに１度、デュエル中に２度まで使用できる。<br />①：自分は「アルバスの落胤」、「アルバスの落胤」のカード名が記されたモンスター、「エクレシア」「トライブリゲード」「スプリガンズ」「相剣」「氷水」モンスターしか召喚・特殊召喚できず（ＥＸデッキからの特殊召喚を除く）、相手のフィールドか墓地にカードが存在する限り、通常召喚に加えて１度だけ、自分メインフェイズにモンスター１体を召喚できる。<br />②：手札から「アルバスの落胤」またはそのカード名が記されたモンスター１体を見せて発動できる。デッキから「エクレシア」「トライブリゲード」「スプリガンズ」「相剣」「氷水」カードまたは「烙印の気炎」を合計２枚手札に加える。その後、自分の手札を１枚選び、デッキに戻すか墓地へ送る。
