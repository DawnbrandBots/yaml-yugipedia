title: Princess Adena's Protection
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Protection de Princesse Adena
  | ja_name  = 
  | text     = You can only use this Skill's second and third effects once per Duel.<br/>1: During this Duel, any effect damage your cards would inflict to your opponent becomes 0.<br/>2: During your Main Phase, play 1 "[[Mystical Elf (Duel Links)|Mystical Elf]]" from outside your Deck in face-down Defense Position. (Its battle position can be changed.) <br/>3: If you control a "Mystical Elf", draw 1 card and excavate the top 2 cards of your Deck. Then, add 1 of the cards to your hand and shuffle the other back into your Deck.
  | fr_text  = Vous ne pouvez utiliser le deuxième et le troisième effet de cette Compétence qu'une seule fois par Duel.<br/>1 : Lors de ce Duel, tous les dommages d'effets que vos cartes infligeraient normalement à votre adversaire tombent à 0.<br/>2 : Pendant votre Main Phase, jouez 1 "Elfe Mystique" depuis l'extérieur de votre Deck en Position de Défense face verso. (Sa position de combat peut être modifiée.)<br/>3 : Si vous contrôlez 1 "Elfe Mystique", piochez 1 carte et dévoilez les 2 cartes du dessus de votre Deck. Puis, ajoutez 1 de ces cartes à votre main et mélangez l'autre dans votre Deck.
