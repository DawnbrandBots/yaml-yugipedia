title: Battle! Ancient Gear
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Bats-toi ! Rouages Ancients
  | ja_name               = 競闘！古代の機械
  | romaji_name           = Kyōtō! Antīku Gia
  | translated_name       = Battle! Antique Gear
  | text                  = Each of the following effects can be used once per turn and twice per Duel.
  * During this turn, you can Normal Summon/Set "[[Ancient Gear Golem (Duel Links)|Ancient Gear Golem]]" or "[[Ancient Gear Golem - Ultimate Pound (Duel Links)|Ancient Gear Golem - Ultimate Pound]]" without Tributing.
  * If you control "Ancient Gear Golem", Set 1 "[[Polymerization (Duel Links)|Polymerization]]" from outside of your Deck. During the End Phase of this turn, return that card to the very bottom of your Deck.
  This Skill can only be used if you begin the Duel with a Deck (excluding Extra Deck) that contains at least 12 Level 8 or lower "[[Ancient Gear]]" monsters.
  | fr_text               = Chacun des effets suivants peut être utilisé une fois par tour et deux fois par Duel.
  * Lors de ce tour, vous pouvez Invoquer Normalement/Poser "Golem Rouages Ancients" ou "Golem Rouages Ancients - Frappe Ultime" sans Sacrifice.
  * Si vous contrôlez "Golem Rouages Ancients", Posez 1 "Polymérisation" sur votre Terrain depuis l'extérieur de votre Deck. Durant l'End Phase de ce tour, remettez cette carte en dessous du Deck.
  Cette Compétence ne peut être utilisée que si vous commencez le Duel avec un Deck (hors Extra Deck) contenant au moins 12 monstres "Rouages Ancients" de max. Niveau 8, et uniquement des monstres "Rouages Ancients" de max. Niveau 8.
  | ja_text               = 以下のそれぞれの効果を１ターンに１度、デュエル中に２度ずつ使用できる。<br />●このターン、自分は「古代の機械巨人」または「古代の機械巨人－アルティメット・パウンド」を通常召喚する場合に必要なリリースが無くなる。<br />●自分フィールドに「古代の機械巨人」が存在する場合、デッキ外から「融合」１枚を自分フィールドにセットする。このターンのエンドフェイズに、そのカードをデッキの一番下に戻す。<br />このスキルはレベル８以下の「アンティーク・ギア」モンスターが１２枚以上存在し、それ以外のモンスターが存在しないデッキ（エクストラデッキを除く）を設定してデュエルを開始した場合に使用できる。
