title: Hero Shall Cast Its Light
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Lumière du Héros
  | ja_name               = 覚醒の閃光
  | romaji_name           = Kakusei no Senkō
  | translated_name       = Flash of Awakening
  | text                  = At the beginning of the Duel, add Pendulum Zones to your field.<br />If you control "[[Timebreaker Magician (Duel Links)|Timebreaker Magician]]", the following effects can be used once per Duel.
  * Add 1 "[[Tuning Magician (Duel Links)|Tuning Magician]]" from your Deck to your hand.
  * Change the Level of 1 Level 3 or lower [[Spellcaster]]-Type monster you control to 4. 
  During the turn you use this effect, you cannot use that monster as a material for [[Xyz Summon|Xyz Summoning]] a monster, and Spellcaster-Type [[Synchro Monster|Synchro Monsters]] you control gain 500 ATK.<br />This Skill can only be used/applied if you begin the Duel with an Extra Deck that contains at least 3 Synchro Monsters, including "[[Enlightenment Paladin (Duel Links)|Enlightenment Paladin]]".
  | fr_text               = Au début du Duel, ajoutez des Zones Pendule sur votre Terrain.<br />Si vous contrôlez "Magicien Briseur du Temps", vous pouvez utiliser les effets suivants une fois par Duel.
  * Ajoutez 1 "Magicienne du Réglage" de votre Deck à votre main.
  * Le Niveau d'1 monstre de Type Magicien de Niveau 3 ou moins que vous contrôlez passe à 4. Pendant le tour où vous utilisez cet effet, vous ne pouvez pas utiliser ce monstre comme Matériel pour Invoquer par Xyz un monstre, et les Monstres Synchro de Type Magicien que vous contrôlez gagnent 500 ATK.
  Cette Compétence ne peut être utilisée/appliquée que si vous commencez le Duel avec un Extra Deck contenant au moins 3 Monstres Synchro, dont "Paladin de l'Illumination."
  | ja_text               = デュエル開始時に自分フィールドにペンデュラムゾーンを追加する。<br />また、自分フィールドに「刻剣の魔術師」が存在する場合、以下の効果をデュエル中に１度ずつ使用できる。<br />●デッキから「調律の魔術師」１体を手札に加える。<br />●自分フィールドのレベル３以下の魔法使い族モンスター１体のレベルを４にする。このターン、そのモンスターはエクシーズ召喚の素材にできず、自分フィールドの魔法使い族シンクロモンスターの攻撃力は５００アップする。<br />このスキルはエクストラデッキに「覚醒の魔導剣士」を含むシンクロモンスターが３枚以上存在するデッキを設定してデュエルを開始した場合に、使用と適用ができる。
