  | text                  = You can only use the Skill's second effect once per Duel.<br />1: At the beginning of the Duel, if your Extra Deck does not contain "[[Lyrilusc - Assembled Nightingale]]", add 1 "Lyrilusc - Assembled Nightingale" to your Extra Deck.<br />2: Can be used before your normal draw if your LP are at 3000 or below. One of the cards from your normal draw this turn will be a random Level 1 [[Winged Beast]] monster from your Deck.
  | fr_text               = Vous ne pouvez utiliser le deuxième effet de cette Compétence qu'une fois par Duel.<br />1 : Au début du Duel, si votre Extra Deck ne contient pas "Lyrilusc - Rossignol Assemblé", ajoutez 1 "Lyrilusc - Rossignol Assemblé" à votre Extra Deck.<br />2 : Cette Compétence peut être utilisée avant votre pioche normale si vos LP sont de 3 000 ou moins. L'une des cartes de votre pioche normale de ce tour sera un monstre Bête Ailée de Niveau 1 aléatoire de votre Deck.
  | ja_text               = このスキルの②の効果はデュエル中に１度しか使用できない。<br />①：デュエル開始時に発動する。ＥＸデッキに「ＬＬ－アセンブリー・ナイチンゲール」が存在しない場合、ＥＸデッキに「ＬＬ－アセンブリー・ナイチンゲール」を１体追加する。<br />②：自分のＬＰが３０００以下の場合、自分の通常のドロー前に発動できる。このターンの通常のドロー１枚はデッキからランダムに選んだ鳥獣族・レベル１モンスターになる。
