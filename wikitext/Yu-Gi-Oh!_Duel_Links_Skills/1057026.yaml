title: Raider's Revolution
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Révolution du maraudeur
  | ja_name             = レイダーズ・レヴォリューション
  | romaji_name         = Reidāzu Revoryūshon
  | text                = You can only use this Skill's second and third effects once per Duel.<br />1. You cannot Special Summon monsters except for "[[Raidraptor]]" monsters and Xyz Monsters.<br />2. Shuffle 1 "[[Phantom Knights' Rank-Up-Magic Force (Duel Links)|Phantom Knights' Rank-Up-Magic Force]]" from your hand into the Deck, and then add 1 "Raidraptor" monster from your Deck to your hand.<br />3. Send 1 monster from your hand or field to the Graveyard, and then add 1 "[[Rank-Up-Magic]]" Spell Card from your Deck to your hand and Set 1 "[[Raider's Unbreakable Mind (Duel Links)|Raider's Unbreakable Mind]]" from outside of your Deck to your field. (It can be activated this turn.) If your opponent controls a monster, you can also play 1 "Raidraptor" monster from your Deck to your field in face-down Defense Position. (Its battle position can be changed.)
  | fr_text             = Vous pouvez utiliser le deuxième et le troisième effet de cette Compétence une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Spécialement de monstres, sauf des monstres "Raidraptor" et des Monstres Xyz.<br />2 : Mélangez 1 "Force Magie-Rang-Plus des Chevaliers Fantômes" de votre main dans votre Deck, puis ajoutez 1 monstre "Raidraptor" de votre Deck à votre main.<br />3 : Envoyez 1 monstre de votre main ou Terrain au Cimetière, puis ajoutez 1 Carte Magie "Magie-Rang-Plus" de votre Deck à votre main et Posez 1 "Mentalité Inébranlable du Raid" depuis l'extérieur de votre Deck sur votre Terrain. (Peut être activé ce tour.) Si votre adversaire contrôle un monstre, vous pouvez aussi jouer 1 monstre "Raidraptor" de votre Deck sur votre Terrain en Position de Défense face verso. (Sa position de combat peut être modifiée.)
  | ja_text             = このスキルの②③の効果はそれぞれデュエル中に１度しか使用できない。<br />①：自分は「ＲＲ」モンスター及びエクシーズモンスターしか特殊召喚できない。<br />②：手札の「ＲＵＭ－ファントム・フォース」１枚をデッキに戻して発動できる。デッキから「ＲＲ」モンスター１体を手札に加える。<br />③：自分の手札・フィールドからモンスター１体を墓地へ送って発動できる。デッキから「ＲＵＭ」魔法カード１枚を手札に加え、デッキ外から「レイダーズ・アンブレイカブル・マインド」１枚を自分フィールドにセットする（このターンから発動可能）。相手フィールドにモンスターが存在する場合、さらにデッキから「ＲＲ」モンスター１体を裏側守備表示で出す事ができる（表示形式変更可能）。
