title: Winter Bell Accel
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Axel Hiver Clochette
  | ja_name             = ウィンター・ベル・アクセル
  | romaji_name         = Wintā Beru Akuseru
  | text                = You can only use this Skill's second, third, and fourth effects once per Duel.<br />1: You cannot Normal or Special Summon (excluding Special Summons from the Extra Deck) any monsters, except "[[Windwitch]]" monsters and [[WIND]] Tuners, and your opponent takes no damage from your effects, except the effects of "Windwitch" cards.<br />2: Reveal 1 "[[Windwitch - Snow Bell (Duel Links)|Windwitch - Snow Bell]]" or "[[Windwitch Chimes (Duel Links)|Windwitch Chimes]]" in your hand, then add 1 "Windwitch" monster from your Deck to your hand.<br />3: If you control a "Windwitch" [[Synchro Monster]], play 1 "Windwitch - Snow Bell" from your Deck to your field.<br />4: Shuffle 1 Tuner from your Graveyard into the Deck, then add 1 "Windwitch" Tuner from your Deck to your hand.
  | fr_text             = Vous pouvez utiliser les deuxième, troisième et quatrième effets de cette Compétence une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Normalement ou Spécialement (hors Invocations Spéciales depuis l'Extra Deck) de monstres, excepté des monstres "Sorcièrevent" et des Syntoniseurs VENT, et votre adversaire ne subit pas de dommages d'effet de vos effets, excepté les effets des Cartes "Sorcièrevent".<br />2 : Mélangez 1 "Sorcièrevent - Neige Clochette" ou 1 "Carillons Sorcièrevent" de votre main dans votre Deck, puis ajoutez 1 monstre "Sorcièrevent" de votre Deck à votre main.<br />3 : Si vous contrôlez un Monstre Synchro "Sorcièrevent", jouez 1 "Sorcièrevent - Neige Clochette" depuis votre Deck sur votre Terrain.<br />4 : Mélangez 1 Syntoniseur de votre Cimetière dans votre Deck, puis ajoutez 1 Syntoniseur "Sorcièrevent" de votre Deck à votre main.
  | ja_text             = このスキルの②③④の効果はそれぞれデュエル中に１度しか使用できない。<br />①：自分は「ＷＷ」モンスター及び風属性チューナーしか召喚・特殊召喚できず、（ＥＸデッキからの特殊召喚を除く）、「ＷＷ」カード以外の自分の効果で発生する相手への効果ダメージは０になる。<br />②：手札の「ＷＷ－スノウ・ベル」１体か「ＷＷの鈴音」１枚をデッキに戻して発動できる。デッキから「ＷＷ」モンスター１体を手札に加える。<br />③：自分フィールドに「ＷＷ」シンクロモンスターが存在する場合に発動できる。デッキから「ＷＷ－スノウ・ベル」１体を出す。<br />④：自分の墓地のチューナー１体をデッキに戻して発動できる。デッキから「ＷＷ」チューナー１体を手札に加える。
