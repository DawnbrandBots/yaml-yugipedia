title: Performage Showdown
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Performance Mageartiste
  | ja_name             = Ｅｍショーダウン
  | romaji_name         = Entāmeiji Shōdaun
  | translated_name     = Entermage Showdown
  | text                = You can only use this Skill's second, third, and fourth effects once per turn.<br />1: You cannot [[Special Summon]] (excluding Special Summons from the [[Extra Deck]]) monsters, except for "[[Performage]]" and Level 4 [[Spellcaster]] monsters.<br />2: Send 1 "Performage" monster from your hand to the [[Graveyard]], and then add 1 "Performage" monster from your Deck or 1 "[[Polymerization (Duel Links)|Polymerization]]" from outside of your Deck to your hand.<br />3: Shuffle 1 monster on your field into the Deck, and then play 1 "Performage" monster from your Deck to your field in face-down Defense Postion. (Its battle position can be changed.)<br />4: If you control 4 face-up monsters on your field, reveal 1 "Polymerization" in your hand, and then all of the monsters on your field can be treated as "[[Ancient Gear]]" monsters when used as Fusion Materials this turn.
  | fr_text             = Vous pouvez utiliser le deuxième, troisième et quatrième effet de cette Compétence une fois par tour.<br />1 : Vous ne pouvez pas Invoquer Spécialement de monstres (hors Invocations Spéciales depuis l'Extra Deck), sauf des Monstres "Mageartiste" et des monstres de Type Magicien de Niveau 4.<br />2 : Envoyez 1 monstre "Mageartiste" de votre main au Cimetière, puis ajoutez 1 monstre "Mageartiste" de votre Deck ou 1 "Polymérisation" depuis l'extérieur de votre Deck à votre main.<br />3 : Mélangez 1 monstre sur votre Terrain dans le Deck, puis jouez 1 monstre "Mageartiste" de votre Deck sur votre Terrain en Position de Défense face verso. (Sa position de combat peut être modifiée.)<br />4 : Si vous contrôlez 4 monstres face recto, révélez 1 "Polymérisation" dans votre main, puis tous les monstres sur votre Terrain peuvent être traités comme des monstres "Rouages Ancients" lorsqu'ils sont utilisés comme Matériels de Fusion ce tour.
  | ja_text             = このスキルの②③④の効果はそれぞれ１ターンに１度しか発動できない。<br />①：自分は「Ｅｍ」モンスターまたは魔法使い族・レベル４モンスターしか特殊召喚できない（ＥＸデッキからの特殊召喚を除く）。<br />②：手札の「Ｅｍ」モンスター１体を墓地へ送って発動で白きる。デッキの「Ｅｍ」モンスター１体かデッキ外の「融合」１枚を手札に加える。<br />③：自分フィールドのモンスター１体をデッキに戻して発動できる。デッキから「Ｅｍ」モンスター１体を裏側守備表示で出す（表示形式変更可能）。<br />④：自分フィールドに表側表示モンスターが４体存在する上場合、手札の「融合」１枚を相手に見せて発動できる。自分フィールドの全てのモンスターはこのターン、「アンティーク・ギア」モンスターとして融合素材にできる。
