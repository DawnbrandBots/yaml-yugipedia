title: Roaring Soul
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Âme Rugissante
  | ja_name             = 荒ぶる魂
  | romaji_name         = Araburu Tamashī
  | translated_name     = Savage Soul
  | text                = This Skill can only be used once per Duel by sending 1 [[Fiend]]-Type monster from your hand to your [[Graveyard]].<br />Send 1 "[[Resonator]]" monster or 1 Level 4 [[DARK]] Fiend-Type monster from your Deck to your Graveyard. Then, add 1 Level 4 [[FIRE]] Fiend-Type monster to your hand. You cannot [[Special Summon]] monsters during this Duel, except for [[Synchro Monster]]s, [[Tuner monster]]s, and Special Summoning from the hand.<br />You can also use each of the following effects once per Duel, and max. one effect per turn.
  * If you control "[[Red Dragon Archfiend (Duel Links)|Red Dragon Archfiend]]," return 1 Fiend-Type monster on your field and 1 in your hand to your Deck. Then, Set 1 "[[Red Reign (Duel Links)|Red Reign]]" to your field from your Deck.
  * During this turn, [[Defense Position]] "Resonator" monsters you control cannot be destroyed by card effects.
  | fr_text             = Cette Compétence ne peut être utilisée qu'une seule fois par Duel en envoyant 1 monstre de Type Démon de votre main au Cimetière. Envoyez 1 monstre "Diapason" ou 1 monstre TÉNÈBRES de Type Démon de Niveau 4 de votre Deck au Cimetière. Ensuite, ajoutez 1 monstre FEU de Type Démon de Niveau 4 à votre main. Vous ne pouvez pas Invoquer Spécialement des monstres lors de ce Duel, à l'exception des Monstres Synchro, des Monstres Syntoniseurs, et des Invocations Spéciales depuis votre main.<br />Vous pouvez également utiliser chacun des effets suivants une fois par Duel, et un effet par tour maximum.
  * Si vous contrôlez "Dragon Rouge Archdémon", renvoyez 1 monstre de Type Démon sur votre Terrain et 1 dans votre main dans votre Deck. Ensuite, Posez 1 "Règne Rouge" sur votre Terrain depuis votre Deck.
  * Pendant ce tour, les monstres "Diapason" en Position de Défense que vous contrôlez ne peuvent pas être détruits par des effets de carte.
  | ja_text             = 手札の悪魔族モンスター１体を墓地へ送ってデュエル中に１度だけ使用できる。デッキの「リゾネーター」モンスターまたは悪魔族・闇属性・レベル４モンスター１体を墓地へ送り、デッキから悪魔族・炎属性・レベル４モンスター１体を手札に加える。このデュエル中、自分はシンクロモンスターまたはチューナーしか特殊召喚できない。（手札からの特殊召喚は除く）また、以下のいずれかの効果を１ターンに１度、それぞれの効果をデュエル中に１度ずつ使用できる。<br />●自分フィールドに「レッド・デーモンズ・ドラゴン」が存在する場合、自分の手札及びフィールドから悪魔族モンスターを１体ずつデッキに戻し、デッキから「スカーレッド・レイン」１枚をセットする。<br />●このターン、自分フィールドの守備表示の「リゾネーター」モンスターはカードの効果では破壊されない。
