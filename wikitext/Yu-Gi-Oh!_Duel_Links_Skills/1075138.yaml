title: Shark Magic Combo
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Combo Magique Requin
  | ja_name               = シャーク・マジックコンボ
  | romaji_name           = Shāku Majikku Konbo
  | text                  = You can only use this Skill's second, third, and fourth effects once per Duel.<br />1: You cannot Normal or Special Summon monsters with a Level, except for [[Fish]] monsters.<br />2: Send 1 Fish "[[Shark (archetype)|Shark]]" monster from your hand and 1 from your Deck to the [[Graveyard]], and then add 1 "[[Aqua Jet (Duel Links)|Aqua Jet]]" from outside of your Deck to your hand.<br />3: Reveal 1 [[Spell Card]] in your hand, then take 1 card from your hand or Graveyard and attach it to 1 [[Xyz Monster]] on your field as [[Xyz Material]].<br />4: If your opponent controls a card, add 1 "[[Armored Xyz (Duel Links)|Armored Xyz]]" from outside of your Deck to your hand, then play 1 "[[Black Ray Lancer (Duel Links)|Black Ray Lancer]]" from outside of your Deck to your field in face-down Defense Position. (Its battle position can be changed.)
  | fr_text               = Vous pouvez utiliser les deuxième, troisième et quatrième effets de cette Compétence une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Normalement ou Spécialement des monstres avec un Niveau, à l'exception des monstres Poisson.<br />2 : Envoyez 1 monstre Poisson "Requin" de votre main et 1 de votre Deck au Cimetière, puis ajoutez 1 monstre "Jet Aqua" depuis l'extérieur de votre Deck à votre main.<br />3 : Révélez 1 Carte Magie dans votre main, puis prenez 1 carte de votre main ou Cimetière et attachez-la à 1 Monstre Xyz sur votre Terrain en tant que Matériel Xyz.<br />4 : Si votre adversaire contrôle une carte, ajoutez 1 "Blindé Xyz" depuis l'extérieur de votre Deck à votre main, puis jouez 1 "Lancier Rayon Sombre" depuis l'extérieur de votre Deck sur votre Terrain en Position de Défense face verso. (Sa position de combat peut être modifiée.)
  | ja_text               = このスキルの②③④の効果はそれぞれデュエル中に１度しか使用できない。<br />①：自分は魚族モンスターしかレベルを持つモンスターを召喚・特殊召喚できない。<br />②：手札・デッキからそれぞれ１体ずつ魚族の「シャーク」モンスターを墓地へ送って発動できる。デッキ外から「アクア・ジェット」１枚を手札に加える。<br />③：手札の魔法カード１枚を相手に見せて発動できる。自分の手札・墓地のカード１枚を自分フィールドのエクシーズモンスター１体のエクシーズ素材とする。<br />④：相手フィールドにカードが存在する場合に発動できる。デッキ外から「アーマード・エクシーズ」１枚を手札に加え、デッキ外から「ブラック・レイ・ランサー」１体を裏側守備表示で出す（表示形式変更可能）。
