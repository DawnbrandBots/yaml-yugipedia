  | text        = You can only use this Skill if your Extra Deck contains a [[WIND]] [[Xyz Monster]].<br />1: At the beginning of the Duel, gain 1500 Life Points.<br />2: Once per turn, during your Main Phase, you can choose 1 face-up monster you control, and it gains 300 ATK until the end of this turn. It gains an additional 500 ATK until the end of this turn, if you have a WIND monster on your field and/or in your [[Graveyard]], and you have an Xyz Monster on your field and/or in your Graveyard.
