  | ja_text     = このスキルはＥＸデッキに風属性エクシーズモンスターを入れている場合に使用できる。<br />①：デュエル開始時に発動する。自分は１５００ＬＰ回復する。<br />②：１ターンに１度、自分メインフェイズに発動できる。自分フィールドの表側表示モンスター１体を選び、その攻撃カをターン終了時まで３００アップする。自分のフィールドまたは墓地に風属性モンスター及びエクシーズモンスターが存在する場合、さらに選んだモンスターの攻撃力はターン終了時まで５００アップする。
