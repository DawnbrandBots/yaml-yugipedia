title: Indestructible Spright
wikitext: |-
  {{Duel Links Skill
  | text        = You can only use this Skill's second and third effects once per Duel.<br />1: You cannot Normal or Special Summon (excluding Special Summons from the Extra Deck) any monsters, except Level 2, Rank 2, Link-2 monsters.<br />2: Reveal 1 "Spright" monster from your hand, then add 1 "Spright" monster with a different Attribute from your Deck to your hand, and add 1 "Spright Elf" from outside your Deck into your Extra Deck. Then, you can shuffle 1 card from your hand into your Deck.<br />3: If only your opponent controls a card, choose 2 "Spright" Spell/Trap Cards from your Deck and set 1 to your field. (This card can be activated the same turn.) Send the other card to your Graveyard.
