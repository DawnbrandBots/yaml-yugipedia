title: Indestructible Spright
wikitext: |-
  {{Duel Links Skill
  | fr_name     = Spright Indestructible
  | text        = You can only use this Skill's second and third effects once per Duel.<br />1: You cannot Normal or Special Summon (excluding Special Summons from the Extra Deck) any monsters, except Level 2, Rank 2, Link-2 monsters.<br />2: Reveal 1 "[[Spright]]" monster from your hand, then add 1 "Spright" monster with a different Attribute from your Deck to your hand, and add 1 "[[Spright Elf (Duel Links)|Spright Elf]]" from outside your Deck into your Extra Deck. Then, you can shuffle 1 card from your hand into your Deck.<br />3: If only your opponent controls a card, choose 2 "Spright" Spell/Trap Cards from your Deck and set 1 to your field. (This card can be activated the same turn.) Send the other card to your Graveyard.
  | fr_text     = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Normalement ou Spécialement de monstres, excepté des monstres de Niveau 2, Rang 2 ou Lien-2 (hors Invocations Spéciales depuis l'Extra Deck).<br />2 : Révélez 1 monstre "Spright" de votre main, puis ajoutez 1 monstre "Spright" avec un Attribut différent de votre Deck à votre main, puis ajoutez 1 "Spright de l'Elfe" depuis l'extérieur de votre Deck dans votre Extra Deck. Puis, vous pouvez mélanger 1 carte de votre main dans votre Deck.<br />3 : Si seul votre adversaire contrôle une carte, choisissez 2 Cartes Magie/Piège "Spright" de votre Deck et Posez-en 1 sur votre Terrain (cette carte peut être activée durant le même tour). Envoyez l'autre carte dans votre Cimetière.
