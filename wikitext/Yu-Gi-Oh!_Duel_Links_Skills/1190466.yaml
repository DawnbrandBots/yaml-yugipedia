  | text                  = If your [[Life Points]] are at 4000 or below, play 1 "[[Superdreadnought Rail Cannon Gustav Max (Duel Links)|Superdreadnought Rail Cannon Gustav Max]]" from outside of your Deck at the beginning of your turn, then choose 2 level 10 [[Machine]] monsters from your hand, Deck, or Graveyard and attach them to it as [[Xyz Material]]. If your Life Points are at 2000 or below, also increase the ATK of all monsters on your field by 500 at the start of your Battle Phase. This [[Skill]] can only be applied once per [[Duel]].
  | fr_text               = Si vos Life Points sont inférieurs ou égaux à 4 000, jouez 1 « Super Cuirassé Canon Ferroviaire » depuis l'extérieur de votre Deck au début de votre tour, puis choisissez 2 monstres de Type Machine Niveau 10 de votre main, de votre Deck ou de votre Cimetière et attachez-les à cette carte comme Matériel Xyz. Si vos Life Points sont de 2 000 ou moins, augmentez aussi de 500 l'ATK de tous les monstres sur votre Terrain au début de votre Battle Phase. Cette Compétence ne peut être appliquée qu'une fois par Duel.
