  | text        = You can use this Skill's first and second effects once per Duel if your Deck contains a total of 10 or more cards that mention "[[Adventurer Token]]".<br/>1: Reveal 1 monster from your hand that mentions "Adventurer Token", then choose 1 card from your hand, and either send it to the GY or shuffle it back into the Deck. Then, add 2 monsters that mention "Adventurer Token" from your Deck to your hand.<br/>2: If you control an "Adventurer Token" and a monster that mentions "Adventurer Token", or if your opponent controls a monster, add 1 "[[Curse of Aramatir (Duel Links)|Curse of Aramatir]]" from outside your Deck to your hand and Set 1 Trap Card that mentions "Adventurer Token" from outside your Deck. (This card can be activated the same turn.)
  | fr_text     = Vous pouvez utiliser le premier et le deuxième effet de cette Compétence une fois Duel si votre Deck contient au moins 10 cartes qui mentionnent "Jeton Aventurier".<br />1 : Révélez 1 monstre de votre main qui mentionne "Jeton Aventurier", puis choisissez 1 carte de votre main et envoyez-la au Cimetière ou mélangez-la dans le Deck. Puis, ajoutez 2 monstres qui mentionnent "Jeton Aventurier" de votre Deck à votre main.<br />2 : Si vous contrôlez un "Jeton Aventurier" et un monstre qui mentionne "Jeton Aventurier", ou si votre adversaire contrôle un monstre, ajoutez 1 "Malédiction d'Aramatir" depuis l'extérieur de votre Deck à votre main et Posez 1 Carte Piège qui mentionne "Jeton Aventurier" depuis l'extérieur de votre Deck. (Cette carte peut être activée durant le même tour.)
