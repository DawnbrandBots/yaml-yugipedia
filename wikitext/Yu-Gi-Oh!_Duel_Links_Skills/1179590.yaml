  {{Duel Links Skill
  | name     = 1: Dueling Is Ramen
  | fr_name  = N° 1 : Duel et ramen, même combat
  | text     = '''[REQUIREMENT]''' Can be activated from turn 2 onward by revealing 1 Level 7 or 8 monster from your hand during a turn in which you have not [[Fusion Summon]]ed a monster, if all of the monsters in your constructed Deck are [[FIRE]] Attribute [[Pyro]] Type monsters, and all of the Level 5 or higher monsters have 0 DEF.<br />'''[EFFECT]''' Add up to 2 monsters from your Deck and/or Graveyard to your hand that are either Normal Monsters, "[[The Noodle Art of Flavor Shift (Duel Links)|The Noodle Art of Flavor Shift]]", or "[[Fusion (Duel Links)|Fusion]]" cards. ("The Noodle Art of Flavor Shift" can only be added once per Duel.) Then, send 1 card from your hand to the Graveyard. This turn, you can only Fusion Summon once.
  | fr_text  = '''[CONDITION]''' Peut être activée à partir du 2e tour en révélant 1 monstre de Niveau 7 ou 8 de votre main pendant un tour où vous n'avez pas Invoqué par Fusion un monstre, si tous les monstres dans votre Deck construit sont des monstres d'Attribut FEU de Type Pyro, et si tous les monstres de min. Niveau 5 ont 0 DEF.<br />'''[EFFET]''' Ajoutez jusqu'à 2 monstres de votre Deck et/ou Cimetière à votre main qui sont soit des Monstres Normaux, soit des cartes "L'Art des Nouilles de l'Évolution des Saveurs" ou "Fusion" ("L'Art des Nouilles de l'Évolution des Saveurs" ne pouvant être ajoutée qu'une fois par Duel). Puis, envoyez 1 carte depuis votre main au Cimetière. Ce tour, vous ne pouvez Invoquer par Fusion qu'une seule fois.
