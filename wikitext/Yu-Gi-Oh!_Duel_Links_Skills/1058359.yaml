  | ja_text             = このスキルはデッキ（ＥＸデッキを除く）に、光属性または魔法使い族の、レベル４以下のモンスターを８体以上入れているデッキで、デュエル中に１度使用できる。①：自分メインフェイズに発動できる。自分の墓地の、光属性または魔法使い族のモンスター３体をデッキに戻す。その後、デッキから「Ｅｍ」モンスター１体を選んで手札に加えるか墓地へ送る事ができる。
