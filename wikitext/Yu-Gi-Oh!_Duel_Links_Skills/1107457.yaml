title: 'Destiny Draw: Pride and Soul'
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Pioche de la Destinée : Fierté et Âme
  | ja_name             = 誇りと魂のディスティニー・ドロー
  | romaji_name         = Hokori to Tamashī no Disutinī Dorō
  | text                = You can only use this Skill's first and second effects once per Duel.<br />1: Can be activated before your normal draw. One of the cards from your normal draw this turn will be 1 "[[Dragon of Pride and Soul (Duel Links)|Dragon of Pride and Soul]]" from your Deck. Send all other cards from your hand, Deck, Extra Deck, and field to the Graveyard, and return all of your banished cards to the Graveyard. Then, if you have 25 or more cards in your Graveyard, randomly send 25 cards with the same names as those in your Graveyard from outside of your Deck to your opponent's Graveyard. After using this Skill, you cannot Normal/Special Summon monsters, except "Dragon of Pride and Soul", nor activate card effects for the rest of this Duel.<br />2: Place 1 "Dragon of Pride and Soul" from your hand on the bottom of your Deck, then draw 2 cards.
  | fr_text             = Vous ne pouvez utiliser le premier et deuxième effets de cette Compétence qu'une seule fois par Duel.<br />1 : Cette Compétence peut être activée avant votre pioche normale. L'une des cartes de votre pioche normale de ce tour sera 1 "Dragon de la Fierté et de l'Âme" depuis votre Deck. Envoyez toutes les autres cartes dans votre main, Deck, Extra Deck et Terrain au cimetière, et renvoyez toute vos cartes bannies au Cimetière. Puis, si vous avez au moins 25 cartes dans votre Cimetière, envoyez au hasard 25 cartes ayant le même nom que celles dans votre Cimetière depuis l'extérieur de votre Deck vers le Cimetière de votre adversaire. Après avoir utilisé cette Compétence, vous ne pouvez pas Invoquer Normalement ou Spécialement un monstre autre que "Dragon de la Fierté et de l'Âme", ni activer d'effets de carte pour le reste du Duel.<br />2 : Placez 1 "Dragon de la Fierté et de l'Âme" de votre main au-dessous du Deck, puis piochez 2 cartes.
  | ja_text             = このスキルの①②の効果はそれぞれデュエル中に１度しか使用できない。<br />①：自分の通常のドロー前に発動できる。このターンの通常のドロー１枚はデッキの「誇りと魂の龍」になり、それ以外の自分の手札・デッキ・ＥＸデッキ・フィールドのカードを全て墓地へ送り、自分の除外状態のカードを全て墓地に戻す。その後、自分の墓地のカードが２５枚以上存在する場合、その中からランダムに２５枚選んでその同名カードをデッキ外から相手の墓地へ送る。このデュエル中、自分はカードの効果を発動できず、「誇りと魂の龍」以外のモンスターを召喚・特殊召喚できない。<br />②：手札の「誇りと魂の龍」１枚をデッキの一番下に戻して発動できる。自分は２枚ドローする。
