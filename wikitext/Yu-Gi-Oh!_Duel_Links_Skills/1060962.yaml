title: Traptrix's Ground
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Terrain de Traptrix
  | ja_name             = 蟲惑の箱庭
  | romaji_name         = Kowaku no Hakoniwa
  | translated_name     = Tantalizing Terrarium
  | text                = You can use this Skill's first and second effects if your Deck (excluding Extra Deck) contains 12 or more "[[Traptrix]]" monsters, and all of the monsters in your Extra Deck are Xyz Monsters.<br />1: Once per turn, during your Main Phase, you can play 1 "Traptrix" from your hand to your field.<br />2: Once per Duel, during your Main Phase, if it is turn 2 and onward, you can send 1 "Traptrix" monster or "[[Hole]]" [[Normal Trap Card]] from your hand to the [[Graveyard]], and then add 1 "[[Treacherous Trap Hole (Duel Links)|Treacherous Trap Hole]]" from outside of your Deck to your Deck. Then, you can add 1 "Traptrix" monster or "Hole" Normal Trap Card from your Deck to your hand.
  | fr_text             = Vous pouvez utiliser les deuxième et troisième effets de cette Compétence si votre Deck (hors Extra Deck) contient 12 monstres "Traptrix" ou plus et si tous les monstres de votre Extra Deck sont des Monstres Xyz.<br />1 : Une fois par tour, pendant votre Main Phase, vous pouvez jouer 1 monstre "Traptrix" de votre main sur votre Terrain.<br />2 : Une fois par Duel, pendant votre Main Phase et à partir du tour 2, vous pouvez envoyer 1 monstre "Traptrix" ou une Carte Piège Normal "Trappe" au Cimetière depuis votre main, puis ajoutez 1 Carte "Trappe Perfide" depuis l'extérieur de votre Deck à votre Deck. Ensuite, vous pouvez ajouter 1 monstre "Traptrix" ou une Carte Piège Normal "Trappe" de votre Deck à votre main.
  | ja_text             = このスキルの①②の効果は、デッキ（ＥＸデッキを除く）に「蟲惑魔」モンスターを１２体以上入れていて、自分のＥＸデッキがエクシーズモンスターのみの場合に使用できる。<br />①：１ターンに１度、自分メインフェイズに発動できる。手札から「蟲惑魔」モンスター１体を出す。<br />②：デュエル中に１度、２ターン目以降の自分メインフェイズに発動できる。「蟲惑魔」モンスター、「ホール」通常罠カード、「落とし穴」通常罠カードの内１枚を手札から墓地へ送り、デッキ外から「狡猾な落とし穴」１枚をデッキに追加する。その後、「蟲惑魔」モンスター、「ホール」通常罠カード、「落とし穴」通常罠カードの内１枚をデッキから手札に加える事ができる。
