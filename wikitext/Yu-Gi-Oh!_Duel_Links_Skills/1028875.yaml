title: Secret Cure
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Remède secret
  | ja_name             = シークレットキュア
  | romaji_name         = Shīkuretto Kyua
  | text                = Can be used turn 4 onward, before your normal draw. Instead of conducting your normal draw, excavate cards from your Deck until you excavate a monster (3 cards at maximum). Add the first monster you excavate to your hand, and return the other cards to your Deck.<br />Then, return 1 card from your hand to the Deck, and increase both your and your opponent's Life Points by the ATK of the monster you have added to your hand.<br />This Skill can only be used if you begin the Duel with a Deck (excluding Extra Deck) that contains at least 7 "[[Altergeist]]" monsters, and the same amount of "Altergeist" Trap Cards. This Skill can only be used once per Duel.
  | fr_text             = Cette Compétence peut être utilisée à partir du 4e tour, avant votre pioche normale. Au lieu de piocher normalement, dévoilez des cartes de votre Deck jusqu'à ce que vous dévoiliez un monstre (3 cartes maximum). Ajoutez le premier monstre que vous dévoilez à votre main, et renvoyez les autres cartes dans votre Deck.<br />Ensuite, renvoyez 1 Carte dans votre main au Deck, et augmentez vos Life Points et ceux de votre adversaire d'un montant égal à l'ATK du monstre que vous avez ajouté à votre main.<br />Cette Compétence ne peut être utilisée que si vous commencez le Duel avec un Deck (hors Extra Deck) contenant au moins 7 monstres "Altergeist", et autant de Cartes Piège "Altergeist". Cette Compétence ne peut être utilisée qu'une fois par Duel.
  | ja_text             = ４ターン目以降の自分の通常のドロー前に使用できる。通常のドローの代わりに、モンスターが出るまで自分のデッキをめくる。（最大３枚）。最初に出たモンスターを手札に加え、残りをデッキに戻す。<br />その後、自分の手札を１枚選んでデッキに戻し、このスキルで手札に加えたモンスターの攻撃力分だけお互いのライフポイントを増やす。<br />このスキルはデッキ（エクストラデッキは除く）に「オルターガイスト」モンスターが７体以上存在し、同じ数だけ「オルターガイスト」罠カードが存在するデッキを設定してデュエルを開始した場合に、デュエル中１度のみ使用できる。
