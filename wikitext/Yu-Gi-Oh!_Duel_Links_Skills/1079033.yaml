title: Precious Cards of the Wind
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Précieuses Cartes du Vent
  | ja_name  = 風の宝札
  | text     = You can use this Skill's first effect once per turn and up to twice per Duel if your Deck contains 6 or more [[WIND]] monsters.<br/>1: During your Main Phase, place 1 card from your hand on the bottom of your Deck, or send it to the Graveyard, then draw 2 cards. If it is the first turn of the player going second, draw 1 additional card.
  | fr_text  = Vous pouvez utiliser le premier effet de cette Compétence une fois par tour et jusqu'à deux fois par Duel si votre Deck contient min. 6 monstres VENT.<br/>1 : Pendant votre Main Phase, placez 1 carte de votre main au-dessous de votre Deck ou envoyez-la au Cimetière, puis piochez 2 cartes. S'il s'agit du premier tour du joueur qui joue en deuxième, piochez 1 carte supplémentaire.
  | ja_text  = このスキルの①の効果は風属性モンスターを9体以上入れているデッキでデュエル中に2度まで使用できる。<br>
  ①：自分メインフェイズ開始時に発動できる。自分の手札を1枚選んでデッキの一番下に戻し、自分は1枚ドローする。
