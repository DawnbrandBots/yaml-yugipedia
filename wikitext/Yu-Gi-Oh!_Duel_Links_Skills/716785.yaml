title: Spell of Roses
wikitext: |-
  {{Duel Links Skill
  | fr_name               = Sort de la Rose
  | ja_name               = 薔薇の魔法
  | text                  = Send 1 "[[Rose Dragon]]" [[monster]], "[[Witch of the Black Rose (Duel Links)|Witch of the Black Rose]]," or "[[Rose Fairy (Duel Links)|Rose Fairy]]" from your [[hand]] to the [[Graveyard]]. Then, add 1 "Rose Dragon" monster from your [[Main Deck|Deck]] to your hand. Then, you can add 1 "Rose Fairy" from outside of your Deck to the top or bottom of the Deck. On the turn you use this Skill, you cannot [[Special Summon]] monsters from your [[Extra Deck]], except [[Synchro Monster]]s.<br/>
  This Skill can only be used if you begin the Duel with a Deck (excluding Extra Deck) that contains a total of at least 10 [[Tuner]] or "Rose Dragon" monsters. This Skill can only be used once per Duel.
  | fr_text               = Envoyez 1 monstre "Dragon Rose", "Sorcière de la Rose Noire" ou "Fée de la Rose" au Cimetière depuis votre main. Ensuite, ajoutez 1 monstre "Dragon Rose" de votre Deck à votre main. Vous pouvez ensuite ajouter 1 "Fée de la Rose" soit au-dessus soit au-dessous du Deck depuis l'extérieur de votre Deck. Lors du tour pendant lequel vous utilisez cette Compétence, vous ne pouvez pas Invoquer Spécialement des monstres de l'Extra Deck, excepté des Monstres Synchro.<br/>Cette Compétence ne peut être utilisée que si vous commencez le Duel avec un Deck (hors Extra Deck) contenant au moins 10 monstres Syntoniseurs ou "Dragon Rose". Cette Compétence ne peut être utilisée qu'une fois par Duel.
  | ja_text               = 手札から「ローズ・ドラゴン」モンスターまたは「黒薔薇の魔女」1体を墓地へ送り、デッキから「ローズ・ドラゴン」モンスター1体を手札に加える。その後、デッキ外から「薔薇の妖精」1体をデッキの一番上または一番下に追加できる。このスキルを使用するターン自分はエクストラデッキからシンクロモンスターしか特殊召喚できない。<br?
  このスキルはデッキ(エクストラデッキを除く)にチューナー及び「ローズ・ドラゴン」モンスターが合計で10枚以上存在するデッキを設定してデュエルを開始した場合に1ターンに1度、デュエル中に2度使用できる。
