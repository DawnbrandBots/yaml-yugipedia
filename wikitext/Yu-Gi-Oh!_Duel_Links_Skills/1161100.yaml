  | text        = You can use this Skill's first and second effects once per Duel if your Deck contains a total of 2 or more different Trap Cards.<br />1: During your Main Phase, draw 1 card or add 1 "[[Makyura the Destructor (Duel Links)|Makyura the Destructor]]" from your Deck to your hand. Then, shuffle 1 card from your hand into your Deck. This turn, you can Normal Summon 1 "Makyura the Destructor" in addition to your Normal Summon/Set.<br />2: Reveal 1 "Makyura the Destructor" in your hand, add 1 random Trap Card from your Deck to your hand. This turn, you can activate 1 Trap Card from your hand. Once during this turn, you can activate 1 Trap Card from your hand, and your opponent will take no effect damage for the remainder of the Duel.
