  | text                = You can only use this Skill's second and third effects once per Duel.<br />1: You cannot Normal or Special Summon any monsters except for "[[Lyrilusc]]" monsters.<br />2: Reveal 1 "Lyrilusc" monster in your hand, then send 1 "Lyrilusc" monster from your Deck to the [[Graveyard]].<br />3: If your opponent controls a monster, send 1 monster from your field to the Graveyard, then play 1 "Lyrilusc" monster from your Deck to your field in face-down Defense Position. (Its battle position can be changed.)
  | fr_text             = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Vous ne pouvez pas Invoquer Normalement ou Spécialement des monstres, excepté des monstres "Lyrilusc" et des monstres de Niveau 1.<br />2 : Révélez 1 monstre "Lyrilusc" de votre main, puis envoyez 1 monstre "Lyrilusc" depuis votre Deck au Cimetière.<br />3 : Si votre adversaire contrôle un monstre, envoyez 1 monstre de votre Terrain au Cimetière, puis jouez 1 monstre "Lyrilusc" de votre Deck sur votre Terrain en Position de Défense face verso. (Sa position de combat peut être modifiée.)
  | ja_text             = このスキルの②③の効果はそれぞれデュエル中に１度しか使用できない。<br />①：自分は「ＬＬ」モンスター及びレベル１モンスターしか召喚・特殊召喚できない。<br />②：手札の「ＬＬ」モンスター１体を相手に見せて発動できる。デッキから「ＬＬ」モンスター１体を墓地へ送る。<br />③：相手フィールドにモンスターが存在する場合、自分フィールドのモンスター１体を墓地へ送って発動できる。デッキから「ＬＬ」モンスター１体を裏側守備表示で出す（表示形式変更可能）。
