title: Edge Imp Retrofit
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Modernisation du Lutin Tranchant
  | ja_name             = エッジインプ・レトロフィット
  | romaji_name         = Ejji Inpu Retorofitto
  | text                = You can only use this Skill's second and third effects once per turn.<br />1: You cannot Special Summon (excluding Special Summons from the Extra Deck and your opponent's Graveyard) monsters, except for "[[Frightfur]]", "[[Fluffal]]", and "[[Edge Imp]]" monsters.<br />2: Shuffle 1 "Edge Imp" monster from your hand or face-up field into the Deck, and add 1 "Edge Imp" monster from your Deck to your hand.<br />3: During your Main Phase, equip 1 face-up monster on your opponent's field to 1 "[[Frightfur Bear (Duel Links)|Frightfur Bear]]" on your field, as if it were equipped by the effect of "Frightfur Bear".
  | fr_text             = Vous pouvez utiliser les deuxième et troisième effets de cette Compétence une fois par tour.<br />1 : Vous ne pouvez pas Invoquer Spécialement de monstres (hors Invocations Spéciales depuis l'Extra Deck et votre Cimetière), sauf des monstres "Frourreur", "Peluchimal" et "Lutin Tranchant".<br />2 : Mélangez 1 monstre "Lutin Tranchant" de votre main ou face recto sur votre Terrain dans le Deck, et ajoutez 1 monstre "Lutin Tranchant" de votre Deck à votre main.<br />3 : Pendant votre Main Phase, équipez 1 monstre face recto sur le Terrain de votre adversaire à 1 "Ours Frourreur" sur votre Terrain, comme s'il était équipé par l'effet de "Ours Frourreur".
  | ja_text             = このスキルの②③の効果はそれぞれ１ターンに１度しか使用できない。<br />①：自分は「デストーイ」「ファーニマル」「エッジインプ」モンスターしか特殊召喚できない（ＥＸデッキ・相手の墓地からの特殊召喚を除く）。<br />②：自分の手札・フィールド（表側表示）の「エッジインプ」モンスター１体をデッキに戻して発動できる。デッキから「エッジインプ」モンスター１体を手札に加える。<br />③：自分メインフェイズに発動できる。相手フィールドの表側表示モンスター１体を自分フィールドの「デストーイ・シザー・ベアー」１体に、自身の効果による装備カード扱いで装備する。
