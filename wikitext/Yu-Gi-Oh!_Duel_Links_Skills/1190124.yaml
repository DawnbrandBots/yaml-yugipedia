title: Power Engraved in Ancient Memories
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Pouvoir ancré dans d'anciens souvenirs
  | ja_name  = 
  | text     = You can only use this Skill's second and third effects once per Duel.<br />1: During your turn, you cannot Normal or Special Summon (excluding Special Summons from the Extra Deck) any monsters, except [[Dinosaur]] Type monsters.<br />2: Reveal 1 "[[Xeno Meteorus (Duel Links)|Xeno Meteorus]]" or "[[Ground Xeno (Duel Links)|Ground Xeno]]" from your hand and shuffle 1 Level 2 Dinosaur Type monster from your Deck to your hand, then add 4 different Dinosaur Type monsters from outside your Deck to the Extra Deck.<br />3: Send 1 monster (excluding Effect Monsters) from your Extra Deck to the Graveyard and Set 1 "[[Supersoaring (Duel Links)|Supersoaring]]" from outside your Deck to your field. (This card can be activated the same turn.) Then, you can banish 1 "[[Transcendosaurus Meteorus (Duel Links)|Transcendosaurus Meteorus]]" from your hand or Deck.
  | fr_text  = Vous ne pouvez utiliser les deuxième et troisième effets de cette Compétence qu'une fois par Duel.<br />1 : Pendant votre tour, vous ne pouvez pas Invoquer de monstres Normalement ou Spécialement (hormis les Invocations Spéciales depuis l'Extra Deck) à l'exception des monstres de Type Dinosaure.<br />2 : Révélez 1 "Xéno Météoraure" ou "Point Xéno" de votre main et mélangez 1 monstre de Type Dinosaure de Niveau 2 de votre Deck à votre main, puis ajoutez 4 monstres de Type Dinosaure différents depuis l'extérieur de votre Deck à votre Extra Deck.<br />3 : Envoyez 1 monstre (hors Monstres à Effet) de votre Extra Deck au Cimetière et Posez 1 "Super Envol" depuis l'extérieur de votre Deck sur votre Terrain. (Cette carte peut être activée durant le même tour.) Puis, vous pouvez bannir 1 "Transcendosaure Météoraure" depuis votre main ou Deck.
