title: Air Formula Accelerator
wikitext: |-
  {{Duel Links Skill
  | fr_name  = Accélérateur de Formule Aérienne
  | text     = '''[REQUIREMENT]''' Can be activated from turn 2 onward by revealing 1 Level 5 or higher monster from your hand if all of the monsters in your constructed Deck are [[WIND]] Attribute, and all of the Level 4 or higher monsters are "[[Air Formula Eagle (Duel Links)|Air Formula Eagle]]" or Normal Monsters.<br />'''[EFFECT]''' Send 2 "[[Sky Dragon (Duel Links Rush Duel)|Sky Dragon]]" cards from outside your Deck to the [[Graveyard]], then add up to 2 monsters from your Deck to your hand that are either Level 7 monsters, "[[Cyber Falcon (Duel Links Rush Duel)|Cyber Falcon]]", or "[[Mecha Umbretta (Duel Links)|Mecha Umbretta]]" cards. Then, send 1 card from your hand or field to the Graveyard. Then, add 1 "[[Following World (Duel Links)|Following World]]" from your Deck or Graveyard to your hand. (Once per Duel.)
  | fr_text  = '''[CONDITION]''' Peut être activée à partir du 2e tour en révélant 1 monstre de min. Niveau 5 de votre main, si tous les monstres dans votre Deck construit sont d'Attribut VENT et si tous les monstres de min. Niveau 4 sont des monstres "Formule Aérienne Aigle" ou des Monstres Normaux.<br/>'''[EFFET]''' Envoyez 2 cartes "Dragon Céleste" depuis l'extérieur de votre Deck au Cimetière, puis ajoutez jusqu'à 2 monstres de votre Deck à votre main qui sont soit des monstres de Niveau 7, soit des cartes "Cyberfaucon" ou "Ombrette Mécha". Puis, envoyez 1 carte de votre main ou Terrain au Cimetière. Puis, ajoutez 1 "Monde Suivaile" de votre Deck ou Cimetière à votre main. (Une fois par Duel.)
  | releases = 
