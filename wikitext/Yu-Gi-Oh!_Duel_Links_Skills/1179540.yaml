title: Air Formula Accelerator
wikitext: |-
  {{Duel Links Skill
  | fr_name  = 
  | text     = '''[REQUIREMENT]''' Can be activated from turn 2 onward by revealing 1 Level 5 or higher monster from your hand if all of the monsters in your constructed Deck are [[WIND]] Attribute, and all of the Level 4 or higher monsters are "[[Air Formula Eagle (Duel Links)|Air Formula Eagle]]" or Normal Monsters.<br />'''[EFFECT]''' Send 2 "[[Sky Dragon (Duel Links Rush Duel)|Sky Dragon]]" cards from outside your Deck to the [[Graveyard]], then add up to 2 monsters from your Deck to your hand that are either Level 7 monsters, "[[Cyber Falcon (Duel Links Rush Duel)|Cyber Falcon]]", or "[[Mecha Umbretta (Duel Links)|Mecha Umbretta]]" cards. Then, send 1 card from your hand or field to the Graveyard. Then, add 1 "[[Following World]]" from your Deck or Graveyard to your hand. (Once per Duel.)
  | fr_text  = 
