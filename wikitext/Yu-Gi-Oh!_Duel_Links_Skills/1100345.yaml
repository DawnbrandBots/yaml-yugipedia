title: Perfect Freeze
wikitext: |-
  {{Duel Links Skill
  | fr_name             = Gel parfait
  | ja_name             = パーフェクト・フリーズ
  | romaji_name         = Pāfekuto Furīzu
  | text                = Can be used if you control a [[WATER]] [[Winged Beast]]-Type [[Xyz Monster]] and your opponent controls at least 1 face-up monster. The card effects of all face-up cards on the field except WATER Winged Beast-Type Xyz Monsters you control will be negated until the end of the turn.<br />In addition, select 1 opponent's monster and decrease its ATK by the number of cards negated by this Skill x300 until the end of the turn.<br />This Skill can only be used once per Duel.
  | fr_text             = Cette Compétence peut être utilisée si vous contrôlez un Monstre Xyz EAU de Type Bête Ailée et que votre adversaire contrôle au moins 1 monstre face recto. Les effets de carte de toutes les cartes face recto sur le Terrain sauf les Monstres Xyz EAU de Type Bête Ailée que vous contrôlez seront annulés jusqu'à la fin du tour.<br />De plus, sélectionnez 1 monstre de l'adversaire et diminuez son ATK du nombre de cartes annulées par cette Compétence x300 jusqu'à la fin du tour.<br />Cette Compétence ne peut être utilisée qu'une fois par Duel.
  | ja_text             = 自分フィールドに鳥獸族・水属性のエクシーズモンスターが存在し、相手フィールドに表側表示のモンスターが１体以上存在する時に使用できる。自分フィールドの鳥獸族・水属性のエクシーズモンスター以外のフィールドの全ての表側表示のカードの効果はターン終了時まで無効化される。<br />さらに相手モンスター１体を選び、ターン終了時までこのスキルで無効にしたカードの枚数ｘ３００ポイント攻撃力をダウンする。<br />このスキルはデュエル中１度のみ使用することができる。
